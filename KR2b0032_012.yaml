body:
  text: 宋史全文卷十二上宋神宗二壬子熙寧五年春二月癸亥太白晝見丙寅知渭州蔡挺為樞密副使富弼屢請老戊戌復授司空同平章事武寧節度使致仕進封韓國公三月丙午詔曰天下商旅物貨至京多為兼并之家所困宜出内藏庫錢帛選官於京師置市易務遇有客人物貨出賣不行許至務中投賣勾行人牙人與客人平價據行人所要物數先支官錢買之如願折博官物者亦聽以抵當物力多少許令均分賖請相度立一限或兩限送納價錢若半年納即出息一分一年納即出息二分國是論曰興利之中其罪亦有輕重青苗均輸助役世以是為安石大罪猶可恕也何者安石之始學在此而始謀出此也市易免行征利及於瑣屑此皆小人之附安石者為之而安石亦以為王政將誰欺乎羣牧使李肅之知永興軍上戒令綏撫一路肅之曰自是朝廷以常平助役擾州縣耳上不悦户部判官吕嘉問提舉在京市易務仍賜内藏庫錢一百萬緡為市易本錢夏四月先是三司啓請市易十三條其一云兼并之家較固取利有害新法令市易務覺察申三司按置以法御批减去此條餘悉可之御史劉孝孫言於此見陛下寛仁憂民之至王安石曰孝孫稱頌此事以為聖政臣愚竊謂此乃是聖政之闕上曰若但設法傾之即兼并自不能為害安石曰若不敢明立法令但設法相傾即是紙舖孫家所為陳瓘論曰臣竊謂神考不欲於律外立較固之條可謂仁厚愛民之意劉孝孫將順聖美不為過也日録之内但為顯揚嘉問故不以御批為是不以孝孫為然於是造神考之言曰若設法傾之則兼并不能為害又撰對上之言曰若不能明立法令但設法相傾即是紙舖孫家所謂紙舖孫家為是百姓制百姓不得故止如此豈有為天下主乃只如紙舖孫家所為何以謂之人主烏乎設法相傾之語謂之不誣可乎紙舖孫家之語謂之不詆可乎神考愛民守法而指為闕政力主嘉問遂至於侮薄君父不亦悖乎五月辛巳詔以古渭寨為安軍古渭唐渭州也自至德中陷于吐蕃至皇祐中始得其地因建為寨上將恢復河湟故命建軍為開拓之漸辛卯王安石以王韶書進呈韶言已拓地千二百里招附三十餘萬口上又論人有才不可置之閒處因言漢武亦能用人才王安石曰武帝所見下故所用將帥即止衛霍輩至天下户口減半然亦不能滅匈奴上曰武帝自為多欲耳安石曰欲亦不能害政如齊桓公亦多欲矣而注厝方畧不失為覇於天下能用人故也上曰漢武至不仁以一馬之欲勞師萬里侯者七十餘人視人命若草芥所以户口減半也人命至重天地之大德曰生豈可如此是日王安石留身乞東南一郡上甚怪安石如此曰朕所以用卿亦豈有他天生聰明所以乂民相與盡其道以乂民而已非以為功名也朕頑鄙初未有知自卿在翰林始得聞道德之説心稍開悟卿朕師臣也斷不許出外陳瓘論曰熙寧之初神考以安石為賢自鄧綰黜逐以後不以安石為賢矣安石退而著書憤鬱怨望傲然自聖於是書託聖訓之言曰卿朕師臣世又曰君臣之義重於朋友朕既與卿為君臣宜為朕少屈此等不遜之言託於聖訓前後不一又謂吕惠卿亦師臣也又謂如常秩者亦當屈己師之神考嘗謂常秩不識去就安石親聞此訓書于日録豈有不識去就之人而可以為聖主之師乎六月癸亥知制誥王益柔兼判禮部貢院試法分四場除第三第四場策論如舊其第一場試本經五道第二場論語孟子各三道試官每一人試卷各分一場考校考畢衆官參定髙下去留己巳王安石請解機務上曰卿無乃謂朕有疑心朕自知制誥知卿屬以天下事如吕誨比卿少正卯盧把朕不為所惑安石曰臣平生操行本不為人所疑若任事久疑似之迹多而讒誣之人才或過於吕誨即臣未敢保陛下無疑也上曰吕公著與卿交遊至相善然言卿屢矣卿之所存雖朋友未必知至於衆人見朕與卿相知如此亦皆不知其所以君臣之義固重於朋友若朋友與卿要約勤勤如此卿亦宜為之少屈朕既與卿為君臣安得不爲朕少屈甲戌王安石見上曰陛下不許臣去臣不敢固違聖㫖然臣實病若更黽勉半年不可强即須至再煩聖聽上曰卿許朕就職甚善如何却半年後又乞出且勿如此樞密院言仁宗時嘗建武學乞復之詔於武成王廟置武學選文武官知兵者為教授秋七月壬午詔以㩁貨務為市易西務下界市易務為東務上界辛卯詔在京商税院雜賣場雜買務並𨽻提舉市易務曽孝寛為史館脩撰兼樞密都承㫖舊用武臣以文臣兼領自孝寛始也編脩三司勑條例刪定官郭逢原上疏陛下固以師臣待安石矣而使之自五鼓趨朝僕僕然北面而亟拜尚守君臣之常分臣之所未喻也又曰宰相代天理物無所不統臣愚以謂當廢去樞府併歸中書合文武於一道歸將相於一職復兵農於一民此堯舜之舉也今王安石居宰輔之重朝廷有所建置特牽於樞府而不預則臣恐陛下任安石者蓋不專矣疏奏上甚不悦他日謂安石曰逢原必輕俊安石曰陛下何以知之上曰見所上書欲併樞密院安石曰人才難得如逢原亦且曉事可試用也庚戌遣章惇察訪荆湖北路農田水利常平等事壬子詔武學生員以百人為額遇科場前一年委樞密院降宣命武臣路分都監及文臣轉運判官以上各奏舉堪應武舉者一人其被舉人遇生員闕願入學者聽詔入内供奉官以下已有養子更養次子為私身内侍者當行處斬不在自首之限閏十月御史張商英言判刑部王庭筠立法應蝗蝻為害須捕盡乃得聞奏今大名府祁保邢莫州順安保定軍所奏凡四十九狀而三十九狀除捕未盡進奏院以不應法不敢通奏且蝗蝻幾遍河朔而邸吏拘文封還奏牘姑俟其撲除盡浄方許以聞則陛下欲於此時恐懼修省以上答天戒而下䘏民隱亦晩矣御批令進奏院遍指揮諸路轉運安撫司并轄下州府軍監縣令後應有災傷並仰所在畫時聞奏王安石曰條貫已令本州提㸃刑獄轉運司申奏安撫司自不須奏一處蝗蟲陛下閱六七紙奏狀如此勞弊精神翻故紙只如經畧安撫司有何限合經制事却須要管勾奏災傷狀作甚上笑吕中曰司馬光言安石有三不足之説由今觀之實有四不足之説然神宗之於安石真以衆論為流俗以舊制為弊法以人怨為常情皆勉强從之而天變常數之論安石竟不能惑蓋聖性嚴恭根本於天性而源流於祖宗如長江大濤雖萬折必東也安石知上之不可惑故令州縣不得奏災傷以蔽聰明而旱暵彗星又不可掩故七年之旱安石以常數對而上不之信此安石常數之論不敢發也遂託言交趾以解之雖不明言天命不足畏而微意可觀矣自紹聖至政宣奸臣誤國之論盡出於安石而天命不足畏之說流禍尤酷災異不言而祥瑞輒書甚者臘月之雷指為瑞雷三月之雪指為瑞雪其視天變若童稚之可侮痛哉先是内批付王安石聞市易買賣極苛細市人籍籍怨謗以為官司浸淫盡收天下之貨自作經營可指揮令只依魏繼宗元擘畫施行於是王安石留身白上曰必有事實乞宣示上曰聞㩁貨賣冰致民賣雪都不售又聞買梳朴即梳朴貴買脂麻即脂麻貴又聞立賞錢捉人不來市易司買賣安石曰果有此事則是臣欲以聚歛誤陛下陛下當知臣素行若臣不如此即無縁有此事上曰卿固不如此但恐所使令未體朝廷意更須審察安石曰此事皆有迹容臣根究勘㑹别具聞奏上曰如河決壞民産民不之怨若人壞之則怨矣安石曰陛下正當為天之所為所謂天之所為者如河決是也天地之大德曰生然河決以壞民産而天不恤者任理而無情故也故祁寒暑雨人以為怨而天不為之變孔子曰唯天為大惟堯則之堯使鯀治水鯀汨陳其五行九載以陛下憂䘏百姓之心宜其寢食不甘而堯能待如此之久此乃能為天之所為也甲戌資政殿學士趙抃為資政殿大學士知成都府或言前執政舊不差知成都上曰今人少欲去但為職田不多耳抃清苦必不為職田蜀人素愛抃抃必肯去召見勞之曰前此無自政府復知成都者卿能為朕行乎抃曰陛下宣言即勑命也顧豈有例上甚悦八月潁州言觀文殿學士致仕歐陽脩卒太常初謚曰文常秩曰脩有定策之功請加以忠乃諡文忠脩喜薦士一時名賢卿士出脩門下者甚衆而薦秩與連庶尤力秩晩仕于朝君子非之脩自以為失庶終不出脩自以為得也己亥詔以京西路分南北兩路襄鄧隨房金均郢唐八州為南路西京許孟陳汝蔡潁七州信陽軍為北路貶太子中允同知諫院唐坰為潮州别駕坰初以王安石薦得召見驟用為諫官數論事不聽遂因百官起居越班扣陛請對上諭止之坰堅請上殿讀疏論王安石用人變法非是上怒其詭激故貶坰疏留中其畧云安石用曽布為腹心張琥李定為爪牙劉孝孫張商英為鷹犬元絳陳繹為厮役保甲以農為兵凶年必致怨叛免役損下補上人人怨咨又置市易司都人有致餓死者以安石比李林甫盧杞又言王珪奴事安石安石曰坰素狂不足深責乃改授大理評事監廣州軍資庫是月詔司農以方田均税條約并式頒之天下方田之法以東西南北各十步當四十一頃六十六畝一百六十步為一方分地計量據其方莊帳籍驗地土色分為五等均定税數均税法以縣祖額租數毋以舊收蹙零數均攤於元額外輒増數者禁之凡田方之角有埄植以野之所宜木有方帳有莊帳有甲帖有户帖有分煙析生典賣割移官給契縣置簿皆以今所方之田為正先自京東路行之諸路倣焉九月丁未御史張商英言近日典掌誥命多不得其人如陳繹王益柔許將皆今之所謂辭臣也然繹之文如欵段逐驥筋力雖勞而學成步驟益柔之文如野嫗織機雖能成幅而終非錦繡將之文如啞子吹塤終日喑嗚而不合律吕此三人者恐不足以發揮帝猷號揚四海乞精擇名臣俾司詔命不報丁卯詔以淮南路分東西兩路揚亳宿楚泰泗滁真通九州為東路壽廬蘄和舒濠光黄八州無為軍為西路壬申權發遣延州趙卨為吏部員外郎賜銀絹二百疋兩以卨奏根括地萬五千九百一十四頃招漢蕃弓箭手四千九百八十四人騎團作八指揮故也冬十月戊寅知華州吕大防言九月丙寅少華山前阜頭谷山嶺摧陷其下平地東西五里南北十里潰散墳裂涌起堆阜各髙數丈長若隄岸至陷居民六社凡數百户林木廬舍亦無存者詔賜陷没之家錢有差十二月上曰本朝祖宗皆愛惜天物不肯横費漢文帝曰朕為天下守財耳安石曰人主若能以堯舜之政澤天下之民雖竭天下之力以奉乘輿不為過當守財之言非天下正理然安於儉節自是盛德足以率勵風俗此臣所以不敢不體聖心也是歲河北大蝗癸丑熙寧六年春正月辛亥詔奉僖祖為太廟始祖遷順祖神主藏夾室孟夏祀感生帝以僖祖配始從王安石之議也樞密使文彦博言臣近言市易司遣官監賣果實有傷國體凡衣冠之家罔利於市縉紳清議尚所不容豈有堂堂大國皇皇求利而不為物議所非者乎不報先是王安石以病謁告彌旬乃求解機務且入對上面還其章安石固求罷上不許既而上又召安石子雱再三問勞又令馮京王珪諭㫖於是安石復入視事上謂安石曰雱說卿意似不專為病朕亦為雱說必為在位久度朕終不足與有為故欲去耳安石曰陛下至仁聖臣豈有他但後世風俗皆以勢利事君臣久冐權位不知避賢即無以異勢利之人况又病必恐有曠敗致累陛下知人之明所以力求罷也三月丁未熙河路經畧司言二月丙申克復河州命知制誥吕惠卿兼修撰國子監經義太子中允崇政殿説書王雱兼同修撰先是上諭執政曰今歲南省所取多知名舉人士皆趨義理之學極為美事王安石曰民未知義則未可用况士大夫乎丙辰司天監言四月朔日當食九分詔諸路學官並委中書選京官朝官選人或舉充又詔諸路擇舉人最多州軍依五路法各置教授一員壬戌御集英殿賜正奏名進士明經諸科余中以下及第出身同出身同學究出身總五百九十六人賜新及第進士錢三千緡諸科七百緡為期集費癸亥上謂王安石曰宿衛親事官有擊指揮使傷首者而主名未立宿衛法不可不急變革安石曰臣固嘗論此此固易變但要措置有方戍辰置諸路提㸃刑獄司檢法官各一員從吕惠卿請也夏四月以期集院為律學養生員置教授四員戌寅新知桂州沈起乞自今本路有邉事止申經畧司專委處置及具以聞從之安石私記又云上令起密經制交趾事諸公皆不與聞凡所奏請皆報聽乙酉熙河路經略司上河州得功將卒王安石白上士氣自此益振上曰古人謂舉事則才自練此言是也安石曰舉事則才者出不才者困此不才者所以不樂舉事也中太一宫成六月丁丑提舉在京市易務奏三班借職張吉甫為上界勾當公事吉甫辭以見為李璋指使方在降謫一旦捨去義所不安上歎曰十室之邑必有忠信吉甫雖小人陳義甚髙賢於李清臣逺矣可遂其志初韓絳宣撫清臣從辟㑹絳無成功被貶清臣規自全多毁絳故上薄之辛巳提舉司天監陳繹等言本監測驗簿氣朔差互而崇天歴氣後天明天厯朔後天其失皆置元不當未可考正浮漏渾儀亦各有舛戾詔衛朴别造厯與舊厯比較疎密其浮漏渾儀令依新様裝造本監别測驗以聞已亥置軍器監總内外軍器之政軍器舊領於三司胄曹至是始案唐令置監而廢胄曹焉秋七月乙巳詔京西淮南兩浙江西荆湖六路各置一鑄錢監江南荆湖南路以十五萬緡餘以十萬緡為額八月翰林學士曽布等言今修成義勇保甲及養馬條三卷詔兵部行之養馬法凡五路義保願養馬者户一匹有物力養馬者户二匹聽以監牧見馬給之或官與其直使自市毋或强子府界毋過三千匹五路毋過五千匹在府界者歲免體量草二百五十束先給以錢布在五路者歲免折變緡納錢三等以上十户為一保四等十户為一社以待死病補償者保甲馬即馬主獨償之社户馬半使社人償之歲一閱其瘠肥禁苛留者凡十有四條先自府界頒行焉在五路者要監司經畧司州縣更度秘閣考試所言應制科陳彦古所試六論不識題及字數皆不足自是制科亦罷矣九月辛亥御崇政殿試武舉進士冬十月辛未駙馬都尉馬敦禮乞立春秋學官不許上謂王安石曰卿嘗以春秋自魯史亡其義不可考故未置學官敦禮好學不倦苐未知此意耳敦禮但讀春秋而不讀傳春秋未易可通馮京等曰漢儒初治公羊後乃治穀梁左氏最後出上曰漢儒亦少有識見者戊寅三班奉職申翊為右班殿直閣門祇候武學教授初王韶既城河州獨將兵至馬練川降瞎吳叱進攻宕州拔之通洮州路岷州木令征以城降遂入岷州分兵破青龍侯於綽羅川通熙州路疊州欽令征洮州郭厮敦皆相繼詣軍中以城聴命巴氈角亦以其族自歸軍行凡五十有四日涉千八百里復州五闢地東西千里斬首三千餘級是役也人皆傳韶已全師覆没及奏㨗上乃大喜王安石謂韶謀中機㑹故所至皆㨗云辛巳宰臣王安石等以修復熙州洮岷疊宕等州幅員二千餘里招撫大小蕃族三十餘萬帳各已降附上表稱賀上解所服玉帶賜安石安石固辭曰陛下拔王韶於疎逺之中恢復一方臣與二三執政奉承聖㫖而已不敢獨當此賜上又諭㫖曰羣疑方作朕亦欲中止非卿助朕此功不成安石受賜上初置内教場旬一御便殿程其能否而勸沮之人人奮勵十二月上論司馬孫吳及李靖團力之法王安石曰古論兵無如孫武者如日有短長月有死生五星之變不可勝聴五色之變不可勝觀竒正之變不可勝窮蓋粗見道故其言有及於此上曰能知竒正乃用兵之要竒者天道也正者地道也地道則常天道則變而無常至於能用竒正以竒為正以正為竒則妙而神矣安石曰誠如此天能天而不能地地能地而不能天能天能地利用出入則所謂神也甲寅熙寧七年二月上與王安石論邊事曰食哉惟時雖堯舜以為先務安石曰雖然若不惇德允元而難任人誰為陛下盡力推行食哉惟時之政事上憂契丹安石曰豈有萬里而畏人者哉如不免畏人即必是事尚有可思處庚寅詔國子監許賣九經子史諸書與髙麗國使人又詔以新鄆州左司理參軍葉濤等二十三人為諸路教授國子監言看詳濤等所業堪充教授故也三月癸卯詔以旱避正殿減常膳乙巳白虹貫日詔役錢每千别納頭子五文其舊於役人圓融工費修官舍作什器夫力輦載之類並用此錢不足即用情輕贖銅錢輒圓融者以違制論不以去官赦原先是凡公家之費有敷于民間者謂之圓融汙吏乘之以為奸至是始悉禁焉庚戍兩浙察訪沈括言兩浙上供帛年額九十八萬民間賠甚多後來發運司以移用財貨為名増兩浙預買紬絹十二萬乞罷之以寛民力從之又詔聞定州民有拆賣屋木以納免役錢者令安撫轉運提舉司體量具實以聞上問安石納免行錢如何或云提湯缾人亦令出錢有之乎安石曰若有之必經中書指揮中書實無此文字陛下治身比堯舜實無所愧至於難任人疾讒說即與堯舜實異故也上曰何故士大夫言不便者甚衆安石曰士大夫或不快朝廷政事或與近習相為表裏自古未有令近習如此而能興治功者上又患置官多費用安石曰凡創置官皆須度可以省費興治乃創置上曰即如此何故財用不足若言兵多則今日兵比慶厯中為極少安石曰陛下必欲財用足須理財若理財即須斷而不惑不為左右小人異論所移乃可以有為上曰古者什一而税足矣今取財百端不可為少安石曰古非特什一之税而已市有泉府之官山林川澤有虞衡之官有次布總布質布纒布之類甚衆闗市有征而貨有不由闗者舉其貨買其人古之取財亦豈但什一而己癸亥上批聞都下米麥踴貴可令司農寺發寄倉常平米不計元糴價比在市見賣之直量減錢出糶詔司農寺以常平米三十二萬斛三司米百九十萬斛置官場出糶民甚悦之乙丑詔中書應中外文武臣僚並許實封言朝政闕失翰林學士韓維之辭也先是維對延和殿上曰久不雨朕夙夜焦勞奈何維曰陛下憂閔旱災損膳避殿此乃舉行故事恐不足以應天變願陛下痛自責己下詔廣求直言以開壅蔽大發恩令有所蠲放以和人情上感悟即命維草詔詔出人情大悦夏四月己巳上以久旱憂見容色欲盡罷保甲方田等事王安石曰水旱常事堯湯所不免陛下即位以來累年豐稔今旱暵雖逺但當廣修人事以應天災不足貽聖慮耳上曰此豈細事朕今所以恐懼如此者正為人事有所未修也於是中書條奏請蠲減賑䘏詔州縣已差教授處管下有書院并縣學舊有錢糧者並撥入本學補試生員選差職掌館官毋得干預從國子監請也上批應災傷路分方田保甲其見編排方量及造五等簿處可速指揮並權罷是日大雨先是監安上門鄭俠言去年大蝗秋冬亢旱以至今春不雨皆由中外之臣輔佐陛下不以道以至於此伏願陛下開倉廩以振貧乏諸有司掊歛不道之政一切罷去庶幾早召和氣上應天心臣又見南征北伐皆以其勝㨗之勢山川之形為圖而來料無一人以天下憂苦質妻賣女父子不保遷移逃走困頓藍縷拆屋伐桑爭貸於市輸官糴米皇皇不給之狀為圖以獻臣謹以安上門逐日所見繪為一圖百不及一己可咨嗟涕泣使人傷心而况於千萬里之外哉如陛下觀臣之圖行臣之言自今已往至于十日不雨乞斬臣於宣徳門外以正欺君謾天之罪如少有所濟亦乞正臣越分言事之刑俠福清人也於是上出俠疏及圖以示輔臣問王安石識俠否安石曰嘗從臣學因乞避位上不許乃詔開封府劾俠擅發馬逓之罪王安石懇求去位引惠卿執政上許之判西京留守司御史臺司馬光上疏方今朝之闕政其大者有六而已一曰廣散青苗錢使民負債日重而縣官無所得二曰免上户之役歛下户之錢以養浮浪之人三曰置市易司與細民爭利而實耗散官物四曰中國未治而侵擾四夷得少失多五曰團結保甲教習凶器以疲擾農民六曰信狂狡之人妄興水利勞民費財若其他瑣瑣米鹽之事皆不足為陛下道也知青州滕甫言新法害民者陛下既知之矣但一下手詔應熙寧二年以來所行新法有不便者悉罷則民氣和而天意解矣丙戍平章事監修國史王安石罷為吏部尚書知江寧府知大名府韓絳平章事翰林學士吕惠卿為參知政事安石為執政凡六年㑹久旱百姓流離上憂見顔色益疑新法不便欲罷之安石不悦屢求去上手詔諭安石欲處之以師傅之官留京師而安石堅求去又賜手詔曰朕深體卿意更不欲再三邀卿之留已除卿知江寧庶安心休息以適所欲朕體卿之誠至矣卿宜有以報之手劄具存無或食言從此浩然長徃也又賜手詔曰韓絳欲得一見卿意者有所諮議卿可為朕詳語以方今人情政事之所宜急者安石薦絳代己仍以惠卿佐之於安石所為遵守不變也時號絳為傳法沙門惠卿為䕶法善神講義曰仲淹用則仲淹之法行仲淹去則仲淹之法改安石之身雖退而安石之法卒不可變何耶蓋安石變法之罪小用小人之罪大變法之禍止於一時而引用小人其禍無窮惠卿祖安石之意而行之章惇祖惠卿之意而行之蔡京又祖章惇之意而行之其為禍百年不止也己丑詔曰朕度時之宜造為法令已行之效固亦可見吏有不能奉承雖然朕終不以吏或違法之故輒為之廢法要當博謀廣聴案違法者而深治之先是吕惠卿慮中外因王安石罷相言新法不便以書遍遺諸路監司郡守使陳利害至是又白上降此詔申明之上論及免行利害且曰今日之法但當使百姓出錢輕如往日便是良法至如減定公使錢人猶以為言者此實除去衙前賠費深弊且天下貢奉之物所以奉一人者朕悉已罷人臣亦當體朕此意以愛惜百姓為心馮京曰朝廷立法本意出於愛民然措置之間或有未盡但當開廣聰明盡天下之議便者行之有不便者不吝改作則天下受賜矣詔中書自熙寧以來剏立改更法度令具本末編類進入五月戊戌朔左司郎中天章閣待制李師中言旱既太甚民將失所今日之事非有動民之行應天之實臣恐不足以塞天變伏望陛下詔求方正有道之士召諸公車對策如司馬光蘇軾輩復置左右以輔聖德如此而後庶幾有敢言者陛下承祖宗之基求治如此臣愚不肖亦未忘舊學陛下欲為富國强兵之事則有禁暴豐財之武欲為代工熙載之事則有利用厚生之道有臣如是陛下其舍諸上批師中敢肆誕謾輒求大用可責授和州團練副使本州安置不得簽書公事王安石甚惡師中及是吕惠卿請出師中所上疏付外因摘其語激上怒遂廢斥之辛亥中書門下言策試制舉並以經術時務今進士已罷詞賦所試事業即與制舉無異至於時政闕失即士庶各許上封言事其賢良方正等科目欲乞並行停罷從之丙辰館閣校勘吕升卿國子監直講沈季長並為崇政殿説書升卿素無學術每進講多捨經而談財榖利害等事上時問以經義升卿不能對輒目季長從旁代對上問難甚苦季長辭屢屈上問從誰受此義對曰受之王安石上笑曰然則宜爾季長雖黨附安石而常非王雱王安禮及吕惠卿所為以為必累安石雱等深惡之故不甚得進用壬戌國子監言大學生員多而齋舍少先以期集院為律學外屋尚百餘間乞盡充學舍從之為屋百楹學者以千計六月詔監安上門鄭俠勒停編管汀州始俠上書獻流民圖朝廷以為狂笑而召問安石既罷吕惠卿執政俠又言安石作新法為民害惠卿朋黨姦邪壅蔽聰明獨馮京立異敢與安石校請黜惠卿用京為相惠卿大怒遂白上重責之上謂輔臣曰天下財用朝廷若少留意則所省不可勝計昨者撥併軍營令㑹計減軍員十將以下三千餘人除二節特支及傔從外一歲省錢四十五萬緡米四十萬石紬絹二十萬疋布三萬端草二百萬束若每事如此及諸路轉運使得人更令久任使之經畫財其可勝用哉辛卯詔以司天監新製渾儀浮漏於翰林天文院安置提舉司天監沈括秋官正皇甫愈等各賜銀絹有差上謂輔臣曰知州轉運使令久任吕惠卿曰衆議皆以舉縣令為急不知列官分職何處不擇人上曰刺史縣令治民為最近故以擇人為急若縣令中明有績效用朝廷擢三兩人以勵庶官不亦善乎馮京曰漢宣帝以縣令髙第者為刺史刺史有殊績者入為三公黄霸是也上曰如此用人恐亦非宜此霸之風采所以不及為郡時也秋七月司農寺言五等丁産簿舊憑書手及户長供通隱漏不實唯使民自供手實許人糾告之法最為詳密惠卿獻議謂宜倣手實之意使人户自占家業如有隱落即用隱寄産業賞告之法庶得其實手實法凡造五等簿預以式示民令民依式為狀納縣簿訖第其價髙下為五等乃定書所當輸錢示民兩月非用器田榖而輒隱落者許告有實三分以一充賞於是始行手實法八月丙戌命知制誥沈括為河北西路察訪使先是遣内侍籍民車以備邊人未喻朝廷之意相摇大搔又市易司患西蜀井鹽不可禁欲盡實私井而運解鹽以足之上顧括曰卿知籍車之事乎括對曰知之上曰卿以為何如括對曰車戰之利見於歴世巫臣教吳子以車戰遂霸中國李靖用偏廂鹿角以擒頡利臣但未知一事古人所謂輕重者兵車也五御折旋利於輕速今民間輜車重大椎樸以牛挽之日不能三十里少蒙雨雪則跬歩不進故世謂之太平車恐兵間不可用耳上復喜曰人無如此曉朕者當更思之卿又聞西蜀禁鹽之利乎對曰亦粗知之私井既容其撲賣則不得無私易一切實之而運解鹽使一出於官售此亦省刑罰籠遺利之一端然忠萬戎瀘間夷界小井尤多不知虜鹽又何如止絶如此後夷界更須列候加警則恐所得不補所費明日二事俱寢執政喜謂括曰公有何術立談而罷此二事括對曰聖主可以理奪不可以言爭若車可用虜鹽可禁括不敢以為非九月戊戍上以連日隂雨喜諭輔臣曰朕宫中令人掘地及一尺五寸土猶滋潤如此必可耕耨韓絳等言陛下憫憂元元禱祠備至精誠上達旋獲感通臣等比預太一齋祠竊觀執事者踰旬未嘗解帶可見聖意䖍恭左右之人亦不敢少怠也庚子與輔臣論河北守備韓絳等曰漢唐重兵皆在京師其邊戍裁足守備而已强本弱末其勢亦順開元以後有事四夷權臣皆節制一方重兵悉在西北天寶之亂由京師空虛賊臣得以肆志也上曰邊上老人亦謂今之邊兵過於昔時其勢如倒裝浮圖朕亦每以此為念也詔日者分兩浙為東西路今有司言供億錢榖多在浙西計置及水利事盡在蘇秀等州分之必至闕事其毋復分路三司火自己至戌止焚屋千八十楹案牘殆盡乙夘知制誥章惇權發遣三司使十月庚辰詔三司置㑹計司以宰臣韓絳提舉癸巳工部郎中新知邢州范純仁權發遣慶州純仁過闕入覲上見之甚喜曰卿父在慶州甚有威名卿今繼之可謂世職也卿兵法必精對曰臣素儒家未嘗學兵法又問卿久隨侍在陜西必亦詳熟邊事對曰臣隨侍時年㓜並不復記憶純仁度必有以開邊之説誤上者因進言臣不才陛下若使完繕城壘愛養百姓臣策疲駑不敢有辭若使臣開拓封疆侵攘夷狄非臣所長願别擇才帥上卒不許十一月己未冬至合祭天地于圜丘以太祖配赦天下十二月乙亥新知常州吕嘉問提舉河北糴便粮草復理提㸃刑獄資序以檢正中書户房公事張諤訟嘉問不應黜降故也初王安石既有江寧之命諤與嘉問持安石而泣安石勞之曰已薦吕惠卿矣兩人收淚謝安石乙卯熙寧八年春正月諫議大夫馮京守本官知亳州王安國追毁出身以來文字放歸田里汀州編管人鄭俠改英州吕惠卿憾俠且惡馮京異議欲籍俠以排去京并及王安國乘間白上曰俠書言青苗免役流民等事此衆所共知也若言禁中有人被甲登殿詬罵此禁中事俠安從知此蓋俠前後所言皆京使安國導之乞追俠付獄窮治詔送御史臺知制誥鄧潤甫同推究吕惠卿議當俠大辟上曰俠所言非為身也豈宜深罪始惠卿事安石如父子安國負氣惡其憸巧數面折之惠卿切齒及安石罷相引惠卿輔政惠卿遂欲代安石恐其復來乃因俠獄陷安國亦以沮安石也安石再入相安國猶在國門由是安石與惠卿交惡吕惠卿為手實法奉使者至折秋毫天下病之是歲十月卒罷手實法詔張方平歸宣徽院供職上問方平祖宗禦戎之策方平曰近歲邊臣建開拓之議皆行險僥倖之人欲以天下安危試之一擲事成則身蒙其利不成則陛下任其患不可聽也丁巳權永興軍等路轉運使皮公弼言交子之法以方寸之紙飛錢致逺然不積錢為本亦不能以空文行今商虢鐵冶所收極廣茍即冶更鑄拆二錢歲除工費外可得百萬緡為交子本并上可行十二事上批委公弼總制營辦二月太常寺太祝王安上為右贊善大夫權發遣度支判官安上安石幼弟也癸酉觀文殿大學士吏部尚書知江寧府王安石依舊本官平章事昭文館大學士始安石薦韓絳吕惠卿代己惠卿既得勢恐安石復入遂欲逆閉其途凡可以害安石者無所不用其智又數與絳忤絳乘間白上請復相安石上從之惠卿聞命愕然翌日上遣勾當御藥院劉有方齎詔往江寧召安石安石不辭倍道赴闕差樞密副都承㫖張誠一入内押班李憲等行視寛廣處閲殿前司馬步軍二千八百人教李靖營陣法上諭李憲等曰黄帝始置八陣法敗蚩尤於涿鹿諸葛亮造八陣圖於魚復平沙之上晉桓温見之曰常山蛇勢此即九軍陣法也後至隋韓擒虎以授李靖靖以時將臣曉其法者頗多故造六花陣使世人不能曉之大抵八陣即九軍九軍者方陣也六花陣即七軍七軍者圓陣也蓋陣以圓為體方陣者内圓而外方圓陣即内外俱圓矣故以圓物驗之則方以八包一圓以六包一此九軍六花之陣大體也六軍者左右虞候各一軍為二虞軍左右廂各二軍為四廂軍與中軍共為七軍八陣者加前後二軍共為九軍本朝祖宗以來置殿前馬歩軍三帥即中軍前後軍帥之别名而馬步軍都虞候是為二虞候軍天武捧日龍神衛四廂是為四廂軍也中軍帥總制九軍即殿前都虞候專總中軍一軍之事務是其名實與古九軍及六花陣相符而不少差也李筌之圖乃營法非陣法也朕採古之法酌今之宜曰營曰陣本于一法而已止則曰營行則曰陣在竒正言之則營為正陣為竒也察訪使曽孝寛言慶厯八年嘗詔河北州軍坊郭第三等鄉村第二等每户養被甲馬一世以備非時官買乞檢㑹施行户馬法始於此夏四月上與王安石論理財安石曰但審計無為小人所撓令材士肯為陛下盡力則財極有可理之道太常禮院言己尊僖祖為太廟始祖孟夏禘祭當正東向之位仍請自今禘祫著為定禮詔恭依閏四月知制誥沈括上熙寧奉元歴初仁宗朝用崇天歴至治平初司天監周琮改撰明天歴行之至熙寧元年七月望夜將旦月食東方與歴不協乃詔更造新歴括言淮南人衛朴通厯法詔朴改造視明天厯朔减二刻厯成行之至紹聖初又改厯賜大理寺丞歐陽發進士出身發脩之子也上問脩所為五代史如何王安石曰臣方讀數冊其文辭多不合義理上曰責以義理則脩止於如此每卷後論説皆稱嗚呼是事事皆可嘆嗟五月丙寅命輔臣禱雨于天地宗廟社稷六月辛卯朔上批聞淮南旱甚其令轉運司委州軍長吏禱名山靈祠辛丑都官員外郎劉師旦言今九域圖自大中祥符六年修定至今六十餘年乞選有地理學者重修更賜名曰九域志王安石上詩書周禮義序詔付國子監置之三經解之首先是安石撰詩序稱頌上德以文王為比上曰以朕比文王恐為天下後世笑卿言當為人法恐如此非是安石言稱頌上德以為比于文王誠無所悔上曰朕豈不自知須當改之但言解經之意足矣遂改撰以進上乃頒行之司徒兼侍中判相州韓琦薨前一夕大星隕州治櫪馬皆驚上自為碑文載琦大節又篆其首曰兩朝顧命定策元勲之碑諡忠獻秋八月庚寅朔司天監言日當食雲隂微雨不見庚戍韓絳罷知許州絳居相位數與吕惠卿異議王安石復入論政愈駁數稱疾固求罷而有是命冬十月崇政殿説書吕升卿權發遣江南西路轉運副使上既决意罷惠卿政事故先出升卿先是御史蔡承禧奏臣累言參知政事吕惠卿姦邪不法是日手詔參知政事吕惠卿不能以公滅私為國司直可守本官知陳州庚子權三司使章惇知湖州先是御史中丞鄧綰言惠卿執政逾年所立朋黨不一然與惠卿同惡相濟無如章惇今惠卿雖已斥逐而尚留惇在朝廷亦猶療病四體而止治其一邊糞除一堂而尚存穢之半也於是罷惇三司使以本官出守丁未彗不見自始出至没凡十二日丁巳富弼言臣近日忽聞别降手詔許中外臣寮直言朝政之闕失洛城士庶歡呼鼓舞喧于道路推是而往則天下之人無不慰悦矣去年久旱陛下曽降手詔許臣寮上封論事人方喜悦日俟朝廷施設而不知何人上累聖德遽成反汗於是天下大失所望臣願陛下盡取羣奏不遺疎賤萬機之暇一一親閲擇其衆説所合者斷在不惑力賜施行則人心悦服天道助順天人相應立致太平豈復有災眚出見而上駭聖慮哉張方平言新法行已六年事之利害非一二可悉人為天地心天地之變人心實為之故和氣不應災異薦作顧其事必有未協于民者矣法既未協事須必改若又憚改人將不堪此臣所以為陛下痛心疾首一夕而九興也十一月癸未右諫議大夫宋敏求為知制誥陳襄為樞密直學士先是知制誥鄧潤甫言近者羣臣專尚告訐此非國家之義宜登用敦厚之人以變風俗上嘉納之居數日敏求及襄有是命丙戌先是王安石以疾居家上遣中使勞問又命輔臣即其家議事時有不附新法者安石欲深罪之上不可安石爭之曰不然法不行上曰聞民間亦頗苦新法安石曰祁寒暑雨民猶怨咨此豈足恤也上曰豈若祁寒暑雨之怨亦無耶安石不悦退而屬疾上遣使慰勉之乃出其黨為安石謀曰今不取門下士上素所不喜者暴而用之則權輕將有窺人間隙者矣安石從之上亦喜安石之出凡所進擬皆聽安石由是權益重十二月辛亥王安石上再撰詩闗雎義解詔并前改定諸詩序解付國子監鏤板施行癸丑詔安南世受王爵而乃攻犯城邑殺傷吏民干國之紀刑兹無赦已差趙卨充安南道行營馬步軍都總管須時興師水陸兼進天示助順既兆布新之祥人知侮亡咸懷敵愾之氣時交趾所破城邑即為露布揭之衢路言中國作青苗助役之法窮困生民今出兵欲相拯濟安石怒故自草此詔丙辰熙寧九年春正月己卯是日交賊陷邕州蘇緘曰吾義不死賊手乃還州廨闔門命其家三十六人皆先死藏之于坎縱火自焚緘憤沈起劉彛致冦彛又坐視城覆不救乃列起彛罪牓於市冀達朝廷邕人為緘立祠歲時禱之二月丁亥朔判太原府郭逵為安南道行營馬步軍都總管招討使兼荆湖廣南路宣撫使改趙卨為副使始吳充與安石爭伐交趾利害安石言必可取充謂得之無益上竟用安石言廣南西路經畧司以蘇緘死事聞詔贈緘奉國軍節度使諡忠勇以其子前桂州司户參軍子元為西頭供奉官閤門祇候賜對便殿上曰昔唐張巡以許逺守睢陽蔽捍江淮較之卿父未為逺過也三月甲戌御集英殿賜進士王鐸以下并明經諸科及第出身同學究出身總五百九十六人鐸邵武人也戊寅賜新及第進士等錢五百千諸科錢二百千造小録等夏四月上與輔臣論營陣法以謂為將者少知將兵之理且如八軍六軍皆大將居中大將譬夫心也諸軍則四體也運其心智以身使臂使指攻其左則右捄攻其右則左捄前後亦然則兵何由敗也五月丙寅詔復分兩浙為二路明年五月復有詔合為一路蓋以財賦不可分故也六月安石既與惠卿交惡令徐禧王古等按華亭獄不得惠卿罪更使周輔按之安石子雱切責練亨甫吕嘉問亨甫嘉問共議取鄧綰等所條惠卿事雜他書下制獄堂吏遽告惠卿於陳惠卿即自訴且訟綰及安石上以示安石安石歸而問雱雱乃言其情安石始咎雱而嘉問等相繼得罪安石由是愧上數求去上待安石自是意亦稍衰矣天章閣待制王雱卒手詔即其家上雱所撰論語孟子義雱性刻深喜殺常稱商君以為豪傑之士每勸安石誅不用命大臣而安石不從也及與惠卿交惡使人告發吕氏姦利事皆自雱發之秋七月庚申上批自闗以西秋稼頗有順成之望近忽生蝗蝻虸蚄可令監司速分定州軍往來督趣官吏打撲淨盡以聞八月宣徽南院使判應天府張方平言司農寺近降新制應祠廟許依坊場河渡募人承買收取凈利管下閼伯廟微子廟閼伯主祀太火火為國家盛德所乘微子開國于宋亦本朝受命建號所因又有雙廟乃唐張巡許逺以孤城死賊欲乞朝廷不賣此三廟以稱國家嚴恭典禮追尚前烈之意上批司農寺鬻天下祠廟辱國黷神此為甚者可速令更不施行冬十月丙戌上批體問得前日小雨於農事亦小有濟宜且擇日賽謝戊子上批權御史中丞鄧綰操心頗僻賦性姦回論事薦人不循分守可落學士中丞以兵部郎中知虢州壬辰詔崇文院校書兼中書户房習學公事練亨甫身備宰屬與言事官交通罷為漳州軍事判官先是王安石言聞御史中丞鄧綰嘗為臣子弟營官及薦臣子壻可用又為臣求賜第宅兼綰近舉御史二人尋却乞不施行聞其一人彭汝勵者嘗與練亨甫相失綰聽亨甫游説故乞别舉官綰豈可令執法在論思之地亨甫亦不當留備宰屬故有是命初綰以附㑹安石居言職及安石與吕惠卿之黨相傾綰皆極力奏劾之上益厭安石所為綰懼安石去而失勢屢留之於上亨甫諂事安石子雱以進至是乃斥丙午左僕射兼門下侍郎平章事王安石罷為鎮南軍節度使同平章事判江寧府安石之再入也多稱病求去及子雱死力請解機務上亦滋厭安石所為故有是命樞密使工部侍郎吳充依前官平章事充在西府數乘間言安石政事不便上以其中立無私故相之知成都府馮京為給事中知樞密院事先是吕惠卿悉出安石前後私書手筆奏之其一云勿令齊年知齊年者謂京也與安石同歲在中書多異議故云又其一云勿令上知由是上以安石為欺故復用京十二月癸卯郭逵等次富良江未至交州三十里賊大敗乾德懼奉表詣軍門乞降納蘇茂思琅門諒廣源五州之地仍歸所掠子女丁巳熙寧十年春正月辛巳詔天章閣待制楚建中罰銅三十斤先是范純仁代建中知慶州擅發常平封樁粟麥收恤流亡多所全活㑹蓬生蔽野如粟公私取給焉復為營求耕稼之具歲以大穰或言純仁廩貸過多遣使按視民聞之爭先輸官比使者至則已無欠邠寧間有叢塜使者發塜數骸劾純仁全活不實之罪其地乃建中所封也朝廷即欲移罪建中純仁連奏建中方申請措置而民多餓死及臣因其措置偶免流亡非臣才術能然也建中竟不免罰銅二月辛卯日中有黒子如李至乙巳散乙未權御史中丞鄧潤甫言嘗有興利之臣議前代帝王陵寢許民請射耕墾而司農可之縁此唐之諸陵悉見芟刈詔唐諸陵除立定禁止頃畝外其餘民已請射地許依舊耕佃餘並禁止己亥樞密副使王韶知洪州韶鑿空開邊以軍功至執政乃專以勤兵費財歸曲於朝廷上不悦故出之寶文閣待制常秩卒秩起處士在朝廷碌碌無所發明問望日損為時譏笑三月辛亥朔分命輔臣祈雨五月庚戌朔詔諸路言蝻蟲生宜申嚴條約下當職官除絶之監西京抽税竹木務太子中允程顥改太常丞以知河南府賈昌衡京西北路轉運副使李南公等言顥博通古今行誼脩潔改官八年未嘗磨勘故也戊午詔修仁宗英宗兩朝正史庚申詔以歐陽脩五代史藏秘閣癸亥知越州資政殿大學士趙抃知杭州抃知越州時兩浙旱蝗餓死者十五六諸州皆禁人増米價抃獨榜衢路令有米者任増價糶之於是諸州米商輻湊詣越米價更賤民無餓死者先是淮浙饑詔出本界上供米損市價糶以活飢民發運副使盧秉言價雖賤貧者終不得米請償糴本盡以其餘賑恤流民詔可是歲奏計上問曰如聞滁和民食蝗以濟有之乎秉對有之民飢甚死者相枕籍上慘然曰獨趙抃為朕言與卿合前此發運司入奏多獻羨餘以希恩秉獨以錢七十萬緡償三司舊負因言發運司但督六路財賦以時上之本無羨餘以進者率正數也乞遂禁絶上嘉納之秋七月辛未太常丞知湖州鞠真卿為太常博士直秘閣以宣徽北院使王拱辰權御史中丞鄧潤甫並言真卿自改官至登朝三十年非特恩未嘗陳請磨勘故也八月丙戌詔監察御史裏行黄亷為京東路體量安撫亷嘗言都檢正俞充結中人僥倖富貴不宜使佐具瞻之地上曰人才蓋無類顧駕御之如何耳亷對曰雖然漸不可長聖人長駕逺馭故四凶在朝不廢時雍彼皆才器傑然過人任使稱意為後世患故放殛之耳上曰且置此事河决曹村京東尤被其害今以累卿亷既受命條舉百餘事卒全所活飢民三十五萬三千口壯者就功而食又二萬七千人得七十三萬二千工給當年牛借種錢八萬六千三百緡歸而論薦士夫後多朝廷所收用云己丑秘書監蘇頌為遼主生辰國信使姚麟副之集賢校理劉奉世為正旦國信使張世矩副之故事使遼者冬至日與遼人交相慶是歲本朝厯先契丹一日遼人固執其厯為是頌曰厯家算術小異則遲速不同謂如亥時節氣當交則猶是今夕若踰刻則屬子時為明日矣或先或後各從本朝之厯可也遼人不能屈遂各以其日為節使還奏之上喜曰朕思之此最難處卿對得極宜甲辰詔内外待制以上及臺諫官發運轉運使提㸃刑獄轉運判官各舉文臣才行堪升擢官一員令中書審察隨材試用毋得舉館職及兩府若已之親從監察御史黄亷奏請也應詔者百餘人亷又言勢孤族寒逺跡下僚者既得以名聞於上願詔中書審察其能否用之則急才之詔不虛行於天下九月贈潁州團練推官邵雍秘書省著作郎宰相吳充請於上賜諡曰康節雍初與常秩同召雍竟辭不起士大夫髙之冬十月乙未知河陽吕公著提舉中太乙宫公著至京師對延和殿勞問周至公著面奏伏覩近詔舉才行堪任升擢官竊詳今日詔意正欲達所未達然數年以來天下之士陛下素知其能嘗試以事而中就閑外者尚多恐其間亦有材實忠厚欲為國家宣力者未必盡出於迂濶繆戾而難用也自熙寧初論新法不附執政者皆譴逐不復收用故公著見上首言之十二月壬午詔自明年正月朔旦改元為元豐司馬光以書與呉充言今日救天下之急保國家之安茍不罷青苗免役保甲市易之息征伐之謀而欲求其成效是猶惡湯之沸而益薪鼓槖欲適鄢郢而北轅疾驅也充代王安石為相知天下不便新法欲有所變更嘗乞召還光及吕公著韓維蘇頌又薦孫覺李常程顥等十數人皆安石所斥退者故光遺以此書而充不能用光亦卒不起戊午元豐元年春正月庚戌詔河北轉運司令所在長吏躬禱名山靈祠旱故也戊午判太常寺陳襄集賢校理黄履李清臣王存詳定郊廟奉祀禮文權發遣三司使李承之言近年朝廷寛假資格稍髙之人為其衰遲或不任事未欲遽令休退故置提舉管勾宫觀之職不立員數而臣僚趨閒貪禄冒居無恥或精神未衰便私避事亦求此職乞今後在京宫觀毋得過十五員諸路倍之如有除授令依例待闕詔自今陳請宫觀等差遣人年六十以上聽差仍毋過兩次閏正月戊子權監察御史裏行彭汝礪為江南東路轉運判官辭日復上疏論時事且言不患無將順之臣患無諫諍之臣不患無敢為之臣患無敢言之臣上察其忠慰諭久之庚子日中有黒子如李自是至戊午凡十九日三月壬午侍讀吕公著讀後漢書畢上留公著極論治體至三皇無為之道釋老虛寂之説公著問上曰此道髙逺堯舜能知之乎上曰堯舜豈不知公著曰堯舜雖知之然常以知人安民為難此所以為堯舜也上又論前世帝王曰漢髙祖武帝有雄材大畧髙祖稱吾不如蕭何吾不如韓信至張良獨曰吾不如子房盖以子房道髙尊之故不名公著曰誠如聖諭上又曰武帝雖以汲黯為戇然不冠則不見後雖得罪猶以二千石禄終其身公著曰武帝之於汲黯僅能不殺耳上又論唐太宗公著曰太宗所以能成王業者以其能屈己從諫耳上臨御日久羣臣畏上威嚴莫敢進規至是聞公著言竦然敬納之御邇英閣講官黄履進講周禮八柄上曰坐而論道謂之三公而八柄非大宰所得與何也履曰八柄以馭羣臣馭者主道也故非太宰所與上曰善庚寅詔時雨稍愆遣官禱𤣥㝠五星辛卯遣官謝雨六月癸卯朔日有食之甲辰夜東南有光燭地大星出匏𤓰裂于内階聲如雷秋七月丁酉御史黄亷言前歲科場逐經發解人數不均乞自今於逐經内各定取人分數所貴均收所長以專士習詔自今在京發解并南省考試詩易各取三分周禮禮記通取二分又言國子監生員著述論議盡得講官緒餘將來逐官例差考試切恐去取之際或未能判然無疑外方疏逺之人偶不相合遂致黜落欲乞將來止選近歲新科人為試官或差近郡教授詔候差官日取旨庚子初澶州決水復塞吕公著奏疏曰曹村埽決聖心惻然即議閉塞功未踰時而有成患不閱歲而尋弭實由陛下至誠愛民愛物之心天相神助殆非人力近日數起詔獄有司酷於鍛鍊比至臨决多從末减昔于公一郡之刺史耳猶以隂德有報况於萬乘之尊固宜受福無疆施於萬世然臣願陛下親正士拒壬人必有忍以濟事功推内恕以及人物于以崇起忠厚保合太和則易所謂自天祐之吉無不利詩所謂干禄百福子孫千億者蓋將以類而應是月公著入對上迎謂曰覽卿所奏深得人臣盡規之義時獄犴寖蕃而上繼嗣未廣公著辭順而意婉故上納焉九月乙酉吕公著薛向並同知樞密院事公著奏事畢獨留謝因言自熙寧以來因朝廷論議不同端人良士例為小人排格指為沮壞法度之人不可復用此非國家之利也願陛下加意省察上曰然當以次收用之十二月辛丑朔詔提舉司天監集厯官考算遼髙麗日本國與本朝奉元厯同異聞奏其後厯官趙延慶等言遼己未年氣朔與宣明厯合日本戊午年氣朔與遼厯相近髙麗戊午年朔與奉元厯合其二十四氣内有七氣時刻并逐月太陽過宫日數時刻不同丙午是日月中有黒子如李凡十三日乃散先是上以國初廢大理獄非是於是中書言請復置大理獄應三司及寺監等公事除本司公人杖笞罪非追究者隨處裁决餘並送大理獄結斷置卿一人少卿二人丞四人專主推鞫上每憤契丹倔强侵侮有復幽燕之志即景福殿庫聚金帛為兵費是年始更庫名御製詩以掲之曰五季失國玁狁孔熾藝祖造邦思有懲艾爰設内府基以募士曽孫保之敢忘厥志凡三十二庫後積羨贏又揭以詩曰每䖍夕愓心妄意遵遺業顧予不武姿何日成戎㨗己未元豐二年春正月京兆府學教授蔣䕫言春秋釋奠以孔子為先聖顔子為先師其奠先師肆祭器實牲體盥手灌爵奠幣讀祝與孔子無少異而九人之像坐于兩旁樽酒豆肉不及乞下臣議於禮官薦享祝獻顔子降于孔子九人降於顔子以正開元之失禮禮官言看詳孔子顔子稱號歴代各有據依難輒更改儀物祝獻亦難隆殺檢㑹熙寧祀儀十哲皆為從祀各設籩二豆二俎簠簋爵各一命官分獻一奠而止乞自今二京及諸州文宣王廟十哲像春秋釋奠並凖熙寧祀儀從之二月甲寅罷程顥判武學以御史何正臣言顥學術迂闊趨向僻異故也同知樞密院吕公著言臣向輒論及判别忠邪之道大抵小人之害君子必求要切之語以中之使之不能自解陛下頗賜開納近日除程顥判武學命下數日復因言者而罷去則知臣前所陳者其風猶未殄也况如顥者其立身行道素有本末講學論議久益疏通使得復見用於聖世其奮身報國未必在時輩之後兼所除武學差遣亦未為仕宦之要津而小人斷斷必以為不可者直欲深梗正路廣沮善人其所措意非特一二人而已日中有黒子如李凡十日乃散三月癸巳集英殿賜進士明經諸科開封時彦以下及第出身同出身同學究出身總六百二人五月癸酉奏事垂拱殿御衣有蟲自襟沿至御巾上既拂之至地視之乃行蟲其蟲善入人耳上亟曰此飛蟲也蓋慮治及執侍者而掩之實非飛蟲也戊子蔡確參知政事時宰相吳充議變法確爭曰曹參與蕭何有隙至代何相漢遵何約束且法陛下所建立一人協相而成之一人挾怨而壞之民何措手足乎充屢屈法遂不變秋七月御史舒亶言蘇軾作為歌詩頗有譏切時事之言蓋陛下發錢以本業貧民則曰嬴得兒童語音好一年强半在城中陛下明法以課試羣吏則曰讀書萬卷不讀律致君堯舜終無術陛下興水利則曰東海若知明主意應教斥鹵變桑田陛下謹鹽禁則曰豈是聞韶解忘味爾來三月食無鹽其他觸物即事應口所言無非以詆謗為主小則鏤板大則刻石傳播中外自以為能詔知諫院張璪御史中丞李定推治以聞八月甲辰同修起居注王存言古者左史記事右史記言唐貞觀初仗下議政事起居郎執筆記于前史官隨之欲望追唐貞觀典故復起居郎舍人職事丙午詔修起居注官雖不兼諫職如有史事宜於崇政殿延和殿承旨司奏事後直前陳述從修起居注王存請也九月癸酉以國子監直講滿中行為館閣校勘上批昨監生虞蕃訴學官上下共為姦贓而中行所履潔亷不涉吏議宜少奬之以勵風俗故有是命冬十二月乙巳御史中丞李定等言今酌周官書考賔興之意為太學三舍選察升捕之法上國子監敇式令并學令凡百四十條詔行之太學置齋舍八十齋容三十人外舍生二千内舍生三百上舍生百總二千四百月一私試歲一公試補内舍生間歲一試補上舍生彌封謄録如貢舉法而上舍則學官不與考校公試外舍生入第一第二等參以所書行藝預籍者升内舍内舍生試入優平二等參以行藝升上舍分三等俱優為上一優一平為中俱平若一優一否為下上等命以官中等免禮部試下等免解學正増為五人學録増為十人學録參以學生為之直史館蘇軾謫授黄州團練副使本州安置駙馬都蔚王詵追兩官勒停蘇轍監筠州酒稅務正字王鞏監賔州酒務張方平李清臣司馬光范鎮錢藻陳襄劉攽李常孫覺曽鞏王汾劉摰黄庭堅戚秉道吳琯盛僑王安上周攽杜子方顔復各罰銅初御史臺既以軾具獄上法寺當徒二年㑹赦當原於是中丞李定言古之議令者猶有死而無赦况軾所著文字訕上惑衆豈徒議令之比乞特行廢絶以釋天下之惑御史舒亶又言駙馬都尉王詵收受軾譏諷朝政文字又言除王詵王鞏李清臣外張方平而下凡二十二人如盛僑蓋皆畧能誦說先王之言辱在公卿士大夫之列顧可置而不誅乎疏奏軾等皆特責獄事起詵嘗屬轍密報軾而轍不以告官亦降黜焉軾初下獄方平及鎮皆上書救之不報軾既下獄衆危之莫敢正言者直舍人院王安禮乘間進曰自古大度之君不以語言謫人按軾文士本以才自奮謂爵位可立取顧録録如此其中不能無觖望今一旦致於法恐後世謂不能容才願陛下無庸竟其獄上曰朕固不深譴特欲申言者路耳行為卿貰之其後獄果緩卒薄其罪宋史全文卷十二上欽定四庫全書宋史全文卷十二下宋神宗三庚申元豐三年春正月辛巳詔改國子監直講為太學博士每經二人癸未増國子監歲賜錢萬五千緡以國子監言歲費錢三萬七千緡而所入纔二萬三千緡也二月辛丑命輔臣祈雨詔改諸王宫侍講為講書三月乙丑工部侍郎平章事吳充罷為吏部尚書觀文殿大學士西太一宫使己丑上以慈聖光獻故大推恩於曹氏且欲以佾為正中書令吕公著言非所以寵外戚上曰褒寵外戚誠非國家美事顧以慈聖光獻有功於宗社宜優恤其家爾公著因言自古亡國亂家不過親小人任宦官通女謁寵外戚等數事而已上深以為然時王中正宋用臣等任事故公著假此以諷上既退薛向歎曰公乃敢言如此事使向汗流浹背夏四月乙未吳充卒世譏充心正而力不足知不可而不能勇退云詔校定孫子吳子六韜司馬法三畧尉繚子李靖問對等書鏤板行之戊申御史臺言奉詔復置六察察在京官司今請以吏部及審官東西院三班院等𨽻吏察户部三司及司農寺等𨽻户察刑部大理寺審刑院等𨽻刑察兵部武學等𨽻兵察禮祠部太常寺等𨽻禮察少府將作等𨽻工察從之辛酉増國子監歲賜錢六千緡五月乙丑編修學制所言奉旨立勢要及國子監生太學官親屬許不以鄉貫就開封應舉之法臣等看詳監以國子為名而無國子教養之實恐未稱朝廷建學育士之意乞應清要官親戚並令入監聽讀以二百人為額解發毋過四十人從之六月戊戍詔宗室教授並兼大小兩學廣親睦親北宅二員餘各一員秋七月癸未是夜彗出西北太微垣郎位南在軫丙戌詔以星變自今月戊子避正殿减常膳中外臣寮並許直言朝政闕失八月罷諸路提㸃刑獄司檢法官戊申劉几等言太常大樂鍾磬凡三等王朴樂一也李照樂二也胡瑗阮逸樂三也王朴之樂其聲太髙此太祖皇帝所嘗言仁宗景祐中命李照定樂乃下律法以取黄鍾之聲是時人習舊聽疑其太重李照之樂由是不用至皇祐中胡瑗阮逸再定大樂比王朴樂微下及鑄大鍾或譏其聲弇鬱因亦不用於是郊廟依舊用王朴樂欲請下王朴樂二律以定中和之聲就太常鍾磬擇其可用者其不可修者别製從之戊午彗滅初七月癸未彗出於軫長丈丙戌出於翼戊子長三尺是月庚子出於張三十六日乃没九月乙亥詳定官制所上以階易官寄禄新格中書令侍中同平章事為開府儀同三司左右僕射為特進吏部尚書為金紫光禄大夫五曹尚書為銀青光禄大夫左右丞為光禄大夫六曹侍郎為正議大夫給事中為通議大夫左右諫議為太中大夫秘書監為中大夫光禄卿至少府為中散大夫太常至司農少卿為朝議大夫六曹郎中為朝請朝散朝奉大夫凡三等員外郎為朝請朝散朝奉郎凡三等起居舍人為朝散郎司諫為朝奉郎正言太常國子博士為承議郎太常秘書殿中丞為奉議郎太子中允贊善大夫中舍洗馬為通直郎著作佐郎大理寺丞為宣德郎光禄衛尉寺將作監丞為宣義郎大理評事為承事郎太常寺太祝奉禮郎為承奉郎秘書省校書郎正字將作監主簿為承務郎又言開府儀同三司至通議大夫以上無磨勘法太中大夫至承務郎應磨勘待制以上六年遷兩官至太中大夫止承務郎以上四年遷一官至朝請大夫止候朝議大夫有闕次補其朝議大夫以七十員為額選人磨勘並依尚書吏部法遷京朝官者依今新定官其禄令並以職事官俸賜禄科舊數與令新定官請給對擬定並從之乙酉舒國公王安石為特進改封荆國公罷議樂修樂局其范鎮令降勑奬諭鎮初召對為上言定樂當先正律上曰然雖有師曠之聰不以六律不能正五音鎮作律尺龠合升豆區鬴斛欲圖上之又乞訪求真黍以定黄鍾而几即用李照樂加四清聲而奏樂成及是鎮謝曰此劉几樂也臣何與焉十一月己丑朔翰林天文院言日食雲隂不見又言巳時六刻雲間見日不及所食分數壬子直龍圖閣勾當三班院曾鞏議經費曰宋興承五代之敝六聖相繼與民休息故生齒既庶財用有餘且以景德皇祐治平較之天下歲入皇祐治平皆一億萬以上歲費亦一億萬以上景德官一萬餘員皇祐二萬餘員治平總二萬四千員景德郊費六百萬皇祐一千二百萬治平一千三百萬以二者校之官之衆郊之費皆一倍於景德誠詔有司案尋載籍而講求其故可罷者罷之可損者損之使官之數郊之費皆同於景德者省蓋半矣已而再上議曰案國初三班吏員止於三百或不及之至天禧之間乃總四千二百有餘至于今乃總一萬一千六百九十宗室又八百七十蓋景德員數已十倍於初而以今考之殆三倍於景德歲歲有増未見其止臣畧考其入官之由具於别記以聞議其可罷者罷之可損者損之臣之所知者三班也吏部東西審官與天下他費尚必有近於此者惟陛下試加考察以類求之使天下歲入億萬而所省者什三計三十年之通當有十五年之蓄使國家富盛如此則何為而不成上頗嘉納之十二月甲子詔應遷官除授者並即寄禄官除大兩省待制以上至太中大夫餘官至朝請大夫並通磨勘進士八年餘十年一遷所理年月自降指揮日為始自官制行以舊少卿監為朝議大夫諸卿監為中散大夫秘書監為中大夫故事兩制以上轉官至前行郎中即超轉諫議大夫前行郎中於階官為朝請大夫諫議大夫於階官為太中大夫而兩制磨勘者舊不轉卿監即於今制不當轉此三階又舊制朝議大夫止以七十員為額餘官轉至朝請大夫即須俟有闕方許次補至是因有司申明乃降是詔其大兩省待制以上自通直郎至太中大夫磨勘理三年承務郎以上至朝請大夫理四年自如舊制丁卯中大夫集賢院學士蘇頌知滄州頌入辭因言母老畏寒須春上道上曰卿母誰氏頌曰龍圖閣直學士陳從易女上曰天聖間侍從耶頌曰臣外祖天聖間以直昭文館知廣州罷還不市南物輦俸餘錢過嶺仁宗聞之即日擢知制誥上曰清過於馬援矣頌到滄數月召還判吏部辛酉元豐四年春正月中書禮房請令進士於本經論語孟子大義論策之外加律義一道省試二道武舉止試孫吳大義及策從之三月甲辰翰林學士承議郎張璪為參知政事先是王珪嘗三薦璪不用珪曰璪果賢陛下未嘗用以為不賢讒也臣恐士弗得進矣臣為宰相三薦賢三不用臣失職請罷上喜曰宰相當如是朕姑試卿卿德不回朕復何慮夏五月戊申詔河東河北路轉運司尋訪程嬰公孫杵臼墳廟所在以承議郎吳處厚言二人保全趙孤乞加封爵故也詔嬰封成信侯杵臼封忠智侯六月甲子有上書乞審擇守令者上謂輔臣曰天下守令之衆至千餘人其才性難以徧知惟立法於此使象之於彼從之則為是背之則為非以此進退方有凖的所謂朝廷有政也如漢黄霸妄為條教以干名譽在所當治而反増秩賜金夫家自為政人自為俗先王之所必誅變風變雅詩人所刺朝廷惟一好惡定國是守令雖衆沙汰數年自當得人也戊辰詔聞河北飛蝗極盛漸已南來速令開封府界提舉司京東南西路轉運司遣官督捕己卯洪州言知州觀文殿學士王韶卒韶為人麤獷用兵頗有方畧然熙河所奏多欺誕軍以首級為功韶交親皆楚人多依韶以求仕韶分屬諸將諸將畜降羌老弱或殺與其首以應命既病疽發皆洞見五藏亦其報也壬午詔陜西縁邊諸路累報夏國大集兵須至廣為之備以种諤為鄜延路經畧安撫副使應本司事與經畧安撫使沈括從長處置諤入對大言曰夏國無人秉常孺子臣往提其臂而來耳上壯之乃决意西征命諤副括上初議西討知樞密院孫固曰舉兵易解禍難前後論之甚切上意既决固曰然則孰為陛下任此者上曰吾以屬李憲固曰伐國大事而使宦者為之士大夫誰肯為用上不悦他日又對曰今五路並進而無大帥就使成功兵必為亂上諭以其無人同知樞密院吕公著進曰既無其人不若且已固曰公著言是也秋七月丁亥權發遣羣牧判官郭茂恂言凖詔以陜西博買蕃部馬并粮草欲專以茶博買馬以綵帛博買粮榖及以茶馬併為一司令臣具經久利害臣竊聞昔時亦是用茶折馬價雖兼用金帛等亦從其便近歲始專用銀絹及錢鈔等况賣茶買馬事實相須令提舉買馬官通管茶場實為職務相濟從之詔斬四方館使韓存寳於瀘州先是存寶經制瀘州夷賊無功時方大舉伐夏故誅存寶以令諸將八月庚申史館修撰曽鞏兼同判大常寺詔鞏專典史事更不預修兩朝史上曰修史最為難事如魯史亦止備録國事待孔子然後筆削司馬遷才足以周物猶止記君臣善惡之迹為實録而已王珪曰近修唐書褒貶亦甚無法上曰唐太宗治僭亂以一天下如房魏之徒宋祁歐陽輩尚不能闚其淺深及所以成就功業之實為史官者才不足以過其一代之人不若實録事迹以待賢人去取褒貶爾九月丙申熙河路都大經制司言九月乙酉收復蘭州李憲又言乞建蘭州為帥府以鎮洮為列郡並從之己亥宰臣王珪上國朝㑹要二百卷仁宗時修㑹要自建隆至慶厯四年一百五十卷熙寧初珪請續之凡十二年乃成止熙寧十年通舊増損成三百卷冬十月种諤破米脂寨援軍㨗書至羣臣稱賀辛巳史館修撰曽鞏言臣修定五朝國史要見宋興以來名臣良士或嘗有名位或素在丘園嘉言善行歴官行事軍國勲勞或貢獻封章著撰文字本家碑誌行狀紀述或他人為作傳記之類今所修國史須當收采載述恐舊書訪尋之初有所未盡乞京畿委開封知府及畿縣知縣外委逐路監司州縣長吏博加求訪有子孫者延致詢問所有事迹或文字盡因郡府納於史局以備論次或文字稍多其家無力繕寫即官為庸寫校正其嘗任兩府兩制臺諫之家家至詢訪各限一月發送史局并中書編集累朝文字及樞密院機要文字并累朝御札詔副本送本局以備討論從之十一月癸未朔日有食之辛丑環慶涇原兵去靈州初髙遵裕攻圍靈州十有八日不能下粮道且絶賊決七級渠以灌我師潰死者甚衆先是有詔輒班師者族城久不下遵裕曰活兩路生靈得罪死無所恨遂班師十二月先是知樞密院孫固乞罷西師既而既出無功上諭固曰若用卿言必不至此於是固又言兵法期而後至者斬始議五路入討㑹于靈州李憲獨不赴乃自開蘭㑹欲以弭責要不可赦乞誅之不從壬戌元豐五年春二月兩浙路轉運司言知潤州鞠真卿侮法專威上曰刺史縣令治民為最近漢自刺史有入為三公者蓋重其任耳今之藩郡不過數十往往多不得人則縣令可知也自今更宜謹擇乙亥分命輔臣祈雨三月乙酉提舉江南西路常平等事劉誼言聞道塗洶洶以賣鹽為患望稍變法以便民又上書云陛下所立新法本以為民為民有倍稱之息故與之貸錢為民有破産之患故與之免役為民無聨屬之任故教伍保為民有積貸之不售故設市易皆良法也行之數年天下訟之法弊而民病色色有之其於役法尤甚又言蹇周輔元立鹽法以救淡食之民於今民間積鹽不售以致怨嗟賣既不行月錢欠負追呼刑責將滿江西其勢若此則安居之民轉為盜賊其將奈何上批劉誼職在奉行法度既有所見自合公心陳露輒敢張皇上書特勒停司天監言四月朔日當食於寅詔自己亥易服避正殿减常膳其日百司守職乙巳御集英殿賜進士明經諸科黄裳以下及第出身同出身五百九十三人夏四月壬子朔雲隂日不見食知開封府王安禮言三院獄空揭諸府門遼使過見歎息稱為異事上曰昔由余聘秦觀政内史廖輩從容俎豆以奪其謀者秦有人也安禮留意吏事能駭動外夷於古無愧矣壬戌崇文殿校書楊完編類元豐以來詳定郊廟奉祀禮文成三十卷以進癸酉王珪依前官守尚書左僕射兼門下侍郎蔡確依前官守尚書右僕射兼中書侍郎講義曰建官之制不惟其名而惟其實不惟其官而惟其人君子觀元豐五年官制之成左右僕射之名初正也而以王珪蔡確為之則有忝於左右僕射之名矣觀政和三年官名之正太宰少宰之名初立也而以何執中蔡京為之則有忝於太宰少宰之名矣甲戌詔中書五月朔行官制知定州章惇守門下侍郎參知政事張璪守中書侍郎翰林學士承議郎蒲宗孟為中大夫守尚書左丞翰林學士朝奉郎王安禮為中大夫守尚書右丞翰林學士承議郎李清臣試吏部尚書尋詔清臣特遷朝奉大夫通直郎館閣校勘檢正中書禮房公事王震試右司員外郎於是開天章閣初用官制除拜詔震及雍從輔臣執筆入記聖語面授以左右司仍使自書時論榮之詔自今更不除餘職見帶館職人依舊如除職事官校理以上轉一官校勘减磨勘三年校書减二年並罷所帶職丁丑同知樞密院吕公著為資政殿學士知定州始議五路舉兵伐夏公著諫不聽尋上表求罷上封還其奏及西師無功公著言外議皆謂王中正宜正典刑於是用李憲策將圖再舉公著又固諫上不悦㑹章惇自定州召為門下侍郎公著因乞代惇守邊章繼上乃有是命又李舜舉入奏上意悟欲罷西師公著入辭上慰勞之曰卿不當居外行且召卿矣五月手詔朝廷議更官制本欲覈正吏治非徒膠古希竒而已此命官置司修講逾年逮今頒行尚爽條理其詳定官恐須益得深曉文法之人御史中丞徐禧可同詳定官制如頃所論體統今以此意著為定令蓋上嘗論蘇綽建復官制上自朝廷下至州縣悉分為六曹財賦如一令先自京師候推排有序即監司州縣皆可施行矣王珪言故事中書進熟進草唯執政書押今官制門下省給事中獨許書畫黄而不得書草舒亶疑之因以為請上曰造令行令職分宜别給事中不當書草著為令三省言九寺三監分𨽻六曹欲申明行下上曰不可一寺一監職事或分屬諸曹豈可專有所𨽻宜曰九寺三監於六曹隨事統屬著為令上以命令稽緩語輔臣頗悔改官制蔡確等慮上意遂欲罷之乃力陳新官制置禄比舊月省俸錢二萬餘貫上意遽止詔尚書六曹分𨽻六察上謂輔臣曰雖周之盛時亦以為才難唯能以道汎觀不拘流品隨才任使則取人之路廣茍不稱職便可黜逐不可謂己與之官禄反以係吝而難於用法如臣下有勞朝廷見知雖有過失亦當寛貸故律有議賢議勞之法亦周之八柄詔王之遺意然有司議罪自當守官誅宥則繫主斷如此則用人之道無難矣六月甲寅修兩朝正史成一百二十卷上批昨據李憲奏進置堡障以為駐兵討賊之地近李舜舉奏財粮未備朝廷以舜舉所言忠實可聽信已罷深入攻取之策若賊犯邊自當應敵掩擊先是舜舉退詣執政王珪迎勞之曰朝廷以邊事屬押班及李留後無西顧之憂矣舜舉曰四郊多壘此卿大夫之辱也相公當國而以邊事屬二内臣可乎内臣正宜供禁庭洒掃之職耳豈可當將帥之任耶聞者代珪發慙詔自今事不以大小並中書省取旨門下省覆奏尚書省施行三省同得㫖事更不帶三省字行出是日輔臣有言中書省獨取㫖事體太重上曰三省體均中書省擬而議之門下省審而覆之尚書省承而行之茍有不當自可論奏不當縁此以亂體統也先是官制所莫能究其分省設官之意乃釐中書門下尚書為三各得取㫖出命既紛然無統紀至是上一言遂定上臨御久羣臣俯伏聽命無能有所論說時因奏事有被詰責者王安禮進説曰陛下固聖矣而左右輔弼宜擇自好之士有亷隅者居之則朝廷尊至於論事苟取容悦偷為一切之計而已人主將何便於此上善其言戊午宰臣王珪言天聖中修真宗正史成别録三朝寶訓以備省覽今當修仁宗英宗兩朝寶訓詔祕書省著作局依例修進差林希曽鞏詔尚書省得彈奏六察御史失職壬申廣南西路轉運使馬黙言安化州蠻作過上曰黙意欲用兵耳用兵大事極須謹重向者郭逵安南與昨來西師兵夫死傷皆不下二十萬有司失入一死罪其責不輕今無罪置數十萬人於死地朝廷不得不任其咎天下大事蓋常起於至細章惇曰唐虞君臣相戒亦曰一日二日萬幾上曰知幾至難惟聖賢為能圖於未形所以無智名勇功其次於其幾兆而圖之則易為力其下事至於著見而謀之故用力多而見功寡章惇又曰善師者不陳盖圖之未兆耳上曰事之將兆天常見象但人不能知彗孛示人事甚直猶如語言顧今無深曉天道之人耳古人能知之則能消伏王珪曰天象既如此必至於用兵此亦數也上曰惟先格王正厥事能正厥事雖必至於用兵可以無悔矣秋七月上因論刑曰先王之肉刑盖不可廢至漢文帝罷之若革秦之敝欲休養生民則可矣如格以先王之法則不得為無失三代之時民有疆井分别圻域彰善癉惡人重遷徙故以流為重後世之民遷徙不常而流不足治也故用加役流又未足懲也故有刺配猶未足以待故又有逺近之别盖先王教化明習俗成則肉刑不為過也戊子鄜延路計議邊事徐禧等言銀州故城形勢不便當遷築於永樂堞上自永樂堞至長城嶺置六寨自背罔川至布娘堡置六堡從之八月癸丑詔三省樞密院秘書殿中内侍入内内侍省聴御史長官及言事御史彈糾先是置監察隨所𨽻察省曹寺監而三省至内侍省無所𨽻故以長官言事御史察之九月甲申永樂城成以兵四千人守之丙戌徐禧李舜舉復入永樂城丁亥賊三十萬衆攻城遂圍城戊戌永樂城陷禧及舜舉俱死稷為亂兵所殺曲珍及王湛李浦逃歸士卒得免者十無一二或言禧實不死有自虜還者嘗見之冬十月戊申朔李秬种諤沈括奏永樂城陷漢蕃官二百三十人兵萬二千三百餘人皆没上涕泣悲憤為之不食早朝對輔臣慟哭莫敢仰視既而歎息曰永樂之舉無一人言其不可者右丞蒲宗孟進曰臣嘗言之上正色曰何嘗有言在内惟吕公著在外惟趙卨嘗言用兵不是好事耳自是之後上始知邊臣不可信亦厭兵事無意西伐矣壬申詔户部右曹於京東淮浙江湖福建十二路發常平錢八百萬緡輸元豐庫自熙寧以前諸道𣙜酤場率以酬衙前之陪備官費者至熙寧行役乃罷收酒場聽民増直以雇取其價以給衙前時有坊場錢至元豐初法既久儲積贏羨司農請歲發坊場百萬緡輸中都三年遂於寺南作元豐庫貯之幾百楹凡錢帛之𨽻諸司非度支所主輸之數益廣欲以待非常之用焉十一月戊寅朔上謂輔臣曰御史分察中都官事已多矣又令察舉四方將何以責治辦且於體統非是可罷御史察諸路官司如有不職令言事御史彈奏著為令癸亥元豐六年春正月甲申白虹貫日甲午詔諸路提㸃刑獄司各置檢法官一員丙辰熙河蘭㑹鈐轄王文郁知蘭州代李浩西賊之圍蘭州數十萬衆奄至文郁曰賊衆我寡正當折其鋒以安衆心然後可守此張遼所以全合肥也堅請不已浩許之乃募死士百餘夜縋而下持短刀突之賊衆驚潰爭渡河溺死者甚衆時以文郁方尉遲敬德云二月甲子三省言御史臺六察案官以二年為一任欲置簿各書其糾劾之多寡當否為殿最歲終條具取㫖陞黜事重者隨事取㫖從之夏四月辛亥龍神衛四廂都指揮使种諤卒自熙寧初諤首興邊事後再討西夏皆諤始謀卒致永樂之敗議者謂諤不死邊事不已給事中韓忠彦等以職事對上顧謂曰法出於道人能體道則立法足以盡事立法而不足以盡事不可以立法也蓋立法者未善耳又曰著法者欲簡於立文詳於該事壬申御邇英閣蔡卞講周禮至司市上謂卞曰先王建官治市獨如此其詳何也卞對曰先王建國前朝而後市朝以治君子市以治小人不可畧也上曰市衆之所聚詳於治聚故也五月于闐貢方物上問曰經涉何國曰道由黄頭回紇草頭達怛董氊等國問達怛有無酋領部落曰以乏草粟故經由其地皆散居也癸卯詔賜資州孝子文漸粟帛六月乙巳朔詔御史臺六察案各置御史一員癸丑禮部尚書黄履試御史中丞御史翟思言事有㫖詰所自履諫曰御史以言為職非有所聞則無以言今乃究其所自來則人將懲之而臺諫不復有聞矣恐失開言路之意事遂寢元豐間詔大理兼鞫獄所承内降公事上下皆曰是詔獄也意必傅重少卿韓晉卿獨持平覈實無所觀望人以不寃上知其才凡獄難明及事繫權貴者悉以委晉卿尚書省建擢刑部郎中天下大辟請讞執政或以為煩將劾不應讞者晉卿適白事省中因曰聽斷求實朝廷之心也今讞而獲戾讞不至矣議者或引唐覆奏欲令天下庶獄悉從奏决晉卿曰法在天下而可疑可矜者上請此祖宗制也今四海一家欲械繫待朝命恐罪人之死于獄多于伏辜者朝廷皆從之兼同提舉成都府等路茶場郭茂恂乞併茶場買馬為一司庶幾茶司同任買馬之責閏六月乙亥朔夏國主秉常奉表乞修職貢賜江淮等路發運副使蔣之竒紫章服發運司歲漕榖六百二十萬石之竒領漕事以是月至京師於是入覲上問勞備至面賜之且曰朕不復除官漕事一以委卿之竒辭謝因條畫利病三十餘事多見納用丙申守司徒開府儀同三司致仕韓國公富弼卒先是弼上疏論治道之要曰臣聞自古致天下治與亂者大綱不出用䛕佞讜直之人二端而已䛕佞者進則人主不聞有過惟惡是為所以致亂也讜直者進則人主日有開益惟善是從所以致治也臣自離朝廷退居林下時亦仰知朝政所為大率䛕佞者競進于朝讜直者多處于外雖有在朝者盖恐觸忤奸佞亦皆結舌不敢有所開陳疏奏上謂輔臣曰富弼有疏來章惇曰弼言何事上曰言朕左右多小人惇曰盍令分析孰為小人上曰弼三朝老臣豈可令分析王安禮進曰弼之言是也罷朝惇責安禮曰右丞對上之言失矣安禮曰吾儕今日曰誠如聖諭明日曰聖學非臣所及安得不謂之小人惇無以對弼既上疏又條陳時政之失以待上問及卒後乃得其藁曰今日上自輔臣下及庶士畏禍圖利習成弊風忠詞讜論無復上達致陛下聰明蔽塞天下禍患已成尚不知驚懼改悔創艾補救日甚一日殆將無及陛下即位之初邪臣納說圖任之際聽受失宜謂能拒絶衆人不使異論得行然後聖化可運事功可成此盖奸人自謀利於茍悅而柄任之臣欲專權自肆以成己志遂誤陛下放斥忠直進用邪佞忠詞杜絶諂譽日聞去歲朝廷納邊臣妄議大舉戈甲以討西戎師徒潰敗兩路騷然當舉事之初執政大臣臺諫侍從茍能犯顔極諫則聖心自回禍難自息矣臣不知是時小大之臣有為陛下力爭其不可者乎西師乃一事也不幸又有甚於此者朝廷之事莫大於用人夫輔弼之任論議之職皆當極天下之選彼夫貪寵患失柔從順媚者豈可使之事一出於上則下莫任其責小人因得行其奸矣故事成則下得竊其利事不成則君獨當其咎豈上下同心君臣一德之謂乎此乃朝廷之大體也又曰今上下情意否塞不通為臣者莫得盡其心百姓愁怨失所無由上達而政令之施行書詔所曉諭不聞歡欣信服之意臣恐非朝廷所以示天下也又曰宫闈之臣委之統制方面皆非所宜在外則挾權怙寵陵轢上下入侍左右寵禄既過則驕怨易啓勢位相及則猜奪隨至立黨生禍又曰興利之臣虧損國體為上斂怨至若為場以停民貨造舍而蔽舊屋𣙜河舟之載擅路糞之利急於歛取道路嗟怨此非上所以與民之意又曰聖意以今日之事為無足慮邪亦以為當深思而救之邪所信用者皆君子邪有小人邪此豈逃聖鑑之明但無以順從為悦則忠邪判矣弼早有公輔之望天下皆稱曰富公名聞夷狄遼使每至必問其出處安否臨事周悉度不萬全不發當其敢言奮不顧身忠義之性老而彌篤家居一紀斯須未嘗忘朝廷贈太尉諡文忠秋七月丙辰以安燾同知樞密院西邊用兵歲乆上益厭之乃不次用燾時夏人欵塞燾謂宜遂撫納且戒邊臣毋為兵端既又請還疆土燾言當使知吾宥過而罷兵不應示吾厭兵之意八月己卯太白晝見前桐城縣尉周諤上書詔中書省記姓名上日閱匭函小臣所言利害無不詳覽如此辛卯詔中大夫尚書左丞蒲宗孟守本官知汝州先是宰執同對上有無人材之歎宗孟對曰人材半為司馬光以邪説壞之上不語正視宗孟久之宗孟懼甚無以為容上復曰蒲宗孟乃不取司馬光耶司馬光者未論别事只辭樞密副使朕自即位以來唯見此一人他人則雖迫之使去亦不肯矣又因泛論古今人物宗孟盛稱揚雄之賢上作色言揚雄劇秦美新不佳也罷朝安禮戯宗孟曰揚雄為公坐累九月癸卯朔日有食之中書舍人趙彦若等言六房公事乞據舍人員數分領以吏户禮兵刑工為次其年事班簿制勅庫房並通領從之戊辰起居郎蔡京言舊修起居注官二員不分左右故月輪一員修纂今起居郎舍人分𨽻兩省所以備左右史官則左當書動右當書言乞自今起居郎舍人隨左右分記言動從之冬十月癸酉朔夏國主秉常遣使奉表復修職貢仍乞還所侵地長為外藩乃賜秉常詔其地界已令鄜延路移牒宥州施行歲賜候疆界了日依舊詔封孟軻為鄒國公以吏部尚書曾孝寛言孟軻未加爵命故特封之十一月丙午冬至祭昊天上帝于圜丘以太祖配始罷合祭天地還御宣德門大赦天下甲寅判河南府潞國公文彦博守太師開府儀同三司致仕甲子元豐七年春正月辛酉責授黄州團練副使蘇軾移汝州軾言汝州無田産乞居常州從之元豐中軾繫御史獄上本無意深罪之宰臣王珪言蘇軾有不臣意因舉軾檜詩根到九泉無曲處世間唯有蟄龍知之句對曰陛下飛龍在天而求之地下之蟄龍非不臣而何上曰彼自詠檜何預朕事珪語塞遂薄其罪然上每憐之一日語執政曰國史大事朕意欲俾蘇軾成之執政有難色上曰非軾則用曽鞏其後鞏亦不副上意上復有旨起軾以本官知江州中書蔡確張璪受命明日改江州太平觀又明日命格不下於是徙軾汝州有蘇軾黜居思咎閱歲滋深人材實難不忍終棄之語前此京師盛傳軾已白日仙去上對左丞蒲宗孟嗟惜故軾表有疾病連年人皆相傳為已死飢寒併日臣亦自厭其餘生之句也二月庚午朔河北轉運使措置河北糴儲吳雍言見管人粮馬料總千一百七十六萬石竒贏相補可支六年河北十七州邊防大計倉廩充實雖因藉豐年實以吏能幹職同措置王子淵在職九年悉心公家望考察成效以勸才吏詔賜子淵紫章服三月丁巳大燕集英殿中皇子延安郡王初侍立于前宰臣王珪率百僚廷賀王年未當出閣上特令侍宴以見羣臣壬戌詔太學外舍生周邦彦為試太學正邦彦獻汴都賦文采可取故擢之邦彦錢塘人五月庚申詔中書舍人蔡卞往江寧府省視王安石疾病辛酉白虹貫日壬戌詔自今春秋釋奠以鄒國公孟軻配食文宣王設位于兖國公之次荀况揚雄韓愈以世次從祀於二十一賢之間並封伯爵六月禮部言歐陽修等編太常因革禮始自建隆訖於嘉祐為百巻嘉祐之後闕而不録熙寧以來禮文制作足以垂法萬世乞下太常委博士接續編纂以備討閱從之戊子集禧觀使王安石請以所居江寧府上元縣園屋創禪寺乞賜名額從之以報寧禪院為額或云安石子雱處性險惡安石在政府凡所為不近人情者雱實使之既死安石嘗恍惚見雱荷鐡枷如重囚狀遂請以園屋為僧寺盖以雱求救於佛也秋七月癸丑分命輔臣祈晴八月癸巳衢州言太子少保致仕趙抃卒贈太子少師諡清獻冬十月乙亥給事中韓忠彦為禮部尚書忠彦入謝上諭曰先令公之勲朕所不敢忘卿復盡忠朝廷此未足以酬卿也辛卯樞密院奏乞以自來御前批降指揮備載於冊以為樞密府龜鑑從之十一月夏國主秉常遣謨箇咩迷乙遇齎表入貢十二月戊辰端明殿學士兼翰林侍讀學士司馬光為資政殿學士降詔奬諭賜銀絹衣帶范祖禹為秘書省正字並以修資治通鑑書成也上諭輔臣曰前代未嘗有此書過荀恱漢紀逺矣初元豐五年將行官制謂輔臣曰官制將行欲取新舊人兩用之又曰御史大夫非司馬光不可蔡確進曰國是方定願少遲之王珪亦助確乃已及除光第四任提舉崇福宫詔滿三十箇月即不候替人發來赴闕盖將復用光也是歲秋宴上感疾始有建儲意又謂輔臣曰來春建儲其以司馬光及吕公著為師保蔡確知光必復用欲自託於光乃謂職方員外郎邢恕曰上以君實為資政殿學士異禮也君實好辭官確晩進不敢進書和叔門下士宜以書言不可辭之故恕但與光之子康書致確語康以白光光笑而不答亦再辭而後受之乙丑元豐八年春正月戊戌上不豫二月癸巳上疾甚王珪言去冬嘗奉聖㫖皇子延安郡王來春出閣願早建東宫凡三奏上三顧微肯首而已又乞皇太后權同聽政至于再三皇太后泣許先是蔡確疑上復用吕公著及司馬光則必奪己相乃與邢恕謀為固位計恕故與皇太后姪公繪公紀游恕密執二人手曰右相令布腹心上疾未損延安郡王冲㓜宜早定議雍曹皆賢主也公繪等懼曰君欲禍我家徑去已而恕反謂雍王顥有覬覦心與内殿承制致仕王棫共造誣謗是日入問疾退乃於樞密院南㕔共議之王珪曰上自有子復何議翌日遂立皇太子確惇京恕邪謀遂不得逞其蹤迹詭秘亦莫辨詰各自謂有定策功事久語聞卒為朝廷大禍其實本恕發之三月甲午朔皇太后垂簾皇子立簾外珪等遂宣制立為皇太子改名煦又詔應軍國事並皇太后權同處分候康復日依舊戊戌上崩于福寧殿宰臣王珪讀遺制哲宗皇帝立史臣曰上聰明英睿天性孝友事兩宫竭誠盡力親愛二弟無纎毫之間終上之世乃出居外第聖學髙逺言必據經深造道德之藴而詳於度數禁中觀書或至夜分在東宫素聞王安石有重名熙寧初擢輔政虛己以聽之安石更定法令中外爭言不便上亦疑之而安石堅持之不肯變其後天下終以為不便上亦不專信任安石不自得求引去遂八年不復召然恩顧不衰司馬光吕公著雖論議終不合而極口稱其賢勵精求治如恐不及總攬萬機小大必親御殿决事或日昃不暇食侍臣有以為言者上曰朕享天下之奉非喜勞惡逸誠欲以此勤報之也將定官制獨處閤中考求沿革一年而成人皆不知每當用兵或終夜不寢邊奏絡繹手札處畫號令諸將丁寧詳密授以成算故千里外上自節制機神鑒察無所遁情如李憲張誠一輩雖甚親用然未嘗一日弛其御策無不畏上之威明而莫敢肆欲先取靈夏滅西羌乃圖北伐積粟塞上數千萬石多儲兵器以待及永樂陷没知用兵之難於是亦息意征伐矣謙冲退謹去華務實終身不受尊號此誠帝王之盛德也初司馬光不敢赴闕㑹神宗崩聞孫固韓維皆集闕下時程顥在洛亦勸光行乃從之衛士見光皆以手加額曰此司馬相公也民爭擁光馬呼曰公毋歸洛留相天子活百姓所在數千人聚觀之光懼遂徑歸洛講義曰所貴乎大臣者非以其有過天下之材智也必其有服天下之德望也王安石所以變舊法之易者以其虚名實行足以取信於人司馬光所以改新法之易者以其居洛十五年天下皆期之為宰相也然安石其權臣温公其重臣歟太皇太后聞之詰問主者遣内侍梁惟簡勞光問所當先者光乃上疏曰近年以來閭閻愁苦痛心疾首而上不得知明主憂勤宵衣旰食而下無所訴莫若明下詔書廣開言路不以有官無官之人應有知朝政闕失及民間疾苦者並許進實封狀盡情極言陛下以聽政之暇畧賜省覽其義理精當者即施行其言夏四月詔開封府界京東路養馬指揮並罷又詔京東京西路保甲養馬法元定年限極寛民間易以應辦而有司不務循守期限迫急遂致搔擾先帝已嘗降手詔詰責約束至今猶不能奉行其兩路保馬宜令並依元降年限收買其剩買過數目並充以次年分之數其後詔京東京西路保馬等級分配諸軍餘數發赴太僕寺其格不應支配即還民户變易納所給價錢又詔在京并京西及泗州所買物貨等場並罷中書省言内外人户見欠市易錢物當議减放詔大姓户放七分小姓户全放資政殿大學士吕公著兼侍讀公著時知揚州召用遵先帝意也資政殿學士司馬光知陳州辛巳職方員外郎邢恕為右司員外郎恕雅善司馬光及吕公著蔡確度光及公著必復用遂深交恕意欲因恕以結二人也然恕傾險乃更與確隂謀謂確有定策功於是驟遷都司司馬光上疏曰昔仁宗皇帝擢臣知諫院臣初上殿即言人君之德三曰仁曰明曰武致治之道三曰任官曰信賞曰必罰英宗皇帝時臣曾進歴年圖其後序言人君之道一其德有三其志亦猶所以事仁宗也大行皇帝新即位擢臣為御史中丞臣初上殿言人君修心治國之要其志亦猶所以事英宗也今皇帝陛下新承大統猥䝉訪落謹復以人君修心治國之要為獻其志亦猶所以事大行皇帝也臣近曽上奏乞下詔書開言路伏望聖慈早賜施行樞密院言府界三路保甲兩丁之家止有病丁并田不及二十畝者聽自陳提舉司審驗與放免詔可司馬光上疏曰先帝勵精求治以致太平不幸所委之人不足以仰副聖志自謂古今之人皆莫己如多以己意輕改舊章謂之新法其人意所欲為人主不能奪天下莫能移縉紳士大夫望風承流競獻策畫作青苗免役市易賒貸等法又有邊鄙之臣行險僥倖輕動干戈深入敵境使兵夫數十萬暴骸於曠野又有生事之臣建議置保甲户馬以資武備變茶鹽鐵冶等法増家業侵街商稅錢以供軍須非先帝之本志也先帝升遐奔䘮至京乃蒙太皇太后陛下特降中使訪以得失既而聞有㫖罷脩城役夫撤詗邏之卒止御前造作斥退近習之無狀者戒飭有司奉法失當過為煩擾者罷物貨等場及民所養户馬又寛保馬年限四方之人無不鼓舞聖德新法之弊天下之人無貴賤愚智知之是以陛下微有所改而逺近皆相賀也然尚有病民傷國有害無益者如保甲免役錢將官三事皆當今之急務釐革所宜先者五月詔曰蓋聞為治之要納諫為先凡内外之臣有能以正論啓沃者豈特受之而已固且不愛髙爵重禄以奬其忠若乃隂有所懷犯非其分或扇摇機事之重或迎合已行之令上則觀望朝廷之意以徼倖希進下則衒惑流俗之情以干取虛譽然則黜罰之行是亦不得已也詔新知陳州司馬光過闕入見先是光上疏言諫爭之臣人主之耳目也太府少卿宋彭年言在京不可不並置三衙管軍臣僚水部員外郎王諤乞今依保馬元立條限均定逐年合買之數又乞令太學増置春秋博士朝廷以非其本職而言各罰銅三十斤陛下臨政之初而二臣首以言事獲罪臣恐中外聞之忠臣解體直士短氣太平之功尚未可期也於是令光過闕入見戊戌詔汝州安置蘇軾復朝奉郎知登州己亥詔吕公著乘傳赴闕程顥為宗正寺丞丙午酉時地震即止詔府界三路弓兵並依保甲未行以前復置庚戌守尚書左僕射王珪卒珪自輔政至宰相凡十六年守成而已時號三旨宰相以其上殿進呈云取聖㫖上可否訖又云領聖㫖既退諭稟者云已得聖㫖故也丙辰正奏名進士劉逵等五百七十五人特奏名八百四十七人並釋褐武舉進士三十九人並賜袍笏銀帶戊午尚書右僕射兼中書侍郎蔡確守左僕射兼門下侍郎知樞密院事韓縝守右僕射兼中書侍郎門下侍郎章惇知樞密院資政殿學士司馬光為門下侍郎初光以知陳州過闕未入對上疏乞下詔廣開言路及到京䝉降中使以五月五日詔書賜臣看閱詔書始末之言固盡善矣中間逆以六事防之臣以為人臣惟不言茍上言則皆可以六事罪之矣或於羣臣有所褒貶則可以謂之隂有所懷本職之外微有所涉則可以謂之犯非其分陳國家安危大計則可以謂之扇摇機事之重或與朝㫖暗合則可以謂之迎合已行之令言新法之不便當改則可以謂之觀望朝廷之意言民間愁苦可閔則可以謂之衒惑流俗之情然則天下之事無復可以言者矣是詔書始於求諫而終於拒諫也乞刪去中間一節使天下之人各盡所懷不憂黜罰如此則中外之事逺近之情如指掌矣未幾果别下詔令實書其事自上新即位至無復忌憚三十一字並去之光既除門下侍郎又以劄子辭免并請更改新法於是太皇太后遣中使賜手詔諭令供職光乃受命六月丙寅罷府界三路保甲不許投軍及充弓箭手指揮詔賜楚州孝子徐積絹三十疋米三十石丙子資政殿學士韓維知陳州維初赴臨闕庭太皇太后降手詔勞問維奏治天下之道不必過求髙逺止在審人情而已識人情不難以己之心推人之情可見矣大凡人情貧則思富苦則思樂勞困則思息鬱塞則思通陛下誠能常以利民為本則人富矣常以愛人為本則人樂矣役事之有妨農務者去之則勞困息矣法禁之無益治道者蠲之則鬱塞通矣又奏臣嘗具奏陳陛下深察盗賊所起之原罷非業之令寛訓練之程蓋為保甲保馬發也臣非謂國馬遂可不養但官置監牧可矣非謂民兵遂可不教但於農隙一時訓練可矣丁丑承議郎新除宗正寺丞程顥卒顥嘗論熙寧初張戩爭新法不可行遂以語觸王安石因曰新法之行乃吾黨激成之當時自愧不能以誠感上心遂成今日之禍吾黨當與安石分其罪也顥深有意經濟方召用遽死士大夫識與不識莫不哀傷文彦博采衆議題其墓曰明道先生云吕中曰道之不明天實憫之篤生賢哲姿稟特異元氣之會渾然天成天意固有所屬矣居洛十年充養備至人見其詞氣肅然不敢即也而和氣充浹見面盎背遽色厲辭無有也人見其接物粹然若可易也而望之崇深截乎規矩凖繩不敢慢也局度清越世故若將凂焉而克勤小物雖鄙賤猥瑣弗憚也立言洒落近而易知扣之則無窮出之則愈新也人隨其所見者不一而不知先生道積于中固純乎而弗雜也嘗究極先生所以用力之地謂心不可以一事留學不可以一善止有適有莫戒非其天地之全客氣未消防其為義理之勝去新學之支離非釋氏之不相聯屬忌學者先立標凖斥記誦者之玩物喪志遊其門者如羣飲于洛各充其量故得先生之教者如顯道之誠篤公掞之端厚得先生之和者如淳夫之安恬中立之簡易隨其所得固已自足名世矣元祐羣賢悉起散地先生獨有憂色使之叶濟於朝以施調一之功安有紹聖報復之禍哉奉議郎知定州安喜縣事王巖叟為監察御史癸未吕公著入見太皇太后遣中使賜食公著上奏十事一曰畏天二曰愛民三曰脩身四曰講學五曰任賢六曰納諫七曰薄歛八曰省刑九曰去奢十曰無逸皆隨事解釋粗成條貫不為繁辭以便觀覽是日同上奏曰先帝新定官制設諫議大夫司諫正言之官其員數甚備伏乞申敇輔弼選忠厚骨鯁之臣正直敢言之士徧置左右使掌諫諍又御史之官號為天子耳目而比年以來專舉六察故事廢國家治亂之大計察官司簿領之過也伏乞盡罷察案只置言事御史四人或六人仍詔諫官御史並須直言無諱規主上之過失舉時政之紕繆指羣臣之姦黨陳下民之疾苦丁亥詔曰古之王者即政之始必明目達聰以防壅蔽敷讜言以輔不逮然後物情得以上聞利澤得以下究應中外臣寮及民庶並許實封直言朝政闕失民間疾苦朕將親覽以考求其中而施行之司馬光凡三奏乞改前詔於是始用其言也吕公著既上十事太皇太后遣中使諭公著曰覽卿所奏深有開益當此拯民疾苦更張何者為先庚寅公著復上奏曰自王安石秉政變易舊法羣臣有論其非便者指以為沮壞法度必加廢斥是以青苗免役之法行而取民之財盡保甲保馬之法行而用民之力竭市易茶鹽之法行而奪民之利悉若此之類甚衆更張之際當須有術不在倉卒且如青苗之法但罷逐年比較則官司既不邀功百姓自免抑勒之患免役之法當少取寛剩之數度其差雇所宜無令下户虛有輸納保甲之法止令就冬月農隙教習仍只委本路監司提按既不至妨農害民則衆庶稍得安業至於保馬之法先朝已知有司奉行之繆市易之法先帝尤覺其有害而無利及福建江南等路配賣茶鹽過多彼方之民殆不聊生恐當一切罷去而南方鹽法三路保甲尤宜先革者也陛下必欲更修度政使不驚物聽而實利及民莫若任人為急是日又同上奏孫覺方正有學識可以充諫議大夫范純仁剛勁有風力可以充諫議大夫或户部右曹侍郎李常清直有守可備御史中丞劉摯資性端厚可充侍御史蘇轍王巖叟並有才氣可充諫官或言事御史太皇太后封公著劄子付司馬光詳所陳更張利害有無兼濟之才直書以聞光奏公著所陳與臣言者正相符合惟有保甲一事朝廷既知其為害於民無益於國便當一切廢罷更安用教習光又言陛下推心於臣俾擇多士竊見劉摯公忠剛正趙彦若博學有父風傅堯俞清立安恬范純仁臨事明敏唐淑問行已有恥范祖禹温良端厚此六人者若使之或處臺諫或侍講讀必有禆益知慶州范純仁言郡邑之弊守令知之一路之弊職司知之茶鹽利局民兵刑法差役之弊提其局及受其寄者知之軍政之弊三帥與將領者知之邊防之弊守邊者知之伏望陛下特下明詔各使條陳本職限一月内聞奏亦可因其所陳畧知其人之才識然後審擇而行之秋七月甲午詔諸鎮寨市易抵當並罷丁酉請大行皇帝尊諡于天天錫之曰英文烈武聖孝皇帝廟曰神宗詔恭依戊戌吕公著為尚書左丞公著言國朝之制每便殿奏事止是中書樞密院兩班昨來先帝修定官制中書省門下省尚書省各為一班雖有三省同上進呈者蓋亦鮮矣執政之臣皆是朝廷遴選正當一心同力集衆人之智以輔惟新之政遂詔應三省合取㫖事及臺諫章奏並進呈施行詔府界三路保甲自來年正月以後並罷團教仍依義勇舊法每歲農隙赴縣教閲一月門下侍郎司馬光乞盡罷諸處保甲保正長使歸農依舊置耆長壯丁巡捕盜賊户長催督稅賦其所養保馬揀擇勾收太僕寺量給價錢分配兩騏驥院蔡確等執奏不行詔保甲依樞密院今月六日指揮保馬别議立法司馬光言臣伏見臣僚民庶上言朝政闕失民間疾苦奏狀必多乞降付三省委執政官分取看詳擇其可取者用黄紙簽出再進入或留置左右或降付有司施行從之八月丙子月有食之既癸未諫議大夫孫覺言乞依天禧元年手詔言事左右諫議大夫左右補闕拾遺凡發令舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之詔依此申明行下詔府界新置馬牧監并提舉經度制置牧馬司並罷司馬光言近降農民訴疾苦實封狀王嗇等一百五十道除所訴重複外俱已簽帖進入竊惟四民之中惟農最苦蠶婦治繭績麻紡緯其勤極矣農蠶者天下衣食之源人之所仰以生也是以聖王重之竊聞太宗嘗遊金明池召田婦數十人於殿上賜席使坐問以民間疾苦賜帛遺之太宗興於側微民間事固無不知所以然者恐富貴而忘之故也真宗乳母秦國夫人劉氏本農家也喜言農家之事真宗自㓜聞之及踐大位咸平景德之治為有宋隆平之極景德農田敇至今稱為精當自非大開言路使畎畝之民皆得上封事則此曹疾苦何由有萬分之一得達於天聽哉九月己酉劉摯為侍御史摯言伏見諫官止有大夫一員御史臺自中丞侍御史兩殿中法得言事外監察御史六員專以察治官司公事欲望聖慈於諫院增置諫官員數本臺六察御史並許言事其所領察案自不廢如故所貴共盡忠力交輔聖政朝奉郎蘇軾為禮部郎中戊午監察御史王巖叟上疏曰今民之大害不過三五事而已如青苗實困民之本須盡罷之而近日指揮但令斂散不立額而已役錢須如舊來復行差法而近日指揮但令减寛剩而已保甲之害蓋由提舉一司上下官吏逼之使然而近日指揮雖止令冬教然尚存官司此皆姦邪遂非飾過將至深之弊畧示更張以應副陛下聖意而已貼黄稱如執論者以青苗免役遽罷之恐國用不足則乞陛下問以治平嘉祐之前國用何以不闕願令講究而行之冬十月己巳太皇太后諭輔臣曰民間保馬宜早罷見行法有不便於民者改之癸酉詔倣六典置諫官其具所置員以聞從劉摰之言也丁丑詔尚書侍郎給舍諫議中丞待制以上各舉堪充諫官二員以聞初中㫖除范純仁為左諫議大夫唐淑問為左司諫朱光廷為左正言蘇轍為右司諫范祖禹為右正言令三省樞密院同進呈太皇太后問此五人何如章惇曰故事諫官皆令兩制以上奏舉然後執政進擬今除目從中出臣不知陛下從何知之得非左右所薦此門不可輕啓太皇太后曰皆大臣薦非左右也惇曰大臣當明揚何以密薦由是吕公著以范祖禹韓縝司馬光以范純仁親嫌為言惇曰臺諫所以糾繩執政之不法故事執政初除親戚及所舉之人見為臺諫官者皆徙他官今當循故事不可違祖宗法光曰純仁祖禹作諫官誠協衆望不可以臣故妨賢者進臣寧避位惇曰縝光公著必不至有私萬一他日有姦臣執政援此為例純仁祖禹請除他官仍令兩制以上各得奏舉故有是詔淑問光廷轍除命皆如故純仁改為天章閣待制祖禹為著作佐郎詔監察御史兼言事殿中侍御史兼察事始用吕公著及劉摯之言也詔罷義倉其已納數遇歉歲以充賑濟侍御史劉摯言州縣之政廢舉得失其責宜在監司宜稍復祖宗故事於三路各置都轉運使用兩制臣寮充職以重其任自餘諸路亦望推擇資任稍髙練達民情識治體近中道之人使忠厚安民而不失之寛弛肅給應務而不失之淺薄癸未趙彦若兼侍讀傅堯俞兼侍講先是侍御史劉摯言皇帝陛下春秋鼎盛在所資養左右前後宜正人與居語黙見聞宜正事是接伏見兼侍講陸佃蔡卞皆新進少年欲望於内外兩制以上官内别選通經術有行義忠信孝悌淳茂老成之人以充其任於是佃卞皆罷而彦若堯俞有是命乙酉葬神宗英文烈武聖孝皇帝于永裕陵詔罷方田詔提舉府界三路保甲官並罷令逐路提刑及府界提㸃司兼領王巖叟言風聞章惇於簾前問陛下御批除諫官事曲折再三語涉輕侮外庭傳聞衆所共憤惇又謂陛下何從而知是不欲威權在人主端良入朝廷侵官犯分慢上瀆尊國有常憲乞行顯黜劉摯言神宗皇帝靈駕進發准敇前一日五使三省執政官宿于兩省竊聞宰臣蔡確獨不曽入宿慢廢典禮有不恭之心左正言朱光庭言蔡確先帝簡拔位至宰相靈駕發引輒先馳去數十里之逺以自便安為臣不恭莫大於此又言章惇欺罔肆辯韓縝挾邪冒寵章數上其言甚切十一月癸巳鮮于侁為京東轉運使於是司馬光語人曰今復以子駿為轉運使誠非所宜然朝廷欲救東土之弊非子駿不可此一路福星也可以為諸路轉運使模範矣安得百子駿布在天下乎侁既至奏罷萊蕪利國兩監鐵冶又乞海鹽依河北通商民大恱丁巳鄉貢進士程頤為汝州團練推官充西京國子監教授以司馬光吕公著及西京留守韓絳薦其學行故有是命劉摯言章惇性資佻薄素無行檢伏請罷惇政事王巖叟言昨來初議垂簾儀制之日章惇嘗對衆肆言曰待與些禮數臣子聞之莫不一意共怒伏以太皇太后先皇帝之母陛下之祖母垂簾聽政又先帝之遺制國朝以來自有故事豈以私意輒可重輕乞付有司治正惇罪十二月詔今月十五日開講筵講論讀寶訓講讀官日赴資善堂以雙日講讀仍輪一員宿直初講及更旬宰相執政並赴罷太學保任同罪法又罷栽桑法蠲民所欠罰錢丙寅劉摯言宰臣蔡確山陵使回必須引咎自劾而確不顧亷隅恐失爵位無故自留伏望早發睿斷罷確政事以明國憲先是王巖叟言臣伏覩陛下變保甲月教之法為冬教人人始得安業又言乞依義勇舊法免冬教於是詔府界三路保甲第五等兩丁之家免冬教甲戌天章閣待制兼侍講范純仁中書舍人王震並為給事中監察御史王巖叟言給事中處門下當封駁非他職比凡政令之乖宜除授之失當諫官所未論御史所未言皆先得以疏駁而封還之其於扼天下之要以厲至公而嚴朝廷莫先此者按震出使無亷介之譽立朝無端亮之稱封駁之任非震所當處尋命震出守劉摯言蔡確無大臣進退之節與章惇固結朋黨自陛下進用司焉光吕公著以來意不以為便今中外以謂確與惇不罷則善良無由自立天下終不得被仁厚之澤丙子左正言朱光廷奏竊見蔡確先帝簡拔位至宰相送終殊不盡恭章惇素來輕易多言不以朝廷生民為慮韓縝内行不修宜令解機任而善去司馬光宜更進之宰輔以盡猷為范純仁公忠正直願進之宰輔俾與司馬光協濟庶務韓維天下之賢才宜置之宥密退三姦於外以清百辟進三賢於内以贊萬幾太平之風自兹始矣戊寅侍御史劉摯言蔡確自京官不十年至輔弼特以累治大獄鍛鍊誣陷縁此以進身是以任風憲則專以䕶持苗役法令為公論居廟堂則專以聚利生靈膏血為相業排斥忠良引置黨類與章惇張璪為黨疑言路或有文字訪聞逐之各令親信於内臣中出入探伺訪求虛實起居舍人邢恕權發遣隨州恕嘗教髙公繪上書乞尊禮太妃為髙氏異日之福太皇太后呼公繪問曰汝不識字誰為汝作此書公繪以恕藁進既罷恕新命又絀之宋史全文卷十二下
