body:
  text: 宋史全文卷四宋太宗二庚寅淳化元年春正月戊寅朔御乾元殿受冊尊號曲赦京城繫囚改元趙普以病免朝謁疾篤三上表致政上不得已以普為西京留守兼中書令二月國家因唐制建昭文史館集賢院於禁中昭文集賢置大學士直學士史館置監修國史修撰直館昭文亦置直館集賢又有修撰校理之職名數雖異而職務略同賜諸路印本九經令長史與衆官共閲之登州二縣饑詔賑之三月詔尚書省四品兩省五品以上每二人共舉常參官一人充轉運使貟外郎以上二人於京朝官內舉一人充知州通判自趙普罷吕䝉正以寬簡居相位辛仲甫從容其間政事多決於王沔沔聰察敏辨善敷奏有適時材用然性苛刻不以至誠待人羣官謁見必甘言以啖之皆喜過望既而進退非允人胥怨矣夏四月夏州敗李繼遷五月令刑部置詳覆官六貟専閲天下所上案牘勿復遣鞫獄置御史臺推勘官二十人並以京朝官充若諸州有大獄則乘傳就鞫辭日上親諭曰無滋蔓無留滯咸賜以裝錢還必召見問以所推事狀著為彛制凡滿三嵗考其殿最而黜陟之國初錢文曰宋元通寶又改鑄淳化元寶錢上親書其文作真草行三體自後每改元必更鑄以年號元寶為文六月丙午罷中元下元張燈八月令左藏庫籍所掌金銀器皿之屬悉毁之有司言中有制作精巧者欲留以備進御上曰將焉用此汝以竒巧為貴我以慈儉為寶卒皆毁之冬十月以錢若水為祕書丞直史館若水初佐同州有冨民家小女奴逃亡不知所之女奴父母訟於州命録事參軍鞫之録事嘗貸錢於冨民不獲乃劾冨民父子數人共殺女奴棄尸於水中遂失尸罪皆應死冨民不勝栲椋自誣服若水獨疑之留其獄一旦詣知州屏人言曰若水所以留其獄者密使人訪求女奴今得之矣知州驚曰安在若水因密送女奴于知州乃垂簾引女奴父母問曰汝今見女識之乎對曰安有不識也即從簾中推出示之父母泣曰是也乃引冨民父子悉破械縱之其人號泣不肯去曰微使君賜則某滅族矣知州欲為之論奏其功若水固辭曰若水求獄事正人不寃死其論功非本心也且朝廷若以此為若水功當置録事何地耶知州歎服上亦聞其名㑹冦準薦若水文學髙第召試學士院而命以同州觀察推官十二月時羣臣升殿奏事者既可其奏皆得專達於有司頗容巧妄左正言直史館謝泌請自今凡政事送中書機事送樞密院財貨送三司覆奏而後行詔從泌請遂著為定制中外所上書疏亦如之辛卯淳化二年春正月置內殿宗班等職二月上修正殿頗施彩繪左正言直史館謝泌上疏諌曰悉去彩繪塗以赭堊賜泌金紫而遷之泌謝曰陛下從諫如流故臣得竭誠如昔唐末有孟昭圖者朝上疏諫暮不知所在如此安得不亂上動容久之閏二月辛未朔日有食之三月上以嵗旱蝗手詔吕蒙正等曰元元何罪天譴如是蓋朕不德之所致也卿等於文德殿前築一臺朕將暴露其上三日不雨卿等共焚朕以答天譴翌日而雨蝗盡死五月置諸路轉運使秋七月上謂三司使李惟清等曰夫貨財所以濟用度或取之不以其道違朕惠養庶民之意豈能召和氣乎當共務均節無致厚斂於下八月置審刑院於禁中以樞密直學士李昌齡知院事兼置詳議官六貟凡獄具上奏者先由審刑院印訖以付大理寺刑部斷覆以聞乃下審刑院詳議申覆裁決訖以付中書當者即下之其未允者宰相復以聞始命論決九月上嘗謂近臣曰屢有人言儲二事朕頗讀書見前代治亂豈不在心目蓋諸子沖幼未能成人之性所命僚屬悉擇良善之士至於臺𨽻輩朕亦自揀選不令姦險巧佞在其左右讀書聽書咸有課程待其成長自有裁制何言事者未諒此心耶於是度支判官宋沆等五人伏閣上疏請立許王元僖為皇太子詞意狂率上怒甚將加竄殛而沆又吕蒙正之妻族蒙正罷為吏部尚書以李昉張齊賢同平章事庚子以王化基為御史中丞獻澄清略言五事其一復尚書省曰國家立制動必法天尚書省上應天象對臨紫垣六卿擬喉舌之官郎吏應星辰之位夫三司使額乃近代權制請廢三司止於尚書省設六尚書分掌其事其二曰謹公舉其三曰懲貪吏其四曰省冗官以為州郡設監臨事務朝官及使臣等數倍於舊乞行裁減其五曰擇逺官上嘉納其言以樞密副使張遜知樞密院事溫仲舒冦凖同知院事知院之名自此始十月翰林學士承旨蘇易簡續翰林志二卷以獻上嘉之賜詩二章紙尾批云詩意美卿居清華之地也易簡願以所賜詩刻石昭示無窮上復為真草行三體書書其詩命刻之因遍賜近臣又飛白書玉堂之署四大字令中書召易簡付之榜於㕔額上曰此永為翰林中美事易簡曰自有翰林未有如今日之榮也左諌議大夫韓丕起寒素以沖淡自處不奔競於名官上嘉重之命丕守本官知制誥為翰林學士十一月詔自今內殿起居日復令常參官兩人次對閣門受其章知制誥范杲數致書宰相求入翰林為學士獻玉堂記請備其職上惡其躁競終不使居內署出知濠州以知制誥畢士安為翰林學士初執政欲用右諫議大夫張洎因對言洎文學久次不在士安下上曰極知洎文學資任不下士安第德行不及耳執政乃退吕中曰翰苑之官一文章之士為之足矣然范果以躁競不與張洎以乏德行不與郭贄以乏時望不與蓋翰苑乃儲才之地豈可輕授哉異時楊億不革冊后之制劉均不革相謂之制則我朝涵養培植之功亦多矣上以入閣舊圖承五代草創禮容不備於是命史館修撰楊徽之等討論故事乃别為新圖十二月朔遂行其禮於文德殿蘇易簡於本院㑹韓丕畢士安李至楊徽之梁周翰柴成務吕佐之錢若水王旦潘謹修王著吕文仲等觀御飛白書玉堂之署四字并三體書詩石上聞之賜上尊酒太官設盛饌至等各賦詩以記其事宰相李昉張齊賢參知政事賈黃中李沆亦賦詩以貽易簡易簡悉以奏御上謂宰相曰蘇易簡以卿等詩什來上斯足以見儒墨之盛學士之貴也女真言契丹絶其朝貢之路請擊之詔不許其後遂歸契丹吕中曰夷狄之自相攻乃中國之利而中國使夷狄攻夷狄則夷狄得以要功於中國矣以女真之請伐契丹太宗猶不之許宣和乃航海通女真以伐契丹是何不度德不量力耶壬辰淳化三年春正月令常參官各舉京官一人充升朝官令宰相以下至御史中丞各舉朝官一人為轉運使又詔所舉京官除三司三館職事官已升擢者不在薦論其有懷才外任未為朝廷所知者方得奏舉詔諸道轉運使自今釐革庶務平反獄訟漕運金榖成績居最及有建置之事果利於民者所在州府軍監每嵗終件析以聞非殊異者不得條奏二月乙丑朔日有食之鹽鐡使魏羽言諸州茶鹽主吏多負官課請行決罰上曰當案問其實若水旱災沴致官課虧失者非可加刑也帝王者為天下主財爾卿等司計當以公正為心無事割削勿令害民而傷和氣焉三月上御崇政殿覆試合格進士先是胡旦蘇易簡王世則梁皓陳堯叟皆以所試先成擢上第由是士爭習浮華尚敏速或一刻數詩或一日十賦將作監丞莆田陳靖上疏請糊名考校以革其弊上嘉納之於是召三省兩館文學之士始令糊名考校第其優劣以分等級內出巵言日出賦題試者駭異不能措詞相率扣殿檻上請㑹稽錢易時年十七日未中所試三題皆就言者指其輕俊特黜之得汝陽孫何以下凡三百二人並賜及第五十一人同出身上諭之曰爾等各負志業中我廷選效官之外更勵精文翰勿墜前功也辛丑又覆試諸科擢七百八十四人並賜及第百八十人出身就宴錫御製詩三首針一首上謂宰相曰天下至廣藉羣材共治之今歲登第者及千餘人皆朕所選擢此等但能自檢情美替而歸則馴致亨衢未易測也時詔刻禮記儒行篇賜近臣及京官受任於外者并以賜何等令為座右之誡初內殿䇿士例賜御詩以寵之至陳堯叟始易以針用敦勉勵暨孫何則詩針並賜時論榮之上復命醫官集太平聖惠方一百卷以印本頒天下夏五月上以久愆時雨憂形於色謂宰相曰亢陽滋甚朕懇禱精至並走羣望而未獲嘉應者豈非四方刑獄有寃濫郡縣吏不稱職朝廷政治有所闕乎因遣常參官十七人分詣諸路按决刑獄己酉雨宰臣相率稱賀上曰朕孜孜求理視民如傷內省於心無所負矣而久愆時雨蓋隂陽之數也朕所憂者在獄吏舞文巧詆計臣聚斂掊克牧守不能宣布詔條卿士莫肯修舉職業爾李昉張齊賢及賈黃中李沆慙懼拜伏退上表待罪上曰中書庶務卿等尤宜盡心也昉等復上表稱謝焉六月有蝗自東北來蔽天經西南而去上謂宰相曰朕素不識此蟲羣飛而過其勢甚盛必能害及田稼朕憂心如搗亟遣人馳詣所集處視之卿等何䇿可去悉對曰蟲螟因旱乃生頻雨則不能飛為灾與否亦係歲時聖心焦勞憂念黎庶固當感通天地臣等職在調燮伏增慙懼是夕大雨蝗盡殪時京畿大穰物價至賤辛卯遣使臣於京城四門增價以糴令有司虛近倉以貯之命曰常平以常參官領之俟嵗饑則减價糶與貧民遂為定制吕中曰常平者欲其常常而使平也然領以常參官則其終不免有州縣移用之弊至于景德始以司農領之稍重其權矣然出入之時由縣而州由州而提刑由提刑而司農文移回報動涉纍月不免有失時之憂此所以啓王安石置提舉之官也豈知提舉官置而青苗行倉法壞矣秋七月朔置三司都勾院命右諫議大夫張佖判之乙巳太師贈尚書令真定忠獻王趙普卒上聞謂近臣曰普事先帝與朕最為故舊能斷大事向與朕嘗有不足衆人所知朕君臨以來每待以殊禮普亦傾竭自效盡忠國家社稷臣也吕中曰趙中令欲决大事則讀論語一書至終日李文靖亦嘗為宰相如節用愛人使民以時兩句終身行之聖人之言其有益於人也如此一論語也張禹以之而誤成帝何晏以之而禍西晉書惟在人善用耳大事記曰諫北伐一疏有以沮貪功之輩論彗星一疏有以破諂諛之言而以上親决庶獄察見隱微相率稱賀則近於諛令李符告廷美怨望則近於訐矣然能推吕蒙正之晚輩稱吕端之為台輔器皆得其用蒙正質厚寬簡記人才於夾袋之中薦人可使朔方三問而三不易百官皆稱其職吕端持重識大體鎖王繼恩於閣內而大計以定真宗即位捲簾升殿審視然後降拜其膽略如此此皆得人之效也八月詔徵終南山隱士种放辭以疾不至放以肄習為業學者多從之詔使徵之其母恚曰常勸汝勿聚徒講學果為人知不得安處放遂稱疾不起上喜其髙節不奪其志九月羣臣奉表加上尊號曰法天崇道明聖仁孝文武上曰但時和嵗豐萬姓阜康朕之願也溢美之號亦何尚焉凡五上表終不許上幸祕閣觀書賜從臣及直館閣官飲既罷又命皇城使王繼恩召馬步軍都虞候傅潜殿前都指揮使戴興等宴飲縱觀羣書上意欲使武將知文儒之盛也冬十月詔諸道知州通判釐務京朝官令録判司簿尉等有治行尤異吏民畏服居官廉恪涖事明敏鬬訟衰息倉廩盈羡冦盜剪滅部內肅清者委本道轉運使以名聞並驛置赴闕親問其狀旌賞之反此者亦具奏當行貶斥上慮中外官吏清濁混淆莫能甄别命户部侍郎王沔度支副使謝佖祕書丞王仲華同知京朝官考課吏部侍郎張宏户部副使髙象先膳部貟外郎范正辭同知幕職州縣官考課號曰磨勘院吕源曰太平興國六年九月詔應京朝官將命出入及滿受代歸闕者冝令中書舍人郭贄膳部郎中知雜滕中正户部郎中雷德驤同考校勞績及銓量材器候外任有闕中書下其名類能以授之至雍熙二年五月命御史中丞劉保勳十月命右諫議大夫雷德驤皆同知京朝官考課太宗謂宰相曰朕前者於班籍欲選一人為河北轉運使而臣僚既衆不能盡識亦不知其履行自令德驤具臣僚歷任功過之跡引對取㫖既得漸識羣臣可以擇才委任且使有官業者樂於召對負瑕纍者恥以顧問懲惡勸善於是在焉至淳化三年又命王沔等既以前政預選建言應京朝官殿犯令刑部件供報以贓私公罪分三等又京朝官所陳歷任殿最敢有𨼆沒漏落者並除籍為民刺問有司而受請托隱蔽其殿罰不以報者同其罪初沔罷參知政事捧詔求見上涕泣不願離左右遂委以同知京朝官考課條奏節目自謂清真希求再用物論甚譁又以御史中丞王化基同知考課王沔張宏皆故輔以至中憲雜端皆任以此而初降詔旨考校勞績銓量才器然後引對是太宗建此一司而人君黜陟之所繫十一月禮儀使蘇易簡上言曰聖朝親祀圜丘以宣祖侑神作主此則符聖人大孝之道成嚴父配天之儀恭惟太祖皇帝光啓丕圖以聖授聖謹按唐永徽中以髙祖太宗同配上帝望將來親祀郊丘奉宣祖太祖同配其常祀孟春祈穀孟冬神州季秋大享以宣祖崇配冬至圜丘夏至皇地祇孟夏雩祀以太祖崇配詔從之分左藏庫為左右藏各二庫右藏受之左藏給之俟右藏既盈即復以給癸巳淳化四年春正月朔親享太廟辛卯合祭天地於圜丘以宣祖太祖升配二月以磨勘京朝官院為審官院幕職州縣官院為考課院時金部貟外郎謝佖言磨勘之名非典訓也故易之富弼曰太宗初置京朝官磨勘院以考其功過定其殿最而升降之差遣院以括其逺邇别其次序而任使之則是磨勘之設専責實效今之審官曰掌簿書定先後之次一吏之職耳升降黜陟蓋無預焉失審官求賢之意矣有司言油衣㡩幕破損者數萬假欲毁棄之上令煮浣染以雜色刺為旗幟數千以示宰相李昉等奏曰陛下萬機之外聖智髙逺事無小大咸出意表天生五材陛下兼而用之物有萬殊陛下博而通之雖在細微無所遺棄固非臣等智慮所及三月初何承矩至滄州即建屯田之議㑹臨津令黃懋亦上書請於河北諸州興作乃以承矩為制置河北緣邉屯田使以懋為大理寺丞充判官發諸州鎮兵萬八千人給其役是年八月稻熟始承矩建水田之議沮之者頗衆既而種稻又不熟羣議益甚幾罷其事及是承矩載稻穗數車遣吏部送闕下議者乃息自是葦蒲螺蛤之饒民賴其利吕中曰國家初都河南則以河北為藩籬籓籬固則門户固矣此冨弼因契丹議地所以請備河北也自慶厯熙寧以後朝廷備禦之具常詳於西略於北西戎雖無警而常嚴備以待之北狄之隙稍平則上下晏如也河北陜西皆宿重兵而西師獨强者非西強於北蓋西戎嘗有康定之叛故其動則禦之靜則防之又自熙寧紹聖元豐崇寧皆用兵於西師獨冠天下北狄為金繒所啖日月既久而和好如故河北之備稍緩所以啓女真深入之謀也五月詔諸道轉運副使知州通判知軍監等各於所部見任職幕州縣官內舉吏道通明及儒術優茂者各一人丙午張洎赴翰林上謂近臣曰學士之職清切貴重非他官可比朕常恨不得為之廢京朝官差遣院令審官院總之錢若水劉昌言同知審官院考覆功過以定升降皆其職也又以蘇易簡王旦等同兼知考課院凡常調選人流內銓主之奏舉及歷任有殿最者考課院主之并吏貟而省司局議者咸以為當從易簡之請也戊申詔罷鹽鐵度支户部等使三司但置使一貟判官六員推官三員從馬應昌之議也以鹽鐡使魏羽判三司六月以柴禹錫為宣徽北院使知樞密院事劉昌言為右諫議大夫同知院事右諫議大夫樞密直學士吕端守本官參知政事命魏庠柴成務同知給事中事凡制敕有未便宜准故事封駁以聞七月先是上召廣南轉運使向敏中歸闕擢工部郎中一日御筆飛白書敏中及虞部郎中張詠姓名付宰相曰此二人名臣也朕將用之左右因稱其材己酉並命為樞密直學士蘇易簡直禁中以水試欹器屬小黃門宣事密奏而不識其名及晚朝上曰卿所玩得非欹器耶易簡曰然乃江南徐遊所作即取至便坐上親較試再三嗟賞易簡進曰臣聞日中則昃月滿則虧器盈則覆物盛則衰願陛下持盈守成慎終如始固萬世基業則天下幸甚通進銀臺司舊𨽻樞密院凡內外奏覆文字必關二司然後進御向敏中上言臺司多受逺方疏不報恐失事機請别置局署命官專涖以防壅遏從之詔以宣徽北院㕔事為通進銀臺司命敏中及張詠同知二司公事凡內外章奏案牘謹視其出入而勾稽焉月一奏課事無大小不敢有所留滯矣發敕司舊𨽻中書尋令銀臺司兼領之九月以給事中封駁𨽻通進銀臺司應詔敕並令向敏中張詠詳酌可否然後行下時張永德為并代都部署有小校犯法永德笞之至死詔按其罪詠封還詔書且言永德方任邉寄若以一小校故摧辱主帥臣恐下有輕上之心不從未幾果有營兵脅訟軍候者詠復引前事為言上改容勞之吕中曰自張詠封還詔書而後之為給事中者始敢於封駁自田錫奏議鯁直而後之任言責者始敢于盡言講官振職自孫奭始三司振職自陳恕始人才雖盛於景德慶厯之時而實胚胎涵育於今日耳秋七月初雨至是不止廬舍多壞上以隂陽愆伏罪由公府切責宰相李昉及參知政事賈黃中李沆曰卿等盈車受俸豈知野有餓殍乎昉等慙懼拜伏黃中出語人曰當時但覺宇宙小一身大恨不能入地耳冬十月尚書左丞張齊賢出知定州齊賢自言母孫氏年八十五抱羸疾不願離左右上憫然許之齊賢在相位時母入謁禁中上嘆其夀考有令子多賜手詔存問别加錫與搢紳以為榮齊賢尋遭母喪水漿不入口者七日自是日啖粥一器終喪止食脫粟飯先是大名府豪民有峙芻茭者將圖厚利誘姦人濳穴河隄嵗仍決溢知府事趙昌言命徑取豪家廩積以供用由是無敢為姦利者屬河決澶州浸府城昌言索禁旅佐其役或偃蹇不進昌言怒曰府城將墊人民且溺汝輩食厚祿欲坐觀耶敢不從命者斬衆股栗趨事不浹辰而城完上嘉之降璽書奬諭自端拱以來諸州司理參軍皆上躬自選擇民有詣闕稱寃者立遣臺使乘傳案鞫諸路提㸃刑獄司未嘗有所平反詔悉罷之歸其事於轉運司右僕射平章事李昉給事中參知政事賈黃中李沆左諫議大夫同知樞密院事溫仲舒並罷守本官以吏部尚書吕蒙正守本官平章事蒙正初為相時金部貟外郎張紳知蔡州坐贓免或言於上曰紳洛中豪家安肯受賕乃蒙正未第時丐索於紳不能如意致其罪耳上即命復紳官蒙正終不自辨未幾罷相㑹考課院得紳舊事實狀乃黜之於是蒙正復為相上謂曰張紳果實犯贓蒙正亦不謝翰林學士承旨蘇易簡為給事中參知政事易簡由知制誥為學士年未滿三十在翰林八年特受人主之遇敻絶倫等李沆後入在易簡下及先參政乃以易簡為承㫖錫賚與參政等上意欲遵舊制遂正台席且俟稔其名望而易簡以親老急於進用因召見頗言時政闕失沆等罷即命易簡代之易簡母薛氏入禁中上命之坐問何以教子遂成令器對曰幼則束以禮讓長則訓以詩書上顧左右曰今之孟母也非此母不生此子矣以樞密都承旨趙鎔為宣徽北院使樞密直學士向敏中為左諫議大夫並同知樞密院事丁丑以趙昌言為給事中參知政事京畿民牟暉擊登聞鼓訴家奴失猳豚一詔令賜千錢償其直因語宰相曰似此細事悉訴于朕亦為聽決大可笑也然推此心以臨天下可以無寃民矣上曰清靜致治黃老之深旨也夫萬物自有為以至於無為無為之道朕當力行之至如汲黯卧治淮陽宓子賤彈琴治單父此皆行黃老之道也吕蒙正曰老子稱治大國若烹小鮮夫魚撓之則潰民撓之則亂今之上封事議制置者甚多陛下漸行清靜之化以鎮之上曰朕不欲塞人言狂夫言之賢者擇之古之道也十一月朔日南至御朝元殿受朝上孜孜為治每旦御長春殿受朝聽政罷即御崇政殿決事比至日中尚未御食謝泌上言請自今前殿聽政畢且進食然後御便殿決事上不答嘗謂左右曰寸隂可惜茍終日為治百年之內亦無幾爾可不勉乎十二月初殿中丞梁鼎知吉州民有蕭甲者豪猾為民患鼎暴其凶狀杖脊黥面徙逺郡上賞其强幹代還賜緋魚特以犀帶賜之且記其名於御屏於是為三司右計判官甲午淳化五年春正月朔上製元旦除夕詩各二章賜近臣俾之屬和上語蒙正曰夫否極則泰物之常理晉漢兵亂生靈凋喪殆盡周祖自鄴南歸京城士庶皆懼掠奪當時謂無復太平日矣朕躬覽庶政萬事粗理每念上天之貺致此繁盛乃知理亂在人蒙正避席曰乘輿所在士庶走集故繁盛如此臣嘗見都城外不數里饑寒而死者甚衆未必盡然願陛下視近以及逺蒼生之幸也上變色不言蒙正侃然復位同列咸多其抗直他日上欲遣人使朔方諭中書選才而可責以事者蒙正退以名上上不許他日又問復以前所選對上亦不許他日又問益急蒙正終不肯易其人上怒投其奏書于地曰何太執耶必為我易之蒙正徐對曰臣非執蓋陛下未諒爾因固稱其人可使餘不及臣不欲用媚道妄隨人主意以害國事同府皆愓息不敢動蒙正搢笏俯而拾其書徐懷之而下上退謂親信曰是翁氣量我不如既而卒用蒙正所選復命大稱㫖上於是益知蒙正能任人而嘉其有不可奪之志吕中曰古之君子有志天下者莫不以致天下之賢為急故必旁咨博採取之於無事之時而剸煩治劇用之於有事之日吕文穆之薦人可使朔方所以三問而三不易者蓋其夾袋有冊子每四方人謁見必問其有何人才隨即疏之故朝廷求賢取之囊中而已此謂舉爾所知爾所不知人其捨諸李順據成都僣號大蜀王四出侵掠北抵劒關南距巫峽郡邑皆被其害焉靈州及通逺軍皆言趙保吉攻圍諸堡寨侵掠居民焚積聚上聞之怒命李繼隆為河西兵馬都部署尹繼倫為都監以誅保吉甲戌上始聞李順攻劫劒南諸州命王繼恩為西川招安使率兵討之軍事委繼恩制置不從中覆吏部尚書宋琪上書言邉事曰臣頃任延州節度使判官經涉五年雖未嘗躬造夷落然常令蕃落將和斷公事嵗無虛月戎夷之事熟於聞聽長興四年夏州李仁福死有男彛超擅稱留後當時詔延州安從進與李彛超換鎮彛超據夏州固不奉詔臣又聞党項號為小蕃非是勍敵若得出山布陳止勞一戰便可蕩除深入則饋運艱難窮追則窟穴幽邃莫若緣邉州郡分屯重兵俟其入界侵漁方可隨時掩擊非惟養勇亦足安邉凡烏合之徒勢不能久利於速鬬以騁兵鋒莫若持重守疆以挫其鋭彼無城守衆乏糇糧威賞不行部族分散然後密令覘其保聚之處預於麟府鄜延寧慶雲武等州約期㑹兵四面齊進絶其奔走之路合勢擊之可以剪除無噍類矣仍先告諭諸軍擊賊所獲生口資畜許為已有如此人百其勇也奏入上密寫其奏令李繼隆王繼恩等擇利而行二月朔上始聞成都陷召宰相謂曰豈料賊勢猖獗如此遂命勤州刺史王果帥兵趨劒門崇儀使尹元帥兵由峽路以進並受王繼恩節度李順分遣數千衆北攻劎門成都監軍宿翰領麾下投劒門與都監上官正兵合遂迎擊賊衆大破之斬馘幾盡餘三百人奔還成都順怒其驚衆悉命斬於城東門外初考功郎中姚坦為益王府翊善坦好直諫王嘗作假山召僚屬置酒共觀之衆皆褒歎其美坦獨俯首不視王强使視之坦曰但見血山安得假山王驚問其故對曰坦在田舍時見州縣督稅上下相急剝里胥臨門捕人父兄子弟送縣鞭笞血流滿身愁苦不聊生此假山皆民租賦所出非血山而何時上亦為假山未成有以坦言告于上者上曰傷民如此何用山為命亟毁之王每有過失坦未嘗不盡言規正宫中自王以下皆不喜左右乃教王稱疾不朝上日使醫視之逾月不瘳上甚憂之召王乳母入宫問王疾增損狀乳母曰王本無疾徒以翊善姚坦撿束王起居不得自便王不樂故成疾爾上怒曰吾選端士為王僚屬者固欲輔佐王為善爾今王不能用規諫而又詐疾欲使朕逐去正人以自便何可得也且王年少未知出此必爾輩為之謀耳因命捽至後園杖之數十召坦慰諭之曰卿居王宫為羣小所嫉大為不易卿但能如此無患讒言朕必不聽也吕夷簡曰愛憎之不察為害深矣妹喜惡鄂侯讒于桀而脯之妲己惡比干讒于紂而剖之驪姬惡申生讒于獻公而殺之靳尚惡屈原讒于楚而逐之絳灌惡賈誼讒于文帝而疏之甚者李林甫讒殺太子二王及其朝臣韋堅李雍輩又逐太子妃韋氏良娣杜氏嗚呼愛憎之不察為害如此且小人之心險如山川毒如豺虎微失其意則無所不至人君不能明之之則讒人得行善人罹患可為痛惜者也太宗明宫人詐計知姚坦之見憎雖堯舜之聰明殆不過是三月以大理評事陳舜封為殿直舜封父為伶官舜封舉進士及第任望江主簿轉運使言其通法律宰相以補廷尉屬因奏事言辭頗捷給舉止類倡優上問誰之子舜封自言其父上曰此宰相不為國家澄汰流品之所致也遂命改秩趙保忠聞李繼隆將兵來誅趙保吉乃先攜其母及妻子卒吏避野外上言已與保吉解仇乞罷兵上怒命繼隆移兵擊保忠保忠反為保吉所圖夜襲保忠帳保忠僅以身免走還城中初保忠遣趙光嗣入貢光嗣頗輸誠欵遷禮賔副使保忠既還光嗣執之丁丑開門納王師繼隆入夏州擒保忠檻送闕下保吉引衆遁去四月詔以趙光嗣為夏州團練使削保吉所賜姓名復為李繼遷上以夏州深在沙漠本奸雄竊據之地欲隳其城因問宰相建置之始吕蒙正等曰自赫連築城以來頗與關右為患若遂廢毁萬世之利也乙酉詔隳夏州故城遷其民於綏銀等州分以官地給之丁巳王繼恩至成都擒賊帥李順及僞樞密使計詞吳文賞等丙寅趙保忠至自夏州丁卯以保忠為右千牛衛上將軍封宥罪侯戊寅御書一幅曰公務刑政惠愛臨民奉法除奸方可書為勞績本官月俸並給實錢又别書三十餘幅賜大理正尹玘等人一通召知審官院錢若水等謂曰中有奉法除奸之語恐不曉者因而生事可語之曰除奸之要在乎奉法故有是言也若水出召尹玘等一一諭之五月王繼恩之克劒州也馬知節實為先鋒繼恩惡知節不附已遣守彭州配以羸兵三百彭之舊卒悉召還成都賊十萬衆攻城知節率兵力戰自寅至申衆寡不敵士多死者逮暮慨然嘆曰死戰乎非壯夫也即橫槊潰圍而出休於郊外黎明救兵至遂鼓譟以入賊衆敗去上聞而嘉之授益州鈐轄王繼恩拔成都而郭門十里外猶為賊黨所據僞帥張餘復嘯聚萬餘衆攻陷嘉戎瀘渝涪忠萬開八州開州監軍秦傳序死之六月其子奭泝峽求其父尸比至䕫州船覆而死世以父死於忠子死於孝奏至上嗟惻久之録傳序次子煦為殿直髙麗國王治遣使來乞師言契丹侵掠其境上以夷狄相攻蓋常事秋七月厚禮其使而歸之髙麗自是絶不復朝貢矣八月殿中丞李虛已上表獻詩自陳祖母年八十餘喜聞其孫申循吏之目上喜甚賜以五品服改知遂州賜錢五十萬以遺其祖母翌日對宰相言曰已與五十緡吕蒙正曰前所賜蓋五百緡上曰此誤也然不可追虛已純孝篤謹家極貧雖一時誤恩人以為殆天賜也以劒南招安使昭宣使王繼恩為宣政使順州防禦使先是繼恩有平賊功中書建議欲以為宣徽使上曰朕讀前代書史多矣不欲令宦官干預政事宣徽使執政之漸也因命翰林學士張洎錢若水議别立宣政使名序立在昭宣使上以授之九月李繼遷竄於漠北遣其弟延信奉表待罪且言違叛事出保忠願赦勿誅上喜召見延信面加慰撫錫賚甚厚壬申以襄王元侃為開封尹改封夀王上謂夀王曰夫政教之設在乎得人心而不擾之耳得人心莫若示之以誠信不擾之無如鎮之以清靜推是而行雖虎兕亦當馴狎况於人乎書云撫我則后虐我則仇信哉斯言也爾宜誡之以左諫議大夫冦準參知政事上因謂宰相吕蒙正曰冦準臨事明敏今再擢用想益盡心朕嘗諭之以同德者事皆從長而行則上下鮮不濟矣上以蜀冦漸平下詔罪己初命錢若水草詔既成進御上笑曰朕為卿潤色可乎因命筆親竄數字皆引咎深切尢為精當詔辭略曰朕委任非當燭理不明致彼親民之官不以惠和為政管榷之吏唯用刻削為功撓我蒸民起為狂寇又曰念兹失德是務責躬改而更張永鑒前弊而今而後庶或警余先是蘇易簡薦張詠可屬西川事詔詠知益州於是始命赴部上曰西川亂後民不聊生卿當以便冝從事是月張詠始至益州先是陜西課民運糧以給蜀師者相屬于路詠亟問城中所屯兵數凡三萬人而無半月之食詠訪知民間舊苦鹽貴而私廩尚有餘積乃下鹽價聽民得以米易鹽民爭趨之未踰月得米數十萬斛軍士歡言前所給米皆雜糠土不可食今一一精好此翁真善幹國事者詠聞喜曰吾令可行矣時四郊尚多賊壘王繼恩日務宴飲官支芻粟飼馬詠但給以錢繼恩怒詠曰公今閉門髙㑹芻粟何從而出若開門擊賊何慮馬不食粟乎繼恩乃不敢言繼恩嘗送三十餘輩請詠治之詠悉遣令歸業繼恩怒詠曰前日李順脅民為賊今日詠與公化賊為民何有不可哉詠計軍食可支二嵗乃奏罷陜西運糧上喜曰鄉者益州日以乏糧為請詠至未久遂有二嵗備此人何事不能了朕無慮矣吕中曰莫難於除盜尤莫難於盜已去之後故既命繼恩以討之復命張詠以撫之始威終惠兩得之矣抑繼恩宦者使之掌兵得無陷李唐之弊政耶然繼恩雖有功而不敢驕雖不與宣徽而不敢怨太宗蓋有以處之也其與童貫握重兵在外而朝廷無以制之之道異矣使當時不知所以制之愚恐無夷狄之驕亦必有宦官之禍矣十一月上遣張崇貴持詔諭李繼遷先是翰林學士錢若水撰賜趙保忠詔云不斬繼遷存狡兔之三穴濳疑光嗣持首鼠之兩端上大喜謂若水曰此四句正道著我意及是又草賜繼先詔略曰既除手足之親已失輔車之勢上御筆批其後云依此詔本極好若水家因寶藏之丁卯大雨雪羣臣稱賀十二月戊寅朔司天言日當食至是隂雪蒙蔽自旦及中而散羣臣稱賀賀日不食蓋始此王繼恩御軍無政張詠恐軍還日或有意外之變乃密奏請遣腹心近臣可以彈壓王師者亟來分屯師旅乙未至道元年春正月朔德音改元度支判官陳堯叟梁鼎上言請於陳許鄧潁暨蔡宿亳至於夀春用水利墾田必可致倉廩充實省江淮漕運上覽奏嘉之即遣皇甫選何亮往諸州按視經度其事契丹大將韓德威誘党項自振武入冦永安節度使折御卿率輕騎邀擊之大敗其衆於子河汊遣使奏捷上謂左右曰朕常誡邉將勿與爭鋒待其深入則分竒兵以斷其歸路從而擊之必無遺類也今果如吾言初趙贊自京兆罷歸以贊為度支都監有鄭昌嗣者與贊親比纍遷鹽鐵都監二人既得聮職恣所為皆不法詔削奪贊官爵并一家配𨽻房州昌嗣責授唐州團練副使既行數日並以所在賜死中外莫不稱快諸州奏案類有官典盜用庫物者上謂近臣曰夫人之善惡在乎原情假如官典私竊軍物雖至巨萬止一盜爾亦何害於民政哉若黨庇憸人稔成奸惡以兹蠧政其為盜大矣二月甲申命宰相及羣官分於京城寺觀禱雨又命中使分祀五嶽故事御署祝版王禹稱請自今更不御署上曰朕為萬民祈福桑林之禱猶無所憚至於親署又何損乎三月朔餘慶任參知政事日悉與宰相同願復故事上特從其請亦以慰凖意云上謂宰相曰自春不雨至今並走羣望而未獲嘉應豈獄犴之際頗有寃繫乎即日命侍御史元玘等四十四人乘傳分往諸道案察刑獄翌日御崇政殿親決京城諸司係囚獲原宥者數百人因謂宰相曰刑罰者不得已而用之能不失有罪而得中道者斯為難矣後二日大雷雨街中水深數尺乙巳知通利軍錢昭序表獻赤烏白兔各一云烏禀陽精兔昭隂瑞報火德蕃昌之兆示金方馴服之徴上謂侍臣曰烏色正如渥丹信火德之符矣翰林學士王禹稱兼知審官院及通進銀臺封駁司制敕有不便多所論奏開寶皇后之喪羣臣不成服禹稱與賔友言后嘗母天下當遵用舊禮或以告上不恱禹稱罷知滁州禹稱嘗為李繼遷草制繼遷送馬五十匹禹稱以狀不如式却之及在滁州或言其買馬虧價者上曰彼能却繼遷五十匹馬顧肯虧價哉參知政事寇凖奏曰近者邉上易署主帥增修甲卒深合事宜上曰天下庶政日新滔滔如流水朕固不怠於聽斷至於疆場戎事既安危所係亦皆是朕一一躬自籌度預為制置以防其漸若臨事倉卒則無及矣因語及用將帥上曰將帥材略固不求其備但量其能而用之上自節麾下至二千石第其功效而授之微勞盡甄下情必達下情必達則無猜二之嫌微勞盡甄則無觖望之釁所以各務忠孝而固祿位悖亂不得而萌也太康縣獲𤣥兔以獻吕端等曰𤣥者北方之色兔者隂類中國陽也將有逺人向化受冠帶於闕下昭邦家之慶以致太康者乎六月詔募民請佃諸州曠土便為永業仍蠲三年租三年外輸三分之一州縣官吏勸民墾田之數悉書於印紙以俟旌賞八月朔荆湖轉運使何士宗上言望自今執政大臣出領外郡應合申轉運司公事只署通判以下姓名上謂宰相曰大臣品位雖崇若出臨外藩即轉運使所部要繫州府不繫品位此朝廷典憲未可輕改也冝仍舊貫壬辰制以開封尹夀王元侃為皇太子改名恆詔皇太子兼判開封府自唐天祐以來中國多故不遑立儲二斯禮之廢將及百年上始舉而行之中外胥恱初參知政事冦凖自青州召還入見上曰朕諸子孰可付神器者準曰惟陛下擇所以副天下之望者曰元侃可乎對曰非臣所知也上遂以元侃為開封尹改封夀王於是立為太子吕中曰東漢李唐所以有女主宦官外戚之禍者以立天子之權盡出其手雖李固杜喬裴度鄭覃之徒不能正之也準之一言真萬世法不徒見於景德澶淵之一役也龜鑑曰太祖以天下授太宗堯授舜之盛舉也太宗之定䇿壽王得無賢於舜授禹之事乎噫禹不傳賢而傳子吾孟子嘗斷斯事矣天與賢則與賢天與子則與子使傳賢而可以久焉禹蓋先後世而為之也何至有辭於來世哉而况少年天子百姓相慶真社稷主神器有歸冦萊公自青州召還上亦謀及儲二事凖對曰臣觀諸子惟夀王得人心可以副天下之望則是真宗之立亦出於大臣之議論庶民之推戴而非出於太宗之私心也明矣矧賔護名賢歷陳忠孝師傅重任深戒順從輔翼元良養成德性李沆李至等與有力焉嗚呼唐虞禪夏后殷周繼均之為聖人也均之為天下得人也準嘗奏事切直上怒而起準攀上衣請復坐事決乃起上嘉嘆曰此真宰相也又語左右曰朕得冦準猶唐太宗之得魏鄭公也以李至李沆並兼太子賔客見太子如師傅之儀上謂至等曰朕以太子仁孝賢明立為儲二以固國本當賴正人輔之以道卿等可盡心調護若動皆由禮則冝贊成事或未當必須力言勿因循而順從也九月是歲汴河運米至五百八十萬石上因問近臣汴水疏鑿之由張洎退而講求其事以奏且曰大禹疏鑿以分水勢煬帝開甽以奉巡遊雖數陻廢而通流不絶於百世之下終為國家之用其上天之意乎冬十月上增作九弦琴五弦阮别造新譜二十七卷俾太常樂工肄習之以備登薦乙酉出琴阮示羣臣且曰琴七弦今增為九弦曰君臣文武禮樂正民心則九奏克諧而不亂矣阮四絃今增為五曰金木水火土則五行並用而不悖矣十一月上閲武於便殿衛士挽弓有及一石五斗者矢二十發綽有餘力因謂近臣曰方今寰海無事美才間出悉在吾彀中矣又令騎兵步兵各數百東西列陳挽强彀弩視其進退發矢如一容止中節上曰此殿廷間數百人爾猶兵威可觀况堂堂之陳數萬成列者乎十二月上以時和年豐冦盜剪滅顧謂宰相等曰國家自近嵗以來水旱作沴河西蜀川相繼叛亂百姓嗷嗷然朕為其父母中心憂念無須臾之安由是內修政紀救萬民之愁疾外勤戎略定三邉之狂孽以至有司常職米鹽細事朕亦不憚勞苦並躬親成斷遂致上天悔禍否極斯泰巴蜀餘妖竄伏黔水繼遷醜類窮蹙沙漠而又普天之下九榖咸登塞北江南紅粟流衍朕豈望才經災歉之後便覩兹開泰深自慶慰也吕端等相率稱賀詔內外文武臣僚及諸色人自今起請制置事須有益於國無損於民乃得聞奏如施行後顯有利濟當議旌賞如虧損公私亦重行朝典丙申至道二年春正月己酉親享太廟辛亥合祭天地於圜丘上以文物仗衛之盛逶迤布濩極望無際因詔有司畫為南郊圖二月朔贈司徒諡文正李昉卒上嘗謂近臣曰昉本以文章進用及居相位自知才微任重無所彌綸但憂愧而已先是遣使采訪川峽諸州守二之能否多不治者獨知䕫州袁逢吉知遂州李虛已通判查道知忠州邵曄知雲安軍薛顔等七人以稱職聞皆賜詔書奬諭夏四月先是五品以上官皆攝太祝上謂宰相曰膏梁之族官勳固已崇貴子孫仕宦者多至四五人每覃慶中書皆授攝官未幾即補正貟不十數年遂通閨籍此甚弊政亟冝革之乙未詔自今止賜同學究出身依例赴選集吕中曰用人以世唐虞三代法也非以豪異俊秀之才俱出於公卿大夫之族蓋以仁義道德之教素行於聖賢明哲之家自漢以下公卿之家法既不如古而朝廷教課國子之法一切廢棄此任子之法所以弊而我太祖太宗與范富諸人所以裁抑而不恤也五月李繼遷帥萬餘衆冦靈州司天中官正韓顯符言熒惑犯輿鬼秦雍之分國家當有兵在西北冬官正趙昭益言犯輿鬼中積尸秦分野有兵人民灾害之象上語宰相等曰天文謫見如此秦地民罹其殃朕旦夕念之不遑寧處辛亥上降手詔曰靈州孤絶救援不及賊遷猖獗未就誅夷宜令宰相吕端知樞密院事趙鎔等各述所見利害來上吕端等言臣等共為一狀述其利害張洎越次奏曰吕端等備位廊廟緘默而不言深失謀謨之體端曰洎欲有言不過揣摩陛下意爾壬子洎上疏言靈武封壤必不可以即時保守靈武士伍必不可以深入應接上初有意棄靈武既而悔之及覽洎奏不恱却以付洎謂之曰卿所陳朕不曉一句洎惶恐流汗而退上乃召同知樞密院事向敏中等謂之曰張洎上言果為吕端所料朕以其疏還之矣七月參知政事冦準罷為給事中先是郊祀行慶中外官吏皆進秩準遂率意輕重其素所喜者多得臺省清秩所惡者及不知者即叙進焉馮拯因上疏極言并及嶺南官吏除拜不均凡數事既而準入對前殿上語及馮拯所訴事準猶力爭不已上先已厭準因歎曰雀鼠尚知人意况人乎遂罷之尋出知鄧州閏七月詔自今中書門下只令宰相押班知印其參知政事殿庭别設磚位次宰相之後非議軍國政事不得升都堂祠祭行香署勑並以開寶六年六月庚戍詔書從事鹽鐡使陳恕峭直守公性靡阿順每便殿奏事上或未察必形誚讓恕斂版踧踖退至殿壁負墻而立若無所容俟上意稍解復進確執前奏終不改易如是或至三四上察其忠亮多從其議嘗御筆題殿柱曰真鹽鐡陳恕當時言稱職者亦以恕為首焉吕原曰陳恕在太宗淳化四年自鹽鐡使入為參知政事繼罷政至四年十月乃除三司總計使後復三部以恕再為鹽鐡使至真宗咸平四年正月始罷祖宗時三司權重幾亞二府日造榻前故陳恕丁謂李士衡田况皆通曉財用有名于時而陳恕已參大政自淳化咸平兩朝十年主領計司八月審官院引大理寺丞宣城髙惠連面授朝官上欲肅清中外臨軒親擇官吏如有績用而無私纍者必加奬擢焉九月夏州延州行營言兩路合勢破賊於烏白池賊首李繼遷遁去先是上部分諸將攻討李繼隆自環州范廷召自延州王超自夏州丁空自慶州張守恩自麟州凡五路率兵扺烏白池皆先授以方略繼隆遣其弟繼和馳驛上言請自青岡峽直抵繼遷巢穴上怒曰汝兄如此必敗吾事矣因手書數幅切責繼隆繼隆已便宜發兵不俟報行十數日不見虜引兵還獨王超范廷召至烏白池與賊遇大小數十戰雖頻克捷而諸將失期卒困乏終不能擒賊焉時超子德用年十七為先鋒部萬人戰鐡門關斬首十三級及進師烏白池得精兵五千轉戰三日虜既却德用曰歸師過險必亂乃領兵先絶其險下令曰敢亂行者斬虜躡其後望其師整不敢近超撫其背曰王氏有子矣上初以方略授諸將先閲兵崇政殿列陳為攻擊之狀刺射之節且令多設强弩及遇賊布陳萬弩齊發賊無所施其技矢才一發賊皆散走凡十六戰而抵其窠穴悉焚蕩之講義曰西事之興出於吾國之寡謀蓋自太平興國之七年李繼捧以地來獻且欲密邇王室而式化厥訓焉不令兄弟交相為愈於是地斤之澤有人矣朝廷之區畫地里之險要彼實知之靜言其由誰執其咎三族之陷未幾而三窟之計已就其患未有紀極也已而繼捧就擒繼遷效順輔車之勢雖失而唇齒之計已成戎秋無厭乍臣乍叛何可以中國待之哉由是西征之志鋭然矣鄜州節度之不奉詔吾不為之辱靈州環慶之率衆入冦吾不為之沮張洎願棄靈武之奏吾不為之疑部分諸將五路進兵方略之授陳圖之示崇政射刺之閲聖䇿先定必有大功烏白池九月之勝直可犂西夏之庭而掃其穴矣冬十月詔以池州新鑄錢監為永豐監先是饒州有永平監兵匠多而銅錫不給知州馬亮請分其工之半别置監于池州詔從之於是嵗增鑄錢數十萬緍十一月先是淮南十八州軍其九禁鹽餘則不商人由海上販鹽官倍數取之至禁地則上下其直民利商鹽之賤故販者甚衆至有持兵器往來為盜者發運使楊允恭奏請悉禁之而官遣吏主其事詔從之允恭又請令商人先入金帛京師及揚州折博務者悉償以茶自是鬻鹽得實錢茶無滯貨嵗課增五十萬八千餘貫十二月有司言鳯州出銅鉚定州出銀鉚請置官掌其事上曰地不愛寶當與衆庶共之不許是嵗大有年丁酉至道三年正月以户部侍郎溫仲舒禮部侍郎王化基並參知政事給事中李惟清同知樞密院事參知政事張洎罷為刑部侍郎時邉境多事上垂欲相仲舒而罷吕端不豫乃止二月辛丑上不豫始決事於便殿是月供奉官兩浙轉運司承受公事劉文質入奏察舉部內官髙輔之李易直艾仲孺梅詢髙貽慶姜嶼戚綸等八人有治迹並降璽書褒諭上曰文質善於采聽特遷西京作坊副使三月癸巳上崩於萬嵗殿參知政事溫仲舒宣遺制龜鑑曰曽公鞏嘗曰造邦受命為帝太祖功未有髙焉又曰保世靖民為帝太宗德未有盛焉嗚呼太祖未嘗無德而言功不言德愚是以知功之髙太宗未嘗無功而言德不言功愚是以知德之盛真宗即位於柩前初太宗不豫宣政使王繼恩忌上英明與參知政事李昌齡知制誥胡旦謀立楚王元佐頗間上宰相吕端問疾禁中見上不在旁疑有變乃以笏書大漸字令親密吏趣上入侍及太宗崩繼恩白后至中書召端議所立端知其謀即紿繼恩使入書閣撿太宗先賜墨詔遂鎖之亟入宫后謂曰宫車晏駕立嗣以長順也今將奈何端曰先帝立太子政為今日豈容更有異論后默然上既即位端平立殿下不拜請卷簾升殿審視然後降階率羣臣拜呼萬嵗夏四月制曰先朝庶政盡有成規務在遵行不敢失墜然而纂圖伊始懼德弗明所冝拔茂異之才開諌諍之路撫綏鰥寡惠復疲羸庶幾延宗社之鴻休召天地之和氣癸卯宰相吕端加右僕射甲子太子賔客李至為工部尚書李沆為户部侍郎並參知政事工部侍郎郭贄出知大名府贄翌日求對懇辭上曰朕初即位命贄治大藩而不行則何以使人卒遣之吕夷簡曰剛健中正乾之體也尊嚴用威君之道也茍乾不能制坤君不能使臣則上下亂矣壯哉太祖之貶趙逢真宗之遣郭贄信乎其英斷矣辛亥以工部郎中史館修撰梁周翰為駕部郎中知制誥著作郎直集賢院楊億為左正言館職並如故故事入西閣皆中書召試惟周翰不召試而命焉李應機者嘗知咸平縣上以夀王尹開封遣散從以帖下縣有所追捕散從恃王勢歡呼於縣庭應機怒曰汝所事者王也我所事者王之父也父之人可以笞子之人杖之二十散從走歸泣訴於王王嘉其諒直及即位擢應機通判益州事召之登殿謂曰朕方以西蜀為憂故除卿此官此未足為大任也卿第行勉之有便宜事密疏以聞應機至州未幾有走馬入奏事應機使謂曰有密疏欲附走馬入奏走馬怒强應曰諾明日使人請應機曰疏不可與人傳也當自來受之走馬雖怒甚意欲積其驕橫之狀具奏於上乃詣應機廨舍受其疏以行既至升殿上迎問曰李應機無恙乎有疏來否走馬愕然失據即對曰有因探其懷出之上周覽稱善數四因問應機在蜀治行如何走馬踧踖轉辭更稱譽之上曰汝還語李應機凡所言事皆善已施行矣更有意見盡當以聞蜀中無事行召卿矣頃之召入遷擢數嵗中至顯官應機為吏强敏而貪財多權詐其後上亦察其為人寖疏之己未宰相吕端上大行皇帝陵名曰永熙知制誥胡旦責授安逺節度行軍司馬旦與王繼恩等邪謀既露而旦草行慶制詞語復訕上故先絀之五月詔御史臺告諭內外文武羣臣自今人君有過時政或虧軍事否臧民間利害並許直言極諫抗疏以聞詔以國家大本足食為先今億兆至蕃未聞有九年之蓄令兩制議致豐盈之術以聞又詔三司及兹歲稔大為市糴以實倉廩罷江淮發運使諸路轉運使司承受公事朝臣使臣悉召赴闕上初聽政務從簡易也李昌齡責授忠武節度行軍司馬王繼恩責授右監門衛將軍均州安置胡旦削籍流潯州尋詔中外臣僚曽與繼恩交結及通書疏者一切不問上謂輔臣曰宫中嬪御頗多幽閉朕已令擇給事歲深者放出之吕端等曰陛下踐祚之初首行此令實哲王之懿範也翰林學士承㫖宋白上大行皇帝諡曰神功聖德文武廟號太宗詔天下勿復獻珍禽異獸及諸祥瑞工部侍郎同知樞密院事錢若水罷為集賢院學士判院事先是太宗為若水言士之學古入官遭時得位䊸金拖紫躍馬食肉前呼後擁延賞宗族此足以為榮矣豈得不竭誠報國乎若水曰髙尚之人固不以名位為光寵忠貞之士亦不以窮達易志操其或以爵祿榮遇之故而效忠於上中人以下者之所為也太宗然其言及劉昌言罷太宗問趙鎔等曰見昌言否鎔等言屢見之上曰涕泣否曰與臣等言多至流涕若水曰昌言實未嘗流涕蓋鎔等迎合上意爾吕蒙正罷太宗又謂若水曰人臣當思竭節以保富貴蒙正前日布衣朕擢為宰相今退在班列想其目穿望復位矣若水對曰蒙正雖登顯貴然其風望亦不為忝冒且蒙正固未嘗以退罷鬱悒當今岩穴髙士不求榮爵者甚多如臣等輩誠不足以自重太宗默然若水因自念人主待輔臣如此蓋未嘗有秉節髙邁不貪名勢能全進退之道以感動人主故也將俟滿歲即移疾㑹太宗晏駕不果上即位若水以母老請解機務章再上乃得請召謝便殿命坐上問近臣誰可大用者若水言中書舍人王旦有德望宜任大事上曰此固朕心之所屬也若水好汲引後進推賢重士胸中豁如也上每見吕端等必肅然拱揖不以名呼端等再拜而請上曰公等顧命元老朕安敢上比先帝又以端膚體宏大宫庭階戺頗峻命梓人為端納陛秋七月御崇政殿召端等訪以軍國大事經久之制端陳當世急務皆有條理上甚嘉之令諸路轉運使更互赴闕詢以民間利病吏部郎中直集賢院田錫應詔上疏曰臣切聞去年九月十九日未時永興環州慶州延州清逺軍隰州同日同時六處地震洎靈州送糧草回來死者十有餘萬議者即云地震已應於此臣則未以為然動之方位既在關輔豈無在下者輒動乎關輔若有冦盜弄兵則臣慮西川復保劔關之危南方復恃重江之險閩中越中淮南湖南豈無見利忘義之人豈無幸灾乘便之輩上乃出其疏示吕端等曰卿等詳酌行之九月以曹彬為樞密使兼侍中罷旄鉞戶部侍郎同知樞密院事向敏中給事中夏侯嶠並為樞密副使上謂之曰近密之司典領尤重必素有名望端亮謹厚者處之乃可鎮靜而責成彬以耆舊冠樞衡之首敏中與嶠佐助之兵機邉要有所望矣敏中明辨有才略遇事敏速先是西北用兵敏中専主謀議至於二邉道路斥堠走集之所莫不周知嶠仕藩府最舊故首加擢用焉左正言直史館孫何表獻五議上覽而善之其一參用儒將曰古謂元戎無不統攝爰自近代又有供軍糧料隨軍轉運之目使者往返託稱上㫖動必中覆實戾成算陛下於文儒之中擇有方略之士試以邉任委之勿使小人撓其權監陳先鋒之類悉任偏將受其節度其二申明太學曰國家必欲開孤進之路闢至公之門莫若使寒雋之士由鄉里以升聞世祿之家自成均而出仕太學不得補庶人之子神州不得貢卿士之門郡縣皆按舊典重立學官精加課試公與薦延其三釐革遷轉曰躬祀圜兵誕敷霈澤無賢不肖並許叙遷今之班簿臺省宫寺凡八百員若十年之內肆赦相仍必恐京僚過於胥徒朝臣多於州縣其四議復制科其五議復鄉飲監察御史王齊上疏陳十事一擇左右二分賢愚三正名器四去冗食五加俸祿六謹政教七選良將八分兵戎九修民事十開仕進其略曰守小謹者似德懷怯懦者似恕容姦惡者似仁藴諂諛者似恭恣傾險者似智好詆訿者似直植朋黨者似義肆苛刻者似忠貪祿位者似勤若斯之流雖愚而類賢用之則速亂之基也又曰官多則事煩吏多則民殘欲事不煩莫若省官欲民皆安莫若省吏又曰官多俸薄莫若俸厚而官少衣食既足廉恥自興刑部貟外郎馬亮上疏言陛下初政軍賞宜速而所在不時給請遣使分往督視又州縣逋負至多赦書雖為蠲除而有司趣責如故非所以布宣德意也國朝故事以親王判開封府地尊勢重疑隙易搆非保親全愛之道契丹仍嵗內冦河朔蕭然請修好以息邉民凡四事比部員外郎刁衎上疏言私賞無及於小人私罰無施於君子任賢勿二去邪勿疑開諫諍之門塞讒佞之口無以春秋鼎盛而耽於逸游無以血氣方剛而惑於聲色冬十月陳宋州並言先貸民錢千萬令市牛價納外所負尚多許隨來嵗夏秋稅輸送詔悉從之十一月復分三司勾院為三命官各判之以太常丞王欽若判三司都催缺憑由司欽若初為亳州判官監倉天久雨倉司以穀濕不為受欽若悉命輸之倉且奏不拘年次先支濕榖太宗大喜手詔褒答因識其姓名及開封府以嵗旱蠲十七縣民租時有飛語聞上言所蠲放皆不實太宗不恱詔選官閲實亳州遣欽若行欽若覆按甚詳抗疏乞全放上即位於是擢用因語輔臣曰當此時朕亦自懼欽若小官獨敢為百姓伸理此大臣節也母賔古謂欽若曰天下宿逋自五代迄今理督未巳民病不能勝欽若即夕命吏治其數翌日上之上大驚曰先帝顧不知耶欽若徐曰先帝固知之殆留與陛下收天下心爾詔工部侍郎錢若水修太宗實録若水舉官同修李宗諤與焉上曰自太平興國八年已後皆李昉在中書日事史䇿本憑直筆若子為父隱何以傳信於後代乎除宗諤不可餘悉許之是月有司言冬至祀圜丘孟夏雩祀夏至祭方丘請奉太宗配上辛祈穀季秋大享明堂奉太祖配上辛祀感生帝孟冬祭神州地祗奉宣祖配其親郊圜丘奉太祖太宗並配詔可十二月詔諸路轉運使申飭部下令長勸課農桑先是上訪宰相以靈武事冝參知政事李至上疏言靈州不可堅守萬口同議且彼之户口四千有餘今則不盈數百矣彼之租課四十五萬二千有餘今則無孑遺矣安可復守之於是李繼遷遣使修貢求備藩任上雖察其變詐時方在諒暗姑務寧靜因從其請復賜姓名上初命翰林學士宋湜草保吉制湜知上意必欲歸其事於太宗因進辭曰先皇帝早深西顧將議真封屬軒鼎之俄遷建漢壇之未及眷兹遺命實付眇躬爾宜望弓劔以拜恩守封疆而效節上甚恱初刑部郎中知揚州王禹稱凖詔上疏言五事其一曰謹邉防通盟好使輦運之民有所休息其二曰減冗兵併冗吏使山澤之饒稍流於下其三曰艱難選舉使入官不濫其四曰沙汰僧尼使民無耗其五曰親大臣逺小人使忠良謇諤之士知進而不疑姦憸傾巧之徒知退而有懼疏奏即召禹稱還朝既用其䇿以夏綏銀宥靜五州賜趙保吉翌日命禹稱守本官復知制誥呂中曰以真宗繼太祖太宗之後兵未至多吏未至冗僧牒未鬻而緇黃亦未熾也而王禹稱言之貽謀之初冗官之貟未多小人之迹未萌而王齊言之當時私賞未至於及小人私罰未至於施君子聲色游逸之事何有也而刁衎言之豈憂治危明職當然耶景德祥符以後王欽若唱神道設教之說丁謂唱大計有餘之議而天書降矣當時豈復有禹稱田錫之言哉是嵗始定為十五路一曰京東路二曰京西路三曰河北路四曰河東路五曰陜西路六曰淮南路七曰江南路八曰荆湖南路九曰荆湖北路十曰兩浙路十一曰福建路十二曰西川路十三曰峽路十四曰廣南東路十五曰廣南西路宋史全文卷四
