body:
  text: 宋史全文卷二宋太祖二戊辰乾德六年十一月改開寶元年唐國吳越漳泉奉正朔南漢天寶十一年北漢主劉繼元立改天會十三年為廣運元年春正月乙巳大內營繕皆畢賜諸門名上坐寢殿令洞開諸門皆端直軒豁無有壅蔽因謂左右曰此如我心少有邪曲人皆見之矣吕中曰天下之事千條萬緒而皆經綸於人主之一心人主之心正則天下之事無一不出於正人主之心不正則天下之事無一得由於正是以人主以眇然之身居深宫之中其心之邪正若不可窺而其著見於外者常若手指目視而不可掩也此堯舜相授所以有惟精惟一之戒以我太祖立國之初規模廣大如漢髙帝謀深慮逺如漢光武而正心符印密契三聖之傳於數千載之上朱文公曰太祖不為言語文字之學而方寸之地正大光明直與堯舜之心合信哉斯言權知貢舉王祐擢進士合格者十人陶榖子邴名在第六翌日榖入致謝上謂左右曰聞榖不能訓子邴安得登第遽命中書覆試而邴復登第因下詔曰造士之選匪樹私恩世祿之家宜敦素業如聞黨與頗容竊吹文衡公器豈宜斯濫自今舉人凡關食祿之家委禮部具析以聞當令覆試夏六月辛巳以辛仲甫權知彭州上謂之曰蜀土始平輕侈之俗未革爾有文武才幹是用命爾仲甫既至州兵燕環誘屯戍軍謀以長春節宴集日為亂時民出郭拜墓仲甫率官屬巡邏於近郊見壕中草深恐其藏伏姦慝悉命燒剃之環黨懼謀泄遂有告者凡百餘人悉禽斬於市秋七月乙未中元張燈上御東華門賜從官飲殿前散員都虞候董遵誨為通逺軍使遵誨父宗本仕漢上微時嘗往依焉遵誨憑藉父勢多所陵忽嘗謂上曰每見城上有紫雲如蓋又夢登髙臺遇黑蛇約長百餘尺俄化為龍飛騰東西去雷電隨之是何祥也上皆不對他日論乒戰事遵誨理屈拂衣而起上乃辭宗本去自是遵誨亦不復見紫雲矣及上即位一日便殿召見遵誨伏地請死上諭之曰卿尚記往日紫雲及龍化之夢乎俄而部下有擊登聞鼓訴其不法十餘事遵誨惶恐待罪上諭之曰朕方赦過責功豈念舊惡耶汝可勿復憂吾將録用汝遵誨再拜感泣上以通逺軍西戎近邊命遵誨守焉遵誨既至召諸族酋長諭以朝廷威德刲羊釃酒厚加宴犒衆皆恱服後數月復入冦遵誨率兵深入擊走之夷落以定上喜其功就拜羅州刺史使如故遵誨嘗遣其外弟虞鄉劉綜來貢馬及還上解所服真珠盤龍衣使賫賜之綜曰遵誨人臣豈敢當此賜上曰吾委遵誨方面不以此為嫌也吕源曰謹按國史環州刺史董遵誨遣表弟劉綜貢馬太祖延見既還解真珠盤龍衣令賫賜遵誨綜辭以人臣不敢當太祖曰吾委遵誨方面不以此為疑也至於郭進宅用􅝕瓦皆所以激勵功臣不以疑似為嫌也真宗咸平三年正月駐蹕天雄軍幸樞密副使宋湜所居視疾許其先歸賜衾褥一副且曰此朕常所御者雖故暗亦足禦道途之風寒景德元年冬親征澶淵簽書樞密院事馮拯為寒氣所侵不赴晚朝遣中使使太醫診視明日車駕將發又遣使賜以帽絮且諭之曰此朕常服以禦風冷嗚呼祖宗於群臣眷遇之意如此之厚宜其報以如何耶解衣衣我推食食我臣謂是矣上自即位數出微行或過功臣之家不可測趙普每退朝不敢脫衣冠一夕大雪普謂上不復出矣久之聞叩門聲甚異亟出則上立雪中普惶恐迎拜上曰已約吾弟矣已而開封尹光義至即普堂設重裀地坐熾炭燒肉普妻行酒上以嫂呼之普從容問曰夜久寒甚陛下何以出上曰吾睡不能著一榻之外皆他人家也故來見卿普曰陛下小天下邪南征北伐今其時也願聞成算所向上曰吾欲收太原普默然良久曰非臣所知也上問其故普曰太原當西北二邊使一舉而下則邊患我獨當之何不姑留以俟削平諸國彼彈丸黑子之地將何所逃上笑曰吾意政爾姑試卿耳於是用師荆湖繼取西川是月令諸州察民有飢者令發廩貸之八月命客省使盧懷忠等二十二人領兵屯潞州將有事於北漢也北漢主劉繼恩怨郭無為初與其父言不助己欲逐之而未果繼恩置酒燕諸大臣供奉官侯霸榮率十餘人挺刃入閣殺之無為遣兵殺霸榮迎立繼恩弟太原尹繼元繼元始立王師已入境遂奪汾河橋傅太原城下十月甲戍屯田員外郎雷德驤責授商州司戶參軍德驤判大理寺其官屬與堂吏附會宰相擅增減刑名德驤憤惋求見欲面白其事未及引對即直詣講武殿奏之辭氣俱厲并言趙普強市人第宅聚斂財賄上怒叱之曰鼎鐺猶有耳汝不聞趙普吾之社稷臣乎引柱斧擊折其上齶二齒命左右曵出詔宰相處以極刑既而怒解止用闌入之罪黜焉十一月癸巳詔天下縣令佐自今檢苗定稅部役差夫鈐轄徵科區分刑獄凡關事務貴在公平如有違踰並宜論訴或令佐不相糾舉許吏民訴得實者賞之有差上享太廟見其所陳籩豆簠簋問曰此何等物也左右以禮器對上曰吾祖宗寧識此亟命撤去進常膳如平生既而曰古禮亦不可廢也命復設之於是判太常寺和峴言按唐天寶中享太廟禮料外每室加常食一牙盤五代以來遂廢其禮今請如唐故事詔從之癸卯合祭天地於南郊大赦改元契丹以兵來援北漢李繼勳等皆引歸北漢因入冦己巳開寶二年唐國吳越漳泉奉正朔南漢天寶十二年北漢廣運二年春二月乙卯命曹彬黨進等各領兵先赴太原戊午詔親征甲子車駕發京師權知貢舉趙逢奏進士安德裕等合格者七人三月戊戍次太原夏五月上以暑氣方盛詔西京諸州令長吏督掌獄掾五日一檢視灑掃獄戶洗滌杻械貧困不能自存者給飯食病者給藥小罪即時決遣自是每嵗仲夏必申明是詔以戒官吏焉閏月己酉右僕射魏仁浦卒仁浦嘗侍春宴上密謂曰朕欲親征太原如何仁浦曰欲速則不逹惟陛下審思上嘉其對太原城久不下殿前指揮使都虞候趙廷翰率諸班衛士叩頭願先登急擊以盡死力上曰汝曹皆我所訓練無不一當百所以備肘腋同休戚也我寧不得太原豈忍驅汝曹冒鋒刃蹈必死之地乎衆皆感泣再拜呼萬嵗時大軍頓甘草地中會暑雨多破腹病而契丹亦復遣兵來援壬子太常博士李光贊上言曰蕞爾晉陽豈須親討重勞飛挽取怨黔黎豈若回鑾復都屯兵上黨使夏取其麥秋取其禾既寬力役之征便是蕩平之䇿上覽奏甚喜宰相趙普亦以為然始議班師壬戍車駕發太原戊辰次鎮州真定蘇澄善養生為道士上召見之謂曰師年逾八十而容貌甚少盍以養生之術教朕對曰臣養生不過精思練氣耳帝王養生則異於是老子曰我無為而民自化我無欲而民自正無為無欲凝神太和昔黃帝唐堯享國永年用此道也上恱厚賜之六月癸巳車駕至自太原吕中曰太祖之未能取河東猶太宗之未能取幽薊而太祖之不盡鋭於偏方亦猶太宗之不窮其力於北伐也時之未至聖人不能先時而強為時之既至聖人不能後時而不為此平河東必在於太平興國之四年而太祖之規模宏逺遲之數年其終亦必能取幽薊也唐主遣其弟吉王從謙來貢唐查元方掌從謙箋奏上命盧多遜宴從謙於館多遜奕棋次謂元方曰江南竟如何元方斂袵對曰江南事大朝十餘年極盡藩臣之禮不知其他多遜愧謝曰孰謂江南無人八月靈武節度使馮繼業請舉族內徙以繼業為靜難節度使九月乙巳朔幸武成王廟朝廷擇可使代馮繼業者時考功郎中段思恭知泗州上以思恭嘗有功眉州乃召赴闕命知靈州厚賜遣之思恭既視事矯繼業之失悉心綏撫夷落安靖周訪利病多所條奏甚得吏民之情十月己亥上燕藩臣於後苑酒酣從容謂之曰卿等皆國家宿舊久臨劇鎮王事鞅掌非朕所以優賢之意也前鳳翔節度使兼中書令王彥超喻上旨即前奏曰臣本無勳勞久冒榮寵今已衰朽乞骸骨歸丘園臣之願也前安逺節度使武行德郭從義白重贊楊庭璋等自陳攻戰伐閲及履歷艱苦上曰此異代事何足論也庚子以行德為太子太傅從義為左金吾衛上將軍彥超為右金吾衛上將軍重贊為左千牛衛上將軍廷璋為右千牛衛上將軍富弼曰藝祖臨軒之初一嵗之內下澤潞平楊州威令之行如破竹之勢則其餘藩鎮自是束手而聽命矣又於樽酒之間酬對之際折其氣伏其心罷節旌授環衛謦咳之易其故何哉御得其道故也周世宗號為英武之君而藩臣來朝喜見於色推此則知五代綱紀之不立也太祖太宗聖聖相承修明憲度肅清寰宇太宗一言謂稍聞愆負無矜恕之理人人皆務檢身御臣之術如此所以致天下幾二百年無雞鳴犬吠之警太子太傅王溥遷太子太師入謝上顧曰溥十年作相三遷一品福履之盛近世所未有也十一月庚申回鶻于闐皆遣使來貢方物庚午開寶三年唐國吳越漳泉奉正朔南漢天寶十三年北漢廣運三年春正月辛酉詔諸州察民有孝弟彰聞德業純茂者滿五千戶聽舉一人或有竒才異行不限此數所舉得實等級加賞不如詔者罪之三月權知貢舉扈蒙擢進士張珙等合格者八人以忠武節度使王審琦鎮夀春凡八年嵗得租稅量入為出未嘗有所誅求民頗安之所部邑令以罪停其録事史幕僚白令不先咨府請按之審琦曰五代以來諸侯強橫令宰不得專縣事今天下治平我忝守藩而部內宰能斥去黠吏誠可賞也何按之有聞者歎服辛亥以處士王昭素為國子博士致仕昭素少篤學有志行時方治所居室積木牆間有穿窬者為木所礙不得入昭素覺之盡室所有擲於外謂盜曰汝速去恐捕者至盜慙委物而遁由是邑中無盜著易論三十三篇學者多從之遊上聞其名召見便殿時年已七十餘上問曰何以不仕致相見之晚昭素謝不能上令講乾卦至九五飛龍在天則斂容曰此爻正當陛下今日之事引援證據因示風諌微旨上甚恱即訪以民事昭素所言誠實無隱上益嘉之又問治世養身之術昭素曰治世莫若愛民養身莫若寡欲上愛其語常書屏几間吕中曰處士非講官也而得以召見便殿非經筵也而得以講易太祖之好學也如此古今言易者失之拘在陛下則為飛龍在天在臣下則為利見大人善言易者莫如昭素古今言隂陽者失之泥公事未判時屬陽已判時屬隂善言隂陽者莫如張詠可以暗合伊洛之説矣夏四月辛卯朔日有食之詔諸州兩稅折料物非土地所宜者勿得抑配凡絲綿紬絹麻布香藥毛翎箭笴皮革筋角等所在約支二年之用勿得廣有科市以致煩民秋七月詔民訴水旱災傷者夏不得過四月秋不得過七月壬子詔曰吏員猥多難以求其治奉祿鮮薄未可責以廉與其冗員而重費未若省官而益奉西川管內州縣官宜以口數為率差減其員舊俸月增給五千天下州縣官宜依西川例省減員數吕源曰官有定員祿無虛授漢光武中興減損吏職太祖肇建皇基以新造之宋不顧人情恱否併省吏員與光武中興減損之意亦同也仁宗時已患三人共一員缺職事不理富弼等論宜革其弊因循至今又幾百年矣今豈止三人共一缺哉官冗弊甚剗革之方不可緩也八月庚寅李謙溥為濟州團練使謙溥在隰州十年敵人不敢犯其境有招收將劉進者勇力絶人謙溥撫之甚厚常往來境上以少擊衆北漢人患之為蠟彈封書以間進遺其書道中趙贊得之以聞上令械進送闕下謙溥召詰其事進伏於廷請死謙溥曰我以舉宗四十口保汝矣即上言進為北漢人所惡此乃反間也奏至上悟遽令釋之上嘗命有司為洺州防禦使郭進治第凡廳堂悉用􅝕瓦有司言惟親王公主始得用此上怒曰郭進控扼西山逾十年使我無北顧憂我視進豈減兒女耶亟往督役無妄言上寵異將帥多類此故能得其死力云富弼曰將帥國之重任宜乎天子寵之也然寵不可常惟在得其機耳得其機則使之盡心死節以報將帥盡心死節而功不成未之有也太祖之寵將帥深得其道唐主作書諭南漢主以歸欵於中國南漢主得書大怒答唐主甚不遜唐主以其書來上上始決意伐之九月己亥朔以潘美尹崇珂王繼勳發諸州兵赴賀州城下甲辰詔周文王成王康王秦始皇漢髙祖文帝景帝武帝元帝成帝哀帝魏孝文西魏文帝後周太祖唐髙祖太宗中宗肅宗代宗德宗順宗文宗武宗宣宗懿宗僖宗昭宗二十七陵嘗被發令有司備法服常服各一襲具棺重葬所在長吏致祭癸丑王師遂圍賀州城中人開門以納王師冬十月癸酉詔前代功臣烈士孫臏元稹等三十一人各置守冡戶禁樵採王師破南漢開建寨遂取昭州桂州初契丹六萬騎冦定州命判四方館事田欽祚領兵三千禦之上謂欽祚曰彼衆我寡但背城列陳以待之敵至即戰勿與追逐欽祚與敵戰浦城敵騎小却乘勝至遂城欽祚馬中流矢而踣騎士王超以馬授欽祚軍復振自旦至晡殺傷甚衆北邊傳言三千打六萬癸亥捷奏至上喜謂左右曰敵數犯邊我以二十匹絹購一敵人首其精兵不過十萬人止費我二百萬匹絹則敵盡矣自是益修邊備富弼曰太祖置內藏庫欲積絹以募敵人之首偉哉是謀若後世內積貨財外嚴守備來則謹封疆而禦之去則譬蚊虻而驅之敵人之勢外無所得而內自困矣先是詔諸道舉有德行者兹命學士院試問吏理而曹州所舉人孔蟾所對稍優以蟾為章丘縣主簿是月王師克連州十二月庚午翰林學士承旨戶部尚書陶榖卒榖文翰冠一時自以久次意希大用上素薄之選置近輔未嘗及榖榖不能平一日使其黨因事風上言榖在詞禁宣力甚多上笑曰我聞學士草制皆檢前人舊本稍改易之此乃諺所謂依樣畫胡蘆爾何宣力之有乎榖因作詩題翰林壁頗怨望上益薄之遂決意不用王師長驅至韶州南漢人教象為陳每象載數十人皆執牙仗凡戰必置陳前以壯軍威王師集徑弩射之象奔踶乘者皆墜軍遂大敗遂取韶州辛未開寶四年南漢平唐國吳越漳泉奉正朔北漢廣運四年春正月王師克英雄二州丙午詔諸道州縣自今並不得更差攝官乙丑王師至馬徑南漢主懼乃遣蕭漼卓惟休奉表詣軍門乞降丁卯又遣其弟禎王保興率國內兵來拒辛未王師至白田南漢主素服出降潘美承制釋之遂入廣州保興初匿民間後乃獲之有閹工百餘輩盛服請見美曰是椓人多矣吾奉詔伐罪正為此等命悉斬之美以露布告捷己丑至京師凡得州六十縣二百十四戶十七萬二百六十三吕中曰以汴梁之地視江南為近視嶺南為逺何先逺而後近耶蓋聞劉鋹奢侈則曰吾當救此一方之民則先取南漢所以爭民命江南亦有何罪但卧榻之側豈容鼾睡則後收江南所以一天下三月詔前代帝王當給民奉陵者各增二戶前右監門衛將軍趙玭既勒歸私第不勝忿恚一日伺趙普入朝馬前斥普短上聞之召玭及普於便殿面質其事玭大言詆普販木規利先是官禁私販秦隴大木普嘗遣親吏往市屋材聨巨筏至京師治第吏因之竊於都下貿易故玭以為言上怒詔問王溥等普當得何罪溥附閣門使奏云玭誣罔大臣上意頓解反詰責玭命武士撾之御史鞫於殿廷普力營救上乃特寬其罰扶出之責玭為汝州牙校夏五月乙未有司以帛係鋹及其官屬先獻太廟太社上御明德門遣盧多遜宣詔詰責鋹鋹伏地待罪上釋鋹罪并其官屬禎王保興等初議獻俘之禮朝臣莫能知乃遣使就問吏部尚書致仕張昭昭卧病口占以授使者咸服其該博遂用之六月初置市舶司於廣州詔御史中丞劉溫叟中書舍人李昉等重定開元禮以國朝沿革制度附屬之初上征晉陽命密州防禦使馬仁瑀率衆巡邊至上谷漁陽敵素聞其名不敢出明年羣盜起兖州賊首周弼尤凶悍自號長腳龍詔仁瑀掩擊仁瑀領帳下十數人入泰山擒弼盡獲其黨魯郊以寧庚辰徙仁瑀為瀛州防禦使仁瑀兄子因醉誤殺平民係獄當死民家自言非有憾也但過誤耳願以過失傷論仁瑀曰我為長吏而兄子殺人此乃恃勢過橫非過失也豈敢以己之親而亂國法哉遂論如律成都布衣羅居逋喪親廬墓日誦佛書有芝草生甘露降守臣表其事於是以居逋為延長縣主簿劉鋹在國時多置鴆以毒臣下一日上幸講武池鋹先至詔賜巵酒鋹疑之捧杯泣曰臣承祖父基業拒違朝廷勞王師致討罪固當死陛下不殺臣今見太平為大梁布衣矣願延旦夕之命以全陛下生成之恩上笑曰朕推心置人腹安有此事令取鋹酒自飲之别酌以賜鋹鋹大慙頓首謝上既平廣南欲行報謝之禮秋七月甲午朔詔以冬至有事於南郊乙未御史中丞劉溫叟卒溫叟為中丞十二年屢求解職上難其代及被病上知其貧遣中使就賜器幣溫叟性重厚方正事繼母以孝聞五代以來言好古執禮者推溫叟焉皇弟開封尹光義聞溫叟清介嘗遣府吏齎錢五百千遺之溫叟不敢却貯廳事西舍令府吏封識乃去明年重午復送角黍紈扇所遣吏即前送錢者視西舍封識宛然吏還以告光義曰我送猶不受况他人乎乃命輦歸府中他日光義因侍宴論當世名節士具道溫叟辭錢事上歎賞久之溫叟既卒上難其繼曰必得純厚如溫叟者乃可命太子賓客邊光範兼判御史臺事居半嵗始真為中丞吕中曰一中丞任之十二年及其且辛也則曰必純厚如溫叟乃可國初之不輕用人如此蓋其始也擇之精其終也任之久擇之精則小人不得以濫其選任之久則君子舉得以盡其職趙中令之相凡十一年郭進之守西山凡二十年李漢超之守關南凡十七年作坊至卑賤也而魏丕典之至十餘年皆久任而成功也冬十月甲申詔兩京諸道自十月後犯強竊盜不得預郊祀赦所在長吏當告諭下民無令冒法右補闕梁周翰上疏其略曰西蜀淮南荆潭桂廣之地皆已為王土陛下誠能以三方所得之利減諸道租賦之入則庶乎德澤均而民力寬矣上嘉納其言十一月癸巳江南國主煜遣其弟從善來朝貢先是國主以銀五萬兩遺宰相趙普普告於上上曰此不可不受但以書答謝少賂其使者可也普叩頭辭讓上曰大國之體不可自為削弱當使之勿測及從善入覲常賜外密賚白金如遺普之數江南君臣聞之皆震駭服上偉度他日上因出忽幸普第時吳越王俶方遣使遺普書及海物十瓶列廡下會車駕卒至普亟出迎弗及屏也上顧見問何物普以實對上曰此海物必佳即命啓之皆滿貯瓜子金也普惶恐頓首謝曰臣未發書實不知此若知此當奏聞而却之上笑曰但受之無害彼謂國家事皆由汝書生耳因命普謝而受之河決澶州東匯于鄆濮壞民田戊午親享太廟始用繡衣鹵簿己未合祭天地於南郊大赦蠲開寶元年以來逋租初上擇偽蜀親兵習弓馬者百餘輩為川班內殿直廩賜優給與御馬直等於是郊禮畢行賞上以御馬直扈從特命增給錢人五千而川班內殿直不得如例乃相率擊登聞鼓陳乞上怒遣中使謂之曰朕之所與即為恩澤又安有例哉命斬其妄訴者四十餘人餘悉配𨽻許州驍捷軍其都校皆決杖降職遂廢其班時內臣有左飛龍使李承進者逮事後唐上問曰莊宗以英武定中原享國不久何也承進曰莊宗好畋獵務姑息將士每出次近郊禁兵衛卒必控馬首告兒郎輩寒冷望與救接莊宗即隨其所欲給之蓋威令不行賞賚無節也上撫髀歎曰二十年夾河戰爭取得天下不能用軍法約束此輩縱其無厭之求以兹臨御誠為兒戲朕今撫養士卒固不吝惜爵賞茍犯吾法惟有劒耳壬申開寶五年江南吳越漳泉奉正朔北漢廣運五年春正月丁酉禁民鑄鐵為佛像浮屠及人物之無用者上慮愚民多毁農器以邀福故禁之上既平廣南即欲經理江南鄭王從善入貢遂留之國主大懼是月始損制度下令稱教宫殿悉除去鴟吻閏二月壬辰權知貢舉扈蒙奏合格進士京兆安守亮等十一人諸科十七人上召對於講武殿下詔放榜新制也癸巳以江南進奉使李從善為泰寧節度使賜第京師國主雖外示畏服修藩臣之禮而內實繕甲募兵隂為戰守計上使從善致書風國主入朝國主不從但增嵗貢夏四月上按嶺南圖籍州縣多而戶口少命潘美王明度地并省以便民甲午初廢白州及常樂州五月丙寅詔廢嶺南道媚川都先是劉鋹募兵能採珠者二千人號媚川都於是潘美等言採珠危苦之狀上亟命降詔罷之辛未河大決澶州濮陽縣壬申命曹翰往塞之上謂曰霖雨不止又聞河決朕信宿以來焚香上禱於天若天災流行願在朕躬勿施於民翰頓首拜曰宋景公一發善言災星為之退舍今陛下憂民如是必不能為災也上又謂宰相曰霖雨不止朕日夜焦勞罔知所措得非時政所關使之然耶趙普對曰陛下臨御以來憂勤庶務有弊必去聞善必行至於苦雨為災乃是臣等失職上曰朕又思之恐掖庭幽閉者衆昨令遍籍後宫凡三百八十餘人因告諭願歸其家者具以情言得百名悉厚賜遣之普等皆稱萬嵗河又決大名府朝城縣河南北諸州皆大水陜州言民范義超周顯德中以私怨殺同里常古真家十二人古真年少脫走得免至是長大擒義超訴於官有司引赦當原上曰豈有殺一家十二人而可以赦論乎命斬之六月庚寅河決陽武縣汴水決鄭州宋州戊申發諸州兵士及丁夫凡五萬人塞決河命曹翰護其役未幾河所決皆塞是月下詔曰近者澶濮數州霖雨荐降洪河為患朕以屢經決溢重困黎民凡搢紳多士草澤之倫有素習河渠之書深知疏道之䇿若為經久可免重勞並許詣闕上書附驛條奏朕當親覽用其所長時東魯逸人田告者著纂禹元經十二篇上聞之召見詢以治水之道善其對將授以官告固辭父年老求歸奉養詔從之秋七月永慶公主嘗衣貼繡鋪翠襦入宫中上謂曰汝當以此與我自今勿復為此飾主笑曰此所用翠羽幾何上曰不然主家服此宫闈戚里必相效京城翠羽價髙小民逐利展轉販易傷生寖廣實汝之由汝生長富貴當念惜福豈可造此惡業之端主慙謝主因侍坐與皇后同言曰官家作天子日久豈不能用黃金裝肩輿乘以出入上笑曰我以四海之富宫殿悉以金銀為飾力亦可辦但念我為天下守財耳豈可妄用古稱以一人治天下不以天下奉一人茍以自奉養為意使天下之人何仰哉當勿復言吕中曰創業之君後世所奉以為軌範也宫闈之地四方所視以為儀刑也一人之奢儉者雖微而關於千萬世者為甚大致謹於服色者雖小而關於千萬里者為甚逺可不謹哉先是大理正內黃李符知歸州轉運司制置有不合理者符即上言上嘉之秩滿歸闕上以京西諸州錢幣不登八月癸巳命符知京西南面轉運事書李符到處如朕親行八字賜之令揭於大旗常以自隨符前後條奏便宜凡百餘條其四十八事皆施行著於令禁玄象器物天文圖讖七曜厯太乙雷公六壬遁甲等不得藏於私家有者並送官冬十月癸卯詔功德使與左街道籙劉若拙集京師道士試驗其學業未至而不修飾者皆斥之若拙蜀人自號華蓋先生善服氣年九十餘不衰步履輕疾每水旱必召於禁中設壇場致禱其法精密上甚重之十一月癸亥禁釋道私習天文地理是嵗大飢初上問宰相趙普曰儒臣有武幹者何人普以知彭州左補闕辛仲甫對乃徙仲甫為四川兵馬都監於是召見面試射上曰汝見王明乎朕已用為刺史汝頗忠淳若公勤不懈不日亦當為牧伯也仲甫頓首謝上因謂普曰五代方鎮殘虐民受其禍朕今選儒臣幹事者百餘分治大藩縱皆貪濁亦未及武臣一人也既而有司命仲甫檢視民田上曰此縣令職耳即令吏部銓擇官代之吕中曰以酷吏主財則取民必峻以武夫主刑則用法必嚴此太祖所以命儒臣主財士人典獄也知所以培國脈而重民命歟癸酉開寶六年江南吳越漳泉奉正朔北漢廣運六年春二月丙申運京師米二萬石賑曹州飢民辛丑以著作佐郎陸光範為在京糧料使太濮寺丞趙巨川為西京糧料使國初承舊制用三司大將領糧料之職於是改任京官三月辛酉新及第進士雍丘宋準等十人諸科二十八人詣講武殿謝上以進士武濟川三傳劉睿材質最陋應對失次絀去之濟川翰林學士李昉鄉人也昉時權知貢舉上頗不恱會進士徐士廉等擊登聞鼓訴昉用私情取舍非當上乃令貢院籍終場下第者并準以下及士廉等各賜紙札别試詩賦命李瑩侯陟等為考官乙亥上御講武殿親閲之得進士二十六人士廉與焉又五經開元禮三禮三傳三史學究明法諸科九十九人皆賜及第又賜準錢二十萬以張宴會責昉為太常少卿禁銅錢不得入蕃界及越江海至化外夏四月乙酉詔諸州考試官令長吏精選僚屬有才學公正者充知貢舉與考試官同看詳義卷定其通否即駁放不得優假虛至終場申禁私薦屬舉人募告者其賞有差舉人勒還本貫重役永不得入科場辛丑翰林學士盧多遜等上所修開寶通禮二百卷義纂一百卷並付有司施行是日遣盧多遜為江南生辰國信使多遜至江南得其臣主歡心及還艤舟宣化口使人白國主曰朝廷重修天下圖經史館獨闕江南諸州願各求一本以歸國主亟令繕寫送與之於是江南十九州之形勢屯戍逺近戶口多寡多遜盡得之矣歸即言江南衰弱可取狀上嘉其謀始有意大用戊申詔參知政事薛居正監修梁後唐晉漢周五代史知制誥王祐等上重定神農本草二十卷上制序摹印以頒天下五月上知堂吏擅中書權多為姦贓欲更用士人而有司所選終不及數遂召舊任者劉仲華等四人面加戒勵令復故嵗滿無過與上縣令稍有愆咎重置其罰吕中曰創業之世多責實守成之世多虛文覆試之法欲無一士之不實勸農之詔欲無一民之不實籍記人才欲無一官之不實拺汏驕脆欲無一兵之不實也以慶歷元祐之盛而杜衍之任怨吕大防之盡忠且欲汰吏而不可得况若士若民若兵若官乎是虛文之習難革故也甲戍以殿中侍御史巨野馮炳為侍御史知雜判御史臺事上留意聽斷專事欽恤御史大理官屬尤加選擇嘗召炳謂曰朕每讀漢書見張釋之于定國治獄天下無寃民此所望於汝也賜金紫以勉之六月辛卯召京百司吏七百餘人見於便殿上親閲試勒歸農者四百人初雷德驤責商州司戶參軍刺史頗賓禮之及奚嶼知州希宰相意至則倨受庭參德驤不能堪出怨言嶼聞之怒有言德驤嘗為文訕朝廷嶼因召德驤與語濳遣吏紿德驤家人取得之即械繫德驤具事以聞上貸其罪削籍徙靈武德驤子有鄰意趙普實擠排之日夜求所以報普者上始有疑普意矣壬寅詔參知政事吕餘慶薛居正升都堂與宰相同議政事趙普之為政也專廷臣多疾之上初聽趙玭之訴欲逐普既止盧多遜在翰廷因召對數毁短普且言普嘗以隙地私易尚食蔬圃廣第宅營邸店奪民利自李崇矩罷上於普稍有間庚戍復詔薛居正吕餘慶與普更知印押班奏事以分其權易州言刺史賀惟忠卒惟忠性剛頗知書洞曉兵法有方略在易州葺治亭障撫士卒能得其心每乘塞用兵所向無敵名震北塞十餘年間不敢冦邊民皆賴之八月草澤黃德芳上修河利害辛卯賜德芳同學究出身甲辰左僕射兼門下侍郎平章事趙普罷為河陽三城節度使同平章事普獨相凡十年沈毅果斷以天下事為己任上倚信之故普得成其功嘗欲除某人為某官不用明日復奏之又不用明日又奏之上怒裂其奏投於地普顔色自若徐拾奏歸補綴明日復進之上悟乃可其奏後果以稱職聞又有立功當遷官上素嫌其人不與普力請與之上怒曰朕故不與遷官將奈何普曰刑以懲惡賞以酬功古今之通道也且刑賞者天下之刑賞非陛下之刑賞也豈得以喜怒專之上弗聽起普隨之上入宫普立於宫門良久不去上卒從其請一日大宴雨驟至上不恱雨良久不止上怒形於辭色左右皆震恐普因奏言外間百姓政望雨時雨難得百姓各歡喜乞令樂官就雨中奏技上大恱終宴普臨機制變能回上意類此嘗設大瓦壺於視事閣中中外表疏普意不欲行者必投之壺中束緼焚之其多得謗咎殆由此也吕中曰趙中令相太祖之功在於收藩鎮之權遲幽薊之伐其再相太宗之功在於上彗星之疏諌北伐之書而金匱一書尤宗廟社稷之大計也然自唐以來宰相入見必命坐大政事則面議之自餘號令除拜賞刑廢置但入熟狀畫可降出即行之國初三相自以前朝舊臣稍存形迹每事具劄子進呈至普獨以天下為己任故為政專所以啓雷德驤父子之謗也自是以後居正義倫不過方重靖介自守之相爾九月吏部侍郎參知政事吕餘慶以疾求解職丁卯罷為尚書左丞薛居正為門下侍郎樞密副使沈義倫為中書侍郎並平章事天平節度使石守信兼侍中歸德節度使高懷德忠武節度使王審琦並加同平章事盧多遜為中書舍人參知政事楚昭輔為樞密副使辛未殿前都虞候楊義為殿前都指揮使自韓重贇罷殿前都指揮使凡六年不除授於是以命義冬十一月少府監致仕盧億有髙識惡其子多遜所為嘗曰趙普元勳也而小子毁之禍必及我我得早死不及見其敗幸也十二月庚子億以憂卒女真遣使來貢馬是嵗盧多遜知制誥扈蒙張淡以見行長定循資格及泛降制書考正違異削去重復補其闕漏參詳議取悠久可用之文為長定格三卷循資格一卷制勑一卷起請條一卷書成上之頒為永式自是銓綜益有倫矣吕中曰既罷嵗月序遷法而復頒循資格既命陶榖定選法而又命吏部取選人堪升擢者上之誠以資格固不可拘亦不可廢也以資格用人者有司之法以不次用人者人主之權嘗考國初有為小官而其望已足為卿相至其久也亦卒為之自銓法一嚴無有流品無有賢否資深者序進格到者次遷然王安石章子厚之徒破資格用小人又不若李公沆王公旦謹守資格之為有得也甲戍開寶七年吳越漳泉奉正朔江南只稱甲戍北漢廣運七年春二月壬辰慶州言刺史姚內斌卒內斌在慶州踰十年邊人畏伏目為姚大蟲言其虓勇如虎也四月丙午命賈黃中檢視廣南民田黃中廉直平恕逺人便之監察御史劉蟠受詔於廬舒等州巡茶蟠乘羸馬偽稱商人抵民家求市民家不疑出茶與之即擒置於法秋七月江南國主知上有南伐意遣使願受封䇿上不許復遣梁迥使焉迥從容問國主曰朝廷今冬有柴燎之禮國主盍來助祭國主唯唯不答迥歸上始決意伐之初江南人樊若水舉進士不中第遂謀北歸先釣魚采石江上以小舫載絲繩其中維南岸而疾棹抵北岸以度江之廣狹凡數十往反而得其丈尺之數遂詣闕自言有䇿可取江南戊辰召若水為贊善大夫且遣使詣荆湖如若水之䇿造大艦及黃黑龍船數千艘將浮江以濟師也九月癸亥命曹翰領兵先赴荆南丙寅復命曹彬李漢瓊田欽祚同領兵繼之又命潘美劉遇梁迥等同領兵赴荆南冬十月江南國主遣其弟從鎰入貢上留之不報曹彬與諸將入辭上謂彬曰南方之事一以委卿切勿暴掠生民務廣威信使自歸順不須急擊也且以匣劔授彬曰副將而下不用命者斬之潘美等皆失色自王全斌平蜀多殺人上每恨之彬性仁厚故專任焉閏十月己酉曹彬等入池州先是上遣郝守濬自荆南以大艦載巨竹絙并下朗州所造黃黑龍船於采石磯跨江為浮梁或謂江闊水深古未有浮梁而濟者乃先試於石牌口丁巳曹彬等及江南兵戰於銅陵敗之庚申知制誥史館修撰扈蒙上言昔唐文宗每開延英召大臣論事必命起居舍人執筆螭坳以紀時政後唐明宗亦命端明殿學士及樞密直學士輪修日厯送史館近朝以來此事都廢帝王言動莫得而書緣宰相以漏泄為虞無因肯説史官以踈逺是隔何由得聞望自今凡有裁制之事優恤之言發自宸衷可書簡册者並委宰臣及參知政事每月輪知抄録以備史官撰習詔從之甲子監修國史薛居正等上所修五代史百五十卷明日上謂宰相曰昨觀新史見梁太祖暴亂醜穢之迹乃至如此宜其旋被賊虐也十一月詔移石牌鎮浮梁於采石磯繫纜三日而成不差尺寸王師過之如履平地契丹邊臣貽知雄州孫全興書請和全興以聞上命全興答書許之吕中曰和非中國得已之計也然和出於彼則和可堅和出於我則和易敗太祖當南征北伐之始而契丹復與太原相援以漢髙帝處此必有平城之憂唐太宗處此必有借助之舉惟太祖專任邊將來則拒之去則禦之且未嘗遣一騎以出境亦未嘗命一使以通和必待其邊臣貽書而後命邊臣以答之必待其來聘有禮而後遣通和之使以報之其得中國之體矣景德之和所以久而宣和之和所以敗者以景德之和在彼而宣和之和在我也乙亥開寶八年是嵗江南平吳越漳泉奉正朔北漢廣運八年春正月乙酉上謂宰相曰古之為君鮮能正身自致無過之地朕常夙夜畏懼防非窒欲庶幾以德化人之義如唐太宗受人諌疏直抵其失曽不愧耻豈若不為之而使下無間言哉為臣者或不終其名節而陷於不義蓋忠信之薄而獲福亦鮮斯可戒矣庚寅曹彬等進攻金陵初次秦淮舟楫未具潘美下令曰美提驍勇數萬人戰必勝攻必取豈限此一衣帶水而不徑渡乎遂率所部先濟王師隨之江南兵大敗二月甲子上謂宰臣曰年榖豐登人物繁盛若非上天垂祐何以及此所宜共思濟給振舉闕政庶成開泰之基也丁卯命王祐扈蒙梁周翰雷德驤並權同知貢舉戊辰上御講武殿覆試王祐等所奏合格舉人王式等因語之曰向者登科名級多為勢家所取致塞孤貧之路甚無謂也今朕躬親臨試以可否進退盡革疇昔之弊矣式等皆頓首謝於是內出詩賦題試得進士王嗣宗以下三十人諸科三十四人三月上性寬仁多恕尚食供膳有蝨緣食器旁謂左右曰勿令掌膳者知嘗讀堯典歎曰堯舜之世四凶之罪止從投竄何近代憲綱之密耶蓋有意於措刑也故自開寶以來犯大辟非情理深害者多貸其死夏四月教坊使衛德仁以老求外官且援同光故事求領郡上曰用伶人為刺史此莊宗失政豈可效之耶宰相擬上州司馬上曰上佐乃士人所處資望甚優亦不可輕授此輩但當於樂部遷轉耳乃命為太常寺太樂署令富弼曰古之執伎於上者出鄉不得與士齒太祖不以伶官處士人之列止以太樂令授之在流外之品所謂塞僭濫之原吕夷簡曰帝王尊異后族恩寵戚里優厚親幸以金帛富之可也賞賜厚之可也惟不使求官爵親政事撓刑法我太祖不許衛德仁領郡則曰用伶人為刺史此亂世之事不與王繼恩樞密使則曰內官不可使居權要職太宗不許戚里於秦隴市木則曰恐壞天下法制真宗不許趙自化領遙郡刺史則曰非朝廷舊典抑秦國之請則曰州縣之任係國家之公議違保吉之奏則曰有司自有常典斯可謂存天下之公抑親幸之私非聰明聖智之主孰能行之三聖之德於是超禹湯而齊堯舜也五月江南國主自出巡見王師列柵城外旌旗滿野始驚懼六月甲子彗出栁長四丈晨見東方西南指歷輿鬼距東凡十一舍八十三日乃滅秋七月江南捷書纍至羣臣稱賀從鎰即奉表請罪上嘉其得禮命李穆送從鎰還其國手詔促國主來降且令諸將緩攻以待之九月謀遣使入貢求緩兵道士周惟簡者國主召之為給事中與徐鉉同使京師冬十月己亥朔鉉及惟簡赴闕鉉居江南以名臣自負欲以口舌馳説存其國大臣亦先白上言鉉博學有才辨宜有以待之上笑曰第去非爾所知也既而鉉朝於廷仰而言曰李煜無罪陛下兵出無名煜以小事大如子事父未有過失奈何見伐上曰爾謂父子者為兩家可乎鉉不能對遣王仁圭焦繼勳同修洛陽宫室上始謀西幸也十一月徐鉉及周惟簡還江南未幾國主復遣入奏辛未對於便殿乞緩兵以全一邦之命其言甚切至上與反覆數四鉉聲氣愈厲上怒因按劔謂鉉曰不須多言江南亦有何罪但天下一家卧榻之側豈容他人鼾睡乎鉉惶恐而退仍各厚賜遣還上數因使者諭彬以勿傷城中人若猶困鬪李煜一門切無加害於是彬忽稱疾不視事諸將皆來問疾彬曰余之疾非藥石所愈須諸公共為信誓破城日不妄殺一人則彬之病愈矣諸將許諾乃相與焚香約言既畢彬即稱愈乙未城陷彬整軍成列至其宫城國主乃奉表納降彬既入金陵申嚴禁暴之令士大夫賴彬保全各得其所倉廩府庫委轉運使許仲宣按籍檢視彬一不問師旋舟中惟圖籍衣衾而已十二月己亥朔江南捷書至凡得州十九軍三縣一百有八戶六十五萬五千六十有五群臣皆稱賀上泣謂左右曰宇縣分割民受其禍思布聲教以撫養之攻城之際必有橫罹鋒刃者此實可哀也即詔出米十萬石賑城中飢民富弼曰太祖之愛民深矣王師平一方而不為喜蓋念民無定主當亂世則為強者所脅及中國之盛反以兵取之致有橫遭鋒刃者遂至於感泣也推是仁心而臨天下宜乎致太平之速先是上嘗召吳越進奏使任知果令諭旨於其王俶曰元帥克毗陵有大功俟平江南可暫來與朕相見即當復還不久留也丁卯俶請赴長春節朝覲詔許之丙子開寶九年吳越漳泉奉正朔北漢廣運九年春正月辛未曹彬遣郭守文奉露布以江南國主李煜及其子弟官屬等來獻徐鉉從煜至京師上召見鉉責以不早勸煜歸朝鉉對曰臣為江南大臣而國滅亡罪固當死不當問其他上曰忠臣也事我如事李氏又責張洎曰汝教李煜不降使至今日因出帛書示之乃王師圍城洎所草召江上救兵蠟彈內書也洎頓首請死曰書實臣所為也今得死臣之分也辭色不變上奇之謂曰卿大有膽朕不罪卿今事我無替昔之忠也乙亥以李煜為右千牛衛上將軍封違命侯庚辰詔幸西京將以四月有事於南郊二月己亥羣臣奉表請加尊號曰一統太平上曰燕晉未復遽可謂一統太平乎不許庚戍以宣徽院使曹彬為樞密使領忠武節度使樞密領節度自彬始山南東道節度使潘美為宣徽北院使節度領宣徽自美始賞江南之功也彬歸自江南詣閣門進榜子云奉勑差往江南勾當公事回時人嘉其不伐始彬之行上許彬以使相為賞及還語彬曰今方隅尚有未服者汝為使相品位極矣肯復力戰耶且徐之更為我取太原因密賜錢五十萬彬怏怏而退至家見布錢滿室乃歎曰好官亦不過多得錢爾何必使相也上愛惜爵位不妄與人類此凡以檢校官兼中書令侍中同平章事並謂之使相吕中曰人言漢高帝善將將者以不吝爵賞故也然當天下未定而信越諸人爵己王矣一旦固陵之會不至則不免裂數千里以封之此高帝有殺諸將之心矣國初平江南之功至大然寧賜以數十萬錢而靳一使相蓋品位已極則他日有功何以處之此終太祖之世而無叛將也林德慎曰曹彬之平江南吝一使相而不授非食言也慮其品位之極而不吾用也狄青之平嶺南欲豫以樞密而終輟非忘功也慮其名位之極無以為他日賞也己未吳越王俶及其子惟濬等入見崇德殿宴長春殿先是車駕幸禮賢宅案視供帳之具及至即詔俶居之寵賚甚厚上初即位召供備庫副使魏丕謂曰作坊久積弊爾為我修整之即授作坊副使丕在職甚盡力上討澤潞維揚下荆廣收川陜征河東平江南皆先期諭旨令治兵器無不精辦三月己巳以丕領代州刺史仍典作坊所造兵器每旬一進上親閲之列五庫以貯之尋又分作坊為南北别置弓弩院上將西幸留惟濬侍祠遣俶歸國先是羣臣皆有章疏乞留俶而取其地上不從於是命取一黃復以賜俶封識甚固戒俶曰途中宜密觀及啓之則皆羣臣乞留俶章疏也俶益感懼既歸每視事功臣堂一日命徙坐於東偏謂左右曰西北者神京在焉天威不違顔咫尺俶豈敢寧居乎益以乘輿服玩為獻製作精巧每修貢必列於庭焚香而後遣之丙子車駕發京師辛未上至西京庚子合祭天地於南郊初雨彌月不止及期始晴霽以訖成禮都民垂白者相謂曰我輩少經亂離不圖今日復觀太平天子儀衛有泣下者上生於洛陽樂其土風嘗有遷都之意始議西幸起居郎李符上書陳八難左右廂都指揮使李懷忠乘間言大梁根本安固已久不可動搖上亦弗從晉王言遷都非便上曰遷河南未已久當遷長安王叩頭切諌上曰吾將西遷者無他欲據山河之勝而去冗兵循周漢故事以安天下也王又言在德不在險上不答王出上顧左右曰晉王之言固善今姑從之不出百年天下民力殫矣丙午車駕發洛陽宫辛亥至東京吕中曰國初所以不都關中而都汴者以靈武燕薊之地未復也然洛與汴皆河南之土洛之險猶可恃而汴則無險可畏也欲為四方有事之備則當都洛陽髙城深池堅甲重兵以杜諸夏不虞之備伐北夷深入之謀若已都汴則不得不以守四夷為説此我太祖所以有都西京之議也然都汴固不得已都西京亦不得已也使太祖收靈夏復燕薊則必都長安矣初李煜既降諸城守皆相繼歸順獨江州不降詔曹翰率兵討焉自冬訖夏死者甚衆丁丑始拔之翰發怒屠城死者數萬人翰因請載廬山東林寺五百鐡羅漢像歸至頴川新造佛舍遂調發巨艦十餘艘盡載金帛置鐡像於其上時號為押綱羅漢六月己亥以頴州團練使曹翰為桂州觀察使仍判頴州賞平江南之功也晉王光義性仁孝上雅鍾愛間謂近臣曰晉王龍行虎步且生時有異必為太平天子福德非吾所及也秋八月丁未命伐北漢武寧節度使兼中書令王全斌卒全斌輕財重士不求顯赫之譽寬而容衆軍旅樂為之用其黜居外郡幾十年怡然自得識者多之富弼曰王全斌有大功可掩其罪也太祖以諸國未平恐將帥恃功為過故抑全斌等以立國法及事寧之後追賞前勳此真得駕馭英雄之術也冬十月癸丑上崩於萬嵗殿先是上不豫壬子夜大雪上召晉王光義延入大寢屬以後事宦官宫妾悉屏之左右皆不得聞但遙見燭影下晉王時或離席若有所遜避之狀既而上引柱斧㪬地大聲謂晉王曰好為之俄而上崩時漏下四鼓矣宋后見晉王愕然遽呼曰吾子母之命皆託於官家晉王泣曰共保富貴勿憂也甲寅太宗即位改名炅乙卯大赦天下令緣邊禁戢戍卒毋得侵撓外境羣臣有所論列並許實封表疏以聞必須面奏者閣門使即時引對風化之本孝弟為先或不順父兄異居别籍者御史臺及所在糾察之先皇帝創業垂二十年事為之防曲為之制紀律已定物有其常謹當遵承不敢踰越咨爾臣庶宜體朕心龜鑑曰孟子曰以天下與人易為天下得人難我太祖金戈鐡馬間關以有天下不付之璿源衍慶之諸王而乃授之太平福德之天子是不以天下自私而欲為天下得人之仁也元城先生曰太祖用心堯舜之心也舜之協堯禹之承舜我太宗獨無是心乎竊觀即政之初年嘗語大臣曰先帝以勤勞定天下凡軍國機務邊防制置咸得之矣但遵守舊規不得輒易噫善繼人之志善述人之事愚於斯言見之宰相薛居正加左僕射沈義倫加右僕射參知政事盧多遜為中書侍郎平章事樞密使曹彬加同平章事樞密副使楚昭輔為樞密使宰臣薛居正上大行皇帝陵名曰永昌詔恭依以齊州防禦使李漢超為雲州觀察使判齊州仍護關南屯兵洺州防禦使郭進領應州觀察使判邢州兼西山巡檢國初并益廣南各僭大號荆湖江表止通貢奉西戎北狄皆未賓服太祖垂意將帥分命漢超及進等控禦西北其家族在京師者撫之甚厚所部州縣管𣙜之利悉與之恣其回圖貿易免所過征稅許令召募驍勇以為爪牙凡軍中事悉聽便宜處置每來朝必召對命坐賜以飲食錫賚殊異遣還由是邊臣皆富於財得以養士用間洞見番夷情狀時有冦鈔亦能先知預備設伏掩擊多致克捷故終大祖世無西北之憂諸叛以次削平武功蓋世斯乃得壯士以守四方推赤心置人腹中之所致也時瀛州防禦使馬仁瑀監霸州軍仁瑀雖兄事漢超而多自肆由是二將交惡上恐生邊釁即遣使齎金帛賜漢超及仁瑀令置酒講解尋徙仁瑀知遼州漢超在齊州凡十七年為政簡易吏民信愛嘗詣闕請立碑頌德詔太子率更令徐鉉為之文與士卒絶甘分少及其死軍中皆流涕進守西山凡二十年在洺州日城四面悉令種柳濠中雜植荷芰蒲葦後益繁茂州人見之有泣者曰此郭公所種也詔諸道轉運使各察舉部內知州通判監臨物務京朝官等以三科第其能否政績尤異者為上恪居官次職務粗治者為中臨事弛慢所蒞無狀者為下嵗終以聞將大行誅賞焉吕中曰轉運置於乾德本以總利權耳而兼糾察官吏自此始厥後有判官有副使又有提點刑獄皆所以糾察官吏此漢部刺史職也本朝之監司以臺省寺監為之雖宰臣侍從為帥亦許彈劾此我宋三百餘年無藩鎮之患者蓋以此也又曰信矣監司之職其一道守令之觀望歟故監司志於守廉則留犢還珠郡有賢太守矣馴雉鳴琴邑有賢令尹矣監司志於律貪則望風解印自甘遁迹者矣故人私恩難庇二天者矣此我太宗特重轉運以察官吏者所以不輕於用人也十一月己巳翰林學士李昉上大行皇帝諡曰英武聖文神德廟號太祖十二月甲寅太宗御乾元殿受朝大赦改元太平興國元年丁巳以樞密直學士賈琰為三司副使三司置副使自琰始是嵗高麗國人金行成始入學於國子監宋史全文卷二
