body:
  text: 宋史全文卷一宋太祖一庚申建隆元年春正月辛丑朔鎮定二州言契丹入冦北漢兵自土門東下與契丹合周帝命太祖領宿衛諸將禦之太祖自殿前都虞候再遷都點檢掌軍政凡六年士卒服其恩威數從征伐薦立大功人望固已歸之於是主少國疑中外始有推戴之議壬寅殿前副都點檢慕容延釗將前軍先發時都下歡言將以出軍之日䇿點檢為天子士民恐怖爭為逃匿之計惟內庭晏然不知癸卯大軍出愛景門紀律嚴甚衆心稍安軍校苗訓者號知天文見日下復有一日黑光久相磨蕩指謂太祖親吏楚昭輔曰此天命也是夕次陳橋驛將士相與聚議曰主上幼弱我輩出死力破賊誰則知之不如先立點檢為天子然後北征未晚也都押衙李處耘具以事白太祖弟匡義及掌書記趙普因共以事理曉譬之曰太尉忠赤必不汝赦諸將相顧亦有稍稍引去者已而復集露刃大言曰軍中偶語則族今已定議太尉若不從則我輩亦安敢退而受禍普察其勢不可遏與匡義同聲叱之曰䇿立大事也固宜審圖爾等何得便肆狂悖乃各就坐聽命普復謂曰外冦壓境將莫誰何盍先攘却歸始議此諸將不可曰方今政出多門若俟冦退師還則事變未可知也但當亟入京城䇿立太尉徐引而北破賊不難茍不受䇿六軍決亦難使向前矣普謂匡義曰事既無可奈何政須早與約束因語諸將曰興王易姓雖云天命實繫人心前軍昨已過河節度使各據方面京師若亂不惟外冦愈深四方必轉生變若能嚴敕軍士勿令剽劫都城人心不搖則四方自然寧謐諸將亦可長保富貴矣皆許諾乃共部分夜遣衙隊軍使郭延贇馳告殿前都指揮使石守信都虞候王審琦二人皆素歸心太祖者也將士環列待旦太祖醉卧初不省甲辰黎明軍士擐甲執兵直叩寢門曰諸將無主願䇿太尉為天子太祖驚起披衣未及酬應則相與扶出聽事或以黃袍加太祖身且羅拜庭下稱萬嵗太祖固拒之衆不可遂相與扶太祖上馬擁逼南行匡義立於馬前請以剽劫為戒太祖度不得免乃攬轡誓諸將曰汝等自貪富貴立我為天子能從我命則可不然我不能為若主也衆皆下馬曰唯命是聽太祖曰少帝及太后我皆北面事之公卿大臣皆我比肩之人也汝等無得輒加凌暴近世帝王初入京城皆縱兵大掠擅劫府庫汝等無得復然事定當厚賞汝不然當族誅汝衆皆拜乃整軍自仁和門入秋毫無所犯宰相早朝未退聞變范質下殿執王溥手曰倉卒遣將吾輩之罪也爪入溥手幾出血溥噤不能對副都指揮使韓通自內庭奔歸將率衆備禦王彥升逐殺之并其妻子諸將翼太祖登明德門太祖令軍士解甲還營太祖亦歸公署釋黃袍俄而將士擁范質等俱至太祖嗚咽流涕曰吾受世宗厚恩為六軍所迫一旦至此慙負天地將若之何質等未及對散指揮都虞候羅彥瓌挺劒而前曰我輩無主今日必得天子質等不知所為溥降階先拜質不得已從之遂稱萬嵗太祖詣崇元殿行禪代禮召文武官就列至晡班定獨未有周帝禪位制書翰林承旨陶穀出諸袖中遂用之詔書曰天生蒸民樹之司牧二帝惟公而受禪三王乘時而革命其極一也豫末小子遭家不造人心已去天命有歸咨爾歸德軍節度使殿前都點檢趙某稟上聖之姿有神武之略佐我髙祖格于皇天逮事世宗功存納麓東征西怨厥績懋焉天地鬼神享于有德謳歌獄訟歸于至仁應天順人法堯禪舜如釋重負豫其作賔嗚呼欽哉祗畏天命宣徽使引太祖就龍墀北面拜受宰相扶太祖升殿易服東序還即位羣臣拜賀奉周帝為鄭王太后為周太后遷居西京乙巳詔因所領節度州名定有天下之號曰宋改元大赦吕中曰穎濵謂孟子不嗜殺人之言至是又驗矣蓋自後唐以來不五十年天下五易天人之厭亂極矣豈其使干戈麋爛不已而海內無一統之期哉唐明宗有天生聖人之祝而太祖實生于是年則天命所歸不待指日光相蕩而後知也自其掌軍政之時士卒服其恩威中外同于推戴則人心所屬不待次陳橋驛而後見也漢唐初興亦不過是然髙祖之取天下出于沛父老之請太祖之得天下亦出于軍士之擁迫不得已而為之其與唐太宗陷父于不義以起兵者異矣抑五代之亂帝王屢易者莫非藩鎮士卒也矧又有如石守信王審琦者將豈能帖然于下哉一號令之間秋毫無犯不惟救生靈塗炭之苦亦可革叔季兵戈之禍自非聰明神武而不殺者孰能與于此眉山蘇軾曰豫觀漢髙祖及光武及唐太宗及我太祖皇帝能一天下者四君皆以不嗜殺人者致之其餘殺人愈多而天下愈亂秦晉及隋力能合之而好殺不已故或合而復分或遂以亡國焉龜鑑曰戰國交爭而合于秦民苦秦暴秦不能一而漢一之南北分裂而合于隋人厭隋亂隋不能一而唐一之五季之餘分閏位天下紛紛而未一也我太祖得天下以仁而民從之故天下一于宋真人勃起開創大業是又跨唐虞越漢唐而與帝王匹休也亦知宋興之由乎我太祖之生蓋天成二年丁亥嵗也祥光瑞采流為精英異芳幽馥鬱為神氣帝王之興自有珍符信不誣也居有雲氣出有日暈天心之眷顧篤矣俚語稱趙神言誇宋人心之向慕久矣天與之人與之而太祖則不知也方其北面周朝奉命征討赫聲濯靈所向輒克顯德之七年太祖生三十有四年矣采薇采薇薇亦作止時蓋正月之上日也是月也京師已有推戴之語而內庭未之知我出我車于彼牧矣時蓋是月之三日也是日也將士又有推戴之語而太祖未之聞越翼日甲辰寢門未闢擁逼者至太祖未及語而黃袍已加之身矣噫河南之避舜猶有辭大垌之至湯猶有待事勢至此聖人不得以遊乎舜湯之天矣奈之何哉則亦有毋虐臣主之誓而已有毋掠民庶之誓而已三遜三辭黽勉而受之能律將士以保周宗而不能使周禪之不歸能擇長者房州之奉而不能遏陳橋之逼天實為之吾其謂何歐陽子紀五代史也書梁漢曰亡書晉曰滅至周則大書之曰遜于位宋興烏乎我宋之受命其應天順人之舉乎受命之日市不易肆仁之至也卧榻之側他睡不容義之盡也沛都仰給漕運故河渠最為急務先是嵗調丁夫開浚淤淺糗糧皆民自備丁未詔悉從官給遂著為式又以河北仍嵗豐稔穀價彌賤命髙價以糴之吕中曰沛與洛俱河南地也國家不都洛而都沛者以四方輻湊漕運之法逺近俱便故也東南之粟自沛河入陜西之粟自黃河入陳蔡之粟自惠民河入京師之粟自廣濟河入論四河之所入則東南為多此太祖所以有不及百年東南民力竭之憂而欲都西京也上之入也閭巷姦民往往乘便攘奪于是索得數輩斬于市被掠者官償其資戊申追贈韓通中書令以禮葬之嘉其臨難不茍免也以王彥升専殺終身不授節鉞乙卯遣使往諸州賑貸吕中曰上以甲辰即位而乙卯遂遣使賑貸豈有得天下之初欲以是要譽于人哉惟天惠民惟辟奉天當時之民苦于干戈苦于賦斂苦于刑役為人父母見子弟之飢寒則褰裳濡足以救之此武王下車未幾而散財發粟之心也以趙普為右諌議大夫樞密直學士皇弟匡義加睦州防禦使賜名光義立宗廟詔百官集議尚書省兵部尚書張昭等上奏曰謹按堯舜禹皆立五廟蓋二昭二穆與其始祖也有商建國改立六廟蓋昭穆之外祀契與湯也周立七廟蓋親廟之外祀太祖文王武王也伏請追尊髙曽四代號諡崇建廟室制可國朝宗廟之制嵗以四孟月及季冬凡五享朔望薦食薦新三年一祫以孟冬五年一禘以孟夏其七祀春祠司命及戶夏祀竈季夏别祭中霤秋祀門及厲冬祀行惟臘享禘祫遍七祀如親行告謝及新主祔謁即權罷時享告日用牢饌備祀官朱文公曰臣以為太祖受命之初未遑他事首尊四祖之廟後以太祖受命立極當為始祖而祫享東向而禧祖初無功德親盡當祧而已臣深考其説而以人心之所安者揆之則禧祖者太祖之髙祖考雖歷世久逺功德無傳然四世之後篤生神孫應天順人以寧兆庶其功德蓋不必自親為之然後為盛也二月尊帝母南郡夫人杜氏為皇太后以范質自司徒平章事昭文館大學士參知樞密院事加侍中王溥自右僕射平章事監修國史參知樞密院事加司空魏仁浦自樞密使中書侍郎平章事集賢院大學士加右僕射丙戌長春節宰相率百官上夀賜宴相國寺辛卯大宴于廣德殿凡誕節後擇日大宴自此始中書舍人扈蒙權知貢舉奏進士合格者楊礪等一十九人三月宿州火燔民廬舍萬餘區遣中使安撫之壬戌追尊祖考為皇帝妣為皇后髙祖幽都縣令朓諡曰文獻廟號僖祖陵曰欽陵祖妣崔氏諡曰文懿曽祖兼御史中丞珽諡曰惠元廟號順祖陵曰康陵祖妣桑氏諡曰惠明皇祖涿州刺史敬諡曰簡恭廟號翼祖陵曰定陵妣劉氏諡曰簡穆皇考周龍捷左廂都指揮使嶽州防禦使𢎞殷諡曰昭武廟號宣祖陵曰安陵有司言國家受周木德木生火宋繼周當以火德王色尚赤臘用戌從之曽鞏政要曰博士和峴言䄍始伊耆而三代有嘉平清祀䄍祭之名䄍臘之别名也漢承火德以戌日為臘臘接也言新以相接故田獵取禽以報百神享宗廟旁及五祀以教孝盡虔晉魏因之唐以土王貞觀之祭尚用前寅䄍百神卯日祭社官辰日臘宗廟至開元始定禮制三祭皆于臘辰以應土德議者是之宋興推應火德以戌日為臘而獨以前七日辛卯䄍不應于禮請如開元故事䄍百神祀社稷享宗廟同用戌臘如禮便制曰可兼判太常寺事竇儼上言三王之興禮樂不相沿襲聖宋建皇極一代之樂宜乎立名請改周樂文舞崇德之舞為文德之舞武舞衆成之舞為武功之舞改樂章十二順為十二安蓋取治世之音安以樂之義夏四月詔行之昭義節度使兼中書令太原李筠在鎮逾八年恃勇専恣招集亡命周世宗每優容之及上遣使諭以受禪筠即欲拒命左右為陳厯數乃僶俯下拜既延使者升階置酒張樂遽索周祖畫像置廳壁涕泣不已賔佐惶駭告使臣曰令公被酒失其常性幸毋怪也北漢主知筠有異志潛以蠟書誘筠筠雖具奏而反謀已決筠長子守節涕泣切諌筠不聽遂遣守節入朝且伺朝廷動靜上迎謂曰太子汝何故來守節矍然以頭擊地曰陛下何言此必有讒人間臣父也上曰吾亦聞汝數諌老賊不汝聽不復顧藉故遣汝來欲吾殺汝耳盍歸語而父我未為天子時任汝自為之我既為天子汝獨不能小讓我耶守節馳歸具以告筠反謀愈急于北漢納欵求援乙酉遣使分詣京城門賜飢民粥李筠又遣兵襲澤州殺刺史張福據其城丙戌昭義反書至樞密吳廷祚言于上曰潞州巖險賊若固守未可以嵗月破然李筠素驕易無謀宜速擊之彼必恃勇出鬭但離巢穴即成擒矣上納其言戊子上遣石守信髙懷德帥前軍進討上敕守信等曰勿縱筠下太原急引兵扼其隘破之必矣上召三司使張美調兵食是日大宴廣德殿張美言懷州刺史馬令琮度李筠必反日夜儲偫以待王師上善之亟令以團練使授令琮宰相范質言大軍北伐方藉令琮供億不可移他郡遂升為懷州團練使授之富弼曰太祖賞功任人深得其術懷州刺史知車駕將至日夜儲蓄以待王師故有團練之命用賞其勞又以移别郡則他官供億未必練其事必不能繼令琮之功故特升本州使名以授之恩寵如是之異其得人不盡力乎五月己亥朔日有食之上降服出次百官各守其司李筠復請北漢主舉軍南下北漢主從之傾國自將出柏林谷羣臣餞之汾水趙華曰李筠舉事輕易事必無成陛下掃境赴之臣未見其可也北漢主拂衣上馬行至太平驛遣其平章事衛融宣徽使盧贊將兵救筠筠留其長子守節守上黨自帥其衆南出上以畿甸委輸京師吏多旁緣為姦民或咨怨乙巳命殿中侍御史王伸監察御史王祐戶部郎中沈義倫等八人分領在京諸倉丁巳詔親征命吳廷祚為東京留守吕餘慶副之皇弟光義為大內都點檢韓令坤率兵屯河陽己未上發大梁壬戌西京留守向拱勸上急濟河踰太行乘賊未集而擊之稽留旬浹則其鋒益熾矣趙普亦言賊意國家新造未能出征若倍道兼行掩其不備可一戰而克上納其言甲子次河陽丙寅次懷州丁卯石守信等破賊三萬餘衆于澤州南獲北漢節度使范守圖殺盧贊筠遁入澤州嬰城自固六月己巳上至澤州督兵攻城逾旬不下上召指揮使馬全義賜食命坐問以計䇿全義請并力急攻緩之恐生變上即命諸軍奮擊全義率敢死士先登飛矢貫臂流血被體全義拔鏃進戰士氣益奮上率衛兵繼之辛巳克其城李筠赴火死獲其北漢宰相衛融乙酉進攻潞州丁亥筠子守節以城降上赦其罪升單州為團練用守節為使北漢主遁歸謂趙華曰卒如卿言吾幸全師以歸但恨失衛融盧贊爾丁酉上發潞州秋七月戊申上至京師初衛融之被執也上詰融曰汝教劉鈞助李筠反何也融從容對曰犬各吠非其主陛下宜速殺臣必不為陛下用縱不然終當間道走河東耳上怒命左右以鐵檛擊其首流血被面融呼曰臣得死所矣上曰忠臣也釋之以良藥傅其瘡命融為太府卿吕中曰先取澤潞所以通兩淮之咽喉次取淮南所以通兩淮之門戶自此而平吳蜀自此而取荆廣混一規模大略亦可覩矣初成德節度使郭崇聞上受禪時或涕泣監軍陳思誨密奏崇懷怨望上曰我素知崇篤于恩義此蓋感激所發耳然亦遣使偵之使者審崇無他即歸奏之上喜曰我固知崇不反也已而崇請入朝澶州蝗遣使督官吏分捕八月戊辰朔御崇元殿設仗衛羣臣入閣置待詔候對官賜廊下食保義節度使河東袁彥性凶率及聞禪代日夜繕甲治兵上命潘美往監其軍遂圖之美單騎入城諭令朝覲彥即治裝上道上喜謂左右曰潘美不殺袁彥成我志矣丙子徙彥為彰信節度使忠武節度使兼侍中陽曲張永德徙武勝節度使上將有事于北漢因密訪䇿略永德曰太原兵少而悍加以契丹為援未可倉卒取也臣愚以為每嵗多設遊兵擾其田事仍發間使諜虜絶其援然後可圖上曰善初上征澤潞趙普因皇弟光義請行許之及第推功賞上曰普宜在優等戊子以普為兵部侍郎充樞密副使九月丙午御崇元殿備禮册四親廟宰相率百官進名以奉慰淮南節度使兼中書令滄人李重進周太祖之甥也始與上俱事世宗分掌兵權及上受禪命韓令坤代重進為馬步軍都指揮使重進請入朝上意未欲與重進相見上謂翰林學士饒陽李昉曰善為我辭以拒之昉草詔云君為元首臣作股肱雖在逺方還同一體保君臣之分方契永圖修朝覲之儀何須此日重進得詔愈不自安乃招集亡命隂為背叛之計貶中書舍人趙逢為房州司戶參軍上之親征澤潞也山徑狹隘多石上自取數石于馬上抱之羣臣六軍皆爭負石逢憚涉險偽傷足留懷州及師還將除拜逢又稱疾請于私第草制上怒下御史劾其罪而黜之己未重進反書以聞上命石守信王審琦李處耘宋延握帥禁兵討之冬十月丁卯朔賜百官諸軍校冬服諸州長吏屯戌將士遣使就賜之壬申河決棣州厭次縣又決滑州靈河縣詔諸道所具版籍之數升降天下縣望以四千戶以上為望三千戶以上為緊二千戶以上為上千戶以上為中不滿千戶為中下仍請三年一貢戶口之籍别定升降從之凡望縣五十緊縣六十七上縣八十九中縣一百一十五中下縣一百一十總九十六萬七千三百五十三戶乙酉晉州言兵馬鈐轄鄭州防禦使荆罕儒戰沒北漢主欲生致罕儒及聞其死求殺罕儒者戮之上痛悼不已擢其子守勳為西京武德副使上問樞密副使趙普以揚州事宜普曰李重進守薛公之下䇿昧武侯之逺圖憑恃長淮繕修孤壘無諸葛誕之恩信士卒離心有袁本初之強梁計謀不用外絶救援內乏資糧急攻亦取緩攻亦取兵法尚速不如速取之上納其言丁亥下詔親征庚戌上發京師百司六軍並乘舟東下十一月甲辰次泗州捨舟登陸命諸將鼓行而前丁未至大義驛石守信遣使馳奏揚州即破請上亟臨視是夕次其城下登時攻拔之李重進盡室赴火死己酉賑給揚州城中民米人一斛十嵗以下給其半為重進脅以𨽻軍者賜衣屨縱之庚戌詔重進家屬部曲並釋罪逃亡者聽自首尸骼暴露者收瘞之役夫死城下者人賜絹三匹復其家三年吕中曰上之入京也韓通率衆備禦上之即位也李筠泣周祖畫像以起兵重進以周祖之甥而起兵雖在周為頑民在商為忠臣然三人者皆不知天命之所歸也正易所謂後夫凶也乙卯唐主李景遣左僕射江都嚴續來犒師庚申復遣其子從鎰戶部尚書新安馮延魯來置宴上厲色謂延魯曰汝國主何故與吾叛臣交通延魯曰陛下徒知其交通不知預其反謀也上詰其故延魯曰重進使者館于臣家國主令人語之曰男子不得志固有反但時有可不可陛下初立人心未安交兵上黨當是時不反今人心已定方隅無事乃欲以殘破揚州數千弊卒抗萬乘之師借使韓白復生必無成理雖有兵食不敢相資重進卒以失援而敗上曰雖然諸將皆勸吾乘勝濟江何如延魯曰陛下神武御六師以臨小國蕞爾江南安敢抗天威然國主侍衛數萬皆先主親兵誓同生死陛下能棄數萬與之血戰則可矣且大江風濤茍進未克城退乏糧道亦大國之憂也上笑曰聊戲卿耳豈聽卿遊説耶十二月己巳上發揚州丁亥至京師上既即位欲隂察羣情鄉背頗為微行或諌曰陛下新得天下人心未安今數輕出萬一有不虞之變其可悔乎上笑曰帝王之興自有天命求之亦不可得拒之亦不能止周世宗見諸將方面大耳者皆殺之然我亦終日侍側不能害我若應為天下主誰能圖之不應為天下主雖閉門深居何益既而微行愈數曰有天命者任自為之我不汝禁也由是中外懾服親軍校有獻手檛者上曰此何以異于常檛而獻之軍校密言曰陛下試引檛首視之檛首即劒柄也有刃韜于柄中居常可以為杖緩急以備不虞上笑投之于地曰使我親用此物事將奈何且當是時此物固足恃乎一日罷朝坐便殿不樂者久之左右請其故上曰爾謂天子為容易耶屬乘快指揮一事而誤故不樂耳嘗彈雀于後苑或稱有急事請見上亟見之其所奏乃常事爾上怒詰之對曰臣以為尚急于彈雀上愈怒舉斧柄撞其口墮兩齒其人徐俯拾齒置懷中上罵曰汝懷齒欲訟我乎對曰臣不能訟陛下自當有史官書之也上悅賜金帛慰勞之辛酉建隆二年春正月丙申朔御崇元殿受朝賀御廣德殿羣臣上夀壬寅幸造船務觀習水戰己酉上御明德門觀燈壬子商州言羣鼠食苗詔蠲其常賦周顯德末分命常參官詣諸州度民田多為民所訴上將循世宗之制謂侍臣曰度田蓋欲勤恤下民而民愈弊甚今當精擇其人以副朕意丁巳分遣常參官詣諸州度民田吕中曰孟子所謂經界與後人所謂經界異孟子以井地不均穀祿不平而行經界後世以民産不均稅錢不登而正經界也蓋民産不均則業歸大家而産留下戶稅錢不登則官失其利而必多取于民國初經界之法未行則度田之使不可以不遣版籍戶鈔不可以不作也然上之遣使則曰勤恤民隱豈若建武檢校墾田多有煩擾者哉詔發京師陳許丁夫以陳承昭督之道閔水自新鄭與蔡水合貫京師南以通淮右舟楫監修國史王溥等上唐會要一百卷詔藏史館二月丙寅幸飛山軍營閲炮車命給事中范陽劉載往定陶督曹單丁夫三萬浚五丈渠自都城北厯曹濟及鄆以通東方之漕上因謂侍臣曰煩民奉己之事朕必不為也開導溝洫以濟京邑蓋不獲己耳癸酉權知貢舉竇儀奏進士張去華等合格者十一人甲戌幸城南觀修水匱先是藩鎮率遣親吏視民租入槩量增益公取餘羡符彥卿在天雄軍取諸民尤悉上聞之即遣常參官分主其事民始不困於重斂于是出公粟賜彥卿以愧其心舊制竊盜贓滿絹三匹者棄市己丑改為錢三千其陌八十令民二月至九月無得採捕蟲魚彈射飛鳥有司嵗申明之令文武官及致仕官僧道百姓自今長春節及他慶賀不得輒有貢獻三月上步自明德門幸作坊宴射酒酣顧前鳳翔節度使兼中書令臨清王彥超曰卿曩在復州朕往依卿卿何不納我彥超降階頓首曰當時臣一刺史耳勺水豈可容神龍乎使臣納陛下陛下安有今日上大笑而罷閏三月甲子朔彥超上表待罪于私第上遣中使慰撫之因謂侍臣曰沈湎于酒何以為人朕或因宴會至醉經宿未嘗不悔也丁丑金商房三州民飢遣使賑之詔課民種植每縣定民籍為五等第一種雜木百每等減二十為差桑棗半之男女十嵗以上人種韭一畦闊一步長十步乏井者鄰伍為鑿之令佐以春秋巡視其數秩滿赴調有司第其課而為之殿最又詔自今民有逃亡者本州具戶籍頃畝以聞即檢視之勿使親鄰代輸其租夏四月癸巳朔日有食之甲午大名館陶民郭贄詣闕訴括田不均詔令他縣官按視所隱頃畝皆實上怒本縣令程迪決杖流海島給事中常凖為括田使責降兩官左贊善大夫申文緯奉詔按田清河縣令李瑶受贓文緯不之察為部民所訴杖殺李瑶文緯除籍為民漢初犯私麴者並棄市周祖始令至五斤死上以周法尚峻壬申詔民犯私麴十五斤以私酒入城至三斗者始處極典其餘罪有差私市酒麴減造者之半上又以前朝鹽法太峻是日定令官鹽闌入禁地貿易至十斤煮鹻至三斤者乃坐死民所受蠶鹽以入城市三十斤以上者奏裁五月癸亥朔上御崇元殿受朝服通天冠絳紗袍仗衛如式皇太后寢疾上憂懼乃曲赦天下乙丑天狗墮西南甲戌令殿前侍衛司及諸州長吏閲所部兵驍勇者升其籍老弱怯懦者去之初置剩員以處退兵舊制文武常參官各以曹務間劇為月限考滿即遷上謂宰相曰若是非循名責實之道會魏仁滌等治市征有羡利己卯並詔增秩因罷嵗月序遷之制令諸州勿復調民給傳置悉代以軍卒五代以來刑典弛廢州郡掌獄吏不明習律令守牧多武人率恣意用法金州民馬從玘子漢惠無賴嘗害其從弟又好為敓􅼈閭里患之從玘與妻及次子共殺漢惠防禦使仇超判官左扶悉按誅從玘妻及次子上怒超等故入死罪令有司劾之並除名流於海島自是人知奉法矣六月甲午皇太后杜氏崩后聰明有智度每與上參決大政猶呼趙普為書記常撫之曰趙書記且為盡心吾兒未更事也寢疾上侍藥餌不離左右疾革召普入受遺命后問上曰汝自知所以得天下乎上嗚咽不能對后曰吾方語汝以大事而但哭耶問之如初上曰此皆祖考及太后之餘慶也后曰不然政由柴氏使幼兒主天下羣心不附故耳汝與光義皆我所生汝後當傳位汝弟四海至廣能立長君社稷之福也上頓首泣曰敢不如太后教因謂普曰汝同記吾言不可違也普即就榻前為誓書于紙尾署曰臣普記上藏其書于金匱命謹密宫人掌之講義曰以皇太后而知社稷之至計蓋有聖母必有聖子也髙曹向孟之賢始于此龜鑑曰慈闈一語金匱預盟十七載倦勤之後舉神器之大挈而授之龍行虎步之天子堯舜授受曽不是過劉元城嘗曰三代而下漢唐不能倣佛其萬一蓋亦歎詠于斯云壬子翰林學士單父王著言時雨稍愆請令近臣按舊禮告天地宗廟社稷及望告海瀆嶽鎮于北郊詔從之丁巳吏部郎中閻式奪兩任官式監納河陽夏稅倉上得式所收一斛有五升之羡故黜之其後右衛率府率薛勳著作佐郎徐雄亦坐監納民租槩量失平皆免官初上既誅李筠及重進一日召趙普問曰天下自唐季以來數十年間帝王凡易八姓戰鬭不息生民塗地其故何也吾欲息天下之兵建國家久長之計其道何如普曰陛下之言及此天地神人之福也此非他故方鎮太重君弱臣強而已今所以治之亦無他奇巧惟稍奪其權制其錢穀收其精兵則天下自安矣語未畢上曰卿勿復言吾已喻矣時石守信王審琦等皆上故人各典禁衛普數言于上請授以他職上不許普乘間即言之上曰彼等必不吾叛卿何憂普曰臣亦不憂其叛也然熟觀數人者皆非統御才恐不能制伏其下則軍伍間萬一有作孽者彼臨時亦不得自由耳上悟于是召守信等飲酒酣屏左右謂曰我非爾曹之力不得至此念爾曹之德無有窮盡然天子亦大艱難殊不若為節度之樂吾終夕未嘗敢安枕而卧也守信等皆曰何故上曰是不難知矣居此位者誰不欲為之守信等皆頓首曰陛下何為出此言今天命已定誰敢復有異心上曰不然汝曹雖無異心如麾下之人欲富貴者何一旦以黃袍加汝之身汝雖欲不為其可得乎皆頓首涕泣曰臣等愚不及此惟陛下哀矜指示可生之途上曰人生如白駒之過隙所以好富貴者不過多積金錢厚自娛樂使子孫無貧乏耳爾曹何不釋去兵權出守大藩擇便好田宅市之為子孫立永逺不可動之業多置歌兒舞女日夕飲酒相歡以終其天年我且與爾曹約為婚姻君臣之間兩無猜疑上下相安不亦善乎皆拜謝曰陛下念臣等至此所謂生死而骨肉也明日皆稱疾請罷上喜所以慰撫賜賚之甚厚庚午以侍衛都指揮使石守信為天平節度使殿前副點檢忠武節度使髙懷德為歸德節度使殿前都指揮使義成節度使王審琦為忠正節度使侍衛都虞候鎮安節度使張令鐸為鎮寧節度使皆罷軍職獨守信以侍衛都指揮使如故其實兵權不在也吕中曰禁衛之兵驕方鎮之權重五代以干戈智力取之而不足太祖以杯酒宴笑收之而有餘人徒見其收之易而不知其收之者固自有本也封建非能弱周周自弱也藩鎮非能亡唐唐自亡也使平王能復父之讎則勤王之師諸侯畢會天下必無春秋矣使威烈王能正韓魏之罪則齊楚諸國拱手聽命天下必無戰國矣使唐非有哲婦濁亂于內則漁陽鼙鼓必不啓方鎮之禍于其始非有宦官根固于內則賊溫鋒刃必不成方鎮之禍于其終太祖之所以能收其權者正孟子所謂為政不得罪于巨室裴度所謂處置得宜有以服其心不然無故而行削國之䇿豈不動七國之變哉朱文公曰趙韓王佐太祖區處天下收許多藩鎮之權立國家三百年之安豈不是仁者之功范質奏疏言宰相者以舉賢為本職以掩善為不忠所以上佐一人開物成務端明殿學士吕餘慶樞密副使趙普富有時才精通治道經事霸府厯嵗滋深自陛下委以重難不孤注倚每因款接備覩公忠伏乞授以台司俾申才用今宰輔未備久難其人以二人器能實攀附之幸會置之此任孰謂不然上嘉納之命內客省使王贊權知揚州軍府事贊乘舟以往溺于閶橋上嗟悼謂左右曰是殺吾樞密使也贊常為河北諸州計度使五代姑息藩鎮有司不敢繩以法贊振舉綱維所至發擲姦伏無所忌上知贊可付以事因使完葺揚州蓋將大用之而贊遽死贊觀城人也是月陳承昭塞棣滑決河役成賜錢三十萬八月甲辰義武節度使孫行友在鎮逾八年上初即位行友不自安纍乞解官歸山上不許行友懼將據山寨以叛兵馬都監樂繼能密表其事上遣武懷節會鎮趙之師直入定州出詔示之令舉族歸朝行友倉皇聽命既至削奪官爵禁錮私第辛亥女真國遣嗢突刺來貢名馬吕中曰女真去京師幾千里而貢馬中國之盛衰夷狄未嘗不知之也然當陽長之時而隂稚已伏矣宣和之遣使亦自沙門島渡海一路然建隆之貢馬是夷狄求通于中國也宣和之遣使是中國求通于夷狄也安得不啓中原之禍永濟縣主簿郭顗坐贓一百二十萬棄市詔緣邉諸寨有犯大辟者送所屬州軍鞫之無得輒斷曹州寃句令侯陟以清幹聞甲寅擢左拾遺知縣事節度使袁彥頗為不法陟抗章言之彥上表謝自陳其無罪上亦不窮治焉丁巳詔刑部應諸道州府有犯鹽麯人合配役者祗令本州充役甲子契丹解利來降戊子遣鞍轡庫使梁義如江南弔祭上召見面賜約束因謂左右曰朕每遣使四方常諭以謹敕頗聞鮮克由禮逺人何觀焉左右請齊之以刑上曰齊之以刑豈若其自然邪要當審擇其人耳初五代募民盜戎人馬官給其直籍數以補戰騎之闕上欲敦信保境戊戌勑沿邉諸州禁民無得出塞侵盜前所盜馬盡令還之由是夷狄畏慕不敢內侮是月命知制誥河內盧多遜看詳進䇿獻書人文字升降以聞十一月己巳幸國子監十二月壬辰回鶻遣使來貢方物甲午于闐遣使來貢方物癸未詔以濠楚民飢令長吏開倉賑貸始置藏冰務常以孟夏祭玄𡨕之神乃開冰薦于太廟壬戌建隆三年南唐吳越荆南湖南漳泉奉正朔蜀稱廣政三十五年北漢天會七年春正月己巳命淮南道官吏發倉廩以賑飢民初戶部郎中沈義倫使吳越歸言揚泗飢民多死郡中軍儲尚百餘萬可貸至秋乃收新粟有司沮義倫曰若嵗薦飢將無所取償孰當執其咎者上以詰義倫義倫曰國家方行仁政自宜感召和氣立致豐稔寧復憂水旱耶上悅故有是命詔諸州長吏勸課農桑自後或因嵗首必下此詔禁諸州鐵鑞錢及江南所鑄唐國通寶錢民間有者悉送于官庚辰女真國遣使只骨來修貢癸未幸國子監二月庚寅令翰林學士文班常參官曽任職幕州縣者舉堪為賔佐令録一人如有近親亦聽內舉異時貪濁畏懦職務曠廢者舉主坐之癸巳令諸道州府依法斷獄毋得避事妄奏取裁違者量罪停罰甲午詔自今每五日內殿起居百官以次輪對並須指陳時政得失朝廷急務或刑獄寃濫百姓疾苦咸采訪以聞事關急切者許非時詣闕上章不得須候次對吕中曰國朝之制宰輔宣召侍從論思經筵留身翰苑夜對二史直前羣臣召對百官轉對監司郡守見辭三館封章小臣特引臣民投匭太學生伏闕外臣附驛京局發馬遞鋪蓋無一日而不可對無一人而不可言也然太祖詔指陳時政直書其事不在廣有牽引太宗令宰執樞密各述送軍儲至靈武合發軍糧多少舉兵深入合用兵幾何何人監領何人監護直書其事言不必文此皆聽言以實也今世不患人主之不求言也而患求之而不及用不患天下之不敢言也而患盡言而無所用豈非病于議論之繁多歟己丑詔竊盜贓滿五千足陌者乃處死壬寅上謂近臣曰今之武臣欲盡令讀書貴知為治之道近臣皆莫對史臣李沆曰昔光武中興不責功臣以吏事及天下已定數引公卿郎將講論經義夜分乃罷蓋創業致治自有次第今太祖欲令武臣讀書可謂有意于治矣近臣不能引為對論者非之丙辰幸國子監三月戊午控鶴右廂都指揮使尹勳督丁夫浚五丈河陳留丁夫夜潰勳擅斬其隊長十餘人追獲亡者七十餘人皆刖其左耳有詣闕稱寃者兵部尚書李濤以病卧家力疾草奏乞斬勳以謝百姓濤家人曰公久病宜自愛養朝廷事姑置之濤憤然曰死者人之常吾豈能免但我為兵部尚書知軍校無辜殺人豈得不論上覽其奏嘉之然念勳素忠勇止薄責焉削奪官爵配𨽻許州為教練使壬戌三佛齊國遣使朝貢癸亥命近臣于京城祠廟禱雨甲子詔以沂州民飢賜種食上謂宰臣曰五代諸侯跋扈多枉法殺人朝廷置而不問姑息藩鎮當如此邪乃令諸州決大辟訖録俱聞奏委刑部詳覆之丙子權知貢舉王著奏進士馬適等合格者十五人丁丑女真遣使朝貢戊寅詔三司春冬送戌卒衣並官給車乘毋得調發民丁丁亥徙北漢降民于邢洺州計口賦以粟禁民以火葬詔增官鹽闌入至三十斤煮鹻至十斤坐死􅑄鹽入城市百斤以上奏裁又修酒麯之禁夏四月庚子西州回鶻阿督等來貢方物壬寅邢州言漢民四百七十人來降定難節度使李彛興遣使貢馬三百匹上方命玉工治帶召其使問彛興腰圍幾何遂遣使以帶賜之彛興感服五月甲子幸相國寺禱雨河北諸州旱遣中使視之又命司勳郎中何幼沖等六人乘傳檢旱苗甲申幸太清觀又幸相國寺禱雨乙酉詔撤樂太官進蔬食詔縣令佐檢察差役務砥均平或有不當者許民自相糾舉陳平甫曰差役古法也國初循舊制衙前以主宫物里正戶長鄉手以課督賦稅耆長弓手壯丁以逐捕盜賊承符人力手力散從官以奔走驅使在縣曹司至押録在州曹司至孔目官下至雜職院虞候等人各以鄉戶等第差熙寧四年始議使民出錢官為雇役謂之免役錢六年又行保甲法置保正副大小保長察盜七年輪保丁充甲頭催稅罷募戶長壯丁八年罷耆長令保正保長管幹别立庸直雇承帖人𨽻其下元豐八年有言耆壯之役則歸于保甲之正長戶長之役則歸于催稅甲頭是使民出錢免役而復使執役也紹聖元年復雇役法二年以大保長催稅罷差保頭以舊耆長錢支保正戶長錢支保長壯丁錢支承帖人靖國元年拘收大保長雇錢紹興二年拘收耆戶長雇錢十二年拘收壯丁雇錢蓋自保正長承帖人雇錢並起發而充役如故民力于是困矣此其大略也而其患皆起于以保甲代役戶寬狹不均重為民病六月辛卯詔宿州發廩賑飢民周世宗之二年始營國子監置學舍上既受禪即詔有司增葺祠宇塑繪先聖先儒之像上自贊孔顔命宰臣兩制以下分撰餘贊車駕一再臨幸焉崔頌判監事始聚生徒講書上聞而嘉之乙未遣中使遍賜以酒果尋又詔用一品禮立十六戟于文宣王廟門己亥德音減京畿及河北諸州死罪以下囚旱故也壬寅雨秋七月禁中元張燈乙丑知舒州左諌議大夫歷城馮瓚言州界有菰蒲魚鱉之利居民每以自給前防禦使司超增收為市征漁奪苛細疲俗告病宜蠲除之上即從其請雲捷軍士有偽刻侍衛司印者捕得斬之上曰諸軍比加簡練尚如此不逞耶庚辰命搜索悉配海島于是姦猾斂迹己卯北漢捉生指揮使路貴等十一人來降並補內殿直辛巳遣給事中劉載等十人按行河北諸州旱田詔朝臣出使還日具所見民間利病以聞右衛率府率薛勳掌常盈倉受民租槩量重詔免勳官配𨽻沂州倉吏棄市兖濟德磁洛五州蝗八月甲戌朔勑大理卿范陽劇可久為光祿卿致仕可久年逾七十無請老意上特命之乙未左拾遺知制誥虞鄉髙錫上言近廷臣承詔各舉所知或有因行賂獲薦者請自今許近親奴婢鄰里告訴加以重賞又請注授法官及職官各宜問書法十條以代試判上皆施行之詔及第舉人不得呼知舉官為恩門師門及自稱門生壬申詔崔頌修武成王廟仍委頌檢討唐末以來謀臣名將勳庸尤著者以名聞癸酉以次對章奏下集尚書省官參詳其有禆政治可施行者以聞丙子占城國遣使朝貢九月癸未復置書判拔萃科武安節度使兼中書令周行逢病革召其將吏以其子保權屬之曰衡州刺史張文表常怏怏不得行軍司馬吾死文表必叛當以楊師璠討之如不能則嬰城勿戰自歸朝廷可也冬十月乙酉朔始賜文武常參官服有司言故事所賜止將相學士及諸軍大校上曰不及百官甚亡謂也乃並賜之丙戌幸造船務觀習水戰癸巳有司上新刪定循資格長定格編敕格各一卷詔選人三十以下依舊不得入令録餘皆可己亥幸嶽臺令諸軍習騎射廣濟縣令李守中坐贓決杖配沙門島辛丑以樞密副使兵部侍郎趙普為檢校太保充樞密使樞密使不帶正官自普始也張文表聞周保權立怒曰我與行逢俱起微賤立功名今日安能北面事小兒乎會保權遣兵更戍永州路出衡陽文表遂驅以叛保權即命楊師璠悉衆討文表告以先人之言感激涕泣師璠亦泣顧謂其衆曰汝見郎君乎年未成人而賢若此軍士奮然皆思自效保權又遣使求援于荆南且來告文表亦上疏自理十一月辛酉大閲于西郊癸亥詔羣臣使諸道無得私有請託違者當議其罪甲子又大閲上謂近臣曰晉漢以來衛士不下數十萬然可用者極寡朕頃按籍而閲之去其冗弱又親校其擊刺騎射之藝今悉為精鋭故順時令而講武焉詔殿前侍衛兩司將校無得冗占直兵限其數著于令先是按令文州縣官撫育有方戶口增益者各準見戶每十分加一分刺史縣令各進考一等其州戶不滿五千縣戶不滿五百各準五千五百戶法以為分若撫養乖方戶口減耗各準增戶法亦減一分降考一等主司因循例不進考唯按視闕失不以輕重便書下考至是有司上言自今請以減損戶口一分科納係欠一分已上並降考一等如以公事曠遺有制殿罰者亦降一等從之丙子三佛齊國王釋利耶髙麗國王昭並遣使來貢方物壬子初班厯于江南十二月舊制強盜贓滿十匹者絞庚寅詔改為錢三千足陌者處死癸巳詔中書門下每縣復置縣尉一員自萬戶至千戶各置弓手有差庚子有司上捕賊條詔頒行之令尉與賊鬭而盡獲者並賜緋尉除令仍超兩資令别加升擢上以西鄙羌戎屢為冦鈔選姚內斌為慶州刺史上謂近臣曰安邉御衆須是得人若分邉寄者能稟朕意則必優恤其家屬厚其爵祿多與公錢聽其召募驍勇以為瓜牙茍財用豐盈必能集事朕雖減後宫之數極于儉約以備邉費亦無所惜也河北陜西京東諸州旱蝗河北尤甚悉蠲其租蜀主命官磨勘四鎮十六州逋稅自廣政十五年至二十年别行追督龍遊令成都田淳上疏諌蜀主不能用淳每謂所親曰吾觀僭偽改廳堂為宫殿改紫綬為黃服改前驅為警蹕改僚佐為卿相改妻妾為妃后何如常稱成都尹乃無滅族之禍乎或謂淳曰君之才固堪重寄宜稍低抑便至金鑾玉堂淳曰吾安能附狗鼠哉蓋指樞密使王昭逺輩也癸亥建隆四年是年改為乾德元年是嵗荆南湖廣平唐國吳越漳泉奉正朔蜀稱廣政二十六年南漢天寶六年北漢天會八年正月庚申以慕容延釗李處耘討張文表先是盧懷忠使荆南上謂曰江陵人情去就山川向背我盡欲知之懷忠使還報曰髙繼沖甲兵雖整而控弦不過三萬年穀雖登而民困于暴斂南通長沙東距建康西迫巴蜀北奉朝廷觀其形勢蓋日不暇給取之易耳于是上召宰相范質等謂曰江陵四分五裂之國今假道出師因而下之蔑不濟矣壬戌李處耘辭上以成算授之乙丑幸造船務觀造戰船吕源曰太祖太宗創業之主真宗守文之主三朝皆以九重之尊萬乘之重臨幸官局其造船務茶庫水磑開封府綾錦院染院作坊左藏內藏庫龍衛營殿前班騏驥飛龍院天駟監內外百司不測而至太祖建隆二年四月步自明德門幸作坊開寶八年七月幸染院監察御史劉蟠監典工作衣短後衣芒屩持梃頭蓬不治迎謁車駕太祖喜其勤賜錢二十萬以是觀之天子步出內門至于監官芒屩蓬頭迎謁可見其簡易也太宗皇帝建隆三年兩幸國子監乾德六年三幸飛龍院建隆二年四幸造船務是時國家創業之始國史所載人君勤勞尚且如此則為守成者豈不愧哉己卯女真國遣使來貢方物楊師璠取潭州執文表斬于市二月丙戌天雄節度使符彥卿來朝上欲使彥卿典兵樞密使趙普以為彥卿名位已盛不可復委以兵柄屢諌不聽上曰卿苦疑彥卿何也朕待彥卿至厚彥卿豈能負朕耶普曰陛下何以能負周世宗上默然事遂中止李處耘至襄州遣丁德裕諭髙繼沖以假道之意孫光憲謂繼沖曰中國自周世宗時已有混一天下之志聖宋受命凡所措置規模益宏逺今伐文表如以山壓卵爾湖湘既平豈有復假道而去耶不若早以疆土歸朝廷去斥堠封府庫以待則荆楚可免禍而公亦不失富貴繼沖大懼遣客將王昭濟等奉表以三州十七縣十四萬二千三百戶來歸吕中曰善取天下者先易而後難先近而後逺先瑕而後堅故秦人欲攻諸侯范睢以為先韓魏而後齊楚唐憲宗欲平藩鎮張𢎞靖以為先淮蔡而後魏博周世宗欲平天下王朴以為先江南而後河東太祖之規模先澤潞淮南次湖南荆襄而後及于江南廣蜀之地諸國既平而後及于河東蓋得後先攻進之機矣王師既收復荆南益發兵日夜趨朗州周保權懼召觀察判官桂人李觀象謀之觀象曰凡所以請援于朝者誅張文表耳今文表已誅而王師不還必將盡取湖湘之地也莫若幅巾歸朝幸不失富貴保權將從之指揮使張從富等不可乃相與為拒守計庚子荆南表至上復命髙繼沖為節度使上遣使諭周保權及將校曰爾本請師救援故發大軍以拯爾難今妖孽既殄是有大造于汝輩也何為反拒王師自取塗炭重擾生聚保權為左右所制執迷不復遂進討之遣使往澶滑魏晉絳蒲孟開倉賑貸權知貢舉浚儀薛居正奏進士蘇德祥等合格者八人三月張從富等出軍于灃州南與王師遇賊軍望風而潰壬戌王師入朗州禽張從富于西山下梟其首賊將汪端劫周保權并家屬亡匿江南岸李處耘遣田守竒往捕之獲保權以歸于是盡復湖南舊地凡得州十四監縣六十六戶九萬零七千三百八十八癸酉吏部尚書張昭等詳定五刑之制凡流刑四徒刑五杖刑五笞刑五令州縣復置義倉官所收二稅碩别輸一斗貯之以備凶險夏四月甲申以旱分命使臣遍禱京城祠廟是夕雨丁亥幸國子監遂幸武成王廟詔自今祠祭宿齋並令儀鸞司供帳務極嚴潔庚寅鑿池于朱明門外造樓船百艘選卒號水虎捷習戰池中辛卯王處訥上新定建隆應天厯上為厯序頒行之庚子以華州團練使大城張暉為鳳州團練使上既誅李筠將事河東召暉入覲問以計䇿暉曰澤潞瘡痍未瘳軍旅臶興恐不堪命不若戢兵育民俟富庶而後圖之上慰勞遣還于是始謀伐蜀乃徙暉鳳州暉盡得其山川險易因密疏進取之計上覽之甚悅命磁州分間田以處北漢降民仍賜耕牛及錢米乙巳幸玉津園閲諸軍騎射令諸州造輕車以給餽運五月蜀宰相李昊言于蜀主曰臣觀宋氏啓運不類漢周一統海內其在此乎若通職貢亦保安三蜀之長䇿也蜀主將發使樞密使王昭逺固止之乃率兵屯峽路增置水軍六月初上幸武成王廟歷觀兩廊所畫名將以杖指白起曰起殺已降不武之甚胡為受享于此命去之乃語吏部尚書張昭工部尚書竇儀别加裁定取功業始終無瑕者癸巳昭等共議請升漢晉宋後魏北齊後周唐凡二十三人退魏漢後漢晉北齊隋唐凡二十二人詔升退如昭等議乙未直史館梁周翰上言唐室崇奬太公蓋以天下雖大不可去兵覬張國威遂進王號事雖不經義足垂勸今若求其義類别定否臧茍欲指瑕誰當無纍或從澄汰盡可棄捐上以升降之制有所懲勸不報丙申令有司三嵗一舉先代帝王祀典各以功臣配享乙亥潭濮曹絳等州言有飛蝗在野各命其長吏祭以牢醴後皆言蝗不為災庚子羣臣三上表請舉樂從之丙午分命中使謝嶽瀆雨足故也以久雨賜諸軍薪蒸有差太常博士和峴上言䄍者臘之别名聖朝以戌日為臘而前日辛卯行䄍禮非是按唐貞觀中以前寅䄍百神卯日祭社稷辰日臘享宗廟開元定禮三祭皆于臘辰以應土德或從貞觀或從開元惟上所擇有司請依開元禮三祭同用戌臘日從之唐主雖通職貢然亦增修戰備己酉命鎮國節度使宋延渥帥禁旅數千習戰于新池上數臨觀焉命大理正奚嶼知館陶縣監察御史王祐知魏縣楊應夢知永濟縣屯田員外郎于繼徽知臨清縣常參官知縣自嶼等始也時符彥卿久鎮大名専恣不法屬邑頗不治故特選強幹者往蒞之其後右贊善大夫周渭亦知永濟彥卿郊迎渭揖于馬上就館始與彥卿相見略不降屈縣有盜傷人而逸渭捕獲暴其罪斬之不以送府渭先是為白馬主簿縣大吏犯法渭即斬之上奇其才故擢為贊善大夫秋七月監修國史王溥又上新修梁後唐晉漢周五代會要三十卷戊午頒量衡于澧朗諸州懲割據厚斂之弊也丁卯幸武成王廟遂幸新池觀習水戰己卯判大理寺事竇儀等上重定刑統三十卷編敕四卷詔刋板摹印頒天下儀等參酌輕重時稱詳允吕中曰任人而不任法以處他事則可以治刑獄則不可此刑統之不可無也夫律令之明條章之具使罪應其法法應其情姦吏猶自為之輕重況無法乎宋朝格式律令皆有常書張官置吏所以行其書爾八月庚子朔詔以冬至有事于南郊既而有司言冬至乃十一月晦前一日皇帝始郊不應近晦請改用十六日甲子詔可郊天之禮唐制每嵗冬至圜丘正月上辛祈穀孟夏雩祀季秋大享凡四祭昊天上帝親祀則并設皇地祗位國朝因之作壇于國城之南南薰門外每嵗令有司奉事于南郊其祭皇地祗及神州地祇亦因唐制皇地祇祭以夏至作方澤宫城北十四里神州地祇祭以孟冬别為壇于北郊云壬午殿前都虞候張瓊自殺時軍校史圭石漢卿等方得幸瓊輕侮之圭漢卿譖瓊養部曲百餘人擅作威福上召瓊面訊之瓊不伏下御史府按鞫瓊自殺上旋聞其家無餘財只有奴三人甚悔之責漢卿曰汝言瓊部曲百人今安在漢卿曰瓊所養一直百耳亟命優恤瓊家然亦不罪漢卿范質為南郊大禮使陶穀為禮儀使張昭為鹵簿使劉溫叟為儀仗使皇弟開封尹光義為橋道頓遞使丁亥王全斌言復與郭進曹彬等攻北漢遂下樂平辛卯以北漢樂平降兵為效順軍賜錢帛有差壬辰詔禮部貢院所試九經舉人落第宜依諸科舉人例許令再試女真國遣使來貢名馬丙申北漢靜陽等十八寨首領相帥來降己亥幸造船務幽州岐溝關使柴庭翰等來降九月甲寅羣臣三上表請加尊號曰應天廣運仁聖文武從之登州言髙麗國王昭遣使時贊等入貢詔開封府選樂工八百三十人權𨽻太常寺習樂將行郊祀之禮也丙寅大宴廣政殿始作樂女真國又遣使貢名馬丙子詔禮部貢舉人自今朝臣不得更發公薦違者重置其罪故事每嵗知舉官將赴貢院臺閣近臣得薦抱至藝者號曰公薦然去取不能無所私至是禁止北漢主誘契丹兵攻平晉軍命郭進等領步騎救之未至一舍北漢引兵去郭進御軍嚴而好殺部下整肅每入北漢境無不克捷上時遣戍卒必諭之曰汝輩當謹奉法我猶赦汝郭進殺汝矣嘗選御馬直三十人𨽻進麾下押陳屬與北漢人戰往往退怯進斬十餘人奏至上方閲武便殿厲聲曰御馬直千百人中始得一二人小違節度郭進遽殺之誠如此壟種健兒亦不足供矣乃潛遣中使諭進曰恃其宿衛親近驕倨不稟令戮之是也進感泣嘗有軍校詣闕訴進不法事上謂近臣曰所訴事多非實蓋進御下嚴甚此人有過畏懼而誣罔之耳即命執以與進令自誅之進方奉表謝會北漢入冦進謂其人曰汝敢論我信有膽氣今捨汝罪汝能掩殺此冦則薦汝于朝如敗便可往降勿復來也軍校踴躍聽命果立功而還進即奏乞遷其職上悅而從之冬十月庚辰詔諸州造版簿戶帖戶抄吏部尚書張昭上新撰名臣事迹五卷詔藏史館十一月癸亥享太廟上初詣太廟乘玉輅左諌議大夫崔頌攝太僕上問儀仗名物甚悉頌應對詳敏上大悅甲子合祭天地于南郊以宣祖配先是上謂大禮使范質曰中原多故百有餘年禮樂儀制不絶如線今幸時和嵗豐克舉禋祀報神資乎備物卿與五使宜講求遺逸遵行典故無或廢墮副朕寅恭之意焉于是質等相與討尋故事得天成中南郊鹵簿字圖遂詳定新制曰南郊行禮圖又令司天監定從祀星辰圖上之遂升壇有司具黃褥為道上曰朕潔誠事天不必如此命撤之初有司議配享請以禧祖升配張昭獻議曰宣祖積纍勳伐肇基王業伏請奉以配饗從之丙寅唐主遣使來助祭壬申以南郊禮成大宴廣德殿號曰飲福宴自是為例上謂宰相曰北門深嚴當擇審重士處之范質曰竇儀清介謹厚今又為兵部尚書難于復召上曰禁中非此人不可卿當諭朕意勉再赴職癸酉復命儀為翰林學士富弼曰故事尚書班在學士之上竇儀清德舊老再真禁林蓋天子所自擇人故榮于受命也議者曰選重官不専于有司則羣才知勸十二月己亥以鄭起為西河令起顯德末見上握禁兵有人望乃貽書范質極言其事于是起出掌泗州市征刺史張延範密奏起嗜酒廢職起坐左遷楊徽之亦嘗言于世宗以為上有人望不宜典禁兵上即位將因事誅之皇弟光義曰此皆周室忠臣也不宜深罪于是亦出為天興令閏十二月乙亥詔乘輿所服冠冕去珠玉之飾永安節度使折德扆言敗北漢軍于府州城下獲其衛州刺史楊璘國朝因唐制每嵗四郊迎氣及土王日祝五方上帝以五人帝配五官三辰七宿從祀國子博士聶崇義上言皇家以火德上承正統伏請奉赤帝為感生帝每嵗正月别尊而祭之尚書省集議如崇義奏感生帝為壇于南郊奉宣祖升配常以正月上辛奉祀甲子乾德二年唐國吳越漳泉奉正朔蜀稱廣政二十七年南漢天寶七年北漢天會九年春正月以選人食貧者衆詔吏部流內銓聽四時參選仍命翰林學士承旨陶穀等與本司官重詳定循資格及四時參選條宰相范質王溥魏仁浦等再表求退戊子皆罷政事先是宰相見天子必命坐有大政事則面議之常從容賜茶而退自餘號令除拜刑賞廢置但入執狀畫可降出即行之猶有坐而論道之遺意焉質等自以前朝舊臣稍存形迹且憚上英武每事輒具劄子進呈退即批所得聖旨而同列署字以志之嘗言于上曰如此則正稟承之方免妄誤之失矣上從之後遂為定式蓋自質等始也然質在相位所下制敕未嘗破律命刺史縣令必以戶口版籍為急使者按民田及獄訟皆召見為述天子憂勤之意乃遣之時號賢相庚寅以樞密使趙普為門下侍郎平章事集賢院大學士宣徽北院使判三司上黨李崇矩為檢校大尉充樞密使上既除普及崇矩無宰相署敕使問陶穀穀以為自古輔相未嘗虛位唯唐大和中甘露事後數日無宰相時左僕射令狐楚等奉行制書今尚書亦南省長官可以署敕竇儀曰穀所陳非承平令典今皇弟開封尹同平章事即宰相之任也上從儀言壬辰詔曰先所置賢良方正能直言極諌經學優深可為師法詳間吏理達于教化等三科並委州府解送吏部而自曩及今未有應者得非抱倜儻者恥肩于常調懷讜直者難效于有司必欲興自朕躬乎繼今不限內外職官前資見任布衣黃衣並許詣閣門投牒自薦朕當親試焉壬寅敕趙普監修國史先是宰相兼職皆內降制處分今止用敕非舊典也國朝沿唐及五代之制命相分領三館首相為昭文館大學士其次為監修國史其次為集賢院大學士二月戊申朔翰林學士竇儀等上新定四時參選條件命陳承昭帥丁夫鑿渠自長社引潩水而下合閔河渠成民無水患閔河之漕益通流焉三月權知貢舉陶穀奏進士李景陽等合格者八人夏四月上欲為趙普置副而難其名稱陶穀對曰唐有參知機務參知政事乙丑以樞密直學士兵部侍郎薛居正吕餘慶並本官參知政事不宣制不押班不知印不升政事堂止令就宣徽使廳上事殿廷别設磚位于宰相後敕尾署銜降宰相數字月俸雜給皆半之蓋上意未欲令居正等與普齊也史臣李沆等曰按唐故事知政事參議朝政參豫朝政參議政事參知政事參知機務並宰相之任也又髙宗嘗欲用郭待舉等參知政事既而謂崔知溫曰待舉等歷任尚淺遂令于中書門下同承受進止平章事以此言之平章事亞于參知政事矣今穀不能逺引漢御史大夫亞相故事為對以參知政事為丞相下一等穀失之矣議者惜之秋七月庚寅中書門下上重詳定翰林學士承旨陶穀所議少尹幕職官參選條件從之自是銓選漸有倫矣辛卯詔翰林學士承旨陶穀及殿中侍御史內黃師頌等四十三人各舉才任藩鎮通判者一人甲午詔吏部南曹自今常調赴集選人取歷任多課績而無闕失其人才可副升擢者具名送中書門下引驗以聞當與量材甄奬上慮銓衡止憑資歷英俊或沈于下僚故也九月太子太傅魯國公范質寢疾上數幸其第臨視質家迎奉器皿不具上謂曰卿為宰相何自苦如此質對曰臣曩在中書門無私謁所與飲酌皆貧賤時親戚安用器皿因循不置非力不及也質性卞急以亷介自將好面折人不能容人之短嘗謂同列曰人能鼻吸三斗醋斯可為宰相矣五代以來宰相多取給于方鎮質始絶之所得祿賜遍及孤遺食未嘗有異品疾革戒其子旻以母請諡母刻墓碑辛丑卒上甚悼惜之贈中書令後因講求輔弼謂左右曰朕聞范質居第之外不植資産真宰相也太宗亦素重質嘗對近臣稱纍朝宰相以為循規矩重名器持亷節無出質之右者其所不足但欠世宗一死耳講義曰太祖入京之時王溥先拜質不得已從之故名臣言行録所以紀質而黜溥也我太宗猶以為前朝宰相循規矩重名器持亷節無出質之右者但欠世宗一死耳則士君子之進退其可輕哉冬十一月先是蜀山南節度判官張廷偉説知樞密院事王昭逺勸蜀主遣大程官孫遇軍校趙彥韜及楊蠲等以蠟彈帛書間行遺北漢主約北漢濟河同舉遇等至都下彥韜潛取其書以獻上得所獻書覽之笑曰吾西討有名矣甲戌命王全斌崔彥進王仁贍劉光義曹彬合步騎六萬分路進討上以西州將校多北人賜詔諭令轉禍為福行營所至毋得焚蕩廬舍區略吏民開發丘墳剪伐桑柘違者以軍法從事臨汴水為蜀主治第凡五百餘間供帳什物皆具以待其至乙亥全斌等辭上出畫圖授全斌等謂曰凡克城寨止籍其器甲芻糧悉以財帛分給戰士吾所欲得者其土地耳丁酉太常禮院言周文王廟舊以師鬻熊太公望配享今太公别封武成王春秋行釋奠之禮但請以師鬻熊配從之十二月劉光義等入峽路連破松木三會巫山等寨壬申晦全斌等入利州獲軍糧八十萬斛是月京師大雪上設氊帷于講武殿衣紫貂裘帽以視事忽謂左右曰我被服如此體尚覺寒念西征將帥衝犯霜霰何以堪處即解裘帽遣中黃門馳驛齎賜全斌且諭旨諸將不能遍及也全斌拜賜感泣乙丑乾德三年是嵗蜀平唐國吳越漳泉奉正朔南漢天寶八年北漢天會十年春正月全斌等取劒州蜀主知劔州已破李昊勸蜀主封府庫以請降蜀主從之因命昊草表初前蜀之亡也降表亦昊所為蜀人夜書其門曰世修降表李家當時傳以為笑乙酉降表至全斌等受之遣田欽祚乘驛入奏初劉光義等發夔州諸將所過咸欲屠戮以逞獨曹彬禁之乃止故峽路兵始終秋毫不犯上聞之喜曰吾任得其人矣賜彬詔褒之孟昶降表以其先人墳廟及老母為請上優詔答之赦蜀管內蠲乾德二年逋租賜今年夏稅之半自全斌等發京師至昶降才六十六日凡得州四十六縣二百四十戶五十三萬四千二百九全斌及崔彥進王仁贍等日夜飲宴不恤軍務縱部下掠子女奪財物蜀人苦之曹彬屢請旋師全斌等不聽二月壬寅朔司天監言日當食驗天不食癸卯命參知政事吕餘慶權知成都府樞密直學士馮瓚權知梓州餘慶至成都時盜四起將士猶恃功驕恣王全斌等不能禁一日藥市始集街吏馳報有軍校被酒持刃奪賈人財餘慶立命擒捕斬之以徇軍中畏服民乃寧居瓚至梓州視事才數日會偽蜀軍校上官進嘯聚亡命三千餘衆劫村民數萬夜攻州城瓚曰賊乘夜奄至此烏合之衆以箠梃相擊必無固志正可持重以鎮之待旦自潰矣城中止有雲騎兵三百人分使守諸門瓚坐城樓密令促其更籌未夜分擊五鼓賊驚遁去因縱兵追之擒上官進斬于市招降千餘人並釋其罪令復業州境遂安丙午詔以西師所過民有調發供億之勞賜今年夏租之半居坊郭者勿輸半年屋稅又詔偽蜀文武官並遣赴闕賜裝錢有差治行清白為衆所知者所在州府以名聞丁巳權知貢舉盧多遜奏進士劉察等合格者七人三月孟昶與其官屬皆挈族歸朝由峽江而下自唐天寶以來方鎮屯重兵多以賦入自贍名曰留使留州其上供殊鮮五代方鎮益強率令部曲主場院厚斂以自利其屬三司者補大吏臨之輸額之外輒入己私納貨賂名曰貢奉用冀恩賞上始即位猶循前制牧守來朝皆有貢奉及趙普為相勸上革去其弊是月申命諸州度支給費外凡金帛以助軍實悉送都下無得占留時方鎮闕帥稍命文臣權知所在場院間遣京朝官廷臣監臨又置轉運使通判條禁文簿漸為精密由是利歸公上而外權削矣吕中曰方鎮猶周之封建也知州即秦之郡縣也今不因方鎮為封建而乃立郡縣之法何耶蓋古人有處天下之定制而後能享天下之長利後世雖有封建之虛名而反受天下之實禍以周制考之賦輸于太宰則諸侯不得有私財士貢于京師則諸侯不得有私人非牙璋則不得起兵非賜鉞則不得専征名山大澤不以封其餘間田使吏治之則歸地受地柄常在官有功則加地進律無功則削地貶爵則一豫一奪柄亦在官豈如唐人不敢誰何而一切行姑息之政哉至于五代其弊極矣天下之所以四分五裂者方鎮之専地也干戈之所以交爭互戰者方鎮之専兵也民之所以苦于賦繁役重者方鎮之専利也民之所以苦于刑苛法峻者方鎮之専殺也朝廷命令不得行于天下者方鎮之繼襲也太祖與趙普長慮却顧知天下之弊源在乎此于是以文臣知州以朝官知縣以京朝官監臨財賦又置運使置通判置縣尉皆所以漸收其權朝廷以一紙下郡縣如身使臂如臂使指叱吒變化無有留難而天下之勢一矣國初貢賦悉入內藏庫及取荆湖下西蜀儲積充羡上顧左右曰軍旅飢饉當豫為之備不可臨事厚斂于民乃于講武殿後别為內庫以貯金帛號曰封樁庫凡嵗終用度嬴餘之數皆入焉六月孟昶卒昶母李氏不哭舉酒酹地曰汝不能死社稷貪生至今日吾所以忍死者為汝在耳今汝既死吾安用生因不食數日亦卒秋七月始令諸州録參與司法掾同斷獄上聞西川行營有大校割民妻乳而殺之者亟召至闕斬于都市初近臣營救頗切上因流涕曰興師弔伐婦人何罪而殘忍至此當速置法以償其寃八月戊戌朔令天下長吏擇本道兵驍勇者籍其名送都下以補禁旅之闕陳平甫曰按祥符天聖編敕諸郡自騎射至牢城凡名額二百二十三總為本城所謂禁兵者皆三司之卒分屯而更戌今之屯駐駐泊之名而鈐轄都監監押官所部領者也三邉之兵間因事宜升為禁軍則所謂四十四處禁軍如咸平中升陜西選中保捷慶厯中升河北教閲本城為禁軍之類是已此為就糧自元昊叛而西北有保毅王倫叛而東南有宣毅于是列郡稍置禁軍嘉祐中詔東南各置威果凡二十五指揮亦無過九大郡熙寧按廂軍之籍五十萬人而不足以戰于是教閲之法起其後以廂軍團併為額則今兩浙崇節福建保節之類是也教閲之兵因别為額而𨽻之將下則今兩浙雄節福建廣節之類是也五年始排立就糧禁軍之下元豐兵今悉以雄節之類升同禁軍由是禁軍遍天下矣辛酉以左散騎常侍歐陽炯為翰林學士炯性坦率無檢束雅喜長笛上間召至便殿奏曲御史中丞劉溫叟聞之叩殿門求見諌曰禁署之職典司詔命不可作伶人事上曰朕頃聞孟昶君臣溺于聲樂炯至宰相尚習此伎故為我擒所以召炯欲驗言者之不誣耳溫叟謝曰臣愚不識陛下鑒戒之微旨自是亦不復召炯矣溫叟一日晚歸過明德門西闕前上方與中黃門數人登樓騶者潛知之以白溫叟溫叟令傳呼依常而過翌日請對且言人主非時登樓則近制咸望恩宥輦下諸軍亦希賞給臣所以呵導而過者欲示衆以陛下非時不登樓也上善之九月己巳上御講武殿閲諸道兵得萬餘人以馬軍為驍雄步軍為雄武並屬侍衛司冬十一月判大理寺尹拙等言後唐劉嶽書儀稱婦為舅姑服三年與禮律不同詔百官集議尚書省左僕射魏仁浦等奏議曰謹按禮內則云婦事舅姑如事父母即舅姑與父母一也古禮有期年之説雖于義可稽書儀著三年之文實在禮為當十二月丁酉始令婦為舅姑三年齊斬一從其夫丙寅乾德四年唐國吳越漳泉奉正朔南漢天寶九年北漢天會十一年春二月權知貢舉王祐言進士合格者六人諸科合格者九人上恐有遺才復令于不中選人內取其優長者䇿而升之夏四月詔曰出納之吝謂之有司儻規致于羡餘必深務于掊克知光化軍張全操上言三司令諸處場院主吏有羡餘粟及萬石芻五萬束以上者上其名請行賞典此茍非倍納民租私減軍食亦何以致之宜追寢其事勿復頒行上遣右拾遺孫逢吉至成都收偽蜀圖書法物皆不中度悉命焚毁圖書付史館孟昶服用奢僭至于溺器亦裝以七寶上遽命碎之曰自奉如此欲無亡得乎上躬履儉約嘗衣浣濯之衣乘輿服用皆尚質素寢殿設青布緣葦簾宫闈帟幕無文采之飾嘗出麻屨布裳賜左右曰此我舊所服用也開封尹光義因侍宴禁中從容言陛下服用大草草上正色曰爾不記居甲馬營中時耶五月上初命宰相撰前世所無年號以改元曰乾德既平蜀蜀宫人有入掖庭者上因閲其奩具得舊鑑鑑背有乾德四年鑄上大驚出鑑以示宰相曰安得已有四年所鑄乎皆不能答乃召學士陶穀竇儀問之儀曰此必蜀物昔偽蜀王衍有此號當是其嵗所鑄也上乃寤因歎曰宰相須用讀書人由是益重儒臣矣趙普初以吏道聞寡學術上每勸以讀書普遂手不釋卷上性嚴重寡言獨喜觀書雖在軍中手不釋卷聞人間有竒書不吝千金購之顯德中從世宗平淮甸或譖上于世宗曰趙某下夀州私所載凡數車皆重貨也世宗遣使驗之盡發籠篋唯書數千卷無他物世宗亟召上諭曰卿方為朕作將帥闢封疆當務堅甲利兵何用書為上頓首曰臣無奇謀上贊聖德濫膺寄任常恐不逮所以聚書欲廣聞見增智慮也世宗曰善庚寅上親試制科舉人薑涉等于紫雲樓下從容謂陶穀等曰則天一女主耳雖刑罰枉濫而終不殺狄仁傑所以能享國者良由此也因論前代帝王得失日晡乃罷秋七月甲戌以安守忠為漢州刺史上每遣使必戒之曰安守忠在蜀能自律己汝見當效其為人是月以孔子四十四代孫宜為曲阜縣主簿八月上召竇儀王祐等宴紫雲樓下因論民間事上謂宰相趙普等曰下愚之民雖不分菽麥如藩侯不為撫養務行苛虐朕斷不容之普對曰陛下愛民如此乃堯舜之用心也壬寅詔以憲府繩姦天官選吏秋曹讞獄俱謂難才理宜優異應御史臺吏部銓南曹刑部大理寺自知雜侍御史郎中少卿以下本司涖事滿三嵗者遷其秩御史中丞尚書侍郎大理卿别議旌賞其奏補歸司勒留官令史府史各減一選閏月詔求亡書凡吏民有以書籍來獻者令史館視其篇目館中所無則收之獻書人送學士院試問吏理堪任職官者具以名聞是嵗三禮涉弼三傳彭幹學究朱載皆應詔獻書總千二百二十八卷命分置書府賜弼等科名九月初西川戍卒或亡命在賊黨中有請按誅其妻子上曰朕慮其間有被賊驅脅非本心者乃盡釋弗誅丁巳以龍捷左右廂都指揮使黨進權侍衛步軍司事先是禁軍校自都虞候以上悉以所掌卒伍之數細書于所執之梃謂之杖記如笏記焉進本出戎虜不識文字上一日問進兵籍幾何進不能對舉梃曰盡在是矣上笑謂其忠實益厚之進每擐甲胄則髭髯皆磔竪目光如電視之若神人冬十月辛酉朔詔太常寺自今大朝會復用二舞先是晉天福末戎虜亂華中原多故禮樂之器寖以淪廢上始命判太常寺和峴講求修復之先是上以雅樂聲髙近于哀思命判太常寺和峴討論其理峴上疏謂西京銅望臬可校古法即今司天臺影表上石尺是也取王朴所定尺校之短于石尺四分樂聲之髙蓋由于此上乃令依古法别造新尺并黃鍾九寸之管使工人校其聲果下于朴所定管一律又內出上黨羊頭山秬黍纍尺校律亦相契合重造十二律管以取聲由是雅樂音始和暢吕中曰以漢興至百年猶未遑禮樂之事太祖當天下未一之時首明禮樂其知所急矣然禮樂廢缺已久禮猶可以書傳聲亡則樂亡故其傳猶難于禮也以尺較律則尺有長短以黍較律則黍有小大以聲與氣較律則聲氣猶有可求和峴所定以尺與黍而已安得不啓後日紛紛之議哉十一月癸巳日南至羣臣上夀初用雅樂登歌及文德武功二舞酒五行而罷自平湖南諸州皆置通判既非副二又非屬官故多與長吏忿爭常曰我監州也朝廷使我來監汝長吏舉動必為所制或者言其太甚宜稍抑損之乙未詔諸州通判無得怙權徇私須與長吏連署文移方許行下翰林學士竇儀卒上嘗召儀草制儀至苑門見上岸幘跣足而坐因却立不肯進上遽索冠帶而後召入儀亟言曰陛下創業垂統宜以禮示天下恐豪傑聞而解體也上斂容謝之自是對近臣未嘗不冠帶丁卯乾德五年唐國吳越漳泉奉正朔南漢天寶十年北漢天會十二年春正月詔以時平年豐增上元張燈為五夜偽蜀臣民往往詣闕訟全斌及王仁贍崔彥進等破蜀時諸不法事于是與諸將同時召還仁贍先入見上詰之仁贍歷詆諸將過失冀自解免上曰納李庭圭妓女開豐德庫取金具此豈諸將所為耶仁贍惶恐不能對上以全斌等新有功不欲付之獄吏令中書門下追仁贍及全斌彥進與訟者質證皆具伏法當死上特赦之甲寅以王全斌為崇義留後崔彥進為昭化留後王仁贍罷為右衛大將軍丁巳以曹彬為宣徽南院使領義成節度李進卿為步軍都虞候領保順節度王仁贍之歷詆諸將獨曰清亷畏謹不負陛下任使者惟曹彬一人耳上固己知彬善于其職于是賞彬特優彬入辭曰諸將俱獲罪臣獨受賞何以自安不敢奉詔上曰卿有功無過又不自矜伐茍負纎芥之纍仁贍豈為卿隱耶懲勸國之常典可母辭也論曰天下無難事亦無易事權柄下移則難于登天威令既振則易于反掌偉哉我太祖之興其用兵行師伐叛弔民尤切留意于賞罰之際在乾德中王全斌曹彬皆平蜀將帥也彬有功無過則擢用而不疑全斌貪恣以致亂則貶降而不恤賞罰如此宜其平定天下取五強國如摧枯拉朽之易也吕中曰人言創業之初貪可使也愚可使也詐可使也茍可以辦吾事而已是不知師之上六開國承家小人勿用之義也漢髙祖雖得韓彭之力然終受韓彭之禍我太祖平蜀之功賞曹彬而責全斌任義倫而責仁贍蓋以曹彬用兵秋毫無犯義倫東歸圖書數卷而全斌仁贍之功不足以贖其貪酷之罪愛民之仁御將之術兩得之矣上嘗幸講武池臨流觀習水戰因謂左右曰人皆言忘身為國然死者人所難言之易耳李進卿前對曰如臣者令死即死耳遂躍入池中上急令水工數十人救之得免幾至委殞上能得諸將死力類此二月乙丑以西川轉運使給事中沈義倫為戶部侍郎充樞密副使初義倫隨軍入成都獨居佛寺蔬食偽蜀羣臣有以珍異奇巧之物為獻者皆却之東歸篋中所有才圖書數卷而已上嘗從容問曹彬以官吏善否彬曰臣止監軍旅至于采察官吏非所職也固問之唯薦義倫可任上亦聞義倫清節過人因擢用之臣富弼等釋曰義倫霸府從事有攀龍鱗附鳳翼之勞者也然必久試才效以其清節過人始大用此皆先朝用人之意壬申權知貢舉盧多遜奏進士李肅等合格者十人復詔參知政事薛居正于中書覆試皆合格乃賜及第殿前都指揮使義成節度使韓重贇罷軍職出為彰德節度使先是有譖重贇私取親兵為腹心者上怒欲誅之謀于趙普普曰陛下必不自將親兵須擇人付之若重贇以讒誅即人人懼罪誰敢為陛下將者上怒猶未解普開陳愈切上納其言止用重贇出鎮重贇聞普救己他日詣普稱謝普拒弗見三月五星如連珠在降婁之次初竇儼與盧多遜楊徽之周顯德中同為諌官儼善推步星厯嘗謂徽之等曰丁卯嵗五星聚奎自此天下始太平二拾遺見之儼不與也吕中曰以五代雲霧昏曀之久所以啓我宋天日開明之候天降時雨山川出雲國家將興必有休祥然奎星固太平之象而實重啓斯文之兆也當是時歐蘇之文未盛師魯明復之經未出安定湖學之説未行于西北伊洛關中之學未盛于天下而文治精華已露于立國之初矣夏四月給事中開封馬士元謁樞密副使沈義倫適有吏白事義倫與語忘顧士元士元遽辭出歸語家人曰我為臺省近臣不為執政所禮可以去矣己卯遂致仕秋九月李彛興卒子光睿嗣先是平蜀得錦工數百人冬十月丙辰朔置綾錦院以處之癸酉度支判官侯陟言三司凡二十四案鹽鐵主其六戶部主其四餘皆度支主之自荆湖西蜀之平事務益衆欲令三司均主其八詔三司推官張純分判度支案事宋史全文卷一
