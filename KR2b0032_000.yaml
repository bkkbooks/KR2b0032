  text: 欽定四庫全書史部二
  hash: sha256:70556edeacc7a4d441da801d227722e616f1df1cbf685e5227e3ee4acfbaa8df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0032_WYG_000-1a, image: WYG0330/WYG0330-0001a.png}
body:
  text: 宋史全文編年類提要臣等謹案宋史全文三十六卷不著撰人名氏原本題曰續通鑑長編而以李燾進長編表冠之扵前是直以為燾之長編矣案燾成書在孝宗時所録止及北宋此本實載南宋一代之事其非出夀手明甚檢勘此書每卷標題皆有宋史全文四字而永樂大典宋字韻内亦多載宋史全文與長編截然二書又此本目録前有坊間原題稱本堂得宋鑑善本乃名公所編前宋已盛行再付諸梓云云葢本元人所編而坊賈刋行時假燾名以欺世耳惟考永樂大典所收之書皆載入文淵閣書目乃宋鑑多至六部獨不見宋史全文之名或亦楊士竒等編輯時因標題而致誤歟又别本之未有商邱宋犖跋曰宋李燾有通鑑長編百三十八卷續長編集要六十八卷續宋編年十八卷今世蔵書家往往求之甚渇此三十六卷是元人所刋卷首割去著書人名姓卷末割去大元字其為元胡宏續通鑑長編無疑云云則又臆斷之語未見其有確證也其書自建隆以迄咸淳用編年之體以次排纂其靖康以前亦本於燾之長編而頗加刪節髙孝二代則取諸留正之中興聖政草今以永樂大典所載聖政草相與𠫭校其文大同小異留正等所附案語亦援引甚多至光寧以後則别無藍本可據為編書者所自綴輯故永樂大典扵光寧二宗下亦全收此書之文勘對並合其於諸家議論採録尤富如吕中講義何俌龜鑑李沆太祖實録論足國論富弼等釋吕源等增釋陳瓘論大事記諸書雖其立説不盡精醇而原書世多失傳亦足以資𠫭考也惟原本第三十六卷内度宗少帝及益王廣王事蹟俱有録無書永樂大典亦未採今姑仍其闕焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
