body:
  text: 宋史全文卷二十五上宋孝宗三戊子乾道四年春正月甲子朔是月籍荆南義勇民兵先是前知荆南府王炎奏荆南七縣主客佃户共四萬有竒丁口一十餘萬臣依舊籍雙丁以下及除官户并當差户人外浄得八千四百有竒每歳於農隙只教閲一月若比以贍飬官軍八千四百人歳當錢四十萬貫米一十一萬石紬絹布四萬餘疋今纔歳費一萬四千石錢二萬緡獲此一軍之助利害豈不較然易見二月甲午朔是月詔福建路建劒汀邵武四州軍科賣官鹽騷擾民户可將本路鈔鹽一項盡行住罷轉運司毎歳合抱𤼵鈔鹽錢二十二萬貫並與蠲免却令本司於八州軍增鹽錢并將樁留五分鹽本錢抱認七萬貫充上供起𤼵今後州縣不得更以賣鈔鹽為名依前科敷騷擾初巨僚極言其弊詔令前漕臣沈度陳彌作看詳來上遂有是命未幾沈度奏事上曰前日觀卿所奏鹽事已盡蠲十五萬緡以寛民力且曰朕意欲使天下盡蠲無名之賦悉還祖宗之舊以飬兵之費未能如朕志又言四川有鈔鹽綱有歳計鹽綱鈔鹽綱者為抱納鈔鹽錢窠名歳計鹽綱者毎斤除分𨽻增鹽錢鹽本等錢外其餘係州縣所行市利錢即以充納上供銀錢等用今鈔鹽窠名已盡行除放州縣只是搬賣一色歳計綱湏令置場出賣不得科抑於民給僧牒一千道紫衣師號五百道助四川總司以蔣芾為右僕射王炎賜出身簽書樞宻院事雨雹大雪三月癸亥朔詔舉制科夏四月壬辰朔是月賑綿漢等州饑尋以饒信及建寧府等州饑遣司農寺丞馬希言同提舉常平官賑濟降僧牒一百道付建寧府户部降米五千石賑衢州饑荆南府僧牒二百道衢州一百道饒信米各三萬石雷州水賜十道進呈欽宗實錄并帝紀禮部貟外即李燾奏修史先進呈帝紀自淳化始凡所以先進呈者羣臣筆削或有失當因取决於聖裁故號為進呈記草李燾上續資治通鑑長編自建隆元年至治平四年閏二月五月壬戌朔令常平官歳按倉儲六月甲午上曰昨日汪㳙對云去秋江西水數州之民至有無藁枯餵牛者朕都不知陳俊卿奏去秋沈樞亦申來言水灾陛下所以預令理㑹和糴上曰卿等更别措置今後水旱湏令實申來蔣芾奏曰州縣所以不敢申恐朝廷或不樂聞今陛下詢訪民間疾苦焦勞形於玉色誰敢隠上曰朕正欲聞之庶幾朝廷處置賑濟尋詔諸路漕司以水旱之實聞州縣隠蔽者並寘于法辛亥度支趙不敵言方今一歳内外支用之數大槩五千五百萬緡有竒又以一歳所入計之若使諸路供億以時别無蠲減拖欠場務入納無虧則足以支一歳之用不闕然賦入之科名猥多分𨽻於户部之五司如僧道免丁常平免役坊場酒課之類則左右曹掌之如上供折帛經總無額茶鹽香礬之類則金部掌之度支則督月樁倉部則專糴本催理雖散於五司悉經於度支藉之古人量入為出之義則度支一司安可以不周知其所入之數也哉臣因置為都藉㑹稽窠名總為掲貼事雖方行簿書草具而條目詳備固已粲然易考欲望付之本曹自兹為始歳一易之庶幾有司得以久逺遵行不惟財賦易以稽考抑使胥吏無所容奸從之丙辰詔守臣罪狀顯著或職事不舉而按司不即按劾却因他事𤼵覺三省具姓名取㫖守臣不按知縣亦如之秋七月壬戌臣僚言臨安府風俗自十數年服飾亂常習為奢華聲音之娯以鄭亂雅臣竊傷悼中原士民淪溺日甚延首企踵欲自致於醇樸之化者三四十年却不可得而東南禮義之民乃反墮於妖媚之習而不自知甚可痛也今都人静夜十百為羣吹鷓鴣撥琵琶使一人綵衣而舞衆人拍手和之傷風敗俗不可不懲伏望戒敕守臣檢坐紹興三十年指揮嚴行禁止詔從之甲申詔諸路運司行下所屬將灾傷處各選清強官遍詣地頭盡與檢放或不實不盡有虧公私被差官并所差不當官司並重作行遣其被水甚處令監司守臣條具合措置存恤事件聞奏是月親錄繋囚先是詔以踈决並為文具令有司具祖宗典故朕當親閲至是後殿臨軒决遣罪人右僕射蔣芾以母喪去位陳俊卿兼知樞宻院事言於上曰臣自叨執政之列每見三省宻院被内䧏指揮茍有愚見必皆宻奏多䝉開納為之中止然比及如此已為後時今以參預首貟奏行政令欲乞自今内降恩澤有未允公議者容臣卷藏不示同列即時繳奏或次日面納上曰卿能如此朕復何憂俊卿每勸上親忠直納諫諍抑僥倖肅紀綱講明軍政寛恤民力異時統兵官不見執政俊卿曰召三五人從容與語察其材智所堪而宻記之以備選用於是上嘉俊卿之言多所聽從大抵政事復歸中書矣龍大淵既死上憐魯覿詔召之陳俊卿曰自陛下出此兩人中外無不稱誦聖德今欲召還恐大失天下望臣願先罷去上感其言遂止不召贈王恱官恱知衢州死之日百姓巷哭即為立祠於徐偃王廟其䘮出城百姓號慟聲振原野恱愷悌慈祥視民如子是春乏食恱𤼵廩勸分使百姓不至失所自中夏闕雨恱竭誠祈禱絶不茹葷早晚一粥幾月餘日題之壁間有乞為三日之霖願減十年之壽之語竟以是卒詔贈直龍圖閣仍宣付史館八月乙巳度支郎官劉師尹論頃年因軍須額外創添賦入欲乞漸次裁減以寛民力上曰朕未嘗妄用一毫只為百姓又論漢宣帝時吏稱其職民安其業上曰宣帝中興只此数語今吏不稱職所以民未受實惠癸丑知温州胡與可以支常平錢五百貫并係省錢五百貫賑給被水人户自劾上曰國家積常平米政為此也可放罪是月行乾道厯初將統元紀元厯與劉孝榮所獻新厯委官測驗互有踈宻遂令太史局參照新舊行用尋禮部侍郎程大昌言新除厯官互有異同難以參照而新厯比舊厯則為稍宻遂詔令太史局施行新厯以乾道厯為名未幾禮部郎李燾言厯久必差自當改法恭惟列聖臨御未有不更厯者獨靖康偶不及此今統元厯行之既久其與天文不合固宜况厯家皆以為雖名統元其實紀元若紀元又多歴年所矣厯術精微莫如大衍大衍用於世亦不過三十四年後學膚淺其能行逺乎隨時改厯此道誠不可廢抑嘗聞厯不差不改不驗不用未差無以知其失未驗無以知其是失然後改之是然後用之此劉洪要言至論也舊厯差失甚多不容不改而新厯亦未有明效大驗但比舊厯稍宻耳厥初最宻後猶漸差初已小差後將若何故改厯不可不重也謹按仁宗用崇天厯自天聖至皇祐其四年十一月月食厯家言厯不效詔以唐八厯及本朝四厯參定厯家皆以景福為宻遂欲改厯而劉羲叟獨謂崇天厯頒行逾三十年方將施之無窮兼所差無幾不可偶縁天變輕議改移又謂古聖人厯象之意止於敬授人時雖則預考交㑹不必脗合辰刻辰刻或有遲速未必獨是厯差仁宗從羲叟言詔復用崇天厯羲叟學為本朝第一歐陽修司馬光輩皆遵承之崇天厯既復用又十三年至治平三年始改用明天厯厯官同琮等皆遷官後三年明天厯課熙寧三年七月月食又不效又詔復用崇天厯琮等皆奪所遷官崇天厯復用至熙寧八年始更用奉元厯奉元厯議沈括實主之明年正月月食奉元厯遽不效詔問修厯相恩人姓名括具奏辨故厯得不廢先儒盖謂括強解不深許其知厯也然後知羲叟所稱止於敬授人時不必輕議改移者不亦至言要論乎欲乞朝廷察二劉所陳及崇天明天之興廢申飭厯官加意精思勿執今是益募能者熟復討論更造宻度使與天合庶幾善後之䇿也詔送太史局仍令諸路求訪精通厯書之人九月壬申禮部貟外郎李燾論對論科舉等事上曰科舉之文不可用老莊及佛語若自修於山林何害儻入科場必壊政事甲戌户部郎官曾逮奏任賢使能周室中興於賢曰任於能曰使則賢能之任使固不同今以刀筆之小才奔走之俗吏謂之使能此不可不辨上曰論得甚好癸未新差權𤼵遣衢州劉風奏對論朝廷不當顓以才取人上曰才有君子之才有小人之才小人而有才虎而翼者也人主之要在於辨邪正冬十月辛夘前四川制置使汪應辰面對讀劄子至畏天愛民上曰人心易怠鮮克有終當以為戒上又曰朕日讀尚書於畏天之心尤切應辰奏堯舜禹湯文武皆聖人然一部尚書中君臣更相警戒言語雖多要皆不出此道聖訓及此實天下之福是月蔣芾起復左僕射陳俊卿右僕射芾辭乞終䘮詔從之先是殿前指揮使王琪被㫖按視兩淮城壁還薦和州教授某人上命召之俊卿與同列請其所自上曰王琪稱其有才俊卿曰琪薦兵將官乃其職教官有才何預琪事上曰卿等可召問之俊卿召淇責之琪皇恐不知所對㑹揚州奏昨琪傳㫖增築州城今已訖事俊卿請於上則初未嘗有是命也俊卿曰若爾即琪為詐傳聖㫖此非小利害也容臣等熟議以聞退至殿廬遣吏召琪詰之琪叩頭汗下俊卿亟草奏言曰王琪妄傳聖㫖移檄邊臣増修城壁此事係國家大利害朝廷大紀綱而陛下之大號令也人主所恃者紀綱號令賞罰耳今琪所犯如此此而不誅則亦何所不為也哉謹按律文詐為制書者絞惟陛下奮𤼵英斷早賜處分於是有㫖削琪官而罷之先是禁中宻㫖直下諸軍者朝廷多不與聞有某官張方者因某事𤼵覺俊卿方與同列奏請自今百司丞受御筆處分事宜並須申朝廷奏審方得施行之報至是因琪事復以為言上乃恱而從之事下兩日則又有㫖收還前命俊卿語同列曰反汗如此必闗牒至内諸司有不樂者相敬為之耳即具奏曰三省察院所以行陛下詔命也百司庶府所以行朝廷號令也詔命一出於陛下號令必由於朝廷所以謹出納而杜奸欺也祖宗成憲著在令甲比年以來漸至隳紊臣等昨以張方之事輙有奏聞及此踰月又因王琪奸妄之故陛下赫然震怒然後䧏出聖慮亦已審矣聖斷亦已明矣中外傳聞莫不歎服而昨日陛下諭臣等曰禁中欲取一飲一食必得申審豈不留滯而又有此指揮夫臣等所慮者命令之大如令三衙𤼵兵則宻院不可不知令户部取財則三省不可不知耳豈為此宮禁細微之事哉况朝廷乃陛下之朝廷臣等偶得備数其間出内陛下之命令耳凡事奏審乃欲取决於陛下臣等非敢欲專之也况此特申嚴舊制亦非創立新條而已行復收中外惶惑且將因循觀望并舊法而廢之為後日無窮之害則臣等之罪大矣或恐小人因此疑似陰以微言上激雷霆之怒更望聖明深賜體察翌日面奏上色甚温顧謂俊卿曰朕豈以小人之言而疑卿等耶先是劉珙進對語切遂忤上意既退御筆除珙端明殿學士在外宫觀俊卿即藏去宻具奏言前日奏劄臣實草定珙與王炎略更一兩字即以投進以為有罪則臣當先罷若幸寛之則珙之除命臣未敢奉詔也明日復前申請且曰陛下即位以來容納諫諍體貌大臣皆盛德事今珙乃以小事忤㫖而獲罪如此臣恐自此大臣皆以阿䛕順㫖為持祿固位之計非國之福也上色悔久之又奏言珙正直有才略肯任怨臣所不及願且留之上曰業已行之不欲改也俊卿曰珙無罪而去當與大藩以全進退之禮上然之乃以珙為江西帥俊卿退又自劾草奏抵突被命稽留之罪上手札留之俊卿請益堅上不許且曰卿雖百請朕必不從上於是有意相俊卿矣不數日而有是命大閲于茅灘上親御甲胄指授方略命三司合教為三陣戈甲耀日旌旗蔽天六師驩呼犒賞有加焉十二月戊子朔是月召魏掞之以諸司薦其行髙識逺學術該通孝於親友於弟召赴行在至是入對上曰治道以何者為要掞之奏治道以分臣下邪正為要詔掞之議論可採賜同進士出身除太學錄將釋奠孔子祠職當分獻先賢之從祀者掞之先事白宰相曰王安石父子以邪説惑主聽溺人心馴致禍亂不應祀典而河南程氏兄弟唱明經學以幸來今其功為大請言於上廢安石父子勿祀而追爵程氏兄弟使從食不聽又言太學之教宜以德行為先其次尤當使之通習世務以備官使今壹以空言浮説取人非是其它政事有係安危治亂之機者亦無不抗疏盡言以諫至三四上皆不見省則移書杜門以書質責宰相語尤切掞之前已數數求去遂以迎親予告歸行数日罷為台州州學教授掞之自少有志於當世晚而遇主謂可以行其學然其仕不能半歳而不合以歸尋以病卒聞者惜之掞之己見紹興三十一年先是福建諸司薦興化軍仙遊林彖行義召不至諸司又薦彖行義授廸功即添差本軍教授是歳蠲廣德軍月樁錢湖廣總司申江鄂荆襄三處軍馬歳約用凡百八萬四千餘貫四川宣撫使虞允文奏興洋之間紹興初義士係籍者以七萬計今所籍興元洋州大安軍共二萬三千人有竒其金房等州雖未申到約亦可得三萬人則西師之勢壯矣歳可免六七百萬之費而獲四五萬人之用其為利便甚明有以四明銀鑛獻者上命守臣詢究且將召冶工即禁中鍛之陳俊卿奏曰陛下留神庻務克勤小物然不務帝王之大而屑屑乎有司之細臣恐有識之士有以窺陛下也况彼懼其言之不副則其鑿山愈深役民愈衆而百姓將有受其害者夫天地之産其出無窮若愛惜撙節常如今日則数年之後自當沛然但願民安歳稔國家所少者豈財之謂哉請直以其事付之明州使收其贏餘以佐國用則亦不至於擾民矣此事當是俊卿為恭政時然不得其月日姑付此年之末己丑乾道五年春正月戊午朔是月徐子實新知無為軍陳獻屯田利害上以其可采遂除大理正充措置兩淮屯田官二月辛亥中書舎人汪㳙奏而給事中又於制敕有誤許其論奏而給事中又所以駮正中書違失各盡所見同歸於是近年已來間有駮正或中書舎人給事中列銜同奏則是中書門下混而為一非神宗官制所以明職分正紀綱防闕失之意壬子又言詔令之出始於中書又經門下審覆然後付分謂之成命近年以來往往書讀未定即已行下所屬或𫝊報於外詔制勅未經兩省書讀未行是月雨雹罷制國用司以其事併歸三省户房三月戊午明州州學教授鄭耕道進對奏太祖皇帝嘗問趙普曰天下何物最大對曰道理最大太祖皇帝屢稱善夫知道理為大則必不以私意而失公中上曰固不當任私意臣留正等曰天下惟道理最大故有以萬乘之尊而屈於匹夫之一言以四海之富而不得以私於其親與故者若不順道理則曰予無樂乎為君惟予言而莫予違也私意又安得不肆壽皇聖帝因臣下論道理最大乃以一言蔽之曰固不當任私意嗚呼盡之矣壬午淮西副總管王公述進對上曰到任應有事與郭垠同共深切議論淮甸義兵可依時教閱不可乆勞有妨種耕如城修了當可因往逐州軍按閱廂禁軍或見淮甸有大利便可具奏來癸未臣僚言國家置武學養士皆月書季攷以作成之而武臣登第止許參選入監當錢榖之任銓部積壓猥多差遣艱得後雖許通注沿邊親民廵尉往往皆逺惡去處多不願受是致武臣及第之後所用非所養甚非朝廷教育作成之意欲望睿㫖將前後武舉及第之人其間有兵機練達武藝絶倫可為將佐者許侍從薦舉乞賜召對量材擢用或令注授屯駐諸軍機幕幹辦參賛軍謀庻㡬有以激勸詔令監司帥臣管軍侍從已上薦舉是月親試舉人賜鄭僑以下及第出身有差命參政王炎宣撫四川仍舊參知政事夏四月辛邜左祐劄子契勘楚州係極邊重地路當衝要本州之東地名鳬魚溝北沙一帶抵接淮海與山東沿海相對乞將本州兵馬鈐轄羊滋移往前去置廨舎警察奸盜縁元管海船二百餘隻搬運海州軍糧間探之類甚為濟用其一帶正瀕淮海與射陽湖通濟地分濶逺誠恐本官出廵臨時闕官拘轄今欲剏置使臣二貟專充管轄海船機察淮海盗賊聽羊滋使喚從之是月詔去歲灾傷州郡流移人令常平司所在收䘏賑給五月癸亥刑侍汪大猷言國家立保正之法縁法中許願兼耆長者聽故數十年來承役之初縣道必抑使兼充盖保正一鄉之豪官吏百須可以仰給故樂於並縁以為己利凡有差募互相對糾乞令諸路常平司相度或别有所見可行者限一月條具來上俟到令本部參以見行條法立為定制從之詔後省官置言事籍看詳臣僚士庻言事詳擇其可行者條上是月詔有司議獄以法不得作情重奏裁六月戊戌上御便殿初上御弧矢有弦激之虞以致目眚至是康復陳俊卿密疏曰陛下經月不御外朝口語藉藉由臣輔相無狀不能先事開陳以致驚動聖躬虧損盛德非細事也臣聞自昔人主處富貴崇高之極志得意滿道不足以制欲則游畋聲色車服宫室不能無所偏溺而不得為全德之君陛下憂勤恭儉清淨寡欲凡前世英主所不得免者一切屏絶顧於騎射之末猶有未能忘者臣知陛下非有所樂乎此盖神武之略志圖恢復故俯而從事於此以閱武備激士氣耳陛下誠能任智謀之士以為腹心仗武猛之材以為𤓰牙明賞罰以鼓士氣恢信義以懐歸附則英聲義烈不出樽俎之間而敵人固已逡廵震疉於千萬里之逺尚何待區區馳射於百歩之間哉又曰古之命大臣使之朝夕納誨以輔德繩愆糾繆以格非欲其有以正君之過於未形唐太宗臂鷹將獵見魏徴而遽止憲宗蓬萊之遊憚李絳而不行臣人㣲望輕無二子骨鯾强諌之節致陛下過舉彰聞於外今誅將及身而後乃言亦何補於既往之咎哉又曰弓矢之技人所常習而易精然猶不免今日之患况毬鞠之戲本無益於用武而激射之虞銜橜之變又有甚於弓矢者間者陛下頗亦好之臣屢獻言未䝉省録今兹之失盖天之仁愛陛下示以警懼使因其小而戒其大也陛下試以弦斷之變思之則向之盛氣馳騁於奔踶擊逐之間無所蹉跌盖亦幸矣豈不為之寒心哉太祖皇帝嘗以墜馬之故而罷獵又以乘醉之誤而戒飲遷善改過不俟旋踵此子孫帝王萬世之大訓也臣願陛下克己厲行一以太祖為法則盛德光輝將日新於天下而前日之過何傷日月之明哉右諌議大夫單時亦上疏諫上靣諭曰卿言可謂愛朕前此時為侍御史嘗上封事言飲酒擊毬二事上大喜之詔輔臣曰擊毬朕放下多時飲酒朕自嘗戒賜孔璨官宣聖四十九世孫也秋七月丙寅宰執言近日上書論邊事者悉送兩編修官擇其可行者與可去者或可留存者各以其類相從置簿抄上以備他日採擇之用八月甲申朔日有食之乙未中書門下省奏白劄子寺劄丞簿學官大理司直密院編修之類謂之職事官朝廷所以儲用人才比年以來往往差下待闕數政除授猥監賢否混淆何以清流品何以厚風俗欲望特降指揮今後職事官須見闕方得除人其已差人却恐待次之久無闕可授乞朝廷稍復諸州添差釐定通判簽判教授屬官等闕以處之他時職事官有闕却從朝廷於曽差下人内選擇召用庻㡬内外之職稍均朝廷紀綱稍正詔已差下人如應赴任半年内許令赴上在半年外人各以資序高下除授一次其所復添差等闕今後更不作闕三省常切遵守是月以陳俊卿虞允文為左右僕射九月丁巳中書門下省勘㑹諸路監司近來多不廵按官吏貪惰無所畏憚間有出廵去處又多容縱隨行公吏等乞覔騷擾理宜約束詔諸路監司今後分上下半年依條廵按詢訪民間疾苦糾察貪惰不職官吏仍具詣實以聞如敢依前容縱公吏等乞覔騷擾當議重置典憲己未新江東運副程大昌朝辭上宣諭曰近來監司多不廵歴卿為朕徧行諸州察守令臧否民情寃抑悉以聞奏丙寅起居郎林機論諸郡守臣欲郡計辨集而不恤縣道之匱乏致使横歛及民上曰甚不體朕寛恤之意且如稅賦大重朕欲除減但有所未及當次第為之機又奏曰諸處有羡餘之獻皆移東易西以求恩倖上曰今之財賦豈得有餘今後若有獻朕當却之壬申詔三衙諸軍應有違軍律弊事統兵官特與放罪差主師措置日下盡行除革其軍校有因教閲損壊軍器官為給錢修補軍身火飯務令飽足不得多歛錢米却行減尅借差軍兵戰馬多破白直諸處窠役囘易私占官兵悉行拘收入隊教閱務要軍政整肅諸處送到官貟月給並應副索客及諸般名色掊斂減尅陪填羸落以為私用等錢物亟計贓論罪私借人馬亦計庸科斷其違戾統制統領將佐從主帥按劾以聞當議重寘典憲主帥失於糾舉亦重作行遣先是樞密院奏國家撫養戰士全藉主兵官督責教閱以備緩急使喚近來三衙諸軍統兵官循習私意恣為不恭顯是有害軍政遂條具十一事乞行懲革故有是詔是月復監司避本貫法是秋令監司帥臣臧否守令太常少卿林栗等言竊惟祀于郊在國之南就陽位也國家舉行典禮歲中祀上帝者四春祈夏雩秋享冬報其二在南郊圓壇其二在城西惠照院望祭齋宫盖縁在京日孟夏大雩别建雩壇於郊丘之左季秋大享有司攝事就南郊齋宫端誠殿今城西望祭齋宫於就陽之義無所依據欲望詳酌除三歲親祠自有典故外其有司攝事歲中四祭並即圓壇以遵舊制從之續禮部侍郎鄭聞等言國初沿襲唐制一歲四祭昊天上帝於郊丘謂祈榖大雩享明堂祀圜丘也惟是明堂當從屋祭元祐六年從太常博士趙叡之請有司攝事乃就齋宫行禮至元符元年又寓於齋宫端誠殿竊見今郊丘之隅有淨明寺欲乞遇明堂親饗則遵依高宗皇帝紹興三十一年已行典禮如常歲有司攝事則當依元祐臣僚所陳權寓淨明寺行禮庻合明堂之義從之冬十月庚子臣僚言陛下臨御之初約束州縣受納苖米多收加耗法禁嚴甚而近年以來所收増多逮朝廷抛降和糴却以出剩之數虚作糴到所得價錢盡資妄用乞申戒州縣杜絶弊倖庶寛民力從之是月賑温合州水灾守臣不以聞各降官落職放罷監司各降一官十一月甲寅守起居郎兼權中書舎人林機論司馬光有言君子以德勝才小人以才勝德才德之辨願陛下察之上曰朕於此未嘗不加察但恐有所未盡漢高祖名知人謂陳平智有餘難任周勃重厚可屬大事盖得此道丁巳御書御製用人論賜宰臣陳俊卿等己未林機奏本朝慶厯三年歐陽修建言臣僚奏事退令少留殿門候修注官出靣録聖語至七年王䞇始請只令備録開報遂為定制是以仁宗皇帝之朝道德教化之源禮義刑政之具載在國史最為詳悉由史官之職也近世以來臣僚奏事例以不得聖語為報伏覩在京通用令諸進對臣僚有親聞聖語應記注者限一日親録實封報門下中書後省事干機宻難於録報者止具因依申知又勅應記註事不報門下中書後省者以違制論次乞睿㫖降付兩省檢舉前件條令庻㡬得以特書大書垂信萬世詔檢坐見行條法申嚴行下辛未給事中兼侍讀胡沂進對論朝廷命令當謹之於造命之初上曰三代盛時如此卿職當繳駁事有當言勿謂拂主上拂宰相而不言是月令節臣毋得薦舉通判有履行著聞職事修舉者許監司列銜保奏嚴監司郡守選令侍從䑓諫兩省官各舉京朝官以上三人保任終身限五日聞奏見任郎官不在薦舉之數十二月甲辰秘書監兼史院編修李燾言臣竊見太平興國三年初修太祖實録命李昉等同修而沈倫監修五年成書及咸平元年真宗謂倫所修事多漏略乃詔錢若水等重加刋修吕端及李沆監修二年書成視前録為稍詳而真宗猶謂未備大中祥符九年復詔趙安仁等同修王旦監修明年書成太宗實録初修於至道再修于大中祥符九年神宗實録三次重修哲宗實録亦兩次重修神宗哲宗兩朝所以屢修則與太祖太宗異盖不獨於事實有所漏略而已又輙以私意變亂是非紹興初不得不為辨白也誣謗雖則辨白而漏略固在然猶愈乎近所修徽宗實録盖徽宗實録疎舛特甚史院已得修㫖四朝正史竊縁修正史當據實録實録儻差誤不可據則史官無以準憑下筆乞用太祖太宗故事將徽宗實録重加刋修更不别置司局只委史院官取前所修實録子細㸔詳是則存之非則去之闕則補之誤則改之實録先具正史便當趨成又言臣近進續資治通鑑長編自建隆迄治平自合依詔㫖接續修進乞許臣専意討論徽宗一朝事迹纂述長編既具即可助成正史是月張栻新除嚴州入見時宰相虞允文以恢復自任且謂栻素論當與己合數遣人致意栻不答見上首言曰先王所以建功立事無不如志者以其胸中之誠足以感格天人之心也陛下試深察之日用之間念慮云為之際亦有私意之發以害吾胸中之誠者乎有則尅而去之使吾中扄洞然無所間雜則見理必精守義必固天人之應將不待求而得矣且欲復中原之土必先收中原百姓之心欲得中原百姓之心當先有以得吾境内百姓之心求所以得吾境内百姓之心者無他不盡其力不傷其財而已若中原之内聞吾君愛惜百姓如此又聞百姓安樂如此則其歸孰禦上曰誠當如此况中原之人本吾赤子必襁負其子而至矣栻又奏今日誕謾之風不可長至如邊事湏委忠實不欺之臣不然或有誕謾豈不誤陛下倚任上曰若誕謾必至誤國事栻又奏先聽其言却考其實此所謂敷奏以言明庶以功栻至郡問民疾苦首以丁鹽絹錢太重為請詔蠲其半降會子二十萬貫行兩淮漕司收換銅錢兩淮州郡並以鐵錢及會子付使是冬措置兩淮陳子實言準指揮復置萬弩營令乞以神勁軍為名合行事件乞並𨽻屬官田所兼乞下淮東漕司就真州計置營寨又遇招到萬弩手以本軍忠勇使効為名支給例物並免户下科敷差役及三百畆稅賦並從之庚寅乾道六年春正月壬子朔是月黄中入對初中兼給事中内侍遷官不應法諫官劉度坐論近習龍大淵忤㫖補郡已復罷之中皆不書讀安穆皇后家當賜田而奪殿前軍所買田以自入軍士以為言事下户部尚書韓仲通不可而侍郎錢端禮奏予之中復封上羣小因是媒孽中遂罷去諫官尹穡詆中為張浚黨乾道改元中年適七十即告老至是上思中老儒召赴闕引對中因復以前奏正心誠意致知格物者為上精言之又言比年以來言和者忘不共戴天之讎固非久安之計言戰者復為無顧忌大言又無必勝之䇿必也暫與之和而亟為之備内修政理而外觀時變則庶乎其可上皆聽納除兵部尚書兼侍讀中知無不言其大者則迎請欽廟梓宫罷天申錫宴也中前在禮部論止作樂事中去踰年卒用之是年又將錫宴中奏申前說且曰三綱五常聖人所以維持天下之要道不可一日無欽宗梓宫逺在沙漠臣子未嘗一言及之獨不錫宴一事僅存如魯告朔之餼羊耳今又廢之則三綱五常掃地而盡陛下將何以責天下臣子之不盡忠孝於君親哉中未滿歲即乞告老且陳十要道之說以獻且曰用人而不自用者治天下之要道也以公議進退人才者用人之要道也察其正直納忠阿䛕順㫖者辨君子小人之要道也廣開言路者防壅蔽之要道也考覈事實者聽言之要道也量入為出者理財之要道也精選監司者理郡邑之要道也痛懲贓吏者恤民之要道也求文武之臣靣陳方略者選將帥之要道也稽考兵籍者省財之要道也甲子詔真州六合縣遺火延燒居民寨屋統制官錢卓並不用心救撲顯是弛慢不職可降三官丙子建康都統制郭振言已降指揮令振同淮西總領相度揀選屯田堪披帶人充入隊帶甲不堪披帶人且令依舊屯田於所得子利内約度支給養贍契勘屯田官兵共約三千餘人其毎年所收物斛大段數少若將不堪披帶官兵止于所得子利内支給養贍委是不給乞將屯田諸莊内除巢縣界拓臯莊各召歸正人耕作外其和州界屯田並行廢罷將見占官兵拘收歸軍詔其田令和川召人租田如無人即估價召人承買是月户部言自放行度牒已賣一十二萬餘道今考遞年所納免丁錢止増三五萬貫顯是州縣侵隱望行下諸路提刑司檢察括責盡數入經總制帳毎季起發從之二月壬午朔是月詔均役限田略曰朕深惟治不加進夙夜興懐思有以正其本者今欲均役法嚴限田抑遊手務農桑凡是數者卿等二三大臣深思熟計為朕任此而力行之其交修一心毋輕懐去留以負委托三月壬子朔户部侍郎葉衡言三務場毎歲所收入納茶鹽等錢依指揮比較如有増羡方推賞竊慮將别色應數欲乞立定歲額行在八百萬貫建康一千二百萬貫鎮江四百萬貫收納及額方得推賞是月省諸司吏貟罷淮東總領所併歸淮西仍以總領兩淮浙西江東財賦軍馬錢糧為名詔復都大發運使以史正志為户部侍郎江浙京湖淮廣福建等路都大發運使江州置司尋降緡錢三百萬充糴本户部一百四十萬左藏南庫一百六十萬尋命總領並兼發運使罷鑄錢司以其事歸轉運司罷四川安撫制置司併歸宣撫司夏四月乙未校書郎劉焞奏蜀中毁錢以為銅而乃欲𣙜其銅以鑄錢上問蜀中有出銅處否焞對蜀中銅山但有名耳祖宗時嘗𣙜其銅額不過三百六七十斤上曰原來所出只如此焞奏不但止如此亦自元無之沈該嘗作相建議令𣙜銅山之銅時王之望為轉運使風采震動一路然竟不能𣙜後但科敷民間以應朝廷之令而已上曰如此豈可劉焞又奏衛文公元年革車三十乘季年乃三百乘事上問衛文公能致富莫只是節儉所謂大布之衣大帛之冠否焞奏作𫝊者但記其恭儉之事至於文公操心自别有道所謂秉心塞淵是也若如此沈審即無輕發之事自不枉過歲月所以如期致富也上曰極是極是焞又奏論崇觀以後政事多不要其終曰引法曰鈔法曰方田水利曰官田曰水運曰開邊上曰此皆崇觀創為之否焞奏崇觀皆以紹述為名建立政事人多乘時獻言故多所更張上曰獻言者固是迎合朝廷聽之亦太不審焞奏治平以來君子小人消長事上曰朕毎痛念自治平以前都無事皆自王安石唱之其後章子厚蔡卞繼之至靖康間大臣猶庸繆無狀更不曽畫一䇿以至敗亂焞奏大抵君子消之㡬盡小人既去則不免用庸人上曰極是朕毎以此為戒上又曰大抵小人之進多因迎合朕毎誦兩句云不察察以為明不穆穆以為恭小人察之亦豈勝察但令無可迎合足矣令淮東萬弩手候秋成日依淮西路一體教閱施行時陳俊卿為相奏於揚州和州各屯三萬人預為家計仍借民家三丁者取其一以為義兵授之弓弩教以戰陣農隙之日聚而教之沿江諸郡亦用其法要使大兵屯要害必爭之地待敵至而决戰所民兵合首其城相為掎角以壯聲勢而又言於上曰國家養兵甚費募兵甚難惟有此䇿可守方靣可壯軍勢而樂因循憚改作之人皆以擾民為詞天下之事欲成其大安能無小憂但守臣得人公心體國自不至大擾矣上意亦以為然詔即行之然竟為衆論所持俊卿尋亦去位不能及其成也五月癸丑臣僚奏毎遇大禮凡所湏之物動以千萬計有司但依例抛降近處州郡收買州郡則責辦於屬邑屬邑則取足於平民並不支還價值又輦運所費不貲交納之際老姦宿贓邀阻乞取人受其弊無不怨嗟臣謂三歲一舉希濶之典豈不能捐十數萬緡錢選清強官於近便去處置場和買或許客旅販賣依時價交易嚴立賞罰絶去姦弊變怨嗟為謳歌如此則人心恱而天意得和氣不召而自至矣詔從之辛酉校書郎蕭國梁論漢武帝承富庶之後而有虚耗之弊盖用之者多不止為征伐也上曰不獨漢武帝為然自古人君當艱難之運未有不節儉當承平之後未有不奢侈朕他無所為止得節儉又論鹽鐵商車緡錢等事皆取民無藝上曰正不必如此又論今日坑冶不必捜茶鹽不必外為之法上曰祖宗茶法已盡是誠不必更變臣留正等曰古之為國家者類皆成於節儉而敗於奢侈故卑宮室悪衣服禹所以興至桀則瑤臺瓊室而亡矣不邇聲色不殖貨利湯所以興至紂則以酒池肉林而亡矣自三代以至漢唐靡不然者夀皇聞蕭國梁用財之說反復論議深懲漢武之失至謂他無所為止得節儉此與禹湯之意若合符節誠百王之軌範也甲子前知廣州龔茂良進對上曰廣南在祖宗朝多以重臣分鎮後來士大夫乃以入南為憚南方農事近來如何茂良奏嶺外土曠人稀亦多不耕之田盖縁頃歲湖冦侵擾廣東人户流移今漸次復舊因論奏聽納之道當以功效成否責言者若未見功效而遽賞之恐好言利害之人紛然競進上曰敷納以言明庶以功車服以庸豈可未見效便賞言者茂良奏其下文明言帝不時敷同日奏罔功盖恐反此復為預防之說以告舜上曰正是如此庚午户部狀已降指揮自行在至建康府沿路征稅頗繁可省者省之今措置臨安府自北郭稅務至鎮江府沿路一帶稅場内地里接近收稅繁併去處合行省罷庶㡬少寛商賈詔從之癸酉新知泉州胡銓進對讀劄子至臣嘗恭聞聖訓有及於唯禮不可以己之說如不欲平治天下則已如欲平治天下捨禮何以哉上曰朕記得曽與卿說禮之用甚大於是詔胡銓可與在京宫觀兼侍講甲戌詔曰朕嗣承大業所頼薦紳大夫明憲度總方略率作興事以規恢逺圖屬者訓告在位申飭檢押使各崇尚名節恪守官常而百執事之間翫歲愒日茍且之俗猶在誕謾之習尚滋便文自營以為智模稜不决以為能以拱黙為忠純以繆悠為寛厚隆虚名以相尚務空談以相高見趨事赴功之人則舞筆奮辭以沮之遇矯情沽譽之士則合從締交以附之甚者責之事則身媮激之言則氣索曽㣲特立獨行之操安得仗節死義之風豈亷耻道䘮之日久而浸漬所入者深歟抑告戒懇惻未能孚於衆也繼自今其洒心易慮激昂砥礪毋蹈故常朕則爾嘉或不從朕言罰及爾身弗可悔乙亥臣僚言保正之役為良民之害願行耆長之法募民之有産者為之罷去保正之役臺諌户部看詳言檢會元豐八年十月指揮耆户長壯丁之役皆募充其保正甲頭承帖人並罷欲下兩淮路權依此給催直募耆户壯丁從之戊寅詔舊設兩省言路之臣所以指陳政令得失給舎則正於未然之前臺諫則勅於己然之後故天下事無不理今任是官者往往以封駁章疏太頻憚於論列深未盡善今後給舎臺諫凡封駮章疏之外雖是事之至㣲亦無致忽少有未當可更隨時詳具奏聞務正天下之事左僕射陳俊卿罷虞允文之始相也建議遣使金人以陵寢為請俊卿靣陳以為未可復手疏言之事得少緩允文至是復申前議一日上以手札諭俊卿曰朕痛念祖宗陵寢淪於北地者四十餘年今欲遣使往請卿意以為如何俊卿奏曰陛下痛念陵寢思復故疆臣雖疲駑豈不知激昂憤切仰賛聖謨庶雪國耻然性質頑滯於國家大事毎欲計其萬全不敢輕為嘗試之舉是以前日留班靣奏欲俟一二年間彼之疑心稍息吾之事力稍充乃可遣使往返之間又一二年彼必怒而以兵臨我然後徐起而應之以逸待勞此古人所謂應兵不勝十可六七兹又仰承聖問臣之所見不過如此不敢改詞以迎合意指不敢依違以規免罪戾不敢僥倖以上誤國事惟陛下察之繼即杜門上疏以必去為請三上乃許出知福州陛辭猶勸上逺佞親賢修政事以安邊陲泛使未可輕遣允文遂遣使竟不獲其要領初吏部尚書江應辰舉李垕應制科㫖召試權中書舎人林機言垕詞業未經後省平奏且獨試非故事俊卿奏元祐中謝琮亦獨試機盖為人所使耳上詔俊卿詰之乃機與諌官施元之密謀以是沮應辰而對上又不以實二人因此遂罷應辰竟以與右相論事不合求去俊卿奏應辰剛毅正直乞留之因數薦應辰可為執政上初然之而後竟出應辰守平江自是上意盖向允文而俊卿亦數求去矣俊卿在相位曽覿官滿當代度其必將復入預請以浙東總管處之上曰覿意似不欲為此官俊卿曰前此陛下出覿及大淵中外無不歎仰盛德今外間竊議以謂覿必復來願陛下捐私恩以伸公議上稱善久之俊卿既去覿亦召還遂建節旄歴使相以躋保傅而士大夫莫有敢言者矣閏五月壬午詔廣東運判劉凱特降兩官以凱嘗奏曽造之最至是造犯贓凱以失舉坐罪故也造前知潮州以贓敗除名勒停編管兩雄州仍籍沒家財又前知梧州皇甫謹以侵盗官物入已特貸命刺配梧州甲申刑部狀據建康府司法參軍趙善寅申準勅節文今後權將勅律内應以絹定罪之法更遞増一貫通四貫足斷罪外有勅内以錢數定罪擬欲一例遞増一貫乞備申朝廷又刑部狀據太平州申亦為上件事並送部看詳本部乞將應紐絹定罪更増一貫通作四貫其以錢定罪者亦合一體更與遞増一貫詔從之壬辰鎮江府金壇縣布衣陳士英上書秀州有大辟公事送鞫於常州勘官郟次雲行司張濤臨鞫結案某人枉就死地後致正殺人者出官首身秀州取元行案張濤本縣隱蔽夫前寃枉之獄既如此後容吏之罪又如此有公道乎體上意乎刑獄之大者尚如此矧其小者灼見其㺯法矣詔令吕正已體究申尚書省己亥臣僚言方今重征之弊莫甚於沿江如蘄之江口池之雁自昔號為大小法場言其征取酷如殺人比年不止兩處凡泝流而上至於荆峽虚舟往來謂之力勝舟中本無重貨謂之虚喝宜征百金先抛千金之數謂之花數騷擾不一欲乞行下沿江諸路監司嚴行禁革及刷沿江置場繫併處取㫖廢罷從之壬寅詔江東諸郡多有被水去處漕臣黄石不即躬親按視止差縣官前去顯是弛慢可降兩官癸卯詔江東運司將建康府太平州被水分縣四等五等人户今年身丁錢並與放免一年不得巧作名色依舊科取如有違戾令監司按劾許人户越訴丁未詔入内内侍省東頭供養官徐攷叔為不合請求去法特降一官送吏部與逺小監當是月詔諸州人納觧發並用錢㑹中半范成大為祈請使為陵寢受書二事也敵復書略云和約再成界山河而如舊緘音遽至指鞏雒以為言援曩時無用之文瀆今日既盟之好既云廢祀欲伸追逺之懐止可奉遷即俟刻期之報至若未歸於旅柩亦當並發於行途抑聞附請之詞欲變受書之禮出於率易要以必從於尊卑之分何如顧信誓之誠安在自紹興講和後定受書之禮及乾道再和循舊例降榻受書畢復御座上頗悔之先年因其報問使還及其年遣李若川賀敵尊號悉命口陳祈削舊禮不報至是虞允文議遣使上問誰可使者允文薦李燾及成大退以語燾燾曰今往彼必不從不從則以死爭之是丞相殺燾也更召成大告之成大即承命兵部尚書黄中嘗從容奏曰陛下聖孝及此天下幸甚然今欽廟梓宫未返朝廷置而不問則有所未盡於人心且使敵國之日彊或以是而窺我矣上異其言比成大致書敵果以為詞云詔遣使本為祈請祖宗陵寢而臣下妄興異論可見不忠不孝吏部尚書陳良祐可放罷筠州居住時議遣泛使往請陵寢良祐上疏爭之故也置舒州鐵錢監從發遣使史正志之請也毎歲以五十萬貫為額六月辛亥詔諸路監司責任非輕近來多有闕官去處可檢照累降卿監郎官更迭補外指揮施行壬子内抛降郊祀詔曰要當一純二精務盡吉蠲之饗盖為羣黎百姓匪専服御之華丙辰權盱眙龔鋈奏本軍去秋旱申告朝廷於高郵軍撥米二千石賑貸今二麥收成見在總所牒催還已一靣告報人户情願具到收成熟田毎畆送納課子小麥三升補助支遣勘㑹龔鋈所陳止縁總所拘催先借撥過高郵軍樁管米二千石致上件申請特與除放癸亥軍頭司引見臨安府疎决罪人臣留正等曰恭聞真宗皇帝咸平之四年嘗勑三司引逋負官之人於崇政殿上親臨問釋二千六百餘人除二百六十餘萬緡越明年又閲逋負名籍釋繫囚一千二百六十蠲物八萬三千信史書之天下誦之以謂堯舜三代之仁政不能加毫末於此今壽皇聖帝哀矜庶獄蒐講舊約屋厪當暑引見繫囚尋降赦書悉從末減仁哉壽皇聖帝之心真宗皇帝之心也丁卯新除尚書吏部貟外郎張栻進對奏近日陛下治徐考叔請託之罪并及徐伸罷之英斷赫然臣為諸臣言陛下懲姦不私於近有君如此何以負之上曰朕意正欲羣臣言事如其不言是負朕也又奏謀國當先立一定之規周密備具按而行之若農服田力穡以底於成上曰奕者舉棋不定猶且不可况謀國而無定規乎辛未臣僚言竊見勅令所書成欲進愚謂所書盖君子所盡心者金科玉條不容有改况其利害禍福所係非輕欲望朝廷曲加參訂所貴永有成法天下幸甚詔委兩省侍從審覆訖取㫖進呈甲戍權發遣靜江府李浩朝辭進對上諭監事曰相度以聞官吏貪虐庸懦不任職奏來乙亥趙廓權發遣江南東路兵馬鈐轄囘朝見進對論治軍務要嚴整又論州兵須以正兵夾習上曰嚴整乃治軍之要州兵當兼正兵同赴功廓奏臣所陳皆今日軍政之弊時宰臣謂敵衰可圖建遣泛使往請陵寢士大夫有指其非是者輒斥去之是月吏部郎中兼權起居郎張栻奏疏曰臣竊謂陵寢隔絶言之至痛然今未能奉辭以討之又不能正言以絶之乃欲卑詞厚禮以求於彼則於大義為已乖而度之事勢我亦未有必勝之形夫必勝之形當在於蚤正素定之時而不在於兩陣决戰之日今日但當下哀痛之詔明復讎之義修德立政用賢養民選將帥練甲兵以内修外攘進戰退守之事通而為一且必治其實而不為虚文則必勝之形隱然可見矣於是栻見上上曰卿知邊境事乎對曰不知也上曰邊境饑饉連年盜賊日起栻曰邊境之事臣雖不知然境中之事則知之詳矣上曰何事栻曰比年諸道歲饑民貧而國家兵弱財匱小大之臣又皆誕謾不足倚仗正使彼實可圖臣懼我之未足以圖彼也上為之黙然久之栻因出所奏疏秋七月癸巳詔鄂州建岳飛祠宇以忠烈為額從州人之請也甲午臣僚奏竊以省官不如省事古之格言也國家循襲近世文弊之極上下苦之宜及中外正無事時蚤計所以更革省去繁文漸就簡質欲望陛下委自朝廷博訪官司凡有行遣遷囘者各令日下條具蚤為更革事既漸簡日多閒暇而以圖囘萬務有餘裕矣詔從之丙午權户侍王佐言今之户部即祖宗時三司之職國之會計出納無所不統比年朝廷創立南庫本以豐儲蓄備緩急而不知者以為割户部經常之費為别庫樁積之資殊不知財之在南庫與户部則一也今欲將户部所入根攷括責造成簿籍勾稽驅磨俾無滲漏月終以實收支之數申奏歲終㑹計其盈虚或經常用度之餘有䟎積剰數除量留一月約支外盡以歸之朝廷或朝廷有非泛支用亦合聽户部開具申陳取撥不惟事切一體形跡不存亦使有無相通不誤緩急詔専委王佐䟎造簿籍令陸之望同措置八月己酉新權發遣衢州朝堅常進對奏廣糴常平上曰若一州得二十萬石常平米雖有水旱不足憂矣卿所奏甚好新福建轉運副使沈樞進對奏州郡水旱去處乞留轉運司和糴米接續常平賑糶上曰即為施行戊午新權和筠州葛祺進對論恢復大計上曰盛衰禮之必然又論東南之兵可用上曰㑹稽八千人破秦在用之如何耳又論建康戰船乞修葺添造月具數目申奏上曰甚好已令修葺新修和饒州江璆進對上曰卿向來所陳鹽利甚好廣南田可耕否何不勸誘鄱陽近地大郡卿宜加意治之如二廣上又曰鄱陽所出瘠薄卿宜有以撫䘏之丙寅新知真州常禋進對奏寛民力事上曰不可擾及百姓民兵切留意臣僚言比年監司郡守近朝廷者固已極一時之選而地逺者未能悉稱陛下東求之意今畿甸之民州縣一不得其情則之臺之省以至撾鼓必徹而後已逺方之民縣不見省則愬之州州不見省則愬之監司監司又不見省則死且無告矣欲望陛下益加宸慮如除授逺地監司郡守比近地為加審委臺諌訪問糾劾比近地為加嚴詔從之癸酉太學正薛元鼎進對論周之名將南仲為武成王同時之將乞改配食武成王上喜以謂南仲之孫皇父猶為宣王中興之將便可施行又奏太學釋奠輪差南班宗室陪位觀禮今差武舉從祀已定乞令三衙管軍及環衛官輪陪位觀禮上曰亦使之知知寧國府姜詵劄子今來合於十月内措置修圩濟養圩户饑民除以委官前去相視料度工役續具申聞外今採訪得今來所壊圩岸比之紹興年内所費多所減省兼有合行門决除廢去處見行相度亦當具申朝廷詔其餘州軍有圩岸損壊去處令守臣依此措置修整仍具工役去處申尚書省甲戌右朝請大夫吕游問進對論祖宗成法上曰言事者未必盡知利害便與更張是月復勅令所九月壬寅新權發遣衢州施元之進對進用人責小過太詳上曰今日之弊正在此臣留正等曰用人之道取其長者必䕶其短其大節茍可稱則其細故雖略焉可也漢高祖不以小行而廢陳平唐太宗不以怨仇而廢魏證卒之謀謨諫諍皆為名臣其理盖昭昭也觀守臣論用人責小過之失而壽皇灼知為今日之弊聖謨洋洋如天覆物人才之在天下孰非可用者乎是月詔役法為下三等户之害並以官民户通差池州都統呉總朝辭上曰將帥難得人故文臣中擇卿將帥須先民事後統軍冬十月戊申權發遣興元府王之竒奏伏覩歸正官承信郎劉湛右廸功郎劉思顔父子等保䕶陵寢忠義事節湛子師荀師顔與其親黨㡬五十人深念祖宗德澤不顧敵國驕横謂聖朝陵寢不可犯謂臣子節義不可失共甘一死以支強弱之形勢連年繫獄子死婦亡衆人聞此為之骨驚而湛父子含笑受之非天資忠義何以至此詔承信郎劉湛特轉兩官劉思顔改右承務即陞擢差遣秦世輔特轉一官陞充正將仍宣付史館癸丑湖南轉運副使黄鈞進對論士大夫風俗不振上曰君相不當言命士大夫不當言風俗士大夫風俗之本也又論水旱上曰當早為之備丙辰知信州林機進對因論昔曹彬下江南太祖皇帝靳一節度使不予近世為將者未嘗有戡難破敵之功爵賞過厚至於極人臣之位願陛下鑒是為駕馭之術庻可責效於異日上曰此實人主礪世之術也丁巳權知襄陽府司馬倬奏父故試兵部侍郎朴乞賜諡得㫖特與贈諡太常寺欲擬諡曰忠肅危身奉上曰忠執心决斷曰肅詔司馬朴賜諡忠潔甲子禮部尚書劉章進對奏臣聞李德林在隋開皇初與修勅令請於朝謂欲有更張者當以軍法從事夫法之弊也故修之修之而未必皆當與衆共議之可也乃欲脅之以軍法其亦不仁甚矣仰惟陛下清明逺覽命官取新舊法並前後勅㫖緝而修之越舊書成廼以奏御而丙夜之觀尤為詳悉其間有未便於人情未安於聖心者莫不朱黄識之稍或可疑必加改定然後頒行欲望播告中外惟新書是遵上曰朕已㸔一遍亦異乎隋高祖之事矣詔從之癸酉新江西轉運判官芮揮進對上曰卿當先正士大夫風俗次則民間訟牒早與裁决其次則漕運卿所陳甚好在合理㑹奏來是月復武提刑先是陳俊卿在相位日御札依祖宗舊制復置武提刑俊卿言此職自景德以來置復不常今用文臣一貟亦無闕事貟外増置徒為煩擾乃止至是卒置之造㑹計録從都大發運使史正志之請也十一月丁丑朔詔淮南轉運司今後使人往來應副舟船並責令篙梢結罪如敢船載錢寳一文以上過界流配一貫以上及憑恃貴勢抑勒裝載並依軍法施行若篙梢隱匿與犯人一等斷罪仍許人陳首若錢數多取㫖陞擢漕臣不行覺察重行黜責壬午郊乙酉大禮慶成臣僚劄子伏見郊祀隂雨連日自聖帝致齋酌獻景靈宫天宇澄霽祥煙瑞霧環繞殿楹囘鑾太廟又雨至夜漏四刻隂雨頓開星斗燦然行朝饗之禮焉明日駕如青城亦晴道旁觀瞻甚盛霏微凍雨還作將祭之夜駕幸大次更衣數星燁然現於雲表及登壇樂作四郊雲隂尚盛獨歲星中天靈光下燭終禮成不雨行禮之次差官廵杖至城門雨大霪獨泰壇無有此皆聖上寅畏格于上天天意昭答乞宣付史館以彰聖德詔宣付史館張栻劄子略曰陛下之心即天心也陛下之心欲定未定故上天之應乍隂乍晴天人一體象類無間深切著明有如此者臣願陛下毋以此為祥瑞之事而如此存敬戒之心試思夫次日御樓肆赦之際日光皎然四無纎翳天其或者何不早撤雲隂於行事之時使聖懐坦然無復憂慮而必示其疑以為悚動然則丁寧愛陛下之意深矣天意若曰今日君子小人之消長治亂之勢中外之形皆有所未定特在陛下之心何如耳若陛下之心嚴恭兢畏常如奉祠之際則君子小人終可治治道終可成國耻終可滅當如祀事終得成禮惟陛下常存是心實天下幸甚己丑國子録姚崇之輪對論大將而下有偏禆凖備將之屬豈無人才可膺王佐之任乞驟加拔擢如古人拔卒為將上曰茍得其人不拘等級權通判建康府許克昌進對乞命兩省侍從更宿禁中賜以燕問從容以盡天下之事上首肯如是詔許克昌與知州軍差遣又乞命郡守以治兵為殿最武臣提刑按閱郡兵上曰正是如此又論揀汰使臣及歸正人州郡拊之不至上曰卿如今典郡正要如此又論禁流言上曰流言為害又論弭盗賊上曰甚好庚寅臣僚劄子伏覩已降指揮加上光堯壽聖太上皇帝壽聖太上皇后尊號謹按太唐詔令凡上太上皇尊號係人主率百官上表陳請謂宜參用唐制以稱主上事親盡敬之意詔從之十二月丙辰監左藏西庫周權進對奏増減偽㑹罪賞上曰期於必行又奏行賞罰上曰當先賞而後罰戊午太學録袁樞輪對因論今日圖恢復當審察至計以圖萬全之舉上曰卿言極是當如此己未工部侍郎胡銓奏於隆興之初仰䝉聖訓令臣捜訪詩人臣已物色得數人上曰可具姓名來庚申禮部尚書劉章進對奏當今縣邑之政出於苟且為令者惟知以官錢為急月解無欠則守臣監司必喜之而民訟不理皆置不問上曰豈可取其辦錢而不察其政癸酉詔史正志職專發運奏課誕謾廣立虚名徒擾州郡責授楚州團練副使永州安置其發運司可立近限結局復置淮東總領所大閱於白石宋史全文卷二十五上欽定四庫全書宋史全文卷二十五下宋孝宗四辛卯乾道七年春正月丙子朔加上太上皇帝尊號曰光尭壽聖憲天體道太上皇帝太上皇后尊號曰壽聖明慈太上皇后癸未上諭輔臣曰前日奉上冊寶太上聖意甚恱翌日過宮侍宴邦家非常之慶漢唐所無也又曰本朝家法逺過漢唐惟用兵一事未及朕以敵讎未復日不皇暇如宮中臺殿皆太上時為之朕未嘗敢增益太上到宮徘徊周覧為之興歎頗訝其不雅飭也上又指殿東樓曰去此樓無數歩遇花時亦不曽往或令人拗數枝來觀耳輔臣奏陛下不以萬乘為樂而以中原為憂早朝宴罷焦誠如此誠古帝王所不及上曰朕無他嗜好或得暇惟書字為娛耳虞允文等奏曰臣等見石墀上皆陛下草聖筆力天縱有飛動之狀上曰戲書不足觀朕近寫得一軸因顧内侍取示允文等廼郭熙秋山平逺詩因以賜允文又曰太上真草皆極古今之妙來日與卿等覔來允文等頓首謝己亥上曰元日上冊寶天色開霽两宮欣豫人情和恱薄晚方雨天意昭昭如此上又曰無逸一篇享國久長皆本於寅畏朕近日取尚書中所載天事編為两圖朝夕觀覧以自儆省名之曰敬天圖允文奏古人作無逸圖猶夸大其事陛下盡圖書中所載敬天事又逺過之惟聖人盡躬行之實敬畏不已必有明效大驗上曰卿言誠然是月進呈泉州左翼軍統制趙渥招到軍兵一千人並不支廩庫中例物上曰趙渥當與旌賞虞允文奏且與一遥郡上曰賞宜從重設使職事有闕罰亦不輕可與遥郡團練使庚子進呈即曹多闕貟上曰昨召數人皆未到可且令寺監丞兼權數日前有人説近來自郡守為即間有不曽歴職事官者却似太驟此言甚有理虞允文奏近來舘學寺監拘礙資格遷除不行故有自縣便為郡自郡便為即者是舘學寺監反不如州縣之㨗也上又曰此又失之外重矣梁克家奏元立資格所以重即選及無履歴者一旦得之即選却輕矣上曰然今後除授正不可令超躐在外更有甚人才卿等可選五六人召來癸卯進呈三衙舊司禁軍人數上曰祖宗時上四軍分止是支數百料錢梁克家奏秘閣中有太祖御札禁軍劵錢至親筆裁减一二百者上曰雖一麻鞋之微亦經區處祖宗愛惜用度如此克家奏非泛賜予尤不可輕韓昭侯非靳一敝袴也不以予無功之人上曰予及無功則人不知勸克家奏豈惟無功者不勸有功者且觧體矣上曰然因顧虞允文曰昨遣内侍往江上欲就令撫問以卿言而止正為此也允文奏郭子儀所得上賜甘蔗幾條柑子幾顆人主以此示恩意耳今諸將受陛下厚恩未有以報上曰郭子儀有大功於唐今諸將孰有子儀功賜予誠是不可輕也是月復置鑄錢司二月丙午朔宣歩軍司將弓箭手於初四日入内射鐵簾弓箭手舊管合格一千七百四十九人新招未合格四百四人戊申新知泰州李東朝辭進對上曰卿到任須多買耕牛勸課農桑臣留正等曰農桑天下之大本也一夫不耕或受之飢一婦不織或受之寒昔人垂訓昭然明甚漢之文景務在養民當時詔㫖之肦為農桑而下者不一而足遂致海内盛富興於禮義其效驗盖非淺淺者近世為吏者罕知此理夀皇戒之其將以警俗吏使知朝廷養民之至意與丙辰左司貟外即兼侍講張栻言本朝治體以忠厚仁信為本因及熙豐元符用事大臣上曰祖宗法度乃是家法熙豐之後不合改變耳丁巳上宣諭曰祖宗時數召近臣為賞花釣魚宴朕亦欲暇日命卿等射弓飲一两盃虞允文等奏陛下昭示恩意得聸近威顔從容獻納亦臣等幸也上曰君臣不相親則情不通早朝奏事止頃刻間豈暇詳論治道故思欲卿等從容耳庚申上宣諭近世廢弛之弊宜且糾之以猛他日風俗變易却用寛政譬之立表傾則扶之過則正之使之適中而後已虞允文奏古人得衆在寛救寛以猛天地之心生生不窮故隂極於剥則復上曰天地若無肅殺何以能𤼵生梁克家奏殺之乃所以生之天地之心歸於仁而已上曰然壬戌上曰晴色甚好去秋水澇朕甚以百姓之食為憂今却無流移之人虞允文奏監司守臣類能䆒心荒政故米不翔貴上曰亦大叚支了官中米斛梁克家奏陛下自數年來常平摏積極留聖意不然今日豈有米斛可以那撥上曰如此理㑹尚且菫菫不足允文等因奏諸郡守臣若得人遇歳水旱寧至上勤聖慮上曰當擇其有顯效者旌之更有修圩一事卿等記之他日當行賞也己巳上又曰今春雨𤾉甚調二麥必好允文奏米價極平上曰此豈州縣勸糶之效歟克家奏水旱惟先事措置則用力少而為惠愽上曰今歳却是措置得早使赤子不至流離卿等力也是月立皇第三子恭王惇為皇太子大赦尋以王十朋陳良翰為太子詹事劉焞國子司業兼太子侍讀先是上謂輔臣曰古人以教子為重其事備見於文王世子湏當多置僚屬愽選忠良使左右前後罔匪正人不然一薛居州亦無益也又曰舊來官屬幾人虞允文等奏詹事二人庶子諭德兼講讀者二人上曰宜增二貟誰可當此選者允文等奏恭邸講讀官有李彦頴劉焞二人上曰焞有學問彦頴有操履两人皆好卿等更選取數人及進呈上覧之曰王十朋陳良翰此二人皆好十朋舊為小學教授性極疎快但臨事堅執耳允文奏賔僚無他事惟以文學議論為職不嫌於堅執也上曰十朋良翰誠是忠蹇可並除詹事上又曰劉焞兼侍讀李彦穎却兼侍講何也允文等奏李彦頴既兼左諭德以侍講無人併令兼之上曰侍講可别選人乃命焞為司業兼侍讀工部侍郎胡銓亦請飭太子賔僚朝夕勸講上曰三代長且久者由輔導太子得人所致末世國祚不永皆由輔導不得其人銓自五年冬因除知泉州趣令入對遂留侍經筵尋有是除或忌銓敢言指細故雜他朝士併言之冀不得獨留銓以年逾七十力求致仕除待制與外祠未數日復留侍講筵未幾以舉官失當貶秩二等銓力求去除直學士奉祠淳熙六年致仕明年卒以皇子愷判寧國府進封魏王尚書左司即中兼侍講張栻講詩葛覃進説曰治生於敬畏亂起於驕淫使為國者每念稼穡之勞而其后妃不忘織紝之事則心之不存者寡矣周之先后勤儉如此而其後世猶有休蚕織而為厲階者興亡之效如此可見因推廣其事上陳祖宗自家刑國之懿下斥今日興利擾民之害上嘆曰此王安石所謂人言不足恤者所以誤國時知閣門事張説除簽書樞宻院事栻夜草手疏極言其不可且詣宰相質責之語甚切宰相慚憤不堪而上獨不以為忤親札疏尾付宰相使諭㫖栻復奏曰文武誠不可偏然今欲右武以均二柄而所用乃得如此之人非惟不足以服文吏之心正恐反激武臣之怒上感悟命得中寢然宰相實隂主説明年乃出栻知袁州而申説前命説後竟謫死云三月乙亥朔上出馮堪海道畫一以示宰臣虞允文曰馮堪所陳不可行者一可行者二其言淮中一帶置鋪舉烽火此不須行明州神前山差人船卓望黃魚垜分官兵往來廵綽此兩事可令馮堪與趙伯圭同共措置辛巳上曰户部所借南庫四百萬緡屢以諭曾懐不知有甚指凖撥還虞允文奏不過指凖折帛耳梁克家奏今左帑無两月之儲大叚急闕不可枝梧上曰户部有擘畫否允文奏有两事衆論未以為然其一給典帖其二賣鈔紙上曰此两事既病民且傷國體俱不可行更令别議以聞丁酉宣諭歩軍司未經内教弩手於二十五日絶早赴水門祇候宣押内教射鐵簾弩手一千六百七人戊戌虞允文奏胡銓蚤歳一節甚高今縱有小小過失不宜令遽去朝廷上曰朕昨覧䑓章躊躇两日意甚念之但以四人同時論列不欲令銓獨留梁克家奏銓流落海上二十餘年人所甚難上曰銓固非他人比宜且除在京宮觀留侍經筵庚子進呈胡沂具到彭德等盜馬因依虞允文奏曾昭誘山寨人盜馬已而殺其人人情甚不安至有逃入山中不敢出者上曰昭欲自掩其過乃乖謬至此須重作行遣可追三官放罷梁克家奏邀功生事邊臣不可輕貸且如知沅州孫叔傑以兵攻徭人引惹王再彤等聚衆作過驚擾邊民幾成大患前日得㫖放罷行遣太輕上曰可更降两官是月復將作監申嚴閉糴禁夏四月乙巳朔詔春季拍試事藝最髙強人名待與補轉两資虞允文奏外尚有增加斗力四千餘人須將本司兵官略與推恩上曰軍中既有激賞人人肯學事藝何患軍政不修若更本官亦復推賞尤見激厲庚戌宰執進呈訖上因及近日移戍㸃軍虞允文又奏或以為擾上曰近有两三人亦如此説昨日講筵又有及前日差除者朕於聽言之際是則從之非則違之初無容心其間梁克家奏天下事惟其是而已是者當於理之謂也上曰然太祖問趙普云天下何者最大普曰惟道理最大朕嘗三復斯言以為祖宗時每事必問道理夫焉得不治己未宣押殿前司選鋒䇿鋒两軍弓箭手各七百人入内射庚午進呈有告統兵官掊尅不法者上令付大理寺治之虞允文奏恩威相須乃濟上曰威克厥愛允濟愛克厥威允㒺功蘇軾乃謂尭舜務以愛勝威朕謂軾之言未然梁克家奏先儒立論不可指為一定之説如崔寔著政論務勸世主馭下以嚴大抵救弊之言各因其時耳上曰昔人以嚴致平非謂深文峻法也紀綱嚴整使人不敢犯耳譬如人家父子兄弟森然法度之中不必須用鞭扑然後謂之嚴也辛未宣押選鋒䇿鋒两軍弩手一千六百一十一人入内射是月詔今歳科場其令尚書侍即两省諫議大夫以上御史中丞學士待制各舉賢良方正能直言極諫一人守臣監司亦許解送仍具詞業繳進以聞楚州饑賜米五千石賑之劉珙起復同知樞宻院宣撫荆襄珙凡六疏辭之引經據禮詞甚切至最後言曰三年通䘮先王因人情而節文之至於漢儒乃有金革無避之説此固以為先王之罪人矣然尚有可諉者則曰魯公伯禽有為為之也今以陛下威靈邊陲幸無犬吠之警臣乃欲冒金革之名以私利祿之實不亦又為漢儒之罪人乎抑陛下之詔臣則有曰義當體國者矣其敢噤無一言以塞明詔哉乃手䟽别奏略曰天下之事有其實而不露其形者無所為而不成無其實而先示其形者無所為而不敗今德未加脩賢不得用賦斂日重民不聊生將帥方割士卒以事苞苴士卒方飢寒窮苦而生怨謗凡吾所以自治而為恢復之實者大抵闊略如此而乃外招歸正之人内務禁衞之卒規筭未立手足先露其勢適足以速禍而致寇臣不知其為此議者將何以待之也且荆襄四支也朝廷腹心元氣也誠使朝廷施設得宜元氣充實則犂庭掃穴在反掌間耳何荆襄之足慮如其不然則荆襄雖得臣軰百人悉心經理顧亦何足恃哉以今而慮臣恐恢復之功未易可圖而意外立至之憂將有不可勝言者惟陛下圖之上納其言為寢前詔以皇太子尹臨安府尋以晁公武為少尹李彦頴劉焞兼判官陸之望馬希言為推官五月戊寅宰執奏王朴荆鄂㸃軍事梁克家奏近諸將御下太寛今綂制官有敢鞭綂領官以下者否太祖皇帝設為階級之法萬世不可易也上曰二百年來軍中不變亂盖出於此虞允文奏法固當守主兵官亦要以律己為先曰誠然前日一二主兵官不能制其下反為下所告者端以不能律己故耳壬辰上曰近日雨𤾉尤好麥已登場稲田亦下種矣虞允文奏農人得雨種稻得晴刈麥两不闕事上曰朕心惟望百姓富實國計又其次也辛丑上語及臨安事因曰韓彦古在任時盗賊屏迹此其罷也羣盗如相呼而來以此知治盗亦不可不嚴惜乎彦古所以治民者亦用治盗之術治盗當嚴治民當寛難以一律六月壬子右正言許克昌奏日者命䑓諫两省以上以四條薦士宜皆盡心公選訪聞劉之柄頃為京局以侵盗官錢擒付棘寺盡償所盗鐫官放罷李撥頃為靖州廹於七十輙自申部擅减十年意欲撓冒闗陞磨勘吏部以其無廉耻欺㒺劾奏之降两官勒令致仕二人皆汙薦墨聞者竊笑又聞二人皆胡銓所薦而之柄與之衡又劉章子也章身為從官奉詔薦士而乃徇私罔上烏得無罪望下三省公議舉者之罪詔依胡銓可降授左通直即劉章可授以左中奉大夫乙卯進呈張權劄子淮西麥熟米價平秋成可望上曰時和歳豐卿等恊賛之力朕當與卿等講求其未至者以荅天休虞允文奏聖德無闕動合天心上曰君臣之間正要更相儆戒朕有過卿等悉言之卿等有未至者朕亦無隠庶幾君臣交修以荅天貺丙辰太常寺丞蕭燧論人君聽言必察其可用之實所言與所行相副然後可信上曰所論甚當人誰不能言但徒能言之而已要當觀其所行書所謂敷奏以言明試以功是也乙丑宗正寺丞戴幾先輪對因論人才當以覈實為先上曰尭舜用人敷納以言明試以功此責實之政丁卯上曰侍從或除人卿監必有闕貟冝擇其可為者卿等可選數人將上秋七月乙未梁克家奏近時有两事皆前世不及太上禪位陛下逮儲皆出於獨斷上曰此事誠漢唐所無朕常恨功業不如唐太宗富庶不及漢文景耳虞允文奏陛下以儉為寳積以歳月何患不及文景如太宗功業則在陛下日夜勉之而已上曰朕於創業守成中興二者皆兼之蚤夜孜孜不敢怠遑毎日昃時已無一事則自思曰豈有未至者乎則求三两事反覆思慮惟恐有失上曰朕近於几上書一將字往来尋繹未得擇將之道卿等更思之虞允文奏人才臨事方見上曰極是唐太宗安市之戰始得薛仁貴是月賑湖南江西飢中書舎人范成大言夫賑濟賑糶其要不過两言莫不便於聚人莫良便於散給詔免两淮民户丁錢两浙丁塩絹上諭輔臣曰范成大言處州丁錢太重遂有不舉子之風有一家數丁者當重與减免卿等更詳議來尋又蠲旱傷路流民户税八月己巳上語黎州邊事令宰執以書諭胡元質吳總等如蠻人以市馬要我則且住一两年使權常在我彼無能為自然安帖畏服丙午殿司左軍刼馬軍司使臣家被獲上曰不當以治百姓之治治之虞允文奏强盗已不可貸况軍人乎己未進呈两浙漕臣糴樁積米上因宣諭曰洪範八政以食為先而世儒乃不言財穀邦之有儲蓄如人之有家計欲不預辦得乎戊辰趙樽乞陞差孟俊閻大亨上曰孟俊可依閻大亨係使酒犯階級雖閲二年事干軍政此未可也庚午上謂宰執曰朕近日宮中覺得無事卿等想甚勤勞又曰卿等凡所謀猷無不曲盡毎深嘉嘆朕近日無事又時過德壽宮太上頤養愈勝天顔恱好朕退輙喜不自勝虞允文奏神噐之重得所付託聖懐無事自應如此堯獨髙五帝之壽者以此上曰誠然九月壬申朔上曰江西湖南旱歉恐可募兵两路各且募千人梁克家奏外路募兵多憚所費虞允文奏曰撥截上供亦可上曰然所募之人發赴三衙切恐太逺當與分撥允文奏江西去江池為近湖南去鄂渚為近上曰可便䧏指揮仍與分撥行下戊寅上曰漢髙帝初年專意馬上之事世祖增廣郊祀亦在隴蜀既平之後昔人規恢逺略㒺不在專繁文末節盖未暇問梁克家奏髙帝創業世祖中興今日之事乃兼守成祖宗二百年來典禮畢備當以時舉上曰典禮何可盡廢抑其浮華而已自今已往卿等毎事當先務實稍渉浮文必議蠲省壬午湖北京西總領兼措置屯田呂㳺問言本所所管營田屯田内官兵闕人耕種之處乞依舊頃畆出榜召百姓依元額承佃從之租課令本所拘管丁亥進呈呂㳺問得㫖令措置㐮陽寨屋梁克家奏將徙荆南之屯否上曰欲令移去如何虞允文奏曰荆南之人歳歳更戍自此可免道塗往返之勞然有二不便上曰襄陽極邊驟添人馬對境必致驚疑允文奏此正是一不便又自荆南至襄陽水運千餘里河道淺狭難於餽糧此二不便以臣愚見不如先移軍馬餘續議之上曰甚善可諭此意令呂㳺問同秦琪措置是月進呈六部長貳歳舉改官人皆是後來許依職司收使今合依舊法上曰甚好梁克家奏在京選人無外路監司薦舉若六部長貳又不許作職司必不得改官上曰舊法既然當使人從法不可以法從人也虞允文奏舊法京局不以選人為之故六部長貳不作職司亦可今皆用選人後來磨勘不行必重申請却須更改上曰此事續議施行冬十月甲辰虞允文奏两司增加㪷力事藝升進者千餘人費不過楮千餘貫昨有錫金椀者軍中歡呼無不歆艶上曰聞其戴椀乗馬而歸道路聚觀如此見者必勸矣是月賑饒州飢上因覧知州王秬賑濟畫一曰饑歳民多遺棄小兒已付諸路收養如錢物不足可具奏來於内藏支降罷紹興府宗正行司以其事歸大宗正司本朝宗室皆聚於京師熙豐間始許居於外崇寧間始即河南應天置西南二敦宗院靖康之禍在京宗室無得免者而睢雒二都得全建炎初將南幸於是大宗正司移江寧而西南外初寓於揚州及鎮江卒又移於泉福二州而居㑹稽者乃紹興初以行在未有居第權分宗室居之及恩平郡王璩出居㑹稽遂以為判大宗正司至是省之十有一月丁亥進呈乞改和州西路花裝隊上曰三衙舊亦結花裝隊昨已更改與其臨敵旋行抽摘不若逐色團結之有素也甲午虞允文奏舊法黃甲不曽到部人在銓試下等人之上上曰可依舊法又曰改法不當終有窒礙不如加詳審於初則免改更於後也是月䇿制科眉山布衣李燾入第四等賜制科出身十有二月戊午進呈外路收捉八廂指揮先是軍人王俊自稱八廂詐取軍中錢物配廣南上曰御前從來無八廂差出可擬指揮行下諸路如有自稱八廂之人即行收捉根勘至是進呈上顧虞允文曰卿昨所言若真八廂對人自稱亦所當罪此言甚當丙寅詔都統制歳舉所知二人統制歳舉一人以智勇俱全為上以善撫士卒為次以專有膽勇又為次將校士卒惟其所舉從臣僚之請也是月令閤門官依文臣舘職輪對是歳移馬軍司屯于建康府四川總領所奏昨縁本路措置備邊樁積遂申朝廷乞降空名度牒仍拘收四川事故僧道度牒繳納訖欲乞將已賣過四千五百道作第一料所有去年十二月内已降二千道今更乞貼降二千五百道凑作第二料下本所出賣拘收價錢搬赴宣撫司專充備邊樁積非遇緩急分文不敢支用從之趙雄使北附國書復請陵寢及受書之禮及雄入辭北使其臣宣諭云傳語宋皇帝向來初講和日宋朝來祈請徽宗皇帝靈柩已送還了今再講和宋國自當來祈請欽宗靈柩父子同葬以時奉祀去年使來却妄請鞏雒山陵上國止許奉遷并許一就𤼵還欽宗皇帝靈柩上國已令搬取在此俟來報聞今宋國既不欲請上國却當就鞏雒山陵附葬無一語及受書事雄歸奏金主庸人耳於陛下無能為役中原遺黎日望王師必有簞食之迎倒戈之舉上甚恱壬辰乾道八年春正月辛未禮部大理寺狀臣僚言乞置太醫局及醫生試補之法得㫖更不致局依舊存留醫學科遂舉許令赴試戊寅太常博士楊萬里輪對論及人材上曰人材要辨實偽要分邪正又曰最不可以言取人孔子大聖猶曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行故以言取人失之宰予乙酉太常少卿黃鈞奏切謂國莫重於禮禮莫嚴於分伏見四孟月景靈宮朝獻皇帝與羣臣俱拜於庭心切疑之退而求之禮經考之儀注有所不合問之掌故則渡江之後羣吏省記者失之也曲禮曰君踐阼臨祭祀禮噐曰廟堂之上罍樽在阼又曰君在阼正義曰阼主人階也天子祭祀升階而行可也神宗元豐間詳定郊廟禮文明堂太廟景靈宮行禮兼設皇帝版位於東階之上今親郊之歳朝獻景靈宮朝饗太廟皇帝拜上羣臣拜下矣獨四孟朝獻設褥位於阼階之下則是以天子之尊而用之大夫士臨祭之位非所以正禮而明分也欲遵元豐之制每遇皇帝孟月朝獻設褥於東階之上西嚮以禮則合以分則正禮部太常寺同共討論欲依所乞及乞於見今儀注内修定施行詔從之丙戌宰執乞討論上丁釋奠皇太子入學之儀上曰禮記文王世子篇載太子入學事甚詳梁克家奏入學以齒則知父子君臣長㓜之道古人所以教世子如此虞允文奏此事備於禮經後世罕有舉行者上曰可令有司討論以聞二月乙巳詔曰朕惟帝王之世輔弼之臣其名雖殊而相之實一也厥後位號定於漢而稱謂洎於唐以僕臣而長百僚朕所不取且丞相者道揆之任也三省者法守所自出也今捨其大而舉其細豈責實之議乎肆朕稽古釐而正之盖名正則言順言順則事成為政之先務也其改尚書左右僕射同中書門下平章事為左右丞相虞允文為左丞相梁克家為右丞相曾懐參知政事張説王之竒並簽書樞宻院事懐之竒仍賜出身尋詔已正丞相之名其侍中中書令尚書令尚存虚名雜壓可刪去以左右丞相充其位張説者父故省吏也説以父任為右職妻憲聖皇后女弟由是累遷知閤門事隆興初兼樞宻副都承㫖乾道初落副字七年春除簽書左司貟外即張栻侍講席因諌止之遂以觀察使陞節度奉祠至是乃復申前命起居郎莫濟不書錄黃直學士院周必大不草説荅詔於是二人皆與外祠乃令姚憲權給事中書讀行下趙汝愚時為著作佐即不往見説率同列並請祠不報㑹其祖母卒不俟報即日歸省父因自劾上不加罪就除知信州己酉詔隨龍判太史局李繼宗两該德壽宮應奉轉三官許囬授可將與男安國補太史局保章正充歴筭科臣僚言保章從八品與宣義成忠即等耳使其精於歴算雖特命之可也用其父之囬授則恐不可開此例耳雖曰三官以易一命若使異時羣臣近習有不知事體不顧廉耻皆乞用此例陛下何以拒之更加聖慮而寢其命詔從之丙辰御史䑓狀得㫖令開具六察所隷覺察弹劾事伏並見今監察御史職事以聞本䑓契勘覺察弹劾日前並係殿中舉長貳通行風聞弹劾即不属六察其六察管取索所𨽻百司簿書分案㸃檢稽違差失行遣不當等事合依應指揮並分𨽻六察虞允文等奏祖宗時監察御史却許言事上曰今既分𨽻六察可許隨事弹奏自此臺諫肅清矣三月己巳馬軍司李顯忠乞兊換民田充都教場有司申明間不願欲毎畆支錢五貫文收買上曰馬司諸軍皆未有教場否虞允文奏雖有之但未有都教場以備合教上曰建康管軍馬自有大教場毎遇合教可以時暫教閲允文奏豈非聖意不欲取民田否上曰然壬午上泛論人材顧謂虞允文等曰士大夫難得任事之人盖為風俗未醇今雖稍有秪是未多允文奏承平時前軰名臣如范仲淹韓琦等在邊尚猶難之上曰當時往往亦多失利盖由未甚知兵允文奏非不知兵但不教之兵難以禦敵上曰西夏小夷當時亦自枝梧不行所以馴致丙午之耻朕今孜孜不倦期與卿等共雪之今聞敵人上驕下惰朕所以日夕磨厲必欲今日我之師徒如昔日敵人之兵勢盖思反之也庚寅殿前司奏乞令董世英等總轄軍兵於揚州牧馬上曰向來聞董世英及張唐臣使酒朕嘗戒之張唐臣已遵約束悛改朕以二金椀賜之董世英聞尚未悛豈宜差去可别差人仍令本軍戒諭壬辰宰執進呈乞㸃檢諸軍戰船上曰舟檝正是我之所長豈可置而不問鄂州荆南江州可差姜詵前去池州以下委葉衡具數奏聞仍令逐軍日下修整丙申詳定一司敕令所奏修正三公三少法諸太師太傅太保為三公左右丞相為宰相少師少傅少保為三少詔從之是月殿試舉人賜黃定以下及第出身有差仍賜御書益稷篇武舉正奏絶倫特奏並依文舉例唱名日給黃牒賜及第出身有差夏四月丙午進呈宰臣制國用事上曰官制已定丞相事無不統所有兼制國用更不入衘知化州黃克仁朝辭進對上曰逺方小民政賴郡守撫摩勸課農桑甲寅户侍楊倓奏義倉在法夏秋正税每一斗别納五合即正税不及一斗免納應豐熟一縣九分已上即納一升惟充賑給不許他用今諸路州縣常平義倉米斛不少年來雖間有灾傷去處支給不多訪聞皆是擅行侵用從來未曽稽考乞下諸路常平官限半月委逐州主管官取索五年的實收支數目仍開説逐年有無灾傷檢放及取給過若干并見在之數實計若干目今在甚處樁管結罪保明文帳申部稽考施行從之己未虞允文等䝉宣示賜新進士御書益稷篇不勝榮幸梁克家奏益稷首載治水播奏艱食末載君臣更相訓敕之意學者因宸翰以味經㫖必知古人用心矣上曰如所載無若丹朱傲等語見古者君臣儆戒之深允文奏舜與臯陶賡歌之辭舜則曰股肱喜元首起臯陶則曰元首明股肱良又繼以元首叢脞股肱惰之語君臣之間相稱譽相儆戒自有次序如此所以能致無為之治上曰然此篇實以民之粒食則知務農為治之本至於告臣隣之言則曰庶頑讒説若不在時侯以明之撻以記之又曰格則承之庸之否則威之是古之聖人待天下之人未嘗不先之以教及其不格則必以刑威之今為書生者多事威文而忽兹二事是未究古聖人之用心也因欲使知之辛酉上御射殿引諸班直呈射上顧虞允文等曰排立行門東邊第三人于江極能射弓直射到三碩斗力亦願從軍允文奏似此武藝之人難得皆陛下戒約閲習以至於此上曰然癸亥臣僚言役法之均其法莫若限民田自十頃以上至于二十頃則為下農自二十一頃以上至于四十頃則為中農自四十一頃以上至于六十頃則為上農然後可使上農三役中農二役下農一役其嘗有萬頃者則使其子孫分析之時必以三農之數為限其或詭名挾户而在三農限田之外者則許人首告而沒田於官磨以歳月不惟天下無不均之役亦且無不均之民矣詔戸部看詳五月己巳新江東提㸃刑獄公事蕭之敏乞宮祠上不允虞允文奏前日之敏言臣是其職事臣雖不知其所論奏竊自揣度其罪如章無可疑者既䝉聖恩復令暫留如蕭之望端方願召歸舊班以闢敢言之路上曰今以監司處之亦自甚優顧曾懐曰丞相之言甚寛厚可書之時政記乙未上曰吏職武臣遷轉泛濫太甚嘗令吏部侍即張津條具以聞據奏到六部等處出職武臣自來衮同軍人戰功及奏補出身人並至武功大夫方不許磨勘上曰止依左選立定正法又條具一項如至正法該遇恩賞非係特㫖不許轉行上曰可除去特㫖轉行一項不欲更開此路以啓僥偉之心庶清流品不至泛濫是月福建塩行鈔法從轉運陳峴之請也仍支借一十萬貫作本陳俊卿時帥閩移書宰執曰福建塩法與淮浙不同盖淮浙之塩行八九路八十餘州地廣數千里故其利甚博福建八州惟汀邵劒建四州可售而地狹人貧土無重貨非可以他路比也今欲改行鈔法已奪州縣歳計又欲嚴禁私販必虧税務常額而貧民無業又將起而為盗夫州縣闕用則必横斂農民税務既虧常額則必重征商旅盗賊既起則未知所增三十萬緡之入其足以償調兵之費否也將來官鈔或滯不行則必科下州縣州縣無䇿必至抑配民户本以利民而反擾之此恐皆非變法之本意也當時諸公不能用然鈔法果不行立宗室銓試法六月辛丑上曰連數日雨止天氣晴明歳事有望虞允文奏曰麥已食新米價日减上曰今歳再得一稔想見粒米狼戾更積得二年經常米便有三年之蓄前此未嘗如此仍須嚴切戒約只置場和糴使百姓情願入中不得纎毫科擾壬寅新江西運判劉焞朝辭進對論今日州縣窮空無備及當今利害上曰江西旱荒之餘極有合理㑹事故輟卿往又曰州縣直是無備亦多由官吏非其人丙午傅自強劄子父察遇害於燕山乞賜謚得㫖賜謚忠肅己未新知廣德軍富杞朝辭上曰廣德小壘地多水旱卿到任或有水旱奏來是月江西水灾命賑之葉衡乞落楊展統制權字上曰展於職事之官留意可作職事修舉特與陞差秋七月己巳臣僚言祖宗馬政茶馬司並專用茶錦絹慱易蕃漢皆便近茶馬司專用銀幣甚非立法之意况茶為外界必用之物銀寶多出外界甚非中國之利詔四川宣撫司參舊法措置庚寅知光州滕瑞奏遇天申聖節臣自書聖壽萬歳四字約二丈餘兼造山棚髙三丈餘凡用絹五十疋褾背投進上曰滕瑞不修郡政以此獻䛕特降一官是月知廬州趙善俊言朝廷頃者分兵屯田其不可者有三臣謂罷屯田有三利習熟戰陣之兵得歸行伍日從事於教閲一利也無張官置吏坐以縻稍無買牛散種以費官物二利也屯田之田悉皆膏腴牛具屋廬無一不具以資歸正人使之安居三利也詔廬州見屯田官兵并行廢罷其田畆牛具令趙善俊盡數拘收給付歸正人請佃及募人租種八月庚子新度支朱儋言經總制錢頃自諸州通判專一拘收歳入至一千七百二十五萬緡繼命知通同掌而歳虧二百三十萬緡故曩者版曹奏陳專属通判其後又因臣僚劄子乞委守臣於是有知通同共拘催分授酬賞之制夫州郡錢物常患為守者侵欺經制錢分𨽻之數而多收係省以供妄費今使知通同掌則通判愈不得而誰何乞仍舊委之通判而守臣不預從之既而戸書楊倓言若令通判拘催切恐守臣不能恊力乞照乾道二年指揮令知通同共任責分賞從之辛丑臣僚言州縣被差執役者率中下之戸産業微薄一為保正鮮不破家壊産昔之所管者不過煙火盗賊而已今乃至於承文引督租賦焉昔之所勞者不過橋梁道路而已今乃至於備修造供役使焉方其始參也饋諸吏則謂之辭役錢知縣迎送僦夫腳則謂之地理錢節朔參賀則謂之節料錢官貟下鄉則謂之過都錢月認醋額則謂之醋息錢復有所謂承差人專一承受差使又有所謂傳帖人各在諸㕔白直實不曾承傳文帖亦令就例而占破伏望申嚴州縣今後如敢令保正副出備上件名色錢物官貟坐以贜私公吏重行决配如充役之家不願親身秪應止許僱承差人一名餘所謂傳帖之類並行住罷從之壬子浙東提舉鄭良嗣言收糴常平尚少錢五萬三千二十餘貫詔禮部紐計度牒給降乙卯上謂輔臣曰昨因檢唐書李吉甫傳見栖筠為常州刺史適值洊飢俊渠厮江流境内遂豐稔不知江流逺近可令浙漕及常州考求古迹以聞癸亥兵部侍即黃鈞論知人善任使當察其人而取之量其材而用之上曰朕以無心處之無心則明無心則不偏無心則不私甲子著作佐即丁時𤼵奏人君須平時奉天得天助然後可以立大事上曰朕曉夕念此所謂丘之禱久矣時𤼵奏近來多竭民力以事不急陛下當恤民以固本上曰朕非特要建功業如漢文景蠲天下租賦事亦將次第施行是月四川水灾命賑之九月庚午上曰自秋以來多隂雨今已十日晴矣正當收穫歳事可保朕蚤莫精心祈晴天意可見壬申上曰近時民俗多尚奢侈纔遇豐年稍遂從容則華飾門户鮮麗衣服促婚嫁厚裝奩惟恐奢華之不至甚非所宜今年逺近豐登趂此秋成欲使民間各務儲積以為優久之計將來宜降詔戒諭仍趂時廣種二麥以備水旱之用是月定江西四監鐵錢額毎歳共鑄三十萬貫江州廣寧監興國軍富民監各一十萬貫臨江軍豐餘監撫州裕國監各五萬貫命虞允文宣撫四川授少保武安軍節度使仍降度牒三千道及銀㑹中半一百萬貫付本司上用李綱故事御正衙親酌巵酒賜之俾即殿門乘馬持節而出都人以為榮始期以某日㑹于河南既而上宻詔趣師期允文奏軍須未備上寖不樂明年上遣二介持御札賜之戒以面付介至而允文薨數日矣其子不敢啓不知何言也冬十一月丙寅朔是月詔官田除两淮京西路不行出賣應諸路沒官田産屋宇并營田並措置出賣以戸部左曹郎官主之諸路委常平司其錢赴左藏南庫令置庫眼樁管臣僚言在法光祿大夫節度使已上即合定諡議於太常覆於考功茍其人行應諡法而下無異詞則以上於朝廷而行焉紹興間以守臣悍禦臨難不屈死節昭著而其官品或未該定諡於是有特許賜諡指揮故以定諡者給敕而以賜諡者給告近來請諡之家却有官品合該定諡並縁紹興指揮輙經朝廷陳乞賜諡不議於太常不覆於考功獨舎人命詞行下是太常考功二職俱廢而美諡乃可以幸得也此則法令之相戾者也大凡命詞給告皆三省官奉制宣行列名於其後今特恩賜諡禮命優重冠王言於其首而宰相參政給舎並不入衘獨吏部長貳考功即官於後押字殊不類告甚非所以尊王命嚴國家也况舎人掌詞命之官猶不入衘而賜諡初不議於考功乃亦押字理有未安此則制度之可疑者也望今後定諡賜諡一遵舊典至於告命之制亦乞令禮官詞臣考尋舊章詳議續中書後省禮部太常寺議上今後若有官品合該定諡即仰其家經朝廷陳乞下有司遵依定諡條法議諡給敕施行如係守臣守禦臨難不屈死節昭著并應得藴德丘園聲聞顯著條法指揮陳乞賜諡之人或奉特㫖賜諡者即依紹興三年指揮命詞給告施行從之十有二月戊申詔諸路職田已降指揮與免拘借尚慮循習額外收斂自今正理正色仍不得過數多取違戾令提刑按劾從臣僚之請也是冬莫濛充賀正使正月三日敵廷錫宴前後循例無違者濛獨毅然以本朝國忌不敢簮花聽樂為辭争辨久之伴使為見濛堅執不回遂為白金主午後始從其請就館賜食是歳劉珙免䘮復除湖南過闕見上言曰人君能得天下之心然後可以立天下之事能循天下之理然後可以得天下之心然非至誠虛已兼聽並觀在我者空洞清明而無一毫物欲之蔽亦未有能循天下之理者也因引其意以傅時事言甚切至上加勞再三癸巳乾道九年春正月壬午詔曰夫部刺史之官所以周行郡國班宣風化總方略而一統類者也今則不然守土之官出於其部時爾監司之任最為近而易察者也而求其凌厲風節建立事功疾惡如讎奉公不撓者盖菫菫而有焉甚則朋比苟且訖無舉奏民瘼不聞於上上意不孚於下朕何望焉繼自今其悉乃心毋冒于憲凡在厥位明體朕懐是月以王之竒知揚州兼淮南安撫使中書門下言福建塩貨自來止是州軍分立綱數自行般運出賣以辦歳計近改為鈔法聽從客販訪聞州郡縁住般賣却致支用不足切慮敷擾以為民害詔罷鈔法諸州軍綱塩並依舊分撥官般官賣所有本司元借本錢一十萬貫並已賣到鈔靣錢一十九萬貫并續賣鈔面錢並拘收赴左藏庫交納起居舎人留正言所修記注自紹興十五年以後至目即多有未修月分久之文字散失所得疎略愈見難以修纂乞令二史將即日承受諸處闗牒施行政事并臣下所得聖語隨月編纂仍將紹興十五年以後未修月分併修一月並於次月上旬送付史官隨具已修月分奏聞從之閏正月丁酉進呈鄂州都統制吳挺奏前任人秦琪既改空印白紙五十幅以行上曰恐異時妄有所用可便追取挺又奏琪冒請合開落馬四百餘匹草料及朝廷降錢修造軍噐皆不堅利所降錢琪輙營運自私今已立式製造上曰軍噐不葺錢乃自私秦琪不可不治并行下吳挺勒合干人仔細開具着落聞奏正名定罪庶彼無詞己亥進呈馬軍司陞差統領官張遇為統制梁克家等奏比張遇赴都堂審察見其人衰老庸謬上曰統制官不敢苟任異時大帥皆於此乎選使其有謀老固無妨老且謬則無所用庚子進呈諸州軍揀𤼵禁兵分番赴忠銳軍教閲其至者雖有衣甲軍噐而歸者往往無有乞行下州軍修葺增添梁克家奏非特諸州為然近吳挺所申鄂州軍亦如此恐三衙江上諸軍亦有軍噐損壊不葺處理合㸃檢上曰須不測差人諸軍閲視則無得而隐此事誠不細克家奏步司統制官王世雄交割之初見甲皮多斷爛弓弩箭脱壊恐出入有誤使用亦嘗與臣等言之上曰世雄乃能留意職事亦可喜庚戌宰執進呈先得㫖臨安府既有路分都監一貟而平江府又有一貟何也可并路分鈐轄貟數契勘創始之由至是梁克家奏初皆因特添差後遂因仍作闕上曰可盡刷諸路所增數見任人許終滿後不再差丁巳進呈敕令所條目内一項正月一日皇帝御大慶殿受文武百僚朝賀内奏祥瑞表并讀表一貟差執政官又一項奏雲物祥瑞請付史舘太史令一貟差本職官上曰此等事皆文具不須立法可盡刪去梁克家奏聖訓如此使後世知聖時不言祥瑞豈非盛德之事哉戊午太子詹事李彦頴劄子奏竊以皇太子在東宮唯講學一事足以增益見聞養成道德臣自庚寅歳入侍王邸以及升儲既更四載才講尚書終篇今進講周易始三之一大抵非三四年不能竟一經恭聞真宗皇帝在東宮日講尚書至七八遍禮記等書亦皆數四祖宗之聖雖得於生知亦講學不倦是以聖而益聖巍巍如此今宮僚粗備得遇上堂除講讀官外餘官不過陪侍坐席須㬰而退故臣欲以庶子或諭德一貟兼講官於春秋二禮令添講一經詔令庶子諭德輪講禮記辛酉幸玉津園宴射二月己巳上曰前日内閲忠鋭軍射藝甚可觀此本諸州烏合士卒訓練有方遂成紀律誠為難事主兵官當議推賞辛未勘㑹已降指揮令諸路監司各限十日條具不便於民事件奏來所有奏到文狀詔令左右看詳戊寅宰執内殿奏事因論及古之朋黨上曰朕嘗思之朋黨不難破不必問其人但是是非非惟理之所在而已梁克家奏實如聖訓三月乙巳侍御史蘇嶠奏伏覩闗報廣南提舉官廖顒劄子廣州都塩倉有積下支不盡塩本銀計錢十一萬一千四百五十四貫文又㸃檢得本路諸州府逐年拘催常平諸色窠名錢物内有見在寛剰錢五萬貫欲行起𤼵少助朝廷經費奉㫖依並令赴南庫送納者臣竊謂陛下即位以來屢郤羡餘之獻故近年監司州縣稍知遵守此盛德之事而小人急於自進時以一二嘗試朝廷只縁乾道七年提舉官章潭獻錢二十萬貫以此特轉一官不及期年擢為廣西運判廖顒實繼其後故到官未幾便為此舉其為愚㺯朝廷莫此為甚訪聞此錢並係塩本錢潭到任時尚有三四十萬緡皆是前官累政儲積不敢妄用潭取其半以獻今顒所獻止十一萬緡已是竭澤所餘無幾後人何以為繼異時課額不登誰將任其咎者欲望特降睿㫖卻而不受即以此錢付之本司依舊充塩本内常平寛剰錢亦乞樁留本路為水旱賑貸之備詔從之臣留正等曰羡餘之弊上欺人主下蠧生民非難知者而小人屢敢以是進豈非謂利之可動人與記曰與其有聚斂之臣寧有盗臣此謂國不以利為利以義為利也孟軻曰亦有仁義而已矣何必曰利陸贄曰理天下者以義為本以利為末以人為本以財為末誠使義利之説明於上則奸㒺之徒何自乗間耶不壽皇諭臣僚捐利之請却樁積寛剰之獻而受所以正君德清化原而警吏治者全矣丙辰給事中林機經筵講禹貢畢奏云臣觀孔子謂禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宮室而盡力乎溝洫言其克勤于邦克儉于家者如此觀禹貢立為經常之制亦其勤儉之德有以先之故此篇之末言咸則三壤成賦中邦而繼之以祗台德先不距朕行盖有深意後世之君窮奢極侈若漢武帝常賦之外至於筭及緡錢舟車所宜深戒常以大禹勤儉之德為懐治效不難到也上曰人主苟有貪心何所不至是春以王楫李大正並為提㸃坑冶鑄錢饒贑州置司江東淮南两浙潼川利州路分𨽻饒州司江西湖廣福建分𨽻贑州司除潼川府𨽻路坑冶銅寶係逐路轉運司拘催𤼵納鑄錢司外依舊以江淮荆浙福建廣南路提㸃坑冶鑄錢司為名两司行移連衘按察夏四月庚午上宣諭曰忠武軍已内教人材少壯不减殿前司諸軍武藝亦習熟梁克家曰人無南北惟教習而用之如何耳上曰然乙亥樞宻院勘㑹已降指揮乞囬兩浙路禁軍土軍弓手竊慮州縣循習舊弊差使諸般窠役遂致武藝因而廢惰理宜措置已降指揮禁軍令帥司土軍弓手令提刑司行下諸州軍將𤼵回并見在人禁軍責守臣并本路訓練兵官土軍弓手令守臣名籍定人數姓名不得亂有差使窠名禁軍仍許逐州諳曉軍務兵將官一貟土軍弓手仍委廵尉並專一訓練教閲以備不測差官前去按閲如武藝精強即與陞擢弛慢不職當職官並取㫖重作施行己丑起居舎人趙粹中劄子奏竊見祖宗盛時儲養邊帥之才所以料敵制勝罕有敗闕欲望聖慈詔宰執侍從歳舉可充帥任者各一人其被舉者令赴都堂審察如委可任籍定姓名聞奏差充邊方帥司及都統司属官或倅貳以儲其材俟任滿日或陞之機幕謀議入為寺監即曹出為監司邊郡俾之習熟邊圉利害他時邊帥有闕即於數内選擢其資歴稍髙入為卿監侍坐遇有邊事以備詢訪如祖宗時仍乞嚴詔丁寧詳擇其人勿詢私請如有顯效亦當推薦賢之賞如此十年之後帥臣不勝用矣上曰帥才自是難得卿此論甚好若然則不待十年得人多矣五月壬辰朔日有食之癸巳進呈龔茂良奏馬驛利害并及買象事梁克家等奏樞宻院見差使臣趙璧往邕州催買上曰郊祀大禮初不繫此有亦可無亦可其差去使臣可令唤回己未進呈左廸功郎朱熹辭免召命乞差嶽廟一次梁克家奏朱熹慱學有守而安於静退屢召不起執政俱稱之或曰熹學問淹該但泥於所守差少通耳上曰士夫雖該慱然亦須諳練疎通如朕在潜邸但知讀書為文及即位以來今十餘年諳歴物情世故豈止讀書為文所能該貫雖慱學要須為有用乃可朱熹今以疾辭然安貧樂道廉退可嘉可特與改合入官主管台州崇道觀是月皇太子免尹臨安洪吉饒信等五郡水灾命賑之六月己巳臣僚上言近年州郡例皆窮匱不能支吾原其凋敝之因有㨂汰之軍士有添差之冗貟有指價和糴米之備償有綱運水腳錢之糜費有打造歳計之鐡甲有抛買非泛之軍噐有建造寨屋之陪貼有收買竹木之科敷有起𤼵揀中廂禁土軍弓手之用度有教閲民兵保甲之支費郵傳交馳使者旁午是數十者皆州郡之蠧所以致闕乏之繇也陛下灼見其弊十已除去七八惟是揀汰軍人并離軍人及歸正添差不釐務州郡甚以為苦日增月添無有窮已則賦所入有限而增添之費無窮欲望特降指揮下吏兵部三衙在外諸軍都統總領司凡揀汰軍人并離軍使臣諸色添差不釐務人各相照應自來立定人數貟闕不得過數差注分撥令共理之臣得以留意收養詔從之詔令諸路監司郡守不得非法聚斂並縁申請妄進羡違者重寘典憲令御史臺覺察是月置蘄州蘄春鐵錢監歳以十萬貫為額仍减舒州同安監歳額一十萬貫秋七月庚子進呈江西轉運司申到一路州縣自六月十二日至十九日連日大雨早禾徑可成熟又奏淮南路申雨澤霑足上曰朕與卿等尤當上下交修以荅天貺又進呈郭剛元居實報敵境旱久大無麥禾泗州東平府雄州蝗生河以北飢饉流徙尤甚是日浙東江西两淮等路申雨澤霑洽秋成可必上曰淮水一葦可航而南北之異如此梁克家奏脩德為暴之應昭昭不誣上曰朕與卿益當交修庶政以荅天意是月䕶聖歩軍統制王世雄改除上曰此軍統制官乃儲大帥之地不可不遴選其人八月癸酉内批龍雲陳師亮添差梁克家等奏於指揮有碍上曰卿等如此守法極好上又曰僥倖之門盖在上者多自啓之故人生覬覦心漢畫一之法貴在能守是月詔興水利九月辛卯朔是月進呈中興㑹要太上今上玉牒台州饑命賑之冬十月甲子臣僚言伏見浙東諸郡今歳例有旱傷如温台二州自來每遇不稔全藉轉海般運浙西米斛粗能贍給訪聞浙西平江秀州管下邊海諸縣自來凡有他郡客人般運米斛例不放令出海前去是以糴販者稀少荒歉之處為害甚大欲望特降指揮下两浙轉運司并平江府秀州嚴行禁戢仍令重立賞榜許人陳告如有違犯將官貟奏劾公吏斷配施行若其他有似此遏糴去處亦乞令轉運司行下禁戢詔從之乙酉臣僚上言臣聞救菑者聖王之所不免責實者荒政之所尤急伏見今夏以來浙東諸郡告旱者衆至於江西間有荒歉田野之間稍以艱食為慮陛下深軫淵𠂻舉行荒政仁惠之德㒺不是孚然臣毎見自來州郡或水旱往往有所諱言雖有奏陳亦未必能盡其實遂至下之疾苦壅於上聞上之德意抑於下究此大患也盖諱言水旱者慮朝廷之罪其失政也不盡其實者慮州用之缺而不繼也属縣申請至於取問者有之必欲其不問而後已民間告訴抑令伏熟者有之必欲其無所陳而後已欺天㒺上其罪可勝言哉欲乞聖慈申嚴行下凡有旱傷去處必須從實檢放不得亂有沮抑致干和氣仍乞令逐路常平提舉官躬親廵歴同帥漕之臣覺察按劾以聞庶幾民被實惠詔従之是月梁充家罷相出知建寧府從所請也以曾懐為左丞相張説知樞宻院事鄭聞參知政事沈夏卿同知樞宻院事尋以姚憲簽書樞宻院事十有一月庚寅朔日有食之陳升卿賜出身除監察御史戊戌郊詔以明年正月朔為淳熙元年初詔改元純熙尋以取法淳化雍熙為義改元淳熙辛亥臣僚言訪聞今歳旱傷非特浙東被害如江西諸州例皆闕雨禾稻不收而贑吉二州尤甚江東之太平廣德淮西之無為軍和州多是先被水患繼之以旱自今民以艱食其間州郡或有諱言境内灾傷不即申陳致失檢放條限或有雖曾申聞措置賑濟事件朝廷未與行下切縁救荒之政譬如拯溺救焚勢不可緩今欲從朝廷專委逐路提舉官自行廵歴灾傷去處如委係失收不曾檢放或减放不實者仰將今年苖米依合减分數權行倚閣令候來年秋熟帶納其有和糴米斛抛降馬料及諸色科買並權與住罷一年應合賑糶賑濟去處許提舉官將一路見管常平義倉米通融撥借應副其有諸州已條畫到措置賑濟事件朝廷速降指揮庶幾官吏便可奉行百姓早被實惠詔從之漢州什邡縣楊村進士陳敏政家特賜旌表門閭自敏政髙祖母王氏遺訓至今五世同居並以孝友信義著聞本州以其事來上故有是命王氏年十八歸于陳歳餘夫卒守志不嫁在家事舅姑盡孝教子及孫皆篤學有聞節操行義著於宗族鄉閭鄉人不敢以其氏呼之皆呼之曰堂前猶私家呼其母張商英為之傳云十有二月庚午先是十一月庚子曾懐等奏郊祀禮成普天同慶自原廟行禮隂雲閣雨既謁清廟瑞雪應期未明而霽以至青城宿齋圓丘蕆事天氣澄爽此皆聖德昭著故髙穹降格靈貺如此上曰如卿等所言然君臣之間正當修飭以荅天貺可也是日進呈次上曰臘雪應期二麥正仰此曾懐奏近得四方書問皆云冬至郊祀禮成瑞雪應期以為殊慶可見四方氣候皆同今又得雪此乃陛下勤政願治聖慮頃刻未嘗不在民天地報貺盖有自也上曰丘之禱久矣聖人之意以謂脩已貴有常固非臨時所能祈禱也乙亥新知欽州鄭人傑欲乞於所在差兵級二十人逐州交替起𤼵前去之任上曰此雖小事恐其他援例不許臣留正等曰天下之事皆當謹其微也况賜予者人情争趍之始以為小而輕予其一牽援不已僥倖必多兵級二十人事甚小也夀皇恐其他援例卻之防微杜漸若是其嚴則夫祿秩爵命有大於此而法令所不許者寧復啓之乎此其為後世訓也至矣是月廣西塩復官賣法從帥臣范成大之請也二廣塩法自靖康間行官般官賣法至紹興八年後因臣僚言其為利甚博遂改行鈔法節次更廢不一至乾道六年逐司互有申陳遂自八年詔令两路通販官鈔九十萬貫同認歳額然實於西路歳計不便遂詔廣西塩住行鈔法撥還運司均與諸州官般官賣以充歳計是歳减紹興府嚴處州丁絹額黎州蠻犯邊宋史全文卷二十五下
