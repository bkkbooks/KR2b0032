body:
  text: 宋史全文卷二十七上宋孝宗七辛丑淳熙八年春正月癸丑權給事中趙汝愚奏中書門下省録黃陳源轉官差遣臣竊惟陳源係內侍而得參預一路軍政事體重大漸不可長臣嘗讀建炎三年詔書自崇寧以來內侍用事循習至今理宜痛革自今內侍不許與主管兵官交通假貸饋遺借役禁兵當是時內侍與兵官交通借役禁兵且猶不可今乃假以一路總戎之任臣恐非太上所以防微杜漸之意也甲寅上宣諭曰陳源舊帶添差浙西副總管近奉太上皇帝聖㫖為應奉有勞特轉兩官趙汝愚因論內侍不可干預軍事其言極當甚不易得丙辰又宣諭曰陳源可與在內宮觀免奉朝請密院更具應內侍見帶兵官者可並降指揮與在內宮觀永為定制臣留正等曰齊寺人貂漏師于多魚左氏謹而志之夙沙衛殿齊師殖綽郭最曰子殿國師齊之辱也宦者干預軍政自古忌之矣敗國喪師莫不由此蓋至唐世宮掖之變本朝夷狄之釁則又其權之尤熾而禍之無甚罷陳源軍也壽皇嘉賞趙汝愚之奏至於再三即又詔內侍見帶兵官者並與在內宮觀永為定制其防微杜漸所以為後世慮者逺矣此繫國家安危治亂之大者臣故詳而著之戊辰宰執進呈諸軍犒設錢數上曰此內外諸軍射射精熟人事也嚮來諸軍只習右手射近又教習左手射頗精各支犒設以示激勸庚午知台州唐仲友言鰥寡孤獨老幼疾病之人乞依乾道九年例取撥常平義倉賑給上曰常平米令低價出糶若義倉米則本是民間寄納在官以備水旱既遇荒歲自合還以與民况台州自有義倉米可令賑濟乙亥起居郎兼太子左諭德李待問奏事上曰春間一雪可喜待問奏近官僚對皇太子賀雪語及此皇太子曰大率芝草珍異之物皆不足為瑞惟年穀豐民間安業乃國之上瑞上曰東宮見識髙逺待問奏近者因講周禮太府一節論國家用度當與百姓同其豐歉皇太子曰人君但當以節儉為本此乃言外之意非人思慮所及者又嘗對宮僚稱王佐天府之政云惟不畏强禦則可以立事不侮鰥寡則可以愛民為政要不出此兩事耳上曰學問過人如此誠社稷之福待問奏此皆自陛下家學中來上曰東宮亦自儉約宮中受用凡百技間無他嗜好又謙和慈祥朕常語之曰德性自己溫粹須是廣讀書濟之以英氣則為盡善上又曰恭者不侮人儉者不奪人恭儉者修身之本朕亦常以此為東宮言待問奏臣亦切聞陛下踐履此兩句上曰朕平日用之古人謂不以其所能者病人不以人之所不能者愧人皆當踐履二月庚辰進呈知福州梁克家乞宮祠上曰與復觀文殿學士趙雄等奏欲令再任上曰難云再任可降指揮依舊知福州壬午宰執進呈未及展讀上喜見顔色宣諭云內侍賜北使宴自淮上回言麥正缺雨先得一雨後得三尺雪雄等奏陛下無一念不在斯民去歲雖旱先事措置米價不增民無流殍上曰亦賴卿等處置精審雄等奏今雖米賤猶慮其無錢可糴欲行下去歲旱傷州縣於義倉米內支給至三月終上曰正合朕意於是詔去歲江浙湖北淮西路郡縣間有旱傷去處已令多出樁積等米廣行賑糶今雖聞諸路米價低平其間鰥寡孤獨貧乏不能自存之人無錢收糴深所矜憫可令州縣鎮寨鄉村抄籍姓名將義倉米賑濟務要實惠及民如州縣奉行不䖍仰本路漕臣及提舉常平官覺察以聞重置典憲己亥進呈太府卿蘇峴擬除閩漕上曰師揆來乞此闕乃是師垂為淮東提舉壞官錢二十餘萬緡兼聞其下尚有三弟他日皆作郡則近地州府都占了莫若以髙爵厚祿使之就間卿等更議之既而雄等奏陛下方務廣恩既難批出臣等日侍左右若作勘㑹亦涉商量須因人言乃可議此上曰如此則且令師揆依舊淮西運判却别以一缺與師垂使避其兄庶幾事體順乃除師垂閩漕三月己巳上御集英殿䇿進士有曰司寇圜士古之刑也近世殺越人于貨徒流而已覆出為盜將何以懲圜士之制今可議乎是日宰執先赴奏事宣宗御試題聖諭云成周圜士之法乃以處奸惡今配隸盜賊甚多欲舉行其法故以此發問觀其對如何是月賜黃由等及第出身有差詔應臨安府及諸路官私房僦不限貫百十分減三閏三月辛巳詔諸路監司帥臣歲終各以所部郡守分三等治效顯著者為臧貪刻庸繆者為否無功無過者為平詳加考察具名來上內臧否各著事實如考察不公令御史臺彈劾夏四月癸丑宰執奏事畢上宣諭曰昨日臨安取到諸縣繭亦薄已令宮中繅絲看矣既而樞密院從容論事因及今歲雨𤾉上曰今歲雨𤾉以時而繭蠶反薄大麥亦穗短宮中所養蠶亦如此殊不可曉適來已諭三省令王佐體訪求所以未至王淮等奏陛下愛民軫念及此天下之幸庚申奏事畢上曰雨恐妨麥已降香祈禱矣又曰曽問王佐蠶繭今年如何薄趙雄等奏佐方取繭繅看亦遍詢諸縣續具奏聞上曰聞今年民間養蠶太多葉既艱又食溫葉所以繭薄孟子謂五畝之宅植之以桑勿失其時則可以衣帛矣誠哉是言也甲戌史浩等奏昨經筵讀三朝寶訓徹章臣等奏請繼讀何書翌日詔真宗正說宜以進讀自是間日退朝必御崇政非休假未嘗暫止臣浩嘗讀正心篇論黃帝無為天下治上曰所謂無為者豈宴安無所事事之謂乎臣浩又讀剛斷篇讀漢武帝知郭解能使將軍為言其家不貧上曰武帝如此可謂洞照事情臣浩又讀大中篇論為政之道本乎大中上曰勿渾渾而濁勿察察而明即此理也臣等切窺聖意罔不推見淵微固將耳受躬行追咸平景德之盛自昔人主臨御日久非內惑聲色則外事畋遊其蔽則至於溺浮圖求神仙今陛下天縱聰明日躋睿智歲時甫浹篇帙再周帝王之汲汲孔子之皇皇不是過也伏乞宣付史館詔從之是月詔經筵記注官侍立並以所聞退書其實五月丙子上曰近日都下銷金鋪翠復行於市不必降指揮只諭王佐嚴加禁戢若有敗露京尹安能逃責耶朕以宰耕牛禁銅器及金翠等事刻之記事板每京尹初上輒示之己卯進呈芮輝轉對言集議唯強有力者是從不若令各為議狀如論科舉則禮部祕書省國子監官皆預之類上曰如此則廢集議矣趙雄等奏輝所論乃漢所謂雜議也恐亦可從上曰今後遇事旋降指揮是月以讀真宗正說終篇賜宰執侍讀侍講說書修注官宴於祕書省六月戊午户部言去歲兩浙江東西湖北淮西旱傷共檢放上供米一百三十七萬九千餘石隨苖經總頭子勘合等錢計二十六萬六千餘貫詔並與蠲放庚申户部言乞撥還去年旱傷無收經總等錢二十六萬餘貫上曰可盡與之趙雄等奏曰初謂錢數太多欲令户部均認豈謂聖慈略無難色悉以豫民臣等不勝歎仰丙寅樞密院進呈昨得㫖令密問淮西總領葉宏聞郭剛軍中刻剝軍人虛實據葉宏回報郭剛别無刻剝止是舊有軍須庫俵賣布搭息一事上曰卿等可諭都承㫖傳㫖宣諭郭剛令日下住罷併本息蠲放免行追索仍令責問本人號曰老將如何猶有此等事卿等可更切責葉宏既職事是報發御前軍馬文字此等事如何不早以聞必待詢問然後方報此後應諸軍凡有刻剝等事須即以實奏知是月紹興府徽嚴州水命賑之知處州李士龍納租多取加耗詔降一官元數止一萬四千有竒斛面出剩二萬三千餘罰受納官趙汝楫追兩官勒停秋七月乙亥朔是月定上雨水限諸縣五日一申州州十日一申帥臣監司類聚候有指揮即便聞奏録范質後呂祖謙卒祖謙自五年冬以著作郎兼權禮部郎官以疾奉祠至是終於家祖謙禀資特異聞道甚早其學本於纍世家庭之所傳博諸四方師友之所講參貫融液無所偏滯與張栻朱熹更唱迭和其道復大彰明天下之士翕然歸之祖謙六世祖夷簡五世祖公著皆以勳德著聞四世祖希哲首從程頤遊復以儒學名世淵源所漸尤為深逺上嘗令祖謙編次文鑑一書稱其用意有補治道平生著書至多皆以繼絶表微扶正息邪晚年所輯大事記雖未及就其經世之意亦可概見其他所著經說海內往往家傳人誦與伊洛之書並行於世云八月丙午宣諭云朕緣久旱不雨曉夕思所以寬恤無事不在念今且將諸路節次泛拋招軍並與蠲免壬子召侍從官王希呂以下頒示御札曰朕謂侍從之臣當以論思獻納為任今後事有過舉政有闕失卿等即宜盡忠極言或求對或入奏務在於當理而後己各思體此稱朕意焉壬戌樞密院進呈淮西運判趙彥逾奏本路歸正人約有二千餘人强壯者欲委官總轄教閲以譏察其動息上曰其人歸正日久皆能耕鑿居止已安自成生業若遽然差官前去總轄乃所以搔擾使之不安劄子不須行是月趙雄罷相出知瀘州時有言雄多私里黨者於是命大臣進擬皆於姓名下注本貫封入遂為故事以王淮為右丞相九月甲午進呈提領贍軍府燕世良申前官吳淵薦本所幹官楊絳與升擢差遣今復措置開請有勞乞申前命緣其人令合赴部改官未審如何或只與堂除知縣上曰朕方與卿等共守此法姑候一任回却與升擢是月以江浙湖北旱出爵募民賑濟冬十月癸亥中書門下省言乾道八年七月內已降指揮御史臺合覺察彈劾事件並分𨽻六察如有違例去處令監察御史隨所𨽻所許令訪聞覺察聞奏詔劄下御史臺六察遵守施行甲子宣諭付出知臨安府王佐按新寧國府監押王康成為人便到赤岸欲上岸赴宴間康成乘馬經過不下馬上曰可罷新任差遣又曰所以王佐奏狀不欲徑批出施行尋常文字須是經由三省施行方合事體記得向來參政周必大曽有此請故朕遇事不忘頒忠義傳國子監簿俞良能所進也起於戰國王蠋終於五代孫晟上下一千一百年所取者一百八十人凡二十卷乞頒之武學授之將帥上曰忠臣義士不顧一身誠可以表勵風俗罷雪宴先是年例賀雪即賜宴以連歲荒歉艱食詔權罷十一月甲戌臣僚言在法諸因饑貧以同居緦麻以上親與人若遺棄而為人收養者仍從其姓名不在取認之限聽養子之家申官附籍依親子孫法今之災荒亦非一處向去寒冷棄子或多若令災荒州縣坐上件法􅍢板曉諭使人人通知之則人無復職認之慮而皆獲收養矣舉行荒政此其一助詔從之辛卯進呈吏部侍郎趙汝愚奏廣招徠之路絶朋比之嫌莫若用故事令侍從兩省臺諌各舉所知若干人須才用兼偹而未經擢用者陛下以其姓名悉付中書籍記候職事官有闕則選諸所表以次用之其有不如所舉則坐以謬舉之罪上曰此說極是可從之王淮奏御筆抹若干人字今乞作二三人上曰可是月詔諸路賑饑新除浙東提舉朱熹入對奏言陛下臨御二十年間水旱盜賊略無寧歲意者德之崇未至于天歟業之廣未及於地歟政之大者有未舉而小者無所繫歟刑之逺者或不當而近者或幸免歟君子有未用而小人有未去歟大臣失其職而賤者竊其柄歟直諒之言罕聞而諂諛者衆歟德義之風未著而贓汙者騁歟貨賂或上流而恩澤不下究與責人或已詳而反躬有未至與夫必有是數者然後可以召災而致異又言陛下即政之初蓋嘗選建英豪任以政事不幸其間不能盡得其人是以不復廣求賢哲而姑取軟熟易制之人以充其位於是左右私䙝使令之賤始得以奉燕閒備驅使而宰相之權日輕又慮其勢有所偏而因以壅己也則或聽外廷之論將以隂察此輩之負犯而操切之陛下既未能循天理公聖心以正朝廷之大體則固已失其本矣而又欲兼聽士大夫之公言以為駕馭之術則士大夫之進退有時而近習之從容無間士大夫之禮貌既莊而難親其議論又苦而難入近習便嬖側媚之態既足以蠱心志其胥吏狡猾之術又足以眩聰明此其生熟甘苦既有所分恐陛下未及施其駕馭之術而先墮其數中矣是以雖欲微抑此輩而此輩之勢日重雖欲兼採公論而士夫之勢日輕重者既挾其重以竊陛下之權輕者又借力於重以為竊位固寵之計中外相應更濟其私日往月來浸淫耗蝕使陛下之德業日隳紀綱日壞邪佞充塞貨賂公行兵愁民怨盜賊間作災異數見饑饉洊臻羣小相挺人人皆得滿其所欲惟有陛下了無所得而國家顧乃獨受其弊因論浙東救荒事上曰連年飢歉朕甚以為憂州縣檢放多是不實時熹乞勸諭推賞上曰至此却愛惜名器不得又乞撥賜米斛上曰朕於此并無所惜又乞預放來年身丁錢上曰朕方欲如此措置寬恤數事熹又奏星變事上曰朕恐懼未嘗一日忘上又曰朕未嘗一日不三省吾身熹續又奏自今水旱約及三分已上即乞并第四等户依此施行又奏乞推行建寧府崇安縣社倉法於諸路州軍熹又上宰相書云朝廷愛民之心不如惜費之甚是以不肯為極力救民之事明公愛國之念不如愛身之切是以但務為阿諛順㫖之計然民之與財孰輕孰重身之與國孰大孰小財散猶可復聚民心一失則不可復收身危猶可復安國勢一傾則不可復振至於民散國危而措身無所則其所聚有不為大盜積者耶復白鹿書院從朱熹之奏也洞本唐朝李渤舊居有臺榭環以流水雜植花木為一時之勝南唐升元中因建學館買田以給諸生學者大集乃以國子監九經李善道為洞主掌其教授本朝太平興國二年賜以印本九經七年又官其洞主明起是年始置南康軍遂屬郡境至祥符初直史館孫冕請以為歸老之地及卒葬焉其子比部郎中環復置學館以教子弟四方之士願就學者亦給其食後經兵亂屋宇不存至是復之十二月甲子進呈范成大具到上元縣所種二麥王淮等奏得成大書謂春麥惟郭剛能言之蓋北人謂之劫麥上曰此間人亦不知己令宮中種看淮等奏仁宗皇祐元年五月召近臣以下於後苑寶岐殿觀刈麥仍諭以新創此殿不欲植花卉每觀種麥於此今又見其成庶知民事之不易陛下可謂同符仁宗矣葛邲言荒政二事一乞特降指揮諸經總制錢如遇州縣災傷年分本處知通權免比較賞罰其課利場務並令遵見行條法依所放災傷分𢾗免比不得令本州抑勒縣道陪備一乞降㫖應荒歉州縣且專以救荒為務宴㑹之類理合節損所有諸處迎新送舊兵卒公吏借請及供帳從物之屬所費不資亦合裁減兵卒亦宜存留以防緩急詔並從之是冬淮東提舉趙伯昌奏通泰楚州㳂海去處舊有捍海堰一道東距大海北接鹽城計二萬五千六百餘丈始自唐黜陟使李承實所建遮護民田屏蔽鹽竈歷時既久頽圯不存至本朝天聖改元范仲淹為泰州西溪鹽官方有請于朝凡調夫四萬八千用糧三萬六千有竒而錢不與焉一月而畢規模宏逺髙出前古遂使海潮沮洳舄鹵之地化為良田自後漢失修治宣和紹興以來屢被其患每一修築必至申明朝廷大興功役然後可辦望專委淮東鹽司今後捍海如遇坍損去處不以功役大小即便委官相視計料隨壞隨葺勿令寖淫以至大有衝决務要堅固可以永久從之是歲詔舒州蘄州鑄鐵錢並以十五萬貫為額詔久任四川監司郡守之人令更迭與東南差遣其在任未久者既有任滿前來奏事指揮候到闕始得别與除授從臣僚之請也雨雹壬寅淳熙九年春正月壬申朔是月賑兩浙饑初池州汪青坐盜發遞青誅後他卒事覺知非青罪詔失入官吏趙粹中落職餘責罰有差青家支給五年王淮奏陛下念一夫之寃存恤其家恩及幽明矣內出正月所種春麥並秀實堅好與八九月所種無異詔降付兩浙淮南江東西漕臣勸民布種三月戊子臣僚言監司帥臣臧否所部深得考功課吏之意然郡守更易則人有幸不幸監司帥臣好惡不一則言有當不當有已去而不及臧否者有近到而已遇臧否者此人有幸有不幸也或取其辦事而不言其害民或喜其彌縫而不言其踈繆或畏其彊有力而不議或以其踈逺無援而見斥此言有當不當也且就一路而言之則其數寬就數人而言之則其數窄計一歲而論之則其能否為己見計數月而論之則其能否未可知而遽臧否焉此人所以幸不幸言所以當不當也乞詔諸路監司帥臣自今臧否所部必須總計一歲人數不問己去見在就其中區别之或臧者朝廷已加擢用亦須用臧之次者或否者朝廷已行罷黜亦須具否之次者其或臧否不當必令具析以聞詔除初到任人外餘從之是春召對楊甲尋除太學録甲獻書萬言大略謂人主之職不過聽言用人分别邪正而近歲以來權幸用事其門如市內批一出疑謗紛然謂陛下以左右近習為腹心而不專任大臣以巡邏伺察為耳目而不明用臺諫今中外文武半為權門私人親交私黨分布要近良臣吞聲義士喪氣願陛下哀之救之至於民兵之害兩淮百姓如被兵火舒蘄鼓鑄民不堪命西南諸夷乘間出沒而馬政日急髙直厚幣以驕戎心臣恐陛下今日所少者非特馬而已又有司理財一切用衰陋褊隘之䇿至於賣樓店括學田鬻官地而所在爭獻羡餘此風日熾誠恐陛下赤子無寧歲矣其末言今日之事欲正其本則在陛下講學夏五月丙子內出御筆手詔宣示宰臣王淮等曰朕惟監司郡守民之休戚繫焉察其人而任之宰相之職也苟選授之際惟計履厯之淺深不問人才之賢否則政治之闕孰甚於斯今後二三大臣宜體國愛民精加考擇既按以資格又考其才行合是二者始可進擬夫然後事得其宜用無不當故𫝊曰為政在人卿等其謹之毋忽六月辛酉詔浙漕行下所部州縣常切禁止官民户毋得將草蕩圍裹成田如失覺察其漕臣取㫖施行詔侍從臺諫舉官堪充監司者各一二名是夏饒州飢命賑之秋八月庚子侍從臺諫集議聞奏自宰相執政侍從卿監正郎貟郎分為五等除致仕遺表已行集議裁減外將逐郊蔭補恩澤每等降殺以兩酌中定為止數武臣比類施行宰相十人開府以上同執政八人太尉同侍從六人觀察使至節度侍御史同中散大夫至中大夫四人右武大夫至通侍大夫同帶職朝奉郎至朝議大夫三人職事宫寺長二監長至左右司諫開封少尹釐務及一年須官至朝奉郎并朝奉郎元帶職人因除在京職事官而寄職者同武翼大夫至武功大夫同非侍從官無遺表外見行條格致仕遺表通減三分之一餘分不減紹興初中書舍人趙思誠上任子限貟之議詔從官集議至是始用廷臣集議行之淮東蝗九月辛巳大享明堂先是詔少師史浩少保陳俊卿赴闕陪祀並辭不至癸巳御講筵侍讀鄭丙進陸贄論奉天上尊號狀上曰德宗不逹理如此禍難未平乃欲加上尊號甲午淮南運判錢冲之言真州之東二十里有陳公塘周回百里本司近已興修塘岸建置斗門石䃮各一所於東西湫口二處乞於楊子縣知縣縣尉銜內帶入兼主管陳公塘六字庶責有所歸從之是月以王淮梁克家為左右丞相冬十一月癸酉宗正丞樓鑰對論士大夫風俗事上曰唐文宗說去河北賊易去朝廷朋黨難朕常笑之有何難事只是主聽不聰甲戌吏部尚書鄭丙讀陸贄奏議奉天論蕭復狀至但垂睿詰誰敢面謾蕭復若相囑求則從一等何容為隱從一等儻自回互則蕭復不當受疑上顧丙曰德宗猜忌可謂不明丙奏曰德宗見理不明故每事猜忌當患難時陸贄之言多聽納及事定後贄言多懇切亦不免見疑矣上曰此皆不學之故庚辰鄭丙讀陸贄奏議駕幸梁州論進獻瓜果人擬官第二狀畢丙奏曰官爵天下公器人主所當吝惜上曰此人君厲世磨鈍之具又曰名器豈可假人臣留正等曰爵祿者天下之公器而國之大柄也君以為貴則人貴之君以為賤則人賤之矣天寶之際嬖妾傾國爵以私受綱紀蕩然流弊至於肅宗大將軍告身一通才易一醉名器抑可謂濫矣德宗且欲授官於捧瓜挈果之微豈非家法之壞至是極耶播遷之禍幾至亡國無足怪者壽皇因讀陸贄奏議乃有名器不可以假人之言二十八年之治所以官不及私昵爵罔及惡德者蓋能深戒前代之失永貽萬世之則也是月䕫州路饑十二月戊午宰執進呈乞令太學生習射事上曰向來玉津園燕射惟武臣射恐祖宗典故文臣亦當射癸卯淳熙十年春正月戊子詔廣鹽復行鈔法略曰鹽者民資以食向也官利其贏而自鬻久為民病朕既遣使諭之得其利害以歸復謀諸在廷僉言惟允始為之更令許通商販而社官鬻民固以為利矣然利於民者官不便焉何者鹽之息厚凡官與吏之所為妄費以濟其私者異時一出於此一旦絶之無所牟取必胥動以浮言將毁我裕民之政且朕知恤民而已浮言奚恤矧置監司守令皆以為民朕有美意弗推而廣之顧撓而壞之可乎七月一日為始罷官般官賣通行客鈔法庚寅密院言揀汰事上曰兵不選練則不精但州郡未裕若養老人數過多艱於贍養其六年八年九年分揀汰官兵可再展半年辛卯進呈鎮江總領所乞降新㑹兊換上見前具新印㑹子數目乃曰新印㑹子比舊又增多大凡行用㑹子少則重多則輕壬辰密院進呈鎮江軍兵三年加減之數上曰養兵費財國用十分幾八分養兵周必大奏尚不啻八分上曰今民間未裕江東浙西寄招鎮江諸軍及武鋒軍歲額人數可並權免三年所有諸州日前未足之數持與蠲免是月以黃洽為御史中丞自乾道五年之後不除中執法者十四年洽嘗奏云因言固可以知人輕聽亦至於失人是故聽言不厭其廣廣則庶幾其無壅擇言不厭其審審則庶幾其無誤上深然之二月癸卯用御史中丞黃洽奏詔罷內侍陳源宫觀建寧府居住先是陳源罷德壽宫提舉有㫖與落階官臣僚言其過惡乞寢罷成命與一在外宫觀從之至是洽又言其罪狀灼然乞賜竄責故有是命既而臺察又疏其黨與皆一時之巨蠧於是武略大夫徐彥達除名勒停送道州編管家財産業並籍沒進納德壽宫其子徐必聞等三人並追官勒停仍送筠州編管士昌源之厮役以違法遷轉李庚本臨安府都吏與源交通補官彥達嘗充德壽宫閣子庫書寫專一為源管家務官至正使職至路鈐皆源之力也三月丙寅朔建康都統制郭剛言去歲合揀汰效用軍義兵一百八十五人自言願得逐便欲乞揀汰上曰正恐離軍失所所以尚留如此與放逐便己丑福州奏都巡檢姜特立捉海賊九十四名根勘二十八人招伏餘六十六名被虜在船不曾行劫並給據釋放上曰趙汝愚如此處置甚善古者制刑王者言宥而有司執法若有司但務姑息何以示懲是月詔舉制科夏四月丙申詔臨安府係駐蹕之地本州屬縣民户身丁錢可自淳熙十一年為始更與蠲放三年仍給降黃榜曉諭進呈監司帥臣奏到臧否先數日上曰監司帥臣奏到守臣臧否而不行黜陟何以勸懲可與後省將兩歲臧否其尤者以聞是日將上臧者多己用否者多己黜有未升黜者數人前知普州范仲圭前知瓊州韓璧前知復州王去惡皆在臧之目新萬安軍湯鷽在否目上曰王去惡有平黎之功而又通曉郡事可召赴行在范仲圭韓璧任滿與監司差遣湯鷽罷新任癸卯大理寺丞張抑言浙西諸州豪宗大姓於瀕湖陂蕩各占為田名曰塘田於是舊為田者始隔絶水出入之地淳熙八年雖因臣僚劄子有㫖令兩浙運司根括而八年之後圍裹益甚乞自今責之知縣不得給據責之縣尉常切巡捕責之監司常切覺察仍許人告令下之後尚復圍裹者論如法從之是月廣西運判王正已奏云陛下加惠逺方恐官賣科擾民無所告復行客鈔以救其弊德至渥也陛下本以寬裕逺民而今來兩路通行却成發泄東鈔借使兩路分畫界分西路漕計不虧諸郡可以支吾亭户不致貧乏豈非陛下之本意願聞缺乏之端有如二十餘州上下煎熬倘有申請朝廷豈能坐視必須應副則東路雖有贏餘亦是朝三暮四恐徒紛擾又云頃年章潭為廣東提舉鹽事力主兩路通行之議及就移西路運判客鈔不敷漕計大窘寢食幾廢又得東路二十八萬緡遂以少寬即同帥臣范成大乞行官賣此則易地而不可行者歲月未久可以覆按又云紹興間通行客鈔能三十餘年者以西路有折科招糴之類後既住罷漕計遂窘因有官賣之法其後更易不定大概以東鈔通行西鈔不登為患萬一必須通行則西路漕計或缺亦須預作指畫不可臨期缺誤然不若分路為允也五月甲子朔是月臣僚言祖宗用人初無清濁之别韓琦第二人進士及第未免監左藏庫後為度支判官皆號稱職乞明詔大臣如行在左藏庫之類稍重其選與免待闕遇館學有闕却於此取之以廣得人之路從之鄂州都統郭果言襄陽屯田二十餘年雖微有所獲然未能大益邉計非田不良蓋人力有所未至且無專任責者或謂戰士屯田恐妨閲習而不知分畨耕作乃所以去其驕或謂耕作勞苦恐其不樂而不知分給穀米人自樂從以樂從之人為實邊之計可謂兩便本司見有荒熟田共七百五十畝乞降錢三萬緡收買耕牛農具便可施工餘力亦可刷荒田開墾從之六月丙申王淮等奏兩日酷暑聖躬得無煩鬱上曰朕自有道以處之但懷閭閻之民不易度耳往在潜邸嘗有詩云閭閻多勃鬱方愧此身間淮奏陛下隆寒盛暑每以百姓為念真三五帝王之用心梁克家奏昔唐文宗詩云人皆苦炎熱我愛夏日長柳公權屬以薰風自南來殿閣生微凉君臣賡歌略無一言及於百姓而大書殿壁自以為詞情皆足蘇軾嘗效其詩以譏之云一為居所移苦樂永相忘願言均此施清陰分四方今陛下不以隆暑為畏而長懷閭閻之苦唐之君臣見有愧云己酉進呈太府寺丞勾昌泰蜀中制置使一貟任六十州之安危或有疾病遷動自朝廷除授動經年歲方始到任願於從臣中常儲一二人於蜀中令作安撫使一旦有制置便闕使可就除其於思患預圖最係國家大事上諭宰執曰此正在卿等留意今後欲除蜀帥須是選擇可備制置使之用者庶幾臨時不至缺事詔經理屯田建康府御前諸軍都統制司奏近凖御筆措置屯田契勘淮西荒間田土如昨來和州興置屯田五百餘所盧州管下亦有三十六圍皆頻江臨湖號稱沃壤自後廢罷撥還逐州召人請佃尋許承買今多為良田自餘荒地亦有豪強之戶冒耕包占詔令淮西帥漕司同共取見係官田畝實數聞奏都統郭剛尋奏相視得和州厯陽縣荒墟五百餘頃可以開耕每田一頃三人分耕合用官兵一千五百人建康留守錢良臣亦奏上元縣荒墟并寨地五百餘頃不礙民間泄水可以修築開耕辛酉詔曰朕履四海之籍託王公之上深惟民之未贍惻怛在心惟吏或不良無以宣德明恩若乃貪叨無饜與貨為市漁奪百姓侵牟下民有一於斯足秕邦政天下之大郡邑之衆假勢放利實繁有徒若此朕雖有愛民勤政之誠焦勞於上仁恩利澤何由而下䆒哉朕嗣服之初蓋嘗考法祖宗嚴贓吏之禁其持心不移覆出為惡者既已逮治一二厲在位矣歲月既久法以延緩贓過之吏忸習寬政日甚歲劇今列官處職奸法不忌是與盜無異也國有憲法朕不敢廢可自今後命官犯自盜枉法贓罪抵死者籍沒家財取㫖决配並依隆興二年九月已降詔書施行必無容貸是月兩浙水命賑之監察御史陳賈奏略曰臣竊謂天下之士所學於聖人之道者未始不同既同矣而謂己之學獨異於人是必假其名以濟其僞者也邪正之辨誠與僞而已表裏相副是之謂誠言行相違是之謂僞臣伏見近世士夫有所謂道學者其說以謹獨為能以踐履為髙以正心誠意克己復禮為事若此之類皆學者所共學也而其徒乃謂己獨能之夷考其所為則又大不然不幾於假其名以濟其僞者耶臣願陛下明詔中外痛革此習每於聽納除授之間考察其人擯棄勿用以示好惡之所在庶幾多士靡然向風言行表裏一出於正無或肆為詭異以干治體從之廣西運司申昭州金坑五處遞年所入不多若行廢罷以裕民間甚便本部欲行契勘上曰不必契勘便行廢罷詔監司帥臣每歲於部內舉亷吏一二人具實迹來上中書籍記以備選擇如無聽闕秋七月乙丑詔知廣州鞏湘以任帥閫備著效勞可除龍圖閣令再任庚午禮部太常寺言開寶通禮州縣水旱則祈社稷典禮具存政和五禮新儀雖不該載見今朝廷或遇水旱亦行祈禱今欲從臣僚所陳遇有水旱令州縣先祈社稷委合典禮乞朝廷指揮從禮部太常寺修定儀注行下詔從之先是臣僚言州縣遭水旱神祠佛宫無不遍走而社稷壇壝闑然莫或顧省彼五土五穀之神百代是尊是奉豈應祈報獨不得與羣祀同享精純於是下禮寺看詳而有是命甲戌詔曰朕涉道日寡秉事不明政化失中以干陰陽之和乃季夏涉秋旱暵為虐大田失望民靡錯躬夕惕以思反己自咎可自今月十三日避殿減膳令侍從臺諫兩省卿監郎官館職各條具朝政闕失毋有所隱朕將親覽考求其當以輔政理咨爾在位副朕志焉乙亥詔曾任知州而為郎官卿監曾任卿監郎官而復出為監司之人陳乞關升者依兩任無人薦舉處條例特與免用舉主理為資序從臣僚之請也癸未宰相王淮梁克家知院周必大僉書兼權參政施師㸃以旱乞避位詔不允上宣諭曰朕心未嘗放下一日之間天下定行一兩遭又曰數日羣臣應詔言事並無及朕過失多言刑獄事刑獄自有成法王淮對曰陛下憂勤如此更有何過失可指己丑臣僚乞詔大臣自今維揚合肥荆襄四路帥當於嘗任近臣中簡記除授上曰均是帥臣豈可輕授此在卿等簡擇八月甲辰進呈次因論人才上曰若是平穩無才略人不難得須是有材而不刻慈善而不謬王淮等奏陛下二語可謂盡用人之要大抵有材者多失之刻慈善者多失之謬乙巳進呈楊安誠劄子乞遵依仁宗皇帝之制采用司馬光之言核實浮費量加撙節上曰近日臣僚言多用司馬光撙節之說蓋仁宗時亦自乏用故司馬光有是言朕嘗見一老內臣云哲宗皇帝極愛惜錢物不肯多賞賜臣下王淮等奏節用裕民之本陛下常以祖宗為法天下之福也戊申詔侍從兩省管軍知閣御帶及在內觀察使以上於武官中各舉有威儀善應對堪充奉使接送伴者一名聞奏其已被差人不許薦舉辛亥進呈湖北總司乞糴米事因言得湖北報七月十八日大雨雱䨟秋成可望上曰是日朕食素就宫中設醮但見陰雲四合不知得雨之廣王淮奏曰經所謂惟德動天無逺弗届上曰人主於天尤親感召之速終是異於臣庶庚申詔左藏南庫撥𨽻户部提領所事務限五日結局先是戶部具南庫收支項目上謂輔臣曰見在錢三十五萬餘貫盡撥付戶部其餘金銀等物令陳居仁㸃檢具數以聞上又曰欲併南庫歸左藏令版曹自理㑹朕亦省事卿等可子細令具南庫五年間出入帳親自㸃檢故有是詔南庫者本御前樁管激賞庫也休兵後秦檜取戶部窠名之可必者盡入此庫戶部闕乏則豫之檜死屬之御前由是金帛山積上即位之始年納右正言袁孚之請遂改為左藏南庫專一樁管應副軍期然南庫移用皆自朝廷非若左帑直𨽻於版曹而為經費也至是始併歸戶部既而尚書王佐奏言南庫歸版曹無益而有損乞就撥歸封樁庫其朝廷年例合還戶部錢却於封樁庫支不從戶部尚書王佐言經總制錢嵗額一千五百萬貫年來寖生姦弊或偶無收則便於帳內豁除而創生窠名更不入帳分𨽻遞年積壓直待赦放切恐暗失經費詔戶部將淳熙八年終以前拖缺及未起錢數並特除放自今收趂虧額其知通并提刑司官屬委本部覺察從條施行是月宰執奏封樁庫見管錢物已及三千餘萬緡上曰朕創此庫以備緩急之用未嘗敢私也封樁庫者亦上所創也其法非奉親非軍需不支先是六年夏四月提領本庫言共管見錢五百三十萬貫其後往往以犒軍或造軍器為名撥入內庫或睿思殿或御前庫或修內司有司不敢執尋又奏內外樁積緡錢四千七百餘萬上曰何以聚人曰財周以冢宰制國用周禮一書理財居其半後世儒者尚清談以理財為俗務可謂不知本矣祖宗勤儉方全盛時財賦亦自不足至變更鹽法侵及富商朕二稅之外未嘗一毫妄取亦無一毫妄費所以帑藏不至空虛緩急不取之民非小補也先是上以諸路財賦浩繁令兩侍郎分路管認是年王佐為尚書又請於次年四月將諸路監司守倅所起上供錢比較以定賞罰自是罕有逋缺九月壬午詔諸路州軍拖缺內藏庫諸色窠名錢物自淳熙九年終以前實缺並特與除放以後常切催納如有違慢仰本庫開具所缺州軍當職官吏取㫖施行翌日王淮等奏聖恩溥博不知所缺數若干上曰六十萬貫癸未興元府都統制吳挺言本司同安撫司增置賞錢募人告捉盜販解盬入界見係出戍官兵把截去處嚴行搜捕外有不係官兵出戍地分乞行下沿邊州郡督責捕盜官司搜捕詔利路安撫提舉各申嚴行下階成西和鳳州禁止毋得透漏如未覺察守令並取㫖重作施行冬十月甲午詔主管魏惠憲王府鄧從義可傳㫖羅忠并母白氏今來皇孫女安康郡主凡百宜執婦道不可慣縱所有晨昏安省之禮候得指揮方免若旦望節序並從常禮務成肅雍之德倘或違此别有誥訓臣留正等曰周之王姬能執婦道詩人歌之王圭受公主謁見前史以為美談今觀安康下嫁聖訓申誡諄切如初其所以經夫婦美教化之意視古有光矣乙未右正言蔣繼周言國家役法自祖宗以來前後講論詳矣行之其或不能無弊者非法弊也人弊之耳茍得一賢令尹則人樂為之爭先是知其弊誠在人而不在法自范成大唱為義役之說在人著目而處州六邑之民擾擾乎十有六年於此矣夫狹鄉民貧私相借助以供公上之役是特鄉里常情耳成大張大其事標以義名且欲改賜縣名行之諸路朝廷固已察其情狀不可其請矣成大不已再有所陳囑其代者使遂其說至陳孺知處州親受其弊任滿奏事乃始備言其實陛下即可其奏於是處州之民始獲息肩於義役之罷三兩年來舊說復作一布衣之上書未必公言朝廷令守臣李翔看詳蓋欲其詳酌可否曾不能參照案牘博詢民言辨范成大陳孺所奏虛實有請于朝而罷之乃從而附㑹其說斷以己見官民僧道出田一等他日貧富置之不問人以為重擾條畫利害訟于烏臺臣嘗問鄉閭出田助役然則何用曰將以賂胥吏有常數也吏胥之誅求於執役者官立法以禁之猶懼其不懲使上之人通知之其何以訓夫立賞以誘之而舉行者不加勸立罰以威之而沮敗者不加畏給官田以助役亦終於不可行則出私田者民情之不樂從可見矣欲望特降睿㫖將處州及兩浙有見行助役去處聽從民便令官司不得干預其間民自難久行或不能息爭訟仰州縣遵依見行條法照應物力資次依公差募仍乞將李翔罷黜以謝處州兩浙十五六年間義役之擾從之丁未進呈大理寺奏內侍之子賈俊民等代筆案俊民當降一官勒停上初欲貸其勒停而更降一官又思餘人亦當視此以降罪乃曰人有一㸃私心法便不可行並如奏次日王淮等奏陛下用法如此可謂至公上曰不怕念起惟恐覺遲然人之所以未免一念之起者正以修行未到淮等奏陛下每言唐太宗未嘗無過只是覺得早陛下可謂覺得早矣上曰凡事順其自然無容私其間豈不心逸日休先是詔廣鹽復行鈔法罷官般官賣是月廣東提舉常平茶鹽韓璧奏略云臣叨恩備數東路提鹽同措置西路鹽事所以東路事體尚須到官悉心推䆒至如西路臣三任九年之間粗知其略廣西民力至貧歲入至薄官兵備邉之費盡取辦於般賣猶懼弗給今一旦住賣束手無䇿全仰給於漕司往年改行鈔法時自有漕司應副逐州取撥窠名數目可舉而行又朝廷頒降祠部及㑹子錢計四十萬下西路漕司通融為十年支遣及諸州各有漕司寄樁錢以此隨其多寡應副諸州缺乏之數使足以供公上贍官吏養兵備邉則可以堅客鈔之行上副陛下改法裕民之意尋詔於支降四十萬數內權支二萬貫付靜江府五萬貫分給諸州軍充淳熙十一年歲計支遣一次續又從諸司申請撥廣東增賣鹽鈔剩錢五萬貫及令封樁庫支㑹五萬貫充廣西十二年分歲計十一月壬戌朔日有食之癸酉進呈舊按閲犒賞例上曰處分已定不須舊例盡是內庫支一色見錢此錢樁留朕初無他用王淮等奏陛下平日未嘗妄費今以激厲士卒人百其勇上因言士氣要須激厲每戒主將云卒伍遇戰未可便用大陳且以小陳試之每一捷即加賞賚將見人人自奮是日進呈欲召為郎者六人上熟視曰陳達善得沈崈一亦可此文字且留中王淮等奏用人不厭詳細須是參較方可甲戌上幸龍山教場大閲大犒兵師為錢三十六萬丁丑進呈畢上出癸酉留中文字及録示王尚之等六人曰朕兩日於班簿中撿得此數人可並召赴行在餘亦難得又諭却於寺監丞中揀人為提舉如此更迭出入則所用之人源源不絶是月命賑京西飢言者謂自乾道五年降㑹子付兩淮收換銅錢又節次支舒蘄鐵錢換易凡十六次指揮至今十五年私渡銅錢常自若也乞多給㑹子立限盡換詔兩淮各支降㑹子一十萬貫限兩月收換其換到銅錢淮東赴鎮江淮西赴建康送納樁管閏十一月乙未上曰諸軍近日教閲聞得錢甚喜多有買柴作歲計王淮等奏緣此街上見錢甚多上曰聞外間米麵甚平見老兵云三十文買麵一碗可飽終日街上多有醉人朕得百姓歡樂雖自病亦不妨所謂吾雖瘠天下肥矣壬寅進呈廣西經略安撫司奏安南國牒已排辦章表投進方物上曰象乃無用之物經由道路重擾吾民除不受外將入貢之物以十分為率止受一分就界上交割厚與回賜章表令入遞降書回答十二月丙子車駕詣德壽宮行太上皇后慶壽宮中之禮詔曰朕荷太上之燕謀承至尊之休德順稽帝道丕迪重華之徽寅賴母儀胥洽二南之化惟天純佑俾國多祥皇年方衍於萬春甲厯曩登於七帙奉巵介壽嘗祗闡於宏休含飴保和兹繼符於昌算繄我家之纍盛軼聨冊之前聞爰舉曠文躬伸慶禮上南山之祝永偕慈極之隆首東秩之辰肆推凱澤之被式敦及老之義併彰錫類之仁可大赦天下戊寅王淮等奏前日行慶壽禮天氣甚好上曰中外歡恱二親和氣不可形容所以歸晚是月敷文閣直學士致仕李椿卒椿嘗為樞密院檢詳文字時張說為僉書㑹小吏有持南丹州莫酋表來求自宜州市馬者因說以聞椿白雍逺宜近官非不知也故迂之者豈無意哉莫氏方橫奈何導之以中國地理之近請治小臣引致邊事之罪說又建議募民為兵以所募多寡與賞罰格以勸沮州郡椿白說若此則恐必有以捕為募而致驚擾者願毋限額為司農卿日嘗言於制國用者曰今倉庾所用一月營一月之聚帑藏所給一旬貸一旬之錢朝廷之與戶部遂分彼此告借之與索償有同市道此陽城所以惡裴延齡者願革而正之權臨安府故事府有中人承受公事守至必謁椿弗謁曰廟堂無所用承受知婺州有㫖令婺市皮角若干而筋五千斤椿奏一牛之筋四兩是屠二萬牛也上為收前詔為吏部侍郎上親慮囚命椿與張掄敘囚徒掄官承宣使奏牘欲列名椿右不可白丞相丞相令先掄椿退謂權要恃恩不足怪廟堂曲狥為可畏草奏言臣固知承宣使序權侍郎之上但使事以閣門副侍郎耳所被㫖臣名實在上不可不正章未達而事聞掄亟罷侍衛司兵囚兢而碎僧舍新補軍頭乘忿而剽都市朝廷不深治椿舉張彛之事為戒言官彈劾不勝去職所從風聞者黥𨽻椿言非置臺諫為耳目之本意軍中結邏者以搖主將攟摘騰播椿請嚴階級之法又極言閹寺之盛曰自古宦官之盛衰係有國之興亡其盛也始則人畏之甚則人惡之極則羣起而攻之漢唐勿論靖康明受之禍未逺今畏之矣未甚惡也有以裁制之不使至極則國家免於前日之患宦官亦保其富貴願官置蠶室而限其𢾗復祖宗之制官髙者補外又門禁宮戒之外勿使預於人材政事又嚴士大夫兵將官與之交通之禁椿嘗論渡江以來茶法之弊謂官執空劵市之園戶州縣歲額配之於民卒有賴文武之寇初廣西鹽法官自鬻之後改鈔法漕計大窘乃盡以一路田租之米二十二萬斛令民戶折而輸錢至五倍其估民既為錢二十餘州吏祿兵稍無以給則又損其估以市於民曰和糴曰招糴民愈病久之鈔弗售者三年椿請改法從舊除民折苖和糴招糴官民俱便權知和州錢之望言厯陽縣含山縣有麻澧二湖灌溉民田為利甚博乾道二年因守臣胡昉鑿千秋澗以設險澗既開通而二湖之水始泄入江積十餘年澗水日泄灌溉之利遂廢令欲於千秋置斗門以防湖水之泄遇大浸則啓之以出外遇旱暵則用之以瀦水俾二湖之灌溉如初又不妨千秋澗之險從之是歲知遂寧府李燾上續資治通鑑長編至靖康全書共九百八十卷舉要六十八卷甲辰淳熙十一年春正月辛卯朔雨土辛丑詔浙東提舉司將開掘過白馬湖為田去處並立板榜每季檢舉曉諭人戶日後不得再有侵占仍仰本司覺察毋致違犯丙午監察御史謝諤言去年十月四日臣僚言因處州守臣不合將義役置冊假以藉手干求差遣力陳其弊奉㫖依奏其所奏係是兩項第一項云將處州及兩浙有見行助役去處聽從民便令官司即不得干預第二項云其民間自難久行不能息爭訟者仰州縣遵依見行條法照應物力資次從公差募第一項是行義役第二項是行差役也言者之意欲差役義役二者並行元不曾指名言盡罷義役兼但言兩浙之弊不曾言及别路也近訪聞江東西諸路纍年民間有便於義役之處官司乘此頗有搖動蓋民間舊因差役吏緣為奸當差之時枚舉𢾗名廣行追擾望其脫免邀求貨賂使之爭訟至有纍月而不定者民戶因此多有困竭緣行義役遂頗便之自此法之行胥吏縮手無措日夕伺隙思敗其謀近有饒州德興縣吉州吉水人戶赴臺陳訴其詞激切端有可憫乞下諸路監司州縣應有義役當從民便外其不願義役及自有爭訟乃行差役兩項並合遵守違者許提舉司按奏其德興縣人戶並賫出本縣舊刋義役石碑可見經久之計民情之所安惟恐官司撓其成法上曰前日蔣繼周言處州守臣專行義役之弊今諤欲義役差役各從民便法意補得始圓令照前降指揮施行甲寅雨土是月戶部奏言去歲旱傷計減放六十萬石上初欲下漕臣核實既而曰若爾則來年州郡必懷疑不與檢放矣二月甲子進呈擬張叔椿等差除上曰今後有卿不除少有少不除卿所謂官不必備又宣諭今後蜀中監司可間差此中人往若皆蜀人則人情宛轉甚非法度癸酉進呈次諭熊克台州當赴上卿等曽以朕意宣諭否克為人性緩古人有韋弦之戒緩者勉之急者緩之全在抑揚之道詔已降指揮溫台被水逐州守臣王之望陳巖肖各不即聞奏乃賑恤遲緩之望特降一官巖肖落職放罷近台州獲海賊首領溫州獲次首領王之望陳巖肖各有捕賊之勞以功補過之望放罷巖肖宫觀是月樞密院奏兩淮京西湖北路民兵萬弩手自淳熙七年後不曽拘集教閲乞令逐路安撫司行下所部州軍常令不妨本業在家閲習俟農隙照年例拘集比試其有事藝髙強之人每州許解發一二名從帥司保明津發赴樞密院與依四川義士條例按試補授以示激勸詔從之三月辛卯進呈耿延年狀翻鑄到淳熙十一年錢樣上曰且用舊樣不必頻改是日進呈刑部侍郎曾逮奏乞依乾道九年三月二十三日指揮令刑部長二郎官并巡察御史每月通輪録囚具名件聞奏庶得糾察之職稍復祖宗之制上曰可令用每季仲月於是詔令刑部御史臺於每季仲月親録囚徒乙巳詔知福州趙汝愚除敷文待制再任上宣諭汝愚在福州甚宣力庚戌詔知泉州司馬伋除龍圖待制再任兩浙運判張礿除徽猷閣兼轉運副使再任是月親試舉人賜衛涇以下及第出身有差趙傑之知太湖縣有言其不丁繼母憂者上諭宰臣王淮等曰士大夫一被此名終身不可贖行遣中稍為宛轉不須明言其罪遂降一官放罷聖度之忠厚如此夏四月辛酉詔金州依見行鹽法聽客人鋪戶從便買賣不得依前置場拘𣙜癸酉詔廣西經略詹儀之運判胡庭直開具到見行鹽鈔已為詳細可恪意奉行先是知容州范德勤奏廣西賣鹽不便詔儀之庭直公共詳議具奏於是儀之等條析奏聞今詳議靜江府等一十六州官賣鹽以救一十六州之害但罷髙化等五州敷賣二分食鹽令轉運司置鋪出賣從便請買以為五州之利所有五州歲計令轉運司計度抱認應副如是則一路二十五州無不均被聖澤折苖科敷之弊可以永革而民力裕又言淳熙十年七月一日改行客鈔至今年三月十日終已招賣過鹽鈔六萬二千蘿見今客人不住搬販措置自有次第故有是詔髙化雷廉欽五州産鹽地分客鈔不行尋又奏欽州白皮鹽場事體與雷亷髙化一同乞依舊興復以備本司取撥作鈔鹽支付客旅搬請丙子進呈進士射射日分上曰進士射射甚好王淮等奏孔子射於矍相之圃觀者如堵墻古人以射為重後世乃廢而不講上曰古者有文事必有武備後世不知此意所以朕舉行之丁酉權知均州何惟清言解鹽除京西客人搬販外更有均房界入川者甚多皆是取馬官兵附帶而去乞嚴賜約束從之是月御製送行詩賜太保史浩又書明良慶㑹之閣六字賜之五月辛卯進呈知龍州張熹充亷吏上曰亷吏最難得近不住懲戒而貪黷尚多張熹果如何王淮等奏蜀士皆稱其操履上曰可與提刑差遣仍報行所薦劄子以厲士俗乙未權知和州錢之望奏本州屯田事先一日上謂王淮等曰之望言課耕無法士卒惰者無以厲而勤者無所勸卿等可詳議奏來既而進呈欲令淮西總漕同建康副統制詳議以聞右正言蔣繼周言比朝廷集議監司守倅接送等物嚴為限制所以節浮費寬民力也其有諸路藩府及列郡守暫差監司或他州通判等兼攝上下馬饋送并借請公用亦已約束而偏方小壘間有違戾或權官被差而不就或已權不便而求歸須申上司又别差官年歲之間接送𢾗次郡計有限誠何以堪乞詔逺郡闕守處令監司選差以次官兼權庶免將迎之費以蘇郡計從之丙午蔣繼周言溫處流民丁籍尚存諸縣催科無人供納或其家丁壯既去老弱獨留監繫輸項急如星火因而多糾未成丁人名為充代追擾不能安居欲乞令溫處守臣將屬縣流移人戶核實除落丁籍不得存留抑勒賠填如違令監司覺察以聞從之甲寅詔四川駐劄御前諸軍將士戍邊滋久常軫朕懷可令總領所支撥樁管錢引三十萬道特與犒設一次傅鈞彭杲守邊纍年軍政修舉內傅鈞與升都統制彭杲可帶吉州刺史乙卯詔令江東提舉司行下建康府太平州寧國府池州饒州廣德軍南康軍建昌縣各多支常平錢米將被水人戶優加存恤務要實惠及民毋致失所六月戊午朔詔諸軍升差蓋擇將之根本必有智勇勞效乃能服衆今後宜精加選用毋得循習苟且仍令樞密院自淮備將以上至統制官每全軍各為一籍逐月揭貼進入朕當間㸃三兩名審觀識略事藝隨其能否議主帥之賞罰臣僚訪聞諸州軍受納夏稅官吏邀阻間有將堪好絹帛强行打退却置場用低價收買其官中既已買下退絹多作畸零折納髙價不恤民病利其贏餘欲望嚴禁今後州軍置場收買退絹許人戶越訴令監司御史覺察違戾科罪從之詔建寧府淳熙九年分人戶缺二稅等錢三萬四千三百十九貫並令除放辛酉進呈王淮等上表為敕令所編類寬恤詔令成書乞頒降施行上曰可謂詳備凡事在人舉行斟酌輕重盡之矣壬戌進呈祕書省挍書郎奚商衡奏制科取士勿拘三歲之制上曰賢良得人國家盛事可令學士院降詔有合召試人舉官即以名聞大事記曰國家以科舉士而魏掞之以布衣召對未嘗限以科舉國家以資格任官而朱熹不由舉主特與改秩未嘗拘以資格國家三歲舉制科而淳熙詔有合試人舉官即以名聞而不拘三歲之制故陳亮以布衣六達帝庭上書敢於論恢復論宰相而人才奮矣甲子進呈王渥奏小路蠻擊虛狼事上論及恩威之意且曰國家兵威不及漢唐逺甚所恃者其天乎澶淵之役辛巳之役匪天而何王淮奏人君平時仁心厚澤固結民心我無失德而天之所助者順蓋以理勝不在力勝上曰漢武帝時兵威震懾萬里之外又何可當但失之已甚丙寅臣僚乞詔諸路總領各密舉偏禆將校可為將帥者不限貟𢾗列其所長保明來上令密院籍記考察不如所舉坐繆舉之罰從之是日進呈趙汝誼言詳議到屯田事遇一墟水退諸墟兵卒併力耕種至立秋止秋成穀熟施工力者皆預分穀之數上曰若將來所收不多朕不惜幾萬米分屯田人兵使之亦如豐年則更相勸勉己巳詔雨澤稍愆屢降寬恤指揮其人戶夏稅和買催納起綱自有條限訪聞官司趣辦追擾致傷和氣仰監司嚴行禁止倘或違戾御史臺覺察彈刻丙子鄂州江陵都統制郭杲言昨蒙降錢三萬貫措置屯田除節次收買牛具創造寨舍乞於上件錢內更存留一萬二千貫付牛僎收管准備接續餘錢乞拘收赴元降處回納詔令郭杲將回納㑹子二萬貫於內支一萬四千一百貫付牛僎貼充犒軍餘錢就行樁留准備屯田支用庚辰知臨安府張礿言乞將浙西江東諸縣自淳熙十年以前所缺窠名錢三萬七千二百四十餘貫米八百三十餘石盡行蠲放從之癸未戶部韓彥質言州郡財賦場務縣道所入財穀皆有名色在法不得移易而守臣無忌憚者竭公帑之儲以快私欲至於終更席卷而去不恤後人乞今後守臣任滿將所留諸色錢穀交割下政其𢾗申戶部置籍上曰須令後政限一月具𢾗申戶部照㑹王淮奏前政只言𢾗贏後政只言𢾗縮合令前後政各具𢾗申上曰過限不申去處令戶部以聞是夏知婺州洪邁奏本州負郭金華縣田土多沙勢不受水五日不雨則旱及之故境內陂湖最當繕治而本縣丞江士龍獨能以身任責深入阡陌諭令修築令耕者出力而田主出穀以食之凡為官私塘堰及湖總之為八百三十七所以畝計者合萬有九千用民之力二萬七千有竒田之被澤者二千餘頃皆因其故跡葺而深之於官無所費於民不告勞三二十年之中度亦未至隳廢使食君之祿者皆能如是豈不大有補於王政而士龍者上不因官司之督責下不因邑民之訴請自以職所當為勇於立事用意如此誠為可嘉乞加奬激以為州縣小吏赴功趨事之勸從之秋七月戊子右正言蔣繼周言乞詔諸軍將佐屯駐去處自今並不許私置田宅房廊質庫邸舍及私自興販營運從之己丑郭杲言木渠下荒田實有堪耕種一百九頃四十四畝除已差撥官兵二百人前去開荒其餘不通水利髙仰田亦令耕種官兵差去合請錢米就屯田官所管稻穀內借支將來收子課折還詔郭杲將髙仰田假更切措置開耕毋致荒間餘依所乞挍書郎羅㸃言比年以來所在流配人甚衆强盜之獄每案必有逃卒積此不已為害不細切謂欲戢盜賊不可不銷逃亡之卒欲銷逃亡之卒不可不減刺配之法望詔有司將見行刺配情輕者從寬減降别定居役或編管之令其應配者檢㑹淳熙元年五月指揮擇其强壯刺充屯駐大軍庶幾州郡黥配之卒漸少上曰近歲配𨽻稍多久後當如何王淮等奏如雜犯死罪猶可從輕至如劫盜六項指揮之行為盜者莫不曉得將欲為盜必先虛立為首之名殺人奸濫之罪皆歸之以故為首者不獲而犯者免死盜何由懲上曰可令刑寺集議奏聞既而刑部大理寺奏上壬寅進呈上曰朕夜來思量配法雜犯死罪只配本州牢城犯私茶鹽之類不必逺配只刺充本州廂軍令著役若是劫盜已經三次便可致之死可諭刑寺官子細商量奏來乙卯淮西總領趙汝誼言和州八家墟西蓑芬散水地打量得六頃五十畝乞撥付屯田官兵計置開耕及下和州將不堪開耕不敷元𢾗田二十九頃七十九畝日下别踏逐係官荒閒田土撥付總轄屯田官補填元管之𢾗從之密院言八年四月二十九日指揮江上軍帥於統領中薦舉人才限以三人之𢾗深慮搜求未廣詔令照八年指揮不限貟數薦舉臣僚乞戒飭帥守監司列薦宰邑之官當務至公毋徇私情當求實跡毋採虛言後不如舉必行繆舉之罰其他列薦所部官吏併加申警從之是月以泉福州興化軍饑諸州水興元府旱並命賑之八月辛酉詔浙西諸州府各將管下舊來圍田去處明立標記仍榜諭官民戶今後不得於標記外再有圍裹戊辰給舍看詳趙汝誼奏乞行下守臣遇客販米不得阻遏其免收力勝錢一項自有見行約束如有違戾及以喝花為名故作留滯者許客人赴監司臺部越訴重置典憲從之九月戊子樞密院言凖御筆處分聞隴蜀向來軍陳多用純隊近易為花裝二者孰便仰四川駐劄御前諸軍都統制吳挺等條具奏來興州吳挺奏行軍用師惟尚整肅其花裝隊未戰先已錯雜興化府彭杲奏四川諸軍昨自紹興之初團結皆為純隊以五十六人為隊止是教習純隊事藝兵刃相接取便應用金州傅鈞奏隴蜀山川平陸少而險阻多兩軍相遇或我髙而彼下必須純用弓弩狹隘相遇則純用戈㦸緩急全隊呼索易於應集詔並依舊純隊辛丑上諭宰執曰每月財賦冊今後更令進入欲加增減戊申勘㑹諸路州軍義倉米斛在法合隨正苖交納唯充賑糶今來收成在即當議指揮詔諸路提舉常平官各行下所部州軍仰隨鄉分豐歉依條收納入倉不得侵隱他用候歲終具舊管及新收數目申尚書省詔侍講侍讀見今進講周易將欲終篇可自開講日每日講兩卦冬十月乙丑侍讀張大經等奏伏覩陛下嘗因講泰卦之九二玉音有曰君子以其類進而為善小人以其類進而為惡未有無助者也講萃卦之上六玉音有曰盛極則衰亂極生治三復聖言皆已深得大易之㫖欲望聖慈宣付史館詔從之丙寅進呈吏部奏臣僚乞賔州三縣通差文武臣上曰武臣中極難得人小使臣尤不厯練今委以一縣只是害及一縣百姓庚午中書門下省勘㑹州縣稅場所收課息自可足用訪聞近來官司過數增收以資妄用致害民旅理合禁止詔戶部遍牒諸路州軍將應管稅務合趂課息如實及租額之數即不得抑令增收敢有違戾在內委御史臺彈奏在外委監司覺察仍許被擾人戶越訴辛巳詔宇文虛中特更與恩澤二名令曾孫承受臣留正曰宇文虛中之忠亦可得而放矣方建炎之初以資政大學士奉命往使金國留繫軍廷抗節不屈故相秦檜用事盡歸其孥於北方則紹興十二年也虛中在北方久其諸名王大族皆尊信之不疑因與其子宇文師援暨僞翰林學士髙士談謀為復讐之舉欲因九月金主祭天而劫之金之諸王宗親約為內應不幸而功不成者天也而敵人自此上下相疑寖行誅戮矣虛中之家已碎於敵手跡其禍端由於蠟彈之繳還則秦檜之為也是時國家中興二十年而虛中之事不顯最後魏國公張浚招韓王來歸始能言其詳虛中無子有女以族人紹節為之孫明詔命以京秩至是復加褒恩及其曾孫與其外孫所以勸天下之為人臣者也壬午吉肇乞招建康水軍戰船捎手上曰大江之險人命所係蓋藉操舟之人可與招收是月詔程大昌程叔達單䕫趙師䕫各貶秩二等以臣僚言蔣億以贓抵罪于今一年未聞舉主自劾而有司亦不約法以聞乞令吏部檢舉故有是命十一月丙戌朔宰執謝賜太上稽山詩石刻上曰太上詩規模宏大所以賜卿者正欲仰體太上之意如屬意種蠡臣之句卿等切勿分别文武便有晉室之風當視之如一擇才行兼備者用之若曰好士人而才不適用亦何足取戊子知婺州洪邁言本州淳熙八年旱歉支降豐儲倉米五萬石賑糶內二千一百餘石係攬載船梢盤剝折缺已納到六千餘貫外淨缺錢一千九百餘貫約米五百三十餘石乞照紹興府體例蠲放從之利路帥憲茶馬司奏知鳳州余永弼知文州鄧樞政績上曰邊郡政要得人永弼樞各轉一官候任滿與再任詔向來趙善杰所修海鹽縣堰閘及劉俁修華亭縣塘堰令劉頴親往相視目今有無衝決損壞并本州去年所修水利於今年有無實被灌溉田畝及未盡去處開具奏聞辛卯置萬州南浦縣漁陽井鹽官一貟并歲收鹽十四萬六千三百餘斤初以主簿兼監於是始專置官戶部侍郎葉翥乞行下核實免丁錢事上曰此戶部自可理㑹不必降㫖辛亥進呈淮西總領趙汝誼奏和州屯田所收物斛未曾均給上曰可令總領所都統司將屯田力耕官兵斟量工力多寡拘今年收到物斛實數分作三等次第均給是月兩浙運副劉敏士運判姚憲并降官落職新江東提刑王彥淇别與差遣並以溫台二州灾潦失於按劾守臣也十二月丁巳兩浙運判錢冲之言奉詔相視開濬常潤等運河淺澀去處今相度自臨安至鎮江四郡共用六萬餘夫委是大役乞令諸州將運河兩岸支港地勢卑下泄水去處牢固捺成堰壩仍申嚴諸閘啓閉之法淺澀去處令逐州守臣措置隨宜開撩務要舟楫通行從之己未詔祕閣修撰知隆興府程叔達除集英殿撰再任丁卯進呈知州軍除目上逐一問其人才如何至劉塤知滁州魏敏哲知濠州上曰淮郡不可輕此二人更契勘又曰選擇人才治道之急者州郡若不得人雖諄諄日降詔令亦是徒然卿等今後每遇一闕須是遍選終竟有得因言今之議者多言邊郡太守須是久任今邊郡無兵雖久任何益大軍皆在江南若是創置又費衣糧却是萬弩手民兵無養兵之費有養兵之實緩急亦可用丁丑戶部言建康府申乞將沙田許從官田所取畫降指揮與免十料催科外其沙地蘆場乞自初生年分起料催納稅租從之己卯進呈解元振奏乞令光州依舒州蘄州置監鑄錢上曰此事難行後次鑄到鐵錢時可令分二三萬與光州是月知台州熊克上九朝通略是歲知鎮江耿秉奏三縣歲額畸零錢八千餘貫今以公庫所節浮費代充解發若非得㫖則恐後人敷之於民上曰以寬剩之錢為民代納固善後人若無餘則必别作名色科配此事州郡自行則可朝廷難為施行宋史全文卷二十七上欽定四庫全書宋史全文卷二十七下宋孝宗八己巳淳熙十二年春正月己丑廣西提舉胡庭直言雍州賣官鹽並緣紹興間一時指揮於江左永平太平兩寨置場用物帛博買交趾私鹽夾雜官鹽出賣緣此溪洞之人亦皆販賣交鹽近雖改行鈔法其本州尚仍前弊詔經略司及知雍州陳士英公共措置聞奏既而經略司申元初起置博易場以人情不可止絶而博易交鹽亦是祖宗成法乞只嚴禁博販等人不得販鬻交鹽攙奪官課餘仍舊從之戶部言明州申鄞縣東錢湖積蓄澗水溉田五十餘萬畝昨緣茭草延蔓侵耗湖水奉㫖支降錢米開淘茭葑堆積沿湖山灣濼去處遂成葑地先係資教院僧承佃墾成田三百餘畝切恐人戶以增租承佃為名填疉增廣有妨積水乞將上件㳂湖葑地不許人戶請佃仍舊開掘為湖庶兔向後堙塞之患詔勾昌泰躬親前去相視開掘辛卯進呈命令獄案籍三省事下諸州有督促至十餘而未報者上曰自今命令及獄案不須行文催促多則愈玩只一季將上擇其怠惰者懲之則自然不敢於是潼川運司以嶽霖體究漢州雍有容在任不法事稽緩特降一官湖北運司陳達善未開具趙善待妄用過任內錢物令即具析因依癸巳進呈湯思謙六院差遣上曰思退退縮其弟不可與在內差遣王淮等奏思謙作兩郡皆有可稱不知與提舉如何上曰在外不妨上又曰編修官湯碩亦可與外任癸卯進呈知平江府常熟縣曽􅙺將版帳贓賞等錢支用及違法科取錢物等事刑寺看詳曾􅙺所犯公罪徒贓罪流私罪絞上曰曾􅙺具狀抵罪可除名勒停上又曰朕昨夜思之監司以按察為職置司所在不能無失職之罪若欲行罰又恐此後抉摘人之小過而知縣愈難為次日御筆批置司所在監司傅淇劉頴各降一官甲辰詔蓋經趙師䕫姚述堯各貶秩二等以所舉曾棨犯贓故也二月丁卯奏事畢上賜王淮等酒上問民間風俗及論古今治亂事上因曰自唐虞而下人君知道者少唯漢文帝稍能知道專務安靜所以致富庶自文帝之外人君非唯不知道亦不知學淮等奏道從學中來上曰知學者未必盡知道但知學者亦少淮等奏若唐太宗末年寖不克終豈是知道上曰人君富有天下易得驕縱淮等奏若治安日久每事留意則是愈久愈新上又曰天下全賴好監司若得一好監司則守令皆好淮等奏監司郡守皆在得人上曰先擇監司為要若郡守亦當選擇得尤好卿等今後為朕除授監司須是留意上又曰近日來郡守亦勝如已前若是資序已到其人不足以當監司郡守則監司且作郡守郡守且作通判亦何害時天氣晴和淮等因問興居上曰朕尋常飲食亦不敢過淮等奏易於頤卦稱謹言語節飲食上曰觀頤觀其所養也壬申吉州申乞將旱傷最重太和吉水廬陵縣第五等人戶見缺淳熙十一年夏稅和買共一千九百九十餘匹並與蠲放從之丙子殿侍陳賈言國家財計之入率費於養兵然軍之𨽻卒伍者所得常不能贍給而自將佐等而上之則有至數十百倍之多今諸軍額外貟缺冗泛之費姑以殿步兩司言之殿司額外自統制而至凖備將凡一百二十貟而數內護聖步軍至添統制三貟步司額外自統制而至凖備將亦一十八貟兩司歲支除逐官本身請俸外供給茶湯猶不下一千萬緡養軍之須固已不資而額外重費又復如此無惑乎財計之不裕也且以增創額外謂可儲養將材耶然諸將或有闕貟未見取之於此若謂其人不足以備採擇則髙廩厚俸自不宜輕以與之乞軫慮國計責實政將內外額名色自今以往一切住差其在冗食之人乞賜甄别如有可備軍官之選則存留以俟正官有闕日補之或其人不任使令亦乞隨宜沙汰勿使渾雜無補國事從之是月雨雹三月甲申朔是月申禁胡服蕃樂從右正蔣繼周之請也是春詔制舉題免出注疏夏四月丙辰進呈戶部勘當知鎮江府耿秉奏如遇亢旱聽民車河水上曰河水豈可不令百姓灌田王淮等奏尋常人使來時恐水淺所以不聽人戶車水上曰稼穡事大可依耿秉所請侍讀蕭燧言廣西最逺其民最貧切見在法民年二十一為丁六十為老官司按籍計年將進丁或入老疾應免課役者縣令親觀顔狀注籍知通索丁簿考歲數收附銷落法意非不善也奈何並海諸郡以身丁錢為巧取之資有收附而無銷落輸納之際邀求亡藝錢則倍收剩利米則多量加耗一戶計丁若干每丁必使之析為一鈔一鈔之內有鈔紙錢息本錢糜費公庫錢是以其民苦之百計避免或改作女戶或徙居異鄉或捨農而為工匠或泛海而逐商販曾不得安其業乞令帥臣監司措置行下從收附銷落之制革違法過取之害如或仍前科擾即令按劾從之辛未右正言蔣繼周言南庫撥付戶部于今二年而南庫之名尚存官吏如故乞令吏部將南庫廢併其官吏並從省罷又稱臣照對太祖置封樁庫圖取契丹太宗分左藏北庫為內藏庫并以講武殿後封樁庫屬焉又改封樁庫為景福內庫近年南庫分為上下尋併上庫入封樁庫今所存南庫係前時下庫上曰若盡廢庫眼收支必至殽亂可存留庫眼以左藏西上庫為名官吏全無不得可與裁減於是諸路歲發南庫窠名錢一百九十八萬餘緡改隸本庫後又改稱封樁下庫仍隸戶部焉五月丁亥臣僚言諸處夏稅和買止有折帛折錢二色惟湖州安吉一縣獨多折絲折帛折綾民間困於輸納朝廷以其既納紬絹又以細絲織綾許以粗絲織絹謂之屑絹自前任顔度申請改屑絹為絲絹遂使此邑重困續邑民詣闕陳訴已䝉朝廷仍舊許納屑絹而夏稅産絹猶用細絲乞令産絹亦依舊用粗絲織造從之丙申王淮奏梅雨已多莫須降香祈禱上曰末須如此朕自昨日早晚焚香默禱于上帝丁酉進呈次王淮等奏且喜晴霽上曰朕前日默禱上帝不意感應如此之速朕昨晚更不飲酒只是觀天夜來便晴霽不勝欣喜自今更默禱三日淮等奏天人之際應若影響而况人君為天之子宜其隨感而應上曰臣下禱之於神朕請禱于上帝庚戌上謂王淮等曰聞總司糴米皆散在諸處萬一軍興而屯駐處却無米臨時綱運如何來得豈不誤事可便契勘如要害屯軍去處有樁管米若干大抵賑糴可逐歲循環備荒若樁積米須留要害屯軍所在庶軍民皆有其備是月地震六月壬戌進呈淮東總領吳琚奏欲望將鎮江都統司諸軍官兵日前所缺激賞鋪軍須子鋪布帛錢並與除放庶幾官兵得以全請贍家此令一下足以感士心足以正師律足以戒掊克足以示陛下知行伍之微恤士卒之至上曰軍中刻削楊存中以來便如此琚所言極是可依奏仍降指揮其他有無似此去處及别有侵刻營運錢等並詔罷之己巳臣僚言臣聞一定不易之謂法循習引用之謂例故昔人常守法以廢例未嘗用例以廢法今之有司大抵反是若天官諸選條目猥多法例參錯吏奸深逺法無已行而或廢例有已行而必得此其為弊固非一日乞詔銓部凡七司所行之事條法具載分明可以遵用而偶無已行者並令長二郎官據法施行若於法窒礙而偶有已行之例並不得引用從之丁丑宰執進呈次上曰秋季在近命令獄案有稽緩者可擇數事稍大而日子最久者當議行遣今州郡職事弛慢不一難為一例從寬寬猛相濟政是以和前此嶽霖降官印榜行下已久誨爾諄諄聽我藐藐豈可不明賞罰不然朝夕諄諄無益是日進呈諸路監司帥臣每遇歲終各以所部郡守考察臧否來上浙東一路最近淳熙十一年分至今尚未開具聞奏上曰近來廢弛事多須當懲戒於是帥臣鄭丙提舉勾昌泰各降一官秋七月癸未臣僚言伏見淮上州軍逐處皆有椿管米斛建康鎮江大軍屯駐又有總司錢糧惟太平州采石鎮㳂江要害去處去歲民間艱食州部必無儲備聞淮上去秋成熟淮人多有載米入浙中出糶不行今來秋成在近欲望先次支降本錢付總領所及時和糶詔趙汝誼於建康務場見樁管㑹子先次取撥一十五萬貫委官就采石倉措置依在市時直來米樁管詔罷荆門軍浰河武寧黃泥三處稅場以前知軍陸洸言稅額不過二十七貫三百三十三文豪民買撲擾民故也是日進呈㑹子數上曰㑹子之數不宜多他時若省得養兵須盡收㑹子壬寅進呈內藏庫奏和州無為軍常德府拖缺淳熙十年分錢已降指揮再限一季起發上曰近日和州却以三千緡賂內侍求免事覺所免只五千緡却用三千緡囑託謂何王淮等奏其意可長久得免故不憚一時之費上曰守臣張士儋張臨趙公頤各展二年磨勘更與展限半年須管發納數足吏部言二廣考試補攝官人乞依本部銓試出官指揮將考挍到合格人以十分為率取五分從之先是廣東提舉韓璧言二廣兩薦之士許試攝官謂之試額二年再試謂之待次纍至三試謂之正額然後就祿或任鹽稅或受簿尉至有闕官甚處雖待次亦得以濫授其試攝之程度大略如銓試之五場自非雜犯雖文辭鄙俚亦在所録僥幸太甚乞自今一如銓試法下吏部勘當而有是請甲辰詔罷常德府一處復州六處稅場先是提舉趙善譽奏兩州七處稅場共納一百八貫與浰河事體一同上曰罷之甚當如此等事一日做得一件計一歲之利亦多矣因并從之乙巳詔罷揚州江都縣版橋泰興縣新城楚州山陽縣謝家盱眙軍天長縣龍􅀈石梁秦蘭髙郵縣臨澤三墩八處稅場以淮東提舉趙不不流言盱眙係極邊揚州髙郵係次邊不仰此豪末之利而徒使豪民撲買小民被害所有淨利錢本司欲依數抱認起發乞將上件稅場並行住罷故有是命臣僚言竊見浙運耿秉近因屬邑版帳錢額太重乞與屬郡評議將額重處量減詔從其請臣竊以兩浙版帳錢額之重實與江西之月樁相似二浙州郡亦自窘匱與江西不同就諸縣之額太重者與之斟酌縣有毫釐之減則民有毫釐之惠此實然之理若諸路得一賢轉運使則不待冠蓋交馳而裕民之說行矣欲望出臣此疏付之版曹行之浙運更令耿秉與諸郡守臣悉心講究次第行之諸路得為楷式更願陛下不惜少禆版曹以蘇民力從之八月甲寅監察御史冷世光言監司歲出巡厯吏卒誅求所過騷然一縣之中凡數百緡僅能應辦否則睚眦以興怨捃托以生事乞明詔諸路監司今後巡厯力革此弊所用隨行吏卒各於州郡差撥逐州交替從之丁巳上諭宰執二廣鹽事當併為一司王淮等奏外議又更一說併司後恐廣西漕既不預鹽事即無通融錢物或至支吾不行上曰如此亦須更商量蓋天下事全在致思思之須有䇿窮則變變則通譬如奕棊視之如無著思之既久著數自至淮等奏臣等終日思之陛下乃一言而決此無他虛則明耳上曰更賴卿等辛酉令提領封樁庫所支降㑹子一十五萬六千二百六十九貫付淮東總領所三十二萬六千三百一十二貫付淮西總領所三十萬貫付湖廣總領所充今年和糴樁管米本錢支用壬戌詔封樁庫支降㑹子五十萬貫委浙西提舉羅㸃和糴米二十萬石淮東總領所取撥鎮江府見樁管㑹子二十九萬貫湖廣總領所取撥鄂州并大軍庫見樁管㑹子共三十萬貫並各就豐熟去處置場內浙西提舉就平江府置場招糴堪好米斛仍一面取見實直開具申尚書省毋令稍有科抑乙丑御筆朕惟差役之法為日蓋久近年以來又創限田之令可謂備矣然州縣奉行之不公豪貴兼并之太甚隱寄挾戶弊端益滋一鄉之中上戶之著役者無幾貧民下戶畏避棄鬻至不敢蓄頃畝之産莫若不計官民戶一例只以等第輪差如此則不惟貧富均一且稅籍之弊不革而自去可令戶部給舍臺諫詳議聞奏丙寅新提舉常平鹽茶公事趙鞏朝辭進對上曰鹽事利害稍重凡事可親臨之勿容官吏作弊至奏羡餘錢上又曰待與卿少減庶得卿易為監司以刺舉為職賢者固可舉贓吏切不可不按樞密院進呈畢上曰陳良祐薦莊治應賢良卿等見其詞業否王淮等奏己見之上因問鄭建德上又曰李垕為文無氣槩如蘇輔真是難得今莊治可與試淮等奏試時莫亦須有三兩人上曰既降指揮不限年月亦不須限人數癸酉樞密院進呈知建康府錢良臣奏秋教按閲禁軍路鈐訓武郎胡斌恃酒無禮望賜罷黜上曰胡斌素多口舊在潛邸故略假借而乃敢輒犯階級可降兩官放罷甲戌進呈秦焴奏德安府巡檢張革慢棄本職於公㕔罵前任守臣乞罷黜上曰此風不可長放罷輕典更降兩官丙子詔浙東提舉具到淳熙十年旱傷紹興府會稽縣下戶借貸官米四百三十餘石特蠲放九月甲申詔婺州蘭溪第四第五等人戶淳熙八年內借過常平錢收買稻種見缺四千九百六十餘貫可並蠲放丙戌進呈國子祭酒顔師魯奏劄欲奬進節義之士上曰甚好王淮等奏此在陛下進用之間上曰亦須卿等留意辛卯進呈禮部狀太史局與成忠郎楊忠輔所陳厯法異同伏乞朝廷差官監視楊忠輔同太史局不干礙官測驗施行上曰日月之行有疏數故厯久不能無差大抵月行道逺多是不及無有過者至日可遣臺官并禮部官同共看驗乃詔差禮部侍郎顔師魯監視測驗先是忠輔言南渡以來嘗改造統元及乾道二厯皆未三年已不可用目今見行淳熙厯乃因陋就簡苟且傅會而已驗之天道百無一合淳熙厯朔差者自戊戌以來今八年矣忠輔因讀易粗得大衍之㫖創立日法偶與天合撰衍新厯已數年矣凡日月交會氣候啓閉無不契驗今乙巳歲九月望交蝕在晝而淳熙厯者法當在夜在晝者蝕晚而不見在夜者蝕早而見若以晝夜辨兩厯之是非斷可決矣故有是詔尋命官測驗是夜陰雲不見壬辰臣僚劄子奏吏部差注知州乞並令長二同共鈐量其人材堪與不堪應選保明聞奏或前任有過犯者亦酌其輕重而為之去取其人材不堪應選者即報罷注以次人都堂審察更加精核庶幾不至冒濫詔自今吏部差注知州長二同共銓量先次保明聞奏癸巳進呈起居舍人李巘奏切見郊禋之際命官行事皆所以尊天禮神贊導之吏利於速集往往先引就位以待行禮立俟既久筋力有限徙倚疲頓或至倒側及當行禮多不如儀肅敬之誠何從而生上曰此說甚當朕往日在潛邸為亞獻時催班亦早時風緊簾踈頗覺難待况百官既無幕次又立班太早所謂雖有肅敬之心皆倦怠矣蓋引班吏只欲早了他事寧顧時之未可今次只須先二刻催班卿可諭與禮官丁酉進呈郭杲申襄陽府木渠下屯田二麥數上曰下種不少何所收如此之薄可令郭杲子細開具因依聞奏上又曰所在屯田可令總領副都統制漕臣守臣將每歲所收二麥於六月終稻穀於十月終同開具數目帳狀聞奏仍先具知禀文狀申尚書省繼以湖廣總領趙彥逾知襄陽府髙䕫京西運判劉立義鄂州江陵副都統閻世雄奏襄漢之間麥稻熟晚乃詔二麥於七月終稻穀於十一月終具數開奏乙巳樞密院進呈吳煥奏比年改除帶御器械供職復舊還任倐來倐去規求解帶恩例在法厯任謂二年成資今雖不及二年亦合供職及一年以上方可上曰此劄甚好今後須管供職及一年方與解帶恩例只作直省行下中書門下省奏訪聞前知綿州史祁得替之日以本州見在厯尾錢指為羡餘獻總領所希求薦舉詔史祁特降一官放罷臣僚言諸路臧否守臣姓名外間多不聞知乞令三省劄下給舍臺諫不公不實者許繳駮論奏從之是月湖州台州水冬十月丙辰賜建康府駐劄御前諸軍副都統制閻仲御筆朕惟將帥之弊每在蔽功而忌能尊己而自用故下有沈抑之歎而上無勝算之助殊不知兼收衆善不掩其勞使智者獻其謀勇者盡其力逮夫成效則皆主帥之功也昔趙奢解閼與之圍始令軍中有課者死及許厯進北山之䇿而奢許諾卒敗秦師奢封為君與亷頗同位果何害焉卿當以奢為法仍刋石給賜殿帥以下丁巳進呈洪邁奏監司課績欲倣國朝故實行之上曰此事只行一過便是文具今監司只是擇人為急若隨時留意課績之法不必行庚申詔兩淮并㳂邊州軍歸正人請占官田昨纍降指揮與免差稅賦今限滿理宜優恤可自淳熙十三年為始更與展免三年丙寅上諭宰執陳延年今何在其人貪汙不可與差遣王淮等奏延年亦曾為監司來上曰不唯監司不可亦不可與郡乙亥進呈知隆興府程叔達乞將淳熙十年分百姓未納稅苖蠲放其上供及分隸之數自行管認上曰不虧公家又有利於百姓甚好可依奏仍令出榜曉諭王淮等奏以此觀之州郡若得人財賦自不至匱乏上曰此須是守臣自不妄用若是妄用何以表率胥吏使財賦有餘丙子進呈何萬奏簡拔人材劄子言及均外輕內重之勢上曰重內輕外自是人情王淮詳奏昔人有為大理卿者人以為登仙上因言淮漕闕人可改差王正己正己平平淮上事亦簡却以朱安國為江東漕其人亦有立作淮等奏朱安國近按文思院官亦甚當不知是副使或判官與職名否上曰只是判官俟其到任能按發贓吏除職未晚十一月甲申進呈司農少卿吳燠奏伏望陛下令有司集議冗食之吏散在百官者務從減省先自省部始若夫不急之官宜汰之兵亦可以次第澄廢其於大農歲計不為小補上曰此說可行但遽然省罷人必怨懼可令敕令所參照條法合省減人數且令依舊俟離司或事故更不作闕其合減兵卒亦許存留如事故更不差撥十五年五月施行又進呈前將作監朱安國奏文思院製造有物料未到者轉移前料以應急切之須臣願明頒睿㫖自今文思院製造不得轉料又文思兩界除打造器物合支金銀外雇工食錢並乞給一色錢㑹支散庶幾金銀出入經由門戶有所關防又皇城司差親從官二名充本院監作動輒脅持邀取常例乞罷差上曰三事皆依奏如差親從官亦何用罷之誠當詔知漳州黃啓宗清亷律己撫字有勞除祕閣再任壬辰福建運司言本路財賦全仰州軍運鹽息錢及趂賣産浮契鹽丁米等錢以為歲計內有掛缺於民有害皆當除放本司已行下所屬權住催納竊慮州縣違戾復追緣所缺錢係本司窠名正非上供之數乞賜蠲放從之辛丑冬至郊先是詔史浩陳俊卿陪祠皆辭之上曰方登壇時雨㸃下及奠幣玉便晴此皆上天垂祐王淮等奏陛下聖德格天上帝臨饗實邦國大慶赦勘㑹廣南東西民間有曾祖父母年已六十而身未成丁之人州縣便行科納謂之掛丁錢已令監司約束或有違戾帥臣互察以聞䕫路運判楊槱言本路諸州自淳熙九年至十年終所缺轉運司係省錢物皆言旱荒之後催科不行是致積缺欲將所缺錢引一萬一千五百七十五道米麥二千二百四十九石絹五百四十二匹與行免放即與上千錢物别無相干從之丙午宰執內閣奏事賜坐上曰前日郊祀行禮時宫中簷溜已滴聞北關左右雨尤甚只圎壇處無雨王淮等奏陛下至誠感格天地百神休饗明甚十二月庚戌朔加上太上皇帝尊號紹業興統明謨盛烈八字太上皇后備德二字壬子進呈次王淮等奏前日册寶禮成天色晴明中外無不欣愜上曰前日慈顔甚歡和氣洋溢不可言壽聖諭朕以兒婦盡在前便圖畫莫能就淮等奏陛下孝德奉親甚至誠載籍所未聞上曰太上賜朕銷金背子一領太上亦自著一領但色差淺此便是昔人斑衣來歲慶壽日更服以往淮等奏幸兹際㑹獲覩盛事癸丑尚書右司郎中何萬轉對伏見今之風俗視舊日侈此家給人足不能如往時也本朝自淳化之後己號極治仁宗皇帝深慮風俗易至奢縱景祐三年乃詔天下士庶之家非品官無得起門屋非宮室寺觀毋得綵繪棟宇及間朱梁器用毋得純金及表裏用朱非三品以上及宗室戚里之家毋得金稜器及用玳瑁器非命婦毋得金為首飾及真珠裝綴首飾衣服凡帟幕架帕牀裙毋得用純錦􅀈民間毋得乘擔子其用兜子者所舁無環又非五品以上毋得乘閙裝銀鞍其乘金塗銀裝絛子促結鞍轡自文武升條以上乃聽違者物主工匠並以違制論臣願如景祐之詔更切考其目令違戾於禮法者開具各件嚴立禁戢始自中都以及四方則用度有制民力自寬乃詔禮部參照景祐詔書并見行條令討論聞奏甲寅茶馬司言宕昌馬場歲額所管皆是逺蕃夷人入中其間多蹄黃怯瘦之類若行排發必致損斃本司於西和州置豐草監并宕昌良馬監務應副歇飬依已降指揮招置司牧人兵一百人本州全不呼索丙辰詔戶刑部刷具人戶經臺詞欣未曾結絶者開坐名件下元來所屬從條結絶申部報臺如有稽違及滅裂不報者具事因申取朝廷指揮施行庚申進呈知成都府留正丐祠劄子上曰留正莫實是病卿等可即擇人往成都王淮等奏欲以趙汝愚往上曰朕亦思量無如汝愚其處事不偏可以往福州未有人卿等可選擇來一併降指揮癸亥新差權發遣簡州丁逢朝辭論今日財賦窠名之數多飬兵之費重民力有限而州縣之吏並緣名色巧計侵移重困民力之弊乞嚴行禁止上曰卿到簡州當遵守所言丁卯進呈湖北提舉趙善譽乞將本路買撲江陵府髙陂等四十五處河渡盡行廢罷聽從近便居民各以舟船渡載庶幾豪民不得專其利而民旅無迫脅阻滯之患其課利錢乞下本司於常平頭子錢內逐年支撥代納亦不妨諸處解發窠名而民旅得以通行實為無窮之利詔從之庚午淮西常平司言濠州乞除豁收糴不敷折缺米一千五百五萬石有竒係救活餓殍詔特與除放乙亥詔降授忠翊郎殿前司左翼軍統制盛雄飛時降兩官送隆興府居住以在任日不親臨教閲添置回易泉州具案來上故有是詔是歲知龍州王稱上東都事略詔舒蘄二州鐵錢監歲鑄並以二十萬貫為額丙午淳熙十三年春正月庚辰朔上詣德壽宮行慶壽禮內降赦略曰朕懋遵丕訓紹聞令圖維慈皇德盛於中興肆上帝休申於多祐對昌期之舄奕登鴻算之延長且尊歸於父者子之誠若美報其上者下之誼荷神明之右序獲貺施之宣臻五福之曰壽康亶併膺於備順億載之為父母欣並奉於亨嘉眷言比屋之民興播康衢之頌逢熙聖運介美春祺新日新而又新將大揚於懿鑠老吾老以及老宜均賚於羣黎戊戌詔淮東淮西湖廣總所并江池州襄陽江陵府大軍庫淳熙十二年終見在金銀錢㑹並限半月從實開具申尚書省二月庚戌詔潼川運判嶽霖職事修舉除直徽猷閣再任是日進呈詹儀之乞將通判沈作器與宮觀上曰詹儀之所按固然但此門亦不可開監司按通判則可知州於通判按舉皆不可若通判只是隨順焉用通判此文字合如何王淮等奏不與之行又不得不知可與别州倅對換否上曰却不如與改差别一處通判癸酉進呈趙師魯乞四十大縣歸堂上曰今方欲清中書之務至於知縣差往全在銓量不然焉用銓曹為乙卯進呈步軍都虞候梁師雄奏射鐵簾合格官兵人數上曰聞射鐵簾諸軍鼓躍奮勵誠是作成士氣周必大等奏兵久不用頽然氣惰今陛下以此法激勸自然戮力事藝人人皆勝兵矣上曰然辛酉進呈知州軍留闕王淮等奏今留此闕後去欲得近見次與人却有之上曰如此甚好可令中書置簿籍定但自遵守癸酉上曰射射鐵簾與轉官資作多少士氣又曰朕觀唐世大將得人頗多蓋緣內討方鎮外有吐蕃回紇無時不用兵所以人皆習熟國朝仁厚不動兵革餘三五十年所以名將少王淮等奏人才遇事乃見但中外多事用兵不已亦豈是美事上又曰事全在人區處譬之奕棊到窘迫處自别有轉身一路只是思慮不至丙子上曰自古人主讀書少有知道知之亦罕能行之且如與人不求備檢身若不及二句人君豈不知自是不能行甚者但作歌詩如隋陳之君竟亦何補唐德宗豈不知書然所行不至陸贄論諫諄復不已者正欲德宗知而行之如魏證於太宗則語言不甚諄復且德宗禍亂此何時也而與陸贄論事皆是使中人傳㫖且事有是非當靣反覆詰難猶恐未盡投機之㑹間不容髮中人𫝊㫖差了多少事朕每事以太宗為法以德宗為戒三月丙戌淮東總所具到鎮江戶部大軍庫見錢㑹子等六十七萬一千九百一十五貫有竒揚州通判㕔二萬六千八百四十四貫有竒楚州大軍庫九千三百二十一貫有竒計錢七十萬八千八十貫有竒又鎮江務場十二年十二月終見在錢三十四萬四千二百四十貫有竒通計九十五萬二千三百二十貫有竒詔令於鎮江府大軍庫見在㑹子內依去年例取撥一十萬貫赴封樁庫送納淮西總所具到池州大軍庫見錢㑹子五十萬四千五十五貫有竒詔令於池州酒息㑹子內取撥二萬貫就本州認數樁管湖廣總所具到襄陽府大軍庫二十一萬九千九百二十一貫有竒詔於內取撥㑹子一萬貫就本府認數樁管非朝㫖不得擅行支使辛卯詔福建運判王師愈職事修舉除直祕閣再任夏四月庚戌讀陸贄奏議論度支折稅市草事狀蕭燧言自古聚斂之臣務為欺誕以衒己能未有不先紛更制度者上曰天下本無事庸人自擾之耳讀贄所論裴延齡書燧言君子未嘗不欲去小人然常為小人所勝如蕭望之為恭顯所勝張九齡為李林甫所勝裴度為皇甫鎛所勝上曰皇甫鎛亦延齡之徒也是月詔沒官田産合拘收租課入常平違者科罪五月己卯蕭燧奏讀陸贄奏議聖語上曰朕每見贄論德宗事未嘗不寒心正恐未免有德宗之失卿等可條具來上又曰德宗強明不肯推誠待下雖更奉天離亂終不悔悟此所以知其不振也上又曰德宗不明不能壓服臣下故當時藩鎮敢爾妄作是月以進讀陸贄奏議終篇賜侍讀蕭燧等御筵及金器鞍馬上表稱謝各進謝恩詩六月己未臣僚言臨安守臣將本府胥吏除合存留外罷逐一百五十餘人更有不曾根括不得姓名人盡行汰革亦幾二百餘輩臨安在輦轂之下而吏輩額外增置私自存留如此其衆况四方郡邑之廣胥徒之冗何可勝計乞令提舉將州縣人吏照應紹興二十六年指揮存留正額外其餘盡行罷逐其合存留之人不係過犯不經斷勒方許存役從之秋七月己卯知廣州潘知言奏本州置局折賣鹽包係淳熙元年創置六年內方始計口給厯付民戶照不測㸃厯比較責罰其實鹽包之價比之鹽鈔減三分之一公私各便但給厯鈎考近於均敷欲拘回元厯頭買多或少聽從民便從之是月令諸路州縣並以見錢㑹子中半交收上因言聞此間軍民不要見錢却要會子朕聞之甚喜但㑹子不可更增見在之數閏七月己酉令淮浙提鹽約束逐州主管官遇亭戶納鹽在官須管即時稱下支還本錢不得縱容官吏掊克如㕔用以待鹽官饋遺宴集之用花帶以待鹽官秩滿裹糧之用等錢及上戶兜請折除等事並嚴覺察按劾仍許亭戶越訴是月雨雹八月乙亥朔日月五星聚軫庚辰宰臣謝賜上諭梁克家等否泰陰陽之理冬夏二至之候陽生於子冬至夜半子時導迎陽氣人須是清心窒欲又論復卦王淮等奏人之一身與天地相為流通上曰人身一日便是天地一歲只是一身小天地大辛巳詔集英殿撰知隆興府程叔達久任閫寄治行有聞除敷文待制再任宰臣言叔達再任一年有半上以易地不如因任辛卯朱弦奏乞約束州縣不得擅將苖稅折納價錢王淮奏莫更申嚴上曰不須得事貴簡而嚴若繁徒為文具己亥進呈約束諸路納義倉米上曰亦不須得若有違戾自當行遣今後更不降指揮九月庚午進呈戶部勘當到江西安撫等乞將上供米折納價錢上曰誰為此說食與貨自不同本是納米今教納錢不可辛未知靜江府詹儀之言知宜州王侃盡心邊備蠻徭知畏乞優加旌别仍令再任詔王侃特轉一官減三年磨勘令再任壬申翰林學士兼修國史洪邁奏竊以靖康之難諸王皆留京師唯太上皇帝持節河北用能光啓中興符一馬化龍之兆近者忽得欽宗遺翰石刻一紙於故相何㮚家蓋靖康元年閏十一月敵騎攻都城中外不可復通太上奉使至磁州而有王雲之變中夕還相州迤邐東如濟鄆當是時㮚為開封尹首建元帥之議及在相位遂擬進蠟書之文其語云訪知州郡糾合軍民共欲起義此皆祖宗百年涵養忠孝之俗天地神示所當佑助檄到日康王可充兵馬大元帥陳亨伯充兵馬元帥宗澤注伯彥充副元帥同力協謀以濟大功欽宗批云依奏施行又批云康王指揮已黃帛書訖又批云康王指揮已付卿係黃帛書必已到蓋閏月十三日所行也欲乞行下何㮚家取索布之史館以彰示萬世為炎德復輝之符詔從之是月詔求遺書詔裁省百官冗食冬十月甲戌朔是月仁和知縣趙德明坐贓汙不法免真决刺面配信州其元舉主葉翥齊慶胄郭棣各貶秩三等十一月辛亥進呈陳居仁劄子乞略細務上曰說得甚好今之要務不過擇人才正紀綱明賞罰更賴卿等留意却不須多降指揮徒見繁碎甲寅進呈司農寺已分委西倉糴事上曰此等文字便可自劄下凡指揮須教人信而畏若是玩瀆何補於事當取其大者要者留意至於小事姑從闊略如除授監司太守卿等須當反覆留意上又曰少降指揮不唯事簡又且人信所謂一舉而兩得之庚午臣僚言切見舍人祇候見以二十八貟為額今先次供職及待闕者又二十三人猥併為甚今又有㫖吳松年除閣門祗候今額外供職欲望將上件指揮特賜追寢自今或攀援僥幸者一皆杜絶蓋清其源所以重其選詔從之辛未進呈敕令所審定裁減吏額上曰革弊以漸見其人且依舊存留只是將來不作額最為良法不至咈人情今後經審定訖逐旋進呈是月四朝國史成至是進呈列傳及仁宗玉牒三祖第六世下宗藩慶系録今上㑹要梁克家罷相與在京宮觀兼侍讀十二月辛巳臣僚言汀州科鹽之害詔令漕臣趙彥操王師愈同提舉應孟明措置聞奏彥操等尋奏汀州六邑長汀清流寧化則食福鹽上杭連城武平則食漳鹽亦各從其俗耳夫食鹽者既異則鈔法難於通行今欲將舊缺鹽錢盡與蠲放及減鹽價其所蠲舊缺與所減鹽價本司却多方措置那兊應補其數如此則州縣之力即日可紓立價既平買鹽者衆私販遂息官賣益行價雖裁減用無所虧是汀州與六邑歲減於民者三萬九千緡有竒減於官者一萬緡有竒所補州用與所放舊缺又在此外加以利源不壅財力自豐救弊之本無以尚此並從之是月利州路饑命賑之丁未淳熙十四年春正月丙午進呈真州運司乞展限收換銅錢上曰人相玩習全不成號令王淮等奏且教帥漕司措置如何上曰頻降指揮人却不信今且教措置亦好又進呈陳公亮乞約束綱運之弊上曰只是揀一兩處行遣便得上賢不待賞罰自勤勉自知奉法至於中人無賞罰不得但天下大抵皆中人指揮雖多無補只是賞罰下愚之人雖賞不知所勸罰不知所懼然賞罰豈可廢癸丑詔長寧軍淯井監鹽許通入濾州樂共城博望寨梅嶺板橋政和堡等五處地分販賣以臣僚言長寧歲計獨抑鹽井下制置司措置而有是詔二月庚辰福帥賈選言福州瀕海諸塞皆係海道要害今巡檢乃有以蔭官及雜流出身或素不知兵或年已垂老緩急不可倚仗乞今後應㳂海巡檢須武舉或軍功出身年未五十諳曉兵機行陳之人方許注差送吏部看詳勘㑹欲先選曾經海道捕賊立功諸㑹船水人次注武舉出身人如無即依見行法差注止不注流外出身之人從之是月以樞密使周必大為右丞相以參知政事施師㸃知樞密院事三月己未進呈兵部申李明等該慶典轉資上曰指揮使轉都虞候即止與轉行無害惟忠佐轉過即奏豫下班祗應不可放行庚申中書舍人陳居仁言祖宗加意斯民見於役法尤為詳備其後臣僚州郡申明衝改寖失法意乞下敕令所取祖宗免役舊法并於戶部取括紹興十七年以後續指揮本所官公共精加稽考其有與舊法抵牾有即行刪去修為一書名曰役法撮要候成鏤板頒之天下詔從之丁卯權知臨江軍孫好修奏進士歐陽希文妻廖氏死節建炎紹興間冦起建昌號白氊笠剽掠城邑廖氏與夫共挾姑趨山避之行至田中為賊所圍欲遂執廖氏廖氏正色罵賊曰爾等凶徒欲脅從我我决不能受辱厲聲罵賊不絶口賊知不能屈即揮刀斫墮其兩耳及臂腕骨皆解詔令臨江軍將廖氏墳墓量加封護仍宣付史館是月親試舉人賜王容以下及第出身有差夏四月戊寅宰臣王淮等奏平江闕守臣上曰卿等商量須得資望稍髙者為之淮等奏張礿上曰礿在鎮江恰好又奏張子顔上曰亦不須得在彼猶在此也壬午進呈趙伯韺乞添差軍中屬官差遣上曰軍中豈可添差虛費請給占破人從當時不合開端遂使源源陳乞不已可降指揮除見任添差人許滿今任日後更不差人五月丁卯進呈郭杲申被獲逃走軍兵滿及三年乞放全分請受上曰軍兵逃走首身為知改過自新所以二年放行全分請受如逃走捉獲上禁軍依法當斬豈得三年放行全分有妨軍政所乞難行六月己卯進呈兩浙運司狀稱取㑹諸州得雨分數即便具奏上曰教排日申恐有旱去處朕不知也辛巳王淮等奏禱雨未應上曰朕欲親詣太一宮燒香次至明慶淮等奏當此盛暑懼勞聖躬上曰朕為百姓不憚出一日亦欲小民知朕此意癸未王淮等進呈馬大同具析到臧否遲滯因依上曰欲行賞罰須是詔江西提刑馬大同降一官甲申車駕詣太一宮祈雨燒香次詣明慶寺是日降御札付福建帥臣賈選等曰比日行都愆雨將幾月矣驕陽若此旱勢必廣永念遐逺朕心如焚今專遣人降香前去仰本路帥臣可於寺觀靈跡去處誠潔親往祈求至於築壇之法亦可遵用仍行下所屬州軍務獲感應以寬顧憂是月修炎帝陵陵在衡州茶陵縣從衡州之請也秋七月丙午詔政事不修旱暵為虐可令侍從臺諫兩省卿監郎官館職疏陳闕失及當今急務毋有所隱己酉詔夏秋之交旱暵為虐深慮州縣弊事民間疾苦壅於上聞致干和氣可令諸路監司各限半月條具聞奏癸丑進呈應詔封事上曰所付下封事可令檢正都司逐一看詳有合施行事件開具申尚書省亦庶幾求言不為虛文是日進呈何淡封事說及省吏改易都司簽擬文字上曰是如此否卿等可自以意問之前後所改易者何事亦欲官吏各有所警戊辰進呈監司具到州縣弊事詔付給舍看詳是月賑台處紹興府等州旱災八月辛未謝雨上問歌雲漢之詩如何王淮奏如法丁丑令應巡檢下土兵不許差充撓送王淮等奏石萬等所造厯與淳熙戊申厯差兩朔又淳熙厯十一月下弦在二十四日恐厯法有差上曰朔豈可差朔差則所失多矣可令禮部太常寺祕書省參定以聞十二月己卯同知趙雄奏昨日大閲器甲鮮明紀律嚴整十萬之衆一一少壯上曰前此虞允文行揀汰之法其初謗議紛然今諸軍皆無老弱乃見成效雄奏凡造事之初衆口難唯聖明不惑乃能集事乙酉制司言䕫路大寧監四分鹽遞年科在恭涪等八州委是擾民已據運司措置止就䕫州以時變賣誠為利便所有虧錢除以金銀髙價對折及運司抱認外餘錢引一萬五千道已據總所將淳熙十一年十二年十三年分並行抱認乞行下總所將淳熙十四年以後年分所虧依已前三年體例永逺抱認庶幾八州得免科抑從之是歲詔諸路提舉截自今後拘到沒官田産置籍估賣其價錢拘收取㫖戊申淳熙十五年春正月戊戌開議事堂以內東門司改充命皇太子隔日與宰執公裳繫鞋相見議事如有差擢在內館職在外部刺史以上乃以聞甲辰進呈除諫官典故先是上出林栗劄子諫諍之官尚有闕貟居其官者往往分行御史之事至於針規闕失寂無聞焉乞親擢端方質直言行相副堪充補闕拾遺者召見而命之以遺補為名不任糾劾之職上曰朕每欲增置諫貟但以言官多任意論人向者初除臺諫人已預知必論其人既而果然若諫官止於規朕過舉朝廷闕政誠合古人設官之意卿等更且考求前代興置本末以聞至是王淮等具到唐六典所載與本朝舊制進呈上曰朕樂聞闕失若諫官專是規正人主不事抨彈雖增十貟亦可卿等便擬指揮來既而詔復置左右補闕拾遺光宗即位罷之江西運判宋若水言照得本路旱傷江州興國軍為重乞將第四等五等人戶淳熙十二年十三年以前拖缺苖稅并第五等淳熙十四年見缺夏稅錢帛權與倚閣候將來豐熟遂旋帶納及將江州興國軍隆興府吉贛州臨江建昌南安軍撫州安樂縣未解本司十一年十二年錢共四萬六千七百一十餘貫米三千六百餘石並與免解從之乙巳上諭宰臣曰皇太子參决未久已自諳知外方物情自今每遇朝殿令皇太子侍立臣留正等曰昔堯以天下與舜必先厯試諸艱至舜之命禹亦必丁寧而告戒之蓋神器之重庶務之繁非可以嘗試為之也壽皇承高宗之付託臨御二十八年一旦有倦勤之意將舉而授之聖子乃先開議事堂俾之參决其望之重愛之深矣雖曰聖子生知之性不待學而能至是聞見益廣情僞畢分曽未旬日壽皇已有諳知外方物情之喜日久習慣豈曰小補之哉然則今日施設之美治功之盛皆得於家法之傳其視舜禹尤有光焉於是太常少卿兼左諭德尤袤獻言於太子曰大權所在天下之所爭趨甚可懼也願殿下事無大小一取上㫖而後行情無厚薄一付衆議而後定又曰利害之端常伏於思慮之所不到疑間之萌常開於隄防之所不及儲副之位止於侍膳問安不交外事撫軍監國自漢至今多出權宜事權不一動有觸礙乞俟祔廟之後便行懇辭以彰殿下之令德尋以胡晋臣兼諭德鄭僑兼侍讀罷㸃兼侍講進呈戶部申㑹慶節諸州軍合有進奏上諭皇太子曰朕與免二年如何王淮奏此一項錢物幾及十六萬緡係屬戶部歲計上曰可用封樁庫錢撥還戶部自十七年為始依格進奉如諸路循例科斂充他用委御史臺覺察彈奏辛亥樞密院奏事因論及方有開措置屯田上宣諭施師㸃等謂二十餘年不用兵一旦使之屯田不知樂從否師㸃等奏軍兵久佚初令服田必以為勞才過一二年人得其利安得不樂上曰如此必須樂從卿等更可詢訪師㸃奏屯田本意非止積穀蓋欲諸軍布在邊鄙緩急有以為用上曰此乃寓兵於農之意辛酉進呈醫官劉確降官文字上曰劉確為供進太上皇帝醫藥不謹此非他比可於遙郡上降兩官不許叙復上諭皇太子曰祖宗朝醫官無除遙郡者不可不知二月丁丑禮部郎鄭僑言淮東鹽場人戶各有官給煎柴地不許耕種年歲既久亭戶私自開墾自淳熙四年以來按其所耕之地履畝而稅之十取其五名曰子斗價錢悉歸公庫歲約可得二萬緡緣此亭戶肆意開耕遂致柴薪減少妨廢鹽業臣昨任提舉日嘗罷收子斗價錢禁約亭民將已耕過地不得布種今已纍年慮禁戢不謹此弊復興乞令監司覺察從之庚辰樞密院進呈趙汝愚李大正奏黎州買馬乞照舊法不拘尺寸上曰所引舊法是紹興間舊法或京師舊法黃洽等奏係是祖宗時舊法上曰祖宗時有西北馬可用黎馬止是羈縻今則黎馬分作戰馬如何不要及格尺所乞難行三月辛酉樞密院言臣僚奏紹興初吳玠楊政畫蜀漢之地以守自散關以西付之玠梁洋付之政蜀中諸邊散關為重願與二三大臣講求向來蜀中守邊舊迹奉㫖令制置司同都統司照應前後所降指揮公共相度經久利便聞奏據興元都統制彭杲申大散關一帶邊面係鳳州地界隸屬西路安撫所管淳熙二年間得㫖鳳州係興元管認見今每年兩司差撥官兵守把切詳大散關一帶邊面係對境衝要來路最為重害兼緣鳳州郡事見係文官即與屯守之兵各無統臨亦非本司號令所及緩急之際議論不合或有乖違即誤國事乞依已降指揮將本州知州令本司選擇奏辟彈壓戍兵措置邊面詔彭杲於統制官精選公慮諳練邊防民政之人具名聞奏其鳳州緩急應援一節仰照應所奏施行是月葬髙宗於永思陵四川制置司奏陜西秦川百姓聞髙宗之喪皆戴白巾夏四月丙戌祔髙宗以呂頤浩趙鼎韓世忠張俊配饗廟庭詔曰朕昨降指揮欲縗絰三年羣臣屢請御殿易服故以布素視事內殿雖有俟過祔廟勉從所請之詔然稽諸禮典心實未安行之終制乃為近古宜體至意勿復有請於是大臣乃不敢言蓋三年之制斷自上心舉千載廢墜之典不為浮議所搖廟號曰孝不亦宜乎是時執政近臣皆主易月之議諫官謝諤禮官尤袤知其非而不敢爭惟勑令所刪定官沈清臣嘗上書贊上之决且言將來祔廟畢日乞預降御筆截然示以終喪之志杜絶朝臣方來章勿令再有奏請力全聖孝以示百官以刑四海上頗納用臣留正曰三年之喪天下之通喪也漢文始變古道景帝不師典禮後世遵之喪紀遂廢晋武欲申私慕竟奪於裴秀𫝊𤣥之說元魏孝文能依古制猶未盡合於亮陰遏密之禮其餘無足議也然漢文之制輕重三等漢人用之三十六日而釋服魏晋以來未踰月而葬既葬而除隨宜增損初無定說以日易月之論發於應劭陋儒習之其後遂斷為二十七日之制先王之禮既已大壞比之漢制亦非舊章雖有明智之君賢哲之輔憚於更張因循相襲良可嘆已壽皇慕親之孝根於天性事亡之敬發於至誠雖聖躬以不毁之年羣臣屢致易服之請而睿志先定斷然不疑山陵己事退奉几筵縗絰三年以終喪制千載以來一人而已於戲聖哉五月丙申朔進呈司謙之差遣上曰司謙之恐是初官如此則不要放行上顧太子曰切不可啓此僥幸之門太子奏僥幸之門啓之則便有攀援源源而來誠不可啓戊申左司郎中王正已奏臣輒以己見採托事實撰成皇帝聖德孝感記仰惟髙宗聖神武文憲孝皇帝誕受天命紹開中興因時制宜繼好息民海內安靜功成不居傳授聖子陛下繼志述事盛德日新以天下飬者二十有六年洎駕雲太清陛下哀慕罔極正厯代之失復三年之制羣臣懇祈莫回聖意固已冠絶今古乃三月甲寅靈駕發引先是數日雲陰四垂時雨間作濘淖沒足行者病之壬子晦冥益甚癸丑之夕載陰載陽四鼓既作天宇澄霽望舒開明星宿清潤乾坤端倪呈露無隱遣奠禮成龍輴不濡大輿安行仗衛儀物肅陳嚴辦舒舒而前行列整暇登舟濟江潮波不驚祥風瑞烟以助安濟波神川后髣佛畢出駿奔翊衛咸效厥職施師奏功如履平陸洎至陵所人不告勞自時厥後凡大典禮曰𤾉而𤾉巧相附會臣工執事進趨恭肅登降唯謹略無沾服失容之患億兆臣民踴躍贊嘆稱未曾有𫝊之裔夷畏仰歸命臣竊聞之莫之為而為者天也夫風雨晦明豈係人謀所能力致凡陛下志之所向無不景從所謂先天而天弗違者得非陛下聖孝上通神明感格之明效歟臣濫與朝列親逢盛旦雖不學無文亦知所以歸美之報而繪畫天地模寫日月無益於廣大髙明審矣然區區之忠自不能已臣不勝至願願降睿㫖宣付史館以昭示無極謹拜手稽首托其實而為之記詔從之戊午浙西提舉石起宗言秀州海鹽縣蘆瀝場催煎官蔡􅀈裒斂亭戶不能舉職乞與嶽廟上曰此不可與嶽廟須是放罷仍令吏部契勘蔡􅀈得差遣年月日侍郎為誰吏部供到係賈選上曰選已罷去姑已之此後吏部如銓量巡尉等當知所警庚申殿侍冷世光言縣令親民之選昨吏部措置被按廢放罷之人滿半年方許參部不許注繁難大縣止注小縣小縣之民何罪焉乞令吏部遵守淳熙五年指揮凡經彈劾之人且與祠祿知縣曾經放罷半年後亦且與嶽廟兩次作縣兩經罷黜者不得再注親民差遣詔吏部將見行條法并節次指揮看詳措置是月王淮罷相從所請也判衢州尋奉祠時敕令所刪定官沈清臣因對為上言陛下臨御以來非不論相也始也取之故老重臣既而取之潛藩舊傅或取之詞臣翰墨或取之時望名流或取之刑法能吏或取之刀筆計臣或取之雅重詭異或取之行實自將或取之跅􅕟誕慢或取之謹畏柔懦或取之狡猾俗吏或取之勾稽小材始也取之奸豪譎詐枵然空鄙之夫而卒也任之隨順柔懦委靡無自立之志既取之又任之又從而體貌之未嘗不注意也然皆非相也間有度量沉靜而經畫甚淺心存社稷而材術似踈表裏忠讜而規制良狹其他則以空踈敗以鄙猥敗以欺誕敗以奸險敗以浮夸敗以貪墨敗以詭詐敗以委靡敗若此者豈所謂相哉甚至於誤國有大可罪者海泗國家之故地也私主和議無故而棄之夷虜騎兵天子之宿衛也不能進取無故而移之金陵汲引狂誕浮薄之流以充塞正塗擅開佞幸權嬖之門以自固髙位而今也循習前轍寖成欺弊國有變故略無建明事有緩急曾不知任然則焉用彼相哉禮部言國學進士石萬并楊忠輔指淳熙十五年太史局所造厯日差忒事得㫖令參定以聞今據石萬等造成厯與見行厯法不同乞以其年六月二日十月晦日月不應見而見為驗及指陳淳熙厯下弦不合在十一月二十四日及差五六月滅日日辰詔尤袤宋之端監視測驗先是詔減省百司冗食至是共裁減七百三十五人從吳澳之奏也六月戊辰進呈給事中鄭僑奏為王良輔免呈試仰惟陛下創法立制釐然當於人心可萬世通行而無弊者文臣出官銓試武臣出官呈試是也厯歲以來有司謹守奉行偶緣淳熙十一年有進義副尉何大亨者以蔭補出官自陳元係效用人乞免呈試參部遂蒙特㫖與免此弊一開遞相攀援遂使一時特㫖直作永例在法免呈試者惟江海戰船立功補官之人及諸軍揀汰離軍之人則法許免呈試即未嘗有初投效用後因蔭補出官與免試參部之法也若曰彼嘗從軍何必呈試此則法之所在又不容以幸免也使彼果精於武藝則呈試之頃又何畏而求免乎今若聽其展轉相承用例廢法則他徼幸之徒必有竄名冒籍於軍伍之中以為免試張本者臣望申嚴此法自王良輔始將特免試指揮更不施行仍詔有司恪守成法上問從軍人如何出官免得呈試周必大等奏舊法呈試中方得出官淳煕十年放行曽經從軍免試一兩人遂以為例上曰鄭僑繳章說既曾從軍自合習熟武藝何憚呈試如赴呈試不得前此從軍所習何事此說甚當可依舊法施行壬辰報謝使回程先數日前上宣諭京鏜昨在京師堅執不肯聽樂住了十日此一節可嘉尋常人多說節義須遇事方見至是進擬使副轉官上曰京鏜專對可嘉當轉兩官劉端仁亦比與周必大等奏不必問轉官在聖意除擢可也上曰只依例轉官便從除擢上又曰此事類是京鏜若劉端仁所謂因人成事者京鏜則毛遂也京鏜便除侍全劉端仁亦當稍旌别可令樞密院進擬除環衛官於是詔京鏜除權工部侍郎是月雨雹朱熹被召入奏首言近年以來刑法不當輕重失宜甚至係於人倫風化之重者有司議刑亦從流宥之法則天理民彛幾何不至於泯滅又言提刑司管催經稅制錢起於宣和末年倉卒用兵權宜惜畫自後立為比較之說甚至灾傷檢放倚閣錢米已無所入而經總制錢獨不豁除州縣之煎熬何日而少紆斯民之愁嘆何時而少息又言江西科罰之弊末言陛下即位二十有七年而因循荏苒無尺寸之效可以仰酬聖志嘗反覆而思之無乃燕閒濩蠖之中虛明應物之地天理有未純人欲有未盡天理未純是以為善未能充其量人欲未盡是以除惡不能去其根一念之頃公私邪正朋分角立交戰於其中故體貌大臣非不厚而便嬖側媚得以深被腹心之寄寤寐英豪非不切而柔邪庸繆得以久竊廊廟之權非不樂聞公議正論而有時不容非不欲堲讒說殄行而未免誤聽非不欲報復陵廟讎恥而不免畏怯茍安非不欲愛飬生靈財力而未免嘆息愁怨凡若此類不一而足願陛下自今以往一念之頃則必謹而察之此為天理邪為人欲邪果天理也則敬以充之而不使其少有壅遏果人欲也則敬以克之而不使其少有凝滯推而至於言語動作之間用人處事之際無不以是裁之則聖心洞然中外融徹無一毫之私欲得以介乎其間而天下之事將惟陛下之所欲為無不如志矣翌日除兵部郎官熹方以足疾辭未供職本部侍郎林栗前數與熹論易西銘不合至是遣部吏抱印迫以供職熹以疾作在告遂疏熹欺慢即有祠命太常博士葉適上疏辨之略曰考栗之辭始未參驗無一實者至於其中謂之道學一語則無實最甚蓋自昔小人殘害良善率有指名或以為好名或以為立異或以為植黨近又創為道學之目鄭丙唱之陳賈和之居要路者密相付投見士大夫有稍務潔修粗能操守輒以道學之名歸之殆如喫菜事魔景迹犯敗之類往日王淮表裏臺諫陰廢正人蓋用此術或云適此疏不果上於是胡晋臣劾栗罷之賑臨安飢秋七月癸丑上出戒諭閻仲御札一紙宣示皇太子與黃洽等令閻仲留意軍務毋事交結以邀時譽之意洽等奏陛下於諸將或長或短無有不知上曰諸將長短朕皆備知因其受病處針之使知警懼耳是月賑諸州水灾八月甲子朔日有食之是月湖北運判孫紹逺朝辭上曰祖宗時廣西鹽如何對曰係官賣上曰若廣西客鈔可行祖宗已行了紹逺又奏鈔法蠧國害民上曰所聞不一因卿言而得其實九月辛丑大饗明堂先是輔臣進呈禮官申請明堂畫一上曰配位如何周必大言禮官昨已申請髙宗几筵未除用徽宗故事未應配坐且當以太祖太宗並配他日髙宗几筵既除自當别議大抵前後儒者多因孝經嚴父之說便謂宗祀專以考配殊不知周公雖攝政而主祭則成王自周公言之故曰嚴父耳晋紀瞻答秀才䇿曰周制明堂宗其祖以配上帝故漢武帝汶上明堂捨文景而逺取髙祖為配此其證也留正言嚴父莫大於配天則周公其人也是嚴父專指周公而言若成王則其祖也上曰有紹興間典故在可以參照無疑庚申上宣諭皇太子曰當今禮文之事已自詳備不待講論唯是財賦未甚從容朕每思之須是省却江州或池州一軍則財賦稍寬若議省軍則住招三年人數便少却將餘人併歸建康事亦有漸當今天下財賦以十分為率八分以上飬兵不可不知黃洽等奏許浦水軍統制胡世安近到都下備言許浦一軍本在明州定海後因移駐許浦是時港道水深可以泊船後來潮沙淤塞遂移戰船泊在顧徑人船相去近二百里遇有緩急如何相就合依舊移歸定海上曰說得極是定海南北之衝下瞰山東此用舟師之便當時自是不合移屯卿等更且熟議是月録中興節義後用吏部尚書顔師魯之言也於是引赦書放行中興初節義顯著之家合得恩數令吏部開具奏聞冬十月丙寅知湖州趙恩言湖州實瀕太湖有隄為之限制且列二十七浦縷引導湖水以溉民田因各建斗門以為蓄泄之所視旱潦為之啓閉去歲之旱髙下之田俱失霑溉委官訪求遺迹開濬浦縷不數日間湖水通徹逺近獲利而於斗門因加整葺乞詔守臣逐歲差官親詣湖隄相視開濬浦縷補治斗門庶幾永久從之己巳廣西提刑趙伯蕩奏本路鈔法五弊且曰曩者建議之臣以官般官賣科敷百姓害及一路於是改行鈔法上以足國下以裕民莫不以為便今六年矣諸郡煎熬益甚民旅困於科抑名曰足國實未嘗足名曰裕民實未嘗裕所最可慮者緣邊及近裏州軍兵額耗減已極更不招填所在城壁頽圯無力修築卒有緩急何所倚恃臣嘗遍詢吏民向者官般官賣之時廣西諸郡誠有科敷百姓去處然不過産鹽地分所謂髙化欽亷雷五州是也海鄉鹽賤不肯買故有科抑如靜江鬱林冝融栁象昭賀梧藤雍容橫貴潯濵近裏一十六州去鹽場逺若非官賣無從得鹽舊時逐州秪是置鋪出賣民間食用樂然就買不待科抑自改行鈔法以來近裏一十六州徒損於官無補於民民食貴鹽又遭科鹽鈔之苦㳂海五州雖名賣鈔其舊賣二分食鹽元不曾禁戢計戶計口科擾如故切謂今日之法正當講究㳂海五州利病杜絶科敷不得變近裏一十六州官般官賣之法詔令應孟明朱晞顔同林岊相度條具聞奏戊子臣僚奏祖宗之時士尚恬退張師德兩詣宰相之門返遭讒議豈若今日紛至沓來臺諫之門猥雜尤甚終日酬對亦且厭苦而無說以拒其來臣願明詔在廷止遏奔競其有數事干謁者宰執從而抑之臺諫從而糾之至於私第謁見之禮一切削去果有職事非時自許相見庶幾在上者可以愛惜日力不為賔客之所困在下者可以恪恭職業不為人事之所牽詔從之己丑司農寺言臣僚劄子切見豐儲倉初為額一百五十萬石不為不多然積之既久寧免朽腐異時緩急必失指擬乞下戶部司農寺相度以每年諸州合解納行在米數若干及諸處坐倉收糴數若干預行㑹計以俟對兊不盡之數如常平法許其於陳新未接之時擇其積之久者盡數出糶俟秋成日盡數補糴則是五十萬石之額永無銷耗此亦廣儲蓄之䇿也從之是月置煥章閣藏髙宗御集中書舍人鄭僑充賀正旦使閣門張時修副之以歲暮抵燕時敵主病已篤傳㫖令就東上閣門進書僑與時修力爭以為東上閣門者乃臣僚進獻表章之地本朝皇帝國書豈當於此投進往復爭辨至漏下十數刻乃令且就館相持至元日晚忽傳其主之命以使人欲面進書今已過期可遣還明日敵主告殂使還未至光宗皇帝已受禪僑遷給事中見上再三稱奬以為不辱君命他日侍從官見北宮壽皇顧僑曰卿守節不屈舉措得宜朕甚嘉之十一月丙申宰執進呈文字間上謂皇太子曰恩數不可泛濫將來皇太后慶八十與朕慶七十相近若是恩例太泛添多少官如皇太后慶壽只得推恩本殿官屬方是甲辰進呈臣僚奏近者百執事輪對辭見連章纍劄猥及細微欲自今凡有輪對及辭見並不許過三劄若軍國利害事大體重者不拘於此上曰輪對官說此甚當上殿官多是論事不務大體以至瑣屑或事有成憲者一一奏陳以多為能無益於事自今只用三劄壬子進呈楊偉上書言廣西州郡役使土丁之弊上曰既是屢有約束不得差使土丁何用申嚴便可取問違戾去處上謂皇太子曰後次有如此等事便須直行不必再三申嚴徒為文具十二月先是朱熹以奉祠去至是再召熹再辭遂併具封事投匭以進其略曰今天下大勢如人有重病內自腹心外達四肢無一毛一髮不受病者臣不暇言且以天下之大本與今日之急務為陛下言之蓋大本者陛下之心急務則輔翼太子選任大臣振舉綱維變化風俗愛飬民力修明軍政六者是也古先聖王兢兢業業持守此心雖在紛華波蕩之中幽獨得肆之地而所以精之一之克之復之如對神明如臨淵谷猶恐隱微之間或有差失而不自知是以建師保之官列諫諍之職凡飲食酒漿衣服次舍器用財賄與夫宦官宮妾之政無一不領於冡宰使其左右前後一動一靜無不制以有司之法而無􅊏芥之隙瞬息之頃得以隱其毫髮之私陛下之所以精一克復而持守其心果有如此之功乎所以修身齊家而正其左右果有如此之效乎宮省事禁臣固不得而知至於左右便嬖之私恩遇過當往者淵覿說抃之流勢㷔熏灼傾動一時今已無可言矣獨有前日臣所開陳者雖蒙聖恩委曲開譬然臣之愚竊以為此輩但當使之守門傳命供掃除之役不當假借崇長使得逞邪媚作淫巧於內以蕩主心立門庭招權勢於外以纍聖政臣竊聞之道路自王抃既逐之後諸將差除多出此人之手陛下竭生靈膏血以奉軍旅而軍士顧乃未嘗得一溫飽是皆將帥巧為名色奪取衣糧肆行貨賂於近習以圖進用出入禁闥腹心之臣外交將帥共為欺蔽以至於此而陛下不悟反寵䁥之以是為我之私人至使宰相不得議其制置之得失給諫不得論其除授之是非則陛下之所以正其左右者未能及古之聖王明矣至於輔翼太子則自王十朋陳良翰之後宮僚之選號為得人而能稱其職者蓋已鮮矣而又時使邪佞儇薄闒冗庸妄之輩或得參錯於其間所謂講讀亦姑以應文備數而未聞其有針規之效至於從容朝夕陪侍遊燕者又不過使臣宦者數輩而已夫立太子而不置師傅賔客則無以發其隆師親友尊德樂義之心獨使春坊使臣得侍左右則無以防其戲嫚媟狎竒邪雜進之害宜討論前典置師傅賔客之官去春坊使臣而使詹事庶子各復其職至於選任大臣則以陛下之聰明豈不知天下之事必得剛明公正之人而後可任哉其所以常不得如此之人而反容鄙夫之竊位者直以一念之間未能徹其私邪之蔽而燕私之好便嬖之流不能盡由於法度若用剛明公正之人以為輔相則恐其有以妨吾之事害吾之人而不得肆是以選掄之際常先排擯此等置之度外而後取凡疲懦軟熟平日不敢直言正色之人而揣摩之又於其中得其至庸極陋决可保其不至於有所妨者然後舉而加之於位是以除書未出而物色先定姓名未顯而中外已逆知其决非天下之第一流矣至於振肅紀綱變化風俗則今日宮省之間禁密之地而天下不公之道不正之人顧乃得以窟穴盤據於其間而陛下目見耳聞無非不公不正之事則其所以薰蒸銷鑠使陛下好善之心不著疾惡之意不深其害已有不可勝言者矣及其作奸犯法則陛下又不能深割私愛而付諸外廷之議論以有司之法是以紀綱不能無所撓敗紀綱不振於上是以風俗頽敝於下蓋其為患之日久矣而浙中為尤甚大率習為軟美之態依阿之言以不分是非不辨曲直為得計甚者以珠玉為脯醢以契劵為詩文宰相可啖則啖宰相近習可通則通近習惟得之求無復亷恥一有剛毅正直守道循理之士出乎其間則羣議衆排指為道學而加以矯激之罪十數年來以此二字禁固天下之賢人君子復如崇觀之間所謂元祐學術者排擯詆辱必使無所容其身而後己嗚呼此豈治世之事而尚復忍言之哉至於愛飬民力修明軍政則自虞允文之為相也盡取版曹歲入窠名之可指擬者號為歲終羡餘之數而輸之內帑顧以其有名無實積纍掛缺空載簿籍不可催理者撥還版曹以為內帑之積將以備他日用兵進取不時之須宰相不得以式貢均節其出入版曹不得以簿書勾考其在亡曷嘗聞其能用此錢以易胡人之首如太祖皇帝之言哉徒使版曹闕乏日甚督趣日峻造為比較監司郡守殿最之法以誘脅之於是中外承風競為苛急此民力之所以重困也諸將之求進也必先掊克士卒以殖私財然後以此自結於陛下之私人而祈以姓名達於陛下之貴將貴將得其姓名即以付之軍中使自什伍以上節次保明稱其材武堪任將帥然後具奏揩為牘而言之陛下之前陛下但見其等級推先案牘具備則誠以為公薦而可以得人矣而豈知其論價輸錢已若晚唐之債帥矣夫將者三軍之司命而其選置之方乖剌如此則智勇材略之人孰能抑心下首於宦官宮妾之門而陛下之所得以為將帥者皆庸夫走卒而猶望其修明軍政激勸士卒以強國勢豈不誤哉凡此六事皆不可緩而本在於陛下之一心一心正則六事無不正一有人心私欲以介乎其間則雖欲憊精勞力以求正夫六事者亦將徒為文具而天下之事愈至於不可為矣疏入夜漏下七刻上已就寢亟起秉燭讀之明日除主管太乙宮兼崇政殿說書時上已有倦勤之意蓋將以為燕翼之謀熹嘗草奏疏言講學以正心修身以齊家逺便嬖以近忠直抑私恩以抗公道明義理以絶神奸擇師傅以輔皇儲精選任以明體統振紀綱以厲風俗節財用以固邦本修政事以攘夷狄凡十事欲以為新政之助㑹執政有指道學為邪氣者乃辭新命除祕閣修撰仍奉新祠遂不果上己酉淳熙十六年春正月壬辰朔以周必大留正為左右丞相王藺參知政事葛邲同知樞密院參知政事蕭燧兼權知樞密院未幾奉祠壬寅先是命廣西經略應孟明等究實鹽法利害至是孟明奏鹽鈔抑勒民戶流毒一方欲得復舊以解愁怨上曰初議行此事時先差胡庭直去商量非不詳密往往只是符同詹儀之之說今為所誤於是臣僚論列乞將儀之重賜竄責速行下俾聽從民便並依舊法施行勘㑹鹽法已别作施行詔儀之落職罷官送袁州居住運判朱晞顔尋奏今廣西鹽名曰客鈔元無客也自乾道間變法富商失業無復客商矣今鈔以客為名乃強稅戶之家使之承認至於破家而止尋又詔詹儀之罔上害民當行重罰責授安逺軍節度行軍司馬袁州安置辛亥上宣諭周必大等曰朕年來稍覺倦勤欲旬日間禪位於皇太子退就休飬以畢髙宗三年之制有合施行事卿等可一靣理㑹進呈蠲紹興府和買絹四萬匹之半二月辛酉朔日有食之蔡戡除尚書左司貟外郎制詞有曰朕仰惟壽皇厲精庶政三十有六年無一日怠乃壬午遜位辛卯猶自除吏爾其一也壬戌內降詔書略曰爰自宅憂以來勉親聽斷不得日奉先帝之几筵躬行聖母之定省皇太子仁孝聰哲久司匕鬯軍國之務厯試參决宜付大寶撫綏萬邦俾豫一人獲遂事親之心永膺天下之飬皇太子可即皇帝位朕稱太上皇移居重華宮文武百僚聽詔拜舞訖赴殿庭立班皇太子即皇帝位自內出至御榻側拱手立應奉官以次稱賀內侍固請皇太子就坐皇太子固辭內侍扶掖至於七八略就坐復興次宰臣率百僚稱賀皇帝即位禮畢三省樞密院官升殿奏事皇帝亦立聽之班退至尊壽皇聖帝車駕如重華宮臣留正等曰堯授舜舜授禹三聖人揖遜相承古今所謂盛德蔑加之事然夷考當時有厯試之命有枚卜之請有出好興戎之戒則其事殆亦有難焉者孰如今日聖父𫝊統聖子繼軌授受一堂光華三葉朝覲謳歌無所避而知歸禮樂法度有所襲而彌著倦勤非有迫於耄期之年釋負蓋欲盡夫事親之心無在昔之所難有後世之莫及全體具美昭施罔極皇乎懿哉噫堯舜禹三聖人授受之事孔子蓋聞而知之乃因刪書首叙典謨叙其事為已詳至魯論終篇記執中相命之語猶復拳拳而致意誠以盛德之事照耀萬世贊揚無盡自應不一書而足况臣等親見今日揖遜之盛故編彚之次所以拜手稽首三詠三歎而益不能自己也講義曰髙宗即位六年而育孝宗於宮中又三十年而以天下傳之孝宗孝宗即位十年而建光宗於東宮又十有八年而以天下傳之光宗其親相傳受無以異於堯授舜舜授禹之事嗚呼盛哉立妃李氏為皇后上至尊壽成帝后尊號皇帝曰至尊壽皇聖帝皇后曰壽成皇后大赦上壽聖皇太后尊號詔求言尋詔前宰執各言事下戒勵詔詔職事官日輪面對用紹興二年三十二年之制其後祕書郎兼權吏部郎官鄭湜因轉對首言三代以還本朝家法最正一曰事親二曰齊家三曰教子此家法之大經也自昔帝王雖有天下之富而不以天下飬其親惟髙宗享天下之飬壽皇躬天子之孝二十有七年人無間言此聖賢之所難也陛下率而行之當如壽皇然後無愧也本朝厯世以來未嘗有不賢之后蓋祖宗家法最嚴子孫持守最謹也后家待遇有節故無恩寵盈溢之過妃嬪進御有序故無忌嫉專恣之行宮禁不與外事故無斜封請謁之私此三者漢唐所不及也皇子岐嶷之性過人逺甚然講讀之官進見有時志意不通休沐之日或至多於講讀曾不若左右前後之人與王親狎朝夕無間一日暴之十日寒之未有能生之物也願陛下盡事親之道以全帝王之大孝嚴家法之義以正內治之紀綱明教子之方以壽萬世之基本又曰竊聞道路之言或謂宮中燕飲頻併費用倍加便嬖使令往往親眤中外章奏付出稽緩願陛下奮發乾剛一洗舊習省燕飲節用度親正人勤省覽三月皇子擴進封嘉王夏五月周必大罷相判潭州未幾奉祠秋八月戊子朔詔侍從各言時政得失九月詔今後省試定以二月一日引試冬十月詔大臣裁節冗費十一月詔遵祖宗成憲用何淡之請也應破例之事斷不可啓是歲金主雍死時僞大定之二十九年雍即褎也仁厚不用兵北人謂之小堯舜其太子允恭早卒立其孫璟明年改明昌元丙辰改承安辛酉改泰和泰和三年始以繼本朝定為土德蓋不數遼人也宋史全文卷二十七下
