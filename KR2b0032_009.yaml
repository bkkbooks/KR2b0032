body:
  text: 宋史全文卷九上宋仁宗五己丑皇祐元年春正月甲午朔日有食之辛丑命翰林學士趙槩權知貢舉庚戌太傅致仕鄧國公張士遜卒車駕臨奠翌日謂輔臣曰昨有言庚戌是朕本命不宜臨喪朕以師臣之舊故不避文彥博曰唐太宗辰日哭張公謹陛下過之逺矣二月丁卯彗出虛晨見東方西南指歷紫微至婁凡一百一十四日而沒詔自今月五日不御正殿其尚食所供常膳亦宜減省中外臣僚極言當世切務權三司使葉清臣乞令後轉運使副得替差兩制臣僚考校分上中下六等從之辛未知青州冨弼為禮部侍郎初河北大水流民入京東者不可勝數弼擇所部豐稔者五州勸民出粟得十五萬斛益以官廩隨所在貯之擇公私廬舍十餘萬區散處其人選老弱病者廩之及流民將復其業又各以逺近受糧凡活五十餘萬人募而為兵者又萬餘人講義曰救荒以政不若救荒以人一定州之政足以活數十萬之飢民一青州之䇿足以活五十萬之飢民先正諸公純於為民故適遇災變不啻猶己之飢溺矯詔開倉雖罪不恤出粟貸民家資不計遡其用心民瘼其有不瘳乎然此固先正愛民之心亦祖宗之世郡縣常有餘蓄所以易於用力而隨見其效也詔發京師禁軍十指揮赴京東西路駐泊以備盜賊户部副使包拯言臣聞京師者乃天下之本也王畿之內列營屯聚此強本之兵也而國家近年以來邊陲有警乃一例調發恐非固宗社制戎狄之長䇿今河北河東惟有民兵可用往年嘗籍之矣籍之未甚得䇿又從而釋之竊見唐李抱真民兵之制事頗相近故當時昭義一軍雄視山東可取抱真之制約而行之民兵既壯禁軍留實京師則內外安矣契丹與夏人相攻聚兵近塞遣使來告邊候稍警上御便殿訪羣臣以備禦之策權三司使葉清臣對曰詔問北使詣闕以西戎為名即有邀求何以答之臣聞誓書所載彼此無求况元昊叛邊纍年致討契丹豈有毫髮之助今彼國出師輒求我助姦盟違約不亦甚乎若使辨捷之人判其曲直契丹雖是蠻夷久漸禮義我直彼曲豈不憚服詔問輔翊之能方面之才與夫帥領偏裨當今孰可任此者臣以為不患無人患有人而不能用爾今輔翊之臣莫如富弼范仲淹夏竦鄭戩方面人才莫如韓琦田况劉渙孫沔至於帥領王德用范仲淹龎籍皆其選也狄青范全蔣偕張亢劉貽孫王德基此可補偏禆者也至若威禦綏寧即竦戩尤其所長詔問朔方災傷軍儲缺乏此則三司失計置轉運使不舉職且如施昌言方欲竭思慮辦職事一與賈昌朝違戾遂被移徙軍儲何由不乏自去秋八月計度市糴而昌朝執異訖今仲春而尚未豫奪財賦何緣得豐詔問戰馬乏絶何䇿可使足用臣前在三司嘗陳監牧之弊莫若賦馬於河北河東陜西京東西五路上户一馬中户二户一馬養馬者復其一丁如此則坐致戰馬二十萬不為難矣三月庚子御延和殿召輔臣觀新造渾儀木樣時命日官參用梁令瓉李淳風舊制改鑄渾儀也先是户部副使包拯答詔所問禦邊之䇿辛丑命拯往河北提舉計置糧草乙巳御崇政殿試禮部奏名進士丙午試諸科癸丑賜進士馮京等一百七十四人及第一百六人出身二百九人同出身于崇政殿甲寅賜諸科及第并出身五百五十人于觀文殿夏四月庚午命户部副使包拯與河北四路安撫司轉運司議省冗官及汰軍士之不任役者以聞五月丙午幸後苑寶岐殿觀刈麥顧謂輔臣曰朕新作此殿不欲植花卉而歲以種麥庶知穡事之不易也宰相龎籍言殿中丞館閣校勘范鎮有異才不汲汲於進取特遷直祕閣六月乙丑以太子右清道率府率叔韶賜進士及第尋加文州刺史叔韶嘗獻所著文召試學士院入優等特遷之入謝命坐賜茶謂曰宗子好學無幾爾獨以文章得進士第朕欲天下知屬籍有賢者宜勿忘所學賈昌朝為觀文殿大學士判都省觀文殿置大學士自此始仍詔自今非嘗為宰相毋得除秋七月翰林侍讀學士張錫嘗講書禁中上飛白書博學二字賜之因問治道錫對曰節嗜欲者治身之本審刑罰者治國之本時貴妃方寵幸故錫以此諷上改容曰卿言甚嘉朕恨用卿晚也八月壬戌平章事陳執中罷為兵部尚書知陳州先是河北民流災異數見執中無所建明但延接卜相術士言者屢攻之詔從其請平章事文彥博加昭文館大學士樞密使宋庠為平章事樞密使王貽永兼侍中參知政事龎籍為樞密使樞密副使髙若訥為參知政事翰林侍讀梁適為樞密副使甲申御崇政殿䇿試賢良方正能直言極諫殿中丞吳奎丙戌御崇政殿試武舉人得何景略等三十七人九月詔河東河北經略安撫使司契丹舉兵討夏入其邊要之地選委將佐嚴加備禦時司天言太陰犯畢宿主邊兵趙分有憂故也乙巳廣南西路轉運司言廣源州蠻寇雍州詔江南福建等路發兵備之廣源州在雍州西南雖號雍管西羇縻州其實服役於交趾初有儂全福者知儻猶州交趾舉兵虜全福其妻阿儂嫁商人生智髙生十二年殺其父商人冒姓儂據儻猶州建國曰大厯交趾復拔儻猶州執智髙釋其罪使知廣源州居四年遂襲據安德州僭稱南天國改元景瑞求內附未即得於是始入冦己未罷武舉冬十月侍御史知雜事何郯言臣伏見陜西以諸州新弓手刺面充保捷指揮其間甚有疲弱不堪征役之人伏望告諭應係新置保捷兵士年五十以上如不願在軍者許令自陳減放歸農十二月壬戌詔陜西保捷兵年五十以上及短弱不任役者聽歸農凡放歸者三萬五千餘人皆歡呼反其家自是歲省緡錢二百四十三萬陜西之民力稍蘇初樞密使龎籍與宰相文彥博建議省兵衆紛然陳其不可上亦疑焉彥博與籍共奏今公私困竭正由養兵太多爾萬一果聚為盜賊二臣請死之上意乃決於是簡汰陜西及河北河東京東西等路羸兵無慮八萬餘人其六萬有餘悉放歸農其二萬餘人各減衣糧之半户部副使包拯言景德祥符中文武官總九千七百八十五員今內外官屬較之先朝已逾一倍天下郡縣用吏不過五六千員今乃三倍其多而又三歲一開貢舉每放榜僅千人復有臺寺之小吏府監之雜工蔭序之官進納之輩總而計之又不止於三倍則國計民力安得不窘乏哉臣以謂冗兵耗于上冗吏耗于下欲救其弊當治其源治其源者在乎減冗雜而節用度方今山澤之利竭矣征賦之入盡矣望陛下上體祖宗之成憲下恤生靈之重困謂設官太多也則宜艱難選舉澄汰冗雜謂養兵太衆也則宜罷招募揀斥老弱土木之功不急者悉罷之費出無名者並除之懲禁中奢侈之端節上下浮枉之費願陛下留神省察庚寅皇祐二年春正月自慶厯八年河北行四説法鹽居其一而並邊芻粟皆虛估至數倍劵至京師反為富賈所抑鹽百八斤舊售錢十萬至是止六萬商人以賤估劵取鹽不復入錢京師帑藏益乏於是詔三司詳定王堯臣王守忠陳旭請復入錢京師法視舊入錢數稍增豫鹽而並邊入中先得劵受鹽者河東陜西入芻粟直錢十萬止給鹽直七萬河北又損為六萬三千且令入錢十萬於京師乃得兼給謂之對貼自是入錢京師稍復矣先是宋庠建議以今年當郊而日至在晦用建隆故事宜有所避因請季秋大享於明堂三月戊子朔詔罷今年冬至親祠南郊之禮以九月擇日有事於明堂上謂輔臣曰明堂者布政之宫天子路寢乃大慶殿是也况明道初合祀天地於此己丑詔以大慶殿為明堂戊戌詔羣臣毋得上尊號文彥博等伏奏至于三四上固拒之詔祠明堂宜盡物以遵典禮自乘輿服御諸物務令有司裁簡之詔兩浙流民男女不能自存者聽人收養後不得復取丙辰宋祁上明堂通議二篇祁自序略曰上薄三代旁搜漢唐禮之過者折之説之繆者正之以合開寶一王之典聊佐乙夜觀書之勤夏四月乙丑內出手詔祖宗以來三歲一親郊即遍祭天地而百神靡不從祀今祀明堂而禮官所定止祭昊天五帝不及地祗配坐不及祖宗未合三朝之制况比年水旱地震稼穡不登移郊為大享蓋亦為民祈福宜合祭皇地祇奉太祖太宗真宗並配而五帝神州亦親獻日月河海諸神悉如圜丘從祀因謂文彥博曰禮非天降地出緣人情爾禮官習拘儒之舊傳捨三朝之成法非朕所以昭孝息民也五月己酉內出明堂樂曲及二舞名文舞曰右文化俗武舞曰成功睿德六月己未內出御撰明堂樂八曲以君臣民事物配屬五音凡二十聲為一曲丁卯以御撰黃鍾五音五曲凡五十七聲下太常隸習之辛巳屯田員外郎呂公著同判吏部南曹公著夷簡之子也嘗召試館職不就於是上諭曰知卿有恬退之節因賜五品服秋七月戊子出御選明堂無射宫樂曲譜三皆五十七字五音一曲奉爼用之二變七律一曲飲福用之七律相生一曲退文舞迎武舞及亞獻徹豆用之九月辛亥大享天地于明堂以太祖太宗真宗配從祀如圜丘大赦文武職官致仕官並特與轉官不為永例詔內降指揮百司執奏毋輒行敢因緣干請者諫官御史察舉之初議肆赦上謂輔臣曰比有貴戚近習夤緣請托以圖內降可於赦文中嚴切禁止輔臣對曰載之赦條恐未盡聖意乃别為手詔與赦同降先是彭思永入為侍御史極論內降之弊及祀明堂前一日有傳赦書語百官遷官者時參知政事缺員張堯佐朝暮待命而王守忠亦求為節度使思永遂奏陛下覃此繆恩無意孤寒獨為堯佐守忠爾且言外戚秉政宦官用事皆非宗社之福疏入上震怒詔詰思永安從得此諫官吳奎言御史許風聞若必窮主名則後無敢以事告御史者是朝廷自蔽耳目也上寤不復致詰恩永尋罷侍御史知宣州而堯佐守忠之議遂格入內都知麥允言卒贈司徒安武節度使又詔允言有軍功特給鹵簿同知禮院司馬光言昔仲叔于奚有功於衛衛人使之繁纓以朝孔子曰惜也不如多與之邑惟器與名不可以假人夫爵位尊卑之謂名車服等威之謂器二者人主所以保畜其臣而安治其國家不可忽也今允言近習之臣贈以三公之官給以一品鹵簿其為繁纓不亦大乎冬十月初議覃恩髙若訥謂文彥博曰官濫已久未有以節止今又啓之何也彥博不聽辛未詔宰臣文彥博宋庠參知政事髙若訥史館檢討王洙編修大享明堂記十一月乙酉召太子中舍致仕胡瑗赴太樂所同定鐘磬制度戊子命中丞郭勸知諫院包拯放天下欠負壬辰賜淮南江浙荆湖制置發運使金部員外郎許元進士出身上嘗謂執政曰發運使總領六路八十八州軍之廣宜得其人而久任之今許元纍上章求解朕思之不若奬勵以盡其才故特有是賜閏十一月丙辰出內藏庫緡錢四十萬紬絹六十萬下河北便糴糧草先是河北沿邊水災朝廷蠲民稅幾盡至秋禾稼將登而鎮定復大水沿邊尤被其害上憂軍儲不給故特出內府錢帛以助之丁巳手詔宜委中書門下集賢院及太常禮樂官將天地五方神州日月宗廟社䄍祭享所用登歌宫縣審定聲律是非按古今調譜中和使經久可用以發祖宗之功德於是中書門下集兩制太常官置局於祕閣詳定太樂承旨王堯臣等言待制趙師民博通古今願令預詳定及乞借參知政事髙若訥所校十五等古尺並從之己未三司使户部侍郎張堯佐為宣徽南院使淮康節度使景靈宫使是日詔后妃之家無得除二府職位庚申又加張堯佐同羣牧制置使辛酉賜貴妃張氏從弟希甫及甫並進士出身堯佐之子也是夜秀州地震有聲如雷自西北起癸亥知諫院包拯等言陛下即位僅三十年未有失道敗德之事乃五六年超擢張堯佐羣臣皆竊議其過皆不在陛下在女謁近習及執政大臣也蓋女謁近習知陛下繼嗣未立而有所私莫不潛有趨向而附結之執政大臣不思規陛下以大誼乃從諛順指髙官要職惟恐堯佐不滿其意況下制之日陽精暗塞氛霧繼起伏望陛下斷以大義稍割愛情必不得已宣徽節度使擇與其一如此則仰合天意俯順人情而重光盛德矣初執政希上旨一日除堯佐四使又以王舉正重厚寡言同日授御史中丞甲子舉正上殿力言擢用堯佐不當疏入不報戊辰朝退舉正留百官班廷爭復帥殿中侍御史張擇行唐介及諌官包拯吳奎陳旭吳奎於上前極言且於殿廡切責宰相上聞之遣中使諭旨百官乃退己巳詔近臺諌官纍乞罷張堯佐三司使及言不可用為執政之臣若優與官爵於體差便遂除宣徽使兼已指揮自今后妃之家母得除兩府職任今臺諫官重有章疏其言反覆在法當黜朝廷特示含容時上怒未解樞密副使梁適獨進曰臺諫官蓋有言責然寵堯佐太厚恐非所以全之是日堯佐亦奏辭宣徽使景靈宫使乃詔學士院貼麻處分十二月甲申朔詔班三品以上家廟之制凡得立廟者許嫡子孫襲爵世降一等其後終以有廟者之子孫或官微不可以承祭又朝廷難盡推襲爵之恩遂不果行辛卯皇祐三年春正月丙子詔分淮南為兩路揚州為東路廬州為西路二月文彥博等奏上明堂大享記三十卷紀要二卷上為之序己亥詔三司河北入中糧草復行見錢法時三稅四稅二法並行於河北未幾茶法復壞芻粟之入大約虛估居十之八劵至京師為南商所抑茶每直十萬止售錢三千富人乘時收蓄轉取厚利三司患之請行貼買之法每劵直十萬北商售三千倍為六千復入錢四萬四千貼為五萬給茶直十萬詔又損錢一萬然亦不足以平其直北商無利入中者寡公私大弊知定州韓琦及河北都轉運司皆以為言下三司議三司奏請復見錢法可之仍一用景祐三年約束又懼好事者之橫議也庚子詔自今有依前事為議者並須究知厥理審可施用若其事已上而驗問無狀者置之重罰三月諫官包拯吳奎陳旭言平章事宋庠不戢子弟在政府無所建明庚申罷為刑部尚書觀文殿學士知河南府劉沆為參知政事戊辰邇英閣講易至山下有澤損君子以懲忿窒欲上曰人之情欲皆生於陰陽而節之在人楊安國對曰臣以為人有六情喜怒哀樂好惡天有六氣陰陽風雨晦明故人之生天命之謂性而命人之所稟以生也性人之所賦以分也言情則性之移也語欲則情之肆也故六情相濫則喜生於風怒生於雨哀生於晦樂生於明好生於陽惡生於陰故聖人取損象以懲忿窒欲也上然之庚子邇英閣講易鼎卦上問九四之象施之人事如何楊安國對曰鼎為烹飪成新之器上承至尊下又應初上承下施任重非據故足折而覆餗矣其猶任得其人雖重而可勝非其人必有顛覆之患上曰任人不可不謹重也夏四月丁未御邇英閣謂講讀官曰易有精微朕每以疑難問卿等得無煩乎曽公亮對曰臣等幸承明問懼不能對豈敢言煩上曰卿等宿儒博學多所發明朕雖知暑亦未嘗倦但恐卿等勞爾丁度復進曰自古帝王盛治日久非內惑聲色則外窮兵黷武陛下即位三十年孜孜聖學雖堯舜之聰明不是過因頓首稱謝刑部郎中知制誥曽公亮為翰林學士公亮自為集賢校理即預經筵凡十餘年上每厚遇之及遷學士管勾三班公亮盡取前後條目置座側案以從事吏束手無能為後至者皆莫能易五月辛亥眉州彭山縣上瑞麥圖凡一莖五穗者數本上曰朕嘗禁四方獻瑞今麥秀如此可謂真瑞矣其賜田夫束帛以勸之庚午宰臣文彥博等言臣等嘗聞德音以縉紳之間多務奔競若恬退守道者稍加旌擢躁求者庶幾知恥伏見工部郎中直史館張瓌十餘年不磨勘殿中丞王安石進士第四人及第舊制一任還進所業求試館職安石凡數任無所陳大理評事韓維嘗預南省髙薦自後五六歲不出仕宦好古嗜學並乞特賜甄擢詔賜瓌三品服召安石赴闕俟試畢别取旨維令學士院與試安石維並辭不就六月丁亥無為軍獻芝草三百五十本上曰朕以豐年為瑞賢臣為寶至於草木蟲魚之異焉足尚哉知軍茹孝標特免罪仍戒天下自今毋得以聞戊子汝州部署楊景宗求為郡職上謂輔臣曰景宗章惠太后之弟朕豈不念之然性貪虐老而益甚今與郡則一方之民受禍矣不許秋七月壬子詔太學生舊制二百人如不能充數止以百人為限丙辰詔兖州仙源縣復以孔氏子孫知縣事丁巳翰林學士承旨王堯臣等言國朝樂宜名大安詔恭依乙丑上諭輔臣曰近日職司以長吏不理聞者多矣中書未嘗施行且長吏者民之性命可不重乎宜擇其甚者罷之小者易之文彥博等慚謝而退於是罷斥對移者凡十六人丙子減湖南郴永桂陽監丁身米凡歲減十萬餘石八月己卯朔知諫院吳奎言近歲以來水不潤下盜賊橫起皆陰盛所致夫帝王之美莫大乎進賢退不肖今天下之人皆謂之賢陛下亦知其賢然不能進天下之人皆謂之不肖陛下亦知其不肖然不能退重以內寵驕恣近習回撓夷狄桀驁讒邪交傷陰盛如此寧不致大異哉辛巳特贈給事中孔道輔為工部侍郎時龍圖閣直學士王素入對語及道輔上思其忠故有是命癸未知定州韓琦加觀文殿學士再任初明鎬引諸州兵平恩州獨定兵邀賞賚出怨語幾欲譟城下琦至即用兵律裁之察其橫軍中尤不可教者捽首斬軍門外或死攻圍賻賞其家恤其孤兒使繼衣廩恩威既信則效古兵法作方圓鋭三陳指授偏將日月教習之由是定兵精徑齊一號為可用冠河朔京師發龍猛卒戍保州在道竊取人衣履或飯訖不與人直至定即留不遣曰保州極塞豈可以驕兵戍之易素教者數百人以往而所留卒未踰月亦皆就律歲大歉為賑之活飢人數百萬詔書褒美鄰城旁路刺取其政以為法在北邊隱然為雄鎮聲動邉方辛卯張堯佐為宣徽南院使判河陽詔天下長吏未盡得人其令諸路轉運使提點刑獄除任兩府臣僚外悉類次治狀能否以聞御史中丞王舉正以張堯佐再除宣徽使三嘗論奏不報知諫院包拯陳旭吳奎相繼言庚子詔自今張堯佐别有遷改檢會此劄子進呈執奏仍詔除宣徽使自今不得過二員乙巳馮道曽孫舜卿上道官告二十通乞録用上謂輔臣曰道相四朝而偷生茍祿無可旌之節所上官告其給還之九月乙卯武寧節度使兼侍中夏竦卒賜諡文獻知制誥王洙曰不當與僖祖同諡遂改曰文正同知禮院司馬光言諡之美者極於文正竦何人乃得此諡判考功劉敞言竦姦邪而陛下諡之以正不應法詔為更諡曰文莊丁丑詔邇英閣講讀官曰講讀者立侍敷對餘皆賜坐冬十月己卯朔詔三司解鹽聽通商候二年較其增損以聞初包拯自陜西還力主范祥所建通商法朝廷既從之已而判磨勘司李徽之又言不便乃下其事三司驛召祥令與徽之及兩制共議而議者皆以祥為是故有是詔甲子大理寺言信州民有劫米而傷主者法當死上謂輔臣曰飢而劫米則可哀盜而傷主則難恕然細民無知終緣於飢爾遂貸之丙申京西轉運使蘇舜元言保靜節度使知許州郭承佑才堪將帥政比龔黃請徙判鄭州上曰許鄭皆近甸何必徙且承佑庸人而舜元所舉如此使朝廷何所取信宜戒敕之丁丑殿中侍御史裏行唐介責授春州别駕初張堯佐除四使介與包拯力爭又請王舉正留百官班卒奪堯佐宣徽景靈二使頃之復除宣徽使知河陽或謂補外不足爭介以為宣徽次二府不計內外獨爭之上諭介除擬初出中書介言當責執政退請全臺上殿不許自請貶亦不報於是劾宰相文彥博知益州日作間金奇錦因中人入獻宫掖緣此擢為執政及恩州平賊幸會明鎬成功遂叨宰相除張堯佐宣徽節度使臣面奉德音謂是中書進擬蓋彥博顯用堯佐陰結貴妃外陷陛下有私於後宫之名內實自為謀身之計向來求外任諫官吳奎與彥博相為表裏言彥博有才未可罷去自彥博獨專大政威福一出於已人不敢議其過惡乞斥罷彥博以富弼代之上怒甚却奏不視且言將加貶竄介徐讀畢曰臣忠義憤激雖鼎鑊不避敢辭貶竄上於座急召二府示以奏曰介言他事乃可至謂彥博因貴妃得執政此何言也樞密副使梁適叱介下殿召當制舍人即殿廬草制而責之時上怒不可測羣臣莫敢諫右正言同修起居注蔡襄獨進言介誠狂直然容受盡言帝王盛德也必望矜貸之翌日中丞王舉正復言責介太重上亦中悔改介英州别駕復取其奏以入遣中使護送介至英州且戒必全之而介之直聲自是聞天下知制誥胡宿言聞專差中使押至貶所介若死於道路徒使朝廷負謗於天下上曰誠不思此亟追還中使庚子平章事文彥博罷為觀文殿大學士知許州或言張堯封彥博父客也彥博知益州貴妃有力焉因風彥博織燈籠錦以進貴妃服之上驚顧曰何從得此妃正色曰文彥博所織也彥博與妾父有舊然妾烏能使之特以陛下故爾及為參知政事明鎬討王則未克上甚憂之語妃曰大臣無一人為國了事者妃密令人語彥博翌日彥博乞身往破賊上大喜賊平即軍中拜相議者謂彥博得相由妃力也介既用是深詆彥博事之有無卒莫辨云樞密使龐籍為平章事昭文館大學士監修國史參知政事髙若訥充樞密使辛丑樞密副使梁適為參知政事翰林學士承旨王堯臣為樞密副使知諫院吳奎知密州包拯奏乞留奎且言唐介因彈大臣并以中奎誣惑天聽上曰介昨言奎拯皆陰結文彥博今觀此奏則非誣也乙巳上謂龎籍曰諫官御史必用忠厚淳直通世務明治體者以革浮薄之弊籍既承聖諭自是中書奉詔舉臺官必以上語載勑中十一月初龎籍為福建轉運使請罷漳泉興化運丁米有司持不可於是籍為宰相遂行之乙亥上謂輔臣曰江淮連年荒歉如聞發運轉運司惟務誅剝以敷額為能雖名和糴實抑配爾其減今年上供米百萬石因詔停災傷人户所輸鹽米十二月翰林天文院新作渾儀成御撰運儀總要十卷先是包拯還自陜西言伏見所降敕命陜西鹽法且依范祥擘畫通商放行此誠國家大利欲望聖慈特許就除祥權本路轉運副使所貴事歸一局易為辦集又言勘會祥新法自皇祐元年正月至二年十二月終共收見錢二百八十九萬一千貫有零比較舊法二年計增錢五十一萬六千貫有零三年春季又收到見錢七十餘萬貫顯著成效可備驅䇿欲望允臣前奏三司使田况亦請久任祥使專其事己亥范祥為陜西轉運副使益州鄉貢進士房庶為試校書郎宋祁嘗上所著樂書補亡二卷既召赴闕庶自言嘗得古本漢志云度起於黃鍾之長以子穀秬黍中者一黍之起積一千二百黍之廣度之九十分黃鍾之長一為一分今文脫之起積一千二百黍八字故自前世以來纍黍為赤以制律是律生於赤赤非起於黃鍾也且漢志一為一分者蓋九十分之一後儒誤以一黍為一分其法非是當以秬黍中者一千二百實管中黍盡得九十分為黃鍾之長九寸加一以為赤則律定矣直祕閣范鎮是之乃言曰李照以縱黍纍赤胡瑗以橫黍纍赤是皆以赤生律不合古法朝廷久以鍾律未正下詔博訪兾有所獲今庶所言以律生赤誠衆論所不及請如其法試造赤律乃詔王洙與鎮同於修制所如庶説造律赤籥律徑三分圍九分長九十分籥徑九分深一寸赤起黃鍾之長加十分而律容千二百黍初庶言太常樂髙古樂五律比律成才下三律以為今所用黍非古所謂一稃二米黍也赤比橫黍所纍者長一寸四分上召輔臣觀庶所進律赤籥又令庶自陳其法因問律吕旋相為宫事令撰圖以進時胡瑗等制樂已有定議特推恩而遣之鎮為論於執政執政不聽壬辰皇祐四年春正月辛亥徙英州别駕唐介為全州團練副使監郴州酒稅王堯臣王守忠陳旭等較慶厯皇祐總四年天下財賦出入凡金幣絲纊薪芻之類皆在其數參相耗登至皇祐元年入一億二千六百二十五萬一千九百六十四而所出亡餘為書七卷丙辰上之詔送三司取一歲中數以為定式三月丁未知諫院包拯為龍圖閣學士河北都轉運使拯在諫院踰三年數論斥大臣權幸請罷一切內降曲恩又别上唐魏鄭公三疏請置座右以為龜鑑别條七事多見采納拯前嘗建議罷河北屯兵分之河南諸州遇警即發如謂戍兵不可遽減則訓練義勇以壯邊備雖小給餱糧每歲不當屯兵一月之費用一州賦可給義勇十八萬朝廷難之丙辰蠲江南東西路民所貸種糧壬戌出內藏庫絹十萬下三司以助軍費監郴州稅唐介為祕書丞辛未詔雜買務自今凡宫禁所市物皆給實直其非所缺者勿得市初上謂輔臣曰國朝監唐世宫市之患特置此務以防擾人近歲物非所急者一切收市其擾人亦甚矣故降是詔夏四月戊寅禁內宿臣僚聚會先是內出欹器一陳于邇英閣御座前諭丁度等曰中則正滿則覆虛則欹率如家語淮南荀卿之説其制度精好度等列侍觀之帝曰日中則昃月滿則虧朕欲以中正臨天下當與列辟共守此道度拜曰臣等亦願無傾滿以事陛下因言太宗嘗作此器真宗亦嘗著論庚辰帝製後述以賜度等初儂智髙貢方物求內屬朝廷拒之後復貢金函書以請亦不報智髙與交址為仇且擅廣源山澤之利遂謀入寇攻破橫山寨五月乙巳朔破雍州偽建大南國僭號仁惠皇帝改年啓厯癸丑儂智髙入橫州丙辰入貴州庚申入龔州辛酉入藤州又入梧州封州並棄城知封州曹覲死之壬戌入康州知州趙師旦監押馬貴死之癸亥入端州丙寅圍廣州資政殿學士户部侍郎范仲淹卒諡文正既葬帝篆其碑曰褒賢之碑仲淹內剛外和性至孝好施豫置義莊以贍宗屬為政忠厚所至有恩邠慶二州之民與屬羌皆畫像立生祠及其卒也羌酋數百人為舉哀於佛寺號之如父齋三日而去呂中曰先儒論本朝人物以仲淹為第一觀其所學必忠孝為本其所志則先天下之憂而憂後天下之樂而樂其有所為必盡其力曰為之自我者當如是其成與否有不在我者雖聖賢不能必此諸葛武侯不計成敗利鈍之誠心也觀其論上夀之儀雖晏殊事有所不能曉寬仲約之誅雖富弼有所不能知而十之規模雖張方平余靖之諸賢有所不能識仁宗晚年欲大用之而范公已即世矣豈天未欲平治天下歟命崇儀使知韶州陳曙領兵討儂智髙六月乙亥起復前衛尉卿余靖為祕書監知潭州前屯田員外郎直史館楊畋為廣南西路體量安撫提舉經制盜賊靖改為廣南西路安撫使知桂州乙酉祠部員外郎判南曹范鎮上書曰陛下制樂三年有司之論紛然未決蓋由不議其本而爭其末也樂者和氣也發和氣者聲音也聲音生於無形故古人以有形之物傳其法然後無形之聲音得而和氣可道也有形者秬黍也律也赤也籥也黼也斛也算數也權衡也鐘也磬也是十者必相合而不相戾然後為得今皆相戾而不合臣固知其無形之聲音不可得而和也請以臣章下有司問黍之二米與一米孰是律之空徑三分與三分四釐六毫孰是律之起赤與赤之起律孰是籥之圓制與方制孰是釜之方赤圓其外深赤與方赤孰是斛之方赤圓其外庣旁九釐五毫與方赤深赤六十二分孰是算數之法圓分與方分孰是權衡之重以一米秬黍與一米孰是鐘磬依古法有大小輕重長短薄厚而中律不依古法而中律孰是孰不是定然後制籥合升斗釜斛以校其容受容受合然後下詔以求真黍真黍至然後可以為量為鐘磬量與鐘磬合於律然後可以為樂也詔送詳定所鎮説自謂得古法然集賢校理司馬光數與之論難以為弗合世鮮鐘律之學卒莫辨其是非焉彰化節度使知延州狄青為樞密副使御史中丞王舉正言青出兵伍為執政本朝所無恐四方輕朝廷左司諫賈黯言國初武臣宿將未有起兵伍登帷幄者今其不可有五四夷聞之有輕中國心一也小人無知翕然向之撼搖人心二也大臣將恥與為伍三也不守祖宗之成規而自比五季衰亂之政四也青雖才勇未聞有破敵功失駕御之術五也御史韓贄亦以為言皆不聽秋七月乙巳出內藏庫錢三十萬緡絹十萬匹下河北助糴軍糧丙午命知桂州余靖經制廣南東西路盜賊廣州益修城備賊知不可拔圍五十七日壬戌解去由清逺縣濟江攻賀州八月辛卯改新知秦州孫沔為荆湖南路江南西路安撫使沔初入見上以秦州事勉之對曰秦州不足煩聖慮當以嶺南為憂也既而聞張忠死蔣偕敗上諭執政曰南事誠如沔料宰相龎籍因奏遣沔行故有是命仍許沔便宜從事沔行至鼎州復有詔加廣南東西路安撫使九月戊申儂智髙殺廣南鈐轄蔣偕于賀州山南東道節度使同平章事賈昌朝乙卯召赴邇英閣講乾卦上曰將相侍講天下盛事昌朝稽首謝翌日手奏曰乾之上九稱亢龍有悔悔者凶災之萌爻在亢極必有凶災不即言凶而言悔者以悔有可凶可吉之義若修德則免悔而獲吉故但言悔用九見羣龍無首吉者聖人用剛健之德乃可決萬務當天下久盛柔不可以濟然亢而過剛又不能久惟聖人外以剛健決事內以謙恭應物不敢自矜為天下首乃獲吉也手詔褒答仍以所陳卦義付史館丁巳命知桂州余靖提舉廣西東路兵甲經制賊盜庚申儂智髙破昭州辛酉同修起居注韓絳為右正言上面諭曰卿朕所選用凡所言事不宜沽激當存朝廷事體務可行毋使朕為不聽諫者楊畋曹修經制蠻事既無功改命孫沔及余靖等上猶以為憂宰相龎籍薦樞密副使狄青青亦上表請行翌日入對自言臣起行伍非戰伐無以報國願得蕃落騎數百益以禁兵羇賊首赴闕下上壯其言庚午改宣徽南院使荆湖南北路宣撫使提舉廣南東西路經制盜賊事初欲用入內都知任守忠為青副諫官李兌言唐失其政以宦者觀軍容致主將掣肘是不足法遂罷守忠冬十月甲戌殿中丞胡瑗落致仕為光祿寺丞國子監直講同議大樂狄青言騎兵便於乘髙履險步兵力不能抗故每戰必敗願得西邊蕃落兵自從或謂南方非騎兵所宜樞密使髙若訥言蕃部善射耐艱苦上下山如平地當瘴未發時疾馳破之必勝之道也青卒用騎兵破賊丁丑儂智髙入賓州右正言韓絳言狄青武人不可獨任上以問龎籍籍曰青起行伍若用文臣副之必為所制號令不專不如不遣乃詔廣南將佐皆稟青節制若孫沔余靖分路邀擊亦各聽沔等指揮甲申儂智髙復入雍州壬辰樞密副使王堯臣言請析廣西宜容雍等州為三路以融柳象𨽻宜州白髙竇雷化鬱林儀藤梧龔瓊𨽻容州欽賓廉橫潯貴𨽻雍州其三州並選武臣為安撫都監兼知州事以統支郡若蠻人入寇即三路率支郡併力掩擊之知桂州以兩制以上仍帶經略安撫使以統制三路詔狄青詳酌青以為便遂施行十一月壬寅朔日有食之甲辰詔司天監翰林天文院以唐戊寅麟德大衍五紀正元觀象宣明崇真八厯及皇朝應天乾元儀天崇天四厯算此月太陰直食及時辰分野仍命知制誥王洙及編修唐書官劉羲叟參定以司天監言此月十五日太陰當食也上謂輔臣曰朕臨御以來命參知政事多矣其間忠純可紀者蔡齊魯宗道薛奎而已宰臣如王曽張知白皆履行忠信雖時有小失而終無大過李迪之心亦忠朴自守但言多輕發爾復曰朕記其大不記其小然皆近世名臣也十二月壬申朔廣西鈐轄陳曙擊儂智髙兵敗于金城驛東頭供奉官王承吉白州長吏徐噩死之曙素無威令既與賊遇士卒猶聚博營中倉卒被甲以前遂致覆軍戊子知桂州余靖言交址乞會兵討賊而朝廷久未報智髙交址叛者宜聽出兵毋阻其善意朝廷從其請狄青奏假兵于外以除內寇非我利也以一智髙橫蹂二廣力不能討乃假蠻夷貪得忘義因而啓亂何以禦之願罷交址兵勿用且檄靖無通交址使朝廷卒用青計䇿人亦服青有逺略云己丑雪初上以愆亢責躬減膳見輔臣則憂形於色龎籍等願守散秩避賢路上曰是朕誠不能感天而惠不能及民非卿等之過也是夕乃得雪壬辰兩府及侍臣觀新樂于紫宸殿先是邇英閣講尚書無逸上曰朕深知享國之君宜戒逸豫楊安國言舊有無逸圖請列于屏間上曰朕不欲坐席背聖人之言當别書置之左方因命丁度取孝經天子孝治聖治廣要道四章對為右圖乃令王洙書無逸知制誥蔡襄書孝經又命翰林學士承旨王拱辰為二圖序而襄書之庚子諫官韓絳言天子之柄不可移事當間出睿斷上曰朕固不憚自有處分所慮未中於理而有司奉行則其害已加乎人故每欲先盡大臣之慮而後行之絳又言林獻可遣其子以書抵臣多斥中外大臣過失臣不敢不以聞上曰朕不欲留中恐開陰訐之路第持歸焚之癸巳皇祐五年春正月丁未詔廣南西路轉運司移文止交址助兵從狄青之請也狄青合孫沔余靖兩將之兵自桂州次賓州青以張忠蔣偕皆輕敵取死軍聲大沮前戒諸將毋得妄與賊鬭聽吾所為陳曙恐青獨有功乘青未至以步卒八千犯賊潰于崑崙關其下殿直袁用等皆遁青曰令之不齊兵所以敗己酉晨會諸將堂上揖曙起並召用等二十二人按所以敗亡狀驅出軍門斬之沔靖相顧愕然靖嘗迫曙出戰因離席而拜曰曙失律亦靖節制之罪青曰舍人文臣軍旅之責非所任也諸將皆股栗辛亥尚書右丞丁度卒是日旬休上趣駕臨奠度性純質居一室十餘年無姬侍嘗語諸子曰王旦為宰相十五年卒之日子猶為布衣汝曹宜自力吾不復有請矣丁巳會靈觀火賈黯言天意所欲廢當罷營繕赦守衛者罪以示警懼修省之意狄青既戮陳曙乃按軍不動更令調十日糧賊覘者還以為軍未即進也翌日遂進軍青將前陳孫沔將次陳余靖將後陳夕次崑崙關黎明整大將旗鼓諸將環立帳前待令乃發而青已微服與先鋒度關趣諸將會食關外即歸仁鋪為陳戊午賊列二鋭陳以拒官軍及戰前軍稍却賊氣鋭甚沔等懼失色青起自執白旗麾蕃落騎兵張左右翼出賊後交擊左者右右者左已而右者復左左者復右賊衆不知所為大敗走儂智髙復趣雍州王師追奔五十里其黨黃師宓儂建中智忠並偽官屬死者五十七人生擒賊首五百餘人智髙夜縱火燒城遁由合江入大理國遲明青按兵入城得尸五千三百四十一築京觀于城北隅時有賊尸衣金龍衣衆以為智髙已死欲具奏青曰安知非詐邪寧失智髙不敢誣朝廷以貪功也智髙自起至平幾一年吏民不勝其毒先是謠言農家種糴家收而智髙為青所破皆如其謠戰於歸仁也張玉為先鋒賈逵將左孫節將右既陳青誓曰不待令而舉者斬及節搏賊死山下逵私念兵法先據髙者勝乃引軍疾趨山立始定而賊至逵擁衆而下揮劒大呼斷賊陳為二玉以先鋒突出陳前而青麾蕃落騎兵出賊後賊遂大潰逵乃詣青帳前請罪青撫逵背曰違令而勝權也何罪之有壬戌知定州韓琦為武康節度使知并州徙判并州李昭亮判成德軍宋祁知定州祁在成德請弛河東陜西馬禁聽蕃落民間自相賣買民養馬者勿升户等居三月徙定州又上言天下根本在河北河北根本在鎮定以其扼賊衝為國門户又曰欲兵之強莫如多穀與財欲士訓練莫如善將欲人樂鬭莫如賞重而罰嚴欲賊顧望不敢前莫如使鎮重而定疆又曰天下久平馬益少臣請多用步兵夫鬨然聚霍然去雲奔飈馳抄後掠前此馬之長也強弩巨梃長鎗利刀什什相聨伍伍相逢大呼薄戰此步之長也臣請損馬而益步我能用步所長雖契丹多馬無所用之夫鎮定一體也自先帝以來為一道師專而兵不分故定揕其胸而鎮掎其脅勢自然爾今判而為二平時號令文移不能一賊脫叩營壘則彼此不相謀誰肯任責邪河東馬強士習善馳突與鎮定若表裏然東下井陘不百里入鎮定矣賊若深走以河東健馬佐鎮定兵掩其惰若歸者萬出萬全此一奇也又上禦戎論七篇二月癸未狄青為護國節度使樞密副使初廣南捷書至上大喜謂宰相龐籍曰青破賊卿執議之力也詔太常寺置丞一員以近上知禮院官兼之太常有丞自此始乙酉右諫議大夫孫沔知桂州余靖並為給事中仍詔靖留屯雍州經制餘黨候處置畢乃還桂州三月辛酉御崇政殿賜鄭獬等二百人及第一百五十人出身一百七十人同出身壬戌賜諸科五百二十二人及第出身甲子奉安太祖御容于滁州天慶觀瑞命殿太宗于并州資聖院統平殿真宗于澶州開福院信武殿夏四月命陜西轉運使李參專制置解鹽參權慶州視民缺乏令自隱度穀麥之入預貸以官錢穀麥熟則償謂之青苗錢數年兵食常有餘其後青苗法蓋取諸此呂中曰青苗法非自安石始也但其始也官給以錢而民入以穀則免和糴之擾合常平之法而不至強民以所難至荆公則直取二分之息而督之以勢此所以可行於一邑而不可行於天下也丁酉邇英閣講書冏命侍御僕從罔匪正人上曰君臣之際必誠意相通而後治道成楊安國對曰陛下從諌弗咈如水之走下視羣臣若僚友自古盛王未之有也上曰臣下能進忠言朕何惜夏禹之拜五月己巳樞密使髙若訥罷為同羣牧制置使狄青既平嶺南上欲用為樞密使同平章事宰臣龐籍曰昔太祖時慕容延釗將兵一舉得荆南湖南之地不過遷官加爵邑錫金帛曹彬平江南太祖賜錢二十萬貫青殄戮凶醜誠可褒賞然方於延釗與彬之功不逮逺矣若遂用為樞密使則青名位極矣萬一更立大功欲何官賞之上乃從之後兩府進對上忽謂籍曰平南之功前者賞之太薄今以狄青為樞密使孫沔為副聲色俱厲籍錯愕對曰容臣等退至中書商議明日再奏上曰勿往中書只於殿門閣內議之朕坐於此以俟籍乃與同列議於殿門閣內具奏皆如聖旨復入奏上容色乃和丁未新知杭州孫沔為樞密副使知桂州余靖為工部侍郎戊申詔如聞諸路轉運使多掊克於民以官錢為羡餘入助三司經費又髙估夏秋諸物抑人户輸見錢並宜禁絶之三司嘗責諸道羡餘淮南轉運使張瓌獨上金九錢三司怒移文詆之甚急瓌以賦數民貧為對癸亥御史中丞王舉正為禮部尚書狄青自樞密副使遷樞密使舉正又力言之既不能得因請解言職上稱其得風憲體遣使就第賜白金三百兩而有是命翰林學士孫抃為左諌議大夫權御史中丞抃性篤厚寡言質略無威儀雖久處顯要循循罕所建明及制下諫官韓絳論奏抃非糾繩才不可任風憲抃即手疏曰臣觀方今士人趨進者多廉退者少以善求事為精神以能訐人為風采捷給若嗇夫者謂之有議論刻深若酷吏者謂之有政事諫官所謂才者無乃謂是乎若然臣誠不能也上察其言趣令視事且命知審官院抃辭以任言責不當兼事局乃止甲子詔諫官御史上章論事毋或朋比以中傷善良又詔兩制兩省臺諫官三館帶職省府推判官等次對言事凡朝政得失生民利病災異時數直言無隱不得朋私挾情抉擲陰細無益治道務在公實六月丙戌新修集禧觀成初會靈觀火更名曰集禧壬辰詔諸路轉運使上供斛斗依時估收市之毋得抑配人户仍停考課賞罰之制先是三司與發運司謀聚斂奏諸路轉運使上供不足者皆行責降有餘則加升擢由是貪進者競為誅剝民不堪命上聞之特降是詔天下稱慶秋七月壬寅詔以冬至有事于南郊己酉詔曰朕思得賢才故開薦舉之路虛心納用皎然不疑而比年以來率多繆濫不知而言茲曰蔽知而言之茲曰罔以此事上豫何賴焉自今所舉非其人者其令御史臺彈奏當置于法見任監司以上毋得論薦庚戌上謂輔臣曰如聞諸州軍常於夏秋之際先奏時雨沾足田稼登茂後或災傷遂不敢奏致使民稅不得蠲除甚非長吏愛民之意宜申飭之辛亥作鎮國神寶先是上謂龐籍曰奉宸庫有良玉廣尺而厚半之蓋希代之珍也不欲以為服玩且天子八璽其一曰神寶遂令參知政事梁適撰寶名而刻之閏七月戊辰朔詔內侍省自今內侍供奉官至黃門以一百八十人為額壬申户部侍郎平章事龐籍以本官知鄆州判大名府陳執中為吏部尚書平章事昭文館大學士參知政事梁適為禮部侍郎平章事丙子集賢校理李中師為淮南轉運使中師入辭上謂曰比聞諸路轉運使多獻羡餘以希進然遇災荒不免暴取於民此朕所不取也其戒之出內藏庫緡錢十萬紬絹二十萬綿十萬下河北助糴軍儲八月兵部員外郎天章閣待制兼侍講趙師民纍請補郡癸卯除龍圖閣直學士知耀州師民嘗講論語上問修文德對曰文者經天緯地之總稱君人之道撫之以仁制之以義接之以禮講之以信皆是也上曰然其所先者無若信也曰信者天下之大本仁義禮樂皆必由之此實王道之要師民在經筵十餘年甚見器異盛夏屬疾家居上飛白書團扇為和平字以寄意將行上自寫詩送之目以儒林舊德翰林侍讀學士吕公綽言弟都官員外郎知單州公著頃因先臣致仕恩例乞試蒙候得替取旨後經三任十年未曽有所干述詔公著充崇文院檢討庚午唐介為殿中侍御史充言事御史介貶斥不二歲復召議者謂天子優容言事之臣近古未有也辛酉御崇政殿策試賢良方正能直言極諫太常寺大祝趙彥若及試武舉人彥若所對踈闊下有司考不中等而罷之議者謂宰相陳執中不由科第以進故陰風有司專抑儒士非彥若實不能也乙丑武舉五十一人授官有差前詔罷武舉人今所擢皆祕閣舊經試者云九月庚午忠州團練使錢晦知河中府上賜飛白安民字因戒曰陜西兵方解民困久矣卿為朕愛撫無縱酒作樂使人謂為貴戚子弟晦頓首謝乙酉御崇政殿召近臣觀新樂先是鐘磬之音未合古法詔知鐘律者考定其當議者各安所習久而不決乃命諸家各作鐘律以獻親臨視之然古者黃鍾為萬事根本故尺量權衡皆起於黃鍾至隋用纍黍為尺而制律容受卒不能合及平陳得古樂遂用之五代之亂大樂淪散王朴始用尺定律而聲與器皆失之故太祖患其聲髙特減一律至是又減半上雖勤勞制作未能得其當者有司失之於以尺生律也初賈昌朝侍經筵上問鼎卦聖人亨以享上帝今郊何以無鼎昌朝不能對於是詔禮官議以為郊有亨牲進孰遂命阮逸胡瑗鑄銅鼎制鸞刀上親書鼎名曰牛鼎羊鼎豕鼎皆署而刻之鸞刀亦親書刀名而署之冬十月丙申朔日有食之知耀州趙師民上疏曰太陽食于正朔此雖是陰陽之事亦慮是天意欲以感動聖心臣非瞽史不知天道但率愚意言之其月在亥亥為水水為正隂其日在丙丙為火火為正陽月掩日陰侵陽下蔽上之象也今聖心慈仁恭勤儉約動循典禮如此自非下蒙上邪撓正使主恩不下究而誰之咎歟望陛下朝夕咨于丞弼心膂之臣洎左右近侍耳目之官其忠而純者與之遴選內外百執事及州縣牧宰使主恩究於下不為羣邪所蔽塞則億兆之幸也丁巳殿中侍御史唐介為工部員外郎直集賢院上曰聞卿遷謫以來未嘗有私書至京師可謂不易所守矣介頓首謝後數論得失因言於上曰臣繼今言不行必將固爭爭之急或更坐黜是臣重纍陛下願聽解言職許之十一月己巳合祭天地于圜丘大赦十二月詔南郊赦書第四第五等户殘欠稅物並與倚閣自今須納七分以上方為殘欠仍著為定式戊午詔曰轉運之職本以澄清官吏綏撫人民豈特事誅求以剝下乎有能盡歲入以致增盈者留為本路移用毋得進羡餘務寬民力以稱朕懷庚申太常博士吳中復為監察御史裏行用中丞孫抃所薦也中復興國軍人嘗知犍為縣有善政抃未始識其面即奏為臺屬或問之抃曰昔人恥為呈身御史今豈薦識面臺官也左司諫賈黯建言臣嘗讀隋史見所謂立民社義倉者取之以時而藏之於民下足以備凶災而上無所利焉願倣隋制詔天下州軍遇年穀豐熟立法勸課蓄積以備災然當時牽於衆論終不果行甲午至和元年春正月壬申時京師大疫令太醫進方內出犀牛角二本析而觀之其一通天犀內侍請留供帝服御帝曰吾豈貴異物而賤百姓哉立命碎之癸巳都知王守忠為武信留後他毋得援例故事宦官未有真為留後者守忠疾復求為節度使宰相梁適曰宦官無除真刺史況真節度使乎既卒贈太尉昭德節度使二月樞密副使孫沔數言追册溫成於禮不可力求解職壬戌知杭州三司使田況為樞密副使三月樞密使王貽永數以疾求罷己巳罷為景靈宫使加右僕射兼侍中判鄭州王德用為樞密使司天監言日食四月朔庚辰德音改元夏四月甲午朔日有食之是日雷雨至申時見所食九分之餘丙申宰相率百官拜表稱賀祥源觀火先是知制誥胡宿言漢書天文志曰火禮也陛下明德恤祀虔恭郊廟宜蒙福應乃遘災旱古者祭天神無二主禮專一配所以奉天地之尊明不敢瀆乞依去年八月八日詔書及景祐二年禮官所定太祖定配之典追寢去年八月二十四日今後每次南郊三聖並侑之詔告謝天地以順火性不報戊午殿中侍御史裏行吳中復對于延和殿上謂曰比上封者多言陰陽不和蓋由大樂未定且樂之不合於古久矣朕以謂水旱之來係時政得失非樂所召也殿中侍御史呂景初言聖人在上不能無災而有救災之術今百姓困窮國用虛竭利源已盡惟有減用度爾用度之廣無如養兵比年招置太多未加揀汰祖宗時四方割據中國才百餘州民力未完耕植未廣然用度充足者兵少故也望詔中書樞密院議罷招補而汰冗濫五月己丑客星出天關之東南數寸嘉祐元年三月乃沒六月癸丑殿中侍御史裏行吳中復上殿彈宰相梁適姦邪上曰近馬遵亦有彈疏且言唐室自天寶而後治亂分何也中復對曰明皇初任姚崇宋璟張九齡為宰相遂致太平及李林甫用事紀綱大壞治亂於此分矣雖威福在於人主然治亂要在輔臣上曰朕每進用大臣未嘗不采天下公議所歸顧知人亦未易爾甲寅出內藏庫紬絹五十萬緡錢三十萬下河北助糴軍儲秋七月丁卯知益州程戡為參知政事戊辰禮部侍郎平章事梁適罷以本官知鄭州己巳殿中侍御史馬遵知宣州呂景初通判江寧府裏行吳中復通判虔州梁適之得政也中官有力焉及遵等於上前極陳其過上左右或言御史捃拾宰相自今誰敢當其任者適既罷左右欲並遵等去之知制誥蔡襄以三人者無罪繳還詞頭改付他舍人亦莫敢當者遂用熟狀降敕戊子吏部郎中歐陽修知同州先是修守南京以母憂去服除入見上惻然憐修髮白問在外數年今年幾何恩意甚至命判吏部流內銓小人恐修復用乃陰求所以中修修在銓曹未浹日也八月甲午知制誥賈黯權判吏部流內銓承平日久百官職業皆有常憲度樂於因循而銓衡徒文書備具而已黯始欲以風義拯救其弊益州推官桑澤在蜀三年不知其父死後代還舉者甚多應格當遷方投牒自陳人皆知其嘗喪父莫肯為作文書澤知不可乃去發喪制服以不得家問為解澤既除喪求磨勘黯以謂澤三年不與其父通問亦有人子之愛於其親乎使澤雖非匿喪猶為不孝也言之於朝澤坐廢歸田里不齒終身晉州推官李亢故嘗入錢得官已而有私罪默自引去匿所得官以白衣應舉及第積十年當磨勘乃自首言其初事黯以為此律所謂罔冒也奏罷之奪其勞考丙申知諫院范鎮言陛下每遇水旱之災必露立仰天痛自刻責盡精竭意無所不至蓋百吏不稱職使陛下憂勤于上而人民苦愁于下也夫以國家用調責之三司三司責之轉運使轉運使責之州州責之縣縣責之民民竭其力以佐公上而自用不給則嗟怨之氣干戾天地此水旱之所以作也願詔中書樞密大臣考究祖宗朝建隆天聖中官吏與所畜兵及天下賦入之數而斟酌裁節之庶國用有常而民力有餘陛下雖髙拱無所事而天地之和應矣惟留神采擇丙午參知政事劉沆依前官平章事初歐陽修罷判流內銓知諌院范鎮請復修等職任而宰臣劉沆亦請留修戊申命修修唐書戊午知制誥賈黯言陛下日御邇英閣召侍臣講讀經史其咨訪之際動關政體而史臣不得預聞臣切惜之欲乞令修起居注官入侍閣中事有可書隨即記録從之九月殿中侍御史趙抃彈劾不避權幸時號鐵面御史殿中丞王安石方辭召試除羣牧判官安石猶力辭歐陽修諭之乃就職館閣校勘沈康詣宰相陳執中求為羣牧判官執中曰安石辭讓召試故朝廷優與差遣且朝廷設館閣以待天下賢才亦當爵位相先而乃爭奪如此公視安石顔何厚也康慙沮而去癸亥起居舍人知制誥呂溱工部郎中知制誥兼侍講史館修撰王洙並為翰林學士故事翰林學士六員時楊察趙槩楊偉胡宿歐陽修並為學士於是察加承旨溱及洙復同除學士洙蓋第七員也溫成皇后之喪洙隂與石全彬附會時事陳執中劉沆在中書喜其助巳故員外擢洙議者非之甲子同修起居注吳奎劉敞並知制誥仍以敞為右正言陳執中言奎敞修注未一月不應驟遷上不聽曰此豈計資日月邪謝日上面諭以外間事不便有聞當一一語朕也己巳邇英閣講周禮大荒大扎則薄征緩刑楊安國曰所謂緩刑者乃過誤之民爾今衆持兵往劫糧廩一切寬之恐不足以禁姦帝曰不然天下皆吾赤子也一遇飢饉州縣不能存恤餓殍所迫遂致為盜又捕而殺之不亦甚乎丁丑詔開封府自今凡決大辟囚並覆奏之初開封府言得樞密院劄子軍人犯大辟無可疑者更不以聞其百姓則未有明文上重人命至是軍人亦令覆奏冬十月辛卯朔太白晝見己亥范鎮言臣比嘗建議方今官冗兵多民力不堪請詔中書斟酌裁抑及今纍月不報夫兵不在衆在練之與將如何爾儂智髙寇嶺南前後遣兵不知幾萬亡走奔北不可勝紀陛下親遣狄青然而卒能取勝者蕃落數百騎爾此兵不在衆近事之效也陛下何不持此説以詰大臣之欲益兵者臣愚以謂備契丹莫若寬河北河東之民備靈夏莫若寬關陜之民備雲南莫若寬兩川湖嶺之民備天下莫若寬天下之民民力寬則知自愛雖有外虞人人可為兵用人人自愛之兵以禦外虞何往而不克何征而不服哉呂中曰有有形之險有無形之險有形地利是也無形人心是也人心茍固則忠信可以撻兵甲道德可以為藩籬衆心成城何畏乎夷狄哉不然巨橋之積雖富莫遏乎前徒倒戈之衆阿房之役未已隨激乎匹夫揭竿之怨然則欲備契丹莫若寬河北之民欲備靈夏莫若寬關陜之民范公鎮之言知本之論也臣恐朝廷之憂不在四夷而在冗兵與窮民也近年以來地數震動河不軌道日月星辰謫見于天皆民之感也伏請明敕大臣求所以息民之術以應天地之變而為宗廟社稷計臣不勝大願丙辰太常少卿周湛為淮南江浙荆河制置發運使湛入辭上謂曰朝廷遴選此職不可陰置苞苴于京師湛皇恐對曰臣蒙聖訓不敢茍附權要以謀進身十一月辛酉降同知太常禮院吳充知髙郵軍太祝鞠真卿知淮陽軍禮院故事常預為印狀列署衆銜或非時中旨訪問則白判寺一人書填印狀通進施行有詔問溫成皇后應如他廟用樂舞否禮直官李亶以事白王洙洙即填印狀奏云當用樂舞事下禮院充真卿怒即牒送亶於開封府使按其罪洙抱案卷以示知府蔡襄曰印狀行之久矣禮直官何罪襄患之乃復牒送亶於禮院禮院吏相率逃去初真卿好遊臺諫之門殿中侍御史趙抃奏蔡襄不按治禮直官罪於是執政以為充因教抃上言禮直官訴於內臣云欲送禮直官於開封府者充與真卿也明日詔禮直官及繫檢禮生各贖銅八斤充真卿俱補外抃及諫官范鎮等皆言充等無罪不當降黜不報乙丑太常丞同修起居注馮京落同修起居注時臺諫爭言吳充鞠真卿不當補外京最後上疏言愈切宰相劉沆怒請出京知濠州臺諫又爭言京不當奪職請復之不報壬午入內押班石全斌為入內副都知知制誥劉敞封還詞頭奏曰全斌昨已有制旨降宫苑使利州觀察使未能三日復換此命朝令夕改古人所非臣雖鄙賤實惜此體不敢輒撰誥詞從之後三月全彬卒為入內副都知知制誥劉敞言臣昨聞吳充出官馮京落職將謂其人所行實有過當所言實有不可是以觸忤聖意不蒙矜恕及於延和殿奏事面奉宣詔充乃是振職京意亦無他中書惡其太直不與含容臣竊驚駭不覺憤咽前古以來唯有人主不能容受直言或致竄謫臣下今陛下慈聖好諫寬大如此不知中書何故不務將順聖德之美須要排逐言者又言臣前論吳充馮京謫官面蒙宣諭本末臣即言若如此則是大臣蔽君之明專君之權而擅作威福也必恐感動陰陽有地震日蝕風霧之異今臣竊聞鎮戎軍地震一夕三發去臣所言五日之內爾又京師雪後昏霧纍日復多風埃太陽黃濁此皆災異之可戒懼者也丁未殿中丞直祕閣司馬光上古文孝經詔送祕閣十二月殿中侍御史趙抃言宰相陳執中本家捶撻女奴迎兒致死一云執中親行杖一云嬖妾阿張酷虐毆殺夫正家而天下定執中家不克正陛下倚之而望天下之治定是猶却行而求前何可得也執中亦自請置獄已而有詔罷獄臺官皆言不可逮執中去位言者乃止皇祐末太常博士張述上書曰生民之命繫於宗廟社稷之重而以繼嗣為之本陛下春秋四十四宗廟社稷之寄未有託焉此臣所以夙夜倣徨而憂也謂宜遴選宗親才而賢者異其禮秩試以職務俾內外知聖心有所屬則天下大幸前後七上疏最後語尤激切上終不以為罪乙未至和二年春正月丁亥觀文殿大學士兵部尚書晏殊卒殊雖早貴然奉養清儉善知人如孔道輔范仲淹皆出其門而富弼楊察皆其壻也二月壬辰汾州團練推官郭固為衛尉寺丞初知并州韓琦言固嘗造車陳法令固自齎車式詣闕進呈既試用之而有是命廣州司理陳仲約誤入人罪死有司當仲約公罪應贖上謂知審刑院張揆曰死者不可復生而獄吏雖暫廢他日復得敘官可不重其罰邪癸巳詔仲約特勒停會赦未許敘用庚子殿中侍御史趙抃言宰臣陳執中宜罷免者八事甲辰趙抃言臣近纍次彈奏乞正宰臣陳執中之罪風聞同知諫院范鎮妄行營救伏望陛下開日月之明判忠邪之路取內外之公議立朝廷之大法則天下幸甚乙卯流內銓引對前雍丘縣主簿陳琪改京官上謂判銓賈黯曰琪乃龐籍女壻今保薦多至二十四人得非專欲諂附大臣故爾邪且與幕職官知縣三月乙丑邇英閣講周禮視祲上謂講官盧士宗曰妖祥之興皆由人事君人者必在修德以承天意乎丁卯詔修起居注自今每御邇英閣立於講讀官之次詔封孔子後為衍聖公初太常博士祖無擇言孔宗願襲封文宣公祖諡不可加後嗣乞詔有司更定美號乃下兩制定更封宗願而令世襲焉己卯邇英閣講周禮大罍王洙曰祠天地之器以質信為本上曰曹操不事質信而多詐忌何以事上帝乎張揆讀後漢書應劭議刑揆曰當漢獻帝亂世有司猶能守法今天下奏獄或違法出罪負寃不伸水旱之災未必不由此也上曰祖宗以來多用中典奏讞者往往貸之豈欲刑罰之濫乎羣牧使楊偉等言判官王安石文行推髙乞除職名詔特授集賢校理安石又固辭不拜辛巳知諫院范鎮言臣伏見去冬多南風今春多西北風乍寒乍暑欲雨不雨又有黑氣蔽日此皆人事之感動也黑氣蔽日者陰侵陽小人惑君也欲雨不雨者政事不決也陳執中為相不病而家居者百日矣陛下以御史之言為是即乞速退執中以解天意以御史之言為非乞敕執中起視事無使天意久不決也乍寒乍暑不當賞而賞當罰而不罰也鄧保吉不當為內侍都知鄧宣言不當為內侍押班而又改官石全斌不當為觀察使未幾而又為內侍副都知是不當賞而賞也陛下有旨不應法律賞罰即中書樞密大臣執奏而中書樞密大臣不執奏是當罰而不罰也冬而多南風春而多西北風皆逆氣也風主號令主思慮陛下思慮若有為小人所惑而號令數變易也天變之發皆所以覺悟人君也丙戌邇英閣王洙講周官典瑞含玉上曰若使人用此而骨不朽豈如功名之不朽哉丁亥知審刑院張揆言知虢州周日宣妄言澗水衝注城郭當坐不實之罪上曰州郡多奏祥瑞至水旱之災或抑而不聞今守臣自陳墊壞官私廬舍意亦在民當恕罪也夏四月辛亥罷諸路里正衙前先是知并州韓琦言州縣生民之苦無重於里正衙前自兵興以來殘剝尤甚殊可痛傷請自今罷差里正衙前只差鄉户衙前令於一縣諸鄉中第一等選一户物力最髙者為之以三年一替皆謂如琦所議便知制誥韓絳請行鄉户五則之法乃命韓絳蔡襄與三司使副判官置司同定奪凡差諸州軍鄉户衙前以産錢與物力從多至少置簿排定户數分為五則遂更著淮南兩浙荆湖福建之法下三司頒行之其法雖逐路小有不同然大率得免里正衙前之役民甚便之知諫院范鎮言伏見周制冡宰制國用唐宰相兼鹽鐵轉運或判户部或判度支今中書主民樞密院主兵三司主財各不相知故財已匱而樞密院益兵不已民已困而三司取財不已中書視民之困而不知使樞密減兵三司寬財以救民困者制國用之職不在中書也欲乞使中書樞密院通知兵民財利大計與三司量其出入制為國用則天下民力庶幾少寬自天聖以來上每以經費為慮命官裁制者數矣臣下亦屢以為言而有司不能承上之意牽於習俗卒無所建明議者以為恨焉五月先是久不雨上問翰林侍讀學士呂公綽何以致雨公綽曰獄久繫則旱上親慮獄已而大雨御史中丞孫抃與其屬言乞正執中之罪不報於是抃與知雜事郭申錫侍御史母湜范師道殿中侍御史趙抃同乞上殿閣門以違近制不許壬午詔抃等輪日入對六月己丑翰林學士歐陽修為翰林侍讀學士知蔡州知制誥賈黯知荆南皆從所乞也先是修奏疏言宰臣陳執中自執政以來不叶人望纍有過惡招致人言而執中遷延尚玷宰府臣願陛下盡以御史前後章疏出付外廷議正執中之過惡罷其政事已而修及黯皆得補外殿中侍御史趙抃言竊見近日以來所謂正人賢士者紛紛引去如呂溱知徐州蔡襄知泉州吳奎被黜知壽州韓絳知河陽府又聞歐陽修乞知蔡州賈黯乞知荆南府侍從之賢如修輩無幾今堅欲請郡者非他蓋傑然正色立朝既不能曲奉權要而乃日虞中傷皆欲效溱襄奎絳而去爾今陛下又從其請而外補之朝廷萬一有緩急事則陛下何從而詢訪也何從而裨益也何從而謀議也何從而質正也伏望陛下勿使修等去職留為羽翼以自輔助知制誥劉敞亦以為言修黯遂復留戊戌陳執中罷為鎮海節度使判亳州孫抃等既入對極言執中過惡請罷之退又交章論列抃最後乞解憲職補外以避執中朋黨中傷之禍於是得請始御史因執中殺婢事欲擊去之上未聽而諫官初無論列者御史并以為言而趙抃攻范鎮尤力臺官皆助之鎮纍奏乞與御史辨不報及御史入對又言執中私其女子傷化不道執中既罷上以諭鎮鎮復言朝廷置御史以防讒慝非使其為讒慝也審如御史言則執中可誅如其不然亦當誅御史并繳前五奏乞宣示執政相與庭辨之卒不報鎮於是與趙抃有隙知永興軍文彥博為吏部尚書平章事判并州富弼為户部侍郎平章事彥博與弼並命是日宣制上遣小黃門數輩覘於庭士大夫相慶得人後數日翰林學士歐陽修奏事殿上帝具以語修且曰古之求相者或得於夢卜今朕用二相人情如此豈不賢於夢卜哉修頓首稱賀癸卯龍圖閣直學士兼侍讀張忭為權御史中丞上嘗諭執政以忭清直可任風憲故使代孫抃時富弼初入相歐陽修復翰林士大夫咸謂三得人也甲辰知鄆州龐籍改知并州籍入對上新相文彥博富弼意甚自得謂籍曰朕用二相何如籍曰二臣皆朝廷髙選陛下拔之甚副天下望上曰誠如卿言文彥博猶多私至於富弼萬口一辭皆曰賢相也籍曰文彥博臣項與之同在中書實無所私但惡之者毁之爾富弼未執大政朝士大夫未有與之為怨故交口譽之冀其進用而已亦有所利焉若富弼以陛下之爵祿植私恩則非忠臣何足賢也若一以公議槩之則向之譽者將轉而為謗矣陛下所宜深察也且陛下既知二臣之賢而用之用之則當信之堅任之久然後可以責成功若以一人言進之未幾又以一人言疑之臣恐太平之功未易卒致也上曰卿言是也乙巳儂智髙母儂氏弟智光子繼宗繼隆伏誅智髙亦自為大理所殺函其首至京師秋七月戊午新知蔡州翰林侍讀學士歐陽修復為翰林學士新知制誥賈黯復判流內銓戊辰資政殿大學士吳育為宣徽南院使判延州育侍讀禁中上因語及臣下毁譽多出愛憎育曰聖言要切實四海之幸然知而形之於言不若察而行之於事自古人君皆因信讒邪而致亂照姦險而致治至於安危萬端不出愛憎二字蓋人主事有不可不密者有不可不明者語及軍國機微或干權要不可不密也若指人姓名陰言其罪而事狀未見者此不可不明也若不明則讒邪得計忠正難立故聖王之行如天地日月坦然明白進一人使天下皆知其善退一人使天下皆知其惡則陰邪不能陷害至公可以立身此百王之要道也上益重之數欲大用而諫官或誣奏育在河南嘗貸民出息錢久之遂命出師八月己酉契丹主宗真卒子洪基立改清寧元年癸卯知諫院范鎮言比者京師及輔郡歲一赦去歲再赦今歲三赦又在京諸軍歲再賜緡錢姑息之政無甚於此夫歲一赦者細民謂之熱恩以其必在五月六月間也猾胥姦盜倚為過惡指以待免況再赦而三赦乎今備塞之人五六十萬使聞京師端坐而受賜者能不動心哉請自今罷所謂一赦以摧姦猾而使善良得以立也罷兵士之待賜錢以益內外而使民得以寬也乙未知諫院范鎮言先朝以御寶印紙給言事官使以特奏上所以知言者得失而殿最之請據今御史諫官具員置章奏簿於禁中時時觀省之仍以尚書省所置簿具言行否每季録付史官詔中書置臺諫官言事簿令以時檢句銷注之仍録與樞密院九月辛巳右諫議大夫李東之言今選舉之路未精補蔭之門太廣恩幸之路未塞因緣之弊未除於是中書先請自二府宣徽節度使遇南郊仍舊奏二人而罷每歲乾元節任子餘詔兩制臺諫官定議以聞冬十月乙未出內藏庫錢一百萬下河北市糴軍儲己亥禮部貢院上刪定貢舉條十二卷丁卯邇英閣讀史記龜策傳上問古人動作必由此乎孫抃對曰古有大疑既決於已又詢于衆猶謂不有天命乎於是命龜以斷吉凶所謂謀及乃心謀及卿士謀及庶人謀及卜筮蓋聖人貴誠不專人謀默與神契然後為得也上善其對壬子邇英閣讀周禮祭祀割羊牲登其首王洙曰祭陽以其首首主陽祭陰以其血血主陰也神明不測故但以類而求之上曰然天地簡易非已誠其能應乎又講左氏傳鄭人鑄刑書洙曰子産以鄭國之法鑄之於鼎故使民知犯某罪有某罰也上曰使民知法為亂不止不若不知而自化也十一月丙辰出內藏庫絹三十萬下并州市糴軍儲丙寅邇英閣讀太史公傳上謂李淑曰太史公欲行其道而不果身未免於禍深可悲也顧其是非不繆於聖人真良史之才矣十二月壬子新修醴泉觀成即祥源觀也因火更其名宋史全文卷九上欽定四庫全書宋史全文卷九下宋仁宗六丙申嘉祐元年春正月甲寅朔上御大慶殿受朝上暴感風眩趣行禮而罷二月甲辰御延和殿上康復丙午宰臣率百官拜表稱賀閏三月癸未朔樞密副使王堯臣為參知政事參知政事程勘為樞密副使以勘與文彥博姻家故也夏四月初龍圖閣直學士李東之請更定選舉補蔭之法知諫院范鎮承旨孫抃等言遂敕中書樞密院裁定自是每歲減入流者無慮三百員五月左千牛衛大將軍宗實幼養于宫中上及皇后鞠視如子上始得疾中外憂恐宰相文彥博劉沆富弼勸早立嗣上許之上疾有瘳其事中輟知諫院范鎮上疏曰陛下方不豫時有言曰我惟宗廟社稷計以憂勞而成此疾得非皇嗣未立乎祖宗後裔蕃衍盛大拔其尤賢者優其禮數試之以政以繫天下之心異日誕育皇嗣復遣還邸真宗皇帝取宗室子養之宫中此天下之大慮也太祖皇帝捨其子而立太宗皇帝者天下之大公也陛下觀太祖皇帝大公之心考真宗皇帝時故事斷于聖心以幸天下臣不勝大願六月殿中侍御史趙抃上疏曰上有怪見之文下有妖言之俗天其或者豈非以陛下皇嗣未立人心未有所繫欲陛下深思逺圖而然也願擇用宗室賢善子弟或教育宫闈或封建任使左右以良士輔導以正人盤石維城根本深固惟陛下以至公而財擇焉通判并州司馬光上疏曰儲二者天下之根本根本未定則衆心未安也伏望遴選宗室之中聰明剛正孝友仁慈者使攝居儲二之位以俟皇嗣之生退居藩服亦足以鎮安天下之心時京師自五月大雨不止水冒安上門關折壞官私廬舍數萬區諸路亦奏江河決溢河北尤甚民多流亡令所在賑救之己卯詔羣臣實封言時政缺失秋七月翰林學士歐陽修上疏曰陛下臨御三十餘年而儲副未立此久缺之典也近聞臣寮多以此事為言大臣亦嘗進議陛下聖意久而未決而庸臣愚士知小忠而不知大體者因以為異事遂生嫌疑之論此不思之甚也伏望陛下出於聖斷擇宗室之賢者依古禮文且以為子未用立為儲副也既可以徐察其賢否亦可以俟皇子之生臣又見樞密使狄青出自行伍遂掌樞密始初論者以為不可今三四年間外雖未見過失而不幸有得軍情之名且武臣掌國機密而得軍情豈是國家之利欲乞且罷青樞務任以一州既以保全之亦為國家消未萌之患知制誥吳奎言陛下在位三十五年而嗣續未立今之災沴乃天地祖宗感發聖意在禮太宗無嗣則擇支子之賢者以昭穆言之則太祖太宗之曽孫以近親言之則太宗之曽孫陛下所宜建立用以繫四海之心俟有皇子則退所為後者頗優其禮數願陛下勿聽邪説以誤大事殿中侍御史呂景初亦言商周之盛並建同姓兩漢皇子多封大國有唐宗室出為刺史國朝二宗相繼尹京願擇宗子之賢者使得問安侍膳於宮中以消姦萌或尹京典郡為夾輔之勢己丑出內藏庫絹二十萬匹銀十萬兩賑貸河北水災州軍是月有彗出紫微垣歷七星其色白光丈餘八月庚戌朔日有食之司馬光又上疏曰切以為國家者政有大小事有緩急當今事大而急者在於根本未建衆心危疑不以此時早擇宗室之賢使攝儲副之位內以輔衛聖躬外以填安百姓萬一有出於意外之事可不過為之防哉癸丑復知制誥馮拯為刑部郎中知江寧府江南東路轉運使唐介為户部員外郎時殿中侍御史吳中復乞召拯介還朝宰臣文彥博因言介須為御史言臣事多中臣病其間雖有風聞之誤然當時責之太深請如中復所奏召用之故有是命是日知諫院范鎮言近日以來彗出東方天意若告陛下將有急兵至不可晏然復如前日也陛下以臣言為然乞以臣前所上章與大臣速定大議以臣言為不然乞加臣萬死之罪乙卯鎮又言臣前六奏宗廟社稷大計四奏進入兩奏奉聖旨送中書臣兩至中書而中書遞相設辭以拒臣是陛下欲為宗廟社稷計而大臣不欲為之也今星變主急兵萬一兵起大臣家族首領顧不保其為身計亦已踈矣就使事有中變而死陛下之職與其死於亂兵不猶愈乎乞陛下以臣此章示大臣使其自擇死所庚申知諫院范鎮為户部員外郎兼侍御史知雜事鎮固辭不受癸亥樞密使狄青罷樞密使加同平章事判陳州三司使工部尚書韓琦為樞密使知益州張方平為三司使自西鄙用兵西蜀多所調發方平還自益州奏免橫賦四十萬貫匹及減興嘉卭州鑄錢十餘萬蜀人便之始方平主計京師有三年糧而馬粟倍之至是馬粟僅足一歲而糧亦減半方平遂畫漕運十四策宰相富弼讀方平奏上前晝漏盡十刻上太息稱善弼曰此國計大本非常奏也悉如所啓施行退謂方平曰自慶厯以來公論食貨詳矣朝廷每有所損益必以公奏議為本其後未期年而京師有五年之蓄翰林學士胡宿知審刑院詳議官缺判院者當擇人薦於上宿與同列得二人一人者監稅河北以水災虧課同列議曰虧課小失不足白上以纍才宿不可至上前悉白之且曰此人小纍才足惜上曰果得才小纍何恤遂除詳議官同列退誚宿曰詳議欲得人公固欲白上緣是不得奈何宿曰彼得與不得一詳議官爾是固亦有命也宿以誠事主今白首矣不忍毫髮欺君以喪平生節為之開陳聽主上自擇爾同列驚曰某從公久乃不知公所存如此范鎮言伏見國家自廢祖宗舊樂用新樂以來及今四五年日食星變冬雷秋電大雨不時寒暑不節不和之氣莫甚此者使樂無所感動則已樂而有所感動則衆異之至未必不由是也去年十二月晦大雨雪大風宫架􅀈壞元日大朝會樂作而陛下疾作臣恐天意以為陛下不應變祖宗舊樂而輕用新樂也自初議樂時臣屢論新樂非是其間書一通最為詳悉今再具進呈乞下執政大臣參詳臣書如可采伏乞且用祖宗舊樂以俟異時别加制作丁丑詔太常恭謝用舊樂九月壬午司馬光又上疏曰自古帝王即位則立太子此不易之道也欲望陛下察臣區區之心斷而行之使逺近煥然無復憂疑自然神靈悅於上而災異伏衆庶喜於下而姦冗消范鎮亦乞因恭謝大禮決定大議辛卯恭謝天地于大慶殿大赦改元癸卯侍御史范師道知常州殿中侍御史趙抃知睦州先是宰相劉沆進不以道深疾言事官因言自慶厯後臺諫官用事朝廷命令之出事無當否悉論之必勝而後已又專務抉人陰私莫辨之事以中傷士大夫執政畏其言進擢尤速遂舉行御史遷次之格滿三歲者與知州而抃等又嘗乞避范鎮請各補外沆遽引格出之師道及抃蓋嘗攻沆之短中丞張忭等言沆挾私出御史請留抃及師道不報冬十月丁卯出內藏庫銀十萬兩絹二十萬匹錢一十萬貫下河北市糴軍儲先是提舉糴便糧草薛向請罷並邊入中粟自京輦錢帛至河北專以見錢和糴時楊察為三司使請用其説因輦絹四十萬匹當緡錢七十萬又蓄見錢及擇上等茶場八總為緡錢百五十萬儲之京師而募商人入錢並邊計其道里逺近優增其直以是償之且省輦運之費唯入中芻豆計直償以茶如舊十一月判大名府賈昌朝為樞密使翰林學士歐陽修言昌朝稟性回邪執心傾險頗知經術能緣飾姦言善為陰謀以陷害良士小人朋附者衆皆樂為其用臣願速罷昌朝還其舊任則天下幸甚范鎮入對重拱殿言臣前後上章凡十九次切慮留中大臣不盡得見今録進呈乞付中書樞密大臣同共參詳鎮待罪幾百日須髮為白至泣以請上亦泣曰朕知卿言是也當更俟三二年鎮由是卒辭言職朝廷不能奪也己丑范鎮復為起居舍人充集賢殿修撰十二月壬子平章事劉沆罷知應天府范師道趙抃既出御史中丞張忭言天子耳目之官進退用舍必由陛下奈何以宰相怒斥之又請與其屬俱出吳中復指沆治溫成喪天下謂之劉彎俗謂鬻棺者為彎則沆素行可知忭等益論辨不已凡上十七章沆知不勝乃自請以本官兼一學士守南京故有是命忭彈劾無所避上謂忭曰卿孤特乃能如是忭曰臣朴學愚忠仰託睿聖是為不孤今陛下之臣持祿養交者多而赤心謀國者少陛下似孤立也上為之感動權知開封府曽公亮為給事中參知政事知江寧府包拯為右司郎中權知開封府拯立朝剛嚴聞者皆憚之貴戚宦官為之斂手舊制凡訟訴府吏坐門先收狀牒謂之牌司拯開正門徑使至庭自言曲直吏民不敢欺乙卯天章閣侍講胡瑗管勾太學瑗既為學官其徒益衆太學至不能容取旁官舍容之禮部所得士瑗弟子十常居四五於是瑗擢經筵治太學猶如故丁酉嘉祐三年春正月癸未翰林學士歐陽修權知貢舉先是進士益相習為奇僻鈎章棘句寖失渾淳修深疾之遂痛加裁抑時所推譽皆不在選囂薄之士候修晨朝群聚詆斥之然文體自是亦少變呂中曰唐之文體至韓愈而古本朝之文至歐陽子而古謂歐陽子今之韓愈非溢美矣然唐文三變非唐之文變也乃韓栁自變於下也故當時惟韓栁之徒與之俱變而天下之文體不為之變以其變之之權不出於上也我朝承五季之亂蓋風俗文章屢變之下流而人心學術一新之都會也自我太祖太宗留意文治而真宗復戒厲詞臣之浮靡仁宗復進好古篤行之士以矯文弊是其斡旋天下之大勢轉移風俗之要樞蓋自上始則文體之變雖在於嘉祐之時實萌於天聖之初矣二月太子太師致仕杜衍卒自作遺疏其略曰無以少安而忽邊防無以既富而輕財用宜早建儲嗣以安人心三月丁亥賜進士章衡等二百六十二人及第一百二十六人同出身是歲進士與殿試者始皆不落己丑賜諸科三百八十九人及第庚子陳州言護國節度使同平章事狄青卒諡武襄青為人謹密寡言其計事必審中機會而後發師行先正部伍明賞罰與士同寒飢勞苦雖敵猝犯之無一士敢後先者故其出常有功喜推其功以與將佐始與孫沔破賊謀一出青賊已平經制餘事悉以諉沔退然如不用意者沔始服其勇既又服其為人自以為莫及也夏四月丙寅雄州言北界幽州地大震司天監言據崇天厯己亥年日當食正月朔乞定戊戌年十二月為閏以避之詔不許五月庚辰并代鈐轄管勾麟府軍府軍事郭恩與夏人戰于繼道塢死之己亥詔審官三班院文武官舊皆自投文字乞磨勘轉官有妨廉節自今更不許自陳其任西川廣南官歲滿前五月餘路前兩月令本院預舉行之秋七月辛卯令翰林承旨孫抃中丞張忭磨勘轉運使及提點刑獄課績以歲滿所上功狀分殿最為上中下三等用唐考功四書之法以稽行實癸亥策試賢良方正能直言極諫王彰材識兼茂明於體用夏噩彰所對不入等噩入第四等八月丁卯置天下廣惠倉初樞密使韓琦請罷鬻諸路户絶田募人承佃以夏秋所輸之課給在城老幼貧乏不能自存者既建倉乃詔逐路提點刑獄司專領之戊辰知諫院陳旭言比日內降營求恩賞者甚多請令中書樞密院推勘以正干請之罪從之仍榜御史臺閣門冬十二月王洙侍邇英閣講周禮至三年大比大考州里以贊鄉大夫廢興上曰古者選士如此今率四五歲一下詔故士有抑而不得進者戊申詔自今間歲貢舉進士諸科悉解舊額之半進士增試時務策三條諸科增試大義十條又别置明經科舊置説書舉今罷之每秋賦自縣令佐察行義保任之上于州州長二復審察得失然後上本道使者類試已保任而後有缺行則州縣皆坐罪若省試而文紕繆坐元考官戊戌嘉祐三年春二月乙巳太常博士吳及改右正言及復上疏曰同姓者國家之屏翰儲副者天下之根本陛下根本未立四方無所繫心請擇宗室子以備儲副陛下他日有嫡嗣則厚加恩禮俾令歸邸於理無嫌於義為順三月辛未朔翰林學士歐陽修兼侍讀學士修言侍讀最為清近祖宗時不過一兩人今與經筵者十四人而侍讀十人外議皆云經筵無坐處矣欲乞罷臣此命不使朝廷遴選之清職遂同列授之冗員詔不許修固辭不拜修又言切以學士待制號為侍從之臣所以承宴間備顧問以論思獻納為職自祖宗以來尤所精擇其後員數漸多往時學士待制至六七十員近年稍吝除拜今猶及四十餘員欲乞檢詳前史及國朝故事自觀文殿大學士至待制並各立員數茍無其人虛位以待己卯起居舍人范鎮知制誥鎮自罷言職每因事未嘗不以儲嗣為言冀上心感動及知制誥正謝又面論之曰陛下許臣復三年矣願早定大計夏四月乙丑罷修睦親宅祖宗神御殿五月壬申管勾國子監吳中復請自今遇科場補試監生以四百五十人為額從之尋又增一百五十人初鹽鐵副使郭申錫受詔行河與河北都轉運使李參論議不相中訟參遣小吏黃守忠齎河圖屬宰相文彥博御史張伯玉亦奏參朋邪結託有狀乃詔推劾而申錫伯玉皆不實伯玉以風聞免劾乙酉詔曰朕常患民之好事而風俗漸靡於薄也思有以革正之非吾士大夫躬率以義而導之於善則何以哉申錫與參相決河議論之異遂成私忿以至興獄置對逾旬參驗所陳一無實者士人之行乃至是乎使吾細民何所視效其降申錫知徐州尋改知濠州六月丙午平章事文彥博罷為河陽三城節度使同平章事判河南府郭申錫張伯玉攻彥博雖不勝彥博亦不自安數求退上許之樞密使工部尚書韓琦依前官平章事樞密使賈昌朝罷為景靈宮使兵部尚書宋庠為樞密使同平章事樞密副使田況為樞密使右諫議中丞張忭為樞密副使權知開封府包拯為權御史中丞拯言東宮虛位日久天下以為憂夫萬物皆有根本而太子者天下根本也根本不立禍孰大焉上曰卿欲誰立拯曰臣所以乞預建太子者為宗廟萬世計爾陛下問臣欲誰立是疑臣也臣行年七十且無子非邀後福者上喜曰徐當議之拯又言近年內臣祿秩權任優崇稍過凡事更加裁抑又言朝廷詔令行之未久即有改易乞今後處置事宜申明制度更加謹重又陳教養宗室之法請條責諸路監司及御史府自舉屬官諫官御史不避二府薦舉者聽兩制得至執政私第事多施行壬子上謂三司使張方平曰監御厨內臣竇昭齊等宴日擅殺羊羔且羊羔乃物之未成者而枉其生理嘗戒使勿殺今復殺之不可不懲也特衝替丁卯交址貢異獸二稱貢麟知慶州杜植奏請回降詔書但云得所進異獸足使殊俗不能我欺又不失朝廷懷逺之意乃詔止稱異獸云秋七月壬辰復以度支員外郎范祥制置解鹽從三司使張方平及御史中丞包拯之言也祥自皇祐五年坐他罪責去祥始言歲入緡錢可得二百三十萬後不能辦至和元年止百六十九萬遂以元年入錢為歲課定率量入計出可助邊費十之八久之並邊復聽入芻粟以當實錢而虛估之弊滋長劵直亦從而賤歲損官課無慮百萬祥既受命請重禁入芻粟者其劵在嘉祐已前每劵别使輸錢一千然後豫鹽又言商人持劵若鬻鹽京師皆虧失本錢請置官京師蓄錢二十萬緡以待商人至者劵若鹽估錢則官為售之劵紙六千鹽席十千毋輒增損所以平其市估使不得為輕重詔以都鹽院監官兼領之自是稍復祥舊云權知開封府歐陽修言臣伏見諫官陳旭乞請僥求內降之人委二府劾奏干請者之罪蒙朝廷依奏施行臣自權知開封府未及兩月之間十次承準內降雖有司執奏終許公行然小人干求未有約束止絶臣欲乞根究因緣干求之人奏攝下府勘劾重行責罰八月丁未詔三司京西比歲旱屢蠲民租其以緡錢十萬下本路助糴軍儲九月恭謝天地之歲始用薛向議罷並邊入中粟自京輦錢帛至河北專以見錢和糴唯入中芻豆則仍計直給茶行之未久論者謂輦運科折煩擾居民且商人入錢者少芻豆虛估益髙茶益賤詔翰林學士韓絳知諫院陳旭即三司經度絳等言自改法以來邊儲有備商旅頗通未宜輕變唯輦運之費宜從官給舊輸稅絹無得折錢其入中芻豆罷勿給茶所在平其市估至京以銀紬絹三物償之皆從其説自是茶法不復為邊糴所傾而通商之議起矣初茶法屢變歲課日削至和中歲售錢并本息計之才百六十七萬二千餘緡官茶所在陳積縣官獲利無幾論者皆謂宜弛禁便景祐中葉清臣嘗上疏乞弛禁三司以為不可至是著作佐郎何鬲三班奉職王嘉麟又皆上書請罷給茶本錢縱園户貿易而官收稅租錢與所在征算歸𣙜貨務以償邊糴之費淮南轉運副使沈立亦集茶法利害為十卷宰相富弼韓琦曽公亮等決意向之力言於上癸酉命絳旭及知雜御史呂景初即三司置局議之冬十月乙巳出內藏庫紬絹十萬下河東轉運司助糴軍儲甲子提點江東路刑獄王安石為度支判官安石獻書萬言極陳當世之務其略曰今天下之財力日以困窮而風俗日以衰壞患在不知法度故也又曰今之失患在不法先王之政法先王之政者當法其意而已法其意則吾所改易更革不至乎傾駭天下之耳目囂天下之口而固已合乎先王之政矣又曰因天下之力以生天下之財取天下之財以供天下之費自古治世未嘗以不足為天下之公患也患在治財無其道爾大事記曰安石上書於嘉祐亦謂方今法度不合先王之政朝廷欲有所施為變革一有流俗僥幸之人不悅而非之遂止而不改為蓋指慶厯而言而安石變法之蘊亦略見於此書特安石更變之説與仲淹同而更變之意則與仲淹異耳嗚呼使慶厯之法盡行則熙豐之法不變使仲淹之言得用則安石之言可塞今仲淹之志不盡行於慶厯安石之學不用於嘉祐而乃盡用於熙寧世道升降之機識者又於此而三致意焉十一月癸丑命翰林學士韓絳諫官陳旭御史呂景初同三司詳定省減冗費於是置省減司於三司自是多所裁損云己丑詔置在京都水監凡內外河渠之事悉以委之十二月壬子御崇政殿召近臣觀河南府所進芝草上曰今日嘉雪大滋宿麥其瑞大勝芝草也即賜喜雪宴于中書上春秋髙未有繼嗣韓宗彥上書請修胎養令己亥嘉祐四年春正月丙申朔日有食之遣官祭社右正言吳及言日食者陰陽之戒在人事則臣陵君妻乘夫四夷侵中國今大臣無姑息之政非所謂臣陵君失在陛下淵默臨朝使陰邪未盡屏也后妃無權幸之家非所謂妻乘夫失在左右親幸驕縱無節也羌戎順服非所謂四夷侵中國失在將帥非其人為虜所輕也因言孫沔在并州苛暴不法燕飲無度龐籍前在并州輕動寡謀輒興堡塞屈野之衄為國深恥沔卒坐廢甲辰翰林學士胡宿權知貢舉二月始命韓絳陳旭呂景初即三司置局議弛茶禁其十月三司言宜約至和之後一歲之數以所得息錢均賦茶户恣其買賣所在收算請遣官詢察利害以聞詔遣司封員外郎王靖等分行六路及還皆言如三司議便己巳詔弛茶禁因以三司歲課均賦茶户凡為緡錢六十八萬有奇使歲輸縣官比輸茶時其出幾倍朝廷難之為損其半歲輸緡錢三十三萬八千有奇謂之租錢與諸路本錢悉儲以待邊糴自是唯臘茶禁如舊餘茶肆行天下矣乙亥詔三司以天下廣惠倉肄司農寺癸卯詔如聞陜西民間多濫鑄大錢以至市易不通其以見行當三大鐵錢並當小鐵錢之二本路官員已支三月俸者即計其數貼支三月御史中丞包拯奏張方平身主大計而乘勢賤買所監臨富民邸舍無廉恥不可處大位故命出守尋改知應天府以吏部侍郎宋祁為三司使丁未御崇政殿賜進士劉輝等二百三十人及第三十二人同出身諸科一百七十六人及第同出身己未新三司使宋祁知鄭州權中丞包拯權三司使先是右司諫吳及言祁在定州縱家人貸公使錢數千緡及在蜀奢侈過度而拯亦言祁益部多遊宴且其兄庠方執政不可任三司故命祁出守而拯代居其位翰林學士歐陽修言拯在臺日常指陳張方平過失臺中相繼論列方平由此罷去而以宋祁代之又聞拯亦曽彈奏宋祁過失而拯遂代其任此所謂蹊田奪牛豈得無過非整冠納履當避嫌疑者也疏奏拯即家避命不許久之乃就職有上封者論義勇為河北伏兵有事則集于戰陳無事則散歸田里以時講習無所敗事今河北義勇是也而議者但以為城守之備誠於河北邢兾二州分東西兩路命二郡守臣分領義勇萬一犬戎猖狂入寇即兩路義勇之師赴援掩擊如是河北則二十餘所常伏鋭兵羣胡何恃而不懼哉朝廷下其章河北路帥臣等議時大名府李昭亮等議曰分義勇為兩路置官統領以張用兵之勢外使敵人疑而生謀內亦搖動衆心恐非寓兵之術也姑令在所點集訓練三二年間武藝稍精漸習行陳遇有警得將臣統馭制其陳隊示以賞罰何戰而不可哉夏四月初著作佐郎何鬲以皇嗣未立上疏請訪唐周苗裔備二王後下禮院議曰唐室世數已逺惟周則我受禪之所自義不可廢詔取柴氏諸房中最長一人令歲時親奉周祀給公田十頃專管勾陵廟丙子吏部郎中何郯同知通進銀臺司兼門下封駁事時封駁職廢郯上言本朝設此司實代給事中之職乞凖王曽王嗣宗故事凡有詔敕並由銀臺司從之癸未司徒致仕陳執中卒禮官韓維議其諡曰皇祐之末後宫之喪執中不能考正儀典知治喪皇儀非嬪御之禮追册位號與宫闈有嫌建廟用樂踰祖宗舊制閨門之內禮分不明謹按諡法寵祿光大曰榮不勤成名曰靈請諡曰榮靈判太常寺孫抃等請易名為恭判尚書考功楊南仲覆議請諡曰恭襄詔諡曰恭維纍疏論列以謂責難於君謂之恭臣之議執中政以其不恭因乞罷禮官不報上篆其墓碑曰褒忠五月戊戌詔曰君臣同德以成天下之務而過設禁防疑以私慝非朕意也舊制臣寮不許詣執政私第執政嘗所薦舉不得為御史其悉除之始用包拯議也六月戊辰同判宗正寺趙良規言國家乘百年之運崇七世之靈雖神主有合食之名而太祖虛東向之位伏請講求定儀為一代不刋之典禮部尚書王舉正等議曰大夾之祭所以合昭穆尊卑必以受命之祖居東向之位本朝太祖實為受命之君然僖祖以降四廟在上故每遇大祫止列昭穆而虛東向魏晉以來亦用此禮今親享之盛謂宜如舊為便詔恭依己巳宰臣富弼等請加尊號曰大仁至治詔不許知諫院范師道言比災異數出而崇尚虛文非所以答天戒知制誥劉敞言尊號非古也陛下不受徽號已二十年奈何一旦增虛名而損實德上曰朕意亦謂當如此故富弼等奏五上卒不許太子中允王陶大理評事趙彥若國子博士傅卞於潛縣令孫洙並為館閣編校書籍官館閣編校書籍自此始三館祕閣凡八員丁丑詔諸路轉運使凡鄰路鄰州災傷而輒閉糶者以違制坐之戊寅是夕月食幾盡己卯放宮人二百四十一人修陰教以答天變也秋七月又放宫人二百三十六人裝御營卒桑達數十人酗酒鬭呼指斥乘輿皇城使以旨捕送開封府推鞫案成達棄市糾察刑獄劉敞移府問所以不經審訊之由府報曰近例凡聖旨中書門下樞密院所鞫獄皆不慮問敞曰此豈可行邪遂奏請自今一準定格樞密使以開封府有例不復論可否進呈報敞爭之曰先帝以京師刑獄最煩故建糾察一司此則先帝不敢兼於庶獄庶謹惟有司之任又朝廷舊法不許用例破條今顧于刑獄極謹人命至重之際而廢條用例此臣所不喻也上乃以敞章下開封府著為令八月乙未御崇政殿册試應才識兼茂明於體用科陳舜俞賢良方正直言極諫錢藻汪輔之舜俞藻所對策並入第四等輔之亦入等監察御史裏行沈起言其無行罷之輔之躁忿因以書誚讓富弼曰公為宰相但奉行臺諫風旨而已天下何賴焉弼不能答九月癸巳朔御製祫享舞名文舞曰化成治定武舞曰崇功昭德上自製迎神送神樂章詔宰臣富弼等撰大祚至采茨曲詞十八冬十月癸酉祫于太廟大赦以益州為成都府并州為太原府韓琦之在太原也乞復并州為節鎮詔兩制議之翰林學士胡宿以為商為宋星參為晉星國家受命始於商丘京師當宋之分野而并為晉地參商仇讎之星今欲崇晉非國之利也上是宿議及琦秉政因祫享赦書卒復之宿又以為言不報十一月己亥以河南處士邵雍為將作監主簿後再命為潁州團練推官皆辭疾不起庚子嘉祐五年春正月有大星墜西南光燭地有聲如雷同知諫院范師道言漢晉天文志天狗所下為破軍殺將伏尸流血甘氏圖天狗墜大賊起今備禦盜賊未見其至雖有將帥不老而愚士卒雖多徑勇者少夷狄可保也如州郡何州郡可保也如盜賊何必有包藏險心乘間而動者宜擇將帥訓練卒伍詔天下防其未然三月甲午詔三司河東路糴糧草舊支一分見錢三分茶自今並以見錢給之歲星晝見己巳詔書既弛茶禁論者猶謂茶户困於輸錢而商賈利薄販鬻者少知制誥劉敞翰林學士歐陽修頗論其事時朝廷方排衆論而行之不聽夏四月己卯度支判官直集賢院王安石同修起居注安石以入館才數月館中先進甚多不當超處其右固辭之翰林學士承旨孫抃為樞密副使抃久居侍從泊如也人稱其長者及程戡罷宰臣進擬例以三司使御史中丞知開封府一人補其員上曰朕欲用舊人即以命抃丙戌命權三司使包拯右諫議大夫呂居簡户部副使吳中復同詳定均稅五月甲午觀文殿大學士龐籍致仕籍自定州召還既入見詣中書求致仕執政曰公康寧如是且上意方厚奈何欲去之堅也籍曰若待筋力不支人主厭棄然後去斯不得已爾豈得為止足哉遂歸卧于家前後凡七上表乃許之仍詔籍出入如二府儀丁酉詔三司置寬恤民力司六月乙亥遣官分行天下訪寬恤民力事秋七月甲午户部員外郎知諫院唐介知荆南從介請也勑過門下知封駁事何郯封還之言介為諫官有補朝廷不當出外詔介復知諫院如故戊戌翰林學士歐陽修等上所修唐書二百五十卷刋修及編修官皆進秩或加職仍賜器幣有差自天聖初下赦書即詔民流積十年者其田聽人耕自是每下赦令輒以招集流亡募人耕墾為言又詔州縣長吏令佐能勸民墾闢荒田增稅及二十萬已上議賞久之天下生齒益蕃田野加闢獨京西唐鄧間尚多曠土唐州間田尤多或請廢為縣知州事趙尚寬曰土曠可益墾闢民稀可益招徠何必廢郡也乃按圖記召信臣故迹益發卒復三大陂一大渠教民自為支渠轉相浸灌而四方之民來者雲集比三年廢田盡為膏腴增户萬餘監司上其狀三司使包拯亦以為言丙午詔留再任庚戌詔曰朕樂與士大夫惇德明義以先天下而在位殊趣弗率朕旨論事之官搜抉隱微無忠恕長厚之風使吾俗靡然陷溺於薄而望教成治立其可得哉中書門下其采端實之士明進諸朝察辨矯激巧偽者加放詘焉時御史中丞趙槩言比年以來搢紳之論多險刻競浮薄宜戒敕之故有是詔壬子命吳奎吳中復王安石王陶同相度牧馬利害以聞八月甲子眉州進士蘇洵為試校書郎洵嘉祐初與其二子軾轍至京師翰林學士歐陽修上其所著權書衡論機策宰相韓琦善之召試舍人院再以疾辭故有是命壬申詔中外士庶並許上館閣缺書每卷支絹一匹五百卷與文資官相度牧馬利害所吳奎等上言自古國馬盛衰皆以所任得人失人而已汧渭之間未嘗無牧而非子獨能蕃息於周汧隴之間未嘗無牧而張萬歲獨能蕃息於唐此前世得人之效也然得人而不久其任久其任而不使專其事使得專其事而不臨以賞罰亦不可以有功歐陽修言今之馬政皆因唐制而今馬多少與唐不同者唐世牧地皆與馬性相宜今或陷沒夷狄或已為民田請下河東京西轉運司遣官訪草地有可以興置監牧則河北諸監有地不宜馬可行廢罷乙酉罷諸路同提點刑獄使臣置江南東北荆湖南北廣南東西福建成都梓利夔路轉運判官丙申樞密直學士呂公弼同詳定均稅十一月丁亥均州防禦使李珣為相州觀察使單州團練使劉永平為齊州防禦使知制誥楊畋封還珣永平詞頭因言珣等無尺寸裨補之功特以外戚故除之臣恐天下謂陛下忽祖宗謹重名器之訓開親戚僥幸之門曲緣私息輕用王爵尋詔他舍人草制范鎮言朝廷如以楊畋之言為是當罷珣等所遷官倘以為非即乞却令元當制官命詞內批不許既而鎮復有論列遂罷之辛卯詔勾當御藥院內臣如當轉出外而特留者更不許纍寄所遷資序初中丞趙槩言有遷官至遙領團練使者謂之暗轉乞限年明與改官故條約之辛丑樞密使宋庠判鄭州殿中侍御史呂誨等右司諫趙抃論庠不才詔從優禮罷之參知政事曽公亮依前官充樞密使樞密副使張忭禮部侍郎孫抃並為參知政事翰林學士歐陽修樞密直學士陳旭御史中丞趙槩並為樞密副使辛亥度支員外郎司馬光度支判官王安石同修起居注光五辭而後受安石終辭之最後有旨令閣門吏齎敕就三司授之安石不受隨而拜之安石避於厠吏置敕於案而去安石遣人追還之朝廷卒不能奪十二月戊寅右諫議大夫呂公弼知成都府公弼初至人疑其少威斷會營卒犯法當杖不肯受曰寧請劔不能受杖公弼再三諭之不從乃曰杖國法不可不受劔汝所請亦不汝違也命杖而復斬之軍中肅然辛丑嘉祐六年春三月乙酉召輔臣觀御書兖州至聖文宣王廟榜癸巳賜進士王俊民等一百三十九人及第五十四人同出身諸科一百二人及第並同出身己亥宰臣富弼以母喪去位庚子以富弼母喪罷大燕時同知禮院晏成裕言君臣之義哀樂所同請罷春燕以表優恤大臣之意上亟從其言夏四月庚辰樞密副使陳旭知定州三司使給事中包拯為樞密副使知諫院唐介知洪州右司諫趙抃知虔州侍御史知雜事范師道知福州殿中侍御史呂誨知江州旭始除樞密副使或言旭陰結宦者史志聰王世寧等故有此命介等遂交章論列上以其章示旭旭奏臣前任言職彈斥內臣多坐黜逐今言者乃以此汚臣乞付吏辨劾上顧謂輔臣曰凡除拜二府朕豈容內臣預議耶而介等言不已故兩罷之呂中曰宦官宮妾便於小人而不便於君子者也後世人主除拜大臣不詢於外朝而詢於內朝則過矣故石顯者貢禹玄成之所倚也梁冀者胡廣趙戒之所託也高力士者楊國忠之所恃也此自古小人未嘗不與宦官宮妾外戚為一者我朝所以無內朝之患以外朝之除拜在內不得而知內庭之請謁在外可得而抑之也初諸路敦遣行義文學之士赴京師者二十三人其至者十六人皆館于太學即舍人院試論策五月丙戌賜出身五人辭不就試亦以試將作監主簿命之六月壬子朔日有食之初司天言當食六分之半是日未初從西食四分而陰雲雷電頃之雨渾儀所言不為災權御史中丞王疇言頃歲日食於正陽之月實亦陰晦宰臣集班表賀甚失陛下祗畏奉天之意恐有司或援近例乞賀班者臣故得以先事而言也同判尚書禮部司馬光言日之所照周遍華夷雲之所蔽至為近狹雖京師不見四方必有見者天意若曰人君為陰邪所蔽災慝甚明天下皆知其憂危而朝廷獨不知也食不滿分者乃厯官術數之不精當治其罪亦非所為賀也於是詔百官毋得稱賀甲戌以富弼為起復禮部尚書平章事故事執政遇喪皆起復弼以為金革變禮不可用於平世上五遣使起之卒不從命或言弼初與韓琦同在二府左提右挈圖致太平天下謂之韓富既又同為宰相琦性果斷弼性審謹琦質直語或涉俗俗謂語多者為絮嘗議政事弼疑難者數四琦意多不決曰又絮耶弼變色曰絮是何言歟又嘗言及宰相起復故事琦曰此非朝廷盛典也於是弼力辭起復二人稍有間云戊寅同修起居注王安石辭起居注既得請又申命之安石復辭至七八乃受於是徑遷知制誥安石遂不復辭官矣嘗有詔今後舍人院不得申請除改文字安石與同列言若詞頭所批事情不盡而不得申請自非執政大臣欲傾側而為私則立法不當如此陛下舉天下之事屬之七八大臣方今大臣之弱者則不敢為陛下守法以忤諫官御史強者恣行所欲而諫官御史亦無敢忤其意者陛下兩聽其所為而無所問安有朝廷如此久而無亂者乎安石由是與執政忤樞密副使歐陽修言近見諫官唐介臺官范師道等因言陳旭事得罪陛下自臨御以來擢用諍臣開廣言路一旦臺諫聯翩被逐四出命下之日中外驚疑臣謂方今言事者規切人主則易欲言大臣則難臣自立朝耳目所記景祐中范仲淹言宰相呂夷簡貶知饒州皇祐中唐介言宰相文彥博貶春州别駕至和初吳中復呂景初馬遵言宰相梁適皆罷職出外其後趙抃范師道言宰相劉沆亦罷職出外前年韓絳言富弼貶知蔡州今又唐介等五人言陳旭得罪斥逐諫臣非朝廷美事阻塞言路不為國家之利欲望召還介等置之朝廷以勸守節敢言之士秋七月甲午出內藏庫絹二十萬匹下河北助糴軍儲壬寅同知諫院司馬光以三劄子上殿其一論君德曰臣竊惟人君大德有三曰仁曰明曰武仁者非嫗煦姑息之謂也興教化修政治養百姓利萬物此人君之仁也明者非煩苛伺察之謂也知道誼識安危别賢愚辨是非此人君之明也武者非強亢暴戾之謂也唯道所在斷之不疑姦不能惑佞不能移此人君之武也故仁而不明猶有良田而不能耕也明而不武猶視苗之穢而不能耘也武而不仁猶知穫而不知種也三者兼備則國治強闕一則衰闕二則危三者無一焉則亡臣竊見陛下天性慈惠謹微接下子育元元泛愛羣生雖古先聖王之仁殆無以過然踐祚垂四十年而朝廷紀綱猶有虧缺閭里窮民猶有怨歎意者羣臣不肖不能宣揚聖化將陛下之於三德萬分一亦有所未盡歟臣伏見陛下推心御物端拱淵默羣臣各以其意有所敷奏陛下不復詢訪利害盡察得失一皆可之誠使陛下左右前後股肱耳目之臣皆忠實正人則如此至善矣或有一姦邪在焉則豈可不為之寒心哉伏望陛下以天性之至仁廓日月之融光奮乾剛之威斷善無微而不録惡無細而不誅則唐虞三代之隆何逺之有其二論御臣曰臣聞致治之道無他在三而已一曰任官二曰信賞三曰必罰國家御羣臣之道纍日月以進秩循資塗而授任茍日月積久則不擇其人之賢愚而置高位資塗相值則不問其人之能否而居重職非特如是而已國家采名不采實誅文不誅意夫以名行賞則天下飾名以求功以文行罰則天下巧文以逃罪陛下誠能博選在位之士使有德行者掌教化有文學者待顧問有政術者為守長有勇略者為將帥有功則增秩加賞而勿徙其官無功則降黜廢棄而更求能者有罪則流竄刑誅而勿加寬貸如是而朝廷不尊萬事不治百姓不安四夷不服臣請伏面欺之誅其三論揀軍言養兵之術務精不務多上以其一留中其二送中書其三送樞密院戒揀軍官八月庚申詔三館祕閣校宋齊梁陳後魏後周北齊七史書有不完者訪求之司馬光言臣切以赦書害多而利少非國家之善政也漢大司馬吳漢病篤光武親臨問所欲言對曰惟願陛下無赦而已王符亦曰今日賊良民之盛者莫大於數赦蜀人稱諸葛亮之賢亦曰軍旅屢興而赦不妄下然則古之明君賢臣未嘗以赦為美也伏望下中書今歲每歲疏決不過一次或早或晚或外人不可預期或遇親祀南郊之歲更不疏決永為定制庶幾為惡之人不敢指以自寬有所戒懼丁卯司馬光進五規一曰保業二曰惜時三曰逺謀四曰重微五曰務實保業略曰天下重器也得之至艱守之至艱王者始受天命之時天下之人皆我比肩也相與角智力而爭之智竭不能抗力屈不能支然後肯稽顙而為臣當是之時有智相偶者則為二力相參者則為三愈多而愈分自非智力首出於世則天下莫得而一也斯不亦得之至艱乎及夫羣雄已服衆心已定也人之性皆以為子孫萬世如泰山之不可搖也於是乎驕惰之情生驕者玩兵黷武窮泰極侈神怒不恤民怨不知一旦渙然四方麋潰秦隋之季是也惰者沈酣宴安慮不及逺善惡雜揉是非顛倒日復一日至於不振漢唐之季是也斯不亦守之至艱乎惜時略曰周易泰極則否否極則泰豐亨宜日中孔子傳之曰日中則昃月盈則食是以聖人當國家隆盛之時則戒懼彌甚故能保其令聞永久無疆也逺謀略曰詩云逮天之未陰雨徹彼桑土綢繆牖户逮天之未陰雨者國家間暇無災害之時也徹彼桑土者求賢於隱微也綢繆牖户者修敕其政治也謹微略曰宴安怠惰肇荒淫之基奇巧珍玩發奢泰之端甘言悲辭啓僥幸之除附耳屏語開讒賊之門不惜名器導僭逼之源假借威福授陵奪之柄凡此六者其初甚微日滋月益遂至深固比知而革之則用力百倍矣務實略曰夫安國家利百姓仁之實也保基緒傳子孫孝之實也辨貴賤立綱紀禮之實也和上下親逺邇樂之實也決是非明好惡政之實也詰姦邪禁暴亂刑之實也察言行試政事求賢之實也量材能課功狀審官之實也詢安危訪治亂納諫之實也選勇果習戰鬭治兵之實也實之不存雖文之盛美無為也丁亥御崇政殿策試賢良方正能直言極諫王介蘇軾蘇轍軾所對入第三等介第四等轍第四等次時轍對語切直胡宿力請黜之上不許曰求直言而以直棄之天下其謂我何乃收入第四等次及除官知制誥王安石疑轍右宰相專攻人主比之谷永不肯為詞韓琦笑曰彼策謂宰相不足用欲得婁師德郝處俊而用之尚以谷永疑之乎已而諫官楊畋見上曰蘇轍臣所薦也陛下赦其狂直而收之此盛德事也乞宣付史館上悅從之戊寅詔自今知州軍監知縣縣令有清白不擾而實惠及民者令本路監司保薦再任政績尤異當加奬擢閏八月庚子樞密使曽公亮為吏部侍郎平章事參知政事張忭為樞密使辛丑樞密副使歐陽修參知政事翰林學士胡宿為樞密副使羣臣多更張庶事以革宿弊宿曰變法古人所難不務守祖宗成法而徒紛紛無益於治也丁未司馬光奏臣曽三上章乞陛下早定繼嗣以遏亂源伏望取臣所上三章少加省察上時簡默不言雖執政奏事首肯而已聞光言沈思良久曰得非欲選宗室為繼嗣者乎此忠臣之言但人不敢及爾光曰臣自謂必死不意陛下開納上曰此何害古今皆有之因令光以所言付中書光曰不可願陛下自以意喻宰相是日光詣中書宰相韓琦問光今日復何所言光默計此大事不可不使琦知思所以廣上意者即曰所言宗廟社稷大計也琦喻意不復言九月癸丑詔三司如聞河北秋稼甚登其出內藏庫緡錢一百萬助糴軍儲壬戌知諫院楊畋司馬光等言故事凡臣僚上殿奏事悉屏左右內臣不過去御座數步恐漏泄機事詔自今止令御藥使臣及扶侍四人立殿角以備宣喚餘悉屏之司馬光復奏臣向者進説陛下欣然無難今寂無所聞此必有小人言陛下春秋鼎盛子孫當千億何遽為此不祥之事小人無逺慮特欲倉卒之際援立所厚善者爾唐自文宗以後立嗣皆出於左右之意至有稱定䇿國老門生天子者上大感悟曰送中書光至中書見琦等曰諸公不及今議異日夜半禁中出寸紙以某人為嗣則天下莫敢違琦等皆唯唯曰敢不盡力時知江州呂誨亦上言惟陛下思祖宗造宋之艱難監成安隳漢之基祚窒姦臣附會之漸絶後世窺覦之患早為定斷慰安人心冬十月知諫院楊畋言文臣七遷而內臣始得一磨勘其法不均宜如文武官例增其歲考畋為言事官顧以士人比閹寺議者譏其失職壬辰起復前左衛大將軍嶽州團練使宗實為泰州防禦使知宗正寺宰相韓琦等與同列奏事讀光誨二章未及有所啓上遽曰朕有此意但未得其人因左右顧曰宗室中誰可者琦曰此事非臣下敢言當出自聖擇上曰宮中嘗養子二人小者甚純然不慧大者可也琦請其名上曰名某今三十許歲矣議定將退琦復奏曰此事至大臣等未敢施行陛下今夕更思之來日取旨明日又啓之上曰決無疑也琦曰事當有所漸容臣等商量所除官時皇子猶居父喪乃議起復泰州防禦使知宗正寺上喜曰如此甚好琦又曰此事若行不可中止乞從內批上曰此豈可使婦人知之只中書行可也遂降此詔至和末上得疾文彥博富弼劉沆與王堯臣勸上早立嗣上既許之及疾愈寢其奏既而言者相繼范鎮司馬光所言尤激切包拯為中丞又力言之上未許言者亦稍怠琦一日取漢書孔光傳懷之以進曰漢成帝即位二十三年無嗣立弟之子定陶王為太子成帝中才之主猶能之以陛下之聖何難哉於是因光等言卒成上意壬寅嘉祐七年春正月乙亥詔太常禮院自今南郊以太祖皇帝定配改溫成皇后廟為祠殿歲時令宫臣以常饌致祭初諫官楊畋上言二后並侑欲以致孝也而適所以瀆乎享帝後宫有廟欲以廣恩也而適所以瀆乎享親請如禮官所議故降是詔初江湖漕鹽既雜惡又官估髙故百姓利食私鹽由是盜販者衆捕之急則起為盜賊虔州官糴鹽歲才及百萬斤朝廷以為患先是屯田貟外郎蔡挺知南安軍常條奏利害至是擢挺權提點江西刑獄使之制置挺令民首納私藏兵械以給巡捕吏卒令販黃魚籠挾鹽不及二十斤不以甲兵自隨者止論算交綱淮南既團新綱又捐糴價歲課視舊額增至三百餘萬斤盜販者稍稍畏縮朝廷以挺為能留之江西積數年乃徙久之江西鹽皆團綱運致如虔州焉權陜西轉運副使薛向言陜西之兵廂禁軍凡二十五萬其間老弱病患伎巧占數乃過半請下諸路揀其不任征役者汰之敢占伎巧者論如法從之樞密副使趙槩為參知政事權知開封府吳奎為樞密副使夏四月壬申改命起居舍人知制誥兼侍講司馬光為天章閣待制先是光與呂公著並召試中書光已試而公著終辭及除知制誥光乃自言拙於文辭本當辭召初疑朝廷不許故黽勉從命繼聞公著終辭得請臣始悔恨向者之不辭而妄意朝廷之不許也章九上卒改他官五月丁未朔命起居舍人司馬光仍知諫院光上疏曰竊以國家之治亂本於禮而風俗之善惡係於習上行下效謂之風薰蒸漸漬謂之化淪胥委靡謂之流衆心安定謂之俗及夫風化已失流俗已成則雖有辨智弗能諭也強毅不能制也重賞不能勸也嚴刑不能止也自非聖人得位而臨之積百年之功莫之能變也太祖太宗知天下之禍生於無禮也於是以神武聰明躬勤萬幾征伐刑賞斷於聖意然後人主之勢重而羣臣懾服矣於是剪削藩鎮齊以法度擇文吏為之佐以奪其殺生之柄覽其金穀之富選其麾下精鋭之士聚諸京師以備宿衛制其腹心落其爪牙使不得陸梁然後天子諸侯之分明而悖亂之原塞矣於是節度使之權歸於州鎮員之權歸於縣又分天下為十餘路各置轉運使以察州縣百吏之臧否復漢部刺史之職使朝廷之令必行於轉運使轉運使之令必行於州州之令必行於縣縣之令必行於吏民然後上下之敘正而紀綱立矣自是申明軍伍使自押官以上各有階級以相臨統小有違犯罪皆殊死然後行伍之政肅而士用命矣此皆禮之大節也故能四征弗庭莫不率服汛掃九州以陟禹之迹至于真宗重之以明德繼二聖之政宣布善化銷鑠惡俗以至于今治平百年此乃陛下當戰戰栗栗守而勿失者也臣竊見陛下有中宗之嚴恭文王之小心而小大之政多謙遜不決委之臣下誠所委之人常得忠賢則可矣萬一有姦邪在焉豈不危甚矣哉古人所謂委任而責成功者擇人而授之職業叢脞之務不身親之也至於爵祿廢置殺生豫奪不由已出不可也威福之柄失於人而習以為常則不可復收也此明主之所謹也自景祐以來國家怠於久安樂因循而務省事執事之臣順行姑息之政於是胥吏喧譁而斥逐中丞輦官悖慢而廢退宰相衛士凶逆其獄不窮姦澤加於舊軍人罵三司使而法官以為非犯階級凡此數者皆非所以習民於上下之分也於是元帥畏偏禆偏禆畏將校將校畏士卒姦邪怯懦之臣至有簡省教閲使之驕惰保庇羸老使之繁冗屈撓正法使之縱恣詆訾粟帛使之憤惋彼既為之則此效之下既言之則上從之前既行之則後襲之茍彼為而此不效下言而上不從前行而後不襲則怒怨聚於其身而禍亂生矣夫祖宗苦身焦思以變衰唐之俗陛下髙拱熟視以成後魏之風此臣所以為陛下痛惜也又上疏論財利曰在隨材用人而久任之在養其本原而徐取之在減損浮冗而省用之己未知荆南府李參為羣牧使執政初議欲用參為三司使孫抃獨不可曰此人若主計外臺承風刻削則天下益困弊矣乃不果用六月癸未單州團練使劉永年為汝州團練使知代州敵人取山木積十餘里輦載相屬於路前守懼生事不敢遏永年曰敵伐木境中而不治他日將不可復制遣人縱火木盡焚之上其事帝稱善敵移文代州捕縱火盜永年報曰盜固有罪然木在我境何預汝事敵不敢復言秋七月太常禮院言皇祐參用南郊百神之位不應祀法宜如隋唐舊制設昊天上帝五方位以真宗配而五人帝五官神從祀餘皆罷又當時嘗停孟冬之薦今明堂去孟冬祀日尚逺請復薦廟前者祖宗並侑今用典禮獨配前者地祗神州並享今以配天而亦罷是皆變禮中之大者也開元開寶二禮五帝無親獻儀詔恭依而五方帝亦行親獻丁卯右衛大將軍嶽州團練使宗實辭泰州防禦使知宗正寺不許八月韓琦與歐陽修等私議曰宗正之命既出外人皆知其為皇子矣不若遂正其名修曰知宗正寺告敕付閣門得以不受今立為皇子止用一詔書事定矣遂入對乞聽宗實辭所除官上曰勿更為他名便可立為皇子明堂前速與了當琦因請諭樞密院張忭至曰陛下不疑否上曰朕欲民心先有所係屬忭即再拜稱賀琦等乞帝書手札付外施行丁丑琦召翰林學士王圭令草詔圭請對言此大事也後不可悔上指心曰此決自朕懷卿何疑焉乃再拜退而草詔以進己卯詔曰右衛大將軍嶽州團練使宗實皇兄濮安懿王之子猶朕之子也少鞠於宮中而聰知仁賢見于夙成夫立愛之道自親者始固可以厚天下之風而上以嚴宗廟也其以為皇子乙酉詔太常寺登歌用柷敔先是翰林學士王圭言郊廟升歌之樂有金石絲竹匏土革而無木音宜詔有司考樂之失而合八音之和於是下禮官議而增置之辛丑皇子以肩輿入內初讓宗正與記室周孟陽謀之及立為皇子猶固稱疾孟陽入見曰太尉稱疾堅卧其義安在皇子曰非敢徼福以避禍也孟陽曰假如得請歸藩遂得燕安無患乎皇子撫榻而起曰吾慮不及此遂入內良賤不滿三十口行李肅然有書數厨而已中外聞之相賀九月乙巳朔以皇子為齊州防禦使進封巨鹿郡公龜鑑曰前星未耀少海尚虛選四歲宗子養之禁中是以得儲二之義時皇祐之四年上之春秋二十有八也先是太常博士張述入疏凡二語雖激厲玉音嘉納繼是吳及言之趙抃言之歐陽修言之文彥博富弼劉沆又言之諫官御史相率以盡言而司馬雖以井州通守亦越職而言事其間如范蜀公自知諫院以至罷言職前後上章凡十九次吾觀君實與鎮書言此大事不言則已言一出豈可復反願公死爭之既而蜀公入對溫公召還前後奏疏未嘗不以國本為慮蜀公待罪百日鬚髮為白其為心至忠切也上亦泣曰朕知卿言是當更俟三年久之蜀公又曰陛下許臣復三年矣願早定大計溫公反覆執奏且謂向者進説陛下欣然無難今寂無所聞此必小人以子孫千億之言間陛下也門生國老之戒言人之所難言何切哉至和六年各起復知宗正寺之命始下矣英宗之為皇子也封防禦使則辭封巨鹿郡公則辭封皇子則又辭凝靜謙退蓋得於內學涵養之餘末年韓魏公贊決大計斷以不疑之語安可中輟之言自是元良之位正焉親受大統雖我魏公定策之勳而聖心蓋亦先定也休哉此事安可與婦人知之戒決自朕懷非由大臣之諭聖謨洋洋真可為後代之龜鑑也辛亥大饗明堂大赦冬十月度支員外郎蔡抗為廣東轉運使先是岑水銅冶大發官市諸民止給空文姦民無所取資羣聚私鑄與江西鹽盜合郡縣患之抗曰採銅入官而不畀其直又從而誅之豈但民犯法也因命銅入即償直民盡樂輸私鑄遂絶畨禺歲運鹽給英韶二州道回逺多侵竊雜惡抗命十舟為一運使攝官主之歲終會其課以為殿最是歲鹽課增十三萬緡乙未詔天下常平倉多所移用而不足以支凶年其令內藏庫與三司共支緡錢一百萬下諸路助糴之十二月丙申幸龍圖天章閣召輔臣近侍三司副使臺諫官皇子宗室駙馬都尉主兵官觀祖宗御書又幸寶文閣為飛白書分賜從臣下逮館閣作觀書詩韓琦等屬和遂宴羣玉殿庚子再會于天章閣觀瑞物復宴羣玉殿上曰天下久無事今日之樂與卿等共之宜盡醉勿辭又召韓琦至御榻前别賜酒一巵從臣霑醉至莫而罷是歲冬無氷癸卯嘉祐八年春正月己酉翰林學士范鎮知貢舉二月癸未上不豫丙戌中書樞密院奏事於福寧殿之西閣見上所御幄帟禋褥皆質素暗敝久而不易上顧韓琦等曰朕居宫中自奉止如此爾此亦生民之膏血也可輕費之哉三月甲子御延和殿賜進士許將等一百二十七人及第六十七人同出身諸科一百四十七人及第同出身乙丑以聖體康復宰臣拜表稱賀辛未晦上暴崩于福寧殿夏四月壬申朔輔臣入至寢殿啓皇后召皇子入使嗣立皇子驚曰某不敢為某不敢為因反走輔臣共執之召翰林學士王圭草遺制韓琦宣遺制英宗即皇帝位見百官於東楹帝欲亮陰三年命韓琦攝冢宰輔臣皆言不可乃止癸酉大赦除常赦所不原者呂中曰仁宗在位四十二年天下安樂惟仁治而已唐介以是進言於英宗則願其善繼仁宗豐功盛德不可名言而所可見者五事所以為仁范祖禹進言於哲宗則願以為法又曰我國家之有天下強不如秦富不如隋形藝不如漢土地不如唐所恃者人心而已太祖基之太宗真宗培之至我仁祖四十二年深仁厚德滲漉天下刑以不殺為威財以不蓄為富兵以不用為功人才以不作聰明為賢以寬厚待民以恩禮待士夫而以至誠待夷狄故熙寧以後民不敢怨靖康之時民不忍叛者皆我仁祖之功此蘇忠公所以謂社稷長逺終必賴之者誠確論也乙亥羣臣表請聽政不從改名部署曰總管先是輔臣奏事上裁決當理中外皆稱明主是日晚忽得疾語言失序韓琦與同列入白太后下詔候聽政日請太后權同處分從之壬午輔臣入對於柔儀殿西閣皇太后御內東門小殿垂簾聽政司馬光上皇太后疏曰羣生無福大行皇帝奄棄天下皇帝繼統往者大行皇帝嗣位之初章獻明肅皇太后保護聖躬於趙氏實有大功但以自奉之禮或崇重太過外親鄙猥之人或忝汚官職左右讒諂之人或竊弄權柄此所以負謗於天下今殿下初攝大政大臣忠厚如王曽清純如張知白剛正如魯宗道質直如薛奎者殿下當信之用之鄙猥如馬季良讒諂如郭崇勳者殿下當疏之逺之若趙氏安則百姓皆安況於曹氏必世世長享富貴明矣趙氏不安則百姓塗地曹氏雖欲獨安其可得乎乙酉作受命寶命歐陽修篆其文曰皇帝恭膺天命之寶熒惑自七年八月庚辰夕伏積二百四十九日命輔臣祈禳於集英殿己丑晨見東方戊戌司馬光上疏曰今者聖體痊平初臨大政四方之人拭目而視傾耳而聽舉措云為不可不審夫為政之要在於用人賞善罰惡而已三者之得則逺近翕然向風從化可以不勞而成無為而治三者之失則流聞四方莫不解體綱紀不立萬事隳頺治亂之原安危之機蓋在於是五月右司諫王陶充皇子位伴讀屯田員外郎周孟陽祕書丞孫思恭充皇子位説書司馬光言臣聞三代令主置師傅保以教其子又置三少與之燕居至於前後左右侍御僕從之人皆選孝弟端良之士逐去邪人毋得在側使之日見正事聞正言然後道明而德成心俞而體安福被兆民功流萬世此教之所以為益也今王陶等雖為皇子官屬若不日日得見或見而遽退左右前後侍御僕從或有佞邪讒巧之人雜處其間則親近易習積久易遷諂諛易入詐偽易惑如此則雖有碩儒端士為之師傅終無益也伏望陛下多置皇子官屬博選天下有學行之士以充之使每日在皇子位與皇子居處燕遊講論道義聳善抑惡輔成懿德如此則必進德修業日就月將善人益親邪人益疏誠天下之大幸也戊辰皇子仲針仲糾始就東宮聽讀六月癸巳司馬光上太后及帝疏曰竊惟今日之事皇帝非皇太后無以君天下皇太后非皇帝無以安天下兩宫相恃猶頭目之與心腹也萬一姦人欲有開説涉於離間者當立行誅戮以明示天下帝初以憂疑得疾舉措或改常度其遇宦官尤少恩左右多不悅者乃共為讒間兩宮遂成隙太后對輔臣嘗及之韓琦因出危言感動太后曰臣等只在外見得官家內中保護全在太后若官家失照管太后亦未得安穩太后驚曰相公是何言自家更切用心琦曰太后照管則衆人自然照管矣同列為縮頸流汗或謂琦曰不太過否琦曰不如此不得間有傳帝在禁中嘗失事衆頗惑之琦曰豈有殿上不曽錯了一語而入宮門即得許多錯琦固不信也傳者亦稍息龜鑑曰母子之間人所難言自魏公一倡而歐陽修繼之呂誨王疇繼之司馬光又數數繼之既以保佑之語勉太后又以順承之語勉天子幸也慈聖以慈稱英宗以孝聞非魏公之功而誰功蓋亦偉矣然魏公雖有其功而不自有其功他日門人親客燕坐從容語及定䇿事公正色曰此仁宗神德聖斷為天下計皇太后母道內助之力朝廷定議久矣臣子何預焉勞而不伐有功而不德公之襟量蓋可想見久旱喜雨詩曰須臾慰滿三農望却斂神功寂若無公之口不言功於此見之矣秋八月庚辰王圭議上大行皇帝諡曰神文聖武明孝廟號仁宗司馬光言人君之職有三而已量材而授官一也度功而加賞二也審罪而行罰三也材有短長故官有能否功有髙下故賞有厚薄罪有大小故罰有輕重此三者人君所當用心九月辛亥皇子光國公仲針為忠武節度使同平章事淮陽郡王賜名頊冬十月甲午葬仁宗皇帝於永昭陵十一月丙午祔仁宗神主于太廟廟樂曰大仁之舞以王曽呂夷簡曹瑋配享廟庭方帝疾甚時云為多錯往往觸忤太后韓琦歸自陵下太后遣中使持一封文書付琦琦啓之則帝所寫歌詞并宮中過失事琦即付使者焚毁及進對簾前太后嗚咽流涕具言之且曰老身殆無所容須相公作主琦曰此病故爾病已必不然子病母可不容之乎太后不懌歐陽修繼言曰昔溫成驕恣太后處之裕然何所不容今母子之間反不能忍邪太后意稍解他日琦等見上上曰太后待我無恩對曰自古聖帝明王不為少矣而獨稱舜為大孝惟父母不慈愛而子不失孝乃可稱爾政恐陛下事太后未至父母豈有不慈愛者上大悟自是亦不復言太后短矣十二月己巳始御延英閣召侍讀侍講講論語讀史記劉敞讀史記至堯授舜以天下因陳説曰舜至側微也堯越四嶽禪之以位天地享之百姓戴之非有他道惟其孝友之德光于上下何謂孝友善事父母為孝善兄弟為友辭氣明暢上竦體改容知其以諷諫也左右屬聽者皆動色太后聞之亦大喜庚辰命翰林學士王圭賈黯范寧修仁宗實録集賢校理宋敏求直祕閣呂夏卿祕閣校理韓維兼充檢討官宋史全文卷九下
