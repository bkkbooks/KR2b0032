body:
  text: 宋史全文卷三十五宋理宗五甲寅寶祐二年正月乙未上諭輔臣曰李曽伯報北兵犯利州築城已就不可坐視方叔奏當令余晦隨冝驅逐潭州以湘潭縣民陳克良孝行聞詔旌其閭二月甲辰命太常釐正秦檜諡上因諭輔臣曰雖諡繆狠亦可方叔奏卞等亦冝改諡乙巳上諭輔臣劒已城利不可不作急措置方叔奏已詳報蜀閫增劒利之戊未可直與爭也詔二廣吏多貪黷以去天逺而民無告也令吏部考核嘗仕廣而以貪黷免者勿令再任著為令三月戊寅申嚴本路人不許授諸司屬官其已注授者並令改授壬午王元善自北來歸元善凡三使留七年至是始歸戊子詔蠲江淮州軍今年二稅己丑録襄城捍禦功髙達王登程大元李和各進職增秩餘補轉有差辛丑上諭輔臣謝奕修服除且以郡豫之方叔奏年來戚里豫郡太多祖宗時官髙者必換右蓋有深意上曰戚里正卿以上即換右班此典故也四月辛亥詔邉兵頗貧聞邊上多有閒田擇其田之近便依險者分給軍人以耕乙卯上諭輔臣謝奕修干郡朕不欲從內批出可從公將上方叔奏此意甚公己未詔以季秋有事于明堂庚申上問輔臣外間所聞方叔奏外論皆以謝堂兼江西提舉恐自此外戚緣例者多反費陛下區處乙丑以徐清叟知樞密院兼參知政事董槐參知政事己巳四川制司申辟隆州守臣上曰武將作郡當戒貪虐令其撫摩遺民此在於制閫留意六月壬寅朔罷臨平鎮稅戊申殿中侍御史吳燧言故蜀帥余玠聚斂罔利家有埒國之富玠死其子如孫一空帑庾之積而東宜簿録其財以為蜀用有詔責如孫輸以助蜀甲寅上諭輔臣蜀事宜早區處方叔奏向來亦有京閫兼制者上曰正欲如此不可緩以李曾伯為資政殿學士依舊節制四川邊面以賈似道同知樞密院事職任依舊丙辰上諭輔臣利州王佐堅守孤壘屢挫北鋒其忠可嘉方叔奏此城正介寶峯苦竹隘間佐以忠自奮南永忠薄其城下佐罵擊之永忠流涕而退真忠臣也詔王佐更進一官先是南永忠守隆慶率其屬以城歸北教授鄭炳孫先縊死其妻女乃朝服自經癸亥上曰鄭炳孫死節可嘉其議旌恤贈朝奉郎直袐閣訪其子官之録行在係囚丁卯上諭輔臣淮東馬政修舉若足供戰騎其勢頗壯方叔對曰觀其分牧邊郡之說區處亦是戊辰召余晦赴行在蠲利閬隆慶潼川綿州賦役閏六月壬申董槐抗疏蜀事孔棘已犯臨戰易將之戒此臣子見危致命之日也而上下牽制曽未有出身當此任者願假臣宣撫之名置司夔門以通荆蜀之氣脉上優詔答曰士大夫以議論求勝者多以事功自勉者鮮朕為人才世道憂之卿深念蜀事慨然請行足見忠壯然經理西事當在廟堂更宜勉竭謀猷以副委任以蒲擇之為軍器監丞暫充四川制置權司職事甲戌命包恢為浙西提㸃刑獄招捕鹽冦壬午以李曽伯為四川宣撫使兼荆湖制置大使詔四川事力愈單須合荆閫乃可運掉冝趨李曽伯進司夔路區處規模務要速定己亥罷江灣浮鹽局七月己巳詔前蜀帥政事無狀兵苦於征戍民困於流離朝廷以吏議使其家輸所取蜀財為犒軍賑民用其蠲近邊州郡租賦三年龜鑑曰減租薄賦寬役省征古人所以厚民也蜀氛方解而封家之財當散也明矣而聖詔撫諭實欲並邊之民悉鐲田租塞下之居盡蠲年稅以為休養生息之地則耕種可不廢而邦本可以寧邊烽未息而餞寒之氓當撫也久矣而聖訓宣諭且念錢引輕而小者冝增賦斂重而多者冝減以為貸給新復流離之計則關征可少寬而民力可以阜寬征薄賦之意如此豈非得古人厚民力之美意乎丁未上諭輔臣昨觀雲南備䝉古節次果能自立方叔奏荆蜀所報雲南尚可支吾廣右之𫝊雖未得實不容不嚴其備己酉詔以思播兩州連年捍禦其守臣田應寅楊文各進一秩同知樞密院事兩淮制置大使賈似道乞照陳韡出使湖南例以行府為名從之甲寅太常議故光祿大夫賈涉諡曰忠肅涉似道父也壬戌以湖北安撫知峽州吕文德總統江陵漢陽歸峽襄郢軍馬事暫置司公安上下應援八月辛未朔上諭輔臣江塘事畢聞軍中科居人草薦不容不還其直方叔奏陛下不遺微小敢不祗若休命癸酉詔以王惟忠付大理獄尋命臺臣涖鞫丁丑以謝方叔為明堂大禮使徐清叟禮儀使董槐儀仗使李性𫝊鹵簿使希塈橋道頓遞使癸未董槐奏邇者陛下察貢獻之無藝慮並緣之害民申飭內司諸有以田及木獻者勿納切讀聖訓可以弭灾召和上曰自今修造買木仍付兩司丁亥詔曰昨者屢降訓亷抑貪之㫖以敕中外凡屬攸司所當遵守近聞有不畏刑法之人輒倚聲勢公肆掊斂借名貢獻實在營私豪民富室本無愆尤吹毛求疵反致其罪甚至搶財籍産無所赴訴怨及於上利歸於已有纍官府孰甚於斯所合嚴行告示敢有復蹈前轍重置典憲必罰毋赦己丑詔諸局進書癸巳謝方叔等上七朝經武妥略中興四朝志𫝊今上皇帝玉牒日厯㑹要丁酉特進觀文殿大學士醴泉觀使信國公趙葵上疏臣昨辭相位退居長沙今蜀事孔艱思報恩紀乞申溧陽居正之命庶便驅䇿內批卿世濟其美諳練邊籌夙著勳勞朕所嘉賴茲覽來奏備見忠軌伏自壬子以來狄難孔熾今安西之壘雖復而寶峯之寇未退朕嘗軫憂卿既慨然體國且許為朕一來尤見一飯不忘君之義卿可趨裝過溧陽以便咨訪凡有所見無靳奏陳九月甲辰以久雨出封樁庫十八界楮幣二十萬賑三衙諸軍己酉以明堂大禮奏告天地宗廟社稷朝獻景靈宫庚戍饗于太廟辛亥大饗于明堂赦天下乙卯荻浦寇平憲臣包恢進二秩升直龍圖閣都統劉達授橫行帶遙郡丙辰莊文太子府改授春秋己未以尤焴為端明殿學士提舉祕書省兼侍講提綱史事壬戍詔皇子年方志學儼若成人節届履長欲行冠禮令有司討論典故以聞癸亥詔以景靈宫恭謝畢詣西太一宫為國祈祥起居郎牟子才諫而止詔朕惟祖宗盛時待遇近戚自有定法比年以來近戚文臣合干堂者不干堂合部注者不赴部夤緣私謁以希批降請求日盛是致人言故茲戒飭繼今如或仍前干請别有施行龜鑑曰后家遵繩示無黨勢求郎不許內無幸恩此抑外戚之成憲也而理宗勸親一意亦素依乎道理之所宜者考祖宗待近戚之定法而干請不行未嘗之開覬幸之門以滋濫分之弊革近年近戚干堂部注弊而夤緣不行未嘗希批降之㫖以重添換之冗少保之命若私懿親也然威儀有則寵利弗居雖畀以髙牙大纛而不慚都尉之除亦疑其為私戚屬也然􅯆㦸三世琳琅一門雖寵以環尹副騑而奚私是意也其得東漢抑外戚良法歟丁卯太白晝見十月庚午朔謝方叔等進寶祐編類吏部七司續降條令各進一秩癸酉詔皇子永嘉郡王進封忠王上諭輔臣曰皇子加封忠王忠字意義甚好宰執奏忠之義極廣大孔門道統相𫝊不過忠恕二字忠者體而恕者用忠者天道恕者人道盡已之謂忠推已之謂恕如周家忠厚成福祿與夫教忠之意皆在其中矣上曰可令以此意為批答乙酉詔皇子忠王授崇慶軍節度使印忠王之印戊子詔皇子忠王冠禮以徐清叟為賔師珍主之辛卯詔李曾伯進司重慶其京湖職事令吕文德主之斬王惟忠于都市丁酉刑部侍郎兼樞密都承㫖潘凱言王惟忠以助余玠附余晦既伏鑕東市而玠全死後之華晦逭去後之責何以昭平明之治服四蜀之心詔奪玠資政殿學士職名追晦刑部侍郎告命戊戍太常議故直顯謨閣劉宰諡曰文清十一月庚子朔以皇子忠王加冠禮命從臣詣景靈宫奏告天地祖宗壬寅日南至御大慶殿受朝賀次御文德殿行皇子忠王冠禮賜字邦壽丙辰上諭輔臣近報光化事體如何方叔奏增築光化在江漢之北欲以溫和守光化令在鬲奴堡對江與之相持均州據光化上流已令增兵為備詔溫和差知光化軍命從臣禱雪于天竺山壬戍太常議工部侍郎曾􅀈諡曰文莊癸亥上諭輔臣昨欲用一人知道州如何方叔奏不可衝下次人槐奏不如一守祖宗典故凡近戚惟以髙官厚祿使之奉祠為妥十二月己巳朔殿中侍御史吳燧言州縣財賦版籍不明近行經界既已中輟欲令州縣下屬縣排定保甲行手實法詔先令兩浙江東西湖南州軍行之丁丑詔蒲擇之以原職兼四川宣撫司判官辛巳詔户部支諸軍雪寒錢出戍之家倍給癸未詔皇子禥年當志學既冠之後冝親近師儒開道德性所讀四書書易皆當精熟至於古今治亂之迹尤冝講明樞密院言知利州王佐申叛臣南永忠部下官兵周德榮能守正效忠密約統制段元鑑入隘解圍為南執縛屠割抗聲詈罵而死詔周德榮特贈七秩仍立廟官其子丙戍上曰一雪可喜天機轉移其速如此方叔奏日間聖語以雪未應為憂今聖德感召願益堅對越之心上悚然納之戊子賜喜雪宴己丑詔效忠順化保節守義懷德歸仁慕治功臣靜海軍節度觀察處置使特進檢校太尉御史大夫上柱國安南國王陳自煚以明堂恩加封奉正功臣詔安西堡解圍其將士褒賞外令宣司下隆慶守臣段元鑑應官民曾資給戰士或屈身助守禦者併保明推賞仍普犒在城居民一次免租賦五年內批皇子忠王既加元服令赴朝參嗣歲之春擇日出閣令內司指引仍令臨安府轉運司於閣中修蓋位次一所庶幾密邇於宫庭可以問安而視膳乙卯寶祐三年正月庚申上諭輔臣曰均州城築糧餉既艱先築龍山亦便方叔等奏龍山高險下瞰舊均已趨京湖留司調兵修築壬戍知澧州趙師簡朝辭奏公族世系日衍尚未增立字號詔以宗正寺擬定用冝季次紹五字於大由交嗣甫字下續之癸亥榮文恭王府改授禮記甲子上諭輔臣馬光祖措置銅錢舊楮如何方叔等奏以鹽收敝楮已合事宜但錢未流通耳丙寅皇子忠王出閣二月戊辰朔詔禮部貢舉庚午詔尤焴免奉朝請半月一赴經筵進讀専令精意史事毋為他事所奪乙亥詔撥封樁庫十八界㑹一十萬銀二千兩付李夢庚措置襄陽屯田己卯兩淮制置大使賈似道興復廣陵堡城以圖來上詔奬之庚辰詔令宗正少卿歲舉宗學官選人一員壬午上諭輔臣廣西之𫝊如何方叔奏果有斡腹之謀當亟修武備以防之都省言宣閫入蜀首議奉行詔㫖恤民之意冝多支糴本以寬民力詔撥封樁庫十八界㑹二百萬専充四川行使乙酉詔撥官誥祠牒新楮香鹽付臨安府守臣馬光祖收換敝楮三月甲辰上曰廷臣奏疏及邊事者𫝊播於外殊有關繫方叔奏陛下許其盡言而不使之𫝊播聖慮可謂周密己酉詔沿邊屯田自有課入登羡者其管幹官並推賞癸丑上問自實之法施行如何方叔等奏自實即經界遺意惟當檢制吏奸寬其限期行以不擾而已以吳淵為觀文殿學士京湖制置大使知江陵府己未雨土癸亥上諭輔臣胡頴欲改築宜城亦可從之方叔奏斡腹之報於雍冝築得城堡亦無窮之利也賜故觀文殿大學士贈少保范鍾諡曰文肅四月庚午朝獻景靈宫蜀郡地震癸酉上諭輔臣近日流民無他否方叔奏數年來流民在江南者皆已安業丁丑以陳顯伯兼資善堂贊讀陳堅兼直講己卯上曰朝廷紀綱法度不可不謹方叔等奏陛下動循法度臣等敢不敬承辛巳上諭輔臣聞刑獄多有寃濫方叔等奏不特寃濫且有淹滯當時加申警癸未考功郎官洪勳輪對奏至杜衍封還事上曰朕每諭丞相事有不可行者但繳奏來甲申上諭輔臣三邊之事卿等冝及時區處方叔等奏首當以此勉諭諸閫五月丙申朔上諭輔臣彭州乃江面緊要去處印應飛不勝任當别選人方叔奏黃州昨除張勝今尚權鄂州曷若以厲文翁為之乎辛丑上諭輔臣近來士風未純文體太浮冝思所以轉移之方叔等奏考官命題主意先自穿鑿士子希意從之科舉在近當行下約束甲辰以久雨至丙午上諭輔臣修築江岸軍兵不易聞補工值雨多不給食可令特支方叔等奏此事亦關聖心諸軍寧不歡躍容以聖意諭之詔出封樁庫十八界㑹二十萬給三衙諸軍賑臨安府民户亦如之甲寅詔趙汝騰除翰林學士知制誥兼侍讀七月癸丑以吕文德知鄂州節制鼎禮辰沅靖五州丙辰謝方叔徐清叟罷臺臣朱應元之言也詔三省密院機政令董槐程元鳳輪日當筆共議取㫖詔曰朕自往年二相並命正欲其內安社稷外攘四夷為己任也然而各分朋黨互相傾軋無房杜相濟之美有牛李角立之風天變人事日以薦臻採之公論咸謂潛之所致吳潛既退固冝天人協應而方叔獨相固冝忠以輔朕也今則依附取容殊無蹇蹇之節持祿固位而乏諤諤之忠政以賄成官非德選諸子無藉恬然而不知二邊阽危懵然而莫恤昔吳潛之未去責猶可諉者今吳潛去已久矣責將誰歸方叔冝當之矣況皇天示警戒之異臣庶有交奏之章不奪方叔之相權則是朕躬之有罪爾槐爾元鳳尚鑒兹哉自今以至於後其一乃心以輔豫一人毋若方叔之負朕也己未上諭輔臣近來州縣贓吏甚多不可不嚴其禁槐奏藝祖朝有流竄或杖死者元鳳奏髙宗朝必籍記姓名不復録用上曰籍記今可舉行壬戍上問浙右被水處已盡退否槐等奏聞毗陵已退然田禾僅可半收上曰毗陵視諸郡最低可與檢放以謝方叔為觀文殿大學士提舉臨安府洞霄宫八月乙丑朔以董槐為右丞相兼樞密使程元鳳為簽書樞密院事兼權參知政事蔡抗為端明殿學士同簽書樞密院事丙寅上諭輔臣朕以今日多事選用卿等冝一心體國凡紀綱未振人材未萃民生未裕邊備未飭皆為急務冝加之意槐等奏敢不竭心盡力仰報擢用之意但乍當事任典故未熟望陛下明賜訓曉上曰然朕有區處未盡卿亦毋隱以徐清叟為資政殿大學士提舉隆興府玉隆萬壽宫庚午上諭輔臣三邊之事卿等冝及時區處槐等奏首當以如此勉諭諸閫上曰閫外之寄廟堂只當擇人豈可遙制槐奏前日之病正坐此丙子以鄭性之薨輟視朝辛巳上諭輔臣今日邊頭多事卿可與諸閫開心用情勉其留意備禦槐等奏已作書示此意其他機括所係却容隨事區處戊子上曰紀綱法度須當謹守以革弊例朝士遷除各守滿歲之法如先朝臣寮奏請遷轉格式可討論以聞槐等奏此法固可革躁進之風但拔擢人材又不可拘此上然之都省言兩淮制臣賈似道調遣兵將攻𠞰舊海賊兵生擒僞元帥宋贄俘獲尤衆詔奬之辛卯以應㒡薨輟視朝九月乙未上諭輔臣昨日繳進黎州報雲南果有韃兵槐奏今日之事惟當選將擇守積粟練兵以為備禦計丁酉上曰軍政所當講明諸州禁軍不許差借法也冝嚴戒之槐等奏當先拘令教閲精加選擇以備緩急之用仍嚴占借之禁上然之己亥上諭輔臣銓法不可不申嚴槐等奏但用法不用例自然無弊庚子上諭輔臣近日施行內侍何郁豈可復留合與勒停槐等奏聖斷如此不惟可以戢奸亦可以服中外心上曰監司守令當思所以激勵之則人知所勸槐奏敢不奉承聖訓丙午上曰近觀臣寮奏疏云事當謀之大臣朕未嘗不與卿等謀如有未當且許執奏卿等亦可自相資益槐奏儻有愚忠奚敢有隱元鳳奏臣等雖不敢立異亦不敢茍同上然之庚戍詔淮哨在境邊防正嚴沿江副閫豈容久虛已差厲文翁可趨之任壬子上諭輔臣趙葵二劄言邊事不茍槐等奏今日事勢不可以安危論直當以存亡論亦不須如此憂懼然必內外協心圖之如范蠡大夫種分任國事可也甲寅以陳顯伯兼資善堂翊善皮龍榮兼贊讀乙卯上曰楮幣何以救之槐奏以臨安府酒稅專收破㑹解發朝廷逐旋焚毁官司既可通融民間自然減落上然之曰朝廷以為重則人自厚信榮文恭王府改講語孟庚申上諭輔臣連日雨寒恐妨收刈今得晴可喜槐奏陛下拳拳農事如此天意必順十月庚午詔撥封樁庫㑹子一十三萬犒殿步司教閲精勇軍其衣裝器具悉從官給甲戌上諭輔臣邊郡闕守宜早選補若未知其人則令堂審槐奏審而後差尤見公選之意癸未詔永蠲紹興府和買絹十一月乙未皮龍榮進對奏畢上詳及資善事龍榮奏忠王天資過人若無他嗜好倍加保養尤為有益儒臣盡職分於外望陛下以身教之於內上曰更須留意壬寅董槐奏昨日繳進步司養馬人姓名偶有不避御舊名一字者軍司固所當懲臣等亦不勝悚懼上曰臨文不避只令更名足矣甲辰上諭輔臣思播當嚴為備槐等奏已力諭宣制兩司令結其心助其力為表裏備禦之計丙辰上諭輔臣今邊備為急當無日不討論某將當擇某兵當調某處當屯某財當理如救頭目可也槐等奏此皆臣等所當究心上勞聖慮如此敢不惜日力以圖之十二月戊寅上諭輔臣斡腹之𫝊已久今歲措置才有頭緒施黔一路亦是要害合為之防槐等奏向日所言施黔珍南平四郡置一副帥屯兵守險正謂是也庚辰上諭輔臣朕夜來反覆思之當選一猛將提萬兵於施黔以上為控扼計前言雲拱如何槐等奏雲拱亦肯任事如南平據險置司則沅靖可無透漏之虞須先措置調兵方可上曰可與淮西科五千人仍度何所屯駐何所給餉即令理㑹可也甲午上諭輔臣蜀報敵勢頗重間雖小捷未聞有敢與一戰者冝大明賞罰以激勸之槐等奏當明立賞格行下丙戌上諭輔臣制敵以兵為急養兵以財為先今調遣方殷理財不可緩已諭令曽頴茂崇潔任責可更資之丁亥上諭輔臣朝士有蜀人曉邊事者可令條具備禦之策恭考而用戊子雪董槐奏陛下懋德積忱上通于天瑞雪應時固遺蝗入地宿麥連雲之證今西事未寧將士暴露乞免表賀賜宴從之丙辰寶祐四年正月癸巳朔御大慶殿受朝賀詔曰朕儀圖治功宵旰在念適時多艱未稱朕意威令玩而不肅紀綱翕而不張財計匱而生財之道蔑聞民力窮而剝民之吏自若敵非果彊特自未有以振國勢兵非不多特莫知所以計軍實捨法用例已非矣有元無例而旁引以遂其干請之私其何以窒幸門塞蠧穴乎望治雖勤課功愈邈毋怪也歲律云始泰道方開咨爾二三大臣警于有位俾精白一心各揚乃職務循名而責實勿假公而濟私以弼成朕內修外攘之功則豫汝嘉辛亥詔京湖制置大使兼夔路䇿應使吳淵遇軍戎急切許用便冝如可俟報仍舊申審甲辰上諭輔臣試閣職止兩名立為定格非武舉前名更不召試丁巳以禮部侍郎權吏部尚書陳顯伯知貢舉權刑部侍郎兼給事姚希得國子祭酒權修注官戚士遜同知辛酉詔史嵩之除觀文殿大學士依前永國公致仕二月甲子上諭輔臣蜀中一捷甚偉自此益加警備不可一日少緩丙寅史嵩之復職學舍有言但慮其復出耳其人決不再用其職度不可奪戊午雨雹庚午以久雨詔臨安府發平糴倉米二萬石賑糶甲戌上諭輔臣曰聞所在民生蕭條守臣不可不擇亦不可數易詔三省樞密院六部遵照已降御札應捨法用例等事悉警革之丙子以襲封衍聖公孔洙特添差通判吉州不釐務庚辰上曰連雨未巳槐奏臣等輔治無狀願賜罷出以答天譴上悚然曰此由朕之不德卿等可相與舉行實政以格天心如聞諸路多有滯獄可嚴行戒飭詔監司州郡決係囚毋得淹延獄官毋得兼僉以妨本職再撥平糴倉二萬石損價接糶出封樁庫楮幣二十萬令殿步馬司給犒其大理寺三衙臨安府屬縣諸酒庫所見監贓賞錢悉蠲之命從臣禱于天竺山癸未槐奏前日陰雨陛下惻然念及軍民而賑恤之且有引咎之言旋即開霽所謂禹湯罪已其興也勃焉元鳳奏天人感應甚速望益加聖心上曰敢不益加敬畏詔舉亷吏詔令宣使核實凡戰多者死事者疾速條上推賞被兵之地流離之民一應科征悉與停免三月丁酉詔與芮為太傅依前武康軍節度使萬夀觀使嗣榮王庚子上曰今日兵財為急招兵已將及數理財尚恐隱漏槐奏近創安邊太平庫拘榷頗明壬寅詔蒲擇之權兵部侍郎四川宣撫制置使兼知重慶府著作佐郎兼資善堂直講鄭雄飛輪對奏畢上問皇子讀書如何雄飛奏皇子天姿聰明嘗輯録聖訓一日以示臣陛下貽訓正大明切皇子又能謹藏習誦之上曰能如此庚戍上諭輔臣蜀中更求東南一二人以為二矛重弓之備槐奏近遣李遇龍為都統輿論謂然更當採訪以備擢用丙辰御製字民訓遇引見改官人令閣門宣示仍批於印厯之首訓曰爾等服勞州縣始應脫選通籍信難矣而學製為尤難其律已必廉否則墨其養民必惠否則暴其聽訟必公否則私其涖民必勤否則怠即往乃封祇若豫訓邑有善政朝徹夕聞表用者有先朝故典在昔子路治蒲為難夫子誨之以恭寬溫惠之理三年而後有成朕之言夫子之遺意也聽之毋忽四月丁卯上諭輔臣纍年北騎涉淺渡淮合於沿邊措置防遏戊辰董槐奏敵有謀築棗陽軍者近吳淵已焚其所立寨舍上曰可諭吳淵早取光化如蜀之劒州淮之舊海皆當諭閫臣及時圖之若根蒂已固必為後患太常議故寶謨閣直學士游九功故寶謨閣待制徐僑諡曰文清甲戍槐奏近觀邵澤進故事舉藝祖買薰籠一節此正人主示以不得専恣之意庶後人有所遵守元鳳奏湯之制心非但為一身計乃所以為後人計上皆然之癸未詔賈似道為參知政事吳淵進官三等並職任依舊程元鳳為參知政事蔡杭同知樞密院事丁大全為御史五月壬辰上諭輔臣趙與􅊸奏乞定所招軍名及差人統馭如何槐奏合令與􅊸就統者已令用遊擊名軍矣甲午孔子五十世孫元龍授初品官丁酉以新除權吏部侍郎時暫權中書舍人兼侍講陳大方新除起居舍人兼權直學士院兼權直舍人院兼侍講林存太府卿兼檢正諸房公事饒虎臣為殿試詳定官戊戌御集英殿䇿進士甲辰上諭輔臣曰此去秋防不逺冝事事為之備槐奏蒲擇之申羅氏鬼國報思播州謂北兵留大理者招養蠻人為嚮道此不得不憂上曰冝令擇人多方扶持之彼不能支則駸駸及我矣乙巳上諭輔臣邊備合加申嚴槐奏蒲擇之謂見措置瀘溆之上鹽井設險以待之仍以鬼國為慮此事不可吝費使之大作規模或䟎調以助其力元鳳奏若令播州以兵助羅鬼制司以兵助播州亦似可行上曰更令制司從長區處上諭輔臣雍宜之備不可不加嚴老鼠隘畢竟如何合於此三兩月便定規模槐奏當以聖㫖催促今惟有盡力人事而已戊申上曰近來北兵非昔時比若我有以制之無不取勝槐等奏在我為必勝之計可也因奏吳淵經理光化之畫上曰此當以計取如苻堅敗於淝水亦是以計勝之甲寅御集英殿賜正奏名進士文天祥等及第出身同出身凡五百六十九人丙辰賜特奏名進士袁復元等𠡠凡六百六十人六月甲戌以朱祀孫為太府寺簿知瀘州兼潼川路安撫任責措置瀘溆長寧邊面辛巳浙江堤成凡朝廷科撥錢以緡計百三十五萬九百九十有竒米以石計三萬三千一百而臨安府之費不與焉癸未董槐罷以臺臣丁大全之言也詔程元鳳蔡抗可時暫輪日當筆軍國重務商榷奏聞丁亥太白入井七月辛卯上諭輔臣財計所當整頓吏姦不可不防須擇曉練都司提其綱尋以趙子秀趙崇潔任責拘𣙜詔曰執政當筆具有典故一日必慎乃分之宜卿等素懷體國之忠雅有濟時之略偶虛揆席借助賢勞弊所當革勿以易至招怨辭利所當興勿以暫焉承之沮況均是大臣自當任責事毋庸遜當以身先力拯時艱迄圖眀效以副朕責成之意甲午以董槐為觀文殿大學士提舉臨安府洞霄宫丙申詔進退臺諌權在人主若由學校萬無此理且非大臣所得進退學校可得而進退之乎叩閽縷縷更無已時可令學官先諭三學諸生各安心肄業以副朕教育之意仍令御史臺契勘當時同待臺牒作倡鼓率之吏重作施行令臨安府根究本隅將校懲其不能鈐束隅兵之罪以為張皇者之戒先是丁大全劾免董槐用臺牒差隅兵夜半迫之出關物情殊駭大全繼入疏自解上亦不以為然三學屢上書故有是命戊申上諭輔臣吳淵乞萬兵以備瀘溆思播何以應之元鳳奏欲令淵且選兵五千至夔門濾溆有急則援濾溆思播有急則援思播東可以捍金洋南可以庇歸峽却從沿江調兵五千以補京湖之數上曰如此區處極是乙卯以程元鳳為右丞相兼樞密使蔡抗參知政事張磻為端明殿學士簽書樞密事丙辰上諭輔臣振飭紀綱修明法度今日急務又曰前此只緣狥情廢法以致蠧弊滋多今當痛革元鳳奏敢不遵守法度以無負明訓上又曰邇來朝廷之勢輕盍思所以重之元鳳奏當以求才為急人才衆多則國勢自重上然之八月甲子元鳳條陳正心待臣進賢愛民備邊循法謹微審令八事詔朕之命相正欲仰成覽奏㫖哉乃言惟服尚期勵翼其克有勳甲戍以元鳳奏董槐常黜郡守十餘人欲堂聚審訂將上上曰郡守字民之官不可輕授丙子上諭輔臣三邊備禦稍密惟斡腹一事尚當加意元鳳奏近田應寅申乞重濾溆以為思播之援已行下制司區處辛巳上諭輔臣屬官帶行朝職外閫容或有之內地帥閫雖有請亦不可從如武臣帶環衛閣職須統兵率守則可尋詔諸閫屬官帳前武臣並不許帶行內職令三省樞密院遵守九月壬辰四川制司奏西南蕃吕告蠻目寧名天兄弟慕義合烏蘇蠻兵戰敵有功詔各補承信郎甲午上諭輔臣聞廣守多貪虐害民宜先汰其尤者元鳳奏敢不仰遵聖訓丙申詔雍州守臣程芾奪二秩罷己亥元鳳言淮閫近奏援蜀之兵久戍貧窶當議周恤上曰可即支撥付淮閫徑自遺給毋令遲滯己酉上諭輔臣近有言羅鬼不足恃者元鳳等奏置吕文德於沅靖置向士璧於歸峽城築之費甲兵之需無不應之正所以為此備也又聞黃平一路可通靖州已屢行下荆閫嚴作防捍更當趨之甲寅朱熠言境土蹙而賦斂日繁官吏增而調度日廣景德慶厯時以三百二十餘郡之財賦供一萬餘貟之俸祿今日以一百餘郡之事力而贍二萬四千餘貟之冗官邊郡則有科降支移內地則缺經常綱解欲寬財力必汰冗貟從之十月癸亥出封樁庫新錢兊便以濟民用丙寅命録進姚永慶上書所言蜀中便冝事乙亥上諭輔臣敵犯襄陽界郢係襄樊糧道可行下措置為援郢計己卯上諭輔臣吳淵奏北哨頗多想襄陽守將多是閉城自守須據險設伏乘機攻擊使知所畏而遁癸未上問輔臣蜀報抗奏向士璧申敵犯峽之懷逺恐其歸江元鳳奏侵峽之哨即荆閫所報自格奴來者士璧慮其窺江不可不防十一月戊子朔以丁大全為左諫議大夫吳衍翁應弼並除監察御史癸巳太學諸生復叩閽上書乙未上諭輔臣蜀報敵犯岩州恐逼黎雅元鳳奏蒲擇之謂取道入大理已遣嚴逢將兵緊守關隘矣丙申詔學官申嚴學法戒飭諸生詔曰朕樂聞切直豈厭人言邇年臣下不能體國惟以公報私植黨相傾蠱壞士習學校儲才之地乃有蹈于匪彞譸張為幻亂政害民甚非教育初意每念學校大體未欲令有司施行今又相帥成風背義趍利憑虛駕空公論安在又令學官申嚴祖宗學法俾諸生安心肄業遵守惟謹其有經明行修之士精加考察擇其尤者以聞朕將器使之若或怙終不悛自畔名教則正典憲亦非得已仍令三學立石詔正特奏名御試毋得更循舊制例以武功資帖比折升甲升等詔蜀有兵難民不聊生所當招集撫摩使之安業乃聞官吏多端誅求殊失培植邦本之意下四川制司戒飭屬部違者必罰無赦乙巳以監察御史吳衍翁應弼言太武學生劉黻等八人拘管江西湖南州軍宗學生與伯等七人並削籍拘管外宗司癸丑日南至御大慶殿受朝賀以張磻同知樞密院事丁大全端明殿學士簽書樞密院事馬天驥端明殿學士同簽書樞密院事詔朕聞祖宗立法悉行寬厚惟贓吏之罰獨不少貸為其蠧國害民也朕待遇臣下未嘗不寬訓亷有銘正欲善誘不謂邇來貪風轉熾國與民俱匱而士大夫家益肥間有號清流而居之汙濁尤甚朕何賴焉自今小大之臣各宜冼心滌慮毋縱于貨賄其或不悛有淳祐之法在舉而行之非朕得已也詔開國以來勳臣之裔有能世濟其美不能世濟其祿者令所在州軍體訪以聞詔參政蔡抗擅自去國勉留不返可除職豫祠尋以中書舍人林存繳進奏寢其命十二月庚申上諭輔臣敵築襄陽近調吕文德應援如何元鳳奏文德可任此責熒惑犯填星乙丑以張磻兼參知政事庚午御射殿閲諸班直射者換授有差壬申詔百司庶府及諸道監司以下毋以私怒寄收人于縣獄有罪應收者結絶不許過三日甲戍詔出封樁庫新造川㑹收換兩科川引詔奬諭荆閫吳淵𠡠荆襄首蜀尾吳國之屏蔽乃者邊人來告朕每注意未嘗不在襄有臣如卿恃以無恐卿血忱徇國賢於長城練兵偏禆指授方略距兵兩月以老北師驅之出境而以捷告朕甚嘉焉疆場之事一彼一此猶有晉在焉得定功卿能周慮熟思恃勝保境以圖萬全式副朕意其一行立功將士仰制司速開具聞奏次第議賞丁巳寶祐五年正月丁亥朔御大慶殿受朝賀詔戒飭羣臣凡可以疏瀹弊源剔除蠧穴興起天下之治者其儀圖之式副朕內修外攘之志以趙葵為少保寧逺軍莭度使京湖宣撫大使判江陵府兼夔路策應大使進封衛國公賈似道知樞密院事仍因任吳淵參知政事李曽伯湖南安撫大使知潭州辛卯天基莭御垂拱殿羣臣上夀上曰吳淵奏斡腹支徑頗詳元鳳奏昨日準宣諭鹽井鏵䥫山等險隘已札蒲擇之疾速措置乙巳雷丁未上曰春令未深雷已發聲元鳳奏此皆臣等燮調無補之咎上曰雷者天之號令自今號令之間加謹詔雷發非時朕心惕然考之易象所當赦過宥罪應諸郡有戾于罪者非犯惡逆自徒流以下並從減等行遣內有囚禁淹延者悉與斟酌事事從恕踈決監贓不及一千貫者蠲放戊申上曰獄訟淹延亦能上干陰陽之和宜速與踈決元鳳奏昨日恭覩御筆考大易雷雨作解之象舉行赦宥仰見陛下敬天愛民之意己酉御後殿引見吏部奏舉改官四十三人辛亥以吳淵薨輟視朝二月戊午詔賈似道升兩淮安撫大使庚申御筆蜀境奏凱而俞興城下之捷尤為竒偉朕甚嘉之興大忠之子也向以父罪聊示薄懲今盡釋前過仍令制司具立功守將以下姓名來上等第推賞尋賜余興金帶上曰余興嘉定城下之捷甚偉令盡釋大忠之罪不待其有請元鳳奏陛下如此處置直得御將賞功之道甲子上曰春防是時邊頭無報否元鳳奏昨日淮閫言北兵見駐兵河南不可不嚴為之備乙丑右正言戴慶炣言數十年來諸處戎帥専肆貪婪逼令軍人營運願申警戎帥嚴與禁戢軍債從之己巳上曰李遇龍奏溪蠻為敵所有欲為窺伺雍宜之計不可不預為之備元鳳奏去秋已聞此說屢令徐敏子體探虛實嚴為防拓又行下雍宜險要去處屯兵為不虞之備癸酉上曰賈似道奏渦口築城上環荆山下連淮岸險要可據元鳳奏已畫㫖令便興工三月癸巳上曰聞近畿頗有剽竊所當禁戢元鳳奏此帥憲責也當令嚴切禁止上曰可戊戌詔曰髙宗皇帝克紹大業寵綏萬民厄十世以中興恢旋乾轉坤之烈御六飛而南渡有櫛風沭雨之勞定社稷以奠鼇極之安明統系以詒燕謀之永豈有光復我家之盛未隆升陪世室之尊永言孝思稽古多闕所以採博士議郎之是酌人情禮制之冝倣有夏之祀少康法元和之尊光武合一祖三宗而並侑有德有功則參天二地之宏規丕承丕顯用秩元祀昭宣重光陟配而多厯年以陳常于時夏㑹通而行典禮將大饗于季秋己酉御筆朕聞政平訟理則民安其業告訐易俗則禮義興行近有司受詞多是並緣為奸延及無辜攤賴緡錢動以萬計是可忍也孰不可忍其耳目所接者已悉蠲放餘令御史臺覺察以聞庚戍上曰近日官府多以偏詞攤及平民不可不戢元鳳奏偏詞豈可輕信須當公議並觀乞以御筆宣付史館從之四月庚申朝獻景靈宫壬戍上曰宜州守臣不可不擇元鳳奏當擇有才略者處之否則用武將之有謀而曽經戰陳者上曰然癸亥上曰格法當守弊例不可放行元鳳奏凡有援例而法不可者臣未嘗曲徇之丙寅以並侑高宗皇帝奏告天地宗廟社稷丁卯詔高達以白河戰功進右武大夫遙郡防禦使王登進官一等直祕閣戊辰御射殿閲諸班直射藝換授有差庚午上曰徐敏子行邊正為防秋計未可遽回入桂元鳯奏已諭令未得便回須俟朝廷指揮壬申上曰李遇龍奏楊禮舍苦竹隘而守吉平北兵有占築苦竹之謀宜諭蒲擇之急為進守計以破其姦元鳯奏向來段元鑑克復此隘極為不易楊禮不應輕棄令擇之急作措置毋為韃所據當更趣之甲戍詔以今年九月有事于明堂丁丑上曰徐敏子遊邊恐緩急無人應援元鳯奏近敏子申以帥事委之機幕郡事委之倅二區處已得宜今朝廷既撥錢應其調度敏子必能奮勵以圖事功必别委他司恐徒成牽制上曰然己卯上曰蒲擇之申韃窺苦竹隘乞調兵㑹合驅逐元鳯奏已下京湖調五千應援更當催趣及秋防未動速濟此事閏四月丁亥上曰京湖調兵入蜀可更趨之元鳯奏若京湖以兵少為辭當於湖南調遣以補其數己丑元鳯等上中興四朝志傳今上皇帝玉牒日厯㑹要實録經武要略詔元鳯大全磻似道天驥各進官二等壬辰上曰李遇龍奏北兵窺劒門將築堡寨元鳯奏得蒲擇之報閏月初旬出師以朱祀孫監諸司軍擇之自以制司兵繼之上曰此事不可緩御筆方今多事之秋非賢不乂賴卿等作朕股肱耳目靖共爾位各迪有功宰執以公道行公法臺諫以公心行公論並仰體高宗皇帝聖訓毋得合黨締交自貽伊戚仍札御史臺元鳳奏恭覩御筆訓飭臣願自今進擬遵守舊規明注鄉貫非惟昭示公道亦可防間吏奸甲午上曰徐敏子行邊當令且留雍宜元鳳奏敏子近自雍趣宜融宜距靜江為近恐已回司昨劄令須過冬防上曰可趣回雍管乙未謝奕昌為少保保寧軍節度使充萬夀觀使戊戍元鳳等上進編修吏部七司條法己亥上曰趙葵行邊已見的確如郢之增溪城濠運糧於襄有三年之積措置可謂合宜元鳳奏趙葵於邊事實是留意上曰葵近奏已調援蜀兵三千元鳳奏昨令調遣五千今恐未足用上曰已令增調矣丁未上曰廣右之防橫山永平虎頭關最要切合先置堡寨然後屯兵元鳳奏當令措置壬子上曰趙葵奏乞招兵十萬分布淮蜀沿江京湖元鳳奏當從其請錢糧自合與辦五月壬午録行在建康繫囚杖以下釋之詔夏貴城築荆山尅期集事升正任刺史六月丙戍上曰昨晚有雨甚可喜元鳳奏伏中得雨田禾滋茂尤農家之幸癸巳命侍從卿監日一人禱雨于天竺山郎官詣霍山甲午上曰蒲擇之已回苦竹險隘尚未能取可惜失此機㑹然劒門之賞不可不從厚庶可激勸使之了辦寶峯一事元鳳奏敢不仰遵聖訓尋詔擇之進官二等餘升轉有差庚戍上曰昨日得雨甚好北關之外雨尤驟元鳳奏諸處已皆得雨連日陰雲四合雨意未巳上曰數日有邊報否秋成甚近不可不為備元鳳奏靡日不申警更當遵奉聖訓壬寅御筆賈似道荆山成城義在懷逺繪圖來上殊用嘉歎可令學士院降詔奬諭癸卯出封樁庫十八界楮幣二十萬貫賑都民三衙諸軍亦如之丁未上曰糴事曾契勘否元鳳奏去歲所糴視寶祐三年以前多三分之一今歲更當斟酌上曰可己酉上曰數日來雨意又慳元鳳奏聞逺處霑足近地差少上曰有禱祈未便更當舉行元鳳奏謹遵聖訓七月乙卯上曰連日四郊多雨元鳳奏更須接續霑足則一稔無憂録中外繫囚己未太白晝見詔蠲諸路州縣民户逋缺官賦庚申上曰洪芹往桐川禱雨得雨甚雱霈元鳳奏守臣門迎御香之時雨即沛然仰見陛下一念所感其應如響辛酉上曰蒲擇之甚欲取寶峯以糧運不繼又值霖雨器械損弊因此中輟元鳳奏更看續報乙丑詔諸路閫帥司招填軍額申嚴占借之禁丙寅上曰與􅊸言吳門得雨甚洽一稔可必磻奏陛下敬天愛民有素固宜昭格上曰朕宫中覽中外章奏未嘗敢自暇逸元鳳奏此堯舜文武兢業憂勤之意也天下幸甚庚午上曰昨日經筵有以邊臣久任為言者朕諭之曰李漢超守關南十七年郭進守山西二十年官皆止於觀察使久任邊臣乃祖宗馭將帥服夷狄之法也元鳳奏仰遵陛下率由舊章之意辛未上曰趙葵水陸並進其志頗鋭元鳳奏葵思立功以報陛下良可嘉尚甲戌上曰北人歸明曾授差遣而任已滿者可令保明上聞並與添差職任免令待次元鳳奏陛下至仁如天兼愛南北謹遵聖訓丁丑上曰趙葵奏新野既捷欲養鋭以圖光棗元鳳奏葵遣王登等入敵境焚其糧食亦可絶光棗之援若能審機而發當有可圖之理戊寅上曰州郡所缺內帑項目甚多年逺者悉與蠲放其合解者可下諸路令隨正綱帶納辛巳上曰聞敵有窺東川之意可下制帥諸司嚴為之備八月丙戍上曰光化捷奏到朕令人諭以始命乃光化今所報止此尚宜勉圖元鳳奏陛下明謨雄斷如此閫臣必能仰遵聖訓己丑以程元鳳為明堂大禮使張磻為禮儀使丁大全為儀仗使與芮為鹵簿使史宇之橋道頓遞使甲午上曰郡守率待逺次而蜀郡往往闕人可選廉能者往任撫綏經理之責丁酉詔賈似道版築奏勳名義甚正示不忘逺式契朕懷進官三等庚子上曰近有鬱攸為災延燎頗多居民殊可念元鳳奏不能救其微及既熾自難撲滅上曰臨安府所奏附城民屋須逺二丈此說可行元鳳奏可備不虞以張磻為參知政事丁大全同知樞密院事兼權參知政事庚戌詔申嚴諸路州縣稽留赦書奉行不謹及遞兵違慢之弊九月壬子朔以久雨出封樁庫十八界楮幣二十萬賑都民三衙諸軍亦如之詔今從臺臣遷卿少而輒出關者準違制論著為令詔曰言路不常厥官其來已久臣子擅自去國前此所無良由待士大夫以寬故習俗日趨於薄然遽加黜責所不忍為姑示申嚴庶幾聳聽曩時察官遷卿如汪剛中葉宰杜範劉應起莫不恪共乃職誰曰不然惟近日盜名欺世相師成風才聞改除隨即就道自詭抗節實犯不恭今後應臺諫遷他職者輒出關以違制論務在必行仍著為令所有吳衍翁應弼可劄令日下供職仍劄本寺各差胥吏催促前來不許輒違君命癸丑上問邊報元鳳奏趙葵親往㸃視關隘北哨却未遁上曰須攻擊使早退可也元鳳奏當趣之辛酉大饗於明堂赦天下乙丑上曰明禋告成可慶元鳳奏皆陛下精忱感通天宇澄霽中外莫不欣恱上曰繼此當力行好事戊辰上曰蒲擇之奏䝉古侵羅氏鬼國不可不為之備元鳳奏擇之報已多調兵往潼川如韃侵羅鬼則邀其後又劄播州嚴備令更下康湖諸處嚴作措置上曰可甲戌上曰播州乞兵想事勢頗急元鳳奏此亦機㑹不可不亟與調遣上曰當令夾擊元鳯奏昨已令朱祀孫襲其後吕文德遏其前此即聖訓所謂夾擊也上然之戊寅以史嵩之薨輟視朝己卯以王福為左金吾衛上將軍知和州吉文瑫主管殿前司郭濬主管侍衛步軍司庚辰上曰王福得歷陽鄉郡聞以為榮元鳳奏陛下念其服勞殿陛十有餘年以此優之深得御將之道上曰吉文瑫郭濬之除如何元鳳奏甚愜公論十月乙酉恭謝景靈宫庚申張磻薨輟視朝癸巳雷甲午虹丁酉以林存為端明殿學士簽書樞密院事戊戌雪上曰京湖之捷合與行賞元鳳奏容斟酌擬進己亥上曰昨日之雪髙處所積甚厚連宵雨亦甚有濟元鳳奏雪雨應時最宜二麥上曰朕閲班簿二廣頗闕監司須遴選可為帥臣之儲元鳳奏容審擇奏聞以瑞雪應時出封樁庫十八界楮幣二十萬賑都民三衙諸軍亦如之庚子以皇子忠王為遂安鎮南軍節度使皇女進封升國公主甲辰上曰趙葵奏沅州有糧可以運發元鳳奏蒲擇之亦謂播州有糧吕文德正慮糧乏今既有此可以進師戊申上曰付出劄子言斡腹事及守臣有當易者元鳳奏已行下宣撫司吕文德既入播州而沅靖支徑尚多責令措置其守臣容擬進庚戌樞密院言諸軍逃亡多因掊克無藝役使非時今後有捕獲及自首者令主帥審問如老疾即與放停其强壯而情犯輕者與放全請若將佐不能拊恤當議其罰詔令諸閫三衙及江上沿邊諸軍州廂禁軍一體遵守十一月壬戌詔朕軫念軍民無異一體嘗令天下諸州建慈幼局平糶倉官藥局矣又給官錢付諸營置庫收息濟貧乏奈何郡守奉行不謹所惠失實朕甚憫焉更有斃於疫癘水災與夫殁於陳者遺骸暴露尤不忍聞也可行下各路清强監司嚴督諸守臣宣制安撫嚴督主兵官並要遵照元降指揮如慈幼則必使道路無啼飢之童平糶則必使小民無艱食之患官藥則劑料必真修合必精軍庫收息則以時支給不許稽違務要公平而不許偏徇庶若民若軍皆蒙實惠仍令召幕諸寺觀童行有能瘞遺骸及百副者所在州縣保明備申尚書省給度牒一道以旌其勞可備坐指揮各令知悉甲子上以安南國表章詞意恭順可令學士院降詔奬諭乙丑上曰賜安南國奬諭合有嘉賚元鳳奏今茲錫賚蓋出特恩須用金器幣香茗之類上曰可斟酌擬進丁卯上曰邊烽未靖恐郵遞稽遲不可不申嚴之元鳳奏當下諸閫計程限日毋得遲滯癸酉上曰諸將提兵征討當直入播境須令追襲進𠞰仍撫循諸蠻不可縱軍士騷擾以失其心元鳳奏謹遵聖訓勉飭之甲戌上曰上流之報稍寬正方是自治之嵗月元鳳奏邊士當無日不申警乙亥上曰昨日付出黃平圗本其間險要處皆當置屯元鳳奏黃平清浪平溪三處當審度緩急分置大小屯已令宣司作急區處十二月辛巳朔上曰廣右備禦及此少暇宜立規模合閫置屯當行事即可擬進元鳳奏容詳酌以聞以李曽伯為資政殿學士湖南安撫大使兼廣南制置大使置司靜江府戊子雪西湖氷合丁酉詔三衙及江上諸軍應從軍職事並要戰功及隊伍中人不許以任子雜流非泛補授其離軍者止許授不釐務差遣果有材略功績從制閫保明却與釐務甲辰雨上曰今日立春得雨嵗事可期元鳳奏早來既雨而霧氣又滃鬱此地氣上騰之象也丁未嵗熒惑入氐戊午寶祐六年正月辛亥朔御大慶殿朝賀以丁大全為參知政事同知樞密院事林存兼權參知政事下詔戒飭羣臣癸亥詔出封樁庫銀一萬兩付蜀閫詔趙景緯屢辭召擢雅志嘉尚特改京秩辛未上曰印應飛報敵窺安南有的報否元鳳奏李曽伯已啓行旦夕必有報聞安南遣兵禦敵勝負未知然吾國之備不可不密癸酉上曰黃平之屯如何元鳳奏趙葵申霍友諒已回沅州同吕文德區處朝廷見議專官相度上曰可擇忠實詳練者擬進御後殿引見吏部奏舉改官四十二人甲戍詔吕逢年往黃平督趣就㸃視四川隘寨相度思播隘要知甕左如鹿通鹿廣宇翅鹿盤州等處孰為要㑹趣辦工役毋令踈漏己卯都省言牧民馭軍各有職守年來頗多侵越管軍司存動軍行以預民事是非顛倒科役無藝耗傷根本莫此為甚詔宣制諸司嚴行禁戢除兼領州縣外有侵越擾民者指實以聞二月辛巳朔詔禮部貢舉以馬光祖為端明殿學士京湖制置使知江陵府兼䕫路䇿應使湖廣總領三月辛亥朔命臨安守臣禱雨於天竺霍山甲寅命侍從卿監日一人禱天竺山郎官詣霍山乙卯録行在繫囚庚申詔出封樁庫十八界楮幣二十萬賑三衙諸軍辛酉録中外繫囚四月庚辰朔詔曰當春不雨天變異常靡神不宗僅見霡霂有妨東作曷遂西成民命繫焉朕心惕若念厥咎之安在惟反躬而省愆飲食起居何敢由舊可自四月一日避殿減膳仰答譴告之意以召隂陽之和癸未元鳳等言雨澤愆期乞解機政詔不許丁酉羣臣請御正殿復常膳表三上乃從之詔思應已特差思州駐劄御前忠勝軍副都統制往播州同共修築關隘措置備禦辛丑程元鳳罷以觀文殿大學士判福州尋提舉洞霄宫丁未以丁大全為右丞相兼樞密使林存同知樞密院事兼權參知政事朱熠端明殿學士簽書樞密院事少保寧逺軍節度使衛國公趙葵充醴泉觀使兼侍讀五月庚戌朔上曰襄樊解圍俘獲甚多將士用命深可嘉尚大全奏乞下京湖制臣亟與推賞以示激厲癸丑詔懷逺漣水相繼獲捷夏貴進官二等兼河南招撫使毛興特轉右武大夫乙卯大全奏襄樊之圍已解髙逹程大元有援樊之勞李和有守樊之功當斟議賞上曰賞不踰時所以勵將士也卿等亟議以聞丙寅詔與芮判大宗正事辛未雨上曰連日得雨在處沾足嵗事必可望大全奏得雨豐年之兆但此畨成都之戰有拔木之風石子之雨破氊裘之膽此又天祐中國之意甲戌上曰李曽伯奏欲屯萬兵於欽州以為交人聲援大全奏昨朝廷令就欽州屯兵正與曽伯所奏同但兵數更須斟酌上曰秋風不逺宜早區處六月辛巳上曰安南求援之情頗切所當嚴兵以待大全奏糧食未到所調戌兵未行見此催督上曰此事不可頃刻緩乙丑上曰襄樊之賞狀來上可斟酌行之大全奏睦千單騎入北營諭以禍福亦可嘉尚欲以五官賞之援師至城下而圍已解亦當薄酬其勞丙申上曰元鳳力辭之任已俞其請今須擇碩德重望者以鎮之其資淺望輕者不可輕畀大全奏誠如聖諭七月庚戌潼川帥臣朱祀孫言長寧軍自辦錢糧創造器具修築凌霄城圎備詔易士英特帶行閣門宣贊舍人朱文政宇文同祖各進官一等楊震卯等七人減磨勘將士支犒有差尋詔祀孫進官一等丁巳詔諸路監司守臣不許妄作名色擅支官錢互相饋賂豫者受者並計贓論遇赦不原令御史臺覺察己未上曰邇者百僚類多玩愒廢事卿宜飭勵俾各供乃職學官則嚴與教導史館則勤於修纂倉庫則謹於出納必如是則官無曠職不致食焉怠其事也大全奏敢不恭承明命甲子上曰蜀中將士不解甲者數月允為可念大全奏當議厚犒丙寅上曰近來邊報如何大全奏諸閫之報不一但三邊有備則無慮上曰毋恃其不來恃吾有以待之八月戊寅朔上曰安南之事寇固不可不防諸蠻亦不可不得其心大全奏孟軻有曰固國不以山溪之險庚寅上曰成都繫蜀安危不可不亟圖之大全奏朝廷既已示勸何事不可為戊戌上曰上流之報日急鎮江之事二十年不曽舉行今不容不嚴為之備大全奏已令閫臣亟作措置矣癸卯上曰邊郡禁軍聞多闕額所當招填及數大全奏已下諸閫招刺期足示額上曰須時時趣之都省言倭船入界禁令素嚴比嵗慶元舶可但知怵於博易抽解之利聽其突來泄販銅錢為害甚大詔令沿海制司於濱海港汊嚴切禁戢九月庚戌雷壬子上曰蜀廣雖有備禦海道不可不防大全奏已劄諸水軍各備險要矣上曰不可不急作措置丁卯詔出平糶倉米二萬九千九百石有竒賑糶以收弊楮己巳詔出城弊楮不堪行用於封樁庫支撥兩界好會盡數收換詔出𣙜貨務楮幣一百萬賑三衙諸軍十月丙子朔上曰蜀中將帥雖未克復成都而暴露日久戰功亦多合與序升大全奏謹遵聖諭乙酉都省言知隆慶府楊禮守安西堡韃兵薄城招誘投拜禮憤激詬罵率諸將共射退之詔楊禮進官二等仍下諸郡以勵其餘丁亥上曰張實久陷北地今單騎來歸忠赤可尚大全奏所當嘉奬尋為和州防禦使庚寅都省言廣南制置大使司鎮撫劉雄飛提兵親入橫山分遣將士迎戰殺獲頭目軍器詔雄飛進官三等將士增秩賞賚有差辛卯都省言淮民避難過江轉徙可念詔鎮江府常州江隂軍各出義倉米千石賑之是夜月有食之壬辰上曰夜來太隂食之九分太史常預言之以此見星翁厯象之學亦無差舛大全奏願陛下修政以禳之十一月己酉詔新築黃平賜名鎮逺州吕逢年進一秩辛亥詔流民渡江出浙西江東路五州米三萬石令各郡守臣賑之壬子御筆以隆寒在候令學士院降詔撫諭諸閫甲寅詔淮民遷避暫泊江隂朝廷賑濟恐未能遍再出米二千石賑之丙辰分委朝臣遍詣郡祠祈雪壬戌以賈似道為樞密使兩淮宣撫大使朱熠同知樞密院事兼權參知政事饒虎臣為端明殿學士簽書樞密院事丁卯詔諸路憲司廉訪所部州縣毋得虐民仍禁止攤賴之害違者坐之癸酉兩淮制臣賈似道奏淮境肅清前後諸捷凡獲馬匹千計器甲萬計奪回被掠者七千餘人甲戌上曰維揚之捷可喜但聞蜀中苦竹隘見被圍朱熠奏東淮有用命之將所以屢奏捷今王登提兵入蜀必有規模可寬聖慮十二月丙子朔詔曰𠡠門下更化則可善治所以開太平之期發號而定告元所以膺緝熙之慶朕紹承丕緒誕保受民荷上帝之降康蒙列聖之垂佑既歷三紀夙夜罔敢遑寧底綏四方淵水未知攸濟每兢兢而行道期穆穆以迓衡然察文審已而庶政靡齊務本重農而羣生寡遂朝綱隳而積玩吏習狃於懷私國勢僅定而未强邊徼多虞而未靖思艱以圖其易補弊而舉其偏惟三百年德澤之深式克至於今日而萬億載基圗之永用昭受於天休欲通變於宜民乃取新而凝命若稽成憲遹廣駿聲法藝祖之宏規混車書之一統踵仁祖之盛際致朝野之咸和爰易嘉名以興嗣嵗導迎善氣振起羣心茂凝常久之功永底輯寧之福其以明年正月一日改為開慶元年己卯都省言廬州漣水軍搗潁攻沂獲捷甚偉詔杜庶毛興各進官一等又詔俞興於遙郡上轉安逺軍承宣使丙戌上曰橫山乃雍州要衝不可不設一屯以為備禦之計大全奏曰容臣下制司相度地里奏聞丁亥上曰向士璧不待朝廷命進師歸州且捐家資百萬以供軍費良可嘉尚又都省言馬光祖不待請於朝廷招兵萬人防州有警又捐俸募士以破敵詔光祖士璧各進官一等宋史全文卷三十五
