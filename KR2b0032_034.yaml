body:
  text: 宋史全文卷三十四宋理宗四乙巳淳祐五年正月丁酉朔御大慶殿羣臣朝賀詔國家以仁立國其待士大夫尤過於厚臺諌乃因得言而釋私憾托細微而遺巨姦遷謫降黜或出非辜其令三省將見在謫籍人斟酌放令自便追奪停罷亦與酌情牽復其貪酷害民公議弗容者不拘此旨上更新庶政恐人才淹屈故有是詔又詔邊將興師河南之境鋒鏑所接寧免瘡痍中原遺民皆祖宗赤子朕甚痛之自今邊臣各謹守封疆毋先事首戎益務綏懷大布恩信以副朕愛養南北之意己酉雷庚戊御筆方春半月雷發非時朕心祗懼當避殿減膳仍詔中外臣庶指陳闕失乙邜劉伯正罷以監察御史孫起豫言其隱默充位也詔以權禮部尚書兼給事中李性傳為端明殿學士僉書樞密院事兼參知政事同提舉編修敕令及經武要略辛酉趙與歡加資政殿大學士二月戊辰詔昨罷科糴但令依時收買毋得抑勒用革吏姦使民樂輸此後仰常切遵守永毋科糴違者以違制論甲戊吕文德進三秩羊洪進二秩旌其五河捍禦功也壬辰太白晝見經天三月庚子以殿中侍御史鄭宷上進故事施行溫大雅等罪仍降詔申警中外詔曰時方多事念未能蠲租減賦而吏之不良乃肆貪虐或有前期預借或抑配重催或斛靣取贏或厚價抑納朘毒吾民朕深憫焉可令監司常切覺察務蘇疾苦而銷愁歎倘隱而不問公論所指必罰無赦甲辰右曹郎中吳子良進對言鹽褚事上曰鹽楮是今日急務子良云舊相行官販商賈坐廢近日罷官販還客販然尚恐貼納太多商賈未便願與大臣熟議之出十七界楮幣百萬下淮東犒水陸戰守諸軍壬子禁淫祀癸丑殿中侍御史鄭宷乞括淳祐初所創糴本鹽可以資糴又省造楮從之丁巳刑部侍郎趙以夫見言國本事上曰此事實不可緩以夫云臣編類仁宗髙宗兩朝定儲本末具載諸臣諌疏及舉行次第庶幾成憲昭然可以早定大計己未駕部郎官江萬里對言端平更新因及元祐更役法事上曰只因太驟了萬里云君子只知有是非不知有利害上曰元祐君子亦自相攻萬里云此小人所以得乘間而入今收召未多恐元氣不壯無以勝邪氣全在陛下把捉耳前者端平把捉不定改更不過如紹聖第二畨把捉不定更無復新之日矣上首肯萬里又言二相退遜太過中外皆無精采上復肯之辛酉詔陳畏葉武子年髙德粹靜退可嘉其以畏為集英殿修撰武子祕閣修撰以劉伯正為資政殿學士提舉臨安府洞霄宫癸亥御後殿引見吏部奏舉改官二十一人權吏部侍郎王伯大奏事言及嵩之獨相時鄭起潛濮斗南專失人心上曰數人做盡刻薄事伯大又言國本上曰朕置小學正是為此伯大乞早定大計以慰天下之心四月己邜詔以今年九月有事於明堂癸未以吕文德為樞密副都承旨依舊淮西招撫使知濠州甲申鎮星犯太微垣上相星丙戍詔劉虎蕭均趙邦求夏臯各進一秩賞清河漣泗招信捍禦之勞也詔吕文德依舊節制濠豐夀宿亳等郡軍馬詔以杜範為觀文殿學士光祿大夫致仕丁亥以杜範薨輟視朝二日尋贈少傅戊子詔李曽伯余玠董槐孟珙王鑑職事修舉加曾伯天章閣直學士槐進秩珙鑑進二秩並因其任五月丁未趙葵言諸沙江防極為踈陋乞下沿江制司及副司湖南江西帥司湖廣總所兩浙漕司許浦水軍司共造輕捷戰船闕創遊擊軍強壯三萬人分布新船以備緩急從之詔太常少卿王萬立朝謇諤古之遺直為郡廉平古之遺清家貧母老朕甚念之特贈集安殿修撰仍撥賜官田五百畝封樁庫十八界楮幣五千貫以贍其家丁巳詔知鎮江府許堪職事修舉進一秩庚申詔特賜杜範諡曰清獻六月丙寅以闕雨詔決中外繫囚杖以下釋之命臨安府守臣禱雨於天竺霍山甲申左司諌謝方叔乞早定國本仍録仁宗朝司馬光范鎮建議始末以進上嘉納之以兵部侍郎徐元杰暴卒置獄丙戍徐元杰特增四官七月癸巳朔日有食之甲午御筆屬兹閔雨之時乃遇日食之異天變示警惕然靡寧朕當避殿減膳以答譴告凡爾近臣更宜竭忠以輔不逮辛丑以湯中言常潤大旱恐流民不安令監司郡守措置儲畜明示振恤之意沿江諸郡亦如之命有司舉行寬恤十事甲辰以禱雨奏告天地宗廟社稷宫觀乙巳出封樁庫十八界楮幣二十萬賑臨安細民給散三衙諸軍亦如之戊申命從臣日一人禱雨於天竺山己酉詔劉伯玉金淵落職罷祠行監察御史劉應起之言也庚戊進鄭清之為少傅乙邜詔徐元杰鳴陽之鳯劉漢弼觸邪之豸天不憖遺奪我忠臣漢弼母老元杰子弱一貧皆同朕甚憫之可各賜官田五百畝新楮五千緡以見懷賢不已之意龜鑑曰或撥田楮以旌遺直或賜田畝以厲忠臣或賜筆札以諭臺諫其導人使諌有如此者或康色以伸直言或賜爵以旌序對或增秩以表封章其忘勢樂善有如此者謂非得舜禹逹聰聽諫之盛心而何八月戊辰以河南諸郡秦琳等八人連年在邊戰守宣勞各進一秩添差淮東西兵職有差詔求通天文厯算之人壬申以范鍾為明堂大禮使遊似禮儀使趙葵儀仗使李性傳鹵簿使趙與歡橋道頓遞使丙申詔申嚴預借重催取贏抑配之禁令監司覺察毋害吾民九月癸巳朔詔濮斗南更降兩官文虎葉賁各降一官項容孫落職罷祠以右正言鄭宷言其附麗權相也己酉朝獻景靈宫庚戍朝獻太廟辛亥大饗於明堂奉太祖太宗寧宗並大赦天下十月壬午主管官告院莊同孫對進洪範五事針上曰五事當於敬字上用工夫讀至思針上曰五事以思為本十一月乙未鄭清之乞歸田詔不許丙申以皇叔祖太保崇寧軍節度使判大宗正事嗣秀王師彌職事修舉進一秩壬寅詔更奪林光謙三秩徙居衡州奪袁立懦宣璧王至一秩劉棫施逢辰劉鮒兩秩以監察御史江萬里言其貪贓及依憑權門也甲辰范鍾請老詔不許以禮部尚書陳韡為端明殿學士同簽書樞密院事尋差同提舉編修經武要略十二月壬戊朔以祈雪詔大理寺三衙臨安府兩浙州軍并建康府係囚杖以下釋之丙寅詔昨據太史奏來嵗元旦日有食之方歲序之更端值太陽之交蝕凛然譴告震於朕心嘗觀祖宗盛時或有此異上下之間益相警懼今宜講求實政凡可以銷弭災異者次第行之毋為具文以稱朕祗畏天戒之意戊寅詔太史奏來嵗正旦太陽當蝕天示警戒不同他時朕心惕焉益思恐懼修省自今月二十一日避正殿減常膳求直言朝廷百司講求闕政寬民力恤軍旅緩刑獄問疾苦輯流民凡可以銷災變者毋匿厥指共圖應天之實元旦百官免稱賀同日又詔兵財係乎國命強兵之事爾葵主之裕財之計爾韡理之二相則總大綱而中持其衡以共濟國事從監察御史江萬里之言也己邜以遊似為右丞相兼樞密使李性傳同知樞密院事鄭清之為少師奉國軍節度使依前醴泉觀使兼侍讀仍奉朝請賜下帶許服繫賜第行在資政殿大學士提舉萬夀觀兼侍讀與歡換授皇兄安德軍節度使開府儀同三司萬夀觀仍奉朝請皇弟保康軍節度使嗣榮王貴謙武康軍節度使嗣榮王與芮並加少保癸未詔李性傳除職豫郡丙午淳祐六年正月辛卯朔日有食之上不視朝詔天基節紫宸殿上夀集英殿大宴並免辛邜朔以陳韡言置國用所仍命趙與歡為提領官辛丑宰執以日食乞解機政詔不許甲辰以羣臣上表請御正殿復常膳從之辛亥范鍾再乞解機政不許二月辛酉朔詔禮部貢舉壬戍金部郎官王佖對言人主論相當取其格心不可取其阿意上然之戊辰范鍾再乞歸田詔進三秩除觀文殿大學士醴泉觀使辛未以范鍾提舉洞霄宫任便居住從所乞也壬申雪蠲大理寺三衙臨安府并屬縣點檢贍軍酒庫所贓賞錢以雪寒出封樁庫十八界楮幣十萬給三衙諸軍乙酉宗正少卿張磻對言治兵理財當為一事上誦范鎮財已竭而密院調兵無窮之語曰兵財豈可分為兩事磻又奏先朝蘇頌傅堯俞皆不受宣諭事上悚聽然之曰詔三衙諸軍月支銀並倍給四月辛酉太白晝見壬戊月犯太白戊寅殿中侍御史謝方叔左司丞湯中乞旌異朱熹門人胡安定吕燾蔡模以勸後學並詔補迪功郎添差本州教授仍令所屬給札録其著述并訪以所欲言甲申詔曰朕臨朝願治每念乏才有意作成既親書扁題分賜諸學并賜諸生束帛以示激勵其令三學官於前廊長諭及齋生中公舉經明行修氣節之士别議旌賞京學如之閏四月乙未以資政殿大學士徐榮叟薨輟視朝一日己酉祕書丞王璞進對言杜衍封還內降事上曰朕嘗説與大臣聽其執奏矣庚戌刑部侍郎兼中書門下省檢正諸房公事魏峻對言人主震服天下曰斷而已上曰謀之欲同斷之欲獨若以大公至正行之則斷在其中矣五月庚申詔賈似道任責措置淮西山寨城築丙寅吏部員外郎李昴英對言內小學事上曰朕於小學之教甚留心昴英又言漢末宦官之禍上曰固當防微杜漸庚午詔學校明倫之地諸生講明不負教育朕用嘉之爰命有司舉其髙第而合詞控免陳義凛然朕重違其本心姑徇所請以成其美所有束帛不必控辭寮己卯臣言趙葵昨陳招兵造船買馬事悉己施行乞嚴飭閫臣激勸將士盡東南之長用長江之險從之甲申詔權知髙郵軍兼淮西提刑蕭逢辰進一秩旌其買馬修城留意戰守也詔決係囚六月戊子朔詔從事郎傅實之迪功郎林公遇並特改京秩仍給札詢所欲言以都省言其杜門樂道搢紳髙之也壬辰詔以秋闈在近文弊未革令監學及諸路郡學精加考校崇實黜浮以俟薦送戊戌著作佐郎兼權禮部郎官髙斯得對言姦邪有復出之憂上曰必無此事斯得又言學校以小過觸霆威上曰此本是小事但不當率衆出見宰執斯得云學校固不為無過但恐姦人因此動搖局靣關係却不細上然之丙午以禱雨詔中外決係囚杖以下釋之臣僚言旱勢可慮乞分命臣僚遍禱羣望仍令有司踈決淹獄及下諸路勸諭富家接濟細民以弭盜賊從之詔以淮東西制置司申五河淮安射陽湖立功將士劉全路旻等補轉給犒有差壬子以陳韡參知政事兼同知樞密院事八月庚寅起居郎兼權中書舍人暫兼權侍郎趙汝騰奏事言北司專橫上曰近日已頗戢之矣汝騰又言不當調護言官上曰近日少有調護者辛酉月犯房己酉以太府少卿劉克莊文名久著史學尤精可特賜同進士出身為祕書少卿尋兼國史院編修官實録院檢討官辛亥校書郎兼樞密院編修官兼諸王宫教授蔡抗奏對言正心事上曰紀綱萬化實出於心抗又言內降斜封之弊上曰近日此等事却少若有違礙已許大臣執奏矣抗又言宗社大計上曰今內置小學正是此意祖宗朝亦是晚年方定抗言祖宗時定名號雖在晚年而定計乃在一二十年之前此事最怕因循上然之九月丙辰朔祕書省正字林希逸對乞信任給諫上曰朕於臺諫給舍之言無有不行希逸又乞早決大計以慰人望上開納之丁巳檢校少保寧武軍節度使京湖安撫制置大使夔路策應大使兼江陵府孟珙薨賜檢校少師戊辰以賈似道為京湖制置使兼知江陵府兼夔路䇿應使仍暫兼權沿江制置副使湖廣總領尋兼京湖屯田使庚寅詔以皇弟少保武康軍節度使充萬壽觀使嗣榮王與芮子孟啓為貴州刺史令入內學又詔內小學宗子孟奎孟蘇為右千牛衛大將軍尋令並赴朝參壬子榮王府講學乞改講禮記景獻太子府乞改講毛詩並從之十二月庚申日南至御大慶殿羣臣朝賀詔昨令三學各舉經明行修氣節之士而諸生合辭控免陳義甚高其令在籍諸生並赴來年省試一次臨安府學長諭亦如之以稱搜羅之意丁丑以雪寒出封樁庫楮幣賑臨安細民辛巳以前四川制置陳隆之殉國忘家抗敵死難可特贈徽猷閣待制於合得延賞外更官其二子癸未以左武大夫福州觀察使知漣水軍蕭均久戍邊城忠赤可嘉進二秩十二月癸巳詔侍從臺諌各舉堪閫寄及餉事者述其才器勞績以聞乙未詔史嵩之依所乞守本官職致仕丙申諸司糧料院章鑑對言納諫事上曰朕於臣僚論未嘗不見之施行鑑又言儲才上曰人才須是養之於平時臨事方得其用癸丑御筆昨以史嵩之用舍未決紛紛兩年比既施行朕意已白士大夫可一志慮以就事功矣二三大臣其為朕就實以用人材而以振紀綱飭邊備通財用為急中外有位之士亦務就實以舉職業而以體國事克己私遂民生為本是任賢望治之意若坐虛歲月浮於事則朕將誰用可於元日降詔戒諭丁未淳祐七年正月乙卯朔御大慶殿受朝賀以將祈穀上帝預行天基節上壽禮詔皇姪孟啓特授宜州觀察使建資善堂於內小學置直講贊讀二員以年稚權就王邸習訓詔曰朕宵旰求治有年于兹若涉淵氷未知攸濟間者任用非人不能秉禮懷義以輔朕顧乃陷於匪彛敗俗傷教朋淫肆欺羣議坌涌由朕不德朕甚愧焉天誘之衷豁然大悟亦既絀去其黨類取其尤者屏之遐方收召衆正是崇是信而史嵩之已俾致其事以示朕決不復用之意其於正邪忠佞之分豈不明白搢紳士大夫交奏迭諫悃悃欵欵以陳於前忠愛備至抑朕聞正脈充本根固則外邪客氣始不能入於今之時思所以為自強之計百爾執事亦宜相戒以實克去己私以自公體國存心謹乃身率乃職裕乃民用輯寧我邦家今以月正元日誕告于在位尚祇若明訓丁卯詔戒敕州軍縣鎮不許因誕節賜宴多殺物命一遵景祐三年詔書仍刻石所在放生池戊寅詔淮浙發運司給米二萬石濟建寧邵武諸郡被水之民以兵部尚書兼侍讀吳潛知貢舉權兵部侍郎兼直學士院應繇起居舍人兼國子司業黃自然同知殿中侍御史周坦監試二月乙酉朔御筆付吳潛以下崇雅黜浮俾得士用庚寅都省言淮安縣主簿周子容遭逆全之變陷北十有六年數以外謀密聞邊閫拔身來歸志行可尚詔特改朝奉郎與升擢差遣壬辰詔十七十八界會子更不立限永逺行用丙申詔四川沿邊州縣官任滿日轉循官資有差從制臣請也己亥以貴妃賈氏薨輟視朝二日乙巳詔翰林學士李韶屢疏請老特授端明殿學士提舉隆興府玉隆萬壽宮丁未詔令封樁下庫支十七界會子十二萬貫付淮西安撫司造舭􅭥船壬子詔出封樁庫十八界會子五萬貫付臨安府津遣三邊請學士人歸里以所乞省試難從故有是命二月甲子知大宗正丞兼權金部郎官姚希得進對奏李韶老成有德望宜留奉內祠侍經幄戊辰詔李韶依舊端明殿學士提舉萬壽觀兼侍讀庚午命從臣一人禱雨于天竺山四月庚寅詔昨以理財分任正欲責成歲一二易官未見成效撿正都司專務經理詎宜付之悠悠可諭朕意使協力自公共濟國事辛卯詔雨澤愆期決中外係囚杖以下釋之詔潭州縣令魏夢極棄邑避冦司户參軍吳焱違帥臣指授致攸縣令黃端卿輕舉而死各鐫兩資丁酉廣西經略司劾知廣州張公明貪暴不法詔削官三等南安軍居住庚子以刑部尚書王伯大為端明殿學士僉書樞密院事翰林學士知制誥吳潛端明殿學士同僉書樞密院事四月辛丑以鄭清之為太傅右丞相兼樞密使越國公遊似罷相為觀文殿大學士醴泉觀使兼侍讀趙葵樞密使兼參知政事督視江淮京西湖北軍馬陳鞾知樞密院事湖南安撫大使庚戍以禱雨未應詔録中外係囚並減一等杖以下釋之蠲大理寺三衙臨安府屬縣見監贓賞錢壬子廣西漕臣劾貴州守臣陳鑑迫脅考試官私取士人壞科舉法詔再鐫一秩勒致仕五月甲寅詔武功郎揚州寧淮軍統制張忠戌守浮山手摶冦兵俱死于水特贈武略大夫更官其一子乙卯以禱雨未應詔諸路提刑司及州縣見拘罪囚非情理巨蠧者並釋之丙辰詔參部人因礙小節久淹逆旅者令吏兵部權與注授己未禱雨于天地宗廟社稷戊辰以遂寧府觀察支使趙希湄監試鬻舉詔削一資己巳詔賜兩淮京蜀曾經兵入之地田稅三年其宿逋悉除之壬申吳潛兼權參知政事乙亥以權吏部侍郎兼中書舍人趙汝騰充殿試詳定官權工部侍郎兼直學士院尤焴左司郎中尹煥同詳定丙子御集英殿䇿進士六月癸巳御集英殿賜正奏名進士張淵微等及第出身凡五百二十七人乙未賜特奏名進士勑凡七百五十人丙申詔曰朕德弗類無以自媚于上下神祇災變薦臻以戒不治乃者冬無霜雪土膏弗滋穡事方興雨不時若背春涉夏漸成暵乾農疇蓋有以種不入土聞者其將何以格歲穰續民食並走羣望敬恭明神非不吁嗟有求嘉應罔答至於庚伏旱勢益張切迹災異之來端不虛發朕不勝憂懼其避正殿減常膳側身修省匪曰具文二三大臣盍相與盡忠竭力圖所以銷變救災之實朕躬有過及時政闕失應中外文武臣僚暨於士民皆得悉意指陳毋有所諱布告天下咸體朕懷甲辰出豐儲倉米三十萬石以平糴價己酉詔旱勢日甚怛於朕懷變不虛生厥有攸致兩淮襄蜀嘗經賊入江閩內郡間因冦作遺骸暴露感傷和氣令所屬州縣收瘞之詔京湖北路副總管王英赤心歸順進官二等七月甲寅進士及第張淵微等言天久不雨乞免瓊林錫宴禮上從之丙辰詔荆鄂都統司聽京湖制帥司節制池州建康府鎮江都統司並聽沿江制司節制許浦都統司仍聽平江府并浙西都大提舉兵船司節制江州都統司改聽興國蘄黃安慶四郡節制從督視趙葵之請己未月入心庚申安慶守臣歐陽頥以改差輒之任詔削官二等令憲臣謝獻子領郡事壬戌御射殿閲正奏名進士射詔辭免除授實為繁文除侍從臺諫給舍兩省左右史以上許辭免餘官不許癸亥閲特奏名進士射乙丑吳潛罷以端明殿學士知福州丁卯以别之傑為參知政事諫議大夫鄭宷為端明殿學士同簽書樞密院事癸酉詔賞浙東西福建路監司州郡所申官士之家濟糶者凡九人補轉官資有差八月甲申鄭宷罷丙戌詔令户部嚴革諸路州縣增收多量苗米之弊辛卯詔石鈞陳大任王方烈各鐫一秩以誣平民為重辟謝思乂張懋各進一秩旌其平反之功從湖北憲臣之請己亥以秋風已徑邊備當嚴浙右四郡密邇行都魏村福山柴墟一帶宜預為之備詔守臣條具措置辛丑詔前通判彭州宇文景訥罵賊而死特贈官二等仍與一子下州文學壬寅詔監司守臣宜亟講荒政以賑乏絶稅租有合蠲減者具實以聞甲辰以高定子薨輟視朝一日贈少保九月丙辰詔命官該赦陳乞改正不拘期限今後赦條刪去限一年內四字從左司程元鳳之請也丁巳詔改尚書省提領鹽事所為提領茶鹽所甲戌太傅右丞相越國公鄭清之奏將回授太保一秩追贈四世祖詥詔從之十月辛巳太白晝見詔荆湖副都統李得討桂東洞冦有功進官一等癸未朝獻景靈宮以嚴州旱詔豐儲倉給米萬石賑糶丙戌京湖安撫司調兵平辰沅蠻猺有功總轄張謙統制高天祐等賞賜有差己酉臣僚言格法日壞天下視聽益不美因條陳添差攝局須入奏辟改任薦舉借補曠職匿過十弊乞風示中外從之甲寅以鎮江府旱詔兩浙轉運司檢核蠲租七萬四千石有竒十二月壬午以趙與歡為端明殿學士提領户部財用庚寅以近畿旱詔正歲天基節大宴權免其州郡錫宴務從省約毋得科擾以副朕敬天愛民之意辛卯以李鳴復薨輟視朝一日壬辰詔程九方陷北十一年脫身來歸條陳邊地事宜有益備禦特補迪功郎戊申淳祐八年正月甲戌嗣榮王與芮奏男孟啓蒙恩建資善堂以私家未便乞寬開講之期從之丙子太常寺言檢照中興禮書四孟朝獻景靈宫分三日行禮自淳熙十五年後分作兩日近年諸後殿多命宰執分詣如遇車駕次日親臨每位三上香一跪奠俯伏興再拜得禮之宜詔依丁丑侍御史周坦言春秋釋奠於先聖禮典至重比年樂奏未終徹爼紛紛大不肅目今乞令監祭官糾察以聞從之二月戊子月生黃白暈癸巳雹乙未雷辛丑荆湖帥臣陳韡奏國家以火德王於火德之祀合加欽崇炎帝陵在衡州茶陵縣廟久弗治乞相度興修以稱崇奉之意從之丙午周坦奏乞申明十七十八界會子並永行用以堅民信左司趙汝墍請更造十九界太博黃洪請不用會子停賣鹽鈔狂言惑衆乞正妄誕之罪詔各免所居官丁未監察御史陳垓奏乞宣諭輔臣申飭吏部未歷郡者不許為郎已為郎者更迭補外未厯縣者必令須入已作縣者須及任滿闕次必依先後毋或改差庶幾抑僥幸以重名器從之二月甲寅督視趙葵上將士泗州解圍之功詔竒功特與補轉四官其餘補轉有差其淮西招撫司應援立功將士併與比類推賞己未嗣榮王與芮奏男孟啓尚幼乞就臣家訓習詔令權就王邸教導所有資善堂禮例並依舊典乙亥陳垓言民命與國脈相維獄訟不當刑罰不中則無以保斯民之命脈尚何以保吾國之命脈因極言檢覆決獄踈決推勘拘鎖刺環奏裁詳覆重勘追證十弊從之四月戊寅朔臣寮言兩界會子既永行用宜立殿最之法以為稱提之助從之己未詔宜州觀察使孟啓用四月十五日就資善堂講癸未詔督視趙葵纍奏結局朕閔勞念功深有勒歸之意但北兵雖退邊備當嚴更宜勉留以副隆委戊子詔以今年九月有事於明堂辛卯權禮部侍郎兼國子祭酒徐鹿卿言生員李寧先飲酒爭競見害市人辱文教玷士類由臣誨飭無狀乞行罷斥詔覽卿所陳痛自引咎此固師儒之責但學校規矩玩弛今當申嚴宜自安職壬辰詔今歲明堂惟事神儀物諸軍賞給悉循舊制其乘輿服御中外用度並從省約令有司條具以聞甲午以太常寺奏請景靈宫行事日乞更定後殿饗禮拜跪之數詔朕祗承宗廟何敢憚勞可一依舊式乙未朝獻景靈宫丙申亦如之己亥詔三省樞密院六部寺監各遵守自來條法不得引援弊例違當重罰庚子詔臨安守臣趙與􅊸充明堂大禮提點事務五月庚戌以闕雨詔録行在繫囚壬戌諸王宫大小學教授李桂高進對言淮蜀之險上曰及此間暇之時當作規模備禦督視樞密使趙葵奏乞結局詔候來春入奏癸亥詔趙葵視師於外今已期年忠力具宣威聲綽著既成卻敵之效復宏預備之規肯為朕留尤見體國可無恩典少示褒崇特進三秩依前樞密院事兼知參知政事督視江淮京湖軍馬兼知建康府江東安撫使行宫留守仍加恩御書學牌接近㕓市非所以肅觀瞻示崇教可移揭中門其外門及裏偏門出入之制倣祕書省施行乙丑詔陳韡出鎮南服備殫忠勤軍民安平蠻猺綏輯特進一秩依前知樞密院事湖南安撫大使兼知潭州節制廣西余玠除兵部尚書依舊四川安撫制置使兼知重慶府仍兼四川總領夔路轉運使賈似道除刑部尚書依舊京湖安撫制置使兼知江陵府兼夔路䇿應使仍兼湖廣總領丘嶽除兵部侍郎依舊淮東安撫制置使兼知揚州兼淮西制置使吕文德除侍衛馬軍都指揮使依前保康軍承宣使右領衛上將軍樞密院副都承旨兼知濠州辛未詔西湖北山護國寺後龍洞泉源澄深靈異感格可賜護國龍祠為額永充祈禱八月丁亥詔督府官屬各特進一秩令具名銜聞奏詔知建昌軍南豐縣黃端亮奪官一等放罷以其增收苗賜科罰多私也辛亥以王伯大為參知政事應繇同知樞密院事給事中謝方叔為端明殿學士簽書樞密院事吏部尚書史宅之為端明殿學士同簽書樞密院事趙與􅊸資政殿學士與執政恩例提領户部財用仍知臨安府詔頒將士邢德等補轉犒給有差以淮西制臣言其克復正陽兩圃攻劫蘄濠二縣及解圍壽春之功也丙寅詔監都進奏院王疇削官二等以臺臣言其為田事所官操縱作威交通為市誤國害民故有是命丁卯太常議故端明殿學士洪咨夔諡曰忠文癸酉詔王伯大除職豫郡以監察御史陳垓論之也八月甲申以鄭清之為明堂大禮使别之傑為禮儀使應繇儀仗使謝方叔鹵簿使史宅之橋道頓遞使丙戌觀文殿學士光祿大夫范鍾乞免祠祿詔不許丁亥督視趙葵辭轉三官凡六上奏詔卿出提督鉞久懋忠勞方倚成治外之功遂寵錫師中之命制麻播告陳誼固辭褒賞大臣事關羣聽其祇朕命式佇遄歸戊子以雷州所屯經略司水軍頗橫詔守臣節制乙未詔王疇更削官一等正其括田擾民之罪丙申詔大理寺丞林炎對疏狂妄動搖國本奪官三等押出國門庚子上諭輔臣曰所在監司帥守輕行括籍多因細事中以深文甚而置之死地往往利其財耳真所謂殺越人于貨至於用刑自有成法今有司率意任情更不遵守條令凡此皆當禁止可因明禋肆赦益加申嚴如有非辜越訴究證得實必論如律壬寅侍御史周坦言明堂肆赦州郡奉行不虔有稽違隱匿文具三弊乞行革去以廣溥博之仁從之甲辰詔令户部嚴革諸路州縣增收多量苗米之弊九月己未朝獻景靈宫庚申朝享大廟辛酉大饗於明堂赦天下是夕雷辛未以秋霖命從臣日一人禱於天竺山卿監郎官於霍山十月甲戍朔參知政事别之傑三奏乞歸田里詔除資政殿大學士知紹興府乙亥以應㒡謝方叔並權參知政事十一月丙午太傅右丞相兼樞密使鄭清之乞歸田里詔不許丁未沂靖惠王府乞改授尚書從之壬子莊文太子府乞改講周易從之甲寅監察御史陳垓言祀者國之大事三歲明禋肸蠁多非本物皆是自科市户仰尹臣監督各備正色毋以他物充代仍令奉常一體精虔庶幾神祇祖考昭格從之十二月辛巳詔以隆冬嚴寒軍人不易出封樁庫十八界官楮二十萬令三衙賑之己酉淳祐九年正月乙巳制以皇姪宜州觀察使孟啓可特授慶逺軍節度使進封益國公庚申詔周世宗八世孫柴彥頴特補承務郎襲封崇義公詔兩淮京湖沿江制帥司行下所𨽻勸諭軍民從便耕種秋成日官司不得分收癸亥知臨安府趙與歡奏乞給沒官田五百畝有竒付本府創慈幼局以養遺棄嬰貌置施藥局以療閭閻疾病從之丁卯許應龍薨己巳范鍾薨並輟視朝一日辛未詔給臨安府官田三百畝付表忠觀以旌錢氏之功德二月癸卯朔詔禮部貢舉丁亥詔刑部及諸路監司刑獄案卷速與理決仍差屬官往州縣獄審斷毋令姦胥作弊濫及非辜庚子鄭清之再乞歸田里詔不許辛丑監察御史朱景彞奏刑獄民命所繫乞諭所司刷諸處已奏文案立為限日處分行之從之閏二月癸卯朔詔安南國王陳日照特賜效忠順化保節守義懷德歸仁功臣依前靜海軍節度觀察處置等使特進檢校太尉兼御史大夫上柱國安南國王仍加恩甲辰以鄭清之為太師左丞相兼樞密使進封魏國公趙葵為右丞相兼樞密使應㒡謝方叔兼參知政事陳韡觀文殿學士福建安撫大使知福州吳淵端明殿學士沿江制置使江東安撫使兼知建康府行宫留守趙希墍端明殿學士知建寧府乙卯鄭清之辭免太師奏凡五上詔朕延登上相顯拜維垣所以重巖石之瞻尊道揆之體周公為師而居左圖任方隆考父聞命而循墻陳情彌確成爾一謙之美姑惟舊品之仍益賴熙良深可嘉尚三月癸酉朔以衢信州旱詔給豐儲倉米五千石賑之癸未以賈似道為寶文閣學士京湖安撫制置大使知江陵府丁亥詔正陽之月日有食之史官先期以告朕祗畏天戒不遑寧處可自二十一日為始避殿減膳徹樂益加內省凡爾在列各務交修以輔不逮癸巳詔決中外繫囚杖以下釋之己亥詔增通泰揚真和州安慶府解額四月壬寅朔日有食之丙午詔丘嶽閫職修舉除寶章閣直學士依舊淮東安撫制置使兼知揚州淮西制置使辛亥以福州應天啓運宫寅奉祖宗神御事體至重可領西外宗司兼領免差內侍永為定式己未羣臣三上表請御正殿復常膳從之己巳鄭清之屢疏乞骸因奏時事十難曰重相權曰凝國是曰用人才曰足兵食曰守法度曰革弊蠧曰布公道曰去貪贓曰理財用曰節冗費詔奬留之五月甲戍浙西帥臣趙與􅊸言本司措置鹽課乞自淳祐九年為始歲舉職司常員及職令狀各一以勵官屬從之己丑右丞相趙葵奏乞收回成渙退伏田里詔朕以卿宣力之勤延登右揆告廷已久避寵益堅比遣內侍往諭至意申命漕臣式遄其歸胡為來章又以疾諗夫知不俟駕之義是即教事君之禮豈不忠孝兼盡家國俱榮哉其亟造朝副朕欽佇甲午鄭宷薨丁酉雨雹六月丙寅都省言沿邊將士有殁於王事者雖已褒贈官其子孫猶當旌表以顯忠節詔令邊郡各立一廟以褒忠為額凡前後殁於王事忠節顯著之人並祠焉郡官春秋致祀七月庚午朔臣僚言吉州守臣李義山嗜賄亡恥詔奪官二等令江西漕司追索銀會解安邊所八月庚子朔同知樞密院事史宅之辭免兼提舉財用詔不許仍趣條具以聞丁未詔步軍司支遣匱乏每年可於豐儲倉給米三千石封樁庫給官會二萬貫助其贍軍辛亥詔趙葵除拜已久告假將滿今聞欲還長沙可令沿江制臣疾速差官邀止不許般挈為歸計仍令吳淵宣諭赴闕乙卯廣東提舉司言知潮州海陽縣陳純仁築堤護田甚廣詔進官一等丙辰趙與􅊸辭免措置户部財用詔不許戊午詔今春北師犯邊呂文德指授將士纍䇿竒功進官二等庚申知安豐軍邢德知壽春府劉雄飛有謝步之捷詔各進官一等九月丙子提領户部財用趙與􅊸創置新倉三百七十餘間貯米一百二十萬石欲以淳祐為名及照豐儲倉例辟官四員從之乙未婉容閻氏進封貴妃丙申太常少卿暫權給事中盧壯父繳回內降所除吳泝直袐閣王國壽軍器所幹官録黃從之戊午以知澧州李寬民力行惠政一意裕民特進一秩庚申參知政事應㒡屢疏乞歸山林以便養痾詔不許尋除資政殿學士知平江府詔令臨安府諸路提刑司嚴軍民銷鑿見錢私鑄銅器之禁仍下殿步司一體施行癸亥賜宰臣執政講讀修注官宴于祕書省甲子四川制臣余玠請交引以十年為界詔從之丙寅肇慶府高要縣令李元潢貪酷顯著詔削官三等勒停壬午詔隆冬嚴寒軍人不易出封樁庫錢十八界會子二十萬貫賑之癸未詔決中外繫囚杖以下釋之甲申蠲大理寺三衙臨安府屬縣見監贓賞錢丁亥浙西帥臣言金山水軍統制陳霆貪酷激變詔追毀出身文字拘鎖沿江制司籍其家戊子婺州權守臣鄭士懿言承務郎趙希褥及其子與怘與慙同惡相濟窩藏盜賊騙奪民財抉弟希襅目睛碎叔祖彥􅀈寶貝棄叔祖母骨殖捶叔枚夫手指威使惡黨殞姪崇縤之命絶滅綱常傷殘骨肉詔希褥追毀出身文字押送西外宗司拘鎖與怘與慙分移千里外州軍居住丙申詔令都省風厲中外應今後士庶上書其言真有益於國者必加精採倘涉私邪朋姦罔上妄肆雌黃當嚴加究問以諫臣言譁徒吻士結黨叩閽簧鼓是非為攫利之計故也十二月乙巳詔吳潛除同知樞密院事兼參知政事禮部尚書徐清叟為端明殿學士簽書樞密院事己酉詔皇后親兄謝奕昌特除開府儀同三司依前保寧軍節度充萬壽觀使奉朝請壬子史宅之薨輟視朝一日詔朕深念厥紹建資善堂令孟啓就學朕志已定以其年幼未逺姆傅尚留王邸今先欲賜名可討論紹興二年典例聞奏庚戍淳祐十年正月辛未天基節羣臣上壽詔刑部及大理寺奏報罪案各守條限申嚴諸路憲司凡獄訟毋得淹留致連年拘繫違令臺諫覺察以聞乙亥詔淮東制臣丘嶽自能撙節軍用乞將朝廷例合支一千萬貫免科委見體國特進一秩辛卯以朝議大夫試給事中兼侍講董槐知貢舉權禮部侍郎兼侍讀張磻殿中侍御史葉大有同知兼監試二月丁酉朔雪御筆賜董槐以下曰卿等老於文學秉司衡鑑以賦而得仲淹以論而拔蘇軾顧不偉歟責舉成法最為嚴重宜加申警以取實才詔榮文恭王府講通鑑綱目莊文府講朱熹論語集解甲辰上諭輔臣鄭清之曰丘迪嚞今早登對朕以廣冦詢之其言皆有始末洞冦既平當加優擢向來冦作之初或者張皇以甚其事及其平定又言多殺以妬其功若以浮議而抑之他日何以使人宜以正卿處之清之奏謹遵聖諭乙巳都省言銅錢泄漏偽會充斥姦民無所懲畏詔令沿海州縣山隩海島結為保甲互相糾察如有犯者及停藏家許告推賞不告連坐乙卯雨土癸未趙葵乞收還成渙徑畀祠官詔趙葵懇辭相位始終弗渝使命趨召亦既屢矣奏陳確苦殆渝一期朕眷倚雖切而不能強其從也姑畀內祠以便咨訪除觀文殿大學士醴泉觀使兼侍讀仍奉朝請令學士院擇日降制戊子趙葵罷右丞相兼樞密使特授觀文殿大學士醴泉觀使兼侍讀奉朝請庚寅以賈似道為端明殿學士兩淮制置大使淮東安撫使知重慶府李曾伯為徽猷閣學士京湖安撫制置使知江陵府四月辛丑右司諫陳垓言改官班引之人先令赴都堂或御史臺各試書判合理法者許集注如不通且令為丞再試中方與入從之癸卯朝獻景靈宫次幸龍翔宫五月丙寅朔以皇叔祖福州觀察使提舉祐神觀善珘為保康軍節度使提舉萬壽觀襲封嗣濮王詔吳淵久厯從班屢更事任兹領江閫備竭忠勤山寨耕屯俱就規畫除資政殿學士依舊職任與執政恩數六月丁酉龍翔宫奉安感生帝及從祀聖像仍備祭器比附太一宫禮例祈祝上命輔臣申嚴百司用例廢法丁未詔冒濫權攝之人日下住罷丙辰知藤州楊瑾奪官三等以經略司劾其在任推剝貪刻虧公營私故有是命七月癸酉左司諫陳垓言祖宗治贓吏之法具載國史今州縣官吏贓敗或至營求脫免是致廢法乞下諸路制總監司遵守仍許臺臣覺察從之丙子上諭輔臣曰在法詞訴須經次第官司其臺部受詞所當參酌兩造豈宜遽慿單詞剖決致使所屬觀望曲直倒置可令御史臺户刑部遵守庚辰詔殿試改用八月十五日戊子詔兩淮極邊作邑人照川廣例令監司引試書判八月甲午朔詔令户部嚴革諸路州縣增收多量苗米之弊戊申御集英殿䇿進士己酉御射殿閲武舉進士射甲寅上諭輔臣曰和糴本非朝廷之得已若官司奉行無擾則人户自樂與官為市訪聞近年所在和糴未得朝廷排類預行多敷富室大家臨期率以賂免而中産下户反被均敷之害以至散錢則吏胥減剋納米則斛面取贏專計誅求費用尤夥是致民間所得糴本每石幾耗其半其何以堪可申嚴約束九月己巳御集英殿賜正奏名進士方夢魁等及第出身同出身凡五百一十三人辛未賜特奏名進士勑凡六百一十五人甲戍詔進士第一名方夢魁改賜名逢辰戊寅詔去歲嚴州水患田租其悉蠲之十月丁酉詔訪聞郡邑間有水患細民流移恐致失所可令逐處出義倉米量輕重多寡賑之務在實惠均及癸巳御集英殿閲進士射丙午詔賈似道乘邊給餉服勤八稔凡備禦修築之費自為調度尚有餘蓄殊可嘉奬可進官一等詔國家以儒立國士習􅍇惡世道所關端平初增諸郡解額寢漕闈牒試正欲四方之士安鄉井修孝悌以厚風俗比歲殊失初意可令逐州於每舉待補人數內分額之半先就郡庠校以課試取分數及格者同待補生給據赴上庠補試其天府一體施行辛酉詔戒兩淮都統司主兵官今後行罰不許輕用脊棍以傷人命壬申詔新除右丞相趙葵謙退靜恬久辭相位至內祠經幄懇避如初勉諭不回迄虛倚注之意朕甚念之特畀鄉郡以示光寵以旌眷意可授特進觀文殿大學士判潭州湖南安撫大使詔給度牒千道下臨安府易民間兩界破會癸酉詔淮西疆場延袤八百餘里近今沿江制司團結耕屯漸已就緒但制閫置司江南相去差逺可令淮西提舉李士達就司空山創司提舉本路山寨甲戍太傅左丞相鄭清之再乞歸間詔卿以舊學元勳再登輔弼精神密契魚水相須當與宗社同休詎可輕為去就及將間暇正藉經綸更宜堅定宏規力持公是體承眷意勉為朕留庶幾黃髮之詢是亦蒼生之福所祈間退毋復重陳辛巳日南至詔余玠任四蜀安危之寄著八年經理之功敵不近邊歲則大稔既寖還於舊觀將益懋於逺圖疇其忠勤足以褒勉可進官二等壬午雷癸未詔避殿減膳以示恐懼修省之意令諸路漕臣守臣體訪民間疾苦當議優恤丁亥詔曰朕以涼菲受天明命夙夜祇敬不敢荒寧乃長至後一夕雷聲非時震於朕衷罔知攸措夫乖氣致異變繇證起皆朕不德朕方避正殿減常膳以恐懼修省惟爾公卿大夫羣牧百執事各殫乃心揚乃職禆朕不逮昭答譴告用永孚於休布告中外明知朕意參知政事謝方叔吳潛僉書樞密院事徐清叟並乞解機政詔不許十二月壬辰朔太傳左丞相鄭清之乞去詔不許丁巳虹監察御史程元鳳言臺諫所以植立紀綱不可使臺諫之體輕從之詔監司郡守被劾斥者令以次官隨即拘𣙜財物量給送還之費庶絶吏席卷亦愛惜民力之一助從臺臣程元鳳請也辛亥淳祐十一年正月丁卯制以皇姪慶逺軍節度使益國公孟啓可改賜名抆進封建安郡王依前慶逺軍節度使丁亥詔江浙沿流郡縣刷具流民口數於朝廷樁管錢米內賑濟仍許於寺觀及空間官舍居止己丑監察御史程元鳯奏陛下以神聖之資接帝王之統思祖宗付託之重為社稷久長之圖元正謹始宸筆渙頒懋嘉宗英之賢誕舉錫名之典爰即公社用進王封於以隆萬世之基於以係四海之望溥天率土雷動歡聲甚盛舉也然資善有堂講讀有官所願博選端方純謹之士增置輔導贊翊之員下至給使服役之人皆有重厚篤實之行使之出入起居無有不正動靜語默無有不善此實千萬世無疆之休從之詔經筵進講周易終篇講讀記注官各進一秩餘補轉賞犒有差二月壬辰詔故同知樞密院事李􅌫早從諸老歷事三朝史學優長風節堅正已久謝事猶未易名賜諡文肅乙未御垂拱殿左丞相鄭清之等上光宗皇帝寧宗皇帝寶訓今上皇帝玉牒日厯會要丁酉詔鄭清之等進秩有差三月丙寅詔大銓試點檢雷同試卷官一員壬申詔諸道制總監司州郡不得以堂除部注之闕攙越申辟縱元係辟闕若見任有人亦不許預辟下次仰常切遵守違將求辟人降罷乙亥雨土三月戊寅以謝方叔知樞密院參知政事吳潛參知政事徐清叟同知樞密院事戊子臣寮言刑獄追逮鞫訊慘酷囚禁淹延請戒飭中外用敬五刑及申警百司度府監司守倅不許以私怒寄收者不許過三日違者彈奏從之四月壬辰詔賜殿前司十七界會子十萬貫絹千匹步軍司五萬貫絹五百匹令樁留濟給貧乏及纍重官兵己亥以潭州林符三世孝行一門義居福州陳氏笄年守志壽逾九帙詔並特與旌表門閭鄭清之等上敕令所淳祐條法事類四百三十卷上諭輔臣曰昨覽京湖報程􅀈盧氏縣之捷差強人意朕以寡昧服祖宗之令緒兢業不敢荒寧適值十六七年應酬不暇臣清之奏自古事業專在立志臣方叔奏今日實有機會臣潛奏今日事體漢中為四蜀之首襄陽為京湖之首浮光為兩淮之首此當在陛下運量中臣清叟奏願陛下益厲自強之志上曰內修之事又當結人心貪官汚吏為民害者不可不嚴加懲戢壬寅上諭輔臣曰邊事他無聞否遷避之民已復業否方叔奏近來三邊幸無他警淮民之遷避者皆已歸耕其貧甚者聞制司亦少資給之矣癸卯詔以今年九月有事於明堂乙巳上諭輔臣曰積雨於二麥無害否清之奏目前雖不為過然得晴則佳臣方叔奏二麥似無害蠶事惡寒恐少減分數上曰淮上諸城惟合淝濠塹差淺可諭許堪令其開浚丙午詔資善堂已及滿歲贊讀袁商直講陳顯伯檢閲劉昕祖曾黓提點內侍王椿幹辦鄧惟聰各進一秩餘減磨勘支犒有差戊申上諭輔臣曰近日內引丞相朕因及祖宗家法之懿者數條如敬天愛民克己節儉不罪言者皆漢唐所不及朕謂不必逺藉前代只近法祖宗足矣己酉上諭輔臣曰祖宗時遇親邸恩禮隆厚如歲時賜豫甚優然訓迪範防之制尤嚴賓接有禁內外有限近聞有媵妾外館者有干預他事者殊戾家法所當申嚴清之等遵稟而退詔敕令所進呈淳祐條法事類禮畢鄭清之謝方叔吳潛各進二秩庚戍樞密都承旨兼權吏部侍郎陳昉奏今尚書省樞密院應劄子非降旨者必先繳進俟降而後施行可謂盡善然樞密院之法與尚書省不同或邊事正急或盜賊忽熾機變倐聞酬應宜速小有需俟關係匪輕乞令樞密院自今邊防及盜賊急務且奏且行勿拘常程從之五月丁卯詔趙以夫劉克莊同共任責修纂國史志傳以全大典日下條具以聞癸酉以久雨蠲大理寺三衙臨安府屬縣見監贓賞錢辛巳詔出封樁庫十八界會子十萬貫給諸軍壬午詔決中外繫囚杖以下釋之復蠲贓賞錢六月甲午詔余玠整頓蜀閫守禦飭備農戰修舉蓄力俟時期於恢拓兹以便宜自為調度親帥諸將行邊搗壘捷奏之來深用嘉歎勉規雋功以遂初志圖上全蜀以歸職方嗣膺殊封式副隆倚立功一行將士速與具奏推賞乙卯祕書省言乞辟校勘檢閲等官仍行下諸路漕司於所部州縣應有印本書籍解赴册府以補四庫之闕及故家巨族必有遺書山林名儒豈無著述許令投進照格推賞從之七月甲戍上諭輔臣曰近聞外間多扇關節之説關係風俗不小若不禁戢蠱壞世道詔令御史臺覺察仍下帥漕兩司訪緝置立窠局妄營關節之人究治如律壬午太白晝見經天癸未上諭輔臣曰去歲罷京學類申欲令四方之士各歸鄉校以課試理校定稍復鄉舉里選之意近覽上著士人投匭之書謂猶有未還鄉井者科舉在近可令臨安守臣曉諭士子早還本鄉所有土著人自依此制行歲校之法其遊士出學年久不能赴鄉舉者與赴浙漕試令行考校仍取待補以示優恤丙戍上諭輔臣曰諸州間多水旱皆由人事未盡如省刑罰薄稅斂蠲逋負禁科抑懲官吏之姦察民情之枉可令諸路監司下之郡邑有關涉六事者日下遵行八月甲午以鄭清之為明堂大禮使謝方叔禮儀使吳潛儀仗使徐清叟鹵簿使趙與籌橋道頓遞使丁酉熒惑入井甲寅沂靖惠王府乞改講周禮從之九月巳未詔皇弟少保保康軍節度使嗣沂王貴議讀周易終篇其教授官官屬可依昨來皇弟思正體例推恩甲子景獻太子府乞改講尚書從之丙寅詔昭慈永祐永思永阜永崇永茂六陵并成穆成恭慈懿恭淑四攢宮遇有修奉告遷神御合行事務令檢察宫陵所關太常寺一面請降香表擇日依例排辦己巳朝獻景靈宫庚午朝饗太廟辛未饗於明堂大赦天下己卯觀文殿大學士宣奉大夫遊似凡五疏乞歸田里詔不許庚辰榮王府乞改講周易從之鄭清之力辭扶掖凡五奏詔從之丙戌詔鄭清之禮展宗禋慶成縟典回一晴於俄頃實資燮理之能相大祀以肅雍尤見感通之妙爰特頒於瑶帶庸示眷於鈞衡以答忠勤宜膺榮渥所賜玉帶可便服繫十月壬子知樞密院事兼參知政事謝方叔纍乞解罷機政詔不許閏十月丁巳朔侍御史陳垓奏朱熹近世大儒有功斯道曾任浙東常平使者適值旱歉講荒政立義倉流風善政逮今未泯帥臣馬天驥固已規創書堂今乞廣其未備招延名儒以重教育詔從之庚申太常議故户部侍郎劉漢弼諡曰忠十一月丙申京湖制臣言調遣都統髙達晉德入襄樊措置經理漢江南北並已肅清積年委棄一旦收復詔立功將士官兵各進官一等特支官會三百五十萬貫等第充賞御筆襄陽要區積年未曾經理每關憂顧李曾伯受任邊閫抗志逺圖俾襄樊二城一日復舊計慮密而用力多矣且按兵毆敵觀聽無譁繕城峙糧規略素定必耕屯之並舉與守備以俱全載嘉忠勤宜示褒勸可除寶謨閣學士京湖制置大使兼職依舊壬寅詔隆冬凝寒都民不易出封樁庫十八界官會子二十萬貫賑之癸卯蠲大理寺三衙臨安府屬縣見監贓賞錢丁未決中外繫囚杖以下釋之乙酉詔江東西湖南北福建二廣有災傷瘴癘去處雖已賑恤猶慮州縣奉行不虔可令監司守臣體認德意多方極救庚戍鄭清之薨贈尚書令追封魏國諡曰忠定甲寅以謝方叔為左丞相吳潛為右丞相並兼樞密使乙卯以徐清叟為參知政事兼同知樞密院事新知福州董槐為端明殿學士簽書樞密院事十二月丙辰朔輔臣謝方叔等謝新命上降御筆曰朕觀比年以來朝綱浸弛時事日乖所以並命二相夾輔王室正賴開明公道振起治功肅紀綱以尊朝廷用正人以強國勢通楮幣以紓邦計卻哨騎以固邊陲清吏道使無貪黷之風淑士類使無囂浮之習軍馬當足則飭戒閫帥以去虛挂之籍人心當結則嘉豫守令以行寬恤之恩此皆今日切要之務昨來並命往往各分朋黨互持己見交相擺闔陰肆傾排是以猜忌成風衆弊膠轕今朕用搢紳之公言從中外之人望登庸碩輔參運化權繼自今勿牽人情勿徇私意以玄齡如晦為法以趙鼎張浚為戒務為正大之規以副倚毗之意上又曰自來並命二相本欲協濟緣各任已見且因賓客交鬬遂成黨與不可不戒卿等宜同心輔政深矯前人之失清叟奏蕭規曹隨房謀杜斷必如是而後可方叔等奏惟知盡忠竭力上答聖恩當佩服勉所未至上然之丙寅詔令吏部四選以下刷具應干淹滯名件並要了絶違當重懲詔遊似依舊觀文殿大學士進官二等致仕戊辰詔殿步司軍兵應殁故纍重之家特許以子弟填刺辛未詔襄蜀兩淮極邊并新復州郡縣及二廣惡弱去處或遇闕官許令斟酌辟上壬申詔令諸路監司帥守但干攤賴支蔓罥罣之人並日下釋之癸酉上諭輔臣曰邊事未息武備當嚴五兵所先莫如弧矢昔种世衡守青澗日教習射羌人畏之其法可以推行詔令諸路帥閫守臣講明區畫詳議激勵使各令自衛鄉井弓弩箭隻聽從其便己卯詔兩淮沿江京湖制司於江北地分及淮西山寨管內應有官屯民田耕種去處並令團結隊伍隨其聚落就中擇衆所服者充甲長任責結保有警率其所部務從便宜或有踈虞先懲頭目人有能勵率強壯精習武藝者先與奬勵將來能出力鏖戰當以真命旌賞庚辰遊似薨輟視朝二日壬子淳祐十二年春正月丙戍朔御大慶殿羣臣朝賀上出御札戒羣臣曰繼自今毋養蠧毋惠姦毋以姑息市私恩毋容僥幸廢公法詔諸路官司違禁罔私害民事悉罷之甲午集英殿大宴宰執內幄奏事上曰救楮事不可緩吳潛可専此責丙申詔諸路監司帥守事有關人命連逮者官欠攤涉者偽會枝蔓者詞人淹繫者咸釋之仍嚴估平民之禁詔中興以來諸王公主妃嬪保母皆有攢所禮宜從厚邇來有司漫不介意其令臨安府如儀修葺以時祭祀有主奉者不在此數己亥詔兩浙淮東提舉司所部官闕於正官內差權毋以白身或罷吏庚子詔二廣福建江西湖南去歲疫癘州縣人户有絶世者令監司守臣稽其財産即其族命繼給之逺官身殁其家不能自歸者官為理遣勿令財物有所隱失壬寅吳潛辭専任楮幣之責詔朕以二三執政皆天下之選心同志合無往年形迹之嫌故以楮幣一事俾卿專任面諭已詳胡尚謙執宜亟祗朕命凡茶鹽錢穀與楮相關者悉新是圖以底成績潛奏請以方叔提其綱清叟槐贊其成而臣服其勞詔蠲闕府五稅務征戊申上諭輔臣曰淮東邊報不一可於江上整􅐅萬兵以備緩急江面雖已分定三流更須擇將分兵巡徼庚戍詔宰執曰近聞北騎之來往往儲糗糧立寨柵以為因利乘便之計守臣邊將方欲嬰城退守則有老師費財之患方欲開關接戰又有兵連禍結之憂今朕欲於兩淮沿江各令立一項遊擊軍以備不時調遣設若緩急隨宜應接使大軍偏師搗虛此正李廣縱部曲逐水草號飛將軍之遺意也又聞邊疆之外皆平原曠野北騎衝突邊臣每有迅雷不及掩耳之患今朕欲令極邊州郡開浚水道去城百里之間三里一溝五里一洫使北騎不得長驅而入邊民亦可為耕鑿之計此正古者立方田開溝澮以限戎馬之遺意也邊防二事久注朕懷兹與卿等共籌之條上便宜以寬憂顧癸丑上諭輔臣方田事且令近城為之遊擊軍當招水步各半方叔等曰容講究行之二月乙卯朔日有食之詔禮部貢舉丙辰詔增資善堂講官一員丁巳上諭輔臣資善訓導之官正要擇人方叔對曰進善不特教以章句凡事皆當訓導使知孝悌知世務上曰習慣如自然壬戍詔曰朕惟明目張膽當言即言其責在臺諫斟酌劑量可行即行其權在人主我朝固有臺諫敢言具申力抗五七疏而不報者非所以抑臺諫之風采直以其事之關一從甚重也今乃不然數年以來奏疏方入臺牒繼之惟知風憲之必行不俟上章之報可嘗有用之於執政大臣者有施之於端人正士者如此則人主之所欲用者臺諫皆得去之臺諫所欲去者人主不得而留之不幾於威權浸移太阿倒持乎自今後臺諫毋循弊規有失國體奏疏必俟得旨付出方許報行廢江灣梅里雇徑魏村古浦五酒庫以都司言帥司為餉軍創五庫官吏並緣漁獵故也己巳詔諸路提刑按部囚徒丙子置池州遊擊軍戊寅上諭輔臣賈似道已有淮甸肅清之報不知田疇尚可及耕種否方叔奏兵退在芒種前猶可及事辛巳監察御史劉元龍言楮幣積輕宜因各路時直令州縣折納純用楮從之後公私交病明年仍用錢會中半五月甲申朔命侍從卿監一人禱雨於天竺霍山乙酉上諭輔臣曰禱祈未應恐獄訟淹延有傷和氣凡可求之人事者須講究施行丁亥雨上曰微雨未浹洽清叟奏方此閔雨土木之役宜省上從之壬辰上諭輔臣轉眼秋風江淮備禦所當早計方叔等奏當輕重緩急與諸閫議行甲午以禱雨出封樁庫十八界楮二十萬給散諸軍有差乙未上曰夜來一雨甚好聞外間得雨已多但京城差少今想內外霑足矣槐奏昨日軫恤軍民恩詔甫頒甘雨隨至以此見天人相與之際甚近願陛下益堅對越之心上曰益當自勉乙巳盜起玉山庚戍罷諸郡今界從臺臣蕭泰來奏也初故相清之奏行今界於六郡會玉山飢民嘯鬨言者歸咎焉六月癸酉朔盜逼衢境命徐敏子體訪上曰當撫定為主乙卯詔復諸郡待補生人數舊額癸亥出百萬倉米三萬石賑衢信飢乙丑上諭輔臣曰玉山冦已平方叔等奏民窮則為盜守臣不可不擇戊辰上諭輔臣曰邇年科舉取士鮮得實學士風人才關係氣數何䇿以救之潛奏乞於省試額中輟一二十名令有司公舉海內行義文學之士庶尚存鄉舉里選微意曩時朱熹真德秀亦有此請癸酉上曰近日學校之士本起於至微不謂其相激乃爾若紛紛不已恐非美證先是三學諸生叩閽言京尹余晦相率出學上令學官勉闕齊故因輔臣奏事復及之丙子大理正尹桂輪對乞置闕於禁嚴非特父子之情浹洽亦所以為事制曲防之慮戊寅詔朕惟故相中令魏國公忠獻王史彌逺光輔兩朝備殫忠藎而嘉定更化之績甲申定䇿之功尤甚彰明較著者也銘書太常永有休聞而薨背越二十年隧道之碑未立朕甚憫焉爰考太宗神宗皇帝所以光寵普琦故事親御翰墨為製碑銘以公忠翊運定䇿元勳題其首可宣付史館以備立傳以見朕褒嘉念舊之意己卯上諭輔臣衢嚴水災江東亦苦雨此陰盛之證方叔等奏水亦兵證邊備不可不嚴七月甲申上諭輔臣嚴州水勢可駭移撥之米當賑濟不當賑糶方叔奏衢婺台亦多漂蕩宜一體救恤戊子上諭輔臣曰信州水災尤甚方叔奏建寧劒括蒼亦然皆臣等輔政無狀上干天和所致今惟以救恤為急庚寅以諸路水災令學士院降詔遣使分郡賑恤詔曰蓋聞王道得則隂陽和公正修則百川理朕夙寤晨興無一念不在乎民乃夏涉秋淫雨為沴水失其性沸湧丘原嚴陵衢婺台處之封上饒富沙劒邵之境溢於城邑蕩乃屋廬父子室家不能相保田疇稼穡存者幾希興言內郡之被災未有此時之為甚由朕不德在爾何辜已命攸司賑恤仍遣朝臣存問務昭布於寬條以推行於實惠於是遣諸軍計院師輿往建邵南劒國子監簿葉隆禮往嚴衢信登聞檢院胡大昌往婺處合告勑凡一百道分遣有差辛丑上問輔臣三使行未方叔等奏明日出關清叟奏建邵南劒水尤甚師輿所將僅百萬恐賑恤有限上曰可增五十萬乙巳上曰聞福建水傷人頗多清叟奏水退之後貧民無以為生亦有自經溝瀆者聞帥臣陳昉發楮三十萬漕臣饒虎臣發楮五十萬米五千石以賑之乞與除豁使知聖旨上欣然從之其後蠲九郡苗米凡二十二萬五千八百七十石有竒己酉上諭輔臣徐霖以庶官論臺諫京尹要朕之必行殊傷事體適已批出潛等奏願陛下更賜優容御批徐霖以庶官而論臺諫及京兆要朕之必行事關紀綱前此未有昨言去余晦為是今乃疏葵抗為姦言及朝士親填姓名情懷不一首鼠兩端可依所乞除職豫郡八月癸丑朔令户部下諸路申嚴州郡苛取斛面之禁乙未詔明年省試仍用二月一日以四月殿試先是淳祐九年臺臣陳垓奏省試用三月殿試八月逺方之士留滯逆旅至是復舊方叔潛乞解機政疏四上詔不許甲子申嚴文武官改正敘復之令己巳出封樁庫十八界楮四十萬賑行在軍民丁丑太史奏新厯成詔賜名會天厯行之戊寅再決中外繫囚上曰淫雨未巳恐四方郡縣刑獄淹延或有慘刑妄殺可詔行寬恤九月壬午詔以明年改為寶祐元年丁亥詔建西太乙宫於延祥觀左庚戍上諭輔臣近來早朝多奏臣下辭免等細事而事體大者反從繳進甚非臨朝聽政之意自今宜就早朝面奏十月壬子朔詔諸路守臣依舊制到任半年條便民五事及四方利病來上癸丑以徐清叟除參知政事董槐同知樞密院事甲寅都省言既復襄樊宜措置屯田修渠堰詔守臣髙達任責仍令前德安守臣程大元督役甲子上諭輔臣史院纂修須用褒貶必得是非之公乃可壬申詔舉帥材癸酉宰執擬進都承旨陳力修恩數上曰集撰為都承方可依權侍郎法祕撰未可引此恩數十一月辛巳朔右司李伯玉劾御史蕭泰來上令伯玉具都司劾御史故事聞奏詔曰國家設御史所以糾正百官置宰掾所以參贊機務御史乃天子耳目之臣而掾不過一大有司未聞有以庶僚而糾劾御史者近者徐霖以都司而按大有今李伯玉又以都司而按泰來隂懷朋比之私蔑視紀綱之地是非所以輕臺諫乃所以輕朝廷也李伯玉乃復援張商英等事以文其過然三省密院奏請專邪況郭磊卿以正言而按李遇吳當可以體統之聨屬也翁甫以下士而按别之傑以其人事之關係也若都司可以按御史則御史反將聽命於都司矣朝綱不幾於紊亂乎李伯玉可降兩官放罷庚寅吳潛罷以御史蕭泰來論其姦詐十罪如王安石而又過之也丙申夜臨安火丁酉夜火乃熄戊戌詔避殿減膳庚子行失火家罰成忠郎劉世顯除名編管壬寅詔曰朕以菲涼託於兆人之上夙夜祇懼不敢荒寧乃者仲冬以來祝融挺災仍舊而見闤闠盛繁之地貨財懋遷之區煨燼為墟生聚無所號呼顛踣震於朕聞何辜今之人至此極也可自今月十九日後避正殿減常膳應中外臣寮並許實封直言闕失毋有所隱以稱朕懇惻為民之意以隆寒出封樁庫十八界會子二十萬賑三衙諸軍其出戍官兵之家倍支丙午宰執奏曰臣等昨蒙聖賜御製仁厚論深得本朝以仁立國之意上曰太祖得天下市不易肆纍聖皆本此意己酉上諭輔臣年來文體稍浮科舉在近宜少革之方叔奏欲變文體當自奏議始上曰經濟録奏義可為法十二月乙卯以吳潛為觀文殿大學士提舉太平興國宮己未詔追録彭大雅創築渝城功復元秩仍官其子癸亥都省言本朝自中興以來依海建都其神合該大祀詔自明年始春秋遣從臣奉命往祠仍令奉常條具典禮來上丁丑立春雷癸丑寶祐元年正月庚辰朔御大慶殿羣臣朝賀上出御筆曰朕惟皇嗣之建係宗社國家之本固宜早計而豫定也建安郡王某可為皇子改賜名禥令學士院降詔癸未詔曰有天地然後有父子立愛惟親聖王所以重人道之經正天下國家之本也朕荷上帝之眷祐纘列聖之基圖思所以為詒謀之計夙夜不敢康若稽前猷祗用率迪建安郡王孜藝祖皇帝之嫡系十一世孫皇弟嗣榮王與芮之子而朕之猶子也生有竒質岐嶷夙成朕意屬之久矣頃以尚幼就邸諭教而能篤志問學聞於道術智誼之指時命入侍莊重有儀益有契於朕心今年齒寖長考禮正名允合古誼俾居內掖以共子職仍開資善以親師模庶幾日見正事日聞正言以成就其德美焉上以嚴宗廟下以係億兆之心也其以為皇子改賜名禥宰執稱賀上曰朕注意於此久矣方叔對曰此事出於聖斷宗社之福也甲申天基節羣臣上壽上曰聞元日出命外論甚喜方叔對曰不但人心胥悅轉隂為晴可見天意御製資善堂記賜皇子翌日皇子具表謝甲辰詔以權禮部尚書兼直學士院陸得輿知貢舉中書舍人兼侍講鄭發祕書少監兼侍立修注官崇正殿説書牟子才同知侍御史程元鳯監試二月己酉日有食之詔知貢舉陸得輿等崇雅黜浮丕變士習壬子雪詔臣寮久在遷謫者令自便惟誤國殄民者弗赦戊辰謫陳垓潮州居住先是宰執奏其貪贓不法宜付有司鞫問然重以臺臣下吏且從遷謫上曰當如此以為人臣懷利事君者之戒己巳再蠲兩浙漕司臨安府竹木稅一月三月壬午上諭輔臣夔門擇守切於東南宜速區處丙申以前參知政事别之傑薨輟視朝尋贈少師庚子以韓宣為遙郡防禦使守夔州兼副帥壬寅詔曰比年以來風俗不美好惡不公臣僚論列固許風聞而亷訪不真是非貿亂自今大臣除授惟才是用內外臺彈劾並須審實毋攟細故潛發隂私其有贓汚實迹則祖宗自有成憲必罰無赦咨爾有位其修身奉法以副朕嘉與維新之意四月甲寅申嚴廷試挾書之禁壬戍録西柳關捍禦之功髙達程大元李和吉文瑫王登及將士等增秩補官賞賚有差己巳上問蜀中近報方叔等奏已下夔路清叟奏蜀中向後分置四帥庶有掎角之勢上曰舊自有四戎帥又有正副帥槐奏此亦二矛重弓之意五月戊寅朔上曰趙希墍可差知平江府其人清修儘能撫摩先是上以吳門擇守諭輔臣方叔奏平江東控海道年來和糴民力頗困宜得才略善撫摩者至是方叔等咸贊上知人之明辛巳省罷處州稅官二員置麗水縣西尉甲申以工部尚書兼直學士院兼侍讀尤焴工部侍郎兼侍講林彬之國子司業兼崇正殿説書葉夢鼎為御試詳定官乙酉御集英殿䇿進士丙戍御射殿呈武舉七射戊午新除直華文閣湖北運判兼知鄂州余晦朝辭上曰西事乏人卿可為朕一行晦奏臣資淺望輕西事素未諳厯若冒承當恐致誤國上曰朕與宰執熟籌之無如卿者庚申以余晦為司農卿四川宣諭使壬申詔昨已頒余晦諭蜀之命道里遙逺邊防宜急毋得退避以失事機七月辛巳上諭輔臣余晦朝辭已戒其務行寬政是日國子司業葉夢鼎進對奏至三蜀遣使上曰此人有才葉夢鼎奏其人雖少有才蜀當垂亡危急之秋恐不勝任願入聖虞毋嫌反汗壬午以前參知政事王伯大薨輟視朝丙戍以蔡杭施退翁並兼資善堂直講庚寅溫台處三郡大水詔發豐儲倉米及各州義廩賑之甲午以余玠薨輟視朝庚子以董槐兼參知政事癸卯詔撫諭四川官吏軍民八月癸丑詔福建帥司毋得循襲以本州寄居充幕屬丙辰詔朕追惟大母保祐之恩楊次山等易名之典尚闕其賜次山諡惠節谷諡敏肅石諡忠憲乙丑詔鑄寶祐新錢以皇宋元寶為文九月戊子詔鄭清之舊學云亡朕切念之逺日有期可令慶元府里葬從其厚十月丙午朔出封樁庫楮四十萬賑行都軍民十一月乙酉西太乙宫成辛酉日南至御大慶殿羣臣朝賀上諭輔臣襄城一捷甚偉數十年所無令降詔奬諭壬寅以延昌公主進封瑞國命徐清叟為册禮使董槐副使清叟撰册文書册篆印册以象齒印以金一寸文曰瑞國公主之印十二月乙卯御文德殿册瑞國公主龜鑑曰其封瑞國也必才明敏慧必仁孝溫恭必能通孔孟之書必克遵任姒之教必能肅雍而成德必處富貴而不驕然後可以啓正觀晉陽之寵可以崇興國鄭國之封其與書之紀娥英之盛詩之歌桃李之華者同一宫闈之美也又非得易家人有孚之道發之乎庚申以前參知政事劉伯正薨輟視朝壬戍景獻太子府沂靖惠王府並改授尚書莊文太子府改授周禮辛未太常議故直龍圖閣李道傳諡曰文節宋史全文卷三十四
