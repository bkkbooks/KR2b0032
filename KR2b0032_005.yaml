body:
  text: 宋史全文卷五宋真宗一戊戌咸平元年春正月辛酉朔改元丁丑蔡州學究丁可名上言諸經板本多誤上令擇官詳校因訪羣臣通經義者以崔頥正對上曰朕宫中無事樂聞講誦因召頥正於後苑講尚書大禹謨賜五品服它日謂輔臣曰頥正講誦甚精卿等更於班行中選經明行修之士一二人具以名聞自是日令頥正赴御書院待對吕中曰宋朝以家學為家法故子孫之守家法自家學始此范祖禹帝學一書極言宋朝承平百三十年異於漢唐由祖宗無不好學也然人君之學尤在於所共學之人故在太祖時則有若王昭素在太宗時則有若孫奭邢昺在真宗時則有若崔頥正馮元輩皆極一時之選也甲申有彗出營室北光芒尺餘上謂輔臣曰彗出甚異唯將奈何吕端等言變在齊魯之分上曰朕以天下為憂豈獨一方耶甲午詔百官極言得失乙未慮繫囚詔諸州長吏平決獄訟申理寃濫先是吏部郎中直集賢院田錫出知泰州未之任㑹星變錫上疏言李繼遷不合與夏州又不合呼之為趙保吉是時事舛誤之大者宻院公事宰相不得與聞中書政事樞宻使不得與議相承既久驟改固難致兵謀不精國計未善疏奏即日召對移晷將行又貢封事復召對謂曰卿第去不半嵗召卿歸矣事有當面論者聽乗傳赴闕詔以乆停貢舉頗滯時才令禮部據合格人内進士放五十人諸科百五十人來嵗不得為例夏四月遣使乗傳與諸路轉運使州軍長吏按百姓逋欠文籍悉除之始用王欽若之言也除逋欠凡一千餘萬釋繫囚三千餘人上由是眷欽若益厚吕中曰漢唐之小人易知宋朝之小人難見熈寕以後之小人易知熈寧以前之小人難識葢自古小人之所以誤國者聚斂也嚴刑也用兵也而宋朝之指目為小人者自欽若丁謂始然欽若則請蠲負釋係囚丁謂則請罷兵撫蠻冦自今觀之與君子之處官何異惜其入政府以後患得患失之心生而改節易行矣故為判官之時一欽若也為參政之時一欽若也為轉運之時一丁謂也為宰相之時一丁謂也故當時知二子之奸者王旦李沆而已五月戊午朔日有食之六月宻州發解官鞠𫝊坐薦非其人當贖金特詔停住上謂輔臣曰凡所舉官多聞繆濫宜先擇舉主以類求人今外官要切惟轉運使卿等可先擇人令舉之八月朔詔三司經度茶鹽酒稅以充嵗用勿得増加賦斂重困黎元諸色費用並冝節約九月上謂宰相曰轉運使按察官吏事權甚重太寛則弛慢太猛則苛刻必須廉平之吏寛猛適中卿等其謹擇之冬十月丙戌朔日有食之宰相吕端累上疏求解罷為太子太保户部侍郎張齊賢與户部侍郎參知政事李沆並平章事參知政事李至罷為武勝節度使參知政事温仲舒罷為禮部尚書樞宻副使夏侯嶠罷為户部侍郎樞宻副使向敏中加兵部侍郎參知政事翰林學士楊礪宋湜並為樞宻副使十一月乙未宰相張齊賢李沆入對上諭之曰上下和睦同濟王事忠孝之誠始終如一齊賢曰君為元首臣為股肱上下一體豈有不同其心而能濟國家政事者哉已酉崇政殿視事至午而罷上自即位每日御前殿辰後復出御後殿視諸司事或閱軍士日中而罷夜則召儒臣詢問得失或至夜分其後率以為常三司上經費之數上曰先帝以財賦國之大本莫不求諸中道而為其永制輔臣曰先帝非止愛人嗇費至於節損服用躬御澣濯之衣葢前古哲王莫能偕也上初命三司具中外錢穀大數以聞鹽鐡使陳恕久而不進上命輔臣詰之恕曰天子富於春秋若知府庫充羡恐生侈心故不敢進也上聞而善之龜鑑曰宋朝之用度所入莫多於天禧祥符之時所出亦莫多於天禧祥符之時宜乎陳晉公不答錢榖之問而曰天子冨於春秋若知府庫充溢恐生侈心仁人之言其利溥哉何其簡而切婉而直耶嗚呼丁謂上景徳㑹計錄而封禪定林時上祥符㑹計錄而天書成則知陳晉公之為逺慮其次則王魏公東南民力竭矣之言猶或庶幾下是如丁林等軰真小人矣可不戒哉詔置估馬司凡市馬之處河東則府州岢嵐軍陜西則秦渭涇原儀環慶階文州鎮戎軍川峽則益黎戎茂雅䕫州永康軍皆置務己亥咸平二年春正月甲子詔尚書丞郎給舍舉升朝官可守大州者各一人限一月以名聞俟更三任有政績當議奬其善舉有贓私罪亦連坐之二月以太師贈尚書令韓王忠獻公趙普配享太祖廟庭上命學士院召試王欽若及覽所試文謂輔臣曰欽若非獨敏於吏事兼冨於文詞今西掖闕官可特任之即拜右正言知制誥己酉上謂宰相曰聞朝臣中有交結朋黨互扇虚譽速求進用者人之善否朝廷具悉但患行已之不至耳浮簿之風誠不可長乃命降詔申警御史臺紏察之三月命裴莊等分詣江南兩浙發廩粟賑飢民除其田租閏三月宰相張齊賢述皇王帝伯之說上曰朕謂皇王之道非有迹但庶事無撓則近之矣上以亢旱詔求直言京西轉運副使朱台符上疏略曰陛下踐祚以來二年之内彗星一見時雨再愆彗星見者兵之象也時雨愆者澤未流也今北敵未賔西羌作梗荆蠻有猖狂之冦江浙多飢饉之民冝設備以禦之修政以厭之又言農者國之本也其利在粟多兵者國之命也其功在戰勝方今患在農少而粟不多兵多而戰未勝農少則田或未墾兵多則財用常不足民利盡於國國利盡於軍所以民困而國貧也國家養兵百萬自夏庭逆命軍聲不振一紀于兹將帥不用命而委任不専士卒驕惰而不習知邉事也又言不任人無以安邉不安邉無以省兵不省兵無以惜費不惜費無以寛民不寛民無以致治捨此數事雖有智者不能為計矣又言簡易者事不黷節儉者財有餘今官吏森羅使者旁午無名之賞賜不急之造作他費百端動計千萬加以教化未甚行廉恥未甚至法有滋章之條吏無惻隠之實上優詔褒答時上封事者不下百數上令近臣閱其可采者取進止夏四月詔文武羣臣封事閤門畫時進入勿致稽留河東轉運使宋博言大通監冶鐡盈積可供諸州軍數十年鼓鑄請權罷采取以紓民詔從其請時西北二邉屯師甚廣愽經制饋餉以幹治稱朝廷難其代凡十一年不徙丙子上謂輔臣曰庶官中求才幹則不乏詢徳行則罕見其人夫徳為百行之本徳行之門必有忠臣孝子豈無徳行者能全其忠孝乎又庶官所掌之務多不修舉而捃拾他局利害以圖進身若能自幹本局則百職不嚴而肅又何患乎政事之撓瀆哉張詠知杭州詠既至屬嵗歉民多私鬻鹽以自給捕犯者數百人詠悉寛其罰而遣之官屬請曰不痛絶之恐無以禁詠曰錢塘十萬家饑者八九茍不以鹽自活一旦蜂起為盗則其患深矣有民家子與姊夫訟家財壻言妻父臨終此子才三嵗故見命掌貲産且有遺書令異日以十之三與子七與壻詠覽之曰汝妻父智人也以子幼甚故託汝倘遽以家財十之七與子則子死於汝手矣亟命以七分給其子餘三給壻皆服詠明斷拜泣而去五月詔天下貢舉人應三舉者今嵗並免取解自餘依例舉送當竢奏名朕親臨試上謂宰相曰近覽上封所述頻言風俗侈靡且金至寳也使之為泥誠亦可惜令有司禁臣庶泥金鋪金之飾違者坐其家長張齊賢請先責大臣之家上幸曹彬第問疾先是知雄州何承矩奏敵謀冦邉上以問彬對曰太祖英武定天下猶委孫全興經營和好上曰此事朕當屈節為天下蒼生然須執紀綱存大體即乆逺之利也六月戊午武惠王曹彬卒上臨其䘮彬性仁恕清謹遜言恭色在朝廷未嘗抗辭忤㫖博覽强記善談論被服雅同儒者尤疎財未嘗聚蓄伐二國秋毫無所取位兼將相不以為等威自異北征之失律也趙昌言表請行軍法及昌言被劾未得入見彬在近宻遽為上請乃許朝謁彬歸休閉閤門無雜賔保功名守法度近代良將稱為第一七月上聞契丹將入冦以傅潛為鎮定髙陽闗行營都部署宰相張齊賢請給外任官職田詔三館祕閣檢討故事申定其制以官莊逺年逃田充悉免其租八月判大理寺王欽若上言本寺公案常有五十至七十道近者三十日内絶無昔漢文帝決獄四百唐太宗放罪三百九十人然猶書之史冊號為刑措當今四海之廣萬類之多而刑奏止息逮乎逾月足彰恥格之化式漸太和之風請付史館用昭聖治從之丙寅大閱上謂王超曰士衆嚴整戎行練習卿之力也丁夘近臣諸軍將校内職皆暢飲詔大閱所踐民田蠲其租癸酉樞宻副使楊礪卒上謂宰臣曰礪介直清苦方當任用遽此淪謝甚可悼也即冒雨臨其䘮礪私舍委巷中乗輿不能入上為步進益嗟閔之乙亥以追封濟陽郡王武惠公曹彬配享太祖廟庭文惠公薛居正武惠公潘羙元懿公石熈載配享太宗廟庭冬十月先是福建路不置惠民倉庫部貟外郎成肅請増置焉詔從肅請令諸路轉運司申淳化惠民之制歳豐熟則増價以糴饑歉則減直而出之十一月丙戍合祭天地於圜丘奉太祖太宗並配升壇奠玉帛訖方詣罍洗再升壇如舊儀乙未詔以邉境繹騷取來月暫幸河北十二月車駕發京師次大名府威虜軍言契丹來冦出兵擊敗之殺其酋帥初河北轉運使裴莊屢條奏傅潛無將略樞宻使王顯頗庇之莊奏至輙不報縁邉告急潛麾下步騎凡八萬畏懦自守敵破狼山諸寨入祁趙出邢洺間朝廷屢督其出師皆不聴丙子詔百官各上封章各言邉事於是工部侍郎錢若水言傅潜領數萬雄師閉門不出坐看戎冦俘掠生民上則辜委注之恩下則挫鋭師之氣軍法曰臨陣不用命者斬今若申明軍法斬潜以徇然後擢取如楊延朗楊嗣者五七人増其爵秩分授兵柄不出半月可以坐清邉塞起居舍人直史館李宗諤言夫將帥者必先觀其取予察其智謀能總千人者委以千人之權能敵萬人者授以萬人之職各守一郡一城分領驍雄争據要害來則急擊去則勿追又豈須置三路部署之名制六軍生死之命使有材力之士不得施為縱欲立竒功報厚遇為人所制莫可得也庚子咸平三年春正月己夘朔王均僣號大蜀改元化順入䧟漢州吕中曰李順之黨方息而劉旴興劉旴之徒方平而王均起何蜀人之好亂也葢其民勇悍而又狃於僣偽之久故易誘以亂耳然安李順之黨者張忠定也平劉旴之亂者亦張忠定也代以牛冕則王均反牧守其可非人乎張詠使蜀者再真宗曰得卿治蜀無西顧憂趙抃使蜀者三神宗曰聞卿入蜀一琴一鶴自隨為政簡易亦若是耶此為蜀擇詠非為詠擇蜀也為蜀擇抃非為抃擇蜀也先是范廷召分兵擊敵求援於髙陽闗都部署康保裔保裔即赴之廷召潜師以遁敵騎圍之數重保裔決戰凡數十合兵盡矢窮救兵不至保裔沒焉敵遂自徳棣濟河掠淄齊而去傅潜張昭允並削奪官爵潜流房州昭允通州仍籍沒其家貲先是上駐大名聞驍將楊延朗楊嗣石普軰屢請益兵潜不之與有戰勝者潜又抑之繇是大怒令潜等詣行在至則下獄命錢若水魏庠馮拯案鞫之罪當斬詔特貸其死公議無不憤惋范廷召等引兵追契丹丁亥至莫州大破之餘衆遁逃出境遣使奏㨗羣臣稱賀上作喜捷詩題行宫壁王均攻綿州不克直趋劒門知劒州李士衡與劒門都監裴臻逆擊敗之均衆乏食還成都甲午車駕發大名府上始聞王均反即以雷有終知益州李惠石普李守倫並為川峽兩路捉賊招安使帥步騎八千徃討之庚子車駕至自大名府李沆為東京留守不戮一人而輦下清肅乙巳王均復入成都二月翰林學士王旦等三人權知貢舉樞宻使王顯罷為山南東道節度使翰林學士王旦為給事中同知樞宻院事諸軍校以次遷補多自陳其勞績者呼延贊獨進曰自念無以報國不敢更望升擢衆頗嘉其知分贊初為鐵騎都指揮使從太宗平太原時方决䇿北征左右因言自此取幽州猶熱𨫼翻餅耳贊獨曰此餅難翻言者不足信也太宗不從卒無功而還君子謂贊麄暴尚能識此武臣中不可謂無其人也丙子曲宴近臣於後苑三月戊寅朔日有食之上在大名詔調丁夫十五萬修黄汴河監察御史王濟以為勞民請徐圖之乃命濟馳徃經度還奏省其十之七宰相張齊賢以河决為憂因對并召濟入見齊賢請令濟署狀保河不決濟曰河决亦隂陽灾沴所致宰相若能和隂陽弭灾沴為國家致太平河之不決臣亦可保齊賢曰若是則今非太平耶濟曰北有契丹西有繼遷兩河闗右嵗被侵擾以陛下神武英畧茍用得其人可以馴致今則未也上動容獨留濟問以邉事濟退而著備邉策十三條以獻於是選官判大理寺上曰且擇當官不回者王濟近數言事似有特操可試之以濟權判大理寺吕源曰王濟以鎮州通判召還自結太宗之知許不時請對繼判登聞院真宗即位多上疏言事命同舊相張齊賢刪定編敕與齊賢争辨詞氣甚厲至目齊賢為腐儒不知適時之要齊賢再相㑹選官判大理寺而濟預選未幾以議刑失實停官方濟㧞擢而齊賢雖有宿憾且無異論坐事停官宰相豈無心也哉嗚呼左右之臣欲陷人於罪皆有深意人君不可不深察也禮部上合格舉人甲午上御崇政院親覽入等者賜陳堯咨以下二百七十一人進士及第諸科六百九十七人賜同出身賜宴日以御書褒寵之上連三日臨軒初無倦怠之色所擢凡千八百餘人其中有自晉天福中隨計者較藝之詳推恩之廣近代所未有也上以手詔訪知開封府錢若水備禦邉冦剪滅蕃戎之䇿若水上言備邉之要有五一曰擇郡守二曰募鄉兵三曰積芻粟四曰革將帥五曰明賞罰夏四月李允則知潭州初馬氏暴斂州人嵗出絹謂之地稅及潘羙定湖南計屋每間輸絹丈三尺謂之屋稅營田户給牛嵗輸米四斛牛死猶輸謂之枯骨稅民輸茶初以九斤為一大斤後益至三十五斤允則請除二税茶以三十斤半為定制㑹嵗飢欲發官廩先賑而後奏轉運使以為不可允則曰須報必踰月則飢者無及矣不聴明年又飢允則請以家貲為質乃得發廩賤糶因募飢民堪征役者𨽻軍籍得萬人民列治狀請留詔書嘉奬知益州牛冕削籍流儋州初張詠自蜀還聞冕代已詠曰冕非撫衆才其能綏輯乎既而果然五月虞部貟外郎馮亮言饒池江建州嵗鑄錢百三十五萬貫銅鉛皆有餘羡乃以亮為江南轉運副使兼都大提㸃江南福建路鑄錢事九月置羣牧司王均多為藥矢射中官軍中者必死雷有終募敢死士穴城間道蒙氊秉燧而入悉焚其守具遂克其城冬十月王均自成都突圍走楊懷忠領虎翼軍追之均窮蹙縊死益州平命翰林學士承旨宋白等修續通典十二月令常參官轉對如故事言近訐者亦議優容文不工者許其直致張齊賢與李沆並相情好不恊自負有致君之術每敷奏多不直致議者以為疏闊辛夘日南至羣臣朝㑹齊賢被酒上曰卿為大臣何以率下朝廷自有典憲朕不敢私甲午齊賢罷守本官吕中曰一相獨仕則有専權之私二相並命則有立黨之患然以趙中令權専任重而能與新進之吕蒙正共事以畢士安徳尊望隆而能與使氣之冦準共政不惟無分朋植黨之風抑且盡同寅和衷之義而齊賢反與李沆不叶與冦準相傾何耶君子可以知相業之優劣矣十二月丙寅知兖州韓援上言伏覩近詔舉行轉對在外文武羣臣未預次對者各許上封奏事臣伏覩先帝自端拱以來益勵精為理臣嘗權鹽鐡判官得與本使上殿奏事一日先帝從容謂臣等曰大凡居職不可不勤朕每見殿庭兵卒剰掃一席地汲一瓶水必記其姓字夫如是則有以見先帝勤勞庶政片善無遺臣又聞治國者在乎逺佞人杜䜛口以陛下聰明神智必無驕佚之虞然願罔倦燭幽勿使小人乗間而進日謹一日雖休勿休居安念危在治防亂則天下幸甚疏奏召援歸闕授史館修撰初濮州有盗夜入城知黄州王禹偁以為國家武備不修故盗賊竊發近輔因奏疏曰太宗時令江淮諸郡毁城隍収兵甲大郡給二十小郡減五人以充常從號曰長吏實同旅人名為郡城蕩若平地雖則尊京師而抑郡縣强幹弱枝之術亦非得其中道也宜令並置本城守捉軍士不過三五百人閱習弓劒然後漸葺城壘繕完甲胄郡國張禦侮之備長吏免剽略之虞疏奏上嘉納之辛丑咸平四年春正月中外官上封事者甚衆詔馮拯陳堯叟詳定利害以聞祕書丞査道上言曰朝廷命轉運使副不惟商度金穀葢亦廉察郡縣望自今每使回日先令具任内曽薦舉才識者若干奏絀貪猥者若干朝廷議其否臧以為賞罰從之上召西川轉運使馬亮入朝雷有終既平賊誅殺不已亮所全活踰千人及至京師㑹械送為賊所詿誤者八十九人知樞宻院事周瑩欲盡誅之亮言愚民䝱從者衆餘皆竄伏若不貸此反側之人聞風疑懼一唱再起是滅一均生一均也上悟悉宥之二月雨自去冬旱上每御蔬食憂閔切至是日方臨軒決事雨沾衣左右進葢却而不御知全州陳彭年上疏一曰置諫官二曰擇法吏三曰簡格令四曰省官貟五曰行公舉詔學士兩省御史臺五品尚書省諸司四品以上舉賢良方正能直言極諫各一人三月兵部尚書張齊賢上言處士种放願以備賢良方正之舉乃賜放詔及裝錢五萬令京兆府遣官詣山備禮發遣放辭不至先是三院御史多出外任風憲之職用他官兼領乃詔本司長吏自薦其屬俾正名而舉職壬午以太常博士張巽為監察御史從新制也吕中曰御史紀綱正自此始葢監司為外䑓御史為内臺外臺之風采振而州縣肅内臺之風采振而朝廷肅以内臺而出外則不惟侵外臺之權亦無以振内臺之綱也故自太宗令轉運兼按察而後外臺正自真宗令御史正名舉職而後内臺正三月左僕射吕蒙正兵部侍郎參知政事向敏中並守本官平章事中書侍郎平章事李沆加門下侍郎吕中曰宋朝國初至是三入相者惟趙普及吕蒙正焉皆未嘗為子弟求恩澤初乾元厯氣朔漸差詔司天監編新厯厯成賜名儀天參知政事王化基罷為工部尚書以王旦為工部侍郎參知政事馮拯陳堯叟並為給事中同知樞宻院事薛映梁鼎楊億並知制誥上初欲用梅詢宰相李沆素不喜詢言于上曰梅詢險薄用之恐不恊羣議上曰如此則何人可沆曰楊億有盛名上乃驚喜曰幾忘此人召映鼎就試翌日與億並命審官院初引對京官于崇政殿遷秩有差京朝官磨勘引對自此始王欽若使西川還即日以欽若為左諫議大夫參知政事上御崇政殿試制舉人得査道陳越王曙夏五月翰林學士朱昻罷為工部侍郎致仕昻有清節淡於榮利初為洗馬十五年不遷不以屑意非公事不至兩府上知其素守驟加褒進昻累章告老上不得已從之遣使就第賜器幣謂輔臣曰昻侍朕左右未嘗以私事干朕今其歸老可給全俸詔本府嵗時省問如有章奏許附驛以聞又命其子正辭知公安縣使得就養舊制致仕官止謝殿門外於是上特延見命坐勞問久之令候秋涼上道復遣中使錫宴於玊津園兩制三省儒臣皆預仍詔賦詩餞行恩渥之盛近代無比六月癸夘直集賢院梅詢上言朝廷遣使減省天下冗吏計省十九萬五千八百二人請付史館從之吕中曰去國初未逺而吏之冗至于十九萬五千餘人何其多耶葢太祖去在京之吏真宗去諸路之吏然自是而後吏愈冗而愈不可去矣此識者有官無封建而吏有封建之說也王禹偁卒上甚嗟悼之禹偁詞學敏贍時所推重鋒氣峻厲以直躬行道為己任遇事敢言雖履危困封奏無輟嘗言吾若生元和時從事於李絳崔羣間斯無媿矣又為文著書師慕古昔多涉規諷以是不容於流俗故累登文翰之職尋即罷去焉秋八月己酉復親試制舉人得丁遜孫僅何亮孫暨入第四等上觀稼北郊咸平初太常丞陳堯佐為開封府推官坐言事切直貶潮州通判堯佐至州修孔子廟作韓愈祠堂率其民之秀者使就學時張氏子年十六與其母濯於惡溪為魚所噬堯佐以謂昔韓愈患鰐之害以文投溪中而鰐為逺去今復害人不可不除卒使捕得更為文鳴鼓於市而戮之潮人以此韓愈三嵗召還命直史館九月以劉士元為南宫侍教南宫北宅有侍教自此始冬十月上語近臣曰近者慶州地再震熒惑犯輿鬼可不恐懼修省知樞宻院王繼英曰妖不勝徳上曰朕何徳可恃同知樞宻院陳堯叟曰陛下克己愛民河防十餘溢而不决嵗復大稔此聖徳格天所致也上曰天不欲困生靈耳豈朕徳能感之自此益湏防戒十一月丙子王顯遣寄班夏守贇馳騎入奏前軍與契丹戰大破之戮二萬餘人十二月時靈州孤危詔羣臣議棄守之宜楊億即日奏以為此虜方黠其財猶豐未可以嵗月破也須廢棄靈州退保環慶然後以計困之爾上訪於左右輔臣咸以為靈武乃必争之地茍失之則縁邉諸州亦不可保上頗然之宰相李沆奏曰若遷賊不死靈州必非朝廷所有莫若發單車之使召州將部分戌卒居民委其空壘而歸如此則闗右之民息肩矣閏十二月甲午以王超張凝領步騎六萬援靈州吕中曰靈州之議當以輔臣之言為是而李沆楊億之言為非綏州之議當以孫全照之言為是而以洪湛之言為非葢綏州不可城靈州不可棄也故何亮上安邉書曰靈武地方千里表裏山河捨之則戎狄之地廣且饒矣一患也自環慶至靈武凡千里故西域戎狄合而為一二患也兾北馬之所生自匈奴猖獗無匹馬南來咸取足乎西戎既剖分為二其右乃西域之東偏實為夏賊之境其左乃西域之西偏秦涇儀渭之西北諸戎是也如捨靈武則合而為一夏賊桀黠俾諸戎不得貨馬則未知戰馬從何來三患也請築溥樂耀徳二城以通河西之粮道靈武居絶塞之外不築此二城為唇齒與捨靈武何異後韓魏公以亮之言為然壬寅咸平五年春正月以張齊賢為邠寧環慶涇原儀渭鎮戎軍經略使判邠州令環慶涇原兩路及永興軍駐泊兵並受齊賢節度戊申田錫權幹當通進銀臺司兼門下封駁事錫奏臣昨見差張齊賢充經略使曽致堯為經略判官鄭文寳為轉運使臣讀孫子兵書云不盡知用兵之害者則不能盡知用兵之利今未喻張齊賢曽致堯鄭文寳等盡知用兵之利害否若盡知利與害動無遺䇿方可委之經略邉事三月李繼遷攻陷靈州知州裴濟死之靈州被圍餉道斷絶孤城危急濟刺指血染奏求救大軍訖不至城遂陷王超等奏班師上親試進士王曽以下二十八人九經諸科百八十二人並賜及第夏四月錢若水上言綏州自賜趙保忠以來户口凋殘今欲復城之用工計百餘萬徒為煩擾絶無所利己罷其役若水復詣闕面陳其事上甚嘉納初若水率衆過河分布軍伍咸有節制深為戎將所伏上知之謂左右曰若水儒臣中知兵者也癸酉命田錫以本官兼侍御史知雜事仍遣中使諭㫖曰卿每上章疏所司不敢滯留朕皆一一親覽知雜之任朝廷甚難其人故以命卿仍不妨徐徐撰述或有所見即具奏聞五月乙巳屯田郎中判三司催欠司楊覃上蠲放天下逋欠計八百萬請付史館從之禮部尚書温仲舒兼御史中丞以尚書兼中丞自仲舒始六月工部郎中陳若拙知處州若拙前任京東轉運使被召時三司使缺自謂得之及至授刑部郎中知潭州若拙大失望因對固辭且言嘗任三司判官及轉運使今守湖外反類責降上曰潭州大藩朕為方面擇人所委不在轉運使下輔相舊臣固亦有出典大藩者若拙懇請不已乃追新授告敕而有此命上謂宰臣曰士大夫操修必湏名實相副若拙貪進擇祿如此固當譴降朕之用人豈以親疎為間茍能盡瘁奉公有所植立何患名位之不至也冨弼曰帝王之使人不可不度其才度其才而使之不容辭避則命令重矣真宗用郭贄陳若拙守藩郡各辭其任一固遣一責降誠得使人之術帝王任藩郡守若容辭避則急難能使人乎李繼遷攻麟州知州衛居實屢出竒兵突戰及募勇士縋城潛徃擊賊殺傷萬餘人丁丑繼遷㧞寨遁去詔以衛居實為供備庫使秋七月以錢若水為并代經略使判并州上新用儒將未欲使兼都部署之名而其任實同也丙辰遣使齎詔就終南山召种放赴闕九月种放以幅巾入見于崇政殿命坐與語詢以民政邉事放曰明王之治愛民而已惟徐而化之餘皆謙讓不對即授左司諫直昭文館十月左領軍衛將軍薛惟吉妻柴氏無子惟吉有子安上安民素與柴氏不協柴既寡盡畜其祖父金帛謀改適張齊賢安上詣開封府訴其事府以聞下其事於御史獄柴因訟向敏中賤貿惟吉故第又嘗求娶已不許以是教安上誣告母且隂庇之上以問敏中敏中言實以錢貿安上居第近䘮妻不復議姻未嘗求婚於柴也柴訟益急遂并鞫之乃齊賢子宗誨教柴為詞鹽鐡使王嗣宗素忌敏中因對言敏中議娶王承衍女弟宻約已定上因面責敏中以不直丁亥敏中罷為户部侍郎齊賢責授太常卿分司西京先是翰林學士宋白嘗就敏中假白金十錠敏中靳不與於是白草敏中制書極力詆之有云對朕食言為臣自昩敏中讀制泣下侍御史知雜事田錫言臣覩近敕戒勵大臣謂其不守廉隅多置貨産祿厚而不知恥者尚懷歉恨官崇而能自省者豈不憂慙斯乃陛下正之以知足之訓詞責之以貪饕之顯過又訪聞宻院中書政出吏胥只檢舊例樞相商議别無逺謀戎夷深入則請大駕親征將帥無功則取聖慈裁斷若其任用則不失享富貴若令罷免則不過歸班行臣下得優逸而君上但焦勞勞逸失宜尊卑實為倒置也故隂陽不順水旱不調法令滋章盗賊多起尚率京城父老與百辟千官五度十章請加尊號頼聖君英睿以為天不可欺御劄丁寧示以志不可奪必斷來表深惬羣情由是見宰相以甘言佞上求聖知不以國計軍機為己任若加以水旱之灾乗以戎狄之患不知在廟堂者用何知略總軍兵者作何籌謀十一月辛丑享太廟壬寅合祭天地于圜丘因詔三司非禋祀所湏並可減省於是省應奉雜物十萬六千功九萬九千丙午大雪上謂宰相吕蒙正等曰昨郊祀之際重隂變晴今兹成禮又獲嘉雪豐年可期矣十二月以宰相吕蒙正李沆並兼門下侍郎舊制三師三公左右僕射平章事並兼兩省侍郎先是學士宋白梁周翰草二相加恩制書遺忘舊制既而上問白等不能對第請改正宋白等各罰一月俸田錫上言陛下自纂承大位五年于兹矣儲闈未建典冊不行冝速以宗社永寧為大本人心預定為逺圖也癸夘咸平六年三月辛夘朔田錫言臣伏覩去秋已來霖雨作沴水潦為灾雖聞檢覆莫知適從今國家為少缺軍兵防備邉戍遂於曹單宋亳陳蔡汝潁之間㸃集鄉村揀選强壯得五七萬人訪聞始降宣命指揮只令在本城防守及至奏聞都數並即抽赴京師何以如此失信令下民寧無怨望以灾殄之餘冦盗若起適足為戎狄之利有勞宵旰之懷夏四月去歳以義軍分𨽻州兵之籍於是命張延禧料簡得萬三千餘人立為神鋭神虎指揮常加訓習焉丙子契丹入冦定州行營都部署王超逆戰于望都縣副部署王繼忠常以契遇深厚思戮力自效率麾下躍馬馳赴士皆重創殊死戰至白城陷於敵成都闕守朝議難其人上以張詠前在蜀為政明肅勤於安集逺民便之甲申加詠刑部侍郎充樞宻院直學士知益州民聞詠再至皆鼓舞自慶五月上以王繼忠實戰死丁酉贈繼忠大同節度使兼侍中錄其子懷節懷敏懷徳望都失利上語近臣曰頗聞有臨陣公然不護主帥引衆先遁者乃命劉承珪李允則馳驛按問李福坐削籍流封州王昇決杖配𨽻瓊州自望都失利上日訪禦戎之䇿因合兩府㑹議或請合鎮定髙陽三路兵據衝要或請令三路分兵扞禦或請以鎮定兩路兵陣於州之北又徙髙陽兵於寧逺軍仍别設竒兵於順安軍控扼發强壯備城彌縫其缺上總覽而裁定之六月己未朔内出陣圖示輔臣曰鎮定髙陽三路兵悉㑹定州冦來堅守勿逐俟信宿冦疲則鳴鼔排戰又分兵出三路以六千騎屯威虜軍五千騎屯保州五千騎屯北平寨使其腹背受敵又兵八千屯寧邉軍五千屯忻州扼東西路又曰任人擇才頗亦難事朕必就其所長而用之魏能性剛張銳善熟故使佐能孫全照好陵人取其常所保薦者與同事韓守英素無執守當使閻承翰代之承翰雖無武幹然亦勤於奉公也其它選用悉皆類此先是三司各置使丁亥始并為一使命冦凖充三司使兼置副使以陳恕為尚書左丞知開封府恕在三司前後踰十餘年究其利病條例多所改創其從他官也嘗薦冦準可用及準至三司即檢其前後所改創事類為方冊其曉諭榜帖悉以新板别書齎詣恕第請署恕一一為署之不復辤準拜謝去故三司多循恕舊貫自準始也秋七月復并三司鹽鐡度支户部勾院為一九月司空平章事吕蒙正凡七上表求退甲辰罷為太子太師封萊國公是秋募近京强壯補禁衛詔殿前都指揮使髙瓊閱習陣勢冬十月静戎軍王能奏於軍城東新河之北開田廣袤相去皆五尺許深七尺狀若連鎖必能限隔戎馬詔靜戎順安威虜界並置方田鑿河以遏胡騎錢若水卒若水能斷大事事繼母以孝聞上甚悼惜之贈户部尚書諡宣靖詔監司之職刺舉為常頗聞曠官怠於行部將何以問民疾苦察吏否臧自今諸路轉運使令徧至管内按察光祿寺丞李永錫奉禮郎王嘉祐坐交遊非類並責監酒稅嘉祐禹偁子也平時若愚騃獨冦凖知之凖知開封府一日問嘉祐曰外間議準云何嘉祐曰外人皆云丈人旦夕入相準曰於吾子意何如嘉祐曰以愚觀之丈人不若未為相為相則譽望損矣準曰何故嘉祐曰自古賢相所以能建功業澤生民者其君臣相得皆如魚之有水故言聴計從而功名俱美今丈人負天下重望相則中外以太平責焉丈人之於明主能若魚之有水乎嘉祐所以恐譽望之損也準起執其手曰元之雖文章冠天下至於深識逺慮殆不能勝吾子也甲寅有星孛于井鬼大如杯色青白光芒四尺餘凡三十餘日沒上曰朕徳薄致兹謫見大懼灾及吾民宻邇誕辰宜罷稱觴之㑹以答天譴十二月辛未史館修撰田錫卒錫耿介寡合嚴恭好禮慕魏徴李絳之為人及居諫署直言時政得失嘗曰吾封疏五十二奏皆諫臣任職之常也豈可藏副示後謗時賣直耶悉取焚之臨終自作遺表上覽之惻然曰田錫直臣也天何奪之速乎若此諫官誠不易得朝廷小有闕失方在思慮錫之章奏已至矣吕中曰東坡嘗序其奏議曰田公古之遺直也其盡言不諱葢自敵已以下受之有不能堪者而况於人主乎吾是以知二宗之聖也自興國以至咸平可謂大治千載一時而田公常若有不測之憂何哉古之君子必憂治世而危明主明主有絶人之資治世無可畏之防夫有絶人之資必輕其臣無可畏之防必易其民此君子所甚懼也戊寅徳音赦天下死罪降一等流以下並釋之除三年逋租癸巳上親閱逋負名籍釋繫囚四千一百六人蠲物八萬三千於是將肆赦改元或謂蠲放逋債减除率斂其數頗多三司必以恩澤太濫虧損國計為言上曰非理害民之事朝廷決不可行吝於出納固有司職也要當使斯人實受上賜甲申日加午雷暴震司天言占主國家發號布徳未及黎庶上謂輔臣曰豈所議赦書小惠未遍上天以雷警朕耶卿等皆盡心講求之甲辰景徳元年春正月朔大赦改元京師地震癸夘夜京師地復震丁未夜京師地復震上謂宰相李沆曰坤道貴於安静京師大衆所聚而震動若此皆朕聽覽不明所致夙夜内省中外之政敢不盡心但慮命令之出或有枉撓沆頓首引咎李繼遷之陷西涼也都首領潘羅支偽降繼遷受之不疑未幾羅支遽集六谷蕃部及者龍族合擊之繼遷大敗因中矢死其子阿移嗣位改名徳明二月請降乃賜詔招諭夏四月邢州言地震不止六月上宻采羣臣之有聞望者得邉肅鞠仲謀朱恊郝太沖李𤣥馬景何亮周絳謝濤衛太素陳昭度崔端髙謹徽趙湘張若谷姜嶼皇甫選滕涉陸𤣥圭李奉天崔遵度曹度陳越凡二十四人内出其姓名令閣門祗候崇政殿再坐引對外任者乗驛赴闕每對必徃復紬繹其詞氣或試文藝多帖三館職或命為省府判官或升其差使焉好事者因號越等為二十四氣以比唐修文館學士四時八節十二月之數云吕中曰三載考績岳牧皆預嵗終廢置羣后咸在後世徒􅊏悉於小吏而濶畧於公卿大夫今罷郊禮之恩而行磨勘之法於選人則舉孤寒無援之人而擢之京官其寛於小而嚴於大可知至於採聞望而用人則又不待行考課之法此又真宗之㣲權也秋七月先是上召翰林學士梁顥夜對詢及當世臺閣人物顥曰晁逈篤於詞學盛𤣥敏於吏事上不答徐問曰文行兼著如趙安仁者有幾顥曰安仁才識兼茂體裁凝逺求之具美未見其比也既而顥卒以安仁為翰林學士丙戌右僕射平章事李沆卒年五十八上再幸其第哭之慟諡文靖上之初即位也沆日取四方水旱盗賊奏之叅知政事王旦以為細事不足煩上聽沆曰人主少年當使知人間疾苦不然血氣方剛不留意聲色犬馬則土木甲兵禱祠之事作矣吾老不及見此參政他日之憂也時西北用兵邉奏日聳旦慨然謂沆曰安得企見太平吾人當優游燕息乎沆曰國家强敵外患適足為警懼異日天下晏然人臣率職未必髙拱無事君奚念哉上雅敬沆嘗問治道所宜先沆曰不用浮薄新進喜事之人此最為先上問其人曰如梅詢曽致堯李夷庚等是矣上深然之故終上之世此數人者卒不進用在中書未嘗宻進封章上嘗詢其故沆曰臣備位宰相公事當力言之茍背同列宻有所啟此非䜛即佞臣實嫉此事沆重厚淳質退朝輙終日危坐未嘗問家事對賔客尤寡言弟維嘗乗間勸沆稍屈意接納士大夫沆曰吾非不知此也然今羣臣皆得升殿言事封章論奏吾悉見矣至於西北大計薦紳中如李宗諤趙安仁皆一時英秀與之談猶不能啟發吾意自餘通籍之子坐起拜揖尚周章失措即席必自論功㝡希寵奬此又何足與乎茍免强酬答則世所謂籠罩之事吾未能也沆自言居重位實無補萬分惟四方言利事者未嘗一施行聊以此報國耳嘗喜讀論語或問之沆曰為宰相如論語中節用而愛人使民以時兩句尚未能行終身誦之可也戊子陜西轉運使言西面沿邉諸州於保毅軍内簡集成振武軍四十指揮上曰朕詢于知兵及詳練邉事者皆云自此立軍邉聲頓振戎人畏懼不敢侵冦矣李沆死中書無宰相上意欲擢冦準乃先置宿徳以畢士安為吏部侍郎參知政事士安入謝上曰未也行且相卿誰可與卿同進者士安因言準資忠義能斷大事上曰聞準剛使氣奈何士安曰今天下之民雖蒙休徳涵養安佚而西北跳梁未服若準者正宜用也不閱月遂與準俱相光祿少卿宋雄監河隂屯兵雄習河渠利害因領護汴口均節水勢以濟江淮漕運居十數年三遷將作監不易其任職務修舉朝廷賴焉八月己未以參知政事吏部侍郎畢士安三司使兵部侍郎冦準並依前官平章事是時契丹多縱遊騎剽掠深祁間小不利即引去徜徉無鬭意凖曰是狃我也願朝廷練帥領簡驍鋭分據要害地以備之宣徽南院使知樞宻院事王繼英為樞宻使同知樞宻院事馮拯陳堯叟並為簽書樞宻院事樞宻直學士工部郎中劉師道權三司使公事自後三司除使多用此制知夀州陳堯佐自出米為糜以食餓者而吏民皆争出米其活數萬人堯佐曰吾非行私惠葢以令率人不若身先而使其從之樂也先是石保吉求兼相印上以問李沆沆曰保吉因緣戚里無攻戰之勞驟據台席恐騰物議上他日詢之執奏如初其事遂寢及沆卒丙子以保吉為武寧節度使同平章事九月上謂輔臣曰累得邉奏契丹已謀南侵朕當親征決勝卿等共議何時可以進發畢士安曰陛下已命將出師委任責成可也必若戎輅親行冝且駐蹕澶淵冦準曰大兵在外須勞聖駕暫駐澶淵進發之期不可稽緩上每得邉奏必先送中書謂畢士安冦準曰軍旅之事雖屬樞宻院葢中書總文武大政號令所從出鄉者李沆或有所見徃徃别具機宜卿等當詳閲邉奏共叅利害勿以事干樞宻院而有所隠也因言樞宻之地尤須謹宻漏禁中語古人深戒若與同列及樞宻彰不恊之迹則中外得以伺其間隙實非所便卿等志之閏九月契丹主與其母舉國入冦其統軍韃覽引兵掠威敵順安軍魏能石普等帥兵禦之能敗其前鋒又攻北平寨田敏等擊走之又東趣保州攻州城不利而北撻覽與契丹主及其母合勢攻定州王超陣于唐河其輕騎俄為我禆將所擊乃率衆東駐陽城淀先是冦準已決親征之議王欽若以契丹深入宻言於上請幸金陵陳堯叟請幸成都上復以問準時欽若堯叟在旁準心知欽若江南人故請南幸堯叟蜀人故請西幸乃陽為不知曰誰為陛下畫此䇿者罪可斬也今天子神武而將帥恊和若車駕親征則敵自當遁去不然則出竒以撓其謀堅守以老其衆勞逸之勢我得勝筭矣奈何欲委棄宗社逺之楚蜀耶上乃止二人由是怨準欽若多智準懼其妄有闗説疑沮大事圖所以去之㑹上欲擇大臣使鎮大名準因言欽若可任乙亥以欽若判天雄軍府兼都部署初王繼忠戰敗為敵所獲敵即授以官繼忠乗間言和好之利時敵雖大舉深入然亦遣李興等以繼忠書詣莫州部署石普且致宻奏一封達闕下上發視之遂以手詔令石普付興等賜繼忠繼忠欲朝廷先遣使命上未許也冬十月繼忠得上手詔即具奏乞早遣使議和好丙午上命樞宻院擇可使敵者王繼英言殿直曹利用自陳倘得奉君命死無所避乃授利用閤門祗候假崇儀副使奉契丹主書以徃又賜繼忠手詔己酉初置龍圖閣待制契丹抵瀛州城下晝夜攻城知州李延渥率州兵拒守發礧石巨木擊之死者三萬餘人傷者倍之竟弗能克乃遁去十一月車駕北巡司天言日抱珥黄氣充塞宜不戰而却有和解之象曹利用至天雄孫全照疑敵不誠勸王欽若留之敵既數失利復令王繼忠具奏求和好且言北朝頓兵不敢刼掠以待正人上因賜繼忠手詔又以手詔促利用行上駐蹕韋城羣臣復有以金陵之謀告上冝且避其鋒者上意稍惑乃召冦準問之準曰今虜冦迫近四方危心河北諸軍日夜望鑾輿至士氣當百倍若回輦數步則萬衆瓦解敵乗其勢金陵亦不可得而至矣上意未決準出遇殿前都指揮使髙瓊門屏間謂曰太尉受國厚恩今日有以報乎對曰瓊武人誠願効死準復入對瓊隨入立庭下準曰陛下不以臣言為然盍試問瓊等遂申前議詞氣慷慨瓊仰奏曰冦準言是且曰隨駕軍士父母妻子盡在京師必不肯棄而南行中道即亡去耳願陛下亟幸澶州臣等効死敵不難破上意遂決甲戍晨發左右以寒甚進貂裘絮㡌上却之曰臣下暴露寒苦朕獨安用此耶是日次南城以驛舍為行宫將止焉冦準固請幸北城曰陛下不過河則人心危懼敵氣未懾非所以取威決勝也髙瓊亦固以請馮拯在旁呵之瓊怒曰君以文章致位兩府今敵騎充斥如此君何不賦一詩詠退敵騎耶即麾衛士進輦扣陛上遂幸北城既至登門樓張黄龍旗諸軍皆呼萬歳聲聞數十里氣勢百倍敵相視益怖駭曹利用自天雄赴敵寨共議和好事議未決乃遣杞持國主書與利用俱還十二月把入對呈其書復以闗南故地為請上曰朕守祖宗基業不敢失墜所言歸地事極無名必若邀求朕當决戰爾實念河北居人重有勞擾倘嵗以金帛濟其不足朝廷之體固亦無傷答其書不必具言但令曹利用與韓把口述兹事可也上又面戒利用以地必不可得若邀求貨財則宜許之是日日食徳博州並言契丹已移寨東北去臨河觀城縣民石興等自敵寨逃歸具言金帥達蘭中矢死曹利用與韓把至敵寨敵復以闗南故地為言利用輙沮之且許遺絹二十萬疋銀一十萬兩議始定敵言國主年少願兄事南朝甲申利用與其右監門姚東之持國主書俱還丙戍命李繼昌持誓書與東之俱徃報聘利用之再使北也面請嵗賂金帛之數上曰必不得已雖百萬亦可冦準召至語之曰雖有敕㫖汝徃所許不得過三十萬過三十萬勿來見準準當斬汝利用果以三十萬成約而還入見行宫上方進食使内侍問所賂利用不肯言而以三指加頰内侍入白豈非三百萬乎上失聲曰太多既而曰姑了事亦可耳及對上曰幾何曰三十萬上不覺喜甚故利用被賞特厚戊子上作回鑾詩命近臣和上曰北狄自古為患儻思平憤恚盡議殱夷則須日尋干戈嵗有勞費今得其畏威服義息戰安民甚慰朕懷時王超等逗撓無功唯有終赴援威聲甚振河北列城賴以雄張云甲午車駕發澶州李繼昌至敵帳羣情大感恱館設之禮益厚即遣其西上閤門使丁振奉誓書來上戊戍車駕至自澶州冦準在澶州每夕與知制誥楊億暢飲謳歌諧謔喧譁達旦上使人覘知之喜曰得渠如此吾復何憂乎既而曹利用與韓杞至行在議和準初欲勿許且晝䇿以進曰如此則可保百年無事不然戎且生心矣上曰數十嵗後當有能扞禦之者吾不忍生靈重困姑聽其和可也準處分軍事或違上旨及是謝曰使臣盡用詔令兹事豈得速成上笑而勞焉陳瑩中曰當時若無冦準天下分為南北矣然冦莱公豈為孤注之計哉觀契丹之入冦也掠威虜安順軍則魏能石普敗之攻北平寨財田敏擊走之攻定州則王超等拒之圍嵐岢軍則賈宗走之冦瀛州則李廷渥敗之攻天雄則孫全照却之抵澶州則李繼隆禦之兵將若此則親征者所以激將士之用命然所謂親征者在景徳行之則可而議者當靖康時有請用真宗故事則不可葢親征之行必兵强可也財富可也將能擒敵可也若此則分畫明紀綱修法度正一有不然則委人主以危事曰天子所在兵無不勝此書生之虚論可言而不可行也冦凖之功不在於主親征之説而在於當時畫䇿欲百年無事之計向使其言獲用不惟無慶歴之悔亦無靖康之禍矣我宋之安景徳之役也靖康之禍亦景德之役悞之也景徳王師一動而誅韃覽契丹不能渡河也遂使靖康坐守京城而覘敵之不渡河景徳不戰而和欲和者敵也遂使靖康坐視敵之深入而獨意和好之可久景徳既和詔邉郡無邀敵歸所以示大信也遂使靖康敵人議割吾之三鎮而猶縱敵不追其守不足以為謀其和不足以為信其縱不足以為徳準之言至是騐矣范仲淹曰王文正公旦為相二十年人莫見其愛惡之迹天下謂之大雅冦萊公澶淵之役而能左右天子不動如山天下謂之大忠樞宻使扶風馬公知節慷慨立朝有犯無隠天下謂之至直乙巳景徳二年春正月朔大赦上以河北守臣冝得有武幹善鎮靜者命馬知節知定州李允則知雄州知節先在鎮州方敵犯塞民相携入城知節與之約有盗一錢者斬俄而竊童兒錢二百者即戮之自是無敢犯者每中使賚詔諭邉郡知節慮為敵所掠因留之募捷足間道而行以達詔㫖㑹發澶魏邢洺等六州軍儲赴定州水陸並進時兵交境上知節曰是資敵也因告諭郡縣凡公家輸輦之物所在納之敵欲剽刼皆無及車駕幸澶淵大將王超擁兵屯駐定州逗遛不進知節屢諷之超不為動復移書誚讓超出兵猶辭以中渡無橋徒涉為患知節先已命工度材一夕而具上聞之手詔褒美省河北諸州戍兵十之五二月遣使賀契丹國母生辰三月上親試進士李迪以下二百四十六人特奏名五舉以上一百十一人諸科得九經以下五百七十人特奏名三禮以下七十五人上謂宰相曰迪所試最優李諮亦有可觀聞其幼年母為父所棄歸舅族諮日夕號泣求還其母乃至絶葷茹以禱祈又能刻苦為學自取名級亦可嘉也先是迪與賈邉皆有聲場屋及禮部奏名而兩人皆不與考官取其文觀之迪賦落韻邉論當仁不讓於師以師為衆與注疏異特奏令就御試參知政事王旦議落韻者失於不詳審耳捨注疏而立異論輙不可許恐士子從今放蕩無所凖的遂取迪而黜邉當時朝論大率如此初安陽人陳貫喜言兵咸平中大將楊瓊王榮䘮師貫上書言前日不斬傅潜張昭逺使瓊軰畏死不畏法今不嚴其制後當益弛請立法凡合戰而奔者主校皆斬大將戰死禆校無傷而還與奔軍同軍衂城圍别部力足救而不至者以逗遛論如此罰明而士卒厲矣上嘉納之將召試學士院執政謂瓊等已即罪議遂格又嘗上形勢選將練兵論三篇於是貫舉進士試殿庭得同出身上識其姓名曰是數言邉事者擢置第二等賜及第夏四月王欽若累與冦準不恊還自天雄再表求罷乃置資政殿學士以欽若為之仍遷刑部侍郎五月宣徽院使雷有終倜儻自任能撫士卒宴犒不足則傾私帑給之家無餘財居數月卒身後宿負猶不啻百萬殿前都虞候張凝忠勇好功名善訓士卒賞賜甚厚多以犒師京師無居第上嘗與近臣論將帥曰選用武臣實難倘未嘗更歴則不能周知其才太宗所擢甚衆而優待者唯凝與王斌王憲等數人每賜與絶殊倫軰乃知先帝知人之明也於是凝卒上甚惜之詔邉民應募為弓箭手者給以境内閒田永蠲其租庚申上親試進士范昭等五十一人諸科一百九十八人撫州進士晏殊年十四大名府進士姜益年十二皆以俊秀聞特召試殊試詩賦各一首益試詩六篇殊屬詞敏贍上深歎賞宰相冦準以殊江左人欲抑之而進益上曰朝廷取士惟才是求四海一家豈限遐邇如前代張九齡軰何嘗以遐陋而棄置耶乃賜殊進士出身益同學究出身後二日復召殊試詩賦論殊具言賦題嘗私所習上益愛其淳直改試他題既成數稱善擢祕書省正字祕閣讀書仍命直史館陳彭年視其所學及檢察其所與游者詔自今諸州官吏雪活得人命者並理為分績六月上謂輔臣曰殿前司兵及禁兵老疾者衆葢久從征戍失於簡練比因抽移至京師雖量加閱視亦止能去其尤者今多巳召還冝精加選擇雖議者恐其動衆亦當斷在必行第以契丹請盟西戎納欵若即行此則軍旅之情必謂國家便謀去兵惜費不若先從下軍選擇勇力者次補上軍亦可鎮厭浮言使衆不惑也其老疾者俟秋冬遴簡將臣令悉蒐去之秋七月詔復置賢良方正能直言極諫博通墳典達於教化才識兼茂明於體用武足安邉洞明韜略運籌決勝軍謀宏逺才任邉寄等科大事記曰漢置賢良科四百年得一董仲舒而已唐置賢良科三百年得一劉蕡而已我朝此科多得大才其後也廢賢良而為宏詞惜哉益州將吏民庶舉留知州張詠詔褒之始車駕北征詠慮逺夷乗隙為變欲出竒以勝之因取盜賊之尤無狀者磔死於市衆皆懾服每訊牒便文乆不得判詠率爾署決莫不允當蜀中喜事者論次其詞總為誡民集鏤板傳布上嘗遣使諭㫖曰得卿在彼朕無西顧之憂也冬十月吏部侍郎平章事畢士安卒車駕即臨哭謂冦準等曰士安善人也十一月丙辰享太廟丁巳合祭天地於圜丘大赦上自散齋即進蔬茹禮畢御樓始飲酒焉以王欽若為兵部侍郎資政殿大學士丙午景徳三年春正月始置常平倉於京東西河東陜西江淮兩浙計户口量留上供錢自千貫至二萬貫令轉運使每州擇清幹官主之專委司農寺總領三司無得輙用大率萬户嵗餘萬石止於五萬石或三年以上不經糶則回充粮廩别以新粟補之二月權三司使丁謂等言唐諸州長吏職當勸農乃請少卿監刺史閤門使已上知州者並兼管内勸農使餘及通判並兼勸農事諸路轉運使副並兼本路勸農使詔可勸農使入銜自此始馮亮為淮南江浙荆湖制置茶鹽兼都大發運使都大發運使司自至道末省之及是復置契丹既和冦準頗矜其功上待準極厚王欽若深害之一日㑹朝準先退上目送準欽若因進曰陛下敬畏冦準為其有社稷功耶上曰然欽若曰城下之盟雖春秋時小國猶恥之澶淵之舉是盟於城下也其何恥如之上愀然不能答由是上顧準稍衰準在中書喜用寒畯每御史缺輙取敢言之士他舉措多自任嘗除官同列屢目吏持例簿以進準曰宰相所以器百官若用例非所謂進賢退不肖也因郤而不視戊戌冦準罷為刑部尚書以王旦為工部尚書平章事旦入謝上謂曰冦準以國家爵賞過求虚譽無大臣體罷其重柄庶保終吉也既而命準出知陜州己亥馮拯為兵部侍郎王欽若為尚書左丞陳堯叟為兵部侍郎並知樞宻院事趙安仁為右諫議大夫參知政事韓崇訓馬知節並簽署樞宻院事四月命使六人廵撫益利梓䕫福建等路所至存問父老疏決繫囚按察官吏能否民間利害以聞時屯田貟外郎謝濤使益利路及還舉所部官三十餘人宰相以為多濤乃歴陳其治狀且願連坐奉使舉吏連坐自濤始五月朔司天言日當食上避正殿既而隂翳不見上語宰相曰此非朕徳所致但喜分野之民不被其災耳司天奏周伯星見羣臣上表稱賀知雜御史王濟曰瑞星實符聖徳然唐太宗以家給人足豐年為上瑞臣願陛下日謹一日居安慮危則天下幸甚上嘉納之趙徳明遣其兵馬使賀永珍來貢馬六月知制誥朱巽上言朝廷命令不可屢改自今更張法制者請先付有司議其可否茍罔辨是非一切頒布恐失謹重之道上謂宰臣曰此甚識治體卿等志之秋七月知益州張詠嵗滿以任中正代之在郡凡五嵗遵詠條教人用便之宰相王旦初擬中正代詠議者多云不可上亦詰旦旦曰非中正不能守詠規矩他人徃則妄有變更矣八月上謂王旦等曰凡裁處機務要當知其本末朕每與羣臣議事但務從長雖言不盡理亦優容之所冀盡其情也九月御崇政殿親試賢良方正直言極諫錢易石待問並入第四等丁夘趙徳明遣劉仁朂來進誓表請藏盟府且言所乞回圖及放青鹽之禁雖宣命未許然誓立功効冀為異日賞典也冬十月朔以趙徳明為定難節度使封西平王丁未景徳四年春二月上謂輔臣曰前代内臣恃恩恣横蠧政害物朕常深以為戒至於班秩賜與不使過分有罪未嘗矜貸王旦等曰陛下言及此社稷之福也内侍史崇貴嘗使嘉州還言有知縣王姓者貪濁有佐官名昭度者廉幹乞擢為知縣上曰内臣將命能探善惡固亦可奬然以其宻侍扄禁便爾賞罰外人未為厭伏當須轉運使審察之富弼等釋曰人主聽納不可不謹若容片言之欺小則係一人之榮辱大則係天下之利害安危可不謹哉謹之之術惟在防㣲防㣲之術莫若左右之言不及也真宗不以一内侍臣言進退官吏聽納之道謹之至矣癸酉詔就西京建太祖神御殿又置國子監武成王廟三月以曹瑋為西上閤門使賞其扞邉之功也瑋在鎮戍嘗出戰小捷乃驅所掠牛羊輜重緩還敵兵去數十里聞瑋利牛羊而師不整遽還襲之瑋行愈緩得地利處乃止使人謂之曰蕃軍逺來必甚疲我不欲乗人之怠請休憩士馬少選決戰良乆瑋又使人諭之曰歇定可相馳矣一戰大破敵師徐謂其下曰吾知敵已疲故為貪利以誘之比其復來幾行百里矣若乗鋭便戰猶有勝負逺行之人若少憩則足痺不能立人氣亦闌吾以此取之四月宰相王旦因對言淮南𣙜酤競以増益課利為政煩擾特甚上曰此特官吏務貪勞績不䘏民困朕甚閔之乃詔三司取一年中等之數立為定額自今中外勿得更議増課以圖恩奬五月上與輔臣言及朝士有交相奏薦者王旦曰人之情偽固亦難知或言其短而意在薦揚或稱其能而情實排抑唐劉仁軌嘗忿李敬𤣥異巳乃稱其有將帥才而敬𤣥卒敗軍事上曰若然則險偽之軰世所不能絶也戊申詔以鼓司為登聞鼓院登聞院為登聞檢院諸人訴事先詣鼓院如不受詣檢院又不受即判狀付之許邀車駕上謂王旦曰車駕每出詞狀紛紜洎至披詳無可行者故有此更置焉乙丑詔曰有上封而論事輙乞留中而無名多涉巧誣頗彰欺詆自今文武羣臣表疏不得更乞留中事涉機要許上殿自陳如或舉奏官吏能否亦湏明上封章當行覆驗先是上謂王旦曰臣僚升殿奏事劄子有不列已名請留中者皆言人之短發人之私茍偏聽之即不可信若顯行之又重違其意比令杜鎬陳彭年檢上封宻諫故事可著條約并警有位令各舉其職乃降是詔是月初置雜賣場閏五月御崇政殿試賢良方正陳絳史良夏竦先是上謂宰臣曰六經之㫖聖人用心今䇿問宜用經義參之時務因命兩制各上䇿問擇而用之絳竦所對入第四次等六月司天言五星當聚鶉火既而近太陽同時皆伏按占云五星不敢與日争光者猶臣避君之明也望付史官以彰殊事從之庚申王欽若以五星聚東井慶雲見奉表稱賀詔付史館是月徙敏中知河南府兼西京留守司事嘗有僧暮過村民家求寄止主人不許僧求寢於門外車箱中夜有盗入其家自墻上扶一婦人并一囊衣而去僧見之遂亡去走荒草間忽墜眢井則婦人已為人殺先在其中矣明日主人執以詣縣掠治僧自誣云與子婦姦誘與俱亡因殺之投井中暮夜失足亦墜井獄成獨敏中以贓不獲疑之引僧詰問數四僧乃以實對敏中因宻使吏訪其賊吏食於村店店嫗問之曰僧某者其獄如何吏紿之曰昨日已笞死於市矣嫗歎之曰彼婦人者乃此村少年某甲所殺也吏曰其人安在嫗指示其舍吏掩捕獲之案問具服并得其贓一府咸以為神初知冝州劉承規御下嚴酷六月乙夘軍校陳進因衆怨鼓譟殺承規乃推判官盧成均僣號南平王甲戌詔曹利用張煦張從古張繼能薛顔等合勢攻討賊中能束身自歸者並放罪黎龍廷自稱權安南靜海軍留後遣其弟明相來貢辛巳授龍廷靜海節度使交趾郡王賜名至忠又追封黎桓為南越王復置諸路提㸃刑獄官仍以使臣副之八月置羣牧制置使命堯叟兼之賜孔子四十六世孫聖佑同學究出身聖佑延世子冝孫也置龍圖閣學士以杜鎬充職九月諸路皆言大稔淮蔡間皆言麥斗十錢粳米斛錢二百賊圍象州乆不克曹利用等以大軍趍救之陳進獨率衆來拒直犯前軍前軍持掉刀巨斧破其標牌内侍史崇貴登山大呼曰賊走矣急殺之賊心動衆遂潰盧成均始挈其族來降遂斬進并其黨十一月殿中侍御史趙湘請封禪上拱揖不答王旦等曰封禪之禮曠廢已久若非聖朝承平豈能振舉初王欽若既以城下之盟毁冦準上自是常怏怏他日問欽若曰今將奈何欽若度上厭兵即繆曰陛下以兵取幽薊乃可刷此恥也上曰盍思其次欽若曰當為大功業鎮服四海誇示戎狄也上曰何謂大功業欽若曰封禪是矣然封禪當得天瑞天瑞安可必得前代葢有以人力為之陛下言河圖洛書果有此乎聖人以神道設教耳上曰王旦得無不可乎欽若曰臣請以聖意諭旦旦僶俛而從上他日晩幸秘閣惟杜鎬方直宿上問曰所謂河圖洛書果何事耶鎬不測上㫖漫應曰此聖人以神道設教耳上由此意決遂召王旦飲於内殿歡甚賜以尊酒既歸發視乃珠子也旦自是不復持異天書封禪等事始作龜鑑曰謬哉神道設教之言何其敢於自欺如是耶若呼萬嵗者三若有景光者十二武帝之惑於文成五利青史載之至今為天下笑且天無言安得有書今之詐又甚於文成五利矣吾誰欺欺天乎自是丁謂則以大計有餘而投之惟演則以獻祥符頌而順之朋邪翼設相率為欺聖明天子鮮有不為之惑然而天瑞安可必得之言王旦得無不可之論聖心明知其非雙鶴飛舞之奏帝曰文則文矣恐不為實遽令易奏是帝之心葢已燭破其奸而不可以惑之也卒至姦人得以售欺而王旦諸賢亦且俛首順從而無異議者或者以邉事方定人心未寧將假是以鎮撫之耳而况岱山之封出於兖州父老之請天子嘗止之曰大事不可輕議汾隂之祠迫於河中父老之進說天子亦以地逺人勞為戒則是行也亦非天子之本心當是時周起有諫知節有諫孫奭又數數有諫下至草澤之士亦以持盈守成其道尤難為戒莫不優容而嘉納之奉天有述矣以庇民而並名祥瑞有論矣與勤政而偕作真誠感格瑞以類至圖復包羲䇿授黄帝自昔亦皆有之恐亦不得盡以為偽也辛巳雨雪上謂王旦等曰今瑞雪盈尺來嵗禾苗應有望也賜近臣宴上作瑞雪詩令三館即席和進十二月上初嗣位即詔諸路勿以祥瑞來貢禮部言福應之至以顯盛猷雖睿徳謙沖務於自損若史臣不記來世何觀請止報省闗史館奏可先是上問輔臣以天下貢舉人數王旦曰萬三千有餘約常例奏名十一而已上曰若此則當黜者不啻萬人矣典領之臣必須審擇晁逈兢畏當以委之旦曰滕元晏於士大夫間少交遊上曰今當以朱巽代周起知舉令起與元晏同掌封印事於是命晁迥朱巽王曽陳彭年同知貢舉命周起滕元晏封印舉人卷首凡禮部封印卷首及㸃檢程試别命官皆始此宋史全文卷五
