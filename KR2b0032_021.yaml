body:
  text: 宋史全文卷二十一上宋髙宗十三辛酉紹興十一年春正月壬寅提舉江州太平觀趙開卒自金人犯陜蜀開職饋餉者十年軍用得以毋乏開既黜主計之臣率三四易於開條畫毫髮無敢變更者然議者咎開竭澤而漁使後來者無所施其智巧凡茶鹽㩁酤激賞零畸絹布之征遂為四蜀常賦故雖累經減放而害終不去焉癸卯鳳翔府同統制軍馬楊從儀敗金人於渭南庚戌淮南宣撫使張俊入見上問曽讀郭子儀傳否俊對以未曉上諭云子儀時方多虞雖總重兵處外而心尊朝廷或有詔至即日就道無􅊏介顧望故身享厚福子孫慶流無窮今卿所管兵乃朝廷兵也若知尊朝廷如子儀則非特身享福子孫昌盛亦如之先是宗弼白順昌戰敗而歸遂保汴京留屯宋亳出入許鄭之間復簽兩河軍與蕃部凡十餘萬以謀再舉上亦逆知敵情必不一挫便已乃詔大合兵於淮西以待之俊自建康來朝故有是諭也辛亥上諭大臣曰李左車言千里饋糧士有飢色敵若犯淮其勢糧必在後但戒諸將持重以待之至糧盡欲歸因其怠而擊則無不勝矣又曰聽言必攷其實近有言劉錡之過朕徐攷之皆無實迹讒者遂息孫近曰錡當何以報聖恩也已未淮北宣撫判官劉錡自太平州渡江以援淮西金人陷壽春殺守兵千餘人繫橋淮岸以渡其衆甲子上曰木瓜美齊威公而載之衞國風何也秦檜等方思所以為對上曰自衞觀之威公繼絶誠可美自齊觀之威公專封亦可罪仲尼成人之美而掩其罪故不載之齊國風而載之衞國風也檜等對曰仰見聖學髙明深得仲尼刪詩之意非諸儒之所能及臣留正等曰孔子遏惡揚善之意見於六經者多矣人主政治本原出於經術是以見臣下過失不幸而出於不得已者則以孔子之心恕之此之謂帝學乙丑劉錡至廬州駐兵城外時知廬州陳規病卒城中無守臣備禦之具皆缺錡巡其城一匝曰城不足守也乃冒雨與闗師古率衆而南丙寅金人大軍入廬州遣輕騎追錡相及於西山口錡自以精兵為殿復戈西向列陣以待追騎望見錡旌旗逡巡不敢逼日莫各解去丁卯錡結陣徐行號令諸軍占擇地利共趨東闗依水據山以遏金人之衝錡既得東闗之險稍休士卒兵力復振金人大兵據廬州雖時遣兵入無為軍和州境内剽掠而不敢舉兵逼江者葢懼錡之乘其後也江南由是少安戊辰金人陷商州守臣邵隆焚倉庫毁廬舍而遁乃入城據之二月癸酉淮西宣撫司都統制王德渡江屯和州敵退屯昭闗知商州邵隆復入商州初隆既遁去乃屯兵山嶺間道出州西芍藥口謂避地者曰汝皆王民毋忘本朝衆感泣攜老幼來歸隆遣其子繼春出商州之北以張其勢而移軍洪門金人以精騎來攻隆設三伏以待鏖戰兩時許大破之擒其將繼春亦破之於洛南縣金人乃去丙子上謂大臣曰中外議論紛然以敵逼江為憂殊不知今日之勢與建炎不同建炎之間我兵皆退保東南杜充書生遣偏將輕與敵戰故彼得以乘間猖獗今韓世忠屯淮東劉錡屯淮西岳飛屯上流張俊方自建康進兵前渡彼窺江則我兵乘其後今雖虚鎮江一路以檄呼彼渡江亦不敢來其後卒如上所料都統制王德遇金人韓常於含山縣東敗之丁丑上謂大臣曰朕於諸帥聽其言則知其用心觀其所為則知其才人皆言劉錡善戰朕謂順昌之勝所謂置之死地然後生未為善戰也錡之所長在於循分守節危疑之中能自立不變此為可取己卯淮西宣撫司統制官闗師古李横復取巢縣壬午淮西宣撫司將官張守忠遇金人於全椒縣敗之癸未淮西宣撫使張俊言已復巢縣又言俊已在和州竭力措置決與敵戰必須取勝可保無虞上大喜劉錡自東闗引兵出清溪邀擊金人張俊楊沂中亦遣統制官王德張子益等㑹兵取含山縣復奪昭闗甲申三京招撫處置使司統制官崔臯遇金人於舒城縣敗之丁亥淮北宣撫副使楊沂中判官劉錡淮西宣撫司都統制王德統制官田師中張子葢及金人戰於柘臯鎮敗之前一日錡行至柘臯與金人遇夾河而軍初金人之退兵也日行甚緩至尉子橋天大雨次石梁河河流湍暴乃㫁橋以自固列營柘臯柘臯地平金人以為騎兵之利且見錡兵少意甚易之河東巢湖闊二丈餘錡命軍士曳薪疉橋須㬰而成遣甲軍數隊過橋皆卧鎗而坐會沂中德師中子葢之軍俱至翌日金將那王與韓常等以鐵騎十餘萬分為兩隅夾道而陣沂中自上流涉淺徑進官軍不利德曰賊右隅皆勁騎吾將先破之乃與師中麾兵渡橋薄其右隅見陣動有一將被甲躍馬指畫陣隊德引弓一發將應弦墜馬德乘勢大呼馳擊諸軍皆鼓譟金人以拐子馬兩翼而進德率兵鏖戰沂中令萬兵各持長斧堵而前奮銳擊之金人大敗退屯紫金山德等尾擊之捕獲數百人馬䭾數百錡謂德曰昔聞公威略如神今果見之請以兄禮事公張俊之愛妾章氏即杭妓張穠也頗知書柘臯之役俊貽書囑以家事章答書引霍去病趙雲不問家事為言令勉思報國俊以其書進上大喜親書奬諭賜之庚寅上謂宰執曰自敵犯邊報至人言非一朕惟靜坐一室中思所以應敵之方自然利害皆見葢人情方擾惟當鎮之以靜若隨物所轉胷中不定則何以應變也乙未賜劉光世韓世忠張俊岳飛楊沂中劉錡詔書以捷書累至軍聲大張葢自軍興以來未有今日之盛仍戒以尚思困獸之鬭務保全功丙申江東制置大使葉夢得上奏稱賀詔嘉奬初建康屯重兵歲費錢八百萬緡米八十萬斛㩁貨務所入不足以贍至是禁旅與諸道之師皆至夢得被命兼緫四路漕計以給饋餉軍用不乏故諸將得悉力以戰由是朝廷益嘉之己亥上曰虜退便當措置淮南如移隸州縣併省官吏修築城壁要當事事有備常為寇至之防也三月庚子朔福建路安撫大使知福州張浚言朝廷調撥大軍用度至廣臣本州措置出賣官田及勸誘寺院變易度牒共得六十三萬緡節次起發少助國用詔浚一意體國識大臣體令學士院降詔奬諭癸卯張浚復特進金人圍濠州初金人自柘臯退軍於紫金山也濠州守臣王進發書告急甲辰淮西宣撫使張俊淮北宣撫副使楊沂中判官劉錡㑹議班師俊與沂中為腹心而與錡有隙故柘臯之戰奏賞諸軍錡獨不預時朝廷雖命三帥合軍不相節制然諸軍進退多出於俊而錡以順昌之功驟貴諸將亦頗嫉之乙巳知邵武軍王洋乞鄉村之人無問貧富凡孕婦五月即經保申縣專委縣丞注籍其夫免雜色差役一年候生子日無問男女第三等已下給義倉米一斛縣丞月給食錢十千上覽奏曰愚民無知迫於貧困不能育故生子而殺之官給錢物使之有以育則不忍殺矣朕為父母但欲民蕃衍豈惜小費也乃詔户部措置丙午京東淮東宣撫處置使韓世忠舟師至招信縣夜世忠以騎兵遇金人于聞賢驛敗之丁未金人陷濠州知州事王進為所執兵馬鈐轄邵青巷戰死之戊申張俊楊沂中劉錡至黄連埠去濠州六十里而聞城陷俊乃召錡沂中謀之沂中曰厮殺耳錡曰有制之兵無能之將可御有利害之兵有能之將不可御也今我軍雖銳未為有制不若據險下寨然後出兵襲之諸將皆曰善於是鼎足以為營俊遣斥堠數輩還俱言濠州無金人俊遣將官王某謂錡曰已不須太尉入去錡乃不行惟沂中與王德領二千餘騎而往以兩軍所選精銳策應之四更起黄連午時騎兵先至濠州城西嶺上列陣未定有金人伏甲騎萬餘於城兩邊須臾煙舉於城上伏騎分兩翼而出沂中皇遽以策麾其軍曰那回諸軍聞之以為令其走爾散亂南奔無復紀律其步人見騎軍走謂其已敗皆散金人追及步人多不得脫殺傷甚衆庚成秦檜奏近報韓世忠張俊等至濠州岳飛已渡江去㑹師矣上曰首禍者惟烏珠戒諸將無務多殺惟取烏珠可也澶淵之役達蘭既死真宗詔諸將按兵縱契丹勿邀其歸路此朕家法也朕兼愛南北之民豈忍以多殺為意乎初金之入寇也上命飛以兵來援飛念前此每勝復被詔還乃以乏糧為詞最後上御劄付飛云社稷存亡在卿此舉飛奉詔移兵三十里而止及濠州已破飛始以兵至舒蘄境上故張俊與秦檜皆恨之辛亥楊沂中渡江歸行在壬子金人自渦口渡淮北歸癸丑張俊渡江歸建康府丁巳劉錡自和州引兵渡江歸太平州楊沂中之敗於濠梁也張俊自黄連拔寨徑去錡乃按部伍整旌旗最後徐行金人亦不復追錡至歴陽駐軍具奏聽㫖然後班師由是俊與沂中皆恨之夏四月丙子詔諸州縣量收免行錢自宣和間始復熙寧舊法罷行户而令輸錢至靖康初又罷紹興初雖令見任官市買方物悉如民間之價而汚吏猶虧其直議者以為不便會軍興用乏遂復令免行仍詔公私和買物色並依市直違者以自盜論己卯參知政事兼權同知樞密院事孫近提舉臨安府洞霄宫金人之犯淮西也近請召張浚都督諸軍秦檜大惡之及兵退御史中丞何鑄乃論近本無體國之忠但有謀身之計乞行罷黜殿中侍御史羅汝檝因交章論近乃有是命庚寅復置將作軍器監長貳各一貟罷樞密院計議官辛卯詔給事中范同令入對初張浚在相位以諸大將久握重兵難制欲漸取其兵屬督府而以儒臣將之會淮西軍叛浚坐謫去趙鼎繼相王庶在樞府復議用偏裨以分其勢張浚覺之然亦終不能得其柄至是同獻計於秦檜請皆除樞府而罷其兵權檜納之乃密奏於上以柘臯之捷召韓世忠張俊岳飛並赴行在論功行賞壬辰太保京東淮東宣撫處置使英國公韓世忠少師淮南西路宣撫使濟國公張俊並為樞密使少保湖北京西路宣撫使岳飛為樞密副使並宣押赴本院治事世忠既拜乃製一字巾入都堂則裹之出則以親兵自衞檜頗不喜飛披襟作雍容狀檜亦忌之龜鑑曰謬哉范同之為檜畫計也同之議曰諸將俱握重兵必甚難制莫若皆除樞密而罷其兵權此范同但求以助和議而然也檜乃用之詔罷宣撫兵隸樞院附和則保富貴是故張俊先至則除美官韓世忠劉錡不言宣則傷讒岳飛最後至被禍最慘矣乙未樞密使張俊言臣已到院治事見管軍馬伏望撥入御前使喚時俊與秦檜意合故力贊議和且覺朝廷欲罷兵權即首納所統兵上從其請復詔范同入對命林待聘草詔書奬諭上謂韓世忠張俊岳飛曰朕昔付卿等以一路宣撫之權尚小今付卿等以樞府本兵之權甚大卿等宜各為一心勿分彼此則兵力全而莫之能禦顧如烏珠何足掃除乎禮部侍郎鄭剛中言於秦檜曰前日所共憂者一旦變為安平之道因為檜陳善後之策凡七事五月辛丑淮東轉運副使胡紡總領淮東軍馬錢糧置司楚州尚書度支貟外郎吳彦璋總領淮西江東軍馬錢糧置司建康府太府少卿曽慥總領京湖軍馬錢糧置司鄂州葢使之與聞軍事不獨職餽餉云總領官正名自此始丁未詔韓世忠聽候御前委用張俊岳飛帶本職前去按閱御前軍馬專一措置戰守時秦檜將議和故遣俊飛往楚州總淮東一全軍還駐鎮江府壬子上謂宰執曰士大夫言恢復者皆虚辭非實用也用兵自有次第朕比遣二樞使按閱軍馬措置戰守葢按閱於先則兵皆可戰兵既可戰則能守矣待彼有釁然後可進討以圖恢復此用兵之序也辛酉布衣虞宰獻樂曲詩上謂大臣曰士大夫所進文字朕詳覽熟思葢欲知民之利病政之臧否朕躬之失耳若溢美之言實不欲聞可令還之乃詔檢鼓院自今獻無益之言不干政體者勿受癸亥饒州童子江安國九歲其弟定國七歲皆能誦經子書詔免文解一次六月戊辰朔責授單州團練副使劉子羽復右朝請大夫知鎮江府兼沿江安撫使初樞密使張俊嘗為子羽之父韐部曲韐器之俊薦其才故復用俊晚年主和議與秦檜意合上眷之厚凡所言朝廷無不從薦人為監司郡守帶職名者甚衆辛未上謂大臣曰外域不可責以中國之禮朕觀三代以後惟漢文帝待匈奴最為得體彼書辭倨傲則受而弗較彼軍旅侵犯則禦而弗逐謹守吾中國之禮而不以責外域此最為得體也壬申户部奏贖刑文字上曰朕謂凡為政之本必抑強扶弱民乃能立今使富者犯死法得以金自贖則貧者無金豈能獨立乎贖刑既非祖宗法似未可用也總領曽慥提舉洪州玉隆觀以疾自請也左朝請郎林大聲總領湖北京西軍馬錢糧大聲初為永嘉丞秦檜寓居永嘉與之厚遂驟用之癸酉分行在省倉為三界百五十萬斛凡民户白苗米南倉受之以廩宗室百官為上界次苗米北倉受之以給衞士及五軍為中界糙米東倉受之以備諸軍月糧為下界甲戌上謂宰執曰中興自有天命光武以數千破尋邑百萬豈人力所能乎朕在宫中聲色之奉未嘗經心只是靜坐内省求所以答天意也乙亥守尚書右僕射同中書門下平章事兼樞密使秦檜為特進尚書左僕射封慶國公詔有司造尅敵弓韓世忠所獻也上謂宰執曰世忠宣撫淮東日與金戰常以此弓勝之今朕取觀之誠工巧然猶未盡善朕籌累日乃少更之遂增二石之力而減數斤之重今方盡善後雖有作者無以加矣辛巳趙慶孫等六人並停官或曰慶孫嘗為趙鼎所薦故秦檜斥之壬午布衣吳曽特補右迪功郎曽獻所著左氏發揮而有是命癸未張俊岳飛至楚州飛視兵籍始知韓世忠止有衆三萬而在楚州十餘年金人不敢犯猶有餘力以侵山東可謂奇特之士也俊以海州在淮北恐為金人所得因命毁其城遷其民於鎮江府俊遂總世忠之軍還鎮江府惟背嵬一軍赴行在甲申知河南府李興以所部至鄂州興據白馬山與李成相扼凡數月朝廷命班師以興為左軍同統制壬辰太保三京等路招撫處置使劉光世罷為萬壽觀使三大將既罷光世入朝因引疾丐祠上謂大臣曰光世勲臣朕未嘗忘聞其疾中無聊昨日以玩好物數種賜之光世大喜秉燭夜觀幾至四更朕於宫中凡玩好之物未嘗經目止須賜勲舊賢勞耳光世既罷遂寓居永嘉焉秋七月庚子上以臨安旱蔬食請禱決滯獄出繫囚後二十四日大雨翰林學士范同為參知政事辛丑司農少卿髙穎罷自此諸大將之客稍稍被罪矣壬寅侍衞親軍馬軍都虞候劉錡乞宫觀詔錡疾速赴行在奏事甲辰提舉川陜茶馬馮康國奏近聞敵在長安三月二十三日晝晦油酒變色皆白兵刃有光焰涇州雨沙旱災相仍赤地千里上曰景象異甚天變示人殆不虚也自古無文德而有武功往往非國家之福而敵好兵嗜殺肆為無道不畏天不恤人其能久乎朕當修人事以待之耳丁未秦檜以進書恩遷少保封冀國公壬子右諫議大夫万俟卨言伏見樞密副使岳飛爵髙祿厚志滿意得平昔功名之念日以頽墮今春敵寇大入疆埸騷然陛下趣飛出師以為犄角璽書絡繹使者相繼於道而乃稽違詔㫖不以時發久之一至舒蘄忽卒復還比與同列按兵淮上公對將佐謂山陽為不可守沮喪士氣動摇民心伏望免飛副樞職事出之於外以伸邦憲先是飛數言和議非計秦檜大惡之及是飛自楚州歸乃令卨論其罪始有殺飛意矣甲寅侍衞親軍馬軍都虞候劉錡知荆南府罷其兵張浚深忌錡與岳飛每言飛赴援遲而錡戰不力也飛請留錡掌兵不許時有處士孫元濟者聞除錡荆南竊謂比之奕棊此最髙着也人問其故元濟曰陜蜀諸軍但知吳氏襄漢諸軍尚思岳家江陵在蜀漢之間而錡有威名為諸將所服且聞有詔或遇緩急旁郡之兵許之調發銷患未形此廟算也非吾君大聖其孰能與此己未樞密使張俊為太傅進封廣國公賜玉帶以俊首抗封章請歸部曲也俊請離軍將佐並與添差差遣從之其後大為州郡之患庚申詔文武官陳乞致仕身亡雖在給敕之前並聽蔭補用考功貟外郎游損請也上謂大臣曰士風陵夷以一官之故父死匿喪以俟命葢立法有未盡也朕謂濫與人官雖害法其體猶輕若風敎不立使人飾詐苟得棄滅天理其害甚大况在法所當得乎損酢子也癸亥大雨翌日輔臣稱賀上曰朕日來卧不安席夜半猶未交睫懼德不類或政有闕失每事循省殆遍恐旱災必有致之之由若乃祈禱之禮但具文耳是月樞密使張俊復往鎮江措置事務副使岳飛留行在以二人議事不協故也俊因奏事乞促淮西之賞上曰功賞後時在將帥不在朝廷俊問所以然上曰軍士有出者有輜重及守營者凡所謂戰功皆戰士也今更不分全軍皆要推賞動數萬人朝廷何以行之俊曰臣今蒙專任當戒諸統制官只保明實出戰者庶可漸革前弊八月辛未尚書吏部郎中李鞉試將作監吏部貟外郎劉才卲守軍器監始除也上覽除目曰凡事必謹始館職寺監丞乃郎官卿監之選也郎官卿監乃侍從之選也凡除館職寺監丞必擇他日可補郎官卿監之闕者凡除卿監郎官必擇他日可補侍從之闕者如此則士安分守而奔競之風息矣若不謹始用非其才久而不遷則士有留滯之嘆以序遷之又有不稱職之誚不可不謹甲戌樞密副使岳飛充萬壽觀使右諫議大夫万俟卨既劾飛罪未報御史中丞何鑄殿中侍御史羅汝檝復交疏論之卨章四上又錄其副示飛乃丐免故有是命甲申上曰水旱有數雖堯湯不能免艱難以來十餘年間未嘗無歲此天祐也然不可恃此不為之備祖宗置義倉以備水旱最為良法而州縣奉行不䖍妄有支用寖失本意或遇水旱何以賑之可令監司視其實數或有侵失嚴責補還義倉充實則雖遇水旱民無飢病矣癸巳上謂宰執曰監司郡守朝廷委任之意未嘗有異而近來妄分彼此莫相協和州郡或有闕乏監司不肯移那監司或有措置州郡不肯應副如此何以濟國乎可令御史臺察其尤者措置行遣庶幾協和共濟國事也川陜宣撫副使胡世將特起復世將方與諸將議出師進討而其母秦國太夫人康氏卒於晉陵上聞之詔軍旅事重不拘常制目下供給不許辭避甲午上曰省刑罰薄稅斂王道之本國步艱難未能弭兵斯民稅斂無術可以薄之朕心實不足至於刑罰豈可不省而獄繫淹延或至踰歲何也可令提刑司覺察州縣提刑失職令御史臺彈奏務要訟平刑清以副朕意九月癸卯命軍器少監鮑琚往鄂州根括宣撫司錢物先是湖北轉運使官汪叔詹以書白秦檜言岳飛頃於鄂渚置酒庫日售數百緡襄陽置通貨場利復不貲自飛罷未有所付乞令副都統制張憲主之庶杜欺弊前二日詔都統制王貴與憲同掌上謂檜曰聞飛軍中有錢二千萬緡昨遣人問之飛對所有之數葢十之九人言固不妄也今遣琚往縱不能盡若得其半亦不少矣又歲計所入供軍之餘小約亦數百萬緡比之頭會箕斂不知幾户民力可以辦此鄂州前軍副統制王俊詣都統制王貴告副都統制張憲謀據襄陽為􅀢先是朝廷命諸將更朝行在憲懼不得還乃妄申金人侵犯上流兾朝廷還岳飛復掌兵而已為之副會憲詣樞密行府白事俊具所謀告之以統制官𫝊選為證貴即日以聞張俊在行府聞之遂收憲屬吏戊申泗州言奉使官莫將韓恕歸至本州上諭大臣曰此殆上天悔禍彼有休兵之意爾朕每欲與講和非憚之也重念祖宗有天下二百年愛養生靈惟恐傷之而日尋干戈使南北之民肝腦塗地所願天心矜惻消弭用兵之禍耳先是將恕至涿州為金人所執至是宗弼將與本朝議和故縱之歸報焉既而宗弼引兵犯泗州破之淮南大震甲寅建康府火乙卯詔忠州團練使劉光逺赴行在奏事時金國宗弼以書來朝議遣光逺往聘而光逺方以贓罪為監司所按故趣召之翌日光逺至行在上面諭以前罪一切不問遂以為利州觀察使而吉州刺史曹勛亦遷忠州防禦使令與光逺偕行丙辰右護軍都統制吳璘及金國統軍胡盞戰於剡家灣敗之初胡盞與習不祝合軍劉家圏胡盞善戰習不祝善謀且據險自固前臨峻嶺後控臈家城謂我軍必不敢輕犯璘揣知其情先一日召諸將問何以必勝統制官姚仲曰戰於原下則敗原上則勝璘以為然既相視其地乃遣人告金曰明日請戰金聞之皆笑愈益不疑夜半璘遣仲與鄜延經略使王彦率所部銜枚直進渡河陟峻嶺截坡上出其不意約與敵對柵然後發火又遣將張士亷等取間道以兵控臈家城戒曰敵根本在此若敗必趨入城汝等截門勿縱一騎入二將所部軍行寂無人聲又天大隂霧既上嶺列柵乃發火敵大駭倉猝備戰我軍已畢列游騎有聞渠帥以馬撾敲鐙者曰吾事敗矣我軍氣益振璘猶策習不祝有謀必謂我趣戰欲速不肯徑出胡盞恃其百戰百勝與習不祝異議宜可挑取已而遣輕兵嘗之果胡盞勒兵已出與我軍合鏖擊數十璘輕裘駐馬陣前麾軍亟戰我師皆殊死鬭金人大敗遁去騎兵襲後斬首六百三十生擒七百人驍將馬廣者所部號八字軍察敵將潰越陣挑逐既而大靡俘馘人馬數千偽軍降者萬餘人璘悉釋之聽其自便金殘兵果趨城走張士亷違節制後期二將僅以身入城率餘兵拒守璘圍之戊午劉光逺曹勛辭於内殿遂命持敵帥報書以行癸亥言者乞令有官人銓試並兼習兩場故事銓試有官人分五場曰經義曰詩賦曰時義曰㫁案曰律義願試一場者聽議者謂試之以經義詩賦時義者欲使之通古今試之以刑統義㫁案者欲使之明法令二者各兼一場庶使人人通古今明法令而無一偏之失事下吏部乃命任子如所請右護軍都統制吳璘自臈家城班師初金統軍胡盞在城中璘急攻之城且破朝廷以驛書命璘撤戍璘遂歸宣撫副使胡世將聞之歎曰何不降金字牌且來世將處耶世將以金人之俘三千人獻于行在命利路轉運判官郭游卿就俘獲中以聲音形貌驗得真女真四百五十人同日斬於嘉陵江上斂其尸以為京觀餘皆涅其面於界上放還敵氣大沮冬十月丙寅朔上謂大臣曰人主之權在乎獨㫁金國之主幼而無㫁權歸臣下往年之和出於達蘭今年之戰出於烏珠或和或戰國之大事而皆不出於人主無㫁如此何以立國知不足畏矣戊辰川陜宣撫司都統制楊政及金國萬户通檢戰于寶雞縣敗之是日黎明通檢將精兵萬衆出戰政賈勇士鏖戰縣旁至日晡政遣裨將將騎突出陣後山上執旗以招敵望見大呼曰伏兵發矣乃驚而潰政乘勝掩殺通檢至城門而橋已絶乃擒之己巳劉光逺等至虜軍庚午秦檜奏上流守備上曰艱難以來將士分隸主帥歲久未嘗遷動使植根深固豈是長策當今互易如臂指可以運掉纔過防秋便當為此則人人可以指蹤號令矣乙亥金國都元帥宗弼遣劉光逺等還大略言當遣尊官右職名望夙著者持節而來葢敵欲亟和故也少保醴泉觀使岳飛下大理寺先是樞密使張浚言張憲供通為收岳飛處文字後謀反行府已有供到文狀秦檜乘此欲誅飛乃送飛父子於大理獄命御史中丞何鑄大理卿周三畏鞠之己卯上曰凡事必謹於微若事已成則難改故書言制治於未亂保邦於未危荆襄守臣辟差者勿令久任以漸易之非特謹微亦所以保全之也壬午權尚書吏部侍郎魏良臣落權字充大金軍前通問使知閤門事士公亮為福州觀察使副之國書但使之斂兵徐議餘事癸巳樞密使韓世忠罷充醴泉觀使進封福國公世忠既不以和議為然由是為秦檜所抑至是魏良臣等復行世忠乃諫以為中原士民迫不得已淪於敵國其間豪傑莫不延頸以俟弔伐若自此與和日月侵尋人情銷弱國勢委靡誰復振之又再上章力陳秦檜誤國詞意剴切檜由是深怨世忠言者因奏其罪上留章不出世忠又懼檜隂謀乃力求閑退遂有是命世忠自此杜門謝客絶口不言兵時跨驢攜酒從一二童奴游西湖以自樂平時將佐亦罕見其面云金人陷濠州商州安撫使邵隆及金知陜川鄭賦戰克之復陜川起復川陜宣撫副使胡世將圖上吳璘剡灣克捷之狀且言臣詢客衆論皆謂璘之此戰比和尚原殺金平論以主客之勢險易之形功力數倍據捉到蕃人供通金人稱璘有勇似其兄之語璘等為國宣力川陜用兵以來未有如此之勝伏望聖慈察璘智勇冠軍優與遷擢以為盡忠許國之勸又奏本司都統制楊政樞密院都統制郭浩並乞優異推恩乃賜璘等詔書奬諭密賜世將黄金二百兩茶藥有差初三將之並出也璘復捷剡灣政下隴州破岐下諸屯浩取華虢二州入陜府有破竹之勢世將亦遣要約陜西河東忠義首領數十願為内應而金虜約和於朝廷秦晉之人殊惜之十一月丙申提舉江州太平觀李迨知洪州上覽除目曰迨能吏肯以身任怨不恤人毁譽朕深知之但此州寄居多有造謗者不可不察也治道無他但不以毁譽為賢否常核實以行賞罰則治道成矣齊威王封即墨而烹阿齊國大治葢知核實以為政而不徇毁譽空言也丁酉上曰唐太宗除亂比湯武致治幾成康可謂賢君矣然誇大而好名雖聽言納諫然不若漢文帝之至誠也人君至誠臨下何患治道之不成哉戊戌言者請補試州縣小吏仍許告吏罪使補其闕以懲吏強官弱之弊上謂宰執曰此說若用則相吿訐而州縣擾矣治天下當以清靜鎮之若妄作生事乃亂天下非治天下也昔人有言省官不如省事省事不如清心朕常躬行此語新通判利州陳敦厚召試館職以其上書言事故也敦厚又遺秦檜書言檜見幾似顔子任重似伊尹檜大善之令赴都堂審察遂召試以為祕書省校書郎己亥參知政事范同罷同始贊和議為秦檜所引及在政府或自奏事檜忌之右諫議大夫万俟卨因論近朝廷收天下兵柄歸之宥密而同輒於稠人之中貪天之功以為已有望罷其機務詔同以本官提舉西京嵩山崇福宫提舉臨安府洞霄宫李光責授建寧軍節度副使藤州安置言者論迺者二使之還敵示欲和之意於國體無損而光乃陰懷怨望鼓唱萬端乘時誹訕罪不可赦秦檜進呈上曰司馬光言政之大本在於刑賞朕於光輩聞其虚名而用之見其不才而罷之逮其有罪而責之皆彼自取朕未嘗有心也若用虚名而不治其罪則有賞無刑政何以成譬之四時有陽無隂豈能成歲乎金國都元帥宗弼遣魏良臣等還許以淮水為界歲幣銀帛各二十五萬匹兩又欲割唐鄧二州因遣其行臺户部侍郎蕭毅翰林待制邢具瞻審定可否乙巳詔吏部侍郎魏良臣就充接伴使以中書言金使蕭毅已過界也毅等過江揭旗於舟大書江南撫諭知鎮江府劉子羽見之怒夜以他旗易之翌日良臣見旗有異大懼力索之且以語脅子羽子羽曰吾為守臣朝論無所預然欲揭此於吾之境則吾有死而已出境乃還之丁未判大宗正事士㒟提舉西京嵩山崇福宫士㒟數言事秦檜患之岳飛之下吏也士㒟草奏欲救之語泄檜乃使言者論之故有是命壬子金國審議使蕭毅邢具瞻等入見乙卯御史中丞何鑄簽書樞密院事充大金報謝使戊午蕭毅等辭行時朝廷許割唐鄧二州餘以淮水中流為界毅辭上諭曰若今歲太后果還自當謹守誓約如今歲未也則誓文為虚設辛酉福建安撫大使兼知福州張浚為檢校少傅崇信軍節度使充萬壽觀使秦檜將議和遣工部貟外郎葢諒因事至閩中風浚使附其議當引為樞密使浚答書言虜不可縱和不可成檜不恱會浚以母老乞祠乃有是命先是責授清逺軍節度副使趙鼎在會稽嘗語其客方疇曰張德逺建炎復辟之功豈可忘也上待臣下有恩想必講求矣疇曰今日擔子極重秦相欲獨負之恐難也不知故相中誰可辦者時李綱朱勝非皆在鼎曰伯紀藏一皆不濟事惟德逺可爾第恐不容復來至是卒如所料十二月乙丑朔上謂秦檜曰和議已成軍備尤不可弛宜於㳂江築堡駐兵令軍中自為營田則斂不及民而軍食常足可以久也仍修建康為定都之計先宗廟次太學而後宫室丙寅上謂大臣曰三代之世士大夫盡心禮法鮮有異端之惑自漢眀帝金人之夢佛法流入中國士大夫靡然從之其上者惑於清靜之說而下者惑於禍福之報殊不知六經廣大靡不周盡如易無思無為寂然不動感而遂通天下之故與禮正心誠意者佛氏清靜之說果有以勝之乎至若積善之家必有餘慶積不善之家必有餘殃與夫作善降之百祥作不善降之百殃者即佛氏禍福之報也士大夫不師六經而盡心佛法殊為可笑壬申上謂宰執曰晉平吳之後天下混一武帝又勤於政事宜若可見太平而旋致禍亂天下分裂何也秦檜等方思所以對上曰禮可以立國君臣上下如天地定位不可少亂武帝字呼羣臣又以珊瑚株助臣下以侈靡相勝廢禮如此其能國乎癸酉秦檜言攷之經傳人君莫難於聽納上曰朕觀自古人君不肻聽納者皆因有心或好大喜功或窮奢極欲一實其衷則凡拂心之言皆不能入矣若清心寡欲豈有不聽納乎朕於宫中觀書寫字之外並無嗜好凡事無心故羣臣之言是則從非則否未嘗惑也己亥何鑄等至軍前宗弼以書來索北人之在南者因趣割陜西餘地癸巳岳飛賜死於大理寺飛既屬吏何鑄以中執法與大理卿周三畏同鞠之飛久不伏因不食求死至是万俟卨入臺月餘獄遂上於是飛以衆證坐嘗自言已與太祖俱以三十歲除節度使為指斥乘輿情理切害及金犯淮西前後受親札十三次不即策應為擁兵逗遛當斬御前前軍統制張憲坐收飛子雲書謀以襄陽叛當絞飛長子雲坐與憲書稱可與得心腹兵官商議為傳報朝廷機密事當追一官罰金詔飛賜死命楊沂中􅊩其刑誅憲雲於都市參議官于鵬除名送萬安軍孫菫送潯州並編管仍籍其貲流家屬於嶺南天下寃之飛死年三十九初獄之成也太傅醴泉觀使韓世忠不能平以問秦檜檜曰飛子雲與張憲書雖不明其事體莫須有世忠怫然曰相公莫須有三字何以服天下乎飛知書而待士且濟人之貧用兵秋毫無犯民皆安堵不知有軍至今號為賢將龜鑑曰岳飛之將畧亦嘗聞其大畧乎飛起於効用者也平居憂國無所不為征討出師慷慨勇往隆冬按邊上有非我忠臣莫翊大趾之諭盛夏出師上有暑行勞勤朕念之不忘之語東下赴援而上有委身徇國竭節事君之嘆力疾先馳而上有國爾亡身誰如卿者之褒帥襄陽而克復襄陽鎮湖北而坐制湖湘焚蔡州之積奪虢州之糧而又倡率三軍指授方畧自李寳曹州之戰以至張憲臨潁之戰凡十五戰每戰必捷金帥相告謂撼山易撼岳飛兵難吁當時有如飛者數十輩布置邊面是真所謂萬里長城者而檜乃屏棄之曽不甚惜何耶綸音趣覲彼之所以逗遛不進者葢亦以事機乗成為可閔也莫須有三字強以傅會欲加之罪其無辭乎千載而下每念岳武穆之寃直欲籲天而無從也鷙鳥盡良弓藏狡兔死走狗烹此為不能保全功臣者說也况鷙鳥猶未盡而狡兔猶未死者也大事記曰飛之死尤不厭衆心飛忠孝出於天性自結髮從戎凡歴數百戰内平劇盜外抗強胡其用兵也尤善以寡勝衆其從杜充也以八百人破羣盜五十萬衆於南薫門外其破曹成也以八千人破其十萬衆於桂嶺其戰烏珠也於潁昌則以背嵬八百於朱仙鎮則以背嵬五百皆破其衆十餘萬金人所畏服不敢以名穪至以父呼之自烏珠有必殺飛而後可和之言檜之心與金合而張俊之心又與檜合媒孽横生不置之死地不止万俟卨以願備鍜鍊自諌議而得中丞王俊以希㫖誣告自御防而得輔車姚政龎术傅選之徒亦以阿附並沐累遷之寵附㑹其事無所不至而莫須有三字世忠終以為無以服天下飛死世忠罷中外大權盡歸於檜於是盡逐君子盡用小人矣徽猷閣待制洪皓在燕山是冬密奏金已厭兵勢不能久異時以婦隨軍今不敢攜矣朝廷不知虛實卑詞厚幣未有成約不若乘勝進擊再造猶反掌耳所取投附人只欲守江南歸之可也獨不監侯景之禍乎若欲復故疆報世讎則不宜與胡銓封事此或有之彼知中國有人益生懼心張浚名動殊方可惜置之散地并問李綱趙鼎安否廣西買馬増數壬戌紹興十二年春正月壬寅詔建國公出外第可依親賢宅差提㸃官并都監癸卯上謂大臣曰朕於宫中無嗜好惟好觀書考古人行事以施於政凡學必自得乃可用第與古人㸃姓名何所益也史臣曰稽經以出治猶按醫以治病也造之不深則醫或至於殺人而治或至於害天下帝王之學貴于自得深造之則黙然而識矣左右逢原則神明生焉戊申御史中丞万俟卨大理卿周三畏同班入對以鞠岳飛獄畢故也尚書省乞以飛獄案令刑部鐫板徧牒諸路有進士知浹者好直言飛以賔客待之飛初下吏浹上書訟其寃秦檜怒併送大理獄成浹坐決杖送袁州編管云先是提舉洪州玉隆觀薛弼為飛參謀官與飛厚秦檜之閑居永嘉也弼舊遊其門万俟卨又善之繇是無一辭累及飛之在鄂也有王輔者嘗知彭山縣以贓敗遂依飛軍中飛亦厚待之至是輔遣其子孝忠上書指飛為姦凶陰合檜意檜喜由是脫罪籍尋擢知普州辛亥増福建鹽鈔錢十萬緡以鬻鹽増羨故也二月己巳上謂大臣曰征戰之事各有地利北狄騎兵雖中國所不能及若要馳騁於江淮恐未易得志孫權偏霸一方而曹魏竭天下之力終不能渡江晉室微弱而符堅百萬之衆敗於淝水拓跋魏雄據中原而歴六朝衰亂終不能奄有江表自非大無道如孫皓者豈能致北兵之得志乎今但修政事嚴武備北兵雖強不足畏也辛未上謂大臣曰詩書所載二帝三王之治皆有其意而不見其施設之詳太祖以英武定天下仁宗以兼愛結天下此朕家法其施設之詳可見於世者也朕當守家法而求二帝三王之意則治道成矣丁丑保慶軍節度使建國公瑗為檢校少保進封普安郡王時年十六王天性忠孝自幼育宫闈起居飲食未嘗離膝下上尤所鍾愛制下日者尤若訥私謂祕書省正字張闡曰普乃並日二字有合乎易所謂明兩作離之象殆天授也己卯殿前都指揮使楊沂中賜名存中壬午輔臣進呈殿中侍御史胡汝明論監司不按吏上曰朝廷分道置使正欲譏察州縣可申嚴行下若州縣贓汚不法而監司不能按致臺諫論列者當併絀之丙戌上曰學校風化之原不可緩也上又曰福建所買牛第二綱可發來臨安借與人户朕聞民間乏牛皆以人耕田其勞可憫朕嘗畫以人耕田之象置於左右庶不忘稼穡之艱難漢文帝每下詔必曰農者天下之本若文帝可謂知民事之本矣丁亥言者請自今鞫獄必差經任人上曰文學政事在孔門中自是兩科今士方離科舉未親民事遽使之鞫獄安能盡善也其從之戊子金主亶大赦自來亡命投在江南人見行理索候到並行釋罪其職官百姓軍人並許復故先是何鑄曹勛至金國見亶於春水開先殿具陳上意金主命早來使人上殿所請宜允仍出回書示之許還梓宫太后且遣鑄等還辛卯給事中知貢舉程克俊等言博學宏詞右承務郎洪遵敕賜進士出身沈介右從政郎洪适並合格遵适弟也秦檜以所試制辭進讀上曰是洪皓子耶父在逺能自立此忠義報也可與陞擢差遣上又言遵之文於三人中最勝既遂以遵為祕書省正字介适並為敕令所刪定官自中興以來詞科入選即入館自遵始是日鎮江府城外火延入城中遂及大軍倉燔米麥四萬斛芻六萬束公私室廬被焚者甚衆守臣劉子明坐貶秩時太平州池州蕪湖縣亦皆大火市井一空三月壬寅普安郡王出閣就外第命行在宗室正任已上悉送之辛亥上謂大臣曰朕兼愛南北之民屈已講和今通好休兵其利博矣士大夫狃於偏見以講和為弱以用兵為強非通論也乙卯上御射殿引南省舉人何溥已下是舉兩浙轉運司秋試舉人凡解二百八人而温州所得四十有二宰執子姪皆預焉溥永嘉人也朱勝非閒居錄曰秦檜居永嘉引用州人以為黨助吳表臣林待聘號黨魁召為從官實操國柄凡鄉士具耳目口鼻者皆登要途更相攀援其勢炎炎日遷月擢無復程度是年有司觀望所解鄉士四十二名檜與參政王次翁子姪與選者數人前軰詩云惟有糊名公道在孤寒宜向此中求今不然矣丙辰起復川陜宣撫副使胡世將薨於仙人闗辛酉秦檜等賀上以皇太后有來期先是洪皓在燕先報太后歸上謂檜曰皓身陷異區乃心王室忠孝之節久而不渝誠可嘉尚皓之二子並中詞科亦其忠義之報也士大夫茍能崇尚節義天必祐之夏四月庚午上御射殿引正奏名進士唱名主管合州崇道觀秦熺對策言天子建國右社稷左宗廟是故社稷不可無所依今神州未歸職方氏則考卜相攸莫如建康謂宜申飭有司早立宗社權為定都之制舉人陳誠之策言聖人以一身之微臨天下之大惟度量廓然舉天下之大納之胸中而成敗得喪不能為之芥蔕斯綽綽有餘裕矣成湯不愛犧牲粢盛以事葛伯文王不愛皮幣犬馬以事昆夷漢髙祖解平城而歸飭女子以配單于終其身而無報復之心故韓安國稱之曰聖人以天下為度光武卑辭厚幣以禮匈奴之使故馬援稱之曰恢廓大度同符髙祖葢帝王之度量兼愛夷夏之民不忍爭尋常以斃吾之赤子也楊邦弼策言陛下躬信順以待天下又得賢相相與圖治中興之功日月可冀又論吳越之事以為使越王與大夫種范蠡不量力度時輕死而直犯之是特匹夫之勇而非賢君相所宜為也有司定熺第一誠之次之邦弼又次之檜引故事辭而降為第二人特遷左朝奉郎通判臨安府賜五品服自誠之已下賜第者二百五十三人新科明法得黄子淳一人而已辛未上御射殿放合格特奏名進士朝鼎才等二百四十八人武舉正奏名陳鶚等五人特奏潘璋等二人是歲始依在京舊制分兩日唱名自是以為例辛巳江南東路轉運副使王􅀈等獻本司錢十萬緡銀五萬兩以助奉迎兩宫之費詔令户部樁收專充迎奉支用上曰若常賦之外不取於民庶幾副朕愛民之意朕在宫中服食器用惟務節儉不敢分毫妄費常戒左右曰此中視錢物不知艱難民雖一錢亦不易出周公作無逸戒成王惟在知小民之艱難朕不敢忘也自是四方率皆獻助矣丙戌通判湖州秦棣自祕閣棣檜弟以其姪熺遜所得職名為之請也五月甲午川陜宣諭使鄭剛中為川陜宣撫副使甲辰詔諸州軍無敎官處令尚書省選差既而禮部立到試敎官法上謂宰相曰士大夫不可不學惟學故能攷前世興衰治亂以為龜鑑則事無過舉而政皆適當矣朕在宫中未嘗一日廢也乙巳軍器監主簿沈該知盱眙軍措置㩁場凡㩁場之法商人貲百千以下者十人為保留其貨之半在場以其半赴泗州㩁場博易俟得北貨復易其半以往大商悉拘之以待北賈之來兩邊商人各處一廊以貨呈主管官牙人往來評議毋得相見每交易千錢各收五厘息錢入官其後又置場於光州棗陽安豐軍花黶鎮而金人亦於諸州置場辛亥潢州布衣陳靖特補右迪功郎靖獻中興統論於朝給事中程克俊等五人共薦之乃有是命乙卯詔禮部依舊制試敎官仍先納所業經義詩賦各三首㑹刑部無過下國子監看詳禮部覆考然後許試附省試院分兩場非取士之歲附吏部銓試院不限人數以文理優長為合格六月乙丑上謂大臣曰近日雨澤沾足歲事有望誠可喜者秦檜曰此乃聖德感召和氣所致上曰天人相因朕於人事雖不敢怠至歲事則當歸功於天也鎮西軍節度使吳璘來朝召之也既對命坐賜茶上問璘前此所以勝敵之方璘曰先令弱者出戰強者繼之他日上以語輔臣且曰璘善用兵此正孫臏三駟之說一敗而二勝者也己巳提舉亳州明道宫鄭億年提舉醴泉觀兼侍讀時朝廷答金人書許以所索陜西河南人次第而遣惟億年得留焉辛未提舉臨安府洞霄宫王庶責授髙德軍節度副使道州安置乙亥言者乞禁止父母在别籍異財之事上曰此固當禁然恐行法有弊州縣之吏科率不均民畏户口大而科率重不得已而為誠可憐者宜併申嚴科率之條乃善己卯上書省言金人使明威將軍髙居安扈從皇太后一行前來詔知閤門事曹勛充接伴使壬午言者乞稍寛私鹽之律以謂州縣之間慘酷寃濫不知幾何欲望少加裁損輔臣進呈上曰古今異事今國用仰給煮鹽者十之八九其可捐以與人散利雖王者之政然使人專利亦非政之善也吳王濞之亂漢實使之使濞不專煮海之利雖欲為亂得乎癸未有舉子上書乞用王安石三經新義為言者所論上曰六經所以經世務者以其言皆天下之公也若以私意妄說豈能經世乎王安石學雖博而多穿鑿以私意不可用秋七月癸丑右諫議大夫羅汝檝言簽書威武軍節度判官㕔公事胡銓文過飾非益唱狂妄之說横議紛紛流布遐邇若不懲艾殆有甚焉者矣伏望陛下重行竄逐以伸邦憲詔銓除名新州編管戊午詔忠訓郎吳援令川陜宣撫司召試策一道保明取㫖與換文資援璘子也璘以初除團練承宣使恩例為之請上許之起居郎權中書舍人張廣持不可上覽奏謂大臣曰武臣換文資恐將帥之才後難得矣樞密使張俊曰試而後換可也上大以為然戊午新潼川府路提㸃刑獄公事宇文剛言湖外米平乞行收糴上諭大臣曰水旱堯湯所不能免惟有以備之則民免流亡之患其即行之八月辛酉朔金國都元帥宗弼以書來求商州及和尚方山原地於是川陜宣撫副使鄭剛中亦言和尚原自紹興四年後便係劉豫管守不係吳玠地分合割還大金從之丙寅皇太后渡淮時上遣后弟韋淵往迓遂扈從以歸簽書樞密院事何鑄提舉江州太平觀御史中丞万俟卨右諫議大夫羅汝檝交章論鑄之罪故有是命丁卯上謂宰執論經術因曰朕每讀書未嘗茍必思聖人所以立言之意秦檜曰孟子云文王我師也周公豈欺我哉上曰聖人以所自得者垂法後世又焉用欺秦檜曰陛下以通經得五帝三王心傳之妙人臣何幸自古不遇治世之主則為人臣誠有難處今陛下以經術出治人臣因以託日月之光傳諸不朽豈非幸㑹上曰讀書不適用則不若愚人愚人猶無過讀書不適用為患更甚檜曰陛下持此心揆天下之事無不灼見底藴矣庚午責授嚮德軍節度副使王庶卒於道州許歸葬其子之荀之奇撫柩而哭曰秦檜秦檜此讎必報親舊皆掩其口曰禍未巳也甲戌御史中丞万俟卨為參知政事充大金報謝使上顧卨曰勉為朕行卨頓首謝上諭大臣曰和議既定内治可興秦檜對曰以陛下聖德漢文帝之治不難致上曰朕素有此志但寡昧不敢望前王檜曰漢文帝文不勝質唐太宗質不勝文陛下兼有之上曰唐太宗不敢望文帝其從諫多出矯偽檜曰文帝能容申屠嘉而太宗終恨魏證其為真偽可見上曰朕謂專以至誠為上太宗英明有餘誠有所未至也檜曰太宗之用智誠不及文帝之性仁也上曰然丙子上諭大臣曰聞大金内侍有用事者今内侍中寄資有犯雖降官然俸物不減何以勸懲今小者有犯可恕即恕不可恕即撻之庶使知懼且云唐末内侍如田令孜輩群唱為亂者良由天子縱之所致朕今在宫中都知押班御藥素號最親密者非時未嘗見見未嘗不正色己卯上謂大臣曰比聞大金中宫頗恣權不歸其主今所須者無非買珠靸鞻之類此朕所不顧而彼皆欲之則侈靡之意可見矣宜令有司悉與以廣其欲彼侈心一開則吾事濟矣時金人又須白面猢孫及鸚鵡孔雀獅子猫兒上亦令捜訪與之上曰敵使萬里逺來其所須如此朕何憂哉辛巳上奉迎皇太后於臨平鎮初后既渡淮上命奉魯國大長公主吳國長公主逆於道至是自至臨平奉迎用黄麾半仗二千四百八十三人普安郡王從上初見后喜極而泣軍衞懽呼聲振天地壬午皇太后還慈寧宫后聰明有逺慮上因夜侍慈寧語久冀以順后意后令上卧且曰聽朝宜早起不然恐妨萬幾上不欲遽離左右后遂示以倦意上不得已恭揖而退太后復坐凝然不語雖解衣登榻交足而坐至三四鼓而後就枕嘗謂上給使者不必分宜通用之葢分則自為彼我其間佞人希㫖必肆間言自古兩宫失懽未有不由此者龜鑑曰太后之未歸也則諭以至誠太后之將歸也則示以喜色臨平奉迎贍慈容而感泣慈寜居飬侍乙夜而忘疲壽慶啓燕稱觴舉儀雍雍乎其和也意有所向竭力供應肅肅乎其敬也當時父老童稚且嘆曰不圗今日聖神母子重懽如此是其孝於事親何如也庚子上服黄袍乘輦詣臨平奉迎梓宫登舟易緦服百官皆如之辛丑徽宗皇帝顯肅皇后及烈節皇后梓宫皆至行在是月朝廷答金國都元帥宗弼書許以陜西地界金人遣知彰化軍節度使事賀景仁來分畫乃割商秦之半存上津豐陽天水三邑及隴西成紀餘地棄和尚方山原以大散為界於闗内得興趙原為控扼之所大事記曰紹興十年金人渝盟軍民皆歸咎於秦檜而檜傲然不動順昌既捷之後先竄趙鼎而人無敢言矣柘臯既捷之後盡罷諸將而兵隷御前矣向者戰敗而求和今則戰勝而求和矣向者戰敗而棄地今則戰勝而棄地矣向者使命之費猶有限今歲幣銀帛各三十五萬匹兩而賀禮又有金器千兩銀器萬兩錦綺千匹矣岳飛復唐鄧張俊吳璘復商秦吳玠復方山和尚原皆間闗百戰而後得今吾不能有其地反盡割入於金聽其分畫矣世忠田金陵岳飛田鄂王之奇田兩淮吳玠田梁洋樊賔宗綱田荆州皆累田經理而後成今吾不能屯田反使金創屯田軍於河南矣吾國之民不肯入金殺之猶不從而朝廷必以與金使遺黎飲泣内恨而中原之人心失矣李世輔不顧其親來歸烏珠畏避其忠勇乃置之謫籍而中原豪傑之心失矣士大夫陷没金中家屬有在中國者洵金人之情而悉還之方其去時如赴幷所而吾國衣冠之氣沮矣張俊深忌劉錡岳飛每言飛赴援遲而錡戰不力遂與檜謀斥錡而殺飛而天下忠憤之氣皆沮矣九月乙未信安郡王孟忠厚為樞密使壬寅大赦天下乙巳尚書左僕射同中書門下平章事兼樞密使秦檜為太師封魏國公是日檜入朝至殿門外上遣幹辦御藥院江諮賜以玉帶使服之而入檜辭上曰梓宫歸葬慈寧就養皆卿之功也此未報百分之一不必辭冬十月乙亥翰林學士兼侍講翊善程克俊僉書樞密院事秦檜之除太師也克俊草其制詞有曰廟算無遺固衆人之所不識征車逺狩惟君子以為必歸檜大喜之丁丑太師尚書左僕射魏國公秦檜進封秦魏國公用蔡京故事也檜辭不拜太傅樞密使廣國公張俊進封益國公壬午太傅醴泉觀使福國公韓世忠進封潭國公太保萬壽觀使雍國公劉光世改封揚國公丁亥詔福建專置提舉茶事官一貟置司建州先是建州歲貢片茶二十餘萬斤葉濃之亂園丁亡散遂罷之以市舶官兼茶事上祀明堂於臨安始命市五萬斤為大禮賞已而都督府請如舊額發赴建康召商人持往淮北既而官給長引許商販渡淮及興㩁場遂取臘茶為㩁茶本尋禁私販官盡㩁之上京之餘許通商官收息三倍及是將鬻建茶於臨安始别置提舉官專一發賣十一月壬辰左朝散郎黄達如言太后回鑾梓宫還闕兹為盛事望宣付史館然後褒功罰罪大明黜陟將前日異論沮謀者明正典刑其力主和議者重加旌賞庶上慰徽宗二后在天之靈少紓太母留滯抑鬱不平之氣詔禮部侍郎兼實錄修撰王賞編修付史館達如建陽人嘗知南雍州以贓罪為提㸃坑冶官韓球所按代還奏事乃上此奏焉癸巳樞密使張俊為鎮洮寧武奉寧軍節度使充醴泉觀使奉朝請封清河郡王初太師秦檜與俊同主和議約盡罷諸將獨以兵權歸俊故俊力助其謀及諸將已罷而俊居位歲餘無請去之意檜乃令殿中侍御史江邈論其罪邈言俊據清河坊以應䜟兆占承天寺以為宅基大男楊存中握兵於行在小男田師中擁兵於上流他日變生禍不可測上曰俊有復辟功無謀反之事皆不可言㑹樞密使孟忠厚竣事還朝而邈又言俊之過俊乃求去位遂有是命左司貟外郎李椿年言經界不正十害一侵耕失稅二推割不行三衙前及坊場户虛供抵當四鄉司走弄稅名五詭名寄産六兵火後稅籍不信爭訟日起七倚闇不實八州縣隠賦多公私俱困九豪猾户自陳稅籍不實十逃田稅偏重故稅不行且言臣聞平江歲入昔七十萬斛有奇今按其籍雖三十九萬餘然實入才二十萬耳詢之土人其餘皆欺隠也望考按覈實自平江始然後之天下則經界正而仁政行矣上謂宰執曰椿年之論頗有條理乃詔專委椿年措置椿年請先徃平江諸縣俟其就緒即往諸州要在均平為民除害更不増稅額從之乙未檢校少保兼領殿前都指揮使職事楊存中為少保國朝故事未有以保傅為管軍者論者惜之己亥詔太學養士權於臨安府學措置増展先是言者屢請復太學以養人才上以戎事未暇至是謂宰執曰太學敎化之原宜復祖宗舊法程克俊曰東晉設學於鼎沸之中今兵息矣興學正其時也秦檜曰久有此議今當舉行之乃命禮部討論取㫖辛丑言者論陛下斥逺姦邪與腹心之臣一德以定大計大功巍巍超冠古昔臣愚慮前日不得志之徒未即丕變作為不靖有害治功伏望屏置逺方終身不齒詔榜朝堂知鎮江府劉子羽提舉江州太平觀以右諫議大夫羅汝檝論其專任私意變亂是非也先是子羽言和好本非久逺計宜及閒暇時修城壘厲器械備舟檝以俟時變秦檜始以復職非己出已不恱至是益怒諷汝檝論其罪遂罷歸和衆輔國功臣太保護國鎮安保靜軍節度使充萬壽觀使楊國公劉光世薨於行在年五十四詔贈太師光世蚤貴其為大將御軍姑息無克復志論者以此咎之丙午詔責授清逺軍節度副使趙鼎責授嚮德軍節度副使王庶今赦更不檢舉寶文閣待制曽開徽猷閣直學士李彌遜並落職權中書舍人程敦厚草制曰方同惡而相濟肯信君子以為必歸逮寧親而解憂是宜國人皆曰可殺時庶已死而秦檜未知也徽猷閣待制致仕尹焞卒於紹興府年七十二上知其貧特賜錢三百緡庚戌樞密使信安郡王孟忠厚罷判福州左承事郎張戒特勒停十二月辛酉童子張岩叟九歲其弟岩卿七歲能誦書詔並免文解一次仍以束帛賜之庚午禮部乞太學養士權以三百人為額上曰太學師儒之官雖選經術當先德行要使士子化之以厚風俗又曰朕以天下財賦養天下士大夫以天下公器處天下士大夫要使人人盡心職業朕何愛爵祿哉丙子主管台州崇道觀熊彦詩知永州彦詩坐趙鼎客閒廢累年及是秦檜除太師彦詩以啓賀之有曰大風動地不移存趙之心白刃在前獨奮安劉之略檜喜繇是稍復錄用庚辰髙閌守國子司業闗注為太學正始除學官也上覽除目曰朕無一所好惟閱書作字自然無倦尚書史記孟子俱寫畢尚書寫兩過左傳亦節一本癸未以太師秦檜生辰錫宴於其第自是歲為例初陜西連歲不雨至是涇渭灞滻皆竭五穀焦槁秦民無以食爭西入蜀川陜宣撫使鄭剛中以誓書所禁不敢納皆散去餓死其壯者北人多買為奴婢郡邑蕩然矣宋史全文卷二十一上欽定四庫全書宋史全文卷二十一中宋髙宗十四癸亥紹興十三年春正月癸巳醴泉觀使韓世忠請以其私産及上所賜田紐計從來未輸之稅併歸之官從之仍賜詔奬諭庚子遣太師秦檜册加徽宗諡曰體神合道駿烈遜功聖文仁德憲慈顯孝皇帝辛丑立春節學士院始進帖子詞百官賜春幡勝自建炎以來久廢至是始復之癸卯詔以錢塘縣西岳飛宅為國子監太學舊太學七十七齋今為齋十有二曰禔身伏膺守約習是允蹈存心持正養志誠意率履循理時中丁未安吉縣布衣談庚言本邑去秋有圎瓜並蔕合而為一此實皇帝孝治天下故見祥瑞以昭天意詔勿受自今有似此投獻者皆却之己酉上謂宰執曰朕不畏多事事若多必入思慮大抵無事則怠忽易生不可不戒詔大理寺丞袁柟燕仰之往靜江府推劾提舉江州太平觀胡舜陟不法事以聞先是舜陟帥廣西因奉詔討郴賊駱科餘黨以饋餉不繼與轉運副使吕源有隙源即奏舜陟因生日受知邕州俞儋百金又盜官馬八百餘匹贓汚僭擬傲慢不恭又以書抵秦檜言舜陟非笑朝政檜素惡舜陟入其說遂奏遣柟等雜治戊午右迪功郎畢良史獻春秋正辭二十卷遂特改京官趙性之曰良史初補文學既得三京地東京留守司俾權知東明縣良史乃搜求京城亂後遺棄古器書畫金人敗盟良史乃敎學講春秋及復得還歸乃盡載所有骨董而至行在上大喜於是以解春秋改京秩自此人號良史為畢骨董二月乙丑殿中侍御史李文㑹入對文㑹以朝廷方守和議不言兵乃奏仁義之說曰陛下至孝格天文德來逺慈寧以寧親永固以寧神偃兵息民天下大安則其仁固大矣曩者金人犯闕陛下毅然請行志存社稷及登大寶力圖恢復任賢去邪㫁自宸衷而宗社再安則其義固大矣臣以是知陛下足以大有為願慎守此道而力行之太平之基實在於此後五日上謂秦檜曰文㑹力陳仁義甚善朕令錄一本置之几案欲常觀鑒丙寅上曰為君不知春秋昧為君之道為臣不知春秋昧為臣之道此書褒貶甚嚴真萬世之法上又曰為政之要在辨忠邪此治亂所由分也秦檜曰書生喜論王霸臣謂推誠任德是為儒學施於有政是為王道挾術任數是為雜學施於有政是為霸道上以為然太傅醴泉觀使潭國公韓世忠進封咸安郡王張俊勲譽在世忠左特以主和議故為秦檜所厚顧先得王至是世忠願輸積年租賦於官乃有是命己巳上謂大臣曰古人琴制不同朕今出意作盾樣以示不忘武備之意乙亥蠲雷化髙融宜亷邕欽賀貴十州免行錢用去年七月詔㫖也乙卯國子司業髙閌言太學者敎化之本而最所當先者經術是也自漢以來多置博士而後世所得詩賦論策皆經術之餘耳太學舊法每旬有課月一周之每月有試季一周之亦皆以經義為主而兼習論策為三場苟加一場則旬課季攷之法遂不可行臣今參合條具太學課試及課舉三場事件第一場大經義三道論語孟子義各一道第二場欲以詩賦第三場以子史論一首并時務策一道永為定式閌又言今比歲郡國雖有學而與選舉不相闗今參取祖宗舊制通以當今之宜補太學生以諸路住本貫學滿一年三試中選不曽犯第三等以上罰或雖不住學而曽經發解委有士行之人敎授保委申州給公據赴國子監補試諸路舉人以住本貫學半年或雖不住學而兩預釋奠及齒於鄉飲酒禮者本學次第委保敎授審實州縣取應仍自紹興十四年為始皆從之龜鑑曰或者乃曰敵勢如焚國勢如綫彌文縟典何暇蒐舉得無蹈宣靖之覆轍乎愚應之曰不然科舉固所以沮天下豪傑之氣亦所以收天下豪傑之心當是之時茍無科舉以取之學校以養之則士之不知愛重者不入於敵則入於盜矣張九成之策李時雨之書何由而來哉辛巳秘書著作郎王揚英周執羔並為尚書吏部貟外郎先是日歴所修書目建炎元年至去年成五百九十卷秘書少監秦熺因與揚英等書皇太后回鑾本末上之壬午詔熺揚英執羔各進官一等自秦檜再相取其罷相以來一時詔㫖與夫斥逐其門人章疏或奏對之語稍及於己者悉皆更易焚棄由是日歴時政記亾失極多不復可以稽攷逮其擅政以來凡所記錄莫非其黨奸佞之詞不足以傳信天下後世矣真州州學敎授楊邦弼左迪功郎陳鵬飛並為太學博士初除博士貟也詔令臨安府景靈宫創於新莊橋之西以劉光世賜第為之築三殿聖祖居前宣祖至徽宗居中昭憲而下二十一后居後大事記曰秦檜始則倡和議以誤國中則挾虜勢以要君終則飾虛文以為中興使一世酣豢於利欲之中奉賊稱臣而不以為恥忘讎事虜而不以為怪用夏變夷而不以為非其弊可勝言哉國家靖康之禍乃二晉之所未有中國衣冠禮樂之地宗廟陵寢郊社之所盡棄之虜禮器樂器犧牲彞鼎駕輅服冕鹵簿儀仗之物盡入於虜渡江以來庶事草創皆至檜而後定然耕籍朝覲祀明堂養老更武王克商後事也辟雍靈臺明堂籍田光武平隴蜀後事也今果偃武修文時耶果息馬論道時耶宫室雖備而忘前日巡幸之懼矣郊廟雖具而忘前日宵旰之憂矣朝儀雖肅而忘前日扈從之勞矣文物雖新而忘前日根括之慘矣趙霈告髙宗曰願陛下毋忘親征時王庶謂秦檜曰公不思東都抗節存趙時而忘此虜乎洪皓曰錢塘暫居而太廟景靈宮皆極土木之華豈非示無中原意乎三月辛卯詔宴殿陳設止用緋黄二色勿以文繡上以祖宗朝殿帷但用純綵後來寢多文繡故屏去之也國子司業髙閌請在學人依徽宗御筆復立三年歸省之限以彰孝治上曰舊有九年之法至徽廟方改作三年豈有士人九年而不省其親者乎其從之乙未詔文宣王廟門立㦸二十四乙巳詔臨安府建太社太稷丙午詔臨安府同殿前司修築圜丘於龍華寺之西辛亥湖州言自廢廣德湖田歲失官租三千餘斛請復以為田從之夏四月壬戌知嚴州淳化縣孔括為右宣義郎先是浙西提㸃刑獄公事王鈇言括治狀輔臣進呈上曰可與轉一官令再任任滿使與陛擢縣令最親民而貟最多難於一一選擇但有治狀者進用之有過惡者黜責之使知所勸懲則人自勵而不害吾民矣癸亥詔禮部以鄉飲酒儀制鏤板遍行郡國庚辰兩浙轉運副使張叔獻等乞依元祐古迹於華亭置閘以捍鹹潮上曰今邊事息當於民事為急民事當以農為先朕觀漢文帝詔書多為農而下以農者天下之本置閘其利久逺不可憚一時之勞也乃令叔獻措置殿中侍御史李文㑹論寄居士大夫干擾州縣又監司郡守類皆親故莫敢誰何望嚴加戒約儻或不悛令監司郡守密具姓名聞奏重寘典憲不以赦原從之時士大夫與秦檜異論者多奉祠里居或僑寄他郡自是以次被罪矣丁亥國子司業髙閌言舉人春秋欲依舊制止以正經出題從之先是有㫖許於三傳解處出題閌謂如此則是三家者與六經並行以春秋之法繩之三家者當被僭聖作經之罪乃下禮部如所請是日蒙國復叛金主亶命將討之閏四月戊子朔上曰祖宗時殿宇皆用赤土刷染飾以桐油葢以國家上火德故也所以只用赤土桐油者敝則更以更修後來多用朱紅漆不惟所費不貲且難以修整檜等曰此有以見陛下追述祖宗之儉德也己丑立貴妃吳氏為皇后丁酉提㸃江淮荆浙福建廣南路坑冶鑄錢韓球請籍坑場户姓名約定賣納銅數許之時郡邑或毁錢為銅以應其命民大以為擾其後歲收銅二十萬斤鐵二十八萬斤鉛十九萬斤錫二萬斤皆不登租額戊戌殿中侍御史李文㑹論前知閩縣李汝明贓汚上謂大臣曰縣令最衆安得人人而知之若一一待臺諫論列何用監司今後贓汚人為臺諫所論而監司失按發者量與降官庶知所懲行之數年贓吏自然少矣時本路提轉黄積厚陳桷質允中余應求已代去皆貶秩焉己亥詔紹興府守臣即直秘閣陸寘家錄所藏書以實三館壬寅詔人户應管田産雖有契書而今來不上砧基簿者並拘没入官用兩浙轉運副使措置經界李椿年請也時椿年行經界法量田不實者罪至徒流江山尉汪大猷覆視龍游縣白椿年曰法峻民未喻固有田少而供多者願許首復改正又謂每保各圖頃畝林塘十保合一大圖用紙二百番安所展視椿年聽其言輕刑省費甚衆甲寅上諭大臣曰昨日上殿楊大任其人昏老難當郡寄可處以宫祠似此等人作郡臺諫欲論又無顯過但千里之民陰被其害今後郡守卿等宜審擇之乙卯參知政事王次翁提舉臨安府洞霄宫五月詔奉議郎張九成作與宫觀今令南安軍居住九成既免喪秦檜取㫖上曰可與宫觀此人最是交結趙鼎之甚者自古朋黨惟畏人主知之此人獨無所畏檜曰陛下知人之明如此誠帝王之大德也既而右司諫詹大方言頃者鼓唱浮言九成實為之首徑山僧宗果從而和之今宗果已逺竄為之首者豈可置而不問望罷九成宫觀投之逺方以為傾邪者之戒故有是命乙丑川陜宣撫副使鄭剛中節制諸將極其尊嚴三都統每入謁必先庭揖然後就坐及右護軍都統制吳璘陞檢校少師來謝語主閽吏乞講鈞敵之禮剛中曰少師雖尊猶都統制耳儻變常禮是廢軍容璘皇恐聽命丁卯右迪功郎何補獻中興龜鑑十卷詔遷一官辛未詔左從事郎鄭厚自今不得差充試官及堂除厚嘗著書號藝圃折衷其言有詆孟軻者駕部貟外郎王言恭言於朝詔建州毁板其已傳播者皆焚之壬申詔國子監置博士正錄各一貟學生權以八十人為額丁丑天申節宰臣率百官上壽京官任寺監簿已上及行在陞朝官並赴始用樂近臣進金酒器銀香合馬郡縣錫宴如承平時壬午上諭大臣曰太后未與皇后相識今此一見便相喜如太后飲食衣服皆皇后親自供承太后未嘗有所需求每云飲食衣服只取飽煖不欲以細故擾思慮自太后歸朕於宫中事更不費力遂得專意外治六月戊子倉部貟外郎王循友言國家平昔漕發江淮荆浙六路之粟六百二十餘萬和糴之數又在其外而近歲上供之數纔二百八十餘萬除淮南湖北凋殘最甚蠲放之外兩浙號為膏腴沃衍粒米充羨初無不耕之土而較之舊額亦虧五十萬石此葢稅籍欺隠豪強巨室詭名挾户多端以害之也比者兩浙漕臣建議欲正經界朝廷從而行之若使盡究隠田庶幾供輸可足舊額欲望訓敕諸路漕臣各令根檢稅籍之失上謂輔臣曰所論可行葢農桑衣食之本然須有所勸懲勿為文具壬辰殿中侍御史李文㑹論簽書江陰軍判官㕔公事蔡楶不法勒停上曰不按發監司須當行遣天下事必待臺諫論列臺諫豈能盡知之監司乃朝廷耳目豈可坐視不舉於是提轉王鈇李椿年張叔獻皆坐降官癸巳壽星院乞撥放度牒上曰朕觀昔人有惡釋氏者即非毁其敎有好釋氏者即崇尚其徒二者皆不得中朕於釋氏但不使其太盛耳言者皆欲多鬻度牒以資國用朕謂不然一度牒所得不過一二百千而一夫不耕其所失豈止一度牒之利若住撥十數年其徒當自少矣戊戌輔臣准呈鈞容直乞推賞上曰樂人無出官法可與支賜及轉資昔有敎坊官求為郡者太祖以唐莊宗為監不與之止令於樂部遷轉此祖宗之良法也吏部貟外郎周執羔轉對乞戒諸路監司檢視簿書無主簿書押者又乞廣行捜訪徽宗御製皆從之辛丑温州進士蔡大中上書獻太平十慎論詔與永免文解壬寅簽書樞密院事程克俊提舉臨安府洞霄宫甲辰全州文學師維藩權國子監國子司業髙閌等言維藩博通古今士人推服建學之初宜得老成誘掖後進輔臣進呈上曰師儒之任尤當遴選須心術正者為之將以經㫖諭後進一有邪說學者從而化之為害不小庚戌金人遣通問使洪皓張邵朱弁還行在中興奉使幾三十人生還者三人而已癸丑上謂輔臣曰近觀諸郡所奏便民五事固有法已該載亦有一方之便朝廷未知者宜委都司看詳其便民者即與於行無事虚文也是月提舉江州太平觀胡舜陟死於靜江獄初大理寺丞燕仰之袁柟至靜江遂以舜陟屬吏居兩旬辭不服而死舜陟再守靜江有惠愛邦人聞其死皆為之哭丐者亦斂數十千致祭既而舜陟妻汪氏訴於朝詔左朝奉郎通判德慶府洪元英究實元英言舜陟受金事涉瞹昧其得人心雖古循吏無以過上謂秦檜曰舜陟從官兼罪不至死勘官不可不懲於是仰之柟皆送吏部秋七月戊午上謂大臣曰昨訪遺書今猶未有至者朕觀本朝承五代之後文籍散逸太宗留意於此又得孟昶李煜兩處所儲益之一時始備南渡以來御府舊藏皆失宜下諸州捜訪其獻書者或寵以官或酬以帛葢敎化之本莫先於此也己未復置國子監書庫官一貟甲子詔求遺書丙寅上謂秦檜曰朕嘗與卿言候國用足日蠲賦以寛民力若一槩除之又恐用或不足浙西駐蹕之久民供不易臨安尤甚本路三等下户與蠲一料庶貧民被實賜也壬申詔兩浙民户丁鹽錢多欠負者其除之上曰民間所以不舉子者正以是也朝廷法禁非不嚴終不能絶其本乃在於此是日雨雹初命國子司業髙閌等補試生貟四方來者甚衆丙子有司上合格三百人以徐驟為首癸未奉安至聖文宣王於國子監大成殿命太師秦檜行禮時監學初成上自題賜書閣榜曰首善八月丙戌遣權吏部侍郎江邈奉迎景靈宫萬壽觀祖宗神御於温州自海道至行在丁亥有司言將來郊禮合用珠子坐褥上曰事天以誠為主如器用陶匏之類貴其質也若惟事華麗恐非事天之本意乙未國子司業崇政殿說書髙閌乞率諸生上表請車駕臨幸太學上曰太宗幸學嘗令學官講經及各有恩例其令有司檢故事來上既而閌侍經筵講畢奏曰國學落成臣奉詔試補諸生幾六千人自中興以來雖三年省闈亦未有如此之盛上曰乍脫干戈人皆向學此誠可喜閌曰臣待罪學官見此美事諸生以謂陛下方偃武修文與太祖初定天下之時同符宜舉建隆故事願陛下講臨雍之禮言未畢上曰已令討論矣戊戌徽猷閣待制洪皓至自金國上即日引見内殿諭皓曰卿志不忘君雖蘇武不能過賜内庫金幣鞍馬黄金三百兩帛五百匹象齒香綿酒茗甚衆翊日見於慈寧殿帟人設簾后曰吾故識尚書矣命撤之皓退見秦檜語連日不止曰張和公敵所憚乃不得用錢塘暫居而景靈宫太廟皆極土木之華豈非示無中原意檜不恱謂其子祕書省正字适曰尊公信有忠節得上眷但官職如讀書速則易終而無味須要知黄鍾大吕乃可壬寅左朝散大夫宋宙知興州還入見乞諸路州學已嘗治者並置敎授貟又請罷諸縣武令上曰學官須逐州置昨已降㫖宜擇通經心術正者為之武官安能治民然亦難頓罷第令宣撫司以漸易置可矣丁未湖南安撫司參議官王銍獻太𤣥經解義賜白金三百兩己酉上與宰執論糴買事因曰今漕司各管一路有無不能相通宜倣舊來發運置都轉運使一貟通管諸路米賤處糴米貴處糶如此則有濟公私皆利可於從官中選通曉錢穀者付之秦檜言劉晏罷權萬貨低昂使天下無甚貴賤而物常平上曰漢唐以來所可稱者晏一人而已自來人多恥言財利不知國家之所急孟子言無政事則財用不足此豈小事也庚戌詔諸路監司守臣講究寛恤民力事件壬子初錢塘江有石隄以捍水故無水患歲久隄且圮乃置捍江兵二千人專令采石修隄人以為便九月甲子權直學士院洪皓出知饒州時金人來取趙彬軰二十人家屬詔歸之皓曰昔韓起謁環於鄭鄭小國也能引誼不與敵既限淮官屬皆吳人留不遣葢慮知其虛實也彼方困於蒙古姑恃強以嘗中國若遽從之彼將謂秦無人而輕我矣若恐以不與之故致渝盟宜謂之曰俟淵聖皇帝及皇族歸乃遣秦檜大怒皓又言王倫軰以身徇國棄之不取緩急何以使人初檜在完顔昌軍中昌攻楚州久不下欲檜草檄諭降有室燃者在軍知狀皓與檜語及金事因曰憶室燃否别時託寄聲檜色變而罷翌日侍御史李文㑹即奏皓貪變顯烈不求省毋若久在朝必生事端望與外任檜進呈因及宇文虛中事上曰人臣之事君不可有二心為人臣而有二心在春秋之法皆所不赦乃命出皓尚書吏部侍郎魏良臣户部侍郎沈昭逺並罷良臣與秦檜里舊一日言於檜曰昨日不寐偶思得一事昨晚郊祀如遷客之久在遐方者可因赦内徙以召和氣檜曰足下今為何官良臣曰備貟吏部侍郎檜曰且管銓曹職事不須胡思亂量侍御史李文㑹即奏良臣卑凡昭逺朋附乃以良臣知池州昭逺知袁州丁卯左司諫詹大方論張卲奉使辱命乃以卲主管台州崇道觀已而卲又遺秦檜書言金有歸淵聖及宗室諸王意勸其遣使迎請於是檜浸怒之戊辰上謂大臣曰諸處有癃老廢疾之人依臨安例令官司養濟窮民無吿王政之所先也壬申尚書右司郎中梁弁稱疾乞奉祠上曰士大夫有操守安分而以疾乞去者甚可惜不比奔競之人朕嘗觀寶訓太宗朝士人有奔競躁進者必痛抑之抑奔競則亷恥之道興乃除直龍圖閣主管洪州玉隆觀癸酉左朝奉郎知建昌軍李長民言宣和以前應知通令佐階銜並帶主管學事自軍興以來學校之敎中輟今和議既成儒風復振謂宜依舊結銜以示聖朝偃武修文之意從之丁丑詔知成都府張燾依所乞提舉江州太平觀初燾開府適當歲旱大發積粟以振飢民撫存黎雅蕃部禁戢貪吏開修渠堰蠲落江田稅決遣獄訟修文翁舊學時與諸生講論經㫖政無不舉蜀人大恱冬十月己丑太師尚書左僕射提舉詳定一司敕令秦檜等上國子監太學武學律學小學敕令格式二十五卷戊戌詔川陜諸州秋試舉人並用六月前鎖院先是成都府路安撫使張燾乞春月發解庶使得解舉人可赴行在省試禮部言自來發解年係三月降詔故改用夏季焉己亥上諭大臣曰自今宗子許於所在入學令與寒士同處第别作齋仍選士人為長諭庶盡變積習文行皆可取也十一月庚申日南至合祀天地於圜丘太祖太宗並配龜鑑曰過宗廟則必有敬心見墟墓則必有哀心桐宫為自怨自艾之地郊祀見基命宥密之意今景靈之輪奐一新圜丘之規制一定風景雖殊山河頓異固不能不起秋風黍離春日蒲栁之嘆然天子建國宗廟為先祭祀之典天地為重鳴條之師正可告於皇天孟津之舉亦嘗類於上帝則郊祀之舉亦未害也丁卯秦檜奏前日蒙付出御書尚書來日欲宣示侍從官不惟觀陛下書法之妙又令知陛下聖學不倦如此上曰朕之性與人異無事惟靜坐觀書所得甚多又曰朕觀古之人君有嗜殺人者葢不能養性故多恣暴大率知足更無事貴為天子誰能制之若不知足更為侈靡未有不亂如唐明皇是也時上所寫六經與論語孟子之書皆畢檜因請刋石於國子監仍頒墨本賜諸路州學詔可己巳福建轉運司進錦樣上諭輔臣曰儻可備禮物之用亦無庸逺取第須令官給其直毋使及民恐閩中又生此一擾也戊寅上因說及梁師成蘇軾文字首尾都記得此人雖是内侍却讀書只是不合干預朝廷如薦引士大夫皆非所當為内侍引用人才最害政之大者此等人便當重寘於刑歴觀諸古内侍薦引人才未有不至於亂者十二月癸未朔日有食之詔避殿減膳是日隂雲不見太師秦檜率百官上表稱賀自是率如之逮檜薨乃止庚寅太師秦檜以瑞雪應時率百官詣文德殿拜表稱賀自是歲如之迄今不改辛卯詔民間所鑄當二毛錢悉毁之違者抵罪自不及百錢已上並許告賞癸巳詔試中監學生依嘉祐故事給綾紙用新知永州熊彦詩請也彦詩言主上登用真儒載興太學監貼之制似可復行秦檜進呈上曰學校者人才所自出人才須素養太宗皇帝置三館養天下士至仁廟朝人才軰出為朝廷用檜曰國朝崇儒重道變故以來士人雖陷金者往往能守節義乃敎育之效也上曰然三代之季學校不修故當時士人多無名節今日若不興崇學校將來安得人才可用耶祕書丞嚴抑言本省藏祖宗國史歴代圖籍舊有右文殿祕閣石渠及三館四庫自度江後權寓法慧寺與居民相接深慮風火不虞欲望重建仰副右文之意於是建省於天井巷之東以故殿前司基為之上自書右文殿祕閣二榜命將作監米友仁書道山堂榜且令有司即直祕閣陸宰家錄所藏書來上是日賜喜雪御筵於尚書省初復故事也癸卯有司進呈賜北使弓矢上以其不精工命出内庫所造者賜之翌日諭大臣曰此朕自指敎雖軍中人亦未必能之賜予使人不惟觀美兼器械之良亦可使逺人知所畏服乙巳太師秦檜辭生日賜宴詔曰以不世之英值難逢之㑹其始生之日可不為天下慶乎宜服異恩無守沖節檜每生日四方獻壽者金玉為不足至於捜盡世間之希奇以為有錫資踵至賜敎方樂佐酒一日伶人作雜劇之戲熺笑言微髙檜目之不語少頃檜起更衣而不出其夫人王氏使人候之乃在一室中黙坐論者謂檜歎其子不足以相副也嗚呼深哉史臣曰子之賢不肖皆天也雖然亦前人積累之報如洪皓忠義則二子皆中詞科秦檜平生所為既不忠於事君又以殘忍而害賢士大夫其報可知矣猶且歎其子熺不足以相副至於當宴而罷權黙坐以懷怨是亦不能反思之甚也積善之家必有餘慶易經之訓明甚以不善之積而責其餘慶之應誠恐餘殃踵至矣何慶之有哉為人父者盍思夫己酉大金賀正旦使完顔曄馬諤見於紫宸殿上謂秦檜曰今次使人來大體皆正其他小節不足較觀金人之意和議必須堅久非卿學識過人堅主和議安得如此初申嚴淮海銅錢出界之禁而閩廣諸郡多不舉行於是泉州商人夜以小舟載銅錢十餘萬緡入洋舟重風急遂沈於海官司知而不敢問闗外初行營田甲子紹興十四年春正月丁卯提舉江州太平觀黄龜年落職令本貫福州居住龜年為御史嘗論秦檜之罪故也丁丑詔四川路内藏錢帛並易輕齎赴行在惟絹以本色戊寅内出鎮圭付國子監以奉文宣王二月癸未宰執奏㩁貨務茶鹽推賞事上因論祖宗茶鹽之法納粟於邊請鈔於京公私皆便不惟邊面可實而又免轉輸之勞朕嘗思祖宗立法無不善者豈可輕議變易上又曰朕因前日敵使須要射以謂武備不可一日弛深慮邊事寧息諸軍稍怠朕見造金銀椀將因暇日親閱用此旌賞以勸激之潼川府路轉運判官楊椿改本路提㸃刑獄公事時諸路漕臣多獻羨餘獨椿無所獻常曰今瘡痍未瘳愧不能裕民力其肯掊尅以資進身耶戊子國子司業髙閌等率諸生上表請視學手詔宜允己丑福建安撫使葉夢得乞將見拘留海船與不係籍船户輪流差使上曰不惟海船一事民間積欠亦可放因言朕頃在山東河北備見民間利病如官司錮吏下鄉催科此適足資其為奸耳乃詔江浙等路紹興八年以前拖欠並與蠲之辛卯復置敎坊凡樂工四百十有六人以内侍充甲午上諭大臣曰昨嘗降㫖諸軍揀汰人數令便招填可嚴切行下不然闇損軍額不可不慮恐緩急誤事時皇太后築外第有遷徙居民處上命臨安倍支般挈之費仍對撥官屋居之毋令失所丙申上謂大臣曰近見鄭剛中奏減民間科須數目不少朕聞之頗喜自是四川之民當少蘇矣丙午參知政事万俟卨提舉江州太平觀先是卨使金還太師秦檜假金人譽已數十言囑卨奏於上卨不可他日奏事退檜坐殿廬中批上㫖輙除所厚官吏鈐紙尾進卨拱手曰偶不聞聖語却不視檜大怒自是不交一語御史中丞李文㑹右諫議大夫詹大方聞之即奏卨黷貨營私窺探國是卨再章求去上命以資政殿學士出守及入謝上問勞甚悉檜愈怒給事中楊愿因封還錄黄乃有是命同知大宗正事士䅳請宗學生以百貟為額大學生五十小學生四十職事人各五人從之己酉新知紹興府樓炤過闕入見即日除簽書樞密院事兼權參知政事三月壬子朔上謂大臣曰聞臨安府官地民間見佃者近日頗為豪強所奪至毁其屋宇此事在民利害甚大宜令禁止仍舊給與小民癸丑秦檜等奏選除武岡軍守臣上曰猺人當安不可擾煙瘴之地遣兵討伐視他處尤難不可不慎乙卯輔臣進呈諸路未發上供錢糧數上曰江浙京湖積年拖欠皆虚數紹興十年以前除形勢及第二等以上户外悉蠲除之乃出榜曉示官吏故違許之越訴於朝庚申户部尚書張澄乞諸路坑治委的有名無實去處令憲漕司别立酌中課額仍覺察無令有力之家計囑幸免致下户受弊上曰寧於國計有損不可有害於民若富藏於民猶國外府不然民貧為盜常賦且將失之此有若所謂百姓足君孰與不足者也己巳上幸太學祇謁先聖止輦於大成殿門外步趨升降退御敦化堂命禮部侍郎秦熺執經國子司業髙閌講易泰卦權侍郎正刺史已上並與坐講畢賜諸生席於廡下啜茶而退遂幸養正持志二齋觀諸生肄業之所賜閌三品服熺與學官皆遷官諸生授官免解賜帛如故事壬寅太師秦檜言陛下文德誕敷干戈載戢乃者祇謁先聖遂幸太學躬行之化乃在斯舉臣不勝慶幸乞宣付史館仍許拜表稱賀上曰非卿力主和戎之議兵革休息則學校何由興所請宜依故事國子司業髙閌權尚書禮部侍郎徽猷閣直學士胡寅聞之移書責閌曰太學者明人倫之所在也閣下召自閑廢有成均之命竊自計曰今天下方無三綱斯人之所以來乎及見請幸太學之表寅心惕然不意閣下有斯請而有斯言也昔秦楚敵國懐王不還楚人憐之如悲親戚葢忿秦之以強力奸詐加於其君使不得其死其慘勝於加之刃也太上皇帝我中原受命之主受制金人生往死歸此臣子痛心切骨坐薪嘗膽宜思所以必報者也而柄臣者乃敢欺天罔人以大讎為大恩乎昔宋公為楚所執楚子釋之孔子筆削春秋乃曰諸侯盟於薄釋宋公不許四裔之人得制中國之命也大母天下之母其縱釋乃在敵國之君此中華大辱臣子所不忍言者也而柄臣者乃敢欺天罔人以大辱為大恩乎大宋基業封疆皆太祖太宗收用英俊勤恤民隠躬擐甲胄與天下大夫勞苦以得之又累聖嚴恭寅畏不敢荒寧而守之者也今闗河重地悉為彼疆園陵暴露不得瞻守宗族拘隔不得相見土地分裂人民困苦不得鳩集寃恨之氣外薄四海不得伸雪而柄臣者方且施施然厚誣天下自以為有大功乎閣下受其知遇何不勤勤懇懇而為之言乎言而或聽天下國家實幸也晉朝廢太后董養游太學升堂嘆曰天人之理既滅大亂將作矣則逺引而去今閣下日覩忘讎逆理北面事敵以茍晏安之事猶偃然為天下師儒之首既不能建大論明天人之理以正君心乃阿䛕柄臣希合風㫖求舉太平文具之典又為之詞曰云云欺天罔人孰甚焉是黨其惡也人皆謂閣下平生志業掃地盡矣數十年積之而一朝毁之乎春秋之義誅國賊者必先誅其黨歴觀往古人君以無道行者猶不能終况人臣而敢肆然以無道行之乎一旦明天子監亂亡之禍赫然震怒以咎任事者嗚呼危哉豈不與董養異哉閣下不及今翻然改圖則必與之俱矣御史中丞李文㑹言提舉江州太平觀解潛本趙鼎之客不附和議詔責濠州團練副使南安軍安置癸酉秦檜進呈講筵闕官因言陛下聖學日躋實難其人上曰朕學問豈敢望士大夫但性好讀書檜曰士人讀書固多但少適用若不適用或託以為姦則不若不讀之為愈上又曰王安石程頤之學各有所長學者當取其所長不執於一偏乃為善學乙亥上出文宣王贊刻石賜學官髙閌言陛下贊文形容先聖盛德無愧於古上曰唐明皇作贊文乃斥先聖先師之名非尊儒重道之意閌曰此尤見聖學髙出前代帝王之上其後上又悉贊七十二子戊寅新湖南安撫司參議官王銍獻祖宗八朝聖學通紀論詔遷一官己卯新利州路提㸃刑獄公事李志行乞戒飭諸路帥臣監司將前後所承寛恤民力及恤刑詔書恪意奉行違者重寘典憲上曰一事皆切中時病方今兵革既息惟寛恤民力欽慎庶獄是為急務可令有司申嚴立法行下夏四月庚辰詔諸州軍應有刻板書籍並用黄紙印一秩送祕書省甲申詔刑部將半年以上未結絶公事行在委本部外路委監司責限結絶内日月稍逺者取問因依申奏以都省言四方多滯獄也丙戌命太師秦檜提舉製造渾儀詔有司求蘇頌遺法來上上謂檜曰宫中已製成小範可以窺測日以晷度夜以樞星為則葢樞星中星也非久降出用以為式但廣其尺寸爾將作監蘇籀面對乞取近世儒臣所著經說集而成編以補唐之正義遺闕上諭秦檜曰此論甚當若取其說之善者頒諸學官使學者有所宗一則師王安石程頤之說者不至紛紜矣丁亥知䖍州薛弼言江東鎮民居木柱内有天下太平年五字適符上元甲子之歲此殆天啓其祥非人力所能為詔侍從同觀仍送史館五月丙辰饒州言右迪功郎姜樓等獻錢十萬緡以助國用上曰國用有常自不至闕不然雖多亦有不足之患其還之詔四川宣撫司募兵赴行在先是右護軍都統制吳璘言西邊可募衞兵上諭輔臣曰諸軍招填闕額類是南人恐西北寖損數年之後始見其弊兼諸路軍器物料近多不到方閑暇時尤宜整治甲子簽書樞密院事兼權參知政事樓炤罷乙丑御史中丞兼侍讀李文㑹言權尚書禮部侍郎髙閌權工部侍郎王師心起居舍人吳秉信此三人者若久在朝必害至治詔以閌知筠州師心知袁州秉信知江州先是上在經筵嘗謂閌曰向來張九成嘗問朕左氏傳載一事或千餘言春秋只一句書之此何也朕答之云聖言有造化所以寓無窮之意若無造化即容易知乃常人言耳閌曰說春秋者雖多終不能發明正如窺造化也上曰九成所問極是閌曰陛下所答亦極是上因問九成安否翌日謂秦檜曰張九成今在何處檜曰九成頃以唱異惑衆為臺臣所論既與郡乃乞祠觀其意終不為陛下用上曰九成清貧不可無祿檜疑閌薦之呼給事中楊愿詢其事文㑹即劾閌是日拜文㑹簽書樞密院事兼權參知政事自是執政免即以言者代之戊辰尚書吏部貟外郎黄達如降一官放罷坐前知南雍州日私役禁軍販易物貨故也達如為提㸃坑冶司所案贓汚鉅萬獄既上雖秦檜亦不能掩僅止罷黜人亦快之甲戌初兩浙轉運副使李椿年置經界局於平江府守臣周葵問之曰公今欲均稅耶或遂増稅也椿年曰何敢増稅葵曰茍不欲増胡為言本州七十萬斛椿年曰若然當用圖經三十萬數為准時秦檜怒葵不已椿年因奏葵在郡錫宴北使飲食臭腐致行人有詞葵坐落職主管台州崇道觀自是投閑十一年丁丑王之望行太學錄之望初舉進士考官孫道夫異其文知貢舉朱震持以示人曰此小東坡也六月辛巳朔右朝奉郎曽惇知台州惇嘗獻秦檜詩稱為聖相故以郡守處之自檜擅權凡投書啓者以臯䕫稷卨為不足比擬必曰元聖或曰聖相甲申詔江浙等路州縣酒稅欠折坊場廢壞綱運沈失倉庫漏底委非侵盜者皆蠲之乙未上謂大臣曰浙東福建被水災處可令監司躬任悉力賑濟務使實惠及民毋為文具時江浙福建同日大水建州水冒城而入俄頃深數丈公私廬舍盡壞溺死數千人嚴州水暴至城不没者數板通判州事洪光祖集舟以援民且區處山阜給之薪粥卒無溺者衢信處婺等州民之死者甚衆丙申華州觀察使提舉佑神觀白鍔特刺面配萬安軍時閩浙大水鍔乃自北方從太后歸者宣言燮理乖繆洪皓名聞華夷頋不用太師秦檜聞之奏繫鍔大理寺鍔館客張伯麟嘗題太學壁曰夫差爾忘越王之殺而父乎伯麟亦下獄獄具鍔坐出言指斥乃有是命伯麟亦杖脊刺配吉陽軍御史中丞詹大方即奏皓與鍔為刎頸交更相稱譽誑惑衆聽丁酉詔皓提舉江州太平觀甲辰淮東轉運判官湯鵬舉言五月乙亥楚州鹽城縣海水一槩澄清秦檜率百官入賀上曰自太祖平定天下太宗時干戈偃息真宗時祥瑞甚多祖宗聖語止以豐年為瑞第可付史館不必受賀乙巳詔國子監置小學秋七月壬子詔藤州安置李光俟牽復日特降三官坐前為江東大帥擅用上供錢帛也戊午同簽書樞密院事王倫為金人所殺倫留居河間者六年至是金人欲以為河間平欒三路都轉運使倫曰倫奉使而來非降也大宋之臣豈受大金爵祿耶金遣使來趣倫又不受金人杖其使俾縊殺之倫厚贐使人冠帶南向再拜慟哭乃就死於是河間地震雨雹三日不止人皆憐之辛未詔諸州以御書孝經刋石賜見任官及係籍學生時已頒孝經於郡庠而殿中侍御史汪勃言陛下獨擅聖人之德上天昭鑒果定和議於衆論鼎沸之中極天下之至養望降明詔令募工摹刻使家至户曉以彰聖孝故有是命丙子上幸祕書省遂幸祕閣召羣臣觀晉唐書畫三代古器還御右文殿賜羣臣茗飲省官及吏官皆遷官戊寅上曰祕府書籍尚少宜廣求訪檜曰陛下崇儒尚文翕然向化李文㑹曰若非干戈偃息此事亦未易舉八月庚辰朔判紹興府孟忠厚特放罪忠厚以郊赦加恩令所親吳棫為表其間有本無時才出為世用之語乃有是命秦檜尋物色知棫所代由是廢斥以終甲申右正言何若為國子監發解所監試祕書少監游操等三人充考試官詳定一司敕令所刪定官駱庭芝等六人為㸃校試卷官尚書刑部貟外郎吳㮚考别試駕部貟外郎葉廷珪等二人為㸃檢試卷官監學降敕差試官自此始辛卯上謂大臣曰言者多乞選縣令葢令非其人則為民害可令吏部長貳審察注擬或老病則更授他職庶得人而民受其惠後二日都省請申嚴近制因民事被罪及老病之人不得注守倅縣令從之庚子上謂秦檜曰朕於晉書取王羲之傳凡誦五十餘過其與商皓書及㑹稽王牋所謂自長江以外羈縻而已其論用兵誠有理也癸卯殿中侍御史汪勃言陛下兼愛南北之民力定和議與天下更始崇儒重道同符祖宗臣愚以為今年科場當國學初建萬方多士將拭目以觀取舍為之趨向欲望戒敕攸司茍專師孔孟而議論粹然一出於正者在所必取其或採摭專門曲說流入迂怪者在所必去甲辰進呈上曰勃論甚善曲學臆說誠害經㫖當抑之使不得作則人之心術自正矣可如所奏九月庚戌禮部貟外郎陳鵬飛面對言凡有獻利害者乞加討論必合於祖宗之舊如已試無成必加黜責上謂大臣曰祖宗之法思慮已精審講究巳詳備不必改作天下自治秦檜曰天下本無事宜遵成憲為善上曰小人喜更法往往謂朝廷無所建明不知本無事然法至於弊乃不得已而更之耳辛酉詔分利州為東西兩路用四川宣撫副使鄭剛中請也剛中請以興元府利閬洋巴劒州大安軍七郡為東路治興元府興階成西和文龍鳳七州為西路治興州從之時和議方堅而吳璘獨嚴備日為敵至之虞故西路兵為天下最上覽剛中奏謂秦檜曰川陜地逺為將尤難得人如璘統兵有法肯為朝廷出死力諸將所不及也壬戌宰執奏大理寺詞訴事上曰皆官吏弛慢所致可委長吏親察之如非其人即與沙汰又獄吏但以諸州吏充逐時更替漏泄獄情非便宜令吏久於其職不可替也甲子詔守臣終更入見各舉所部縣令一貟所舉稱職特與推賞不當坐繆舉之罰辛未御史中丞詹大方奏責授清逺軍節度副使潮州安置趙鼎輔政累年不頋國事邪謀密計深不可測與范仲軰咸懐異意以儌无妄之福用心如此不忠孰甚焉壬申秦檜進呈上曰可遷之逺地使其門生故吏知不復用庶無窺伺之謀於是移吉陽軍安置癸酉詔臨安府根刷蔡攸家屬押赴元貶所取收管狀奏時攸之妻子漸至行都殿中侍御史汪勃論靖康之變由於京輔望令密切捜索特加處分故有是㫖仍命京子孫二十三人永不量移如初詔丙子祕書郎張闡罷時秦檜用事久每除臺諫必以其耳目知闡久次喜論事一日微諷闡謂當入臺闡曰丞相茍見知老死祕書足矣檜黙然殿中侍御史汪勃因劾闡由是罷去冬十月甲午右正言何若言自趙鼎唱為伊川之學髙閌之徒從而和之乃有横渠正蒙書聖傳十論大率務為好奇立異而流入於乖僻之域頃緣閌為國子司業學者爭投所好於是曲學遂行伏望申戒内外師儒之官有為乖僻之論者悉顯黜之如此則專門曲學不攻自破矣輔臣進呈上曰若所論甚當程頤當哲廟之初在經筵奏曰陛下記得臣說否如記得明日可對臣說過是時宣仁聖烈皇后聞之大怒曰皇帝雖年少然宫中自不廢學措大家不識事體如此己亥御筆除永道郴州桂陽監茶陵縣民丁身錢絹禾麥自馬氏據湖南四川始增丁賦上謂大臣曰天德好生今民為身丁錢至生子不舉誠可憫也若更循馬氏舊法非所以上當天意庚子詔州縣文臣初至官詣學祇謁先聖乃許視事用左奉議郎羅長源請也長源言士大夫皆學夫子之道以從政而不知所自望令先詣學宫以彰風化之本後遂著為令十一月癸丑吏部貟外郎嚴抑面對乞春秋三傳釋經處許出題以取士上謂大臣曰為人君為人臣皆不可不知春秋往者建言之臣欲罷讀春秋葢不思之甚矣如不可讀則聖人不修此經也甲子上即宫中閱試殿前馬步諸軍將士藝精者錫賚有差自是歲以冬月行之號内敎乙丑提舉臨安府洞霄宫朱勝非薨勝非與秦檜有隙奉祠八年壬申上曰宗室中之賢者如嘗中科第及不生是非之人可收置行在如寺監秘書省皆可以處之祖宗以來不用宗室作宰相其慮甚逺可用至侍從而止秦檜奏乞依舊置宗學敎育宗子上可之御史中丞楊愿言數十年來士風澆浮議論蜂起多飾虚名不恤國計沮講和之議者意在避出疆之行騰用兵之說者止欲收流俗之譽甚者私伊川元祐之說以為就利避害之計窺摇國論詿誤後生此風不革臣所甚憂也願下臣章獨示朝堂禆中外洗心自新以復祖宗之盛從之癸酉楊愿言藤州安置李光之罪先是知藤州周某者誘光唱和其間言及秦檜和議有諷刺者積得數篇密獻於檜檜怒令言者論之乃移光瓊州安置甲戌户部貟外郎字朝正言今歲浙右間有水灾而江西湖南粒米狼戾望嚴遏糴之禁上曰所論甚當如有遏糴州縣可許鄰郡越訴仍責監司按劾十二月丁丑朔潼川府路轉運判官宋蒼舒獻嘉禾一莖九穗者一上曰凡赤烏白雉之類止可一觀而已不足為瑞惟五穀豐稔乃上瑞耳戊寅上曰縣令有清亷愛民者令監司每路各舉數人其老耄不任事者並令按劾縣令得人則民受實惠矣戊子雪百官入賀上諭宰執曰天下窮民宜加養濟孟子所謂文王發政施仁必先斯四者於是詔諸路常平官以時散米務令實惠及民己丑知資州楊朴獻禮部韻括遺詔遷一官丁酉端明殿學士簽書樞密院事李文㑹罷御史中丞楊愿等疏六上詔文㑹落職提舉江州太平觀愿等又攻之詔文㑹筠州居住自秦檜再居相位每薦執政必選世無名譽柔佞易制者不使預事備貟書姓名而已百官不敢謁執政州縣亦不敢通書問如孫近樓炤万俟卨范同程克俊及文㑹等不一年或半年必以罪罷尚疑復用多使居千里外州軍且使人伺察之庚子御史中丞楊愿充簽書樞密事辛丑詔愿兼權參知政事乙丑紹興十五年春正月丁未朔初行大朝㑹禮於大慶殿戊申瀘南安撫使馮檝獻嘉禾九穗上曰近日州郡所奏嘉禾甚多大有年之慶庶幾可望也壬子秦檜因論士大夫之弊曰軍興以來士大夫無肯為國出力者所以不能勝敵臣嘗謂敵之所以勝我者以其用心樸實故也上曰朕觀太祖太宗以來多用樸實之人所以風俗忠厚卿等嘗出使見彼北人雖使蹈河赴海皆所不辭也己未分經義詩賦為二科以取士辛酉初籍千畝用司封郎中李澗請也丁卯四川宣撫副使鄭剛中乞減成都府路對糴米三分之一本司激賞錢二十萬緡時剛中於階成二州營田抵秦州界凡三千餘頃歲取十八萬斛而宣撫司激賞錢已減為一百萬緡至此復有此請上謂秦檜曰累年民力少寛此休兵之效也其從之戊辰命權户部侍郎王鈇措置兩浙經界李椿年既以憂去秦檜請用鈇上因言經界之法細民多以為便檜曰不如此則差役不行賦稅不均積弊之久今已盡革去年陛下放免積欠天下復覺少蘇己巳左諫議大夫何若知貢舉權吏部侍郎陳康伯祕書少監游操同知貢舉若操嘗為發解所試官及是再命之非故事也庚午知撫州晁謙之知建康府謙之嘗言崇仁縣民婦産三男足驗生齒蕃息之盛又言臨川縣禾登九穗足為瑞應皆乞宣付史館秦檜喜故擢用之辛未初命諸路僧道士納免丁錢乙亥主管台州崇道觀向子忞特降三官子忞寓居衡山師臣劉昉希秦檜意劾其強横虐民故有是命二月戊寅上曰朕觀史冊見古之養士有至二三千人亦朝廷一盛事於是増國學弟子貟百人通舊以七百人為額尋命置上舍三十人内舍百人福建運判徐琛為兩浙西路提㸃刑獄公事揮麈錄曰徐獻之琛與秦會之為中表而師川之族弟也㑹之知髙宗眷念師川不替一日奏事啓上云徐府身後伶俜可憐有弟琛能承兄之業願陛下擢用之上從其請其後獻之為貳卿㑹之並緣罔上率皆類此己亥崇國公璩進封恩平郡王以將出閣故也夏四月丙子朔賜太師秦檜甲第一區戊寅檜遷居賜第命内侍東頭供奉官王晉錫押敎坊樂導之賜檜銀絹緡錢各萬綵千匹金銀器皿錦綺帳褥六百八事花千四百枝是夜彗出東方癸未賜正奏名進士劉章等三百人及第出身同出身正奏名張鎡新科明法及第甲申特奏名林洵美等二百四十七人武舉正奏名應褎然等特奏名三人授官有差丁亥赦天下前四日上謂秦檜曰彗星見朕甚懼焉卿等可圖所以消弭之道檜奏太宗真宗朝嘗緣彗星疎決獄囚等事上曰且降詔以四事為主避殿減膳寛民力出滯獄於是手詔監司郡守條具便民事目憲臣巡行親決獄事至是肆赦庚寅知敘州邵隆卒隆在金州數以兵出北境秦檜恨之至是因飲酒暴卒或謂檜密使人酖殺之敘人皆悲哭為之罷市甲午上諭大臣曰比遣將捕盜閩中第令殱其渠魁脅從者皆釋若措置得宜優與推恩不然罰亦隨之庚子省四川都轉運司以其事歸宣撫司辛丑新和政縣令湯思退行太府寺主簿王曮並為祕書省正字左承務郎洪邁為敕令所刪定官邁皓子也三人皆以博學宏詞合格賜第故有是除既而言官汪勃論邁其父不靖之謀同惡相濟乃以為福州州學敎授五月丙辰詔減東南和預買絹一千匹以寛民力戊子詔貧民産子者予義倉米一斛以大理寺丞周楙轉對有請也壬戌復置六部架閣官四貟六月乙亥朔日有食之丁丑上幸秦檜新第戊戌秦檜為上言士大夫多横議無益國事上曰靖康之事是也朕見當時士大夫奏狀多是李綱耿南仲等紛紛爭議無肯以國事為慮者檜曰靖康之初誠有人肯任國事則大計乆已定矣上曰後來生靈塗炭之甚皆由於此所以國家大事須在得人肯任辛丑江東轉運判官趙不棄乞令監司察部内縣令老病不職者與獄祠上曰朕嘗謂縣令最為親民又非郡守之比贜吏固不可而庸繆之人尤害百姓葢因其庸繆則吏計得行若十吏用事是有十縣令矣秋七月乙巳朔罷䕫路軍興以來所置酒店以寛民力用四川宣撫副使鄭剛中奏也䕫路舊無酒禁為場店者百四十餘所而已建炎末増至六百餘然土荒民少人不以為便剛中既以本司錢四萬餘緡代撥贍軍遂弛其禁丙午新添差浙東安撫司幹辦公事司馬伋言建州近刋行一書曰司馬温公記聞其間頗闗前朝政事緣曽祖平日論著即無上件文字顯是妄借名字售其私說伏望降㫖禁絶詔委建州守臣將不合開板文字盡行毁棄伋特遷一官初范沖在史館上出光記聞命沖編類進入沖乃繕寫成十冊上之至是秦檜數請禁野史伋懼罪遂諱其書然後其書卒行於世辛亥執政進呈處州守臣徐度准詔條上便民事件上曰因此亦可以觀人才如議論平正留心國事其說自然可見不然矯訐迂闊者亦可見也戊午詔廬光州上供錢米展一年用轉運司請也上曰人皆知取之為取而不知予之為取若稍與展免俟其家給人足稅斂自然易辦己巳秦檜進呈放免四川轉運司因贍軍借用常平錢十三萬緡上曰休兵以來上下漸覺富實大抵治道貴清靜人君不生事則天下自然受福八月丙子上與大臣論事因曰朕謂進用士大夫一相之責也一相既賢則所薦皆賢矣上因論史事秦檜曰圍城中失節者相與作私史反害正道上曰卿是時獨不推戴異姓圍城中人自然不容楊愿曰檜非獨是時不肯雷同宣和間耿延禧為太學官以其父在東宫士皆靡然從之獨檜守正不為易節檜曰臣嘗聞范仲淹與其友書云致意某官為渠作東宫官不敢通書聖主於忠義之臣與夫失節之徒灼然如此誠立國之本也李心傳曰臣謹按范仲淹祥符末登第終真宗之世為小官自為陳州通判以至執政而薨仁宗未有子安得有東宫官檜之誕妄無稽皆此類也丁亥國子監丞文浩面對乞自今試敎授並於六經中臨時取二經各出兩題不拘義式以貫穿該贍為合格戊子詔禮部看詳行之己亥權户部侍郎王鈇言常平之法本以抑兼并備水旱科條實繁其利不一有義倉和糴之儲坊場河渡之入以産制役欲使平均以陳易新俾無紅腐一有饑饉則開發倉廩以濟艱食豈一主管官能勝其任哉望復置提舉官庶良法美意不為虚文乃命諸路茶鹽官改充提舉常平茶鹽公事惟四川廣西以憲臣淮西京西以漕臣兼領仍令檢察所部州有擅用常平錢物者按劾以聞辛丑増太學弟子貟二百人以國子司業嚴抑有請也九月壬子金主亶祀天於郊先是資政殿大學士宇文虚中既為金人所用虚中知東北之士憤為左衽密以信義感發之從者如響乃與其翰林學士髙士譚等同謀欲因亶郊天就劫殺之先期以蠟書來告於朝欲為之外應秦檜拒不納㑹事亦覺虚中與其子師􅀈皆坐誅闔門無噍類丙辰詔諸路安撫使見帶待制以上者所舉京官狀理為職司甲子夜太廟旁居民遺火上令於左右各撤屋二十間以備不虞冬十月乙亥上書秦檜第賜書閣曰一德格天之閣遣中使就第錫宴仍賜檜青羅葢塗金從物如蔡京王黼例大事記曰我髙宗之待檜既賜之相第又賜之家廟祭器既賜之畫像贊又賜之一德格天之閣六字而孫二人尚在襁保並賜之三品服果何負於其臣而檜忍於負其君如此此檜之罪所為上通於天萬死而不可贖也丙子簽書樞密院事兼權參知政事楊愿提舉江州太平觀癸未樞密都承㫖兼侍讀李若谷簽書樞密院事尋兼權參知政事戊子提舉亳州明道宫晏敦復力詆屈已之非秦檜患其不附已使腹心之人啗敦復以利曰公若曲從兩地旦夕可至敦復曰吾終不以身計而誤國家况吾薑桂之性到老愈辣請勿言檜卒不能屈上嘗面諭曰卿鯁峭敢言無所間避可謂無忝爾祖矣甲午提舉臨安府洞霄宫折彦質郴州居住彦質方居信州侍御史汪勃希秦檜意奏彦質與守臣吳說私相議論妄及朝政說坐免官而彦質有是命庚子詔置四川宣撫司總領錢糧官金都元帥梁國王宗弼卒宗弼且死語其徒以宋朝軍勢強盛宜益加和好俟十餘年後南軍衰老然後可為寇江之計云十一月癸卯朔饒州童子戴松十歲其弟槐九歲皆能誦書詔免文解一次癸亥宰執奏新製祀享禮器事上曰今天下無事郊祀廟享禮莫大焉不可不留意庚申江南東路轉運判官趙不棄充四川宣撫司總領官時秦檜既疑鄭剛中乃薦不棄而命之兵部言秦州舊買馬二萬匹今僅發五十八綱乞省押馬使臣許之自紹興後秦州茶馬司歲市馬九千八百有奇成都潼川府利州路漕司歲應副博馬紬絹十萬餘匹成都利州路二十三茶場歲産茶二千一百餘萬斤而茶馬司歲輸總領所錢四十萬緡此其大略也閏十二月戊寅提舉祕書省秦熺言祕府多闕書詔本省即諸路藏書之家借書錄本且訪先賢墨迹己卯詔罷新科明法癸未權尚書兵部侍郎米友仁充敷文閣待制提舉佑神觀奉朝請上好米芾書友仁能世其業上眷待甚厚甲申司農寺主簿宋敦樸面對言望詔守令以來春耕耤之後出郊勸農諭以天子親耕使四方曉然知陛下德意仍自今每春行之上曰農者天下之本守令有勸農之名無勸農之實徒為文具何益於事乃詔從之丁酉進呈太學博士王之望面對乞倣端拱咸平故事悉取近郡所開群經義疏及經典釋文令國子監印千百秩俾郡縣各市一本置之於學上曰古人讀書須親師友雖未必盡得聖經妙㫖然亦有淵源今士大夫未有自得處便為注說以為人師此何理也十二月戊申上謂大臣曰今雖無事諸軍敎閱亦不可少廢宜丁寧戒飭之丁巳孫道夫知蜀州道夫入對上諭曰軍興以來蜀民應副不易朕將詔鄭剛中條具盡與蠲減止存經賦而已甲子詔右司貟外郎李朝正仍舊同措置經界戊辰詔諸路提舉常平官復為監司歲舉屬吏五人改京官宋史全文卷二十一中欽定四庫全書宋史全文卷二十一下宋髙宗十五丙寅紹興十六年春正月戊寅上謂大臣曰將來耤田降詔須語簡意足使人曉然知敦本之意漢文帝勸農之詔頻年有之不過數十語當時民知務農遂至富庶辛卯上齋於内殿壬辰上親饗先農於東郊配以后稷詣親耕位上親九推乃止命宰執使相侍從兩省臺諫行五推九推之禮庶人終千畝焉二月辛丑提舉佑神觀韓公裔提舉洪州玉隆觀在外州軍任便居住公裔上康邸内知客也檜欲賞公裔橘使來請㑹有詔除公裔承宣檜疑其舍已而有求於上右諫議大夫汪勃乃劾公裔出入公卿之門隂有窺伺故有是詔癸丑詔太師秦檜合葢家廟令臨安府應副務要如法知宣州秦梓移知湖州未上卒於建康辛酉除資政殿大學士致仕恩數視參知政事壬戌上曰縣令之職本欲撫育百姓乃掊斂以待過往科率以奉權貴害及一方殊失張官為民之意宜令有司措畫以聞甲子殿前司乞起復李邦光充正將上曰從軍起復一時權宜然不能無弊若元在本軍則可或在外請囑宜禁止之尋詔自今規求起復之人重行黜責令御史臺覺察彈奏三月庚午朔詔有司建武學先是士人上書者多以為言上數諭大臣以文武之道不可偏廢祖宗自有故事至是乃考上焉戊寅左宣敎郎鄭邦哲進左氏韻類詔特遷一官辛卯經筵講孟子徹章翌日賜宰執講讀修注官燕於皇城司初復故事也詔禮器局造太師秦檜家廟祭器己亥工部奏立淮東江東兩浙湖北諸縣歲較營田賞罰格其法以紹興七年至十三年所收課利最多酌中者為額每路縣令以十分為率取二分賞之歲收増三分至一分以上並減磨勘年仍以最虧一縣為罰夏四月癸卯用前荆湖等路撫諭司幹辦公事胡駿請立祚德廟於臨安府尋加封程嬰為安節成信侯公孫杵臼為通勇忠智侯韓厥為忠定義成侯普安郡王免喪還故官司封貟外郎邊知白面對乞令郡邑以藉田手詔刋石置於聽事上曰凡治天下惟賞與罰有賞而無罰雖堯舜不能治天下守令有勸農之責若不能奉行朝廷德意當痛黜之知道州李佾條上便民事件請以真宗御製文臣七條凡守令朝辭之曰悉令拜賜權吏部侍郎王循友等言守令多外除恐不周徧欲令鏤板於㕔事揭示己酉從之庚戌上曰近日全無事前此文字極多朕有至夜分不寐頓如此減省豈非議和之效乎丙辰新通判成州郭伸獻易解上曰易象深微極難窮究須自有得仍不穿鑿始可謂之通經伸議論亦粗通可略加旌擢於是進伸一官戊午兵部上武士弓馬及選試去留格初補入學步射弓一石若公試試步騎射不中即不許試程文其才格自一石五斗以下至九斗凡五等上可其奏因諭輔臣曰國家武選所係非輕今諸將子弟皆恥弓馬來换文資數年之後將無人習武矣豈可不勸誘之五月壬申命諸路漕臣兼提舉學事如本司官俱無出身即從上一貟兼領詔浚臨安府運河時北闗門外河道堙塞乃諭大臣令開撩之丙午詔學校科舉取士如經義詩賦人數不等即以文理優長通融收補不得過三分庚辰左朝請大夫周綰為淮南轉運判官上覽除目曰監司朝廷耳目之官今天下安靜恤民為先得人則一路安否則煩擾百出豈可不慎擇辛巳命權吏部侍郎王循友權户部侍郎李朝正編類諸路監司郡守條上裕民事件俟成書頒之癸未初作太廟祏室於室之西牆金釘朱户黑漆趺坐如承平之制甲申德興縣士民仇取新等請知縣陳鼎再任鼎嘗權監進奏院以上書請備邊忤秦檜故逐至是檜進呈上曰德政果及於民則固可留然其間不能無計囑須加覈實御史中丞何若即奏鼎朋附廖剛鼎坐免去鼎為邑有惠愛至今人思之丙戌詔作景鍾鍾髙九尺天子親祠上帝則用之以皇祐黍尺為準既成命秦檜銘之曰德純懿兮舜文繼躋壽域兮孰内外薦上帝兮偉兹器聲氣應兮同久視貽子孫兮彌萬世上大恱甲午知瀘州馮檝奏天雨豆甘露降於郡園右承務郎康與之監尚書六部門與之倬子也上之以星變求言也倬以選人上書言彗不足畏秦檜大喜遂特改京官六月己亥朔知信陽軍馮叔榮代還言京西淮南民之歸業者尚少望詔有司止收半稅以勸耕墾上諭大臣曰若荒田耕墾得徧大為國家之利今邊境寧靜人思歸業然所在尚有占留之弊可令户部措置秋七月己巳上謂大臣曰今旱雨甚霑足方欲祈禱遂得之歲事有望聞米麥甚賤小民易活亦可慶也時嶺南州縣多不雨而廣之清逺韶之翁源英之真陽三邑尤苦䑕害雖魚鳥蛇皆化為䑕數十為群禾稼為之一空焉壬申檢校少傅和國公張浚依舊特進提舉江州太平觀連州居住先是浚因星變欲力論時事以悟上意以其母太夫人計氏年髙言之必被禍恐不能堪計氏見其形瘠浚具言所以計氏誦其父咸紹聖初舉制科策曰臣寧言而死於斧鉞不忍不言而負陛下浚意遂決即上疏言當今事勢如養大疽於頭目心腹之間不決不止決遲則禍大而難測決疾則禍輕而易治惟陛下謀之於心㫁之以獨謹察情偽豫備倉卒庶幾社稷有安全之理不然日復一日後將噬臍異時以國與敵者反歸罪正議此臣所以食不下咽而一夕不能安也於是秦檜以謂時已太平日興彌文諱言兵事見之大怒御史中丞何若即奏浚居常怨恨以和議非便惟欲四方多事僥倖再進包藏禍心為害實大故有是命戊寅國子監言今年秋試額外補中之人乞令待闕至科場年許赴監依不滿年人例取應仍自來春住補俟科場了畢有闕日檢舉施行先是四方就補者益多乃分場引試士有更名冒試至於再三者御史中丞何若嘗以為言上曰士人進取之弊一至於此不可不革今日之所養則他日之所為可見矣於是學官以為言乃改用三歲之法焉丙申江東轉運司建康府言本府民户所欠官錢六萬餘緡委是貧乏無可催理乞特授蠲免權户部侍郎李朝正乞令總領所審實蠲放從之八月戊戌朔尚書吏部貟外郎周執羔守右司貟外郎上覽除目曰人才須廣訪而選用之所薦者君子其人自君子所薦者小人其人自小人觀所薦者其人可知矣辛丑築髙禖壇初監察御史王鎡以上繼嗣未立請行親祠髙禖之禮禮官言自祖宗以來惟兩制侍祠乞命執政侍祠乃改築於圜丘之東庚戌秦檜奏臣昨准玉牒所取臣向者圍城中推戴趙氏事跡乞經聖覽降付本所上曰忠義之節書之信史萬世不朽辛酉監察御史王鎡獻戚里元龜三卷詔遷一官鎡初為皇后宅敎授上命採歴代戚里故事可為法則及鑒戒者論次成帙至是上之金人遣蕭保壽奴與蒙國議和蒙人不肯九月己巳撫州布衣吳澥進宇内辨歴代疆域志吳沆進易璇璣三墳訓義太學博士王之望言三墳書無所傳授疑近世好事者所為詔澥永免文解沆以書犯廟諱故賞不及焉己丑進呈戚方已到供職上曰自今諸將出入如身之使臂臂之使指無不如意兹為可喜丙申詔武成王廟從祀諸將升趙充國於堂降韓信於廡下用權國子司業陳誠之請也是月左朝奉郎陳剛充荆湖北路提舉常平司幹辦公事剛投匭上書論恢復事大畧謂當以和好為權宜戰守為實務疏入上諭秦檜令除郎官檜不樂乃言剛資歴未深遂有是命剛秩滿代歸遂不復仕後數歲卒於家剛為人強直登第三十年莅官纔九考所至皆有可稱冬十月新禮器成戊戌上觀於射殿宰執侍從臺諫南班宗室禮官正刺史以上皆與觀景鍾奏新樂用皇祐故事也己酉上曰今天下無事民事最急監司郡守須是擇人監司得人為縣者自不作過葢縣官皆銓注難别賢否全在考察昏繆不任者别與差遣清強有才則宜擢用之庚戌知臨安府沈該乞展兩淮起稅之限上謂宰執曰財賦須知取予之道如知取之為取不知予之為取非久利也淮南民若盡歸業則其利甚廣矣十一月庚午言者奏近來詩賦經術各以就試人數分取大抵習詩賦者多故取人常廣治經術者鮮故取人常少恐寖廢經術之學矣欲望命有司再加討論上曰當日行詩賦為士人不讀史今若專用詩賦士人不讀經大抵讀書當以經義為先所論宜令禮部看詳以聞丙子合祀天地於南郊始命普安郡王亞獻恩平郡王璩終獻是歲備祭器設八寶如政和之儀太史局令胡平言三台星見上謂秦檜曰此國家大典禮及期而睛誠可慶也非卿等協贊何以致此辛卯上曰爵祿所以勵世如有可與則文臣便至於侍從武臣便至於建節如其不可雖一命亦不容輕授十二月四川宣撫副使鄭剛中奏減兩川米脚錢三十二萬緡激賞絹二萬匹免剏増酒錢三萬四千緡許之戊戌詔以四川總制錢五十萬緡備邊費夜彗星出西南方己亥詔避殿減膳乙巳彗星滅辛亥進士章公奎上書言預借之弊上曰此事有否朕與鄰國通和止為百姓若預借以擾民失朕本意乃詔户部取索措置丁卯紹興十七年春正月乙卯手詔曰朕惟軍興二十餘年黎元騷動故力圖罷兵以冀休息今疆埸無虞流徙有歸四境之内舉獲安堵朕心庶幾焉尚慮監司郡守不能深體朕意致或刻削苛細進獻羨餘失朕愛民本㫖自今敢有違戾仰御史臺彈劾監司各許互察部内犯而失按必與併坐布吿中外咸體朕意左朝議大夫李椿年權尚書户部侍郎專一措置經界椿年以憂去有司因稍罷其所施行者及是椿年免喪還朝復言兩浙經界已畢者四十縣其未行處若止令人户結甲慮形勢之家尚有欺隠乞且依舊圖造簿本所差官覈實若先了而民無爭訟則申朝廷推賞如守令慢而不職奏劾取㫖從之己丑詔近免稅米而所過尚攸力勝錢其除之其餘稅則並與裁減上因言薪麵亦宜免稅商旅既通更平物價則小民不致失所矣辛卯左迪功郎陳介言國家頒降鄉飲酒儀式而州郡所行疏數不同望令三歲科舉之年行之於庠序國子監言欲依介所請如願每歲舉行者聽從其便從之壬辰簽書樞密院事李若谷參知政事御史中丞何若簽書樞密院事二月辛丑進呈臨安府減定官私房緡上曰公私須令均一天下事皆當如此乙巳上親祠靑帝於東郊以伏羲髙辛配普安郡王亞獻恩平郡王終獻又祀簡狄姜嫄於壇下樂舞如南郊之制辛酉參知政事李若谷提舉江州太平觀以御史中丞汪勃論其不忠不孝也三月丁卯捧日天武四廂都指揮使御前左軍統制牛臯卒前一日都統制田師中大㑹諸將臯遇毒而歸至是卒或謂秦檜密令師中毒之聞者莫不歎恨己巳上謂秦檜曰人材難得惟在賞罰勸沮卿可選用所知若協濟國事得三五人即庶僚胥化其不靖害治者顯黜勿貸庶知懲畏乙亥簽書樞密院事何若引疾罷提舉江州太平觀丁丑知光州鄭絪代還乞令國子監裒集上即位以來惠民愛物手詔編類刋印成書守令陛辭門謝日人賜一秩從之己卯翰林學士段拂參知政事乙酉太師尚書左僕射魏國公秦檜以郊恩徙封益國公戊子太傅醴泉觀使清河郡王張俊移節靖江寧武靖海軍太傅醴泉觀使咸安郡王韓世忠移節鎮南武安寧國軍辛卯上曰士大夫有專於為已而不肯任事者但當與之祿食使不失所而已金人與蒙國始和歲遺牛羊米豆綿絹之屬甚厚於是蒙王熬羅孛極烈自稱祖元皇帝改元天興夏四月丙申減諸路免行錢三分之一己亥御史中丞汪勃簽書樞密院事辛丑右正言巫伋兼崇政殿說書自秦熺兼侍讀每除言路必與經筵朝廷動息臺諫常與之相表裏焉庚戌上謂秦檜曰近覽吳適所進大衍圖辨證易中差誤卿當審詢其人當處以庠序之職丙辰制造御前軍器所監造官馬元益特勒停送桂陽監編管元益上疏乞出兵秦檜奏其語言狂妄擬編置上曰真宗皇帝澶淵之盟虜人百年不犯邊塞今者和議人多異論朕不曉所謂止是不恤國事耳若無賞罰望其為國實難自今用人宜求靖共之操如其不然在朝廷者與之外任外任者置之閒散閒散而又不靖者加以責罰庶幾勸懲不至專為身計賞罰既行數年後可望風俗丕變矣己未詔責授淸逺軍節度副使吉陽軍安置趙鼎遇赦永不檢舉五月乙丑雨雹己巳提舉江州太平觀洪皓責授濠州團練使使英州安置六月丙申上謂秦檜曰雨澤稍頻細民不易檜曰前日蒙宣問常潤江南闕雨臣弟棣赴宣州新任近得本州申報雨已霑足上曰此時多雨陂塘有所豬蓄秋或旱乾可備灌溉農夫有豐稔之望甚可喜也戊申太學博士王之望面對舉人程文所純用本朝人文集數百言或作歌頌及用佛書全句舊式皆不考建炎悉從刪去故多犯者望申嚴行下從之乙卯宰執進呈殿前司游奕軍統制成閔招降到福建賊徒等第補官上曰銷弭盜賊當為逺慮若但招安補授恐此輩以嘯聚為得計是啓其為宼之心今已招到且依所乞可劄下諸路日後不許招安戊午普安郡王瑗徙常德軍節度使恩平郡王璩徙武康軍節度使秋七月戊辰添差通判逺州劉伯英提舉荆湖南路常平茶鹽公事伯英為檜所善在湖南創造宅堂至飾以塗金衙前盜用官課者皆納其女而釋之人不敢問己巳大府少卿趙不棄自蜀中還入對上謂秦檜曰不棄必深知四川財賦計今調度給足則軍興以來凡所科敷並可蠲罷朕所以休兵講和葢為蘇民力耳如其不然殊失本意壬申知荆南府劉錡提舉江州太平觀錡鎮江陵凡六年癸酉敕令所奏諸遭喪應解官而臨時竄名軍中規免執喪者徒三年所屬知情而為申請起復者減二等先是上數諭大臣以為有傷風敎至是立法徽猷閣直學士左奉議郎胡寅引疾告老詔遷一官仍舊職致仕庚辰詔四川宣撫副使鄭剛中令赴行在奏事知成都府李璆權四川宣撫司職事秦檜不樂剛中剛中頗覺之私謂人曰孤危之跡獨賴上知之耳檜聞愈怒剛中在蜀六年事或專行其服用往往踰制趙不棄還朝頗文致其事故剛中遽罷癸未詔李璆符行中同共參酌措置減放四川科敷錢物乙酉李觀民知濠州代還入見言陛下信任一德之臣修講鄰好力偃戎兵而民免於塗炭者七年於兹頻歲有秋人皆樂業伏願戒飭邊臣毋致少有生事庶幾仰承德意之萬一從之丙戌秦檜奏以謝尋知潮州上曰凡除郡守莫須到堂否檜曰例須參辭上曰今既休兵正以民事為急卿宜更加詢審如昏耄無取者不若只與宫祠八月癸卯責授清逺軍節度副使趙鼎卒鼎在吉陽三年故吏門人皆不敢通問廣西經畧使張宗元時遣使渡海以醪米饋之太師秦檜令本軍月具鼎存亡申尚書省鼎知之遣人呼其子汾謂之曰檜必欲殺我我死汝曹無患不爾誅及一家矣乃不食而卒年六十三四方人聞之有泣下者丙辰詔自今百官應轉運而以病告者並俟疾愈日上殿時秦檜惡聞人言百官當面對者多稱疾不入上怪之故有是命丁巳秦檜因論及月樁錢上曰卿未還朝時朱勝非創起月樁朕每以為非理屢與宰執言終未能大有所蠲減卿可從長措置庶寛民力乃詔諸路監司郡守將寛剩錢物樁管每季具數申省聽候撥充月樁六月己巳減四川科敷虚額錢歲二百八十五萬緡用宣撫副使鄭剛中總領官符行中奏也於是減四川市估錢五分之一䕫路鹽錢六分之一坊場河渡淨利抽貫稅錢十分之四又減兩川米脚錢四十二萬緡時行中得宣撫司降賜庫見樁米一百萬石乃命行中酌度對糴分數均減甲戌直祕閣吕摭除名梧州編管秦檜追恨頤浩不已使台州守臣曽惇求其家隂事送獄窮治摭懼罪陽瘖乃以衆證定罪於是一家破矣己亥户部具到江東西諸州月樁錢二十二萬七千餘緡上曰科敷之類富者猶不能堪下户何所從出若計諸州羨餘以減月樁誠寛民力朕備嘗艱難知細民闕乏雖百錢亦不易得故不欲妄費或有餘財即命樁留以待緩急庶幾臨時不至失措丙子四川宣撫副使鄭剛中罷仍令於鄂州聽㫖癸未執政進呈大理正章燾面對乞命監司郡守察縣令之賢否上曰令最親民不能一一銓擇不職而後治之百里已受其弊有治狀者當議擢之庶其知勸實惠及民矣丙戌詔江浙見輸折帛錢太髙慮民難出今紬帛各減價每匹江南六千兩浙七千和買六千五百綿每兩江南三百兩浙四百自明年始先一日秦檜進呈諸路監司守臣自今所部縣令治狀顯著者保明聞奏上曰當今正以惠養百姓為先務檜曰如民間折帛錢太重理宜蠲減上曰朕久有此志祖宗時每縑價直八百官司乃以一千和買民間既免舉債出息及絲蠶收成之後並皆樂輸趙鼎張浚為相時乃創折帛之請令人户折納見錢殊為非理若隨逐路色額減納錢數非唯可蘇民力且使知朕所以休兵之意至是行下冬十月辛卯日有食之隂雲不見癸卯詔建太一宫於行在右正言巫伋論州縣奉行詔條違戾不稱陛下愛養元元之意望令以前後詔書編次成冊置之㕔事常切遵守翌日上謂大臣曰朕屢降寛恤指揮而守令不能奉承安得惠及百姓可如伋奏仍令監司按劾以警慢吏己未錢塘縣言龍山院降甘露詔付史館十一月壬戌上諭大臣曰諸郡災傷宜令留意檢放不可苟取一時租稅致民逃移難以復業丙寅太師尚書左僕射提舉詳定一司敕令秦檜上紹興常平免役敕令格式四百九十九卷詔鏤板頒之丁卯權禮部侍郎周執羔請復賜新及第進士聞喜宴於禮部貢院從之自軍興廢此禮至是乃復丁丑右正言巫伋言選人改官銓法注知縣葢舉詞皆云堪充親民任使祖宗立法之意止要為民擇官而比來改秩無意作縣多干堂除則是與舉詞已相戾矣望令吏部並注知縣不惟親民之官得人亦可革奔競之風上曰銓曹自有成法可令遵守左奉議郎洪适右朝散郎通判濠州曽恬並罷适通判台州與守臣曽惇不相能恬少嘗尊事楊時謝良佐劉安世陳瓘得存心養性之學及為大宗正丞秦檜專政士方求媚以取要官而恬自守無所詘殿中侍御史余堯弼論适姦險強暴得自家傳恬自謂趙鼎門人常懷怨望遂絀之既而恬又坐擅興工役貶秩十二月丙申初賜百官喜雪御筵於秦檜第右承議郎劉子翬卒子翬既奉祠盡棄人事獨居一室意有所得則筆之於書四方學者多從之至是微疾即入謁家廟泣别其母徧以書告決素所與往來者召其兄子珙付以家事指示葬處與學者講說修身求道之要作訓戒數百言彈瑟賦詩澹然如平日居兩日而没其所著作聖傳十論等書皆行於世癸卯婺州進士施鍔進中興頌行都賦各一首紹興雅十篇詔永免文解庚戌都大提舉川秦茶馬監收公事韓球始至成都自趙開以來每茶百斤除其十勿算球至官遂盡取園户加饒之茶増為正額有一場而増至二十萬斤者民知輸官不補所得於是起為私販球又㩁忠達州茶即渠合廣安軍置場賣引歲以八萬斤為額然商人以利薄不通第以引錢敷民間耳民甚苦之甲寅資政殿學士鄭剛中落職提舉江州太平興國宫桂陽監居住先是殿中侍御史余堯弼再論剛中抗命偃蹇遲留不行右正言巫伋復論剛中四罪故有是命言者論㑹稽士大夫家藏野史以謗時政於是李光家書萬餘卷其家皆焚之戊辰紹興十八年春正月戊辰諸王宫大小學敎授林大鼐為太常寺主簿仍兼祕書省校勘書籍大鼐初為舉子嘗答策言秦檜靖康忠義之節檜時閒居永嘉見其文黙識之至是稍獲薦用丁丑太常博士駱庭芝罷先是參知政事段拂聞趙鼎死於海南為之歎息秦檜怒殿中侍御史余堯弼將按拂罪先奏庭芝密與執政私交漏泄機事遂罷之自是拂不安於位矣左承議郎張闡添差通判泉州自秦檜專國朝士為所忌者終身以添倅或帥幕處之未嘗有為郡者辛巳命權工部侍郎李椿年同看詳諸路監司郡守條具裕民文字壬午殿中侍御史余堯弼入對論參知政事段拂滅棄人倫戊子輔臣進呈上語及人材因謂秦檜曰士專謀身國家何賴勵世磨鈍惟在進賢退不肖檜曰此乃致治之要上曰但審其賢否而進退之則人自知勸沮矣二月癸巳上諭大臣曰兩浙漕司舉人聞有勢之家行賂假手濫占解名甚諠士論今貢舉鎖院在近可令禮部立賞許人告捕甲午詔假手者許就試舉人告獲取㫖補官仍賜出身乙未參知政事段拂提舉江州太平興國宫尋落職興國軍居住簽書樞密院事汪勃兼權參知政事三月壬戌詔政和八年已前實得兩解貢人不限年並特與奏名許就殿試到省一舉見年五十五以上者令本貫保明申部内開封府國子監舉人召見任京朝官二貟保奏並結除名罪當議特與推恩揮麈錄曰靖康之亂文字散失南渡之後禮部老吏劉士祥者大為姦利士子之桀黠者相與表衷云某歲曽經省試不合該年免既下部則士祥但云省記到因而僥倖遂獲推恩者不知其數壬申名行宫之南門曰麗正北門曰和寧庚辰上初詣太一宫以宫成故凡一百七十楹既而禮部侍郎沈該等言鑾輿詣宫皎日晴霽車駕還内雨澤復作有此祥應望宣付史館從之壬午提舉萬壽觀兼侍讀秦熺知樞密院事一日太師秦檜問敕令所刪定官胡寧曰皃子近除外議如何寧曰外議以為公相必不襲蔡京之迹寧寅弟也講義曰檜以其子熺為樞密欲以代居相位兩府合為一矣甲申浙西副都總管王安道落階官為宣州觀察使時安道之父繼先有寵秦檜使其夫人王氏與之敘拜為兄弟往來甚密貢院言博學宏詞科武進尉周麟之婺州州學敎授季南壽合格詔並與堂除自是恩始殺矣夏四月戊子朔日有食之隂雲不見詔付史館庚寅上策試正奏名進士於射殿先是權吏部侍郎知貢舉邊知白上合格舉人徐履等上問以欲起晉唐之陵夷接東漢之軌迹及柔道所理當有品章條貫右迪功郎董德元策言晉之失不在於虛無失於用兵故耳唐之失不在於詞章亦失於用兵故耳東漢固無如是之失也陳孺策言今日中興之盛以言乎内治則大臣法小臣亷百姓遂其衣食萬物蒙其豐美以言乎外治則講信修睦夷夏交驩邊鄙無虞五兵不試東漢之事不足慕也願申飭邊郡守臣使兩相撫輯庶幾邊隙不生逺人益服舉人王佐策言王羲之言隆中興之業政以道勝寛和為本葢譏當時不務息民保國而欲以兵取勝也杜牧有言上策莫如自治葢譏當時不計地勢不審攻守而徒務為浪戰也况陛下今日任用真儒修明治具足以鋪張對天之宏休揚厲無前之偉績前光武之治不足深羨權禮部侍郎兼直學士院沈該初考權户部侍郎李朝正覆考工部尚書詹大方詳定乃奏德元第一孺次之佐又次之既而以故事遞降遂擢佐為首賜佐以下三百三十人及第出身庚子知樞密院事秦熺提舉萬壽觀兼侍讀提舉祕書省熺言父子共政理當避嫌故有是命仍詔熺應干恩數請給等並依見任宰臣列乙巳侍奏名進士俞舜凱等四百五十七人武舉進士柯熙等七人侍奏名一人賜第授官有差癸丑知建康府晁謙之罷先是方雲翼自禮官罷歸後起為江東安撫司參議官檜念之薦於謙之雲翼干擾不已謙之怒其無厭以書白之㑹雲翼代還檜以問雲翼雲翼愕然曰王庶之子比過金陵晁館之於宅堂者四日雲翼嘗勸晁不當留晁即日津發前去不料其隂憾雲翼至於此也檜黙然即諭殿中侍御史余堯弼乃奏謙之朋姦稔惡日懷怨望志在動摇國是故有是命丙辰知平江府鄭滋知建康府滋再守平江政事多弛兩浙轉運判官湯鵬舉宣言欲按之始秦檜舉進士滋為兩省參詳官至是檜因鵬舉應辦北使寓書於滋稱門生鵬舉見之幡然更奏其治狀遂有是命五月辛酉權禮部侍郎兼直學士院沈該言國家乘火德之建以王天下望用故事即道宫别立一殿專奉火德配以閼伯而祀以夏至從之後建殿於太一宫名明離甲子命有司繪配饗功臣像於景靈宫廷之壁癸未添差兩浙東路馬步軍副都總管李顯忠降授平海軍承宣使提舉台州崇道觀本州居住先是虜使嘗言顯忠私遣人過界詔令分析㑹顯忠上恢復之策於朝秦檜怒乃奏顯忠不遵禀聞奏止用申狀故有是命甲申罷四川宣撫司六月癸巳右朝奉郎鄭靄為䕫州路轉運判官秦檜與之親厚故超用之甲辰用林大鼐議始築九貴神壇於東郊祀禮如感生帝戊申士民曹溥等千三百人進表請上尊號上不許乙卯新知江州吳秉信罷秦檜怒鄭剛中不已遣太府寺丞宋仲堪即江州置司究其隂事殿中侍御史余堯弼奏秉信乃剛中心腹之人故秉信遂罷秋七月乙丑新江西轉運判官賈直清乞於縣官中選有出身人兼縣學敎導上謂大臣曰州縣選官敎導乃敎化本原將來三年科場亦有人材可備采擇乃令禮部參酌如所請癸未提舉太平興國宫張嵲獻紹興中興復古詩詔嘉奬八月癸巳權禮部侍郎沈該乞四川類省試合格不赴殿試人第一等並賜進士出身餘人同出身從之自行在吳中蜀士不就廷試榜首率依第三人推恩講和後稍稍來奉大對是舉類試策問古今蜀人材盛衰之故而德陽何耕對策極論蜀士徇道守節無心於世引楚相子文三仕三己之說為證又言李固無大雅之明哲卒犯於跋扈將軍之手議者固已少之若相如作封禪書葢孟子所謂逢君之惡揚子雲作美新以媚賊又蜀人所羞道有司定為榜首秦檜見其州里大惡之曰是敢與張德逺為地邪丙申簽書樞密院事汪勃提舉江州太平興國宫丁酉工部尚書詹大方簽書樞密院事尋權參知政事戊戌知郢州趙叔法代還言陛下登用耆德專任一相坐致丕平望以今日得人專任之效宣付史館癸丑進呈上顧秦檜曰此卿之功也朕記卿初自敵中歸嘗對朕言如欲天下無事須是南自南北自北遂首建講和之議朕心固已判然而梗於衆論久而方決今南北罷兵六年矣天下無事果如卿言閏八月庚申秦檜奏兩國通和農民安業墾田漸廣乞免江浙湖南今年和糴上大喜曰朕向在河朔見民以為苦朝廷所降本錢州縣往往移用不以時給縱有給處又為吏多端乞取十不得一二今幸時和歲豐軍儲粗足朕豈得已而不已也戊辰權禮部侍郎陳誠之請太學生入學五年不與薦及公試不入等者除其籍從之改行在熟藥所為太平惠民局丙子知福州薛弼言本州亢旱既而大雨忽傳候官縣有竹實如米老稚採取所得幾萬斛飢者賴以濟此葢明天子聖德所感上相燮理之效實為中興上瑞伏乞詳酌施行詔付史館癸未執政進呈監察御史陳䕫論州郡歲以常平米廩給貧民今多移用乞令監司覺察上曰此誠仁政所先比年州縣奉法不䖍或侵支盜用而監司失於檢察或賑濟無術而僻逺窮困之民不得均被其惠非所以稱朕矜恤元元之意宜令户部措置乙酉初福建路自創竒兵而草寇悉平詔以巡檢陳敏所部奇兵四百及汀潭戍兵之在閩者並為殿前司左翼軍留戍其地時江海之間盜賊間作乃分置諸軍以控制之如泉之左翼贑之右翼循之摧鋒明之水軍皆隸本司由是殿前司兵籍為天下冠九月丙午簽書樞密院事詹大方薨冬十月丙辰御史中丞余堯弼為簽書樞密院事兼權參知政事庚午上曰知縣乃銓注貟多難辨真否但治行者優擢罪惡者重責則咸知勸懲因此可以得人才矣十一月己亥新州編管人胡銓移吉陽軍編管先是太師秦檜嘗於一德格天閣下書趙鼎李光胡銓三人姓名時鼎光皆在海南廣東經畧使王鈇問知新州張棣曰胡銓何故未過海銓嘗賦詞云欲駕巾車歸去有豺狼當轍棣即奏銓毁謗當塗語言不遜於是送海南編管命下棣選使臣游崇部送封小項筒過海銓徒步赴貶人皆憐之至雷州守臣王趯亷得崇以私茗自隨械送獄且厚餉銓壬寅提舉江州太平興國宫桂陽監居住鄭剛中再責濠州練團副使復州安置十二月乙卯朔上謂大臣曰聞紹興飢民有渡江者可令臨安優給路費遣還時明越秀潤徽婺饒信州皆旱民多流散上命有司發粟減賦至是復令常正官親往賑給之毋致失所庚申知宣州秦棣卒官給葬事棣在宣城州之何村有富民釀酒棣遣巡檢將吏士捕之夜半圍其家民疑其強盜也即手鼓聚鄰里共執之走愬諸棣棣怒取民及其子孫三人用麻繩通纒其體自肩至足然後各杖之百及解縛三人皆死其慘毒如此丙寅詔提舉常平官分遣屬吏賑恤流民且貸其春耕之費尚書省批狀四川營田就委都統制檢察措置耕種將每年所收斛㪷除分給官兵并樁留次年種子外盡數報總領所拘收充減免成都府路對糴米十二萬石之數舊營田事隸宣撫司及司廢乃有是命戊辰饒州進士張闡上書乞將四等五等下户紹興十七年已前拖欠冬苗及諸色官物已倚閤者即與蠲放未倚閤者即權倚閤上謂大臣曰如實無可納徒有追人亦足矜也乃付户部既而户部乞諸路災傷及五分處下户欠十六年租稅除形勢外並與蠲放十七年分倚閣如違當職官重行黜責仍令憲臣覺察從之壬申宰執進呈經界事訖上曰諸州月樁錢昨已例減要當盡行除罷秦檜即諭户部侍郎李椿年宋貺以經總錢措置贍軍己巳紹興十九年春正月丁亥詔紹興府第四第五等户去年未納租稅並權與倚閣以旱傷最甚用提舉常平宫秦昌時請也甲午將作監丞黄敏行面對乞戒州縣謹務限之制毋得夤緣追呼以妨東作詔申嚴行下二月丁卯左奉議郎范如圭添差權通判邵州如圭為校書郎以論講和事去國閒居凡十年乙亥詔自今監司守臣代還入見並令以民事奏陳先是上諭大臣曰監司郡守得替上殿本欲知民間利病近來所奏姑應文書多不及民事宜行告諭故有是㫖辛巳詔臨安府日下給米賑濟流民時浙東大飢其小民行乞都市有餒死者上聞閔焉故有是命三月癸未朔日有食之隂雲不見上不視事百官守職過時乃罷庚寅宰執進呈普安恩平二王得㫖令温習舊書上曰春秋乃舊所習讀嘗問以經中數事欲其通解葢其義淵奥須能識聖人之用心方有自得處若泥諸儒之說拘而不通失經㫖矣時普安郡王在藩邸絶意聲色常以經史自娛凡六籍之文悉加講讀夜則觀古人文集暇則握筆賦詩鼓琴習射而已丙申上語秦檜聞諸郡奏獄空例皆以禁囚於縣獄或廂界寄藏此風不可滋長自今有奏獄空者當令監司驗實如有妄誕即行按治仍命御史臺察之若不懲戒則奏甘露芝草之類崇飾虚誕無所不至矣庚子上諭大臣曰淮甸久平宜加經理民復業者令守令多方恤之使盡力田畝數年後方可起稅甲辰詔責授團練副使復州安置鄭剛中許用議減特免禁錮移封州安置初秦檜怒剛中不已捕其子良嗣與將吏賔客即江州同繫掠治無全膚獄成特有是命良嗣貸死送栁州剛中至貶所守臣趙成之希檜意每窘辱之剛中竟卒於貶所講義曰秦檜之取三大將兵權也剛中阿於檜曰前所共憂者一日變為安平之道廟堂不動聲色而三大將惟恐奉上兵籍之不先彼曲士不通世務挾口以議政者亦皆言塞意順謂此非常之舉因為檜陳善後之策凡七事非不忠於檜也一旦積怒貶死遐荒將吏賔客無得免者則世之附麗非人以媒進取者亦可以為商鑒矣戊申知普州王輔代還言仁政必自經界始尚恐蜀逺未閑指畫或有謬誤乞誡敕有司刻意奉行上曰四川道逺倘如輔所陳則稅愈不實矣可令措置經界官覺察奏劾己酉進呈上曰州縣官奉行如法其推恩勿限貟數庶人人知勸正經界均稅賦極為便民推行之初臣僚有肆異議圖沮壞者暨平江均稅畢紛紛之議始息夏四月己未上曰治道民事為急數十年來吏習茍簡民受其弊必令監司守臣遵奉詔條留意拊循使民樂其生秦檜曰保正耆户長元立法止令管煙火橋道今承文書市物雇夫以至縣官之所私用種種責辦革而去之其利不減於經界上曰朕頃在河朔親見其弊若縣令不得人民一充役即破産能去此弊極為便民庚申詔御史監司守臣如前㫖丙寅主管台州崇道觀張邵言師臣檜有隂功隠德世所未及知者臣被㫖出使敵軍有榮州團練使李子厚言秦公曽為徽宗皇帝撰長書抵金帥尼雅滿引大義以譬曉譙責之黏罕有慙色檜恥自衒不欲言於人是以世不得知之伏望宣付史館上曰得此書庶幾不致曖昧可付史館戊辰秦檜奏昨日蒙御前降到曹勛所藏臣向在北廷代徽宗作書藁書中開陳與今日事無一不合因知講和本出徽宗聖意上曰自頃用兵朕知其必至於講和而後止在元帥府時朕不知有身但知有民故惟和好是念檜曰此所以誕受天命上曰用兵葢不得已豈可樂攻戰中國之有夷狄猶陽之有隂自古無殄滅之理使可殄滅秦皇漢武為之矣本朝真宗與契丹通和百有餘年民不知兵神宗雖講武練兵實未嘗用朕自始至今惟以和好為念葢兼愛南北之民以柔道御之也是日日左右生青赤黄珥太史局言係是祥應乞付史館從之庚寅張邵充敷文閣待制提舉江州太平興國宫制詞略曰惟時秉節之臣親見特書之事誦說賢宰彭明尤切邵自北方還即被逐閒居凡七年乃上此奏焉建康府言甘露降是月太白蝕月五月壬午朔詔汀漳泉三州且據見今耕種田土紐計頃畝收納二稅其未耕種田段二稅權行倚閣時初行經界法於諸路而劇盜何白旗擾汀漳泉三州故有是㫖乙酉户部貟外郎周莊仲面對請復蜡祭之禮其禮東西方百神視感生帝南北方視嶽瀆皆以臘前一日祭之丁未王大寶知連州代還言連英循惠新恩六州居民才數百非商販之地月輸免行錢望更審量裁減上謂大臣曰守臣上殿令以民事奏陳遂得民間疾苦所陳五六得一可行為利不細乃命本路漕司具合減數申省六月丁巳左迪功郎王庭珪特勒停送辰州編管胡銓之貶也庭珪為衡州茶陵縣丞以詩送之有曰癡兒不了公家事男子要為天下奇銓鄉人歐陽安永告之以為謗訕朝政庭珪遂坐貶戊午太師尚書左僕射兼提舉詳定一司敕令秦檜上吏部續降七司通用法四百三十五卷丙子王普添差通判邵州代范如圭也二人嘗官館學為秦檜所怒終其身以郡倅處之秋七月辛巳楊惇知舒州代還乞誡監司守臣修水利詔付户部上曰平江隄堰不修歲輸米比舊虧十萬斛臨安西湖民間灌溉所資其利不細歲久亦填淤宜悉令修治辛卯秦檜以甘雨應祈乞拜表稱賀上曰更五日不雨則傷稼如浙東田髙得此雨極濟秋成可必主管台州崇道觀許忻知邵州忻以論事忤秦檜意屏居臨川閉户少所賔接學人陸九齡年尚少忻一見亟折軰行與深語至是遂與之俱九齡金溪人陸入郡學時場屋無道程氏學者九齡從故編得其說獨委心焉因結茅舍旁講習兼晨夜不怠如此者十餘年壬寅右諫議大夫巫伋論鎮江府見於民間科借苗米追呼箠撻不勝其擾乞禁止其官吏重賜黜責癸卯秦檜奏事畢上曰巫伋言鎮江預借事不知何故闕乏乃爾可令監司經理其守臣先罷時曽惇為秦檜所厚驟用知鎮江至是纔數月也八月辛亥敕令所言臣僚劄子乞詳議民事一罪欲乞並依見行條法施行從之自張浚當國始議州縣官緣民事致罪者終身不許治民行之數歲論者數以不便為言然終不能改辛酉宗正寺丞王葆面對論役法上令户部詳其的確利害本部乞女户無子及得解舉人太學生單丁並免身役即特㫖及因恩免解人聽募人充役官司毋得追正身從之九月癸巳詔新通判汀州李璹特放罷坐嘗與新州編置人胡銓交結為守臣張棣所劾也戊申上命繪秦檜像自為贊曰維師益公識量淵冲盡闢異議決策和戎長樂温凊寰宇阜豐永永相予凌煙元功因出示群臣藏於祕閣冬十月癸丑提舉萬壽觀秦熺為郊祀禮奉使渡江後五使以祠官為之葢自此始己未幹辦行在諸軍糧料院王珏提舉兩浙西路常平茶鹽公事先是秀州歲以錢給亭民煮鹽至十五年積十九萬七千餘緡不給亭民無以煮鹽訴於朝上曰亭户宜恤不則逃去其害非細可令户部究實於是用玨玨至官踰年盡償所負又開華亭海鹽河二百餘里鹽滋得通流其溢以溉田經界之法行甚害者三百六十九事其七千二百二十七户尤為病玨奏除之玨安石曽孫也知新州張棣提舉荆湖北路常平茶鹽公事以其再劾胡銓也棣至官一日卒時責授濠州團練使洪皓在英州閩人祝詧為守詧老矣聞棣以巧中遷客取使節欲效之即捕皓家奴寘獄中釀成其罪未及發而詧死事乃解降授文州刺史辛永宗特勒停送肇慶府編管永宗已嘗立軍功給真俸守臣吕稽中知永宗為秦檜所惡劾其冒請全俸當計以贓稽中先以計取永宗所受御札送檜矣永宗由是不能自明詔支過請給令稽中依條追理稽中選郡僚之苛刻者籍其家以償欠一簪不得留庚午知平江府王晌直祕閣知建康府兼行宫逐守司公事建康自置留守後以庶官為之葢自晌始十一月癸未祕書省著作佐郎劉章面對言元豐嘗編郊廟奉祀禮文乞命官為紹興郊廟奉祀禮文以續元豐之書上嘉納之壬辰合祀天地於南郊太史局令胡平奏帝座及三台星體明耀禮畢還御麗正門建金雞赦天下辛丑尚書户部侍郎李椿年罷椿年首陳經界之議及是始畢甲辰詔諸郡行鄉飲酒之禮以取士先是司農卿湯鵬舉請對論舉人多冒貫求試乞於未下科詔前令州縣籍定來歲當應舉人名預先引保委無偽冒然後許赴鄉飲酒若臨時投狀射保者並不收試事下禮部至是乃頒行焉丙午上謂秦檜曰經界人户多訴不均當與受理若不受重稅將無以輸納十二月壬子祕書省著作佐郎林機面對言訪聞有異意之人匿迹近地窺伺朝廷作為私史以售其邪謀偽說欲望密加捜索嚴為禁絶甲寅上謂秦檜曰此事不應有宜行禁止許人陳告仍令州縣覺察監司按劾御史臺彈奏並取㫖優加賞罰於是李光之獄遂起丁巳金人殺其主亶金主亮即位戊午知潭州劉昉乞更名旦從之丁丑祠部貟外郎胡寧祕書省著作佐郎劉章並罷章有士望秦檜疑其不附已而寧本因其父兄與檜厚故召用之至是檜知寧兄致仕寅之貧因其往建州省覲世母遺以白金寅報書曰願公修政任賢勿替初志尊王攘狄以開後功檜以為譏己始怒之寅嘗游嶽麓寺大書壁間云是何南海之鰐魚來作長沙之鵩鳥於是帥臣劉旦方欲捃摭張浚諸人之罪而旦潮陽人也亦大怒復訟寅於檜侍御史曹筠即奏寧兄弟阿附趙鼎章居衢州與鼎賔客交通私相朋比乃以章通判均州而寧充䕫州路安撫司參議責授濠州團練副使解潛居南安軍至是疾劇張九成往省之謂曰太尉平日所懷亦有不足者否潛泣曰平生惟仗忠義誓與敵死以雪國恥而不肯議和遂為秦公所斥此心惟天知之九成曰無愧此心足矣何必令人知潛曰聞此言心中豁然矣即逝九成壯之時秦檜猶怒潛故喪不得歸逮檜薨乃聽之庚午紹興二十年春正月丁亥太師尚書左僕射秦檜趨朝有挾刃於道者遮檜肩輿欲害之傷大程官數人一軍校奮而前與之敵衆奪其刃遂擒送大理寺驗治則殿前司後軍使臣施全也自罷兵後凡武臣陳乞差除恩賞檜皆格之積百千貟無一得者客行朝餓且死者歲不下數十至是全以所給微而累衆每牧馬及招軍勞而有費以此怨忿遂潛攜刃作過壬辰磔於市自是檜每出則列五十兵持長挺以自衞甲午普安郡王第三子惇為内率府副率丙午兩浙轉運判官曹泳言左承務郎李孟堅省記父光所作小史語涉譏謗詔送大理寺初光在貶所嘗作私史孟堅間為所親新諸王宫大小學敎授陸升之言之升之訐其事命泳究實申省及是進呈二月庚戌軍器監丞齊旦面對乞春月禁民採捕秦檜曰正為孳育之時上曰此係利害乃下之刑部既而本部言春月在法不許採捕若止科違令之罪恐難禁止今欲犯者杖八十從之初右朝請大夫路彬提㸃廣西刑獄公事代還言靜江府昭州夏稅折帛錢最重於諸州上令户部看詳裁減户部言二郡歲撥上供布九萬二百八十一疋欲於見納價上三分減一每疋折納錢一千從之上又曰昨令監司守臣任滿並以民事奏陳彬可除職名與見闕監司以示激勸丙辰初作玉牒所三月癸未簽書樞密院余堯輔參知政事給事中權直學士院巫伋簽書樞密院事戊子觀文殿學士提舉萬壽觀秦熺為特進加大學士充觀使丙申詔責授建寧軍節度副使昌化軍安置李光永不檢舉右丞務郎李孟堅特除名峽州編管先是孟堅以小史事繫獄至是獄成故有是命於是前後從官及朝士連坐者八人徽猷閣直學士致仕胡寅坐與光通書朋附交結特落職戊戌上謂大臣曰近有人上書陳農田利害農者天下之大本可即施行是日内降詔曰昨李椿年乞行經界初欲去民十害遂從其請今聞寖失本意可令户部逐路選委監司一貟逐一看詳應便於民者依已經界施行其乖謬反為民害事目並日下改正具申省部日後以當否取㫖黜陟間遣御史前去察訪庚子詔巫伋兼權參知政事壬寅右正言章厦奏左承議郎致仕胡寅天資凶勃敢為不義寅非胡安國之子不肯為親母持服此其不孝之大罪也寅初傅㑹李綱後又從趙鼎建明不通鄰國之問其視兩宫播遷如越人視秦人之肥瘠後來梓宫既還皇太后獲就孝養寅乃隂結異意之人作為文記以為今日仕進之人將赤族而不悟此其不忠之大罪也詔寅責授果州團練副使新州安置乙巳上書秦檜父故玉山縣令敏學墓碑首曰清德啓慶之碑夏四月己未起居舍人兼玉牒所檢討官王曮言本所見修玉牒竊見靖康二年太師秦檜入狀軍前乞存趙氏社稷兼在軍前與莫儔爭辨以全家保天族并在中京代上皇作書與國相建明和議並已修入玉牒外所有元降下推戴事跡乞備録全文關送國史日厯所照應施行從之洋州言真符縣民宋仲昌妻一産三子本人姓符國號生子之日適值天申節實皇帝紹隆景命子孫衆多之祥詔付史館九月甲戍朔上因言宣州米脚錢事謂大臣曰此盖州縣並縁為姦不恤百姓朕今日所以休兵講好者正以為民耳若州縣不知恤民殊失朕意上又曰國家設常平倉正為儲蓄以待水旱賑濟冝令有司以陳易新不得妄有侵移若臨時措畫假貸積榖之家徒為虛文無實效也甲申福建路安撫司主管機冝文字呉元美除名容州編管元羙嘗作夏二子𫝊其略云天以啇代夏是以伊尹相湯伐桀而聲其割剥之罪當是時清商颷起義氣播揚勁風四掃宇宙清廓夏告終于鳴條二子之族無小大少長皆望風隕㓕殆無遺類天下之民始得安食酣寢而鼓舞於清世矣夏二子謂蠅蚊也其鄉人進士鄭煒得之特以告本路提㸃刑獄公事權福州孫汝翼汝翼惡之抵煒罪煒怒走行在訴元美譏毀大臣秦檜從尚書省下其章元美家有潜光亭商隐堂煒上檜啓曰亭號潜光盖有心於黨李堂名商隠實無意於事秦他皆類此檜進呈上曰元美撰造謗訕至引伊尹相商伐桀事其悖逆不道甚矣可令有司究實取㫖至是法寺言元美指斥國家譏毁大臣法當死上特宥之汝翼已移知荆南府亦降二官元美竟卒于貶所冬十月庚午參知政事余堯弼簽書樞宻院事巫伋請自今朝參退依典故權赴太師秦檜府第聚議從之時檜以疾在告故也十二月甲子秦檜始朝肩輿至宮門命二孫直寳文閣塤直顯謨閤堪掖以升且命毋拜上甚喜曰且得與卿相見檜頓首謝宋史全文卷二十一下
