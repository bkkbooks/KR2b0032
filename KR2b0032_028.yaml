body:
  text: 宋史全文卷二十八宋光宗庚戌紹熙元年上孝宗皇帝第三子也母曰成穆皇后郭氏以紹興十七年九月四日生上于藩邸初成穆生四男長曰鄧王愭即莊文太子是也次曰慶王愷次恭王即上也次未命而夭追賜名恪贈使相封邵王二十年上生四歲矣二月授右監門衛率府副率三十年五月轉榮州刺史三十二年九月封恭王於是十六歲矣孝宗受禪乾道元年立鄧王為皇太子二年七月詔皇太子男皇嫡孫賜名挻除福州觀察使封榮國公恭王男皇孫賜名挺除左千牛衛大將軍三年七月太子薨諡曰莊文六年六月以知樞密院府為莊文太子外第命榮國公挻與錢妃自東宫徒居焉七月乙巳太史奏是夜四更後東北方火星順行在木星西南入宿各不及一度占云木火台宿主册太子當有赦時虞允文獨相八月庚戌孝宗御垂拱殿允文乞留班奏事三省樞密院進呈文字訖執政下殿孝宗宣諭允文遣使祈請陵寢事允文一一奏畢復奏云臣纍日齋心今日涓吉有一大事方欲干犯雷霆之威冒萬死以請孝宗問何事允文奏曰自古人君即位一二年後必建立儲二以隆萬世之統以係四海之心國家治亂安危之機無大於此故曰太子國之本也國本正而萬事理况今日聖志已定將大有為於天下若一旦敵敗盟連兵兩淮六飛必須順動監國撫軍誰任其責臨事之變倉猝議之常有不如人意處又陛下在位將十年而元良虛位中外士夫共懷憂疑但往往畏死不肯啓口開陳爾臣蒙陛下大恩付以心腹之託使定大計今日之事無大於此無急於此日者木火合宿太史奏以為當册太子天心仁愛陛下昭示休祥願陛下上順天心下從人望早出睿斷孝宗欣然云朕久有此意事亦素定但恐儲位既正人心易驕便自縱逸不勸於學浸有失德不可不慮朕更欲令練歷世務通知古今庶幾無後悔爾允文奏云臣平日竊觀陛下至孝至篤豈不以宗社為念聖慮最逺豈不以儲副為急所以遲遲至今亦必有説今蒙宣諭益有以見陛下重惜神器封植國本為萬萬年之永圗天下幸甚然臣之愚以謂此事不過審擇宫官使日聞正言日行正道真積力久自然無不趣於正安得有後悔又儲闈一開深居中禁常得在陛下左右日親帝學何患不光明日與朝政何患不練歷以臣之愚早建儲宫其所成就必逺過於外處潛邸孝宗曰丞相言極是但此事却有少遷次非久於選德殿還獨與丞相議之允文即奏云臣以愚忠所迫昧死有請敢意陛下遽賜察納臣無任感天荷聖之至容臣再拜謝恩謝訖復奏云此事願陛下早留聖念孝宗云甚好甚好不過旬日間二十五日壬申允文朝殿奏事至下馬處中使傳旨令右相留班孝宗以邊事一一宣諭允文奏對訖復奏云臣比者輒以早建東宫事有請陛下欣然即賜開納今已踰旬日未凖處分臣實憂懼孝宗曰此事已決偶數日來多事未及與卿商量允文援唐太宗事力以為請孝宗曰朕見唐太宗用兵取天下心甚敬之至議立太子乃引佩刀自決亦未嘗不笑之蓋處置家事何用如此今秋事向晚冬初又虜使來有一畨禮數若於郊禮時或前或後降指揮如何允文奏云聖志果定以郊天慶成日降指揮甚好蓋日南至天正也孝宗云當用此日十一月辛巳大駕至郊壇齋於青城是日午宰執奏事有旨令右相留班孝宗宣諭云立太子事朕但欲與丞相議爾如何允文奏云此陛下家事臣不當與臣記得太宗皇帝淳化末年召冦凖於青州既入對太宗曰東宮未立如何凖對曰此事問內人不可問大臣亦不可問中貴人亦不可惟陛下獨斷乃可耳太宗曰襄王可乎凖對曰知子莫若父陛下若以為可願早降處分乃立真宗臣嘗讀國史太宗八子真宗第三觀凖所對曲折之間但欲自太宗發之耳太宗英斷一發千百世無有議之者此臣惓惓之忠獨有望於陛下也孝宗云今郊天後先欲加上兩宫尊號立太子可用春初允文奏云臣謹奉詔願陛下更無改易孝宗云只候兩宫禮畢便降指揮又微笑云朕家好事數件皆是丞相做了允文頓首謝七年正月丙子朔太上皇帝壽聖皇后受册寶禮畢庚辰允文奏事紫宸殿乞留班奏云今兩宫册寶禮成立太子指揮乞早賜處分孝宗曰丞相留意此事如此朕欲以中春上旬擇日行禮非久於內殿更與卿議之又有少説朕欲立太子後餘一親王便欲令出鎮外藩不知本朝有何典故允文奏曰陛下止有兩大王若立一王為太子一王自留王邸侍陛下左右本朝亦無似此典故孝宗云朕之慮甚逺卿可於唐以前子細密加討論允文奉旨而退戊子進呈二月壬子晚朝孝宗御選德殿以立皇太子御札宣示大臣允文等奏元良天下大本陛下獨出睿斷為天下得人各再拜賀孝宗曰前世人主多以此為諱朕甚不取國有儲副自古以然何諱之有允文曰唐太宗號英主至此乃不能自決猶引佩刀以自向孝宗曰朕常笑之雉奴仁懦太宗既知之矣卒不能奪以基禍亂皇太子朕觀之熟矣他日親馭戎輅以撫六師監國之任不及今早定何以繫天下心允文奏臣等受詔未敢行出恭俟來日集百官宣布孝宗曰善定夕鎖學士院癸丑降詔內出麻制皇第三子恭王惇可立為皇太子皇子慶王愷判寧國府進封魏王三月丁酉上受册四月庚午御筆皇太子冝須臨安府尹蓋欲試以民事也九年二月榮國公挻薨莊文太子之子四月上解府尹事淳熙元年魏王自寧國府改判明州七年二月魏王薨諡惠憲他日孝宗謂右丞相趙雄曰太子資質極美但尚少學問耳每遣人來問安朕必戒之云且語太子切須留意學問十四年十月髙宗皇帝崩先是孝宗已有禪意嘗命有司葺都亭驛其制侔德壽宫既而以天下不可奉三宫乃緩其事十一月己亥手詔皇太子可令參決庶務右丞相周必大奏乞創議事堂於是詔以內東門司改為之十五年正月乙巳詔每遇朝殿令皇太子侍二十六年正月甲午皇孫抦封嘉國公魏惠憲王子也惠憲皇兄慶王愷己亥周必大進左相留正右相丙午皇太后遷慈福宫春坊薑特立見必大問曰宫中人人知上元後舉行典禮今悄然何也必大謝曰此非外廷所敢與聞特立不悅而退罷特立在紹熙元年己未詔德壽宫改為重華宫後又改慈福又改慈壽二月壬戌內降禪詔皇太子可即皇帝位宣詔訖百官入班殿庭百官稱賀畢孝宗移居重華宫本末互見淳熙十六年立妃李氏為皇后后父道拜慶逺軍節度使贈太尉諡忠毅先是道為湖北帥有九宫山張真牧至其第道命諸女拜之其中女慈懿后也真牧見之驚曰此天下人母我奈何受其拜邪人皆以為狂道心獨喜孝宗在潛邸聞是語即為上聘之時莊文太子錢妃之妹同選入宫中外皆心擬錢氏而后定選隆興二年封榮國夫人郊禮成進封定國乾道七年王為皇太子立為太子妃至是正位號卒如張真牧之言云詔以生日為重明節祕書即兼權吏部郎官鄭湜因轉對奏言民力之困莫甚於此時蓋所取者皆祖宗時所未嘗有而作俑於後來所用者皆循習承平積弊而不量今日之事力願先以清心寡欲躬自節儉為本然後明詔大臣裁度經費除奉宗廟事兩宮給兵費之外一切量事裁酌惟正之供濫恩橫例皆董正之然後使版曹會一歲之入擇諸路監司之愛民而曉財賦者使之稽考調度蠲其煩重以寬民力疏既出右丞相留正乃命中司版曹檢正都司置局同共稽考先是壽皇創左藏封樁庫其法非奉親非軍需不支至淳熙末年往往以犒軍或造軍器為名撥入內庫或睿思殿或御前庫或修內司而有司不敢執也是時湜為勑令所刪定官因轉對為壽聖言之至是又以為言然竟未聞有所施行云左補闕薛叔似遷將作監右拾遺許及之遷軍器監先是淳熙十五年壽皇從林栗之請復置遺補官以命叔似及之上即位二人既遷併與其官廢之三月祕書監丞沋清臣罷上初即位清臣自國子監丞遷祕書丞羅點薦為言事官不果用俄而為范處義論罷之初主管台州崇道觀繼又降二官清臣臨安人淳熙十五年因轉對歷詆時相者也五月左丞相周必大罷必大與留正並相議論素不合上受禪必大已有罷意時羅點以奉常兼修注上密遣訪可為言事官者點薦葉適等八人皆意向與必大類者由是不果用於是左諫議大夫謝諤遷御史中丞權兵部侍郎何淡除右諫議大夫淡初與必大厚為司業二年不遷正既相白用淡為祭酒故德正而怨必大至是首上疏攻必大必大求去再請而遂罷以觀文殿大學士判潭州諤以不論列必大改權工部尚書會知滁州范處義除殿中侍御史必大方懇辭除職典藩之命淡又論之處義亦助其説於是以雜學士出守泉州先是吕頥浩創月樁錢大為民害髙宗嘗諭秦檜令盡罷之未果乾淳間始減廣德桂陽軍萬三千餘緡上登極以月樁錢有敷額太重去處令臺諫侍從同户部長二詳悉措畫聞奏當議斟酌施行以寬民力尋用吏部尚書顔師魯等奏再減江浙諸郡月樁錢十六萬五千緡有竒云是年紹熙元年春二月御史劉光祖取御史臺格摘其關於中外臣僚握兵將帥后戚內侍與夫禮樂訛雜風俗奢僣之事凡二十條奏乞付下報行令知謹恪上從之是春右丞相留正因奏事密以建儲為請上謙遜未皇也於是皇子封嘉王矣逾月正復以為言上曰少徐議之上之受禪也薑特立譙熙載皆以春坊舊人得幸頗用事自周必大罷左揆久虛而亞參亦闕時特立知閣門事忽見右丞相留正曰上以丞相在位久欲遷左揆而葉張二尚書中擇一人執政二書孰先正不答明日以特立之語於上前奏之且論其招權納賄之狀上大怒罷特立閣職提舉江州太平興國宫夏五月御崇政殿賜余復以下五百五十八人及第出身有差新進士廷射始於淳熙二年壽皇嘗諭大臣欲令文士能射武臣知詩書於是壽皇特御射殿引詹騤以下按射翌日引第五甲及特奏名皆具襴笏起居易戍服以射正奏名中的中帖上垜者推恩有差特奏名五等人射合格者與文學其他例賜束帛凡用絹三千匹云是科丞相留正奏言射以觀德既不合格而復賜帛則似無謂此例可削去亦省費之一端也上從之上受禪推恩潛藩舉人其恭榮二郡皆在蜀中時京鏜為蜀帥乃命三舉終場不改名人並特赴類省試倍省額三十二人而取一人一州共得二十六人議者以為濫因請廷試入第四等以前者並賜第餘但文學出身云殿中侍御史劉光祖出為潼川府路轉運判官先是光祖自四川制置司參議官召對除軍器少監何淡時以兵部侍郎出使使還除右諫議大夫淡首劾左丞相周必大罷之光祖與淡舊在館中相厚善嘗過淡淡曰近日之事可謂犯不韙光祖曰周丞相豈無可論第光祖有短見近歲一宰相去位所引之士斥逐殆盡班列為之一空周相之門多佳士安得如許人代之時薑特立譙熙載以春坊舊人頗用事光祖屏人語淡曰曾龍之事不可再也淡曰得非薑譙之謂乎光祖曰然既而淡引光祖入便閣有數客在焉光祖顧視則皆薑譙之徒始悔前言之輕發也是春淡同知貢舉而光祖有臺官之除首上學術邪正之章及奏名光祖被旨入院拆號與淡坐席甫逼淡曰近日風采一新光祖曰光祖非立異也但常日為大諫所言者今則自言之耳既出同院謂光祖曰何公見公所上章數日為之恍惚日餌定志圎他可知也未幾謝深甫除右正言至是光祖坐論吳端事忤旨而出淡遷御史中丞議論自此分矣吳端者舊以巫醫為業上在儲邸壽皇嘗有疾國醫不能愈端治療有功慈懿李后德之上既受禪擢閣門宣贊舍人又遷帶御器械淡三上疏論之不報胡紘為給事中亦封還録黃上以御筆諭止之淡紘皆聽命光祖再上疏言小人踰分干請而使給諫不得行其職輕名器虧綱紀褻主權是一日而三失也疏入上命大臣令都司諭止之光祖言益力上不樂先是光祖監拆號差誤士人試卷既舉覺放罪矣至是乃用前事徙光祖為太府卿由是遂出是夏議者請令監司州郡寬屬縣無名之取以紓民力時東南月椿錢歲為緡錢猶三百九十餘萬又有版帳錢者軍興後諸邑皆有之而浙中為尤甚於是知嶽州劉俁會四縣版帳之額為二萬一千餘緡而無窠名者萬一千餘緡乃與提點刑獄丁逢轉運判官薛叔似議取凡無名者盡蠲之舉嶽陽一郡而言則其餘可知矣其餘郡未減者如故秋七月命縣置推吏給重䘵舊例諸縣不置推法司吏受賕鬻獄得以自肆議者請萬户已下縣各置刑案推吏兩名五千户已下一名專一承勘公事不許差出及兼他案仍免諸色科敷事件月給視州推吏減三之一委令佐選擇有行止無過犯諳曉鞫勘人充以一年為界即因鞫勘受賕並行重法然諸縣多不奉行朝廷聞之乃勒令請領重䘵如不受者勒停所屬不幫支者從例受制書而違抵罪八月庚戌命同判太史局劉孝榮改造新歷去年十一月承節郎趙煥言淳熙歷今歲冬至後天一辰詔禮部侍郎李巘著作郎鄧馹祕書丞黃艾校書郎王叔簡同驗視至是乃有是命孝榮乞與吳澤荆大聲同造焉金人遣使來賀重明節自渡江後北使往來皆傳其國之御名廟諱而本朝止傳帝名至是黃裳以王府翊善奉詔接伴庚子至盱眙裳問掌儀田願髙宗何以稱帝名而不稱廟諱願云自祔廟後元未理會裳遂遣願等持廟諱御名三紙以往北使副視之云前無此例願答云此乃二十七朔之外第一畨講禮帝名廟諱合有分别往返久之北使副乃謂願云為我謝使副所言極是當理非不曉得止是來時不曾得朝省指揮止依得册子上行難以專輒切望相諒裳乃已既而北使引接來傳彼國名諱自旻以下至其父允恭稱廟諱者凡六人裳歸奏其事乞後遣使人力議改正蓋隆興更成之時廟堂亟於弭兵僅能正其大體而交際之文或未暇議蓋不止一二也舊南使入境非遇置頓不許下車是後待南使禮益恭或中頓稍逺使者則下馬就道傍民居煮茗或炙脯溫酒食之北之掌事者必前僕其火南使乃遣人傳諭北都管以無禮之故都管却馬遜謝又以栁條決其人今館中執事者多中原遺民往往與三節人私語惟見北人則亟避去冬十月以左藏西上庫改稱封樁下庫初紹興休兵後置御前樁管激賞庫孝宗受禪改為左藏南庫淳熙末始併歸户部已而言者謂南庫不歸户部今已二年而庫名尚存官吏如故乞併省孝宗曰若盡廢庫名出入必淆亂可以左藏西上庫為名至是改稱封椿下庫仍𨽻户部焉右諫議大夫何淡遷御史中丞時王蘭為樞密使右丞相留正甚憚之雖上亦不樂也淡初除中丞或諭淡使擊之淡欣然上章極其醜詆詔降一官放罷他日上諭淡曰卿章疏猶未快此人朕亦畏之是冬追封三公主上三女長曰齊安郡主次文安郡主次政和郡主皆早亡及是乃追封焉國朝薦舉之目自京職官至令録其來逺矣元祐初司馬光始奏設文武十科以舉士其後又有舉將帥亷吏所知合舊升陟自代等科凡十有一是冬乃詔監司帥守滿秩造朝陛對之際許薦所部人才一二人如無聽闕文武髙下皆無所拘其後三年間在外被薦者八九百人朝廷不能盡用但令中書省籍記姓名而已初紹興之行經界也惟漳泉汀三州以何白旗作過之後朝廷恐其重擾止不行是歲朱熹守漳州復以三州經界為請熹初為同安簿已知經界不行之害及到任會臣僚有奏請行於閩中者詔監司條具利害以聞監司下其事於州適與熹初意合即加訪問講求纎悉畢至以至方量算造之法盡得其説乃奏經界不行之利害一經界詳略之利害一又得其所必可行之術三將不得行之慮一大略以為此法之行貧民下户雖所深喜而豪民猾吏皆所不樂喜之者皆單弱困苦無能之人故雖有懇誠而不能以言自達不樂者皆才力辨智有餘之人故其所懷雖實私意而善為説辭以惑羣聽恐脅上下務以必濟其私而賢士大夫之喜安靜厭紛擾者又或不能深察其情而望風沮怯則為不可行之説以助其勢此則誠不能無將不得行之慮也是冬得旨本州先行經界南方春早事已無及熹益講究冀嗣歲可行而寓公豪右占田隱稅侵漁貧弱者所不便為異論以搖之後遂有進狀言經界不便者詔寢其事而三州經界不行卒如所料云保任京官犯贓連坐舊制也是歲趙雄所舉以贓抵罪用故事當削三秩雄時為使相若降三秩則應落率鋭為銀青光祿大夫朝廷難之於是自衛國公降封益川郡公削其食邑二千而已其後周必大連坐亦自益國公降封滎陽郡公蓋用雄例云湖北直便會子者隆興初總領王珏所創也初造七百萬緡乾道兊換後止餘四百萬淳熙十一年始通行於京西路是歲梁總為荆湖總領會其已出應換之數得五百六十二萬緡遂亦造兩界焉每界各二百七十萬緡紹熙初詔廣南西路監司約束毋得科挂丁錢廣西郡縣貧薄凡民間父祖年六十以上而身丁未成者亦行科納謂之挂丁錢民甚病之至是禁止明年郊赦又申明之李心傳曰余嘗謂唐之庸錢楊炎已均入二稅而後世差役復不免焉是力役之征既取其二矣本朝王安石令民輸錢以免役而紹興以後所謂耆户長保正雇錢復不給焉是取其三也丁錢多偽國所創因而不除是力役之征蓋取其四也而一有邊事則免夫之令又不得免焉是取其五也孟子曰有布縷之征粟米之征力役之征用其一緩其二用其二而民有殍用其三而父子離今布縷之征有折稅有和預買川路有激賞而東南有丁絹是布縷之征三也穀粟之征有稅米有義倉有和糴而斛面加耗之輸不與是穀粟之征亦三也通力役之征而論之蓋用其十一矣民安得不困乎愚惡夫世俗之吏不知財賦本末源流顧以趣辨為能而撥其本也是故論而述之以待上問焉辛亥紹熙二年春正月甲寅同判太史局劉孝榮吳澤荆大聲所造新厯成上之詔以會元為名辦辛未詔修紹熙會計録先是祕書郎鄭湜轉對為上言今黃老之宫衛卒動以百數外戚家廟防護之兵多於太廟額外將校之奉錢半於正額外廷百執之費不足當閣門醫職近侍之半請明詔大臣裁定經費上自乘輿下至庶府除奉宗廟事兩宫給兵費之外一切量事裁酌罷其不急損其太過户部亦請稽考內外財賦置紹熙會稽録俟見大槩之後命户部宰屬同共詳議而一二大臣公心叶意為之斟酌以其所減捐以豫民至是命户部尚書葉翥御史何淡等同為之未幾淡丁內艱去官後亦未聞有所減也二月庚寅前利州路轉運判官致仕孫松壽除直祕閣松壽鄲縣人力學登紹興五年進士第至乾道初猶未改秩剛方亷潔不求人知環堵蕭然衣食僅給淡如也居官決事多用經術嘗守漢嘉甚有惠愛年六十六即引疾乞致仕不許范成大入蜀引上皇慶壽赦與樊漢廣同薦于朝召赴行在固辭不起蜀人髙之趙雄時在樞府因為上言其賢四年詔特轉一官賜三品服依舊宫觀松壽復告老許之趙汝愚入蜀復奏松壽挂冠勇退幾二十年內行素飭終始不渝乞賜褒表以厲風俗故有是命松壽素清約晚而彌壯然亦喜從釋氏遊日拜佛以百數未嘗少倦年九十餘乃卒蜀人號為牧齋先生是春議者謂濫豫橫賜無以樽節請自今內諸司所給賜所營造所收索悉從有司定為中制惟正之供濫恩橫例皆釐正之國朝有合同慿由司者宫禁所由取索也歲取金銀錢帛率以百萬計版曹但照數除破耳雖有歲終比部驅磨之令然郎官第赴內東門司終日巍座而數濫自為會稽郎官不得過而問焉畢事則卷牘尾俾之書名而已由是議者以為請詔葉翥趙彥逾何淡同稽考其後亦不果裁節焉夏四月初命銓試中選人簾試國朝銓試之法凡任子若同進士出身之人皆赴建炎兵火後權停紹興三年復舉行之去年國子司業許衡又奏乞中選人就吏部長二廳前簾試小經義一道或小賦或省題詩一首試中然後許參選至是吏部條具如所奏內同進士出身并恩科人更不簾試仍下四川制置司一體施行從之考功郎官黃由建言今已增試律義自不須更簾試上曰簾試以革代筆之弊正當加嚴豈可廢也明年八月謝深甫又言銓試不中四十以上注殘零闕人乞令郎官就長二廳寫律一條俾之解釋如或不通未得參注從之五月癸丑置詳定敕令局差詳定官一貟刪修官三貟先是工部侍郎潘景圭言法令一書久不刪潤乞差官置局領其事上從之然未有所進也庚戌命六院官始復入雜壓舊制六院恩數略視職事官而不入雜壓乾道以後浸重其選號為察官之儲淳熙初龔茂良秉政以六院官班寺監丞之上其內弟林宓用是始封贈父母茂良南竄遂罷至是始復入雜壓在九寺簿之下焉淳熙末壽皇復置補闕拾遺官上即位罷之御史中丞謝諤言其不可旋亦罷去自是近臣罕進言者是月太學生余古上書曰恭惟皇帝陛下春秋鼎盛自即位以來星見再周當思付託之重朝夕勉惟求治之道為急乃或不然間者側聞宴遊無度聲樂無絶晝日不足繼之以夜宫女進獻不時伶人出入無節宦官侵奪權政隨加寵賜或至超遷內中宫殿已歷三朝何陋之有奚用更建樓臺接于雲漢月榭風亭不輒興作深為陛下不取也甚者奏胡戎樂習齋郎舞乃使幸臣嬖妾雜以優人聚之數十飾以怪巾拖之異服備極醜惡以致戲笑至亡謂也自古宦官敗國備載方册臣觀宦者之盛莫如方今上而三省下而百司皆在此曹號令之下蓋自副將而至殿步帥各為髙價不問勞績過犯驍勇怯弱但如價納賄則特旨專除故將帥率皆貪刻軍士不無飢寒兵器朽鈍士馬羸瘠未嘗過而問焉設有緩急計將安出此為害之大者良由公卿持䘵保位備貟全身如漢之石慶唐之蘇味道滿朝皆小人也求海內不盜賊民生不塗炭日月不食水旱不作可得乎臣願陛下以漢文帝為法唐莊宗為戒問安侍膳之餘宫庭燕間講讀經史無為南面或鼓琴投壺習射以頥飬神性享名教不窮之樂固嵩嶽無涯之壽豈不休哉上覽書震怒始議特旨編管言者救之乃送秀州聽讀是夏左丞相留正復以建儲為請上曰俟過宫與壽皇議之既而諭正云壽皇之意亦欲少緩之秋九月丁卯蔣介除閣門舍人免召試先是乾道間壽皇倣儒臣之制增置閣門舍人以待武舉之入官者先召試而後命又許轉對如職事官供職滿三年與邊郡遂為戎帥部刺史之選云至是介有召試之命丞相葛邲言介武舉第一人乞免試上從之四川制置使京鏜以京官知縣闕人為辭奏乞增放散貟數朝廷難之然自是以後或非時覃恩或制司奏請往往遞趲一年開禧三年吳獵宣諭四川又請待班人不俟改官一面注擬從之其後議者以為不然遂復舊制是秋蠲減廣東鹽額先是淳熙末壽皇以廣西鈔鹽事竄詹儀之命除髙雷化欽亷五州賣二分鹽外令官般官賣如故餘鹽令廣東歲賣七萬五千籮去冬上用廣西提刑吳宗旦之請頗損五州鹽直及所賣之數又用廣東提舉劉坦之之請減鈔鹽一萬籮户部奏如是則歲失經費六萬三千餘緡上不之靳也至是廣東復言六萬五千籮猶有未售者又命減五十籮焉蓋潮惠南恩州既自産鹽而官復般賣往往計口而抑售于民是後朝廷暗損經費十萬緡而科抑少減矣御史中丞何淡以所生繼母之喪請解官持服矣既又上疏言不逮事請下臺諫給舍議之於是太學生喬嚞朱九成黃會卿移書責之其略曰竊謂人之大倫莫重於父母禮有出繼其服雖異而鍾於天性者未嘗不同也故所承父母則三年終喪而所生父母則心喪三年閣下自長成均而更長臺諫此三綱五常之所係者也今聞閣下有所生繼母之喪初請于朝欲解官持喪太學諸生莫不義之繼聞上疏稱解逮事不逮事之異中外閧然雖愚者亦以為駭夫禮經所謂逮事父母則諱王父母不逮事父母則不諱王父母非謂無恩於先祖也蓋逮事父母則親聞父母之言所嘗諱其祖不逮事父母則不聞父母之言所嘗諱其祖是以子莫知其所諱也故本朝方慤解此一節以謂特庶人之禮耳若學士大夫則知尊祖矣何逮事不逮事之拘乎今聞閣下引此欲不持喪恐與禮經相反何者禮經謂逮事父母則從父母之言今閣下所生之父果以繼室為正乎若所生之父果以繼室為正則閣下亦當從而為正不得黜之也今四十餘年以所生繼母事之及其終也反以為生不逮事而不持心喪可乎夫閣下之意必謂所生繼母無生我之恩則不當為所生之母服抑不思黜其所生之繼母是賤其所生之父也為人子者尚忍言哉不然必以生我者為正而繼之者為不正是閭巷小人知有母而不知有父者非天理之公也非人倫之正也閣下為天子耳目之官將以厚人倫移風俗正宜致辨于此時淡方待命六和塔得書遂去官焉冬十一月壬申日南至合祭天地于南郊大赦天下上之在齋宫也聞貴妃黃氏薨始得疑疾郊之日風雨大至上震懼始不懌自是宗戚大臣以薨卒聞者多不信矣壬子紹熙三年春上昉御內朝而疾未盡去是後重華溫凊之禮以及誕辰節序屢以壽皇傳旨而免既而上神思浸清宰輔百官下至韋布之士以過宫為請者甚衆至有扣額引裾號泣而諫者聖情開悟屢有翻然夙駕之意而不果行都人甚憂之三月己亥伶人胡永年積官至武功大夫以該遇去年郊恩乞任子吏部尚書趙汝愚奏永年以樂藝出身難以任子望立為定法今後似此雜藝補授之人不許奏補從之夏四月從事郎吳綱年九歲能誦六經語孟特改承務郎綱壽聖皇太后親姪孫也紹熙間童子求試者十有七人無補官者皇伯嗣秀王伯圭拜太師初秀安僖王子稱者太祖少子秦康惠王之五世孫也子稱長子伯圭也其次普安郡王是為壽皇紹興十三年子稱薨于秀州贈太子少師壽皇為皇太子加贈太師追封秀王諡安僖上即位始詔即園立廟如濮王例伯圭初以國蔭出官淳熙慶壽禮成拜安德軍節度使九年遷少保封滎陽郡王十五年遷少傅十六年遷少師始稱皇伯紹熙改元遷太保封嗣秀王是夏有太師之命本朝前此親王生拜太師者五人真宗朝楚王元佐仁宗朝燕王元儼哲宗朝吳王皓欽宗朝燕王俁越王偲皆以父兄行乃得之伯圭以宗室拜太師蓋王於上為親伯父用優禮也蜀鹽自祖宗以來皆民間自煮之歲輸課利錢銀絹而已紹興二年趙開總計始變鹽法盡權之置合同場以幾其出入引法初行每百斤為一擔又增十斤勿算以優之令商人入錢請引井户但如額煮鹽赴官輸土産稅然鹹脈盈縮不長久之井户月額不登則官司但以虛鈔付之而收其算引法由是壞井户既為商人所要因增其斤重以豫之每擔有增至百六十斤者是夏吏部尚書趙汝愚奏言趙開鹽法最為精密今井户多鑿私井務以斤重多寡相髙故鹽日多價日賤而其法大壞乞行下總領所參照舊例施行從之於是四川總領楊輔遣官核去虛額剗開助筒二千有竒申嚴合同場舊法禁斤兩之踰格者而重私販之罰鹽直由是頓昻焉乾道初壽皇初令户部印造兩淮交子不得過江南八年以交子易壞出行在會子收兊是夏議者以淮上鐵錢多欲革其弊吏部尚書趙汝愚與從官陳騤羅點謝深甫合奏乞印造兩淮會子三百萬貫付兩路每貫準鐵錢七百七十淮東二分淮西一分依湖北例三年一兊事下兩省臺諌議尤袤等以為可遂施行之仍分一貫五百二百者凡三等始許流轉至江池太平常州建康鎮江府興國江陰軍界行用應兩淮上供及户部錢物並權發見錢三年令淮南漕司樁管而沿江八州軍合發上供一半會子則許用交子通融起發於江淮東西總領所樁管焉秋七月壬午瀘州騎射卒張信等作亂騎射營者本州禁兵也淳熙末起居舍人王卿月知瀘州賜豫諸軍甚厚軍士浸驕張孝芳代為帥欲矯其弊訓練無日又多役使之廩賜或有不時給者是日信等作亂晨入帥府殺孝芳及其家又殺節度推官杜羑駐泊兵馬監押安彥斌訓練官雷世明軍校張明等擐甲坐閲武堂召通判州事張恂安撫司屬官郭仲傳使作奏言孝芳罪狀於是信自稱第一將衣金紫出謝城中以術人黃叔豹為計議官分其兵為五十二隊同謀者五十二人為隊長皆有爵秩叔豹又為黃旗大書曰不叛聖主不殺良民時張明之子昌勇藝為諸軍冠與軍士卞進陰謀討之癸未夜密以告恂甲申信即毬場大饗諸軍恂等皆與酒初行昌進擊殺信于坐會者皆獸散進大呼曰不叛者從我諸軍唯唯從之因執殺造逆者二十餘人逆徒皆捕獲制置使京鏜聞變調西兵千人討之未行而信已誅乃遣鈐轄司屬官陳纘往瀘州措置纘至州十里留不行乃械繫逆黨孫成凌遲于午門之外黃叔豹等三十三人皆就戮聚其首以為京觀設孝芳位于午門之右割孫成心腑以祭之事已平鏜奏孝芳死狀且上恂等功未報丘崈復以為言詔贈孝芳三官録其子孫二人令總領所制置司應辦葬事張信之亂也京鏜帥蜀調潼川所屯御前後軍數百往討之興元都統制吳挺者璘之子也劾制司擅發兵於是樞密葛邲陳騤等進呈得旨令制司具析命下而鏜已赴召丘崈入蜀即奏言三屯逺在西北兵權節制必寄之宣制司朝廷事計當然今軍帥狃於陵夷反謂制司擅興違戾至此豈不大失本意乞下戎司具析仍責令遵守舊制從之由是三屯頗知嚴憚崈所謂狃於陵夷者蓋專指挺也四川經總制錢額理四百五十餘萬緡其一百三十一萬緡贍軍一百三十四萬緡應副湖廣總領所一百六十九萬緡上供餘六萬緡諸郡支用上即位因劉光祖之請捐湖廣三年錢四百六萬八千緡對減鹽酒重額錢即此四川經總制錢也然四路憲司歲撥湖廣錢實止六十萬緡而已又以買發物價計之折閲中半僅為三十萬緡是歲楊輔總蜀計又樽節三十萬緡以益之是歲皇后李氏歸謁家廟推恩使臣鄧從訓等一百八十人給事中尤袤言其太濫時議者亦以為外戚家廟防護之兵多於太廟請釐正之癸丑紹熙四年春正月乙酉詔江上諸軍升差統制至準備將者令主帥解發三人赴總領所選擇一名事既行諸將皆不以為便焉命吏部尚書趙汝愚知貢舉自熙豐以來宗室不差充考試官淳熙六年吏部尚書周必大始請宗室充學官并考試八年正月遂命汝愚為省試别院考試官至是有知舉之命然外郡至今未有差宗室校試者蓋漕吏知守舊法而不知新旨也三月吏部尚書趙汝愚同知樞密院事先是髙宗嘗諭趙鼎曰唐用宗室為宰相本朝雖有賢才不過侍從而止乃所以安全之也久之因執政進擬又諭秦檜曰宗室賢者如寺監祕書省皆可以處之祖宗不用宗室為宰執其慮甚逺也然是時宗室至侍從者亦未有卓然可稱者也乾道初汝愚以廷䇿冠天下已而趙彥中復以宏博中選一時皇族尤號得人至是樞府有闕壽皇欲用汝愚既出命矣監察御史汪義端言髙宗聖訓不用宗室為宰執疏留中不出汝愚家居力辭疏至十上上為徙義端軍器監給事中黃黼言汝愚事親孝事君忠居官亷憂國愛民至誠􅈤􅈤出於天性所謂青天白日奴𨽻亦知其清明者義端識見奴𨽻之不如不可以備朝列義端由此補郡汝愚猶不拜上謀於壽皇遂命宰執召當筆學士申諭聖意謂髙宗聖訓本以折秦檜之姦謀故答詔有乃若紹興之故實蓋有為而言况我壽皇之疇咨欲播告於衆蓋為是也汝愚乃受命是時大臣恭謝者多不得見壽皇欲見汝愚乃因葛邲陳騤等入謝相繼宣引汝愚入謝壽皇曰卿以宗室之賢為執政乃國家盛事卿在蜀時所進奏議甚善朕嘗觀此書可與資治通鑑並行其被聖眷如此初趙汝愚為蜀帥建言舊法聽三考薦舉改官者皆以三考為一任舉其成數而言今於三考之內未罷竒零日分輒敢並旁干請已非法意今又該遇覃霈盡行補轉若一併許於二考之外聽舉改官竊恐干進之徒與夫勢要皆豫得為他日計而孤寒安分亷恥自將者欲脫選調愈不可得欲望將選人一例許於第二任方得薦舉改官庶幾仕進公平不妨寒畯之路不報至是汝愚入政府乃舉行之又詔未成考人不以罪去者許於後任湊成三考聽舉改官初任未成考者勿聽著為令夏五月親試舉人賜陳亮以下三百九十六人及第出身有差李僑年五十四調成都府司户參軍自以䘵不及養乞以一官回贈父母上嘉其志特詔以本官致仕父母皆豫初品官封蓋異數也左丞相留正以論薑特立不行待罪于六和塔特立麗水人以父死事得官頗能詩士大夫或稱之淳熙中趙汝愚為福建安撫使特立為本路兵馬副都監時海賊犯閩中特立以一舟先進遂獲之壽皇以為才召為閣門舍人未幾司春坊事上即位除知閣門事正為右丞相論其招權納賄之狀詔與外祠是月丙戌除浙東馬步軍副總管又召赴闕賜裝錢二千緡正上疏言唐憲宗將用李絳先出吐突承璀為淮南監軍及召承璀還先罷絳相本朝名臣范祖禹作唐鑑言二人不可並立于朝此書屢經聖覽今特立召用臣合罷相與李絳一同不報正出國門待罪于六和塔給事中謝深甫復繳召還特立之命上批朕閔其舊臣無辜而去特與書行同知樞密院事趙汝愚亦以為言上不聽六月己巳正又言臣與特立理難並立于朝乞早賜處分上批成命已行朕無反汗卿宜自處時正已待罪上亦不復宣召也六月除陳源內侍省押班初源以得罪壽皇貶建寧府居住籍其資以進德壽宫又移郴州上即位復召還至是乃有是命時上已病不能過宫源數離間焉是夏嘉王府翊善黃裳除兵部侍郎去翊善坐論鄭汝諧事也先是淳熙末用丞相留正薦裳自祕書郎除翊善其後遷起居舍人歷中書舍人給事中皆兼翊善至是裳辭兵侍不拜嘉王為之請後月餘改寶謨閣待制仍兼翊善蓋終始六年云秋孔文逺襲封衍聖公紹興中文逺之祖玠避難渡江髙宗以衢州田五頃賜之玠卒以其子搢為右承務郎襲爵奉祠事淳熙中入侍祠擢知建昌軍久之坐妄用庫金貶秩遂不復用焉紹熙初纍遷至朝散大夫至是搢卒詔以其子文逺為承奉郎襲封衍聖公云冬十月乙未同知樞密院事趙汝愚以乾道間所置軍期急速文字牌及淳熙間所置緊急文字牌率與常遞混殽故行移稽緩乃改作黑漆紅字牌奏委逐路提舉官催督歲終核其遲速之甚者以議賞罰從之是後尚書省亦踵行之仍命逐州通判具出入界日時狀申省久之稽緩復如故紹熙末丘崈為蜀帥始創擺鋪以健步四十人為之歲增給錢八千餘緡月以初三十八兩遣平安報至行在率一月而達蜀去朝廷逺始時四川事朝廷多不盡知自創擺遞以來蜀中動息靡所不聞凡崈劾疏中所言皆擺遞之報也十一月戊寅上朝重華宫辛巳左丞相留正復入都堂視事先是正以論薑特立事不行待罪于六和塔復繳還上前後所賜賚及出身以來告敕且上奏自敘嘗陪侍儲邸及翌輔初政乞保全終始詞指甚哀不報正纍不得命乃復待罪于范村之佛寺奏乞歸田里不許又請住給廩䘵詔權行住支頃之百官啓逢重明節于明慶寺正請就范村詔從其請九月丁卯百官上壽紫宸殿詔以右丞相葛邲為班首而正自請立少保班上壽班退復還范村待罪始正之出國門也諫官章頴以劄子留之起居郎陳傅良請直前奏事上諭閣門止勿進時上以疾不過重華宫者已數月從官數以為言至是過宫禮畢特遣右司郎官徐誼召正于城外正始入朝赴都堂視事命特立仍為浙東路總管遂竟不召焉正待罪凡百四十餘日特立有詩數千篇號梅山集楊萬里為之序云十二月甲午朔草澤王孝禮言今年冬至日影表當在十九日壬午而會元歷乃在二十日癸未係差一日蓋陳得一劉孝榮所造四歷皆未嘗測影只是寫擬分數所以後天乞將修內司所掌銅表圭面降付太史局測驗從之紹熙初命帥守監司薦所部人才既而濫薦者多是冬言者謂今被薦者猥衆朝廷疑其私而不信病其衆而難從其間縱有賢才不免與僥幸者並棄請條約之乃詔帥守監司今後毋得獨貟薦士是冬使人自金國回者言金人問朱先生安在答以見已擢用回白廟堂遂除朱熹為荆湖南路安撫使知潭州先是已除熹帥廣西熹不就於是以辭逺就近不為無嫌力辭新命朝廷不許甲寅紹熙五年春三月壽皇不豫夏四月朱熹始拜命赴潭州五月至鎮壽皇疾浸棘上不能過宫視疾人情益懼戊寅以壽皇服藥故赦天下先是嘉王府贊讀黃由乞令嘉王過宫問疾辛巳上奏未報講官彭龜年沈有開繼以為請甲申省札下許之內侍都監王德謙堅請覆奏王斥其説遂行至重華宫壽皇為之感動六月丁酉夜壽皇崩于重華宫上猶未能出嘉王數入禁中泣請未遂中外訛言靡所不至戊戌宰執奏事退太皇太后御札付宰執日下昃宰執率百官詣重華宫發喪辛丑左丞相留正知樞密院事趙汝愚參知政事陳騤同知樞密院事余端禮率百官詣文德殿拜表畢退就重華殿廬議成服典故端禮引唐肅宗朝羣臣發哀太極殿故事附中使王公昌入奏是日太皇太后有旨皇帝以疾聽就內中成服壬寅正汝愚請太皇太后垂簾奏事不許丁未宰執札子奏皇子嘉王仁孝夙成學問日進宜早正儲位以安人心癸丑再入札子御批云甚好乙卯再擬指揮進入乞付學士院是晚批出八字云歷事歲久念欲退間左丞相留正得之大懼不以示同列汝愚逼之乃以告焉丙辰再擬入御批可只今施行己未宰執再奏乞面奉處分是晚付出封題稍異正不啓封付之內降房是夏御前諸軍都統制兼知興州充利州西路安撫使吳挺卒先是虞丞相允文既沒朝廷復命挺充利西帥凡十九年而卒于軍於是四川總領楊輔先事白朝廷乞擇重臣鎮蜀乃以丘崈為制置使崈未入蜀而聞挺病甚恐其軍五六萬人緩急無所屬乃見大臣籌之故事帥臣闕以轉運使權時楊虞仲為利路轉運使崈欲重其事乃奏乞令輔往興州攝帥上許焉輔以為朝臣出使非制閫所當令不欲行而崈以聖旨移文輔重傷其意即請虞仲權知興州事而已遙領安撫使未幾併以印送虞仲就權人以為得體先是挺之季歲關外羣盜縱橫皆縱而不治虞仲至未久遂捕其尤者悉誅之邊人讋服挺之死也上已屬疾不之信趙汝愚在樞府用崈輔二人之議更遣張詔代之蓋不欲吳氏世襲以銷未然之患也是夏始釐正東西兩川牒試之濫牒試者舊制以守倅門客皆引嫌赴本路轉運司别試若部使臣及帥臣親屬門客則赴鄰路試率以七人而取一人紹興後牒試尤多東西兩川尤甚議者以為濫於是令成都府路以八十三人潼川府路以八十人為額至是王溉自成都府路轉運判官召還入見極言兩路冒親詭貫之弊乞各存十人外均與本路諸州從之仍各以二十人為額丘崈為制置使復請每路止存十二人若就試者少則以二十人而取一人奏可舊例避親舉人與命官鎖應者同試王溉為成都漕始令分場以革假手之弊於是四蜀皆一等施行焉秋七月庚申朔前一日付出宰執所奏事左丞相留正不肯啓封是日知樞密院事趙汝愚趣之乃啓封正視牘尾憂形于色始密為去計矣辛酉上正臨朝仆于地都人聞之大駭是日工部尚書趙彥逾見汝愚白事相與泣下汝愚微以翼戴之事諷之彥逾力贊之汝愚遣中郎將范仲壬告殿帥郭杲仲壬初以時事艱難告之不應又以忠義動之又不應仲壬不得已屏人起立具以汝愚意達之又不應仲壬乃還汝愚知不可遂請彥逾往見杲諭旨彥逾謂杲曰彥逾與樞密第能謀之耳太尉為國虎臣此事專在太尉杲未及言彥逾變色責之曰太尉所慮者百口之家耳彥逾盡誠以相告而太尉了不見答即西府有問何以復之耶杲徐曰致意樞密領鈞旨事然後定壬戌大祥左丞相留正以五更入奏致其仕易肩輿出城而去人情益懼正之未達也有善軌革者推其行年至甲寅乃為兔伏草雞自焚之象殆莫可時殊怪之及是深以為憂私謂所親曰主上卯生吾酉生伏草自焚其兆已見矣遂定逃歸之計時左丞相趙汝愚知太皇太后深以宗社為憂將白事焉而難其人有知閣門事韓托胄者太后女弟之子也素善慈福宫內寺張宗尹而與永嘉人蔡必勝同在閣門必勝因其同郡人左司郎官徐誼吏部貟外郎葉適言於汝愚遂令托胄以內禪事付宗尹入奏太后素簡嚴無他語第令諭汝愚耐煩而已癸亥托胄再往不獲命逡巡欲退重華宫內侍關禮問知其謀入白太后言與淚太后蹙額久之曰事順則可更切子細禮遂簡托胄以來日壽皇梓宫前垂簾引執政時日已過午矣汝愚乃以諭參知政事陳騤同知樞密院事余端禮關禮又使所親閣門宣贊舍人傅昌期密製黃袍時嘉王在邸殊不知且方以疾在告汝愚簡宫僚彭龜年云禫祭重事王不可不入甲子禫祭殿帥郭杲與步帥閻仲先分兵衛內比內太皇太后垂簾命關禮引嘉王先入執政奏事太后曰皇帝已有成命相公當奉行汝愚出所擬太皇太后聖旨云皇帝以疾至今未能執喪曾有親筆自欲退間皇子嘉王可即皇帝位尊皇帝為太上皇帝皇后為太上皇后太皇太后覽畢云甚好遂勸王即位王固辭且顧汝愚曰某無罪恐負不孝之名關禮等以黃袍進王拒却不受汝愚等固以請而端禮之言尤力王揮涕勉受遂即皇帝位汝愚等再拜賀上猶答拜汝愚等又固請上乃衰服出見百官于重華殿東廊之素幄次詣几筵殿行禫祭禮都人聞之始奠枕矣是晚沈有開彭龜年乞奏事上慘然久之曰前日聞大臣有建儲之議此亦可以息浮言安人心今匆遽乃爾早泣告慈福不允至今悸動是日詔建泰安宫以奉太上皇帝太上皇后命泰安宫提舉楊舜卿往南內請八寶遣內侍二貟分水陸路宣押留正赴都堂治事從趙汝愚之奏也乙丑太皇太后有旨崇國夫人韓氏可立為皇后丙寅赦天下常赦所不原者皆除之百官進秩二等賞諸軍赦文有曰沖懷每念於退間親翰嘗頒於近輔用太上皇帝御札八字意也其後命繳御札八字付史館從李璧之請也先是京口諸軍訛言訩訩襄陽歸正人陳應祥亦謀為變舉事前一日登極赦書至遂敗時趙汝愚為政首裁抑僥幸以故人多怨者自祖宗以來人主登極凡列郡守臣率得任子恩間有闕守臣而以幕職班行攝之者亦官之如例英宗即位司馬公時知諌院嘗以為言不聼上受禪肆眚汝愚因進熟始命監司郡守許上表進貢推恩內守臣係權官者免進貢其表聽附遞以聞詔車駕五日一朝泰安宫百官月兩朝以即位告于天地宗廟社稷丁卯侍御史張叔椿劾留正擅去相位詔以叔椿為吏部侍郎詔命起居郎兼權中書舍人陳傳良還故官戊辰詔曰朕猥以沖人肆膺大寶涉道尚淺何以周知羣下之情燭理未明何以裁決萬幾之務思欲圗乂莫先求言惟祖宗二百年之基既艱於負荷矧中外億兆人之衆尤重於撫綏聿懷置器之安罙切履氷之懼固當咨詢故老夢想幽人罔間邇遐咸當播告胸臆結約爾其無愛於肆言利害罷行朕欲深求於成敗事關朝政慮及邊防應天之實何先安民之務何急毋憚大吏毋諱眇躬倘有補於國家當優加於賞賚導人使諌方傾聽於嘉謀事君以忠宜大伸於直道咨爾多士體豫至懷左司諌章頴為侍御史右正言黃艾為左司諌大理少卿鄭湜為金主報登位使左驍衛郎將范仲壬副之己巳知樞密院事趙汝愚兼參知政事庚午召祕閣修撰知潭州朱熹赴行在奏事上在嘉邸聞熹名德每恨不得為本宫講官至是首加召用先是黃裳為嘉王府翊善善講説開導上學頓進一日上皇宣諭曰嘉王進學皆卿之功裳再拜謝因進曰若欲進德修業追蹤古先哲王則須尋天下第一等人乃可上皇問為誰裳以熹對彭龜年繼為宫僚因講魯莊公不能制其母云母不可制當制其侍御僕從上問曰此誰之説對曰朱熹之説自後每講必問熹之説如何蓋傾心已久故即位首加迅召皆出上意也辛未顯謨閣待制兼侍講黃裳為給事中起居郎兼權中書舍人彭龜年並為中書舍人將作監黃由為起居郎祕書省著作郎沈有開為起居舍人乙亥趙汝愚為右丞相參知政事陳騤知樞密院事同知樞密院事余端禮參知政事兼同知樞密院事汝愚辭不拜賜前宰執侍從詔訪以得失丙子大風戊寅詔以時方秋暑宜用唐武德貞觀故事太上皇帝未須移御其即以寢殿為泰安宫殿前副都指揮使郭杲為武康軍節度使上之立也知閣門事韓托胄有力焉托胄者魏王琦之曽孫神宗女齊國長公主孫也趙汝愚推恩定䇿功曰我與趙尚書皆宗臣而韓知閣乃右戚各不言功惟爪牙之臣所當推賞由是杲建節焉於是托胄與趙彥逾咸有怨於汝愚矣庚辰上率羣臣拜表於泰安宫辛巳改命少保保大軍節度使郭師禹為攢宫總護使趙汝愚力辭右丞相詔以為樞密使翰林學士李巘草麻有太尉本兵柄之語汝愚以為侮已銜之未幾巘轉承旨黃由時以左史兼中書舍人駮之乃除寶文閣學士知婺州先是壽皇將倦勤並命周必大留正為相巘草二制而於必大制中多所訓飭至有患失容身之語必大不自安三上章力辭又四章求去其辭免第二劄子有中外臣庶明知兩相制出抑揚不同在於人情寧免觀望奏入壽皇召巘入對令貼麻改定必大復以非材求去壽皇曰朕何嘗令如此措辭遂批出李巘與郡明日將上乞除職名壽皇不許蓋巘兩在禁林皆由草制而去位自是不復起矣壬午侍御史章頴等劾內侍林億年陳源楊舜卿與在京宫觀知閣門事韓托胄落階官為汝州防禦使癸未余端禮辭兼同知樞密院事甲申兵部尚書羅點簽書樞密院事詔兩省官看詳應詔封事具要切者以聞戊子詔百官日輪一貟面對講義曰輪對國家之令典也朝廷之上有如宰執侍從臺諌得以無時不言至若在下庶僚未及借玉階而面天表者且有輪對之制焉誠如是則小大諸臣悉能展盡底藴於冕旒之前矣此真治世之氣象歟罷楊舜卿在京宫觀林億年常州居住陳源撫州居住八月己丑朔安定郡王子濤薨辛卯初御行宫便殿聽政癸巳朱熹為煥章閣待制兼侍講告詞云朕初承大統未暇他圖首闢經闈詳延學士眷儒宗之在外須召節以趣歸徑登從班以重吾道爾發六經之藴窮百氏之源其在兩朝未為不用至今四海猶謂多竒擢之次對之班處以邇奧之列若程頥之在元祐若尹焞之在紹興副吾尊德樂義之誠究爾正心誠意之説豈惟慰滿於士論直將增益於朕躬非不知政化方行師垣有賴試望之於馮翊不如置之本朝召賈傅於長沙自當接以前席黃由之詞也講義曰道喪千載聖逺言湮不有先覺孰開我人皇宋火德當天離明興治列聖相承真儒輩出求其續洙泗之道統者始則伊洛之學繼是則朱文公焉講席而得若人真吾國之光華也所以哲宗元祐元年即命伊川以通直郎克崇政殿説書寧宗紹熙五年即命文公以煥章閣待制兼侍講二聖所以拳拳於大儒者無他蓋將發明乎中庸大學之正傳推而為治國平天下之事業焉耳豈徒曰誦説云乎哉熹發潭州且行且辭大略謂陛下即位之初方將一新庶政所冝愛惜名器若使幸門一開其弊不可復塞至於博延儒臣專意講學蓋將求以深得親歡者為建極導民之本思所以大振朝綱者為防微慮逺之圗蓋熹在道聞泰安朝禮尚缺近習已有用事者故以為言甲午增置講讀官以黃裳陳傅良彭龜年等為之丁酉以生日為天祐節辛丑詔曰朕惟亷吏民之表而為國之蠧民之病者莫汙吏若也不有誅賞疇示勸懲繼自今諸道司刺舉之官於郡邑文武任職之臣亷必聞汙必紏毋憚大吏毋縱私眤賞不爾靳罰不爾私其令吏稱民安副朕意焉己亥上率羣臣朝泰安宫壬寅賜講讀官詔戒以開陳經旨救正闕失皇弟許國公抦進封徐國公抦壽皇之孫也壽皇三子五孫莊文太子下曰豫國公挻魏惠憲王下曰左千牛衛大將軍攄次即抦也光宗下曰保寧軍節度使挺次即上也挻攄挺皆蚤卒抦後封吳興郡王癸卯少傅嗣濮王士歆為少師郭師禹為少傅奉國軍節度使開府儀同三司夏執中為少保乙巳詔晚講官坐講禮部侍郎許及之等請祧宣祖廟祔大行至尊壽聖皇帝詔侍從禮官集議丁未復罷經筵坐講以諸路郡縣水旱命三省條畫賑恤講義曰朝錯説漢文帝曰堯有九年之水湯有七年之旱而國無捐瘠者以蓄積多而備先具也蓋天災流行國家代有聖如堯湯且不能免水旱之憂所恃者有豫備之素焉耳國家列聖相承留心荒政既有義倉又有常平倉既有惠民倉又有廣惠倉諸倉諸藏所在充牣加以先正名臣位官郡邑又能推上德意而宣布之有如富鄭公之在青州趙清獻公之在會稽賑救有方野無餓莩載在國史班班可核也後之為國者則不然官之與民恝然如秦越之相視常平義倉僅存其名平居暇日往往為貪利移用之資脫遇凶飢搏手無䇿赤子嗸嗸惟有擠死溝壑而已重磬之室隱雷之腹誰能軫念及此邪紹熙末年以諸路郡縣水旱命三省條畫賑恤愚謂遇災而賑恤誠是也然必倉廩無移用之弊郡邑有奉行之人則旱乾水潦不足為慮茍或不然愚恐廟堂雖條畫於上而惠澤將壅遏於下朝廷號令不過為墻壁之虛文耳果何益哉辛亥趙汝愚請於近畿卜地營建至尊壽皇聖帝攢宫詔侍從臺諫禮官集議􅧪乙卯安南國王李龍􅧪加號思忠功臣詔廣西鹽額歲減十萬緡侍御史章頴罷為兵部侍郎左司諫黃受罷為工部侍郎新除煥章閣待制知建康府謝深甫為御史中丞深甫韓托胄之黨也托胄以定策功意望建節恨趙汝愚抑之有怨言簽書樞密院事羅點慰解之知臨安府徐誼勸汝愚以節度使授之汝愚悟遣人諭意於托胄托胄答語不遜遂日夜謀引其黨為臺諫官以擯汝愚汝愚踈直不虞其姦會汝愚方奏除劉光祖為侍御史方進呈知樞密院事陳騤忽奏曰劉光祖與臣有嫌今光祖入臺願先避位汝愚愕然而止托胄遂以內批除深甫為御史中丞蓋托胄與騤合謀已久特汝愚未之覺爾監察御史黃度為右正言丙辰左丞相留正罷時朱熹被召行至信州聞以內批逐首相有憂色學者問其故熹曰大臣進退亦當存其體貌或曰此蓋廟堂之意熹曰何不風其請去而後許之上新立豈可導之輕逐大臣耶至六和塔永嘉諸賢各陳所欲施行之䇿熹曰彼方為杌我方為肉何暇議及此哉是時近習用事御筆指揮皆有其漸故熹深憂之趙汝愚為右丞相丁巳詔侍從兩省臺諫各舉通亮公清不植黨與曾任知縣者二人九月辛酉司農少卿劉光祖為起居舍人丁卯大理寺主簿劉德秀為監察御史時趙汝愚奏乞令近臣舉御史許之始議除二人衆舉吳獵者最多而遊仲鴻次之德秀與韓托胄深交托胄乃諭中司令薦德秀因以內批令兼用中司所舉者一人德秀遂與吳獵並除其黨以次而進言路遂皆托胄之人一時善類排斥無餘黨禍自此起矣己巳命趙汝愚朝獻景靈宫庚午命嗣秀王伯圭朝饗太廟上以孝宗之喪故也是日羅點薨辛未合祭天地于明堂赦天下詔徒流罪人經登極赦免罪而再犯者不以明堂赦恩原免是歲孝宗大漸嘗肆赦上登極又赦至是明堂肆眚尚書省契勘一歲之間三行放赦恐有凶惡纍犯之人指恩作過故降此指揮其指揮與赦又同降但以白紙連書於黃牒前云壬申刑部尚書京鏜簽書樞密院事鏜亦韓托胄之黨也故擢用之羣憸附和視正士如仇讎於是陳傅良吳獵劉光祖等咸先後斥去矣甲戌下詔撫諭諸將改天佑節為瑞慶節己卯嗣秀王伯圭為安德崇信軍節度使壬午禮部尚書黃裳卒甲申韓托胄為宜州觀察使詔托胄歷事三朝備宣忠力可特遷二官蓋將以為承宣使也托胄自負有定䇿功覬覦節鉞意不滿上疏力辭乃止遷一官於是怨趙汝愚益深矣冬十月己丑右諫議大夫張叔椿再劾留正擅去相位詔落正觀文殿大學士庚寅改泰安宫為壽康宫辛卯命四川待置司銓量諸州守臣故事諸道守臣皆臨遣淳熙末孝宗以嶺蜀道逺始詔川廣知州軍見居川廣合闕到半年前奏事人及係見闕去處並令詣本路轉運司稟事仰漕臣精加銓量人才委堪任使非昏繆老病之人結罪保明申尚書省然諸道罕嘗舉行至是言者論漕司之權比制司為輕而其責亦不若制司之重權輕則不敢多有所廢黜責輕則不暇詳於顧計州縣不治職此之由請一付之制司權重則雖廢黜之多而有所不憚責重則顧計利害之深而不敢茍且如此則昏老病疾之人不得冒居而州縣無不治矣趙汝愚為政遂白行之是日朱熹奏事行宫便殿其一曰天下之事有常有變而其所以處事之術有經有權當事之常而守其經雖聖賢不外乎此而衆人亦可能焉至於遭事之變而處之以權則惟大聖大賢為能不失其正而非衆人之所及也乃者天運艱難國有大咎天變為之見於上地變為之作於下人情為之哀恫怫鬱而皆有離畔散亂之心是則所謂天下之大變而不可以常理處焉者也是以太皇太后躬定大䇿皇帝陛下寅紹丕圖而鄉之危者安離者合天下之勢翕然而大定此亦謂處之以權而不失其正矣然至今三月而天變未盡銷地變未盡弭君親之心未盡歡學士大夫羣黎百姓或反不能無疑於逆順名實之際猶有可諉者亦曰陛下之心前日未嘗有求位之計今日未嘗忘思親之懷而已此則所謂道心微妙之全體天理發用之本然而所以行權而不失其正之根本誠能充吾未嘗求位之心則可以盡吾負罪引慝之誠充吾未嘗忘親之心則可以致吾溫清定省之禮終始不越乎此而大倫可正大本可立矣至於問安視膳之行十日一至而不得見則繼以五日五日一至而不得見則繼之以三日三日而不得見則二日而一至以至於一日而無不至焉俯伏寢門怨慕號泣雖勞且辱有所不憚然而親心猶未底豫慈愛猶未復初逆順名實之際不渙然而冰釋則臣不信也其二言帝王之學其三言湖南財計其四言湖北徭人侵擾事乙未詔曰朕以不德嗣承大寶夙夜祇畏不遑寧處乃者陰陽繆盩雷震非時淫雨為災朕心甚懼推尋厥咎未知其繇凡朕躬有過失朝政有闕違其令臺諫侍從各條數以聞無有所隱庚子以久雨命大理三衙臨安府兩浙州縣決繫囚釋杖以下辛丑減兩浙江東西路和買折帛錢蠲兩浙路丁鹽身丁錢一年雅州嚴道縣沙平徼外夷與碉門寨才隔一水而寨在州西八十里沙平凡六族其地有胡盧里歲輸稅米百二十斛於碉門乾道間夷人髙奴吉作亂焚碉門宣撫使王公明出榜碉門撫諭夷人聽命自是捐胡盧里之稅與之而沙平悉為夷人有矣至是兀嶺夷人因沙平以叛土丁以神臂弓射退之制置司命閉禁門者月餘夷人糧盡乃就降是日命朱熹講大學熹奏云臣伏見近制每遇隻日早晚進講及至當日忽值假故即行權罷又按故事將來大寒大暑亦係罷講月分陛下天性好學晨夕孜孜雖處深宫必不暇逸欲乞今後除朔望旬休及過宫日外不以寒暑雙隻日月諸色假故並令遂日早晚進講內有朝殿日分恐聖躬久坐不無少勞却乞權住當日早講一次從之熹每進講務積誠意以感格上心以平日所論著者敷陳開析坦然明白可舉而行講畢有可以開益上德者罄竭無隱上亦虛心嘉納焉甲辰趣後省看詳應詔封事翌日朱熹奏云臣前日面奏恭奉詔旨以雷雨之異許陳闕失仰見陛下畏天省已之意切見陛下登極之初已下明詔來獻言者甚衆未聞一有施行今復求言殆成虛語乞令後省官鎖宿看詳擇其善者條上取旨以次施行庶幾聞者知勸直言日聞詔差沈有開劉光祖看詳限十日聞奏乙巳上大行至尊壽皇聖帝諡曰哲文神武成孝皇帝廟號孝宗詔以永思陵之東南為至尊壽皇聖帝攢宫紹興初六飛駐越昭慈聖獻皇后上賔因卜地權攢于會稽上皇村蓋便於修奉也及卜祜陵遂就其側併舉顯肅憲節二后祔焉顯仁髙宗繼從其兆則迫隘已甚矣髙宗之葬也趙汝愚時守蜀手疏論會稽􅑼宫淺薄可為深憂宜復祖宗山陵之制朝論不從於是自昭慈之西連用五穴山勢漸逺其地愈卑矣孝宗將􅑼汝愚為樞密使建議以􅑼宫本非永制實居淺土蔽以上宫初期剋復神京奉遷神駕雖其志甚美而其事實難且死者無終極國家有廢興豈宜徒徇虛名以基實禍識者深以為然時日官荆大聲已卜地思陵之傍開深五尺下有泉石按行使趙彥逾以為土肉淺薄不可用汝愚乞改卜意欲以中軍寨為之而宰相留正以為不然於是彥逾與覆按使謝深甫附其説乃命大聲改卜於新穴之東視新穴才髙一尺一寸五分而已孫逢吉為覆按使還言當少寬時日别求吉兆而內庭左右以久居喪次內外不便皆主速葬之説乃詔侍從臺諫限三日進議議者皆言神穴未安自合展期改卜况朝廷禮文何嘗盡循古制豈必拘七月之期奏劉光祖所草也朱熹時在經筵復上議狀云切惟至尊壽皇聖帝聖德神功覆冒寰宇深仁厚澤浸潤生民厭世上賔率土哀慕冝得吉土以奉衣冠之藏垂裕後昆永永無極而議論紛紜迄無定説皆緣專信臺史而不廣求術士必取國音坐丙向壬之説而不博求名山以禮而言則記曰死者北首生者南向皆從其朔又曰葬於北方北首三代之達禮也則是古之葬者必坐北而向南孝子之心不忍死其親雖葬於墓猶欲其負陰而抱陽也豈有坐南向北反背陽而向陰乎若以術言則凡擇地必先論其主勢之強弱風氣之聚散水土之淺深穴道之偏正力量之全否政使實有國音之説亦必先此五者然後其術可得而推今乃信其庸妄之偏説但以五音盡類羣姓而謂冡宅向背各有所冝乃不經之甚者不惟先儒已力辨之而近世民間亦多不用今以為祖宗以來世守此法順之則吉逆之則凶然自永安遷奉以來遵用此法而九世之間國統再絶靖康之變宗社為墟若曰其法果驗則洛越諸陵無不坐南而向北固已合於國音矣又何吉之少而凶之多耶臺史之言進退無據類皆如此又言今穴視前穴髙一尺一寸五分則是開至六尺一寸五分即與舊穴五尺之下有水石處髙低齊等如何却開至九尺而其下二尺八寸五分者無水石耶臣自南來經由嚴州府富陽縣其江山之勝雄偉非常説者又言臨安縣乃錢氏故鄉山川形勢寬平邃密此必有佳處可用而臣未之見也切見近年地理出於江西福建為尤盛望下兩路帥臣監司疾速搜訪量給路費多差人兵轎馬津遣赴闕令於近甸廣行相視擇一最吉之處以奉神靈萬世之安其孫逢吉所謂少寬日月别求吉兆為上此十字者實為至論臣非敢妄以淫巫瞽史之言眩惑聖聽誠不忍以壽皇聖體之重委之水泉沙礫之中殘破浮淺之地是以痛憤激切一為陛下言之疏入不報其後卒定永阜陵于會稽焉丙午郤瑞慶節賀表從朱熹之請也前一日晚關報來日百官上表稱賀熹欲不出不可乃草劄子明日立班投進略云壽皇梓宫在殯陛下追慕方新乃以此時講行賀禮覩此闕失心實未安欲望聖慈速賜傳旨便令權免其表亦不收接庶幾上廣孝治益隆聖德風示四表垂法萬世有旨却賀表不受熹尋奏前日賀表雖降出而未降指揮今後合稱賀事三年之內並與權免其節序變遷百官並合進名奉慰庚戌改上安穆皇后諡曰成穆皇后安恭皇后諡曰成恭皇后壬子遣太常少卿曾三復賀金主正旦丙辰上孝宗哲文神武成孝皇帝册寶于重華殿成穆皇后成恭皇后册寶于本室是月詔修葺舊東宮為福寧殿以備移御朱熹彭龜年等請罷之閏月戊午朔朱熹進講大學至盤銘日新因論成湯有盤銘武王有丹書皆人主憂勤警戒之意丹書蓋出大戴禮武王踐阼篇上曰近有人進入此書因命小黃門取示蓋黃庭堅所書墨迹云庚申吏部尚書鄭僑等請併祧僖宣二祖正太祖東嚮之位詔從之國朝自太祖追王僖順翼宣四祖以來每遇禘祫祖宗以昭穆相對而虛東嚮之位王安石為政建議僖祖以上世次不可知則僖祖之有廟與后稷疑無以異當時諸儒如韓絳輩辨之不從熙寧八年夏禘于太廟以僖祖東鄉自是無敢議者南渡後董坌王普尤袤俱請正太祖東鄉之位未克行先是英宗祔廟已祧順祖欽宗祔廟又祧翼祖及髙宗升祔遂為九世十二室至是孝宗將升祔趙汝愚當國議欲併祧僖祖三祖於是僑等上此議又奏請立僖祖别廟以順翼宣三祖神主祔藏時朱熹在講筵獨入議狀條其不可者四條上召對仍於榻後取文書一卷曰此卿所奏廟議也可細陳其説熹先以所論畫為圖本貼説詳盡至是出以奏陳久之上再三稱善且曰僖祖自不當祧髙宗即位時不曾祧壽皇即位亦不曾祧太上即位時又不曾祧今日豈可容易可於榻前撰數語俟徑批出施行熹方懲內批之弊因乞降出劄子再令臣僚集議上亦然之既退即進擬詔意以上意諭廟堂則聞已毁四祖廟而遷之矣時汝愚既以王安石之論為非異議之徒懼其軋已藉以求勝事竟不行於是熹遺汝愚書曰相公以宗支入輔王室而無故輕納鄙人之妄議毁拆祖宗之廟以快其私其不祥亦甚矣欲望神靈降歆垂休錫羡以永國祚於無窮其可得乎時太廟殿已為十二室故孝宗既升祔而東室尚虛熹以為非所以祝延壽康之意深不然之因自劾不堪言語侍從之選乞追奪待制章再上詔次對之職除授已久與廟議初不相關不許及光宗祔廟遂復為九世十二室云蓋自昌陵祔廟踰二百年而後正太祖之位自是年冬始而别建一殿以奉祧主于大殿之西隅歲命禮官薦獻焉今謂四祖殿者是也講義曰按朱文公廟議曰僖祖祧主遷於治平不過數年神宗皇帝復奉以為始祖已為得禮之正而合於人心所謂有其舉之而莫敢廢者也又擬為廟制以辨議者一旦併遷僖宣二祖析太祖太宗為二之失復引元祐大儒程頤之説以為物豈有無本而生者今日天下基本蓋出僖祖安得為無功業議狀既上廟堂持之不以聞即毁撤僖宣廟室更造别廟以奉四祖宰相既有所偏主而樓鑰陳傅良又復牽合裝綴以附其説然經生學士知禮者皆是先生焉辛酉晚講侍講朱熹因奏曰臣所進講大學口義不審曽經聖覽否上曰宫中無事常看又奏陛下於臣妄説有所疑否上曰説得甚好無可疑又奏萬幾事煩恐講義卷軸大難於披覽欲寫成册子進入以便反覆觀考上欣然曰正欲與卿説作册子來可速進入久之未敢上因入講上忽宣諭曰向日令卿寫講義册子何久不進入奏曰未奉進止未敢遽上上曰速進來初熹既寫成册子欲點句讀而未敢啓上忽曰可一就點成句來奏曰容遵稟進入既進上一日講畢奏曰臣所進入講義册子必經聖覽上頷之又奏不知於聖意如何上欣然曰看來緊要處只在求放心耳熹頓首曰聖學髙明宣諭極是老師宿儒窮日竟月不曽見得此意説得此語陛下天縱生知拈出此求放心語正是聖學要領願推之以見於實行不患不為堯舜之君也他日熹又奏疏言願陛下日用之間語默動靜必求放心以為之本而於玩經觀定已用力處益用力焉數召大臣如仁宗開天章閣故事至於羣臣進對亦賜溫顔反覆詢訪以求政事之得失民情之休戚而又因以察其人才之邪正短長庶幾於天下之事各當其理矣乙丑右司貟外郎林季友為金國報謝使左領軍衛將軍郭正已副之戊辰金主遣使來弔祭辛未遣職事官二貟核實鎮江府建康池鄂江州樁管錢米乙亥工部尚書趙彥逾為端閣殿學士知建康府趙汝愚之定大計也遣彥逾逹意於殿帥郭杲事既定彥逾冀汝愚引已同升已而外除彥逾怨之遂與韓托胄合未幾改除四川制置使彥逾愈恨入辭疏廷臣姓名于上指為汝愚之黨曰老奴今去不惜為陛下言之於是上亦有疑汝愚意矣賜史浩諡曰文惠戊寅侍講朱熹以上疏忤韓托胄罷御批云朕憫卿耆艾方此隆冬恐難立講已除卿宫觀可知悉趙汝愚獨袖內批還上且諫且拜托胄必欲出之汝愚退求去不許托胄使中使王德謙封內批以授熹熹即附奏謝遂行給事中樓鑰封還録黃舍人鄧馹面奏乞留熹上許除京祠已而不下起居郎劉光祖又言之中書舍人陳傳良再封還録黃有旨除熹寶文閣待制與郡劉光祖再上疏留行不報樓鑰再封還録黃有旨依已降指揮傳良疏中獨有朱熹論事頓繁迂闊之語蓋托胄嘗言陛下千乘萬騎而熹乃欲令一日一朝豈非迂闊故時議謂傳良因廟議不合陰肆中傷云工部侍郎兼侍講黃艾因講問逐熹之驟上曰始除熹經筵耳今乃事事欲與艾悃請再三不已吏部侍郎兼侍講孫逢吉上疏留熹又因講權與之詩反覆以諷上曰朱熹所言多不可用時托胄欲用優人王喜為閣門祗候逢吉誦言將入諌乃止蓋托胄嘗令喜於禁中效熹容止為戲熒惑聖聽者故也監察御史吳獵入劄子乞留熹不報登聞鼓院遊仲鴻上言朱熹海內名儒首蒙收召四方傳誦以為天下大老歸之才四十餘日復有宫祠之命逺近相弔以為天下大老去之則人誰不欲去者若正人盡去陛下何以為國願亟還朱熹無使小人得志飬成亂階時托胄勢方盛人皆為仲鴻危之熹以十月辛卯入見中間進講者七內引留身奏事者再面對賜食各一在朝甫四十有六日講義曰甚矣君子之道難行而小人之姦易售也昔哲宗初年伊川先生入在講筵未幾羣吠紛紜遂有西監之除今寧宗新政晦庵先生入侍經幄未幾權幸􅎱嫉遽有官觀之命嗚呼此小人排擯道學之漸歟自是而後臺諫揮彈一則曰偽學二則曰偽黨己醖釀於此時矣熹被召之初奏事行宫便殿有曰發號施令無一不出乎朝廷進退人才無一不合乎公論不為偏聽以啓私門則孽蘖之萌不得作矣今日之計莫大於此又再三面言之又約吏部侍郎彭龜年同請對因發托胄之姦適龜年出護使客托胄益得為計熹纍曰汝愚當以厚賞酬其勞勿使預朝政且有分界限立紀綱防微杜漸謹不可忽之語汝愚方謂其易制不之虞仲鴻汝愚客也力諫不聽而所倚為腹心謀事者又皆持祿茍安無復逺慮右正言黃度欲論托胄謀泄以內批斥去熹不勝憤遂因講畢奏疏極言四事其一略曰聞有旨修葺舊日東宫為屋三數百間外議皆謂陛下意欲速成早遂移蹕以為便安之計臣恐不惟上帝震怒災異數出正當恐懼修省之時不惟興此大役以咈譴告整動之意亦恐畿甸百姓飢餓流離阽於死亡之際忽見朝廷大興土木修造宫室但以適已自奉為事而無矜惻憫憐之心或恐怨望忿切以生他變不惟無以感格太上皇帝之心以致未有進見之期亦恐壽皇在殯因山未卜几筵之奉不容少弛太皇太后皇太后晨昏之飬尤不可缺而四方之人但見陛下大治宫室速得成就一旦翩然委而去之六軍萬民之心必有扼腕而不平者矣此臣之所大懼也其二略曰壽康定省之禮邇日一再過宫亦未得見泛然而往泛然而歸太上皇帝聞之必以為此徒備禮而來實無必求見我之意其深閉固拒而不肯見固亦冝矣又聞太上皇后懼忤太上皇帝之意不欲其聞太上之稱又不欲其聞內禪之説若但一向如此則父子之間上怨怒而下憂懼將何時而已乎此又臣之所大懼也其三略曰朝廷紀綱尤所當嚴今陛下即位未能旬月而進退宰執移易臺諫皆出於陛下之獨斷大臣不與謀給舍不及議正使實出於陛下之獨斷其事悉當於理亦非為治之體况中外傳聞皆謂左右或竊其柄而其所行又未能盡允於公議此弊不革臣恐名為獨斷而主威不免於下移欲以求治而反不免於致亂蓋自隆興以來已有此失臣嘗再三深為壽皇論之尚賴壽皇聖性聰明更練世事故於此輩雖以驅使之故稍有假借實亦陰有以制之未至全墮其計然積習成風貽患於後其害己有不可勝言者如陳源袁佐之流皆陛下所親見奈何又欲襲其迹而蹈之乎此又臣之所大懼也其四略曰殯宫之卜偏信臺史之言而不復廣詢術人以求吉地既不為壽皇體魄安寧之慮又不為宗社血食久逺之圖夫以壽皇之豐功偉烈百世不忘而所以葬之如此其草草也豈不大咈天人之心以致變異之頻仍而貽患於無窮乎此又臣之所大懼也臣老病之餘寒齋獨宿終夜不寐憂慮萬端至於孤危之蹤不敢自保切恐自今以往不獲久侍清間之燕矣疏入托胄大怒陰與其黨謀去其為首者則其餘去之易耳所謂首者蓋指熹也熹時急於致君知無不言言無不切亦頗見嚴憚於是托胄之計遂行及熹講筵留身再乞施行前疏退則內批徑下矣未幾除知江陵府湖北安撫熹辭不拜乃除提舉南京鴻慶宫詔兩省臺諫侍從各舉宗室有文學器識者二人壬午詔曰親君子逺小人慶厯元祐之所以尊朝廷也省刑罰薄稅斂慶厯元祐之所以惠天下也朕幸業承祖武而敢一日忘此乎掇取美號於以紀元其以明年為慶元元年十一月甲午安南國王李龍􅧪加濟美功臣丙午車駕自重華宫還大內庚戌韓托胄兼樞密都承旨辛亥雨水冰戊申詔均內外任時趙汝愚當國言者以為今賢士大夫往往不樂為外官蓋外權太輕雖欲有所施設而不得騁故也今日之勢莫若稍重外重外之術必使帥漕總領可以馴致於從官而後可久任可久任而後可以責事功詔可未幾汝愚去位亦不克行詔曰三年之喪古有彛制朕勉承為後寅紹邦圖仰孝宗之家法具存冝眇躬惟古道是復以盡厚終之義以昭尊祖之誠朕當遵用三年之制其令禮官條具典禮以聞初髙宗之喪孝宗為三年服及孝宗之喪有司請於易月之外用漆紗淺黃之制蓋循紹興以前之舊朱熹之在講筵也不以為然奏言今已往之失不及追改惟有將來啓􅑼發引禮當復用初喪之服則其變除之節尚有可議望明詔禮官稽考禮律豫行指定其官吏軍民方喪之服亦冝稍為之制勿使肆為華靡其後詔中外百官皆以涼衫視事蓋用此也初熹上議時門人有疑者熹未有以折之後讀禮記正義喪服小記為祖後者條見其所引鄭志有諸侯父有廢疾不任國政不任喪事之問而鄭答以天子諸侯之服皆斬之文乃知經文有所未備而待於傳注者如此因自識於本議之後云升明州為慶元府乙卯孝宗皇帝權􅑼於永阜陵十二月丁巳朔禁民間妄言宫禁事己未淑妃張氏薨乙丑吏部侍郎彭龜年上疏言韓托胄假託聲勢竊弄威福乞黜以解天下之疑讀劄子畢又奏只緣陛下近日逐得朱熹太暴故欲陛下亦亟去此小人毋使天下人謂陛下去君子如此之易去小人如此之難上初欲兩罷之汝愚開陳欲兩留之既而內批彭龜年與郡節度使吳琚嘗言時上無堅留托胄意使有一人繼之則去之必矣托胄既留勢益張因欲併逐汝愚而難其名或教之曰彼宗姓誣以謀危社稷則一網盡矣托胄然之戊辰以陳康伯配享孝宗廟庭李心傳曰光堯之祔廟也楊廷秀獨謂張魏公有復辟功不與配食為非宜與洪景盧爭之不能得固乞補外洎孝宗祔廟議者復推陳魯公而魏公終不得預蓋但以富平淮西符離三敗之故而不考曹彬岐溝之役其喪師蹙國亦不下於富平與符離今以一眚掩其大德蓋景盧兄弟皆湯思退舊客夙有憾於魏公故以復辟之勳歸之吕元直也己巳陳騤罷庚午余端禮知樞密院事京鏜參知政事吏部尚書鄭僑同知樞密院事彭龜年罷韓托胄進一官與在京宫觀趙汝愚請留龜年不聽辛未劉德秀劾劉光祖罷癸酉金主遣使來賀登位名孝宗廟樂曰大倫之舞甲戌祔孝宗神主于太廟丁丑德音降臨安紹興府死罪以下囚釋杖以下民緣􅑼宫役者蠲其賦癸未金主遣使來賀明年正旦是歲兩浙淮南江東西路水旱蠲其賦賑之宋史全文卷二十八
