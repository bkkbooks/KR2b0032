body:
  text: 宋史全文卷二十四上宋孝宗一癸未隆興元年春正月壬辰朔詔改元詔觀察使以上各舉所知之士三人三省樞密院詳議立定薦舉格式謀略沈雄可任大事寬猛適宜可使御衆臨陳驍勇可鼓士氣威信有聞可守邊郡思智精巧可治器械已上五等令曽立軍功觀察使以上薦舉通習典章可掌朝儀練達民事可任郡寄諳曉財計可裕民力持身亷潔可律貪鄙詞辨不屈可備奉使已上五等令非軍功觀察使以上薦舉如被舉之人成立功效其舉官取旨推賞如或敗事亦加責罰是月參知政事史浩為右僕射同平章事兼樞密使判建康府張浚為樞密使仍都督江淮軍馬時敵將萬户蒲察徒穆及偽知泗州大周仁屯虹縣都統蕭琦屯靈璧浚謂至秋必為邊患當及時掃蕩詔吳璘可進可退當從便宜新知永州陸亷恃貸命不刺面配韶州仍籍沒家財以前知滁州在任贓汙不法也刑部侍郎路彬言官吏有雖犯贓不至永不收敘者及未嘗經勘斷止是約作贓罪者乞依赦與敘元官詔刑部將犯贓罪入第一等人不許敘復餘依常法也二月丙寅臣僚言欲淸入仕之源莫若減任子之法詔臣僚任子見遵祖宗法度理難遽改可令吏部嚴銓試之法自今初官不許用恩例免銓試呈試並候一任回方許收使雖宰執亦不許用恩例陳乞回授初官免詞庚辰詔曰朝廷先降本錢付諸軍回易正欲贍給軍用應將帥當召募幹人經營回易訪聞諸軍盡將官兵強給本柄營私圖利百端抑勒自今後如敢仍前必重置典憲臣留正等日養兵以待用平居之日瞻之必周然後有用之際可以盡其死力李牧之守邊軍市租盡以給士卒諸軍回易為此設也後之將帥未能以市租饗士反以回易之貨抑逼之拘其廪給痛刻削以自豐其可容哉壽皇初元首下明詔如日之明如霆之震飬兵御將誠得其道也壬午詔已降指揮今舉諸科進士務取學術深淳文詞剴切策畫優長之人可令禮部將今來省試上十名策場卷子編類繕寫成册投進以備親覽如有可行事件當下三省取旨施行三月丙申詔祖宗嘗御便殿親閲衛士蓋以嚴宿衛之重練爪牙之士以備征討應諸班直殿前馬步軍司舊管禁軍可自今特選強壯披帶教閲其管軍合各條具訓練格法申密院取旨乙巳臣僚輪對奏言國家設科取士猶慮其有未盡又於隱逸必欲羅而致之真宗起种放於華山哲宗起程頤於伊洛光堯起尹焞於川蜀欲望盛時博訪遺逸從之詔略曰朕嗣位之初驛召旁午凡搢紳之老儒林之秀莫不明揚顯擢布列中外尚念山林之際漁釣之間豈無荷篠濯纓之倫飯牛版築之士或自晦於卜祝或沉痼於煙霞部刺史二千石為朕搜羅其有懷瑾握瑜埋光鏟采迹其行實咸以名聞朕將厚禮特招虛懷延納癸丑吏部言欲依白劄子所乞將諸縣分繁簡難易令本州長吏依監司法察令之能否隨宜對換其在州并管下縣見任官若有才能堪充知縣者亦依此對換以上各不理遺闕如對換不實或輒徇私意或有才不稱職之人仰所屬監司將長吏按劾從之甲寅殿中侍御史胡沂上言陛下注意將臣定為十等令觀察使以上及統制官各舉所知然武舉唱第名在一二者固蒙褒擢餘皆授以𣙜酤征商之事臣觀唐之郭子儀以武舉異等初補左衛長史歷為振逺橫塞天德軍使祖宗時試中武藝人並赴陕西任使又武舉中選人或除京東捉賊或邊上任使或三路沿邊試其效用或經略司教押軍隊準備差使乞取近歲應中武舉之人分差沿邊屯駐將下準備差使等詔從之乙卯詔略曰朕自踐位首行曠澤續降寬恤十八事而郡縣之間不為布宣繼自今其各洗心滌慮恭爾有官俾豫一人實惠孚於百姓庚申詔霖雨為沴雖側身修行尚恐誠意未孚可令諸路監司守令應遇災傷去處常切賑恤困窮紏察刑禁是月雨雹召都督江淮軍馬張浚赴行在浚中道上疏謂廟勝之道在人君正身以正朝廷正朝廷以正百官正百官以正萬民今德政未洽宿弊未革願發乾剛盡循太祖太宗之法上詔浚當先圖兩城邊患既紓弊以次革夏四月乙亥詔軍興以來應朝廷科降并督視行府兩淮節制司江淮宣撫司都督府收買軍須蓋造營寮之類並係科撥經總制及支降激賞錢銀於州縣和買計置尚慮官吏因緣掊斂不即還直許令人户越訴仰所屬監司按治以聞己卯詔應客販耕牛過江往淮南州縣仰經所屬自陳給據與免本處投契及沿路并所至收稅并免收船渡錢有違戾去處監司按劾壬午右正言周操奏臣近奏方今強國在強兵強兵在豐財豐財在節用乞陛下躬行於上以身先之聖意俞允令臣詳具合行裁減之數以聞欲乞依倣寶元慶歷故事特降指揮委差户部長二及臺諫同共往來詳議條畫應宫掖用度許行取會斟酌裁減庶幾內外一體人無異辭詔從之都督江淮軍馬張浚奏楚州并漣水軍接海州界多有淮北及山東莊農將帶老幼或牛具散在沿淮欲從朝廷委自兩淮帥臣行下所部州軍責令知縣縣令多方措置招誘耕作若能招及三百户知縣縣令除到任任滿賞外與轉一官知通減半若過此數並與滿賞詔從之丁亥給事中金安節奏事上曰近日都不見繳駁有所見但繳駁來朕無不聽詔有司所行事件並遵依祖宗條法及紹興三十一年十二月十七日指揮更不得引例及稱疑似取自朝廷指揮如敢違戾官吏重作施行丁亥吏侍凌景夏等言看詳到百官應詔可行事件數內一考課所以别能否也祖宗鑒月限遷敘之弊非有勞者未嘗進秩故當時任作坊副使有十餘年者任右補闕有十六年者任御史中丞有十二年者比年以來仕於朝或季一遷或月一改居官而書考者鮮矣况三考乎外之監司郡守小州換大州西路易東路送往迎來袛益擾攘臣願用祖宗久任之法則能否可以悉得矣詔三省密院檢坐紹興二十八年手詔行下是年十一月庚戌降詔己丑侍臣看詳到百官應詔旨言事侍從卿監所舉縣令不公欲令歲考縣令之課以上之考不以實令御史紏劾其縣令有治績與不任職者不特賞罰其人并與其舉者而賞罰之庶幾舉者不敢徇私而被舉者無不竭力詔從之是月始限選人改官每歲八十員尋又增二十員賜進士第自木待問已下五百餘人及第出身有差五月甲午詔自今以薦舉上書登對真材實能無吝褒權其餘令籍記姓名以俟選擇無狀者罷之仍追坐繆舉從中書門下檢正余時請也以王十朋為侍御史十朋奏疏略曰聖人之德無以加孝而天子之孝莫大乎光祖宗而安社稷歷代帝王守成中興雪恥復讎之迹不同其功光祖宗孝安社禝則一而已靖康之禍臣子有不忍言者恭惟陛下天資英武慨然以興復為念竊聞每對羣臣論天下事則曰當如創業時又曰當以馬上治之又曰某事當俟恢復後為之臣比因宣召語及祖宗陵寢聖容慘然三四十年矣臣仰知陛下之心真夏少康商髙宗周宣王漢光武之心也奈何在位之臣不知忠孝大節復欲蹈昔日姦臣之覆轍屈主以和夙世之仇讎指祖宗中原之土為敵人之土謂不當取指祖宗中原之人民為敵之人民謂不當納又取秦隴已復之地無故而棄之以資寇讎以絶生靈歸附之望臣願陛下推誠盡孝終始如一言動之間不忘社稷食息之頃必念祖宗側身修行上以承天意興衰撥亂下以慰人心任賢勿二去邪勿疑以革前日圖任之失有善必賞有惡必罰以振今日紀綱之弊仍下詔音戒敕有位陛下既率之以孝羣臣咸應之以忠如是則可以動天地可以通神明可以慰祖宗在天之靈可以無負太上皇帝付託之意矣中原何患乎不復中興何待乎以日月兾耶辛丑起居即胡銓直前奏事云臣罪廢二十六年陛下登極首蒙召除曽未旬浹又擢左史上曰卿被罪許時可謂無辜朕自知卿與王十朋銓曰臣與十朋不同十朋陛下潛邸之舊且其材可用上曰潛邸亦有不當用者如十朋非朕私之其人實可用也近日除臺官外議如何銓曰外人鼓舞謂陛下得人上曰卿與十朋皆朕親擢也臣留正等曰人主以知人為明人臣以親權為重夫援之於常流而置之通顯不由進擬不自掄薦非知之實深而其人足以大厭人望能免人之議其私乎太宗皇帝嘗書向敏中張詠二名付中書曰此二人名臣朕將用之其後皆卓然為時偉望太宗知人之明至今誦之隆興之初起胡銓於左史擢王十朋於臺端中外竦動咸服聖明之鑒正人登用朝廷益尊具得祖宗用人之意矣銓奏今之文職廢壞其尤甚者有四一曰進史不當二曰立非其地三曰前殿何立四曰奏不直前有旨前殿依後殿輪左右史侍立餘依舊制壬寅新授兩浙提舉市舶王端朝進對論中興創業守文上曰三者雖異其實一道人君不可驕縱若驕縱則一事不成己酉四川安撫制置使沈介言四川宿兵三十年矣民力凋弊殆將不支欲望因錢引之換界究失亡之總數勿以他補專用蠲四川征斂之尤甚者輔以度牒稱提之則歲可減百萬之斂乞委臣措置然後條具其合蠲之實瑣科奏聞詔從之辛亥天申節上率羣臣詣德壽宮上壽自是歲如之議者以欽宗服除當舉樂禮部侍即黃中曰臣事君猶子事父禮親喪未葬不除服春秋君弒賊不討則雖葬不書以明臣子之罪况今欽宗實未葬也而可遽作樂乎又白宰相曰太上皇帝於欽宗親弟昆且嘗北面事之有君臣之義尤恐非所安也事遂寢乙卯詔曰永惟國步之艱越在海隅之阻間者亟馳於使驛庶幾少戢於兵鋒而邊候屢驚敵情未革既搖蕩於秦隴復窺伺於荆襄爰奮厲於諸軍以肅淸於舊壤靡待前茅之警備將臨細栁以勞師副上皇與子之心攄列聖在天之憤事諏龜筮躬御戎車眷言淸蹕之初申飭攸司之衆各揚乃職明聽朕言毋徭役以煩民毋誅求以剝下佇成嘉績迄底丕平是月申禁銷金鋪翠及祠神僣擬踰制等事右僕射史浩罷知紹興府尋奉祠浩以不與出師之議力丐免侍御史王十朋亦有言也命張浚兼都督荆襄汪徹召赴行在侍御史王十朋論太府丞史正志之罪詔罷之時張浚欲命李顯忠邵宏淵引兵進取而史浩數從中止之因城瓜洲白遺正志以太府丞視之正志合兩淮帥守監司備諭以廟堂指意正志有口辨既見浚亦云云而浚之意不回浩亦數因書為言兵少而不精二將未可恃浚不聽時上意方鄉浚故浩拜右僕射而浚亦有樞使都督之除會上將之進取命從中出三省樞院不預浩遂丐去而正志亦罷斥云復靈壁虹縣及宿州時張浚命李顯忠出濠州以趨靈壁邵宏淵出泗州趨虹縣浚自往臨之顯忠至靈壁敗其都統蕭琦宏淵圍虹縣降其統軍富察圖們及同知大周仁乘勝進克宿州浚恐盛夏人疲急召顯忠等還師而上亦戒諸將以持重皆未逹偽副元帥赫舍哩志寧率兵至顯忠與戰連日未決諜報敵大興河南之兵將至會宏淵與顯忠又私其金帛不以犒士士憤怨漸潰遂引而歸虜亦解去浚時在盱眙去宿州不四百里傳云敵且至浚亟北渡淮入泗州撫將士已乃還維揚上疏待罪龜鑑曰壽皇即政之初即曰張浚入對遂除江淮宣撫使上勞之日久聞公名今朝廷所恃惟公而浚見上英武力陳和議之非此與髙宗詔用李綱同一義然綱一出而為汪黃所沮浚一出而為史浩所沮惜乎隆興元年張浚召赴行在及時掃蕩壯哉斯言下詔親征不惑羣議命李顯忠趨靈壁一鼓而偽都督敗命邵宏淵屯虹縣再鼓而偽將降建炎以來十四處戰功皆未有今日符離之一舉者蓋向者因其來而後與之戰今則堂堂之陳正正之旗往而征之傳所謂先人有奪人之心非不得已而後戰也孝宗謂數十年無此克捷胡銓謂四十年未有此舉虜人緣此震懾知吾君有大有為之志知廟謨有出不意之竒知邊鄙有折衝敵愾之將王十朋又為陛下用兵為祖宗陵寢暴露而舉為徽宗欽宗復讎而舉為二百年境土而舉為中原弔伐而舉此豈嘗試僥幸者之為哉六月庚申朔日有食之侍御史王十朋為吏部侍即先是十朋言天資愚戇不達時宜獨抱孤忠每懷憂憤自從總角身在草茅聞金人長驅中原陷沒未嘗不痛心疾首與之有不共戴天之讎及聞秦檜用事辱國議和嘗思食其肉以快天地神人之憤臣素不識張浚聞浚天資忠義誓不與敵俱生臣實敬之慕之前年備員館職嘗因輪對首言金必敗盟乞用浚等金果南牧太上皇親征起浚知建康府陛下嗣位以江淮都督之任委之天下皆以為當惟史浩之徒不悅臣去年十一月被召至闕首以恢復大計仰贊聖斷又乞陛下委浚以圖成功陛下不以臣言為非每蒙聽納浚遣二將取靈壁虹縣及取宿州降三大將一月三捷議者皆服陛下英斷任浚為難及聞王師不利而還幸災樂禍者橫議蜂起臣又言陛下用兵為祖宗陵寢暴露而舉為徽宗欽宗復讎而舉為二百年境土而舉為中原弔民伐罪而舉與古帝王好大喜功開邊生事者不同投機而進知難而退固不以一衄為羣議所搖然異論紛紛不肯置浚臣不合妄贊恢復又不合乞委任張浚乞正臣妄言之罪罷御史職事仍賜竄殛以塞羣議又言聞近日陛下欲遣龍大淵撫諭淮南信否上曰無之十朋奏唐以中官監軍卒為亂階上曰未嘗有此十朋又奏近又聞欲以楊存中充御營使上默然遂有是除尋出知饒州下罪已詔以宿州之師失利也張浚降特進改宣撫使參贊陳俊卿唐文若以下各降兩官邵宏淵李顯忠以下降罰有差浚留維揚大飭兩淮守備上復命栻奏事浚因乞骸骨上見奏謂栻曰雖乞去之章日上朕決不許朕待魏公有加不為浮議所惑上對近臣未嘗名浚獨曰魏公壬申胡銓奏事讀劄子至半上曰秦穆公殽之敗匹馬隻輪無返者尚能一戰而霸讀至晉武平吳何曽知其將亂隋文平陳房喬知其必亡上曰二君皆恃安平驕淫至此丁丑進呈軍人襄陽屯田上曰此可罷陳康伯奏曰汪徹措置屯田頗就緒但不當役戰士洪遵奏正合募人願耕者上曰指揮更添入不得抑勒秋成所得依舊與之己卯張浚言官兵因戰鬪重傷廢疾不堪披帶之人望許令子弟親戚承襲從之丁亥詔守令監司出入阡陌勸課農桑以殖財阜民則賞不汝遺厥或怠惰邦有常刑必罰無赦秋七月庚寅朔以虞允文為湖北京西制置使允文尋上疏言臣切惟藝祖皇帝創業之初削平諸國首會襄陽之兵以取荆南蓋天下勝勢所在先得之則雄視吳蜀一統之初實始於此自古以來蜀以重山為險吳以長江為險而荆襄之地平原廣袤以兵為險道路錯出不以數計而其大者有六自陜虢出盧氏可以直抵歸州自光化出茨湖可以直抵夷陵自汝州出新野可以直抵襄陽自唐州出棗陽可以直抵郢州自蔡州出信陽之三關可以直抵德安府自陳州出宛丘新息可以直抵光黃皆當以兵為險之地也而今之備兵反薄於守吳守蜀之數一失枝梧虜勢橫潰吳蜀之形釐而為二屯兵雖多首尾莫應伏願陛下下臣之章於腹心大臣議所以益兵之策庶幾不失藝祖所以先重荆襄之意為陛下恢復之基天下幸甚以湯思退為右僕射同平章事兼樞密使以旱蝗星變詔近臣條上闕政起居郎胡銓請勿徼福佛老躬行周宣政事罰監司守令之貪殘者中書舍人直學士院劉珙疏言當信賞必罰以肅將帥之心痛懲刻剝以固士卒之志節浮冗練軍實精擇郡守誅鋤贓吏以厚吾民之生而是數者之得失則又係人主之心誠與不誠耳陛下誠能廣恭儉日新之德屏馳騁無益之戲登崇俊良斥逺邪佞使日用之間有以飬吾之誠而無害焉則夫數者固將有所依而立而災異之變庶乎其可銷矣甲寅户部言內外不住添屯軍馬合用糧料比舊增廣其數浩瀚今秋成不逺理冝措置收糴添助支用今且以每石作二貫文除湖北京西路就去歲已降本錢外欲科降去年和糴米支使不盡本錢并支度牒見錢關子等令逐路運司拘收照應市價賤處盡本通融收糴從之八月丙寅詔朕惟共理允賴守臣比年以來遷易靡定欲使宣化承流民安田里難矣載嚴成法毋徇私恩今後郡守須到任二年方許差除丙子詔昨議臣權借職田添助國用深慮吏無圭租何以飬亷前降指揮更不施行戊寅臣僚言檢放災傷守令未嘗加意乞再展限一月州縣曉示許人户從實陳訴委縣令同所差州官驗視檢放知州覺察諸縣監司覺察諸州如有不行覺察御史臺彈劾從之以災傷避殿減膳降詔略云比日飛蝗益多又聞諸路州縣風水為災朕避正殿減常膳二三大臣其盡忠省過監司郡守各務身率戢姦禁暴平寃察獄所在災傷依條振恤檢放師徒未息科調繁興江淮襄蜀尤極勞擾疆場之吏宜加安輯蠲其苛斂以稱德意癸未起居郎胡銓奏曰陛下憂災避殿減膳蝗蟲頓息天理去人不逺上曰朕逐日禱天蝗蟲遂減安可不至誠銓奏曰陛下行之不息豈特減蝗虜亦不足慮銓又奏側聞道路之言近日臺諫論事陛下謂為賣直上曰非也朕近謂臺諫論事要當辨曲直故近日與張闡説此語非賣直也然非卿不聞此言銓奏云臣事君猶子事父若於君有隱則於父亦有隱非忠孝也上曰卿言甚善銓又奏德宗謂薑公輔為賣直上曰朕嘗論德宗此言甚失不足法銓奏天語誠然宗社之福也初張浚以符離之役詔改都督為宣撫至是參贊軍事陳俊卿奏云改都督府為宣撫司恐使人情觀望號令不行殿中侍御史周操亦以為請遂詔復都督參贊軍事唐文若知鼎州以户部侍郎王之望代之監惠民局劉汶罷言者論汶近因太白晝見陛下詔侍從以下條對得失汶乃公肆諛言遍投臺諫乞行逺竄故有是命以龍大淵曽覿知閣門事二人皆上潛邸舊人上之初即位也以大淵為樞密副都承旨覿帶御器械去冬劉度除右諌議大夫首論待小人不可無節潛邸舊僚宣召當有時蓋指二人也是年三月度復上疏劾大淵輕儇浮淺慿恃恩寵入則侍帷幄之謀出則陪廟堂之論搖唇鼓舌更變是非反復數百言尤為切至乃詔大淵除知閣門事覿權知閣門事度復奏云臣欲抑之而陛下揚之臣欲退之而陛下進之臣欲使之畏戢而陛下示之以無所忌憚是臣所言皆為欺罔因求貶黜不報而中書舍人張震亦繳其命至再除震次對出知紹興府震力辭不許殿中侍御史胡沂亦論二人市權不報給舍金安節周必大亦再封還録黃有旨龍大淵見在假候假滿日别與差遣曽覿依舊帶御器械度尋改權工部侍即以所言過實也震力辭職名遂與外祠度辭新命改知建寧府詔大淵覿依舊知閣門事必大又格除命不下必大尋奉祠而二人之命亦寢未幾沂亦奉祠安節除兵部侍即至是復申前命書行者中書舍人錢周材給事中工部侍郎陳之淵也禁士庶服飾侈異及歸正人胡服九月己亥詔自今後內外主兵官進奉會慶聖節香疏香合并沉香並不得過二十兩馬不得過四匹餘物並不得投進辛卯御史周操奏建立長秋費用不資方今軍旅未寧歲事荒歉望應奉繁文內外錫賜痛行裁節上曰朕宫中已痛加節省卿等更一切略去浮費癸卯詔已付張浚王彥令兵將官奏報文字及有陳乞並不得倚托近侍進達可徑赴行在通進司投進癸丑起居郎胡銓奏事上曰朕在藩邸時飬得性定今或飲酒過度未嘗不悔銓奏外人皆知陛下無酒色之過然猶謹畏如此乙卯進呈手詔頗聞中外士大夫不安義分希進苟求多事造請執政大臣宣諭此意公事公言之勿受私謁等事上曰賓客固不可全不見但不當以此廢事有干求者卿等宜有以戒之起居郎胡銓言蒙差權中書舍人臣與起居舍人馬騏同僚其人詳練乞改差騏上曰難以易卿銓奏臣與劉珙分上下房劉珙得上房臣得下房下房多出內降如劉珙近日繳田師中表陳乞恩例冒瀆聖聽况臣綿薄決不能勝任上曰劉珙繳得極是朕初疑其稽遲耳繳駁貴於當理如卿名望不必固辭先是北人移書云故疆歲幣如舊約即止兵上付督府答書命盧仲賢携往上戒勿許四州而執政命許之無傷仲賢至宿州北人懼之以威乃言歸當稟命許四郡遂以北人遺三省樞密院書來凡畫定四事一叔姪通書之式二唐鄧海泗之地三歲幣銀絹之數四叛亡俘虜之人是秋詔祕書省除少監祕丞外以七員為額冬十月地震十一月壬辰詔曰近來環衛久不除授非所以儲材而均任也可依舊制應以材略聞堪任將帥及久勤軍事暫歸休佚之人並為環衛官更不換授止令兼領其朝參職事俸給人從並令有司日下條具取旨既而環衛官共以十員為額癸巳宰執言軍旅之際間諜居多巧為詆誣隂擾國政兼近世風俗之弊毁譽不公有害于治詔令宰執侍從臺諫謹察妄有薦毁專事欺罔者具以聞奏當議重置於罰以靖風俗上曰此弊已七八十年罰責必行正在君相朕與卿等行之湯思退奏毁譽不公久矣毁者當察之譽者當試之詔曰朕纍降詔旨優恤軍民其令尚書省下諸路帥守監司及諸軍統兵官各開具已見如何施行務使實惠及人無或失信甲午詔學士院經筵官自今月七日輪二員宿直於學士院己酉侍御史周操內宿召對問遣使事久之上曰朕在宫中並無他用心只是看經史并騎射耳大事記曰自隆興元年令學士院及經筵官日輪二員宿直於本院以備咨訪或問經史或談時事或訪人才及執事所奏從容造滕過於南衙而陳先事獻言加於路朝顯諫故宇文價論夔路賑濟推賞此尚書夜對之言也陳騤論治贓吏當用祖宗法此中書夜對之言也倪思乞飬皇孫國公德性此直學士夜對之言也金安節馬琪論諌官言事失當不冝深罪此侍講夜對之言也周操以侍御史內宿召對論遣使事王蘭在講筵夜對論臨安府王佐貪汙事此禁臣夜直之雍容論奏也如此詔福建提舉司具到本路見在常平米九萬九千二百餘石義倉米二十九萬五千六百餘石令本司契勘如無陳腐不須更行收糴從中書門下省請也己酉給事中錢周材等看詳撫州勑賜同進士出身吳澥上書繳進罪言三册所陳治道革弊兵制理財取中原五事論議詳明言皆可行詔與堂除升擢差遣詔命侍從臺諫集議講和羣臣相繼論列而監察御史閻安中議曰敵人姦謀詭計以和而陷我於機穽者屢矣靖康之變其痛不可勝言也自翠華南渡以來絶江航海以掩我不備者不遺餘力矣其心豈欲與我和哉彼見吾吳嶽張韓之軍士氣少舒兵威稍振川陜屢勝順昌大捷國勢駸駸乎強矣彼其時亦有蒙國之難焉恐吾積怨發憤而遂夾攻之也比我師有靈壁之捷有虹縣之捷有符離之捷虜人死亡者過半雖我之主帥失於綏御衆散而歸不能以一鏃一騎尾從吾後臣知其無能為矣彼見吾用孟明氏恐其濟河焚舟復有後日之舉也於是虛聲恐喝又以和議而疑我焉一則以威彼背叛之國安反側之心二則以沮我壯士之氣緩攻取之計三則以疑我歸正蕭琦等輩四則以搖撼我唐鄧海泗等州五則以杜絶我謳吟思歸之人使不得以乘釁而生變也四州之地決不可棄當以和好為權冝用兵為實致起居郎胡銓議曰臣竊惟國家自紹興初與金人講和竭民膏血而不恤忘國大讎而不報上下偷生苟安歲月以為盟好可恃蕩然決去藩維之守一日完顔亮變生肘腋宗廟社稷幾不血食天下寒心陛下即位以來乾剛獨斷奮然圖任二三大臣力謀恢復符離之師兵不血刃而故疆復得使李顯忠盡忠於國不貪小利以成大舉之功則中原響應勢如破竹興復之期可指日以俟矣雖然功雖不成自京都播遷之後垂四十年未有如符離之舉也金人緣此震懾知陛下有大有為之志知廟謨有出不意之竒知邊鄙有折衝敵愾之將知臺諌有明目張膽之人知朝廷有面折廷諍之士以為中國有人遂有乞食之意兵法曰無故而求和者謀也昨來京都失守本於大臣耿南仲主和二聖劫遷本於宰相何栗主和維揚失守本於宰相汪伯彥黃潛善主和完顔亮之變本於秦檜主和自汴京板蕩以來四十年間金人為封豕長蛇薦食上國何嘗不以和哉暴蔑我二聖汚踐我兩宮殘毁我宗廟陵夷我社稷發掘我陵寢今欲與不戴天之讎講信修睦三綱五常掃地盡矣就令和好或成其言可信決不叛盟孝子順孫寧忍為之况萬萬無可信之理呼前車覆後車戒陛下若不深思逺慮力修政事力敕守備力任將相力圖恢復而苟目前之安臣恐後車又將覆也議者乃曰姑與之和而隂為之備外雖和而內不忘戰此向來權臣誤國之言陛下聞之熟矣嗚呼燕安鴆毒不可懷也一溺於和則上下偷安將士解體終身不能自振尚又安能戰乎其為鴆毒可勝寒心張浚纍疏爭之至曰自昔議和之臣始以怯懦誤國全身保家其終不至於降蓋有草降表以待用而隂圖其富貴者矣不可不察壬子陳康伯湯思退周葵洪遵劄子奏近因北副元帥書來有意求和陛下天資英武痛祖宗未雪之讎日思恢復而一聞彼言喜見顔色正欲休兵息民以答天戒因為自治之計以待天下之變而圖之羣臣紛紛乃謂臣等意欲講和以苟目前之安今竊以謂自今以往尤當信賞必罰以作成人材選將勵兵以激昻士氣務農重穀均財節用以愛惜公私之力庶幾今日之和乃所以成他日之恢復惟今陛下無忘今日之紛紛而力行其所未至使臣等得效其區區之愚不專為茍安之事以實議者之言上曰彼能以太上為兄朕所喜者朕意已定正當因此興起治功初張浚纍疏言敵強則來弱則止不在和與不和執政急於求和遂遣盧仲賢持書報敵浚復言仲賢小人多妄不可委信已而仲賢果以許四州辱命朝廷乃遣王之望龍大淵為通命使副而召浚赴行在浚沿途復上疏爭之且曰自秦檜主和隂懷他志卒成逆亮之禍檜之大罪未正於朝致使其黨復出為惡臣聞立大事者以人心為本今內外之事未決而遣使之詔已下失中原之心失將士之心失四海傾慕陛下之心他日誰為陛下出力用命哉今議者不務力為自強之計因敵帥一再移書復將裒吾民之膏血以奉讎人欺陛下以欵之之名而共為和之之實其説固曰吾將欵之而後修吾兵政不知使命一遣歲幣一出國書一正將士裭氣忠義解體人心憤怨何兵政之可修又不過曰吾將疑之而理吾財用不知今雖遣使而兵不可省備不可徹重之以歲幣之費敵使之來復有他須何財用之可理此可見其欺陛下以欵之之名而實欲行其宿志彼方惟黨與之是立惟富貴之是貪豈復以國事為心哉及入見又力陳和議之失上為止誓書留使人而令通書官胡昉先往諭敵以四州不可割之意於是之望大淵待命境上時廷臣多言可以與之議和而四州之地不可輕棄而湖北京西制置使虞允文乃陳不可與和四州之地與和尚原商於一帶之險不可以輕棄纍疏爭之未幾敵羈胡昉等上聞之謂浚曰和議之不成天也自此事歸一矣十二月丁卯上曰殿司尚循舊弊如印馬多是病馬便印每匹數百千只緣人情應副又如私差人兵借事朕已説與王錤可作約束施行左僕射陳康伯罷出知信州尋奉祠從所請也以湯思退為左僕射張浚右僕射浚仍兼都督上書聖主得賢臣頌以賜之庚辰上曰廣帥尚未除人宰臣湯思退等奏三廣去朝廷逺犀象珠珍所出帥守須以亷吏為先上曰古謂貪泉使夷齊飲不失其亷也詔諸路州軍歲起上供錢物例有拖欠監司郡守却以羡餘進獻僥冒賞典今後上供錢物須管依限起發數足如輒行率斂進獻仰本部按劾以聞是歲廣東提刑司獻緡錢十五萬有旨令就便撥賜廣西所司充本路今年上供錢朱熹入對三奏其一言大學之道在乎格物以致其知其二言君父之讎不可共戴天非戰無以復讎非守無以制勝其三言聖王制御夷狄之道其本不在乎威強而在乎德業其任不在乎邊境乃在乎朝廷其具不在乎兵食而在乎紀綱知荆南府張孝祥薦峽州布衣郭雍行義召不至賜號沖晦處士淳熙間再封頤正先生總司創造湖北會子七百萬謂之直候會子甲申隆興二年春正月丁亥朔詔曰朕恭覽乾德元年郊祀詔書有云務從省約無至勞煩仰見事天之誠愛民之仁朕祗膺慈詔嗣守丕祚今歲冬日至當郊見上帝可令有司除事神儀物諸軍賞給依舊制外其乘輿服御及中外支賞並從省約癸巳上曰近日士大夫奔競之風少息否宰相湯思退等奏方欲措置上曰卿等近日極留意政事要當立紀綱正法度不可困於文書甲申知潭州黃祖舜言江湖之間私鑄輕薄沙錢市井鋪户每以好錢五百傳換一貫混雜貫百與鄉民賣置欲申嚴私鑄之刑户部契勘私鑄毛錢及磨錯剪鑿並博易私錢行使各有立定條法乞檢坐指揮下諸路提刑司行下所部切嚴約束從之壬寅户部言諸路節次承降指揮和糴先拋降下未糴見錢銀并兩浙運司合樁今年歲額糴本移用錢及諸路常平剩下糴本等錢共二百萬貫令行在并隆興建康鎮江府衡鼎州置場收糴米斛共一百萬碩依舊作常平樁管緣逐路提舉司循習住滯不催督錢數起發深慮用而過時有誤收糴欲將所科糴錢數劄下逐路提舉常平官兩浙運司日下計置盡數赴逐處糴場交納仍各具已催起錢數申尚書省從之是月都督府言會子流轉行便已是通快若廣行樁垜本錢即日支遣則客旅不至沮滯欲乞令禮部降空名度牒一萬道分下諸路出賣於建康府置務樁垜見錢專充會子本錢從之詔諸路監司帥守及統兵官條上優恤軍民事冝二月己未幸玉津園宴射癸亥進呈張浚視師及措置邊事指揮上曰暫往措置邊防待朕批去有警即行不須擇日先是張浚奏敵勢未能動長驅江淮決無是事但三月間春草生須防衝突乞明降指揮令臣往淮上視師無事則不須行又奏近日外間往往謂臣與宰執議論不和便欲陛下用兵今日若能保守江淮已為盡善萬一機會之來王師得勝敵衆潰散不得不為進取之計是時陛下須幸建康亦望宰執協力湯思退奏敵人變詐無窮朝廷規模要先定周葵洪遵奏今日之舉當量度國力上曰浪戰不可須是機會不可強為卿等同心事無不立戊辰進呈擬韓彥直知舒州上曰親民之官不可輕授湯思退奏彥直嘗為郎官張浚又嘗以為成閔隨軍漕上曰更且試之以事他日可以親民付之州郡未晚宰執退曰上於州郡如此不輕可以知願治之意也彥直世忠子也丙子上宣諭臣僚論列間有將臣刻剝士卒以充饋賂可令學士院降詔戒諭臣留正等曰自昔將帥之以賄賂進未嘗不由於左右招權納賄者為之也小人之在君側乘間伺便竊行其薦毁之説而賄賂之計得矣不思將帥之賄賂皆椎肌剝髓而得之也士卒困於椎剝淪於飢寒利入于權門怨歸於公上一旦有警驅之萬死一生之地孰肯為國用命者其始出於縱已欲而終至於誤國事可不戒其漸乎壽皇因臣僚論列亟發明詔丁寧戒諭而敕厲權貴之詞尤嚴其弗祗若明訓誠可以必罰無赦矣髙宗紹興中嘗有詔曰居上位者必有所欲而後人得以因其所好以濟請託之私凡我在位若皆淸白及侍御僕從罔匪正人苞苴何所自入哉此可謂得其情矣丁丑詔司農少卿陳良弼往浙東點檢常平等倉辛巳良弼言比點檢七州常平倉其間失陷借支壞爛失收米麥共二十七萬六千二十餘碩并常平錢一萬四千四十餘貫乞委提舉官遍詣所屬剗刷係省錢米償納如所償未足候收納秋苗日盡償從之是月雨雹三月丁亥臣僚言今入仕之數日以多故注官之闕日以逺吏公然受賕無所忌憚人亦公然賕吏無所吝惜其弊有三一曰隱匿闕次二曰引例異同三曰捃擲小節臣謂凡今銓曹隨事生弊蓋不止此欲乞令本部長二郎官更行條具務令詳盡從之丙申進呈監察御史袁綜奏以病甚母老子幼身後狼狽湯思退等奏前此右正言都民望死曽支賜銀絹上曰恐自此為例思退等奏前此朝士有死者堂中亦有例送錢物欲送三百千與之上曰甚好思退等退相與言曰上雖些小支賜亦不肯為例可謂節儉之至也己亥淮東總領措置營田王茀言紹興五六年間置營田司臣嘗同領江淮營田經營二年初年官收五分莊户六分次年官與莊户各五分紹興六年官收約七十四萬碩莊户所分一同繼被旨結局分𨽻諸路漕司提領遂致人情觀望田政日削牛死不補客去不追今雖有存者所得無幾欲乞先於側近軍分與主帥商議揀次等不堪出戰及知農務之人每軍以十分為率差撥一二分列屯耕作其置莊買牛造農器分課子並依昨差提領營田司已降指揮施行假之歲月以漸增廣從之丙午宰相湯思退奏廣西遭冦數年乞降德音寬恤上曰其租稅收得多少不要文具務行實惠戊申臣僚上言內外官司以貫來上者幾無虛日而吏部以磨勘轉官者其減年之數多於實歷之人乞令吏部今後遇以減年磨勘轉官者須將實歷過年政對用謂如一年實歷用一年減年如此亦是合四年轉官者以二年轉也詔從之是月內批劉度罷建寧府給舍黃中馬騏言度與郡且一歲矣今被旨放罷莫知其故上批劉度黨附敢為欺罔尚除大藩可依已降放罷指揮未幾中及騏亦以言去蓋龍大淵等初用事時諸賢攻之甚力故上意有朋黨之疑也張浚復如淮視師始議以四月進幸建康浚又言當詔王之望等還上從之幸建康之議湯思退初不與聞乃與其黨密謀為陷浚計詔浚行視江淮自浚受任督府且將三年講論軍務不遑寢食所招來山東淮北忠義之士以實建康鎮江兩軍凡萬二千餘人萬弩營所招淮南壯士及江西羣盜又萬餘人要害之地城壁皆築其可因水為險者皆積水為堰置江淮戰艦諸軍弓矢器械悉備兩年冬敵屯重兵十萬于河南為虛聲脅和有刻日決戰之語將士望敵至成大功而敵亦知吾有備卒不敢動至是浚又以宰相來撫諸軍將士踊躍思奮敵聞浚來亦檄宿州之兵歸南京沿邊淸野以俟淮北來歸者日不絶山東豪傑悉領受節度浚又以蕭琦契丹望族沈勇有謀欲令琦盡統契丹降人且以檄諭契丹敵益懼初給度牒二萬道付諸路出鬻每道收錢三百貫侍御史周操言今來正是起催折帛夏稅之時若添此一項愈見窘急每道乞量降五十千續有旨先次給降一萬道俟均賣盡日别取指揮後上謂輔臣曰聞臨安所科已自紛擾不如且已之夏四月召張浚先是右正言尹穡論浚跋扈乃議罷督階而以户部侍郎錢瑞禮吏部侍郎王之望為淮東西宣諭使以代之之望未行又拜左諌議大夫蓋欲使議論歸一也至是詔罷督府應干錢物委端禮之望及淮東總領拘收時湯思退令王之望盛毁守備以為不可恃又令尹穡論罷督府官屬馮方又論浚費國用不資又論乞罷浚都督浚亦請解督府詔如其請言者詆浚愈力浚留平江上章乞致仕者八上許之直學士院洪適當制有棘門如兒戲耳之句蓋適自淮東總領召歸附思退意言浚邊備如兒戲故又形之制詞也上察浚之忠欲全其去制除少師判福州陳浚卿知泉州尋奉祠龜鑑曰王師偶失小利而幸災樂禍者縱橫紛起矣且符離之役李顯忠邵宏淵進兵淮北藉令潰散不過失其所下之城邑何至張皇如是耶嗟夫宣靖以來為敵所欺為和所誤為姦臣所罔曽不一悔而一欲用兵少有喪敗上下翕翕以為危亡之必至不獨為之罷大臣咎論者朝廷之議又為之一變矣甚矣人臣任責之難也五月壬辰宣諭以十七日幸候潮門外大教場進早膳涎幸白石教場閲兵癸卯進呈主管殿前司公事王琪奏神勇軍權統領官劉洪近已致仕乞改差左軍統領王明填闕上曰王明病目不可用仍戒諭王琪近所差劉洪年老軟弱今果死止是主帥作人情湯思退退而嘆曰陛下留意軍政下至偏禆皆知其能否真大有為之君也壬子臣僚言盱𣅿并楚州界客人裝載貨物私相博換錢寶乞禁止詔令宋肇嚴凝劉繹依認地分晝夜緝捕用心捉獲格外優異推恩八月甲寅朔日有食之丁巳淮西宣諭使王之望奏同諸將分定把截關隘戰守屯泊去處上曰可分明劄下王彥王之望等雖地分各有所管然兵不可太分如要逐處控扼使虜人不過兵家無此理却要逐人回奏須用持大兵於重害之地又曰使諸將各認地分則可若有緩急豈冝如此將兵力分在數處湯思退等奏聖鑒如此兵見機要己巳詔夷陵之地今日為涎邊利害下湖北京西路制置使司相度有無利便又見屯夔路兵聽鄰州差撥於夔州有無妨礙下湖北路并夔州路安撫司同共相度經久利便申取朝廷指揮秋七月丙戌諸王宫大小學教授詹叔善劄子見年七十於條合該致仕詔詹叔善引年知止足勵士風依條致仕特與一子上州文學丁亥臣僚言昨因諸路綱運遲滯遂降指揮令寄居待闕等官部押優立賞格以為激勸積久弊生其弊不一其一請託之弊其二侵害之弊其三夾帶之弊其四僥冒之弊凡此四弊皆歸於權勢有力之人賄賂請求姦巧爭奪乞將州郡綱運只差見任官管押若不及全綱自有本州準備差使使臣據其多少貼差軍員亦可前去詔令户部措置既而本部言欲下諸路監司一依今來臣僚所請事理施行從之辛卯詔昨來奉上光堯壽聖太上皇帝太上皇后尊號禮畢除修製册寶行禮都大所一行官吏等已推恩了當所有本宫官吏諸色人未推恩可令有司討論施行臣僚言德壽宫官吏到宫先轉一官及受册寶文已推恩今若又復泛及似太重疊伏望聖斷特賜寢罷詔從之戊申臣僚言熙寧初創立市舶一司所以來逺人通物貨也邇來州郡官吏趣辦抽解之外猥多名色兼迫其輸納貨滯則減價求售所得無幾恐商旅自此不行繼而户部欲行下廣南福建兩浙轉運市舶司鈐束所屬州縣場務遵守見行條法施行毋致違戾是月江東浙西水雨雹詔災異數見江淮水潦避殿減膳令侍從臺諫卿監郎官館職疏陳闕失及當今急務毋有所隱兵部侍郎胡銓言當今急務莫大於備邊今與敵和議有可痛哭者十今日之患兵費太廣飬兵之外又增歲幣民力益困一也唐鄧海泗之人不下數十百萬一旦與之是置之死地二也海泗今日之籓籬咽喉也失則兩淮不可保大江不可守而江浙不安三也絶中原之望四也自秦檜竭民膏血以奉金民愁盜起齊述一變殺數萬人郡國二十四時時大水今和議雖未必成皆曰又將竭吾膏血以潤敵人今兩淮之人嗷嗷然皆曰又將如前日疲於敵使之往來而再命之不暇五也秦檜力排不附和議之士九十餘人賢士大夫國之元老相踵引去檜未年遣張常先汪君錫網羅張浚胡寅等三十七人欲竄海島賴上天悔禍檜即殞命而三十七人幸脫虎口然趙鼎王庶李光鄭剛中曾開李彌遜魏矼髙登吳元美楊輝吳師古等皆死嶺海或死罪籍怨憤之氣徹天今日和議或成則不附時議之士或蹈前日之禍必矣六也紹興戊午和議既成檜建議遣路允迪等二三大臣往南京等州交割歸地虜一旦叛盟劫執允迪等遂下親征之詔敵復請和其反覆如此檜不悟卒有逆亮之變覆轍不逺七也頃者敵人移書盡取歸正人檜一切還之如江南程師回趙良嗣等聚族數百人幾謀變今敵必復如前日盡索歸正之人與之必反側生變不與則敵決不肯但已八也自秦檜當國二十年空竭國力海內乾耗今府庫無旬月之儲自此復和蠧國害民殆有甚焉九也真宗朝宰相李文靖公沆賢相也嘗謂王旦云我死公必相切莫與敵講和自此必多事矣旦殊不以為然既而遂和十餘年間祥瑞天書土木之役不息東封西祀飢饉薦臻旦始悔不用李文靖之言夫祖宗盛時尚以和議為不可况今國勢委靡如此而復唱和議使上下解體士氣惰怯溺於宴安之鴆毒國之元老如張浚王大寶王十朋金安節黃中陳良翰相繼黜逐詩云雖無老成人尚有典刑韓愈云言老成重於典刑是何可輕哉十也願陛下堅守和不可成之論力行其志自強不息則強敵何足患哉天變水災亦當銷縮不勞聖慮而滅矣監察御史龔茂良疏略曰夫水至隂也其占為女寵為嬖佞為小人專制為夷狄亂華而其間因權幸以致者蓋十七八焉今左右近習不過數人衆所指目形于謡誦以陛下英明果斷固不至容其為婚為怓第一二年來進退一人材施行一政事命由中出人言譁然指為此輩甚者親狎之語流聞中外賢酬之作傳播邇遐陛下深居九重何由知此時內侍押班梁珂及龍大淵曽覿皆用事茂良疏蓋指此也會言者論珂罪詔與外任宫觀茂良尋遷右正言入對首論積隂弗解淫雨益甚熒惑入斗正當吳分天意若有所愠怒而未釋者二人害政甚珂百倍上諭以二人皆宫邸舊僚且俱有文學敢諫諍未嘗預外事茂良再上疏言德宗謂李泌人言盧杞姦邪朕獨不知此其所以為姦邪也今大淵覿所為行道之人類能言之而陛下尚未之覺更頌其賢此臣所以深憂屢嘆百倍於未言之前也疏入不報即家居待罪及王之望參政茂良以其嘗薦已乞回避詔除太常少卿茂良力求去乃命知建寧府八月戊辰詔通判橫州賈成之特令再任從廣西諸司言佐郡有方為政不擾也丙子臣僚言大理寺勘到左軍統制魏尚令人齎金銀來行在托相識尋訪關節求帶閣職必曽聞有如此而得者是以效之欲望將魏尚重作行遣别降指揮戒諭中外今後敢有受財贓滿者當以軍法從事詔從之詔江浙水利久不講修積雨無所鍾泄重為秋稼之害可令逐州守臣考按古迹及今堙塞去處條具措置奏聞是月魏把使金先是上命湯思退作書與敵約許割四郡且求減歲幣之半尋又命把以宗正少卿充通問使把及疆敵以書不如式不受又求割商秦地及歸正人且求歲幣二十萬把以聞上命盡依初式再易書歲幣亦如其數魏國公張浚薨浚行次餘干以家事付兩子栻杓曰吾嘗相國不能恢復中原盡雪祖宗之耻即死不當葬我先人墓左葬我衡山足矣疾革呼栻等于前問國家得無棄四郡乎且命作奏乞致仕而薨後五年上追思浚忠烈加贈太師賜諡忠景浚自幼即有濟時志在京城中親見二帝北狩皇族繫虜生民塗炭誓不與敵俱存故終身不主和戎之議功雖不就人稱其忠論事上前必以人君當正心務學修德畏天至誠無倦為先又以儲副為天下本自在川陜即上疏乞選飬宗室之賢及為相復陳宗廟大計資善堂建皇子出就傅又薦朱震范沖訓導之選每以東南形勢莫重建康若居錢塘易以安肆故自紹興至隆興屢以遷幸為言稟性至公嘗劾李綱以私意殺從臣宋齊愈罷其政大赦綱貶海外獨不原浚為請得內徙韓世忠軍士剽掠浚嘗奏奪其觀察使及視師淮上獨稱世忠忠勇可倚以大事其輔政以人才為急與趙鼎掌國多所引擢從臣朝列皆一時之望人號為小元祐至隆興初首薦論事切直折挫不撓者數十人及再相又薦虞允文汪應辰王十朋劉珙等皆一時名士尤善於撫御將帥而知其才始在關陜吳璘吳玠由行間識擢卒有大功於蜀劉琦晚出浚一見竒之即付以事任歸薦于朝卒成順昌之竒功其他若楊政田晟王宗尹王彥後皆為名將事毋至孝母喪浚踰六十哀毁不自勝事兄滉友弟尤至教飬其子如己子置義莊以贍宗族其子栻甫畢襄事即草土拜疏言吾與敵乃不共戴天之讎異時朝廷雖興縞素之師然旋遣玉帛之使是以至誠惻怛之心無以交格乎天人之際此所以事屢敗而功不成也今雖重為羣邪所誤以至於此然能以是為監而深察之使吾胸中了然無纎芥之惑然後明詔中外公行賞罰以快軍民之憤則人心悅元氣充而敵不難郤矣朱文公曰南渡以來士大夫唱為和議其賢者則不過為保守江南之計莫有知其為大變者獨公欲正人心雪讎恥復土宇鎮遺黎晚復際遇主議益堅雖天嗇其功使公困于讒忌之口不得就其志然而表著天心扶持人紀使天下曉然於中外之辨其功盛哉惜乎浚之功未遂而檜之毒愈深後來者遂以東南為正統之地以忍恥事仇為義禮之當然稱叔姪之國減歲帑五萬則朝廷動色相賀而自壬午至丙寅四十五年之間所爭者受書之儀而已可深嘆哉九月丙戌詔初除閣職供職人先令取索腳色委簿書官審人物不致驕騃鄙俗須歷任無員闕具詣實狀申閣門方許供職如未歷差遣人候經任訖照驗印紙與理額外元名涎撥填員闕雖有專降指揮並許執奏甲午詔江東浙西監司郡守比緣江東浙右俱被水災卿等既分外臺之寄能於所部講明田事預為陂塘渠堰防患未然使顯效著於將來者朕當不涎親擢其或但為文具國有典刑朕必不赦臣僚言建炎間凡除郎官即於所降指揮便帶如未經上殿令閣門引見上殿此蓋祖宗舊制不知於何年月始不帶行知有先次供職之文欲望今後應除郎官依建炎指揮仍令其先次上殿然後供職見其稍有不稱即令外任或與祠祿詔從之是月以王之望參知政事之望陳和戰三策又言今日無橫身任事之臣上大喜即軍中拜之敵分兵入寇交趾來貢詔今後命官犯自盜枉法贓罪抵死除籍沒家財外取旨遵依祖宗舊制決配仍撿坐天聖故事令學士院降詔出內帑白金四十萬兩和糴賑濟尋詔發江西義倉米二十萬石賑濟命湯思退督師江淮楊存中同都督錢端禮吳芾並為參贊軍事初兵部侍即胡銓因轉對為上言與敵和可弔者十臣恐再拜不已必至稱臣稱臣不已必至請降請降不已必至納土納土不已必至輿櫬輿櫬不已必至如晉帝靑衣行酒而後為快倘乾剛獨斷追回使者絶請和之議以鼓戰士下哀痛之詔以收民心天下庶乎其可為矣如此則省數千億之歲幣專意武備足兵足食無書名之耻無去大之辱無再拜之屈去十弔而就十賀利害較然矣詩云毋用婦人之言今日舉朝之士皆婦人也敵既得四郡專事殺戮上意中悔思退懼密諭敵以重兵脅和上聞有敵師乃命建康都督王彥屯昭關而三衙江池諸軍相繼皆出又命思退督師思退辭不行龜鑑曰魏公受任督府招徠山東淮北忠義之士凡萬二千餘人招淮東壯士及江西羣盜又萬餘人規模措置方有次序湯思退庸劣寡謀大唱和議雖張浚力言之何益彼思退者乃檜之死黨其為計畫大略似檜然檜之主和雖隂與敵約亦未至密諭敵以兵而脅和也與檜異議者雖加貶竄亦未至興大獄劾二十人不主和之罪以成其議也是則思退之罪又浮于檜矣先是思退與王之望堅主和議罷張浚兵柄銓爭之尤力於是大臣皆不悅遂命銓以本職措置浙西淮東海道命下即趣行時金寇將西淮東郡邑皆望風退避髙郵守陳敏拒之謝陽湖而大將李寶駐師江隂不肯援敏銓檄寶出師寶先取密詔為自安計銓劾奏曰臣受詔令范榮備淮李寶備江今寶逗遛視敏弗救若謝陽失守大勢去矣寶懼與敏犄角退敵兵時大雪河凍銓親持鐵椎􅓯冰士皆奮發銓與尹穡同出使穡使浙東置家於安銓使江淮蓋受敵之地携孥北行言者併指為罪與穡俱罷冬十月乙亥詔都督江淮軍馬楊存中與王琪郭振共議真陽六合一帶占據形勢險要去處措置捍禦詔朕每聽朝議政頃刻之際意有未盡自今執政大臣或有奏陳冝於申未間入對便殿庶可坐論得盡所聞期躋于治十有二月丙戌詔舉義兵略曰朕為人之後而不能報上世之憤為人之君而不能拯斯民之厄故食不知味寢不安枕未嘗以尊位為樂也又曰朕以兵隙難開隱忍自屈仍遣魏杞銜命復行不較禮文書辭屢易不愛四郡割以奉之乃渝元約又求商州且索臨陳係虜之人是其更變無厭必欲尋釁初無休兵結歡之意朕重違太上聖意已盡初式再换國書歲幣成數亦如其議若彼堅欲商秦之地俘降之人則朕有以國斃不能從也儻或不諧前好至於交兵天實臨之非朕得已况我將校六師受國家爵祿之久忠義所激自應奮勇捐軀為國雪耻甲午詔魏勝忠勇力戰陳亡可與贈正任承宣使仍賜其家銀絹一千匹兩其子厚與恩澤郭淑在盱眙望風逃遁孔福在濠州坐視敵兵縳橋過淮略不措置未欲便加軍法郭淑可勘停送靜江府編管孔福可削奪官職白身自效臣留正等曰慶賞刑威人主所操以為礪世磨鈍之具也惟在夫用之以明守之以信而已故有功而賞賞之無所顧吝有罪而刑刑之無所姑息賞一人而千萬人勸刑一人而千萬人懲而况于行軍用師之際將以求盡人之死力其可不知出此哉觀夀皇所以厚魏勝陳亡之賞而嚴郭淑孔福逃遁茍偷之刑臣知忠臣義士益思所以奮厲而全軀保妻子之臣有靦靣顔矣是月楊存中升都督先是湯思退既不行乃命存中同都督軍馬及事急復以王之望為督視之望力辭乃升存中為都督詔諭歸正官民云朕遣使約和首尾三載北師好戰要執不回朕志在好生寧甘屈已書幣土地一一曲從唯念名將貴臣皆北方之豪傑慕中國之仁義削去舊俗投戈來歸與夫中土人民厭厥故鄉喜我樂土朕知其設意欲得甘心斷之於中決不復遣爾等當思交兵釁隙職此之由視之如讎共圖掃蕩湯思退除職奉祠言者論其急於和議之成自壞邊備罷築夀春城散萬弩營兵輟修海船毁拆水匱不推軍功賞典及撤海泗唐鄧之戍詔責居永州行至信州憂悸而死大事記曰思退大唱和議密諭敵以重兵脅和欲興大功劾二十人不主和之罪則皆因檜之心而甚之也思退雖以此獲罪而周葵王之望尹穡洪遵之徒為檜者多矣一浚豈足以勝百檜哉雖太學張觀宋鼎葛用中等七十人論湯思退王之望尹穡鈎致敵人之罪而和議不可破矣時參知政事周葵實行相事聞諸生有欲相率伏闕者奏以黃榜禁之略云靖康軍興有不逞之徒鼓唱諸生伏闕上書幾至生變若蹈前轍為首者重置典憲餘人編配黃榜出物論譁然於是太學生張觀宋鼎葛用中等七十餘人上書言湯思退王之望尹穡鈎致敵人冝斬之以謝天下書略曰逆亮授首之後朝廷擢用張浚都督江淮敵人不敢犯塞蓋由張浚備禦有方是以寢敵人之謀故陛下無北顧之憂矣自湯思退首唱和議之望尹穡附之極力擠排遂致張觀罷去邊備廢弛墮敵人計中天下為之寒心而思退輩方以為得計今敵人長驅直至淮甸皆思退等三人懷姦誤國豈可置之不問哉此三人之罪皆可斬也臣願陛下先正三賊之罪以明示天下仍竄其黨洪適朝公武而用陳康伯胡銓為腹心召金安節虞允文王大寶陳俊卿王十朋陳良翰黃中龔茂良劉夙張栻查籥協謀同心以濟大計上怒欲加重辟朝公武及右正言龍茂良同入對上怒稍霽之望亦為之救解乃止先是侍御史尹穡乞置獄取不肯撤備及棄地者劾其罪庶和議決成所指凡二十餘人由是擢穡為左宣義大夫而公武亦自殿中侍御史遷侍御史洪適時以中書舍人兼直學士院王抃使敵軍併割商秦地歸被俘人惟叛亡者不與餘誓目略同紹興世為叔姪之國減銀絹五萬易歲貢為歲幣而已敵皆聽許朱熹封事曰今日講和之説不罷則陛下之勵志必淺大臣之任責必輕將士之赴功必綏百官之奉承必不能悉其心力彼以從容制和而其機術常行乎和之外我以汲汲欲和而其志慮常陷乎和之中前日之遣使報聘已失之矣及陛下嗣位天下之望曰庶幾乎而方且禁敕諸將申遣使介亦若有意於和議之必成者又曰太上皇帝念此慙之未報雖享天位而不以為樂一旦舉而付之陛下者以陛下聰明智勇必能成此志也今釋怨而講和非利己也乃逆理也己可屈也理可屈乎逆理之禍將使三綱淪九法斁子焉而不知有父臣焉而不知其君人心辟違天地閉塞是力舉南北之人而棄之豈曰愛之謂哉且不曰愛其君父而曰兼愛南北之民其於輕重之倫緩急之敘亦可謂舛矣詔擇日親征以陳康伯為左僕射錢端禮賜出身簽書樞密院事而兼權參知政事閏十一月辛未詔內藏庫支借銀一十萬兩應副户部支遣日後令本部收簇撥還是月詔館閣儲才之地依祖宗舊法更不立額崔臯敗敵于六合十二月甲申權尚書工部侍郎何俌進對因及用人才事上曰近日士大夫議論好惡多不公心卿每論事皆可施行如卿所謂其言若善雖仇怨在所當用如其不善雖親故不可曲從此意甚好庚子詔方今多事理冝博謀侍從兩省官每日一到都堂遇合關臺諌者亦許會議是月撥户部鬻僧牒緡錢三百萬充會子本錢赦沿邊諸州詔略曰正皇帝之稱為叔姪之國歲幣減十萬之數地界如紹興之時憐彼此之無辜約叛亡之不遣可使歸正之士咸起寧居之心洪適所草也論者謂前日之所貶損四方蓋未聞知今著之赦文失國禮矣龜鑑曰壬午之議和之未成者也癸未之議和之已成者也和議之未成則諸臣當論和與不和之是非而當時洪遵金安節唐文若周必大共為一議言和者多言不和者少惟張震張闡之論稍近正而宰執獨無奏章姑以聽和議之自成耳是則前日之失也今兹和議既成所以集議者但論歲幣之增不增地之割不割歸正人之遣不遣邊戍之撤不撤耳而諸臣猶有許之增幣許之割地許之還歸正人者其曰世讎不可忘者亦僅有張胡銓二人而已向者康伯猶不主和議今則康伯亦附會而言和矣蓋靖康之禍日逺月忘秦檜之毒日久月深後生晚輩不念前猷遂以東南為正統之地以忍恥事讎為理義之當然嗚呼平王東遷四十九年忘復讎之義此春秋之所由作也二聖之痛今四十年矣而當時朝論稱叔姪之國則朝廷動色相慶而自壬午至丙寅四十五年之間所爭者受書之儀而已虛文何益哉此胡銓所謂舉朝皆婦人也其亦有感於斯乎然而考之當時端人正士如黃通老劉恭父張南軒朱文公最號持大義者而黃通老入對則謂內修政事而外觀時變而已劉恭父自樞府入奏則謂復讎大計不可淺謀輕舉以幸其成文公自福宫上封章則謂東南未治不敢苟為大言以迎上意南軒自嚴陵召對則金人之事所不敢知境內之事則知之詳矣是數公者豈遽忘國恥者哉實以乾淳之時與紹興之時不同紹興之時仗義而行可也今再衰三竭之餘風氣沉酣人心習玩必吾之事力十倍於紹興而後可不然輕舉妄動開邊啓釁恐不至遲之聞禧而後見也宋史全文卷二十四上欽定四庫全書宋史全文卷二十四下宋孝宗二乙酉乾道元年春正月辛亥朔車駕詣圓壇行禮端誠殿受賀畢參知政事兼權知樞密院事錢端禮等同班奏事於後幄上宣諭曰宿齋日大雪及饗京靈太廟圜丘幸得晴霽禮成端禮等奏曰斯實陛下誠意格天端禮等退具奏訖宣付史館從之去歲有司請國朝郊祀多用冬至乾德元年藝祖初郊是年冬至適近晦日遂改用十六日甲子至道元年李繼遷叛遂改用次年正月所有今年十一月二十九日冬至郊祀可遵藝祖近晦之義太宗改卜之典詔以來年正陽之月雩祀之辰尋又遵至道典故用獻歲上辛丁卯起居舍人王稽中奏臣每念國朝罕有世家惟將家子有能世其家如曹彬之子璨种世衡之子諤諤之子師道皆世為良將近日將臣子弟皆以武辨為恥上曰卿此言甚當及至作文官又皆了不得稽中奏今國家間暇正當選將萬一用武倉卒不可得之上又曰卿言甚當乃奏乞於大將之家選武勇能世其家者尊顯之萬一用武不至無將可用若其無虞不妨陰壯國勢上曰卿此論極當深得今日之切務王稽中又奏曰陛下留意北人然北人皆負陛下如賀允中老不知退遭白簡罷王之望謀國前後反覆異詞尹穡姦邪與湯思退陰結死黨使季南壽往來傳遞言語士大夫目之為肉簡牌共為欺君誤國弛去邊備鈎致北人渡淮幾危社稷上曰如尹穡猶可罪朕初以腹心待之乃姦邪至於如此稽中又奏曰如王逨雖未甚有施設然多與尹穡屏人切切細語士大夫皆謂之姦邪賴陛下先知其姦乃併逐之士大夫猶服聖聰庚午詔館職朕所以招延天下之英俊以待顯擢茍不親吏事知民情則將來何以備公卿之任可令後更迭補外歷試而出以稱朕樂育真材之意乙亥進呈大理寺勘到韓璡頓遇孔福案節目上曰韓璡亦合從重錢端禮等奏昨初得指揮欲令永州居住續奉處分合賀州編管上曰可令臨安府差人押赴貶所再呈頓遇案節上曰北人未過淮首先望風逃避且與貸死免真決刺配海外又奏孔福亦望少賜寬貸上曰孔福統三千餘人見北兵繫橋更不迎敵及至橫澗山寨又棄兵民先走使盡被害罪不可恕當依軍法翌日詔孔福頓遇屯戍守邊郡金人未至棄城逃避內孔福又棄橫澗山寨致本處人民盡遭殺戮情犯猶重孔福特依軍法施行頓遇特貸命追毁出身以來文字免真決可刺面配吉陽軍牢城收管二月癸卯進呈有司以久雨引比歲例分遣郡縣吏禱于山川神祗上曰應天當以實此不必也兩浙以歲潦飢民流徙未復業比聞兩路身丁錢絹皆取於五等下户其議蠲除之朕出內庫金幣歸其數於有司凡可賑贍以便萬姓者條具以聞小大之獄豈無寃滯其令御史慮囚朕將避殿減膳以答天譴詔兩淮合行屯田以便軍實昨來郭振於六合指置已見就緒今來已除鎮江府都統制所有淮南東路屯田理合委官令郭振同王茀周綜疾速措置其合用種糧農具牛畜等一就條具聞奏尋命鎮江建康鄂州荆南都統并兼提舉措置屯田兩淮湖廣總領淮南湖北京西帥漕兼提舉措置屯田守臣兼管內屯田事是月尚書左僕射陳康伯薨初高宗倦勤有與子之意康伯密贊大議及行內禪禮以康伯奉册上即位禮遇優渥但呼丞相而不名及是薨御書旌忠顯德之碑表其墓慶元初配享孝宗廟廷上謂輔臣曰陳康伯有器量朕扈從太上在金陵其從容不迫可比晉謝安臨終奏事無一語差繆出至殿廬而疾作輿至第薨三月丙寅刑部侍郎王茀進楚莊王定國是故事上曰王茀進議誠有國之大戒今日之先務也朕當與執政大臣凡百官僚思其未至以歸於是期共守之時錢端禮起戚里為首參窺相位甚急館閣之士相與上疏斥之皆為端禮所逐茀陰附端禮建為國是之説以助其勢於是吏部侍郎陳俊卿抗疏力詆其非且為上言本朝無以戚屬為相此懼不可為子孫法及進讀寶訓適及外戚因言本朝家法外戚不與政最有深意陛下所宜守上納其言端禮憾之諷使求去是秋出俊卿知建寧府而端禮亦卒不相是月詔舉制科夏四月丙申詔廬州兵馬都監郭璘特令再任以金人渡淮保守焦湖舟船無慮也是月金使來上國書始謂上為宋皇帝云吳璘來朝尋進封新安郡王判興元府明年改判興州五月己酉朔上諭輔臣曰今邊事少寧卿等當為朕留意人材錢端禮奏人主之職惟當辨君子小人若朝廷所任純朴厚重之士則浮偽自革實效可成上曰固知如此君臣之間須相警戒庚戌中書舍人洪適進對上曰卿所繳秦塤差遣甚當向後有合繳事不須劄子但批敕將來又曰如有出自朕意事不可行者卿但繳來初秦塤陳乞宫觀適繳奏秦檜藏姦稔惡金珠充牣其家塤乃其不肖之孫華屋厚藏輒稱纍重仰祿公然欺世玩侮朝廷故也辛亥上諭錢端禮等曰早朝與卿等每不從容今後晚間少暇時當召卿等欵曲論治道端禮等既退又遣中使傳旨每遇晚召公於東華門入詣選德殿奏事大事記曰自隆興二年詔朕每聽朝議政頃刻之間意有未盡自今執政或有奏陳宜於申未間入對便殿又明年諭近臣曰早朝每不從容今後晚間少暇當召卿等欵曲論治道故召於選德見於祥曦引於水殿宴於觀堂從容坐席之間略同賔友軍國大政古今理亂有事當商確者不妨敷奏有疑當闕決者隨即徹聞故洪適於晚對而見御屏列監國郡守姓名周必大施師點於榻前而論辨可否如其事未施行則以不肯任事責魏把如某除未分當則以徇情廢法責允文至謂朕有闕失卿亦不可不極言此宰執晚召之更相警戒也如此甲寅臣僚言唐任劉晏二十載今之户部始用也未必擇之精既用也未必任之久多不一歲少或半歲已徙職而去矣孰能為國家周虛實究源流而圖善後之計哉伏望陛下略依唐故事博選中外之臣其材之可用者而試以財計之任又觀其稍有所成而付之版曹之職茍稱其職雖數遷而至乎二府職固不徙也勿奪其權使之得以號令州縣而趣督倚辦焉勿拘其制使之得以權衡低昂而通融流轉焉夫然後國之有無軍之裕乏民之利害皆得而責之彼亦將朝思夕計畢精竭慮自任其責而不辭矣從之辛酉中書舍人洪適進仁宗久任許元故事上曰洪適所進故事切當今日之弊今後非因昏懦不職不得遽有遷易其興利除害績用修舉並依故事優加旌擢顯用施行壬申詔法令禁姦理宜畫一比年以來旁緣出入引例為弊殊失刑政之中應今後犯罪者有司並據情欵直引條法定斷更不奏裁內刑名有疑令刑部大理寺看詳指定聞奏永為常法仍行下諸路遵守施行其刑部大理寺見引用例册令封鎖架閣更不引用是月宗正丞林邵言祖宗玉牒昨緣南渡散失不存前後修纂惟太祖一朝事迹已經安奉太宗玉牒雖已成書尚未進入太上今上玉牒目今見修自真宗至欽宗凡七世並未下筆緣近來體例每修一朝玉牒必取旨開局方始修纂十年方許一進則是列聖之書雖百年而未備臣今自修真宗玉牒十年計四十卷望令本所日下繕寫同仙源積慶圖進呈降下玉牒殿安奉從之六月壬辰進呈右正言程叔逹章論廬州申蝗蟲遺種生發遍滿田野損傷苗稼淮南運判姚嶽却行申奏蝗自淮北飛渡前來皆抱草木自死仍封死蝗以進上曰嶽敢以為嘉祥更欲録付史館可降一官放罷為中外佞邪之戒丙午臣僚言科舉之制州郡解額狹而舉子多漕司解其數頗寬士取應者往往捨鄉貫而圖漕牒至於冒親戚詐戶籍而不之恤且牒試之法川廣之士用此可也而福建則密邇王都亦復漕試見任官用此可也而待闕得替官一年內亦許牒試本宗有服親用此可也而中表緦麻之親亦許牒試或宛轉請求或通問囑托至有待闕得替官一人而牒十餘名者欲乞申嚴詐冒之禁其見行條法候今舉既畢付之有司重詳損益立為中制從之又言國家三歲科舉集草茅之士親䇿于庭其間豈無一事之可行然有司考試多以文采為尚考在前列者始經御覽其間有言及諸郡軍民利害實迹偶文辭不稱置之下列往往壅於上聞誠為可惜乞自今有論及州郡軍民利害事實令初考覆考詳定所各節録緊要處候唱名日各類聚以聞從之秋七月庚戌知池州魯察申稱本州營下竹生穗實如米飢民採食之仍圖竹實之狀緘囊其物以獻臣僚論歉歲飢民食其不當食之物誠出於飢餓迫切而已今池之民採竹實而食其亦迫切甚矣察任在牧民顧以為美事不謂之姦諛不可也較其罪與姚嶽同科欲望聖斷將察罷黜施行詔從之辛亥進呈王大寶劄子奏理財宜務本抑末農者天下之本也而商賈逐末競利日繁宜抑之以助農如前日免行之令偶因曹泳建言廢罷欲乞講明損益以復前制上曰曹泳所行唯免行一事至今人以為是民不可擾難以施行臣僚言守臣之弊重內輕外革之宜更出迭入若未歷州縣不得居清要未任監司不得居郎曹外有治效擢之內職內有實績擢之外任庶幾官宿其業人效其職無因循茍簡之意矣詔令中書省置籍癸丑晚御選德殿御坐後有金漆大屏分畫諸道各列監司郡守為兩行以黃簽標識居官者職位姓名上指示洪適等曰朕新作此屏其背是華夷圖甚便觀覽卿等於都堂亦可依此錢端禮等奏三省密院吏恐有額外人數乞降指揮不得存留上云此等事正在卿等行之已有指揮何待再行約束卿等若不能制吏何以糾察官僚乙丑進呈臨安府結斷鋪翠銷金玉三八等事上曰聞外間翠羽甚多若申嚴指揮未必禁得治一件足以警衆錢端禮奏今宫禁既不用自然外間可革是月詔諸路監司帥臣將見任老疾守臣限一月公共銓量聞奏知縣委守臣體訪申取朝廷指揮如監司守臣互為容隱御史臺覺察以聞鑄當二錢以工部言小平錢工料委與當二錢一體遂詔從之未幾從户部之請給會二千萬仍將川蜀昨來發到鐵錢十五萬貫與會子品搭錢銀及公據於兩淮州軍相易其銅錢仰赴所在官司交納每七百文償以會子一貫尋以難行而止八月己卯進呈營屯田文字上曰永豐墟見𨽻建康行宫歲收米三萬餘碩朕欲撥付建康軍中以助軍食亦以示至公之意卿等便可批旨施行進呈減罷寓宣房額外人錢端禮等因奏前日面得指揮減省權攝使臣反額外人吏次日刷具盡皆減罷九日到漏舍有承旨司謝褒再三執覆須要存留王興祖等四人蓋有謝梓是其子上曰人吏何敢如此可重作行遣乃詔謝褒罷樞密院令史送處州編管令臨安府日下差人管押前去庚寅詔應今後文武知州軍諸路釐務總管副總管鈐轄都監見辭並令上殿批入料錢文歷如託避免對並不得差除赴任委臺諫監司常切按察以違制論癸巳臣僚言去歲江西湖外和糴其弊非一不問家之有無例以稅錢均敷此一弊也州縣各以水腳耗折為名收耗米什之二三此二弊也公吏斗腳百方乞覔量米則有使用請錢則有縻費此三弊也以關會償價許之還以輸官然所在往往折價至輸官則不肯受此四弊也詔逐路委漕臣并提舉往來巡按務盡和糴之意以革四弊如安坐不恤奉行簡慢必罰無赦甲辰洪適等奏昨日張説傳旨詢問醫官換授事吏部供並無條法惟有王繼先以特恩換授上曰伎術官自是不許換授舊無條法之事豈可創卿等亦當如此乙巳洪適等奏近來士風奔競爭圖換易舊有指揮已有差遣人不許入國門新授差遣人限半月出門今乞降指揮宰執不許接見已有差遣之人上曰如此則失之隘但在卿等力行是月立皇長子愭為皇太子大赦洪適奏浙東鹽司久闕官乞令宋藻不候告前去上曰卿等曽諭宋藻支還亭户錢否聞監司所至又要倍斂錢物送胥吏至有六七百千首須丁寧鈐束九月丁巳進呈付出嚴别劄子洪適等奏後省已曽看詳只是編類之書舉子所用但以其筆札之費欲與免一解葉顒奏獻言者大率只要僥幸上曰亦不奈何若不采納便是塞獻言之路癸酉洪適等奏近有湖南漕臣任詔均州守臣戴之邵皆自請討賊之邵臣等不識之須嘗上殿特與改官不知何如人陛下尚省記否上曰其人亦誕妄今不須留在極邊可召赴行在别與一近裏間慢差遣冬十月甲申臣僚言私鹽之不可禁者其弊三亭户煎鹽入官官不以時給直往往寄居為之千請而後豫之至有分其大半者一也煎煉之初必須假貸於人而監司類多乘時放債以要其倍稱之息及就場給直往往先已尅除其半而錢入於亭户之手者無幾二也鹽司及諸場人吏類多積私鹽以規厚利亭户非不畏法以有滑吏共為表裏互相蒙庇三也伏望申嚴禁戢從之乙酉執政內務進對洪適等奏連日祠事恐聖躬少勞又蒙宣召不知有何處分上曰亦别無事只為卿等兩日不曽奏事明日又是旬假恐事有積壓適奏陛下勤政如此臣留正等曰天下萬機之務無窮而人主應之亦無窮此古之聖人所以常有兢業之念而無怠荒之志也是故朝以聽政晝以訪問夕以修令夜以安身一日之間斯須有不敢懈者禹之功萬世永賴猶曰克勤于邦文王日昃不暇食以咸和萬民皆用此道以詔方來壽皇勤於聽政日對大臣講求治理于時兩日不奏事則有宣對之言且慮休浣相連庶政或有留滯所以為法於天下而可傳於後世者其逺矣哉十有一月丙午上曰張師顔有一道之寄却公然以魚􅒕來此作苞苴可特降一官如或不悛重置典憲便今報行己未詔後省旋次抽摘取上書可採者撮其樞要斷章取義立為篇目繕寫進呈從起舍趙師訓之請也執政晚對上出牙牌一面鐫吏户禮兵刑工贓吏字疏事目於下方上曰朕已令製造數副記朝廷事卿等亦當依此以備遺忘十二月己丑進呈刑寺擬斷廣州新會縣令盧曇慶案為受周浩關節收禁梁棟等致死擬斷徒二年私罪該赦書原上曰國家法令多寬官員犯罪遇赦皆原只虧得以下人可特與勒停丙申進呈刑寺擬斷陸知剛等詐官案大理寺並引赦贖銅刑部擬特旨陸知剛陸知微陸知茂各決杖編管上曰所犯情重可並決配廣南孫大雅發陸知剛亦不易可特與職名是日降御筆近勘陸知微等詐官冒請事情法兩重刑寺約法斷刑並皆不當王茀可放罷陳良翰可降一官放罷當職官吏議罰將上既而潘景圭元徽之吳交如劉敏求各特降一官人吏並杖一百勒停以洪適為僕射兼樞密使知樞密院事汪徹為樞密使是冬令監司郡守闕到即奏事訖之任如本貫川廣見在本鄉居住之人即仰知通結罪保明取旨是歲和義郡王楊存中薨追封和王諡武恭其祖宗閔為永興軍路總管陳歿父震知麟州建寧寨亦死於敵難存中天資忠孝慷慨有大節從戎河朔高宗一見遂授以心膂之寄前後轉鬭大小二百餘戰金創被體終始宿衛四十餘年上以舊臣尤禮異之呼郡王而不名存中父子相繼死難母張氏見震不屈亦引脰而死宗閔遇害祖母劉氏流落隴蜀存中日夜禱祠訪問間關數千里卒迎以歸李顯忠以罪斥存中保任之卒為名將御軍寬而有紀律所用將士不私部曲之舊輕財重義施不少吝所居建閣以藏御書上為題曰風雲慶會之閣起居郎權中書舍人蔣芾直前奏云竊惟中書政本之地舍人之職不特掌行詞命而已故事亦許繳駁臣雖時暫兼攝亦不敢以承乏而怠於職事儻政令之有過舉除授之有失當不免時犯天聽尚賴陛下容納上曰正欲卿如此不特政事與除授之間雖人主有過失亦可論奏丙戌乾道二年春正月丙辰進呈郭振申董超等升差上曰年皆及否洪適等奏年皆已及上曰立定年限方可杜其私意壬戌進呈建康都統劉源繳納到逃亡事故橫行拱衛大夫至副尉軍兵將校都虞候至押官付身二萬一千六百八十二件上曰付身還有許多否洪適等奏果有此數見今委都司毁抹上曰此事甚不可得於是詔武略大夫忠州團練使劉源特轉武顯大夫高州防禦使甲子進呈汪應辰乞優恤利州路運糧百姓而漕臣亦具奏乞運糧二碩人支錢引三道計合降度牒八百餘道上曰中間亦曽免了一處洪適等奏成和等四州已嘗免夏秋二稅一年京西路諸州亦免二稅一半上曰利路運糧每碩與二千可紐計度牒支降二月丙子詔宰臣奏乞令侍從臺諫兩省官舉監司郡守可依薦舉舊法如犯入已贓當同罪餘皆略之庶多薦引以副任使庚辰進呈臨安府勘到殿前司軍兵裴義等三名盜取駱昂錢物內有蕭郁吕宣未獲洪適等奏訓練隊將專管一隊事務不為無罪上曰統制官如何休得須各與降一官適等奏統制乃王公述兼帶御器械陛下行罰雖親近不免天下安得不畏服耶丙戌進呈戚方申審升差統領官孟俊充統制副將董苑充統領洪適等奏孟俊今年九月方及三年董苑充統領係升二等上曰孟俊可依差董苑升二等恐後援以為例且己之上又曰立定年限省多少事亦是良法壬辰進呈户部措置每月官兵俸料減支見錢分數月中可省二十萬緡上曰不若且依舊例事稍動衆不可輕改是月遣使賑兩浙江東飢三月甲辰進呈吏部申安穆皇后堂姪女夫沈巘補官方十二歲年未及格又趙氏乞收使故夫郭瑊恩數與康汝濟等嶽廟差遣上曰補官只爭三年無甚利害可待年及恩例既不合換嶽廟只可依條洪適等奏陛下以至公存心雖懿親不為少回況臣等豈得用私意邪壬子內降詔曰比年以來治獄之吏大率巧持多端隨意援引而重輕之故有罪者與除而不乖者罹酷朕甚患焉卿等其革玩習之弊明審克之公使姦不容情罰必當罪用迪於刑之中丁巳進呈殿前司陸差將副等洪適等奏升差但以年限殊不較量能否合亦呈試事藝上曰拘以年限自是國家法令今後遇有陛差卿等可間點三二名就堂下審驗與之語言能否自可見矣庚申進呈吏部長二措置到選人改官引見令立班移近軒陛逐一宣名其間聖意或有所疑之人即乞指名宣諭吏部侍郎令同到都堂審驗如不中選即取旨别作施行上曰如此施行全在卿等盡公方得其實甲子給事中魏杞等劄子今來皇太子已講授孟子徹章上曰可令講尚書治國之道莫先於此君臣更相警戒無非日所行事朕每無事必看數篇臣留正等曰仰惟壽皇天縱英明聖學高妙見於政治之迹莫非咸五登三之隆蓋其垂精載籍深有得於上古之書謂每無事必看數篇勸講諸宫亦以是書猗與盛哉臣等竊惟治國之道無出於畏天法祖恤民用人之大端而書實具之其君臣更相警戒若禹之告舜無若丹朱傲惟慢遊是好益之戒舜罔遊於逸罔淫於樂傅説之告高宗無啓寵納侮無恥過作非周公之告成王無若商王受之迷亂荒於酒德此其警戒之深功著明者無逸立政猶拳拳焉此固萬世帝王之龜鑑也辛未進呈李信父上書大略謂守令不得人且舉其所見閩之一方者言之如蠶未成絲已催夏稅禾未登場已催冬苗陛下固申加禁止矣今蓋有今年而追來年之租謂之預借者荒郡僻邑有先二年而使之輸者如編户差役官吏全不究實陛下固申警有司矣今則受財鬻法以合差役者隱焉其不應役之家則自甲至癸以次相及使致賄以求免如節次減免租負何嘗不巧作追呼也如粳稻不得收稅而今之收稅者自若也如過犯不得入役今之入役者自若也常賦之外泛科名色容或循習訟牒不問大小輕重或罰使輸金或抑使買鹽頃歲小不登鄉曲小民十百為羣持仗剽奪借艱食之名以逞其私憾倒廩傾囷所在皆然官不能禁也上曰李信父書詞理甚可取此五事合如何施行汪徹等奏守令得人即無此弊上曰可行約束已降指揮召赴都堂審察卿等更看其人如何於是詔户刑部檢坐見行條法指揮申嚴約束行下如有違戾去處卿監司覺察按劾聞奏是月親試舉人賜蕭國梁以下及第出身有差榜首本趙汝愚以故事降居第二洪適罷相奉祠以臣僚交章論之也夏四月甲戌朔進呈劉拱等以措置李金賊徒了畢推賞上曰朕已批與劉珙近時儒者多高談無實用卿則不然能為朝廷了事誠可賞也丁丑上諭執政卿等當謹法令無創例以害法如胥輩亷局之類切不可放行戊寅詔淫雨為沴害及禾麥可令侍從臺諫講究所宜以聞其臨安府并諸路郡縣見禁刑獄立限結絶委官分詣檢察乙酉臣僚言訪聞昨御營司招收弓手所管三千三百人見在殿司以殿司而有弓手之名色目不類又聞王琪招收百姓一千四百人專充養馬并輜重突頭大率遊手不妨在外營趂又聞馬司逐月勘支效用軍兵一萬六千三百餘人似與密院兵籍房數目不同望付密院審實銷落虛數所有弓手并養馬軍兵並行揀閲將強壯堪披帶之人收附以充戰士尫羸老弱並行揀汰詔委都承檢詳揀閲仍取會不同因依申密院於是檢詳朝公武取會殿前馬步三司在外諸統帥之兵各開具置籍聞奏上曰朕令殿帥王琪措置三軍有堂記子將各人武藝注於其下甚易見丁酉進呈莫濛程逖司馬倬等奏知荆南李道所為乖謬政出胥吏妄用經費専意營私盜賊羣起不即擒捕上曰李道輒恃戚里敢爾妄作可與放罷葉顒等奏陛下行法不問戚里天下聞之孰不畏服耶己亥臣僚言祖宗留意考課之法王安石始罷之欲望遵用太宗故事應監司郡守朝辭日别給御前印紙歷子至於興某利除某害各為條目每考令當職官吏從實批書任滿精核詔經筵官參祖宗法與見行條制務要適中可以久行是月除浙西圍田以其壅水害民田故也參知政事兼知樞密院事葉顒罷以臣僚論列也仍將納賂求差遣人林懋能周良臣送大理寺五月甲辰進呈饒州闕守臣葉顒等擬俞翊且言其作邑有聲鄱陽大郡但此人履歷未深上曰選材治劇亦不須較資格也可依擬差丁巳上宣諭宰執曰近日臣僚劄子多言大臣不任事卿等更宜勉力如朕有所不至處卿等須來理會或事有不可任但來執奏庚申御筆不曽任守臣不得除郎官魏把奏其間却有任監司人未審令與不合除授上曰監司察州縣者也事同一體丙寅詔今後看詳四方投獻書劄文字擬定等第將上丁卯詔行下諸路監司守臣察今秋有田禾不熟之處預先講求救荒之政如將來水旱去處却致無備必置于罰如備預有方當議推賞六月壬午林安宅蔣芾奏臣等備員宥地所職在於兵將如二三大將陛下之所深知偏禆之間有才者亦多但臣等素不相識無以知其才否欲自此與之相見上曰卿等於審察或升差之榷貨務如兩淮人過江南許將交子於務場換易會子江南人過兩淮亦聽用見錢或會子就務場對換交子行使九月丙午知鄂州汪徹劄子臣頃任御史嘗舉選人李允升以贓汙送大理寺所有臣繆舉之罪望有司施行詔特降兩官甲子詔今後臺諌侍從章奏各置一簿隨所上録之一以留禁中時備觀覽一以授大臣使之詳閲有事已行而輒廢或行而以法有礙於民未便及監司郡守言與事違者各以時糾之從祕書少監汪大猷請也是月溫州水災遣使賑之地震知上元縣李允升坐贓貸死決配建康帥守王佐坐容縱允升尋醫離任追兩官勒停建昌軍居住提刑袁孚以失按降一官禮部員外郎莫濟為司農少卿魏把奏曰濟嘗中詞科且掌南宫箋奏但恐議者以為蹊徑未是上曰中都官初不分清濁如司農責任亦甚重以士人除授亦無害也濟尋奏言為治在於任人任人在於責實任人而不能久則賢而能者無以見其長惡而不肖者得以逃其罪雖有責實之政將安所施今輔相大臣或數月而已罷寺監丞簿郎曹卿監不踰歲而輒遷恐進退人才似乎稍驟也詔所論甚當凡百執事各勤乃職期底於治汪大猷奏乞令諸帥不拘部曲各精擇三兩人必實言其或智或勇或知其有某材可用或舉其任某事可取悉以名聞分命文武禁近之臣更迭接見與之談論兵家之務然後賜對便殿略其言語儀矩之失取其材力謀略審其可用試之以事立功則舉者同賞敗事則罰亦如之詔從之各十月乙亥吏部尚書陳俊卿進對奏臣典選事但當謹守三尺檢柅吏姦至於愚暗所見或未到亦望聖慈宣諭時時訓敕之君臣之分雖嚴而上下之情不可不通上曰卿言是也朕或有過卿亦宜盡言俊卿奏自古惟唐太宗能導人使諫所以致貞觀之治上曰每讀太宗事未嘗不慕之若德宗之忌克不樂人言未嘗不鄙之上退御講筵講罷上曰朕雖無大過豈無小失卿等不聞有所規諫恐思慮有所未至賴卿等補益周執羔等奏曰陛下聖明事無過舉上曰卿等若只備位非所望於卿等梁克家奏容臣等退思苟有闕失不敢不盡言周執羔嘗進對上曰卿有所言朕未嘗不行朕有過失卿當直言有司之過失亦當言之進呈知溫州劉孝韙劄子以本州大水之後乞降度牒應副修築塘棣事上因言朕近日覽神宗紀見是時災異甚多何故魏把等奏天出災異譴告人君正如父母訓飭為人子者不必問自己有過無過但常恐懼修省而已上曰卿之言甚善若不恐懼修省自取滅亡之道也己丑臣僚言役法科擾大略有弓兵月巡之擾有透漏禁物之責有捕獲出限之罰有將迎擔擎之差有催科捐代之費有應副按檢之用有承判追呼之勞凡此之類皆役法之所深懼若蒙朝廷約束無復如前科擾天下幸甚詔監司常切覺察先是饒州歲貢金一千兩詔減十分之七雨雹十一月辛亥執政進呈次上出吳蓋妻趙氏乞故夫遺表恩澤奏異姓上曰不知前此有無體例可以行否魏把等奏容檢照舊例上曰今後有文字更不批出只與卿等理會庶幾不錯把等奏若無例臣等亦不敢行陛下欲只與臣等理會如此政令豈有過舉者乙卯詔執政私第接見賔客除侍從稟議職事外其餘呼召取覆官止許各接見一次丁巳殿中侍御史單時言伏覩制旨監司於所部保明郡守郡守於所屬保明知縣縣令治狀顯著令中書門下省籍記取旨甄擢然人之才術各有分量吏之治迹未易稽考臣願訓敕監司郡守列其所舉之人治狀之目詳著于薦書然後大明賞罰舉得其實則受上賞舉失其實則置重憲庶幾選舉之法得矣從之甲子車駕幸候潮門外大教場次幸白石教場抽摘進呈三司軍馬有旨慰勞錫賚諸將鞍馬金帶以及士卒賞皆有差時久陰曀暨皇帝出郊雲霧解駮風日開霽是月起居舍人洪邁直前奏臣幸得以文字薄伎待罪屬車間每侍清間之燕獲聞玉音凡所擲諭莫非中的徽言善道可為世法退而執筆欲行編次而考諸起居注皆據諸處關報始加修纂雖有日歷時政記亦莫得書故使洋洋聖謨無所傳信臣伏覩今月五日給事中王曮進講春秋莒人伐把言周室中微諸侯以強凌弱擅相攻討殊失先王征伐之意上曰春秋無義戰周執羔進讀三朝寶訓論文章之弊上又曰文章以理為主陳巖叟等奏刑部事上曰寬則容姦急則人無所措手足此數端皆承學之臣日夜探討纍數百語所不能盡而陛下蔽以一言至明至當然記言動之臣弗能宣究恐非所以命侍立本意欲望聖慈令講讀官自今各以日得聖語關送修注官仍乞因今所御殿名曰祥曦記注庶幾百世之下咸仰聖學以迹聰明文思之懿從之步帥陳敏言本司所管官兵二萬餘人今汰去老弱二千餘人以所請錢米論之歲費四十八萬貫推究諸處共約有三十萬餘人以十分為率汰去一分老弱計三萬人每歲可省七百二十萬貫如是則費用省而國自富老弱去而兵自強矣從之十二月庚寅左司諫陳良祐奏今之言利者多要生財生財乃所以病民國用愈見不足願取見一歲賦入之數其取於民者已過則從而蠲免之以寬民力取見所養官吏與兵之數其可省者從而省之常令財用十分以七分養兵與官吏三分以備非常如此則上下兼足上曰朕常有志放免和買及折帛等錢以寬民力但如今未暇良祐奏舊來本無此等錢皆是軍興時科取講和之後依舊不除今取於民者竭矣若制節國用令出入有度稍有蓄儲即可行陛下之志矣上曰因卿之言當定經制辛卯詔朕惟理國之要裕財為重夫百姓既足君孰與不足量入為出可不念哉自今宰相可帶兼制國用使參政可同知國用事庶幾上下同德永底阜康丁酉起居舍人洪邁奏天下萬務出命於中書審於門下行於尚書所以敬重政令期於至當而已初無文武二柄東西二府之别也今三省所行事無巨細必先經中書畫黃宰執書押既完當制舍人書行然後過門下而給事中書讀如給舍有所建明則封黃具奏以聽上旨惟樞密院既得旨即畫黃過門下而中書不預則封繳之職微有所偏况今日宰相樞臣兩下兼領因而釐正不為有嫌欲望詔樞密院自今已往凡已被旨文書並關中書門下依三省式畫黃書讀以示欽重出命之意詔從之然樞院機速事則不由中書直關門下省謂之密白是月以葉顒魏把為左右僕射簽書蔣芾兼參知政事陳俊卿同知兼權參政先是上猶未能屏鞠戲又將遊獵白石俊卿時為吏書上疏力諫後數日入對上迎謂曰前日之奏備見忠讜朕決意用卿矣俊卿再拜謝上曰朕在藩邸已知卿為忠臣矣兵侍陳巖肖因對奏近都宣麻並拜左右二相同日除參樞二執政中外相慶以為得人然臣以為大臣當稍付之以權使之任天下之責上深嘉納曽覿龍大淵以舊恩竊寵士大夫頗出其門言事者語或及之往往獲罪時陳俊卿受詔館北使大淵為副公見外未嘗與交一言大淵造門納謁亦謝不見一日中書舍人洪邁見俊卿曰人言鄭聞當除右史某當除某官信乎俊卿曰不知也詰語所從邁以大淵對俊卿他日入對畢具以邁語質於上前曰臣不知此等除目兩人實與聞乎抑其密伺而播之於外以竊弄陛下之威權也上曰朕何嘗謀及此輩必竊聽而得之卿言甚忠當為卿逐之俊卿再拜謝退遂出二人於外中外快之北使來庭俊卿以故事押宴使者致私覿其狀花書而不名俊卿却之掌儀懼白俊卿恐生事俊卿使語之曰今日豈當用辛巳前故事耶使者詞屈乃問俊卿爵里甚悉而易狀書名以遣曰特為陳公屈耳自是遂為例丁亥乾道三年正月甲辰內降詔曰獄重事也稽者有律當者有比疑者有讞持巧心設二端者有禁朕選任廷尉理官以法付之而比年以來顧以獄情白於執政探取旨意以為輕重甚亡謂也夫人臣舉要有司致詳閲實之初五聽參具在彼有情在我有法相當而已而又何咨焉繼自今其祗乃心敬於刑惟當為貴毋習前非不如吾詔吾將大置於罰罔有攸赦癸丑何逢原除金部郎官上曰恐儒者不肯留意金榖事如吕搢問簿籍都不知卿等可面諭何逢原令留意職事臣留正等曰户部理天下財榖郎位其間共有五而司珍之責莫重焉為郎於此而恬不以事為意則均節邦之財物考其簿正奠其地守以制盈虛之柄者將孰任其責也孔子嘗為委吏矣曰會計當而已矣嘗為乘田矣曰牛羊茁壯長而已矣夫委積芻牧之微雖聖人未嘗有不屑為之心也而况司珍之事又有大於委積芻牧者乎壽皇聖訓與夫子若符節是月度支郎唐掾言自紹興三十一年即造會子至乾道二年七月共印造二千八百餘萬貫在乾道三年正月六日以前措置收換外尚有八百餘萬貫在民間未收今來諸路綱運依近降指揮並要十分見錢故州縣不許民户輸納會子致流轉不行商賈低價收買輻湊行在所以六務支取擁併喧閧今欲給降度牒及諸州助教帖各五千道付𣙜貨務召人依見立價例全以會子進納庶幾少息擁併之弊而會子在民間亦不過數月便可收盡詔先次給降度牒并助教帖各五百道候出賣將盡取旨接續給降中書門下省言昨來支降交子付兩淮行使緣所降數目過多及銅錢并會子不許過江是致民旅未便今措置令銅錢會子依舊任便行使應官司見在未支交子令差人管押赴左藏庫交納二月壬申上曰朕已草得一指揮理會財用少須降出御筆云自後宫禁內人并百官將校軍兵諸司人每月初五日國用房開具前月支過已上五項請給數目并非泛支用造册進呈便從此月為始外路軍馬可降式樣付諸路總領逐月開具自此遂為定式上謂輔臣曰蔣參政理會財用已尋見根源初芾因謝新除留身奏云方今費財最甚者無如養兵近見陳敏㨂汰二千人戚方揀汰四千人夫汰兵固良法然今日之施多是有官人與之外任依舊請劵錢又添供給雖減之於內添之於外亦未見其益既減六千人必又招六千人填額則是添六千人耗蠧財用矣契勘在內諸軍每月逃亡事故常不下四百人若權住招一年半內可省三百八十萬貫俟財用稍足可逐旋招收強壯訓練而用之不惟省費又可兵精因奏紹興以來初分五軍并內外諸軍分合添減之數上以為然故有此宣諭乙亥架閣衛博論用人宜緣所長棄所短上曰卿言極是用人不當求備知禮者必不知樂知樂者必不知刑若得其人不當數易宜久任以責成功丁丑上言敵主葛王禽荒日事田獵修造宫室上木之工不止後宫亦多其侈靡又過於顔亮大與初即位時不同要之人主侈心一生其弊至此朕每以自警戒卿等見朕有過亦當規正蔣芾奏臣近朝德壽宫恭聞太上皇帝玉音云主上勤儉過於古帝王上曰朕亦自以為勤儉無愧唐太宗惟是功業逺不逮太宗芾奏功崇惟志陛下既有此志守之以不怠何患功業之不成壬午起居舍人洪邁奏兩省每日行遣録黃文書盈於几閣多有常程細故不足以煩朝廷專出命者使中書之務不清無甚於此上曰朕嘗見通鑑載唐太宗謂宰相聽受辭訟縈於簿書日不暇給因敕尚書細務屬左右承朕見欲理會卿所論可謂至當宣諭葉顒曰今日可進入武臣薦舉兵將官册子朕欲周知其人顒奏宜於無事詢訪以備緩急陳俊卿奏陛下曽記得王存否其人似尚可用上曰朕識之粗暴之一人老矣智力皆無所用也乙酉詔降下武經龜鑑孫子令密院委使臣一員給賜鎮江都統戚方建康都統劉源仍令選擇兵官各賜一本乙未進呈環衛官元有指揮不許差戚里前日得旨差潘才卿有礙元降指揮上曰卿等如此理會甚好可别理會戊戌諫議陳天麟言近探報敵聚糧增戌以其太子為元帥居汴宜擇將帥預講禦備之䇿上曰此今日急務昨王琪請築揚州城卿等見文字否葉顒奏琪至都堂議論尚未定魏把奏淮東之備宜先措置清河楚州高郵一帶庶可遏敵糧道上曰若把定高郵不放糧船過來則敵不能舉留淮上自當引去也三月庚子宰臣葉顒乞抽回江州兵馬上曰此豈得已亦要熟商量近來招兵練兵皆容易惟養兵最難此豈有定論他時財賦有餘自可增招顒又奏昨日陳敏對陛下必已分付六合事上曰亦説却欲帶步司人去顒奏陳敏甚曉地利且有志立功名上曰若陳敏鎮守高郵甚好却别擇一步帥亦難得人是月宣押殿前可選鋒軍九百人騎入內射夏四月丙子宣殿前司選鋒等軍五百八十二人車二十四兩入內教庚寅右軍統制張平奏事上曰兵謀務要決勝不得輕動有功者雖讎與賞有罪者雖親與罰是月併利州東西為一路以吳璘為安撫使兼四川宣撫兼知興元府璘尋薨初璘病呼幕客草遺表命直書其事曰願陛下無棄四川無輕出兵不及家事人稱其忠璘為人剛毅靖深喜大節略苛細讀史傳曉大義其御軍恩威兼濟士卒樂為之用每出師指麾諸將風采凛然無敢犯令者故所向多捷玠死璘為大將守蜀捍敵餘二十年隱然為方靣之重其威名亞於玠其選諸將多以功有告以薦材者璘曰兵官非嘗試難知其才今以小善進之則僥幸者獲志而邊人宿將之心怠矣故所用後多知名嘗著兵法二篇追封信王諡武順五月戊申上曰昨批韓曉奏狀知隨州林嶷放罷如此處置莫是葉顒奏臣昨見言者論罷韓曉臣知林嶷陰遣其家屬在行在納短卷於臺諫臣方欲再開陳令陛下批下可謂明見萬里之外陳俊卿奏近日此風頗盛是使監司不敢按郡守郡守不敢按縣官上曰此風誠不可長朕方欲手詔戒諭臺諫辛酉王炎奏近來士大夫議論太拘畏且如近詔王琪至淮上相度城壁朝士皆紛然以為不宜上曰此何害儒生之論真不逹時變昔徐庶言通世務者在乎俊傑朕與卿等當守此議論他不足恤是月振泉州水災安奉太宗真宗玉牒及三祖下仙源積慶圖哲宗寶訓六月癸酉上曰朕欲依祖宗故事先令有司具囚情欵前數日進入朕親閲之可釋者釋之可罪者罪之庶不為虛文可降指揮今後並依祖宗典故丁亥度支趙不敵言將帥未必知兵徒務聲勢今日添使臣明日招效用但資冗隨未見精雄上曰此正中今日將帥膏肓是月命知院虞允文宣撫四川代吳璘也允文尋言房州義士金州保勝軍見管七千餘人皆建炎紹興之初自相結集固守鄉閭最為忠義而州縣全不加恤分占白直應副往來又有都統司差役科擾欲乞差皇甫倜為利州東路總管金州駐劄令專一主管於農務隙時往來教閲或緩急有警可責令分守諸關從之秋七月辛亥臣僚言户部申請諸路並限一季出賣官産拘錢發納且以江東西二廣論之村疃之間人户雕疏彌望皆黃茅白葦膏腴之田耕猶不遍豈有餘力可買官産今州縣迫於期限且兾有厚賞不免監錮保長抑勒田鄰乞寬以一年之限戒約州縣不得抑勒如有違戾重置典憲從之癸丑諌議陳良祐奏民間傳邊事多是兩下説成為備雖不得已要不可招敵人之疑如近日修揚州城衆論以為無益上曰正欲為備如何無益良祐奏萬一敵人衝突兵不能守則是為敵人築也今遣二三萬人過江敵人探知却恐便成釁隙上曰若臨淮則不可在內地亦何害良祐奏更願審思今日為備之要者無過選擇將帥收蓄錢糧愛民養士上曰卿言甚是甲寅上曰淮東備禦事此須責在陳敏萬一有警却恐推避誤事卿等宜熟與之謀魏把奏臣等昨為陳敏約敏亦自任此事今朝廷但當稍稍應副之而已上曰是是月以皇太子愭疾大赦天下尋薨閏七月丙寅朔宣諭曰朕欲江上諸軍各置副都統一員令兼領軍事豈惟儲他日統帥亦使主將有顧忌不敢專擅作過戊寅郭剛除鎮江副都統上曰郭剛之除聞鎮江軍中甚喜葉顒奏郭剛甚亷軍中素所推服庚辰上論理檢院故事因謂葉顒等曰朕常思祖宗創立法度以貽後人後世子孫不能保守極可惜上又曰創之甚難壞之甚易蔣芾曰臣嘗記元祐三年進士第一人李常寧廷試䇿破題四句云天下至大宗廟社稷至重百年成之而不足一日壞之而有餘上曰誠為明言芾奏所謂壞者非一日遽能壞也人主一念慮之間不以祖宗基業為意則事事放倒馴致敗壞故人主每欲自警戒常恐一念慮之失上曰朕非獨自警戒而已且憂後世子孫不能保守為可惜也癸未臣僚言閩中鹽策之弊有五官糴浩瀚而本錢積壓不支間或支俵而官吏尅減計會縻費貧民下户皆不樂供官而太半糶於私販一也綱運之人非巨室則官吏載縣官之舟藉縣官之重影帶私鹽出糶二也州縣斥賣多置坊局付之胥輩其權稱之減尅泥沙之雜和官皆不之問私價輕而官價重官鹽雜而私鹽真鄉村之民太半食私鹽故官糶不行三也巡尉未嘗警捕但日具巡歷申於官長月書所到置於驛壁私販猾商莫之誰何四也今之邑敷賣官食鹽與夫借鹽本錢者多是給虛劵約綱到數日支給甚至拋敷賣之數付之耆保攤及僑户其見在鹽却封椿不得支出謂之長生鹽若人户不願請鹽只納敷數之半以貼陪官將官鹽貯之别所以添後日之數謂之還魂鹽猾吏攬朴民户貼陪錢請鹽出賣出息則與邑均分謂之請鈔鹽五也況閩中崇岡峻嶺淺灘惡瀨商旅興販流轉實難故鈔鹽之法不可行乞講究利害盡革前弊明年二月施行癸巳劉珙自湖南召還初入見首論獨斷雖英主之能事然必合衆智而質之以至公然後有以合乎天理人心之正而事無不成若棄僉謀徇私見而有獨御區宇之心焉則適所以蔽其四達之明而左右私眤之臣將有棄之以干天下之公議者矣又論羡餘之弊曰州縣賦入有常大郡僅足支遣小郡往往匱乏而近者四方尚有以嬴餘獻者不過重折苗米或倍稅商人至有取新賦以積餘錢損積逋以與州郡州郡無以自給不過重取於民此民之所未便一也和糴之弊湖南江西為尤甚朝廷常下蠲免之令逺方之民舉手相賀曽未數月又復分拋州縣既乏緡錢將何置場收糴民間關引無用則與白著一同倘有以革綱運之弊自可減和糴之數此民之所以未便二也望詔止之上嘉納尋以珙為翰林學士珙嘗從容言於上曰世儒多病漢高帝不悅學輕儒生臣竊以為高帝之聰明英偉其所不悅特腐儒之俗學耳誠使當世之士有以聖王之學告之臣知其必將竦然敬信而其功烈之所就不止於是而已矣蓋天下之事無窮而應事之綱在我惟其移於耳目動於意氣而私欲萌焉則其綱必弛而無以應夫事物之變是以古之聖王無不學而其學也必求多聞必師古訓蓋將以明理正心而立萬事之綱也此既立則雖事物之紛來千變萬化而在我常整整而不紊矣惜乎當是之時學絶道喪未有以是告高帝者上亟稱善八月乙未朔是月禁兵官交結內侍時鎮江軍帥戚方刻剝役使軍士嗟怨言者及之陳俊卿奏外議內臣中有主方者上曰朕亦聞之方罪固不可貸亦當併治左右素主方者以警其餘即詔罷方而以內侍陳瑶李宗回付大理究其賄狀獄成陳瑶決配循州李宗回等降罰有差於是詔戒兵將官交納內侍公行苞苴自今有違戾必罰無赦上又諭輔臣以建康劉源亦嘗有賂於近習方思有以易之今欲且遣王抃至彼檢察姦弊留數月而後歸庶新帥之來不至循習俊卿又奏曰今但遴選主將則宿弊當自革矣上曰政患未得其人耳俊卿曰茍未得人更宜精擇既已委之則當信任今未得其人已先疑之似非朝廷所以待將帥之體且軍中財賦所以激勸將士但主帥不以自私則其他當一聽之今設樂而宣旨罷之及宴使客然後復用庶幾事天之誠得以自伸而所以禮使人者亦不為失上可其奏且曰宴設雖進御酒亦毋用樂惟於使人乃用之耳議者顧以為紫宸上壽乃使客之禮固執前議俊卿又不可獨奏言適奉詔旨有以見聖學高明過古帝王逺甚臣敢不奉詔然猶竊謂更當先令館伴以初議喻使人再三不從乃用今詔則於禮為盡而彼亦無詞不可遽鄙夷之而遂自為失禮以徇之也蔣芾猶守前説俊卿退復為奏曰彼初未嘗必欲用樂我乃望風希意而自欲用之彼必笑我以敵國之臣而虧事天之禮他時輕侮何祈不至此猶不可不留聖慮上嘉納之葉顒魏把罷相奉祠以郊祀雷變故也詔戒士大夫因循茍且誕謾奔競之弊命臺諫侍從兩省官指陳時政闕失以陳俊卿參知政事劉珙同知樞密院俊卿言於上曰執政之臣惟當為陛下進賢退不肖使百官各任其職至於細務宜歸有司庶幾中書之務稍清而臣等得以悉力於其當務之急上甚然之一日審察吏部所注知縣有老不任事者俊卿判令吏部改注吏白例當奏知俊卿曰此豈足以勞聖德明日取旨自今此等請勿以問一日上顧輔臣圖議恢復劉珙奏曰復讎雪恥誠今日之先務然非內修政事有十年之功臣恐未可輕動也同列有進而言者曰漢之高光皆起匹夫不數年而取天下又安得所謂十年修政之功哉珙曰高光初起匹夫也故以其身蹈不測之危而無所顧陛下躬受太上皇帝祖宗二百年宗社之寄其輕重之寄豈兩君比哉臣竊以為自古中興之君陛下所當法者惟周宣王而已宣王之事見於詩者始則側身修行以格天心中則任賢使能以修政事而已其終至於外攘夷狄以復文武之境則其積纍之功至此自有不能己者非一旦率然僥幸之所為也上深然之十二月甲寅詔諸路訓練兵官將逐州揀中見教閲禁軍內事藝取高強身貌強壯為上等事藝高強身貌瘦怯為中等餘並為下等限一月置册開具申密院是月詔今後已降指揮合待報事令諸房置簿隨日抄上時行檢舉拘催仍令左右司勾銷結甲如有違慢去處三省開具取旨是歲定改官以一百人恤賞以二人四川換改官以二十人為額廣東提舉茶鹽石敦義坐盜鹽腳錢入已貸死刺配栁州宋史全文卷二十四下
