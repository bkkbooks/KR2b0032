body:
  text: 宋史全文卷十四宋徽宗庚辰元符三年正月己卯夜漏未盡宰臣執政會門下省黎明詣內東門宣召入會通門至福寧殿皇太后曰大行皇帝無子天下事須早定惇厲聲曰在禮律當立同母弟簡王皇太后曰神宗皇帝諸子申王雖長緣有目疾次即端王當立惇又曰論長幼則申王為長論禮律則簡王當立皇太后曰俱是神宗之子豈容如此分别於次端王當立徽宗乃即皇帝位詔皇太后權同處分軍國事詔大行皇帝皇后號元符皇后二月吏部侍郎徐鐸知貢舉給事中趙挺之寶文閣待制何執中起居郎吳伯舉同知貢舉知開封府吳居厚因奏對言陛下即政之初京師有妄議朝政者當行止絶乞增置邏者上曰及朕躬否居厚曰雖不敢指斥然傳播朝廷升黜將大有更張其語不根上曰如及朕躬容朕修省居厚慙謝而退曽布因言青唐之事全是章惇力主此議紹聖以來措置邊事無不如意臨了作此一事至今狼狽了當不得壬寅大行皇帝殯于福寧殿之西階甲辰太后曰皇帝年長聖明本不須同聽政但以再三不得已從所請比俟殿殯便欲退處今至祔廟亦黽勉也先丞相最被遇真皇先一年薨不及䇿立仁宗相公等必知先丞相事業舊嘗見父言慈聖盛德然還政亦差遲至今記得此語以此不遑自安如此庶幾不違父教不辱先相門風又俗諺云彼殺不如自殺不成更待他時教他人有言語後還政何如先自處置為善衆皆稱頌己酉知南安軍邢恕為龍圖閣待制知定州詔以新除吏部尚書韓忠彥為門下侍郎新除資政殿學士黃履為尚書右丞忠彥陳四事以禆新政其一廣仁恩其二闢言路其三去疑似其四謹用兵詔管勾御藥院郝隨劉友端與外任宫觀以近年禁中修造華飾過當故也癸亥復范純仁劉奉世吕希純王覿吳安詩韓川唐義問並分司南京純仁光祿卿居鄧州奉世少府監居光州希純少府少監居唐州覿光祿少卿居和州安詩少府少監居澧州川少府少監居隨州義問屯田貟外郎居安州又詔吕希哲管勾明道觀吕希績管勾崇福宫吕陶提舉玉局觀蘇軾移廉州蘇轍移永州劉安世移衡州秦觀移英州程頥移峽州鄒浩監袁州酒稅黃庭堅添差監鄂州在城酒稅三月權發遣洛州龔夬為殿中侍御史權發遣衛州陳瓘為左正言添差袁州酒稅鄒浩為右正言用曽布韓忠彥黃履所薦也上極稱浩且謂布曰浩擊章惇文字待降出布因言言路得人中外孰不鼓舞唯章惇蔡卞不樂爾庚寅敕下禮部放正奏名進士李釡以下五百六十一人第一第二等賜及第第三第四等賜出身第五等賜同出身辛卯詔太史前告天將動威日有食之期在正月變異甚巨殆不虛生應中外臣僚以至民庶各許實封言事在京於合屬處投進在外於所在州軍附遞以聞丙申章惇上大行皇帝陵名曰永泰陵詔恭依夏四月朔日有食之百官守局日官言辰初食西北四分至巳五刻而復新知太原府蔡京依前翰林學士承旨是日曽布再對力陳京卞懷姦害政羽翼黨援布滿中外善類義不與之並若京留臣等必不可安位上慰諭曰無他皇太后但且欲令了史事以神宗史經元祐毁壞今更難於易人爾曽布獨對上曰封事已百餘軸盡言章惇於定䇿之際罪惡固不待言蔡卞隂狡害政紹聖以來傷害人物多出於卞其罪更大於惇布曰陛下分别忠邪如此則臣雖退歸山林死亦瞑目至簾前亦具以此陳之後三日上又曰言惇卞者已二三百軸庚戍以皇長子生輔臣稱賀月犯東咸丙辰熒惑犯填丁巳詔天祐豫家挺生上嗣國有大慶賚及多方解網恤辜何俟終日范純仁下項官與宫觀差遣外州軍任便居住中丞安惇罷知潭州先是陳瓘言陛下欲開言路首還鄒浩取其有既往之善可謂得已試之才安惇尚緣往事論浩罪惡欲寢已成之命自明前舉之當其説以為先朝之事且當遵承國是所繫不可輕改豈有事事不改而可以謂之善繼天下皆非而可以執為國是乎鄒浩既來惇可去矣惇聞瓘章已出亦自請去故有此命瓘又言國是之説孫叔敖戰國一時之事然其言曰夏桀商紂不定國是而以合其取捨者為是不合其取捨者為非則是孫叔敖之意亦不敢以取捨之私而害天下之公是非也因録國是故事上之講義曰國論之無所主非也國論之有所主亦非也國無定論固不可以為國然使其主於一説則人情視此以為向背人才視此以為去就人言視此以為是非上之政令下之議論皆遷就而趍之甚矣國是一言之誤國也夫國以為是即人心之所同是也又安有衆之所非而自以為是使人皆不得於國是之外者此特孫叔敖之妄論唐虞三代孔孟之明訓初無是也秦漢至五代其言未嘗用也本朝自建隆至治平其説未嘗有也自熙寧王安石始有是論而紹聖之蔡卞崇寧之蔡京皆祖述其説而用之熙寧以通變為國是則君子為流俗矣紹聖以紹述為國是則嶺海之間皆逐臣矣蔡京之國是又為豐亨豫大之説而已則立黨石刻黨碑凡所托以害君子者皆以國是藉口曰此神考之意安石之説也縉紳之禍多歷年所豈非一言可以喪邦乎陳瓘言陛下改用大臣明示好惡卞則安坐而不動惇則備禮以求去立其私説變亂名實為國政之害大者有三一則以繼述神考為名違其説者謂之不孝而實有負誣之心二則以厚於先帝為名違其説者謂之至薄而實有輕欺之意三則假經義之糟粕竊安石之緒餘依語而行蔽惑上下謀發於蔡卞之心事成於章惇之手脅持上下果斷必行此二人者外示睽間而心不相忘有急則相應自然必致之理也五月貶濰州團練使前知湟州王贍為諸衛將軍房州安置姚雄奏稱青唐邈川始因王贍貪功生事招誘羌酋收復窮逺之地費財勞師連歲不解上疑貶贍太輕太后曰自此必寧靜矣癸酉詔近經登極大赦及纍降赦宥中外臣僚無不甄敘唯瑶華廢后未復位號理所未安令三省樞密院同詳議聞奏乙亥瑶華以犢車四還禁中至內東門皇太后遣人賜以冠服令易去道衣乃入中外聞者莫不歡呼丙子制廢后孟氏可復為元祐皇后上諭曽布蔣之竒曰臺諌攻蔡卞已十餘章如何得卞知令自圖去就皆莫敢對上曰只説與章惇則卞自知矣惇欲召吳伯舉往諭之己卯共奏遣伯舉上遣伯舉諭旨卞遂草表乞宫觀布又言卞之去固已定然外議皆以京進為憂上默然忠彥翌日留身具道京不可進上曰本無用之之意但於簾前更開陳太后曰相公第安心必無此忠彥退以語同列皆相慶己丑詔追復文彥博等官辛丑月犯昴是日龔夬論蔡京詔送三省訖不行韓忠彥曰上恐人言未已兼來者必紛紛也甲午陳瓘上殿再論章惇又論蔡京罪狀上以為京與卞不同瓘極陳乃稍然之六月癸卯月犯熒惑丁未制曰龍圖閣待制邢恕操心傾危雅意傳會造為光語上纍宣仁使光公著被凶悖之名蒙竄殛之罪欺天誤國職爾之由今朕既申彼之寃還其爵秩則爾罪惡何詞以逃可依前官守少府少監分司西京均州居住曽布言元祐之人憤嫉熙寧元豐之人一切屏斥已失之偏紹聖用事者又深忿元祐之人故竄斥廢黜無不過當其偏則又甚矣今日陛下欲以大中至正之道調一兩黨則但當區别邪正是非處之各得其所則天下孰敢以為非者臣纍聞聖諭及皇太后亦曽宣諭亦謂是者則用不是者則不用更不必分别此時彼時若人臣皆能體此意則無不當矣秋七月己巳熒惑歷氐星犯房星太白犯角距星范純仁為觀文殿大學士中太一宮使蓋將以為相也時純仁在南京已病矣辛未熒惑在房心之間壬申以皇太后罷同聽政族屬姻戚遷秩命官者凡三十三人豐稷陳師錫言仁宗問輔臣或謂先朝詔令不可輕改信然乎王曽曰此憸人惑上之言也咸平中刪太宗詔令十存一二去煩密之文以便於民何為不可仁宗然之由是觀之朝廷之法消息盈虛與時偕行何常之有哲宗親政召章惇為宰相惇用羣小合姦謀害元祐忠賢司馬光吕公著等變亂神考法度謂之不忠不能紹述謂之不孝以此激怒先朝此王曽所謂憸人惑上之言也惇編類臣寮章疏擇其切直不諱之言謂之訕上謂之指斥臣觀書見禹戒舜曰無若丹朱傲惟慢遊是好周公戒成王曰無若商王紂亦可謂之訕上乎亦可謂之指斥乎惇又以章疏語言不足為大惡乃持文及甫邢恕之私言輒誣光等謀廢立為不軌無狀可按無迹可尋一切以意為之惇當國七年竊持威柄禍福天下勇於害賢敢於殺人臨大變訂大事包藏隂謀發為異議陛下尚優容之乎祖宗怒惇久矣今付陛下震之上帝怒惇久矣今命陛下誅之陛下何憚而不果邪己卯熒惑自房心之間上行月犯天隂八月乙未朔祕書少監鄧洵武為國史院編修官從蔡京之薦也給事中葉濤龔原相繼駁奏陳瓘言近言山陵使章惇奉使無狀以致哲宗大升舉陷濘不前乞依唐李珏故事先次行遣未蒙施行丙申太白犯亢九月甲子朔左僕射章惇上表乞罷政詔答不允上謂輔臣曰朕不欲用定䇿事貶惇但以扈從靈駕不職坐之餘事候有人理會别議行遣韓忠彥曰例當放辭謝上曰不必爾令庭下辭謝而去可也庚辰詔陳瓘纍言皇太后尚預國事其言虛誕不根送吏部辛巳添差監揚州糧料院癸未月入井甲申知江寧府蔡卞落職提舉洞霄宮龔夬言蔡京與卞表裏相濟天下共知其惡播於民謡云二蔡二惇必定沙門籍沒其家禁錮子孫又云大惇小惇入地無門大蔡小蔡還他命債伏望博加採訪以辨忠邪丁亥瓘知無為軍時瓘已出國門即露章辭免曰臣所望者當以流竄蔡京為急不當以移臣差遣為先也詔不許辭免太白犯斗杓第二星冬十月丙申蔡京知永興軍上曰陳瓘極不可得前日遣人送黃金百兩瓘受賜泣下新知越州章惇潭州安置徐績為制曰處心忮忍賦性隂邪凡陳開導之言無非殺伐之事隂挾仇怨妄肆中傷或稱謀危上躬或託謗訕宗廟擯除禁近視若孤豚排斥縉紳棄如斷梗投之荒裔肯使生還殺戮無辜道路以目壬寅知樞密院事曽布為尚書右僕射兼中書侍郎戊申月食畢先是曽肇進對白上臣兄傳旨令草詔戒內外以持大中至正之道上曰只是神宗法度當固守人材則無彼此惟是者用之肇對欲云政無新舊惟義理是守人無彼此惟賢材當用又曰陛下當先分别君子小人然後可行大中至正若君子小人未分别則中正之道恐未易行上頷之而已十一月癸亥朔右正言陳祐言知大名府林希以黨附權要託意詞命陷害元祐臣僚所草吕大防責詞皆務求合章惇之意肆言醜詆不問是非至有老姦擅國之語乙丑詔希落端明殿學士知揚州庚午詔自來年正月一日改為建中靖國元年或謂建中乃唐德宗奉天時年號上曰梁末帝禪位年號太平太宗不以為嫌也陳次升言蔡卞備位兩府隂肆姦謀竊弄賞罰專報恩讎人有譽其妻父之美者極力主張置之顯要如有議其妻父之短者指為誹謗宗廟置之深刑時人目為笑靣夜義壬申蔡卞降中大夫依前分司移池州居住十二月月犯司怪辛巳建中靖國元年春正月癸亥流星自西南入尾扺距星其光燭地范純仁卒遺表言伏願陛下清心寡欲約已便民達孝道於精微擴仁心於廣逺深絶朋黨之論詳察邪正之歸又言若宣仁誣謗之未明致保佑之憂勤不顯本權臣務快其私忿非泰陵實謂之當然又言臣所重者陛下上聖之資臣所愛者宗社無疆之福茍斯言之可采則已死而猶生上聞訃痛悼賜其墓碑曰世濟忠直純仁性夷易寬簡嘗曰吾平生好學得之忠恕而已自為布衣至宰相廉儉如一俸賜悉以廣義莊前後任子恩多先踈族沒之日幼子五孫皆未官曽肇嘗曰使純仁之言行於熙寧元豐時後必無紛更盡用於元祐中必無紹聖大臣讎復之禍云任伯雨言去年四月朔今年正月朔莫夜赤氣起於北方光焰亘天又有黑氣在下漸衝西方散而為白咎證之來其異如此伏願陛下用忠良黜邪佞正名分殛姦惡使隂邪小人無得生犯上之心則變異之起可轉為休祥矣己巳月犯星甲戍皇太后崩于慈德殿丁丑袝葬永裕陵諡曰欽聖憲肅皇后趙挺之為御史中丞任伯雨言挺之始因章惇進既諂事蔡卞及卞黜責又諂事曽布出入門下殆無虛日故士論以其觀望險詐號為移鄉福建子伏乞特加審察其言是月甲戍遼國主道宗耶律洪基卒延禧即位號天祚改壽昌七年為乾統元年二月己亥月犯鉞癸卯月犯軒轅右角丁巳詔潭州安置章惇責授雷州司户參軍貟外置先是左正言任伯雨言章惇迷國罔上毒流縉紳又風聞敵使言敵主去年喫食次聞中國貶黜章惇敵主不覺放匕筋跳起曰甚好甚好南朝錯用此人敵使又曰何故只如此行遣以此觀之惇之姦凶不獨孟子所謂國人皆曰可殺雖四海九州夷狄蠻貊莫不以為可殺也三月戊寅知無為軍陳瓘為著作佐郎實録院檢討官吏部員外郎朝補之為禮部郎中仍兼檢討官先是提舉實録院韓忠彥奏陳瓘朝補之皆有詞學堪備史職故有是命陳瓘奏伏聞王安石日録乃人臣私録之書非朝廷之典册也自紹聖以此書降付史院往往專據此書追議刑賞奪宗廟之美以歸故臣建掌書之官以修私史考之往古並無此例所有紹聖神宗實録願詔史臣别行刪修以成一代不刋之典任伯雨居言職僅半嵗所上一百八疏皆係天下治亂關宗社宫禁者細故不論也曽布方用事伯雨謀擊之布覺乃先罷伯雨言職知虢州夏四月辛卯朔以太史言日當食是日雲隂太史奏不見所食之分太常博士江公望為左司諫為上力陳堯舜之道且言願陛下不畏多難而以無難為憂不矜無過而以改過為美五月辛酉朔大雨雹是夕填犯氐六月壬寅集禧觀災甲辰陳祐通判滁州翌日曽布宣押視事右司諫江公望對遽曰陛下臨御以來易三言官逐七諫臣非天下所期望先是祐因進對上謂曰凡有公事宜與江公望議論了乃來祐見公望公望曰榻前一磚之地是人臣對君父極言天下事去處惟上不欺天中不欺君下不欺心則可免戾人各有知見不必同惟不可傳會秋七月辛酉江公望言訪聞蔡王府吏相告有不順之語浸淫恐及蔡王伏望陛下勿以曖昧無根之言而加諸至親骨肉之間詔江公望罷左司諫知淮陽軍蘇軾卒八月甲寅三省進呈右司員外郎陳瓘上曽布書瓘聞古之賢未嘗無過尊私史而壓宗廟緣邊費而壞先政此二者閣下之過也違神考之志壞神考之事此二者天下所共知而聖主不得聞其説蒙蔽之患孰大於此詔陳瓘與知州差遣乙卯陳瓘知秦州十一月庚辰冬至合祭天地於圜壇壬午曽布獨留進呈內降起居郎鄧洵武所進愛莫助之圖其説以為陛下方紹述先志羣臣無助之者上曰洵武言非相蔡京不可布云洵武所陳既與臣所見不同自不當議乞納下明日遂改付溫益欣然奉行乞籍記異論之人於是上決用京矣壬午崇寧元年閏六月壬戌曾遹言曾布呼吸立成禍福喜怒遽變炎涼鈎致齊人之窽言欲破紹聖之信史於是布連抗章乞罷布於元符末欲以元祐兼紹聖而行故力排蔡京崇寧初知上意有所向又欲力排韓忠彥無何京為左丞大與布乖講義曰人皆以建中靖國為更化之時而不知紹述之詔已下於元符之末而禁中之意曽布蔡京已知之布在熙寧之時則附會安石惠卿之議至紹聖之時乃詭請薦陳瓘張庭堅輩又請毋毁光公著碑至建中之時初知上有消朋黨之意乃排蔡京而主元祐及知上有紹述之意則排忠彥而主紹述甚至蔡京者其姦又過於布在熙寧則奉行熙寧之法在元祐則奉行元祐之法在紹聖則奉行紹聖之法國論三變而蔡京亦與之俱變此小人不足責而引用小人自安石始然安石之心與章子厚不同章子厚之心與蔡京諸人不同蓋安石之法猶出於所學章子厚之法特託安石以報私怨耳至蔡京則又託紹述以奉人主之侈心耳愈變愈下所以致中原之禍也新知越州鄒浩為衡州别駕永州安置壬午中書檢會李清臣劄子臣寮言豐稷辭諫議其意在譏切先帝又張舜民辭謝言官譏謗先朝奉聖旨李清臣追貶武安軍節副豐稷睦州安置舜民啇州安置秋七月陳次升落修撰知萊州戊子左丞蔡京右僕射兼中書侍郎甲子詔治天下者以立政訓迪為先篤孝思者以繼志述事為急損益之間理宜稽考宜如熙寧置條例司體例都省置講議司差宰臣蔡京提舉遴揀乃僚共議因革九月丁酉錢遹言曾布力引韓忠彥李清臣豐稷曾肇之徒鱗集於朝忠彥引陳瓘龔夬曾布引陳次升李清臣豐稷合黨締交欲變亂當時䇿立事實以誣毁哲廟布降中大夫分司南京忠彥崇福宫清臣追貶雷州司户肇靈仙觀嶽州居住稷道州别駕台州居住瓘夬並追毁出身已來文字編管瓘袁州夬房州閻守勤舒州安置十月甲寅臣寮言任伯雨陳次升其惡不在瓘夬之下哲廟升遐之初曾布遣子紆壻吳則禮往來閻守勤裴彥臣之家密傳信息張庭堅力詆瑶華為非辜而器鄒浩之直詔任伯雨張庭堅並除名勒停編管紆則禮並勒停永不收敘次升靈仙觀亳州居住壬申錢遹石豫左膚言朝廷行遣韓忠彥李清臣黃履為請復元祐皇后事並后匹嫡春秋譏之甲戌元祐皇后孟氏復居瑶華宫忠彥降授大中大夫懷州居住是嵗賜邵武軍邵武縣唐太守歐陽祐民祠為惠應廟癸未崇寧二年春正月乙酉中書省檢會任伯雨龔夬陳瓘陳祐李涓豐稷張庭堅江公望張舜民奏詔伯雨瓘夬浩涓祐庭堅公望已上並除名勒停編管伯雨昌化軍瓘亷州夬象州浩昭州涓澧州祐復州庭堅鼎州公望南安軍覿稷次升文瓘舜民並除名勒停居住覿臨江軍稷建州次升建昌軍瓘邵武軍舜民房州三月癸卯上御集英殿賜霍端友以下五百三十八人上舍及上書正等人升甲上書邪等人奏名黃定等十八人先次黜落四月乙亥毁東坡文集唐鑑馮子才文集秦學士豫章三蘇文集東齋記事豫章書簡湘山録眉山集别集坡詞劉貢父詩話朝張黃先生文集秦學士文戊寅臣寮言致仕程頥學術頗僻素行譎怪紹聖中雖嘗明正罪罰而元符之末敘復過優近日以入山著書為名切慮如野史小説之類妄及朝政欺惑後世詔頥追毁出身以來文字其入山著書本路監司覺察九月鄧洵武言今吏部選人自節察判以至簿尉凡七等造為新名為承直郎儒林郎文林郎從事郎通仕郎登仕郎將仕郎詔從之甲申崇寧三年春正月辛巳詔上書邪等人不許朝見擅到闕下仍不得在京居住見任在京差遣人並放罷講義曰此安石人言不足恤之遺患也夫祖宗所恃以立國者通下情伸士氣耳而忍戕賊其根乎當元符末年許人上書矣未及一年則籍元符上書班名當崇寧五年因彗星而求直言矣未及一年則論崇寧五年上書人罪其迷國誤朝一至於此韓忠彥以一君子而對衆小人雖柔懦不能大有所為然觀其乞罷編類局使其志得行亦不至於召靖康之禍也甲午鴻臚寺丞蔡攸賜進士出身為校書郎攸左僕射京子也甲辰魏漢津言禹以聲為律以身為度用左中指三節三寸謂之君指裁為宫聲之管又用第四指三節三寸謂之臣指裁為啇聲之管又用第五指三節三寸謂之物指裁為羽聲之管第二指為民為角大指為事為徴得三指合之為九寸即黃鍾之律定矣黃鍾定餘律從而生焉今欲乞請聖人三指為法先鑄九鼎次鑄帝座大鐘次鑄四韻清聲鐘次鑄二十四氣鐘然後均絃裁管為一代之樂二月臣僚上言章惇隂懷異志內挾奧助其謀詭祕乃敢肆為同胞之説詔章惇王圭為臣不忠可别為一籍仍依元祐姦黨指揮施行始用魏漢津之説鑄九鼎三月辛丑大內火夏四月甲辰朔尚書省勘會黨人子弟不問有官無官並令在外居住不得擅到闕下熒惑犯壘壁陳月犯房上相五月己卯守尚書左僕射兼門下侍郎蔡京為守司空行尚書左僕射兼門下侍郎封嘉國公以撫定鄯廓推賞也六月壬寅朔詔熙寧元豐功臣圖形於顯謨閣癸卯詔荆國公王安石配享孔子廟庭朱勝非曰陳瓘上疏言王安石塑像於學殿方至尊拜謁先聖本朝功臣坐視拜伏傲慢不恭自有天地以來庠序規制未有如此安石自崇寧間配享孔子列坐孟軻之次靖康初論其非自瓘始甲辰詔元符末姦黨並通入元祐籍更不分三等應係籍姦黨已責降人並各依舊除今來入籍人數外餘並出籍今後臣僚更不得彈刻奏陳令學士院降詔元祐姦黨文臣曽任宰臣執政官司馬光文彥博呂公著呂大防劉摯范純仁韓忠彥曾布梁燾王巖叟蘇轍王存鄭雍傳堯俞趙瞻韓維孫固范百祿胡宗愈李清臣劉奉世范純禮安燾陸佃黃履張啇英蔣之竒曽任待制已上官蘇軾劉安世范祖禹朱光庭姚勔趙君錫馬默孔武仲孔文仲吳安持錢協李之純孫覺鮮于侁趙彥若趙卨王欽臣孫升李周王汾韓川顧臨賈易吕希純曾肇王覿范純粹呂陶王古豐稷張舜民張問楊畏鄒浩陳次升謝文瓘岑象本周鼎徐績路昌衡董敦逸上官均葉濤郭知章楊康國龔原朱絃葉祖洽朱師服餘官秦觀黃庭堅朝補之張耒吳安詩歐陽棐劉唐老王鞏吕希哲杜純張保源孔平湯戫司馬康宋保國隱畢仲遊常安民汪衍余爽鄭俠常立程頥唐義問余卞李格非陳瓘任伯雨張庭堅馬涓孫諤陳朱光裔蘇嘉龔夬王回呂希績歐陽中立吳儔尹材葉伸李茂直吳處厚李積中商倚陳祐虞防李祉李深李之儀范正平曹蓋楊綝蘇昞葛茂宗劉謂柴衮洪羽趙天佐李新衡鈞兖公適馮百藥周詣孫琮范柔中鄧考甫王察趙峋封覺民胡端修李傑李賁趙令畤郭執中石芳金極髙公應安信之張集黃策吳安遜周永徽髙漸張夙鮮于綽呂諒卿王貫朱絃吳朋梁安國王古蘇逈檀固何大受王針鹿敏求江公望會紆髙士育鄧中臣种師極韓洽都貺秦希甫錢景祥周綽何大正呂彥祖梁寬沈千曹興宗羅鼎臣劉勃王拯黃安期陳師錫于肇黃遷莫俠正許堯輔楊朏胡良梅君俞寇宗顔張居李修逄純熙髙遵恪黃才曹盥侯顧道林膚葛輝宋夀山王公彥王交張溥許安修劉吉甫胡潛董祥楊環寶倪直孺蔣津王守鄧允中梁俊民王陽張裕陸表民葉世英謝潛陳唐劉經國扈允張恕陳并洪芻周鍔蕭刓趙越滕友江洵方適許端卿李昭玘向紃陳察王正甫髙茂華揚彥章廖正一李夷行彭醇梁士能武臣張巽李備王獻可胡田馬諗王履趙希夷任濬郭子斾錢盛趙希德王長民李永王庭臣吉師雄李愚吳休復崔昌符潘滋髙世權李嘉亮王珫劉延肇姚雄李基內臣梁惟簡陳衍張士良梁知新李倬談扆竇鉞趙約黃卿從馮説會燾蘇舜民楊稱梁弼陳恂張茂則張琳裴彥臣李稱閻守勤王紱李穆蔡克民王化基王道鄧世昌鄭居簡張祐王化臣為臣不忠曽任宰臣王圭故章惇秋七月乙亥淮西提刑霍漢英言應天下蘇軾所撰碑刻乞並令一例除毁從之癸未月犯建星甲申月犯牽牛火星戊戌太白犯積薪八月壬寅朔太白犯積尸氣歲犯亢距星丙辰月食于室九月丙戌月犯井冬十月辛丑朔大雨雹己酉詔翰林承旨張康國撰景鐘銘景鐘者魏漢津所鑄也庚午命刑部尚書管師仁重修神宗皇帝玉牒及看詳哲宗皇帝玉牒十一月婺州教授葉夢得為議禮武選編修官蔡京責元祐人分三等定罪蓋夢得及張浚明所建也月入太微垣庚寅太白掩辰丙申祀昊天上帝于圜丘以太祖皇帝配乙酉崇寧四年春正月丙申知樞密院事蔡卞為資政殿大學士知河南府閏二月嵗犯鈎鈴三月戊辰朔熒惑犯鉞熒惑犯井矩星熒惑入井禮部言常州進士孫天與言伏覩諸路州縣學校春秋上丁釋奠自先聖文宣王至於十哲其餘古今宗公巨儒係享祀者計八十餘員並未預祭欲乞應諸學校每遇釋奠日就先聖殿西廊隨例祭祀從之戊午蔡京言九鼎告成詔於中太一宫之南為九殿以奉安名曰九成宫中央曰帝鼐北方曰寶鼎東北曰牡鼎東方曰蒼鼎東南曰風鼎南方曰形鼎西南曰阜鼎西方曰晶鼎西北曰魁鼎夏四月壬辰月犯亢距星五月丙午月犯氐漢天師三十代孫繼先賜號虛靖先生與免本户田産租徭尋召赴闕又詔信州龍虎山張氏自今相襲為山主傳授法籙者即度為道士仍賜紫衣師號著為令秋七月丙辰月入畢左僕射蔡京等奏伏奉聖旨京畿四面可置輔郡屏衛京師南以頴昌府為南輔以襄邑縣建名輔州為東輔以鄭州為西輔以澶州為北輔八月癸酉月犯建星庚辰太白犯罰葉夢得為祠部員外郎夢得為編修官才六日蔡京亟薦之與同事四人者皆對夢得見上論自古帝王為治必先自治其心者始堯舉天下授之舜不過曰人心惟危道心惟微今國勢有安危法度有利害人才有邪正民情有休戚若不先治其心或誘之以貸利或陷之以聲色則所謂安危利害邪正休戚者未嘗不顚倒易位而足求其功乎上異之京謂夢得曰公言得無意乎夢得曰此夢得所學也冬十月壬辰是日日有黑子自七月雨至於是月十二月丁巳是夕月犯輿鬼戊寅月食於柳丙戌崇寧五年春正月甲午朔彗出西方由奎貫胃昴至戊午沒乙巳詔以星文變見避正殿損常膳中外臣僚等並許直言朝政闕失又詔應元祐及元符末係籍人等可復仕籍許其自新朝堂石刻已令除毁今後更不許以前事彈糾太白晝見月犯靈臺太白犯牽牛戊申月入太微垣二月甲子朔太白犯壘壁陳甲戌太白犯泣星趙挺之為特進尚書右僕射兼中書侍郎上深覺蔡京之姦由是旬日之間凡京所為者一切罷之三月丙申詔昨為星變許直言朝政闕失今日消伏可罷收接月犯建星己未御集英殿賜合格進士蔡薿以下六百七十六人夏四月右正言詹丕逺進對乞謹天戒上曰星譴可懼朕夙夜思格王所以正厥事之説龍驤豈能當天變丕逺未諭上曰廄馬也一夕無病而卒或者便謂星變之致應天止如是邪丕逺對此語欺甚不知陛下何從得之上作色徐曰蔡京丕逺對蔡京大臣宜省愆引咎如此奏對大非昌言讀奏至儉德之共也上曰慎乃儉德惟懷永圖聖人垂訓明甚京只為作事無法於財用上未嘗以不足告力引周官惟王不會之説此何意丕逺對此不過欲恱陛下耳上曰恱之不以道不恱也五月月入氐詔頒紀元厯六月填犯建星左正言詹丕逺對上曰聞近日中外有三不可之説謂法度不可變劉逵不可用蔡京不可罷丕逺對京之誤國陛下所知也上遽曰今日且不要他及只説國是斷合如何丕逺對國是非小事陛下當與挺之等議之乙亥太史言月當食雲隂不見秋七月庚寅朔太史言日當食不食詔送祕書省壬寅詔改明年元曰大觀九月戊申月犯井距星冬十月乙丑熒惑犯昴嵗犯斗熒惑犯太隂丁未月犯長垣辛亥月入太微垣十二月戊午朔太史言日當食不食詔劉逵懷姦徇私挾情害政可罷中書侍郎差知亳州自星變上罷蔡京復相趙挺之逵擢中書侍郎後數日星沒稍悔更張之暴翰林學士鄭居中獨知之遂請對首言今所建立皆學校禮樂以文致太平居養安濟等法以厚下恤民何所逆天而致譴怒上大以為然禮部侍郎劉正夫繼請對如居中言上遂外挺之逵而復向京於是逵罷踰百日挺之亦罷流星出奎至天倉沒有聲如裂帛丁亥大觀元年春正月戊子大赦己丑蔡京依前司空為尚書左僕射兼門下侍郎辛丑熒惑犯畢己巳月入太微垣丙午嵗犯填御筆自今學生願兼他經者聼太白犯月星三月庚寅太白犯天街丁酉特進尚書右僕射趙挺之為觀文殿大學士佑神觀使上意復向蔡京故挺之罷後五日卒贈司徒官給葬事諡清憲翰林學士鄭居中為同知樞密院事貴妃懇陳乞罷之戊戌改授中太一宫使兼侍講詔諸士有善父母為孝善兄弟為悌善內親為睦善外親為姻信於朋友為任仁於州里為恤知君臣之義為忠逹義利之分為和一諸士有孝悌睦姻任恤忠和八行見於事狀著於鄉里者耆鄰保伍以行實申縣縣令佐審察延入縣學考驗不虛保明申州如令一諸八行孝悌忠和為上睦姻為中任恤為下士有全備八行保明如令不以時隨奏貢入大學免試為太學上舍司成以下引問考驗較定不誣申尚書省取旨釋褐命官優加擢用夏四月戊午太白入井癸未熒惑犯鬼及積尸氣五月戊戌月犯東咸六月壬戍熒惑犯軒轅大星月入氐秋七月乙酉朔熒惑犯靈臺祠部員外郎葉夢得為起居郎夢得在祠部久不遷蔡京既復相所立法度已嘗罷者皆復行夢得召對論周官太宰以八柄詔王馭羣臣所謂廢置賞罰者王之事也太宰得以詔王而不得自專陛下前日所建立者出於陛下乎出於大臣乎及其罷之又復從而復之亦出於陛下乎出於大臣乎臣頃見陛下首嘗以治心為言正為是也今徒見一大臣進以為可作則法度從而立一大臣進以為不可作則法度從而廢無乃陛下有未了然於中而不出於己者乎臣願乘今更張之後推用此道度其可復者復之可罷者罷之無徒以大臣進退為可否則天下治矣上喜後數日遂除起居郎八月皇第九子構為檢校太尉定武軍節度使蜀國公辛未乾寧軍言七月丁酉黃河清至乙巳復舊甲戌月入畢九月癸巳月犯壘堂陳辛亥大享於明堂以神宗皇帝配冬十月辛酉薊州地震太白犯左執法己巳大雨雹乙亥月犯長垣閏十月丙戌太白犯亢臣寮上言伏見御史臺見勘公事上書人方軫輕詆尤甚其父通見任諸王府翊善詔方通先罷任令吏部與監當差遣蔡京之罷相也軫奏疏論京睥睨社稷內懷不道效王莾自立為司空效曹操自立為魏國公視祖宗神靈為無物玩陛下不啻若嬰兒專以紹述熙豐之説為自媒之計上以不孝劫持人主下以謗訕詆誣恐嚇天下自古為臣之姦未有如京今日為甚若設九鼎鑄大錢置二衛興三舍建樂府又於國門外祭天地於兩郊如此之類非徒無益又且於禮文經意無補凡妄作必持兩説劫持人主一曰此三代之法也一曰熙豐遺意未及施行每有奏請盡乞作御筆指揮行出語士大夫曰此上意也明日或降指揮更不施行則又語人曰京實啓之也善則稱已過則稱君必欲陛下斂天下怨而後已是豈宗社之福乎陛下嗣服之初忠義之士明目張膽願見太平京欲鉗天下之口塞陛下之耳目方為邪算賊虐忠良奈何陛下以京為忠貫日月以忠臣義士為謗訕詆誣或黥配逺方或除名編置或不許齒仕籍以言得罪者萬人矣誰可為陛下言哉軫竟坐此編管嶺南丙申太白入氐丁未太白犯房十一月壬子朔日有食之置符寶郎四員二員以內臣充掌禁中符寶之事二員以文臣充掌外庭符寶之事八寶名鎮國神寶受命之寶天子之寶天子行寶天子信寶皇帝之寶皇帝行寶皇帝信寶十二月乙酉太白犯熒惑月入井戊子大觀二年春正月壬子朔受八寶於大慶殿大赦天下是日御製宣和殿記其文實蔡京為之甲寅太白犯嵗庚申蜀國公封廣平郡王月犯井鉞甲子月犯軒轅吏部尚書余深知貢舉給事中蔡薿中書舍人霍端友同知貢舉二月壬午朔熒惑犯嵗癸巳月入太微垣犯內屏三月甲子中書舍人葉夢得兼編修神宗官制六典戊寅御垂拱殿賜貢士成都王俁等十三人上舍及第釋褐甲辰月入羽林軍五月庚戌朔日有食之己未月入氐六月辛卯熒惑犯天街癸巳月犯壁壘陳秋七月癸酉熒惑犯司怪丁丑太白犯亢八月庚寅熒惑入井冬十月丁丑朔太白晝見庚辰嵗犯壘壁陳詔太史局令已下自今後若稍涉漏露應干乾象凌犯所主休咎者其所聞並傳報漏泄之人不分首從並當行處斬仍許人陳告十一月丁未朔太白晝見辛酉月犯井命有司行禮當追述三代之意適今之宜開元禮不足為法趙霆嘗行河得龜兩首蔡京方以祥瑞事媚上曰此齊小白所謂象罔見之而霸者也同知樞密院鄭居中言首豈宜有二人孰不驚異而京獨私主之意殆不可測上乃出龜棄金明池壬申太白犯嵗十二月戊子月犯熒惑癸卯流星出奎己丑大觀三年春正月丁未兵部尚書薛昻知貢舉吏部侍郎慕容彥逢禮部侍郎李圖南給事中霍端友中書舍人俞栗右諫議大夫蔡居厚侍御史劉安上符寶郎宇文粹中同知貢舉熒惑犯井二月丁丑韓忠彥復宣奉大夫儀國公致仕己丑月犯內屏丁酉中太一宫使奉寧軍節度使檢校司空提舉龍德宫童貫為檢校司徒鎮洮軍節度使貫辭不受講義曰上之即位其始因修造華侈而斥內侍郝隨劉友端其後則以童貫監製器以朱勔領花綱其始因瓘之言察裴彥臣交通內外之迹以逐蔡京其後則以童貫而用蔡京以梁師成而用王黼則知人君之心未始有不善而小人蠱惑其心者其罪多矣一童貫也使之任製器之役猶可也蔡京乃使之領西師西事未畢而北事復起既命之使遼以覘其國適為遼人所覘又縱之通女真反為女真所侮甚至於方臘不能討命童貫以討之是一童貫可以任內修外攘之責矣夫宦官者腹心之患也夷狄者手足之患也宦官者根本之禍也夷狄者枝葉之禍也當時任伯雨之言曰朝廷為陽宫禁為隂中國為陽夷狄為隂君子為陽小人為隂德為陽兵為隂愚謂崇觀以來隂氣甚盛矣小人宦官夷狄同一氣類也此有所感則彼有所應必然之理也縱使當時無夷狄之禍亦有宦官之禍也夫癸卯太白犯壁壘陳月犯斗乙丑御集英殿賜進士賈安宅等及第出身同出身七百三十一人宦者梁師成與焉名在第一甲第十一丙寅熒惑犯鬼辛未太白犯嵗夏四月御筆禮以别尊卑明分守則器用之制設飾之文多寡之數等衰之節宜各隨其品秩分其貴賤以立制度月犯五諸侯癸巳御製七言詩一章八句賜賈安宅等五月太白犯天隂六月甲戌朔侍御史毛注言蔡京蔭補入仕素不知書嘗形簡牘以符寶為扶寶衆目為扶寶侍郎丁丑太師尚書左僕射門下侍郎魏國公蔡京為太師中太一宫使其請給恩數並依見任宰相例先是石公弼言京之姦惡雖中外憤怨而畏京之威人莫敢言一犯其怒宗族莫保每託以紹述神考之政而京率意無所畏忌外則生事於四夷內則殫竭於民力託爵祿以廣私恩濫錫豫以蠧經費趍毛注言京位極人臣爵無可加擅持威福震動中外四方多士惟知奔走宰相之門而不知君父之尊知徇流俗之習而不知法令之可畏文昌舊省一毁而盡逺傷元豐之偉迹近纍陛下之述事謂忠於君可乎臨平新塔乃京私域之髙原土木百出一境騷然上假朝廷之威力下便宰相之私計謂忠於君可乎公弼又言京罷相以三師就第提舉修實録於京計則得也為朝廷之謀則未然京援引小人邪枉盈庭奔競無恥附下罔上習以成風豈可謂正百官也輕名器以招權厚廪祿以姑息內耗國計外侵民財帑藏空虛人心嗟怨豈可謂安百姓也欲為己功生事夷狄黔南之舉夷夏蕭然邊陲雕殘民不堪命豈可謂鎮撫四夷也庚辰月犯平道辛巳何執中為尚書左僕射兼門下侍郎太學生張朝老上書曰陛下即位凡五命相矣有若韓忠彥之庸懦有若曾布之贓汙有若趙挺之之蠢愚有若蔡京之跋扈人主止論一相陛下除相如此天下何賴焉比復相何執中是猶以蚊負山不過援引契舊鄉閭之人布之清列而已至如蔡京盜陛下之恩賞以植私黨以結人心執中必不敢爾顧其才術不足以有為然成命已頒不可復汗而右揆尚闕猶可擇人也又言臣觀考蔡京之所為合而言之則其事止於十有四誣上帝罔君父結奧援輕爵祿廣費用變法度妄制作喜導諛鉗臺諫熾親黨長奔競崇釋老窮土木務逺略散而言之其事數十萬言願詔有司給筆札使臣得盡其胸中之所言寫天下是非之事以告陛下臣死之日猶生之年壬辰太白入井秋七月熒惑犯左執法庚戌月犯房八月癸未劉安上為右諫議大夫甲午月犯井冬十月甲午月犯次將乙未月犯謁者十一月太常寺言被旨天文算學合奉安先師并配享從祀臣等稽之載籍合之典禮宜尊黃帝為先師而以其當時之臣風后力牧大鴻大撓𨽻首容成車區常儀為配享又以後世精於數術者啇巫咸周箕子周啇髙周榮方晉史蘇秦卜徒父已上七十人擬從祀壬子尚書省言甘露降左右丞廳并栁竹凡百三十本是嵗江淮大旱自六月不雨至於十月庚寅大觀四年春正月庚子朔中丞吳執中言邇來諸路以八行貢者臣謂所貴乎士者為其能學知先王之道其為行不悖於義而已以親病而割股閭里小民時有能者官有給賜憫恤其愚有愛親之心而至於毁傷支體用是以恤之士而為此是不知孝之道矣然頂刺血非聖人之教常誦佛書豈儒者之事哉救其兄之溺恤其女之貧皆不足以為異伏願下之太學俾長二博士考以道義别白是非澄去冒濫從之丁未月犯天街二月庚午朔禁然頂煉臂刺血斷指者辛未新知杭州張啇英入對上語及蔡京亂紀綱事啇英曰京自來專恣無所忌憚批狀便是條貫入狀請寶便是聖旨安得不亂啇英言祖宗以來擢用臺諫官或出自宸𠂻或採於久次或下禁從各舉所知號為不次用人然自州縣選人召對者不過三四人而已曽未見近嵗多士拔擢之驟也由庠序不數月作六察由六察不數月作殿中侍御史又不數月作侍御史作中丞作諫議作給舍作執政問之以政事則不知也問之以古今則不知也問之以邊防則不知也問之以錢榖則不知也安得有限之名器而待無窮之進取哉辛巳太白犯嵗己丑張啇英為中書侍郎辛卯月犯斗三月陳正彚者瓘子也先是瓘居明州遣正彚以事如錢塘正彚素聞其父言蔡京姦邪將不利於社稷且聞京嘗有傾搖東宫意及是又聞蔡崈盛稱京後當獲福非常亟詣杭州告謀反有端事連陳師錫時蔡薿帥杭遂執正彚送京師下詔獄瓘自明州赴逮吏脅瓘使承教正彚妄訴瓘語吏曰正彚安能知京反謀瓘實知之願得筆札悉以聞吏恐懼不敢與正彚坐所告失實竄海島瓘安置通州師錫亦貶郴州崈但勒停云甲寅月犯亢四月太白犯井鉞庚辰太白犯井辛巳入井五月甲辰熒惑犯嵗祕書監何志同奏慶厯間嘗命儒臣集四庫祕藏敘次為籍名之曰崇文總目其書之總凡三萬六百六十九卷今一館所藏善否相揉號為全本者不過二萬餘卷而脫簡斷編亡散闕逸之數亦如之宜及今有所搜採視慶厯舊録及總目之外别有異書並許借傳從之詔改立詞學兼茂科乙卯彗出奎婁間甲子詔蔡京權重位髙人屢告變全不引避公議不容言章屢上難以屈法制曰宜褫師臣之秩俾參宫保之官京西轉運使張杲言蔡州諸縣有瑞麥一莖兩岐至七八岐者凡十畝具圖十二本以聞六月戊辰朔通議大夫申國公章惇追復特進熒惑犯月星乙亥月犯進賢癸未嵗犯天隂庚寅大史局言彗星全消秋七月戊申月犯斗戊午月犯嵗辛酉熒惑入井八月甲戌月犯天江閏八月丙午填犯泣丙辰熒惑犯鬼又犯積尸氣九月丙寅朔日有食之張商英表上袁州瑞禾圖冬十月戊戌太白晝見戊午太白犯氐十一月丁卯祀昊天上帝於圓壇以太祖配大赦天下改明年元曰政和戊寅右僕射張商英表願編集熙寧元豐政事號曰皇宋政典若陛下增光潤色之事率以類貫其篇所定篇目凡十七曰原廟官制新省差除三舍導洛斷例回河保甲將兵免役青苖吏祿守具禮樂營造糴便茶馬是日詔通州安置人陳瓘與自便月犯五諸侯辛卯政和元年春正月壬午吏部侍郎姚祐知貢舉中書舍人宇文粹中禮部侍郎潘兖同知貢舉癸巳詔明州取陳瓘尊堯集送編修政典局從張商英建請也二月辛丑太白犯鎮癸卯老人星見乙卯月犯斗三月癸亥朔御製御書政和新修五禮序議禮局請刻石於太常寺許之講義曰漢官名禮樂之正不見於髙文而見於成哀之世唐明堂之制不見於太宗而見於武后之時人非復古之人治非復古之治徒以竊虛名飾美觀耳夏四月丁酉日左右有青赤珥五月壬戌朔內降劄子往歲圖利之臣妄興議論創行鼓鑄當十錢遂致姦猾之民所在盜鑄濫錢益多今朝廷內外府庫無慮千萬緍議者或謂折閲數多有虧邦計朕念為民父母儻可以救弊便安元元府庫之損又何愛焉可自今應公私當十錢並改作當三是月蔡州獻瑞麥一莖兩岐或三五岐至八九岐近約十畝逺或連野再下通州取陳瓘尊堯集送編修政典局六月己酉月入羽林軍秋七月丁亥祕書監詳定九域圖志何志同等欲乞申命有司參酌舊制量户口多寡之數以為諸縣升降之法使縣之名第常與戶版相應不惟有以示太平生齒之富而煩簡劇易按籍可考詔可八月詔增崇玉仙聖母顯號行册禮乙未太子少師致仕蔡京為太子太師依舊致仕丙申月犯心己亥老人星見丁巳詔張商英罷尚書右僕射除觀文殿學士知河南府九月詔陳瓘送台州羈管辛亥知鄧州張啇英衡州安置十二月乙未太白犯鎮乙巳臣僚上言舊係黨籍人陳瓘所撰尊堯集十卷大綱取日録中書解釋成文按瓘身非史官名在謫籍輒以私意偏見去取日厯撰成文集竊恐假真讎偽變易是非異時更相傳習眩惑羣聽實非細事乞下瓘家取索藁本一切焚毁瓘嘗自序云呂惠卿既與王安石反目乃進安石二手簡又進目録四卷俱鋪陳執政以後歸美之迹自明其忠安石由是重得罪安石所著八十卷乃效惠卿四卷為之也瓘謂安石此書詆訕宗廟誣薄神考蓋在鍾山懟上熱中之時崇寧中瓘貶亷州乃著合浦尊堯集其後蒙宥北歸謂劉安世曰瓘昨在諫省嘗以王安石比於伊尹伊尹未嘗詆湯胡可比也又嘗以安石為神考之師神考堯舜也用安石亦止九載何嘗終以其人為是乎瓘之前言可謂過矣於是復著四明尊堯之書以自明改過之心會右僕射張啇英請編皇宋政典書旨下瓘取索尊堯集瓘以此書之語大違國是不敢先逹外廷乃具表繳申政典局乞進入於御前開拆已而啇英罷黜左僕射何執中請治尊堯罪瓘坐台州羈管蓋辟雍初成之日執中請開學殿使都人縱觀安石坐像而瓘於尊堯集序表之中嘗論及之以故執中銜瓘又起遷人石悈知台州瓘前以上書會布謫海陵蔡薿為長書遺瓘云諌疏婉而有理似陸宣公剛而不撓似狄梁公詞章淵源發明正道則韓文公其人也明年薿以對策魁多士所陳時務頓異前書於是愧悔欲殺瓘以滅口密贊蔡京之黨出力尤甚瓘意悈必當受薿風旨且將因事搜檢其家并取薿書乃預為封事具陳所以得罪於蔡薿何執中者繳連謝表封緘於篋題以臣瓘謹封未幾悈果遣兵官突至所居大索行李攝瓘至州悈垂簾列五木如制勘狀瓘遽問曰今日之事被旨耶悈曰有尚書省劄子卷簾出示之瓘曰然則取瓘尊堯集耳追瓘何為因曰君知尊堯可以立名乎蓋以神考為堯而以主上為舜助舜尊堯何謂詆誣何丞相學術淺陋名分之義未甚講求故為人所劫使請治尊堯之罪將以結黨固寵也君所以得於彼者幾何乃亦不畏公議干犯名分乎請以瓘語申朝廷瓘將顯就誅戮不必以刑獄相怖悈屢揖瓘退尋語人曰不敢引其説尚爾良可畏也悈始發瓘篋得其所上封事見其封題有臣名不敢開視遂具以聞何執中蔡薿果大怒尋罷悈台州遼主天祚賞刑僣差虐用其下視諸蕃屬國如奴𨽻大海出名鷹自海東而來者謂之海東青小而俊健遼人酷愛之必求之女真至天祚責海東青生金大珠之貢尤苛女真不勝其擾於是諸部皆潛附阿固達謀舉兵以拒遼人壬辰政和二年春正月丙寅翰林學士蔡薿知貢舉吏部侍郎慕容彥逄給事中宇文粹中起居舍人張漴並同知貢舉二月戊子朔詔太子太師致仕蔡京兩居上宰輔政八年首建紹述勤勞百為可特復太師仍舊楚國公致仕於在京賜第居住河南府奏新安縣萬歲蟾蜍背生芝草三月嵗星犯司怪己卯御集英殿賜莫儔等及第出身同出身凡七百一十五人六月丙戌朔御筆手詔自今三省密院省臺寺監與百執事官非爾所職勿行非爾所責勿言毋利以口胥動敢不遵承以違御筆論講義曰祖宗紀綱之所寄大略有四大臣總之給舍正之臺諌察內監司察外自崇觀姦臣創為御筆之令凡私意所欲為者皆請御筆行之而姦臣之所自為者又明告天下違者以違御筆論於是違紀綱為無罪違御筆為有刑臺諌不得言給舍不得繳監司不得問而紀綱壞矣昔有勸仁宗攬權者上曰措置天下事正不欲從中出此言真為萬世法辛亥熒惑入井乙卯白虹貫日秋七月乙丑熒惑犯太白嵗星犯積薪己酉老人星見九月乙卯朔流星出斗西南方有尾迹照地丙辰知定州梁子野奏管下有嘉禾合穗計六尺三寸生為一穗十月戊子蘇轍卒壬寅日左右有青赤珥御史中丞俞栗言今日士風有觀望茍合之弊有頺靡不振之弊有阿黨之弊有誕謾之弊有巧言譛訴之弊有奔競請託之弊凡此六弊皆起於好進革好進之心禮義亷恥為本臣僚上言梁子野上表進嘉禾內二科一穗以膠黏紙纒前日李譓之黜未踰時也而子野無所戒懼如此詔本州官吏並令本路提刑司取勘政和二年李譓進蟾芝上曰蟾動物也安得生芝命以盆中漬之一夕而解竹釘故楮皆見於是責譓欺罔散官安置焉十一月甲戌太白犯天江癸巳政和三年春正月甲寅朔兵部尚書俞栗知貢舉給事中宇文粹中中書舍人張璪同知貢舉乙亥熒惑犯太微垣內屏二月詔太陽自午時後上有戴氣下有氣承戴並現乃為祥應送祕書省丙午王雱特封臨川伯從祀廟庭三月壬子朔日有食之太史局奏太陽當食至未時七刻日體圓明全不虧食壬戌月犯長垣癸酉御崇政殿賜貢士陳公輔等十九人上舍及第釋褐戊寅歲星犯積薪輿鬼夏四月壬午朔詣玉清和陽宫行奉安禮太師蔡京為禮儀使皇帝行禮有祥雲回旋觀者莫不稱慶丙申流星出心向西南方有尾迹照地閏四月壬戌嵗星犯鬼乙丑熒惑犯太微垣右執法五月庚辰朔夏至時北郊有司攝事於舊方丘有黑氣長數丈出自齋宫行一里許入壇壝繞祭所皆傍人穿燈燭而過又及壇上禮將畢因忽不見丁酉月犯壁壘陳庚子大盈倉火六月太白入太微垣犯左執法八月辛未太師楚國公蔡京等言伏覩大晟府以雅樂中聲播於燕樂舊闕徴角二調及無土石匏三音今樂並已增入五聲八音於是始備按試克諧頒降天下上表稱賀冬十月劉恢言今月四日宰執赴學按試兩學生所習大晟雅樂至第二章曲未終有仙鶴四自南來盤旋飛舞宫架之上徘徊欲下衆人歡呼遂由表北而去乞宣付史館從之國是論曰紹聖之初姦臣復持王氏之説祖禹將去朝廷上疏論日食因曰臣恐邪臣欲寬聖慮或云日蝕自有定數又云天道逺而難知此乃小人誤國之言謹勿聼也自紹聖至政宣姦臣誤朝之論盡本安石而天命不足畏之流禍尤酷災異不言而祥瑞轍書甚者臘月之雷指為瑞雷三月之雪指為瑞雪拜表稱賀作詩詠替其視天變曽不若童稚之可侮痛哉陳瓘論蔡京之惡曰不畏上天原其情也庚戌手詔朕荷天顧諟錫以元圭將來冬祀可搢大圭執元圭庶格上天之心以敷佑於下民提舉荆湖南路茶鹽事范之才奏體訪得蘄州羅田縣山溪中有大鼎數年前嘗見兩耳其穴中可過七八嵗小兒愚民遂塞以土今其耳猶發露詔令宋喬年躬親前去措置開取十一月大雨雪連十餘日不止都城雪平地八尺幾丈飛鳥多死九街氷滑人馬不能行十二月河南尹蔡安持部送道士僧耆命官學生赴闕恭請皇帝登封中嶽甲戌御崇政殿引見面賜不允詔書甲午政和四年春正月甲辰兖州命官學生道釋耆老及至聖文宣王四十七代孫孔若谷等詣闕進表請皇帝行登封之禮拜表引見並如河南府已得指揮二月庚戌月犯昴丁巳御崇政殿賜貢士張綱等十七人上舍及第釋褐鄆濮二州命官學生道釋耆老等八千六百餘人並詣闕進表請車駕登封太山自是開德興仁潁昌府鄭州廣濟軍並許詣闕進表詔止令遞表以聞優詔不允三月辛卯詔皇長子可以來春出閣立為皇太子夏四月尚書省言甘露降刑部侍郎及都官中郎廳提舉延福宫所奏竹生紫花黃蘂牡丹雙頭數朵蔡攸言祕閣槐枝連理五月丙戌始祭地於方澤以太祖配癸巳翰林學士王黼為户部尚書御史中丞蔣猷言祖宗時未嘗有內臣建節者昨童貫首隳舊制當時士論已不平上曰有非常之功則有非常之賞猷曰事塞其源則人無觖望若使攀緣展轉人人有意外之得則所謂非常者反為常矣上曰官爵得之易則名器卑誠如卿言當為卿杜來者因詔三省御史臺常遵守彈劾八月癸卯朔太師蔡京言蒙賜瑞瓜雙蓮雙花瑞榖上表稱賀乞付祕書省從之詔應奉御筆者只作御筆行下餘並稱聖旨詔知湖州章援特除名勒停援父惇追贈觀文殿大學士援表謝其言多文飾故有是命御筆昨日有鶴三萬餘隻盤旋雲霄之上尚書省言今月二十日有鶴約數萬隻蔽空飛鳴自東北由大內前往西南而去詔許拜表稱賀建州言建安等縣竹枝生花結成稻米民間採取食用及搬入城市糶貨所收約數十萬石詔許拜表稱賀仍令貢百石上京己巳嵗星入太微垣九月甲戌詔改宣德郎為宣教郎冬十月辛酉嵗星犯左執法十二月乙卯太白入羽林軍相州野蠶成繭是嵗阿固達遂叛用尼堪烏舍等為謀主尼楚赫伊立羅索棟摩等為帥攻破寧江州蕭奉先弟嗣先兵潰數月間盡為女真攻陷所過千里蕭然丁壯斬戮無遺應遼東界熟戶女真阿固達皆降之為用蕭奉先懼其弟嗣先獲罪妄云潰兵懼誅所至劫掠若不一赦將為腹心患天祚從之自是出征之兵皆曰戰則有死而無功退則有生而無罪由是士無鬪志遇敵輒奔乙未政和五年春正月乙亥熒惑犯亢丁丑嵗星犯左執法壬辰月犯心二月壬寅太常寺奏兖州鄒縣孟子廟詔以樂正子配享公孫丑以下從祀丁未定桓言蒙聖恩立為皇太子乞專宫官吏不必備置諸司庶局皆令兼攝至於冗卒亦乞蠲除務從儉約清心省事專精問學仰稱君父教育之意從之甲寅御大慶殿册皇太子禮畢大赦天下庚申老人星見辛酉嵗星入太微垣三月辛未朔太白晝見御筆比覽元豐訓詔得故相韓琦文彥慱至和嘉祐定策之勳功在社稷琦可封郡王彥慱可除罪籍復舊官丙戌月犯房癸巳御集英殿賜合格進士何栗以下并宗子公惠等及第出身文學總六百九十二人禇詠不對所問其言狂妄令開封府押歸本貫密州夏四月癸卯詔天下一萬户以上為望七千户以上為緊五千户以上為上三千户以上為中不滿三千户為中下一千五百户以下為下從户部員外沈鏻奏請也庚戌詔祕書省殿以右文為名及集賢殿修撰為右文殿修撰太白犯五諸侯六月壬子天狗犯月秋七月戊辰朔日有食之乙亥升汝州為陸海軍路瓘言前知汝州珍祥屢發上於御府者芝草五千餘本碼瑙山子一百二十座絶色絲文并堪造器物又三千四百餘斤瑞榖瑞禾瑞萱甘露野蠶成繭其目不一故有是命甲午武安軍奏信都縣范濟家黃牛生異獸牛首鹿身色白有牙爪遍體皆鱗而無毛多與圖史所載麒麟相類村民以水澆之祈雨因而致斃竊慮即是麒麟今畫到圖一本進呈詔遍牒諸路州軍今後如有生到似此之類異物仰如法收養不得亂有傷害八月戊申詔文彥慱考其茂勳著在廟社除官爵已復外可特賜諡曰忠烈詔陳邦光差提舉洞霄宫池州居住先是邦光兼太子詹事會蔡京獻太子以大食國琉璃酒器羅列宫庭太子怒曰天子大臣不聞道義相訓乃持玩好之器蕩吾志邪命左右擊碎之京聞邦光實激太子含怒未發因是遂斥邦光太史言火星行心星度不守不犯甲寅是夜流星出栁宿急流至濁沒赤黃色有尾迹照地占者以為天子宗廟有喜國家建造宫室之象宰臣率百官拜表稱賀甲子蘄州奏蘄水縣界內遍地生芝草收採到一萬二千六百枝內一枝紫色九幹乙丑熒惑犯天江陳瓘自政和元年九月送台州羈管凡五年始降旨特敘承事郎許自便瓘初以宣德郎被謫而敘官乃得承事郎實鐫降也被命之後忽得州牒備坐省劄云奉御筆批敘復數內陳瓘合取旨與差遣又有省劄下通州令瓘具家狀陳乞差遣人皆賀瓘以為起廢有漸也瓘曰此廟堂欺君玩世之術耳家狀雖當供而差遣其可乞耶彼謂吾不堪貧困而因兹乞憐爾乃報以家狀昨因削籍毁除無憑供具事果不行瓘既寓通州而開封尹盛章與石悈有私隙取密旨下悈於獄編置通州揚言為瓘執仇瓘聞而歎曰此豈盛世之所宜有耶遂挈家至九江因卜居焉九月丁卯朔御製宴延福宫承平殿記冬十月蔡京奏蒙宣示紫芝二本一本九葉穿穀而生一本兩葉與豆相附乞宣附史館許百官拜表稱賀從之武勝軍奏穰縣生瑞榖安化等縣生芝草都計五萬本內有金芝一本紫芝一本詔送祕書省朱勝非云政和間汝蘄等州貢芝草以萬計豫每見邸報則疑之四年春豫為京東學司行縣至密州界縣令尉監採芝草邀豫往觀彌漫山谷皆芝菌也五色俱有或附木石或出平地有一本數十葉層疊髙大衆色咸備者至郡見太守李文仲曰已採及三十萬本矣始知諸郡所貢未必不實但過多不可為瑞適為妖異耳蔡京等以汝州碼瑙生發并芝草及諸州雙頭蓮連理木甘露降仙鶴集雙瓜雙頭芍藥牡丹凡五千三百種有竒上表稱賀交趾進奉白象壬辰太白犯罰是歲天祚下詔親征女真女真乘契丹未陳三面急擊之天祚親臨陳戰三合野皆橫尸軍中望天祚御旗西南向即隨之而潰天祚晝夜馳五百里退保長春州丙申政和六年春閏正月癸卯月犯司怪己酉歲星犯亢雄州安撫和詵引契丹亡人李良嗣來朝良嗣燕人知契丹必亡歸漢力陳可取之計賜姓趙時和詵久以厚賂納結朔方豪雋士多歸之以收燕山圖來上又中山守張杲髙陽關安撫吳玠亦獻議燕雲可取三月乙未朔知吉州程祈言州學生扶邦彥家收得異禽蓋鳯凰也及至乃知其狂妄劄付本州照會四月提舉上清寶籙官蔡攸奏今月二日皇帝詣宫設千道民大會有羽鶴來翔於始青天祥兩殿之間蔡絛云重和元年赦文云云其後宦官道士有所不快必託為帝誥則莫不如志又為大會於寶籙宫既齋引羣臣士庶入殿聼林靈素講乘輿為設幄其側靈素據髙坐使人於下再拜請問然靈素徒辨給其所言無殊絶者時雜滑稽媟語上下為大哄笑莫有君臣之禮矣道士有俸而齋施動獲千萬每一宮觀給田亦不下數百十頃皆外畜妻子置姬媵以膠青刷鬢錦衣玉食者幾二萬人一會殆費數萬緡貧下之人多買青布幅巾以赴之日得一飫餐而襯施錢三百謂之千道會云丙戌詔監司守臣不得以進獻為名貢花果海錯什物六月癸亥朔詔賜宣教郎徐積諡曰節孝處士禮部尚書白時中等奏今將崇寧貢舉法改修成御試貢士敇令格式總一百五十九卷乞冠以政和新修為名頒降詔從之秋七月歲犯亢校書郎談世績為司門員外郎蔡京得政久其子攸提舉修書館中諂事者皆越次升擢世績坐直舍翻書竟日泊如也宦者梁師成貴幸其黨有與世績鄰居者數致師成意世績謝絶之更六年不遷辛酉御筆走馬承受公事可改為亷訪使者八月宗正少卿閭丘籲奏修纂玉牒屬籍太祖皇帝下以德惟從世令子伯師太宗皇帝下以元宗仲士不善汝魏王下以德承克叔之公彥各依昭穆分位增廣秩數丁丑熒惑犯靈臺庚寅提舉崇福宫种師道先是知懷德軍得召見訪以邊事師道曰先為不可勝來則應之妄動生事非策也童貫欲徙內郡弓箭手以實邊而指為新邊所招之數上問師道何如師道曰臣恐勤逺之功未立而擾近之患先及矣九月癸巳熒惑入太微垣癸卯詔鼎閣奉安鼎蔡絛曰方士王仔昔獻議九鼎宜內之九重上出御筆曰遷移神象大器可令疾速排辦魯公曰何不祥邪乃奏改曰定鼎初鑄九鼎皆以九州水土內鼎中及奉安於九成宫至北方曰寶鼎者上方焚香再拜而鼎忽漏其中水流溢於外魯公私怪之殊不樂其後終以北方致亂庚戌太白犯斗熒惑犯左執法冬十月定鼎禮儀使蔡京奏十三日先定鼎於幄殿有鶴飛翔其上至十八日有白雲排列如卧在鼎上凝然不散十九日奉安之際有雲五色見於日旁又據太史局申日月俱有青赤黃珥伏乞宣付史館甲申詔誠感殿長生大帝君神像可遷附天章閣西位鼎閣奉安蔡絛史補王老志死政和六年又有王仔昔出賜號通妙先生時又踵祥符故事下詔上玉皇后土號合儒者説曰昊天玉皇上帝后土皇地祗率百官上册於玉清陽和宫焉二王先生語多在後仔昔死政和七年時有林靈素溫州人也少從浮屠學以無行為所在貶惡久之去為道士左街道録徐知常引之以附會諸閹又以神霄玉清王者上舊所誦大洞經中語也始曰神霄玉清王上帝之長子主南方號長生大帝君既下降於世乃以其弟主東方青華帝君領神霄之治天有九霄而神霄為最髙其治曰府故青華君亦曰判府天尊而靈素乃其府仙鄉曰禇惠亦下降佐帝君之治又目一時大臣要人皆仙府卿吏若魯公曰左元仙伯鄭居中劉正夫等若童貫諸巨閹率有名位王黼時為內相乃曰文華吏盛章王革時迭為天府乃曰仙獄吏伯氏時主進奉乃曰園苑寶華吏又謂上寵姬劉氏曰九華玉真安妃也天子心獨喜其事乃賜號通真先生初劉虞二王先生皆為上所禮然有神怪事蓋出自方士也及靈素至乃以其事歸之於上而曰以獨佐之而已每自號小吏佐治故上下莫可攻其非者然靈素實無術徒敢大言是時上興道教將十年獨思未有一厭服羣下者數以語近幸於是神降事起矣十一月庚寅朔太白犯壁壘陳太師蔡京等言伏見六十二處並降甘露二十處木並皆連理四處牡丹並皆駢生一蕚二處生芝草二處芍藥雙頭二處祥雲見三處並現毫光祥煙鄆州有仙鶴約二百隻飛鳴梅州枯木再生枝乞許拜表稱賀詔依又言兾州黃河澄清甲午詔帝鼐改為隆鼐正南彤鼎為明鼎西南阜鼎為順鼎正西晶鼎為蘊鼎西北魁鼎為健鼎正北寶鼎依舊東北壯鼎為和鼎正東蒼鼎為育鼎東南風鼎為潔鼎鼎閣為圜象徽調之閣己亥祀昊天上帝於圓壇以太祖皇帝配十二月癸亥熒惑入氐宣和殿學士盛章詳定九域圖志製瑞鶴旗先是元符二年武夷君廟有仙鶴迎詔又政和二年延福宫燕輔臣有羣鶴自西北來盤旋於睿謨殿上又奏大晟樂而翔鶴屢至因詔加此旗是歲微行始出丁酉政和七年春正月壬寅熒惑犯歲星兩浙道士林靈素至京師二月御上清寶籙宫命通真先生林靈素講道經及玉清神霄王降生記有翔鶴數十飛鳴久之夏四月庚申御筆卿等表章册朕為教主道君皇帝只可教門章疏用不可令天下混用六月都下大雨雹皆如拳或如一升器幾兩時而止秋七月乙未熒惑犯天江甲寅詔季秋大享明堂登歌並用道士八月月犯牛老人星見十一月庚寅詔蔡京告老乞骸可五日一朝次赴都堂治事初童貫附京以進既顯寖與京異京疾之及貫兼宣撫河北遂欲專北事京愈不堪是歲貫又上其平燕策京一日留身奏曰貫徒有虛名爾伐國大事安危繫之陛下何以付貫上曰前日取青唐豈非貫之功京對曰崇寧下青唐初遣貫行但若監軍爾藉使臣當今日亦不能為之况伐敵國乎上意頗沮京即劾貫前後壞邊事章凡四上而上乃議下除司空令致仕而罷所領貫大懼因以其城西外圃與京西湖鄰墻流水相接為名邀京子攸及鯈翛同出城相見議分定界至遂為攸置酒厚甚以二犀帶遺攸會攸力救解之京議遂格京實創起北伐事嘗曰北事只我了得他人為之必鑿脫及與貫爭權弗勝遽有敵國不可伐之言故上亦不信也或曰京未始有此言於上特其子絛假託以欺世云甲辰冬至後一夕有大星如月徐徐南行而落光照人物與月無異十二月詔修神保觀神保觀者俗謂二郎神也都人素畏之自春及夏傾城男女負土以獻名曰獻土又有飾作鬼神巡門催納土者乘輿亦微幸而觀之或謂蔡京曰獻土納土非吉語也後數日有旨禁絶政和後上巾裹及衣服獨喜同臣庶實欲為期門之事而苑囿皆效江浙為白屋不施五采多為村居野店又聚珍禽竒獸麋鹿鴐鶴禽鳥動數百千蹄隻實囿中宣和間都下每秋風夜靜禽獸之音四徹宛若深山大澤陂野之間識者以為不祥前授宣德郎管勾太平觀陳瓘自江州移南康軍居住戊戌重和元年春正月丁亥熒惑犯外屏二月辛酉先是詔造太極飛雲洞劫之鼎蒼壺祀天貯醇酒之鼎山嶽五神之鼎精明洞淵之鼎天地隂陽之鼎混沌之鼎浮光洞天之鼎靈光晃耀鍊伸之鼎蒼龜大蛇蟲魚金輪之鼎至是奉安朱勝非云崇寧三年用黥徒魏漢津言鑄九鼎至政和八年又用方士之説作神霄九鼎遂有十八鼎嗚呼黃帝鼎成升仙夏禹以貢金鑄鼎事不見於詩書司馬遷好竒取他説載之史記而後世想慕不已此皆蔡京相業敢為怪誕如此庚午遣武義大夫馬政同髙藥師等使女真講買馬舊好三月戊申御集英殿賜進士及第出身同出身七百八十三人詔嘉王楷考在第一不欲令魁多士以第二人開封王昻為榜首夏四月壬戌御筆韓琦弼亮三朝功在王室眷其後嗣宜有寵褒朝請大夫鴻臚純彥力學有文早登賢科揚歷中外靖共日著可特除顯謨閣待制提舉醴泉觀五月壬午朔日有食之廣安軍草澤安堯臣上書曰天生北狄限以沙塞自適其俗不通中國者狄之常也今乃遣使乞憐非畏吾也蓋邊境之上未有可乘之釁陛下將啓燕雲之役異日唇亡齒寒邊境有可乘之隙狼子野心安得不蓄其鋭而伺吾隙以逞其所大欲耶臣又觀自古國家之敗未嘗不由宦者專政此曹手執帝爵口銜天憲則臣下之死生禍福在焉請以誤國之大者借童貫而論之貫起自卑微陛下付以兵柄汲引羣小易置將吏以植私黨自兵權歸貫紛更殆盡賞罰不明兵氣委靡中外之人咸謂貫深結蔡京同納燕人李良嗣以為謀主共唱北伐之議經營之久國用匱乏乃始方田以增常稅均糴以充軍儲茶鹽之法朝行暮改民不奠居陛下茍能速革其弊則赤子膏血不為此曹涸也劉蕡謂自古宦者預軍政未有不敗國喪師者史臣亦謂宦者亂人之國其源深於女禍陛下何苦昵之講義曰當天下太平之日無以娛恱人主聳動天下惟有恢拓一事耳故用事之久則必至於用兵生事蔡確欲固其寵則興靈武之師王圭患失其位則贊永洛之役章子厚之於湟鄯蔡京之於青唐洮河皆是謀也然皆求逞於西而未嘗開釁于北也貫攸何人哉敢以蚊負山耶然致靖康之禍不在於取燕而在於不能取燕使契丹政令猶強社稷猶固我將伸宿憤勞纍戰雖得燕薊而民怨財竭內潰外叛若此而謂致靖康之禍在於取燕可也今天祚地喪於外位奪於內竄在夾山死在朝夕其國滅矣因時拯亂湯武之業也疆理天下舜禹之政也紀律頗嚴將帥頗厲乘時以取全燕合漢唐之遺民何為不可然契丹以燕遼全盛之力而滅於女真崛起之兵我以關陜驍悍之師而敗於契丹垂盡之將遂藉女真納賄以巨百萬計所買者山前六郡之空城耳是全燕之地吾不能取彼能取之吾既不能取吾又從而取之此彼之邀索所以無已也故靖康之禍不在於取燕而在於取燕之非人得燕之無道而不能取燕也辛亥太白犯權星八月丙辰月犯房阿固達稱皇帝改元天輔以其國産金故國號大金即遣使詣天祚議和所求凡十事天祚付南北面大臣議蕭奉先等喜以為自此無患矣請許之九月庚辰朔流星自斗魁向東南有尾迹照地是月掖庭大火閏九月癸亥熒惑犯進賢冬十月己卯朔太白晝見十一月御筆比緣大臣建議恢復燕雲故地安堯臣逺方書生能陳厯代興衰之迹臣僚咸謂毁薄時政首沮大事乞重行竄殛朕以承平日久言路壅蔽敢諫之士議加爵賞堯臣許用安惇遺表恩澤令吏部先次補承務郎壬申太白犯天江己亥宣和元年春正月詔改佛號大覺金仙餘為仙人大士僧稱德士行者稱德童而冠服之但道冠有徽德冠無徽又以寺為宫院為觀尋改女冠為女道尼為女德明年詔復舊乙卯月犯填二月癸未老人星見三月安州孝感縣獲古鼎六蔡攸驗其欵識有云王伐虎方之年實始作器虎方蓋西域也陛下屢問罪夏人此鼎厯歲三千一旦自發比漢汾睢所獲誠為超冠詔許百官表賀天祚惡聞女真事蕭奉先揣其意皆不以聞明年五月上京破和議遂已後天祚雖復請盟阿固達皆不報夏四月丙子朔日有食之丙戌日有赤黃冠氣五月乙亥歲星犯斗大水髙十餘丈犯都城蔡絛曰水未作前雨數日如傾及霽開封縣前茶肆人家晨起拭牀榻睹若有大犬蹲其旁質明視之龍也其人大呌而倒遂為作坊兵士衆取而食之不敢奏都人皆圖畫傳玩其身僅六七尺若世所繪龍其鱗作蒼黑色然驢首而兩頰如魚頭色正緑頂有角一極長於其際始分兩歧焉有聲如牛考諸傳記則實龍矣後十餘日大水至又云既大雨龍降後一夕五鼓西北有赤氣數十道亘天犯紫宫北斗仰視星皆若隔絳紗初起時拆裂有聲然後大發後數夕又作聲益大格格且久其發更猛而赤氣自西北數十百道其中又間以白黑二氣然赤氣尢多自西北俄及東北又延及東南其聲亦不絶逮曉而止後復大水絛時切以謂與丙午及北齊末占同後事驗亦甚明六月起居郎李綱奏積水暴集淹浸民居迫近都城誠大異也此誠陛下寅畏天戒轉詢衆謀之時周官於國危則有大詢之禮伏望特詔在廷之臣各具所見以聞擇其可採者非時賜對特加驅策施行詔都城外積水緣有司失職隄防不修即非災異李綱所論不當罷起居郎八月老人星見上既遣使從海上與女真結約共圖契丹髙麗一旦忽上奏以其王病求醫上命擇二良醫往館醫甚勤日久引醫視其用兵布陳禦敵之方曰聞天子將用兵遼人實兄弟國茍存之猶足為中國抒邊女真乃狼虎不可交也不得已願二醫悉紀布陳禦敵之狀告諸天子早為之備所以求醫者正懼泄則為小國之患矣事既聞上不樂命中使諭曰命汝為醫乃敢預國家事乎九月癸亥熒惑犯壘壁陳十一月戊辰遣監察御史周武仲察訪淮南先是臣僚上言淮東大旱下戶流離康衢之間百錢賣一兒斗粟易一女父不能保子夫不能保妻而部使者安坐略不介意而武仲有此命大學生鄧肅進詩諷取東南花石坐屏出學押歸本貫肅南劒州人也放林靈素歸溫州先是京城大水上遣靈素禳之不驗靈素又嘗衝太子節不避太子擊之訴於上上遂厭之乃逐去十二月癸酉朔刑部尚書宇文粹中進對如放欠負一事自來朝廷黃紙放監司白紙催之語上曰白紙催正做得抗敕待令覺察編置監司數人便可止絶令百姓受實惠是歲正字曹輔編管郴州時車駕輕出朝士大夫寒心莫敢言者輔慨然上書奏上出示宰執令召赴都堂審問太宰余深曰小臣敢論許大事輔曰臣有大小愛君之心一也深曰如言敵兵起於軫下無乃太峻否少宰王黼曰有是事乎輔曰兹事雖里巷細民無不知者相公當國獨不知耶曽此不知焉用彼相黼惡其侵已以聞上令與逺小監當既而編管郴州居郴六年兩遇恩沛王黼當國不得移命輔怡然不以介意朱勝非云上皇自政和以來為微行每出乘肩輿並無呵衛前後數內臣導從而民間指目為小轎子置行幸局主供帳飲膳等局中人遇出即稱有排當次日不歸即傳旨稱瘡瘍不坐朝閣門等處日有探候聞有排當即知必出聞不坐朝即知不歸卒以為常始猶外人未盡知因蔡京草表云輕車小輦七賜臨幸邸報傳四方盡知之矣靖康初召輔為言官遷簽書樞密院次年卒於南都庚子宣和二年春正月己酉月犯畢二月壬申朔歲星犯壘壁陳乙亥遣趙良嗣王瓌使金國仍以買馬為名其實約阿固達夾攻契丹取燕雲舊地夾攻之約蓋始乎此辛巳老人星見五月趙良嗣王瓌等至薊州會阿固達已出分師三路趨上京引良嗣觀攻城不旋踵而破丁巳祀地於方澤丁卯朱夢説坐上書論事編管池州六月丁丑太白晝見庚寅流星出氐入天市垣秋七月辛亥月犯牛九月己酉日有赤黃戴氣冬十月戊辰朔日有食之己卯太白熒惑犯亢睦州青溪縣有洞曰幫源羣不逞往往囊槖其間方臘者因以妖術誘之凶黨稍集是月丙子殺里正縱火大掠從之者幾萬人十一月戊戌朔方臘僣改元永樂以其月為正月己亥少傅太宰兼門下侍郎余深為鎮西軍節度使依前少傅知福州癸卯詔侍御史陳堯臣論事不當語言狂妄送吏部與監當差遣十二月辛卯月犯東咸辛丑宣和三年春正月丁酉朔領樞密院事童貫為江浙淮南等路宣撫使戊申熒惑犯斗丙辰熒惑入斗二月壬午月犯角庚申御集英殿賜何渙等及第出身同出身六百三十一人是春日有變忽青黯無光其中洶洶而動若鉟金而湧沸狀日旁有青黑正如水波周回旋轉將暮而稍止是時睦賊方作人多憂之以謂禍難必未已也夏四月盜起睦州中丞陳過庭論致冦者蔡京養冦者王黼又劇論朱勔父子本刑餘小人罪著賄盈皆宜正典刑以謝天下遂奪職知蘄州未幾散州安置王稟辛興宗楊惟忠生擒方臘於幫源山東北隅石澗中并其妻拏兄弟偽相侯王三十九人振旅赴杭州宣撫司方臘雖就擒而支黨散走浙東賊勢尚熾是月汝州梁縣民邢喜家牛生麒麟五月改睦州建德軍為嚴州遂安軍丙午錫貢士聞喜宴於瓊林苑賜御製詩月入氐童貫奏生擒方十三等平蕩賊洞了畢上表稱賀八月癸巳朔老人星見己亥太白犯勾鈴丙辰方臘伏誅壬寅宣和四年春正月壬申熒惑犯天街二月辛丑太白犯壘壁陳三月金人初以正月癸酉陷中京天祚奔夾山李處溫謀立燕王淳淳於天祚為從叔號天錫皇帝遂廢天祚為湘隂王遼國自此分矣朝廷遂遣童貫勒兵十五萬巡邊仍以御筆三䇿付貫五月童貫駐軍雄州种師道屯白溝癸未我師敗於蘭溝上聞師道敗亦甚懼遂詔班師講義曰世之言宣和之失者曰遼不可攻女真不可通燕不可取藥師不可任張覺不可納然皆非根本之論也蓋在慶厯景德之時遼勢之方強故未有可乘之機至天祚失道內外俱叛而已有可取之釁則攻遼非失䇿也女真固不可遽通然以方張之勢斃垂盡之遼他日必與我為鄰則通女真亦未為失䇿也全燕之地我太祖百計而不能得太宗百戰而不能克取今也兼弱攻昧可以收漢晉之遺黎可以壯關河之大勢則燕亦在所當取也郭藥師以涿易來降則以燕人守燕亦可也平州乃燕之險張覺以平州來則撫之亦可也不知中國之見輕於夷狄久矣女真初未知中國之虛實吾之使者泛海屢至而遂為其長所辱則既輕於始矣及議山後地尼堪猶曰南朝四面被邊若無兵力安能立國如此強大自郭藥師已降之後遼人垂滅之國亦足以覆官軍觀金人告馬擴之言曰劉延慶一夕而遁汝觀我家用兵有走者否則中國之見輕於敵非一事使當時不通女真不攻遼國不取燕山不任藥師不納張覺其能保全金人不入冦乎蓋當時之患不在外而在內不在女真而在中國小人用事自熙寧至宣和六十年姦幸之積熟矣星犯帝座禍敗在目前而不知冦入而不罷郊祀恐礙推恩冦至而不告中外恐妨恭謝冦迫而不撤綵山恐妨行樂是小人之為禍也童貫之使遼也遼人笑曰大宋豈乏人乃使內臣奉使耶女真將敗盟朝廷遣使者以童大王為辭尼堪笑曰汝家更有人可使否是宦官之為禍也敵至燕而燕降至河北而河北之軍潰至河南而河南之戌散此兵將之為禍也置花石綱而兩浙之盜起科免夫錢而河北京東之盜起此盜賊之為禍也自古未有內無釁隙而外有敵國之禍者景德之兵慶厯之冦所以不能為深入之謀者以內無釁隙啓之也宣和之間在內之釁隙不一則女真固有所負而至耳縱使當時無女真之禍亦必有小人宦者兵將盜賊之禍矣是歲四月貫始出師白虹貫日出門而牙旗竿折至蔡攸再出師有少保節使與宣撫副使二認旗從後次日二認旗皆失之又出師連數夕有流星大若杯碗自紫微文昌出不一所或犯天津河鼓越天漢斗牛亦不一所皆向南奔曵光如匹練每夕數十流至夜半方漸踈十餘夕皆然蔡絛密白其父曰以此占懼如西晉象實令人憂疑京亦動色然太史皆不奏又方用兵雄州地大震雄之正寢忽玄武見龜大如錢朱蛇僅若筋貫攸拜之藏以銀合置於真武廟明日俱死又馬生兩角長各三寸及四足皆出距方以為龍馬貫以進御獨上識而甚不樂也秋七月戊辰月犯建八月庚戌月犯填九月丁巳朔詔宋昭上書狂妄除名勒停送廣南編管以為妄議朝政之戒昭書云蕃人之性不可以信義結滅一弱敵而與強敵為鄰恐非中國之福徒為女真之利耳且北敵雖夷狄然謹守盟誓不敢妄動者知信義之不可渝也本朝與北敵通好百有餘年一旦敗之女真能果信其不渝乎異日女真決先敗盟為中國患必矣此理之必然事之必至雖使伊周復生不能易此議也乙丑契丹易州守髙鳯等以易州降契丹都管押常勝軍涿州留守郭藥師以涿州降十一月丙辰朔流星出王良至紫微垣內上輔星有尾迹照地癸酉月犯權星十二月丙戌金人入燕蕭氏出奔童貫蔡攸再舉取燕不能下懼無功獲罪密遣王瓌由飛狐路禱金國主令圖之瓌見金國主具言貫攸兵已壓境不敢擅入乞如約夾攻金國主定議分三道進軍時馬擴隨軍行國主謂擴曰契丹疆土我得十九矣止燕京數州之地留與汝家我以大軍三面掩之令汝家俯拾猶不能收我初聞南軍到盧溝已有入燕者我心亦喜縱令汝家取之我亦將斂軍歸國近却聞劉延慶一夜燒營而遁何至此耶汝家似此喪師從來有何誅責擴云兵折將死將折兵死劉延慶敗雖貴亦誅阿固達云若不行法何以使人一兩日間到關汝觀我家用兵有走者否是日入居庸關晡時到燕蕭后聞居庸失守夜率契丹蕭幹等車帳出城行未五十里金人遊騎已及城前軍已登城矣於是左企弓宰相等皆迎降金國主遣馬擴歸獻捷癸卯宣和五年夏四月乙巳童貫等言四月十七日躬領大軍入燕山府撫定軍民布宣聖澤具表稱賀五月甲寅太白犯鬼己未御文德殿以收復燕山府雲中府兩路羣臣稱賀賜王黼玉帶是月金國王阿固達卒弟烏竒邁立秋七月甲子月犯牛八月辛巳朔太史言日當食不食壬午歲星犯井是月燕山府路轉運使吕頥浩落職降官頥浩嘗奏燕山一路開邊極逺其勢難守雖窮天下之智盡天下之力竭天下之財必無以善其後又條上河北燕山路危急五事詔頥浩所奏意有包藏情不可貸御筆令頥浩赴宣撫司出頭供伏軍令狀九月癸丑詔王安中知燕山府詹度郭藥師同知藥師及燕人終不改其左袵時人竊比之祿山己未熒惑犯司怪冬十月乙酉雨水氷十一月丙寅幸王黼賜第觀芝草史臣曰王黼專結梁師成既為相蒙賜大第於城西開便門與師成宅對街以相往來及燕告功黼益得意乃妄託言家之屏風生玉芝上為臨幸睹黼之堂閣張設寶玩山石侔擬宫禁喟然嘆曰此不快活耶若太師居處糞壤坑耳太師謂蔡京也時上既幸黼第又設便門過師成復來黼家駐蹕因大醉黼自傳旨支賜命放散侍從百官於是禁衛諸班直爭願見上始謝恩不肯散因大訩訩師成與談稹乃扶持上而出面諭之上醉不得語矣復入夜漏十五刻乃開過龍德宫復道小墻謂鹿寨門者以還內宦者十餘人執兵接之而去三衙衛士無一人得入者是夜諸班禁從皆集教場備不虞幾生變翌日猶不御殿殆半日人心始安祖宗以來臨幸未之有也庚午太白犯房十二月己巳月入氐是月京師地震甲辰宣和六年春正月甲子上元節御樓觀燈簾幕重密下無由知衆中忽有人躍出黑色布衣若僧寺童行狀以手指簾謂上曰汝有何神而敢破壞吾教吾今語汝報將至矣上怒甚命中使傳旨治之於是箠掠亂下又加炮烙略不語亦無痛楚狀因又斷其足筋俄施刀臠肉血狼籍上大不怡為罷一夕之歡至暮終不得為何人付獄盡之己巳月入氐是月京師地震二月辛丑承事郎楚州居住陳瓘卒史臣曰范純仁晚年留意人才或問其所儲蓄人才可為今日用者答曰陳瓘又問其次曰陳瓘自好也宣和末或問遊酢以當今可以濟世之人酢曰陳了翁其人也劉安世亦嘗因瓘病使人勉瓘以醫藥自輔云天下將有賴於公當力加保養以待將用也瓘通易數自謂與邵雍之數合至如國家中興之事往往嘗預言之其彈蔡京之疏云絶滅史學一似王衍重南輕北分裂有萌驗其言於今也悲夫閏三月庚辰熒惑犯五諸侯庚子御集英殿䇿試進士夏四月癸丑賜沈晦等及第出身同出身凡八百五人六月辛酉月犯壘壁陳八月乙巳朔金人怨朝廷納張玨遂攻蔚州絶山後交割意九月丙戌楊時為校書郎及對力陳警戒之言上首肯之曰卿所陳皆堯舜之道宜在經筵朝夕輔朕即除邇英殿説書庚寅手詔以金芝産於艮嶽萬夀峯宜改名夀嶽朱勝非云上皇於宫城東北起景龍門復道通禁中每歲冬至後即放燈自東華門以北並不禁夜徙民市行鋪夾道以居縱慱群飲至上元後罷謂之先賞又於次東建寶籙宫宫後纍石為山以其在艮方也號艮嶽又改稱夀嶽運四方花竹竒石積纍二十餘年山林深髙千巖萬壑麋鹿成群樓觀臺殿不可勝計最後朱勔於太湖取巨石髙廣數丈載以大舟挽以千夫鑿河斷橋毁堰拆閘數月方至京師賜號昭功專慶神運石是年初得燕地故也勔緣此授節度使靖康元年冬虜騎再犯闕圍閉日久折屋為薪鑿石為炮伐竹為笓籬惟大石基址存焉丁亥月犯畢十一月丙子太白晝見十二月癸亥蔡京落致仕領三省事五日一赴朝請至都堂治事是歲都城有賣青果男子孕而誕子蓐母不能收易七人始免而逃去又有酒肆朱氏子其妻忽生髭其人可四十餘髭髯長僅六七寸踈秀甚美宛然一男子特詔度為女道士乙巳宣和七年春正月辛丑故遼國主天祚為金人所擒削封海濱王後踰年而卒六月戊午劉安世卒吕本中雜説崇寧間蔡京每謂人如劉安世使搗碓磨磨亦只説元祐是也京執政久亦時有長者之言嘗有乞將元祐臣僚編置逺惡州郡者京曰元祐人本無大罪止是不合改先帝法度耳八月有都城東門外鬻菜夫負擔至宣德門下忽迷罔釋荷擔向門戟手而言曰汝壞吾社稷矣太祖皇帝神宗皇帝使我來道尚宜速改也邏卒捕得下開封獄一夕已省則不知向所云為者時於獄中盡之九月壬辰熒惑犯鬼是日金人以天祚成禽遣李孝和王永福來告慶詔宇文虛中髙世則館之其實敵將舉兵以覘我也秋有狐由艮嶽直入中禁據御榻而坐詔毁狐王廟冬十月辛丑土星入太微垣戊子有流星尾迹照地如盞口大十二月金人陷薊州接伴賀正使傳察為所殺先是金人未渝盟朝廷以故事遣察迓使人於薊州玉田縣韓城鎮察至界上敵愆期不至斡里雅布擁大兵遽入冦遂執察等責令投拜蔣噩以下羅拜臣服察獨不屈敵以兵脅之察亦不顧金帥曰我以南朝天子失德故來弔伐察曰主上明若日月四海拱戴胡欲敗盟以此為兵端耳然自古之戰以曲直為勝負南北敵國亦安知爾非送死哉我有死而已膝不可屈也金帥大怒察死之己巳童貫遁歸京師初貫得越茹牒計無所出託以赴闕稟議請太原帥張孝純諭意孝純愕曰金人渝盟大王當會諸路將士極力支捂今去人心搖是將河東與賊河東失河北亦豈能保耶願少留共國報國太原地險城堅人亦習戰未必便能拔也貫怒目曰貫受命宣撫非守土臣必欲留貫置帥何為此行至京當即以兵來援孝純撫掌歎曰平時童太師作多少威重及臨事乃畏怯如此不思身為大臣當以死排難止欲奉頭鼠竄何面目見天下士乎貫不聽翌日行用九日至京師郭藥師以燕山叛執安撫蔡靖運使吕頥浩副使李與權提舉官沈琯等金人既欲犯盟自秋冬探報甚密然中外多不知也蔡靖亦密奏凡百七十餘章至言朝廷若以為不實則乞早賜重行編置然終不報十一月斡里雅布之軍壞燕山府鹽場斡里雅布至燕山郭藥師率軍官郊迎之初蔡攸從中力主藥師每以為忠信無比故終不為之備於內地略無防禦亦屢有人告變又沿邊巡檢楊雍者得其通金人書繳上之皆不省初靖揣藥師常勝軍之情故常勉藥師以忠義及知金人點集將寒盟屢奏皆不報無如之何故因其出師乃餞於野對其大軍設案望闕焚香拜舞始語藥師曰對諸軍在此今日之事相公豈可負趙皇恩耶願勉旃藥師亦領略然無益也是月壬寅詹度猶奏郭藥師瞻視不常趣向懷異蜂目鳥喙怙寵恃功兼常勝軍暴掠燕子女攘奪民舍藥師縱之不復彈壓詔梁沂盧宗原體究而藥師已叛矣藥師既叛報至京師上左右不欲人聞知乃共匿其報但曰藥師被圍矣金人南犯朔武之境朔州守將孫翊者勇而忠出與之戰戰未決漢兒開門獻於金人既至武州漢兒以為內應遂失朔武長驅至代州守將李嗣本率兵拒守漢兒又擒嗣本以降遂陷代州己酉知中山府詹度奏金人分道入冦是日連三奏至京師朝廷失色尼雅滿引兵圍太原知朔寧府孫翊來救兵不滿二千與金人戰於城下張孝純曰賊已在近不敢開門觀察可盡忠報國翊曰但恨兵少爾乃復引戰數日五兵皆盡為金人所殺月入太微垣庚申上禪位於皇太子手詔皇太子桓可即皇帝位凡軍國庶務一聽裁決豫當以道君號退居舊宮丙寅上道君皇帝尊號曰教主道君太上皇帝是歲十一月祀南郊禮畢降壇而得邊報及上還御郊宫之端誠殿時天未明百辟皆賀忽有梟正鳴於殿屋之上與贊拜之聲幾若相應和異常聞者駭之時已報金人寒盟元豐之末嘗有物大如席夜見寢殿上而神廟登遐至元符末又數見而哲宗厭代自大觀間漸晝見政和已後遂大作形廣丈餘狀髣佛如龜行動硜硜有聲黑氣蒙之氣之所及腥血四灑後習為常宣和末寖少出而亂遂作此為黑眚宣和二三年春夏之際洛陽府畿間忽有物如人或如犬其色黑不能辨眉目始夜則出掠小兒傷食之後雖白晝因忽在人家有力者夜必聚執槍棒而為之衛如是二歲乃息甫三年則北征事起此亦黑眚也宋史全文卷十四
