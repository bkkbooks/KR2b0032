body:
  text: 宋史全文卷二十上宋高宗十丁巳紹興七年春正月癸亥朔上在平江手詔將乘春律往臨大江駐蹕建康以察天意左司諌陳公輔言今日恢復之䇿不出攻守二事攻者以我攻彼也守者防彼攻我也以我攻彼其勢在我防彼攻我其勢在彼攻雖為難而守之為尤難攻雖在所急而守之尤在所急今將移蹕建康則其地尤重於淮東矣臣愚欲乞措置淮西先選大臣以臨之更增兵將以實之仍令諸大將緩急相援首尾相應則雖虜騎之來不足畏矣置御前軍器局於建康府嵗造全裝甲五千矢百萬仍隸樞密院及工部丙寅上諭大臣曰昨日張俊呈馬因為區别良否優劣及所産之地皆不差張浚曰臣聞陛下聞馬足聲而能知其良否上曰然聞步驟之聲雖隔墻垣可辨也凡物茍得其要亦不難辨浚曰物具形色猶或易惟知人為難上曰人誠難知浚因奏人材雖難知但議論剛正面目嚴冷則其人必不肯為非阿諛便佞固寵患失則其人必不可用上亦以為然丁卯户部員外郎霍蠡自鄂州軍前來奏事言今軍事所須而病民最甚者莫如月樁錢州縣所樁窠名曽不能給其額之什二三自餘則一切出於州縣之吏臨時措畫銖銖而積僅能充數一月未畢而後月之期已迫矣詔諸州通判開具申尚書省龍圖閣直學士汪藻再遷一官以類編元符庚辰以來詔旨成書也辛未中書舍人董弅知衢州免謝辭先是有旨禁伊川學録黃下禮部吏部員外郎黃次山欲鏤板弅曰少俟之乃以己見求對次山即申御史臺謂弅沮格詔令於是侍御史周祕彈弅故弅遂罷新兩浙東路提點刑獄張九成罷先是左司諌陳公輔論九成平日所行無非矯偽朝廷每因其辭輒復遷擢彼亦何憚而不辭詔九成與小郡九成又辭乃令主管江州太平觀壬申進呈李誼論吏部非次闕不當改為集注上曰士大夫羈旅之中有非次闕不得授又待集注之期所以衆論以為非爾聞每赴部授差遣者所費極多何以責其清廉史臣曰立國以法者天下之至公待人以情者帝王之全度太祖杖贓吏於朝堂以至極刑無所容貸而高宗乃憫其赴部之苛費集注之淹期惻然有哀矜之心二者不同何也蓋祖宗建極之初立萬世之規模用法不得不盡其嚴高宗遭多事之時士大夫流離困厄者衆故不得不本乎恕其迹不同而帝王之度一也癸酉先是張浚以破賊功遷特進浚悃辭上曰朕以賞罰治天下如卿大臣固不俟勸然賞不行則四方萬里無由知卿之功浚復固辭以富平敗事受天下之責上曰富平之失卿以宫祠去位朕所以示罰也今日有功則賞可後乎卿每有制除則再三辭避恐於君臣之義有所未安浚恐竦奉詔翰林學士兼侍講朱震引疾乞在外宫觀不許先是董弅免官震乃白張浚求去徽猷閣待制胡安國聞之以書遺其子寅曰子發求去晚矣當公輔之説才上若據正論力爭則進退之義明今不發一言默然而去豈不負平日所學惜哉且復問宰相云某當去否既數日又云今少定矣此何等語遇緩急則是偷生免死計豈能為國逺慮平生讀易何為也於是安國自上奏曰士以孔孟為師不易之至論然孔孟之道失其傳久矣自程頤始發明之而後其道可學而至今使學者師孔孟而禁不得從頤之學是入室而不由户也夫頤之文於易則因理以明象而知體用之一原於春秋則見諸行事而知聖人之大用於諸經語孟則發其微旨而知求仁之方入德之序鄙言怪語豈其文哉頤之行則孝悌顯於家忠誠動於鄉非其道義一介不以取豫則高視濶步豈其行哉自嘉祐以來頤與兄皓及邵雍張載皆以道德名世如司馬光吕公著吕大防莫不薦之頤有易春秋傳雍有經世書載有正蒙書惟皓未及著書望下禮官討論故事加此四人封爵載在祀典比於荀揚之列仍詔館閣裒其遺書以羽翼六經使邪説不得作而道術定矣戊寅帶御器械劉錡權主管馬軍司并殿前步軍司公事張浚薦錡文武兩器真大將材故有是命辛巳韓世忠奏已還軍楚州上因論淮陽取之不難但未易守張浚曰淮陽今劉豫要害之地故守之必堅上曰取天下須論形勢若先據形勢則餘不勞力而自定矣正如奕棊布置大勢既當自有必勝之理癸未翰林學士兼侍講陳與義參知政事提舉醴泉觀兼侍講沈與求同知樞密院事左修職郎朱倬召對乞申戒有司勤恤民隱今西北之民已思見官儀矣陛下大固其心勿小小以傷之天下幸甚乙酉詔樞密本兵之地事權宜重可依祖宗故事置樞密副使宰相仍兼樞密使其知院以下如舊吏部侍郎吕祉在建康聞禁伊川學上奏曰臣竊惟孔子刪詩序書繫周易作春秋明禮樂與門弟子答問則見於論語凡學孔子無如子思孟子中庸與七篇之書具存自漢至本朝上所教下所學鴻儒碩學端亮閎偉之士接武於時何嘗不由此道豈特程頤而後傳也臣竊詳程頤之學大抵宗子思中庸篇以為入德之要中庸曰君子之中庸時中程頤之所得也近世小人見靖康以來其學稍傳其徒楊時輩驟躋要近名動一時意欲歆慕之遂變巾易服更相汲引以列于朝則曰此伊川之學也其惡直醜正欲擠排之則又為之説曰此王氏之學非吾徒也號為伊川之學者類非有守之士考其素行蓋小人之所不為有李處廉者知瑞安縣專事貨賂交結權貴取程頤文并雜説刋板作帙遍遺朝士朋比者交口稱譽謂處廉學伊川近聞處廉犯入已贓繫獄罪當棄市逺近傳笑此皆子思所謂小人之中庸而無忌憚者也中庸一也然有君子之中庸有小人之中庸非其學之謬乃學者之罪也望將前日聖旨指揮連臣僚所論出榜諸路州縣學舍使學者皆知舊學而不為近世小人之所習以補治化從之丙戌詔以知州軍諸郡通判各六十一闕歸吏部用左右司奏也於是堂除郡守之闕一百九通判八十丁亥閣門祗候充問安使何蘚都督行府帳前準備差使范寧之至自金國得右副元帥宗弼書報道君皇帝寧德皇后相繼上仙醴泉觀使兼侍讀秦檜為樞密使應干恩數並依見任宰相條例施行辛卯四川都轉運使李逮始視事時茶馬司闕官命逮兼領熙豐以來成都府秦州皆有擢茶司買馬監牧司至是關陜既失逮請合為一司名都大提舉茶馬司從之二月丙申夜太平州火丁酉鎮江府火己亥主管台州崇道觀王倫充迎奉梓宫使閣門宣贊舍人高公繪副之河南京西宣撫副使嶽飛赴行在翌日內殿引對飛密奏請正建國公皇子之位上諭曰卿言雖忠然握重兵於外此事非卿所當預也飛色落而退辛丑詔以太陽有異氛氣四合令中外侍從各舉能直言極諌之士一人自復賢良方正科久未有應者至是張浚乞因災異降詔上從之壬寅夜雷聲初發癸卯命樞密院計議官李宷往江淮訊究營田利害如有未便於民者令宷與樊賓王弗商量先次改正夜大雪甲辰輔臣奏事上曰朕常日不甚御肉多食蔬菜近日頗雜以豆腐為羮亦可食也水陸之珍兼陳於前不過一飽何所復求過殺生命誠為不仁朕實不忍沈與求曰陛下舉斯心以加諸彼天下不難治矣先是太陽有異張浚奏曰臣以非才備位宰相致天象如此罪無所逃上曰此乃朕不德所致浚因引咎上曰應天以實不以文惟君臣交修不逮可以消變浚曰臣等敢不恭承大訓丙午川陜宣撫副使吳玠初置銀會子於河池迄今不改己酉上與輔臣論共器因曰前日嶽飛入對朕問有良馬否飛奏舊有兩馬已而亡之今所乘不過馳百餘里力便乏此乃未識馬故也大抵馴而易乘者乃駑馬故不耐騎而易乏若就鞍之初不可制御此乃馬之逸羣者馳驟既逺則馬力始生張浚曰人材亦猶是也但當駕御用之耳上曰人材若只取庸常易悅者何以濟天下之事浚曰既知其可用則當不責近效以待有成上曰飛今見識極進論議皆可取朕嘗諭之國家禍變惟賴將相協力以圖大業不可時時規取小利遂以奏功徒費朝廷爵賞須各任方面之責期以恢復中原乃副朕委寄之意昨張俊來覲亦以此戒之史臣曰上論人材不取庸常易悅者以其無補也唐太宗與臣僚論事有不出其意者退而有憂色人主有大功德及於天下者其志趣不相逺類此庚戌吏部尚書孫近等請諡大行太上皇帝曰聖文仁德顯孝廟號徽宗癸丑提舉廣南市舶林保進中興龜鑑是日雨雹丙辰知果州宇文彬降一官放罷去嵗果州旱守臣王隲率民出粟賑貸會隲滿嵗彬代之乃與通判州事龎信孺繪禾登九穗圖獻于朝上曰此不出誕謾即諂諛爾去年四川荒旱黎民艱食安有瑞禾政使偶然有之何足為瑞往年知撫州高衛進甘露圖朕疾其佞罷其守符彬等可降官仍放罷丁巳湖北京西宣撫副使嶽飛為太尉賞商虢之功翌日升宣撫使飛威名日著淮西宣撫使張俊益忌之參謀官薛弼每勸飛調護而幕中之輕鋭者復教飛勿苦降意於是飛與俊隙始深矣飛時留行在遂衛上如建康己未上發平江府以舟載徽宗皇帝顯肅皇后几筵而行庚申淮西宣撫副使劉光世乞在外宫觀先是議者謂光世昨退保當塗幾誤大事軍律不整士卒恣橫張浚亦言光世沉酣酒色不恤國事語以恢復意氣怫然乞賜罷斥以警將帥上然之光世聞上進發乃引疾乞祠上曰光世兵比之韓世忠張俊之軍訓練殊不至一軍皆驍鋭但主將不勤耳月費錢米不資皆出民之膏血而不能訓練使之赴功甚可惜也大抵將帥不可驕惰若日沉迷於酒色之人何以率三軍之士後三日乃以親筆答光世曰卿忠貫神明功存社稷朕方倚賴以濟多艱俟至建康召卿奏事其餘曲折併俟面言平江府進士張亨衢進歷代中興論上讀曰肅宗以張后李輔國之故不能盡子道於明皇可以謂之仁孝乎辛酉上次常州賜無錫知縣李德鄰五品服初上引德鄰入對問以民間疾苦德鄰對民户避役田土悉歸兼并之家近者雖令軍丁女户募人充役然每都不得過一名欲望均為五人俾得均濟詔付户部上以德鄰留心民事故有是賜焉三月癸巳朔上次丹陽縣韓世忠以親兵赴行在遂衛上如建康甲子上次鎮江府楊沂中以所部赴行在詔沂中總領彈壓車駕巡幸一行事務乙巳上發鎮江府乘馬而行晚次下蜀鎮上謂張浚等曰道中晴明因閲韓世忠背嵬軍馬極驍健事藝比往日益更精強浚等因論奏諸將才能不同大要在得士心則人肯用命上曰天時地利不如人和將帥能得士心則上下和輯樂為之用矣上次建康府賜百司休沐三日甲戌嶽飛朝辭丙子召提舉江州太平觀胡安國赴行在時安國上所纂春秋傳翰林學士朱震乞降詔嘉奬上曰安國明於春秋之學比諸儒所得尤邃向來偶緣留程瑀而出可令召來張浚曰若安國乃君子之過過於厚耳小人必須觀望求合豈肯咈旨上曰安國豈得為小人俟其來當置之講筵故有是命仍用金字遞行安國自言所著傳事按左氏義取公羊穀梁之精者大綱本孟子而微辭多以程氏之説為據凡三十年乃成上甚重之戊寅同知樞密院事沈與求進知院事庚辰行營前護副都統制王彥知邵州詔彥軍併隸權主管馬軍司公事劉錡於是錡始能成軍辛巳浙西安撫制置使兼知臨安吕頤浩兼行宫留守頤浩至臨安處事甚有緒豪右莫敢犯禁淮南西路兼太平州宣撫使劉光世為少保充萬壽觀使奉朝請封榮國公時光世入見再乞罷軍且以所管金穀百萬獻于朝乃以其兵屬都督府而有是命張浚因分光世所部為六軍令聽本府參謀軍事吕祉節制詔行在職事官令轉對一次是春廣西大飢斗米千錢桃李互實皆可食凡物多類此夏四月癸巳張浚奏雨既霑足又即晴霽庶於蠶麥不妨上曰朕宫中亦養蠶兩箔許欲知民間蠶熟與否浚等曰陛下敦本憂民如此天下幸甚上又曰朕聞祖宗時禁中有打麥殿今後圃有水朕亦令人引水灌畦種稻不惟務農重穀示王政所先亦欲知稼穡之艱難爾詔築太廟于建康以臨安府太廟充本府聖祖殿甲午鎮江府進士蔣將上書論十事詔永免文解乙未尚書吏部員外郎黃次山為荆湖南路提點刑獄公事次山引疾乞補外會給事中胡世將舉次山自代張浚因擬次山修注上曰非告訐董弅者耶此風不可長遂令補外浚意甚沮戊戌御批鄭諶帶御器械翌日上諭宰臣曰諶除命未須行朕宿思之昨召用徐俯外議謂諶所薦朕何嘗容內侍薦人止緣洪炎進黃庭堅文集有云徐郎或徐甥者後因胡直孺薦俯自代朕問之始知其人今諶新命又恐外間紛紛不若止與在外宫祠張浚等曰陛下聖慮如此敢不奉詔庚子右司諌王縉論江淮營田利害輔臣進呈上曰營田誠今日大利如兩淮間田不可數計但恐召募不行而奪見耕之農則為民害矣要須遲以歲月以漸為之第使耕種日廣便為大利丁未起復湖北京西宣撫使嶽飛乞解官持餘服飛與宰相張浚異論歸過江州上疏自言與宰相議不合求解帥事遂棄軍而廬墓上不許江南西路安撫制置大使兼知洪州李綱特遷左金紫光祿大夫時綱遣韓異奉表問上起居且上疏論時事略曰願陛下益廣聖志與神為謀日新其德勿以去冬驟勝而自怠勿以目前粗定而自安凡可以致中興之治者無不為凡可以害中興之功者無不去有所規畫措置必以天下為度必以施於長久可傳於後世為法則中興不難致矣夫中興之於用兵止是一事要以修政事信賞罰明是非别邪正招徠人材鼓作士氣愛惜民力順導衆心為先數者既備則士奮於朝農安於野穀粟充盈財用不匱將帥輯睦士卒樂戰用兵其有不勝者哉疏入詔綱典簿踰年民安盜息故有是命壬子張浚辭往太平州淮西視師沈與求奏劉光世嘗語人以陶朱公自比浚等論范蠡之賢人所難及上曰蠡固賢朕謂於君臣之義猶有所未盡也丙辰都官員外郎馮康國面對論蜀中漕運丁巳詔送都督府既而祕書省正字孫道夫轉對上諭曰召自逺方者朕必詢民間疾苦至如職事官轉對即以朝廷闕失訪之誠欲追法祖宗不特舉行故事為文具而已也卿蜀人宜知蜀中利害水運與陸運孰便道夫奏曰水運遲而省費陸運速而勞民上曰水運既便自當行之五月乙丑上與輔臣論淮西事因曰兵無不可用在主將得人耳趙奢用趙軍大破奏軍而趙括將之則大敗樂毅用燕兵攻齊而騎劫代之則為田單所敗豈不在主將得人乎丁卯詔江西制置大使李綱趣捕虔吉諸盜戊辰金部員外郎宋棐請詔中外臣僚採訪勇力權略之士不時薦舉以備采擇從之壬申詔禮官條具舉行文宣武成王熒惑壽星嶽瀆海鎮農蠶風雷雨師之祀張浚在廬州遣計有功赴行在前二日引對有功嘗獻所著晉鑒上曰朕乙夜觀之且為艱難之戒又面問著春秋防微之旨對曰婦笑於齊六卿分晉此書之所為作也上首肯之甲戌胡安國提舉萬壽觀兼侍讀疾速赴行在殿中侍御史石公揆奏今以詞賦經義取士而考校者患不能兼通升黜安能得實今歲科場望令諸路轉運司取經義詞賦兩等各差考官從之戊寅上謂秦檜等曰治天下須用恩威賞罰並行若有恩而無威有賞而無罰何以為治朕自即位以來未嘗以私怒降一人官所以言此者蓋姑息之風不可長也楊沂中朕嘗日撫綏之過於子弟去年淮西有警朕親筆戒之若不便進當行軍法沂中震恐承命遂以成功檜曰陛下英武如此中興不難致矣既而給事中兼直學士院胡世將請因北風厲諸將帥各務究心水利措置營田從之己卯廣西進出格馬上曰此幾似代北所生廣西亦有此馬則馬之良者不必西北可知上因論春秋列國不相通所用之馬皆取於國中而已申公巫臣使吳與其射御教吳乘車則是雖吳亦自有馬今必於産馬之地而求之則馬政不修故也詔禮部討論大火之祀先是行在多火災言者論國家實感炎德用宋建號康定間因古商邱作為壇兆以閼伯配大火之祭多事以來地陷賊境望詔有司即行在所每建辰戌出納之月設位望祭從之壬午賜四川都轉運使李逮詔書奬諭以其能裁抑冗濫以寬民力故也甲申詔以時暑行在所及行宫御史各一員慮諳獄囚諸路州軍令監司分詣初命學士院䇿試效士五十三人得陳壽昌等十人合格詔優等授官平等免文解一次餘皆賜帛罷之乙酉手詔自今內外臣僚薦士或不如所舉及罪當并案者必罰毋赦上以薦舉法壞甚者以子弟姻戚互相薦論至犯吏議則僥幸首免故條約焉尚書省言自來立法太重不能必行乃詔自今犯贓私罪者舉主遞降二等其以子弟親戚互薦者令臺臣察之監察御史趙渙乞侍從至職事官不限資序各舉才堪大縣者一人俟二三年之間按其治狀同其賞罰詔行在所侍從官限一月通舉二十人丁亥中書省言諸路監司除授依祖宗法即不避本貫詔如故事仍止避置司州己丑張浚奏論史事因言紹聖以舊史不公故再修而蔡卞不公又甚每時以褒貶之語以騁其愛憎今若不極天下之公則後人將又不信上曰謂之實録但當録其實而褒貶自見若附以愛憎之語豈謂之實録上又曰今日重修兩朝大典不可不慎浚曰敢不恭承聖訓庚寅張浚言臣先備員川陜宣撫處置使切見和靜處士尹焞緣叛臣劉豫父子迫以偽命焞自長安徒步趨蜀乞食問路僅獲生全臣嘗延請至司與之欵接觀其所學所養誠有大過人者紹興甲寅春被命還朝蓋嘗以焞姓名達之天聽今陛下博採羣議召置經筵而焞辭免新命未聞就道伏望特降睿旨令江州守臣疾速津遣初焞行至九江會諌官陳公輔請禁伊川學復辭曰學程氏者焞也浚乃顯言其學行請趣召之焞猶不至六月癸巳左司諌陳公輔入對面奏興復之䇿因言衆論謂南兵不可用上慨然曰赤壁之役曹操敗於周瑜淝水之戰符堅敗於謝元北人豈常勝哉越王勾踐卒敗吳王兵強諸國亦豈北方士馬邪乙未罷江淮營田司以淮東轉運判官蔣璨淮西轉運判官韓璡江東轉運副使俞俟兩浙轉運副使汪思溫並兼提領本路營田仍督責州縣當職官接續措置丙申御筆史館重修神宗皇帝實録尚有詳略失中去取未當恐不可垂信傳後宜令本館更加研考逐項貼説進入以俟親覽先是著作郎何掄乞刋正新録紕繆至是批出掄所言張浚意也戊戌詔四川制置大使司津遣隱士張大楫赴行在大楫龍水人隱居翠微巖知天象嘗倣唐制為蓋天圖謂可置之几案及備軍幕中候驗因為木式以獻乃詔大楫併賫所藏天文祕書赴行在壬寅詔胡安國纍上章引疾可與便郡以左司諌陳公輔等有言也乃以安國知永州戊申兵部尚書兼都督府參謀軍事吕祉往淮西撫諭諸軍祉初在建康每有平戎之志張浚大喜之浚以劉光世持不戰之論欲罷之參知政事張守以為不可浚不從守曰必欲改圖須得有紀律問望素高能服諸兵官之心者一人乃可浚曰正為有其人故欲易之也時祉亦自謂若專總一軍當生擒劉豫父子然後盡復故疆及光世罷乃命祉先往淮西直祕閣詹至聞之遺浚書曰吕尚書之賢固一時選然於此軍恩威曲折卯翼成就恐不得比前人兼此軍今已付之王德德雖有功而與酈瓊輩故等夷恐其下有不能平者願更擇褊裨素為軍中所親附者使為德副以通下情會祉還朝而瓊與其下八人列狀訟德于都督府且乞回避都督府謂德直寢不行瓊等又訟于御史臺德亦言瓊之過乃召德還建康以所部一軍隸都督府命祉往廬州節制之祉又辟準備差遣陳克自隨葉夢得與克厚謂之曰吕安老非馭將之才子高詩人非國士也淮西諸軍方互有紛紛之論是行也危矣哉弗聽祉克皆留其家乃單騎從軍詔以欽廉雍州去歲大水米踊貴令本路常平官蠲賦稅賑飢乏其公私欠負皆停之己酉皇叔同知大宗正司士㒟開府儀同三司士㒟嘗因對勸上留意恤民上曰朕以干戈未息不免時取於民如月樁之類欲罷未可一旦得遂休兵凡取於民者當悉除之時建康有積欠左藏庫錢帛乞免輸上曰建康兵火後遺民無幾朕何忍更取積逋耶可並除之因謂輔臣曰朕嘗語趙鼎宣和以前宰輔非其人費用無節誅求無藝四海之民困於科斂不得安業朕嗣位以來思與之休息又以邊事未靖軍費之資取辦於諸路者尚多斯民之災如此儻他日兵寢朕當一切蠲罷雖租賦之常亦除一二年朕之此心天地鬼神實照臨之張浚等曰陛下聖志如此天必助順民之休息固有期矣他日更在陛下選用大臣推行德意上曰然事亦在朕秦檜因論及唐太宗不能去封德彝上曰唐太宗用封德彞宇文士及朕常以為恨既知其姦佞猶信之不疑浚曰太宗所謂惡惡而不能去也丙辰尚書省請申命舉人程文許通用古今諸儒之説及自出己意但文理優長即為合格從之乙卯執政進呈左朝奉大夫蒲贄乞駐蹕江陵上曰荆南形勝自古吳蜀必爭之地宜諭王庶益濬治城塹招徠流移練兵積粟為悠久之計張浚曰庶在荆南頗有治行上曰蜀中多士幾與三吳不殊近日上殿如李良臣蒲贄極不易得因論士人各隨所習如蜀中之士多學蘇軾父子江西之士多學黃庭堅浚等曰大抵耳目所接師友淵源必有所自贄閬中人浚在閬州引為主管機宜文字後六日遂以贄行尚書兵部員外郎丁巳吏部尚書孫近引疾乞奉祠張守曰聞近信命甚篤以為自此當有災咎亟求去位上曰君相之命固不當言命矧近時日者尤不足信朕未常聞也七月乙丑知虔州張觷條上措置盜賊事件張浚等言觷有才必有措置秦檜曰觷向知南劒州能平賊甚有功而言者以為多殺平人毁譽是非不公如此上曰大凡人為血氣所使而愛憎移之所以毁譽是非不公在上察之耳浚曰士大夫少學故如此孔子許顔回為王佐蓋惟不遷怒不二過者可以為天下國家也上曰孔子所許顔回一人而已可知其難士大夫少時為血氣所使而輕任喜怒更事既多若能知悔則亦少纍朕為親王時或因事輕用喜怒至今不能忘常自悔責史臣曰人君過失與常人不同天下臣民惟以順君為義莫或拂之而亦莫或回之惟上聖卓然特立異於常情乃能自反爾故以過為失諱者常千萬文過以自安者常十百悔過而能自反者才千一也丙寅祕書郎張戒提舉福建路茶事上因論館中人材以為戒好資質而未更事任可令在外作一任復召用之戒聞請補外後二日上謂輔臣曰士大夫須更歷外任不必須在朝廷若既練達而止令在外則又不盡用材之道陳與義進曰前日陛下惜張戒人材除外任以養成之聖意甚美上曰中書省可籍記他日復召用丁卯起復湖北京西宣撫使嶽飛遣屬官王敏求來奏事初飛請解官上命參議官李若虛統制官王貴詣江州敦請飛依舊管軍如違並行軍法若虛等至東林寺見飛具道朝廷之意飛堅執不肯出若虛曰相公欲反邪相公河北一農夫耳受天子之委任付以兵柄相公謂可與朝廷相抗乎公若堅執不從若虛等受刑而死何負於公凡六日飛乃受詔赴行在張浚見飛具道上所以眷遇之意且責其不俟報棄軍而廬墓飛詞窮曰奈何浚曰待罪可也飛然之遂具表待罪上慰遣之將行上謂飛曰卿前日奏陳輕率朕實不怒卿若怒卿則必有行遣太祖所謂犯吾法者惟有劒耳所以復令卿典軍任卿以恢復之事者可以知朕無怒卿之意也飛得上語意乃安至是遣敏求奏事委曲感恩云非官家保全何以有今日翌日上以其語諭輔臣秦檜見飛舉趾已有忿忿之意矣壬申張浚以旱乞率從官祈雨又乞弛役慮囚算數事因奏如浙西諸郡及宣州廣德軍地形下禾覺旱如鎮江建康地形高最覺少雨上曰朕患不知四方水旱之實宫中種兩區稻其一地下其一地高昨日親閲之地高者其苗有稿意矣須精加祈求庶幾數日得雨也時方盛暑浚一日坐東閣參知政事張守突入執浚手曰守嚮言秦舊有德聲今與同列徐考其人似與昔異晚節不免有患失心是將為天下深憂蓋樞密使秦檜浚以為然徽猷閣待制邵溥上其父伯溫所著辨誣三卷上曰事之紛紛止緣士刑恕耳數十年來士大夫相攻詆幾分為國幾分為民皆由私意託公以遂其事宣仁之謗今已明白紛紛之議可止矣嗣濮王仲湜薨仲湜酷好珊瑚大者一株至數百千上嘗問仲湜墜地則何如曰墜地則碎矣上曰以民膏血易此無用之物朕所不忍也仲湜無以對戊寅史館校勘張嵲面對先是有詔刋修神宗新録訛謬校勘李彌正胡珵見張浚辭史職既而嵲對罷申後省以所得聖語云范沖任申先止憑校勘官便以為是故實録多舛誤彌正珵再辭史職從之辛巳張浚等奏禱雨備至未獲感應上曰應天須以實如恤刑弛役之類當更有實惠可及民者朕曉夜思之如積欠一事為民之害甚大比因移蹕所過州縣下蠲除之令民間極喜可將諸路紹興五年以前稅賦積欠及其他逋負議蠲之庶幾少蘇民力浚等退而條具悉施行焉金晉國王宗維卒癸未手詔臣民各許實封言事在外令附驛以聞旱故也宰臣張浚樞密使秦檜已下引咎乞罷黜詔曰亢陽未雨憂心如熏咎在一人非卿等罪各安乃位勿復陳詞夙夜勉旃以輔台德簡州教授黃源應詔上書言中興之主當與創業同創業當視藝祖其大計大議取謀於宰相則趙普等是也大勳大烈責成於大將則曹彬等是也內則講修政事為萬世計外則削平僣偽為一統計今陛下中興十有一年政事則講修不逮僣偽則削平不果何也無乃隆主勢以論一相威嚴斷以馭大將作威作福直與藝祖不同故邪因條六事一曰躬一德以享天心二曰正東宫以嗣國統三曰勵宗親以䇿勳勞四曰厚禁旅以鞏宸極五曰連秦夏以臨三晉六曰由淮甸以傾全齊甲申蠲諸路民户紹興五年以前欠租上旨也坊場淨利五年正月以前所負亦除之建康府居民貧病者畀之藥死者助其葬丁亥詔今後士民陳獻利害令給舍子細看詳其可採者取旨施行八月壬辰張浚奏探報偽齊簽軍自六十以上則減之十五以上則增之科調之煩民不堪命出軍之際自經於溝瀆者不可勝計上蹙然歎息曰朕之赤子至於如此當思有以拯救之可諭江淮諸郡凡歸附者加意撫納厚與賙恤勿令失所以稱朕意乙未江南東路宣撫使張俊為淮南西路宣撫使盱𣅿軍置司主管殿前司公事楊沂中為淮南西路制置使權主管侍衛馬軍司公事劉錡為淮南西路制置副使並廬州置司時吕祉至廬州而酈瓊等復訟王德于祉祉諭之曰若以君等為是則大相誑然張丞相但喜人向前儻能立功雖有大過彼亦能濶略況此小嫌疑乎於是密奏乞罷瓊及統制官靳賽兵權乃命二帥往淮西召瓊等還行在丁酉左從事郎朱松特改宣教郎為祕書省校書郎松熹之父也以薦得召見時已用張浚䇿進次建康指授諸將計日大舉以復中原松欲堅上志即奏言陛下當抗志於高明而輔以睿智日躋之學垂精延訪早夜汲汲以求宗廟社稷經遠持久之計申明紀律崇奬節義而又以民心為基本忠良為腹心則恢復大功指日可冀矣因論自古中興之君惟漢之光武勤勞不怠身濟大業可以為法晉之元帝唐之肅宗志趣卑近功烈不終可以為戒又言宜鑒既往之失深以明人倫勵名節為先務而又博求魁磊骨鯁純正不回之士置之朝廷使之平居無事正色立朝則姦萌逆節銷伏於冥冥之中一朝有緩急則奮不顧身以抗大難亦足以禦危辱凌暴之侮庶幾乎神器尊嚴而基祚強固矣蓋松深病夫士溺於俗學不明於君臣之大義是以處於成敗之間者常有茍生自恕之心而闕於舍生取義之節將使三綱淪墜而有國家者無所恃以為安而發為是言上深悅之諭輔臣曰光武固無可議若元帝僅能保區區之江左略無規取中原之心肅宗惑於張后李輔國之讒而虧人子之行此其可戒也四川制置大使席益復與都轉運使李逮有違言交訴于上詔令學士院賜詔戒諭戊戌張浚進呈知荆南府王庶復徽猷閣直學士上曰庶嘗云今天下不可専用姑息要當以誅殺為先謂朕太慈聞仁宗皇帝嘗云寧失之太慈不可失之太察此祖宗之明訓也今百姓犯罪自有常法何以誅殺為先乎浚等曰聖人三寶一曰慈未聞以慈為戒也酈瓊叛執兵部尚書吕祉祉簡倨自處將士之情不達淮西轉運判官韓璡舊在劉光世幕中光世待之不以禮至是諸校或以罪去祉之乞罷瓊與靳賽也其書吏朱照漏語於瓊瓊令人遮置郵盡得祉所言軍兵之罪瓊等大怨怒前一日被旨易置分屯康淵曰歸事中原則安矣詰朝諸將晨謁祉坐定瓊袖出文書示中軍統制官張景曰諸兵官有何罪張統制乃以如許事聞之朝廷邪祉見之大驚欲退走不及為瓊所執瓊遂以所部四萬人渡淮降劉豫壬寅張浚見上引咎上曰失三萬人不繫國安危譬猶臨陳折傷亦是常事卿等不可以此介意當益鎮安人心激厲士氣以為後圖浚曰臣非才誤國上貽聖慮今聖志先定臣復何憂敢不黽勉以圖報效是日吕祉為酈瓊所殺先一日瓊與其衆擁祉次三塔距淮僅三十里下馬立棗林下謂曰劉豫逆臣我豈可見之衆逼祉上馬祉罵曰死則死此爾等過去亦豈可保也軍士聞之有傷感咨嗟者瓊恐搖衆心乃急䇿馬先渡淮至霍丘縣令統領官尚世元殺祉世元以刃刺祉且顧統領官王師晟師晟不肯祉罵瓊不已遂碎首折齒而死甲辰御筆兩浙東路安撫制置大使兼知紹興府趙鼎充萬壽觀使兼侍讀疾速赴行在是日張浚留身求去位上問可代者浚不對上曰秦檜何如浚曰近與共事始知其暗上曰然則用趙鼎遂令浚擬批召鼎檜謂必薦已退至都堂就浚語良久上遣人趣進所擬文字檜錯愕而出浚始引檜共政既同朝乃覺其包藏顧望故上問及之詔新除崇政殿説書尹焞疾速赴行在以焞再辭除命故也丁未張浚論淮西地勢險阻可以固守陳與義曰見王德呈淮西圖道路幾不可方軌上曰地形雖險亦在將兵者如何耳李左車謂井陘之道車不得方軌騎不得成列韓信卒由井陘口以破趙軍要是險阻不足恃也戊申權禮部侍郎吳表臣言比年科舉校藝詩賦稍優不復計䇿論之精粗以致老成實學之士不能無遺落之嘆欲望特降睿旨今之秋試及將來省闈其程文並須三場參考庶幾四方學者不徒事於空文皆有可用之實輔臣進呈上曰文學政事自是兩科詩賦止是文詞䇿論則須通古今所貴於學者修身齊家治國以治天下專取文詞亦復何用癸丑贈吕祉資政殿大學士時有得祉括髮之帛歸吳中者其淑人吳氏持之自盡以徇葬聞者傷之甲寅中書言命官犯贓抵死祖宗之時間有杖脊刺面係一時酌情斷遣近來刑部引為常例甚非朝廷欽恤之意詔自今似此案狀令刑部更不坐例止由朝廷酌情斷遣自是贓吏不復黥配矣乙卯御史中丞周祕入對論右僕射張浚輕而無謀愚而自用德不足以服人而惟恃其權誠不足以用衆而專任其數雖本無疑二者皆使有疑二之心雖本無怨望者皆使有怨望之意故酈瓊以此懷疑而叛願早正其誤國之罪以為後來之戒丙辰殿中侍御史石公揆入對論張浚罪是月諸路大旱江湖淮浙被害甚廣江西制置大使李綱獻言乞修政事以救今日之弊大略以謂前年江湖閩浙嘗苦大旱陛下親灑宸翰勸誘賑濟至誠感天報以休應嵗大豐穰民以安樂自經一稔之後上下恬嬉不復勤恤民隱朝廷百色誅求上供不以官數而以虛額和糴不以本錢而以關子絲𧖟未生已督供輸禾穀未秀已催裝發州縣困於轉輸文移急於星火官吏愁嘆閭里怨咨感動天心旱災復作然則陛下欲銷彌災異導迎吉祥不必他求但如前日之用心自然感召和氣休應立臻繼旱暵復為豐年矣今日之患欲民力寬則軍食闕矣欲軍食足則民力乏矣非有術以權之使斂不及民而軍食足不可得而均也惟陛下留神邦本天下幸甚九月辛酉申命吏部審量崇觀以來濫賞初范宗尹既免相遂罷討論及是復開生二十四項自是追奪者復衆矣左正言李誼論張浚望收還政柄置之間慢乙丑御史中丞周祕入對言近上殿論宰相張浚失謀誤國乞正其罪未蒙付外施行臣謹托所聞為陛下言其二十罪雖未足以盡浚之所為而不達軍情不恤民力不用善言不畏公議所以至於敗事者實皆由此今猶強顔廟堂之上以淮西之變為細事以吕祉之死為竒節尚欲文飾其過以欺聖明此亦可謂無恥矣望將浚前後罪狀明正典刑以為人臣誤國之戒浚聞復求去自是不復入對矣丁卯京東淮東宣撫處置使韓世忠淮西宣撫使張俊皆入見議移屯秦檜曰臣嘗語世忠俊主上倚兩大將譬如兩虎固當各守藩籬使冦盜不敢近上曰此諭猶未切政如左右手豈可一手不盡力也乃命俊將所部自盱眙軍移屯廬州辛未江西制置大使兼知洪州李綱奏疏論淮西兵叛因勸上以兼聽上深以為然令學士院賜詔奬諭時綱疏所陳朝廷措置失當者五深可嘆惜者五及鑒前失以圖將來者五且言天地之變不足為災人不盡言國之大患侍從者獻納論思之官也臺諌者耳目心腹之寄也今侍從臺諌以言為職類皆毛舉細故以塞責至於國家大計係社稷之安危生靈之休戚者初未嘗聞有一言及之陛下試察如淮西之變侍從臺諌之臣亦有見危納忠為陛下言之者乎大臣懷祿而不敢諌小臣畏罪而不敢言此最今日之可憂者又以書遺張浚言自今春閣下專任大政以來薦進人才調護將帥措置邊防均理財用皆未卓然有以慰天下之心者聲譽損於前時規模爽於舊説中興氣象邈未有期不知何為而然也且以近日淮西叛將事觀之官吏軍民二十餘萬相率而北去將佐遇害者甚衆閣下平日信任以為可屬大事如吕祉者被執以往挫威辱國中外震驚於誰責而可乎今有人力足以舉百鈞而益之以萬鈞則力必不勝矣然有可任之理者與人共之也今閣下以一人兼將相之權總中外之任而無與人共功名之心軟美者進鯁諒者疏逆耳苦口之言不聞曲突徙薪之謀不至變生所忽不足怪也若因淮西之變痛自懲創輯睦將帥博詢衆謀惟其是之為從幡然改圖則未必不轉禍而為福也安危休戚與國家及閣下同之和靖處士尹焞言誤蒙召命已及國門癃老廢疾委實可矜伏望敷奏許之自便輔臣進呈上曰尹焞可謂恬退矣辭免之奏至十數上而未止可降旨不允初以旱故求直言而太學生有應詔上書論兵事者且言以淮西一事論之去嵗劉豫力攻淮西劉光世遂欲南渡為退保之計光世之罪天下共欲誅之酈瓊等兵馬平日驕墮終不為用天下之事有大於此者乎古中興之世則必有中興之臣臣觀張浚區區之心實有是念惜乎才力有限舉非其人浚之孤立無一介為助者為陛下自任以天下之責此亦今日之所難矣臣願陛下召諸大臣盡赴行在拜張浚為大都督陛下親御戰馬往來問勞庶使蕃偽之情不能探伺臣聞張俊一軍號曰自在軍平居無事未嘗閲習惟韓世忠嶽飛兩軍人馬整肅願陛下速置諸路都督以通上下之情無使諸軍復有淮西之禍也壬申特進守尚書右僕射同中書門下平章事兼樞密使都督諸路軍馬監修國史張浚罷為提舉江州太平觀浚為相凡三年給事中直學士院胡世將試尚書兵部侍郎先是趙鼎言臣蒙恩召還經惟方再辭而復遣使宣押臣無地措足然先事言之則不敢昧蓋進退人才乃其職分今之清議所與如劉大中胡寅吕本中常同林季仲之徒陛下能用之乎妬賢黨惡如趙霈胡世將周祕陳公輔陛下能去之乎陛下於此或難則臣何敢措其手也疏入上為徙世將於是公輔等相繼補外癸酉湖北京西宣撫使嶽飛言近傳淮西軍馬潰叛於國計未有所損不足上軫淵衷臣願提全軍進屯淮甸萬一蕃偽窺伺臣當竭力奮擊期於破滅詔奬之右司諌王縉請對乞留張浚不從甲戌張浚落職依舊宫觀浚既罷相而御史中丞周祕復論浚望削奪官職重賜竄責以為大臣專權誤國之戒殿中侍御史石公揆亦論浚罪請投之逺方故有是命乙亥大理少卿薛仁輔乞天下獄有半年未決者委提點刑獄親問一年未決者具因依申省張守等奏纍降旨催諸路決獄不得淹繫若如仁輔所奏則許及半年或一年矣上以為然且曰獄重事也朕自即位以來未嘗送一人入獄淮西宣撫使張俊言軍中營寨未辦張守乞增支錢上因論財用皆出民力若如此之費實不可已茍可已者須極愛惜張俊嘗奏軍中費却陛下無限錢糧朕語之朕何嘗有一錢與卿此皆百姓膏血也卿知百姓膏血不可窮竭務與朝廷為一體則中興之功不難致矣丙子萬夀觀使兼侍讀趙鼎守尚書左僕射同中書門下平章事兼樞密使前一日鼎至行在上召對于內殿首論淮西事鼎曰臣愚慮不在淮西恐諸將竊議因謂罷劉光世不當遂有斯變自此驕縱益難號令朝廷不可自沮為人所窺上以為然丁丑上問趙鼎防秋大計鼎曰淮西雖空闕當以壯根本為先務又問去留如何鼎曰來已失之遽去不可復爾今國威少挫須勉強自振上以為然且曰初聞淮西之報未嘗輒動執政奏事皆皇懼失措反求以安慰之鼎曰正須如此見諸將尤須安靖使之罔測不然益增其驕蹇之心矣仍以控制之事專責之二將曰光世之兵本不為用我之所賴惟汝二人彼必感陛下倚任之重且不敢以朝廷為弱也前此大臣曽以此啓否上曰彼皆倉皇無地措足何暇及此戊寅御書羊祜傳賜樞密使秦檜辛巳合祀天地于明堂太祖太宗並配張俊至行在特詔俊赴大禮侍祠召劉光世高世則赴行在權禮部侍郎陳公輔言光世之召乃因大將之言如是則朝廷威令可否皆在諸將今後大將有過何以處之張浚之罷幾於助將帥而罷宰相何倒置之甚耶乙酉張子儀監登聞鼓院未上改軍器監丞大將子孫除職事官始此交趾郡王李陽煥薨子天祚立丙戌李處廉除名新州編管處廉知永嘉縣坐以官錢雕伊川集板及印造與人并他贓當絞特貸死籍其資自是以為例丁亥中書言川陜宣撫副史吳玠於梁洋勸誘軍民營田今夏二麥并約秋成所收近二十萬石可省饋餉詔奬之戊子權主管侍衛馬軍司公事劉錡知廬州主管淮南西路安撫司公事仍兼制置副使張俊既還行在朝議復遣之趙鼎顯言於衆曰今行朝握精兵十餘萬何至自擾擾如此儻有他虞吾當身任其責俊軍還未閲月乃遽使之復出不保其無潰亂也起居舍人勾濤因薦錡以所部屯合淝上從之時淮西制置副使楊沂中亦已還行在在淮西者錡一軍而已劉豫使乞兵于金主亶且請用酈瓊為鄉導併力南下亶陽許之遣使馳詣汴京以防瓊詐降為名立散其衆先是王倫奉使至歸德府豫遲之不遣彌旬迓使至倫始渡河見魯王昌瀋王宗弼于涿州具言劉齊營私民怨之狀時金人已定議廢豫頗納其言冬十月庚寅上謂大臣曰向緣亢旱詔求直言自是上書者甚多雖經親覽猶恐未能詳究利病可令後省官子細看詳有可採者中書條上取旨行之庶詔令不為虛文詔依舊間日一開講筵用右正言李誼奏也先是陳公輔建議以為上日臨講筵有妨退朝居喪之制乞令講讀官供進口義誼奏真宗嗣位首命崔頤正講尚書英宗嗣位司馬光首請開講筵是祖宗三年之制未嘗廢學也從之壬辰周禧入對論張浚罪乞更賜貶責丁酉新知永州胡安國提舉江州太平觀從所請也趙鼎進呈因言安國昨進春秋解必嘗經聖覽上曰安國所解朕置之座右雖間用傳注頗能發明經旨朕喜春秋之學率二十四日讀一過居常禁中亦自有日課早朝退省閲臣僚上殿章疏食後讀春秋史記晚食後閲內外章奏夜讀尚書率以二鼓罷鼎曰陛下聖學如此非異代帝王所及上曰頃陳公輔嘗諌朕學書謂字畫不必甚留意朕以謂人之常情必有所好或喜田獵或嗜酒色以至其他玩好皆足以蠱惑性情廢時亂日朕自以學書賢於他好然亦不至廢事也戊戌提舉江州太平觀張浚責授祕書少監分司南京永州居住先是趙鼎奏欲降一詔以安淮西軍民上曰當以罪己之意播告天下俟行遣張浚畢降詔鼎曰浚已落職上曰浚誤朕極多理宜逺竄鼎曰浚母老且有勤王大功上曰勤王固已賞之為相也功過自不相掩於是臺諌周祕等論浚罪未巳石公揆李誼相繼論列祕對後四日夜降祕等各兩章後批浚散官安置嶺表至是鼎封起未即行翌日至漏舍約諸人救解鼎奏曰外頗傳播以謂浚之出皆諸將之意今又如此行外間益疑矣上曰若宰相出入由於諸將即唐末五代之風今幸未至此鼎曰今謫浚雖非諸將之言亦少快諸將之意矣上曰此不恤也樞密使秦檜奏曰臣等前日不敢言今日却當言參知政事張守曰浚為陛下捍兩淮宣力勤勞前此罷劉光世正以其衆烏合不為用今其驗矣羣臣從而媒孽其短臣恐後之繼者必指浚為鑒孰肯身任陛下事乎上顧而不答鼎又曰浚有老母今過嶺必不能將母陛下忍使其子母為死别乎上猶未解鼎又留身再懇曰浚之罪不過失䇿耳凡人計謀欲施之豈不思慮亦安能保其萬全儻因其一失便置之死地後雖有竒謀妙算誰敢獻之此事利害自關朝廷非獨私浚也上意解鼎朝退召勾龍如淵馮康國馮楫至都堂曰上憐德逺母老有復辟功決不逺謫無過嶺之患諸君速以書報上意三人退鼎又目之曰鼎不負德遠德遠負鼎又翊日乃有是命鼎之初相也上謂曰卿既還相位見任執政去留惟卿鼎曰秦檜不可令去浚既貶張守陳與義乞罷上皆許之檜亦留身求解機務上曰趙鼎與卿相知可以少安檜退至殿廬起身向鼎謂曰檜得相公如此更不敢言去江西制置大使李綱上疏言臣切見張浚罷相言者引漢武誅王壅事以為比臣恐智謀之士卷舌而不敢談兵忠義之士扼腕而無所發憤將士解體而不用命州郡望風而無堅城陛下將誰與立國哉夫張浚措置失當誠有罪矣然其區區徇國之心有可矜者願少寬假以責來效庚子都官員外郎馮康國乞補外趙鼎奏自張浚罷黜蜀中士大夫皆不自安今留行在所幾十餘人往往一時遴選臣恐臺諌以浚里黨或有論列望陛下垂察上曰朝廷用人止當論才不才頃臺諌好以朋黨罪士大夫如罷一宰相則凡所薦引不問才否一時罷黜此乃朝廷使之為朋黨非所以愛惜人才而厚風俗也鼎等頓首謝壬寅祕書省正字胡珵李彌正復兼史館校勘趙鼎因奏事議及改修神宗實録上曰止修訛謬非有所改也鼎曰所降御筆如此上曰乃宰相擬定者鼎曰起居注載著作郎張嵲所得聖語亦然上駭曰安得有此即詔嵲所記勿存留鼎乃知是事本非上意鼎又曰臣去國半載今觀聖意稍異前日上曰尋常造膝每以孝悌之説相搖撼其實紹述之謀也鼎曰秦檜莫有此論上曰無之自卿去惟朱震不改其舊鼎曰臣觀持中論者皆惑聖聰乃是沮善之術故以為不可太分當兼收並用則得人之路廣臣謂君子小人並進何以為治與其多得小人寧若少得君子之為愈也蓋分善惡惟恐不嚴稍寬則落其姦便君子於小人常恕小人於君子不恕也上復以為然乃詔昨令史館官再加研考新修神宗實録止緣曽統所進本脫落不全又九卷不載舊史理宜修整别無同異之嫌元校勘官胡珵李彌正可依舊校勘癸卯上曰昨布衣賴好古上書論虔賊事頗有理趙鼎奏大意以招安為非陳與義曰招安討殺不可偏廢上曰用兵則不免害及良民止當誅其首惡餘悉縱之乃善初京東淮東宣撫處置使韓世忠遣親校溫濟來奏事且圖上淮陽形勢言賊並淮陽增築堡障欲遣偏師平之上戒濟曰歸語汝帥當出萬全不宜輕動以貽後悔濟既稟命復要他日將士之賞上曰有功須要賞但須核實然後有功者勸世忠既以狀來上則朝廷不欲違其意但攻淮陽賞一萬七千餘人人不以為當也濟恐悚奉詔辛亥權主管殿前司公事楊沂中乞以諸路所起禁軍弓弩手揀刺上四軍趙鼎等因論及南兵可教張守曰止是格尺不及耳上曰人猶馬也人之有力馬之能行皆不在軀幹之大小故兵無南北顧所以用之如何耳自春秋之時申公巫臣通吳於上國遂霸諸侯項羽以江東子弟八千橫行天下以至周瑜之敗曹操謝元之破符堅皆南兵也甲寅直祕閣詹大和知江州仍趣之任趙鼎進呈除目因言士人有不可為郡守而必欲得之者往往不肯就宫祠上曰爾則不肯其如一方赤子何鼎對而歎曰大哉帝王之言也乙卯上曰昨降出劉瑜書論十事皆民間疾苦可擇其當行者行之趙鼎等曰所論皆善然法令已詳密當申嚴行下上曰若申嚴未必濟事須去其不便於民者謂如向來浙右困於水腳錢其後造成綱船遂免此患瑜以布衣應詔言事上納用之丁巳詔遇六參日輪行在百官一員轉對右正言李誼奏昨扈從臣僚不多止令輪對一次今已輪遍數月矣望準建隆天聖故事日輪一員俟百官俱集則依舊制故有是旨閏十月辛酉知廣州連南夫條上市舶之弊上曰市舶之利最厚若措置合宜所得動以萬計豈不勝取之於民朕所以留意於此庶幾可以少寬民力耳癸亥左正言辛次膺論士大夫營私不任事之弊詔榜朝堂時趙鼎再相已踰月未有所施設朝士或以此責之鼎曰今日事如久病虛弱之人再有所傷元氣必耗惟當靜以鎮之若作措置煥然一新此起死之術也張德遠非不欲有為而其效如此亦足以戒矣趙鼎奏張俊措置河道事上曰俊每事必親臨所以有濟上因言朕每論將帥須責其挽弓騎馬人未知朕意必謂古有文能附衆武能威敵不在弓馬之間抑不知不能弓馬何以親臨行陳而率三軍使之赴難況今時艱將帥宜先士卒此朕之深意也乙丑上諭大臣曰川陜茶當專以博馬聞吳璘軍前尚或以博馬價珠及紅髮之屬艱難之際戰馬為急可劄下約束丙寅左宣教郎尹焞為祕書郎兼崇政殿説書焞及國門稱疾未巳上趣起之既而焞入見遂就職焞每當講前夕必齋戒沐浴或問之曰欲以所言感悟人君安得不敬焞時年六十七矣焞既至經筵數日即乞致仕翌日趙鼎言焞有山林志不樂居此願陛下以禮留之因加賜賚焞乃止其後有言於上者乃謂其徒相與造謀欲朝廷見留以為高云己巳上謂大臣曰朕思今日安民之要無過擇監司郡守而已其間或有不材之人奈一方赤子何可降旨令侍從官不限員數舉可以為監司郡守者中書置籍遇有闕卿等共議差填朕亦當書之屏風置諸左右以時揭貼見在已差人不任職而無他過與自陳宫觀公議亦必以為是上又曰謬吏之害民甚於贓吏贓吏一身取錢爾謬吏為州則一州之胥吏皆取錢為縣則一縣之胥吏皆取錢其害民豈不甚於贓吏也秦檜曰向令內外侍從舉知縣而有互舉其子者其子又皆貪贓上曰侍從官朕之所取信也而其任私欺謾如此朕當時不知若知之當竄之嶺表庚午詔侍從官各選可為監司郡守之人不限員數具名以聞務令實惠及民不為文具辛未詔堂除吏部窠闕並依去年十二月丙午指揮已前舊制施行自張浚獨相欲革內重外輕之弊乃詔郎官館職二年並補外又取寺監丞以下至外州學官送部者百闕而取知縣堂除者四十處未幾郎曹館職請外者衆終不克行至是又復其故焉詔史館見修徽宗皇帝日厯以實録為名庚辰韓世忠乞統制官許世安功賞上曰世安雖勇果不及呼延通等而平穩曉事過之平居議論多有補於世忠上於諸將偏裨其才性短長亦照臨無遺如此辛巳江南西路安撫制置大使兼知洪州李綱提舉臨安府洞霄宫時趙鼎奏檜已協議回蹕臨安綱聞之上疏諌大略謂自昔用兵以成大業者必先固人心作士氣據地利而不肯先退盡人事而不肯先屈是以楚漢相距於滎陽成臯間高祖雖屢敗不退尺寸之地既割鴻溝羽引而東遂有垓下之亡曹操袁紹戰於官渡操雖兵弱糧乏荀彧止其退師既焚紹輜重紹引而歸遂喪河北由是觀之今日之事豈可因一叛將之故望風怯敵遽自退屈果出此謀恐六飛回馭之後人情動搖莫有固志士氣銷縮莫有鬭心我退彼進使賊馬南渡得一邑則守一邑得一州則守一州得一路則守一路亂臣賊子黠吏姦氓從而附之虎踞鴟張雖欲如前日返駕還轅復立朝廷於荆棘瓦礫之中不可得也既而具防冬畫一事件言之遂忤當路意時江西大旱而綱課民修城民不以為便侍御史石公揆因劾綱妄自尊大肆行煩擾殿中侍御史金安節左正言李誼右正言辛次膺亦論綱困苦士民毒流一路乞賜黜責三省乃檢會綱纍乞宫祠奏章行下未有代者綱懲靖康之謗乃且以本司積蓄錢穀之數聞于朝自是不復出矣壬午趙鼎等奏𣙜貨務出賣度牒而逺方不能就買欲量付諸路上曰如此則州縣將科敷於百姓矣鼎等奏不責以限數則無科敷之弊上曰宜嚴為約束毋使民受其患户部侍郎王俁乞令從官所舉監司郡守必取曽經治縣聲績顯著之人從之戊子詔應淮西脫歸使臣不候整會去失並先次支破本等請給如有冒濫即坐如法初淮西軍中諸使臣為酈瓊劫去至是復歸者甚衆有司以文劵不明例降所給趙鼎密白于上曰此曹去偽歸正當優假之今乃降其所請反使棲棲有不足之歎上即批出各還其本等於是人心欣然來者相繼十有一月甲午用户部尚書章誼請置贍軍酒庫於行在其後歲收息錢五十萬緡淮西宣撫使張俊入見為上言劉光世罷軍政間居自有登仙之嘆上不樂謂俊曰卿初見朕何官曰副使是時家資如何曰貧甚從陛下求戰袍以禦寒上曰今日貴極富溢何所自耶曰皆陛下所賜上曰然則卿宜思所以自效而有羡於光世何耶俊皇恐謝甲申川陜宣撫副使吳玠遣使臣吕政求犒軍物上召政諭之曰歸語吳玠玠自小官拔擢至此皆出於朕非由張浚也大丈夫當自結主知何必附託大臣而後進所須犒軍物已支百五十萬緡非因浚進退有所厚薄也宜以此諭之丁酉執政擬臨安火禁條約凡縱火者從軍法遺火延燒數多者罪亦如之上曰遺火豈可與縱火同罪且立法太重往往不能行趙鼎曰遺火數多者取旨可也上曰止於徒足矣庶可以必行兼刑罰太重亦非朝廷美事戊戌江東宣撫司幹辦公事王漻上六朝進取事類詔與升擢差遣庚子四川安撫制置大使席益以母朱氏憂去官壬寅上謂大臣曰張俊事上御下慮事臨敵皆不易得獨好廣邸地營土木朕數鐫諭莫能改也比因其入對靣諭以朕來建康行宫皆因張浚所修朕不允葺數間小屋為燕居及宫人寢處之地當與卿觀之初不施丹雘蓋不欲勞人費財也俊曰略加粉飾不過二三千緡朕語以國用艱窘之時以二三千緡崇土木之飾亦所不忍也俊感嘆而去乙巳金右副元帥宗弼執偽齊尚書左丞相劉麟于武城於是尚書省上豫治國無狀金主亶下詔責數之略曰建爾一邦逮兹八稔尚勤吾戍安用國為寧負而君無滋民患丙午詔潯州編管內侍李絪留滯衢撫州踰年不去令兩路憲臣體訪押赴貶所趙鼎曰陛下於近習不少假貸如此上曰小事便須繩治無使滋長童貫梁師成豈是一日至此要在不可假以事權爾是日金人廢劉豫為蜀王囚于金明池龜鑑曰方逆豫之陸梁也羣盜縱橫蹂踐京汴凶雛狂悖子麟姪倪擾動江淮其鋒不易當也李橫之謀復東京而豫之氣已折嶽飛之收復襄陽而豫之鋒已摧內有趙鼎贊親征之謀外有張浚董督師之事張韓劉嶽又從而諸道進兵自是而凶酋授首強敵悔禍六年而廢豫之謀定金人廢豫自麟猊敗之後廢豫為庶人而廢建炎四年僣偽至紹興七年敗走凡八年而後平云己酉殿中侍御史金安節言諸路和糴米收耗太多上曰郡守當痛與懲戒趙鼎等奏江東郡守有掊斂不恤民者上曰郡守以字民為職掊斂不恤朕何賴焉當悉罷與宫觀選除循吏如周綱陳槖之流使罷者不失宫觀之祿而民被實惠實為兩得上論諸軍使臣猥多嵗增俸廩因曰大將奏功率以所愛𥚹裨多轉官資而出戰士卒往往不及不惟無以勸有功兼亦蠧國用朕嘗謂行賞當先自下行罰當先自上鼎曰聖慮高逺豈諸將可及庚戌初修武郎朱辨既為金人所拘遣李發歸報尼堪等相繼死亡上曰藝祖皇帝兵不血刃而得天下故福祚悠逺自古帝王未聞窮兵黷武而能長久者金人連破大國而兵弗戢不亡何待來春當極力經理中原辛亥右迪功郎李時雨獻玉壘忠書三十篇詔特徇二資壬子樞密院計議官吕稽中司農寺丞蓋諒並罷二人皆為都督府官屬故侍御史石公揆論之趙鼎等開陳稽中諒之為人上曰用人不須太速須使名實加於上下然後無異論賢士大夫衆所未知驟加拔擢一遭點汚則為終身之纍非所以愛惜人才也丙辰上與大臣言嗣濮王仲湜酷好珊瑚趙鼎因言頃到蔡行家見其奢麗可駭如卧榻亦以滴粉銷金等為飾上曰朕頃在藩邸猶用黑漆床渡江以來止用白木上施蒲薦素黃羅為褥素黃羅被三條而已睡後豈復知有華好也新知台州秦梓主管台州崇道觀先是殿中侍御史金安節論梓人品凡下附麗匪人討論之法獨不行於梓郡守民之師帥風化所係而梓之所履如此難以望其化民成俗矣疏入不報安節又言近降聖旨欲實惠及民不為文具臣之區區必欲罷梓所授者蓋欲使郡守之選自比加重以稱陛下及民之意也梓聞乞宫觀乃有是命樞密使秦檜深恨之荆湖南路提點刑獄司幹辦公事胡鈐充樞密院編修官十有二月庚申禮部尚書劉大中言浙東之民有不舉子者臣嘗承乏外郡每見百姓訴丁鹽紬絹最為疾苦蓋為其子成丁則出紬絹終其身不可免愚民寧殺子不欲輸紬絹又資財嫁遣力所不及故生女者例不舉誠由賦役煩重人不聊生所致也趙鼎進呈上曰可嚴行禁止朝廷法令備具往往不能奉行如銷金鋪翠立法甚嚴禁中有犯罰俸三月無一人敢犯者而聞士民之家尚有鋪翠一事非特長奢侈之風而殘害物命不知其數且行下廣南福建禁採捕者鼎退而批旨以大中所言送吏部措置癸亥禮部侍郎常同奏奉詔舉可為監司郡守之人輔臣進呈上曰朕已令書于屏今後監司郡守有闕有已差人不足任皆當用所薦人填闕雖不滿一人所欲而千里之民休戚所繫當權輕重而處之庚午樞密院進呈先得旨令京東宣撫處置使韓世忠移司鎮江府留兵以守楚州世忠上奏極論敵情巨測其將以計緩我師乞獨留此軍遮蔽江淮誓與敵人決於一戰上賜札曰朕得所奏益見忠誠雖古名將亦何以過古人有言閫外之事將軍制之今既營屯安便控制得宜卿當施置自便勿復拘執至於軍餉等事已令三省施行乙亥上謂宰執曰聞三省文書極繁卿等省閲日不暇給皆由六部官不任責事事申明故也豈有為尚書不能任一部之事朕若擢為執政便可裁天下之務趙鼎曰承平時朝廷尊嚴上下有分昨一小使臣馬前喧呼臣恐其訴寃乃求差遣爾政由臣等不才致朝廷之勢陵夷上曰此須與行遣天下事賞罰而已若有罪不罰漸成姑息之風誠為不便乃命六部措置條具申省金人徙劉豫於上京後封曹王乙亥户部尚書章誼入對上諭曰天下苗禾須與措置其不熟處除檢於外止令輸錢仍運錢於豐熟之地糴米如此則公私兩利矣癸未有司奉九廟神主還浙西徽猷閣待制王倫右朝請郎高公繪還自金國初劉豫廢左副元帥昌乃送倫等歸曰好報江南既道塗無恢和議自此平達倫言金人許還梓宫及皇太后又許還河南諸州上大喜賜豫特異初知泗州劉綱乞調除州千夫修城有旨從之言者以為非是甲申上謂宰執曰百姓誠不可勞但邊城利害至重天下之事亦權輕重而朕愛民力一毫不敢動惟此役不得已也趙鼎曰昨得旨已令優給錢米矣以王倫為徽猷閣直學士充奉迎梓宫使高公繪為右朝奉大夫充副使宋史全文卷二十上欽定四庫全書宋史全文卷二十中宋高宗十一戊午紹興八年春正月戊子朔上在建康癸巳言者請今後從官作守不許衝見任人趙鼎曰祖宗以來如此上曰若遇從官無異庶官宰執無異從官則非朝廷之體丙申御史中丞常同言自大臣用事以來沮抑言路喜怒好惡一出私意臺諌章疏多不報行或加節貼文理不通殆非所以明是非公賞罰肅紀綱廣言路也道揆法守不宜分彼此之嫌進賢黜姦當共守至公之道言章若實使天下知朝廷議罪之當若其不實亦使被罪者異時得以自明欲望特降處分隨事劄下報行以稱陛下無偏無黨之意從之戊戌參知政事張守知婺州初上將還臨安而守謂建康自六朝為帝王都江流險濶氣象雄偉且據會要以經理中原依險阻以捍禦強敵可為别都以圖恢復每對必為上言之及將下詔東歸守與趙鼎議于都省不合又謀諸朝上顧守曰何如守曰昨日都省已與趙鼎言之陛下至建康席未及暖今又巡幸百司六軍有勤動之苦民力邦用有煩費之憂願少安於此以繫中原民心鼎不可守引疾求去故有是命乙巳趙鼎言士大夫多謂中原有可復之勢宜便進兵乞召諸大將問計上曰不須恤此今日梓宫太后淵聖皇帝皆未還不和則無可還之理丙午左正言辛次膺提點荆湖南路刑獄公事次膺嘗論王仲嶷王㬇之父在建炎中皆嘗投拜㬇不當與郡仲薿不當復官二人樞密使秦檜妻黨也檜力營救次膺乃併劾之曰是將有蔽朝之漸時檜議復遣王倫使北請和次膺力言國恥未雪義難請好面陳及上疏者六七不從乃以母疾求去故有是命丁未召新知眉州邵溥赴行在上謂趙鼎曰朕於知名士大夫皆欲識之獨未識溥宰執大閲張俊軍馬于城西翌日趙鼎奏器甲精明照耀廣川軍馬之盛至於如此皆陛下留意所致上曰前日俊來奏事具言近來軍中製造兵器已無遺功朕因諭之國家之力亦盡於此矣但欠一事爾俊曰不知欠何事朕曰所欠力戰而已俊悚息對曰他日若遇敵臣當盡死以報國家戊申尚書兵部侍郎胡世將為四川安撫制置使兼知成都府二月戊午知盧州主管淮西安撫司公事劉錡對于內殿錡言淮北兵歸正者不絶今嵗合淝度可得四五萬衆翌日上謂趙鼎等曰朕每慮江上諸將控扼之勢未備若上流有警嶽飛不可下則江池數百里邊面空虛得錡一軍遂可補此門矣鼎曰更須措置荆南事若就緒則沿流上下形勢相接不同前日上曰如此經營人事既成若功有不成則天也夔州教授李昌言應詔撰成中興要覽十篇詔本州取索實封投進壬戌湖北京西宣撫使嶽飛乞增兵上曰上流地分誠濶逺寧與減地分不可添兵今日諸將之兵已患難於分合與其添與大將不若别置數項軍馬庶幾緩急之際易為分合也飛又奏為湖北轉運判官夏珙等升職進官上曰可作直旨行下監司守臣朝廷所用不當令盡歸大將上召淮西宣撫使張俊至宫中從容與論邊事俊曰臣當與嶽飛楊沂中大合軍勢期於破敵以報國家上諭之曰卿能如此甚副朕意朕更有一二事戒卿卿在此毋與民爭利勿興土木之功俊悚息承命俊見地無磚面再三歎息上曰朕為人主雖以金玉為飾亦無不可若如此非特一時士大夫之論不以為然後世以朕為何如人主也癸亥上發建康府甲子殿中侍御史張絢乞車駕所過州縣量免租稅上曰自古人主所過皆有蠲復當議使實惠及之絢又乞踈決上曰此事則不須父老望幸之意不可不有以慰之若罪人有罪無可恤也丙寅提舉江州太平觀胡安國充寶文閣直學士賜銀帛三百匹兩安國以衰疾乞致仕上將許之乃詔以安國解釋春秋成書進職加賜翌日詔安國進一官致仕命未下而安國卒矣安國風度凝逺言必有教動必有法燕居獨處未嘗有怠慢而與人談論氣恬詞簡若中無所有性本剛急晚更沖淡年浸高加以疾病而謹禮無異乎平時家居食不過兼味病中值嵗大旱所居岑寂膳羞不可致子弟或請稍近城郭便藥餌安國曰死生有命豈以口體移不資之軀哉雖轉徙屢空取舍一介必度於義少從遊酢謝良佐鄒浩遊與向子韶曽開唐恕朱震情義最篤震被命召問出處之宜安國曰世間惟講學論政則當切切詢究若夫行已大致去就語默之機必自斟酌不可決諸人亦非人所能決也由中興以來諸儒之進退最合於誼者安國與尹焞而已乙亥四川都轉運使李逮罷用宣撫副使吳玠奏也時宣撫司參議官陳逺猷已兼轉運副使乃命主管茶馬張深兼權副使與逺猷共事戊寅上至臨安府壬午祕書郎尹焞試祕書少監仍兼崇政殿説書三月己丑中書門下省檢正諸房公事林季仲主管洪州玉隆觀以御史中丞常同言其貪婪邪佞故也季仲嘗因對上奏曰臣聞古語有曰乳彘摶虎伏雞搏狸夫彘非虎之敵雞非狸之敵其能搏之者發於感憤之誠也金人肆為貪虐以吞噬中夏自今觀之誠強矣然中原之地尚數千里帶甲之士無慮百萬亦何至如是之弱哉嘗試號於衆曰金人殺而父兄係而妻子燔而廬舍奪而財寶是為不共戴天之讎必思有以報之則俯仰之間氣必百倍以此衆戰誰能禦之今世之説者不然曰天命如此其如彼何而釋老報應之説又從而蠱之縉紳士大夫率以為然往往束手受囚引頸待刃為之甘心焉嗚呼能洗是恥猶有餘恥能雪是寃猶有餘寃若歸之命而聽其自爾可謂善自寬矣且人事盡而後可以言命四夷交侵必因小雅之廢小雅之廢命耶人耶外攘夷狄必由政事之修政事之修命耶人耶如以命而已矣則賢才不必求政刑不必用將帥士卒不必選練車馬器械不必修備以待命之將興斯可也故李泌以謂君相不可言命惟當修人事而已矣區區吳越激於感憤猶能以危為安以亡為存況以天下之大億兆之衆乘其怒心而為之何遽不為福乎克復宗社取舊物以還中原夫亦何難之有既而同又請黜季仲職名以戒作偽之士季仲坐奪職庚寅禮部尚書劉大中參知政事兵部尚書王庶充樞密副使庶為尚書時嘗論制夷狄之道在於愛民兵書無不本於愛民者今縉紳無一言及民何也古之已衰而興者未有不由於威令行紀綱立既盛而衰者未有不由於威令不行紀綱不立羣臣有言慮合聖心者願略煩文為簡易與反復圖成敗上嘆曰大臣才也遂有是除庶私念軍不可專專則難制兵不可驕驕則不用命賞罰不可不公不公則人不服今世可為乎我於爵賞不濫人多以我為吝於罪無所貸人多以我為刻今此可行乎辭其位者三不聽遂論江西淮南廣東盜發四十餘輩出於凍飢宜蠲平賦役治部使者守令貪虐以慰安其心且曰負陛下恩德壞陛下天下者彼則去矣陛下為宗廟社稷主何所之乎其言激切類此壬辰樞密使秦檜守尚書右僕射同中書門下平章事兼樞密使前一日趙鼎留身奏事上曰秦檜久在樞府得無怨望否鼎曰檜大臣必不爾然用之在陛下爾是夕鎖院制下朝士皆相賀惟吏部侍郎晏敦復退而有憂色曰姦人相矣給事中張致遠祕閣修撰聞之皆以敦復言為過其後乃服甲午參知政事陳與義知湖州己亥制授故南平王李陽煥嗣子天祚靜海軍節度使安都護封交趾郡王如陽煥初封故事壬寅詔故相韓忠彥配享徽宗皇帝廟庭用從官議也丙午趙鼎奏近積雨恐傷蠶麥欲詣天竺寺祈晴上曰朕於宫中亦養蠶一箔要知農桑之候久雨葉濕豈有不損也戊申王次翁為吏部員外郎奏檜所引也四月庚申初置户部和糴場於臨安其後又增于平江嵗糴米六十萬石壬戌命樞密副使王庶暫往松江及淮南等處措置邊防上戒以張浚待諸將多用數且狎昵自取輕侮吕祉以傲肆自大取敗皆可為戒上因論王伯之道不可兼行當以三王為法今之諸將不能恢復疆宇他日朕須親行不殺一人庶幾天下可定自酈瓊叛張俊擅棄盱眙而歸諸將稍肆庶素有威嚴臨發勞師於都教場軍容嚴整庶便服坐壇上自楊沂中而下悉以戎服步由轅門庭趍受命拜賜而出莫敢仰視自多事以來所未有庚午徽州布衣王悱獻孝經解義詔賜帛三十匹壬申祕書少監兼崇政殿説書尹焞留身求去時已詔焞免兼史事四月甲子上曰待與卿在京宫觀焞力辭且云士人若不理會進退安用所學翌日上以諭輔臣參知政事劉大中曰焞未問所學淵源足為後進矜式班列中若得老成人為之領袖亦是朝廷氣象乃以焞直徽猷閣主管萬壽觀留侍經筵戊寅詔尹焞解論語書成特賜六品服壬午命翰林學士朱震知貢舉是嵗增參詳官二員是日王倫見金左副元帥昌于祁州五月丙戌何鑄行祕書郎秦檜薦之也戊子監察御史張戒入對因言諸將權太重上曰若言跋扈則無迹兵雖多然聚則強分則弱雖欲分未可也戒曰去嵗罷劉光世致淮西之變今雖有善為計者陛下必不信然要須有術上曰朕今有術惟撫循偏禆耳戒曰陛下得之矣得偏禆心則大將之勢分上曰一二年間自可了戒曰陛下既留意臣言贅矣庚寅詔衢州布衣柴宗愈與免文解一次宗愈獻中興聖統大略謂夏少康漢光武可為標準周宣王漢宣帝唐玄宗憲宗可為鑒戒故有是命丙申詔韓愈昌黎集中有佐佑六經不抵牾於聖人之道者許依白虎通説文例出題以取士用翰林學士知貢舉朱震等請也丁酉御史中丞常同言劉子羽十罪詔落職戊戌知廬州劉錡奏使臣張括等三人自言在西京關師古手下師古遣來申奏朝廷乞赦其罪自效來歸上曰昨背叛從偽之人若能束身自歸無功者朕以不死待之若能立功自效即隨高下推賞趙鼎秦檜退而嘆曰大哉王言此漢光武之略也庚子詔州縣鄉村五等坊郭七等以下貧乏之家生男女而不能養贍者每人支免役寬剩錢四千守令滿替並以生處增減為殿最之首用劉大中請也辛丑提舉江州太平觀胡安國上遺表諡文定後數月詔曰安國所進春秋解義著王之大法朕朝夕省覽以考治道方欲擢用遽聞淪亡可撥賜銀帛三百匹兩令湖南監司應副葬事賜田十頃以給其孤壬寅提舉台州崇道觀張燾試尚書兵部侍郎燾召還引對上慰勞久之因問朕圖治一紀于兹而收效蔑然其弊安在燾曰自昔有為之君未有不先定其規模而能收效者臣紹興初始蒙召對首以治道當先定其規模為言臣竊觀方今朝廷施設之方朝令夕改其事大體重不可輕舉者莫如六飛之順動往者前臨大江繼又退守吳會曽未期月而或進或却豈不為驍敵所窺乎此無他規模不素定故也陛下之所朝夕相與斷國論者二三大臣而已而一紀之間命相之制凡十有四下執政遞遷者亦無慮二十餘人非規模不定任之不一責之不專致此紛紛乎日月逝矣大計不容復誤願陛下以先定規模為急規模既定未有治效不著上歎息曰此誠方今急務朕非不欲立定規模緣宰輔數易未有定論爾提舉江州太平觀劉子羽責授單州團練副使漳州安置御史中丞常同以十事論子羽故也丁未先是王倫既見魯國王昌昌遣使偕倫見金主亶首謝廢豫然後致上旨金主始密與羣臣定議許和至是遣倫還且命烏凌阿思謀石慶充來議事樞密副使王庶條上淮南耕種等事上曰淮南利源甚博平時一路上供內藏細絹九十餘萬其他可知以此知淮甸不可不措置葺理湖北京西宣撫使嶽飛聞庶行邊遺庶書曰今嵗若不出師當納節請間庶稱其壯節戊申命刑部員外郎李彌遜馳勞北使于平江翌日上謂輔臣曰館待之禮宜稍優厚若事有商量早遂休兵得免赤子肝腦塗地此朕之本意也趙鼎曰若用兵不知所費多少比之館待之費殊不侔矣上慨然嘆曰當時若無軍旅之事使朕專意保民十數年間豈不見效鼎與秦檜同對曰陛下為此言神明感格必有平定之期矣辛亥改命王倫充館伴使初命權吏部侍郎魏矼館伴矼言項任御史嘗論和議之非今難以專對秦檜招矼至都堂問其所以不主和議之意矼具陳敵情難保檜謂之曰公以智料敵檜以誠待敵矼曰相公固以誠待敵第恐敵人不以誠待相公耳檜不能屈乃改命焉既而又辭遂命給事中吳表臣而倫充來館中計事時左宣議郎王之道亦遺矼書言國家自靖康以來失於議和致兩宫北狩萬乘東巡百姓墮於塗炭逮今十有四年尚未覺誤復縱王倫賣國引賊入家頃年章誼孫近使敵餘人盡留南京惟誼與近得至軍前稟議今敵使之來自合用此例留餘人於韓世忠軍中令其使副造朝不惟有以禠鳥獸之魄而奪之氣亦足計示朝廷之尊乃若和議則有九不可而一可所謂一可者今敵誠欲還二帝六宫與祖宗之故地為德於我而無所事賄夫誰曰不可為今日計當以此明告使者而俾復命焉茍惟不從是敵無意於盟我何罪也六月乙卯朔知信州程邁為江淮荆浙閩廣等路經制發運使專掌糴事禮部貢院奏試博學宏詞合格中等詹叔義陳巖肖下等王大方詔叔義大方並與堂除巖肖賜同進士出自敕令所請福建路人户以子孫或同居緦麻以上親與人雖異姓及不因飢貧並聽收養即從其姓不在取認之限著為本路令其江浙湖廣州縣有不舉子風俗處令憲臣體究申明依此立法從之壬戌衍聖公孔玠避亂寓衢州詔即賜田五頃癸亥尚書左僕射監修國史趙鼎史館修撰勾濤祕書少監尹焞著作郎兼校勘張嵲佐郎胡珵校勘鄧名世朱松李彌正高閌范如圭等上重修哲宗皇帝實録九月書成凡百五十卷乙丑御史中丞常同言近關報曽惇進曽祖曽布著三朝正論真迹轉右承議郎臣聞昔者神宗皇帝切於求治鋭然更化付王安石以政事安石孤負委任創為新法布於是時實為腹心其政皆出於布之謀其法皆成於布之手故自海州懷仁縣令一年半間十三遷而至知制誥安石嘗語人曰終始言新法不便者司馬光也終始言便者曽布也其餘出入而已逮紹聖初布與章惇蔡卞同秉大政元祐之法度委如辨髦元祐之人才棄如斷梗布內愧於私心外迫於清議乃間出一善言引一善士以求自異於衆既欲取高位於當年又欲掠美名於後世首鼠兩端馴致建中之事遂致蔡京得以乘間而入貽禍邦家而朝廷尚尊其説頒其書於史官號曰正論臣竊惑焉臣願宣諭史官筆削之際毋惑其説以至亂真庶幾一代之典足以垂信後世詔付史館戊辰接伴官范同言敵使已至常州王庶時在合淝上疏有曰彼之議和割地不過以畫河畫淮二者而已若曰畫淮則我之固有而淮之外亦有見今州縣所治如泗州漣水軍是也既為我有安用和為若曰畫河則東南數千里荆棘無人之地儻欲宿兵守之財賦無所從出彼必厚索歲幣以重困我矣不如拘其使而怒之疏入不報辛未監察御史張戒言今日議和理有可得者有必不可得者畫大河為界復中原還梓宫歸淵聖此必不可得者也各務休兵音問往復或歸吾太后此或可得者也復中原還梓宫歸淵聖臣子之心孰不願然以兵取之則可以貨取之則不可非惟不可亦必不得設或得之不過如童貫買燕雲之地敵人暫去復來財與地卒兩失之爾自古豈有兵不能勝而貨財可以却敵復國者壬申上特御射殿引見禮部合格舉人黃公度以下遂以南省及四州類試合格舉人黃貢等共三百九十五人參定為五等賜及第出身同出身奏名林恪以下出身至助教癸酉樞密副使王庶自淮西還行在先是庶將還朝未至復上疏言商之高宗三年不言其在諒暗言猶不出其可以見外夷之使乎先帝北征而不復天地鬼神為之憤怒能言之類孰不痛心陛下抱負無窮之悲將見不共戴天之讎其將何以為心又將何以為容又將何以為説又言臣蒙陛下親擢備位兵本國之大事不敢隱默故重為陛下陳其三䇿上䇿莫如拘其使者彼怒必加兵我則應之所謂善戰者致人而不致於人是也敵人強大自居一日或拘其使出於意表氣先奪矣負敗可立而待其次願陛下念不共戴天之讎堅謝使人勿與相見一切使指令對大臣商議然後徐觀所向隨事酬應最其次姑示怯弱待以厚禮俟其出界精兵躡之所謂掩其不備破之必矣丙子初行朝聞思謀之來物議大訩羣臣登對率以不可深信為言上意堅甚往往峻拒之或至震怒趙鼎因請間密啓上曰陛下與金人有不共戴天之讎今乃屈體請和誠非美事然陛下不憚為之者凡以為梓宫及母兄耳羣臣憤悶之辭出於愛君非有他意不必以為深罪羣臣以陛下孝誠如此必能相亮上以為然羣議遂息丁丑金使烏陵思謀石慶充入見翰林學士兼侍讀翊善朱震疾亟上奏乞致仕且薦尹焞代為翊善夜震卒年六十七中夕奏至上達旦不寐戊寅輔臣奏事上慘然曰楊時既物故胡安國與震又亡同學之人今無存者朕痛惜之趙鼎曰尹焞學問淵源可以繼震上指奏牘曰震亦薦焞代資善之職但焞微瞶恐教兒童費力俟國公稍長則用之乃詔國公往奠賜其家銀帛二百匹兩例外官子孫一人癸未户部侍郎向子諲入見因論京都舊事其言頗及珍玩中書舍人潘良貴故善向子諲至是攝起居郎立殿上聞其言甚怒既而子諲反復良久良貴不聞其餘語怒甚徑至榻前厲聲曰向子諲以無益之言久勞聖聽上語未竟子諲不為止良貴叱之退者再焉上驚而怒欲抵良貴罪甲申子諲請致仕右正言李誼亦奏良貴罪御史中丞常同奏良貴疾子諲曼詞衆以為直不可罪之願許子諲補外上詰問曰子諲之二版曹乃卿所薦今良貴犯分沽激復上章稱述何也於是上欲併逐同權禮部侍郎張九成為上言上意稍解九成因曰近朱震死陛下命國公往奠又命子諲治其喪尊師重道天下歎仰且士大夫所以嘉子諲者以其能眷眷於善類也今以子諲之故逐柱史又逐中司非所以愛子諲也上批諭同同言不已於是二人卒俱罷秋七月乙酉朔詔王倫假端明殿學士為奉迎梓宫使陳括假徽猷閣待制副之殿中侍御史張戒復上疏請外則姑示通和之名內則不忘決戰之意而實則嚴兵據險以守又曰自古能守而能和者有矣未有不能戰不能守而能和者也使真宗無達蘭之捷仁宗非慶厯之盛雖有百曹利用百富弼豈能和哉又曰茍不能戰不能守區區信誓豈足恃也丁亥知閣門事藍公佐假慶逺軍承宣使充奉迎梓宫副使代陳括也樞密副使王庶言陛下當北狩之役龍飛睢陽匹馬渡江扁舟航海以至苗劉之變艱難萬狀終無所傷天之相陛下厚矣至今雖未尅復故疆鑾輿順動而大將互列官軍雲屯百度修舉較前之日可謂小康何苦不念父母之讎不思宗廟之恥不痛宫闈之辱不恤百姓之寃逆天違人以事夷狄乎戊子王庶因留身論事上宣諭曰朕厯覽前古治道三五恐未易及如漢文景唐太宗當力行之或可庶幾奏曰以陛下聖學高妙兼睿斷如此天下安得不治丁酉北使入辭進士及第黃公度為左承事郎簽書平海軍節度判官廳公事禮部言祖宗故事不䇿試則榜首補兩使職官上特命受京官自是以為例戊戌王倫辭行倫至都堂稟所授指二十餘事一議和後禮數趙鼎答以上登極既久四見上帝君臣之分已定豈可更議禮數二割地逺近鼎答以大河為界乃淵聖舊約非出今日宜以舊河為大河二事最切或不從即此議當絶倫受之而去辛亥詔殿前司䇿選鋒軍統制吳錫還行在上曰錫有膽勇心計然不可獨用可趣歸令楊沂中别遣軍代之趙鼎等退而語咸服上知人善將將之明焉八月乙丑江淮荆浙等路經制發運使程邁入見言劉晏為九使財賦悉歸于一國朝始分為二而三司使居中發運使居外相為表裏今租庸分於轉運司常平分於提舉司鹽鐵分於茶鹽司鼓鑄則有坑冶司平準則有市易司總之以户部而發運使徒有其名臣恐未及施為而議論蜂起上溷聖聽上乃督邁使亟行且諭以置場和糴無甚賤傷農邁曰臣敢不遵聖意於是降本錢四百萬緡令於六路豐熟之地置場和糴焉丙寅詔侍讀曽開讀三朝寶訓侍講吳表臣講孟子張九成講春秋吕本中講左氏傳崇寧殿説書尹焞講尚書既而本中辭兼局乃命中書舍人勾龍如淵兼侍講九成在經筵一日論日食奏曰日食之變本於惡氣惡氣之萌本於惡念不芟夷藴崇之絶其根本將奔騰四達上觸乎天則日月薄蝕五星失序下觸乎地則災及五穀怪妖迭見中觸乎人則為兵為火札瘥備至則惡念之起可不應時撲滅乎上聳然曰誠在朕念慮間當為卿戒之九成進講畢上嘗論王道曰易牛微事耳孟子遽謂是心足以王朕竊疑之九成曰陛下不必疑疑則心與道二不忍一牛仁心著見此則王道之端倪推此心以往則華夏蠻貊根荄鱗介舉天下萬物皆在陛下仁政中豈非王道乎他日上謂近臣曰朕於張九成所得甚多丁卯知臨安府張澄升徽猷閣待制時臨安守臣任同京邑而澄有治劇之才甚得時譽己卯進擬栁州南雄州知州上曰廣南去朝廷逺守臣尤得遴擇前日連南夫奏廣南盜賊殺戮過多要降詔朕以謂盜賊固當殺戮只恐害及平人有傷和氣若得守令平日存撫使不為盜乃上䇿也如江西州縣長吏或昏繆不職或貪贓害民豈可不問壬午祕書省著作郎何掄罷殿中侍御史張戒言張浚欲竄易舊史掄首附其意凡所籖貼自云改字舛訛然頗主異議浚罷掄不自安遂撤去前日籖貼焚之乃出掄知卭州御筆和州防禦使璩除節鉞封國公執政聚議樞密副使王庶大言曰並后匹嫡古以為戒此豈可行左僕射趙鼎謂右僕射秦檜曰鼎前日負曖昧之謗今不敢奏須公開陳檜無語翌日進呈鼎奏曰今建國在上名雖未正恩數宜小異又曰建國名雖未正天下之人皆知陛下有子矣以前後恩數並同皇子又昨幸平江及謁太廟兩令建國扈蹕國人見者恣嗟太息此社稷大計蒼生之福也在今日禮數不得不異蓋以繫人心不使之二三而惑也後數日參知政事劉大中奏事亦以為言命遂寢權禮部侍郎兼侍講張九成兼權刑部侍郎先是刑部吏斷天下死囚不以情自九成蒞職有情輕免死甚衆一日法寺以成案上大辟九成閲始末得其情因請覆實囚果誣服者也奏黜之時法官抵罰而朝論欲以平反為賞九成辭曰職在詳刑而賣衆以邀賞可乎九月丁亥侍御史蕭振劾參知政事劉大中身為大臣而不以孝聞于中外乞賜罷斥振本趙鼎所薦後以秦檜引入臺其劾大中蓋以搖鼎也甲午史館上續修哲宗實録乙巳上諭大臣曰近張戒有章疏論備邊當以和為表以備為裏以戰為不得已此極至之論也李心傳曰戒本鼎客故主守丁未尚書左僕射趙鼎遷特進以哲宗實録成書也中書舍人兼直學士院吕本中草制有曰謂合晉楚之成不若尊王而賤霸謂散牛李之黨未如明是而去非惟爾一心與豫同德右僕射秦檜深恨之戊申宰執言自時多艱朝廷思屈羣䇿以濟庶務緣此法度多有改易上因曰經久之制不可輕議古者利不百年變法卿等以蕭規曹隨為心何憂不治壬子上諭輔臣曰昨日浙東漕梁澤民奏今秋糴買事朕嘗諭以錢給之于民宜戒減剋榖輸之於倉無取羡餘則公私兩便冬十月丙辰主觀太極觀邵博賜同進士出身除祕書省校書郎詔博祖父雍道德學術為萬世師父伯溫經明行潔博趣操文詞不忝祖父故有是命丁巳參知政事劉大中知處州辛未上諭大臣曰江西盜賊在朝廷可治者三一擇帥臣以壓服其心二任守令以勸課其業三蠲科役以優給其力如此尚或為盜朕未之聞也甲戌特進尚書左僕射同中書門下平章事兼樞密使趙鼎罷為兩浙東路安撫制置大使兼知紹興府時檜力勸上屈己議和鼎持不可繇是卒罷鼎入辭從容奏曰臣昨罷相半年蒙恩召還已見宸衷所以與鄉來稍異臣今再辭之後人必有以孝悌之説脅制陛下矣臣謂凡人中無所主而聽易惑故進言者得乘其隙而惑之陛下聖質英邁洞見天下是非善惡謂宜議論一定不復二三然臣甫去國已稍更改如修史本出聖意非羣臣敢建言而未幾復修此可為惜臣竊觀陛下未嘗容心特既命為相不復重違其意故議論取舍之間有不得已而從者如此乃宰相政事非陛下政事也鼎行檜奏乞同執政往餞樞密副使王庶謂鼎曰公欲去早為庶言鼎曰去就在樞密鼎豈敢與檜至鼎一揖而去自是檜益憾之大事記曰惜乎偽齊入寇之時鼎獨建保江之計而與浚不合浚自出師以來獨主幸建康之議而與鼎不合故沂中捷至鼎即求去且曰陛下以兵事為重今浚成功浚當留臣當去雖上有卿且在紹興朕自有用卿之諭而浚為檜所欺遂引之為副使矣雖浚與檜共事始知其暗去位之時力薦鼎相而檜之憾已深矣雖鼎再相力能護浚而檜黨百計搖撼鼎已不自安矣中興之功所以垂成者張趙之勢合也中興之功所以隨壞者張趙之隙開也君子之隙既開小人之勢遂合故八年十月鼎罷而檜之和議遂成天下之事變矣惜哉丁丑京東淮東宣撫處置使韓世忠乞赴行在奏事先是王倫既與烏凌阿思謀至敵庭金主亶復遣蕭哲等為江南詔諭使使來計事世忠聞之上疏曰金人遣使前來有詔諭之名事勢頗大深恐賊情繼發重兵壓境逼脅陛下别致禮數今當熟計不可輕易許諾其終不過舉兵決勝但以兵勢最重去處臣請當之因乞赴行在奏事馳驛以聞上不許戊寅樞密副使王庶言間者敵使之來臣忠憤所激屢奏封章力請謝絶專圖恢復臣謀不逮遠知昧通方伏望速賜降黜或以適此執政闕員未便斥去即乞特降處分遇有和義文字許免簽書庶逃前後反覆有失立朝之節己卯詔不許庶復上言臣生於陜西其風氣漸染耳目所聞見者莫非兵事禍亂以來常欲以氣吞強敵則所謂講和者非臣之所能也又言臣備數樞庭自合辭職不合辭事乞除臣一近邊州郡願效尺寸不許辛巳秦檜奏北使約中冬上旬至泗州上曰所議殊未可解但可和即和不可和即否兵備不容少弛可遍諭諸將以為之備中書舍人兼直院吕本中罷用侍御史蕭振奏也十一月甲申翰林學士孫近參知政事殿中侍御史張戒面對言王倫遽回北使遂有江南詔諭使及明威將軍之號不云國而直云江南是以我太祖待李氏晚年之禮也曽不得為孫權乎一則詔諭一則明威此二者何意敵云詔諭臣不知所諭何事又曰臣謂為國只當自勉不可僥幸偷安果得偷安猶可但恐屈辱已甚而偷安亦不得耳疏入秦檜怒愈有逐戒之意矣丙戌權尚書禮部侍郎兼侍讀張九成罷初趙鼎之未去也九成謂鼎曰敵失信數矣盟墨未乾以無名之師掩我不備今實厭兵而張虛聲以撼中國彼誠能從吾所言十事則與之和當使權在朝廷可也鼎既免秦檜謂九成曰且同檜成此事如何九成曰事宜所可九成胡為異議時不可輕易以茍安耳他日與吕本中同見檜檜曰大抵立朝須優遊委曲乃能有濟九成曰未有枉已而能正人檜為之變色會檜聞九成在經筵講書因及西漢災異事大惡之既而九成再章求去上命以次對出守檜必欲廢置之奏除提舉江州太平觀免謝辭戊子殿中侍御史張戒為司農少卿己丑詔張戒為耳目之官附下罔上可與外任坐前奏疏乞留趙鼎也庚寅上謂大臣曰王倫使回金人頗有善意若上天悔禍敵肻革心休兵之後一切從節省雖常賦亦蠲減以寬百姓丙申王倫至行在令日下赴內殿奏事戊戌太常少卿兼崇政殿説書尹焞稱疾在告遂卧家不出己亥王倫充國信計議使蘇符充副使符稱疾不受庚子參知政事孫近兼權同知樞密院事以樞密副使王庶纍章求去故也辛丑詔大金遣使至境朕以梓宫未還母后在逺陵寢宫闕久稽汛掃兄弟宗族未聞會聚南北軍民十餘年間不得休息欲屈己就和在廷侍從臺諌之臣其詳思所宜條奏來上限一日進入先是禮部侍郎兼侍讀曽開上疏言女真和議稽諸前古為可憂考之今事為難信而朝廷不思有以伐其謀方且忘大辱甘臣服貶稱號捐金帛以難得之時為無益之事可不為痛哭流涕哉伏望陛下無忘大恥無惑和議堅心定志一於自治使政事修於內兵將強於外則將不求而自和矣臣竊謂敵使之來所係甚大內外臣寮章疏願陛下使大臣集從官豫加熟議庶無後悔權吏部尚書張燾亦請詢可否於衆檜乃白上下此詔焉京東淮西宣撫處置使韓世忠言伏讀宸翰鄰邦許和臣愚思之若王倫藍公佐所議講和割地休兵息民事迹有實别無扶合外國誑賺本朝之意二人之功雖國家以王爵處之未為過當欲望聖慈各令逐人先次供具委無反覆文狀於朝以為後證先是世忠數上疏論不當議和上賜以手劄世忠既而受詔乃復上此奏詞意剴切由是秦檜惡之壬寅兵部侍郎兼權吏部尚書張燾言傳曰天將與之誰能廢之臣請考人事以驗天意陛下飛龍濟州天所命也敵騎屢犯行闕卒以無虞天所保也嵗在甲寅一戰而敗敵師天所贊也嵗在丙辰再戰而却劉豫亦天所贊也嵗在丁巳酈瓊雖叛乃為偽齊廢滅之資亦天所贊也是蓋陛下躬履艱難側身修行布德立政上當天意而天祐之之所致也臣以是知上天悔禍蓋有日矣中興之期亦不逺矣伏願陛下益務自修益務自治益務自強以享天心以聽天命以俟天時時之既至吉無不利則何戰不勝何攻不克何為不成何功不立梓宫何患乎不還淵聖何患乎不返母后何患乎不歸宗族何患乎不復宗廟陵寢何患乎不能繕修南北之民何患乎不能混一今此和議姑為聽之而無必信可也伏願陛下毋取必於敵而取必於天若乃略國家之大恥置宗社之深讎躬率臣民屈膝夷敵北面而臣事之以是而覬和議之必成非臣所敢知也上覽奏愀然變色曰卿言可謂盡忠然朕必不至為敵人所紿方且熟議必非詐訛然後可從如其不然當再遣使審問虛實而拘留其使人燾頓首謝吏部侍郎晏敦復言今所遣使以詔諭為名儻欲陛下易服而拜受還可從乎又欲與陛下分庭而抗禮還可從乎設或如此等事從其一二則與上下之分已大定矣自此之後可以號令我矣彼或又行詔令授陛下一兩鎮節鉞封陛下一王號還可從乎又或下令將本朝大臣諸將盡行封拜還可從乎又或下令因彼年號正朔還可從乎又或下令盡遣西北人歸鄉里還可從乎姑略舉此數事則過此以往可推而知也陛下欲屈己就和願周思而熟慮之謹擇而善處之若已屈之後必不致有如臣前所陳之禍患陛下小屈以就大事可也權吏部侍郎魏矼言臣素不熟敵情不知使人所須者何禮陛下所謂屈己者何事方今宗廟社稷惟陛下是依天下生靈惟陛下是賴陛下既欲為親少屈更願審思宗社安危之機與夫天下治亂之所係考之古誼酌之羣情擇其經久可行者行之其不可從者以國人之意拒之庶幾軍民之心不至懷憤且無噬臍之悔也癸丑知平江府向子諲致仕時金人所遣詔諭使將入境子諲不肻拜敵詔乃上章乞致仕秦檜許之甲辰樞密副使王庶知潭州庶論敵不可和於道上疏者七見帝言者六秦檜方挾敵自重以為功絀其説庶語檜曰公不思東都抗節存趙時而忘此敵耶檜大恨庶又抗章求去乃有是命檜進呈上因近日士大夫好作不靖胥動浮言以無為有風俗如此罪在朕躬卿等大臣亦與有罪檜曰臣等實任其責孫近曰他時疆事稍定當須明政刑以示勸懲庶幾丕變中書舍人兼直院勾龍如淵試御史中丞時秦檜方主議和力贊屈己之説而外論羣起如淵言於檜曰何不擇人為臺官使盡擊去則相公之事遂矣檜大悟遂擢如淵中司人皆駭愕魏良臣行尚書吏部員外郎朱勝非間居録曰達蘭統兵犯淮甸朝廷遣魏良臣奉使數問秦檜仍稱其賢乃知檜初相時所陳二䇿出於虜意也逮其再相力薦良臣入為都司繼除從官欲弭其言耳丁未樞密院編修官胡銓上疏曰臣謹按王倫本一狹邪小人市井無賴頃緣宰相無識遂舉以使敵專務詐誕欺罔天聽驟得美官天下之人切齒唾罵今者無故誘致敵使以詔諭江南為名是欲臣妾我也是欲劉豫我也劉豫臣事金人南面稱王自以為子孫帝王萬世不拔之業一旦豺狼改慮猝而縳之父子為敵商鑒不逺而倫又欲陛下效之夫天下者祖宗之天下也陛下所居之位祖宗之位也奈何以祖宗之天下為仇敵之天下以祖宗之位為仇敵藩臣之位陛下一屈膝則祖宗廟社之靈盡汙草萊祖宗數百年之赤子盡為左袵朝廷宰執盡為陪臣天下士大夫皆當裂冠毁冕變為異服異時稱其無厭之求安知不加我以無禮如劉豫也哉夫三尺童子至無知也指讎敵而使之拜則怫然怒今金人則讎敵也堂堂大朝相率而拜讎敵曽無童稚之羞而陛下忍為之邪倫之議乃曰我一屈膝則梓宫可還太后可復淵聖可歸中原可得嗚呼自變故以來主和議者誰不以此説啖陛下哉然而卒無一驗則敵之情偽已可知矣陛下尚不覺悟竭民膏血而不恤忘國大讎而不報含垢忍恥舉天下而臣之甘心焉就令敵決可和盡如倫議天下後世謂陛下何如主也況醜類變詐百出而倫又以姦邪濟之則梓宫決不可還太后決不可復淵聖決不可歸中原決不可得而此膝一屈不可復伸國勢陵夷不可復振可為痛哭流涕長太息者矣向者陛下間關海道危如纍卵當時尚不忍北面臣敵況今國勢稍張諸將盡鋭士卒思奮只如頃者北敵陸梁偽豫入寇固嘗敗之於襄陽敗之於淮上敗之於渦口敗之於淮隂校之前日蹈海之危已萬萬不侔儻不得已至於用兵則我豈遽出敵人下哉今無故而反臣之欲屈萬乘之尊下穹廬之拜三軍之士不戰而氣已索此魯仲連所以義不帝秦非惜夫帝秦之虛名惜夫天下大勢有所不可也今內而百官外而軍民萬口一談皆欲食倫之肉謗議洶洶陛下不聞正恐一旦變詐禍且不測臣切謂不斬王倫國之存亡未可知也雖然倫不足道也秦檜以腹心大臣而亦為之陛下有堯舜之資檜不能致陛下如唐虞而欲導陛下為石晉近者禮部侍郎曽開等引古誼以折之檜乃厲聲責曰侍郎知故事我獨不知則檜之遂非狠愎已自可見而乃建白令臺諌侍臣簽議可否是蓋畏天下議已而令臺諌侍臣共分謗爾有識之士皆以為朝廷無人吁可惜哉孔子曰微管仲吾其被髮左袵矣夫管仲霸者之佐耳尚能變左袵之區而為衣裳之會秦檜大國之相也反驅衣冠之俗而歸左袵之鄉則檜也不惟陛下之罪人實管仲之罪人矣孫近傅會檜議遂得參知政事天下望治有如飢渴而近伴食中書謾不敢可否事檜曰敵可講和近亦曰可和檜曰天子當拜近亦曰當拜臣嘗至政事堂三發問而近不答但曰已令臺諌侍從議之矣嗚呼參贊大政徒取充位如此有如敵騎長驅尚能折衝禦侮耶臣切謂秦檜孫近亦可斬也臣備員樞屬義不與檜等共戴天區區之心願斷三人頭竿之藁街然後羈留敵使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有赴東海而死耳寧能處小朝廷求活耶辛亥祕書省正字范如圭獻書于秦檜曰禮經有曰父母之讎不與共戴天寢苫枕干誓死以報春秋之法讎不復賊不討則不書葬葬者臣子之事也不書葬以為無臣子也天下之痛莫甚於不得其死君親不得其死而不復讎不討賊雖得梓宫而葬之於臣子之心能安否乎古之人有命將出師誓滅鯨鯢以迎梓宫者矣雖其力小勢窮不能有濟而名正言順亦可以無愧於天下後世未聞發幣遣使祈哀請命以求梓宫於寇讎之手者也女真用是知我無復讎之心可以肆為玩侮乃示欲和之意使倫歸報交使往來至于再至于三其謀益深言益甘我之信彼益篤禮益恭墮其計中不自知覺雖三尺童子皆為朝廷危之春秋之法凡中國諸侯與夷狄盟會者必謹志而深譏之女真自海上結盟借助於我以滅契丹契丹既滅遂犯汴梁其不可信一也既為城下之盟講解而退矣曽不旋踵復圍太原其不可信二也自時厥後和使項背相望而侵犯之兵無嵗不有其不可信三也既破京城乃始斂兵議和誘我二帝出郊劫之而去其不可信四也劉豫其所立也事之無所不至一旦執之如探囊中物其不可信五也彼包藏姦詭不可測度如此何為一旦與我如此之厚哉聞其使稱詔諭挾䇿命而來要主上以下拜之禮果有之乎其無之也果可從乎其不可從也反面事讎匹夫猶不肻為忍以堂堂之宋君臣相率而拜不共戴天之人哉主上哀疚在躬孝友天至必曰吾為梓宫屈為皇太后屈為淵聖皇帝屈何不可之有使子弟之情獲伸於一日志願足矣遑恤其他相公何不以必然之理開陳於咫尺之前乎誠使一旦拜受女真之詔册則將行女真之命令頒女真之正朔普天之下莫非女真之土率土之濱莫非女真之臣我宋君臣上下雖欲求措身之所且不可得無乃違主上聖孝之心失相公大忠之節乎昔漢高祖責數項羽兵不少解卒免太公於爼上晉大夫征績以輔孺子使惡我者懼卒能歸惠公於強秦此古人已試之明驗也相公不用此䇿以慰我主上孝弟之念奈何欲誤主上舉祖宗二百年之天下委而棄之哉設若敵擁梓宫母后淵聖於大江之外下一紙詔召吾君相以下來迎于境我若從之立有禍變如其不從彼將責我曰吾歸而父母之喪歸而親歸而兄有大造于而國乃違我之命不肻來迎是不孝於父母不恭於兄不忠於我也聲罪來寇將何以待之主上南面而君天下十有二年矣其即位也由天下軍民推戴所迫不得已而從之至於今日天下軍民豈肻聽吾君北面而為仇賊之臣哉主上以思念君父母兄之故不憚於屈己天下軍民以愛君之故不肻聽主上之辱身用此拒敵不為無辭者若其舉兵而來適足以激怒吾衆我以大義明詔天下率勵瘡疾之餘共雪父兄之恥乃不可失之機會也相公若必欲拂天下之情贊成主上受此屈辱有如姦雄因衆心之憤擁數十萬之衆仗大義以問相公之罪則將何辭以對相公嘗自謂我欲濟國事死且不恤寧避謗怨相公之心則忠矣使殺身而有益於君志士仁人之所願為也若犯衆怒陷吾君於不義政恐不惟怨謗而已將喪身及國毒流天下遺臭萬世茍非至愚無知自暴自棄天奪其魄心風發狂者孰肻為此若曰聖意堅確臣下莫之能回此非所望於相公也檜不答是日樞密院編修官胡銓昭州編管銓之上書也都人喧騰數日不定上語秦檜曰朕本無黃屋心今橫議若此據朕本心惟應養母耳於是秦檜等乃擬昭州編管時銓妾孕臨月遂寓湖上僧舍欲少遲行而臨安已遣人械送貶所祕書省正字范如圭與敕令所刪定官方疇同見吏侍晏敦復為銓求援敦復曰頃嘗言秦檜之姦諸公不以為然今方専國便敢如此此人得君何所不為敦復即往見守臣張澄語之曰詮論宰相天下共知祖宗朝言事官被謫開封府必不如是澄愧謝曰即追還矣壬子胡銓送吏部與廣南監當銓既竄斥秦檜孫近又奏銓所上封章言及臣等若重加竄責於臣等分誼有所不安臺諌勾龍如淵李誼鄭剛中亦共救解之乃以銓監昭州鹽倉銓之行也監登聞鼓院陳剛中以啓送之曰屈膝請和知廟堂禦侮之無䇿張膽論事喜樞庭謀逺之有人身為南海之行名若泰山之重又曰知無不言願借上方之劒不遇故去聊乘下澤之車秦檜大恨之尋貶剛中令安逺死焉十二月丙辰秦檜恐言者不已白上下詔以銓上書狂悖戒諭中外戊午提舉臨安府洞霄宫李綱言臣竊見朝廷遣王倫使金國奉迎梓宫往返屢矣今倫之歸與敵使偕乃以詔諭江南為名不著國號而曰江南不云通問而曰詔諭此何禮也以愚意料之敵為此名以遣使其邀求大略有五必降詔書欲陛下屈體降禮以聽受一也必有赦文欲朝廷宣布頒示郡縣二也必立約束欲陛下奉藩稱臣稟其號令三也必求我賂廣其數目使我坐困四也必求割地以江南為界淮南荆襄四川盡欲得之五也此五者朝廷從其一則大事去矣金人變詐不測貪婪無厭縱使聽其詔令奉藩稱臣其志猶未巳必繼有號召或使親迎梓宫或使單車入覲或使移易將相或使改革政事或竭取賦稅或朘削土宇從之則無有紀極一不從則前功盡廢反為兵端以謂權時之宜聽其邀求可以無後悔者非愚則誣也試禮部侍郎曽開知婺州先是秦檜嘗因語和議事曰此言大係安危開於座中抗聲曰丞相今日不當説安危止合論存亡爾檜瞿然警其言而罷遂命出守開辭改提舉江州太平觀己未吏部尚書李光參知政事秦檜與光初不相知特以和議初成將揭榜欲藉光名以鎮壓耳乙丑詔紹興府南班不帶遙郡宗室十八員嵗撥上供米五百斛以同判太宗正事士㒟言宗室俸薄不足於糴故也丙寅新知潭州王庶落職提舉臨安府洞霄宫以中丞勾龍如淵論其罪故也詔祕書省校書郎許欣入對奏疏言金人始入寇也固嘗云講和矣靖康之初約肅王至大河而返已而挾之北行訖無音耗河朔千里焚掠無遺復破威勝隆德等州淵聖嘗降詔書謂金人渝盟必不可守是嵗又復深入朝廷措置失宜都城遂陷敵情狡甚懼我百萬之衆必以死爭也止我諸道勤王之師則又曰講和矣乃邀淵聖出郊次邀徽宗繼往追取宗族殆無虛日傾竭府庫靡有孑遺公卿大臣類皆拘執然後偽立張邦昌而去則是金人所謂講和者果可信乎此已然之禍陛下所親見今徒以王倫繆悠之説誘致敵人責我以必不可行之禮而陛下遂以屈己從之臣是以不覺涕泗之橫流也樞密院編修官趙雍上書略曰天子之孝與臣庶不同報難報之恨雪難雪之恥精變天地誠動金石震國威立法制為匹夫匹婦復讎而朝四夷於明堂此陛下之職而羣公所當盡心也為今日之計當以講和為中國一事不必張皇委宰相平見使者遣使臣再議直俟梓官已還母兄相見然後徐議稱號折中典禮南北兄弟自有故事願陛下少抑一身孝愛之情俯徇天下至正之論丁卯王揚英為太常博士揚英獻所著黼扆針十二篇上召對而有是命戊辰湖北京西宣撫使嶽飛乞差胡邦用知靖州上曰郡守牧民之官亦藩屏所寄當自朝廷選差若皆由將帥辟置非臂指之勢也庚午殿中侍殿史鄭剛中言今日之勢尤急於邊郡如楚泗通泰滁濠江鄂以至荆襄關陜之地不過二十餘郡願詔大臣精選二十餘輩分而布之使其招徠牧養朝廷又時遣使按行無狀者易之處處得人則須以持久增秩賜金之事可行矣從之辛未參知政事李光言月樁錢之害常平之利上曰月樁事朕數為趙鼎言之不以為意常平司當復置三省可條具取旨癸酉祕書省著作郎胡珵尚書司勳員外郎朱松祕書省著作佐郎張廣凌景夏祕書省正字常盟范如圭上書曰臣聞主憂臣辱主辱臣死前者上皇訃聞陛下方宅大憂天下受其辱矣今者聞諸道路口語籍籍審如是將辱在陛下之身臣等得其死為有名之時也人誰無死為君父死之為有宋宗社死之為古今臣子忠孝大訓死之豈為無名乎敵人方據中原吞噬未厭何憂何懼而一旦幡然與我和哉蓋其狃於荐食之威動輒得志而我甚易恐故常喜於和之説以侮我又慮我訓兵積粟蓄鋭俟時而事有不可測知者故不得不為和之説以撓我耳蓋敵之和使即秦之衡人兵家用之百勝之術也六國不悟衡人割地之無饜以亡其國今國家不悟敵使請和之得䇿其禍亦豈可勝言哉彼以和之一字得志於我十有二年矣以覆我王室以弛我邊備以竭我國力以解體我將帥以懈緩我不共戴天之讎以絶望我中國謳吟思漢之赤子奈何至今而猶未悟也信如道路之言則敵人之要我至不遜也至無稽也是坐而約降我也艱難以來彼茍可以毒我者無遺力矣獨欠約降一事爾陛下奈何不顧祖宗社稷二百年付託之重將不慮而從之以萬乘之尊冒險而僥幸彼敵國者茍獲其不遜無稽之謀而藉􅏳以逞將焉避之哉如圭又言今女真之使以詔諭江南為名要陛下以稽首之禮自公卿大夫以至六軍萬姓莫不扼腕忿怒豈肻聽陛下北面而為仇賊之臣哉豈如今日痛憤肝膽之際明諭敵使而謝遣之然後詔在廷之臣與守邊之將講明戰守之䇿日夜飭厲常若臨敵表裏江淮必足以防侵軼之患願陛下枕戈嘗膽深思此䇿而力圖之則梓宫終有山陵之期母后終有東朝之養淵聖終免鴒原之難陛下終得遂孝悌之心而天下臣子亦得伸眉吐氣食息世間俯仰無所愧怍與夫忍恥事讎榮辱禍福相去萬萬矣時士大夫皆以和為不可而如圭與王庶曽開户部侍郎李彌遜監察御史方庭實言之尤力庭實疏言臣自靖康以至今日每論議和之無益徒竭民膏血坐困中國沮將士之氣啓姦雄之謀此臣愚陋自守所見而不敢附會其説以欺陛下今使人以江南詔諭為名或傳陛下欲屈膝受詔則臣不知所謂也嗚呼誰為陛下謀此也天下者中國之天下祖宗之天下羣臣萬姓三軍之天下非陛下之天下陛下躬聰明勇智之資傳嗣正統有祖宗積纍之基有長江之險有甲兵之衆羣臣萬姓三軍皆一心欣戴陛下如子弟之從父兄手足之扞頭目陛下縱未能率勵諸將尅復神州尚可保守江左何遽欲屈膝於敵乎陛下縱忍為此其如中國何其如先王之禮何其如天下之心何甲戌提舉萬壽觀韓肖胄簽書樞密院事乙亥以肖胄為大金奉表報謝使樞密副都承旨錢愐副之丙子金國詔諭使張通古簽書宣徽院事蕭哲至行在言先歸河南地徐議餘事以左僕射府館之監察御史施庭臣為侍御史庭臣抗章力贊和議故有是除命下中外駭愕丁丑起居郎劉一止試中書舍人司農寺丞莫將賜同進士出身除起居郎都省翻黃下吏部兼權吏部尚書張燾試吏部侍郎晏敦復言仰惟陛下聖孝天至痛梓宫之未還念兩宫之未復不憚屈己與敵議和夙夜焦勞懇切孜孜汲汲惟恐後時特以衆論未同故未敢輕屈爾幸而日者上自朝廷下逮百執事之臣小大一心無復異議朝夕進退從容獻納庶幾天聽為回卒不致屈此宗社之福也彼施廷臣乃務迎合輒敢抗章力贊此議姑為一身進取之資不恤君父屈辱之恥核實定罪殆不容誅乃由察官超擢御史夫御史府朝廷紀綱之地而陛下耳目之司也前日勾龍如淵以附會此議而得中丞衆論固已嗤鄙之矣今庭臣又以此而躋橫榻一臺之中長二皆然既同鄉曲又同腹心惟相阿附變亂是非豈不紊國家之紀綱蔽陛下之耳目乎衆論沸騰方且切齒而莫將者又以此議由寺丞而擢左史如淵庭臣庸人也初無所長但知觀望而將姦人也考其平昔奚所不為陛下奈何遽與此輩斷國論乎至於議和則王倫實為謀主彼往來敵中至再四矣今其為言自己一二事之倪端蓋亦可見自朝廷有屈己之議上下皆已解體儻成屈己之事則上下必至離心人心既離何以立國伏願陛下戒之重之所有施庭臣莫將除命更合取自聖旨指揮於是將庭臣皆不敢拜時張燾既力詆拜詔之議秦檜患之燾亦自知言切恐得罪遂托疾在告檜使樓照諭之曰北扉闕人上欲以公為直院然亦假途耳公疾平宜早出燾大駭曰果有是言愈不敢出燾乃不主和議者若使中草國書豈能曲循意旨哉燾嘗思之不過一去今日之事其去在我一受遷官他日以罪去則事由人矣檜不能奪遂止己卯吏部侍郎晏敦復户部侍郎李彌遜梁汝嘉權吏部尚書張燾給事中兼直院樓照中書舍人兼翊善蘇符權工部侍郎蕭振起居舍人薛徽言同班入對上奏曰臣聞與衆同欲是以濟事自古人君施設注措未有不以從衆而成違衆而敗者伏見今日屈己之事陛下以為可士大夫不以為可民庶不以為可學士不以為可如是而求成臣等竊惑之臣等竊聞敵使入境伴使北向再拜問金帥起居此故事也然軍民見者或至流涕夫人心戴宋如此雖使者一屈猶為之不平況肯使陛下不顧羣議斷而行之萬一衆情不勝其忿而王雲劉晏之事或見於今日陛下始有追悔之心恐亦晚矣傳曰衆怒難犯專欲難成合二難以安國危之道也臣等職在論思竊聞輿議不敢緘默伏望聖慈俯同衆情毋遂致屈而緩圖之不勝幸甚奏燾所草也新除權禮部侍郎兼侍講尹焞言伏見本朝戎敵之禍亘古未聞中國無人致其滑亂乃再啓和議於今日意欲僣圖混一臣妾中國使人之來以詔諭為名以割地為要欲與陛下抗禮於庭復使陛下北面其君則降也非是和也今以不共戴天之讎與之和且猶不可況實降乎時近臣皆入焞以疾固辭新命乃上此疏又移書秦檜言及敵使在庭天下憂憤若和議一成彼日益強我日益怠則中國號令皆從敵出國事廢置皆從敵命侵尋朘削天下有被髮左袵之憂讒間疑二將帥有誅戮奪權之害姦宄生心大勢奈何今之上䇿莫如自治自治之要內則進君子而逺小人外則賞當功而罰當罪使主上之孝悌通於神明主上之道德成於安強勿以小智孑義而圖大功不勝幸甚檜得其書已不樂讀至小智孑義之語大怒之庚辰尚書右僕射秦檜見金國使人于其館受國書以歸前一日從官既對上乃召王倫責其取書事倫見北使張通古以一二䇿動之通古亦恐遂請用明日或曰時欲行此禮檜未有以處因問給事中樓照照舉書高宗諒隂三年不言之句以對檜悟於是上不出而檜攝冢宰受書通古猶索百官備禮迎其書檜乃命三省樞密院吏朝服乘馬導從時上特以皇太后故俯從敵約而檜必欲屈己天下咎之大事記曰建炎之初內有綱外有澤此可為之一機也而汪黃以主和失之紹興之間內有鼎外有浚此又有為之一機也而秦檜以主和失之失此二機天地之大義不立使我高宗抱終天之痛可深惜哉蓋當時大臣任事者張趙朱吕數人惟浚在外鼎在內至公血誠相與扶持此議然浚終始主戰鼎始主戰終主守則鼎之規模已與浚少異若頤浩勝非雖內有平賊之功而外但為避狄之謀則皆不知此義者也大將用命者張趙韓嶽數人張浚謂諸六將惟飛世忠可倚大事而二人必欲掃強敵壞和議則真知此義若光世之沈酣酒色不喜恢復每每退屯而俊不受行府之命不與劉錡共功不與世忠同謀但與沂中為腹心以附秦檜之和議而已則皆不知此義者也是則諸臣之不知義者多矣而南渡百年公論獨切齒于一檜者何也蓋汪黃壞之於事勢未定之時而檜壞之于事機垂成之日為可恨也諸公之言和者依違於其間而檜獨斷然為南自南北自北之説也他相或一年或二年或不數月而檜獨相二十年之久也方其入相之初朝士皆動色相賀惟晏敦復目之為姦人然向子忞於紹興之初與胡安國論曰與檜同時被執軍前鮮有生者獨檜盡室而歸非大姦能如是乎當時安國猶以為忠其子寅猶以子忞之言為過則檜之姦可以欺賢人君子也如此方檜之初主和曰我有二䇿可以聳動天下今無相不可行及再主和也曰臣恐亦有未便欲望更思慮三日又三日曰臣恐别有未便知上意堅確不移乃乞決和議不許臣下干預則檜之姦足以欺聖主也如此檜雖以和議斷自聖衷而人心公議終不可遏爭之者臺諫則張戒常同方庭實辛次膺侍從則桑汝嘉蘇符樓照張九成曾開張燾晏敦復魏矼李彌遜郎官則胡珵朱松張廣凌景夏宰執則趙鼎劉大中王庶舊宰執則李綱張浚其他如林季仲范如圭常明許欣潘良貴薛徽言尹焞趙雍王時行連南夫汪應辰樊光逺交言其不可大將嶽飛韓世忠亦深言其非計而胡銓乞斬王倫秦檜孫近一疏都人喧騰數日不定人心亦可知矣諸公之議憤激懇切而終不足以折檜者則有説矣謂梓宫不可還今還矣謂太后不可復今復矣謂陜西河南之地不可得今可得矣謂敵不可信今可信矣此檜之所以能排衆議也然不能復讎雪恥而使吾君抱終天之痛以為孝悌不能自復土宇而乃乞丐於仇讎之戎狄以立國家此如圭所謂相臣以為忠而不知身陷于大不忠主上以為孝而不知身陷于大不孝樊光逺所謂金人詭詐不足憂而信實深可懼其可信愈甚則其可懼愈甚皆至論也一人之私不能以勝千萬人之公雖檜亦末如之何也初酈延既陷第六將李世輔為宗弼所喜纍遷知同州及敵廢偽齊世輔乃與其徒王世忠頓遇等潛謀遣使臣白彥忠等持書抵川陜宣撫副使吳玠使出兵為外應是冬左監軍薩里罕自大同之陜西見左都監拔束議割地事比過同州世輔乃偽稱足疾伏兵州廨因犒其從者醉而悉殺之遂縳薩里罕上馬欲以南歸敵騎追及之世輔等數十人決圍而出且戰且前至五丈原追騎益衆世輔度衆寡不敵乃解薩里罕縳折箭為誓縱之使去洛水溢世輔無舟不得渡敵人又會兵斷其歸路世輔遂奔夏州其家皆為敵所殺宋史全文卷二十中欽定四庫全書宋史全文卷二十下宋髙宗十二己未紹興九年春正月乙酉新監昭州鹽倉胡銓簽書威武軍節度判官廳公事宰相秦檜參知政事孫近言銓昨上書專詆臣等若不陳乞稍加甄敘則是臣等身為輔弼區區與小官挍曲直失大臣體故有是命丙戌以金人來和大赦天下赦文曰乃上穹開悔禍之期而大金報許和之約割河南之境土歸我輿圖戢宇內之干戈用全民命提舉臨安府洞霄宫徐俯上表賀曰禍福倚伏情偽多端恐未盡於事機當復勞於聖慮湖北京西宣撫使嶽飛表曰救暫急而解倒垂猶之可也欲長慮而尊中國豈其然乎又曰謂無事而請和者謀恐卑辭而益幣者進願定謀於全勝期收地於兩河唾手燕雲終欲復讎而報國誓心天地尚令稽首以稱藩飛幕客張節夫之文也秦檜讀之大怒提舉醴泉觀王倫賜同進士出身除同簽書樞密院事充迎奉梓宫奉還兩宫交割地界使知閣門事藍公佐副之許嵗貢銀絹共五十萬匹兩戊子先是祕書省正字范如圭轉對言兩京版圖既入則九廟八陵相望咫尺而朝修之使未遣何以仰慰神靈下遂民志上悽然曰非卿不聞此言遂命遣使秦檜以如圭不先白已始怒之知廣州連南夫上封事曰臣竊惟大金素行凶詐比年以來兩國皆墮其術中大槩彼以和議成之此以和議失之今陛下果推赤心信之以其割河南之地遂恩之乎陛下於太上有終天之别於金人有不戴天之讎方且許還河南之地彼其計實老子所謂將欲取之必固豫之兵法所謂不戰而屈人兵之術也誰不怒髮衝冠握拳嚼齒而痛憤哉陛下方感其恩遂無赫怒整旅之志蓋用心不剛則四肢委靡將士雖欲斷髮請戰有不可得誰為陛下守四方者是陛下十有餘年寵將飬兵殫財曲意之計一旦積於空虛不用之地倒持太阿交手而付之矣臣伏讀正月五日赦文曰戢宇內之干戈又奉聖旨不得詆斥大金如此直墮其術中使忠義之士結舌而不得伸忠良之將縮手而不為用臣恐將士解體魚潰獸散如張良所謂誰與取天下者陛下方遣侍從宗臣祇謁宫廟陵寢將親見宫室之禾黍陵寢之盜掘此政詩人倣徨不忍去之憂也恐有扶老擕幼感泣而聽語者少者之哭哭其父與兄也老者之哭哭其子也陛下追悼其因是誰之過歟河南之民何啻百萬昔日樂生今日效死因民之欲北嚮為百姓請命而以王師甲兵之衆隨之河北之人必有簞食壺漿以迎王師此臣所以願陛下因而圖之也南夫又為表賀曰雖虞舜之十二州昔皆吾有然商於之六百里當念爾欺秦檜大惡之己丑北使張通古與韓肖胄先行韓世忠伏兵洪澤鎮詐令為紅巾俟通古過則劫之以壞和議世忠將郝抃密告其事故通古自真和由淮西以去通古性聰敏秦檜以胡銓封事示之通古一覽即能誦庚寅責授袐書少監永州居住張浚復提舉臨安府洞霄宫浚上疏言燕雲之舉其鑒不逺敵自宣和以來挾詐反覆傾我國家蓋非可結以恩信事以仁義者蓋自堯舜以來人主奄有天下非兵無以立國未聞委質夷狄可以削平禍難逺而石晉近而叛豫著人耳目歷歷可想戰國之時楚懷王入覲于秦一往不返逮今千載之下為之痛心由辨之不早也新除權尚書禮部侍郎兼侍講尹焞為徽猷閣待制提舉萬夀觀兼侍講焞以議和不合力辭新命章十上乃有是旨焞五辭不拜乙未監明州比較務楊煒獻書于參知政事李光論和戎事大略以謂屬者金人求和乃遣詔諭使至以無禮臣我舉國喧譁議論不一閣下召來造朝遽復合為一黨寂然無聲有識者謂閣下非不知利害之曉然所以然者賣諂取執政爾金人割中原為一大餌以釣江南今欲竭一方求實中原不知空空之地孱老孤寡既不可賦所謂按月所支一切調度何從出乎加之供奉禮物動計百萬異時以有限之財充無厭之敵是以江海實漏巵爾日者乃始揭榜都城有曰敵人並無須求煒所不識也諸公蒙蔽天聽是何異掩耳竊鍾也哉丞相秦公專誤國之謀傾心黠敵參政孫公平生齪齪謹畏天下初不以此責之如閣下姑欲愛惜名位隨羣而入逐隊而趨亦以謂敵必可信和必可講則請直以此書上之天子置以典憲煒所不辭丙申金右副元帥宗弼始以割地詔下宿州丁酉詔發運經制司去發運二字以戶部長二一員兼領戊戌同簽書樞密院事王倫為東京留守兼權開封尹提舉醴泉觀郭仲荀副留守己亥萬夀觀使雍國公劉光世為陜西宣撫使川陜宣撫副使吳玠為四川宣撫使內陜西路階成等州聽節制如舊上諭輔臣曰河南新復境土所命守臣專在拊循遺民勸課農桑各使因其地以食因其人以守不可移東南之財力虛內以事外也祕書省正字汪應辰上疏言和議既諧則因循無備之可畏臣願陛下痛心嘗膽以圖中興勿謂和好之可以無虞而思患預防常若敵人之至也何至以中國之大而下為讎人役哉辛丑詔內侍省副都知藍安石賜贈保寧軍節度使可特與賜諡渡江後宦者賜諡始此夏國主乾順以李世輔為鄜延岐雍等路經略安撫使二月癸丑京城副留守郭仲荀乞兵與糧上曰朕今日和議蓋欲消兵使百姓安業留司豈用多兵但得二三千人彈壓內寇足矣至如錢糧亦只據所入課利贍養官兵他日置𣙜場不患無錢豈可虛內以事外耶新除左通直郎尹焞固辭待制侍講之命且言臣職在勸講蔑有發明期月之間病告相繼坐竊厚祿無補聖聰比嘗不量分守輒及國事識見迂陋已驗于今迹其庸愚豈堪時用伏望檢會纍奏放歸田里詔焞日下供職秦檜讀焞奏見時用二字深銜之戊午新除太常少卿謝祖信復為殿中侍御史前一日上諭秦檜曰朕欲用祖信為臺官恐祖信不知朝廷今日事機卿等可召赴都堂與之議論檜奏臺諫乃天子耳目朝廷闕失所當論列恐呼召至廟堂然後除授不能無嫌上曰大臣朕股肱臺諌朕耳目本是一體若使臺諌幾察大臣豈朕責任之意耶然檜卒不召己未尚書右僕射秦檜上徽宗皇帝陵名曰永固詔恭依主管台州崇道觀王銓言後周叱奴皇后陵實以為名不可犯且叱奴皇后夷狄也尤當避檜大怒提舉臨安府洞霄宫李綱知潭州提舉臨安府洞霄宫張浚知福州時浚未聞命又上疏言竊惟今日事勢處古今之至難一言以斷之在陛下勉強圖事而已又具劄子曰自陛下回駐臨安甫閲嵗時聖心之所經營朝論之所商確專意和議莫不幸其將成矣臣意敵力弱未暇姑借和以怠我之心勢盛有餘將求故以乘吾之隙理既甚明事又易見料敵上䇿還梓宫復母后輿地來歸不失前約結歡篤好以怠我師遲遲數年兵無戰意然後遣一介之使持意外之詔假如變置大臣更立后妃將何以塞請敵出中䇿則必重邀求責微禮失約爽信近在期年中原之地將有所付敵出下䇿怒而興師直臨江表勢似可愕而天下之亂或從此而定矣新除徽猷閣待制尹焞固辭新命且言臣前所陳述乃事君之大義人臣之常分盡出誠實非為矯偽上察其誠以焞提舉江州太平觀焞又請追還職名不許壬戌新知福州張浚復資政殿大學士充福建路安撫大使兼知福州癸亥御史中丞勾龍如淵起居郎施庭臣並罷其後秦檜擬如淵知遂寧府上曰此人用心不端遂已己巳判大宗正事士㒟兵部侍郎張燾辭往西京朝謁陵寢壬申醴泉觀使趙鼎知泉州鼎寓居會稽秦檜猶忌其逼乃以逺郡處之己卯臨安府火庚辰日中見黑子月餘乃沒吉州免解進士周南仲上書言臣於去年奏陳十事陛下既賜召命又取十事而行其一二矣臣不避斧鉞採取天下輿論有五不可三急務以為今日獻所謂五不可者欲雪前羞不可主和議欲務萬全不可失機會欲復中原不可居東南欲馭諸軍不可不將將欲得賢才不可廢公論所謂三急務者一曰重國柄二曰蓄邊略三曰擇守令三月丙申知漳州廖剛試御史中丞剛首奏臣職在搏擊姦邪當思大體若乃捃托細故矜一得於狐之微則非本心他日入對又言今經費不支盜賊不息事功不立命令不孚及兵驕官冗之弊蓋不一其原則在於人主之一身若意誠心正以照臨百官則是非不紊姦邪洞見天下之弊可次第革矣中書言昨修執政拜罷録詳略失中本末差舛詔史館重行編修秦檜之初免相也上以御劄斥其罪而一時制詔拜罷録具焉檜欲滅其迹故有是請丁亥和州防禦使璩為保大節度使封崇國公甲午詔璩赴資善堂聽讀祿賜如建國公例四月己未新荆南路安撫大使李綱提舉臨安府洞霄宫初綱奏辭新命又上疏言臣迂踈無周身之術動致煩言亟奮亟躓上纍陛下知人任使之明實有關於國體故有是命甲子孟庾為河南府路安撫使兼知河南府充西京留守路允迪為應天府路安撫使兼知應天府充南京留守戊辰上謂大臣曰韓世忠欲獻駿馬朕命留以備用世忠曰今和議已定豈復有戰陳事朕曰不然敵雖講和戰守之備何可少弛朕方復置茶馬司若更得西馬數萬匹分撥諸將乘此間暇廣武備以戒不虞足以待強敵矣和議豈足深恃乎庚午上謂秦檜曰陜西諸將既叛復來緩急金人敗盟難以責任朕謂中原尚可從容圖治至如陜西五路徑兵良將所出他時當用腹心之臣可也己亥詔韓世忠張俊及隨行將佐並賜燕臨安府治上以世忠持身廉特賜建康永豐墟田千頃世忠辭不受司農卿莫將論財用五説曰冗官濫費𣙜法虛文名色輕隱錢幣輕荒儲積不固詔權戶部尚書梁汝嘉與將同措置五月甲申太常少卿周葵守殿中侍御史趙鼎之始相也葵在臺中嘗連章極論趙子淔不可用語侵鼎坐是不得其言而去逮秦檜獨相意葵必憾鼎再引入臺一日內降差除四人葵言願陛下以仁祖為法大臣以杜衍為法檜始不樂戊子判大宗正事士㒟兵部侍郎張燾朝謁永安諸陵前二日士㒟等至河南民夾道歡迎皆言久隔王化不圖今日復得為宋民有感泣者陵下石澗水自兵興以來久涸二使到水即日大至父老驚嘆以為中興之祥甲午尚書都官員外郎丁則知道州祕書省正字汪應辰通判建州樞密院編修官趙雍通判瀘州皆以論事忤秦檜故出之樞密院計議官曾䋖提舉淮南東路茶鹽公事自淮南復置監司而鹽事以漕臣兼領至是復置官提舉壬寅詔自今百官並久任有如僥冒陳乞之人取旨黜責時殿中侍御史周葵論自頃大臣市恩而不任怨爵賞輕而人有奔競之心刑罰弛而下無畏服之意風俗不靖職此之由左迪功郎張行成獻詢蕘書二十篇其首曰定謀次曰審勢次曰議都三篇次曰議地二篇次曰議蜀二篇次曰立志次曰遣使次曰任相次曰蓄力次曰建親次曰搜竒次曰省官次曰惜榖次曰實內二篇六月辛酉權吏部侍郎謝祖信知潭州祖信既力論趙鼎落職於是章氏諸孫咸集闕下再謀理訴併及史事上偶知之謂執政曰聞章惇家有人欲陳訴以趙鼎去便謂事有更變此事乃出朕意鼎何豫聞有從官為之主議者執政奏謝祖信章氏子壻也遂命出守宰臣秦檜乞以上所賜御書真草孝經刻之金石以傳示後世上曰十八章世人以為童蒙之書不知聖人精微之學不出乎此也朕宫中無事因學草聖遂以賜卿豈足傳後檜請再三乃從之甲子提舉江州太平觀胡交修兼翰林學士中興後學士三入者自此始己巳士㒟張燾自西京朝陵還入見燾奏疏言夷虜之禍上及山陵瞻望柏城至于慟哭雖誅討殄滅之未足以雪此耻而復此讎也祖宗在天之靈震怒既久豈容但已異時躬行天罰得無望於陛下乎伏望益修武備以俟釁隙起而應之電掃風驅雲徹席捲盡俘醜類告功諸陵如是然後盡天子之孝而為人子孫責塞矣上問諸陵寢如何燾不對惟言萬世不可忘此賊上黯然龜鑑曰痛哉張燾之謁陵寢也上問如何燾不對惟言萬世不可忘此賊石澗水至之祥父老驚嘆而西京遺民夾道歡迎皆言久隔王化不圖今日復得為宋民者乘此機也撫定遺民汛掃舊物修車備器以修宣王東都之會庶幾可也夫何敵去而舞上恬下愈惟曰韓肖胄等充報謝使而已秦檜加少保加國公而已大赦天下誇示竒功而長安咫尺王曰遄歸故老含涕而絶望黃河嗚咽以流悲檜之肉其可食乎此紹興八年九年之間虛老嵗月坐失機會秦檜主和之議沮之也燾又言頃劉豫初廢人情洶洶而我斥堠不明坐失機會今又聞敵於淮揚作筏及造繩索甚多諸將以朝廷嘗有不得遣間探指揮遂不復遣敵人姦猾廣置耳目我之動息彼無不知敵之情狀我則漠然不聞臣又見黃河船盡拘北岸悉為敵用往來自若此無一人敢北渡者又言酈瓊部伍皆西陲徑兵今在河南尚可收用新疆賦租已蠲而使命絡繹推恩支費猶用兵興時例願加裁損非甚不得已勿遣使以寬民力又論陜西諸帥皆不相下動輒喧爭請置一大帥使之節制燾所言皆切中時務而秦檜方主議和惟恐少忤敵意故事皆不行四川宣撫使吳玠薨于仙人關治所年四十七訃聞詔輟朝二日贈少師賻帛千匹玠御下嚴而有恩故士樂為之死其後制置使胡世將問玠所以勝於其弟璘璘曰敵令酷而下必死每戰非纍日不決然其弓矢不若中國之徑吾常以長技洞重甲於數百步外又據其形便爭出鋭卒與之為無窮以沮其堅忍之勢至於決機兩陳之間則璘有不能言玠後諡武安初富平既失律蜀口屢危金人必欲以全取勝獨賴玠以為固由是蜀人至今思之壬申簽書樞密院事樓照至長安留十餘日李世輔因遂説夏人南歸夏人多懷土獨與願從者二千人來照聞之因與宣諭使周聿皆以書招世輔歸朝癸酉澧州軍事推官韓紃除名勒停送循州編管坐傾險懷姦動搖國計也時紃上書論議和非計故竄之乙亥王倫自京城赴金國議事初右副元帥宗弼密言於金主亶曰河南之地本達蘭宗磐王謀割與南宋二人必隂結彼國今使已至汴京未可令過界倫有雲中舊吏𨽻宗弼帳下密來謁倫告以宗弼誅達蘭倫具言于朝乞早為之備而秦檜但奏趣倫過界倫將使指北行時宗磐等謀為變遂命中山府拘倫且會本路簽軍以復取河南為名將作亂丁丑夏國主乾順薨秋七月己卯朔金主亶執其領三省事宋國王宗磐充國王宗雋滕王宗英虞王宗偉先是金人吳矢者謀反下大理獄事連宗磐等辛巳皆坐誅丁亥秦檜留身論治道上曰御衆以寬朕於宫中未嘗輕用鞭朴往者劉豫苛虐聞此間仁政即以為笑趙鼎屢勸朕勵威朕不謂然今得失之效何如哉檜言陛下與豫勢異豫之叛逆人所不與非劫以威不能茍延嵗月陛下承祖宗之德惟仁政可懷逺邇上因歷述古今帝王治迹專以仁祖為法是日王倫至中山府為金人所拘甲午詔三省催促刑部將今赦未檢舉人速其事因申省取旨以久旱用言者請也丁酉命四川制置使胡世將兼權主管四川宣撫使司職事世將自成都馳赴河池己亥秦檜言陛下齋居蔬食以祈天雨澤考之典禮惟當損太官常膳上曰雖損膳豈免日殺一羊天意好生朕實不忍既而雨應庚午王倫在中山府始聞金國內變俄傳都元帥宗弼昨夜抵城外已還祁州矣少頃引接者令倫等赴元帥府辛丑臨安府火八月己酉復淮南諸州學官員簽書樞密院事樓照自鳯翔東歸甲寅新夔州路提點刑獄喻汝礪行駕部員外郎汝礪始以勾龍如淵薦故得召及對首論願革近時文章骫骳之習以還西京典雅鴻奧之風起中興博大混一之氣又論蜀中之力何以屈非兵屈之官之冗者屈之也非官之冗者屈之士大夫之濫賞者屈之也官之冗賞之濫濫與冗偕焉取人之父兄子弟所以相飬活之具而潰敗磔犁之吾國幾何而不屈乎吾國屈矣於何而可以伐人之國乎上甚嘉納且面諭曰不見卿久矣英論如昔遂下所奏之疏付中書秦檜使人諭以上將用君君宜與時髙下毋妄言汝礪不答翌日遂有是命戊午金都元帥宗弼殺魯國王昌于祁州昌臨刑謂宗弼曰我死之後禍必及爾宜早圖之辛酉吏部員外郎徐度言新復州縣遺民久罹暴虐如州之僚屬縣之令佐最為近民尤當謹擇上曰度所論極當新疆百姓久被虐政若州縣官非其人朕之德意何以自逹乙亥初金人欲得王威趙榮已遣還之韓世忠遺秦檜書曰榮威不忘本朝以身歸順父母妻子悉遭屠滅相公尚忍遣之無復中原望耶檜慚乃令榮威自六合趨淮西而去丙子命常州津遣通微處士陳得一赴史館補修奉元歷九月庚寅朔龍神衛四廂都指揮使李世輔言初歸朝日有父母兄弟之讎臣曾報復乞待罪詔世輔有功鄜延特放罪後四日引對便殿上諭曰卿忠義歸朝立功顯著乃起復故官賜名忠輔除樞密院都統制俄又賜名顯忠癸未樓照言川陜既分屯人馬已將自兵興以來創生科敷悉行蠲免凡八十餘萬貫石上曰四川久屯大兵不無科須今故地歸復兵各分遣得以減罷遂可愛養民力矣上欣然喜見於色胡世將為川陜宣撫副使置司河池諸路並聽節制世將精神明悟間習吏治其守成都甚有政績至是就用之世將既除宣副諸將皆賀世將語之曰世將不能騎射不知敵情不諳邊事朝廷所以遣來者襲國朝之故事以文臣為制將爾自今以往軍中事務皆不改吳宣撫之規摹世將有所未逹諸公明以指示或諸公有所未逹者亦當奉聞各推誠心勿相疑忌共濟國事可也諸將皆拜謝初資政殿大學士張守帥江西以郡縣供億科擾煩重上疏請蠲積欠損和買罷和糴及裁減軍器物料上欲行之時秦檜方損度支為月進且日虞四方財用之不至也覽疏怒謂人曰張帥何損國如是守聞之嘆曰彼謂損國乃益國也至是成都闕帥檜遂擬以守代胡世將上曰張守素弱豈堪逺道江西盜賊寧息人方安之無庸易也檜乃止庚寅罷經制司其諸路常平事令提刑兼領用曾統奏也常平法起於西漢嵗豐則斂歉則散後世講之尤詳秋成則斂春飢則散可以平物價抑兼并人有接食官無折閲法至良也辛卯樓照奏以閣門祗候知同州郝抃知陜州上問秦檜曰陜州合差是何臣寮檜曰舊繫差文人上曰武臣作郡往往不曉民事又多恣橫今日所還州郡久陷夷偽尤須守臣得人使之愛養百姓武臣非所任也可自今只差文臣庶能宣布德澤亦以收還威柄冬十月辛亥詔侍從各薦士二人時言者請遵祖宗故事詔中外各舉所知特加親擢如此則庶僚無附下之嫌大臣免招權之謗上亦以中原隔絶遺才必多故有是命同簽書樞密院事王倫始見金主亶于御林子倫致上命亶悉無所答令其翰林待制耶律紹文為宣勘官問倫還知元帥罪否倫對不知又問無一言及歲幣却要割地但知有元帥豈知有上國倫曰昨者簽宣蕭哲以國書來許割河南歸梓宫太后天下皆知上國尋海上舊盟與民休息使人奉命通好兩國耳癸丑權吏部尚書兼史館修撰張燾知成都府兼本路宣撫使四川制置司限二月結局初成都謀帥上諭秦檜曰張燾可付以便宜使治成都第道逺恐其憚行檜退召燾諭旨燾曰君命也燾其敢辭上大喜遂有是命上諭檜曰燾雖安撫一路如四川前日無名橫斂不急冗費可令蠲減以寬民力以成都帥臣而得行四川民事自燾始庚午詔新成都府路安撫使張燾令引對燾奏蜀自軍興以來困於征繇民力凋弊官吏既不加恤又從而誅剝之去朝廷逺無所赴訴臣俟至部首宣陛下德意俾一路之民咸沾惠澤上曰豈惟一路應四川寬恤事件悉委卿措置燾因奏臣入界即行詢訪民間一利一害先次罷行官吏有貪冒慘酷為民之蠧者臣先次放罷續行按發庶幾逺民速霑實惠上皆可之燾又言今兹和議甫定征戰暫息亦可謂間暇之時矣况來年嵗在庚申乃藝祖開基之載得非陛下中興之時乎時不可失願陛下鑒詩人間暇之語稽孔孟發明之意汲汲專以治政刑為務上曰朕當書此語置之座右乙亥簽書樞密院事樓照乞賜告省侍于明州上謂宰執曰羣臣之有親者朕未嘗奪其情昨蕭振以親為言亦令奉親而來庶使不失為臣為子之道今照可給假迎侍湖北京西宣撫使嶽飛來朝初乘氏人李寶少無賴尚節氣鄉人號為潑李三飛入朝寶願歸軍中飛以為馬軍未之竒也寶怏怏與其徒謀北歸事露飛盡斬之寶抗言欲歸者寶也衆皆不預飛竒而釋之寶願歸山東會合忠義人立功飛許之寶募得八百人赴飛軍飛乃以寶統領軍馬屯龔城金主亶復遣耶律紹文至驛諭奉使王倫言卿留雲中無還期及貸之還曽無以報反間二我君臣乃遣副使藍公佐先歸論嵗貢正朔誓表册命等事而拘倫以俟報已而遷之河間遂不復遣十一月己丑故追復左通直郎直龍圖閣張所特與一子官仍賜其家銀絹百匹兩先是湖北京西宣撫使嶽飛言所忠義上命復舊官飛又言好生惡死人之常情所以忠許國義不顧身雖斧鉞在前凛然不易其色乞與旌加褒異使天下忠義之士皆知所勸故有是命戶部侍郎周聿言陜西士人學術各荒拙於為文若與四川類試必不能中程乞别立字號上曰陜西久陷偽境朕欲加惠逺方可令禮部措置川陜分類試額自此始庚寅右正言陳淵入對論比年以來恩惠太泛賞給太厚匪頒賜豫之費太過府庫空虛而發之不已財賦匱竭而取之益詳陵寢未成郊祀不逺內有諸將之饋外有鄰境之好所用既衆而所入實寡此臣所甚懼也臣願陛下凡有錫賚法之所無而於例有疑者三省得以共議户部得以執奏有司得以獻其疑臺諫得以論其失一有失當即行改正則前日之弊庶幾可息矣翌日進呈上謂宰執曰朕未嘗有一毫之妄費秦檜曰淵初除諫垣職在規正故耳上曰淵老成有學乃楊時之壻聞嘗講論語中庸可令其子適進來上因論極髙明而道中庸此不可分作二事檜等曰陛下之學深造聖域非臣下所及十二月辛酉參知政事李光罷光與右僕射秦檜議事不合於上前紛爭且言檜之短殿中侍御史何鑄因劾光狂悖失禮光引疾求去上命以資政殿學士出守言者又擊之後三日以光提舉臨安府洞霄宫宗正丞鄭鬲乞以常平錢於民輸賦未畢之時悉數和糴從之上謂宰執曰常平法不許他用惟時賑荒恤飢取於民者還以豫民也己巳給事中兼侍講劉一止起居郎周葵並罷初一止葵皆以言事忤秦檜二人應詔舉左宣教郎吕廣問廣問嘗為李光屬官光欲除館職檜不許殿中侍御史何鑄即奏二人非知廣問特迫於光之囑而舉之是欺陛下也詔一止葵落職與宫祠新陜西轉運副使李唐孺為四川轉運副使女真萬戶呼沙呼北攻蒙兀部糧盡而還蒙古追襲之至上京之西北大敗其衆於海嶺金主亶以其叔呼勒瑪為招討使提點夏國韃靼兩國市場韃靼者在金國之西北其近漢地謂之熟韃靼食有粳稻其逺者謂之生韃靼止以射獵為生性勇悍然地不産鐵故矢鏃但以骨為之遼人初置市場與之回易而鐵禁甚嚴至金人始弛其禁又劉豫不用鐵錢繇是河東陜西鐵錢率自雲中貨於韃靼韃靼得之遂大作軍器焉庚申紹興十年春正月辛巳先是金人遣奉使官知閣門事藍公佐南歸議歲貢誓表正朔册命等事且索河東北士民之在南者癸未右正言陳淵入對言自公佐之歸聞金人盡誅前日主議之人且悔前約以此重有要索臣謂和戰二䇿不可偏執上語淵曰今日之和不惟不可偏執自當以戰為主秦檜奏曰臣度近日上封言臣等罪陛下掩蔽者多矣上曰凡上書朕無不覽若言卿等過咎豈可不令卿等知却令積成大過耶乙酉李誼假資政殿學士充迎護梓宫奉迎兩宫使京畿都轉運使莫將副之誼不受命乃以將充迎護使知閣門事韓恕副之戊子提舉臨安府洞霄宫李綱薨于福州綱之弟校書經早卒綱悼恨不已會上元節綱臨其喪哭之慟暴得疾即日薨年五十八甲午詔作忠烈廟于仙人關以祠吳玠丁丑提舉江州太平觀尹焞遷一官致仕以焞引年告老故也右正言陳淵言伏見近者所命之使有所升黜且趣其行今急於遣使而不及其他則知虜不能無求然我有不可許者如取河北之民則失人心用彼之正朔則亂國政至於歲幣之數多未必喜寡未必怒與多不若寡之為愈蓋和戰兩途彼之意常欲戰不得已而後和我之意常欲和不得已而後戰或者必欲多與之幣以幸其久而不變則無是理願訓所遣之使俾無輕許以誤大計癸卯上謂大臣曰莫將奉使金國凡所議者可一一録付恐將妄有許可他日必不能守乙巳布衣歐陽安永獻祖宗龜鑑詔户部賜束帛二月辛亥主管侍衛馬軍司公事劉錡為東京副留守仍兼節制軍馬癸丑詔曰永惟三歲興賢之制肇自治平爰暨纍朝遵用彜典頃緣多事洊展試期致取士之年屬當宗祀冝從革正用復故常可除科場於紹興十年仰諸州依條發解外將省殿試更展一年於紹興十二年正月鎖院省試三月擇日殿試其向後科場仍自紹興十二年省試為準於紹興十四年令諸州依條發解用御史中丞廖剛之言也丁巳喻汝礪知遂寧府汝礪本勾龍如淵所薦又與李光相知光罷因求去改除潼州府路轉運副使汝礪至官以表謝上略曰顧臣何知立節有素方延和廷議既不能割地以賂戎暨偽楚滔天又不忍聨名而賣國時人稱之張鼎特改合入官鼎為太湖令以薦者得召見上諭大臣令改秩堂除劇縣且曰此因能以任之也若一縣得良令則百姓皆受其賜矣庚申御史中丞廖剛試工部尚書剛每因奏事論君子小人朋黨之辨反覆切至又論人君之患莫大於好人從已若大臣惟一人之從羣臣惟大臣之從則天下事可憂剛本秦檜所薦至是滋不悅他日因對又請起舊相有人望者處之近藩重鎮檜聞之曰是欲置我何地耶既積忤檜遂出臺而剛之名聞天下西京留守孟庾為東京留守兼權知開封府庚午上與秦檜論川陜財賦上曰將帥漕臣皆當體國為一家士卒固欲拊循民力亦須愛惜豈可妄費也癸酉御史中丞王次翁言吏部審量濫賞皆顯然暴揚前日之過舉蓋害陛下之孝治望悉罷纍降指揮從之先是新知太平州秦梓知泰州王㬇皆以恩幸得官及是次翁希檜旨以為之地繇是二人驟進三月丙戌成都府路安撫使張燾始至成都初燾自京洛入潼關已聞金人有敗盟意逮至長安所聞益急燾遽行見川陜宣撫副使胡世將為言和尚原最為要衝自原以南則入州路散失此原是無蜀也世將曰蜀口舊戌皆精鋭最號嚴整自朝旨撤戍之後關隘撤備世將雖屢申請未見行下公其為我籌之燾遂為世將草奏具言事勢危急乞速徙右護軍之戍陜右者還屯蜀口又請賜料外錢五百萬緡以備緩急辛卯尚書吏部員外郎朱松知饒州以右諌議何鑄奏其懷異自賢也丙申大金賀正旦使蘇符自東京歸初洪晧既拘冷山希尹問以所議十事晧折之希尹曰汝性直吾與汝如燕遣汝歸議遂行會莫將繼來議不合囚之涿州事復變符至東京虜人不納乃還夏四月丁未知建康府漂水縣李朝正召赴行在先是江東制置大使葉夢得言朝正到官二年招集歸業人户萬餘磨出隱漏稅賦四萬貫石匹兩委有顯效乞稍加試用以風能吏上召對既而謂秦檜曰近時縣令以政績被薦往往别除差遣不若與之進秩還任庶久則民安其政乃遷一官賜五品服遣還癸丑右承議郎范振上書論雇募耆戶長等十事乙卯上謂輔臣曰朕昨夕閲振書所論皆民間利病其言多可采遂以振知南安軍振建陽人也壬戍東京副留守劉錡入辭上命錡以所部騎司之軍往戍又益以殿前司兵三千人諸軍家屬皆留順昌就糧惟精兵分戌陳汴乙丑淮西宣撫使張俊乞免其家歲輸和買絹三省擬每歲特賜俊絹五千匹庶免起例上以示俊因諭之曰諸將皆無此獨汝欲開例朕固不惜但恐公議不可汝自小官朕拔擢至此須當自飭如作小官時乃能長保冨貴為子孫之福俊皇悚力辭賜絹俊喜殖産其罷兵而歸也嵗收租米六十萬斛庚午詔復置四川諸州學官員壬申簽書樞密院事韓肖胄知紹興府五月甲申詔徽宗皇帝御製閣以敷文為名丙戌金都元帥宗弼入東京留守孟庾以城降初左副元帥魯國王昌既廢偽齊乃言不如因以河南地錫與大宋宗弼力不能爭及昌誅宗弼始得政以歸地非其本計決欲敗盟遂分四道入寇命聶哷貝勒出山東薩里罕寇陜西李成寇河南而宗弼自將精兵十餘萬人與孔彥舟酈瓊趙榮抵汴至是犯東京遂命使持詔遍抵諸郡知興仁府李師雄知淮寧府李正民皆束身歸命自是河南諸郡望風納欵矣金人陷拱州守臣王慥死之敵薩里罕趨永興軍陜西州縣偽官所至迎降逺近震恐丁亥東京副留守劉錡至順昌府金人陷南京葛王褎以數千騎至宋王臺留守路允迪朝服出城見之遂送允迪于汴京或曰允迪至汴京七日不食死戊子四川宣撫副使胡世將在河池知同州張恂遣人告急權知永興軍郝逺開長安城門納金人長安陷關中震動知陝府吳琦城守以拒金人郝逺遣人持金國檄書至宣撫司語不遜不可聞世將焚之斬其使己丑直龍圖閣陳桷守太常少卿時上將用桷問其所在秦檜不樂之繆以同姓名者為對曰見從韓世忠軍為參謀上笑曰非也桷佳士豈肯從軍耶遂召用金人陷西京權留守李利用棄城遁庚寅知順昌府陳規得報敵騎入東京時新東京副留守劉錡方送客規以報示錡錡曰吾軍有萬八千人而輜重居半且逺來力不可支乃見規問曰事急矣城中有糧則能與君共守規曰有米數萬斛錡曰可矣規亦力留錡共守錡又見劉豫時所蓄毒藥猶在足以待敵其所部選鋒遊奕二軍及老幼輜重夜四鼓才至城下旦得報敵騎入陳距順昌三百里闔城惶惑錡遣官屬與規議斂兵入城為捍禦計人心稍定辛卯詔以鎮江府所籍酈瓊水陸田四十三頃賜李顯忠四川宣撫副使胡世將自河池遣涇原經略使田晟以兵三千人迎敵始金人之渡河也惟孫渥吳璘墮胡世將在河池世將倉卒召諸帥議出師楊政及晟先至渥進曰河池地平無險阻願公去此治兵仙人原元戎身處危地而欲號令將帥使用命赴敵渥不識也吳璘抗聲言曰和尚原殺金平之戰方璘兄弟出萬死破敵時承宣在何許今出此懦語沮軍可斬璘請以百口保破敵世將壯之指所坐帳曰世將誓死於此矣官屬韓詔等進曰渥實失言不冝居幕下遂先遣晟還涇原渥赴熙河渥恐懼汗落單馬趨出是日統領軍馬李寶與金人戰于興仁府境上殺數百人獲其馬甚衆寶嶽飛所遣也壬辰劉錡召諸將計事有欲就便舟順流而下者或曰去則敵人邀我歸路其敗必矣莫若守城徐為之計錡曰錡本赴官留司今東京既陷幸全軍至此有城池可守機不可失當同心力以死報國家衆議始定即鑿舟沉之示無去意錡與屬官等登城區處城外有居民數千家恐為賊巢悉焚之分命諸統制官許青守東門賀輝守西門鍾彥守南門杜把守北門且明斥堠及募土人作鄉導間探於是軍人皆奮曰早時人欺我八字軍今日當為國家立功錡親於城上督工設戰具修壁壘時守備全缺錡取偽齊所作蚩車以輪轅埋城上又撤民家屋扉以代笓籬笆凡六日粗畢而金人遊騎已渡河至城外矣丙申胡世將命右護軍都統制吳璘將二萬人自河池赴寶雞河南以捍寇遣楊政郭浩為之聲援先是世將屢奏乞速徙右護軍之屯陜右者還屯蜀口不報丁酉始詔世將日下抽回己亥萬夀觀使雍國公劉光世為三京招撫處置使以援劉錡以統制官李貴步諒之軍𨽻之庚子詔右護軍都統制吳璘同節制陜西諸路軍馬以金人犯陜西故也又詔川陜宣撫副使胡世將軍事合行黜陟許依張俊所得指揮辛丑提舉醴泉觀鄭億年乞在外宫觀改提舉亳州明道宫初邊報至行在從官會于都堂工部尚書廖剛謂億年曰公以百口保金人講和今已背約有何面目尚在朝廷億年氣塞秦檜以為譏己也乃曰尚書曉人不當如是億年懼求去乃有是命是日金人犯鳯翔府之石壁寨吳璘遣統制官姚仲等拒之仲自奮身督戰舍赫貝勒中傷退屯武功時楊政母病方死亦不顧家徑至河南與璘協力捍敵已而諸軍家屬悉歸內地人心既定踴躍自奮不復懼敵矣先是金人之别將又圍耀州節制陜西軍馬郭浩遣兵救之敵解去壬寅金人圍順昌府先是劉錡於城下設伏敵遊騎至擒其千戶阿哈薩等二人詰之云韓將軍在白龍渦下寨距城三十里錡夜遣千餘兵擊之頗殺敵衆既而三路都統葛王褎及龍虎大王軍併城下凡三萬餘人錡以神臂弓及強弩射之稍引去復以步兵邀擊溺于河者甚衆奪其器甲及生獲女真漢兒皆謂敵已遣銀牌使馳詣東京告急於都元帥宗弼矣六月甲辰京東淮東宣撫處置使韓世忠為太保封英國公淮西宣撫使張俊為少師封濟國公湖北京西宣撫使嶽飛為少保並兼河南北諸路招討使樞密院降檄書下諸路宣撫司罪狀烏珠薩里罕令頒之河南陜西應南北官員軍民如能識運乘機奮謀倡義生擒烏珠或斬首來歸者大則命以使相次則授以節鉞各賜銀絹五萬匹兩良田百頃第宅一區至如薩里罕資性貪愚同惡相濟昨在同州已為李世輔擒縳博頰求哀僅脫微命尚敢驅率其衆復犯關陜有能併殺擒獻者推賞一如前約丙午給事中兼侍講馮楫提舉亳州明道宫金人叛盟秦檜以其言不讎甚懼一日謂楫曰金人背盟我之去就未可卜前此大臣皆不足慮獨君鄉衮未測上意君其為我探之明日楫入見曰金人長驅犯順勢須興師如張浚者且須以戎機付之上正色曰寧至覆國不用此人檜聞之喜楫云適觀天意楫必被逐即引疾求去乃有是命戊申東京副留守劉錡為樞密院副都承旨沿淮制置使時敵衆圍順昌已四日乃移寨於城東號李村距城二十里錡遣驍將閭充以鋭卒五百募土人前導夜劫其寨至軍中氈帳數重朱漆奚車有一將遽被甲呼曰留得我即太平不聽竟殺之是夕天欲雨電光所燭見辮髮者殱之甚衆既而報金都元帥宗弼親擁兵至先是宗弼得告急之報即索靴上馬麾其衆出京頃刻而集適淮寧留一宿治戰具備糗糧自東京往復千二百里不七日而至錡聞宗弼至近境乃登城會諸將於東門問䇿將安出或謂今已屢捷冝乘此勢具舟全軍而歸錡曰朝廷養兵十五年正欲為緩急之用况已挫敵鋒軍稍振雖多寡不侔然有進無退兼敵營近在三十里而四太子又來援吾軍一動被敵追及老小先亂必至狼狽不惟前功俱廢致敵遂侵兩淮震動江浙則平生報國之志反為誤國之罪不如背城一戰於死中求生可也衆以為然求欲效命己酉四川宣撫副使胡世將命都統制吳璘楊政以書遣薩里罕約日合戰其略曰璘等聞之師出無名古之所戒大金皇帝與本朝和好復歸河南之地朝廷戒飭諸路安靜邊界不得生事諸路遵稟朝廷約束不敢毫髮有違今監軍忽舉偏師侵暴疆場人神共憤莫知其故璘等身任將帥義當竭誠報國保捍生靈已集大軍約日與監軍一戰薩里罕於是遣鶻眼郎君以三千騎直衝我軍都統制李師顔以驍騎擊走之鶻眼入扶風縣城守薩里罕别遣軍䇿應不能勝而退師顔等攻扶風拔之生擒金敵一百十七人首領三人别遣禆將擊鳯翔西城外敵寨薩里罕怒自戰於百通坊列陳二十餘里統領姚仲等力戰破之殺獲尤多庚戌工部尚書廖剛與外任剛以事積忤秦檜右諌議大夫何鑄等即共劾剛幸朝廷之有警復肆譊譊以惑縉紳故有是命尋以剛提舉亳州明道觀壬子金都元帥宗弼攻順昌府先是宗弼至城外責諸將用兵之失衆曰今者南兵非昔之比國王臨城自見宗弼見其城陋謂諸將曰彼可以靴尖躍倒耳即下令來早府治會食平明敵併兵攻城凡十餘萬府城惟東西兩門受敵錡所部不滿二萬而可出戰者僅五千賊先攻東門錡出兵應之賊敗退烏珠自將牙兵三千往來為援皆𢃄重甲五人為伍貫韋索號鐵浮屠每進一步即用拒馬子遮其後示無反顧復以鐵騎馬左右翼號拐子馬悉以女真充之前此攻所難下之城並用此軍故又名長勝軍時敵諸將各居一部衆欲擊韓將軍錡曰擊韓雖退烏珠精兵尚不可當也法當先擊烏珠烏珠一動則餘軍無能為矣時叛將孔彥舟酈瓊趙榮輩騎列于陳外有河北簽軍告官軍曰我輩元是左護軍本無鬭志惟兩拐子馬可殺故官軍皆憤時方劇暑我居逸而彼暴露早涼則不與戰逮未申時彼力疲而氣索錡忽遣數百人出西門敵方來接戰俄以數千人出南門戒令勿喊但以短兵極力與戰統制官趙樽韓直皆被數矢戰不肯已錡遣屬扶歸士殊死鬭入敵陳中斫以刃斧至有奮手捽之與俱墜于濠者敵大敗殺其衆五千橫尸盈野烏珠乃移寨於城西掘塹以自衛欲為坐困官軍之計是夕大雨平地水深尺餘錡遣兵劫之上下皆不寧處乙卯順昌圍解宗弼之未敗也秦檜奏俾錡擇利班師錡得詔不動至是宗弼不能支乃作筏繫橋而去宗弼至泰和縣卧兩日至陳州數諸將之罪自將軍韓常以下皆鞭之於是復以葛王褒守歸德府常守許州翟將軍守陳州宗弼自擁其衆還汴京自是不復出矣丙辰湖北京西宣撫司統制官牛臯及金人戰于京西敗之戊午右承事郎陳鼎降一官鼎上書言敵敗盟秦檜怒言者因論鼎故有是命俄又送吏部以鼎知德興縣己未樞密院都統制郭浩遣統制官鄭建充等集鄜延環慶之兵攻金人于醴州敗之復醴州壬戌簽書樞密院事樓照以父居明卒去位甲子權主管鄜延經略司公事王彥拒金人于青溪嶺却之初薩里罕既破鳯翔與都統制吳璘楊政夾渭河而陳璘駐兵大蟲嶺薩里罕自登西平原覘之曰善戰者立於不敗之地此難與爭乃引去自涇原路欲走邠州於是樞密院都統制郭浩在邠州三水縣涇原經略使田晟遣統制官曲汲秦弼拒敵於青溪嶺宣撫副使胡世將謂浩素非臨行陳之人難以責成即遣彥及統制官楊從儀程俊向起鄭師正曹成等分道而出與虜戰蒿谷吳頭麻務屯之間金人屢敗留千户五人守鳯翔薩里罕自將鋭兵攻青溪汲弼戰敗棄青溪走世將命晟召汲弼斬於軍前以徇彥率兵迎金人戰盤堠兔耳敗之金人去復還屯鳯翔乙丑荆湖北路提點刑獄公事向子忞罷先是江西漕司負月樁錢詔總領官曽慥劾罪子忞行部取漕吏釋之慥言于朝故罷子忞再使湖北先聲入境姦吏望風解印綬者數十人湖北營田舊以抑配百姓人不聊生有破産不能償者日號訴于馬前子忞為詢究其便利可行者使遵守之罷一切抑配者逺近鼓舞時嶽飛兼營田大使無敢忤其意者至是飛亦喜以為當然子忞按部所至立大榜於前云久負抑州縣不理者立其下於是積年無告之寃咸得伸雪平生好論人物無所忌諱嘗與胡安國談當世士安國頗稱秦檜靖康時事子忞曰與檜同時被執軍前鮮有生者獨檜數年之後盡室航海以歸非大姦能若是乎安國子寅初猶以為過後乃信服子忞再以毁去自是間居十九年初命司農少卿李若虛往湖北京西宣撫使嶽飛軍前計事至是若虗見飛于德安府諭以面得上旨兵不可輕動冝且班師飛不聽若虛曰事既爾勢不可還矯詔之罪若虛當任之飛許諾遂進兵丙寅湖北京西宣撫司統領官孫顯及金人戰于陳蔡之間敗之上謂大臣曰朕躬履艱難久於兵事至於器械亦精思熟講昨造大鏃箭諸軍皆謂頭太重不可及逺又造鋭首小鎗初亦未以為然其後用以破敵始服其精利今劉錡軍于順昌城下破敵正為此鎗也戊辰川陝宣撫司左統領官曹成自汧陽襲金人于天興縣敗之庚午樞密副都承旨沿淮制置使劉錡為武泰軍節度使侍衛親軍馬軍都虞候前一日上諭大臣曰用兵之際賞罰欲明錡以孤軍挫賊鋒烏珠遁去其功卓然當便除節鉞即日降制既又遣中使撫問上賜札有曰卿之偉績朕所不忘京東淮東宣撫使韓世忠遣統制官王勝率背嵬將成閔北伐遇金人于淮陽軍南二十里水陸轉戰掩金人于沂河死者甚衆奪其舟二百福建路宣撫大使張浚言臣竊念自羣下決回鑾之計國勢不振事機之會失者再三向使敵出上䇿還梓宫歸兩殿供須一無所請宗族隨而盡南則我德敵必深和議不拔人心懈怠國勢寖微異時釁端卒發何以支持臣知天下非陛下之有矣今幸上天警悟敵懷反復士氣尚可作人心尚可回願因權制變轉禍為福用天下之英才據天下之要勢奪敵之心振我之氣措置一定大勳可集繼聞淮上有警連以邊計奏知又條畫海道舟船利害上嘉浚之忠遣中使奬諭浚時大治海舟至千艘為直指山東之計以俟朝命閏六月丙子詔三衙管軍及觀察使以上各舉智勇猛略才堪將帥者二人戊寅上曰狂敵犯境諸軍不免調發盛夏劇暑朕蔭大厦御絺綌猶不能勝其熱將士乘邊暴烈日被甲胄每念薰灼之苦如切朕躬可降詔撫問慰勞之辛巳涇原經略使田晟及金人戰于涇州敗之初薩里罕既為王彥所却遂自鳯翔悉兵攻涇州晟據山為陳乘敵壁壘未定奮兵掩殺自己至申連戰皆捷奪其戰馬兵械甚衆金人敗走甲申上曰諸將進兵所在克捷正恐狃於屢勝士寖以驕可下詔飭其嚴整行伍明逺斥堠蓄力養威以俟大舉勿爭尺寸之利期以殄滅金帥而已上又曰金人雖讎敵茍知效順何以多殺為馬欽等初歸朕貸而不殺劉光世屢以為言既而女真契丹燕人來歸者益衆光世方悟朕意至今諸軍往往收以為用今交兵之際正宜多方撫納使知內嚮是日田晟及金人再戰于涇州敗績金人雖幸勝晟亦殺傷過當而還自是歸鳯翔不復戰以兵攻陜西諸郡城守未下者河南糧食垂盡世將亦離河池登仙人原山寨為防秋之計保險以自固矣丙戌淮西宣撫司都統制王德復宿州降其守閣門宣贊舍人馬秦壬辰湖北京西宣撫司統制官張憲傅選及金將韓常戰于頴昌府敗之復穎昌丙申張憲復淮寧府先是韓常既敗走宣撫使嶽飛遣統制官牛臯徐慶等與憲會憲等與常戰于淮寧府又敗之常引去飛以勝捷軍統制趙秉淵知府事丁酉提舉臨安府洞霄宫趙鼎責授祕書少監分司西京興化軍居住初鼎罷郡還邵興上書言時政秦檜忌鼎復用乃令御史中丞王次翁劾鼎右諫議大夫何鑄亦再疏論之乃有是命湖北京西宣撫司統制官郝晸張應韓清克鄭州京東淮東宣撫司統制官王勝克海州生執守將王山韓世忠每出軍必戒以秋毫無犯軍之所過耕夫皆荷鋤而觀戊戌淮西宣撫使張俊克亳州初三京招撫使劉光世聞酈瓊在亳州遣使臣趙立南京進士蔡輔世同往招之瓊不啓書而焚之械送獄既而縱之至是光世引軍還太平州而俊以大軍至城父都統制王德已下宿州即乘勝趨亳州與俊會瓊聞之謂葛王褒曰夜義公來矣其鋒未易當請避之遂率衆遁去時俊軍戌甚盛而智謀勇敢賴德為多德亦先計後戰故未嘗敗己亥知順昌府陳規知廬州沿淮制置使劉錡兼權知順昌府時秦檜將班師故命規易鎮淮右先是上賜錡空名告身千五百命書填將帥之有功者錡復繳上謂不若自朝廷給之為榮至是始具功狀以聞以犒軍銀帛十四萬匹兩均給將士軍無私焉於是錡方進兵乘敵虛而檜召錡還徽猷閣待制洪皓時在燕山密奏順昌之役敵震懼喪魄燕之珍寶悉取而北意欲捐燕以南棄之王師亟還自失機會可惜也龜鑑曰敵至宿亳王德得以破其營敵至穎昌嶽飛得以殺其將或捷於鳯翔或捷於寶雞或捷於扶風又皆吳璘楊政保蜀守蜀之功而敵之回軍直趨濠州我諸將得以聯兵制之當是時也無一人不勇無一戰不勝蓋不止有一月三捷之告非敵前此不善戰也直以我師正鋭所向無前吾觀金將告烏珠曰今者南兵非昔日比而敵兵望見王師且曰此順昌旗幟也亟退避之除凶雪耻此蓋可乘之機也撫機不發何為也耶庚子趙鼎再責清逺軍節度副使潮州安置右諫議大夫何鑄章再上遂有是命制略曰朋姦罔上惡殆並於共兜專利擅權罪實侔於楊李秋七月癸卯湖北京西宣撫使司將官張應韓清入西京初河南府兵馬鈐轄李興既聚兵先復伊陽等八縣又復汝州偽河南尹李成棄城遁走河陽宣撫使嶽飛遣應清與之會遂復永安軍丙午御史中丞王次翁為參知政事戊午上曰朕常與諸將論兵諸將皆謂敵人鐵騎馳突若在平原勢不可當須據險以扼之朕謂不然孟子曰天時不如地利地利不如人和兵之勝負顧人心如何耳苟人心協和則彼雖在平原亦可取勝諸將皆不以為然今諸將奏捷皆在平原以步兵勝鐵騎乃信朕前日之語己酉湖北京西宣撫使嶽飛自與宗弼戰于郾城縣敗之殺其禆將是役也統制官楊再興單騎入敵陳欲擒宗弼不獲被數十創猶殺數百人而退庚戍永興軍路經略副使王俊遣統領官辛鎮與金人戰于長安城下敗之川陜宣撫副使胡世將遣兵千人具舟百艘載柴草膏油自丹州順流而下至河中府焚毁金人所繫浮橋及選萬人由斜谷出潼關皆以絶敵歸路壬子進士張本特補右迪功郎以其獻佑政編可採也乙卯湖北京西宣撫司都統制王貴統制官姚政及金人戰于潁川府敗之壬戌湖北京西宣撫使嶽飛自郾城班師飛既得京西諸郡會詔書不許深入始傳令回軍軍士應時皆南嚮旗靡轍亂飛望之口呿而不能合良久曰豈非天乎飛以親兵二千自順昌渡淮赴行在於是潁昌淮寧蔡鄭諸州皆復為金人所取議者惜之甲子復釋奠文宣王為大祀用太常博士王普請也於是祀前受誓戒加籩豆十有二其禮如社稷八月壬申降詔提舉江州太平觀張九成與知州軍差遣喻樗陳剛中令吏部與合入差遣凌景夏樊光逺與外任差遣毛叔度與對移一般差遣先是九成等皆言和議非計及是秦檜將罷兵而九成家臨安之外邑故斥逺之尋以九成知邵州剛中知安逺縣景夏知辰州光逺為閬州州學教授叔度為嘉州司戶參軍剛中尋卒于貶所乙亥韓世忠圍淮陽軍命諸將齊攻之帳前親隨成閔從統制官許世安奪門而入大戰于門之外閔身被三十餘創世安亦脛中四矢力戰奪門復出閔氣絶而復蘇者屢矣世忠大賞之别將解元掩擊金人于沂州談城縣敵溺死者甚衆丙子劉昉為荆湖南路轉運副使昉為秦檜所喜故旋用之戊寅知陜州吳琦遣統制官侯信渡河劫金人中條山寨敗之獲馬二十匹翊日又戰于解州境上敗之殺其將毛罕庚辰金人自滕陽來救淮陽軍韓世忠逆擊于泇口鎮敗之是日世忠所遣統制官劉寶郭宗儀許世安以舟師至千秋湖陵遇金人所遣酈瓊叛卒數千人寶等與戰大捷獲戰船二百壬午李成自河陽以五千騎犯西京知河南府李興命開城門以待之成疑不進興遣鋭士自他門出擊之成敗走癸未上與宰執論戰守之計上曰戰守本是一事可進則戰可退則守非謂戰則為強守則為弱但當臨機應變而已丙戌祕閣修撰新知邵州張九成落職以御史中丞何鑄言其矯偽欺俗故有是命九成以家艱不赴丁亥淮北宣撫副使楊沂中潰軍于宿州壬辰永興軍路經略副使王俊擊金人于盩厔縣東敗之甲午川陜宣撫司同統制邵俊統領王喜遇金人于隴州汧陽縣牧羊嶺敗之九月壬寅朔遣起居舍人李易赴韓世忠軍前議事宰相秦檜主罷兵召湖北京西宣撫使嶽飛赴行在遂命易見世忠諭旨時淮西宣撫副使楊沂中還師鎮江府三京招撫處置使劉光世還池州淮北宣撫判官劉錡還太平州自是不復出師矣丁未楊政軍同統領楊從儀劫金人于鳯翔府城南寨獲戰馬數百戊申金人復入西京先是李成數為河南府李興所敗乞師于宗弼得蕃漢軍數萬興度衆寡不敵棄城去寓治于永寧之白馬山己酉上諭大臣曰朕昨面諭嶽飛凡為大將者當以天下安危自任不當較功賞彼以功賞存心者乃士卒所為至於朝廷待大將亦自有禮如前日邊報之初除諸將便加師保豈必待有功乎時飛已至行在故上訓及之庚戌合祀天地于明堂太祖太宗並配赦天下癸丑楊政軍統制官楊從儀邵俊統領王喜敗金人于汧陽辛酉臨安府火延燒省部倉庫冬十月丙戌河北路統制李寶至楚州時韓世忠在楚州寶與其徒歸之世忠大悅己亥龍圖閣直學士范沖徽猷閣待制王居正並落職依舊提舉江州太平觀御史中丞何鑄論二人之罪故有是命庚子熙河經略司將領惠逢與虜遇于野龍河敗之十一月戊申金將哈希自潼關出犯陜州守臣吳琦擊却之哈希羅索孫也鳯翔府同統制楊從儀敗金人于寶雞縣己酉上曰自古為天下者必先得人心未有專事殺伐殘忍而可為者烏珠雖強專以殺伐殘忍為事不顧人心之失朕知其無能為者福建安撫大使張浚等奏乞措置賑濟事上曰賑濟本為貧民近世止及城郭而鄉村之民未嘗及之須令州縣雖僻處亦分委官吏必躬必親則下戶皆沾實惠矣乙卯川陜宣撫副使胡世將奏已遣兵解慶陽之圍先是慶陽圍急帥臣宋萬年乘城拒守會世將招河東經略使王忠植以所部赴陜西會合行至延安叛將趙惟清執忠植使拜詔忠植曰若本朝詔書則受金國詔書則不拜也惟清執之以詣敵營敵使甲士引詣慶陽城下諭使出降忠植大呼曰我河東步佛山忠義人也為敵所執使來招降願將士勿負朝廷堅守城壁可也忠植遂遇害戊午上曰用兵惟視謀之臧否不可問力之強弱茍謀之不臧惟知恃力雖或勝亦不足以成功十二月乙未言者請令諸大帥各薦偏禆之可任者上曰諸校智愚勇怯朕皆熟知之儻有使令便可抽摘何用薦舉耶兵部侍郎張宗元乞命有司以續降朝旨便人合理者裒為一書以進許之後九年乃成凡四百三十五卷初李興既屯白馬山寨李成以蕃漢數萬衆圍之時興妻周氏與其子居襄陽惟幼子在側敵圍益急士心頗搖興聞謂諸將曰興與諸君當以死守毋有二志茍或不敵吾豈為敵汚者當抱是兒南向投崖以謝天子諸將皆感泣由是守益堅虜遣使賫黃榜招興以奉國上將軍河南尹興得檄不啓立斬其使以檄聞于朝白馬受圍久方冬泉涸軍民乏絶興焚香默禱一夕大雪泉源皆溢成知興不可屈乃積山下屯兵積糧為久居之計興潛遣將士夜焚之成大挫徑歸西京宋史全文卷二十下
