body:
  text: 宋史全文卷三十宋寧宗三戊辰嘉定元年春正月戊寅右諫議大夫葉時殿中侍御史黃疇若監察御史章燮余崇龜等上言托胄專政無君僭上不道乞梟其首領置之淮甸積尸叢冢之間以謝天下不許辛巳章再上又不許詔曰朕以眇躬獲遵洪業所期恭己治可致於無為乃昧知人失浸成於偏信自奸臣之怙勢畏公議之靡容屏蔽聰明排斥忠直利害莫從而上達威福自得以下移逮兹更化之初亟出求言之令倐再踰於月律猶罕見於奏封豈習俗相仍激昂者寡抑精誠弗至顧忌者多厥今百度未釐二邊未靖人才乏而未究搜羅之術民力困而未明惠養之方救此弊端寧無良䇿乃若針規主失指摘奸邪人所難言朕皆樂聽倘有裨於事實詎敢吝於褒章其或過差務從寬假凡我縉紳之彥暨於芻蕘之微久鬱之懷諒欣聞於申命竭誠以告庶共底於丕平壬午監登聞鼓院王柟自河南通書回持金人牒求韓托胄函首詔侍從兩省臺諫集議丙戌右諫議大夫葉時等復請梟韓托胄函首於兩淮詔三省樞密院詳議以聞壬辰同知樞密院事史彌逺知樞密院事起居郎許奕為金國通謝使閣門舍人吳衡副之二月丁未升天水縣為軍戊申追復故相趙汝愚觀文殿大學士盡敘元官諡曰忠定詔史官應紹熙以來韓托胄事迹及姦言誣史並行改正於是彭龜年孫逢吉吕祖儉以次賜諡録後黨錮諸賢以次召用壬子詔臨安府賑濟流民甲寅雪戊午前四川宣撫使程松授果州團練副使賔州安置甲子罷前吏部尚書劉德秀遺表贈官是月郴州黑風峒寇羅世傳為亂招降之三月癸酉以毛自知首論用兵奪進士第一大恩例戊子詔曰朕臨御以來仰遵纍朝恭儉之規菲食卑宫躬行以移風俗而志勤道逺觀感未孚况姦幸弄權故相同惡上下交利賄賂公行監司郡守並相倣效貪婪無厭狼藉已甚朕方厲精更始申加訓飭以警有位繼自今各務精白一心以承至意其有緣公濟私尚為故態必罰無赦尚其戒哉復秦檜王爵贈諡己丑監登聞鼓院王柟自軍前再還行在議以韓托胄首梟於兩淮壬辰以函首事降黃榜曉諭兩淮荆襄四川乙未詔臨安府遣東南第三副將尹明斫托胄棺取其首送江淮制置大使司是春皇子珀生夏四月丙辰詔後省科别羣臣奏疏可行者以聞贈彭龜年寶謨閣直學士落李沐寶文閣學士戊午韶州安置陳自強再責授復州團練使雷州安置仍籍其家閏四月辛未置拘榷安邊錢物所壬申雨雹癸未皇子珀薨追封肅王諡曰冲靖詔大理三衙臨安府及諸路闕雨州縣決繫囚釋杖以下甲申詔曰朕更化厲精祇若古訓為萬世長策先圖其大者皇太子溫文粹美學問夙成欲使與聞國論通練事機以增茂儲德二三大臣各兼師傅賔僚用申羽翼之助其相與協心輔導成朕愛子之義以綿我家無疆之慶是惟休哉自今再遇視事可令皇太子侍立宰執赴資善堂會議乙酉右丞相兼樞密使錢象祖兼太子少傅參知政事衛涇雷孝友簽書樞密院事林大中並兼太子賔客辛卯以旱禱於天地宗廟社稷癸巳減常膳乙未蠲兩浙闕雨州縣貧民逋賦命大理三衙臨安府兩浙州縣決繫囚丙申幸太一宫明慶寺禱雨丁酉詔曰朕惟祖宗傳序之重祇懼靡遑而去歲以來蝗蝻為灾冬既無雪春又不雨夏且半矣祈禬不應天灾流行固亦有之在於今兹關係實重邊鄙甫定流徙未復漕運不至糴價已增茍失歲事何以保邦傳不云乎屋漏在上知之在下其播告中外凡朕躬不逮朝政闕失田里愁歎軍民疾苦盡言無隱朕將採而用之無小無大惟既乃心稱朕意焉五月辛酉御集英殿賜禮部奏名進士鄭自成等四百二十有六人及第出身甲子太白經天乙丑以飛蝗為灾減常膳丁卯詔侍從臺諫條上闕政監司守令條上民間利害是月初光宗既祔廟當議配享而一朝三相中周必大留正皆嘗以學黨得罪故論者欲用葛邲及是黨禁解必大之子新知筠州綸乞以其父配享廟庭詔兩制禮官詳議其後正之孫祕閣校理元剛復言其祖首侍崇陵講讀後在相位始終六年當以其祖配權禮部尚書章頴乃乞並用二公配享後亦不果行焉六月庚午金人歸大散關辛未歸濠州又歸隔芽關乙亥衛涇罷甲申簽書樞密院事林大中薨於位乙酉以蝗生禱於天地社稷丙戌詔侍從兩省臺諫舉㳂邊守臣辛卯史彌逺兼參知政事秋七月辛丑賜吕祖泰官先是祖泰以上書忤韓托胄配欽州牢城至是改正過名特補上州文學尋改授迪功郎監潭州南嶽廟癸丑丘崈同知樞密院事甲寅許奕歸自北庭八月戊辰出豐儲倉米賑貧民辛未丘崈薨於江隂之里第甲戌侍從臺諫兩省詳議㑹子折閲利害辛巳婁機同知樞密院事樓鑰簽書樞密院事丙戌詔禮部侍郎許奕起居舍人曽從龍考訂監司守令所條民間利害擇可行者以聞其未條上者趣之甲午出米二十萬石賑江淮流民九月己未先是金人遣諭成使完顔侃喬宇來辛丑入見至是以和議成諭天下乙丑大風雨降德音於㳂邊諸州是秋背嵬軍謀議以九月二十八日安資政生祠洛成之日舉事已結連劒利諸軍矣前一夕安公家人夢㕔事下有坐甲者數百是日安公心忽動俄有告變者捕為首八人誅之隆慶府後軍統制官張林知其謀命憲臣宋正仲鞫實獄成當死詔以其有誅叛之功奪防禦使除名嶺南羈管云冬十月丙子錢象祖為左丞相史彌逺為右丞相雷孝友為樞密院事兼參知政事婁機參知政事樓鑰同知樞密院事乙卯褒録慶元上書楊宏中徐範張衜各循一資周端朝林仲麟各免文解蔣傳已亡詔以束帛賜其家庚辰伯祝為安定郡王癸未金主遣使來賀瑞慶節是月詔蔡連追毁出身文字除名勒停配贑州牢城詔賜朱熹諡依條與遺表恩澤太常博士章徠初議諡曰文忠考功郎官劉彌正覆諡議曰諡古也復諡非古也諡法曰諡生於行者也茍當於行一字足矣奚復哉其議略曰六經聖人載道之文也孔氏沒獨子思孟軻氏述遺言以持世斯文以是未墜漢諸儒於經始采掇以資文墨涉隋唐間河汾講學已不造聖賢閫域最後韓愈氏出或謂其文近道耳蓋孔氏之道賴子思孟軻氏而明子思孟軻之死此道幾熄及本朝而又明濓溪橫渠二程子發其微程氏之徒闡其光至公而聖道粲然矣初太常議以文忠諡公按公在朝廷之日無幾正主庇民之學鬱而不施而著書立言之功大暢於後合文與忠諡公似是而非也有功於斯文簡矣而實也本朝歐蘇不得諡文而得之者乃楊大年王介甫介甫經學不得為醇其事業亦有可恨大年政復文士耳文乎文乎豈是之謂乎世評韓愈為文人非也原道曰軻之死不得其傳斯言也程子取之公晚為韓文考異一書豈其心亦有合與請以韓子之諡諡公從之乃諡曰文講義曰此寧宗皇帝轉移士習之穖也慶元以來權幸擅朝僞以排天下之正學黨以空天下之名流人心憤鬱久矣今權幸誅殛天開日明海內翹首以觀維新之化而聖意拳拳首舉節惠之典於文公一時學者知所趨向矣豈非吾道之幸哉黃幹曰先生以一心而窮造化之原盡性情之妙達聖賢之藴以一身而體天地之運備事物之理任綱常之責明足以察其微剛足以任其重𢎞足以致其廣毅足以極其常其存之也虛而靜其發之也果而確其用之也應事接物而不窮其守之也歷變履險而不易本末精粗不見其或遺表裏初終不見其或異繼往聖將微之㫖啓前賢未發之機辨諸儒之得失闢異端之訛謬明天理正人心事業之大又孰有加於此者竊聞道之正統待人而後傳自周以來任傳道之責得統之正者亦不過數人而能使斯道彰彰較著者一二人而止耳由孔子而後曽子子思繼其微至孟子而始著由孟子而後周程張子繼其絶至先生而始著蓋千有餘年之間孔孟之徒所以推明是道也既已煨燼殘缺離析穿鑿而微言絶矣周程張子崛起於斯文湮鬱之餘人心懷蠧之後扶持植立厥功偉然未及百年蹐駮尤甚先生出而自周以來聖賢相𫝊之道一旦豁然大明中天昭晰呈露諡之曰文不亦宜乎丙辰金主璟卒無子金人立葛王褒之子允濟嘉定六年遇弒十一月戊午右丞相史彌逺以母喪去位癸亥皇太子請賜史彌逺第於行在令就第持服許之庚午四川初行當五大錢十二月戊辰左丞相錢象祖罷升嘉興府為嘉興軍杖殺利州忠義人李大用初大用與其徒結集屯駐諸軍欲以某日舉事先縱火焚倉庫然後殺總領轉運及西統制據城為變部分已定其徒趙吉懼事不濟遂詣總領所告變捕得大用即牧場杖死之其徒死者八人賞吉錢千緡送蓬州養老吉行至葭萌縣大用之黨追殺之裂其尸棄之於道取其錢而去李沐再奪三官信州居住戊寅改命曽從龍弔祭金國己卯黎州蠻蓄卜寇邊破州之子寨先是蓄卜之弟悶巴至三衝為人所殺部將趙鼎總轄官魏大受懼生事脅害之土丁以骨價錢三千三百引償之在紹熙五年有白水村者青羌往來渡頭也其民舊與青羌交通慶元初郡徙之安靜寨青羌不以為便乞還之白水開禧二年既而蓄卜又言大受嘗以袍印許之而不獲欲與青羌偕往卭部川假道女兒城以入寇於是寨言於州乞以財帛送都王母令假道知州楊伯昌從之開禧三年至是秋蓄卜遂以兵至三村總轄官董忠顯連告急伯昌命嚴兵待之俄伯昌召去朝奉郎趙公㡯代為守聞羌人且至遣禁兵八十偕土丁往拒之兵至茆坪而蓄卜已渡河軍丁迎敵不勝進攻茆坪寨官軍射退之遂掠三松蠶沙橫山三增白羊諸社又進據茹山而安靜艮溪茆坪谷堆諸寨皆為所隔公㡯函遣西兵正將党壽以所部七十人及土丁俱往策應壽輕敵徑進戰於茹山官軍失利郡又調西兵禁兵之未發者命興元府後軍統制王光世將之以行羌人自茆坪寨下以皮船載生兵渡河寨官李茂引兵至河際射之一舟八人俱溺光世憚羌人勢盛留屯三衝不敢進羌人焚掠既盡乃渡河南歸光世乃僞走捷旗稱㑹合兵丁趕逐羌賊道路已通時並河諸村生業無遺矣癸未前右丞相史彌逺辭賜第許之己丑太府卿宇文紹節為賀金國登位使閣門舍人周登副之是月御筆趙汝愚特贈太師進封沂國公是歲江淮制置大使司汰部淮軍歸農淮東揀刺八千餘人以補鎮江大軍及武鋒軍之闕淮西揀刺二萬六千餘人以為御前武定軍己巳嘉定二年春正月庚子詔內外有司條陳節用之事辛丑金主遣裴滿正孫椿來告哀詔遵議軍聽珍州節制丁巳同知樞密院事樓鑰參知政事御史中丞章良能同知樞密院事吏部尚書宇文紹節簽書樞密院事庚申金主遣蒲察知剛劉仲淵來獻遺留物詔侍從兩省臺諫各舉監司郡守治行尤異者二三人癸亥賜故相趙雄諡曰文定二月己巳金主遣使來告即位庚午黎州蠻寇邊犯艮溪寨官軍與戰敗焉先一日軍正程伯雄引兵至安靜寨翊旦羌賊自聖婆城下引兵二千過河後軍統領王光世自前寨遣兵援之衆寡不敵皆為羌兵掩殺壬申伯雄遣大兵千餘人拒敵西義勇陳於山下禁軍義勇次之土丁義勇陳於河濵布陳甫畢羌人已逼箭鑿皆無所施賊先攻西義勇將官鞠忠引衆走陳遂亂禁軍義勇悉為所圍將官遭適戰死賊乘勢逐官軍至寨下甲戌羌賊乃歸制置司聞之復遣興元府右軍凖備將劉信將移屯兵三百往援合前後所遣義勇而兵凡九百命成都府總管馮興統之而賊去逺矣壬午詔會子折閲日甚侍從兩省以下各條上所見丁亥罷法科試經義六場舊法戊子大風壬辰遣內侍趣前右丞相史彌逺還行在賜第三月丙申雨雹辛丑罷諸軍招軍己酉詔民以減會子之直籍沒家財者有司立還之戊午禁兩淮官吏私買民田庚申命浙西及㳂江諸州給流民病者藥辛酉罷漳泉福州興化軍廢寺田壬戌出內庫錢十萬緡為行在貧民棺槥費夏四月乙丑詔諸路監司督州縣捕蝗戊辰江淮制置司言敢放廬州忠義一萬五百餘人歸農辛未詔有司條上明堂冗費甲申賜行在諸軍死者棺錢戊子賜楊震仲諡曰節毅五月丙申史彌逺起復右丞相丁酉以旱詔諸路監司決繫囚劾守令之貪殘者借補訓武郎羅日願等謀為變日願者江西人開禧之用兵也以策干韓托胄得官充忠義軍統制托胄既誅其黨閩人劉鐸為浙西提刑司檢法官坐口語送大理其詞頗連日願朝廷恐其枝蔓不復治第流鐸於湖南日願不自安且鬱鬱不得志密結惡少是歲春熒惑入太微垣犯左執法日願謂主宫庭及大臣有咎遂與殿前司中軍訓練官楊明及其徒徐濟趙珉等合謀以收黑風峒徭人為名聚衆為亂部分已定有守闕進勇副尉景德常在臨安日願令濟珉邀德常共泛西湖至胭脂嶺以所謀告之且許事成以為户部尚書兼知臨安府德常乃投匭上變事下大理戊戌獄成日願磔於市其徒十二人論死餘悉黥隸廣南及海外州庚子詔侍從兩省臺諫各舉監司郡守有政績才望者二人以補郎官之闕辛丑申命州縣捕蝗癸丑詔兩淮荆襄守令以户口多寡為殿最乙卯釋大理三衙臨安府兩浙州縣杖以下囚除茶鹽賞錢己未以旱詔羣臣上封事庚申禱於天地宗廟社稷六月癸亥朔命浙西諸州諭民種麥豆毋督其租詔臺省及諸路監司速決滯獄戊辰奉安成肅皇后神御於景靈宫乙酉復禱雨於天地宗廟社稷己丑命江西福建二廣豐稔諸州糴運以給行在仍償其費辛卯京湖制置司言放散諸州新軍及忠義二萬六千人餘歸農秋七月癸巳命有司舉行寬恤之政五條乙未詔凶荒州郡七歲以下男女聽異姓收養著為令己亥蠲信陽荆門漢陽軍民賦壬寅命兩淮諸州民給諸州民麥種癸卯募民以賑飢免役甲子聽兩淮諸州民行鐵錢於㳂江八州乙丑安丙為四川制置大使罷宣撫司甲戌御大慶殿冊皇太子丁丑皇太子謁太廟戊寅詔皇太子改名詢己卯黎州蠻復寇邊丙戌出米十萬石賑兩淮飢民九月己亥朝獻景靈宫庚子朝享太廟辛丑合祭天地於明堂赦天下丙午增太學內舍生十貟癸丑命吏部郎官劉爚等審定中外所陳㑹子利害上於朝己未遣大理卿費培賀金主正旦冬十月壬戌以徐邦憲兼知臨安府時都城米價踴貴楮幣不通乞丐之人有羣攫餅餌於傳法寺前者御史臺上章論守臣區處無策邦憲丐免章四上乃免兼知臨安府丁卯命京湖制置司募逃卒及放散忠義以補廂禁軍之闕丁丑金主遣使來賀瑞慶節己丑命兩淮轉運司給諸州民稻種減公私房廊白地錢什三如淳熙故事十一月辛卯朔沔州統制張林等謀作亂事發貸死除名廣南羈管甲午詔浙西監司募飢民修水利乙未以歲飢罷雪宴是月郴州黑風峒寇李元礪為亂黑風洞屯在郴吉之間而地屬郴之桂陽縣初羅孟二者名世傳峒之首酋也去年世傳出掠省地已而受招詔補承節郎去年二月世傳之犯省地也郴州舉人李元礪嘗助官軍擊賊元礪素以武斷鄉曲群盜皆畏之比世傳受招諭功行賞而元礪不及遂去為盜盜推為帥時江湖方艱食飢民及汰兵多附之遂至數萬至是連破吉郴諸縣詔遣荆鄂江池大軍討之十二月壬戌賜李顯忠諡曰忠襄甲子四川制置大使司調官軍渡河與黎州蠻戰官軍大敗乙亥詔諸州毋糴職田租是歲旱蝗楊楚衡郴吉州南安軍盜起庚午嘉定三年春正月甲辰詔曰朕以眇躬君臨方夏明有未燭德有未孚頃緣奸臣妄開邊釁科役繁重人不聊生旱蝗頻仍更不加恤使吾赤子皆轉徙以無依而彼奸民因誘引以為暴靖言致寇敢昧責躬近而淮楚兩郡之間逺則江湖數邑之地生齒遭其蹂躪室廬致於毁焚惕若興懷為之旰食今禁旅揚威而並進鄉豪戮力以爭先震疉無前蕩平有日言念脅從之衆豈皆好亂之氓與其假息以偷生孰若轉禍而為福今則宏開禁網誕布寬書推豫不殺之仁畀爾更生之路倘復舊業即為良民尚惟郡縣字人之官共宣朝廷惠下之澤亟蘇民瘼庸副朕心其楚衡郴吉州南安等處盜賊惟捕渠魁外其餘脅從並行原貸許以自新又詔曰歲比旱蝗民食不登捐瘠流亡良可哀痛朕蠲租發廩日夕惴惴惟恐賑恤弗及亦兾在位有以分朕之憂而監司守令鹵莽具文未副朕意其能按察而無拘攣歟撫字而無刻剝歟不然何吾民不安業而忍為寇盜之歸也繼自今以體國為心以舉職為能旌褒選擢朕不汝靳其或緣奸作邪營私自豐使上德壅於下下怨叢於上厥有常憲斯言不偷毋忽丙午雨土癸丑雷二月辛酉黎州蠻復寇邊官軍失利先是飛虎軍既敗朝廷方議擇黎州守臣會聞大使司已遣官節制乃亟命通判成都府何德彥知黎州節制軍馬用金字牌遞行去年十二月初安癸仲自舊寨歸留統領官傅順董照軍正程伯雄在後寨捍虜至是羌人自艮溪寨下用皮船渡河攻相嶺寨照引所部兵百餘人寨後突出禦之賊登堡子城照又逐之賊自旦至晚不得食走之河岸衆已疲矣西漢地土丁知賊飢困欲馳下勦之照恐分其功戒土丁毋得進會日暮照移泊薑地寨夜羌人秉炬度船若將屯者而滅炬載兵以來詰朝再戰賊兵數倍照不能支乃拔兵而去丙寅新知黎州何德彥至州視事癸仲還眉州未幾總管馮興以制置大使司之命部西兵三百至州賊不復出丁卯前知崑山縣徐挺之縣丞范大雅犯贓刺面配英德府賔州仍籍其家庚午詔楚州武鋒軍歲給纍重錢如大軍例壬午以工部侍郎王居安知隆興府督捕峒寇居安合之黃岩人進士髙第韓托胄死之日自館職擢為諫官俄以事改起居郎又坐他纍奪一官罷去江淮盜起復官知太平州除直龍圖閣兩浙西路提㸃刑獄公事甚有風采乃召為工部侍郎使之平賊居安至江西賊方四出廣南東路安撫使廖俁遏其入嶺之路賊遂出沒洪潭間頃之又移梅嶺摧鋒軍擊賊者殱焉三月丁亥蠲成都府荒歉諸州民間逋負己亥以湖南轉運判官曹彥約知潭州督捕峒寇彥約南康軍人知名士也開禧末除知澧州未上會敵入淮漢彥約攝守漢陽堅守不動用是遷兩官提舉荆湖北路常平公事又遷提㸃刑獄公事庚子賜彭龜年諡曰忠肅甲寅官軍捕殺楚州賊首湖海乙卯罷福建江東路招軍一年丙辰以久雨釋兩浙州縣繫囚夏四月癸亥李元礪犯南雄州游騎至韶州會江湖諸司言元礪請降獨知隆興府王居安有所未白乃少俟之既而居安言元礪降書侮慢有甘罰錢之語賊既不能入廣復犯江西乙丑決行在繫囚釋杖以下丙寅詔泰吉州民經賊蹂踐者監司守臣安集之戊辰出內庫錢二十三萬緡賜行在軍民五月乙未淮賊悉平詔寬恤淮南殘破州縣辛丑廢忠鋭軍甲辰詔去歲旱蝗百官應詔封事兩省擇可行者以聞乙巳命㳂海諸州督捕海寇戊申經理兩淮民田庚戌以江陵忠勇軍為御前忠勇軍癸丑以久雨發豐儲倉米賑貧民是月詔追贈朱熹中大夫寶謨閣直學士門人蔡元定亦特贈迪功郎元定制曰士之遇不遇天也其或擯斥於生前而獲伸於死後天理昭昭未有久而不定者爾問學有源操修無玷杜門著書初無與於世者不幸見誣􅀢遭逺謫今是非已定爾則殂矣朕甚愍之其贈以官慰爾泉下死雖莫贖尚知享哉六月丁巳朔日有食之壬戌命有司舉行寬恤之政十有九條癸亥遣起居郎黃中賀金主生辰己卯楊次山為少保封永陽郡王詔三衙江上四川諸軍主帥核實軍籍欺冒者以贓論是月池州副都統許俊江州都統劉元鼎與李元礪戰於江西皆不利知潭州曹彥約親與賊戰亦為所敗勢愈熾秋七月辛卯申嚴圍田增廣之禁癸卯定南班為三十貟八月乙亥大風拔木是月臨安府蝗九月丙戌朔詔三衙江上諸軍升差將校必以材藝年勞其徇私者臺諫及制置總領核之癸丑遣司農卿錢仲彪賀金主正旦冬十月丙辰朔福州觀察使根為安德軍承宣使乙丑詔四川總領所毋受宣制司節制壬申雷金主遣使來賀瑞慶節丁丑推南雄州戰殁將士恩辛巳廢鄂州都統司威勝軍十一月癸巳賞楚州平賊功乙巳遣朝臣二人往兩淮路與提舉官議收浮鹽李元礪迫贑州南安軍詔以重賞募人擒捕之十二月丙辰詔江淮諸司嚴飭守令安集流民戊午參知政事婁幾罷丙寅兵部尚書兼知臨安府趙師􅋷免兼知臨安府軍器少監兼國子司業陳武免兼國子司業先是府民有因訟行賕者事連武學生柯子冲盧宣德理院案上當贖銅七斤師􅋷書判各決竹箄二十押出府城仍申國子監照會士論譁然諸生乃陳詞於學官學官備申監監以申尚書省及御史臺諫院右學之士亦詣都省投牒執政出語頗抑士士愈不平復羣禀司業及學官於是監學以狀申都省未報武學生周源等遂空學赴監投牒繳納綾紙不肯歸齊其詞大略以為趙帥而不經本監不申朝廷輒取天子之學生撻之公庭之下屏之國門之外蔑視學校不有君父况師本權臣之死黨奴事蘇周賄結貪相奸回駔驓暴虐貪殘實小人之渠魁當時譏之者曰奸邪誰不附韓王師􅋷於中最不臧手拾骰錢諛寵婢身當勸酒舞齊郎叩頭雅拜尊師旦畫膝為書薦自強更有一般人不齒也曽學犬吠山莊此皆小人之不屑為彼乃甘心為之更化之後黨韓之人誅斥殆盡而斯人獨漏網朝廷抆拭而用之者特以小人有材或能辦事今既經年徒聞貪酷前此肆無忌憚特為天子結怨於民今兩生之辱是為天子結怨於士諸生見幾而作多已告假所存無幾源等亦何面目復為天子學生所有勑給綾紙隨狀繳納於是監學繳申臺省且併乞罷黜太學之士亦詣監投牒其略云往歲權臣得志之初始斥逐忤已者五六人然猶未敢加以鞭撻猶有待於畫㫖也今師􅋷乃為權臣之所不為是可忍也孰不可忍也右學諸生已訴之臺省且復相率而去矣竊謂文武雖分而道則同學校雖二而體則一伏乞備申朝廷敷奏施行無使異日天下誦之國史書之曰守臣撻逐天子學生自今日始陳武復為備申都省師􅋷乃上章待罪其自辨數甚悉而理終屈執政知士論不可遏乃畫㫖府尹放罷詔獄官放罪推勘二吏斷勒永不收敘尚書省劄下令學官安職士人歸學又劄臨安府今後兩學士人或因公事合行追會先當申國子監候報乃施行而太學之士復詣檢鼓院進狀學官連銜再乞罷黜方有是命師􅋷既為諸生所攻明年竟以奉祠而去不復再入矣湖南賊羅世傳縛李元礪以降峒寇悉平元礪欲圖世傳而先為世傳所縳其徒就執者二十有八人於是江西湖南安撫司皆言大戰於秋平野生擒元礪而湖南又言本司不敢爭奪已解赴江西矣奏未至會鎮江都統制畢再遇赴召朝論欲遣再遇討之於是元礪已就擒而朝廷未知也辛巳金人遣使來賀明年正旦黎州蠻青羌曳失索請降是歲臨安府紹興府嚴衢州大水賑之仍蠲其賦著作佐郎仲貫府轉對請追爵周敦頤程皓程頤張載列於從祀未克行李心傳曰四先生繼絶學於千載之後正人心明天理自游夏諸賢有不能及其視馬鄭諸儒之功孰多雖以配享可也然論道統之傳則當升曽子子思於堂上而姑列四先生及朱先生於從祀念老矣自念不及與朝廷之議㑹有達者舉行之云辛未嘉定四年春正月己丑馬湖夷都蠻攻嘉定府犍為縣之利店寨陷之馬湖蠻者西爨昆明之别種也其地在梁為南寧州承聖中刺史徐文盛召去有爨􅓖者遂據其地子孫相傳其後分為東西焉西爨之酋姓董氏國初董春惜貢馬詔書嘉納之其後又以板來售蠻自載至敘州江口與人互市官司置場征之謂之抽收場馬湖之地東南接石門亦敘州徼外蠻西南接沙漠虛恨嘉定府徼外蠻及黎雅諸蠻與吐蕃之境而北接敘州之商州寨宣化縣西接嘉定之賴因沐川犍為管下二寨名西北接敘州之宜賔初賴因寨本夷地治平間把截將王文揆始據險立寨侵耕夷人山壩名賴因莊夷人訴之事聞有㫖以其地歸董蠻既而寨民私賂之以償其侵地之稅於是蠻人每歲至賴因謂之索稅其後稅頗增寨民亦厭苦之及是馬湖蠻將入寇而夷都土蠻先以書抵利店寨將言之寨將以為蠻人要索之常不即省歲除之前夕寨民有失牛者夜出求之見火滿四山始疑寇至乃以狀白犍為縣未達而蠻已大入或曰蠻始欲寇中鎮寨中鎮有備不可入聞利店稍富實而寨丁少乃攻之知寨段松悉寨丁七十餘人迎敵或死或逃蠻遂圍其寨寨地勢低蠻人馮髙投木石以擊之衆莫能拒又二日蠻人以雲梯登城松力戰十三合無與援者寨民驚潰自投山水而死亡者數百人松為蠻所執臠割而殺之掠其二子盡劫寨民之資焚其居驅老弱婦女數百人而去甲辰以四川鹽擔錢對減激賞絹一年丙午詔湖南江西諸州經賊蹂踐者監司守臣考縣令安集之實第其能否以聞是月江西西路安撫司捷報至乃命王居安同許俊召募土人識認李元礪正身訖照條盡法施行時居安已械送元礪赴都既被命二月乙卯遂就磔元礪於吉州壬戌俊復言羅世傳生擒元礪已給元所降賞錢二萬緡乞授之官詔授世傳武翼郎閣門只候丙子雪辛巳罷廣西諸州牛稅閏二月甲辰廢淮西武定軍丁未大風辛亥濠州推官鄭宰鍾離縣尉王御犯贓除名刺面配真州詔諸路帥臣監司守令格寧朝廷賑恤之令及盜發不即捕者重罪之三月己未命臨安府賑給病民賜棺錢丙子沔州將劉世雄等謀據仙人原為亂事覺伏誅辛巳馬湖蠻又犯籠鳩堡本路安撫司調移屯西兵二百人戍犍為縣夏四月甲申禁兩浙福建州縣科折鹽酒己丑詔兩淮守臣毋預除代以吳曦沒官田租為關外四州旱傷州縣代輸秋稅詔內外諸軍虛數冒請之人聽自首違者重坐之丙午賜黑風峒名曰效忠錫以銅印羅世傳乞補文資乃改授通直郎簽書節度判官㕔公事命既下守臣王居安遣吏迓之世傳疑不敢出戊申出內庫錢瘞疫死者貧民是月四川制置大使司置安邊司以經制蠻事命成都路提刑李潼川府安撫許奕共領之始議猶欲招安而蠻人玩狎終不肯出大使司議遣兵平之或謂曠日持久勞師費財不如招納之利持論不同由是久不決初聲言某日以兵出寨蠻頗憚之會東帥司揭榜敘州境上大略言本司已與西路商量決無深入之理仰邊民安集毋得驚擾蠻人見之知西路揚聲紿已益無所憚云五月戊辰廢巢縣忠勇軍乙亥御集英殿賜禮部奏名進士趙建大等四百六十有五人及第出身六月丁亥遣户部貟外郎余嶸賀金主生辰會金人為䝉古所攻道不通嶸不至而還降京畿囚罪一等釋杖以下辛丑更定四川諸軍軍額癸卯廢江西敢死軍秋七月壬戌太白晝見丙寅詔四川官吏嘗受僞命者自今毋得敘用丁丑詔軍興以來爵賞冒濫者聽自陳除其罪八月壬辰申嚴太史局補試局生之制九月辛酉敘州蠻寇邊官軍嚴備以待之蠻乃去丁丑遣刑部貟外郎程卓和金主正旦詔附會開邊得罪之人自今毋得敘用乙亥羅世傳為其黨胡有功所殺詔以世傳初命授之李元礪為盜凡三年聲搖吳蜀至是就擒人皆相慶焉冬十月己卯朔命有司更定玉牒凡例甲辰以䝉古攻擾金國命江淮京湖四川制置司謹備邊十一月己酉朔日有食之癸丑賞平峒寇功甲戌申嚴諸軍升差之制十二月辛巳奉議郎張鎡坐扇搖國本除名象州羈管癸未以會子折閲不行遣官體訪江浙諸州講義曰愚讀史記商君列傳見其變法易令必立賞徙木以示信於民喟然歎曰信之為用大矣商君刻薄固不足道然猶知信之不可廢况堂堂大國乎且白中興用楮以來幾年為界界滿則易法之常也自權臣用兵楮之造印日多而楮之折閲日甚上之人急於稱提之故當舊楮之界未滿而新楮之出已頒豪商巨賈囊篋舊藏一旦廢棄盡為無用之物國失大信人啓疑心何怪其畏避而不敢收蓄哉所以新楮頒行之後市井不通反以彌甚小民嗸嗸操楮四走無所易泉幸而得售不啻如有意外之獲推尋其源皆由上失信而下生疑耳雖復今日遣體訪之使明日罪不收之家豈不均為紛紛歟乙巳金主遣使來賀明年正旦是歲金主為䝉古所攻賀生辰使不至金主璟之在位也允濟被命往靖州受黑䝉古進奉見其王特穆津桀傲不遜恐為邊患欲歸白璟除之會璟卒不果在嘉定元年是歲䝉古入貢允濟遣重兵分屯山後欲就進場襲殺之然後引兵深入會金之糾軍有詣䝉古告其事者䝉古疑不信言者再至䝉古遣人伺之得其實遂遷延不進是秋䝉古兵猝至與金人戰於灰河凡三日勝負未分特穆津選精騎三千馳突金軍金軍亂赫舍哩自以大軍乘之允濟急命西京留守赫舍哩執中領大兵迎敵於大勝甸執中者老將也知兵善戰自允濟之立心常不服至是不肯力戰其下觀望遂大敗執中以百騎奔還允濟怒罷之䝉古兵至翠屏口金又大敗乘敗攻奉聖州破之進軍野孤嶺允濟再遣兵迎敵以車為陳又大敗是冬䝉古兵至晉山縣距燕京百八十里壬申嘉定五年春正月己巳詔諸路通行兩浙倍役法著為令壬申賜李孝義諡曰忠壯是月䝉古兵至居庸關金左將軍完顔福海棄關遁金主允濟素鄙吝士不用命允濟議以細軍五千自衛奔南京即開封府會細軍五百人自相激厲誓死迎敵殺䝉古兵數百䝉古兵懼不敢進問所俘鄉民此軍有幾何鄉民紿曰三十萬䝉古懼遂斂兵而退二月壬午罷兩淮軍興以來借補官詔成都府路帥臣兼領敘州兵甲事三月庚戌四川制置大使司遣兵分道討敘州蠻其酋米在請降初大使司知蠻不可致遣興元後軍統制劉雄等二人將西兵千人自嘉敘二州並進又遣本路提刑司檢法官安伯恕往敘州節制之官軍入蠻境方接戰有土丁斷小酋之首蠻人驚潰官軍小捷其酋米在據羊山江之水囤堅不肯降囤在峻灘之中水淺舟不可行濤深人不可涉大使安丙聞之移書李戛曰但聲言伐木造大舟攻其水囤則米在自降矣戛從之米在果請降然不肯受盟邊吏遣土丁十餘人入蠻為質米在乃令其徒數十詣寨納降安邊司盡以十二年稅犒與之米在以墮馬為辭終不出是役也所掠邊民數百人得還者十三人而已戊辰以久雨詔大理三衙臨安府兩浙州縣決繫囚甲戌以廣東湖南京西盜平監司帥臣進職有差丙子申嚴選人捕盜改官法夏四月壬寅詔自今告人從僞者必指事實誣告者坐之五月庚午詔諸路州縣坑治以通判令丞主之癸酉安南國王李龍􅧪卒以其子昊岊為安南國王詔州縣見役人毋納免役錢役滿後輸六月癸未遣吏部郎中傅諴賀金主生辰乙酉禁江北諸州民行銅錢秋七月庚申賞降敘州蠻功戊辰以雷雨毁太廟屋避殿減膳八月甲戌朔御後殿復膳命左右司置進狀籍察前斷之寃抑者罪之九月丙午太白晝見己酉有司上續編中興禮書庚戌遵義寨夷楊煥來獻馬辛未罷㳂海諸州海船錢遣刑部郎官應武賀金主正旦冬十月辛巳詔諸路總領官歲舉可為將帥者二三人安撫提刑舉可備將材者各二人戊子金主遣使來賀瑞慶節癸巳詔侍從臺諫兩省官集議釐正光宗配饗功臣戊戌雷遣使弔祭安南十一月庚申朝獻景靈宫辛酉朝饗太廟壬戌祀天地於圜丘赦天下十二月丁丑再蠲濠州租稅一年壬午詔諸路轉運司參考州縣新舊稅籍蠲其橫增之數己亥金主遣使來賀明年正旦癸酉嘉定六年春正月庚申簽書樞密院事宇文紹節薨詔侍從臺諫兩省官帥守監司各舉實才二三人二月丁丑太白晝見丙戌有司上嘉定編修吏部條法總類丁亥雪乙未詔宗室毋與胥吏通姻著為令三月癸亥參知政事樓鑰罷夏四月丙子同知樞密院事章良能參知政事甲午復法科試經義法仍命雜流進納人毋得試五月丁卯以不雨命大理三衙臨安府決繫囚命四川諸司措置州縣支移錢物上於尚書省戊辰修慶元六年以來寬恤詔令六月乙亥詔刑部歲終上諸州未決之訟於尚書省擇其最久者罪之丁丑遣起居郎黃居誼賀金主生辰金國亂居誼不至而還丁亥復監司臧否守令及監司郡守舉亷吏所知丙辰詔三衙江上諸軍主帥各舉堪為將帥者二三人八月己巳朔詔諸路監司帥臣舉所部官吏之才行卓絶績用彰著者庚午知思州田宗範謀作亂䕫州路安撫使遣兵討平之是月金國弒其主允濟是秋䝉古兵復至山後都元帥完顔福興迎敵而敗允濟黜之復起赫舍哩執中為右副元帥將武藝軍三千往迎敵先是左副元帥南平者迎合允濟之意沮格軍賞衆共怨之執中因人心之憤欲廢允濟以誅南平為名軍至東華門外召南平計事手刃殺之宫中聞變門皆不開執中召細軍大將金燾語之曰吾此來特誅亂臣耳非有叛意也俄而細軍俱來救駕燾諭止之衆憚執中威名無敢動者獨關西大將軍都統完顔善羊引所部五百人至皆為武藝軍所殺執中以善羊驍勇召其父福海令招之善羊大呼告其父曰老賊欲反朝廷何為降之復力戰至午手殺數十人身中數矢而死執中遂進入東華門允濟遣其子蔣王持詔出投於門下募能殺執中者白身除大興尹世襲千户軍民皆無應者執中欲縱火焚門守門將軍合住啓之執中引兵入宫侍衛皆散走進至大安殿允濟望見之遙呼曰聖主令臣何往曰歸舊府耳允濟入後宫邀其后俱出后曰出則被殺矣執中見其久不出遣兵就執之併其妻子囚於舊府遂召豐王珣之長子談哲馬以御寶付之執中尋遣內侍李監丞弒允濟於其府豐王至燕京執中率百官迎於道遂立為帝降允濟為東海侯拜執中太師都元帥領省事封澤王九月甲辰蠲荆湖諸州逋負二十八萬緡有奇閏九月戊辰朔詔御史臺置考課監司簿丙戌以金主新立命四川謹邊備己丑詔湖北監司守令賑恤旱傷癸巳雷甲午右丞相史彌逺等上三祖下七世仙源類譜髙宗皇帝寶訓皇帝玉牒㑹要乙未大雷丙申詔曰朕欽若天命矜愛元元夙夜靡寧惟恐有闕乃後九月氣已屬冬雷未收聲將以警朕惕若只懼只省厥愆二三大臣其悉心叶力交修不逮庸副朕躬仰承天戒焉史彌逺請罷政不許冬十月丁酉朔申嚴互送禁戊申起居舍人真德秀為賀金主登位使閣門舍人周師鋭副之金國亂德秀遂不至而還庚戌遣起居郎李戛賀金主正旦戛亦不至而還辛亥金左監軍髙乞殺其都元帥赫舍哩執中初䝉古兵至紫荆關距燕京一百里執中欲誘其兵南至涿易乃聚兵擊之䝉古破涿易至早河之西欲渡橋執中方病足乘車督戰䝉古兵大敗翊日再戰執中疾甚不能出遣髙乞以糾兵五千拒之失利不至執中欲斬之金主珣以其有功諭令免死執中益其兵令出曰勝則贖罪敗則誅無赦髙乞出戰自夕至曉忽北風大作吹石揚砂不能舉目敵人乘風縱火馳擊之髙乞軍大潰自度必為執中所殺遂引糾軍圍執中之府突入其臥內殺之退詣應天門待罪珣以髙乞掌兵權不敢加罪盡取從執中弒逆之人殺之於是䝉古主特穆津留其大將薩木哈圍燕京及引兵攻取河東北山東諸州甲子金主遣使來告即位十一月癸未虛恨蠻寇嘉定府峨眉縣中鎮寨寨在羊山江南去府二百五十里硬寨在沙北先是蠻人數為邊害乍叛乍服嘉泰間其都王崖烈始欵中鎮請五年犒物刻石作誓而歸提刑司但以四年犒物豫之蠻人數來欲得本年犒物官執例不豫蠻人怒掠邊民十四人而去土丁追之梟其七級制置司聞之乃於羊山江南築師院平等三硬寨以防其衝突蠻徑犯師院平三年三月又犯籠篷堡寨將馬槱知不可遏乃遣人與之打話陳謙提㸃本路刑獄亦欲招安之蠻人聽許乃遣峨眉令楊鴻往中鎮受其降四年正月蠻至寨未給犒間槱以其屢抄掠也恨之多所要索蠻怒而去槱伺其出寨俾土丁邀之於道殺蠻人北二等三十二人蠻人怨怒自是不出者十餘年去年提㸃刑獄公事李戛屢招來之不至至是提㸃刑獄公事楊伯昌知嘉定府事任處厚方會飲坐中有土丁二人馳報蠻人六七欵寨願受犒且納蠻刀為信寨已給降旗矣翼日再得報蠻近寨者已六十餘人午後又報有二百餘人夜扣硬寨門求戰已出土丁二千渡江禦之矣槱又言寨有土丁及家人凡五千皆驍勇可用不必濟師時知縣事宋大椿及尉皆㳂檄以出在邑惟主簿一人於是蠻人近塞六七百人犯硬寨殺土丁一人掠土丁近二百人復歸巢穴提刑司不欲生事乃遣人就卭部州招安之十二月壬寅蠲瓊州鹽錢癸亥金主遣使來賀明年正旦是歲兩浙諸州大水賑之上取孝宗敬天兩圖置諸左右常用省覽甲戌嘉定七年春正月丁卯朔四川制置大使司遣提舉皂郊傅馬務何九齡等率諸將及金人戰於秦州城下敗還甲戌䝉古遣三騎叩濠州塞求納地請兵守臣應純之諭遣之二月丁未青羌卜籠十二骨來降卜籠者青羌部候也性殘忍多器械專仰鹵掠為生十二骨者乃十二種也丁丑雷參知政事章良能薨壬子知沔州都統王大才斬何九齡及諸將等七人梟首境上以其事聞於朝且檄報鳳翔都統使仍關牒川陜四路監帥司又遣人往廣安捕九齡之子世昌亦斬之初諜者言金有內難議論紛然朝廷聞之以御札賜大使司及大才令益謹守備毋啓邊釁九齡本廣安粥爵人遽結忠義人謀取秦州金先知之故敗會大使安丙奏大才圖為宣撫使設意傾陷令邊報不一或有緩急必致誤事詔大才特降一官大使司於是結局云三月四川制置大使安丙同知樞密院事成都府路安撫使董居證為四川制置使庚辰金國來督二年歲幣戊子金國來止賀正旦使壬辰詔利州路安撫節制本路軍馬如兩淮安撫之制夏四月癸卯蠲福建㳂海諸州貧民納鹽辛酉詔三衙江上四川諸軍具士馬實數以聞五月丁丑太白經天庚辰詔修玉牒官二年一具草以進乙酉御集英殿賜禮部奏名進士袁甫等五百四人及第出身壬辰命有司考賦祿之制裒類成書以為法式六月辛丑以旱命諸路州軍禱雨甲辰詔諸路監司守臣速決滯獄壬子釋大理三衙及兩浙路杖以下囚丁巳置嘉定府邊丁二千人以備蠻命制置安撫諸司給其費秋七月甲子朔左諫議大夫鄭昭先簽書樞密院事兼權參知政事戊辰詔省吏毋授參議官乙亥金主來告遷於南京金人自為䝉古所攻中原諸路之兵皆僉往山後一帶防遏無兵可守悉僉鄉民為兵上城守禦韃人盡驅其家屬來攻父子兄弟往往遙相呼認由是人無固志所至郡邑皆一鼓而下自冬徂春凡破九十餘郡所過無不殘滅兩河山東數千里之地城郭盡為丘墟惟大名真定青鄆邳海沃順通州有兵堅守未能破蒙古復還燕京燕京糧乏軍民餓死者十四五金主珣遣人議和特穆津欲得其公主所需甚衆又請左丞相完顔福興為質珣皆從之䝉古來選女時公主見在者七人惟允濟少女小姐姐甚秀慧遂以豫之又令珣鄉其國遙拜珣不敢拒又以薩木哈圍燕之久未嘗鹵掠欲得犒軍金帛珣亦從之䝉古遂歸居庸關在燕京之北百一十里路隘險守兵數萬欲候䝉古兵歸而擊之而完顔福興在軍中傳金主命已與䝉古議和不許擅出兵䝉古過關取所獲山東兩河少壯男女數十萬皆殺之遂引歸於是河南路統軍蒲撒七斤奏乞徙都開封府珣從之其姪霍王從彞諫曰祖宗山陵宗廟社稷百司庶府皆在燕京豈宜棄之而去珣曰燕京乏糧不能應辦朝廷百官諸軍今暫往南京候一二年間糧儲豐足復歸未晚也從彞乞自督運珣不從從彞憂憤成疾而死珣自涿保州中山府而南至真定留幾月復自大名路由新衛州渡河以至開封肆赦境內庚寅起居舍人真德秀上疏請毋豫金國歲幣從之講義曰歲幣祖宗之不得已也當金虜強盛之時屈中國之尊而納賂於蠻夷已為不可况其敗亡之餘吾不聲罪致討而猶遣一介行人致貢於穹廬之前亦獨何哉此忠臣烈士所以力爭之也是月夏國以書來四川議夾攻金人不報初金人既併遼地乾順事之甚謹金人踵遼人故事冊為夏國王歲時入貢逮今百年嘉定初夏人始為䝉古所攻遣使求援金主允濟新立不能救䝉古人至興靈而返夏人恨之金人亦為韃所擾勢益衰夏國遂叛其左樞密使吐蕃路都招討使萬慶義勇令蕃僧減波把波賫蠟書二丸至西和州之宕昌寨欲與本朝合從犄角恢復故疆藩兵總管傅翊得而上之制置使董居誼初入蜀不之報由是議中絶八月乙未罷四川宣制司所補官癸卯復建宗學置博士諭各一人弟子貟百人金國復來督歲幣乙巳太白經天禁州縣沮壞義役戊申同知樞密院事安丙至近畿詔以為觀文殿學士知潭州是月韃人復攻中原金主珣既遷都汴京韃人聞之怒曰既和而遷是有疑心而不釋憾特以講和為欵我之計耳乃分兵下中原州郡又遣使至開封索犒軍金銀等珣皆豫之九月壬戌朔日有食之太白晝見癸卯雷乙亥右丞相史彌逺等上髙宗皇帝中興經武要略戊寅調殿前司兵增戌天長縣丙戌以久雨釋大理三衙臨安府杖以下囚庚寅釋兩浙路杖以下囚除茶鹽賞錢冬十月壬辰朔出內帑錢賑臨安府貧戊戌廢卭州嘉定監丁巳命四川監司及大郡知州辭見如舊制是月嘉定府峨眉縣寨將馬槱羈管大寧監坐私用邊租激虛恨蠻人之變也先是卭部川蠻人速臼至羅忽寨言虛恨蠻人有歸順意提刑司遣官往中鎮寨隨宜應接於是虛恨都王遣其徒庫崖來議庫崖以馬槱嘗殺北二也疑之欲得其子弟為質槱難之已而沈黎大度河監渡官劉如真遣其子與親屬凡三人入蠻為質庫崖乃肯來既渡河抵北岸欲索十二年歲犒凡為絹二千四百匹鹽茶四千七百斤銀百兩黃金二百牲酒之屬不與焉又欲得都王每三年轉官告命金帶紫袍銅印之屬及北二等三十二人骨價初槱之上世有田在寨之南北岸歲收租四千餘石後有㫖以其田贍兵世選馬氏一人為寨將佃户為土丁防守邊面所謂歲犒者例以邊租七百石市之自北二死蠻人不出租稅悉為槱所私至是度無以償乃好詞紿蠻人歸諭都王因其出塞遣土丁二百襲之至牛渡遇諸蠻即縱兵掩殺庫崖與其徒三十六人皆死蠻人大怒取質子三人刳裂之議者因欲以殺蠻為功提㸃刑獄公事楊伯昌不可乃以槱屬吏槱令其家丁百數詣提刑司訟寃僚吏多請釋之伯昌不從卒正其罪獄竟計贓當死上于朝有㫖制置司酌情行遣尋奏奪槱官羈管於是籍土丁之壯健者二千人月廩之俾守諸寨蠻人聞槱以罪去怨怒稍解既又知邊頭有備憚之自是不復輕出抄掠矣十一月辛酉朔遣著作郎聶子述賀金主正旦刑部侍郎劉鑰等及太學諸生上章言其不可不報丙戌命浙東監司覆灾傷州縣蠲放之數發常平米賑之罷四川制置大使司所開鹽井十二月甲午復罷同安監鑄錢丁巳金主遣使來賀明年正旦是冬燕京之糾軍叛與䝉古共圍燕京是歲黎州蠻蓄卜始降先是青羌卜籠既降知軍州事袁柟知蓄卜勢孤乃令安靜寨總轄杜軫諭之出漢蓄卜疑漢人殺之有卭部川都王之弟部勒者與軫謀遣漢人入蕃為質蓄卜乃來從者凡三百餘人柟與通判州事周塤聚㕔受其降蓄卜膝行而前抱柟之足柟以錢帛厚犒之蓄卜留州城十日將渡河乃送還漢人十一而去柟言於朝得報下四川制置司利州東路安撫司各常切措置鎮撫務令邊界安靜毋或引惹生事自蓄卜犯邊至此更七年而後定云乙亥嘉定八年春正月辛未師禹開府儀同三司嗣秀王故淮南轉運判官施宿犯贓追奪官爵仍籍其家詔侍從兩省臺諫各舉將材三人戊子申嚴銷金鋪翠之禁二月丙午知樞密院事審孝友罷壬子蠲平江府五郡逋負米萬三千石有奇釋其囚繫乙未雨土三月辛酉詔大郡歲舉亷吏二人小郡一人己亥以旱命諸州縣禱雨丙子蠲臨安府茶鹽賞錢釋兩浙諸州罪囚辛巳應賢良方正能直言極諫科何致坐妄造事端熒惑衆聽配廣州牢城癸未安定郡王伯祝薨丙戌釋江淮闕雨州縣杖以下囚夏四月乙未幸太乙宫明慶寺禱雨辛丑避殿減膳壬寅禱雨於天地宗廟社稷癸卯詔中外臣民直言時政得失甲辰右丞相史彌逺等請罷政不許乙巳德音降行在及諸路雜犯死罪以下囚釋杖以下五月辛酉雨䝉古破燕京先是東平之援兵五萬至安次遇䝉古不戰而潰大名之兵八萬至固安亦潰惟真定之兵四萬合保涿援兵一萬至旋風寨與䝉古戰凡二日糧絶而敗自是內外不通至是燕京破都元帥完顔福興自剄死山東羣盜大起燕京宫室雄麗為古今之冠䝉古見之驚畏不敢仰視既而為亂兵所焚火月餘不滅其所積貨財初無所用至以銀為馬槽金為酒瓮薩木哈所居至用金飾龍牀足踏金杌子僭奢如此而徵督不已燕人患之辛酉御殿復膳己卯命利州路安撫司招刺忠義人癸未復命有司禱雨甲申詔贓吏毋得減年參選著為令乙酉出米六萬石賑糶臨安府貧民六月丙辰詔兩浙江淮路諭民雜種粟麥麻豆有司毋收其賦田主母責其租秋七月庚申置三省樞密院主管罙閣文字辛酉簽書樞密院事鄭昭先參知政事禮部尚書曽從龍簽書樞密院事壬戌詔四川立楊巨源廟名曰褒忠戊辰命兩淮諸州毋納今年秋稅其極邊五州併明年夏稅悉蠲之癸酉蠲臨安紹興府貧民夏稅丙子出米三十萬石賑糶江東飢民庚辰詔皇弟搢更名思正皇姪均更名貴和甲申詔職田蠲放如民田違者坐之八月己丑賜張栻諡曰宣庚子申嚴宗子訓名法丁未權罷旱傷州縣比較賞罰己酉禁州縣遏糴是月蘭州盜程彥暉求內附四川制置使董居誼却之九月丙寅雷己巳朝獻景靈宫庚午朝饗太廟辛未合祭天地於明堂赦天下乙未命六部各類赦書寬恤事下諸路監司推行冬十月壬寅金主遣使來賀瑞慶節是冬金人花帽軍擊䝉古於杏花營敗之花帽軍者本户部令史郭忠率山後軍民以擊逐䝉古金人後名其軍為花帽軍云初蒙古既破燕京自河東渡河攻潼關不能下乃由嵩山小路趍汝州遇山澗輒以鐵相相鎖連接為橋以渡於是潼關失守金主急召花帽軍於山東至是䝉古至杏花營距汴京才二十里花帽軍擊敗之䝉古復取潼關自三門析津乘河氷合布灰引兵而渡自是不復出金主乃命平章事胥鼎為大帥專守關輔然陜西諸州間亦有為所破者惟燕南雄霸數州乃三關舊地塘濼深阻䝉古不能入金將張甫張進二人據信安軍以守之又有遼東宣撫使蕭萬奴者木遼人乘女真之亂自立為帝據遼東七路欲併燕代魏晉而有之䝉古不能破也金人自阿固逹稱帝至是九十有八年而失國兩河既為䝉古所擾山東叛之自南遷後纍遣使詣䝉古求和雖未聽從而賂遺不輟特穆津憐其意欲許之而薩木哈恥於無功堅持不可特穆津謂曰譬如圍場中獐鹿吾已取之矣獨餘一兔汝纍年不能收盍遂捨之薩木哈不從遣人諭金主曰汝欲議和可去帝號稱臣當封汝為王而金國之羣臣亦不從有言於珣願以死雪國恥者珣亦為之感憤云十一月丙辰朔伯澤為安定郡王癸亥太府寺丞施纍為賀金主正旦使閣門舍人陳萬春副之十二月己丑詔楊巨源李孝義子孫各進一官辛未金主遣使來賀明年正旦是歲兩浙江東西路旱蝗丙子嘉定九年春正月乙丑賜吕祖謙諡曰成置馬軍司水軍乙亥遣司農寺丞留筠賀金主生辰丙子命諸州招填軍籍辛巳罷諸路旱蝗州縣和糴及四川關外科糴二月甲申朔日有食之丙申雪辛亥東西兩川地大震三月乙卯又震甲子又震馬湖夷界山崩八十里江水不通丁卯又震壬申又震丁丑詔侍從臺諫兩省舉可為監司者各二人夏四月戊戌秦州人唐進與其徒何進等引衆十萬來歸四川制置使董居誼拒却之五月癸丑朔太白晝見六月辛卯西川地震壬辰又震乙未又震黎州山崩戊申賑恤浙西被水州縣寬其租稅秋七月戊辰詔邊縣擇才不拘常法其餘並遵三年之制九月甲申詔江東監司核州縣被水最甚者蠲其租冬十月癸亥西川地震甲子又震丙寅金主遣使來賀瑞慶節十一月庚寅遣軍器監丞陳伯震賀金主生旦癸卯以程彥暉攻圍鞏州迫近川界命利州副都統劉昌祖移駐西和州以備之十二月癸丑以宗學隸宗正寺丁巳再給諸軍雪寒錢乙丑遷天水軍於舊縣置知軍以下官乙亥金主遣使來賀明年正旦丁丑嘉定十年春正月辛巳雷癸巳雨土乙未大風庚子宗正寺主簿錢撫為賀金主生辰使水軍統制馮柄副之甲辰以旴𣅿淮安軍天長縣戍兵隸殿前司二月庚申地震壬戌雪夏四月丁未朔金人引兵入寇犯光州中渡鎮執榷場官盛允升殺之分兵犯樊城戊申鄂州江陵府副都統王守中引兵拒之金人遂分兵圍棗陽光化軍丙辰詔江淮制置使李珏京湖制置使趙方措置調遣仍聽便宜行事辛酉廬州鈐轄王辛敗金人於光山縣之安昌寨殺其統軍元顔掩壬戌金人遁去隨州光化軍皆以捷聞時金人既為䝉古所擾山東畔之惟東阻河西阻潼關地勢益蹙遂有南窺淮漢之謀兵端復啓矣丁卯詔出戍官兵毋分口劵全給其家辛巳以久雨釋大理三衙臨安府杖以下囚蠲茶鹽賞錢五月甲申御集英殿賜禮部奏名進士吳潛等五百二十有三人及第出身癸卯趙方上疏請下詔北伐遂傳檄招諭中原官吏軍民六月庚戌太白晝見戊午詔曰朕厲精更化一意息民兵戈侵我疆場天厭久矣狐兔失其故穴人競逐之豈不知機會可乘讎恥未復念甫申於信誓實重啓於兵端故寧弗廷伸進取之謀不忍絶使傳往來之好每示固存之義初無幸釁之心豈謂金人遽忘大德皇華之斾朝返赤白之囊夕聞叛卒鴟張率作如林之旅飢氓烏合驅為取麥之師貪婪無厭僥幸嘗試宜人神之共憤亦覆載所不容守將效忠開門而決戰兵民賈勇陷陳以爭先金衆既殱殘黨自靖允賴蕩攘之力迄成綏靜之功然除戎當戒於不虞縱敵必貽於後患咨爾有衆永肩厥心毋忽其既退而懷茍安毋狃於屢勝而忘逺略屬炎蒸之在候念戍役之方勞雖摧枯拉朽之非難而執鋭披堅之不易視其暴露如已焚燬一朝背好誰實為之六月飭戎豫非得已諒深明逆順曲直之理其孰無激昂奮發之思師出無名彼既自貽於顛沛兵應者勝爾宜共赴於事功若能立非常之勳則爾有不次之賞尚其聽命朕不食言以黃榜募京西忠義人進討辛未東川大水癸酉太白經天秋七月丙申朔日有食之戊寅以不雨釋諸路杖以下囚甲申雅州蠻寇邊焚碉門寨遣官軍討之丁亥嗣濮王不儔薨庚子詔諸軍將佐有罪送屯駐州鞫之罷軍士淫刑八月乙丑詔監司郡守各舉威勇才略可任將帥者二人冬十月乙巳朔以久雨釋大理三衙臨安府及兩浙諸州杖以下囚癸酉蠲三衙江上諸軍公私逋負錢十一月丁丑大風庚辰太白晝見壬午廢遵義軍甲申詔浙東提舉司出米十萬石賑給貧民戊戌太白經天十二月戊申以軍興募民納粟補官乙卯詔由武舉進者毋復應文舉癸亥金鳳翔副統軍完顔贇以步騎萬人冦四川戊辰迫湫池堡己巳陷天水軍守臣黃炎孫遁去金人攻白環堡破之庚午迫黃牛堡統制劉雄棄大散關遁金人虜之戊寅嘉定十一年春正月壬午京東路忠義李全率衆來歸詔以全為京東路總管戊子金人圍皂郊堡壬辰利州路麻仲率忠義人焚秦州永寧寨乙未以度僧牒千給四川軍費丁酉詔四川忠義人立功其賞視官軍金人犯隔芽關興元都統李貴遁去官軍大潰三月甲辰金人焚大散關而去乙巳沔州都統王大才馬蹶死於河池丙午皂郊陷死者五萬人丁未金人陷湫池堡戊申金人圍隨州棗陽軍游騎至漢上均州守臣應謙之棄城走辛亥四川制置司招忠義人復皂郊丙辰白虹貫日楚州鈐轄梁昭祖焚金人糧舟於大清河京東忠義副都統沈釋遣兵助之三月丁丑金人焚湫池堡而去戊子利州統制王逸等率官軍忠義復皂郊金副統軍完顔贇包長壽遁去沔州軍士郭雄追斬贇首而還長壽僅以自免己丑沔州都統劉昌祖至皂郊辛卯忠義人十餘萬出秦州官軍繼進至赤谷口王逸傳昌祖之命退師且放散忠義人軍大潰癸巳包長壽合長安鳳翔之衆復攻皂郊遂移西和州是日鎮江忠義統制彭惟誠等敗於泗州丙申劉昌祖焚西和州而遁守臣楊克家棄城去戊戌金人陷西和州夏四月甲辰劉昌祖焚成州而遁守臣羅仲甲棄城去是日金人去西和州戊申命四川增印錢引五百萬以給軍費階州守臣侯頤棄城去是日金人去成州戊午金人復犯大散關守將王立遁去己未金人犯黃牛堡興元都統吳政拒退之癸亥政至大散關執王立斬之軍聲大振五月乙亥命四川制置司招集忠義人癸亥蚩尤旗見其長竟天丁亥詔侍從臺諫兩省官集議平戎禦戎和戎三策講義曰當時廟堂之議草茅書生固莫之聞也且以事勢言之國家自開禧輕舉之後士卒敗亡將帥竄逐楮劵折閲而不行帑藏匱乏而莫繼自保不暇何暇謀人則平戎之策姑遲之何也金人吾之世仇其不可與通也昭昭矣當其強盛之時講信修睦以安南北之生靈猶有說也今也邉方爭長北敵播遷事勢非前日比矣奔走俯伏於穹廬之前新起之強鄰中原之豪傑寧不易我而誚我乎則和戎之策斷不可行也無己則禦戎一策乃當今之急務乎蓋在嘉定間敵運衰微猶且張大聲勢嘯聚飢氓以蹂踐吾之三邊而吾以堂堂大國顧乃搏手無策曽不殘敵若乎是必搜兵選將足食豐財川蜀關隘之當守者守之上流兩淮之當防者防之朝廷上下朝夕刻厲勉為自治之計則敵將望風畏懾不敢嗤秦無人矣然則合三䇿而論舍禦戎之外將奚取哉壬辰嚴試法官七等之制六月辛酉詔湖州賑恤被水貧民秋七月癸酉知天水軍黃炎孫追三官辰州居住乙酉修孝宗皇帝寶訓辛卯蠲四川關外諸州稅役甲午蠲光州民兵戰死之家稅役九月己卯朝獻景靈宫庚辰朝饗太廟辛巳合祭天地於明堂赦天下辛卯安定郡王伯澤薨冬十月戊申興元都統吳政利州都統張威各進三官劉昌祖奪五官韶州安置丙午羅仲甲奪三官常德府居住楊克家奪三官道州居住侯顒奪三官撫州居住戊午大風壬戌修盱眙軍城壬申金人寇安豐軍之黃口灘是月陜西人張羽來歸十二月己亥朔新知揚州應純之罷是歲諸路户一千二百六十六萬九千六百八十四口二千八百三十七萬七千四百四十一己卯嘉定十二年春正月戊寅朔召四川制置使董居誼赴行在新利州路安撫使聶子述為四川制置使庚辰金人犯湫池堡守將石宣拒退之甲申金人攻白環堡守將董照拒退之戊子金人犯成州沔州都統張威自西和州退守仙人原庚寅金人犯隨州棗陽軍又破信陽軍之二寨京西諸將引兵拒之辛卯金人犯西和州守臣趙彥呐設伏以待之金人殱而還金人犯安豐軍建康都統許俊遣將拒之金人焚成州犯河池守將張斌遁去癸巳金人圍安豐軍分兵圍光州攻光化軍破鄖山縣進逼均州甲午金人陷鳳州守臣雷雲棄城去金人夷其城乙未吳政戰死於黃牛堡金乘勝攻武休關二月戊戌朔金破光山縣太白晝見壬寅虜圍棗陽軍京湖制置使趙方遣統制扈再興救之不能進而還癸卯破武休關興元都統李貴遁還利路提刑權興元府事趙希昔棄城去丁未陷興元府戊申攻棗陽軍甲子兵始去己酉遣殿前司軍八千人防捍江西庚戌曽從龍兼江淮宣撫使除同知樞密院事任希夷簽書樞密院事辛亥金陷大安軍守臣李文子棄城去分兵犯洋州守臣蔡晉卿遣兵拒之不克遂陷壬子董居誼自利州遁去沔州都統張威遣統制石宣邀擊金兵於大安軍大破之金將巴土魯安棄軍走為我師所獲金聞之遂遁去丁巳京湖制置使趙方遣統制扈再興等引兵三萬餘人分二道出攻唐鄧州隨州忠義軍劉世興等引兵攻唐州甲子罷董居誼召命乙丑夏人來議夾攻利路安撫丁焴許之三月己巳董昭先知樞密院事曽從龍參知政事癸酉金焚洋州城而去乙亥興元軍士權興等作亂犯巴州守臣秦季槱棄城去鄂州都統劉世榮會兵攻唐州丁亥太白晝見權興等降甲午敵自盱眙退師閏三月己未以雷雲棄鳳州奪三官送梅州安置辛酉旌吳政死節贈右武大夫忠州刺史壬戌招諭四川官軍忠義人癸亥興元軍士張福莫簡等作亂以紅巾為號是春金圍安豐軍及滁濠光州江淮制置使李珏命池州都統制武師道忠義軍都統制陳孝忠救之皆不能進金分兵犯邊自光州犯黃州之麻城自濠州犯和州之玉磧自盱眙至滁州之全椒來安揚州之天長真州之六合淮南流民渡江避狄諸城皆閉金遊騎數百至東采石楊林渡建康大震京東總管李全自楚州忠義總轄孚先自漣水軍各引兵來援敵乃解去全追擊敗之於曹家莊獲其貴將或以為金主子壻云夏四月庚午張福入利州四川制置使聶子述遁去總領財賦楊九鼎為所殺丁丑掠閬州丁亥掠果州癸巳參知政事曽從龍罷同知樞密院事鄭昭先兼參知政事崇信軍節度使開府儀同三司萬壽觀使安丙為四川安撫使董居誼落職奪三官五月乙未朔四川制置使聶子述赴行在興元賊張福迫遂寧府潼川府路轉運判官權府事程遇孫棄城去丁酉德音降兩淮荆襄湖北利州路㳂邊諸州雜犯死罪釋流以下仍蠲今年租稅己亥太學生何處恬等伏闕上書以工部尚書胡矩欲和金人請誅之以謝天下講義曰愚聞紹興中秦檜自金來歸倡為南自南北自北之說一旦建議和戎胡銓慨然上書請竿檜首於藁街今矩非銓之後歟方金人渝盟引兵入寇矩顧欲與金講和以偷旦夕之安是上則忘國恥下則忘家學也學校公議之地安能逃其譏議乎張福入遂寧府焚其城甲寅四川宣撫司命沔州都統張威引兵捕張福入普州守臣張己之棄城去癸亥詔侍從兩省臺諫各舉文武可用之才二三人六月戊辰張福屯於普州之茗山庚午張威引兵至丙子太白晝見辛巳西川地震太白晝見升棗陽縣為軍癸未張福請降乙酉威執之歸於宣撫司丁亥嗣濮王不熛薨金人招諭李全等全等不聽辛卯太白經天癸亥利州路安撫使丁焴復以書約夏國攻金人秋七月丙申張福伏誅董居誼復奪二官永州居住庚子張威生擒賊衆一千三百餘人誅之以莫簡自殺言於宣撫司紅巾賊悉平癸亥李全引兵至齊州僞知州王贇以城降八月戊辰復合利州東西路為一九月丙午罷江淮制置司置㳂江淮東西制置司寶文閣待制李大東為㳂江制置大使淮南轉運判官趙善湘為主管淮西制置司公事淮東提刑賈涉為主管淮東制置司公事兼節制京東河北路軍馬十一月辛亥楊次山進封會稽郡王癸丑楊次山薨十二月壬申京東路節制司言尅復京東河北二府九州四十縣乙亥築興元府城丁丑雅州蠻入廬山縣辛巳焚碉門寨邊丁大敗己卯四川宣撫司遣兵取洮州召諸將議出師招諭中原豪傑官民勸以歸附乙酉金人犯鳳州之長橋丁亥四川宣撫司命罷洮州之師己丑京湖制置司遣統制扈再興等引兵六萬人分三道出境庚寅賞茗山捕賊功庚辰嘉定十三年春正月丁酉統制官扈再興引兵攻鄧州鄂州都統許國攻唐州不克而還金人追之遂寇樊城趙方督諸將拒退之己亥雅州蠻復掠廬山縣遣兵捕之己酉不凌為嗣濮王戊午夏國復以書來四川議夾攻金人三月辛卯朔雨土丁巳黎州土丁叛遣兵討之夏四月庚申朔淮東制置賈涉招諭山東兩河豪傑勸以來歸五月庚寅朔雅州蠻降戊寅右丞相史彌逺等上三祖下第七世宗藩慶係録皇帝玉牒刋正憲聖慈烈皇后聖德事迹光宗皇帝玉牒六月癸酉御集英殿賜禮部奏名進士劉渭等四百七十有五人及第出身四川宣撫使安丙為少保丙子李全為左武衛大將軍壬午季先為果州團練使漣水軍忠義副都統命赴樞密院議事未至殺之秋七月戊戌以京東河北諸州守臣告付京東河北節制司丙午簽書樞密院事任希夷兼參知政事丙辰四川宣撫司招黎州土丁降之癸亥皇太子詢薨八月壬申四川宣撫使安丙遺夏人書定議夾攻金人己卯賜皇太子諡曰景獻癸未四川宣撫司命利州都統王仕信引所部赴熙鞏州會夏人遂傳檄招諭陜西五路官吏軍民勸以歸附甲申復海州以將作監丞徐晞稷知州事盱眙將石圭叛入漣水軍詔即以圭為漣水忠義軍統轄九月辛卯夏人引兵圍鞏州且來趣師太白晝見王仕信引兵發宕昌乙未四川宣撫司統制質俊李實引兵發下城戊戌四川宣撫司命諸將分道進兵沔州都統張威出天水利州副都統程信出長道興元副都統陳立出大散關興元統制田冒為宣撫司帳前都統出子午谷金州副都統陳昱出玉津己亥張威下令所部諸將毋得擅進兵庚子質俊等克來逺鎮辛丑王仕信克鹽川鎮壬寅質俊等自來逺鎮定攻定邊城金人來救進等擊破之乙巳程信王仕信引兵與夏人㑹於鞏州城下丁巳攻城不克庚戌金人犯皂郊堡沔州都統董照等與戰官軍大敗壬子程信及夏人攻鞏州不能下信引兵趍秦州丙辰夏人自安逺寨退師冬十月丁巳朔程信邀夏人共攻秦州夏人不從信遂自伏羌城引軍還諸將皆罷兵戊寅程信以四川宣撫使之命斬王仕信於西和州四川宣撫司以張威不進兵罷其軍職十一月甲午詔刋正紹熙五年以後日歷庚戌大風壬子臨安火十二月戊午大風壬申漣水忠義軍統轄石圭叛奔韃靼癸未鎮江副都統翟朝宗以皇帝恭膺天命之寶來獻辛巳嘉定十四年春正月丙戌朔雪釋杖以下囚乙未雷地震以李全自山東還出緡錢六萬為犒賞費庚子立四川運米賞格二月庚申分光州所納民於淮西諸州戊辰金人圍光州己巳犯五關壬申治舟於團風弗克濟遂圍黃州分兵破諸縣又遣别將犯漢陽軍丁丑李全棄泗州遁還甲申詔淮東京湖諸路應援淮西㳂江制置司防守江面權殿前司職事馮塒將兵駐鄂州京東忠義都統李全將兵救蘄黃塒不果行三月丙戌朔鄂州副都統扈再興引兵攻唐州丁亥金人陷黃州淮西提刑知州事何大節棄城遁而死庚寅長星見李全引兵自楚州救淮西癸巳扈再興引所部趍蘄州甲午太白晝見乙未詔京湖制置司趍蘄黃己亥金人陷蘄州知州事李誠之及其家人官屬皆死之癸丑金人退師扈再興邀擊敗之於久長鎮甲寅晦又敗之夏四月乙卯朔復置諸王宫大小學教授乙丑命任子簾試於御史臺戊辰金人渡淮而北李全遣兵追擊敗之扈再興亦以捷聞五月甲申朔日有食之壬辰右丞相史彌逺等上孝宗皇帝寶訓皇帝會要丙申西川地震乙巳右丞相史彌逺等上慶元寬恤詔令詔頒之六月甲寅朔初置㳂江制置副使於鄂州丙寅詔曰朕以眇躬嗣臨大統夙夜只懼不敢荒寧荷天之休海內用乂而國嗣未建非所以嚴社稷奉宗廟朕深念焉皇姪福州觀察使貴和沂靖惠王之子猶朕之子也重厚英敏天禀夙成屬近且賢聞於中外蔽自朕志爰舉恩徽以昭立愛之義夫計安天下強本為先親親賢賢厥自古始非朕所得私也其以為皇子改賜名竑是日以竑為武寧軍節度使進封祁國公丁卯以立皇子告於天地宗廟社稷乙亥太祖十世孫與莒補秉義郎丙子降京畿囚罪一等釋杖以下辛巳大風秋七月丁亥京東河北節制司言蒙國大將獻本朝皇帝恭膺天命之寶詔禮官討論受寶禮儀以聞辛丑趙方為京湖制置大使賈涉為淮東制置使兼京東河北路節制使丁未修光宗皇帝寶訓八月癸丑朔京湖制置大使趙方卒乙卯賜右丞相史彌逺家廟參知政事任希夷罷知福州壬戌兵部尚書宣繒同知樞密院事給事中俞應符簽書樞密院事甲子以秉義郎與莒為右監門衛大將軍賜名貴誠乙丑追封故相史浩為越王丙辰改諡忠定配饗孝光廟庭戊寅以皇姪右監門衛大將軍貴誠為果州團練使九月癸未立貴誠為沂靖惠王後己丑朝獻景靈宫庚辰朝饗太廟辛卯合祭天地於明堂赦天下冬十月癸丑京東河北節制司言復滄州詔以趙澤為河北東路鈐轄知州事甲寅復以齊州為濟南府兖州為襲慶府庚申興元府城成丙寅夏人復以書來四川趣會兵庚午雷十一月癸巳詔左翼軍受泉州節制己亥少保四川宣撫使安丙薨己酉詔曰朕以付託之重顧瞻中土怛然於懷惟知修德勝殘夙夜黽勉乃者山東河北連城慕義殊方效順肅奉玉寶來獻於京質理溫純篆刻精古文曰皇帝恭膺天命之寶暨厥圗冊登載粲然實惟我祖宗之舊繼獲玉檢其文亦同今殘虜浸微羣心丕應先朝之寶眷焉復還非皇穹之眷方隆列聖之靈有屬豈繄涼德乃克臻此書不云乎以昭受上帝天其申命用休朕曷敢不承其以來年元日受寶於大慶殿是月京東安撫張林叛以京東諸郡降於韃人韃人遣葛合赤縣等來計事十二月庚申朔簽書兼參知政事鄭昭先罷閏十二月辛巳朔同知樞密院事宣繒兼參知政事俞應符兼權參知政事丙午奉安玉璽於天章閣命近臣告於天地宗廟社稷戊申以殿前司同正將軍嶽等謀為變殺之是歲浙東江西福建諸州旱沔成階利州水賑之壬午嘉定十五年春正月庚戌朔御大慶殿受寶癸丑立李誠之廟於蘄州甲寅褒贈蘄州死事官吏官其子孫有差丁巳詔撫諭山東河北軍民將帥官吏己未以受寶赦天下監司帥守上表稱賀文武官各進秩一等大犒諸軍甲戌升鄂州武昌縣為壽昌軍二月庚子罷御史臺簾試任子法三月丁巳詔江西提舉司賑恤旱傷州縣夏四月壬午詔蘄州毋納今年租稅五月庚戌太白晝見甲寅詔監司慮囚察州縣匿囚者劾之丁巳皇子祁國公竑進封濟國公己未以皇姪果州團練使貴誠為邵州防禦使壬戌知濟南府仲贇等攻張林於青州林遁去己巳修孝宗經武要略六月辛卯權參知政事俞應符薨秋七月甲子詔江淮荆襄四川制置監司條畫營田來上八月己卯命户部詳議義役辛卯詔文武官毋得歸宗著為令甲午彗出氐九月辛亥同知樞密院事宣繒參知政事給事中程卓同知樞密院事吏部尚書薛極賜出身簽書樞密院事癸丑雷大雨雹丁巳復以隨州三關隸德安府置關使壬戌彗沒辛未太白晝見冬十月丙子以收復京東州軍犒賞忠義有差己丑命禮官裒集受寶本末為書藏於祕閣十一月戊午降德音於京東河北路罪無輕重皆除之十二月乙亥朔出米五萬石賑臨安府貧民丙子以雪寒釋京畿及兩浙諸州杖以下囚丁亥李全為保寧軍節度使右金吾衛上將軍京東路鎮撫使是歲諸路户一千二百六十六萬九千三百一十口二千八百八十二萬五千七十癸未嘉定十六年春正月戊申嚴贓吏法己酉皇子坻生丁巳雷辛酉命淮東制置司賑濟山東流民二月戊子雨土戊戌皇子坻薨追封邳王諡曰冲美三月戊申張林所部邢德來歸京東河北路鎮撫節制大使司以為言詔刑德進二官復以為京東東路副總管丁卯詔以米五萬二千五百石賑道州飢夏五月戊申賜禮部奏名進士蔣重珍等五百四十九人及第出身有差六月壬午賈涉卒丁酉程卓薨秋七月辛巳詔州縣經界毋增紹興稅額癸未申嚴舶船銅錢禁九月庚子朔日有食之乙巳詔江淮諸司賑恤被水貧民乙卯雷冬十一月辛亥太平州水詔賑恤之十二月辛巳命淮東西總領及㳂江被水州募江西湖南民入米補官壬辰雷甲申嘉定十七年春正月戊戌朔録程頤後講義曰朝廷之所尊崇天下之所慕尚也曩者伊洛之學嘗排擯於權臣之手矣更化以來既表章其學於羣邪攻詆之餘復録用其後於綸㫖褒崇之日垂世之規模逺哉挹坐上之春風立門外之暮雪學者皆知所趍向矣癸亥命淮東西湖北轉運司提督營屯田二月癸已蠲台州逋賦十萬緡有奇甲午命臨安府賑糶平民三月癸丑雪是月金人入寇迫西和州尋引兵還夏四月辛卯詔廬州賑糶飢民乙未賜李全彭義贇錢三十萬緡為犒賞戰士費五月戊戌詔核實兩淮京湖四川江上諸軍之數六月丁卯朔太白經天晝見辛未皇孫銓生癸酉知西和州尚震午坐寇至謀遁奪三官嶽州居住壬辰京東河北鎮撫節制大使司言大名府蘇椿等舉城皆歸詔悉補官即以其州授之秋七月丁酉命福建路監司賑恤被水貧民辛亥師嵒為嗣秀王八月乙亥罷通州天賜鹽場癸未以皇孫銓為左千牛衛大將軍尋薨丙戌上不豫濟國公竑立為皇子既四年儲位尚虛皇姪邵州防禦使貴誠德譽日聞上屬意久之壬辰召宰執入禁中趣定大議閏八月乙未朔申嚴兩浙諸州輸苗過取之禁丙申詔曰朕以菲涼獲承體緒念國嗣之未建嘗以皇弟沂靖惠王之子為子矣審觀熟慮猶以本支未強為憂皇姪邵州防禦使貴誠亦沂靖惠王之子猶朕之子也聰明天賦學問日新既親且賢朕意所屬俾併立焉深長之思蓋欲為異曰無窮之計也其以為皇子改賜名昀又詔皇子檢校少保武寧軍節度使濟國公竑為開府儀同三司判寧國府進封濟陽郡王皇子邵州防禦使昀為武泰軍節度使封成國公赦天下丁酉夜漏未盡上崩於福寧殿年五十七遺詔皇子即皇帝位尊皇后為皇太后垂簾聽政乙酉寶慶元年春正月己丑上諡曰仁文哲武恭孝皇帝廟號寧宗三月癸酉權􅓖於會稽之永茂陵祔太祖第十三室三年九月加今諡帝謙仁恭儉出於自然蚤親師儒留意學問黃裳在王府五年輔導尤為有力自天文地理人事之紀以及三代漢唐治亂得失之數本朝制度典章人才議論之要莫不為帝言之隨事獻規率多補益帝嘗曰黃翊善之言亦難堪惟我則能受之彭龜年性鯁直有聞必告帝亦未嘗不從也即位之日首召朱熹於長沙以備勸講因議置講讀官十貟各專一書不以雙隻日各二講又復作講之制皆前所未有也趙汝愚當國方欲引裳共政未兩月而裳卒帝始無所親倚韓托胄以導達中外之言浸用事熹龜年既以論托胄而退貴戚吳琚謂人曰上初無堅留托胄之意有一人繼言之去之易爾而一時臺諫皆其支黨執政大臣又多與之相表裏者卒稔其惡以底大僇開禧用兵帝心弗善也托胄死諭大臣曰恢復豈非美事但不量力聖意可知矣在位三十餘年池臺苑囿無所增益府庫之財未嘗妄費袴履雖敝或加補濯而愛民之念始終弗替一遇水旱憂見顔色御衆臨下率從寬簡故吳曦以世將據蜀不勞資斧而授首江淮湖鎮之區寇盜或作旋即底定皆履信思順之所致也升遐之日逺邇哀慕昔先民邵雍言本朝之盛前代不及者有五而百年四葉居其一焉維中興四葉享國九十有八年上視先朝同一軌轍深仁厚澤浹於海隅垂裕後昆有衍無極嗚呼美哉史臣曰國朝自建炎再造至於紹熙慶元之交正學興行治效彰灼一時人才於斯為盛實乾道之所培養也而寧宗皇帝得而用之觀夫上畏天戒下畏民嵓帝之心也克勤於邦克儉於家帝之行也故其初年忠賢之士聚於朝廷四方嚮風駸駸乎有慶歷元祐之望逮戚幸盜權之始士之見微慮逺者逆折其鋒雖竄斥而不悔厥後起於廢錮之餘拔去凶邪嘉靖王室帝終賴之蓋君子小人消長之分係乎天下國家安危之決如此此先王之所必謹也且夫慶泰禧定之間中外多虞事機沓至而帝信厚謙慈罔有逸德仁念純熟對於神明卒保乂安以貽後嗣書曰我受命無疆維休以今推之詎不信哉宋史全文卷三十
