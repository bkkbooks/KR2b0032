body:
  text: 宋史全文卷十五宋欽宗丙午靖康元年春正月詔求言監察御史余應求先為校書郎嘗上奏畧曰獻言者皆曰夷狄外侵而邊鄙未寜為可慮百姓乆困而財用日急為可慮兵革未弭而士馬不彊為可慮臣以為選將帥以守邊治險阻以固圉積粟治兵實之塞下則邊備何患乎不嚴罷不急之務减無名之費躬節用裕民之德去蠧國害財之政用計數之臣治轉運之法則財何患乎不足下募兵之令髙買馬之直明賞罰以収人心嚴軍政以勵士氣付之良將何徃不克則士馬何患乎不彊詔特賜章服自金人犯邊屢下求言之詔事稍緩則復沮抑言者故當時有城門閉言路開城門開言路閉之諺丁卯金人犯濬州内侍梁方平領兵在黄河北岸敵騎奄至倉卒奔潰時南岸守橋者望見敵中旗幟燒㫁橋䌫陷没凡數千人敵因不得濟何灌軍亦望風潰散我師在河南者無一人初敵至邯鄲遣郭藥師為前驅付以二千騎藥師疾馳三百里質明遂至濬其言州縣無備邀取金繒暴宫禁間事者皆藥師之為也己巳詔親征先是太學生陳東率在學諸生伏闕上書畧曰臣等聞堯之時有八元八凱而未暇用有四凶而未暇去堯非不知其可用可去也意謂我將倦於勤必以天下授舜特留以遺之使大明誅賞以示天下耳故傳曰舜有大功二十而為天子天下誦之至今不息臣竊謂在道君皇帝時非無賢才如八元八凱而未用者非無奸臣賊子如四凶而未去者道君亦非不知之特留以遺陛下今日之事蔡京壊亂於前梁師成隂賊於内李彦結怨於西北朱勔結怨於東南王黼童貫又從而結怨於二邊敗祖宗之盟失中國之信創開邊隙使天下勢危如絲髮此六賊者異名同罪伏願陛下擒此六賊肆諸市朝傳首四方以謝天下至是黼竄永州黼賣官取贓無厭京師為之語曰三百貫且通判五百索直秘閣黼至雍丘縣南固村呉敏李綱指燕山之役為黼罪請誅之取其首以獻勔削官放歸田里繼而覊管循州尋賜死彦亦賜死皆籍其家上皇如南京庚午以兵部侍郎李綱為尚書右丞東京留守同知樞宻院李梲副之聶山為随軍轉運使時從官以邊事求見者皆非時賜對綱待班延和殿下適宰執奏事議欲奉鑾輿出狩襄鄧綱語知東上閤門事朱孝莊曰有急切公事欲與宰執廷辨孝莊曰舊例未有宰執未退而從官求對者綱曰此何時而用例邪孝莊即具奏詔綱立執政之末因啓奏曰聞諸道路宰執欲奉陛下出狩避狄果有之宗社危矣且道君皇帝以宗社之故傳位陛下今捨之而去可乎上黙然白時中曰都城豈可以守綱曰天下城池豈復有如都城者且宗廟社稷百官萬民所在捨此欲何之若能率勵將士慰安民心豈有不可守之理上顧大臣曰䇿將安出皆黙然綱進曰今日之計莫如整厲士馬聲言出戰固結民心相與堅守以待勤王之師上曰誰可將者綱曰朝廷平日髙爵厚禄畜養大臣將用之於有事之日今白時中李邦彦等皆書生未必知兵然藉其位貌撫馭將士以抗敵鋒乃其職也時中厲聲曰李綱莫能出戰綱曰陛下不以臣為懦儻使治兵願以死報第人微官卑恐不足以鎮服士卒上即命除綱右丞内侍王孝竭奏曰中宫國公已行陛下豈可留此上色變曰卿等無執朕將親徃陜西治兵以復都城决不可留此綱泣拜俯伏以死請㑹燕越二王至亦以固守為然上意稍定即俾中使追還中宫國公顧謂綱曰卿留朕治兵禦冦專以委卿綱受命與梲同出中夜上遣中使諭宰執欲詰旦决行質明綱入朝見禁衛擐甲乗輿服御皆已陳列綱厲聲曰爾等願以死守宗社乎願扈從以廵幸乎皆呼曰願以死守綱入見曰陛下已許臣留今復戒行何也且六軍之情已變彼父母妻子皆在都城豈肯捨去萬一至中道散歸陛下孰與為衛且敵已逼彼知乗輿之去未逺以徤馬疾追何以禦之上悟始命輟行辛未上御宣德樓宣諭六軍將士於是固守之議始决命李綱為親征行營使侍衛親軍馬軍都指揮使曹曚副之白時中罷坐主出奔議也李邦彦起復為太宰張邦昌為少宰仍兼門下中書侍郎趙野王孝迪門下中書侍郎蔡懋尚書左丞簽書樞宻院耿南仲同知壬申詔每路差近上内侍一併督帥臣將勤王兵入援癸酉斡里雅布至京城西北屯牟駝岡天駟監即孳生馬監之所芻豆山積異時郭藥師來朝得㫖打毬於其間金人兵至徑趨其所藥師導之也自敵騎扣河梁方平燒橋而遁敵不得遽渡取小舟能容數人者以濟凡五日騎兵方絶歩兵猶未集也旋濟旋行無復隊伍敵笑曰南朝可謂無人若以一二千人守河我軰豈得渡哉是夕金人攻宣澤門李綱臨城募敢死士斬獲百餘人迨旦始定初治都城四壁守具凡四日治具粗畢而敵抵城下矣以鄭望之充軍前計議使髙世則副之望之即行少頃敵亦遣呉孝民至甲戌鄭望之入奏引見金使呉孝民奏曰上皇與大金結約海上復違盟誓皆已徃事今日少帝陛下與大金别立誓書結萬世歡好可也向者李鄴來議割獻三鎮事皇子遣使人代朝見之禮願遣親王宰執到軍前報禮大金喜禮意之重前日割地之議徃徃可罷少帝之稱自此始上顧宰執未有對者李綱請行上不許曰卿方治兵不可命同知樞宻院事李梲奉使鄭望之髙世則副之乙亥敵攻通天景陽門一帶甚急上命李綱督將士扞禦又攻陳橋封丘衛州等門綱登城督戰自卯至申殺敵凡數千乃退武泰軍節度使何灌死之敵遣游騎四出抄掠畿縣惟東明太康雍丘扶溝鄢陵僅存敵耻小邑不破再益騎三千急攻東明京東將董有鄰率衆拒之斬首十餘級最後得金環者三太子也李梲鄭望之等在敵營斡里雅布見之需金五百萬两銀五千萬两牛馬萬匹衣縀百萬疋割大原中山河間三路地并欲宰相親王為質望之辭以親王年㓜乞遣郡王望之再三言之斡里雅布曰遣親王郡王各一人至河即還宰相候交物了及撥地畢日可還也斡里雅布遣蕭三寳奴耶律忠王汭等來丙子詔大金所需犒軍物數浩瀚朝廷竭力應副如供祀宗廟噐皿亦不敢吝至於親王内外百官之家已行告諭盡數供助尚恐未能敷數忠義之民理宜體國將私家所有願助國用者限日下於户部尚書聶山等處送納又詔蕃衍宅諸王金銀絹帛道官樂官伎術等官及五司官察視曽經賜帶各家有見在金銀只今納元豐庫若敢隐庇轉藏並行軍法諸宫觀寺廟奉先普安諸墳六尚局諸局并開封府公用金銀拘収納左藏庫時從王孝迪之議掲榜立賞括在京軍民官吏金銀違者斬之都城大擾限既滿得金二十餘萬銀四百餘萬两而民間藏蓄為之一空李綱因對奏曰収簇金銀限滿民力已竭復許告訐恐生内變外有大敵而民心内變不可不慮上曰卿可徃収榜毋得告訐綱因廵城傳聖㫖収榜人心稍安以康王為軍前計議使令張邦昌髙世則副之上命引王詣殿閣見宰執李梲云大金恐南朝失信故要親王送到河亦無他王正色曰國家有急死亦何避聞者悚然丁丑宰執進呈金人所須之目李綱力争以謂犒師金幣其數太多雖竭天下亦不足充况都城乎當量與之大原河間中山國家屏蔽號為三鎮割之何以立國又保塞翼祖順祖信祖陵寢所在子孫奈何與人至於遣使宰相當徃親王不當徃今日之計莫若擇使與之熟議道所以可不可者金幣之數令有司㑹計少遲之大兵四集彼以孤軍入重地勢不能乆留必求速歸然後與之盟彼且不敢輕中國其和可乆也宰執皆謂都城患在朝夕尚何有三鎮而金幣之數又不足較也綱因求去上慰諭曰卿苐出治兵益固城守恐金人欵我此徐議也朝廷即以誓書徃所求皆與之以李鄴髙世則為送伴使副綱尚留三鎮詔書不遣幾少遲延以俟勤王兵集徐為後圖也庚辰張邦昌從康王詣敵營壬午統制官馬忠以京西募兵至遇金人於順天門外乗勢擊之殺獲甚衆范瓊將萬騎自京東來營於馬監之側王師稍振丁亥靖難軍節度使河北河東路制置使种師道武安軍承宣使姚平仲以涇原秦鳯兵至闕下既入見上曰今日之事卿意如何師道曰女真不知兵豈有孤軍深入人境而能善其歸乎上曰業已講好矣對曰臣以軍旅之事事陛下餘非所敢知也李綱言於上曰勤王之師漸集兵家忌分非節制歸一不能濟願勅两將聼臣節制上曰師道老而知兵且職位已髙與卿同官替曹曚可也於是别置宣撫司以師道同知樞宻院事充京畿河北河東路宣撫使以平仲為都統制應四方勤王兵並𨽻宣撫司又撥前後軍之在城外者属之而行營司所統者獨左右中軍而已上屡申飭两司不得侵紊而節制既分不相統一宣撫司所欲行者徃徃託以機宻不復闗報自是權始分矣太學生陳東又言梁師成當正典刑詔黜為散官命開封府吏押至八角鎮殺之癸巳李綱李邦彦吳敏种師道姚平仲等是日同對於福寜殿議所以用兵者綱奏曰金人之兵張大聲勢然其實不過六萬吾勤王之師集城下者二十餘萬固已數倍之矣彼以孤軍入重地正猶虎豹自投於檻穽中當以計取之不可角一旦之力為今之䇿莫若扼關津絶粮道禁抄掠分兵以復畿北郡邑俟彼遊騎出則擊之以重兵臨賊營堅壁勿戰如周亞夫所以錮七國者俟其芻粮乏人馬疲然後以將帥檄取誓書復三鎮縱其歸中渡而後擊之此必勝之計也上然之二月丁酉夜都統制姚平仲率歩騎萬人刼敵寨以敗還初种師道以三鎮不可棄城下不可戰朝廷姑堅守和議俟姚古來兵勢益甚軍中共議自遣使人徃諭敵以三鎮係國家邊面决不可割寜以其賦入増作嵗幣庻得和好乆逺如此三两返勢須逗遛半月重兵宻邇彼必不敢逺去刼掠粮草漸竭不免北還俟過河以騎兵尾襲至眞定中山两鎮必不肯下彼腹背受敵可以得志㑹李綱主平仲之謀師道言卒不用平仲古之養子也上以其驍勇屡召對許以成功當授節鉞平仲議欲夜叩敵營生擒斡里雅布奉康王以歸而其謀泄未發數日行路及敵人皆知之敵先事設備故反為所敗李綱㑹行營左右軍將士質明出景陽門分命諸將觧范瓊王師古等圍敵騎出没鏖戰斬獲甚衆復犯中軍綱親率將士以神臂弓射却之上初滿意平仲必成功既而失利宰執臺諫交言西兵勤王之師及親征行營司兵為所殱無復存者上大震驚有詔不得進兵遂罷綱尚書右丞親征行營使以蔡懋代之因廢行營使司止以守禦使縂兵事盖欲罪綱以謝敵也辛丑遣資政殿大學士宇文虚中知東上閤門事王球使斡里雅布軍齎李綱所留割三鎮詔書以徃仍就迎康王太學生陳東率諸生數百人伏宣德門下上書曰在廷之臣奮勇不顧以身任天下之重者李綱是也所謂社稷之臣也其庸謬不才忌嫉賢能動為身謀不恤國計者李邦彦白時中張邦昌趙野王孝迪蔡懋李梲之徒是也所謂社稷之賊也又曰綱起自庻官獨任大事邦彦等嫉如仇讎恐其成功因綱用兵小不利遂得乗間投隙歸罪於綱然一勝一負兵家常勢小勝固未足為喜小挫亦豈足為辱况示怯示弱竒謀秘計豈可遽以此傾動任事之臣又曰竊聞邦彦時中盡勸陛下他幸見事有急各除親黨外任遣家属随之逺去豈身為大臣不能以一家死社稷之難其意止欲倉卒之際各保妻孥耳諸大臣一鼓而倡之百官有司羣起而和之遂令京城之人閧然騷動弗安其居若非綱為陛下建言則乗輿播越在外宗廟社稷已為丘墟生靈已遭魚肉陛下將有棄宗廟社稷之名賴聰明不惑特從綱請中外聞之雖愚夫愚婦莫不舉手加額仰歎聖德之盛綱之力豈曰小補之哉是宜邦彦等譛謗忌嫉無所不至又曰若以綱用兵小挫遂當廢罷則童貫創開邊隙以貽今日之禍近又引兵數十萬以事雲中之役幾於匹馬隻輪無還朝廷曽不議貫之罪何綱小挫而加罪乎一進一退在綱為甚輕在朝廷為甚重今日宗社安危在此一舉幸陛下即反前命復綱舊職以安中外之心付种師道以閫外之事於是軍民數萬人擁伏闕下相謂曰非見李右丞种宣撫復用毋得歸㑹百官退朝衆指李邦彦數其罪欲敺之邦彦疾驅以兔百姓乃擊登聞鼓山呼震地開封尹王時雍至謂諸生曰脅天子可乎胡不退諸生應之曰以忠義脅天子不愈於以姦佞脅之乎復欲敺之時雍逃去殿帥王宗濋奏於上曰事已爾亡可奈何當黽勉從之不然且生變於是遣簽書樞宻院事耿南仲言於衆曰已得㫖宣李綱矣内侍朱拱之先得㫖宣諭未到而後發之使先至衆取拱之臠而磔之號於衆曰此逆賊也即矯詔曰殺内臣者無罪綱惶懼入對泣拜請死上即復李綱尚書右丞充京城四壁守禦使而罷蔡懋綱固辭上不許命復節制勤王師种師道亦歸其𪠘士庻知二人復用遂散時師道實不罷盖外議流傳之妄云范仲淹追封魏國公司馬光贈太師張啇英贈太保除黨籍學術禁王孝迪罷以徐處仁為中書侍郎壬寅以沈晦假給事中從皇弟肅王使斡里雅布軍先是康王在敵營幾月斡里雅布憚之不肯留更請肅王代之己巳康王自金營還丙午敵退圍京城凡三十三日既得三鎮詔書及肅王至不俟金幣數足遣使告辭而去己酉李綱言澶淵之役雖與遼人盟約及其退也猶遣重兵䕶送之盖恐其無所忌憚肆行虜掠故也金人之去三日矣盍遣大兵用澶淵故事䕶送之上可其請於是分遣將士數道並進且戒諸將度便利可撃即撃之李邦彦奏立大旗於河東北有擅出兵者依軍法李綱奏備邊禦敵八事詔自今並遵祖宗舊制選用大臣裁抑内侍不崇飾恩倖不聼用奸人不輕爵禄不濫賜予不奪爾居以營燕游之地不竭爾力以廣浮用之費凡蠧國害民之事一切寝罷詔河北堅守仍出竒掩撃時斡里雅布師還抵中山河間两鎮兵民固守不肯下即以矢石及之而退沿邊諸郡亦然李邦彦罷以張邦昌為太宰吳敏為少宰李綱知樞宻院事耿南仲左丞李梲右丞蔡京責授祕書監分司南京尋移德安府衡州安置正言崔鶠上言賊臣蔡京以奸邪之術誑耀人主収天下之士以為腹心遂致賊盗蠭起夷狄亂華陛下安得而赦之遂竄京儋州尋又竄京子孫三十三人遇赦不許量移京行至潭州而死京患失之心無所不至根株結盤牢不可脱卒以召釁誤國為宗社竒禍雖以譴死而海内以不及正刑誅為恨蔡攸從道君南下或云將遂復辟於鎮江尋責永州安置徙潯雷二州又移萬安上復命即所在斬之蔡翛亦以復辟之謗被誅童貫初貶池州居住移郴州尋下詔數其十罪追斬於南雄州貫惡稔釁盈卒以起戎胎禍流毒四海雖醢其軀不足以謝天下云楊時兼國子祭酒敵陷隆德府先是太原堅守尼瑪哈攻之不克遂分兵而南既逾南北關仰而歎曰關險如此而使我過之南朝可謂無人矣遂至隆德城中素無備二日而䧟守臣張確死之自李綱建議盡遣城下兵追斡里雅布之師及邢卲間相去二十餘里金人懼其行甚速至是澤州奏尼瑪哈兵次髙平執政懼宻啓於上前以御前金字牌追兵還甚速綱力争於上前得㫖復遣而諸將還已數程矣再進猶及金人於滹沱河然將士知朝論二三悉觧體不復邀擊苐遥䕶之而已當時行移文字出於宻院者則令破賊出於三省者則令䕶出境諸將莫知適從三月張邦昌罷以徐處仁為太宰唐恪中書侍郎靖康之初首為宰相而因循失措者吳敏與處仁也奸巧自營而廢國隄防者恪與聶昌也詔金人要盟終不可保今尼瑪哈深入南陷隆德先敗元約朕夙夜追咎已黜元主和議之臣又詔种師道等徃助三鎮播告中外使知朕意命李綱迎上皇於南京夏四月上皇至京師復春秋學官追復吕公著等官五月罷王安石配享孔子從楊時之請也徽猷閣待制譚世勣又言亦不當以安石從祀不報六月丙辰太白熒惑歳鎮四星聚張壬戍彗出紫微垣秋七月除元符上書邪等禁彗出東北長數丈北拂帝座掃文昌徐處仁吳敏罷以唐恪為少宰何㮚中書侍郎陳過庭尚書右丞許翰罷同知以聶昌代之李回簽書樞宻院事九月金人陷太原始尼瑪哈乆攻太原不下乃於城外築城居之分兵防守使内外不通已而歸雲中留銀朱大王攻城至是尼瑪哈復至乘勝急攻丙寅城䧟金人盡殺勝㨗軍帥臣張孝純被擒副總管王禀負原廟太宗御容赴汾水而死轉運韓縂提舉單孝忠三十六餘人皆被害太原自去年十二月乙卯受圍凡二百六十日城中軍民餓死十八九固守不下至是始破初尼瑪哈烏實伊都自太原斡里雅布達蘭棟摩自燕山㑹於山後草地避暑且議事及秋乃還議者謂尼瑪哈烏實伊都三大帥棄大原北去徃返千有餘里而我援兵雲集不能觧太原之圍失計甚矣冬十月竄李綱言者謂綱專主戰議䘮師費財又指言十罪於是落職宫觀責授節副建昌軍安置以綱上疏辨論謂退有後言以惑衆聼再謫寜江丁酉斡里雅布陷真定府帥臣李邈措置乖謬本路兵馬都鈐轄劉竧率衆盡夜搏戰城上敵人初攻北壁竧力拒之至是偽移攻東城邈復趣竧徃應力攻两日一夕潜移攻具還北城城中不知也黎明敵人忽鼔衆憑堞而上城陷李邈不能死為敵所擒竧猶率衆巷戰顧其弟曰我大將也其可受賊戮乎因䇿馬挺刃潰圍欲出而諸門皆為金人所守遂之孫氏園山亭中觧絛絶脰而死邈被執至燕山亦不屈死之戊戌斡里雅布尼瑪哈以書來責問契丹梁王及伊都蠟書并割三鎮差楊天吉王芮為問罪使請速令皇叔越王皇弟鄆王并太少宰一員同詣行府賫書陳謝過咎命王時雍曹曚館之時雍議盡以三鎮所入絹増歳幣并祖宗内府所藏珍玩悉歸二帥且以河東宿師暴露日乆欲厚犒之天吉汭頗領其説先取犒師絹十萬疋以行先是斡里雅布軍既還尼瑪哈尚留隆德遣簽書路允迪等以和議之書上之尼瑪哈聞斡里雅布獲金帛不貲而已無所得於是遣使数軰求賂時勤王之師踵至大臣有輕敵意猥曰吾兵盛如此當與虜抗且彼既領肅王過河吾盍留其使與之相當於是館其使踰月不遣有都營趙倫者燕人狡獪懼不得歸乃訐詐以情告館伴邢倞曰金國有伊都者領契丹精鋭甚衆貳於金人願歸大國可結之以圖二敵倞遂以聞大臣信之即以詔書授倞賜伊都納衣巾中仍賜倫等尼瑪絹各千疋白金千两倫至尼瑪哈所首以其書獻之哈大怒以倫書表聞其主其主報云深入攻討委元來帥從長措置尼瑪哈遂復提兵南下又麟府折可求獻言夏國之北有大遼天祚梁王與林牙蕭太師出榜稱金人不道與南朝奸臣結約毁我宗廟今聞南朝天子遜位嗣君明聖如能合擊金人立我宗社則當修好如初吳敏以為然乃奏上令致書梁王由河東入麟州為尼瑪哈遊兵所得故敵以為辭云尼瑪哈陷汾州知州張克戬堅守以待敵俄聞朝廷分河東為两路隆德為東路平陽為西路各命守臣救汾兵未至而城陷克戬朝服南向焚香拜舞乃自引决其家死於難者凡八人紹興中贈忠慤下哀痛詔命两河互相救援雨木冰壬子詔太常禮官集議金主尊號命康王使斡里雅布軍先是王雲奉使軍前回稱金人索謝和議禮物須康王親到議乃可成故有是命尼瑪哈陷平陽府初金人犯汾州議者謂汾州之南有回牛嶺險峻如壁可以控扼於是命將以守朝廷又遣劉琬統衆屯平陽以扞北邊然國用乏竭倉廪不足士之守回牛嶺者日給豌豆二升或陳麥而已士笑曰軍食如此而使我戰乎金人領精鋭師冦回牛嶺於山下仰望官軍曰彼若以矢石自上而下吾曹病矣徘徊未敢進前俄而官軍潰散遂越嶺至平陽琬領兵遁去城遂陷凡官吏皆縋城而出已而威勝隆德澤州皆陷追王安石所贈王爵辛酉种師道薨上臨其䘮哭之甚哀後諡忠憲十一月甲子康王入辭上賜以玉帶撫慰甚厚王出城北權留定林院候冠服禮物成而行戊辰雲至自軍前言事勢中變欲得三關而止不然進取汴都中外大駭康王復入門己巳集百官議三鎮於延和殿各給筆札文武分列廊廡凡百餘人惟梅執禮孫漙吕好問洪芻秦檜陳國材等三十六人言不可與當范宗尹以下七十人皆欲與之㑹李若水歸自尼瑪哈所慟哭於庭必欲從其請先是金人遣王雲約以十五日以前告割地書到不然以十五日渡河矣何㮚謂唐恪曰三鎮之地割之則傷河外之情不割則太原真定已失矣不若任之但飭守備以待恪唯唯梅執禮建議清野尋召孫溥及執禮入對議遂定癸酉晚金人至河外宣撫副使折彦質領兵十二萬與之對壘有羅索大王者曰南兵雖多不足畏之與之戰則勝負未可知不若加以虚聲盡取戰鼓擊之逹旦以觀其變衆以為然黎明王師悉潰遂長驅而南乙亥命康王再使斡里雅布許割三鎮并奉衮冕輦輅以行仍尊金國主為皇叔上尊號十八字丙子王及之同金國通和使王汭來云軍已至西京不復請三鎮直以畫河為言陛對殊不遜有奸臣輔闇主之語上下洶懼即許之且以两府二人行唐恪既書敕何㮚大駭曰不奉三鎮之詔而從畫河之命何也㮚不肯書因請罷遂㫁諸路門橋諸軍城守至晚詔金人已渡河百官疾速上城金兵由汜水關渡河京西提刑許髙河北提刑許亢各統兵防洛口望風而潰京師聞之閉門清野丁丑王雲耿延禧髙世則等從康王出城雲白王曰京城樓櫓天下所無然眞定城髙幾一倍金人使雲等坐觀不移時破之此雖樓櫓如畫亦不足恃也王不答庚辰康王至相州壬午康王次磁州州人殺副使王雲先是雲奉使歸過磁相言金人聲勢非前日比勸二郡為清野計二郡從之撤近城民居令運積榖入城磁人以是怨雲王至懇謁嘉應侯廟百姓遮馬諫曰不可北去肅王已為人誤初言二太子重信義肅王至河必還大臣亦保無他今果如何雲乗馬在後語百姓曰大王謁廟即歸非去也或曰已有萬人守北闕雖欲行不可耿延禧髙世則諭雲勿與辯雲曰人言何足恤徐進至廟民心益忿至厲聲指雲曰清野之人真奸細也祠神畢雲出遂被害及王出廟門父老百姓前擁言曰大王不可北去今離北門五六十里即有蕃兵王尚書是細作適已打疊了王遣人諭以不復北行衆乃引退初過河之明日廵警任永為敵騎所掩問王所在永不答後得脫因請王回相州㑹汪伯彦亦以蠟書來言敵遣五百餘騎沿路訪問欲邀襲王王即回具奏河北民心不寜磁人殺王雲不令北去且聞敵已南渡故復回相以俟聖裁王令韓公裔訪得他道潜師夜起遲明至相磁人無一知者何㮚罷以陳過庭為中書侍郎孫傳尚書右丞遣耿南仲使斡里雅布軍聶昌使尼瑪哈軍許以大河為界且告和甲申初下詔清野内外驚擾軍民乗時掠財貨焚屋宇有城東廵檢龍清等捕殺三百餘人稍定未幾罷清野指揮民間鼓舞而鐡騎已逼城下矣乙酉斡里雅布犯京師初种師道聞眞定太原皆陷檄召南道總管司勤王兵及陜西制置司團結兵時總管張叔夜制置使錢盖得檄各統兵赴闕㑹師道卒唐恪耿南仲專務議和語聶昌曰今百姓困匱養數十萬兵於京城下何以給之兼既已議和使金人知朝廷集兵闕下寜不激怒乃止两道兵令毋得妄動如已起發却於元來處分屯兩軍遂散陜西軍徃秦鳯熈河南道軍住金房安復州及冦傅城四方兵無一人至者城中惟衛士上四軍中軍効勇及東西路弓手七萬人分四壁守禦大風㧞木張叔夜帥師入衛初上以手札趣叔夜提兵入衛叔夜即自將中軍二子伯奮伯熊將前後軍凡三萬人至尉氏遇賊遊騎轉闘己丑至京城屯於玉津園至是勤王之師無一來者東道總管胡直孺為敵生得以示城上都人益恐尋擢叔夜簽書樞宻以其兵入城同孫傳措置四壁閏月唐恪罷以何㮚為右僕射甲午金人陷懐州守臣霍安國通判林淵鈐轄張彭年都監趙士詝張謀張潜統制沈敦張行中及部隊將五百人皆死之初城既陷尼瑪哈問不肯降者為誰安國曰安國是宋朝守臣率衆不降又問淵等同對云某等與知州一體皆不肯降於是引令東北望金國拜降皆不屈尼瑪哈令觧衣反縳之遂害十三人而釋其餘安國一門幾無噍類丙申陷拱州尼瑪哈犯京師屯青城戊戌殿前副都指揮使王宗楚率牙兵千餘下城與敵戰統制官髙師旦死之庚子金人遣蕭慶等來貸粮且議和癸卯張叔夜聞南壁飛石擊樓櫓與范瓊分麾下兵襲敵營欲燔砲架遥見鐡騎王師不克陣而奔相蹈藉及溺隍死者以千數聶昌至絳州諭令割地絳人不奉詔為鈐轄趙子清所殺刳其目碎切之昌附南仲至顯位每佐佑其説以誤國論卒至禍變天下以此罪之丙午遣簽書樞宻院事曹輔尚書左丞馮澥宗室士􅧘詣金營請和乞罷攻城斡里雅布復遣使來曰南朝約和失信今欲盡得河東河北之地然後罷兵可先割两路地次遣不割地大臣過營再講和好敵以洞子屋負土填壕戊申命康王構為天下兵馬大元帥初虜攻城日急殿中侍御史胡唐老言聞康邸奉使至磁相間為士民所遏不得進此天意也乞就拜大元帥俾率天下兵入援宰臣視奏猶以大字為難唐老力争曰今社稷危矣仰其拯國顧惜一大字非計也於是募武學生秦仔及張九成馮朝英甄邦傑四人齎詔皆假閤門祇候惟仔先至出宸翰云檄書到日康王充兵馬大元帥陳遘充兵馬元帥宗澤汪伯彦副元帥速領兵入衛王室應辟官行事並從便冝王捧詔嗚咽望闕拜恩軍民感動壬子復遣曹輔馮澥及仲温士􅧘使敵營癸丑仲温士􅧘回云金人須親王并何㮚至軍前甲寅大風自北起俄雪下鋪地數尺連日夜不暫止敵於通津門及宣化門東立天橋數座下瞰城中砲傷王燮足流血范瓊發兵千人自宣化門出戰氣甚鋭迫逐敵衆敵棄而北士卒貪功渡河未及北岸十餘歩間氷陷裂卒驚亂敵衆臨岸效死迎敵没者五百餘人自是士氣益挫折乙卯大雨雪彗竟天丙辰金人由宣化門擁兵登城守禦人棄甲争走通津門之南亦破敵兵下城縱火殺旁居人殆盡金帥傳令殺人者族遂止京城自十一月二十五日被圍是日午時陷上聞城陷慟哭曰朕不用种師道言以至於此初敵騎之去也師道嘗勸上半渡擊之不從曰異日必為後患至是果然初敵用雲梯薄城我以撞竿衝仆之殺敵兵三千人敵即収瘞及再攻城殺我軍三百五十餘人經宿猶伏尸城上破腦貫胷横卧血中士卒見之心懼欲潰又王宗濋嘗許策應軍士告身金椀卒不與軍士皆怒出怨言再召策應不肯就募京城闊逺斥候音問不相接妄傳語言相鼓唱將師莫有以身先士卒而禁制之故兩日之間四壁卒皆下丁巳先是李若水出使留軍中乆之及城陷金人令若水歸報趣何㮚來議事若水入城見上曰金人止欲得两河地别無他事乃遣㮚及濟王栩為請命使午後㮚栩回同金人四人來議和御史中丞秦檜右司員外郎司馬朴相繼納欵軍前戊午上御宣德門赦守禦官吏軍民之罪傳宣撫諭两國已有和議各令歸業何㮚鄆王楷詣軍前請和金人謂㮚楷曰自古有南即有北不可相無也金人所期在割地而已又欲邀上皇出郊㮚回道金人意上曰上皇驚憂已病不可出必欲堅要朕當親徃己未何㮚再徃軍前詔曰大金堅欲上皇出郊朕以宗廟生靈之故義當親徃咨爾衆庻無致驚疑辛酉車駕詣青城尚書右僕射何㮚中書侍郎陳過庭同知樞宻院事孫傅等從二酋相見上與語惟尼瑪哈應答琅然斡里雅布唯唯而已十二月壬戌車駕留青城是日康王開兵馬大元帥府於相州尼瑪哈遣蕭慶入城居尚書省朝廷動静並先關白晚有榜云奉聖㫖和議已定止是徃來禮數未畢切慮軍民等疑慮今暁諭更令知悉癸亥車駕自青城回父老夾道山呼拜於路側甲子上御祥曦殿百官始造朝車駕詣延福宫朝太上皇帝金人索金一千萬鋌銀二千萬鋌縑帛如銀之數欲以犒軍朝廷令羣臣獻金帛諸王内侍帝姬亦如之又置局買金銀金價至五十千銀至三千五百命王時雍兼領開封府尹與徐秉哲分東西廂括金帛御史監視納數敵索京城騾馬詔除見任職事官留馬一匹外並限三日赴開封府納隐留者全家行軍法賞錢三千貫於是自御馬而下得七千餘匹悉歸之甲戍金人乞割河中府觧州許之乙亥康王至大名府時敵騎充斥攝大名尹張從請王移行府以河氷方堅自相至大名雖渉河而地里不逺宻邇王室發勤王之兵為便先是金帥遣使者致書且傳二帥意云康王已據河北恐諸郡不肯交地請遣使迎之乃命曹輔由京東徃先是輔回稱不知康王所在庚寅康王如東平府尚書省火雨雹丁未靖康二年春正月辛卯朔車駕詣延福宫朝太上皇帝命濟王栩景王把出賀二帥尼瑪哈亦遣眞珠大王同使臣八人入賀壬辰金人迎康王甚急學士院具詔敵再三易之遣中書舍人張徴行以曹輔不見王而還故也癸巳康王次東平府庚子車駕復幸青城時敵索金銀益急欲縱兵入城上以問蕭慶慶答云須陛下親見元帥乃可何㮚李若水亦欲上親行上將從之㑹尼瑪哈致書以諸國畢集加其王徽號請再幸營金使有髙尚書者奏云陛下不必親出但遣親王大臣以行可也上欲無徃恐敵縱兵殘民乃以同知樞宻院孫傅兼太子少傅吏部侍郎謝克家兼賔客輔皇太子監國傅仍為留守户部尚書梅執禮副之遂出城㮚以下皆從至晚遣王孝竭歸傳㫖議事未畢來日入城詔令王若冲邵成章衛皇太子赴宣德門自是並稱制行事遣閤門宣賛舍人符彬持詔至北道總管司詔曰朕即位以來交戰不已京師再圍畧無外援比者敵已登城按兵議和凡所請求靡有不從終未肯歛兵而去咨爾河北之民各宜奮發忠孝更相結集自保土疆使予中國不失於蕃夷天下安平與汝等分土共享之朕言及此痛若碎首辛丑車駕在青城留儀衛三百命侍衛親軍馬副都指揮使郭仲荀統之减七百餘人遣入城除親王宰相執政學士院禮部太常寺官外餘並令先歸於是鄆王楷而下九人宰相何㮚執政馮澥曹輔翰林學士承㫖呉开吏部尚書莫儔中書舍人孫覿尚書禮部侍郎譚世勣太常少卿汪藻皆分居青城齋宫初上幸敵營約五日必還至是民以為金銀未足各竭其家所有獻之有福田院貧民亦納金二两銀七两而敵來索不已於是増侍從郎官二十四員再根括又分遣搜掘戚里宗室内侍僧道伎術倡優之家丙午太學生徐揆詣南薫門以書白守門者乞逹二帥請車駕還闕二帥取揆赴軍中詰難揆厲聲抗論為所殺是日通奉大夫劉韐死於敵營韐守眞定有威名敵人知之欲用為尚書僕射許以家属行韐不可手書片紙遣人遺其子曰忠臣不事二君此予所以必死也乃以衣絛自經於城南夀聖院己酉開封府言根括得金十三萬八千两銀六百萬两衣叚一百萬疋詔令權住納庚戌大風霾上遣中使還城中以隂雨打毬之㑹未成尚須少留自上再幸青城都人日日迎駕自内前抵南薫門不可勝數至有然火於臂或自燒其指或望門而拜者風寒雨雪不减是日大雪終日泥淖没膝人不聊生於是就相國寺定力院保勝院興國寺置四塲糶米人三升錢六十二文都人又各率錢啓祝聖回鑾祈晴道塲晝夜不絶遣鴻臚卿康執權秘書省校書郎劉才卲國子博士熊彦詩等押監書及道釋經板并館閣圖籍納敵營二月辛酉朔車駕在青城乙丑都人傳聞軍前已擊毬駕即日回相率迎候者數萬人至晚云來日入城時括金帛己申了絶㑹軍前取過教坊人孟子著周禮義内侍藍折醫官周道隆等稱各有窖藏金銀乞差人搜取二帥大怒遣金牙郎君來責云少尹稱已盡數發絶何由尚有藏匿遂遣人荷鋤入城掘取内侍鄧珪及教坊諸工所窖於是開封府復根括立賞限陳首京城大恐丙寅敵塹南薫門路自上出郊日遣王孝竭入京撫諭都人亦日候駕雖風雪不惮是日孝竭不至人心大恐頃之傳監國皇太子令㫖以皇帝出郊多日未回太上皇來日徃軍前乞駕早還已而吳幵莫儔自敵營持文書至令依戎主詔推薦異姓堪為人主者從軍前備禮冊命仍邀太上皇帝出城孫傅等讀詔號絶即以狀懇請不報次日復申前請乞立趙氏敵以非其主本意却之丁卯太上皇帝太上皇后同詣青城鄆王以下三十餘人諸王妃公主都尉等皆從至午燕王越王民擁留之開封尹輔斬為首者一人乃止初太上皇遲疑未行金令范瓊邀請已而徐秉哲以兵衛出南薫門先是金取内侍四十五人各問所掌畢遣其半還但索曽管宫閣被任用者留守司不悟其計謂欲效禁中所為及來邀上皇并取諸王孫傅欲匿不遣并示以鄧述與管宫閤者所供名字乃盡發焉述亦内侍為眞定府走馬承受眞定陷金人置之軍中用事云辛未皇后皇太子同詣青城百官軍民奔随號泣太學諸生擁拜車前哭聲震天自太上皇出郊孫傅乞留皇后皇太子以主國事至是幵儔來督脅不已傅言於衆曰上蒙塵託孤於傅豈可自脱分付與人請從皇太子徃死生同之遂以留守事付王時雍随至南薫門范瓊以死扞拒不令出傅留宿門下初太子將出人情洶洶瓊慮變生以危言讋衛士然後益兵擁衛以出於是召百官㑹議相視乆之計無所出衆曰今日當勉强應命舉在軍前者一人時都城先閧傳金人已定立張邦昌為大楚皇帝都金陵抑令城中官員父老僧道簽狀推舉若不從便屠城尚書左司員外郎宋齊愈適自外至或問以敵意所主齊愈冩張邦昌三字示之既與所傳符合議遂定議狀云云是日不書議狀者惟孫傅張叔夜壬申取傅及叔夜徃軍中癸酉吏部尚書王時雍户部尚書梅執禮行留守事百官赴秘書省士庻僧道赴朶楼軍民赴大晟府集議推戴事時孫傅張叔夜已出獨時雍主其事恐百官不肯書乃先自書以率之百官亦随以書吳幵莫儔持往敵營御史中丞秦檜不書獨具单狀云敵人於宗正寺取玉牒簿指名要南班宗室自二王宫以近属官序髙者先取甲戍幵儔齎敵牒據文武官申乞立張相治國事己申本國冊立為皇帝訖令取冊寳及一行冊命禮數乙亥金人取秦檜并太學生三十人博士正録十員何㮚已下随上在軍前人並取家属戊寅敵遣元随肅王張邦昌路允迪三節官吏等歸辛巳尚書禮部侍郎李若水為敵所殺若水知敵不可以義動因歴數其失信五事肆罵不已尼瑪哈大怒即圜丘下敲殺之時年三十五若水將死奮罵愈切敵相謂曰大遼之破死義者十數今南朝惟李侍郎者一人初若水之出使也修武郎王履副之使還遷勸察使抗敵不回卒以俱死履臨被害畧無懼色且歌詩末章云矯首問天兮天卒無言忠臣效死兮死亦何愆人聞而悲之癸未城内復以金七萬五千八百两銀一百十四萬五千两衣叚四萬八十四匹納軍前康王次濟州勸文殿大學士中太一宫使唐恪薨張邦昌攝位朝士無貴賤多拱手臣之獨恪先事而死識者推其節乙酉敵以金銀不足遣人來取提舉官以下八人受約束户部尚書梅執禮尚書禮部郎陳知質尚書刑部侍郎程振給事中安扶同見敵責以金銀不足曰胡不賦之於民四人同辯對曰今天子䝉塵臣民皆願前死雖肝腦不計也於金繒何有哉顧誠亡以塞責敵大怒問官長安在欲加以罪而置其餘振恐執禮坐之遽前曰皆長官也敵不勝其忿先取其副侍御史胡舜陟殿中侍御史胡唐老監察御史姚舜明王侯各杖之百幾死殺執禮等四人梟其首乃下令曰根括官已正典刑金銀或尚未足當縱兵自索延寜宫火元祐皇后因廢出居相國寺前之私第初上與李若水大更張弊政乃尊后為元祐皇太后已草詔書未及行也時六宮有位號者皆從二帝惟后以廢得存戊子夜白氣貫斗三月辛卯朔車駕在青城金人令御史臺報百官詣南薰門外迎邦昌用申時入城邦昌與百官交拜於道以鐡騎裹送及門而返以付范瓊即入憇幕次與從官語移時入居尚書令㕔募吳革謀起兵范瓊誘殺之初革既募兵後遷居同文館附者至數萬人又引太學生吳銖朱夢説徐仁等数十人與参謀議革率衛士殺妻子以圖迎二帝欲奉九廟神主以從軍先誅范瓊等數十人乃命兵突出十八門期用三月八日舉事與謀者惟兵部尚書吕好問監察御史馬伸張所奉議郎致仕吳給等数人革將起兵其參謀吳銖等曰事急矣緩則且泄有不測之禍是夜班直班廣等數百人排闥曰邦昌以翊日受䇿請舉事革以衆不可奪被甲上馬時已黎明北行至咸豐門四面皆瓊兵瓊遂與權主管殿前司公事左言謀紿革至帳下議事遂斬之其徒百餘人併戮河上革至死顔色猶不少變革為人天資忠勇天文地理人事兵機無不通死之日知與不知皆為泣下丁酉金人奉冊寳立邦昌百官等㑹於尚書省邦昌泣即上馬至西府門佯為昏憒欲仆立馬少蘇復號慟導至宣德門西闕下馬入幕次復慟金人持御衣紅繖來設於次外邦昌出次步至御街褥位望金國拜舞跪受冊畧曰咨爾張邦昌宜即皇帝位國號大楚都金陵邦昌御紅繖還次訖金人揖上馬出門百官引導如儀邦昌歩入自宣德門由大慶殿至文德殿前進輦却弗御歩升殿於御牀西側别置一椅坐受官員等賀訖文武合班邦昌乃起立遣閤門使傳云本為生靈非敢竊位傳令勿拜王時雍等懇奏復傳㫖云如不䝉聼從即當歸避時雍率百官遽拜邦昌急回身面東拱手以立大抵徃來議事者幵儔也逼逐上皇以下者時雍秉哲也脅懼都人者范瓊也遂皆擢用乙巳邦昌徃青城見金帥致謝既至迎接殿下揖而升致賔主之禮酒三行面議七事其一乞不毁趙氏陵廟其二乞免取金帛其三乞存留樓櫓其四乞俟江寜府修繕畢三年内遷都其五乞五日班師其六乞以帝為號稱大楚帝其七乞借金銀犒賞金皆許之又請歸馮澥曹輔路允迪孫覿張澂譚世勣汪藻康執權元當可沈晦黄夏卿鄧蕭郭仲荀太學六局官秘書省官等亦從之先是敵須六經秀才各五人至是亦聼回其八人不回皆平日士流不檢者甘心歸之惟何㮚孫傅張叔夜秦檜司馬朴等或以言語或以廢立事不遣回令舉家北遷丁巳邦昌率百官詣南薫門五嶽觀内望軍前遥辭二帝邦昌慟哭百官軍民皆哭有號不能起者道君皇帝北狩寜德皇后及諸親王妃嬪以下皆行斡里雅布軍護送由滑州路進發戊午金人漸下城令户部尚書邵博提舉修繕是日交割外城敵既不能下南京乃自寜陵而上盡偽置官属安撫士民至是率驅而北己未敵兵下城盡絶我兵分四壁屯守邦昌詣敵營辭服赭袍張紅盖所過起居並如常儀從行者王時雍徐秉哲吳幵莫儔夏四月庚申朔大風吹石折木車駕北狩皇后皇太子偕行尼瑪哈軍䕶送由鄭州路進發辛酉金營始空其行甚遽以四方勤王兵大集故也營中遺物甚多令戸部拘收象牙一色至二百擔他不急之物稱是秘閣圖書狼籍泥土中金帛尤多踐之如糞壤吕中曰靖康元年正月因太學生陳東等六賊之論竄殛王黼朱勔李彦等此舉差足以快天下之憤然敵已至城下矣冦迫京師始謀避狄以李綱一言而更為城守之䇿既已堅守又以李彥一言而更為卑辭之請种師道既至又以師道一言而為不和之謀師道方請堅守不戰以老敵師未幾以姚平仲一言而為急擊之計平仲既敗又以李綱為誤國而罷之諸生伏闕又以李綱為可用而復之自二月金人退至十一月復入㓂凡閲十月宜上下協力以救旦夕危亡之急而朝堂方爭立黨論臺諫方追論前事士大夫爭法之新舊辯黨之邪正追復吕公著等官罷安石配享除元符上書邪等禁復春秋學官真所謂不論砲石而論安石不講防秋而講春秋也敵之退師非吾徳足以感之吾力足以制之特以二帥之勢未合恐為吾勤王之師所乗耳而一退之後吾之上下相與稱慶迎上皇於東南散西兵於關陜勤王之師盡歸諸道出於宻院者則令破賊出於三省者則令䕶出境以种師道一言詔河北出兵掩擊矣李邦彥又奏立大旗於河東北不得擅出兵三鎮不可棄固當外為棄之之辭而隂為援之之實今也一人言棄之便則不復念軍民死國之忠一人言不棄便則下尺寸不可與人之詔三鎮之民固守不下無一人負朝廷而朝廷之負其民多矣自古未有數十萬不叛之民而不能守其國者使其合數十萬以為一誰能克之所以不能當者特以權輕兵寡勢孤力分遂為金人所困耳朝廷坐視其困其為棄民斡棄師大矣猶可謂之不棄三鎮乎尼雅滿已據太原离不已陷眞定两河咽喉已塞而朝廷猶集議存棄三關地孰便范宗尹等七十餘人欲與之秦檜等三十六人欲勿與金人嘗謂吾使曰待汝家議論定時我已渡河矣大抵上下之心稍急則恐懼而無謀稍緩則遲疑而又變其説此靖康之所以敗也以四海之大無一人可以係天下之望而大臣多出蔡京父子童貫梁師成王黼之門敵既以無人狎中國天下負亦以無人輕朝廷獨李綱以眇然一介放逐之餘出天下山岳萬鈞之重首陳至䇿而徽宗决内禅之計繼發大論而欽廟堅城守之心敵退之後数陳出師邀撃之可以必勝與其得氣再入之不可不憂則讒間蠭起逺謫遐荒矣而大臣如李邦彦張邦昌吳敏徐處仁唐恪聶昌耿南仲終始以割地請和為言皆堕敵人計中此小人以和誤國尤甚於敵人之以和誤我也何㮚孫傳猶以為地不可割謂金人之志不在割地都城既䧟乃反傾意講和夫不信於造謀之始而反信於城䧟之後辜天下之望成不治之疾由惑於和議而戰守不固也靖康之禍視石晋亦無以異然契丹三入中國而三敗契丹極力以攻之而晋人亦極力以禦之若非杜威之降敵晋未亡也契丹之取晋以百戰之力而靖康之取燕取两河再渡河再廹京師未嘗有一戰之勞皆小人之夷狄終始實誤之也其始也開釁召禍其敗也又欲速和以免禍靖康之賣國降敵即靖康主和之人也靖康主和之人即宣和開釁之人也誤宣和者小人之魁而誤靖康者小人之積習也惟張叔夜一人帥師入衛其後北邊卒不入其境不食其粟惟吳革一人欲出兵與之决勝其後謀起義兵卒為范瓊所殺惟劉韐與太學生徐揆二人死於敵營惟李若水罵賊而死他臣尚忍言哉嗚呼我祖宗以仁結民心未嘗妄殺一人以義結士大夫之心未嘗濫誅一賢者建隆開其源慶厯以後浚其流此治平丁未以前所以中外無事也自安石行新法而祖宗以仁結民心之意失矣自司馬光等凡幾追貶劉安世等凡幾竄逐而我祖宗以義結士大夫之意失矣章子厚則因安石之所未甚者而甚之京黼則反因章惇之所未甚者而甚之此靖康小人所以被禍最慘也然吾觀河東河北陜西之民死不忍忘君父自宣和間迄於紹興迨十年寕不肯降敵太原孤城羸兵饑民尚二百六十日不下中山一郡被圍嵗餘而後墮夀春一有敵百計死守凡三受攻而不能㧞朝廷割城與之而其民閉門以拒之則吾民之不負吾祖宗之仁者多矣士大夫受國厚恩而反忍於降敵忍於事異姓忍於背君父則士大夫負吾祖宗之義者亦多矣為吾祖宗之民者猶知有君民之義而為吾祖宗之臣者不知有君臣之義甚矣其可痛矣哉宋史全文卷十五
