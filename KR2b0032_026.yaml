body:
  text: 宋史全文卷二十六上宋孝宗五甲午淳熙元年春正月庚子上宣示文字一紙云蔡洸具到衢州守臣并本路監司措置會子申繳文歷比他州稽緩守臣可恕所專責者監司其提刑趙彥端特降兩官曽懷奏賞信罰必要當如此上曰有功不賞有罪不誅雖唐虞猶不能化天下也己酉詔已降指揮令殿前司主帥於二月內就茅灘合教諸軍訪聞舊來每遇大閲主帥例設酒食如待客之禮可專劄下王友直毋得循習務令軍容整肅庚戌進呈安南事上曰安南入貢禮意可嘉可令有司討論賜國名典故以聞二月戊午朔進呈江西安撫司申撿凖紹興三十年七月九日指揮將諸路禁軍以十分為率取五分專一教習弓弩手帥司每嵗春秋選差將官前去諸州教閲緣乾道新法按閲條內不曽修立詔令諸路帥司遵依元降指揮施行仍令敕令所修立成法上曰諸路㨂中禁軍土軍弓手須常令教閲責在守臣如有違戾當坐其罪辛酉詔平江府將魏夀卿見存家産抄估補填所侵盜官錢以臣僚言夀卿知無為軍巢縣移易大軍錢二萬二千餘貫入已故有是命庚午進呈差曹冠充沿海制置司幹官時冠差遣屢經繳駁上頗憐之朝廷欲以沿海制置司幹當使臣闕一員改作文臣幹辦公事處冠上曰此却不可古者為官擇人未嘗為人擇官今乃因冠而改窠闕近於為人擇官也可别尋闕次處之庚辰詔州郡循習舊弊巧作名色饋送及虛破兵卒以接送為名多借請受并假官權攝支請供給之類又聞諸司與列郡胥吏牙校月有借請蠧財困民致令歸正揀汰之人拖下請給仰諸路監司帥臣覺察是月賜交趾國名安南李天祚加封南平國王三月辛卯召步軍司中軍弩手射射鐵垜簾赴內教庚戌臣僚言用人之弊一曰上下之分未嚴二曰義利之説未明何謂上下之分未嚴夫任賢使能人主之柄助人主進賢退不肖大臣之職近世一官或闕自衒者紛至始則悉力以求之不則設計以取之示以好惡而莫肯退聽限以資格而取求不已未聞朝廷有所懲戒也何謂義利之説未明居官司職義也背公營私利也今中外求官者惟計職務之繁簡廩稍之厚薄既得之則指日而望遷援例而欲速公家之事未嘗為旬月計也願明詔大臣深思致弊之由共圖革弊之術使士風稍振百官奉職從之是月進呈浙西帥憲司保明進士施浦等各出米五千石賑濟欲遵格補官上曰朕不鬻爵以清入仕之源今以賑濟補官却是為百姓初祖宗因唐舊分别流品不相混淆故有出身無出身及進士上三名賢良方正曽任館閣省府之類遷轉皆不同犯贓及流外納粟尤不使汙士流蓋不待分左右也元豐官制行始一之然猶有一官而分左右者徒以少優進士出身而已至元祐中遂自金紫光祿大夫至承務郎皆以有出身無出身分左右至犯贓則併去左右字論者尤以為當紹聖以後復去之紹興初方務行元祐故事故左右之制亦復行至是有趙善俊者建言以為本范純仁偏蔽之論請復省去從之是春言者論淮南安撫使王之竒好為大言備位無補欲為脫身之計遂請分閫之行淮上荒殘之餘首建招誘耕鑿荒田多請官錢空名綾紙而去所招之人間以妄包已墾熟田計為頃畝以補官者遂罷之之竒既罷淮南復分為東西路夏四月宗正寺請訓宗室名翼祖下廣字子連繼字太祖下與字子連孟字太宗下必字子連艮字親賢宅多字子連自字棣華宅茂字子連中字魏王下時字子連若字詔舉制科略曰昔我仁祖臨御親選天下十有五人崇論宏議載在方册慶歷嘉祐之治上參唐虞下軼商周何其盛哉五月丙申進呈臣僚劄子陳請伏見六部及諸寺監官同共計論勘當文字多是不曽聚議取辦臨時遂致考究未盡供報稽緩乞今後令所轄所𨽻官司會議供申上曰此用西漢故事甚為得體便可施行己亥簽書葉衡言兵權繫於將帥民命宅於牧守二者之患每在數易望自今精加選擇使材稱其職然後力行守久任之説以破數易之害從之甲寅著作郎木待問奏士大夫氣節不立惟在陛下涵養作成如奔競之習最壞氣節不可不革上曰當如卿言必見之賞罰使之懲戒六月丙辰朔詔王友直吳挺持身甚亷治軍有律凡所統馭宿弊頓除可並與建節鉞武功大夫榮州刺史提舉台州崇道觀秦琪身任帥臣蠧壞軍政專事阿附貪墨無厭可責授舒州團練副使漳州安置戊午詔纍降指揮已有差遣人不得干求換易比來約束寖弛日益奔競今後似此之人可依已降指揮三省具名聞奏當議降黜其已授差遣人朝辭訖限半月出門己卯詔知漢州王沂主管崇道觀朝公退各降一官􅀈州編管張松移南恩州沂等薦舉夔路鈐轄陳彥充將帥任使至是密院審察彥别無可採故也是月詔議祫饗東嚮之位初吏部侍郎趙粹中言謹考前代七廟異宫祫饗則太祖東嚮乃者紹興五年董弅建議乞正藝祖東嚮之尊謂太廟世數已備而藝祖猶居第四室乞遵典禮正廟制遇祫饗則東嚮得旨下侍從臺諌集議既而王普復有請當時集議如孫近李光折彥質劉大中廖剛晏敦復王俁劉寧止胡交修梁汝嘉張致逺朱震任申先何殼楊晨莊必強李弼直皆以其議悉合於禮時臣叔父渙任將作監丞因陛對奏陳甚力據引詩禮正文乞酌漢太公立廟萬年南頓君立廟章陵故事别建一廟安奉僖順翼宣四祖禘祫蒸嘗並行特祀而太祖皇帝神主自宜正位東嚮則受命之主不屈其尊逺祖神靈永有常祀光堯皇帝深以為然即擢董弅為侍從叔父渙為御史是時趙霈為諌議大夫以議不已出倡邪説以害正論而欲祫饗虛東嚮今若稽之六經典禮三代之制度定藝祖為受命之祖則三年一祫當奉藝祖東嚮始尊開基創業之祖其太廟常饗則奉藝祖居第一室永為不祧之祖若漢之髙祖其次奉太宗居第二室水為不祧之宗若周之武王若僖順翼宣親盡而祧别議遷祔之所則臣亦嘗考之祔於德明興聖之廟唐制也立太公南頓君别廟漢制也前日王普既用德明興聖之説而欲祔於景靈宫天興殿朱震亦乞藏於夾室今若别建一廟為四祖之廟或祔天興殿或秪藏太廟西夾室每遇祫饗則四祖就夾室之前别設一幄而太祖東嚮皆不相妨庶得聖朝廟制盡合典禮詔禮部太常寺討論右丞相曽懷罷秋七月內降詔曰朕惟天下治亂繫乎風俗之媺惡風俗媺惡繫乎士夫之好尚蓋士夫者風俗之表而天下所賴以治者也故上有禮義亷恥之風則下有忠厚純一之行上有險怪偷薄之習則下有乖爭陵犯之變朕嘗戢姦貪黜浮靡躬節儉以示天下而歷紀逾久治效未進意在位者未能率德改行以厚風俗故亷士失職貪夫長利將何以助朕興化致理無愧於古呼部使者郡守其為朕察郡邑亷吏來上朕將甄奬待以不次其或持祿養交崇飾虛譽應詔不以實使積行之君子壅於上聞時汝之辜必罰無貸甲午進呈檢放過乾道九年災傷倚閣錢物浙東路自淳熙兀年為始作三年𢃄納江東路候豐熟作兩年𢃄納江西路即不曽據州軍報到災傷數上曰既是災傷若與倚閣稅賦亦無從出可並與蠲放如有已納數目與理充一年合納之數丁酉詔諸路州縣市令司日下並罷官司及在任官收買物色並依民間市價支錢不得科抑減尅如違以違制論許民户越訴癸卯中書門下省奏關外四川沿邊諸路及金州上津皆有歸正等人詔令四川安撫制置司行下都統司將上件歸正等人常切存撫毋令失所甲辰詔沿江被水之家令守臣胡與可躬親巡門相視既而相視到被水貧乏之家六百三十有八詔令左藏南庫每家支錢五貫文仍許於沿江白地二百畝內依元來丈尺指射蓋屋居止量入白地租錢戊申江東提舉潘甸言被旨所部州縣措置修築濬治陂塘今已畢工計九州軍四十三縣共修治陂塘溝堰凡二萬二千四百五十一所可灌溉田四萬四千二百四十二頃有竒詔劄下諸路依此逐一開具以聞是月曽懷復相先是臺臣詹亢宗李棠論李杓王宗已因中懷懷遂求退且乞辨明誣謗續棘寺根究無實乃貶責亢宗及棠而復相懷續言者又論參政姚憲與亢宗等通謀陷懷以求傾奪其相位乃罷憲尋責南康軍居住八月庚辰上曰密院差除切須公當如親舊有乞差遣者須分明具出資格合入差遣將上待朕處置庶免人言壬午上諭宰執曰朕進用人才初不因其薦引之人而為之去留惟其當而已若薦者偶以罪去被薦者相與為姦則當併逐若初不阿附而有才能當依舊用之楊倓奏陛下聖訓誠為至當上又曰鯀之為人初不害禹之成功倓又奏陛下聖訓及此誠堯舜之用心矣臣留正等曰聖主之用人也猶工師之用木長短大小各隨其才而器之惟至於朽折敗腐者而後置之不可用之域其人果賢也吾用之果非賢也吾去之是用人之道也不觀其人之賢否而視其薦者之去留是教天下之士使為黨也歡兜之薦共工皆斥之可也四嶽之薦鯀四嶽豈鯀之黨哉君子以道相同衆人以利相從然則其有黨者必非君子也然世之病君子者必為黨之一説何者不如是不足以惑人主而盡逐天下之異已故也聖訓及此固已深燭君子小人之情偽天下之福孰大於是九月戊子宰執奏事畢上顧謂曽懷等曰前日詣德夀宫太上飲酒樂甚太上年將七十而步履飲食如壯年時每侍太上行苑囿間登降皆不假扶掖朕見太上夀康如此喜固不可言及回顧皇太子仕側時和嵗豐中外無事人情熙熙三世同此安榮其樂有不可形容者懷等奏此皆陛下聖德聖孝昭格天地有以致之庚寅詔行其職事釐務官自今任滿非擢用者並依資格更迭補外壬辰詔江西湖南路纍經災傷所有上供米斛逐年已行減放外今年雖是豐熟尚慮民力未蘇所有第四第五等人户合納淳熙元年秋苖特與蠲放一半如州縣輒敢違戾拘催許人户越訴及不得容縱人吏作弊將第三等以上稱第四等以下人户減免並令監司覺察按劾聞奏乙未進呈淮東安撫司申商進等私攬戚三等銀過淮北分與北榷場牙家事發有銀牌天使走馬到泗州徑入獄審問陳二及攝同知趙德溫并一管軍千户對問上曰彼能如此甚是楊倓奏金主本無他但其臣下有妄生事上曰然切不可以此為喜於理固當安靜然非我君臣之志也可以此意宣諭三省臣留正等曰戰國之時齊居山東事秦最謹不見兵革之禍然而不免於亡者侍秦之不我病也諸葛亮之在蜀無一嵗而不出師所以保國之道其在於斯故夫有急則坐薪嘗瞻以為憂無事則玩細娛而忘天下之大患為國逺慮者豈如是乎昔者慶歷盛時契丹既守和好夏國亦受封册韓琦建言謂當此之時便謂太平無事則後必有大憂又況大統之未一大恥之未雪其可一日而少忘於此歟然則不以夷狄之懷為安而常慮天下之危聖謨洋洋非天下之至明其孰能與於此哉新知隨州蔡戡奏論唐太宗貞觀諌録上曰從諌正是太宗所長此書置之座右可為規鑒丁未詔張薦不合輒受賄賂追三官勒停彬州居住右武大夫果州團練使李川不合私通饋遺降授武功大夫吉州刺史右武大夫楚州團練使王公述輒以財請求軍職降授武功大夫貴州刺史放罷左武大夫貴州刺史宋受降授右武大夫修武郎閣門祗候劉士良降授保義郎並放罷內張薦係武經大夫文州刺史特於遙郡階官上追三官是月曽覿開府儀同三司幸玉津園宴射冬十月壬戌詔自今違法賣易恩澤及薦舉授賂之人因事敗露有司定罪外更取特旨重作行遣戊辰詔紹興府今年合起發上供苗米四萬三千五百石特與蠲放以守臣張宗元言諸縣旱傷故也十一月甲申朔日有食之丙戌簽書樞密院事楊倓劄子奏近因奏事論及時政伏蒙宣諭朕嘗訓戒士大夫曰待敵當用詭道在朝當用誠實百餘年來嘗患戎狄強而中國弱正緣反是待敵既無竒䇿動則為虜所窺在朝以術數相傾以躁競取進風俗之弊當救正之仰惟聖謨嘉言切中時宜臣備位樞臣躬受玉音欲望宣付史館詔從之甲辰以龔茂良參知政事因奏事畢賜坐上顧葉衡及茂良曰兩參政皆公議所與衡等起謝上從容曰自今諸事不可徇私若鄉曲親戚且未須援引朕母存公道設有未是處卿等宜力爭君臣之間不可事形迹房杜傳無可書之事蓋輔贊彌縫不見於外所以能然衡曰臯夔稷契在唐虞之朝其見於後世者都俞吁咈數語而已茂良曰大臣以道事君遇有不可自當啓沃豈容使迹見於外曽懷罷相除職奉祠懷以疾自請也以葉衡為右丞相己酉著作佐郎鄭僑劄子論祖宗朝每日召見講讀官至仁宗朝始有間日一講之制上曰自太宗真宗始置侍讀講官於聖學尤為留意壬子進呈江西漕臣錢佃等奏興國軍以公使庫酸敗酒散下通山等三縣抑勒百姓髙價收買臣等雖已禁止乞嚴行禁約事上諭葉衡龔茂良曰奉行法令在下不可不嚴事既上聞却當從寬然後各得其宜今屬郡違戾監司已置不問而乞朝廷嚴行禁約事體不順遂詔令本路監司開具散酒當職官吏姓名申尚書省十二月甲子詔臨安府鹽官縣三鄉旱傷可減放苗租等六千三百八十石先是本鄉人告旱傷本府差察推方傑減放止一千六百一十石漕司委凖備差遣方伯達同本府糧料院錢閲知縣李宗文再同檢視合放上件詔方傑展二年磨勘丁卯詔前軍與中軍各𢃄甲射射爭賞內弓箭手以六十步每人射八箭要及五分親弩手以一百步每人射六箭前軍以十三日中軍以十四日並射射鐵垜簾赴內教是月修吏部七司法參政龔茂良言官人之道在朝廷則當量人才以擢用在銓部則宜守成法以差注蓋法者一定不易如規矩權衡不可私以方圓輕重也夫法本無弊而例實敗之法者公天下而為之者也例則因人而立以壞天下之公者也昔者之患在於用例破法而比者之患在於因例立法今吏部七司法者自晏敦復裁定有司守之以從事可以無弊緣臣僚申明衝改前後不一率多出私意徇人情向者陛下深知其弊嘗加戒敕毋得用例破條然有司巧於傅會多作條目於是率修立成法矣臣謂用例破法者其害淺因例立法者其害大宜詔有司講求本末將新舊法相與參考舊法非大有所抵牾者弗可輕去新立條制凡涉寬縱於舊法有違者一切刋正庶幾國家成法簡易明白可以遵守從之是嵗淮南復分為東西路皇子判寧國府魏王愷徙判明州治二十嵗有惠愛已未淳熙二年春正月甲申朔二月癸亥詔泉州左翼軍去朝廷二千里每事必申密院殿司恐致失機自今遇有盜賊竊發一時聽安撫節制三月己丑進呈何淡試館職䇿有御筆勾處奏審取旨上出文字一紙乃録其䇿中所言堂闕歸部亦有未便舊法吏部長二得以銓量年老不堪釐務之人今不復有所進退近來引見選人改官未聞有不許改官者上曰恐所言有可採者不欲遺之後五日檢照條例將上申嚴舊法令吏部從實銓量并引見選人改官於進卷內具出舉主所薦事狀如係捕盜人即詳具所得功賞之因從之是月親試舉人賜詹騤以下及第出身有差尋特御射殿引正奏特奏名按射推賞有差後遂為例蜀人楊甲對䇿言恢復之志不堅者二事其一謂妃嬪滿前聖意幾於惑溺其一謂䇿士之始其及兵者不過一言而已是以談兵革為諱論兵革為迂也上覽對不悅置之第五是春降會子五十萬貫付兩淮收換銅錢夏四月壬子朔內殿進呈淮東西兩總領各乞以金銀兌換會子支遣上曰綱運既以會子中半入納何故乃爾闕少葉衡龔茂良奏緣朝廷以金銀換收會子椿管不用金銀價低軍人支請折閲所以思用會子上曰何幸得會子重但更思所以闕用之因三日復宣問及此衡奏户部嵗入一千二百萬其半為會子而南庫以金銀換收者四百餘萬流行於外者才二百萬安得不少上曰此是户部之數不知兩總領所分數入納如何兩處且各以三十萬與之兌換金銀及錢良臣申到民間入納闕少會子并兩淮取換銅錢已支絶會子乞再給降上曰會子直如此少茂良奏聞得商旅往來貿易競用會子一為免商稅二為省腳乘三為不復折閲以此觀之大假流通上令應副因宣諭曰卿等子細講究本末思所以為善後之計乙卯進呈江西湖南昨得旨以頻年旱傷第四第五等人户合納秋苗特蠲一半切恐諸郡支遣不足緣此敷擾及民上曰此是特恩又所爭止十七八九萬斛可並於上供數內除豁仍禁戢不得輒有敷擾許人户越訴將違戾官吏重作施行戊辰興州駐劄御前諸軍都統制吳挺劄子切見四川諸軍近年以來兵將官差除廢罷雖名為出自宣撫司其實多自諸司官屬及州縣官造作毁譽推薦中害往往罪賞不當因此兵將官不以職事為意專務奔競交結乞指揮嚴行戒飭詔令宣撫司常加覺察如有違戾具名申奏重作施行五月己丑詔知縣並以三年為任從知饒州王師愈之奏也臣留正等曰古者吏與民相親官吏布於六卿之中又何嘗有遷徙更易之勞哉故夫言焉而民聽之令焉而民從之後世既異於古而又不使之久任以千萬人之情偽而聽於一令之耳目雖得賢者為之猶恐難乎其為力也三年為任則官修其業民習其教古之意為近之矣辛卯宴宰執於澄碧上曰今嵗雨㿩時若蠶事已畢問諸處麥已登場米價低平百物俱亷可喜遂泛問中外事葉衡等各以所聞對上曰自三代而下至于漢唐治日常少亂日常多何故衡奏正為聖君不常有如周之八百年所稱極治者成康而已上曰然朕嘗觀無逸篇見周公為成王歷數商周之君享國久逺真後世龜鑑未嘗不以此為戒衡等同奏陛下能以無逸為龜鑑誠宗廟社稷無窮之福也上又語及君臣相遇之難曰如陸贄之於唐德宗不為不遇朕嘗覽奏議喜其忠直次第見於施行龔茂良奏蘇軾在經筵繳奏陸贄奏議其表云人臣獻言正如醫者用藥藥須進於醫手方多傳於古人陸贄不遇德宗今陛下深喜其書欲推行之是亦遇也上又泛論用人不可分别黨與須當盡公又曰朝廷所用止論其人賢否如何不可有黨如唐之牛李其黨相攻四十餘年不解皆緣主聽不明所以至此文宗乃言去河北賊易去朝中朋黨難朕嘗笑之為人主但公是公非何緣為黨衡等同奏文宗優柔不斷故有此語陛下聖明英武誠非難事上曰此所謂坐而論道豈不勝如絲竹管絃皆起謝上又曰朝廷所行事或是或非自有公議近來士大夫又好唱為清議之説此語一出切恐相師成風便以趨事赴功者為猥俗以矯激沽譽者為清髙駸駸不已如東漢激成黨錮之風殆皆由此深害治體豈可不痛為之戒卿等可書諸紳茂良奏曰唐末白馬之禍害及縉紳至有清流濁流之説然惟大中至正之道可以常行上曰朕常日所行乃執其兩端用其中於民衡等同奏舜之所以治天下者其要在此六月癸亥進呈內降李顯忠奏陳乞女夫添差東南第四副將趙􅕔差遣奉御筆再與前任差遣緣無添差恩例有礙近降指揮上曰卿等合如此理會既礙指揮則已大凡法度須是上下堅守乙亥臣寮言用人之道未有不以久任為説諸路則監司帥守諸軍則都統統制此尤不可不久望詔大臣求材預備待其或闕則取而用之如此則用得其人可久於其任從之是月定補外𢃄職格從左司諌議簽書之請也邦彥言陛下憂勤萬務規恢事功然而國勢未強兵威未振民力未裕財用未豐其故何耶由群臣不力故也望自今而後中外士夫無功不賞而以侍從恩數待有功之侍從以宰臣恩數待有功之宰相任侍從宰相無功而退者並以舊官歸班惟能強國治兵裕民豐財者則賞隨之而又視其輕重而為差等任侍從而功大與之宰執恩數可也任宰相而功小與之侍從恩數可也其在外者雖不曽任侍從宰執而其所立之功可以得侍從或宰相恩數者亦視其功而與之則天下之士變求進之心為立事之心而陛下之志遂矣上深然之遂詔自今宰臣侍從除外任者非有功績並不除職在朝久者特與轉官其外任人非有勞效亦不除授於是曽逮以權工侍出知秀州不𢃄職用新制也罷四川宣撫復制置使湯邦彥又論四蜀復置宣撫而以應于舊屬場務悉還軍中又除統制司赴宣司審察外其餘皆俾都統自差是與其名而奪其實與其名則前日體貌如故奪其實則前日事勢不存以不存之事勢為如故之體貌是必上下交惡軍帥不睦不惟無益而又害之矣上亦納其言於是召沈夏還朝而宣撫司遂罷矣竄蔣芾王炎張説芾炎落職説降觀使建昌袁撫州居住以言者論三臣其始皆言誓死效力以報君父及得權位懷姦失職深負使令也秋七月乙未宰臣進呈訖上曰今中外無事近日時時得雨豐稔可待會子通行民間銅錢日多甚可喜葉衡奏今諸處會子甚難得謂宜量行支降行使上曰未可向來正緣所出數多致有前日之弊今須少待徐議施行丁未上宣諭葉衡等買和仲朕本欲行軍法然其罪在輕率進兵朕觀漢唐以來將帥被誅皆以逗遛不進或不肯用命今和仲正緣輕敵冒進誅之却恐將士臨敵退縮俟勘到情犯别議施行先是上宣諭衡等賈和仲與茶賊戰失利當治其罪此須商量要歸於當朕非固欲誅之和仲當一小冦乃失律如此設有大敵當如何不誅恐無以警諸將然誅一人須要是卿等更熟議是月彗出西方八月甲戌廣西經略張栻言諸郡賦入甚寡用度不足近年復行般賣鹽此誠良法然官般之法雖行而諸郡之窘猶故蓋以此路諸州全仰於漕司漕司發鹽使之自運除本腳之外其息固有限而就其息之中以十分為率漕收其八諸州僅得其二逐州所得既微是致無力盡行般運而漕司據已撥之數責八分之息以為寄椿則其窮匱何時而已幸有僅能般到者髙價抑買豈保其無欲乞委本司及提刑鄭丙漕臣趙善政公共將一路財賦通融斟酌為久逺之計既於漕計不乏又使一路州郡有以支吾見行鹽法不致弊壞從之是月湯邦彥使北請河南陵寢之地也九月辛卯詔楊盧荆南襄興元金興州依舊分為七路每路文臣一人充安撫使以治民武臣一人充都總管以治兵丁酉知荆門軍黃茂材言唐李靖六花陳法出於武侯嘗因陛對畫圖以進比帥司奉詔令州軍見管民兵以七十五人為一隊正合李靖兵法遂將本軍義勇民兵分為七軍每軍旗幟各别色號置造兵器俟今冬躬自教習大陳包小陳大營包小營隅落鈎連曲折相對可以成六花陳今來荆南府差將官前來本軍教閲恐只沿習軍中之法乞將本軍民兵自教兩月却差荆南將官一員閲視從之己亥龔茂良李彥頴奏省院各止獨員臣等於擬除批旨等事皆不便上曰朕深入思慮以未得其人故爾遲遲因泛論中外臣僚上曰為宰臣須胸次大乃能容物茂良奏誠如聖諭坤之六二乃大臣爻其辭云直方大不習無不利直方之德須大乃能有容上曰居此位安可不大彥頴奏後之為輔臣者往往先有忌克之心以故不能容上曰士大夫更歷外職任未見其短才居政路便覺有此等病茂良奏書之秦誓曰如有一個臣斷斷猗無他技云云蘇軾為之訓傳謂前一人似房玄齡後一人似李林甫上曰此説極當次日內殿奏事畢茂良等謝昨日聖訓上曰今士大夫能文者多知道者少故平時讀書不見於用庚子詔階成西和鳯州當職官以下令本路帥漕司於四路在部官同共選辟并體量見任人委實癃老及不堪倚仗者並申制置司躬親審量保明申取朝廷指揮其所辟官不許辭避所有邊賞一節令吏部看詳申尚書省以知成都府權四川制置使范成大所奏也甲辰制置范成大言相度乞下興州都統司如鳯州不測緩急所有應緩一節一面應機將附近軍馬遣發前去却申制司照會從之是月葉衡罷相以諫官湯邦彥論其奮身寒微致位通顯未聞少有禆益惟務險愎以為身謀也初命知建寧府言者不已遂罷之閏九月庚戌詔諸路常平司每嵗於秋成之際取見所部郡縣豐歉各及幾分如有合賑米賑給去處即仰納度所用及見管米斛若干或有闕少合如何措置移運並預期審度施行仍須管於九月初旬條具聞奏辛酉浙憲徐本中言近者州郡率用私意更易官吏不申省部不報監司移郡之邑移邑之郡或以他官而兼攝或以卑官而任重往往辭繁就簡捨薄從厚請求僥覬惟利是趨易置紛然寖亂舊制理宜戒飭從之壬戌詔浙東提舉鹽司體訪浙西提舉薛元鼎措置印給亭户納鹽手歷式樣將合支本錢盡數稱下支給毋致積壓拖欠先是元鼎印給手歷遍給亭户令賫歷就稱下支錢至是復令浙東行之丁卯詔浙東今嵗間有旱傷州軍仰轉運提舉日下委官興修水利召募本處闕食人支給錢米因此存濟趂時修築不得因而科擾辛未進呈淮南轉運司申濠州鍾離定縣巡檢耿成令再任上曰祖宗成法惟監司及沿邊郡守方許再任耿成雖有勞效已經再任不欲以小官差遣壞祖宗成法因論及國家承平二百年法令明備講若畫一儻能守之自足為治蓋天下本無事庸人擾之耳是月賑兩淮飢冬十月戊寅朔詔浙東合納內藏庫坊場錢可依自來立定租額庚辰詔昨令諸路興修水利以備旱乾今嵗旱傷江東淮東為甚未委當來如何興修元興修官具析以聞從門下省請也丁酉進呈御筆將上臣僚奏具蓋王府多字號宗子係英宗四世孫袒免親乞升等換官并每月添支錢米及雇募人等上曰此事須當討論恩數即可與如服屬豈容輒有升降壬寅上諭執政曰李川按劾統制官解彥詳等不能平賊此甚可喜風俗委靡務為姑息以徇人情此弊非一日朕每見有能舉職者須與激勵李川昨曽降官今可與復元官更轉一官十一月戊申朔日南至加太上帝后尊號光堯夀聖憲天體道性仁誠德經武緯文太上皇帝夀聖齊明廣慈太上皇后戊午進呈提點坑冶王楫奏刷到本司寬剩錢十萬貫欲乞進入以禆慶賞之萬一上曰此不可受亦不須却宜令就本處樁管充製造軍器使用龔茂良奏是舉不惟可遏獻羡餘之原亦使中外聳然莫測聖意所在癸亥臣僚言祖宗時有會計録備載天下財賦出入有帳一州以司法掌之一路以漕屬掌之紹興七年臣僚有請倣本朝三司之制專舉提舉帳司總天下帳狀以户部左曹郎官兼之積習既久視為文具乞詔户部條畫申嚴措置俾天下財賦有所稽考不致失陷從之戊辰進呈知靜江府張栻奏保伍之設誠戢盜之良法臣自到官以來講究措置施行於靜江境內頗得其效近復以推於一路乞下有司考訂斟酌申嚴而行之上曰張栻頗留意職事可委諸路州軍守臣詳廣西已行事理措置施行帥憲司常切覺察毋致稽慢栻尋又奏本路備邊之郡九而雍管為最重雍之所管輻員數千里而左右兩江為最重自雍之西北有牂牁大理羅甸自把而西南有白衣九道安南諸國皆其所當備者然雍之戌兵不滿千人所恃以為籬落者惟左右兩江溪洞共八十餘處民兵不下十萬首領世襲人自為戰如古諸侯民兵之制其去雍管近者餘三百里逺者近千里所恃以維持撫馭之者惟提舉盜賊都巡檢使四人各以戌兵百餘為溪洞綱領其職任可謂不輕矣可不遴選其人謹護其土以為南方久逺之蔽乞依大觀指揮許本司奏辟從之己巳進呈提舉江東潘甸提舉淮東葉翥權發遣平江府陳峴具析到修治陂塘事上曰昨委諸路興修水利以備旱乾今嵗災傷乃不見有灌溉之利若非當來修築滅裂即是元申失實內江東已修去處最多彼傷分數尤甚於是潘甸特降一官落職葉翥特降兩官陳峴特降一官甲戌詔大臣日見賓客有妨治事纍有指揮如侍從兩省官三省樞密院屬官有職事於聚堂取稟私第除侍從外其餘呼召取覆等官每日各止許接見一次出榜私第可常切遵守施行十二月丁亥詔近來赴朝臣僚於殿門內輒行私禮朝儀不肅有違條法令閣門覺察彈劾甲午行上皇慶夀禮以太上皇帝來年聖夀七十預於立春日詣德夀宫行慶夀禮大赦是月更定強盜􅀈法詔比舊法增一倍定罪併左藏南庫封樁庫提領左藏封樁庫顔度言今相度欲將南上下庫及封樁上下四庫併為二庫以左藏南庫左藏封樁庫為名將兩處錢物乞從朝廷各行就便對兌並不用上下二字不須添置官吏就用各庫官吏合干人等從之遂以左藏南上庫充左藏封樁庫對兌時內旨取撥南庫緡錢色目寖廣龔茂良奏朝奏所急者財用數十年來講究措置靡有遺餘而有司乃以窘匱不給為言臣因取其籍披尋本末源流具見積年出入之概大抵支費日廣所入不足以當所出之數至紹興十七年所積盡絶每嵗告闕不過二百萬緡至二十四年以後闕至三百萬緡而乾道元年二年闕六百餘萬緡爾後却有增收鹺錢色目粗可支吾有司失職無以為計專指南庫兌貸給遣臣復講求南庫起置之因其間經常賦入蓋亦無幾而屬者支費浩瀚約計僅可備二三年之用若繼自今撙節調度可無倉卒不給之患因條具以聞上感悟是嵗江西轉運副使李燾上神哲兩朝續資治通鑑長編自治平四年三月盡元符三年正月以王揖為都大提點坑冶其合差官令揖奏辟尋移司饒州嵗鑄以十五萬為額丙申淳熙三年春正月戊申朔二月辛已上御便殿閲兩浙福建土兵上曰軍士皆好身手教閲甫三數月事藝已精熟弓弩手自可比殿司之數因諭輔臣曰向來烏珠南侵陳思恭邀截于平江官軍乃用長槍不能及敵烏珠遂以輕舸遁韓世忠江上之戰亦然若用弓弩烏珠必成擒矣今次州郡起發禁軍土軍極整肅茲又及時遣歸更加激犒他時調發必易集也三月丙午朔日有食之隂雲不見進呈上皇日厯夏四月戊寅進呈四川總領所乞再借四路職田租課十年嵗為錢十二萬貫充揀汰人請給上曰昨借諸路職田尋已給還四川自當一體豈可再借龔茂良李彥頴奏圭田所以養亷誠不當借上曰卿等可契勘别撥錢作㨂汰人請給職田自今嵗便與給還龔茂良等奏昨已繳進令侍從臺諌兩省官薦舉監司郡守指揮未審曽經睿覽否上曰薦舉本欲得人又恐干求請託却長奔競之風茂良等奏天下事未有無弊雖三代良法久亦不免於弊今陛下既欲精選監司郡守非薦舉何由知之上曰若令雜舉則須衆論僉允庶幾近公況又經中書考察而後除授亦足以見朕於人材博采遴選如此非茍然也乃詔侍從臺諌兩省官參照資格不以內外雜舉監司郡守嵗各五人中書省置籍三省更加考察取旨辛巳進呈兩浙運判吳淵奏乞將諸路州郡輸納秋苗加耗不得過三分御筆將上龔茂良李彥頴奏近年州縣納苗加耗太重甚者至兩石以上方可納一石上曰如此則民力安得不困吳淵既為漕臣自當覺察若有似此去處可令奏劾重作行遣諸路依此施行是月雨雹葉衡責居郴州以其昨任宰輔不能正身竭誠日惟沈湎于酒徇私背公也初湯邦彥敢為大言虞允文深器之允文出為四川宣撫也辟邦彥以行允文沒邦彥還朝為右司諌奉詔充申議使使敵求陵寢地邦彥至燕敵人拒不納既旬餘乃命引見夾道皆控弦露刃之士邦彥大怖不能措一詞而出上大怒詔流新州上諭輔臣敵既不受本朝禮物邦彥乃受敵中所賜辭受之際理亦易曉乃不顧名節辱命如此邦彥既一斥不復自是河南之議始息不復遣泛使矣大事記曰恢復之機既失雖虞允文始相建議遣使以陵寢故地為請然識者以為當爭之於未講和之初而不當爭於和議已定數年之後彼雖仁義不足而凶狡有餘反以大義責我故當時端人正士如張栻黃中劉珙朱熹吕祖謙最為持大義者也而乾道五年張栻入對則謂欲復中原之地必先收中原百姓之心欲得中原百姓之心必先固吾境內百姓之心六年黃中入對則謂言和者忘不共戴天之讐固非久安之計言戰者復為無顧忌之大言無必勝之術內修政理外觀時變而已張栻再入對亦謂敵中之事臣雖不知而境內之事知之詳矣比年諸道嵗飢民貧國家兵弱財匱正使彼實可圖臣懼我之未足以圖彼也七年劉珙手疏則謂我所以自治者大抵闊略而乃外招歸正之人內移禁衛之卒手足先露吾恐恢復之功未易可圖而意外兵至之憂將有不可勝言者吕祖謙輪對則謂恢復大事也規模當定方略當審始終本末當具舉緩急難易當預議而朱熹戊申封事亦曰此事之失已在隆興之初不合遽然罷兵講和遂使宴安鴆毒之害日滋月長坐薪嘗膽之志日逺月忘區區東南事猶有不勝慮者何恢復之可圖乎蓋炎興之敵奉辭以討之可也隆興之敵正名以絶之可也乾道之敵積實以圖之可也惟隆興有恢復之志而無恢復之機此孝宗之志所以未盡遂也五月丙午龔茂良李彥頴奏農事正是時民間以久不得雨為慮適連夜雱霈極可慶上喜甚曰朕日夕以此為憂早上方宫中焚香拜謝天地更乞終惠成此豐年以寬焦勞之念不知江東淮南何如可令逐路漕臣具得雨日分及布種次第申尚書省戊申進呈權知隆興府吕企中奏本路鈐轄錢卓初到官權借印記愠怒形於公移上問如何龔茂良李彥頴奏祖宗朝分道置帥以任一面之寄事權至重平時分守嚴則緩急號令得行一路兵官於帥臣自有階級豈容如此上曰祖宗立法有深意錢卓可降一官癸亥王淮進呈步軍司相度牧馬去處上曰前日牧馬官辭朕戒以愛護馬當如愛護已身飢飽勞佚各隨時調節若已身所不能堪者馬亦不能堪之但馬不能言告訴不得耳龔茂良等奏云陛下留神馬政曲盡物情聖言及此其仁蓋不可勝用矣詔以張默為國子監書庫官先一日中使傳旨有張默者乃秀王夫人親堂姪欲與一添差監當於法不礙否龔茂良奏近制惟宗室戚里及歸正人方得添差在法稱戚里者謂三后四妃之家至是奏審上曰朕正不欲先自廢法可勿行遂同奏乞除正闕書庫官詔從之是月以柴瑾為殿中侍御史瑾入對上曰惟卿不求進所以有此除六月乙酉四川制置范成大奏四川酒課折估虛額錢四十七萬餘緡乞自淳熙三年為始減放詔以湖廣總領所上供錢內撥還丙戌進呈敕令所修到寺監長二雜壓在中散大夫之上致仕恩澤外更與遺表蔭補條法上問舊法如何龔茂良等奏舊法已與致仕蔭補即無遺表恩澤上曰名器之濫皆由如此放開莫若只依舊法甲午龔茂良奏近奉詔旨欲奬用亷退之士有朱熹者操行耿介屢召不起宜蒙録用上問曽為何官李彥頴奏聞曽歷州縣官一任後以密院編修武舉博士召皆不起近嵗陛下特與改官見任宫觀上曰記得其人屢辭官此亦人所共知今可與除一官於是詔除祕書郎臣留正等曰東漢之興人謀咸贊既不乏人矣既定之後建三雍講六藝東都諸人皆足以辨之雖不待於側席幽人可也光武獨拳拳於羊裘之故人何哉西都之俗事利祿乏節操習俗既成國隨之而不振光武固有鑒於兹矣自嚴陵之髙尚百世之下聞者興起清問所宣獨有取於亷退之士其以是夫熹以改官之命正以嘉其亷退顧乃冒進擢之寵是左右望而罔市利乃力辭會有言虛名之士不可用者以故再辭即命主管沖祐觀上謂執政曰有魏掞之今安在龔茂良等奏已物故上曰其人直諫方欲稍加擢用不謂已死朝廷不可無直諒之士近有鄭鑑議論亦甚切直觀其所言似出於肝膽非矯偽為之者因看鄭鑑劄子頗思魏掞之鑑時為太學正遂命召試館職又曰掞之雖死欲少加旌别可贈宣教郎直祕閣秋七月乙巳宣諭湖秀兩州積欠最多趙師夔雖已去官可併將上取旨龔茂良李彥頴奏陛下之於群臣了無親踈之間上曰此安可少偏茂良等同奏聖心如天地之公本無分别是月以鄭鑑為校書郎上語執政曰鄭鑑所試館職策議論切直甚可取因問今合除何官龔茂良等對曰前此學官召試往往止除正字上曰可除校書郎賞其盡言因曰策中所言或是或非大率剴切不易詔奬劉珙珙時知建康府以江東荒歉珙賑濟有方也八月庚辰兩浙西路提點刑獄陳舉善進對論仁義功利之辨上曰仁義既行功利自在其中先是詔御史臺六察許隨事彈奏至是詔近日紏察各揚乃職臺綱益振可各特遷兩官九月癸亥侍讀周必大進讀三朝寶訓真宗皇帝嘗擇廣南轉運使因謂左右曰交廣之民去朝廷逺當選操心平允能安逺人者任之自今凡命逺官尤須謹擇上曰於所不聞知處尤當留意是月參政龔茂良李彥頴等謝外日宣示中宫緯衣上云珠玉之屬乃就用禁中舊物所費不及五萬緡茂良等奏云若不因宣諭無由得知支用如此不多上云朕安肯於此妄有所費上因宣諭近來風俗如何莫大假奢侈否奏云輦轂之下近似稍侈皆由貴近之家倣效宫禁以故流傳民間彼若知聖意崇朴亦必觀感而化上云若要革弊當自宫禁始茂良等奏仁宗嘗以南海沒入大珠賜溫成皇后后時為貴妃以充首飾戚里靡然效之京城珠價至數十倍仁宗禁中內宴望見貴妃首飾不復回顧曰滿頭白紛紛豈無忌諱貴妃皇恐易去之仁宗大喜命剪牡丹遍賜妃嬪不數日間京城珠價頓減上喜云此事誠當始於宫禁茂良奏中宫又以儉德聞何患不革上曰然初錢良臣以太府少卿為淮東總領龔茂良秉政聞户部嵗撥淮東錢六百九十萬緡而本所嵗用六百十五萬緡而已因奏遣户部員外郎馬大同著作佐郎何萬軍器少監耿延年分往升潤鄂三總司點磨錢物會良臣以嵗用不足請于朝茂良奏令所委官一就驅磨而近習恐賕賂事覺極力救之茂良不顧十二月萬奏總所侵盜大軍錢糧纍數十萬茂良奏下其事於有司次日御批令具析既又改為契勘俄中旨召良臣赴闕駸駸柄用其後茂良之貶良臣與有力焉延年亦言湖廣總所有别庫别歷所收已行改正故二人並遷官卒坐茂良黨罷云大同獨無所舉覺翺翔朝路纍年然後補外蓋三總司苞苴賄賂根株盤結其來已久非但一日也是秋彭州奏奉詔撥上供錢對減本州三縣須課額民間作佛老會以報上恩乞以功德疏隨會慶節表疏同進上弗許令守臣諭以國家裕民之意并諭執政曰前日蠲減蜀中折估錢人情歡感已如此若異時兵革偃息數十年來額外橫賦盡蠲除之民間喜可知也龔茂良奏陛下躬行節儉視民如傷所不獲已者養兵之費勢未能去爾上曰自渡江後所增稅賦比舊如何茂良奏如茶鹽榷酤皆數陪元額其最可念者折帛月樁等錢為江浙數路之害陛下念念不忘若一旦恢復舊疆則輕徭薄賦且有日矣上曰然台婺等州水冬十月甲戌初上以雨過多恐妨收刈御筆欲行下諸路決遣獄囚於是擬進指揮上曰朕以久隂祈求未應獨未曽決獄昨日欲批出方下筆而風急起雲隂頃刻吹散至晚已開晴一念之誠隨即感應龔茂良等奏天人之際其應如響陛下此心與天通宜其報應之速如此翌日付下張掄奏劄乞宣付史館上曰朕初不欲言偶宣諭及此如此則是朕自矜也可寢其奏己卯龔茂良李彥頴奏昨日王淮趙雄為臣等言玉音嘗及中宫辭受合得恩數并及平居常服浣濯之衣等宣諭臣等切謂中宫天資恭儉誠為盛德且有以見陛下齊家之效上曰家道如此深以為喜本朝文物家法逺過漢唐獨用兵差為不及茂良等奏國家自藝祖開基首以文德化天下列聖相承深仁厚澤有以固結天下之心蓋治體似成周雖似失之弱然國祚綿逺亦由於此漢唐之亂或以母后專制或以權臣擅命或以諸侯強大藩鎮跋扈本朝皆無此等可以見祖宗家法足以維持萬世上曰然大抵治體不可有所偏正如四時春生秋殺乃可以成嵗功若一於肅殺則物有受其害者亦猶治天下者文武並用則為長久之術不可專於一也乙酉進呈禁止奢侈指揮上曰今日習為奢侈者在民間絶少多是戚里中官之家指揮內須添入有官者違犯取旨重作施行進呈太史局官制上曰古者日官居卿以底日今太史局官制太輕且如醫官有大夫數階太史獨無之可創大夫階如醫官保安和安之類庶幾稍重其事醫官昨來多有轉行遙郡者既名伎術官却𢃄遙郡輕重不倫自後宜罷之詔今後監司被受三省六曹委送民訟事件並仰躬親依公豫決疾速回報若事干人衆或涉逺路須合委官定奪亦仰立限催促仍令所屬曹部置籍稽考如有違戾注滯申尚書省將所委監司取旨施行臣留正等曰民訟之淹其為民之害蓋甚於水旱之變以夫民之訟而至於有司也貧者兼旬而屈富者雖纍嵗而無傷王符愛日之言嘆農民之廢業則盜賊何從而銷太平何從而作者蓋為是也聖詔丁寧首及於此不出户庭而周知天下之情雖堯舜之用心亦何以過於此哉庚寅御筆曰鬻爵非古制也夫理財有道均節出入足矣安用輕官爵以益貨財朕甚不取自今除歉嵗民願入粟賑飢有裕於衆聽取旨補官其餘一切住罷丁酉進呈漕臣吳淵具到秀州十年收支錢數多寡不同上曰此係纍政守臣任內事不欲深究可令吕正已今後痛加撙節大抵州郡用度不節必至掊斂惟先能節用即年例違法妄取之數可以蠲減少寬民力龔茂良李彥頴奏聖訓及此天下之幸也庚子上曰出令不可不審書云屢省乃成欽哉事至於屢省何患不成凡天下事朕與卿等立談之間豈能周盡事情須是再三詳熟思慮方為盡善前此正緣不審故出令多反汗無以取信於天下比來甚悮此龔茂良李彥頴奏臣等生長閭閻更歷州縣見聞不為不多然猶思慮有所不及陛下深居九重處事無不曲當非聖智絶人不能及此上曰亦賴卿等佐佑自今當勉之十一月戊申權四川制置使范成大奏陛下俯念四蜀酒課虛額之弊乃六月十二日詔書各與次第蠲減嵗蠲上供緡錢四十七萬為蜀民代補贍軍折估之數令下之日百萬生靈鼓舞歡呼如脫溝壑寰區四路州縣節次申到自今年七月十五日以後各於寺觀啓建感恩祝聖道場臣謹按慶歷六年三司使王拱辰建議榷河北滄濱兩州鹽仁宗皇帝曰使人頓食貴鹽豈朕意哉下詔弗許河朔父老相率拜迎於澶州為佛老會報上恩今舉四屬之廣民心愛戴不謀同辭宜與河朔故事俱傳不朽伏望宣付史館詔從之癸丑郊是日進呈建康都統制郭剛奏本司車船戰損已補填依海船樣造多槳飛江船上曰車船古之朦衝辛巳用以取勝豈用改造可令郭剛具析并約束沿流諸軍遇有損壞隨即修葺不得擅有更易其多槳船止許逐軍自行創造並不得充新管車船數御筆詔三省樞密院諸州軍守臣惟才是用今後不拘逺近州軍並聽於文武臣內選差十二月乙酉龔茂良等奏昨者恭覩中宫奏劄檢照皇后親屬恩澤裁減外尚餘一十八人欲望聖慈更賜裁減奉旨更裁減八人臣等仰惟紹興三年指揮皇后受册親屬與恩澤三十名十三年與二十五人近制減作十八人比舊例幾鐫其半皇后猶且謙沖退託力具辭免陛下遂賜俞允今以中宫之貴而猶務節約則為臣下者當如何欲望陛下明詔有司申嚴法禁凡僥幸冒濫者必務革去又詔侍從近臣各思所以清入仕之源詔從之是月以袁樞所編通鑑紀事賜東宫令與陸贄奏議熟讀曰治道盡於此矣禁監司交遺及因行部輒受諸郡折送計所受悉以贓論是冬賜蘄州黃梅縣方甫旌表門閭以三世同居孝行顯著本路漕臣以其事來上也減徽州稅絹額是嵗詔今後法應得諡及特命諡者並先經有司議定申中書門下省具奏取旨依舊制更不命詞止備坐所議給敕吏部牒本家照會罷鬻官田詔知興元府右軍統制兼知階州田世雄前軍統制兼知鳯州傅鈞各與轉一官任滿日並與再任從制置司請也安南李天祚死子龍􅧪嗣丁酉淳熙四年春正月庚申樞密院進呈馬帥吳拱按正將馬彥恭輒役人船船載馬草已降充副將上曰吳拱初到所按劾須與行遣王淮等奏其事雖輕然違主帥約束豈為無罪上曰只依所申降充副將丙寅進呈紹興十四年幸學詔上曰今所降詔大意欲以崇尚風化勸厲諸生使知所趍向朕得詔中兩語當為君子之儒毋慕人爵之得龔茂良等奏當以聖語諭學士令載之詔書上曰可是月行淳熙歷祕書省申昨為紀元統元乾道三歷交食不密得旨令太史局别造新歷已行進呈今來測驗新歷稍密上曰自古以來歷未有不差者況近世此學不傳士大夫無習之者訪求草澤又難得其人新歷比舊所謂彼善於此不須别命名只以淳熙為名户部侍郎韓彥古言今國家大政如兩稅之入民間合輸一石不止兩石納一匹不止兩匹自正數之外大率增倍然則是欺而取之也謂宜取州縣大都所入稍倣唐制分為三等視其用度多寡而為之制自上供為始上供所餘則均之留州留州所餘則均之送使送使所餘則派分遞減悉蠲於民朝廷不利其嬴焉然則自朝廷至於郡縣取於民者皆有成數不可得而容私於其間然後整齊天下之帳目外而責在轉運使內而責在户部量入以為出嵗考能否而為之殿最州縣不得多取於民朝廷亦不多取於州縣上下相恤有無相通無廢事無傷財貢籍之成太平之基立矣奉御筆韓彥古所陳周知民隱可擇一才力通敏者先次施行一郡俟已就緒當頒降諸路倣而行之尋詔令吏部郎官薛元鼎前去秀州依此將錢絹米斛等數具帳聞奏其後元鼎奏驅磨本州財賦惟憑赤歷難以稽考望委户部行下本州將州縣應干倉庫場務每處止置都歷一道應有收到錢物並條具上供州用實數各立項目抄轉仍從户部每嵗委轉運司差官遇半年一次索歷檢照如有虛支妄用許本司按劾取旨其他州郡亦乞依此施行從之雨雹二月臣寮奏祖宗朝幸學皆命儒臣講經上曰易詩書纍朝皆曽講如禮記中庸篇凡為天下國家有九經一假最關治道前來却不曽講茂良等奏此於治道包括無遺陛下聖學髙明深得其要太宗正丞劉溥奏近年諸郡違法預催夏稅民間苦之龔茂良李彥頴奏往年諌官曽論此事方施行間户部長二執奏不行至去年春言者又及此版曹復申前説拘回録黃其説謂遞年四月五月合到行在折帛錢共六十一萬貫指擬支遣若不預催恐至期闕誤上曰既是違法病民朝廷須别作措置安可置而不問茂良等次日同奏户部每年八月於南庫借六十萬緡應副支遣次年正月至三月撥還今若移此六十應副支遣次年正月至三月撥還今若移此六十萬緡於四月五月支借則户部自無闕用可以禁止預催之弊上喜曰如此措置不過移後就前却得民力少寬於公私俱便於是詔令諸路轉運司行下所部州縣今後須管依條限催理如有違戾去處仰監司覺察按劾臣留正等曰自昔細民之困二月而賣新絲五月而糶新穀夫前期而督之輸其弊必至於此也聖恩加惠斯民以內帑之儲假版曹之用不過遲速先後之間而民得免艱難迫促之苦與其有積於公而未用之財曷若以寬其民於不足之時蓋間損上以益下未聞財散而人不聚也申嚴是法而行之則民之受賜夫豈有紀極哉甲申臣僚言今日之郡守為民害者掊克慘酷是也賦稅有定制而掊克之吏專意聚斂下車之初未問民事先請屬邑知縣均認財賦且多為之數督責峻急國家法令之設所以與天下公共者也而慘酷之吏非理用刑者或殘人之肢體或壞人之手足或因其微罪而隕其性命或罹非辜而破其家業乞明詔守臣丁寧戒飭其取民有定制毋得掊克以竭民之力犯法者自有常刑毋得慘酷以殘民之生從之乙酉幸太學釋菜于先聖命國子祭酒林光朝講經賜光朝三品服幸武學著作郎傳伯壽尋上言武臣之廟所從祀者出於唐開元間一時銓次失於太雜太祖皇帝嘗見白起之像惡其詐殺已降以杖畫而去之神武不殺之仁垂訓深矣太上紹興間亦以議者之請黜韓信而升趙充國黜李績而升李晟去取之間皆所以示臣子之大節也然王翦佐秦􅀈狙詐之兵蓋無異白起而彭越之臣節不終亦同韓信至於王僧辨雖能平侯景然反連和于齊吳明徹雖能因北齊之亂以取淮南然敗於吕梁為周所俘不能死節韋孝寬拒尉遲之義兵楊素開隋室之禍敗慕容恪長孫嵩慕容紹宗宇文憲王猛斛律光于謹或本生夷狄之裔或屈節僭偽之邦縱其有功豈足多録若夫尹吉甫之伐玁狁召虎之平淮夷皆為有周中興之名將陳湯之斬單于傅介子之刺樓蘭馮奉世之平莎車班超之定西域皆為有漢之雋功在晉則謝安宴衎以靖胡冦祖逖擊楫誓清中原在唐則王忠嗣之撫衆守邊張巡之百戰死敵忠義謀略卓然冠於一時而垂於後代闕而不録似有所遺臣竊謂宜併詔有司討論歷代諸將為之去取然後與本朝名將繪於殿廡皆曉然知朝廷激義勇而尚忠烈且知夫貶夷狄之類者所以尊中國黜不終之節者所以正君臣去嗜殺之暴者所以尚仁義其為勸沮者大矣起居郎錢良臣亦請收建隆建炎以來功烈顯著者參陪廟祀是年七月己酉施行幸祕書省賜省官燕上賦七言律詩坐者皆屬和丁亥龔茂良等奏近日雨㿩順序物情熙熙米價甚平可以少寬聖念上曰朕終歲憂念百姓自初布種以至收成其間少有旱潦未嘗不惕然念之每嵗常到十月以後農事一切了畢方始放心己丑進呈知臨安府趙潘老具到兩學修造圖本西北隅建閣安頓太上皇帝御書石經上云碑石可置之閣下其上奉安墨本以光堯御書石經之閣為名朕當親寫茂良等同奏自古帝王未有親書諸經及傳至數千萬言者不惟宸章奎畫照耀萬世其所以崇儒重道可謂至矣上曰太上於字畫蓋出天縱朕嘗謂鍾繇字最工猶𢃄𨽻體如太上宸翰冠絶古今茂良等奏誠如聖訓進呈國子祭酒林光朝劄子今月十五日恭遇車駕臨幸太學御崇化堂賜諸生詔書宜刻之琬琰以風動四方上可其奏宣諭云前日講義甚好如訓釋凡為天下國家有九經所以行之者一也一乃中庸此説深得聖人之旨蓋先儒未及壬辰太常少卿顔度言藉田合得千畝自紹興十五年給到五百七十餘畝以備親耕續因玉津園等處占撥目即秪二百餘畝今又踏逐御路將來或舉行典禮委是窄狹上曰御路止是時暫經由可將見管步畝專充藉田他司不得侵占其後藉田令趙監言御路係在二百一十畝之內乞依舊令人户管佃租種拘收花利應辦嵗中祠祭禮料從之癸巳進呈知福州陳俊卿乞宫觀上曰前宰執治郡舊來往往不以職事為念如俊卿在福州劉珙在建康於職事間極留意治狀著聞未可換易可令學士院降詔不允是月進呈徽宗實録及仁宗今上玉牒四川總領所乞降度牒二千五百道措置備邊龔茂良奏四川逐料降換亡僧度牒自乾道四年至淳熙元年降過一萬一千道不惟走失丁口為異時患官賣不行必至抑配與折估之害名異實同乞不須更降度牒重失丁口是嵗八月又給二千道時多以度牒賜諸總所貼助經費後不盡録三月丙午進呈范成大奏關外麥熟倍於常年緣去歲朝廷免和糴一年民力稍紓得以從事於耕作故其效如此上曰免和糴一年民間便已如此乃知民力不可以重困也王淮奏去嵗止免關外今從李繁之請盡免蜀中和糴一年為惠尤廣辛酉進呈楚州捕賊推賞內隨從捕獲人欲支錢三十貫上曰與五十貫如何王淮等奏凡支折資錢每一資折三十貫今隨從獲未該一資若支五十貫恐太多上曰是王淮等奏與五十貫亦不足惜但歡喜者不過被賞數厚而不平者千萬人也上曰此論甚善亦如朝廷與人官爵盡歸至公人誰敢怨若循私輕與得者固喜而怨者必多惟至公可以無怨朕與卿等交修當謹守此法密院事少三省事多卿等見三省宜以此意宣諭戊辰進呈户部歲用經常及用度之數龔茂良奏其間有合節省者欲倣寶元慶歷故事命臺諌司户部詳定上曰今日用度多費於養兵如禁中大假節省外庭浮費絶少朕嘗覽户部所具支費三二十項內不過一二項可議裁節然不過數千緡若令臺諌論議又却難處如果有合節省件目卿等可自奏陳先是諌官蕭燧論節浮費詔户部條具至是進呈是月以史浩為醴泉觀使兼侍讀幸玉津園宴射是春閣門舍人應材言臺諌之官在於言天下之大利害不在於捃托細故區區止於言人之短長也大姦大惡固不可不為天下國家誅鋤之若大有用之才豈可以細故而輕壞之茍一陷譏議遂為廢人急緩之際欲人為用無復有矣程皓為御史神宗召對皓曰使臣拾遺補闕禆贊朝廷則可使臣掇臣下短長以沽直名則不能神宗嘆賞以為得御史體劉安世作臺諌官嘗言祖宗之時於人才長養成就之甚勤也故其在臺諌未嘗以細故而輕壞人材乞降睿旨刻之御史臺諌院永為臺諌官之戒上深然之睿夏四月壬午進呈湖廣總領劉邦翰等審驗到鄂州水軍統領謝貴雖是年及委無殘疾氣血未衰若蒙依舊存留在軍尚堪使令王淮等奏謝貴出戍長沙守臣王佐謂有目疾職事不舉主帥李川申其人無疾患得旨委劉邦翰審驗得尚堪使令上曰謝貴依舊存留在軍管幹職事五月癸卯進呈利州提刑權金州史俁奏金州都統司例私販茶鹽月科與軍人每名三斤髙立價直於請糧處尅除上曰蜀中軍人貧甚豈宜更有尅剝可令李思齊契勘起置月日因依申樞密院王淮等奏欲併約束諸軍上曰俟李思齊奏來却與約束己酉宗正少卿程叔達進對言臣昨蒙玉音許賜宣示敬天圖願得稽首拜觀上顧左右取圖圖至叔達整襟肅容進觀上亦相與誦讀每至前代王者或不能敬畏修省則曰此圖美惡並著亦欲以之警戒又至無逸篇則曰無逸一篇言人君所以享國久長皆由嚴恭畏敬所致尤當以為法叔達因言陛下於敬天之事既知所以為戒又知所以為法宜乎聖德日新天之相之有隆而罔替也甲子進呈盱眙軍報淮北岸多有蝗蟲此間却仍嵗豐稔修德與不德之驗昭著如此上曰今夏蠶麥甚熟絲價米價極賤此甚可喜上又曰近世士大夫多恥言農事農事乃國之根本士大夫好為髙論而不務實却恥言之王淮等奏士大夫好髙豈能過孟子孟子之論必曰五畝之宅植之以桑百畝之田勿奪其時所見諸侯未嘗離此數語上曰今士大夫微有西晉風作王衍阿堵等語豈知周禮言理財易言理財周公孔子未嘗不以理財為務淮等奏曩時虛名之俗誠是太勝自陛下行總核名實之政身化臣下頃年以來士風為之一變此聖主責實之效上曰然近年亦稍變然猶未盡且不獨此耳士大夫諱言恢復不知其家有田百畝內五六十畝為人所強占亦投牒理索否士大夫於家事則人人甚理會得至於國事則諱言之卿等見士大夫可與道朕此語淮等敢不揄揚堯言丁卯密院進呈殿步司今來分㨂汰官兵三百八十餘人宣命劄子及舊付身合十餘道已於昨日令承旨司盡數當官給發上曰舊付身如何王淮奏昨取舊付身批鑿離軍因依令仍給還上曰頃嵗逃亡事故有家屬者將付身批鑿革弊甚多前此冒名承代者不勝衆今用批鑿之法已十年所革冒濫不知其幾矣是月福州建劍水命賑之謝廓然賜出身除殿中侍御史廓然之命自中出中書舍人林光朝不肯書黃光朝尋改權工部侍郎力求去除知婺州龔茂良罷相出知建康府以謝廓然論列而茂良亦自引疾乞罷故也詔自今三省樞密院進呈文字所得之旨朝退即具奏審再承畫降方可施行自是每奏目復用黃紙貼云得旨云云朝退封入或有改易遂為故事時言者指龔茂良矯傳敕旨斷遣曽覿之直省官故也六月辛未王淮等奏比來積雨陛下恐妨農稼初二日禁屠宰却常膳不御齋心祈禱聖德動天連日開霽天人相與之理於此可占雖然陛下寅畏奉天固非一日一念慮之間應答如響夫豈偶然者上曰所謂丘之禱久矣己卯殿侍謝廓然言陛下臨御以來動鑒家法而治效猶未進豈朋比之習容有未革望敕臣下合謀輔治毋黨同以伐異毋阿比以害公使忠良蹇諤之士盡言而不疑好險傾巧之徒知退而有懼如此則治效可馴致矣從之壬辰進呈禮部太常寺看詳到太武學神像合依五禮新儀制度用金裝飾上曰禁銷金指揮甚嚴令用漆金可也宜依禮部太常寺看詳事理施行是夏東宫官請皇太子近因讀范祖禹唐鑑見其學問醇正議論精確欲遇講日添讀此書從之秋七月庚子右正言葛邲乞令二廣帥臣監司將見任郡守每嵗精加考察守倅見闕去處元係堂除或部闕亦乞早賜差注或人所不願就令廣南諸司公共辟差一次其已差未到者催促之任上曰郡守不得其人則千里被害可令二廣帥臣監司限兩月體訪所部守臣臧否以聞壬寅詔六院官依舊制不入雜壓已降指揮更不施行林虙封贈改正丙午進呈昨得旨閣門舍人黃夷行可與郡臣退而考之則資歷尚淺在外止數月到閣門才二年陛下用人雖不當問資歷然近方立閣門舍人格目上曰若不用資則他人皆有詞須得用資歷也閣門舍人幾年當得郡趙雄奏近降指揮須關升後更歷二年補外者與郡則有出身人六年無出身人八年方可令夷行才歷二年半上曰夷行又是閣門祗候非舍人自難為行不若且待己酉詔文宣王從祀去王雱畫像武成王廟升李晟於堂上降李績於李晟位次仍以曹彬從祀辛亥進呈內批添差浙西凖備將王守忠任滿日特與再任趙雄奏守忠係潛邸祗應即非隨龍依指揮不應添差上曰如此則難為雄奏聖意欲與之特令依隨龍人例可也上曰既礙指揮不若且已雄奏聖德誠不可及潛邸舊恩不肯假以一添差臣下何敢用私意也上曰不如此則法不行甲寅進呈郭剛申權統領陳鏜乞落權字趙雄奏在外諸軍統領却無密院審察法須從統領㨂選則統制何憂不得人上曰如此則尤好雄奏昨見王友直説須從訓練官處不輕授則凖備將至統制官方是一一得人臣答之云惟將帥體國者乃肯如此使人人似殿帥之言則軍中何患無人上曰此方是澄其源然非體國者不能也乙卯進呈吏部申內侍李裕文合轉歸吏部上曰昨與在京宫觀元不曽降轉歸吏部指揮趙雄奏從來內侍寄資官罷內侍差遣須轉歸吏部上然之戊午進呈畢趙雄奏蜀中五月得雨遐邇皆足今嵗又有大有年之望上曰如此則甚好江浙間已大熟昨聞蜀中未得雨今已報得雨耶雄奏豐年須溥遍乃佳今吳蜀皆稔此誠可慶上曰世以鳯凰芝草甘露醴泉為佳瑞是皆虛文不若使年穀屢豐公私給足此真瑞也丙寅禮部狀少保史浩奏恭覩邸報臣僚論科場之弊得旨申嚴行之臣守福州嘗為規畫數十事宿弊既去場屋整齊試者二萬人無一喧譁臣當時措置曉示編類成書似與今來指揮符合謹以上進禮部國子監看詳乞下臨安府雕板印造成册遍諸州詔從之尚書省言信州常平義倉米兀申帳狀管九萬三千餘石今以提舉司申有六萬八千餘石及至盤量止得一萬二千九百餘石其餘皆是虛數提舉官李庚到任己及二年並不檢察是致闕米有誤賑濟知州趙師嚴通判李桐係乾道三年在任之人所申帳狀隱庇虛妄詔李庚特降兩官放罷趙師嚴李桐各降兩官不得與堂除是月吏部郎閻蒼舒言馬政之弊不可悉數今欲大去其弊獨有貴茶蓋夷人不可一日無茶以生祖宗時一馱茶易一上駟陜西諸州嵗市馬二萬匹故於名山嵗運二萬馱今陜西未歸版圖西和一郡嵗市馬三千匹爾而併用陜西諸郡二萬馱之茶其價已十倍又不足而以銀絹紬及紙幣附益之其茶既多則夷人遂賤茶而貴銀絹紬而茶司之權遂行於他司今宕昌四尺四寸下駟一匹其價率用十馱茶若其上駟則非銀絹不可得祖宗時禁邊地賣茶極嚴自張松大弛永康茶之禁因此諸蕃盡食永康細茶而岩昌之茶賤如泥土且茶愈賤則得馬愈少猶未足道而因此利源遂令洮岷疊岩之土蕃深至吾腹心內郡此路一開其憂無窮今後欲必支精好茶而漸損其數又嚴入蕃茶之禁則馬政漸舉而邊境亦漸安矣詔令朱佺嚴行禁止立待補太學試法每正解一名取待補五名竄龔茂良先是茂良退朝開府曽覿當道不避茂良奏白上前曰臣固不足道所惜者朝廷大體上遣中使諭覿詣政府謝茂良取其直省官撻之御筆宣問施行太遽會柴瑾論奏不行得旨補外或指瑾為茂良同年未幾謝廓然除殿中侍御史中書舍人林光朝繳還詞頭忤上旨改除工部侍郎光朝乃茂良同里茂良求去益力六月內批除職與郡令內殿奏事手疏六事論恢復之具曰天意曰人事曰財賦曰將帥而所以用之者曰謀曰時既退臣僚論茂良擅權植黨上親灑宸翰諭以體貌大臣之意章再上落職罷臣僚復論茂良四罪言茂良行丞相事首尾三年臣僚奏對有及備邊利害必遭譏罵陛辭之日方有所論凡數百言此可誅一也陛下孝誠篤至率群臣同上萬年之觴與册正中宫駕幸二學亦皆斷自聖心舉行巨典茂良乃自謂皆出其建明誕慢如此可誅二也以己所言駕為天語以陛下聖訓掠為已恩其可誅三也其薦察官則私以妻黨林虙為首擬除後省則特以鄉人林光朝為首其可誅四也尋責寧逺節副英州安置明年卒于貶所八月辛未詔今後職事釐務官並見闕方許差除其乾道九年十二月五日已降指揮更不施行壬申進呈前來教閲民兵兩淮荆襄總費為緡錢三十六萬有竒米三萬石有竒上曰此謂逐路追集教閲耶謂遂州教閲耶趙雄奏兩淮各就漕司逐路教閲江陵襄陽荆門各就逐州上曰如此則可與降指歸候農隙日令守臣教閲一月樞密院奏已降指揮令諸州軍有御前屯駐或分屯軍馬去處將見教閲禁軍差官部轄附大軍一就教閲所有不係駐劄并分屯軍馬州軍其禁軍自合逐州教閲切慮因而廢弛理宜申飭詔今諸路帥司行下所部州軍守臣嚴行責委兵官將見管禁軍精加教閲不測差官前去迫試如有武藝退惰具當職官姓名按劾施行癸未進呈程大昌奏士輵陳乞恩數乞依執政轉􅈦減半上曰士輵自言保轉少傳可依轉廳條格給之又宣諭舊法遷官却依初除試為大濫大昌所陳自有見行條法無可議者李彥頴奏大昌言宰執轉廳失於審勘便同除授全給減年合行釐正上曰可令有司遵守見行條法甲申進呈大理寺獄案上曰宋資成盜用過七千餘緡雖士大夫猶不可恕況小使臣乎可依擬定特旨施行乃刺配籍沒其家資進呈鎮江府副都統制嶽建夀申權統制杜俊乞落權字給降宣命都堂審察杜俊筋力精神衰乏乃詔特與罷從軍嶽建夀具折申上曰身為主帥既是統制官非才自合審驗申明今乃因循津發豈得無罪可降一官九月丁酉朔日有食之己酉御經筵侍讀史浩讀三朝寶訓真宗謂近臣曰諸路提點刑獄官昨已令察官吏踰違不理而亷幹之士未令稱舉四海聞之謂朝廷惟求人過又慮不識治體之人因而生事當降詔若有能吏聽其奏薦浩曰本朝祖宗忠厚如此上曰本朝仁厚可比於周又讀祕書丞鄧餘慶坐祠祭不至私罪當劾所薦之主上曰連坐舉官誠亦不易如此公坐猶尚可矜其有本不諳知勉徇請託及乎敗纍何以逃責王旦曰薦才誠難亦有中道改節者上曰然拔十得五縱使徇私朝廷由此得人亦不少矣旦曰求人之際但信其言而用之有所曠敗亦以所言而坐之浩曰聖人之言逺如天賢人之言近如地觀真宗與王旦之言可以見聖賢之逺近也王旦為相欲坐繆舉者之罪此賢人之言也真宗以為拔十得五縱使徇私然朝廷由此得人亦不少矣此聖人之言也其言包含廣大豈不如天之逺耶上曰孟子之言最為辨其視孔子之言則氣象大不相侔蓋孔子之言約而盡且如莊列之言自不如老子之約此乃聖賢之分也是月閲蹴毬于選德殿紹興府水冬十月戊辰執政進呈金州副都統制李思齊申請軍官擇有才略智勇人不次升擢上曰專用年限資歷則才者無以自見若許躐次升差則兵官得人矣詔許躐等升差發付樞密院審察取旨給付身丙子詔隂雨多日大理寺臨安府并屬縣及兩浙西路諸州縣見禁罪人在內委臺官在外委提刑即時躬身前去檢察決遣如路逺去處分委通判杖罪已下并干繫等人日下並行踈放仍將已斷放過名件逐一開具聞奏己卯執政進呈江州置駐劄軍因依趙雄奏昨凖宣諭賣度牒非佳事今湖廣總領所嵗有給降度牒定數不知紹興年間不曽給降亦自足用豈紹興三十年創置以萬人為額之前度牒初未行也上曰待以示三省朕甚不欲給降度牒當漸革之臣留正等曰刺民為兵鬻民為僧皆非古也世變之極兵民分為二致兵固已病民矣又因兵而財用不足藉度牒以給之一人為兵供之者十人既未能革養兵之弊又驅民以棄南畝遊手日衆農民日削可不念哉聖語首及於此其意深矣庚辰詔幸灘上抽摘諸軍人馬按教宰職管軍知閣御𢃄環衛官自祥曦殿戎服起居從駕餘免十一月己亥樞密院進呈金州管內安撫司申本州管保勝軍二千三百餘人見闕衣甲千八百餘副上曰衣甲亦不可不理會舊來主帥見説盡令義士赤肉當敵此何理也趙雄奏陛下興言及此義士何得不以死報近利路安撫司乞再置作院專一打造義士衣甲今欲行下逐旋均撥應副并舊宣撫司亦未有衣甲已令周嗣武點檢俟申到定數亦當分給義士也庚子樞密院進呈內外諸軍申繳逃亡事故付身上曰近來軍中之弊不知革去多少只如逃亡事故付身有家纍者批鑿無家纍者焚毁數年之間免冒濫者多矣趙雄奏且如軍中升差與㨂汰離軍之人令赴密院審察皆有去取此事亦竒上曰行之稍久主帥自不敢用私喜怒有所升黜也甲辰樞密院進呈魏王奏武德郎鄭亘古乞改添差明州都監趙雄奏亘古無添差恩例若欲從之須降特旨上曰既無添差恩例自是難行雄奏如此則令具正闕奏辟上曰甚好雄奏一使臣差遣小不應格雖魏王奏請陛下亦不從群臣誰敢不遵守格法也丙午樞密院進呈李川申近旨不許管軍官接見賓客川自凖聖訓不敢妄見一人遂斂衆怨動生謗議趙雄奏欲申嚴指揮行下上曰李川能如此遵守誠不易得可與再行約束仍奬諭李川將帥能如此執守甚副朕意宗監堅此意勿恤衆怨謗議雖起不足慮也丁未乃詔江上并四川諸軍遵依已降指揮如有違戾重作施行干求乞貸若借舟船人馬之類並以贓論戊申樞密院進呈郭鈞申乞將右軍統制田世雄改充中軍統制緣止係改移即非創行升差乞免赴樞密院審察上曰初除統制時曽經審察乎趙雄奏舊來止是宣撫司升差未經審察上曰審察之法豈可輒廢若以為正當防秋可令至來年中春津發赴樞密院審察給降付身十二月甲戌臣僚言農田之有務假始於中春之初終於季秋之晦法所明載州縣不知守法農夫當耕耘之時而罹追逮之擾此其害農一也公事之追鄰保止及近鄰足矣今每遇鄉村一事追呼干連多至數十人動經旬月吏不得其所欲則未肯釋放此其害農二也丁夫工伎止宜先及遊手古者所謂夫家之征是也今則凡有科差州下之縣縣下之里胥里胥所能令者農夫而已修橋道造館舍則驅農為之工役達官經由監司巡歷則驅農為之丁夫此其害農三也有田者不耕而耕者無田農夫之所以甘心焉者猶曰賦斂不及也其如富民之無賴者不肯輸納有司均其數於租户胥吏喜於舍強就弱又從而攘肌及骨此其害農四也巡尉捕盜胥吏催科所至村疃雞犬為空農夫坐視而不敢較此其害農五也詔令州縣長吏常切加意毋致有妨農務乙亥大閲殿步兩司諸軍于茅灘皇帝登臺殿帥王友直步帥田世卿奏人馬成列舉黃旗諸軍統制已下呼拜者乃奏發嚴舉白旗聲四鼓變方陳次變四頭八尾陳為禦敵之形次變大方陳次舉黃旗聲五鼓變圓陳次舉皂旗聲一鼓變曲陳次舉青旗聲三鼓變直陳次舉緋旗聲二鼓變鋭陳管軍奏五陳教畢放教是日天氣晴爽無纎雲器甲精明光耀原野士氣鋭天顔甚悅上宣諭友直等曰器甲鮮明紀律嚴整皆卿等留心軍政深可嘉尚犒賜將士有差戊寅前浙東提舉何稱言本路措置水利創建河浦塘埭斗門二十處增修開濬淺浹碶間溪浦河堰沸潭湖埂六十三處計灌溉民田二十四萬九千二百六十六畝詔浙東提舉姚宗之核實開具聞奏是嵗知遂寧府杜莘老舉布衣雍山行義召不至賜出身添差本府教授尋乞致仕乾道初定節度使至正任刺史除上將軍橫行遙郡除大將軍正使除將軍副使除中郎將使臣以下除左右郎將正任謂承宣使至刺史也遙郡謂以階官領刺史至承宣使也正使謂武翼大夫以上也副使謂武翼郎以上也使臣以下謂訓武郎以下也至是年詔今後環衛官節度使除左右金吾衛上將軍左右衛上將軍承宣使觀察使為諸衛上將軍防禦使至刺史通侍大夫至右武大夫為諸衛大將軍武功大夫至武翼大夫為諸衛將軍正侍郎至右武郎武功郎至武翼郎為中郎將宣贊舍人敦武郎以下為左右郎將差度支郎周嗣武點磨四川總所嗣武尋奏蜀為今日根本之地自屯兵蜀口五十年間竭全蜀之力僅足以供給軍費目今歷尾雖管錢引八百萬道乞存留在蜀以備非常急闕之需從之四川制置使胡元質奏云為蜀民之病者惟茶鹽酒三事為最酒課之弊近已損減蜀茶祖宗時並許通商熙寧以後始從官榷當時課息嵗不過四十萬建炎軍興改法賣引比之熙寧已增五倍紹興十七年主管茶事官增立重額逮至二十五年臺諌論列始蒙蠲減當時鄭靄為都大提舉奉行不虔略減都額而實不與民間盡蠲前官所增逐户納數又越二十餘年其間有産去額存者有實無茶園止因賣零茶官司抑令承額而不得脫者似此之類不一逐嵗多是預俵茶引於合同官場逐月督取張松為都大提舉日又計興洋諸場一嵗茶額直將茶引俵與園户不問茶園盛衰不計茶貨有無止計所俵引數按月追取息錢以致茶園百姓愈更窮困欲行下茶馬司將無茶之家並行倚閣茶少額多之家即與減額得旨令元質與茶馬司及總領司措置六年九月丙子奉減虛額元質又云鹽之為害尤甚於酒蜀鹽取之於井山谷之民相地鑿井深至六七十丈幸而果得鹹泉然後募工以石甃砌以牛革為囊數十人牽大繩以汲取之自子至午則泉脈漸竭乃縋人於繩令下以手汲取投之於囊然後引繩而上得水入竈以柴茅煎煮乃得成鹽又有小井謂之卓筒大不過數寸深亦數十丈以竹筒設機抽泉盡日之力所得無幾又有鑿地不得鹹泉或得泉而水味淡薄煎數斛之泉不能得斤兩之鹽其間或有開鑿既久井老泉枯舊額猶在無由蠲減或有大井損壞無力修葺數十年間空抱重課或井筒剝落土石堙塞彌旬纍月計不得取或夏冬漲潦淡水入井不可燒煎或貧乏無力柴茅不繼虛失泉利或假貸資財以為鹽本費多利少官課未償私債已重如此之類不可勝計臣欲擇能吏前往逐州考核鹽井的實盈虧之數先與推排等第隨其盈虧多寡而增損之必使上不至於重虧國計下實可以少紓民力方可施行詔令元質與李蘩同共相度措置條具聞奏元質續奏鹽井重額沈痼百姓垂五六十年矣號呼籲天而天不聞陛下亟出所儲略無愛嗇俾不踰時出窮民於水火之中誠若有所不及臣親聞歌頌之聲目覩和平之象實千載希闊難逢之嘉會乞宣付史館從之元質又言簡州最為鹽額重大近蒙蠲減折估錢五萬四千餘緡但官司一時逐井除減使實惠未及下户富厚之家動煎數十井有每嵗減七千緡者下等之家不過一二十井貨則無人承當額徒虛欠官司督責不免望委制置司再將向來已減之數重行均減其上户至多者每嵗不得減過二千貫其餘類推均及下户宋史全文卷二十六上欽定四庫全書宋史全文卷二十六下宋孝宗六戊戌淳熙五年春二月戊辰臣僚言郡縣之政最害民者莫甚於預借蓋一年稅賦支遣不足而又預借於明年是名曰借而終無還期前官既借後官必不肯承望嚴戒州縣如有違戾監司常切覺察從之己巳臣僚言丁稅二弊一丁之稅人輸絹七尺此唐租庸調之所自出也二十嵗以上則輸六十則止殘疾者以病丁而免二十以下者以幼丁而免此祖宗之法也比年鄉司為姦託以三年一推排方始除附乃使久年係籍與疾病之丁無時銷落前添之丁隱而不籍皆私紏而竊取之致令實納之人無幾而官司所入大有侵弊此除附之弊也若其輸納則六丁之稅方湊成絹一匹官司紐於久例利其重價及頭子勘合市例縻費之屬必欲單名獨鈔其已納者又不即與銷簿重疊追呼此輸納之弊也今欲縣委丞置丁稅一司遇嵗終許民庶之家長或次丁立罪賞自陳其家實管丁若干老病少壯悉開列于狀將舊簿照年實及六十與病廢者悉除之壯而及令者重行收附如隱年者許人告首每嵗納足即與銷簿給鈔許錢絹從便送納從之是月雨土三月辛酉四川制置胡元質言蜀折科之額視東南為最重如夏秋稅絹以田畝所定稅錢為率凡稅錢僅及三百則科絹一匹不及三百者謂之畸零其所輸納乃理估錢則凖時直當承平時每縑不過二貫兵興以來每縑乃至十貫是一縑而取三倍也陛下軫念逺民重困每縑裁定作七貫五百蜀民歡呼鼓舞然獨成郡自淳熙五年為額減放訖其它州縣尚有應昨來指揮去處乞行下約束詔四川總領所同逐路轉運司取見諸州軍未盡數減放因依更相度與裁減若以嵗計却有妨闕仰公共措置將諸州財賦通融相補開具以聞是月以史浩為右丞相親試舉人賜姚頴以下及第出身有差先是侍御史謝廓然言近來掌文衡者主王氏之説則專尚穿鑿主程氏之説則務為虛誕夫虛誕之説行則日入於險怪穿鑿之説興則日趨於破碎今省闈引試乞詔有司公心考校毋得徇私專尚程王之末習從之是春詔會子以一千萬緡為一界尋又詔如川錢引例兩界相沓行夏四月辛未知紹興府張津奏本府支用剩錢四十萬貫起發應副御前激賞支用詔令紹興府將張津所獻錢為人户代納今年和買身丁之半仍令本府印給文榜遍下諸縣鄉村曉諭通知如人户今年已多納折帛錢與理充來年應輸之數即不得因而重疊催擾如稍有違戾許人户徑詣尚書省陳訴丁亥詔令今後差給事中一員立一司專一看詳天下言利病奏狀劄子及經朝廷陳乞敷奏者如有利國便民事雖其言可採並先參訂祖宗法委無違戾方許上籍一供省覽一留三省以備舉行如涉兵機即關密院是月雨土五月甲午朔詔知靜江府張栻除祕撰令再任以栻久任閫帥績效有聞也庚子右丞相史浩奏臣蒙恩俾再輔政唯盡公道庶無朋黨之弊上曰宰相豈當有朋黨人主亦不當以朋黨名臣下既己名其為黨彼安得不結為朋黨朕但取賢者用之否則去之且如葉衡既去人以王正已為其黨朕固留之以王正已雖衡所引其人自賢則知朕不以朋黨待臣下也浩奏陛下此心如止水如明鏡賢否皆不得遁故姦邪不敢名正人以朋黨漢黨錮唐白馬之禍皆人君不明為羣邪所惑遂致如此甲辰進呈庚子宣諭聖語論朋黨事上曰唐文宗有言去河北賊易去朋黨難朕常嗤其言何至於此朋黨本不難去若人主灼知賢否所在惟賢是進不肖是退弗問其他則黨論自消漢唐末世朋黨皆數十年不能解以至禍亂朕常嘆之其患盡在人君之無學所以聽納之不明也若能公是公非惟理適從何朋黨之有哉使胸中有詩書有古今則黨論何從而起浩奏用人惟論賢否則自無朋黨只如唐牛李之事後世之論者謂德裕之黨多君子宗閔之黨多小人然德裕之黨豈無白敏中之傾險宗閔之黨豈無周墀之直諒但於兩黨中用賢者黜不肖者則其黨自破范成大奏陛下學力髙妙鑑自聖心漢唐史策所載無此氣象當於前日聖語中增入以詔萬世上曰漢唐朋黨之論大抵皆由主聽不明而其原始於時君不知學浩奏説命三篇專論聖學如終始典于學如學于古訓之類帝王要道無先於此上曰善辛亥進呈庚子甲辰兩日聖語上曰前世朋黨之興盡由人主偏聽及黨論既成亦墮其中混而為一朕故推究源流以立此論卿等記録詳矣朕觀漢唐之末時君心術不明又偏聽是非故姦臣得投其隙以立黨與遂成禍亂甚可憐也每讀前代史書至可喜處則欣慕之至有不忍觀者則為之掩卷太息上又曰君子群而不黨和而不同賢者自然以類聚雖曰群曰和然自有不黨不同之處豈皆可指以為朋黨邪浩奏堯舜在位九官相遜文武傳國十亂同心謂之朋黨可乎趙雄奏人主之聽儻有所偏即所偏之處臣下必從而趨附之則黨與遂成今陛下謂朋黨盡由偏聽可謂深切著明范成大奏陛下聖謨正大可以頒示臣庶使皆知天子不以朋黨待天下之士則孰不精白一心以承休德上曰朋黨之論不立則士大夫可以安心營職無他顧慮至於治亂禍福又有不可盡言者蓋國之將興則有所謂天誘其衷否則有所謂天奪其魄天人之際甚可畏也是月詔諸路州縣創立場務者皆罷之六月庚午新知南劍州曽植言近日公正之道微請托之風盛省部之理訴倉庫之出納刑獄之決讞州縣之爭訟無一不用關節欲望百司舉職難矣乞戒飭百官若內外皆行公道毋循私情其有不悛行法自近始庶幾百官各揚乃職從之甲申詔可令翰林學士諌議大夫給事中中書舍人各舉堪任監察御史二人以備擢用遵用祖宗故事施行壬辰詔侍御史亦令薦舉閏六月丁酉湖廣總領周嗣武奏蜀為今日根本之地自屯兵蜀口五十年間竭全蜀之力僅足以供給軍費目今歷尾雖管錢月八百萬道欲望軫念蜀民之力已疲乞存留在蜀以備經常急闕之須是亦富藏天下維持根本之義上曰甚善又奏蜀中錢引自天聖間創始每界初只一百二十五萬餘道至建炎間依元符之數添印至三百七十餘萬道尚未為多目今見行兩界通共四千五百餘萬道較之天聖之初何啻數十倍今四川總領所又有别造錢銀會子接濟民間貿易比折成貫錢引自是六十三萬道儻嵗嵗添印一旦價例減落則於四川錢引所係非輕上曰蜀中錢引已多豈可更有增添並從之大理卿吳交如等劄子本寺公事勘斷盡絶並無收禁罪人見今獄空欲依故事上表稱賀詔免上表令降詔奬諭丙辰淮東總領言髙郵寶應田嵗被水潦昔元祐間發運張綸興築長隄二百餘里為涵管一百八所石堰斗門三十六座以時疏泄下注射陽湖流入于海故年穀屢登自殘擾之後盡皆廢壞湖水漫流今乞專委官同守令於農隙之際官給米募夫擇湖水衝要去處建石堰斗門函管察隄岸之損缺修築填補庶幾公私利便從之明年四月三日畢工詔淮東總領葉翥核實以聞是月興州都統吳挺言令階成西和鳯州并長舉縣營田以三年計之所得才四萬九千餘緡而所費乃一十七萬緡乞令州縣召民户請佃將軍兵抽還教閲從之強霓強震並贈觀察使仍於西和州立廟賜額旌忠以知興州吳挺言霓守環州震為兵官並死節不屈於敵也利州路復分東西以吳挺帥西路兼知興州知興元府程價充東路安撫秋八月甲午內降御筆詔略曰比年以來五穀屢登蠶絲盈箱嘉與海內共享阜康之樂尚念耕夫蠶婦終嵗勤動賈賤不足以償其勞而郡邑或弗加恤使倍蓰以輸其直甚亡謂也其令諸路監司嚴戒所部應民間兩稅除折帛折變自有常制外當輸本色者毋以重賈強之折錢若有故違按劾以聞重置于法可令臨安府刻石遍賜諸路監司帥臣郡守國子博士錢聞詩劄子論今日登用武臣不過於武臣中選用有文采者欲以此激勵武勇恐反怠其習將見將帥子弟必有事文墨弄琴書趨時好尚以幸進用者上曰若如此時朕安得人使九月壬申幸祕書省御製詩一首賜史浩以下賜祕書監陳騤少監鄭丙紫章服是月陳俊卿入對時曽覿以使相領京祠王抃知閣門事樞密都承旨甘忭為入內押班三人相與盤結士大夫無恥者爭附之於是鄭鑑為館職袁樞為宗正簿因轉對數為上言之俊卿判建康因過闕入對宣出賜茶論覿抃招權納賂薦進人材而皆以中批行之此非宗社之福且曰陛下信任此曹壞朝廷之綱紀廢有司之法令敗天下之風俗纍陛下之聖德上感其言因是稍踈覿於是覿亦覺為上所踈七年疽發背死八年趙汝愚為吏部侍郎上章力抵王抃之罪會抃擅許比使以起立問起居上悔悟汝愚因請對論抃逐之抃去獨有忭在朱熹嘗因過闕奏事力為上言之上曰忭乃德夀所薦謂有材行熹曰姦人若無材何以動人主其後上察其姦竟抵忭罪大事記曰曽覿龍太淵王抃甘忭四人憑恃恩寵招權納賄然四凶之寡不能以勝元凱之衆故曽覿龍太淵之始用事雖劉度張震胡沂周必大金安節諸公爭之而未勝而終以陳應求一言而去曽覿再至與王抃甘忭為姦雖劉珙張栻龔茂良鄭鑑袁樞爭之未勝而曽覿復以俊卿一言而去王抃以趙汝愚一言而去甘忭以朱熹一言而去於此見孝宗之英明塵翳終不能以滓太清也於此見乾淳君子之多稂莠終不能以害嘉禾也俊卿之在建康也是時御前多行白劄子率用左右私人賫送俊卿因上奏曰號令出於人主行於朝廷布於中外古今之所同也間有軍國幾密文字或御前批降則用寶行下此所以示信防偽也今乃直以白劄傳旨處分事宜於數百里之外其間亦有初非甚密之事自可付之省部今白劄既信於天下則他時緩急或有支降錢物調發軍馬處置邊防于國家大利害事其間豈能保其無偽若嚴重知體之人必須奏審則往來之間或失事機若庸懦無識之人即便施行則真偽不分豈不誤事况祗稟文字只付差來人或令回申元承受處到之與否不可得知此於事體尤為非便上降手札奬諭愧謝之言是秋進呈三祖下第六世仙源類譜仁宗皇帝玉牒冬十月先是歷官推九月庚寅晦既頒厯矣而北使來賀生辰者乃以為己丑晦蓋小盡也於是會慶節差一日接伴檢詳丘密調護久之北使乃肯用正節日上夀蓋歷官荆大聲妄改甲午年十二月為大盡故後天一日也十一月庚申右丞相史浩奏陛下事親之懿二典所載誠有所不能及者如朔望駕朝德夀宫與夫聖節冬至正旦上夀或留侍終日或恭請宴遊凡所以盡子之道以天下養者皆極其至自宜太書於䇿以為萬世父子之法然自陛下登位以來至是凡十有七年其間豈無親聞太上皇帝聖訓與夫陛下問對玉音外庭不得而知史官不得而書誠今日之闕典也欲望陛下以前所聞及自今以後所得太上皇帝聖訓陛下問對玉音許令輔臣隨時奏請俾之登載日厯或宣付史館别為一書則聖子神孫得以遵承家法而天下後世知聖朝慈孝之德之盛詔從之庚午祕書監鄭丙等奏所書太上皇帝聖訓皇帝問對玉旨及尊號詔册儀注之類乞先載日厯外仍别為一書自朝廷立為書名頒降尋詔其書以光堯慈訓為名丁丑進呈王希吕繳奏浙間州縣推排物力至于牛畜亦或不遺舊法即無將舍屋耕牛紐充作家業等第之文送勑令所看詳人户租賃牛畜雖係營運取利緣亦便於貧民欲依所奏將應民户耕牛租牛依紹興三年五月六日指揮並與免充家力行下諸路州縣遵守施行上曰國以農為本農以牛為命牛多則耕墾者廣豈可指為家力因而科擾可令檢坐紹興指揮申嚴行下監司常切覺察如有違戾按劾聞奏戊寅上宣諭宰臣曰卿等皆朕親擢凡事盡心當官而行勿有所畏朕既深知卿等則讒毁之言無自而入朕觀魏徴王圭之事唐太宗凡有所言亦未嘗每事皆從彼皆終其身事太宗卿等當以魏徴王圭為法不得輕為去就詔成都一路十六州除成都自有飛山軍及威茂黎雅嘉州石泉軍係沿邊去處兵備不可抽摘外自餘諸州各選兵官前去逐州按試勇壯有武藝人抽摘團結共取一千人作二隊如李德裕雄邊子弟以雄邊軍為名從知成都胡元質請也是月史浩罷相授少傅保寧節度醴泉觀使兼侍讀以趙雄為右丞相王淮為樞密使錢良臣參知政事十二月辛卯進呈監司郡守除目上曰郡守得人則千里蒙福監司得人則一路蒙福卿等遴選其人不可輕授壬辰進呈趙彥逾劄子乞將南康軍諸處魚池為放生池不許租與民户上曰聞沿江之民以魚為生今而禁之恐妨細民乙卯進呈知臨安府吳淵劄子乞復置西溪等兩處發引欄稅上曰關市譏而不征去城五十里之外豈可復置欄稅臣僚言昔大觀中嘗患內外官司奏辟員闕差遣多是權要子弟及易舉親戚升養資任非任能責成之意嘗下詔凡奏辟官於奏狀前用貼黃具所辟官在朝親屬職位姓名以聞欲望檢舉大觀已行之詔應自今有合奏辟官屬必於貼黃前説不係權要子弟親戚庶幾公道稍伸私情盡革以仰副清朝綜核名實之意詔從之是嵗前知雷州李茒奏廣西鹽法見於已行者曰鈔商興販也曰官自搬賣也然二者利害不可不究且官自搬賣舊係本路轉運司主其事行之既便嵗課自充諸州亦無闕乏之患爰自紹興八年改行鈔法轉運司所得僅二分不能給諸州嵗計至於髙折秋苗民被其害逐年賣鈔所虧之數甚多陛下灼見其弊仍舊撥還轉運司均與諸州官搬官賣盡罷折米招糴之為民害者止令轉運司嵗認息錢三十一萬貫其為計甚善自當確守此法必為永久之利臣恭聞光堯太上皇帝在御之日嘗詔諸路提舉鹽事司不得妄有申請變更鹽法乞申嚴行下勿使朝廷良法為妄議者紛更實一路幸甚詔令户部將廣西官搬官賣鹽法申嚴行下常切遵守劉珙以屬疾請奉祠未報請致仕上以珙病亟遣中使挾侍醫以來珙知疾不可為亟上遺表首引恭顯伾文以為近習用事之戒且言今以腹心耳目寄此曹故士夫倚之以媒其身將帥倚之以飢其軍牧守倚之以賊其民朝綱以紊士氣以索民心以離咎皆在是願亟加擯退以幸天下後諡忠肅珙韐之孫子羽之子也知盧州舒城縣余永錫坐贓特貸命編管封州仍籍沒家財己亥淳熙六年春正月庚午進呈門下後省看詳司狀太社令葉大亷劄子奏乞詔內侍省遇有取索庫務物依舊法給合同憑由二本一本付傳宣使臣取索一本令本省畫時實封差人置歷付所取庫務官勘驗支供仍將合同繳奏降下户部除破如南庫封樁庫各下提領所其他倉庫理合一同所貴杜絶姦弊本司看詳欲依所陳自合遵依祖宗舊制應在內官司遇有宣索之物並先次經由合同憑由司上曰此良法也可依癸未趙雄等奏光州復置中渡榷場官御前恐有曽經在𣙜場幹事之人可以差充監官庶可檢察禁物不令過界上曰御前自來不曽差人在淮上買物如淮白北果之屬毫髮不曽買宫中並無唯遇太上皇帝賜來則有之向來劉度守盱𣅿嘗獻淮白却而不受近蒙太上皇帝賜得數尾每進膳即食一小假可食半月記得元居實知盱𣅿軍初之任日朕慮其在任輒獻北物再三戒勑令供責文狀不得買物以獻其狀留尚書省卿等可取以觀之雄等奏陛下豈獨奉養儉素只如珠玉圖畫之珍皆不得其門而入上曰太上皇帝留得圖畫一百餘軸皆名筆也亦未嘗挂蓋天性不好雄等奏此暗消磨多少事人主一有所好則衆弊生焉陛下一意於天下事無他嗜好真堯舜主也臣留正等曰人主惟有一心而人人皆欲伺其所好以投之所好一形於外則來者紛然皆得以乘間而入矣武王聖人也受一獒之獻而召公有憂之作書纍數百言其防微之意深矣漢文帝即位之初有以千里馬試帝意者帝曰吉行日五十里師行日三十里朕乘千里馬獨先安之自是守恭儉清靜之治者二十餘年實由此其基也切惟夀皇聖帝於北物無所取於滋味無所嗜於圖畫無所好豈特天性恬淡不為外慕亦由聖見髙明誠足以知其為有損而無益耳移其玩物之志於萬幾兢業之間此所以勤政務學獨出於百王之上而小人終無所投其隙也與甲申內批登仕郎張聞禮係太上皇后姪女夫特添差浙東安撫司幹辦公事趙雄等奏在法雖戚里文臣未經銓試武臣未經呈試並不許陳乞添差上曰豈可以戚里而廢公法卿等理會得是可留下文字今後有似此等事切須執奏四川制置胡元質夔路運判韓㬇奏夔路之民為最窮而諸州科買上供金銀絹三色民力重困所有大寧監鹽課委有增羡臣今與總領所及本路轉運司公共措置己將鹽課趲刺之錢買金銀發納總領所及茶馬司盡蠲免九州民間嵗買之弊外有餘剩錢若干可以盡免今年夔路諸州一年金科民間買絹之數餘錢又可與民間每嵗貼助之費民力可以少蘇上曰監司郡守興利除害實惠及民要當如此並從之趙雄奏夔路之民最貧韓㬇為漕臣措置此錢以免科擾宣力甚多上曰不可不旌賞尋加㬇直祕閣雨雹二月己丑朔幸佑聖觀即上儲宫也皇太子從召史浩曽覿入侍上御講宫顧瞻棟宇初無改造儼然如新喜而念舊輿至明逺樓下上顧謂皇太子曰近日資治通鑑已熟别讀何書對曰經史並讀上曰先以經為主史亦不可廢庚寅參政錢良臣以失舉茹驤改官自劾詔良臣所奏乃欲以身行法國有常憲朕不敢私可鐫三官癸巳詔户部侍郎陳峴待制張宗元新知秀州徐本中饒州居住趙磻老各降三官以保舉茹驤坐失舉也先是驤知湖州長興縣侵盜官錢入已事發免真決台州編管籍沒家財故有是命甲午太學博士髙文虎論前宰執侍從𢃄觀文殿大學士至待制在外者皆有論思獻納之責上曰卿此奏尤為得體朕亦有聽納之益且知州郡間民情丙申詔前宰執侍從𢃄觀文殿大學士至待制及太中大夫以上守郡奉祠之人今後如有己見利便聽非時聞達即不得輒陳乞恩澤自述勞績之類其責降官不在此限丁酉殿前副都指揮使郭棣奏每遇宣押打毬或蒙賜酒其諸軍正額額外統制官內有於馬上率爾奏事者及賜酒之際無宣喚輒詣榻前紊煩奏事甚失臣子事君之禮乞自今後遇有宣押從本司約束詔從之臣留正等曰朝不失禮燕不失恭然後法度正而堂陛之分嚴若燕私之際武夫兵將輒恃恩昵干求奏請輕瀆主威則亦幾於褻矣夀皇聖帝所以亟從郭棣之請蓋肅威嚴謹名分防狎慢之意於是乎在此萬世子孫所當遵守也癸卯進呈淳熙海行新法上曰朕欲將見行條法令敕令所分門編類如律與刑統敕令格式及續降指揮每事皆聚載於一處開卷則盡見之庶使胥吏不得舞文趙雄等奏士大夫少有精於法者臨時檢閲多為吏輩所欺今若分門編類則遇事悉見吏不能欺陛下智周萬物俯念及此創為一書所補非小乃詔敕令所將見行敕令格式申明體倣吏部七司條法總類隨事分門修纂别為一書若數事共條即隨門釐入仍冠以淳熙條法事類為名三月庚午進呈知鎮江司馬伋言用石修砌湖閘門浚海鮮河使舟船有艤泊之所上曰司馬伋浚河修閘惠利甚廣可除寶文閣待制丁丑宰執奏事上曰諸路漕臣職當計度欲其計一道盈虛而經度之也今則不然於所部州郡有餘者取之不足者聽之逮其乏事從而劾之吾民已被其擾矣朕今以手詔戒諭之俾深思古誼視所部為一家周知其經費而通融其有無亷察其能否而裁抑其耗蠧庶乎郡邑寬而民力裕也趙雄等奏責任漕臣盡於此矣陛下厲精圖治加惠元元軫念及此天下之幸也於是出御筆手詔以戒諸道轉運詔略曰分道置臺寄耳目于爾漕臣職在計度欲其計一道盈虛而經度之也職在按察欲其蚤正素治毋使至于病民厥或異此朕何賴焉汝等得不視所部為一家周知其經費而通融其有無亷察其能否而裁抑其耗蠧令兩浙轉運司刻石遍賜諸路漕臣乙酉進呈除目李嶧欲除太府寺丞去年七月三日在籍上曰前錢良臣奏李嶧乃李如岡之子臣李如岡之壻今臣備數政路恐外人疑臣私於親戚欲乞與外補上曰李嶧以論薦陛擢不因卿進然卿既以親嫌為辭可與近見闕知軍州差遣是月髙郵軍通泰等州去年以田鼠為災田穀絶收命賑之雨雹夏四月丙申上曰伯昌近自太府寺丞除提舉淮東常平茶鹽其家却懇請德夀宫欲改除少監朕思朝廷卿監又非閣門御𢃄之比尤不可輕授趙雄等奏陛下至公無私愛惜名器雖宗室近屬戚里近親除授之際一毫不以妄與此可為萬世之法丁酉上曰州郡間近日添差員數頗多今後宗室戚里歸正官等添差通判職官等每州各不得過一員帥司參議官諸司屬官凖此五月甲子進呈提領封樁庫閻蒼舒狀封樁庫共管見錢五百三十萬餘貫年深有斷爛之數乞拘收西庫綱運見錢對兌支遣其斷爛錢貫給工索之費上曰錢積之久必致貫朽趙雄等奏陛下儉德冠古帝王未嘗一毫妄取於民而府庫充足上曰朕不敢毫髮妄用所以有此以待緩急之用實前此所無戊辰進呈祕書省狀以太史局申明堂大禮合差禮畢奏祥瑞官一員上曰朕以豐年為上瑞不必差官奏祥瑞也丙戌上曰王佐以帥臣親入賊洞擒捕誅勦與向來捕賊不同書生亦不易得趙雄等奏乞旌賞因曰今日成功皆出宸算蓋王佐初時奏事已云束手無䇿止日夜俟荆鄂大軍三千人至陛下亟降宸翰令將本路將兵禁軍義丁土豪無慮四五千人自足破賊宸翰又云諸路養兵皆出民力小冦不用蓄兵何為卿為帥臣焉不知此王佐得此訓戒方知驚懼遂專用本路鄉兵等不復指凖大軍今日擒陳洞等皆鄉丁非大軍也宸翰所料明矣非陛下明見萬里則王佐成功必不如此之速陛下必欲旌賞之宜俟王佐保明立功之人來先自下推賞然後及王佐也是月臣僚言諸路州郡截用上供錢物初令度支點對驅磨既而復令關帳司驅磨然而關防滲漏之弊終不能革者緣其間窠目不一失於參照且有以某事許截經總制折帛錢又有不以有無拘礙蓋許拘截者緣所截窠名不一州郡得以容姦重疊申部而逐部只是照應大案合催名色徑行銷豁各部各案既不關會何以稽考今欲令度支每嵗專置截使簿一面如遇承降指揮截使名色錢物之數即時抄其所𨽻部分候諸州申到帳狀即關會度支回報方許關帳司驅磨銷豁從之六月戊戌進呈臨安府勘到李顯忠諸子師説等無禮於繼母王氏令其子師古行財傾陷異母兄弟等事上曰師説兄弟呼母為侍婢可謂悖禮其母多出貨財以傾之豈為母之道耶母子皆當扺重罪朕念顯忠昔日歸朝頗著勞效今殁未久不忍見其家門零落朕欲來日批出悉赦其罪聽其自新庶幾仍有母子之情自今専務協和如或不悛即置典憲未晚趙雄等奏陛下聖慮及此不唯有補風教抑可以感激諸將忠義之心己亥詔有司一無所問仰臨安府追集師説等奉宣恩旨副朕保全顯忠門户之意既而王氏母子感泣謝恩旁人見者亦以手加額上曰如此施行非獨可以保顯忠門户亦有補於風教是月求四川遺書以其不經兵火所藏官書最多也秋七月癸亥進呈荆鄂副都統郭杲奏唐鄧諸處自來積穀不多襄陽自漢江以北四向美田民間多有蓄積欲密行措置於秋收之際收儲以備緩急上曰令周嗣武同劉邦翰詳所奏事理於秋成之際廣行收糴其合用倉敖及收貯去處仰公共相度措置申甲子趙雄等謝昨日蒙恩賜新荔子流香酒上曰朕却獻方物所以四方珍味嘉果俱不曽有昨日新荔子蒙太上皇帝賜到所以分賜卿等朕昨日食素亦未曽嘗朕聞舊日京師謂之獻時新逺方新珍之物奔走爭先勞人動衆害物甚多朕欲痛革此事最不喜時新之物蓋世俗既競時新則不待物性成就而爭先採摘甚可惜也癸酉進呈知臨安府吳淵狀修造後殿畢工上曰朕本不欲修群臣皆言此殿朽損不得已修之趙等奏此殿乃昕朝聽政之所及將來大禮陛下於此宿齋而朽蠧不葺臣子之心安乎此臣等所以再三懇請必欲修葺然制度亦不至壯麗殊無勞費也中書舍人鄭丙言近來卿監丞簿悉除史官館職學官書局員數頗多監司郡守差至三政參議通判添差相踵歸正使臣養老將校填滿諸郡東宫徹章祕書省進書講官官僚及預修官吏賞之可也下至雜流厮役監門邏卒亦皆霑賞曰就龍日久曰應奉有勞開一河道修一閘堰橫被醲賞欲行裁抑詔曰賞功遷職不以濫豫丙之言是也而掌行書讀每有除授可否不即以聞積纍既多徒有所論不能濟於未然之前豈所望於忠益耶可劄付給舍給事中王希吕兼權中書舍人李木等皆以失職待罪上曰謂之無罪可待則不可謂之放罪則丙等不自安只令依舊供職甲申臣僚奏切見舊制章奏凡內外官登對者許用劄子其餘則前宰執大兩省官以上許用劄子以下並用奏狀近年因臣僚奏請凡沿邊守臣與帥漕臣并主兵官許用劄子自後他司內郡應用奏狀者或以劄子上塵乙覽并其間往往抵訐前政陳説己能不知大體紊煩天聽欲望申嚴有司應帥漕郡守主兵官如事涉兵機許用劄子其餘若不如式則令所屬退還并乞令朝廷稽考臣僚章奏如於公事之外輒以私事上瀆天聽者略賜施行則人知警畏各安其分詔從之是月進呈今上會要一百五十卷沿海制置司參議官王日休進九丘總要三百四十卷送祕書省看詳言其間郡邑之廢置地理之逺近人物所聚古迹所在物産所宜莫不該載詳備實有可采詔特遷一官八月戊子進呈敕令所重修淳熙法册御筆圈記户令內驢駝馬舟船契書收稅上曰凡有此條並令刪去恐後世有算及舟車之言壬辰上宣諭近建康行宫主管匙鑰內侍將到江東諸州稻禾色樣皆十分結實今嵗逺近皆豐熟可謂屢豐年也朕殊以為喜趙雄等奏陛下聖德日新故天報以屢豐年之祥上曰易曰自天祐之吉無不利朕當益務修德仰承天祐上宣諭宰執批答辛棄疾文字可劄下諸路監司帥臣遵守施行先是湖南漕臣辛棄疾奏官吏貪求民去為盜乞先申飭續具按奏御筆付辛棄疾卿所言在己病之後而不能防於未然之前其原蓋有三焉官吏貪求而帥臣監司不能按察一也方盜賊竊發其初甚微而帥臣監司漫不知之坐待猖獗二也當無事時武備不修務為因循將兵不練例皆占破才聞嘯聚而帥臣監司倉皇失措三也夫國家張官置吏當如是乎且官吏貪求自有常憲無賢不肖皆共知之亦豈待喋喋申諭之耶今已除卿帥湖南宜體此意行其所知無憚豪強之吏當具以聞朕言不再苐有誅賞而已上又曰亦欲少警諸路監司郡守也辛丑進呈户令內有户絶之家繼絶者以其家財物許給三千貫如及二萬貫奏裁上曰國家財賦取於民有制今若立法於繼絶之家其財産及二萬貫者奏裁則是有心利其財物也趙雄等奏有似此欲悉刪去上曰可悉令刪去壬寅詔浙東提舉樊仁逺於盜賊將發之際輒薦雷潨自代外託遜能內實避事又所薦雷潨顯屬謬舉可罷新任九月戊午趙雄奏前日已降指揮免奏祥瑞上曰朕自有真祥瑞豐年是也百姓家給人足瑞莫大焉庚申進呈徐存劄子陳乞宫觀上曰徐存胸中狹獈不耐官職向因輪對嘗識其人可與宫觀趙雄等奏曰陛下知人之明過於堯舜臣下凡一經奏對者輒知其為人以一字褒貶無不曲盡上曰立功業耐官職須有才德福厚者能之荀卿曰相形不如論心論心不如擇術朕每於臣下觀其形以知其命聽其言以察其心相形論心蓋兼用之丙寅進呈捕亡令諸捕盜公人不獲盜應決而願罰錢者聽上曰公人捕盜不獲許令罰錢而不加之罪是使之縱盜受財也此等條令可令刪去丁卯進呈賞格內有監司及知通納無額上供錢賞格上曰祖宗時取於民止二稅而已今有和買及經總制等錢又有無額上供錢既無名額則是白取於民也又立賞以誘之使之多取於民朕誠不忍也可悉刪去上又曰朕不忘恢復者欲混一四海效唐太宗為府兵之制國用既省則科斂民間諸色錢物可悉蠲免上收二稅以寬民力耳雄等奏陛下聖念及此天地鬼神實臨之必有隂相以濟大業辛未大饗明堂復合祭奉太祖太宗配自乾道以後議者以德夀宫為嫌止行郊禮至是用李燾等議復行明堂之祭遂合祭並侑焉從祀百神並依南郊禮例先是禮部奏前禮部侍郎李燾奏乞行明堂并録連典故一神宗聖語熙寧五年神宗問王安石曰宗祀明堂如何安石曰以古言之太宗當宗祀今太祖太宗共一世若迭配明堂亦於事體為當神宗曰今明堂乃配英宗如何安石曰此乃誤引嚴父之道故也若言宗祀則自前代已有此理神宗曰周公宗祀乃在成王之世成王以文王為祖則明堂非以考配明矣一治平元年知制誥錢公輔知諌院司馬光吕誨之議曰孝經曰嚴父莫大於配天則周公其人也孔子以周公有聖人之德成太平之業制禮作樂而文王適其父也故引以證聖人之德莫大於孝答曽子之問而已非謂夫凡為大子皆當以其父配天然後為孝也近世祀明堂者皆以其父配五帝此乃誤認孝經之意而違先王之禮不可為法也一天章閣待制兼侍讀李受天章閣待講傳下言臣等竊以為嚴父者非專謂考也故孝經曰嚴父莫大於配天則周公其人也下乃曰郊祀后稷以配天宗祀文王於明堂以配上帝夫所謂天者謂郊祀配天也夫所謂帝者謂五帝之神也故上云嚴父配天下乃云郊祀后稷以配天則父者專謂后稷也且先儒謂祖為王父則知父天者不專謂乎考也一乾道六年李燾為祕書少監兼權侍立官奏昊天四祭在春曰祈穀在夏曰大雩在秋曰明堂在冬曰圜丘名雖不同其實一也太祖嘗行大雩之禮於開寶太宗再行祈穀之禮於淳化至道其禮並如圜丘獨明堂之禮皇祐二年仁宗始創行之嘉祐熙寧元豐元祐紹聖大觀政和又繼行之太上皇帝建炎二年既祀圜丘紹興元年即祀明堂以太祖太宗並配天地神祇饗答福祚綿永陛下臨御之三年既親祈穀七年又祀圜丘竊謂明堂之禮合宜復行逺稽祖宗故事近遵太上皇帝慈訓實為當務之急淳熙三年三月燾因轉對又申前請是嵗遂詔令禮官太常寺詳議而舉行之丙子四川安撫制置使知成都府胡元質奏川蜀産茶自熙寧以後一從官權軍興以來聚斂之臣增立重額産日益去額日益增民日益困於是條其狀以聞乞同茶馬司公共措置旋被隆旨俾之措畫臣遂與提舉茶馬官置局委官推核增虧之數所合減放虛額凡一百四萬三百斤有竒其引息及土産稅錢共計十五萬二千九百九十四貫有竒係每嵗合納之數遂具以聞奉旨除放逺民交慶欲望聖慈宣付史館以傳無窮詔從之冬十月安南李龍􅧪加食邑封功臣號初封制詞寶録不載十一月乙卯朔宰臣趙雄等乞宣示御製用人論上曰此論欲戒飭臣下趍事赴功而已豈為卿等設邪邇來年穀屢豐雨㿩時若中外晏然皆卿等贊襄之力癸卯上曰義倉米專備水旱以濟民今連嵗豐稔常平米正當趂時收糴可嚴行以先降旨揮催諸路以常平錢盡數糴米時諸路未有申到處故也癸酉上宣諭曰近蒙太上皇帝賜到倭松真如象齒已於選德殿側蓋成一堂趙雄等奏陛下不因太上皇帝賜到良材亦未必建此堂也上曰朕豈能辦此木植乃太上之賜近嘗謝太上皇帝因奏來春和暖欲邀請過此堂奉萬年之觴太上皇帝已許臨幸雄等奏陛下平時一椽一瓦未嘗興作可謂儉德矣及蒙太上皇帝賜到木植即建此堂可謂孝德矣孝儉之德堯舜事也上曰此堂並無所費不施丹雘數日間當與卿等觀之戊寅進呈右正言黃洽劄子奏賞罰必欲當上曰賞罰自是欲當然朕有一言昨亦嘗宣諭黃洽夫矯枉而過直則復歸於枉矣故矯枉至於直可也過於直不可也猛本所以濟寬然過於猛則尤不可蓋過於猛則人無所措手足濟寬而過於猛猶矯枉而過其直也惟立表亦然所立正則其影直所立過中則影亦隨之朕守此甚久一賞一罰決不使之至於過趙雄等奏執其兩端用其中於民此舜事也上曰中者朕朝夕所常行至官使人才譬之置器須置得適當乃合於中若置之失宜則非中矣朕之於臣下初無喜怒好惡嘗於禁中宣諭左右曰朕本自無賞罰當隨事而應不得不賞罰耳初無毫髮之私也又常守兩語愛而知其惡憎而知其善故雖平日所甚親信茍有過失必面戒之而踈逺小臣或有小善寸長則稱奬不一雄等奏大哉王言此之謂無心孔子論古帝王獨以堯為大者以其無心故也故曰惟天為大惟堯則之夫雨露之所生成雪霜之所肅殺天豈有心於其間哉今陛下如天之無心得堯之大得舜之中所以聖德日新治效日著蓋本諸此是月雨土十二月戊子進呈柴瑾具析到薦舉王璞因依上曰曰今嵗免發海船而瑾乃以發海船薦舉王璞可謂欺誕矣特落職以為薦舉者之戒甲午進呈士輵乞將異姓恩澤與姪女夫張元質趙雄等奏在法異姓恩澤合奏有服親太常寺供到姪女夫無服上曰既於法有礙今一放行遂為無窮之例攀援不已斷不可開己亥刑部尚書謝廓然奏切見二廣緣去朝廷既逺舊多煙瘴去處又見攝官定差之文縣或有闕監司守臣輒差校副尉攝參軍助教權攝上曰逺方用此曹權縣細民何負可令二廣帥漕憲司將似此名色並日下解罷今後州郡違戾仰按劾施行如諸司違戾許互察以聞辛亥進呈知舒州趙子濛奏本州支使鄒如愚司理趙善劬荒廢職事上曰官無髙卑皆當勤於職事又曰朕於機務之外猶有暇時只好讀書唯讀書則開發智慮物來能明事至不惑觀前古之興衰考當時之得失善者從之不善者以為戒每見叔世之君使人汗下幾代其羞且如唐季諸君以破朋黨去宦官為難以朕思之殊不難也凡事只舉偏補弊防微杜漸銷患於冥冥若必待顯著而後治之則費力矣朕又每守兩句恭者不侮人儉者不奪人朕每於臣下未嘗有一毫輕侮之心皆待以禮至於玩好之物有來獻者未嘗受之即諭以此物是卿所玩好者一切不留此皆讀書有得雄等奏恭儉豈可以聲音笑貌為哉陛下躬行如此聖學髙矣是月臣僚請會計財用之數為會計録上曰向者欲為此録緣户部取於州縣為經總制錢者色目太多取民太重若遽蠲則妨經費須他日恢復之後使民間只輸二稅其餘名色乃可盡除之潼川府路言馬補行義文學召不至賜出身補本府教授旌表潼川府中江縣孝亷里進士楊榆家門閭以本府上其嫡母賈氏夫死不嫁事舅姑以孝聞舅姑皆年九十餘無疾而終賈氏追悼喪葬盡禮至有芝草生於墓側楊榆事其母復能盡孝道時賈氏年八十四而康健不衰皆由楊榆孝惑所致也庚子淳熙七年春正月甲寅朔進呈臨安府城內外及諸縣放免收稅一年為緡錢百二萬有竒及用內帑等錢對補之數上曰朕於內帑無毫髮妄用茍利百姓則不惜也趙雄等奏昨黃榜既揭都城歡呼蓋古今絶無而僅有又奏太史局申前月二十八日日有戴氣言人君德至於天為萬民所愛戴則有是瑞上曰二十八日恰是議放稅時朕之本心只欲連嵗豐稔物價低平百姓家給人足兹為上瑞臣留正等曰漢文帝詔天下三十而稅一又詔免田租之半又詔天下田租盡除之此蓋史册未有之事而文帝何獨能行之揆厥所繇蓋恭儉之積也夀皇聖帝愛惜財賦不肯一毫妄費而蠲減之令史不絶書至是乃放免臨安府城內外及諸縣一年之征又盡出內帑以補之捐利豫民雖出聖神之本心然儉德之效實見於此孔子曰節用而愛人自古及今未有用之不節而能愛人者也臣於文帝之事有感焉故併取以為儉德之證云二月癸未朔知鎮江府曽逮言本府開濶海鮮河及新河等以便舟船上曰揚子江天下至險不可艤舟趙雄奏鎮江舟船輻湊前此綱運客船漂溺不少上曰若多開河道以便舟船甚好壬辰趙雄等奏魏王薨皆乞寬慈抱上抆淚曰朕向來躐次建儲者正見此子福氣頗薄耳然亦不料其如此之天也趙雄對於昔建儲之初天下猶未能盡識聖意乃今方是曉然上曰朕以宗廟社稷之重斷然行之己酉進呈提舉江州太平興國宫陳岩肖上表進淳熙中興聖德頌上曰可令宣付史館因曰陳岩肖筆力不衰嘗為侍從惜其老矣欲與進職又别無名不欲因進頌也丙午上曰朕令察官察事甚好邇來所察甚有補於事趙雄奏事之大者言者論之小者察官察之則吏治畢舉官邪悉去矣是月進仁宗玉牒慶歷三年至皇祐三年凡十年及哲宗玉牒頒釋奠儀張栻卒初栻在朝未期嵗而召對六七栻所言大抵皆修身務學畏天恤民抑僥幸屏讒諛故不恱者衆坐是而出居三年上復念栻除知靜江府增秩再任凡五年廣西諸州運鹽漕司取其八分之息公私兩病栻奏以鹽息什三豫諸郡又因兼懾漕事出其所積緡錢四十萬而中分之一為諸倉煮鹽之本一為諸州運鹽之費所統州二十有五荒殘多盜栻乃簡閲州兵汰冗補闕籍諸州黥卒伉健者為效用斥漕司鹽本羡錢以佐諸州兵食之不足者申嚴保伍之令而信其賞罰知流人沙世堅才勇喻以討賊自效所捕斬前後以十百數傳令溪洞酋豪喻以弭怨睦鄰毋相殺掠示之恩信謹其禁防由是內寧外服革橫山買馬之宿弊諸蠻感悅爭以其善馬至改知江陵府湖北尤多盜栻入境首劾罷大吏之縱賊者捕斬姦民之舍賊者群盜遁去又益為教條喻其黨與得相捕告以除罪郡瀕邊屯軍主將每與帥守不相下栻既以禮遇諸將得其歡心又加恤士伍每按親兵必使與大軍雜試均犒以相激厲修義勇法使從縣道階級農隙講武大閲於府有言於朝請盡籍客户為義勇者栻慮其擾亟閲民籍家三人者乃籍其一為義勇副軍别置總首人給一弩俾家習之三嵗一遣官就按辰沅諸州自政和間奪民田以募遊惰號萬弩手栻為奏去其病民罔上者數條並準姦民出塞為盜法皆抵死罪時置而弗治至是捕到數人仍有金人在黨中栻曰朝廷未能正名討敵疆埸之事毋曲在我命斬之以徇於境而縳其亡奴歸之北人歎其理直且曰南朝有人信陽守劉大辨怙勢希賞廣招流民而奪見户熟田以與之請於朝以熟為荒乞授流民事下本道施行如章栻劾大辨詐諼凶虐所招不滿百數而虛奏十倍請論其罪不報章纍上大辨易他郡蓋宰相忌栻者沮之云栻自以不得其職數求去尋以病請祠病且死自作遺表來上略曰再世蒙恩一心報國大命至此厥路無由猶有微誠不能自已伏願陛下親君子逺小人信任防一已之偏好惡公天下之理永清四海克鞏丕圖邸吏以庶僚不得上遺表却之上迄不見也栻初以父任右承奉郎平生未嘗乞磨勘上知之其在靜江特進二秩為承事郎栻之言曰學莫先於義利之辨義者本心之所當也栻嘗從胡宏講學宏告以孔門論仁之旨栻默然若有得者宏稱之曰聖門有人矣三月丙辰兵部措置武官舉補官差注格法上曰武舉本欲取將帥之才今前名皆令從軍以七年為限則久在軍中諳練軍政將來因軍功擢為將帥庶幾得人壬戌詔舉賢良內降制略曰永惟通儒明於古今王事之體朕所嘉尚乃即位以來詔書三嵗一下而應是選者未能盡當朕意豈詢求之路未廣而考擇之法或嚴耶將朕誠意未孚而真賢實能莫為時出也中外侍臣若部使者郡守其各悉心搜選俊異有名來上名儒茂才有能稱吾詔者當崇顯焉今嵗科場其令尚書侍郎兩省諌議大夫以上御史中丞學士待制各舉賢良方正能直言極諌一人守臣監司亦許解送庚午車駕詣德夀宫起居恭請太上皇帝夀聖皇后至大內開宴於凌虛閣下上巾裹赭袍赴太上夀聖榻前各再拜起捧觴上千萬嵗夀酒三行太上夀聖聨步輦以行上亦步輦從至翠寒堂棟宇顯敞不加丹雘上曰凡此巨材一椽已上皆太上皇帝所賜且瑩潔無節目所以更不采飾酒復數行至堂中路石橋少憩上捧觴勸太上次勸夀聖皆釂飲上亦滿引更相勸酬者再三上奏太上曰苑囿池沼久已成趣皆太上皇帝積纍之勤臣蒙成坐享何德以堪之太上皇帝曰吾兒聖孝感通神明海內無事垂二十年安得為無功於是曽覿退而紀實以進詔宣付史館臣留正等曰漢髙祖置酒前殿奉玉巵為太上皇夀有臣業所就孰與仲多之語唐太宗從上皇置酒未央宫上皇謂胡越一家自古未有而太宗有皆陛下教誨非臣智力所及之語此皆一時宫中燕樂之語而史筆大書以為漢唐盛事然自後世視之郤行之恭內禪之議亦不容旡譏焉今觀夀皇聖帝所以悅其親者二十八年之間父慈子孝始終無間夫豈漢唐所可幾及覿之所紀特其一事耳嗚呼盛哉龜監曰孝宗之嗣承大寶也史臣以孝諡之信非溢美冒雨扶駕其禮勤也入宫降輦其情真也五日一朝其見數也或留侍終日或恭請燕遊其所以盡孝子之道又極其至也見天顔悅好而喜不自勝步履夀康而喜不可言淳熙三年行七秩禮議所御之服曰此古人斑衣意也非常之慶與天下共之而聖孝達乎天下矣淳熙之十三年行八秩禮御所賜之服曰此正昔人斑衣也罕有之典敵使起服而聖孝達乎夷狄矣冷泉之遊杯酒相屬太上欣然曰挹山光而聽泉流濯喧埃而發清興其至和真樂可勝既哉翠寒之遊步輦以從天子悚然曰一椽以上皆太上所賜又曰苑囿成趣皆太上積纍之功其克念厥紹又何如哉癸酉臣僚言今京西路均房州水陸入川商旅軍兵附𢃄銅錢入金州利州甚多金州為川口與商州接境舊止用交子鐵錢今乃兼用銅錢深恐泄入它界及四川毁錢為器之弊乞下四川總所委利路漕臣置場於金州給以交子兌換官私銅錢發赴湖廣總所樁管從之己卯上曰進讀三朝寶訓幾時終篇史浩周必大等奏陛下日御前後殿大率日旰方罷朝隻日又御講筵過是恐勞聖躬上曰朕樂聞祖宗謨訓日盡一卷亦未為多雖雙日及休假亦當特坐自是每講讀上必注目傾耳或隨事咨詢率漏下十刻而無倦夏四月癸卯知南康軍朱熹上疏言天下之大務莫大於恤民恤民之本又在人君正心術以立紀綱今民貧賦重若不討理軍實去其浮冗則民力決不可寬惟有選將吏核兵籍可以節軍費開廣屯田可以實軍儲練習民兵可以益邊備今日將率之選率皆膏梁子弟厮役九流所得差遣為費己是不資到軍之日惟望裒斂刻剝以償債負總餽餉之任者亦皆倚負幽隂交通貨賂其所驅催東南數十州之脂膏骨髓名為供軍而輦載以輸權幸之門者不可以數計然則欲討軍實以紓民力必盡反前之所為然後可革也軍籍既核屯田既成民兵既練州縣事力既紓然後可以禁其苛斂責其寬恤庶幾窮困之民得保生業無復流移漂蕩之患矣所謂其本在於正心術以立紀綱者蓋天下之紀綱不能以自立必人主之心術公平正大無偏黨反側之私然後紀綱有所係而立君心不能以自正必親賢臣逺小人講明義理之歸閉塞私邪之路然後乃可得而正今宰相臺省師傅賔友諌諍之臣皆失其職而陛下所與親密謀議者不過一二近習之臣此一二小臣者上則蠱惑陛下之心志使陛下不信先王之大道而説於功利之卑説不樂莊士之讜言而安於私褻之鄙態下則招集天下士大夫之嗜利無恥者文武彚分各入其門所喜則隂為引援擢置清顯所惡則密行訾毁公肆擠排交通貨賂則所盜者皆陛下之財命卿置將則所竊者皆陛下之柄陛下所謂宰相師傅賓友諌諍之臣或反出入其門墻承望其風旨其幸能自立者亦不過齪齪自守而未嘗敢一言以斥之其甚畏公議者乃略能驚逐其徒黨之一二既不能深有所傷而終亦不敢明言以搗其囊槖窟穴之所在勢成威立中外靡然向之使陛下之號令黜陟不復出於朝廷而出於此一二人之門名為陛下之獨斷而實此一二人者隂執其柄蓋其所壞非獨壞陛下之紀綱乃併與陛下所以立紀綱者而壞之則民又安可得而恤財又安可得而理軍政何自而復宗廟之讎又何時而可雪邪己酉進呈芮輝奏竊見吏部選法小使臣遭喪不解官給式假百日欲除緣邊職任及見從軍與歸正歸朝㨂汰指使等官并軍功補授雜流出身人依舊以百日為限此外小使臣如隂補子弟宜守家法取應宗室武舉出身之類皆自科舉中來自合悉遵三年之制上曰小使臣多是從軍或雜流出身及沿邊職任所以不以禮法責之其蔭補子弟取應宗室武舉人豈可不遵三年之制可依奏五月壬子朔趙雄等奏謝昨日觀堂奏事蒙恩錫燕又蒙頌賜宸翰且終日獲聞道德仁義之言古今治亂之要躬行恭儉之懿可謂醉酒飽德上曰昨日少欵終日論道絶與聽絲竹不同又不設果桌不具珍饌而醉飽自有餘居常燕設亦不過如此醉飽之外雖八珍羅列亦何用徒暴殄妄費耳雄等奏陛下儉德中外所共知無不欽仰贊嘆上曰近頗乏雨昨晚方欲祈禱半夜遂得雨可喜趙雄等奏陛下修德修政格于皇天故欲雨即雨上曰雱霈如此皆是黍稷稻粱過如雨珠玉矣真大祥瑞也上又曰連嵗豐稔米雖至賤雨既愆期朕不敢忽是時雨正雱霈上觀雨笑曰此雨從何處來雄等奏從陛下方寸中來人主一念克誠天實臨之陛下誠心愛民宜其感格如此乙卯史浩等奏進讀三朝寶訓終篇臣等竊惟學于古訓監于成憲傅説所以告髙宗也日就月將學有緝熙于光明群臣所以戒成王也二君當即位之初故其臣以是入告今陛下久臨大寶歷年方永不待進言益勤典學湯之盤銘曰茍日新日日新陛下其得之矣欲望宣付史館詔從之進呈廣南路經略轉運提刑司狀凖指揮以本路奏請乞將湖南宜章臨武兩縣割屬廣東連州再委官詢訪審究二縣委不可割上曰不若仍舊豈可輕更易朕向來見有陳獻利害聽其一時之言似乎可行輕欲更改邇年以來惟務詳審未嘗輕變一法蓋天下之言來之欲廣而聽之在審甲子上曰昨日日間雖小雨至夜雱霈朕每日修省惟恐不逮孶孶為民未嘗敢忽庶幾天心昭格雨㿩以時趙雄奏聖德之修固有素矣非若周宣王因懼而修也上曰成湯禱旱之辭每疑好事者增益之且湯之不邇聲色自無女謁何至於盛今曰女謁盛邪則是嘗果有此事矣己卯進呈畢上宣諭曰歷觀自古人臣功業之成否全係其當時人君如何耳且如裴度遇憲宗則能成功其後在敬宗文宗時則無聞趙雄等奏有堯舜之君然後有臯夔之臣有湯武之君然後有伊吕之臣臯夔伊吕若遇敬宗文宗亦無能為而况裴度乎史臣贊裴度以為非前智後愚用不用勢當然蓋知言也上曰然是月頒淳熙新書六月丙戌上問周必大曰頃以金人叢桂集示卿曽細看否必大奏已曽細看語多粗率上曰北方之文豪放其弊也粗南方之文縝密其弊也弱甲午詔監司郡守所屬官或身有顯過而政害於民者即依公按刺或才不勝任而民受其弊者亦詳其不能之狀俾改祠祿不得務從姑息致有民訟方行按刺若亷察素明而的知其興訟不當者則當為别白其是否以明正其妄訴之罪不得一例文具舉覺從太府丞錢象祖請也乙未趙雄等奏近日雨頗霑足皆聖德所致上曰朕何德惟賴二三大臣扶持公道上承天心蓋皇天無親惟德是輔彼小民暑雨祈寒皆未免於怨咨上之人茍能思其艱圖其易斯盡善矣雄等奏居常以盡公相告戒若曲循親舊之情不過得其面譽安能勝衆人之毁也上曰曲意徇人所悅者寡不悅者衆及招人言親舊誰能致力不惟無益於國亦殊不利於身豈若一意奉公保無後患較其利害孰得孰失耶壬寅進呈祕書郎李巘奏竊觀國朝太平興國元年詔學究兼習律令而廢明法科至雍熙二年復設明法科以三小經附則知祖宗之意未嘗不使經生明法亦未嘗不使法吏通經也謂宜略倣祖宗舊制使試大法者兼習一經及小經義共三道為一場上曰古之儒者以經術決疑獄若以俗吏必流於深刻宜如所奏然刑與禮實相為用且事涉科舉可專令禮部條具來上既而禮部條具欲從臣僚所請第四場經義大經一小經二詔從之丁未三省奏去嵗豐稔今嵗米賤所在和糴告辦倉廪盈溢其江東路諸郡上供米初令就近赴金陵鎮江倉今兩處守臣皆云無可盛貯乞依舊發赴行在豐儲西倉上曰朕常思何以堪上穹之佑惟當增修德政耳是月祕書郎趙彥中疏略云士風之盛衰風俗之樞機繫焉且以科舉之文言之儒宗文師成式具在今乃祖性理之説以浮言遊詞相髙士之信道自守以六經聖賢為師可矣今乃别為洛學飾怪驚愚外假誠敬之名內濟虛偽之實士風日弊人材日偷望詔執事使明知聖朝好惡所在以變士風從之秋七月甲戌進呈杜民表劄子乞住罷總領漕司營運上曰朕欲罷此久矣內外諸軍添給纍重之人每嵗共不過三十餘萬緡别作措置支給於是降詔兩淮湖廣四川總領所兩浙四川轉運司營運並日下住罷仰逐司將截日終見管本息錢物實數逐一開具申尚書省乙亥進呈伯圭劄子將門客不理選限登仕郎恩澤再奏乞理選限上曰於法如何趙雄等奏在法不許上曰朕每自守法不敢放開若違常法以開幸門則援例干請不已將何以阻之丁丑進呈檢會六年詔應諸軍有家纍因差出身故請過劵食錢米並特與除破其無家纍并在本身故人即未該載理合一體上曰合與銷破近來優恤諸軍事件無不悉備平居無事須精加訓練不可使之太驕太驕則臨敵遇戰誰肯效命八月進呈梁季珩乞宫觀上曰此人不正近嘗貽書內侍啖之以利內侍以其書繳進趙雄等奏陛下化行中外雖􅉏御之臣皆知精白不敢私真盛德事也己丑臣僚言沿邊人盜販解鹽私入川界侵射鹽利詔興州興元府都統司開具已措置禁止事件以聞既而吳挺言本司已立賞錢五百貫出榜行下沿邊屯戌統兵官廣布耳目嚴行緝捕從之辛卯臣僚奏執政臺諌之臣身居要地而子孫從宦逺方監司郡守趍承從風而靡於四方觀瞻所損甚大欲乞今後見任執政臺諌子孫並與祠廟差遣特許理為考任詔從之己亥上謂輔臣曰漕河猶未通舟聞平江府月供闕米皆雇夫陸運當此秋旱深恐勞民可權於百官米內支供雖糙無害它時水生却令併輸辛丑進呈台州自淳熙元年至三年欠內庫錢萬餘緡本州引赦乞除放內庫執以無例上曰赦書所放內外一體其除之是月置湖南飛虎軍帥臣辛棄疾所創也尋詔撥𨽻步軍司遇盜賊竊發專聽帥司節制仍以一千五百人為額旱九月癸亥上宣諭曰每日常朝可同後殿之儀不必稱丞相名趙雄奏君前臣名禮也臣豈敢當此上曰記得蘇洵亦嘗論此謂名呼而進退之非體貌大臣丞相不須多辭於是詔今後垂拱殿日參宰臣特免宣名續又詔除朝賀六參并大使在庭依儀其餘並免宣名內樞密使日參如遇押班亦免宣名詔印會子百萬緡均給江浙代納旱傷州縣月樁錢是嵗二浙江東西湖北淮西傷旱檢放并賑濟計之合二百萬緡斛先是上諭宰執曰近來會子與見錢等趙雄等奏曩時會子輕矣聖慮深逺不復增印民間艱得之自然貴重又緣金銀有稅錢費擔擎民間尤以會子為便却重於見錢也上曰朕若不愛惜會子散出過多豈能如今日之重邪冬十月丙戌姚述堯進對因論今嵗旱傷賑恤之政當務寬大上曰國家儲蓄本備凶嵗捐以豫民朕所不惜是月進呈降授明州觀察使張説遺表擬贈承宣使與恩澤上曰前日給事陳峴駁其致仕轉官今得毋再致人言乎趙雄奏朝廷行事與臺諌不同朝廷須稍從寬臺諌當截然守法不可放過乃為稱職上以為然乙未趙雄等奏胡元質申黎州五部落蠻納降昨降旨諭以彼如未屈伏毋汲汲市馬使權常在我自無能為所謂明見萬里上曰蠻人欲進馬三百匹并獻珊瑚等乞盟朕已令密院發金字牌却其獻止許其互市趙雄等皆贊美聖德十一月己未知隆興府張子顔言曩乾道之旱江西安撫龔茂良有請欲明諭州縣於賑濟畢日按籍比較稽其登耗而為守令賞罰以此流移者少今嵗旱傷欲乞許臣依茂良所請以議守令賞罰從之壬申進呈知南康軍朱熹乞將今年苗米除檢放外有合納苗米九千九百石乞撥充軍糧上曰南康旱傷已支撥米與賑糶賑濟矣可更依所乞雄等奏陛下聖德簡儉茍不當用一錢不與儻利百姓則雖百萬不惜上曰朕於內帑未嘗毫髮妄用上以奉二親下則犒軍而已至於奉養口體每戒後苑毋妄殺如鵪鶉並不令供又曰御馬院所養胡羊每遇斷屠則以一口奉太上一口奉夀聖朕未嘗殺雄等奏史稱唐太宗天姿仁恕陛下蓋無愧矣十二月黎州五部蠻冦邊是冬進呈四朝國史志户部郎趙師睪言紹興以來賦入綱目寖多中間雖將頭子等窠名五十二項并入經總制起發造帳供申其後復添坊場寬剩增添淨利等窠名錢一十三項又皆隨事分𨽻户部五司其為財賦則一而所𨽻者五莫相參照乞於本部置總計司以五司所𨽻錢物併歸一處趙雄等尋奏户部見有催轄司上曰五司分治而長二總之既有催轄司若更立總計之名徒重復無益也宋史全文卷二十六下
