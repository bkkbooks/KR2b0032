body:
  text: 宋史全文卷二十九上宋寧宗一乙卯慶元元年上光宗皇帝第三子也母曰慈懿皇后李氏光宗在泰邸慈懿夢日隊於庭以手承之已而有娠孝宗乾道四年十月丙辰秋分而生上五年正月賜名十一月乙丑授右千牛衛大將軍淳熙五年十月戊午除明州觀察使封英國公七年二月戊辰初就傅孝宗諭輔臣妙簡儒臣為小學教授遂以命祕書省正字楊輔時上年十三矣明年輔補外以校書郎劉光祖代之光祖請講誦祖宗故事以為日課九年正月冠十年九月己巳始預朝參十一年當出閣兩宫愛之不欲令居外乃建第東宫之側以十月甲戌遷焉十二年三月乙酉除安慶軍節度使封平陽郡王八月辛酉納夫人韓氏十六年二月光宗受禪三月己亥拜少保武寧軍節度使進封嘉王賜外第上自弱齡尊師而重傅朝廷所用學官如羅點鄧馹莫叔光咸一時之選及是又創翊善以沈清臣為之清臣俄免以黃裳代之其後黃文孫逢吉陳傅良章穎沈有開彭龜年繼居講讀之任皆名儒也上每溫習所講之書自為口義令講官視草或有大義論上必書之册謂之日記髙宗攢陵上力請護送道間因見田家作苦之狀謂左右曰居常在禁中安得知此講義曰周公作無逸首之曰知稼穡之艱難蓋人君生於深宫之中長於婦人之手其視田里之務為何物故一旦出而臨民往往如秦越之相視嘗聞真宗乳母號秦國太夫人劉氏本農家女喜談田野間事真宗自幼聞之為甚詳所以即位以來加惠農民景德農田敕成書最為詳備豈非見間之有其素哉今我寧考在潛德之初因道間見田家作苦之狀謂左右曰居常在禁中安得知此是則小人之勞關於聖心久矣此三十年恭儉之治豈無所自來歟光宗紹熙二年冬光宗始屬疾四年壽皇不豫光宗疾甚不能視疾壽皇升遐猶未能出知樞密院事趙汝愚等奉太皇太后聖旨皇帝以疾不能執喪奉皇子即皇帝位本末詳見光宗紹煕五年時年二十七春正月丁亥朔蠲兩淮租稅詔修髙宗實録己亥雷壬寅黎州蠻寇邊官軍與戰却之乙巳蠲台嚴湖州貧民身丁折帛錢一年詔兩浙淮南江東路荒歉諸州收養遺棄小兒辛亥將作監李沐為右正言沐韓托胄之黨也托胄欲擊趙汝愚於是擢沐以居言路以隂雨賑濟行在貧民丙辰白虹貫日二月丁巳朔詔兩淮諸州勸民耕墾荒田壬戌詔嗣秀王伯圭贊拜不名罷諸郡權攝癸亥以久雨釋大理三衙臨安府兩浙路杖以下囚丁卯語帥臣監司歲終考察郡守臧否以聞丁丑右正言李沐上殿乞罷右丞相趙汝愚政柄以尊安天位塞絶姦原是日汝愚乞罷政出浙江亭待罪詔中使宣押赴都堂治事沐又乞更不宣押是晚鎖院戊寅汝愚罷右丞相除觀文殿大學士知福州制詞略曰頃我家之多難賴碩輔之精忠持危定傾安社稷以為恱任忠竭節利國家無不為既隆翊戴之勳尚期啓沃之助力陳忱悃祈避煩言起居郎權直學士院鄭湜所草也湜坐無貶詞免直學士院未幾罷去講義曰父有天下傳歸於子此古今之常也後世人臣往往貪天之功以為己力非小人之尤者乎嘗聞哲廟之立本宣仁保佑之賜與諸大臣建請之功羣僉矯誣所以定策歸功蔡確而上謗宣仁下纍王圭遂為元祐大臣不可解之禍其往轍可鑒矣今我寧考纂承大統蓋慈福宫定計於內趙忠定諸臣翊贊於外托胄何人夤緣戚里蒙蔽朝廷既攘奪其功掩為己有且附會言章竄之於必死之地亦獨何心哉然則確與托胄其罪皆不可勝誅矣己卯雨土知樞密院事余端禮兼參知政事庚辰權兵部侍郎章穎與羣察上疏留趙汝愚也右正言李沐論其附下罔上繼與宫觀工部侍郎知臨安府徐誼亦坐上疏論救趙汝愚罷去御史中丞謝深甫殿中侍御史楊大法監察御史劉德秀劉三傑論汝愚冒居相位今其罷免不當加以書殿隆名帥藩重寄伏丐寢其福唐之命令以職名奉祠汝愚亦乞將前件新命盡賜罷免令臣姑守本官奉祠杜門省咎甲申有旨依所乞依舊觀文殿大學士提舉臨安府洞霄宫國子祭酒李祥國子博士楊簡復上疏留汝愚沐又劾之是月初內藏庫下淮東總領所取其羡財至是葉適言此錢當存留以備緩急請詔有司自今除每歲收支外並將樁管實在之數開具成册使朝廷通知有餘不足之數其非緣軍前事毋得趣支移起發欲以他用雖有中旨許執奏不行俟儲積果多朝廷經制既立然後議窠名之重輕考撥定之數目寬減州縣還以豫民從之三月丙戌朔日有食之庚寅太白經天辛亥詔四川歲發西兵赴行在如舊制癸丑命侍從臺諫兩省集議江南沿江諸州行鐵錢利害甲寅國子祭酒新除湖南轉運判官李祥國子博士楊簡罷坐留趙汝愚為右正言李沐所劾也夏四月丙辰朔丁巳太府寺丞吕祖儉上疏留趙汝愚併論朱熹彭龜年等不當逐語侵韓托胄戊午詔吕祖儉朋比罔上送韶州安置中書舍人鄧馹封還録黃己未知樞密院事兼參知政事余端禮為右丞相簽書樞密院事京鏜知樞密院事同知樞密院事鄭僑參知政事御史中丞謝深甫簽書樞密院事庚申詔中書舍人鄧馹以吕祖儉志在無君其罪當誅姑從竄斥以示寬容自合書行於是太學上舍生楊宏中周端朝張衟林仲麟蔣博徐範六人伏闕上書其略曰臣聞自古國家禍亂之由初非一道而小人傷君子其禍尤慘君子登庸杜絶邪枉要其處心實在於愛君憂國群小得志仇視正人必欲盡去其朋類然後可以肆行而無忌於是人主孤立而社稷危矣黨錮斃漢朋黨亂唐大率由此元祐以後邪正交攻卒成靖康之變我宋不競貽禍至今此臣子所不忍言陛下所不忍聞也臣竊見近者諫官李沐論前相趙汝愚所為乖戾隨即罷去若慮陛下父子之際懷不自安故黜汝愚以謝天下亦未為過如沐所言則亦為汝愚自居同姓數談夢兆專政擅權欺君植黨殆將不利於陛下以此加詆其實不然汝愚之去中外咨憤而以為父老歡呼蒙蔽天聽一至於此道路譁然以為李沐內結權幸隂有指授率爾肆言全無忌憚廟堂屏息不敢異議天下扼腕氣將奚伸其氣焰已足以熏灼朝路撼搖國勢陛下若不亟悟漸成孤立後雖悔之亦無及矣陛下獨不念去歲之事乎人情驚疑變在朝夕當是時假非汝愚出死力定大議使陛下得以成壽康皇帝揖遜之志行孝宗皇帝未舉之喪雖百李沐罔知攸濟當國家多難汝愚方位樞府本兵柄指揮操縱何向不可尚不於此時為利上下安妥乃有異意乎李沐輒以危言悚脅陛下巧於中傷君子立威取名情狀敗露願陛下鑒漢唐之禍懲靖康之變精加宸慮特奮睿斷念汝愚之忠勤灼李沐之回邪明示好惡精别淑慝竄李沐以謝天下庚申詔宏中等妄亂上書扇搖國是各送五百里外編管中書舍人鄧馹言仰惟國家開設學校教養士類德至渥也自建太學以來上書言事者無時無之纍朝仁聖相繼天覆海涵不加之罪甚者押歸本貫或他州聽讀而已紹興間有布衣俞古上書狂悖若以指斥之罪坐之誠不為過太上皇帝始者震怒降旨編管已而臣僚論奏竟從寬典陛下今日編管楊宏中等六名若以扇搖國是罪之則未若指斥乘輿之罪大以六輩言之則一夫為至寡聖明初政仁厚播聞睿斷過嚴人情震駭所有録黃臣未敢書行詔馹依已面諭書行未幾馹罷知泉州工部侍郎兼知臨安府錢象祖遣人逮捕諸生押送貶所宏中衟林中麟皆福州人端朝溫州人博信州人博久居學校忠鯁有聞同上諫書皆其屬藁右正言李沐除右諫議大夫監察御史劉德秀除右正言時知名之士罷斥相繼人情洶洶韓托胄患之侍御史楊大法右正言劉德秀乃乞降詔以國是尊君中道等事訓飭在廷有不如詔者重置典憲辛酉追封史浩為會稽郡王戊辰以火疫故出內帑錢為行在貧民醫藥棺斂費壬午復出內帑錢賜諸軍疾疫死者家五月戊子吕祖儉改送吉州安置丁酉命直學士院傅伯壽草詔如楊大法劉德秀之請伯壽自得之子自得乾道間以不受曽覿之招名聞四方至伯壽則奴事韓托胄隸人蘇師旦致身通顯其弟伯成非其所為每切責之至是伯壽始草詔以詆善類戊戌詔曰朕惟風俗者治忽之樞機士大夫者風俗之權輿昔周文武之隆在位皆節儉正直小大之臣咸懷忠良下至庶民無有淫朋比德今也不然懷背公死黨之心蔑尊君親上之義佞諛側媚以奉權強詭僻險傲以釣聲譽鼓唱橫議貪利逞私使毁譽是非混然淆亂於呼朕之所託顧乃如此自今至於後日灑濯厥衷存公去私可否從違各當於理則豫汝嘉其有不吉不迪習非怙終邦有常刑朕不敢貸丙午詔諸路提舉司置廣惠倉修胎養令辛亥降大理三衙臨安府雜犯死罪以下囚釋杖以下六月甲寅朔丁巳右正言劉德秀言邪正之辨無過於真與偽而已彼口道先王語而行如市人所不為在興王之所必斥也昔孝宗垂意規恢首務核實凡虛偽之徒言行相違者未嘗不深知其汙臣願陛下以孝宗為法詔下其章己未遣起居舍人汪義端賀金主生辰命中書復置臺諫官言事庚午詔三衙江上諸軍主帥將佐初除舉自代一人歲舉所知二人右正言劉德秀劾國子博士孫元卿太學博士袁燮國子正陳武皆罷去司業汪逵入劄子辨之德秀以為言逵亦罷於是善類為之一空矣韓托胄本武人志在招權納賄除不附己而已不能巧為説以網善類也先是熙寧間程皓程頤得孔孟千載不傳之學始以道學為天下倡二先生少學於汝南周敦頤其後學者翕然宗之其髙弟延平楊時河南尹焞遭遇靖康建炎紹興之間致位通顯建安胡安國學春秋於程頤而不及見以楊時謝良佐為師友紹興初秦檜為亞相引安國侍經席一時善類多聚於朝俄為吕頤浩朱勝非所逐趙鼎為相尹焞以布衣勸講經生學士多召用焉鼎既罷張俊獨相諫官陳公輔力排程氏學以為狂言怪語淫説鄙詞胡安國上疏辨之其後檜再入相復尚王金陵而程氏學廢矣楊時傳郡人羅從彥從彥傳之李侗侗傳之朱熹安國傳其子憲憲傳之廣漢張栻栻浚之子也乾淳間與朱熹相往來講切後以道學為己任學者號曰晦庵先生南軒先生東萊吕祖謙其同志也栻侍經筵不久而去熹屢召不起孝宗賢之王淮當國素不善熹尚書鄭丙始創為道學之目淮又擢陳賈為察官俾上疏言近日縉紳有所謂道學者大率假其名以濟其偽望明詔中外痛革此習熹遂得祠淳熙末熹除郎以足疾未拜而侍郎林栗劾其慢且詆道學之士以亂臣之首宜加禁絶栗雖罷去而士大夫譏謗道學之説迄不可解甚至以朋黨詆之而邪正莫能辨紹熙末趙汝愚當國遂起熹侍經筵而其學者益進學者仰之如泰山北斗而流俗醜正多不便之然猶未敢加以醜名攻詆至是士大夫嗜利亡恥或素為清議所擯者乃教以凡相與為異者皆道學人也隂疏姓名授之俾以次斥逐或又為言名道學則何罪當名曰偽學蓋謂貪黷放肆乃人真情其亷潔好修者皆偽也於是憸人險狠猥薄無行之徒利其説之便已攘袂奮臂以攻偽干進而學禁之禍自此始矣講義曰我朝自王安石以新經破舊説凡學校科舉之間皆以王氏之經從事士用新進國尊新法而天下自是多事矣孝宗皇帝崇尚伊洛之學一時明師大儒相繼而起張栻在湖朱熹在閩吕祖謙在浙皆推明是學以續孔孟正脈之傳天下學者翕然從之得其説者互以傳授凡巖谷草野之間皆出一轍學校科舉取人士大夫立身事君無不源流於是學之中涵養陶成士習醇美自小人用事摧靡道學而名之以偽海內之士瀾倒風從不惟禮義亷恥有所不顧而學士大夫之衣冠亦更變以趨時未幾異説橫興兵端驟起非朝廷決然鋤去大姦以復正學幾為東南不可解之禍師道不立其流弊乃在此哉曩者紹熙之前一時風俗之好尚為士者喜言時政為吏者喜立功名誠不能無所偏而執事懲之甚遂一舉而厭薄之稍自好者名以偽學欲自立者號以私黨於是世俗毁方為圎變真為佞而流風之弊有不可勝言者矣癸酉宜州觀察使兼樞密院都承旨韓托胄為保寧軍節度使提舉萬壽觀御史中丞何淡急欲執政秋七月丙申上疏論專門之學流而為偽空虛短拙文詐沽名請風厲學者專事孔孟毋得自相標榜丁酉詔榜朝堂淡始以留正薦自權兵部侍郎除右諫議大夫首擊周必大罷之未幾遷中執法一時名士排擊殆盡大為清議所薄會有本生繼母之喪徘徊不肯去太學生喬嚞等移書切責之其略曰閣下自長成均而更長臺諫此三綱五常之所係者也今聞閣下有所生繼母之喪初請於朝欲解官持服繼聞上疏稱解逮事不逮事之異中外鬨然雖愚者亦以為駭閣下所生之父果以繼室為正乎若以為正則閣下亦當從而為正不得黜之也今四十餘年以所生繼母事之及其終也反以為生不逮事而不持心喪可乎閣下之意必謂所生繼母無生我之恩則不當為所生之母抑不思黜其所生之繼母是賤其所生之父也必以生我者為正而繼之者為不正是閭巷小人知有母而不知有父者也非天理之公人倫之正也閣下為天子耳目之官將以厚人倫正風俗正宜致辨於此太常亦謂當申心制不得已乃去位既免喪時趙汝愚已執政止除煥章閣學士知明州淡愈怨恨祈哀韓托胄遂除淡御史中丞自是力主偽學之禁以至執政甲辰吏部郎官麋師旦建言請考核真偽未幾除左司貟外郎時有張貴謨者指論太極圗説之非何淡上言在朝之臣既熟知其邪正之迹然不敢白發以招報復之禍望明詔大臣去其所當去者於是以何淡疏落趙汝愚觀文殿大學士罷宫觀己亥太白晝見八月己巳詔內外諸軍主帥條析將佐士卒器械船艦可用與否及控扼防守之策聞九月壬午朔蠲臨安府水災貧民賦乙酉以久雨決繫囚甲辰遣中書舍人黃艾賀金主正旦己酉蠲台嚴湖州被災民丁絹冬十月壬子朔丁卯詔三省樞密院條上合教諸軍例乙丑升秀州為嘉興府舒州為安慶府嘉州為嘉定府英州為英德府戊辰金主遣吏部尚書吳鼎樞兵部郎中紇石烈介來賀瑞慶節壬申子恭為安定郡王十一月雨土庚寅皇弟徐國公抦為昭慶軍節度使戊戌加上壽皇隆慈備福光佑太皇太后尊號曰壽成惠慈皇太后太上皇帝尊號曰聖安壽仁太上皇帝太上皇后尊號曰壽仁太上皇后丙午監察御史胡紘奏趙汝愚唱引偽徒謀為不軌責授寧逺軍節度副使永州安置徐誼坐黨汝愚亦責團練副使南安軍安置中外震駭初上之在重華執喪也五日一朝於壽康既而久不得見至是紘因劾竄汝愚仍請以行遣汝愚之事奏之太上庶幾太上歡然盡釋前憾怡愈如初上從之朱熹時家居自以蒙纍朝知遇之恩且尚帶從臣職名義不容默草封事數萬言極陳姦邪蔽主之禍因以明汝愚之寃繕寫已具子弟諸生更進迭諫以為必且賈禍熹不聽門人蔡元定入諫請以蓍決之遇遁之同人熹默然取奏藁焚之因更號遁翁遂以疾丐休致癸未命宰執大閲諸軍十二月癸亥置楚州弩手效用丁丑金主遣刑部尚書赫舍哩正太常少卿王珩來賀明年正旦是月臣僚劄子廟朝乃洪化之地中書實王政之由正本澄源無先於此常程細故紛杳至前則朝廷之體不尊百司之務反廢今三省文書遍盈几閣百事庶府惟事依違日因月循細故毛舉中書之務何自而清丙辰慶元二年正月戊子雷庚寅右丞相余端禮為左丞相知樞密院事京鏜為右丞相鏜江西人淳熙中以檢正報謝虜廷因爭撤樂孝宗嘉之遂除侍從會趙汝愚自蜀召還上諭大臣除鏜四川帥汝愚聞之謂人曰鏜望輕資淺豈可當此方面由是兩人有隙汝愚得政鏜時為刑部尚書亟納交於韓托胄繼擢執政遂為托胄謀主至是遂有右相之除參知政事鄭僑知樞密院事簽書樞密院事謝深甫參知政事御史中丞何淡同知樞密院事庚子右正言劉德秀為右諫議大夫責授清逺軍節度副使趙汝愚卒於衡州汝愚既責零陵過衡陽已病又為守臣錢鍪所窘逐遂服藥而卒天下寃之時有迪功郎趙師召者上書乞斬汝愚事雖不行然韓托胄之黨以汝愚有定策功惟恐其復進故當時謂汝愚不死事固未可知也甲辰右諫議大夫劉德秀劾留正四大罪首論其招偽學以危社稷偽學之稱自此始詔落正觀文殿學士罷宫觀德秀江西人初自重慶守入朝不為時相留正所知以著作佐郎范仲黼正客也請為之地正曰此人若留之班行朝廷無安靜之理不得已下除大理寺簿德秀怨仲黼薦已不力併憾之韓托胄既除德秀監察御史遂為托胄鷹犬既劾正四大罪遂併仲黼罷之丁未裁定添差貟闕趙汝愚訃聞有旨復元官許歸葬二月辛亥朔省闈知舉葉翥倪思劉德秀奏論文弊上言偽學之魁以匹夫竊人主之柄鼓動天下故聞風未能丕變乞將語録之類並行除毁是科取士稍涉義理即見黜落六經語孟中庸大學之書為世大禁辛酉中書舍人吳宗旦繳趙汝愚復還元官之命從之辛未再蠲臨安府民身丁錢三年甲戌詔三省樞密院置省貟簿三月丙申命諸將射鐵簾己亥封皇弟抦為吳興郡王丙午有司上慶元會計録是月臣僚建言國子生貟多偽濫請自今職事官期親釐務官子孫乃得試補從之夏四月甲子左丞相余端禮罷壬申同知樞密院事何淡參知政事吏部尚書葉翥簽書樞密院事乙亥增置監察御史一貟五月辛巳以不雨禱於天地宗廟社稷詔大理三衙臨安府兩浙州縣決繫囚乙酉申嚴獄囚瘐死之罰辛卯御後殿賜禮部奏名進士鄒應龍等四百九十有九人及第出身進士第一人莫子純已受蔭補故命次名甲午減諸路和買拆帛錢三年名孝宗御集閣曰華文甲辰改慈福宫為壽慈宫六月命監司帥守臧否縣令分為三等乙丑度支郎中淮西總領張金言邇者偽學盛行賴陛下聖明罷斥姦回登用賢哲天下皆洗心滌慮不敢復為前日之習願明詔在位之臣上下一心堅守勿變毋使偽言偽行乘間以壞既定之規模乃除尚左郎中中書舍人汪義端引唐李林甫故事以偽學之黨皆名士皆根株斷除之一時號為君子無不斥逐太皇太后聞而非之甲戌御筆今後給舍臺諫不必更及舊事務在平正以稱朕意韓托胄及其黨皆怒遂令臺諫爭之於是左諫議大夫劉德秀監察御史姚愈張伯垓力爭之為不可乃改為不必專及舊事自是托胄與其黨攻治之志愈急矣丙子皇子㻐生秋七月德音降諸路死罪囚釋流以下戊子流人吕祖儉等量移內郡以皇子生故也初光宗即位召內侍陳源還自郴州貶所紹熙四年六月除內侍省押班時光宗已病不能時過宫源數離間上即位章穎為侍御史論其姦詔停源官送撫州居住慶元元年五月移處州至是皇子生源以恩許自便不得入國門給事中汪義端駮之乃移源婺州而義端亦出知鎮江府明年夏始聽自便云詔檢正都司考核諸路守臣便民五事取其近情合理者以聞己丑監察御史姚愈除殿中侍御史以附韓托胄爭御筆故也殿中侍御史黃黼除起居郎權兵部郎中御筆之出也黼獨贊聖德與同列異故奪言職未幾罷去庚寅詔諸路搜訪髙宗皇帝御製御筆戊戌清逺軍承宣使韓同卿為慶逺軍節度使韓托胄為開府儀同三司萬壽觀使八月癸丑奉安孝宗皇帝成穆皇后成恭皇后神御於景靈宫丙辰太常少卿胡紘言比年偽學猖獗圗為不軌近元惡殞命群邪屏迹而或者倡為調停之議取前日偽學之姦黨次第用之望宣諭宰執應偽學之黨曽經臺諫論列者權住進擬遂遷起居舍人壬戌皇子㻐薨追封兖王諡曰沖惠九月丁亥復分利州為東西路癸巳嗣濮王士歆薨追封韶王丁酉遣樞密院檢詳諸房文字張貴謨賀金主正旦冬十月戊申上御大慶殿發壽聖隆慈備福光佑太皇太后壽成惠慈皇太后聖安壽仁太上皇帝册寶遂帥群臣奉上於慈福壽康宫辛亥御文德殿册皇后壬戌金主遣吏部尚書張嗣工部侍郎石頓思來賀瑞慶節甲戌大閲諸軍十一月庚寅上詣壽康宫上太上皇帝寬恤詔令壬辰右丞相京鏜等上孝宗皇帝淳熙寬恤詔令癸卯賞宜州捕降洞寇功十二月戊申陳賈自知寧國府除兵部侍郎以賈淳熙未曽擊朱熹故也先是熹乞追還職名及改正過待制恩數繼又乞致仕其初奏略曰陛下即位之初臣以愚賤疏逺之蹤首蒙眷知召置講席正以庶官無由入侍禁闥故特假以侍從職名臣嘗再三懇辭曲蒙天慈加賜手札俾速祇受因進不敢力辭供職四旬屢得進講凡所開啓多蒙采納而臣蠢愚迫切便欲致君堯舜之上遂觸忌諱以煩譴訶皇慈過恩猶不加罪親御翰墨俾就退間旬日之間除書繼下所宜即日拜命奔走率職别圗後效以塞前愆而反覆思維前日之罪既以學力未充誠意不至無以仰稱明詔感悟天衷釁咎不容湔洗所有元借職名已是難復冒居豈敢更叨進擢之寵欲望追斷新舊職名俾以寄祿元官復奉鴻慶故宫列聖香火其第二奏略曰伏念臣本是庶官無他勞效元帶祕閣修撰已是兩朝過恩比者只緣聖意欲令講書遂使暫陪邇列未及兩月果以罪戾譴罷而歸所被誤恩理宜追奪其第三奏自劾議祧廟事略曰臣之凡愚素號山野入侍經幄僅及四旬意見闊疏言辭鄙拙固已自知不堪選用之意惟有中間輒議僖宗皇帝皇家始祖不當一旦并行祧毁且使太廟之祀止及八世降於天子九廟之禮尤非所宜獨蒙聖慈特賜宣問親奉玉音以謂僖祖之廟自不當遷至於再三不謂孤論難持竟亦無取退伏循省益愧心顔尚借寵榮許仍舊職非但有乖輿論亦恐上纍清朝其第四奏乞致仕略曰不意病勢危篤自知難戀聖朝依例合乞致仕又念見係庶官不敢專具奏牘遂申本貫依條陳乞恭奉聖旨未賜開允唯是區區本以鄉來入侍日淺自知未有毫髮報稱不當仍帶舊職出領祠官所以懇避再三即非過為沽激所有昨來陳乞致仕實緣病勢危迫方敢冒昧今雖茍延喘息終是不堪異日使令不敢更叨廩祿以速滿盈之咎其第五奏自劾妄議山陵事略曰去歲曽因集議永阜􅓖宫妄意輒陳管見欲乞少寬逺日改卜神臯庶妥威靈以延運祚今者伏覩進奏院凡前日小大之臣曽議此者皆已坐罪次第降黜而臣狂妄又嘗面奏其迹尤不可掩其罪尤不可赦但以所入文字不曽付外是以漏網未抵譴訶若遂隱匿不言更冒榮寵竊慮祇受之後公論不容未及終朝更煩褫奪顧微臣進退之義雖不足言而聖朝刑賞之中則為可惜伏望聖明奮發威斷付之司敗以肅邦刑庶免煩言重勞淵聽其第六奏略曰蓋臣本意止為已罷講官不敢復帶侍從職名而於其間三次奏狀乃因他事忘其前語此其所以屢瀆聖聰而曽不足以少回天意者也乞照臣去年申省及後來第一第二次辭免奏狀早賜施行熹之奏雖屢上朝廷未之許也而臺諫洶洶爭欲以熹為奇貨門人楊楫聞鄉曲射利者多撰造事迹以投合言者亟以書告熹熹報曰死生禍福久已置之度外不煩過慮然群憸相顧久之不敢獨發監察御史胡紘草疏將上會遷去不果沈繼祖者為小官時嘗採摘熹語孟之説以自售至是以追論程頤得為監察御史紘以藁授之繼祖鋭於進取謂可立致富貴遂奏熹剽竊張載程皓之餘論寓以喫菜事魔之妖術以簧鼓後進張浮駕誕私立品題收召四方無行義之徒以益其黨伍相與餐粗食淡衣褒帶博或會徒於廣信鵝湖之寺或呈身於長沙敬簡之堂潛形匿迹如鬼如魅及不忠不孝不仁不義不公不亷等十罪乞褫職罷祠其徒蔡元定佐熹為妖乞送别州編管講義曰治平以前臺諫之所彈擊出於議論之公熙寧以後臺諫之所彈擊出於觀望之私王吕用事其所惡者蘇軾孔文仲也故李定景溫為之鷹犬章蔡弄權其所惡者元祐諸君子也故張商英來之邵為之鷹犬秦檜賣國其所惡者嶽飛張浚也故方俟卨何若為之鷹犬今托胄擅命其所惡者非道學之名儒乎而李沐沈繼祖輩之所彈劾一則曰偽學二則曰偽黨疑托胄鷹犬耶紘初為進奏院未為人所知趙汝愚時奪職居餘干韓托胄意未快會有薦紘可備鷹犬者甫及一歲纍遷至監察御史汝愚有零陵之命用紘章疏也時托胄欲論朱熹無敢先發者紘毅然任責物色無所得經年醖釀章疏乃成會建方喪之議遷太常少卿紘遂以藁授沈繼祖辛未詔落熹祕閣修撰罷宫觀蔡元定編管道州金主遣兵部尚書完顔崇道太常少卿巨棟來賀明年正旦丁巳慶元三年春正月乙亥朔壬寅知樞密院事鄭僑罷癸卯參知政事謝深甫兼知樞密院事是月行遣朱熹蔡元定省劄始至熹方與諸生講論有以小報來言者熹略起視之復坐講論如初詞色更為和平翌旦諸生乃知其有指揮時郡縣捕元定甚急元定色不為變毅然上道熹與諸所遊從百餘人送别蕭寺坐客感歎有泣下者熹微視元定不異平時因曰朋友相愛之情季通不挫之志可謂兩得之矣又曰季通之行無幾微不適意丘子服獨為之涕泣流連而不能已處事變恤窮交亦兩得其道也初元定師事熹而熹顧曰季通吾老友也凡性與天道之妙它弟子不得聞者必與元定商確之嘗輯其講論之辭曰翁季録者蓋引以自匹也嘗曰造化微妙唯深於理者能識之吾與季通言而未嘗厭也及其貶也恨無可與語其殁也祭之以精詣之識卓絶之才不可屈之志不可窮之辨不復可得而見蓋深致其哀熹嘗論中庸已發未發之旨以為人自嬰兒至老死雖語默動靜之不同然大體莫非已發元定不以為是獨引程氏説以為敬而無失便是喜怒哀樂未發謂之中後十年熹再與元定辨論始終其説而悉反之由是益奇元定每諸生請疑必令先質之元定而後為之折衷同門寡二以故小人深嫉之故是時有朱熹倡偽蔡元定實羽翼之之奏也明年元定卒於道州二月己酉右丞相京鏜等上神宗皇帝玉牒髙宗皇帝實録丁巳大理司直邵褎然請明詔大臣自今權臣之黨偽學之徒不得除在內差遣詔下其章戊午詔諸軍升差主帥選擇總領或屯駐軍州守臣審核上於樞密院丙寅詔以昭慶軍承宣使內治省押班王德謙為節度使臺諫交章論列宰相京鏜亦言其不可遂罷辛未刑部侍郎直學士院吳宗旦坐交結王德謙為之草制奪三官癸酉送南康軍居住三月癸巳復禁銅器民間舊有者限兩月赴官投賣每兩以三十錢酬之民間多不盡輸遂命再限兩月不復酬以錢違者許人告湖州舊鬻鏡行於天下至是官自鑄之乙未建東華門丙申王德謙奪三官撫州安置庚子禁浙西州軍圍田壬寅詔自今有司奏讞死罪不當者論如律夏四月丙午雨土以不􅀈為嗣濮王壬子以旱禱於天地宗廟社稷乙丑雨雹六月癸卯朔言者論三十年來偽學顯行場屋之權盡歸其黨所謂狀元省元與兩優釋褐若非其私徒即是其親故望詔大臣審察其所學而後除授宣教郎錢文子以太學兩優釋褐一任回當召徑就部注潭州醴陵知縣而去時人稱之戊辰頒淳熙紹熙寬恤詔令閏六月甲戌內出銅器付尚書省毁之遂命申嚴私鑄銅器之禁乙亥遣起居舍人衛涇賀金主生辰戊寅朝散大夫劉三傑免喪入見論偽學之黨變為逆黨防之不可不至及論留正共引偽學之罪韓托胄大喜即日見旨劉三傑除右正言甲午留正分司西京送邵州居住廣東提舉茶鹽胡安國遣人入大奚山捕私鹽島民遂聚衆作亂秋七月庚午監察御史沈繼祖録淹囚四百餘條來上詔進二官八月戊子復置嚴州神泉監辛卯知廣州錢之望遣兵入大奚山執島民盡殺之甲午均諸路職田九月壬寅以四川旱詔制置總領諸司蠲放民賦辛酉遣户部郎官曽炎賀金主正旦乙丑申嚴帥臣監司臧否郡守之制詔監司帥守薦舉改官明答以偽學之人仍結朝典罪丁卯言者論偽學之禍望申飭大臣鑒元祐調亭之説杜其根源是秋當大比漕司前期取家狀必欲書委不是偽學五字於後時有柴中行者為撫州推官獨移文漕司稱自幼習易讀程氏易傳未委是與不是為學如以為偽不願考校士論壯之冬十月癸酉雷丙戌金主遣户部尚書完顔愈吏部郎中張汝方來賀瑞慶節丙申以壽聖隆慈備福光祐太皇太后違豫赦天下十一月辛丑上孝宗哲文神武成孝皇帝徽號曰孝宗紹統同道冠德昭功哲文神武明聖成孝皇帝是日太皇太后崩於慈福宫后姓吳氏讀書萬卷翰墨尤絶人髙宗由是寵遇紹興十三年正位宫壼光宗即位后當為太皇太后以壽皇故乃更號壽聖皇太后紹熙五年后年八十有二行慶壽之禮孝宗廟始正位號云壬寅朝獻景靈宫癸卯朝享太廟甲辰祀天地於圜丘赦天下上將行大禮而內府無圭乃下國子監借文宣王玉圭用之蓋紹興十四年國學初建時所錫鎮圭也乙巳詔為大行太皇太后服期丁未大理少卿趙介為金國告哀使閣門舍人朱龜年副之壬子車駕自慈福宫還大內十二月丙子始御正殿丁丑以大行太皇太后􅓖宫蠲紹興府明年身丁錢折帛綿絹庚辰罷文武官納官告綾紙錢甲申雨土乙未金主遣禮部尚書奧屯忠工部郎中薛愈來賀明年正旦丁酉知綿州王沇乞置偽學之籍仍自今曽受偽學舉薦關升及刑法亷吏自代之人並令省部籍記姓名與間慢差遣吏部侍郎黃由奏人主不可待天下以黨與不必置籍以示不廣殿中侍御史張岩論由阿附權臣植立黨與由遂罷去未幾擢沇利路轉運判官戊午慶元四年春正月己亥朔初韓托胄妻早死有四妾皆得郡封所謂四夫人也其次又十人亦有名位去歲秋冬之間有獻北珠冠四枚者托胄喜以遺四夫人其十人皆愠曰等人耳我輩不堪戴耶托胄患之趙師􅋷時以列卿守臨安微聞其事亟出十萬緡市北珠甚急辛亥托胄入朝未歸京尹忽遣人致遺啓之十珠冠也十人者大喜分持以去托胄歸左右以告托胄未及有言十人者咸來致謝遂己壬子都市行燈群婢皆頂珠冠而出癸丑語托胄曰我曹夜來過朝天門都人聚觀真是喝采郡王奈何不與趙大卿轉官邪翌日又言之於是有工部侍郎之命托胄嘗與衆客飲南園過山莊指其竹籬茅舍曰此真田舍間氣象所惜者欠雞鳴犬吠耳少焉有犬嗥於叢薄之下亟遣視之京尹趙侍郎也托胄大笑其後師􅋷坐他事罷官諸生為詩誚之有也曽學犬吠山莊之句即指此也乙卯上欽宗皇后諡曰仁懷皇后丙寅簽書樞密院事葉翥同知樞密院事丁卯以兩浙江淮荆湖四川民流詔有司舉行寬恤之政二月辛未詔兩省侍從臺諫各舉所知一二人毋舉宰執子弟親黨丙子上大行太皇太后諡曰憲聖慈烈皇后三月甲子憲聖慈烈皇后攢於永思陵乙丑趣修髙宗皇帝實録金主遣兵部尚書烏林答天益户部郎中賈楓剛來弔祭是月臣僚劄子恭聞詔旨已擇今月十一日開講望陛下遵用仁宗髙宗故事令侍講之臣仰稽三朝寶訓如李淑所舉外治數條詳悉講明以備觀覽凡武備之事何者為先軍旅之制何者為重邊圉治守孰為要害夷狄情偽孰為要領考古驗今或有至計商略而施行之足以為思患預防之策上從之夏四月丙戌祔仁懷皇后憲聖慈烈皇后神主於太廟己丑降德音於臨安府紹興府蠲其賦租稅有差丙申始御正殿是月右諫議大夫張釜請下詔禁偽學姚愈亦上言近世行險僥幸之徒倡為道學之名權臣力主其説結為死黨願下明詔播告天下司農少卿湯碩為金主報謝使右驍衛中郎將李汝翼副之五月己亥開府儀同三司韓托胄為少傅賜玉帶己酉詔曰向者權臣擅朝偽邪朋附叶肆姦宄包藏禍心賴天之靈宗廟之福朕獲承慈訓膺受內禪隂謀壞散國勢復安嘉與士大夫厲精更始凡曰淫朋比德幾其自新而歷載臻兹弗迪厥化締交合盟窺伺間隙毁譽旁午流言間發以傾國是而惑衆心甚至竊附於元祐之衆賢而不思實類乎紹聖之姦黨國家秉德康寧不汝瑕殄今惟自作弗靖意者漸於流俗之失弗可復反歟將狃於國之寬恩而罰有弗及歟何其未能洗濯以稱朕意也朕既深詔二三大臣與夫侍從言議之官益維持正論以明示天下矣諭告所抵宜各改視回聽毋復借疑似之説以惑亂世俗若其遂非不悟怙終不悛邦有常刑必罰無赦布告天下毋忽初姚愈上此奏韓托胄大善之遂命直學士院兼中書舍人髙文虎草詔焉未幾愈遷兵部尚書御史中丞六月己巳遣中書門下省檢正諸房公事楊王休賀金主生辰癸酉皇弟吳興郡王抦為開府儀同三司秋七月己未都大川秦茶馬丁逢入見極論元祐建中調停之害且引蘇轍任伯雨之言為證時薛叔似葉適坐趙汝愚黨久斥皆起家為郡故逢有是言宰執京鏜何淡大然之翌日遂除軍器監辛酉同知樞密院事葉翥罷八月丁卯以久雨決繫囚丙子謝深甫知樞密院事兼參知政事吏部尚書許及之同知樞密院事初及之與薛叔似同擢諫官皆為善類所豫黨事既起叔似纍斥逐及之乃遷給事中吏部尚書既而踰二年不遷乃間見韓托胄序其知豫之意及衰遲之狀不覺涕零繼以屈膝托胄惻然語之曰尚書才望簡在上心行且進拜矣不數日遂有是除托胄嘗值生辰羣公上壽既畢集矣及之適後至閽人掩關拒之及之大窘會門閘未及閉遂俯僂而入當時有由竇尚書屈膝執政之語傳以為笑庚辰白氣亘天丙戌詔以太上皇帝聖躬清寧率羣臣上壽尋不克行九月壬寅太白晝見癸卯太白經天丁未宰執京鏜等上慶元重修敕令格式申明詔頒天下先是復編修敕令所置提舉同提舉官遂移牒六曹大理寺及三衙江浙近便州郡監司抄録乾道五年至慶元二年終續降指揮得數萬事參酌淳熙舊法送刑部審詳訖為書總七百二册至是進呈紹興重修敕令格式者髙宗建炎四年范宗尹為相乃奏命有司以嘉祐政和敕對修成書其後乾道淳熙慶元之際率十餘歲一修然大概以紹興重修敕令格式為凖庚申遣户部郎中曽炎賀金主正旦是月詔造新歷先是太史言月食於晝而草澤言月食於夜詔祕書監楊子美測驗如草澤言有旨改作仍命祕書省正字馮履常參定冬十月戊子金主遣吏部尚書孫鐸客省使尼瑪哈忠來賀瑞慶節十二月丙戌再蠲臨安府民身丁錢三年己丑金主遣太常少卿楊庭筠户部郎中富珠哩子充來賀明年正旦是歲用髙宗故事取燕王官希字行之子與願鞠之宫中己未慶元五年春正月癸巳朔庚子樞密院事省官蔡璉告趙汝愚定策時有異謀詔彭龜年追三官勒停曽三聘追兩官蔡璉補進義副尉初汝愚定策時璉從旁竊聽欲行漏泄汝愚覺而囚之上即位遂從輕決配去冬竄歸輦下用事者聞之以為奇貨乃使璉排日供具誣汝愚事凡賔客所言共七十餘紙文書既就乃議送大理時韓托胄之黨欲捕龜年三聘及徐誼沈有開葉適項安世等送棘寺中書舍人范仲藝草駮奏袖録黃見托胄語之曰公今日得君凡所施為當一以魏公為法章蔡之權非不盛至今得罪清議者以同文之獄故爾托胄曰某初無此心以諸公見迫不容但已問其人乃知京鏜劉德秀實主其事托胄取録黃藏之事遂格既而諫官張釜陳自強御史劉三傑張岩陳松連疏有請詔以纍經赦宥遂有是命鏜德秀在托胄之門最為凶險托胄未顯時惟二人與之深交及用事所為暴悖皆二人教之先是有果州州學教授王莘者考昌州春試於尚書斷章出題至是尚書省奏罷莘時本路漕臣汪德輔故相伯彥之孫太府卿召嗣之子也議者謂德輔以祖任入官故擇考官不善言者因請自今漕臣不由科第進者更委他監司一貟選官校試仍擇有文學士望者一人為點檢官專掌命題去取之事從之仍自嘉泰元年始壬戌建玉堂二月庚午雪癸酉白氣亘天甲申詔王德謙吳宗旦自今不以赦移乙酉諫議大夫張釡劾劉光祖附私偽學及佐逆不成蓄憤懷姦欺世慢上五罪詔光祖落職房州居住光祖撰涪城學記有世方以道為偽而以學為棄物夫好惡出於一時是非定於萬世學者盍謹所先入以待豪傑之興之語故有是禍三月甲午罷監司臧否郡守之制淳熙中孝宗始嚴監司臧否郡守之令行之十餘年其後士大夫往往以人情之厚薄為臧否論者頗患其不公去年十一月新知漢陽軍蔣用之朝辭上疏稍論其偽朝廷是之至是右正言陳自強復以為言於是臧否遂罷四月戊子以竄逐王德謙本末付史館辛巳監都進奏院鄧友龍請明詔大臣用捨從違謹所決擇友龍尋除監察御史舊制初改官人必作令謂之須入孝宗在位待之甚嚴慶元初復詔除殿試上三名南省元外並作邑至是用監察御史程松言詔大理評事已改官未歷縣人並令親民一次著為令舊捕盜改官人並試邑正言陳自強又請初任未終之人先注簽判一任方許親民從之自後雖宰相子殿試甲科人無有不宰邑者矣五月壬辰朔新歷成賜名統天而知歷者謂統天新歷尤復疏謬戊戌御集英殿賜禮部奏名進士曽從龍等四百十有二人及第出身舊例廷試舉人至暮者許賜燭然殿深易黑日昃則殿上燭出矣是歲上初策進士江西正奏名黃實嚴州特奏名皇甫鎾納卷最後鄞州特奏名劉嘉猷賜燭至一更四點御藥院言故事賜燭正奏名降一甲如在第五甲降充末名特奏名降一等如在第五等與攝助教詔如故事世傳張九成嘗扣殿陛賜燭納卷最後上取其策觀之歎其鯁亮遂擢為榜首其實不然戊申以久雨民多疾苦命臨安府賑恤之壬子詔諸路州學置武士齋舍選官按其武藝後不克行六月癸亥遣司農少卿李大性賀金主生辰太常寺奏遺失皇后金寶册己丑命大理寺治之既而廟之衛卒赴有司自言坐獄死蓋故事册寶以中人領及盜去鑿而售之中乃鐵胎也繇是事敗自後朝廷益謹其事月以察官禮官中官各一貟檢視謂之點寶云秋七月己亥賜李彥穎諡曰忠文甲寅禁髙麗日本商人博易銅錢八月癸亥白氣亘天辛巳太廟夾室柱生芝上率群臣詣壽康宫上壽始得見太上皇帝成禮而還上之受禪也趙汝愚乞以祕書省為泰安宫已而不果乃以慈懿皇后外第為之既而上皇不欲遷因以舊福寧殿為壽康宫而更建福寧殿上之在重華執喪也五日一朝於壽康時上皇聖體未平猶不得見去年八月詔恭聞上皇聖躬悉已清復將率群臣詣宫上壽既而不克行至是以重明節前十日初詣壽康宫進香初上之未見壽康也御史胡紘因劾趙汝愚請以行遣汝愚之事奏之太上庶幾太上歡然盡釋前憾怡愈如初汝愚遂有永州之貶及是過宫禮成壬午丞相京鏜率百官赴太廟觀芝甲申以過宫上壽禮成百官監司郡守上表稱賀丙戌德音降諸路流以下囚釋杖以下推恩如慶壽故事丁亥丞相京鏜等進官一等戊子立沿邊諸州武舉取士法九月庚寅朔少傅韓托胄為少師封平原郡王壬辰保信軍承宣使李孝純為保大軍節度使昭信軍承宣使李孝友為奉寧軍節度使保順軍節度使謝淵為太尉冬十月庚申朔郭師禹進封廣陵郡王丙子金主遣兵部尚書僕散琦吏部郎中張汝猷來賀瑞慶節詔金主使見辭令韓托胄隨班侍立右諫議大夫陳自強上緊要政目三十事已而翰林學士髙文虎又以二十事上之十一月己丑朔詔復右司一貟丙辰遣將作監馬覺賀金主正旦十二月辛酉嗣濮王不袪薨庚午命廣東水土惡弱諸州建安仁宅惠濟倉庫給士大夫之死而不能歸者乙亥奉安仁懷皇后憲聖慈烈皇后神御於景靈宫甲申金主遣户部尚書范揖四方館使蒲察守純來賀明年正旦是月移內侍王德謙於汀州信饒江撫嚴衢台州建昌興國軍及廣東諸州大水賑之初金人既為蒙國所侵冀之北土遂失乃於洮州置場買馬自是馬至秦州者差罕云庚申慶元六年春正月戊子朔己亥皇子坦生二月戊辰德音降諸路雜犯死罪以下囚釋徒以下己巳雨土戊寅右丞相京鏜等上聖安壽仁太上皇帝玉牒聖政日歷會要己卯上率羣臣恭上於壽康宫甲申封婕妤楊氏為貴妃乙酉雪閏二月庚寅右丞相京鏜為左丞相知樞密院事兼參知政事謝深甫為右丞相同知樞密院事何淡知樞密院事兼參知政事乙巳復留正少保觀文殿大學士致仕丁未雨土辛亥殿前副都指揮使吳曦為昭信軍節度使三月己未朱熹寢疾諸生惟葉賀孫蔡沈九人在側沈元定之子也辛酉改大學誠意章此為熹絶筆甲子卒於正寢是日大風拔木洪水崩山諸生近者奔赴逺者為位而哭蔡沈主喪役黃幹主喪禮辛未車駕從壽成惠慈皇太后幸聚景園己卯安定郡王子恭薨詔自今嗣濮王以屬近行尊長無過犯疾病者為之夏四月己酉不璺為嗣濮王五月丙辰以旱決中外繫囚除茶鹽賞錢有司上慶元寬恤詔令役法撮要癸亥避殿減膳置寬恤局丙寅詔大理三衙臨安府及諸路闕雨州縣釋杖以下囚戊辰詔侍從臺諫兩省卿監郎官館職疏陳闕失及當今急務辛未詔曰朕寅奉慈訓猥以眇身託於士民之上夙夜栗栗不遑康寧惟德菲薄暗於大道下不能治育羣生上以干隂陽之和乃夏序適中越月不雨大田既坼嘉穀將稿元元何辜咎實在朕意者政事有所虧刑法失其當歟賦役繁重而蒸庶之失業者衆歟不然何致沴之深也邪朕即祚以來荷天右序頻歲中熟民僅小康儲瀦未裕儻遇飢歉將奚以相恤夫德之不修既召譴告又不深迹厥繇力圗消弭其謂百姓何已詔在位陳朕過失與時政之繆又惟部使者守令朕所賴以協宣德澤者也今或務行苛細縱長吏姦獄訟不平寃者無所赴訴所以傷害和氣咎抑甚焉繼自今其悉意畢心亟為民慮凡弊蠧可除便利可興者條具來上朕將親覽擇其至當而推行之布告中外使咸知朕恐懼修省之意壬子雨丁丑詔三省樞密院擇臣僚封事可行者以聞六月乙酉朔日有食之丁亥以壽仁太上皇后違豫赦天下戊子壽仁太上皇后崩治喪於慈儀殿壬辰遣户部郎中趙善義賀金主生辰都宫郎中吳旴為金主告哀使閣門舍人林可大副之戊申同知樞密院事許及之以母喪去位秋七月己未初御後殿丁卯御史中丞陳自強簽書樞密院事八月庚寅以聖安壽仁太上皇帝違豫赦天下辛卯聖安壽仁太上皇帝崩於壽康宫壽年五十四孝宗之喪趙汝愚當國欲令羣臣服白涼衫皂帶以治事逮終喪乃止論者以為是及光宗之喪禮部侍郎陳宗召復請百官以日易月禫祭畢服紫衫皂帶以治事從之甲午右司郎中李寅仲為金主告哀使左衛郎將張良顯副之乙未日中有黑子丙申上大行太上皇后諡曰慈懿皇后丁酉左丞相京鏜薨賜諡文穆既而其子沆請避家諱改文忠言者以為楊億巨儒既諡曰文議者欲加一忠字竟不之與夫欲加一字猶且不可况諡以二字又欲極美乎望敕攸司自今諡議務當其實其或不然當推古法以選舉不實論若定諡已下其子孫請再更易者以違制論從之壬寅皇子坦薨追封邠王諡曰沖溫癸卯慈懿皇后權􅓖於臨安府南山之修吉寺是年六月撥封樁庫錢一百萬緡修奉太上皇后攢宫七月撥錢二十萬緡入內藏八月撥錢十五萬緡并銀二萬兩充秋季供奉太皇太后使用又撥金二千五百兩銀二萬兩充明堂使用又撥二百萬緡修奉太上皇帝攢宫初孝宗創封樁庫其法非奉親非軍需不支至是一季之間所撥金銀錢計直二百五十萬緡蓋多非泛支用故爾九月乙卯祔慈懿皇后神主於太廟己未雷甲子婺州進士吕祖泰投匭上書略曰道與學自古所恃以為國也丞相汝愚今之有大勳勞者也立偽學之禁逐汝愚之黨是將空陛下之國而陛下不悟耶陳自強何人也徒以托胄童孺之師而躐致禁從陛下舊學之臣若龜年等今安在哉蘇師旦平江之胥吏周筠韓氏之厮役人盡知之今師旦以潛邸隨龍周筠以皇后親屬俱至大官不知陛下在潛邸時果識所謂蘇師旦者乎椒房之親果有厮役之周筠者乎其自尊大而卑陵朝廷一至於此也願陛下亟誅托胄及蘇師旦周筠及罷逐陳自強之徒故大臣在者獨周必大可用宜以代其任不然事將不測書出中外大駭托胄雖甚怒恐違人心會方行明堂禮故未及問己巳命右丞相謝深甫朝獻景靈宫庚午命嗣濮王不儔朝享太廟先是紹熙五年明堂孝宗求卒哭時趙汝愚為政始奏遣汝愚朝獻景靈宫嗣秀王伯圭朝享太廟而上獨祀明堂是年上執光宗之喪甫踰月而當行大禮乃命右丞相謝深甫欵天興之祠嗣濮王不儔攝宗廟之祭蓋用紹熙禮云辛未合祭天地於明堂赦天下丙子吏部郎中丁常任為金主遺留國信使左驍衛郎將郭倓副之有旨吕祖泰挾私上書語言狂妄送連州拘管於是右諫議大夫程松殿中侍御史陳讜皆言祖泰有當誅之罪今縱不殺猶宜杖脊黥面竄之逺方是日得旨令臨安府從杖一百免刺面配欽州牢城祖泰字泰然元祐户部尚書公儒之五世孫也寓居無錫縣性疏達尚氣義既得罪士大夫勞之者無悔色韓托胄猶憐之祖泰始自分必死獨冀以身悟朝廷就道無懼色京尹趙善堅受托胄計為好語誘之曰誰教汝亦有共為章者乎汝第言之吾且寬汝祖泰笑曰何問之愚也吾固自知必死而可受教於人且與人議乎善堅曰汝病風喪心邪祖泰曰以吾觀若今之附韓氏得美官者乃病風喪心耳廷中聞之悚然有歎息者講義曰言路之通塞不特係於人君之用否而尤係於貴臣之好惡茍貴臣無隱蔽之私無􅎱忌之情則誰不揚眉吐氣願為吾君告哉故趙髙用事於中則鹿馬肆欺於朝李林甫內懷意忌則立仗下者皆不鳴之馬事勢然也嗟夫人患不能言耳茍能宣之莫或壅之則無一言不聞於上矣天門九關極其幽險猛虎當之而踞使天下屏息而處重足而立則懷抱何以展布才猷何以自見哉今慶元間貴戚縱橫羣憸根據吕祖泰以布衣之賤慷慨敢言此祖宗涵養士氣之餘澤也為權臣者固當惕然自省奉身而退庶可以保全首領而死於牖下矣不知出此顧且嚴刑峻法加之踈賤之布衣將欲箝議者之口他日東市之誅安能逃乎時有太學生於齋生題名中削去何淡名字以其嘗排道學也淡時已顯大怒於是京尹因其出使不逞者與之鬨遂捕治之太學生敖陶孫者為詩以弔趙汝愚而托胄未得其名俾其人併承之辭不伏乃移送大理劾其事掠治無完膚獄竟不就猶坐不應削淡名送嶺南編管陶孫詩云左手旋乾右轉坤諸公相顧尚流言狼胡跋疐傷姬旦漁父沈淪弔屈原一死固知公所欠孤忠賴有史長存九原若遇韓忠獻休説如今幾世孫陶孫福州人後數年登進士第云臣僚奏比年以來浸成內重之弊顧戀周行視民事為浼已久貪朝績謂州縣為徒勞况祖宗成憲改秩者必宰邑典郡者方除郎即寺監之既更則出守千里之地郎官卿監之已歷必出分一道之節此不易之良法日往月邁莫克遵守臣恐內重外輕其弊難革欲望聖慈俾中外之官更出迭入以均其任興起治功實非小補冬十月丙戌少師韓托胄為太傅戊子遣右司郎中朱致知賀金主正旦辛丑雨土癸卯以趙善義奉使生事罷之是月臣僚上言六月乙酉之朔太陽方升中有黑子况雷電大震於初冬之月赤氣發於暮夜之時地震間亦不安風霾時乎四塞今朝廷毋乃猶有忠邪並進偽得亂真歟乃猶有膏澤不流田里默歎歟毋乃猶有利之未興害之未除爵賞之施或傷公道而害政者歟十一月癸丑朔宗室與願更名除福州觀察使改名曮令資善堂授書己未皇后韓氏崩諡曰恭淑權􅓖於南山之廣教寺癸亥皇子增生丙寅上大行太上皇帝諡曰憲仁聖哲慈孝皇帝廟號光宗東北地震辛卯雨土十二月癸未朔皇子增薨追封郢王諡沖美乙酉日中有黑子辛卯權􅓖光宗於永崇陵癸卯祔光宗於太廟太廟自仁宗以來皆祀七世崇寧初蔡京秉政始取王肅説謂二祧在七世之外乃建九廟奉翼祖宣祖咸歸本室焉然王莽已營九廟唐明皇又用之非始於蔡京也紹興中徽宗祔廟以與哲宗同為一世故無所祧及升祔欽宗始祧翼祖髙宗欽宗同為一世亦不祧由是淳熙末年太廟祀九世十二室及阜陵復上趙汝愚為相遂祧僖宣二祖而祔孝宗時朱熹在經筵獨以九廟為正汝愚不從熹之議遂格及光宗祔廟復不祧今又祀九世矣詔改明年元上繼統趙汝愚為相鋭意慶歷元祐故事故改慶元盡六年而上皇及太后繼崩中宫去世二皇子不育朝廷嫌之因改明年為嘉泰云乙巳日中黑子滅降德音於臨安紹興府民緣􅓖宫役者蠲其賦戊申金主遣殿前左副都點檢紇石烈忠定太常少卿李愈來賀明年正旦己酉吳曦為太尉庚戌祔恭淑皇后神主於太廟是冬四川總領所增關外四川營田租詔以邊民不便罷之是歲建寧府徽嚴衢婺饒信南劒州水建寧府常潤楊楚通泰和州江隂軍旱賑之宋史全文卷二十九上欽定四庫全書宋史全文卷二十九下宋寧宗二辛酉嘉泰元年春正月戊午申嚴福建科鹽之禁壬戌謝深甫等薦士三十有五人詔集記中書以待選擇丁卯禁路鈐按閲受餽及招軍違者置諸法戊辰雪庚午以葛邲配享九宗廟庭賜諡文定乙亥雪二月戊子詔諸州訪求明歷之士壬辰開資善堂左司郎中閭丘泳為金主報謝使右屯衛將軍李言副之泳尋不行以起居舍人俞烈代之癸巳監察御史施康年奏少傅觀文殿大學士致仕益國公周必大首倡偽徒私植黨與又言偽學之徒餘孽未能盡革願於聽言用人之際防微杜漸制以周必大降充少保依舊職致仕先是吕祖泰上書既配欽州至是監察御史林寀亦言偽習之成造端自必大宜加絀削故有是命自朱熹獲罪黨禁益譁稍稱善類斥逐無遺至薦舉考校皆為厲禁姦貪狼藉暴慢恣肆之流紛紛並起填塞要塗士知務修飭守亷隅者例取姍侮或及於禍一時從遊特立不顧者屏伏丘壑依阿巽懦者更名他師過門不入甚至變易衣冠狎遊市肆以自别其非黨熹講道於竹林精舍不為輟時多勸熹以謝絶生徒儉德避難者熹笑而不答與學者黃幹書曰前此嘗患來學之徒真偽難辨今却得朝廷如此大開爐鞴煅煉一番一等混淆夾雜之流不須大段比磨勘辨而自無所遁其情矣先是有新某州教授余嚞者上書正府乞斬熹右丞相謝深甫語人曰彼何罪暨熹既殁言者猶不能已蓋托胄用事以來一等小人知素不齒於名教懼一旦善類復用而已斥於是橫身以任其責京鏜何淡劉德秀胡紘四人實專主偽學之禁為韓托胄斥逐異己者羣小附之牢不可破天下目此四人為魁憸云修光宗皇帝實録乙未續修吏部七司法辛丑雨土言者請四川制置司遇類省試年分倣禮部附試學官許有出身人具所業赴制置司陳乞委有出身通判或教授看詳蜀人試教官自此始三月丙寅雨雹戊辰復雨雹頒慶元寬恤詔令役法撮要己巳雨雹戊寅臨安府大火是春和州防禦使薑特立為寧逺軍節度使夏四月辛巳火乃滅詔兩浙轉運司臨安府上所焚民居之數於朝厚加賑恤死者給錢瘞之右丞相謝深甫等以輔政無狀致天譴請罷不許壬午詔曰朕以眇躬獲奉宗廟不明不敏無以上承天心下育萬姓乃者釁咎之延閔凶洊集嬛嬛在疚夙夜震皇今者謫見天地京城大火百萬生聚顛踣號呼無所歸命夫天生蒸民付豫司牧顧朕德薄言動差失刑政繆盩赫然威怒宜譴朕躬元元何辜害至此極朕方戰栗齋勑哀籲於上帝二三大臣視吾百姓艱厄有可以全活之者公上之須廩庾之積捐以與民一無所愛庶幾安集慰朕慘怛之意詔樞密院核禁衛班直及諸軍營柵遭焚之數來上癸巳避殿減膳甲申命臨安府守臣察姦民縱火者以軍法治之內出錢十六萬三千餘緡米六萬五千餘石賑給焚毁死亡之家辛卯四川制置司言龍州蕃部冦邊遣官軍討之詔曰風俗侈靡日甚一日服食器用無復等威今被焚之餘其令官民營造屋室一遵制度務從簡朴銷金鋪翠無得服用今以宫中所有焚之通衢中外士庶令有司嚴立禁防貴近之家尤當遵奉苟違斯令必罰無赦丁酉御殿復膳戊戌以潛邸為開元宫丙午詔文武臣毋得授寓居州任上務官著為令五月戊辰以旱禱於天地宗廟社稷詔大理三官臨安府兩浙州縣決繫囚癸亥釋諸路杖以下囚除茶鹽賞錢丁卯命有司舉行寬恤之政十有六條乙亥監太平惠民局夏允中請用文彥博故事以韓托胄平章軍國重事托胄上疏請致仕略曰臣家本業儒遭逢聖世繇臣曽祖先臣琦伯祖先臣忠彥踵登科第接武丞輔暨於臣先大父先臣嘉彥蒙神宗皇帝録先世舊勳俾之尚主自兹派流右列逮至臣不能自奮濫叨世賞陛下龍飛之日面奉憲聖慈烈皇后聖旨俾臣朝夕仰禆初政臣深惟綿薄不足以副使令忽聞局務官有劄子納廟堂及臺諫乃引文彥博故事肆為狂妄之説臣聞之駭汗如雨斯人固不足責而臣之出處豈容不明伏望特降睿旨許臣守本官致仕以全愚分上批其奏曰卿輔翊初政纍歲於兹忠誠備殫勳績益茂朕方得所倚賴豈容逺嫌力求休佚其體至懷勿復有請於是允中遂坐免仍令臨安府押出國門丙子雨丁丑雨雹六月辛巳遣禮部侍郎陳宗召賀金主生辰丙午太白經天秋七月己卯知樞密院事何淡罷淡與京鏜劉德秀胡紘四人實主偽學之禁羣憸附之凡韓托胄所以斥逐異已者則四人之為也慶元五年二月紘罷吏部侍郎七月德秀自吏部尚書出知婺州六年八月鏜以左相薨於位至是淡復罷正魁憸盡去托胄亦厭前事欲稍示更改以消釋中外意時亦有勸其開黨禁以杜他日報復之禍者托胄以為然丁巳以旱復禱於天地宗廟社稷壬戌釋大理三衙臨安府及諸路闕雨州縣杖以下囚癸亥雨雹甲子簽書樞密院事陳自強參知政事兼同知樞密院事右諫議大夫張釜簽書樞密院事乙丑賜龔頤正出身命修孝宗光宗實録頤正和州布衣也本名敦頤元祐黨人原之曽孫國朝髙宗實録慶元嘉泰間京鏜謝深甫為相時所上孝宗光宗實録嘉泰二年詔寶文閣學士傅伯壽直華文閣陸遊同修敦頤嘗著符祐本末黨籍列傳等書數百卷淳熙末洪邁領史院奏官之朝廷以其有史學至是賜出身除實録院檢討官蓋付以史事未幾而敦頤卒乃外召傅陸還朝孝録比他録尤疏駮敦頤後以光宗諱改名云丁卯復賑被火貧民己卯吳曦為興州都統制兼知興州吳氏世職西陲威行四蜀列聖皆留其子孫於中朝所以為慮者甚逺曦久蓄歸蜀之志朝廷不許韓托胄欲握兵權遂遣曦還蜀為諸軍都統制開邊之禍始此八月己卯減奏薦恩甲申簽書樞密院事張釜罷參知政事陳自強兼知樞密院事給事中張岩參知政事右諫議大夫程松同知樞密院事松池州人知錢塘縣時韓托胄有愛姬小故而出松聞之亟賂牙儈以八百千市之至則盛供張舍之中堂夫婦上食事之甚謹姬皇恐莫知所為居數日托胄意解復召之則知為所取大怒松亟上謁曰頃聞有郡守赴闕者欲得斯人懼逺方小吏不識事體他日有誤鈞顔某忝為赤縣職所當為故為王取之耳托胄意少解姬既再入托胄尚未平姬具言松所以謹待之禮托胄大喜即日躐除太府寺丞後兩旬遷監察御史踰年擢右正言數月遷右諫議大夫既而滿歲未遷殊怏怏乃市一妾獻之名松壽托胄遣問之曰奈何與大諫同名答曰欲使此賤姓名常達鈞聽耳托胄憐之遂有執政之除距留妾恰三年其後帥蜀貶官責詞有處汚穢而不羞莫汝為甚之句蓋謂是也丙戌復詔侍從臺諫兩省集議沿江八州行鐵錢利害九月辛亥遣朝臣二人決浙西圍田己未雨土辛未遣樞密院檢詳諸房文字林桷賀金主正旦甲戌令禮部纂集孝宗一朝典禮冬十月甲申詔瑞慶節諸道毋入貢丙戌起居郎王容請以韓托胄敷陳宗廟大計事迹付史官許之甲午金主遣左徽使徒單懷忠祕書少監李楊來賀瑞慶節甲辰編光宗皇帝御集十一月庚申蠲漳州民舊輸黃河鐵纜錢丙寅太白晝見十二月己卯太白經天庚寅復免臨安府民身丁錢三年辛丑雨土癸卯金主遣兵部尚書紇石烈真禮部郎中孫復來賀明年正旦是歲浙西江東兩淮利州路旱賑之仍蠲其賦真里富國獻馴象二壬戌嘉泰二年春正月癸亥蘇師旦兼樞密院都承旨師旦本平江府書佐韓托胄頃為本府兵馬鈐轄從府假筆吏吏以其冷局俾師旦行韓滿歸蘇復還府下丘崈為守嘗以事怒師旦編管秀州久之韓知閣門事師旦困甚往依之韓憐而置之門下未久上登極韓以師旦竄名藩邸吏士內遂用隨龍恩得官韓以其慧辨愛之每朝廷有議論或使之傳言於大臣大臣亦與之立語而已當時侍從官則或與之接坐矣丁卯髙宗實録成陳自強等上時史館無專官未知果誰筆也己巳雷二月弛學禁甲申詔責授寧逺軍節度副使永州安置趙汝愚曩因衆論嘗挂深文朕以其屬籍之聮纍令赦宥可復資正殿學士丁亥修髙宗皇帝正史寶訓戊子以治縣十二事風厲縣令癸巳禁行私史三月辛亥詔宰執各舉可守邊郡者二三人己未初命諸路提刑以五月按部理囚徒如四川二廣之制己巳詔諸路帥臣總領監司舉可為將帥者與本軍主帥列上之是月詔薦舉除升改自代十科外悉罷自今如特旨令內外薦舉者並具實迹以聞夏四月庚寅雨雹是年復行混補試者至三萬七千餘人分六場引試云五月甲辰朔日有食之紹熙初有武臣趙煥言厯差故命判太史局劉孝榮更造會元厯又統天厯慶元五年京鏜為相時所上也初會元厯既成而布衣王孝禮言孝榮未嘗以銅表圭面測景故冬至後天朝廷然之未暇改作至慶元四年九月朔太史言日食於晝章澤言食在夜測驗如章澤言乃改造厯未成而罷三月庚戌乃詔諸道有通曉天文厯算者所在具名來上五月厯成厯經凡三卷沿厯他書十七種凡二十九卷又上臨安府進士侯望重校萬年厯十七卷綱目二卷至是日食五月朔太史以為午正而章澤趙大猷言午初三刻半食三分詔著作佐郎張嗣古監視渾儀祕書丞朱欽則著作郎王容測驗起居舍人俞徵覆驗卒如大猷所言史官乃抵罪焉蓋自渡江來議厯差者多矣己巳御後殿賜禮部奏名進士傅行簡等四百九十有七人及第出身六月丙子遣吏部郎中趙不艱賀金主生辰己卯臨安府火壬午浚浙西運河辛卯禁都民以火訛相驚者己亥命諸州改正冒姓充軍之人庚子雨雹秋七月辛亥子覿為安定郡王癸亥以不雨釋諸路杖以下囚己未命有司舉行寬恤之政七條庚午禱於天地宗廟社稷復行寬恤四事八月丙子吏部尚書袁説友同知樞密院事癸未名光宗皇帝御集閣曰寶謨己丑詔作壽慈殿請太皇太后還內甲午右丞相謝深甫等上慶元條法事類九月己酉上朝壽慈宫還詔諭羣臣曰朕祈請太皇太后還內太皇太后以久違此宫凡百安便不欲遷移百官宜敬悉焉甲寅修皇帝會要壬戌奉安光宗皇帝慈懿皇后神御於景靈宫萬壽觀丙寅嗣秀王伯圭薨伯圭秀安僖王子稱之長子孝宗之兄也紹熙元年五月遷太保封嗣秀王二年夏判太宗正事三年夏遷太師永阜陵成除中書令辭不拜詔有司别議優崇之禮乃除兩鎮節度使諸子初皆補京秩歷牧伯部使者紹熙後並換南班長師夔為使相庚戌臨安府言野蠶成繭冬十月壬申朔詔諸州起發總領所財賦以通判為主管官乙亥上壽成慈惠太皇太后尊號曰壽成惠聖慈祐太皇太后甲申申嚴百司更宿之制戊子金主遣上護軍完顔使塘禮部郎中張行簡來賀瑞慶節乙未遣吏部郎中李景和賀金主正旦明輝受賂得罪以閣門祗候王處久代之追復朱熹煥章閣待制致仕十一月甲辰始御正殿乙巳重修吏部七司法庚子參知政事陳自強知樞密院事同知樞密院事許及之參知政事乙卯再修光宗皇帝日歷丁巳右丞相謝深甫等奉安皇帝日歷於祕閣甲子追封伯圭為崇王諡曰憲靖十二月甲戌日有黑子上御大慶殿發壽成惠聖慈祐太皇太后尊號册寶遂率羣臣上於壽慈宫甲申立貴妃楊氏為皇后學士傅伯壽草制有曰洪惟文母念我神孫之真冠於後庭俾之見於內殿后知書史通古今兄次山本太學生能避逺權勢不與人事論者以為得外戚之體太傅韓托胄為太師講義曰外戚不得預政此祖宗家法也自建隆至紹熙列聖相承不敢失墜雖以曹佾之賢處帝舅之重神宗皇帝欲除佾為中書令而吕申公力言其不可聖君賢相所以防微杜漸之意蓋可見矣惟政和六年鄭居中由顯肅皇后之親拜為大寧此以往之失不可效尤也托胄何人夤緣戚里干預朝政且躐處帝師之任是祖宗三百年之家法至托胄而盡壞之矣他日觀之誅其能免乎庚辰大閲閏十二月丁未詔講官有當開釋者依讀官例隨事開陳乙卯福州觀察使曮為威武軍節度使封衛國公丁卯金主遣兵部尚書圖克坦公弼户部郎中張衎來賀明年正旦是月復周必大少傅觀文殿大學士是冬皇子坰生未踰月薨追封華王諡曰沖穆是歲建寧府福州南劒瀘州水邵州旱賑之自天聖立川交子法每再歲而易一界紹熙二年光宗念蜀民之勞詔權展一年乃易慶元間有自四川茶馬代還者入見言交子二年一兊每引納貫分錢八十文足民甚苦之今計所多羡財請每界展一年永為定制章既下制置司上言今民間每兊錢引一千貼納錢引六十四文足每界總領所收貼頭錢凡百八十萬緡今欲展年當求對補之策明年春有旨許之至是陳曄為總領謝輝為帥請諸朝復以一年一兊蓋軍餉所仰不可復展矣癸亥嘉泰三年春正月辛未朔庚辰右丞相謝深甫罷壬午置胡南溪洞總首戊子龍州蕃部寇邊遣官軍討之甲午參知政事張岩罷丙申知樞密院事陳自強兼參知政事丁酉雷戊戌車駕幸太學謁大成殿御化原堂命國子祭酒李寅仲講尚書周官篇遂幸武學謁武成殿監學官進秩一等諸生推恩賜帛有差同知樞密院事袁説友參知政事權翰林學士知制誥傅伯壽簽書樞密院事伯壽辭不拜二月乙巳御文德殿册皇后吏部尚書費士寅簽書樞密院事乙丑流內侍王德謙於新州三月丙子無為軍民李運言兩淮鐵錢交子利害詔户部相度利害以聞丁丑以陰雨詔大理三衙臨安府決繫囚有司言宜置局講求會子鐵錢利病詔户部併行相度乙酉幸聚景園夏四月己亥朔日有食之壬寅福州言瑞麥生丙午出封樁庫兩淮交子一百萬命轉運司收民間鐵錢乙卯知樞密院事兼參知政事陳自強等上徽宗皇帝玉牒孝宗皇帝光宗皇帝實録辛酉詔宰執臺諫子孫毋就試乙丑禁抑糴軍人米五月戊寅知樞密院事兼參知政事陳自強為右丞相參知政事許及之知樞密院事兼參知政事自強既拜相首除蘇師旦定江軍承宣使又有周筠者本韓托胄家蒼頭亦是恭淑皇后姨夫補官為浙西兵馬都監權任在師旦之亞庚辰以不雨詔大理三衙臨安府釋杖以下囚癸未命有司搜訪舊聞修三朝正史以書來上者賞之六月壬寅遣樞密院檢詳諸房文字劉甲賀金主生辰己酉降大理三衙臨安府囚罪一等釋杖以下秋七月辛未頒慶元條法事類出封樁庫錢十萬緡命殿前司造戰船壬午權罷同安漢陽蘄春三監鑄錢白虹貫日癸未禁江浙州縣抑納逃賦乙未上光宗皇帝徽號曰光宗循道憲仁明功茂德溫文順武聖哲慈孝皇帝八月壬寅增置襄陽騎軍戊申置四川茶馬提舉二貟分治茶馬事丙辰右丞相陳自強等上皇帝會要庚申王德謙死於新州甲子詔刑部歲終比較諸路瘐死之數而殿最之九月庚午參知政事袁説友罷壬申以宗子希璂為莊文太子後更名搢癸酉命坑冶鐵錢司毁私錢改鑄己卯皇弟搢為右千牛衛將軍己丑詔南郊加祀感生帝太子庶星宋星是日遣金部貟外郎魯矗賀金主正旦冬十月庚子詔吕祖泰任便居住癸卯簽書樞密院事費士寅參知政事華文閣學士張孝伯同知樞密院事丙午命兩淮諸州以仲冬教閲民兵萬弩手丁未大風戊申龍州蕃部出降壬子金主遣刑部尚書完顔變戶部郎中髙有鄰來賀瑞慶節十一月壬申上光宗皇帝徽號册寶於太廟癸酉朝獻景靈宫甲戌朝饗太廟祀天地於圜丘赦天下癸未大風己丑安定郡王子覿薨更定選人薦舉改官法庚寅福州觀察使楊次山為嶽陽軍節度使復置福田居養院命諸路提舉常平司主之十二月丙辰命四川提舉茶馬通治茶馬使事辛酉下詔戒敕將帥掊克金主遣吏部尚書通吉思中户部郎中李達可來賀明年正旦是冬金主盜起懼朝廷乘隙沿邊聚糧增戍且禁襄陽府𣙜場邊釁之開蓋自此始甲子嘉泰四年春正月乙丑朔乙亥大風浚天長縣濠庚辰內侍甘昺有罪信州居住癸未日中有黑子辛卯雷壬辰雨雹廣西經略司言西浮洞逃軍為亂破文昌縣遣兵討平之是月辛棄疾入見陳用兵之利乞付之元老大臣太師韓托胄大喜遂決意開邊二月丁酉置莊文太子府小學教授辛亥命內外諸軍射鐵帖轉資壬子蠲臨安府逋負酒錢六萬緡己未立試刑法避親法庚申夜有赤氣亘天三月丁卯臨安府火火迫太廟權奉神主於景靈宫己巳避正殿庚午命臨安府賑焚室辛未詔葺太廟壬申禁質賣軍器甲戌下詔罪己右丞相陳自強等以火災請罷不許初自強以選人入都欲求諸州學官闕見執政皆不遂其所居逆旅主人善沸茶自強一日見其出問所之曰某為儀同擊茶月給士十日三往府中每往擊茶一甌而已餘無事也自強太息曰我嘗權儀同先生主人曰官人求闕不遂盍見儀同乎自強曰吾貧旅費垂盡聞見儀同所費不少安能辦之主人曰俟語次試為拈出旬餘無耗一日自強方悶坐有直省官持帖召來日午後至府相見自強莫知所謂比至則侍從官以次畢集謁入傳令先召陳知丞韓托胄命設褥於堂上鄉之再拜次召從官同坐從官踧踖莫敢居上者托胄徐曰陳先生老儒沈沒可念坐客唯唯明日連章薦其才遂除太學録未踰年遷博士數月轉國子博士又數月為祕書郎入館半歲除右正言右諫議大夫御史中丞入臺半月餘遂秉政由選人至樞府首尾四年托胄用事賄賂盛行四方饋遺公至宰執臺諫之門人亦不以為訝其所用如自強之徒尤貪鄙無狀書題無并字輒不開有選人家閩中其父與自強有舊入都求為掌故自強對衆厲聲曰外方豈不知近旨見闕方除此何可得衆為之踧踖後旬日竟除掌故或疑其由徑而得者問之徐曰丞相耳或曰丞相前日之語甚峻何以回造化邪其人即坐側取一幅書示之乃自強答書也略曰珍貺鼎至晃耀老目或問珍貺之名曰書生安得珍玩比所請不遂適從王家肆中見粟金臺盞十具重百星以四千緡得而獻之耳聞者歎息而去是春火及自強之府主帑吏請管鑰於自強自強聞變口呿而不能言鑰在其衣帶間吏不敢解由是囊橐多失遺者自強修居都亭驛平旦百僚往省之自強大言曰郭殿前號令可謂不肅衆謂救火無策未敢對自強徐言曰昨從渠假五十兵搬擔仗遂去失一金注碗衆愕而退事定托胄謂群公曰丞相生事一委於火可憐須少助之於是托胄首遺萬緡已而饋者踵至諸道及列城皆有助不數月得六十萬緡遂倍所失之數火之始作也或為之賦曰公議不明臺遂焚於御史斯文未喪省僅保於祕書其末句云自生民以來未嘗見此一火乙亥詔百官條陳時政闕失辛巳立添差及祠廟限貟庚寅復御正殿夏四月甲午朔立韓世忠廟於鎮江府命內外諸軍詳度純隊法甲辰知樞密院事兼參知政事許及之罷賑恤江西水旱州縣乙巳參知政事費士寅兼知樞密院事同知樞密院事張孝伯參知政事吏部尚書錢象祖賜出身同知樞密院事丙辰詔曰朕惟選舉之法所以公天下而權要之臣徇私撓禁請囑旁午奔競日滋寒畯見遺乃者訓敕屢申曽不知畏令當必行以警中外其有輒遺私書及受私書不以聞者重置於理毋貸殿前司軍士與巡檢司卒鬨擊破民居詔捕治之主帥以下論罰有差五月乙亥詔諸軍主帥各舉部內將材三人不如所舉者坐之癸未追封嶽飛為鄂王六月癸巳遣起居舍人張嗣古賀金主生辰丙申置諸軍帳前雄校以官軍子孫補之壬寅詔侍從臺諫兩省官集議裁抑濫賞壬子詔諸路監司核實諸州樁積錢米上其數於尚書省沿江四川軍帥簡練軍實上其數於樞密院丁巳增廬州強勇軍為千人秋七月甲子以不雨詔大理三衙臨安府兩浙及諸路決繫囚戊辰禱於天地宗廟社稷己巳命諸路提刑從宜斷疑獄蠲內外諸軍所負營運息錢辛未蠲兩浙闕兩州縣補租戊子命諸路提刑提舉措置保伍法八月己亥自丞相陳自強等上皇帝玉牒甲辰賜范祖禹諡曰正獻癸丑詔自今以恩賞進秩歲毋過二官蠲紹興府􅓖宫所在民身丁錢絹綿鹽丙辰除靜江府昭州折布錢戊午參知政事張孝伯罷九月乙丑得四圭有邸玉一詔藏於太常丁卯有司請更定捕盜改官法詔侍從集議壬午遣大理少卿張孝曽賀金國正旦丙戌戒飭兩淮州縣遵守寬恤舊法冬十月庚子資政殿大學士淮東安撫使張岩參知政事壬寅金主遣兵部尚書完顔吕户部郎中上官瑜來賀瑞慶節十一月己未朔詔兩淮荆襄諸州遇凶荒奏請不及者聽先發廩即日以聞庚申令諸州置招軍簿庚午伯祤為安定郡王壬申白氣亘天庚辰修六合縣城十二月癸巳詔曰朕仰惟祖宗委任三司專總邦計故能周知源委出入有常今之財賦名歸户部而事權散紊不復相通有司出納莫可稽考吏或苛取重困吾民朕嘗有意變通比覽臣僚奏疏因思區畫其遵孝宗皇帝典故宰相兼國用使參知政事同知國用事仍於侍從卿監中擇才識通練奉公愛民者二人為之屬俾顓其職參考內外財賦所入經費所出會計而總核之庶幾名實不欺用度有紀焉遂以陳自強兼國用使費士寅張岩同知國用事己亥詔改明年元壬子禁州縣挾私籍沒民産甲辰再蠲臨安府民身丁錢三年乙卯金主遣殿前右副都點檢烏凌阿毅太常少卿賈益來賀明年正旦乙丑開禧元年春正月己未朔癸酉初置澉浦水軍丙子出封樁庫金一萬兩以待賞功丁丑以許浦水軍隸殿前司己卯重定選人捕盜賞為二等壬午雨霾甲申雷賜蘇洵諡曰文二月癸巳徐安國奪三官命史官改正大奚山賊名癸卯詔國用司立考核財賦之法下於諸路轉運司丙午蠲臨安府逋負酒稅錢十八萬緡有奇乙卯雪三月庚申太白晝見辛未申嚴生子棄殺之禁仍令諸路主管常平官月給錢米收養之庚辰楊次山為太尉辛巳以淮西安撫司所招軍為強勇軍癸未參知政事兼知樞密院事費士寅罷夏四月戊子朔同知樞密院事錢象祖參知政事兼同知樞密院事吏部尚書劉德秀簽書樞密院事辛卯江陵副都統李奕為鎮江都統武節大夫皇甫斌為江陵副都統兼知襄陽府戊戌修憲聖慈烈皇后聖德事迹辛丑日中有黑子甲寅太學生華嶽以朝廷將用兵上書諫送建寧府編管乙卯大風五月己巳御集英殿賜禮部奏名進士毛自知等四百三十有三人及第出身復淳熙薦舉改官法乙亥詔曰朕惟親親人道之始而尊祖睦族禮所以嚴宗廟重社稷也二帝三王之隆靡不由之威武軍節度使衛國公曮藝祖皇帝十世孫也自幼鞠於宫中端重聰哲凜如成人日者從遊資善博親義理之訓益茂溫文之德望實之美中外聳聞朕承先帝洪業夙夜祇畏懼弗克任歷日彌重而國本未立謂天下何若稽嘉祐之宏模爰暨紹熙之令典有司考禮正名朕將遵而行之其以曮為皇子進封榮王甲申鎮江都統戚珙遣忠義人朱裕結漣水縣弓手李全焚漣水縣金主以邊民侵掠及沿邊增戍來責渝盟六月戊子罷廣東八十一墟稅場辛卯詔內外諸軍密為行軍之計戊戌命諸路安撫司教閲禁軍己亥遣禮部侍郎李璧賀金主生辰庚子資政殿學士程松為四川制置使辛丑淮東安撫使鄭挺坐擅納北人牛真及劫漣水軍事敗奪二官罷壬寅天鳴有聲復同安漢陽蘄春三監乙巳右丞相陳自強等上新修淳熙以後吏部七司法壬子陳自強及侍御史鄧友龍請用本朝故事以韓托胄平章軍國事降大理三衙臨安府囚罪一等釋杖以下秋七月己未右丞相陳自強等復以韓托胄平章為請庚申太師韓托胄平章軍國事命興元都統司增招戰兵甲子詔韓托胄立班丞相上三日一朝赴都堂治事丙寅樞密都承旨蘇師旦為安逺軍節度使在京宫觀領閣門事丁卯詔侍從兩省臺諫在外待制學士已上及內外諸軍主帥各舉將帥邊守一二人戊辰贈故丞相趙汝愚少保己卯平章軍國事韓托胄等上髙宗皇帝御集壬午詔諸路提刑提舉司措置保甲癸未韓托胄兼國用事以不雨詔諸路三衙臨安府兩浙諸州縣及諸路決繫囚八月丙戌朔蠲兩浙闕兩州縣職當錢丁亥命湖北安撫使增招神禁軍癸巳雨乙巳殿前副都指揮使郭倪為鎮江都統兼知揚州贈宇文虛中為少保追封劉光世為鄜王閏八月戊午編集隆興以來斷例癸酉罷遣應賢良方正能直言極諫科何致戊寅平章軍國事韓托胄等上欽宗皇帝玉牒憲聖慈烈皇后聖德事迹九月丁亥簽書樞密院事劉德秀罷庚子詔官吏犯贓追還所受如舊法丁未遣祕書監鄧友龍賀金主生旦庚戌大風冬十月甲子汀州守臣陳鑄以歲旱圗瑞禾來獻詔奪一官丙寅升嘉定府為嘉慶府庚子金主遣吏部尚書紇石烈子仁禮部郎中孟鑄來賀瑞慶節復置和州馬監十一月乙酉置殿前司神武軍五千人屯揚州乙未申嚴告訐之禁十二月癸丑朔修孝宗皇帝光宗皇帝御集庚午詔兩淮京西監司帥守講行寬恤之政增利馬軍司弩手癸酉詔曰朕惟方今大計在寬民力二浙承平歲久生齒日繁賦租之餘重以身丁之斂吏弗加省民輸益艱中夜以思靡遑安處爰敷曠澤庸示至懷兩浙路身丁錢絹自開禧二年以後其永除之戊寅金主遣吏部尚書趙之傑兵部郎中完顔良弼來賀明年正旦時平章軍國事韓托胄欲啓邊釁之傑入見容止倨慢持國書逡巡却立若將要上為起者閣門覺其意奪書以進之傑益不平俄贊者唱云躬身立躬者金主父顯宗嫌名也顯宗名允恭之傑端立不動托胄據前奏請駕還內繼有旨更以正旦朝見著作郎朱質上書乞斬北使托胄雖不從猶罷其天竺之遊李心傳曰按孝宗實録淳熙六年十一月乙亥樞密院言盱眙軍申泗州牒金國完顔亶已祔廟所有廟諱及同音字並合與回避詔下有司照會以此例之則躬字亦合與避而不避者托胄欲以挑兵也是歲真里富國獻瑞象江浙福建二廣諸州旱兩淮京西湖北諸州水賑之中郎將厲仲方為和州守仲方本書生嘗造戰車九牛弩未及用而罷去周虎繼之或謂虎用其戰車敗虜於清水鎮云丙寅開禧二年春正月癸未朔蠲兩浙路身丁紬絹癸巳再給軍士雪寒錢發米賑濟貧民以金人使人悖慢館伴使副以下奪官有差乙未增太學內舍生為百二十人辛丑名國用司曰國用參計所乙巳吏部侍郎薛叔似為湖北京西路宣諭使己酉雷雨雹辛亥詔坑户毁錢為銅不以赦原仍籍其家著為令是月雅州蠻髙呤師寇邊遣官軍討之二月癸丑壽慈宫前殿火逮曉始熄於是太皇太后復歸大內甲寅詔壽慈宫遺火由朕涼德以至回祿為災上驚慈闈可自初四日撤樂避正殿又詔已迎請太皇太后還內中朕連日奏請乞不須還宫庶便晨昏之奉已蒙俞允自是車駕月四朝焉丁巳以久雨詔大理三衙臨安府及諸決繫囚己卯復御正殿三月癸巳程松為四川宣撫使興州都統制吳曦為宣撫副使甲午給事中鄧友龍為兩淮宣諭使頒開禧重修七司法丁酉詔諸路監司歲十一月行部理囚徒如五月之制己亥車駕從太皇太后幸聚景園乙巳參知政事兼同知樞密院事錢象祖罷參知政事張岩兼知樞密院事丙午以錢象祖懷姦避事奪二官信州居住己酉知處州徐邦憲入見請立太子因以肆赦弭兵侍御史徐柟劾罷之己未雅州蠻作亂四川宣撫司遣兵討捕之夏四月庚申雅州蠻焚碉門寨官軍失利四川宣撫司調御前大軍往討之甲子薛叔似為兵部尚書湖北京西宣撫使鄧友龍為御史中丞兩淮宣撫使下納粟補官之令戊辰四川宣撫副使吳曦兼陜西河東路招撫使己巳調三衙兵增戍淮東庚午追奪秦檜王爵命禮官改諡乙亥鎮江都統郭倪兼山東京東路招撫使鄂州都統趙淳兼京西北路招撫使江陵副都統皇甫斌兼京西北路招撫副使講義曰小人擅朝欲為專寵固位之計往往至於用兵王吕變法生事於熙河王圭懷姦喪師於靈武繼是則章蔡造釁於湟鄯王黼稔禍於燕雲誤國殄民前後一律今托胄在朝窮姦極惡海內切齒而復不度事勢妄啓兵端使三邊瘡痍生靈魚肉雖擢髮不足數其罪矣吳曦遣其客姚淮源獻關外四州之地於金人求封為蜀王鎮江都統制陳孝慶復泗州江州統制許進復新息縣戊寅光州忠義人孫成復褒信縣五月辛巳朔陳孝慶復虹縣吳興郡王抦薨抦孝宗之孫魏惠獻王愷之次子也光宗即位進永興軍承宣使封許國公紹熙五年七月封徐國公慶元元年三月封王領昭慶軍節度使憲聖慈烈皇后復土遷開府儀同三司抦早慧孝宗愛之慶元初制曰孝宗憐早慧以鍾愛太上念特立以垂慈以見貴寵云癸未禁邊郡官吏擅離職守甲申調泉州兵赴山東路會合丙戌江州都統王大節引兵攻蔡州不克官軍大潰丁亥詔曰天道好還蓋中國有必伸之理人心助順雖匹夫無不報之仇朕丕承萬世之基追述三朝之志惟兹北敵猶託要盟朘生靈之資奉溪壑之欲此非出於得已彼乃謂之當然衣冠遺黎虐視均於草莽骨肉同姓吞噬極於豺狼兼别境之侵陵重連年之水旱流移罔恤盜賊恣行邊陲第謹於周防文牒屢形於恐脅自處大國如臨小邦迹其不恭姑務容忍曽故態之弗改謂皇朝之可欺軍入塞而公肆創殘使來庭而敢為桀驁洎行李之繼遣復慢詞之見加含垢納汙在人情而已極聲罪致討屬胡運之將傾兵出有名師直為壯况志士仁人挺身而竭節而謀臣猛將投袂以立功西北二百州之豪傑懷舊而願歸東南七十載之生靈久蔚而思奮聞鼓旗之電舉想怒氣之焱馳噫齊君復仇上通九世唐宗刷恥卒報百王矧乎國家之寃接乎耳目之近夙宵是悼涕泗無從將勉輯於大勳必允資於衆力言乎逺言乎邇孰無忠義之心為人子為人臣常念祖宗之憤益勵執干之勇式對在天之靈庶幾中興舊業之再光庸示永世宏綱之猶在布告天下明體至懷己丑追封吳興郡王抦為沂王癸巳以北伐告於天地宗廟社稷江陵副都統兼京西北路招撫副使皇甫斌引兵攻唐州官軍大敗興元都統秦世輔出師至城固縣軍大亂甲午以宗室希瞿子賜名均為沂王抦後補千牛衛將軍池州副都統郭倬主管馬軍行司公事李汝翼會兵攻宿州官軍敗績壬寅太白晝見簡荆襄兩淮田卒以備戰兵癸卯郭倬等還至蘄縣金人追而圍之倬執馬軍司統制田俊邁以與金人乃得免六月壬午江州都統王大節除名袁州安置癸丑建康府都統李爽攻壽州官軍敗績講義曰吾與北人本不與共戴天稽之天地之常經參之古今之通誼仰對祖宗九廟之神靈俯揆臣民萬姓之公心靖康之恥不可不雪也昭昭矣南渡中興髙宗孝宗未嘗一日忘此仇也徒以天運未回其勢猶熾故含垢茹恥以奠安南北之赤子曷嘗以為可恃哉今開禧間金人駸駸有微弱之漸骨肉內叛敵騎外攻固幸有機之可乘然而恢復大計當以人材為先真宗之禦契丹也必有李繼隆石保吉然後成澶淵克敵之勳仁宗之制夏羌也必有韓琦范仲淹然後收曩霄納欵之績托胄何人乃敢生事開邊乎宜其自取誅夷之禍也甲辰鄧友龍罷尋奪三官送興化軍居住命丘崈宣撫兩淮遷刑部尚書代之乙卯雅州蠻髙呤師出降官軍殺之丁巳復褒信縣是日貶郭倬等官倬與李汝翼以宿州之敗皇甫斌以唐州之敗並奪三官甲子李爽罷以壽州之敗也丁卯曲赦泗州降雜犯死罪囚餘皆除之蠲其租稅三年是日建康府副都統田琳復壽春府戊辰雅州蠻復寇邊官軍既殺髙呤師是日官軍出禁門欲深入夷界會有為石棚所壓者乃遣土丁先往攻之權提刑督捕司僉廳任處厚時在碉門以狀白提刑劉崇之言本遂進焚其巢以天稍晚姑俟一二日然穴中已無首領焚之無疑崇之未至雅州聞除總領財賦之命遂歸王鉞亦還始陽土丁深入至白茶平聞官軍已還匆遽而出既而夷人掩官軍不備詐攜牲醪云來奠死者及暮縱火焚臨江院兵屯者皆死出奔者多為所殺文龍州膽勇將荀顯忠聞變率所部拒之夷人稍却既而援軍無至者其軍殱焉興元府後軍準備將張全忠引數千兵繼出賊大至全忠戰死官軍共失千餘人後軍正將陳堯輔赴節制司白事還至尼陽聞其一軍盡沒即自刃而死王好謙王鉞皆走退屯多功去始陽二十里夷人進據大城山距始陽不數里盧山邊民亦皆驚遁鉞遂入雅州又歸興州以綿州統領官甘選權節制夷人晝夜焚掠自碉門而東凡四十里靡有子遺好謙命西兵將屈彥招集土丁屯始陽令碉門土居進士李午山鳴鳳往沙平招諭又遣人約嵓蕃夾攻之會宣撫司遣成都路兵馬都監王全將飛山義勇軍三百人同節制癸酉離成都全好謙共議再與之和夷酋髙奴嵬等聽許戊寅蘇師旦既為韓托胄奏劾與在外宫觀尋又奪三官衡州居住仍籍其家除名韶州安置是月兩淮宣撫丘崈至揚州分守沿淮要害金人封吳曦為蜀王賜以金印秋七月梁洋義士統制母思襲取和尚原詔侍從臺諫兩省卿監郎官監司郡守前宰執侍從各舉人才二十人壬午雅州蠻出降癸卯張岩知樞密院事李璧參知政事丁卯誅郭倬於鎮江府壬申置御前強勇軍淮東安撫司所招者九月壬午敵復陷和尚原權都統制范仲壬出師寶雞小捷未幾楊輔遺書韓托胄言蜀兵驕糧乏財計已匱暫休息以規後圖未為失計戊子雷辛卯合祭天地於明堂赦天下乙巳賞復泗州功冬十月戊申朔詔內外軍帥各舉智勇可為將帥者二人辛酉罷瑞慶節宴丙子金人自清河口渡淮守將郭超失利遂圍楚州十一月庚辰命主管殿前司公事郭杲領兵駐真州援兩淮辛巳敵犯棗陽軍有北來韓元靚者至真州微露和意自言安陽人魏公五世孫也丘崈遣人護送北還令問端的丙申元靚人還得幅紙乃行省文字崈以聞於朝甲申命丘崈督視江淮軍馬除簽書樞密院事敵犯神馬坡江陵副都統魏友諒突圍趨襄陽忠勇軍統制吕渭孫欲圖友諒友諒格殺之乙酉趙淳焚樊城戊子金人犯廬州田琳拒退之癸巳以金人犯淮告於天地宗廟社稷乙未避殿減膳湖廣總領陳謙為湖北京西宣撫副使丙申太師平章軍國事韓托胄獻家財二十萬以助軍費金人圍廬州丁酉金人犯舊岷州守將王喜遁去戊戌金人圍和州守將周虎拒之金人陷信陽軍辛丑金人圍襄陽壬寅金人陷隨州癸卯太皇太后賜錢一百萬緡犒軍士詔諸路招填禁軍以待調遣甲辰金人犯真州乙巳金人犯西和州辛亥釋大理三衙臨安府杖以下囚是月濠州安豐軍及並邊所屯皆為金人所陷十二月戊申金人圍德安府守將李師尹拒之庚戌金人陷成州守臣辛槱之遁去吳曦焚河池縣退屯青野原癸丑金人去和州甲寅金人攻六合縣郭倪遣前軍統制郭僎救之遇於湑浦橋官軍大敗倪棄揚州走丁巳金人陷大散關癸亥江陵副都統魏友諒軍潰於花泉友諒走江陵丁卯金人犯七方關興州中軍正將李好義拒卻之戊辰吳曦還興州金人自淮南退師留一軍據濠州己巳郭倪罷奪三官責授果州團練副使南康軍安置庚午薛叔似陳謙罷京湖北路安撫使吳獵為湖北京西宣撫使復兩浙圍田募兩淮流民耕種壬申夜興州天赤如血照地如晝自是月初有日摩於初晴之時至是復有此異癸酉吳曦始自稱為蜀王甲戌鎮江副都統畢再遇為鎮江都統權山東京東招撫司公事乙亥四川宣撫使程松遁丁卯開禧三年春正月丁丑朔簽書樞密院事督視江淮軍馬丘崈罷己卯知樞密院事張岩督視江淮軍馬庚辰右丞相陳自強兼樞密使癸未金人陷階州丁亥皇子圻生庚寅詔建康府兩淮民錢遣歸業辛卯吳曦以偽命招通判興元府權大安軍士楊震仲不屈死之癸巳命兩淮帥守監司招集流民甲午吳曦僭位於興州甲辰池州都統陳孝慶奪三官罷二月戊申雪壬子以金人退師御殿復膳甲寅福建路總管兼延祥水軍統制商榮削奪官爵栁州安置己未吳曦反書聞朝廷大震韓托胄與曦書許以茅土之封書與御札同發罷西川宣撫司程松以成都府路安撫使楊輔為四川制置使沿江制置使葉適兼江淮制置使庚申以不雨詔大理三衙臨安府決繫囚罷諸路添差冗貟癸亥皇子圻薨追封順王諡曰沖懷甲子賑給旱傷州縣貧民命諸路提刑司從宜斷疑獄丁卯罷江浙京湖福建招軍戊子皇子墌生庚午敵去襄陽講義曰髙宗之抗金人也必有張韓劉嶽然後挫烏珠今則總戎三邊者誰歟吳曦特膏粱之子弟郭倪郭倬李爽李汝翼皇甫斌諸人又皆嵬瑣之庸才平居暇日不遇尅剝士卒苞苴饋賂圗為進身之梯媒甚者且外交仇敵以伺中國之動靜矣朝廷顧以推轂制間之事悉以委之師才出境而前者敗後者潰大者殱小者奔罪甚者誅戮輕者投竄而統蜀漢之逆曦又以叛聞用兵以來敵之損未一二而吾國之喪失敗亡已不可勝計矣假使鄧禹聞之寧不笑人於地下乎乙亥安丙等誅吳曦先是正月辛丑李孝義與其徒謀舉義二月壬戌楊巨源至興州見安丙謀之丙喜明日始出視事辛未鳳州進士楊君玉引楊巨源以見李孝義二十六日壬申巨源介孝義以謁安公議遂定君玉退與其鄉人白子申共草密詔而安公潤色之二十八日甲戌巨源書密詔以納安公二十九日乙亥未明好義以所結官軍殺曦於偽宫軍士李貴斬曦首巨源尋以義士至君玉宣密詔安丙權宣撫使巨源為參贊軍事三月丁丑誅徐景望以受偽命入利州逐總領官劉智夫也己卯利東帥劉師文帛書至行在復賜帛書令從長處置辛巳費士寅誅董鎮於廣都鎮曦之客傳偽命於成都者也時士寅新知潼川府未上鎮至廣都為所殺鎮有遺曦書言楊侍郎未肯通情蓋指楊輔云丙戌賜安丙帛書諭以能殺曦報國當不次推賞雖二府之崇亦所不吝於是曦已誅而朝廷未知也丁亥趙彥呐誅祿禧於夔州禧曦之將也己丑瀘帥李君亮遣間使至行在就賜費士寅帛書令叶心經理癸巳興州中軍統制李孝義復西和州丙申命吳獵兼總西事庚子誅吳曦露布至行在朝廷大喜安丙知興州兼四川宣撫副使除端明殿學士楊輔宣撫制置使兼知成都府許奕四川宣諭使以起居舍人充竄程松落資政殿大學士奪六官筠州安置忠義統領張翼復鳳州辛丑曲赦四川降雜犯死罪囚釋杖以下詔吳曦妻子論死外男子年十五以下送二廣州軍編管吳璘子孫移徙出蜀吳玠子孫免連坐壬寅程松責授順昌軍節度副使澧州安置夏四月戊申湖北京西宣撫使吳獵兼西川宣諭使命四川宣撫司察守節官吏及從偽者具名以聞皇子墌薨追封申王諡曰沖懿癸丑降德音於兩淮湖北京西被兵諸州降雜犯死罪囚釋流以下湖北京西諸郡毋納今年租稅四川忠義人復大散關己未奉使金國通謝國信所參議官方信儒發行在庚申兵部尚書宇文紹節權江陵府權湖北京西宣撫使壬戌詔四川宣諭使吳獵與宣撫司共議分興州都統司軍之半屯於利州丁卯召四川宣撫使楊輔赴行在以吳獵為四川制置使吳曦首函至行在戊辰獻於廟社梟首三日資正殿學士錢象祖參知政事己巳改興州為沔州詔存吳璘廟祀追奪曦父吳挺官爵庚午贈前通判興元府事楊震仲官官其子一人癸酉金人復陷大散關甲戌降德音於西和成鳳州五月丁丑賞誅吳曦功戊寅用四川宣撫司奏受偽命人張伸之等貸命除名編配二廣湖南諸州己丑以不雨禱於天地宗廟社稷賜沂王抦諡曰靖惠辛卯太皇太后有疾赦天下是日太皇太后崩四川宣撫使司參贊軍事楊巨源與金人戰於長橋為所敗庚子復置沔州副都統制以李孝義為之分沔州都統司十軍隸兩都統節制辛丑李孝義襲秦州軍敗而還六月甲寅賞守襄陽功己未李孝義遇毒死癸亥大府寺丞林拱辰為金國通謝使右驍衛中郎將林仲虎副之中書門下省檢正諸房公事富琯為告哀使左屯衛將軍李謙副之樞密院編修官劉彌正為賀生辰使閣門舍人陳良彪副之癸酉四川宣撫副使安丙殺其參議官楊巨源秋七月己卯不儔為嗣濮王乙酉詔曰朕德弗類致天之災比者郡邑間被大水加以飛蝗為孽永惟咎證震悼於衷二三大臣其助朕思正厥事以迪百工俾內無誕慢私詖之風外無貪墨暴刻之政其有災傷當行賑恤者具以狀聞毋得蒙蔽矧今兵戍久勞瘡痍未息一念及此痛如朕躬疆埸之吏尤當極力綏輯稱朕閔恤元元之意焉八月壬戌劉師文為四川宣撫使以密劄除之九月丁丑詔以和議未可就令諸大帥申警邊備己卯托胄復有用兵意遂除辛棄疾樞密院都承旨疾速赴行在奏事會棄疾病死乃已辛巳召督視江淮軍馬張岩赴行在壬午貶方信孺坐以私覿物擅作大臣饋遺虜將奪三官臨江軍居住甲申減極邊官吏舉生貟乙酉成肅皇后權􅓖於永阜陵丙戌詔金國通謝使還行在命措置雄淮軍丁亥江淮制置使葉適罷辛卯鄂州都統趙淳為殿前副都指揮使兼江淮制置使乙未知樞密院事張岩罷辛丑遣差監聞鼓院王柟持書赴金國與副元帥府壬午祔成肅皇后神主於太廟冬十月乙巳降德音臨安府紹興府罪囚一等民緣攢宫役者蠲其賦丙午更置殿前司純隊法乙卯復珍州遵義軍丙辰詔曰朕寅奉基圖遹遵祖武憂勤弗怠敢忘繼志之誠寡昧自量尤謹交鄰之道屬邊臣之妄奏致兵隙之遂開重困生靈久勤征役省躬自咎攬涕何言第惟敵人陰誘曦賊計其納叛之日乃在交鋒之前是則造端豈專在我况先捐泗上已得之地亟諭諸將斂戍而還蓋為修孝之階所冀不逺之復適傳來欵自我元戎庸告九廟之靈併嚴三使之選束裝於境持報即行凡所要求率多聽許彌縫既至悃幅備殫無非曲為於斯民詎意復乖於所約議稱謂而不度彼已索壤地而擬越封陲規取貨財數踰千萬雖盟好之當續念膏血之難朘兹敷露於腹心用伸警於中外深惟暴露重痛死傷疆埸耗於流離郡縣煩於供億致汝於此皆朕之愆當知今日之師誠非得已而應豈無忠義共振艱虞思祖宗三百年涵濡之恩極南北億萬衆創殘之苦上下同力遐邇一心鑒往轍之莫追幸方來之有濟嗚呼事雖過舉蓋猶係於綱常理貴反求况已形於悔艾凡我和戰視彼去來各有衛上之忠茂建保邦之績繄爾有衆體兹至懷甲子詔紹興府均敷和買十一月甲戌詔太師韓托胄輕啓兵端可罷平章軍國事與在外宫觀陳自強阿附充位可罷右丞相日下出國門乙亥禮部侍郎史彌逺等以密旨命權主管殿前司公事夏震誅韓托胄於玉津園彌逺建去凶之策既得密旨乃以告參正錢象祖李璧皇子榮王入奏遂有此旨仍命殿前司中軍統制權主管本司公事夏震選兵三百防護托胄别選兵二百守其府門錢象祖欲奏審史彌逺夜往其府趣之李璧亦言恐事留或泄乃已次早托胄入朝至太廟前震呵止之其從者皆散護聖步軍淮北將夏挺以帳下親隨三十四人擁托胄車以出中軍正將鄭發王斌引所部三百執弓鎗刀斧護送至玉津園側殛殺之托胄用事十四年威行宫省權震天下初以預聞內禪為己功竊取大權中則大行竄逐以張其勢始則朝廷施設悉令稟命後則託以臺諫大臣之薦盡取軍國之權決之於已裒引姦邪分布要路陵悖聖傳以正學為偽學橫誣元老以大忠為大逆紹興末年以來臺諫每月必一請對察官每月必一言事從官兩月必一求見否則謂之失職自托胄扼塞言路從官既不言事臺諫亦多牽掣凡所論列若位望稍髙之人蓋皆有所受此外則每月將終必按小吏一二人謂之月課始者猶及釐務官與郡守之屬已而浸及屬官曹掾最後則簿尉監當皆在月課之列矣又有泛論君德時事之類皆取其陳熟緩懦絶無攖拂者言之以至百官轉對監司帥守奏事亦然或問之則愧謝曰聊以藉手臺諫官則曰聊以塞責有監察御史當應諫乃言都城貨塞栗者皆以黃紙包之非便乞禁止聞者哂之私意既行凶焰日熾交通賂遺奔走四方童奴濫授以節鉞嬖幸踞肆於掖庭創鑿亭園震驚太廟之山燕樂語笑徹聞神御之所窮奢極侈僭擬宫闈丁巳歲托胄生辰宰執侍從至四方牧守皆上禮為壽直寶文閣四川茶馬獻紅錦壁衣承塵地衣之屬修廣髙下皆與中堂等蓋密量其度而預為之也吏部尚書獻紅牙果卓十位衆已駭之權工部尚書獻真珠搭襠十副光耀奪目蓋大長公主奩中故物司農卿兼知臨安府最後至出小合曰寒書生無以為獻有少果核姑侑一觴啓之乃粟金蒲萄小架上有大北珠百枚衆皆慚沮丁卯歲托胄生辰大臣以下皆排列所獻於大慶觀之廡下都人競往觀之其首列有紅榜大書云門生特進右丞相兼樞密使秦國公陳自強恭遇恩主太師平章郡王降誕之辰仰祝鈞算其侈靡有如此者凡除擢要臣選用兵帥皆取決於厮役蘇師旦之口已所欲為不復奏稟徑作御筆批出軍事既興又置機速房於私第應御前金字牌悉留其家凡所遣發未嘗關白方其出入禁庭了無顧忌雖孝宗皇帝疇昔燕坐思政之所亦偃然冒居老宫人見之為之感涕歲時錫燕內庭親王戚里預焉可也師旦刑餘賤吏乃邀至其間更相酬酢褻瀆名分一至於此勢焰薰灼視公卿如奴僕宰相以下匍匐趍走一則恩主二則恩王甚者尊之以聖呼以我王除太師麻詞有聖之清聖之和等語除平章麻詞有超羣倫洞聖域等語髙文虎之子似孫為祕書郎因其誕日獻詩九章每章用一錫字托胄當之不辭辛棄疾因壽詞贊其用兵則用司馬昭假黃鉞異姓真王故事由是人疑其有異圖自知積失人心中外嗟怨乃為始禍之計蓄無君之心謀動干戈圖危宗社沿邊赤子骨肉流離肝腦塗地死於非命不知其幾千萬人與逆曦結為死黨假之節鉞授以全蜀兵權曦之叛逆誰實使之方曦之叛蜀人盛傳封托胄為吳王又謂托胄欲與曦分吳蜀之地而王之有司簿籙其家多有乘輿服御如居用木圍寢用龍衾坐用升龍牙牀飾以真紅絛結如此等類意欲何為察其用心稽其稔惡雖寸斬之亦不足以謝天下殛死之日京都士女歌舞於市方其盛時鋤害善類不遺餘力及其敗也黨錮諸賢無不録用褒賚九原衮榮千古雖暫為所抑要之以久公論未嘗不伸也是日新除右諫議大夫林行可方請對自強至漏舍語同列曰大坡今日上殿俄而托胄前驅至象祖倣徨不知所出尋報托胄已押出權吏部尚書兼權給事中陸峻工部侍郎兼知臨安府趙善堅聞之失色相與耳語同列叱之象祖探懷中堂帖授自強曰有旨丞相罷政自強即上馬顧曰望二參政保全象祖璧赴延和殿奏事丙子托胄自強並罷為醴泉觀使丁丑責托胄為和州團練副使郴州安置自強追三官永州居住蘇師旦特決脊杖二十配吉陽軍參知政事錢象祖兼知樞密院事李璧兼同知樞密院事詔曰朕德不明信任非人韓托胄懷姦擅朝威福自己劫制上下首開兵端以致兩國生靈肝腦塗地興言及此痛切於衷矧復怙惡罔悛負固彌甚疏忌忠讜廢公徇私氣焰所加道路以目今邊戍未解怨毒孔滋凡百縉紳洎於將士當念目前過舉皆托胄欺罔專恣非朕本心今既罷逐一正權綱各思勉旃為國宣力飭兵謹備以圖休息稱朕意焉丁丑夏震為福州觀察使主管殿前司公事將士行賞有差戊寅詔韓托胄改送英德府安置陳自強責授武泰軍節度副使依舊永州居住是日又詔韓托胄除名勒停送吉陽軍籍沒家財自強送韶州並安置有司簿録托胄家得蘇師旦所與書云步軍司人少殿前司人多今欲殿前司人令與步軍司相等却撥殿前司所多之人别立一軍使信臣掌之信臣師旦自謂也己卯詔師旦處斬命廣東憲臣涖其刑妻子編置周筠決脊刺配嶺外詔曰姦臣擅朝畏人議已專事壅蔽下情不通政理多闕今既竄殛當首開言路以來忠讜中外臣僚其各條具所見以聞辛巳鄧友龍再奪五官南雄州安置乙酉置御前忠鋭軍丙戌御史中丞衛涇簽書樞密院事兼參知政事鄧友龍除名安置丁亥詔曰古先哲后豫建元良祖宗以來厥有彞典朕獲承至尊休德十有四載而主鬯尚虛非所以重天器正大本也皇子曮天姿英粹學問日充望足繫於人心言有裨於治道蔽自朕志處以儲闈用衍萬世無疆之緒立為皇太子改名戊子郭倬除名梅州安置郭僎除名連州安置仍籍其家參知政事李璧罷奪二官撫州居住己亥以立皇太子赦天下十二月癸卯江南東路安撫使丘崈為江淮制置大使罷山東京東招撫司起居郎許奕為金國通問使前知真州林伯成副之伯成不行以帶御器械吳衡副之乙巳太白晝見丁未罷京西北路招撫使己酉罷葉適寶文閣待制庚戌許及之奪二官泉州居住薛叔似奪二官福州居住皇甫斌再奪五官英德府安置癸丑金人復陷隨州辛酉參知政事錢象祖為右丞相兼樞密使衛涇及給事中雷孝友並參知政事吏部尚書林大中簽書樞密院事甲子楊次山開府儀同三司乙丑禮部尚書史彌逺同知樞密院事丙寅贈吕祖儉朝奉郎直祕閣官其子一人丁卯詔改明年元詔曰頻年相繼寰宇多虞邊釁遽開顧生靈之何罪蟲蝗為孽與旱潦之相仍皆權臣誤國之致斯在菲質應天之敢後今則典刑以正綱紀益張乃因正月之和適際三陽之泰誕揚大號亶告多方其以明年為嘉定元年是歲浙西旱蝗沿江諸州水宋史全文卷二十九下
