body:
  text: 宋史全文卷三十二宋理宗二辛卯紹定四年正月戊子朔御大慶殿羣臣朝賀禮畢上詣慈明殿賀大赦天下以慶壽恩進史彌逺薛極官各二等葛洪袁韶喬行簡各一等進鎮江府都統卞整左武大夫果州團練使統領沈興劉明官各一等以追襲逆全焚毁糧聚也辛丑樞密院檢㑹贈右武大夫彰州防禦使王青力戰而殞詔特贈建武軍節度使右驍衛大將軍與二子官仍立廟于揚州令禮部太常進擬廟額丙辰江淮安撫制置大使趙善湘上露布言統率諸將水陸並進以正月十五日誅逆全於新塘詔奬之二月戊午朔詔禮部貢舉壬戌臣寮奏乞申飭諸路州縣自今遇訴災傷邑委佐官州委幕職於秋成以前務覈的實蠲減田租仍以分數掲之通衢如或稽慢守令䥴斥漕臣覺察不嚴一體議罰從之三月癸巳以經筵進講論語終篇召輔臣聽講己酉賜宰執講讀説書修注官宴于祕書省四月己未賜王青廟額為忠果樞密院檢㑹淮東安撫趙范提刑蔡保奏趙必勝等二十九人擒戮逆全委立竒功詔各補轉注官資仍賜錢銀絹有差乙丑浙東提刑奏温州司户參軍趙汝驟權宰平陽侵用官錢贓罪抵死詔汝驟追毁出身文字除名勒停癸酉以久雨命臨安守臣禱于天竺山丙子蠲大理寺三衙臨安府㸃檢贍軍激賞酒庫所見監贓賞錢丁丑詔赦中外决繫囚杖以下以鄭清之兼同知樞密院事喬行簡簽書樞密院事五月丙戌朔進前知西和州張孝錫官二等以四川制置司言其措置邊防之勞也庚戌詔今後行在遇暑慮囚命所差官將臨安府三獄見禁公事除情重例不原外餘隨輕重盡行減降决遣大理寺三衙兩赤縣一體裁决從臣寮請也丙子詔㑹子庫造第十四十五界共二千萬緡令封樁下庫充邊郡科降癸未給諸軍口累重大錢詔支犒殿步司討捕閩冦凱還軍兵有差陣亡者厚給其家七月乙酉朔詔制總諸帥戎司凡忠勇死義之家並與優給其家其有子才藝異衆者令赴樞密院審視録用丙戌臣寮奏建劒之間秋霜害稼乞下諸司措置般運廣米應濟市糴胡秀嚴徽春霜損桑水潦為沴令監司郡守留意賑存與減稅色從之癸巳臣僚奏乞戒飭諸道監司除正任属官外不得别令見任官入幕違者定行奏劾從之丁未樞密院檢㑹右武大夫叙復吉州刺史江州副都統制陳世雄㑹合荆鄂軍馬于吉州龍泉親臨賊境一舉而擒二首委有勞績詔以世雄為左武大夫濠州團練使江州都統制丙寅詔近民之官莫如縣令日來間有貪虐昏繆不能任事之人重為民害令諸路監司守臣覺察具職位上于尚書省取㫖施行九月丙戌臨安火詔曰囬禄之災延及太廟祖宗神主暫就御于景靈宫朕累日哭於神御殿省愆謝罪傷痛罔極所合奏告可令禮寺疾速定日具奏以聞詔令三省樞密院暫就都亭驛六部暫就傳法寺治事以延燎故也庚寅詔火後合行寛恤條件悉令三省施行其令學士院降詔出封樁庫錢豐儲倉米賑䘏被火之家蠲臨安府城内外之征一月辛卯復出内藏庫緡錢二十萬賑䘏貧乏之民壬辰詔曰丙戌之夕回禄為災信宿之間上及太室延燔民廬莽焉荒燬都人奔避間遭死傷皇天降威孰大於此朕當避正殿素服眡朝減膳徹樂以答明譴其寛䘏事宜已命宰輔次第施行應内外臣僚士庻咸許直言指陳過失毋有所隱庶藉忠嘉共圖消弭詔罷前軍統制徐儀仍削官三等統領馬振逺除名勒停編置湖南州軍以殿前司副都指揮使馮時言其救火弗力也庚子建昌軍火甲辰流星晝隕壬子以火災告于天地宗廟社稷甲寅度支邸官王輿權進對論近日火災上曰此皆朕之不德最是延及太廟朕心不遑安處奏云中外臣子所同痛心今日災變可謂極矣惟有修德可以回天意上然之乙卯監察御史何處久奏兩司修建太廟合遵舊制百司庶府不必革侈從之丙辰宰執以太室延燎五具奏乞鐫罷詔史彌逺特降奉化郡公薛極鄭清之喬行簡各降一秩丁巳詔兩浙轉運判官趙汝憚予祠以臣僚言其火後營繕科擾州縣也戊午詔殿前副都指揮使馮􅀈主管侍衛步軍司王虎救焚弗力延及太廟各奪一官罷之辛卯之火比辛酉之火加五分之二雖太廟亦不免惟史丞相府獨存洪舜俞有詩云殿前將軍猛如虎救得汾陽令公府祖宗神靈飛上天可憐九廟成焦土人言藉藉迄不免責癸酉太常少卿度正進對奏蜀報蒙古深入事勢頗危又聞七方關已潰散纔透文龍便入綿漢皆是平地蜀便難保願早擇帥付之事權蜀中財用已是困乏願陛下不惜出内庫金帛應付之上曰當早為擇帥應付財帛戊寅以煥章待制知遂寧府李􅐉為煥章直學士四川安撫制置使兼知成都府四川制置副使趙彦呐進直龍圖閣兼知興元府利路安撫副使十一月乙酉詔忠義緫管田遂贈武節大夫忠州刺史特與加封立廟以四川制置司言其總率忠義力戰而殁也詔四川關外州軍近經蒙古侵犯殘破去處未能復業軍民日前或有詿誤䧟於罪戾合行曲赦令三省條具事件以聞福建招捕使司奏知邵武縣劉純殁於王事乞加褒䘏詔贈純官三等與一子下州文學癸巳樞密院言四川制置司奏權興元府都統潘福提兵失律離棄關隘合依軍制從之十二月癸丑臣寮奏乞嚴飭州縣科糴及人户投糶不即給錢多取斛靣之弊其州縣折苗並依祖宗成法止以下户畸零減直折錢違者奏劾重寘典憲從之癸酉詔正旦大朝會權免己卯給諸軍薪炭錢出戍官兵倍之辛巳詔出封樁庫緡錢二十萬下臨安府命官賑䘏壬辰紹定五年正月丙午詔以陳貴誼知貢舉權吏部侍郎鍾震御史汪剛中同知己酉太廟成以薛極為禮儀使二月壬子朔御筆賜陳貴誼以下曰科舉取人先器識後詞藻務忠實斥浮偽癸丑羣臣三上表請御正殿從之車駕詣太廟行欵謁禮己酉蠲磚瓦竹木蘆箔之征三月庚寅臣僚奏願陛下近法孝宗恐懼修省以答天譴不可以天變方弭為幸而必期於天休之鑒佑撫摩愛飬以保民命不可以民瘼少瘳為喜而必期於民俗之阜安終始如一悠久不渝則八年災異冦擾之變未必不為後日重熈累治之基從之辛卯監察御史李日邁奏乞今後兩學補試並從朝廷選差試官供給用度依胄監事體務革買帖冒名計嘱私取之弊從之乙未臣僚奏乞戒飭中外洗心滌慮精白承休以修職業以振治功如故習不悛彈劾以聞從之己亥陳貴誼等乞痛革文弊命學臣精選淳熈格式頒示四方四月壬子陳貴誼等奏取應宗子弟一名時中學詩能文頗合程度乞附正奏名廷試從之壬戌詔禮部太常寺行下太武學胄監今後補試文臣外任帶朝職與放牒試武臣外任帶閣職與在外貼職同不許放行癸亥右諫議大夫趙至道奏寳章閣直學士宫觀杜如淵曩者帥蜀不能與衆合謀誓死堅守夜半私遁妄以狀聞詔如淵禠職罷祠丁卯以久雨命臨安守臣禱于天竺山蠲大理寺三衙臨安府属縣㸃檢贍軍酒庫所見監贓賞錢戊辰詔中外决繫囚杖以李日邁奏乞飭大臣凡親民之吏必選亷去貪使不至激民為盜又乞行下諸郡招選放散軍人驍勇可用者填廂禁軍闕額從之丁丑太白晝見五月戊戌詔諸路監司郡守今後齊民犯罪不許妄行籍没法當籍者先具情節取㫖施行違者越訴從右正言何琮請也七月辛卯詔省部刑寺應諸刑奏案以時審定已經奏聞速與報下庶免淹延獄官不許兼職俸薄者増給之從臣僚請也丁酉以禮部尚書陳貴誼為端明殿學士同簽書樞密院事甲辰大雨雹丁未御集英殿試䇿進士制䇿問畧曰朕聞堯舜之帝禹湯文武之王莫不從事於學如飢之必食渇之必飲未嘗外道以出治舎經以求治也朕以眇陋嗣承丕緒于今九年昧旦而朝咨諏輔弼延納英雋日御經筵曰誦曰講咸有常凖然六經之道所以淹貫天人維持世變者至纎至悉不可勝窮而治監一書又所以著歴代君臣之媺惡以勸戒于後皆莫先於修身而齊家進君子而退小人嚴名分而遏亂萌修政事而攘夷狄恤民隱而懼天變朕深惟經訓史䇿日陳於前文字繁多塗轍遐闊求其所以寘力者乃即閒燕竊有慕古人緝熈光明之義日就月將躬履神㑹葢以基治道之本一人心之歸使普天率土若士與民繇内及外悉共繇於理義而無本末舛逆之患上下異向之風顧不偉歟若夫商政治之得失求民俗之利病論士習之厚薄則有所未暇葢以本原既正則他可以序舉也子大夫奉對于庭其以有得于經史者細繹而畢陳之朕將親覽焉八月己酉朔御幄殿引武舉進士射乙丑御集英殿賜進士徐元杰以下及第出身同出身凡四百九十三人丁卯賜特奏名進士倪閃等同出身至州文學助教凡五百九十二人甲戌以玉牒殿成奉安累朝玉牒以薛極為禮儀使乙亥臣僚奏乞行下兩淮荆襄諸郡將見樁管米各具實數或有侵移責限補足沿邊和糴髙價招誘不許均敷民户申嚴賞格仍與定限庶幾及時辦集内外皆有預備詔令户部詳度上于尚書省己丑御射殿引正奏名進士射庚寅引特奏名進士射辛丑詔二廣監司今後武臣非經公朝拔擢不許辟郡特科人不得辟入郡幕如遇闕守秪於鄰郡差攝著為令閏九月己酉有流星大如太白庚戌彗星出于角癸丑詔諸路監司體量旱歉州縣依條檢放察守令之貪亷仁暴以聞丙寅詔避殿減膳撤樂尚慮朕躬有過及朝政有缺令中外臣僚極意指陳無所隱諱其有關民間利便疾苦併令諸路監司守令以實具述聞奏仍敷恩宥以答天戒三省條具合行事件令學士院降赦十月戊子以星變大赦天下詔改盱眙軍為招信軍壬寅詔赦蜀軍民十一月甲寅臣僚奏乞戒飭諸道常平使者遵用淳熈詔令每歳覈州縣豐歉分數或災傷重處即與賑䘏不許隱蔽不實違者臺諫按劾戊午雪給諸軍雪寒錢出戍軍兵倍之己未詔刑部檢坐命官犯贓條令嚴飭監司察部内貪吏劾其尤者一遵祖宗舊法計贓雖輕委係入已令吏刑部永不銓叙改正監司不按發併坐失職之罪從李日邁請也辛酉以陰雨詔出豐儲倉米五萬石以紓民食十二月丙子朔進才人賈氏為貴妃辛巳詔皇太后聖體稍愆和豫朕夙夜于旁不敢輒懈命醫嘗藥籲天禱神間亦小瘳猶未全愈冝宏宥過之施式迓無疆之休可大赦天下命官分禱于天地宗廟社稷宫觀詔皇太后聖體違和服藥未效如草澤有能治療痊安者白身除節度使已有官人及願就文資者並比附推恩外更賜錢十萬貫田五百頃三省可出榜曉諭仍許徑赴和寧門外自陳内侍省即時聞奏大行太皇后上仙羣臣詣慈明殿宣遺誥皇太后誥内外文武臣寮吾受遺先帝保佑嗣君從南靣之居旋即東朝之飬不以天下為樂而以海内為憂仲冬以來偶愆和豫殊費調胹大數有期遂兹云逝惟帝位至重國事方殷毋庸過哀冝從權制皇帝成服三日聽政䘮紀以日易月大臣更加開釋勿致摧傷百官入臨隨地之宜諸道州府長吏以下三日釋服在京禁音樂百日在外一月毋禁祠祀嫁娶沿邊不用舉哀山陵制度務從儉約内外諸軍應合支賜及諸不在誥中並取皇帝處分辛卯上詣慈明殿成服行奠酹禮詔大行皇太后陵寢當遵遺詔務從儉省諸路監司州府軍監寺正進慰表其餘禮物並令免進仍不得以助修奉攅宮為名有所貢獻丁酉羣臣七上表請皇帝聽政詔用正月四日就素幄令輔臣奏事詔曰朕惟皇天降割大行皇太后上僊哀痛罔極但内朝大典不敢輒有改更朕於宫中自服三年之䘮以薛極為總護使少保奉國軍節度使充萬壽觀使師貢橋道頓遞使禮部尚書陳䀭按行使内侍呉惟德副之命臨安府守臣同橋道頓遞使措置應辦梓宫渡江乙巳上詣慈明殿行大祥祭奠禮癸巳紹定六年正月丙午朔上不視朝戊申詔兩浙轉運司臨安嘉興府徽嚴安吉州竹木之征再蠲三月己未宰臣率百僚三表請御殿尋詔權御後殿辛酉右諫議大夫趙至道奏乞戒飭冶司歳納新錢依額起解毋許諸郡截錢納劵壬申監察御史何處久奏乞申敕諸道轉運司嚴飭所部州縣不許遏糴如歉郡招誘客販委官告糴仰具數上之朝廷其阻糴苛稅者令御史臺劾奏從之二月丁丑新除屯田郎官王定奏嚴陵歳歉上曰去年旱勢云甚見如何舉行定奏昨在庾司舉行荒政首擇邑官鄉里之賢者分任之又奏義倉為官吏蠧耗上曰此自是民户寄留于官專為水旱之備丁亥詔榮州陞為紹興府庚寅禮部太常寺言大行皇太后山陵制度欲參酌比附憲聖慈烈皇后攅陵修奉詔依戊戌宰臣等恭上皇太后尊諡曰恭聖仁烈皇后詔依己亥軍器監主簿徐清叟奏近者太后上僊宫中舉哀之日陛下以后服下同媵妾令别製大袖文思院官欲如后飾再造其一以進聖㫖却之陛下此事甚羙真知嫡庶之辨乞宣付史館以垂萬世上曰然讀至孝宗皇帝御近習事上曰此輩宫中不遇備趨走使令耳豈可使預事辛酉江淮制置使趙善湘帶職入奏上曰中原機㑹卿意以為如何善湘奏云中原乃已壊之勢恐未易為力邊頭連年干戈兵民勞役當休飬葺治使自守有餘然後經理境外今雖有機㑹未是時節上曰自守極是癸亥右諫議大夫趙至道奏陛下躬南靣尊事之敬答東朝擁佑之恩養致其樂疾致其憂䘮致其哀其為孝無以加矣繼兹以往天命必畏祖宗必法君子必親小人必逺女謁必禁小民必思懐保政事必務修飭斯足以盡始終之孝上然之癸亥監察御史李日邁奏願陛下正五事以承天心戒六事以召天和謹飭刑政之條力去貪殘之吏從之丙寅右正言何琮奏皇太后山陵用度盡出宫中猶恐州縣並縁敷擾百姓乞飭有司遍行曉諭嚴加禁止從之四月壬午詔今年九月有事于明堂庚子詔今歳明堂大禮令有司惟事神儀物諸軍賞給悉循舊制其乗輿服御中外用度並從省約有司條具以聞壬寅恭聖仁烈皇后掩攅于永茂陵甲辰監察御史李日邁奏比歳年穀不登民生日蹙乞詔諸道賑䘏隨有無以勸分隨所在以出糶秤提見鏹當使流通於民間不當奪歸於官庫日下發出兊便無執留為囊橐預借苗稅當罪官吏不當責民戸其或不悛次第彈奏詔令户部詳度上于尚書省辛未右正言何琮乞倣紹興成憲内委省部外責監司嚴糾州縣凡赦令德音寛䘏事件恪意奉行仍委監司取見已行事實類申朝廷考其違戾重寘于罰從之乙酉録行都繫囚辛卯右正言何琮奏乞申飭監司賑濟結局將所部州縣奉行臧否從公比較第列來上仍命大臣合監司救荒績效總課殿最以示賞罰從之七月乙卯新權知廣德軍石孝隆奏惜民力事上曰州縣催科歳有増益朕每聞之此心惻然宜以愛民為念無負所言八月己卯以知樞密院事薛極為明堂大禮使參知政事鄭清之禮儀使簽書樞密院事喬行簡禮衛使同知簽書樞密院事陳貴誼禮器使吏部尚書兼户部尚書楊燁禮頓使九月壬寅朔日有食之乙巳右正言何琮奏乞戒飭州縣已蠲閤租賦不許科督綿帛不許抑買苗米不許増量監司察其違戾許民越訴甚者以贓私論必罰毋赦從之己酉上宿齋于内殿辛亥大饗于明堂赦天下辛酉經筵奏乞以御製敬天法祖事親齊家四十八條及御書緝熈殿榜御製緝熈殿記宣付史館從之四十八箴列為十二軸左一曰敬天命法祖宗事親齊家右一曰親碩學精六藝崇節儉惜名器左二曰謹言語戒喜怒惡㫖酒逺聲色右二曰伸剛斷肅紀綱核名實明賞罰左三曰廣視聽守信義懼滿盈究逺圖右三曰開公道塞倖門待耆老奬忠直左四曰儲人才訪屠釣尚儒術保勇將右四曰恤勤勞抑貪競進亷退斥諂佞左五曰鍳迎合絕朋比察䜛間禁苞苴右五曰杜請託議釋老謹刑獄哀鰥寡左六曰傷暴露罪已為民損躬撫軍求善使過右六曰寛民力飭邊備旌死事懲偷生陳公益等撰述箴辭附於各條之下揭于緝熈殿朝夕觀省御製緝熈堂記曰大學曰自天子至于庶人壹是皆以修身為本朕嘗玩味斯言知學之有益於人也信矣隆古盛時創立學制大而辟雍次而泮宫微而鄉庠黨序莫不以是為急故八歳入小學則教之以掃洒應對之節射御書數之目自王公以下及庶人之子弟皆與焉自十五則元子庶子至公卿大夫士之適子與凡民之俊秀皆入大學而教之以窮理盡性修己治人之學夫人不可一日而不學也如是况以一身任社稷生靈之托者可不汲汲於此哉恭惟我朝列聖相承稽古右文崇儒重道講學之懿超越前代其所以植億萬年無疆之基者皆自此而得之猗歟盛哉卓乎不可及也朕以凉德纂承丕緒兢兢業業罔敢自怠昕朝二講聿遵先猷乃闢舊廬榜曰緝熈以為講學之地日與諸儒碩學從容延欵紬繹義理問辨經史庶幾有獲内以修身外以治國平天下期無愧於祖宗家學之傳顧不偉歟諡議曰昭掲緝熈之記力求止善之序屢徹六藝之章深造四書之藴其典學有如此者無逸宥坐之戒㫖酒服膺之箴清明大昕之朝宵旰萬幾之慮其勤政有如此者癸亥右諫議大夫趙至道奏乞明降指揮諸縣選擇手分充應鄉司以三年或二年為界界滿無過遞遷典押仍禁絕官司供億誅求之弊著為令從之甲申詔史彌逺二子宅之宇之並賜同進士出身尋以宅之為太府少卿兼崇政殿說書宇之將作少監丙戌進史彌逺太師左丞相兼樞密院使鄭清之光禄大夫右丞相兼樞密使丁亥以史彌逺為保寧招信軍節度充醴泉觀使進封㑹稽郡王仍奉朝請薛極樞密使立班恩數並依宰臣例喬行簡參知政事簽書樞密院事陳貴誼參知政事兼同簽書樞密院事詔史彌逺定䇿元勲久以病告朕欲親幸其第視疾令有司條具以聞尋具辭免詔依所乞特與幸第恩數戊子雪詔史彌逺勤勞王室垂及三紀以疾解政所宜曲加優禮長子宅之權户部侍郎兼崇政殿說書次子宇之依舊直華文閣樞密副都承㫖長孫同卿直寳章閣次孫紹卿會卿晉卿並補承奉郎女夫趙汝棋軍器少監孫女夫趙崇縡轉一秩與陞擢差遣詔楮幣寖輕關繫甚重薛極久參國政練達時宜令與三省以下措置以聞詔給諸軍寒雪錢出戍官兵倍之辛卯詔出内帑緡錢二十萬令臨安府措置兊易日下住罷銅錢局史彌逺薨壬辰詔贈史彌逺中書令追封衛王諡忠獻輟視朝三日十一月辛巳朔命中使王資之視史彌逺葬事子宅之等辭免尋以命權刑部侍郎趙杭夫禮部太常寺檢照典故出殯日用本品鹵簿皷吹儀仗從之講詩曰彌逺自開僖丁卯為禮部侍郎白楊太后謀誅韓侂胄而寧宗不知數日寧宗問侂胄安在左右乃以實對寧宗深悼之凡相寧宗十七年帝崩廢濟王立理宗又獨相九年用余天錫梁成大李知孝等列布于朝最用事者薛極胡榘聶子述趙汝述時號四犬彌逺出入禁苑擅權用事䑓諫學舎爭言其非上以其定䇿功終始保全之辛丑詔知贑州姚鏞知興國軍王相各追五秩内鏞安置衡州相安置岳州以江西帥臣陳韡劾其貪墨故也遂下詔戒飭贓吏辛丑詔侍從論思獻納之選朕所親擢方作新庶政渇想嘉猷自今可不時靣對凡朕躬得失國事便宜悉以啓告毋有所隱甲辰都省檢㑹故相史彌逺薨今擇日車駕臨奠縁在制中依禮例免乙巳詔以來歳改為端平元年壬子日南至上不視朝癸丑以曽從龍宣繒並提舉萬壽觀兼侍讀仍奉朝請丙辰詔朕恭覧孝宗皇帝寳訓景行懿德如勤政之條大臣不時宣引商㩁庶務朕深慕焉今視朝之頃諏訪未周欲仰遵舊典間令宰執入對便殿從容啓沃各罄所懐以副朕厲精之意癸亥新授徽猷閣學士知平江府楊燁奏對乞於呉松江口置寨以備海道上曰許浦今多少人燁奏許浦萬二千人額鄉來逆全多就顧涇運米萬一自海洋窺吾松江口平江必為震驚况密邇行都乎上曰卿宜嚴行關防丙寅新除權工部侍郎趙范奏對上曰卿儒英之子乃能出入兵間為國宣力朕喜見之上又問曰今日何者為急務范奏事有本末有緩急正人心變風俗舉賢能奬亷退黜貪佞去姦邪此為國之本務國未富兵未強此今日之急務也陛下不可不加之意大農課額大虧於昔要必有由至於兵之未強則縁諸邊近年築城太多遂分兵力國家之兵聚則不少散則不多若能散能聚可守可戰使江淮表裏皆有可恃之勢則戎馬侵突足以御之矣上曰講和如何范奏以為羈縻之䇿則可宣和海上之盟其初堅如金石縁倚之太重備之不至迄以取禍此近事之可鑒者上曰和豈可恃又呼范使前曰卿父子兄弟皆有大功朕所深知更宜竭力國事稱朕眷荷丁卯詔今淮東安撫制置使兼知揚州趙葵任責詳審措置邊靣捍禦如遇緩急應調遣賞罰等並聽便宜施行己巳趙葵入奏上曰二邉交争和好如何葵奏自古和戎鮮不叛盟目今邊事未強軍政未備只得且與之和一年無警則自家做兩年工夫自家根本既壯彼或叛盟足可禦敵臣到東淮當修車馬備器械以為野戰之計固城壁浚濠湟以為強邊之圗寛民力以固邦本衍軍儲以實塞粟更欲為陛下經理屯田容臣到官審計以聞要須公私兩便上曰卿規模甚好又奏昨奉聖㫖許臣緩急便宜行事東淮去天密邇事無大小皆合禀聽廟謨微臣不敢專擅上曰尤見卿小心朕信卿兄弟甚篤不比他人卿儘可放心為朕展布戊寅詔史彌逺擁立眇躬功在社稷宅之繳納賜第今特賜本家居止仍奉家廟以稱朕始終優禮之意庚辰詔薛極更練老成久勞國事求去屢矣每諭留之今以疾辭甚力勉從雅志俾均逸藩府其子燧光孫坦各特轉一秩與升擢差遣餘一依宰臣恩數尋詔進觀文殿大學士知紹興府癸未太常議故累贈開府儀司三司袁爕諡正獻甲申給諸軍薪炭錢丙戌蠲元年創立窠名錢以紓民力癸巳以改元命官告于天地宗廟社稷宫觀丁酉詔京荆制置司出米賑贍襄漢被水之民甲午端平元年正月庚子朔上不視朝詔令内外小大之臣悉上封事朝政得失中外利病盡言無隱侍從卿監郎官在外執政從官舉公亷信敏可為監司守令者三衙統帥知閣御帶環衛在外管軍舉智勇忠慤可為將帥者各二人辛丑詔曰朕惟國家科舉取士羣材輩出中興以來承平百載間有州郡士風極盛里選之額至少不無遺才非所以示選舉之均也今歳大比朕欲廣搜羅之才為精擇之地可令禮部條具各州科舉終場及發解人數詳酌奏聞以資政殿學士光禄大夫提舉萬壽觀兼侍讀曽從龍為資政殿大學士沿江制置使知建府行宫留守乙巳太常議故少師金紫光禄大夫任希夷諡宣憲丁巳太白熒惑合于斗己酉制以皇叔祖宣州觀察使不擅為保寧軍節度使提舉萬壽觀嗣濮王戊午祕書省著作佐郎兼權尚左郎宫王㑹龍進對讀至贓吏曽不少戢上曰朕痛治贓吏日來宜少知畏㑹龍奏雖懲一二漏網尤多乞風示中外應有按劾須明指事實研究贓罪從之壬戌詔以寳應州依舊為保應縣同鹽城縣𨽻淮安府壽昌軍為武昌軍𨽻鄂州二月庚午朔詔禮部貢舉龜鑑曰理宗之科舉取士未嘗不以理義淑人才乙酉詔士之初既曰經術詞章先觀器識矣而戊子之詔又以游夏文學淵源議論通達為重至辛卯選士之詔既曰學術邃深必録文理儇淺不容矣而甲午之詔又以詞章必探經術之理致學問必浚師友之淵源為先辛未祕閣修撰新兩浙路提㸃刑獄趙立夫進對畢上曰目今和糴不可緩立夫奏臣昨尹京邑蒙朝廷委以糴事痛革吏奸遂得不擾而辦上曰奸弊多端嚴與關防庶幾百姓樂與官為市二月戊寅詔自今侍從間五七日經筵官遇假日可具前代本朝事迹關政體者一二附以已見不時進入壬午詔曰朕觀敕令所舊册恭覩孝宗皇帝逐事㸃勘増修刪改曲當情法於恤刑條又加詳焉因思近日官府輕用徒刑自今可除犯罪貸命奸贓伏辨已結録人外不許輒用令諸道提刑月取情案人數上之朝廷仍令御史臺覺察癸未詔曰朕惟國家南渡之後八陵逈隔常切痛心今京湖制置以圖來上恭覽再三悲喜交集凡在臣子諒同此情可令卿監郎官以上詣尚書省恭眡集議以聞尋詔京湖制置司選官省謁條具經從事宜奏聞當議遣使修奉已而都省言制司委官恐致稽緩可令禮寺閤門選官一貟賫御香省謁八陵尋詔以太常寺主簿朱揚祖閤門看班祗候林拓仍令制司委官護送四月辛未以宣教郎朱復之詣八陵相度修奉壬申詔曰天佑我宋獲殄讎敵八陵未崇深用感悵矧居䘏制尚御便朝可特免百官表賀甲申免祕書郎蔣重珍進為君難七箴一曰明心二曰反身三曰齊家四曰遇大臣五曰處戚属六曰防私謁七曰正百官詔宣付史館丁亥詔令端平元年以前命官得罪貶竄事故者許歸塟令刑部刷具合叙復放便人數上于朝廷庚寅都省言近來朝廷户部財賦㑹計不明用度無節詔令尚書省計簿房置局稽考委都司官同樞密院編修官編類端平㑹計録仍令條具來上權置檢閱文字二貟尋差宣教郎趙與峕承事郎趙汝暨癸巳守禮部尚書兼侍讀陳卓等以經筵進讀孝宗皇帝寳訓終篇乞宣付史館從之癸巳臣寮奏乞令户部戒飭諸路漕臣詳具州縣二稅租額毋令失陷其有籍干安邊所及撥賜寺觀蠲免者毋得剏立名色均敷仍令改正定額上之臺省從之三月京湖制置使史嵩之獲到耶律道宗完顔晟完顔雍等偽寳七顆詔收管封樁庫丁未詔以李心傳為著作佐郎兼四川制置司參議官修國朝㑹要令成都府給筆札之費京湖制置使史嵩之上露布言蔡城破完顔守緒自焚獻其遺骨及偽寳法物偽執政張天綱完顔好海夾谷奴婢等詔禮部太常寺條具合行事宜禮官援俘獲鬼章事宜結故事來上令赴都堂呈引敕大理寺審實尋以函骨偽寳法物下大理獄天綱等拘管于殿前司甲寅詔户部下諸路州縣凡二稅折科令官民户一體施行甲子詔刑部飭州縣禁網捕四月辛未都堂言已頒詔㫖禁絕私饋中外求舉猶習舊弊未能盡革詔令吏部遍行戒飭仍令御史臺覺察違戾者以聞丁丑詔曰國家睦族之恩過於三代凡在孤遺悉加贍給近來所属多不留意貧窶之家或致失所深可矜念令大宗正司及西南外宗司下所属州縣隨時給之察其違戾以聞戊寅歳星守太微垣上相星辛巳詔令侍從兩省給舎臺諫卿監郎官經筵官赴尚書省集議和戰攻守事冝在外執政從官沿邊帥守並實封奏聞壬午監察御史洪咨䕫奏京湖制臣以北國完顔守緒函骨等奉致闕下容臺訂禮棘廷議法將舉獻馘之典然殘金就滅強敵為鄰抱虎枕蛟機變叵測上下凛凛益嚴備守尤恐不逮豈可動色相賀渙然解體以重方來之憂從之丙戌以金國滅亡奏告宗廟社稷詔夾谷奴婢等八人並與改名換授有差庚寅詔部押俘獲官属行軍器監主簿兼淮南西路制置司參議官陳一薦路分江海並進官二等餘賞犒有差辛卯詔觀文殿學士和國公薛極進少保致仕甲午樞密院奏乞令殿前司借補張天綱武翼大夫本司計議官借補完顔好海保義郎本司副將並給袍笏靴帶從之五月壬寅主管官告院髙奎進對奏邊事四幸四慮及治三兵事上曰今合作如何區處奎曰備邊固非一事若根本之論當先治兵兵強則進退戰守無有不可上然之乙巳以薛極薨輟視朝三日右正言何琮奏自今官吏贓狀敗露經臺諫監司奏劾分明者即下所属州郡拘贓聽朝廷議罰或移為他用者併籍其家從之丁未主管官告院張燁進對奏金滅韃興上曰待敵之道當如何燁奏金人世讎一旦滅亡戰守和三䇿當有定筭但和議之說難恃要須選將練兵儲才積粟自固吾圉且俟小使回若可和姑與之和然戰守之具不可一日廢上然之皇叔祖保寧軍承宣使新知南外宗正事師謇辭上曰到官須留意教養己酉月入氐詔武翼郎添差兩浙東路兵馬副都監希丞換授皇叔右監門衛大將軍髙州刺史提佑神觀成忠郎監潭州南岳廟與蓀換授皇弟太子右監門率府率皆以榮文恭王近属也進帶御器械孟拱三秩主管侍衛馬軍行司公事丙辰行軍器監丞兼知黄州兼權淮西提刑趙汝􅲳辭奏兩淮和糴上曰兩淮和糴果是有擾又奏黄州六關上曰六關乃不可守汝􅲳奏六關山徑甚多實不足恃前後恃以為險者往往誤事以權工部尚書趙范為兩淮制置大使節制沿邊軍馬兼沿江制置使壬戌幹辦諸軍審計司章謙亨進對奏浸銅事上曰實鐵爾謙亨奏紹聖間以鉛山贍泉浸鐵為之令泉司鼓鑄和以三分真銅所以錢不耐久又奏舊錢精緻泄於海舶上曰不可不禁甲午詔沿江制置副使並聽趙范節制任責措置江面先是詔沂靖惠王榮文恭王合依典禮置立祠堂園廟令禮寺討論以聞丙寅議上詔令紹興府繪圖條具上于尚書省六月戊辰朔輔臣鄭清之同知呉潜僉書徐清叟等入奏畢顧瞻選德殿東西壁掲宸翰六大字曰思無邪毋不敬共奏聖學日新之意上曰此朕座右銘也清之等撰二銘以進龜鑑曰中庸九經修身在誠大學八條修身在敬皆所以操履乎理義之正而不為物欲所撓也而理宗率循此理以修吾身書殿楹之東曰思無邪即正心之本領也而宰相為之銘曰心居中虗五官聽命動以毫釐萬物交競惟正此心所適靡他正心伊何曰思無邪帝於廣居相止清明在躬龜鑑之非自大學正心之敬充之乎書殿楹之西曰毋不敬此修身之綱要也而宰相又為之銘曰視聽言動復禮之端四非未屏決我性端惟修此身砥柱斯正修身伊何曰毋不敬帝於黄屋孔夷庸敬存存佩服之非自大學修身之敬發之乎己巳詔新除吏部尚書崔與之為端明殿學士提舉西京嵩山崇福宫以其懇辭召命也庚午熒惑填星合于胃壬申知建寧府兼福建運判袁甫奏乞蠲漳州歳納丁米錢泉州興化軍一體蠲放從之丙子權知廬州兼權淮西運判全子才奏知安慶府林棐贓狀顯著詔特追三秩勒停送撫州居住委官究實追贓五月戊寅以喬行簡知樞密院事曽從龍參知政事陳貴誼兼同知樞密院事左諫議大夫鄭性之端明學士簽書樞密院詔故巴陵縣公竑脅於狂冦不能固拒遂陷於逆朕甚痛之今一新政化加惠存殁可盡復其本身官爵仍令有司檢眂塋所以時致祭其立嗣一節關繋國家難以輕議朕不敢私妻呉氏給祠牒為尼特賜慧淨法空大師令紹興府月給百劵為衣鉢錢給諸軍口累重大錢辛巳熒惑入填甲申知嘉興府趙與􅊸知江州趙善璙知汀州李華各進一秩並以職事修舉也乙酉録行在繫囚蠲興國軍秤尺牙稅錢從守臣羅愚請也丙戌有流星大如太白辛卯上卻歸正蕃臣康守正王全所獻馬已而出御札賜輔臣曰近康守正王全以馬來獻朕已諭之云御前自有馬院可以供進若馳驟駿馬汝等可自留用朕方禁飭臣下勿受餽遺豈又自開此門兼恐逺人以此窺朕好尚昔漢文卻千里馬朕素慕之卿等以為如何輔臣乞宣付史館從之丁酉詔刑部行下諸路州軍將強盜竊盜鬬殺貸命黥𨽻之人並押赴兩淮京襄大軍收管七月辛丑大理評事沈夢謙進對奏曰待敵兵必得其宜上曰小使鄒伸之尚未回夢謙又奏自古兵交使在其間往返遲速所不必計但不可輕遣泛使示弱於外讀至河南易取處上曰今日據關阻河為堅守計如何夢謙奏使將帥得人如祖逖雖摧鋒越河可也否則元嘉覆轍所冝深戒上曰然癸卯詔奬趙范趙葵全子才收復三京尋以范為端明殿學士京河關陜宣撫使知開封府東京留守兼江淮制置大使葵權刑部尚書京河制置使知應天府南京留守兼淮東制置使子才權兵部侍郎關陜制置使知河南府西京留守兼京湖制置副使詔奬諭收復東京南京河南州縣等處一行將士詔撫諭東京等處官吏遺黎等曰洪惟本朝肇造區夏忠厚相傳於家法公恕素結於人心遭家不造值國多艱遂至大同之治竟成分裂之形列聖中興惟兼愛於南北積年養晦不輕用於干戈因彼兩方之構怨致兹頻嵗之不寧百姓至此極也多方罔堪顧之嗟惟故疆皆吾赤子痛念君師之責實均父母之懐廼勅元戎往清餘孽室家相慶傒我后以來蘇父老泣觀喜皇綱之載復豪傑望風而慕義城邑不戰而請降雖謳吟方切於中原恐遐逺未沾於王化或脅兵鋒而投拜猥附蜂屯或棲山谷而結聮僅防豕突冝及惟新之治咸思載舊之情蟻猶有君鳥則擇木盍思乃祖俱我宋之遺臣忍及爾身隔中朝之治化時哉不可失也捨是欲何之乎為父兄子弟之良圖有天地古今之大誼亟回心而效順舉率衆以遄歸庶脫之塗炭之中而易以室家之慶逺者來近者恱同我太平撫則后虐則讎惟爾審擇繄此從違之頃居然禍福之分隗囂阻天水之兵自貽誅戮竇融獻河西之地亦被寵榮辛亥朝奉郎前知荆門軍張元簡進對奏擇縣令責郡守選監司上曰守令貪殘何術以懲之元簡奏此曹非有所恃不敢為讀至蒙古委河南於不争上曰蜀中可慮奏云不但蜀可慮襄陽亦甚可憂自曩者蜀帥輕棄險要蕩無限制北師所至如履平地近者北伐之兵深入則沿江一帶愈虗亦所當慮上曰最是無人可托難得至誠有才為國家辦事之人元簡奏風俗敗壊是以無人得使又奏洋州興元襄峽等處須選擇人以備要害上然之以寳文閣待制提舉佑神觀與芮換授皇弟揚州觀察使依舊提舉佑神觀仍奉朝請尋詔為武康軍節度使新除大理司直李希顔進對奏擇將帥以守要害上曰將材難得希顔奏自古未嘗借才於異代真宗皇帝易置河北郡守出李允則等十二人以示近臣後世稱為名將葢預於無事時求之荆淮要害不過數人可無憂矣願陛下以真宗為法趙范趙葵邊方倚重宜思所以為代者今師徒北向留守備者何人上曰有正將當有副將又奏乞擇將以守要害募兵以實營壘固江淮之保障八月癸酉詔令江淮制置大使司給米麥一百萬斛分撥三京歸附州縣委官置務賑濟乙亥以范用吉為寧逺軍節度使左驍衛大將軍和州防禦使忠節諸軍都統制李伯淵為保順軍節度使右驍衛大將軍皆以東京來歸故也丙子都省言三京已復所有西京河南府祖宗八陵合差官薦獻週視陵域以軍器監簿劉子澄攝太常少卿為仲秋薦獻官恭詣行禮戊寅前權發遣紹慶府黄登進對奏武泰建節之邦上曰如何為武泰登奏黔州在唐為武泰軍節度使有摩圍福地今陛下潜藩升為紹慶府龍飛一年之先大雨洗土石骨皆龍鱗山巔祥雲蟠結守臣趙翰嘗作摩圍祥雲頌臣到任後荷生雙頭牛生獨角今日抑何其易耶願陛下無恃今日機㑹之易當思先朝機㑹之難勿以得之易而昧於經逺守之難而忽於圖終上然之都省言河南山東新復州縣各已委官任責守備徑理屯田措置防捍詔令樞密院檢察諸房文字尤焆前往㸃視詔兵部侍郎兼淮東制置使時暫移司泗州措置新復河南京東等州營田任責捍禦邊面趙葵直祕閣京西湖北制置副使同措置唐鄧息等州營田捍禦邊面全子才各削一秩尋詔子才更削一秩落直祕閣先是趙范以葵子才輕於北伐奏上給舎繳駁故有是命庚戌新除權户部尚書真德秀乞進大學衍義二十二帙從之壬子給舎繳奏收還趙范端明殿學士仍舊官名盡護襄漠詔范為龍圖閣學士依舊京西湖北安撫制置大使兼知襄陽府節制兩淮巡邊軍馬癸丑都省言何霆編進朱熹解注文字有補經筵合加旌異詔特補上州文學丁巳真德秀奏願陛下亟與大臣籌思諸葛亮閉關息民務農講武之事參以時勢之宜立為規模己卯都省言已差朱揚祖等恭詣八陵朝謁回合委官前往修奉詔令禮部太常寺討論典故上于尚書省乙酉國子正鄭起潜奏更化善治也而天下之弊猶變之而未通上曰更化之後弊事尚多如何起潜奏持之以公守之以堅鎮之以定又奏八陵省謁故都復還論機㑹則喜百年之未有顧事力則慮來日之尚多兵端既開而難收土地可取而孰守又奏國家一歳之入止有此數上曰國用匱乏如何奏云今國與民俱匱但有節浮費剗宿弊而已上曰東南民力竭矣起潜奏陛下軫念及此生靈之幸九月辛丑熒惑入斗壬寅臣僚奏自古中國復境土之效未有如今日之易者王師所届戎捷即馳八陵一新三京咸復河南故郡版籍悉歸王土自晉八百年之幸㑹然而不易因敵制變固有活法然當常以收斂靠實為主外張聲勢不為敵所輕内護本根不為敵所致上然之十月丁卯翰林學士知制誥兼侍讀真德秀奏乞進讀文公朱熹大學章句或問從之癸未太常少卿兼侍講徐僑奏論語一書先聖格言乞以魯經為名升為早講從之詔今後應奏薦人並先補入國學各以年齒肄業方許授官或限内請舉登第舎選釋褐如任子及第換授法左選文學注破格監當任滿許注簿尉右選校尉注作院以下闕候年勞轉承信方許注監當紹定六年以後入貲補官者令别換授士子發解三十年五到省許就特科以四分取一置前四等春秋班引雖舉貟及格不許放特班宗子凡遇慶典非兩舉不補官非三請不換授戰功補授人未得放令離軍已參注者不許收使仍詣軍自陳收𨽻軍籍量與請給省吏官至朝奉中散中奉大夫者存殁任子不許過二三人密院比類一體施行令有司裁抑參定著為令從臣寮請也十二月己亥行太府少卿兼知臨安府袁肅奏謹好尚一節上曰人主好尚信不可不謹又奏陛下清心寡慾可謂好尚甚簡萬幾之暇游神翰墨乃有詐為御書者上曰此事如何肅奏錢塘縣蒙福宫女冠李真定等欲得宸奎以榮觀宇姦人陳汝能等詐為碑刻甚侈上曰此必女冠為人所誤肅奏女冠無知但詐冒冝深懲之上曰不可不懲辛丑尚書吏部郎中兼權左司鄭寅言兹攝都司典領封樁儲蓄極少楮劵並無見管印造及門即充支遣猶且弗給若不節用如何秤提宫禁錫予或過浮汎上曰禁中未嘗妄用寅奏外廷不知禁中事乞賜裁省從之丁未知郴州林汝浹辭奏至招刺軍兵所補虗籍十不二三上曰方今諸路兵籍多虗汝浹奏誠如聖諭又奏二廣郡兵最少臣守英德目擊其弊不住招填今須嚴督州郡招刺強壯勿為文具庶使各有武備又奏浙郡楮滯錢慳乞嚴秤提上曰諸處㑹價亦未甚登奏云㑹價正在人措置舊楮民習低價已久新楮亦須漸令流通久而自信上然之癸丑臣僚奏古者冢宰制國用必於歳杪視年豐耗量入為出願陛下特命宰臣兼制國用以參知政事同知使人主不得越制過取有司不得違制擅支上下一心君臣同德㑹計有局檢閱有官庶幾財用日益則國用濟矣從之臣僚奏乞戒禮寺今後凡祀必奏陛下是日潔一念於存想間在宫有如在廟兼齋慄之時多則嗜慾之念薄以新聖德以格天心宰執代祭一歳凡六故相以病當國委之槖從自今以始一遵舊制以重祭祀從之詔諸路監司帥守申嚴苞苴之禁丙辰詔諸道申奏獄案未斷已斷未下者於都司刑部大理寺各委官立限催督稽攷其經由去處嚴立程限月申御史臺其申憲司詳覆而别無疑慮者不許規避從臣僚請也十二月戊辰蒙古國使人入朝詔以鄭寅為館伴使戊寅蒙古使人入見乙酉蒙古使辭於後殿庚寅詔令三衙江西四川諸軍每遇歳餘主帥王兵官從公揀汰不許蒙蔽進鄒成之李復禮喬仕安劉淳官各二等以使蒙古國有勞也乙未端平二年正月乙未朔上不視朝丙申詔令中書後省將端平改元以來中外言事書䟽科别其申明條目就速與繳入以便省質繼自今計月類進送之中書俾大臣參閱酌行如紹興故事詔令三衙沿江京湖四川兩淮制帥并諸處軍帥非臨陣對敵至于軍令不得遽行誅戮如罪犯顯著須按驗實奏上取㫖庚子詔榮文恭王府皇后宅置教授各一貟皇后宅可依紹興舊典四姓小侯立五經師之遺意三省併行參酌以聞都省言端平改元務革衆弊次第申明條目詳備内而官府外而監司郡邑故態未能盡革詔令三省檢照節次指揮博加體訪擇慢令之尤者以名聞奏丁未詔京湖四川兩淮制臣帥臣所宜練兵恤民峙糧繕器經理營屯控扼險阻使警飭之嚴常如敵至諸軍將士昨已第賞令所在速與放行或一時有失條具併以姓名來上其中原歸附人忠節可尚當眡功推賞隨材録用毋使失職辛亥詔曰國家進士之科得人為盛比年場屋循習寛縱易卷假手傳義之弊色色有之深恐真才實能無以自見可令監試官嚴行覺察犯者依貢舉條制取中人就尚書省覆試以副親䇿之選甲寅禮部尚書兼侍講李􅐉奏胡瑗孫明復邵雍歐陽修周敦頥司馬光蘇軾張載程顥程頥十人卓然為學者所宗宜在從祀之列乞令經筵祕書省國子監參酌熟議又奏乞將子思併與升祀列在十哲之間從之丙辰以帶御器械兼權主管侍衛馬軍行司公事孟珙時暫黄州駐劄同共措置捍禦邊靣丁巳孟珙入奏上曰鄉名將之子忠勤體國破蔡滅金功績昭著朕所素知珙奏世受國恩邊頭多事仗陛下威德緫師旅滅讎金皆陛下萬世不朽之功三軍將士戰陣之勞臣但能效奔走之役此臣分内事耳丁巳詔經筵所進讀通鑑綱目己未詔以翰林學士知制誥真德秀知貢舉中書舎人權吏部侍郎洪咨䕫起居舎人蔣重珍同知辛酉以寧淮軍統制程芾為蒙古國通好使浙西路兵馬鈐轄王全副之各借金帶服繫尋以杜顯為添差通好副使詔知衢州蔡節削二秩以本郡㑹價低減故也二月甲子朔日有食之丁卯詔諸道提㸃刑獄以五月按部理囚徒癸酉歳星守氐辛巳臣僚奏乞下勅令所重修中書門下後省兩司通用條法成冊繳進頒降從之庚寅宰執奏乞宣示御製紀夢昌陵古律二十韻送之祕閣刋之琬琰從之初端平改元春三月庚子上齋居恭黙夜夢一真人峩冠佩玉略似藝祖色黧而貌恭延帝殿上真人即東席西鄉坐以賔禮揖上東鄉靣命洋洋俄而夢覺越三日宗臣善來以昌陵御容捧進如夢中真人毫髮無異上因述古律二十韻紀實至是因大臣之請而出之都省言太學生陳均編類本朝長編綱目進士陳文蔚所著尚書解註有益治道詔均文蔚並補迪功郎乙巳以曽從龍兼同知樞密院事真徳秀參知政事守吏部尚書兼給事中兼侍讀陳卓為端明殿學士同簽書樞密院事辛亥以權兵部尚書余鑄監察御史丁伯桂同提領㑹子所官公共措置商確收換事宜擇其可用條具來上乙卯詔令吏部尚書兼給事中兼修國史實録院修撰李􅐉專一提領髙宗皇帝正史四月都省言第十六十七界㑹子散在民間為數浩汗㑹價日損物價日昻若非措置收減無由増長詔令封樁庫支撥度牒五萬道四色官資付身三千道紫衣師號二千道封贈勅告一千道副尉減年公據一千道發下諸路監司州郡廣收兩界㑹子前權發遣肇慶府陳雷奮入對奏廣東民兵首領事上曰廣東民兵之制如何雷奮奏止為保衛鄉井無調發之擾無出戍之勞且臣所奏民兵不止為廣東設伏見陛下親政以來百度振飭未見成效大驗者何也良由竭東西之力養百萬之兵財力既竭内治不易兵力既殫外攘亦難願陛下於民兵加之意非惟可以摧奸雄之膽絶盜賊之萌當不費供億而盡得天下精勇之用上曰廣西曽行之否雷奮奏廣西前後帥臣未能行此然二廣賴民兵之用為多如向者廣東峒冦陳三搶之闕招捕陳韡正藉民兵叶力收獲如近者廣州戍卒之叛既是兵變自難以本州之兵制之崔與之實率首領民兵登城捍禦叛卒遂遁此皆已試之效陛下若由二廣推而行之澤被生靈者廣矣上首肯再三己巳以禮部郎官許應龍兼榮文恭王府教授太常寺主簿呉昌裔兼皇后宅教授庚辰宰執奏節用自貴近始積財在於節用律下當以身先乞將俸給自五月始減半幇支痛自樽節以示表厲從之乙酉刑部尚書李􅐉奏乞損俸給之半繼是卿監亦上損俸之奏詔不許丁亥太白晝見戊子夕有流星現出太白己丑榮恭王親属推恩補受有差五月癸巳朔監察御史李宗勉奏廟堂更化之始將兩界㑹子亟易勞費特甚行之道久折閲如故不告節用而省退官吏充為内外營繕支費浮泛懇從節約其監司帥守既無苞苴饋運之費儘可樽節以為秤提之助從之丙申雨雹詔罷和州防禦使主管殿前司公事趙勝以韓昱為帶御器械權主管殿前司公事王鑑帶御器械權主管步軍司兼馬軍司職事進知平江府張嗣古知嘉興府趙與􅊸官各一秩以酬和糴之勞壬寅宰執奏臣等智識凡闇不能服衆以致禁旅喧譁都民驚駭欲乞睿斷姑從鐫褫少伸國典以謝軍民詔不許甲辰以真德秀薨輟視朝尋詔贈銀青光禄大夫庚戌以喬行簡兼參知政事辛亥行國子監丞俞元廙進對奏軍閧之事上曰皆縁前帥紀律廢弛軍伍中都無鈐束六月癸亥詔令殿前司招刺一萬人補諸軍効用闕額都省言殿前司奏神勇軍卒過勝等二十一人作閧詔並依軍制告首人等第支犒補授本軍統制常思訓削二秩勒停徙淮西制司自効將佐責降有差甲子詔令殿前司步軍司馬軍司將紹定六年揀汰軍士年老無依尚堪披帶者且與存留請給續聽處分丙寅御集英殿策進士戊辰御幄殿閱武舉進士射戊寅以鄭清之為特進左丞相兼樞密使喬行簡為金紫光禄大夫右丞相兼樞密使己卯以資正殿學士提舉臨安府洞霄宫葛洪為資正殿大學士依舊宫觀庚辰流星晝隕壬午以曽從龍知樞密院事兼參知政事端明殿學士知廣州崔與之參知政事鄭性之同知樞密院事陳卓簽書樞密院事御集英殿賜進士呉叔告以下及第出身凡四百六十人甲申賜特奏名進士王聲叔以下同出身至州文學助教凡六百五十七人戊子録行在繫囚七月戊戌起居舎人袁甫奏並命二相所當盡心上副委任之意今中外多事而左相辭遜右相畏避各事形迹緩急若何乞宣諭二相力行一箇公字上曰卿議論極當甲辰秘書郎兼莊文太子府教授應㒡奏建儲事上曰此事祖宗自有典故㒡奏仁宗晩年因大臣有請方能為此髙宗春秋鼎盛未誕皇嗣乃能以天下為公選宗室子育之禁中真度越千古上曰朕今見欲推擇讀至宫中保護關繫非輕始髙宗定此議富直柔奏須是宫中有任責者方可髙宗聖諭已有區處是時劉賢妃為媫妤上曰憲聖慈烈皇后為才人又奏陛下既知之必有以處此保護一節闗繫非小願留聖慮上然之己酉臣寮奏乞明詔大臣同心協力事須執奏審處其當而行上不至有反汗之嫌下不見有過舉之迹更願陛下推心以待丞弼寛慮以圖治功從之閏七月壬戌朔祕書省正字王邁進對至並命二相責任惟均上曰朕常戒諭二相使之同心協力共濟國事讀至互為比周交信䜛説上曰外靣真如此邁奏若不戒飭恐成朋黨之風上曰朕任清之甚專但以天下多事非一相所可理故以行簡輔之行簡之用斷自朕心己巳禮部尚書魏了翁進讀大學因奏誠字雖係藩邸舊名攷之故事未嘗偏諱葢此字紀綱斯世而科舉文字皆避場屋未免疑惑乞聖語許免回避以廣陛下謙虛之意上曰自不必避丁丑新除兵部郎官丘岳進對至軍士貧悴上曰軍人所請不多適值物貴不足贍給軍心不安實原於此岳奏乞放行戰功及去夏河南暴露恩賞上曰已曽理㑹岳奏外間實未見施行戊寅喬行簡奏百司庶府俟宰相每日依時出堂之後方許退歸庶事務皆得及時剖决而無滯積之患詔行簡所陳深契朕意百司庶府並合遵行可榜朝堂壬午臣寮奏列郡兼簽攝官之弊乞飭吏部自今内地官吏注闕不必限以年齒兩淮京襄初任及再任不許注六十五以上人詔令吏部檢坐累降禁約指揮遍下諸路監司州郡各令遵守見入幕人並還本任臣寮乞宣諭沿江兩淮荆襄帥各釋私憾協志同謀調度通融急難相濟或玩視詔書復相疑貳者廢退之貼黄奏陛下鑒唐世之得失遵祖宗之舊制選大臣有實望者俾居督府或昇宣撫之任置之荆淮之間統帥列閫専其節制而緫事權不惟平居暇日調一其心臨事之際亦可如臂指之相使從之詔大理寺三衙臨安府属縣兩浙州軍决繋囚杖以下釋之仍蠲贓賞錢甲申詔倪思𫝊伯成先朝遺直可令有司議諡以聞乙酉詔故贈少師特進銀青光禄大夫趙方賜諡忠肅丙戌詔故保寧軍節度使魯國公安丙賜諡忠定丁亥臣僚奏京西湖北制置副使同措置唐鄧息等州營田捍禦邊靣全子才軍器監簿劉子澄以韃在唐州棗林下寨相繼夜遁遺棄攻戰具輜重之物乞行禠竄詔子才奪二秩衡州居住子澄奪二秩瑞州居住八月詔令浙西臨安平江嘉興鎮江府常州安吉守臣將未修復圍田許官民户承佃經理乙未新除太府寺簿王極進對奏邇來星變屢形於天軍變屢作於下秋成在望積陰多霖上曰幸稍開霽極奏更願陛下積誠以動天讀至新得是闕為之謀上曰近闕視以為常願陛下以髙宗為法命大臣闕諸軍之權勇度量邊防不致鹵莽上然之丙午闕安毅啓對曰國力未裕上曰財計可謂匱乏一薦奏塞蠧耗之原謹節用之道在陛下加之意讀至一賞罰以勵軍心上曰賞不勸戒不威雖唐虞不能化天下貼黄奏邊帥之心不一上曰邊帥不和最為利害讀至楮弊之䇿已窮上曰楮弊有何䇿奏云楮數所出既多銅錢所入無幾且預造十八界新㑹上曰若行十八界新㑹又恐民間皇惑奏云非欲更造一界㑹子行使止欲預造樁積為變通之備上然之癸丑臣寮奏上自宰執下及百執事毋徇于名而皆以務實為心内而朝廷外而郡國邊鄙毋侈乎名而皆以責實為政願察勤怠訪賢否行賞罰用黜陟執馭臣之柄明攷績之法從之乙卯以太師趙汝愚配享寧宗皇帝廟庭仍圗像于昭勲崇德之閣主管官告院錢相進對奏外而諸帥内而二相不相協和事㑹孔殷民情叵測讀至佩劒相笑矛盾相攻上曰諸帥已降親札戒諭相奏諸帥責任雖分體統則一若彼此不和緩急豈肯相應所闗利害不小上然之丁巳太白犯太微垣左執法星新知建昌軍徐㮚辭奏江淮海道利害上曰淮兵不為不多㮚奏義勇忠義雖多正兵甚少上曰義勇亦自可用㮚奏皆沿淮戀土之民人人可用又奏秋髙馬肥之備上曰近來邊報不一㮚奏當用間諜嚴邊備上曰不可不嚴為之備九月己巳都省言兩界㑹子數多監司郡守奉行秤提不䖍欲下諸路州縣令有官之家簮纓之後及寺觀僧道並按版籍每畝輸十六界㑹子一貫願納十七界者並從各州截角類解赴封樁庫交納其將相勲貴之家御前寺觀曽被受指揮特免科役去處毋得寅縁規免仍不許敷及佃户違許越訴從之丙子監察御史李宗勉奏乞詔大臣檢照鄭寅等所陳節用項目詳加審訂始自宫掖次而朝廷又次而郡國皆以節省為務毋牽私情毋惑浮議日計之雖不足歳計之則有餘仍出内帑所儲收兩界溢數㑹子行之數載自有成功從之己丑詔端平親政以來務革前弊禁約求舉馳書事目之類近聞循習如舊害政尤甚自令内而百司外而臺郡月具無請托事申御史臺仍令常切覺察十月前知循州林起莘進對奏乞明訓大臣凡建政立事必務謹重逆料其利害熟察其是非然後出為號令播之四方發必中節用必當理自然孚信於人心上然之十一月癸亥日南至羣臣朝賀乙丑詔知樞密院事兼參知政事曽從龍為樞密使督視江淮軍馬禮部尚書魏了翁為端明殿學士同簽書樞密院事督視京湖軍馬以同知樞密院事鄭性之兼權參知政事戊辰詔給兩督視府隨軍支用之費金各一千兩銀各五萬兩度牒各一千道㑹子各五百萬緡壬申新除都官郎官葛逢進對奏趙范趙葵陳韡素不同心上曰置兩督視須可使諸將協和逢又奏人才難得過有小大當多事時亦當斟酌而用之上曰有過者不可例棄甲戌臣寮奏宣召宰執夜對詞臣與命從臣條具闕失百官陛奏則與之論經武擇將治兵理財皆有孝宗故事乞以為法又奏冦犯蜀境制臣趙彦呐連年調度師老財殫兵分力薄若上流不固則呉楚有衝决之勢願以保蜀為念倘有申請悉為報從或遣襄陽援兵早為起發諸司應予錢物無分彼此悉力傾助以扶其危從之戊子安南國進貢方物詔下封樁庫收管辛亥雷丙申端平三年正月已未朔御大慶殿羣臣朝賀詔以星行失度雷發非時免天基節上壽大宴羣臣三上表請不許宰執奏輔政無狀乞加顯黜以荅天譴仍免貢院錫宴亦皆不許癸未大理評事趙崇森進對奏乞守臣監司臺諫互察貪吏上曰貪吏誠不可不治二月己丑大理評事趙崇微進對奏乞弭天變於未然上曰不可無敬畏之心又奏今日不可玩者在乎邊兵上曰北軍多有可慮方思有以安之甲午前知安豐軍王瓉進對奏今日備邊之計冝於新復州軍留息以衛光留壽春以衛安豐留泗以衛招信留漣水以衛山陽此外不必經理上曰朝廷正要如此區處庶可安邊息民瓉又奏陸贄論沿邊事冝以節制多門為慮上曰開督府正欲統一事權己酉以端明殿學士魏了翁為簽書樞密院事甲寅以雨澤愆期詔中外决繫囚杖以下釋之三月戊午朔詔前知光化軍扈斌特與貸命追毁出身以來文字送廣東摧鋒軍拘管以其棄城也辛酉廣東經略安撫司彭鉉奏紹州英德府大水詔令本司多方措置賑䘏癸未太學録鄭斗祥進對奏邊事方急莫有任其責者上曰邊事如此任事無人如何斗祥奏此士大夫畏事之過願陛下奮發剛斷大明黜陟庶幾人樂為用上曰然又奏天下無全才惟陛下兼收並用隨才而器使上曰用其所長當護其短四月己亥試將作監兼知臨安府事顔頥仲進對奏敬天以實不以文上曰朕此心未嘗不敬又奏用人當久任上曰用得其人不必數易又奏人主一心攻之者衆上曰常持敬心則不為外物所移頥仲奏陛下此言誠可以對越天地丙午詔以今年九月有事于明堂惟事神儀物諸軍賞給悉循舊制其乗輿服御中外用度並從省約仍令條具以聞戊申新權知梧州黄亦奏二廣兵備上曰二廣去朝廷逺全賴守臣撫摩癸丑詔曰朕猥以𦕈躬獲承丕緒率寧人有指疆土亦大惟艱予小子若涉春冰罔知攸濟自江閩之羣盜弗靖塈淮楚之餘黨為妖數年之間多難已甚属金人之寖滅而蒙古之與鄰不利西南葢嘗躪階成而擾興沔其在辛卯遽乃穿金房以瞰襄樊逮合謀成破蔡之功恐假道有及虞之勢心之憂矣臍可噬乎固將布告於國中以志吾過但使留屯於塞上自守我疆忽西陲之弗寧駭北騎之深入頼仙原有以議後而蜀道得以安全然虐焰之所經眎曩歳而尤慘重以唐均之叛將發此京湖之禍機肆荼毒於列城至蔓延於他路兵民之死戰鬬户口之困流離室廬靡存骼胔相望致援師之暴露及科役之繁苛為之騷然有足憫者是皆朕明不能燭德有未孚上無以格乎天之心下無以定乎民之志遂令有衆多告非辜朕方施令發政以為緩輯之圗補卒蒐乗以嚴守禦之備想瘡痍之溢目如疾病之在身更頼文武一心忠良協力與斯民而共守措吾國於多盤咨爾羣僚體予至意六月癸巳直煥章閣知慶元府沿海制置趙與􅊸朝辭因奏近士大夫專以議論相尚未嘗真見利害之實故自更化以來美意雖多實政未究上曰虛論誠無益於國趙與􅊸又奏沿海便宜及三邊事體上曰慶元控制海道事任不輕如招軍造船團結訓練等事宜一一留意施行丁酉録行在繫囚己亥洪咨䕫上遺表詔咨䕫鯁亮忠慤有助親政可特與執政恩數壬寅新權發遣泰州蔡節朝辭奏皇嗣未立上曰祖宗自有典故見今討論癸卯熒惑填星告于畢甲辰右正言李韶言江西憲司奏吉州太和縣豪民陳聞詩脅取鄉民田産殞死者數人冒越省議假手奏名有司勘究具得其實事上于朝尼而未行官弱民強漸不可長乞將聞詩同進士出身駮放仍照條坐罪從之戊申直寳謨閣知婺州陳庸熈進對奏當舉皇祐典禮以太祖太宗寧考並配于明堂詔令禮部太常寺討論以聞七月丁卯以同知樞密院事兼權參知政事鄭性之為參知政事權刑部尚書兼給事中李鳴復為端明殿學士簽書樞密院事壬申詔出封樁庫千緡下祕書省修渾儀刻漏從太史局之請也甲申雨血丁亥詔鄭清之為明堂大禮使喬行簡禮儀仗使李鳴復為鹵簿使兵部尚書趙彦悈橋道頓逓使癸巳以久雨詔出端平倉米千石賑糶以平市直乙未宰執奏調燮無狀陰雨為災乞從竄斥表三上詔不許乙巳以霖雨害稼命近臣禱于天地宗廟社稷及宫觀岳瀆等處大理正王潩進對奏更化願治三年于兹而天變見于上人心摇于下上曰比年以來中外多故朕未嘗一日不憂懼戊申監察御史王極奏邇來二浙諸郡雨水為沴禾稼害於垂成乞下有司預樁錢米賑贍災傷併下倉漕兩司議蠲稅賦仍録貧乏速議賑濟從之己巳朝獻景靈宫庚午朝饗太廟雷辛未大饗明堂赦天下九月癸酉上手札以季秋仲辛雷聲驟發上天示譴恐懼修省避正殿減膳徹樂求直言令學士院降詔詔曰朕以眇躬獲承大統十有三年于兹惟德弗類不敢寧于上帝命兢業祗懼夙夜靡渝比歳以來時事多虞日思艱大若涉淵冰罔知津涯廼季秋仲辛朕方齋精秉純為民請命祈福于天地祖宗冀幸神靈顧荅乂我受民以輯寧我邦家而將事之夕天大雨雷非時發聲明威震怒炳然甚著厥咎不逺在予一人朕不勝憂畏今避正殿減常膳命有司非祠祀毋得舉樂側身省愆猶懼弗蔇其令小大之臣下至民庶推原致菑之由敷陳銷變之䇿凡朕躬過失朝政闕違悉意以言靡有所隱以告中外咸使聞知乙亥詔左丞相鄭清之右丞相喬行簡並觀文殿大學士醴泉觀使兼侍讀以資政殿大學士崔與之為右丞相兼樞密使詔曰朕比藏明禋雨雷傾迅天心示戒在于朕躬輔弼之臣控章引咎聮車迭去抗志莫留勉徇髙懐俾安祠秩疇咨一相已遣蒲輪雖鼎軸暫虚而執政與宰相同令鄭性之李鳴復時暫協力賛治無負朕倚注之意戊子上手札曰喬行簡三朝元老一代鴻儒趨中使以宣回盍示冕旒之眷對經筵而進讀庸彰體貌之恩勉為朕留竚聞忠告丙午行大理寺丞趙綝進對近者暴雨疾雷上下震懼罔知所自冝有以荅上天之變上曰朕未嘗不恐懼修省綝奏天災流行時所未免陛下禱祈切至中外聳聞但願此心罔間庶幾可以回歉歳而為豐年安南國陳日上表進貢制授金紫光禄大夫充静海節度管内觀察處置等使安南國王食禄一千户仍賜効忠順化功臣襲衣金帶十一月丙辰臣寮奏冦踐荆襄士馬潰失諸郡月運錢糧乞下湖廣緫所具實來上按月督趨通前頓積以備收復招募之用從之庚申新除度支郎官兼權左司郎官趙必愿進對奏近臣除授意向不明况當天下事變方殷之日上曰天下正多事又奏虚鼎席以召故老或者意其未必來上曰崔與之既未來朕委政事於二參必愿奏二參固同心輔政然堂堂天朝豈容不早命相上曰然壬戌新除倉部郎官蔡節進對上曰崔與之辭免已到未知幾時可來節奏與之年髙地逺病日半之臣料未必能來上曰相位固不可久虚然亦欲委任得人節奏天下之勢危若累卵不可一日無相上曰卿言極當乙丑以喬行簡特進左丞相兼樞密使進封魯國公戊辰日南至詔議改元以示作新之意有司詳議以聞詔曰朕嗣大歴服于兹十有三年宵旰圗治慄慄祗懼永惟孟子手足腹心之言凡所以待遇士大夫者未嘗不忠且厚也比年以來鮮亷寡耻相師成風背公營私恬不知省大言無當者敢以傲誕而不䘏肆行無忌者習於欺罔而不悛因循茍且玩歳愒日由内而外靡然同流士大夫朕之所尊禮任之以為股肱心膂者趨向若此朕何頼焉矧今内則百度之未修外則四郊之多壘國事如此寧不動心倘不易轍而改絃何異抱薪而捄火朕於履長之日申訓迪之言咨爾文武小大之臣各冝體一陽來復之義思君子道長之理清白一心澡滌故習以稱予一人孜孜求治之意則予汝嘉其或不䖍朕不敢赦壬申都省言邊報日急禦冦之䇿貴在合謀詔令侍從兩省臺諫卿監宰掾樞属郎官館學各隨已見條陳方略上于三省樞密院務在的切可行不必徒事文詞詔蠲被水州郡新舊苗稅監繫贓賞等錢及民間逋欠轉息過本者先是臣寮有請于朝令户部詳度來上故有是命十二月辛卯軍器監兼權樞密副都承㫖玉埜進對奏聮絡江淮賑䘏邊民討捕盜賊上曰江淮之勢如何埜奏不過重一閫之權以統之上曰流民可念埜奏流民紛紛蟻聚弱者困斃強者剽掠上為之蹙額上曰江西之冦尚未平埜奏冦始於衡之酃縣侵犯吉州今南安峒冦又發建昌之功豐邵武之建泰亦有挺動向有淮兵可調今無以應遂集鄉手及合禁軍共為勦除非以一官兼緫兩路討捕之事則權不一上曰如三路節制之類埜奏政是如此願陛下深思之上曰然詔曰朕以菲質撫有多方德不足以庇民威不足以服逺致兹草冦犯我邊陲使百年生聚之人罹一旦流亡之苦朕為民父母使爾百姓至於此極深用痛傷竊慮流民所至之地有司或不能體朕愛民如子之意有失存拊可令沿江州郡如遇江北流民入界仰多方措置存著無令暴露仍於有管官錢米内支撥捄濟其間有強壯願為軍者填刺軍額收管請給庶幾不致失所以稱朕勞來安集之意壬寅左諫議大夫兼侍讀李宗勉奏沿江諸郡所主單弱防䕶甚踈安有餘力為勞來安集之舉若不别作措畫深恐詔㫖徒為羙觀如安豐濠梁歴陽管下開順六合含山等處居民渡江強壯留在江北結寨拒守恃其聲勢因而作過不早收拾輾轉滋蔓猝難殄戮恐為敵人所得合從朝廷詳酌科降錢糧告牒令沿江淮西制置司亟作措置凡流民過江北者令陳韡存䘏強壯之留淮北者令史嵩之遣官招募如不願者發還本處籍為民兵從之甲辰詔以來年為嘉熈元年又詔聖節有宴葢常儀也國家閒暇宇内歡樂講此為宜三邊騷動戰守之士日冒於鋒鏑流徙之民逺去於鄉閭朕方慘怛於懐不遑暇食又何敢作樂備禮以舉為壽之觴其天基節集英殿大宴可權罷以見朕憂邊之意詔措置㑹子已降黄牓務在必行尚慮監司守令或有庸謬縱吏為姦不知體國任意沽名奉行不力非獨㑹價不登亦恐朝廷威令寖弛可令兩監察御史覺察彈奏宋史全文卷三十二
