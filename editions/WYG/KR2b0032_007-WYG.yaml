body:
  text: 宋史全文卷七上宋仁宗一癸亥天聖元年春正月丙寅朔皇太后詔改元上讀詔號泣者久之謂左右曰朕不忍遽更先帝之號也自宋興而吳蜀江南荆湖南粤皆號富强相繼降附太祖太宗因其畜藏守以恭儉簡易方是時天下生齒尚寡而養兵未甚蕃任官未甚冗佛老之徒未甚熾外無夷狄金繒之遺百姓亦各安其生不為巧偽放侈故上下給足府庫羡溢承平旣久户口嵗增兵籍益廣吏貟益衆佛老夷狄耗蠧中國縣官之費數倍昔時百姓亦稍縱侈而上下始困於財矣三司使李諮嘗奏事兩宫言戍兵雖未可減其末作浮費宜一切裁損塩鐵判官俞獻卿亦言天下糓帛日益耗物價日益高稻苖未立而和糴桑葉未吐而和買自天僖以来日侈一日宜與公卿大臣朝夕圖議而救正之上納其言癸未命御史中丞劉筠提舉諸司庫務薛貽廓與三司同議裁減冗費講義曰我朝之財始蠧於天僖祥符再蠧於寶元慶歴自禱祠之事興而宫室之役起內之帑藏稍已空竭則省浮費之䇿不得不申明於天聖之年也自元昊叛於西􅆻丹擾於北外之財用不免告匱則節冗費之說不得不條畫於慶歴之日也庚寅計置司考茶法利害請行貼射之法以淮南十三場茶買賣本息併計其數罷官給本錢使商人與園户自相交易一切定為中估而官收其息然必輦茶入官隨商人所指而與之給劵為驗以防私售故有貼射之名筆談曰舊傳茶有三説見錢為一説犀角香藥為一説茶為一説此乃三説法予在三司求為三説乃是博糴便糴直便為三說博糴者極邊粮草便糴者㳂邉粮草直便者商人取便於㳂邉入納見錢於京師請領自虚估之利入於商賈而後行貼射之法自邉糴償於見錢府藏不繼而後復用三說之法然貼射之法雖通商而官實盡其利三說之法雖官鬻而商實受其利二法俱弊而後以嵗課均之茶户焉夫以一嵗之息均賦茶户恣其賣買所以均民力也所以惠商賈也官則無濫朽腐敗之弊茶則無草木塵煤之雜其法善矣然向時摘山者受錢於官今使之納錢於官向時冒法販禁者被罰令均賦於民賦不得入刑亦及之向時商賈貿遷州縣收其税今商賈不行則稅額不登國用亦乏夫其法方行於嘉祐之四年而其害亦見於嘉祐之五年劉敞之疏又其後也茶租猶故𣙜法復生此楊中心所以痛心於崇寧之變法也三月司天監上新厯賜名崇天保章正張奎靈臺郎楚衍等所造也夏四月上初即位丁度上書論六事一增勸講官二增諫貟三補䕃用大功以上親四選河北河東役兵補禁軍五籍令佐墾田為殿最六凡緣公事坐私罪杖者聼保任遷官又嘗獻王鳯論於皇太后以戒外戚云五月癸亥朔太常博士鞠詠王軫法當磨勘審官引對上閱其治狀並除監察御史秋八月太常博士曹修古為監察御史孔延魯劉隨並為左正言延魯初為寧州軍事推官有蛇出天慶觀真武殿中一郡以為神州將帥官屬徃奠拜之延魯以笏撃蛇碎其首觀者莫不歎服後知仙源縣主孔氏祠事孔氏故多縱放者延魯一繩之以法修古上四事曰行法令審故事惜財力辨忠邪辭甚切至甲寅有芝生於天安殿柱召輔臣觀之監察御史鞠詠言陛下新即位河決未塞霖雨害稼宜思所以應災變臣願陛下以援進忠良退斥邢佞為國寶以訓勸兵農豐積倉廩為天瑞草木之怪何足尚哉先是錢惟演自河陽赴亳州因朝京師圖入相詠奏惟演憸人嘗與丁謂為婚姻緣以大用後揣知謂姦將敗露懼牽連及禍因出力攻謂今若遂以為相必大失天下望太后遣內侍持奏示之惟演猶顧望不行詠語左正言劉隨曰若相惟演當取白麻廷毁之惟演聞乃亟去馮拯病太后有復相王欽若意上嘗為飛白書王欽若字太后因取字緘湯藥合遣中人齎以賜且口宣召之九月丙寅馮拯罷爲武勝節度使判河南府欽若守司徒兼門下侍郎平章事拯為相氣貌嚴重宦者傳詔至中書不延坐欽若再入中書謂平時百官叙進皆有常法為叙遷圖以獻兾便省覽然欽若亦不復能大用事如真宗之時矣戊寅召輔臣於崇政殿西廡觀馮元講論語仍賜御飛白書九月戊戌冦凖卒於雷州初太宗嘗得通天犀命工為二帶一以賜準及是準遣人取自洛旣至數日沐浴具朝服束帶北面再拜呼左右趣設卧具就榻而沒歸葬西京道出荆南公安縣人皆設祭於路折竹植地掛紙錢焚之踰月枯竹盡生笋衆因為立廟號竹林冦公祠癸丑詔審官院自今知州軍同判知縣人並引對於便殿十一月知連水軍鄧餘慶受枉法贓三陽寨主荆信監倉自糴粟監興平縣酒稅何承勛進賢鎮鹽酒稅易著明並自盗官物各杖脊配廣南壬寅詔以餘慶等罪狀申警羣吏初蜀民以鐵錢重私為劵謂之交子以便貿易富民十六户主之其後富者稍衰不能償所負争訟數起大中祥符末薛由為轉運使請官置交子務以㩁其出入戊午詔從其請始置益州交子務吕中曰此楮幣之始也然其有錢以行楮有楮以權錢子母均通而無偏重之患故民視錢猶楮視楮猶錢今則為是幣而初無是錢以虚架虚宜乎楮幣之不行也十二月江州民陳藴聚居二百年食口二千而藴年八十且有行義州以聞上曰良民一鄉之表旌之則為善者勸矣授藴本州助教甲子天聖二年春正月命御史中丞劉筠等四人權知貢舉戊申吏部銓引對選人前束鹿縣尉王得說歴官寡過書考最多而無保任者上察其孤孑特擢為大理寺丞賈積善者十四考無公私過雖無舉主特擢為京官二月乙酉工部侍郎知徐州李應機坐前知兖州貪暴不法降授將作監分司南京上曰外臺耳目所寄當職靡言咎將誰執丙戍詔轉運使劉明恕李允元提㸃刑獄尚霖郭位各贖銅二十斤三月先是上封者言經學不究經㫖乞於本科問䇿一道至是對者多紕繆帝以執經肄業不善為文特令取其所長用廣仕路癸卯王欽若等上真宗實錄一百五十卷乙巳御崇政殿賜宋郊葉清臣鄭戩等一百五十四人及第四十六人同出身不中格者六人以嘗經真宗御試特賜同三禮出身丙午又賜諸科一百九十六人及第八十一人同出身郊與其弟祁俱以詞賦得名禮部奏祁名第三太后不欲弟先兄乃推郊第一而置祁第十劉筠得清臣所對䇿竒之故擢第二國朝以䇿擢髙第自清臣始秋七月遣殿中侍御史王碩内殿押班朱緒㸃檢山場所積茶初朝廷旣用李諮等貼射法行之朞年豪商大賈不能軒輊為輕重而論者或謂邊糴償以見錢恐京師府藏不足以繼争言其不便㑹江淮制置司言茶有滯積壞敗者請一切焚棄朝廷疑變法之弊下書責計置司因令碩等行視旣而諮等條上利害願力行之無為流言所易於是詔有司榜諭商賈以推行不變之意監察御史張逸為益州路提㸃刑獄勸農使逸先知襄州鄧城縣有能名知州謝泌將薦逸先設几案置章其上望闕再拜曰老臣為朝廷得一良吏乃奏之八月巳夘幸國子監謁先聖文宣王召直講馬龜符講論語已而觀七十二賢贊述閲三禮圖問侍講馮元三代制度又幸昭烈武成王廟壬午翰林學士承㫖李維等請加上眞宗諡曰文明武定章聖元孝詔恭依十一月乙未朝享玉清昭應宫景靈宫丙申享太廟丁酉合祭天地于圜丘大赦乙巳立皇后郭氏乙丑天聖三年春二月禮部員外郎蔡齊直史館章得象並知制誥初召齊等試中書上閲其試文謂宰臣曰兩制詞臣以文章為職業然湏才識周敏操履端方乃可副朝廷中外任使也夏四月劉曄知河南府􅂱先世代郡人後魏遷都因家河南唐末五代之亂衣冠舊族出系無所考惟劉氏自十二代祖北齊中書侍郎環雋至曄十一世皆葬河南而世牒具存曄嘗權發遣開封府事獨召見太后問曰知卿名族欲一見卿家譜恐與吾宗同也曄曰不敢他日數問之􅁮無以對因為風眩仆而出乃免五月己亥賜杭州隐士林逋粟帛秋八月知益州薛由言本州解發舉人自張詠以来例給館劵至京師今得三司移文乃責吏人償所給官物恐非朝廷之意上曰漢貢士皆郡國續食今獨不能行之逺方邪其令悉蠲之李諮等旣條上茶法利害朝廷亦牓諭商賈以推行不變之意然論者又争言其不便辛未命孫奭夏竦盧士倫王碩盧守懃再加詳定九月詔見任并帶職京朝官磨勘更立四年之限冬十月翰林學士晏殊為樞宻副使庚午宰臣王欽若為譯經使十一月孫奭等言十三場茶積未售六百一十三萬餘斤盖許商人貼射則善茶皆入商人其入官者皆麄惡不時故人莫肯售又姦人倚貼射為名強市盜販侵奪官利其弊如此不可不革請罷貼射法官復給本錢市茶而商人入錢以售茶者宜優之庚辰詔從奭等議自是河北入中復用三說法舊給東南緡錢者以京師㩁貨務錢償之戊申王欽若卒皇太后臨奠錄親属及所親信二十餘人國朝以来宰相恤恩未有欽若比者欽若狀貌短小項有附疣時人目為癭相性傾憸敢為矯誕太后以先朝所寵異故復命之十二月癸丑樞宻副使尚書右丞張知白加工部尚書平章事國朝故事叙班以宰相為首親王次之使相又次之樞宻使雖檢校三師兼侍中尚書中書令猶班宰相下乾興初王曾由次相為㑹靈觀使曹利用由樞宻使領景靈宫使時以宫觀使為重詔利用班曾之上然議者深以為非至是曾進昭文館大學士玉清昭應宫使同集殿廬將告謝而利用猶欲班曾上閤門不敢裁帝與太后坐承明殿久至遣押班江徳明趣閤門閤門惶惑莫知所出曾抗聲目吏曰但奏宰相王曾等告謝班旣定利用鬰不平帝與張士遜慰曉之庚申詔宰臣樞宻使序班如故事而利用志驕尚居次相張知白上及聞召張旻於河陽為樞宻使疑代已始悔懼焉殿前副指揮使楊崇勲嘗詣中書白事属微雨新霽崇勲穿泥鞾直登階曾頷之不以常禮延坐崇勲退劾奏其失送宣徽院問狀翌日對上請傳詔釋罪太后問其故曰崇勲武夫不知朝廷之儀舉劾者柄臣所以振紀綱寛釋者人君所以示恩徳如此則仁愛歸於上而威令肅於下矣癸亥徙丁謂雷州司户參軍丙寅天聖四年春正月己亥命知制誥章得象侍御史知雜事韓億與吏部流內銓南曹同試百司人上因曰比閱天下奏吏出職者多敗官何也王曾曰士人入流必顧亷耻若流外則畏謹者鮮州縣雖卑然最近於民宜少澄其原乃詔得象等精加考試二月詔官吏犯贓至流而按察官不舉者并劾之壬戍遣官祀九宫貴神上問古今樂之異同王曾曰古樂用於天地宗廟社稷山川鬼神而聼者莫不和悅今樂則不然徒娯人耳目而蕩人心志自昔人君流連荒亾者莫不由此上曰朕於聲技固未嘗留意內外燕遊皆勉强爾夏四月還知寧州楊及所獻繡佛初及因乾元節來獻上謂輔臣曰及佞人也民安政舉乃守臣之職焉用此為江州言太平興國真君觀有盗神像金冠者請更製上曰觀僻在山谷間而以金為冠是誨人為盗宜代以銅而金塗之王曾退言慮民抵罪而易金以銅可謂仁矣五月判刑部燕肅上奏曰唐決死刑京師五覆奏諸州三覆奏自是全活甚衆貞觀四年斷死罪二十九開元二十五年才五十八今生齒未加於唐而天聖三年斷大辟二千四百三十六視唐幾至百倍望準唐故事天下死罪皆得一覆奏下其章中書王曾以為天下皆一覆奏則必死之人徒充滿狴犴而久不得決請獄疑若情可矜者聼上請壬午詔天下死罪情理可矜及刑名疑慮者具案以聞有司毋得舉駁己亥詔舉人雖文辭可採而操檢不修者州郡毋得薦送閏五月定江淮嵗漕米課六百萬石初景徳中嵗不過四百五十萬石其後益至六百五十萬石故江淮之間榖常貴而民貧於是都官貟外郎吳耀卿請約為中制然東南灾儉輒減嵗漕數或巨萬或數十萬又轉移以給他路者有焉甲子詔輔臣於崇政殿西廡觀宋綬等讀唐書上曰朕覽舊史毎見功臣罕能保始終者若裴寂劉文静皆佐命元功不免誅辱王曽對曰寂等之禍良由功成而不知退也詔增西川廣南東西路諸州軍進士解額有差又詔命官鎖㕔應舉自今更不先試所業下第者免責罰仍聼再舉其歴任有贓私罪及停廢責降衝替未經叙用人即不許應舉舊制鎖㕔應舉者先於所属選官考試所業方聼取解至禮部程文紕繆者勒停其不及格者猶贖銅永不得應舉至是上欲開誘進士之路下近臣參議而降是詔六月庚寅大雨震雷平地水數尺壞京城民舍壓溺死者數百人辛夘上避正殿減常膳丁酉徳音降天下囚罪一等徒以下釋之畿內京東西淮南河北民田被水者蠲其租流徙者所在撫存之詔三司所在官物為水漂失者皆蠲除之水之作也宰執方晨朝未入俄有㫖放朝王曽亟附中使奏曰天變甚異乃臣等燮理無狀豈可退安私室恬然自處亟請入見陳所以備禦之道同列有先歸者聞曽如是皆媿服焉時又傳言汴口決水且大至都人恐皆欲東奔上以問曽曽曰河決恐未至此苐民間訛言不足慮已而果然秋七月罷永興軍秦坊等新醋務初陜西轉運司置務𣙜之請推其法天下王曽曰𣙜酒盖出於前代之不得已未能省去若又𣙜醋則甚矣故罷之辛未詔兩川所造錦綺鹿胎透背欹玉等嵗減上供之半其大小綾及花紗仍令改織絹以供邊費上嘗謂輔臣曰比以大暑罷講讀適已召孫奭等說書卿等公事退可蹔至經筵王曾曰陛下萬幾之暇留意經術雖炎暑不輟有以見聖學之髙明也九月戊申三司請市糴芻粟上因問輔臣諸坊監牧馬幾何王曽對曰當今比五代馬多數倍計芻秣費嵗不下數百萬盖措置利害失其要若以陜西蕃部入中馬立定數餘聼民間市易二三年間必大蕃息此與畜之外廐無異也上然之辛未廢襄唐二州營田務以田賦民毎頃輸稅五分壬申命翰林學士夏竦蔡齊知制誥程琳等重刪定編敕帝問輔臣曰或謂先朝詔令不可輕改信然乎王曽曰此憸人惑上之言也咸平中刪太宗朝詔令十存一二盖去其煩宻之文以便於民何為不可今有司但詳其本末又須臣等審究利害一一奏稟然後施行也上然之冬十月辛巳出內藏庫緡錢二十萬下京西路糴軍儲十二月詔京城物價翔貴其令三司出廩米散置糴場數十第取半價民争赴之凡出米六十萬斛三司下畿縣買素食物料提㸃公事張嵩以畿內灾歉乞收采於市上問輔臣曰此何所用王曽等對曰御庖所須也上曰豈可以口腹擾民其悉罷之丁夘天聖五年春正月壬寅朔上率百官上皇太后夀於㑹慶殿癸丑命樞宻直學士禮部侍郎劉筠權知貢舉己未詔禮部貢院比進士以詩賦定去留學者或病聲律而未得騁其才其以䇿論兼考之諸科毋得離掇經注以為問目庚申降樞宻副使晏殊知宣州先是太后召張耆為樞宻使殊言耆無􅈴勞天下有私徇非才之議太后不悦於是從幸玉清昭應宫從者持笏後至殊怒撞以笏折其齒監察御史曹修古王㳂等劾奏殊坐是免尋改知應天府殊至應天府乃大興學范仲淹方居母喪殊延以教諸生自五代以来天下學廢興自殊始大事記曰幹父之蠱易幹母之蠱難以太后親政之時而晏殊仲淹修古之徒敢於忤㫖則直言之風雖奮發於慶厯之時而實胚胎於天聖之初矣二月知寧州楊及上所修五代史上謂輔臣曰五代亂離事不足法王曽曰雖然安危之迹亦可為鑒也三月賜進士王堯臣等一百九十七人及第八十一人同出身七十一人同學究出身二十八人試銜丙寅賜諸科及第并出身者六百九十八人夏四月試特奏名進士諸科同出身凡三百四十二人辛夘賜新及第人聞喜宴于瓊林苑遣中使賜御詩及中庸篇一軸上先命中書錄中庸篇令張知白進讀至修身治人之道必使反復陳之壬辰夀寧觀火六月宰臣張知白言按五行志宫室盛則有火災請自今罷不急營造以答天戒上納其言秋七月王曾等言夏秋大旱毒氣中人此洪範所謂僣常暘若也皆臣等輔政無狀以致厥咎上曰朕亦夙夜循省其變豈徒然哉當與卿等共修政事以答天戒爾八月先是司天監主簿苗舜臣等嘗言土宿留參太白晝見詔日官同考定日官奏土宿留參順不相犯太白晝見日未過午舜臣等坐妄言災變被罰監察御史曹修古言日官所定希㫖悦上不足為信今罰舜臣等其事甚小然恐自此人人畏避佞媚取容以災為福天變不告取損至大禁中以翡翠羽為服玩詔市於南越修古以為重傷物命且真宗嘗戒採毛故事未逺宜罷之時方崇建塔廟議營金閣費不可勝計修古極陳其不可壬申修古出知歙州九月陜西轉運使言同華等州旱虸蚄蟲食苗秘閣校理謝絳上疏曰去年京師大水今年苦旱此皆大異也宜下罪已之詔修順時之令宣羣言以無壅斥近倖以損隂而聖心優柔重在改作號令所發未聞有以當天心者夫風雨寒暑之於天時為大信也近日制命有信宿輒改適行遽止而欲風雨以信其可得乎己未知制誥程琳為諫議大夫權御史中丞宰相張知白最善琳當除命喜曰不辱吾筆矣琳上疏請罷諸土木營造蠲被火郡縣逋租冬十月丙申滑州言塞決河畢十一月百官稱賀遂燕崇徳殿自天禧三年河決至是積九載乃復塞始役旣興朝議以嵗飢將復罷知州冦瑊言病民者特芻藁爾幸調率已集若積之經年則朽腐為棄物乃詔訖役癸丑合祭天地於圜丘大赦賀皇太后於㑹慶殿十二月左正言直史館孔道輔為左司諫龍圖閣待制時使契丹猶未還契丹優人以文宣王為戲道輔艴然徑出北使主客者邀道輔還坐且令謝道輔正色曰中國與北朝通好以禮文相接今俳優之徒侮慢先聖而不之禁北朝之過也道輔何謝敵君臣嘿然又酌大巵謂曰方天寒飲此可以致和氣道輔曰不和固無害旣還言者以為生事且開争端上問其故道輔曰契丹比為黒水所破勢甚蹙毎漢使至輒為侮慢若不校恐益易中國上然之戊辰天聖六年春正月詔諸路提㸃刑獄朝臣交割本職公事與轉運使副或言提㸃刑獄官過為煩擾無益於事故也庚申上封者言進士及第本以辭藝進而比来多乞賜子孫科名又閤門祇候太宗朝其員至少今權要之家比援恩例而濫進者多請一切罷之從之仍著為令二月同知禮院王皥言諡者行之表也善行有善諡惡行有惡諡盖聞諡知行以為勸戒近日臣寮薨卒雖官品合該擬諡其子弟白知父祖别無善狀慮定諡之際斥其繆戾皆不請諡欲乞今後臣寮薨謝並令有司舉行如此則隐匿無行之人有所沮勸詔從之工部尚書平章事張知白卒知白在相位惜名器無毫髪私常以盛滿為戒雖顯貴其清約如寒士三月壬子樞宻副使張士遜為禮部尚書平章事癸丑姜遵為樞宻副使己未范雍為樞宻副使仍班姜遵之上壬戍詔於順天門外八角鎮建西太一宫夏四月甲申旦有星大如斗自北流至於西南光照殿庭有聲如雷尾長數丈久之散為蒼白雲庚寅徳音以星變齋居不視事五日降畿內囚死罪流以下釋之罷諸土木功賑河北流民過京師者時命僧道禬禳於文徳殿殿中侍御史李紘奏曰文徳殿布政㑹朝之位毎灾異輒聚緇黄讃唄其間何以示中外監察御史鞠詠條上應變五事六月乙酉出內藏庫緡錢二十萬下京西轉運司市糴軍儲秋七月以左司諫劉隨知濟州隨在諫職前後所論甚衆帝旣益習天下事而太后猶未歸政隨請軍國常務専稟帝㫖太后不悦㑹隨請外因命出守丙辰以蔡齊為龍圖閣學士知河南府羅崇􅈴趣齊上修景徳寺記曰參知政事可得也齊故遲其記不上崇􅈴怒讒於太后命齊出守參知政事魯宗道固争留之不能得尋以親老易宻州太后諭宰相取記齊始上之八月詔河北水灾州軍免今年秋稅初王曾曰邊郡數大水盖洪範所謂不潤下之證宜寛民賦以答天災故有是詔張九齡九代孫錫以九齡告身及明皇批答米獻上謂輔臣曰九齡唐名相也宜旌其後即授試國子四門助教九月太常少卿直昭文館陳從易為左司郎中兵部郎中集賢院修撰楊大雅並知制誥自景徳後文士以雕靡相尚一時學者向之而從易獨自守不變與大雅特相厚皆好古篤行無所阿附朝廷欲矯文章之弊故並進從易及大雅以風天下冬十一月翰林學士宋綬等上所撰天聖鹵簿記十卷初郊祠綬攝太僕卿陪玉輅帝問儀物典故占對辨洽因使綬集官撰記十二月甲子以大理評事范仲淹為秘閣校理初仲淹遭母喪上書執政請釋郡守舉縣令斥游惰去冗僣遴選舉敦教育養將才實邊備保直臣斥佞人使朝廷無過生靈無怨以杜姦雄凡萬餘言王曽見而偉之亦知仲淹乃晏殊客也於是殊薦人充館職曽謂殊曰公實知仲淹捨而薦此人乎已為公置不行宜更薦仲淹也殊從之丁夘賜故杭州處士林逋諡曰和靖先生逋臨終賦詩云茂陵他日求遺藁猶喜曽無封禪書辛巳上封者請稅緡錢以助經費上曰貨泉之利欲流天下而通有無何可算也不許己巳天聖七年春正月樞宻使曹利用罷判鄧州初太后臨朝利用奏抑內降恩或屢却而復下則有僶俛從之者或紿白太后曰蒙恩得內降雖屢却於樞宻院今利用之家媪隂諾臣請其必可得矣太后始疑其私頗衘怒㑹利用從子汭爲趙州兵馬監押而州民趙徳崇詣闕告汭不法事獄具汭坐被酒衣黄衣令軍民呼萬嵗且傳致汭辭云利用實教之丙辰貶利用為左千牛衛上將軍知隨州杖殺汭二月庚申朔參知政事魯宗道卒太后臨朝宗道屢有獻替太后問唐武后何如主對曰唐之罪人也幾危社稷后嘿然時有上言請立劉氏七廟者太后以問輔臣衆不敢對宗道獨曰不可謂同列曰若立劉氏七廟謂嗣君何帝太后將同幸慈孝寺欲以太安輦前帝行宗道曰婦人有三從在家從父嫁從夫夫歿從子太后命輦後乗輿行貴戚用事者莫不憚之時目為魚頭參政因其姓且言骨鯁如魚頭也丙寅禮部尚書平章事張士遜罷知江寧府士遜得宰相曹利用之薦也利用慿寵自恣士遜未嘗有是非之言時人目之為和鼓參知政事吕夷簡以本官平章事始王曾薦夷簡可相久不用曾因對言以臣度聖意不欲其班樞宻使張耆上爾耆一赤脚健兒豈容妨賢至此太后曰吾無此意行用之矣丁卯以夏竦為參知政事陳堯佐為樞宻副使薛奎為參知政事初曹利用領景靈宫使令主事蘓藏用等主宫中公使錢而利用嘗私貸錢癸酉再貶利用為崇信節度副使房州安置仍命內侍楊懷敏䕶送之閏二月至襄陽驛懷敏以語逼之利用素剛遂自經死論曰前輩多謂大臣功髙權盛禍患之来有非智慮之所能防如曹利用襄陽之死是矣切以為不然殺人者必見殺賊人者還自賊昔者李斯讒韓非於秦非死之後斯亦不免而斯之遇禍尤慘於非鮑髙譛禳苴於齊苴死之後鮑髙之徒亦不免而髙之遇禍尤慘於苴利用與丁謂譛冦萊公有不臣議凖旣南遷而二公相繼貶黜丁有朱崖之行曹有襄陽之禍天之報應有甚影響非其自取與古人有言好謀之士敗於謀好辯之士窮於辯道徳正直之士為無所窮斯言得之戊申上謂輔臣曰比建慈孝寺蓋以薦福先帝及太一宫為民祈禳自今京城惟倉庫營房官舍弊壞者修完之餘毋得擅興力役壬子詔復置賢良方正能直言極諫科博通典墳明宣於教化科才識兼茂明於體用科詳明吏理可使從政科識洞韜略運籌決勝科軍謀宏逺材任邊寄科凡六又置書判拔萃科以待選人髙蹈丘園科沉淪草澤科茂材異等科以待布衣被舉應書者又置武舉以待方略智勇之士癸丑置理檢使以御史中丞為之其登聞檢院匭函改為檢匣如指陳軍國大事時政得失並投檢匣畫時進入常事五日一進其稱寃濫枉屈而檢院鼓院不為進者並許詣理檢使審問以聞時上封者言自至道三年廢理檢院而朝廷得失天下寃枉寖不能自達夏竦因請復置使領上從其議三月戊寅上謂輔臣曰王欽若久在政府察其所為真奸邪也王曽曰欽若與丁謂林特陳彭年劉承珪時號為五鬼其姦邪憸詖之迹誠如聖諭契丹嵗大饑民流過界河上曰皆吾赤子也可即賑救之乃詔轉運司分送唐鄧襄汝州處以閒田所過州縣給食人二升癸未詔百官轉對極言時政闕失如舊儀在外者實封以聞旣而上謂輔臣曰所下詔宜増朋黨之戒羣牧判官龎籍因轉對言平時百官奏事上前不自批章止得送中書樞宻院盖防偏請以啟倖門近嵗傳宣內降寖多於舊臣恐法度自是隳也羣牧判官司馬池因轉對言唐制門下省詔書出有不便者得以封還今門下雖有封駁之名而詔書一􅋀自中書下非所以防過舉也甲申上封者言茶鹽課虧請更議其法帝以問三司使冦瑊瑊曰議者未知其要爾河北入中兵食皆仰給於商旅若官盡其利則商旅不行而邊民困於餽運矣法豈可數更帝然之因謂輔臣曰茶鹽民所食而強設法以禁之致犯法者衆但緣經費尚廣未能弛之又安可數更其法也丙戍遣官祈晴上因謂輔臣曰昨令視四郊而麥已損腐民何望焉此必政事未當天心也古者大辟外州三覆奏京師五覆奏盖重人命如此其戒有司審獄議罪毋或枉濫又曰赦不欲數然捨是無以召和氣夏四月赦天下免河北被水民賦租京師自三月朔雨不止前赦一日而霽五月己未朔詔禮部貢舉庚申詔曰朕試天下士以言觀其趣向而比来流風之弊至於㑹粹小說磔裂前言競為浮夸靡曼之文無益治道非所以望於諸生也禮部其申飭學者務明先聖之道以稱朕意焉甲子上曰羣臣請對者多求進少求退何也王曽曰茍抑奔競崇静退則庶幾有難進之風矣上然之己巳詔以新令及附令頒天下六月丁未大雷雨玉清昭應宫灾獨長生崇夀殿存焉太后對輔臣泣曰先帝力成此宫一夕延燔殆盡猶幸一二小殿存爾范雍度太后有再興葺意乃抗言曰不若燔之盡也先朝以此竭天下之力遽為灰燼非出人意如因其所存又將葺之則民不堪命非所以祇天戒也宰相王曽吕夷簡亦助雍言夷簡又推洪範灾異以諫太后黙然太廟齋郎蘓舜欽上疏曰前志曰積隂生陽陽生則灾見焉乗夏之氣發洩於玉清宫震雨雜下烈焰四起樓觀萬疉數刻而盡非慢於火備乃天之垂戒也陛下當降服減膳避正寢責躬罪己下哀痛之詔罷非業之作拯失職之民察輔弼及左右無禆國體者罷之竊弄威權者去之念政刑之失收芻蕘之論庶幾可以變灾為佑浹日之間未聞為此而將設工役以圖修復都下之人聞者駭惑聚首横議咸謂非宜願陛下恭黙內省而追革之罷再造之勞述前世之法天下幸甚甲寅門下侍郎平章事王曽罷知兖州始太后受尊號冊將御大安殿曽執不可太后左右姻家稍通請謁曽多所裁正太后滋不悦㑹玉清昭應宫灾曽累表待罪乃罷尋改青州是月河北大水壞澶州浮橋秋七月初太后怒玉清宫守衛者不謹悉下御史獄欲誅之中丞王曙上言昔魯桓僖宮灾孔子以為桓親盡當毁者也遼東髙廟及髙園便殿灾董仲舒以為髙廟不當居陵旁今所建宫非應經義灾變之来若有警者願除其地以應天變而右司諫范諷亦言此實天變不當置獄窮治上及太后感悟遂薄守衛者罪又言山木已盡人力已竭雖復修必不成己巳下詔不復修改長生崇夀殿為萬夀觀乙酉罷輔臣所領諸宫觀使名八月丁亥朔日有食之詔罷天下職田官收其入以所直均給之先是上封者言職田有無不均請罷之乃降是詔己亥詔命官犯正入已贓者自今毋使親民冬十月詔知州軍文武升朝官嵗舉見任判官主簿尉有罪非贓私有出身三考無出身四考堪縣令者各一人轉運使副不限以數先是流內銓引選人朝辭有老耄者授縣令上謂宰臣曰縣令之職有民有社一邑刑政輕重皆得自專若非其人為害不細雖逺方僻郡尤當擇人宣朝廷徳意此輩皆昏耄使之臨民必有貪墨疲懦之弊㑹有上言乞奏舉以充縣令乃降是詔丁未詔淮南江浙荆湖制置發運使奏計京師毋以土物饋要近官十一月冬至上率百官上皇太后夀於㑹慶殿祕閣校理范仲淹奏疏言天子有事親之道無為臣之禮有南面之位無北面之儀若奉親於內行家人禮可也今顧與百官同列虧君體損主威不可為後世法疏入不報晏殊初薦仲淹為館職聞之大懼召仲淹詰以狂率邀名且將累薦者仲淹正色抗言曰仲淹緣辱公舉毎懼不稱為知己羞不意今日反以忠直獲罪門下殊不能答仲淹退又作書遺殊申理前奏不少屈殊卒媿謝焉又奏疏請皇太后還政亦不報遂乞補外尋出為河中府通判庚午天聖八年春正月命資政殿學士晏殊權知禮部貢舉甲戍真定府定州路都部署曹瑋卒瑋將兵幾四十年未嘗少失利契丹使過天雄部勒其下曰曹公在此毋縱騎馳驅也渭州有告戍卒叛入夏國者瑋方對客弈棊遽曰吾使之行也夏人聞之即斬叛者投其首境上環慶属𦍑田多為人所市致單弱不能自存因沒敵中瑋盡令還其故田後有犯者遷其家內地所募弓箭手使馳射較強弱勝者予田二頃再更秋穫課市一馬馬必勝甲然後官籍之則加田五十畝至三百人以上團為一指揮要害處為築堡使自塹其地為方田環之立馬社一馬死衆為出錢市馬属𦍑降者旣多因署其首領為軍主使統其族帳止於本軍叙進以其習知敵情與地利不可徙他軍也瑋為將不如其父寛猛自成一家三月御崇政殿試禮部奏名進士丙寅試諸科丁夘賜進士王拱夀等二百人及第四十九人同出身己巳賜諸科及第同出身者又五百七十三人拱夀詔更其名曰拱辰六月監修國史吕夷簡等上新修國史於崇政殿秋七月乙巳御崇政殿試書判拔萃及武舉人戍申以書判拔萃人余靖為將作監丞尹洙為武勝節度掌書記武舉人張建侯等十二人補三班奉職借職丙午御崇政殿䇿試賢良方正能直言極諫太常博士何詠茂才異等富弼所對䇿並及第四等丁丑以詠為祠部員外郎同判永興軍弼為將作監丞知長水縣九月罷百官轉對自復轉對言事者頗衆大臣不悦也故復罷之冬十月有上書言縣官𣙜鹽得利微而為害博兩池積鹽為阜數莫可校請通商平估以售少寛百姓之力乃詔盛度王隨議更其制度隨與胡則畫通商五利上之丙申詔罷三京二十八州軍𣙜法聼商賈入錢若金銀京師榷貨務交鹽兩池自是雖商賈流行而嵗課之入官者耗矣壬寅置天章閣待制位龍圖閣待制之下十一月戊辰合祀天地于圜丘大赦十二月以丁謂為道州司户參軍丁未定難節度使趙徳明遣使来獻馬辛未天聖九年春二月詔復給職田秋七月以翰林侍讀學士孫奭為工部尚書知兖州帝毎御經筵設象架庋書䇿外向以便侍臣講讀奭年髙視昏或隂晦即為徙御座於閣外奭講至前世亂君亡國必反復規諷帝竦然聼之常􅀞無逸圖以進帝施於講讀閣奭三請致仕召對敦諭之奭以年踰七十固請故優拜焉仍詔頒宴而後行甲戍右正言陳執中諫院供職國朝承五代之弊官失其守故官職差遣離而為二今之官裁用以定俸入爾而不親職事諫議大夫司諫正言皆須别降勅許赴諫院供職者乃曰諫官八月出內藏庫絹六十萬下陜西河北河東市糴粮草戊戍又出內藏庫緡錢五十萬河北市粮草九月詔出內藏庫絹六十萬下河北折糴軍儲庚午以王曽為彰徳節度使仍知天雄軍契丹使者徃還肅車徒而後過無敢大聲疾呼者人樂其政為畵像而生祠之冬十月以翰林學士宋綬為龍圖閣學士知應天府時太后猶稱制五日一御承明殿垂簾決事而上未始獨對羣臣也綬言唐先天中睿宗為太上皇五日一受朝處分軍國重務除三品以上官決重刑明皇日聼朝除三品以下官決徒刑今宜約先代制度令羣臣對前殿非軍國大事及除拜皆前殿取㫖書上忤太后意故命出守侍御史知雜事劉隨殿中侍御史郭勸並言綬有辭學當留本朝不宜處外不聼丙戍詔曰公卿大夫所宜勵名節以厚風化而或枉己以近名行險以沽寵詆誣執政干撓有司藩臣多所徼求使者弛於刺舉營私冒禄朕何望焉凡在位之臣其務修警毋蹈邪枉以速邦憲閏十月司天監上重修崇天厯癸亥鹽鐵副使司封貟外郎王􅎦户部副使刑部貟外郎杜衍並為天章閣待制初馬季良建言京師賈人常以賤價居茶鹽交引請官置務收市之季良方用事有司莫敢忤其意鬷獨不可曰與民競利豈國體邪他日上見鬷勞之曰官市交引賴卿力言罷之甚善有司臨事當如是也薛顔死其家屬衍為墓誌衍却之及在三司因奏事上謂衍曰薛顔有醜行卿不與誌墓誠清識也自是有意大用壬申明道元年春二月監修國史吕夷簡上三朝寶訓庚戍知許州定國節度使張士遜為刑部尚書平章事吕夷簡加中書侍郎丁夘以真宗順容李氏為宸妃是日宸妃薨宸妃始生帝皇太后即以為己子宸妃嘿嘿處先朝嬪御中未嘗自異帝不自知宸妃所出也疾革乃進位始宫中未治喪宰相吕夷簡朝奏事因曰聞有宫嬪亡者太后瞿然曰宰相亦與宫中事邪引帝偕起有頃獨出曰卿何間我母子也夷簡曰太后他日不欲全劉氏乎有司希太后㫖言嵗月未利夷簡黜其說請發哀成服備宫仗葬之時有詔欲鑿宫城垣以出喪夷簡遽求對太后揣知其意遣內侍羅崇􅈴問何事夷簡言鑿垣非禮喪宜自西華門出宸妃誕育聖躬而喪不成禮異日必有受其罪者莫謂夷簡今日不言也崇􅈴懼馳告太后乃許之三月戊戍詔曰江淮之間仍嵗旱暵民之失職朕甚憫焉比遣使安撫其與長吏慮係囚流以下降一等杖笞釋之六月殿中侍御史張存上疏曰陛下嗣統以来延納至言罔有忌諱自前秋忽詔罷百官轉對去冬黜降御史曹修古等昨又聞進士林獻可因奏封事竄逺方人心皇惑中外莫測臣恐自今忠直之言與理亂安危之端蔽而不逹因歴引周昌朱雲辛慶忌辛毗事以廣帝意七月許夀州立學仍賜九經知州朱諫請之也辛夘以門下省為諫院先朝雖除諫官而未嘗置院及陳執中為諫官屢請之置諫院自此始是月太白晝見終月八月以三司使晏殊為樞宻副使壬戍大內火延燔八殿乙丑詔羣臣直言闕失先是百官晨朝而宫門不開輔臣請對帝御拱宸門追班百官拜樓下宰相呂夷簡獨不拜帝使問其故曰宫庭有變羣臣願一望清光帝舉簾見之夷簡乃拜時宦者置獄治火事得縫人火斗已誣伏下開封府使具獄權知府事程琳辨其不然乃命工圖其火經處且言後宫人多此殆天災不可以罪人監察御史蔣堂亦言火起無迹安知非天意陛下宜修徳應變今乃欲歸咎宫人且宫人付獄何求不可而遂賜之死是重天譴也帝為寛其獄卒無坐死者殿中丞滕宗諒言國家以火徳王天下火失其性由政失其本因請太后還政祕書監劉越請太后還政言尤鯁直皆不報九月庚寅重作寶冊以舊冊寶為宮火所焚也十一月上以修內成恭謝天地于大安殿遂謁太廟大赦改元定難節度使西平王趙徳明封夏王徳明凡娶三姓米母氏生元昊小名嵬理𦍑語謂惜為嵬富貴為理性㓙鷙猜忍通蕃漢文字數諫徳明無臣中國徳明曰吾族三十年衣錦綺衣此聖宋天子恩不可負也元昊曰英雄之生當王覇爾何錦綺為徳明死元昊繼立癸亥制授元昊特進檢校太師兼侍中定難節度夏銀綏宥静等州觀察處置押蕃落使西平王元昊旣襲封即隂為反計十二月詔以来年二月躬耕藉田先請皇太后恭謝宗廟權罷南郊之禮及議皇太后謁廟儀注太后欲純被帝者之服薛奎獨争曰太后必御此見祖宗若何拜固執不可雖終不納猶少殺其禮焉癸酉明道二年春二月戊戍司天監言含譽星見東北方其色黄白上有光芒長二尺然觀者皆以為彗云庚子詔淮南江南民被災傷而死者官為瘞埋甲辰皇太后宿齋垂拱殿乙巳服禕衣花釵冠乘玉輅以赴太廟改衮衣儀天冠內侍贊導享七室皇太妃亞獻皇后終獻帝赴東郊丁未祀先農行藉田禮禮儀使張士遜奏皇帝三推而止帝旣躬耕不以古禮為式願推終畝士遜固請乃耕十二步而止辛亥上作藉田詩賜近臣三月庚寅以皇太后不豫大赦丁謂特許致仕吕中曰古之赦者赦無罪後之赦者赦有罪祖宗郊恩雖厚贓吏有赦不原奸臣如丁謂亦不原赦則非赦有罪也至崇觀奸臣反其鋒而用之而元祐元符之黨不以赦原矣甲午皇太后崩遺詔尊太妃為皇太后軍國大事與太后內中裁處乙未帝號慟見輔臣曰太后疾不能言而猶數引其衣若有所属何也奎曰其在衮冕也然服之何以見先帝乎帝悟以后服斂旣宣遺誥閤門趣百官賀太后御史中丞蔡齊正色謂臺吏毋追班入白執政曰上春秋長習天下情偽今始親政豈宜使女后相繼稱制乎夏四月詔刪去遺誥之語太后旣崩左右以宸妃事聞上號慟累日追尊為皇太后庚戍以流人林獻可為三班奉職明道初獻可抗言請太后還政太后怒竄於嶺南至是特錄之壬子羣臣上表請御正殿表三上乃從之詔內外毋得進獻以祈恩澤及緣親戚通章表若傳宣有司實封覆奏內降除官輔臣審取處分帝始親攬庶政裁抑僥倖中外大悦召知應天府宋綬通判陳州范仲淹赴闕己未門下侍郎呂夷簡罷為武勝節度使判澶州樞宻使張耆罷為左僕射判許州尋改陳州樞宻副使夏竦罷為禮部尚書知襄州尋改穎州參知政事陳堯佐罷為户部侍郎知永興軍樞宻副使范雍罷為户部侍郎知荆南府尋改揚州又改陜州樞宻副使趙稹罷為尚書左丞知河中府參知政事晏殊罷為禮部尚書知江寧府尋改亳州帝始親政夷簡手疏陳八事曰正朝綱塞邪徑禁賄賂辨佞壬絶女謁疎近習罷力役節冗費其勸帝語甚切帝與夷簡謀以耆竦等皆太后所任用悉罷之退告郭皇后后曰夷簡獨不附太后邪但多機巧善應變爾由是并夷簡罷及宣制夷簡方押班聞唱其名大駭不知其故而夷簡素厚內侍閻文應因使為中詗久之乃知事由皇后云工部尚書李迪以本官平章事户部侍郎王隨為參知政事禮部侍郎李諮為樞宻副使步軍副都指揮使王徳用為檢校太保簽書樞宻院事始太后臨朝有求內降補軍吏者徳用曰補吏軍政也敢挾此以干軍政卒不奉詔太后崩有司請衛士坐甲徳用曰故事無為太后喪坐甲者又不奉詔上竒之以為可大用故擢任樞宻權御史中丞蔡齊權三司使事天章閣待制范諷為右諫議大夫權御史中丞先是諷出知青州時山東旱蝗前宰相王曽家多積粟諷發取數千斛濟飢民因請遣使安撫太常博士范仲淹為右司諫辛未龎籍為殿中侍御史籍奏請下閤門取垂簾儀制盡焚之又奏陛下躬親萬機用人宜辨邪正防朋黨勿使受恩人主歸感權臣進擢近列願采公論毋令出於執政孔道輔嘗謂人曰言事官多觀望宰相意獨龎君可謂天子御史也講義曰天聖之初此一時也明道二年之後此又一時也天聖之初政在東朝天下猶未見人主之徳明道二年四月親政之後抑內降正朝綱擯斥張耆夏竦陳堯佐之徒而擢用范仲淹孔道輔龎籍輩天下駸駸向治矣嗚呼明道二年之親政積而為慶厯嘉祐之盛元祐八年之親政變而為紹聖元符之紛紛人主可不謹其機乎罷羣牧制置使時上封者言羣牧旣自有使而武臣領樞宻兼制置事不時決故罷之五月許大名府立學仍賜九經從王曽之請也秋七月先是右司諫范仲淹以江淮京東灾傷請遣使循行未報仲淹請間曰宫掖中半日不食當如何今數路艱糴安可置而不恤甲申命仲淹安撫江淮所至開倉廩賑乏絶禁淫祀奏蠲廬舒折役茶江東丁口鹽錢飢民有食烏蛛草者擷草進御請示六宮貴戚以戒侈心八月贈工部貟外郎曹修古為右諫議大夫修古鯁直有風節當莊獻時權倖用事人人顧望畏忌而修古遇事輒言無所回撓初貶同判杭州未行改知興化軍卒於官貧不能歸葬賓佐賻錢五十萬季女泣白其母曰奈何以是累吾先人也卒拒不納帝思修古忠故優贈之修古無子錄其壻劉􅈴為試將作監主簿丁巳置端明殿學士班翰林資政學士之下以宋綬為之綬因上言帝王御天下在總攬威柄自陛下躬親萬機懲違革弊以新百姓之耳目而賞罰號令未能有過於垂拱之日頃者恩出太后今又自大臣出大臣市恩以招權小人趨利以售進此風寖長有蠧邦政太宗常曰外憂不過邉事皆可預防惟姦邪共濟若為內患可深懼也真宗亦云唐朝朋黨尤盛以至王室卑弱願陛下思祖宗訓戒念王業艱難整齊紀綱正在今日三司言自藉田後繼有賞賚用度不足請假於內藏庫庚申出緡錢百萬賜之因謂宰相張士遜曰國家禁錢本無內外盖以助經費耳士遜對曰不然則有司未免侵漁百姓也九月判河南府錢惟演落平章事赴本鎮初惟演欲為自安計御史中丞范諷劾奏惟演在莊獻時權寵大盛與后家連姻請行降黜上諭輔臣曰先后未葬朕不忍遽責惟演諷即䄂告身入對曰陛下不聼臣言願納此不敢復為中丞矣上不得已可之冬十月甲辰詔曰先王不以浮靡示天下今兩川嵗貢綾錦羅綺透背花紗之属皆女工蠧也其以三之二易為紬絹供軍須時上富於春秋左右或欲以巧自媚後苑珠玉之工頗盛於前日殿中侍御史龎籍言今螽螟為灾民憂轉死北有耶律西有拓㧞陛下安得不以儉約為師奢靡為戒重惜國費以循民之急上深納其言辛亥上諭輔臣曰近嵗進士所試詩賦多浮華而學古者或不得以自進宜令有司兼以策論取之戊午門下侍郎張士遜罷為左僕射判河南府樞宻使楊崇勲罷為河南三城節度使判許州先是天下蝗旱仍見士遜居首相不能有所發明遂與崇勲俱罷然制辭猶以均勞逸為言也判陳州吕夷簡為門下侍郎兼吏部尚書平章事知河南府王曙加檢校太傅充樞宻使簽事樞宻院事王徳用為樞宻副使刑部侍郎宋綬為參知政事權三司使事蔡齊為樞宻副使權知開封府程琳為御史中丞右諫議大夫權御史中丞范諷權三司使事琳辭中丞不拜乃授翰林侍讀學士知開封府前知開封者苦其治劇或不滿嵗輒罷不然被謗譏或以事去獨琳居數嵗久而治益精明一嵗中獄常空者四五十一月孔道輔為右諫議大夫權御史中丞代程琳也道輔時守南京召用之冦準以責死甲戍贈中書令復莱國公丙申上謂輔臣曰毎退朝凡天下之奏必親覽之吕夷簡曰若小事皆關聼覽恐非所以輔養聖神上曰朕承先帝之託况以萬幾之重敢自泰乎又曰朕日膳不欲事珍美衣服多以縑繒為之至屢經澣濯而宫人或以為笑太官進膳有蟲在食器中朕掩而不言恐罪及有司也始天聖六年罷諸路提㸃刑獄官八月復置又權停於是上謂輔臣曰諸路刑獄旣罷提㸃官轉運司不能一一躬徃讞問恐寖致寃濫宜選賢明廉幹不生事者委任之則民受其賜矣乃復置諸路提㸃刑獄官仍參用武臣甲辰以京東飢出內藏庫絹二十萬下三司代本路上供之數丁未出侍御史張沔知信州殿中侍御史韓瀆知岳州先是宰相李迪除二人為臺官言者謂臺官必由中㫖乃祖宗法也旣數月呂夷簡復入因議其事於上前上曰祖宗法不可壞也宰相自用臺官則宰相過失無敢言者矣迪等皆皇恐詔自今臺官有缺非中丞知雜保薦者毋得除授戊申出宫人二百上時屢出宫人因曰曩者太后臨朝臣僚戚属多進女口入宫今已悉還其家矣初郭皇后之立非上意寖見踈宫人尚氏楊氏驟有寵尚氏常於上前出不遜語侵后后不勝忿起批其頰上亦起救之后誤批上頸上大怒有廢后意內侍閻文應白上出爪痕示執政呂夷簡以前罷相故怨后乃定議廢后夷簡先敕有司毋得受臺諫章疏乙夘詔皇后願入道特封浄妃玉京冲妙仙師名清悟别居長寧宫范仲淹孔道輔孫祖徳率蔣堂郭勸楊偕馬絳段少連宋郊劉渙詣垂拱殿門伏奏皇后不當廢守殿門者闔扉不為通道輔撫銅環大呼尋詔宰相召臺諫諭以皇后當廢狀道輔等悉詣中書衆譁然争致其說夷簡曰廢后自有故事道輔及仲淹曰公不過引漢光武勸上耳上堯舜之資而公顧勸之效昏君所為可乎夷簡不能答拱立曰諸君更自見上力陳之道輔將以明日留百官揖宰相廷争而夷簡即奏逐道輔等丙辰詔道輔出知泰州仲淹知睦州祖徳等各罰銅仍詔諫官御史自今毋得相率請對駭動中外偕奏乞與道輔仲淹俱貶勸及少連再上疏皆不報將作監丞富弼上疏曰陛下舉一事而獲二過於天下廢無罪之后一也逐忠臣二也此二者皆非太平之世所行臣實痛惜之疏入不報大事記曰國初官以定俸實不親職有諫議大夫司諌正言特以寓祿耳故赴諫院者方為諫官則諫官之權猶未重也國初三院領外任而不任風憲興國中任風憲而不領言事則臺官之權亦未重也端拱初以補闕為司諫以拾遺為正言所以舉諫官之職天禧初置言事御史所以舉臺官之職然當時臺諫之權雖重而臺諫之職未振也自仁祖即位劉中丞令臺属各舉紏彈之職而後臺臣之職始振自孔道輔范仲淹敢於抗夷簡唐介敢於抗彦博一梁適之用事則馬遵率數人言之一劉抗之得政則張昇凡十七章論之而後臺諫之權敢與宰相為敵矣是何臺諫之職在國初則輕在仁宗之時則重在國初則為具員在仁宗之時則為振職何邪盖仁祖不以天下之威權為紀綱而以言者之風米為紀綱故其進退臺諫公其選而重其權優其遷而輕其責非私之也盖以立國之紀綱實寄於此宋史全文卷七上欽定四庫全書宋史全文卷七下宋仁宗二甲戍景祐元年春正月甲子許京兆府立學賜九經仍給田五頃丁丑命翰林學士章得象等五人權知貢舉詔去嵗飛蝗所至遺種令民掘蝗子毎一升給菽米五升又詔比禁京城榖出門其弛之諸路毋得閉糶以淮南嵗饑出內藏絹二十萬下三司代其嵗輸始置崇政殿說書命賈昌朝趙希言王宗道楊安國為之日以二人入侍講說初孫奭出知兖州上問誰可代講說者奭薦昌朝等因命中書試說書至是特置此職以處之趙元昊始寇府州二月罷書判㧞萃科更不御試自今幕職州縣官經三考以上非緣邉及川廣福建者並許應賢良方正能直言極諫等六科諸科被黜者毋得復應茂才異等三科及武舉用知制誥李淑之議也淑嘗上時政十議其一議國體其二議灾旱其三議言事其四議大臣其五議擇官其六議貢舉其七議制科其八議閱武其九議時令其十議入閣先是召知鳯翔府司馬池知諫院池上表懇辭上謂宰相曰人皆嗜進池獨嗜退亦難能也加直史館復知鳯翔詔禮部貢院諸科舉人應七舉者更不限年並許特奏名三月御崇政殿試得進士張唐卿楊察徐綬等五百一人諸科二百八十二人特奏名八百五十七人夏四月龎籍為開封府判官尚美人遣內侍稱教㫖免二人市租籍言祖宗以来未有美人稱教㫖下府者帝為杖內侍切責美人詔有司自今宫中傳命毋得輒受丁未出內藏絹三十萬下河北市糴粮草詔置殿中侍御史監察御史裏行舉三丞以上嘗歴知縣人從中丞韓億之請也然唐制亦有侍御史裏行今獨遺之五月乙丑翰林侍讀學士程琳為三司使先是三司併合田賦㳂納諸名器為一物琳謂借使牛皮食塩地錢合為一糓麥黍豆合為一易於句校可也然後世有興利之臣復用舊名増之是重困民無已時也琳在三司尤謹出入禁中有所取輒覆奏罷之內侍表言琳專琳聞之自直於帝曰三司財賦皆朝廷有也臣為陛下惜爾帝然之琳又上疏論兵在精不在衆河北陜西軍儲數匱而招募不已其住營一兵之費可給屯駐三兵昔養萬兵者今三萬兵矣河北嵗費芻粮千二十萬其賦入支十之三陜西嵗費千五百萬其賦入支十之五自餘悉仰給京師自咸平逮今二邊所増馬步軍指揮使百六人計騎兵一指揮所給嵗約費緡錢四萬三千步兵費三萬二千合新舊兵所費不啻千萬緡此國用所以日絀願罷河北陜西募住營兵遇闕即選廂軍精銳者補之仍漸徙營內郡以便粮餉無事時畨戍于邉緩急即調發便近如此則疆場無事而國用有餘矣帝嘉納焉禁民間織錦背繡背及遍地宻花透背西川嵗織上供者亦罷祕書丞張宗誼孫沔並為監察御史裏行監察御史裏行始此壬申出內藏庫緡錢一百萬賜三司以河南府府學為國子監六月淮南制置發運使劉承顔獻輪扇浴器同知諫院郭勸言承顔欲以此媚上爾甲辰詔還之己酉䇿試賢良方正蘓紳才識兼茂吳育茂才異等張方平及武舉人於崇政殿育所對䇿入第三等紳方平並第四等癸丑詔尚書省官嘗歴知州而無贓私罪者自今並除左曹凡吏部户部禮部為左名曹司封司􅈴考功度支金部倉部祠部主客膳部為左曹兵部刑部工部為右名曹職方駕部庫部都官比部司門屯田虞部水部為右曹辛酉命翰林學士張觀知制誥李淑宋祁編三館秘閣書籍壬午罷後院所作玳瑁龜筒從度支判官謝絳之言也絳又言內藏庫嵗受鑄錢百餘萬緡而嵗給左藏庫及三年一郊度嵗出九十萬緡所餘無幾請以天下所鑄錢盡入三司十年責以移用使聚糓實邊而茶鹽香礬之利悉歸京師又邇来用物滋侈賜予過制禁中須索數多於前比詔裁節費用而有司但求咸平景徳簿書臣以為不若推近及逺逓考嵗用而裁節之不必咸平景徳為凖也又請罷內降凡詔令皆由中書樞宻院然後施行乙酉詔西京留守推官歐陽脩為鎮南節度掌書記館閣校勘樞宻使王曙所薦也始錢惟演留守西京脩及尹洙為官属皆有時名脩等游宴無節惟演去曙繼至嘗厲色謂脩等曰諸君知寇莱公晩年之禍乎政以縦酒過度爾脩對曰冦公之禍政以老而不知止耳曙黙然終不怒更薦脩及洙置之館閣議者賢之秋七月監察御史裏行髙若訥為殿中侍御史裏行殿中侍御史裏行始此乙未崇政殿召近臣觀景祐乾象新書樞宻使王曙加同平章事八月資政殿學士薛奎卒奎在政府謀議無所迴避或時不得如志歸輒嘆咤不食家人笑曰何必如是奎曰吾仰慙古人俯愧後世爾尤善知人范仲淹龎籍明鎬自為吏部選人皆以公輔許之後卒如其言歐陽脩王拱辰皆其女壻也壬戍有星孛於張翼長七尺闊五寸十二日而沒癸亥樞宻使同平章事王曙卒參知政事宋綬以帝富於春秋天下無事慮燕樂有所漸乃上言自古守成之君皆兢兢抑畏不忘顧省故立防於無事之始銷變於未萌之前又馭下之道有三臨事尚乎守當機貴乎斷兆謀先乎宻能守則姦莫由移能斷則邪莫由惑能宻則事莫由變斯安危之所係願陛下念之庚午天平節度使王曽同平章事南京留守推官石介貽曽書曰聞旣廢郭皇后寵幸尚美人宫聖體因是嘗有不豫相公方自外来聖眷正深宜即以此為戒若執管仲不害覇之言則遂啟成亂階恐無及矣伏惟相公留意焉辛未以星變大赦避正殿減常膳郭后旣廢尚楊二美人益有寵上體為之弊中外憂懼楊太后亟以為言入內都知閻文應早暮侍上言之不已上不勝其煩乃頷之文應即命氊車載二美人出初蔡齊力争削遺誥中太后參决軍國大事之語吕夷簡嘆曰蔡中丞不知吾豈樂為此哉上方年少恐禁中事莫有主張者爾及二美人争寵恣横卒賴太后排遣之然議者以為人主旣壯而母后聼政自非國家令典雖或能整齊禁中而垂簾之後外戚用事亦何所不至齊之力争不為失也乙酉龎籍滕宗諒並坐言宫禁事不實出籍為廣東轉運使宗諒知信州宗諒嘗以上體多疾奏疏諫曰陛下日居深宫流連荒宴臨朝則多羸形倦色决事如不掛聖懷語太切直故出九月初二美人之出宫也帝令宋綬面作詔云當求徳門以正內治旣而左右引夀州茶商陳氏女入宫綬諫曰陛下乃欲以賤者正位中宫不亦與前日詔語戾乎後數日王曾入對又奏引納陳氏為不可上曰宋綬亦如此言卒罷陳氏甲辰詔立皇后曹氏贈尚書令冀王彬之孫女也冬十月罷淮南江浙荆湖制置發運使仍詔淮南轉運使兼領其制置茶鹽礬稅各歸逐路轉運司丁夘詔中書提㸃五房公事及堂後官參擇選人為之趙元昊僣益甚私改元曰開運人告以石晉敗亡年號也乃更廣運母米氏族人山喜謀殺元昊事覺元昊酖其母殺之沈山喜之族於河遣使来告哀十一月榮州刺史曹琮為衛州團練使琮女兄為后禮皆琮主辦於是奏曰陛下方以至公厲天下臣旣備后族不宜冒恩澤亂朝廷法族人敢因緣請託願寘於理時論稱之監察御史裏行孫沔言竊見上封事人同安縣尉李安世輒因狂悖妄進瞽言雖曰狂愚猶勝諂佞况自道輔仲淹被黜之後龎籍范諷致對以来凡在搢紳盡思緘嘿伏乞少霽天威用存國體後七日責知潭州衡山縣大事記曰廢后者非仁祖之本心也而夷簡實賛之諫官伏閣乃祖宗美意也而夷簡實沮之此夷簡入相之初而國論為之一變也沔未知有責命復上書曰累嵗以来和氣猶鬰水旱相荐蟲蝗屢生粟麥不登田疇幾廢九夏多寒三冬無雪星變上天河決東郡疾疫流離生靈困憊又曰去秋以聖體愆和臣心啟沃愛君有從宜之制雙日申不坐之請交泰之誠遽臻有喜宴安之戒豈可為常是則一嵗之中率無百餘日視事宰臣上殿奏事止於數刻天下萬務得不曠哉今退朝之後深宫之中侍左右者刀鋸虧殘之餘悦耳目者綺紈􅃩冶之色扄鐍九重呌閽千仞宸禁晝嚴乗輿天逺又曰天下之本在民民之豪者皆兼并而貧者無置錐天下之大在兵兵之下者負饑寒而驕者不敢役郡守縣令臧否無别蠧耗靡窮邪佞退而復興忠諫黜而未用又曰宜霈然下令誕告多方外則逐刺史縣令無狀老懦貪殘之輩以利於民內則罷公卿大夫不才諂䛕詭誕之士以肅於朝掖庭之中簡去幽曠以求餘羡之慶宦寺之內抑損重任以防昵近之私書奏再責永州監酒乙亥景祐二年春正月鹽鐵副使任布請鑄大錢一當十癸丑置邇英延義二閣寫尚書無逸篇於屏是日御延義閣召輔臣觀盛度進讀唐書賈昌朝講春秋二月燕肅等上考定樂器戊午御延福宫臨閱奏郊廟五十一曲因問李照樂何如照言王朴律凖視古樂髙五律視禁坊樂髙二律擊黄鐘則為仲吕擊夾鐘則為夷則是冬興夏令春召秋氣又編鐘鎛鐘無小大輕重厚薄長短之差非中度之器相傳以為唐舊鐘亦有朴所製者昔軒轅氏命伶倫截竹為律復令神瞽協其中聲然後聲應鳯鳴而管之參差亦如鳯翅其樂傳之夐古不刋之法也願聼臣依神瞽律法試鑄編鐘一簴可使度量權衡恊和有詔許之仍就錫慶院鑄庚申太常博士直史館宋祁上大樂圖義二卷丁卯范諷責授武昌行軍司馬龎籍降知臨江軍先是籍為御史數劾諷宰相李迪右諷反左遷籍籍旣罷益追劾諷不置諷亦請辨乃詔即南京置獄訊之籍坐所劾諷有不如奏法當免諷當以贖論呂夷簡疾諷且欲因諷以傾迪故特寛籍而重貶諷戊辰工部尚書平章事李迪罷知毫州先是上召呂夷簡宋綬決范諷獄以迪素黨諷不召迪皇恐還第翌日遂罷相迪性淳直實不察諷之多誕也樞宻使王曽為右僕射兼門下侍郎平章事門下侍郎平章事呂夷簡加右僕射參知政事王隨知樞宻院事樞宻副使李諮知樞宻院事樞宻副使王徳用同知樞宻事參知政事宋綬為樞宻副使給事中蔡齊參知政事翰林學士承㫖盛度為參知政事御史中丞韓億同知樞宻院事知天雄軍杜衍為御史中丞衍奏中書樞宻古之三事大臣所謂坐而論道者也止隻日對前殿何以盡天下之事宜迭召見賜坐便殿以極獻替三月以杜衍權判吏部流內銓先是選補科格繁長主判不能悉閲吏多受賕出縮為姦衍旣視事即敕吏取銓法問曰盡乎曰盡矣乃閲視具得本末曲折明日曉諸吏無得升堂各坐曹聼行文書銓事悉自予奪由是不能為姦利後改知審官其裁制如判銓法講義曰人言宋朝任法而不任人信吏而不信士大夫然吾觀賈積善十四考無公私過雖無舉主特與改官李師錫以王徳用甥雖薦舉凡三十人止合循資是銓選有定法而未嘗拘於法也賈黯判流內銓則有三年不通父問而廢歸田里者杜衍權典選銓吏則裁制如法而文吏聼行文書者是銓法雖受成於而未嘗盡委於吏也故當時蘓紳上疏審官之職宜擇主判官付以事權或有異材許别論奏如冦凖判銓錢若水等三人以選人遷朝官此又不可以常法論而真得法外之意也夏四月丁巳李照言奉詔製玉律以候氣請下潞州求上黨縣羊頭山秬黍及下懷州河內縣取葭莩從之戊辰命吕夷簡王曽都大管勾鑄造大樂編鐘宋綬蔡齊盛度同都大管勾仍以入內都知閻文應提舉始照旣鑄成編鐘一簴遂建請改制大樂取秬黍累尺成律鑄鐘審之其聲猶髙更用大府布帛尺為法乃下太常四律照自為十二管律法戊寅命馮元聶冠卿宋祁同修樂書五月甲申朔詔曰王者奉祖宗尚功徳共惟太祖皇帝受天命建大業可謂有功矣太宗真宗二聖繼統重熈累洽可謂有徳矣其令禮官考合典禮辨崇配之序定二祧之位庚子太常禮院言太祖經綸草昧遂有天下功宜為帝者祖太宗動静制作真宗財成治定徳宜為帝者宗三廟並萬世不遷宜布天下以示後世至於升侑上帝請自今以太祖為定配二宗為迭配將来皇帝親祠且請三聖皆侑此後迭配還如前議至日圜丘仲夏皇地祇配以太祖孟春祈糓夏雩祀冬祭神州配以太宗孟春感生帝配以宣祖季秋太享配以真宗詔恭依六月先是太常鐘磬毎十六枚為一奩而四清聲相承不擊乙丑李照言十二律聲已備餘四清聲乃鄭衛之樂請去四清鍾馮元駁之曰前聖制樂取法非一故有十三管之和十九管之巢三十六簧之竽二十五弦之瑟十三弦之筝九弦七弦之琴十六枚之鐘磬各自取義寧有一之於律呂專為十二之數也且聖人旣以十二律各配一鐘又設四清聲以附正聲之次盖為夷則至應鐘四宮而設也夫五音宫為君商為臣角為民徴為事羽為物聲重大者為尊輕清者為卑卑者不可加於尊古今之所同也故列聲之尊卑者事與物不與焉何則事為君治物為君用不能尊於君故也惟君臣民三者則自有上下之分不得相越故四清聲之設正為臣民相避以為尊卑也臣以為如舊制便帝令權用十二枚為一格且詔俟有知音者有司别議以聞丁卯出內藏庫紬絹一百萬下三司市糴軍儲辛未御崇政殿召輔臣觀新樂先是帝親製樂曲秋七月甲申詔特賜冦凖諡曰忠愍庚子侍御史曹修睦言李照所改歴代樂頗為迂誕而其費甚廣請付有司按劾之帝以照所作鐘磬頗與衆音相諧但罷其増造知杭州鄭向言鎮東節度推官阮逸頗通音律上其所撰樂論十二篇并律管十三詔令逸赴闕八月壬子朔詔改強盗法不持杖不得財徒二年得財為錢萬及傷人者死餘定罪有差自是盗法惟京師加重餘視舊益寛矣辛酉上作警嚴曲付太常𨽻習名曰振容歌從李照之請也尋改名奉禋丁丑內出景祐樂髓新經六篇賜羣臣其一釋十二均二明所主事三辨音聲四圖律吕相生并祭天地宗廟所用律及隂陽數配五十二管之長短六歴代度量衡皆本之於隂陽配之於四時建之於日月通之於鞮竺演之於壬式遁甲之法己夘知兖州孔道輔為龍圖閣直學士時近臣有獻詩百篇者執政請除龍圖閣直學士上曰是詩雖多不如孔道輔一言遂以命道輔議者因是知前日之斥果非上意也初命朝臣為江浙荆湖福建廣南等路提㸃銀銅坑冶鑄錢公事九月乙未詔司天監製百刻水秤以測候晝夜初諸王邸散居都城非朝謁從祀不得㑹見己酉詔即玉清昭應宫舊基建宫合十位聚居賜名睦親宅冬十月復置朝集院以待外官之還京師者壬子許蔡州立學癸丑復置羣牧制置使仍詔自今止以同知樞宻院或副使兼領之己巳出內藏庫緡錢七十萬左藏五十萬下河北市軍儲許蘓州立學仍給田五頃十一月朔以應天府書院為府學仍給田十頃戊子郭氏薨后之獲罪也上直以一時之忿旣而悔之累遣使勞問於是又為樂府詞以賜后后和答語甚悽愴㑹后小疾閻文應與太醫診視數日遽不起中外疑文應進毒然不得其實時上致齋南郊不即以聞及聞深悼之詔以后禮葬右司諫王堯臣請窮治侍醫者不報乙未祀天地於圜丘以太祖太宗真宗並配十二月閻文應落内都都知為秦州鈐轄尋改鄆州鈐轄其子士良罷御藥院時諫官姚仲孫髙若訥劾文應方命宿齋太廟而文應叱醫官郭皇后暴薨中外莫不疑文應置毒者請并士良出之范仲淹劾奏其罪上卒聼仲淹言竄文應嶺南尋死於道范仲淹為吏部員外郎權知開封府仲淹自還朝言事愈急宰相隂使人諷之曰待制侍臣非口舌任也仲淹曰論思政侍臣職余敢不勉宰相知不可誘乃命知開封欲撓以劇煩使不暇它議亦幸其有失亟罷去仲淹處之彌月京邑肅然稱治甲子左侍禁桑擇為閤門祇候賞平蠻獠之功也擇辭不許或譏擇好名擇嘆曰若欲避名則善皆不可為也許孟州立學仍給田五頃辛未詔孔聖祐弟北海縣尉宗愿為國子監主簿襲封文宣公先是御史臺辟石介為主簿介上疏論赦書不當求五代及諸偽國後不合意罷不召歐陽脩貽書責中丞杜衍曰介一賤士用不用當否未足害政然可惜者中丞舉動也主簿於臺中非言事官然大抵居臺中者必以正直剛明不畏避為稱職介足未履臺門之閾而已用言事見罷其可謂正直剛明不畏避矣度介之才不止為主簿直可為御史也今斥介而它舉必亦擇賢而舉夫賢者固好辨若舉而入臺又有言則又斥而它舉乎如此則必得愚闇懦黙者而後止也衍卒不能用丙子景祐三年春正月壬寅追冊故金庭教主沖静仙師郭氏為皇后鹵簿儀物並用孝章皇后故事己酉許洪州宻州立學仍各賜田五頃二月先是上以三司胥吏猥多或老疾不知書計詔中丞杜衍與三司差擇之已而三司後行朱正周貴李逄吉等數百人詣宰臣呂夷簡第喧訴夷簡拒不見又詣王曽第曽以美言諭之因使列狀自陳旣又詣衍第投瓦礫肆醜言乃去明日衍對請下有司推究而曽具得其姓名乙夘正貴杖脊配沙門島逄吉等二十二人決配逺惡州軍牢城其為從者皆勒停呂中曰太祖嘗汰吏四百人真宗又汰諸路吏萬有餘人何其易而景祐欲汰三司吏反失國體何耶論者皆以為勢之弱至此不知當時韓魏公嘗汰兵數萬人不聞有為亂者兵且可汰况於吏乎是小人之欲害君子先煽鼓夫諸吏之虚聲以中衍也丙辰詔翰林學士馮元禮賓副使鄧保吉與阮逸胡瑗較定舊鐘律瑗以經術教授吳中范仲淹前知蘓州薦瑗知音白衣召對與逸俱命三月許潞州常州立學是月李諮等請罷河北入中虚估以實錢償芻粟實錢售茶皆如天聖元年之制又以北商持劵至京師舊必得三司符驗然後給錢三司吏稽留為姦乃悉罷之命商持劵徑趣𣙜貨務驗實立償以錢詔皆可之又詔前已用虚估給劵者給茶如舊仍給景祐二年以前茶諮等又言奭等變法五年之間河北入中虚費緡錢五百六十八萬今一旦復用舊法恐豪商不便依託權貴以動朝廷請先期申論於是帝為下詔戒敕而縣官濫費自此少矣夏四月許衡州立學五月范仲淹言西洛帝王之宅負關河之固邊方不寧則可退守宜漸營廩食太平則居東京通濟之地急難則居西洛險固之宅丙戍仲淹落職知饒州時吕夷簡執政仲淹言進退近臣不宜全委宰相又上百官圖指其次第曰如此為序遷如此為不次如此為公如此則私不可不察也夷簡滋不悅帝嘗以遷都事訪諸夷簡夷簡曰仲淹迂闊務名無實仲淹聞之為四論以獻一曰帝王好尚二曰進賢任能三曰近名四曰推委大抵譏時政夷簡大怒訴仲淹越職言事薦引朋黨離間君臣由是降黜侍御史韓瀆希夷簡意請以仲淹朋黨牓朝堂戒百官越職言事從之講義曰此仲淹之所以言事去也此夷簡為相而國論為之再變也昔歐陽脩言於仁宗曰自古人臣進諫有難有易自仲淹貶饒州後至今凡二十餘年間逐臺諫者多矣未聞有䂓諷人主得罪者臣故謂方今諫人主則易言大臣則難然嘉祐之前諫人主者固甚易言大臣者亦豈難哉仲淹以言夷簡去而夷簡亦以仲淹罷唐介以言彥博去而彥博亦以唐介罷介猶御史職也仲淹乃以待制知府而敢於言大臣則當時容飬敢言之氣可知矣許許州立學祕書丞余靖言陛下自専政以来三逐言事者恐非太平之政也壬辰靖落職監筠州酒稅許潤州立學乙未館閣校勘尹洙監郢州酒稅先是洙上言臣常以范仲淹直諒不回義兼師友仲淹旣以朋黨得罪臣固當從坐宰相怒遂逐之戊戍貶館閣校勘歐陽脩為夷陵縣令初右司諫髙若訥言范仲淹貶職之後歐陽脩貽書責臣不能辨仲淹非辜臣愚以為仲淹狂言自取譴辱豈得謂之非辜恐中外聞之謂天子以迕意逐賢人所損不細因繳進脩書脩坐是貶西京留守推官蔡襄作四賢一不肖詩傳於時四賢指仲淹靖洙脩不肖斥若訥也泗州通判陳恢尋上章乞根究作詩者罪左司諫韓琦劾恢越職希恩宜重行貶黜庶絶姦䛕不報而襄事亦寢光祿寺主簿蘓舜欽上疏言臣覩丁亥詔書戒越職言事播告四方無不驚惑盖陛下即位屢求直言今詔書頓異前事豈非大臣壅蔽陛下聰明杜塞忠良之口夫納善進賢宰相之事蔽君自任未或不亡今諫官御史悉出其門但希㫖意即獲美官多士盈庭噤不得語陛下拱嘿何由盡聞天下之事乎前孔道輔范仲淹剛直不撓非不知緘口數年坐得卿輔盖不敢負陛下委注之意而皆罹中傷竄謫而去使正臣奪氣鯁士咋舌目睹時弊口不敢論望陛下發徳音寢前詔勤於采納下及芻蕘可以常守隆平保全近輔矣六月許越州立學壬子許階州立學皆給田五頃丙辰以新修樂書為景祐廣樂記壬戍禁以鹿胎皮為冠甲子許真定府博州郢州立學各給田五頃秋七月馮元獻金華五箴戊子元等又上景祐廣樂記八十一卷庚寅孫沖上所撰五代紀七十七卷降詔褒答乙未初置太宗正司以江寧節度使允譲知太宗正事彰化留後守節同知大宗正事時諸王子孫旣聚居睦親宅故於祖宗後各擇一人使司訓導紏違失庚子太平興國寺灾是冬大雨震電火起寺閣中朝廷始議修復崇政殿說書賈昌朝言易震卦之象曰洊雷震君子以恐懼修省春秋傳曰人火曰火天火曰灾切惟近年寺觀屢灾此殆天賜譴告獨可勿繕治以示畏天戒愛人力之意從之八月許并州立學右司諫韓𤦺言祖宗已来通用王朴之樂天下無事垂八十載頃燕肅妄加磨鑢適㑹李照至闕謂其音未諧陛下許之改作洎逸瑗繼至盛言照樂穿鑿再令造律則又圍徑乖古鄧保信續上新法亦復長廣未合臣慮後人復有從而非之者不若窮作樂之源為致治之本使政令平簡民純熈洽斯乃治古之樂可得以器象求乎且西北二垂久弛邉備犬戎之性豈能常保此陛下與左右大臣宜先及之緩茲求樂之議移訪安邊之䇿然後將王朴逸瑗保信三法别詔稽古之臣取其中合典志者以備雅奏固亦未晚詔丁度等速詳定以聞九月許絳州立學丁亥丁度等言鄧保信所製尺類皆差舛不同周漢逸瑗所製又復不同詔悉罷之己酉出內藏庫緡錢五千萬下河北轉運司市糴邉儲賜河南府新修太室書院名曰嵩陽書院壬辰以阮逸為鎮安節度掌書記知城父縣胡瑗試校書郎初召逸瑗作鐘磬律度與古多不合猶推恩而遣之乙未以崇政殿說書王宗道國子監説書楊中和並為睦親宅講書睦親宅講書始此冬十一月許江州立學戊寅保慶皇后崩始上起居飲食后必與之俱所以擁祐扶持恩意勤備性慈仁謙謹寡過上未有嗣后從容勸上選宗子養宮中由是英宗自宮邸未齠齓養后所十二月詔宣敕劄子非經通進銀臺司毋得直下諸處初李紞領銀臺司具言宣敕劄子皆不經本司封駮之職遂廢不舉請用舊制申明之丙寅知樞宻院事李諮卒丁夘同知樞宻院事王徳用知樞宻院事翰林學士承㫖章得象同知樞宻院事得象為人莊重度量宏廓初為楊億所稱以為有公輔器或問之答曰閩士多輕狹而得象渾厚有容此所以貴也趙元昊改廣運三年曰大慶再舉兵攻回紇陷𤓰沙蘭三州將謀入冦丁丑景祐四年春正月戊寅賜蔡州學田十頃甲午内藏庫言嵗斥緡錢六十萬以助三司盖始於天禧三年時詔書切戒三司毋得復有假貸自明道二年距今才四年而所借錢帛凡九百十七萬二千有餘請以天禧詔書申飭之奏可二月賜常州學田五頃三月朔以賈昌朝王宗道馬希言楊安國並兼天章閣侍講預內殿起居天章閣置侍講自此始夏四月賜宣州學田五頃甲子右僕射兼門下侍郎平章事吕夷簡罷判許州右僕射兼門下侍郎平章事王曽罷判鄆州參知政事宋綬罷為尚書左丞參知政事蔡齊罷為吏部侍郎歸班夷簡專決事不少譲曽不能堪論議多不合曽數求去言夷簡招權市恩帝詰夷簡夷簡乞置對而曽言亦有失實者帝不悦綬素與夷簡善齊議事間附曽故并綬齊皆罷知樞宻院王隨知鄭州陳堯佐並為平章事吕夷簡嘗宻薦二人可用故也參知政事盛度知樞宻院事同知樞宻院事韓億三司使程琳翰林學士承㫖石中立並為參知政事樞宻直學士王鬷為同知樞宻院事乙丑召宋綬入侍經筵閏四月知徐州李迪言欲祠岱岳并至景靈宫祝聖算禱皇嗣上謂參知政事韓億等曰大臣當詢民間利病以分朝廷之憂祈禱之事豈為政耶詔止之丁謂卒王曽語人曰斯人智數不可測在海外猶用詐得還若不死數年未必不復用斯人復用則天下之不幸可勝道哉五月丙寅有芝生於化成殿柱召近臣宗室觀之仍出御製瑞芝詩賜宰臣王隨以下翌日儒臣並為賦頌以獻右司諫韓琦言春秋之法但記灾異至於祥瑞略而不書豈不以君閲瑞牒則意安覩灾符則心懼意安則政怠心懼則徳修聖人垂戒之深其㫖斯在臣愚望陛下特以灾異為重一政教之間思所未至者隨其變而應之至於珍祥竒瑞雖陛下仁愛所感亦望以日慎一日雖休勿休為念則昊穹降鑒答陛下寅畏之心生靈遂宜蒙陛下慈惠之澤自然時和嵗豐家給人足永獲上瑞之報也六月以御製神武祕略賜河北河東陜西緣邊部署鈐轄知州軍毎得代更相付授始韓億同知樞宻院事建言武臣宜知兵書而禁不傳請纂集其要者賜之上於是作神武祕略凡三十篇分十卷仍自作序焉詔國子監以翰林學士丁度所修禮部韻略頒行秋七月戊申有星數百皆西南流其㝡大者一星至東北沒光燭地久之不散已而黒氣長丈餘出畢宿下八月出內藏絹三十萬下河北路市糴軍儲甲午詔天下常平倉錢榖自今三司及轉運司無得借支戊戍許華福二州立學九月御邇英閣讀唐書因詔唐書列傳止取事義切於䂓戒者讀之冬十月御邇英閣讀正說謹罰篇述後漢光武罷梁統從重之奏帝曰深文峻法誠非善政宋綬對曰王者峻法則易寛刑則難夫以人主得專生殺一言之怒則如雷如霆是峻易而寛難也丙子御邇英閣讀正說養民篇帝曰荀子言君如杅民如水何也丁度對曰水隨器之方圓若民從君之好惡是以人君謹所好焉甲午邇英閣講春秋上曰春秋自昭公之後魯道陵遲家陪用政記載雖悉而典要則寡宜删去蔓辭止取君臣政教事節講之因謂宋綬等曰春秋經㫖在於奬王室尊君道丘明作傳文義甚博然其閒錄詭異則不若公羊榖梁二傳之質綬等對曰三傳得失誠如聖言臣等自今凡丘明所記事稍近誣及陪臣僣亂無足勸誡者皆略而不講十一月出內藏庫紬絹五十萬下河北陜西路市糴軍儲十二月給真定府潞州學田各五頃乃詔自今須藩鎮乃許立學它州勿聼甲申忻代并三州言地震壊廬舍覆壓吏民自是河東地震連年不止或地裂泉涌或火出如黒沙狀一日四五震民皆露處乙酉命侍御史程戡體量安撫左司諫韓琦上疏曰臣伏覩鄉者興國寺雙閣灾延及開寶祖殿復聞仰觀垂象或失經行盖人事之已形致天變之嗣發臣謂陛下宜虚佇以求直言側身以修庶政有功則賞有罪則罰旌别賢愚撙節財用抑宴私過度之樂休營造不急之務決獄使之無濫出令斷於必行斯所以念祖宗之艱難荅天意之警悟也而陛下眷三京以肆赦宥走羣望以罄祠祝內自禁掖外及寺觀並與祭醮逮越晦朔矧今北道數郡繼以地震上聞即命使軺就崇法供雖陛下欽順上天之誠可謂至矣其於消伏災𤯝之道則猶未然夫弛刑網以貸頑悖之民損國貲以奉游惰之輩將欲召丕貺感靈心是猶却行以求前揚湯而止沸無益之驗信昭昭矣復上疏言近聞大慶殿及諸處並建道場且大慶殿者國之路寢朝之法宫陛下非行大禮被法服則未嘗臨御臣下非大朝㑹則不能一至於庭豈容僧道凡庸之人繼日累月喧雜於上非所謂正法度而尊威神也望今後凡有道場設醮之類並於别所安置給徐州學田五頃壬辰徙知饒州范仲淹知潤州監筠州稅余靖監泰州稅夷陵縣令歐陽脩為光化縣令上諭執政令移近地故也先是京師地震直史館葉清臣上疏曰天以陽動君之道也地以隂静臣之道也天動地静主尊臣卑易此則亂地為之震乃十二月二日丙夜京師地震移刻而止定襄同日震至五日不止属者熒惑犯南斗一嵗之中灾變仍見必有下失民望上戾天意陛下徒使內侍走四方治佛事治道科非所謂消伏之實也頃范仲淹余靖以言事被黜天下之人齚舌不敢議朝政者行將二年願陛下深自咎責詳延忠直敢言之士庶幾明威降鑒而善應来崇也書奏數日仲淹等皆得近徙戊寅寶元元年春正月直史館同知禮院宋祁上疏曰臣伏見頃嵗以来灾𤯝數見若乃羣星流散則民人蕩析之象也月行黄道地震州邑邊戎窺間臣下擅恣后妃將盛年榖且饑之兆也去年火焚興國寺浮屠延燔藝祖神御殿已而盗壊宗廟釦器者再則神不昭格之意也陛下試一念之假有蕩析以何䇿固安假有饑空以何理振救脱致窺間可任之將為誰儻令擅恣可防之奸有幾丙午以灾異屢見下詔求直言庚戍命翰林學士丁度等權知禮部貢舉乙卯大理評事蘓舜欽詣匭通疏曰臣聞河東地大震裂旣而孟春之初雷電暴作臣切見綱紀隳敗政化缺失其事甚衆不可槩舉謹條大者二事以聞一曰正心夫治國如治家治家者先修己修己者先正心心正則神明集而萬務理今民間傳陛下比年稍邇俳優賤人燕樂踰節賜予過度燕樂踰侈則蕩賜予過度則侈蕩則政事不親侈則用度不足今陛下春秋鼎盛實宵衣旰食求治之秋而乃隔日御殿此政事不親也又府庫匱竭民鮮盖藏誅歛科率殆無虛日此用度不足也二曰擇賢夫明主勞於求賢而逸於任使然盈庭之士不須盡擇在擇一二輔臣及御史講官而已昨王隨自吏部侍郎平章事超越十資復為上相而隨虚庸邪諂非輔相之器降麻之後物論沸騰故疾纒其身灾仍於國陛下左右尚如此天下官吏可知也又張觀為御史中丞髙若訥為司諫二人者皆温和軟懦無剛鯁敢言之氣斯皆執政引拔建置欲其緘嘿不敢舉揚其私時有所言則必暗相關說旁人窺之甚可笑也直史館蘓紳上疏曰星之麗天猶萬國之附王者下之畔上故星亦畔天天者陽之氣地者隂之體其有越隂之分侵陽之政則應以變動雷者天之號令所以開發萌芽辟除隂害萬物須雷而解須雨而潤惟人君崇寛大順春令則應節否則動於冬今方春而雷發聲天其或者欲陛下出號令以震動天下宜及於早而矯臣下舒緩之咎凡朝廷事無巨細無內外取其先急者悉關聖慮而振肅之不可緩也夫星變旣有下畔上之象地震又有隂侵陽之證者天意若曰夷狄將有畔上之釁恐陛下未悟也又以震雷警之欲陛下先事為備則患禍消而福祥至矣葉清臣上疏曰臣聞王者之所以横制六合撫有萬民者在握刑賞之權不授人以柄而已今則不然爵賞刑罰陛下所有也比及於人則天下之人族談囂然不曰自陛下出而曰由宰相得非臣隂之盛而易天地之序者乎校書郎張方平陳七事一曰宻機事二曰用威斷三曰廣言路四曰重圖任五曰正有司六曰信命令七曰示戒懼御史中丞張觀上四事一曰知人二曰嚴禁三曰尚質四曰節用二月詔自今後日御前殿視事用蘓舜欽之言也甲戍賜鄆州學田五頃右司諫韓琦上疏言宰臣王隨登庸以来衆望不協差除任性􅄶躁傷體自宿疹之作幾涉周星安卧私家備禮求退貪祿竊位之計亦已窮矣次則陳堯佐男述古監左藏庫官不成資未經三司保奏而引界滿酬奬之條擢任三門白波發運使參知政事韓億初乞男綜不以資叙回授兄綱將朝廷要職從便退换如己家之物紊亂綱紀舉朝非笑又石中立本以藝文進居近署但滑稽談笑之譽為人所稱處於翰墨之司固當其職若參決大政則誠非所長乞從罷黜以慰具瞻之望三月戊戍朔門下侍郎平章事王隨罷為彰信節度使户部侍郎平章事陳堯佐罷為淮康節度使判鄭州户部侍郎參知政事韓億罷歸本班禮部侍郎參知政事石中立罷為資政殿學士初吕夷簡罷宻薦隨與堯佐二人為相其意引援非才居己下者用之度它日上意見思而復相己及隨與堯佐億中立等議政數忿争於中書隨尋属疾在告而堯佐復年髙事多不舉時有中書畨為養病坊之語琦論隨等凡十上堯佐亦先自援漢故事求䇿免於是四人者俱罷判河南府張士遜為門下侍郎兼兵部尚書平章事户部侍郎同知樞宻院事章得象以本官平章事知樞宻院事盛度加寧武節度使檢校太傅同知樞宻院王鬷工部侍郎李若谷並為參知政事權三司使王博文知永興軍陳執中同知樞宻院事初韓琦數言執政非才上未即聼𤦺又言曰豈陛下擇輔弼未得其人故耶若杜衍孔道輔胥偃宋郊范仲淹衆以為忠正之臣可備進擢不然嘗所用者王曽呂夷簡蔡齊宋綬亦人所属望何不圖任也上雖聼琦罷王隨等更命士遜及得象為相士遜猶以東宫舊恩或言又夷簡宻薦之得象入謝上謂曰徃者太后臨朝羣臣邪正朕皆嘿識惟卿清忠無所附且未嘗有干請今日用卿由此也知制誥宋郊為翰林學士上初欲用郊為同知樞宻院事中書言故事無知制誥除執政者乃先召入翰林學士李淑害其寵欲以竒中之言於上曰宋受命之號也郊交也合姓名言之為不祥它日以諭郊因改名庠甲寅御崇政殿試禮部奏名進士庚辰賜進士吕溱等二百人及第一百十人同出身特奏名一百六十五人同諸科出身及為諸州長史辛酉賜諸科四百十四人及第并出身其特奏名被恩賜者又九百八十四人瓊林宴初賜大學篇范鎮禮部奏名為第一故事禮部第一人賜第未有第二甲者雖近下猶升之吳育歐陽脩殿庭唱第過三人亦抗聲自陳鎮獨黙然至第七十九人乃出拜退就列無一言衆以是賢之禮部第一人在第二甲自鎮始初薛奎知益州還朝與鎮俱或問奎入蜀所得奎曰得一偉人當以文學名世也夏四月給事中權御史中丞張觀同知樞宻院事賜河南府嵩陽書院田十頃乙未詔自今試舉人非國子監見行經書毋得出題六月己卯建州言自正月雨至四月谿水大漲入州城壞民廬舍帝留意農事毎以水旱為憂甲申詔天下州郡毎旬上雨雪狀著為令戊子權知司天少監楊惟徳等言来嵗己夘閏十二月則庚辰嵗正月朔日當食請移閏於庚辰嵗上曰閏所以正天時而授民事其可曲避乎不許秋七月賜襄州學田五頃右司諫韓𤦺言前奉詔詳定鐘律嘗覽景祐廣樂記覩李照所造樂不合古法朝廷因而施用識者久以為非今將親祀南郊不可重以違古之樂上薦天地宗廟詔宋綬晏殊同兩制詳定以聞綬等言李照新樂比舊樂下三律衆論以為無所考據願如𤦺請郊廟復用和峴所定舊樂乃詔太常舊樂悉仍舊制李照所造勿復施用壬戍御崇政殿䇿試賢良方正能直言極諫著作佐郎田況大理評事張方平茂才異等邵亢況所對入第四等方平四等次亢與宰相張士遜連姻報罷八月復置淮南江浙荆湖制置發運使冬十月詔戒百官朋黨初呂夷簡逐范仲淹等士大夫為仲淹言者不已於是內降劄子曰向貶范仲淹盖以宻請建立皇太弟非但詆毁大臣今中外臣寮屢有稱薦范仲淹者事涉朋黨宜戒諭之故復下此詔參知政事李若谷建言近嵗風俗薄惡率以朋黨汙善良盖君子小人各有類今一以朋黨目之恐正臣無以自立帝然其言鹽鐵副使工部郎中司馬池嵗滿當遷中書進名上曰是固辭諫官者遂命為天章閣待制知河中府甲戍趙元昊築壇受冊僣號大夏始文英武興法建禮仁孝皇帝改大慶二年為天授禮法延祚元年十一月庚戍祀天地於圜丘大赦改元戊午鄆州言資政殿大學士左僕射王曽卒曽入朝進止有常處平居寡言自奉亷約人莫敢干以私執政十年其所進退士人莫有知者范仲淹嘗以問曽曽曰夫執政者恩欲歸己怨使誰當皇祐中上為篆其墓碑曰旌賢之碑大臣碑得賜篆自曽始十二月甲子京師地震丙寅鄜延路都鈐轄司言趙元昊反癸酉命夏竦為奉寧節度使知永興軍范雍為振武節度使知延州己夘寶元二年春二月許明州立學仍給田五頃三月編修院與三司上歴代天下户數先是上御邇英閣讀真宗皇帝所撰正說養民篇見歴代户口登耗之數顧謂侍臣曰今天下民籍幾何翰林侍讀學士梅詢對曰先帝所作盖述前代帝王恭儉有節則户口充羡賦斂無度則版圖衰减自五代之季生齒凋耗太祖受命而太宗真宗繼聖承祧休養百姓今天下户口之數盖偣於前矣因詔三司及編修院檢討以聞至是上之庚戍都官員外郎王素為侍御史中丞孔道輔薦之素旦子也丙辰許泉州立學仍給田五頃趙元昊為書及錦袍銀帶投鄜延境上以遺金明李士彬且約以叛候人得之諸將皆疑士彬副都部署夏元亨獨曰此行間爾若有私約豈使衆知耶乃召士彬與飲厚撫之士彬感泣不數日果擊賊取首馘羊馬自効夏四月放宮人二百七人上因諭宰臣張士遜等曰不獨矜其幽閉亦可省禁掖浮費也五月右司諫韓琦言唐之斜封今之內降蠧壞綱紀為害至深乞特降詔諭今後臣僚或有奏請事件輒敢因緣請托及自於內中陳乞特批指揮即望降出姓名并為奏求人並送有司勘劾重行貶責癸卯天章閣侍講賈昌朝上書曰今西夏僣狂此不足慮而國家用度日廣民力頗困是則可憂自天聖以来屢詔有司節省用度未有施行臣嘗治畿邑有禁兵三千而留萬户賦輸僅能取足其三年賞給仍出自內府况它郡邑兵不啻此臣又嘗掌京廩計江淮嵗運粮六百餘萬以一嵗之入僅能充朝廷之用三分二在軍旅一在冗食儻有水旱頻仍之灾軍戎調度之急計將安出哉願取景徳以来迄於景祐校其所入出之數約以祖宗舊制其不急皆省罷之詔張若谷任師中韓琦與三司定奪減省以聞韓琦言減省浮費莫如自宫掖始六月壬戍詔曰比命近臣議省浮費自乗輿服御及宫掖所須務從簡約庚午上封者言審官院缺有限而奏舉選人日益多或至四考五考改京官者請自今須六考以上方許磨勘嘗犯私罪者加一考從之先是詔知永興軍夏竦議西鄙事丙子竦上十䇿一教習強弩以為竒兵二羈縻属𦍑以為藩籬三詔唃厮囉父子并力破賊四度地形險易逺近増减屯兵五詔諸路互相應援六募土人為兵以代東兵七増直弓手壯丁獵户以備城守八並邉小寨毋積芻粮賊攻急則入保大寨九關中民坐罪若過誤者許入粟贖罪十損並邊冗兵冗官及減騎軍以紓饋運秋八月庚午上謂宰臣張士遜曰帝王之明在擇人之邪正則天下無不治矣兩川自夏至秋不雨民大饑庚辰命知制誥韓琦為益利路體量安撫使吏部貟外郎蔣堂為梓䕫路體量安撫使九月御史中丞孔道輔性鯁特立遇事彈劾無所阿避出入風采肅然及再執憲權貴益憚之冬十月宗正寺修玉牒官李淑上所修皇帝玉牒二卷皇子籍一卷丙寅上御延英閣觀講左氏春秋及讀正說終上曰春秋所述前世治亂之事敢不鑒戒正說先帝訓言敢不遵奉丁度等拜伏而言曰陛下徳音若此誠天下之福也上復問度洪範酒誥二篇大義度悉以對因詔度講周易李淑讀三朝寶訓丁度李仲容讀所編經史䂓鑒事迹十一月戊子朔出內庫真珠估緡錢三十萬賜三司上諭輔臣曰此無用之物旣不欲捐棄不若散之民間收其直助糴邊儲亦可少紓吾民之斂也丁酉知樞宻院事盛度為尚書右丞知揚州參知政事程琳為光禄卿知穎州御史中丞孔道輔為給事中知鄆州初張士遜素惡琳而疾道輔不附已將并逐二人察帝有不悦琳意即謂道輔上顧程公厚今為小人所誣宜見上為辨之道輔入對言琳罪薄不足深治帝怒以道輔朋黨大臣故特貶焉辛丑許建州立學仍給田五頃壬寅參知政事王鬷為工部侍郎知樞宻院刑部貟外郎宋庠為諫議大夫參知政事同修起居注宋祁次當知制誥以兄庠在中書乃授天章閣待制同判禮院時陜西用兵調費日蹙祁上疏論三冗三費曰天下有定官無限貟一冗也廂軍不任戰而耗衣食二冗也僧道日益多而不定數三冗也何謂三費一曰道場齋醮無日不有二曰京師寺觀或多設徒卒或増置官司衣粮所給三倍它處三曰使相節度不𨽻藩要貪取公用以濟私家西賊冦保安軍鄜延鈐轄盧守懃等擊走之十二月乙丑賞保安軍守禦之功盧守懃為左騏驥使都廵檢司指使狄青為右班殿直青功最多故超四資授官孔道輔旣貶鄆州始知為張士遜所賣頗憤惋行至韋城發病卒然天下皆以遺直許之元昊復遣賀九言齎嫚書納旌節直史館蘓紳陳便宜八事一曰重爵賞二曰精選擇三曰明薦舉四曰異服章五曰適才宜六曰擇將帥七曰辨忠邪八曰脩備預帝嘉納之尋除史館修撰庚辰康定元年春正月丙辰朔日有食之知諫院富弼請罷宴徹樂雖遼使在館亦宜就賜飲食而已參知政事宋庠以為不可弼曰萬一北遼行之為朝廷羞後使遼還者云遼罷宴如弼言上深悔之元昊詐乞和范雍信之不為備元昊攻保安軍自土門路入壬申聲言取金明寨翌日奄至李士彬父子俱被禽遂乗勝抵延州城下雍先以檄召鄜延環慶副都部署劉平使至保安與鄜延副都部署石元孫合軍趨土門及是雍復召平元孫還軍救延州至三川口遇賊平與元孫皆被執賊圍延州凡七日㑹大雪賊解去二月己丑入內副都知王守忠為陜西都鈐轄知諫院富弼言有唐之衰遂以內臣監軍取敗非一昨用夏守贇已失人望願罷守忠勿遣不聼辛夘天文官李自正上星變圖且言月與太白俱犯昴當有邊兵大起上謂輔臣曰隂陽占候中否參半紂以甲子亡武王以甲子興王者當祇畏天道尤要在人事應之何如爾知制誥韓琦自蜀歸論西兵形勢甚悉即命琦為陜西安撫使乙巳詔京畿京東西淮南陜西路括市戰馬韓琦言陜西科擾頻仍請免括此一路從之丁酉詔樞宻院自今邊事並與宰相張士遜章得象參議之翰林學士丁度嘗建言二府分兵民之政若措置乖異則天下無適從非國體也請軍旅重務二府得通議之知諫院富弼又言邊事係國安危不當專委樞宻院而宰相不與乞如國初令宰相兼樞宻使上參取其言而降是詔士遜等以詔納上前曰恐樞宻院謂臣等奪權弼曰此宰相避事爾非是奪權也自范仲淹貶禁中外越職言事知諫院富弼因論日食以謂應天變莫若通下情願降詔求直言盡除越職之禁上嘉納之癸丑降知延州范雍為吏部侍郎知安州坐失劉平石元孫也三月丙辰詔兩府及執政舊臣俾條上陜西攻守之䇿同知樞宻院事陳執中言元昊乗天下久不用兵而竊發西垂范雍納詭詐之說失於戒嚴劉平任輕躁之心喪其所部塞門至金明二百里須列修三城毎城屯精卒千人冦大至則保城壘小至則自驅逐别以諸司使為蘆關一路都巡檢仍以兵二千人属之使為三寨之援丙子大風晝暝經刻乃復是夜有黒氣長數丈見東南丁丑申詔中外言缺政先是改元詔求直言羣下猶未有所獻故也戊寅知樞宻院王鬷陳執中同知樞宻院事張觀並罷天聖中鬷嘗使河北過真定見曹瑋瑋謂曰君異日當柄用願留意邉防鬷曰何以教之瑋曰吾聞趙徳明嘗使人𣙜易漢物不如意欲殺之元昊諫曰我戎人本從事鞍馬間而與漢𣙜易不急之物已非䇿又從而斬之失衆心不可徳明為貰不殺吾使人覘元昊狀貌異常它日必為邉患鬷時莫究所謂比再入樞宻院元昊果叛帝數問邉計不能對及劉平石元孫等敗議刺鄉兵久不決於是三人同日罷三司使刑部尚書晏殊禮部尚書知河南府宋綬並知樞宻院事保安節度使王貽永同知樞宻院事吏部貟外郎知越州范仲淹復天章閣待制知永興軍始用韓琦之言也庚辰詔參知政事同議邉事夏四月庚子重修祖宗玉牒成旣而修玉牒所言請自今嵗一貼修十嵗一編錄仍以其副留中奏可詔河北轉運使姚仲孫安撫使髙志寧宻下諸州軍添補強壯初知制誥王拱辰使契丹還言契丹不畏官軍而畏土丁故降是詔出左藏內藏庫緡錢各十萬下陜西給軍須范仲淹未至永興癸丑改為陜西都轉運使五月丁巳復知楚州孫沔為監察御史尋詔為右正言先是揀下都輦官為禁軍輦官千餘人遮宰相樞宻使喧訴張士遜方朝馬驚墮地己未御史中丞栁植等奏其事請付有司治時軍興機務填委士遜位首相無所補諫官以為言士遜不自安上章請老壬戌優拜太傅致仕本朝以宰相得謝者自士遜始判天雄軍呂夷簡行右僕射兼門下侍郎平章事甲子元昊陷塞門寨執寨主內殿承制髙延徳監押左侍禁王繼元死之甲戌陜西都轉運使范仲淹言今緣邉城寨有五七分之備而關中之備無二三分若昊賊深入乗關中之虚或東阻潼關隔兩川貢賦則朝廷不得髙枕矣莫若且嚴邉城使持久可守實關內使無虚可乗若寇至使邊城清野不與大戰關中稍實豈敢深入使弓馬之勁無所施牛羊之貨無所售二三年間彼自困弱待其衆心離叛自有間隙則行天討此朝廷之上䇿也徙夏竦為陜西都部署兼經略安撫使緣邊招討使知永興軍己夘以起居舍人知制誥韓琦陜西轉運使范仲淹並為陜西經略安撫副使初仲淹與呂夷簡有隙帝諭仲淹使釋前憾仲淹頓首曰臣向所論盖國事於夷簡何憾也呂中曰夷簡之罪莫大於因私憾而預瑤華之議因北事而忌富弼之能夷簡之功莫大於釋仲淹之宿怨容孫沔之直言君子論人功罪不相掩可也以太常博士林瑀殿中丞王沬並為天章閣侍講景祐末灾異數起上憂之深自貶損瑀言灾異皆有常數不足憂又依周易推演五行隂陽之變為書上之大抵皆䛕諂之詞緣飾以隂陽上大好之於是天章閣侍講缺端明殿學士李淑等薦洙而內批用瑀執政皆怒瑀吕夷簡欲探上意堅否乃曰瑀上所用洙臣下所薦爾不若并進二人唯上所擇乃以洙瑀名進上問洙何如夷簡言洙博學明經上曰吾已用瑀矣若何夷簡請並用二人上許之旣而右正言梁適劾瑀于內降除官請治其罪上令以適章示之卒不罪瑀壬午斬輦官曹榮陳吉於市以倡率其徒遮宰相喧訴者也從者配牢城卒揀輦官為禁軍如初詔六月鄜延副都部署任福為環慶副都部署兼知慶州辛亥復權武成軍節度判官歐陽脩為館閣校勘始范仲淹副夏竦為陜西經略安撫招討辟脩掌書記脩以親為辭且曰今世所謂四六者非脩所好兼此末事有不待脩而能者又曰古人所與成事者必有國士共之非惟在上者以知人為難士雖貧賤以身許人固亦未易欲其盡死必深相知知之不盡士不為用今竒怪豪傑之士徃徃已蒙收擇顧用之如何爾然尚患山林草莽有挺特知義慷慨之士未盡出門下也宜少思焉翰林學士丁度言中國抗夷狄可以智勝不可以戰鬭盖地形武技與中國異也𦍑戎上下山阪出入溪澗中國之馬不如也隘險傾側且馳且射中國之技不如也風雨罷勞饑渴不困中國之人不如也為今之計莫若謹亭障逺斥候控扼要害為制勝之全䇿因條上其䇿名曰備邊要覽秋七月癸亥鄜延鈐轄張亢上疏言諸路部署鈐轄都監多至十四五員少亦不減十員權均勢敵不相統制凡有議論互執不同請别創使名其已係路分部署鈐轄都監者並属新置使處分所貴出於一又請逐路以馬步軍八千以上至萬人擇才位兼髙者為統領其下分為三將賊小入則一將出大入則大將出量賊數多少又使鄰路出兵而應援之此所謂常山蛇勢也又諸路騎兵不能馳險要計其芻粟一馬之費可養步軍五人馬髙不及四尺三寸者宜悉還坊監止留十之二以步人代之其後多施用者八月戊申權知開封府杜衍同知樞宻院事庚戍陜西經略安撫副使范仲淹兼知延州先是詔分邊兵部署領萬人鈐轄領五千人都監三千人有冦則官卑者先出仲淹曰不量賊衆寡而出戰以官為先後取敗之道也為分州兵為六將將三千人分部教之量賊衆寡使更出禦賊賊不敢犯旣而諸路皆取法焉賊相戒曰無以延州為意今小范老子腹中自有數萬兵甲不比大范老子可欺也大范盖指雍云都監周美言於范仲淹曰賊新得志其勢必復来金明當邉衝我之蔽也今不亟完將遂失之仲淹因属美復城如故數日賊果来其衆數萬薄金明陣於延州城北三十里美領衆二千力戰㑹暮援兵不至乃徙軍山北多設疑兵賊望見以為救至即引去九月戊午參知政事李若谷罷為提舉㑹靈觀事宫觀置提舉自若谷始知樞宻院事宋綬為兵部尚書起復翰林學士晁宗慤並參知政事起居舎人鄭戩為同知樞宻院事己未右正言知制誥葉清臣權三司使事中書進擬三司使清臣不在選帝曰葉清臣才可用遂以命之清臣始奏編前後詔敕使吏不能欺簿帳之叢冗者一切刪去內東御門厨皆內侍領之凡所呼索有司不敢問乃為合同以檢其出入丙寅西賊冦三川寨鎮戎軍西路都巡檢楊保吉死之并陷乾溝乾河趙福三堡戊辰知樞宻院事晏殊為檢校太傅充樞宻使同知樞宻院事王貽永刑部侍郎杜衍右諫議大夫鄭戩並為樞宻副使庚午大理寺丞簽書定國節度判官事种世衡為內殿承制知延州青澗城世衡放兄子㓜從放學任氣有材略壬申環慶副都部署任福等攻西賊白豹城克之合奉宸五庫為一庫在延福宮內舊名宜聖殿五庫冬十月戊子詔自今內降指揮與臣僚遷官及差遣者並令中書樞宻院具條執奏以聞上性寛仁宗戚近幸有求內降者或不能違故也癸巳命館閣校勘刁約歐陽脩同修禮書十一月丙辰內出御撰洪範政鑑審樂要記風角集占以示輔臣仍以風角集占賜陜西諸路部署司壬戍有大星流西南聲如雷者三丁卯鄜延路部署指揮使右班殿直狄青為右侍禁閤門祗候涇州都監青毎臨敵披髪靣銅具出入賊中皆披靡無敢當者尹洙為經略判官青以指使見洙與談兵善之薦於副使韓琦范仲淹曰此良將才也二人一見竒之待遇甚厚仲淹以左氏春秋授之曰將不知古今匹夫勇爾青折節讀書悉通秦漢以来將帥兵術由是益知名十二月出內藏庫銀一百萬下三司助邊費詔天下諸縣凡掘飛蝗遺子一升者官給以米豆三升乙未徙知隨州王徳用知曹州徳用道過許州梅詢謂徳用曰道輔害公者今死矣徳用曰孔中丞以其職言豈害徳用耶朝廷亡一忠臣可惜也上以手詔問師期夏竦等乃畫攻守二䇿遣副使韓𤦺判官尹洙馳驛至京師求決於上乙巳詔鄜延涇原兩路取正月上旬同進兵入討西賊上與兩府大臣共議用攻䇿也樞宻副使杜衍獨以為僥倖出師非萬全計争論久之不聼遂求罷亦不聼始晁宗慤即軍中問攻守䇿衆欲大舉經略判官田京曰虜蓄謀久矣未易亟破也今欲驅不習之師深入虜地與賊銳鋒争一旦之勝此兵家所忌師出必敗或曰宜與講和京又曰賊兵未嘗挫安肯和也館閣校勘歐陽脩上書曰自元昊叛逆三十萬之兵食於西者二嵗矣又有十四五萬之鄉兵不耕而自食其民自古未有四十五萬之兵連年仰食而國力不困者也夫兵攻守而已然皆以財用為強弱也臣以為通漕運盡地利權商賈三術並施財用足而西人紓國力完而兵可久以守以攻惟上所使戊申通判河中府皮仲容知商州兼提㸃采銅鑄鐵錢事仲容嘗建議鑄大錢一當十謂可權行以助邊費故有是命三司使葉清臣言新茶法未適中請擇明習財利之臣别行課校上以號令數更民聼眩惑乃詔即三司裁定務優販者然亦卒無所變也初明道二年復用天禧舊制聼商人入錢粟京師及淮浙江南荆湖州軍易鹽及景祐二年三司言諸路博易無利乃罷之而入錢京師如故宋史全文卷七下
