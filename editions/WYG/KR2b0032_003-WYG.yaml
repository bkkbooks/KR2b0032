body:
  text: 宋史全文卷三宋太宗一丁丑太平興國二年春正月丙寅命禮部員外郎賈黄中左補闕程能左贊善大夫馮瓚分掌左藏三庫先是貨泉與金帛通掌嵗久儲蓄盈羡始命分之黄中尋出知昇州嘗案行府廨見一室扄鐍甚固命發鑰視之得金寶數十匱計其價直數萬萬乃李氏宫閣中遺物即表上之上曰非黄中廉恪則亡國之寶將汙法而害人矣賜錢二十萬上初即位以疆宇至逺吏員益衆思廣振淹滯以資其間闕顧侍臣曰朕欲博求俊乂於科場中非敢望拔十得五止得一二亦可為致治之具矣於是禮部上所試合格人名戊辰上御講武殿内出詩賦題覆試進士賦韻平仄相間依次用命翰林學士李昉扈蒙定其優劣為三等得河南吕蒙正以下一百九人庚午覆試諸科得二百七人並賜及第又詔禮部閱貢籍得十五舉以上進士及諸科一百八十四人並賜出身九經七人不中格上憐其老特賜同三傳出身凡五百人皆先賜緑袍鞾笏錫宴開寶寺上自為詩二章賜之唐時禮部放榜之後醵飲於曲江號曰聞喜宴上命中使典領供帳甚盛第一第二等進士并九經授將作監丞大理評事通判諸州同出身進士及諸科並送吏部免選優等注擬初資職事判司簿尉寵章殊異歴代所未有也薛居正等言取人太多用人太驟上意方欲興文教抑武事弗聽及蒙正等辭召令陞殿諭之曰到治所事有不便於民者疾置以聞或曰太祖之幸洛陽也洛陽人張齊賢獻下并汾富民封建敦孝舉賢太學籍田選良吏懲奸謹刑十䇿太祖召見便坐問之齊賢以手畫地條陳太祖善其四䇿齊賢堅執其餘䇿皆善太祖怒令衛士曵出及還語上曰我幸西京惟得一張齊賢耳我不欲遂官爵之汝異時可收以自輔也於是齊賢舉進士上決欲置之高等而有司第其名適在數十人後上不恱乃詔進士盡第二等及九經凡一百三十人悉與超除蓋為齊賢故也庚辰詔以美名易禁軍舊號鐡騎曰日騎控鶴曰天武龍騎曰龍衛虎捷曰神衛二月江南置監鑄銅錢廢李煜舊用鐡錢初右監門衛率府副率王繼勲分司西京殘暴愈甚强市民家子女以備給使小不如意即殺而食之以槥櫝貯骨出棄野外女儈及鬻棺者出入其門不絶民甚苦之而不敢告上在藩邸頗聞其事及即位㑹有訴者亟命戸部員外郎知雜事雷德驤往鞫之繼勲具伏所殺婢百餘人乙卯斬繼勲并女儈八人於洛陽市長夀寺僧惠廣嘗同食人肉上令先折其脛然後斬之民皆稱快三月香藥庫使高唐張遜建議請置𣙜易局庚寅知江州周述言盧江白鹿洞學徒常數千百人乞賜九經使之肄習詔國子監給本仍傳送之夏四月甲寅契丹遣耶律敞等來助葬太祖晏駕詔翰林學士戸部侍郎李昉兼判太常寺昉歸語其子宗諤等曰堂吏不知典故豈有為丞郎而判寺乎近者竇儀判大理寺崔頌判國子監此蓋失之久矣宗諤因問凡制敕所出必自宰相今言堂吏不知典故何也昉曰命官判寺宰相必不經心惟堂吏舉近例使押字爾昉又言自太祖臨御以來百司吏艱於選補後進者多不習故事由是臺省舊規漸成廢墜云五月庚午命起居舍人辛仲甫使於契丹契丹主問曰聞中朝有党進者真驍將如進之比凡幾人仲甫對曰名將甚多如進鷹犬之材何可勝數契丹主頗欲留之仲甫曰信以成義義不可留有死而已契丹主知其秉節不可奪厚禮遣還上曰仲甫逺使絶域練逹機宜可謂不辱君命若更得如仲甫數人朕何患也己卯祔太祖神主於太廟廟樂曰大定之舞以孝明皇后王氏配閏七月有司上諸州所貢閏年圖八月上初即位以髙保寅知懷州懷州故𨽻河陽時趙普為節度使保寅素與普有隙手疏乞罷節鎮領支郡之制乃詔懷州直𨽻京長吏得自奏事於是虢州刺史訴保平軍節度使杜審進闕失事詔右拾遺李瀚往察瀚因言節鎮領支郡多俾親吏掌其關市頗不便於商賈滯天下之貨望不令有所統攝以分方面之權尊奬王室亦强幹弱枝之術也始唐及五代節鎮皆有支郡太祖平湖南始令潭朗等州直属京長吏得自奏事其後大縣屯兵亦有直屬京者興元之三泉是也上納瀚言天下節鎮無復領支郡者矣九月上屬意戎事每朝罷親閱禁卒命築講武臺於城西之楊村辛亥大閱上與羣臣等登臺而觀命天武左廂都指揮使崔翰分布士伍南北綿亘二十里建五色旗以號令將卒望其所舉為進退之節每按旗指縱則千乗萬騎周旋如一甲兵之盛近代無比上甚恱賜翰金帶國子監主簿郭恕先决杖配𨽻登州恕先即忠恕也初責乾州司戸參軍秩滿去官遂不復仕縱放岐雍陜洛之間或踰月不食盛夏暴日中無汗大寒鑿冰而浴人皆異之尤善畫得其畫者藏以為寶上雅聞恕先名召為國子監主簿賜賚甚厚令於太學判定歴代字書内侍押班竇神興嘗館之恕先美鬚髯一日忽盡拔去神興驚問其故恕先曰聊以效顰耳神興大怒白上以恕先無檢局放縱敗度恕先益縱酒謗讟上怒故及於禍恕先行至臨邑謂部送吏曰我逝矣因掊地為穴度可容面俯窺焉而卒藁葬道左後將改葬但得其衣衾蓋尸解云十一月鎮安節度使馬軍都指揮使党進出為忠武節度使進掌禁衛凡十一年嘗徼巡京師閭巷間有蓄竒禽異獸者進或見必命左右取而放之罵曰買肉不供父母反飼禽獸乎嘗為杜重威家奴重威子孫貧賤進月分俸錢給之人亦以此稱焉戊寅太平興國三年春正月己酉命翰林學士李昉等修太祖實録直學士院湯恱等修江表事迹建隆初三館所藏書庫及平諸國盡收其圖籍凡八萬餘卷詔置三館二月朔賜名崇文院詔鑿池引金水河注之遂名池曰金明夏四月乙卯召華山道士真源丁少微至闕少微善服氣引年與陳摶齊名然少微志尚清潔摶嗜酒放曠雖居室密邇未嘗徃來少微以金丹巨勝南芝𤣥芝等獻上留數月遣還己卯平海節度使陳洪進上表獻所管漳泉二州得縣十四戸十五萬一千九百七十八兵一萬八千七百二十七五月吳越王俶上表獻所管十三州一軍凡得縣八十六戸五十五萬九百八兵十萬五千三十六命范旻權知兩浙諸州事錢氏地狹民衆賦斂苛暴旻至悉條奏請蠲除之詔從之李光叡卒子繼筠嗣六月上注意治本深懲賍吏己巳詔自太平興國元年十月乙卯以後京官幕職州縣官犯贓除名配諸州者縱逢恩赦所在不得放還已放還者有司不得叙用九月甲申朔上御講武殿覆試禮部合格人進士加論一首自是常以三題為準得渤海胡旦以下七十四人乙酉得諸科七十人並賜及第始賜宴於迎春苑授官如二年之制故事禮部惟春放榜至是秋試非常例也詔自今廣文館及諸州府禮部試進士律賦並以平仄依次用韻冬十月司農寺丞孔宜知星子縣回獻所為文上召見問以孔子世嗣擢右贊善大夫襲封文宣公辛酉詔免襲封文宣公家租稅上初即位幸左藏庫視其儲積語宰相曰此金帛如山用何能盡先帝每焦心勞慮以經費為念何其過也於是分左藏北庫為内藏庫并以講武殿後封樁庫屬焉改封樁庫為景福内庫初太祖制置封樁庫欲贖幽薊㑹晏駕不果十一月乙未親享太廟丙申合祭天地於南郊御丹鳳樓大赦受冊尊號於乾元殿國初以來南郊四祭及感生帝皇地祗神州凡七祭並以四祖迭配上即位但以宣祖太祖更配於是合祭天地始奉太祖升侑焉十二月乙丑幸講武臺觀飛仙軍人發機石射連弩上將伐北漢先習武事也庚午臘有司請備冬狩之禮上從之因謂左右曰老子云馳騁畋獵令人心發狂夏書曰外作禽荒為人上者不得不戒歴觀前代多惑於此而致䘮敗朕今順時蒐狩為民除害非敢以為樂也是冬諸州貢舉人並集㑹將親征河東罷之自是毎間一年或二年乃置貢舉是嵗初置文思院己卯太平興國四年春正月上初即位謂齊王廷美曰太原我必取之及議致討召樞密使曹彬問曰我今舉兵卿以為何如彬曰國家兵甲精銳人心忻戴若行弔伐如摧枯拉朽耳何有不可哉上意遂決乙未宴潘美等於長春殿上親授方畧以遣之時劉鋹及淮海王俶武寜節度使陳洪進等皆與鋹因言朝廷威靈及逺四方僭竊之主今日盡在座中旦夕平太原劉繼元又至臣率先來朝願得執梃為諸國降王長上大笑賞賜甚厚鋹詼諧類此癸卯新渾儀成司天監學生張思訓所創也置文明殿東南之鐘鼓樓以思訓為渾儀丞舊制日月晝夜行度皆人所運轉新創成於自然尤為精妙二月甲子車駕發京師三月庚辰朔駐蹕於鎮州夏四月車駕發鎮州幸太原乙亥幸連城視攻城諸洞時李漢瓊率衆先登矢集其腦又中指傷甚猶力疾上促召至幄殿視其創傅以良藥上欲親幸洞屋中勞士卒漢瓊泣曰晉陽孤壘危若累卵諸將用命戰士賈勇矢石注洞屋如雨陛下奈何以萬乗之尊親往臨之若不聽臣請先死上乃止五月壬午幸城南上謂諸將曰翌日重午當食於城中癸未督諸將急攻左僕射致仕馬峯以病卧家舁入見北漢主流涕以興亡諭之北漢主上表納欵甲申遲明劉繼元率其官属素服紗㡌待罪䑓下詔釋之顧謂淮海國王錢俶曰卿能保一方以歸於我不致血刄深可嘉也北漢平凡得州十軍一縣四十一戸三萬五千二百二十兵三萬命劉保勲知太原府以繼元為右衛上將軍彭城郡公龜鑑曰太原違命前有劉鈞後有繼元反側變詐太祖嘗赫斯怒而整其旅矣念漢祀之血食開劉鈞之生路何恕耶寜不得太原毋失吾將士何寛耶至太宗則不可以寛恕屢縱之也於是令邊郡治攻具焉於是幸講武臺習武事焉東南厎定之時北伐之意決矣曹彬曰可吾從之薛居正曰不可吾不之從曰曹翰爾智勇無雙其當城北面曰郝守濬爾技巧精嚴其理城西面天子又親駕六師以從之鼓行而前士氣百倍身被八創變甚亟矣而許均爭雄足貫兩矢勢若殆也而荆嗣賈勇蠢爾范超當城之坤一駕而授首孱爾郭萬超當城之乾再駕而請命自是汾晉之民有生意矣詩曰廣文之聲卒其伐功吾於平太原見之㑹繼元降人人有希賞意上將遂伐契丹取幽薊諸將皆不願行然無敢言者殿前都虞候崔翰獨奏曰此一事不容再舉乗此破竹之勢取之甚易時不可失也上恱即命樞密使曹彬議調發屯兵六月庚申車駕北征丁卯上躬擐甲胄率兵次岐溝契丹東易州刺史劉禹以州降戊辰上次涿州判官劉元德以城降庚午遲明次幽州城南秋七月甲申上以幽州城踰旬不下士卒疲頓轉輸回逺復恐契丹來救遂詔班師乙巳車駕至自范陽初劉繼業為繼元扞太原城東南面頗殺傷王師及繼元降繼業猶據城苦戰上素知其勇欲生致之令中使諭繼元俾招繼業繼元遣親信往繼業乃北面再拜大慟釋甲來見上喜慰撫之甚厚復姓楊氏止名業尋授左領軍衛大將軍八月丁巳以業為鄭州防禦使李繼筠卒弟繼捧立初武功郡王德昭從征幽州軍中嘗夜驚不知上所在或有謀立王者㑹知上處乃止上聞不恱及歸以北征不利久不行太原之賞議者皆謂不可於是德昭乗間入言上大怒曰待汝自為之賞未晩也德昭惶恐還宫自刎上聞之驚悔往抱其尸大哭曰癡兒何至是耶追封魏王謚曰懿九月丁亥初置王子侍讀以左贊善大夫楊可法為之庚寅戸部郎中侯陟為諌議大夫權御史中丞權中丞始此契丹大入冦鎮州都幹轄雲州觀察使劉延翰率衆禦之崔彦進潛師躡敵後李漢瓊及崔翰亦領兵繼至先是上以陣圖授諸將俾分為八陣趙延進謂翰等曰主上委吾等邊事蓋期於克敵耳今敵騎若此而我星布其勢懸絶彼若乗我將何以濟不如合而擊之可以決勝違令而獲利不猶愈於辱國乎翰等以擅改詔㫖為疑李繼隆曰兵貴適變安可以預料為定違詔之罪繼隆請獨當之於是分為二陣前後相副士衆皆喜三戰大破之冬十月庚午捷聞手詔褒之十一月辛夘以建州邵武縣為邵武軍辛丑初西南夷不供朝貢冦鈔邊境刑部郎中許仲宣為西川轉運使親至大渡河諭其逆順示以威福夷人皆率服為嶺南轉運使江表用兵軍中須索百端仲宣皆豫儲蓄無缺曹彬怪之及攻城須用陶器數萬事分給攻城卒然燈自照仲宣已預料置如其數付之他物類此十二月詔改司冦參軍為司理參軍以司冦院為司理院令於選部中選歴任清白能折獄辨訟者為之庚辰太平興國五年春正月上既平太原遂觀兵范陽得汾燕薊之馬凡四萬二千餘匹國馬増多乃詔於景陽門外新作四廐名曰天駟監左右各二以左右飛龍使為左右天廐使閑厩使為崇儀使内廐馬既充牣始分置諸州牧養庚寅以程羽為文明殿學士二月京西轉運使程能上言諸道州府民事徭役者未嘗分等慮有不均欲望下諸路轉運司差官定為九等上四等戸令充役下五等戸並與免役令轉運使躬親詳定勿復差官閏三月甲寅上御講武殿覆試權知貢舉程羽等所奏合格進士得銅山蘇易簡以下百一十九人又得諸科五百三十人並分第甲乙賜宴始有直史館陪坐之制唐有勑賜及第以表特恩開寶以來御試中第一者皆稱之其文臣有不由科第者四因獻文别試以勑賜進士及第或賜御前進士及第又有同進士及第士出身之目其後復賜史進士及第仍附是年第一等進士之下夏四月有趙國昌者求應百篇舉癸未上親試之出雜題二十字令各賦五篇篇八句逮至日旰僅成數十首率無可觀上以此科久廢特賜及第戊子襄州言襄陽縣民張巨源五世同居内無異㸑詔旌表門閭巨源嘗習刑名書特賜明經及第六月己亥以江州白鹿洞主明起為蔡州褒信縣主簿白鹿洞在廬山之陽常聚生徒數百人李煜割善田數十頃廩給之選太學之通經者日為諸生講誦於是起建議以其田入官故爵命之白鹿洞由是漸廢矣知邕州侯仁寶上疏言交州主帥被害其國亂可以偏師取之上大喜秋七月丁未以仁寶為交州路水陸轉運使孫全興郝士濬陳欽祚崔亮為邕州路兵馬都部署劉澄賈湜王僎為廉州路兵馬部署水陸並進討冬十一月詔巡北邊壬子發京師戊午駐蹕於大名府雄州言契丹皆遁去開寶末右補闕竇偁為開封府判官與推官賈琰同事上琰便佞能先意希㫖偁嘗疾之上與諸王宴射琰侍上側頗稱贊德美詞多矯誕偁叱之曰賈氏子巧言令色豈不愧於心哉坐皆失色上亦為之不樂至是上思見偁促召至行在癸亥以偁為北部郎中時方議北征偁因抗疏請還都牧養士馬徐為後圖上恱其言及至自大名以偁為樞密直學士偁儀之弟也十二月甲戍畋近郊因以閱武賜禁軍校及衛士襦袴時禁盜獵有戰士獲麞違令當死上曰我若殺之後世必謂我重獸而輕人釋其罪丁丑以鄭州防禦使楊業領雲州觀察使仍判鄭州知代州事業自鴈門之役契丹畏之毎望見業旗即引去主將屯邊者多疾之或潛上謗書斥言其短上皆不問封其書付業富弼曰昔魏將樂羊征中山平之及還見其君所收謗書三篋方知將帥立功不難但人君信任為難爾將帥専閫外權擅行威福人豈無嫉之者嫉之則謗自生既有謗言聞之於君惑之則疑其將將被疑未有立功者此樂羊所以感歎其事自後帝王非聰明睿智之主少有不惑謗言者其明不能及魏國之君也楊業本河東降將太宗得之信任不疑每納謗書一一付業使邊將安心以立事其過魏國之君矣上因契丹遁去遂欲進取幽州命宰相問李昉扈蒙等以事之可否昉等上奏請申戒羽衛旋斾京師善養驍雄精加訓練嚴敕邊郡廣積軍儲講習武經繕修攻具竢府藏之充溢洎閭里之富完朞嵗之間用師未晚上深納其說即下詔南歸上既還京師議者皆言宜速取幽薊左拾遺直史館張齊賢上疏其略曰聖人舉事動在萬全百戰百勝不若不戰而勝若重之謹之戎虜不足吞燕薊不足取自古疆場之難非盡由戎狄亦多邊吏擾而致之若縁邊諸寨撫禦得人但使峻壘深溝畜力養銳以逸自處寜我致人李牧所以稱良將於趙用此術也所謂擇卒未如擇將任力不及任人如是則邊鄙寜邊鄙寜則輦運減輦運減則河北之民獲休息矣臣又聞家六合者以天下為心豈止爭尺寸之土角戎狄之勢而已是故聖人先本而後末安内以養外人民本也夷狄末也中夏内也夷狄外也是知五帝三王未有不先根本者也堯舜之道無他廣推恩於天下之民爾推恩者何在乎安而利之民既安利則戎狄斂衽而至矣伏望審擇通儒分路採訪有偽命日賦斂苛重者改而正之因而利之使賦稅可經久而行天下諸州有不便於民事委長吏聞奏使天下耳目皆知陛下之仁戴陛下之惠此以德懷逺以惠利民則幽燕竊地之醜沙漠偷生之衆禽之與屈總在術内爾講義曰一王恢而啓三十年窮兵之禍一王韶而貽數千里流血之毒自古疆場之難非盡由夷狄齊賢之論其知本矣然齊賢徒知契丹未可伐而不知燕薊在所當取豈惟齊賢不之知雖趙普田錫王禹偁亦不之知也蓋燕趙之所當取者有二一則中國之民䧟於左衽二則中國之險移於夷狄燕薊不收則河北之地不固河北不固則河南不可高枕而卧也特太宗之時未有其機耳辛巳太平興國六年春正月乙巳詔曰百里之長字民之要官也今縣邑廣而闕員多選曹拘以常調歴年未滿非所以振淹䘏惠吾民也適變通方宜從新制其令諸路轉運使下所属州令長吏擇見任判司簿尉之清廉明幹者具以名聞當驛召引對授以知縣之任焉吕源曰出宰百里最近於民祖宗勤䘏民隠故詳擇宰令必引對親視才否而授之雖一命初仕亦臨軒顧問臣已釋於前矣况乎百里之重乎詔諸道轉運使察訪部内官吏有履行著聞政術尤最及文學茂異者各舉二人三月岐王德芳薨太祖之次子夏五月旱大赦六月薛居正薨贈大尉中書令謚文惠居正風度環偉操行方正為相任寛簡不苛察士君子以此多之其妻悍妬不生育惟吉養子也行檢不正上臨其喪問不肖子安在惟吉伏喪側驚愧不敢起盡革故態後委以大藩所至稱治秋九月乙未朔日有食之交州行營言破賊軍萬五千衆於白藤江口於是侯仁寶率前軍先進賊詐降以誘仁寶仁寶信之遂為所害時諸軍冒炎瘴多死者轉運使許仲宣馳奏仁寶戰没且乞班師不待報即分屯諸州開庫賞賜給其醫藥乃上章自劾詔書嘉納之遣使就劾澄等㑹王僎病死澄與賈湜並戮於邕州市全興伏誅陳欽祚郝士濬崔亮皆責授團練刺史吕源曰太平興國五年七月孫全興等平交州庚戍全興等辭赴嶺南詔引進使梁逈供帳於玉津園餞之嗚乎全興等以小官奉使恩禮既隆責任益重數路勞費以供是役兩界赤子䧟於兵刄者不知多少之數也全興不能體國乃與侯仁寶校毫釐之利有彼我之分遂無成功悞國大事償之一死不為過也詔諸州大獄長吏不親決胥吏旁縁為姦追捕證左滋蔓踰年而獄具自今長吏每五日一慮囚情得者即決之上不欲天下有滯獄乃建三限之制大事四十日中事二十日小事十日不須追捕而易決者不過三日時既取太原范陽未下上怒不賞平晋之功中外莫敢言錫因入辭直進封事言軍國要機一朝廷大體四略曰頃嵗平太原逮兹二載未賞軍功請因郊祀行之此要機之一也交州瘴海之地得之如獲石田願無屯兵以費財此大體之一也邇來官廢其職給事中不過封駁遺補不貢直言起居郎舍人不得升陛紀言動御史不彈奏左右丞今尚闕員中書舍人雖掌書命未聞訪之以事集賢院雖有書籍而無職官祕書省雖有職官而無圖籍願擇材而任之各司其局此大體之二也朝廷闢西苑廣御地而尚書無本㕔郎曹無本局九寺三監狹室蕭然禮部試士或就武成王廟是豈太平之制望别修省寺用列職官此大體之三也又每於衢路見囚荷鐡枷於法所無去之可矣此大體之四也上嘉其言降詔褒諭仍賜錢五十萬或謂錫今宜少晦以逺讒忌錫曰事君之誠惟恐不竭矧天植其性豈以一賞可奪耶解田錫言職出為河北南路轉運副使時盧多遜專政羣臣章表不先稟多遜則有司不敢通錫為左拾遺嘗獻平戎歌多遜許之始得進御又諌官上章必令閣門吏依常式云不敢妄陳利便希望恩寵貽書多遜請諌官免書狀多遜不恱出之吕源曰田錫在太宗朝鯁慨言事而太宗親賜璽書與之委曲辨論周悉如此宜其感激而愈堅其操藴也既擢為知制誥因嵗旱言事忤㫖出知陳州及事真宗益以規畫獻替為己任雖死不改其節以此受人主異知至使人主聚集前後章疏自收置一漆匣以遺仁宗錫雖亡久矣而名不滅身沒之後又受知於嗣聖可謂不負其所學也太子太保趙普奉朝請累年盧多遜益毁之欝欝不得志㑹如京使柴禹錫等告秦王廷美驕恣將有隂謀竊發上召問普普對曰臣願備位樞軸以察奸變上於宫中訪得普前所上章并發金匱遂大感悟召普謂曰人誰無過朕不待五十已盡知四十九年非矣辛亥以普為司徒兼侍中始太祖傳位於上昭憲顧命也或曰昭憲及太祖本意蓋欲上復傳之廷美而廷美將復傳之德昭故上即位亟命廷美尹開封德昭授貴州防禦使實稱王子皆縁昭憲及太祖意也德昭既不得其死德芳相繼夭絶廷美始不自安寖有邪謀他日上嘗以傳國意訪之趙普普曰太祖已誤陛下豈容再誤耶於是普復入相廷美遂得罪凡廷美所以得罪則普之為也十一月改武德司為皇城司上嘗遣武德卒察逺方事有至汀州者知州王嗣宗執而杖之縛送闕下因奏曰陛下不委任賢俊而猥信此軰為耳目竊為陛下不取上大怒遣使械嗣宗下吏削秩既而怒解嘉嗣宗直節令遷其官親饗太廟辛亥合祭天地於圜丘大赦御乾元殿受冊尊號先是有秦再思者上書願勿再赦且引諸葛亮佐蜀數十年不赦事上頗疑之以問趙普普曰國家開創以來其存彛制三嵗一赦所謂其仁如天堯舜之道劉備區區一方用心無足師法上然其對赦宥之之文遂定十二月先是諸州犯罪之人皆錮送闕下於道路非理而死者十常六七張齊賢上言罪人至京請擇清彊官慮問若顯負沈屈則量罰本州官吏自今令只遣正身家属别竢朝㫖齊賢又言刑獄繁簡乃治道弛張之本州縣胥吏皆欲多禁繫人或以根窮為名恣行追擾租稅逋欠至少而禁繫累日遂至破家請自今外縣罪人令五日一具禁放數白州州獄别置歴委長吏撿察三五日一引問䟽理每月具奏下刑部閱視有禁人多者即奏遣朝官馳往決遣若事渉寃誣故為淹滯則降黜其本州官吏或終嵗獄無寃滯則刑部給牒得替日較其課旌賞之齊賢勤究民弊務存寛大行部遇投訴者或召至傳舍榻前與語多得其情偽江南人久益稱之壬午太平興國七年春正月壬寅詔翰林學士承㫖李昉等詳定士庶車服喪葬制度付有司頒行違者論其罪二月以給事中侯陟右正諌大夫王明同判三司同判三司自陟明始夏四月以樞密直學士竇偁中書舎人郭贄參知政事太宗謂偁曰汝自揣何以至此偁曰陛下念藩邸之舊臣出於際㑹上曰非也乃汝面折賈琰賞卿之直耳普復相多遜益不自安普屢諷多遜令引退多遜貪權固位不能自決㑹普廉得多遜與秦王廷美交通事遂以聞丙子詔文武常參官集議朝堂太子太師王溥等奏多遜及廷美顧望呪詛大逆不道丁丑詔削奪多遜官爵并家屬流崖州廷美勒歸私第多遜赴貶所食於道傍逆旅有嫗頗能言京邑舊事多遜曰嫗自何來乃居此嫗顰蹙曰我本中原士大夫家有子任某官盧某作相令枉道為某事吾子不能從其意盧銜之中以危法盡室竄南荒未周嵗骨肉相繼淪沒惟老身流落山谷彼盧相者妬賢怙勢恣行無忌終當南竄幸未死間或可見之耳多遜黙然趣駕去吕中曰多遜相則趙普出趙普入則多遜貶大臣相傾之風已芽蘖於此然盧邪而趙正當時邪猶未足以勝正耳五月甲戍親録禁囚趙普等以上察見微隠相率稱賀上嘗謂趙普曰朕每讀書見古帝王多自尊大深拱嚴凝誰敢犯顔言事若不降請接納則是自蔽聰明或喜賞怒刑豈能歸天下之心哉普曰帝王若賞罰無私内外無間上求其理下竭其誠馴致太平不為難事上又問治民之道復有何術普曰陛下恤念生民每聞利病無不即日施行古聖王愛民之心止於此矣趙普以秦王廷美謫居西洛非便教知開封府李符言廷美不悔過怨望乞徙邊郡以防他變丙辰降廷美為涪陵縣公房州安置李繼捧來朝獻四州地其弟繼遷叛去八月廷美既出房州趙普恐李符漏其言乃坐符府中用刑不當癸亥責為寜國軍司馬冬十月上嘗謂侍臣曰朕每讀老子至佳兵不祥之器聖人不得已而用之未嘗不三復以為規戒王者雖以武功克定終須用文德致治朕每退朝不廢觀書意欲酌前世成敗而行之以盡損益也幸金明池閱習戰行乾元厯十二月戊午朔日有食之是嵗契丹明扆死子隆緒立高麗王伷死先是桐廬縣刁衎上疏言滛刑酷法非律文所載者望詔天下悉禁止之上覽疏甚恱降詔褒答焉癸未太平興國八年春正月彌德超因乗間以急變聞於上云樞密使曹彬得士衆心又巧誣以他事上頗疑之戊寅彬罷為天平節度使兼侍中以東上閤門使開封王顯為宣徽南院使德超為北院使並樞密副使上召顯謂曰卿世非儒門少罹兵亂必寡學問今典掌萬機固無暇博覽羣書命左右取軍戒三篇賜顯曰讀此亦可免於面牆矣富弼曰大臣不知學術則暗於大體王顯一武人雖以才力任用為樞密使太宗慮其不學不能曉適變之事故以軍戒授之使知賢者行事也孔承恭言儀制令有云賤避貴少避長輕避重去避來望令於要害處設木刻其字庶可興禮讓而厚風俗詔行其言三月以右諌議大夫同判三司宋琪為左諌議大夫叅知政事始分三司各置使王明為鹽鐡使陳從信為度支使郝正為戸部使諸王及皇子府置咨議翊善侍講官上親試舉人擢長沙王世則以下百七十五人並賜及第諸科百十七人出身賜宴瓊林苑後為定制張齊賢初除轉運使辭日上面命曰江南多出銅為朕密經營之齊賢乃訪得江南承㫖丁釗歴指饒信䖍州山谷産銅鈆錫之所又求前代鑄法惟饒州永平監用唐開元錢料肉好周郭精妙堅實可久由是定取其法嵗鑄三十萬貫凡用銅八十五萬斤鈆三十六萬斤錫十六萬斤齊賢即詣闕面陳其事詔可之夏四月上嘗覽福建版籍謂宰相曰陳洪進止以漳泉二州贍數萬衆無名科斂民所不堪比朝廷悉已蠲削民皆感恩朕亦不覺自喜上嘗作戒諭辭二付閤門一以戒京朝官受仕於外者一以戒幕職州縣官丁未令閤門於朝辭日宣㫖朂勵仍書其辭於治所屋壁遵以為戒初彌德超誣曹彬事成期得樞密使及為副使大失望一日詬王顯等曰汝軰當斷頭我度上無執守為汝軰所眩惑顯等告其事上怒壬子德超除名并親属流瓊州德超始因李符宋琪之薦得事上及符貶德超屢稱其寃㑹德超敗上惡其朋黨令徙符嶺表盧多遜之流崖州也符白趙普朱崖雖逺在海中而水土頗善春州稍近至者必死不若令多遜處之普不答至是即以符知春州嵗餘卒上悟彬無他待之愈厚臨朝累日不懌從容謂趙普曰朕以聽斷不明幾敗大事夙夜循省内愧於心普對曰陛下知德超才幹而任用之察曹彬無罪而昭雪之有勞者進有罪者誅物無遁情事至立斷此所以彰陛下聖明也雖堯舜何以過此上由是釋然八月太祖初以扈蒙之言詔盧多遜録時政月送史館多遜訖不能成書於是右補闕直史館胡旦復言五代自唐以來中書樞密院皆置時政記每月編修送史館周顯德中宰相李榖又奏樞密院置内庭日厯自後因循廢闕史臣無憑撰集望令樞密院依舊置内庭日厯委文臣任副使者與學士輪次記録送史館上采其言辛亥詔自今軍國政要並委叅知政事李昉撰録樞密院令副使一人纂集每季送史館昉因請以所修時政記每月先奏御後付所司從之時政記奏御自昉始也冬十月趙普罷為武勝軍節度兼侍中十一月朔以刑部尚書參知政事宋琪工部尚書參知政事李昉並本官同平章事上謂曰世之治亂在賞罰當否賞罰當其功罪無不治之理如或以為飾喜怒之具即無不亂與卿等戒之詔自今宰相序立宜在親王之上李昉宋琪請遵故事上曰宰相之任實總百揆與羣臣禮絶藩邸之設止奉朝請而已元佐等尚㓜欲其知謙損之道卿勿多辭也丁巳宴餞趙普於長春殿王顯等侍側數視上袴上怪而問之顯等曰陛下所衣袴文縷俱倒上笑曰朕未嘗御新衣蓋澣濯頻所致耳蓋念機杼之勞苦欲示敦朴為天下先也以李穆吕蒙正李至參知政事張齊賢王沔同簽署樞密院初穆知開封府時剖決精敏姦猾無所假貸由是豪右屏迹權貴不敢干以私上益知其才始有意大用至是穆等入對上謂之曰朕為官擇人惟恐不當今兩制之臣十餘皆文學適用操履方潔卿居京府尤號嚴肅故加奬擢也詔史館所修太平總類自今日進三卷朕當親覽宋琪等言窮嵗短晷日閱三卷恐聖躬疲倦上曰朕性喜讀書開卷有益不為勞也此書千卷朕欲一年讀遍因思學者讀萬卷書亦不為難耳尋改總類名曰御覽於是命吕文仲充翰林侍讀與侍書王著更宿而書學葛湍亦直禁中每暇日多召問文仲以經書著以筆法湍以字學上於禁中讀書自己至申始罷有蒼鶴飛上殿鴟吻逮掩卷而去上怪之以語近臣對曰上好學之感也昔有鸛雀銜三鱣魚墜楊震講堂下抑以類此甲申雍熈元年春正月上謂侍臣曰夫教化之本治亂之源茍無書籍何以取法今三館所貯遺逸尚多乃詔三館以開元四庫書目閱館中所闕者具列其名募中外有以書來上及三百卷當議甄録酬奬餘第卷帙之數等級優賜不願送官者借其本寫畢還之自是四方之書往往間出矣甲子有司上竊盗贓至大辟詔特貸其死因謂宰相曰朕常重惜人命如此類者往徃貸其極刑但時取其甚者警衆多爾不欲小人知寛貸之意恐其犯法者衆也富弼曰國之法使民不曉其輕重則犯法者少矣本朝承五代之制竊盗有死法故先帝存其法時取情重者行之存其法使民懼而不敢犯也取重者行之而貸其輕者不失好生之德也今之竊盗雖無死刑然犯者衆則先帝制盗固有術矣吕源曰太祖時竊盗贓錢三貫者法殺繼稍寛其法至滿五貫者死太宗朝多有特貸其死者然尚存其法以警於衆真宗即位咸平元年命張齊賢王濟等刪定編敕齊賢以民犯盗者衆以死懼之尚不畏况緩其死乎未幾齊賢拜相是嵗十二月給事中柴成務言强竊盗刑名比律文用一半法又經大中祥符之後至仁廟景祐有詔寖至於極寛自後竊盗固無死刑而强盗持杖者悉皆有貸法也故與祖宗立法之嚴治盗之峻正相反矣宜其犯者益衆不足怪也上御丹鳳樓觀燈見士庶闐咽謂宰相曰國家承累世干戈之後朕孜孜求治惟望上天垂佑福此下民今海宇乂安京師繁盛殊以為慰今夕與卿等且各宜醉秦王廷美卒房州以聞上嗚咽流涕謂宰相曰廷美自少剛愎長以兇惡朕以同氣至親不忍寘之於法俾居房陵冀其思過方欲推恩復舊遽兹殞逝痛傷奈何乃追封涪王謚曰悼參知政事李穆性至孝遭母喪詔强起之穆哀戚過甚因致毁瘠暴卒上臨喪謂宰相曰穆潔已守道操履純正方此擢用遽至淪没非斯人之不幸乃朕之不幸也二月朔親閱將校皆按名籍參考勞績而升黜之三月滑州決河塞遣祕書丞楊延慶等十餘人分知諸州上因謂宰相曰刺史之任最為親民茍非其人則民受其禍昔秦彭守頴州崇尚儒雅教化大行境内乃有鳳凰麒麟嘉禾甘露之瑞足為善政也宋琪曰秦彭一郡守耳政善而天應之若此况君天下者乎何謂太平不可致和氣不可調也召宰相近臣賞花於後苑上曰春氣暄和萬物暢茂四方無事朕以天下之樂為樂宜令侍從詞臣各賦詩賞花賦詩自此始夏四月羣臣請封禪以乾元文明二殿火災故罷之五月除江南鹽禁尋復之以京官充堂後官上幸玉津園觀魚宴射謂近臣曰朕觀五代以來帝王始則勤儉終乃忘其艱難恣為逸豫覆亡之速皆自貽也為人上者當以為戒六月求直言詔天下州縣官或知民俗利害政令否臧許於本州附傳置以聞所言可采必行旌賞若無所取亦不加罪有布衣以皂囊封書獻者且詞狂妄上覽弗責因謂宰相曰凡上封事者多不知朝廷次第所言率孟浪不切機㑹本欲下情上逹庶事無壅故雖狂悖亦與容納田錫上疏其略曰陛下有朝令夕改之事由制勑所行時有未當而無人封駁者給事中之過也陛下有捨近謀逺之事由言動所為未合至理而無人敢諌諍者是左右拾遺補闕之過也又曰宰相不得用人而委員郎差遣近臣不專受責而求令録封章自此章奏必多聽用必廣聽用既廣則條制必繁條制既繁則依從者少乞今後凡有奏陳令大臣議而行之蓋臣下言之則謂之封章陛下行之則出為法令法令可簡而不可使繁制度可永而不可屢變又曰宰臣若賢願陛下信而用之宰相非賢願陛下擇可用而任之何以置之為備員而待之若冗秩也吕中曰觀田錫上疏雖當時憂治世危明主之言亦萬世任相之法也西漢之初相權重則一君之身任相者不過一二人武帝以後相權輕則四十餘年之間易相凡十有三矣遣使諸路察獄上嘗謂侍臣曰刑辟之際君子之所盡心稍有寃枉必傷和氣且齊女負寃天為枯旱燕臣無罪六月飛霜自昔水旱作沴未有不由於此居官牧民尤當戒之秋七月命諌官領登聞檢院九月西夏李繼捧來朝其弟繼遷留銀州詔發繼捧親屬赴闕繼遷年十七勇悍有智謀不樂内徙與其黨奔入斥澤出其祖彛興像以示戎人戎人皆拜泣相聚為冦知夏州尹憲選精騎夜襲斥澤斬首五百級燒四百餘帳獲繼遷母及妻繼遷僅以身免後有自西邊來者言繼遷悉知朝廷之事皆繼捧漏泄朝廷數諭繼遷不肯降上用趙普之䇿出繼捧委以邊事端拱元年李繼捧賜姓趙名保忠授夏州刺史定難節度以討繼遷管夏銀宥五州繼捧至鎮數日上言繼遷悔過歸欵上以為銀州刺史西南巡檢使繼遷本無降心復誘戎人為冦淳化二年保忠來乞師上命商州團練使翟守素率兵赴之繼遷請降以為銀州觀察使賜姓趙名保吉吕中曰保忠之再入夏臺故地實普之謀也後保忠反與保吉合大為邊患何普能知符彦卿之不可與兵權而不能知保忠之不可復歸夏州耶田錫嘗言李繼遷不合與夏州又不合呼之為趙保吉其切中時事之膏肓乎上命李昌齡就太乙宫校定三等醮儀冬十月上之即位也召華山隠士陳摶入見於是復至上益加禮重謂宰相宋琪等曰摶獨善其身不干勢利所謂方外之士也與之語甚可聽因遣使送至中書琪等從容問摶曰先生得𤣥黙修養之道可以化人乎對曰摶山野之人於時無用亦不知神仙黄白之事吐納之理無術可傳於人假令白日上昇亦何益於世主上龍顔秀異有天人之表博逹今古深究治亂真有道仁聖之主也正是君臣協心同德興化致治之秋勤行修鍊無出於此琪等表上其言上益喜賜摶號希夷先生吕中曰人言太極圖周濂溪得之种明逸明逸得之穆伯長伯長得之陳希夷先天之圖邵康節得之李挺之挺之得之穆伯長伯長得之陳希夷愚謂希夷隠者長於數學而未必長於理學者也濂溪之圖太極康節之圖先天此皆二公自得之學蓋青出於藍而青於藍者也嵐州獻牝獸一角上曰珍禽竒獸奚益於事方内乂寜風俗淳厚此乃上瑞耳十一月以建州進士楊億為祕書省正字時年十一億七嵗能屬文連三日得對試賦五篇皆援筆立成上曰可與一官留京師故有是命十二月廢嶺南諸州採珠場立德妃李氏為皇后先是上嘗謂輔臣曰朕讀晉史見武帝平吳之後溺於内寵後宫迨數千人今宫中自職掌至於麄使不過三百人朕猶以為多矣乙酉雍熈二年春二月禁増置寺廟上御崇政殿覆試禮部貢舉人得進士梁顥等百七十九人得諸科三百一十八人並唱名賜及第唱名自此始宰相李昉之子宗諤參知政事吕蒙正之從弟蒙亨鹽鐡使王明之子扶度支使許仲宣之子待問舉進士試皆入等上曰此並勢家與孤寒競進縱以藝升人亦謂朕有私也皆罷之左右獻言尚有遺材復試又得進士上元洪湛等七十六人得諸科二百二人並賜及第夏四月復置明法科進士九經以下更不習法書五月中書門下奏謫官在外而累經赦宥者欲令歸闕責其後效上不許謂宰相曰朝廷致理當任賢良君子小人宜在明辨竄逐之臣郊禋以來豈不在念然此等務行嶮巇若小得志即復結朋植黨恣其毁譽如害馬之馬豈宜輕議哉秋七月上謂宰相曰國家以百姓為本百姓以食為命故知儲蓄最為急務昨江南災旱甚亟遣使賑貸果無流亡盗賊之患若非積聚何以救之庚申詔諸路轉運使及諸州長吏専切督察知倉官吏等依時省視倉粟勿致毁敗其有計度支用外設法變易或出糶借貸與民及轉輸京師如致損官粟者雖去官猶論如律鼎州水溢害稼九月廢皇太子楚王元佐乃太宗長子也初廷美得罪元佐獨申救之廷美死元佐遂感心疾太子㓜亦聰慧及長漸驕恣或經時絶朝請自是習為殘忍不守法度左右微過輒彎弓射之帝誨督甚力皆不悛重陽帝宴諸王元佐以病新起不得預至暮罷陳王元佑等過之元佐謂曰汝等與至尊宴射而我不預焉是為君父所棄也遂發憤終夜閉媵妾縱火焚宫帝怒欲廢之㑹冦準通判鄆州得召見太宗謂曰知卿有深謀逺慮試與朕決一事東宫所為不法他日必為桀紂之行欲廢之則宫中亦有甲兵恐因而招亂準曰請某月日令東宫於某處攝行禮其左右侍從皆令從之陛下搜其宫中果有不法之事俟還而示之廢太子一黄門力耳太宗從其䇿及東宫出因搜宫中得滛刑之器有剜眼挑筋摘舌等物還而示之東宫服罪遂廢之選立章聖為太子準由是得名冬十月録繫囚上決事至日旰因謂宰相曰中外臣僚若皆留心政務天下安有不治者古人宰一邑守一郡使飛蝗避境猛虎渡江况人君能惠養士庶申理寃滯豈不感召和氣乎朕每自勤不怠此志必無改易或曰百司細故帝王不當親決朕意則異乎此若以尊極自居則下情不得上逹矣吕中曰此推廣太祖恤刑之意也以太宗愛惜民命而一刑之微皆得以上逹可謂仁且勤矣而當時田錫且曰陛下每日早於崇德殿受百僚之朝日午於講武殿視萬幾之事或進呈甲仗或陳閱軍事或躬問縲囚或親校簿書恐於大體有所未究此視事太勤憂民太過也抑不知諌官置之左右御史委之糾彈給舍許之封駁豈非人君之體歟十二月庚子朔日有食之丙辰宰相宋琪罷守本官樞密使柴禹錫授左驍衛上將軍初上令琪娶馬仁瑀寡妻髙繼沖之女廣南轉運使王延範者高氏之踈属也時知廣州鄄城徐休復密奏延範謀不軌且言依附大臣無敢摇動上將遣使案鞫㑹琪與禹錫入對上問延範何如人琪未知其端盛稱延範彊明忠幹禹錫素與琪相結旁奏與同上意琪等交通不欲暴其狀止以琪素好大詼諧無大臣體禹錫不能輸誠奉公故罷其政柄上謂李昉等曰中書樞密朝廷政令所出治亂根本繫焉且天下廣大卿等與朕共理當各竭公忠以副任用人誰無姻故之情茍才不足稱不若遺之財帛耳朕亦有舊人若果無用未嘗假以名器也卿等其戒之龍溪縣主簿王濟時調福建輸鶴翎為箭羽鶴非常有物官督責尤急至一翎直數百錢民甚苦之濟以便宜諭民取鵝翎代輸驛奏其事因詔旁郡悉如濟所陳吕源曰太祖朝河清縣令史班火井縣令蕭瓌皆奏移治所而王濟以縣主簿亦得奏事以此知祖宗下情之不壅也供奉官為巡檢許其便宜主簿輒自以便宜輸鵝翎代鶴翎為箭羽今之小官下吏已不能如是而監司按察不惟不能容而自亦不能為也宜其蒙蔽上則負國下則困民使天下紛紛未能休息者弊在此也丙戍雍熈三年春正月先是賀令圖與其父懷浦薛繼昭劉文裕侯莫陳利用等相繼上言請取幽薊上始有意北伐三月潘美出鴈門與敵戰勝之逐北至寰州刺史趙彦辛降辛巳克涿州潘美圍朔州守臣趙希贊降轉攻應州節度艾正降田重進圍飛狐守將吕行德降又圍靈丘守將穆超降夏四月潘美克雲州田重進至蔚州耿紹忠舉城降初曹彬與諸將入辭上謂彬曰但令諸將先趨雲應卿以十萬衆聲言取幽薊且持重緩行敵聞之必聚兵於幽州不暇為援於山後既而諸將多得山後要害之地每捷奏至上頗疑彬進軍之速且憂敵斷粮道彬至涿州留十餘日食盡乃退師至雄州以援供饋上聞之大駭曰豈有敵人在前却軍以援芻粟乎亟遣使止之而彬所部將聞美等累捷已不能有所攻取謀畫蜂起更相矛盾彬不能制時方炎暑軍士疲乏以粮不繼乃還師境上為敵所躡五月庚午敵追及之我師大敗彬等收餘軍宵渉拒馬河上聞曹彬等軍敗乃詔諸將領兵分屯於邊召彬及崔彦進米信入朝田重進率全軍駐定州潘美還代州吕中曰岐溝之敗有三既平河東之後三出王師屢與敵接而不獲俟時一也其事始於賀令圖之父子而贊成於王顯數人中書不預聞二也曹彬違上詔㫖三也燕薊之地以太祖太宗百戰而不能得而宣和乃無故而得之天下未嘗有幸成之事也有幸成之事則有必至之禍矣趙普上疏諌其略曰蠢兹獯鬻誠非我敵蓋遷徙鳥舉安得而制自古帝王置之度外任其隨逐水草皆以鄣塞防之伏料聖明何足介意此必邪謟附㑹蒙蔽睿聰致興不急之兵頗渉無名之議伏自大發驍雄往殲兇醜百萬家之生聚飛輓是供數十州之土田耕桑半失兹所謂以明珠而彈雀為鼷䑕而發機所失者多所得者少事無固必理貴變通願頒明詔速請抽軍聊為一縱之謀敢獻萬全之䇿六月戊戍朔日有食之初議興兵上獨與樞密院計議中書不預聞及敗召樞密院使王顯副使張齊賢王沔謂曰卿等共視朕自今復作如此事否上既推誠悔過顯等咸愧懼若無所容丙辰以御史中丞辛仲甫為參知政事秋七月簽書樞密院事張齊賢言事頗忤上意授給事中知代州九月刑部張佖上言望自今應斷奏失入死刑者不得以官減贖檢法官削一任長吏並停見任從之嘗有犯大辟者詔特赦上謂佖曰朕以小人犯法原其情非巨蠧故貸死流竄亦足以懲艾之也佖對曰先王立法蓋為小人君子固不犯矣上嘉其言十二月契丹以數萬騎入冦瀛州都部署劉廷讓與戰全軍皆沒賀令圖一嵗中父子皆敗契丹入冦代州神衛都指揮使馬正禦之衆寡不敵副都署盧漢贇畏懦保壁自固知州張齊賢選廂軍二千出正之右誓衆感慨一以當百敵遂却走先是齊賢約潘美以并師來㑹戰間使為敵所得俄而美使至云奉詔毋得出戰齊賢乃閉其使夜發兵距州城西南二十里列幟然芻敵意并師至駭而北走齊賢伏卒掩擊大敗之勝敗者兵家之常事不可以勝而驕不可以敗而沮張方平言國初與契丹八十戰惟張齊賢僅一勝此說未然如田重進降飛狐等縣及蔚州潘美降寰朔應三州又克靈州未嘗不勝惜朝廷之謀不定將帥之心不一所以不能成功也丁亥雍熈四年春正月初曹彬及劉廷讓等相繼敗覆敵勢益振長驅入深祁䧟易州殺官吏掠士民魏博之北咸被其禍上深哀痛焉丙戍降德音二月知制誥范杲上言家世史官願得秉直筆成國朝大典因召為史館修撰三月庚辰詔天下知州通判先給御前印紙令書課績凡決大獄幾何凡政有不便於時改而更張人獲其利者幾何及公事不治曽經殿罰皆具書其狀令同僚共署毋得隠漏罷官日上中書考校夏四月并水陸路發運為一司詔陳禦戎䇿侍御史趙孚上言大略謂宜内修戰備外許歡盟上嘉其言五月以鄭宣劉墀趙載並為如京使栁開為崇儀使劉慶為西京作坊使初開知貝州上書願効死北邊陛下賜臣歩騎數千任以河朔之地必能出生入死為陛下復取幽薊於是上亦欲並用文武戡定冦亂乃詔文臣中有武略知兵者許換秩於是開與鄭宣並以文臣換武初秦州長道縣酒場官李益家饒於財僮僕常數百關通朝貴持吏短長郡守以下皆畏之民負益息錢數百家官為徵督急於租調獨觀察推官馮伉不為屈伉一日騎出益遣奴捽下毆辱之伉兩上章論其事皆為邸吏所匿後因市馬譯者附表以訴上命捕益械送御史臺鞫之益具伏丁丑斬益籍其家益子士衡先舉進士任光禄寺丞詔除其籍終身不齒州民聞益死皆醵錢飲酒以相慶八月令諸路轉運使及州郡長吏自今並不得擅舉人充部内官其有闕員即時具奏前所論薦多渉親黨故窒其倖門也九月辛巳詔以來年正月有事於東郊親耕籍田置五使如郊祀之制十二月朔乃詔自今嵗命春官知貢舉如唐室故事應已得解者明年春集闕下未得解者至秋取解戊子端拱元年春正月丙寅以大理評事王禹偁為右拾遺羅處約為著作佐郎並直史館上於東郊親饗先農以后稷配遂耕籍田始三推有司言禮畢上曰朕志在勸農恨終於千畝豈以三推為限耕數十歩侍臣固請乃止黄魯直瑞芝亭記云使民田畝有禾黍則不必芝草生戸庭使民伏臘有雞豚則不必麟鳳在郊藪黠吏不舞文則不必虎渡河吏胥不追撓則不必蝗出境二月置司諌正言李昉罷相先是翟馬周擊登聞鼓訟昉身任元宰值北戎入冦不憂邊事但賦詩飲宴并置女樂上由是不恱㑹連旱蝗太宗以水旱失度隂陽乖戾咎在宰相遂罷為右僕射以趙普為太保兼侍中吕蒙正為中書侍郎兼戸部尚書平章事上諭普曰卿勿以位高自縱勿以權勢自驕但能謹賞罰舉賢能弭愛憎何憂軍國之不治朕若有過卿勿面從古人耻其君不堯舜卿其念哉蒙正質厚寛簡有重望不結黨與遇事敢言毎論政有未允者必固稱不可上嘉其無隠故與普俱命藉普舊德為之表率也蒙正晩軰驟進與普同位普甚推許之吕中曰趙普之再入相也與乾德之初入相不同蓋太祖規模廣大故普慨然以天下自任而敢於任事太祖規模繁密故普不免逺嫌疑存形迹而救過之不暇然以元老重望而推蒙正之晚軰吕端之台輔器人之有技若己有之此所以保我子孫黎民歟丙午詔諸道民有艱食者所在發廩賑之初侯莫陳利用多變幻之術上召見驟加恩遇遂恣横居處服玩皆僣乗輿宫殿之制於是趙普廉得其專殺不法事力於上前發之乃遣近臣就接利用具伏上曰豈有萬乗之主不能庇一人乎普曰此巨蠧犯死罪十數陛下不誅則亂天下法法可惜此一豎子何足惜哉上不得已命賜死於商州吕中曰國初大臣皆得以斥内侍至章子厚則用郝隨蔡京則奏梁師成王黼則事童貫皆交結内侍以為腹心人言内外朝常合為一然以公勝私外足以統内斯可矣夏五月置祕書閣於崇文院分三館之書萬餘卷以實其中閏五月以趙承煦為六宅使承煦普次子也普再入相未始為求官上特命之普嘗戒其子弟曰吾本書生偶逢昌運受寵踰分固當以身許國爾等宜各勉勵勿重吾過故自宥密升宰輔出入三十餘年未始為其親屬求恩澤者近世宰相子起家即授水部員外郎加朝散階品蒙正固讓止授六品京官自是為例禮部侍郎宋白知貢舉放進士程宿以下二十八人諸科百人下第人擊登聞鼓求别試上召下第人覆試得進士馬國祥以下及諸科凡七百人上既擢國祥等又命王世則召下第進士諸科人試得合格數百人上覆試詩賦又擢進士葉齊以下及諸科九百餘人並賜及第御史中丞嘗劾奏開封尹許王元僖元僖不平訴于上曰臣天子兒以犯中丞故被鞫願賜寛宥上曰此朝廷儀制孰敢違之朕若有過臣下尚加糾擿汝為開封府尹可不奉法耶論罰如式秋七月除蜀鹽禁八月幸國子監命李覺講周易十一月敵騎大至唐河北將入冦諸將欲以詔書從事堅壁勿戰定州監軍袁繼忠曰犬戎在近今城中屯重兵而不能剪滅令長驅深入侵略它郡謀自安之計可也豈折衝禦侮之用哉我將身先士卒死於敵矣都部署李繼隆曰閫外之事將帥得專焉乃與繼忠出兵拒戰敵騎大潰捷奏聞羣臣稱賀降璽書奬賜己丑端拱二年春正月詔陳備邊䇿戸部郎中張洎奏言國家自飛狐以東重關複嶺皆為契丹所有燕薊以南平壤千里番漢共之失地利矣河朔郡縣列壁相望然敵騎南馳衆寡不敵咸嬰城自固莫敢出戰此分兵力之過也今既未能克復幽薊宜悉聚河朔建三鎮鼎據而守焉又言涿州之戰元戎將校各不相管轄以謙謹自任未嘗賞一効用戮一叛命宜反其道又言稍舉通和之䇿俟兵食有餘然後大舉幽薊未復終不能高卧王禹偁奏言兵勢患在不合將臣患在無權請於逺邊上建三軍軍十萬人使互相救援又言曹彬北伐及招置義勇軍等事大臣皆不預知自今頻召大臣議邊事毋使小人間厠吕中曰言和者至於自屈名分而不知戰言戰者至於輕戮民命而不知和此紹興開禧權臣之罪一也以太祖之英武猶命孫全照經畧和好以曹彬之名將猶言講和之利則和戎誠息民權宜之䇿然必如趙乎之言許歡盟於外修戰備於内可也二月以陳恕等為河北等路營田使下詔罪已寛恤邊郡三月上親試陳堯叟一百八十六人擢堯叟為第一竇州録事參軍孟巒避逺征不之官詣匭自陳太宗怒杖流海島夏旱自三月至五月録繫囚遣使分路決獄戊戍雨六月初左正言直史館冦準承詔極言北邊利害上器之曰朕欲擢用準宰相以開封府推官上曰此官豈以待準耶宰相請用為樞密直學士從之秋七月拜樞密直學士吕中曰澶淵之役羽書五至準不以為憂惟曰親征而已其渡河也方且與楊億酣飲逹旦有似安石圍棊清談之風豈知準自前朝極言北邊利害太宗已許之矣此豈空言無據而告真宗以親征之議哉先是詔諸王府僚各獻所著文字上閱視累日問近臣曰其才則見矣其行孰優或以越王府記室參軍考功員外郎畢士安對上曰正合朕意遂命以本官知制誥富弼曰人臣為郎官未至通顯雖負宏才有竒節何以為天子知一日御筆書名且以名臣稱之不次擢用人臣遇時有如是之榮也蓋天子以用人為急博采廣聽故得其實不惟擢二賢使之盡力凡為人臣知才節可以自結明主得不勉勵真業乎人臣若勉勵真業則庶職修庶職修則内外之事治矣是天子殊待二賢所以勸天下之士也先是宰相趙普上言臣竊見工部侍郎張齊賢數年前特受聖知升於密地公私識者盡為當才不期嵗月未多出為外任向來微有傳聞或云奏對過當凡言大事須有悔尤其如義士忠臣不顧身之利害姦邪正直久逺方知齊賢素藴機謀兼全德義從來差遣未盡器能慮淹經國之才堪赴濟時之用如當重委必立殊功甲申以齊賢為刑部侍郎樞密副使彗星出於東井凡三十日上避殿減膳威勇軍粮餽不繼契丹欲窺取之詔李繼隆發鎮定大軍護送輜重虜將于越率精銳數萬騎來迎縁邊都巡檢尹繼倫屬領歩騎千餘人按行塞上敵不擊而過徑襲大軍繼倫夜遣兵躡敵後列陣於城北以待之敵方㑹食繼倫出其不意急擊之殺敵將皮室于越食未竟棄匕箸為伏兵中其臂敵遂奔潰俘獲甚衆定州副都部署孔守正又與敵戰曹河之斜村梟其帥大盈相公等三十餘級敵自是不敢大入冦以繼倫面黒相戒曰當避黒面大王富弼曰尹繼倫以千餘之兵破敵衆數萬可謂竒功也大將盡上其狀太宗賞之自諸司止加刺史及數年之後盡聞其功立遷使職及加團練仍召而厚賜之人臣荷天子之知而恩賞如是不惟繼倫盡心以報而諸將無不感勸八月大赦是夕彗没先是上遣使取杭州釋迦佛舍利塔置闕下度開寶寺造浮屠十一級以藏之所費億萬計工畢田錫上疏諌曰衆以為金碧熒煌臣以為塗膏釁血上亦不怒九月鎮星熒惑入南斗冬十月趙保忠加同平章事上以嵗旱手詔賜趙普等曰萬方有罪罪在朕躬自星文變見以來久愆雨雪朕為人父母心不遑寜當與卿等審政刑之闕失念稼穡之艱難恤物安民庶祈眷祐王禹偁上言乞自乗輿服御以下至百官俸料非宿衛軍士邊廷將帥悉第減之上答天譴下厭人心田錫上言此實隂陽失和調爕倒置上侵下之職而燭理未盡下知上之失而規過未能奏上上及羣臣皆不恱出錫知陳州十二月庚申詔自今四方所上表宜只稱皇帝上曰皇帝二字亦不可兼稱朕比欲只稱王屬以諸子封王為不便耳趙普等又上法天崇道文武六字詔去文武二字餘許之宋史全文卷三
