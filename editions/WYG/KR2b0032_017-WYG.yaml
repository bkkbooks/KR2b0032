body:
  text: 宋史全文卷十七上宋髙宗三己酉建炎三年春正月庚辰朔上在揚州資政殿學士路允迪簽書樞密院事丁亥金人陷青州又陷濰州辛卯陜西都統制邵興及金人戰于潼闗敗之乙未京城留守杜充襲其統制官張用于城南不克將官李寶為所執丙申張守試起居郎兼權直學士院守撫諭京師還面奏敵人必來願陛下早為之圖戊戌京城綂制官張用以一騎送李寶歸京師丙午金左副元帥宗維陷徐州守臣王復死之御營左將軍韓世忠潰軍于沐陽其將張遇死于漣水軍之張渠村宗維入淮陽軍京東轉運副使李祓從軍為所殺敵己酉金人犯泗州先是禮部尚書王綯聞敵騎且南侵率從官同對上命至都堂議黄潛善汪伯彦笑曰諸公所言三尺童子皆能及之是夕泗州奏敵且至上大驚禁中倉皇以内帑所有通夕搬挈二月庚戌朔駕御舟泊河岸上即欲渡江黄潛善等力請少留竢報且搬左藏庫金帛三分之一上許之敵以數百騎奄至天長軍亟遣江淮制置使劉光世將所部迎敵而士無鬭志未至淮即潰是日揚州城内居民爭門以出踐死者無數從官有詣都堂問二相者黄潛善汪伯彦皆曰已有措置不必慮百官聞此復自相慰壬子金人陷天長軍上遣左右内侍鄭詢往天長軍覘事知為金人至遽奔還上得詢報即介胄走馬出門惟御營都綂制王淵内侍省押班康復五六騎隨之黄潛善汪伯彦方㑹都堂或有問邊耗者猶以不足畏告之堂吏呼曰駕行矣二人乃戎服鞭馬南馳軍民爭門而出死者不可勝數上次揚子橋一衞士出語不遜上掣手劍刺殺之時軍民怨黄潛善刻骨司農卿黄鍔至江上軍士呼曰黄相公在此數之曰誤國害民皆汝之罪鍔方辨其非是而首已斷矣龜鑑曰敵破北京張浚歴言汪黄笑而不答敵迫揚州羣臣有問者而汪黄猶以不畏答之大駕南幸而都堂㑹食猶罔聞知其雍容待敵果何所恃而然哉昔秦軍迫淮淝而安石圍棊自如安石所恃者指授將帥之規模素定也契丹犯澶淵而萊公酣寢不動萊公所恃者決親征之策勝負已了然於胷中也若汪黄之所恃者宇文虚中之使未回庶幾和議可成耳和其果足恃哉吕頥浩張浚聯馬追及上于𤓰洲鎮得小舟即乗以濟張滙進論曰尼雅滿之犯揚州也時御營之師必有十萬而尼雅滿止有五六千騎自建炎二年秋九月離雲中下太行渡黎陽攻澶濮山東諸州郡以至犯揚州可見疲勞之甚此强弩飄風之末無足畏也兼是時兩河州郡尚有未陷者山東州郡十陷二三人心未安糧道未集盗賊蠭起而不顧後患投身深入我境又可見其無知之甚也時若我師乗其逺來新至行列未定而撃之可也或則深池堅城拒而勿戰以挫其銳以沮其意且多方出兵邀其出掠者彼萬里孤軍後無委積忌於相持利於速戰求戰不能糧道不繼又且野不能掠以此制之賊遁必矣俟其既遁襲而撃之捨而縱之皆可也而乃望風之際車駕渡江六師自潰為賊乗之席卷而去此失於退一也是晩敵遊騎至揚州縱火城内煙熖燭天上至鎮江宿于府治癸丑上召宰執從官諸將對宅堂計事吏部尚書呂頥浩降堦拜伏庭下上顧潛善問之頥浩以首叩地曰願且留此為江北聲援不然金人乗勢渡江愈狼狽矣二府皆曰善既而王淵入對言暫駐鎮江止捍得一處若敵自通川渡先據姑蘇將若之何不如錢塘有重江之阻諸内侍以為是禁衞涕泣語言不遜上顧中書侍郎朱勝非曰卿出問之勝非傳㫖皆以未見家屬為對勝非諭之曰已有㫖分遣舟專載衛士妻孥矣衆帖然勝非還奏上曰已晩矣適議定不若徑往杭州此中諸事暫留卿處置事定即來即上馬行以頥浩充江浙制置使劉光世為行在五軍制置使屯鎮江控扼江口又以主管侍衛馬軍公事楊惟忠節制江南東路軍馬屯江寧府金人入真州甲寅上次常州御營平寇前將軍范瓊引兵至壽春其所部執守臣紹密殺之乙卯上至無錫縣丙辰上次平江府始脱甲胄御黄袍侍衛者皆有生意命承信郎甄援往江北招集衞兵援本太學諸生靖康中十上疏論利害及還遷保義郎丁巳衞膚敏入對膚敏在維揚數請早幸建康上思其言復召金人犯泰州戊午上將發平江中書侍郎朱勝非自鎮江來初上以吳江之險可恃議留大臣鎮守勝非既對上欲除勝非兼知秀州輔臣言秀非大臣鎮守之地乃以御札命勝非充平江府秀州控扼使勝非再留身言臣雖備員執政與諸軍無素更乞從官一員同治事如吕頥浩張浚皆兼御營司㕘賛軍事可用也於是上問近臣誰能佐勝非者浚慷慨願留遂命浚同節制控扼等事仍詔勝非事有奏陳不及者聽便宜施行訖奏浚受命即出城決水溉田以限戎馬列烽燧募土豪措置捍禦金人陷滄州己未上次秀州庚申御舟次崇德縣江淮制置使吕頥浩從上行即拜同簽書樞密院事江淮兩浙制置使上諭以金人尚留江北卿可還屯京口頥浩即以王淵所部精兵二千人還鎮江府遣御營中軍綂制張俊以所部八千人往吳江縣防捍時朝廷方以金人渡江為患故命大將楊惟忠守金陵劉光世守京口王淵守姑蘇分授二大臣節度於是韓世忠在海道未還而范瓊自壽春渡淮引兵之淮西境上扈駕者惟苗𫝊一軍而已壬戌上至杭州以州治為行宫金人陷晉寧軍守臣徐徽言死之統領孫昂亦不屈而死癸亥朝羣臣於行宫降詔罪已求直言乙丑德音釋諸路囚雜犯死罪以下士大夫流徙者悉還之惟責授單州團練副使李綱不以赦徙葢黄潛善建陳猶欲罪綱以謝敵也大事記曰汪黄之所主者和議而已故竄馬伸殺陳東歐陽徹罷衞膚敏許景衡以遂其私方且奏復科舉策進士行郊祀定配享置講讀官以文其欺幸而渡江猶罪李綱以謝敵冀和議之可成耳彼其説曰非和則所以速二聖之禍然敵與我有不共戴天之讎則其不可和也明矣祈請使還而兩河被兵通問使遣而維揚入寇敵豈虚言之所能動哉命侍從及寺監長貳郎官限二日舉有才術之士二人故事薦士不及郎官葢特恩也一日進呈奏狀上曰今所薦士不比常時便當擢用之命赴都堂審察明日復曰不若便令登對朕當親自延見之出宫人百八十人宰相黄潛善汪伯彦再上疏請罪自上即位以來二人專持國柄至是盜賊充斥宗社播遷議者皆欲正其誤國之罪而潛善等居位偃然猶無去意中外為之切齒焉置江寧府㩁貨務都茶場戊辰詔國步艱難謀慮之士咸願獻陳可令左右司輪官設次者詳所陳納尚書省金人焚揚州士民皆死存者纔數千人而已己巳尚書左僕射黄潛善尚書右僕射汪伯彦罷時御史中丞張澂上疏劾潛善伯彦大罪二十疏入未報遂以狀申尚書省潛善伯彦乃復求去簽書樞密院事路允迪奏曰時方艱棘不宜遽易輔相乞責以後效詔押赴都堂治事已而皆罷為觀文殿大學士潛善知江寧府伯彦知洪州大事記曰方上之在相州也敵兵未退此申包胥哭于秦庭之時也時則當以宗澤進兵京城之請為義而黄潛善汪伯彦沮之迨上之次濟州也敵兵已退此晉大夫反首茇舍之時也時則當以宗澤邀敵歸路之請為義而汪黄又沮之迨上之即位南京此肅宗即位靈武二年而復兩京之時也時則當以李綱獨留中原之請為義而汪黄又沮之中興之初綱在内澤在外此天擬二人以開建紹之業者也而綱為汪黄所沮纔七十五日而去位豈非天邪澤為汪黄所沮未及一年而憤死又豈非天邪綱罷而汪黄相于内澤死而杜充繼于外天下事一變矣綱在位則措置兩河兵民稍集綱去則經制招撫罷而兩河無兵矣綱在位則偽臣叛黨稍正典刑綱去則叛臣在朝而政事乖矣綱在則澤之志行綱去則澤之志沮澤在則盜可為兵充守則兵皆為盜澤在則尼雅滿遁充用則敵至維揚矣内無綱外無澤此建炎之失其機則汪黄二人為之也戸部尚書葉夢得守尚書左丞御史中丞張澂守尚書右丞辛未湖州民王永從獻錢五萬緡以佐國用上不納或曰曩已納其五萬緡矣乃命併先獻者還之仍詔自今富民毋得輒有陳獻詔御營使司止管行在五軍其邊防措置等事並歸三省樞密院壬申觀文殿大學士黄潛善提舉南京鴻慶宫汪伯彦提舉西京嵩山崇福宫所除職去大字用言者奏劾也甲戌潛善伯彦落職奉祠乙亥詔陳東歐陽徹並贈承事郎官有服親一人令所居州縣存恤其家降授奉議郎監濮州酒務馬伸除衛尉少卿赴行在先是尚書左丞葉夢得初謝上諭宰執曰始罪東等出於倉卒終是以言責人朕甚悔之今方降詔求言當令中外皆知此意上復曰伸前責去亦非罪可召還或奏曰伸已死又贈直龍圖閣丙子詔曰朕以菲躬遭時多故舉事失當知人不明昨以宰臣非才任用既久專執已見壅塞下情事出倉皇匹馬南渡深思厥咎在予一人既已悔過責躬洗心改事放斥宫嬪貶損服御罷黜宰輔收召俊良尚慮多方未知朕志自今政事闕遺民俗利病或有闗於國體或有益於邊防並許中外士民直言陳奏朕當躬覽采擇施行旌擢其人庸示勸奬知婺州蘇遲言本州上供羅乞減其半詔減二萬八千匹著為定制仍令給以本錢戊寅吕頥浩奏已復揚州三月己卯朔詔金人已退當進幸江寧府經理中原庚辰中書侍郎朱勝非守尚書右僕射兼中書侍郎兼御營使金人分兵犯江隂至夏港守臣胡紡遣統制官王換等拒敵且謂簽書判官㕔公事李易曰吾曹有死城郭之義公母宜勉之少避易歸告其母蔣氏蔣氏曰我去則汝決不肯堅守願與汝同死生聞者感泣降授右武大夫和州防禦使馬廣應詔上書言前日之事其誤有四其失有六願陛下幸巴蜀之地用陜右之兵留重臣使鎮江南委健吏以撫淮甸破金人之計回天下之心是為上策都守武昌襟帶荆湖控引川廣招集義兵屯布上流扼據形勢密約河南諸路豪傑許以得地世守用為屏翰是為中策駐蹕金陵備禦江口通達漕運亟製戰艦精習水軍厚激將士以幸一勝觀敵事勢預備遷徙是為下策若貪顧江湖陂澤之險納探報之虚言緩經營之實績倚長江為可恃幸金人之不來猶豫遷延候至秋冬使金人再舉驅其舟檝江淮千里數道並進方當此時然後又悔是為無策累數千言皆切事機是日日中有黒子辛巳尚書左丞葉夢得罷上批夢得深曉財賦可除提舉中太乙宫兼侍讀提領户部財用充車駕巡幸頓遞使夢得執政凡十四日而罷辭不拜遂徑歸卞山御營使司都統制王淵同簽書樞密院事仍兼都統制淵自平江赴行在既對遂有是命諸將多不悦者淵輕財好義家無宿儲每曰朝廷官人以爵使禄足代其耕也若切切事錐刀我何愛爵禄不為大賈富商耶同簽書樞密院事江淮兩浙制置使吕頥浩為江南東路安撫制置使兼知江寧府御營使司參賛軍事張浚請沿江要害州軍置强弩營選州禁兵縣弓手為之仍專置軍器提舉官募公私匠人以除戎器乃命諸路憲臣措置製造赴行在命學士給舍輪日於禁中看詳臣民章奏條上仍不用内侍輪送止實封往反壬午初扈從綂制苗𫝊自負世將有勞以王淵驟得君頗觖望起復威州刺史劉正彦嘗招降劇盜丁進等以賞薄怨始淵既薦正彦復檄取其所予兵正彦執不遣以此怨淵上在維揚入内内侍省押班康履頗用事妄作威福諸將多疾之及幸浙西道經江左右宦者以射鴨為樂比至杭州江下觀潮中官供帳赫然遮道𫝊等曰汝輩使天子顛沛至此猶敢爾邪有中大夫王世脩者為𫝊幕賔世脩嘗疾閹宦恣横為尚書右丞張澂言之澂不納世脩退為劉正彦言之正彦曰君言甚忠當與君同去此輩俄聞淵入右府𫝊正彦以為由宦者所薦愈不平遂與世脩及其徒王鈞甫馬柔吉張逵等謀先斬淵然後殺内侍鈞甫柔吉皆燕人所將號赤心軍議已定癸未制以劉光世為檢校太保殿前都指揮使百官入聽宣制𫝊正彦令世脩伏兵城北橋下竢淵朝退即捽下馬誣以結宦官謀反正彦手斬之遂遣人圍康履家分兵捕内官凡無鬚者皆殺正彦既斬淵即與𫝊擁兵至行宫北門外衞士出刃以指其軍𫝊正彦遂陳兵于門下中軍統制吳湛遣人口奏𫝊正彦手殺王淵以兵來内前欲奏事上大駭愕朱勝非請往問之勝非急趨樓上厲聲詰問專殺之由吳湛引𫝊所遣使臣入内附奏曰苗𫝊不負國家止為天下除害耳知杭州康允之見事急率從官扣内東門求見請上御樓慰諭軍民日將午上步自内殿登闕門百官皆從權主管殿前司公事王元大呼曰聖駕來𫝊等見黄葢猶山呼而拜上憑欄呼𫝊正彦問故𫝊厲聲曰陛下信任中官賞罰不公軍士有功者不賞内侍所主者乃得美官黄潛善汪伯彦誤國至此猶未逺竄王淵遇賊不戰因交康履乃除樞密臣自陛下即位以來立功不少顧止作遥郡團練使臣已將王淵斬首中官在外者皆誅訖更乞康履藍珪曽擇斬之以謝三軍上諭以内侍有過當流海島卿可與軍士歸營𫝊曰今日之事盡出臣意三軍無預焉且天下生靈無辜肝腦塗地止縁中官擅權若不斬履擇歸寨未得上不得已命吳湛執履衞士擒至闕門履望上呼曰何獨殺臣遂以付𫝊等即樓下腰斬之梟其首與淵首相對上諭𫝊等歸寨𫝊等因前出不遜語大畧謂上不當即大位將來淵聖皇帝來歸不知何以處上命朱勝非縋出樓下委曲諭之𫝊請隆祐太后同聽政及遣使金人議和上許諾即下詔書恭請隆祐太后垂簾權同聽政𫝊正彦聞詔不拜曰自有皇太子可立况道君皇帝已有故事上徐謂勝非等曰朕當退避但須稟於太后勝非言無此理顔岐曰若得太后自諭之則無辭矣上乃令岐入奏又命吳湛諭𫝊等曰已令請太后御樓商議太后御黒竹輿出立樓前見𫝊等執政皆從之𫝊正彦拜於輿前曰今百姓無主肝腦塗地望太后為天下主張后曰自道君皇帝任蔡京王黼更祖宗法度童貫起邊事所以招致金人養成今日之禍豈闗今上皇帝事况皇帝聖孝初無失德止為汪伯彦黄潛善所誤今已竄逐統制豈不知𫝊曰臣等已議定豈可猶豫后曰待依所請太后權同聽政𫝊等抗言必欲立皇子后曰皇子方三嵗太后以婦人之身簾前抱三嵗兒何以令天下夷狄聞之豈不轉加輕侮𫝊正彦號哭固請后不聽𫝊等語言益迫太后還入門上遣白以事無可奈何須禪位上即所御椅子上作詔曰朕自即位以來强敵侵凌逺至淮甸其意專以朕躬為言朕恐其興兵不已枉害生靈畏天順人退避大位朕有元子毓德東宫可即皇帝位恭請隆祐太后垂簾同聽政事庶幾消弭天變慰安人情敵國聞之息兵講好上書詔已遣人持下宣示二兇勝非至樓下呼𫝊幕屬將佐問之王鈞甫進曰二將忠有餘而學不足耳宣詔畢𫝊正彦麾其軍退勝非又奏母后垂簾須二人同對臣有獨奏事不可形於紙筆者豈可與他人同之欲降㫖以時事艱難許臣僚獨對太后曰彼不疑否勝非曰乞自苗𫝊始仍與其徒日引一人上殿以弭其疑勝非退太后語上曰賴相此人若汪黄未退事已不可收拾矣他日𫝊等入對太后勞勉之𫝊等皆喜由是臣僚獨見論機事賊亦不疑矣是日上移御顯忠寺甲申太后與魏國公垂簾朱勝非稱疾不出太后命執政詣其府勝非乃出是日上徽號曰睿聖仁孝皇帝以顯忠寺為睿聖宫制曰太上睿聖仁孝皇帝以權宜之計駐蹕吳江深慮敵人指為釁隙興師不已結禍彌深濫使無辜肝腦塗地退避大位傳於眇躬隆祐太后練達國家之務深得臣庶之情恭請垂簾同聽政事宜霈湛恩以宥多辟可大赦天下丙戌赦書至平江府節制軍馬張浚聞有赦慮時方艱危事變莫測諭守臣湯東野遣親信官至前路發封以告少頃東野馳來曰事變矣袖以示浚浚遂走人入杭州伺其實時右司員外郎黄槩兩浙轉運司幹辦公事吕摭亦遣進武副尉魏傳齎蠟書遺浚及吕頥浩言傅等叛逆之詳江東制置使吕頥浩至江寧舍館未定忽奉内禪詔赦遂㑹監司議皆莫敢對退謂其屬官李承邁曰是必有兵變承邁曰詔詞有畏天順人之語此恐其出於不得已也其子抗侍側曰主上春秋鼎盛豈肯遽遜位于冲幼乎灼知兵變無疑矣頥浩即走人入杭伺賊并寓書於張浚劉光世痛述國家艱難之狀别以片紙遺浚曰時事如此吾儕可但已乎時有自杭州齎𫝊等檄文至平江者浚讀之慟哭乃決策舉兵夜召兩浙路提㸃刑獄公事趙哲告以故令哲盡調浙西射士以急切防江為名使湯東野密治財計戊子御營前軍綂制張俊以兵至平江府俊初屯吳江縣傅等以其兵屬趙哲使俊之鳳翔㑹綂制官辛永宗自杭乗小舟至俊軍具言城中事將士洶洶俊諭之曰若等無譁當詣張侍郎求決侍郎忠孝必有籌畫至是浚至平江平江人大恐㑹俊被省劄召赴行在令將所部人馬盡付趙哲浚披衣起坐不能支持頃之湯東野直入浚問知其故浚知上遇俊厚而俊純實可與謀事諭東野亟開門納之一軍遂定浚曰太尉知皇帝遜位之由否此葢苗傅等欲危社稷言未訖泣數行下俊亦大哭浚諭以決策起兵問罪俊泣拜且曰此事須待郎濟以機術勿令驚動官家浚哽咽首肯移時辛永宗趙哲至浚即同趙哲馳入張俊軍撫諭且厚犒之人情大悦浚以蠟書諭吕頥浩劉光世起兵狀又命俊先遣精兵二千扼吳江己丑制以建炎三年三月十一日為明受元年先是𫝊乞改年號劉正彦乞移蹕又二日傅正彦至都堂申言二事勝非以移蹕為不可傅趣遣使勝非曰已議定朝夕行𫝊曰人言炎字是兩火故多盜乞早改元勝非以奏太后曰三事中惟年號稍輕若全然不從恐别生事節制平江府常秀湖州江隂軍軍馬張浚言臣竊以當今外難未寧内寇並起正人主憂勞自任馬上求治之時恐太母以柔靜之身皇帝以幼冲之質端居深處責任臣僚萬一强敵侵陵則二百年宋朝社稷之基拱手而遂亡矣臣愚不避萬死伏乞太母陛下皇帝陛下特軫宸慮祈請睿聖念祖宗委托之重思二帝屬望之勤不憚勤勞親總要務據形勝之地求自安之計抑去徽名用柔敵國然後太母陛下皇帝陛下監國于中撫靜江左如此則國家大計似為得之前密州州學教授邵彪見浚于軍中浚問策安出彪曰以至順誅大逆易特反掌顧公處之何如耳浚曰張俊指天誓地願以死援君父之辱韓世忠有仗節死難之志二人可倚以辦事惟浚士卒單弱恐不足以任茲事但吕樞密屯兵江寧其威望為人所信向且通亮剛決能斷大事當為天下倡劉光世屯軍鎮江兵力强悍謀議沈鷙可以倚仗浚皆馳書往矣是日吕摭書至江寧頥浩執書以泣曰果如所料事不可緩矣再發書與張浚及諸大將約㑹兵庚寅提舉南京鴻慶宫黄潛善提舉西京嵩山嵩福宫汪伯彦並責祕書少監潛善衡州伯彦永州並居住置行在都茶場出賣茶引紹興二年閏四月又置務場於建康同簽書樞密院事江淮兩浙制置使兼知建康府吕頥浩言臣契勘自崇寧以來内侍童貫譚稹互掌兵柄二十餘年基禍流毒遂令徒黨為害近聞將相大臣勦戮内侍誠可以快天下之心紓臣民忿怒之氣但方今强敵乘戰勝之威諸盜有蜂起之勢興衰撥亂事屬艱難豈容睿聖皇帝退避大位而享安逸伏望太后陛下皇帝陛下不憚再三祈請睿聖皇帝亟復皇帝位親總萬幾然後駕幸江寧以圖恢復如此則宗廟社稷有無疆之休將相大臣有無窮之福先是張浚欲遣辯士持書説二賊使無他圖以待諸將之集念無可遣者夜分不寐浚客遂寧馮轓素負氣節聞之慷慨請行虜陷鄜州辛卯張浚遣馮轓赴行在浚為咨目具以請主上親總萬務事稟朱勝非及與𫝊正彦書勉以事當改圖不宜固執壬辰兩浙轉運副使王琮言本路上供和買紬絹嵗為一百七十萬匹有竒請每匹折納錢兩千計三百五萬緍省以助國用許之東南折帛錢葢自此始張浚被㫖以所部赴行在浚奏辭新命且遺𫝊等書云朝廷屢差官交割張俊人馬所遣官皆畏避生事不敢任責浚度將士久從張俊且又率强悍捨俊無以彈壓欲欵賊使不致疑癸巳初御營平寇左將軍韓世忠既走鹽城縣收散卒得數千人聞上渡江以海舟還赴難至是次常熟張俊聞之馳見禮部侍郎張浚喜躍不自持曰世忠之來此事必辦浚與俊更相慶慰即遣使召之甲午馮轓再見傅正彦于軍中從容白之曰轓為國家而來今已再日未聞將軍之命願一言而决正彦見轓詞色不屈即與王鈞甫馬柔吉引𫝊耳語衆諭轓曰侍郎欲復辟此事固善然須面議詞語甚遜翌日即遣還遺張浚書約浚至杭面議吕頥浩以勤王兵發江寧先是張浚三遺劉光世書諭以勤王且遣㕘議軍事楊可輔至鎮江促之光世不報初保義郎甄援在城中竊録明受詔赦及二兇檄書以出至餘杭門為邏者所得苗𫝊命斬之援笑曰將軍方為宗社立功奈何斬壯士𫝊嫚罵且詰其故援曰今誤國姦臣多散處于外願齎將軍之文糾忠義之士誅漏網以報將軍耳傅意解正彦曰此未可信即使人拘之居數日防禁少緩援更衣踰墻而出至是見張浚于平江援詭言嘗更服見睿聖皇帝于别宫上謂曰今日張浚吕頥浩必起兵劉光世韓世忠張俊等必竭力相輔語令早來詞㫖甚切浚微察其意不復窮問即遣詣張俊軍俊與其將士聞之皆感慟浚遂令援徧往韓世忠劉光世諸軍宣諭援明辯善為説詞諸將人人自以為上所倚望感泣爭奮由是士氣甚振乙未衡州居住黄潛善再責鎮東軍節度副使英州安置吕頥浩引兵至丹陽劉光世引部曲來㑹金部郎中李迨自鎮江馳至偕行丙申韓世忠以所部至平江初世忠在常熟舟中聞張浚遣人來被甲持刃不肯就岸取浚及綂制官張俊所遺書遣人讀之世忠乃大哭舉酒酹神曰誓不與此賊共戴天舟中士卒皆奮世忠見浚曰今日大事已成世忠與張俊以身任之願公無憂世忠欲即進兵浚諭之曰事不可急投䑕忌器急則事恐不測浚已遣馮轓甘言誘賊矣丁酉馮轓至平江張浚得二賊書率皆不情之語其中云茍可安社稷利國家救生靈息兵戈𫝊等皆聽命馬柔吉王鈞甫亦同致書浚得之即欲攜親兵至杭與賊面決張俊韓世忠皆告以賊知主盟在公勢必加害願勿聽戊戌韓世忠以所部發平江張浚大犒世忠及張俊兩軍酒五行罷浚引諸將至府園屏左右問曰今日之事孰逆孰順衆皆曰我順彼逆浚曰若違天悖人可直取浚頭顱歸賊聞以觀察使求即日富貴矣不然一有退縮當以軍法從事衆皆諾世忠發平江舟行不絶者三十里甲士盡載其上軍勢甚振浚慮𫝊等以偽命易置仍令世忠偏將張世慶搜絶郵傳凡自杭來者悉投之水中己亥張浚復遣馮轓入杭移書𫝊等告以禍福使之改圖先是𫝊又遺浚書云朝廷以右丞待侍郎伊尹周公之事非侍郎其孰當之請速赴行在浚報書云自古言涉不順則謂之指斥乗輿事涉不順則謂之震驚宫闕至於遜位之説則必其子若孫年長以賢則託以政事使之利天下而福蒼生不然謂之廢立廢立之事惟宰相大臣得專之伊尹霍光之任是也若不然則謂之大逆賊矣凡為人臣者握兵在手遂可以責其君之細故而議廢立自古豈有是理也哉天之所興孰能廢之願二公畏天順人無顧一身利害借使事正而或有不測猶愈於暴不忠不義之名而得罪於天下後世也初浚發書及所措置事皆托他詞未敢誦言誅之𫝊等雖聞大集兵猶未深信得此書始悟見討奏請誅浚以令天下辛丑内降詔書畧曰永惟内擅之初恭奉太上之㫖責躬避位事理甚明訪聞有侍從掌兵之官不能曉授受本末弗計宗社安危輕易以惑人心遷延而違詔命惟爾將帥士民各宜體悉期救艱虞𫝊等聞張浚將起兵乃下是詔新除捧日天武四廂都指揮使韓世忠為定國軍節度使依前御營使司提舉一行事務都巡檢使新除捧日天武四廂都指揮使張俊為武寧軍節度使知鳳翔府二人皆以深曉内禪詔㫖不受張浚詿誤故有是命詔新除禮部尚書張浚隂有邪謀欲危社稷責黄州團練副使郴州安置令平江府差兵級防送經由行在赴貶所中書舍人季陵當制有輕脱寡謀之語時兩宫音問幾不相通太母忽遣小黄門至睿聖宫白曰張浚早來不得已郴州安置上方啜羮不覺覆羮于手初𫝊得浚手書即請絀浚右僕射朱勝非沮止之至于五六及是𫝊等至都堂見勝非具言浚見詆為逆賊所不能堪勝非見其悖甚恐生他變謂之曰罷張兵權而以付吕樞密必無事矣𫝊意稍解遂有郴州之命初𫝊正彦日至都堂議事御史中丞鄭殻奏疏言臣訪聞朝廷日近差除行遣多出御營都副苗傅劉正彦之意二人出入都堂殆無虚日望戒諭將帥之臣無以私請干與朝政太后出其章示傅正彦傅正彦銜之及是又請留吕頥浩守金陵張浚不當貶又言浚特以私書與𫝊正彦往來切磋而為忠義今峻責之是堅天下之疑心以動四方之兵也不報殻遂遣所親奉議郎謝嚮變姓名為賈人至平江具言城中事令遲重緩進使賊自遁毋致城中之變浚然之然韓世忠扼秀州張俊前軍在吳江賊氣奪矣時節制司參議官辛道宗總舟師與綂領官陳思恭亦自華亭進發張浚又親作蠟圓書云不得驚動三宫聖駕浚書名張俊亦書名募人齎赴管軍左言等八人慮傅等因大軍之入或有他變書皆達是晩馮轓至臨平馬柔吉見之曰君尚敢來耶昨旦張侍郎有書來詞不委曲二公大怒且發兵出杭矣轓曰張公無他意大率欲規正故不得不激􅋀柔吉意少解夜二鼓柔吉與轓俱縋入城翌旦與𫝊等議于軍中浚繆為書遺轓曰浚近發苗都綂書論列睿聖皇帝事反復數百言適有客自杭來知二公於朝廷社稷初無不利之心甚悔輕易未識體察否然浚無他也欲此忠義大節終歸二公無使他人為之㑹見望致意傅等初謂有他謀發書無異詞遂大喜轓由是得免壬寅吕頥浩軍行至平江之北先是頥浩以所部萬人發江寧府道募得三千人與俱至江江之北四十五里張浚乗輕舟迓之道遇小舟得郵筒屏人發封乃浚郴州謫命葢賊以浚限截往來文字故更遣使臣自湖州轉遞以來浚得之恐將士觀望不盡力呼書吏曰朝廷趣赴行在為我申即日起發浚見頥浩相與對泣以大計咨之頥浩曰事不諧不過赤族頥浩曩諫開邊之失幾死宦官之手承乏漕輓幾陷穹廬之域近者倉卒南渡舉室幾喪今日為社稷死豈不甚快邪浚壯其言頥浩即召其屬官李承造于舟中草檄而浚為潤色之初苗傅聞韓世忠在秀州取其妻梁氏及其子保義郎亮于軍中以為質朱勝非聞之乃好謂傅曰今當啟太后招二人慰撫使報知平江諸人益安矣傅許諾勝非喜曰二兇真無能為矣太后召梁氏入見封為安國夫人錫予甚渥后執其手曰國家艱難至此太尉首來救駕可令速清巖陛梁氏馳出都城遇苗翊於塗告之故翊色動手自捽其耳梁氏覺翊意非善愈疾驅一日夜㑹世忠于秀州俄而傅等以麻制授世忠世忠曰吾但知有建炎豈知有明受斬其使焚其詔又遣使持麻制授張俊俊械以送獄馮轓又説王鈞甫曰此事若了在他人公何以贖過鈞甫頗以為然癸卯太后詔睿聖皇帝宜稱皇太弟領天下兵馬大元帥復封康王皇帝稱皇太姪監國御營都綂制苗傅副都綂制劉正彦並賜鐵劵時傅正彦聞勤王兵大集意甚懼呼馮轓議復辟轓知其可動即見朱勝非白云今國步艱難當以馬上治之今日之事當以淵聖皇帝為主睿聖皇帝嘗受淵聖詔為大元帥宜仍舊少主為皇太姪太后垂簾張逵退謂苗傅曰趙氏安矣苗氏危矣進士馮轓特補奉議郎守尚書兵部員外郎更名康國吕頥浩張浚議進兵韓世忠為前軍張俊以精兵翼之劉光世親以選卒為游撃頥浩浚總中軍光世分軍殿後遂以勤王所為名頥浩浚𫝊檄中外曰逆臣苗傅躬犬豕不食之資取鯨鯢必戮之罪乃因艱難之際敢為廢立之謀劉正彦以孺子狂生同惡相濟自除節鉞專擅殺生仰惟建炎皇帝憂勤恭儉志在愛民聞亂登門再三慰勞而傅等陳兵列刃兇熖彌天迫脅至尊倉皇避位語言狂悖所不忍聞大臣和解而不從兵衞皆至於掩泣詔書所至逺邇痛心駭戾人情孰不憤怒顧惟率土何以戴天况傅等揭榜闤市自稱曰予祖宗諱名曽不回避迹其本意實有包藏今者進兵以討元惡師次秀州四方響應用祈請建炎皇帝亟復大位以順人心今檄諸路州軍官吏軍民等各奮忠義共濟多艱所有朝廷見行文字並係傅等偽命及專擅改元即不得施行敢有違戾天下共誅之乙巳制曰睿聖仁孝皇帝頃自靖康之初實總元帥之重早縁推戴繼遂纂承比以强敵侵陵生民荼毒深自損抑發於至誠若止仍太上之稱何以慰天下之望今恭依太后聖㫖請加上太上睿聖仁孝皇帝處分兵馬重事御營前軍統制張俊以勤王兵發平江殿前都指揮使劉光世繼之吕頥浩與張浚餞于門外登樓閲兵器甲鮮明士氣鋭甚丙午吕頥浩張浚以大軍發平江丁未宰相朱勝非召苗傅劉正彦至都堂議復辟事勝非語之曰反正事已定日迎請朝廷百官皆有章奏公等可别作一章𫝊面頰發赤慚恧無語回顧正彦正彦起曰前日所請本為和戎今使命雖不通未嘗更遣遽請反正前後事體相違勝非責之曰和戎之使既無路可通况事已彰露州縣誰不知之且勤王之師未來者使是間自反正耳前日王淵不當作樞密人情猶能如此今日之事孰為輕重不然下詔率百官與六軍請上還宫公等六人置身何地正彦却立不對傅長吁曰獨有死耳勝非以二將反覆責世修世修以言逼𫝊𫝊不能荅勝非乃令堂厨具飯命世修即廡間草奏持歸軍中自准備將以上皆書名勝非進呈太后極喜曰吾責塞矣時頥浩浚大軍已次吳江王世修聞之遣人至軍中云上已處分兵馬重事止王師屯秀俾頥浩浚以單騎入朝頥浩奏曰臣等所綂將士忠義所激可合不可離願提軍入覲傅等計窮益懼是晩苗傅劉正彦復至都堂見朱勝非請詣睿聖宫見上謝過上乃賜韓世忠手詔曰知卿已到秀州逺來不易朕居此極安寧苗傅劉正彦本為宗社始終可嘉卿宜知此意徧諭諸將務為協和以安國家傅等退以手加額曰乃知聖天子度量如此遂遣杭州兵馬鈐轄張永載持詣世忠世忠得之謂永載曰主上即復位事乃可緩不然吾以死決之傅等大恐金人陷京東諸郡徐州武衞都虞候趙立聞敵北歸鼓率殘兵邀撃于外斷賊歸路奪舟船金帛以千計軍聲復振詔立權知徐州事金左副元師宗維聞上渡江徙濟南叛臣劉豫知東平府充京東西淮南等路安撫使而以其子麟知濟南府自舊河以南皆豫所綂也夏四月戊申朔宰相朱勝非等言臣等三月二十九日請召苗傅劉正彦等到都堂諭以今國家多事干戈未弭當急防秋之計睿聖皇帝宜還尊位總攬萬幾苗傅等一皆聽從太后詔曰吾近以睿聖皇帝授位元子請同聽政國家艱難義不得辭朝夕不遑亟欲歸政今覽所奏甚契吾心可依所請勝非乃率百官上第一表請上還宫詔不允百官三表畢時己巳刻上始御殿百官起居上猶未肯入内勝非再請遂就西廊搢笏掖上乗馬還行宫都人夾道焚香衆情大悦上及太后同御前殿垂簾下詔曰朕顧德弗類遭時多艱永惟責躬避位之因專為講好息民之計今露章狎至復辟為期朕惟東朝有垂簾保佑之勞元子有踐祚纂承之託太后宜上尊號曰隆祐皇太后嗣君宜立為皇太子龜鑑曰方苗劉之猖獗也杜鵑之詩聞者傷心投䑕之舉勢不可亟其事至難處也在内則有朱勝非李炳鄭㲄以正大之理折其鋒在外則有張俊韓世忠劉光世勤王之師挫其鋭取日虞淵洗光咸池二兇以三月癸未至四月戊申反正凡二十六日而平葢張忠獻倡義之功居多焉吕頥浩張浚次秀州韓世忠以下出郊迓之具言𫝊等用意姦回當益為備頥浩謂諸將曰國家艱危君父廢辱一行將佐力圖興復今幸已反正而賊猶握兵居内包藏姦謀事若不濟必反以惡名加我諸公勉之漢翟義唐徐敬業之事可為戒也夜有刺客至浚所浚見而問之客曰僕河北人粗讀書知逆順豈為賊用顧為備不嚴恐有後來者浚下執其手問以姓名不告而去翌日浚取郡囚當死者詭言刺客斬以徇己酉御營使司都綂制苗𫝊為淮西制置使副都綂制劉正彦副之庚戌詔復用建炎年號宰執朱勝非顔岐張澂路允迪皆乞罷上不許御筆張浚除知樞密院事浚時年三十三國朝執政自寇準以後未有如浚之年少者淮西制置使苗傅副使劉正彦並加檢校少保許以所部行吕頥浩張浚次臨平苗翊馬柔吉以重兵負山阻河為陣於中流植木為鹿角以梗行舟翊以旗招引世忠兵出戰世忠率將士當前力戰張浚次之劉光世又次之軍小却世忠叱其將馬彦溥揮兵以進塗濘騎不得騁世忠下馬持矛突前令其將士曰今日各以死報國若面不帶幾箭者必斬之頥浩在中軍被甲立水次出入行伍間督戰翊等敗走𫝊正彦遣兵援之不能進頥浩等進兵北闗𫝊正彦見之曰請設盟誓兩不相害上賜金勞遣傅正彦退詣都堂趣賜鐵劵勝非命所屬檢故事如法製造是夕傅正彦引精兵二千人開湧金門以出命其徒所在縱火遂夜遁尚書省檄諸道捕傅等世忠俊光世馳入城至行宫門閽者以聞上步至宫門握世忠手慟哭光世浚繼至並見于内殿上嘉勞久之辛亥太皇太后撤簾吕頥浩張浚引勤王兵入城都人夾道聳觀咸以手加額班退勝非留身乞罷上曰何必堅去勝非曰國家厄㑹君與相當之以陛下聖德尚避位二十餘日臣實何人豈可苟安相職上曰卿言有理朕更思之勝非頓首謝頥浩浚既見上遂召趙哲李迨楊可輔辛道宗李承造王圭等俱對上特召浚至禁中謂曰隆祐皇太后知卿忠義欲一識卿面適垂簾見卿自庭下過矣浚皇恐謝上欲倚浚為相浚辭以晩進不敢當是日平寇左將軍韓世忠手執工部侍郎王世修以屬吏并拘其妻子詔制置使劉光世鞫其始謀以聞苗傅犯富陽縣遣綂制官喬仲福追撃之壬子上初御殿受朝知樞密院事張浚等言逆臣苗傅劉正彦引兵遁走乞行下諸州生擒傅正彦者白身除觀察使不願就者賞錢十萬緡斬首者依此捕獲王鈞甫馬柔吉張逵苗瑀苗翊並轉七官其餘一行官兵將校並與放罪一切不問仍多降黄榜曉諭從之執政奏事畢朱勝非再留身乞罷上未許勝非曰臣若不去人必以為有所壅蔽臣去之後公議乃見上問可代者勝非曰以時事言之須吕頥浩張浚上曰二人孰優勝非曰頥浩練事而麤暴浚喜事而疎淺上曰俱輕浚太少年勝非曰臣向自蘇州被召軍旅錢榖悉以付浚後來勤王所事力皆出於此此舉浚實主之勝非拜辭將退上曰即今更押卿赴都堂令劉光世韓世忠張俊等皆參堂以正朝廷之體勝非曰臣聞唐李晟平朱泚之亂奏云謹已肅清宫禁祗奉寢園當時寇汙宫禁晟撃出之故云肅清今陛下還宫已數日將士直突呼呌出入殿門誠為不知理道勝非退見光世已下于都堂世忠曰金人固難敵若苗傅但有少許漢兒何足畏者勝非曰請太尉速追討毋令過江於是御史張守亦論勝非等不能思患而預防致賊猖獗乞罷政疏留中不出癸丑尚書右僕射朱勝非罷為觀文殿大學士知洪州同簽書樞密院事吕頥浩守尚書右僕射兼中書侍郎兼御營使門下侍郎顔岐尚書右丞張澂並罷岐提舉南京鴻慶宫澂知江州兼江東湖北制置使簽書樞密院事路允迪提舉醴泉觀兼侍讀同簽書樞密院事李邴守尚書右丞鄭瑴進簽書樞密院事監察御史陳戩奉詔審鞫王世修于軍中世修言先伏兵斬王淵繼殺内官然後領兵伏闕脅天子禪位此皆始謀實情戩以聞詔斬世修于市苗傅犯桐廬縣甲寅殿前都指揮使御營使司提舉一行事務劉光世為太尉御營副使先是御營副使皆以執政為之比光世還朝上議擢光世樞筦既而改命御營平寇左將軍韓世忠充御營左軍都綂制御營前軍綂制張俊充御營右軍都綂制斬御營中軍綂制官吳湛上以湛佐二叛為逆諭韓世忠使圖之世忠詣湛與語手折其中指遂執以出詔戮湛於市以綂制官辛永宗為御營中軍統制乙卯赦天下舉行仁宗法度録用元祐黨籍即嘉祐法有與元豐不同者賞格聽從重條約聽從寛係石刻黨人並給還元官職及合得恩澤應諸路上供木炭油蠟之類有困民力非急用之物並罷丙辰苗傅至白沙渡所過焚橋梁以遏王師劉光世遣其前軍綂制王德助喬仲福討之丁巳先是右司員外郎黄槩應詔薦朝奉大夫趙鼎遂以鼎行尚書司勲員外郎詔自崇寧以來内侍用事循習至今理宜痛革自今内侍不許與主兵官交通假貸餽遺及干預朝政如違並行軍法苗傅犯壽昌縣所至虜居人黥以為軍戊午通判湖州張燾應詔上疏大畧謂人主戡定禍亂未有不本於至誠而能有濟者陛下踐祚以來號令之發未足以感人心政事之施未足以慰人望豈非胷中之誠有未脩乎又言天下治亂在君子小人用捨而已夫小人之黨日勝則君子之類日退將何以弭亂而圖治乎又言防守大江烏合之衆不諳戰陣又言侍從臺諫至國家大事則坐視而不言又言巡幸所至不免營繕重困民力時論以為當綂制官喬仲福追撃苗傅至梅嶺與戰敗之𫝊走烏石山庚申尚書右僕射兼中書侍郎吕頥浩改同中書門下平章事仍兼御營使尚書右丞李邴改㕘知政事時言者復引司馬光併三省狀請舉行之詔侍從臺諫議御史中丞張守言光之所奏較然可行若更集衆徒為紛紛既而頥浩召從官九人至都堂言委可遵行悉無異論頥浩乃請以尚書左右僕射並同中書門下平章事門下中書侍郎並為㕘知政事尚書左右丞並減罷自元豐改官制肇建三省凡軍國事中書揆而議之門下審而復之尚書承而行之三省皆不置官長以左右僕射兼兩省侍郎二相既分班進呈自是首相不復與朝廷議論宣仁垂簾大臣覺其不便始請三省合班奏事分省治事歴紹聖至崇寧皆不能改議者謂門下既相同進公事則不應自駮已行之命是東省之職可廢也及是上納頥浩等言始合三省為一如祖宗之故論者韙之宰相吕頥浩知樞密院事張浚言今天下多事乞命庶寮各舉内外官及布衣隠士材堪大用之才擢為輔弼協濟大功詔行在職事官各舉所知以聞權罷祕書省紹興元年二月復置廢翰林天文局紹興二年七月復置并宗正寺歸太常紹興三年六月復置少卿五年閏二月復置寺省太府司農寺歸户部紹興三年五月復太府十一月復司農鴻臚光祿寺國子監歸禮部紹興三年六月復國子監二十三年二月復光祿寺二十五年十月復鴻臚寺衞尉寺歸兵部太僕寺歸駕部並不復置少府將作軍器監歸工部紹興三年十一月復將作軍器惟少府不復皆用軍興併省也減尚書六曹吏自主事至守當官凡六等定為九百二十人苗𫝊犯衢州守臣胡唐老據城拒之㑹大雨雹城上矢石皆發不克攻遂引去丙寅苗傅犯常山縣丁卯上發杭州留簽書樞密院鄭瑴衞皇太后御營左軍都綂制韓世忠請身往討賊以世忠為江浙制置使自衢信追撃之世忠入辭白上曰臣當撲滅二賊未審聖意欲生得之耶或函首以獻也上曰能殺之足矣世忠曰臣誓生致之顯戮都市為宗社刷恥戊辰苗傅犯玉山縣庚午詔天下帥臣監司守令采訪寓居文武官有智謀及武官武藝精熟者具名以聞量材錄用辛未苗傅屯沙溪鎮綂制官喬仲福王德乗間入信州㑹統制官巨師古自江東討賊還與仲福㑹傳未至信州十里聞官軍在遂還屯於衢信之間初韓世忠喜德之勇鷙欲使歸其麾下乃令腹心健將陳彦章圖之德與彦章適㑹于信州同謁郡將彦章進揖德頗倨彦章怒拔刃刺德不中德奪刃殺之壬申制以皇子魏國公旉立為皇太子丙子初定兩省吏額丁丑初定尚書省吏額御營平寇前將軍范瓊自壽春渡淮遣騎卒五人之廬州從安撫使胡舜陟責贍軍錢帛舜陟執斬之遣一騎還報諭之曰將軍受命北討今棄而南自為寇吾豈竭生靈膏血而為汝資宜急去舜陟又檄諸郡勿給其糧瓊遂渡江之洪州屯駐五月戊寅朔上次常州詔知樞密院事張浚為宣撫處置使以川陜京西湖南北路為所部初上問浚以方今大計浚請身任陜蜀之事置司秦川令吕頥浩扈駕來武昌上許之詔英州安置黄潛善降充江州團練副使永州居住汪伯彦降充寧逺軍節度副使並即其州安置始潛善之斥也其兄潛厚以分司居道州潛厚聞命徑歸邵武軍朝廷聞之為降守臣張髦一官潛厚乃去庚辰江浙制置使周望引兵至衢州而苗傅與其徒犯江山縣傅之軍行也常以王鈞甫馬柔吉將赤心隊為先鋒去大軍十里而屯時上命諸將以罪止傅兄弟及劉正彦鈞甫柔吉張逵餘皆罔治赤心軍士聞詔寛大乃叛傅鈞甫遂焚河梁以斷其路率赤心之衆降於望望使人受降書未幾其前軍綂領官張翼等七人謂鈞甫反覆斬鈞甫及柔吉父子首以降賊黨大懼詔以翼為翊衞大夫温州觀察使傅等聞韓世忠且至遂引兵趨信上世忠聞之恐其滋蔓閩廣乃自浦城捷出以邀之辛巳上次鎮江府翰林學士滕康請命有司祭陳東之墓御筆令守臣併張慤致祭上諭執政以慤古之遺直東忠諫而死皆厚䘏其家焉癸未翰林學士滕康為端明殿學士簽書樞密院事康既秉政張浚西行之議遂格甲申中書舍人張忞罷忞初入見言上即位以來無纎毫之失上謂大臣曰自古人君不患無過患不能改過耳忞諂諛如此豈可置之從班乃落職宫觀乙酉上至江寧府駐蹕神霄宫御筆建康之地古稱名都其以江寧府為建康府起復朝散郎洪皓為徽猷閣待制假禮部尚書充大金通問使丁亥苗傅寇浦城縣時御營副使司前軍統制王德既殺陳彦章欲與韓世忠戰世忠曰苗劉未平若與之戰乃是更生一敵不如避之夜世忠將至浦城北四十里與傅正彦遇于漁梁驛正彦屯溪北傅屯溪南􅘳溪據險設伏相約為應世忠率諸軍力戰驍將李忠信趙竭節恃勇陷陣右軍統制官馬彦溥馳救死之賊乗勝至中軍世忠瞋目大呼挺矛而入正彦望見失聲曰吾以為王德乃韓將軍也正彦少却世忠揮兵以進正彦墜馬世忠生擒之盡得其金帛子女傅棄軍遁去己丑初薛慶既據髙郵兵至數萬人知樞密院事張浚聞慶等無所係屬欲歸麾下親往招之浚渡江靳賽以兵降及是至髙郵入慶壘從者不滿百人浚出黄榜示以朝廷恩意慶感服再拜辛卯詔太史局天文官許將帶學生内中止宿以備宣問天象乙未知樞密院事張浚罷為資政殿學士提舉杭州洞霄宫初薛慶欲求厚賞乃留浚三日而外間不知謂浚為慶所執浮言胥動真州守臣以聞吕頥浩與李邴滕康共議罷浚樞筦己亥都省言自兵興以來天下多事四方文移増倍於前日宰執精力疲耗於案牘而邊防軍政所當急者反致稽緩此無他中書别無屬官故也望用熈寧故事復置中書門下省檢正官二員分書六房事省左右司郎官二員從之是日苗翊率衆出降復用其將孟臯計欲遁之温台禆將江池聞之殺臯擒翊降于制置使周望有舉子程妥者崇安人時敵在傅軍為傅謀與苗瑀張逵收餘兵入崇安縣統制官喬仲福王德共追之盡降其衆傅夜脱身去變姓名為商人與其愛將張政亡之建陽縣土豪詹標覺而邀之留連數日妥知不免密告標曰此苗傅也標執以告南劍州同巡檢吕熈熈以赴福建提㸃刑獄公事林杞杞懼政分其功與熈謀使䕶兵殺政崇安境上自以傅追世忠授之遂檻赴行在辛丑張浚自髙郵至行在復以浚知樞密院事浚辭曰髙郵之行徒仗忠信雖不至如所傳聞然身為大臣輕動損威其罪莫大詔不允遂以慶守髙郵軍上親書御製中和堂詩賜浚曰願同越勾踐焦思先吾身卒章曰髙風動君子屬意種蠡臣丙午命諸路漕臣勘磨常平失陷錢物具數申尚書省仍樁收以待詔用丁未尚書省請以江池饒信州為江州路建康府太平宣徽州廣德軍為建康府路並以守臣充安撫制置使其江州守臣更不帶江東湖北字入銜從之京西北路制置使翟興撃叛將楊進殺之遂復西京六月戊申朔東京留守杜充兼宣撫處置副使節制淮南京東西路己酉上以久雨不止慮下有隂謀或人怨所致以諭輔臣於是吕頥浩張浚皆謝罪求去上曰宰執豈可容易去位來日可召郎官以上赴都堂言闕政臣留正等曰周書言三公爕理隂陽漢故事遇災異則䇿免三公葢以爕理愛人而至於致災宜其不免於咎大上皇帝以欠隂霖雨不止宣諭宰執不及其它獨使召郎官以上言己之過失而將以收人心召和氣銷天變此宋景公所以退星舍而子韋之所以賀延壽也聖德如此御史中丞張守言陛下罪已之詔數下矣而天未悔禍實有所未至爾倘能應天以實不以文則安知譴告警懼非誘掖陛下以啟中興之業乎先是守為副端嘗進修德之説疏凡三上且曰願陛下處宫室之安則思二帝母后穹廬毳幕之居享膳羞之奉則思二帝母后膻肉酪漿之味服細暖之衣則思二帝母后窮邊絶塞之寒苦操予奪之柄則思二帝母后語言動作受制於人享嬪御之適則思二帝母后誰為之使令對臣下之朝則思二帝母后誰為之尊禮要如舜之兢業湯之危懼大禹之菲惡文武之憂勤聖心不惓盛德日隆而天之不助順者萬無是理也及是又申言之且曰天時人事至此極矣陛下覩今日之勢與去年孰愈而朝廷之措置施設與前日未始異也中書舍人季陵言臣者君之隂妻者夫之隂夷狄者中國之隂金人累嵗侵軼生靈塗炭城邑丘墟怨氣所積災異之來固不足怪惟先格心正厥事則在我者其可忽邪臣觀廟堂之上無擅命之臣惟將帥之權太盛宫閫之内無女謁之私惟官寺之習未革且陽為德隂為刑常雨常寒隂道太盛陛下正當修德以應天能制將帥乃德之剛能抑宦寺乃德之正事宗廟以孝禁盜賊以義謀國以智安民以仁如此行之則人心悦而天意得矣吏部侍郎劉珏言北戎强大隂盛陽微故隂雨為災此羣臣所共知也若乃孝悌通神明至誠動天地此陛下所宜知羣臣未嘗言也願陛下精禱於天詳見於事揭為臺觀以表望思時遣使人以伸祈請則孝悌之道至矣陛下有仁聖之資而二三執政專為蔽塞願取建炎以來所下詔令㕘稽而行則至誠之道著矣此感人心銷天變召和氣之大者也上嘉納之司勲員外郎趙鼎言自熈寧間王安石用事肆為紛更祖宗之法掃地而生民始病至崇寧初蔡京託名紹述盡祖王安石之政以致大患今安石猶配享廟庭而京之黨未放臣謂時政之闕無大於此何以收人心而召和氣哉上納其言遂罷安石配享癸丑詔諸路帥臣監司郡守許招來材武之士官為給食仍量材錄用乙卯詔軍興以來忠義死節之家令中書省樞密院籍記姓名優加存䘏訪其子孫量材録用丙辰苗𫝊後軍部將韓雋陷光澤縣𫝊之敗也雋以兵趣邵武軍入城焚掠趣建昌軍守臣方昭率衆守備賊一夕遁去進犯撫州入城縱掠又攻湖口縣渡江至蘄州㑹劉光世駐軍江州遣人招雋雋往見光世因更名世清號小韓尋詔世清添差蘄州兵馬鈐轄庚申隆祐皇太后至建康上率羣臣迎于郊外辛酉上手詔以四事自責一曰昧經邦之逺圖二曰昧戡難之大畧三曰無綏人之德四曰失馭臣之柄仍命出榜朝堂徧諭天下使知朕悔過之意丙寅罷江浙荆湖閩廣増置射士三分之一既而言者以為無益乃罷武尉不數年而所増射士盡廢之丁卯右司諫袁植罷初植請再貶汪伯彦而誅黄潛善及失守者權邦彦朱琳等九人上曰渡江之役朕方念咎責己豈可盡歸罪大臣植乃朕親擢雖敢言至導朕以殺人此非美事吕頥浩曰聖朝弼臣罪雖大止貶嶺外昭盛德可以祈天永命植發此念已傷和氣滕康曰如植言傷陛下好生之德矣乃下詔畧曰朕親擢袁植置之諫垣意其補過拾遺以救闕失而植供職以來忠厚之言未聞殺戮之事宜戒可出知池州明日康見上曰大哉王言太祖以來未嘗戮大臣國祚久長過於兩漢者此也未幾潛善卒于梅州尚書司勲員外郎趙鼎行右司諫監登聞檢院吕祉守右正言祉上疏論致治之要以聰明為本持養之道要在有益於聰明者為之勿以小善為無益而弗為也有損於聰明者去之勿以小惡為無傷而弗去也疏入上召對祉復進三策其一曰自古撥亂同於創業之君其二曰自古得天下必以人心之同其失天下必以人心之異其三曰乞付諸大將以節制之權上悉嘉納遂有是命罷諸州新置州學教授員癸酉樞密院言自兵興至今軍政事務倍於平時欲依祖宗朝置檢詳官兩員序位在左右司之下編修官四員止存一員依舊看詳條法從之甲戌上自神霄宫入居建康府行宫御史中丞張守試尚書禮部侍郎守嘗論吕頥浩不可獨任而張浚不宜西去上不然之㑹有㫖以東京糧運不繼復命梁揚祖為發運使專切措置糧運以餉中都權給事中劉寧止言其不可詔以次宫書讀行下遂命起居郎綦崈禮兼權給事中守言揚祖不可用請罷之中書舍人季陵亦封還錄黄論揚祖前為發運使未及半年而中都之人至於相食此則揚祖之罪孰謂揚祖知首尾乎守再上疏論列不報疏三上揚祖乃請奉祠守言揚祖以自請得祠是臣在憲臺言無可采因乞補外遂有是命守力辭不拜上命吕頥浩召守至政事堂諭以正士不宜輕去朝廷守乃受命中書舍人范宗尹為御史中丞首言設若敵騎深入當以控扼之事責之將相陛下姑引而避之中書舍人季陵亦言建康陛下所當守亦敵人所必攻九江上流有建瓴之勢淮南諸郡有唇亡之憂臣願陛下為馬上之計乙亥金人陷磁州秋七月辛巳韓世忠軍還執苗傅劉正彦苗翊詣都堂審驗畢磔于建康市梟其首正彦臨刑瞋目罵傅曰苗傅匹夫不用吾言遂至於此癸未御前左軍都綂制韓世忠為檢校少保武勝昭慶軍節度使賞平苗劉之功也上遣使賜世忠金合且御書忠勇二字表其旗幟又封其妻梁氏為和國夫人制曰智畧之優無媿前史給内中俸以寵之將臣兼兩鎮功臣妻給俸皆自此始范瓊為御營使司提舉一行事務時瓊自南昌入見故以命之殿中侍御史王庭秀知筠州右司諫趙鼎行殿中侍御史先是庭秀論吕頥浩除擬不公故有是命右正言吕祉奏曰朝廷今日縁論大臣移一言官明日縁論大臣罷一言官則後日大臣行事有失誰敢言者願陛下以言章示大臣使之自省置身無過之地如或不悛黜之何惜甲申詔曰朱勝非顔岐張澂路允迪當軸處中荷國重任而不能身衞社稷式遏兇邪方逆臣亂常之日恣其凌肆以紊機衡夫危而不持顛而不扶孔子以為焉用彼相今二兇既誅典刑斯正勝非之徒盍論其罰於是勝非自觀文殿大學士知洪州落職提舉亳州明道宫岐落資政殿學士依舊提舉南京鴻慶宫允迪自資政殿學士淮西制置使落職提舉江州太平觀澂自資政殿學士江州路制置使坐朋附二兇責授祕書少監分司西京衡州居住御營左軍都統制韓世忠訟王德擅殺其將陳彦章詔德除名郴州編管丙戌范瓊引兵趨闕入見知樞密院事張浚奏瓊大逆不道罪惡貫盈呼吸羣兇布在列郡以待竊發若不乗時顯戮他日必有王敦蘇峻之患上許之遂以張浚兵擁縳付大理使劉光世出撫其衆曰所誅范瓊耳若等固天子自將之兵也衆皆投刃曰諾遂以八字軍還付洮州王彦餘兵分𨽻御營頃刻而定大事記曰葢自宣和未羣盜蠭起建炎以來祝靖薛廣党忠閻僅王存之徒雖皆招安而淮寧山東河北之盜皆擁兵數萬拱州之黎驛單州之漁臺亦有潰卒數千趙萬襲常州張遇焚真州丁進犯壽春桑仲據襄陽戚方犯鎮江楊勍犯處州劉超據荆南王闢犯房州崔増犯太平州張用據桂陽軍趙延壽犯德安軍皆隨滅隨起甚而范瓊召見朝不肯釋兵則天子之兵皆盜矣所幸事變興而人才見保䕶聖躬勝非之力居多倡義勤王張浚之力居多故一月而除二兇而范瓊之謀逆浚又與劉子羽謀之府中之文字夜成廡下之黄紙旦出瓊遂就擒三大奸既除而内盜始息矣元懿太子旉薨年三嵗詔輟五日朝戊子簽書樞密院事鄭瑴薨于位殻執政甫百日上甚悼之謂大臣曰朕喪元子猶能自排遣瑴訃至殆不能釋也己丑資政殿學士王綯參知政事試兵部尚書周望同簽書樞密院事庚寅鄉貢進士李時雨上書曰臣竊聞皇太子服藥不痊事之既往夫復何言而承嗣之道理不可後為今之計欲乞暫擇宗室之賢者一人使視皇太子事以係屬四海増重朝廷候陛下皇太子長成畀之東宫則以一王封視皇子亦不為嫌也伏望陛下斷以不疑而力行之書奏詔日下押出國門建炎以來言儲嗣者葢自時雨始辛卯詔諫院别置局不𨽻後省許與兩省官相見議事元豐初用唐制置諫官八員分左右𨽻兩省至是始復之如祖宗之故升杭州為臨安府壬辰詔范瓊就大理寺賜死丁酉鑄三省樞密院銀印庚子尚書户部侍郎湯東野試工部侍郎兼知建康府時建康府寓治保寧僧舍而江浙制置使韓世忠屯蔣山逐守臣連南夫而奪其治寺殿中侍御史趙鼎言南夫緩不及事固可罪然世忠躬率使臣排闥而入逐天子之京尹此而可為孰不可為矣願下詔􅋀責世忠而罷南夫仍治其使臣之先入者此為兩得上曰唐肅宗興靈武諸軍草創得一李勉然後知朝廷尊今朕得卿無愧昔人矣乃降南夫知桂州而以東野知建康府戍兵故皆羣盜喜攘奪市井東野峻法繩之不少縱民恃以安知樞密院事張浚以精兵千五百人騎三百發行在賜度僧牒二萬紫衣師號五千為軍費上賜川陜官吏軍民詔曰朕嗣承大綂遭時多故夙夜以思未知攸濟正賴中外有位悉力自效共拯傾危今遣知樞密院事張浚往諭密㫖黜陟之典得以便宜施行卿等其念祖宗積累之勤勉人臣忠義之節以身徇國毋貽名教之羞同德一心共建隆興之業當有茂賞以答殊勲浚辟知秦州劉子羽㕘議軍事尚書考功員外郎傅雱兵部員外郎馮康國主管機宜文字忠州防禦使王彦為前軍綂制彦將八字軍以從太學博士何洋閤門祇候甄援等俱從行康國將行往辭臺諫趙鼎謂之曰元樞新立大功出當川陜半天下之責自邊事外悉當奏稟葢大臣在外忌權太重也壬寅詔迎奉皇太后率六宫往豫章且奉太廟神主景靈宫祖宗神御以行以㕘知政事李邴簽書樞密院事滕康並為資政殿學士邴權知三省樞密院事東京留守杜充同知樞密院兼宣撫處置副使吕頥浩張浚薦之也仍命充總兵防淮八月戊申環慶經畧使王似言方今用兵之際闗陜六路帥乞用武臣吕頥浩曰臣少識种諤眇小而為西夏信服今之武帥類皆鬭將非智將罕見如諤之比杜充曰方今艱難帥臣不得坐運帷幄當以冒矢石為事上曰王似未知武臣少能知義理若文臣中有智勇兼資練達邊事如范仲淹者豈必親臨矢石何為多藉武帥己酉移浙西安撫司於鎮江壬子權知三省樞密院事李邴提舉杭州洞霄宫權知三省樞密院事滕康進權知三省樞密院事吏部尚書劉珏權同知三省樞密院事仍許珏綴執政班奏事丙辰奏祠部度牒改用綾紙倣茶鹽鈔法用朱印合同號仍増綾紙工直錢十緡通舊為百二十緡自治平末年始鬻度牒渡江後軍興費廣用度多仰之舊以黄紙印造故偽者易為至是户部郎中朱異等以為言始有是命辛酉廣州州學教授林勲獻本政書十三篇勲以為國朝兵農之政大抵因唐末之故今農貧而多失職兵驕而不可用地利多遺財用不足皆本政不修之故癸亥兩浙轉運副使王琮罷仍奪職坐不刊行資治通鑑板本也始范冲刻是書垂成而去琮至遽罷之言者劾琮指司馬光為姦人謂通鑑為邪説必欲毁板恐其流傳故有是命乙丑權東京留守判官程昌㝢自京城還蔡州初杜充既去昌㝢以無糧不可留引所部還蔡副留守郭仲荀亦引餘兵歸行在遂以京畿轉運副使上官悟權京城留守自悟權留守後命令不復能行留守司名存而已上謂輔臣曰國用匱乏政以所費處多吕頥浩曰用兵費財最號不貲故漢文帝不言兵而天下富上曰用兵與營造最費國用深可戒也臣留正等曰漢武帝外事四夷内侈宫室剥民之膚極矣及盜賊蜂起乃始封宰相以富民侯顧奚益哉太上皇帝以用兵營造為蠧財之戒其有鑒於斯乎然臣嘗竊議之二者為財用之蠧雖均宫室之奉所當深戒師旅之興有出於不得已者文帝惜露臺百金之費而乃講武于上林聚兵於廣武豈靳營造而輕于用兵哉葢應敵之備不得不然也太上皇帝在位三紀臺榭苑囿無所營繕内帑所積甚富及賊亮南侵餽餉賞犒之費盡出於此而民不知易曰節以制度不傷財不害民而後知聖慮无一日不在斯民也甲戌禮部尚書曽楙為翰林學士承㫖禮部侍郎張守為翰林學士先是殿中侍御史趙鼎入對論守無故下遷上曰以其資淺鼎曰中丞臺綱所係豈計資耶且言事官無他過願陛下毋沮其氣時上每除言官即置一簿考其所言多寡鼎為臺諫三月而言四十事上皆行之閏八月戊寅知平江府孫覿罷以言者論覿嘗建明王安石常平聚斂之法也時覿在平江拘催民間崇寧以來青苗積欠民苦其擾上聞亟下詔除之乙酉詔諸路復置提舉常平官指揮勿行用殿中侍御史趙鼎疏也己丑尚書右僕射同中書門下平章事吕頥浩進左僕射同知樞密院事杜充守右僕射並同平章事兼御營使㕘知政事王綯兼御營副使淮東副總管靳賽以所部詣劉光世降光世因以為將就統其軍人人皆喜庚寅起居郎胡寅上疏曰臣伏覩詔書以敵人侵淩備禦不給遂有移蹕之意右顧岳鄂左趨吳越安危利害下訪羣臣臣聞孔子曰成事不説遂事不諫既往不咎今臣所陳不免追咎既往者葢謂建炎以來有舉措大失人心之事今欲復收人心而圖存則既往之失不可不追不可不改故也一昨陛下以親王介弟受淵聖皇帝之命出帥河北二帝既遷則當糾合義師北向迎請而遽膺翊戴亟居尊位遥上徽號建立太子不復歸覲宫闕展省陵寢斬戮直臣以杜言路南巡淮海偷安嵗月敵兵深入陜右逺破京西漫不治軍畧無扞禦盜賊横潰莫之誰何無辜元元百萬塗地怨氣上格日昏無光飛蝗蔽天動以旬月方且製造文物縻費不貲猥於城中講行郊報朝廷動色相謂中興虜騎乗虚直擣行在匹馬南渡狼狽不堪淮甸之間又復流血逮及反正寶位移蹕建康不為久圖百度頺弛淮南宣撫卒不遣行自畫大江輕失形勢一向畏縮惟務逺逃軍民怨咨如出一口存亡之決近在目前凡此節次十餘條皆所謂舉措失人心之大者也為陛下計當如何而黄潛善汪伯彦顔岐顧以乳嫗䕶赤子之術待陛下曰上皇之子三十人今所存惟聖體不可不自重愛也曽不知太祖勤勞取天下列聖兢業嗣守不敢墜失今也宗廟為草莽堙之陵闕為畚鍤驚之堂堂中華戎馬生之赫赫帝圖盜賊營之本初嗣服既不為迎二帝之策因循逺狩又不為守中國之謀以至于今德義不孚而號令不行刑罰不威而爵賞不勸巡幸所至民以淮甸為戒駐蹕所在人以敵至為憂東南之州郡幾何翠華之省方無已若不更轍以救危亡則人心已去天命難恃雖欲羈栖山海跋履﨑嶇臣恐非所以為自全之計也為今之策願陛下一切反前失而已則必下詔曰金人以小狄猖獗薫汙中華逆天亂倫扶立僭偽用夷變夏俾臣作君朕義不戴天志思雪恥父兄旅泊陵廟荒殘罪乃在予無所逃責以此號召四海聳動人心不敢愛身決意講武然後選將訓兵戎衣臨陣按行淮甸上及荆襄收其豪英誓以戰伐天下忠義之士必雲合而景從天下武勇之夫必響應而飇起臣不自量每􅋀歎憤輒為陛下畫七策為中興之術其一曰罷和議而修戰畧葢和之所以可講者兩地用兵勢力相敵利害相當故也非强弱盛衰不相侔所能成也而其議則出於耿南仲何也淵聖皇帝在東宫南仲為東宫官歸依右丞李邦彦邦彦其時方被寵眷又隂為他日之計既而淵聖嗣極而邦彦為次相金人遽至城下遂獻和議南仲因附邦彦而沮种師道撃賊之謀於是覆邦之患滋蔓而起分朋植黨必欲自勝主戰伐者李綱种師道兩人而已幾㑹一去國論紛然中原塗炭至今益甚者本縁南仲主持邦彦以報私恩不為國慮之所致其朋徒附合根株膠結寧誤趙氏不負耿門之所為也若以為强弱之勢絶不相侔縱使向前萬不能抗則自古徒步奮臂無尺寸之地而爭帝王之圖者彼何人哉伏望陛下明照利害之原罷絶和議刻意講武以使命之幣為養兵之費斷而行之堅確不變庶幾貪狄知我有含怒必鬭之志沙漠之駕或有還期所謂乞和必無可成之理昔北狄至澶州王欽若陳堯佐請幸吳蜀惟寇準勸征及成功之後欽若等羞恨無以藉口則惑真宗曰當是時寇準亦豈有好計但是熱血相沃譬如博錢以陛下為孤注耳使人君不明則欽若之言為愛君而寇準之功為幸勝矣二曰置行臺以區别緩急之務既定議講武則其餘庶常有日力不暇給者當置行臺以區處之今百司庶府其必不可闕者惟吏部户部為急誠使江淮兩浙湖北並依八路法慎擇監司而付之則吏部銓事亦復減省户部所以治天下財賦也今四方供貢久不入于王府往往為州郡以軍興便宜截用經常一壊未易復理竊觀行在支費每月無慮八十萬惟以㩁貨鹽利為無窮之源耳故臣謂宜置行宫或建康或南昌或江陵審擇一處以安太后六宫百司以耆哲諳練大臣總臺諫守成法從事郎吏而下不輕移易量留兵將以為營衞命户部計費調度以給之陛下奉廟社之主提兵按行廣治軍旅周旋彼此不為宸居至於餽餉之權自宜專責宰相而選委發運以佐行於下如漢委蕭何以闗中唐委劉晏以東南經制得人加以嵗月量入為出何患無財三曰務實效去虛文夫大亂之後風俗靡然躬率而不變之者則在陛下夫治兵必精命將必賢政事必修誓戡大憝不為退計者乃孝弟之實也遣使乞和廣捐金幣不恥卑辱冀幸萬一者為孝弟之虛文也屈己致誠以來天下之士博訪策畧信而用之以期成功者乃求賢之實也未見賢若不克見既見則不能由之或因茍賤求進之人遂乃例輕天下之士姑為禮貌外示美名者為求賢之虛文也聽受忠鯁不憚拂逆非止面從必將心改苟利於國即日行之者乃納諫之實也和顔稱善泛受其説合意則喜之不合則置之官爵所加人不以勸或内惡其切直而用他事遷徙其人者為納諫之虛文也將帥之才智必能謀勇必能戰仁必能守忠必不欺得是人而任之然後待以恩御以威結以誠信有功必賞有罪必刑者乃任將之實也庸奴下才本無智勇見敵輒潰無異於賊與之親厚等威不立賜予過度官職逾涯將以收其心適足致其慢聽其妄誕張大之語望其朴實用命之功者為任將之虚文也簡汰其疲老病弱升擇其壯健驍勇分屯在所置營房以安其家室聚粟帛以足其衣食選衆所畏信者以董其部伍申明階級之制以變其驕恣悍悖之習然後被之以精甲付之以利器進戰獲酋虜則厚賞死則恤其妻孥退潰則誅其身降敵則戮其族令在必行分毫不貸者乃治軍之實也無所别擇一切安養姑息之惟恐一夫變色不悦幸無事則曰大幸矣教習撃刺有如聚戲紀律蕩然雖其將帥不敢自保者為治軍之虚文也慎選部刺史二千石必求明惠忠智之人使久於其官懲革弊政痛刈奸贓以除民害雖軍旅騷動盜賊未平必使寛䘏之政實被於民固結百姓將離之心勿致潰叛乃愛民之實也詔音出於上虐吏沮於下誑以出力自保則調發其丁夫誘以犒設贍軍則厚裒其錢榖弓材弩料竹箭皮革凡干涉軍須之具日日征求物物取辦因縁奸弊民已不堪乃復蠲其税租載之赦令實不能免苟以欺之者為愛民之虛文也若夫保宗廟保陵寢保土地保人民以此六實者行乎其間則為天子之實也陵廟荒圯土宇日蹙衣冠黔首為肉為血以此六虛者行乎其間陛下載黄屋建幄殿質明輦出房雉尾金鑪夾侍兩陛仗馬衞兵儼分儀式賛者引百官以次入奉起居既退宰相大臣卑卑而前搢笏出奏司晨唱辰正則駕入而仗出矣此則為天子之虛文也其四曰大起天下之兵今宿衞單弱國威稍挫臣嘗言乞於諸路抽揀禁軍充御營正兵厚其月廩精加訓閲陛下自將之天子之軍既强則中國之變自弭則又命福建團結鎗仗各擇其土豪使部督之以俟興發命兩浙募水手并起諸州撩湖捍海等兵盡付水軍江東西湖南北募弓手以在官閒田給養命廣西及辰沅鼎靖於見教峒丁中簡其精鋭分畨起之屯戍襄漢以京西淮南荒廢無主之田為屯田招集兩河山東諸路流徙之人畧依古法均節之擇强壯者訓習武藝使且耕且戰文武臣中有明習營屯之事肯自奮者因以任使於是時而兵不强敵不畏盜不息然後可以歸之天命無所復為矣其五曰定根本自古圖王霸之業者必定根本之地而固守之而非建都之謂也按南渡六朝之遺迹則舍建康不可雖然欲謀進取則非堅坐不動之所能臣切謂惟荆襄為勝誠能屯唐鄧襄漢之田以養新兵出廣西武陵峒丁并施黔撩軍築堅壘列守漢上阻以水軍經以正軍緯以弓手民軍牽制江黄呼吸廬壽則進取之基立然後陜西聲氣血脉通達而騎卒可至川廣之富皆猶外府易以拱把臣願陛下先命吕頥浩杜充分部諸將過江廣斥堠治盜賊自以精兵二三萬為輿衞陛下提此兵渡江而北緩轡而上遣使巡問父老撫綏挺刃之餘民至于荆襄規模措置為根本之地猶漢髙之於闗中光武之於河内雖巡歴往來征伐四出而所固守必爭而勿失者以荆襄為重誠能堅忍聳厲坐薪嘗膽悠久為之而不能濟則書傳所載周宣王漢光武之事皆為妄言以欺後世無足信矣其六曰選宗室之賢才者封建任使之帝王為治之道惇睦宗族强本弱枝所以鞏固基圖紹延佑命原其用心葢以天下為公而不以為私分也今宜於同姓中不間親疎選擇賢才布之中外廣加任使其望實傑然出衆者陛下宜留之宿衞夾輔王室其有克敵戡難之功者宜漸為茅土之制星羅而棊列以慰祖宗在天之靈以續國家如綫之緒使讎敵知趙氏之居中國者尚此其衆則其撲炎火之横心立異姓之逆謀庶其少息乎其七曰存紀綱以立國體夫創業垂統之君必立紀綱以遺子孫繼世承序之君必守紀綱以法祖宗一君子進衆小人未必退一小人進則衆君子必退矣勢不兩立而於君子為難仁宗皇帝在位最久得君子最多小人亦時見用然罪著則斥之君子亦或見廢然忠顯則收之故其成當世之功貽後人之輔者皆君子也至王安石則不然斥絶君子一去而不還崇信小人一任而不改故其敗當時之政為後世之害者皆小人也仁宗皇帝所養之君子既久且逺日以消亡矣安石所教之小人方新而近其蕃息未艾也所以誤國破家至毒至烈不知已時陛下土地金帛能有幾何豈堪此輩大言輕捨盡輸之夷狄耶夫以賢治不肖此治平以前陛下之家法以不肖治賢此熈寧以後陛下之家戒矧當今日否塞之氣充牣於中原隂長之滋勃興於夷狄非得希世異材上下内外迭任交用泰何由復而否何由傾乎此綱紀國家之一事也又曰右文左武者有國不易之道今儒學衰息未有巨賢碩德屹乎朝廷以收運籌指蹤之功陛下所深恃以為心膂爪牙者惟三四庸將耳夫此數人者以近時論之曽不足以當种師道之厮役况望古昔名將乎而偃蹇厖然當負重寄使平寇盜尚或未能豈敢冀其向敵人發一矢也自愧無以塞責則大言詭論以上欺睿聽慢辭倨禮以下視朝士謂今日禍亂皆文臣所致耳敵人方强不可與爭鋒必退避自保乗時而動又不鈐勒其衆動則潰潰則盜盜則招招則官反覆循環無有窮已其為國家之害豈文臣所敢望哉臣願陛下委大臣以腹心待近臣以禮貌常使南衙朝士氣勢重於此曹天下抱才自愛之人必願立於左右緩急之際必有能為陛下竭忠盡節不愧古人者矣故事宰相坐待漏院三衙管軍於簾外倒杖聲喏而過今見其分庭抗禮矣推此類非一日長不已陛下不為之别異表著是自削堂陛無復等威亦將何所不至哉此綱紀國家之二事也治天下者必取篤實躬行之士而舍浮華輕薄之人所以美教化善風俗本朝自熈寧以前皆守此道至王安石以佛老之似亂周孔之實絶滅史學倡説虛無以同天下之習其習既同于今五十年士以空言相髙而不適於實用今乃有身為從官而自陳磨勘乞覃恩轉官不以為恥者矣推而上之見利必忘義貪得必患失遺其親後其君背叛篡奪便可馴致此明君之所甚畏而深戒者也今萬化之原本於陛下茍力行孝弟則天下之忠順者來矣好賢逺佞則天下之名節者出矣賞清白則貪汙者屏矣崇行義則奔競者息矣旌能實則謬誕者懲矣貴忠厚則殘刻者逺矣至於文辭之麗言語之工倒置是非移易黒白誠不宜任用以為浮薄之勸也靖康二年著作郎顔博文佞諛張邦昌則曰非湯武之干戈同堯舜之禪讓及為邦昌作請罪表則曰仲尼從佛肹之召本為興周紀信乗漢王之車固將誑楚博文近世所謂能文之士也其操術反覆如此故亷恥道消四維大壊則社稷隨之陛下何利焉此綱紀國家之三事也孔子曰自古皆有死民無信不立聖人重信至於易死疑若太過鄙夫陋儒以智詐譎詭為術者必忽此言然真宗澶州與契丹結盟契丹守之百有二十年不敢先動宣和宰相王黼一旦敗盟舉兵結逺夷伐與國取景德誓書還之天章閣天地鬼神所臨重誓自我背之遂使金人得以藉口夫金人何憾於我哉皆契丹惎之假手借兵報滅國之怨耳失信之禍乃至於此孔子之言良不為過而近日以來朝廷失信於民尤甚如所謂前降指揮更不施行如所謂已差下人别與差遣承受既數奉行實難不曰畧與應破指揮則謂不晩必又更改近在朝廷尚有此風逺而四方從可知矣百姓雖愚然習於知見必謂朝廷之令率皆誑我是心一萌姦雄得以誘之矣此綱紀國家之四事也郡守縣令者親民之官監司者綂臨州縣之長既得其人必久任之以考功罪之實而施賞罰焉近日以來朝廷移易郡守監司無月無之殆不可勝紀謂其不才而罷之耶則曷若考慎於未命之前也顧恐未必然特出於用事者之私意耳民力已困財用已竭潰兵劇賊徜徉乎其間戎務軍須交制乎其上朝廷憂勞歎息而未能救尚忍不為擇忠信之長慈惠之師以撫綏之乎此綱紀國家之五事也臣夙夜思之得此七策於當世之務雖不能盡亦可見大畧矣惟陛下動心加慮反覆而考焉日月逝矣嵗不我與以為今日難於前日安知後日不又難於今日乎往者雖不可復追不當謂不可為者而遂已也今年之春雷電大震白虹貫日中有黒子錢塘之禍實先示象迺閏月金犯大火芒怒赫然九月朔旦日有食之車駕復有思患預防之行明堂遂虛陽德大弱錢塘受辱之地豈可再枉六飛人知陛下無興復之志威權日削無可瞻望投戈四起孰能止之今尼瑪哈之強未如秦其得罪於中國無人不怨則有甚於始皇之於六國也東南形勢控帶江山兼有吳楚之地坤維嶺海提封自如非如湯以七十里而起也而乞憐偷生之勢乃甚於楚之為奉役此臣所以日夜憤懣為陛下痛惜而傷大臣之過計也誠欲北向而有為臣將見鋤耰慘於長鎩奮臂威於甲兵舉四海惟陛下之用惟在陛下斷與不斷為與不為耳五路事宜張浚已行措置今能使淮南荆襄肘臂相應山東合從則金人所守者數千里之地兵分勢合批穴擣虛攻其不備多方以誤之以十年為期陛下必能掃除妖氛一清天步修上京之廟貌拜鞏雒之神臯逺迓父兄歸安鳳闕再新儀物永固皇圖巍然南面稱宋中興其與惕息退藏蹈危負恥豈不天地相絶哉疏入吕頥浩惡其切直罷之辛卯命尚書右僕射杜充領行營兵守建康韓世忠守鎮江府劉光世守太平及池州光世仍受充節度辛企宗守吳江縣陳思恭守福江口王瓊守常州壬辰監都進奏院周元曜自京太廟奉迎藝祖以下神位九室往臨安元曜言升暘宫掛牌降甘露上謂輔臣曰元曜前態未革諂諛如此可勿令上殿己亥詔減福建廣南路嵗買上供銀三分之一以寛民力詔諸路制置使惟用兵聽從便宜餘悉禁止庚子從官以下先行是夜大雨上慮禁衞勞苦焚香禱天詰朝雨霽壬寅上幸浙西初太白犯前星次逼明堂纔一舍上心甚懼至是稍北復歸黄道上語宰執曰天之愛君猶父之於子見其過告戒之及懼而改則益愛之王綯曰今夜必益逺既而果然劉光世上書言受杜充節制有不可者六上怒趣令過江且詔毋入光世殿門光世皇恐受命光世以便宜復郴州編管人王德充前軍統制時江浙人皆倚充為重而充日事誅殺殊無制禦之方識者為之寒心焉甲辰上次鎮江府㕘知政事王綯言此陳東鄉里上命以金賜其家宣撫處置使張浚自建康至襄陽留二十日召帥守監司令預儲蓄以待上西幸浚方搜攬豪傑為用以新除御營使司提舉一行事務曲端在陜西屢與敵角欲仗其威聲承制拜端威武大將軍充本司都統制端登壇將士歡聲雷動劉豫遣人説東京副留守上官悟令降於金人悟斬其使豫乃賂悟之左右喬思恭宋願與之同説悟復斬之九月丙午朔日有食之所蝕僅四分未幾復退上謂吕頥浩曰太史所奏日蝕早而分深朕適以油盆觀之食淺而退速頥浩曰陛下嚴恭寅畏感格如此壬子金人降單州取興仁府遂陷南京癸丑簽書樞密院事周望充兩浙荆湖等路宣撫使總兵守平江府翰林學士張守同簽書樞密院事丙辰髙麗請入貢詔不許給事中兼直學士院汪藻草詔畧曰壊晉館以納車庶無後悔閉玉闗而謝質匪用前規上大善之以藻為得體宋史全文卷十七上欽定四庫全書宋史全文卷十七下宋髙宗四庚戌建炎四年春正月甲辰朔大風御舟碇海中乙巳日午西風忽起金兵乘之犯明州浙東制置使張浚與守臣劉洪道坐城樓上遣兵掩擊殺傷大當敵奔北墮田間或墜水浚急令收兵夜敵拔寨去丙午早御舟次章安鎮丁未御史中丞趙鼎自明州還行在遂與從官同對于舟中庚戌金人再犯明州丙辰江淮宣撫司右軍統制岳飛自廣德軍移屯宜興縣杜充之敗也其將士潰去多行剽掠獨飛嚴戢所部不擾居民士大夫避兵者皆賴以免故時譽翕然歸之丁巳婁宿陷陜府守臣李彦仙死之彦仙守陜再踰年大小戰二百及城陷其屬官通守職官縣令將佐五十一人皆與同死無屈降者戊午張浚全軍立功人並遷七官賞明州之捷也金人再犯餘姚縣己未金人破明州夜大雷雨翌日上謂大臣曰昨雷聲頗厲於占為君弱臣強邊境兵不制所致朕當與卿等修德以應天壬戌晩雷雨又作上謂大臣曰此與前占無異惟頻發者應速耳癸亥泊青澳門甲子泊温州港口丙寅移次温州之館頭先是金人攻定海縣破之遂以舟師犯昌國縣欲襲御舟至碕頭風雨大作提領海船張公裕引大舶擊散之敵乃去丁卯金人犯潭州戊辰權知三省樞密院事滕康提舉亳州明道宫權同知劉玨提舉江州太平觀己巳尚書户部侍郎葉份請令僧道換給已書填黄紙度牒每道輸紙墨錢十千從之初趙立既至楚州朝廷因以立知州事金左監軍昌親帥數萬人圍城相持四十餘日敵不能入而城中薪糧日竭辛未給事中兼直學士院汪藻言金人為患今已五年陛下以萬乘之尊而倀然未知稅駕之所者由將帥無人而御之不得其術也如劉光世韓世忠張俊王􅊅之徒身為大將論其官則兼兩鎮之重視執政之班有韓琦文彦博所不敢當者論其家則金帛充盈錦衣肉食輿臺厮養皆得以功賞補官至一軍之中使臣反多卒伍反少平時飛揚跋扈不循朝廷法度所至驅擄甚於敵兵陛下不得而問正以防秋之時責其死力耳張俊明州僅能少抗奈何敵未退數里間而引兵先遁是殺明州一城生靈而陛下再有館頭之行者張俊使之也臣痛念自去秋以來陛下為宗社大計以建康京口九江皆要害之地故杜充守建康韓世忠守京口劉光世守九江而以王􅊅隸杜充其措置非不善也而世忠八九月間已歸鎮江所儲之資盡裝海舶焚其城郭為逃遁之計洎杜充力戰于前世忠王􅊅卒不為用光世亦偃然坐視不出一兵方與韓梠朝夕飲宴賊至數十里間不知則朝廷失建康敵犯兩浙乘輿震驚者韓世忠王􅊅使之也失豫章大母播越六宫流離者劉光世使之也嗚呼諸將已負國家罪惡如此而俊自明引軍至温道路一空居民皆逃奔山谷世忠逗遛秀州放軍四掠至執縛縣宰以取錢糧雖陛下親御宸翰召之三四而不來元夕取民間子女張燈髙會君父在難而不恤也􅊅自信入閩所過邀索千計公然移文曰無使枉害生靈其意果安在哉臣觀今日諸將用古法皆當誅然不可盡誅也惟王􅊅本隸杜充充敗于前而􅊅不救此不可赦當先斬􅊅以令天下其他以次重行貶降使以功贖過臣愚以為敵退之後正大明賞罰再立紀綱之時莫若擇有威望大臣一人盡護諸將雖陛下親軍亦聽其節制稍稍以法裁之仍使於偏禆中擇人才之可用者間付以方面之權待其有功加以爵秩陰為諸將之代此今日所最急者惟陛下與大臣熟議㫁而行之户部侍郎葉份言淮鹽路梗妨阻客販浙鹽數少積壓客鈔望權以福建鹽通商仍稍還買鹽本錢即本路官搬官賣兩不相妨從之福建路歲産鹽一千一百萬斤政和中遣左司郎官張察至本路參定歲以三分為率二分歸朝廷許商人輸錢給鈔受鹽一分歸漕司許自賣鹽以辦歲計時商販官搬二法並行靖康俶擾商販殆絶故官悉自鬻歲入課錢四十萬緡至是份請行鈔法而奸民乘之盜販者甚衆二月乙亥御舟至温州江心寺駐蹕大中大夫盧益權知三省樞密院事吉州居住李回復端明學士權同知金人陷潭州丙子金自明州引兵還臨安丙戌金人自臨安退兵丁亥金人陷京師權留守上官悟及副留守趙倫出奔悟至唐州為董平所殺自是四京皆陷没矣庚寅上入温州駐蹕州治辛卯金人陷秀州權州事鄧根留本州兵馬都監趙士醫乘城拒敵城陷士醫為流矢所中而死甲午尚書省言淮鹽道路不通商人皆自京師持鈔引至兩浙請鹽故温合州積下引鈔至多有至二三年者乞令行在𣙜貨務換給新鈔赴閩廣算請每袋貼納通貨錢三千從之鼎州人鍾相作亂自稱楚王改元天載自是十九縣皆為盜區乙未尚書右僕射兼江淮宣撫使杜充罷為觀文殿大學士提舉江州太平觀充自真州而北宗弼遣人說充許以中原地封之如張邦昌故事杜充遂降丙申宣撫制置使張浚聞上親征亟治兵自秦州入衞留參議軍事劉子羽掌留司事金遊騎至平江同知樞密院事周望奔太湖守臣湯東野挈家潛遁以府印付統制官郭仲威丁酉金人大集城下望及仲威皆遁戊戌宗弼入平江敵之在湖南者是日亦渡江趨石首縣而去已亥鍾相犯桃源縣知縣事錢景出戰為所殺庚子吕頤浩奏户部侍郎葉汾言駕幸浙西須早除發運使臣觀可任漕計極難得人間有之又素行不修上曰有德者率淳直或不能辦事有才者多是小人如梁揚祖誠無學術使為發運使則有餘矣大抵小人不可使在侍從之列若藉其才任於外亦何不可辛丑鍾相陷澧州守臣黄琮等十餘人皆為所殺澧陽縣丞葉畬戰死三月癸卯朔宗弼去平江府甲辰初婁宿既陷陜遂與其副薩里罕長驅入闗宣撫處置使司都統制曲端聞敵至遣涇原路馬步軍副總管吳玠及統制官張忠孚李彦琪將所部拒之於彭原店端自擁大兵屯於邠州之宜祿以為聲援敵乘髙而陣婁宿引兵來犯玠擊敗之薩里罕懼而泣北人因目為啼哭郎君既而北師復振官軍敗端退屯涇州敵亦引去端劾玠違節降武顯大夫罷總管復知懷德軍宣撫處置使張浚素奇玠尋擢玠秦鳳副總管兼知鳳翔府時當兵火之餘玠勞來安集民賴以生始青溪嶺之戰玠牙兵皆潰及是玠治兵秦鳳諸潰卒復出就招玠問訊再三捜索非是者五六人斥遣之餘悉斬於逺亭下去秦州十里軍中股慄自是每戰皆効死無復潰散者矣丁酉張浚言大食獻珠玉已至熙州詔津遣赴行在右正言吕祉言所獻真珠犀牙乳香龍涎珊瑚梔子玻瓈非服食器用之物不當受上諭大臣曰捐數十萬緡易無用珠玉曷若愛惜其財以養戰士遂命宣撫司無得受仍加賜遣之時浚率步騎數萬人入衞至房州遇德音知敵騎退乃還壬子金人入常州甲寅先是上諭吕頤浩曰朕初不識隆祐皇太后自建炎初迎奉至南京方始識之愛朕不啻己出宫中奉養及一年半朕之衣服飲食必親調製今朕父母兄弟皆在逺方尊長中惟皇太后不惟相别數千里外加之北騎衝突又兵民不相得縱火交兵五六日乃定復爾驚擾當早遣大臣領兵迎奉以稱朕朝夕慕念之意林把除名連州編管坐提㸃福建刑獄日與吕熙共殺張政也熙配惠州牢城詹摽初手執苗傅及是亦坐獄辭不伏而死丁巳金人至鎮江府浙西制置使韓世忠已屯山寺以邀之降其將鐵爪鷹李選選者江淮宣撫司潰卒也宗弼遣使通問世忠亦遣使臣石臯報之約日會戰世忠謂諸將曰是間形勢無如金山龍王廟者敵必登此覘我虚實仍遣偏將蘇德將二百卒伏廟中又遣二百卒伏廟下戒之曰聞江中鼓聲岸兵先入廟兵繼出敵至果有五騎趨龍王廟廟中之伏者先鼓而出五騎振策以馳僅得其二有一人紅袍玉帶既墜復跳馳而脫詰二人者即宗弼也既而戰數十合世忠妻和國夫人梁氏在行間親執桴鼓敵終不得濟復使致詞願還所掠假道世忠不從益以名馬又不從己未上御舟復還浙西辛酉上御舟發溫州晚朝執政登舟奏事上曰張浚措置陜西極有條理薦人用士持心向公張俊辛永宗皆言陜西將帥往往服浚謀略吕頤浩曰陛下雖失之杜充復得之張浚王綯曰張守嘗語臣浚好謀有大志嘗招諸將至臺講論用兵籌策今果能行所言真不易得上復言浚用孫渥代辛興宗按王擇仁等罪稱善者久之壬戌御舟次章安鎮故朝請郎張耒贈右文殿修撰故朝散郎晁補之朝奉郎黄庭堅宣德郎秦觀皆贈直龍圖閣又詔故右司諌江公望監察御史常安民各官子孫二人時方褒錄元祐忠賢以耒等四人為黨籍餘官之首而參知政事范宗尹言公望安民論事勁切故首及之乙丑上次台州松門寨宰執奏事吕頤浩因言此行未審且駐會稽為復須到浙右上曰須由蘇杭往湖州或如卿所奏往宣州頤浩又曰將來且在浙右為當徐謀入蜀上曰朕倚雍之強資蜀之富固善但張浚奏漢中只可備萬人糧恐太少頤浩曰若第攜萬兵入蜀則淮浙江湖以至閩廣將為盜區皆非國家之有矣上曰當益進上流用淮浙㩁貨鹽錢以贍軍費運江浙荆湖之粟以為軍食王綯曰議者多言入蜀便殊不知自秦用張儀至本朝遣王繼恩下蜀者八矣取輒得之不勞再舉則亦未可謂之便也范宗尹曰臣謂若便入蜀恐兩失之據江表而徐圗闗陜之事則兩得之上曰然既而浚復上疏言陛下果有意於中興非幸闗陜不可上不許戊辰湖北捉殺使孔彦舟擊鍾相敗之執相及偽后伊氏偽太子子昂並檻送行在己巳戚方陷廣德軍權通判王儔判官李唐俊權司法潘瑀權知廣德縣韋績權丞蔣䕫與權軍事皆死辛未上次定海縣顧縣為金人所焚惻然曰朕為民父母不能保民使至如此王綯曰陛下留杜充提兵四萬守建康留周望提兵二萬守平江不幸充望不學任使乃至如此吕頤浩因言承平日久士多文學而罕有練達兵財可濟今日者上曰前此太平朝士若乘馬馳騁言者必以為失體纔置良弓利劒議者將以為謀叛綯曰大抵文學之士未必應務有才者或短於行自非陛下棄瑕錄用則舉世無全人矣初敵陷山東左監軍完顔昌密有許封劉豫之意會濟南有漁得鱣者豫妄謂神物之應乃祀之既而北京順豫門生禾五穗同本其黨指言豫受命之符乃使豫子偽知濟南府麟賫重寶賂昌求僭立大同尹髙慶裔左副元帥宗維心腹也恐為昌所先乃說宗維曰吾君舉兵止欲取兩河故汴京既得則立張邦昌後以邦昌廢逐故再有河南之役方今河南州郡官制不易風俗不更者可見吾君意非貪土亦欲循邦昌之故事也元帥盍建此議無以恩歸他人宗維乃令希尹馳白金主晟晟許之夏四月甲戌上御舟至明州之外城御史中丞趙鼎言吳越介在一隅非進取中原之勢荆襄左顧川陜右視湖湘而下瞰京洛在三國必爭之地宜以公安為行闕而屯重兵於襄陽以為屏翰運江浙之粟資川陜之兵經營大業計無出此願詔張浚未可長驅深入姑令五路各守其地犄角相援可也乙亥上發明州癸未上次越州駐蹕州治初浙西制置使韓世忠與宗弼相持於黄天蕩而貝勒太一圍揚州朝廷恐守臣張績力不能支許還屯京口績不為動敵乃趨真州時太一軍於北宗弼軍於南世忠以海艦進泊金山下將戰世忠預命工鍛鐵相連為長綆貫一大鈎以授士之驍捷者平旦敵以舟譟而前世忠分海舟為兩道出其背每縋一綆則曳一舟而入敵竟不得濟乃求與世忠語世忠酬答如響時於所佩金鳳瓶傳酒縱飲示之宗弼見世忠整暇色益沮乃求假道甚恭世忠曰是不難但迎還兩宫復舊疆土歸服明主足相全也吕頤浩聞其窮蹙乃請上幸浙西且下詔親征以為先聲而亟出銳兵策應世忠庶幾必擒烏珠參知政事王綯亦言宜遣兵與世忠夾擊上納之甲申下詔親征乙酉御史中丞趙鼎為翰林學士自建炎初置御營使而宰相兼領之遂專兵柄吕頤浩顓恣尤甚議者數以為言上自海道還鼎率其屬共論頤浩之過會鼎復駮親征之議頣浩聞之乃移鼎翰林鼎引司馬光故事以不習駢儷之文不肯就職戚方圍宣州戊子韓世忠奏捷上曰金人侵犯以來諸將率望風奔潰今歲如世忠軰雖未成大功皆累獲捷若益訓卒繕兵今冬敵人南來似有可勝之理范宗尹曰前此兵將望風奔潰而今歲皆能力戰此天意似稍回更願陛下修德庶幾天意必回則天下之事不難為矣乃出世忠奏命尚書省以黄榜諭中外時敵衆十餘萬而世忠戰士纔八千宗弼求登岸會語世忠以二人從見之宗弼語不遜世忠怒引弓且射之亟馳去詔涇原路第七正將向亶械赴宣撫司依法行遣亶從統制官秦公楚拒金師公楚戰死亶遁走行在故浚以為請焉庚寅御史中丞趙鼎為吏部尚書鼎不受辛卯罷福建鈔鹽令轉運司官搬官賣仍歲發鈔鹽錢二十萬緡赴行在𣙜貨務助經費以淮浙鹽場復通故也乙未分行在𣙜貨務官吏之半於臨安府置司丙申尚書右僕射吕頤浩罷先是趙鼎復辭吏部尚書之命且攻頤浩之過章十數上頤浩乃求去上諭王綯等曰頤浩功臣兼無誤國大罪與李綱黄潛善不同朕當眷遇始終不替是夕遂召汪藻草制略曰占吏貟而有虧銓法專兵柄而幾廢樞庭下吳門之詔則慮失於先時請浙右之行則力違於衆論遂罷為鎮南軍節度使開府儀同三司充醴泉觀使時王綯與頤浩論頗同乃累章丐免於是范宗尹攝行相事遂留㑹稽無復進居上流之意矣詔三省樞密院同班奏事是日韓世忠及宗弼再戰於江中敗績宗弼既為世忠所扼欲自建康謀北歸不得去或獻謀於金人曰江水方漲宜於蘆場地鑿大渠二十餘里上接江口舟出江背在世忠之上流矣宗弼從之傍冶城西南隅鑿渠一夜渠成次日早出舟世忠大驚金人悉趨建康世忠尾擊敗之敵終不得濟先是宗弼在鎮江世忠以海舟扼於江中乘風使篷徃來如飛宗弼謂諸將曰使船如使馬何以破之乃揭榜募人獻所以破海舟之策有福州人王某僑居建康敎敵人於舟中載土以平板鋪之穴船板以櫂槳俟風息則出江有風則勿出海舟無風不可動也以火箭射其篛篷則不攻自破矣一夜造火箭成是月引舟出江其疾如風天霽無風海舟皆不能動敵以火箭射其篛篷火烘日曝人亂而呼馬驚而嘶被焚與墮江者不可勝數所焚之舟蔽江而下敵輕舟襲追之統制官孫世詢嚴永吉皆力戰而死世忠與餘軍至𤓰步棄舟而陸奔還鎮江聚兵宗弼乃得絶江遁去大事記曰張浚以孤軍敢與金戰而有明州城下之捷陳思恭邀擊於吳縣而有太湖之捷牛臯邀擊於荆南而有寶豐之捷岳飛邀擊於荆南而有靜安之捷而韓世忠捷於鎮江敵勢尤為窮蹙雖海舟無風天時未順而頤浩固請幸浙西下詔親征兵勢稍張而金自是不敢復過江矣丁酉御筆趙鼎依舊御史中丞鼎即出視事辛丑詔比年爵賞失實名器浸輕自今將帥監司毋得乞空名告敕如實有功保奏推賞大臣出使亦如之金人犯江西者自荆門北歸留守司同都統牛臯潛軍於寶豐之宋村擊敗之五月癸卯中書門下省檢正諸房公事張汝舟特遷一官初上過明州汝舟應奉簡儉粗能給足至台州而守臣晁汝為儲峙豐備論者以為擾民乞行賞罰以示好惡及是進呈范宗尹曰若黜汝為則盧知原宋煇皆當貶矣臣觀近歲宰相一罷則凡經遷擢者悉皆擯斥目為其黨不復進用遂分彼此更相憎嫉上曰朝廷人才豈有易相一切進退第以簡儉褒汝舟則好惡自明如汝為軰不必皆黜乃進汝舟一官其實宗尹陰佑汝為故有此論甲辰參知政事權樞密院事范宗尹守尚書右僕射同中書門下平章事兼御營使時江北荆湖諸路盜益起大者至數萬人據有州郡朝廷力不能制盜所不能至者則以土豪潰將或攝官守之皆羈縻而已宗尹以為此皆烏合之衆急之則併死力以拒官軍莫若析地以處之盜有所歸則可以漸制乃言於上曰昔太祖受命收藩鎮之權天下無事百有五十年可謂良法然國家多難四方帥守事力單寡束手而莫知所出此法之弊也今日救弊之道當稍復藩鎮之法亦不盡行之天下且裂河南江北數十州為之少與之地而專付以權擇人久任以屏王室群臣多以為不可宗尹曰今諸郡為盜據者以十數則藩鎮之勢駸駸成矣曷若朝廷為之使恩有所歸上決意行之遂以為相宗尹時年三十三自漢唐及國朝宰相未有如是之年少者丁未金左副元帥宗維與諸軍分往山後草地避暑先是大同尹髙慶裔自東平還雲中言推戴劉豫之意宗維復令慶裔馳至東平問豫可否豫陽推張孝純宗維報曰戴爾者河南萬姓推孝純者獨爾一人難以一人之情而阻萬姓之願爾當就位我當以孝純輔爾其議遂決宗弼自江南還屯六合縣庚戌詔二省樞密院官輪修時政記以同班奏事故革舊制也辛亥上謂大臣曰從班人極少卿等當共議務取其實不厭多也今乘輿服御悉從簡儉除一省郎未至甚費茍得其人其利溥矣范宗尹曰用人之法須擇可為執政者方除從官可為從官者方除省郎則選精而真材出上曰善統領赤心軍馬劉晏與戚方戰於宣州死之壬子金人焚建康府掠人民擄財物自靜安渡宣化而去時宗弼屯六合縣金之輜重自瓜步口舳艫相銜至六合不絶淮南宣撫司右軍統制岳飛聞敵去以所部邀擊於靜安勝之夜有赤雲亘天其中白氣貫之犯北斗及紫微由東南而散殿中侍御史沈與求言此天愛陛下出變以示警也願陛下隨宜措置略修宗廟陵寢之祀又天子所在謂之朝廷今號令出於四方者多矣盡假便宜即同聖㫖然其大者䖍州一朝廷秦州一朝廷號令之極至為詔矣願修約便宜事件度其緩急時罷行之防守者國家之大計也願採擇羣臣之議擇其便宜㫁自聖心汲汲行之論相者天子之職也願以所屬意之臣親製宸翰禱於天地占而用之仍舉行開寶故事使參知政事得與宰相輪日知印又論劉光世軍名及罷浙西預借苗米置諸軍功罪簿等事詔三省以次施行癸丑同簽書樞密院事張守參知政事御史中丞趙鼎簽書樞密院事兼權御營副使自黄潛善吕頤浩繼相凡兵政悉隸御營使司事權既分又再經大變文移紛亂至是樞密未置長而同知院事周望在臨安鼎始檢故事舉行以正西府之體甲寅金人陷定逺縣節制淮南軍馬閭勍為所執至南京欲降之不可遂怒敲殺之統制官巨師古與戚方戰於宣州城下方三戰三敗遂引去乙卯參知政事王綯提舉萬壽觀兼侍讀始宗弼渡江和州兵馬都監宋昌祚權領州事率軍民固守逮敵北歸擊破之昌祚與權通判唐景歴陽今蹇譽司户徐兟歴陽尉邵元通皆死丁巳宰執擬呈海州東海縣李彦先遣人至行在奏聞登萊積粟頗多欲就委彦先用海舟轉輸以助軍食上曰登萊諸州自道路榛梗不及今既未能厚加撫恤乃反責其積粟以輸行在於理未安輔臣退曰聖慮髙逺非羣臣所及戊午詔復置推尚書六曹侍郎如元祐故事滿二年為真補外者除待制未滿除修撰時宰相范宗尹建言自崇寧罷權侍郎之後庶官進用有不可任以給舍者則正除侍郎超躐太甚請復舊制以待資淺新進之人故有是命初上在明州諸班直為亂既誅其為首者遂廢其班及還會稽乃命御前親軍統制辛永宗更選兵三百人直殿簷然皆烏合之衆至是趙鼎因奏事言祖宗於兵政最為留意葢自藝祖踐祚與趙普講明利害著為令典萬世守之不可失也昨明州班直緣訴事紛亂非其本謀乃盡廢之是因咽而廢食今諸路各總重兵不隸三衙則兵政已壞獨衞兵彷彿舊制亦掃蕩不存是祖宗之法廢於陛下之手臣甚惜之上悟尋復舊制壬戌詔行在職事官及釐務官子弟並赴國子監别試癸亥陳桷提㸃福建路刑獄公事桷嘗為尚書郎以學行稱范宗尹奏今所除用多儒生欲兼用才吏以備緩急使令故不留桷行在上曰才吏亦不可無但勿令太多前吕頤浩當國純用掊克之吏如變賣度牒計置錢物雖有寛恤之名而實皆掊克也臣留正等曰甚哉掊克之吏之為斯民害也葢其處心積慮惟在於損下益上凡可以取於民者雖剝膚槌髓無所不為而民之咨怨初不遑恤之人也其可加之斯民之上乎詔河南北陜西淮南流寓士人許於所在州附試每二十人解一人仍召文臣二貟委保結除名罪所保毋得過二人甲子詔曰周建侯邦四國有藩垣之助唐分藩鎮北邊無金鼓之虞永惟涼渺之資履此艱難之運逺巡南國久隔中原葢因豪傑之徒各奠方隅之守是用考古之制權時之宜㫁自荆淮接於畿甸豈獨植藩籬於江表葢將崇屏翰於京都欲隆鎮撫之名為輟按亷之使有民有社得專制於境中足食足兵聽專征於閫外詔詞直學士院綦宗禮所草也先是范宗尹言從官集議分鎮事宜請以京畿淮南湖北京東西地分並分為鎮除茶鹽之利國計所係合歸朝廷置官提舉外他監司並罷上供財賦權免三年餘令帥臣移用管内州縣官許辟置知通令帥臣具名奏差朝廷審量除授遇軍興聽從便宜其帥臣不因朝廷召擢更不除代如能捍禦外寇顯有大功當議特許世襲始宗尹等議即令世襲上曰未須爾輔臣奏江北殘破若不許世襲恐不能守上曰便令世襲恐大重俟其保守無虞然後許之宗尹曰當如聖訓臣等慮所不及大事記曰自范宗尹裂諸路為鎮撫使而李成敢於犯江浙桑仲敢於窺蜀紹興以來雖李成摧破張用招安李允文革面而孔彦舟據鄂馬友據潭范汝為據建州楊么據重湖曹成李宏在湖南江西之間鄧慶龔富剽掠南雄英韶諸郡而内郡之民皆盜矣同知樞密院淮南兩浙宣撫使周望以脫身先遁致失蘇杭降祕書少監分司衡州居住乙丑知楚州兼管内安撫使趙立為楚泗州漣水軍鎮撫使兼知楚州時宗弼自六合歸屯於楚州之九里徑欲斷立糧道立大破之先是劉豫在東平遣立故人葛進等賫書誘立令供賦稅立大怒不撤封斬之已而又遣沂州舉人劉偲持旗榜招立具言金人大軍且至必屠一城生聚立令將出就戮偲大呼曰公非吾故人乎立曰吾知忠義為國豈問故人耶趣令纒以油布焚死市中且表其旗榜於朝由是忠義之聲傾天下逺邇向風下之戊辰詔諸路帥臣見帶制置使及諸州守臣帶管内安撫使者並罷己巳布衣程康國上書論分鎮十事其一言四鄰有警令即應援上謂大臣曰此意雖出於布衣若朝廷行之人豈知其為布衣之言張守曰使人知其出於布衣之言乃朝廷美事也遂批㫖行下庚午初張浚之入蜀也朝議大夫王庶以失守得罪即前途迎見之浚以為參議官與偕行庶俄以母喪去至是桑仲頗窺興元而上行未至浚度諸將無可用乃起庶故官知興元府兼利路安撫使劉超據荆南府分衆犯峽州兵馬鈐轄渠成與戰為所殺超遣彭筠犯復州欲取鼎澧以窺湖南二廣六月辛未朔詔侍從臺諫同衙諸軍統制並赴都堂集議駐驆事宜有未盡者許實封以聞癸酉合江南兩路轉運為一司衡州居住周望再責昭化軍節度副使連州安置望竟卒於貶所甲戌以宰相范宗尹兼知樞密院事罷御營使議者以為宰相之職無所不統本朝沿五代之制政事分為兩府兵權付以樞密比年又置御營使是政出於三也望罷御營司以兵權歸之密院而宰相兼知庶幾可以收兵柄一賞罰節財用於是罷御營使及官屬而以其事歸樞密院為機速房焉自慶歴後宰相不兼樞密者八十餘年其復兼葢自此始監察御史萬格為樞密院檢詳諸房文字始除檢詳官也乙亥詔六品以上官及初改京官並給告陞朝官以上給敕初授官人給綾紙自渡江惟侍臣給告至是漸復之丁丑戚方犯安吉縣詔浙西江東制置使張俊往捕之仍命統制官岳飛聽俊節制戊寅詔御前五軍改為神武軍御營五軍改為神武副軍其將佐並屬樞密院庚辰命宰臣范宗尹提舉詳定重修敕令參知政事張守同提舉先是有詔以嘉祐政和敕令格式對修成書至是始設官置局命大理寺及見在敕局官就兼詳定刪定等官仍召人言編敕利害踰年乃成鍾相之敗其黨楊華楊太等聚衆於龍陽太年幼楚人謂幼為么故以么目之和州進士龔楫率民丁襲金於新塘為所殺敵之得歴陽也有士人蔣子春者平日敎授鄉里敵見其人物秀整喜欲命之以官子春怒罵為所殺辛巳用宰相范宗尹請申命有司討論崇觀以來濫賞皆釐正之自越州駐蹕以來已收使人令吏部拘收付身毁抹右正言吳表臣論近臣不以縣令為重故為令者政多茍簡而民受其弊願擇可用之人必先使為縣令顧其才誠可用則必有善政以惠斯民縱或不能亦必強勉為善以期他日之獲用矣夫天下者積諸縣而為之者也縣令皆得其人天下豈有不治輔臣進呈上曰祖宗謹守資格必兩任縣令以至守倅然後内為郎外為監司又擇其賢者然後為侍從范宗尹曰大凡進用不必甚驟久於其職然後究知利病而奔競之風息楚州鎮撫使趙丘引兵攻金人孫村浦寨不克而還壬午執政奏以潘良貴提㸃荆湖南路刑獄公事上曰良貴頃為諫官與袁植皆勸朕誅殺祖宗以來未嘗戮近臣故好生之德信於天下若此必失人心趙鼎曰諫諍之職尤不可以此導人主乙酉詔皇兄忠州防禦使安時權主奉益王祭祀自仁宗以來諸王後各以一人襲封至渡江始廢權直學士院汪藻言今欲卹民莫大於去貪殘之吏祖宗時吏犯贓者無大小皆棄市故人重犯法官曹為清今縱未能舉祖宗之典姑擇其一二大者真決黥配以戒其餘仍令臺諫官以上歲舉郡守一人保其終身如後姦贓與之同罪不得以自首原免而郡守監司於部内有贓吏不聞朝廷而為他人所劾者罪亦如之庶幾斯民漸被實惠疏奏詔坐條申明行下其後卒施行如藻請丙戌吕頤浩為建康府路安撫大使兼知池州劉光世為兩浙路安撫大使兼知鎮江府朱勝非為江州路安撫大使兼知江州戊子詔遣使撫諭邵青戚方以所部赴行在時方引兵犯安吉縣之上鄉浙西江東制置使張俊以兵討之會統制官岳飛追襲其後方無路進退始詣俊乞降方上兵簿有馬六百疋所獻金玉珠珍不可計詔遷方武翼大夫以其軍六千人隸王􅊅軍俊因以方為禆將時人為之語曰要髙官受招安己丑樞密院進呈劉光世所獲金人并簽軍狀參知政事張守曰光世謂簽軍不宜留葢知吾山川險易他日叛亡恐為敵人鄉道上曰此皆吾民也不幸陷於敵兵驅質而來豈其得已守曰若分置軍伍中每隊留一二人豈能遽叛上以為然辛卯大理寺奏魔賊王宗石等欵狀上曰此皆愚民無知自抵大戮朕思貴溪兩時間二十萬人無辜就死不勝痛傷乃誅宗石等二十六人於越州市其餘皆釋之壬辰侍御史沈與求言今日矯枉太過盡循資格賢愚同滯輔臣進呈范宗尹曰茍有豪傑之士自可不次擢用若未得其人不得不謹守資格上曰使有豪傑之士雖自布衣擢為輔相可也前古固多但本朝未有耳今士大夫並進若未能考詳其實不若姑守資格中書門下奏行在仰食者衆倉廩不豐請委諸路漕臣及秋成和糴詔廣東糴十五萬斛並儲之漳泉福州浙西以銀十萬兩錢十萬緡糴之儲於華亭縣浙東以銀十萬兩糴儲於越温台州應屬郡非茶鹽及朝廷寄樁錢皆許為糴本諸統兵官非有制書而擅取及所在州擅與之者皆從軍法置樞密院幹辦官四貟初和安大夫致仕王繼先以覃恩特換武功大夫落致仕給事中富直柔奏繼先以伎術雜流而易前班則自此轉行更無拘礙深恐將帥解體上覽奏諭輔臣曰朕於言無不從但頃冒海氣繼先診視實有奇效可特令書讀直柔再奏外議謂醫官用藥有功自當於本色官遷之武功大夫昔之皇城使也惟有戰功歴邊任負材武者乃遷無是三者雖入仕日久不以輕授伏望陛下思名器不可假人之意特加愛惜以塞亂源是日進呈上曰繼先初未嘗有請出自朕意直柔能抗論不撓朕當屈意從之議遂寢史臣曰以一人臨天下其勢常信不以一己之私勝天下之公則其義當屈聖人不恃其信者而嘗畏其當屈者此所以立於無過之地也丁酉郭仲威犯鎮江詔統制官岳飛以所部擊之己亥朝散郎江躋為監察御史躋入見論天變事甚悉上以其有史學他日謂大臣曰今士大夫知史學者幾人此皆王安石以經義設科之弊范宗尹曰安石學術本不至是由蔡京兄弟以紹述之說敷衍枝蔓浸失其意然自非卓然特立之士鮮不為誤者上深以為然秋七月癸卯浙西安撫大使劉光世乞依宣撫處置使司例合隨宜措置事並從便宜詔除臨陣出奇或事干機會許施行外餘並禀朝㫖詔諸州守臣自軍興以來得便宜指揮者並罷甲辰命劉洪道趣之池州權管本州及安撫司事諸軍權聽節制洪道請用便宜指揮許之丁巳申命元祐黨人子孫經所在自陳盡還應得恩數庚申昌州團練使岳飛為通泰鎮撫使兼知泰州用張俊薦也丁卯户部請歲終以諸路上供錢斛比較最多最少處申乞賞罰庶使官吏有勤惰之戒從之金主晟遣西京留守髙慶裔尚書禮部侍郎韓昉冊命知東平府充京東西淮南安撫使節制河南諸州劉豫為皇帝國號大齊都大名府冊文略曰咨爾劉豫素懷濟世之才夙擅直言之譽百里雖智亦奚補於虞亡三仁至髙或願從於周仕宜即始歸之地以昭建業之元昉有文學仕遼為知制誥金主因而用之凡大詔令多昉所草也己巳禮部尚書謝克家奏故翰林學士范祖禹當元祐中終始實在經筵所著唐鑑已進御又有仁宗訓典及帝學二書深裨治道今其子前宗正少卿冲見寓衢州乞給札令冲投進從之詔迪功郎王銍權樞密院編修官纂集祖宗兵制其後書成上覽之稱善命銍改京官賜名樞庭備檢八月辛未朔禮部尚書謝克家參知政事浙西安撫大使劉光世嘗因公事移牒六曹言者以為今國勢浸弱藩方大臣所宜尊奬王室若帶儀同三司可牒六曹則亦可以闗三省樞密院矣光世非敢淩蔑特不知事體詔以章示光世户部侍郎季陵轉對上疏曰臣聞宣王承板蕩之後任賢使能周室中興焉夫賢以德稱能以才稱賢者必有才故任之勿疑能者不必有德顧所使如何耳自古以為才難使人不當求備紀其功􅁯其過取所長棄所短安得乏才之嘆乎前日士大夫名節不立有愧於古論事之人皆喜攻之瑕疵既彰不復可用縱加􅋞拭攻者踵來雖君相制命亦不能為之地矣自崇觀以來黨助巨姦交結非類各由詭道以饕寵榮坐此當責者不知其幾何人也陛下昭德塞違以照臨百官雖皆赦而不誅然弄筆墨者至今未容貸文致其罪當得惡名雖知其才誰敢引薦當今多難之時朝廷緩急無可使者獨不聞舉魏尚於獄中卒能却匈奴起張敞於亡命卒能弭盜賊責功補過自古有之臣願陛下明詔宰執於罪戾之中選擇實能量付以事勿因一眚廢其終身仍詔臺諫為國愛人許以自効非誤國者勿復再言使人人皆得自新誓死圖報同心協濟以成中興之業天下幸甚疏奏後二日范宗尹進呈詔榜朝堂壬申詔自今堂除窠闕内不載去處並令吏部差注又詔除知州軍及舊格堂除通判外一切撥還吏部甲戌詔日輪侍從官一貟具前代及本朝事闗治體者一兩事進入用參知政事謝克家請也既而綦宗禮言若令從官一例獻其所聞既非舊典且有越職之嫌乃命學士與兩省官如前詔丁丑起復神武左軍統制韓世忠遷檢校少師易鎮武成感德始錄守江之勞也翌日上諭大臣曰世忠不親文墨朕方手寫郭子儀傳欲付卿等呼諸將讀示之神武右軍都統制張俊為檢校少保寧武昭慶軍節使錄扈蹕及平盜之勞也詔故監察御史常安民左司諫江公望加贈諫議大夫各官其家二人召安民子奉議郎同赴行在既至以同知大宗正丞戊寅侍御史沈與求右諫議大夫黎確右正言吳表臣論季陵轉對乞收用近年廢黜之人其言非是不當榜朝堂上悟命撤之范宗尹請坐三章行出上曰祖宗以來凡朝廷政事不當未出則給舍封駮既行則臺諫論列一體相成判而為二則非矣宗尹曰臣等惟是之從何敢固執然議者謂陵所言葢宗尹風㫖也庚辰隆祐皇太后至自䖍州承州天長軍鎮撫使薛慶及金人戰於揚州城下死之辛巳侍御史沈與求尚書户部侍郎季陵並罷先是與求嘗言宰相范宗尹年少驟進不更世務恐誤國事上意方向宗尹不以為然會與求再上疏劾季陵言其承望宰執風㫖有變朱成黑指鹿為馬之語宗尹乃求去上遣中使押入衙批陵降三官奉祠與求與合入差遣參知政事張守謝克家留御批不下後二日宗尹入對極論大臣事君不當懷祿眈寵使人主疑之而防其為姦事功決不可立上宣諭再三宗尹却立不進守力請宗尹同奏事宗尹不得已而前進呈己卯御批請陵以本官奉祠而與求除職出守上許之乃詔陵身為侍從疑誤朝廷欲收姦黨之恩遂陳迷國之計可罷户部侍郎提舉亳州明道宫與求乞顯黜獻言者其論為當至云指鹿為馬使大臣不敢安位可除直龍圖閣知台州宗尹乃復視事癸未宣撫處置使張浚復取永興軍初浚之西行也上命浚三年而後用師進取及是金左監軍昌與宗弼皆在淮東約秋髙入寇浚聞宗弼躊躇淮上度敵必再犯東南議出師分撓其勢士大夫多以為不可通判敘州王賞獻養威持重二策浚弗用召諸將議出師都統制曲端曰平原廣野賊便於衝突而我軍未嘗習戰且金人新造之勢難與爭鋒宜訓兵秣馬保疆而已俟十年乃可議戰秦鳳路馬步軍副總管吳玠曰髙山峻谷我師便於駐隊賊雖驍果甲馬厚重終不能馳突吾據嵯峨之險守闗輔之地敵即大至決不容爭此土浚皆不聽參議軍事劉子羽爭之曰相公不記臨行天語乎浚曰事有不可拘者假如萬一有前日海道之行變生不測吾儕雖欲復歸陜西號令諸將其可得乎浚雖重用端然以人言浸潤不能無疑乃遣本司主管機宜文字張彬往渭州以招填禁軍為名實欲伺察端意彬至渭見端問曰公嘗患諸路兵不得盡合及財用不足以供軍今張公之來兵已合用已足羅索孤軍深入吾境我合諸路攻之不難失今不擊萬一尼雅滿統兵接應何以待之端曰不然兵法先較彼己必在計吾不可勝與敵之可勝萬一輕舉脫不如意雖有智者無以善其後又自敵入寇因糧於我彼去來自如而我自救不暇是以我嘗為客而彼常為主今當反之精練士卒按兵據險使我常有不可勝之勢然後徐出偏師俾出必有所獲是我為主彼為客不一二年必自困斃因而乘之可一舉滅矣彬以端言復命先是玠以彭原之敗望端不濟師而端謂玠前軍既敗惟長武有險可捍衝突二人爭不已浚積前疑卒用彭原事罷端兵柄與宫觀再責海州團練副使萬州安置統制官張中孚李彦琪諸州羈管陜西倚端為重及貶軍情頗不恱浚遂決策治兵移檄河東左副元帥宗維問罪乃以玠權永興軍路經略司公事遂取永興軍玠以功陞忠州防禦使丙戌寧逺軍節度使孟忠厚乞蠲太母所過秋稅范宗尹曰頃已免夏稅若復蠲放恐州郡經費有闕必致横斂上愀然曰常賦外科斂及贓吏害民最宜留意祖宗雖崇好生之德而贓吏死徒未嘗末減自今官吏犯贓雖未欲誅戮若杖脊流配不可貸也臣留正等曰設官吏以牧民志不在民而貪黷是聞民之賊也藝祖皇帝懲五季之弊凡贓吏一切棄市藝祖豈好刑人者哉誠以不如是不足以行仁政於天下者也而况艱難以來生民之困極矣撫摩涵養民猶或病而貪黷之吏乃敢剝刻以肆其無厭之求如之何民不窮且盜乎故太上皇帝惻然念常賦之不可免而欲不貸贓吏之罪聖上斷然舉而行之懲一而百懼其真得藝祖太上皇之心歟丁亥楚泗等州鎮撫使趙立領徐州觀察使是時張榮在鹽城縣乘亂鴟張立親擊破之併其糧食將經營京東行次寶應縣承州報敵復聚兵揚州立遂歸而完顔昌已薄城下立慨然曰敵終不去惟有竭節守死此州而已屢出兵破敵敵圍之己丑詔通泰鎮撫使岳飛以所部救楚州時揚承二鎮已陷楚勢亦危趙立遣人告急簽書樞密院事趙鼎欲遣神武右軍都統制張俊往救之俊曰立孤壘危在旦夕若以兵委之譬徒手搏虎併亡無益鼎見上曰江東新造全藉兩淮若失楚則大事去矣若俊憚行臣願與之偕往俊復力辭乃命飛與立腹背掩擊仍令劉光世遣兵往援毋失事機庚寅自分𣙜貨務場於臨安而商人不復至行在詔廢越州務場辛卯帶御器械潘永思罷永思護六宫東歸盧益頗與之交結為諫官吳表臣所論上曰朕於戚里未嘗私以恩澤如邢后之父不復收召張婕妤兄弟皆小官卿等所知盧益觀望隂結永思非端人也癸巳建州民范汝為作亂守臣韓珉遣州兵出戰為所敗乃命本路安撫使程邁會兵討之甲午中散大夫韓璪為其父忠彦請諡上曰吕頤浩嘗奏崇寧黨碑視其姓名皆賢士大夫真可惜也上篆其神道曰世濟厚德之碑諡文定兩浙安撫大使劉光世畏金人之鋒不能援揚楚但遣統制官王德酈瓊將輕兵以出是日渡江與金游兵遇擊之九月乙巳詔劉光世岳飛趙立王林犄角逼逐北兵渡淮時完顔昌圍楚州已百餘日鎮撫使趙立一日擁六騎出城呼曰我鎮撫也首領驍騎其來接戰南寨有二騎襲其背立手奮二槍賊俱墜地奪雙騎將還俄北寨中遣五十餘騎追立立瞋目大呼人馬俱辟易明日立三幟邀戰立以三騎應之敵伏發立中飛矢奮身突圍以出敵益攻之戊申劉豫僭位於北京初軍民聞豫至殺金人閉門以拒豫豫擊而降之遂即皇帝位國號大齊大赦偽境赦文略曰朕風猷寡陋家世側微昔也壯年久林泉而是樂今焉晚節豈軒冕之為心雖非虞舜之明揚幸無成湯之慙德既立復還東平癸丑言者論近世銓衡之官法守不立自京黼用事有詣堂而求吏部闕者判一取字雖已注人亦奪予之甚至部有佳闕密獻之以自效為寒逺患踰二十年望明戒吏部長貳自今堂中或取部闕者並須執守毋得供報從之甲寅言者論近州縣之吏贓貪頗衆欲望應官貟犯入已贓許人越訴其監司守令不即按治並行黜責庶使舉刺之官不敢坐視贓吏既去民皆樂生從之乙卯罷中書門下省檢正官丙辰復増左右司郎官為四貟金左監軍昌犯楚州楚守臣泗州漣水軍鎮撫使趙立死之前一日昌大進攻具臨城翌日填壕將進立率士卒禦之忽報兵近城矣立笑曰將士不用相隨吾將觀其詭計且令彼衆匹馬隻輪不返上城東門未半敵飛砲碎其首左右馳救之立猶曰吾終不能與國滅敵矣令轝致三聖廟中聲言疾病祈禱使敵不悟言終而絶己未上曰昨韓世忠進一馬髙五尺一寸云非人臣所敢乘朕答以九重之中未嘗出入何所用之卿可自留以為戰備辛酉承州天長軍兵馬鈐轄主管鎮撫司公事王林知承州代薛慶也廢天長軍為縣隸揚州盱眙軍為縣隸泗州自是諸鎮撫使稍因事併廢矣壬戌御史中丞富直柔請罷新除右司貟外郎侯延慶而用直龍圖閣蘇遲為都司范宗尹曰都司宰屬如大藩帥臣猶得自辟置屬官葢資贊畫之益遲雖名德之後然不可任都司上曰臺諫以拾遺補過為職不當薦某人為某官趙鼎曰惟可論薦臺屬張守曰亦須得㫖乃可薦上曰然癸亥宣撫處置使張浚以都統制劉錫及金人戰於富平縣敗績初浚既定議出師幕客將士皆心知其非而口不敢言上亦以敵萃兵淮上命浚出兵分道由同州鄜延以擣其虚時權永興軍路經略使吳玠已得長安而環慶經略使趙哲收復鄜延諸郡浚乃檄召熙河經略使劉錫秦鳳經略使孫渥涇原經略使劉錡各以兵會合諸路兵四十萬人馬七萬以錫為統帥浚親往邠州督戰金左副元帥宗維聞之急調宗弼自京西入闗與羅索會官軍行至耀州之富平金人已屯下邽縣相去八十里而羅索方在綏德軍衆請擊之浚不可乃約日會戰金人不報書凡數往金人許之至期輒不出兵浚以羅索為怯曰吾破敵必矣諸將議戰玠曰兵以利動今地勢不利將何以戰宜徙據髙阜使兵馬衝突吾足以禦之秦鳳路提㸃刑獄公事郭浩亦曰敵未可爭鋒當分地守之以待其弊諸將皆曰我師數倍於敵又前阻葦澤敵有騎不當施何用他徙將戰命立故將曲端旗以懼之羅索曰彼紿我也敵遂薄我軍錡身先率士卒禦之自辰至未勝負未分敵更薄環慶軍他路軍無與援者會哲擅離所部將士望見塵起驚遁軍遂大潰金人得勝不追所獲軍資不可計丙寅賜劉光世銀帛二萬匹兩為渡江賞軍之費先是有言光世將提兵過江而幕客阻之簽書樞密院事趙鼎以書抵光世曰參謀諸公久在幕府必能裨贊聰明共享富貴固不可輕舉妄動重貽朝廷之憂亦安忍坐視不救滋長敵勢留無窮之患丄聞之曰諭諸將當如此戊辰金左監軍昌急攻楚州拔之趙立家屬先死于徐以單騎入楚得女子習書者使讀軍中書記城陷遂没立為人木強不知書其忠義葢出天性善騎射容貌甚壯不喜聲色財貨與士卒同甘苦每戰擐甲胄先登衆畏服樂為用其視北人如仇每言及必囓齒而怒常戒士卒惟以復國讎為言自敵犯中國所過名城大都多以虛聲脅降如探囊取之惟冀州堅守踰二年濮州城破巷戰殺傷略相當皆為敵所憚而立威名戰多咸出其上是役也敵銳意深入會張浚出師闗陜宗弼往援之及立以其軍蔽遮江淮故北師亦困敝而止議者謂立之功雖張巡許逺不能過云冬十月庚午朔張浚斬趙哲於邠州遂責劉錫為海州團練副使合州安置初諸軍既敗還浚召錫等計事浚立堂上諸將帥立堂下浚曰誤國大事誰當任其咎者衆皆言環慶兵先走浚命擁哲斬之哲不伏且自言有復辟功浚親校以撾擊其口斬于堠下軍士為之喪氣哲已死諸將聽令浚命各歸本路歇泊令方脫口諸路之兵已行俄頃皆盡浚率帳下退保秦州於是陜西人情大震朱勝非閒居錄曰張浚出使陜蜀便宜除官至節度使雜學士權出人主之右竭蜀人之膏血悉陜服之甲兵凡三十萬衆與敵角一戰盡覆用其屬劉子羽計歸罪將帥趙哲曲端並誅之由是怨怒俱叛浚僅以身免奔還閻州闗陜之陷自此始至今言敗績之大者必曰富平之役也龜鑑曰富平一戰偶為趙哲離部以取敗夫勝負兵家之常鄧禹有闗中之敗子儀有相州之敗孔明有街亭之敗而富平之以速戰敗者公非不知陜西兵將上下之情未通也又非不知臨行天語三年而後出師也痛念向者海道之幸已出襄漢今也兵駐淮甸有再入吳越之謀萬一犯屬車之清塵縱欲提兵問罪亦何及矣此公所以不顧利害不計勝負而決于一戰也臣僚上言建州軍賊作過將官曹維方到任繼而趙哲招撫不以軍賊叛逆在壓奏劾除名有㫖體究詣實改正依無過人例又言范琪為衢州開化縣令其邑僻逺叛賊苗劉所不到乃結守臣胡唐老作守禦有功改京秩有㫖體究詣實改正臣留正等曰曹維未嘗有罪而被罪范琪未嘗有功而奏功太上皇帝既得其實亟加改正曽不旋踵若使維之罪不雪而琪終冒其功在二人固未足道而於賞罰大柄無乃終累乎臣於此二事有以見太上皇帝之於賞罰必務覈實以求中也己未王以寧乞下詔幸蜀俾敵人罔測乘輿所在上曰詔令所以取信於民自非必行之事不可降詔何以取信於民秦檜自楚州孫村歸於漣水軍丁禩水寨遂泛海赴行在朱勝非閒居錄曰秦檜隨敵北去為大長達蘭任用至是與其家俱得歸檜王氏壻也王仲山有别業在濟南敵為取千緡贐其行然全家來歸婢僕亦無故人知其非逃歸林泉記曰檜在大金為徽宗作書上尼堪以結和議尼堪喜之賜錢萬貫絹萬匹建炎四年大金攻楚州乃使乘船艦全家厚載而還俾結和議為内助李心傳曰檜與何㮚孫傅司馬朴同被拘三人不得歸而檜獨得歸此可疑一也自中京至燕千里自燕至楚州二千五百里豈無防禁之人而踰河越海並無譏察此可疑二也檜自謂隨軍至楚定計於食頃之間向使敵人初無歸檜之意第令隨軍則質其家屬必矣胡為使王氏偕行此可疑三也張邵所奏謂檜衣褐憔悴葢被執而訓童讀而檜自敘乃云劉靖欲殺己以圖其囊橐既有囊橐豈是奔舟此可疑四也夫以檜初歸見上之兩言始相建明之二策與得政所為前後相符牢不可破豈非檜在北庭嘗倡和議而違蘭縱之使歸邪癸酉執政進呈諫官論疏上覽之甚恱謂范宗尹曰近來臺諫官無一日無章疏亦未嘗放過一事趙鼎曰陛下開廣言路奬拔言臣是以人人得以盡言無隠此朝廷美事也丙子上謂范宗尹曰比閱王竦家所收上皇書畫有御製鶺鴒賦京卞皆作賦題其後卞賦盛言繼述哲宗之志屏斥元祐之人而致斯瑞豈非姦邪宗尹曰紹聖以來賊害忠良皆卞之力也己卯以久雨放行在越州公私僦錢十日自是雨雪則如之癸未上謂輔臣曰聞城中百物貴踴將士經此寒苦可念太母日饋朕盤飱問内侍云一兔至直五六千鵪鶉亦三數百朕知之飭尚食勿進鶉兔久矣范宗尹曰陛下恭儉如此天下幸甚乙酉言者論天下三年之通喪後世有從權奪服之舉者所以移孝為忠徇國之急也而比來所起之士多非金革之故幾習宣政之風如權邦彦為發運使姜仲謙為湖北轉運使以至幕職之官亦行起復又有夤緣請托於權三省樞密院而圖起復者此何理邪欲望一切罷去于以明人倫而厚風俗詔邦彦專委催發諸路錢糧應副行在大軍支遣其餘皆罷之戊子簽書樞密院事趙鼎奏詰劉光世違命不救楚州之罪有云逐官但為身謀不卹國事且令追襲金人過淮以功贖過翌日上批語言太峻令改定進入及進呈上曰光世當此一面委任非輕若責之太峻恐其心不安難以立事鼎曰陛下待諸將可謂無負矣不知何以為報己丑權同知三省樞密院事李回改同知樞密院事時敵留淮上未退一日宰執奏邊事范宗尹曰敵未必能再渡趙鼎曰勿恃其不來恃吾有以待之也乃乞詔州縣各為移治自保之計毋得拘留百姓及兵至即脫身而遁使民肝腦塗地又曰三省常為敵不來而為陛下拔人才修政事密院常為敵見侵而為陛下申軍律治兵甲即兩得之上曰卿等如此朕復何憂辛卯䖍州進士李敦仁與其弟世雄聚衆於羅源有兵萬餘是日破䖍化縣又入石城縣詔江西兵馬副都監李山與吉州統制官張忠彦會兵討之丙申馬進急攻江州兵馬副鈐轄劉紹先統兵迎敵雖捷而攻城愈急范宗尹等進呈江東探報孔彦威李成人馬宗尹曰萬一移蹕欲令韓世忠屯饒州張俊留越州相為聲援上曰朕日夕念此未嘗􅁯懷世忠兵少與李成相拒萬一決戰小有敗衂國威愈挫朕欲留世忠浙東此人忠勇不畏金兵敢與之戰使張俊以五千精騎策應之恐能成功來春事定朕親督諸軍巡幸江東雖過淮南亦所不憚平此二患不難也趙鼎曰臣恐成軰乘間深入愈難支吾上曰卿所慮極當顧力未能及耳然朕之所說未必皆是卿等之言亦未必皆非更呼諸將議之十一月癸卯詔曰吕公著吕大防范純仁皆盛德元老同居廟堂國勢奠安中外順服而遭罹貶斥久歴歲時尚拘微文未獲昭雪朕經此時巡之久益知致治之難念兹老臣是宜褒稱三省可檢舉速行褒贈并其餘黨籍臣僚下有司責以近限具名取㫖施行初上既數下詔褒錄元祐忠賢而朝廷多故有司未暇檢舉及是上收得元祐黨碑即降出令錄所司一一契勘褒贈遂追封公著魯國公大防宣國公諡正愍純仁許國公皆贈太師甲辰簽書樞密院事趙鼎罷丙午秦檜入見檜自言殺敵之監已奔舟來歸朝士多疑之者而宰相范宗尹同知樞密院事李回與檜善力薦其忠乃命先見宰執于政事堂翌日引對檜言如欲天下無事須是南自南北自北遂建議講和且乞上致書左監軍昌求好丁未試御史中丞富直柔簽書樞密院事試御史中丞致仕秦檜試禮部尚書賜銀帛三百匹兩范宗尹等進呈檜所草國書上曰檜樸忠過人朕得之喜而不寐葢聞二帝母后消息而又得一佳士也古者兵交使在其中第難作國書姑令劉光世作私書與之始朝廷雖數遣使然但且守且和而專與北人解仇議和葢自檜始壬子權知湖口縣孫咸坐贓抵死三省擬刺面配連州上謂大臣曰祖宗時贓吏有杖朝堂者黥面特配尚為寛典乙卯改樞密院幹辦官為計議官序位在太常博士之下丙辰金左監軍昌陷泰州己未金人陷通州庚申詔學士兩省講讀官依舊輪日進故事先是量留百司而講筵所不與上特命留之量留百司在議巡幸時辛酉偽齊劉豫改元會昌宣撫處置使張浚自秦州退軍興州初我師既潰於富平慕容洧叛乃遂引兵而西於是秦鳳路馬步軍副總管吳玠自鳳翔走保大散闗之東和尚原權環慶經畧使孫恂由龍闗入秦與浚會金人乃入德順軍浚聞遂移師興州簿書輜重悉皆焚棄浚之自邠南歸也將士皆散惟親兵千餘人自隨其屬官皆懼有建議而保䕫州者參議官劉子羽曰議者可斬也宣撫司豈可過興州一步係闗陜之望安全蜀之心浚以為然乃劾異議者遣子羽單騎至秦州訪諸將所在時敵騎四出道阻不通將士無所歸忽聞子羽在近宣撫司留蜀口乃各引所部來會凡數十萬人軍勢復振浚哀死問傷錄善咎巳人心粗安或謂吳玠宜移屯漢中以保巴蜀玠曰敵不破我詎敢輕進吾堅壁重兵下瞰雍甸敵懼吾乘虚襲其後此保蜀良策也諸將乃服時玠在原軍食不繼鳳翔之民感其遺惠相與夜負芻粟輸之玠亦憐其逺意厚償以銀帛民又益喜敵怒遣兵伏渭南邀而殺之又今保伍相坐犯者皆死而民益冒禁輸之數年然後止己卯上以太后誕日置酒宫中從容語及前朝事后曰吾老矣幸相聚於此他時身後吾復何患但有一事當與官家言之吾逮事宣仁聖烈皇后求之古今母后之賢未見其比因姦臣快其私憤肆加誣謗有玷盛德建炎初雖嘗下詔辨明而史錄所載未經刪定豈足傳信後世吾意在天之靈不無望於官家也上聞之惕然其後史修神宗哲宗兩朝實錄葢張本於此辛巳詔監司守倅並以三年為任壬戌同知樞密院事李回進呈諸路盜賊數上謂回卿意如何回曰臣意欲治數渠魁當少戢上曰卿意甚善皆吾赤子豈可一一殺之第治李晟輩三兩人可矣乙未神武右軍都統制張俊為江南路招討使進解江州之圍且平群盜事急速者許便宜翰林學士汪藻言古者兩敵相持所貴者機㑹此勝負存亡之分也敵師既退國家非暫都金陵不可而都金陵非盡得淮南不可淮南薦經兵馬民去本業十室而九其不耕之田千里相望流移之人非朝夕可還國家欲保淮南勢須屯田則此田皆可耕墾臣愚以為正二月間可便遣劉光世或吕頤浩率所招安人馬過江營建寨柵使之分地而耕既固行在藩離且清東西群盜此萬世之利也疏奏未克行中興後言屯田者葢自此始初徽猷閣待制洪皓與右武大夫龔璹持命至太原敵令其陽曲縣主簿張維館伴留幾歲金遇使人禮益削是歲始遣皓璹至雲中時通問使王倫閣門宣贊舍人朱弁已被拘倫皓因以金遺商人陳忠令密告兩宫以本朝遣倫等來通問於是二帝始知建炎中興之實已而左副元帥宗維召皓等遣官偽齊皓力辭不可宗維怒命壯士擁以下執劒夾承之皓不為動傍貴人唶曰此忠臣也宗維怒少霽遂流逓於冷山雲中至冷山行兩月程相距二千餘里地苦寒四月草始生八月而雪右監軍希尹使誨其八子或二年不給衣食盛夏至衣觕布嘗久雪薪盡至乞馬屎煨麵而食宋史全文卷十七下
