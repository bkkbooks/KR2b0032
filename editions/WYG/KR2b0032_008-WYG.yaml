body:
  text: 宋史全文卷八上宋仁宗三辛巳慶厯元年春正月朝廷既用韓琦等所畫攻策先戒師期知延州范仲淹言正月内起兵塞外雨雪大寒暴露僵仆使賊乗之所傷必衆賊界春暖則馬瘦人饑其勢易制及可擾其耕種之務縱出師無大獲亦不至有它虞且元昊被姦人所誤謂國家太平日乆不知戰鬭邉城無備所向必破以恣桀慢之心今邊備漸飭度其已失本望又言鄜延是舊日進貢之路蕃漢之人頗相接近願朝廷存此一路令諸将勒兵嚴備賊至則擊但未行討伐容臣示以恩意嵗時之間或可招納茍嵗月無効遂舉重兵取綏宥二州擇其要害而據之屯兵營田作持乆之討如此則茶山横山蕃漢人户可以招降或即奔竄則是去西賊之一臂也戊午詔從仲淹所請仲淹又言鄜延路入界比諸路最逺若先脩復城寨却是逺圖乞遣使命令臣督諸将於二月半出兵先脩復廢寨别置戍守既逼近蕃界彼或㸃集人馬朝夕便知大至則閉壘以待隙小至則扼險以制勝仲淹前後凡六奏卒城承平等十一寨蕃漢之民相踵復業是月元昊乞和又遣寨主髙延徳詣延州與范仲淹約言仲淹不敢聞於朝廷乃自爲書諭以逆順二月辛巳夏竦乞早差近上臣僚監督鄜延一路進兵同入賊界免致落賊姦便詔以竦奏示仲淹陜西簽書經畧安撫判官田况言昨韓琦等畫攻守二䇿其守䇿最備可以施行不意朝廷便用攻䇿其不可者有七事乞召兩府大臣定議但令嚴設邉備若更有侵掠即須出兵邀擊或探得賊界謹自守備不必先有輕舉陜西經畧安撫副使韓琦言中夏之弱自古未有聞臣僚堅執守議以爲必勝之術者今其異議已阻師期且令諸路訓飭兵馬俟及秋初若范仲淹招懐未見其效則别命近臣以觀賊隙如須討擊便可進兵朝廷終難之元昊冦渭州韓琦命任福等禦于好水川戰敗福及耿傳桑懌王珪武英等死之方元昊傾國入冦而福所統皆非素撫循之師臨敵受命法制不立既又分出趍利故至甚敗是日西賊再冦劉璠堡詔京東西淮南兩浙江南東西荆湖南北路招置宣毅軍大州兩指揮小州一指揮爲就粮禁軍丙午京師雨藥三月任福等既敗朝議因欲悉罷諸路行營之號明示招納使賊驕怠仍密收兵深入討擊詔范仲淹體量士氣勇怯仲淹言任福已下皆邊上有名之将尚不能料賊今之所選往往不及更令深入禍未可量於是行營之號卒不罷兵亦不復出元昊始僣兵未動也朝廷即欲討之著作佐郎通判睦州張方平上言國家自景徳以來既與契丹盟天下忘備殆三十年矣若驟用兵必有䘮師蹶將之憂兵連民疲必有盗賊意外之患議者皆不謂然兵既交天下騷動方平又獻平戎十䇿宰相吕夷簡見之謂參知政事宋綬曰大科得人矣然不果用其䇿至是召對辛巳除集賢院尋遷太常丞知諌院夏四月辛巳降韓琦爲右司諫知秦州職如故任福軍敗琦即上章自劾諫官孫沔等請削琦官仍居舊職俾立後效㑹夏竦奏琦嘗以檄戒福見利輕進於福衣帶間得其檄上知福果違節度取敗罪不専在琦手詔慰撫之及是乃奪𤦺使權癸未降范仲淹爲户部員外郎知耀州職如故元昊爲書報仲淹辭益慢仲淹對使者焚其書大臣皆謂仲淹不當輙與元昊通書又不當輙焚其報宋庠因言於上曰仲淹可斬也杜衍曰仲淹本志盖忠於朝廷欲招納叛𦍑爾何可深罪上悟乃薄其責甲申以右諫議大夫陳執中爲同陜西都部署兼經畧安撫縁邊招討等使知永興軍仍詔夏竦判永興軍如故徙秦鳯副都部署曺琮爲陜西都部署兼經畧安撫沿邊招討副使五月左正言孫沔奏天聖之間多有内降景祐初元首革前弊澄清仕塗近歲已來此路復啟中有佞人得以希意伏望特發宸𠂻止絶内降如有合自中出之事令兩府及諸司依公埶奏沔累奏皆與大臣牾又薦田况歐陽脩張方平曽公亮蔡㐮王素可任諌官自代甲子沔罷爲提㸃兩浙路刑獄出内蔵庫緡錢一百萬助三司給陜西軍費辛未叅知政事宋庠守本官知揚州樞宻副使鄭戩加資政殿學士知杭州先是夷簡當國同列不敢預事獨庠數與爭論夷簡不悦上顧庠頗厚夷簡忌之巧求所以傾庠未得及范仲淹擅通書元昊又焚其報夷簡從容謂庠曰人臣無外交希文何敢如此庠以夷簡誠深罪仲淹也它日於上前議其事庠遽請斬仲淹庠謂夷簡必助已而夷簡終無一言上問夷簡夷簡徐曰杜衍之言是也止可薄責而已上從之庠遂倉皇失措論者喧然皆咎庠然不知實爲夷簡所賣也於是用朋黨事與戩俱罷知制誥王舉正爲叅知政事既入謝上曰卿恬於進取未嘗干朝廷以私故不次用卿知益州任中師知河南府任布並爲樞宻副使詔陜西經畧安撫招討使知永興軍夏竦屯鄜川同陜西經畧安撫招討使知永興軍陳執中知涇州時兩人議邊事不合故分任之壬申徙知耀州龍圖閣直學士范仲淹知慶州兼管勾環慶路部署司事初元昊隂誘屬羌爲助環慶酋長六百人約與賊爲鄉道後雖首露猶懐去就仲淹至部即奏行邊以詔書犒賞諸羌閲其人馬立條約諸羌受命悦服自是始爲漢用太常丞直集賢院簽書陜西經畧安撫判官田况上兵䇿十四事上嘉納之六月壬午改新知河中府范雍知永興軍初命夏竦判永興又以陳執中知永興及兩人分出按邊而領府事猶如故及復雍守京兆於是一府三守公吏奔趨往來不勝其擾自昔未嘗有也陜西體量安撫使王堯臣言范仲淹韓𤦺皆天下選其忠義智勇名動夷狄不宜以小故置散地由是忤宰相意并它議多格不行秋七月戊申朔出御製觀文鑒古圖記以示輔臣癸丑上謂輔臣曰古之良将皆能察士卒之好惡而同其甘苦故衆心親附切聞邊臣多執獨見偏禆之屬罕蒙聽納其宻諭朕意令将佐日夕博議軍政庻下情可通而士樂爲用也是月元昊冦麟府州八月荆湖南路轉運使王逵率民輸錢免役得緍錢三十萬進爲羡餘蒙奨詔由是他路競爲掊克欲以市恩上謂輔臣曰昨造一小殿禁中而有司不諭朕意過爲侈麗然不欲毁其成功今大相國寺方造殿蔵太宗御書寺額可遷置之因言朕内寝多以黄布爲茵褥吕夷簡等對曰陛下孝以奉先儉以率下雖聖人之盛徳孰加乎此元昊破寧逺寨寨主王世亶兵馬監押王顯死之又徙圍豐州乙未元昊䧟豐州知州王餘慶權兵馬監押孫吉三班借職侯秀死之九月知諫院張方平言羗賊叛命王師致討故授夏竦陜西招討等使四路軍政實節制之空國事邊於兹三歲師惟不出出則䘮敗冦惟不來來必得志安有權握大衆坐翫冦敵至於覆軍殺将蹙國損威而曰我不預知是安用名爲統帥也庚戌鄜延都鈴轄張亢爲并代鈐轄専管勾麟府軍馬公事時元昊引兵屯琉璃堡縱騎鈔麟府間亢始謀擊琉璃堡諜伏賊寨旁草中見老羗方炙羊脾占吉㓙驚曰明日當有急兵且趣避之皆笑曰漢兒方蔵頭股間何敢至此亢知無備夜引兵襲擊大破之壬子知永興軍范雍請於河東産鐵州軍鑄大錢以助陜西軍費從之戊午杖殺中書守當官周卞于都市坐於内降度僧敕内僞益童行三十四人也事既覺開封府止按餘人而不問堂吏知制誥富弼時紏察刑獄白執政請以吏付開封執政指其坐曰公即居此無爲近名弼正色不受其言曰必得吏乃止初劉徳從之妻遂國夫人者蒙正女也獲譴奪封既而有詔復封遂國弼繳還詞頭封命遂寝唐制惟給事中得封還詔書中書舍人繳還詞頭盖自弼始也乙亥詔天下立義倉自乾徳初置義倉未乆而罷明道二年詔議復之不果景祐中王琪上疏引隋唐故事請復置令五等已上户計夏秋二斗别輸一升事下有司㑹議者異同而止於是琪復上其議上納之已而衆論紛然遂詔第令上三等户輸粟㝷復罷之講義曰常平義倉均之為荒政良法也然義倉之置自乾徳始亦自乾徳而止自慶厯置亦自慶厯而罷何耶盖常平出於官義倉出於民出於官者官自歛之官自出之其弊也雖不足以利民亦不至於病民出於民者民實出之官實歛之其弊也不惟民無所出而官從而病之此祖宗之亟行亟罷非為一時慮也為異日慮也若夫常平之法自景徳祥符而始立固已纎悉曲盡撥上供以充之防擾民也𨽻司農而不屬三司防移用也沿邊分置慮其防遏糴也經二歳則以新易陳慮其有腐粟也減價而糶仍不得追本錢慮其失䧟糴本也加以仁祖之恭儉愛人其所積愈乆而愈多矣然孰知嘉祐常平之利民反而移為青苖取民之本歟冬十月甲午徙夏竦判河中府陳執中知陜州諫官張方平亦請罷竦統帥執中又言千里禀命非所以制勝於是兩人俱罷始分陜西為四路焉壬寅張方平言自元昊為冦三年雖常得逞而絶其俸賜禁關中市今賊中尺布可值錢數百以此揣賊情安得不困倘有悔心勢未能自通今因南郊大禮宜特推曠恩以示綏懐或特降一詔或著之赦文願陛下延召大臣商愚計而施行之上喜曰是吾心也命方平以䟽付中書吕夷簡讀之拱手曰公言及此社稷之福也十一月丙辰以京城榖貴發廩粟一百萬斛賤價出糶以濟貧民丙寅祀天地於圓丘大赦改元是月梁適自陜西還知慶州范仲淹附奏攻守二議十二月丁丑司天監上所脩崇天萬年厯己丑翰林學士王堯臣等上新脩崇文總目六十卷戊戌詔資政殿大學士自今定置兩員學士三員壬午慶厯二年春正月丁巳命翰林學士聶冠卿權知貢舉自元昊反軍興用度不足羽毛筋力膠漆鐵炭瓦木之類一切以鹽易之猾商與官吏爲姦至是詔復京師榷法知慶州范仲淹前奏攻守二議詔答以将帥累經挫衂若幸於或勝恐非良籌假令克獲又煩守備仲淹復奏曰議攻者謂守則示弱議守者謂攻必速禍今臣思之乃知攻有利害守有安危盖攻其逺者則害必至攻其近者則利必隨守以土兵則安守以東兵則危又覩赦文謂彼無騷動則我不侵掠臣願朝廷於守䇿之外更備攻術寧有備而不行豈當行而無備也且自古兵馬精勁西戎之所長也金帛阜富中國之所有也禮義之不可化干戈之不可取則當任其所有勝其所長臣前知越州每歲納税和買絹餘三十萬儻以啖戎是費一郡之入而息天下之弊也詔陜西諸路經略招討司叅議以聞二月丁丑召權御史中丞賈昌朝侍講邇英閣故事臺丞無在經筵者上以昌朝長於講説特召之契丹謀遣使致書求關南地知保州王果先購得其書藁以聞且言契丹潜與昊賊相結将必渝盟請預爲控守詔劄付河北安撫司宻脩邊備知制誥富弼言省試有三長殿試有三短唐武后始有殿試此何足法必慮恩歸有司宜使禮部次髙下以奏而引諸殿廷唱名賜第則與殿試無所異矣辛已詔罷殿試而翰林學士王堯臣同脩起居注梁適皆以爲祖宗故事不可遽廢越三日癸未詔復殿試如舊詔河北諸州强壮自三月後並赴州閲習委知州擇其强壮者刺手背爲義勇軍不願者釋之而存其籍以備守葺城池辛丑以新知澶州王徳用爲保靜軍節度使契丹将渝盟上起徳用於曺州入見上流涕言臣前被大罪陛下幸赦而不誅今不足辱命上慰勞曰今河北方警藉卿威名鎮撫爾又賜手詔以遣之即拜節度使三月乙丑上御崇政殿賜進士楊寘及諸科四百五十九人及第出身寘察弟初試國子監禮部皆第一及是啟封見姓名喜動於色公卿相賀爲得人通判穎州未至官持母䘮病羸卒己巳契丹遣劉六符來致書先是西兵乆不決六符以中國爲怯且厭兵因教其主聚兵幽薊聲言欲入冦及是先以書來求關南十縣正月己巳歴選可使北者宰相吕夷簡舉知制誥富弼入對便殿叩頭曰主憂臣辱臣不敢愛其死上爲動色壬申命弼爲接伴弼以二月丙子發京師辛未授弼禮部員外郎樞宻直學士将使弼報聘故也弼曰國家有患唯命是從不敢惮勞臣之職也奈何逆以官爵賂之固辭不受是春范仲淹廵邊至環州州屬羗隂連北爲邊患仲淹乃奏种世衡知環州以鎮撫之詔從仲淹所請有牛家族奴訛者倔强未嘗出聞世衡至遽郊迎世衡與約詰朝行其族是夕大雪深三尺左右曰地險不可往世衡曰吾方結諸羗以信不可失期遂縁險以進奴訛方卧帳中世衡蹙而起奴訛大驚率其族羅拜其後百餘帳皆自歸莫敢貳夏四月戊寅命權御史中丞賈昌朝右正言田况知諫院張方平入内都知張永和與權三司使姚仲孫同議裁減浮費吕中曰我仁祖天性恭儉必不妄興一役妄費一物又何待諸臣進節用之説葢我朝之財始蠧於天禧祥符再蠧於寳元慶厯自禱祠之事興宫室之役起内之帑蔵稍已空竭則省浮費之䇿不得不申明於天聖之年也自元昊叛於西契丹擾於北外之財用不免告匱則節冗費之説不得不條畫於慶厯之日也庚辰詔以右正言知制誥富弼爲囘謝契丹國信使西上閣門使符惟忠副之初虜書言太宗舉無名之師直抵幽薊一時莫知所荅拱辰獨請間曰河東之役本誅僣僞契丹遣使行在致誠欵已而冦石嶺關潜假人兵以援賊太宗怒其反覆既平繼元遂下令北征安得謂之無名上喜曰事本末乃如此因諭執政曰非拱辰詳識故事殆難答也補延州僧光信爲三班借職知青澗城种世衡言光信與西賊戰屢獲首級又言光信本姓王請賜名嵩仍乞權授一官故以命之時世衡既遣嵩入遼境間野利旺榮兄弟矣甲午徙知澶州王徳用爲真定府定州路都部署仍降詔諭以選任之意初劉六符見徳用於澶州喜曰聞公名乆乃幸見於此今歲大熟非公仁政所及邪徳用謝曰明天子在上固常多豐年因言已衰老中國多賢士大夫指坐客歴陳其家世六符竦聽庚戌河北都轉運使李昭述請脩澶州北城從之先是河决乆未塞昭述但以治隄爲名調農兵八萬逾旬而就劉六符過之真以爲治隄也及還而城具甚駭愕癸丑命知貝州供備庫使恩州團練使張茂實爲囘謝契丹國信副使代符惟忠也五月甲寅詔三館臣僚上封事及聽請對集賢校理歐陽脩上疏曰臣聞自古王者之治天下雖有憂勤之心而不知致理之要則心愈勞而事愈乖雖有納諫之明而無力行之果斷則言愈多而聽愈惑臣伏思聖心所甚憂而當今所最闕者不過曰無兵也無将也無財用也無禦戎之䇿也無可任之臣也此五者陛下憂其未有而臣謂今皆有之然陛下未得而用之者何哉曰朝廷有三大弊故也何謂三大弊一曰不謹號令二曰不明賞罰三曰不責功實大弊因循於上則萬事廢壊於下戊午建大名府爲北京景祐中范仲淹知開封建議城洛陽以備急難及契丹将渝盟言事者請從仲淹之請吕夷簡謂敵畏壮侮怯遽城洛陽亡以示威必長敵勢景徳之役非乗輿濟河則敵未易服也宜建都大名示将親征以伐其謀詔既下仲淹又言此可張虛聲爾未足恃也城洛陽既弗及請速脩京城議者多附仲淹議夷簡曰此囊瓦城郢計也使敵得渡河而固守京師天下殆矣故設備宜在河北卒建北京識者韙之己未以知天雄軍程琳知大名府兼北京留守司定州路都部署王徳用改判定州徳用至定州日教士卒習戰頃之皆可用契丹使人來覘或請捕殺之徳用曰被得其實以告是服人之兵以不戰也明日大閲於郊乃下令具糗粮聽吾鼓聲視吾旗所向覘者歸告契丹謂漢兵将大入既而復議和兵乃解六月甲戌出内蔵庫銀一百萬兩綢絹各一百萬疋下三司以給邊費秋七月壬寅朔知諫院張方平言朝廷政令之所出在中書若樞宻院則古無有也葢起於後唐權宜之制而事柄遂與中書均分軍民爲二體别文武爲兩途爲政多門自古所患乞斷自淵𠂻特廢樞宻院或併本院職事於中書丙午樞宻副使給事中任布罷爲工部侍郎知河陽戊午右僕射兼門下侍郎平章事吕夷簡判樞宻院户部侍郎章得象兼樞宻使樞宻使晏殊同平章事初富弼建議宰相兼權樞宻使上曰軍國之務當悉歸中書樞宻非古官然未欲遽廢故止令中書同議樞宻院事及張方平請廢樞宻院上乃追用弼議特降制命夷簡判院事而得象兼使殊加同平章事爲使如故大事記曰西事方興因富弼之言而以張士遜同議樞宻院北北方横因方平之言而以吕夷簡兼判樞宻院邉事孔棘則以相臣而謀兵政誰謂我朝之兵民不相知耶初富弼張茂實以結婚及増嵗幣二事往報契丹惟所擇及見北主弼曰兩朝人主父子繼好垂四十年一旦忽求割地何也北主曰南朝違約塞鴈門增塘水治城隍籍民兵此何意也羣臣競請舉兵寡人以為不若遣使求關南故地求之不得舉兵未晚也弼曰北朝忘章聖皇帝之大徳乎澶淵之役若從諸将之言北兵無得脱者且北朝與中國通好則人主専其利而臣下無所獲若用兵則利歸臣下而人主任其禍故北朝諸臣爭勸用兵者皆爲其身謀非國計也北主驚曰何謂也弼曰晉末帝時中國狹小上下離叛故契丹全師獨克今中國提封萬里所在精兵以萬計就使其勝所亡士馬羣臣當之歟抑人主當之歟若通好不絶歲幣盡歸人主臣下所得止奉使者歲一二人耳北主大悟首肯者乆之弼又曰塞鴈門者以備元昊也塘水始於何承矩事在通好前地卑水聚勢不得不增城隍皆脩舊民兵亦舊籍特補其缺耳非違約也晉髙祖以盧龍一道賂契丹周世宗復伐取關南皆異代事宋興已九十年若各欲求異代故地豈北朝之利乎既退六符謂弼曰吾主恥受金帛堅欲十縣如何弼曰南朝皇帝嘗言朕爲人子孫豈敢妄以祖宗故地與人且北朝欲得十縣不過利其租賦爾今以金帛代之亦足坐資國用朕念兩國生民不欲使之肝腦塗地若北朝必欲得地是志在背盟棄好朕獨能避用兵乎退而六符謂弼曰皇帝意甚感悟然金帛必不欲取惟結婚可議爾弼揣北欲婚意在多得金帛因曰南朝嫁公主故事資送不過十萬緡爾由是北結婚之意緩北主曰俟卿再至當擇一事授之宜遂以誓書來也弼還奏癸亥弼與茂實再以二事往於是吕夷簡傳帝㫖令弼草荅契丹書并誓書凡爲國書二誓書三弼奏於誓書内創增三事一兩界溏淀毋得開展二各不得添屯兵馬三不得停留逃亡弼因請錄副以行中使夜賫誓書追及弼於武强授之弼自念所增三事皆與契丹前約萬一書詞異同則北必疑乃宻啓副封觀之果如所料即遣其屬宋誠蔡挺詣中書白執政上亟召問乃詔弼三事但可口陳弼乃以禮物屬茂實疾馳至京師求對得入見曰執政固爲此欲致臣於死臣死不足惜奈國事何上急召吕夷簡等問之夷簡曰此誤爾當改正弼語益侵夷簡晏殊言夷簡決不肯爲此真恐誤爾弼怒曰殊奸邪黨夷簡以欺陛下遂詔王拱辰易書其夕弼宿學士院明日乃行八月丁卯御崇政殿䇿試才識兼茂明於體用科殿中丞錢明逸對䇿入第四等次以爲太常博士通判廬州明逸易子也戊寅策試武舉人九月辛丑孫甫爲祕閣校理杜衍所薦也衍守京兆辟甫爲司錄曰吾辟屬官得益友初命吕夷簡判樞宻院事既宣制黄霧四塞霾風終日朝論甚諠王舉正言判名太重不可不避也夷簡亦不敢當丙午夷簡改兼樞宻使富弼張茂實以八月乙未至契丹北主曰姻事使南朝骨月睽離固不若歲增金帛須於誓書中加一獻字弼曰南朝爲兄豈有兄獻於弟乎北主曰改爲納字如何弼曰亦不可虜主曰南朝既以厚幣與我納字何惜况古有之弼曰自古惟唐髙祖借兵於突厥故臣事之當時所遺或稱獻納亦不可知其後頡利爲太宗所擒豈復更有此禮北主度不可奪於是留歲增金帛二十萬誓書復遣耶律仁先劉六符賫其國誓書以來仍求納字乙巳弼等還至雄州詔即以弼爲接伴使弼奏曰彼求獻納二字臣既以死拒之北氣折矣不可復許然朝廷竟從晏殊議許稱納字弼不豫也講義曰前輩謂讀國史至富鄭公奉使一事未嘗不私㘦惓惓也方契丹擁重兵壓境使者之來詞意悖慢上命宰相擇所以報聘之人滿朝嘿嘿無敢行者獨鄭公毅然請往入對便殿忠激於心義形於色仁祖亦為之改容遂用為報聘使乃单車入不測之北庭詰其君折其口而服其心無一語少屈鄭公所以能為是者人皆謂其博洽多聞之功余獨有取於入對便殿之數語壮矣哉主憂臣辱臣不能愛其死之言凛凛乎與秋霜烈日爭嚴竊謂推是心也事求其必濟功求其必成雖鼎鑊在前而有所不避雖甘言重幣而有所不能誘鄭公惟能如是故其拒北主關南十縣之請却北主請婚公主之求請勿許北人獻納之二字皆往返辨論不啻數千百語具見於奉使錄之數篇至令契丹君臣曉然知通好用兵之所在伊公之力也嗚呼雖古之北使何以加諸乙丑耶律仁先劉六符入見時契丹實固惜盟好特為虚聲以動中國中國方困西兵宰相吕夷簡等持之不堅許與過厚北既歲得金帛五十萬因勒碑紀功擢劉六符極漢官之貴子孫重於國中閏九月庚辰復命富弼為吏部郎中樞宻直學士弼又固辭先是吕夷簡當國弼數論事侵之夷簡因薦弼使契丹變易國書欲因事罪之而弼受命不少辭自初奉使聞一女卒再奉使聞一男生皆不顧而行得家書不發而焚之曰徒亂人意爾以尹洙直集賢院洙奏今命令數更恩寵過溢賜予不節三者因循不革弊壊日甚癸巳涇原副都部署葛懐敏與元昊戰没於定川寨曹英李知和趙珣王保王文劉賀李岳張貴趙璘許思純李良臣楊遵姚奭董謙唐斌霍達皆遇害餘軍九千四百餘人馬六百餘匹悉䧟於賊自劉平敗於延州任福敗於鎮戎葛懐敏敗於渭州賊聲益震然所以復守巢穴者盖鄜延路屯兵六萬八千環慶路五萬涇原路七萬秦鳯路二萬七千有以牽制其勢故也冬十月丙午以右正言富弼爲翰林學士弼言於上曰增金幣與敵和非臣本志也特以朝廷方討元昊未暇與敵角故不敢以死爭爾功於何有而遽敢受賞乎願陛下益脩武備無忘國恥卒辭不拜敵既復脩和好有忌弼功髙妄指他事譛弼奉使不了乞斬於都市者上雖不聼而弼深畏恐故毎遷官輙力辭云辛亥以環慶路都部署經畧安撫范仲淹秦鳯路部署經畧安撫韓琦並爲鄜延路都部署經畧安撫龎籍爲左諫議大夫葛懐敏敗仲淹率衆六千由邠涇援之知賊已出寨乃還帝始聞定川事按圖謂左右曰若仲淹出援吾無慮矣奏至帝大喜曰吾固知仲淹可用亟加職進官甲寅以王堯臣爲涇原路安撫使始堯臣遷自陜西請先備涇原弗聽及葛懐敏敗上乃思其言故復遣堯臣往於是前所格議多見施行及任韓琦范仲淹爲統帥實自堯臣發之河東都轉運使文彦博爲龍圖閣直學士知渭州兼涇原路都部署經畧安撫沿邊招討使戊辰御史中丞賈昌朝上疏言太祖初有天下懲五代方鎮之盛盡收其權自此以來兵不復振昨西羌之叛驟擇将領鳩集士衆以屢易之将馭不練之士故戰必致敗此削方鎮兵權過甚之弊也方今備邊之尤切者凡六事其一曰馭将帥二曰復土兵三曰訓營卒四曰制戎狄五曰綏蕃部六曰明探候始昌朝館伴契丹使者朝議欲以金帛㗖契丹使攻元昊昌朝曰契丹許我而有功責報無窮且以我市於元昊昔尚結賛欲助唐討朱泚而陸贄以爲不可後乃知吐蕃隂與泚合今安知契丹計不出此邪於是命昌朝報使契丹昌朝力辭因奏此疏上嘉納之十一月復置陜西四路都部署經畧安撫兼沿邉招討使命韓琦范仲淹龎籍分領之仲淹與琦開府涇州而徙彦博帥秦宗諒帥慶皆從仲淹之請也甲申以處士孫復為試校書郎國子監直講復居太山學春秋著尊王發㣲十二篇石介而下皆以先生事介既為學官語人曰孫先生非隱者也於是范仲淹富弼皆言復有經術宜在朝廷故召用之吕中曰春秋之學前乎此凡例而已自孫太山治春秋明於諸侯大夫功罪以考時之盛衰推見王道之治亂而天下始知有春秋之義是雖窮理盡性全體大用未及於伊洛之精㣲然自孟子而下其有此學者此皆我祖宗培養之力也講義曰祖宗法度寛簡上之所以作成􅈭厲者有在於科目之外下之所以洗濯磨染者亦不盡出於程文之中故起孫明復於泰山而處之胄監師儒之地抜蘇洵於眉山而置之容臺禮閣之中起程頥於西洛而寘之廣厦細旃之上則其所以特出一二以聳動天下者何如哉此人才之所以盛也十二月壬戍知慶州滕宗諒言自定川䘮師朝廷命韓𤦺等都統四路則逐路帥臣當禀節制其官號不可同稱也遂詔韓琦范仲淹龎籍已帶四路招討使其諸路招討使副並罷宰相吕夷簡感風眩不能朝手詔拜司空平章軍國重事俟疾損三五日一入中書夷簡力辭復降手詔曰古謂鬚可療疾今剪以賜卿元昊之貴臣野利剛浪凌遇乞兄弟皆有材謀邊臣多以謀間之剛浪凌即旺榮也詐使浪理賞乞媚娘等三人詣青澗城請降种世衡知之曰與其殺此三人不若因此爲間命監商税出入有騎從又爲蠟書遣王嵩遺剛浪凌言浪理等已至朝廷知王有向漢心命爲夏州節度使旌節已至趣其歸附以棗及畫龜喻意剛浪凌得書大懼自所治執嵩歸元昊元昊頗疑剛浪凌貳已不得還所治且錮嵩穽中遣李文貴以剛浪凌㫖報世衡且言不逹所遺書意豈欲通和乎時世衡已去青澗城籍止文貴於青澗城數月賊果大敗葛懐敏於定川朝廷益厭兵籍乃自青澗城召文貴謂之曰汝王若誠能稱臣歸欵朝廷所以待汝王者禮數必優文貴頓首曰此固西人日夜之願也籍乃厚贐遣之元昊聞籍語大喜亟出嵩於穽厚禮之使與文貴偕來復持剛浪凌及其弟旺令嵬名懐卧譽諍等書抵籍議和大事記曰任一狄青而嶺南平抜青於行伍者執政龎公籍也擢一种世衡而西師㨗置世衡於幕府者參政范公仲淹也得一明鎬而貝州平薦明鎬以討賊者相臣文彦博也癸未慶厯三年春正月涇原安撫使王堯臣言至陜西見鄜延環慶路其地皆險固而易以守惟涇原則不然臣畧論一路五州軍城寨控扼要害及賊徑交通之處備禦輕重之䇿凡五事望下韓琦范仲淹相度施行從之辛卯詔陜西沿邊招討使韓琦范仲淹龎籍凡軍期中覆不及者皆便宜從事用王堯臣議也建渭州籠竿城爲徳順軍亦用堯臣議也初曹瑋開山外地置籠竿等四寨募弓箭手自守其後将帥失撫御衆怒遂刼徳勝寨主姚貴閉城門叛堯臣適過境上作書射城中諭以禍福且發近兵討之貴出降堯臣爲申明約束如瑋之舊癸巳延州言元昊遣賀從朂來納欵其書元昊自稱男邦泥定國兀卒郎霄上書父大宋皇帝龎籍乃具以聞且言虜辭稍順必誠有改事中國之心願聽從朂詣闕更選使者往申諭之彼必稱臣吕夷簡數求罷上優詔未許陜西轉運使孫沔上書言祖宗未嘗以言責人景祐以前綱紀未甚廢猶有感激進説之士觀今之政是可慟哭無一人爲陛下言者由宰相多忌而不爲正人地自夷簡當國黜忠言廢直道及出鎮許昌乃薦王隨陳堯佐代已又以張士遜冠台席此盖夷簡引不若已者爲自固之計欲使陛下復思已而召用也陛下果召夷簡入秉朝政於兹三年以姑息爲安以避謗爲智西州将帥累以敗聞契丹無厭乗此求賂兵殱貨悖天下空竭今夷簡以病求退陛下親冩徳音乃謂恨不移卿之疾在於朕躬四方義士傳聞詔語有泣下者夷簡在中書二十年三冠輔相所言無不聼所請無不行自有宋得君一人而已不知何以爲陛下報今契丹復盟西賊欵塞夷簡意謂四方已寧百度已正欲因病黙黙而去雖盡南山之竹不足書其罪也若薦賢才合公議猶可寛天下萬世之責茍遂容身不救前過以柔而易制者升爲腹心以姦而可使者任爲羽翼以謟侫爲君子以庸懦爲長者使之居廊廟布臺閣是張禹不獨生於漢而李林甫復見於今也書聞帝不之罪議者喜其謇切夷簡謂人曰元規藥石之言但恨聞此遲十年爾人亦服其量云吕中曰夷簡之罪莫大於因私憾而預瑤華之議因北事而忌富弼之能夷簡之功莫大於釋仲淹之宿怨容孫沔之直言君子論人功不揜罪罪不揜功可也二月己卯韓琦范仲淹等言元昊如大言過望爲不改僣號之請則有不可許者三如卑詞厚禮從兀卒之稱亦有大可防者三伏願陛下與執政大臣宻謀而深思之無令䧟虜計三月吕夷簡再辭位戊子罷相爲司徒軍國大事與中書樞宻院同議戸部侍郎平章事章得象加工部尚書樞宻使刑部尚書同平章事晏殊依前官平章事兼樞宻使判蔡州夏竦爲户部尚書充樞宻使權御史中丞賈昌朝爲参知政事知制誥富弼爲右諫議大夫樞宻副使弼辭不拜癸巳魚周詢為起居舍人王素為兵部員外郎歐陽脩爲太常丞並知諫院周詢固辭以余靖爲右正言諫院供職吕夷簡既罷相上遂欲更天下弊事故增諫官員首命素等爲之甲午樞宻副使右諫議大夫富弼改爲資政殿學士兼翰林侍讀學士弼時再上章辭所除官曰臣昨奉使契丹彼執政之官漢使所未見者臣皆見之兩朝使臣所諱言者臣皆言之以故得詳知其情状彼惟不來來則未易禦也願朝廷勿以既和而忽之臣今受賞彼一旦渝盟臣不惟蒙朝廷斧鉞之誅天下公論其謂臣何臣畏公論甚於斧鉞願收新命則中外之人必曰使臣不受賞則事未可知其於守備決不敢懈弛非臣務飾小廉誠恐悞國事也上察其意堅定特爲改命焉是月上令内侍宣諭韓琦范仲淹龎籍等候邊事稍寧當用卿等在兩地又令琦等宻奏可代處邉任者𤦺等言元昊雖約和誠僞未可知願盡力塞下不敢擬它人爲代夏四月甲辰以韓琦范仲淹並爲樞宻副使鄭戩爲陜西四路馬歩軍都部署兼經畧安撫招討等使琦仲淹凡五譲不許乃就道富弼言西冦未殄亦須藉材若二人俱來或恐缺事羣論皆願一名召來使處於内一名就授樞副之命且令在邊表裏相應事無不集以臣愚慮亦謂允當乙巳樞宻副使吏部侍郎杜衍依前官充樞宻使宣徽南院使忠武節度使夏竦赴本鎮先是以樞宻使召竦於蔡州臺諫交章論竦在陜西畏懦茍且元昊嘗牓塞下得竦首者予錢三千爲賊所輕如此卒於敗䘮師徒畧無成效㑹竦已至國門言者益急御史中丞王拱辰對上極言上未省遽起拱辰引上裾畢其説前後言者合十八疏上乃罷竦而用衍代之己酉著作佐郎館閣校勘蔡襄爲祕書丞知諫院初王素余靖歐陽脩除諫官㐮作詩賀之辭多勸激三人者以其詩薦於上尋有是命己未翰林學士兵部員外郎王堯臣為户部郎中權三司使事堯臣始受命言於上曰今國與民俱弊矣在陛下任臣者如何因請自擇僚屬上納其言堯臣果以治辦聞是嵗堯臣取陜西河東三路未用兵前及用兵後歲出入財用之數㑹計以聞以此推之軍興之費廣矣吕中曰錢榖之職非它官比國初為三司使者必選計相居之下而副使又下而判官至於子司之屬皆通知錢穀而後除當時三司皆得自擇僚屬三司缺則以副使補之副使缺則以判官代之判官缺則選外之轉運為之所以専其職也自元豐官制既行户部尚書即昔之三司使也左右曹侍郎即昔之三司副使也户部及諸司之郎官即昔之三司子司判官也然皆以為遷官之地簿書之弊猶不能救不過按其數而督之視其籍而支之况望其較諸道之有無制國用之多寡哉庚申鹽鐡判官吕紹寧為淮南轉運使紹寧亟上羡錢十萬諫官歐陽脩請却所上錢并治紹寧欺罔之罪以戒姦吏刻剥吕夷簡雖罷相猶以司徒預議軍國大事上寵遇之不衰於是諫官蔡㐮疏言夷簡謀身忘公養成天下今日之患執政以來屢貶言者或謫千里或抑數年或縁私恨假托人主威權以逐忠良以泄已怒見爲介特而自立者皆以好名希求富貴汙之當國之後山外之敗任福以下死者數萬人豐州之戰失地䘮師鎮戎之役葛懐敏以下死者又數萬人廟堂之上成算安在今以疾歸尚貪權勢或聞乞只令政府一兩人至家商議大事足驗夷簡退而不止之心也伏乞特罷商議軍國大事從之㐮又言伏見陜西路招討使韓琦范仲淹等各除樞宻副使並以西冦未寧懇辭恩命臣以物議言之二臣之忠勇其心一也若以才謀人望則仲淹出韓琦之右處内者謀之而處外者行之故仲淹冝來琦當留邊於理甚當其韓琦范仲淹伏乞朝廷不聽辭譲各授恩命是月太子中允國子監直講石介作慶厯聖徳詩龜鑑曰乾興以來維持公論收拾善類為冦之朋者抜茅類進為丁之朋者草蔓盡除斥丁謂罷馮拯逐王欽若而張士遜之進由曹利用既用而旋罷王曽以攻丁謂而相之李廸以異丁謂而召之張知白以嘗不阿欽若而亦擢之召宋綬召仲淹雖微而獻可亦被顯擢罷張耆罷夏竦雖大而夷簡亦解相位君子道長小人道消實惟其時而况邇英三十五事之書有曰進靜退求忠正無非所以辨君子有曰杜希㫖斥謟佞無非所以别小人髙若訥之不可用則目以不肖林瑀之貢佞則隨見屏逐察欽若之奸知安石之詐旌别淑慝瞭不可欺五月江淮歲漕不給京師乏軍儲樞宻副使范仲淹言國子博士許元可獨倚辦辛未擢元江淮兩浙荆湖制置發運判官元曰以六路七十二州之粟不能足京師者吾不信也至則命瀕江州縣留三月粮餘悉發之逺近以次相補引千餘艘轉漕而西未幾京師足食乙亥忻州言地大震上曰地道貴靜今數震摇得非兵興民勞之致乎宜詔本路轉運經畧司安䘏百姓毋得輙弛邊備先是諫官歐陽脩既受命首建議天下官吏員數極多朝廷無由徧知其賢愚善惡欲乙特立按察之法於内外朝官中自三丞以上至郎官中選强幹亷明者爲諸路按察使使至州縣遍見官吏其公亷勤幹明著實状及老病不才顯有不治之迹皆以朱書於名之下其中材之人别無竒效亦不至矌敗者以墨書之然朝廷重於特遣使未即行也参知政事賈昌朝前爲御史中丞嘗言轉運使朝廷責以按察官吏能否而使名未正於是参取脩議詔諸路轉運使副並兼按察使副提㸃刑獄雖不帶此使名並當準此辛巳上謂輔臣曰自春夏不雨歳時失望盖朕不徳所致但日於禁中蔬食精禱引咎而已朝廷細故朕與卿等未嘗不留意惟民間疾苦尤須省察有以利天下者在必行之卿等其務公心咨訪以荅天意丁亥置武學於武成王廟戊子雨輔臣稱賀上曰天乆不雨将害民田朕每焚香上禱於天昨夕寝殿中忽聞㣲雷遽起冠帶露立殿下須㬰雨至衣皆沾濕移刻雨霽再拜以謝方敢升階自此尚兾槁苖可救也比欲下詔罪已撤樂减膳又恐近於崇飾虚名不若夙夜精心宻禱爲佳爾講義曰讀文帝太宗紀則多災異讀武帝宣帝紀則多祥瑞然日食地震一旱三蝗不足以損文帝太宗之治而白麟赤鴈黄龍神爵亦何益於武帝之徳哉我朝之治莫盛於仁祖而災異之多惟仁皇之世為屢見惟我仁祖减膳撤樂旱而撤蓋雨而徒跣其禱祈之切至露立於壇陛其訓辭之切至移災於朕躬是以天鑒真誠民感其仁而慶厯之災異轉為四十二年之和氣王安石論仁宗之為君仰畏天俯畏人所以獲天助以王氏倡為祖宗不足法之説而仁宗之所以格於天者豈奸言之所能揜哉辛卯築欽天臺于禁中諫官歐陽脩言韓𤦺范仲淹乆在陜西備諳邊事是朝廷親信委任之人况二人才識不類常人其所見所言之事不同常式言事者陛下最宜加意訪問使其盡陳西邊事宜合如何處置韓琦范仲淹又言臣等切以天下郡邑牧宰爲重得其人則治失其人則召亂推擇之際不可不謹雖曽詔臣僚各舉所知或舉主非賢則多謬薦臣等欲乞聖慈特降詔書令中書樞宻院臣僚各於朝臣中薦堪充舉主者三人候奏到姓名即逐人各賜敕一道令於通判内舉成資已上一員充知州知縣内舉成資已上一員充通判簿尉中舉有出身三考已上無出身四考一員充職官知縣或於職官令錄中舉五考已上之人充京官知縣仍於敕明言所薦之人若将來顯有善政其舉主當議旌賞若贓汚不理苛刻害民並與同罪所貴生民受賜冦盗自息從之六月甲辰詔曰議者多言天下茶鹽礬鐡銅銀坑冶之有遺利朕懼開掊克之政常抑而弗宣慮有過取而傷民者轉運司其諭所部官吏條上利害以聞初議欲弛茶鹽之禁及减商税既而范仲淹以爲茶鹽商税之入但分減商賈之利爾於商賈未見有害也今國用未省歲入不可闕既不取之於山澤及商賈必取之於農與其害農孰若取之商賈今爲計莫若先省國用國用有餘當先寛賦役然後及商賈弛禁非所當先也其議遂寝己巳徙宣徽南院使忠武節度使夏竦判亳州竦既至亳州因上書自訟凡萬餘言詔付學士批荅孫抃爲之辭畧曰圖功效莫若罄忠勤弭謗言莫若脩行實竦見之甚恨御史中丞王拱辰請遇朔望日退御後殿召執政之臣賜坐以講時政得失上曰執政之臣朕早暮所與圖事者至於從容開述雖至中昃朕何怠焉又何朔望之拘也辛未詔自今中書樞宻院臣僚除常程奏事外如他有所陳或朕非時留對者不限時刻丙子給事中叅知政事王舉正爲禮部侍郎知許州初諫官歐陽脩余靖蔡㐮咸言范仲淹有宰輔才不冝局在兵府願以仲淹代之上從其請丁丑以樞宻使范仲淹爲叅知政事資政殿學士兼翰林侍讀學士富弼爲樞宻副使仲淹曰執政可由諫官而得乎固辭不拜弼直携誥命納於帝前力陳所以辭避之意且曰願陛下坐薪嘗膽不忘脩政上許焉乃復以誥命送中書弼因乞補外累章不許甲申樞宻副使任中師爲河東宣撫使范仲淹爲陜西宣撫使仲淹既辭叅知政事願與韓琦迭出行邊上因付以西事而仲淹又言河東亦當爲備中師嘗守并州上即命使河東兩人留京師第先移文兩路云乙酉元昊復遣吕你爲定幸捨寮黎罔聿􅅛與邵良佐俱來所要請凡十二事其欲稱男而不爲臣猶執前議也兩府厭兵欲姑從之獨韓琦以爲不可屢合對於上前晏殊曰衆議已同惟韓琦獨異上顧問琦琦歴陳其不便上曰更審議之及至中書𤦺持不可益堅殊變色而起歐陽脩言方今不羞屈志急欲就和者其人有五一曰不忠於陛下者欲急和二曰無識之人欲急和三曰姦邪之人欲急和四曰疲兵懦将欲急和五曰陜西之民欲急和四者皆不足聽也惟西民困乏意必望和請因宣撫使告以朝廷非不欲和而賊未遜順之意然後深戒有司寛其力役可也樞宻副使韓琦上疏當今所宜先行者七事條列以獻其大畧一曰清政本二曰念邉事三曰擢材賢四曰備河北五曰固河東六曰收民心七曰營洛邑繼又陳八事大畧謂當今救弊之術不過選将帥明按察豐財利抑僥倖進有能之吏退不才之官去冗食之人謹入官之路上嘉納之八月詔諌官日赴内朝先是知制誥田况言有唐兩省自諫議大夫至拾遺補闕共二十人每宰相奏事諫官隨而入有所缺失即時䂓正其實皆中書門下之屬官也今諫議大夫無復職業自司諫正言知諫院皆遺補之任而朝廷責其言如大夫之職矣而地勢不親位序不正在朝廷間與衆人同進退非所以表顯而異其分也兼王素歐陽脩蔡㐮皆以他官知諫院居兩省之職而不得預其列於禮未便詔送兩制詳定學士承㫖丁度等乞今後比直龍圖閣及脩起居注例令日赴内朝從之况嘗面奏事論及政體帝頗以好名爲非意在遵守故常况退而著論上之其畧曰名者由實而生非徒好而至也堯舜三代之君非好名者而鴻烈休徳倬若日月不能纎晦者有實美而然也陛下倘奮乾剛明聽斷則有英睿之名行威令攝姦宄則有神武之名斥奢汰革風俗則有崇儉之名澄冗濫輕㑹歛則有廣愛之名悦亮直惡諛媚則有納諫之名務咨詢逹壅蔽則有勤政之名責功實抑僥倖則有求治之名今皆非之而不爲則天下何所望乎抑又聖賢之道曰名教忠誼之訓曰名節此羣臣諸儒所以尊輔朝廷紀綱人倫之大本也陛下從而非之則教化㣲節義廢集詬無恥之徒爭進而勸沮之方不行矣豈聖人率下之意耶己亥出内藏庫綢絹三百萬下三司以助經費用韓琦之言也丁未以樞宻副使范仲淹為叅知政事右諫議大夫富弼復為樞宻副使弼猶欲固辭㑹元昊使辭羣臣班紫宸殿門上俟弼綴樞宻院班乃坐且使宰臣章得象諭弼曰此朝廷特用非以使虜故也弼不得已乃受癸丑樞宻副使右諫議大夫韓琦為陜西宣撫使先是范仲淹及任中師分路宣撫踰月皆未行琦言于上曰賊請和無他則二人遥領宣撫事可矣彼若未副所望必乗忿盗邉當速遣仲淹河東則臣方壮可備奔走中師宿舊大臣毋勞徃也乃詔琦代仲淹宣撫陜西而中師卒不行九月上既擢任仲淹韓𤦺富弼等毎進見必以太平責之數令條奏當世務仲淹語人曰上用我至矣然有後先且革弊於乆安非朝夕可能也上爯賜手詔督促曰比以中外人望不次用卿等今琦暫徃陜西仲淹與弼宰臣章得象盡心國事毋或有所顧避其當世急務有可建明者悉為朕陳之既又開天章閣召對賜坐給筆札使疏於前仲淹弼皆皇恐避席退而列奏一曰明黜陟二曰抑僥倖三曰精貢舉四曰擇官長五曰均公田六曰厚農桑七曰脩武備八曰减徭役九曰覃恩信十曰重命令上方信向仲淹等悉用其説當著為令者皆以諸事畫一次第頒下獨府兵輔臣共以為不可而止大事記曰自李沆抑四方利害之奏所以積而為慶厯之緩勢自范仲淹天章閣一疏不盡行所以激而為熙寧之急政吾觀范仲淹之於慶厯亦猶安石之於熙寧也十事之奏慶厯三年九月也始於明黜陟終於重命令當時之言一一見用明黜陟之法則以十月壬戌行擇守長之法則以十月丙午行任子之法則以十一月丁亥行館職之法則以癸未行均公田之法以壬戌行貢舉之法以明年三月行减徭役之法以五月行其餘厚農桑覃恩信重命令悉用其説或著為令然行之未及一年而僥倖者多不悦矣司徒吕夷簡固請老戊辰授太尉致仕朝朔望及大朝㑹並綴中書門下班諫官歐陽脩言吕夷簡為陛下宰相而致四夷外侵百姓内困賢愚倒置綱紀大隳人臣大富貴夷簡享之而去天下大憂患留與陛下當之夷簡平生罪惡偶不發揚正賴陛下終始保全未汙斧鑕是陛下不負夷簡夷簡上負朝廷今雖陛下特推仁恩厚其禮數臣乞因其來譲便與寝罷賜知諫院王素三品服余靖歐陽脩蔡㐮五品服靣諭之曰卿等皆朕所自擇數論事無所避故有是賜㐮數求補外以便親養樞宻副使富弼曰諫臣不當逺去許給假迎親可也上許㐮歸寧而不許其罷甲申太白犯嵗星又犯太微左執法諫官余靖言風聞司天之奏乃以商洛羣盗便當其占臣歴觀漢晉隋志凡五星之變金火謂之罰星太白與金星相犯皆主兵䘮及饑其變乃出端門之右執法之測前志所占将有伏尸流血之變豈山澤小冦所能當之伏望陛下責躬脩徳以謝天變内宣慈愛以敦九族外選才良以安百姓與廊廟大臣叶忠慮善無怠於政則天下幸甚丙戌命史館檢討王洙集賢校理歐陽脩同編脩祖宗故事先是樞宻副使富弼言臣歴觀自古帝王理天下未有不以法制為首務法制立然後萬事有經而治道可必太祖創立法度太宗克紹前烈真宗謹守成憲近年紀綱甚紊隨事變更兩府執守便為成例施於天下咸以為非而朝廷安然奉行不思剗革臣今欲選官置局将三朝典故分明類聚編成一書置在兩府俾為模範上納其言故命靖等編脩弼緫領之明年九月書成分别事類凡九十六門二十卷先是叅知政事范仲淹言臣數日前靣奏三代帝王子孫綿逺蓋由積徳之深臣言陛下日脩至仁之徳下及民庻以感動天地此聖嗣無疆之本也今有劄子三道進呈内一道為議贖法事即乞降出二道乞不降出其一曰今來宫中人數幾多或供使有餘宜降詔㫖特令減放以遂物性其二曰乞出聖意以内帑物帛委邉臣漸次收贖䧟蕃漢户人口各還其家使父母子孫再得完聚至徳動天降祐王室書之史䇿光於後代歐陽脩言近日諸處盗賊縱横若不早圖恐難後悔臣計方今禦盗者不過四事一曰州郡置兵為備二曰選捕盗之官三曰明賞罰之法四曰去冗官用良吏以撫疲民使不起為盗臣曽建言方今彫殘公私困急全由官吏冗濫者多乞朝廷選差按察使紏舉年老病患贓汙不才四色之人並行澄汰莫若精選明幹朝臣十許人分行天下盡籍官吏能否坐而升黜之謹别條具冗官利害六條以明利博效速而可行不疑一去冗官則民之科率十分减九二不才之人為害深於贓吏三内外一體若外官不澄則朝廷無由致治四去冗官則吏員清簡差遣通流五去冗官則中才之人可使勸懼六去冗官則不過朞月民受其賜此臣所謂及民速於事功者也冬十月丙午鹽鐵副使張昷之為河北都轉運按察使知諫院王素為淮南都轉運按察使鹽鐡判官沈邈為京東轉運按察使用富弼范仲淹等之言也先是仲淹弼等請詔一府通選轉運使如不足許權擢知州人既得人即委逐路自擇知州不任事者奏罷之令權擇通判人既已得人即委逐州自擇知縣縣令不任事者奏罷之令權擢幕職凡權入者必俟政績有聞一二年方真授之上既納其言於是昷之等首被兹選素入辭上謂曰卿今便去諫院事有未言者可盡言之丁未以右正言集賢校理余靖為契丹國賀正旦使入辭書所當奏事於笏各以一字為記凡數十字上顧見之指其字令一一條奏日幾昃乃罷甲寅復置諸路轉運判官仍詔中書樞宻院同選用壬戌詔曰自今兩地臣僚非有勲徳善狀不得非時進秩非次罷免者毋以轉官帶職為例兩省以上舊法四年一遷官今具履歴聽㫖京朝官磨勘年限有私罪及歴任嘗有贓罪先以情重輕及勤績與舉者敷奏聽㫖朝官遷員外郎須三年無私罪而有監司若清望官五人為保引乃磨勘遷郎中少卿監亦如之舉者數不足增二年遷大卿監諫議大夫弗為常例悉聽㫖又定制監物務入親民次升通判通判升知州皆用舉者數不足毋得關陞甲子陜西四路經畧安撫招討使鄭戩言順徳軍生户大王家族元寧等以水洛城來獻其地通秦州往來道路㝷遣靜邉寨主劉滬招集其酋長皆願納質子求補漢官今若就其地築城可得蕃兵三五萬人及弓箭手共捍西賊實為封疆之利從之十一月丙寅上清宫火㝷有詔以宫地為禁軍營先是諫官歐陽脩言臣伏見御史臺缺官近制令兩制并中丞輪次舉人遂致所舉多非其才不能稱職近聞梁適舉王礪燕度充臺官其人以適在姦邪之目各懐愧醜懼其汙染風聞皆欲不就以此言之舉官當先擇舉主仍見朝班中雖有好人多以資攷未及今乞不限資考惟擇才堪者為之况臺中自有裏行以待資淺之人仍乞重定舉官之法有不稱職者連坐舉主庻幾稱職可振綱紀癸酉太常博士李京殿中丞包拯並為監察御史裏行中丞王拱辰所薦也京趙人嘗知魏縣奉法嚴正吏不便欲以竒中京遂相率遁去監司果議以苛刻斥知府任布曰如此適墮吏計中京賴以免拯合淝人事父母以孝聞嘗知天長縣有訴盗割牛舌者拯使歸屠其牛鬻之既而又有告殺牛者拯曰何為割某家牛舌而又告之盗者驚伏徙知端州州嵗貢硯前守縁貢率取十倍以遺權貴人拯命製者才足貢數嵗滿不持一硯歸初羣盗剽刼淮南將過髙郵知州晁仲約度不能禦令富民出金帛具牛酒使人迎勞且厚遺之盗悦徑去不為暴事聞朝廷大怒樞宻副使冨弼議欲誅仲約以正法叅知政事范仲淹欲宥之爭於上前弼曰盗賊公行守臣不能戰不能守而使民醵錢遺之法所當誅也聞髙郵之民疾之欲食其肉不可釋也仲淹曰郡縣兵械足以戰守遇賊不禦而又賂之此法所當誅也而髙郵無兵器械雖仲約之義當勉力戰守然事有可恕戮之恐非法意也小民之情醵出財物而得免於殺掠理或喜之而云欲食其肉傳者過也上釋然從之仲約由此免死既而弼慍甚謂仲淹曰方今患法不舉舉法而多方沮之何以整衆仲淹宻告之曰祖宗以來未嘗輕殺臣下此盛徳之事奈何欲輕壊之且吾與君在此同僚之間同心者有幾雖上意亦未知所定也而輕導人主以誅戮臣下他日手滑雖吾輩亦未敢自保也弼終不以為然其後兩人不安於朝相繼出使弼還自河北及國門不許入未測上意比夜彷徨不能寐遶床歎曰范六丈聖人也癸未詔自今兩府及大兩省已上官不得陳乞子弟親戚館職并讀書之官進士三人已上一任囘無過犯者許進著述召試取優等者充丁亥詔曰今之䕃法推恩太廣以致踈宗蒙澤稚齒授官非所以審政重民也其著為令使夫冢嗣先錄以篤為後之體支子限年以明入官之重設考課之格立保任之條諸子孫須年過十五若弟姪年過二十必五服親乃得䕃已嘗䕃而物故者無子孫祿任聽再䕃自是任子之恩殺矣然猶未艾也吕中曰古者將用人之才必先養人之心後世雖用人之才亦徒富貴其人之身而已古者有教國子之法故凡嫡子皆可以繼世為郷而諸子之官又集其庻子而教之所以凡列王朝左右者無一而非可用之人也後世徒以一夫官爵之所至茍應法令則不限賢愚槩居禄仕未離髫齔已紆青紫以為恩則濫以為法則弊此仲淹所以欲抑僥倖此至道間所以欲世祿家自成均出仕也辛卯同脩起居注歐陽脩請自今後上殿臣􅒼退令少留殿門俟脩注官出靣錄聖語從之壬辰詔限職田自此人有定制土有定限吏以職田抵罪比前目稍稀闊焉司天監言五星皆在東方主中國大安十二月元昊又遣張延壽等來議事知諫院歐陽脩為右正言知制誥初中書召試而脩辭不赴特除之陜西宣撫使韓𤦺言如聞脩生户所獻水洛城頗為未便其土功以百萬計又須正兵三四千人更歲積粮草始能屯守之况劉滬昨已降水洛城一帶生户諸小蕃族豈敢要阻是則雖無水洛之援官軍亦可徃來如朝廷未以為然乞選差親信中至涇原秦鳯路詢問文彦博尹洙狄青等蓋彦博洙青皆以為未便也戌午以南京府學為國子監庚申許廣州立學澧州獻瑞木有文曰太平之道諫官歐陽脩言方今西羗叛逆未平之患在前契丹驕悖蔵伏之禍在後一禍未滅一患已萌西則瀘戎南則湖嶺無一處無事實未見太平之象若使木文實是天生其文止曰太平之道其意可推也夫自古帝王致太平皆自有道得其道則太平失其道則危亂臣方今但見其失未見其得也指望太平漸生安佚則此瑞木乃悞事之妖木爾詔諸祥瑞不許進獻是歲河北降赤雪河東地震五六年不止諫官孫甫上疏曰赤雪者赤眚也人君舒緩之應舒則政事弛賞罰差百官廢職所以召亂也地震者隂之盛也隂之象臣也後宫也戎狄也三者不可過盛盛則隂為變而動矣陛下救舒緩之失莫若自主威福特出英斷救隂盛之變莫若外謹戎備内制後宫此應天之實也韓𤦺既至陜西屬歲大饑羣盗嘯聚商虢之郊張海郭邈山党君子范三李宗者為之渠率而光化軍宣毅叛卒五百餘人邵興為之長與上官珙戰珙死之琦㝷遣屬官乗傳徃商於料簡錢監役兵收集上官珙下散軍邵興被殺張海等相繼殱衂擒捕關輔遂安堵矣是冬大旱琦即選官分詣州縣發省倉以賑之所活凡二百五十四萬二千五百三十七人他州人數稱是選禁軍不堪征戰者停放一萬二千餘人後田况乞選諸路軍不堪戰者為廂軍云若謂兵驕乆一旦澄汰恐致亂則去年韓𤦺汰邉兵萬餘豈聞有亂者哉宋史全文卷八上欽定四庫全書宋史全文卷八下宋仁宗四甲申慶厯四年春正月戊辰詔罷脩水洛城從韓𤦺奏請也然劉滬時已興役鄭戩又遣著作佐郎董士亷將兵助之矣辛卯太常禮院新脩太常新禮四十卷慶厯祀儀六十三卷二月丙申遣内侍賫奉宸庫銀三萬兩下陜西博糴糓麥以濟饑民諫官孫甫言自昔之有天下者未嘗一日去兵雖然兵無良將與去兵同祖宗朝養兵不多而取勝於夷夏者有良將也今日養兵多而未嘗勝者以無將也非無將也不知其才而任之也其人可將千人而授以萬人欲不敗得乎今韓𤦺歴經畧招討部署之任最乆田况曾為經畧判官近皆還自陜西邉將之才無容不知請詔琦等條四路將臣能否為上中下三等其最下者黜之庻幾將帥得人而勝可取也乙巳以上清宫田園邸店賜國子監甲寅罷陜西四路都部署經畧安撫招討使復置逐路都部署經畧安撫招討使從韓琦之議也丙辰御迎陽門召輔臣觀畵其畵皆前代帝王美惡之迹可為䂓戒者因命天章閣侍講曾公亮講毛詩王洙讀祖宗聖政翰林侍讀學士丁度讀前漢書數刻乃罷自元昊反罷進講崇政殿説書趙師民上疏陳十五事一曰咨輔相二曰命將帥三曰簡侍從四曰擇守宰五曰治軍旅六曰脩邉防七曰求諫爭八曰延講誦九曰革貢舉十曰乆官政十一曰謹財用十二曰不遺年十三曰容誹謗十四曰除忌諱十五曰謹出令因獻勸講箴至是復命講讀經史范仲淹言竊見審官三班院并銓曹自祖宗以來條貫極多逐旋衝改乆不刪定主判臣􅒼卒難詳悉官員使臣莫知涯涘故私屬髙下頗害至公欲乞特降指揮選差臣僚就審官三班院并銓曹取索前後條例與上判官員同共㸔詳重行刪定畫一聞奏付中書樞宻院叅酌進呈别降敕命各令編成例䇿施行詔天章閣侍講曽公亮刪定審官三班院流内銓條貫三月丙寅遣内侍詣兩浙江淮祠廟祈雨丁卯天章閣侍講楊安國為直龍圖閣賜三品服崇政殿説書趙師民為天章閣侍講賜五品服初上謂輔臣曰安國師民乆侍經筵其行義淳質乃先朝崔遵度之比因以褒擢之同判登聞鼓院張堯佐提㸃開封府諸縣鎮公事諫官余靖言堯佐脩媛之世父進用不宜太遽頃者郭后之禍起於楊尚不可不監上曰朕豈以女謁進人蓋因臣􅒼論薦而後用爾如物議不允當更授一郡耳癸酉祠部郎中集賢校理錢仙芝貸命决配沙門島坐知秀州受枉法贓罪當死特貸之前兩浙轉運使王琪降知婺州兩浙轉運使邵節降知洪州並坐按發仙芝在諫官奏劾之後也甲戌命鹽鐵副使户部員外郎魚周詢宫苑使周惟徳徃陜西相度鑄錢及脩水洛城利害以聞先是韓琦以脩水洛城為不便鄭戩固請終役戩既改知永興命劉滬董士亷督役如故知渭州尹洙及涇原都部署狄青相繼論列以為脩城有害無利故遣周詢等行視洙檄滬士亷罷役不從洙怒命青追滬士亷欲以違節制斬之青械二人送順徳軍獄蕃部遂驚擾爭收積聚殺吏民為亂又詣周詢等訴周詢等具奏詔釋滬士亷令卒城之范仲淹等意欲復古勸學數言興學校本行實詔近臣議於是宋祁王拱辰張方平歐陽脩梅摯曽公亮王洙孫甫劉湜等合奏今教不本於學校士不察於鄉里則不能覈名實有司束以聲病學者專於記誦則不足盡人才此獻議者所共以為言也謹參考衆説擇其便於今者莫若使士皆土著而教之於學校則學者脩飭矣先䇿論則文詞者留心於治亂矣簡程式則閎博者得以騁矣問以大義則執經者不專於記誦矣乙亥詔州縣皆立學大事記曰興國雖賜白鹿洞九經天禧雖賜岳麓書院書祥符雖詔曲阜立學而其學猶未徧也於是詔天下諸州縣皆立學而胡翼之之學經義治事邉防水利各各有齋則取其學法著為學令而天下始知有體用之學本道使者選屬部官為教授不足取於鄉里宿學有道業者士須在學習業三百日乃聽預秋賦舊嘗充賦者百日而止試于州者相保任所禁有七曰隠憂匿服曰常犯刑責曰行虧孝弟有狀可指曰明觸憲法兩經贖罰或不經贖罰而為害鄉黨曰籍非本土假户冒名曰父母犯十惡四等以上罪曰工商雜類或嘗為僧道皆不得預進士試三場先䇿次論次詩賦通考為去取而罷貼經墨義士子通經術願對大義者試十道以曉析意義為通五通為中格三史科取其明史意而文理可采者明法科試斷案立甲乙罪合律令如法意文理優為上等己卯上於邇英閣出御書十三軸凡三十五事顧丁度等曰朕觀書之暇取臣僚上言及進對事目可施於治者書以分賜卿等度及曾公亮楊安國王洙等拜賜因請注釋其義帝許之壬子太子中允國子監直講石介直集賢院兼國子監直講樞宻副使韓琦乞召試詔特除之丙戌丁度等上答邇英聖問一卷帝覽之終篇指其中體大者六事付中書樞宻院令奉行之答聖問者即所釋前所賜三十五事也其序曰自古求治之主靡不欲興理道安邦國納忠正退姦邪廣聦明致功業然行此數事在明與威斷爾明則不惑威則善柄斷則能行緫是三者守而勿失非聖人孰能為之唐憲宗留心庻政宰臣陳説政要必曰卿等既為朕言之當須行之李絳對曰非知之艱行之惟艱臣等亦願陛下日與輔臣舉此事目推而行之無使唐之君臣専美前代也丁亥上謂輔臣曰朕每令講讀官敷經義于前未嘗令有諱避近講詩國風多刺譏亂世之事殊得以為監戒章得象對曰陛下留思六經能逺監前代興亡之迹此誠圖治之要也夏四月丁酉京西轉運按察使杜把為廣南西路轉運按察使兼安撫使諫官余靖言朝廷蓄養賢俊當如民家收積財貨平時先有營度至急乃得其用伏自去年以來陜西舉知州始用杜把三司擇判官則又用把京西多盗賊則又用把今兹蠻人作叛則又用把皆席未遑暖而即移之設使别路更有賊盗則將又移杜把無乃取笑四方乎伏望敕諭兩府大臣廣思博採天下賢才以應萬務無使臨事倉卒有乏才之歎則社稷之福戊戌上謂輔臣曰自昔小人多為朋黨亦有君子之黨乎范仲淹對曰臣在邉時見好戰者自為黨而怯戰者亦自為黨其在朝廷邪正之黨亦然唯聖心所察爾茍朋而為善於國家何害也初吕夷簡罷相夏竦授樞宻使復奪之代以杜衍同時進用富弼韓琦范仲淹在二府歐陽脩等為諫官石介作慶厯聖徳詩言進賢退姦之不易姦蓋斥夏竦也竦銜之而仲淹等皆脩素所厚善脩言事一意徑行畧不以形迹嫌疑顧避竦因與其黨造為黨論目衍仲淹及脩為黨人脩乃作朋黨論上之畧曰臣謂小人無朋惟君子則有之小人所好者利祿也所貪者貨財也當其同利之時暫相黨引以為朋者偽也及其見利而爭先或利盡而交疎則反相賊害君子則不然所守者道義所行者忠信所惜者名節以之脩身則同道而相益以之事國則同心而共濟終始如一此君子之朋也故為人君者當退小人之偽朋用君子之真朋則天下治矣於是為黨論者惡脩擿語其情狀至使内侍藍元震上疏言范仲淹歐陽脩尹洙余靖前日蔡㐮謂之四賢斥去未幾復還京師四賢得時遂引蔡㐮以為同列以國家爵祿為私恵膠固朋黨逓相提挈不過二三年布滿要路則悞朝迷國誰敢有言上終不之信也庚子度支判官李絢為京西轉運按察使時范雍知河南王舉正知許州任中師知陳州任布知河陽並二府舊臣絢皆以不才奏之居半歲召入脩起居注己酉監脩國史章得象上新脩國朝㑹要一百五十卷壬子判國子監王拱辰田况王洙余靖等言首善當自京師漢大學二百四十房千八百餘室生徒三萬人唐學舍亦千二百間今取才養士之法盛矣而國子監才二百楹制度狹小不足以容學者請以錫慶院為太學葺講殿備乗輿臨幸以潞王宫為錫慶院從之五月壬戌朔樞宻副使韓琦叅知政事范仲淹並對於崇政殿上四䇿其一曰西戎輙求通順實圖休息陛下當隆禮敦信以盟好為權宜選將練兵以攻守為實務此和䇿之得也其二曰乆守之計莫如蓄土兵彼或小至則使屬户蕃兵暨弓箭手與諸寨土兵共力禦之彼欲大舉則必先聞舉集之期我之次邉軍馬盡可駐於堅城以待敵之進退彼將進而無利退而有禍不三兩舉勢必敗亡此守䇿之得也其三曰元昊巢穴實在河外河外之兵懦而罕戰惟横山一帶蕃部人馬精勁我以堅城據之以精兵臨之彼既樂其土復逼以威必須歸附以圖自安元昊若失横山之勢可謂斷其右臂矣此攻䇿之得也其四曰臣等既以三䇿陳之又以北戎為憂請朝廷力行七事以防大患一宻為經畧二再議兵屯三專於選將四急於教戰五訓練義勇六脩京師外城七密定討伐之謀是日琦與仲淹指陳於上前數刻乃罷諫官余靖言竊聞大臣建議内有脩京城置府兵二事者昔魏侯恃險吳起以為失詞宣王料民山甫言其害政願陛下捨此二䇿别議逺圖之術二䇿竟不果行先是鄭戩奏脩水洛城乞令韓琦不預商量琦言臣任西邉又再任宣撫首尾五年又在涇原秦鳯兩路於水洛城事比它人知之甚詳輙陳所見利害凡十三條詔劄與魚周詢等而周詢及鄭戡已先具奏脩城之利且言水洛城今欲畢工惟女墻未完棄之誠可惜冝遂令訖役乃詔戡等卒城之壬申幸國子監謁至聖文宣王有司言舊儀止肅揖而上特再拜賜直講大理評事孫復五品服又幸昭烈武成王廟丙戌元昊始稱臣自號夏國主復遣尹與則楊守素來議事丁未開寳寺靈寳塔災諫官余靖言五行之占本是災變朝廷宜戒懼以答天意尋聞遣人於塔基掘到舊瘞舎利道路傳語舎利在内庭之時頗有光怪臣恐巧侫之人因此推為靈異再圖營造若言舍利能出光怪必有神靈所慿此妄言也且一塔不能自衛為火所毁又何福可庇於民哉伏乞指揮更不營造六月叅知政事范仲淹為陜西河東路宣撫使始仲淹以忤吕夷簡放逐者數年士大夫持二人曲直交指為朋黨及陜西用兵天子以仲淹士望所屬抜用䕶邉及夷簡罷召還倚以為治中外想望其功業而仲淹亦感激眷遇以天下為己任遂與富弼日夜謀慮興致太平然䂓模闊大論者以為難行及按察使多所舉劾人心不自安任子之恩薄磨勘之法宻僥倖者不便於是謗毁寖盛而朋黨之論滋不可解然仲淹弼守所議弗變先是石介奏記於弼責以行伊周之事夏竦怨介斥己又欲因是傾弼等乃使女奴隂習介書乆之習成遂改伊周曰伊霍而偽作介為弼撰廢立詔草飛語上聞帝雖不信而仲淹弼始恐懼不敢自安于朝皆請出按西北邉未許適有邉奏仲淹固請行乃使宣撫陜西河東龜鑑曰且朋黨之倡其萌於吕范交隙之時乎謂申公為小人邪争宸妃誕育之功而䘮為成禮當宮庭避災之頃而願望清光乃拜手疏八事如正朝綱塞邪徑禁賄賂斥佞壬真得大臣輔相之體而其大者釋仲淹之宿怨容孫沔之直言是未可以小人訾之也謂申公為君子邪敕有司不受臺諫夷簡倡之戒百官越職言事夷簡主之罷相之後宻表之頻奏内侍之隂結是失大臣進退之義而其大者因私憾而預瑶華之議因北事而忌富弼之能是未純於君子也仲淹之比肩聫事豈能帖帖阿附而為詭隨之態乎方其姑蘇召還正愜公議待制之除俾伸素藴而處鈞衡之地者思有以䧟之以侍臣噤其口以劇務撓其心然百官之圖四論之獻凜然生言者之氣大臣不堪遂以黨目之仲淹於是有鄱陽之行是行也李紘王質載酒徃餞而欲附黨以為幸歐陽脩余靖尹洙抗疏力爭而願同貶以為榮仲淹何慊哉以至韓琦救蔡㐮之詩程琳議黨人之謗若谷明君子之類此皆營救仲淹也惜夷簡之黨勝仲淹之黨不勝至使受知薦主方爾從坐同年進士又相繼出諸賢皆以朋黨逐矣至仲淹陜西召還稍愜公議日夜謀畫圖報主知然按察之令嚴磨勘之法宻未有愜僥倖者之意小人不悦再以黨論之仲淹於是復為陜西之行是行也身再去國䜛者益甚賈昌朝主王拱辰而逐益柔益柔仲淹所薦也錢明逸希得象而去富弼富弼仲淹所厚也陳執中因孫甫而去杜衍杜衍嘗為仲淹言也邸獄之起朋黨作仇一網之打私徙相慶雖歐陽公以去國之身懐不自已抗疏力言至謂羣邪相賀於内四夷相賀於外未嘗不忠於國者而大勢卒不可挽矣方仲淹始為夷簡黨目之所斥諸賢尚有左袒及仲淹再為夏竦黨論之所貶諸賢皆為倒戈蓋夏竦用心惨於夷簡此元瑜所以初是仲淹而復希執中也然嘗反覆史傳竊謂黨禍之作固小人之罪而希天子之風附君子之名不得盡辭其責故嘗妄為之説曰黨論之始倡蔡㐮賢不肖之詩激之也黨論之再作石介一䕫一契之詩激之也其後諸賢相繼斥逐又歐陽公邪正之論激之也何者負天下之令名非惟人情不堪造物亦不吾堪爾吾而以賢自處孰肯以不肖自名吾而以䕫契自許孰肯以大奸自辱吾而以公正自褒孰肯以邪曲自毁哉如必過為别白私自尊尚則人而不仁疾之已甚攻乎異端斯害也已安得不重為君子之禍孫復謂禍始於此仲淹謂恠鬼壊事韓琦亦謂天下事不可如此其亦有先見云耳唐自牛僧孺李宗閔對䇿至李徳裕朱崖之貶一報一復凡四十二年而後息我仁祖在位四十二年待遇臣下恩亦至矣夫豈無藥石以鍼砭之湯沐以櫛治之未幾雲開日出所廢之人尋即召用所罷之官隨已復職如范文正以忤申公而得貶其始也雖為之下朋比之詔及西事之興不惟宥其過而且至大用杜富歐余以邸獄而盡去始者所行之人雖盡廢黜而陳執中既罷之後諸賢復召而或畀之鈞衡或列於論思氣類相感竟不至傷吾保泰之和諸賢何憾哉甲寅上謂輔臣曰歲旱而飛蝗滋甚百姓何罪而罹此黙禱上帝願歸咎於𦕈躬章得象對曰聖言及此必有以上感天心矣戊午雨樞宻副使富弼言伏見朝廷以契丹發兵㑹元昊討呆家族路出河東境外疑是變詐臣前歲奉使契丹頗見情狀他時雖欲背盟自逞必冦河北第以河東為犄角之地而已伏乞陛下更令范仲淹相度且徃河東照管未宜調發時仲淹疑契丹入冦欲大發兵為備杜衍謂契丹必不來兵不可妄出仲淹爭議帝前詆衍語甚切仲淹嘗以父行事衍衍不以為恨既退仲淹猶力爭韓琦曰若爾則琦當請行不須朝廷一人一騎仲淹怒再求對首奏琦語然兵卒不發仲淹亦不以為忤也先是仲淹受命主西事弼主北事弼條上河北守禦䇿曰真宗澶淵之盟未為失䇿而所痛者當國大臣論和之後武備皆廢謂敵不敢背約謂邉不必豫防謂世常安謂兵永息西北二冦稔知朝廷作事如此於是隂相交結乗虚有謀契丹侵取燕薊以北拓抜自得靈夏以西其間所生豪英皆為其用得中國土地役中國人力稱中國位號方中國官屬任中國賢才讀中國書籍用中國車服行中國法令是二邉所為皆與中國等而又勁兵驍將長於中國豈可以上古之夷狄待二邉也謹具守禦十二䇿緫十三條是臣奉使契丹日於河北徃囘十餘次詢於沿邉土豪并内地故老博採叅較得之甚詳及於契丹議事又頗見其情狀以至稽求載籍質以時務用是裒聚撰述以副陛下委任之意望陛下令兩府㑹議可者速行之其不可者更相致詰而是正之秋七月癸亥詔以冬至有事於南郊羣臣毋得上表請加尊號癸未契丹遣耶律元衡來告將伐元昊其書畧曰元昊負中國當誅今議將兵臨戰或元昊乞稱臣幸無亟許其實納契丹降人契丹討之託中國為名也丙戌詔諸路轉運使副提㸃刑獄察所部知州軍知縣縣令有治狀者以名聞議旌擢之或不如所舉令御史臺劾奏並坐上書不實之罪從范仲淹奏請也八月辛卯令参知政事賈昌朝領天下農田范仲淹領刑法事有利害其悉條上甲午樞宻副使富弼為河北宣撫使其實弼不自安于朝欲出避䜛謗也乙未承㫖丁度學士王堯臣吳育宋祁知制誥孫抃張方平歐陽脩權中丞王拱辰侍御史知雜事沈邈等言中書樞宻院聚㕔召臣等宣示契丹來書并朝廷荅書臣等竊謂沮契丹而納元昊則未有素備之䇿絶元昊而從契丹又失綏懐之信莫若以大義而兩存之宜降詔與元昊言昨許再盟蓋因契丹有書來言彼是甥舅之親遂議開納今却知國中招誘契丹邉户虧甥舅事大之禮違朝廷納欵之本意當須復順契丹早除嫌隙則誓書封冊便可封還仍乞於契丹囘書中言已降詔與元昊若執迷不復則議絶未晩如此則於西人無斗絶之曲於北鄙無結怨之端戊戌右正言同脩起居注余靖為囘謝契丹使復書畧曰若以元昊於北朝失事大之體則自宜問罪或謂本朝以効順之故則不煩出師矧延州昨奏元昊已遣楊守素將誓文入界儻不依初約則猶可沮還如盡遵承則亦難却也右正言知制誥歐陽脩為河北都轉運按察使上諭脩曰勿為乆居計有事第言之脩對以諫官乃得風聞今在外使事有指越職罪也上曰事茍宜聞不可以中外為辭乙卯上謂輔臣曰如聞諸路轉運按察提㸃刑獄司發擿所部官吏細過務為苛刻使下無所措手足可降敕約束之先是監察御史劉湜言轉運使掎摭州縣苛束官吏人不得騁其才宜稍寛假包拯言諸道轉運使自兼按察及置判官以來并提㸃刑獄等體量部下官吏頗傷煩碎朝廷既降敕約束諸路按察使備載臺官所上之言歐陽脩奏曰臣自聞降此約束日夕憂嗟竊謂國家方此多事難了之時正當責人展効之際昨大選諸路按察之初兩府聚㕔數日皆為一時之極選凡被選之人亦各思宣力爭奮所長豈可頓為欺罔便狥私情皆由朝廷未知官吏為州縣大患而按察可以利民委任之意不堅故毁謗之言已入也所可惜者自差諸路按察今雖未有大效而老病昏昧之人望風而懼近日致仕者漸多州縣方欲澄清而朝廷自沮其事臣欲乞聖慈令兩府召臺官上言者至中書問其何路按察之人因挾私怨茍有迹狀乞下所司辨明若實無人乃是妄説其近降劄子乞賜抽還不使四方見朝廷自沮按察之權而為貪贜老繆之吏所快戊午詔自今除臺諫官毋得用見任輔臣所薦之人九月戊辰鄭州言吕夷簡卒自上初立太后臨朝十餘年内外無間天下晏然夷簡之功為多其後元昊反四方乆不用兵師出數敗契丹乗之遣使求關南地頗頼夷簡計畫選一時有名之臣報契丹經畧西夏二邉以寧然建募萬勝軍雜市井小人浮脆不任戰鬭用宗室補環衛官驟增俸賜又加遺契丹歲金繒二十萬當時不深計之至於後世費大而不可止夷簡當國柄最乆雖數為言者所詆帝眷倚不衰然所斥士旋復收用亦不終廢其於天下事屈伸舒卷動有操術後卒配食廟庭為世名相始王旦竒夷簡謂王曽曰君其善交之卒與曽並居相位庚午平章事兼樞密使晏殊罷為工部尚書知潁州殊初入相擢歐陽脩等為諫官既而苦其論事煩數或靣折之及脩出為河北都轉運使諫官奏留脩不許孫甫蔡㐮遂言章懿誕生聖躬為天下主而殊嘗被詔誌章懿墓沒而不言又奏論殊役官兵治僦舍以䂓利殊坐是絀然殊以章獻方臨朝故誌不敢斥言而所役兵乃輔臣例宣借者時以為非殊之罪甲申樞宻使吏部侍郎杜衍依前官平章事兼樞宻使衍務裁僥倖每内降恩率寝格不行積詔㫖至十數輙納帝前諫官歐陽脩對見帝曰外人知杜衍封還内降耶凡有求干朕毎以衍不可告之而止者多於所封還也右諫議大夫參知政事賈昌朝為工部侍郎充樞密使資政殿學士工部侍郎知青州陳執中為参知政事諫官蔡㐮孫甫等爭言執中剛愎不學若任以政天下不幸上不聽諫官爭不止上乃命中使齎敕告即青州賜之且諭意曰朕用卿舉朝皆以為不可朕不惑人言力用卿爾明日諫官上殿上作色迎謂之曰豈非論陳執中邪朕已召之矣諫官乃不敢言冬十月同脩起居注知諫院蔡㐮以老乞鄊郡己酉授右正言知福州㐮與孫甫俱論陳執中不可執政既不從於是兩人俱求出而㐮先得請時甫使契丹未還也國子監直講石介通判濮州富弼等出使䜛謗益甚介不自安遂求出也契丹夾山部落呆家族八百户歸元昊契丹主遂親至境上各據山嚴兵相待元昊奉巵酒為夀大合樂折箭為誓乃罷契丹夜以兵招元昊元昊有備大敗契丹主元昊縱其去尋復與契丹解仇如故十一月戊午朔司天言日當食不食甲子監進奏院劉巽大理評事蘇舜欽並除名勒停工部員外郎兼天章閣侍講史館檢討王洙落侍講檢討知濠州太常博士刁約通判海州殿中丞江休復監蔡州税殿中丞王益柔監復州税降太常博士周延雋為秘書丞太常丞章岷通判江州著作郎直集賢院同脩起居注吕溱知楚州殿中丞周延譲監宿州税校書郎館閣校勘宋敏求簽書集慶軍節度判官事將作監丞徐綬監汝州葉縣税先是杜衍范仲淹富弼等同執政多引用一時聞人欲更張庻事御史中丞王拱辰等不便其所為而舜欽仲淹所薦其妻又衍女少年能文章議論稍侵權貴進奏院祠神舜欽循前此用鬻故紙公錢召妓女間席㑹賓客拱辰亷得之諷其屬魚周詢劉元瑜等劾奏因欲摇動衍事下開封府治於是舜欽及巽俱坐自盗同時斥逐者多知名士世以為過薄而拱辰等方自喜曰吾一舉網盡矣獄事起樞宻副使韓琦言於上曰昨聞宦者操文符捕館職甚急衆聽紛駭舜欽一醉飽之過止可付之有司治之何至是陛下聖徳素仁厚獨自為是何也上悔見於色自仲淹等出使䜛者益深而益柔亦仲淹所薦拱辰既劾奏宋祁張方平又助之乃言益柔作傲歌罪當誅蓋欲因益柔以累仲淹也章得象無所可否賈昌朝隂主拱辰等議及輔臣進白琦獨言益柔少年狂語何足窮治天下大事固不少近臣同國休戚置此不言而攻一王益柔此其意有所在不特為傲歌可見也上悟稍寛之時兩府合班奏事琦必盡言事雖屬中書琦亦對上陳其實同列尤不悦上獨識之曰韓琦性直集賢校理彭乗同脩起居注吕溱既貶起居注缺中書擬人而乗在選中帝指乗曰此老儒也雅有恬退名無以易之己巳詔曰朕聞至治之世元凱共朝不為朋黨君明臣哲垂榮亡極朕昃食厲志庻幾治古而人務交遊家為激訐更相附離以沽聲譽至隂招賄賂陽託薦賢又按察將命者恣為苛刻屬文之人類亡體要自今委中書門下御史臺采察以聞范仲淹上表乞罷政事知邠州詔不允詔如天禧故事置諫官六員辛未太常博士錢明逸為右正言諫院供職壬午合祭天地于圜丘十二月乙未冊命元昊為夏國主更名曩霄丁酉詔州縣以先帝所賜七條相誨敕太常博士王翼西京治獄還賜五品服知諫院余靖言治獄而賜服外人知必以為翼深文重法能希陛下意以取此寵所損非細事也嘗有工部郎中吕寛以治獄賜對祈易章綬陛下諭之曰朕不欲鞫囚與人恩澤寛退以告臣臣嘗書之起居注陛下前日諭寛是則前日賜翼非予奪之間貴乎一體小人望風希進無所不至幸陛下每於事端抑其奔競請自今臣僚入對有輙求恩澤者令有司劾其罪從之環原之間屬羗有明珠滅臧康奴三族最大其北有二川交通西界宣撫使范仲淹議築古細腰城斷其路於是檄知環州种世衡與知原州蒋偕共幹其事城成而世衡卒世衡在邉數年積糓通貨所至不煩縣官益兵增饋善撫士卒及卒羗酋朝夕臨者數日青澗及環人皆畫像祠之范仲淹復檄蒋偕築堡大蟲巉堡未完而為明珠滅臧伺間邀擊偕輙從間道遁歸伏庭下請死王素赦其罪令畢功乙酉慶厯五年春正月己巳三司言更造錫慶院乏材費多而北使錫宴之所不可闕詔復以太學為錫慶院如故别擇地建太學甲戌右正言祕閣校理孫甫為右司諫知鄧州先是甫言陳執中不效數請補外不許帝嘗問丁度用人以資與才孰先度對曰承平宜用資邉事未平宜用才甫又劾奏度因對求大用請屬吏上諭輔臣曰度在侍從十五年數論天下事顧未嘗及私甫安從得是語甫自契丹還亟命出守度侍經筵歲乆上每以學士呼之而不名嘗問蓍龜占應之事乃對卜筮雖聖人所為要之一技而已不若以古之治亂為監也罷河東陜西諸路招討使乙亥復置言事御史以殿中侍御史梅摯監察御史李京為之唐制御史不專言職故天禧初始置言事御史六員其後乆不除至是以諫官員不足復除之丙子契丹遣使來告討夏人囘韓琦言朝廷已封冊夏國又契丹以西征囘來告當此之時若便謂太平無事則後必有大憂者三若以前日之患而慮及經逺則後必有大利者一契丹欲并呑夏人倉卒興師反成敗衂必恐自此交兵未已此誠朝廷養謀觀釁之時也若能内輯綱紀外練將卒休息民力蓄斂財用以坐待二虜之弊則幽薊靈夏之地一舉而可圖乙酉参知政事范仲淹為資政殿學士知邠州兼陜西四路沿邉安撫使樞宻副使富弼為資政殿學士京東西路安撫使知鄆州仲淹弼既出使䜛者益甚獨杜衍左右之上頗感焉仲淹愈不自安因奏疏乞罷政事上欲聽其請章得象曰仲淹素有虚名今一請遽罷恐天下謂陛下輕絀賢臣不若且賜詔不允若仲淹即有謝表則是挾詐要君乃可罷也上從之仲淹果奉表謝上愈信得象言於是弼自河北還右正言錢明逸希得象等意言弼更張綱紀紛擾國經凡所推薦多挾朋黨疏奏即降詔罷仲淹弼陳執中在中書數與衍異議蔡㐮孫甫之乞出也事下中書甫本衍所舉用於是中書共為奏言諫院今闕人乞且留甫等供職既奏上頷之衍退歸即召吏出劄子令甫等供職吏執劄子詣執中執中曰向者上無明㫖吏還白衍衍取劄子壞焚之執中因譛衍曰衍黨錮二人茍欲其在諫院及臣覺其情遂壞焚劄子以滅迹懐姦不忠上入其言故與仲淹弼俱罷衍為宰相纔百二十日也丙戌平章事兼樞宻使杜衍罷為尚書左丞知兖州樞宻使賈昌朝平章事兼樞宻使宣徽南院使兼樞宻副使王貽永為樞宻使資政殿學士知鄆州宋庠為参知政事上既罷范仲淹問章得象誰可代者得象薦庠弟祁帝雅意屬庠乃復召用之翰林學士吳育為右諫議大夫龍圖閣直學士左諫議大夫知延州龎籍並為樞宻副使育初尹開封范仲淹在政府因白事數與仲淹迕既而仲淹安撫河東有奏請多為當國者所沮育取可行者固執行之先是田况言比來災咎頻仍蝗潦繼作觀當世之弊驗致災之由其實役歛重而民愁和氣傷而沴作役歛之重由國計之日窘國計之日窘由冗兵之日蕃宜分遣幹臣揀選諸路宣毅廣㨗等軍其不堪戰者並降為廂軍其廂軍之不堪役者並放停議者必曰兵驕乆一旦遽加澄汰則恐立以致亂此慮事者之踈也去年韓琦汰邉兵萬餘人豈聞有為亂者今天下財用不足以贍冗食之兵尚或顧䘏細故而不思救弊之源臣竊憂之二月戊子朔分遣内臣徃諸路選汰羸兵其諸州宣毅軍過三百人者無得更募用韓琦議也卒卯詔曰比京朝官因人保任始得叙遷朕念亷士或不能以自進其罷之時監察御史劉元瑜言近年考課之法自朝官至員外郎郎中少卿監須清望官五人保任方許磨勘適長奔競故降是詔磨勘保任之法實仲淹所建仲淹既絀故元瑜亟奏罷之知制誥余靖乞特降指揮應合奏䕃親屬臣􅒼所奏子孫弟姪特令不拘年甲以廣賞延之典從之戊戌講詩起雞鳴盡南山篇先是講官不欲講新臺帝謂曾公亮曰朕思為君之道善惡皆欲得聞况詩三百皆聖人所刪定存勸戒豈當有避也乃命自今講讀經史毋得輙遺兼侍御史知雜事趙及權判吏部流内銓初銓吏匿員闕與選人為市及奏闕至即牓之吏部牓闕自及始乙巳以馬軍都虞候公廨為太學三月戊午邇英閣講詩匪風篇曰誰能烹魚溉之釡鬵帝曰老子謂治大國若烹大鮮治小國若烹小鮮義與此同否丁度對曰烹魚煩則碎治民煩則散非聖學深逺何以見古人求治之意乎杜衍范仲淹富弼既罷樞宻副使韓琦上疏言陛下用杜衍為宰相方及一百二十日而罷范仲淹以夏人初附自乞保邉固亦有名至於富弼之出則所損甚大富弼大節難奪天與忠義昨契丹領大兵壓境命弼使北以正辯屈强北卒復和議忘身瘁事古人所難故近者李良臣自北來歸盛言北方自北主而下皆稱重之陛下兩命弼為樞宻副使皆弗有其功辭避不受逮抑令赴上則不顧毁譽動思振緝紀綱其志欲為陛下立萬世之業爾近日臣僚多務攻擊忠良取快私忿非是國家之福惟陛下乆而察之疏入不報而董士亷又詣闕訟水洛城事輔臣多主之琦不自安懇求補外辛酉琦罷樞宻副使知揚州丙子詔禮部貢院增天下解額己卯邇英閣講詩六月篇上曰此序自鹿鳴至菁菁者莪皆帝王常行之道或止當時事耶楊安國對曰昔幽王失道小雅盡廢四夷交侵中國道㣲先儒所以作此序為萬世監也於是上再令講之又詔補䕃選人自今祗令吏部流内銓候該参選日量試所習藝業注官其慶厯三年十一月條制勿行邇英閣讀漢書髙祖封韓信為齊王事上曰髙祖之從諫善用人不疑如此丁度對曰髙祖聦明大度故臣下得盡其誠不然何以基帝業也丙戌罷入粟授官是月歐陽脩上疏伏見杜衍韓琦范仲淹富弼等皆是陛下素所委任之臣一旦相繼而罷天下士皆素知其可用之賢而不聞其可罷之罪自古小人䜛害忠賢其識不逺欲廣䧟良善則不過指為朋黨欲搖動大臣則必須誣以專權其何故也善人少過難為一二求瑕惟指以為朋黨則可一時盡逐大臣不可以他事動摇惟有專權是人主之所惡故須此説方可傾之臣料杜衍等四人各無大過而一時盡逐必有朋黨專權之説上惑聖聦臣請詳言之杜衍為人清審而謹守䂓矩仲淹則恢廓自信而不疑韓琦則純正而質直富弼則明敏而果鋭四人為性既各不同雖皆歸於盡忠而其所見各異故於議事多不相從至如杜衍欲深罪滕宗諒仲淹力爭而寛之仲淹謂契丹必攻河東請急脩邉􅊀富弼料九事力言契丹必不來至如尹洙亦號仲淹之黨及爭水洛城事韓琦則是尹洙而非劉滬仲淹則是劉滬而非尹洙此數事尤為彰著陛下素己知者此四人者可謂公正之賢也平日閒居則相稱美之不暇為國議事則公言廷爭而無私以此而言臣見杜衍等真得漢史所謂忠臣有不和之節而小人䜛為朋黨誣矣陛下於千官百辟之中親選得此數人一旦罷去而使羣邪相賀於内四夷相賀於外此臣所以為陛下惜也疏入不報指脩為朋黨者益惡焉夏四月丁亥朔司天言日當食而隂晦不見宰臣率從官稱賀御史李京言自寶元初定㐮地震壓死者數萬人殆今十年震動不己豈非西北二邉有窺中國之意乎孟夏雷未發聲豈非號令之不信乎願陛下飭邉臣備夷狄戒輔臣謹出命以厭禍於未形上嘉納之壬辰邇英閣講詩小旻篇曰如彼泉流無淪胥以敗帝謂趙師民曰以水諭政其有指哉對曰水性順則通通則清逆故壅壅則敗喻用賢則王政通而世清用邪則王澤壅而世濁幽王失道絀正用邪正不勝邪雖有善人不能為治亦将相牽以淪於汙敗也丁未講詩至巷伯篇注有魯男子獨處之事帝曰嫌疑之際古人所謹此不著古人姓氏豈聖人特以設教邪戊申平章事兼樞宻使章得象罷為鎮安節度使同平章事判陳州得象在中書八年畏逺名勢宗黨親戚一切抑而不進然無所建明裏行孫抗數以為言而得象亦十二章請罷上乃許之平章事兼樞宻使賈昌朝加昭文館大學士監脩國史参知政事陳執中依前官平章事兼樞宻使庚戌樞宻副使吳育為叅知政事翰林學士承㫖兼中書舍人丁度為樞宻副使五月上封者多言諸路轉運判官競為苛刻己巳詔見任轉運判官歲滿者皆罷秋七月甲子監察御史包拯為契丹正旦使閣門通事舍人郭􅀈副之契丹館伴者謂拯等曰雄州新開便門乃欲誘納叛人以刺候疆事乎拯曰欲刺知北事自有正門何必便門也本朝豈嘗問涿州開門邪敵折不復言及拯使還具奏今邉上將帥尤在得人昔太祖經營四方選勇幹忠實者分控西北邉皆一任十餘年不遷卒獲其效今則不然蒞事未幾即圖遷徙又何暇於訓練備禦乎臣欲乞今後應沿邉要衝之處專委執政大臣精選素習邉事之人以為守將其代州尤不可輕授如得人責以實効雖有微累不令非次移替所貴軍民安其政令緩急不致敗事甲戌降河北都轉運按察使歐陽脩為知制誥知滁州九月甲辰徙江南東路轉運按察使楊紘知衡州紘嘗言不法之人不可貸如使肆貪殘於一郡一邑害良民千萬家不若去之不利一家爾聞者望風解去然竟坐苛刻下遷紘億從子為億後其為江東轉運按察使富弼所薦也冬十月辛酉祔章獻明肅皇后章懿皇后神主於太廟大赦天下諸路轉運使昨帶按察之名比聞過為煩苛吏不安職其並罷之時執政沮改范仲淹富弼所行事因肆赦遂有此命初議者請覃恩百官且優賜軍士叅知政事吳育曰無事而啓僥倖誰為陛下建此者請治之已而帝語輔臣曰外人怨執政宜防喧嘩育曰此必建議者欲以動搖上聽願毋慮臣既以身許國何憚此耶帝嘗遣中使察視山東盗賊還奏盗不足慮而言兖州杜衍鄆州富弼山東尤尊愛之此為可憂帝欲徙二人淮南育曰盜誠無足慮然小人乗時以傾大臣非國家之福議遂格辛未始班厯於夏國庚辰罷宰臣兼樞宻使又詔樞宻院凡軍國機要依舊同商議施行十一月樞宻院請自今進退管軍臣􅒼極邉長吏路分兵馬鈐轄以上並與宰臣同議從之辛卯詔京東路提㸃刑獄司體量石介存亡先是介受命通判濮州歸家待次病卒夏竦銜介甚且欲傾富弼㑹徐州狂人孔直温謀反搜其家得介書竦因言介實不死弼隂使入契丹謀起兵弼為内應故有是命時亦有詔下兖州勘介死虚實知州杜衍㑹官屬語之泰寧節度掌書記龔鼎臣獨曰介平生直諒寧有是耶願以合族保其必死衍竦然探懐中奏藁示之曰老夫既保介矣君年少見義必為安可量哉國子監直講孫復責監䖍州税孔直溫敗索其家得遺復詩故也甲午邇英閣講詩角弓篇上曰幽王不親九族以至於亡楊安國對曰冬至日陛下親燕宗室人人撫藉豈不廣骨月之愛也上又曰書載九族既睦平章百姓此帝堯之盛徳也朕甚慕之乙未邇英閣講詩都人士篇上曰古人冠服必稱其行今冠服或過之行未必如古人也又讀經武聖畧至真宗朝李繼和上言國初李漢超在關南以私錢貿易佐公用人或繩奏之大祖反令盡除所過稅上曰任人如此孰不盡力哉詔以邉事寧息盗賊衰止知鄆州富弼知青州張存並罷安撫使知邠州范仲淹罷陜西四路安撫使其實䜛者謂石介謀北弼將舉一路兵應之故也仲淹先引疾求解邉任是日改知鄧州丙戌慶厯六年春正月戊子知制誥王堯臣罷三司使為翰林學士承㫖堯臣主計凡三年前使姚仲孫借内蔵錢數百萬乆不能償堯臣悉按籍償之而軍國之費猶沛然有餘蓋未嘗加賦於民也益梓䕫三路轉運使皆乞增鹽井課歲可為錢十餘萬堯臣固不從上問其説對曰庸蜀僻逺恩澤鮮及而貢入常倍民力由此困朝廷既未有以恤之而又牟利焉是重困也上善其對已而言於上曰臣之術止於是矣且臣母老願解煩劇既罷上慰勞之堯臣頓首曰非臣之能惟陛下信用臣爾甲午命翰林學士孫抃權知貢舉二月癸丑司天監言日當食三月朔上謂輔臣曰日食之咎蓋天所以譴告人君願罪歸朕躬而無及臣庻也凡民之疾苦益思詢究而安利之三月辛巳朔日有食之庚寅登州地震岠嵎山摧自是震不己每歲震即海底有聲如雷壬寅御崇政殿賜進士賈黯等一百三十人及第一百九十人出身一百十七人同出身癸卯賜諸科及第并出身者四百十五人夏五月减卭州鹽井歲額緡錢一百萬川峽四路鹽課縣官之所仰給然井源或發或微而責課如舊任事者以為功往往貽患於後人朝廷切於除民疾苦有司上言輙為蠲减前後不可悉數六月丁巳流星出營室南大如柸其光燭地隱然有聲占曰兵出癸亥帝謂輔臣曰天之譴告人君使懼而脩徳亦猶人君知臣下之過先亦戒敕使得自新則不䧟於咎惡也賈昌朝等皆引咎再拜参知政事吳育與宰相賈昌朝不相能監察御史唐詢希昌朝意上奏曰賢良方正直言極諫茂材異等科由漢渉唐皆不常置若天見災異政有闕失則詔在位薦之請自今不與進士同時設科疏上帝刋其名付中書育奏疏駁之上是育言即詔禮部自今制科隨進士貢舉其著為令仍須近臣論薦毋得自舉上因諭輔臣曰彼上言者乞從内批以行今乃知欺罔也育又奏曰隂邪沮事正當明辨人臣言渉機宻欲歸徳於君成國之羙此類可以刋名付外制䇿天下公共廢置可以明述豈宜隂有沮革欲自上行此正姦罔所為願出姓名批敕以明國法育本由制䇿進上數稱其賢以為得人故詢力排詆意在育不在制科也秋七月三司使王拱辰言太祖時兵十二萬太宗時十八萬章聖時四十萬今過倍之兵在精不在衆冗散坐食非計也三司雖總財用大計而事實在外請諸道帥臣并任其責乙酉詔判大名府夏竦知并州鄭戩知永興軍程琳並兼本路計置粮草事丙申右正言知制誥知吉州余靖為将作少監分司南京許居韶州初靖為諫官嘗劾奏太常博士茹孝標不孝匿母䘮坐廢靖既失勢孝標因與知諫院錢明逸言靖少遊廣州犯法受笞㑹朝廷下廣州按得其實靖初名希古曲江主簿善遇之知韶州者疾主簿捃其罪唯得與靖接坐主簿既以違勅停任而靖受笞後乃更名取解他州及第案牘具在故有是命壬寅上謂宰相曰前日除李用和子璋為閣門副使今次子珣求為通事舍人朕已諭之曰朝廷爵賞所與天下共也儻戚里之家兄弟遷補如已欲朕何以待諸勲舊乎八月癸卯御崇政殿䇿試賢良方正能直言極諫太常博士錢彦逺及武舉人彦逺䇿入第四等彦逺易之子明逸之兄也宋興以來父子兄弟登制科者錢氏一家而已癸酉參知政事吳育為樞密副使丁度參知政事育在政府遇事敢言與宰相賈昌朝爭議上前殿中皆失色育論辯不已乃請曰臣所辯者職也顧力不勝願罷臣職因與度易位九月庚寅户部副使夏安期為陜西轉運使安期與諸路經畧安撫司議邉費凡奏省員及汰邉兵之不任役者五萬人時數有災異侍御史知雜事梅摯引洪範上變戒曰王省惟歲謂王總羣吏如歲兼四時有不順則省其職今日食於春地震於夏雨水於秋一歲而變及三時此天意以陛下省職未至而丁寧告戒也伊洛暴漲海水入台州浙江潰防黄河溢埽所謂水不潤下陛下宜責躬脩徳以囘上帝之眷佑隂不勝陽則災異衰止而盛徳日起矣冬十一月權御史中丞張方平權三司使河北鹽務在滄濵二州歲課凡千一百四十五名以給一路自開寳以來聽人貿易官收其筭歲為額十五萬緡王拱辰為三司使復建議悉𣙜二州鹽於是三司更立𣙜法而未下也方平見上問曰河北再𣙜鹽何也上曰始議立法非再也方平曰周世宗榷河北鹽犯輙處死世宗北伐父老遮道泣訴願以鹽課均之兩税錢而弛其禁世宗許之今兩税鹽錢是也豈非再𣙜乎上大悟曰卿語宰相立罷之方平曰法雖未下民已户知之當直以手詔罷之不可自有司出也上命方平宻撰手詔下之河朔父老相率拜迎於澶州為佛老㑹七日以報上恩且刻詔書北京其後父老過詔書下必流涕辛丑獵於城南東韓村是時道傍居民或畜狐兎鳬雉驅入場中上因謂輔臣曰畋獵所以訓武事非專務獲也悉令縱之丁亥慶厯七年春正月戊子尚書左丞知兖州杜衍為太子少師致仕時年方七十正旦日上表願還印綬宰相賈昌朝素不喜遽從其請議者謂衍故宰相一上表即得謝且位三少皆非故事蓋昌朝抑之也己亥慶厯編敕成凡十二卷别為總例一卷視天聖敕増五百條二月癸未詔求寛恤民力之事聽官吏驛置以聞上其副於轉運司利害明白者轉運司專行之癸巳詔曰自冬訖春旱暵未已朕惟災變之來應不虛發殆不敏不明以干上帝之怒與其降疾於人不若移災于朕中外臣􅒼指當世切務實封條上楊察進詔草以為未盡罪已之意令更為此詔乙未平章事賈昌朝罷判大名府河北安撫使樞宻副使吳育為給事中歸班昌朝與育數爭論帝前論者多不直昌朝時方閔雨昌朝引漢災異䇿免三公故事上表乞罷而中丞髙若訥言隂陽不和責在宰臣帝用其言即罷昌朝等尋復命育知許州判大名府夏竦充樞宻使故事文臣自使相除樞相必納節還舊官獨竦不然初降制召竦為宰相諫官御史言大臣和則政事修竦與陳執中論議素不合不可使共事越三日遂貼麻改命焉知益州文彦博為樞宻副使上議再畋近郊南城之役衛士不及整而歸以夜有雉隕於殿中諫者以為不祥是月乙亥詔将復出諫者甚衆詔罷出獵丙申詔羣臣無得以郊祀請加尊號丁酉改樞宻副使文彦博為參知政事右諫議大夫髙若訥為樞宻副使己亥賜侍講曾公亮三品服上御邇英閣靣賜之仍宣諭曰即講席賜卿所以尊寵儒臣也壬寅降宰臣陳執中為給事中參知政事宋庠為右諫議大夫工部侍郎丁度為中書舍人先是賈昌朝引漢故事乞罷相執中等復申前請於是各降官一等而輔政如故上之幸西太一宫也日方炎赫却蓋不御及還而雨是日大浹詔權停貢舉夏四月己酉内出詔曰前京東轉運使薛紳任部吏孔宗旦尚同徐程李思道等為耳目偵取州縣細過以滋刑獄䧟害人命時號四瞪前江東轉運使楊紘判官王綽提㸃刑獄王鼎皆亟疾苛察相尚時號三虎是豈稱朕忠厚愛人之意歟紘已降知衡州而紳等故在其降紳知陜州鼎知深州綽方居喪候服除日取㫖自今皆毋得用為監司宗旦等四人並與逺小處差遣綽益都人鼎沿子與紘三人者皆范仲淹所選用也天章閣待制侍講楊安國因講筵為上言三虎四瞪事故有是詔壬子御正殿復常膳仍賜二府喜雨詩丁卯上封者言諸路轉運司廣要出剰求媚於上以民輸賦税已是大半之賦又令加耗謂之潤官願陛下閲其奏目或有横加收歛名為出剰乞賜絀貶使民知陛下之意仍乞嚴行戒勵必然止絶上覽之曰古稱聚歛之臣甚於盗賊今如此掊歛與朕結怨於民也亟下詔止絶之講筵讀賈誼傳論三公三少皆天下端士與太子居處出入故少成若天性習慣如自然帝曰朕昔在東宫崔遵度張士遜馮元為師友此三人皆老成人至於遵度尤良師也五月己亥命翰林學士楊察除放天下欠負六月壬戌置北京留守司御史臺先是夏竦䜛言石介實不死富弼隂使入契丹謀起兵竦在樞府又䜛介説敵不從更為弼往登萊結金坑㐫惡數萬人欲作亂請發棺驗視朝廷復詔監司體量中使持詔至奉符提㸃刑獄吕居簡曰今破冢發棺而介實死則將柰何且喪𦵏非一家所能辦也必須衆乃濟若人人召問之茍無異説即令結罪保證亦可應詔矣中使曰善及還奏上意果釋秋八月丁未賜汝州龍興縣處士孔􅌈粟帛􅌈孔子四十六代孫隠居縣之龍山性孤潔喜讀書有田數百畆賦税常為鄉里先遇嵗饑分所餘周不足者聞人之善若出於己動止必依禮法環所居百里人皆愛慕之𦵏其父廬墓三年卧破棺中日食米一溢壁間生紫芝數十本州以行義聞故有是賜初置天章閣直學士位在龍圖閣直學士之下九月癸巳以北宅為廣親宅先是帝以秦王子孫衆多而所居隘狹乃命脩王欽若故第增益之冬十月太子太傅致仕李廸卒帝篆其墓碑曰遺直之碑又改廸所𦵏鄄城之鄉曰遺直鄉十一月戊戌祀天地於圜丘大赦是日貝州宣毅卒王則據城反僣號東平郡王十二月庚戌樞宻直學士明鎬為河北體量安撫使甲寅知滄州髙繼隆為東上閣門使知貝州三司使張方平言勘㑹陜西用兵以來内外所增置禁軍八百六十餘指揮約四十有餘萬人内馬軍一百二十餘指揮若馬數全足計六萬有餘匹其係三路保㨗振武宣毅武衛清邉蕃落等指揮并本道上兵連營仰給約二十餘萬人比屯駐戌兵當四十萬人又自慶厯三年以後增添給送西北銀絹内外文武冗官日更增廣所以三司經用不贍天下山澤之利茶鹽酒税比之先朝以前例皆大有增剰可謂無遺利也然有司調度交見匱乏直以支費數廣不量入以為出所致爾今禁兵之籍不啻百萬人坐而衣食無有解期七八年天下已困而中外恬然不知營救臣以不才謬當大計謹具大畧乞下中書樞密院審加圖議裁於聖斷變而通之戊子慶厯八年春正月辛未夏國主曩霄卒曩霄凡七娶五曰野利氏遇乞從女也㑹有告遇乞兄弟謀作亂曩霄遂族遇乞剛浪凌城逋等既而曩霄悔恨下令訪遺口得遇乞妻與之私通野利氏覺之乃出為尼號没蔵大師既娠而曩霄死没蔵大族也訛龎為之長訛龎曰夏自祖考以來父死子繼國人乃服今沒蔵尼娠先王之遺腹幸而生子則可以嗣先王矣遂立没蔵而偽號太后曩霄既死三月諒祚生丁丑參知政事文彦博為河北宣撫使本路體量安撫使樞密直學士明鎬副之鎬督諸將攻貝州城乆不下彦博乞身往破賊故遣彦博宣撫先是樞密使夏竦惡明鎬恐其成功輙從中沮之彦博因言軍事願得專行戊寅詔許彦博以便宜從事乙未日赤無光閏正月庚子朔文彦博夜選壯士二百銜枚由地道入賊衆驚潰王信捕得則詔以檻車送京師改貝州曰恩州丁未祠部員外郎祕閣校理張􅉞為兩浙轉運使瓌十年不磨勘遷官朝廷奬其退靜故用之戊申參知政事文彦博為禮部侍郎平章事右諫議大夫明鎬端明殿學士給事中辛酉崇政殿親從官顔秀郭逵王勝孫利等四人謀為變殺軍校刼兵仗登延和殿屋入至禁中焚宫簾斫傷内人臂其三人為宿衛兵所誅王勝者走匿宫城北樓經日乃得而捕者即支分之帶御器械王從善等五人皆外遷獨楊懐敏領職如故樞密使夏竦庇之也丙寅磔王則於都市二月癸酉楊懐敏落入内副都知復為左蔵庫使通州團練使滑州鈐轄始從御史之言也何郯擊懐敏尤力上諭郯曰古之諫臣嘗有碎首者卿能行此否郯對曰古者君不從諫故臣有碎首今陛下無諫不從何用如此若必碎首則美歸臣下而過在君上也上忻納之戊寅改新知荆南范仲淹復知鄧州仲淹在鄧二年鄧人愛之及徙荆南衆遮使者請留仲淹亦願留詔從其請三月甲寅幸龍圖天章閣出手詔賜輔臣曰間者西陲禦備天下繹騷雖常賦有增而經用不給加以承平寖乆仕進多門人浮政濫員多缺少又牧宰罕聞奏最將帥艱於稱職西北多故虜態難常獻竒譎空言者多陳悠乆實效者少思濟此務罔知所從悉為朕條畫之又詔翰林學士三司使知開封府御史中丞曰欲聞朕躬缺失左右朋邪中外險詐州郡暴虐法令非便民者及朝廷機事其悉以陳皆給筆札令即坐上對時樞宻使夏竦知執中不學少文故為帝謀意欲困執中也執中方力辭未許參知政事宋庠請至中書合議上對許之論者以庠為知體是日翰林學士張方平既退朝㑹鎻院草制方平即條對所問夜半與制書俱上曰臣昨在三司計㑹天下財用出入之籍及建隆以來兵數乞朝廷速加圖議望嚴令天下禁止招募命逐路轉運使提㸃刑獄分按所部揀選疲老便與放停若雖係禁軍其間羸弱惮於教閲願退就廂軍者亦聽從便臣曾勾當三班院在院使臣景祐中約計四千餘員今六千五百餘員臣勘㑹學士院兩省以上官景祐中四千餘員今六千餘員臣任御史中丞將本臺班簿㸃算景祐中京朝官不及二千八百員臣判流内銓取實在銓選人畢竟不知數目大約三員守一缺畧計萬餘人十年之間所增官數如此若更五七年後其將奈何每嵗入官之路徼倖攀援日生新例不可勝數澄源培本在陛下命令而己乞令中書樞密院各具逐年諸色入仕名目及人數取其僥倖弊濫尤甚者逐色别立條約稍加裁損臣聞先朝以前雖將相大臣之家子孫猶多白衣未仕者今自少卿監以上輙每歳任一人不亦過乎祖宗之時文武官不立磨勘年歲不為升遷資序有才用名實之人或從下位便見超擢無才用名實之人有守一官至十餘年不改轉者故當時人皆自勉非有勞効知不得進自祥符之後朝廷之議益循寛大故令自監當入知縣知縣入通判通判入知州皆以兩任為限又令守官及三年即例得磨勘先期行之人始知恩未見有弊及今歲年深乆習以為常皆謂本分合得無賢不肖莫知所勸願陛下稍革此制其應磨勘叙遷者必有勞績可褒或朝廷特敕擇官保任者即與轉遷其保任之法應須選擇清望有才識之人即命舉之如此則是委執政之臣舉清望官委清望官舉親民官官有缺員隨員數令舉又足以見聖恩急才愛民之意也至於將帥之任仍宜乆於其職祖宗任李漢超郭進賀惟忠李謙溥姚内斌董遵誨侯贇楊延昭等逺或二十年近猶八九年假之事權畧其細故不為間言輕有移易又不與髙官常令志有所未滿不怠於為善也今則不然武臣指邉郡謂之邉任借之為發身之地歴邉任者曽無寸勞薄効不數年徑至横行刺史防團亷察而又移換改易地形山川未及知軍員士伍未及識吏民土俗未及諳己復去矣願陛下鑒祖宗故事重爵賞以待功勞責乆任以觀能効亦馭將帥之一節也帝覽奏驚異詰旦更賜手札問詔所不及者方平即日復上對曰今兹聖心因昨保州恩州之變得無常以河北為意者乎臣曽勘㑹河朔廂禁軍僅二十萬人禁軍五之四然體問其中疲老不任徴役者甚多若朝廷密諭安撫部署及轉運使提㸃刑獄官此後一切且住招填令依常例旋行揀放頻作畨次揀選少作人數放停使由之而不知無得漏露朝㫖歲年後稍稍團併據所缺指揮發在京禁軍就逐州駐劄使其勢足與土兵相制庻乎置器於安也今兹聖心因昨衛士震驚宫省得無以親衛為意者乎國初循周制置諸班直備爪牙士屬殿前司置親從官屬皇城司然皆游惰無根蔕莫容其身者乃來應募前此變故卒生意外臣恐當有以懲創之若於諸班直中選其年勞乆次者至於東西下班殿侍有門閥家業者及諸軍中死事者之孤稍有材勝兵者嚴立保委之法選取千人以充殿内之衛仍領屬皇城司令樞密院殿前司立定選補格式歲月更代之法歲滿則優遷之願留者令皇城司保任委是壯愿謹良則聽留若其功過之准教習之法居處之制頒給之例即請自朝廷裁議臣聞太祖訓齊諸軍法制甚嚴軍人不得衣皂豈有紅紫之服葱韭不得入營門豈知魚肉之味每請月粮時營在城西者即於城東支營在城東者即於城西給須令自負以勞役之今則異矣臣嘗入朝見諸軍帥從卒一例新紫羅衫紅羅抱肚白綾袴絲鞋戴青紗帽拖長紳帶鮮華爛然計其所受廪給不足一身之費若有妻子爭得不饑凍此軍情所以易動也臣竊惟陛下御極於今且三十年甚盛之事所以感格天地結洽人心之深者以其至仁慈厚好生惡殺哀矜庻獄惟刑之恤也近因貝賊挾妖為亂州郡承風覺發妖事蔓延平民豈無姦人乗便創造疑似或挾讎怨更相攀引榜掠之下何求不獲臣惜陛下三十年甚盛功徳虧於一簣奈何輕用刑獄以危天下招致沴氣以速民怨者乎至於天下大勢臣請為陛下言之臣觀古今治亂之變不在其他只在上下之勢離合而已比年以來朝廷頗引輕險之人布之言路違道干譽利口為賢内則言事官外則按察官多發人閨門曖昧年歲深逺累經赦宥之事故自將相以下至於卿大夫士惴惴危恐莫有泰然而自安者願陛下深為留神務在通上下之情欲上下之情合在審於聽受而已上覽奏益異之書文儒二字以賜方平翰林侍讀學士葉清臣在永興條對其言多劘切權貴且曰陛下欲息奔競此繫中書若宰相裁抑奔競之流則風俗敦厚人知止足宰相用憸佞之士則貪榮冒進激成渾波向有職在筦庫日趨走時相之門入則取街談巷言以資耳目出則竊廟謨朝論以驚流輩一旦皆擢職司以酬所任比日人士競踵此風出入權要之家時有三尸五鬼之號乃列館職或置省曹臺諫官為天子耳目今則盡為宰相肘腋宰相所惡則捃以㣲瑕公行擊搏宰相所喜則從而唱和為之先容中書政令不平刑罰不當則箝口結舌未嘗敢言人主纎㣲過差或宫闈小事則極言過當用為訐直宋禧為御史勸陛下宫中畜犬設棘以為守衛削弱朝體取笑夷狄王逵兩為湖南轉運使所至苛虐誅剝百姓徒配無辜特以宰相故舊不次抜擢如此是長奔競也其他所列利害甚衆夏四月己巳朔封曩霄子諒祚為夏國主諒祚生甫三月諸將未和議者謂可因此時皆以節度使命諸將使各統所部可分弱其勢兾絶後患判延州程琳言幸人之喪非所以示夷狄不如因而撫之或請乗隙舉兵知慶州孫沔亦言伐喪非中國體上諾其言遂趣有司行冊禮然議者頗惜其失機㑹參知政事丁度罷為紫宸殿學士兼翰林侍讀學士給事中權三司使明鎬為參知政事文彦博自貝州入相數推鎬功故丁度罷而鎬代之詔科場舊條皆先朝所定宜一切無易時禮部貢院言祖宗以來得人不少考較文藝固有規程不須變更以長浮薄請並加舊制故降是詔初詔外州發解到省差官覆考尋罷之葢慮因此或致抑退寒士故也辛卯置河北四路安撫使命知大名眞定府瀛定州者領之韓琦知定州王拱辰知瀛州魚周詢知成徳軍先是賈昌朝判大名府兼河北安撫使矣初改文明殿學士為紫宸殿學士御史何郯言紫宸不可為官稱五月乙巳詔改舊延恩殿之名為觀文殿仍改紫宸殿學士為觀文殿學士御史何郯言伏見樞密使平章事夏竦其性邪其欲侈其學非而博其行偽而堅有纎人善柔之質無大臣鯁直之望事君不顧其節遇下不由其誠肆己之欺誣謂可以蔽明任己之側媚謂可以矯正犯紀律之所戒而不恥冒名教之所棄而無疑聚歛貨殖以逞貪恣不可格以亷恥之行比周權倖以圖進取不可語以忠正之方近者衛兵為亂突入宫掖而竦只縁管皇城司内臣楊懐敏素與交通曲為掩蔵欲以結納主憂於上而不為之恤民議於下而不知為非今懐敏既黜而竦獨留中外之心無不憤激伏望陛下上為社稷之謀下慰臣庻之望與衆永棄示人不私豈不盛哉豈不快哉辛酉夏竦罷樞宻使判河南府言者既數論夏竦姦邪㑹京師同日無雲而震者五上方坐便殿趣召翰林學士俄頃張方平至上謂曰夏竦姦邪以致天變如此亟草制出之方平請撰駁辭上意遽解曰且以均勞佚命之給事中參知政事宋庠充樞密使壬戌樞密副使左諫議大夫龎籍為參知政事六月壬辰帝語輔臣曰春夏乆雨朕日蔬食夙夜禱於上帝儻霖滛未止當去食啜水兾移災朕躬然不欲使外聞之嫌其近名耳宰臣文彦博對曰今景氣澄晏實聖徳感通也參知政事明鎬疽發背卒丙申司空致仕章得象卒初陜西軍興移用不足知商州皮仲容始獻議采洛南縣虢州青銅置二監以鑄錢既而陜西都運使張奎知永興軍范雍請鑄大錢與小錢兼行大錢一當小錢十及奎徙河東又鑄大鐡錢亦以一當十陜西復采儀州黄銅置監鑄大錢朝廷因敕江南鑄大銅錢而江池虢饒州又鑄小錢錢悉輦至關中數州錢雜行大約小銅錢三可鑄當十大銅錢一以故民間盗鑄者衆錢文大亂物價翔踊知并州鄭戩請河東鐡錢且以二當銅錢一又以三當一或以五當一是月翰林學士張方平宋祁御史中丞楊察與三司使葉清臣先上陜西錢議請以江南儀商州大銅錢一當小錢三又言姦人所為不鑄小鐡錢者以鑄大銅錢得利厚而官不禁若鑄大銅錢無利又將鑄小鐡錢以亂法請以小鐡錢三當銅錢一既而又請河東小鐡錢如陜西亦以三當一且罷官所置爐朝廷皆施用其言自是姦人稍無利其後詔商州罷鑄青黄銅錢又令陜西大銅錢大鐡錢皆一當二盗鑄乃止然令數變兵民耗於資用類多咨怨乆之始定秋七月詔河北水災其令州縣募饑民為兵冬十月丁亥屯田員外郎范祥提㸃陜西路刑獄兼制置解鹽祥先請變兩池鹽法故有是命使自推行之其法舊禁鹽地一切通商鹽入蜀者亦恣不問罷並邉九州軍入中芻粟第令入實錢以鹽償之視入錢州軍逺近及所指東南鹽第優其估東南鹽又聽入錢永興鳯翔河中歲課入錢總為鹽三十七萬五千大席授以要劵即池驗劵案數而出盡弛兵民輦運之役又以延環慶渭原保安鎮戎徳順地近烏白池姦人私以青鹽入塞侵利亂法乃募人入中池鹽予劵優其直還以池鹽償之以所入鹽官自出鬻禁人私售峻青鹽之禁行之數年猾商貪賈無所僥倖關内之民得安其業公私以為便云己亥作皇帝欽崇國祀之寳真宗嘗為昭受乾符之寳凡齋醮表章用焉及大内火寳焚命宰相陳執中書付有司别刻之十一月殿中侍御史何郯為禮部員外郎兼侍御史知雜事初䑓缺知雜執政欲進其黨上特用郯且諭郯曰卿不阿權勢故越次用卿詔河北水災民流離道路男女不能自存者聽人收養之後毋得復取其庸雇者自從私劵壬戌以畿内物價翔貴於新城外置十二場官出米裁其價以濟貧民時雨潦害稼壊隄防兩河間尤甚十二月乙丑徳音改明年元降天下囚罪一等徒以下釋之出内蔵錢帛賜三司貿粟以賑河北流民丙子詔三司河北沿邉州軍客人入中粮草改行四説之法每以一百貫為率在京支錢三十貫香藥象牙十五貫在外支鹽十貫茶四十貫初權發遣鹽鐡判官董沔言端拱淳化時祖宗北伐燕薊西討靈夏以至真宗朝二邉未和用兵數十年然猶帑蔵充實人民富庻何以致其然哉行三説入中之法爾自西人擾邉國用不足民力大匱得非廢三説之法邪請依舊行三説以救財用困乏之弊乃下三司議因言自見錢法行京師之錢入少出多慶厯七年𣙜貨務緡錢入百十九萬出二百七十六萬恐無以贍給請如沔議舊法每一百貫支見錢三十貫香藥象牙三十貫茶引四十貫至是加以向南末鹽為四説而行之宋史全文卷八下
