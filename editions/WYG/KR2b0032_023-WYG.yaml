body:
  text: 宋史全文卷二十三上宋髙宗十八庚辰紹興三十年春正月戊子吏部貟外郎虞允文面對論敵决敗盟異時為南牧之計必為五道出蜀口出荆襄止以兵相持淮東沮洳非用騎之地他日正兵必出淮西竒兵必出海道宜為之備上頗納其言癸巳詔諸州守臣闕貟可令六曹尚書侍郎翰林學士臺諫官正言已上各舉曾任通判資序公勤亷明治狀顯著可充郡守者二人尚書司封貟外郎鮑彪引年告老吏部郎官楊樸虞允文葉謙亨胡沂洪邁司勲郎官陳俊卿考功郎官陳棠等言彪篤學守道安於靜退甲科及第處選調二十年了無遺佚阨窮之嘆其博物洽聞可以備議論清介端慤可以表縉紳春秋雖多不見老人衰憊之態而勇退戒得陳義甚高望表而出之以勵士大夫之節制曰爾以經明行脩早擢上第壅閼不試幾二十年龎眉郎潜垂上清近今纔七十耳幡然上歸老之章爾之志决矣朕何忍閔勞以官職之事乎褒進文階華以命服且詔有司上其子若孫一人大夫其脩身守道以昌高年優游里閭以須三老五更之召可特授左奉議郎守尚書司封貟外郎賜緋魚袋致仕甲午雷作非時丙申尚書吏部侍郎葉義問同知樞密院事丁酉上曰昨見河朔有步擔米專欄猶於十里外收税况舟船之多其擾可知當嚴禁止之罷軍容班本殿前司樂工也先是御前置甲庫凡乗輿所須圖畫什物有司不能供者悉取於甲庫故百工技藝之精巧者皆聚於其間日費亡慮數百千禁中既有内酒庫而甲庫所釀尤勝以其餘酤賣頗侵户部贍軍諸庫課額以此軍儲常不足前一日吏部尚書張燾因對論甲庫萃工巧以蕩上心酤良醖以奪官課教坊樂工貟數日增俸給賜賚耗費不貲皆可罷上曰卿可謂責難於君明日罷甲庫諸局以酒庫歸有司減樂工數百人燾之從容補益皆此類也二月乙卯雪丁巳監察御史任文薦罷先是文薦為别試所監試有告舉人劉侯度呉漸傳義者文薦不依條扶出而移之簾前且以狀申都省詔給事中王睎亮密究其事二人皆避知舉官御史中丞朱倬親而文薦里人也於是詔與文薦外任甲子宰相湯思退陳康伯奏事畢樞密院官將退上留王綸葉義問同諭之曰朕有一事所當施行似不可緩普安郡王甚賢欲與差别卿等可議除少保使相仍封真王衆皆前賀綸義問退上曰朕久有此意深惟載籍之傳並后匹嫡兩政耦國亂之本也朕豈不知此苐恐顯仁皇后意所未欲故遲遲至今思退曰陛下春秋鼎盛上天鑒臨必生聖子為此以繫人心不可無也上復曰此事出於朕意非因臣下建明宰執退思退留身言適奉聖訓非古帝王所及上曰朕覽唐宣宗事羣臣有議及嗣儲者輒怒斥去可謂不達理矣於是普安郡王自育宫中至是已三十年而王天資英明豁達大度左右未嘗見喜愠之色趋朝就列進止皆有常度騎乗未嘗妄視平居服御儉約每以經史自適嘗語府僚曰聲色之事未嘗略以經意至于珠寳瑰異之物心所不好亦未嘗蓄之騎射翰墨皆絕人上嘗謂近臣曰卿亦見普安乎近來骨相一變非常人比也丁卯吏部尚書張燾充資政殿學士致仕時上欲用燾而燾以病疾力辭且言臣年齒已暮氣力已衰是用抗章乞賜骸骨今言愈切而寵彌厚懇愈力而位益崇儻恃鴻私不知退避高爵厚祿處之自如則是前後告老之辭悉皆僥僥進取之計要君罔上欺世盗名公議沸騰臣節掃地䟽入上察其誠乃有是命戊辰三省樞密院進呈普安郡王加官移鎮進封國名及宣制吉日上曰可便以為皇子此事朕志素定已九年矣顧外庭未知爾陳康伯曰聖慮高逺豈前代帝王所可跂及臣敢為天下賀上曰如恩平郡王璩亦與少恩禮令判大宗正事置司紹興府思退言立皇子當降詔及遣官告郊廟上可之甲戌内出手詔曰朕荷天祐序承列聖之丕基思所以垂裕於後夙夜不敢康永惟本支之重彊固王室親親尚賢厥有古義普安郡王瑗藝祖皇帝七世孫也自㓜鞠于宫闈嶷然不羣聦哲端重閱義有立亢于宗藩歴年滋多厥德用茂望實之懿中外所聞朕嘗考禮正名昭示天下夫立愛之道始於家邦自古帝王以此明人倫而厚風俗者也稽若前憲非朕敢私其以瑗為皇子仍改賜名瑋丙子制以皇子為寧國軍節度使開府儀同三司進封建王制既出朝士動色相慶中外大悦丁丑宰執入賀上曰昨日宣詔想見人心喜悦湯思退曰豈惟士夫雖閭巷細民無不鼓舞仰見睿謨英斷合天人之心如此上又與王綸等論淮上盗賊因曰自古銷盗賊之術無如輕徭薄賦綸曰陛下一語盡之矣昨罷㩁場南北之商棄物而逃困於道路無所得食漸至抄掠是時皆勸陛下嚴責州縣捕之陛下非惟不殺且給之裹糧使各歸業不久遂定上曰知此道者惟唐太宗綸曰貞觀之治庶幾三代者豈虛乎哉己卯詔滁州上供錢依濠州盱眙軍例更展免一年上優假淮民自休兵至今未嘗起税也三月辛巳詔自今除授館職並先召試學官依格選除議者言儒林冊府之官祖宗以來必試可而後授比年召用人才故事浸廢使州縣小吏皆有僥倖超躐之心望特命大臣舉行召試之典事下吏禮部議故有是㫖戊子上䇿試禮部舉人既而得右迪功郎許克昌克昌用故事降為第二遂賜梁克家等四百十二人及第出身同出身癸巳上謂大臣曰監司郡守所寄非輕須平日選擇有人望者以待有闕便可除用乙未樞密院進呈有劉頴者上書陳廣中利便五事上曰所言有益於公私者皆即行之惟結好南蠻其意不過欲誘説蕃商利其寳貨朕於此等物舉無所好何苦自擾假令設十觥飲酒酒味則一一觥足矣餘安用哉王綸曰不貴異物賤用物民乃足陛下了然與六經合故能托物指諭以曉臣下上亦誦不寳逺物則逺人格所寳惟賢則邇人安至再三而止丙午恩平郡王璩開府儀同三司判大宗正事置司紹興府始稱皇姪丁未上謂知樞密院事王綸曰璩昨日之除如何綸曰陛下春秋鼎盛已為宗社無窮之計今日談笑裁决略無難色上曰朕决此計已九年建王所佩玉魚乃置㩁場之初令買此玉以備今日之用舉此即可知矣夏四月乙卯祕書省校書郎兼權建王府教授史浩兼直講祕書省校書郎兼建王府教授魏志兼賛讀一日浩講周禮至酒正因言膳夫掌膳羞之事歲終則會惟王及后世子之膳羞不會至酒正所掌飲酒之事歲終則會惟王及后之飲酒不會而世子不與焉以是知世子之膳羞可以不會而世子之飲酒不可以無節也王作而謝曰敢不佩服斯訓丙辰參知政事賀允中兼同知樞密院事以葉義問使北也乙丑祕書省校書郎王十朋兼建王府小學教授先是教授入講堂則與皇孫叙賓主而教授居賓位十朋不可王特為之加禮而位教授於中五月辛巳上書玉堂二字賜翰林學士周麟之麟之奏依淳化故事就都堂宣示宰執仍以石本分賜侍從館閣官從之太尉知荆南府劉錡兼本府駐劄御前諸軍都統制先是領御前都指揮使職事楊存中建言諸重地如四川鄂渚池陽建康京口皆己宿兵嚴守獨荆南歴代用武之地今為重鎮而九江上流要害之地緩急不相應援請各置都統制以廣屯備朝廷從之荆南府江州剏軍自此始丙戌出内庫銀十萬兩下兩浙轉運司糴馬料大麥戊子賜江東轉運司銀七萬兩糴大麥二十萬斛辛卯參知政事賀允中免兼同知樞密院事以同知樞密院事葉義問將及境也初義問入北境見敵已聚兵有入冦意及還密奏敵人以剋剥不恤為能以殺戮不恕為威今欲遷汴京且造戰船敵人皆有深意以臣度之若果遷都則在彼已失巢穴今江淮既有師屯獨海道宜備臣謂土豪官軍不可雜處今欲於江海兩處分寨以土豪為寨主令隨其便使土豪撓於舟楫之間官兵扼於塘岸之口則官無虛費民無横擾此䇿之上者也兵部尚書楊椿言於右僕射陳康伯曰逆敵敗盟其兆己見今不先事為備悔將何及因與康伯䇿所以防慮之術康伯見上言敵謂我和好滋久而兵備弛其南牧無疑因條上兩淮守禦之計上嘉納之殿中侍御史汪澈亦條陳利害曰慮之有素則事至而安靜慮之無素則事至而倉卒靖康之變可為龜鑑龜鑑曰安石既去而珪確之行新法自若也子厚既去而曾布李清臣之紹述自若也主和誤國固檜之罪今檜往矣改圖可也而當國者執政如初是一檜死而一檜復生也紹興末年逆亮新立營汴久矣湯思退沈該之徒豈不知敵將有叛盟之志特恐和議敗則張浚之徒進而已復退此其用心是即秦檜之用心也張浚因星變求言而謂敵决於數年間求釁用兵當為之備是見幾之論也而二相笑以為狂且加竄斥至紹興二十九年孫道夫使敵回言敵將求釁於我未幾黄中再使回又言敵治汴兵矣不數日可至淮上而時宰且詰之曰沈少監歸不聞此言公安得為此而不之信王綸阿附妄言鄰國恭順和好無他而湯思退遽爾稱賀此正趙子砥所謂金人講和以用兵我國斂兵以待和也及至葉義問使還見敵已聚兵有入冦意於是右僕射陳康伯言敵謂我和滋久兵備弛其南牧無疑因條上兩淮守禦之䇿而遣將命帥始皇皇焉吁二十年講和之久張浚岳飛往矣解潜呉玠死不復生劉錡顯忠擯不復用意其頽敗廢棄之餘無復英鋭果敢之氣而一日分屯列戍四川則有王剛中襄陽則有呉拱江淮則有劉錡海道則有李寳蜀則有呉璘姚仲王彦江則有戚方王權李冠忠雲合響應氣勢翕張則知人心忠義雖更秦檜銷鑠之餘而亦不能使之泯没也是日大雨於潜臨安二邑山水暴至夜安吉縣洪水作居民屋廬多壞人死者甚衆後四日詔轉運司賑恤之其田决為溪者蠲其税丙申金國賀生辰使蕭榮副使張忠輔入見置酒垂拱殿時建王侍燕榮等望見聳然曰此為建王耶竟夕不敢仰視六月戊申宰執奏殿前司申明州水軍内福建秋廬延祥兩寨效用軍二年一替令到軍年餘方知紀律欲候滿日更留一年上曰瓜時而往及瓜而代二年一替軍人望之久矣今將及期而改是上失信而下失望也遂令更戍如期壬戌三司申明逃亡軍人首身之限上謂宰執曰朕始見此法未深曉其意使出人主一時恩宥人猶不測著為定法是教之逃也因顧王綸曰卿解之否葢不如此即此曹聚而為盗始知祖宗用意深逺上謂宰執曰歲方六月禾稼未登聞已催民間積欠可令諸處布案司徧下州縣候秋成月催理庶幾民不告乏處州麗水縣童子楊富老七歲䘮父哀慕不已夜則露臥塜前不避雨雪州上其事于朝詔賜束帛庚午知樞密院事王綸知福州秋七月乙未翰林學士周麟之言臣聞傳曰非天子不制度不議禮不考文切見吏部續降申明條册乃有頃年都省批狀指揮參於其間今遂與成法並行望令諸選具紹興二十五年以前指揮令敕令所看詳可削則削毋令與三尺混淆從之戊戌同知樞密院事葉義問進知樞密院事於是義問奏應變持久二説御史中丞朱倬參知政事翰林學士周麟之同知樞密院事庚子權工部侍郎黄中言御前軍噐所領屬中人其調度程品工部軍噐監有不得而聞者非祖宗正名建官之意請得𨽻屬稽考之詔工部毎季輪差官一貟檢察辛丑浙西諸司言知鹽官縣湖堅常治狀為一路之最詔特轉一官俟任滿日取㫖陞擢癸卯詔以郡守多闕令侍從兩省臺諫各舉嘗任通判治狀顯著者二人又趣郎官以上依新制舉縣令甲辰詔户部科降銀錢一百二十五萬緡令兩浙江湖六路轉運司置場市軍儲通去年已糴之數凑為三百萬碩八月丙午朔日有食之庚戌言者論諸州揀汰多不實上以問宰執朱倬曰近來指揮招填故揀汰甚易上曰老病不堪帶甲在軍蠶食則㨂汰之今皆緣請託以求脱去貟數猥多坐食諸郡無以贍之其間又有尚堪用者亦可惜乃詔委緫領所保明樞密院審實之壬子詔自今州縣官犯入已贓及用刑慘酷令刑部具失按察官姓名申尚書省取㫖即有隱蔽令御史劾之癸丑參知政事賀允中特轉一官致仕允中使北還言敵勢必背盟宜為之備上疑未决允中因告老乃有是命丙辰上諭宰執曰近有獻用車戰者朕以用在人不在車南北異宜木性亦異如大舟以茘枝為棹北方絕無而造車多用榆木南方亦少况江湖沮洳之地雖有車騎何所用卿更宜精思湯思退曰謹遵聖訓提舉兩浙西路常平茶鹽公事楊倓乞以私販敗獲之人配𨽻諸軍無使放縱上曰私販之禁非不嚴備第官司奉行失信耳朕聞私販多以大風雨夜用小舟破巨浪潜行般置巡尉素不諳熟豈肯冐不測之淵以冀賞給哉使所捕者皆此等輩當賞不踰時以示之信若其圖升合之利以為活亦可恕也户部乞申嚴徒配舊法行下上從之尚書右僕射提舉詳定一司敕令陳康伯上參附吏部敕令格式七十卷刑名疑難斷例二十二卷翌日上謂輔臣曰頃未立法加以續降太繁吏部無所遵承今當一切以三尺從事不可復令引例若更精擇長貳銓曹其清矣己未言者奏國家因陳亨伯建議始立經緫制錢多出於酒税頭子牙契錢自紹興十六年因李朝正上言專委通判拘収無何議者妄有申請始命知通同掌通判壓於長官之勢恣其侵用迄今九載歲虧二百餘萬緡望復委通判拘督從之甲子初資政殿學士張燾為吏部尚書奉詔舉兩浙西路兵馬都監武鉅可充將帥至是進呈上問鉅知書否湯思退曰鉅議論過人深達文義上曰武臣若知書方曉民事可令籍記俟邊郡有闕則命之壬申淮南東路馬步軍副都緫管許世安得諜報金主已至汴京重兵皆屯宿泗亦有至清河口者乃遣通判州事劉祖禮告急于朝廷九月丁亥詔申嚴銷金銅噐之禁時行在之人復有鬻二物於市者論者以為貴近導之乃令官司嚴切覺察己丑新淮南西路馬步軍副緫管兼知黄州李寳改添差兩浙西路副緫管平江府駐劄兼副提督海船時浙西及通州皆有海舟兵梢合萬人詔平江守臣朱翌提督言者請擇武臣有勇略知海道者副之乃有是命寳乞於沿江州縣招水軍效用千人詔許三百又請噐甲弓矢及乞鎮江軍中官兵曹洋等五十人自𨽻皆從之壬寅太學錄周必大太學正程大昌並為秘書省正字以學士院召試合格也舘職復故事召試自此始上覽必大䇿大善之諭輔臣他日當令掌制秘書省校書郎王十朋靣對言臣聞道路洶洶咸謂敵情叵測有巢穴汴都窺伺江淮意廟堂之上帷幄之臣必有料敵制勝之䇿然議者謂邊奏有警則羣臣失色相顧傳聞稍息則恬然便以為安且謂敵有内難勢必不來夫不恃我之有備而幸敵之有難謀國之術亦踈且殆矣今日禦戎之䇿莫急於用人用人之要莫先乎人望今内外士夫軍民口無異詞咸謂有天資忠義材兼文武可為將相者有長於用兵士卒樂為之用者今反投閑置散無地自效或老於為郡以泯没其身内為讒邪之所􅎱疾外為蠻夷之所竊笑天下輿清憤悶抑欝臣願陛下斷然為社稷計起而用之以從人望可以作士氣可以慰人心可以寢敵人之謀可以圖恢復之計禦戎之䇿莫大於此又言陛下比懲大臣之盜權収還威福之柄朝廷清明邇者衆口藉藉謂權雖歸於陛下政復出於多門是一秦檜死百秦檜生也其間最重者如三衙管軍輩與北司深交固結盗陛下之大權養成跋扈之勢今禍胎於内亂形於外臣竊憂之夫權之大者莫如名噐與財與兵今以管軍而位居三公是盗名噐之極古之時無有也祖宗之時無有也夫樞密號本兵之地號令節制天下之諸將今殿陛立班管軍傲然居前樞密甘心其後倒置如此其不奉行其意㫖者幾希其能節制號令之耶今臺諫言及侍從大臣隨即罷斥而風憲獨不行於管軍之門其何以為國耶至若清資横加於儈伍高爵濫及於醫門諸軍置承受福威自恣不減唐之監軍皇城置邏卒旁午察事甚於周之監謗内外將帥剥下賂上結怨於三軍道路之間捕人為卒結怨於百姓皆非治世事臣願陛下慨然發憤斷自宸𠂻杜邪枉之門塞僥倖之路不惟尊嚴朝廷亦所以保全此類自秦檜扼塞言路士風浸衰及上緫攬萬機激厲忠讜而餘習猶未殄朝士多務緘黙至是十朋與校書郎馮方正字胡憲王籥太常寺主薄李浩始因轉對相繼有所開陳聞者興起太學之士為五賢詩以述其事焉吏部侍郎沈介上封事曰臣切惟今日之慮莫若備敵之䇿為急顧今大患有二一曰國論不定二曰威令不行二患既除而後守之之䇿可得而言也守之之䇿其要有四一曰御將二曰訓兵三曰先聲以奪敵人之心四曰棄瑕以用度外之士四䇿既行勿奪於羣臣勿移於左右則社稷之危庶乎可安矣冬十月丁未起居舎人虞允文為賀大金正旦使知閣門事孟思恭副之允文至北庭與舘客者偕射一發中的君臣驚異監察御史劉珙守尚書吏部貟外郎珙前在銓曹時苦吏為姦思有以制之一日命張幕設案於庭置令式其中便選集者得出入繙閱與吏辨吏無得藏其巧人甚便之間攝侍郎引選人改官班占對詳敏上悅焉庚戌夜雷作非時辛酉殿中侍御史陳俊卿言任用人材乞略小過上謂大臣曰中間有顯過者若復進用却恐人言紛紛上又言贓汙之吏不可復用葢其天性貪墨使在州縣必難變革壬戌知荆南府劉錡充鎮江府駐劄御前諸軍都統制代劉寳也癸亥日方中天無雲而有雷時侍御史江澈等欲論左僕射湯思退殿中侍御史陳俊卿曰為相無物望而天災亟至此固當罷何以他為於是澈等相繼論之十一月庚辰殿中侍御史陳俊卿言比年江西湖廣米㪷纔數十錢而職田米乃令折價至三四千監司守倅利其豐於已而莫敢問如永之祁陽乃監司職田之所聚為縣令者惟於諸司職租不乏則薦削可盈不知斯民何辜而取其膏血以自媒也按令職田折錢而增直者計贓望今後只令納本色從之丙申福建路轉運副使王時升言到官纔一考樽節到浮費三十萬緍乞以其半代民輸舊欠鈔鹽錢執政言恐合旌賞上曰漕臣能節約妄用而代民輸理宜褒錄苐恐他路聞之妄認以為羡餘侵漁百姓可俟其政績有聞與陞職名後旬日乃徙時升兩浙轉運副使丁酉池州駐劄御前諸軍都統制李顯忠請令諸軍屯田上謂大臣曰此事可行然須先立規模如括田市牛立廬舎給糧種置農具之類悉有條理乃可施行兩三年間且盡與地利使之歲入有得則不勸而耕矣十二月乙巳朔守尚書左僕射同中書門下平章事湯思退罷為提舉江州太平興國宫尋落職初命臨安府印造會子許於城内外與銅錢並行至是權户部侍郎兼知府事錢端禮乞令左藏庫應支見錢並以㑹子分數品搭應副從之東南用會子自此始戊申知嚴州樊光逺奏三衙誘略近郡平民為軍乞自今軍丁不許取近遇有闕額均下諸州招填樞密院亦奏其弊且言三衙見管兵增過紹興二十六年元奏人數宰執進呈上曰兵不貴多當有限制今天下財賦十分之八耗於養兵朕躬行節儉未嘗一緍妄費而諸軍冗費豈可增添不已自今三衙令以見管兵帳為額在外諸軍亦與立為定額日下住罷上謂大臣曰朕頃見秦檜論除授必曰臣未知其心術如何恐招物議似未為確論朕謂果知其賢固當用之不然採之公論國人皆曰賢如何不用借使繆濫旋行罷黜亦惟公論但不容私意無不可也史臣曰爵位公器也是非賢不肖公論也採之公論而任以公器設有不如所任又從而去之在我無客心焉此宰相代天之義也奈何徇一已之私見以未知其心術而遽棄焉嘗觀趙鼎薦用臣僚後乃奏罷而上謂鼎非護短益以重之人曰張俊用趙哲曲端劉錫見其有過即加重譴其措置未為有失何得輕用言者以罪浚嗚呼檜之罔上而上察之鼎之盡公浚之無罪而上知之所謂明矣夜白氣如帶道東西亘天己酉太學博士鄭聞言太學補試弟子貟至五六千人望自今以舉人居本州縣學滿一年三試中選及不犯罰者州縣保明給據聽赴補試從之乙卯宰執奏累有臣僚論知縣庸懦不職上曰知縣若非贓私慘酷依祖宗朝與兩易其任不理違闕此良法也丙辰初直顯謨閣續觱以帶職故乞磨勘中奉大夫既許之矣起居郎兼權中書舎人楊邦弼言其非舊制封還錄黄丁巳進呈陳康伯奏此由秦檜放行王晌等三人致援例者衆實違令甲上曰檜不獨此一事放行且如禁軍換易亦改動祖宗格法朕無一事敢違舊章康伯曰當以邦弼所奏報行庶絕後來援例之弊上曰善庚申詔春秋三傳非係釋經處毋得出題以取士用右正言王進奏也丙寅上謂宰執曰比屢諭卿等逆田事須先立規摹如一夫受田多少以括到荒閑田充佃耕牛取於何地下至農具糧種廬舎之類當悉有條理方可行下兹大事也經始勿亟庶後來無更改之弊不可以一夫獻言遽即行之當博採物議而詳審之也庚午安南進馴象邊吏以聞上謂大臣曰蠻夷貢方物乃其職但朕不欲以異獸勞逺人可令帥臣詳諭今後不必以馴象入獻辛未右承務郎襲封衍聖公孔搢為右承奉郎搢年十九法未當磨勘吏部奏搢先聖之後特遷之是冬孝慈淵聖皇帝崩于朔庭年六十一辛巳紹興三十一年春正月甲戌朔日有食之上不受朝命權吏部侍郎李澗用牲于太社百司守職既而太史局言當交不虧詔勿賀丁丑雷發非時丁亥夜風雷雨雪交作人疑其異既而侍御史汪澈言春秋魯隱公大雷震電繼以雨雪孔子以八日之間再有大變謹而書之今一夕之間二異交至此陰盛也今臣下無姦萌戚属無乖剌而又無女謁之私意者殆為夷狄乎願陛下飭大臣常謹於備邊也殿中侍御史陳俊卿言震雷陽也雨雪陰也意者陽不能制陰故陰出而為害以類推之是夷狄包藏窺伺中國臣下驕恣翫習威權之象也可不懼乎庚寅上問宰執三朝國史何日可進陳康伯曰帝紀已成列傳未就上曰史官才難劉知幾謂必具才學識卿宜謹擇之上又曰頃有乞撰會要者湯思退不曾行會要乃祖宗故事之緫轄不可闕也但自元豐後續為之葢舊書分門極有法似不須革康伯曰謹遵聖訓甲午上與宰執論給舎繳駮事因曰祖宗所以置給舎正欲其拾遺補闕若緘黙不言豈設官之意然或探人主意及阿附大臣甚者至於不論臧否沽激取名此正仁廟裕陵之所戒也丙申大雨雪詔出内府錢賜三衙衛士凡九萬五千緡日予貧民之不能自存者三萬九千餘人又以内藏錢帛市薪炭賜之輔郡細民命常平官賑給諸路委監司决獄事史臣曰天人之應甚不逺也天大雨雪而上以仁民愛物為心不旋踵間其應如響是年冬虜嘗窺江欲禁出關潜遁者上惻然不許曰朕思維揚之擾至今追恨大哉帝王愛民之言天實臨之矣未幾逆亮以自斃聞噫誠於民而不違於天惟聖人能之己亥詔提舉江州太平興國宫張浚令湖南路任便居住時浚尚責居永州殿中侍御史陳俊卿間為上言浚忠義且兼資文武可付以閫外臣素不識浚雖聞其嘗失陜服散淮師而許國之心白首不渝今杜門念咎老而練事非前日浚也願陛下勿惑讒謗雖未付以大柄且與近郡以繫人心庶緩急可以相及上納其言詔衡州編管人胡銓與放逐便庚子詔浚運河命緫領淮東錢粮朱夏卿兩浙漕臣林安宅董視之壬寅詔館職續編元豐以來會要左正言王淮論魏安行抑賣官田詔安行罷江南東路轉運副使安行在江東急於受賞督迫州縣鬻田甚峻属邑一切望風知徽州洪适甫至官民競赴愬适曰賞可慕民獨不可愛耶乃戒属邑有虐吾民者必劾已而安行罷去民卒得寛是月金主亮令諸處統軍擇其精於射者得五千人分作五軍皆用茸絲聯甲紫茸為上黄茸青茸次之號硬軍亦曰細軍亮毎自詫曰取江南此五千人足矣二月丙午宰執進呈昨得㫖問儀鸞司換舊陳設有無收支上曰陳設不過享廟及大使至時用之何至一歲五易朕已令以新易舊仍據數收支矣上又曰朕宫中未嘗用此惟以儉為尚乃詔自今非破損勿易軍器監主薄楊民望言監司三弊一曰按吏徇其好惡以示威福二曰巡按以察州縣而一縣所費或至千緡三曰公使互送過於供給戊申詔卭州復置惠民監歲鑄鐵錢二萬緡為額内大小錢各半甲寅領殿前都指揮使職事楊存中為充醴泉觀使進封同安郡王奉朝請存中領殿巖幾三十年至是王十朋陳俊卿李浩相繼誦言存中之過上感其言存中聞北事有萌乃上疏言敵人年來規晝有異雖信好未渝而蛇豕荐食之心已露宜及未然於沿邊衝要之地置堡列戍峙糧聚財濱海沿江預具鬭艦至於選將帥繕甲兵謹關梁固疆塞明斥堠訓郡縣之卒募鄉閭之勇申戒吏士指授方略條為十事以獻會趙密謀奪其權因指為喜功生事存中聞其議乃累章丐免丙辰置行在會子務後𨽻都茶場悉視川錢法行之東南諸路凡上供軍需並同見錢仍分一千二千三千凡三等葢權户部侍郎錢端禮主行之仍賜左帑錢十萬緡為本初命徽州造會子紙其後造於成都辛酉詔侍從臺諫薦士各二人帥臣監司各一人癸亥封建王府夏氏為齊安郡夫人翟氏為咸安郡夫人給内中俸時王在藩邸左右嬪御不過數十人僅足以備使令一日出十餘人厚其資而遣之有一年少而俊麗者王雖竒之而亦竟不留常語官僚曰聲色之事未嘗略以經意至於寳貝珠玉侈靡竒異之物平生心所不好亦未嘗蓄之甲子上與宰執論薦舉人才因曰人材當用實可濟事者若高談闊論雖可觀然徒欲近名譬猶畫餅終不可食何益於事卿等宜審度之乙丑詔經義詩賦依舊分為兩科以取士先是議者願復經義詩賦分科之舊詔禮部國子監太學官看詳經久可行申尚書省至是權禮部侍郎金安節等奏依舊為兩科詩賦不得侵取經義分數若經義文理優長合格人有餘許將詩賦人才不足之數聽通融優取仍以十分為率毋得過主分自今年太學公補試為始於是行之至今中書言昨以僧徒冗濫令禮部權行住給度牒己經二十餘年望量行製造度牒立定價數分降諸路州軍詔禮部部措置户部乞毎料給降二千道毎道價錢五百千綾紙錢十千皆省陌兩浙州軍輸左藏庫江淮荆湖京西輸三緫領所江西湖南閩廣委逐路提刑司仍輸左藏願以金銀計直者聽從之是月觀文殿大學士致仕嘉國公秦熺薨于建康府詔贈太傅三月己卯右諫議大夫何溥為翰林學士兼權吏部尚書仍兼侍講先是溥嘗言君子小人和同比周之弊有曰同近於和而和實非同比近於周而周終不比世人之假同以為和託比以為周求濟於小已之私而卒貽天下之患臣須辨之於其早制之於其微使同與比之迹不形而和與周之實常著則朝廷正而百官正矣又言軍政之弊曰為將帥者不治兵而治財刻剥之政行而拊摩之恩絕市井之習成訓練之法壞二十年間被堅執鋭之士化為行商坐賈境用故事遣中使黄述賜扇帕于洪澤鎮景山等舉趾倨傲述與之對揖略不加禮又遣人量閘靣濶狹沿淮顧盼意若相視水靣者識者知其有敗盟之意甲申詔諸路監司失按属吏一歲及四人以上者令御史臺檢舉申朝廷議罰用殿中侍御史陳俊卿請也大理寺言獄空上謂宰執曰大理寺臨安府在闕下雖未敢謂刑措然獄訟清簡寃抑得伸亦庶幾焉惟是諸路憲臣或不得人則吏強官弱民無所措卿等宜思革此弊辛卯大金國賀生辰使高景山副使王全見于紫宸殿景山當奏事自稱語訥不能敷奏乞令副使王全代奏上許之景山招全全乃陞殿之東壁靣北厲聲奏奏訖降殿駕興全在殿下揚言曰我來理會者兩國事譊譊不已帶御器械李横約全曰不得無禮有事朝廷理會時百官班未退帶御器械劉炎白陳康伯曰使人在廷有茶酒之禮冝奏免之康伯曰君自奏聞炎遂轉屏風而入見上哭泣炎奏其事上然之炎出傳㫖曰今為聞淵聖皇帝訃音忽覺親躬不安閣門賜茶酒宜免使人且退班遂退宰執聚殿廬議舉哀之故或謂上不可以凶服見使者欲俟其去乃發䘮權工部侍郎黄中聞之馳白康伯曰此國家太事臣子至痛之節一有失禮謂天下後世何且使人問焉將何以對於是始議行禮及調兵守江淮之䇿壬辰宰執内殿奏事同知樞密院事周麟之言金人意可卜宜練甲申儆靜以觀變使不當遣上曰卿言是也彼欲割地今何以應之麟之曰講信之始分畫封圻故應有載書存願出以示使者厥請將自塞矣甲午宰執召三衙帥趙密成閔李捧及醴泉觀使楊存中至都堂議舉兵既又請侍從臺諫集議陳康伯傳上㫖云今日更不尚和與守直問戰當如何執政欲遣閔等將禁衛兵禦襄漢上流虞允文言敵必不從上流而下恐發禁衛則兵益少朝廷内虛異時無兵可為兩淮之用執政不聽日午下詔發䘮時朝論洶洶入内内侍省都都知張去為陰沮用兵之議且陳退避之䇿或因妄傳有幸閩蜀之計人情皇惑上意雅欲視師陳康伯奏曰敵國敗盟天人共憤今日之事有進無退若聖意堅决則將士之氣自倍願分三衙禁旅助襄漢兵力待其先發然後應之權工部侍郎黄中自使還每進見未嘗不以邊事為言至是又率同列請對論决䇿用兵莫有同者中乃獨奏曰朝廷與金人通好二十餘年我未嘗一日言戰彼未嘗一日忘戰取我歲幣㗖彼士卒我日益削彼日益著不知其幾又言為備於無事之時擇才於自代之舉置緫帥以護諸將則勢同臂指募民兵以捍兩淮則可固藩籬皆當今急務上察其忠乃有是命壬午兵部尚書楊椿參知政事丁亥給事中黄祖舜言契勘故相秦檜當政擅作威福不知有上䧟害忠良為國歛怨其子熺實與謀議及其亡也陛下保全其家俾熺休致而歸不寘之罪恩亦至矣今乃贈以帝傅之秩又與之遺表恩寵命横加深駭物聽詔前降指揮更不施行庚寅尚書右僕射同中書門下平章事陳康伯遷左僕射參知政事朱倬守右僕射同中書門下平章事夏四月甲辰詔利州西路駐劄御前中軍都統制新知襄陽府呉拱以西兵三千人戍襄陽朝廷聞金人决欲敗盟乃令兩淮諸將各畫界分使自為守措置民社增壁積糧是時御前諸軍都統制呉璘戍武興姚仲戍興元王彦戍漢陰李道戍荆南田師中戍鄂渚戚方戍九江李顯忠戍池陽王權戍建康劉錡戍鎮江壁壘相望而襄陽獨未有備故命拱以所部戍之其闕額令呉璘招填限一季丁巳御批比來久雨有傷蠶麥及盗賊間發雖已措置未至詳盡可令侍從臺諫條具消弭災異之術防守盗賊之䇿各以已見實封聞奏時久雨故殿中侍御史陳俊卿上䟽請之上謂宰執曰應天以實不以文可令侍從臺諫各具時政之闕有不便者即與改正宰臣陳康伯朱倬皆待罪上曰罪在朕躬豈可移過大臣翰林學士何溥言夷狄為中國之陰天意若曰夷狄將有不測之變故出災異以警戒之臣謂安邊之圖雖在擇將帥而立國之本要在得人心推原天人相與之際莫如自治之急俊卿又言今虜居汴京已逼吾境而武昌荆陽荆南各相去數百里宜擇威望重臣以兼制之使首尾相應權禮部侍郎金安節言為今之謀要使規模不失和好之形而實有備豫之䇿其䇿有三一曰厲將帥二曰擇地形三曰明覘候己未上曰朕思州縣逋欠若民果貧困自合蠲放若已輸納而官吏侵用則亦不可不與覈實明示罪責治道貴信賞必罰漫不經理則是姑息姑息雖堯舜不能治是日遂進呈四川緫領王之望催驅殿最事目上曰依所乞并令諸路亦如此施行五月甲戌國子司業陳棠言自興學至今二十年六經博士未嘗備貟望加惠學者俾六經各置博士每經擇經明行脩二人充選庶幾經各有師得以輪逓講説詔博士闕貟許令正錄兼講丙子金國賀生辰使高景山副使王全始入疆今幸天禠其魄使先墜言以警陛下惟亟留聖心焉乙未領御前諸軍都統制職事判興州呉璘為四川宣撫使仍命四川安撫制置使兼知成都府王剛中同措置應于事務時有詔䕫路遣兵五百人往峽州屯駐俟荆南有警則令䕫路安撫李師顔親往援之侍御史汪澈言天下之勢強弱無定形在吾所以用之陛下屈已和戎厚遺金繒而彼輙出惡言以撼吾國若將唾掌而取三尺之童無不痛憤願陛下赫然睿斷置師江上而專付閫外之任益兵上流而增重荆襄之勢渡師淮甸以守其要害嚴備海道以遏其牽制然後以不戴天之讎在原之戚下詔以告中外將見上下一心其氣百倍機會之來間不容髮在陛下斷之而已丙申起居郎楊邦弼起居舎人虞允文並試中書舎人允文自賀金主正旦還首言敵已授甲造舟必為南渡之計至是遂擢用之起復主管侍衛馬軍司公事成閔對于内殿朝議以上流重地邊靣闊逺而兵力分宜遣大將上乃靣諭閔俾以所部三萬人往武昌控扼戊戌太學生程宏圖等上書言今日之事國家所以應之者其先務有四一曰留使者以欵敵人之謀二曰下詔書以感南北之士三曰先舉事以决進取之䇿四曰用人望以激忠義之心六月壬寅殿中侍御史陳俊卿權尚書兵部侍郎先是俊卿復言張浚可用上曰卿欲用浚為何官俊卿曰此在陛下上曰浚才踈使之帥一路或有可觀若再督諸軍必敗事俊卿曰人皆以浚為可用陛下何惜不一試之上首肯俊卿又言張去為竊威權撓成筭乞斬之以作士氣上曰卿可謂仁者之勇至是宰執奏事上曰陳俊卿敢言朕將賞之陳康伯言俊卿在臺振職乃有是命己酉監察御史杜莘老守殿中侍御史莘老入見上曰知卿不畏強禦故有此授自是用卿矣時陳俊卿既出臺求去甚力莘老因奏事從容曰人材實難况多事之際令俊卿輩在論思之地必有補益上以為然俊卿乃復留同知樞密院事充大金起居稱賀使周麟之上䟽曰臣聞事有必至理有固然固不待上智而後知昔日之和戎今日之渝平是已累日以來側聽聖訓仰見廟謨雄斷不惑羣䇿唯是遣使一事遲回至今曉夕深思葢有不可者七若夫彼有速亡之形我有恢復之冀有血氣者類能言之陛下審處而應之爾臣當竭智畢力協賛事機儻使摇尾乞憐復下窮廬之拜臣竊恥之䟽入上大怒左僕射陳康伯見麟之以國事勉之麟之語侵康伯康伯曰上若遣康伯聞命即行大臣同國休戚雖死安避麟之卒辭之乙卯御前諸軍都統制劉錡為淮南江南浙西制置使錡自順昌之勝金人畏之下令有敢言其姓名者罪不赦上亦知其能故有是命丙辰浙西馬步軍副緫管李寳入奏事翌日上謂輔臣曰寳非惟驍勇兼其心術可以倚仗朕素識其人觀之久矣他日未易量先是寳言連江接海便於發舶無若江陰臣請徙守萬有一不任甘死無赦上從之寳即遣其子公佐與將官邊士寧潜入敵境伺動靜至是敵謀益泄復召至闕庭問方略寳奏以海道無險要可守萬一敵艦散入諸洋則難以蕩滅臣止有一䇿出萬全上問何如對曰凡用兵之道自戰其地與戰人之地不同自戰其地者必生之兵也戰人之地者必死之兵也必生者易破而必死者難却今敵未離巢穴臣仰憑天威掩出不意因其驚擾而疾擊之可以得志上曰善問所總舟幾何曰堅全可涉風濤者得百二十皆舊例所用防秋者所總人幾何曰僅三千止是二浙福建五分弓弩守非正兵也旗幟器甲亦已粗備事急矣臣願亟發陛辭賜寳帶鞍馬尚方弓刀戈甲之屬庚申夜彗出於角壬戌右司貟外郎充送伴使吕廣問等還行在奏臣等到盱眙軍有金牌郎君到來令臣等跪受大金皇帝聖㫖云六月二十三日來南京癸亥中官正判太史局李繼宗等各降一官坐奏星文不實故也丁卯殿中侍御史杜莘老言善御天下者無事則深憂有事則不懼無事深憂所以預備有事不懼所以濟功令彼欺天背盟政陛下待以不懼之時願繼自今益以剛大為心勿以小利鈍為異議所摇諛言所惰則人心有所恃而士氣振矣因上四事一用建炎詔書不限早暮延見大臣及侍從謀議國事二申敕侍從臺諫監司守臣速舉可用之才三敵情雖叵測然趍我使期宜以時遣使曲在彼四車駕既謀順動則留鑰所付宜須擇重臣皆從之秋七月丁酉御史中丞充湖北京西宣諭使汪澈入辭上命凡吏之能否民之利病悉以上聞澈受詔而去癸未宰相陳康伯率百官為孝慈淵聖皇帝請諡于南郊諡曰恭文順德仁孝廟號欽宗乙酉左司諫梁仲敏請初官有出身人滿三考無出身人滿四考方許監司郡守薦以京剡庶抑趍競而惠孤寒詔吏部看詳尋從之戊子同知樞密院事周麟之與在外宫觀放謝辭宰執進呈臺諫章䟽上曰為大臣臨事辭難何以率百僚乃有是命庚寅麟之責授祕書少監分司南京筠州居住臣留正等曰人君設高爵厚禄加體貌以待二三大臣非私之也以其能為人之所難為而任人之所不能任者也當無事時居高食厚被顧遇而不辭遇事之難輙辭焉彼固未嘗以身許國與所期者甚異此而不懲何以厲臣節太上皇帝罷麟之本兵之柄為避事者之戒善乎其有以勸百哉初上命池州諸軍都統制李顯忠擇淮西地利為固守之計至是顯忠言江北平夷别無險阻惟摐揚鎮北二十五里中坊净嚴寺依峽山口一帶地利衝要可以屯駐乞於八月初分遣半軍過江屯駐顯忠躬親往來伺其動息即全軍渡江觀敵所向隨機决戰從之壬辰樞密都承㫖充大金起居稱賀使徐嚞等至盱眙軍金主已遣翰林侍講學士韓汝嘉至泗州待之汝嘉既渡淮嚞欲就岸口亭子相見汝嘉即與其徒八人馳馬徑入宴館嚞與副使知閣門事張掄皆大驚朝服以待汝嘉入館闔其扉守臣周綜即館外穴壁以窺汝嘉令嚞掄跪于庭下抗聲稱有敕言畢陞堂分賔主而坐嚞戰灼無語掄乃稍進而問曰萌子小邦何煩皇帝親行汝嘉不能對掄曰侍講往來口言有敕本國君相何以為憑乞書于紙以俟聞奏汝嘉即索紙筆書畢而去甲午上謂宰執曰夜來小雨應候可喜屬有邊事今乃得雨天相國家使不闕食康伯曰誠如聖諭知通化軍莫濛言江淮荆楚之間年穀屢豐粒米狼戾望令屯營去處兑撥合解官錢令州縣從便和糴從之乙未詔新造會子許於淮浙湖北京西路州軍行使除亭户鹽本錢並支見錢外其不通水路州軍上供等錢許盡用會子解發沿流諸州軍錢會各半其諸軍起發等錢並以會子品搭支給用户部請也是月金主亮徙汴京亮及門而雨暴至儀從皆不克舉亮入内至承天門迅雷大風作天變如此亮不知懼也一日亮坐正隆殿召其大臣問曰許多宰執孰有能為統軍者尚書右丞劉蕚曰臣請為之亮喜即拜蕚為漢南道行營統軍將二萬衆歴唐鄧以瞰荆襄又以張忠彦為西蜀道統軍王彦章副之將五萬衆據秦鳳以窺巴蜀蘇保衡統水軍完顔鄭家奴副之由海道將趍二浙餘兵亮自將焉八月辛丑朔忠義人魏勝復海州勝北神人素無賴私渡淮為商至是率其徒數百人至海州自稱制置司前軍大兵且繼至海州遂降甲辰左朝請郎馮時行知彭州初時行守黎州上記其名召赴行在時行至建康以疾不進上䟽言敵决敗盟望移蹕進幸建康下罪已之詔感動中外願與社稷俱為存亡自古未有人主退而能使天下進人主怯而能使天下勇臣紹興初蒙陛下召對時金適請和臣以為疑至煩聖訓以為親屈已之意然和議既成無以善其後臣之愚言猶有驗於今日今金既敗盟臣又以其狂愚冒瀆聖聽望陛下特垂聖覽採而用之無使狂瞽之言又驗於他日也䟽奏乃有是命辛亥詔昭慶軍承宣使致仕王繼先令於福州居住用殿中侍御史杜莘老奏劾也繼先怙寵干法富埓公室子弟直延閣通朝籍姻戚黨友莫非貴游數十年間未有敢摇之者自聞邊警日輦重寳之呉興為避賊計華老入見靣奏繼先十罪上作而曰有恩無威有賞無罰雖堯舜不能治天下乃詔繼先福州居住凡繼先掠良家子為奴婢者百數悉還其家籍其貲以千萬計壬子詔鬻繼先田園及金銀並𨽻御前激賞庫專以賞將士其海河付李寳天下稱快焉進呈後省繳駮劉堯臣韓彦直進職事先是給事中黄祖舜中書舎人楊邦弼同狀乞劉堯臣仍舊祕閣修撰韓彦直依舊直顯謨閣赴任候有治効因以加之庶幾倖門不開上曰依奏癸丑兩浙轉運司獻䟎積錢二萬緡臨安府獻五萬緡上謂大臣曰可樁留外府若下諸路切戒毋得科敷如昔時羡餘適資贓吏而擾吾民也是日金主亮弑其母太后于宫中初其母病亮往視之問以所苦母曰吾無他疾以皇帝用兵不止遠征江南是吾病也亮大怒曰非朕母乃梁宋國王之小妻也遂命護國將軍持嘉彦忠弑之以威言者甲寅浙東馬步軍副總管李寳以舟師三千人發江陰先是寳自行在還即謀進發軍士洶洶爭言西北風力尚勁迎之非利寳下令大計已定不可摇敢有再出一語者斬遂進發知平江府洪遵竭資糧器械濟之放蘇州大洋行三日風果怒甚舟散漫不能收寳慷慨顧左右曰天欲以試李寳耶此心如鐵石不變矣即酹酒自誓風亦隨止退泊明州關澳追集散舟不浹旬復故而禆將邊士寧自密州還言魏勝已得海州矣寳大喜促其下乗機速發而大風復作波濤如山者經月未得進乙卯江淮制置使劉錡引兵屯揚州錡將渡江以軍禮久不講乃建大將旗鼓以行軍容整肅江浙人所未見也時錡方病不能乗馬乃以皮穿竹為肩輿鎮江城中香煙如雲霧觀者填擁丙辰金主亮殺其翰林直學士韓汝嘉汝嘉自盱眙歸諫亮寢兵議和亮曰汝與南宋為游説邪遂賜死壬戌資政殿學士張燾落致仕復知建康府金人既却二使還復求遣仍令九月中旬至汴京朝廷報以三節人從悉已放㪚若再行收合恐趂期不及俟非久賀正當令嚞掄充副使一就奏禀亮不意朝廷與之絕大怒戊辰忠義人魏勝補武翼郎統制忠州軍馬九月庚午朔命輔臣朝饗太廟辛未宗祀徽宗皇帝于明堂以配上帝甲戌金人犯鳳州之黄牛堡先是統軍張忠彦與其陜西都統完顔合喜將五千餘騎自鳳翔大散關入川界三十里分為三寨至是游騎攻黄牛堡守將李彦仙來告急四川宣撫使呉璘即肩輿上殺金平彦仙督官軍用神臂弓射敵郤之璘遣將官高松為之援仍與本堡管隊官張操同力拒敵敵遂扼大散關深溝高壘以自固璘駐青野原顧謂其下曰敵自守之兵不足慮也益調内郡兵分道而進靣授諸將方略庚辰給事中黄祖舜同知樞密院事辛巳上謂宰執曰近臣僚多上封事朕常親閱往往至夜分誠恐其間不無利害又曰方兹多事朕於宫中所在常令以筆硯自隨毎思得一事即札記付外行之乙酉詔劉錡王權李顯忠戚方各隨地分措置沿淮三處河口嚴為隄備先是錡亦檄權引兵迎敵權受檄與其姬妾泣别而行又聲言犒軍悉以舟載其家金幣泊新河為遁計䇿和州城居之錡再檄權往壽春權不聽命以威脅緫領財賦都潔江東轉運判官李若川固請于朝乞留權守和州江面錡又督行權不得已毎三日遣一軍往廬州屯戍丁亥四川宣撫使呉璘遣將彭清直至寳雞渭河夜劫撟頭寨勝之壬辰浙西馬步軍副緫管李寳以舟師發明州關澳癸巳金人犯通化軍權軍事張超率邦人巷戰金人死者數十乃引去甲午盱眙軍奏夏俊已復泗州興州駐劄御前前軍統領劉海復秦州乙未金人冦信陽軍統制趙樽自將所部騎赴之敵馳徑去侵蔣州丙申四川宣撫使呉璘所遣將官曹㳜復洮州戊戌詔金人無厭背盟失信軍馬已犯川界令率精兵百萬躬行天討有措置招諭事件令三省樞密院降敕榜曉諭江淮浙西制置使劉錡發揚州錡在揚州病上遣中使譚某將醫往視錡曰錡本無疾但邊事如此至今猶未决用兵俟敵人侵犯然後使錡當之既失制敵之機何以善後此錡所以病也中使以奏錡遂行日發一軍時錡已病不能食但啜粥而已己亥興州都統司後軍正將彭清副將張德破隴州是月金主亮以其尚書右丞李通為大都督而將軍聶赫與安春副之令先造浮梁於淮水之上亮遂自將入冦時亮衣橘紅袍所乗馬金甲自宋門出兵號百萬氊帳相望鉦鼓之聲不絕逺近大震冬十月庚子朔手詔曰云云屬彊敵之無厭曾信盟之弗顧怙其簒奪之惡濟以貪殘之凶流毒徧於華夷視民幾於草芥赤地千里謂暴虐為無傷蒼天九重以高明為可侮輒因賀使公肆嫚言指求將相之臣坐索漢淮之壤吠堯之犬謂秦無人朕姑務於含容彼尚飾其姦詐嘯厥醜類驅吾善良妖氛寖結於中原烽火遂交於近甸皆朕威不足以震疊德不足以綏懷負爾萬邦于今三紀撫心自悼流涕無從方將躬縞素以啓行率貔貅而薄伐取細柳勞軍之制攷澶淵郤狄之規詔㫖未頒歡聲四起歲星臨於呉分冀成淝水之勲鬭士倍於晉師當决韓原之勝尚賴股肱爪牙之士文武小大之臣戮力一心捐軀報國共雪侵陵之耻各堅恢復之圖播告邇遐明知朕意四川宣撫使呉璘檄告契丹西夏高麗渤海韃靼諸國及我河北河東陜西京東河南等路官吏軍民等曰葢聞惟天無親作不善者神弗赦得道多助仗大義者衆必歸敢攄一切之誠用諗萬方之聽我國家功高上古澤潤中區列聖重光方啓中興之運斯民不幸適丁板蕩之災蠢兹女真之微首覆契丹之祀恃其新造間我不虞妖氛既䧟於神都虐熖殆彌於宇縣凡居率土􅁩不戴天主上紹開中興宏濟大業望山河而隕涕瞻陵廟以傷心葢卧薪嘗膽之是圖寧拯溺捄焚之敢緩然人命至重佳兵不祥靡辭屈已以事讎姑欲安民而和衆豈謂冥頑之冦狃於簒逆之資以至不仁行大無道毆我中原之老稚翦為異類之囚俘乃輕棄於穴巢輒坐張於畿甸自謂富强之莫敵公然反覆以見欺指揮而取將相之臣談笑以求淮漢之地九州四海聞之怒髮以衝冠百將三軍誰不搴旗而抵掌幕府濫膺齋鉞盡護戎旃冀憑宗社之威靈一洗穹廬之穢孽待時而動歴歲于兹天亡此胡使委身而致死人自為戰不與賊以俱生帝尊一臨士氣百倍劉制置悉南徐之甲成馬軍興侍衛之師李四廂虎視於青徐王太尉鷹揚於潁壽鄂帥擣殽函之險步軍衝伊洛之郊前無堅鋒勇有餘憤以此制敵何敵不摧以此攻城何城不克惟彼諸蕃之大國久為鉅宋之歡鄰玉帛交馳尚憶百年之信誓封疆逈隔頓踈兩地之音郵願敦繼好之規共作侮亡之舉至於晉秦竒士齊趙雋才抱節義之良謨志功名之嘉會為劉氏左袒飽聞思漢之忠傒湯后東征必慰戴商之望抗旌雲合投袂風從或據郡以迎降或聚徒而特起乗吾破竹之勢立爾前茅之勲侯王寧有種乎人皆可致富貴是所欲也時不再來更期父老之誨言深念祖宗之德化勿忘舊主重建丕基檄到如章書不盡意檄樞密院所降本也江淮制置使劉錡至盱眙軍會諸將議事是日浙西副總管李寳以舟師至東海縣先是魏勝既得海州久之官軍不至城中之人始知為所紿然業已背敵不敢有貳心勝懼乃推寳之子公佐領州事自出募兵得數千人往攻沂州有女真萬户之妻王夫人者陽引兵避之勝入城遇伏兵與戰大敗僅以身免勝復還海州敵兵圍之寳聞麾兵登岸以劒劃地曰此金界非復吾境當力戰因握槊前行接敵奮擊士無不一當十敵驚出意外亟引去於是勝出城迎寳寳維舟犒士遣辯者四出招納降附辛丑金人自渦口繫橋渡淮先是池州都統制李顯忠提兵在壽春安豐之間欲回軍廬州徐觀其變俄聞敵大至遂自峽山路渡大江以歸癸卯統制忠義軍馬魏勝知海州金主亮至安豐軍又破蔣州甲辰呉璘奏劫金人橋頭寨獲㨗上謂宰執曰散關小㨗豈非信順之助而况簒弑君親誅戮殘忍天地所不葢載禽獸所不肯為神怒人怨滅亡無日今二道出師置帥招討審彼已量虚實撫定我城邑招集我人民収復我寢廟毋焚燒毋敵掠毋殺傷以圖萬全之舉高爵醲賞朕所不吝卿等賛朕成筭協以衆謀庶幾恢復神州以雪兩朝之耻丁巳劉錡自盱眙軍引兵次淮陰縣留中軍統制劉氾左軍統制貟琦守盱眙丁未金人立其東京留守葛王褎為皇帝改元大定戊申上謂大臣曰朕曩於内帑儲錢備邊士大夫不諭朕意甚者至指為瓊林大盈之比顧朕雖積此亦何嘗妄費一錢向撥百萬緡付公府而近日遣軍及諸處犒賜皆於是乎出豈不正資今日之用况方用兵國賦亦須得人經理士大夫耻言利多事之時艱於選任亦今時之一病也是日夜漏下二鼓王權自廬州引兵遁屯昭關初金主亮在壽春欲渡淮繫浮橋已成邏者獲權軍擺鋪數人中有一曹司亮見之問權所在曹司曰在廬州又問有兵幾何曰有兵五萬亮曰是也吾知之矣乃以金千餘兩遺曹司且令附書與權權聞亮已渡淮遂自廬州退兵沿路作虚寨以相疑既又退保和州令破敵軍収後辛亥金人䧟滁州初金主亮既渡淮令萬户蕭琦以十萬騎自花黶鎮由定逺縣取滁陽路至揚州琦之深入也毎過險阻必憂吾有備至則全無守禦如蹈無人之境敵甚笑我之失計焉壬子四川宣撫使呉璘等奏已復秦州上曰金人無故敗盟數路出師朕之應兵良不得已今日之㨗雖由祖宗德澤然亦天人信順之助江淮制置使劉錡得金字牌逓報淮西敵勢甚盛令錡退軍備江時錡在淮陰與金人隔淮相持已數日至是清河口有一小舟順流而下錡使人邀取之有粟數囊而已錡曰此探水勢者也俄頃金人各抱草一束作馬頭以過舟舟約數百艘有載糧過濠州者有載激犒之楚揚州者錡募善没者鑿舟沉之敵大驚癸丑户部侍郎劉岑等乞借江浙荆湖等路坊場凈利錢一界計錢三百八十萬緡以備賞軍限半月足許之國朝混一之初天下歲入緡錢千六百餘萬太宗以為極盛兩倍於唐室矣其后月增歲廣至熈豐間合苗役市易等錢所入乃至五千餘萬渡江之初東南歲入猶不滿千萬上供纔二百萬緡此祖宗正賦也吕頥浩在户部始創經制錢六百六千餘萬緡孟庾為執政又增總制錢七百八十餘萬緡朱勝非當國又增月摏錢四百餘萬緡紹興末年合茶鹽酒筭坑冶㩁貨糴本和買之入凡六千餘萬緡而半歸内藏昔時中都吏禄兵廩之費全歲不過百五十萬緡元豐間月支三十六萬宣和崇侈然後支百二萬渡江之初連年用兵月支猶不過八十萬其後休兵寖久用度滋益多户部常患無餘及軍興遂有此請是日金人圍廬州甲寅金主亮以大軍至廬州城北之五里築土城居之金人冦樊城副將翟貴部將王進引兵出戰二將俱死士卒半掩入江中是役也以大㨗聞張平未嘗出戰亦遷中衛大夫軍中謂之樊城功賞乙卯江淮制置使劉錡聞王權敗乃自淮陰引兵歸揚州淮甸之人初恃錡以為安及聞軍退倉卒流離于道死者十六七丙辰金主亮入廬州建康府駐劄御前破敵軍姚興與金人戰于尉子橋死之先是王權既屯昭關將士猶有欲戰之心權引兵先遁金人以鐵騎追及尉子橋興以所部三千人力戰權置酒仙宗山上以刀斧自衛殊不援興自辰至申興出入三四殺敵數百統領官戴臯下道避敵敵遂假立權幟以誤興興奔入與其徒鄭通等五十人俱䧟死之中書舎人權直學士院虞允文聞王權至濡需知事急度權與劉錡必退回遂率侍從數人同見輔臣言權退師已臨江口必敗國事尚書右僕射朱倬參知政事楊椿皆曰權自言退師以導敵深入身當其衝令步軍司左軍統制邵宏淵出其右池州都統制李顯忠出其左夾攻之允文等力辨其不然且言此權必為走計倬等猶不以為然丁巳得報王權果敗歸中外大震上召和義郡王楊存中同宰執對于内殿上諭以欲㪚百官浮海避狄左僕射陳康伯曰不可存中言敵空國逺來已犯淮甸此正賢智馳騖不足之時臣願率先將士比首死敵上喜遂定親征之議時有欲遣使詣敵以緩師者敷文閣待制曾幾聞之上䟽曰遣使請和增幣獻城終無小益而有大害為朝廷計當嘗膽枕戈專務節儉整軍經武之外一切置之如是雖北取中原可也且前陛下降詔諸將傳檄數金人君臣如罵奴爾何辭復與和耶是日官軍復鄧州戊午知樞密院事葉義問督視江淮軍馬中書舎人虞允文參謀軍事樞密院檢詳洪邁秘書省校書郎馮方並參議軍事侍衛步軍司左軍統制邵宏淵及金國統軍蕭騎戰于真州胥浦橋宏淵退屯于楊子橋真州遂䧟敵得城不入徑自山路犯揚州江淮制置使劉錡軍還至邵伯埭聞敵犯真州疑揚州已不守未敢發會探者報揚州城上旗幟猶是官軍錡曰雖失真州而揚州猶為國家守當速進乃自北門入見安撫使劉澤澤以城不可守勸錡退屯瓜洲己未侍衛馬軍司中軍統制趙樽引兵渡淮攻蔡州樽在信陽軍聞敵已冦淮右曰此可以進兵擣其虚矣遂行是日金州統制官任天錫等復商州庚申葉義問入辭乞犒軍金帛上命出内帑錢九百萬緡予之參謀軍事虞允文繼對上諭曰卿儒臣不當遣以卿洞達軍事勉為朕行允文曰臣敢不盡死力趙樽破褒信縣建康府都統制王權自和州遁歸權聞敵且至紿其衆曰已得㫖棄城守江矣遂引兵登車船渡江屯于東采石辛酉金人入和州初敵兵至近郊猶未知王權棄軍而歸也後軍統制韓霖最後出城乃縱火城中喧亂金人聞之曰南兵遁矣遂進兵入城城中糗糧器械盡委於賊虜乗勢奔突軍民自相蹂踐及争渡溺死者莫知其數將士憤怒號呼指船詆罵皆以權不戰誤國為言潰兵往往棄甲抱蘆葦浮江而渡得生者十四五壬戌知建康府張燾始至本府視事先是建康居民驚移而去者十五六及燾至人情粗安侍衛馬軍司中軍統制趙樽至新蔡縣金人所命令佐率衆迎趙樽一鼓破之是日江淮浙西等路制置使劉錡退軍瓜洲鎮敵陷揚州始有司辦嚴用紹興七年故事杜莘老為上言今親征與曩日事異宜皆從簡以幸所過郡縣上曰此行中宫及内人不往止與建王行欲令徧識諸將耳乃命王府直講史浩從行自金人窺伺江淮一時宿將莫不震怖惕息獨王處之恬然不懼廷臣有奏請王為元帥者及扈行邊遽日至王預料某所可守某所可攻某人可用後率如所言王權自采石夜還建康既而復如采石時金主亮率大軍臨西采石楊林渡已數日權與知太平州王傳猶庇匿不以聞州學諭汪餘慶與教授蔣繼周同往見傳責之傳氣奪一日發八奏甲子特進提舉江州太平興國宫和國公張浚復觀文殿大學士判潭州趙樽下興平縣忠義統領柳萬克伏羌城興州前軍統制呉挺知文州節制軍馬向起敗金人于德順軍之治平寨乙丑鎮江府左軍統領貟琦及金人戰于揚州皂角林敗之斬統軍高景山俘數百人時諸處以報㨗旗趍行在者絡繹于道路市人為之語曰雖日聞㨗報可喜但一報近如一報亦可憂督視軍馬葉義問讀琦㨗報至金人又添生兵顧謂侍吏曰生兵是何物聞者皆笑當時謂之兎園樞密丙寅浙西馬步軍副緫管李寳與金人舟師遇于密州膠西縣陳家島大敗之初金主亮用降人倪詢商簡梁三兒等計造戰船數百使工部尚書蘇保衡等統之約以十月十八日至海門山入錢塘江幹事畢令雄州刺史阿爾威來江上迎報敵舟泊唐家島寳舟泊石臼山相距三十餘里而北風日起寳憂之有大漢軍水手數百來降大漢軍簽起上等户也寳問之頗得北軍事實禆將曹洋請逆戰知朐山縣高敞曰不可彼衆我寡宜避之洋曰彼雖衆皆不諳海道且降人云女真在船中惟匍匐而睡略不能動雖衆何為寳伺敵未覺遣洋與禆將黄瑞禱于石臼神祈風助順夜漏將盡起碇進船風猶未順衆有難色良久南風漸應衆喜争奮引帆握刃俄頃過山薄敵鼓聲震疊敵驚失措敵帆皆以油纈為之舒張如錦繡綿亘數里忽為波濤卷聚一隅窘蹙摇兀無復行次會火頭船有火起者寳命以火箭射之着其油帆煙熖隨發延燒數百火不及者猶欲前拒寳命健士躍登其舟以短兵擊刺殪之舟中其餘簽軍皆中原舊民脱甲而降者三千餘人獲其副都統完顔鄭蒙奴等五人斬之阿爾威為官軍所殺保衡舟未發亟引去得倪詢等三人及敵詔書印記征南行程厯與器甲糧斛以萬計江淮制置使劉錡還鎮江府錡在瓜洲四日無日不戰至是有詔令錡專防江上會錡病已劇遂肩輿渡江留中軍統制官劉汜以千五百人塞瓜洲渡知均州武鉅遣將與忠義軍復盧氏縣是日侍衛馬軍司中軍統制趙樽引兵攻蔡州距城二十里金人出兵背城而戰方成列樽出其不意命官軍於宿草間乗風縱火鼓譟而進敵衆披靡樽率親兵衝擊斬其總管楊寓遂整衆入城秋毫無犯丁卯知樞密院事葉義問至鎮江權立行府中書舎人兼參謀軍事虞允文見太尉劉錡問兵敗狀錡曰兵凶器聖人不得已而用之允文曰敵席卷兩淮直窺江表今日用兵為得已乎錡曰錡非好官職者今當上還制置招討二印耳允文曰國事如此九重方有蒙塵之懼公持是印欲安所歸乎錡慚不能答是日金州統制官任天錫自商州遣兵㑹虢州忠義章傳等取朱陽縣戊辰初金新主褎既立遣通事蕭恭持赦詔撫定州縣於是自黄河以北皆下之左丞張浩自汴京録褎赦馳以報金主亮亮嘆曰朕欲俟江南平後取一戎大定之義以紀元是子乃先我乎命取書一帙示其下果預識改元事十一月己巳朔監察御史呉芾行殿中侍御史先是芾建言陛下當修德以服虜人虜以其力我以其德雖強弱之勢不侔而勝負之形己見又言陛下勿以敵之進退為憂愉勿以事之緩急為作輟凡下詔必務責己引對必令盡言使隱之於心有合於天地發之於政無愧於祖宗上韙其言故有是命芾又言今日之事有進無退若為蓄縮之計則大事去矣江州都統制戚方奏己復蔣州金州統制官任天錫引兵入虢州庚午劉錡㨗奏至上曰劉錡在淮東屢㨗可謂與國家宣力遂遣使以金五百兩銀七萬兩徧勞有功將士上又曰使人人如此立功將來凱還王爵亦所不吝金人犯瓜洲渡中軍統制官劉汜用尅敵弓射郤之辛未知樞密院事葉義問在鎮江得知建康府張燾公狀言金人侵犯采石為渡江之計其勢甚危乞日下火急發來前保守江渡義問乗大舟以二校執器械立馬門左右見者無不笑義問至鎮江聞瓜洲官軍與金人相持已遑遽失措行府有統制官輔逵米忠信數人或問金人近在江北何以郤之逵曰國家勢弱無法可以郤敵聞者皆掩鼻時江水低淺沙洲皆露義問役民夫掘沙為溝可深尺許沿溝栽木枝為鹿角數重曰金人若渡江姑以此障之鄉民執役且笑曰樞密肉食者其識見乃不逮我軰食糠籺人一夜潮生沙溝悉平木枝皆流去矣會建康告急義問乃遵逵而進壬申新知潭州張浚改判建康府兼行宮留守知建康府張燾赴行在鎮江府中軍統制劉汜及金人戰于瓜洲鎮敗績時金人以重兵直擣瓜洲權都統制李横引諸軍迎敵葉義問督鎮江駐劄後軍渡江衆皆以為不可義問強之未着北岸義問懼怯之狀見于顔色即向西去曰欲往建康府催諸軍起發耳市人皆媟罵之汜性驕傲不習軍事至是卒敗癸酉淮寧人陳亨祖執金人所因同知陳州完顔耶魯以其城來歸事聞命亨祖知淮寧府是日趙樽去蔡州以援成閔於是金人所命刺史蕭德懋復入城據之甲戌葉義問至建康夜被命罷王權赴行在以李顯忠代之督府詐以檄召權來府議事命中書舎人參講軍事虞允文往蕪湖趣顯忠交權軍且犒師采石葢權軍采石未散也時知建康府張㦞至府纔十餘日夜漏下二鼓㦞方就寢允文扣門求見甚急曰此何等時而公欲安寢乎㦞曰日來人情洶洶視太守動息而去留儻不鎮之以靜必不安雖然舎人何以見教允文曰聞諜者言敵以明日渡江約晨炊玉麟堂公何以為䇿曰燾當以死守留鑰皇恤其他舎人平日以名節自任正當建竒功以安社稷允文曰此允文之素志特决公一言耳乙亥金主亮臨江築壇刑白黑馬各一以祭天期用翌日南渡丙子中書舎人虞允文督舟師拒金主亮于東采石却之允文未至采石十餘里聞皷聲震野允文見官軍十十五五坐路旁者問之衆曰王節使在淮西聲金不聲皷我曹皆騎馬節使命棄馬過江今已無馬我曹不解歩戰從者皆勸允文還建康曰事勢如此皆為他人壞之且督府但委公犒師耳非委督戰也奈何代人任責允文不聽䇿馬至采石趨水濱望江北敵營不見其後而擁餘兵纔萬八千人馬數百而已金主亮登高臺張黄葢被金甲據胡床而坐諸將已為道計允文召其統制張振王琪時俊戴皁盛新等與語問之曰敵萬一得濟汝輩走以何之今前控大江地利在我孰若死中求生且朝廷飬汝輩三十年顧不能一戰報國衆曰豈不欲戰誰主張者允文曰汝輩止坐王權之謬至此今朝廷已别選將將此軍矣衆愕立曰誰也允文曰李顯忠衆皆曰得人矣允文曰今顯忠未至而敵以來日過江我當身先進死與諸君戮力决一戰且朝廷出内帑金帛九百萬緡給節使承宣觀察使告身檢柅苛細動有拘礙則誰復敢出意繩墨之外為國家立大事乎况朝廷所以待將帥者如此使有氣節者為之心必不服其勢必將復得姦猾之徒則其巧思百出弊隨日滋又安得而盡革耶今不慮此而欲獨任一介單車之使以察之政使得人猶失任而無益况不得人則其弊又將不在將帥而在此人矣上納其言罷林不遣大霖面宰執求罷不允詔内外察獄今太官早晩並進素膳戊午慮囚九月丁丑翰學劉珙進讀三朝寳訓至淳化五年太宗謂近臣曰太祖實錄或云多有漏落當命官重修因歎史官才難蘇易簡曰大凡史官宜去愛僧近者扈蒙修史蒙為人怯懦多疑忌故其史傳多有脱落上曰善惡無遺史臣之職珙奏云史官以學識為先文采次之茍史官有學識安得愛憎怯懦疑忌上曰史官要識要學要才三者兼之臣僚言檢視災傷官司未嘗遵承毎差州縣官到隨行征求皆有定例然後擇村疃中近年瘠薄之田先往視之名曰應破又擇今歲偶熟之處再往視之責以妄許名曰伏熟重為民困望詔守臣選差練曉清強官公心考覈申飭監司嚴行按舉所差官汚亷勤惰公正誣罔悉以上聞從之是月陳良翰言昨立住賣度牒二十餘年人民生聚不為無益辛巳春邊事既作用度浸廣乃始放行令下之初往往争買其價則五百千其限則三个月其數不過萬道未足以病民今則減價作三百千展限已三十餘次總數計十萬三千餘道民甚病之且唐人有言十户不能飬一僧今放行者與舊所度者無慮三四十萬是三四百萬户不得休息也不知國之所利者能幾何而令三四百萬尸不得息肩且又暗損户口侵擾齊民奚止千萬此其為害豈淺淺哉是秋申嚴獻羡餘之禁從劉珙奏也冬十月壬寅上曰昨日有從官奏云邊室規舉未定華顒奏臣等日夕講究亦且徐徐措置上曰維揚築城已畢更得來年一冬無事足可經略陳俊卿奏淮上規摹須久任守臣遲責其効其不職者早宜易之上曰極是壬子三省進呈畢上曰朝廷更有何事合理會須是畜其逺者大者勿徒事於簿書苛細朕尋常或過飲一兩盃酒便覺忘事以此觀之須是清慮是月成都府路旱詔降僧牒四百道充糴本措置賑濟十一月丙寅郊雷雨望祭于齋宫時北使來賀會慶節上壽在郊禮散已之内不當用樂陳俊卿讀令館伴以禮諭之而議者慮其生事多請權用樂者俊卿又奏請必不密已則上壽之日曰此反間也欲􅂝我衆耳時新除都統制李顯忠適自蕪湖至謂允文曰雖如此亦當以朝廷已罪王權之事答之庶絕其冀望允文以為然遂作檄曰昨王權望風退舎使汝鴟張至此朝廷已將權重寘典憲今統兵乃李世輔也汝豈不知其名若往𤓰洲渡江我固有以相待無虚言見怵但備一戰以决雌雄可也遣所獲女真二人齎往亮得書大怒遂焚宫人所乗龍鳳車斬劉漢臣及造舟者二人於是始有𤓰洲之議庚辰醴泉觀使湯思退為行宫留守是日金主亮以大軍趍淮東癸未四川宣撫使呉璘自仙人原還興州初金主亮既往淮東中書舎人虞允文謂建康都統制李顯忠曰京口無備我今欲往公能分兵見助否顯忠曰惟命即分主管侍衛步軍司公事李捧軍一萬六千人及戈船來會京口允文至建康留守張燾謂曰亮約八日來此會食使燾安往衆議可以往鎮江者皆有難色燾曰虞舎人已立大功可任此責允文欣然從之至鎮江謁招討使劉錡問疾錡執允文手曰疾何必問朝廷養兵三十年我輩一技不施今日大功乃出於一儒者我輩愧死矣甲申金主亮至揚州乙酉鎮江府駐劄御前中軍統制劉汜特貸命除名英州編管王權及汜既敗軍乃先罷權為在外宫觀及呉芾奏權罪請正典刑上怒甚將按誅權以厲諸將同知樞密院事黄祖舜密言於上曰權罪當誅然權誅則汜不當貸若貸汜而誅權是謂罪同罰異顧劉錡有大功今聞其病已殆汜誅錡必愧忿以死是國家一敗而自殺三大將得毋為敵所快乎上納其言二人得不死江州都統制戚方言本軍統制官李貴及忠義孟俊取順昌府知均州武鉅奏已復盧氏縣丙戌權禮部侍郎黄中言本朝倣唐之制創為九廟今日宗廟自僖宣二祖以及祖宗凡九世而十一室望遵已行典故遷翼祖神主而祔欽宗詔恭依丁亥太尉劉錡提舉萬壽觀以疾自請也戊子四川宣撫使呉璘復力疾上仙人原有客詣葉義問上書云以太一局考之敵人不煩資斧當以冬至前有蕭墻之變闔府皆未以為然己丑膠西㨗奏至上大喜即日召所遣承節郎曹洋對于内殿曰朕獨用李寳果立功為天下倡矣即賜詔書奬諭命幹辦御藥院賈竤押賜金合茶藥金酒器數十事且書忠勇李寳四字表其旗幟清逺軍節度使王權特貸命追毁出身以來文字除名勒停瓊州編管庚寅金主亮在瓜洲鎮御營宿衛使楊存中中書舎人督視府參謀軍事虞允文以賊騎瞰江恐車船臨期不堪駕用乃與淮東緫領朱夏卿鎮江守臣趙公稱相與臨江拽試命戰士踏車船徑趨𤓰洲將迫岸復回金兵皆持滿以待其船中流上下三周金山回轉如飛敵衆駭愕亟遣人報亮亮至見之笑曰此紙船耳因列坐諸酋一酋前跪曰南軍有備未可輕且采石渡方此甚狹而我軍猶不利願駐于楊州力農訓兵徐圖進取亮震怒拔劍數其罪命斬之哀謝良久乃杖半百而釋之辛卯吏部貟外郎曾注上言乞信賞必罰上謂大臣曰賞罰人主之大權昨王權臨陣退衂朕已逺竄今三大帥招討制置之命宜批㫖便除以示懲勸上有言葢指成閔呉拱李顯忠也甲午金人分兵犯泰州初金主亮在瓜洲聞李寳由海道入膠西焚其戰艦而成閔諸軍方順流而下亮愈忿乃還揚州召諸將約三日畢濟過期盡殺之諸將謀曰南軍有備如此進有渰殺之禍退有敲殺之憂奈何其中一將曰等死死中求生可乎衆皆曰願聞教有總管方戴者曰殺郎主却與南宋通和歸鄉則生矣衆口一詞曰諾平旦諸將大懷忠蕭扎巴詣御寨奏事亮醉卧未起懷忠問宿直將軍樂嘉努曰郎主夜來有何聖㫖嘉努曰昨夕與后妃飲言三日渡江不得將大臣盡行處斬諸將聞之益懼亮有紫茸等細軍不肯臨敵專以自衛衆患之扎巴曰晩朝奏遣細軍東取海陵仍請樂將軍諭以禍福則可濟矣乃謂細軍曰淮東子女金帛皆逃在泰州我輩急渡江汝輩何不白郎主往取之細軍欣然共請亮許之於是細軍去者過半亮妹婿唐括安禮能文知兵掌黄頭女真亮聞新主褎立遣安禮以本部兵歸故諸將益無所憚乙未金人弑其主亮于龜山寺諸將既定議夜漏未盡二鼓率兵萬餘人控弦直入亮寢帳閽曰何為者曰欲奏事將軍樂嘉努入告以南人刼寨亮驚起求劒甲不得左右親兵皆散走諸將射帳中矢下如雨遂連射殪亮併及其帳中妃五人參知政事李通兵部尚書郭安國左輔闕馬欽皆死亮在位十二年年四十金人䧟泰州是日天重陰有樞密行府使臣胡斌者能知天文謂樞密院檢詳洪邁曰昨夕四鼓濃雲塞空欲雪而東北忽穿漏一大星墜葢金主死祥也未幾虢州簽軍雷政渡江報亮已被殺大事記曰二十八年敵將叛盟孫道夫既言之杜莘老又言之而朝廷不之信二十九年黄中使回言敵已治汴京而二相猶詰之以為妄敵已定冦江之計王綸使還妄言和好無他而湯思退遽爾稱賀秦檜之餘孽遺毒可勝道哉惟黄中以為廟廷與敵通好我未嘗一日言戰彼未嘗一日忘戰惟陳康伯以為今日之事有進無退故三十一年九月逆亮入冦百官盡為避狄之計惟康伯與黄中家属在城中而已二公既决親征之議於是金將喀齊喀至渭河呉璘敗之属將劉諤犯襄陽劉珙敗之史俊敗之于茨湖李顯忠敗之于全椒李寳敗之于膠西引舟師至石臼島而錦纈帆為之一燼劉錡敗之于皂角林至𤓰洲渡四日無日不戰而敵師不得濟惟劉錡李横不利王權逗遛不進葉義問督視無功亮得以至采石而虞允文海鰍船一出敗之于楊家渡亮又趍𤓰洲允文踏車船一出回轉如飛敵退揚州而自倒伐矣以講和之久兵將驕怠者二十年意其氣必衰心必怯矣今也兵無不戰戰無不勝檜之邪説雖熾而張趙韓岳屢勝之威猶在也韓常於紹興之初已曰昔我強彼弱今彼勇我怯然彼以力論爾要之中原非腥羶之可汙正統非醜類之可干佛貍飲江而死苻堅渡淮而滅耶律德光入晉而亡女真雖横而羅索死於兵尼堪死於讒達蘭烏實薩拉噶之徒相繼誅夷亶方被弑亮又送死而阿固達之子孫殆盡是人不能報中國之讎而天能報之也龜鑑曰考之太乙局而謂有敵人不煩資斧之䜟驗之濃雲星墜而謂有敵亡之祥吁此固上天悔禍符應如是而舉國盡付之天則未為至論也我高宗有曰治亂安危固有天命亦必修人事以應之若修人事不至而專聽天命固無是理大哉王言其知以人事而應天理者乎且帝自即位以來天之告符者數數矣歲星當躔興宋有兆則先講禦戎自治之䇿金星犯畢趙地有之則令諸將謹守邊之戒敬觀朕當兢業以祈天弭禍之言當修人事以答天意之語則高宗未嘗不以人而應天也今兹勝㨗雖曰天數葢亦人謀使無江淮諸將相勉忠義風鶴草木能自為晉戰乎戊戌金國都督府遣人持檄來鎮江軍中議和十二月己亥朔侍衛馬軍司中軍統制趙樽復蔡州庚子黄旗奏報已殺金帥完顔亮訖朝野相賀上曰此敵簒君弑母背盟興戎自采石與海道敗後知本國已為人所據乃欲力决一戰今遽滅亡是天賜朕也朕當擇日進臨大江洒掃陵寢肅清京都但戒諸將無殺掠此朕志也初敵騎闞江朝臣震怖争遣家逃匿權禮部侍郎黄中獨謂其家人曰天子六宫在是吾為侍臣若等欲安適耶北兵退獨中與左僕射陳康伯家属在城中衆皆慚服時楊存中與虞允文共議偕至江北岸以察敵情諸將憚行允文存中獨以輕舟絕江而北上嘗謂康伯及留守湯思退曰楊存中忠無與二朕之郭子儀也金人以舟師汜茨湖官軍擊郤之辛丑總領四川財賦王之望言呉璘疾病乞還呉拱於蜀使璘腹心有助之望恐璘不起朝廷以姚仲代璘故預有此請凡五遺大臣書言之是日金國統軍劉萼班師細軍之在泰州者亦棄城而去癸卯詔逆亮渝盟侵犯王略属兹進發躬往視師文武羣臣各揚厥職輯寧中外共濟大功甲辰進呈金國都督府牒上曰金帥既已誅夷餘皆南北之民驅迫而來彼復何罪今即日襲逐固可使隻輪不返然多殺何為左僕射陳康伯請率百僚稱賀上曰未須爾俟到汴京與羣臣共慶中書舎人兼權直學士院虞允文自鎮江還入見上慰藉甚渥司農少卿杜莘老知遂寧府從所請也莘老為御史極言無隱取衆素所指目如王繼先張去為輩悉擊去之及罷朝士祖道都門以詩文稱述者百餘人都人至今以為美談雖宿衛武夫府寺賤𨽻誦説前朝骨鯁敢言之臣必曰杜殿院云是日均州忠義統領昝朝等復據鄧州乙丑淮西制置使李顯忠自茨湖引兵渡江時金兵尚屯雞籠山而顯忠兵在沙上判建康府張浚自長沙聞命即日登塗過池陽往勞以建康激賞犒之一軍見浚以為從天而下浚諭顯忠曰聖駕將巡幸至此而敵未退得無慮乎顯忠乃以大軍濟江去和州三十里與之相持然賊亦未退金人游騎焚真州報恩寺塔徑往天長丙午淮東制置司統制官王選等復楚州丁未呉拱遣訓練官牛宏王彦忠等入汝州均州鄉兵總轄杜隱等入河南府戊申上發臨安府庚戌上次秀州守臣俞召虎知嘉興縣杜易見于幄殿自是所過監司守令皆引對是日金人大軍自盱眙渡淮盡絕癸丑鄂州水軍統制楊欽以舟師追金人至洪澤鎮敗之夜鎮江府統制官呉超遣部將段温等追金人至淮陰縣又敗之獲其舟船糧食甚衆是夜淮東制置司統制官劉鋭陳敏等引兵入泗州甲寅李顯忠與金人戰于楊林渡卻之翊日敵乃去乙卯金人破汝州殺戮殆盡丁巳淮東制置使李顯忠遣統制官張榮逐敵至全椒縣敗之得敵所獲老弱萬餘口日暮顯忠入和州是日判建康府張浚始至本府視事浚首奏乞車駕早幸建康聞已進發乃督官属治具不半月而辦戊午上至鎮江府未就舎先乗馬幸江下觀戈船浙西沿海制置使李寳從上行因陳俘獲與所得百尺舟上奬諭甚至因嘆曰始朕用寳謗書滿篋至謂必復從偽今竟如何壬戌曲赦新復州軍先是宰執進呈赦書事目上曰向已下哀痛之詔今日恩宥不必更揚完顔亮過惡但專罪已而已起居舎人權直學士院劉珙草制略曰兹金帥之干誅幸上天之悔禍爰整濯征之旅坐揚耆定之功元惡就屠餘黨悉潰重念中原之衆久淪左衽之風頭顱難保於淫刑閭里悉空於重歛宜推在宥咸與惟新自江上用兵珙獨在禁林一時詔檄多出其手詞氣激烈讀者感厲癸亥張浚言金兵已退兩淮皆定初金歧王亮既為其下所殺參知政事敬嗣暉欲立其太子光瑛于南京左丞相張浩不可乃併亮后徒單氏殺之亮所遣先鋒將郭瑞孫至滑州聞變留不進金主褎知亮已死乃與其子允升允迪擁萬騎趨中都宋史全文卷二十三上欽定四庫全書宋史全文卷二十三下宋髙宗十九壬午紹興三十二年春正月戊辰朔日有食之上在鎮江己巳金人犯壽春府壬申上至建康府判府事張浚迎謁道左衛士見浚復用至以手加額浚見上謝曰秦檜盛時非陛下保全無此身矣上慘然曰檜為人既忌且妬浚起於廢絀二十年之後復當重寄風采隱然軍民恃以為重焉戊寅張浚入對上問勞甚渥己卯詔侍從臺諫各舉可為監司者一貟郡守二貟有不稱職當坐繆舉之罰庚辰言者論監司不按吏望令郡守每半歲各䟽屬縣知縣治狀之得失具申監司監司覆實併與屬郡太守治狀以聞仍下御史臺考核有不如言論奏殿罰庶幾郡邑勉勵而監司之職不至曠廢從之詔郡守年七十之人令吏部並與自陳宫觀著為令壬午金人冦蔡州侍衛馬軍司統制趙樽率諸軍巷戰金人敗乃去丁亥給事中金安節等言准尚書省備到白劄子奉聖㫖令臣等同議聞奏事臣切惟建康江山險固從昔以為帝王之都葢以南控楚越西連巴蜀北接中原最為形勝實東南之要會也今將圖回經略指揮號令固宜駐蹕於此中原之地久歎淪胥民思拯援如在焚溺比聞大駕進臨江表方徯來蘇至於淮壖瘡痍之人甫遂歸業亦賴聲勢以幸安堵一旦聞戎輅還軫恐乖始望先是殿中侍御史呉芾言大駕宜留建康以繫中原之望㑹有陳駐蹕利害者宰相陳康伯不能决上命侍從臺諫同赴都堂集議芾謂建康可以控帶襄漢經理淮甸若還臨安則西北之勢不能相接衆不從遂定回鑾之議戊子詔曰比者視師江上敵騎遁去兩淮無警已委重臣統䕶諸將一靣經畫進討今暫還臨安重惟建康形勢之勝宜令有司增修百官吏舎諸軍營寨以備往來巡幸可擇日進發龜鑑曰惜夫視師之寄不属之魏公而属之葉義問使魏公亟趨而任其責則觀其戰功又豈止如是而已耶魏公者兼資文武出入將相幾三十年武夫健將言者嘆息兒童婦女知有都督其德為如何加之許國之心白首不渝杜門念咎老而綀事今日之浚非前日之浚建府迎謁衛士懽呼浚之措置經綸曾未設施而局靣又一變成閔等領三衙而招討散局矣呉璘班師而宣撫結局矣金陵王者之宅席我師之屢捷為駐蹕之𢎞規可也未及一月遽爾反斾何耶意者天道厭於西北而黄旗紫葢蓋應於東南郡否則聖心􅀢勤而恢復之義將有待於後人耶邦畿千里惟民所止肇域彼四海四海來假錢塘之形勢此其地矣噫有田一成有衆一旅而祀夏配天開拓若是亦可以為難矣給事中金安節等言當今之計其大要有三一曰進取二曰招納三曰備守金主褎遣高忠建張景仁來告登位尚書左司貟外郎洪邁充接伴使知閤門事張掄副之庚寅宰執奏北使二月渡淮上曰今若拒之則未測來意有礙交好受之則當遣接伴使副於境上先與商量願聞名稱以何為正疆土以何為准與夫朝見之儀歲幣之數所宜先定不然則不敢受也壬辰洪邁張掄入對上謂宰執曰朕料此事終歸於和卿等欲首議名分而土地次之葢卿輩事朕不得不如此言在朕所見當以土地人民為上若名分則非所先也何者若得復舊疆則陵寢在其中使兩國生靈不殘於兵革此豈細事乙未洪邁張掄辭行上顧掄曰洪皓三子其才皆可用丙申和義郡王楊存中為江淮荆襄路宣撫使中書舎人虞允文充副使上將還臨安軍務未有所付張浚判建康府衆望属之及除存中宣撫使中外大失望給事中金安節起居舎人兼權中書舎人劉珙言比者金人渝盟干犯王略今陛下親御六飛視師江滸大明黜陟號令一新天下方注目以觀傾耳以聽凡所擢用悉宜得人存中已試之效不待臣等具陳頃以權勢太盛人言藉藉陛下曲示保全俾解軍職今復授以兹任事權益隆豈惟無以慰海宇之情亦恐非所以保全存中也儻聖意以允文資歴未深未可專付宜别擇重臣以副盛舉䟽入上怒謂輔臣曰珙之父為張浚所知其為此奏意專為浚地耳宰相陳康伯朱倬召珙諭上㫖且曰再繳累及張公珙曰珙為國家計故不暇為張公計若為張公謀則不為是以累之矣命再下珙執奏如初乃止於是允文改使川陜存中措置兩淮而已湖北京西宣諭使汪澈言已復光化信陽軍上流事勢稍定二月戊戌朔中書舎人虞允文充川陜宣諭使措置招軍買馬且與呉璘相見議事庚子張浚虞允文入對時浚乞偕執政奏事上不許詔浚罷相後有合得特進恩數皆還之興州前軍同統領惠逢復河州壬寅金人犯汝州守將王宣率親兵迎戰天大雨虜大敗遁去癸卯上發建康府惠逢遣兵復積石軍乙巳夜雷丁未太尉威武軍節度使提舉萬壽觀劉錡薨于臨安府壬子王宣自汝州班師乙卯上至臨安府乗馬還大内丙辰金人犯蔡州侍衛馬軍司統制趙樽擊郤之辛酉右正言劉度入對言今者視師回鑾願止取親臨行陣折馘執俘有軍功者方得推恩外一切賞典所宜謹惜以革僥倖之門翌日進呈上曰朕嘗諭度朕此行不濫與一人官爵及濫減一年磨勘卿等所共見也壬戌雪乙丑御前中軍統制王宣敗金人于蔡州確山縣於是趙樽自信陽歸德安而宣亦還屯襄陽府丙寅瘞欽宗重於招賢寺立虞主上親遣奠執政議上宜服袍履權禮部侍郎黄中言曰三年天下之通䘮尭舜三代之所共也後世以日易月已有愧於古矣然猶於二十七日釋服之後因事則服之庶幾反正本朝典故大葬啓攅必服其初服是也若曰今十月而葬不可復服則真宗九月而葬何為亦服其初服乎以故事考之衰服為當前二日左僕射陳康伯等進呈上覽奏曰朕為人子豈可使事兄之禮過於事父中至都堂右僕射朱倬謂中曰徽考大行有故事矣中曰此前日之誤今所當改奈何復因之倬因謂上意實然臣子務為恭順可也中曰責難於君乃為恭也金人復取蔡州閏二月癸酉金人破河州癸未御前右軍統制楊從儀率諸將攻大散闗拔之己丑廣東轉運判官林孝澤獻助軍錢十五萬緡湖南轉運判官黄績何佾獻四萬緡詔激賞庫收辛卯參知政事楊椿提舉在外宫觀椿為臺諫所擊四上䟽丐免乃有是命癸巳樞密都承㫖徐嚞充舘伴大金國信使權知閣門事孟思恭副之先是北使高忠建等將入境責臣禮及新復諸郡接伴使洪邁移書曰自古鄰邦往來並用敵禮向者本朝皇帝上為先帝下為生靈勉抑尊稱以就和好而岐國無故興師背盟自取夷滅竊聞大金新皇帝有仁厚愛民之心本朝亟諭將帥止令收復外不許追襲乃蒙貴朝首遣信使但一切之禮難以復仍舊貫當至臨淮上謁更俟惠顧曲折面聞乙未知盱眙軍周淙言富察圖們奴婢齊瑪自燕來報契丹侵擾金國等事上謂大臣曰上天悔禍夷狄相攻今先遣使請和則其國中可卜儻舊疆復還得奉祖宗陵寢尤見天意眷顧誠國家之福也三月甲辰緫領湖廣江西財賦句伯奮守司農卿緫領四川財賦王之望試太府卿以二人餉軍無闕故也丁未金國報登位使高忠建等入國門始忠建責臣禮及新復諸郡接伴使洪邁以聞且曰土疆實利不可與禮際虚名不足惜也禮部侍郎黄中聞之亟奏曰名定實隨百世不易不可謂虛土疆得失一彼一此不可謂實議者或又言土地實也君臣名也趣今之宜當先實而後名乃我之利權兵部侍郎陳俊卿曰今力未可守雖得河南不免為虛名臣謂不若先正名分名分正則國威張而歲幣亦可損矣戊申錄文宣王四十九世孫孔琯為右迪功郎四川宣撫使呉璘復德順軍璘初至城下自將數十騎遶城守陴者聞呼相公來觀望咨嗟矢不忍發敵氣索於是璘按行諸屯預治夾河戰地前一日當陣斬一將數其罪以肅軍諸將股慄乃先以數百騎嘗敵敵一鳴鼓鋭士躍出突我軍遂空壁來戰我軍得先治地無不一當十逮苦戰久日且呉璘忽傳呼某將戰不力其人即誅死鬭敵大敗遂遁入壁質明我再用兵敵堅壁不戰會天大風雪敵引衆夜遁璘入城市不改肆父老擁馬迎拜幾不得行壬子金國報登位使高忠建副使張景仁見于紫宸殿詔舘伴使徐嚞等以所定禮示之忠建固執上特許殿上進書及陞階猶執舊禮尚書左僕射陳康伯以誼折之忠建語塞乃請宰相受書康伯奏曰臣為宰相難以下行閣門之職忠建奉書跪不肯起康伯呼嚞至榻前厲聲曰館伴在館所議何事嚞徑前掣其書以進敵氣沮上嘉歎之癸卯金人圍淮寧府甲寅金人犯鎮戎軍丁巳言者請倣漢武故事詔侍從臺諫各舉内外之臣可備使命者以為緩急之用詔各舉一貟戊午金人䧟淮寧府金之叛盟也淮襄諸軍復得海泗唐鄧陳蔡許汝嵩壽等十州自是但餘四州而已己未上始御經筵自去秋以用兵權罷講讀至是復之權刑部侍郎黄祖舜進論語解義乃令國子監板行仍賜詔書奬諭辛酉上諭宰執曰近傳到敵中賞格卿等見否陳康伯曰見之上曰其意何如康伯曰觀其語云邊釁既生未底寧息恐是京師總兵蕃官所請欲復取所失州縣耳上曰朕熟金國用兵始末自尼雅滿斡里雅布等在時軍政極嚴不用賞典止用威脅其下而人自畏服今賞格如此之重必是人不用命也康伯等曰聖識高逺非臣等所及川陜宣諭使虞允文至西縣之東總領四川財賦王之望自利州往㑹之允文之出使也與京西制置使呉珙荆南都統制李道會于襄陽至是又與四川宣撫使呉璘會于河池前後愽議經畧中原之䇿令堇庠守淮東郭振守淮西趙樽守信陽李道進新野呉珙與王彦合軍于商州呉璘姚仲以大軍出闗輔因長安之糧以取河南因河南之糧而會諸軍以取汴則兵力全而饟道省至如兩河可傳檄而定遂驛䟽以聞先是之望數以軍興費廣為言朝廷令勸諭民户獻納之望因是親至梁洋諭豪民使之輸財焉壬戌上謂輔臣曰近大將入覲有以寳貨鞍馬為獻者惟馬不可闕餘皆却之葢慮以進奉為名公肆掊尅有害軍政耳時主管侍衛馬軍司公事成閔自淮東赴行在故上語及之上因言宫中平時服食器用無非儉素如彘肩豆腐間以供膳器皿之属亦無稜道今御厨所用是也朱倬曰當書之為後世法上曰此何足為後世法陳康伯曰此盛德事外間有未知者豈可不書是春淮水暴漲中有如白霧其闊可里所其長亘淮南北又有赤氣浮于淮南自高郵軍至興化縣若血凝而成者夏四月己巳殿中侍御史呉芾言大農之財一歲所入幾五千萬而内藏激賞不與焉㑹其多寡比景德全盛時十增其四地不足而賦加多則取於民者已盡不可以復求矣惟當痛節浮費葢今天下之兵内外何翅三十萬大農每歲飬兵之費幾十之九若更加募何以贍之今欲兵之足莫如核實不得令虛張人數揀其鋭驍汰其疲弱使人皆可用則官無費財是一舉而兩得之也時將士陳亡者衆軍多虛籍故芾言及之禮部侍郎黄中言足食之計在於量入為出今天下財賦半入内帑有司莫能計其虛盈請悉以歸左藏且引唐楊炎告德宗語曰陛下仁聖豈不能如德宗之為哉上善之辛未詔淮南新復州軍舉人許於近便州軍一處併試每終場十三人解一人上宣諭宰臣陳康伯等曰卿等曾詢訪今歲民間蠶麥何如向雖多雨二麥稍黄今已登場而價不聞翔踴朕己令外市繭以知其直二者約度雖小有所傷而成熟亦不減七八分矣臣留正等曰君人者養人者也食則憂天下之饑衣則憂天下之寒書稱文王卑服即康功田功則田功云者知小民稼穡之艱難不遑暇逸以就天下養民之功云爾此文王之所以造周也太上皇帝當蠶麥既成廼潜遣市于外因物之貴賤以察知歲之豐儉惟慮天下之民不得其所養如是則雖處九重之深而民之利病何患乎不知憂勤之心文王無以過之中興之業葢有所本矣壬申和義郡王楊存中還行在乃罷存中措置兩淮而以判建康府張浚兼之浚出入將相三十年素為士卒所畏愛至是復揔軍政皆樂為用癸酉蠲淮東殘破州軍上供銀絹米麥經緫制錢一年甲戌宰執論淮上屯田事上曰士大夫言此者甚衆然須先有定論用諸民乎用諸軍乎若論既定當先為治城壘廬舎使老少有所歸蓄積有所藏然後可為上又曰卿等用人當取慤實為上若好名沽激如畫餅然終不可食耳戊寅御史中丞汪澈參知政事辛巳總領四川財賦王之望得虞允文檄論對撥糴本事之望嘗為允文所薦及議軍儲二人始有隙甲申殿中侍御史呉芾言軍器監陳洪持禄茍容駕部貟外郎趙廱假手登第不當居天下清選上曰武臣子孫只宜為武官清望須還白屋今以將家居之則公議自然藉藉乃罷廱壬辰起居郎吕廣問權尚書禮部侍郎翌日上謂大臣曰廣問老成不沽激往時薦之者多因曰朕有一人材簿每臨朝臣下有薦揚人材者退則記姓名于簿遇有選用披而尋之無不適當陳康伯又論備邊當擇良將上曰偏禆中有驍男者卿等可以所聞見隨其高下具名以聞俟於諸軍汰去怯懦次第代之是月大雨淮水溢數百里漂溺廬舎人畜死者甚衆初金國為契丹耶律所擾威烏克衆數萬漸逼居庸闗金主褎大懼與其下謀謂威烏克兵勢如此若南宋乗虛襲我國其危矣設有所求當割河南與之既威烏克之衆内叛金國得威烏克戮之契丹之患息其割地歸本朝之意亦寢矣五月庚子秘書省正字周必大守監察御史壬寅興元都統制姚仲以大軍至原州之北嶺與金人合戰官軍大敗甲辰宰執奏近探報皆言黄河南北蝗蟲為災今已數年天意可見而江淮之間蠶麥大稔此實聖德所召上愀然曰去歲完顔亮興師無名彼曲我直豈無天理朕德不足以動天祖宗仁澤所致令幸蠶麥告登更望有秋設或邊事未息必可枝梧戊申御營宿衛使楊存中復為醴泉觀使御營宿衛司限五日結局辛亥鎮江都統制張子葢與金人遇于石湫堰敗之甲寅權户部侍郎呉芾入對上因論財賦在得人遂言川陜用兵全得一王之望之力大軍十數萬衆數月與虜角敵而蜀人不知他人安能辦此之望在蜀幾如蕭何之在闗中芾曰之望與臣有連其人為政尚嚴平日在蜀令行禁止故於財賦亦不督而辦上曰朕初不知與卿有連見大臣言之望婚嫁未畢亦欲令歸但蜀中不可無之望姑令在彼候事稍定朕當大用之癸亥上謂大臣曰自去年完顔亮犯順之後中原士民不忘祖宗之德歸正者不絕朕恐士大夫分南北彼此浸失招徠之意卿等可審處如有官能辦事者與沿邊差遣士人從便入學及令應舉其餘隨宜収恤如此則非惟已來者得安未來者聞之必欣慕而至於是陳康伯等次第行之判建康府張浚言軍籍日益凋寡補集將士必資西北之人能戰忍苦方為可仗臣體訪得東北今歲蝗蟲大作米價踴貴中原之人極難於食欲乞朝廷多撥米斛或錢物付臣措置招褒吾人人心既歸敵勢自屈詔以米萬石予之浚以為淮楚之人自古可用乗其困擾之後當收以為兵乃奏置御前萬弩營募民強壯堪充弩手之人以御前効用為名於建康府置營寨安泊詔皆從請於是兩淮之人欣然願就率皆強勇可用浚親訓撫之又奏差陳敏為統制敏起微賤聲迹未振浚擢於困廢中敏感激盡力圖報未幾成軍浚謂敵長於騎我長於步制騎莫如弩衛弩莫如車乃令專制弩治車甲子内降詔曰朕以不德躬履艱難荷天地祖宗垂裕之休獲安大位三十有六年憂勞萬機宵旰靡怠屬時多故未能雍容釋負退養壽康今邊鄙粗寧可遂如志皇子瑗毓德允成神器有託朕心庶幾焉可立為皇太子仍改名眘所司擇日備禮冊命四川宣撫使呉璘遣將攻熈州是月拔之獲其都緫管劉嗣初三大將之出也興州路得秦隴環原熈河蘭㑹洮州積石鎮戎德順軍凡十二郡金州路得商虢陜華州凡四郡獨敵以重兵扼鳳翔故散闗之兵未得進六月戊辰名望仙橋東新宫曰德壽己巳宗正少卿史浩守起居郎兼太子右庶子將作監張闡為宗正少卿兼太子右諭德故事宫僚進見當拜奏事當稱姓名侍立不坐太子悉命復故庚午以復與金國連和三招討並除管軍而結局大事記曰是時北方大亂内有耶律之變而我師之出興州路得十二郡金州路得四郡呉璘復大散闗入德順軍父老擁拜幾不可行命張浚判建康措置兩淮浚出入將相三十年衛士見之以手加額士卒聞之皆樂為用於是屯盱眙楚泗以扼渦潁又募海舟由海窺東萊由清泗窺淮陽而海州之役浚勉張子葢以功名子葢率精鋭先入敵大敗于石湫堰國勢非復前日矣奈何敵欲和則與之和欲地則與之地成閔呉拱李顯忠領三衙而三招討局矣王之望奏呉璘回興州而宣撫限五日結局矣意者聖心倦勤復仇之義將有待於後耶甲戌殿中侍御史張震右正言袁孚同班入見論宰相朱倬之罪倬聞亦丐免乙亥尚書左僕射同中書門下平章事朱倬罷為提舉江州太平興國宮制曰君子邦家之基曾未聞於成效元良天下之本乃欲覬於疇庸翰林學士洪邁之詞也上出御札曰朕宅帝位三十有六載荷天之靈宗廟之福邊事寖寧國威益振惟祖宗傳序之重兢兢焉懼不克任憂勤萬機弗遑暇佚思欲釋去重負以介壽臧蔽自朕心亟决大計皇太子賢聖仁孝聞於天下周知世故久繫民心其從東宫付以社稷惟天所相非朕敢私皇太子可即皇帝位朕稱太上皇帝退處德壽宫皇后稱太上皇后應軍國事並聽嗣君處分朕以澹泊為心頥神養志豈不樂哉尚賴文武忠良同德合謀求底于治詔洪遵所草也臣留正等曰堯以天下禪舜舜以天下禪禹揖遜相繼可謂盛矣然其傳也非父子至於成周自文王傳之武王武王傳之成王父作子述亦云美矣然而未嘗親授受也故夫以父子之親行揖遜之道其惟我國家乎仰惟高宗以知子之明順承天意濬發神斷全以所􅀈畀之壽皇而我壽皇荷付託之重十閏之間兢兢業業終始如一用能增光大業馴致丕平及夫倦勤萬機則又復舉神器授之聖子三聖矩疊規重葢自開闢以來所未有也於皇休哉龜鑑曰或謂揚子雲五百歲而聖人出有諸子曰堯舜君臣也而並文武父子也而處因往而推來雖千世亦可知也吁世之相去如彼其久也聖人繼作如此其少也堯舜文武之盛其可以數數見之乎我朝自建隆至紹興相去纔二百年太祖太宗以兄弟相禪高宗孝宗以父子相傳載之琬琰蔚為首稱留衛公正賛之曰堯舜揖遜盛矣然其𫝊也非父子文武述作美矣然其授受也不親以父子之親行揖遜之禮是高孝之美又將有光於堯舜文武矣顧不偉歟丙子上行内禪之禮有司設仗紫宸殿下先是上嘗諭太子以傳禪意太子流涕固辭至是遣中使召太子入禁中復加靣諭太子推遜不受即趍殿側便門欲還東宫上勉諭再三乃止於是上御紫宸殿百官起居畢尚書左僕射陳康伯知樞密院事葉義問參知政事汪澈同知樞密院事黄祖舜陞殿康伯奏言臣等輔政累年罪戾山積聖恩寛貸不誅今陛下超然高蹈有堯舜之舉臣等不勝欣賛但自此不獲日望清光犬馬之情無任依戀因再拜泣下上亦為之揮涕曰朕在位三十六年今老且病久欲閑退此事斷在朕意非由臣下開陳也卿等宜悉力以輔嗣君康伯等復奏曰皇太子賢聖仁孝天下共知似聞謙遜太過未肯即御正殿上曰朕已再三邀留今在殿後矣上即入宫百官移班殿門外宣詔畢復入班殿庭頃之皇太子服袍履内侍扶掖至御榻前拱手側立不坐應奉官以次稱賀内侍扶掖至于七八乃畧就坐宰相率百僚稱賀上遽興康伯等陞殿奏言願陛下即御座正南靣以副太上皇帝付託之意天顔愀然曰君父之命出於獨斷此大位懼不敢當尚容辭避臣留正等曰堯命舜以位舜遜于德弗嗣非獨謙德之美如此葢以天下重任授之者且不敢輕受之者其可以易乎臣竊觀壽皇之初受禪也壓於慈訓不得已而踐尊位側立拱手於黼扆之側已坐復興不敢遽即南靣迨夫輔臣懇請再三猶有此大位懼不敢當之語真可與舜匹休矣彼漢文帝之即位也東鄉遜者三南鄉遜者再而其臣袁盎者猶且以高世之行推之况於謙畏之心出於真誠者乎是宜大書特書以垂示萬世者也班退太上皇帝即日駕之德壽宫上服赭袍玉帶步出祥曦殿門冒兩掖輦以行及宮門弗肯止上皇麾謝再三且令左右扶掖以還顧謂曰吾付託得人斯無憾矣左右稱萬歲百官扈從上皇至德壽宮大事記曰歴觀高宗之所以立孝宗者雖出於范宗尹之造膝岳飛之密䟽張浚之建請趙鼎之賛决然以藝祖之後為嗣必本於選人婁寅亮之一言適有以契乎高宗之心藝祖在天之靈可以慰矣自六歲育于宫中起居飲食未嘗離膝下則其保之也至矣九歲封建國公置資善堂范沖為翊善朱震為賛讀令建國公見翊善賛讀必拜則其教之也嚴矣年十六封普安郡王時紹興十三年也秦檜雖有動摇國本之心而孝宗之聖德著明高宗之聖心堅定非檜所得容其私三十年立為皇子上曰朕志素定已九年矣三十二年立為太子未幾是月丙子上遂内禪皇太子即皇帝位太上皇帝居德壽宫又曰此事斷自朕意非由臣下開陳嗚呼盛哉太祖太宗兄弟相傳以開創業之基高宗孝宗父子相禪以植中興之業創之於先固所以為二百年太平之治興之於後又所以遺萬世無疆之休也丁丑車駕詣德壽宫起居戊寅有㫖朕欲毎日一朝德壽宮以修晨昏之禮昨日靣奉太上皇帝聖㫖謂恐廢萬機勞煩羣下不蒙賜許可委禮官重定其期禮部侍郎黄中奏謹按漢高皇帝五日一朝太上皇今欲乞依前項故事詔從之大赦制曰顧睿訓之愽臨懼𦕈躬之弗稱凡今者發政施仁之目皆得之問安侍膳之餘爰舉舊章用覃曠澤龜鑑曰凡今者發政施仁之目皆得之問安視膳之餘此非即位之詔乎進而得之諄諄之訓退而得之渾渾之書此非聖政之序乎炎興詔令命官裒集必欲恪意奉承是一政一事無不遵之也稽山宸翰分賜宰執目使奉以周旋是一字一畫無不敬之也侍從臺諫條陳事務重言責也亦檢舉紹興之制而行之也卿監百執事日輪靣對廣言路也亦舉行紹興之典而用之述太上之意以責守臣令長承太上之問而擇監司郡守知光堯之念岳飛則亟復元宫聞光堯之召尹焞則亟訪岩穴不愆不忘率由舊章吾於孝宗其見之又曰祖宗朝尊禮舊弼優待故老有任在京宫觀及入侍經筵者甚衆至於過闕入覲郊祀陪位并歸第就醫之類所以示眷禮便詢訪者惟恐不至故一時人臣立朝之節雍容可觀宜令國史院檢討聞奏當議遵用又曰應諸路出産時新口味果實之類所在州軍因緣貢奉煩擾致使所在居民以出産之物為苦不唯因口腹之故廣害物命亦使斯民冒犯險阻或至䘮失軀命豈不甚痛太上皇帝已降詔禁約切慮歲久未能遵奉自今一切並罷如州縣奉行滅裂因緣多取以違制論又曰國家愛養士卒非不優厚訪聞軍中管轄人等或使資陪工價或令科買物色多方尅剥比至請錢除減幾盡自今主帥仰各體國務加優䘏以養士氣如尚不悛當議顯戮以勵諸軍又曰昔太祖皇帝創業之初親製軍政以遺後世如南北倉請糧之制平時固欲習其筋力以戒驕惰然禁約私役至為嚴切自今不許私役戰士葢造私第營葺房廊修築園圃及興販工作等如敢更有違犯委御史臺彈奏當重宜典憲癸未宰臣奏事陳康伯因奏臣等以前二日朝德壽宫太上皇帝宣諭車駕毎至宫必於門外降輦已再三諭之既以家人之禮相見自宜至殿上降輦令臣等奏禀此意上曰夜來太上皇帝有㫖令朕只朝朔望朕於子道問寢侍膳尤宜勤恪卿等可詳議以聞如宫門降輦在臣子於君父禮所當然太上皇帝雖曲諭朕端不敢甲申詔朕躬有過失朝政有闕遺斯民有戚休四海有利病凡可以佐吾元元輔朕不逮者皆朕所樂聞言而可行賞將汝勸弗協于理罪不汝加監潭州南嶽廟朱熹上封事言聖躬雖未有過失而帝王之學不可以不熟講朝政雖未有闕遺而脩攘之計不可以不早定利害休戚雖不可徧以䟽舉然本原之地不可以不加意帝王之學必先格物致知以極夫事物之變使義理所存纖悉畢照則自然意誠心正而可以應天下之務又曰今日之計不過修政事攘夷狄然計不時定者講和之説疑之也又曰四海利病係斯民之休戚斯民休戚係守令之賢否監司者守令之綱朝廷者監司之本本原之地亦在朝廷而已丁亥詔曰朕惟太上皇帝臨御三紀法令典章粲然備具其議設官裒集建炎紹興以來所下詔㫖條列以聞朕當與卿等恪意奉承以對揚慈訓詔胡銓復元官差知饒州禮部侍郎黄中等劄子奉聖㫖太上皇帝有詔却五日之朝朕心未安有司宜詳議以聞臣等今詳議除旦望皇帝詣德壽宫朝見外欲乞於每月初八并二十二日朝見並如宫中之儀詔從之司農少卿朱夏卿奏今來德壽宫合支供米炭未承所屬報到數目詔劄與提舉官據毎月合用米炭前期報所属依數支供付户部施行壬辰殿中侍御史張震奏竊見紹興二年詔書略曰昔我太祖皇帝嘗令百官輪次靣對自今後行在百官日輪一貟而對朕當虛佇以聽其言且觀其行陛下初承聖緒欲望舉行舊典特降詔㫖許令百官日以序進則數月之間議論畢陳而賢愚可以槩見俟其既周即復依舊五日輪對亦不為煩詔從之大事記曰自即位初年詔百官五日一輪對自是引見一班或三四班而視其所由退而致察所行故王曉以朝見而除郎官王以陛辭而除御史鄭聞沈度以歸自輔藩而除樞􅁺宰属賈光祖論州郡不當獻羡的則曰議論人物有似楊輔近臣問郡守得對者孰為稱㫖則曰潘慈明氣寒周頡又下慈眀一等或内召小臣或特引布衣如朔如光朝如掞之皆以議論剴切即䝉擢用其後生氣驕言論卑鄙一經奏對悉了其為人故有晨奏事而暮批除夕引見而朝放辭者而碌碌者頗以輪對為憂此百官陛對之制而天日照臨賢否畢見也如此是月劄下工部長貳先將軍器所私役占破借使工匠盡令改正專一造作軍器務要精緻如敢依前違戾監官取㫖黜責合千人重行决配委御史臺覺察上手書召判建康府張浚既見上改容曰乆聞公名今朝廷所恃惟公浚言人主以務學為先人主之學以一心為本一心合天何事不濟所謂天者天下之公理而已必兢業自持使清明在躬則賞罰舉措無一不當人心自歸醜虜自服上竦然曰當不忘公言浚見上天錫英武力陳和議之非勸上堅意以圖事功於是加浚少傳進封魏國公除江淮宣撫使節制屯駐軍馬右正言袁孚言乃六月中旬霖雨累日浙西州郡以山水發洪壞廬屋舟楫而人被其害近又聞江浙之間飛蝗為害此二者同出於一月之内天其或者仁愛陛下之深警戒陛下之切欲陛下脩德以應之乎秋七月壬寅詔曰永惟邦本實在斯民民之休戚實繫守令太上皇帝精擇循良留神惠養垂及𦕈躬其敢怠忽咨爾分土之臣毋滋獄訟毋縱吏姦毋奪民時以事土木毋掊民財以資餉遺有一于此必罰無赦至於俾民安其田里愁嘆不生增秩賜金若古令典臣留正等曰舜之承堯咨十二牧在命九官之前葢民者邦之本牧民者政之本也堯之時黎民既已時雍天下既已無窮人矣及其咨舜猶首及於困窮之民此舜之咨牧所以必首之以食哉推時也壽皇臨御之初首􅄒太上之意戒守令以四事嚴之以必罰而勸之以厚賞聖聖相承事務惠養真堯舜之用心而有宋之家法也丁未賜知臨安府趙子潚御札罷京尹供饋營辦上曰更宜子細求訪應有擾民之事一一條具聞奏如今次停罷供饋等所省錢二萬餘貫可以盡與民間除去科擾戊申詔追復岳飛元官以禮改葬訪求其後特與錄用是日地震大風拔木癸丑詔御前激賞庫並撥歸左藏庫今後諸路發到綱運准此己未詔職田米自今輒敢折納見錢並計贓坐罪臣留正等曰興亷黜貪帝王所以善俗也古者卿以下有圭田以圭名取於純潔欲其食之以養亷今之職田是也月奉之外有此歲入可以自養然猶未滿其欲而高其直以取錢將以勸亷而反以資貪可謂背戾之甚此宜明聖所以加誅也辛酉招進士李珂議論可採召赴都堂審察又詔今後直言上書並付中書門下後省㸔詳有可採者申尚書省取㫖壬戌詔將來聖節諸路監司州軍應合進金銀錢絹等緣天申聖節已行進奉合進之數權與蠲免判建康府張浚奏臣靣奉聖訓令措置收糴米斛今來江浙豐稔宜趂時措置其糴本乞從御前支降詔内庫支降銀三十萬兩癸亥殿中侍御史張震奏四川有名無實之錢遞相積壓州縣各據本年分所收錢物貝鈔赴總領所送納而緫領所即據其已前年分所欠之數批改鈔旁理作舊欠則舊欠雖足而新欠仍在恭覩登極赦文積年未納之錢截自紹興三十年以前並與除放甚大惠也應州縣納總領所鈔旁若已改批作三十年以前所欠並聽執用元鈔作本年分改正豁除詔從之先是敵遣僕㪚忠義及紇石烈志寧經略四州地為我師所敗於是以檄至盱眙軍云既有通和之意自宜各守元立封疆邊臣以聞乃下詔曰敵人來索故禮從之則不忍屈辱不從則邊患未己中原歸正人源源不絕納之則東南方不能給否則絕向化之心宰執侍從臺諫各宜指陳定論以聞羣臣繼有論列而宰執獨無奏章上以問參知政事史浩浩奏畧云先為備守是謂良規若夫議戰與和則亦在彼不在此彼戰則戰彼和則和和不忘戰姑為雪耻之後圖戰不忘和乃欲緩師而自治又曰第當堅壁力禦攻衝謹俟乗機以圖恢復先是史浩議欲滅𤓰洲采石下張浚議浚謂如此是示敵以削弱之形不若先城泗州浩既參知政事浚所規畫浩必沮撓如不賞海州之功沮死驍將張子葢㪚遣東海舟師皆浩之為也命參知政事汪澈視師湖北京西是月劉珙使金不至而復先是洪邁張掄使回見張浚具言敵不禮我使狀且令稱陪臣浚謂不當復遣使而史浩議遣使報金以登寳位竟遣珙行至境金責舊禮不納而還八月乙丑朔詔知閣門事孟思恭奉使受賂可罷見任丙寅詔曰永惟民之戚休繫于牧守咨爾部使者其悉乃心察列城之政舉循良劾貪暴及踈怠曠職者以聽陞黜至於任非所長無他大過者亦條列以聞朕當命以他官其令諸路帥臣監司限兩月悉具部内知州治行臧否連衘聞奏丁卯詔祖宗格法差破禁軍自有定數比年三省樞密院諸房及百司例作名目差占抽強壯披帶之人以充擔擎看管雜役實為蠧兵之弊仰諸房百司除依數目差破餘令拘收如敢影占重寘典憲辛未諫議大夫任古奏孟思恭奉使受賂而朝廷不能正其典刑夫人之有過而不能治在國法為可廢國之有法而不能施在朝廷為可羞願陛下澄源塞流使斯輩貪利敗國之心潜銷于㝠㝠之中則專對于外可以無辱命之憂乃降授武功大夫吉州刺史戊寅上詣德壽宫奉上光堯壽聖太上皇帝壽聖太上皇后尊號冊寳行禮追冊皇后郭氏初后歸于潜邸愭愷惇皆其所生云九月丁酉詔朕仰稽祖宗故事開講其日可召輔臣觀講戊戌詔比下求言之詔欲急聞過失四方有獻言者並付後省看詳今已踰月未聞推擇來上可令催促詔蜀去行都萬里人材豫當儲蓄以備緩急欲舉一忠殻明敏之士周知蜀利害者為都轉運使可令集侍從臺諫各舉所知以俟採擇甲辰侍讀洪遵進讀三朝寳訓至太宗問君子少小人多何也呂蒙正曰此繫時運盛衰上曰朕以為不然正在人君如何臣留正等曰大哉壽皇斯言真可為萬世法也人君一心之取舎君子小人消長之機也何則君子所向者為公正為忠直小人所向者為私邪為佞柔君子所守者一定而不可移小人則觀望希合隨時上下而無所主是以君子之道常直而難合小人之言常遜而易從自非聖智不惑之君未有不屈彼而伸此者昔者舜禹共兠雜處堯朝堯能賢舜禹而退共兠故大治孔子與季孟皆仕於魯魯公賢季孟而退孔子故大亂由是觀之君子小人之消長果何係乎時運盛衰哉特在人主取舎何如耳壬子户侍周葵等言臣僚於合得請給數外陳乞援例增添今後並從本部稽察雖有舊降指揮許執奏不行詔從之甲寅詔胡銓王十朋並召赴行在周操除右正言臣留正等曰舜湯選舉不仁者逺人君即政之初天下特觀其一舉措之間足以逆覘其治象之為何如也壽皇嗣登大寳妙束人材如銓如十朋如操者顧未可亟以臯陶伊尹之事業聞之然其砥節勵行實當時海内之所傾心者也乃於一日之頃或賜之命召或擢之諫垣使朝廷凡所召用類皆如此豈不足以大慰天下之望哉舜湯得其一壽皇有其三其光明盛大之舉不止加前哲一等矣易曰聖人作而萬物覩萬物之覩覩此而已顧不休哉龜鑑曰敬觀高宗尊號之上名曰光堯是以堯尊其父而以舜處其子也重華叶帝之事亦嘗講聞其大畧乎舜典一篇乃舜即位初年之事而紹興已受禪之後隆興未改元之前孝宗初政即此而論之真可同日語是故戊寅大赦其與𤯝災肆赦同一心丁亥寛䘏其與欽哉惟䘏同一意時政有闕許令直言其明四目達四聰之義歟咨爾分土之臣明示朕意其咨四岳咨十二牧之舉歟循良貪暴陞黜有詔是何異三考之黜陟貪利受賂明正典刑是何異四凶之誅殛尊禮舊弼如勉留康伯再相魏公即因堯輔佐之遺意也収召善類如起胡銓叙王十朋擢周操即十六子堯不能舉而舜舉之也瑟之万絃玉之始琢聳人觀聽表表若是以即位之一年攷之則二十八年之聖政皆可自是而推矣庚申給事中金安節等奏奉聖㫖福州居住致仕王繼先已經大赦可令任便居住臣竊以王繼先罪惡稔積羣情久憤太上皇帝用公議逐之天下稱快欲乞寢罷令任便居住指揮詔王繼先依赦任便居住不得輒至行在壬戌詔呉幬劉藻黄開陳騤陳岩肖周允聞沈堯聞沈堯咨汪必明禇觀劉祖禮上書皆已親覽有補治道京朝官可減二年磨勘選人與循一資布衣進士與免將來文解一次是月封皇子愭為鄧王愷為慶王惇為恭王冬十月丙寅侍讀洪遵讀三朝寳訓至真宗論政理謂宰相曰朝廷但守清靜之理凡事務詳酌而行勿使庸人擾之上曰天下本無事遵對曰誠如聖諭詔侍從兩省臺諫卿監各舉可任監司郡守之人分為二等一見今可用一將來可用限一月聞奏如所舉増秩賜金舉主同之不如所舉罰亦同之及見任監司郡守才與不才亦限一月内逐一具姓名臧否品目來上左僕射陳康伯乞解機政御筆曰太上皇帝儲卿以佐朕卿遽力請豈朕凉菲不足與為治況今邊陲未為無事卿縱欲捨朕而去寧忍違太上皇帝之意耶太上御筆曰皇帝來奏卿上章力乞解罷欲吾親筆諭卿皇帝以卿元老耆舊方委任機務留卿之意甚堅卿可體至意不得再有陳請丁卯大理少卿李洪引見奏事上曰陸亷公事候將來結案日更來奏知江淮宣撫使張浚劄子奏臣近措置招集御前萬弩手其所招人多是莊農間有稍稍出衆之人恥與為伍臣昨乞别置武騎毅士三百貟以待謀慮過人勇敢絕衆者至今未蒙指揮臣續體訪得淮北歸正忠義及見今將佐之家往往有武勇壯健曾習弓馬者甚多以所請既薄不願前來契勘諸軍見招武勇効用毎月食錢九貫米九斗皆是旋刺南兵艱於教習今來大約可將武勇効用三人請受以給毅士二名詔從之庚午侍讀洪遵進讀寳訓至太祖嘗視朝罷坐便殿俛首不語者久之内侍王繼恩請其故太祖曰爾謂帝王可容易行事乎朕早來乗快指揮一事史官必書於簡冊故不樂也上曰若朽索之馭六馬何敢輕忽又曰為人上者奈何不欽又讀寳訓至太平興國九年太宗謂宰相曰朕毎日所為自有常節行之已久甚覺得力凡人食飽無不昏濁儻四肢無所運用更復就枕血脉凝滯諸疾自生欲其清爽其可得乎上曰祖宗不特明治道又達養生之理所以治道清靜又讀至綾錦使王賛上織錦匠兇濫之罪上令引對反言賛私役工庸鞫之皆實特詔杖賛降秩賜織匠采帛上曰祖宗精於治道如此遵奏云願陛下以祖宗為法天下幸甚右正言周操奏國家内設百官必資久任以責成效今則不然自丞簿不數月望為郎自郎不數月望為卿監利於速化人則幸矣職業不修國家何賴若乃監司郡守之數易則其害又有大於此者監司一易則擾一路郡守一易則擾一州臣願陛下靣諭大臣自今内外除授之際恪意精選務在久任詔令三省遵守編類聖政所詳定官徐度劄子討論慶歴至建中靖國所載勲臣名次或有未盡悉令添入元祐靖康建炎以後有合籍記者已降指揮令聖政所接續編纂今申請乞下吏部盡數抄錄併移文諸路搜訪勲勞實迹繳申朝廷詔從之壬申右正言周操言三省有六房其屬為六部而御史臺有六察所以相為表裏也祖宗之意正欲御史糾六房六部之稽違者今之六房六部人吏積習玩侮情弊百出欲望申嚴行下六察官毎月糾察所𨽻官司親加詢究小事具奏大事隨長貳上殿庶幾察官各舉本職詔令檢舉見行條令施行甲戌詔諸路州縣老疾貧乏乞丐之人在法以常平米斛養濟自十一月一日起支至次年三月終令户部檢坐條法指揮申嚴行下務行實惠丁丑殿侍張震奏兩宫冊寳執事者例蒙慶賜奉承于兩宫者皆已拜官爵而吏胥無知舞文巧請尚書省人吏大者幹官與減二年磨勘小者減半而太常寺等處人吏又不與焉此何為者願明降指揮並行追寢詔從之戊寅殿中侍御史張震奏切見去年李顯忠所保明獚澗山賞並采石賞與呉璘保明方山原賞隴州賞厚薄不侔如臣愚見欲立為功賞格式頒下諸將如拔某城斬某將破某衆者謂之竒功其次為第一第二第三等各當轉若干官並須各有實狀就其軍中以次保明推恩詔令檢正左右司同共看詳立格聞奏右正言周操奏去冬敵騎退歸諸將貪天之功以為已力節次奏功數日浩瀚略無限節欲乞下張浚陳俊卿公共商議如何措置以杜僥倖詔令張浚陳俊卿覈實聞奏是月以王之望為川陜宣諭使時敵將合喜方與呉璘爭德順軍或生棄三路之議宣諭使虞允文力請勿棄章十餘上乃罷允文而命之望詔璘審度事勢從長措置務要保護川蜀葢示以棄地之意也尋詔允文往璘軍前計事畢赴行在賜樞密院編修官陸游尹穡進士出身以權知院史浩同知黄祖舜之薦也十一月甲午殿中侍御史張震奏論國子監已減正録二貟不宜復置上曰館職學官祖宗設此儲養人材朕欲待方來之秀不可定貟丙午臣僚言近日於淮東西緫領司各樁苗米一百萬石備宣撫司移屯支用内撥浙西常平米一十三萬二千餘石往淮東江東常平米三十七萬四千餘石往淮西切惟常平一司葢備水旱盗賊緩急之用積年陳腐及移易借兌殆居其半一旦三分取一兩路所積幾無餘矣間遇水旱盗賊之變將何以為備乎詔户部看詳户部申乞於兩浙漕司和糴米撥一十三萬二千餘石赴淮東江東西漕司和糴米并江西上供米建康中納米九千石共三十七萬四千餘石往淮西其江浙常平米更不取撥從之庚戌進呈方滋論沙田䟽上問沙田事或以為可取或以為可捐陳康伯等奏曰君子小人各從其類小人樂於生事不惜為國歛怨君子務存大體惟恐有傷仁政此所以不同上曰然廼詔措置沙田蘆場指揮更不施行甲寅殿中侍御史張震言竊見乾德四年詔曰自今内臣年及三十以上兼見在朝廷繫職方許養一子至皇祐五年詔内侍以一百八十人為額嘉祐中韓絳奏内臣貟多請住養子至治平以後始復許奏薦而熈寧中神宗諭輔臣曰方今宦者數已多而𨽻前省官又入内空絕人之世仁政所不取且獨不可用三班使臣代其職事乎呉充對曰此盛德事臣等敢不奉行至於自來條例又須限以年甲試以詩書籍定姓名遇闕撥填宜立為定制詔令内侍省開具見在人數聞奏今年會慶節權免進子乙卯臣僚言祖宗時贓罪削籍配流者雖會赦不許放還叙用近覩登極赦應命官除名追降官資及勒停并永不取叙人並與叙元官甚失祖宗痛繩贓吏之意乞自今官吏嘗經勘斷犯入已賍並不許収叙如有已放行収叙者即為改正從之辛酉御史中丞辛次膺奏臣恭奉詔書除常朝便殿引對外應行事陪位立班從駕及非泛朝謁並諸請假并已降指揮殿下令閤門人扶掖今後如遇德壽宫起居臣欲乞趂赴立班許臣就用本臺知班二人扶掖從之又詔張燾朝謁禮數並依辛次膺已得指揮仍許乗轎入出皇城門至宫門内上下馬處參知政事督視湖北京西軍馬汪澈言荆鄂兩軍屯守襄漢粮斛浩瀚悉泝漢江霜降水落舟膠不進舟人逃遁官物耗散而軍食又不繼臣今者相視得襄陽古有二渠長渠溉田七千頃木渠溉田千頃自兵火後悉已湮廢臣今先築堰開渠并合用牛具種糧或募民之在邊者或取軍中之老弱者雜耕其中來秋穀熟量度収租以充軍儲既省餽運又可安集流亡乞以措置京西營田司為名令姚岳兼領從之十二月戊辰詔今日早朝集侍從臺諫赴都堂條具方今時務仍聽詔㫖詔曰朕覽張燾所奏犂然有契于𠂻已令侍從臺諫集于都堂今賜卿等筆札冝取當今弊事悉意以聞退各於聽治之所盡率其属諭以朕㫖使極言之毋得隱諱朕將有考焉初張燾以故老召除知樞密院事上問為治之要燾因奏言太上皇帝紹興初嘗舉行祖宗故事詔百官赴都堂令條具當今弊政與夫捄之之宜乞檢舉行之故有是詔癸酉給事中金安節言承指揮成彦忠皇城司任滿賞并兩任翰林司滿賞特與遥郡上轉行兩宫按尚書省右選令諸武功大夫實歴邊任有五人保舉磨勘轉遥郡刺史已後並理十年轉遥郡團練使至遥郡防禦使止祖宗之法不輕以授人如此彦忠今年五月方轉遥郡刺史今來半年於刺史上轉行兩宫則是二十年磨勘五月之内一旦得之於考績之法無乃戾乎欲望付有司依格施行詔從之給事中金安節覈駁劉允升皇城司濫賞曰凡外之將帥効命邊庭亦必有功而後加爵豈可以僥倖一時微賞而反過於親臨行陣出入萬死一生者乎今劉允升幹辦皇城任滿比之去年立軍功者勞逸異矣遽以一官轉承宣使其以承宣為皇城任滿遂將轉節度使乎竊恐行之則將士解體望愛惜名器以待勲勞從之庚辰臣僚言國朝檢校官一十九貟上者曰太師太尉太傅太保司徒司空而除授則自司徒遷太保各以序進陛下方講修聖政冝下有司討論立為定式給事中黄祖舜等言看詳臣僚所陳六事其一曰六等檢校官舊制也今則皆無句而自節度徑除太尉歴開府儀同三司以至少保其二曰節度以移鎮為恩寵舊制也今則一定而不易其三曰承宣分大中小鎮觀察分大小州舊制也今則皆徑作一官矣其四曰横行自右武大夫以至通侍為十三等以待年勞及泛恩者非有功致顯著不帶遥郡舊制也今則自右武大夫當遷官者率於遥郡改轉纔五遷即至遥郡承宣一落階遂為正任承宣使其五曰武功大夫實歴十年用七季正始轉行舊制也今或自小使臣為宣賛舎人纔遷一官徑至右武郎其六曰總管鈐轄都監分去等差遣非正任觀察使及管軍不以為緫管舊制也今降此而得之者紛紛皆是逐項所陳委得允當欲乞施行自降指揮日為始詔並從之辛巳起居郎兼權中書舎人周必大奏皇叔蘄州防禦使士豢湊用恩平郡王璩減年磨勘轉官竊見南班正任十年一轉初無回授之法又宗室歲得減年依條許與子孫遥郡刺史以下収使今士豢於恩平郡王璩實為叔祖乃用姪孫減年於法為不合於體為不順一也法許用之於郡刺史以下今乃施之於正任防禦使以上相去遼逺二也欲望追寢前命從之上曰昨聞臣僚言秦檜誣岳飛舉世莫敢言李若樸為獄官獨白其非罪呂忱中發王晌所司皆迎合林待問為勘官獨直其寃狀卓傑捕趙鼎送葬酒又搜其家私書欲傅致士大夫之罪翁䝉之為縣尉毅然拒之沈昭逺為王鐵家治盗欲煅煉富民多取其陪償王正已為司理卒平反之此皆不畏強禦節槩可稱三省詳加訪問其人如在可與甄録丁亥内降付下寛䘏事十八條内一項訪聞諸路鄉村惡少無賴以販鬻私茶鹽為業良善之民多被強賣稍不聽從日後犯敗必行供指逮得賄賂乃與除免自今應犯販私茶鹽不得信慿供指妄有追呼違者許越訢承勘官吏宜重寘于法又一項訪聞州縣捉獲盗賊獄吏輒教令廣引豪冨之人指為窩藏至有一家被盗鄰里富室為之騷然賊情未得而胥吏之家賄賂充取平居富民或與吏輩小有眦睚一得賊徒使之通注其禍尤酷自今除𦂳切干證外不得泛濫追呼如違許越訴别移所司推勘指教舉節吏人反坐官貟重作施行臣留正等曰昔史臣論漢宣帝興於民間具知閭里奸邪吏治得失及親踈孜孜民事選良二千名與之共理詔㫖惻怛為民而下者大半卒之吏稱民安為漢中興之主壽皇即位未三月内出寛恤十八事凡民情之疾苦纖悉委曲無不周知如州縣秋苗官吏規取溢數以濟貪暴如豪右兼并圖免過割致貧民産去税存之害與夫一時搶攘甫定之際所以勞來安集之䇿未易以槩舉至於治私販鞫盗賊有司並緣為奸尤切致意可謂憂民之憂矣二十八年之間撫摩愛養民安閭里道洽政治豈非知所先務哉今二者之弊州縣積習民猶以為病申敕之可也故特詳著焉龜鑑曰讀寛恤十八事之語真見其有勤求民瘼之心讀毋縱吏奸毋棄民時之語真見其有勤恤民隱之心聞林機之論則責以不體朕意聞王大寳之對則諭以不可擾民江東之和糴既免福建之上供復蠲官司之貼換纔除而芻藁之樁積繼罷出内帑銀絹以輸民租出爵募民以激富室或賜僧牒或賜米斛以恤饑荒或置社倉或置屯田以備水旱江東得劉恭父而民不饑浙右遣朱文公而民得飽矜憐惻怛是其仁民之實者然也又宣䘏事内令省部係政令之原人吏他日出職當在民上所宜亷謹以立基本訪聞積習成弊官貟士庶理訴公事賄賂未至則行遣間回問難不已所求如欲則雖不可行亦必舞法以遂其請有此等被抑之人許詣登聞鼓院陳訴當議重寘于法是月命宰相陳康伯兼樞密使詔呉璘班師詔下寮属交諫曰將在軍君命有所不受此舉所係甚重奈何退師璘知朝論主和於是棄德順軍倉卒引退敵乗其後正兵三萬得還者僅七千人偏禆將佐所存無幾上尋悔之是冬上召陳俊卿及張浚子栻赴行在所浚請臨幸建康以動中原之心用師淮堧進舟山東以遥為呉璘之援上見俊卿等問浚動靜飲食顔貌曰朕倚魏公如長城不容浮言摇奪時敵以十萬屯河南聲言窺兩淮浚以大兵屯盱眙泗濠廬敵不敢動第移文索海泗唐鄧商州及歲幣浚言敵詐不當為動卒以無事栻之見上也即進言曰陛下上念宗社之讎恥下閔中原之塗炭惕然於中而思有以振之臣謂此心之發即天理也願益加省察而稽古親賢以自輔毋使其少息則今日之功可以立成上大異之宋史全文卷二十三下
