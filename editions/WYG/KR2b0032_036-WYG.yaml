body:
  text: 宋史全文卷三十六宋理宗六己未開慶元年正月乙巳朔詔朕臨御以來于今三紀小心翼翼夙夜不敢康寧方今國事正殷四郊多壘環視宇内罕如人意皆前日因循茍且豢飬偷惰滋至於今可不戒哉載更丕化肇紀新元頼爾股肱惟良暨中外小大之臣茂迎天運相與維新以公心奉公法以實政圖實效使元氣壯而精神衛中夏安而逺人服庶幾祖宗開寳慶厯之盛則予一人以懌都省言蜀報日急㓂犯忠涪浸迫䕫境詔蒲擇之馬光祖應戰守調遣照便冝指揮行辛亥都省言戍蜀官兵頻年戰禦酷暑隆冬暴露可憫合與更戍今正當捍禦之時詔蒲擇之加撫重犒候防春畢日更替癸丑詔吕文德築城黄平深入蠻戎撫輯有方進官三等庚申李曽伯奏䝉古犯雝筦知濵州吕振龍知象州奚必勝輒離官守而遁横州守臣劉清卿乃能設隘堅守一郡按堵詔振龍必勝並追毁拘管外州清卿進官一等壬戌上曰北騎盤泊涪州不可不速為驅逐之計大全奏今日備禦莫切於兵與食癸亥大全奏士大夫干請州郡者甚衆上曰遴選人才宰相責也千里之寄未容輕畀冝審處之以雪寒出封樁庫十八界楮幣二十萬賑三衙諸軍丙寅上曰海道戍兵雪寒可念與在城寨者不同可量與給犒一次大全奏敬遵聖㫖丁卯詔賈似道以樞密使為京西湖南北四川宣撫大使都大提舉兩淮兵甲湖廣總領知江陵府時蜀帥蒲擇之以重兵攻城都不克敵人傾國舉兵南伐破利州隆慶順慶諸郡閬蓬廣安守將相繼降北又為浮梁於涪州之蘭市蜀道梗絕故有是命辛未上曰中外之兵皆貧蜀兵尤甚驅餓卒而嬰强敵其不誤事者幾希大全奏舊歳行下蜀閫増支口劵正為此也壬申上曰郭濬一兵帥亷實可取士大夫亦難其人且當留之維揚癸酉雷上曰昨日降出白劄子中間言湖南築城欲勸富民助之决不可先須節帖去此一段大全奏聖天子仁民一念上通于天己巳以權吏部侍郎兼國子祭酒權直學士院張鎮知禮部貢舉起居郎兼侍講呉衍太常少卿兼權中書舎人王景齊同知貢舉左司諫沈炎監試二月乙亥朔御札付知貢舉張鎮已下擇體國籌邊尊主庇民之學詔京湖制置司參謀官王登素懐忠義累著勲勞提兵援蜀曽不辭難功未及成而殁特贈官五等合得致仕恩外更官其一子己卯上曰朕自即位以來嘗以憂勤為心未嘗一日以位為樂大全奏昔文武始於憂勤終於逸樂今聖心一於憂勤過文武逺矣乙酉上曰向士璧提師已到忠州忠赤可取大全奏當國家多事之時正臣子捐軀報國之日若人人能如士璧之忠則邊事不足慮矣詔疆埸未戢調度尚繁出内庫十七界楮幣三千萬以助支賞丙戌以馬光祖為資政殿學士沿江制置大使江東安撫使知建康府丁亥上曰蜀中之警皆因馬湖江不能設備縱其偷渡今江之南北皆有哨騎所以重費區處壬辰都省言州縣之間多行苛政獄訟又且淹延非所以愛民也有詔令御史臺下諸路提刑司戒飭令務要政平訟理違許按劾以聞出平糴倉米二萬九千九百石有竒賑都民三月己酉都省言北兵見在涪州蘭市大渠縛橋及在江南作過姦謀叵測合行痛𠞰乞立賞格以激將士詔如能出竒斫橋襲寨有顯著者旌賞有差癸丑上曰蜀中死節之士如雲頂山等處將士皆當褒録其後庶可為天下勸大全奏謹遵聖訓丁巳以吕文德為保康軍節度使四川制置副使知重慶府戊午上曰近有言備邊之䇿當於江北做規模不當於江南做規模大全奏今日處處風寒皆當預講又豈止於江北辛酉雨土己巳上曰向士璧捐家貲百萬提師援蜀殊可嘉尚近日賈似道移司荆蜀犒軍尤重厚不易得也大全奏大抵用兵行師以輕財為先四月乙亥都省言段元鑑楊禮堅守城壁殁於王事忠赤可褒詔各贈節度使封二字侯立廟致仕恩外更官其一子甲申上曰昨日李遇龍之報言王堅忠節守城拒敵萬折不回真可為列城之倡更當旌賞大全奏敢不欽承聖訓乙酉都省言知施州謝昌元自備百萬緡米麥千石剏築城壁于倚子山合與推賞詔進官一等辛卯朝獻景靈宫詔諸道提㸃刑獄以五月按理囚徒五月庚戌上曰監司郡守儻果循良只冝因任不必數易以重州郡將迎之費大全奏敢不上遵聖訓辛亥上曰諸蠻乃覊縻之國且與疆敵為鄰不可不申飭邊郡以固結其心大全奏此事已累次行下乙卯宣司奏蜀江雪漲水冐橋趾吕文德等與宣司所調兵數戰皆克攻斷浮梁詔立功將士遷補有差以權工部侍郎兼侍讀翁應弼秘書少監兼權直學士院崇政殿說書洪芹祕書郎兼資善堂直講史若訥為殿試詳定官丙辰御集英殿䇿進士丁巳御後幄閱武舉進士射乙丑詔鑄新錢以開慶通寳為文戊辰上曰呂文德將達重慶合渝守城之賞不可緩大全奏欲待文德申上斟酌推賞上曰亦須先降指揮以激昻將士之氣辛未賜正奏名進士周震炎以下四百四十二人及第出身同出身壬申賜特奏進士三百九人六月甲戌宣司奏吕文德乗風順戰勝遂入重慶御筆蜀事方殷軍力勞瘁披堅者疲於戰鬭服業者苦於流離間有脅從亦非本志興言及此痛在朕心聿新閫權期復舊觀仍降詔撫諭御筆吕文德身先士卒攻斷橋梁蜀道已通忱可嘉尚令學士院降詔奬諭辛巳以朱熠為參知政事饒虎臣同知樞密院事己亥上曰吕文德入重慶既畀之以閫寄又寵之以齊鉞可謂榮矣猶未肯領何也大全奏文德受國厚恩正捐軀報國之日此畨宋良信賫印授往不容辭矣御筆賈似道將指于宣勇往就道遣援軍餉動中事機曽日月之幾何覺氣象之頓異賢勞忠赤委有可嘉令學士院降詔奬諭辛丑上曰吕文德力辭閫寄可敦勉之况合州之圍已解亦其應援之力大全奏君命豈可有辭之理終須領職壬寅太白晝見七月丁未上曰日來郡守多不安於久任坐席未温便欲謀進大全奏更迭祖宗成法亦須民庸既著方可寘之朝列辛亥太白入井戊午詔四川選人應闗陞磨勘改官銓審守臣申辟倅令可從舊𨽻宣司審量癸亥以蔡抗薨輟視朝甲子上曰蜀閫之命文德尚辭恐失事機大全奏聞已遣兵遣將况蒲擇之既出峽尤不可辭其責八月壬申朔上曰蒲擇之已出峽文德未肯受命頼李遇龍任責經理但糧頗艱冝急催趣大全奏當下宣司俾承聖訓詔令户部下諸路申嚴州縣増收租米斛面之弊丙子上曰近聞邊閫科降之數頗多只得挨那應之大全奏邊面既闊備禦亦廣科降之數十倍常時所仰者楮耳印造多折閱之患不容不預為之慮丁亥上曰兩日之雨如傾深為歳事之憂夜來幸稍霽大全奏此皆聖德所感庶穡事不壞於垂成戊子上曰江塘近為潮水衝决冝急修整大全奏昨日顧嵒過臣已面趣之丁酉上曰連日之雨恐害穡事大全奏朝廷寛恤之政已備講行復命從臣禱于羣祠庚子上曰且喜晴霽歳事可保大全奏此皆陛下力行好事感格如此是夜太白犯權火星乙巳都省言兩浙雨多詔漕司行下諸郡縣守倅令佐親詣寺觀神祠精加祈禱是日䝉古犯滸黄州攻圍鄂渚壬子賈似道奏水陸之師至于鄂時韃國兵大入值沿江制副征魚湖利虐甚漁人獻舟於北遂自黄州沙武口透渡江南中外震動丁巳上曰聞魚湖清野不早致被北騎衝突奪民船為筏在江面作過不可不亟為之備大全奏須得上下流戰艦夾擊方可遏其勢已下宣司江閫矣右諫議大夫戴慶炣奏濵江一帶兵衞單弱向裏防拓路頭散漫事勢豈可與尋常哨掠者同日語今須急作規模大為措置引咎責躬痛自克勵以振起天下忠臣義士之氣博求謀畫號召材武使吐竒計出死力以衞社稷亟命宣閫副閫水陸夾擊共期肅清詔從之庚申以觀文殿大學士崇國公呉潜為醴泉觀使兼侍讀奉朝請戴慶炣為端明殿學士簽書樞密院事御筆朕德不類寇闖上流省躬引咎惟自克責然祖宗深仁厚澤涵飬之天下豈無忠臣義士奮勵感發出力以衞社稷者諸閫各擁良將勁兵亦當同謀叶智勿以限界為拘共圖偉績可降詔勉諭尋詔出内庫楮幣一千萬銀絹五百疋兩付宣司楮幣五百萬銀絹三萬疋兩付副司支費仍備黄榜軍前曉諭所調淮東五萬兵令監察御史陳寅催促進發癸亥以趙葵判慶元府沿海制置大使乙丑詔鄂渚事勢殊急更令侍御史沈炎往沿江制副司督趣調兵再出内庫楮幣五百萬銀絹二萬疋兩付兩淮制司楮幣二百萬銀絹一萬疋兩付沿江制司支費丙寅詔上流事急令侍從臺諫卿監郎官赴都堂集議以聞以賈似道兼節制江西二廣人馬通融調度應援上流馬光祖進司江州史崖之進司壽昌軍丁卯以邊事孔棘命羣臣奏告天地宗廟社稷宫觀嶽瀆諸陵戊辰太白犯熒惑十月壬申丁大全罷以觀文殿大學士判鎮江府以呉潜為左丞相兼樞密使賈似道為右丞相兼樞密院使茂國公宣撫大使等如舊以趙葵為江東宣撫大使庚辰御筆令學士院降詔自今月十一日為始避殿減膳徹樂以示朕抑畏之心詔合圍已解坤維頓清皆宣閫指授之功與制臣調遣之力以至二三大將竭盡忠勞遂使百萬生靈免罹塗炭勲庸甚懋旌賞冝優吕文德特授檢校少師李遇龍進官三等權刑部侍郎各賜金幣將佐以下進秩賜金有差辛巳御筆令學士院降詔撫諭四川將事軍民務在懇切以示朕眷焉西顧之意詔曰北兵侵犯中原如江北岸黄州漢陽軍江南岸鄂州壽昌軍興國江州隆興諸州多有驚移百姓遷城郭之人切恐無以自給仰三省行下各郡不拘是何窠名見管錢米隨冝賑恤不許漏落泛濫有失朝廷推行實惠之意如有違戾重寘典憲壬午詔袁玠奪五官送南雄州居住以御史陳寅言其屠害良民苛取漁舟以資敵之鄉導也癸未詔以蜀道甫寧監司州郡調度不給其來歳進貢天基聖節銀特免甲申以向士璧為湖南安撫使知潭州任責捍禦詔丁大全落職罷新任以諫臣曹永年再䟽其罪也乙酉雷十一月庚子朔都省言䝉古謀斡腹拓裏當嚴湖南諸郡土豪及諸峒俊傑其間豈無奮發忠義秉功之人合立賞格招諭從之是日吕文德提兵至鄂詔賈似道移司黄州先是諸路重兵咸聚於鄂北軍斡腹一道由全永至潭州江西震動監察御史饒應子言今精兵健馬咸在閫外湖南江西地闊兵稀雖老臣宿將可以鎮壓然無兵何以運掉敵之來當自内托出不當自外趕入上然之遂有是命黄在鄂中流乃北騎往來之衝危道也大將吕文德遣孫虎臣將精兵七百護送至蘱草坪候騎曰前有兵似道愕然曰奈何虎臣匿似道自挺身出戰既而北軍乃老弱部所掠金帛子女降將儲再興騎牛先之虎臣擒再興遂入黄州下流之兵始振辛丑詔行寛恤十有三事壬寅以朱熠兼權知樞密院饒虎臣戴慶炣權參知政事癸卯以夏貴兼金吾衞將軍總領淮東出戍軍馬趙葵言北兵渡江皆因袁玠尅取漁湖之利極其慘酷雖已行罰未足以正誤國之罪詔袁玠追毁除名勒停拘管萬安軍丁未詔北兵渡江多有被擄之人驅逐攻打城壁及當前鋒豈其本心良可痛念又上流失業者其間豈無土豪彊壯或轉為剽掠是致資敵各立賞格招諭戊申御筆朕以國家多難下詔責躬避殿減膳徹樂罷土木出宫人痛自貶損益務儉約以至黜貪暴省賦歛釋禁錮恤寃枉庶幾悔過之實感動天人之心尚慮言路之未通莫紓人情之久欝可令内外臣庶凡目前急致要務朝廷闕失並許極言毋隱以副朕側身引咎之意令學士院降詔詔出内庫楮幣五十萬犒内外諸軍甲寅以與􅊸為浙西制置大使知鎮江府杜庶兩淮制置使知揚州乙卯詔丁大全奪三官以御史朱貔孫䟽其罪也尋再削奪己未以趙葵為少保江東宣撫大使節制饒信臨江撫吉官軍民兵庚申詔朕有虎臣時為文德今其部曲將夏貴提師征行道出輦下所當撫勞以示優恩令閤門引見閏十一月癸酉雪出封樁庫楮幣二十萬賑都民三衙諸軍亦如之辛卯賈似道奏諸將大捷于鄂城鄂圍解凡百餘日以呂文德為檢校少傅京西湖北安撫大使兼制置使知鄂州乙未與􅊸言漣水失守孫逢吉棄城而歸已行軍法䇿應棄再遇不能應援詔奪三官與􅊸尋與宫觀十二月辛亥詔以來年正月一日改為景定元年壬子呉潜改封許國公賈似道改封肅國公庚申羣臣請御正殿復常膳表三上乃從之詔鄂渚之重圍雖解湘潭之凱奏雖馳然四境未底於肅清三軍方疲於戰鬬人民離散井邑摧殘每一念之寸心如灼其天基聖節稱觴賜宴並免壬戌陳韡落致仕以觀文殿學士充醴泉觀使兼侍讀徐清叟以資政殿大學士提舉佑神觀兼侍讀趙汝騰端明殿學士提舉佑神觀兼侍讀兼翰林學士承㫖庚申景定元年正月丙子御筆賈似道親提大兵以解鄂渚之圍勲烈之盛良用嘉歎可令學士院降詔奬諭詔賈似道赴闕庚辰詔吕文德為檢校少傅京西湖北安撫大使兼制置使知鄂州是夜歳星熒惑合于尾乙酉都省言潭州醴陵縣當衡州之衝比北兵迫近草冦竊發人情危疑知縣呉灼屹然不動誅鋤盜賊一境獲安詔呉灼差監行在都進奏院甲辰都省言承平日久京師城池所當修浚詔厲文翁條畫行之己酉詔鄂州戰守將帥以至士卒特賜十七界楮幣三千萬令宣司第功給犒吕文德援蜀之賞未足酬功今援鄂之勲尤為顯著特賜百萬良田萬頃髙達乗城拒守迄退疆敵特賜五十萬為寧江軍承宣使王鑑陞左金吾衞上將軍孫虎臣蘇劉義黄青陳萬鄮進張勝孟之經徐廣温和俞大忠康玉馬汝海趙紀祥各進官十等為遥郡團練刺史環衞閤職有差陳奕阮思聰水陸戰禦獲捷非一並為防禦使湯孝信紀智立提兵援鄂備宣勞效各進官三等王益進一秩壬子詔蒲擇之削官三等沈翥送瓊州居住甲寅都省言臨江軍瑞州皆以無城池為北兵破臨江守臣陳元桂端坐亭上誓死封疆左右散去為兵所執握拳切齒罵聲不輟忠義之節照映古今瑞州守臣陳昌世以治郡有善政百姓擁之以逃詔元桂進官五等贈寳章閣待制與二子京官選人恩澤賜錢十萬立廟賜正節昌世素有亷平之譽姑奪官三等丙辰命從臣卿監日一人禱雨于天竺山郎官詣霍山出内庫楮幣一千萬御莊米一萬石付厲文翁修築城池庚申雨雹壬戌詔賜賈似道金器幣一千匹兩仍趣赴闕都省言廣南哨馬透出湖南衡州上由潭鄂而合興壽之兵下由醴陵而犯袁吉之境向士璧㑹合劉雄飛追襲之兵調遣鄮進閻忠進彭宋傑等併力攻𠞰獲戰馬千餘疋救回老幼甚衆詔士璧為兵部侍郎雄飛進官二等保康軍承宣使進宋傑忠進各進官賜銀絹有差丙寅南康軍言北哨入建昌縣狗咬石透過武寧本軍都監張興宗調兵迎敵戰死詔贈興宗武翼郎官其一子都省言去冬北兵侵犯湖南諸將迎敵之功温和為最李虎次之鄮進又次之詔温和進右武大夫帶行遥郡刺史李虎進官三等帶行閤門宣賛鄮進帶行復州團練使賜銀絹有差三月戊辰朔日有食之庚午御筆命夏貴兼黄壽䇿應使總統諸將令協力㑹合夾擊以收全捷癸酉都省言去年八月哨馬侵犯横山鎮撫司調遣總管張世雄提兵將迎敵戰殁詔世雄等各贈官十等賜錢一萬甲戌詔夏貴總統舟師自鴻宿州而上凡五奏捷進福州觀察使都省言北兵所犯州縣或經從蹂踐或盤礴焚毁農民失業其鄂州壽昌軍已行蠲放租稅餘州縣當一體寛恤詔全岳永衡賔栁象瑞州興國軍南康軍建昌縣隆興府奉新奉寧武寧靖安縣江州瑞昌德安縣臨江軍清江新喻縣潭州醴陵瀏陽縣開慶元年以前二稅並捐之辛巳詔董宋臣改差提舉台州崇道觀安吉州居住國子博士徐庚金等不待君命而出闗遣官勉諭而莫應各與在外差遣丙戌詔孫虎臣和州防禦使范文虎張世傑等各進官五等賜銀絹有差餘將士進官二等四月戊戌朔左丞相呉潜罷行諫議大夫沈炎之言也詔多事之時揆席不可暫虛可趣似道赴闕權令朱熠戴慶炣分日當筆有大政事共議以聞辛丑賈似道奏鄂圍始解江面肅清宗社危而復安實萬世無疆之休壬寅趙葵以病乞結局引退從之癸卯御筆賈似道為吾股肱之臣任此旬宣之寄殷然殄患奮不顧身戎乗一臨士氣百倍吾民頼之而更生王室有同於再造予嘉偉績冝示褒綸令學士院降詔奬諭乙巳詔以邊事清肅請命元祈禱官各詣致謝丙午吕文德兼湖廣總領辛亥揚州火杜庶貶官一等癸丑以賈似道為少師進封衞國公其宣司職事令結局朱熠知樞密院事兼參知政事饒虎臣參知政事戴慶炣同知樞密院事兼權參知政事皮龍榮端明殿學士簽書樞密院事甲寅詔似道將至國門可依文彦博例郊勞於都城外賜御筵及朝見後擇日對御賜宴似道皆辭從之乙卯朝獻景靈宫丁巳以明堂大禮奏告天地宗廟社稷宫觀詔以今年九月有事于明堂己未詔夏貴為保康軍承宣使左右金吾衞上將軍知淮安州兼淮東安撫副使京東招撫使尋賜金器幣田三千畆乙丑似道入見奏今天下之勢保藩籬則下可保堂奥有三邊則可有内地惟陛下念之五月戊辰朔詔似道奏乞以財賦獄訟委之執政分任亦合典故可令朱熠專任財賦皮龍榮專任獄訟似道總提其綱以趙葵為兩淮宣撫大使判揚州進封魯國公辛未詔饒虎臣為資政殿學士提舉洞霄宫癸酉御筆今之天下靡弊極矣所可以轉移變化者獨有用人一說耳舊來當國者用人多徇私意貽害可勝言哉今丞相虛心無我詢之同列以用人此乃轉亂為治轉危為安一大機括也機括若差利害匪輕今當立為一凖的之説須專求實用勿泛取虚名外之為監司郡守者當用亷潔凡稍涉貪汙而謀利者汰之内之為朝士者當忠謹樸實凡稍涉譁競而沽名者汰之若用捨之意嚮明白貪汙者可化為亷潔譁競者可化為忠樸夫茍用人一差待其貽毒於民貽害於國而後去之亦已晩矣似道奏敢不備遵眷㫖仍乞宣付史館甲戌都省言沿江副司諮議官吕文信統兵在檞林夾白鹿磯吕輔周並以戰殁詔贈文信寧逺軍承宣使輔周和州防禦使優與恩澤立廟賜額乙亥詔李虎馭軍無律害民特甚合正典刑以曽立功湖南貸命追毁覊管欝林州行諫議大夫沈炎之言也丁丑賜似道玉帶己卯以戴慶炣薨輟視朝辛巳上曰近日士大夫奔競之風可畏須擇一二恬退之士奏聞庶可以勵其餘似道奏已得二三人俟擬進尋詔趙景緯歐陽守道陳大中有靜退之節以景緯為祕書郎守道史館檢閱大中主管禮兵部架閣文字壬午熒惑犯斗癸未都省言江防至重貴在嚴密自通州海口以至歸峽當分管地分庶責有所歸詔令都統司分地任責仍命制帥司照所𨽻節制以皮龍榮兼權參知政事沈炎為端明殿學士同簽書樞密院事戊子似道言去秋猾夏之變匪由天降生自貪吏臣願明詔中外自今守臣當覺察諸縣監司當覺察守倅其有贓犯必劾無貸如州縣官為監司所劾則坐郡守守倅為臺諫所劾則坐監司己丑上諭似道卿昨日所陳正律貪之良法連坐之罰此風必戢似道奏臣之所奏祖宗已行之法也庚寅都省言奬亷戢貪今日急務陳塏清節髙風可厲流俗陳振孫華髪典刑為國壽俊詔以塏為龍圖閣學士賜振孫金帶乙未上曰秋防在近趙葵既辭不可不速擇人不若只用李庭芝詔庭芝復主管兩淮安撫制置司知揚州趙葵充醴泉觀使六月己亥詔郭濬獨任殿步兩司宣勞不一自去冬警報以來效忠甚著進官一等帶行遥郡刺史詔丁大全居住南康軍壬寅御筆皇子忠王仁孝恭順有聞於時涵養踐修尤敏於學是用蔽自朕志庸正儲闈特以對越在上庶幾祖宗顧歆神人闓懌裒時多祉于以隆萬世不拔之基可立為皇太子令有司討論典禮以聞癸卯上曰昨日皇太子再三辭因訓之曰元良者天下之大本也乃若祇膺重器克荷徽章必務保其令名藴其全德欲全其德在修其身欲修其身在勤於學勉之毋忽似道等奏建儲之始聖訓昭明實足以貽謀萬世甲辰上諭似道卿所奏皇太子班次在宰執之上且候典禮後行之似道奏名稱既正典禮當遵容臣具奏上曰淮東近别無報似道奏漣水事當候夏貴報至兵固貴於神速然必須新閫之來方可隨冝應援上曰然戊申以王埜薨輟視朝月犯斗己酉録行在繫囚壬子詔陞巢縣為鎮巢軍甲寅詔皇太子改名令所司備禮冊命尋賜字曰長源詔賈似道為禮儀使朱熠撰冊文皮龍榮書冊沈炎篆寳乙卯上曰皇太子入儲宫禮儀從厚如賜宴錫賚等事皆當討論似道奏舊典有諸王入府錫宴及皇太子㑹燕宮僚於資善賜教坊樂之類今日而行之足稱盛典丁巳皇太子辭朝謁乗金輅設儀仗從之戊午以冊皇太子奏告天地宗廟社稷宫觀己未詔倪垕獻羡希賞再削一官仍下監司郡守今後有許移易窠名輒行獻羡者照祖宗典故行仍著為令辛酉皇太子辭百官移班賀詔既有典故不必引辭乙丑御筆朕於菁莪樂育之仁封培滋久登膴仕著休聲多此途出數年以前間有聚為朋曹墮家敗業而不能遏然自棄者豈作成之道猶有缺乎批付學官以更學法來上稍示規益本為一二蹈于匪彞者設也邇者涵濡德義莫不自待以厚朕甚嘉之前者更法獨進取一途尚狹未足以快飛躍之道今從其厚用著為令爾諸生益務自修副朕崇尚作成之美意敬聽無忽七月戊辰制以皇子忠王為皇太子大赦天下北使郝經來尋盟至維揚拘留真州不遣先是開慶己未秋九月北兵渡滸黄圍鄂州賈似道視師江上陰許北朝歳幣議和亦㑹北有大䘮北師始歸似道入相自詭有再造之功諱言前事故也諡議曰己未庚申北軍過江東南之危如一髮引千鈞矣似道在鄂為城下之盟許納歳幣而北師始歸似道乃欺理宗詭曰戰勝而所許歳幣又食前言是外則負大國内則欺其君以致大國遣使責償似道乃拘留於真州惟恐上下知之未幾而大元再遣使京湖而似道又留之漢陽之沌口始則請盟終則背盟似道知之天下知之獨朝廷不知耳庚午上問近日京城米價似道奏見行賑濟以平市價此去秋成糴價必減壬午皇太子宫詹事楊棟等奏乞詔皇太子免荅拜禮御筆尊敬師儒冝全謙德難允所陳癸未御大慶殿冊皇太子羣臣班賀丁亥皇太子朝謁太廟御筆參稽舊制皇太子當俾習知政事每遇昕朝可令侍立仍令宰執並兼東宫官三省討論典故以聞己丑上曰何夢然一䟽言大全潜二凶欺君無君之罪舉盧杞李林甫以為證極當似道奏臺臣所乞合取聖意上曰禠職罷祠追官一如其請竄地却只置之江西以賈似道兼太子少師朱熠皮龍榮沈炎並兼賔客辛卯詔丁大全奪官三等居住南安軍呉潜禠職罷祠奪二秩居住建昌軍皇太子奏乞免侍立等事御筆參决侍立家法攸傳控奏力辭難從所請上曰來日皇太子侍立卿等奏擬須擇其有闗於大體者如漢舉孝亷之類似道奏敢不敬遵聖訓癸巳皇太子侍立上曰侍朝參决正欲習聞政事卿等冝衞翼之似道奏建儲一事自古為難在仁皇時猶待司馬光范鎮諸臣之請今陛下不俟臣庶論建斷自聖𠂻合天地祖宗之心為社稷億萬斯年之計上曰舉孝㢘所以化元元移風俗也此事久廢民罔攸勸可下郡國各舉一二人務以實聞尋令學士院降詔勑門下孝為百行之先亷居四維之一三代以上風俗淳而孝亷之名冺迨漢始詔以此舉士當時二千石不舉孝以不敬論不察亷則免其嚴且重如此我國家以孝治天下以亷察吏治科雖不常設固有不待舉而勸者比年以來澆風汙習瀾倒莫返朕甚憫焉然念良心所藴誰獨無此特為善者無所勸不善者莫知過表厲之道未至焉耳今嘉與宇内之士同歸于善舉孝亷如漢法夫孝亷一本也好貨財而不得為孝哇母食則不得為亷以菽水為樂者行必不汙以氷蘖自持者親必不辱詔下之日凡吾帥守監司令長采公論攷實行各䟽其事以名聞朕將尊顯之以為臣子之勸八月丙申朔上曰戢貪之令屢下良以行貨之心多於畏罪論罷既科而貨不失猶足為利也繼自今有犯贓者須重寘于憲盡監其贓務在必行毋為文具丁酉以賈似道為明堂大禮使皮龍榮為儀仗使沈炎鹵簿使與芮橋道頓逓使辛丑詔廣安軍新明知縣鄭少清流海外侯嵤孫教官謝少鍨覊管廣南渠州鄰山知縣楊淑廣安録參朱堃司法馮巽午居住廣南以宣撫司克復舊城言其結附蒲元圭獻城降北之罪也丙午上曰皇太子每日聽講必待講官講說方可發問如有所疑須當咨問太子於侍次欽承惟謹似道奏前日叨陪講席親聆皇太子聽講之餘首問君子訥於言而敏於行次問聞正言行正道講官敷說樂聽不倦可謂得問辨之要上曰兩問皆當壬子以與􅊸薨輟視朝贈少師尋謚忠惠是夜太白入房癸丑上曰浙西鹽子頗為田里之擾冝早區處若徒黨能自捕其首者却與免罪仍厚賞之似道奏令憲帥下之所屬措置招捕九月辛未詔鑄新錢以景定元寳為文癸酉上曰劉整瀘州之捷甚偉似道奏觀其所申俘獲甚衆恐此冬間勢須平定己卯朝獻景靈宫庚辰朝饗太廟辛巳大饗于明堂赦天下丙戌上曰明禋一晴可喜宿齋之旦已有雨意隨即開霽似道奏此皆陛下風采精神沈固應天眷如此是夜熒惑犯壁丁亥上曰諸路刑獄尚爾淹延所當嚴行戒飭似道奏謹承聖訓戊子李松壽犯淮安十月乙巳御筆昨臺臣論丁大全呉潜欺君無君之罪皆有事實初匪風聞竄謫近止江西可謂寛典頗聞二佞之黨懐設伏慝布在京城聞有朝紳各私所主有咎及朕躬者是何忍於負君而不忍於負私門也如大全之流毒稔禍害民蹙國此天下四海所同憤固不待論若呉潜力芘大全動摇國本力請遷幸發言悖亂藴志深險與自古奸叛之臣曾不必殊朕之所親受而忍抑者凡為臣子豈當黨附而為是翕訿近又作歌詩有披緇之說此等情狀畢露恐亦終難涵容令臺臣覺察如有似此者劾上當重寘于罪以為同惡相濟者之戒仍榜朝堂壬子李庭芝言夏貴等破松壽之兵於漣水城下南城舊址已盡平之尋詔夏貴進官五等賜錢百萬立功將士進官有差壬戌詔呉潜居住潮州以監察御史桂錫孫之言也十一月乙丑御筆朕於北司惟遵祖宗之舊例給使而己未嘗有所假借亦每有戒飭聞士大夫欲由此徑心甚鄙之近何時修忽持呉珪兄弟奏牘來上且以賄進不亟去之是失刑矣詔何時修削官二等罷職送吏部永不收叙丙寅上曰朕平日未嘗假借内侍而何時修無忌憚如此今已痛懲庶使天下士大夫知所嚮背似道奏聖斷赫然中外聳聽真足為萬世法詔諸路監司躬親巡厯州縣裁决獄囚奉行不䖍者臺臣覺察以聞十二月甲午朔上曰華亭御莊昨令漕司委官拘催不能戢其擾今可撥𨽻外廷以助軍餉似道奏陛下此意真足以貽謀萬世乙未上曰治天下之道無他惟順人心而已我朝以仁厚立國雖強不如秦冨不如隋惟知敬以事天寛以愛民儉以足用平時之所以恪守家法者在此似道奏陛下守家法結人心真可為萬世龜鑑辛丑福建提舉李伯玉奏建陽縣嘉禾生一本十五穗繪圖來上詔皇太子始封于建允為上瑞其以建陽為嘉禾縣上曰此畨積雪盈尺臘前再白可為豐年之兆似道奏既雨復雪逺邇皆然蝗蝻入地疫癘潜消此皆聖德格天之明驗内批虎闈齒胄太子事也此禮固已久廢如釋奠舎菜之事我朝俱未之廢然享師敬道又不可拘舊制可來年正月擇日令皇太子謁拜先聖辛酉景定二年癸亥朔御大慶殿朝賀詔曰朕於贓吏無所貸以其惟威惟虐大為吾民仇民吾赤子而仇之是與冦賊奸宄同科而何以為天子之命吏古人喻貪以狼以碩䑕目以物類之惡者葢不得復言人矣惟彼貪夫憯莫之懲侵牟矯䖍罔知厭極朕夙興夜寐憂苦萬民封培本根每懼弗蔇郡國之吏乃淫縱其欲以蠧厥生間聞田里凄然人情惻怛甚至自愧朕惟民生寡遂由於貪官之肆誅求貪官充斤由於監司之不按察率以外臺耳目不當蔽塞失察之罪兹當歳首咸與維新上曰我朝以仁厚立國聖聖相承惟以愛養元元培植根本為第一義今中外之吏貪黷成風甚失祖宗初意似道奏大哉王言發於王春之日所以布維新之令也皇太子奏臣恭奉聖㫖擇用正月十五日令臣謁拜先聖文宣王于太學臣仰體聖心祗承嚴訓區區愚𠂻因而感發焉葢先聖之道至我朝盛時運際文明真儒迭起而後有以續夫孟氏之傳然其時諸說並駕未知統一迨乾淳間文公臣朱熹與宣公臣張栻成公臣吕祖謙志同道合切思講磨如義利之辨如近思録之書擇精語詳開牖後學誠有功於聖門中間邪說又幾晦蝕陛下聖德奮興罷黜詖邪表章正學然後人心一正聖道大明天下學士得沿淵源而遡洙泗實萬世無疆之休熹等三臣嘗俱被詔追褒特加隆惠盛典兼凖御筆秩熹于從祀如栻如祖謙竊謂冝用升祀例以稱明詔臣愚欲望睿㫖特以臣栻臣祖謙秩于從祀之列以益昭聖明崇儒重道之盛美詔從之都省言知縣於民最親必五得改官親民舉狀始以命之重其選也勢利之習燎原薦舉之意浸失挾貴用賄如取諸寄貪庸得志民不堪命欲窒其源惟有嚴繆舉之罰是遵祖宗舊制其禁戢薦舉尤當加嚴令吏部日下遍牒遵守施行仍令御史臺常切覺察乙丑以安慶城成馬光祖特轉兩官仍令學士院降詔奬諭庚辰上曰近聞江西湖南楮幣價虧臺䟽及此可斟酌行之似道奏此事闗繫頗重容熟議奏聞詔下諸路提舉司所部州縣時以常平錢米賑給鰥寡孤獨之民以雪寒出封樁庫十八界楮幣三十萬賑都民三衙諸軍亦如之二月癸已朔詔禮部貢舉已酉上曰諸書將備進呈有日只照凡例修纂不必用已意置議論其間他日自有史官任刪潤之責京湖制司言襄陽帥臣程大元調遣總管唐永堅牛全深入鄧光大路至茱萸圃獲捷詔永堅進官四等帶往閣職全進官三等其餘立功將士補轉有差甲寅皇女進封周國公主三月壬戌朔日有食之太史言隂雲蔽遮初不見虧乞照國朝故事班賀上曰日食于朔朕心懼焉陰雲偶蔽豈當自幸所宜益謹天戒其令百官毋賀己巳詔禮部國子監以有出身人附銓試場應詞學科照嘉熈二年例從之戊寅似道等上孝宗皇帝光宗皇帝寧宗皇帝實録今上皇帝玉牒日厯㑹要經武要略詔似道熠龍榮炎各進官二等丁亥雨詔朱熠以觀文殿學士知建寧府提舉洞霄宫乙丑詔寳章閣待制方來奉祠日久髙年可尊特賜金帶四月乙未以皮龍榮參知政事沈炎同知樞密院事兼權參知政事諫議大夫何夢然簽書樞密院事丙申詔吕文德分閫年餘援蜀餉蜀忠勞尤著進太尉京湖安撫制置大使䕫路䇿應大使知鄂州詔董槐以觀文殿大學士提舉洞霄宫進封永國公己酉詔諸路提㸃刑獄以五月按部理囚徒詔呉潜居住循州丙辰詔皇女周公主年已踰笄下嫁禮也承奉郎楊鎮實慈明太后姪孫矜持好修宜在選尚朕志久定而公主引辭甚力勉諭再三徐始禀承令三省討論典例以聞丁巳詔楊鎮左領衞將軍駙馬都尉己未太常禮院上周國公主下嫁典例詔主婚親迎同牢之禮並從熈寧制庚申詔公主下嫁與芮主婚皇太子從送仍賜公主擔子其從物令所司照典禮應辦是日建康府言瑞麥五莖各兩岐五月壬戌朔詔公主下嫁以楊鳯孫為賔癸酉詔放特班改官人免引見己卯上曰昨觀李庭芝申逆鄒突至淮安對境猶幸有備挫其鋒繼此當無日不備庶可無患似道奏謹遵聖訓益加申儆己丑上曰雨意未巳朕心惕然應有寛恤之事可更與講行命侍從卿監日一人禱于天竺山郎官詣霍山蠲大理寺三衙臨安府及兩浙州軍建康府贓賞錢出豐儲倉米五萬石賑都民再録中外繫囚杖以下釋之六月辛卯朔上曰連雨不已罪在朕躬惟有修省以回天意似道奏燮理陰陽三公之職臣無所逃罪癸巳上曰昨日未時至中夜雨略止早又復作寛恤之事雖已舉行更當求所未至似道奏陛下焦勞如此雖禹湯罪已殆不是過臣等輔政乖踈未回天意恭俟汰斥甲午御筆霖雨為沴天戒孔昭農功茍虧民命攸係力行寛恤精意禱祈靡事不為厥應猶爽痛念及此啓處弗遑可自六月五日為始避正殿減常膳徹樂庶盡修省之實以回陰陽之氣上曰連雨未止都民被水殊可念恐兩浙皆然各郡量與輕重等第支給賑恤乙未詔出榷貨務十八界楮幣五萬賑三衙諸軍丁酉詔武臣功勞顯著者賜金帶素有格法不許自陳從都省之言也癸卯上曰楊蕃孫屢辭盥饋之禮此典禮所在豈容不講似道奏仰遵聖訓令勿更請乙巳上曰近畿被水安吉為甚宜早差官檢視凡救荒之政皆當講行似道奏安吉今歳之水不減寳慶年間檢視救荒實不可緩丙午雨雹戊申羣臣請御正殿復常膳表三上乃從之上曰瀘南劉整之變宜急措置似道奏昨日已即調遣且趣吕文德俞興等任責討之整驍將號鐵胡孫斷橋之役曹世雄功第一整次之大將吕文德忌二人捃世雄罪逼以死整懼禍及已遂叛歸北諡議曰劉整宋驍將也己未北師渡江止遷蹕之議者丞相呉潜也盡守城之力者帥臣向士璧也奏斷橋之功者曹世雄其一而劉整次之事平後似道功賞不眀殺潜殺士璧殺世雄整守瀘州懼禍及已歸北之心始决矣己酉以范文虎主管侍衞步軍司辛亥録中外繫囚杖以下釋之壬子流星夕墜七月丙寅上曰近霅川水道間有借糧之風亟當區處似道奏昨已諭帥臣警捕擇其尤者重治庶可少戢當併守臣申嚴之京湖制司言吕文德報發勘正張子光張定國龎伸周仲張善張先以蒲擇之黨從在任贓狀繁夥冦船造橋不調援兵攻擊交通叛逆設意降北乞照祖宗舊制明正典刑詔子光定國追毁除名同龎伸等四人並流斷蒲擇之已追毁覊管監贓是夜月犯斗壬午以觀文殿學士陳韡薨輟視朝贈少師諡忠肅詔呉潜責授化州團練使循州安置初似道移司黄州也疑出潜意以足頓地曰呉潜殺我遂深憾之潜竄死没其田産寸土不遺潜死非其罪人心不服丁亥詔賜吕文德方團一字金帶上曰戚里為太尉方賜此帶今以賜親臣者待之乃異數也似道奏陛下以殊恩旌有功不特文徳感奮諸將亦知所觀詔有違年闕正官處許監司選辟八月辛卯朔詔令户部下諸路申嚴州縣増收租米斛面之弊癸巳以久雨出封樁庫楮二十萬賑三衙諸軍發豐儲倉米石濟都民甲午上曰蜀事可慮朕甚為之不安似道奏俞興攻取瀘城壊於垂得致軫聖慮臣累䟽自請一行捐軀不辭或可上寛憂顧上曰丞相所請備見忠忱但廊廟事體至重豈宜輕動又奏若文德入蜀則荆湖與江面闗繫尤重臣不容不往上又曰此未可輕丁酉詔奪向士璧從官恩數令臨安府追究侵盜掩匿情節以侍御史孫附鳯之言也士璧守潭有全城功似道以其行事不闗白宣司也怒捃其罪竄死漳州壬申詔賜皇女周國公主第于安濟橋乙巳詔江萬里為端明殿學士同簽書樞密院事兼太子賔客丁未詔浙右水澇民不聊生令朝臣分往各郡同守臣商確出粟勸分蠲租賦招強壯為軍凡救荒之政可速舉行俾毋遺闕九月辛酉上曰湖秀二郡被水最甚聞守令不以荒政為意民戸吝於勸分宜立賞罰以示信必似道奏此事監司守令不得辭其責即當宣布聖訓更加戒飭丙寅以范文虎主管殿前司劉達主管侍衞步軍司癸酉詔増潭州解額三名以終場及萬餘人故也庚辰詔客販廣米至都城近境者照市價出糴官司毋得拘勒尋立賞格招誘壬午詔出封樁庫楮幣一百萬銀三萬兩付四川宣撫司丙戌上曰廣米平糴已招誘客販更令本路監司選官糴運以應都民之乏似道奏謹遵聖訓十月庚寅朔上曰逓年和糴止及民户今歳水潦若此凡御前莊米亦照民間所科之數輸之有司以示上下一體之意似道奏陛下捐内莊米以應和糴前所未有觀聽之下孰不感動士大夫於此尚不知體國可乎戊戌雷庚子詔積澇為災省躬惕若哀求民命夙夜靡遑廼復雷發非時更示譴告天怒未息愈不敢安應軍民及刑獄有合寛恤等事可疾速討論以聞庶盡應天以實之意似道䟽乞解機政詔不許録中外繫囚詔物價未平出封樁庫楮幣二十萬賑三衙諸軍出豐儲倉米五萬石賑都民甲辰詔朕思己未之秋北兵渡江其勢飄忽震蕩如風雨之至一時將士或死於轉戰人民或斃於流離其間嬰城自守之臣尤不免干戈鋒鏑之􅆭致使寃聲滿野積骸如山重念生民何辜而罹此酷禍也當是時頼股肱之臣任旬宣之寄身先士卒冐萬死一生而不顧卒能指授將帥一舉而殄殱之乾坤載寧江山復舊是吾國生民無身而有身此三百年所未有之禍亦三百年所未有之功也朕因修設醮席薦拔沉淪既念元勲示兹奬諭亦欲來者之勸也丙午以何夢然同知樞密院事兼參知政事壬子詔程元鳳為特進依前觀文殿大學士充醴泉觀使兼侍讀癸丑詔皇太子年已及冠禮冝擇配慈憲夫人族昭孫之女生於名門綽有淑德其令擇日入内參見乙卯上曰太子可謂天作之合又顧太子曰夫婦人倫之始正始之道當以修身為先其身正不令而行其身不正雖令不從太子必能體認斯意似道奏皇太子問學日新况聖訓之嚴如此自能祇承惟謹最是全氏侍乃父昭孫往復江湖備嘗險艱其處富貴必盡儆戒相成之道臣等深為國家大慶賜知渠州胡克忠金帶以旌戰守之功丙辰沈炎罷以資政殿學士提舉洞霄宫戊午賜汝騰諡曰忠清尋詔贈四官仍賜銀絹田宅十一月甲戌安南國遣使奉貢獻象三戊寅周國公主下嫁禮成羣臣班賀乙卯日南至御大慶殿羣臣朝賀詔楊鎮冝州觀察使駙馬都尉賜玉帶詔楊鎮父蕃孫進官二等戚属増秩進封有差癸未詔全氏特封永嘉郡夫人十二月己丑朔詔瑞雪應時出封樁庫十八界楮幣二十萬賑都民三衙諸軍亦如之辛卯江萬里罷尋以端明殿學士提舉洞霄宫甲午皮龍榮兼權知樞密院事何夢然參知政事馬光祖同知樞密院事兼太子賔客知臨安府乙亥月犯五車詔永嘉郡夫人全氏可立為皇太子妃令學士院降制丁巳詔朕惟我朝褒表功德具有彞典如趙普有翊戴之元勲則賜第宅於建隆文彦博有弼亮之偉績則賜家廟於至和今丞相賈似道身佩安危再造王室其元勲偉績不在趙普彦博下宜賜第宅家廟令有司條具以聞壬戌景定三年正月戊午朔御大慶殿羣臣朝賀詔陽春肇始宜布寛條如丁大全呉潜誤國之罪固不可貸其與為死黨者當與同科若一時嗜榮進而爭附麗者寧無輕重可斟酌所犯逺者量移近者放還並不録用詔皇女周國公主進封周漢國公主庚申給事中徐經孫繳章鑑王景齊祠命詔從官予祠而不除職是禄之而已姑與放行决不録用詔周尊黄耇忠厚所基漢事三老禄飬無闕陳塏林彬之史季温夙被擢用今皆耆年奉祠歳久宜示奬崇陳塏授端明殿學士彬之寳謨閣待制史季温直華文閣各因其祠戊辰馬光祖奏今歳監補在即江湖閩廣所至糴價未平乞照嘉熈二年例權令各路漕司收試從之庚午賈似道屢辭免賜第宅家廟詔從所請仍以舊居之鄰集芳園為賜給緡錢就建家廟甲戌吕文德言北兵犯梁山權軍李鑑出戰屢捷詔鑑帶行閤門宣賛舎人知軍事立功將士義兵補轉有差戊寅詔三學免解外行食生貟兩赤縣解試終場人及臨安府學職事特令赴省一次以建儲恩優異之也以久雨出封樁庫十八界楮幣二十萬賑都民三衙諸軍亦如之都省言逆整以瀘叛宣制兩閫奉行天討已遂收復詔奬諭尋改瀘州為江安軍辛巳以禮部尚書兼直學士院楊棟知貢舉兵部尚書太子詹事葉夢鼎同知右諫議大夫孫附鳯同知兼監試二月丁亥朔李松壽納欵上曰逆鄒一再納欵情偽難慿不可茍目前之小安貽他日之大患切須審處似道奏當與之要約如能歸漣海之地始足取信都省言臨安安吉嘉興属縣水澇溺死頗衆詔各郡守臣給錢埋瘞丁酉詔朕試天下士于春官凡十有三詔矣名公鉅卿胥此塗出朕又表章儒先崇尚理學以薰陶涵飬培植之久莫非夙夜強學以待問懐忠信以待舉力行以待取者比既謹簡名流執斯文之柄亦號極一時之選如世之所病𠞰句斷章以命題牽合破碎以害理與夫言理不切乎事論事不根於理皆必無之然不患有司之不明但患有司之不公明自公出茍至於公則有真才實學當如燭照數計毫髮莫能遁言刈其楚庸玉于成斯為不負朕作人之意審爾則命陸贄而得韓愈命歐陽修而得鞏軾則予一人汝嘉賜楊棟已下戊戌都省言漣水三城已遂收復制閫之功委為顯著詔奬之仍降德音改名安東州庚子詔吏部侍郎劉坰累厯繁使備著循良晩入從班多所禆益今乞引年致仕特除寳章閣待制依所乞予祠仍賜金帶壬寅詔吕文德于宣蜀道尅復瀘城可授開府儀同三司是日皇姪乃裕特授檢校少保以皮龍榮為資政殿大學士知潭州湖南安撫使乙巳月入氐戊申詔省試中選士人覆試于御史臺為定制己酉上曰漣海二城收復於旬日間亦見李璮納欵之真可擬封爵來上庚戌詔李璮效順本朝請贖父過既歸漣海之境土復獻山東之版圖可特授保信寧武軍節度使督視京東河北等路軍馬齊郡王仍賜金鍍銀印二金帶朝服繡鞍馬以金帶牙笏各十五付李璮分賜將帥三月乙丑以孫附鳯為端明殿學士簽書樞密院事兼太子賔客辛未詔陞海州東海縣為東海軍甲戌都省言徐霖自改官後實歴十餘年不曽陳乞磨勘轉官今已致仕合行旌異詔官其一子四月戊戌李璮尋復淄州詔奬諭己亥嚴州言麥生兩穗庚子熒惑歳星合于危甲辰有流星大如杯庚戍以久雨録行在繫囚五月丙辰朔戊午以刑部侍郎兼給事中徐經孫工部侍郎兼司業常挺太常少卿兼太子侍講呉堅為殿試詳定官己未御集英殿䇿進士辛酉御射殿閱武舉進士射丙寅蠲臨安府稅三月平物價也丁卯都省言諸路州縣稅租見錢用時價折納㑹子以重楮也州縣間有故行違戾者詔諸路提刑躬視所部違者劾之戊辰上曰謝奕化折納苗米價太重已戒飭之仍貸義倉充軍費以免科糴庶可少寛民力似道奏聖恩及此軍民兩受賜矣己巳都省言廣西諸郡措置屯田已有小效若雝欽冝融柳象潯州能一體講行亦可省糴運詔守臣任責措置經略安撫提領課以殿最仍條具來上庚午都省言廣西經略安撫司申安南國進貢賀昇平禮物詔户部依例給賜辛未同知樞密院事兼知臨安府馬光祖除職知福州壬申上曰馬光祖再尹神臯殊無善狀朝綱所係豈宜動肆輕紊似道奏宅揆非才望輕招侮法宜引去陛下曲賜全宥臣惟有恐懼上曰卿之所爭為公光祖之所爭乃為私諫臣陳堯道奏貪吏為蠧者八事而勢家譁徒黠胥尤甚詔户部下諸路監司禁戢甲戌詔周公作詩不避昌發孔子不偏避二名朕舊名一字乃理學至要五常百行非誠非也無之可乎先朝如益字實字見之羣臣表章此尤可證自今其勿復避丁丑御集英殿賜禮部奏名進士方山京等勑凡六百三十有七人己卯賜特奏名進士勑凡七百四十有三人六月庚寅以經筵進讀唐鑑終篇賜宴祕書省講讀官各進秩詔孫附鳯兼權參知政事楊棟端明殿學士同簽書樞密院事壬辰以呉潜殁于循州許令歸葬乙未月入氐己亥董槐乞休致詔除特進辛丑上曰一雨甚濟旱禾得此結實似道奏今日之雨甚慰民望昨日臨安属邑獻新禾更旬日可食新公私之幸也乙巳御射殿閱正奏名進士射丙午閱特進奏名進士射詔祕書省曝書㑹權免詔吏部刑部申嚴叙理等事一遵舊制仍令臺諫監司守臣自今指實劾奏庶幾罰稱其罪戊申都省言徽宗皇帝長編一時抄録尚未成編詔令史舘專官修潤庚戌安南國王陳日煚遣使入貢表乞世襲詔日照特授檢校太師安南國大王加食邑男威晃特授靜海軍節度觀察處置使檢校太尉兼御史大夫上柱國安南國王効忠順化功臣仍賜金帶器幣鞍馬癸丑詔謫降臣僚終於貶所者許歸葬七月丙辰都省言州縣官最為近民欲其不為民害當先革貪欲革其貪當先養亷今諸州縣官廩給往往拖壓是驅之使貪也監司守令但知豐已皇恤他人邇者貪贓之罰既嚴於属吏則養亷之俸合責於長官詔令御史臺覺察其有違戾許属部官於離任日訴于臺省計贓論罪壬戌以董槐薨輟視朝贈少師諡文清庚午以皇女周漢國公主薨輟視朝五日賜諡端孝太史奏用七月癸未車駕臨奠駙馬都尉楊鎮奉辭凡五乃從之乙亥廣西經略朱禩孫申增築四城内包學舎添置書院乞照白鹿洞例錫名仍置山長一貟詔以宣城書院為額戊寅詔文武臣陳乞叙復令吏刑部具元犯上于尚書省斟酌施行辛巳詔勑令所重修吏部七司條法癸未詔户部申嚴諸路州縣苛取苗米之禁甲申有白氣如疋練亘天戊戌李璮死己亥詔昨賜公主田以秀豐莊二萬九千有竒充影堂祭祀餘悉撥𨽻淮東總所以助軍餉壬子以皇太子宫滿歳宫師以下各進一秩九月辛酉上曰朱熠言呉門近似秋暑忽蝗蝻孽生未幾得雨皆殞遂不為害似道奏蝗不為災皆聖德所感乙丑詔諸路州郡增差教官當令經賦各一貟戊辰以沈炎薨輟視朝贈少保丁丑都省言温州布衣李元老讀書安貧不事科舉齒踰百歳乞照令甲特賜撫存詔補迪功郎致仕壬午賜李璮廟名顯忠贈檢校太師從兩淮制臣李庭芝請也閏九月丙午都省言乞遵嘉定舊制應知縣罪罷雖經赦不許注𦂳望之闕仍著為令從之戊申詔紹興府昨因延燎令倉司給貸居民錢今經兩年民貧可憫可悉蠲之辛亥夜皇太子妃全氏降生皇孫十月乙卯詔蠲四川制總州縣醝酤𣙜利三年以都省言循明禋前例也丙辰詔蠲諸路州縣折納苗幣不許陽減陰取違坐紹興條例庚申沿江制臣汪立信表進蘄城新城圖詔奬諭甲子以楊棟為端明殿學士簽書樞密院事兼權參知政事兼太子賔客葉夢鼎為端明殿學士同簽書樞密院事兼太子賔客甲戌廣西經略朱禩孫奏知歸化州岑從毅納土輸賦獻丁壯為下臣詔改歸化為來安州岑從毅進官修武知州事許世襲丙子詔安豐六縣陞為軍令沿江制司選辟軍使一次以其縣里迢遥邊鄙險要也十一月壬辰詔奪丁大全貴州圑練副使徙新州以其招集游手私立將校置弓矢舟楫謀不法也丞相賈似道諷廣西經略朱禩孫殺之禩孫遣將官畢遷護送擠之水丙申以徐清叟薨輟視朝尋贈少師戊戌以夏貴知瀘州兼淮西安撫副使辛丑詔禱雪未應出封樁庫十八界楮幣二十五萬賑都民癸卯詔免正旦大朝㑹十二月乙卯詔臨安府屬縣三衙决係囚杖以下釋之庚申詔瑞雪應時出封樁庫十八界楮幣四十萬賑都民三衙諸軍戊辰詔雪寒再給諸軍薪炭錢癸亥景定四年正月壬午朔御大慶殿羣臣朝賀詔令侍從臺諫給舎卿監郎官以上及制總監司各舉所知不拘貟限以待量才擢用後不如所舉則連坐之制宜在必行戊子詔莆陽布衣林亦之陳藻特贈初品官林公遇贈一官以司農少卿林希逸言三人經明行修欲表勵後學故有是命都省言四川駐戍諸軍守禦良勞合議優䘏詔令制副給賜衣裝布疋有差丙午上諭輔臣曰陳堯道言詞訴改送之弊民受其害合與痛革當自户刑部始似道奏謹遵聖訓二月壬子朔詔呉潜丁大全懐姦誤國既速天誅朋附實繁遷謫亦久宜示寛恩令尚書省日下具兩黨人斟酌輕重丙辰刑部言呉潜丁大全兩黨人内已量移程泍胡用存程坰石正則呉泳汪洵之並自便永不叙用倪垕量移信州張棻饒州章公權撫州任伯鳯建寧府葉隆禮徽州何子舉押歸本貫呉衍撫州翁應弼臨江軍趙時詁衡州劉錫瑞州王立愛信州程若川建昌軍袁玠沈翥方大猷徐敏子難以量移尋臺臣及給舎䟽乞取回呉衍翁應弼趙時詁葉隆禮何子舉劉錫王立愛石正則量移之命遇赦永不放還内時詁子舉衍應弼立愛正則各更奪一秩錫已追毁出身仍各於見謫州軍居住並從之丁巳殿中侍御史陳堯道右正言曹孝慶監察御史虞虙張晞顔言井田古也而未易行於後世限田近古也猶足以救今日之急葢兼并之患至今亟矣柰何時異事殊法出弊生夫三邊列屯非食不飽諸路和糴非楮不行既未免於廩兵則和糴所宜廣圖既不免於和糴則楮幣未容縮造為今日計欲便國使民而辦軍食重楮價者莫若行祖宗限田之制以官品計頃以品格計數下兩浙江東西和糴去處先行歸併詭析後將官户田産踰限之數抽三分之一回買以充公田但得一千萬畝之田則每可收六七百萬米於軍餉有餘矣詔從之尋置官田所以劉良貴為提領陳訔兼檢閱先是似道建議國計困於造楮富民困於和糴請官買公田免和糴住造楮於是始行公田法覈民膄田量户多寡以賤直取之農民為官耕者曰官佃上户為官督者曰莊官浙右之人破家失業者甚衆戊午詔祖宗之制察官邪之外㸃檢所𨽻簿書有司稽遲者赴臺理訴未嘗許信偏詞予奪刑名也兹覽臨安府所勘臺吏案欵違法背理不一而足至於刑人殺人之事亦復干預察官失所知聞尚且不可惟吏是聽至作訪聞押帖使善良受害乎茍不示懲何以戒後臺官虞虙張晞顔並與在外差遣癸亥降詔申飭臺臣辛未詔㑹子庫日増印一十五萬貫赴封樁庫充買官田乙亥都省言吕文德浚築鄂岳常德澧州城池訖事詔奬之守臣韓宣特轉遥郡承宣使蘇劉義吉州刺史以效勞故也丙子上諭輔臣曰諸史宜差從官提綱照舊例於明禋前登進尋差徐經孫三月辛巳朔詔官買踰限之田葢欲永免和糴倉卒取具姦弊滋多可嚴立賞罰討究歸併庶幾步畝無私易於摘買丁亥以吕文德為寧武保康軍節度使開府儀同三司詔買踰限田以免和糴之害自是良法美意要當始於浙西庶他路視以為則但所在利病不同亦難拘以一律令三省參酌施行賈似道丐祠詔不許參知政事何夢然等奏切見右丞相意在娯親抗章丐去臣等固知陛下决不容似道之去臣等私憂過計謂丞相非惟不可去亦不可言去國勢方定事㑹方殷丞相之不可去上下通知但丞相丐去小人便動彈冠之興欲乞陛下力賜勉留曲加勉諭俾丞相毋更入䟽庶安人心而弭外邪從之己未權吏部尚書陳昉等奏乞勉留丞相賈似道詔從之庚寅侍御史陳堯道右正言曹孝慶奏江公望居言路日有云君臣一體人君元首也左右大臣股肱也諫官御史耳目也股肱不留元首何頼耳目之官豈容自黙乞陛下申諭勉留天下幸甚詔從之右丞相賈似道奏條陳田制凡九乞下臣此章俾議其可必卿士庶民之皆從是之謂大同亦安得獨異哉甲辰上諭輔臣曰陳堯道言鉟銷偽造當嚴加禁戢似道奏不禁鉟銷則見鏹愈少不禁偽造則楮幣愈多臣等仰遵聖訓丁未詔寧國府守臣趙汝謀推行經界職事修舉陞直華文閣因其任四月丙辰詔今年九月有事于明堂甲子詔吕文德分閫上游寛朕西顧疆場之事知無不為帑府所積久而愈厚令其子師䕫禀陳欲備公上取用朕但聞閫外仰費於朝廷未聞朝廷取費於閫外所請既切難違其意可於内截撥二百萬充今年制總糴本乙丑皇太子言恭聞經筵春秋徹講在邇乞令陪侍觀禮從之丁卯以明堂奏告于天地宗廟社稷宫觀丙子都省言回買六郡公田視畝租之多寡為支價之低昂乞以官誥度牒銀㑹四色参酌支給詔令封樁庫支撥付各郡守臣等第給還五月辛丑都省言婺州布衣何基建寧府布衣徐幾皆得先儒理學之傳年髙德劭隱居丘園詔基幾各補迪功郎基特添差婺州教授兼麗澤書院山長幾建寧府教授兼建安書院山長壬寅以經筵進講春秋終篇賜宰臣經筵官宴于祕書省六月庚午賈似道等上徽宗皇帝長編寧宗皇帝實録日厯㑹要經武要略乙亥似道辭免進書恩凡四奏詔回贈五世祖進士昱為太師祖妣季氏廣國夫人繼妣徐氏延國夫人夢然等以辭詔各進二秩餘令回授七月甲申詔吏部具諸路見闕知縣不拘常格限十日許人指射限滿無人注者令監司郡守列銜奏辟一次乙酉詔祕書省自淳熈至嘉定國朝㑹要皇朝長編刋梓頒行壬辰勑令所進呈寧宗皇帝今上皇帝寛恤詔令詔提舉官賈似道等各進二秩甲辰皇太子奏乞以新除起居郎留夢炎前江東提刑召赴闕范東叟充講官是日上謂輔臣曰皇太子以講官闕貟欲以夢炎東叟充選夢炎舊在資善東叟亦有時望所奏甚當似道等奏二人皆時望此舉於儲德愈有光臣等不勝賛慶尋以夢炎兼諭德東叟兼舎人八月戊申朔詔户部申嚴諸路州縣苛取苗米之禁以賈似道為明堂大禮使何夢然禮儀使楊棟儀仗使葉夢鼎鹵簿使與芮橋道頓逓使辛酉詔皇太子宫滿歳宫賔講官各進一秩使臣以下減年給犒有差庚子都省言中外支用粗足己行減造㑹子今置公田免糴本又合减造詔每日更減五萬壬申都省言明禋恩霈例蠲前三年逋賦而州縣往往有已催在官吏幹隱匿在己者其實百姓不霑毫髮之惠漢史有除明年田租之令最為得冝今倣而行之庶幾實惠及民乞下諸路州縣蠲前三年逋賦外更預將景定五年畸零稅色與免半輸載為赦條仍令各路漕司榜諭從之甲戌詔省罷平江府發運司九月庚寅朝饗太廟辛卯大饗于明堂赦天下甲午以何夢然知樞密院事兼參知政事楊棟同知樞密院事權參知政事葉夢鼎簽書樞密院事乙未都省言諸路州縣獄訟率多枝蔓淹延今遇明禋肆赦有司所當奉行踈决以稱寛典詔令各路憲臣决所部繫囚具已結絕名件上尚書省詔吕文德乞以大禮所得京官恩澤改奏次子䕫已從其請朕思文德忠勤豈在中興功臣之下師䕫已除知閤且屢典邊郡但換京官亦非朕所以待忠臣之意今特與換朝奉大夫尋為度支郎官丙申昌化縣以嘉禾嘉粟進時明禋慶成上謂休瑞應期一德感通之驗詠詩賜丞相詔賈德生去歳不能防閑所使丞相忠於體國不私其子必欲示懲朕嘉其嚴訓姑從削秩天下皆明知大公之意今已及朞可特叙復元官予祠十月己酉詔安吉嘉興平江常州江陰鎮江公田諸莊輸納什優其一以都省言納稼之始宜寛恤故也壬子車駕詣太乙宫赴座官賜醴簮花己未詔出封樁庫十八界㑹一百四十萬下六郡置公田莊屋乙丑詔刑部應内外文武官因風聞致罪者許申理于朝参酌改正犯贓私者令監司覈實來上癸酉都省言令㑹子庫造三色零百錢闗二千萬便民旅交易從之乙亥詔李獻可等精加校正徽宗皇帝長編刋梓于祕書省十一月戊寅朔詔度支郎官吕師䕫往沿江閱視屯兵營屋招募新軍仍督未備者具奏來上庚辰詔羣臣遵依舊制五日一輪對如遇恙則痊日補對不許推托求免壬午軍器監丞方演孫進對論羣臣緘黙之弊上曰朕未嘗諱言演孫奏天下莫不知陛下之能聽言特臣下不敢言爾如啓悟發於宸𠂻施行見於明詔天下翕然孰不服陛下之聖丙子詔兩浙運司臨安府屬縣决繫囚杖以下釋之臺臣朱貔孫言郡邑主學添教閒有分爭殊失揖遜之風乞下諸路提舉司分𨽻職事立為定式庶可飬靖共之習從之十二月丁未朔詔正旦大朝㑹權免詔應官司見監公私逋欠並倚閣一月繫人釋之以雪講行寛恤也戊申詔舶務出售𣙜貨以收弊楮仍禁乞取己酉詔皇太子宫詹事以下講讀外日輪一貟辰入酉出以備咨問以稱輔導之實辛亥詔兩浙監司將所部州軍縣繫囚杖以下釋之甲寅蠲兩浙州軍及建康府見監贓賞茶鹽錢丙辰詔諸路憲司索上所部州軍大辟獄案詳情論决毋使滯淹其干連者酌量釋之丁巳登聞檢院朱濬進對論修身之要上曰修身在端本為上濬奏誠如聖諭心者身之本身者天下萬事萬物之本先臣朱熹之說正如此上然之己未詔刑部下諸路憲司所部州縣刑獄不許惨酷箠楚及毁除非法獄具違者重寘于罰辛酉詔管景模主管侍衞步軍司丙寅詔無為軍巢縣已陞為鎮巢軍使從㳂江制司節制其月收坊場河渡錢分項起解支遣以制司申言也己巳諫臣陳堯道乞下福建倉司將景定元年至三年八郡義倉米斗以十七界㑹兩貫賑糴貧民從之庚午詔瑞雪應期出封樁庫十八界楮幣四十萬賑在京軍民詔臨安府兩浙運司三衙决繫囚杖以下釋之都省言知海州張漢英在任浚築壩壕城壁竣事其子宗仁奉圖來上具見勞績詔張宗仁特與帶行閤門祇候添差京東路將餘在役者令兩淮制司類申樞密院辛未太白歳星順行癸酉詔再給諸軍諸司薪炭錢丙子臨安府帥臣呉革奏獄空詔奬之甲子景定五年正月丁丑朔御大慶殿羣臣朝賀詔朕粤稽盛帝明王制治保邦曷嘗不以人材為先務葢雖堯舜之法度文武之方䇿茍非得人是迪是懋則亦徒法而已故必頼濟濟之賢藹藹之士布列中外道德一而風俗同然後可望其舉行不悖相維於長久也我國家因唐之舊進士一科得人為盛三百年間所以保乂王家垂休億載者厥功茂哉弊久蠧滋邇年尤甚非無佳士頴出由此其選然窮經學古者或病於詞華植德礪行者難究其藴奥髙才大器者往往局於纎悉繩墨之末是以官甚冗而才愈乏家殊俗而風益漓至於冒國法以茍營假儒冠而挾冊俚言亂雅𠞰說趨時使習之者反賊其良而取之者莫任其咎人情至此咸欲變通葢嘗披閱先朝名臣奏議其論取士之法非一惟程顥頥兄弟深知治道酌古通今綱條詳明用意純切令三省詳議参酌其可行者條具以聞務於科舉令甲無大更張以妥安士心而於進士舉之外所以崇尚經術考察德行選用材能之道立為一代之典陶成四方之風庶幾豐芑之仁垂之萬世顧不美歟癸未給事中常挺言乞遵祖宗典故應文武臣寮封章並許於通進司投進以達羣下之情毋使伏闕投匭與庶民等詔從之出奉宸庫香珠犀象等珍貨付務場賣易助收弊楮辛丑詔㳂江兩浙制帥監司不許差軍功借補挾術遊謁等人權攝害民如州郡闕貟則差曹職官屬縣闕貟則差丞簿尉時暫兼權仍催正官之任或有違戾令臺臣覺察以聞二月丙午朔詔昨者諫䟽戒飭百司盡公守法指緘封事目最為病源深中累年積習之弊邇日劾及都司具有實狀所當申嚴禁戢俾各自愛毋䧟匪􅂜以速厥辜丁未詔禮部貢舉辛亥檢正陳昉言陛下欲賞信罰必莫若嚴考課之法乞明詔有司下之諸道帥臣監司歳考郡守歳考縣課第其能否優劣功過於次年三月類聚保奏監司則有互申之法宜悉遵彞典詔從之是日雪丙辰韓禾洪天錫並兼侍講趙景緯兼崇政殿說書丁卯詔諸路申嚴州縣斛面之禁豁除義倉陳腐米數樁積邊郡三年軍餉行臺臣之言也是夜月犯斗辛未雨土詔梁椿選右正言程元岳朱應元並監察御史四月丙午詔管景謨屢立戰功為時名將妻孥䧟殁効忠愈堅聞平時所得俸賜率以撫䘏將士遂至窮空此尤可嘉特賜十七界㑹三十萬以示旌勸仍賜金帶許令服繫辛亥詔禮部下諸路州縣講行鄉飲酒儀以復古意仍以已行儀式上于尚書省癸丑詔諸道提㸃刑獄以五月按部理囚徒乙丑詔知樞密院事兼參知政事何夢然罷觀文殿學士沿海制置使馬天驥罷行臺臣之言也己巳以李曾伯知慶元府㳂海制置使江萬里為資政殿學士知建寧府庚午太白歳星合于婁詔徐宗仁兼崇政殿説書五月丙子詔朱應元除右正言兼侍講饒應龍除監察御史已卯詔何夢然為資政殿大學士知建寧府辛卯以楊棟參知政事葉夢鼎同知樞密院事兼權參知政事姚希得為端明殿學士同簽書樞密院事兼太子賔客乙未詔安南國表貢方物其所進象及華靡之物令有司却還仍優賜答之戊戌都省言公田所諸莊砧基已成若復以州縣總之恐害不除而利不可久宜選差亷能官分司管幹詔平江嘉興安吉各一貟常州江陰鎮江共一貟未作縣人充幹辦公事已作縣人充主管文字繫銜仍令條具合行事宜來上己亥太白晝見經天癸卯詔學士院每日學士與講官照舊例詣院宿直并申嚴六曹郎官入局部宿之制六月甲辰朔詔衢州守臣謝塈奪官三等禠右文殿修撰永不收叙以其冦至不禦委城而去故有是命臺臣朱貔孫等又言詹沔之變皆由謝塈苛征激之乞行鐫斥中書舎人留夢炎又言謝塈罪大罰輕乞更與勒停並從之丙辰詔王鑰洪天錫控辭甚力令各州守臣以禮勉諭勉其赴闕詔容州守臣戴應復奪官五等勒停覊管惠州以其苛取致激妖民聚衆刼掠尋令經略司追勘具情節癸亥都省言申嚴祖宗戒飭贓吏之制詔百姓為贓吏患苦至此已極朕甚痛之指揮務在必行勿復文具七月甲戌刑部大理寺言朝奉大夫監行在𣙜貨務都茶場分𣙜真州周福孫於鹽鈔茶引正官錢外剏増事例錢四十二萬七千有竒入已係監主詐欺從自盗法贓罪抵死詔特貸命追毁勒停免真决不刺面流二千里追贓是夜彗星出栁長竟天乙亥皇太子妃全氏降生皇孫丁丑詔朕以寡昧統臨兆民居多厯年祗畏天戒如一日常恐不德謫見于上乃七月甲戌彗出栁宿譴告孔昭目所共睹鍳臨有赫咎在朕躬豈朝多闕政未當人意吏不宣化莫安民生獄訟弗清而多寃貪酷未除而貽害遂至乖戾上干天和朕將避殿減膳應中外臣寮並許直言其合施行等事有司條具以聞詔出封樁庫十八界㑹二十萬賑都民三衙諸軍亦如之内司宿衞應奉人併特給犒一次以示優䘏戊寅詔江萬里知福州福建安撫以降生皇孫奏告天地宗廟社稷諸陵己卯彗星退于鬼辛巳彗星退于井甲申行都大火丁亥賈似道屢䟽乞罷政詔不許癸巳少保保寧軍節度使萬壽觀使祁國公謝奕昌乞休致詔特除少師進封魏國公甲午以謝奕昌薨輟視朝尋贈太保追封臨海郡王賜諡莊憲是夜填星守畢詔馬天驥禠觀文殿學士罷祠其子馬時楙奪一秩罷新任行臺臣之言也乙未詔参知政事楊棟罷行臺臣之言也尋除職予郡丙申詔令侍從兩省於内外官舉堪充監司郡守者䟽其實以聞令中書籍記遇有闕官精加審察取㫖擢用如犯贓私當正謬舉之罰丁酉命從臣卿監日一貟禱雨于天竺山郎官詣霍山戊戌蠲中外茶鹽贓賞錢彗星退于参八月壬寅朔詔户部申嚴諸路州縣増收苛取苗米之禁是夜熒惑填星合于昴甲辰詔壬戌别院董試臺臣縱游士假手物論喧嘩今春銓闈復然尤為無忌秋闈在邇可令御史臺嚴為闗防毋踵前弊乙巳詔舒有開左司諫兼侍講丙午詔湯舉兼崇政殿說書朱貔孫兼侍讀翁合兼侍講己酉都省言知嘉定府洪濤迎奉新繁縣太祖皇帝以下六朝御容于本府天慶觀一時權宜於禮未備詔令守臣選差武臣一貟擇日迎奉赴行在所奉安合行典禮令有司條具上于尚書省庚戌彗星退于参丙辰詔皇太子宫滿歳宫師宫賔詹事以下各進一秩醫官使臣减年支犒有差戊午彗星退伏庚申羣臣奏請御正殿復常膳表凡三上乃從之甲子彗星復見于参彗星不滅上封者指言公田之咎臨安府學士葉李蕭圭等上書詆似道專權害民誤國似道怒嗾士人林德夫詣京尹劉良貴告李等用金飾齋扁不法捕寘之獄黥竄漳州諡議曰昔太祖嘗曰宰相須用讀書人似道以寵妃之弟不學無術處非其據乏休休有容之量忌疾之念横於胷中好諛惡直進佞退賢粉飾太平諱言邊事殺功臣以失士大夫之心行公田以歛江浙之怨主推排以騷動東南之民覈士籍以鉗制東南之士庇敗將則將校之心離吝軍劵則軍旅之心叛日積月累無一而非失人心之事卒至滅國覆身擢髮不足數其罪乙丑以姚希得兼權参知政事己巳詔師在輿陛辭精神不如昔葢郴州溪洞所係可别與差遣以優其老辛未彗星化為霞氣九月己丑日生格氣是日雷癸巳詔内侍李忠輔奪二秩罷己亥詔程元岳右正言兼侍講張桂監察御史十月乙巳朝獻景靈宫丙午月犯斗庚戌詔冬至朝㑹權免辛亥詔十七界㑹浸輕並以十八界㑹易之限一月止乙卯蠲臨安府稅三月乙丑詔物貴原於楮輕楮輕原於楮多今以見錢闗子復中興舊法每百七十七足陌以一凖十八楮三千革錢楮􅃜折之弊其官吏諸軍劵請並以見錢闗子全給似道請秤提楮幣改造金銀見錢闗子以一凖十八界㑹子之三十七界廢不用闗子之制上黑印如西字中三紅印相連如目字其下兩旁各一小長黑印如兩脚宛然一賈字也闗子行物價頓踴上有疾不視朝丙寅命官分禱于天地宗廟社稷宫觀詔出封樁庫錢闗二十萬賑都民諸軍亦如之詔朕體違和服藥未效如草澤有能治療得或痊者白身除節度使有官人及願就文資者並與比附推恩外更支賜錢十萬貫田五百頃三省出榜曉諭許徑赴麗正門外自陳差内侍二貟收接文字即時聞奏内降赦曰朕顧畏民嵒祗膺帝監朝乾夕惕迪惟遺大投艱日邁月征永念志懃道逺若臨深而履薄迄去危而就安幸國步之小康乃朕躬之少爽端由積慮以致愆和宜特持於刑章庶助收於藥喜集於多福荅爾羣情可大赦天下於戱人莫不欲生冀道迎於善氣天所助者順永孚佑於丕圖咨爾多方體予至意丁卯上崩遺詔皇太子温文夙著仁孝有聞陞儲副者五年久参裁於庶務宜自春宫而嗣服允符至道之舊章可於柩前即皇帝位皇后佐佑朕躬章明坤載可尊皇太后應軍國事務並聽皇帝處分爾其式遵成憲誕受多方益奉母儀恪承慈訓皇帝成服三日聽政䘮紀以日易月羣臣共為寛釋勿過𣙜傷百官入臨並隨地之宜諸道州府長吏以下三日釋服在京禁音樂百日在外一月無禁祠祀嫁娶沿邊不用舉哀山陵制度務從儉約應内外諸軍支賜及其他不在詔中者並聽皇帝處分於戯人羡久生奈盈虛之有數天惟純佑繄付託之得人更頼股肱元臣文武列辟交修不逮恊賛丕平咨爾羣倫體予至意尋以王倫麥卿充都大提舉䘮事諡議曰丕休哉四十一年之間日恒月升謹終如始美成在久四方咸仰於垂裳逍遥與遊萬乗遽同於脫屣三靈變色九有摧心天不可梯民之無祿逺日有期南郊是請宜配雅頌宜襲春秋謹按諡法秉徳遵業曰烈經天緯地曰文施仁服義曰仁保大定功之曰武聦明文思曰安協時肇享曰孝迹夫十有三年大業是承四十餘年之治體不變非秉德遵業乎宸文睿藻之昭回龜圖洛畫之流布非經天緯地乎勸亷恤刑㧞賢去佞非施仁服義乎長筭逺畧動中事機内憂外患迄就底平非保大定功乎步道深而情偽洞察在御久而典則昭明超然逺覽惟懐永圖非聰明文思乎父天母地敬事敬享内則盡志外則盡物非協時肇享乎越廟號之建久矣道德仁義皆帝王之徽稱也而未聞有以理為號者稽之諡法曰慈惠有徳而已理之為義而止於斯也不既淺乎太極理之根源也二氣五行理之流布也天下萬事萬化皆於理乎出而君師則主張乎是先儒則講貫乎是也自我藝祖皇帝開國之初與韓王趙普發明道理最大之說由是本朝治體之純道學之粹逺同三代慶厯嘉祐間豪傑並出濓洛之學上接洙泗熈寧之用程顥元祐之起程頥紹興之聘尹彦明紹興之召朱熹列聖相傳皆欲表顯而尊崇之矣柰之何王安石則邪說誣民也秦檜韓侂胄則姦臣擅國也以新經字說胥天下為黄茅白葺則安石之為也反國事讎率獸食人謂學為偽謂道為禁則檜侂之為也理學之廢興闗於世道之消長可勝言哉先皇帝自初踐阼始御講筵即未嘗以名呼先儒若周元公頣則曰濓溪張郿伯載則曰横渠二程則曰伊川明道而尤為尊用朱文公熹之四書自時厥後或錫之美諡或贈之封爵淳祐視學首詔祀五臣而斥荆舒熄邪說正人心為去聖繼絕學為萬世開太平製緝熈一記製道統十三賛造詣精矣書無逸一篇書思無邪毋不敬六字儆戒備矣其土苴既足以治天下其精㣲又以傳之聖子資善堂有記元良有規道心精一之㫖悉在焉下南宫十有二詔而未嘗不以義理之學飭有司擢科目迎萬人而未嘗不以義理之文造多士中庸大學之書周程張朱呂之說家𫝊而人誦之士生斯時爭自濯磨以通經學古為先務以窮理盡性為大原可以淑羣心可以支世變雖有搶攘紛紜而國家基緒屹然不少動摇者以我之本領端正而功用宏闊故也嗚呼往古來今内聖外王一正理而已發揮正理不在孔孟乎㣲闗洛諸儒繼之則大道之與異端果孰勝而孰負哉主張正理不在我朝之列聖乎㣲先皇帝繼之則聖𫝊之與俗學果孰顯而孰晦也會羣獻之精藴訂百家之異指接二帝三王羣聖人統宗㑹元之粹而掃秦漢以來千數百年習浮踵誤之失謂非有功於是理乎理也者天之所為而非人之所設也聖人本天命之性躬率性之道而闌修道之教有功於是理者即有功於天也上帝臨汝無二爾心忠臣孝子於此時而稱天作諡也可以端拜而議矣尊諡宜天錫之曰烈文仁武安孝皇帝廟號理宗臣等謹議覆諡議曰巍巍乎洸洸乎將欽柴於陽阯用作鼉於禰宫觚編毫絡若為模繪夫理功之基也功理之輿也其來也幾㣲易簡其究也廣大堅固是或一道也循天下之理之謂道繼去聖之絕學昭皇王之大紀非建乎得天下之理之謂徳四十年之深積一太極之渾全非備乎道見乎變之謂功海内之治皆上世所難及非大乎道之燦然之謂興景定之元號為天下重開非復乎理無所不通也天運神化博施濟衆之方非聖乎理無乎不燭也宇定光發恢廣覽兼聽之公非明乎合烈文仁武安孝之號為尊明令顯隆盛之稱萬古在前億載在後無一息非天理之流行也勒之崇鴻寫之琬琰薦之上帝昭我理宗上配藝相與天無極臣謹拜手稽首請上徽號曰理宗建道備德大功復興烈文仁武聖明安孝皇帝詔以明年正月一日改為咸淳元年大赦天下宋史全文卷三十六
