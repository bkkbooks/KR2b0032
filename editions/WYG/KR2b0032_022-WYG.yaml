body:
  text: 宋史全文卷二十二上宋髙宗十六辛未紹興二十一年春正月丁酉詔翰林局醫生并奏試人並令試經義十二道以六通為合格與補翰林醫學二月丁未詔知郢州喬大觀州學敎授徐維並衝替自今不得與堂除上謂秦檜曰趙鼎所引用多非其人檜曰范冲中間修哲宗皇帝實錄委有妨嫌上曰祖宗時不委當時遷謫官修史恐有謗言以欺後世也廣南西路轉運判官陳璹知靜江府初朝廷命廣西帥臣即横山寨市馬於羅殿白把大理諸蠻歲捐黄金五鎰白金三百斤錦二百絁四千亷州鹽二百萬斤而得馬千有五百匹良馬髙五尺率直中金五鎰他以是為差每五十匹為綱選使臣部送至行在不顛斃於道則有賞璹始令官支脚錢選使臣運鹽若及十萬斤即與部良馬一綱至行在甲寅夜雨雹乙卯詔諸州各置惠民局壬戌簽書樞密院事巫伋充大金祈請使請歸皇族等事提舉江州太平興國宫魏矼卒於衢州自秦檜用事士大夫平日少失其意禍輒不測當始議和時矼與檜異論檜嘗欲除近郡矼遜辭不就奉祠十餘年寓居常山僧舍一室蕭然卒免於禍焉初趙鼎既謫居嘗謂其客方疇曰自鼎再相除政府外所引從官如常同胡寅張致逺張九成潘良貴吕本中魏矼皆有士望異日決可保其無他其後諸人流落之久雖死不變疇乃信服三月丁亥上曰州縣多催理積欠民間重困朕頃在京東親覩其害可令户部照年分蠲放夏四月庚戌禮部侍郎知貢舉陳誠之等言攷到博學宏詞科合格人下等監潭州南嶽廟莫中臨安府錢塘縣主簿葉謙詔並與堂除閏四月甲戌王揚英知泰州揚英自尚書郎斥去意望還朝㑹秦檜父病乃上書薦熺為相於是檜以郡處之丙子上策試南省舉頭鄭聞已下於射殿制策曰朕承中興之運任撥亂之責所賴於有官君子者為至切矣顧狃於聞見小慧相先謂了官事為癡謂履忠信為拙以括囊為深計以首鼠為圎機何灑濯可以革舊俗何陶染可以成美化舉人趙逵對策略曰葢自藝祖即位尊禮趙普以為社稷臣重其權信其人雖一時舉職如雷驤不能間也顯然示天下以好惡之所在磨以歲月使天下之士洗濯自新風俗一變又曰廊廟大臣有質正不撓者出身捍難作多士之氣以摧折倉卒之變維持至今此道不墜今陛下已尊任其人矣是宜明諭天下以好惡所在而又有以振厲之每進一人惟其癡惟其拙每退一人惟其深計惟其圎機則天下之士庶幾稍知向方然臣尚有私憂過計者慮陛下尊所聞之不堅異時或有言今之癡者為真癡今之拙者為真拙今之深計者為有德今之圎機者為有謀而陛下疑雖聖主在上賢臣輔相臣不敢謂安靜之福如今日詳定官擬逵第五上覽策謂有古文氣乃擢為第一遂賜逵等四百四人及第出身先是潼川府路提㸃刑獄公事楊椿被檄考四川類省試策問方今君臣同德之懿因論漢文帝不任賈誼為公卿等事舉人張震答策言文帝屈已和親而誼欲以表餌繫單于此不適時之論又言主上淵黙思道上天眷祐為生賢佐一德之誠克享天心椿定為榜首檜大善之及唱名震居第四戊子特奏名進士昌永等五百三十一人武舉進士湯鷽等六人授官有差五月乙丑秦檜奏欲令國子監復刻五經三史上曰其他闕書亦令次第雕板雖重有所費亦不惜也六月癸酉上曰近有進易說者以為易非卜筮之書自古以易筮春秋多載其事易有聖人之道四卜筮乃其一豈可以易占為非秋七月壬寅都大主管成都等路茶馬監牧公事符行中總領四川財賦軍馬錢糧行中嘗欲増簡州鹽筴以其事屬雅州軍事推官李燾燾力拒之張浚謂有臺諫風燾丹陵人初第進士調華陽簿未上讀書龍鶴山之巽巖㑹詔舉賢良張燾見其所著五十策善之然不果薦丁巳宰執奏茶鹽法成書上曰法已定當令久逺遵守往時隨事變更雖可趣辦目前日後入納稀少非善計也遂寧府言自紹興十七年至二十年嘉禾瑞麥歲不絶凡一百有六辛未提舉詳定一司敕令秦檜等上重修京湖淮浙京西路茶鹽敕令格式二百六十卷八月壬申揚武翊運功臣太傅鎮南武安寧國軍節度使充醴泉觀使咸安郡王韓世忠為太師致仕是日世忠薨於賜第年六十三始世忠得疾將吏問疾卧内世忠曰吾以布衣百戰致位公王賴天之靈得全首領卧家而没諸君尚哀其死耶世忠少時為省倉負米之役慓悍絶人不用鞭轡能騎生馬駒家貧無生業嗜酒豪縱不拘繩檢人呼為潑韓五有日者席某嘗言世忠當作三公世忠怒其侮已痛毆之年十八始隸軍籍挽強馳射勇冠軍中其制兵器凡今跳澗以習騎洞貫以習射狻猊之鍪連鎖之甲斧之有掠陣弓之有克敵皆世忠遺法嘗中毒矢洞骨則以強弩拔之十指僅全四不能動身被金瘡如刻畫晚以公王奉朝請絶口不言功名自罷政居都城髙卧十年若未嘗有權位者而偏裨部曲往往致身通顯節鉞相望歲時造門類皆謝遣獨好浮圖法自號清涼居士於時舉朝憚秦檜權力皆附麗為自全計世忠於班列一揖之外不復與親逮薨有詔選日臨奠檜遣中書吏韓瑊以危語脅其家於是其家辭而止追封通義郡王其子直敷文閣彦直直袐閣彦樸彦質彦古皆進職二等孫右承奉郎挺杖並袐閣賜五品服九月戊戌朔大理寺主簿丁仲京面對論贍學公田多為形勢之家侵占請佃望詔提舉官覺察上謂大臣曰緣不度僧常住多有絶産其令户部併撥以贍學既而本部乞令提舉司置籍拘管其無敕額菴院亦依此施行從之辛丑夜雷丁巳増築景靈宫用韓世忠賜第為之簽書樞密院事巫伋自金國使還趙性之曰巫伋作祈請使而無祈請之詞投書而已議者謂不識字之承局可優為也冬十月甲戌上幸清河郡王張俊第壬午制拜俊太師癸未秦檜奏臨安給匄者錢米自歲十一月為始上曰此事所濟甚大苦寒之時貧者遂得以活也普安郡王時在藩邸每遇天寒雨雪淹久都下居民有甚貧而無所得食者必命輟俸米以賑之歲以為常甲午王伯淮知臨江軍代還言清江縣有苗稅錢四十餘貫苗米四百餘碩人煙田産並在筠州髙安縣上頃苗稅在經界法謂之窵佃在鄉村謂之包套未經界之前尚可追理經界既定兩縣名隨産經量承認本鄉元額稅苗則清江有稅無田髙安有田無稅又兩縣一時結局清江不免以無田之稅増均於元額之田髙安即以無稅之田減均於元額之稅是髙安得偏輕之利清江得偏重之害矣望下諸路究實改正詔委本路轉運判官盧奎先是淳化中建筠州之瀟灘鎮為郡割髙安之兩鄉以隸之繇是有交鄉窵佃之弊左中奉大夫王居正卒秦檜之初相也居正時為修注嘗白上以檜作相前所言皆不讎檜憾之及檜專國居正畏禍屏居常州時事一不掛口檜猶奪其職奉祠十餘年十一月戊戌主管台州崇道觀程敦厚直徽猷閣敦厚獻紹興聖德詩極言和戎之效又獻秦檜詩有誕生聖相扶王室之語乃有是命庚戌參知政事余堯弼罷壬子詔諸路公私房廊白地錢並減半乙卯黄子游知池州還言農田水利上謂大臣曰聞陂田多為人侵占可令有司措置毋妨衆用翌日進呈上曰須常平官得人若監司得人事無不濟近時監司多端坐不出提㸃刑獄職在平反尤當徧臨所部宜戒飭之十二月尚書司封貟外郎王葆言民間多銷銅錢為器利率五倍乞禁約詔申嚴行下壬申夜雷庚辰雪時上以雪未應期遣人禱太一祠雪遂作癸未户部貟外郎李濤面對論近置諸州惠民局慮四方藥方差誤望以監本方書印給從之輪官面對正欲聞朝廷之利害天下之休戚今以權姦在位不言其當春禁樵捕則言惠民局藥方差誤所言僅及此而稍涉時政則禁不敢發口是則果何取於輪對哉人言不通國事從可知矣壬申紹興二十二年春正月己亥雷二月壬午詔建祚德廟於臨安府尋進封程嬰為強濟公公孫杵臼為英畧公韓厥為啓佑公升為中祀三月丁酉右承務郎王之奇之荀並特除名之奇送梅州之荀追所有官送容州並編管二人皆庶之子上因言庶為人凶悖深沮休兵之議幾誤國事壬寅提舉台州崇道觀葉三省落職筠州居住監臨安府作院王逺除名髙州編管先是三省嘗與趙鼎王庶通書力詆休兵之議明州進士陳燾得其真蹟并逺遺三省猶子書上之詔送大理上曰此不可不懲庶後來者知畏乃有是命己酉秦檜曰今内外無事所乏者循吏爾上曰然守令非人不可不治若置而不問則全無忌憚矣上又曰錢穀大計亦要户部得人朕觀徽宗朝户部之職多自發運轉運使擢用葢以經歴民事諳練財賦故也癸亥宰執進呈大理寺主簿丁仲京面對劄子論逺方州縣預借人户稅租有借及一二年者其間復以本色紐折見錢價又倍之輸納稍緩加以嚴刑上曰此多是州郡妄用若撙節不至如此可申嚴行下如違令監司按劾御史臺彈奏夏四月己巳司農寺主簿盛師文面對論頃嘗指揮州縣貧乏之家生男女不能贍養者每人支錢四千後改支義倉米一碩然近如臨安市井窮民未聞有得斗米千錢者况於鄉村與夫窮僻鎮聚望申嚴舊令戒以舉行從之丙子簽書樞密院事巫伋罷伋與秦檜居同鄉一日檜在都堂偶問伋云里中有何新事伋不敢對徐云近有一術士自鄉里來頗能論命檜色變謂伋曰是人言公何日拜相伋皇恐而罷章厦聞之即劾伋隂懷異意以摇國是林大鼐亦奏伋黷貨營私於是並遷二人而伋提舉江州太平興國宫辛巳拜厦為簽書樞密院事講義曰巫伋術士之對葢恐輒及時事以觸檜之怒故舉泛然不切之事聊以塞責云爾而檜勃然變色遽嗾使言路逐之惟恐他人攘已之位雖檜之猜狠忌克不近人情然亦可以為依阿取容諂事權貴者之戒矣五月辛丑右諫議大夫林大鼐言比來遐方多有健訟之人州縣漕憲未結絶則伸寃於部於臺於省官司必與之移送重定外方往往觀望為之變易曲直欲今後所訟曽經結絶官司須具情與法敘述定奪因依謂之㫁由人給一本厥有番異仰繳所給㫁由於狀首不然不受理使官司得以參照批判將來事符前㫁即痛與懲治亦無訟之一策也從之襄陽大水平地丈五尺漢水冒城而入知府事榮薿乘桴得免容州奏野蠶成繭六月戊子上謂大臣曰檢鼓兩院近日絶少論利害文字恐有阻節可下所屬檢察尚書禮部侍郎陳誠之以母憂去先是秦檜嘗諭誠之曰事有所聞可以片紙見諭葢檜方用告訐以擢人材誠之不領其意以此頗忤檜左朝散郎張九成時謫居南安軍或問九成曰近日士大夫氣殊不振曽無一言及天下事者豈皆無人材邪九成曰大抵人才在上之人作成若摧折之則此氣亦索有道之士不任其事安肯自辱哉秦公方斥異已大起吿訐此其勢欲殺賢者然未必不反激人之言子姑俟之知瀘州馮檝卒檝以傅㑹和議故為秦檜所厚帥本路者凡八年秋七月甲辰將作監主簿孫祖壽面對言祖宗格法尤重親民之官近歲格應薦舉者既未必能一一知人而生弊日滋遂有踰越舉貟之數重發奏牘以掠虛惠其被舉者往往爭先到部密賂胥吏放散舉主以絶後至甚至於昧其所知公納厚賄使守節寒士甘心遐遺其違聖化敗士風也明矣欲望申飭有司増重法令有犯必行詔刑部申嚴行其受賂一節立法申尚書省其後本部請以受所監臨財物論著為令從之八月丁亥提舉台州崇道觀趙子彦卒於是恩平郡王璩以憂去官九月丁卯左朝奉郎周楙言前任知蘄州從士民之請修復河隄以捍水勢工費已具望委州縣就農隙興役上可其請因謂大臣曰不獨蘄州凡沿淮有當備水患去處悉令曹臣同守臣措置己酉殿中侍御史兼崇政殿說書宋樸為侍御史樸甫受命即劾簽書樞密院事章厦詔厦提舉江州太平興國宫乙卯致仕劉一止上中興聖德詩擢敷文閣待制冬十月甲戌御史中丞宋樸簽書樞密院事樸自撫州學官召還甫踰年而執政庚辰詔責授建寧軍節度副使昌化軍安置李光依已降指揮永不檢舉知台州蕭振池州居住從政郎楊煒特貸命追毁出身送萬安軍編管初光既參大政煒以朝廷和議為非作書欲獻光先見振言其意光不答及是振知台州煒為黄巖令政頗有聲振遂薦煒改秩又移書浙東提刑秦昌時同薦之昌時檜猶子也不許煒在官鉏治凶惡無所貸俄縣吏得煒書有詆檜語昌時聞於朝詔送大理寺仍大索煒家得所草萬言書語益切煒具伏刑寺奏煒當死上特宥之十一月辛丑知常州錢周材獻紹興聖德詩詔周材充集英殿修撰癸卯左朝奉郎凌景夏知筠州景夏在館士與秦檜異論閑居凡十餘年戊申合祀天地於南郊赦天下丁已太府卿兼權户部侍郎徐宗說權尚書户部侍郎宗說頗有心計吏不能欺然附秦檜以至從官常為檜營田産時人月宗說為莊客戊午知建康府楊愿薨先是愿守宣城其表弟王炎調蘄水令往見之醉中偶謂愿曰昔嘗於吕丞相處得公頃歲所通書其間頗及秦丞相之短尚記憶否愿聞之色如死灰自是留炎不得去始患之㑹愿移守金陵燕監司大合樂守卒皆怠炎即青溪得客舟而去愿覺既失炎憂撓成疾至是薨十二月福州舊法民歲輸錢而受鹽於官其後不得鹽而輸錢如故民多私鬻而官亦不問至是張宗元知州事始再摧鹽犯法者滋多人不以為便安撫司屬官胡憲上書於宗元告以為政大體宗元不恱久之憲請嶽祠而去癸酉紹興二十三年春正月己亥致仕髙閌卒閌退居明州秦檜欲卜其向背因其鄉人姚孚者達意於閌欲以弟之女予其子閌辭之遂致其仕絶口不言時政杜門觀書卒免於禍云戊午知鎮江府王循友移知建康府趙性之曰王循友乞加秦檜九錫雖不行俄自知鎮江遷知建康府識者不敢言惟以目相視而已二月辛未改䖍州為贑州貢水至城東北與章水合故名焉三月癸卯知南外宗正事士珸言宗子善軫在學實及二年文藝卓然衆所推譽乞免文解一次上曰近日宗子多讀書誠可喜也戊申左朝請郎范彦輝追毁出身除名勒停送荆門軍編管初彦輝為太府寺丞嘗作夏日久隂詩云何當日月明痛洗蒼生病殿中侍御史魏師遜奏彦輝隂懷異意謗訕朝廷法寺鞫實故有是命癸丑江南西路轉運司主管文字王歴候令任成資日優與陞擢差遣歴居撫州恃秦檜之勢淩奪百姓田宅甚於寇盜江西人苦之夏四月辛巳詔諸州編管羈管人聞比來囚禁鎖閉甚於配隸可令遵守成憲乙酉詔利州歲鑄錢以九萬緡為額視舊額減五分之二仍並鑄折二錢六月己未王之道通判安豐軍之道以上疏言兵故坐黜者十四年辛酉上謂大臣曰近日霖雨所在民田有被水患者可下州縣遣官檢放苗稅壬戌國子監丞吳武陵面對乞申嚴荆湖福建士民不舉子之禁令保伍更相覺察月上娠産之數於官兼申給錢之令詔監司丁寧州縣悉意奉行其有顯績去處保明申奏推賞己卯潼川大水涪江漲庚辰𤣥武江漲水四面懷城奄至人方惶駭爭保城西牛頭山寺山趾大溪橋壞水大至平地丈五尺死者甚衆秋七月辛卯諸王宫大小學敎授王綸面對乞委有司將先聖從祀之士詳加蒐括自國子監為始重行彩繪以其式鏤板遍下諸郡縣詔送禮部庚戌右諫議大夫史才言浙西民田最廣而平時無甚害之憂者太湖之利也數年以來瀕海之地多為軍下兵卒侵據為田隊伍既衆易於施工累土増髙長隄彌望名曰垻田旱則據之以溉而民田不沾其利水則逺近汎濫不得入於湖而民田盡没矣欲望委本路監司躬行究治盡復太湖舊迹使軍民各安其職田疇盡蒙其利從之八月己酉鄭康佐知惠州代還言陛下臨御以來詔令為民而下者十常八九所以天祐一德民懷有仁然親民莫如守令按察莫如監司若監司巡歴或不周徧則遐方僻壌郡邑官吏循習弛怠奉行必有不謹者望申飭攸司自中興以來省刑罰薄稅斂凡恤民寛厚之詔令編類成書以賜守令仍令監司歲内分巡所部要務周備以察奉行詔令之當否官吏之勤惰庶幾咸思振舉庶職惠養黎元以稱勵精求治之意詔令敕令所編類丙戌薛仲邕為大理司直仲邕曹泳之甥故秦檜用之是月諸路發解舉人而右文殿修撰秦塤當就兩浙轉運司取應檜親黨或謂平江府觀察推官蕭燧曰秋試必主文漕臺燧詰其故曰丞相有孫就舉將以屬君燧謝曰燧初仕敢欺心耶漕檄下乃秀州也至則溢貟就院易一張教授者去塤果前列燧清江人進士甲科既為檜所怒自是浮湛州縣者十年九月丁亥王之望提舉湖南常平茶鹽公事之望自荆門代歸獻啓於秦檜歴敘勞績每句疏解其下又上秦熺書頌其德合於坤之六二遂有是命甲午上諭大臣曰聞潼川路水災可令轉運常平司將被災州縣檢放賑濟庚子敕令所刪定官吳増面對乞上禁捕鹿胎為飾因舉真宗皇帝不殺羊羔事以為自澶淵講好之後十有九年不言兵而天下富庶者其源葢出於此詔刑部申嚴施行辛亥宰執進呈知靜江府陳璹奏廣西和糴事上曰璹善治郡與除直祕閣知潭州其他有昏耄不任事之人令自陳宫觀時秦檜當國凡謫官在嶺外者雖其親舊不敢相聞葢傾險急進者或窺伺中傷以為奇貨璹頗能調護遷客通判靜江府江應辰檜之所不樂者璹獨與之相善於是檜薦璹有材召赴行在至則復以長沙命之上亦莫測其故也冬十月戊辰簽書樞密院事兼權參知政事宋樸罷壬申右諫議大夫史才簽書樞密院事先是臨安府守臣曹泳薦監激賞酒庫龔釡於秦檜使掌平江府秀州莊屋釡既改秩令權監六部門釡因徧詣田所相視有瘠薄者即追售田之人勒償元直民甚苦之壬午監察御史鄭仲熊守右正言前四日仲熊與監察御史王綸俱被引對而仲熊有是命時秦檜秉政久而張俊楊存中為檜所厚於是仲熊首論定國是久任用與推誠於有功之宿將其言率多阿附時論鄙之十一月壬辰經筵講尚書徹章賜秦檜玉帶名馬癸巳宰執奏呈上顧謂檜曰朕記此書自說書官尹焞始觀焞進講皆其師程頤之說餘無所取檜曰程氏之徒祖宗之諱不避而諱其師之名甚嚴事君事師之道恐不當有厚薄兼已受官乃更欲廩人繼粟庖人繼肉曽不思孟子處賔師之位仕而不受祿則有此禮先是胡安國奉詔修春秋傳於諸經正文不諱故檜及之然程頤元祐中實未嘗言祿也甲午右正言鄭仲熊言工部貟外郎楊迥監察御史胡襄心嚮胡寅之門有識之士為之切齒葢自趙鼎妄立專門互相標榜大開交結詭計固密有司附㑹不論才與不才有是說必寘之髙等士子扼腕二十年於兹今襄又為之唱欲使人人盡歸於趙鼎胡寅之門而後止於是迥襄並罷閏十二月乙酉雪上曰適當臘中來歲農事可喜也甲戌紹興二十四年春正月癸酉初詔郡國同以中秋日試舉人舊諸州皆自選日舉士故士子或有就數州取解者至是始禁之戊寅地震二月乙未貢院言應博學宏詞科新平江府錄事參軍莫濟監潭州南嶽廟王端朝合格並循資與堂除三月丁巳尚書司勲貟外郎兼權中書舍人孫仲鼇罷以右正言鄭仲熊論仲鼇攝職成均力主專門以私黨與故也仲鼇嘗為李光客故仲熊劾之辛酉上御射殿策試正奏名進士先是秦檜奏以御史中丞魏師遜權禮部侍郎湯思退右正言鄭仲熊同知貢舉而吏部郎中沈虚中及監察御史董德元張士襄等為參詳官師遜等議以敷文閣待制秦塤為榜首德元從謄錄所取號而得之喜曰吾曹可以富貴矣遂定為第一榜未揭虛中遣吏踰墻以白秦熺及廷試檜奏以士襄為初考官仲熊覆考思退編排而師遜詳定虛中又密奏乞許有官人為第一至是策問諸生以師友之淵源志念所欣慕何修而無偽心何治而克誠塤對策曰自三代而下俗儒皆以人為勝天理而專門為甚言正心而心未嘗正言誠意而意未嘗誠言治國平天下而於天下國家曽不經意頑頓亡節實繁有徒慮亾不懷諼而嗜利自營者比而不黜顧欲士行之無偽譬猶立曲木而求直影也舉人張孝祥策曰往者數厄陽九國步艱棘陛下宵衣旰食思欲底定上天祐之畀以一德元老志同氣合不動聲色致兹昇平四方協和百度具舉雖堯舜三代無以過之矣又曰今朝廷之上葢有大風動地不移存趙之心白刃在前獨奮安劉之略忠義凜凛易危為安者固已論道經邦燮和天下矣臣軰委質事君願視此為標凖志念所欣慕者此也曹冠策曰自伊川唱為專門之學蔽於一曲不該不徧述正道而稍邪哆好誇大而無實用習其學者尤為迂誕為師者不傳㫖要而使之黙㑹為友者不務責善而更相比周故凡為伊川之學者皆德之賊也於是師遜等定塤為首孝祥次之冠又次之上讀塤策皆檜熺語遂進孝祥為第一而塤為第三賜孝祥以下三百五十六人及第至同出身時檜之親黨周夤唱名第四仲熊兄子右迪功郎時中第五秦棣子右承務郎焞楊存中子右承事郎倓並在甲乙科而仲熊之兄孫縝趙密之子成忠郎廱秦梓之子右承事郎焴德元之子克正曹泳之兄子緯檜之姻黨登仕郎沈興傑皆中第天下為之切齒冠檜館客也龜鑑曰倫魁所以待天下士也既私其子熺又私其孫父子親黨環列要津雖霍光之根據亦不是過云大事記曰檜子熺既嘗為舉首又以其孫塤為舉首上覺之遂居第三進士榜中悉以其親黨居之天下為之切齒而士子無復天子之臣矣丁卯簽書劒南東川節度判官㕔公事趙逵為秘書省校書郎先是總領四川財賦符行中有子預薦意逵必為類試考官密以文屬之逵不啓緘既試符子氏不預奏名行中怒因事捃摭逵甚峻然不能害也丙子特奏名進士吕克成以下四百三十四人武舉進士鄭矼等十六人特奏名二人授官有差庚辰提舉台州崇道觀朱貺知建康府先是王循友守建康因事忤秦檜故罷去而用貺代之夏四月乙巳進士孔搢襲封衍聖公先是搢之父衍聖公玠卒於衢州守臣以聞故有是命五月癸丑朔日有食之癸亥監察御史王綸罷綸本中丞魏師遜所舉至是綸以論事忤秦檜意師遜懼即自言智識淺昧於綸不得其詳望將綸罷黜庶使臣有改過之實云六月癸未朔提舉江州太平興國宫汪藻卒藻黜居八年累赦不宥請還政不許至是卒藻工於儷語其所為制詞人多傳誦癸巳簽書樞密院事史才罷甲午御史中丞魏師遜簽書樞密院事尋兼權參知政事辛丑前知建康府王循友特貸死免籍没家財送藤州安置男前江南東路安撫司主管機宜文字浤追兩官弟新奉國軍節度推官循訓追四官送雷州編管新添差通判饒州韓參追兩官送德安府編管並勒停除名初循友在任嘗刺配秦檜族人檜銜之遂興此獄己酉大理評事劉敏求面對言比年監司郡守有以一章而舉二人甚至於三四人前所舉者未用後來求者復舉之名曰改舉黷害風敎莫此為最望申嚴法禁無故而改重寘以法從之秋七月癸丑右正言鄭仲熊言前知雷州王趯頃在任日每有被罪南竄者則厚賂津置為之橐囊結成死黨今聞在全州遂與海外罪人為地或謂擅離受責之地逃匿趯家欲望特降眷㫖押王趯前來大理寺究治仍令日下押還元責地分詔依所請先是李光謫居昌化軍因趯寓書秦檜以求内徙檜見書疑光擅離貶所大怒故有是命安民靜難功臣太師靜江寧武靖海軍節度使醴泉觀使清河郡王張俊薨於行在年六十九翌日輔臣進呈上曰張俊遽亾曩者張通古來俊極宣力與韓世忠等不同恩數宜從優厚俊晚年主和議與秦檜意合上厚眷之其麾下將佐若楊存中田師中王德趙密劉寶皆建節鉞或至公師幕府諸僚為侍從帥守者甚衆壬戌詔四川制置總領司許於茶馬司寛剩錢内撥取以寛民力時茶既貴售諸場大段溢額而買馬之數復不加多茶馬之富甲於天下率以歲剩上供至是詔捐以予民蜀人稍蘇矣主管台州崇道觀程敦厚靖州居住先是敦厚既斥歸久不用乃上疏曰臣切惟陛下當搶攘蹙迫之中爰立同德付以魁柄任天下所不敢任之責而成天下所不能成之功今國是大定鄰好胥穆猶泰山而四維之尚何憂何慮而臣切有不能自己者葢昔之怙亂害成之流䑕伏狙伺尤為可畏願陛下力遏朋邪之萌以幸海内然秦檜薄其為人卒謫之甲子右正言鄭仲熊言知成都府蕭振曩緣趙鼎用事倡為專門之說振阿附之自謂其曲學出於程頤殊不知頤在先朝固嘗見詆於識者如蘇軾尤嫉其奸振亦何知乃藉為仕進之梯詔振落職放罷依舊宫觀池州居住乙丑總領四川財賦軍馬錢糧符行中為四川安撫制置使兼知成都府成都府路提㸃刑獄公事鄭靄總領四川財賦軍馬錢糧靄與行中在蜀中饋遺秦檜不可計雖歲時寒暄之問亦必用金獅子二枚坐書焉八月丙戌鄭作肅知吉州還入見奏本州自兵火後每歲樁辦黄河竹索錢六千六百餘緡見拖欠四萬餘緡重困民力望并賜蠲放上可其奏秦檜怒後旬日殿中侍御史董德元即奏作肅朋附席益中傷善類及知常州張浚主兵行横斂之法作肅極力率先督辦比守吉州多斂軍需賤市官米又賈販油布之屬以規厚利詔令本路提刑司取㑹具案聞奏丁亥遣户部貟外郎鍾世明同四川總領措置裕民自講和後歲減川錢四百六十萬緡有奇朝廷猶以為重於江淮故有是命壬辰上諭秦檜曰近輪對者多謁告避免百官輪對正欲聞所未聞可令檢舉已降指揮約束施行於是申嚴行下丙午禮部擬定故太師清河郡王張俊贈典乞依韓世忠例先是上諭秦檜曰武臣中無如張俊者比韓世忠相去萬萬贈典宜從優厚及是進呈上曰可與贈小國一字王於是特封循王國朝淳化以後異姓不封真王其追封葢自俊始後諡忠烈史臣曰上之於世忠待遇賜予視諸將最厚與張俊語多摧折告戒之辭俊之立功葢有所激及俊死稱謂之美如此抑場予奪有深㫖哉九月己巳太師左僕射秦檜等進呈徽宗皇帝御集凡百卷上自序之權奉安於天章閣壬申安奉御集禮儀使秦熺言伏覩進呈御集前夕密雲閣雨翌日迎奉出秘書省天宇廓清皎月如晝仰見聖孝感格伏望宣付史館從之冬十月壬午秦檜奏諸路州今歲豐熟間有髙田旱傷去處上曰可令依條檢放公私欠負仍住催理其係官年歲深逺者委户部開具取㫖除放仍令常平司措置通融糶糴務令兼濟毋致失所權吏部侍郎施鉅言屬者誤蒙聖選銜命出疆禮備將還而鄰國之君嘗問陛下師臣所兼何職又問今年有幾臣皆以實對兹有以見陛下聖明登崇賢哲朝廷尊榮故寶鄰信而仰重之也伏望宣付史館昭示萬世從之十一月庚戌朔新建龍圖等六閣成甲寅知臨安府曹泳權户部侍郎兼權知臨安府時徐宗說久病故以泳代之泳倚勢妄作又甚於宗說時秦檜晩年怒不可測而泳其親黨凶焰熾然乙丑簽書樞密院事兼權參知政事魏師遜提舉江州太平興國宫丙寅恩平郡王璩從吉還舊官丁卯權尚書吏部侍郎施鉅參知政事權尚書吏部侍郎鄭仲熊簽書樞密院事自秦檜專國士大夫之有名望者悉屏之逺方凡齷齪委靡不振之徒一言契合率由庶寮一二年登政府仍止除一㕔謂之伴拜稍出一語斥而去之不異奴隸皆褫其職名閣其恩數猶庶官云故自万俟卨罷至此十年參預政事之臣才四人而已戊辰少保觀文殿大學士充萬壽觀使兼侍讀提舉祕書省秦熺加恩遷少傅封嘉國公左奉議郎通判武岡軍方疇除名永州編管疇坐與流人胡銓通書為守臣李若樸所告十二月辛巳左朝奉郎知蜀州孫道夫主管台州崇道觀從所請也道夫在郡九年遇事明了州人目之為水晶燈籠丙戌魏安行送欽州編管主管台州崇道觀洪興祖送昭州編管先是右正言王珉言程瑀昨在閑廢輒取先聖之書肆為臆說洪興祖則為文以冠其首魏安行則鏤板以廣其傳朋比之惡葢極於此望將見今鏤板速行毁棄重賜施行故有是命丁亥勒停人王趯追三官送辰州編管先是詔湖南廣西憲臣親往捕李光押還元責地分仍逮趯赴大理獄既而事皆虚特有是命乙亥紹興二十五年春二月壬寅左朝議郎沈長卿追兩官送化州左從政郎芮􅂱追一官送武岡軍並勒停除名編管長卿舊嘗與李光啓曰縉紳守和親甘出婁欽之下策夷狄難信結孰慮吐蕃之劫盟與其竭四海奉豺狼之歡何至屈萬乘下穹廬之拜秦檜已惡之至是與􅂱同賦牡丹詩􅂱詩有今作塵埃奔走人之句為鄰舍人所告以為譏議送大理寺乃有是命是日宰執進呈鄭仲熊黙無一語罷朝秦檜頗咎之三月己酉詔尚書左司郎中張士襄奉使不肅可罷見任士襄使金還入對奏事欺罔上怒秦檜與士襄里黨止以其不肅罷之辛酉詔知靜江府吕愿中令赴行在奏事先是靜江府有驛名秦城愿中約賔寮共賦秦城王氣詩以侈其事衆人皆賦其不賦者唯監潭州南嶽廟劉芮常平司幹官李􅀈本府觀察支使羅博文三人而已秦檜喜乃奏愿中招降南丹有勞進其職至是召龜鑑曰聖臣元聖之稱九錫副車之請秦城王氣之獻彼固欲以媚檜也檜乃欣而受之其將何為也耶檜而不死則中興事業未可知也他相或一年或二年或不數月而檜乃藉權專寵至十八年檜之罪所謂上通於天萬死不足贖也庚戌知肇慶府章元振提舉廣南東路常平茶事兼東西路鹽事時秦檜除吏多親故間亦用同鄉同榜之士然必其人自敘且力禱然後得之元振與檜同登第甘於逺宦未嘗以私書干檜前知潮州監司薦其治績但籍記中書而已至是稍錄之丙子百官以國忌詣景靈宫參知政事施鉅擁葢入櫺星門衆論大喧鉅始送其卒於有司亦不待罪時臺諫方共摘其罪鉅自是不安於位矣夏四月己卯萬壽觀使秦熺自建康還入見時秦氏權震天下熺過平江守臣湯鵬舉伺候迎送甚謹至建康遊茅山因留詩華陽觀有家山福地古云魁一日三峯勝氣回之句留守宋貺即鑴板揭於梁間熺再來見牌側有白字隠然提梯視之乃曰富貴而驕是罪魁朱顔綠鬢幾時回詰其所自了不可得貺與道流皆懼而熺不懌乙酉參知政事施鉅罷己丑江南西路安撫司參議官張瑜知秀州秦熺之過秀也瑜攝守事作衮綉堂繪檜熺像於中故有是命台州闕守州人詣御史臺舉通判州事管鎬侍御史董德元奏罪人李光之子名孟津者其繼母乃鎬之妹故鼓率士民舉鎬為知州望將鎬先次放罷以破其姦計併議孟津鼓唱之罪辛卯詔鎬放罷孟津令紹興府羈管李光之得罪也其弟寛亦被羅織除名勒停長子孟傳中子孟醇皆侍行死貶所仲子孟堅以私史事對獄掠治百餘日除名編管孟津其季子也至是亦抵罪田園居第悉皆籍没一家殘破矣甲午添差通判信州吕忱中提舉江南東路常平茶鹽公事忱中稽中族兄弟也訐守臣林機隂事以告秦檜故就用之癸卯黄兊提舉兩浙東路常平茶鹽公事兊娶秦檜兄女曹泳薦用之五月丁未朔日有食之隂雲不見時太廟仁宗室柱生芝草九莖左迪功郎沈中立為頌以獻戊申上諭大臣曰朕每以歲豐為上瑞雖靈芝朱草固未嘗以為意至於宗廟産之則非他比有沈中立進頌俟降出可觀之詔中立循一資勾龍亷獻聖孝金芝頌詔進秩一等户部侍郎曹泳言諸路免行錢欲乞截日並行住罷仍令百官不得下行買物庶幾少寛民力從之癸丑侍御史董德元言左朝散大夫趙令衿詐偽不情專事狂悖交結罪人伺探國事詔令衿汀州居住先是令衿自泉州代還寓居衢州嘗召客觀月令衿因觀秦檜家廟記文口誦君子之澤五世而斬之句右通判州事汪召錫州學敎授莫汲皆於坐間聞之召錫娶檜兄女遂令汲告令衿評論日月無光謗訕朝政德元聞而劾之故有是命壬戌諸王宫大小學敎授兼權中書舍人劉珙罷時秦檜微示風㫖欲為父作諡以珙不即奉行也怒風言者論之侍御史董德元即奏珙每見詞頭稍多輒有憚煩之意乃罷之知信州林機移知邵州機嘗奏秦檜父祠堂生芝草又為檜捜求水精民極以為擾至是為吕忱中所託檜始咎之六月庚辰簽書樞密院事兼權參知政事鄭仲熊罷尚書禮部侍郎湯思退簽書樞密院事兼權參知政事洪遵復為祕書省正字湯思退薦之也既而遵之父英州安置晧亦主管台州崇道觀袁州居住詔改岳州為純州岳陽軍為華容軍先是左朝散郎姚岳獻言秦檜謂岳飛躬為叛亂以干天誅湖湘漢沔皆其生時提封之内而巴陵郡猶為岳州以叛臣故地又與其姓同顧莫之或改事下本路諸司於是知荆南府孫汝翼等言按水經汨水與純水合羅淵即今巴陵郡是也純之為字有純臣之義焉其言純粹純白純常皆靜一不雜之義足以洗叛臣之汚故有是命岳嘗為飛幕屬至是自謂非飛之客且乞改州名士論鄙之秋七月戊申宰執進呈疎決文字上曰行在刑獄皆已審克外路須令憲臣躬詣州縣庶無寃濫己酉秦檜奏曰陛下欽恤庶獄異境所推今欲令大理正一貟往決浙西滯獄以稱德意上可之戊午添差通判衢州汪召錫提舉荆湖南路常平茶鹽公事秦檜賞其訐趙令衿且令圖張浚乃奏昨得㫖汪召錫已死欲與其弟召錫推恩詔令除職甲戌交趾郡王李天祚進封南平王天祚遣使入貢故有是命八月辛巳秦檜進呈看詳守臣到任所陳裕民五事上曰守臣陳獻利害當令國與民皆足乃為稱職如建炎間時方艱難財用匱乏翟汝文知越州乃盡放散和預買及鑑湖官不恤國計而專欲盜名如此等人國家何賴焉丙戌尚書吏部侍郎董德元參知政事德元登第七年而執政自吕蒙正以後所未有壬辰權尚書刑部侍郎張柄知潭州柄秦檜死黨也時張浚謫居永州檜猶忌浚故使柄與汪召錫共察之癸巳昭州編管洪興祖卒初趙鼎罷相居㑹稽其門人方疇為秦檜答張九成有立朝須優游委曲之語因曰秦檜亦今之賢者安得有此怪論鼎曰此南方之所謂賢者北方之賢者必不爾也疇曰公既知之安得薦之於上乎鼎曰張德逺罷相之後鼎再相上曰卿既還朝見在政府去留惟卿意鼎曰秦檜不可令去一日檜留身下殿有喜色謂鼎曰檜適求去上云公自知檜令檜與公商量鼎握檜手曰吾軰當以國事為心也檜由是安跡葢行止非人所能也至是疇黙數檜再專國柄十有八年士大夫死於其手者甚多則鼎言非人所能為信哉甲午兩浙轉運副使鍾世明乞四川諸路應係大鐵錢並依利州路作二文使用官司不得括責拘收從之蜀自漢以來用銅錢至公孫述據蜀始更造鐵錢歴代仍用銅錢孟氏廣政初復鑄鐵錢與銅錢互用國朝平蜀後吕餘慶鎮蜀日首與沈義倫奏乞㨂出銅錢計綱發充上供其川界止行用鐵錢後以為非便淳化間仍令兩川銅鐵錢兼用先是益卭嘉眉州皆鑄鐵錢每歲五十餘萬緡後因李順之亂罷鑄久之民間鐵錢始用私行交子因而弊端百出景德三年張詠上言受詔與轉運使黄觀同裁度嘉卭二州所鑄錢每銅錢一小鐵錢十相並行自後人多盜鎔大中祥符七年凌策又請鑄大錢以一當十嘉州監名豐逺卭州錢監名惠民止於兩州置爐鼔鑄嘉祐四年趙抃為轉運使奏以蜀中鐵錢甚多乞罷鑄十年以寛民力熙寧間轉運司復言罷鑄累年民間見錢闕少立行下三司詳度減半鑄錢與交子相權詔從之後廢嘉州豐逺監至建炎二年卭州復罷鑄紹興十五年鄭剛中始復利州紹興監鑄大小錢歲各五萬施州廣積監者起於紹聖三年歲鑄萬緡南平軍廣惠監萬五千緡皆供本州省計而已丁酉秀州州學敎授陳巖肖為諸王宫大小學敎授巖肖在秀州為秦檜立祠堂於學舍熺歸稍薦用之俄兼權考功郎官己亥知洪州張宗元罷時秦檜忌張浚尤甚每臺諫官劾疏必使及之殿中侍御史徐嘉即言宗元天資隂狡頃在川陜與浚大誤國事今書問往來健步絡繹無一日無之宗元遂罷九月宰執奏事上因問今天下一歲茶利所入幾何秦檜曰都茶場等三處一歲共得賣茶鈔錢二百七十餘萬貫上曰比承平時少陜西諸路故其數止此辛亥直祕閣楊揆特降一官仍落職揆嘗以事為秦檜所憾屏居台州不敢出者將二十年檜怒不已守臣劉景即奏揆有田在黄巖縣不依上户輸納科敷雖㑹赦猶有是命丁巳尚書左僕射提舉詳定一司敕令秦檜等進呈紹興寛恤詔令二百卷自鄭康佐建請至是再踰年乃成凡五十門詔鏤板頒降冬十月丙子新知無為軍張永年直祕閣永年與秦檜連姻至是獻其父文集於朝故有是命庚辰右朝散郎朱敦儒特引對秦檜喜敦儒之才欲為其子孫模楷敦儒已告老強起之既至落致仕仍詔陳乞過恩澤免追奪日後致仕更不推恩比對即除鴻臚少卿人始少其節建炎中廢鴻臚寺及是復置癸未右正言張扶言右通直郎陳祖安本李光庶婢之子其天資凶險實酷似之光為朝廷擢用之時祖安出入其門助為傲虐望將祖安勒歸建州本貫令官司常切覺察月具其在申尚書省從之添差衢州周麟之言近太廟生靈芝九莖連葉此尤瑞應之大卓絶而創見者宜令有司考故事特製華旗繪靈芝之形於其上以彰一代之偉蹟詔令所屬製造既而禮部侍郎王珉秦塤權貟外郎趙逵等乞以諸處申到瑞木嘉禾瑞瓜雙蓮等並繪為旗從之甲申國子正莫汲大理評事莫濛並罷殿中侍御史徐嚞言趙令衿與汲評論日月無光若非平日交結之深豈肯披露心腹遽發是言今趙汾已送獄而汲在朝列濛為寺官若不區處則獄吏觀望不盡實情故有是命乙酉右正言張扶言右承議郎張祁緣其兄邵奉使遂叨一命乃私犯其嫂以致有娠於蓐中隂殺以滅口胡寅從而庇之且寅之為人凶悖險詐專事脅持范宗尹趙鼎之徒畏之如鬼伏望付於有司正其罪以快天下公論詔大理寺根治辛卯太師尚書左僕射秦檜言衰病交侵日就危惙伏望許臣同男熺致仕二孫塤堪改差在外宫觀上賜詔曰卿比失調䕶日冀勿藥之喜遽覽封奏深駭聽聞其專意保攝以遂平復副朕所望檜秉政十八年富貴且極老病日侵將除異已者故使徐嚞張扶論趙汾張祁交結事先捕汾下大理寺拷掠無全膚令汾自誣與永州居住張浚昌化軍安置李光新州安置胡寅謀大逆凡一時賢士五十三人檜所惡者皆與獄上而檜已病不能書矣大事記曰甚矣檜之忍也不惟王庶胡銓趙鼎張浚李光張九成洪皓李顯忠辛企宗之徒相繼貶竄而吕頤浩之子摭趙鼎之子汾王庶之子之苟之奇皆不免焉葢檜之心大狠愎尤甚於章蔡竄趙鼎而必置之死殺張浚而猶及其家甚至蕭振以附釋氏之學而得禍洪興祖以序馮禹論語注而得禍末年欲殺張浚胡寅等五十三人而檜已病不能書可畏哉壬辰少傅觀文殿學士秦熺言父以久病未安乞謝事納祿伏望許臣守本官致仕庶幾父子俱退追跡漢疏上優詔不允乙未上幸秦檜第問疾檜朝服拖紳無一語惟流涕淋浪上亦為之揮涕熺奏請代居宰相者為誰上曰此事卿不當與已刻還内是夕召權兵部侍郎兼權直學士院沈虚中草檜父子致仕制夜熺遣其子禮部侍郎塤與其黨右司貟外郎林一飛宗正丞鄭柟等見殿中侍御史徐嚞右正言張扶謀奏請除熺為宰相是日主管台州崇道觀洪皓卒於南雄州丙申太師尚書左僕射同中書門下平章事兼樞密使益國公秦檜進封建康郡王少傅觀文殿大學士充萬壽觀使兼侍讀提舉祕書省秦熺為少師並致仕其孫試尚書禮部侍郎兼實錄院修撰塤提舉佑神觀堪並提舉江州太平興國宫初檜病篤招參知政事董德元簽書樞密院事湯思退至卧内以後事囑之且贈黄金各千兩德元以為若不受則他時病愈疑我二心矣乃受之思退以為檜多疑心他時病愈必曰我以金試之便待我以必死邪乃不敢受上聞之以思退為非檜之黨是日以思退兼權參知政事夜檜薨年六十六遺表略曰願陛下益堅鄰國之懽盟深思宗社之大計謹國是之摇動杜邪黨之窺覦初靖康末檜在中司以抗議請存趙氏為金所執而去天下髙之及歸驟用為相檜力引一時仁賢如胡安國程瑀張燾之徒布在臺省士大夫亟稱之未幾為吕頤浩朱勝非所排遂不復用㑹張浚與趙鼎有隙因薦為樞密使浚罷鼎復相諸執政盡逐而檜獨留既而與鼎並居宰席卒傾鼎去之金人渝盟軍民皆歸咎於檜檜傲然不肯退又使王次翁奏留之韓世忠張俊岳飛方提兵檜與俊密約議和而以兵權歸俊飛既誅世忠亦罷俊居位不去檜乃使江邈論罷之由是中外大權盡歸於檜非檜親黨及昏庸䛕佞者則不得仕宦上見江左小安以為檜力任之不疑檜隂結内侍及毉師王繼先闖微㫖動靜必具知之日進珍寶珠玉書畫奇玩羨餘帝寵眷無比命中使陳腆續瑾賜珍玩酒食無虚日兩居相位凡十九年薦執政必選世無名譽柔佞易制者不使預事備貟書姓名而已其任將帥必選奴才初見財用不足密諭江浙監司暗増民稅十八故民力重困餓死者衆又命察事卒數百游市間聞言其奸者即捕送大理寺獄殺之上書言朝政者例貶萬里外日使士人歌誦太平中興盛治之美故言路絶矣士人稍有政聲名譽者必斥逐之固寵市權諫官匪人略無敢言其非者性隂險如崖穽深阻世不可測喜贓吏惡亷士略不用祖宗法每入省已漏即出文案壅滯皆不省貪墨無厭監司帥守到闕例要珍寶必數萬貫乃得差遣及其贓汚不法為民所訟檜復力保之故贓吏恣横百姓愈困臘月生日州縣獻香送物為壽歲數十萬其家富於左藏數倍士大夫投書啓者臯䕫稷契為不足比必曰元聖或曰聖相至有請加九錫及置益國官屬者至於􅁯讎逆理陷害忠良陰沮宗資之議又其罪之大者上久知檜跋扈祕之未發至是首勒熺致仕餘黨以次竄逐天下咸仰英㫁焉丁酉執政奏事上曰秦檜力贊和議天下安寧自中興以來百度廢而復備皆其輔相之力誠有功於國傷怛久之權尚書户部侍郎兼知臨安府曹泳特勒停新州安置守鴻臚少卿朱敦儒令依舊致仕樞密院編修官兼權檢詳文字薛仲邕江淮等路提㸃坑冶鑄錢王彦博提舉兩浙西路常平茶鹽公事杜師旦並罷日下押出門庚子殿中侍御史徐嚞權尚書吏部侍郎詔敷文閣直學士陳誠之魏良臣敷文閣待制沈該直龍圖閣湯鵬舉並召赴行在令疾速起發辛丑右正言張扶試國子祭酒上既親政首易言事官十一月乙巳朔詔秦檜追封申王戊申左承事郎趙汾特降二官己酉詔秦檜神道碑以決策元功精忠全德八字為額壬子魏良臣參知政事執政進呈赦書副本上曰依前郊體例還有増改否民間利害宜講究詳備務在寛恤無使寃濫丁巳太常博士兼權檢正曹冠司農寺主簿林一鳴監文思院上界門林一鶚並罷先是殿中侍御史湯鵬舉奏一鳴一鶚乃一飛之兄弟恃權挾勢輒得進用冠秦檜之館客也試官觀望叨冒登科望將一鳴一鶚及冠特賜罷黜是日執政進呈畢新除右正言張修亦論宗正寺丞鄭柟曹冠二人朝夕出入大臣之門復交結曹泳上面諭修以開廣言路之意時冠已用鵬舉章先斥於是柟相繼亦罷戊午執政進呈激賞庫所賣錦三千餘匹係曹泳下江浙變賣已依聖㫖拘收上曰自古帝王多事土木臺觀遊燕田獵朕皆不好正恐有害吾民如數出許多錦帛決致科擾豈可不禁朕深居九重百姓愁歎之苦朕安得知乎癸亥冬至日合祀天地於南郊赦天下應命官緣事河放累該赦宥未曽施行令刑部開具元犯因依申尚書省取㫖乙丑主管台州崇道觀袁州居住洪皓復敷文閣直學士皓謫居九年至是已卒魏良臣等言皓在貶所病甚欲復舊職宫觀任使居住上曰皓頃在敵中屢有文字到朝廷甚忠於國中間以語言得罪事理瞹昧可依所奏上因語及大理寺多是觀望廷尉天下之平如此朕何所賴趙令衿趙汾被罪事起莫汲汪召錫如近日張祁坐獄皆是曹泳以私憾誣致其罪卿等可速治之庚午手詔近歲以來士風澆薄持告訐為進取之計致莫敢耳語族談深害風敎可戒飭在位及内外之臣咸悉此意有不悛者令御史臺彈奏當重寘於法參知政事董德元魏良臣簽書樞密院事湯思退言天下之事皆人主總攬人臣不過奉行而已近來諸路監司郡守以事達朝廷止云申尚書省取指揮殊失經意欲自今以後事無巨細皆須奏聞示權柄悉歸於君上非臣下所敢專也上曰此乃大臣任意所為不欲朕知天下事此奏可即行下辛未三省樞密院言頃者輕儇之子輒發親戚箱篋私書訟於朝廷遂興大獄因得美官緣是之後相習成風雖朋舊骨肉亦相傾陷收簡牘於往來之間錄戲語於醉飽之後况其間固有瞹昧而傅致其罪者薄惡之風莫此為甚臣等願令刑部開具前後告訐姓名議加黜罰庶幾士風丕變人知循省詔刑部開具申省取㫖新知建康府王㑹罷殿中侍御史湯鵬舉言竊見秦熺父薨之後陳乞數事止有營私之心初無憂慘之意且如乞王㑹知建康共辦父之葬可也乃云庶得相聚照顧家屬建康屯駐大兵為守臣者一路軍民所寄事體非輕若止為私家相聚朝廷何賴焉伏乞差㑹自陳宫觀與熺共集檜之葬事臣更乞睿慈將臣之論列報行中外使臣下咸知尊君親上精白以承休德則浮言自息公道自行故有是命壬申祕書省校書郎益吳王府敎授兼權禮部貟外郎趙逵兼普安恩平郡王府敎授及引對上曰卿乃朕自擢秦檜日薦士曽無一言及卿以此知卿不附權貴真天子門生也又曰兩王方學詩冀有以切磋之逵因奏言路久壅願陛下廣覽兼聽勿以賤微為間庶養成敢言之氣上嘉納之右正言張修奏福建路提舉常平茶事王瀹添差通判廣德軍鄭時中以大臣之親驟加進用知邵州林機以宰相姻婭進躐清顯附下罔上妄立異議詔並罷修又言兩浙東路提舉常平茶鹽公事黄兊以大臣之姪婿累冒差除惟知諂事曹泳望賜罷黜以協中外之望從之十二月甲戌朔上謂輔臣曰頃委官看詳監司郡守所條裕民事行之已數年而未嘗進呈必是取宰相意㫖不欲令朕見也又所條止於民事自今有已見利害並許敷奏於是降㫖行下手詔曰臺諫風憲之地年來用人非據與大臣為黨而濟其喜怒甚非耳目之寄朕今親除公正之士以革前弊繼此者宜盡心迺職惟結主知毋更合黨締交敗亂成法光祿寺丞秦烜與外任殿中侍御史湯鵬舉言秦熺乞留烜守家廟不過使之探伺朝廷之施設稽察百官之向背况熺身在草土不當數有陳乞望與烜在外差遣將帶檜家廟歸建康上從之右正言張修言鄭億年以宰相子身為近臣不能捐軀報國乃甘事逆臣劉豫既還朝大臣力為之地髙爵厚祿坐享累年鄭仲熊為大臣連姻不一二年致身右府賄賂狼藉詔並落職億守南安軍安置仲熊依舊提舉江州太平興國宫永州居住張浚郴州居住折彦質沅州居住万俟卨南康軍居住段拂並令任便居住昌化軍安置李光移彬州安置乙亥主管台州崇道觀張士襄責監南康軍酒務上曰士襄去歲奏事欺罔宰相止以奉使不肅罷可與逺小監當以為後來之戒殿中侍御史湯鵬舉言徐宗說為時相管莊自為茍賤曹筠因秦檜薦為臺臣凡有奏陳盡出於檜右正言張修言徐琛貪汚叨竊詔並奪職罷祠提舉台州崇道觀蔣璨為淮南路轉運副使璨不為秦檜所喜自鎮江罷去為祠官者十二年丙子張孝祥為正字先是秦檜以孝祥父祁為胡寅所厚命有司按以反謀繫詔獄魏良臣密啓釋出之因有是命丁丑敷文閣直學士宋貺落職以右正言張修論貺天資刻薄恃大臣之知已恣為不法故也己卯知紹興府趙士㣓知温州髙百之並罷殿中侍御史湯鵬舉論士㣓為時相家作媒畢婚嫁故連作帥臣進陞祕職百之與秦塤為姻家故驟為提舉繼守鄉郡公論謂何乃罷之庚辰安豐軍進鹹鮓白魚御筆朕不欲以口腹勞人可下本軍自今免進翌日執政進呈上曰温州柑橘福建荔枝去年皆令罷進獨鹹鮓淮白皆祖宗歲貢之物朕恐勞百姓所以再降指揮住罷辛巳左朝散郎金安節知嚴州安節為御史再疏論秦梓罷之由是久廢至是復起壬午執政進呈刑部狀開具到前後告訐人張常先任江西運判告訐知洪州張宗元與張浚書并壽詩汪召錫莫汲並告訐衢州寄居趙令衿有謗訕語言范洵吿訐和州敎授盧傅霖作雪詩稱是怨望陸升之告訐親戚李孟堅將父光所作文籍告人及有譏謗語言王洧任兩浙轉運司催綱日告訐知常州黄敏行不法等事王肇誣吿程緯慢上無人臣之禮等語言致興大獄並是虛妄雍端行先任監潭州湘潭縣酒稅吿訐本縣丞鄭玘主簿賈子辰因筵㑹酒後有嘲訕語言致興大獄鄭煒告訐吳元美譏謗等事上曰此等須痛與懲艾近日如此行遣想見人情歡恱感召和氣於是並除名勒停編管詔除名勒停荆門軍編管人范彦輝坐作夏日久陰詩辰州編管人王趯坐與李光通書及借人䕫州編管人元不伐坐撰造行在言語徽州編管人蘇師德坐其子撰常同祭文稱姦人在位峽州編管人李孟堅坐父光將撰小史皆非事實紹興府羈管人李孟津坐鼓唱台州人乞管鎬為知州梅州編管人王之奇容州編管人王之荀坐怨望謗訕鼎州編管人閻大鈞坐依隨鄭剛中並放令逐便詔處州編管人邵大受坐朋附范同浮言無稽武岡軍編管人芮曄坐賦牡丹花詩怨望萬安軍編管人楊煒坐上李光書詆和議辰州編管人鄭玘肇慶府編管人賈子辰坐酒後有嘲訕語並放令逐便仍與復元官甲申御筆醴泉觀使孟忠厚令行在居住奉朝請翌日參知政事魏良臣奏曰忠厚在戚里最號賢者上曰向來徽宗梓宫須宰相護送秦檜辭不肯行遂差忠厚以樞密使護送朕深不欲以國戚任軍旅及朝廷之事萬一有過治之則傷恩釋之則廢法如太后家子弟但加以爵祿奉祠而已良臣曰陛下聖明深得所以待國戚之體詔命官犯罪勘鞫已成具案奏裁比年以來多是大臣便作已奉特㫖一面施行自今後三省將上取㫖周葵復直祕閣知紹興府乙酉參知政事董德元提舉江州太平興國宫先是殿中侍御史湯鵬舉言德元徒以巧言令色取媚權貴叨竊進取既參大政又以承乏得權宰執是真伴食備貟者也右正言張修言德元以猥瑣之才偶中巍科大臣當軸欲其附㑹遂啖以要官至如臺諫人主耳目之寄尤非他官比而德元為侍御史與之交通令憸人往來傳道密意所喜者即驟進之所怒者即擠排之群小得計相為黨與善類惴慄若無所容鵬舉又奏去歲省闈德元為參詳官偶於謄錄處取號而得秦塤卷子對衆曰吾曹可以富貴矣今房中已得塤之試卷更相自慶而德元復對衆又曰此卷子髙妙魁等有餘伏乞早賜罷黜以為諂奉權貴妄意進用之戒詔德元落職制略曰不思臨軒之恩遂決媚竈之策間不一歲來參萬機通判明州凌哲添差通判嚴州何溥並為監察御史湯鵬舉薦之也溥入見首論天子之耳目所恃以周知天下之故者内則寄之臺諫外則寄之監司臣愚以謂州縣之貪吏郡守不治而監司得以按之則郡守當坐縱容之罪監司不按而臺諫得以劾之則監司當受失察之罰而又每歲校其所按之多寡以為殿最之課如是則匪惟監司不容於匿姦而貪吏亦將斂迹而不敢犯矣從之丙戌提舉江州太平興國宫劉錡知潭州是日執政奏事魏良臣言錡一時名將久閑上曰朕聞其貧甚昨賜田百頃仍官給牛種良臣言錡有申狀到朝廷稱官田並撥入常平司止得荒田數頃臣已下本州只就常平田撥賜上曰甚善江東轉運副使周石罷以右正言張修論石緣大臣有父執之舊濫被任使貪汚不法也辛卯執政進呈監察御史王葆自劾徐嚞曽與臣議除秦熺事上曰王葆徐嚞王復言官所薦皆出秦檜意想其不自安須與外任於是次第罷之通判紹興府黄中為祕書省校書郎中進士廷試第一官州縣近二十年至是始召癸巳責授果州團練副使致仕胡寅復徽猷閣直學士致仕甲午沈該參知政事時上復親庶政躬攬權綱首召該及万俟卨還朝已而二人共政無所建明益不厭天下望云乙未上謂魏良臣沈該湯思退曰兩國和議秦檜中間主之甚堅卿等皆與有力今日尤宜協心一意休兵息民良臣等唯唯奉詔右朝奉大夫王㑹特勒停送循州編管殿中侍御史湯鵬舉言㑹初無履歴恃檜與熺之親黨致身禁從出守便郡置田産於湖秀造大宅於平江右正言凌哲言㑹專恃權勢肆為貪酷上謂魏良臣等曰㑹所至狼藉止緣恃秦檜之勢乃敢如此可與廣南編置故有是命丙申執政進呈諸處申到祥瑞乞宣付史館上曰此等極有不足紀者卿等宜斟酌不中理者刪去之史臣曰中興以來言祥瑞者類多貶秩罷官紅光有火德之祥赤芝應建炎之號禾穟生於枯秸甘露降於潛邸此其尤怪誕者聖諭及此欲屏絶之也上曰近日葉義問劄子極言州縣添差官之弊所給俸祿皆生靈膏血豈得不為民害祖宗舊法止是宗室戚里添差差遣及比年因軍中立功人離軍將校例與添差除此外當盡罷去雖士人不無怨嗟然愛惜民力要當如此提舉江州太平興國宫蕭振為四川安撫制置使兼知成都府時上既蠲蜀民舊逋而知成都府符行中督責甚峻蜀人怨之朝廷知其不可任乃召行中還而復用振降授右承務郎趙汾復右承事郎特與改正過名汾還家而卒吉陽軍編管人胡銓量移衡州從刑部檢舉也提舉淮南東路常平茶鹽公事齊旦添差通判平江府王伯庠並落職放罷殿中侍御史湯鵬舉論旦奴事權臣減尅鹽本錢以資妄用伯庠以王㑹親戚寡亷鮮恥違法貪饕故皆絀之鵬舉又奏福建路安撫司主管機宜文字康與之贓濫尤甚江西路安撫司主管機宜文字徐樗初受秦檜奏補即在行在守官撰造言語檜酷信之嘗中害張宗元范彦輝詔並除名勒停編管丁酉特追提舉江州太平興國宫和國公張浚復觀文殿大學士右通直郎知真州陳正同為樞密院檢詳諸房文字上覽除目曰今此差除皆合公議想見外議皆以為當朕未嘗容􅊏毫之私於其間若行公道不變天下何憂不治己亥上曰朕平時未嘗豪末有取於民如日用紙亦不委臨安府只自令人買於市肆更得佳者金主亮隂有南侵之意乃謀遷居南京宋史全文卷二十二上欽定四庫全書宋史全文卷二十二下宋髙宗十七庚子紹興二十六年春正月丁未知信州黄仁榮為江南東路轉運判官上曰信州亦須擇人昨宰臣捜水晶極擾人如林機尤無狀魏良臣等曰紹興初徐康國為浙漕進台州螺鈿椅卓陛下即命焚之至今四方歎誦聖德上指御座曰如一椅子只黑漆便可用何必螺鈿上又曰往日宫殿幕帟皆文繡朕今並不用土木被文繡非帝王美事良臣等曰漢文帝所以稱賢君正由節儉也戊申張九成復秘閣修撰知温州新知廣州陳璹知湖州九成謫居十四年談經自樂學者尊之上覽除目曰九成昨在經筵講書及西漢災異事秦檜不樂以此遂去璹本檜所薦後自桂州召來不旬日遣去不曉其意時温民久困重斂斛米匹絹輸者率倍其入九成曰重斂以疲民二千石責也斗尺皆立定例民大恱己酉樊光逺為祕書丞光逺以論事忤秦檜去國十六年上欲用為臺官故召辛亥尚書禮部侍郎兼侍講王珉權吏部侍郎徐嚞罷時珉等使北未還而殿中侍御史湯鵬舉論二人皆以諂事秦檜故驟為臺諫無一言彈擊奸邪無一事裨補時政故有是命殿中侍御史湯鵬舉言今科舉之法名存實亡或先期以出題目或臨時以取封號或假名以入試場或多金以結代筆故孤寒逺方士子不得預髙甲而富貴之家子弟常竊巍科又况時相預差試官以通私計前榜省闈殿試秦檜門客孫兒親舊得占科甲而知舉考試官皆登貴顯天下士子歸怨國家伏乞申嚴有司革去近弊如知舉參詳考試官乞臨期御筆㸃差以復祖宗科舉之法從之癸丑翰林學士陳誠之兼侍讀尚書吏部侍郎張綱兼侍講起居舍人王綸兼崇政殿說書自秦熺侍經席講讀說書多以臺諫兼之至是悉命從官如舊制丙辰執政進呈新除觀文殿大學士判洪州張浚于内艱上曰士大夫起復非美事所以敦孝行厚風俗惟軍中人乃可耳左朝奉大夫王葆知廣德軍左奉議郎王復知臨江軍二人皆秦檜時為御史至是出之楊樸為䕫州路提㸃刑獄公事是日沈該進呈蜀中人才上曰蜀人多能文然士人當以德行為先文章乃是餘事庚申夜雷癸未權尚書工部侍郎丁婁明罷以侍御史湯鵬舉奏婁明徒以秦烜之妻父遂躐清要四方不服故也提舉江州太平興國宫黄唐傳復徽猷閣待制唐傳為吕頤浩所喜故秦檜久抑之甲子故責授清逺軍節度使趙鼎追復觀文殿大學士故責授秘書少監分司南京贑州居住孫近故責授濠州團練使鄭剛中並追復資政殿學士故提舉江州太平興國宫永州居住汪藻追復顯謨閣學士宰執以刑部狀進呈上曰遷謫之人自郊祀赦降及節次檢舉盡行牽復士大夫翕然稱快魏良臣曰陛下深仁厚澤昭及漏泉天下幸甚上諭魏良臣等曰士大夫往往輕外重内親民之任莫如縣令若取其有治狀者陞擢之則人皆盡心良臣等曰祖宗故事不曽歴三任轉運不得除三司正欲其歴練上曰如從官須是曽歴外任宰執皆自此選若練達國事通曉民情則事事便可裁決新通判嘉州黄貢改知綿州貢舉進士為四川類省試榜首用鼎甲恩授職官終更例當改秩時秦檜當國或勸以姓名自通貢曰進退有命枉道何益徑從外銓調嘉州州學敎授用舉主考第改官從官二十年始得郡倅及是沈該以其名聞乃有是命而貢已卒矣新通判彭用虞允文改知渠州丙寅知泰州海陵縣馮舜韶為監察御史上監秦檜擅權之弊遂増置言事官時何溥王珪沈大亷與舜韶並為察官而湯鵬舉周方崇凌哲為臺諫察官具貟近世所未有新州編管人曹泳移吉陽軍編管戊辰執政進呈諸州除免黄河竹索錢因及鄭作肅昨因乞蠲免竹索錢宰臣見怒致臺臣論列取勘上曰君相之職本以為民民間利病豈可不理又進呈户部供具到諸路拖欠紹興二十一年二十二年錢物欲行除放上曰若只倚閣州縣夤緣為奸又復催理擾人即與除放甚善己巳詔江浙荆湖諸路紹興二十二年已前未起諸色錢物租稅等其形勢并第二等已上有物力之家見欠數因並與除放如巧作名目催理者監司按劾取㫖重作施行庚午進呈近來士風委靡諂䛕奔競至有已得差遣而累求換易不量資序而超躐干請者上曰風俗人才正當今急務似此之人可具名聞奏當議黜責二月甲戌權尚書兵部侍郎兼權直學士院沈虚中罷以侍御史湯鵬舉論其為省試參詳官私取秦塤且素無亷聲巧貪富貴故也乙亥上曰近榮州守臣費庭論蜀中隔槽酒甚擾民當是時張浚趙聞以軍興窘於財用濟一時之急耳今休兵既久内外無事自合更也魏良臣曰已令鍾世明詳之矣上曰須下本路漕臣方能盡其利害上又曰四川交子亦有弊如沈該稱提之說但官中常有百萬緡遇交子減價自買之即無弊矣己卯詔諸路州軍以前舉解試流寓終場人數紐計及土着合取放一人之數即與添解額一人或更分及流寓人少以士着所解人十分為率及三分亦解一人並通立為額已後人多不得過今舉所取之數庚辰上曰朕聞蜀中銀比江浙間過一倍如劉晏掌邦計懋遷有無低昂適中方是理財之術可令有司措置毋致枉費甲申執政進呈權刑部尚書韓仲通看詳知鬱林州趙不易便民五事内雷化等州民間納苗多令折銀擾民為甚欲令並納正色上曰百姓足君孰與不足百姓之財乃國家之外府安可盡取但藏之於民緩急可以資國用乙酉詔林一飛送吏部與逺小監當差遣一飛既罷乃使其族人進士東投匭上書論進退大臣當以禮侍御史湯鵬舉面奏禮為忠賢設使其姦詐如李林甫盧杞之徒自當明示典刑為天下後世之戒上謂大臣曰朕每覽封章若其言可行即行之若其言非雖涉狂妄亦不欲罪其人葢所以來天下之言也今東書用意如此言路既有論列亦豈免行遣乃責一飛監髙州鹽稅東英州編管丁亥以監司多闕命侍從臺諫各舉嘗任知通治狀顯著者二人仍保任終身犯贓與不職者與同罪庚寅參知政事魏良臣罷知紹興府甲子國子司業王大寶乞委諸路監司覈實月樁名色立為定額及折帛錢量與裁減以恤下户上令户部看詳因言大寶近又請放度牒殊未曉朕意人多以鬻度牒為利亦以延人主壽為言朕謂人主當事合天心而仁及生民自然享國長久如髙齊蕭梁奉佛皆無益也僧徒不耕而食不蠶而衣無父子君臣之禮以死生禍福恐無知之民竭民力以興建塔廟蠧民傷敎莫此為甚豈宜廣也輔臣皆稱善直祕閣辛次膺知婺州北使之議和也次膺上疏不報即請奉祠歲滿不復再請閱十二年忍窮如鐵石上始親政即除知紹興府未上㑹魏良臣出鎮於是改命丙申侍御史湯鵬舉言新添差通判秀州王韅寄居撫州恃勢作威郡守監司聽其使令如役僕隸毒流一州上曰此不可不痛治在祖宗朝革去五代苛法專以仁恕為本未嘗真決一士大夫惟犯贓者不貸可令刑部約法重一作行遣庚子王曮送建昌軍居住吕愿中封州安置殿中侍御史周方崇論曮以宰輔親黨妄作而愿中知復州日強買部民玩好古器納於大臣遂得進擢故併謫之三月壬子三省言太學生係二千人為額聞在學不及三百人欲令禮部措置上曰學校人才所自出元祐中名臣最多實由仁宗養育之有素也近來學校雖設敎育有所不至每患人才難得可如所奏甲寅詔比緣軍興令宰相兼樞密使典掌機務今邊事已定可依祖宗故事宰相更不兼領乙卯侍御史湯鵬舉論江東安撫司參議官王歴檜之妻弟也寄居臨州役使守令聚斂貨賂公私被害江西安撫司參議官王墨卿熺之先生也摇唇鼓舌誑惑衆聽招恩市權詔並罷之丙辰詔諸路轉運司所差發解試官務在盡公精加選擇如所差狥私及庸繆不當仰提刑司按劾御史臺禮部覺察聞奏新通判湖州余佐主管台州崇道觀龔釡並罷殿中侍御史周方崇論二人因交結王㑹與秦檜管莊苟賤無恥故皆黜之丁巳詔淮南邊州有未可起稅處令漕臣保明與放十年時諸州民户全未歸業每歲旋乞展免起稅朝廷慮其農種不時故特蠲之己未提舉萬壽觀兼侍讀万俟卨參知政事庚申執政奏銓試院獲到懷挾者三人上曰銓試乃出仕之始將來宦顯皆自此擢豈容冒濫當依法行以戒後來上又曰自來士人許帶韻略多緣此雜以他書乃詔今後韻略及刑統律文等並從官給時試院吏卒於交卷啓闗公然作弊後三日執政復以奏上曰此豈可不治近聞試院整肅士人極喜自此實學者進而寒畯之士伸偽濫者革而僥倖之風息矣癸亥侍御史湯鵬舉言尚書右司郎中兼權户部侍郎鍾世明便僻側媚見李椿年為經界遂投名為幹官見徐宗說與秦檜管莊遂諂奉宗說得尚書郎見丁禩往大平州修圩遂交結丁禩與之同往既歸乃奉使四川還為浙漕又事曹泳泳敗附魏良臣復除都司兼權侍郎良臣既罷世明慢罵萋菲略無操守祠部貟外郎兼權中書門下省檢正諸房公事陳岩霄嘗任秀州學舍為秦檜父立祠堂作記獻頌叨求進取於是二人皆罷甲子三省奏内外闕官上曰既闕官卿等可略舉所知自來多以親故為嫌止不當如秦檜若非親故何由悉知其所為但無私心可也遂詔除侍從兩省各舉所知乙丑詔近年士風寖薄儒户挾書代筆傳義靡所不為負國家選舉之意豈所望哉自今委監司覺察重寘於法務在必行東平府進士梁勛特送千里外州軍編管勛伏闕上書論北事甚詳且言金人必舉兵宜為之備尚書省勘㑹前後累降指揮禁止不許伏闕今勛不遵約束故有違犯輒妄議邊事理當懲戒故有是命丙寅詔講和之策㫁自朕志故相秦檜但能贊朕而已豈以其存亾而渝定議耶自秦檜死金國頗疑前盟不堅㑹荆鄂間有妄傳召張浚者其情益疑參知政事沈該乞特降詔書具宣此意万俟卨湯思退皆與該同乃下是詔大事記曰秦檜以十八年之久呼儔引類盤據中外一檜雖死百檜尚存安石雖退居鍾山而所任王珪蔡確即安石之黨章惇雖去位而所任曽布李清臣之徒即惇之黨也上雖親政而所任沈該万俟卨湯思退魏良臣即檜之黨也沈該万俟卨本檜之鷹犬也思退本檜之客以文衡私取檜之子孫者也良臣即檜往來於金定和議者也檜之身雖死而檜之心未嘗不存張趙所引之君子日少而檜所敎之小人日多故自檜死後金頗疑前盟不堅為之禁妄議和好以信金為之重竄張浚以恱金何異於檜之為也夏四月己卯上曰昨詣景靈宫朝獻見武學頽弊亦全無士人文武一道今太學養士已見就緒而武學幾廢恐有遺才祖宗以來武學養士自有成法可令禮兵部速條具以聞丙戌詔祕書少監楊椿著作佐郎趙逵周麟之同共編修神宗皇帝一朝寶訓戊子先是尚書省言諸郡解額多寡不均詔禮部參酌均定申省取㫖及是進呈上曰解額窄處自當量與増添寛處却不可減皆欲優之也庚寅詔京西淮南販買耕牛與免稅三年用三省請也上曰闗市之征本以抑商賈如米麵民間日用之物豈可收稅今耕牛亦猶是也癸巳詔武學學生以八十人為額上舍十五人内舍二十五人外舍四十人置博士學諭各一貟未幾詔學生以百貟為額甲午詔諸路州軍自今不得奏祥瑞前一日執政奏事上曰前大理寺獄空不許上表稱賀甚為得體比年四方奏祥瑞皆飾空文取恱一時如信州林機奏秦檜父祠堂生芝草其佞尤甚蓮之雙頭處處有之亦何足為瑞麟鳳瑞之大者然非上有明君下有賢臣麟鳳之生亦何所取朕以謂惟年穀登可以為瑞得真賢實能可以為寶漢武作芝房寶鼎之歌奏之郊廟非為不美然何益於事丁酉上謂執政曰卿等接賔客有利害可行及人才可用者一一奏聞庶盡知民間利病因亦可得人才戊戌置六科以舉士一曰文章典雅可備制誥二曰節操公正可備臺諫三曰法理該通可備刑讞四曰節用愛民可備理財五曰剛方豈弟勞績著聞可備監司郡守六曰知機識變智勇絶倫可備將帥命侍從歲舉之如元祐中司馬光所請先是侍御史湯鵬舉言今明詔侍從各舉所知臣輒條具六科以備采擇乞俾薦者隨其才而舉之後有改節願坐繆舉之罪詔吏禮部討論至是行下右正言凌哲言臣聞昔漢髙祖入闗悉除秦法與民約法三章耳所謂殺人者死實居其首焉司馬光有言殺人者不死雖堯舜不能致治斯言可謂至當矣臣竊見諸路州軍勘到大辟雖刑法相當者類以為可憫奏裁遂獲貸配無他居官者無失入坐累之虞為吏者有放意鬻獄之幸貸死愈衆殺人愈多殆非辟以止辟之道也欲望特降睿㫖應今後諸州大辟若情犯委實疑慮方得具奏其情法相當實無可憫者自合依法申本路憲司詳覆施行不得一例奏裁從之户部尚書韓仲通言今斗米為錢不滿二百正宜積穀之時若别置倉廩貯積以一百萬碩為額遇有水旱助給軍食減價出糶實為經久之利從之仍以豐積為名禮部言今科科舉欲並依舊法其鄉飲酒禮願行於里社者聽從其便從之五月壬寅參知政事沈該為尚書左僕射万俟卨為尚書右僕射並同中書門下平章事知婺州辛次膺升秘閣修撰上因曰用人當盡公道若以私意喜怒取人則真材實能何由得進邪甲辰簽書樞密院湯思退知樞密院事丙午起居郎吳秉信舍人王綸並試中書舍人中書不除舍人者近十年至是二人始有此授戊申詔故追復觀文殿大學士趙鼎特與致仕恩澤四名辛亥言者論近年以來朝廷節取放免米麥菽豆柴薪耕牛力勝等稅錢而不曽與減退稅務課額欲將稅務年額量與減免却重行裁減收稅則例上曰此說極有理如米麥之屬民所日用者既與放免若不量減年額則巧作名目重斂以求敷數反為民害可依所乞令户部措置立法甲寅右朝請大夫李邦獻為荆湖南路轉運判官邦獻知撫州還入對言近年用事之臣險愎狠忌凡登對臣僚奏陳稍久或聖語有所詢訪陰即中傷是致臣下所陳類皆不切之務畏禍甚者至託疾在告望申飭臣僚凡有所聞盡言無隠從之遂有是命上覽除目因謂大臣曰近緣遴選監司諸路稍稍有按發官吏不職者罰不患乎不行但賞典亦不可無今後郡守有治狀顯著者令諸司共奏當議褒奬如増秩賜金之類或與陞擢有賞有罰則善惡知所勸沮矣丙辰尚書左僕射沈該監修國史右僕射万俟卨兼提舉實錄院先是秦檜以監修兼提舉自該卨並相始分監修及提舉為二至今因之該謂檜專政以來所書聖語有非王音者恐不足以垂大訓乃奏刪之而取上即位至今通三十年纂為中興聖語六十卷上之甲子御史中丞湯鵬舉乞申嚴福建廣東沿海銅錢出界之禁從之己巳前特進張浚度金人必敗盟是月上疏曰今日事勢極矣陛下將拱手而聽其自然乎抑將外存其名而博謀密計求所以為長久歟臣誠過慮以為自此數年之後民力益竭財用益乏士卒益老人心益離忠臣烈士淪亾殆盡内憂外患相仍而起陛下將何以為策今天下譬如中人之家盜據其堂安眠飽食其間而陰伺其隙一日有間其捨我乎書奏執政不省六月癸酉御史中丞湯鵬舉言陛下總攬權綱慎擇郡守臣愚擬令郡守久任責以治效正當今之先務輔臣進呈上曰此在慎擇監司監司得人舉刺公則郡守之職自振矣由漢以來郡守有善政者多増秩賜金正不欲數易久任亦不可為定制沈該等曰欲令監司帥臣同共攷察課績列銜保舉再任仍令尚書省置籍上曰如此甚善甲戌宰執進呈祕書省校書郎黄中面對劄子言自頃大臣用事屏棄忠良私眤憸人布在郡縣不復以民為意自陛下一新百度監司郡守出於親擢謂宜取法祖宗精選公忠明敏之臣每道分遣一人令徧歴郡縣凡百姓之疾苦獄刑之寃濫財用之蠹耗官吏之貪汙茍且與夫利之未興害之未除者皆得條具以聞上納之乃詔諸路監司躬歴所部詢訪亷察條具以聞當議黜陟御史臺言因言章及告訐編置居住人曹泳等未見申到貶所乞令所在押發稽留者抵罪從之丁丑新知湖州程克俊參知政事戊寅沈該等奏今次科舉臣等子弟親戚並令歸本貫就試因進早檢㑹到祖宗典故乾德六年陶邴中第邴乃翰林學士承㫖穀之子遽命中書覆試上曰往時秦塤中甲科所對策敘事皆檜熺語朕抑之置在第三不使與寒士爭先祖宗故事今可舉行遂詔貢院遵依咸平二年三月詔㫖所試合格舉人内有權要親族者具名以聞史臣曰建炎初策士一委有司不以一人好惡為之升黜天下之至公也紹興中權臣罔上假國家科目以私其子弟親戚則聖㫁赫然拔寒畯抑權貴亦天下之至公也壬午詔故追復資政殿學士鄭剛中特與致仕恩澤二名乙酉祕書省正字兼實錄院檢討官葉謙亨面對言陛下留意場屋之制規矩一新然臣猶有慮者學術粹駮繫於有司去取之間天理之所在惟其是而已取其合於孔孟者去其不合於孔孟者可以為學矣願詔有司精擇而博取不拘一家之說上曰趙鼎取程頤秦檜尚安石誠為偏曲卿所言極當於是降㫖行下丁亥流星晝隕戊子新湖南路轉運判官李邦獻入辭言監司以互察為名取索他司職事因而騷擾乞戒飭上可其奏因曰邊方正要卿發摘姦贓選舉循吏凡有便民事可直奏來丙午皇后宅敎授林同言太學養士千餘人而月試人數或不及五之二良由知以科舉為優不知以舍選為重如此則與方州取士何異恐非國家立學校之本意也欲望特降指揮諸州敎官惟許上舍登科人注擬庶幾士子有所歆慕以舍選為榮詔吏部看詳申省秋七月壬寅御筆蠲放民間一年丁絹之數計二十四萬匹内十二萬匹令内庫支給本色以惠細民沈該等言昨降指揮止為免丁錢今陛下欲併與丁絹及綿全行蠲放聖恩寛大百姓蒙被實惠上曰不惟寛民力且不失信於民上又曰近得一雨甚可喜該曰只如今日蠲放民間丁絹便可召和氣致甘澤丁未夜彗出井宿間戊申宰執進呈次上曰朕當避殿損膳以答天戒深慮朝政尚多闕失或民情疾苦無由上達可降詔述此意許士庶實封言務盡應天之實詔今後選人初改官令吏部依法注知縣縣丞差遣奏補承務已上人並須實歴親民知縣縣丞二任方許闗陞通判言者論貴遊子弟干求堂除便用堂官差遣理當親民故也庚戌尚書左僕射沈該屬以星變引咎上曰天象亦有常數此亦無益但思所以應天實德以消天變可也該曰臣等當協心講求闕失民間利害聖慮所及亦乞宣諭臣等奉行上又曰據所臨分野當在秦晉間然朕以天下為憂豈間逺近耶御史臺主簿李庚言國家立薦舉之法將以捜羅人才激勸士類嘗聞謝泌居官每發薦牘必焚香望闕再拜曰今日老臣又為陛下得一士矣其不負君上如此比年以來士大夫經年不剡一奏以待權臣不時之須閣部不舉一人以為子孫換易之地甚至闗陞改秩各有定價交相貿易如市賈然是以亷隅之吏絶意於榮塗而姦贓不逞之輩侵漁公上掊斂百姓日營包苴之計其弊有不可勝言者欲望明立法禁應買賣舉狀之人取者予者各坐贓論詔令有司立法其後刑部乞依薦舉受財法施行從之癸丑詔臣民封事及監司守臣條具便民事件言刑獄財計者各委本部看詳餘並委中書舍人吳秉信王綸權給事中凌景夏仍添差權禮部侍郎賀允中分輪看詳務要詳盡乙卯沈該等言夜來星象全然退減陛下尚未御正殿臣子之心實不自遑上曰雖漸次消弭朕方憂懼恐未須如此當與卿等交修不逮上荅天戒耳上又曰往時士子或因上書忤秦檜意押往本貫或他處聽讀不曽檢舉施行該曰聖慮及此寒士之幸也詔故贈右諫議大夫陳瓘特賜諡忠肅先是上謂輔臣曰近覽瓘所著尊堯集無非明君臣之大分深有足嘉易首乾坤孔子作繫辭亦首言天尊地卑春秋之法無非尊王王安石號通經術而其言乃謂道隆德駿者天子當北面而問焉背經悖理甚矣瓘宜賜諡以表之丙辰夜彗星没丁巳宰相沈該率百官拜表請御正殿復常膳詔不允表三上許之戊午詔近令諸路監司守臣條具便民合行寛恤事件提㸃刑獄官親行決獄緣四川去朝廷逺尚慮奉行滅裂致實德不能及民可令制置使蕭振總領財賦湯允恭催督如奉行弗䖍按劾以聞當重寘典憲辛酉夜天雨水銀八月壬申宰執進呈大理寺主簿郭俶轉對論差役事上曰自有成法不須更改今朝廷法令無不具備但當遵守比來輪對及之官得替上殿官多是無可奏陳致有率意欲輕變成法有司看詳尤宜詳審朕觀漢史曹參遵蕭何畫一之法而漢大治葢何所定律令既已大備若徒為紛更豈所謂治道貴清靜耶癸酉程昌時知桂陽軍代還論州縣科配被於細民而不及於豪右上謂大臣曰科敷不均最為民害出榜之說朝廷累有指揮唯是官吏為姦恐民間盡知數目不得而欺隠所以不肯出榜耳上又曰臨安民有納本户絹一匹被退因詢之云官中以不經攬户不肯交朕令人用錢五千五百買之乃好衣絹已令韓仲通根治近在輦轂尚爾外方想不勝其弊也乙亥右正言凌哲論改官之弊憸巧之徒多行賄賂薦章一紙隂求先容有費及五六百千者欲革而正之以増考第減舉貟為救弊之術上謂大臣曰祖宗舊法未易輕改在祖宗朝凡事悉本仁恕未嘗真決一士大夫惟於贓罪則不貸葢以贓罪害及衆不可不治故在法所舉之人犯贓舉主當與同罪然自來不曽舉行故人不知所畏但嚴舉官之令有犯者必與施行則人自知畏前弊自可革沈該等曰陛下察見弊源如此臣等謹當遵禀詔秦塤鄭時中秦焆秦焞沈興等所帶階官並易右字曹冠周寅鄭縜並駮放先是淮東提舉朱冠卿應詔上書論故相當權私於子孫私於族里親戚私於門下憸人穢夫濫竊儒科復占省額乞於曹冠等八人階官以右易左俾正流品却將向來侵取人數復還今舉額詔侍從臺諫看詳中丞湯鵬舉言冠卿所請委得允當但以有官人赴試者合帶右字如無官人赴試者合行駮放庶協公論故有是㫖其後又駮放曹緯一名辛巳新荆湖南路轉運判官李邦憲直祕閣新知秀州張偁為兩浙路轉運判官壬午上諭大臣曰新除二漕臣卿等可召至堂中面諭與近屢降寛恤事件令遍詣所部稅賦之足否財用之多寡民情之休戚官吏之勤惰悉加訪聞如有奉行弗䖍職事不舉者並按劾以聞庶幾可以警動諸路使皆知所視傚癸未宰執進呈淮南漕司具到米價最賤處每斗一百二三十文上曰昨聞淮南米賤朕恐傷農故欲乘時收糴以惠民今米價如是則未須急候價減每石亦不下一千至時若户部無錢朕當自支一百萬緡令收糴也甲申言者乞令侍從官考察縣令政績上曰此不須行侍從何緣遍知縣令能否兼已委逐路監司考察聞奏矣上又曰大率賞罰須當並行政治顯著者即與陞擢無狀者即與降黜則善惡知所勸沮乙酉沈該等奏今歲科舉極整肅有傳義挾書者扶出上曰朕於此事極留意異時宰執侍從皆由此途出若容冒濫所謂拔本塞源也己丑詔蠲建康府紹興二年以後至二十年終積欠内庫折帛錢二百三十三萬餘緡絹二十萬七千餘匹以守臣張燾建言累政以來積年拖欠歲久無所從出上特恩也辛卯參知政事程克俊提舉臨安府洞霄宫左朝散大夫景箎言四川虛估之數詔户部看詳來上後二日宰執進呈次上曰景箎所論須量與減損若令看詳雖行下數十次何益莫若便令總領所契勘合蠲減數目具申朝廷庶幾民受實惠朕自即位以來如土木玩好邊事錫予未嘗一有妄用凡以為民而已甲午尚書吏部侍郎兼權尚書張綱參知政事丁酉宰執進呈右正言凌哲論上饒知縣李維秬不法上令放罷取勘上又曰近監司殊不舉職州縣官有犯臺諫論列得實監司亦不加罪自今有犯監司若不按發並當行遣或降官或罷任使之知畏諸路行遣三兩人即無不舉矣九月庚子朔奉國軍節度使開府儀同三司吳璘領御前諸軍都統制職事判興州自建炎以來未嘗有使相為都統制者故改命之璘嘗自著書號兵要大略謂金人有四長我有四短當反我之短以制彼之長葢彼之所長曰騎兵曰堅忍曰甲重曰弓矢吾當集蕃漢所長而用之故以分隊制其騎兵以番休迭戰制其堅忍制其甲重則勁弓強弩制其弓矢則曰以逺尅近以強制弱其說甚備至於陣法有圖而無書焉詔自今州縣官贓私不法監司失按察者令刑部具名取㫖辛丑沈該等奏安南人欲買撚金線段此服華侈非所以示四方上曰華侈之服如銷金之類不可不禁近時金絶少由小人貪利銷而為泥甚可惜天下産金處極難得計其所出不足以供銷毁之費雖屢降指揮而奢侈之風終未能絶須申嚴行之詔増置太學正錄各一貟乙巳翰林學士兼侍讀陳誠之同知樞密院事己酉初潼川府轉運判官王之望被朝命措置銅山縣銅事乃籍匠户置場烹鍊僅得五百斤之望乃請歲以六千斤為額遇閏増五百斤從之壬子詔諸路監司守臣條具到裕民事令給舍看詳以聞癸丑右朝奉郎鄒栩追毁出身除名勒停送吉州編管栩知處州犯入已贓為右正言凌哲所按法寺當流三千里宰執以獄上上曰是入已贓否沈該曰據按是入已栩乃浩子上曰浩元祐間有聲稱其子乃爾遂蹙頞久之曰既犯贓法不當赦可特免真決仍永不收敘上又曰朕觀祖宗時贜吏多真決邇來殊不知畏卿等可令有司檢坐祖宗朝行遣贓吏條法下諸路先行戒諭使之曉然皆知祖宗立法之嚴自後有犯當依此施行必無少貸甲寅尚書省檢㑹天聖紹興真決贓吏指揮詔刑部鏤板行下戊午詔自今用舉士改官闗陞人令吏部置籍被舉人犯贓其舉官具名取㫖施行如已被人論訟及他司按發臺諫論列即不許旋行首舉上以吏徇私受賕妄舉者衆故條約之庚申知臨安府蔡嶷請對上謂大臣曰朕當諭以束吏姦即還商賈物貨及木植價錢勿留民訟如見得曲直即當面裁決其他如御膳之屬近來未嘗取辦雖用片紙亦不責其供應沈該曰今日天府之弊莫大於此三者陛下愛民如此天下幸甚甲子知樞密院事湯思退言祖宗舊制樞密院奉聖語則副使錄之比歲不舉行欲依舊制聞語恭即書記同時政記上進降付史館從之丙寅上謂沈該等曰大理寺人命所繫近聞吏多受賕最為不便不知請給比京師如何若祿薄須量増然後可責其守法已而户部言欲據見請十分為率量増三分上可之戊辰御史中丞湯鵬舉言法者天下之所通用例之所傳乃老姦宿贓祕而藏之以舞文弄法貪饕貨賂而已不用法而用例古未之聞也若刑部之所以㫁罪吏部之所以馭吏最為劇曹此正猾吏可以上下其手而輕重其心者伏望明詔吏刑部條具合用之例修入見行之法以為中興之成憲從之後四年乃成冬十月辛未沈該等奏近以内敎有司依年例供進賞賚物帛有㫖退還者半仰見陛下儉德上曰賞賚何必許數如此撙節歲中自可省數百萬緡該曰陛下每事省約以寛財賦天下幸甚癸酉知隨州田孝孫直祕閣以京西諸司言其公亷儉素流移安業也是日中書門下省檢正諸房公事陳正同入對言縣令之職最為近民懲戒既嚴而不旌異循良恐亦有所未至望令諸路監司採訪拔擢一二不次用之庶幾威惠兼行人知勸沮上曰卿言正合朕意早方有一郡守為監司所薦已令除職因任仍俟更終陞擢之矣乙亥詔以蜀去朝廷逺郡守尤須得人令監司帥臣各舉知縣資序以上堪充郡守者二人制置總領提舉茶馬各舉三人犯贓及不職與同罪令尚書省置籍甲申沈該等奏昨日進安奉皇太后回鑾事實禮物陛下悉退出不受皇太后聖性節儉而陛下仰能承順太后之美天下幸甚上曰宫中别無使用自不須許多禮物皇太后今年七十七歲而步履康健如五六十歲人自古帝后無有也臣留正等曰顯仁皇后躬儉節用出於天性中外之人莫不聞之如有司進金唾壺則曰宜易以塗金宮中燕飲用伶官纔三兩人所予緡錢無幾歲進金帛帑積已充牣而一銖一縷不妄用此自古母后所未有之盛德也而我太上皇帝且能曲意以順承之雖以朝廷大慶奉慈寕萬年觴而有司禮物皆卻而弗受噫兩宮之間慈孝相承而加之以恭儉宜乎天人叶相而享天下之盛福也丙申宰執進呈秀州守臣鄧根按崇德知縣林善問不法科借折帛錢事詔罷善問仍取勘上曰科借錢若一一在官猶可恐因而入已大抵贓吏最為民害今後須盡追贓物不然自謂雖得罪猶不失為富人無所憚也丁酉詔前特進張浚依舊令永州居住俟服闋取㫖先是浚奉母喪歸葬於蜀行至江陵㑹以星變詔求直言浚慮金數年間勢決求釁用兵而吾方溺於宴安謂敵可信蕩然莫之為備沈該万俟卨居相位尤不厭天下望朝廷益輕雖在苫塊不得不為上終言之乃復上奏大略言嚮者講和之事陛下以太母為重耳幸而徽宗梓宫亟還此和之權也不幸用事之臣肆意利欲乃欲翦除忠良以聽命於敵坐失事機二十餘年有識痛心臣願陛下深思大計復人心張國勢立政事以觀機㑹未絶其和而遣一介之使與之分别曲直逆順之理万俟卨湯思退見之大恐以為敵未有釁而浚所奏乃若禍在年歲間或笑以為狂御史中丞湯鵬舉即奏身在草土名繫罪籍要譽而論邊事不恭而違詔書豈復能為國家長慮却顧徒以閑居日久惟幾復用耳故有是命閏十月丙午詔亷州歲貢珠雖祖宗舊制聞取之頗艱或傷人命目今可罷貢蜑丁縱其自便翌日上謂宰執曰朕嘗讀太祖實錄見劉鋹進珠子馬鞍太祖知鋹所採珠子甚多日役蜑丁數千人死者不少朕以謂珠子非急用之物既是難得且傷人命故特令罷貢以為一方無窮之利己酉劉伯英特勒停送連州編管以右正言凌哲論其諂附秦檜在江西湖南贓滛僭侈也辛亥尚書省請以去年十月二十二日以後朝廷所行寛恤事件編類成册鏤板頒降從之壬子徽猷閣直學士致仕胡寅卒於衡州寅既退居乃著讀史管見三十卷論周秦至五代得失其論甚正葢以蔡京秦檜之事數寄意焉其書今行於世甲子尚書吏部郎中孫道夫試太常少卿道夫入對論蜀中稅絹之外有和買有預俵又有激賞而蜀民尤以激賞絹為苦稅米之外有逺倉有和糴又有對糴而蜀民尤以對糴米為患以至鹹泉退縮鹽額頓虧酒徒零落課息欠少破産失業比比皆是有司務増茶額以求羨餘禁繫山氓使輸虚息欲革其弊雖捄焚拯溺不足以喻其急也上感其言詔制置使司相度聞奏而道夫有是命十一月甲戌權禮部侍郎辛次膺言今諸路歲入數目實多使有以理財而其入無欠有以節財而其出有節則豈特財用充足葢將儲蓄沛然有餘矣願詔左右司同户部取朝廷一歲中出入之數其入數拖欠失陷者嚴立譴罰其出數則更加裁酌立為之數不得増添上曰此誠今日急務然止有三說生財理財節財是也比年生財之道講求略盡唯理財多因官司失職致有拖欠使州縣得人必不至此若節財則用莫大於給軍既有定額無從裁省今便當撙節不可妄費遂令吏部侍郎陳康伯户部侍郎王促大理少卿陳章同措置壬午上謂大臣曰近太學試補弟子貟中程者詩賦多而經義少數年後恐經義科廢矣宜令兼習經義沈該等請俟省試畢上可之丙戌尚書省言被㫖裁減吏額法行當自近始乞裁定三省樞密院近來所添名額於是六曹寺監百司各以舊額及新置人數來上朝廷悉加裁損焉癸巳吏部貟外郎王希亮言國家取士詞賦之科與經義並行比學者去難就易競習詞賦罕有治經至於周禮一經乃絶無有望自今經義文理優長合格人有餘許將詩賦人材不足之數通融優取仍以十分為率不得過三分從之十二月癸丑尚書右僕射万俟卨上重修貢舉敕令格式五十卷看詳法意四百八十七卷甲寅罷江淮等路提㸃坑冶鑄錢司以其事付轉運司己未宰執聞進呈殿中侍御史周方崇論陳惇趙迪之貪暴無恥上曰朕見人才難得未嘗不留意愛惜每諭臺諫以風聞言事不可容易須再三詢訪朕惟言者之聽豈可不審庚申上謂大臣曰昨下詔求言四方之士陳獻甚多朕一一披覽所言利害極有可取宜擇其議論尤切當者量與推恩庶幾有以勸之時應詔者甚衆而後省以敕令所刪定官杜莘老新黄州州學敎授潘慈明為首乃各循一資秘書省著作郎兼普安恩平郡王府敎授黄中言恩平郡王講禮記終篇詔令講易時王府官龍淵已親幸他敎授或與之過從觴詠中獨未嘗與之坐朝夕見則揖而退其後他敎授多蒙其力而中獨不徙官辛丑紹興二十七年春正月戊子詔侍從各舉宗室京朝官材識幹治者二人特與召對初朝廷歲於江浙湖南福建諸州市軍器物料而州縣以無本錢率於人户物力錢上敷納民甚苦之甲午詔皆以縣官錢償其直乙未詔兩省臺諫侍從有服親省試合格者令禮部具名以聞自是遂為故事二月丁酉朔詔自今國學及科舉取士並令兼習經義詩賦内第一場大小經各一道永為定制壬寅江南東路提㸃刑獄公事徐天民劾信州守臣周葵不恤郡政上謂宰執曰大抵元歴知縣諳政事然後付之一郡必優為之今周葵止因昨在言路好論事遂得虚名魏良臣力薦之及治郡乃不職與宫觀宜矣甲辰詔試中武學生依監學例給綾紙丁未權尚書禮部侍郎辛次膺試給事中自巫伋遷後給事中不除者七年張子華除名勒停送萬安軍編管仍籍没家財子華嘗提舉廣南市舶言者奏其贓汚不法遣大理寺丞莫濛即廣州鞫之法當絞故有是命禮部貢院奏應博學宏詞科左迪功郎周必大合格詔堂除建康府府學敎授普安郡王見其所試以為有掌誥才大善之壬子宰臣沈該等言太廟仁宗英宗兩室前柱生芝草欲率百官拜表稱賀許之戊午御史中丞湯鵬舉參知政事鵬舉為臺官凡一年有半所論皆秦檜餘黨他未嘗及之三月己巳侍御史周方崇請京局改官並先注知縣上以問宰執沈該曰選人改官後涉歴親民實為良法上曰徽宗嘗言仁宗朝每除執政大臣必先問曽歴親民否葢親民則能通世務置之廊廟天下利病知過半矣此朕昔年恭侍親聞玉音誠可謂萬世法也遂從之丙子宰執進呈從官所舉人材詔並赴行在詔兩省官依侍從薦所知丙戌上御射殿引正奏名進士唱名先是御筆宣示考試官曰對策中有鯁亮切直者並寘上列以稱朕取士之意時王十朋首以法天攬權為對閻安中策言太子天下本臣願陛下㫁自宸衷蚤正儲位以係中外之望詳定官定十朋為第九編排官孫道夫奏其詞語鯁切上覽之前三日謂大臣曰今次舉人程文議論純正尤多切直自此人才極有可用翌日又謂大臣曰昨覽進士試卷其間極有切直者如論理財則欲省修造朕雖無崇臺榭之事然喜其言直至論銷金鋪翠朕累年禁止尚未盡革自此當立法必禁之去年交趾獻翠毛五百尾朕未嘗用當焚於通衢湯思退進曰陛下旌直言以冠多士焚翠羽以革侈靡皆盛德事時上臨御久主器未定大臣無敢啓其端者安中對策獨以儲貳為請上感其言擢安中第二遂賜王十朋等四百二十六人及第出身始蜀人之未集也上數有展日之命沈該奏天時向暄恐陛下臨軒不無少勞乞一面引試後有至者臣等策之中書定其髙下上不許曰三年取士朕豈憚一日之勞耶及唱名至安中及第三人雙流梁介上連舉首謂該曰如何該大慚悚丁亥特奏名進士李三英等三百九十二人武舉進士趙應熊等十五人特奏名一人授官有差應熊武藝絶倫且試南省為第一人上謂大臣曰今次魁選文武皆得人應熊弓馬甚精文字亦可采朕樂於得士雖終日臨軒不覺倦也詔自今宫人以銷金鋪翠為服飾者令會通門譏察犯人追賞錢千緡經手轉入皇院子等並從徒二年科罪用王十朋之言也己丑詔減三川對糴米十六萬九千餘碩䕫路激賞絹五萬匹兩川絹估錢二十八萬有奇又減茶引錢九十五萬餘緡上謂宰執曰前日下有司詳其事正欲知向後兵食無闕使民被實惠若無以善後恐又别有改更非所以裕民初講利害想四川之民日望蠲免今此足以慰其心矣辛卯守尚書右僕射同中書門下平章事万俟卨薨甲午除民間買賣耕牛之稅夏四月庚戌宰執進呈趙逵所薦士上曰三吳才行之士往往知其姓名惟蜀中道逺其間文學行義有可用者不由論薦無由得知前此數年蜀中仕宦者例多隔絶不得一至朝廷甚可惜也自秦檜專權深抑蜀士故上語及之沈該曰近日蜀中士大夫多被薦舉已得㫖隨材召用上曰甚善壬子權尚書刑部侍郎張礿降一官放罷先是礿奉詔薦主管官告院鮑嚳召對而人才凡下上諭大臣曰朕不能盡識天下多士故令侍從臺諫各舉所知若不精審非朕求才之意乃罷之已未玉牒所進呈太祖太宗魏悼王三祖下仙源類譜壬戌進呈閣門衹候趙應熊擬江南東路安撫司准備差遣上宣諭曰朕觀應熊所試弓馬文字皆有可採可謂有用之才湯思退曰應熊初入仕且以帥司准備將處之以養資望上曰善五月丙寅敷文閣直學士左承議郎四川安撫制置使兼知成都府蕭振特轉左朝奉大夫落直字上以振治蜀有聲執政請進一職遷四官上曰四川善政前有胡世將今有蕭振振蠲減重賦蜀人安之近薦武帥又皆得人可除直學士戊辰上謂輔臣曰今四方無事當以民事為意監司郡守不可不得其人輔臣進呈湖南轉運司奏知長沙縣常禋名臣之後修㓗自持束吏愛民衆所稱譽詔進禋一官俟任滿與陞擢壬申上謂沈該曰頃蜀中歲貢錦繡帟幕雖民之幼女亦追以供役作其擾如此朕令止之蜀人極喜近又減四川民輸至一百二十餘萬民力必稍寛矣癸酉興化軍免解進士彭與進所著周易解義及神授圖大極歌詔特補下州文學己卯新明州州學敎授郟次雲入見奏請守令闕則擇清望官臺諫闕則擇郡邑循吏為之上謂大臣曰朕用人正欲内外適平如監司守令治狀顯著不必一一召來當賜秩賜金且令久任遂以次雲行國子錄六月戊戌西川安撫制置使兼知成都府蕭振卒振再守蜀凡二年時利州舊宣撫司有積緡二百萬守者密獻之朝下制置司取撥振曰此所以備水旱軍旅也一旦有急是又將取於民請於朝留其半比卒蜀人思之甲辰宰執進呈秘書省著作佐郎黄中轉對言仰惟神宗皇帝即位之初厲精求治常慮萬事之幾不能徧燭首舉舊章每遇起居日俾百寮轉對陛下厲精庶政無異於神宗之用心故百寮轉對至今行之未嘗廢也然而二十年間大臣專恣好佞惡直一時習尚往往以言為諱凡所建明不過毛舉細故以塞責而已如神宗皇帝所以詔告丁寧葢未之有也臣謂陛下宜追述神祖之意特降詔書申飭在位自今以往應轉對之官有所開陳要在竭誠盡忠切於治道毋得蹈常襲舊排摭細微以應故事然後陛下觀其人擇其言而為之虚心訪問俾得以盡其情實積日累月庶幾有補於萬一則舊章不為虚設矣上覽疏曰中所論極當大抵轉對之法恐朝政闕失民間利病有不得上聞者皆當論奏自秦檜當國轉對之名雖不廢而所輪者不過大理寺官數人攟摭細微姑應故事而已初無鯁切有及於時事者如此則繆悠之談何補於國今中所言頗合朕意可令士大夫知之戊申知樞密院事湯思退守尚書右僕射同中書門下平章事壬戌祕書丞楊邦弼校書郎陳俊卿並兼普安恩平郡王府敎授俊卿為學官多所裨益一日普安郡王習毬鞠俊卿微誦韓愈諫張建封書以諷王即誦全文不遺一字俊卿退而喜曰王聰明而樂從諫社稷之福也秋七月庚午王師心言鼎澧歸峽産茶民私販入北境利數倍自知戾法不顧因去為盜由引錢太重貧不能輸故抵此望别創憑由輕立引價既開其衣食之門民必悔過改業而盜自弭矣上覽疏謂宰執曰茶鹽禁㩁本為國用所需若財賦有餘則摘山煮海之利朕當與百姓共之姑遵舊制可也户部侍郎林覺言國朝慶歴以來歲鑄錢一百八十餘萬緡其後亦不下百萬如前年猶得十四萬緡去年猶得二十二萬緡而提㸃司官吏徒縻祿廩朝廷罷之但付之漕司議者以為諸路物料有無不等運司不相統轄無以通融鼔鑄欲出户部錢八萬緡為饒贑韶三州鑄本委各州通判主管漕臣往來措置今歲權以二十三萬緡為額即不得復以舊錢代發從之江南西路轉運判官黄仁榮知衢州荆湖北路轉運判官楊沂移江西路上覽除目曰監司守臣席未及暖已輒更易不惟迎送勞費而官吏軍民於刑敎獄訟亦莫知所適從自今悉令久任辛未下詔戒敕汚吏癸酉下詔戒飭監司郡守舉劾守令毋得觀望當路狹情徇私有賞有罰朕當信而必之丙戌御藥院言永祐昭慈等欑宫帝后生辰酌獻所用鋪翠鏤金花乞以藥玉葉漆金紙代充從之時上禁銷金鋪翠甚嚴自禁中始八月甲午三省疑京西轉運副使霍蠡知潭州同知樞密院事陳誠之言蠡有風力必能為陛下辦事但京西難得其人聞知鄂州熊彦詩久諳軍中事可以除代上曰蠡歴官多年在京西尤鎮靜彦詩累任郡守此二人皆可用朕思今天下無事惟在留意監司郡守卿等皆持公心商確人才朕謂雖未盡得人將見十得七八矣誠之曰臣獲與廟堂末議雖迂愚無取至於進擬人才實不敢萌私意上曰朕用卿為執政已及一年卿見朕聽㫁之際曽有一毫私意否誠之曰陛下無私如天地臣夙夜奉承實千載之遇也乙未參知政事湯鵬舉知樞密院事丁酉詔重修宗學用宗丞吳景偲請也辛亥詔諸路換給不盡僧道度牒並納禮部用三省請也上曰昨權禮部侍郎賀允中上殿朕問即今僧道之數允中言有僧二十萬道士纔萬人朕見士大夫奉佛其間議論多有及度牒者朕謂目今田業多荒不耕而食猶有二十萬人若更給度牒是驅農為僧且一夫受田百畝一夫為僧即百畝之田不耕矣佛法自東漢明帝時流入中國終不可廢朕亦非有意絶之正恐僧徒多則不耕者衆矣己未湯鵬舉奏前日罷坑冶鑄錢司歸諸路轉運司必能就緒上宣諭曰此一事朕詢之士大夫亦無他說獨王珪再有章疏朕謂凡有建立人各以所見相可否歸之至當而後可若一人唱之百人和之事或未當朕則何取庚子詔置提領諸路鑄錢官於行在命侍從或卿監一貟置官屬二貟九月癸酉參知政事張綱罷知婺州吏部尚書兼侍讀陳康伯參知政事戊寅詔淮南京西湖北路州軍自紹興十四年至二十七年合起内藏軍紬絹錢帛可並與蠲免日後合起發數目令逐路提刑轉運司官親巡所部度量事力開具的實合發納分數以聞自來年始先是諸路久逋内藏庫紹興甲子以後合發上供錢帛上欲悉與蠲之以諭宰執沈該曰昔唐𤣥宗有云朕雖瘠天下肥矣大哉王言此所以致開元之治也朕有取焉朕約於奉已内帑未嘗妄費一金邊郡所欠故多然户口未復責輸實難可悉與蠲免癸未夜雷乙酉新知漢州于霆入辭上曰蜀中地逺卿至官有民間疾苦利病一一奏來仍須速行不宜緩也丁亥秘書省校書郎葉謙亨言祀典散佚望酌景德故事命禮官及祕書省取祭祀之式勒成一書目曰紹興正辭錄以為彞制從之冬十月丙申上曰朕在京師時惟開封府頗類外官官司如大理寺御史臺法令嚴密官吏謹畏無敢干以私者自渡江以來大理寺治獄官吏極有姦弊至於容情請託賄賂公行玩習既久理宜懲革乙巳以講筵讀三朝寶訓徹章燕儒臣始用化成殿樂侍讀王師心因講畢奏曰祖宗創業垂統所以長慮却顧為萬世子孫之計甚備熙寧大臣私意改作流毒至今不可不監又言帝王之於史其要在於觀得失究治亂今進讀漢書願摘切於治體者讀之己未上謂宰執曰近臣僚獻利害往往各述己見未必知有無見在之法自今宜令有司講究詳審無輕改祖宗成憲湯思退等曰臣僚奏請不惟未詳條具固有便於一方而不可行於天下豈容輕議改法當依聖訓行之辛酉詔四川制置司總領所轉運常平司各具所部州縣有無旱傷聞奏如有旱傷即行減放仍以舊宣撫司樁積錢米賑濟之十一月癸亥朔詔減福建路轉運司鈔鹽錢每年八萬緡初提舉常平茶鹽事張汝楫乞行鈔法上問同知樞密院事陳誠之如何誠之曰閩中山溪之險細民冒法私販雖官賣鹽猶不能絶若百姓賣鹽豈無私販之弊第恐不盡請鈔則有虧額上曰中間福建曽用鈔法未幾復罷若可行祖宗已行之不待今日正如萬户酒前日欲㩁者甚多然竟不可行大抵法貴從俗不然不可經久時福建歲認鈔錢三十萬緡乃詔減八萬自此漕司及州縣稍舒不復抑售於民矣乙丑太常少卿充賀金國正旦使孫道夫閤門宣贊舍人充副使鄭朋辭行道夫既至敵廷金主亮詰以闗輔買馬非約始欲敗盟己卯刑部奏百姓張璘等用藥殺人劫取官綱公事上曰此罪當死古者用刑貴情法相當祖宗以來好生之德間有用例貸死刑者然不可為常茍當死而不死無以禁暴戢姦恐殺人愈多非愛民之道也辛巳右正言何溥請特召大臣毋庸數易郡守上謂宰執曰此論切中時病近亦有因事移易者今非甚不得已且令成資湯思退曰豈惟郡守監司亦然昨因近臣薦除監司至春間往往當替欲於卿監郎官中擇資淺者令中外更代皆至成資而罷上曰如此不惟免迎送之擾亦可革内重外輕之弊矣丙戌進呈給事中賀允中封駮吳國長公主女夫直祕閣鄭珙陳乞轉官添差浙東帥司參議官事上曰命下逾兩旬鄭珙已被受差遣敕矣宰執退召允中至堂面諭聖㫖允中申執所見不欲中易翌日再進呈上曰雖稍後時所論極有理當曲從之所降轉兩官指揮更不施行丁亥知樞密院事湯鵬舉罷為資政殿學士提舉在外宫觀免辭謝以殿中侍御史葉義問累疏論其罪尋詔落職己丑宰執進呈次雪大作沈該等稱賀上曰前此久雨深以為慮幸而穀價不至騰踴今得此雪來年二麥必大豐稔也十二月乙未權吏部侍郎凌哲以湯鵬舉所薦不自安乞守小郡上曰朕嘗與臺諫論大臣出處或以罪去但及其身足矣至所薦引當觀其人若不問賢否一切斥逐是使之為朋黨非公正之道也臣留正等曰元祐相司馬光盡取熙豐之政與其人而更新之天下至為相賀而程顥獨有憂色蔡確新州之竄一時大臣有名望如文彦博吕大防臺諫知大體如劉安世范祖禹皆以為當然而范純仁獨為之慨然曰縉紳之禍自此始矣夫成敗興廢天也君子能為其可為者至其不可為則安之以俟命而已固奚暇他顧然獨不觀諸水乎順而導之則行激而怒之則搏今以其泛濫無畔際也堤而障之曰吾以止水也激而不已奔怒四出臣見決堤破岸傷物轉甚耳惡乎止大哉太上皇帝之言也其殆知消息盈虚者乎夫漸而察之則不遽擇其已甚而去之則不苛薄其法以待其改則不怨使元祐大臣家存斯言則士君子之紛紛竄逐奚至如紹聖之甚哉縱使有之必不至空天下君子黨而籍之更歴再世以至於危亂而不悟也雖然天下之更相是非豈有既哉太上皇帝之言臣願聖子神孫萬世寶之詔諸路帥臣監司於本路武臣大使臣已上及見任寄居歴任有勞効之人每歲各舉二貟以備量才任使兩浙轉運副使趙子潚言被㫖措置鎮江府沙田欲選官打量隨地肥瘠輕立租課就令佃人耕種所有已前收過租利不少依條合盡行追納入官詔人户冒佃積年收過租課時免追納其田疾速拘收措置甲辰上謂宰執曰監司郡守固當久任然其間老病之人難以使之在職葢移易不過有迎送之擾而廢弛則貽患於一路一州利害孰為輕重今後有如此等可與宫觀理作自陳壬寅紹興二十八年春正月壬午罷廣南十州歲科黄河紅藤錢二千九百餘緡是日雷甲申上諭大臣曰比既詔監司刺舉守令而監司賢否勤惰將使誰察之宜為立法乃詔監司貪墮不法臺諫自當彈奏其治狀顯著之人令臺諫侍從三人以上公共推薦三省考察取㫖丙戌太府寺丞鄭知剛提舉兩浙東路常平茶鹽公事知剛入辭上以其老病増劇諭大臣曰監司非養痾之地可改授一差遣遂以為江南東路安撫司參議官庚寅上謂輔臣曰聞閩中民户輸納苗米每斛為錢八千有諸同知樞密院事陳誠之曰近歲有之上曰閩中米斛幾何誠之曰三千上曰使此錢悉以助國猶恐有傷於民况資州縣妄費乎其令以實直取之二月丙申同知樞密院事陳誠之為知樞密院事先是誠之因奏事上曰卿文人讀書乃知兵務如此之熟遂進用之乙巳尚書工部侍郎王綸同知樞密院事三月辛酉朔日有食之隂雲不見宰相欲率百僚稱賀御筆日月薄蝕乃上穹垂戒而有司以隂雲不見欲集班拜表稱賀殊非朕寅畏天威之意令毋得稱賀翌日宰執共贊所降詔語上曰朕德薄不足以格天隂雲蔽日葢偶然耳至於時雨霶霈此乃可喜也甲子福州童子莊大成十歲能誦經史書上謂輔臣曰朕即位以來童子以誦書推恩者多矣未聞有登科名顯者何也詔免解罷之丙寅雷丁卯玉牒所上三祖下仙源積慶圖祕書少監曽幾等上神宗寶訓一百卷丙子宰執進呈殿中侍御史葉義問言宰執侍從薦引人才須先赴都堂審察乃令上殿上曰天下人才若非宰執侍從薦引朕亦何緣盡識俟召到並令引對不須審察但臨時除授足矣近來士大夫以内任為榮以朕觀之正當以民事為重或監司郡守有闕可擇行在官更迭補外其外官有奉法循理實惠及民者亦須召擢庶幾内重外輕之弊可以漸革乃詔今後侍從以上薦引人才並須文行相副治績昭著務得實才以詳延之意戊寅詔曰朕式稽古訓為官擇人均治内外可今後侍從有闕通選帥臣及第二任提刑資序曽任郎官以上者卿監郎官闕選監司郡守之有政績者並須治狀昭著及有譽望之人卿監郎官未歴監司郡守者令更迭補外在内官除詞臣臺諫係朕親擢餘並須在職二年方許遷除庶内外適均無輕重之偏職業修舉有久任之效以副朕重民事之意甲申内藏庫言湖婺州所起綾羅率紕薄不堪三省擬欲退換上曰此皆民所輸納若却回其物未必及民必致重擾朕不欲如此第令薄懲兩州受納官可矣夏四月丙申詔文臣中大夫至朝奉郎武臣武功大夫至武翼大夫陳乞致仕亡殁在出敕前而不曽犯入已贓及私罪徒者許蔭補即亾殁在致仕後或已致仕而未亾殁之人但不犯入已贓即許蔭補用權吏部尚書王師心請也自是犯私罪徒之人皆得以遺恩任子矣甲辰福建轉運判官趙不溢奏南劒州禁軍作閙上曰治軍與治民不同又事有雖大而可闊略雖小而不可貸者顧其情如何耳此豈可姑息自今有犯但當行法更當精擇守臣使任其責五月癸亥嚴州遂安民江大明等作亂犯衢州官軍獲之是日以聞上曰既已獲賊賞宜速行若稍緩即失信於人無以示勸既又奏賞事上曰土豪賞太輕宜加一等朕於賞典必務從厚不然無以勸功又不可濫若厚賞而復濫尤非勸功之道也庚午權户部侍郎徐林奏版漕調度闕乏上謂大臣曰祖宗以來所用亦廣未聞不足今朝廷無他浮費於經費中又務從約而有司每告乏何也孔子曰百姓足君孰與不足藏之於民猶外府也為今之計但當裁節不可取之於民甲戌宗正少卿楊偰乞將取應宗子比府監進士理年免舉上曰此自有成法遵守可也祖宗以來若可行不至今日矣丁丑起居舍人洪遵請以經筵官除罷及封章進對燕㑹錫予講讀問答等事悉行編錄以邇英記注為名從之自是年秋講始是月金主亮謀欲再修汴京而徙居之為南侵之釁六月壬辰入内修武郎蔣堯輔除名不刺面配新州牢城堯輔為永祐陵都監以不法屬吏當死上因謂輔臣曰朕待内侍加嚴故比前犯法者少以此知人主之於臣下以嚴御之者乃所以愛而全之也癸巳禮部言目今諸州保明到童子乞試者欲依祖宗典故並送國子監試驗訖如合格者送中書宰執聚㕔舍人挑試又合格者取㫖推恩從之是日流星晝隕丙申詔以盛暑遣翰林醫官四貟遍詣臨安府城内外診視居民合用藥於和劑局應副俟秋涼罷是日嘉陵江水溢入興州城壞棧道利州大安軍皆被水甲辰樞密院都承㫖陳正同言諸路奏讞死囚例多降配非是上曰刑罰非務刻深欲當其罪若專事姑息廢法用例則人不知畏非所以禁暴戢姦卿等可諭刑部常令遵守成憲史臣曰言刑以不殺為仁言法以撫摩茍安為得策世言俗士信哉南劒言兵變上曰此但可行法福州請寛海盜死上曰此姑息耳不惟是也以招安為非弭盜之法以首身為非御軍之法明乎哉聖人之慮也秋七月辛未右正言何溥言近朝廷擇取敎授通判之闕于部以為堂除臣獨惜夫士大夫之才有長於為邑者而置之無用之地使百里之民不見由求卓魯之政甚可嘆也望用建隆天聖故事擇大縣闕為堂除上謂沈該曰朕謂天下事治其末者不若治其本縣令末也監司郡守本也若監司郡守盡得人則縣何患不得人卿等為朕擇監司郡守足矣既而吏部請依故事遇堂除知縣下本部取闕供給視諸州簽判餘如溥所請從之戊寅起居舍人洪遵面對論鑄錢利害大略謂今錢寶不惟銷毁作器用而南過海北度淮所失至多自罷提㸃官復置屬官二貟無異監司而鑄錢殊未及額亦宜多方措置上諭大臣曰遵論頗有可採前後銅禁行之不嚴殆成虛用銅器雖民間所常用然亦可以他物代之今若自公卿貴戚之家以身率之一切不用然後申嚴法禁宜無不戢者己卯上出御府銅器千五百事送鑄錢司遂大斂民間銅器其道佛像及寺觀鐘磬之屬並置籍每斤收其算二十文民間所用照子帶鑻之類則官鬻之凡民間銅器限一月輸官限滿不納十斤已上徒二年賞錢三百千許人告自後犯者私匠配錢監重役其後得銅二百萬斤庚辰上出御製郊祀天地宗廟樂章十三首示輔臣甲申給事中賀允中權吏部尚書允中在黄門多所駮正嘗因對論君子小人之異允中言君子志在尊君則不能無忤小人志在恱君故第為詭異此不可不辨也上稱美久之允中又言聞陛下欲闢御苑以近某人園果乎上曰誰為此言允中曰臣既有聞不得不奏也上曰卿言甚忠繼有所聞宜悉以奏尚書司封貟外郎黄中守國子司業乙酉詔諸路没官田並令出賣知復州何榘言湖北路所賣茶引歲有常額其間户口繁庶去處年額不多是致小商私販以規利兼有人煙户口未及前時而引數頗多科及保正甚者不問貧富以丁口一例科抑詔提舉司參酌人户多寡通融措置毋得科敷八月戊子朔詔置國史院修神宗哲宗徽宗三朝正史己丑詔諸路風水災傷州縣並令提舉官檢放苗稅而賑貸其不給者用監察御史任古請也戊戌尚書右僕射提舉實錄院湯思退等上徽宗實錄一百五十卷實錄自八年秋開院至是踰二十年乃成舊秦檜所進自元符三年至大觀四年至是再加増潤然猶多疎略云上御垂拱殿進呈訖奉安於天章閣又以小本進入禁中壬寅尚書省勘㑹張浚已服闋詔落職提舉江州興國宫依舊永州居住甲寅夜地震九月己巳初環周以大理寺丞面對論太湖地低杭秀蘇湖四州民田多為水浸請復導諸浦分注諸江詔兩浙漕臣按視至是轉運副使趙子潚等言總計用工三百三十餘萬錢三十三萬餘貫米十餘萬石乃詔監察御史任古提㸃刑獄徐康覆視遂出御前激賞庫錢平江府上供米如其數用正月庚申興工戊寅領御前都指揮使職事楊存中言本司見造戰船乞置虎翼水軍一千人駕放從之庚辰中書舍人王剛中充四川安撫制置使兼知成都府先是權禮部侍郎孫道夫言中外藉藉皆謂金人有窺江淮意不知達聖聽否上曰朕待之甚厚彼以何名為兵端道夫曰夷狄難測也彼身殺其兄而奪其位興兵豈問有名願陛下預為之圖又言成都帥陛下不可不擇宜求才可以制置四川者二三人常置之聖度上云當儲人以待緩急之用剛中亦言禦戎最今日先務之急夷狄之情強則犯邊弱則請盟今勿計夷狄之強弱盍先自擇將帥蒐士卒實邊儲備器械加我數年國勢富強彼請盟則為漢文帝犯邊則為唐太宗上壯其言會西蜀謀帥上曰無逾王剛中矣遂有是命又令道夫以蜀中利害語之時太常博士杜莘老因轉對亦論金將敗盟宜飭邊備且曰勿恃其不來恃吾有以待之上稱善再三癸未三省言平江紹興府湖秀州被水欲除下户積欠恐侵歲計乞令户部開具上曰止令具數便於内庫撥還朕平時無妄費内庫所積正欲備水旱耳本是民間錢却為民間用復何所惜耶甲申起居郎洪遵言臣幸得以記注陪侍經幄每先朝書歴經筵官講讀畢許留身奏事而記注官未嘗有奏事者皆云近例如此且聮名一歴不應别為二體望許依講讀官奏事遵又言自紹興九年至今起居注未修者殆十五年乞令兩制除見修按月進入外餘未畢者每月帶修兩月皆從之乙酉權户部侍郎趙令詪言州縣義倉米積久陳腐欲行出糶及水旱災傷檢放不及七分去處亦許賑濟上曰義倉歲以三之一出陳易新何至侵損土田自有髙下必俟通及七分則當賑濟處絶少矣飢民何由得食卿等可别行措置冬十月戊子虞允文為祕書丞允文知渠州地磽民貧而常賦之外又行加斂流江一邑尤甚允文奏罷之凡六萬五千餘緡沈該薦其才召對允文獻言謂君道有三曰畏天曰安民曰法祖宗時論韙之又論州縣科需尋詔監司約束初上作損齋屏去玩好置經史古書于中以為燕坐之所且為之記權吏部尚書賀允中請以賜羣臣庚寅上謂宰執曰允中嘗於經筵問朕好道之意朕謂之曰朕之所好非世俗之所謂道也若果能飛昇則秦皇漢武當得之若果能長生則二君至今不死朕惟治道貴清靜故恬淡寡慾清心省事所謂為道日損期與一世之民同躋仁壽如斯而已當降出碑本以賜卿等史臣曰在易之損六五君位也其辭曰或益之十朋之龜弗克違元吉履尊以損則益之者衆所以元吉也然則自損之道袛其所以為益歟十一月丁巳朔出内庫錢三萬九千餘緡付户部代平江府常湖州水災下户積欠租稅辛酉詔大禮金銀錢帛並減半供進翌日沈該等言近蒙聖恩捐内庫錢代三郡積欠以寛民力今所進又減半深恐錫賚之際或不足用上曰大禮支費朕半年前預立定格無分毫濫比之前郊才及十之五該曰陛下恭儉出於天性豈前代帝王所可跂及己卯冬日至合祀天地於南郊赦天下故事每遇大禮則命近臣看詳編置罪人所犯或放或徙秦檜用事士大夫貶責者雖屢赦不移至是用何溥言壬午命權吏部尚書賀允中刑部侍郎楊揆儉舉因是遂為永制十二月辛丑上謂大臣曰近州縣官吏曽經臣僚論列而監司郡守失於按發雖已行遣一二其餘待罪者皆放恐公然容庇姦贓之吏無所忌憚壬寅詔自今量其輕重必行責罰不許待罪是歲賜道人黄元道號達真先生御製贊賜之上召對蜀人皇甫坦問何以治身坦曰心無為則身安人主無為則天下治復問長生久視之術坦曰先屏諸欲莫令放逸丹經萬卷不如守一上歎曰真人也為書清虚二字以名其庵且繪其象於禁中焉己卯紹興二十九年春正月庚辰左正言何溥請禁諸州科責倉鹽上曰鹽雖民間常用之物不可一日闕至於科賣則為大害朕頃在京東目擊此事州縣抑民均買謂之計口食鹽其後盜繇此起今當嚴禁止之史臣曰㩁弊法也而又計口抑配以虐取之民將何堪此後世一切之政徒謂其食用所湏官有必鬻之令莫我違者敢為不恤以欺吾君也民知其不吾恤亦輕於為盜此固聖君之所動心也其後福建鹽綱有歲鬻名額以率價於民者亟命革之君之仁至矣二月丁亥初諸州鑄錢監自紹興以來或省或并其存者所鑄亦希故兵匠有闕不補視舊數損十之三積其衣糧號三分闕額錢饒池江建嚴韶信衡南雄南安諸郡皆有之提㸃坑冶司之未廢也朝廷三次降銅本錢凡三十六萬緡至是權户部侍郎提領鑄錢趙令詪言諸州三分闕額錢已積下六載今欲撥付諸監充銅本從之是後不復降本第收諸州所樁以資鼓鑄之用辛卯詔信州上清正一宫道士張守真特封正應先生守真道陵三十二世孫也丁酉詔蠲四川折估糴本積欠錢三百四十萬緡戊戌雪又雨雹壬寅上諭大臣曰近户部㑹賣田數數頗多須樁管近時士大夫持論多說百姓足君孰與不足見公家稍寛遽欲免民常賦不知緩急闕用取之甚難非時而科是謂横斂茍徒知施惠之虚名而不恤横斂之實害豈愛民之道也己酉上謂大臣曰聞江西境内有群聚而掠人於道者凡災傷處悉令賑濟蠲欠已及二十七年不知州縣奉行如何輕徭薄賦自無盜賊故唐太宗用魏證之言行仁義既效且曰惜不令封德彞見之然德彞與虞世基軰皆隋朝佞臣誤煬帝者太宗受命自當斬之以為奸佞之戒祕書省校書郎汪徹言立國惟文武二道而人才尤不可偏要當求於無事之時陛下親政以來除召四出滯者奮屈者伸然武臣中未聞有薦者望詔帥臣監司於本路大小使臣舉智謀可充將帥勇鷙可率士卒者其侍從臺諫官如有所知亦許論薦自孫道夫使還言金主亮詰以闗陜買馬非約恐將來釁於我士之有識者黙為此慮而未敢顯言為備徹因轉對首有是請上從之三月丙辰朔詔今後四川類試用九月十五日鎖院癸亥夜雷聲初作丙子詔諸路州縣紹興二十七年以前積欠官錢三百九十七萬餘緡及四等以下户係官所欠皆除之宰執奏擬詔意上曰輕徭薄賦所以息盜歲之水旱所不能免儻不寛恤而惟務催科有司又從而加以刑罰豈使民不為盜之意故治天下當以愛民為本丁丑詔帥臣監司侍從臺諫歲舉可任將帥者二貟具材畧所長及曽立功效聞奏大理評事趙善養言古者制民之産皆有定法比年以來為害甚者無如差役今官户田多差役並免其所差役無非物力低小貧下之民州縣稍不加恤求其安裕樂業不可望也望命有司立限田之制以抑豪勢無厭之欲户部奏品官之家所置民産依條格合得頃畝已過數者乞免追改將格外之數衮同編户募民差役詔給舍同户部措置其後給事中周麟之等請品官子孫名田減父祖之半其詭名寄産皆併之滿三月不陳許人告以其田之半歸官餘給告者其募人充役並募本縣土著有行止人充從之夏四月壬辰國子司業黄中賀金主生辰還時金主亮再修汴京以圖南牧沈介為賀正旦使先還不敢言中歸為上言彼國治汴京役夫萬計此必欲徙居以見迫不可不早自為計時約和久中外解弛無戰守備上聞矍然曰但恐為離宫也中曰臣見其所營悉備此不止為離宫若南徙居汴則壯士健馬不數月可至淮上惟陛下深圖之宰相沈該湯思退聞之詰中曰沈少監之歸屬耳不聞此言公安得為此也居數日復往白請以妄言即罪思退怒至以語侵中時中書舍人洪遵亦請密為邊備該等不聽己亥鎮江府火辛丑詔修臨安府至鎮江運河堰閘壬寅國子司業黄中守祕書少監近例使北還者率得從官宰相以中言敵有南牧意惡之故沈介遷吏部侍郎而以中補其處先是武成王廟生芝草武學博士朱熙載密為圖以獻熙載湯思退所薦也於是宰相召長貳赴都堂責之曰治世之瑞抑而不奏何耶祭酒周綰未及言中指其圖謂曰治世何用此為綰退而歎曰惜不使通老為諫諍官也辛亥宰執進呈祕書省正字王端朝請選縣令先是累詔監司帥守舉按縣今功罪雖間有發摘而未聞特薦一二人者葢務專行法而無旌賞使人歆艷恐非勸功之道乃詔縣今有政績者委諸司同薦不次陞擢以風勵之五月己未上與宰執論儲畜事上曰比緣河流淺澁綱運稽緩已支内帑錢五百萬緡以佐調度朕自息兵講好二十年所積豈以自奉葢欲備不時之須免臨時科取重擾民耳可令户部計每歲經常之費量入為出而善藏其餘自非饑饉師旅勿得妄動辛酉詔官貟豪富之家計囑諸軍部轄人放債與軍人厚取利息於請受内尅還有害軍政令内外諸帥幾察禁止其有債負日下除放即理索及還之者皆抵罪自今有犯命官取㫖己巳宰相沈該湯思退言近㫖令監司守臣按察所部官屬其治績顯著者保舉陞擢緣未有定立條目致舉刺皆未能當竊見元祐間司馬光陳請舉按官吏八條委是詳密於今可見臣等今重行修立舉薦四條曰仁惠謂安民利物衆所畏愛非疲軟不立曲取人情者公直謂心無適莫事不吐茹非内私外公實佞詐直者明敏謂深察情理應機辨事非飭詐掠美利口矜功者亷謹謂安貧守分動遵法度非詐情釣名偷安避事者按察四條曰苛酷謂用刑繁苛殘虐踰法狡佞謂傾險巧詐危人自安昏懦謂不曉物情依阿無守貪縱謂饕餮無厭任情不法凡應薦舉者州舉之部使者部使者舉之朝廷皆籍記姓名隨材任使庚午詔武舉人依府監年數與免解六月甲申朔同知樞密院事王綸為大金奉表稱謝使知閣門事曹勛副之時士大夫數言敵情難信請飭邊備沈該等不以為然奏遣大臣往探敵意且尋盟焉乙酉詔減荆南府路經總制錢四千七百緡以通判府事張震言民力未復無可收趂也丁亥權尚書禮部侍郎孫道夫罷知綿州道夫數言武事沈該慮其引用張浚故出之己亥提學江州太平興國宫張九成卒年六十八九成既以病風廢且喪明前五日兩疾頓除其親舊皆喜至是偶與諸生讀江少虞所集皇朝類苑至章聖東封丁謂取玉帶事忽怒曰丁謂姦邪雖人主物亦以術取因不懌廢卷而入疾復作不能言一夕卒癸巳殿前司選鋒軍統制李顯忠陞都統制楊存中為上言顯忠才氣豈宜處之褊裨故有是命丙申知樞密院事陳誠之知泉州尋與宫觀奪職丁酉詔累禁不得以包苴交結而邇來尚或有之在州縣則科取於民在軍旅則掊尅卒伍夫居上位者必有所欲而後人得因其所欲以濟請託之私宜申戒飭有犯重寘於法仍令臺諫糾彈在外令監司按劾己亥參知政事陳康伯兼權樞密院事以西府全闕故也辛丑左朝奉大夫李光守本官致仕光既許便居行至江州而卒年八十二丁未中書舍人兼樞密都承㫖洪遵每邊防民隠必為上言之北兵索郭小的劉孝恭等二百家遵執不可軍器刓敝命遵科簡遵區别良窳衆謂熟於軍旅者所不及由是上益嚮意用之己酉尚書左僕射同中書門下平章事沈該提舉臨安府洞霄宫庚戌詔該致仕以言者彈擊未已上疏力辭職名乃有是命閏六月癸丑朔太尉知荆南府劉錡請益戍甲寅詔馬軍司選兵千人騎二百戍之秋七月壬午朔淮東安撫司言北邊蝗蟲為風所吹有至盱眙軍楚州境上者然不食稼比復飛過淮北皆已靜盡癸未上謂大臣曰此事甚異可以為喜仰見上天垂祐之意陳康伯曰皆由聖德所感鄰境聞之當自懾伏上曰然使其聞之必不敢妄作矣史臣曰古者以灾異多興國謂其成於畏也成於畏則君德彰矣朝桑所以彰太戊也鼎雉所以彰髙宗也熒惑所以彰景公也成矣今夫蝗之來不可祝而去煌之生惟苗是食其去而不食果何以致之也德聞於天天且眷之矣虜安得而不服臣以謂非誠於畏者不能也乙酉詔自今功臣子孫敘遷當至侍從並令久任在京宫觀庶幾恩義兩得永為定法給事中楊椿封還之曰爵秩天下公器陛下縱私之奈清議何上面諭椿朕欲以虚名奬用勲臣子孫椿曰名器不可假人恐倖門一開援例者衆丁亥權吏部尚書賀允中參知政事癸巳中書舍人洪遵言近奉指揮自今功臣子孫敘遷至侍從並令久任在京宫觀永為定法臣竊計内外將家子孫亾慮二千人若以敘遷不出十年西清次對之班皆可坐致恭惟太祖皇帝之世所與開國創業及南征西伐諸大功臣其子若孫不過諸司使惟曹彬之子琮瑋以功名自奮王承衍石保吉以聮姻帝室皆為節度使初不聞遞遷侍從之例今指揮一出使十年之間清穆敞閒之地類皆將種非所以示天下之美觀望收還前詔從之戊戌翰林學士修國史周麟之言知雙流縣李燾嘗著續皇朝公卿百官表九十卷詔給札錄付史館燾博學剛正張浚張燾咸器重之秦檜盛時嘗遣人諭意欲得燾一通問即召用之燾惡其誤國擅權迄不與坐此偃蹇州縣垂二十年四川安撫制置使王剛中聞其名奏以為幹辦公事初燾以司馬光百官表未有繼者乃徧求正文實錄傍採家集野史増廣門類起建隆迄靖康合新舊官制踵而成書其後續資治通鑑長編葢始於此庚子江南東路轉運判官李稹為江淮等路提㸃鑄錢公事稹復置闕上諭宰執曰泉司利害大槩有四坑户銅本人工木炭是也卿等宜諭稹講究利害令鼓鑄復額以稱朕意乙巳右僕射湯思退等乞以上親書近降戒驕惰禁賂遺三詔立石於尚書省以墨本頒於中外從之思退因贊雲章奎畫超冠古今上曰朕自少時留心翰墨至今不倦然迄不能臻其妙在唐惟太宗好二王書一時翕然相尚歐虞褚薛皆有可觀朕有舊藏文皇數帖其間有好謙自牧上畏天下畏羣臣等語不惟字畫可喜其用心實後世所矜式也八月丁巳執政以皇后生日用例從激賞庫進銀三萬兩充禮物詔今自除皇太后生辰内敎犒賞將士外朕生日皇后生日冬年寒食節並減半餘並免宰執奏仰見陛下約已便民恭儉之德度越前代逺甚上曰前後所進尚有餘若留之不過樁管以備不時之須耳庚申詔四川等處見在行在進士歸鄉赴試可特令就兩浙轉運司附試一次其後試者七百五十人詔令發解十五人甲子詔兩浙東路提刑徐度兩浙西路提刑吕廣問左迪功郎朱熹並召赴行在知建州建安縣韓元吉令任滿日赴行在皆用輔臣薦也熹松子少孤從延平李侗學弱冠中進士第調泉州同安簿官滿當路尊敬不敢以屬吏相待同安之民不忍其去五年而後罷於是慨然有不仕之志築室武夷山中四方游學之士從之者如市上聞其賢故召之熹卒不至九月壬午詔委官詳定閩浙廣三路舶司條法用御史臺主簿張闡請也舊畨商之以香藥至者十取其四即貴細者十取其一闡前提舉兩浙市舶還朝為上言三舶司歲抽入和買約可得三百萬緡上謂輔臣曰此皆在常賦之外未知户部如何收支可取見實數以聞殿中侍御史汪徹言知英州吳名世所為貪酷詔放罷令提刑司取勘其後法寺言名世贓罪絞詔貸死除名藤州編管仍籍没家財是夜雷乙酉奉使大金稱謝使王綸副使曹勛等還朝入見言鄰國恭順和好無他丙戌宰相湯思退等皆再拜賀上曰葢前此中外紛紜之論皆欲沿邊屯戍軍馬移易將帥及儲積軍糧之類便為進取之計萬一遂成輕舉則兵拏禍結何時而已今而後宜安邊息民以圖久長思退曰遣使尋盟和好益堅皆陛下威德所致然金主亮已定寇江之計綸所言葢妄也甲午尚書右僕射湯思退遷左僕射參知政事陳康伯守右僕射並同中書門下平章事上謂康伯曰卿靜重明敏一語不妄發真宰相也今與思退共政如有可否不憚商量康伯曰大臣論國事進退人材自當盡心若媕婀取容植黨以自固臣不敢也庚子皇太后韋氏崩於慈寧宫辛丑百官班慈寧殿宣遺誥時百官入臨皆吉服吏部貟外郎虞允文獨易服有非之者允文不改俄召百官易服甲辰有司以辰日罷朝夕哭起居郎權中書舍人黄中爭之曰此非經且唐太宗猶以是日哭其臣况臣子於君母乎冬十月癸丑皇太后殿攢有司以權制已訖請百官以吉服行事黄中復曰唐制啓攢雖在易月之外猶曰各服其初服今以易月故而遂吉服以殯非禮也朝廷用之於是百官常服黑帶入朝衰服行事辛未雨同知樞密院事王綸因奏事言梓宫進發河道無淺涸之患上因論溝洫利害云往年宰臣曽欲盡乾鑑湖云歲可得米十萬碩朕答云若遇歲旱無湖水引灌即所損未必不過之凡慮事須及久逺也癸酉同知樞密院事王綸言密院大事每與三省同議上曰樞庭雖五代之制疑太祖太宗曽入思慮五代弊法祖宗掃除略盡惟存此一二大者必有深意上又曰大臣固不當疑雖人告其不軌朕亦不信若有姦邪即罷之不當任而疑也綸曰自古帝王用人之道無越於此矣十一月甲申日南至命尚書工部侍郎王睎亮祀昊天上帝於南郊以輔臣皆奉册寶不克齋故也十二月甲寅諜報北界揭榜禁妄傳起兵事上曰此事有無固不必問朕觀其科擾勞役民不聊生豈是久長之道朝廷但當精擇牧守務為自治安邊息民靜以待之耳庚申金國賀正旦使施宜生等入境先是宜生坐范汝為事逺竄遂奔偽齊齊廢復為敵用累遷禮部尚書至是以翰林侍講學士來賀來年正旦侍衞親軍馬耶律翼副之接伴使宗正少卿金安節帶御器械韓俁迓之於淮岸口安節等發舟至中流互問聖躬已宜生遣人謂安節此持賀禮而來迓使安得服黒帶安國答曰太后上仙未逺若純吉服恐成失禮北人曰既以日易月豈得至今未除安節曰以日易月乃太后遺誥耳主上至孝以未卒哭尚衣素服朝廷百官皆是黑帶北人曰頃者哀謝使之來朝廷以宋國有喪尚令止樂今宜生等持賀禮而行迓使當以吉禮相待安節曰往者哀謝使雖在制中不敢易服尊上國也今在境内自當如禮久之宜生遣人來云請使副自便安節疑其語不誠即召其引接宋國趙選諭之云此事上有朝廷非使副所專日已向暮幸速赴宴有頃宜生等答曰且從所諭相距踰兩時乃至岸丙寅提舉萬壽觀兼侍讀張燾試吏部尚書初上知普安郡王之賢欲建為嗣而恐顯仁皇后意所未欲故遲回久之顯仁崩上問燾以方今大計所在燾曰儲貳者國之本也天下大計無踰於此今兩郡名分宜早定上喜曰朕懷此久矣卿言適契朕心開春當議典禮燾頓首謝時風俗侈靡財用匱乏燾勸上止北貨之貿易省非時之賜予罷土木減冗吏躬行節儉民自富足上嘉奬再三辛未同知樞密院事王綸進知院事丙子金國賀正旦使施宜生副使耶律翼見於垂拱殿時吏部尚書張燾奉詔館客宜生素聞其名畏慕之一見顧翼曰是使南朝不拜詔者也宜生閩人燾以首丘桑梓語之宜生敬燾頗漏敵情燾密奏之且言宜為之備上深然其說亮又隠畫工於中即使密寫臨安之湖山城郭以歸既則繪為屏而圖已之像策馬於吳山絶頂後題以詩有立馬呉山第一峯之句葢亮所賦也宋史全文卷二十二下
