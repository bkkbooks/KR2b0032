body:
  text: 宋史全文卷十一宋神宗一戊申熈寧元年春正月甲戌朔日有食之詔改元復命武臣同提㸃刑獄壬午詔州縣春首檢視暴骸給錢葬祭之丙申權三司使唐介㕘知政事執政坐待漏舍故事唯宰相省閲所進文書介謂曽公亮曰介備位政府而文書皆不知上若顧問何辭以對公亮乃與介同閲視後遂以為常詔太學増置外舍生百員初太學置内舍生二百員官為給食至是待次而入者葢百餘人諫官以為言故有是詔二月乙卯孔宗愿子若䝉為新泰縣主簿襲封衍聖公丙辰种諤奪四官隨州安置初有司奏劾諤擅興生事詔繫長安獄諤乃悉焚當路所與簡牘置對無一語罣人惟自引伏司馬光進讀資治通鑑至蘇秦約六國從事上曰蘇秦張儀掉三寸舌乃能如是乎光對曰秦儀為縱横之術無益於治臣所以存其事於書者欲見當時風俗專以辯説相髙人君委國而聽之此所謂利口覆邦者也上曰朕聞卿進讀終日忘倦上謂文彦博等曰天下弊事至多不可不革彦博對曰譬如琴瑟不調必改而更張之韓絳曰為政立事當有大小先後之序上曰大抵威克厥愛乃能有濟三月癸酉朔上謂文彦博等曰當今理財最為急務養兵備邊府庫不可不豐大臣共宜留意節用又曰漢文身衣弋綈非徒然也葢亦有為為之耳數十年間終有成效以此言之事不可不勉也乙酉上謂文彦博等曰任人各以所長乃可立事至於有過寡行之人或可使但不宜使在左右乙未詔河北轉運司預計置賑濟饑民夏四月壬寅朔富弼入見問以治道弼以上鋭於有為對曰人君好惡不可令人窺測可窺測則奸人得以傳㑹其意陛下當如天之鑒人隨其善惡若自取然後以誅賞從之則功罪得其實矣上稱善又問北邊事條目甚悉弼曰陛下臨御未久當先布德澤且二十年未可言用兵亦不宜重賞邊功干戈一起所係禍福不細上黙然良久又問所先弼曰阜安㝢内為先上善之詔新除翰林學士王安石越次入對上曰方今治當何先對曰以擇術為始上問唐太宗何如主對曰陛下每事當以堯舜為法唐太宗所知不逺所為不盡合法度堯舜所為至簡而不煩至要而不迂至易而不難但末世學士大夫不能通知聖人之道故常以堯舜為髙而不可及不知聖人經世立法常以中人為制也上曰卿可謂責難於君然朕自視眇然恐無以副卿此意卿可悉意輔朕庶幾同濟此道試為朕詳言施設之方對曰願陛下以講學為事講學既明則施設之方不言而自喻安石退而上疏極言累世因循末俗之弊且謂理財無法庚申翰林學士兼侍講吕公著王安石等言竊尋故事侍講者皆賜坐自乾興以來講者始立而侍者皆坐聽臣等竊以為侍者可使立而講者當賜坐禮官韓維刁約胡宗愈言臣等以為宜如天禧舊制以彰陛下稽古重道之意龔鼎臣蘇頌周孟陽王汾劉攽韓忠彦等言乾興以來侍臣立講歴仁宗英宗兩朝行之且五十年豈可一旦以為有司之失而輕議變更乎上問曽公亮但稱臣侍仁宗書筵亦立後安石因講賜留上面諭曰卿當講日可坐安石不敢坐遂已權判南京留司御史臺劉敞卒慶厯前學者多守注疏之學至敞為七經小傳始異諸儒之説後王安石修經義葢本於敞癸亥孫覺為右正言赴諫院供職上與覺言欲革積弊覺對弊不可不革革而當其悔乃亡他日上語左右曰孫覺頗知理五月癸酉上謂文彦博等曰丁謂王欽若陳彭年何如人彦博等各以所聞對因言當時修建宫殿皆謂等開之耗祖宗儲積過半至今府庫不復充實上曰王旦為宰相不得無過韓絳曰旦嘗諫上不從求去位又弗許上曰事有不便當極論列豈可以求去為是也國子監言補試國子監生以九百人為額從之六月癸卯以同州明法魏道嚴為本州司士㕘軍前邠州觀察推官狄國賔注擬隴州職官一任以判永興軍韓琦言道嚴唐鄭國公徴裔孫國賔梁國公仁傑十二代孫故也詔諸路與監司訪尋州縣可興復水利如能設法勸誘興修塘堰圩垾功利有實當議旌寵乙卯賜知唐州光禄卿髙賦敕書奬諭賦在唐凡五年比罷増户萬一千三百八十増田三萬一千三百二十八頃而山林榛莽之地皆為良田嵗益税二萬二千五十七作陂堰四十有四云丙寅命司馬光滕甫同看詳裁減國用制度仍取慶厯二年數比見今支費有不同者開析以聞光登對言國家所以用不足者在於用度太奢賞賜不節宗室繁多官職冗濫軍旅不精此五者非愚臣一朝一夕所能裁減若但欲知慶厯二年裁減制度比見今支費數此止當下三司條析其同與不同立可盡見不必更差官置局上深開納明日即罷裁減司秋七月乙亥詔秦州新築大甘谷口寨曰甘谷城即篳篥城也丁丑布衣王安國賜進士及第仍注初等職官己卯羣臣表上尊號曰奉元憲道文武仁孝詔不許及第三表司馬光入直因言上尊號之禮非先王令典起於唐武后中宗之世遂為故事因循至今太祖尊號有一統太平字太祖以燕晉未平却而不受太宗尊號盡省去且曰以理言之皇帝二字亦未可兼稱詔賜光曰朕方以淫雨地震日虞傾禍被此洪名有慚面目遂終不許新知大名府陳升之知樞密院事文彦博吕公著為使韓絳邵亢為副使樞密並置使副及知院自此始辛巳孫覺責授太子中允仍知諫院先是陳升之登對上面許擢置中樞覺相繼登對上因與言陳升之宜居宥密邵亢不才向欲使守長安而執政以為無過時升之已有成命而覺不知退即上言宜使亢知永興升之為樞密使上以覺為希㫖收恩且區處大臣非小臣所宜故責之覺又言滕甫貪汙頗僻斥其七罪上不信悉以覺疏示甫甫謝曰陛下無所疑臣無媿足矣甲申京師地震乙酉又震是夜月食有司言明天厯不效當改厯詔司天更造新厯降將作監主簿助教告敕七十道付河北安撫司募人入粟戊戌知諫院錢公輔言祠部遇嵗饑河決鬻度牒以佐一時之急欲乞自今宫禁遇聖節恩賜度牒並裁損或減半為紫衣稍去剃度之冗從之賣度牒葢始此年八月壬寅京師地又震同知諫院孫覺通判越州覺既降官累章求出不許覺以為去嵗有罰金御史今茲有貶秩諫官未有罰金貶秩而猶居其位者也覺遂移牒閤門御史臺云論邵亢滕甫奸邪方待罪更不入朝及釐務閤門以聞上批出曰覺牒與所言事不同宜與外任差遣甲辰京師地又震辛亥邇英進讀已召司馬光問以河北災變光對以饑饉之嵗金帛無所用惟食不可一日無耳宜多漕江淮之榖以濟之上因論治道言州縣長吏多不得人政府不能精擇對曰人不易知天下三百餘州責其精擇誠難但能擇十八路監司使之擇所部知州而進退之知州擇所部知縣而進退之得人多矣又問諫官難得人誰可者對曰臣賤官何敢薦人上固問之對曰凡擇言事官當以三事為先第一不愛富貴次則重惜名節次則曉知治體具此三者誠亦難材鹽鐵副使吕誨侍御史吕景此兩人似堪其選癸丑宰臣曽公亮等言伏見故事南郊禮畢陪祀官並䝉賜方今河朔菑沴調用繁冗欲望大禮畢兩府臣僚罷賜銀絹詔送學士院取㫖司馬光奏曰朝廷宣布惠澤則宜以在下為先撙節用度則宜以在上為始臣愚以為將來大禮畢所賜並宜減半俟他日豐稔自依舊制臣知此物未能富國家因此漸思減其餘浮費自今日為始耳安石曰國用不足由未得善理財之人故也光曰善理財之人不過頭㑹箕斂以盡民財如此則百姓窮困流離為盜豈國家之利耶安石曰此非善理財者也善理財者民不加賦而國用饒光曰此乃桑𢎞羊欺漢武帝之言司馬遷書之以譏武帝之不明耳安石爭論久之上曰朕亦與司馬光同今且以不允答之可也是日適㑹安石當制遂以上前所言意草批劄曰方今生齒既蕃而賦入又為不少理財之義殆有可思此之不圖而姑務自損祇傷國體未協朕心所乞宜不允公亮等遂不敢復辭甲子手詔曰昔我藝祖之興以天縱之聖再造區夏大謨偉烈被諸萬世而莫髙焉其令中書門下考太祖之籍以屬近而行尊者一人裂土地而王之使常從獻于郊廟世世勿絶乙丑詔復行崇天厯鹽鐵副使吕誨同知諫院用司馬光之言也詔自今試館職並試策論罷詩賦九月辛未涇州觀察使從式進封安定郡王初韓琦自長安入覲問曰推崇太祖之後令擇一人封王常從獻于郊廟不知何故及此自古主鬯從獻皆太子事今忽擇一人令郊廟從獻豈不疑駭天下視聽乎上悟遂罷從獻之㫖甲申詔自今内批指揮並作奉聖㫖施行戊子莫州地震有聲如雷冬十月壬寅詔講筵權罷講禮記先是王安石講禮記數難記者之非是上以為然是日上因留安石坐曰且欲得卿議論上曰唐太宗必得魏鄭公劉備必得諸葛亮然後可以有為安石對曰陛下誠能為堯舜則必有咎夔稷契陛下誠能為髙宗則必有傳説魏鄭公諸葛亮皆有道者所羞何足道哉講義曰三代以來書生得君自安石始其始見神宗也直以文帝太宗之不足法者為言復以魏徴諸葛亮之不足為者自任此其智識之卓然又皆秦漢以來諸儒所未聞者所謂擇術講學之方雖孟子告君殆不是過人主安得不信其知道哉神宗詰其設施之方而再三不肯條對者葢其所施設之方止於青苗助役之類而遽條陳之則人必不我信故粗言一二而不肯録進欲使人主之深聽而後舉朝聽其所為也未幾讀吳申謹奉成憲之疏於是謂成憲不足道流俗不足聽勞民非所恤嚴刑非所緩人主當示人以好惡當懼人以不測且謂勞民重刑三代亦然而安石施設之藴理財之法變法之心盡露矣丙午上問講讀官富民之術司馬光言凡富民之本在得人縣令最為親民欲知縣令能否莫若知州欲知知州能否莫若轉運使陛下但能擇轉運使轉運使按知州使知州按縣令何憂民不富也十一月癸酉太白晝見丁亥合祭天地于南郊以太祖配甲午司馬光入辭因請河陽晉絳上曰汲黯在朝淮南寢謀卿未可去也京師及莫州地震十二月壬寅詔自今内批指揮事俟次日覆奏行下癸卯瀛州地大震庚戌賜夏國主嗣子秉常詔候誓表到日即遣使封冊并以綏州給還所有嵗賜自封冊後並依舊例庚申命入内副都知張若水進所造神臂弓初民李宏獻此其實弩也詔依樣製造至是以進己酉熈寧二年春正月丁亥上謂輔臣曰近見内藏庫籍文具而已財貨出入畧無闗防嘗聞太宗時内藏財貨每千計用一牙錢記之名物不同所用錢色亦異他人莫能曉也嘗匣而置之御閣以參驗帳籍中定數晩年嘗出其錢示真宗曰善保此足矣今守藏内臣皆不曉帳籍闗防之法當更擇人領之知同州趙尚寛知唐州髙賦知齊州王廣淵條奏置義倉事知陳留縣蘇涓亦言臣勸諭百姓置義倉以備水旱條上措置事詔曽公亮曰近王廣淵於齊州創置義倉已勸率十萬餘石當得人繼守其事可持詔廣淵舉知州一人二月己亥富弼除守司空兼侍中初以集禧觀使召弼赴闕弼既辭不受上乃罷集禧之命以左僕射兼門下侍郎平章事庚子王安石㕘知政事先是安石見上論天下事上曰人皆以為卿但知經術不可以經世務安石對曰經術者所以經世務也果不足以經世務則經術何賴焉上曰卿所施設以何為先安石曰變風俗立法度最方今所急也凡欲美風俗在長君子消小人以禮義亷恥由君子出故也上以為然丙午翰林學士司馬光登對乞一州上不許曰君子小人皆知卿方正吕公著使契丹亦問有司馬光者其人甚方正今為何官名為夷狄所知奈何出外光初罷御史中丞遼因問公著以光何不為中丞公著歸告于上故上乃知甲子命知樞密院陳升之㕘知政事王安石取索三司應干條例文字看詳具合行事件聞奏别為司名曰同制置三司條例先是安石言泉府一官先王所以摧制兼并均濟貧弱變通天下之財而使則出於一綂者以有此也安石因請以吕惠卿為制置司檢詳文字從之富弼以足疾未能入見有於上前言災異皆天數非人事得失所致者弼聞之歎曰人君所畏惟天若不畏天何事不可為者去亂亡無幾矣此必姦臣欲進邪説故先導上以無所畏使輔拂諫爭之臣無所復施吾不可以不速救即上疏數千言雜引春秋洪範及古今傳記人情物理以明其決不然者胡安國春秋傳序曰春秋非五經比也洚水警予與鳳皇來儀並載于虞書大木斯拔與嘉禾合頴同垂於周史春秋不書祥瑞而盡書災異史外傳心之要典也自安石建議以春秋為腐爛朝報經筵不以進讀科目不以取士馴至崇觀之間姦臣用事一卉一木之異指為嘉瑞天地災變隠而不言是與春秋正相反也胡氏之論葢攻安石學術之亂天下也三月上既用富弼為首相弼猶以足疾在告是日弼始入見曰臣聞中外之事漸有更張此必有小人獻説於陛下也大抵小人惟喜動作生事則其間有所希冀縁朝政守靜則事有常法小人何所望也上改容聽納曰今日得卿至論乃沃朕心可謂金石之言朕不忘也癸未蘇轍為制置三司條例司檢詳文字先是轍奏疏曰所謂豐財者非求財而益之也去事之所以害財者而已事之害財者三一曰冗吏二曰冗兵三曰冗費疏奏上批付中書因召對而有是命兩府同奏事富弼言大臣須和乃能成務又言今所進用或是刻薄小才小才雖似可喜然害事壊風俗為甚恐須進用醇厚敦實之人上曰大臣正要與朝廷分邪正邪正分則天下自治壬辰上問安石制置條例如何安石曰已檢討文字畧見倫緒然今欲理財則須使能天下但見朝廷以使能為先而不以任賢為急但見朝廷以理財為務而於禮義教化之際未有所及恐風俗壊不勝其弊陛下當深念國體有先後緩急上頷之夏四月丁酉朔羣臣上尊號詔答不允先是上謂執政曰受與否於人情孰安王安石曰受與不受於理皆可也陛下能深見受與不受無加損之理則此事皆陛下自擇上曰三尺童子亦知無加損也知諫院錢公輔罷知諫院時上委任政府責以太平一日執政召臺諫官至都堂富弼曰上求治如饑渴正賴同心以濟所願公輔對曰所為是邪天下誰敢不同非邪公輔雖欲同之不可得已丙午同天節罷上壽是日雨富弼言願陛下未以今日雨澤為喜當以累年災變為懼葢修德致雨其應如此萬一於德有損其災應豈有緩邪上親書詔答曰敢不置之枕席銘諸肺腑終老是戒更願公不替今日之志則天災不難弭大平可俟也丁未㕘知政事唐介卒上初欲用王安石為㕘知政事曽公亮因薦之介曰安石好學而泥古論議迂濶若使為政恐多所變更必擾天下退至中書謂公亮等曰異日安石之言果用天下必困擾諸公當自知之耳時執政進除目上久之不決既數日乃曰朕問王安石以為然可即施行介曰陛下比擇大臣付以天下之事臣近每聞陛下宣諭某事問安石以為可即施行某事問安石以為不可未得施行如此則執政何所用必以臣為不才當先罷免此語傳之天下恐非信任體也安石既執政奏言中書處分事用劄子皆言奉聖㫖不中理者常十八九不若令中書自出牒不必稱聖㫖上愕然介曰太宗時寇準用劄子遷馮拯等官不當拯訢之太宗曰前代中書有堂牒指揮事乃權臣假此以威福天下太祖朝趙普為相堂帖重於敕命尋令削去今復置劄子何異堂牒今安石不欲稱聖㫖則是政不自天子出也上曰太宗制置此事極當及安石議謀殺人傷者許首介數與安石爭論於上前安石强辯上主其語介不勝憤悶居頃之疽發背而卒丙辰詔宜令侍從官自今視朕過失與朝廷事之闕無有巨細各具章極言無𨼆噫言善而不用朕有厥咎道之而弗言爾為不恭王安石之詞也五月癸未鄭獬知杭州王拱辰判應天府錢公輔知江寧府獬與滕甫相善王安石素惡之故事兩制差除必宰相當筆時富弼在告曽公亮出使西京王安石遽自當筆議者皆疑安石行其私意御史中丞吕誨即奏曰王拱辰不聞有過遷謫出外鄭獬在三班院皆稱公當權府亦甚平允遽然補外錢公輔先因營救滕甫遂罷諫院今又被逐葢甫與王安石素所不足今無罪被黜甚傷公議上出誨奏示執政安石曰此三人者出臣但愧不能盡理論情暴其罪狀使小人知有所憚不意言者乃更如此吕中曰安石入朝之初即勸人主逐諫官其本意如此故臺諫未有直罷者自安石始上罷吳申復以吳申例罷公輔自是人不附已者始擠之矣癸已樞密院言欲檢尋本院諸文書凡闗祖宗以來法制所宜施於逺者並刪取大㫖編次成冊仍於逐門各留空紙以備書載將來處置事從之賜名經武要畧是月丙戌王安石以吕誨劾章乞辭位上即封還其奏令視事如故上又謂安石曰吕誨言卿每事好為異多作横議或要内批以自質證又詐妄希㑹朕意朕與卿相知如髙宗傳説亦豈須他人為助羣臣準詔議學校貢舉多欲變改舊法獨殿中丞直史館判官告院蘇軾奏曰得人之道在於知人知人之法在於責實使君相有知人之才朝廷有責實之政則胥吏皂𨽻未嘗無人而况於學校貢舉乎雖因今之法臣以為有餘使君相無知人之才朝廷無責實之政則公卿侍從常患無人况學校貢舉乎雖復古之制臣以為不足上得軾議喜曰吾固疑此得蘇軾議釋然矣即召見問何以助朕軾對曰陛下求治太急聽言太廣進人太銳願陛下安靜以待物之來然後應之上悚然聽受曰卿三言朕當詳思之吕惠卿最為安石所賢屢薦于上事無大小必與之謀時人號安石為孔子惠卿為顔子上曰欲用蘇軾修中書條例安石曰軾與臣所學及議論皆異别試以事可也考課院言準詔定到考較知縣縣令課法分為上中下三等内有績狀尤異出於上等之外則定為優等如政事昏繆出於下等之下者即定為劣等六月丁巳詔吕誨落中丞以本官知鄧州前此誨上疏曰臣竊以大姦似忠大詐似信唯其用捨係國休戚如少正卯之才言偽而堅順非而澤强記而博非大聖孰能去之臣謹按王安石外示朴野中藏巧詐驕蹇慢上隂賊害物今畧疏十事誠恐陛下悦其才辯久而倚毗情偽不得知邪正無復辨大姦得路羣隂彚進則賢者漸去亂由是生臣究安石之迹固無逺畧唯務改作立異於人徒文言而飾非將罔上而欺下臣竊憂之誤天下蒼生必斯人也疏奏安石亦求去位上詔視事宜如故安石既留而誨坐貶太白入井壬戌晝見秋七月乙丑朔司天監言日食辰已間有隂霧遮蔽所食不及元奏分數宰臣富弼等拜表賀行均輸法癸未上謂執政曰人君豈可怠於政理朕非樂於勞苦益思少時精神可惜欲乗時有為以安生靈至於兵乃是聖人之大權所以安天下也但不可輕用非獨殺人心所不忍誠恐天道不祐甲申日下有五色雲上御資政殿因語及選任知州未得善法曰朕每思祖宗百戰得天下今以一州生靈付一庸人常痛心疾首卿等為如何則可彦博奏以責在監司宜得至公之人可任按察公弼曰朝廷當擇諸司長官及十八路監司無不濟矣韓𤦺等新修仁宗實録一部二百卷曽公亮等上英宗實録三十卷八月丙申司馬光上疏曰陛下日出視朝繼以經席入宫之後省閱天下奏事夜御燈火研味經史然孜孜求治于今三年而功業未著者殆未得其體要故也癸卯待御史劉琦監處州鹽酒税御史裏行錢顗監衢州鹽税初御史知雜劉述及𤦺顗等言切見陛下用安石為㕘知政事未踰半年中外人情囂然不安葢以其專肆胷臆輕易憲度而無忌憚之心也司馬光言皮公弼陛下明知其貪閻充國陛下明知其猥二者皆以知縣權發遣三司判官及得罪而出皆為知州今琦顗止以迕犯大臣降監當然則狂直之罪重於貪猥得罪大臣甚於得罪陛下也乞與本資不報丙午詔同修起居注范純仁罷同知諫院初純仁以言薛向不可為發運使或致民心别生事變上曰今令發運使兼制置六路財賦務在均適有無何由乃致百姓人情怨駭純仁曰人主不當言利但當務農桑節用而已純仁又申中書曰㕘政以文學自負議論得君專任已能不曉時事捨堯舜知人安民之道講五伯富國强兵之術尚法令則稱商鞅言財利則背孟軻鄙老成為因循之人棄公論為流俗之語曽相公年髙不退亷節已虧且欲見容惟務雷同茍且趙㕘政心知其非凡事不能力救徒聞退有後言公亮等以純仁狀進乃落起居舍人同修起居注庚戌制置三司條例司檢詳文字蘇轍言每於本司商量公事動皆不合乞除一合入差遣詔依所乞上閲轍狀問轍與軾如何觀其學問頗相類王安石曰軾兄弟大抵以飛箝捭闔為事上曰如此則宜合時事何以反為異論九月詔閤門引編校書籍吕惠卿校勘王存登對皆王安石所善也制置三司條例司言諸路常平廣惠倉畧計千五百萬以上貫石斂散之法未得其宜今欲以見在斛斗遇貴量減市價糶遇賤量増市價糴以見錢依陜西青苗錢例取民情願豫給令隨税納斛斗内有願請本色或納時價貴願納錢者皆許從便欲量諸路錢榖多寡分遣官提舉仍先行於河北京東淮南三路候其有緒即推之諸路從之戊辰初開經筵王安石獨奏事上問曰程顥言不可賣祠部度牒作常平本錢如何安石曰顥所言自以為王道之正臣以為顥所言未達王道之權今度牒所得可置粟凡四十五萬石若凶年人貸三石則可全十五萬人性命賣祠部所剃者三千人頭而所可捄活者十五萬人性命若以為不可是不知權也冬十月丙申左僕射平章事富弼罷為武寧軍節度使同平章事判亳州弼初入相即除司空兼侍中弼固辭得免及罷不復加恩葢上意不樂其去故也弼將去復言于上曰比見親舊乃知人情大不安進用多小人諸處地動災變宜且安靜知樞密院事陳升之為禮部尚書平章事上既許富弼辭位問弼曰卿即去誰可代卿者弼薦文彦博上黙然良久曰王安石何如弼黙然改綏州為綏德城先是韓縝與夏人議許令納安逺塞門二寨還以綏州郭逵曰此正商於之地六百里也時已有詔俾逵焚棄綏州逵曰一州既失二寨不可得中國為夏人所賣安用守臣為藏其詔不出上言綏州宜守且自劾違詔之罪詔褒逵曰淵謀祕畧悉中事機有臣如此朕無西顧之憂矣於是詔城綏州不復以易二寨己亥翰林學士司馬光對上問近相陳升之外議云何光曰閩人狡險楚人輕易今二相皆閩人二㕘政皆楚人必將援引鄉黨之士充塞朝廷天下風俗何以得更淳厚講議曰昔邵康節聞杜鵑聲於天津橋上曰朝廷將用南人為相天下自此多事矣夫王欽若當國亦南人也豈獨自安石始邪葢天禧天聖之時南方之氣未盛所用者欽若一人耳自安石為相所引者惠卿之憸巧升之之輕易宰相㕘政皆用南人此固温公之所慮而康節之所先知也上曰升之有才智曉民政光曰但恐不能臨大節而不可奪耳凡才智之人必得忠直之人從旁制之此明主用人之法也上又曰王安石何如光曰人言安石姦邪則毁之太過但不曉事又執抝耳上曰韓琦敢當事賢於富弼但木强耳光曰琦實有忠於國家之心但好遂非此其所短也上因歴問羣臣至吕惠卿光曰惠卿憸巧非佳士使王安石負謗於中外者皆惠卿所為也上曰惠卿應對明辯亦似美才光曰江充李訓若無才何以能動人主監察御史裏行張戩程顥言每有本職公事欲上殿敷奏必奏候朝㫖既許上殿伺候班次動經旬日臺諫之職言責既均則進見之期理無殊别何獨憲臣隔絶疎異欲乞推原天禧詔書之意使依諫官例牒閤門即許登對或所言急速仍乞先次上殿詔三院御史及裏行有公事並許直申閣上殿十一月司馬光言欲據國史實録所載旁采異聞傚漢書作百官公卿表以備奏御從之乙丑命樞密副使韓絳同制置三司條例初陳升之既拜相遂言臣待罪宰相無所不綂所領職事豈可稱司他日又對升之固以為不可置司上欲使安石獨領安石以為非便曰陛下本置此司令中書密院各差一人今若韓絳同事甚便上曰善故有是命升之深狡多數為小官時與安石相遇淮南安石深器之及安石用事設制置條例司引升之共事升之竭力賛助或時為小異陽若不與安石皆同者安石不覺詐故推升之使先為相升之既登相位於條例司事遂不肯闗預安石固以請升之曰茲事盍歸之三司何必攬取為己任也安石大怒二人於是乎始判蔡延慶孫覺並同修起居注上初欲用蘇軾王安石曰軾豈是可奬之人上曰軾有文學朕見似為人平靜司馬光韓維王存俱稱之安石曰險邪之人臣非苟言之皆有事狀軾遭父喪韓琦等送金帛不受却販數船蘇木入川司馬光言吕惠卿愛錢反言蘇軾平靜斯為厚誣陛下欲變風俗息邪説驟用此人則士何由知陛下好惡所在上乃罷軾不用丙子詔自今諸路同提㸃刑獄復差文臣於是武臣提㸃刑獄盡罷上以武臣罕習吏文多不足以察舉所部人才故悉罷之人甚以為便壬午御邇英閣吕惠卿講先王之法有一嵗一變者則月令季冬飭國典以待來嵗之宜而周禮正月始和布於象魏是也有數嵗一變者則堯舜五載修五禮十二載脩法則是也有一世一變者則刑罰世輕世重是也有數十世而改者則夏貢商助周徹夏校商序周庠之類是也有雖百世不變者尊尊親親貴貴長長尊賢使能是也臣前日見司馬光以為漢惠文景三帝皆守蕭何之法而治武帝改其法而亂宣帝守其法而治元帝改其法而亂臣按何雖約法三章其後乃以為九章則何已不能自守其法矣惠帝除挾書律三族令文帝除誹謗妖言除祕祝法皆蕭何法之所有而惠與文除之景帝又從而因之則非守蕭何之法而治也上召光前謂光曰其言如何光對曰惠卿之言有是有非惠卿言漢惠文武宣元治亂之體是也其言先王之法有一嵗一變五嵗一變一世一變則非也上曰朝廷每更一事舉朝士大夫洶洶皆以為不可又不能指名其不便者果何事也光曰朝廷散青苗錢茲事非便吕惠卿曰光不知此事彼富室為之則害民今縣官為之乃所以利民也光曰昔太宗平河東輕民租税而戍兵益衆命和糴糧草以給之民皆樂與官為市其後人益衆物益貴而轉運司常守舊價或復支移折變至今為膏肓之疾臣恐異日青苗之害亦如河東之和糴也惠卿曰光所言皆吏不得人故為民害耳光曰如惠卿言乃臣前日所謂有治人無治法吳申曰司馬光之言可謂至論閏十一月壬寅張載為崇文殿校書先是吕公著薦載召對問以治道載曰為政不以三代為法者終茍道也條例司奏差官提舉諸路常平廣惠倉兼管勾農田水利差役事從之時天下常平錢榖見在一千四百萬貫石諸路各置提舉條例司又言交子之法用於成都府路人以為便今河東公私苦運鐵錢勞費議行交子之法仍令轉運司舉官置務從之十二月乙亥上問王安石以真宗時邊事安石曰臣按實録當時君臣議論未嘗説到底上下相與皆滅裂而已則何以待夷狄有中㫖下開封府減價買浙燈四千餘枝權推官殿中丞直史館蘇軾言陛下游心經術動法堯舜而豈以燈為悦哉此不過以奉二宫之歡耳且賣燈皆細民安可賤酬其直願亟罷之上納其言軾因奏書獻三言曰願陛下結人心厚風俗存紀綱書凡七千餘言軾素不為王安石所喜使權開封府推官欲以多事困之也而軾決斷精敏聲問益逺論事益不休庚戌熈寧三年春正月詔諸路常平廣惠倉給散青苗錢本為惠恤貧乏今慮官吏不體此意追呼均配抑勒翻成搔擾其令諸路提㸃刑獄官體量覺察違者禁止立以名聞敢沮遏願請者案罰亦如之先是翰林學士范鎮言青苗者唐衰亂之世所為苗青在田賤估其直收斂未畢而必其償是盜跖之法也右正言李常孫覺亦言王廣淵在河北第一等給十五貫第二等十貫第三等五貫第四等一貫五百第五等一貫民間喧然不以為便而廣淵入奏稱民間歡呼鼓舞歌頌聖德言者既交攻之朝廷不得已乃降是詔二月壬戌朔韓𤦺言准轉運及提舉常平廣惠倉司牒給青苗錢更有餘錢坊郭戸有物業抵當願請錢者五家為一甲依青苗例支借臣竊以詔書務在優民不使兼并乗其急以邀倍息皆以為民公家無所利其入今每借一千令納一千三百則是官放息錢與初抑兼并濟困乏之意絶相違戾欲民信服不可得也又鄉村每保須有物力人為甲頭雖云不得抑勒而上户必不願請官吏防下戸不能送納豈免差充甲頭以備代陪陛下勵精求治若但躬行節儉以先天下自然國用不乏何必使興利之言紛紛四出以致逺邇之疑乞盡罷諸路提舉官依常平舊法施行癸亥上親䄂出琦奏示執政曰琦真忠臣朕始謂可以利民不意乃害民如此且坊郭安得青苗而使者亦强與之乎王安石勃然進曰茍從其所欲雖坊郭何害陛下修常平法所以助民至於收息亦周公遺法也陳升之曰但恐州縣避難索之故抑配上户爾安石曰抑配誠恐有之然俟其有嚴行絀責一二人則此弊自絶上終以韓琦所説為疑安石曰直使州縣抑配上户俵十五貫錢又必令出二分息則一户所陪止三貫錢因以廣常平儲蓄以待百姓凶荒則比之前代科百姓出米為義倉未為不善况又不令抑配有何所害上曰要須盡人言料文彦博吕公弼亦以此為不可但腹誹韓琦獨肯來説真忠臣也翌日安石遂稱疾不出丙寅詔大宗正司置丞二員兵部員外郎傅堯俞同判流内銓堯俞始除喪至京師安石數召之既見語及新法安石謂堯俞曰方今紛紛遲君來久矣將以寶文閣待制同知諫院還君堯俞謝曰新法世不以為便誠然當力論之平生未嘗欺敢以實告安石不悦遂有此命王安石既稱疾家居翰林學士司馬光再為批答曰今士夫沸騰黎民騷動乃欲委還事任退取便安卿之私謀固為無憾朕之所望將以委誰安石大怒即抗章自辯上封還其章手札諭安石曰詔中二語失於詳閲今覽之甚愧安石固請罷上固留之奬慰良久翰林學士司馬光為樞密副使辛巳司馬光言臣先曽上疏言不當設制置三司條例司又言散青苗錢不便臣竊聞先帝嘗出内藏一百萬緡助天下常平倉作糴本錢前日天下常平倉錢榖共及一千餘萬貫石今無故盡散之他日若思常平之法復欲收聚何時得及此數乎臣以為散青苗錢之害猶小而壊常平法之害尤大也十年之外富室既盡常平已壊帑藏又空不幸有方二三千里之水旱加以四夷侵犯邊境當是之時民之羸者不轉死溝壑壯者不聚為盜賊將何之矣陛下誠能昭然覺悟采納臣言罷制置三司及追還使者臣雖盡納官爵但得為太平之民以終餘年其幸多矣壬午安石始出視事安石之在告也上諭執政罷青苗法曽公亮陳升之欲即奉詔趙抃獨欲俟安石出令自罷之安石既視事持之益堅人言不能入矣司馬光謁告之六日上復趣令入見光言臣近上疏未聞采錄獨以何心敢當髙位若臣言果是乞早賜施行若臣言果非乞更不差使臣宣召早收還樞密副使勅告庚寅詔收還樞密副使告勅先是上欲置光西府王安石曰光雖好為異論然其才豈能害政但如光者異論之人倚以為重今擢在髙位則是為異論之人立赤􅀈也光朝夕所與切磋琢磨者乃劉攽劉恕蘇軾蘇轍之徒而已觀近臣以其所主所主者如此其人可知也安石在告上乃用光及安石復視事因固辭遂欲罷之三月甲午司馬光移書王安石請罷條例司及常平使者安石得書大慙欲怒則不敢答書但言道不同而已書凡三返文多不載條例司奏專疏駁韓𤦺所言皆王安石自為之既而琦又言今䝉制置司以臣所言皆為不當臣詳疏駁事件多刪去臣元奏要切之語曲為沮難及引周禮國服為息之説文其謬妄將使無復敢言其非者須再辨列欲望親覽羣臣言常平章疏上怒悉以付安石安石復于上曰章疏惟韓琦有可辨餘人絶不近理不足辨也上然之范鎮言自古以來未有天子而開課場者王安石曰鎮所言若非陛下畧見周禮天子有此則豈得不為媿恥上又諭安石令稍修改常平法以合衆論安石曰陛下方以道勝流俗與戰無異今少自却即坐為流俗所勝矣己亥御集英殿策試禮部奏名進士有曰聖人之王天下也百官得其職萬事得其序有所不為為之而無不成有所不革革之而無不服田疇闢溝洫治富足以備禮和足以廣樂治足以致刑方今之政救之之道必有本末所施之宜必有先後王安石之辭也上遣劉有方諭司馬光以依舊供職是日光入對曰臣自知無力於朝廷朝廷所行皆與臣言相反上曰相反者何事也光曰臣言條例司不當置又言不宜多遣使者外撓監司又言散青苗錢害民豈非相反上曰言者皆云法非不善但所遣非其人耳光曰以臣觀之法亦不善所遣亦非其人也上曰元勅不令抑勒光曰勅雖不令抑勒而所遣使者皆諷令抑配如開封府界十七縣惟陳留姜潛張勅榜縣門及四門聽民自來請自給之率無一人來請以此觀之十六縣恐皆不免於抑勒也上敦諭再三光再拜固辭上曰當更思之范鎮罷知通進銀臺司初司馬光辭樞密使上許之鎮封還詔書曰臣所陳大抵與光相類而光追還新命則臣亦合加罪責上令再送鎮行下鎮又封還曰陛下自除光為樞密副使士大夫交口相慶稱為得人至於坊市細民莫不歡喜今一旦追還誥勅非惟詔命反汗實恐沮光讜論忠計上不許以詔書直付光不復由銀臺司行下鎮言由臣不才使陛下廢法有司失職遂乞解銀臺司許之壬子御集英殿賜進士明經諸科葉祖洽以下及第出身同出身總八百二十九人祖洽策言祖宗多因循茍簡之政陛下即位革而新之李大臨蘇軾編排上官均第一祖洽第二陸佃第五上令宰相陳升之面讀均等策以祖洽為第一安石既得政每賛上以獨斷上專信任之軾發策云晉武平吳以獨斷而克苻堅伐晉以獨斷而亡齊桓專任管仲而霸燕噲專任子之而滅事同功異何也安石見之不悦上諭王安石曰聞有三不足之説否王安石曰不聞上曰陳薦言外人云今朝廷以為天變不足懼人言不足恤祖宗之法不足守安石曰陛下躬親庶政唯恐傷民此即是懼天變陛下詢納人言無小大唯是之從豈是不恤人言然人言固有不足恤者茍當於義理則人言何足恤至於祖宗之法不足守則固當如此且仁宗在位四十年凡數次修敕若法一定子孫當世世守之則祖宗何故屢自變改今議者以為祖宗之法皆可守然祖宗用人皆不以次今陛下試如此則彼異論者必更紛紛夏四月詔御史中丞吕公著比大臣之抗章因便坐使之對乃誣方鎮有除惡之謀深駭予聞乖事理之實可翰林侍讀學士知潁州司馬光記所聞於趙抃曰上諭執政以吕公著上殿言朝廷摧沮韓琦太甚將興晉陽之甲以除君側之惡王安石怨公著叛已請明著罪狀光又云公著素謹初無此對或謂孫覺嘗為上言今藩鎮大臣如此論列而遭挫辱若唐末五代之際必有興晉陽之甲以除君側之惡者矣上誤記以為公著也己卯㕘知政事趙抃為資政殿學士知杭州樞密副使韓絳間與王安石同奏條例司事嘗賛上曰臣見王安石所陳非一皆至當之論可用陛下宜深省察故安石尤德之前秀州軍事判官李定權監察御史裏行定初至謁李常常問南方之民以青苗為如何定言皆便之無不善常謂曰今朝廷方爭此君見人切勿為此言也定即日詣安石白其事曰定惟知據實而言不知京師不得言青苗之便也安石喜甚密薦于上上欲用定知諫院曽公亮陳升之固爭之乃改命焉吕中曰百官除授自執政以下皆付大臣進擬而中丞諫官必出于人主之親擢所以公其選也自安石執政以京官王子韶除御史又以選人李定除諫官則臺諫皆出于宰相之除矣權監察御史裏行程顥權發遣京西路同提㸃刑獄顥先上疏言臣聞天下之理本諸簡易而行之以順道則事無不成捨而之於險阻則不足以言智矣况於措置沮廢公議一二小臣實與大計用賤陵貴以邪妨正者乎凡此皆天下之理不宜有成而智者之所不行也興利之臣日進尚德之風寖衰尤非朝廷之福臣奉職不肖論議無補望允前奏早賜降責故罷淮南轉運使謝景温為工部郎中兼侍御史知雜事景温雅善安石又與安石弟安國通姻先是安石獨對問上曰陛下知今日所以紛紛否上曰此由朕置臺諫非其人安石曰陛下遇羣臣無術數失事機别置臺諫官恐但如今日措置亦未能免其紛紛也於是專用景温上批監察御史張戩王子韶並落職知縣戩屢言青苗不便最後上疏乞罷制置司及諸路使者并言王安石專為聚斂好勝遂非吕惠卿險薄姦凶尚留君側既上疏又詣中書力爭辭氣甚厲公亮俛首不答安石以扇掩面而笑戩怒曰㕘政笑戩戩亦笑㕘政㕘政所為豈但戩笑天下誰不笑者陳升之解曰察院不須如此戩顧曰只相公得為無過耶退即家居待罪遂與子韶同黜甲申翰林學士司馬光讀資治通鑑上曰舜堲讒説殄行若臺諫為讒安得不黜光曰臣因進讀及之耳時事臣不敢衆論也及退上留光謂曰吕公著言藩鎮欲興晉陽之甲豈非讒説殄行光曰公著平居與儕輩言猶三思而發何故上前輕發乃爾外人多疑其不然上曰王安石不好官職及自奉養可謂賢者光曰安石誠賢但性不曉事而愎此其短也又不當信任吕惠卿惠卿姦邪而為安石謀主安石為之力行故天下并指安石為姦邪也上曰今天下洶洶者孫叔敖所謂國之有是衆之所惡也光曰然陛下當察其是非然後守之今條例司所為獨安石韓絳吕惠卿以為是天下皆以為非也陛下豈能獨與此三人共為天下耶司馬光讀資治通鑑張釋之論嗇夫利口光曰孔子稱惡利口之覆邦家夫利口何至覆邦家葢其人能以是為非以非為是以賢為不肖以不肖為賢人主茍以是為非以非為是以賢為不肖以不肖為賢則邦家之覆誠不難矣時吕惠卿在坐光所論專指惠卿也五月甲辰詔近設制置三司條例司本以均通天下財利今大端已舉惟在悉力應接以趣成效其罷歸中書先是文彦博等皆請罷制置條例司上謂彦博曰俟羣言稍息當罷之不欲亟罷恐傷王安石意故也詔歐陽脩不合不奏聽朝廷指揮擅止散青苗錢特放罪脩在青州嘗奏疏條陳三事中書言脩擅止給青苗錢欲特㫖問罪王安石論脩殊不識藩鎮體乃降是詔先是上復欲用脩執政安石曰脩見事多乖理好有文華人安石葢指蘇軾輩而上已黙喻壬子詔罷入閣儀王珪等言入閣者乃唐隻日紫宸殿受常朝之儀也非為盛禮不可遵行故罷之六月壬戌駕部郎中朱壽昌者巽之子也其母劉氏嫁民問壽昌行四方訪求不獲飲食罕御酒肉與人言輒流涕以浮屠法灼臂燒頂刺血寫佛書冀遂其志又棄官入秦與家人訣不見母不復還行次同州得之劉氏時年已七十餘矣永興錢明逸表其孝節癸亥詔壽昌赴闕朝見先是言者共攻李定不服母喪王安石力主定因忌壽昌壽昌前已再典郡於是折資通判河中府宗正寺言每嵗正月一日裝寫仙源積慶圖宗藩慶緒録各一本供送龍圖天章寶文閣令祖宗非袒免親更不賜名授官一依外官之法合與不合修入圖冊詔送禮院詳定禮官言親疏異則恩禮不得不異世系同則圖籍不得不同二者並行而不相悖親親之義備矣所有祖宗非袒免親欲乞依舊修寫入仙源積慶圖宗藩慶緒録其在外者委宗正寺逐年取索附籍從之翰林學士司馬光乞差前知龍水縣范祖禹同脩資治通鑑許之祖禹鎮從孫也秋七月卒卯詔新判太原府歐陽脩罷宣徽南院使知蔡州先是脩以病辭宣徽使至五六因論青苗法又移書責王安石安石不答而奏從其請壬辰樞密使吕公弼罷為吏部侍郎知太原府權御史中丞馮京為樞密副使癸巳賜祕書省正字唐坰出身初坰為北京監當官上書言青苗不行宜斬大臣異議者一二人王安石謂坰宜在館閣故得召對八月乙丑司馬光對垂拱殿乞知許州或西京留司御史臺國子監上曰卿何得出外朕欲申卿前命卿且受之光曰臣舊職且不能供况當進用上曰王安石素與卿善何自疑光曰臣素與安石善但自其執政違迕甚多今迕安石者如蘇軾輩皆毁其素履中以危法臣不敢避削黜但欲茍全素履臣善安石豈如吕公著安石初舉公著云何後毁之云何彼一人之身何前是而後非必有不信者矣上又曰青苗已有顯效光曰茲事天下知其非獨安石之黨以為是爾上曰蘇軾非佳士卿誤知之鮮于侁在逺軾以奏藁傳之韓琦贈銀三百兩而不受乃販鹽及蘇木磁器光曰凡察人當察其情軾販鬻之利豈能及所贈之銀乎安石素惡軾陛下豈不知以姻家謝景温為鷹犬使攻之臣豈能自保不可不去也且軾雖不佳豈不賢於李定不服母喪禽獸之不如安石喜之乃欲用為臺官九月戊子朔中書言請置檢正中書五房公事一員每房各置檢正公事二員並以朝官充乙未㕘知政事韓絳為陜西路安撫使先是絳奏以夏人寇慶州陜西用兵請出使王安石曰臣於邊事未嘗更歴宜往上卒遣絳曽布同判司農寺布尋奏改助役為免役吕惠卿大恨之己亥命崔台符曽布朱温其考試法官試法官自此始庚子左僕射平章事曽公亮為集禧觀使公亮初薦王安石可大用及同執政知上方向安石隂助之而外若不與同者安石以其助已深德之蘇軾嘗從容責公亮不能救正朝廷公亮曰上與安石如一人此乃天也馮京㕘知政事吳充為右諫議大夫樞密副使乙巳御崇政殿策賢良方正又策試武舉人壬子太白晝見手詔制科調字號卷大抵意尚流俗而毁薄時政援證先王之經而輒失義理恐不足收録以惑天下之觀聽而調字號乃孔文仲試卷也於是文仲竟坐黜司馬光知永興言青苗助役為陜西之患上曰助役唯行京東兩浙耳雇人充役越州已行矣冬十月鄧綰為集賢校理檢正中書孔目房公事綰故名維清累遷寧州通判上書言陛下得伊吕之佐作青苗免役錢等法百姓無不歌舞聖澤臣以所見寧州觀之知一路一路觀之見天下皆然此誠不世之良法願陛下堅守行之勿移於浮議也又與王安石書及頌安石大喜白於上使乗驛詣闕又累詔趣之比至召對上問識王安石否曰不識上曰今之古人也又問識吕惠卿否曰不識上曰今之賢人也綰退見安石欣然如舊交綰自至京師不敢與鄉人相見鄉人皆笑罵綰曰笑罵從汝好官我須為之尋又命綰兼編修中書户房條例十一月丁未客星出婁十二月詔知杭州趙抃知青州抃至青州京東旱蝗蝗將及境遇風退飛墮水而盡青無害開封府判官祠部郎中趙瞻知鄧州瞻因出使得奏事上問曰卿為監司久乃知青苗法便也瞻對曰青苗法唐行之於季世擾攘中掊民財誠便今陛下欲為長久計愛百姓誠不便王安石隂使其黨俞充誘瞻曰當以知雜御史奉待瞻不應由是不得留京師乙丑中書言司農寺定畿縣保甲條例凡十家為一保選主户一人為保長五十家為一大保選主戸物産最髙者一人為大保長十大保為一都保乃選主户有行止材勇為衆所伏者二人為都副保正凡選一家兩丁以上通主客為之謂之保丁除禁兵器外其餘弓箭等許從便自置習學武藝每二大保逐夜輪差五人於保分内往來巡警遇有賊盜晝時聲鼓報大保長以下同保人戸即時救應追捕如賊入别保遞相擊鼓應接襲逐㕘知政事王安石為禮部侍郎平章事王珪守本官㕘知政事辛亥熈寧四年春正月壬辰詔鬻天下廣惠倉田為三路及京東常平本其當賑濟即以廣惠常平等倉所貯粟麥給之二月丁巳朔中書言古之取士皆本於學校今欲追復古制宜先除去聲病偶對之文使學者得以專意經義以俟朝廷興建學校然後講求三代所以教育選舉之法施於天下以明經及諸科欲行廢罷取元解明經人數増解進士今定貢舉新制進士罷詩賦貼經墨義各占治詩書易周禮禮記一經兼以論語孟子每試四場初本經次兼經並大義十道務通義理不須盡用注疏次時務策三道禮部五道中書撰大義式頒行殿試策一道限千字以上分五等第一等二等賜及第第三等出身第四等同出身第五等同學究出身從之知永興軍司馬光知許州光在永興宣撫司請増修城壁光奏罷之又請添屯軍馬於長安河中邠州光言嵗凶乞罷添屯不許又奏乞災傷地分所欠青苗錢許重疊倚閣仍牒所部八州軍未得依司農寺指揮催理詔提舉司催理如司農寺指揮不得施行光牒光知言不用遂乞判西京留守司御史臺不報又上章曰臣之不才最出羣臣之下先見不如吕誨公直不如范純仁程顥敢言不如蘇軾孔文仲勇決不如范鎮伏望陛下聖恩裁處其罪若臣罪與范鎮同即乞依范鎮例致仕若罪重於鎮或竄或誅所不敢逃詔光移知許州光固請留臺久之乃從其請光自是絶口不復論新法甲子曽布檢正五房公事布每事白王安石即行之或謂布當白兩㕘政指馮京及王珪也布曰丞相已議定何問彼為俟敕出令押字耳三月丁亥夔州路轉運使孫構張詵言杜安行等討四夷賊斥地七百里獲鎧甲器仗詔遣著作佐郎章惇乗驛同轉運司制置以聞先是李承之薦惇於安石安石曰聞惇極無行承之曰顧惇才可用耳公誠與語自當愛之安石見惇惇素辯又善迎合安石大喜恨得之晩戊子上召二府出陜西轉運司奏慶州軍亂示之上深以用兵為憂文彦博曰朝廷施為務合人心凡事當兼采衆論不宜有所偏聽陛下厲精求治而人情未安葢更張之過也祖宗法制未必皆不可行但有廢墜不舉之處耳馮京曰府界溉淤田又修差役作保甲人極勞弊上曰詢訪隣近百姓皆以免役為喜葢雖令出錢而復其身役無追呼刑責之虞人自情願故也彦博又言祖宗法制具在不須更張以失人心上曰更張法制於士大夫誠多不悦然於百姓何所不便彦博曰為與士大夫治天下非與百姓治天下也安石曰法制具在則財用宜足中國宜强今皆不然未可謂之法制具在也彦博曰務要人推行耳庚寅詔諸路置學官州給田十頃為學糧仍置小學教授條例司言欲令諸路轉運司具屬州煩劇縣分主户二萬以上増置丞一員從之戊戌上批陳留縣見行保甲非朝廷本意今如此搔擾可速指揮令止如元議團保覺察賊盜餘無得妄施行鄉民既憂無錢買弓箭加之傳惑恐徙戍邊是以有父子聚首號泣者非虚也王安石進呈不行丁未平章事韓絳罷相以本官知鄧州上與王安石論保甲事以為誠有斬指者安石曰陜西河東未嘗致變則人情可知豈有怕為義勇即造反之理上曰民合而言之則聖亦不可不畏自上制法以使之雖拂其情然亦當便於民乃可國是論曰保甲一事民怨彰灼雖禁民越訢捕人匿名而民之斬趾求免匿牓伸寃其達於聖聰軫於聖慮安石不能掩其怨流俗讒説之論至是不能入矣遂謂人主當為天之所為任理而無情又托之祁寒暑雨以為説則其辭支離窮遁益不足以欺聖聰此保甲之事所以論辨數萬言而上終疑之歟葢其所謂弊法不足守人言不足聽者上猶信而不疑此可欺以方者也其所謂天命不足畏民怨不足恤者上終疑而不信此難罔以非其道者也至熈寧再相其私意偽論寖已彰露復以祁寒暑雨為言而上毅然拒之曰豈若并祁寒暑雨之怨而無之邪大哉王言至是聖德日新邪説不可復入安石去而終身不再召矣夏四月丁卯鄧綰言知汝州事富弼責䝉城官吏散常平錢榖妄追縣吏重笞之又遣人持小札下諸縣令未得依提舉司牒施行本州簽判管勾官徐公衮以書諭諸縣使勿奉行詔令乞盡理根治詔送亳州推勘院其富弼止令案後收坐以聞富弼言臣凡三奏乞獨坐臣重責特賜矜貸其餘官吏臣今且説青苗一事天下之人不論賢不肖皆知為害愈久愈深今來本州不散青苗錢斛並是臣獨見情願當嚴譴雖死無悔其餘徐公衮以下州縣官吏即望聖慈察其情理别無深切特與矜恕甲戌試將作監主簿常秩為右正言管勾國子監初秩不肯仕宦及王安石更定法令士大夫沸騰以為不便秩見所下詔書獨以為是被召遂起及對垂拱殿上問秩先朝累有除命何以不起秩言先帝容臣辭免故臣得以久安里巷今陛下迫臣不許稽遲詔㫖是以不敢不來上嘉之太常博士李寔檢正中書禮房公事劉摯並為監察御史裏行五月丙戌提舉崇福宫吕誨致仕誨言臣本無宿疾偶值醫者用術乖方殊不知脉候有虚實隂陽有逆順診察有標本治療有後先妄投湯劑率情任意差之指下禍延四支寖成風痺遂艱行歩非秖憚􅏓戾之苦又將虞心腹之變葢以身疾喻朝政也誨病亟手書屬司馬光為墓銘光往省之至則目且瞑光呼曰更有以見屬乎誨張目强視曰天下事尚可為君實勉之遂卒楊繪言東明等縣百姓千百人詣開封府訴超升等第出助役錢事本府不受遂突入王安石私第安石諭云此事相府不知仍問汝等來知縣知否皆言不知又詣御史臺臣以本臺無例收接訴狀諭令散去退而訪問乃司農寺不依諸縣元定户等却以見管户口量第均定出役錢數付諸縣各令管認别造簿籍前農務而畢臣竊謂凡等第升降葢視人家産髙下乃得其實今乃自司農寺先畫數令本縣依數定簿豈得民無爭訴哉今判司農寺乃鄧綰曽布一為知雜一為都檢正非臣言之誰敢言者王安石指陳繪言為不然上諾之六月戊午劉摯言今天下有二人之論有安常習故樂於無事之論有變古更法喜於敢為之論臣嘗求二者之意葢皆有所是亦皆有所非樂於無事者以謂守祖宗成法以致於治此其所得也至昧者則茍簡怠墮便私膠習而不知變通之權此其所失也喜有為者以謂法濫道窮不大變化則不足以通物而成務此其所是也至鑿者則作為聰明棄理任智輕肆獨用强民以從事此其所非也此以彼為亂常彼以此為流俗臣謂此風不可寖長東漢黨錮有唐朋黨之事葢始於斯後摯嘗面對上問從學王安石耶安石稱卿器識摯曰臣東北人少孤獨學不識安石甲子知蔡州歐陽脩為太子少師觀文殿學士致仕脩以老病數上章乞骸骨馮京固請留之上曰脩頃知青州殊不嘉安石曰如此人與一州則壊一州留在朝廷則附流俗壊朝廷必令留之何所用上以為然楊繪言今舊臣告歸或屏于外者悉未老范鎮年六十三吕誨五十八歐陽脩六十五而致仕富弼六十八而被劾引疾司馬光王陶皆五十而求閒散陛下可不思其故邪甲戌富弼落使相以左僕射判汝州永城等七縣徐公衮等十八人皆衝替坐不行新法置獄劾治而有是命弼赴汝州仍以老病昏塞凡新法文字乞免簽書止令通判以下施行秋七月同判司農寺曽布言言事官屢以近日所議差役新法不便考其所陳皆失利害之實非今日所以更張之意陛下方有大有為之心固將舉直錯枉以示天下而左右耳目之士以利為害以曲為直以是為非以有為無臣恐有傷陛下之明而害陛下之政也王安石以布所言進呈上問如何安石曰欲劄與繪摯令分析遂以布所言劄與繪摯令分析以聞御史中丞楊繪具録前後論助役法四奏以自辨御史劉摯又言臣近曽上言論助役之法其害有十陛下以臣言為是邪則事盡於前奏可以覆視陛下以臣言為非邪則貶黜之而已雖使臣言之亦不過所謂十害者是以不復條陳又曰以陛下之夙夜厲精而天下未至於安治者誰致之邪陛下即位以來注意責成倚以望太平而自以太平為己任得君專政者是也二三年間開闔動摇舉天地之内無一民一物得安其所者葢自青苗之議起而天下始有聚斂之疑青苗之議未允而均輸之法行均輸之法方擾而邊鄙之謀動邊鄙之禍未艾而漳河之役作漳河之害未平而助役之事興其間又求水利也則勞民而無功又淤田也則費大而不效又省併州縣也則諸路莫不强民以應令又起東西府也則大困財力禁門之側斧斤不絶者將一年而未巳其議財也則商估市井屠販之人皆召而登政事堂其征利也則下至於厯日而官自鬻之推此而往不可究言祖宗累朝之舊臣則䥴刻鄙棄去者殆盡百年之成法則剗除廢革存者無幾去舊臣則勢位無軋已者而權可保也去舊法則曰今所以制御天下者是己之所為陛下必將久任以聽其伸縮也於是詔繪落翰林學士御史中丞為翰林侍讀學士摯落館閣校勘監察御史裏行監衡州鹽倉後兩日以繪知鄭州八月己卯前旌德縣尉王雱為太子中允崇政殿説書雱安石子也為人剽悍無所顧忌安石與弟安國白首窮經雱從旁剽聞習熟而下筆貫穿未冠已著書數十萬言年十三時得秦州卒言洮河事歎曰此可撫而有也故安石力主王韶議雱作策三十餘篇極論天下事皆安石輔政所施行有以雱書聞者於是安石方奉祠上遽召見而有是命安石亦喜雱得親近能助已因不復辭九月辛卯大享明堂以英宗配大赦天下庚子夏國王秉常遣使入貢表乞綏州城願依舊約詔答曰所言綏州前已降詔更不令夏國交割塞門安逺二寨綏州更不給還今復何議俟定界畢别進誓表回頒誓詔恩賜如舊冬十月頒募役法戊辰中書言近制増廣太學益置生員除主判官外直講以十員為額每二員共講一經委中書選差或主判官奏舉其生員分三等以初入學生員為外舍不限員自外舍升内舍内舍升上舍上舍以百員内舍以二百員為限壬申前武昌節度推官王安國為崇文院校書安國常非其兄安石所為為西京國子監教授溺於聲色安石以書戒之曰宜放鄭聲安國復書曰安國亦願兄逺佞人也官滿至京師上以安石故召對問安石秉政外論謂何對曰但恨聚斂太急知人不明耳上黙然不悦安國嘗力諫安石以天下洶洶不樂新法皆歸咎於兄恐為家禍安石不聽安國哭於影堂曰吾家滅門矣又嘗責曽布以誤惑丞相更變法令布曰足下人之子弟朝廷變法何預足下事安國勃然怒曰丞相吾兄也丞相之父即吾父也丞相由汝之故殺身破家僇及先人發掘丘壠豈得不預我耶講義曰安石之學尚不能同其弟况使天下同已乎雱以父之道光於仲尼安石以子之賢為崇政講説書子聖其父父賢其子而謂他人皆為流俗宜哉十一月甲申詔蠲天下見欠貸糧總計米一百六十六萬八千五百石有竒錢十一萬七千四百緡有竒百姓聞詔莫不稱慶壬申劉䝉知湖陽縣初行免役法使者召諸令㑹議䝉獨以為不便不肯議退而條上利害即投劾去宋史全文卷十一
