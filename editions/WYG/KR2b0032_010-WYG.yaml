body:
  text: 宋史全文卷十宋英宗甲辰治平元年春正月景靈宫使宋庠屢請老上曰朕初嗣位何可遽休大臣戊申命庠知亳州辛酉詔以仁宗配享明堂初禮院奏乞與兩制同議仁宗當配何祭翰林學士王珪等議請循周公嚴父之道以仁宗配享明堂知制誥錢公輔議太祖則周之后稷配祭于郊者也太宗則周之文王配祭于明堂者也真宗則周之武王也雖有配天之功而無配天之祭未聞成王以嚴父之故廢文王而移于武王也仁宗則周之成王也雖有配天之業而亦無配天之祭亦未聞康王以嚴父之故廢文王而移于成王也當仁宗嗣位之初儻有建是論者則配天之祭常在乎太祖太宗矣又詔臺諌及講讀官與兩制禮院再詳定以聞御史中丞王疇言配考之文見于易嚴父之義著于經聖法章明咸足稽按臣請依王珪等議奉仁宗皇帝配享明堂知諌院司馬光吕誨議竊以孝子之心誰不欲尊其父者聖人制禮以為之極不敢踰也孝經曰嚴父莫大于配天周公其人也孔子以周公有聖人之徳成太平之業制禮作樂而文王適其父也故引之以證聖人之徳莫大于孝答曾子之問而已非謂凡有天下者皆當以其父配天然後為孝也翰林侍讀學士孫抃等奏仁宗繼體保成置天下于大安者四十二年功徳于人可謂極矣今祔廟之始遂抑而不得配上帝之享非所以宣章陛下為後嚴父之大孝詔從抃等議三月司馬光言臣聞陛下昔在藩邸事濮王承順顔色備盡孝道凡宫中之事濮王皆委陛下幹之無不平允陛下事皇太后當一如濮王然後可視天下之政當一如宫中之事然後可況濮王之親以恩皇太后之親以義其奉養之謹非特有所加則無以取信也宫中之事小天下之事大其聴斷之勤非特有所加則無以致治也吕誨言陛下孝養之禮臣不得而知之安親之道誠有未至何則累聖成業靡思經緝邦國大事都無裁處獻納之言盡決簾帷之下是陛下自處休佚而置聖后煩勞得謂之孝乎又言于皇太后曰皇帝躬親治事勤勵如此在于聖慮應已慰安臣愚以謂東殿簾帷宜五七日一御夏四月司馬光言前代帝王升遐之後宫下陳者盡放之出宫所以遂物情重人世省浮費逺嫌疑也癸未放宫人三百二十五人甲申御邇英閣上諭内侍曰方日永講讀官乆侍對未食必勞倦自今視事畢不俟進食即御經筵故事講讀畢拜而退上命母拜後遂以為常五月上既康復韓琦乆欲太后罷東殿垂簾嘗一日取十餘事併以稟上上裁決如流悉皆允當于是詣東殿覆奏上所裁決十餘事太后每事稱善琦遂白太后求退太后曰相公安可求退老身合居深宫却每日在此甚非得已琦即稱前代如馬鄧之賢不免貪戀權勢今太后便能復辟誠馬鄧之所不及未審決取何日撤簾太后遽起琦即厲聲命鸞儀司撤簾簾既落猶于御屏後見太后衣也吕中曰當國家危疑之日大臣以能任事者一曰徳望二曰才智有才智而無徳望以鎮之則未足以服天下之心有徳望而無才智以充之則未足以辦天下之事故曰可以託六尺之孤可以寄百里之命臨大節而不可奪君子人也韓魏公不動聲色垂紳搢笏而措天下于太山之安者葢自慶祐嘉祐之時可屬大事重厚如勃其徳望服人心乆矣至于處事應變動中事機胷中才智又足以運用天下此其所以正英宗之始歟在真宗之初則有吕端在仁宗之初則有王曽其皆安國家定社稷之名臣歟辛亥上問執政積弊甚衆何以裁救富弼對曰恐須以漸釐改又問寛治如何吳奎對曰聖人治人固以寛然不可以無節書曰寛而有制從容以和癸亥宰臣韓琦等奏請下有司議濮安懿王合行典禮詳處其當以時施行詔須大祥後議之閏五月巳丑召樞宻直學士知瀛州唐介為右諌議大夫權御史中丞上面諭介曰卿在先朝有直聲今出自朕選非由左右言也韓琦言羣臣邪正皆陛下所知至于進退實係天下利害惟陛下以此為先不可不察也上然之六月己亥進封皇子淮陽郡王頊為穎王増置宗室學官講書四員教授五員小學教授十二員并舊六員為二十七員以分教之丁未増置同知大宗正事一員初宗室坐序爵仍自為賔主講官位主席之東隅于是睦親宅都講吳申不肯坐且曰宗室當以親族尊卑為序與講官分賔主再移書大宗正不能決因内朝出申二書上是之宗室正講席自申始作睦親廣親北宅于芳林園知太原府陳升之言母老請揚湖越一州庶便奉養上以邉臣當乆任難于屢易不許上謂宰臣曰程戡何如人對曰戡在鄜延巳三嵗習邉事上曰延州都監髙遵教卒戡數言其能績乞加贈䘏此髙瓊族子朕知其為庸人也戡必以后族故爾大臣茍若此朕何所賴焉戊午淮陽郡王府翊善王陶為穎王府翊善淮陽郡王府記室參軍韓維為諸王府記室參軍侍講孫思恭為諸王府侍講穎王性謙虚眷禮宫僚遇維尤厚一日侍王坐近侍以弓様靴進維進曰王安用舞靴王亟令毁去上始疾甚時出語頗傷太后維等極諌曰上已失太后歡心王盡孝恭以彌縫尤懼不逮不然父子俱受禍矣王感悟他日太后謂輔臣曰皇子近日殊有禮皆卿等善擇宫僚所致秋八月丙辰入内都都知任守忠蘄州安置初上為皇子令守忠宣召避不肯行及上即位遂交鬭兩宫間司馬光吕誨交章劾之帝納其言翌日遂絀守忠丁巳以上供米三萬石賑宿亳州水灾飢民九月丁夘詔復置武舉初有詔以是日開邇英閣至重陽節當罷侍講吕公著司馬光言先帝時無事常開講筵願不惜頃刻之間日御講筵從之冬十一月乙亥命屯田郎中徐億職方員外郎李師錫屯田員外郎錢公紀刺陜西諸州軍百姓為義勇初宰相韓琦奏三代漢唐以來皆籍民為兵唐置府兵最為近古今之義勇河北幾十五萬河東幾八萬勇悍純實若稍加簡練亦唐之府兵也河北河東陜西三路當西北控禦之地事當一體今若于陜西諸州亦㸃義勇止刺手背則又知不復刺面可無驚駭詔從之乃命億等往除商虢二州不籍餘悉籍義勇凡主戸家三丁選一六丁選二九丁選三年二十至五十材勇者充嵗以十月畨上閲教一月而罷得十五萬六千八百七十三人於是知諌院司馬光奏曰今議者但怪陜西獨無義勇不知陜西之民三丁巳有一丁充保捷矣若更聞此詔下必大致驚擾又奏古者兵出民間耕桑之所得皆以衣食其家今既賦歛農民之粟帛以贍正軍又籍農民之身以為兵是一家獨任二家之事也以臣愚見河北河東已刺之民猶當放遣況陜西未刺之民乎終弗聴光又六奏及申中書自劾求去亦終不許嘗至中書與韓琦辯琦謂光曰君但見慶厯間陜西鄉兵初刺手背後皆刺面充正軍憂今復然爾今已降勅榜與民約永不充軍戌邉矣光曰雖光亦未免疑也琦曰吾在此君無憂此語之不信光曰光終不敢奉信非獨不敢但恐相公亦不能自信爾琦怒曰君何相輕甚耶光曰相公長在此可也萬一均逸偃藩他人在此因相公見成之兵遣使運粮戍邉反掌間耳琦黙然竟不為止其後十年義勇運粮戍邉率以為常矣吕中曰慶厯之時詔刺陜西義勇方平曰不可韓公曰可治平之時詔刺陜西義勇温公曰不可韓公曰可夫以祖宗之至仁大臣之盡忠而籍民為兵猶莫之免良以費省而用足也然弓手之刺率皆市人不可用而宣毅驕甚所至為冦何韓公之慮不及張公邪義勇之刺其後運粮戍邉率以為常何韓公之慮不及司馬公邪曰張公司馬公之慮誠是矣而韓公唐亦未可深貶也石壕之詩公葢誦之乆矣彼誠見漢調發之弊故欲收拾強悍者養以為兵則良民可以保其相聚之樂公之慮及此又安得以一時之見盡非之哉講義曰刺義勇有議温公曰陜西之民已刺保㨗既歛農民之粟帛以贍軍又籍農民之身以為兵運粮戍邉恐重為民害韓公又曰唐置府兵最為近古今之義勇即唐府兵收拾強悍以養為兵則良民可以保相聚之樂非求異也亦同以國事為念耳屯田員外郎知襄邑縣范純仁為江東轉運判官襄邑有牧地衛士縱馬暴民田純仁取一人杖之牧地初不𨽻縣有詔劾純仁純仁言兵須農以養䘏兵當先恤農朝廷是之釋不問且聴牧地𨽻縣自純仁始純仁仲淹子也十二月丙午翰林學士王疇為樞宻副使上嘗謂輔臣曰疇善文章歐陽修曰其人亦勁正但不為赫赫之名爾一旦晩御小殿召疇草詔因從容談中外事語移時上喜曰卿清直好學朕知之乆矣非今日也不數日遂有是命知制誥錢公輔封還詞頭言疇望輕資淺在臺素餐不可大用上以初政除兩府而公輔沮格制命不行丁未責授滁州團練副使不簽書本州事内侍省押班王昭明為環慶路駐泊兵馬鈐轄供備庫副使李若愚為涇原路鈐轄令體量蕃情治其訴訟公事及有賞罰則與其帥議而大事即以聞各許嵗乘驛奏事後數日又以西京左藏庫副使梁寔領秦鳳内殿承制韓則順領鄜延諌官吕誨言自唐以來舉兵不利未有不自于監軍者我朝因循未革奈何又増置此員如走馬承受官品至卑一路亦不勝其害況今鈐轄寄重其實已均安撫使之權矣欲乞朝廷罷之御史傅堯俞趙瞻皆有論列訖不從集賢校理宋敏求直集賢院韓維同修起居注初修起居注缺中書進敏求及集賢校理楊繪上問修起居注選何等人中書對近例以制科進士髙等與館職有才望者繪第二人進士今以次當補上曰修起居注即知制誥豈以次補乃命易繪丁巳三司修造案勾當公事張徽權發遣戸部判官事知東明縣皮公弼權發遣度支判官事近嵗三司官以次遷而任不乆凡天下財利盈虚出入雖能者居之未及究本末而已用次遷他職故相習以養資假途為説而不事其職至是中書奏請擇其尤繁要者五員用資淺人乆任今命徽等用新制也乙巳治平二年春正月辛巳賜許蔡州見錢鈔十萬貫令和糴以救飢民壬午命供備庫副使孟淵等十九人往開封府界及京東西淮南路募兵司馬光言邉臣之請兵無窮朝廷之募兵無已倉庫之束帛有限百姓之膏血有涯願陛下斷自聖志罷招禁軍但選擇將帥訓練舊有之兵以備禦四夷不患不足辛丑權發遣戸部副使吕公著言今京畿諸縣及京東西淮南州軍類多饑饉民有餓莩凡力役之事皆宜權罷從之三司使給事中蔡襄知杭州初上自濮邸立為皇子皇太后垂簾外人稍稍言襄嘗有異議上數問襄如何人一日因其請朝假變色謂中書曰三司掌天下錢穀事務煩多而襄十日之中在假者四五何不别用人琦等初尚剖解上意不回至是因表請罷琦遂質于上上曰内中不見文字然在慶寧即已聞之琦曰事出曖昧若虚實未明乞更審察曽公亮曰京師後來喜造謗議衆人傳之便以為實歐陽修曰疑似之謗不惟無迹可尋就令迹狀分明猶須更辨真偽上曰造謗者因何不及他人遂命襄出守工部侍郎吕公弼權三司使至和初公弼為三司使帝在藩邸嘗得賜馬不善求易之公弼不許至是奏事畢上曰朕往在宫中卿不欲與朕易馬是時朕固已知卿也公弼頓首謝又曰卿繼蔡襄為使襄訴訟不以時決頗多留事公弼知上不悦襄對曰襄勤于事未嘗有慢失恐言者妄爾上益以公弼為長者賜貢院奏合格進士明經諸科彭汝礪等三百六十一人及第出身翰林學士賈黯對天下未嘗乏人顧所用如何爾退而上五事一知人之明二養育以漸三才不求備四以類薦舉五擇取自代三月辛未新除侍御史知雜事吕誨以嘗言中丞賈黯過失辭職黯奏曰諌官御史本人主耳目一時公言非有嫌怨且誨為人方正謹厚臣得與之共事必能叶濟詔以諭誨誨遂受命因言朝廷之事臺諌官不得預聞及其政令行下方始得知比正其所失則曰已行之命難以追改是執政之臣常自取勝耳目之官與不設同矣又聞近日臣僚建議以先帝臨政信任臺諌官所陳已行之事多有追奪欲陛下矯先帝之為凡事堅執不可易行一繆令進一匪人倡言于外曰出自清衷人必不敢動摇果有之是欲窒塞聖聰恐非廟社之福也夏四月戊戌詔禮官及待制以上議崇奉濮安懿王典禮以聞宰臣韓琦等以元年五月奏進呈故也辛丑詔向命監司知州薦所部吏嵗限定員本防其濫不問能否一切取足非詔意也自今務在得人不必充所限之數五月資政殿學士陳旭為樞宻副使丙子權御史中丞賈黯奏近者皇子封拜並除檢校太傅臣按太師太傅太保是為三師太尉司徒司空是為三公今皇子以師傅名官于義弗安臣愚以為自今皇子及宗室卑者除官並不可帶師傅改授三公詔可六月辛夘江東轉運判官范純仁為殿中侍御史權發遣鹽鐵判官吕大防為監察御史裏行近制御史有缺則命翰林學士御史中丞知雜事迭舉二人而自上擇取一人為之至是缺兩員舉者未上内出純仁大防名而命之講義曰此即仁宗言臺諌必由中㫖詔毋以輔臣所薦充臺諌之意也葢諌臣乃人主之耳目出于宰相之進擬則為宰相之鷹犬今也皆由内出其名以命之而非出于左右之所舉此治平臺諌之權所以重也此治平臺諌之爭所以激也初議崇奉濮安懿王典禮宜準先朝封贈期親尊屬故事髙官大國極其尊榮考之今古實為宜稱王珪等議濮王于仁宗為兄于皇帝宜稱皇伯而不名己酉中書又奏漢宣帝光武皆稱其父為皇考今王珪等議稱皇伯于典禮未見明據太后聞之辛亥内出手書切責韓琦等以不當議稱皇考甲寅詔曰如聞集議議論不一宜權罷議當令有司博求典故務合禮經以聞翰林學士范鎮時判太常寺即率禮官上言陛下既考仁宗又考濮安懿王則其失非特漢宣光武之比矣因具列儀禮及漢儒論議魏明帝詔為五篇奏之臺官自中丞賈黯以下各有奏乞從王珪等議奏皆留中不行司馬光又言王珪等二十餘人皆以為宜準先朝封贈期親尊屬故事凡兩次㑹議無一人異辭而政府之意獨欲尊濮王為皇考巧飾詞説誤惑聖聴政府言儀禮本文五服年月敕皆云為人後者為其父母即出繼之子于本生皆稱父母臣案禮法必須指事立文使人曉解今欲言為人後者為其父母之服若不謂之父母不知如何立文此乃政府欺罔天下之人謂其皆不識文理也又言漢宣帝光武皆稱其父為皇考臣案宣帝承昭帝之後以孫繼祖故尊其父為皇考而不敢尊其祖為祖考以其與昭穆同故也光武起布衣誅王莽以得天下名為中興其實創業雖自立七廟猶非太過況但稱皇考其謙損甚矣今陛下親為仁宗之子以承大業若復尊濮王為皇考則置仁宗于何地乎秋七月樞宻使富弼累上章以疾求罷至二十餘上固欲留之不可癸亥罷為鎮海節度使同平章事判河陽戊寅觀文殿大學士賈昌朝卒御篆墓碑曰大儒元老之碑昌朝在侍從為名臣及執政不為善人所與或以為結宫人宦官數為諌官御史所攻庚辰淮南節度使兼侍中文彦博為樞宻使初彦博自河南入覲上謂曰朕在此位公之力也備聞始議公于朕葢有恩者彦博遜避不敢當樞宻使張昪判許州先是韓琦曽公亮欲遷歐陽修為樞宻使將進擬不以告修修覺其意謂兩人曰今天子諒隂母后垂簾而二三大臣自相位置何以示天下兩人服其言遽止及張昪去位上遂欲用修修又力辭不拜辛巳權三司使吕公弼為樞宻副使權知開封府韓絳權三司使請以川陜四路田穀輸常平倉而隨其事任道里差次給直以平物價上歎曰衆方姑息卿能獨不狥時耶詔行之内諸司吏有干恩澤者絳執不可上曰朕初不知當為卿改而干者不已絳執益多因為上言即有飛語願得究治上曰朕在藩邸頗聞有司以國事為人情卿所守固善其毋憚讒宫中所用財費悉以合同憑由取之絳請有例者悉付有司于是三司始得㑹計八月庚寅大雨辛夘地涌水壊官私廬舍漂殺人民畜産不可勝數乙未詔中外臣僚並許上實封言時政闕失及當世利害執政大臣其協徳交修以輔不逮初學士草詔曰執政大臣其惕思天變上書其後曰滛雨為灾専以戒朕不徳故更曰恊徳交修司馬光上疏曰陛下即位以來灾異甚衆日有黒子淮江之水或溢或涸去夏霖雨涉秋不止京畿東南十有餘州廬舍沈于深淵浮苴棲于木末老弱流離捐瘠道路許潁之間積尸成丘既而歴冬無雪暖氣如春草木早榮繼以黒風今夏疫癘大作彌數十里至秋幸而豐熟未及收穫而暴雨大至一苗半穗蕩無一遺都城之内道路乘桴官府民居覆沒殆盡死于壓溺者不可勝紀陛下安得不側身恐懼思其所以致此之咎乎當陛下初得疾之時外間傳言皇太后于先帝梓宫之前為陛下叩頭祈請額為之傷豈可謂無慈愛之心不幸為讒賊之人交相離間遂使兩宫之情介然有隙就使皇太后有不慈于陛下陛下為人之子安可遂生忿恨乎先帝擢陛下于衆人之中升為天子唯以一后數公主屬于陛下而梓宫在殯已失皇太后之歡心長公主數人皆屏居閒宫此陛下所以失人心之始也陛下益事謙遜深自晦匿凡百奏請不肯與奪知人之賢不能舉知人不肖不能去知事之非不能改知事之是不能從或非才而驟進或有罪而見寛此天下所以重失望也國家置臺諌之官為天子耳目防大臣壅蔽陛下當自察其是非今乃復付之大臣彼安肯以己之所行為非而以他人所言為是乎此乃陛下所以獨取拒諌之名而大臣坐得専權之利者也吕大防言雨水為患此隂勝陽之沴也即陳八事曰主恩不立臣權太盛邪議干正私恩害公夷狄連謀盜賊恣行羣情失職刑罰失平知制誥鄭獬時知荆南上疏曰陛下詔求忠言將欲用之邪將欲因灾異舉故事而藻飾之邪茍欲藻飾之則固無可議者必欲用之則宜選官専掌羣臣所上章疏許兩府及近臣畨休更直從容講貫其可者則熟究而行之不可則罷之有疑焉則廣詢而後決之羣言得而衆事舉此應天之實也知制誥宋敏求韓維同修撰仁宗實録九月辛酉編纂禮書成百卷詔以太常因革禮為名司馬光言竊見陛下將有事于南郊羣臣循襲故事請上尊號屬者暴雨為灾五稼漂没陛下正宜深自抑損伏乞拒而勿受吕誨亦言陛下思所以應變之實洪名盛美抑而弗居望宣諭輔弼所上第五表批答宜丁寧訓告以斷封章上嘉納之己巳䇿制舉人又䇿武舉人甲戌以制科入等著作佐郎范百禄為秘書丞前和川縣令李清臣為著作佐郎百禄所對䇿言五行傳曰簡宗廟廢祭祀則水不潤下臣愚請因濮安懿王建國為之立長以為嗣王世世奉祀安懿王永為一國太祖則神靈享于禮義人心悦而天意解矣清臣安陽人歐陽修竒其文以為似蘇軾及試秘閣試文至中書未發也修迎語曰考官不置清臣第一則繆矣發視果第一時同發䇿者四人或謂清臣當以五行傳對所問灾變當復得第一清臣曰此漢儒説清臣不能知民間得無疾痛不樂可上者乎因言天地之大譬之于人腹心肺腑有所攻塞則五官不寧民人生聚天地之腹心肺腑也日月辰宿天地之五官也善止天地之異者不止其異止民之疾痛不樂者而已清臣竟在次等冬十月吕誨言臺諌者人主之耳目天聖景祐間三院御史常有二十員而後益衰減葢執政者不欲主上聞中外之缺失然猶不下十數員今御史臺缺中丞御史五員差出者三人封章十上報罷者八九諌官二員司馬光遷領他職傅堯俞出使契丹諍臣近同廢置自古言務壅塞未如今日之甚也十一月壬申祀天地于圜丘以太祖配大赦丙午治平三年春正月壬申知制誥范鎮知陳州初鎮草韓琦遷官制稱引周公霍光諌官吕誨駁之于是琦表求去位鎮批答曰周公不之魯欲天下之一乎周上以鎮不當引聖人比宰相欲罷鎮内職執政因諭鎮令自請外而有是命或曰鎮與歐陽修雅相善及議濮王追崇事首忤修意修乘間為上言鎮以周公待琦則是以孺子待陛下也鎮坐此出上于制誥多親閲有不中理必使改之嘗謂執政曰此人君謨訓豈可褒貶失實也癸酉契丹改國號曰大遼辛巳知徐州張方平為翰林學士承㫖上嘗問治道體要方平以簡易誠明為對上不覺前席曰朕昔奉朝請望侍從大臣以謂皆天下選人今而不然聞學士之言始知有人矣翰林學士馮京修撰仁宗實録侍御史知雜事吕誨前後十一奏乞依王珪等議早定濮安懿王追崇典禮皆不報乞免臺職又不報是月壬戌即與侍御史范純仁監察御史裏行吕大防合奏歐陽修首開邪議妄引經據欲累濮王以不正之號將陷陛下于過舉之譏韓𤦺飾非𫝊㑹曽公亮趙槩茍且依違伏請下修于理及正琦等之罪戊辰又奏修博識古今精習文史明知師丹之議為正董宏之説為邪利誘其衷神奪其鑒今不正濮王之禮則無以慰衆心不罪首惡之臣則無以清朝政誨等論列不已而中書亦以劄子自辯于上願陛下霈然下詔明告中外以皇伯無稽決不可稱而今所欲定者正名號爾庶幾羣疑可釋上意不能不向中書然未即下詔也執政乃相與宻議欲令皇太后下手書尊濮安懿王為皇夫人為后皇帝稱親誨等因激納御史告敕居家待罪乞早賜黜責上以御寳封告敕遣内侍陳守清趣誨等令赴臺供職誨等以所言不用雖受告勅猶居家待罪吕中曰人之言曰濮邸有議當以稱親為非稱伯為是愚謂稱親固非矣稱伯亦未安也程子曰為人後者謂其所後者為父母而謂其所生者為伯叔父母此天地之大義生人之大倫不可得而廢易也然所生之義至尊至太雖當専意于正統豈得盡絶于私恩是以先王制禮既降其服以正統緒然不以正統之親疎而皆為齊衰朞以别之則所以明其至重而與諸伯叔不同也觀程子之言則歐陽修稱親之義其失禮固已甚矣而稱伯者又不能推其所生之至恩以明尊崇之正禮乃欲奉以髙官大爵但如朞親尊屬故事則亦非至當之論也要當揆量事體别立殊稱若稱曰皇伯父某國大王而使其子孫襲爵奉祀則于大統无嫌疑之失而在所生亦極尊崇之道矣純仁又獨奏皇太后自撤簾之後未嘗預聞朝政豈當復降詔令有所建置葢是政府臣寮茍欲遂非掩過且三代未嘗有母后詔令施于朝廷者秦漢以來母后方預少主之政自此權臣欲為非常之事則必假母后之詔令以行其志伏望陛下深察臣言追寢前詔凡係濮王典禮陛下自可采擇公議而行何必用母后之命施于長君之朝也韓琦見純仁奏謂同列曰琦與希文恩如兄弟視純仁如子姪乃忍如此相攻乎壬午詔罷尚書省集議濮安懿王典禮中書進呈吕誨等所申奏狀上問執政當如何韓𤦺對曰臣等忠邪陛下所知歐陽修曰御史以為理難並立若以臣等為有罪即當留御史若以臣等為無罪則取聖㫖上猶豫乆之乃令出御史既而曰不宜責之太重也誨罷侍御史知雜事知蘄州純仁以侍御史通判安州大防落監察御史裏行知休寧縣二月乙酉朔白虹貫日殿中丞蘇軾直史館上在藩邸聞軾名欲以唐故事召入翰林便授知制誥韓琦曰蘇軾逺大之器也在朝廷培養之使天下之士畏慕降服今驟用之適足累之也且近例當召試上曰未知其能否故試如軾有不能邪琦言不可乃試而命之他日歐陽修具以告軾軾曰韓公所以待軾之意乃古所謂君子愛人以徳者也三月己未彗星晨見于東壁長七尺許辛酉起居舍人同知諌院傅堯俞侍御史趙鼎趙瞻自契丹使歸以嘗與吕誨言濮王事家居待罪而堯俞辭新除侍御史知雜事告牒不受稽首上前曰臣初建言在誨前今誨等逐而臣獨進不敢就職上數諭留堯俞等堯俞等終求去乃以堯俞知和州鼎通判淄州瞻通判汾州司馬光言陛下至公初無過厚于私親之意今忽聞傅堯俞等三人相繼皆出中外之人無不驚愕此葢政府欲閉塞來者使皆不敢言然後得専秉大權逞其胷臆伏望陛下特發宸斷召見堯俞等下詔更不稱親不從光又奏臣與傅堯俞等七人同為臺諌官共論典禮今堯俞等六人盡巳外補獨臣一人尚留闕下伏望聖慈依臣前奏早賜降黜凡四奏卒不從辛巳彗昏見于昴如太白長丈有五尺壬午孛于畢如月夏四月辛丑命龍圖閣直學士兼侍講司馬光編歴代君臣事迹于是光奏曰紀傳之體文字繁多竊不自揆嘗欲上自戰國下至五代正史之外旁采他書凡關國家之盛衰生民之休戚善可為法惡可為戒帝王所宜知者略依左氏春秋傳體為編年一書名曰通志其書上下貫穿千餘載固非愚臣所能獨修伏見翁源縣令劉恕將作監主簿趙君錫皆有史學欲望特差二人與臣同修詔從之其後君錫父喪不赴命太常博士劉攽代之司空致仕宋庠卒庠自初執政遇事輙分别是非可否用是斥退及再登用遂浮沈自安然天資忠厚嘗曰逆詐恃明殘人矜才吾終身弗為也殿前都虞侯郭逵同簽書樞宻院事同簽書自逵始于是知制誥邵必言逵武力之士不可置廟堂弗聴或以咎韓琦琦曰故事西府當用一武臣上欲命李端愿吾知端愿傾邪故以逵當之或曰上本意欲用張方平琦知方平不附已猥曰西府乆不用武臣矣宜稍復故事上督其人無以應乃遽用逵知諌院邵亢御史呉申吕景交章論逵黠佞小才豈堪大用不報五月詔在京文臣知雜御史以上武臣觀察使以上毎嵗舉幕職州縣官充京朝官二人今後並罷是月彗行至張而没彗之未没也言者多以為憂或告韓琦琦曰借使復有一星出欲何為乎六月辛夘太常博士劉庠為監察御史裏行庠私議濮王事與執政意合故命以言職贈太常禮院編纂禮書蘇洵光禄寺丞初王安石名始盛黨友傾一時歐陽修亦善之勸洵與安石游而安石亦願交于洵洵曰吾知其人矣安石母死士大夫皆弔洵獨不往作辨姦一篇畧曰今有人口誦孔老之言身履夷齊之行收召好名之士不得志之人相與造作言語私立名字以為顔淵孟軻復出而隂賊險狠與人異趣是王衍盧杞合而為一人也其禍可勝言哉夫面垢不忘洗衣垢不忘澣此人之至情也今也不然衣夷虜之衣食犬彘之食囚首喪面而談詩書此豈其情也哉使斯人而不用也則吾之言為過而斯人有不遇之歎孰知禍之至于此哉不然天下將被其禍而吾獲知言之名悲夫洵既沒三年而安石用事其言乃信張方平嘗論洵曰定天下之臧否一人而已吕中曰司馬温公嘗嘆先見不如吕獻可然獻可疏安石于參政之時不若吳奎唐介已見于熙寧初召之日吳奎唐介見于熙寧又不若蘇老泉見于嘉祐也然安石之心不惟諸公知之仁祖先知之矣葢安石之法可以用之一縣而不可行之天下安石之才可以備侍從獻納之選而不可以為參政宰相者也壬子改清居殿曰欽明召直集賢院王廣淵書洪範于屏謂廣淵曰先帝臨御四十年天下承平得以無為朕方屬大事豈敢自逸故改此殿名因訪廣淵先儒論洪範得失廣淵對以張景所得最深遂進景論七篇明日復召對延和殿謂廣淵曰景以三徳為馭臣之柄尤為善論朕遇臣下常務謙柔聴納之間則自以剛斷此屏置之坐右豈特無逸之戒也秋七月甲寅屯田員外郎吳申為殿中侍御史自傳卞議濮王事稱㫖劉庠及申私論與卞恊故相繼並居言職八月己亥龍圖閣直學士吕公著知蔡州公著嘗言濮安懿王不當稱親又請追還吕誨等皆不從即稱疾求補外官家居者百餘日上遣内侍敦諭又數令公著兄公弼勸之公著起就職才數月復上章請出而有是命九月皇城司嘗捕銷金衣送開封府推官竇卞上殿請其獄㑹有以内庭為言者上疑之卞曰真宗禁銷金自掖庭始上曰然文王刑于寡妻至于兄弟以御于家邦正謂此爾詔卒如卞請是月夏國主諒祚舉兵冦大順城又冦柔逺寨諒祚中流矢遁去鄜延經畧安撫使陸詵言朝廷積習姑息故虜敢狂悖不稍加詰責則國威不立即止其嵗賜銀帛牒宏州問故而諒祚果大沮乃報言邉吏擅興兵行且誅之冬十月丁亥詔今禮部三嵗一貢舉進士以三百人為額明經諸科不得過進士之數同簽書樞宻院事郭逵為陜西四路㳂邉宣撫使兼權判渭州自吕餘慶以參知政事權知成都府其後見任執政無守藩者至逵始以同簽書樞宻院事出鎮甲午詔宰臣參知政事舉才行士可試館職者五人先是上謂中書曰水潦為灾言事者多云不進賢何也歐陽修曰近年進賢之路太狹上曰如何修曰往時入三館有三路今塞其二矣上曰何謂三路修曰進士髙科一路也大臣薦舉一路也因差遣例除一路也往時進士五人以上及第者皆得試館職第一人及第有不十年即至輔相者今第一人兩任方得試而第二人以下無復得試是髙科一路塞矣往時大臣薦舉之即召試今止令上簿候館閣缺人與試是薦舉一路又塞矣唯有因差遣例除者半是年勞老病之人此臣所謂進賢路太狹也上嘉納之故有是詔于是韓琦曽公亮歐陽修趙槩等所舉蔡延慶夏倚凡二十人上皆令召試十一月戊午上不豫至十二月先是上乆服藥一日宰相韓琦等問起居退潁王出寢門憂形于色顧琦曰奈何琦曰願大王朝夕勿離上左右王曰此乃人子之職琦曰非為此也王感悟去上自得疾不能語凡處分事皆筆于紙辛丑上疾増劇琦復奏曰陛下乆不視朝中外憂惶宜早立皇太子以安衆心上頷之琦請上親筆指揮上乃書立大大王為皇太子琦曰必潁王也煩聖躬更親書之上又批于後曰潁王頊琦即召學士草制承㫖張方平至榻前稟命上憑几出數語方平不能辨因請進筆上書來日降制立某為皇太子十字所書名不甚明方平又進筆請之上再書潁王二字又書大大王三字方平退而草制上既用輔臣議立皇太子因泫然下淚文彦博退謂韓琦曰見上顔色否人生至此雖父子間亦不能無動也丁未治平四年春正月庚戌朔大風霾丁巳上崩于福寧殿神宗即位二月龍圖閣直學士韓維陳三事其末又曰天下大事不可猝為人君施設自有先後惟加意謹重上嘉納焉吕中曰寛仁之主常失之不為剛果之君常過于有為是時安石未召也而維之言及此矣觀仲淹在慶厯之時獨以為事有先後革弊于乆安非朝夕可能況當神宗有鋭然必為之志乎壬辰手詔曰朕嘗侍先帝恭聞徳音以舊制尚帝女者輙皆升行以避舅姑之尊豈可以富貴之故屈人倫長幼之序也可詔有司革之朕恭承遺㫖敢不遵行下中書門下議降詔有司以發揚先帝盛徳于是令陳國長公主行見舅姑之禮王師約更不升行公主行見舅姑之禮自此始三月樞宻直學士禮部郎中王陶為右諌議大夫權御史中丞陶入對便殿上引書咸有一徳諭陶曰朕與卿一心不可轉也問以時事陶請謹聴納明賞罰斥佞人任正士復轉對以通下情省民力以勸農桑先儉素以風天下限年藝以汰冗兵權知貢舉司馬光等上言所考試合格進士許安世以下三百五人分四等明經諸科二百一十一人分三等詔進士第一第二第三等賜及第第四等賜同出身明經諸科第一第二等並賜及第第三等賜同出身勅下貢院放榜壬申參知政事歐陽修為觀文殿學士刑部郎中知毫州初英宗以疾未親政太皇太后垂簾修與二三大臣主國論每簾前奏事或執政聚議事有未同修未嘗不力爭士大夫建明利害及所請前此執政多媕阿不明白是非至修必一二數之曰某事可行某事不可行用是怨誹者益多英宗嘗稱修曰性直不避衆怨修亦嘗誦王曽之言曰恩欲歸巳怨使誰當既出守遂連六表乞致仕不從修年才六十也癸酉樞宻使禮部侍郎吳奎參知政事奎入謝日上嘗語以追尊濮王事與漢宣帝異奎對曰然宣帝大臣所立豈同仁宗能以義立先帝追尊事誠牽私恩上深然之又言此為歐陽修所誤奎對曰韓琦于此事亦失衆心他日奎進言帝王所職惟在别判忠邪自餘庶務各有司存但不使小人得害君子君子常居要近則自治矣閏三月甲申夏國主諒祚遣使來獻方物謝罪詔自今館職試論一首䇿一道庚子詔布告内外文武羣臣若朕知見思慮之所不及至于朝之缺政國之要務邉防戎事之得失郡縣民情之利害各宜直言抗疏以聞無有所𨼆工部郎中知制誥王安石既除喪詔安石赴闕安石屢引疾乞分司上語輔臣曰安石厯先帝一朝召不起或為不恭今召又不起果病耶曽公亮對曰安石文學器業宜膺大用不敢欺罔吳奎曰臣嘗與安石同領羣牧備見其臨事迂闊且䕶局萬一用之必紊亂綱紀公亮熒惑聖聴癸夘詔王安石知江寧府衆謂安石必辭及詔到即詣府視事或曰公亮力薦安石葢欲以傾韓琦也慶厯中嘗詔宰臣賈昌朝凡軍國機務及㳂邉兵馬事知州鈐轄宜同樞宻使陳執中參議自後寢廢至是復之龍圖閣直學士司馬光吕公著並為翰林學士光累奏固辭曰臣不能為四六上曰如兩漢制詔可也光曰本朝故事不可上遣内侍强光受誥光拜而不受詔趣光入謝光入詔以誥置光懐中光不得已乃受它日上問王陶曰公著及光為學士當否陶曰二人者臣嘗論薦矣用人如此天下何憂不治夏四月殿中丞唐淑問為監察御史裏行上諭曰朕以家世用卿卿當謹家法人臣病外交隂附卿宜自結主知比言者尚抉剔細故以為能濁亂人聰明無益也論事必務大體乃為稱職淑問介子也先是詔陜西㳂邉宣撫使郭逵赴闕御史中丞王陶斥逵乃文彦博之走吏范仲淹之弄兒上初許罷逵尋復止之以手札諭陶等曰先朝用逵今遽罷之是先帝有任人之失也朕為人子必不可彰父之過朕寧負暗于知人之責耳辛酉詔内外官所上封事委翰林學士丞㫖張方平學士司馬光詳定利害以聞先是御史臺以狀申中書云檢㑹皇祐編勅常朝日輪宰臣一員押班尋常多據引替官稱宰臣更不過來竊慮上項編勅儀制别有衝替伏乞明降指揮中書不報中丞王陶因以狀白宰相又不報陶遂劾奏韓琦曽公亮不臣至引霍光梁冀専恣等事為諭其略曰忽千官瞻視之庭蔑如房闥艱再拜表儀之禮重若丘山吕中曰有權臣有重臣二者其迹相似其心實異天下之人惡權臣之専重臣亦不容其間夫權臣者天下不可一日有重臣者天下不可一日無徒見其外而不察其中見其皆侵天子之權而不察其所為不類亦過矣國家置臺諌以察政府固所以防權臣然韓琦之在當時乃重臣非權臣也宰相不押班其事乆矣王陶遽劾其専權何哉甲子韓琦曽公亮再上表待罪屢請罷不許遂在告不出上命翰林學士司馬先為御史中丞與王陶兩易其職丁夘光入對曰言職人所憚臣不敢辭但王陶言宰相不押班竟不赴而陶遽罷言職則中丞不可復為臣請俟宰相押班然後受詔上許之時光中丞誥巳進入而陶學士之命中書獨持之不下戊辰參知政事吳奎趙槩堅請絀陶于外上不許請復授羣牧使許之既而上直批送中書以陶為翰林學士時宰相去位奎即具奏曰閏月以來寒暄不節暴風屢作今兹時雨愆亢螟螣孳生過不在他止一王陶而已今乃挾持舊恩排抑端良如韓𤦺曽公亮不押班事葢以久來相承非是始于二臣今若又行内批指揮陶翰林學士乃是由其過惡更獲美遷天下待陛下為何如主哉王陶不黜陛下無以責内外大臣典布四體臣輙違制㫖亦乞必行典刑己巳奎遂稱疾乞罷上封奎劄子以示陶陶復劾奎附宰相欺天子六罪侍御史吳申奏故事御史中丞因言事待罪朝廷降㫖不允或宣召入臺王陶今日上章明日除代未有罷免遄速如此之甚也乞留陶依舊供職并劾奎有無君之心數其五罪上以手札賜知制誥知諌院邵亢趣進入陶學士誥亢遂言御史中丞職在彈劾隂陽不和咎由執政奎所言顛倒庚午上批付中書王陶吳申吳景過毁大臣王陶知陳州吳申吳景各罰銅二十斤吳奎位在執政而彈劾中丞以手詔為内批三日不下除知青州司馬光權御史中丞光復奏外議皆以為奎不當去所以然者葢由奎之名望素重于陶臣愚欲陛下且留奎在政府上不懌先是上封陶疏以示琦琦奏曰臣非跋扈者陛下遣一小黄門至則可縳臣以去矣上為之動辛未公亮入對懇請留奎上許之使復為參知政事奎既復位邵亢更以為言上手札諭亢曰此無他欲起堅卧者耳堅卧者葢指琦也初建東宫英宗命以蔡抗為詹事𤦺固薦陶文彦博私謂琦盍止用抗𤦺不從及𤦺為陶所攻彦博謂𤦺曰頗記除詹事時否琦大愧曰見事之晩真宜受撻癸酉司馬光始受御史中丞誥奏疏曰臣䝉陛下委以風憲敢先以人君修心治國之要為言修心之要有三一曰仁二曰明三曰武治國之要亦有三一曰官人二曰信賞三曰必罰仁宗時臣初為諌官首曽敷奏此語先皇帝時臣曽進歴年圖又以此語載之後序今陛下始初清明之政虚心下問之際臣復以此語為先者誠以臣平生力學所得至精至要盡在于是願陛下勿以為迂闊試加審察五月甲辰屯田員外郎張唐英為殿中侍御史裏行從翰林學士王珪范鎮之薦也英宗初立唐英上謹始書言為人後者謂之子恐他日有引定陶故事公惑聖聴者願杜其漸既而臺諌官相次黜逐珪鎮謂唐英有先見之明故薦之乙巳置寳文閣學士直學士待制以翰林學士吕公著兼寳文閣學士右司郎中邵必為寳文閣直學士先是公著與必同編集仁宗御集藏寳文閣故因授以此職御史吳申言乞自今内外官並令乆任非經三載不得遷移以合堯舜考績之法六月己未遣官于永泰景陽通天安肅四門賑濟河北流民米司馬光言如此處置欲為恤人之名則可矣其實恐有損無益監察御史裏行唐淑問亦以為言乃詔四門給米盡六月止仍曉諭以河北近得雨令歸本貫不願歸者勿強又令河北轉運司約束州縣倍加存恤同知諌院傳卞為寳文閣待制兼侍講龍圖閣直學士趙抃知諌院既見上謂曰卿匹馬入川以一龜一琴自隨為政簡易稱是耶人言抃常獨處室中惟有一龜對之效其服氣故也前此自蜀還者多歴省府官大臣以為言上曰用抃為諌官賴其言爾儻欲大用何必省府乎抃獻疏言任道徳委輔弼别邪正去侈心信號令平賞罰謹機宻備不虞勿數赦容諌諍十事又言吕誨傳堯俞范純仁吕大防趙鼎馬黙皆骨鯁敢言乆譴不復無以慰縉紳之望復論五費謂宫掖宗室官濫兵冗土木之費多見納用辛未詔逐路轉運司遍牒轄下州軍如官吏有知差役利害可以寛減者實封條析以聞先是三司使韓絳言害農之弊無甚差役之法向聞京東有父子二丁將為衙前役者其父告其子云吾當求死使汝曹免凍餒也遂自經死又聞江南有嫁母及與母析居以避役者又有鬻田産于官户者田歸不役之家而役併増于本等户欲望下哀痛之詔令中外臣庶悉具差役利害以聞委侍從臺省官集議使力役無偏重之害役法之議始乎此陜西轉運使薛向言知青澗城种諤招西人朱令陵最為横山得力酋長已給田十頃宅一區乞除一班行使夸示諸羌誘降横山之衆詔増給田五頃向在英宗時嘗獻西陲利害十五篇去冬又上疏陳禦邉五利一曰任將帥以制其衝二曰亟攻伐以罷其敵三曰省戍兵以實其力四曰絶利源以弊其國五曰惜經費以固其本疏奏英宗稱善嘗置諸左右上見而竒之㑹邉臣多言横山族帳可招納者是日召向入對凡向所陳計䇿上皆令勿語兩府自以手詔指揮知汀州周約進桐板二片其木成文有天下太平四字賜奬諭付史館乙亥御史張紀言近嵗以來百司庶務多稟決于中書臣謂政府不當侵有司之職有司亦不當以細務汨政府詔中書樞宻院應細務合歸有司者條析以聞後中書具三十一事樞宻院具六十二事皆歸之有司秋七月戊寅御史張唐英言河北安撫使陳薦乞留知磁州程珦再任夫進能退否使者之職然不加考察則賢否混淆臣願下薦具珦治狀而任之庶不失實中書言薦曽言珦亷勤而刑獄詳平此為實效遂如薦請令珦再任庚辰翰林承㫖張方平等言本朝典禮循唐之舊真宗仁宗皆祀于明堂以配上帝今季秋大享明堂伏請以英宗配詔恭依上初即位内臣以覃恩升朝者皆罷内職獨勾當御藥院髙居簡等四人留如故司馬光疏言居簡性資姦回工讒善佞乆處近職罪惡甚多上曰祔廟畢自當去光曰閨闥小臣何繫山陵先後舜去四㓙不為不忠仁宗貶丁謂不為不孝上從之癸巳髙居簡為供備庫使罷御藥司馬光累劾居簡言與居簡難兩留求外郡請對時光立殿下上指之曰已來矣吕公弼曰陛下欲留居簡必逐光欲留光必逐居簡居簡内臣光中丞願擇其重者光因曰凡左右之臣不須才智但令謹朴小心不為過斯可矣乙未三司檢法官吕惠卿編校集賢院書籍惠卿與王安石雅相好安石薦其才于曽公亮公亮遂舉惠卿館職丙午文州曲水縣令宇文之邵上書之邵為曲水令嵗飢轉運使以輕薄絹髙其賈使縣配賣之邵言縣有戸九千六百而役于公者二千五百可耕之田無幾不可以重困之拂轉運使意及上書不報之邵曰吾不可仕宦乃以太子中允致仕退居十五年卒年五十五司馬光曰吾聞志不行顧禄位如錙銖道不同視富貴如土芥今于之邵見之八月丁未朔太白晝見辛亥司馬光言臣竊聞陛下好令内臣采訪外事及問以羣臣能否臣愚切以為非宜陛下内有兩府兩制臺諌外有提轉牧守皆腹心耳目股肱之臣也陛下誠能精擇其人使之各舉其職則天下之事猶一堂之上陛下何患于不知哉今深處九重之内詢于近習之臣采道聴塗説之言納曲躬附耳之奏不驗虚實即行賞罰臣恐讒邪得以逞其愛憎而陛下為之受其譏謗也初張方平司馬光等受詔詳定内外所上封事既奏上又令中書參議光對延和殿言封事善者在陛下決行之上曰大臣多不欲行光曰陛下詢芻蕘以廣聰明斯乃社稷之福而非大臣之利也上曰如有言無行何光曰然不知言無以知人要面詢仍試以事則真偽自辨矣癸亥詔詳定封事所奏如其中有商量不同或難行者可召詳定官赴中書問難令述利害以進己巳京師地震上謂輔臣曰地震何祥也曽公亮對曰天裂陽不足地震隂有餘上曰誰為隂公亮曰臣者君之隂子者父之隂婦者夫之隂夷狄者中國之隂皆宜戒之吳奎曰但為小人黨盛耳上不懌吕中曰國家自建隆以至治平猶一陽之復而漸進于正陽之月也自熙寧以至靖康猶一隂之姤而漸進于純隂之月也熙寧之初其隂陽升降之㑹歟曽公亮因地震之變而進隂陽之説愚以為小人之隂夷狄之隂皆胚胎于此矣癸酉葬英宗于永厚陵是月判河陽富弼上疏曰帝王都無職事惟别君子小人然千官百職豈盡煩帝王辨之乎但精求任天下之事所謂大臣者不使小人參用于其間則千官百職莫不得人矣陛下勿謂所采既廣便望所得必多其間當防姦詐小人惑亂聖聴姦謀似正詐亂似忠疑似之間不可不早辨也九月乙酉祔英宗神主于太廟廟樂曰大英之舞知制誥知江寧府王安石為翰林學士上嘗謂吳奎曰安石真翰林學士也奎曰安石文行實髙出于人上曰當事如何奎曰恐迂闊上弗信于是卒召用之韓𤦺數因入對懇求罷相辛丑特授琦守司徒兼侍中鎮安武勝軍節度使判相州上諭琦曰侍中必欲去今日已降制矣上遂泣下琦亦感激垂涕稱謝擢𤦺子忠彥秘閣校理端彦為光禄寺丞琦乞令忠彦赴試而命之吕公弼為樞宻使張方平為參知政事方平在翰林上所草詔上手詔褒之曰卿文章典雅煥然有三代之風而又善以多為少意博辭寡雖書訓誥無以加也趙抃為參知政事抃嘗宻奏臣僚有被謗于外始疑而終釋者有詭説于前初惑而卒明者願陛下察其言觀其行敢有挾情論奏懐諼罔上屏之逺方罪在不赦手詔曰卿政事之餘能時以經義啟沃茍非博達治理誠節内固何以臻此指意汎逺罔究所謂藥非瞑眩厥疾弗瘳宜不憚煩悉陳覼縷抃復具奏上嘉納之三司使韓絳權知開封府邵亢並樞宻副使先是薛向种諤言蕃部嵬名山有歸附意壬寅司馬光對延和殿言趙諒祚稱臣奉貢不當誘其叛臣以興邉事上曰此外人妄傳耳光曰陛下知薛向之為人否上曰固非端方士也但以其知錢穀及邉事耳光曰錢穀誠知之邉事則未知也又言張方平文章之外姦邪貪猥上曰有何實狀光曰請言臣所目見者上作色曰朝廷每有除拜衆言輙紛紛非朝廷好事光曰此乃朝廷好事也知人帝堯難之況陛下新即位萬一用一姦邪若臺諌循黙不言陛下從何知之上曰吳奎附宰相否光曰不知也上曰結宰相與結人主孰為賢光曰結宰相為姦邪然希意迎合觀人主趣向而順之者亦姦邪也上曰兩府孰可留孰可用光曰此乃陛下威權所當采擇小臣豈敢與聞然居易以俟命者君子也由逕求進者小人也陛下用人當用君子不當用小人也癸夘司馬光為翰林學士兼侍讀學士滕甫權御史中丞光言臣昨論張方平參知政事不協衆望臣識淺材下其言不足采向者仁宗時包拯最名公直與臺諌官共言方平姦邪貪猥乞盡令檢取言方平章奏及開封府陳升之兩處推勘劉保衡公案即知臣所言非一人私論也所有新命臣未敢祇受光等告敕下通進銀臺司吕公著具奏封駁上手詔諭光曰適得卿奏換卿禁林復兼勸講朕以卿經術行義為世所推今將開延英之席得卿朝夕討論敷陳治道以箴遺缺故命進讀資治通鑑此朕之意吕公著所以封還者葢不知此意耳于是取告勅直付閤門趣光等令受公著亦具奏朝廷既以臣言不當當顯行黜責其所降勅告亦須經由本司葢臣雖可罪而此職終不可廢他日登對上獨留公著謂曰朕以司馬光道徳學問欲常在左右非以其言事也又嘗謂公著曰光方直如迂闊何公著曰孔子上聖子路猶謂之迂孟軻大賢時人亦謂之迂況光豈免此名大抵慮事深逺則近于迂矣願陛下更察之冬十月甲寅司馬光初讀資治通鑑上親製序面賜光令候書成日寫入又賜潁邸舊書二千四百二卷先是种諤奏諒祚累年用兵人心離貳嘗欲發横山族帳盡過興州族帳皆懐土重遷以故首領嵬名山者結綏銀州人數萬共謀歸順庚申入綏州壬戌入銀州嵬名山所部族帳悉降諤尋得罪去權發遣秦州李師中言夏人方入貢徒起釁端無益于事十一月丁丑文彦博等曰諸路帥臣轉運使職任至重一道慘舒係焉所宜審擇其人乆于其任又曰兩府堂陛之重亦當乆任使其下不能傾危乃可立事韓絳曰漢王嘉以為二千石尊重難危乃可使下況堂陛之勢也戊寅詔令御史臺每遇起居日令百僚轉對丙戌手詔曰故事二府初拜各舉所知者三人自今宜各言其人才業所長堪任何事以副朕為官擇人之意韓𤦺判相州上諭以嵬名山事欲令𤦺暫往相州却來永興經撫西邉丙戌改命琦判永興軍兼陜西路經略安撫使賜手札趣令治裝琦即奏曰薛向始議招誘横山一帶蕃族已而种諤擅取綏州環慶李肅之領衆七千破蕩族帳涇原蔡挺又欲合環慶兵直趍興靈帥臣肆意妄作取怨戎狄臣朝夕引道非難但須稟朝廷成算願召二府大臣早決之丁亥詔宜令天下州軍各上所轄縣令治狀優劣其條約令考課院詳定以聞乙未詔令内外兩府兩制文武三司副使武臣正任以上臺諌諸路監司于京朝官使臣幕職州縣官内各舉所知二人見任兩府三人或恥于自媒乆淹下位或偶因㣲累遂廢周行者咸以名聞己亥新知澶州向傅範改知鄆州諌官楊繪言傅範后族不當領安撫使無以杜外戚僥求之源上曰諌官如此言甚善可以止他日妄干請也繪又嘗言宰相不當用其子判鼓院上謂滕甫曰鼓院𫝊達而已何與于事甫曰人有訴宰相者使其子𫝊達可乎且天下見宰相子在是豈敢復訴事上悟為罷之上諭樞宻院曰近有投匭者言知永寧軍魏康用公使錢興販收利因咨嗟乆之曰何以使官盡得人文彦博曰朝廷擇轉運使轉運使檢察州縣吏則庶幾得人也邵亢曰政治之本在于得人若官得人雖無法事亦自舉茍非其人雖法宻無補于事上曰將帥最難得人唐三百年中惟一郭子儀耳又曰漢元好儒而史稱孝元之業衰焉何也亢曰漢元之患在優游不斷不在好儒也十二月丙寅手詔曰獄者民命之所係也比聞有司嵗考天下之奏而瘐死者多其具為令提㸃刑獄嵗終㑹死者之數以聞委中書檢察或死者過多官吏雖已行罰當更黜責是月韓𤦺至長安初薛向賈逵等議欲留綏州詔𤦺度其可棄可守以聞已而西人誘殺楊定等琦即奏賊今若此綏州不可棄也諒祚戰數敗國中饑困將求和而諒祚病死其子秉常嗣立琦因奏當此變故尤非棄州之時樞宻使文彦博吕公弼恥于中變督促棄州如初琦亦條陳不已上遣入内押班王昭明齎手詔訪琦利害𤦺復具奏乃詔綏州如琦議宋史全文卷十
