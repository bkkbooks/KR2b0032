body:
  text: 宋史全文卷十六上宋髙宗一丁未建炎元年即靖康二年上道君皇帝之第九子也母曰賢妃韋氏以大觀元年五月乙巳夜生於宫中紅光照室宣和三年十二月壬子進封康王上博涉經史道君問以古事及應詔制述率常稱㫖嘗侍道君習射於鄆王府上挽弓至一石五斗宣和末金人入㓂淵聖受禪敵騎抵城下遣使請和欲得親王宰相為質上毅然請行遂命少宰張邦昌副上使於敵寨時列兵四遶上意閒暇如平日㑹都統姚平仲以所部兵刼寨敵以用兵責使者邦昌懼而泣上止之曰為國家何愛身耶敵由是憚之不欲上留更請肅王靖康元年閏十一月上在相州與幕府從容語曰夜来夢皇帝脱所御袍賜吾吾解舊衣而服所賜此何祥也頃之京師使人秦仔齎蠟詔命上為兵馬大元帥上捧詔嗚咽二年即建炎元年三月丁酉金人以張邦昌僣位夏四月庚申朔金退癸亥邦昌冊元祐孟皇后為宋太后御延福宫探事人張宗得金人偽詔及邦昌偽赦并迎立太后書上揮涕大慟期身先士卒追二聖於河北諸將固諫乃止戊辰邦昌尊太后為元祐太后入居禁中恭請垂簾聼政以俟復辟庚午元祐皇后御內東門小殿垂簾聼政邦昌以太宰退處資善堂壬申副元帥宗澤聞京城反正為書貽上言今日國之存亡在大王行之得其道與不得其道耳所謂道者其說有五一曰近剛正而逺柔邪二曰納諫諍而去諂䛕三曰尚恭儉而抑驕奢四曰體憂勤而忘逸樂五曰進公實而退私偽澤謂所親曰怨結王之左右矣不恤也癸酉張邦昌率百官上表勸進太常少卿兼權起居舍人汪藻為表文曰二帝出郊旣蒙塵而未返九祧乏祀將攝祼以為名使生靈相顧以無歸雖溝瀆自經而奚益輒慕周勃安劉之計庶幾程嬰存趙之心上不許甲戍元祐皇后告天下手書曰緬惟藝祖之開基實自皇穹之眷命歴年二百人不知兵傳序九君世無失徳雖舉族有北轅之釁而敷天同左􅃝之心乃眷賢王越居舊服已徇羣臣之請俾膺神器之歸繇康邸之舊藩嗣宋朝之大統漢家之厄十世宜光武之中興獻公之子九人惟重耳之尚在兹為天意夫豈人謀尚期中外之協心同定安危之至計先是呂好問言今日布告之書當令明白易曉不必湏詞臣遂命汪藻草書㸔詳行下乙亥金人陷陜州知州事种廣死之監酒務劉逵戰死都監朱弁監甘棠驛孫旦悉遇害丙子范瓊為龍神衛四廂都指揮使錄京城彈壓之功也戊寅直龍圖閤朱勝非至濟州勝非邦昌友壻也械繫邦昌使者以兵来衛宣總司前軍統制韓世忠膚施人少年善鬪嘗犯法當死簽書彰武軍節度判官公事陳豫惜其勇白經略使釋之始𨽻延安兵籍已而為王師部曲從討諸盗屢有戰功是以其軍赴京師遂衛上如南京庚辰上發濟州命張煥孔彦威劉浩丁順等悉以其軍從鄜延路馬步軍副總管劉光世引所部兵来㑹上以光世為五軍都提舉癸未上至南京乙酉張邦昌見上伏地慟哭請死上以客禮見且慰撫之忠州防禦使屈堅為金人所殺上皇過河十餘日謂管幹龍徳宫曹勛曰我夢四日並出此中原争立之象不知中原之民尚肯推戴康王否翌日出御衣三襯自書領中曰可便即真来救父母又諭勛曰如見康王第奏有清中原之䇿悉舉行之毋以我為念又言藝祖有誓約藏之太廟誓不殺大臣及言事官違者不祥五月庚寅朔上即皇帝位於南京改元建炎大赦天下應中外有文武才略出倫或淹布衣或沉下僚禁從監司郡守廣行搜訪應誤國害民之人見流竄者更不收叙應民户借貸常平錢榖並與除放常平散歛青苗錢榖亦令住罷祖宗以来上供皆有常數後因奏請增加當裁損以紓民力州縣受納稅賦務加槩量以規出剰可並行禁止應臨難死節出使軍前及沒於王事優與褒賞應于民間疾苦並許中外臣庶詳具利害陳述龜鑑曰羣隂翳大明出羣籟喧大聲發天下事激之則起不激則靡天之開聖人蓋如是也且我髙宗之生紅光薦瑞蓋大觀之元年也是年金人欲背遼國已三嵗矣以夷事夷然猶背之豈能終事我哉戎心之不臧天實知之於是亟生吾聖人以平之我髙宗之封靖康著符盖宣和之三年也是時金人倚我為助又五嵗矣以燕伐燕虐尤甚焉安知其不加諸我哉國事之失圖天實念之於是大任吾聖人以定之迨其末年四郊多壘敵於我乎請命我以單車臨之而見者奪氣靖康改元不虞荐至敵於我俟命我又以一身當之而聞者縮頸至相而百姓遮道次濟而父老迎謁人心歸矣渡子河而河氷合至磁州而神馬迎天心眷矣開府之初宗澤自磁至王麟自潞至梁揚祖自信徳府至張俊楊沂中皆已在麾下即位之日劉光世自鄜延至路允迪范宗尹自京師至則天下豪傑之心歸矣而况賜袍之夢已應賜帶之言已驗勸進之書雖上而東鄉西郷且謙遜而不受惟三月丙寅張邦昌以稱臣之意至越翼日丁夘謝克家以受命之寳至四方民大和㑹侯甸羣后咸任然必俟道君便可即真之札然後不得已而就南京踐天子位焉此與肅宗即位靈武之事異矣黄潜善為中書侍郎汪伯彥同知樞宻院事元祐皇后在東京是日撤簾辛夘尊靖康皇帝為孝慈淵聖皇帝元祐皇后為元祐太后詔宣仁聖烈皇后保祐哲宗有安社稷大功姦臣懐私誣蔑聖徳著在史冊可令國史院差官摭實刋修播告天下龜鑑曰罷青苗錢捐常平榖裁損上供嵗増之數禁仁止州縣納租槩量賦歛違法之弊是所以回建隆至之脉而曩時誤國害民如京貫黼勔等子係更不復叙又所以懲崇觀不仁之轍詔改宣仁謗史追貶確卞邢恕此張敬夫所謂此撥亂反正之閎綱古今人心之天理也是以天下之人心皆翕然欣戴於已成中興之業而垂諸無窮也壬辰張邦昌封同安郡王五日一赴都堂參决大事范訥為京城留守癸巳立嘉國夫人邢氏為皇后門下侍郎耿南仲提舉杭州洞霄宫上薄南仲之為人因其告老遂有是命甲午資政殿學士李綱為尚書右僕射兼中書侍郎趣赴闕先是黄潜善汪伯彦自謂有攀附之勞虚相位以自擬上恐其不厭人望乃外用綱二人不平繇此與綱忤傅亮通判滑州亮為人勁直不能屈折上疏曰陛下能歸東都則臣能守滑陛下未歸則臣不能守也執政摘其語以為悖傲不遜降通判河陽權應天府朱勝非召試中書舍人乙未宋齊愈試起居郎齊愈自京城走行在自言以病在告不與偽楚事故擢用之王時雍提舉成都府玉局觀自是受偽命者稍稍引退矣詔自今天文休咎並令太史局依經奏聞如或隐蔽當從軍法李綱行至太平州聞上登極上疏論時事大畧謂和不可信守未易圖而戰不可必勝此三者臣慮之至熟非望清光於咫尺之間未易殫言又言恭儉者人主之常徳英哲者人主之全才繼體守文之君則恭儉足以優於天下至於興衰撥亂之主則非英哲不足以當之惟其英故用心剛足以斷大事而不為小故之所摇惟其哲故見善明足以任君子而不為小人之所間在昔人君體此道者惟漢之髙光唐之太宗本朝之藝祖太宗願陛下以為法丙申尚書右丞吕好問兼門下侍郎簽書樞宻院事曹輔薨始輔至南都首陳五事一曰分屯要害以整兵伍二曰疆理新都以便公私三曰甄收人才駕馭用之四曰經理盗賊恩威並行五曰裂近邉之地為數節鎮以謹防秋上嘉納丁酉中書侍郎黄潛善兼御營使同知樞宻院事汪伯彦兼御營副使自國初以来殿前侍衛馬步司三衙禁旅合十餘萬人靖康末衛士僅三萬人及城破所存無幾至是殿前司以殿班指揮使左言權領而侍衛二司猶在東京禁衛寡弱諸將楊惟忠王淵韓世忠以河北兵劉光世以陜西兵張俊苖傅等以帥府及降盗兵皆在行朝不相統一於是始置御營司以總齊軍中之政令因其所部為五軍以真定府路馬步軍副總管王淵為使司都統制諸將韓世忠張俊苖傅等並為統制官又命鄜延路馬步軍副總管劉光世提舉使司一行事務中書舍人朱勝非兼權直學士院時庶事草創書詔填委而院無几案勝非常憑敗鼓草詔然辭氣嚴重如平時戊戍詔故尚書吏部侍郎李若水忘身狥國知死不懼可特贈觀文殿學士賜其家銀帛五百匹兩官子孫五人修職郎王倫假刑部侍郎充大金通問使黄潛善汪伯彦共議改傅雱為祈請使時潛善等復主議和因用靖康誓書畫河為界己亥手詔天下曰朕將謹視舊章不以手筆廢朝令不以內侍典兵權容受直言斥去浮靡非軍功無異賞非戎備無僝工若羣臣狃於故習導䛕諱過大臣蔽賢所舉非實臺諫糾慝有言非公凡此之属必罰無赦李綱誅軍賊周徳于江寧徳旣作亂㑹經制司属官鮑貽遜統勤王兵至城下江淮發運判官方孟卿檄貽遜進兵逼城徳乃受招而擐甲乗城殺掠如故綱至太平州遣使諭以勤王徳始受綱節制然猶桀驁不以時登舟欲乗間遯去綱次江寧遂與江南東路權安撫司事李彌遜謀大犒羣賊於轉運司執徳與其徒聶旺皆磔於市又誅亂黨四十四人庚子詔以靖康大臣主和誤國特進李邦彦責授建寧軍節度副使安置潯州責授崇信軍節度副使涪州安置吳敏移栁州責授秘書少監亳州居住蔡懋移英州遂責提舉南京鴻慶宮李棁於惠州提舉亳州明道宮宇文虚中韶州提舉亳州明道宮鄭望之連州提舉杭州洞霄宮李鄴賀州並安置邦彦敏靖康初共政棁文中望之鄴皆使虜請割地者故責之辛丑詔張邦昌可依文彦博例一月兩赴都堂先是御史中丞顔岐言邦昌金人所喜雖已為三公宜加同平章事増重其禮李綱金人所不喜雖已命相宜及其未至罷之㑹邦昌累章求退故有是命岐又請罷綱章五上上曰如朕之立恐亦非金人所喜岐乃退壬寅江淮等路發運使梁揚祖提領措置東南茶塩公事尚書工部員外郎楊淵同提領置司真州時東北道梗鹽筴不通揚祖言真州東南水陸要衝宜遣官置司給賈鈔引所有茶鹽錢並充朝廷封樁諸司毋得移用朝廷以為然故有是命試開封尹徐秉哲提舉江州太平觀延康殿學士趙子崧言臣聞京城士人籍籍謂王時雍徐秉哲吳开莫儔范瓊胡思王紹王及之顔博文余大均皆左右賣國伏望將此十人付獄鞫治明正典刑以為萬世臣子之戒癸卯太常寺主簿張浚充樞院編修官乙巳簽書樞宻院事張叔夜薨叔夜旣北遷道中惟時飲湯義不食其粟至白溝御者曰過界河矣乃仰天大呼翌日扼吭死時上聞叔夜與御史中丞秦檜之忠遥拜叔夜觀文殿學士醴泉觀使檜落致仕充資政殿學士提舉醴泉觀而何㮚孫傅輩以誤國故不得錄㮚至北邊不食死傅北遷後不知所終丙午追貶蔡確蔡卞邢恕坐誣謗宣仁后且自言有定策功也金人陷河中府權府事郝仲連死之大事記曰吾觀元年金之入冦三道也不惟監司帥守如西京之孫昭逺同州之鄭驤維州之韓浩頴川府之孫黙秦州之李積淮寧府之向子褒相州之趙不試大名府之郭永濮州之楊粹中開寧府之楊𨽻晉寧軍之徐徽言長安之唐重楊宗閲桑景詢曹謂郭忠孝皆死於義雖以通判如郝仲連郭伯振縣官如陸有常張侃丁興宗郭賛一將一校如李政杜績趙叔皎楊彭年亦死於義降者惟劉豫傅亮等三人耳彼之所以固守者以朝廷必不葉而必有援兵也而元年即位之赦刑部指揮已不謄報於河之東北陜之蒲解是明棄三路矣使忠臣義士守孤城以待盡惜哉丁未曹勛自燕山遁歸宣仁皇后令勛奏上以再使軍前時有宮人見四金甲神人持弓劒衛上庚戍徽猷閣待制宗澤知襄陽府時黄潛善等不欲澤居中故有是命乙卯監察御史張所按視陵寢還上疏言恭聞行在留南京軍民俱怨道路籍籍不知誰為此謀者今亟還京城誠有五利奉宗廟保陵寢一也慰安人心二也繫四海之望三也釋河北割地之疑四也早有定處而一意於邊防五也一舉五利而陛下不為不知誰為此謀者臣知其必無長䇿曾不過緩急之際意在南渡殊不知國家之安危在乎兵之強弱將相之賢不肖而不在乎都之遷與不遷也誠使兵弱而將相不肖雖云渡江而南安能自保大河不足恃則大江不足恃亦明矣又條上兩河利害上欲以其事付所㑹所復言黄潛善兄弟姦邪不可用恐害新政潛善引去上諭㫖留之乃罷所言職尋責鳯州團練副使江州安置戊午太常少卿周望充大金通問使武功大夫趙哲副之初遣傅雱使敵未行朝論欲更遣重臣以取信乃更命望是月皇叔光化軍節度使士㒟知南外宗正事士㒟首論大臣誤國故黄潛善斥之六月己未朔新除尚書右僕射李綱至行在先是右諫議大夫范宗尹故主議和乃言綱名浮於實而有震主之威不可以相章三上不報詔中使王嗣昌趣綱入覲綱至姑熟中丞顔岐遣人持劾副以遺綱上聞綱且至命徽猷閣學士董耘徃勞又命執政燕綱於金果園綱力辭上趣召入見於內殿綱涕泣上亦感動綱辭新命且言臣愚惷但知有趙氏不知有金人固宜為其所惡然岐之論臣謂材不足以任宰相則可謂為金人所惡則不當為相則不可且為趙氏之臣而金人喜之而反可以為相則自古賣國以與人者皆為忠臣矣外廷之論如此臣豈敢當此任願乞身以歸田里至於陛下命相於金人所喜所惡之間更望曲留聖慮上曰朕知卿忠義智略甚久在靖康時嘗欲言於淵聖使夷狄畏服四方安寧非相卿不可今朕此志已定卿其勿辭綱頓首謝新知襄陽府宗澤自衛南分兵屯河上以數百騎赴南都是日入對澤首上三事其一論人主不可以喜怒為賞罰其二論人主職在任相願於稠人廣衆中不以親踈不以逺近虚心謹擇參以國人左右之言爰立作相而毋使小人參之其三論諫官人主耳目臣下有懐奸藏慝嫉賢蔽善者當使耳目之官瀝心彈紏毋有所隐以絶後艱上納其言將留澤而黄潛善汪伯彦惡之乃令之襄陽庚申詔李綱立新班奏事執政退綱留身上十議其一曰議國是大略謂今日之事欲戰則不足欲和則不可竊恐國論猶以和議為然蓋以二聖播遷非和則所以速二聖之禍臣竊以為不然漢髙祖與項羽戰於滎陽太公為羽所得置之俎上者屢矣髙祖不顧其戰彌厲羽卒不敢害而還太公然則不顧其親而戰者乃所以還太公之術也為今之計莫若一切罷和議專務自守之䇿建藩鎮於要害之地置帥府於大河及江淮之南修城壁治器械教水軍習車戰使其進無抄掠之得退有邀擊之患則雖有出沒必不敢深入三數年間軍政益修甲車咸備然後大舉以討之報不共戴天之仇雪振古所無之耻彼知中國自強如此豈徒不敢肆兇而二聖有可安之理矣二曰議巡幸大略謂天下形勢關中為上襄鄧次之建康又次之今四方多故除四京外宜以長安為西都襄陽為南都建康為東都各命守臣葺城池治宫室積糗糧以備巡幸三都成而天下之勢安矣陛下用臣此䇿其利有三一則藉巡幸之名使國勢不失於太弱二則不置定都使夷狄無所窺伺三則四方望幸使姦雄無所覬覦議者或欲留應天或欲幸建康臣以為皆非計夫汴京宗廟社稷之所在天下之根本也陛下即位之始豈可不一見宗廟以安都人之心願先降敕榜以修謁陵寢為名擇日巡幸計無出於此者三曰議赦令大略謂惡逆不當赦選人不當盡循資罪廢之人不當盡復四曰議僣逆大略謂張邦昌久與機政擢冠宰司國破而資之以為利君辱而攘之以為榮願肆諸市朝以為亂臣賊子之戒五曰議偽命大略謂國家更大變士大夫屈膝於偽庭者不可勝數宜等差定罪以勵士風六曰議戰大略謂軍政久廢宜一新紀綱信賞必罰七曰議守大略謂沿河及江淮措置抗禦以扼敵衝八曰議本政大略謂崇觀以来政出多門閹宦女謁皆得以干預朝政所謂宰相者保位固寵而不敢言遂至紀綱紊亂宜一歸之中書九曰議責成大略謂靖康間進退大臣太速功效蔑著宜擇人而久任之以要成功十曰議修徳大略謂上初膺天命宜益修孝悌恭儉之徳以副天下之望上與黄潛善等謀之翌日出其章付中書惟僣逆偽命二章不下開封尹徐秉哲梅州安置壬戍李綱同執政進呈議國是劄子上曰今日之事正當如此可付中書省遵守次進呈議巡幸劄子上命促留守司修治京城祇備車駕還闕欵謁宗廟詔永興軍襄陽江寧府増葺城池量修宮室官府以備巡幸執政退綱留身奏張邦昌僣逆及受偽命臣僚二事皆今日政刑之大者乞早賜施行上曰執政中有與卿論不同者少遲議之綱曰臣請與之廷辯上乃召黄潛善呂好問汪伯彦再對上語之故潛善猶力主之綱詰難再三曰邦昌當正典刑而反尊崇之如此何也况其已僣逆豈可留之在朝廷使道路指目曰此亦一天子哉因泣拜曰臣不可與邦昌同列當以笏擊之陛下必欲用邦昌第罷臣勿以為相無不可者伯彥曰李綱氣直臣等不及上曰卿欲如何措置綱曰邦昌之罪理當誅夷陛下以其嘗自歸貸其死而逺竄之受偽命者等第謫降可也上乃出綱奏詔置檢鼓院於行宮便門之外差官權攝李綱言今日急務在通下情乃置院以達四方章奏綱又請置看詳官二貟臣民封事僉擬可行者將上取㫖從之吕頥浩為徽猷閣直學士知楊州宣和末頥浩為燕山府路都轉運使金人入冦郭藥師執之以降已而得歸至是復用癸亥中書侍郎黄潛善為門下侍郎兼權中書侍郎太傅同安郡王張邦昌責授昭化軍節度副使潭州安置李綱言偽命臣僚王時雍等四人與金人𫝊導指意議廢趙氏又受偽命為執政宜為罪首上顧呂好問好問曰誠有之時徐秉哲已先竄於是移王時雍吳开永州莫儔全州並安置龜鑑曰公之十議一施而議僣叛議受偽命二章獨留中而不下綱曰此刑政之大者蓋為臣之罪莫甚於僣叛莫甚於從偽此而不誅何以正朝廷何以示百官何以曉天下何以懲戒萬世之事君者上之所以未遽行此以祖宗不忍輕用刑誅不忍於殺大臣也頋夫祖宗之所以不忍者豈不忍於此輩哉君不忍於其臣臣反忍於其君邦昌忍於易姓忍於負宗者社王時雍之徒忍於覆國忍於事異姓茍可以謀身皆無所不忍傳曰人將忍君嗚呼此輩非忍君者乎管蔡至親周公亦忍而誅辟之不以議親之法而减也若使覆宗社而無誅宗社何罪焉棄主事偽而無刑彼盡忠守節者何辜焉故知懐州霍安國以死節顯著贈延康殿學士李綱言自崇觀以来朝廷不復崇尚名節故士大夫寡廉鮮耻不知君臣之義靖康之禍視兩宮播遷如路人然罕有能仗節死義者在內惟李若水在外惟霍安國死節顯著餘未有聞願詔諸路詢訪優加贈䘏始上知若水之忠首賜詔書褒贈至是綱有請遂自安國及劉韐已下次第褒錄之李綱留身奏事上曰卿昨日內殿争邦昌事內侍皆涕泣卿今可受命矣綱因論自古創業中興之主如漢髙光唐太宗皆有英明之資寛誠之徳仁厚而有容果斷而不惑故能戡定禍難身致太平因請以所編三君行事紀要錄以進上可之甲子李綱兼御營使時河東北所失纔十餘郡餘皆為朝廷固守綱言今日中興規模有先後之序當修軍政變士風裕邦財寛民力改敝法省冗費誠號令信賞罰擇帥臣選監司使吾政事已修然後可議興師而所急者當先理河北河東蓋兩路國之屏蔽河北惟失真定等四郡河東惟失太原等六郡其餘皆在且推其土豪為首多者數萬少者數千謂宜於河北置招撫司河東置經制司擇有才者為使以宣陛下徳意有能保一郡者寵以使名如唐之方鎮俾自為守則無北顧之憂矣上曰誰可任此者綱請詢訪其人以奏上許之大事記曰嗚呼建炎之初肩背初失之時也河北惟失真定等四郡河東惟失太原等六郡其它固在也天下之勢不進則退進則當主李綱經理兩河之議宗澤留守之計則不惟故疆可全而讐耻亦可復也退則不惟河北河東不可保而河南亦不可保不惟淮甸不可保退而渡江退而航海矣知通州胡安國提舉杭州洞霄宫許景衡並試給事中提舉亳州明道宫劉珏試中書舍人靖康末三人俱在後省坐黨附李綱斥去至是並用之景衡珏聞命冒暑赴朝安國辭不至乙丑召張所傅亮赴行在初李綱旣建經撫兩河之議欲薦用所然以其嘗言黄潛善之故頗難之一日過潛善從容言曰今河北未有人獨一張所可用公能先國事後私怨不亦美乎潛善許諾上悦乃召用焉丁卯手詔河東北郡縣諭令堅守詔略曰河東河北國之屏蔽也朝廷豈忍輕棄方命帥遣師以為聲援應州縣守臣能竭力保有一方及能力戰破賦者當授以節鉞應移用賦稅辟置將吏並從便宜其守臣皆遷官進職餘次第錄之命諸路詢訪死節者以聞尚書祠部貟外郎喻汝礪為四川撫諭官初汝礪自京師入見上復命為郎汝礪因對論遷都利害以為中原决不可舍以為興王之資汴都决不可遷以陷狄人之計旣對上命赴都堂與李綱語綱大竒之汝礪尋以母老乞歸省遂除撫諭官且令督輸四川漕計羡緡及常平錢物汝礪入辭復奏言金人决渡河陛下宜亟為之防毋以宴安之故而成此酖毒上嘉納之戊辰新知襄陽府宗澤知青州澤聞黄潛善等復唱和議上疏言河之東北陜之蒲解此三路者祖宗基命之地奈何輕聼姦邪附賊者張皇之言遂自分裂今日之事正宜與賊弗共戴天弗與俱生今四十日矣未聞有所號令但見刑部指揮不得謄播赦文於河東河北陜之蒲解兹非新人耳目也是欲蹈東晉既遷之覆轍裂王者一統之緒為偏覇耳為是說者不忠不孝之甚臣雖駑怯當躬冒矢石為諸將先上壯之以澤知青州初澤至南都見李綱與之語國事澤慷慨流涕時開封尹缺綱為上言綏集舊都非澤不可京師根本之地新經擾攘人心未固不得人以撫之非獨外憂且有內變上許之使澤知開封府龜鑑曰自綱之入為右僕射也以英哲全徳勉人主以修政攘夷為己任抗忠數疏中時膏肓和守之議决而國是明僣逆之罪正而士氣作幸都之謀定而人心安他如修軍政變士風定經制改弊法置檢鼔院以通下情置賞功司以伸國法减上供之弊以寛州縣修茶塩之法以通商賈剗東南官田而募民給佃倣保甲弓箭手而官為教閲招兵買馬分布要害遣張所招撫河北王燮經制河東宗澤留守京城西顧關陜南葺樊鄧且將益據形便以為必守中原之計此朱文公謂李綱入来方成朝廷者正謂此也辛未以賢妃潘氏生皇子赦天下李綱為上言河東北兩路為朝廷堅守而赦令不及人皆謂已棄之何以慰忠臣義士之心至於勤王之師雖未嘗用然在道半年亦已勞矣恩䘏不及後復有急何以使人願因今赦併示徳意上嘉納壬申李綱請降見錢鈔三百萬緡賜兩河市軍需因遣使臣賫夏藥徧賜兩河守臣將佐且命起京東夏税絹於北京川綱河東衣絹於永興軍以待支俵於是人情翕然應募者甚衆頒軍制二十一條凡師行鹵掠若違節制者死臨陣先奔者族敗軍者誅全隊一軍危急而他軍不救者刑主將餘如將法從事乙亥同知樞宻院事汪伯彦請兩河京東西増置射士縣五百人從之以諸路盗賊多故有此請宗澤至東京自敵騎退歸樓櫓盡廢諸道之師雜居寺觀盗賊縱横人情恟懼澤至京下令曰為盗者贓無輕重並從軍法由是盗賊屏息人情粗安一日有金使牛大監等八人以使偽楚為名直至京師澤曰此覘我也即白留守范訥械繫之且以聞於朝廷戊寅同知樞宻院事汪伯彦進知院事宣義郎傅雱特遷宣教郎充大金通問使初黄潛善等既奏遣周望徃河北軍前通問而河東獨未有人李綱為上言今日之事內修政事外攘夷狄使國勢自強則二聖不竢迎請而自歸不然雖冠蓋相望卑辭厚禮終恐無益今所遣使但當奉表兩宮致思慕之意可也己卯李綱請以河北之地建為藩鎮朝廷量以兵力援之而於沿河沿淮沿江置帥府要郡次要郡以備控扼沿河帥府十一京東東路治青徐西路治鄆宋京西北路治許洛南路治襄鄧永興軍路治京兆河北東路治魏滄沿淮帥府二治楊廬沿江帥府六治荆南江寧府潭洪杭越州大率自川陜廣南外總分為十九路毎路文臣為安撫使馬步軍都總管總一路兵政許便宜從事武臣副之要郡以文臣知州領兵馬鈐轄次要郡以文臣知州領兵馬都監許參軍事皆以武臣為之副如朝廷調發軍馬則安撫使措置辦集以授副總管若帥臣自行則漕臣一貟隨軍一貟留攝帥事憲臣文武各一貟彈壓本路盗賊自帥府外要郡三十九次要郡三十八總為九十六萬七千五百人非要郡不預又别置水軍帥府兩將要郡一將綱又請出度牒鹽鈔及募民出財使帥府常有三年之積要郡二年次要郡一年疏奏悉從之先遣御營司幹辦公事楊觀復徃江淮造舟餘路委憲司措置京城留守范訥落節鉞淄州居住秦梓充樞宻院編修官梓檜兄也政和中用梁師成薦經赴御試除學官已而廢斥至是以檜故用之金右副元帥宗傑卒於燕山宗傑即斡里雅布也壬午户部尚書張慤同知樞宻院事乙酉知開封府宗澤為延康殿學士開封尹東京留守澤首抗疏請上還京繼聞有金陵之議復上疏曰賊臣張邦昌僣竊與范瓊輩擅行威福所以乞暫駐蹕南都以察人心而觀天意臣料今臣僚中唱為異議不欲陛下歸京者不過如邦昌輩隂與賊虜為地願陛下早降敕令歸謁宗廟垂拱九重幸甚初京西北路提㸃刑獄許髙河北西路許亢緫師防洛口望風奔潰坐流瓊州吉陽軍髙亢至南康謀為變知軍事李定通判韓璹以便宜斬之李綱言髙亢大棄其師朝廷不能正軍法而一軍主守倅敢誅之必健吏也使後日捍賊者知退走而郡縣之吏有敢誅之者其亦少知所戒乎乃各進一官丙戍李綱留身上三議一曰募兵大略謂熈豐時內外禁旅合五十九萬人崇觀以来闕而不補者幾半今所存無幾何以捍敵為今之計莫若取財於東南募兵於西北河北之人為金賊所擾未有所歸而關陜京東西流而為盗者不知其幾請乗其不能還業遣使招之合十萬人於要害州軍别營屯戍使之更畨入衛行在二曰買馬大略謂金人專以鐡騎取勝而吾以步軍敵之宜其潰散今行在之馬不滿五千可披帯者無幾權時之宜非括買不可請先下令非品官將校不許乗馬然後令州縣籍有馬者以三等價取之嚴隐寄之法重搔擾之禁則數萬之馬尚可得也又請命川陜茶馬司益市馬募商人結攬廣右之馬以給諸軍三曰募民出財償以官告度牒詔三省以次施行其募兵陜西河北各三萬人委經制招撫司京東西各二萬人委本路提刑司潰卒廂軍各許改刺詔京東西河北東路永興軍江淮荆湖等路皆置帥府要郡綱又言步不足以勝騎而騎不足以勝車請以車制頒於京東西路使製造而教習之因繪圖進呈其法用靖康間統制官張行中所創兩竿雙輪上載弓弩又設皮籬以捍矢石下設鐡裙以衛人足長兵禦人短兵禦馬傍施鉄索行則布以為陣止則聨以為營每車用卒二十有五人四人推竿以運車一人登車以發矢餘執軍器夾車之兩傍毎軍二千五百人以五之一為輜重及衛兵餘當車八十乗即布方陣則四面各二十乗而輜重處其中諸將皆以為可用乃命兩路憲臣總領丁亥張所借通直郎充河北西路招撫使初上皇旣北遷龍徳宫器玩悉為都監帶御器械王球所竊球燕國長公主子也及是內侍陳烈以其餘寶器来上皆遐方異物李綱諫上亟命碎之時綱毎留身奏事多所䂓益內侍石如岡素凶悍淵聖斥之上嘗召如岡綱諫而止又論待遇諸將恩數宜均一上皆嘉納之右諫議大夫宋齊愈入對論招軍買馬勸民出財助國非是尚書虞部貟外郎張浚夜過齊愈於省中見其方執籌布算問之齊愈笑曰李丞相今上三議李公素有名譽今建明乃爾今西北之馬不可得獨江淮之南而馬不可用括民之財豈可藝極至於兵數若郡増二千則嵗責十萬緡以養今詎堪此齊愈將極論之浚曰宰相不勝任論去之諫官職也豈有身為相未幾上三事而公盡力駁之彼獨不恚且怨齊愈不樂是日執政奏事退齊愈入對出過省門執浚手曰適上向者之章上甚喜浚摇手曰公受禍自此始矣秋七月己丑朔樞宻院都承㫖王􅊅為河東經制使直祕閣傅亮為副使庚寅命王淵劉光世韓世忠張俊分討軍賊亂兵自宣和末羣盗蠭起至是招安赴行在凡十餘萬人李綱為上言今日盗賊正當因其力而用之然不移其部曲則易叛而徙之則致疑正當以術致之使由而不知乃命御營司委官分揀𨽻諸將由是無叛去者獨淮寧之杜用山東之李昱河北之丁順王善楊進皆擁兵數萬不可招而拱州之黎驛單州之魚臺亦有潰卒數千為亂綱以為專事招安則彼無所畏憚勢難遽平乃白遣淵等分討之光世遣其將喬仲福追擊李昱斬之旣而杜用為淵所殺餘悉殄平丁順等皆赴河北招撫司自効盗益衰辛卯右諫議大夫宋齊愈罷初齊愈旣論李綱之過㑹朝廷治從逆者罪言者論齊愈在皇城司首書張邦昌字以示議臣由是罷諫議大夫下臺獄制曰所幸探符之未獲柰何援筆以遽書遺毒至今造端自汝或曰齊愈論綱不已故綱以危法中之皇叔貴州團練使士珸以義兵復洺州士珸岐簡獻王少子天資警敏方童稚凛然如成人至是纔弱冠也乙未京城內都巡檢使范瓊為御營使司同都統制己亥詔省臺省寺監官减學官館職之半以常平事歸提刑司市舶事歸轉運司罷諸州分曹置掾縣户不滿萬勿置丞堂吏磨勘止朝請大夫出職止為通判宰執子弟任待制以上者並罷執政官减奉錢三之一京官奉祠者亦如之先是李綱言艱難之際賦入狹而用度増當內自朝廷外至監司州縣皆省冗貟以節浮費上命中書省條具至是行下辛丑詔曰朕權時之宜法古巡狩駐蹕近甸號召軍馬以防金人秋髙氣寒再來入冦朕將親督六軍以援京城及河北河東諸路與之决戰已詔迎奉元祐太后津遣六宮及衛士家属置之東南朕與羣臣將士獨留中原以為爾京城及萬方百姓請命於皇天庶幾天意昭答中國之勢寖彊歸宅故都迎還二聖以稱朕夙夜憂勤之意應在京屯兵聚粮修治樓櫓器具並令留守司京城所户部疾速措置施行時李綱入朝月餘邉防軍政已略就緒獨車駕行幸未有定所綱間為上言今縱未能入關尤當適襄鄧以示不忘中原之意而近議紛紜謂陛下將幸東南果然臣恐中原非復我有上曰但欲奉迎太后及六宫徃東南耳朕當與卿等留中原綱再拜賀因乞降詔上乃命綱草詔頒之兩京焉右正言鄧肅請竄邦昌偽命之臣右司諫潘良貴亦言宜分三等定罪肅言叛臣之上者其惡有五一曰諸侍從而為執政者王時雍徐秉哲吳开莫儔李回是也其二曰諸庶官及宫觀而起為侍從者胡思朱宗周懿文盧襄李擢范宗尹是也其三曰撰勸進文與撰赦書者顔博文王紹是也其四曰事務官者講冊立之儀捜求供奉之物悉心竭力無所不至其五曰因邦昌更名者何昌言昌辰是也已上數等乞定為叛臣之上寘之嶺外所謂叛臣之次者其惡有三其一曰諸執政侍從臺諫稱臣於偽楚及拜於庭下者是也所謂執政者馮澥曹輔是也所謂侍從者其餘已行遣矣獨有李㑹尚為中書舍人所謂臺諫者洪芻黎確等及舉臺之臣是也當時臺中有為金人根括而被杖者四人以病得免其餘無不在偽楚之庭矣其二曰以庶官而升擢者此不可勝數乞委留守司按籍考之則無有遺者其三曰願為奉使者黎確李健陳戩是也已上數等乞定為叛臣之次於逺小處編管耿南仲延禧坐父子主和並奪職仍以延禧提舉江州太平觀癸卯腰斬通直郎宋齊愈於都市齊愈赴獄引伏法寺當齊愈謀叛斬該大赦罰銅十斤情重取㫖黄潛善等頗營救之上曰使邦昌之事成置朕何地乃詔齊愈探金人之情親書姓名謀立異姓以危宗社造端在先其罪非受偽命臣僚之比可特不原赦議者或以為寃乙巳手詔京師未可徃當巡幸東南為避狄之計来春還闕時執政黄潛善汪伯彥皆欲奉上幸東南故有是詔李綱極論其不可且言自古中興之主起於西北則足以據中原而有東南起於東南則不足以復中原而有西北蓋天下之精兵健馬皆出於西北江之險不如河而南人輕脆遇敵則奔南方城壁又非北方之比陛下必以建康為安臣竊以為過矣望乞収還巡幸東南手詔令綱與執政議之丙午綱與潛善議於上前綱曰今乗舟順流而適東南固甚安便但一去中原勢難復還夫中原安則東南安失中原則東南豈能必其無事一失機㑹形勢削弱將士之心離散變故不測上乃許幸南陽同知樞宻院張慤言户部財用惟東南嵗運最為大計自姦臣誤國變祖宗轉般倉良法毎嵗失陷粮斛不可勝計望依舊法責發運司官分認逐季地分各行檢察催促從之丁未上命京城留守宗澤移所拘金使於别館優加待遇澤謂二聖在外必欲便行誅戮恐貽君父憂若縱之使還又有傷國體莫若拘縻於此俟車駕還闕登樓肆赦然後特從寛貸及是詔下澤上奏曰臣不意陛下復聼奸臣之語浸漸望和為退走計營繕金陵奉元祐太后仍遣官奉迎太廟木主棄河東河西河北京東京西淮南陜右七路生靈如糞壤草芥略不顧惜又令遷金使别館優加待遇不知二三大臣於金人情欵何如是之厚而於國家訏謨何如是之薄也臣之樸愚必不敢奉詔以彰國弱此我大宋興衰治亂之機願陛下察之詔答曰卿彈壓強梗保護都城深所倚仗但拘留金使未逹朕心澤猶不奉詔又請上回鑾詔賜澤襲衣金帶尚書虞部貟外郎張浚為殿中侍御史上見浚雍容静重即欲用之黄潛善又稱其賢遂有是命癸丑衛尉少卿衛膚敏言今汴都蹂踐之餘不可復處睢陽駐蹕咸以為宜但城不髙池不深封域不廣不足以容千乗萬騎而又逼近河朔敵易以至建康實古帝都外連江淮內控湖海負山帶海為東南要㑹之地伏望趣下嚴詔夙期東幸别命忠勇大臣總領六師留屯京邑時上雖用李綱議營南陽而朝臣多以為不可中書舍人劉珏亦言南陽城惡不可恃騎兵敵之長技而不習水戰金陵天險前據大江可以固守東南久安財力富盛足以待敵於是汪伯彦黄潛善皆主幸東南故士大夫率附其議丙辰河北招撫使張所江東經制使王􅊅副使傅亮辭行先是李綱建議遣所亮措置兩河所亮旣行兩河響應門下侍郎黄潛善疾綱之謀建議遣河北經制使馬忠節制軍馬俾率兵渡河於是權始分矣工部貟外郎李士觀言江池饒建州四監嵗鑄錢百三十二萬餘緡淮南等九路十七州嵗造上供軍器亦百餘萬件多未辦者望令發運司委官催督從之八月戊午朔洪芻陳冲余大均周懿文張卿才李彞王及之胡思八人流竄有差初芻等坐圍城中事属吏上命殿中侍御史馬伸劾之及是獄成勤老春秋曰周懿文余大均等不死惟從貶竄君子以知李綱諸人不能輔佐恢復河東北之境土也日失其刑矣杭州軍亂縱人殺士曹參軍及副將白均等十二人己未元祐太后發京師都人始望車駕還內及太后行莫不垂泣上初未識太后比至宫中愛上如己出衣服飲食必親調製焉庚申侍衛親軍馬軍都虞侯御營使司都巡檢使劉光世為奉國軍節度使御營使司左軍統制韓世忠為定國軍承宣使御營使司前軍統制張俊落階官並賞平賊之勞也時內侍康覆始用事光世曲意承之壬戍尚書右僕射李綱守尚書左僕射兼門下侍郎兼權中書侍郎黄潛善守尚書右僕射兼中書侍郎先是綱為上謀以秋末幸南陽上許之矣潛善與知樞宻院事汪伯彦力請幸東南上意中變於是綱所建白上多不從綱曰天下大計在此一舉國之存亡於此焉分吾當以去就争之綱知譖愬之言其入已深一日留身奏事言臣近者屢蒙宸翰改正己行事件又所進機務多未降出此必有間臣者因極論君子小人不可並立之理且言疑則當勿用用則當勿疑上但慰勉之綱拜謝而退後數日遂有並相之命同知樞宻院事張慤兼御營副使癸亥命御營使副大閲五軍人馬自是執政皆有親兵丙寅京畿轉運判官上官悟請悉發諸路坊瑒錢為行在贍軍之費詔諸路提刑司具見在常平錢物數以聞其後悉令計置輕貲金帛赴行在丁卯三省樞宻院奏以諸路民兵為忠義巡社令憲臣提領論者以為其法精審而詳整可以久行前此論民兵者皆莫及也庚午名元祐太后所居曰隆祐宫於是后更稱隆祐太后隆祐本欽聖憲肅皇后宫名不當用蓋權直學士院王綯朱勝非失之壬申召布衣譙定赴行在定涪陵人學於程頥靖康中召為崇政殿說書定以言不用辭不受至是猶在東都尚書右丞許翰薦於朝詔宗澤津遣赴行在自熈豐間程顥程頥以道學為天下倡其髙弟門人有故監察御史建陽游酢監西京竹木務上蔡謝良佐今徽猷閣待制提舉西京嵩山崇福宫將樂楊時其後黨禍作屏居伊闕山學者徃從之而定與尹焞為首至大觀以後時名望益重陳瓘鄒浩皆以師禮事時而胡安國諸人實傳其學宣和末或説蔡攸以時事必敗乃召時至經筵淵聖皇帝擢為諫官以論事不合去吕好問在政府首言時之賢於上復召還朝未至而又召定是時給事中許景衡左司貟外郎吳給殿中侍御史馬伸皆號得頥之學已而傳之寖廣好名之士多從之亦有託以自售於時而識真者寡矣詔真州守臣以禮敦遣長蘆隐士張自牧赴行在旣至授從事郎充御營使司准備差使癸酉耿南仲責授單州團練副使南雄州安置乙亥尚書左僕射兼門下侍郎兼御營使李綱罷先是河北招撫使張所纔至京師河北轉運副使張益謙附黄潛善意奏所置司北京不當又言自置招撫司河北盗賊愈熾不若罷之專以其事付帥司同知樞宻院事張慤素善益謙毎與之相表裏綱言所今留京師以招集將佐故尚未行不知益謙何以知其搔擾朝廷以河北民無所歸聚而為盗故置司招撫因其力而用之豈由置司乃有盗賊今京東西盗賊公行亦豈招撫司過耶益謙小臣非理沮抑此必有使之者上乃令益謙分析所方招来豪傑以忠翊郎王彦為都統制効用人岳飛為准備將彦河內人後徙居覃懐讀韜略習騎射其父竒之使詣京師𨽻弓馬子弟所稍遷清河尉能與敵角所竒其才故擢為都統制飛安陽人嘗為人傭耕去為市遊徼使酒不檢上之在相州也飛以効用從軍至北京坐論事罪廢至是投所軍中時河東經制副使傅亮軍行纔十餘日伯彦等以為逗遛使即日渡河亮言今河外皆属金人而遽使亮以烏合之衆渡河不知何地可為家計何處可以得根綱為之請且言潛善伯彦力沮二人乃所以沮臣使不安職臣毎念靖康大臣不和之失凡事未嘗不與潛善伯彦熟議而後行不謂二人設心乃如此如亮事理明白願陛下虚心觀之旣而潛善有宻啟明日上批亮兵少不可渡河可罷經制司赴行在綱留御批再上上曰如亮人材今豈難得綱曰亮謀略智勇可為大將今未嘗用而遽罷之古人之用將恐不如此因求去上不語綱以御批納上前曰聖意必欲罷亮乞以御批付潛善施行臣得乞身歸田里綱退聞亮竟罷乃再章求去於是殿中侍御史張俊亦論綱以為綱雖負才氣有時望然以私意殺侍從典刑不當有傷新政不可居相位又論綱杜絶言路獨擅朝政士夫側立不敢仰視事之大小隨意必行買馬之擾招軍之暴勸納之虐優立賞格任吏為姦擅易詔令竊庇姻親等十數事俊素與宋齊愈厚且潛善客也上召綱入對諭曰卿所争細事耳何為乃爾綱曰人主之職在論一相宰相之職在薦進人才方今人才以將帥為急恐不可以為細事若以為細臣以去就争之而聖意不回臣亦安敢不必去因再拜曰潛善伯彥自謂有攀附之功方虚位以召臣蓋已切齒及臣至而議論偽楚建請料理河東北兩路謂車駕宜留中原皆不與之同宜其媢嫉無所不至臣東南人豈不願陛下順流東下為安便哉顧一去中原後患有不可勝言者故不敢雷同衆說以誤大事望陛下勿以臣去而其議遂改也因泣辭而退遂上第三表劄客或謂綱曰公決於進退於義得矣顧䜛者不止將有患禍不測奈何綱曰大臣以道事君不可則止吾知全吾進退之節而已畏禍患而不去彼獨不能諷言者詆訾而逐之哉天下自有公議此不足慮翌日遂罷綱提舉杭州洞霄宫綱在相位凡七十五日右正言鄧肅言人主之職在論一相陛下初登九五之位召李綱於貶所而任以台衡待之非不專也然綱學雖正而術踈謀雖深而機淺陛下嘗顧臣曰李綱真以身狥國者且兩河百姓雖願効死而數月間茫然無所適從及綱措置不一月而兵民稍集又僞楚之臣紛紛皆官於朝綱先逐邦昌而叛黨稍正其罪今綱去則二事將何如哉兩河無兵則夷狄驕叛臣在朝則政事乖綱於此不可謂無一日之長也肅尋與郡而言者極論其罪上曰肅亦何罪但黨耳吏部尚書右丞許翰亦言綱忠義英發舍之無以佐中興今綱罷而留臣無益因力求去上未許然潛善等皆怒有逐之之意矣初綱嘗請减上供之數以寛州縣修塩茶之法以通商賈剗東南官田募民給佃倣陜西弓箭刀弩手法養兵於農籍陜西保甲京東西弓箭社免支移折變而官為教閲上命中書省條具㑹綱去位皆不果行黄潛善汪伯彦共議悉奏罷綱所施行者是日罷諸路買馬惟陜西諸州各買百匹其勸民出財助國指揮勿行已而傅亮以母病歸同州張所亦以罪貶招撫經制司皆廢矣龜鑑曰綱之言雖忠綱之謗愈多顔岐邦昌黨人也於公未至而沮之宗尹嘗仕邦昌者也於公已至而沮之宋齊愈又嘗豫立邦昌議也及與公議國事又從而沮之君子之難進易退也如此加之藩邸舊人公肆排毁並相之命下而綱之權已分經制之司罷而綱之去已决中山之功未成而謗書盈箧綱之秉政凡七十五日而所與共治者它有人矣當時挽而留之者不投之散地則寘之極典公之去就甚輕而關於天下之安危者甚重綱在位則措置兩河民兵相集綱去則兩河無兵而夷狄横矣綱在位則叛臣偽黨稍正典刑綱去則叛臣在朝而政事乖矣綱在位則幸襄鄧之䇿從宗澤還京之請綱去則淮陽有驚而翠華南渡矣庚辰詔賜杭州黄榜招諭作過軍民建炎後以黄榜招安叛兵自此始壬午斬太學生陳東撫州進士歐陽澈於都市先是上聞東名召赴行在東至上疏言宰執黄潛善汪伯彦不可用李綱不可去且請上還汴治兵親征迎請二帝其言切直章凡三上潛善等憾欲以伏闕事中東然未有間也㑹澈亦上書極詆用事者其間言宫禁燕樂事上諭輔臣以澈所言不審潛善乗是宻啟誅澈并以及東皆坐誅東始未識綱特以國故至為之死行路之人有為之哭者上甚悔之乙酉御史中丞許景衡言臣聞議者多指開封尹宗澤過失未知所指何事若只拘留金國使人此誠澤之失也然原其本心但激於忠義未審國家事體耳臣自浙渡淮以至行在聞澤之為尹威名政術卓然過人誅鋤強梗撫循善良都城帖然莫敢犯者又方修守禦之備歴歴可觀今若較其小疵便以為罪不顧其盡忠報國之節其不恕亦已甚且開封宗廟社稷之所在茍欲罷澤别選留守不識今之縉紳其威名政績亦有加於澤者乎伏望聖慈上為宗社下為億萬生靈特賜主盟厚加任使疏入上大悟詔朝廷别無行遣亦無臣僚章疏仍封景衡奏示澤由是澤賴以安九月己丑建州軍亂壬辰河北經制使馬忠貶秩二等坐逗遛不進也於是黄潛善汪伯彦共政方決䇿奉上幸東南無復經制兩河之意矣詔江池饒建州所鑄錢以建炎通寶為文甲午東京留守宗澤引兵至河北視師且乞罷講和仍修武備丁酉詔荆襄關陜江淮皆備巡幸並令因陋就簡毋得搔擾凡所過與所止之處當使百姓莫不預知朕飲食取足以養氣體不事豐美亭傳取足以庇風雨不易卑陋仗器輕便不求備用供帳簡寡不求備儀可賫以行皆無取於州縣橋梁舟楫取足濟渡道路毋治官吏毋出一切無所追呼有司百吏敢搔擾者重寘於法惟是軍馬芻粮必務豐潔將士寨柵必令寛爽官吏毋得少懈播告諸道咸使聞知庚子宗澤自河北引兵還京師壬寅河北西路招撫司參謀官王圭陞招撫判官代張所也於是所落直龍圖閣嶺南安置死貶所起居舍人衛膚敏言今二聖北狩鑾輿未復寰宇痛心况陛下抱父兄之念為何如哉惟陛下至誠克己處心積慮不忘報雪之志處堂陛則思二聖乖温凊之宜御飲食則思二聖失膳羞之節念土地有所未復念人民有所未安日慎一日深自貶損卑宮室菲飲食惡衣服减嬪御之數斥聲樂之奉以至嵗時上夀春秋賜燕一切罷之雖享郊廟亦不用樂必俟奉迎二聖歸復宫庭然後修禮之常庶幾孝悌之誠上有以格天下有以感人人心得而天意孚則我之所向無有不遂矣乙巳東京留守宗澤復上表請車駕還京師時澤募戰士守京城且造决勝戰車千一百乗毎乗用五十有五人運車者十有一執器械輔車者四十有四回旋曲折可以應用又據形勝立二十四壁於城外駐兵數萬澤徃来按試之周而復始沿大河鱗次為壘結連兩河山水寨及陜西義士開五丈河以通西北商旅京畿瀕河七十二里命十六縣分守之縣各四里有竒皆開濠深廣丈餘於其南植鹿角又團結班直諸軍及民兵之可用者乃上表略曰今逆胡尚熾羣盗繼興比聞逺近之驚傳已有東南之巡幸此誠王室安危之所係天下治亂之所關慮増四海之疑心謂置兩河於度外因成解體未諭聖懐儻敵人乗之而縱横則中國將何以制御不報澤又上疏曰陛下回鑾汴京是人心之所欲妄議巡幸是人心之所惡又不報澤遂抗疏極言京師祖宗二百年基業陛下奈何欲棄之以遺海陬一狂㓂今陛下一歸王室再造中興之業復成如以臣為狂率願延左右之將士試一詢之不獨謀之一二大臣天下幸甚澤毎疏奏上以付中書省黄潛善汪伯彦皆笑以為狂張慤獨曰如澤之忠義若得數人天下定矣二人語塞丁未中書舍人劉珏言黄潛厚為户部尚書潛厚乃潛善之親兄祖宗以来未有弟為宰相兄為八座而同居一省者惟蔡京蔡卞蔡攸則不然竊聞潛厚潛善皆有章疏力辭潛善身為宰輔必不肯私其兄以壞祖宗之法潛厚身為法從必不敢冒榮進而負天下之公論從而允之亦所以全其謙抑守法之美而不置之於有過之地疏入上遣張慤諭㫖珏言不已於是潛厚卒改命戊申河北招撫司都統制王彦率禆將張翼白安民岳飛等以所部渡河與金人戰破之遂復新興縣己酉詔諜報金人欲犯江浙可暫駐蹕淮甸捍禦稍定即還京闕不為久計應合行事件令三省樞宻院措置施行募民入貲授官自迪功郎以下凡六等尋命毎路以監司一貟董其事庚戍始通當三大錢於淮浙荆湖諸路用張慤請也慤嚴明通敏論錢榖利害猶指諸掌文移所至破奸若神國用賴以無乏然中書自作酒肆議者或以為苛碎焉壬子詔責授昭化軍節度副使張邦昌賜死始李綱議誅邦昌黄潛善汪伯彦皆持不可及是聞敵以廢邦昌為詞復入冦上將南幸而邦昌在長沙乃共議賜邦昌死乙卯詔成都京兆襄陽荆南江寧府鄧潭州皆備巡幸帥臣修城壘治宫室漕臣積錢粮京城留守宗澤言本朝提封萬里京城號為腹心今兩河雖未敉寧猶一手臂之不伸也乃欲去而之他是并心腹而棄之願陛下且駐蹕南都未可輕議是時宗廟宫室臺省澤皆營繕略備又以東門乃回鑾奉迎之地特増修之河北招撫司都統制王彦及金人戰於新鄉縣敗績彦奔太行山聚衆准備將岳飛引其部曲去自為一軍未幾彦軍復振岳飛單騎扣壁門請罪左右勸彦斬之彦壯其勇而惜其才賜飛巵酒而罷自是兩人始有隙冬十月丁巳朔上登舟幸淮甸翌日發南京戊午隆祐太后至揚州庚申東京留守宗澤復上疏論其治兵大略且言今年河流不氷請上還京消滅敵冦又言陛下奈何偏聼奸邢之語以巡幸為名於偏逺州軍為朝宗之地言極切至始澤所建明上多報可惟經三省樞宻院則毎為黄潛善等沮之至是澤條上五事臣竊見黄潛善福建人汪伯彦徽州人內張慤雖是北人然無公議無逺見議論偏頗皆欲贊陛下南幸旣而澤見詔書有竢四方稍定即還京闕之語壬戍澤上表以謝澤理財有方凡兩河及京西諸郡求軍須者皆輟東京所有與之不以為間上遣中使撫問旣而澤聞上已南幸又上疏請還京且言欲遣閭勍王彦各統大軍盡平賊壘望陛下早還京闕臣之此舉可保萬全或奸謀蔽欺未即還闕願陛下從臣措畫勿使奸臣沮抑以誤社稷大計陳師鞠旅盡掃胡塵然後奉迎鑾輿復還京闕以塞奸臣之口以快天下之心上優詔答之癸亥募羣盗能併滅賊衆者授以官甲子觀文殿大學士提舉杭州洞霄宫李綱落職依舊宫祠時殿中侍御史張浚論綱罪未巳章再上乃有是命丁卯御營使司都統制王淵為捉殺杭州盗賊制置使有內侍自京賫內府珠玉二囊来上上投之汴水翌日以諭輔臣黄潛善曰可惜有之不必棄無之不必求上曰太古之世摘玉毁珠小盗不起朕甚慕之庶幾求所以息盗耳初太祖少子秦康惠王生英國公惟憲惟憲生新興侯從郁從郁生華隂侯世將世將生東頭供奉官令繒令繒生子偁中進士第至是為嘉興丞一夕其妻張氏夢神人自稱崔府君擁一羊謂之曰以此為識已而有娠戊寅生子伯琮是夕赤光滿室如日正中或聞庭下馬嘶劍甲之聲己卯上次寶應縣御營後軍作亂孫琦者為之首左正言盧臣中從駕不及立船舷叱賊為所逼墜水死上命求臣中所在得之水中拱立如故殿中侍御史張浚以為雖在艱難中豈可廢法乃劾統制官韓世忠師行無紀士卒為變詔世忠罰金中書舍人劉珏言無以懲後浚再上章論且乞擒捕為變者乃降世忠觀察使上下聳然始知有國法李則言舊制閩廣市舶司抽解舶貨以貴細者計綱上京餘本州打套出賣大觀後始盡令計綱費多而弊衆望復舊法從之庚辰命御營使司提舉一行事務劉光世討鎮江府叛兵御營統制官苖傅從光世行癸未上至揚州駐蹕州治舊制三衙管軍未嘗內宿至是始日輪一貟直宿行宮詔內侍不許與統兵官相見如違停官送逺惡州編管時入內內侍省押班康履以藩邸舊恩用事頗忽諸將諸將多奉之而臺諫無敢言者兩浙制置使王淵率統制官張俊等至鎮江府軍賊趙萬等不知其猝至皆解甲就招淵等紿賊以過江勤王其步兵先行毎一舟至岸盡殺之餘騎兵戮於市無得脱者戊子提舉杭州洞霄宫李綱鄂州居住時殿中侍御史張浚等論綱素有狂愎無上之心復懷怏怏不平之氣而常州風俗淺薄知有李綱而已萬一盗賊羣起藉綱為名臣恐國家之憂不在金人而在蕭墻之內故有是命中書舍人汪藻草制曰朋姦罔上有虞必去於驩兠欺世盗名孔子首誅於正卯辛卯朝奉郎王倫為大金通問使時河東軍前通問使傅雱副使馬識逺至汴京詔趣還復遣倫與王弁見宗維議事宗維即尼雅滿乙未同知樞宻院事張慤守尚書左丞兼提舉户部財用工部尚書顔岐同知樞宻院事乙巳詔自今被受中使傳宣者畫時宻具所得㫖實封以聞如事有未便者許執奏又詔凡宣㫖及官司奏請事元無條貫者並中書樞宻院取㫖非經三省樞宻院者官司毋得受復舊典也丙午尚書左丞張慤守中書侍郎兼職如故戊申同知樞宻院事顔岐守尚書左丞兼權門下侍郎御史中丞許景衡守尚書右丞刑部尚書郭三益同知樞宻院事辛亥中書舍人汪藻言軍政不修則無以立國望特詔侍從官以上各以所見考古軍制可行於今者條具以聞從之金人陷河間府十有二月丙辰朔詔朕朝夕延見大臣咨訪庶務羣臣進對隨事盡言退閲四方奏牘少空則披覽載籍鑒觀前古獨於講學久未遑暇念雖羽檄交馳巡幸未定亦不可廢其以侍從四貟充講讀官萬幾之暇就內殿講讀先是御史中丞王賓乞開講筵上納其言故有是㫖詔諸路轉運司類省試以待親䇿先是諸州發解進士當以今春試禮部㑹國難不果上以道梗難赴乃命諸路提刑司選官即轉運司所在州類省試丁巳詔朕罔好游畋有以鷹犬輒稱御前者流海島辛酉初命侍從監司郡守各舉所知一人至是悉命赴都堂審察除應待報人外皆罷之御營使司都統制王淵入杭州淵與統制官張俊馳至城下傳呼秀州趙龍圖来賊陳通出不意遂出迎淵後三日淵俊入州治命軍士分守諸門通等立於譙門之外淵召其首三十人至庭下遽執之遂執其餘黨於門外悉要斬之凡百八十餘人俊取杭州甲妓張穠以歸癸亥金人犯氾水關初左副元帥宗維聞上幸維楊乃約諸帥分道入冦中原大震甲子徽猷閣待制邢煥為光州觀察使用右諫議大夫衛膚敏論也膚敏上疏論三事一曰守法度二曰慎爵賞三曰正紀綱何謂守法度祖宗之法后族戚里不得任文資迺者邢煥除徽猷閣待制孟忠厚除顯謨閣直學士士大夫莫不驚駭願改正煥及忠厚官職悉從舊法疏入上以隆祐太后故未忍奪忠厚職名乃詔邢煥可特換光州觀察使乙丑諫官衛膚敏言比来王義叟除命㫖自中出用御寶以行下旣不由宰臣之進擬又不由銓部之差注議者咸謂因戚里佞幸干請而與之願特詔有司自今除授并行遣有罪之人並須經由三省及宰執進呈方得施行或有干求請托乞御寶以行下者並重寘於法令御史臺覺察以聞庶幾政事之本一出朝廷而天下治從之戊辰衛膚敏上疏論營繕工作內降錫賚四事給事中劉珏亦奏疏論內降營繕二事上皆嘉納之京兆府路經略制置使唐重度敵且入以書别其父克臣曰忠孝不兩立義不茍生以辱吾父克臣報之曰汝能以身狥國吾含笑入地矣重聞敵已濟河復移書成都漕臣趙開属以身後見者皆義之庚午除名勒停人李志道復添差入內内侍省都知志道憲養子靖康末坐典砲失職有㫖逺竄至是復用之衛膚敏言志道在上皇朝弄權怙寵勢可炙手撓法害政以亂天下其惡不在童貫譚稹梁師成之下奈何用赦復之上亟寢其命甲戍羅索犯同州守臣鄭驤死之丙子詔侍讀官於所讀書內或有所見許讀畢具劄子奏陳用翰林學士朱勝非請也宣政使容機落致仕與外任宫觀旣草詞衛膚敏言自古宧官用事未有不為國家患者帝王作興當蒐求賢佐以自輔未聞有求閹宦於閒退之中而進用之者命遂格戊寅言者請以臺諫論奏係國之治亂民之休戚有禆今日政事可以為鑒戒者陳諸黼扆之側詔自来年正月為首置簿令大臣擇其已施行者編寫進入庚辰給事中劉珏試尚書吏部侍郎右諫議大夫衛膚敏試中書舍人初膚敏受命纔再旬言事至十數黄潛善等忌之㑹膚敏論孟忠厚未巳珏言憲度者祖宗所以維持天下列聖奉之而不敢違者陛下欲承隆祐太后之意而拂於祖宗之法臣恐非所以為孝也忠厚與煥均以外戚而備超擢均以文資而得法從今一則易以廉車一則尚仍舊授臣恐非所以為公也疏入詔忠厚係隆祐太后之親宜體朕優奉太后之意書讀行下於是潛善等批上意諭珏珏堅持不可膚敏奏若臣言是則當罷忠厚法從之職臣言非則當正臣妄言之罪詔朝廷以次遷除非由論事膚敏力辤遂與珏俱謁告不出提舉西京嵩山崇福宫楊時試尚書二部侍郎時年七十五矣時入見首言自古聖賢之君未有不以講學為先務者上深然之中書舍人劉觀試給事中觀嘗言今日之患在中國不在夷狄在朝廷不在邉鄙在士大夫不在盗賊臣願陛下委諫官御史取崇寧以来饕餮富貴尤亡狀之人編為一籍已死者著其惡未死者明其罪且曰此以開邉用兵進者也此以花石應奉進者也此以三山河賞進者也此以刻剥聚歛進者也此以交結宦官貨賂權倖進者也如此之類列為數十條槩其罪惡疏其名氏有司鏤板播告天下與衆棄之如此夷狄聞之莫不畏盗賊聞之莫不服疏奏上嘉納遂命臺諫具名以聞三省樞宻院參酌省臺各錄副本不許堂除及任守令後不果行初温杭二州上供物寄留鎮江其間椅卓有以螺鈿為之者守臣錢伯言奏發赴行在上惡其靡亟令碎之通衢詔自今服采在職其各悉心極言凡言動舉措之過差曁軍旅財用之闕失人情之逆順政事之否臧號令不便於民法制無益於國若時施設咸得指陳切至而有根源忠鯁而無顧忌亟當奬擢昭示􅂆旌臣留正等曰忠言之於國猶脉理之於身也脉理通而後身安忠言用而後國治否則手足不相為用君臣不能無異意矣漢髙祖唐太宗俱以能聼言而開創大業武帝奢縱能容一汲黯武后􅁋虐能容一狄仁傑而不至於亂亡言之有益於人之國也如此大上皇帝導臣使言委曲開諭無所不至三紀之間博謀兼聼見於施設者不可勝紀間有逆耳咈意之論自敵已以下受之所不能堪者亦欣然聼用而不拒非甚盛徳其何能爾中興之功有光前代端自是而致宋史全文卷十六上欽定四庫全書宋史全文卷十六下宋高宗二戊申建炎二年春正月丙戍朔上在揚州戊子金女真萬户銀朱陷鄧州轉運副使劉汲攝守事敵大至汲死之丁亥詔略曰河東河北郡縣自太原真定失守之後皆困攻圍官吏軍民誓以死守在昔兵火之際有一城固守不下則褒載信史夸耀後世今數千里之廣億萬之衆無一人忍負國者忠義之俗前古未有訪聞失職之吏失次之軍失業之民渡河東南者未有所歸其令帥臣監司悉心謀置分布收係壬辰知鎮江府錢伯言奏已依處分螺鈿椅桌於市中焚毁萬姓觀者莫不悅服上曰朕早来語御史張浚還淳返朴須人主以身先之天下自然向化詔併真州𣙜貨務都茶場於揚州以行在務場為名以黄潛厚言真州地近行在而兩處積鈔非便故也金人犯東京至白沙鎮留守宗澤遣兵撃却之癸巳復置明法科嘗得解或被貢人許就試乙未詔自今犯枉法自盗贓人令中書省籍記姓名罪至徒者永不叙用按察官失於舉劾者並取㫖科罪不以去官原免時議者以為崇觀以来贓吏甚衆其害民甚於盗賊故條約之戊戍羅索陷長安守臣京兆府路經略使唐重死之陕府西路轉運副使桑景詢判官曽謂京兆府路提㸃刑獄公事郭忠孝經略司主管機宜文字王尚及其子建中與馬步軍副總管楊宗閔皆死提舉軍馬陳迪猶率餘衆巷戰嘔血誓衆敵大入死之忠孝逵子嘗事程頥授其易與中庸學己亥河南尹孫昭逺為叛兵所殺葉夢得提舉江州太平觀坐守杭州軍變故也庚子主客貟外郎謝亮持詔書賜夏國主乾順何澤為大學博士偕行敵游騎至京城下見宗澤不之備疑不敢入是日統制官劉衍與敵遇於板橋敗之追擊至滑州又敗之敵引去辛丑入內內侍省押班邵成章除名南雄州編管時金人攻掠陜西京東諸郡而羣盗起山東黄潛善汪伯彦皆蔽匿不以奏及張遇焚真州去行在六十里上亦不聞成章上疏條具潛善伯彦之罪曰必誤國上怒故有是命也臣留正等曰自古人君求言之路至廣也上自公卿百執下逮芻蕘庶人惟宦官宫女不與焉豈以其皆無能言者與直以其非所當言爾非所當言而言借曰有益已非所宜况其未必有益而常至於黨邪害正者乎唐明皇時雲南數䘮師邊將擁兵太盛在朝之臣無一敢言髙力士一日獨為明皇言之可謂切矣而論者猶以為朝廷無賢百官失職而至於宦者言天下事蓋深為明皇不取也邵成章言大臣之失未必非衆人之所難言者太上皇帝謂祖宗以来所未有蓋以為非所當言而言故㫁然竄黜之可謂深得聼言之道矣且內侍毁大臣固在所當責而其輒為之譽者亦豈免妄言之罪或毁或譽俱不由於左右近習而以至明来天下之公論不亦善乎劉豫阜城人世為農至豫始舉進士中書侍郎張慤與豫有舊力薦於朝除知濟南府時山東盗起豫欲易東南一郡而執政皆拒之豫痛憾而去金人陷鄭州通判州事趙伯振率兵巷戰為流矢所中墜馬敵剖其腹而殺之癸卯金人陷濰州時右副元帥宗輔引兵犯山東而京東無帥朝議大夫周中世居濰州獨不肯去率家人乗城拒守中弟辛盡散其財以享戰士城陷中闔門百口皆死守臣韓浩亦遇害浩琦孫也宗輔又陷青州知臨淄縣陸有常率民兵拒守死於陣知益都縣張侃知千乗縣丞丁興宗亦死甲辰知夀春府康允之奏丁進解圍上謂輔臣曰此郡守得人之效也卿等六人宜廣詢人才若人得二人則列郡便得十餘守稱職然須參議不可狥私尋遷允之直龍圖閣時進旣受閣門宣贊舍人京城外巡之命遂引所部屯京城徃參留守宗澤將士疑其非真主管侍衛步軍司公事閭勍等請以甲士隂衛澤曰正當披心待之雖木石可使感動况人乎及進至澤拊勞甚至待之如故吏進等感服翌日請澤詣其壁澤許之不疑進益懷感畏後其黨有隂謀以亂京師者進自擒殺之丁未詔曰凡今日奪攘縱暴之侣皆異時忠義向方之人白日照臨明爾遷善之意皇天覆幬監予止殺之誠應盗賊能回心易慮散歸田野或失業不能自還者令所在官司條具以聞朕當區處其日前罪犯一切不問臣留正等曰民流散而至於奪攘皆非其本心茍生朝夕失計而為之也從而殱之不為無罪要非先有以化誨而使之自新聖人不忍遽絶之也斯詔之頒勉其遷善之意諭以止殺之誠丁寧懇惻亦云至矣昔周之於頑民勿庸殺而姑民教之且曰我惟一人弗恤弗蠲乃事時同於殺盖言為亂而我不哀恤之不蠲潔之雖民以罪致死與我殺之何異周之待頑民如此卒能致其保受威命明徳同於友民忠厚之風詩人歌之切讀斯詔豈非所謂忠厚之至東京留守宗澤復奉表請上還京師且曰京師乃太祖大一統之本根薄海內外莫不率俾之地陛下奈何不念四海生靈切切徯后之意乃偏聼奸邪之言託為時巡駐蹕淮甸不思二帝蒙塵朝夕懐迎取之志陵寢園廟久缺祭祀願陛下以祖宗二百年基業為意早敕回鑾則天下皆知一人来歸盗賊屏息夷狄鑠謀辛亥詔曰近緣臣僚論列乞以崇寧以来無狀之人編為一籍已降指揮候諫官御史具到令三省樞宻院參酌施行然念才行難於兼全一𤯝不可終廢當宏大度咸俾圖新除參酌到罪惡深重不可復用人外並許隨材選任如顯有蹟效可以補前行之失者因事奏陳特與湔洗仍許擢用兩浙制置使王淵招賊張遇降之得其軍萬人𨽻世忠壬子顯謨閣直學士提舉醴泉觀孟忠厚為常徳軍承宣使用臺諫給舍六章論列也仍詔后族自今不得任侍從官著為令詔以京師乏粮出𣙜貨務錢五十萬緡付留守司召江淮兩浙商人入中癸丑太學生魏祐上書論黄潛善汪伯彦誤國十罪不報金人陷頴昌府守臣孫黙為所殺二月乙卯朔言者請令羣臣入對其所得上語除機宻外關治體者悉錄付史官從之丙辰詔太史局天文自今除報御前外並不許報諸處敵再犯東京宗澤遣統制官李景良閻中立統領官郭俊民等領兵萬餘趨滑鄭遇敵大戰為敵所乗中立死之俊民降敵景良以無功遁去澤捕得謂曰勝負兵家之常不勝而歸罪猶可恕私自逃遁是無主將也即斬之旣而俊民與敵將史姓者及燕人何祖仲直抵八角鎮都巡檢使丁進與之遇生獲之敵令俊民持書招澤澤謂俊民曰汝失利就死尚為忠義鬼今乃為敵游說何靣目見人邪捽而斬之謂敵將曰上屯重兵近甸我留守也有死而已何不以死戰我而反以兒女語脅我邪又斬之謂祖仲本吾宋人脅從而来豈出得已解縛而縱之諸將皆服癸亥罷在京及諸路市易務以其錢輸左藏庫惟抵當庫仍舊甲子金人犯滑州東京留守宗澤聞之謂諸將曰滑衝要必争之地失之則京城危矣不欲再勞諸將我當自行果州防禦使張撝曰願効死澤大喜即以鋭卒五千授之乙丑開封府判官范延世奉宗澤表至行在上諭以旦夕北歸之意澤復上表以謝丁卯復延康殿學士為端明殿學士述古殿直學士為樞宻直學士從舊制也己巳張撝至滑州身率將士與金迎敵衆且十倍諸將請小避其鋒撝曰退而偷生何面目見宗元帥鏖戰數合日暮敵少却澤遣統制官王宣以五千騎徃援未至撝再戰死之後二日宣至滑州與敵大戰於北門士卒争奮敵出不意退兵河上宣曰敵必夜濟収兵不追半濟而擊之斬首數百所傷甚衆澤即命宣權知滑州且令載撝喪以歸為之服緦厚加賻䘏仍請於上贈撝拱衛大夫明州觀察使錄其家四人敵自是不復犯東京矣辛未殿中侍御史張浚試侍御史時浚方上疏論祕書省正字胡珵自託李綱服童僕之役而出入其寢室朝夕交結隂中善良逮綱遭逐營為百計宻招羣小鼓唱浮言陳東之書珵實筆削意欲使布衣草莱之士挟天子進退大臣之權一時閧然幾致召亂按珵罪状天地不容願禠奪官爵投之荒裔永為臣子立黨不忠之戒詔自今犯枉法自盗贓抵死者籍其貲時議者以為贓吏之盛所在填溢願明詔有司應緣贓得罪及曽經按發跡狀明白並毋得與堂除及親民自今有犯者仍籍其貲即監司守倅失按郡縣及監司失按守倅與失於互察者並科違制之罪不以去官原免上酌其言乃詔贓情俱重者籍沒餘從之祕書監李朴立朴舉進士國學禮部皆第一操履勁特自為小官天下髙其名蔡京將強致之俾其所厚導意許以禁從朴力拒不見京怒形於色然終不害也壬申中書舍人汪藻滕康衛膚敏並罷或曰膚敏等在後省數論事為黄潛善所惡故斥之癸酉銀朱陷蔡州知汝陽縣丞郭贊朝服罵敵不肯降而死甲戌詔曰自来以內侍官一貟兼鈐轄教坊朕方日拯憂念屏絶聲樂近緣內侍官失於檢察仍帶前項可减罷更不差置丙子金人陷淮寧府知府事向子韶死之其弟新知唐州子褒等與闔門皆遇害子韶子諲兄也己夘胡珵勒停送梧州編管用張浚章疏也庚辰禮部請令曽得解及免解武舉人就淮南轉運司附場類省試從之三月丙戍先是執政以山東盗賊踵起建請敕榜東京其詞有云遂假勤王之名公為聚冦之患宗澤恐豪傑解體是日上疏言自移淮甸強盗如蝟毛而起正以去朝廷逺無所歸至於此耳臣謂自京城圍閉天下忠義之士梯山航海數千里争先勤王者大臣不能撫而用之使之饑饉流離弱者填溝壑強者為盗賊此非勤王之人罪皆一時措置乖謬耳今河東河西不隨畨賊而自保山寨者不知其幾千萬人諸處節義士夫不愛其身而自刺其面為争先救駕者亦不知其幾陛下以勤王者為賊則此二者豈不失其心邪此皆詞臣失職之過願陛下黜代言之臣更降罪已之詔許還闕之期則天下之人盡皆遷善逺罪不犯有司豈復有為盗者不報時有王䇿者本遼舊將善用兵敵以千餘騎付之徃来河上澤宻遣統制官王師正擒之釋縛解衣坐之堂上為言契丹本我宋兄弟之國汝何不悟義恊討以刷社稷之耻䇿感泣誓以死報澤時呼䇿與語䇿具言敵中虛實澤又益喜大舉之計遂决尚書工部侍郎楊時兼侍講辛卯金人陷中山府自靖康末受圍至是三年乃陷甲午詔經筵讀資治通鑑遂以司馬光配享哲宗廟庭時上初御經筵侍講王賓講論語首篇至孝悌為仁之本因以二聖母后為言上感動涕泣侍讀周武仲進讀通鑑上掩卷問曰司馬光何故以紀綱為禮武仲敷述其義甚詳因為通鑑解義以進毎至安危治亂之機必旁搜逺紹極其䂓諫焉侍讀朱勝非嘗言陛下毎稱司馬光聖意有恨不同時之嘆陛下亦知光之所以得名者乎蓋神宗皇帝有以成就之也熈寧間王安石創行新法光毎事以為非是神宗獨優容乃更遷擢其居西洛也嵗時勞問不絶書成除資政殿學士於是四方稱美遂以司馬相公呼之至元祐中但舉行當時之言耳若方其争論新法之際便行竄黜謂之立異好勝謂之沽譽賣直謂之非上所建立謂之不能體國謂之不遵禀處分言章交攻命令切責亦不能成其美矣上首肯久之己巳東京留守復上疏乞車駕還京時澤招撫河南羣盗聚城下又募四方義士合百餘萬粮支半嵗澤聞兩河州縣敵兵不過數百餘皆脅使服日夜望王師之来即召諸將約日渡河諸將皆掩泣聼命澤乃上疏大略言祖宗基業可惜又陛下父母兄弟蒙塵沙漠日望救兵河北河東京之東西陜西淮甸間億萬生靈之衆陷於塗炭乃欲南幸湖外蓋姦邪之臣一為金人方便之計二為姦邪親属皆已津置在南為臣不忠一至於此時上遣中使譚璨賫詔書茶藥撫諭澤上表謝又請上還京師庚子河南統制官翟進復入西京宗澤言於朝即以進知河南府充京西北路安撫制置使石壕尉李彦仙復陕州事聞即以彦仙知陜州兼安撫司事彦仙以信義治陕與其下同甘苦由是人多歸之信王榛旣唱起義兵即遣和州防禦使馬廣赴行在先以其疏附東京留守宗澤以聞夏四月甲寅朔磁州統制官趙世隆以所部詣宗澤降世隆本磁州書佐澤在磁以為中軍將澤既去磁以州事付兵馬鈐轄李侃金人圍磁州急州有禁軍有民兵民兵甚衆禁軍恐其勢盛將校郭進乃作亂世隆與進謀遂殺侃以通判趙子節權州事至是世隆與其弟世興將三千人歸澤將士頗疑之澤曰世隆吾一校耳必無他有所訴也乙卯世隆入拜澤面詰之世隆辭服澤笑曰河北陷沒而吾宋法令上下之分亦陷沒邪命引出斬之時衆兵露刃於庭世興佩刀侍側左右皆懼澤徐語世興曰汝兄犯法當誅汝能奮志立功足以雪耻世興感泣㑹滑州報敵騎留屯城下澤謂世興曰試為我取滑州世興忻然受命丙辰詔文臣從官至牧守武臣管軍至遥郡各薦所知二人置為二籍一留禁中一付三省樞宻院遇監司帥守將官鈐轄有闕於所舉人內擢用之犯贓連坐即罪廢及法不當得之人皆毋得舉用議者請也戊午趙世興至滑州掩虜不備急攻之斬首數百得州以歸宗澤復厚賜之時有降冦趙海者屯板橋輒塹路以阻行者管軍閭勍芻者八人過其壘海怒而臠之覘事者以告澤召之海以甲士五百自衛而入澤方對客海具伏即械之繫獄客曰彼甲士甚衆姑徐之澤笑謂其次將曰領衆還營明日誅海於市聞者股慄統制官楊進屯城南王善者有衆二千餘皆山東游手之人先進来降屯城北二人氣不相下一日各率所部千餘相拒於天津橋都人頗恐澤以片紙諭之曰為國之心固如是邪當戰陣立功時勝負自見二人相視慙沮而退己未詔除京畿東西河東北陜西路許置巡社外餘路並罷先是杭温二州言已就緒詔許存留至是亦罷宗澤復上表請上還京略曰陛下有姦臣之臆說凴金人之詭辭忘周室之中興循晉惠之徃轍時契丹九州人日有歸中國者間有捕獲敵衆澤選契丹漢兒引近坐前推誠與語諭以期奮忠義共滅金人以刷父君之耻即給資粮遣之且賜以公慿竢官軍渡河以為信驗人令持數百本去又為榜文散示陷沒州縣及為公據付中國被敵在此之人因驛疏以聞澤遂結連諸路義兵燕趙豪傑嘗謂人曰事可舉矣必竢回鑾當以身先之故請上歸京尤力庚申詔御前軍器所見織戰袍工匠發還綾錦院依限織進初命監綾錦院姜煥擇良工就御前軍器所專織戰袍欲以賜有功將士中書侍郎張慤等言於上曰前日中人因事輒置局紊亂紀綱不可不深鑒今若以織文責綾錦院而使少府監督其程限則事歸有司於體為正上曰甚善故有是命上諭大臣曰故事端午罷講筵至中秋開朕以寡昧適兹艱難知學先王之道為有益方孜孜經史若講筵暫輟則有疑無質徒費目力朕欲勿罷可乎大臣皆稱善乃詔勿罷時上在宫中內侍有言講讀官某人敷陳甚善臣今擬奬諭詔書以進上曰此當出自朕意若降詔書自有學士爾等小臣豈宜不安分如此臣留正等曰閹寺之禍著矣佞柔側媚以狗馬聲色惑其君禍之小者也剽略書傳誦說古今以才藝自售則其為禍豈易測哉建炎之初天子厲精求治而宦者投隙肆言猶敢如此亦可謂姦人之雄矣非聖武英㫁絶其萌芽則基亂胎禍將何所不至嗚呼方其伺顔色售方藝能赫然拒絶之固已難矣又暴其情狀盡告大臣豈不甚難哉至於清心寡欲屛逺聲色皆中興之本臣是以論著之特詳焉乙丑上諭輔臣曰朕毎退朝押班以下奏事亦正衣冠再坐而聼未嘗與之欵昵又性不喜與婦人久處多坐殿傍小閣筆硯外不設長物静思軍國大事或閲章疏宫人有来奏事者亦出閣子外處分畢而後入毎日如是上恭已勤政如此戊辰尚書工部侍郎兼侍講楊時以老疾求去章四上旣而除龍圖閣直學士提舉杭州洞霄宫河北招撫司都統制王彦與金人戰於太行山大敗之東京留守宗澤復抗疏請上還京且言丁進有衆數十萬願為陛下守京城李成願扈從還闕即渡河勦絶金冦楊進等領衆百萬亦願渡河兹二頭項人皆同寅協恭共濟國事願陛下速歸九重盗賊戎虜皆無足畏矣澤以他日迎奉二聖還京先修龍徳宫以備道君皇帝臨御以淵聖皇帝未有宫室奏修寶籙宫為之不報皇弟信王榛為河外兵馬都元帥初馬廣至東京見宗澤至是始赴行在廣旣見出榛奏事於是廣特遷元帥府馬步軍都緫管廣將行奏四事上皆從之又許廣過河得便宜從事時汪伯彦黄潛善終以為疑乃以烏合之衆付廣且宻授朝㫖使幾察之廣行復令聼諸路帥臣節制廣知事變遂以其軍屯於大名五月甲申朔宗澤再上表乞還京且言今城壁已増固樓櫓已修飾龍濠已開濬兵械已足備寨柵已羅列戰陣已習熟人氣已勇銳蔡河五丈河皆已通流陜西京東滑臺京洛畨賊皆已掩殺望陛下毋聼姦邪之言以失兩河山寨之心沮萬民敵愾之氣而循東晉旣覆之轍奏未至㑹尚書右丞許景衡建請渡江宰相黄潛善持不可朝廷旣得信王榛奏或言榛有渡河入京城之謀乙酉下詔還京詔略曰朕即位之初踟蹰近服李綱上江左之章繼執南陽之議鳩工藏事寖失時幾旋為淮甸之行就弭冦攘之患守中原而弗逺見朕意之所存昨稽時措之宜黙辦言還之計設施有序播告未先或者不知尚多有請可無委積以謹備虞宜令發運司盡起淮浙入京物解及軍須輜重等物以次發遣赴京師朕將還闕躬謁宗廟丙戌詔後舉科場講元祐詩賦經術兼收之制中書省請習詩賦舉人不兼經義習經義人止習一經解試省試並計數各取通定髙下禮部侍郎王綯嘗為上言經義當用古注不專取王氏說上以為然至是申明行下戊子翰林學士朱勝非守尚書左丞己丑宗澤再奏乞掃洒龍徳而改建寶籙宫使天下知陛下孝於父而悌於兄乞自御前處分不報澤又上疏言今不忠不義之臣但知身謀謂祖宗基業不足䘏謂宗廟社稷不足顧謂二聖后妃親王不足救謂山陵園寢不足䕶謂周室中興不足效謂晉惠覆轍不足羞效巡狩之名守偏伯之地儲金帛以為敵資修器械以為敵用慮勇敢之殘敵則禁守禦之招募慮流移之安業則掊保甲以助軍凡誤國之事靡不為之願陛下以此章揭之朝堂令朝臣指摘如臣言涉狂妄乞明正典刑不然乞明告回鑾之期以安天下之聼上優詔答之辛卯陜西京東諸路及東京北京留守並奏金人分道渡河詔遣御營左軍統制韓世忠主管侍衛步軍司公事閭勍率所部迎敵命宗澤遣本司統制官楊進等援之先是澤聞河北都統制王彦聚兵太行山即以彦為忠州防禦使制置兩河軍事彦所部勇士萬數以其靣刺八字故號八字軍彦方繕甲治兵約日大舉欲趨太原澤亦與諸將議六月起師且結諸路山水寨民兵約日進發上奏曰臣欲乗此暑月遣王彦等自滑州渡河取懐衛濬相等州遣王再興等自鄭州直䕶西京陵寢遣馬廣等自大名取洺相真定楊進王善丁進李貴等各以所領兵分路並進旣渡河則山寨忠義之民相應者不啻百萬契丹漢兒亦必同心殱殄金人事方就緒乞朝廷遣使聲言立契丹天祚之後講吾舊好以攜敵情遣知幾辯博之士西使夏東使髙麗諭以禍福必出助兵同加掃蕩如此則二帝有回鑾之期兩河可以安帖矣願陛下早下還京之詔臣當躬冒矢石為諸將先則我宋中興之業必可立致若陛下以臣言為不可用望賜骸骨放歸田里疏入黄潛善等忌澤成功從中沮之澤歎曰吾志不得伸矣因憂鬱成疾澤尹京幾嵗修城池治樓櫓不擾而辦屢出師以挫虜鋒其抗疏請上還京凡二十餘上言極切至潛善與汪伯彦等雖嫉之深竟不能易其任也乙未詔蘓軾立朝履歴最為顯著追復端明殿學士盡還合得恩數丙申宇文虚中充大金通問使武臣楊可輔副之尋改虚中為祈請使壬寅中書侍郎兼御營副使提舉措置户部財用張慤薨慤立朝諤諤有大臣節不可干以私惟善許景衡與許翰論事頗合自為執政諫諍愈切無所顧避時黄潛善當國專務壅蔽自汪伯彦而下皆奴事之不敢少忤其意惟慤以直道自持事必力争雖言不行而不少屈秉政未踰嵗遽薨於位士民皆痛惜之癸卯大金通問使王倫始渡河與其副朱弁至雲中見宗維議事金留不遣乙巳提舉杭州洞霄宫許景衡薨景衡罷政而歸至𤓰州得暍疾及京口疾甚端坐自語曰陛下宜近端人正士以二聖蒼生為念陸宣公奏議盡之矣景衡博通經史百家書而其要歸於孔孟嘗曰孔門自洒掃應對以上皆欲中道以故修身行已雖細必矜與朋友言怡怡辭氣及公言廷争正色直前視權倖若無有者丁未復置兩浙福建路提舉市舶司其後遂併廣司復之己酉秀州軍亂詔御營中軍統制張俊討之庚戍増天下役錢以為新法弓手之費癸丑罷借諸路職田自軍興始有拘借之命至是詔圭田士大夫仰以養亷自今毋得借六月乙卯成都府轉運判官靳博文權罷卬州鑄鐵錢以其嵗用本錢二十一萬緡而所鑄纔十一萬緡得不償費故也博文以便宜増印錢引六十二萬緡自後諸大臣相繼視師率増印矣尚書省言檢㑹靖康元年已降指揮人户願將金帛錢糧獻助者計價依條補授名目除河北河東路已降官告外餘路未曽給降詔尚書省度量給付逐路如納及七千貫補承節郎六千貫補迪功郎並不作進納人不得抑勒科配丙辰建州軍再亂葉濃等進犯福州戊午尚書禮部侍郎王綯試御史中丞黄潛善以綯柔懦無能故薦為臺長己未前知通州胡安國已除給事中指揮更不施行初趣赴行在安國因於免奏有言曰臣賦性疎拙全昧事幾前當贊書積日雖淺適緣六押兼管兵刑所降詞頭茍有未便不敢觀望迷誤本朝須至盡忠逐件論執遂因繳奏遍觸貴權貽怒旣多幾蹈不測今陛下撥亂反正將建中興而政事人才弛張升黜凡關出納動係安危聞之道途揆以愚見尚未合宜臣切寒心而况瑣闈典司封駁儻或隐情患失緘黙不言則負陛下委任之恩其罪至大若一一行其職守事皆違異必以戇愚妄發干犯典刑徒玷清時無補國事臣所以不敢上當恩命者也疏入黄潛善大怒言者因論安國被命經年託疾不至要流俗之譽失人臣之禮安國遂罷庚申侍御史張浚知興元府浚好謀有大志數招諸將至臺講論用兵籌䇿浚本黄潛善所引至是因請汰御營使司官属又論無謂虜不能来當汲汲修備治軍常若冦至潛善始惡之浚以母在蜀中求去故有是命未行留為尚書禮部侍郎浚入對上諭曰卿在臺中知無不告言無不盡朕將有為政如欲一飛冲天而無羽翼者卿為朕留當專任用浚頓首謝乙丑御營中軍統制張俊引兵入秀州前知州事趙叔近為所殺秀卒嬰城縱火翌日俊破關捕徐明等斬之丁丑命京畿淮甸捕蝗己卯言者以東南武備利於水戰宜於大江要害處精練水軍廣造戰艦緩急之際庶幾可倚詔江浙州軍措置限一月畢以知延安府王庶節制陕西六路軍馬涇原經略司統制官曲端充節制司都統制復置諸州學官四十三貟初二帝旣徙中京御史中丞秦檜實從旣而聞上中興上皇欲作書貽左副元帥宗維與約和議上皇草書已諭駙馬都尉蔡鞗曰為我示秦檜更潤色之檜讀書嗚咽即厚遣本路都統逹於宗維宗維有慚色秋七月癸未朔資政殿學士東京留守開封尹宗澤薨澤為黄潛善等所沮憂憤成疾疽作於背至是疾甚諸將楊進等排闥入問澤矍然起曰澤固無恙正以二帝蒙塵之久憂憤成疾耳爾等能為我殱滅仇敵以成主上恢復之志雖死無恨衆皆流涕曰願盡死諸將出澤復曰吾度不起此疾古語云出師未捷身先死長使英雄淚滿襟遂薨年七十是日風雨冥晦異於常日澤將沒無一語及家事但連呼過河者三遺表猶贊上還京先言已㳙日渡河而得疾其末曰嘱臣之子記臣之言力請鑾輿亟還京闕大震雷霆之怒出民水火之中夙荷君恩敢忘尸諫澤自奉甚薄方謫居時饘粥不繼吟嘯自如晚年俸入稍厚亦不異疇昔食不兼味衣敝不易嘗曰君父當側身嘗膽臣子乃安居美食耶所得俸賜遇寒士與親戚貧困者輒分之養孤遺幾百餘人死之日都人為之號慟朝野無賢愚皆相弔出涕三學之士千餘人為文以哭澤初澤旣拘留金使上屢命釋之澤不奉詔至是宇文虛中至東京攝留守事遂歸之時上已除澤門下侍郎兼御營副使東京留守命未下而訃聞詔贈觀文殿學士進六官後諡忠簡龜鑑曰吾深惜夫宗澤抱忠義之志竟為䜛沮鬰而不得少伸也澤之尹京數月城築已増固樓櫓已修飾壟濠已開浚寨柵已羅列義士已團結蔡河五丈河已皆通流陕西京東西河東北盗賊皆已歸附又非靖康戰守無備之比然有張仲孝友主於內而後吉甫得以專征戰於外汪黄旣主幸東南之議則宗澤還京之請雖二十疏而何益百計排沮憂憤成疾出師未捷身先死長使英雄淚滿襟蓋亦抱無窮之恨澤死而杜充代之是何異以淵代逖以姜維而續孔明之事功也宗澤在則盗可使為兵杜充用則兵皆為盗矣甲申葉濃自福州引還建州命謝嚮為本路捉殺官又遣御營統制張俊兩浙提刑趙哲將卒二千人偕徃討捕丁亥御筆國步多艱人才為急如蔡京王黼當國日久孰不由其擬授果賢且才豈可不用自今毋得分别時宰相黄潛善本王黼門人故多引黼親黨以進議者非之戊子詔自今士卒有犯並依軍法毋得過為慘酷史臣曰愛而不能令厚而不能使亂而不能治此兵法之患也治軍固不可不嚴然治之自有常法若師出以律孰敢不畏者而諸將過為慘酷豈撫軍之道哉楚州發歸朝官至行在上諭宰執曰聞州郡多囚係此輩甚者至經嵗不得釋少涉疑似則殺之覆幬間皆吾赤子也朕欲發諸郡拘囚歸朝官盡赴行在存撫之庶幾可召和氣臣留正等曰古人有殺一不辜而得夫下弗為者也彼奸雄忍酷之言至曰寧我負人嗚呼人之用心何止天壌之異哉方建炎之初所在盗起如蝟窮荒絶漠狼子野心之人錯諸郡縣有司為之禁防或未過也而太上皇帝推天地覆載之徳視夷夏之民皆吾赤子惻然哀矜形於聖訓凜然有三代王者之風雖漢帝之恢廓大度不足言也彼雖夷狄亦人耳脫身九死之餘譬彼蛇雀豈不知所以報哉辛丑詔以春霪夏旱飛蝗為沴命監司郡守條政事之未便於民者其大水飛蝗最甚之地令百姓自陳量輕重捐其租焉壬寅詔京官知縣兩任已上實及六考方許關陞諸州通判舊法不拘考數至是申明之甲辰降充顯謨閣待制北京留守杜充復樞宻直學士充開封尹東京留守且命充鎮撫軍民盡瘁國事以繼前官之美遵稟朝廷深戒妄作以正前官之失自宗澤薨數日間將士去者十五都人憂之相與請於朝言澤子宣教郎穎嘗居戎幕得士卒心請以繼其父任詔以穎起復充留守判官充無意於敵盡反澤所為由是澤所結兩河豪傑皆不為用八月癸丑朔復諸路常平官遂命諸路拘催青苗積欠本錢自崇寧以来皆不得免甲寅初鑄御寶一曰皇帝欽崇國祀之寶二曰天下合同之寶三曰書詔之寶戊午詔行在左藏庫湫隘自今綱運令户部於江寧平江府置庫管尚書吕頥浩侍郎葉夢得請命江湖二廣綱赴江寧閩浙綱赴平江惟川陕京東西淮南綱赴行在從之庚申殿中侍御史馬仲言陛下龍飛河朔近得黄潛善汪伯彦以為輔相一意委任不復致疑然自大任以来措置天下事未能惬當物情遂使敵國日強盗賊日熾國步日蹙威權日削如吳給張誾以言事被逐邵成章緣上言逺竄今是何時尚以言為諱潛善近来自除臺諫仍多親舊李處遯張浚之徒是也又如張慤宗澤許景衡公忠有才智皆可重任潛善伯彦惡之沮抑至死周任有言曰陳力就列不能者止孔子亦曰危而不持顛而不扶焉用彼相二人方且偃然自任屹然不動伏望速罷潛善伯彦政柄别擇賢者共圖大事疏留中不出承議郎趙子砥自燕山遁歸至行在奏北事甚悉言邇来遣使數輩皆不得達劉彦宗云金國只納楚使焉知復有宋其不可講和明矣賜對嘉㢡以子砥知合州辛酉詔江淮六路量添賣酒錢以為造粮舟之費己巳詔試學官並用詩賦自来年始辛未淮南等路制置發運使梁揚祖遷徽猷閣直學士以措置就緒也茶法自政和以来許商人赴官買引即園户市茶赴合同場稱發淮浙塩則官給亭户本錢諸州置倉令商人買鈔算請毎三百斤為一袋輸鈔錢十八千閩廣塩則𨽻本路漕司官般運賣以助嵗計公私便之自揚祖即真州置司嵗入錢六百萬緡合東南産塩之州二十二鹽為二萬七千八百一十六萬餘斤通収鹽息錢一千七百三十餘萬緡茶引錢二百七十萬餘緡後増至二千四百萬緡而四川三十州嵗産鹽約六千四百餘萬斤後𨽻總領財賦所贍軍成都府路九州利路二州嵗産茶二千一百二萬斤𨽻提舉茶馬司買馬皆不係版曹之經費焉甲戍上䇿諸道正奏名進士於集英殿殿中侍御史馬伸試衛尉少卿乙亥䇿特奏名進士初吏部貟外郎程昌㝢與黄潛善論事不合出知蔡州郡已為金人所破昌㝢招集流民簡練師旅日與羣盗戰毎戰必克遂為強兵九月壬午朔詔以杭州和買絹偏重均十二萬匹於浙東西諸州癸未新除衛尉少卿馬伸責監濮州酒務伸以論事不行辭不拜且錄其所劾黄潛善汪伯彦等疏申御史臺乞誅責詔伸言事不實趣向不正日下送吏部與京東監當促使上道死中路天下寃之甲申丁進叛率衆犯淮西進初受宗澤招澤薨乃去尋命御營右軍副統制劉正彦以所部収進庚寅上御集英殿賜諸路類省試正奏名進士李易等四百五十一人及第出身同出身初有司欲以上十人所對䇿進呈且請以上意定名次上曰朕委主司取士必不錯乃悉從所擬不復更易臣留正等曰恭惟太上皇帝當建炎之初䇿士於庭一委主司不以一人之好惡為之升黜天下之至公也及紹興中權臣罔上假國家之科目以私其子弟親戚則聖斷赫赫然㧞寒畯抑權貴亦天下之至公也惟一出於至公故静則為天地之度動則為之斷傳曰公生明太上皇帝實有焉壬辰詔褚宗諤等二十一人並令乗驛赴行在校書郎富直柔太學生王覺並令赴都堂審察先是黄潛善請用祖宗故事命近臣各舉所知以竢選擇至是得召癸巳金人陷冀州權知軍州事單某自縊死將官李政屢禦退之敵以計誘其副將使害政故不能保而城陷丁酉賜及第進士錢千七百緡為期集費自是以為故事李易等以上憂勞辭聞喜宴從之戊戍上以所書資治通鑑第四冊賜黄潛善時上退朝日覽四方章奏暇則讀經史嘗取孟子論治道之語書之素屏因為潛善言論孟乃㓜年所習讀之了無凝滯後五日又書旅􅋙篇大有大畜卦以示輔臣壬寅統領宻州軍馬杜彦獻赤芝彦言草葉純赤實符建炎美號癸卯輔臣進呈上曰朕以豐年為瑞今宻為盗區且彦所獻何足為瑞其還之甲辰黄潛善等奏謝宣示親書素屏易孟子有㫖勿拜上曰朕自㓜習孟子書至成誦在口不覺寫出如旅獒乃因葉夢得進讀資治通鑑及之又欲寫無逸篇偶其字多屏狭不能容見别營度上又曰如孟子言用賢與殺皆察於國人朕詳味斯言欲謹守之神交尚友如與孟子端拜而議冬十月丙辰河北制置使王彦為閤門宣贊舍人彦至自東京赴行在見黄潛善汪伯彦力陳兩河忠義民兵引頸以望王師言辭憤激大忤潛善伯彦之意遂降㫖免對而有是命庚申命江淮制置使劉光世討李成時成犯淮西故也壬戍詔葉夢得孫覿張澂討論常平法條具取㫖始用覿奏也癸亥初復鈔旁定帖錢先是政和間陳亨伯始議剏經制錢靖康初廢至是先取定帖錢命諸路提刑司掌之經制錢自此始詔御營平冦左將軍韓世忠以所部自彭城至東平中軍統制官張俊自東京至開徳以金人入冦故也仍命河外元帥府緫管馬廣互相應援蓋未知廣已敗也甲子命常徳軍承宣使孟忠厚奉隆祐太后幸杭州癸酉京西北路安撫制置使知河南府翟進戰死進與金人夾河而戰屢破之時東京留守杜充酷而無謀士心不附諸將多不安之馬廣王彦旣還朝餘稍稍引去宗頴屢争不從力請歸持服統制官楊進亦叛進率其軍與楊進戰為賊所害初宗澤日繕兵為興復計兩河豪傑皆保聚形勢期以應澤未出師而澤卒充無逺圖由是河北諸屯皆散而城下兵復去為盗掠西南州縣數嵗不能止議者咎之始命有司討論崇觀以来濫賞丙子詔令到部官自陳有無係討論之人仍結除名罪江淮制置使劉光世敗李成於新息縣成遁走御營都統制劉正彦擊丁進降之分其兵𨽻諸軍十有一月癸未初賣四字師號毎道價二百千甲申提舉西京嵩山崇福宫李綱責授單州團練使萬安軍安置初綱既貶㑹有㫖左降官不得居同郡而責授忻州團練副使范宗尹在鄂州乃移綱澧州居住至是有上書訟綱之寃者御史中丞王綯因劾綱經年不赴貶所又論綱靖康中要功刼寨結衆伏闕覆師太原凡三罪請投之嶺海疏奏遂有是命壬辰金人陷延安府通判府事魏彦明死之先是虜諜知都統制曲端與經略使王庶不協遂併兵冦鄜延時端盡統涇原精兵駐邠州之淳化庶日移文趣其進且遣使臣十數輩徃說諭端端不聼端欲蕩賊巢穴遣吳玠攻華州端與玠㑹於寧之㐮樂延安城陷庶無所歸乃自馳至㐮樂勞軍欲倚端以自副端彌不平謀誅庶而奪其兵不果乃奪庶節制使印而遣之癸巳趙哲與葉濃戰於建州城下大敗之濃遂降其後濃至張俊軍中復謀為變俊執而誅之乙未金人陷濮州又犯澶淵知開徳府王棣率軍民固守為軍民所害經略司主管機宜文字鄭建古亦為亂兵所殺時相州圍久守臣趙不試登城遥謂金人請開門投拜乞勿殺乃具降書啟門而納其宗属於井中然後以身赴井庚子初成都府路轉運判官趙開言𣙜茶買馬五害請用嘉祐故事盡罷𣙜茶仍令漕司買馬或未能然亦當痛減額以蘇園户輕立價以惠行商如此則私販衰而盗賊息矣朝廷然之擢開同主管川陕茶馬是日開至成都遂大更茶法官買賣茶並罷倣政和都茶場法印給茶引使商人即園户市之茶引錢毎斤春七十夏五十市例頭子在外所過征一錢住征一錢有半置合同場以譏其出入重私商之禁號合同場為茶市交易者必由市而引與茶必相隨違者抵罪至四年冬買馬乃踰二萬匹引息錢至一百七十萬緡辛丑樞宻都承㫖邢煥為保静軍承宣使煥嘗為上言馬伸言事切當宗澤忠勞可倚再上疏言黄潛善汪伯彦誤國進戰退守皆無䇿可施壬寅親祀上帝於圜丘配以太祖詔曰朕承祖宗有道之長賴黎獻戴宋之舊嗣守神器適嵗當郊祇見於皇天后土大懼非徳弗獲顧歆乃先事三日繁隂凝翳震於朕心罔燭靈㫖逮祖廟及壇垂象燦炳夜氣晏温風靄澄霽迄用成禮朕旣獲祗事弗敢謂幸矧敢怠康方恐懼修省以靈承扶持全安之眷股肱大臣其同寅協恭思艱圖易輔朕不逮以倡百辟耳目風憲有言達於予聼必忠必誠毋奪於私凡爾有官君子飭躬謹行惟職業是修令部使者曁爾百僚有為有行其必曰毋傷於民毋害於國中國爪牙之臣敵愾戡難毋貽名節羞軍民戰士咸奮忠力毋至失業毋依怙衆為暴甲辰金人犯徳州兵馬都監趙叔皎死之陕州安撫司都統制邵興敗金人於絳州曲沃縣金人陷淄州涇原兵馬都監吳玠襲叛賊史斌斬之葛進圍棣州守臣姜剛之與戰城破為所害初河北制置使王彦旣渡河其前軍准備將岳飛無所属遂以其衆千人降於東京留守杜充時种師道小校桑仲為潰卒所推亦降於充充皆以為將十有二月乙卯隆祐太后至杭州庚申金人陷東平府又攻濟南府守臣劉豫遣其子刑曹掾麟與戰敵圍之數匝通判事張東益兵援之敵乃去即遣人㗖豫以利豫因有邪謀與東偕徃投拜民遮道不從豫遂縋城詣軍前通欵壬戌言者論福建路茶之所自出祖宗以来商販自便望罷鈔法令都茶場照本路嵗額印造茶引付茶事司廣行招誘客人入錢請買計直輕賫赴行在毋得抑配州縣及科率民户僧寺出買引錢從之甲子金左副元帥宗維陷北京河北東路提㸃刑獄公事郭永死之金人陷襲慶府衍聖公孔端友已避冦南去漢兒將啟宣聖墓左副元帥宗維問其通事髙慶裔曰孔子何人曰古之大聖人宗維曰大聖人墓豈可犯皆殺之故闕里得全乙丑金人陷虢州己巳尚書右僕射兼中書侍郎黄潛善遷左僕射兼門下侍郎知樞宻院事汪伯彦守右僕射兼中書侍郎仍並兼御營使二人入謝上曰潛善作左相伯彦作右相朕何患國事不濟宜同心以副朕之意皆稽首謝潛善入相踰年當上初政天下望治潛善獨當國柄專權自恣而卒不能有所經畫伯彦繼相略與之同由是胡冦益無所憚尚書左丞顔岐守門下侍郎尚書右丞朱勝非守中書侍郎兵部尚書盧益同知樞宻院事戊寅禮部侍郎張浚兼御營使司參贊軍事上以邊事未寧詔百官言所見吏部尚書吕頥浩上備禦十䇿言收民心定廟算料彼已選將帥明斥候訓強弩分兵器備水戰控浮橋審形勢其説甚備殿中侍御史張守上防淮渡江利害六事又請詔大臣惟以選將治兵為急凡細務付之都司六曹潛善伯彦滋不悦乃請遣守撫諭京城至是聞北京陷議者以為虜騎且来而廟堂偃然不為備浚率同列為執政力言之潛善伯彥笑且不信乃命浚參贊軍事與頤浩教習河朔長兵宋史全文卷十六下
