body:
  text: 宋史全文卷十九上宋髙宗七甲寅紹興四年春正月辛亥朔上在臨安甲寅進呈臨安府勘武翼郎馮師道言語狂悖事上曰師道本畫工嘗令繪佛像為民祈福已賜緡錢聞輙覬覦錫帶遷秩此事在承平時猶不可況於今日豈有濫賞官職賚予當勸有功朕未嘗敢以輕授師道以此怨望爾葢上重惜名器不以假人自百工伎藝之流一資不可妄得故因論師道罪狀諭無濫賞之意兹有以見御天下以至公也臣留正等曰輕用名器不分流品此前日召亂之由也太上皇帝以爵待有徳有功者雖貴近越法求請未嘗予之況畫工乎此所謂大公至正之道冝謹守之乙卯樞密都承㫖章誼為大金通問使給事中孫近副之敵所議事朝廷皆不從乃遣誼等請還兩宫及河南地詔淮浙鹽鈔錢每袋増貼納錢三千通舊為二十一千諸州所收貼納錢並計綱赴行在尋命廣鹽所増亦如之戊午詔宣州奏檀偕殺人疑慮獄案令刑部重别擬斷申尚書省輔臣進呈朱勝非言疑獄不當奏而輒奏者法不論罪上曰今若加罪則後來州郡實有疑慮者亦不復奏陳矣辛酉初知樞密院事張浚既至荆南上書引咎乞罷政詔不許是日殿中侍御史常同請對論浚以大臣之貴當閫外之權付與之專㡬半天下事功不就受代而歸今乃聞命踰年故為留滯不䖍君命莫甚於斯壬戌詔浚疾速赴行在自是言者稍稍論浚矣戊辰執政奏事因及北方事冝上曰人心國之本也雖有土地若失人心亦不可立國自張浚召還後川陜宣撫處置副使王似盧法原人望素輕頗不為都統制毛玠所重上聞之己巳賜三人璽書略曰羊祜雖居大府必任王濬以專征伐之圖李愬雖立殊勲必禮裴度以正尊卑之分傳聞敵境尚列兵屯冝益務於和𠂻用力除於外患時玠為檢校少保位遇浸隆故有是詔癸酉輔臣進呈張浚奏四川自七月以來霖雨地震蓋名山大川久闕降香乞製祝文付下上曰霖雨地震之灾豈非重兵久在蜀調發供饋椎膚剥體民怨所致當脩徳撫民以應之又何禱乎丁丑召江西制置大使趙鼎赴行在將以代席益也鼎守洪都踰再嵗戢吏愛民盜賊屏息一方賴之戊寅夜臨安火己卯同簽書樞密院事韓肖胄以舊職知温州肖胄與朱勝非議事不合力求去疏三上乃有是命後三日改提舉洞霄宫右迪功郎吳伸上疏訟張浚無罪大略為浚忠有餘而智不足且復辟之功大失地之罪小使浚罪去不知誰可繼其忠乎望陛下痛察之無使朋黨得以快其私無使敵國得以乗其間實宗廟社稷之福二月辛巳朔詔南班宗室自今並赴臺參故事宗室遷官或赴或否至是用御史常同言著為令壬午詔贓罪至死者方籍其貲癸未參知政事席益提舉江州太平觀先是諫官劉大中既奏其罪殿中侍御史常同復以為言上曰諫官御史所言臣僚過惡未必皆實然易曰大君有命開國承家小人勿用既審知其小人自當退之也乙酉簽書樞密院事徐俯兼權參知政事軍賊檀成犯長陽縣荆南鎮撫使解潜遣統制官胡勉捕斬之戊子監察御史明槖宣諭嶺南還入見槖出使一年三閲月所按吏二十有七人薦士二十人凡五使所案吏總七十有九人薦士五十有七人而劉大中所劾多大吏槖大中朱異所舉多聞人又薛徽言鋭於有為而槖大中數言公私利病惟胡蒙奉承大臣風㫖此其大略也乙未詔同都督江淮荆浙諸軍事孟庾赴行在戊戌詔廣西提舉買馬官移司邕州己亥初命三衙管軍及將帥觀察使以上舉忠勇智略可自代者一人如文臣之制辛丑金左都監宗弼自寳雞入冦犯仙人關先是敵既得和尚原利州路制置使吳玠度敵必深入乃預治壘於關側號殺金平嚴兵以待玠弟秦鳯副都總管璘在階州移書言殺金平之地去原上逺前陣散漫冝益治第二隘示必死戰則可取勝至是宗弼果與薩里罕劉䕫率十萬騎入冦進攻鐵山鑿崖開道犯仙人關既至敵據髙嶺為壁循嶺東下直攻我軍玠自以萬人當其前璘率輕兵由七方關倍道而至轉戰凡七日統制官郭震為宗弼所襲破其寨王師屢敗玠斬震以徇敵復攻之壬寅常同為御史不數月劾罷監司之不才者二十有三人中外聳然乙巳監察御史明槖言昨李棫遣人入大理國買馬於邊防有所未便小必失陷害物大則引惹邊釁臣講究買馬之術有七深入蠻國誘之不惜其直一也厚有繒綵鹽貨之本二也待以恩禮三也要約分明四也禁止官吏侵欺五也信賞必罰以督之六也馬悉歸朝而後付於將帥七也望下提刑司根究諸司鹽利剰錢應副買馬仍下提舉司詳前七説施行從之鄉貢進士李郁為右迪功郎郁以布衣入見所呈皆當世務上批郁學通世務議論可采故有是命丙午知樞密院事張浚至行在殿中侍御史常同侍御史辛炳皆有論列不報浚既見遂赴樞密院治事三月辛亥朔川陜宣撫司都統制吳玠敗敵于仙人關初宗弼與玠連戰未决敵遣生兵萬餘擊玠營之左玠分兵擊却之賊怒擁衆乗城玠遣統制官楊政以刀鎗手深入統制官呉璘以刀畫地謂諸將曰死則死此敢退者斬敵分為二陣宗弼陣于東將軍韓常陣于西我軍苦戰久遂退屯第二隘政亦言於玠曰此地為蜀阨塞死不可失當守以強弩彼不敢舎此而犯關玠從之敵進攻第二隘人披兩鎧鐵刃相連魚貫而上璘督士死戰矢下如雨敵死者復踐而登薩里罕翌日命諸軍併力攻營之西北樓玠遣政與統領官田晟出鋭兵持長刀大斧擊其左右夜布火四山大震鼔隨之壬子夜壘中大出兵遣右軍同統領王喜及王武等諸將分紫白旗入敵營敵驚潰將軍韓常為官軍射損左目敵不能支遂引兵宵遁右軍統制張彦刼敵横山寨斬千餘級玠遣統制官王俊設伏河池扼其歸路又敗之是舉也敵决意入蜀自薩里罕已下皆盡室以來既不得志遂還鳯翔授甲士田為久留計自是不復輕動矣丁巳右司諫劉大中守秘書少監上諭朱勝非曰大中頃使江西頗多興獄今猶未已若令為諫官恐郡縣觀望朕於用刑欽恤明慎常懼有司行法於意外今遷大中為少監蓋朕之深慮也戊午江南西路制置大使趙鼎參知政事時鼎已召而未至也上命鼎薦人才鼎即以王居正呂祉董弅林季仲陳槖朱震范同呂本中上之乃詔三省公共隨器任使撫州布衣寗子思獻白銀木刻成千手大悲像極精工朱勝非進呈上曰朕平日未嘗佞佛然亦不敢加訾顧飾象設以祈福乃流俗之事非朕心也勝非又言撫州有玉尊刻成龍文疑禁中舊物未敢進上曰此尤無謂異時茶馬司常竊市馬之直以易玩好是舉山澤之利而投之無用之地矣其勿受自今有來獻者皆却之夜雨雹壬戍孟庾自鎮江至行在時督府諸將既已分戍遂併其府廢之而以其餘兵𨽻都統制張浚乙丑知樞密院事張浚罷為資政殿大學士提舉臨安府洞霄宫時辛炳常同論浚不已上未聽二人因録所上四章申浚浚懼即移疾待罪且以呂頥浩在相位時書進呈上乃釋然炳又言前此人臣未有如浚之跋扈僣擬専恣誤國欺君慢上者同亦論奏如炳言故浚遂罷丁卯張浚落職奉祠後三日詔浚福州居住龜鑑曰建炎初潼關告警羽檄交馳浚以密院而任川陜宣撫之職請任西事分司秦州左通荆襄之財右出秦隴之馬興元一奏勇於自任擢劉子羽於參謀而弛禁通商輸財濟饑熈如也用趙開於總領而民不加賦軍用自足裕如也而分畫諸將如吳玠如王彦如劉錡如關師古等莫不屬其指授之下自是而捷於寳雞捷於箭筈捷於和尚原捷於殺金平劍閤棧道賴以保全此雖呉武安玠以下諸將戰闘之功而分畫措置莫非我魏公力也而議者乃以秘閣崇儒尚方鑄印中傷之雖聖明天子有人言其過朕皆不聽之喻而還朝以後言者滋甚浚不容不落職出居外郡矣浚即日如福州從者皆去肩輿才兩人浚雖得罪猶上疏論敵偽暫和心必未已當益為備具大略言此敵情狀專以和議誤我亦云久矣彼勢促則言和勢盛則復肆前後一轍姑請以近事明之紹興二年秋尼雅滿有親冦蜀之意先遣王倫還朝且致勤懇蓋懼朝廷大兵乗彼虛隙又其為劉豫之計至委曲周悉也自後九月余覩作難前謀遂寢至十二月伊都之難稍息則復大集蕃漢之衆徑造梁洋是時朝廷已遣潘致堯出使矣次年二月敵困饒風進退未皇先是朝廷開都督府議遣韓世忠直抵泗州敵實畏之於四月遣致堯還其詞婉順欲邀大臣共議此非無所忌憚而然也梁洋之冦未能出竟至五月而後得歸既狼狽矣而世忠大兵尋復輟行敵之氣力固已復蘇而叛豫之心亦云紓綏所以前日使人之來求請不一故為難從之事也竊惟此敵傾我社稷壞我寢陵迫我二帝駈我宗室百官自謂怨隙至深其朝夕謀我者不遺餘力矣況劉豫介然處於其中勢不兩立必求援於敵借使暫和心必未已數年之内指摘他故豈無用兵之詞而我將士率多中原之人謂和議已定不復進取將解體思歸矣若謂今日不得已而與之通使為陛下之權敵亦固能用權也願陛下蚤夜深思益為備具處將士家屬於積粟至安之地使出而戰守者無反顧奔散之憂精擇竒才以撫川陜之師使積年屯邊者無懈墮懷望之意江淮川陜互為牽制斥逺和議用集大業臣奉使川陜竊見主兵官除呉玠王彦關師古累經拔擢備見可任外其餘人才尚衆謹開具如左呉璘楊政可統大兵田晟可總一路王宗尹王喜王彦可為統制後皆有聲世服其知人癸酉知湖州汪藻上所編元符庚辰以來詔㫖二百卷詔送史館乙亥御史中丞辛炳論用人三弊曰分朋黨以立門庭縁愛憎而有用舎記小過而掩實行疏奏上嘉納之詔草澤鄧名世引見上殿名世初以劉大中薦召赴行在獻所著春秋四譜古今姓氏上遂命為迪功郎夏四月庚辰朔制授呉玠川陜宣撫副使上賜以所御戰袍器甲且賜親筆曰朕恨阻逺不得拊卿之背也玠素不為威儀既除宣撫副使簡易如故常負手步出與軍士立語幕客請曰今大敵不逺安知無刺客萬一或有意外則豈不上負朝廷委注之意下孤軍民之望哉玠謝曰誠如君言然玠意不在此國家不知玠之不肖使為宣撫玠欲不出恐軍民之間寃抑而無告者為門吏所隔無由自達幕客乃服總領四川財賦趙開令再任用王似等奏也辛巳詔兵部申嚴奏功不實法時臣僚奏軍興以來陛下不惜爵賞以旌戰功勸忠節而所屬上功類不覈實有隨衆從軍而曰躬冐矢石有盜賊自去而曰收復州縣有賊過境上而曰保守無虞有未嘗臨敵而曰斬獲賊級似此姦罔詎可置而不問故有是詔癸未宣撫處置使司參議官劉子羽責授單州團練副使白州安置以諫議大夫唐煇給事中胡交修殿中侍御史常同交章論之也丙戍呉玠與敵戰敗之復鳯秦隴州敵丁亥詔衢州布衣江衰召赴都堂審察守臣謝克家言其才行于朝故召遂命為右迪功郎庚寅置孳生牧馬監于臨安府甲午罷廣西茶鹽司其職事令轉運司所管其後復以廣東提舉司兼之庚子詔江東宣撫使劉光世遣兵巡邊丙午僉書樞密院事徐俯提舉臨安府洞霄宫俯既登宥密頗驕傲自滿朱勝非趙鼎同在二府俯蔑視之每除一登第者則曰又一經義之士嘗與論兵視鼎曰公何足以知此鼎曰鼎不足以知之豈若師川之讀父書邪俯大不堪而無以酬之卒不安位而去戊申罷婺州市御爐炭令户部講究更有似此之類並行禁止時兩浙轉運司檄婺州市炭須胡桃文鵓鴿色㑹守臣王居正入為起居舎人面奏臣頃承漕司牒開讀至此羣吏以目俄頃之間道路籍籍聞之傍郡蓋有不勝其擾者上曰朕平居衣服飲食猶且未嘗問其美惡隆冬附火止取温暖豈問炭之紋色也及是輔臣進呈上蹙然曰當艱難之時豈冝以此擾人可令速罷故有是㫖五月庚戍朔先是朱勝非言襄陽上流襟帶呉蜀今陷於冦所當先取上曰就委岳飛何如參知政事趙鼎曰知上流利害無如飛者至是命飛兼黄復州漢陽軍徳安府制置使以飛出師也癸丑左朝奉大夫范沖守宗政少卿兼直史館前一日執政進呈上諭朱勝非等曰神宗哲宗兩朝史録事多失實非所以傳信後世當重别刋定著唐鑑范祖禹有子名沖者已有召命可促來令兼史事勝非曰神宗史縁添王安石日録哲宗史經蔡京蔡卞之手議論多不公今蒙聖諭命官刪修足以昭彰二帝盛美天下幸甚甲寅詔淮南帥臣兼營田使知通縣令銜内兼帶營田二字於是大省冗官且令監司守臣條畫營田利便限一月聞奏焉江西制置使岳飛復逞州遂引兵攻襄陽軍聲大振丁巳詔監司郡守常切機察贓吏犯法巡尉失職並仰劾奏如失覺察取㫖重行時禮部員外郎郭孝友言令東南州縣無水旱之灾夷狄之禍而居無尺椽㸑無盛煙者贓吏害之盜賊擾之耳郡縣有贓吏乃煩朝廷遣使以黜陟之是按察之官不稱職也鄉邑有盜賊乃煩朝廷命將以招捉之是討捕之官不勝任也願陛下申命司禁貪墨於未發之前消姦究於未形之際故有是㫖庚申詔日厯所速行條具重修哲宗實録事件聞奏辛酉淮東宣撫使韓世忠奏本軍統兵官劉光弼乞陞差上謂輔臣曰光弼必光世之家兹事未便恐光世疑也世忠與光世交惡不已至是世忠自楊州入朝殿中侍御史常同言二人蒙陛下厚恩不思叶心報國一旦有急其肯相援望分是非正典刑以振綱紀上以章示二人他日帶御器械劉光烈召帶御噐械韓世良食世良峻拒之世忠見上因及其事上曰世良等内諸司耳設有不和罷其一可也至如大將國家利害所繫漢冦恂賈復以私憤㡬欲交兵光武一言分之即結友而去卿與光世不睦議者皆謂朝廷失駕馭之術朕甚愧之世忠頓首請罪曰敢不奉詔他日見光世當負荆以謝上以其語諭輔臣然二臣卒不解癸亥日厯所乞關内東門司取會禁中應出納更改事務先是内東門司取㫖不許供報至是史館修撰綦崈禮復以為請乃許之上因言禁中百事皆遵守典故不惟祖宗家法不敢輕議改更亦厭紛紛多事也甲子參知政事孟庾兼權樞密院事時密院全闕官用故事而有是命戊辰罷諸縣武尉壬申三省條上裁省細務一百十一事歸之六曹上諭朱勝非曰卿等當進退人材修明法度助朕圖恢復之計繁文末節非所以委付大臣者勝非頓首謝癸酉詔修國日厯所復以史館為名甲戍國子監丞王普上明堂典禮未正者十二事丁丑詔秉義郎子彦特轉武翼郎添差温州兵馬鈐轄左中大夫新知泉州令懬特轉左大中大夫初令懬奉詔選宗室子至是復得子彦之子伯玖年五嵗上以其聰慧可愛命呉才人育之以中書舎人張綱言詔令懬轉左太中大夫指揮勿行岳飛引兵復襄陽府初偽齊將李成聞郢州失守乃棄襄陽去飛進軍據守遂復唐州六月壬辰詔川陜合赴省舉人令宣撫司於置司州置試院選差監試考試官務在依公精加考較絶請託不公之弊先是詔省試並就行在至是禮部侍郎陳與義奏川陜道逺恐舉人不能如期故復令類試焉乙未詔楊華特補修武郎添差臨安府兵馬都監樞密院奏華已受程昌寓招安故有是命金星晝見經天丙申新除宗正少卿兼直史館范冲辭免恩命朱勝非奏曰冲謂史館專修神宗哲宗史録而其父祖禹當元祐中任諌官後坐章疏議論責死嶺表而神宗實録又經祖禹之手今既重修則凡出京卞之意及其増修者不無刪改倘使冲預其事恐其黨未能厭服上曰紛紛浮議不足恤也勝非曰冲不得不以此為辭今聖斷不移冲亦安敢有請上復愀然謂勝非曰此事豈朕敢私頃嵗昭慈聖獻皇后誕辰因置酒宫中從容語及前朝事昭慈謂宣仁聖烈皇后誣謗雖嘗下詔辨明而史録所載未經刪改朕毎念及此惕然于懷朝夕欲降一詔書明載昭慈遺㫖庶使中外知朕修史之本意也勝非進呈曰諭及此天下幸甚詔増置秘書郎著作郎各一員校書郎正字各二員己亥詔今後除授館職寺監丞博士御史臺檢法官主簿在外監司帥司並命詞給告承務郎以上差遣給敕令惟選人止用劄子庚子吏部員外郎呂聰問上故相呂大防所撰其祖公著神道碑且言臣猶記憶少時親見大防取索當時詔本日厯時政記以為案據撰成此文由是觀之先皇與子之志蓋已定於一年之前豈容中間更有異議其所以召臣祖輔嗣君欲更革之意亦皆出於神宗皇帝之本心後來臣祖與司馬光乃是推原美意遵奉初詔即非輒詆先帝輕變舊章當時若使更俟年嵗神宗當自更之豈特元祐臣切聞聖詔欲改修二史所係之大者無出於此謹以投進乞宣付三省史館録白以為案底從之壬寅初置史館校勘員惠州牢城人呂熈許自便熈坐殺苗𫝊之徒張政抵罪至是始釋之丙午執政奏事上顧謂曰岳飛已復襄郢尼雅滿聞之必怒況今正是六月下旬便可講究防秋儻敵人尚敢南來朕當親率諸軍迎敵使之無遺類即中原可復也江西制置使岳飛復隋州是月熒惑犯南斗秋七月戊申朔吏部尚書胡松年簽書樞密院事乙夘祠部員外郎范同言師克在和大抵剛果豪健之士以氣相髙始由小嫌寖成大釁陛下拔用才傑禮遇勲賢備極榮寵固將馮籍忠力掃除塵氛一清寰宇恢復祖宗之業而道塗竊議以謂將帥忘輯睦之義記纎芥之怨或享髙位而忌嫉軋已或恃勲勞而排抑新進審如是也日必有重貽聖慮者欲望明示至意使之視春秋諸卿以為戒追漢唐名將而踵其迹豈惟社稷是賴而勲名寵位克享終始亦陛下保全之徳也詔劄與諸將帥先是劉光世韓世忠久不叶而岳飛自列校拔起頗為張浚所忌故同及之丙辰川陜宣撫副使呉玠為檢校少司奉寧保静軍節度使録仙人關之功也丁巳詔左右司嵗考郎官功過治狀優劣上省取㫖賞罰復舊制也辛酉知湖州汪藻上所編中興詔㫖三十七冊詔送史館甲子岳飛復鄧州己巳執政進呈内降公事上諭曰近民間又造飛語多及内侍此曹何足惜恐因而生變不可不止絶之朱勝非曰恐軍中亦有幸變者更乞諭張浚楊沂中使之機察然内侍輩亦望約束令省事上曰何嘗假借此曹兼已戒浚與沂中但令臨安府略加根治可也趙鼎進曰民言可畏亦不可不採聽願陛下思所以致此言之由上嘉納之詔户部措置錢物二百萬緡増數和糴舊例朝廷嵗降本錢三百六十萬緡約糴米九十萬石至是中書請増糴焉庚午命宰執按閲江東淮西宣撫使劉光世帶到軍馬光世自池州入朝見上言今軍中錢糧既已不乏器甲又漸足備臣官職超踰衆人所願竭力報國他日史官紀中興名將帥書臣功第一上曰卿不可徒為空言當見之行事光世􅌶然受命而去辛未樞密院承㫖章誼給事中孫近使金國還入見初誼等至雲中與宗維希尹論事不少屈敵諭令亟還誼等曰萬里啣命兼迎兩宮必須得請敵乃令蕭慶受書宗維荅書又約以淮南毋得屯駐軍馬蓋欲畫江以益劉豫也誼等還至睢陽為豫所留以計得免上嘉勞久之癸酉初命大理丞評刋定見行斷例己亥執政進呈趙詳已平建昌叛兵上曰官軍既入城寧免玉石俱焚趙鼎進曰未必敢肆殺戮恐須刼掠耳上愀然不悦曰斯民無辜遽遭此禍其令有司優恤之八月戊寅朔宗正少卿兼直史館范冲入見上云以史事召卿兩朝大典皆為奸臣所壊若此時更不修定異時何以得本末冲對曰臣聞萬世無弊者道也隨時損益者事也仁宗皇帝之時祖宗之法誠有弊處但當補緝不可變更當時大臣如吕夷簡之徒持之甚堅范仲淹等初不然之議論不合遂攻夷簡仲淹坐此遷謫及仲淹執政猶欲伸前志久之自知其不可行遂已王安石自任已見非毁前人盡變祖宗法度上誤神宗皇帝天下之亂實兆於安石此皆非神宗之意上曰極是上又論史事冲對先臣修神宗實録首尾在院用功頗多大意止是盡書王安石過失以明非神宗之意其後安石婿蔡卞怨先臣書其妻父事遂言哲宗皇帝紹述神宗其實乃蔡卞紹述王安石惟是直書安石之罪則神宗成功盛徳煥然明白哲宗皇帝實録臣未嘗見但聞盡出姦臣私意未論其他當先明宣仁聖烈誣謗上曰正要辨此事上又曰道君皇帝聖性髙明乃為蔡京等所誤冲對道君皇帝止縁京等以紹述二字刼持不得已而從之上曰人君之學不在如此當以安社稷為孝冲對曰頃在政和間嘗聞道君皇帝六鸖詩一聨云網羅今不密回首不須驚宣示蔡京等云此兩句專為元祐人設以此知道君皇帝非惡元祐臣僚上曰何如當時便下一詔用數舊臣則其事遂正冲對曰如聖諭天下無事矣上又論王安石之姦曰至今猶有説安石是者近日有人要行安石法度不知人情何故直至如此冲對昔程頥嘗問臣安石為害於天下者何事臣對以新法頥曰不然新法之為害未為甚有一人能改之即已矣安石心術不正為害最大蓋已壞了天下人心術將不可變臣初未以為然其後乃知安石順其利欲之心使人迷其常性久而不自知上曰安石至今猶封王豈可尚存王爵庚辰御札參知政事趙鼎知樞密院事充川陜宣撫處置使鼎留身辭以非才上曰行朝之事朕自主之宰相茍非其人自有臺諌四川全盛半天下之地盡以付卿卿以便冝黜陟專之可也時鼎除命既出諸名士争願從之詔吏部編七司例冊時有㫖六曹細務令長貳治其事有條者以條决之無條者以例决之無例條者酌情裁决刑部侍郎兼權吏部侍郎胡交修言旋行檢例吏得為姦乞將應干敕劄批狀指揮可以為例者各編為冊令法司收掌以俟檢閲從之癸未知江州陳子卿報岳飛已復鄧州上曰朕素聞飛軍極有紀律未知能破敵如此胡松年曰惟其有紀律所以能破賊若號令不明士卒不整方自治不暇緩急豈能成功耶甲申侍御史魏矼入對論遴擇羣才隨冝器使考之僉論揆之已試毋分朋類毋徇愛憎上自廟堂次及將帥侍從下至百司庶府外至郡守監司各因其才而任之則天下之務粲然舉矣己酉輔臣進呈上曰朝廷當為官擇人不可為人擇官矼論隨冝器使正得用人之道戊子趙鼎改都督川陜荆襄諸軍事先是鼎因奏事言臣今此以與呉玠為同事或當節制之邪上悟是日輔臣進呈孟庾胡松年言鼎使名與王似盧法原呉玠相似請易一使名鼎奏荆襄乃川陜後門勢須兼領上以為然故有是命乙未尚書吏部員外郎魏良臣充大金通問使閤門宣贊舎人王繪副之詔以餘杭縣南上下湖池置孳生牧馬監命臨安府守臣兼提舉每馬五百匹為一監牡一而牝四之嵗産駒三分斃二分以上皆有賞罰丙午詔追王安石舒王告毁抺從呂聰問之請也靖康初已詔追奪安石王爵至是始毁其告焉詔江西和買絹折納錢每匹減作六千省人户願輸正色者聽戊戍直史館范冲條上宣仁聖烈皇后誣謗事冲奏臣親奉玉音開諭再四至於議熈豐之法度則曰神宗之意初實不然言紹聖之繼述則曰帝王之孝豈在於是辨宣仁之誣謗謂功烈之盛何可不明思道君之聖明謂姦臣所誤安得不悔臣願陛下特出睿斷明詔羣臣以聖意所在示之好惡詔付史館壬寅神武後軍統制岳飛為清逺軍節度使湖北路荆襄潭州制置使樞密院言楊太等作過日久理難容貸王􅊅出師踰嵗不能成功致一方受弊乃詔專委飛措畫討捕飛時年三十二自中興後諸將建節未有如飛之年少者川陜宣撫使王似復知成都府兼本路安撫使以趙鼎出使故也權臨安府梁汝嘉奏明堂行禮殿成乞提㸃官以次推賞上曰朕愛惜名器以待戰士土木之功豈當轉官但可等第支賞耳九月丁未朔右奉議郎呂應問貸死除名化州編管先是朝議取宣諭官所劾贓吏擇最重者一人用祖宗故事决之應問前知華亭縣與池州貴池縣丞黄大本皆繫獄刑部言應問犯自盜贓六十三匹大本犯枉法贓一百四十五匹比之應問數多乃令應問先次依法擬斷戊申詔減淮浙鈔鹽錢每袋三千令諸場對支新舊鈔各半以户部言摧貨入納遲細故也自度江至令鹽法五變而建炎舊鈔支發未絶乃命以資次前後從上併支焉壬子詔賜川陜荆襄都督府度牒二萬道紫衣師號各二千五百道趙鼎將行上疏言陛下建炎中遣張浚出使川陜國勢百倍於今浚有補天浴日之功陛下有山河之誓君臣相信古今無二而終致物議以被竄逐夫喪師失地浚則有之然未必如言之者甚也大抵專黜陟之典受不御之權則小人不安其分謂爵賞可以茍求一不如意便生觖望是時蜀士至於醵金募人詣闕訟之以無為有何以自明故有志之士欲為國立事者每以浚為戒且浚有罪臺諫論之可也人主誅之亦無憾也今乃下至草澤行伍凡有求於浚而不得者人人投牒醜詆及其母妻甚者指為䟦扈抑何甚哉今臣無浚之功當此重責去朝廷逺恐好惡是非行復紛紛於聰明之下矣癸丑吏部員外郎魏良臣閤門宣贊舎人王繪以使事入對時金人已定議出兵而朝廷未知也甲寅建康鎮江府淮南東路宣撫使韓世忠奏遣使議和非計乞厲兵恢復上謂大臣曰世忠為國之忠甚切可降詔奬諭乙卯殿中侍御史張致逺言淮南營田四五年間不聞獲斗粟之用是必有不可行者今江北流寓之人失所者甚衆若委逐處守令誘之歸業應有照驗物産盡數給還仍根括荒地許人請佃隨其力之大小量給頃畝與為永業十年勿問兼營田而行之將見鄉聚相望阡陌相屬雞犬之聲相聞異時博糴甚嬴餘亦足以紓急闕而省轉餉願更詔羣臣商㩁利便斷而行之詔户工部相度申尚書省辛酉合祀天地于明堂赦天下乙丑偽齊以金兵分道入冦騎兵自泗攻滁步兵自楚攻承諜報舉朝震恐勸上他幸議散百司趙鼎獨曰戰而不捷去未晩也上用鼎計先是右僕射朱勝非因久雨乞行䇿免故事又以餘服為請章十二上至是祀明堂畢勝非復求去且論當罷者十二事侍御史魏矼亦疏勝非五罪由是得請鼎之為參預也嘗與諸將論防秋大計獨張浚曰避將何之惟向前一步庶可脫鼎曰公但堅向前之議足矣鼎每日留身必陳用兵大計上意已悟又使浚密為之助至是决意親征留鼎不遣入蜀已有命相之意矣庚午起復守尚書右僕射同中書門下平章事朱勝非解官持餘服主管江州大平觀朱震守尚書祠部員外郎兼川陜荆襄都督府詳議官震言荆襄之間㳂漢上下膏腴之田七百餘里土冝麻麥古謂之租中若選良材招集流亡務農重榖冦來則禦冦去則耕不過三年兵食自足又給茶鹽鈔於軍中募人中糴可以下江西之舟通湘中之粟觀釁而動席卷河南此以逸待勞之道也詔送都督府時震始入見上首問以易春秋之㫖震以所學對上大善之壬申輔臣進呈上曰宰相有姦惡臺諫當言朕當施行若摭以小過使人無善去者誰肯作相耶趙鼎曰對曰陛下眷照如此臣鄰幸甚金人及偽齊之兵分道渡淮知楚州樊序棄城去淮東宣撫使韓世忠自承州退保鎮江府癸酉知樞密院事趙鼎守尚書右僕射同中書門下平章事兼知樞密院事初鼎奏禀朝辭上曰卿豈可逺去當相卿付以今日大計制下朝士動色相慶甲戍吏部尚書兼權翰林學士沈與求為參知政事冬十月丙子朔上謂輔臣曰朕為二聖在逺生靈久罹塗炭屈已請和而敵復肆侵陵朕當親總六軍往臨大江决於一戰趙鼎曰累年退避敵情益驕今親征出於聖斷將士皆奮决可成功臣等願效區區亦以圖報上因曰伐蔡之功亦憲宗能斷也故韓愈謂凡此蔡功惟斷乃成遂詔神武右軍都統制張俊以所部往援世忠又令淮西宣撫使劉光世移軍建康車駕定日起發丁丑參知政事孟庾為行宫留守從權措置百司事己夘神武右軍都統制張俊為浙西江東宣撫使淮東宣撫使韓世忠以所部自鎮江復如揚州初上聞敵騎渡淮再以御札賜世忠略曰今敵氣正鋭又皆小舟輕捷可以横江徑渡浙西趨行朝無數舎之逺朕甚憂之建康諸渡舊為賊衝萬一透漏存亡所繫朕雖不徳無以君國子民而祖宗徳澤猶在人心所冝深念累世涵養之恩永垂千載忠誼之烈世忠讀詔感泣遂進屯揚州庚辰侍御史魏矼殿中侍御史張致逺右司諫趙霈以急速事乞同班入對許之既而矼等與吏部侍郎鄭兹等以上親總六師皆乞扈從致逺又言今此敵敢大入謂我猶如向來不習戰爾若戎輅親征必伐敵謀上曰此朕志也知鎮江府沈晦乞促張俊統兵為韓世忠之援趙鼎等稱晦論激昴上曰晦誠可嘉然朕知其為人語甚壯膽志頗怯鼎因稱馬廣極有才可用嘗因苗𫝊事得罪然諸葛亮能用度内人區區庸蜀遂致強霸上曰齊小白能忘射鉤之讎而用管仲朕豈不能用廣可令引見上殿示以恩信然後用之彼必效死力以報朕沈與求曰陛下駕馭諸將如此何事不濟鼎對曰陛下開大度用人如此天下幸甚壬午直史館范冲奏録曰先臣祖禹供職國史院間日上進又具到朱墨本去取體式乞降付史館更憑衆議看定修立詔依奏並送史館癸未福州居住張浚為資政殿學士提舉萬壽觀兼侍讀趙鼎言浚可當大事顧今執政無如浚者陛下若不終棄必於此時用之故有是命甲申大理少卿張杓乞宫觀上曰杓為理官頗有平允之稱邇來有司率多觀望鍛錬或至刑獄失當甚非朕所以欽恤之意人命至重豈可忽擇其尤者當痛加懲艾大抵刑獄以明恕為先深戒慘酷趙鼎曰杓昨久任理官不畏強禦極有執守上曰當議陞擢以為理官之勸丁亥和州防禦使馬廣復明州觀察使充樞密副都承㫖廣入對遂有是命翌日趙鼎奏陛下用人如此何患不得其死力上曰廣知兵法有謀略不止於鬭將而已戊子趙鼎聞劉光世韓世忠異議恐上意移動復乗間言今日之勢若敵兵渡江恐其别有措置不如向時尚有復振之理戰固危道不猶愈於退而必亡者乎自詔親征士皆鼓勇陛下養兵十年正在一日由是浮言不能入矣參知政事沈與求兼權樞密院事嚴州進士方行之獻家財六十緡助軍户部乞許行獻納依例補官從之自渡江後許民間獻納補官始此淮東宣撫使韓世忠邀擊金人于大儀鎮敗之初奉使魏良臣王繪在鎮江被㫖趣行良臣等至揚州東門外遇選鋒軍自城中還問之云相公今往江頭把隘入城見世忠坐譙門上頃之流星庚牌沓至世忠出示良臣等乃得㫖令移屯守江二人出北門晩宿大儀鎮翌旦行數里遇敵騎百十控弦而來良臣命其徒下馬大呼曰勿射此來講和敵乃引騎還天長問皇帝何在良臣對曰在杭州又問韓家何在有士馬㡬何繪曰在揚州來時已還鎮江矣敵曰得無用計復還掩我否繪曰此兵家事使人安得知出城六七里遇金將聶哷貝勒同入城敵問講和事且言自泗州來所在州縣多見恤刑手詔及戒石銘皇帝恤民如此又問韓家何在良臣曰來時親見人馬出東門𤓰州去矣繪曰侍郎未可為此言用兵講和自是二事雖得㫖抽回將在軍君命有所不受還與未還使人不可得而知初世忠度良臣去已逺乃上馬令軍中曰視吾鞭所嚮於是引兵次大儀鎮勒兵為五陣設伏二十餘處戒之曰聞鼔聲則起而擊賊聶哷貝勒聞世忠退軍喜甚引騎數百趍江口距大儀五里其將托卜嘉擁鐵騎過五陣之東世忠與戰不利統制官呼延通救之得免世忠傳小麾鳴鼓伏者四起吾軍旗與敵旗雜出敵軍亂弓刀無所施而我師迭進背嵬軍各持長斧上揕人胷下捎馬足敵全裝陷泥淖中人馬俱斃遂擒托卜嘉世忠又遣董旼分兵往天長縣遇敵于鵶口橋擒女真四十餘人是日早朝輔臣進呈世忠奏已統兵渡江上曰世忠忠勇朕知其必成功可令户部支銀帛萬疋兩犒賞過江將士以激其心與求曰自敵騎蹂踐中原未嘗有與之戰者今諸將争先用命此成功之秋也既而世忠又奏見在揚州適霖雨未能進師恐朝廷訝成功之遲上曰兵事豈容遥制趙鼎曰軍事不從中覆古之制也乃詔世忠聽其臨機制變而捷書已至矣己丑金人圍濠州淮東宣撫司前軍統制解元與金人戰于承州敗之初金人至近郊元逆料金人翌日食時必至城下乃伏百人于路之要又伏百人于城之東北嶽廟下自引四百人伏於路之一隅令曰金人以髙郵無兵不知我在髙郵必輕易而進俟金人過我當先出掩之伏要路者見我麾旗則立幟以待金人進退無路必取嶽廟走矣果然則伏者出衆皆諾又密使人伏樊良俟金人過則决河岸以隔其歸路食時金人果徑趍城下元密數之有一百五十騎乃以伏兵出麾旗以招伏要路者伏兵皆立幟以待金人大驚躊踷無路遂向嶽廟走元率兵追之金人前遇兵無所施其技盡被擒凡得一百四十八人戰馬器械皆為元所得初聶哷貝勒既敗歸召奉使魏良臣等至天長聶哷按劔瞋目謂曰汝等來講和且謂韓家人馬已還乃陰來害我良臣等曰使人講和止為國家韓世忠既以兩使人為餌安得令知其計敵曰汝往見元帥右副元帥昌遣接伴官蕭掲禄李聿興來迓遂以議事迎請二聖之書授之壬辰太尉神武右軍都統制張俊乞以明堂恩任子宗元文資吏部言有礙條法詔特許之武臣非使相而以文資禄子孫自是為例甲午初令江浙民悉納折帛錢折帛錢自此愈重遣侍御史魏矼往劉光世軍監察御史田如鼇往張俊軍前諭事時光世軍馬家渡俊軍采石磯上命促二人往援韓世忠而光世等軍權相敵且持私隙莫肯協心矼至光世軍中諭之曰賊衆我寡合力猶懼不支況軍自為心將何以戰為諸公計當滅怨隙不獨可以報國身亦有利光世意許矼因勸之移書二師以示無他使為掎角已而二師皆復書交致其情光世遂以書奏于上於是光世移軍太平州丙申金人陷濠州守臣冦宏棄城走通判州事國鳯卿為所殺戊戍上登舟發臨安府奉天章閣祖宗神御以行晩泊臨平鎮進呈劉光世乞與韓世忠軍一般支錢糧上曰諸將之兵用命則一其所支錢糧豈容有異此皆呂頥浩不公之弊沈與求曰豈惟錢糧至於賞罰亦然惟至公可以服天下上曰大臣不公何以服衆趙鼎曰茍為不公則賞雖厚人不以為恩罰雖嚴人不以為威上曰今日朕親總六師正當公示賞罰詔㳂江州縣如排辦太過令監司具名以聞當重行黜責己亥上次崇徳縣韓世忠遣本司提舉一行事務董旼參議官陳桷以所俘女真一百八人獻行在因言承州陣殁人乞厚加贈恤上蹙然曰使人死於鋒鏑之下誠為可憫可令收拾遺骸於鎮江府擇地埋殯令胡松年就鎮江府設水陸齋致祭沈與求曰自建炎已來將士未嘗與金人迎敵一戰今世忠連捷以挫其鋒其功不細趙鼎曰陛下既親總六師則第功行賞與他時不同上曰第優賞之庶㡬人知激勸必有成功壬寅御舟次姑蘇館上乗馬入居平江府行宫守臣孫佑進御膳其卓子極弊上不以為嫌他日謂趙鼎曰朕念徃日艱難雖居處隘陋飲食菲簿亦所甘心故贈承事郎陳東歐陽澈並加贈朝奉郎秘閣修撰更與恩澤二資賜官田十頃趙鼎進呈韓世忠奏劄因論建炎之初黄潛善汪伯彦擅權専殺寘二人於極典上曰朕初即位昧於治體聼用非人至今痛恨之雖已贈官推恩猶未足以稱朕悔過之意可更贈官賜田雖然死者不可復生追痛無已中書舎人王居正草制曰嗚呼古之人願為良臣不願為忠臣以謂良臣身荷美名君都顯號忠臣已嬰禍誅君陷昏惡嗚呼惟爾東爾澈其始將有意於忠臣乎繇朕不徳使爾不幸而不為良臣也雖然爾即不幸不失為忠而顧天下後世獨謂朕何此朕所以八年于兹一食三歎而不能自己也通階美職豈足為恩以塞予哀以彰予過甲辰金右副元帥昌召通問使魏良臣王繪相見乙巳淮西安撫使仇悆遣兵擊金人于壽春府敗之遂復安豐縣十有一月戊申胡松年自江上還入見上問控禦之計松年曰臣到鎮江建康備見韓世忠劉光世軍中將士奮勵争欲吞噬金人必能屏護王室建立竒勲上曰數年以來廟堂玩習虚文而不明實効侍從臺諫搜剔細務而不知大體故未能靖禍亂濟艱難非朕夙夜留心治軍旅備器械今日敵騎侵軼何以禦之己酉詔故責授江州團練副使黄潛善更不追復觀文殿學士提舉西京嵩山崇福宫汪伯彦落職依舊宫觀庚戍進呈承楚泰州各有水寨民社團聚邀擊敵馬上曰淮甸遺民未能安業今又遭此敵騎乃能力奮忠義不忘國家實我祖宗涵養之力凡水寨民兵並與放十年租税及諸般科配差役仍支錢采以助之趙鼎曰陛下徳澤如此人心益以固國祚益以長矣壬子手詔曰朕以兩宫萬里一别九年覬迎鑾輅之還期遂庭闈之奉故暴虎憑河之怒敵雖逞於兇殘而投䑕忌器之嫌朕寧甘於屈辱是以卑辭遣使屈已通和仰懷故國之廟祧至于霣涕俯見中原之父老寧不汗顔比得強敵之情稍有休兵之議而叛臣劉豫懼禍及身造為事端間諜和好信逆雛之狂悖率羣偷而陸梁警奏既聞神人共憤皆願挺身而效死不忍與賊以俱生今朕此行士氣百倍雖自纂承之後每乖舉措之方尚念祖宗在天之靈共刷國家累嵗之恥殪彼逆黨成此雋功自豫僭立朝廷以敵故至以大齊名之至是始下詔聲其逆罪焉川陜宣撫司統制官楊從儀敗敵于臘家城岳飛之取襄陽也朝廷命宣撫副使呉玠乘機牽制玠遣從儀以兵入偽地遇敵勝之癸丑白州安置劉子羽放令逐便初呉玠除川陜副使乃奏辭新命且言屢破金人豈臣之功乃子羽知臣而薦拔之功也望追還成命於張浚與子羽少寛典刑上曰進退大臣蔽自朕志豈可由將帥之言可聽子羽自便上因言臺諫論事雖許風聞須要審實如排擊人才豈無好惡若果務大體不指摘纎瑕細務強置人於有過豈惟陰徳不淺亦可銷刻薄之風成忠厚之俗趙鼎曰聖訓廣大如此言事官冝奉以周旋也戊午僉書樞密院事胡松年兼權參知政事以沈與求按行江上故也上見士氣大振捷音日聞欲度江决戰趙鼎曰退即不可渡江非䇿也敵兵逺來利於速戰豈可與之争鋒兵家以氣為主三鼔即衰矣姑守江使不得渡徐觀其勢以决萬全且豫猶不親臨止遣其子豈可煩至尊與逆雛决勝負哉於是遣與求按行江上金人陷滁州於是劉光世移軍建康府韓世忠移軍鎮江張俊移軍常州己未提舉萬夀觀兼侍讀張浚知樞密院事浚請遣岳飛渡江入淮西以牽制敵兵之在淮東者上從之及入見上問鼎浚方略如何鼎曰浚鋭於功名而得衆心可以獨任於是上復用之辛酉提舉臨安府洞霄宫李綱言今偽齊悉兵南下其境内必虛倘命信臣乗此機㑹擣頴昌以臨畿甸電發霆擊出其不意則偽齊必大震懼呼還醜類以自營救王師進躡必有可勝之理非惟牽制南牧之兵亦有恢復中原之兆此上䇿也朝廷或以兹事體大則鑾輿駐蹕江上勢須號召上流之兵順流而下旌旗金鼔千里相望以助聲勢則敵人雖衆豈敢南渡仍詔大將率其全師進屯淮南要害之地設竒邀擊絶其糧道敵必退遁保全東南徐議攻討此中䇿也萬一有借親征之名為順動之計委一二大將捍敵于後則臣恐車駕既逺號令不行敵得乗間深入州縣望風奔潰其為吾患有不可勝言者矣此最下䇿也往嵗金人南渡利在侵掠既得子女玉帛時方暑則勢必還師今偽齊使之渡江而南必謀割據將何以為善後之計哉初張浚之謫福州也綱亦寓居焉浚服其忠義除前隙更相親善及浚召入綱因以奏疏附之執政進呈上曰綱去國數年無一字到朝廷今有此奏豈非以朕總師親臨大江合綱之意乎所陳亦今日急務可降詔奬諭癸亥淮西宣撫司統制官王徳與敵遇于滁州之桑根敗之丁卯上謂執政曰朕與大臣論事稍有不合便輕為去就何也張浚曰事有可行有不可行陛下一言之漏言者意其好惡因有論列不得不為去就上曰君臣之間當至誠相與勿事形迹庶可同心叶徳以厎平治朕以三四大臣皆當分委張浚專治軍旅胡松年可專治戰艦浚曰仁祖亦嘗委范仲淹韓琦分事而治言者數以為辭不旋踵報罷上曰今日之事若不專責無由辦集將來如財用亦須委一大臣己巳夜淮西宣撫司選鋒副統制王師晟親軍副統制張𤦺合兵復南壽春府辛未起用知岳州程千秋移知鼎州張觷知岳州上覽除目問觷才術如何趙鼎曰聞其能辨事上曰不須更問某人薦惟才是用胡松年曰朝廷用人不可不慎用一君子則君子進用一小人則小人進上曰君子剛正而易疎小人柔佞而易親朕於任用聽察之間不敢少忽也右司諫趙霈請命有司條具一嵗錢榖出入之數裁節浮費上曰此疏極關治體過防秋便可施行胡松年曰使論事之臣毎如此何患不能叶濟中興正恐賊騎既退國家暫安虚文細務又復出矣上曰趙鼎記此可為戒知樞密院事張浚往鎮江視師時金人於滁上造舟有渡江之意主管殿前公事劉錫神武中軍統制楊沂中見趙鼎曰探報如此駕莫須動鼎曰俟敵已渡江方遣二君率兵趨常州併力一戰以决存亡更無他術錫曰相公可謂大膽鼎曰事已至此不得不然二君隨駕之親兵也緩急正賴為用豈可先出此言錫中乃退金左副元帥昌遣通問使魏良臣王繪歸行在癸酉夜魏良臣等至常州見浙西江東宣撫使張俊甲戍夜良臣等至許市遇知樞密院事張浚于舟中良臣等具告以敵所言且謂敵有長平之役浚即曰欲同詣行在徐思之恐人疑惑乃密奏使人為金所誅切不可以其言而動又勿令再往軍前恐我之虛實反為所得浚遂騎馬臨江召韓世忠劉光世與議且勞其軍將士見浚來勇氣自倍浚部分諸將遂留鎮江節度之十有二月乙亥朔輔臣奏事上因論祖宗創業艱難未嘗不以躬儉為天下先蓋儉則不妄費不妄費則征求寡而民心悦此所以得天下也宣和以來世習承平之久奢侈極矣馴致禍亂可不戒哉乙夘布衣王蘋特補右迪功郎蘋候官時寓居呉江守臣孫佑言其素行髙潔有憂時愛君之心召對後四日賜進士出身除正字上謂輔臣曰蘋起草茅而議論進止若素宦子大抵儒者能通世務乃為有用丙戍夜月犯昴太史以為敵弱之象上以諭輔臣胡松年曰天象如此中興可期上曰范蠡有言天應至矣人事未盡也更在朝廷措置如何耳初張浚至江上令韓世忠募軍民王愈王徳持書抵右都監宗弼所為言張樞密已在鎮江敵見浚書押色動即以右副元帥昌書約日索戰己丑權淮東安撫司公事趙康直劾泰州兵官任顯不伏使令上曰康直既權帥事自合施行嘗記朕為元帥時有一部將醉入酒家壞其盆盎朕捐白金償之而斬部將自此更無一人犯令者大抵用兵當以威信為先辛卯上謂輔臣曰韓世忠近以鱘魚鮓來進朕戒之曰朕艱難之際不厭菲食卿當立功報朕至於進貢口味非愛君之實也已却之矣壬辰湖北制置司統制官牛臯徐慶敗敵于廬州乙未詔陳獻兵書進士葉汝舟賜帛二十匹丙申淮南東路轉運判官郭楫罷先是上命漕司以米萬石接濟水寨民兵及是五旬而未有顆粒至者侍御史魏矼言楫不才慢命上曰今日大敵在前欲臣下趍事赴功不可不大明賞罰有賞而無罰是猶有春夏而無秋冬也萬物之生何由成實故楫遂罷丁酉侍御史魏矼言日食正旦乞下有司講求故事上曰日食雖是躔度之交術家能逆知之春秋日食必書謹天戒也矼之言良愜朕意冝下有司講求故事凡可以消變者悉舉行之戊戍責授單州團練副使劉子羽復右朝散大夫提舉江州大平觀時呉玠復辭兩鎮之節且言子羽累年從軍亦薄有忠勤可録念其父韐靖康間死節京城其母恐子羽斥死嶺海無復自新非陛下善善及子孫之意伏望聖慈特許臣納前件官少贖子羽之罪翌日詔玠篤於風義降詔奬諭士大夫以此多玠之義而服子羽之知人焉庚子金人退師初右副元帥元顔昌在泗州而右都監宗弼屯于竹塾鎮嘗以書幣遺淮東宣撫使韓世忠約戰世忠方與諸將飲即席遣伶人張軫王愈持橘茗為報報書略曰元帥軍事良苦下諭約戰敢不疾治行李以奉承指揮也時敵師既為世忠所扼會大雨雪糧道不通野無所掠至殺馬而食蕃漢軍皆怨憤僉軍又為飛書擲於帳前云我曹被驅至此若過江必擒爾諸帥以獻南朝俄聞上親征且知金主晟病篤將軍韓常謂宗弼曰今士無鬬志過江不叛者獨常爾佗未可保也惟速歸為善宗弼然之夜引還龜鑑曰惟紹興之四年趙忠簡公鼎實領右揆之命當時玉音宣諭謂朕當親總六軍臨江决戰鼎即對曰親征出於聖斷將士皆奮决可成功於是移張俊於金陵進光世於當塗起世忠於維揚復起張浚而董其事自張公之出行邊郡也今年命諸將觀機㑹明年檄諸將觀兵勢今日召諸帥議軍事明日命諸帥分軍屯書押之示金人勭色號令之下奔走淮命不曰今日之事有進擊而無退保也則曰若諸將渡江則無淮南而長江與敵共也大儀之役伏兵四起貝勒就擒壽春之勝展幟示之敵衆奔潰鎮江勞軍韓世忠移書烏珠有張樞密在此之言諸豪相顧失色敵於是有雪夜之走采石徇師之令一下諸將以死鏖戰我於是有李家灣之捷嗚呼冨平之失此魏公也後来江上之勝亦此魏公也人無愚智作之則奮師無利鈍激之則鋭兹非其驗歟癸卯參知政事沈與求兼權樞密院事以胡松年再往江上故也金人去滁州將官盧師迪引兵至竹塾鎮遇敵千餘騎敗之宋史全文卷十九上欽定四庫全書宋史全文卷十九中宋高宗八乙夘紹興五年春正月乙巳朔日有食之上在平江金人去濠州丙午詔户部出錢四十萬緍付江西漕司増市軍儲丁未知樞密院事張浚奏敵人潛師遁去今已絶淮而此見行措置招集淮南官吏還任撫存歸業人户等事上曰劉豫父子強誘敵人擁衆南侵窺伺江浙其志不淺乃今一夕遁去其所亡失多矣然賊馬方卻而浚已能為朕措置如此可謂孜孜奉國知無不為也大臣和於内將相和於外故舉措得冝而敵人知畏此其所以遁去也詔諸路州縣係官田舎委守令出榜召人承買拘催價錢起發己酉宰相趙鼎奏敵騎遁歸皆自陛下聖畫素定然善後之計當屈羣策願詔前宰執各條具所見來上斷自聖意擇而用之上曰朝廷能採衆論則慮無不盡雖芻蕘之言儻有可采猶當用之況前宰執嘗在朕左右必知朝廷事沈與求曰國有大議就問老臣乃祖宗故事於是賜詔書訪以攻戰之利備禦之冝措置之方綏懷之略令悉條上焉庚戍趙鼎曰祖宗差役本是良法王安石但見差衙前一事州縣奉行失當變祖宗舊法民始不勝其擾上曰安石行法大抵學商鞅昔自安石變法天下紛然但差役之法行之既久不可驟變耳淮西宣撫司統制官王進薄金人于淮降其將程師回張延夀而還辛亥上謂輔臣曰恢復之圖所冝愛日講究要湏先求人才有人才則天下之事無患不舉然用人才在於進君子去小人趙鼎曰臣待罪宰相為陛下分别君子小人而用舎之乃其職也敢不奉詔淮東宣撫司統制官崔徳明敗敵於盱眙乙夘張浚自江上還入見丙辰上謂趙鼎曰大臣朕之股肱臺諫朕之耳目職任不同而事體均一或有官非其人所當罷黜者卿等宜亟以告朕不必専待臺諫丁巳詔江北賊馬已退應大臣及侍從職事官各條具利害聞奏詔㩁貨務毎日入納錢以其半支給見錢關子戊午輔臣進呈曲赦淮南事目上曰敵雖退遁然南北之民皆吾赤子當示兼愛并容之意中原未復二聖未還赦又不可夸大第使實惠加於兩淮百姓乃朕指也上又曰敵已退遁須當漸圖恢復若止循故轍為退避之計何以立國祖宗徳澤在天下二百年民心不忘當乗此時大作規摹措置朕亦安能鬱鬱久居此乎趙鼎曰時不可失誠如聖諭事所可為者當謹以次條畫奏禀龜鑑曰聖明天子立志英明每念復讐未嘗不有比此一洗之意考之國史聖心可見初年與輔臣論恢復之由首論周宣復古之詩次論漢光武尋邑昆陽之勝又其次論唐肅宗興復王室之盛可謂志於規恢矣又嘗語宰執曰今當漸圖恢復乗時大作規模朕安能鬱鬱久居此又謂宰執曰今已六月下旬便可講防秋事朕當親率諸軍分頭迎敵若依前逺避何以立國不曰修車馬偹器械外攘夷狄之事更須講求則曰訓卒繕甲極力措置今冬虜來似有可勝之理書車攻詩羊祐傳造盾琴様以示武備作金銀椀以旌射士教習舟師修復馬政措置屯田精擇間諜其志蓋未嘗不在鉅鹿也庚申詔諸州禁卒日教射藝守臣旬按仍令憲臣躬親按賞以備朝廷抽取拍試土兵射士亦令教習嵗終比較粗精以聞辛酉詔故殿中侍御史馬伸頃因言事死於貶所忠直之操念之奭然可特贈左諫議大夫依所賜官與合得致饋遺表恩澤令諸路州軍尋訪家屬以聞伸既以斥死會趙鼎入相上記其忠乃有是命壬戍張浚奏臣頃者出使川陜横遭誣謗蒙陛下特降宸翰辨明之使臣一旦昭雪死無所畏上曰朕方屬卿中原之事不可輒以曩日誣謗過自畏縮況毁譽之求當考其實齊威公所以封即墨大夫烹阿大夫毁譽不公自古所患孔子曰如有所譽者其有所試矣況於毁乎浚曰陛下於毁譽之際曲留聖意如此羣臣之幸上曰使其人誠非才則言者不可謂之毁也在於考其實而已鎮江建康府淮南東路宣撫使韓世忠為少保充淮南東路宣撫使鎮江府置司時世忠與劉光世張俊相計入覲世忠奏敵騎遁去陛下必喜上曰此不足喜若復中原還二聖乃可喜耳然有一事以卿等將士賈勇争先非復昔時懼敵之比所喜蓋在此也後數日上以諭輔臣趙鼎等贊上誠得馭將之道臣留正等曰漢髙祖收天下豪傑頥指氣使如驅羣羊權畧固髙逺矣韓信假王不因躡足以止其怒㡬敗乃事大抵以術數御物者以技有時而窮也太上皇帝駕馭諸將出於誠信雖辭色閒暇而披靡震驚不敢桀黠者專以君臣分義折伏其心故也劉光世不欲受杜充節制上怒曰豈容跋扈如此遣使諭㫖即奉詔過江復以銀合茶藥賜之張浚入對論及劉光世解罷軍政有登仙之歎上曰卿初見朕時何官曰修武郎上曰是時家貲如何曰貧甚嘗從陛下求戰袍以禦寒上曰今日貴極冨溢何所自邪曰皆陛下所賜上曰卿既知此冝思自効而有羨於光世何耶浚皇恐流涕誓以死報恩嗚呼神機妙略動於事㑹與夫游雲夢以縳信踞牀洗以召布孰為得体乎上曰楚用子玉晉文公為之側席而坐今敵騎雖退然尼雅滿軰猶在朕敢忘此憂乎癸亥起復江南東路淮南西路宣撫使劉光世為少保充淮南西路宣撫使置司太平州浙西江東宣撫使張浚開府儀同三司江南東路宣撫使置司建康府甲子淮西統制官酈瓊拔光州執偽知州許約遂復光州戊辰上謂大臣曰劉光世韓世忠張俊相繼入覲朕嘉其却敵之功錫賚甚厚朕服御物有可予者亦以予之皆拜賜涕泣願身先士卒圖復中原以報趙鼎曰此社稷之幸也己巳罷試敎官法其諸州學官並從朝廷選差自元豐間始立是法及是言者以謂欲為人師而先納所業求有司以幸中程度又校計格法以争得之甚非建學校立學官之本意故罷壬申劉光世韓世忠張浚入辭尚書右僕射趙鼎知樞密院事張浚參知政事沈與求僉書樞密院事胡松年侍上命光世等升殿諭曰敵人南侵諸名帥皆在其中蓋有侵噬江浙之意賴卿等戮力捍敵卒伐奸謀使其失利而去朕甚嘉之然中原未復二聖未還朕心慊然卿等其勉之光世曰臣等蒙國厚恩敢不效死鼎曰臣聞降敵程師回言逆臣劉豫紿敵人云光世世忠比失驩敵至淮甸異所聞其氣已沮矣上曰有告朕光世世忠坐少嫌意不釋然者烈士當以氣義相許先國家之急而後私讐小嫌何足校今日朕為分之宜釋前憾結驩如初光世世忠感泣再拜曰臣等頃過聽嘗有違言至於國事不敢分彼此今已相好無他矣乃煩君父訓飭丁寧臣等皇懼無所容敢不奉詔鼎等頓首賀上曰將帥和社稷之福也龜鑑曰以結友之事諭世忠而世忠即負荆以謝光世以滅怨之説勉光世而光世先致意以約張韓此得協和之道也是月金主晟卒立亶為嗣二月丙子詔布衣陳得一就秘書省别造新厯令少監朱震監視又詔川陜宣撫司尋訪眉州精曉厯數人將所降厯日委官監視參攷有無差錯申尚書省丁丑上御舟發平江府戊寅命祠部員外郎張銖奉太廟神主自海道至臨安府壬午御舟至臨安府行宫留守孟庾率京官小使臣以上迎于五里外上乗輦還行宫乙酉侍御史張致逺言自昔立國者兵不貴多貴於有用財不患乏患於無節聚財養兵皆出民力且東南土地不加廣而日以荒蕪租賦不加饒而日以朘耗蓋縁民以力田為苦而游手者軍伍收之避役者度牒假之強悍者盜賊死之一人耕百人食本先瘁矣今主計者初非因任復數更易利源不講權柄下移酒税利源也而諸將侵之茶鹽利源也而堂吏私之銅鐵利源也而工賈擅之常平利源也而憲司忽之今欲理財冝三司精擇使副或以户部官吏依倣三司任以職事全計經常量入為出先務省節次及經理則財用沛然矣詔户部限十日講究條具申尚書省丙戍右僕射趙鼎守左僕射知樞密院事張浚守右僕射並同中書門下平章事兼知樞密院事都督諸路軍馬兩制出浚獨以軍功及專任邊事為言上既以邊事付浚而政事及進人材專付於鼎矣喻樗曰時張趙二公相得人固知且並相樗獨以謂且作樞密使同心同徳亦何不可趙退則張繼之説一般話行一般事用一般人如此則泰道長若同相議論有不合或當去位則一畨改更必有參商是賢者自相戻也已而其事亦果如此提舉臨安府洞霄宫李綱復觀文殿大學士知温州范宗尹復觀文殿學士提舉江州太平觀秦檜復資政殿大學士始用明堂恩也神武後軍統制岳飛為荆湖南北襄陽府路制置使將所部平湖賊楊么賜錢十萬緡帛五千匹為犒軍之費丁亥趙鼎張浚告謝命坐賜茶浚因曲謝又以儲貳為言上首肯曰宫中見養藝祖之後二人長者年九嵗不久當令就學浚復奏王者以百姓為心修徳立政惟務治其在我則大邦畏其力小邦懐其徳天下捨我將安歸哉固不僥倖於近績也仰惟陛下躬不世之資當行王者之事以大有為正心以正朝廷正朝廷以正百官正百官以正萬民國勢既隆強虜自服天下自歸因書王朴平邊䇿以獻又奏臣昨奉清光竊見陛下於君子小人之分聖意拳拳於此宗社生靈之福也昔唐李徳裕言於武宗曰邪正二者勢不相容正人指邪人為邪邪人亦指正人為邪人主辨之甚難臣以為正人如松栢特立不倚邪人如籐蘿非附他物不能自起臣嘗推類而言之君子小人見矣大抵不私其身慨然以天下百姓為心此君子也謀身之計甚密而天下百姓之利害我不顧焉此小人也志在於為道不求名而名自歸此君子也志在於為利掠虛美邀虛譽此小人也其言之剛正不撓無所阿徇此君子也詞氣柔佞切切焉伺候人主之意於眉目顔色之間此小人也樂道人之善惡稱人之惡此君子也人之有善必攻其所未至而掩之人之有過則欣喜自得如獲至寳旁引曲借必欲開陳於人主之前此小人也難進易退此君子也叨冒爵禄蔑無亷耻此小人也臣嘗以此而求之君子小人之分庶乎其可以槩見矣小人在位則同於已譽之以為君子異於己排之以為小人不顧公私不恤治亂不畏天地鬼神是以自崇觀以來以至今日有異於已者而稱其為君子乎臣以為必無之也彼其專為進身自營之計故好惡不公以至於亡身亡家亂天下而莫之悔惟陛下親學問節嗜欲清明其躬以照臨百官則君子小人情狀又何隠焉提舉建昌軍仙都觀胡安國復徽猷閣待制知永州不許辭免制曰朕惟士君子讀聖人之書學先王之道豈獨善其身而已哉治人治已成已成物易地則皆然世俗之儒名師孔孟實蹈楊墨可與論中庸者鮮矣安國學優則仕行顧於言通經為儒者之宗論事識治道之体頃從時望召寘𤨏闈方嘉便於咨詢顧何嫌於封駮奉身而去亦既累年予力思共理之良爾安得獨善於已零陵雖小有社有民竹馬懽迎相望數舎往讀中興之頌無忘平日之言統制關外軍馬呉璘同統制楊政復秦州金薩里罕集諸道兵來援政復擊敗之己丑詔臨安府修蓋瓦屋十間權充太廟侍御史張致逺言中原雖隔絶而陵寢故在京都雖未復而廟社僅存萬一四方傳播以為朝廷剏建太廟兹焉定都人人解躰難以家至户曉甚失興復大計殿中侍御史張絢亦奏人言籍籍謂陛下去嵗建明堂今年立太廟是將以臨安府為久居之地不復有意中原矣後二日有詔梁汝嘉隨冝修葺俟移蹕日復充本府使用壬辰詔張浚暫往江上措置邊防左司諌趙霈言安危治亂之㡬相為倚伏臣願陛下無忘親征時臣亦無忘扈從時則治安可保恢復可期矣伏望益軫聖念載廣逺圖知晏安不可懐則前日跋履之勞不可忘也知愷樂不可極則前日宵旰之憂不可忘也知前日倉卒之驚則備禦之策其可忘乎知前日餽餉之艱則理財之道其可忘乎詔霈論奏深得諫臣之體可轉一官賜紫章服仍令尚書省將所奏修冩成圖進入龜鑑曰善乎趙霈之言曰願陛下無忘親征時臣亦無忘扈衛時此與馮異之勉光武者何異異時呉芾亦曰陛下勿以敵之進退為憂愉勿以事之緩急為作輟凡下詔必務責已引對必令盡言此與陸䞇之告徳宗者又何以異君臣上下警戒如此虜其可謂中國無備乎丙午詔遣監察御史一員往江西閩廣諸路體訪捕盜是日雷聲初發戊戍宋籛孫以扈從恩特轉一官殿中侍御史張絢言籛孫特於遙郡上轉行超躐衆人數等彼身冒鋒鏑萬死一生者儻或聞之豈免别生僥覬望速賜改正仍乞今後不許閤門以私事徑自取㫖並須經由三省及應干隨龍人亦不得妄有僥求上曰絢所論極當可亟令改正然隨龍人偶有一日攀附之舊輙僥求恩澤不已朕每抑之今後有如此者可令臺諌論列庚子命翰林學士孫近直學士院胡交修編類職事官條具利害章疏進上用直史館范冲之請也辛丑尚書左僕射趙鼎監修國史鼎奏范冲直史館於臣為外姻願以授浚上曰安可以冲故廢祖宗故事況史館非朝廷政令之地可無辭前二日冲以史事入對奏疏曰臣竊惟神宗皇帝實録既經刪改議論不一復慮他日無所質證輙欲為考異一書明示去取之意據史館所用朱墨本出於臣僚之家私相傳録書冩之際悉從簡便臣追記紹聖重修實録本朱字係新修黄字係刪去墨字係舊文今所傳本其刪去者止用朱抹又其上所題字盖當時簽貼今考異依重修本書冩每條即著臣所見於後庶㡬可考其考異五卷乞付史館更憑衆議刋定修立從之詔劉光世妾許氏寗氏呉氏並封孺人用光世請也中興後諸大將封妾自此始癸夘進呈殿中侍御史張絢言宰相用才雖不當以鄉閭親舊為嫌更冝廣訪寒畯上曰朕亦面諭絢茍如此則朋黨之風自破矣張浚曰大臣以國家為心則所用人才必取公論安有朋黨趙鼎曰用人才所以立國臣任宰相豈敢久居至於立國規模則不敢不為久逺計川陜宣撫副使盧法原薨于閬州偽齊將商元襲信陽軍知軍事舒繼明被擒誘以美官繼明罵曰吾寧為大宋鬼豈汙逆賊耶遂遇害閏二月乙巳朔宗正少卿直史館范仲秘書少監朱震並兼侍講是日雨雹丁未張浚往江上視師詔百官出城餞送時浚既行邉而趙鼎居中總政事表裏相應鼎於是以政事之先後及人材所當召用者密條而置諸坐右一一奏禀以次行之鼎謙冲待士犯顔敢諫權倖請謁内降差除一切格止鼎素重伊川程頥之學元祐黨籍子孫多所擢用去贓吏進正人時號為賢相翕然有中興之望鼎嘗入見見自外移竹􅀈入内奏事畢亟往視之方興工於隙地鼎問孰主其事曰入内髙品黄彦節也鼎呼彦節責之曰頃嵗艮嶽花石之擾皆出汝曹今將復蹈前轍耶勒軍令狀日下罷役翌日鼎入對上改容謝之簽書樞密院事胡松年知宣州免謝辭參知政事沈與求兼權樞密院事新知湖州李光言明越之境地濵江海水易泄而多旱故自漢唐以來皆有陂湖灌溉之利大抵湖髙於田田又髙於江每旱則放湖水溉田澇則决田水入海故無水旱之灾凶荒之嵗也本朝慶厯嘉祐間民始有盜湖為田者宣和以來創為應奉始廢湖為田自是嵗被水旱之患臣自壬子嵗入朝首論兹害蒙朝㫖先取㑹餘姚上虞兩邑廢置利害遂蒙獨罷兩邑湖田其會稽之鑑湖鄞之廣徳湖蕭山之湘湖等處其類尚多州縣官往往利為圭田頑猾之民侵耕盜種上下相蒙未肯盡行廢罷伏望聖慈專委漕臣考究漢唐之遺利檢舉祖宗之成法應明越湖田盡行廢罷其諸路如江東西圩田蘇秀圍田各有未盡利害望因此東作之時遍下諸路監司守令條具以聞詔諸路漕臣躬親前去相度利害限半月申尚書省己酉詔户部措置撰集紹興會計録用侍御史張絢奏也絢言國朝有景徳會計録又有皇祐會計録至治平熈寧間皆有此書其後蘇轍又倣其法作元祐會計録雖書未及上其大略亦有可觀皆所以總括巨細網羅出納凡天下賦入之數養兵之數條章各立支費有限謹視其書上下遵守此作會計録之本意也故有是㫖其後户部苐具去嵗收支數以聞而已辛亥詔權於濠州等處置市易務以通商貨其後岳州潭州亦如之命三衙兩浙江湖閩廣諸路帥臣依條揀放廂禁軍壬子輔臣奏遣中使往温州奉迎太廟神主事上曰朕以宗廟在逺心嘗慊然今奉迎神主至行在當行朝謁之禮乙夘御筆參知政事孟庾沈與求並權樞密院事輔臣進呈上顧趙鼎曰已與卿議定參知政事並兼權樞密院矣鼎曰樞密非古也自五代時以郭崇韜為使國朝因而不改故三省樞密院分為二途仁宗朝冨弼作諫官時陜西用兵弼建議乞令宰相兼樞密院事宰相呂夷簡辭之再三後卒從弼議宰相兼樞密院自夷簡始也臣既以宰相兼治院事而參知政事之臣並令兼權則事歸一體前人謂樞密院調發軍馬而三省不知三省財用已竭而樞密院用兵不止此誠至論上曰往時三省樞密院不同班進呈是以事多不相關白然朝廷議論豈有帷幄二三大臣不與聞者手詔曰朕惟監司外臺耳目郡守承流宣化惠養吾民其委任重矣間者朝廷輒輕以假人將何以使吏民聳然聽服朕甚恧焉繼自今其慎選擇勿狃于故常勿牽于私昵重以累國侍御史張志逺乞以安發欺庇為有司殿最若一縣被按於監司則罪一州一州被按於臺諫則罪一路其有激濁揚清無所顧避者亟褒寵之詔刑部立法申尚書省詔諸路提刑司申行諸州禁囚病死人嵗終計分斷罪之法丙辰詔諸路提舉常平併入茶鹽司内無茶鹽司去處仍令提刑兼領尚書兵部侍郎王居正言四庫書籍多闕乞下諸州縣將已刋到書板不以經史子集小説異書各印三帙赴本省係民間者官給紙墨工賃之直從之丁巳福建路轉運司官鄭士彦言坑冶盡廢物料貴踴計用錢二千四百而鑄千錢其本路舊額合發新錢二十八萬四百十省本司與提㸃司嵗認其數不猶愈於鼓鑄之折本欲望詳酌伺邊事息日施行從之川陜宣撫司將官牛皓與金人遇于瓦吾谷死之承信郎髙萬户部將任安隊官秦元薛琪張亨皆死於陣敵顧萬户曰真健兒也丙寅殿中侍御史張絢乞於經筵讀三朝寳訓上曰可從其請詔江東浙西路各造九車戰船十二艘浙東造十三車戰船八艘時王􅊅自京湖得二巨艦以歸故命倣其制為之丁夘詔足食足兵今日先務户部尚書章誼可專切措置財用兼參知政事孟庾提領資政殿大學士秦檜言金人便於弓矢乞多造強弩神臂弓以備攻討上曰檜雖在宮祠不忘朝廷右司諫趙霈言今天下之弊正患縣令之非其人願罷去注授格法盡歸堂除上曰比已降詔慎擇監司郡守然縣令於民尤親亦冝遴選趙鼎曰莫若令監司郡守舉治狀顯著者稍加擢用其尤無良重寘之法或足以示勸懲王􅊅提舉江州太平觀初􅊅既除騎帥而侍御史張志逺殿中侍御史張絢右司諫趙霈論奏其罪􅊅聞亦奏辭新命乞在外宮觀戊辰敕令所刪定官金安節入對安節上三事其一請專任理財之臣其二論行在職事官堂除猥冗其三論士風不競不䘏國事自為身謀乃取其第二奏行下詔江浙湖廣福建等路各置路分總管一員於帥府駐劄己巳參知政事孟庾言准敕差提領措置財用令乞以總制司為名專察内外官司隠漏違欠行移如三省體式應本司措置事件依例進呈得㫖關申尚書省仍鑄印以賜諸路係省錢出入舊經制司每千收頭子錢二十三其十上供其十三州縣及漕計支用庾請増十錢又請收耆户長顧錢抵當四分息錢轉運司移用錢勘合朱墨錢常平司七分錢茶鹽司袋息等錢又收人户合零就整二税錢免役一分寛剰錢又收官户不減半民户増三分役錢又收常平司五分頭子錢並令諸州通判諸路提刑司拘催其後東南諸路嵗收總制錢七百八十餘萬緍而四川不與焉大凡東南諸路經總二司錢嵗收一千四百八十餘萬緍四川嵗收五百四十餘萬緍左承議郎顔為追毁出身以來告敕除名勒停展三期敘坐前守嚴州犯自盜贓當徒六年也經筵開講自上視師暫輟讀講至是復之壬申上謂輔臣曰昨范温帶來京東民兵比效用請給春秋特攴衣絹一疋昨日中軍引見頗有藍縷者朕出内帑絹二千疋賜之趙鼎等曰陛下内帑縑帛之數非承平比每推以賜將士此盛徳也上曰朕宫中未嘗妄費雖内帑所有不多專用以激犒將士而已詔六院官左藏庫監官並依舊堂除詔右承奉郎徐度令中書舎人試䇿一道左迪功郎胡珵左朝散郎錢葉新授太常博士張宦並召試館職左朝奉郎新浙東提舉汪愷左承議郎通判潭州王棠並與陞擢差遣自詔復十科薦士而汪藻薦度及棠葉夢得薦愷及度葛勝仲薦珵宦棠沈與求薦葉胡交修薦愷故有是命中興後士以十科薦用者自此始真陽縣觀音山盜起攻剽鄉落舉人呉琪竄去琪妻譚氏被執盜欲妻之譚詬之曰爾輩賊也官軍旦夕且至將為韲粉我良家女何肯為汝婦盜強之不已至於捶擊愈極口肆罵為所殺三月甲戍朔詔諸路監司帥守條具被受專法來上用太府寺承王良臣請也丁丑詔侍講朱震范冲專講春秋左氏傳孫近唐煇仍講論語孟子鄭滋胡交修讀三朝寳訓上雅好左氏春秋故擇儒臣講之詔職事官監察御史至侍從并館職正字已上及在外侍從官監司帥守各舉所知充監司守令限半月具奏用侍御史張致逺請也詔諸路勘合錢每貫收十文足勘合錢即所謂鈔旁定帖錢者辛巳詔客販淮浙鹽至荆湖州軍如願般販往襄陽府路者聽從便京西舊東北鹽地分至是始通焉甲申淮東宣撫使韓世忠以大軍發鎮江世忠將行上賜手劄曰昨因敵退議者以經理淮甸為言人多憚行卿獨請以身任其責朕甚嘉之時山陽殘弊之餘世忠披荆棘立軍府與士同力役其夫人梁氏親織薄為屋將士有臨敵怯懦者世忠遺以巾幗設樂大燕㑹俾為婦人妝而恥之軍壘既成世忠乃撫集流散通商惠工遂為重鎮觀文殿大學士李綱進省記到建炎時政記二冊上謂大臣曰朕已看過皆是實事綱近日論事非往時之比趙鼎曰綱才氣過人但自辟屬官多少年浮躁之士致有所累耳辛夘中書門下後省奏上殿臣僚有親聞聖語者乞依慶厯七年詔㫖備録關修注官如循習故例隠匿不報以違制論壬辰左奉議郎李椿年入對上問以民間利害椿年曰今日法令非不善財用非不足而州縣每每不治者在不得人耳若於二税稍加措置不至失䧟用度自足若轉運司更將常賦隨時轉易通一路之有無財不可勝用也上曰今日監司郡守不相協濟朕在河朔親所備見監司所至不恤州郡有無盡行剗刷州郡往往藏錢不令監司知椿年奏曰誠如聖訓甲午趙鼎奏近久雨恐傷苗稼欲下臨安府祈晴孟庾沈與求曰以天氣久寒蠶損甚衆上曰朕見令禁中養蠶使知稼穡艱難祖宗時於延春閣兩壁畫農家養蠶織絹甚詳元符間因改山水丁酉復移浙西安撫司於臨安府以駐蹕之地理冝増重事權故也戊戍詔道州丁米依舊於田畝上均敷用本州請也庚子罷饒州孳生監鄱陽地髙寒非馬所冝自置監至今所蓄牝牡馬五百六十二而斃者三百十有五駒之成者二十有七而已其芻粟又皆賦於民人不以為便故罷之兵部侍郎王居正獻辯學四十二篇居正嘗入見請以舊所論著王安石父子平昔之言不合於道者為獻上許之居正乃釐為七卷其一曰蔑視君親虧損恩義凡所褒貶悉害名教其二曰非聖人滅天道詆誣孔孟宗尚佛老其三曰深懲言者恐上有聞其四曰託儒為姦以行私意變亂經㫖厚誣天下其五曰隨境互説反覆皆違其六曰排斥先儒經術自任務為新竒不恤義理其七曰三經字説自相抵牾詔送祕書省崇文觀王安石學益盛内外校官非三經義字説不登凡案居正獨非之至是因事請對進言曰臣聞陛下深惡安石之學久矣不識聖心灼見弊安在敢請上曰安石之學雜以霸道取商鞅冨國強兵今日之禍人徒知蔡京王黼之罪而不知天下之亂生於安石居正對曰禍亂之原誠如聖訓然安石所學得罪於萬世者不止此因為上陳安石訓釋經義無父無君者一二事上作色曰是豈不害名教孟子所謂邪説者正謂是矣居正退即序上語繫於辯學書首上之辛丑都督行府言知泰州邵彪具到營田利害勘㑹所陳委可施行合關送尚書省指揮從之参知政事孟庾沈與求見其所關曰三省樞密院乃奉行行府文書邪皆不樂宰相趙鼎不較人以為難癸卯移鎮江㩁貨務都茶場于真州初詔問宰執戰守方略呂頥浩上十事一論不用兵則中原不可復二論金將志驕意滿此將亡之兆三論用兵當用夏月四論分道進兵冝以五萬人由泗上擣汴京二萬人由海上攻沂密又二萬人駐濠上為援不可深入惟勅大將不得殺掠至八月班師明年復出五論軍糧海道二萬人日食米四百石合於四明支一月糧計一萬二千石附海船以去至山東則有糧可因河上軍糧由淮可運此皆不患惟趨汴京之師合齎十日糧至南京則糧可以因矣六論發兵日乞聖駕駐蹕鎮江七論淮南通泰鹽嵗一千四五百萬貫而二浙止七八百萬通泰倍於二浙尤冝選能吏為守八論機不可失兵屢得捷如吳玠初擊退於和尚原再禦退於饒風嶺又大捷於仙人關去嵗賊犯淮甸亦無所得而遁若不發兵終無息肩之期矣臣考宣和間户部月支纔九十萬而近年月支百一十萬夫養兵二十萬不北向以争天下則東南民力何以堪九論海船以閩為上廣次之温明又次之今天以此利賜我冝用之以擾登萊南風而往北風而歸虜雖鐵騎百萬必不能禦十論今前宰執六人議必不一是非可否在陛下獨斷而已朱勝非言自陛下議明軍政賞罰必當今内外勁兵三十餘萬冝於此時進取無失機後悔遂上四事一曰進討僣偽二曰守禦江淮三曰招撫遺民四曰審度敵情以為陛下勿謂賊馬退遁為可喜而以僣偽未誅仇敵未報為可慮勿以保全東南為可安而以中原未復赤縣神州猶汙腥羶為可恥勿以諸將屢捷為可賀而以軍政未修士氣未振尚使狂冦得以僣窺為可虞則中興之功可指日而俟守備之冝則當料理淮甸荆襄以為藩籬當於淮南東西及荆襄置三大帥屯重兵以臨之東路以揚州西路以廬州荆襄以襄陽為帥府淮東路則以江東路財用給之荆襄則以湖北路財用給之徐議營田使之贍養假以嵗月則藩籬成守備之冝莫大於是矣然後可以議攻戰之利亦當分責於當路大帥謂如淮東西之帥則當責以收復京東東西路荆襄則當責以收復京西南北路川陜之帥則當責以收復陜西五路若夫措置之方則臣願先定駐蹕之所今鑾輿未復舊都莫如權冝且於建康駐蹕控引二浙襟帶江湖運漕財榖無不便利臣昨於建炎初建議推關中為上襄陽次之建康為下者以天下形勢言之也然淮南有藩籬形勢之固然後建康為可都願陛下與二三大臣熟計之綏懷之畧則臣願先為自治自強之計使䧟溺之民知所依告益堅戴宋之心又曰陛下憂勤至矣而未足以成中興之業則羣臣誤陛下也大槩近年所操之説有二間暇則以和議為得計而以治兵為失策倉卒則以退避為愛君而以進禦為誤國萬口和之牢不可破終累年以來冠蓋相望而初不得其要約翠華蒙犯而尚未有所定居上下茍且偷安而不為長久之計天步益艱國勢益弱職此之田大運有開天啟宸𠂻超然逺覽悟前日和議之失而躬總六師懲前日退避之非而親臨大敵逆臣悍虜數十萬衆飲馬江干雖未能掃蕩邀擊盡殱醜類而天威所臨亦足以使之震怖不敢南渡潜師宵奔則和議之與治兵退避之與進禦其效既可覩矣臣願陛下反前日之所為勿復為退避之計姑罷遣和之使擇所當為者一切以至誠之意為之先後本末各以次第修舉倉廪實府庫充器用備士氣振力可有為方議大舉則雖兵未交而勝負之勢以决矣抑臣聞朝廷者根本也藩方者枝葉也根本固則枝葉繁朝廷者腹心也將士者爪牙也腹心壯則爪牙奮今國家逺有強盛之黠虜近有僣偽之逆臣所仰以為捍蔽者在藩方所資以致攻討者在將士然根本腹心則在朝廷惟陛下正心以正朝廷正朝廷以正百官使君子小人各得其分則是非既明賞罰必當自然藩方協力將士用命雖有黠冦不足畏逆臣不足憂此特在陛下方寸間耳具條上六事一曰信任輔弼大畧謂今選於衆以圖任股肱之臣遂能捍禦大敵可謂得人願陛下待以至誠無事形迹久任以責成功勿使小人得以間之二曰公選人材大畧謂陛下臨御已來用人材多矣世之所許以為正人端士者往往閒廢於無用之地蓋自昔抱不羣之材者常為小人所忌嫉或中之於黮闇或指之以黨與或誣之以大惡或摘以細故而以道事君者不可則止雖負重謗遭深譴安於義命不復自辨夫人主豈能常無愛憎然必去愛憎而後能用人以興邦者愛憎出於私情用人必由於公道故也陛下誠能推至公之道將見人材輩出中興之業不難致矣三曰變革士風大畧謂近年士風尤薄不顧國體惟欲進身不覈事實惟欲傷人大罵則大進小詆則小遷翕訿成風此非朝廷之福也朝廷設耳目之官以廣視聽故許之以風聞至於大故須當覈實使果如其言則誅責所加不冝止從輕典使言而無實服讒蒐慝得以中害善良皆非所以修正刑也陛下得一張浚付以西事浚以忠許國雖失機㑹不為無過而言者繩以大惡賴浚有浴日之功足以結知又有大臣為之辨得以洗濯不然何以雪哉願陛下降詔戒士大夫使体徳意務從忠厚則中興之業不難致矣四曰愛惜日力大畧謂事粗定之時朝廷所推行者皆簿書期㑹不急之細務至於攻討防守之䇿軍國之大計皆未嘗留意安得不為敵人之所陵侮願詔大臣熟議所以為規模者畫一條具如立課程以次施行五曰務盡人事大畧謂天人之道其實一致今未嘗盡人事敵至則先自退屈而欲責功於天可乎願與大臣協心同力務盡人事以聽天命六曰寅畏天戒大畧謂比年以來天屢譴告願陛下以至誠之意正厥事以應之疏累數千言時秦檜汪伯彦李柄顔岐王綯韓肖胄皆應詔上對惟綱議剴切的當知福州張守言明詔四事臣以為莫急於措置措置茍當則餘不足為陛下道矣臣請為措置之大畧其一措置軍旅其二措置糧食何謂措置軍旅神武中軍當專衛行在而以餘軍分措三路一軍駐于淮東一軍駐于淮西一軍駐于岳鄂或荆南擇要害以處之使北至關輔西抵川陜血脉相通號令相聞有唇齒輔車之勢則自江而南可以奠枕而卧也然今之大將皆握重兵貴極冨溢前無禄利之望退無誅罰之憂故朝廷之勢日削兵將之權日重而為大將者萬有一稱病而賜罷或卒然不諱則所統之衆將安屬耶臣謂冝拔擢麾下之將使為統制每將不過五千人棊布四路朝廷號令徑達其軍分合使令悉由於朝廷之權以用之然後可以有為也何謂措置糧食諸軍既以分屯諸路則所患者財榖也然所費多寡在彼猶在此爾則所患者轉輸也今冝舉兩浙之粟以餉淮東江西之粟以餉淮西荆湖之粟以餉岳鄂荆南量所用之數責漕臣將輸而歸其餘於行在錢帛亦然恐未至於不足也錢糧既無乏絶之患然後戒飭諸將不得侵擾州縣以復業之民户口多寡為諸將殿最嵗遣官覆實而陞黜之則民得以還其鄉里而田野日闢生齒日滋江北州縣有復業之漸矣如是措置既定俟至防秋復遣大臣為之統督使諸路之兵首尾相應綏懷之畧亦在是矣然究其本原則在陛下内修徳而外修政耳所謂修徳不過正心誠意畏天愛民儉于家勤于邦逺聲色屏貨利兢兢業業凡可以累徳者無不去也所謂修政不過任賢使能信賞必罰抑權倖裁冗濫謹法度興亷恥凡可以害治者無不去也持久不倦盛徳日新四海愛戴何患夷狄之不服在陛下果斷而力行之翟汝文言朝廷無逺畧無定論無腹心謀議之臣三者不立何後之善自建炎俶擾今九年矣天下日苦於兵而戰守之計初未定也經國規模初未立也將相大臣每至防秋則豫謀避地之計至春則泰然安肆如無事之日敵至與衆同懼敵退與衆同喜如斯而已所謂禦敵者臣不識也臣願擇大臣有深謀者任之責其恢復拔用能將必以尅敵合天下之英傑相與謨議立國之綱紀規模先定然後可為也胡安國時在湖南聞有是詔以書與其子起居郎寅曰比詔問舊宰執即是國論未定正要愽謀此機㑹不可失若贊得歸是其績不小汝勉思之吾有時政論二十篇雖未詳大綱舉矣諸葛復生不能易此也夏四月甲辰朔監察御史田如鼇為尚書祠部員外郎如鼇嘗上書排抵大臣其言及殿中侍御史張絢輔臣入對上因曰臺臣耳目之官朕未嘗不慎此選然必試之六察度其可用方敢除言事官沈與求曰臺臣與朝廷分持紀綱要須得沉厚練達之人則論事不茍上曰用沉厚練達之人極是然朝廷與臺諫當為一家不分而為二若朝廷所行臺諫輙詆之臺諫所論朝廷輙沮之則事何由濟翌日如鼇遂罷郎官之命新除徽猷閣待制知永州胡安國乞以本官奉祠詔安國經筵舊臣引疾辭郡重憫勞之可從其請提舉江州太平觀今纂修春秋傳俟進書進入以稱朕崇儒重道之意詔進士王九齡召赴行在令閤門引見上殿九齡博極羣書卓越有大志㑹日食求言九齡上書論役法五害如司馬光所言已見於今日中書門下省奏江浙㳂襲舊例差保正長催科等事致有破産失業流離之人前後臣僚論列雖多惟九齡建陳曲盡利害已令有司措置立法故有是命九齡入見又上五事一役法二屯田三復武舉四均賦税五課農桑上再三稱善趙鼎讀九齡奏疏謂同列曰王君論事盡天下之利害非老生之常談也乃以為太平州當塗縣主簿丙午右承奉郎黄大本貸死杖脊刺配南雄州牢城收管大本為貴池丞坐贓抵罪故有是命既而監文思院于淙南恩州司户莫害章皆以賄敗遂斷配焉丁未召荆南鎮撫使解潜赴行在於是諸鎮撫使並罪矣戊申張銖奉太廟神主自温州至行在己酉宗正少卿兼侍講范沖轉對言仁宗皇帝建邇英閣嘗命儒臣蔡襄等寫尚書無逸篇并孝經天子孝治聖治廣要道四章為二圖列於左右元祐初臣父祖禹為侍講奏乞檢尋二圖如仁宗故事哲宗皇帝從之願陛下圖書無逸篇為二圖置於講殿之壁上納其言遂書為二圖不崇朝而畢翌日以諭輔臣沈與求曰願陛下以是圖為元龜夙夜自儆則恢復之期可卜矣乙卯進呈殿中侍御史張絢奏嚴州壽昌縣令臧梓治狀可稱饒州安仁縣令趙濤貪汚不法乞行勸沮御批梓改合入官再任濤送提刑司取勘趙鼎等曰兩縣士民近經都省陳狀已下監司覈實上曰絢所奏亦因兩縣士民經御史臺投狀故有此請朕思毁譽固未可知且令監司核實然後行賞罰未為晚也己未詔鄉村五保為一大保通選保正於免役令中去長字始改紹聖法也庚申詔韓世忠紀律嚴明岳飛治軍有法並令學士院降詔奬諭時世忠移屯淮甸軍行整肅秋毫無犯飛移軍潭州所過不擾鄉民私遺士卒酒食即時價償值上聞之故有是詔辛酉新諸王宫大小學教授錢􅀢臨安府府學教授周葵並為監察御史先是沈與求薦􅀢節操方正可備獻納故二人並命甲子太上道君皇帝崩于五國城年五十四兵部侍郎司馬朴與通問副使朱弁同在燕山聞之密議舉哀制服弁欲先請朴曰吾儕為人臣子聞君父喪當致其哀又何請設不見許可但已乎遂服衰朝夕哭金人義之而弗問詔諸路營田司官給種糧者毎一耕牛嵗課毋得過十碩民間自有耕牛者除輸納税賦外毋得抑令耕種營田時言者以為解潛在荆南民有耕牛官為給種納課或十餘碩而租税差科仍舊是致百姓流移田業荒蕪故條約焉丙寅上就射殿躬行景靈宫孟夏朝獻之禮龍圖閣直學士致仕楊時卒年八十三起居郎兼侍講朱震言時學有本原行無玷缺進必以正晚始見知其所撰述皆有益於學者詔有司取時所制三經義辯賜其家銀帛二百匹兩後謚曰文靖五月庚辰吏部員外郎周祕面對上曰自令臣僚轉對甚有所輔由此擢用者亦多縱有不當亦不欲責罰恐人不敢論事辛巳輔臣奏事趙鼎曰昨日得㫖擇日降制除防禦使援為節度使封國公出就資善堂聽讀臣退而與孟庾沈與求商量皆仰賛陛下為宗廟社稷大慮謹令有司卜今月二十六日吉惟陛下裁擇上曰可與求曰此盛徳之事也而陛下斷自聖心行之不疑此自古聖賢之所難也上曰朕年二十九未有子然國朝自有仁宗皇帝故事此事甚易行而前代帝王多以為難鼎曰自古帝王以為難陛下行之甚易此所以莫可跂及也上曰藝祖創業肇造王室其勤至矣朕取子行下鞠於宫中復加除拜庶㡬仰慰藝祖在天之靈庾曰陛下念藝祖開創之艱而聖慮及此帝王所難能之事也初張浚之未出使也上嘗以語鼎浚庾與求曰此子天資特異在宫中儼如神人朕親自教之讀書性極彊記鼎先得㫖於行宫門内造書院屋一區欲令就學至是書院成上曰只以書院便為資善堂俟除授訖命儒臣為直講翊善悉如資善故事給事中廖綱言今諸將之兵被於江淮不知㡬萬數日待哺於東南之轉餉東南之民已不勝其困矣可救此患莫若屯田朝廷亦嘗行於淮南今閲數秋未聞有補豈措畫之方勸相之誠有未至乎乃獻唐郭子儀漢力田科蜀諸葛亮事為屯田三説上之詔都督行府相度措置癸未詔江浙四路兵造五車十槳小船三十言者以為緩急遇敵須用輕捷小船相參乃復為之甲申上諭輔臣曰昨路允迪奏到所記聖語見揚州駐蹕時人才凡冗冝遭變故今行在人才皆可觀趙鼎曰陛下以人才為意中興可復天下幸甚神武中軍統制楊沂中遣士卒五十餘人運怪石置之太平樓酒肆殿中侍御史張絢遇諸塗奏言今邊境多虞百姓艱食陛下方且卑宫菲食焦勞於上一花一石屏去不顧奈何軍中不能上體聖意乃敢公然運石以為酒肆遊觀之美豈獨訓練士卒之時不當勞以無益之役而衆目所觀傳播四方亦非美事此風漸不可長兼臣近見村民多取花株竹􅀈街市貨賣若不嚴加止絶亦有棄本逐末之患欲望體問今日運石因依重加行遣仍乞下臨安府令禁止村民貨賣花竹庶㡬陛下勤儉之徳不待家至户曉而侈泰之俗一變而為樸素實艱難之先務詔禁止沂中坐罰金乙酉祕書省正字李彌正轉對面奏見存西北之兵歳久銷減乞令州郡募東南民兵敎習以壯國威禦盜賊萬一朝廷有警亦可募以調發上曰朕自知南兵可用向有五百人皆平江人在張浚軍中往往率先犯陣其不可用者但未教習耳彌正又因口陳大臣進退之易實害治體國朝自祖宗體貎大臣陛下即位以來恩意尤篤上曰祖宗體貎大臣恩意甚厚與庶寮不同此朕家法每奉以周旋如鄭文公雖一國之君進臣不以禮退不以道為詩人所譏彌正又陳古者創業中興之主必有謀臣任專責重憂勤逸樂與之終始今人之才雖不敢逺望古人願陛下捨短取長擇忠實可仗者推腹心以任之則事功可見就緒上曰善若無一二腹心之臣孰與議謀丙戍新除幹辦諸司審計司李椿年再得召見論今日之弊甚大者有三一曰銓選之弊員多闕少二曰食貨之弊錢輕物重三曰所司之弊吏強官弱又口奏度牒事以為今一嵗所鬻不下萬數是嵗失萬農也積而累之農㡬盡矣非生財之道也上首肯之乃下其章命吏户部同措置詔中書舎人胡寅論使事辭㫖剴切詳明深得論思之體令學士院降詔奬諭時既用尚書右僕射張浚議遣問安使何蘚入雲中寅上疏言女真者驚動陵寢戕毁宗廟刦質二帝塗炭祖宗之民乃陛下之讐也頃者誤國之臣自知其才術不足以戡定禍亂而又貪慕富貴是故譸張為幻遣使求和以茍嵗月九年于此其效如何彼之一身叨切爵位而去曽何足道而於陛下聖徳國家大計虧喪多矣所幸陛下智勇日躋灼然獨見於邪言久惑之後奉將天討罪狀劉豫再安國步漸圖興復天下忠臣義士聞風興起各思自效以佐丕烈今乃蹈庸臣之轍踐已失之謀犯孔子之戒循魯莊之事忘復讐之義陳自辱之辭臣切為陛下勿取也或謂不少有貶屈其如二帝何臣應之曰自建炎丁未至於紹興甲寅所謂卑辭厚禮以問安迎請為名而遣使者不知㡬人矣知二帝所在者誰歟見二帝之面者誰歟得女真之要領者誰歟因講和而能息外兵者誰歟臣但見丙午而後通和之使歸未息肩而黄河長淮大江相次失險矣臣但聞去年冬使者還言酋豪帖服國勢奠安形于章奏傳播逺近曽未數月而劉豫稱兵犯順矣女真者知中國所重在二帝知中國所恨在刦質知中國所畏在用兵則常示欲和之端増吾所重平吾所恨匿吾所畏而中國坐受此餌既久而後悟也天下其謂自是改圖必矣陛下可不據孔子之論而决此䇿乎茍惟不然以中國萬乗之尊而稱臣於仇敵則宰輔而下皆其陪臣也借使女真欣然講解以一將軍數萬衆駐兵泗水之上願陛下面相結約㰱血而退不知陛下何以待之陛下試加採擇或合聖意即以此讎當復無可通之義明降指揮寢罷奉使之命疏奏上嘉納命宰相趙鼎召至都堂諭㫖仍賜詔奬諭寅又上表言天下有至公之心有正直之論違正論拂公心以行其邪説雖當時不悟及事以敗世已陵遲然後悔之則無及已姑以近事明之方王安石得志託大有為之説大有為之説者孟子之言也豈不美哉當時元勲舊徳皆以祖宗舊法不可變改安石斥之為流俗而其説盛行自今觀之其所謂大有為者乃所以召亂其所謂流俗者皆賢才也使神祖照之於司馬光辭樞密副使之時而退王安石罷新法則尚有崇觀之亂乎及蔡京秉政託繼志述事之説繼志述事之説者孔子之言也豈不美哉當時忠臣義士皆以新法害民當遵元祐蔡京名之為謗訕而其説盛行自今觀之其所謂繼志述事乃所以遂其私意其所謂謗訕者皆忠言也使上皇照之於陳瓘論列之時而退蔡京復元祐則尚有宣靖之禍乎天下之理一是一非出於是則入非出於非則入是理不並立人無兩存此人才邪正之所由分而國家治亂之所由判自古如此豈惟今哉女真入冦以來和戰兩議肇於孝慈在位之日兩議不决馴致北狩自今觀之外裔之不可與和亦易見也而和議之説不息非特通和女真又欲通和劉豫和之一字實懷二心以國與人亦所不恤豈不過甚矣哉原其所本起於耿南仲昌言之正猶王安石大有為之論蔡京繼志述事之説而尊王庇民疾讐殄惡不欲和者亦猶司馬光不以王安石為然陳瓘不以蔡京為是八年於此正論不勝監觀前事識者憂之尚賴陛下險阻備嘗照知情偽於和議輩皆已試用了無功效此䇿不足中興斷自宸衷舎非從是遂嚴降詔㫖數敵過失聲罪致討一振國威豈於女真尚肯通使適覩何蘚之事恐和説復行國論傾危士氣沮喪所係不細遂具陳奏陛下曲賜褒諭以來衆言使天下忠義之士皆知陛下雪恥復讎之意用賢才修政事厲兵選將駸駸北向以為迎二帝之實大計一定邪説不行中興可期宗社之福豈獨㣲臣沗切恩詔以為今日美談而已户部奏諸路殘破州縣守令勸民墾田及抛荒殿最格其法墾田増及一分郡守陞三季名次累及九分遷一官虧及一分降三季名次九分鐫一官縣令差減之縣具墾闢實數月申州州季申監司増虧十分者取㫖賞罰己丑參知政事權樞密院事孟庾進知樞密事庚寅趙鼎奏事因言李沆作相時毎奏祥瑞須雜以水旱螟蝗文字進呈憂國愛民之心如此上曰王旦賢相也東封時都無一言如天書降殆難考驗但朝廷内外得人四民安業則為上瑞辛夘嚴州壽昌縣令臧梓特改合入官令再任以兩浙轉運奏其治狀有實也上曰若得賢令尹如此一方皆受惠趙鼎曰一縣生靈十萬縣令得人則人人安業上曰然朕區擇監司守令政欲安百姓也辛酉尚書右僕射張浚提舉詳定一司敕令參知政事沈與求同提舉初置提舉官也中書舎人胡寅言兵興以來衣冠轉徙失所者衆於是開奏辟之路置添差之闕廣宫廟之任増待次之除所以惠恤之者亦厚矣而奔競日昌不安義命方在責藉則乞叙雪已得叙雪則乞祠禄已得祠禄則乞差遣已得差遣則乞改替已得改替則乞近闕已得近闕則乞見任已在見任則乞超擢士風之弊莫甚此時伏見舊法已有差遣及方在貶謫者不得輒入國門所以杜貪躁清仕路存綱紀也伏望明詔宰執舉行成憲從之寅又言近來書命多出詞臣好惡之私使人主命徳討罪之言未免玩人喪徳之失詔以付中書後省戊戍岳飛至鼎州之城外先遣兵馬鈐轄楊華入賊招安華未降時為賊魁以寛厚得衆遂與故部曲潜結楊太黨謀殺太以降時大旱湖水涸如深冬賊益懼己亥貴州防禦使瑗為保慶軍節度使封建國公宗正少卿兼直史館范冲兼史館修撰兼侍講資善堂翊善起居郎朱震兼資善堂贊讀上親筆付出制曰朕為宗廟社稷大計選於屬藉得藝祖七世孫鞠之宫中兹擇剛辰出就外傳冝有端良之士以充輔導之官博觀在廷無以易汝時張浚在潭州聞建國公當就傅亦薦冲震可備訓導朝論以二人為極天下之選或謂浚繇此與鼎始有隙詔以盛暑命諸路監司分往所部慮囚前二日進呈行在疎决上問外路如何趙鼎曰臣記每年夏熱時令提舉司催决獄事自渡江後不曽舉行上曰大理等處禁繫無㡬當行之諸路令無淹延刑禁庶暑中不致罪人疾病也自是遂為永制庚子知䖍州韓昭奏周十隆已就招六月癸夘朔趙鼎言資善堂極褊隘恐方暑不便上曰粗令修葺可也朕常以營造為戒居處不敢求安前日孫近乞罷修學士院然上漏下濕若不畧與修葺非朕待遇儒臣之意甲辰洞庭賊楊欽將所部三千人詣岳飛降初張浚至長沙親臨湖以觀賊勢疑未可攻㑹有急詔召浚還朝謀防秋之計岳飛至潭州出圖示攻討出入之要且曰擒之易耳浚曰恐誤防秋之期俟明年再來討之如何飛請除往來之程限八日破賊請浚曲留以俟浚然之飛以統制任士安為賊餌賊併力拒之凡三日飛乃以大兵四合一戰破賊衆殆盡乗其舟以入水寨欽等迎降欽在賊中最悍楊太恃以為强飛厚待之賊愈喪氣乙巳名新歴日統元丙午上諭輔臣曰近令諸郡以箭鏃改造甲葉恐再於民間科敷密院只今行下令只於作院打造毋得科擾百姓趙鼎曰陛下恤民如此臣等敢不奉承聖意祠部員外郎林季仲嘗因面對乞重縣令之選其言曰令非其人一邑受其弊守非其人一郡受其弊監司非其人一路受其弊積諸路而言之其弊有不可勝言者將何利於國家而輕是選耶願從陛下丐一縣令往以自效臣承乏郎曹求為縣令若不情者然官職輕重惟陛下如何以省部為重則重在郎官以斯民為重則重在縣令漢明帝曰郎官出宰百里茍非其人人受其殃葢非以郎官為重重其出宰百里也己酉上謂輔臣曰朕以南班宗室請給至薄甚有貧窶者昨日出内帑錢每人賜二百千令宗正丞沈禹卿散給尚有親賢宅近屬已取㑹人數别行給賜趙鼎曰今宗室凋零無㡬陛下敦睦如此盛徳事也建國公初出資善堂上命見翊善范冲贊讀朱震皆設拜趙鼎等得㫖依故事謁見冲等每因箋奏導國公以仁義之言輙褾軸藏之時一展玩國公嘗得李公麟所畫孝經圖冲書其後略曰孝者自然之理天地之所以大萬物之所以生人之所以靈三綱五常之所以立學然後知之心不茍慮必依乎道足不茍動必依乎禮行之以不息守之以至誠造次必於是顛沛必於是及乎習與性成是謂純孝不然無以立身矣豈不見夫諸侯車服之美儀物之盛尊榮如此國公以幼學之年享寵禄之厚盍思所以保冨貴之道乎故冲以諸侯之事為獻曰戰戰兢兢如臨深淵如履薄氷周之諸侯其入而居于王所則皆謂之卿士故冲又欲以卿大夫之事為獻曰夙夜匪懈以事一人國公其勉之辛亥趙鼎進呈以旱乞分命侍從官等徧走羣祀祈雨事上曰亢陽如此朝廷政事闕失更冝講求鼎等曰近日蠲除翎毛箭鏃及官舟運糧等事皆是仰承聖意以寛民力沈與求曰雲漢之詩雖上下奠瘞靡神不宗不廢禱祈之事要之以側身修行為本陛下勤恤民隠如此冝䝉佳應癸丑手詔訪聞諸路久愆雨澤繇朕不徳致斯亢旱雖恐懼修省思所以答譴戒弭天灾尚慮州縣違戾詔令重擾吾民致傷和氣除税租和預買及應副大軍之外應干科敷催驅等事日下並罷荆湖制置使岳飛破湖賊夏誠楊太赴水死餘黨相繼皆降飛入水寨殺賊衆殆盡惟夏誠寨固守寨三面臨大江背倚峻山官軍陸攻則入湖水攻則登岸至是飛測其淺處乃擇善罵者二十人夜往罵之且悉衆運草木放之上流賊聞罵聲争擲瓦石草木為瓦石所壓一旦填滿飛長驅入寨遂執誠湖冦悉平龜鑑曰竹籖之題卒誤鍾相相既擒矣么猶相也然而昌寓致討而不能平王􅊅招安而不能伏及張浚至醴陵召間諜之囚釋其縳而縱之歸使諭冦於是么之將楊欽降卒有膽喪之嘆岳飛至鼎城取偏裨之慢令者鞭之以折其氣吏為虜餌於是么斃而誠擒果應飛來之䜟此平楊么之功烈也大事記曰嘗謂宣王中興平外夷耳光武中興平内冦耳而髙宗欲攘夷則内冦轉迫欲除盜則外戎復張然而降張遇等殺杜用丁順等則有王淵撃李昱平趙方則有劉光世却丁進則有守臣康允之破戚方則有守臣周把誅葉儂討李成則有張俊平范汝為平曹成則有韓世忠而楊么據上流僣號紀年尤為心腹之害岳飛一至八日而應飛來之䜟湖冦盡平而外冦始息矣使當時諸盜不作諸臣得以併力中原豈不足以建立事功哉甲寅尚書左僕射趙鼎知樞密院事孟庾參知政事沈與求奏自五月丙子不雨今越四旬叨冐近司輔政無狀致此譴戒伏乞特降威命正臣等之罪早賜黜責詔答曰旱暵逾時甘澤未應乃朕菲徳非卿等咎各安厥位無得再請丁巳史館修撰資善堂翊善范冲言伏見和靖處士尹焞誠明之學實有淵源直方之行動應規矩内外淳備毫髪無玷實為鄉閭之所尊禮士夫之所矜式臣無能彷彿舉以代臣允愜公議詔川陜宣撫司以禮津遣赴行在焞程頥髙弟也頥死聚徒洛中非弔喪問疾不出户士大夫尊仰之靖康初种師道薦于淵聖方召至闕將命之官力辭而去建炎兵亂鎮撫使翟興辟之不能致紹興中避難長安偽帥趙彬以劉豫命玉帛招之焞却幣奔蜀居于涪州上聞其賢故召湖冦既平張浚乃更易郡縣姦贓吏宣布寛恩命岳飛進軍屯荆襄以圖中原浚率官屬泛洞庭而下時淮東宣撫使韓世忠江東宣撫使張俊皆已立功而飛以列校拔起世忠俊不能平先是飛皆屈已下之數通書俱不答及飛破楊么獻樓船各一兵徒戰守之械畢備世忠始大悦而俊益忌之戊午詔福建嵗貢龍鳯團及京挺茶並權減半罷湖州嵗貢花蕉布癸亥趙鼎奏甘澤應祈乞御常膳上曰朕累日寢食不安者豈特為國無儲蓄而望嵗之心甚切兼恐嵗饑民貧起而為盜朝廷不免遣兵討定殘殺人命亦天道之所冝憫也甲子詔省試舉人程文許用古今諸儒之説并自出已意文理優長並為合格令試院榜諭乙丑張浚奏湖冦盡静上手書賜浚曰非卿孜孜為國不憚勤勞誰能寛朕憂顧奏到之日萬口一辭以謂上流既定則川陜荆襄形勢連接事力増倍天其以中興之功付之卿乎戊辰命翰林學士孫近知貢舉給事中廖剛中書舎人劉大中同知貢舉中書門下省檢正諸房公事呂祉殿中侍御史張絢等六人為參詳官祕書省正字李彌正等二十二人為㸃檢試卷官太常少卿陳桷為别試所考試官司勲員外郎林季仲等四人為㸃檢試卷官自後率如此例詔諸路監司州縣非奉朝㫖假作軍需名色之類科須者並罷秘書丞環中知臨江軍中嘗進春秋年表沈與求奏不當先魯而後周上曰士大夫著述訛舛容有之中為人臣乃不知尊王之義豈可寘之三館庚午權鄂州江夏縣吕大周特改合入官時湖北提刑司奏大周任内招復増户二千八百七故優賞之辛未皇叔蘄州防禦使士珸為泉州觀察使是月汴京地震秋七月壬申朔饒州進士朱嘉積言子召虎十嵗能誦經史兵書步射乞挑試詔賜帛二十匹罷歸丁丑孟秋薦享太廟自是嵗五享如常禮詔諸路監司帥守按試武士所能具職位姓名來上用李光請也己卯知樞密院事孟庾知紹興府庾以行府關三省樞密院事積不平因稱疾求去參知政事沈與求權樞密院事兼權措置財用庚辰内侍盧公裔言見係致仕在蜀中乞赴行在上曰此人極不平穏不若與在外宫觀況朕宫中小黄門數十輩備掃除趍走而已近上者亦有数未嘗假以權也每觀漢唐之禍及近時之變故不得不防㣲杜漸趙鼎等曰漢唐宦官傳有可鑒誡上曰仇士良勸後輩戒人主不近儒生不觀書可以鑒也壬午賜觀文殿大學士李綱親筆詔書奬諭綱應詔陳三䇿又上六條故有是賜癸未知南劍州沙縣丞陳沃新婺州教授冨元衡並充諸王宫大小學教授紹興府宗正司供職渡江後廢趙鼎始創復之二員居行在二員居㑹稽自是為例丙戍知宣州趙不羣陞直龍圖閣再任上曰不羣為郡有稱首公奉法使百姓安其田里當寵旌之以為四方之勸上又曰民窮無聊起而為盜多縁守令不良擾之使然若百姓安其田里其肯為盜乎朕夙夜以此為懷卿等復留意謹擇守令庶㡬百姓有安居樂業之意癸巳知滁州何洋條上屯田利害上曰淮北之民襁負而至朕為民父母豈可使民失所可賦田予之更加優恤恐乍歸之人或無居止當行下提㸃司量給官錢賑助之沈與求曰立國不當為朝夕計今使就耕之民盡蠲租賦更賑助之則五年以後兩淮荒土往往耕闢已多縱便恢復亦為朝廷之利上曰然乙未上曰内諸司轉官出職祖宗皆有格法朕遵守之甚嚴但付之有司依法施行八月甲辰詔増館職為十八員時言者論唐太宗當兵戈搶攘之際置文學館學士凡十有八人其後皆為名臣祖宗闢三館以儲養人材盖本於此今國步艱難時方右武故館職猶多闕員然臨事毎有乏財之歎則儲養之方亦不可以兵戈而遽己也乞如祖宗故事通以十八人為額故有是㫖禮部貢院放榜考校到合格進士樊光逺等二百人博學宏詞科新敕令所刪定官王璧新明州州學教授石延慶二人丁未宰相趙鼎乞罷政先是殿中侍御史謝祖信奏新僉書廣徳軍判官趙繼之任衢州江山令贓汙狼藉與判官趙不愚共為姦利表裏相濟詔浙西憲司劾治其日癸卯鼎嘗以京秩薦此二人故乞解機務是日祖信方候對上顧鼎曰事有輕重卿薦士之失甚輕而朕之罷相甚重知人自古難之豈可以薦二士之失而罷宰相己酉趙鼎言故右奉直大夫邵伯温大賢之後行義顯著元符末以上書得罪書名黨藉坐廢者四十年伏望優加褒贈鼎伯温門人也詔贈祕閣修撰官其家一人丁巳詔福建收買末茶指揮勿行己未詔御筆比覽元符諫臣任伯雨章疏論章惇蔡卞詆誣宣仁聖烈太后欲追廢為庶人誰無母慈何忍至此自朕纂服是用疾心昭雪黨人刋正國史雖崇寧而後迷國猥衆推原本始實自紹聖惇卞竊位之時而諼慝未彰將何以仰慰在天稱朕尊嚴宗廟之意可令三省取索議罪來上當正典刑布告天下丁夘故特進申國公章惇追貶昭化軍節度副使故責授寧國軍節度副使蔡卞追貶單州團練副使各人子孫不許除在内職任用己未詔書也史臣曰理能正於人之心而治不足以達於天下者未之有也天下之亂非自為之也必有害常醜正者取三綱九法汨陳而倒行之以致於亂矣而人心之不冺者猶在也舉而明之亂可使治亦豈其自治哉理在其心者固先之矣紹聖二姦為國産亂以絶天之理其忍哉髙宗誅姦於既死其得撥亂世反之正之理乎是月偽齊陷光州九月辛未朔詔總制司近取漕司雜税及常平増收頭子錢鈔旁勘合錢耆户長雇錢常平一分寛剰錢正税零畸剰數等並罷以久旱用都省請也壬申權川陜宣撫副使邵漙按屬郡守趙丞之不法趙鼎曰漙在蜀中極振職上曰人情多鋭於其初久之往往懈怠若常如此甚佳雖古帝王亦然唐明皇開元天寳治亂可見矣趙鼎曰陛下知此中興之功冝不難致天下幸甚乙亥上御射殿賜進士汪洋等二百二十人及第出身時右修職郎黄中對䇿言陛下貴為天子冨有四海而兩宫北狩闕然温凊之奉者十年于此矣人生天地之間如白駒之過隙所謂十年者豈可多得陛下思念至此豈不為之痛心然臣恐陛下有思念憂懼之言而未有思念憂懼之誠心也故凡有是誠者必有是事臣不識陛下所改作者果何等事邪今天下之弊極矣臣愚以為獨在於陛下安之以誠益之以剛健明詔二三執政大臣思有所矯拂於世俗事事刮劘整齊之必盡去天下之宿弊而為之一新其耳目然後治效將有可觀祖宗之烈為可復父兄之恥為可雪也洋䇿言治道之要不在乎他在反求諸己而已臣願陛下以帝王之道為可以必至以聖人之言為可以必信勤而行之不自懈怠以混一區字為心使設施注措莫不當理從諫如轉圜見善如不及純而不已盛徳日進使海内皆有歸往之心然後大舉六師削平蕃偽所謂以天下之所順攻親戚之所叛也惟陛下力行之耳詳定官中書舎人胡寅等定中為首選輔臣奏中係有官人上問故事如何沈與求曰臣聞皇祐元年沈文通考中第一仁宗曰朕不欲以貴胄先天下寒畯遂以馮京為第一文通第二上曰可用此故事遂擢洋為第一同日賜特奏名進士汪喬年以丁二百七十二人同出身至助教壬午張浚奏江上諸軍事藝精強非前日之比趙鼎曰此皆陛下累年葺治之力上曰此皆卿等協贊向使朱勝非尚為相必勸朕退避今已無江浙矣乙酉尚書左僕射監修國史趙鼎上重修神宗實録五十卷舊文以墨新修以朱刪出以黄及進呈上起詣殿東壁焚香再拜受書内侍設案捧書至御坐前搢笏展書修撰范冲進讀上起立拱觀禮畢復御座降迪功郎告身於浙西諸州慱糴每道四千緡亦不作進納與理為官尸仍理選限己丑敕賜進士及第汪洋乞避逺祖嫌名上以其與王拱辰同嵗賜名應辰時言者請賜新進士儒行及中庸篇詔正字髙閌校正上將親書以賜閌言儒行詞説夸大類戰國縱横之學葢出於漢儒雜記望止賜中庸庶使學者知聖學淵源而不惑於雜上從之雅州嚴道縣尉謝惇徳特改宣教郎簽書昌州軍事判官以所陳六䇿議論可采也惇徳六䇿一曰正國體二曰正身三曰求賢四曰奉天五曰愛民六曰服夷狄庚寅上以御書尚書一秩賜趙鼎翌日鼎奏謝上曰尚書所載君臣相戒敕之言所以賜卿政欲共由此道以成治功耳壬辰詔元符上書邪説尤甚范柔中等二十七人身亡未任子者並與一子官趙鼎進呈上曰此乃蔡卞蔡京之罪獻言者有可取則施行之無可取則容納之如此則上無拒諫之名而下有敢言之士何至立為邪等名目其誤太上皇帝皆此類也國子監丞張戒面對奏上曰臣幸因輪對輙撰成書一封宗社大計軍國重事臣靡不盡言願陛下萬㡬之暇留神省覽上曰甚善戒進呈訖奏曰臣所論事既多必有不合聖心處上曰朕覽天下章奏不如此朝廷初無拒諫之意人臣進言其可行者行之其不可行者置之朕未嘗加罪戒曰誠如聖諭人臣進言若皆合聖心即是陛下所已知者又何用言為上曰不惟已知己施行不須言若人臣進言必欲合人主之意即是觀望戒曰陛下明此天下幸甚乙未趙鼎奏昨日䝉降出國子監丞張戒所上書其言雖有過當小臣敢盡言如此亦不易得上曰戒因面對携此書來上㡬萬八千言朕熟覽之其間固有過當然其憂國愛君之心誠有可嘉戒自言恐忤聖意願陛下容之方患朕之過失不得自聞民之疾苦不得上達大開言路以防壅蔽豈罪言者朕意自欲賞之沈與求曰陛下容納忠言如此何患不聞盡言上曰戒言朕有仁宗皇帝守成之徳而不知太祖創業之志此言良是朕見仁祖皇帝在位四十二年徳洽民心至今天下誦之仰慕如堯舜文武故當時立政用人之事朕嘗置左右朝夕以為法至於太祖以神武創業朕誠不及也丁酉權户部侍郎張致逺奏呈嵗計上曰今中外小大之臣罕有任責若人人體國以公事同家事何憂不足仍須每事省節積少成多唯贍軍賞功務在激勸此不可減耳監司守令有不經意於常賦怠慢尸素者户部冝糾劾之當議竄責是月淮西宣撫司統制官華旺復光州冬十月庚子朔詔户部鏤板下江浙荆湖旱傷州縣奉行寛恤指揮御史劾其違者竄責先是禁屠以禱晴而併及雞鴨右諫議大夫趙霈奏疏稱頌上徳中書舎人胡寅讀疏笑曰諫職乃及此乎聞敵中統兵有號龍虎大王者脱或入冦當以雞鴨諫議拒之壬寅遣中使以所書車攻詩賜輔臣翌日趙鼎奏謝上曰朕觀鴻鴈車攻乃宣王中興之詩今境土未復二聖未還當與卿等夙夜勉勵以修政事攘夷狄鼎曰陛下游神翰墨之間亦不忘恢復臣等敢不自勉乙巳詔廣東鹽以二分即本路通商餘一分官賣充漕計廣東鹽舊從官賣其後許通商於荆南南北及吉州至是復有此命尋又増鈔錢為二十萬緡戊申殿中侍御史王縉請嚴義倉之法以備水旱趙鼎進呈因言湖南江西嵗旱田畝灾傷今秋成之際民間已闕食恐至來春大饑欲令常平司多方廣糴以備賑濟上曰朕聞江湖嵗歉夙夜為憂常平法自漢以來行之乃是救荒之政祖宗專用義倉賑濟最為良法比年多有失陷可降指揮申飭有司稽考之庚戌尚書右僕射張浚入見浚既平湖冦遂自鄂岳轉淮東西㑹諸大將議防秋之冝直至山陽偽境震動上勞浚曰卿暑行甚勞然湖湘羣盜既就招撫以成朕不殺之仁卿之功也浚頓首謝趙鼎沈與求曰湖湘既平則川陜血脉通矣他日遂可漸為恢復之圖上親書周易否泰卦賜浚浚奏自古小人傾陷君子莫不以朋黨為言夫君子引其類而進志在於天下國家而已其道同故其所趍向亦同曽何朋黨之有惟小人則不然更相推引本圖利禄詭詐之蹤莫可跡究故或為小異以彌縫其事或内外符合以信實其言人主於此何所决擇而可哉則亦在夫原其用心而已臣嘗考泰之初九拔茅茹以其彚征而象以為志在外蓋言其志在天下國家非為身故也否之初六拔茅茹以其彚征而象以為志在君則君子連類而退蓋將以行善道而未始忘憂國愛君之心焉觀二爻之義而攷其心則朋黨之諭可以不攻而自破矣臣又觀否泰之理起夫人君一心之㣲而利害及於天下百姓方其一念之正其畫為陽泰自是而起矣一念之不正其畫為陰否自是而起矣然而泰之上六陰已盡復變為陽則君子在外而否之所由生焉否之上九陽已盡復變為陰則小人在外而泰之所由生焉當今時適艱難民墜塗炭陛下若能日新其徳正厥心於上臣知其將可以致泰矣異時天道悔禍幸而康寧則願陛下常思其否焉上嘗召對便殿問所宜為且命以所聞見置䇿來上浚承命條列以進號中興備覽凡四十篇莫不備具上深嘉歎置之坐隅乙夘提舉西京崇福宫李綱為江南西路安撫制置大使兼知洪州初張浚之謫福州也綱亦寓居於福二人相見除前隙更相厚善至是數於上前言其忠趙鼎嘗為綱辟客亦為上言綱才器過人故有是命綱辭上手書敦諭有曰朕之用卿審矣卿冝以安社稷為己任勿間中外勉為朕行不必數有請也戊午布衣陳得一造新歴成賜號通㣲處士詔川陜類省試第三人例推恩餘並賜同進士出身特奏名人令宣撫司置院差官試時務䇿一道以道逺舉人赴殿試不及故也辛酉吏部侍郎晏敦復請三公三少三省長官俸給並依嘉祐禄令修立從之乙丑淮東宣撫使韓世忠奏偽簽軍犯漣水軍遣統制呼延通等引兵擊殪之所脱無㡬上曰中原赤子為豫逼脇死於鋒鏑良可憫也可令收拾遺骸埋瘞仍出榜曉諭使彼知朝廷矜恤之意丁夘殿中侍御史王縉言初出官人監嶽廟理資任若便許用舉主闗陞及年限磨勘不惟僥倖太甚兼恐偷惰茍且習以成性欲乞應初出官監嶽廟人年未及格並不理資任選人候釐務書考纔許薦舉釐務實及三考無出身通理四考纔許用舉主闗陞承務郎已上釐務磨勘一依舊法自後未經參選人并父祖見任通判以上及宫觀通判請給者更不差監嶽廟詔除用恩例陳乞外更不許差餘依見行條法是月祫享太廟祖宗並為一列不敘昭穆新知普州喻樗上書言蜀之可憂者四事大畧謂昨者北兵深入和尚原下青泥嶺薄仙人闗賴呉玠等極力拒守敵遂引去夫所謂和尚原者鳯之東境距寳雞縣纔兩驛抵鳯翔不能百里我若屯兵其間則可以下窺秦雍而於函洛之路未絶也所謂仙人闗者青之東境距利州纔七驛自利抵劔門闗百里而嬴今我退守仙人關則蜀之險要所失過半敵既到仙人關習知隘險必别生計他日分兵數道並進一軍自階成趍文政一軍自梁洋經米倉山入巴閬一軍自均房由達州山路入䕫峽復以一二千人攻仙人闗以綴呉玠勢分形散所備皆急日者和尚原至仙人闗退舎失地凡五百里不知宣撫司亦復狀其實以聞朝廷乎臣愚於此有二䇿焉其一則經理興元其二則措置荆襄使川蜀一軍當秦雍江陵一軍拒襄鄧可以捄援川蜀覆蔽呉㑹出軍宛洛通車三秦矣十有一月庚午朔初置節度使已下象牙牌一留禁中一降付都督府緩急臨敵果有建立竒勲之人先次給賜以為執守詔諸路州縣出賣户帖仍立式行下中書門下省奏中書舎人胡寅所言六事一曰清中書之務大畧謂宰相大臣陛下之所委任以圖中興之丕烈者也而兼總六曹有司之事窮日之功不得少息皆細故也而政事堂與州縣無以異矣望陛下詔宰執大臣選補六部長吏凡有格法者一切付之使得各舉其職法之所不載者事之所不可行者六部無得為人申請破壞成法如是則大小詳要不相奪倫中書之務清有司之事治廟堂之上可以志其逺者大者久長之䇿恢復之功庶乎可冀矣二曰議學校之制大畧謂自軍興以來布衣韋帶之士失其常産因無常心棄毛錐而説劔上封事而覔官泯泯紛紛儒風掃地謂冝稍増教授員闕慎擇老成名士以充其選仍詔守臣留意學校加以嵗月必有可觀三曰重縣令之任大畧謂冝籍中外已為臺省寺監官依倣漢制分宰百里俟有治績不次陞擢則又増重事權優假其禮借以服色厚給餼廪凡軍馬屯駐本縣者許之節制其經由者悉用階級則又據諸路縣分户口賦入分為三等上等自朝廷除授中等則自吏部注擬下等令帥司監司同共辟奏則又用宋元嘉致治之法以六期為斷革去三年成任兩考成資與堂選數易之弊則又立四條為三等縣考課之法曰糾正税籍曰團結民兵曰勸課農桑曰敦勉孝悌俟及三年考其績效已就緒者就加旌賞未有倫者嚴行程督皆無善狀則黜汰之又命從官各舉二人之能任者刺舉二人之奸贓者皆籍於中書俟考按功實以次施行四曰京官必歴親民大畧謂近來由判司薄尉初改官人及親為京朝官而實不曽歴親民差遣者例皆不肯參部便欲直為通判作威勢黷貨賄為民之害無所不至望詔大臣嚴守格法不輕除授庶㡬息僥倖之風勵人材之操五曰監司郡守並以三年為任大畧謂近嵗監司郡守更易頻數雖使絶人之才居之號令未及信於民而已報除代矣望明詔大臣凡前宰執侍從官為州郡未滿三年不許除代其庶官知州及轉運使副判官提㸃刑獄候到任一年方差替人其餘凡繫堂除者除代一兩人而止仍皆以三年為任如此則官有宿業之士功緒可稽士息競奪之風亷恥可立乃中興急務也六曰除監司迴避户貫之禁近年指揮監司郡守不得除用土人非良法也夫得賢才所臨本邦知利害尤悉愛百姓尤切不賢不才者雖在他方以非吾土為害滋甚矣望明詔大臣蠲除近禁盡心選授惟務得人有功則賞有罪則罰詔三省措置立法其在内窠闕并樞密院差除依此後頗有所施行然不盡用也辛未趙鼎奏李大有上書言及機權事上曰此涉兵機不欲付外看詳昔張齊賢上書獻收河東之䇿太祖怒甚至裂其奏及左右既退徐取其奏密授太宗曰他日取河東出兵運糧當用齊賢䇿未㡬河東平沈㡬如此當為萬世法宗正寺上仙源慶繫屬籍總要詔丞孫緯進秩一等諸吏賜帛有差癸酉川陜宣撫副使吳玠奏遣其子來奏邊事先一日玠乞俟防秋畢入對詔答不許上諭輔臣曰玠比嘗請入覲今又遣其子來奏事可謂得事君之体玠握兵在外累年乃能周慎委曲如此良可嘉也詔應守令守禦臨難不屈死節昭著不以官品髙下並令帥司保奏特與賜諡乙亥和靖處士尹焞充崇政殿説書令川陜宣撫司加禮敦遣赴行在所制曰先王之道具在方冊非得深純篤厚之士傳其師學敷繹於前則道固隠而不彰矣朕博求碩儒發明治要聞爾安貧樂道澹然無求執徳不回久而益固是用縻以好爵列之經闈勉從弓招副朕虚佇進士顔邵特補右修職郎卓右迪功郎彦輝下州文學初上聞真卿之後有居温州者命守臣推擇以聞得邵等三人而彦輝則真卿十一世孫也上謂大臣曰人有一死或輕於鴻毛或重於泰山在處死為難耳真卿在唐死節可為得處矣況今艱難之際欲臣下盡節可量與推恩以為忠義之勸罷吉州㩁貨務都茶場癸未上謂輔臣曰邦計匱乏茍有一毫可以節省亦當行之朕宫人僅給使令然昨日已搜采三十人出之趙鼎曰節省之道始於宫庭此陛下盛徳也甲申自渡江後宰輔已減俸三之一至是趙等復請於内權減二分從之於是行在官吏俸禄皆權減乙酉起居舎人任申先試中書舎人仍兼直史館國朝詞臣進不繇科第林攄顔岐及申先而已丙戌議者謂梁洋沃壤數百里環以崇山南控蜀北拒秦東阻金房西拒興鳯可以戰守而民未復業墾闢殊少多屯兵則糧不足以贍衆少屯兵則勢不足以抗敵詔邵􅄎呉玠擇二郡守相度初玠於興元洋鳯成岷五郡治官莊屯田又修褒城廢堰民知灌溉可恃皆願歸業利路漕臣郭大中言於玠曰漢中嵗得營田粟萬斛而民不敢復業若使民自為耕則所得數什百於此矣玠用其言嵗入果多戊子中書舎人胡寅知邵州初寅既論不當遣使上賜詔書褒諭而尚書右僕射張浚自江上還奏使事兵家機權不用其説乃遣都督行府准備差使范寧之與問安使何蘚偕行寅復奏疏言其無益者八有害者二大畧謂庚戌而後不遣使敵兵亦不來及癸丑日遣使則鈎引敵人入國曽不旋踵又曰去冬下詔罪狀劉豫名其為賊今豫豈肯賔吾使人達之於敵哉獨有一説使陛下難處者以二帝為言耳然自建炎改元以來使命屢遣無一人能知兩宫起居之狀謦欬之音者況今嵗月益久虜必重閟惟懼我知之今以敵為父兄之仇絶不復通則名正而事順他日或有易聞在我理直易為處置若通使不絶則敵握重柄歸曲於我名實俱喪非陛下之利也使或有知二帝所在一見慈顔宣達陛下孝思之念雖嵗一遣使竭天下之力以將之亦何不可之有其如艱梗悠邈必無可達之理乎以此揆之則以二帝為言者理不難處也今日大計只當明復讐之義用賢才修政事息民訓兵以俟北向更無他䇿至於何蘚之行非特無效决須取辱臣所見如此豈得以張浚有言而自抑也寅既與浚異論乃以父病不及迎侍乞湖南小郡故有是命甲午權中書舎人潘良貴繳方州殺人奏案不當上曰殺人者死此古今不易之法然情有可憫許具奏此祖宗好生之徳第恐州縣之吏受賕出入畧加約束可也詔江南帥憲司覺察漕司及州縣毋得重疊催理旱傷民户苗米詔罷催税户長復以村疃三十户為一甲輪差甲頭一名催税江浙荆南福建廣南路提㸃坑冶鑄錢趙伯瑜乞減料鑄錢每千重四斤五兩比舊減半斤許之時坑冶盡廢伯瑜訪得諸監有古碴淪浸入地漸生鑛末乃淘掘成銅品合鼓鑄焉十有二月庚子詔神武係北齊軍號冝以行營䕶軍為名神武前軍改稱中䕶軍左軍稱前䕶軍後軍稱後䕶軍劉光世所部稱左䕶軍呉玠右䕶軍王彦前䕶副軍言者論行在職事官凡有除授畫降指揮日下供職此適足以長奔競之風除命之出倘未愜於公論則御史諫官得以言舎人得以繳給事中得以駁與其追寢於供職之後曷若改正於未行之前伏望特降指揮除去舊例亦所以訓迪在位勵其風節從之辛丑趙鼎等奏應都督府軍馬並撥𨽻三衙上曰祖宗故事應軍馬未有不𨽻三衙者今厘正之甚善他日差出即降指揮聽某將節制其名既出則軍政漸可復舊權户部侍郎王俁言比年以來官失其守廢法用例其弊滋甚所以恩歸於下怨集於上人不退聽事益増多伏望明詔大臣除刑寺斷例合依舊存留照用外其餘委官詳定附入本例嚴戒有司自今悉遵成憲敢有弗率必罰毋赦詔左右司樞密院檢詳官取索措置條具申尚書省趙鼎因請委都司取㑹前後所行之例約以中制立為定法付有司遵守吏無所肆其姦矣乙巳詔以翠羽為服飾者依銷金罪賞並徒三年賞錢三百千許人告丙午劉子羽知鄂州主管荆湖北路安撫司公事張浚既還朝始議大合兵為北討計乃白召子羽令諭指西師故有是命己酉趙鼎奏謝因足疾蒙賜珍劑上曰藥所以攻疾疾良已則當却藥或者烹煉金石餌之徒耗真氣非養生之道豈惟治身雖國亦然張浚曰秦以嚴刑峻法治天下而自速其禍此可以為戒給事中呂祉言近制行在職事官係朝廷擢用類多疎逺不獲一望清光故特延見訪問所以來賢審官詢事考言惠至􅄎也然侍從官以言語備顧問朝夕論思出入獻納乃其職也豈可令與庶官輪日面對願詔侍從官免輪面對如有己見即許依舊請對勿拘以時勿限以數從之辛亥上與趙鼎論人才因曰朝廷用人不分彼此四方人才冝參用之沈與求曰成湯立賢無方豈限南北權户部侍郎王俁言兵革未息屯戌方興大計所入充軍須者十居八九此國用所以常乏謹以臣愚見畧陳五事一曰處冗食之兵二曰損有餘之禄三曰收隠漏之賦四曰補銷毁之寳五曰修平准之法詔户部勘當其後頗施行之甲寅刑部員外郎楊邁知䕫州兼本路安撫使渡江後由朝士出為川陜帥臣者始此庚申太府少卿沈昭逺請久任計臣上曰祖宗時三司使如陳恕最為久任號稱職今内外計臣倘能稱職就加爵秩以褒寵之可也不須數易張浚曰久任豈獨計臣他官倘有稱職者亦當如此辛酉起居郎潘良貴言中臺者出納王命賦政四海喉舌之司也伏望嚴飭六曹長貳郎官凡朝廷送下勘當事理並須具格法是非供報輔臣進呈上曰祖宗以來自有格法有司但能遵守即為稱職格法既定誰復有僥倖之心唯其因事陳請人思幸得此法之所以寖廢也可依良貴所請更切申嚴沈與求曰六部乃法守之地有司狥情遂至廢法而用例然情豈勝徇耶僥倖之門塞則人自安分天下何患不治詔敕令所刪定官監登聞檢鼓院官自今並令轉對甲子詔屯田郎中樊賔候都督府出使日隨逐前去江淮措置屯田時張浚再出江上欲謀大舉深慮諸將議論不同趙鼎與之謀曰公之此行未便能舉事莫能兼領也田而歸不為無補於是置官屬畫一而去先是建言屯田者甚衆至是始為之丙辰都督府奏以新知鄂州劉子羽權本府參議軍事與熊彦詩並往川陜撫諭戊辰夜雨雹宋史全文卷十九中欽定四庫全書宋史全文卷十九下宋高宗十丙辰紹興六年春正月己巳朔上在臨安辛未上以雪寒細民艱食命有司賑之翌日謂尚書右僕射張浚曰朕居燠室尚覺寒細民甚可念若湖南江西旱灾去處亦冝早措置賑濟民既困窮則老弱者轉於溝壑強悍者流為盜賊朕為民父母豈得不憂浚曰陛下推是心以往則足以感召和氣況實惠乎上曰朕毎以事機難明専意精思或達旦不寐浚曰陛下以多艱之際兩宫幽處一有差失存亡所繫慮之誠是也然雜聽則易惑多畏則易移以易惑之心行易移之事終歸於無成而已以陛下聰明茍大義所在斷以力行夫何在而不濟臣願萬幾之暇保養天和澄心静氣庶㡬利害紛至而不能疑則中興之業可建矣壬申初置行在和劑局給賣熟藥甲戍左承奉郎孫道夫為秘書省正字道夫召對上問以方今形勢之地道夫請經營漢中以為復陜西之基措置荆南以為守江左之䇿上稱善乙亥右諌議大夫趙霈言比年以來奔競日滋亷恥道喪指臺閣為要津笑州縣為俗吏僥倖㨗徑以圖進身已參選者力求堂除得外任者謀改京局故臣僚一遇賜對則明與陞擢差遣一有過案則明與外任差遣人既知朝廷之輕外任孰不以内任為重乎願明詔大臣凡任臺省寺監及二年才可任煩劇者悉補監司郡守之職任監司郡守及二年才可被陞擢者悉充省臺寺監之選劇邑有闕擇寺監丞有才術者為之宰寺監有闕擇縣令有治績者為之丞更出迭入居中補外以熄奔競以興亷恥使士無入而不出之譏郡守無雅意本朝之望疏奏從之丙子夜雪己卯詔朕以菲徳致兹旱灾痛念斯人流離窮苦屢詔諸路常加撫字尚慮未能深體此懷奉承弗謹今仰三省檢㑹累降寛恤事件布告中外悉力推行務在實惠及民壬午宗室伯玖賜名璩除和州防禦使癸未尚書左僕射兼監修國史趙鼎上重修神宗實録通成二百卷丙戌尚書右僕射張浚辭往荆襄視師浚以敵勢未衰而劉豫復拒中原為謀叵測奏請親行邊塞部分諸將以觀機㑹上許焉浚即張牓聲豫叛逆之罪丁亥淮東宣撫司參謀官陳桷江西宣撫司參謀官李健江東宣撫司參管機宜文字郗漸對于内殿上諭以國家贍養大兵之久國用既竭民力已困切須專意措置屯田此亦自古已成之效況軍中亦須先立家計若有機㑹方圖進取後二日以諭輔臣趙鼎曰措置如此社稷幸甚庚寅殿中侍御史王縉言有司申請乞將預借坊場錢先還一半不便上曰既預借當悉還之朝廷號令貴於守信而已儻或失信何以使民服從甲午以江湖福建浙東旱命監司帥臣修荒政輔臣進呈文字上曰嵗饑民多流殍朕心惻然官為發廩以賑給之則民受實惠茍為不然雖詔令數下恐徒文具耳冝申飭有司多方措置米斛逐路監司行下州縣如奉行有方别無流亡當行旌賞如流亡稍衆或聚而為盜即重行竄責並令帥臣監司比較優劣保明來上取㫖賞罰乙未進呈邊順乞外任劄子趙鼎曰祖宗舊制三衙用邊臣戚里及軍班出身各一人所以示激勸也上曰戚里未有可以當此任者然近上戚里既擢用後或有罪戾罰之則傷恩貸之則廢法故不得不審也唐用宗室至為宰相本朝宗室雖有賢才不過侍從而止乃所以安全之也臣留正等曰漢以諸吕㡬亂天下而文帝復使薄昭典兵豈非以太后故欲恩之耶昭卒兵法誅死尚足為恩也哉魏文帝譏之以舅后之家但當養育以恩不當假借以權亦可謂知言矣觀太上皇帝之語趙鼎真可為萬世法也戊戌都督行府奏乞將大姓已曽買官人於元名目上陞轉文臣迪功郎陞任承直郎一萬五千緡特改宣教郎七萬緡通直郎九萬緡武臣進義校尉陞補修武郎二萬二千緡保義郎已上帶閤門祗候三萬緡武翼郎已上帶閤門宣贊舎人十萬緡已有官人特賜金帶五萬緡並作軍功不作進納仍與見闕差遣日下起支請給其家並作官户差役科敷並免如将來参部注擬之類一切並依奏補出身條法施行從之二月己亥朔尚書金部員外郎陶愷知筠州前三日愷因面對言陛下未能建大中至正之道未能平黨與未能修政未能用人其言頗主紹述之説故命出守壬寅都督行府奏改江淮營田為屯田張浚出行邊請應事務並申行府措置俟就緒日歸省部許之於是官田逃田並行拘藉仍民間例召莊客承佃五家相保官給牛種每家貸本錢七十千分二年償若收成日願以斛斗折還者聽癸卯夜雪甲辰置行在交子務先是都督行府主管財用張澄請依四川法造交子與見緡並行仍造三十萬用於江淮矣至是中書言交子錢引并㳂邊糴買文鈔皆係祖宗舊法便於民間行使自軍興以來未嘗檢舉今商賈雖通少有囘貨已倣舊法先樁一色見緡印造交子分給諸路令公私並同見緡行使期於必信决無更改詔諸路漕司榜諭遂造百五十萬緡充糴本將悉行之東南焉乙巳右諫議大夫趙霈言去秋旱傷今春饑饉賑救之術不過二説一則發廪粟減價以濟之二則誘民户賑糶以給之然豪右閉糶蓋其常態全在守令多方勸諭上户估定中價俾以所食之餘各行出糶縂計城郭鄉村之户多寡分擘米數既無所擾人亦願從惠而不費之道也從之己酉故承議郎鄒浩贈寳文閣直學士諡曰忠庚戌詔諸路監司榜諭人户依限投買鄉村户絶并沒官及賊徒田舎與江漲沙田海浪泥田永為己業辛亥詔張浚暫赴行在所奏事浚遂命京東宣撫使韓世忠自承楚以圖睢陽命淮西宣撫使劉光世屯合肥以招北軍命江東宣撫使張俊進屯盱眙又請權主管殿前司公事楊沂中領中軍為後翼命湖北京西招討使岳飛屯襄陽以圖中原於是國威大振上自書裴度傳賜浚甲寅都督府參謀軍事折彦質僉書樞密院事乙夘淮東宣撫使韓世忠引兵至宿遷縣執金人之將貝勒牙合時劉豫聚兵淮陽世忠欲攻之引大軍進趍城下命統制官呼延通行世忠自以一騎隨之二十餘里遇金人而止世忠陞髙坵以望通軍通馳至陣前請戰金將貝勒牙合大呼曰解甲通曰我乃呼延通也我祖在祖宗時殺契丹立大功誓不與契丹俱生況爾女真小國侵犯王畧我肯與爾俱生乎即馳刺牙合牙合與通交鋒轉戰移時皆失仗以手相格逄坎而墜牙合刄通之腋通扼其吭而擒之既而世忠為賊所圍乃按甲不動俄麾其衆曰視吾馬首所鄉奮戈一躍已潰圍而出不遺一鏃世忠曰敵易與耳復乗鋭掩擊敵敗去澧州慈利縣山賊雷進為其徒伍俊等所殺丙辰韓世忠圍淮陽軍辛酉韓世忠自淮陽引兵歸楚州世忠既圍城賊堅守不下劉豫遣使如河澗求援于宗弼先是敵偽與其守將約受圍一日則舉一􅇏每日益之至是城中舉六烽劉倪與宗弼皆至世忠之出師也請援于張俊俊不從世忠乃還道遇敵師世忠勒陣向敵遣小校郝彦雄造其軍大呼曰錦袍驄馬立陣前者韓相公也衆咎世忠世忠曰不如是不足以致敵及敵至世忠以數騎挑之殺其引戰者二人諸將乘之敵敗去壬戌詔折彦質兼權參知政事癸亥參知政事沈與求罷知明州中書舎人任申先繳還詞頭論其罪改提舉臨安府洞霄宫新江西制置大使李綱見于内殿前一日趙鼎奏來日偶是寒食正節上曰朕宮中每日食後畧治家事即觀書冩字此外别無他事來日自可引對鼎曰陛下清修如此天下幸甚後二日綱以急切利害再對因言及張浚上諭綱曰浚自冨平敗始練軍事時綱所上疏凡十六其論中興及官告綾紙錢禮部尚書李光兼權刑部尚書時臨安府多火灾或頃刻爇千百家右諫議大夫趙霈建言請峻其刑名庶火初作衆亟撲滅事下刑部立法光不奉詔乃抗疏天灾譴告人君冝修徳以厭之不當濫及無知之民朝廷謂刑部有司也抗疏為非而諫官之論當畧為施行起居舎人兼權中書舎人董弅白宰執曰二者之論俱不過使兩易之則各為舉職矣己巳淮南東路兼鎮江府宣撫使韓世忠為京東淮東宣撫處置使兼節制鎮江府徙鎮武寧安化楚州置司湖北京西南路招討使岳飛為湖北京西宣撫副使徙鎮武勝定國襄陽府置司時朝廷鋭意大舉都督張浚於諸將中每稱世忠之忠勇飛之沉鷙可以倚辦大事故並用之李綱入辭退上疏言今日主兵者之失大畧有四兵貴精不貴多多而不精反以為累陣貴分合合而不能分分而不能合皆非善置陣者願明詔之使知古人用兵之深意非小補也朝廷近來措置恢復有未盡善者五有冝預偹者五有當善後者二今降官告給度牒賣户帖理積欠以至折帛博糴預借和買名雖不同其取於民則一而不能生財節用覈實懋遷一也議者欲因糧於敵而不知官軍抄掠甚於冦盜恐失民心二也金人專以鐵騎勝中國而吾不務求以制之者三也今金人失信襄陽形勢與和戰朋黨五事皆利害之大者上嘉勞乆之其論金人失信畧曰自金人起兵以來不過以失信二字加我臣請詳言之方宣和間遣使與金人結約海上同謀契丹厚與之賂而得雲燕之地以為失信於契丹則可以為失信於金人則不可其後金人敗盟以犯燕山遂犯京城此則金人之失信一也敵騎犯闕勤王之師未集議者一切以不可許者許之當時所許乃城下之盟神祗弗聽元約肅王至河而返不肆侵掠而金人挾肅王以渡河敵掠子女玉帛殺戮尤甚尼雅滿復犯威勝隆徳等州此則金人之失信二也朝廷遣使交割三鎮三鎮之人守死不從此特中國之人不願淪於夷狄耳淵聖奉書請増嵗幣以代三鎮租賦金人挾此遂有再入之舉朝廷遣執政郎官分河割地奉使北邊往往為兩河之民所殺如聶山王雲之流是也敵騎既破汴都登城不下猶假和約已成之説以欵勤王之師䇿立逆臣易姓建號此則金人失信三也金人負大失信者三反以此名加於中國正猶盜賊刼畧主人恃其兇威靡所不至而猶自以為己之直而主之曲也願下明詔詳述自宣和靖康以來失信在彼而不在此庶㡬人百其勇士氣自振三月戊辰朔初收朝廷與諸路之兵盡付諸將外重内輕四也兵家之事行詭道今以韓世忠岳飛為京東京西宣撫未有其實而以先聲臨之五也且中軍既行宿衛單弱肘腋之變不可不虞則行在當預備江南荆湖之衆盡出敵或乘間擣虛則上流當預備海道去京東不逺乘風而來一日千里而蘇秀明越全無水軍則海道當預備假使異時王師能復京東西也則當屯以何兵守以何將金人來援何以待之萬一不能保則兩路生靈虛就屠戮而兩河之民絶望於本朝勝猶如此當益思善後之計綱又言今日之事莫利營田謂冝令淮南襄漢宣撫諸使各置招納司以招納京東西河北流移之民撥田土給牛具貸種糧使之耕鑿許江湖諸路於地狹人稠地分自行招誘而軍中人兵願耕者聽初年租課盡畀佃户方耕種時仍以錢糧給之秋成之後官為糴買次年始收其三分之一二年之後乃收其半罷給錢糧此其大槩也詔都督行府措置其後頗施行之庚午詔南劍州學春秋釋奠就祭陳瓘祠堂用給事中張致逺請也癸酉詔川陜宣撫司以禮敦遣和靖處士尹焞赴行在焞始被命召自言昨於靖康中累被召㫖以疾力辭誤蒙告命賜之羙名聽其退處兼以所習迂濶之學施之事功無一可者願賜寢免以安愚分故有是命乙亥詔江東宣撫司統制官趙密巨師古軍馬並權聽殿前司節制時都督張浚在淮南謀渡淮北向惟倚韓世忠為用世忠辭以兵少欲摘張俊之將趙密為助浚以行府檄俊俊拒之謂世忠有見吞之意浚奏乞降聖㫖而俊亦禀於朝趙鼎白上曰浚以宰相督諸軍若號令不行何以舉事俊亦不可拒乃責俊當聽行府命不應尚禀於朝復下浚一面專行不必申明慮失機事時議者以為得體至是浚終以俊不肯分軍為患鼎謂浚曰世忠所欲者趙密耳今楊沂中武勇不減於密而所統乃御前軍誰敢覬覦當令沂中助世忠却發密入衛俊尚敢為辭耶浚曰此上䇿也浚不能及己卯新知筠州陶愷送吏部與監當差遣愷既補外上謂近臣曰愷諭事言皆刼持雖灼見懷奸以其議及祖宗未欲行出言者復奏愷所言刼持懷奸誠如睿㫖而迹其情狀有不可貸者元祐之初哲宗皇帝即位是時天下士民言新法不便者以千萬計於是進用司馬光呂公著等逐蔡確章惇之徒除去新法盡復祖宗之舊終元祐九年天下太平洎紹聖元年殿試進士李清臣撰䇿題其畧曰共惟神宗皇帝憑几聽斷十有九年禮樂法度所以惠遺天下者甚備朕思述先志夙夜不忘畢漸對策曰陛下亦知有神宗皇帝乎既唱名畢漸第一於是紹述之論始興吕大防蘇轍范純仁相繼引去章惇蔡卞始用事厚誣宣仁欺罔哲宗以神宗為名刼持上下盡逐忠良羣小畢進矣逮太上皇嗣位之初首召范純仁忠義之士流竄而尚存及一時正人公議所屬者悉皆召用章惇以䇿立之際獨建異議竄責嶺表蔡卞等亦皆去位曽未踰時紹述之論復興曽布蔡京用事亦以神宗皇帝為名刼持上下姦人情偽如出一律方其召范純仁等曽布乃為建中之論以此改元蓋小人知其當退遂欲雜用紹聖之臣兼行紹聖之政此説既行則覆出為惡得以肆其姦持大中至正之論以濟朋比傾邪之術卒如其計也蓋自紹聖之後每為小人所勝必假神宗皇帝為名始於建中終於大亂此已事之驗可為痛心疾首者也恭惟陛下聰明稽古憲章祖宗洞見是非真偽之實深究治亂興衰之源更修信史垂示萬世而愷乃以為未能平黨與未能修政未能用人是欲以一身為羣姦先驅鼓惑天下之聽嘗試朝廷庶㡬僥倖萬一焉伏望陛下明正典刑掲示好惡為小人漸進之戒前二日輔臣進呈上曰所論甚詳自當便與之行遣又曰久不聞如此議論忽然聞此甚可怪趙鼎欲送吏部與監當上曰甚好鼎因言愷乃節夫之子節夫為蔡京死黨力主紹述之説折彦質曰小人姦邪自有源流辛巳詔自今初磨勘改官人不許堂除通判差遣癸未閻旦降二官取勘旦為成都府路轉運副使怒府吏喬昇以旋風棒擊之至死上曰若以軍中法而馭吏則安用三尺此事雖朕亦不敢趙鼎退立曰陛下好生之徳天下共聞甲申詔命官諸色人捕獲兇惡強盜未經結録已前在獄身死更不理為推賞人數先是惠州獲盜四十二人而獄死者三十四憲司以為吏受賕鍜鍊致脇從之人拘囚至死遂變換情詞以為正賊詔惠州元勘獄官貶秩衝替丙戌上不視朝後二日趙鼎等問聖體上曰前夜已覺目痛偶探報叢集又新令范沖校陸䞇奏議有兩卷未曽看過三更方看徹比曉目遂腫痛不能出鼎曰陛下勤於政事如此天下幸甚乙未王庶知鄂州初庶召還未見先獻論十六篇論時事夏四月戊戌朔史館上大元帥府事績十卷上御經筵給事中兼侍講朱震留身論四方奏讞自王安石開按問之法及曽布増強盗贜錢遂皆不死翌日上以語宰執曰此極敝事若出得一人死罪雖云隂徳然殺人者不死亦豈聖人立法之意折彦􅀈曰此非陰徳乃長姦爾上顧趙鼎曰遇有奏案切須詳之辛丑興化軍免解進士宋藻上所著十君論上召對特補右迪功郎甲辰偽齊將王威攻唐州陷之團練判官扈舉臣推官張從之皆死乙巳詔湖北京西宣撫使岳飛丁母憂已擇日降制起復縁見措置進兵渡江不可等待令飛日下主管軍馬措置邊事不得辭免飛再辭上不許詔飛速往措置調發毋得少失機㑹飛奉詔歸屯壬子時正陰雨上數問輔臣不害麥否趙鼎曰此正接梅雨大抵江浙須得梅雨乃能有秋是以多不種麥然更望陛下誠意感格天必垂佑上曰善殿中侍御史王縉諫上取青碌瑇瑁上諭趙鼎曰中間嘗取瑇瑁數十兩止造一帶鞓襯餘令入藥兼朕雅不愛此物又顧鼎問朝廷曽令取青碌否朕宫中未嘗輒修一椽屋須此何用之明日進呈縉諫疏鼎因言青碌乃是提舉坑冶趙伯瑜起請令民間從便採取所得價錢以充銅本上曰不若别更處置必是外間已有所議也鼎曰縉深得諫臣之體大抵當防㣲杜漸上曰前日已嘗再三嘉奬甲子京東淮南東路宣撫處置使韓世忠賜號揚政翼運功臣加横海武寧安化軍節度使賞淮陽之捷也節度開三鎮大將賜功號皆自此始丙寅新除翰林學士范沖改翰林侍讀學士沖再辭新命上乃令改命五月戊辰朔輔臣進呈殿中侍御史石公揆論六部不任責事上曰六部長貳侍從髙選自當一面裁處豈有不能决斷一部事而一旦為執政使能决斷天下事耶辛未祕書少監呉表臣言親民之官莫重縣令除授之間理冝措置欲望下諸路監司相度取邑大而事劇素號難治者並從朝廷擇有風力自來作邑有聲者三年為任隨其治狀髙下而寵褒之不任責者罰亦稱是事下吏部其後遂以常熟山陰等為四十大邑吏部侍郎兼侍講劉大中言祖宗用人内外一體或自州縣入居臺閣或由侍從出典藩方因其所長歴試以事所以緩急之際多有可用之材近世以來亷恥道喪既得患失無復難進易退之規為人擇官寖成内重外輕之弊與監司郡守者謂之外小人挂白簡丹書者乃補外任非唯待士也賤葢亦視民為輕若革此風請自臣始儻不以臣為不肖試以一郡俾之自效庶㡬稍全臣子進退之節少革内外輕重之弊不許癸酉上謂大臣曰宫中有金酒器五百餘兩俟他時有功將帥至當舉以賜之近日却令造得少許漆器大抵物要適用何必美觀趙鼎曰仁宗皇帝用紅漆唾盂黄紬衾兩府入對内殿宫人嫌卧衾舊弊遽取新易之亦黄紬也上曰今則紬亦自難得朕所服皆黄素羅衾褥自祖宗以來如此折彦􅀈曰此正陛下之家法也新知鄂州荆湖北路安撫使王庶復顯謨閣待制庶既老愈通習天下事前二日入對首言今日之患莫大於士氣之委靡願振拔名節士起其氣又論安危在修己治亂在立政成敗在用人上韙其言庻因請曰臣肝膽未盡吐也願賜臣間得時縷數于前上乃燕見之庶言益深嘗跪而問曰陛下欲保江南無所復事如曰紹復大業都荆為可荆州左呉右蜀盡利南海前臨江漢可出三川涉大河以圖中原曹操所以畏關羽者也上大異之癸未殿中侍御史周祕言聞淮南州縣皆有收撮課子之例夏則撮麥冬則撮榖又有所謂助軍米借牛租者名色不一重斂如此而乃以愛惜民力為言使百姓虛被放免之惠詔提㸃司體究改正訖申尚書省乙酉提舉臨安府洞霄宫秦檜充觀文殿學士知温州右司諫王縉言地震駐蹕之所豈非天心仁愛著陰盛之戒女子小人則逺之奸宄盜賊則備之是皆陰類也戊午詔兩淮沿江守臣並以三年為任用都督行府同措置營田王弗請也輔臣進呈上曰朕昔為元帥時嘗見州縣官説及在官者以三年為任猶且一年立威信二年守規矩三年則務收人情以為去計矣況今止以二年者乎雖有葺治之心蓋亦無暇日也弗所論甚當當如此施行辛酉軍器監丞黄祖舜特引對乞堂除縣令上謂大臣曰祖舜謂郡守朝廷知所選任矣獨於縣令皆付之銓曹專用資格差注今若且委之郡守使得澄汰無狀者亦庶㡬也此論有理其甄擢之癸亥先是右僕射張浚密遣人至燕山囘知道君不豫浚遂奏臣近得此信不勝痛憤願陛下剛健有為成敗利害在所不恤況孝悌可以格天推此心行之臣見其福不見其禍也秋七月壬申尚書屯田員外郎樊賔行司農少卿提領營田公事都督行府同措置營田王弗屯田員外郎同提舉營田公事並於建康府置司仍令行府兼行俟還闕日罷癸酉先是令僧道輸錢抵工墨錢十千換給度牒既而不復換但令輸錢批舊度牒焉丁丑賜韓世忠劉光世詔書奬諭時右司諫王縉言近者淮西以麾下將領有欺隠軍人之劵淮東以幕中參佐有妄具將士之賞皆能按劾聞奏望特降詔奬諭因使今後凡奏功者必以實而爵賞足以勸有功凡勘給者必以實而錢糧之餘足以養戰士故有是命庚辰幹辦皇城司馮益與在外宫觀日下出門初宰相趙鼎見益稍出鋒鋩意其未戢乃言於上前是日上謂輔臣曰聞益交闗外事寖不可長冝亟出之鼎等再三賀上威斷上曰朕侍此曹未嘗不盡恩意然纔聞過失亦不少貸也甲午知廣徳軍湯鵬舉知饒州以江東轉運使向子諲言其政績也已而復詔進鵬舉一官再任上諭大臣曰近時士大夫數言縣令多有不稱其任者朕再三思之亦難盡擇莫若慎選監司郡守以為要道正如朕深居九重之中安能盡知百執事之賢否但當留意宰相耳臣留正等曰昔唐開元時有上書言按察使徒煩擾公私請精擇刺史縣令停案使者姚崇非之曰今止擇十使猶患未盡得人況天下三百餘州縣多數倍安得刺史縣令皆稱其職乎至哉斯言也可謂知宰相之體矣夫設官分職上下相維宰相之所冝擇者十使十使之所冝擇者刺史縣令崇專以擇十使為己任是乃所以精擇刺史縣令也太上皇帝謂縣令難盡擇而以選監司郡守為要道使當時為相者如姚崇得奉聖訓豈非所謂聚精㑹神相得益章者乎監察御史劉長源應詔上書言當今之弊凡十有二事一曰節儉之風不行於臣庶二曰威福之柄漸移於臣下三曰禁旅太弱四曰從官輕去五曰政令有不審六曰賞罰有失當七曰將帥失馭八曰兵籍虛冗九曰師旅有法不立十曰賦歛有取無度十一曰田荒不勸農十二曰民困不擇令淮西安撫使劉光世克壽春府八月己亥新知紹興府秦檜入見命坐賜茶吉州萬安縣丞司馬宗召添差兩浙路轉運司幹辦公事先是翰林侍讀學士范沖入對言司馬光家屬向者伏蒙聖恩月給錢米故得存在至今竊惟光為國宗臣華夏蠻貊言及之則以手加額功在社稷澤在斯民今奉祠乏主行路之人莫不哀之冝有以振恤昭示四方為忠義之勸故有是命初光孫植既死立其再從孫稹為嗣而稹不肖其書籍生産皆蕩覆之有得光記聞者上命趙鼎諭沖令編類進入沖言光平生記録文字甚多自兵興以來所存無㡬當時朝廷政事公卿大夫議論賔客遊從道路傳聞之語莫不記録有身見者有得於人者得於人者注其名字皆細書連粘綴集成卷即未暇照據年月先後是非虚實姑記之而已非成書也故自光至其子康其孫植皆不以示人誠未可傳也臣既奉詔即欲畧加刪修以進又念此書已散落於世今士大夫多有之刪之適足以増疑臣雖不敢私其能必人以為無意哉不若不刪之為愈也輙據所録疑者傳疑可正者正之闕者從闕可補者補之事雖疊書而文有不同者兩存之於是沖裒為十冊上之上因覽沖奏謂鼎曰光字畫端勁如其為人朕恨生太晚不及識其風采耳庚子左司諫陳公輔入對上奏曰臣聞人君所以得天莫先於孝所以得民莫先於誠中興根本不出於此疏奏上大感動詔公輔論奏深得諫臣之體令尚書省以其奏疏修冩成圖進入饒州童子梁璵賜束帛免文解一次璵年十嵗能誦五經及七書射札六發四中癸夘兩浙都轉運使李迨為四川都轉運使都大提舉茶馬自襄郢便道星夜之任四川都轉運使趙開俟迨至將本司財賦文籍交割訖赴行在所甲辰手詔曰廼者强敵亂常阻兵猾夏兩宫北狩六馭南巡霜雪十年闗河萬里朕為人之子而雞鳴之問不至為人之弟而鴒原之難不聞眷言臣子之心誰無父兄之念而又干戈未息疆場多虞遣戍經時不離甲胄飛芻越險久棄室家爾則致忠朕寧不愧是用當饋投匕未明求衣弗辭馬上之勞以便軍中之務諒彼同舟之衆知吾發軔之情咨爾有官各揚其職布告中外悉使聞知張浚自江上歸力陳建康之行為不可緩朝論不同上獨從其計先是三大帥既移屯而湖北京西宣撫副使岳飛亦遣兵入偽地偽知鎮汝軍薛亨素號驍勇飛命統制官牛臯撃之擒亨以獻引兵至蔡州焚其積聚眉州布衣師維藩治春秋學累舉不第至是走行在上中興十䇿請車駕視師上下共議于朝浚以為可用㑹諜報劉豫有南窺之意趙鼎乃議進幸平江丁未新知紹興府秦檜充醴泉觀使兼侍讀行宫留守提舉臨安府洞霄宫孟庾提舉萬壽觀兼侍讀行宫同留守權許赴尚書省治事時檜留行在未去也癸丑兼都督行府參議軍事郭執中卒張浚曰執中崇寧初以上書邪等禁錮二十年上曰不知當時入邪等以何事趙鼎曰凡蔡京蔡卞所惡者皆入邪等折彦􅀢曰蔡卞以紹述為説其所斥己者盡毁以誣謗先帝上愕然曰太上皇帝内禪之初嘗遣梁師成宣諭淵聖皇帝云朕聞司馬光為前朝名相今日朝廷諸事但當以光為法然則上皇之意固可知矣且如朕今所施行與上皇時豈無修潤者要之一切從百姓安便而已百姓安便乃是上皇之意也丁巳詔權罷講筵俟過防秋日如舊己未監察御史劉長源面對奏疏曰臣謂致治之道莫先於用人用人之道莫先於覈實不可懐愛憎以為去取不可徇朋黨以忘賢愚不可信毁譽以為進退或謂應係元符以前人臣之子孫皆可用臣恐其失近於官人以世而其人未必皆賢夫以房𤣥齡為賢相而其子遺愛預叛逆之誅盧奕為忠臣而其子把居姦邪之列況不逮元齡與奕而可保其子孫盡賢乎茍曰盡賢則不賢者冐濫於其間而人莫敢言矣或謂應係崇寧以後人臣之子孫皆不可用臣恐其失近於罰及其嗣而其人未必皆愚夫以郤芮有謀弑晉文公之罪而子缺有獲白狄之大功李義府有議立武昭儀之姦而子湛乃復中原之良佐況不為芮與義府而可誣其子孫盡愚乎茍曰盡愚則賢者隠晦於其中而人莫敢舉矣至若封倫裴矩其姦足以亡隋而其智反以佐唐李勣許敬宗在太宗時則致治而在髙宗時則致亂是所用之人不易一身可使為治可使為亂其故何在兹乃人君善持用人之柄馭得其道以君子制小人而莫不為吾之用則其為治亂又在人君之操術焉庚申趙鼎進呈劉長源奏劄上曰長源昨日多有開陳至比戰國之士若不用於秦則歸於楚論議殊可怪鼎曰陶愷雖邪論尚不敢至此上曰然張浚曰長源不學無識至如疏中引證事實皆非所敢聞者況元符以後人臣子孫誰為可用而不用者折彦􅀢曰如蔡京王黼輩是乃國家之深仇也罪通于天幸逃族誅今日正使子孫真有可用者猶不當用上曰長源之罪過於陶愷當與逺小監當朝廷明正典刑可也於是退而批㫖長源識趣卑陋不可寘之臺列送吏部與監當差遣庚申詔職事官月給米三斛自郎官外舊止有職錢添給至是始増之癸亥左司諫陳公輔請奏蔭無出身人並令銓試經義或詩賦論䇿三場以十分為率取五分合格雖累試不中不許參選亦不許用恩澤陳乞差選詔吏部措置其後吏部請試律外止益以經義或詩賦一場年二十五以上累試不中之人許注殘零差遣餘如公輔所奏從之詔㩁貨三務嵗收及一千三百萬緍許推賞大率鹽錢居十之八茶居其一香礬雜收又居其一焉遂寧府教授程敦厚應詔上書且獻所著經世十論曰畏天恤民量敵核實正俗練兵生財專任廣聽審慮乃除通判彭州九月丙寅朔上發臨安府先詣上天竺寺焚香道遇執黄旗報捷者乃湖北京西宣撫使岳飛所遣武翼郎李遇先是飛遣統制官王貴郝晸董先引兵攻虢州盧氏縣下之獲糧十五萬斛戊辰上次崇徳縣縣令趙渙之入對上問以民間疾苦渙之言無之又問户口㡬何渙之不能對言者論渙之儲峙擾民詔轉運副使張匯究實乃削渙之二資仍令匯治罪趙鼎曰陛下所以延見守令者正欲知民間疾苦耳上曰朕猶恨累日風雨不能乗馬親往田間問勞父老壬申偽齊故相張孝純遣其客薛笻間道走行在上書言利害癸酉上次平江府戊寅詔行在職事官日輪一員面對庚辰趙鼎奏昨日趙密巨師古軍中苦重膇之疾者得陛下所賜藥皆一服輙愈上曰朕於醫藥嘗所留意每退朝後即令醫者診脉纔有虧處便當治之正如治天下國家不敢以小害而不速去也壬午翰林侍讀學士兼史館修撰范沖言近重修神宗皇帝實録於朱墨二本中有所刋定依奉聖㫖别為攷異一書明著是非去取之意以垂天下後世今來重修哲宗皇帝實録考其議論多有誣謗以當日時政記及諸處文字照據甚明亦乞别為一書志其事實欲以辯誣為名每月校勘到卷數差人吏親事官送至行在付沖看詳修定就呈監修相公訖有合添改去取却發回史館庻㡬不致妨廢從之新除崇政殿説書尹焞發涪州初焞固辭新命䕫州路轉運副使韓固奉詔即所居敦遣焞始就道癸未武舉童子江自昭年十二能誦兵書及步射詔賜帛罷之左司諫王縉入對以大臣不和為憂願戒大臣俾同心同徳絶猜間之萌以同濟國事至再三言之己丑建州布衣胡憲特賜進士出身添差建州州學教授憲安國從兄子也有學行累召不至庚寅張浚復往鎮江視師初劉豫因宗維髙慶裔而得立故每嵗皆有厚賂而蔑視其他諸酋至是豫聞上將親征告急於金主亶求兵為援且乞先冦江上亶使諸將相議之領三省事宗磐言曰先帝所以立豫者欲豫闢疆保境我得安民息兵也今豫進不能取又不能守兵連禍結愈無休息從之則豫受其利敗則我受其弊況前年因豫乞兵嘗不利於江上矣奈何許之金主乃聽豫自行遣宗弼提兵黎陽以觀釁於是豫以其子麟領行臺尚書許清臣權大總管李鄴馮長寧參行臺謀議李成孔彦舟闗師古為將簽鄉兵三十萬號七十萬分三路入冦中路由壽春犯合淝麟統之東路由紫荆山出渦口犯定逺縣趨宣徽以姪猊統之西路由光州犯六安彦舟統之偽詔榜示指斥鑾輿尤甚於五年淮泗之役諜報豫挾虜兵來冦於是分遣諸將以備要害時江東宣撫使張俊軍旴􅇇楊沂中軍泗上京東淮東宣撫處置使韓世忠在楚湖北京西宣撫副使岳飛在鄂聲勢了不相及獨淮西宣撫使劉光世在當途光世遣輕騎據廬而㳂江一𢃄皆無軍馬左僕射趙鼎甚憂之浚乞先往江上視師至是發行在壬辰上諭大臣曰資治通鑑首論名分其間去取有益治道即知司馬光雅有宰相器若通鑑正可為諌書耳龜鑑曰髙宗之崇儒講學即太宗身屬槖鞬風灑露沐而鋭情經術開文學館之時也況聖訓有曰朕之務學欲知治亂成敗君子小人之迹而他日之讀通鑑且曰通鑑去取皆益治道正可為一諌書耳是則帝王務學也豈徒誦説云乎哉冬十月丁酉先是劉麟等令鄉兵偽敵服於河南諸處十百為羣人皆疑之以為敵偽合兵而至劉光世奏禦敵事宜謂廬州難守且密于趙鼎欲還太平州張俊方駐軍泗州都督張浚奏敵方疲於奔命决不能悉大衆復來此必皆豫兵而邊報不一俊光世皆請益兵衆情恟懼議欲移旴􅇇之屯退合淝之戌召岳飛盡以兵東下浚獨以為不然乃以書戒俊及光世曰賊豫之兵以逆犯順若不勦除何以立國平日亦安用養兵為今日之事有進擊無退保而鼎及簽書折彦􅀢皆移書抵浚欲飛軍速下且擬條畫項目請上親書付浚大畧欲退師還江南為保江之計不必守前議於是韓世忠統兵過淮遇敵騎與額哩頁貝勒等力戰既而亦還楚州或請上回臨安且追諸將守江防海浚奏若諸將渡江則無淮南而長江之險與敵共淮南之屯正所以屏蔽大江使賊得淮南因糧就運以為家計江南其可保乎今淮西之冦正當合兵掩擊況士氣甚振可保必勝若一有退意則大事去矣又岳飛一動則襄陽有警復何所制願朝廷勿專制手中使諸將不敢觀望上乃手書報浚近以邊防所疑事咨卿今覽所奏甚明俾朕釋然無憂非卿識髙慮逺出人意表何以臻此吏部侍郎吕祉亦言士氣當振賊鋒可挫上乃命祉馳往光世軍中督師時劉猊至淮東阻世忠承楚之兵不敢進麟乃從淮西繋三浮橋而渡於是賊衆十萬已次于濠壽之間張俊拒之即詔併以淮西屬俊楊沂中為俊統領官浚遣沂中至泗州與俊合且使謂之曰上待綂制厚冝及時立大功取節鉞或有差跌浚不敢私諸將皆聽命戊戍沂中及濠州㑹劉光世已舎廬州而退浚甚怪之即星夜馳至采石遣人喻光世之衆曰若有一人渡江即斬以徇且督光世復還廬州右司諫王縉亦言王師有慢令不赴期㑹者請奮周世宗我太祖之英斷以厉其餘上親筆付沂中若不進兵當行軍法光世不得已乃駐兵與沂中相應遣王徳酈瓊將精卒自安豐出謝步遇賊將崔臯于霍丘賈澤于正陽王遇于前羊市皆敗之是日賊壽春府寄治芍陂水寨守臣孫暉夜刦其寨又退之辛丑四川制置大使席益薦嘗任知縣人十三員政績時益所薦士頗衆而馮時行樊汝霖為之最後皆知名劉猊以衆數萬過定逺縣欲趍宣化以犯建康楊沂中與其前鋒遇于越家坊敗之猊孤軍深入恐王師掩其後欲㑹麟于合淝甲辰沂中至藕塘與猊遇賊據山險列陣外嚮矢下如雨沂中曰吾兵少情見則力屈撃之則不可不急乃遣摧鋒軍統制呉錫以勁騎五千突其軍賊兵亂沂中縱大軍乗之自將精騎繞出其背短兵接即大呼曰破賊矣賊方愕視㑹江東宣撫司統制張宗顔等率兵俱進賊衆大破猊以首抵謀主李諤曰適見髯將軍鋭不可當果楊殿前也即以數騎遁去餘黨猶萬計皆僵立駭顧沂中躍馬前叱之曰爾曹皆趙氏民何不速降皆怖伏請命官軍獲李諤與其大將李亨等數十人麟在順昌聞猊敗拔寨遁去光世遣王徳追撃之徳與沂中追麟至南壽春而還是役也通兩路所得賊舟數百艘車數千兩器甲金帛錢米偽交鈔告敕軍須之物不可勝計於是孔彦舟圍光州守臣王萃拒之彦舟聞猊敗亦引去北方大恐丁未先是江西制置大使李綱聞上巡幸遣羅薦可奉表問起居且請速進兵又奏陳利害大畧以謂竊見間探所報偽齊乞兵於敵人頭項頗多未聞有渡淮而南者其侵犯淮淝及光山六安等處作過只是李成孔彦舟叛將簽軍深慮賊情狡獪匿重兵於後而以簽軍來嘗我師若一勝之後兵驕氣惰則為患有不可勝言者伏望降詔諸將益務淬礪以待大敵仍命朝廷按圖以視諸路某路固實當設疑以欵賊兵某路空虛當増兵以禦侵掠使江淮之間表裏相資首尾相應上以綱所陳利害切中事機賜詔奬諭戊申上謂大臣曰近日淮西有警朕常至夜分方寢奏報到又輒披衣以起或至再三趙鼎曰致陛下憂勞如此臣等之罪也辛亥楊沂中捷奏至俘戮甚衆上愀然曰此皆朕之赤子迫於凶虐勉強南來既犯兵鋒又不得不殺念之痛心上嘉張浚之功賜詔畧曰賊雛犯順犯壽及濠卿帥師徒臨敵益壯遂使兇渠宵遁同惡自焚寤寐忠勤不忘嘉歎新兩浙東路提㸃刑獄公事張九成改除直祕閣九成以貼職太峻固辭不受上不許九成言今日辭免非矯激要名苐不欲因九成上紊朝廷紀綱上察其意為之改命仍賜詔奬諭壬子四川制置大使席益以便冝増印錢引三百萬緍市軍儲制司増印錢引始此癸丑翰林學士朱震翰林侍讀學士范沖各進官一等以建國公讀孟子終篇也庚申都督行府摧鋒軍効用易青為廣東賊曽衮所執青不屈死之壬戌日中有黒子癸亥張浚遣行府書冩機冝文字計有功來奏事初趙鼎得政首引浚共事其後二人稍有異議及楊沂中奏捷鼎即求去位上不許鼎因曰臣始初與張浚如兄弟近因吕祉軰離間遂爾暌異今同相位勢不兩立陛下志在迎二聖復故疆當以兵事為重今浚成功淮上其氣甚鋭當使展盡底藴以副陛下之志如臣但奉行詔令經理庶務而已浚當留臣當去其勢然也上曰朕自有所處卿勿為慮鼎曰陛下即位以來命相多矣未有一人得脱者豈不累陛下考慎之明乎上徐曰俟浚歸議之浚奏車駕冝乗時早幸建康鼎與折彦􅀢共議囘蹕臨安以為守計上許之史臣記曰建炎元年如揚州二年幸杭州此汪黄為之也然未幾而航海幸越幸平江亦汪黄為之乎又自紹興八年定都闕之幸四年都此秦檜為之也六年浚獨相乃有建康鼎獨相早有駐蹕臨安之議亦檜為之乎胡寅有言陛下父兄在北方朝夕南望曰吾有子弟為中國帝王吾之歸有日矣痛惟愁苦艱危之中發此念為此言于今三年日迫日切而獻謀奉慮之人方欲陛下南狩日逺日忘遂無復國之心别求建都之地臣所未諭不得已則如張浚所謂都建康則北望中原常懐憤惕可也今乃立心於一隅何義乎十有一月乙丑朔玉山進士詹叔霆特免文解一次叔霆嘗投闕上書且獻平定策故旌録焉戊辰左宣奉大夫守尚書右僕射張滉特遷左光禄大夫以禄秩成書也浚請囘授其兄滉許之中興後諸臣以進書恩囘授親屬自此始庚午詔張浚召還行在所令學士院降詔癸酉湖北京西宣撫副使岳飛奏依奉處分往江州屯駐上曰淮北既無事飛自不須更來趙鼎曰此有以見諸將尊朝廷為可喜也丁丑新敕令所刪定官鄭剛中引對剛中言陛下臨御六年寛刑罰省科傜戒貪贓恤饑窮嚴警備每一下詔丁寧懇惻而徳澤未徧者葢天下有虚文之弊臣願為士大夫下厉精之詔許自今宣布實徳視斯民利害如在其家不得以虛名文具欺罔朝廷使恵下之誠意被覆赤子之身而不在於官府文書之上翌日輔臣進呈上曰近所引對多是人才朕雖得珠玉珍玩不足為寳但兾一嵗之間得十數輩人物乃足為寳也又翌日以其言令學士院降詔出榜朝堂遂以剛中充樞密院編修官戊寅故左朝議大夫孫諭特贈左中奉大夫諭為吏亷湖北諸司請官其曽孫偉以為天下亷吏之勸奏可庚辰上諭大臣曰司馬光𨽻字真似漢人近時米芾輩所不可彷彿朕有光𨽻字五卷日夕寘之座右每取展玩又所書乃中庸與家人卦皆脩身治國之道不特玩其字而已趙鼎曰如光所謂動容周旋中禮而無纎毫遺恨者也壬午四川制置大使席益上漕運六䇿令學士院降詔奬諭丙戍起居舎人吕本中兼權中書舎人時有監階州倉草場苗亘者以贓獲罪黥之本中奏曰近嵗官吏犯贓多抵黥罪且既名士人行法之際冝有所避況四方之逺或有枉濫何由盡知若遽施此刑異時察其非辜雖欲深悔亦無所及矣又此刑既用臣恐後世不幸奸臣弄權必且借之以及無罪使國家此刑不絶則紹聖以來憸人盜柄縉紳遭此殆無遺類矣願酌處當罰以稱陛下仁厚之意疏再上從之丁亥日中黒子沒己丑故翰林學士王洙之孫楚老獻仁宗所賜飛白字及御書洙在翰林仁宗問今嵗科舉内中合要奏告文宣王及諸賢表章趙鼎奏此事不見於他書上曰祖宗留意人材如此天下安得不治壬辰上書大成殿榜賜成都府學官初劉麟等既敗歸金人遣使問劉豫之罪豫懼廢猊為庶人以謝之於是金人始有廢豫之意矣十有二月甲午朔詔行宫留守秦檜令赴行在所奏事張浚以檜在靖康中建議立趙氏不畏死有力量可與共天下事一時仁賢薦檜尤力遂推引之趙鼎既與浚不咸左司諫陳光輔因奏劾鼎鼎復求去上愀然不樂曰卿只在紹興朕他日有用卿處是日臨安火所燔㡬萬家詔以米一千斛賜被火之家貧乏者戊戌右司諫王縉入對論簽書樞密院事折彦質之罪大畧謂彦質於賊馬南向之時倡為抽軍退保之計上則㡬誤國事下則離間宰臣乞賜放絀先是張浚自江上還平江隨班入見上曰却敵之功盡出右相之力於是趙鼎皇懼復乞去浚入見之次日具奏曰天下之事不倡則不起不為則不成今四海之心孰不想戀王室敵叛相結脅之以威雖有智勇無由展竭三嵗之間賴陞下一再進撫士氣從之而稍振民心因之而稍回正當示之以形勢庶㡬乎激忠起懦而三四大帥者亦不敢懷偷安茍且之心夫天下者陛下之天下也陛下不自致力以為之先則被堅執鋭履危犯險者皆有解體之意今日之事存亡安危所自以分六飛儻還則大衆解體内外離心日復一日終以削弱異日復欲下巡幸詔書誰為深信而不疑者何則彼知朝廷姑以此為避地之計實無意於圖回天下故也上翻然從其計浚因獨對乞乗勝取河南地擒劉豫父子又言劉光世驕惰不戰不可為大將請罷之上問嘗與趙鼎議否浚曰未也浚見鼎具道其故鼎曰不可豫机上肉耳然豫倚金人為重不知擒滅劉豫得河南地可遂使敵不内侵乎光世將家子將帥士卒多出其門下若無故罷之恐人心不可浚不悦鼎復言強弱不敵冝且自守未可以進黜鼎與彦質俱罷之京東淮東宣撫處置使韓世忠引兵攻淮陽軍敗之壬寅尚書左僕射同中書門下平章事兼知樞密院事趙鼎充兩浙東路安撫制置大使兼知紹興府翰林侍讀學士兼史館修撰資善堂翊善范沖提舉江州太平觀沖再疏求去乃有是命甲辰尚書司封員外郎蘓符兼資善堂賛讀赴行在代范沖也乙巳上與宰相語唐開元之治曰姚崇為相嘗選除郎吏明皇仰視屋椽崇驚愕久之後因力士請問知帝所以專委之意人主任相當如此張浚曰明皇以此得之亦以此失之楊李操柄事無巨細一切倚仗馴致大亂吁可戒焉上曰不然卿知所以失否在於相非其人非專委之過也浚曰明皇方其憂勤賢者獲進逮其逸樂小人遂用此治亂之所以分陛下灼見本末天下幸甚趙鼎入辭鼎既行上趣令之鎮鼎力辭新命詔不許鼎在越惟以束吏恤民為務每言不束吏雖善政不能行葢除害然後可以興利易之豫利建侯行師乃所以致豫解公用射隼於髙墉之上謂射隼而去小人乃所以致解鼎之學得於易者如此至是姦猾屏息又場務利入之源不令侵耗財賦遂足丙午秦檜入見簽書樞密院事兼權參知政事折彦質提舉臨安府洞霄宫手詔曰朝廷設官分職本以為民比年以來重内輕外殊失治道之本自今監司郡守秩滿考其善狀量與遷擢治效著聞即除行在差之其即官未歴民事者效職通及二年復加銓擇使之承流於外仍令中書御史臺籍記姓名俟到闕日檢舉引對參攷善否取㫖陞黜庶㡬天下百姓蒙被實惠以稱朕意時張浚専任國政首言比年以來内重外輕又官于朝者不厯民事利害不明詔令之行職業之舉豈能中理民多被其害遂條具以聞故有是詔福建市舶司言蕃舶綱首蔡景芳招誘舶貨自建炎初年至紹興四年共收息錢九十八萬緍詔補景芳承信郎戊申醴泉觀使兼侍讀秦檜令赴行在所講筵供職行宫同留守孟庾充行宫留守己酉詔目今前宰相到闕並許張蓋為秦檜故也庚戌詔館職如在職二年以上知縣資序人與除大郡通判通判資序人除知州軍任滿到闕今閤門引見上殿與參攷治狀善否取㫖陞黜仍令中書省御史臺籍記姓名辛亥提舉臨安府洞霄宫張守自常州入見即日除參知政事壬子詔張守兼權樞密院事江州進士孫復禮投匭訟徳安令黄覿不法御筆令監司究實上諭大臣曰復禮亦須知管如體究所訴不實即痛與懲戒鼓檢院止許士庶陳獻利害儻挾私怨有所中傷不惟長告訐之風亦非求言本意乙夘右司諫王縉言風俗頽弊起於士大夫貪冒無恥乞明詔大臣自今除賢能之人冝擢用者待以不次外其餘並依吏部格法則各安分守職業交修頽風復振賢才輩出矣詔令三省遵守戊午詔自今吏部注擬知通守令並選擇非老病及不曽犯贓與不縁民事被罪之人仍申中書門下省審察㫖具往擬人脚色闗御史住如非其人許本臺彈奏用中書請也既而行宫吏部請因民事犯徒已上罪人如今詔自祖宗以來以公私贓三等定天下之罪至是始増民事律焉己未左司諫陳公輔言自熈豐以來王安石之學著為定論自成一家使人同已仰惟陛下天資聰明聖學髙妙將以痛革積弊變天下尚同之俗然在廷之臣不能上體聖明又復􅀈以私意取程頥之説謂之伊川學相率而從之是以趍時競進飾詐沽名之徒翕然胥效倡為大言謂堯舜文武之道傳之仲尼仲尼傳之孟軻軻傳之頥頥死無傳焉狂言怪語淫説鄙諭曰此伊川之文也幅巾大袖髙視濶步曰此伊川之行也能師伊川之文行伊川之行則為賢士大夫捨此皆非也臣謂程頥尚在能了國家事乎且聖人之道凡所以垂訓萬世無非中庸非有甚髙難行之説非有離世異俗之行在學者允蹈之而已伏望察羣臣中有為此學相師成風鼓扇士類者皆屏絶之然後明詔天下以聖人之道著在方冊炳如日星學者但能參考衆説研窮至理各以己之所長而折中焉惟不背聖人之意則道術自明性理自得故以此修身以此事君以此治天下國家無乎不可矣輔臣進呈張浚批㫖曰士大夫之學冝以孔孟為師庶㡬言行相稱可濟時用可布告中外使知朕意時朱震在經筵不能諍論者非之辛酉詔以山陰至長沙四十縣並從堂除浙西之邑十四浙東九江東八江西福建各四湖南一偽齊劉豫密知金人有廢已謀請於金欲立麟為太子金主亶曰先帝所以立爾者以爾有徳於河南之民也爾子還有徳耶徐當咨訪河南百姓以定之宋史全文卷十九下
