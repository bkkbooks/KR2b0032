body:
  text: 宋史全文卷六宋真宗二戊申大中祥符元年春正月乙丑召王旦王欽若等上曰去年十一月見神人曰當降天書大中祥符三篇適覩皇城司奏左承天門屋之南角有黃絹曳於鴟吻之上蓋所降之書也旦等皆稱賀戊辰大赦改元趙德明嘗以民飢上表乞糧數百萬輔臣乞降詔責之王旦獨不言上曰卿意如何旦曰臣欲降詔與德明言極塞芻粟屯戍者多不可輟易已敕三司在京積粟百萬令德明自遣衆來取上喜從之既而德明受詔望闕再拜曰朝廷有人臣不合如此三月上語大臣曰京師士庶衣服器玩多鎔金為飾乃詔丁謂申明舊制募告者賞之自今乘輿服御塗金繡金之類亦不須用冨弼等釋曰國之去奢自上者始則天下無不從化况去禁嚴明真宗朝禁銷金服甚謹然纍下制令而犯者不絶故內則詔宫中已下外則自大臣之家悉不得以金飾衣服復申嚴憲布於天下自此更無犯者蓋自上者始而法禁明也夏四月朔天書降於大內之功德閣先是宰相王旦等率文武百官凡五上表請封禪甲午詔以今年十月有事于泰山丙午詔作昭應宫以奉天書上御崇政殿親試進士命翰林學士李宗諤等八人為考官臨軒賜進士姚曄等一百六人及第三人同出身十五人同三禮出身八十三人學究出身九經已下及第出身試銜助教者六百五十二人晉城縣令王琰其章縣主簿苗文思皆坐枉法受賕抵死癸丑詔刑部以其事告諭天下上封者言兩漢舉賢良多因兵荒灾變所以詢訪闕政今國家受瑞封不當復設此科於是悉罷吏部科目江南轉運使闕上乃自除監察御史張士遜為之士遜謁王旦願聞善教旦從容曰朝廷榷利至矣士遜起謝既去旦語人曰此轉運識大體士遜後徙廣西河北每思旦言不敢妄有興建云吕中曰當祥符天禧之間宫室之役興禱祠之事起則惟患天下之財不足以供國家之用而王旦且戒發運以東南民力竭戒轉運以朝廷榷利至矣其真宰相之體歟五月甲申上曰宫禁之內人數非多然幽閉可念昨令擇一百二十人厚資遣之朕方敦尚清靜以治天下符大中之訓焉王欽若言泰山下醴泉出先是上復夢神人言來月復當賜天書于泰山六月甲午木工董祚於醴泉亭北見黃素曳草上明日中使捧詣闕己酉王欽若來朝獻芝草八千一百三十九本九月京東西河北河東江淮兩浙荆湖福建廣南路皆大稔米斗錢七八冬十月詔以王嗣宗攝御史大夫為考制度使周起攝中丞為副使所經州縣採訪民間不便事并市物之價車服權衡度量不如法者舉儀制禁之有奇才異行隱淪不仕者與所屬長吏論薦鰥寡惸獨不能自存者常加賑恤官吏政迹尤異民受其惠及不守廉隅昧諳政理者孝子順孫義夫節婦為鄉里所稱者並條析以聞官吏知民間疾苦者亦為録奏司天言五星順行同色辛卯上發京師辛丑次鄆州丙午次翔鑾驛命張旻鄭成扈從升山辛亥享昊天上帝于圜臺以太祖太宗配命羣官享五方帝諸神于封祀壇儀衛使奉天書于上帝之左壬子禪祭皇地祇于社首山如封祀之儀甲寅車駕發奉符縣次太平驛是日始復常膳上勞王旦等以久食蔬旦等皆再拜馬知節獨言蔬食惟陛下一人耳臣等在道未嘗不私食肉上顧旦等曰知節言是否曰誠如知節之言十一月朔旦幸曲阜縣謁文宣王有司定儀止肅揖上特再拜上製贊刻石廟中詔加諡曰𤣥聖文宣王又追諡齊太公曰昭烈武成王周文公曰文憲王丁丑車駕至自泰山十二月詔江淮發運轉運司部內各留三年之儲以備水旱先是江淮米悉運送京師至是司天監言揚楚之分當水旱為沴防患故也命冦準知天雄軍契丹使嘗過大名謂準曰相公望重何故不在中書準曰主上以朝廷無事北門鎖鑰非準不可耳吕中曰君子內則小人外小人內則君子外當冦準之主親征也恐欽若有以沮其議則出於天雄軍及欽若之用國事也恐冦公有以奪其議則亦出於天雄軍然君子在朝廷則朝廷重在邊郡則邊郡重此冦公所以起北使敬畏之心己酉大中祥符二年春正月御史中丞王嗣宗言翰林學士楊億知制誥錢惟演祕閣校理劉筠唱和宣曲詩述前代掖庭事詞涉浮靡上曰詞臣學者宗師也安可不戒其流宕乃下詔風厲學者自今有屬詞浮靡不遵典式者當加嚴譴其雕印文集令轉運司擇部內官看詳以可者録奏蘇州僧道元纂佛祖訖近世名僧禪語為傳燈録三十卷以獻命刻板宣布以殿中丞孔勗知曲阜縣兼檢校先聖廟二月改入內內侍省內侍供奉官為內東西頭供奉官殿頭高品為內侍殿頭高品為內侍高品高班內品為內侍高班黃門為內侍黃門凡六等並冠本省之號令陜西發廩賑糶旱故也汀州人王捷者咸平初賈販至南康軍遇道人自言姓趙氏授以小鐶神劒劉承圭聞其事為改名中正得對龍圖閣常有道人偶語云即受中正法者司命真君也承圭遂築新堂乃以景德四年五月十三日降堂之紗幬中自是屢降中正常達其言既得天書遂東封加號司命天尊是為聖祖辛卯授中正左武衛將軍吕源曰王中正者以刑餘黥卒落籍更名與劉承圭協濟其奸恣為妖妄假聖祖虛命天書祥瑞藥金藥銀營繕宫觀以至東封西祀朝謁亳州太清宫皆由中正以啓之是時承平稍久廷多諛臣獨有孫奭者纍上疏諫真宗為著解疑論以示羣臣蓋亦有慊也王中正之死尚贈節度使妻施氏封吳郡夫人諸子皆任殿直與太宗誅利用之事異矣辛丑分遣使臣出常平倉粟麥於京城減價糶之應天府民曹誠就戚同文所居造舍聚書博延生徒府奏其事上詔賜額曰應天府書院命奉禮郎戚舜賔主之舜賔同文孫綸子也知溫州李邈言兩浙僧求丐金銀珠玉錯末和泥以塑塔像望嚴行禁絶違者重論其罪從之夏四月詔羣臣保舉幕職州縣官不得以初任及無勞績者充數己亥丁謂為修昭應宫使李宗諤為同修宫使謂欲殫國財用規摹宏大近臣多言其不可上召問謂謂曰陛下未有皇嗣建宫於宫城之乾地正可以祈福既而王旦密疏諫上諭之如謂所對旦遂不敢復言詔自今諸路轉運使副提點刑獄所舉官如進改後五年無過有勞幹者并舉主特加酬奬先是上謂宰臣曰舉官犯贓則連坐而舉得其人者賞亦不及非所以勸也故有是詔五月朔詔追封孔子弟子兖公顔回為國公費侯閔損等九人為郡公成伯曾參等六十二人為列侯宰相羣官分撰贊乙亥林特劉承圭李溥上編成茶法條貫二十三冊六月知制誥王曾上疏言就嚴城之北隅啓列真之祕宇式昭丕應特建嘉名功極彌年費將巨萬臣以為今之興作有不便之事五焉伏望損彼規模減其用度止敦朴素無取瑰竒惟將之以誠明仍重之以嚴潔名數之際加等是宜實費之資節儉為要上御崇政殿親試賜進士梁固等二十六人及第同出身者三人諸科四十八人同出身者六人秋七月特置糾察在京刑獄司命知制誥周起侍御史趙湘領之戊寅詔封𤣥聖文宣王廟配享先儒魯史左丘明等十九人爵為伯八月上禁銷金嚴甚還自東封杜氏乃服以迎車駕上見之怒遂令出家為道士由是天下無敢犯禁者九月先是上謂王旦等曰朕在東宫讀尚書凡七遍論語孝經亦皆數四今宗室諸王所習惟在經籍昨奏講尚書第五卷此甚可喜也於是召寧王元偓等赴龍圖閣觀書目上諭之曰宫中常聽書習射最勝他事元偓曰臣請侍講張頴說尚書間日不廢弓矢因陳典謨之義上喜甚乃詔每講日賜食是秋京西河東陜西江淮荆湖路鎮定益梓卭密等州言豐稔京師粟斗錢三十十月甲午詔諸路州府軍監關縣擇官地建道觀並以天慶為額十一月甲子詔諸路官吏有蠧政害民如鞫得實本路轉運使提點刑獄官不能舉察者論其罪上嘗謂宰相曰為國之要在乎賞當其功罰當其罪不任情於其間則賞罰必當懲勸必行萬方必理和氣必生自然天地降祥四方無事以此思之可不戒乎庚戌大中祥符三年春閏二月甲寅冬官正韓顯符造銅候儀成并上所著經十卷其制則大唐李淳風及一行之遺法云己未河北轉運使李士衡言本路諸軍歲給帛七十萬當春時民多匱乏常假貸於豪右方納稅租又償逋缺以故工機之利愈薄請官預給帛錢俾及期輸送民既獲利官亦足用詔從之仍令優與其直其後遂推其法於天下三月上謂王旦等曰自北鄙修好疆場不聳朕居安慮危罔敢暇逸嘗著文自警置之座右乃出貴廩食吟軫田園吟慰農歌自戒針以示旦等己亥上謂宰相曰刑獄之官尤須遴擇朕常念四方獄訟若官非其人寧無枉濫且單弱之人不能披訴朝廷無由知之上作念邊詩賜近臣和上謂輔臣曰將帥才難今文武中固亦有人蓋不經戰陳無由知之雖天下無事然兵不可去戰不可忘古之道也馬知節曰將帥之才非可坐而知之顧臨事機變如何耳夏四月陳彭年上奉詔纂歷代帝王集二十五卷上作序名宸章集時京師竹有華司天言主歲不登上曰數歲豐稔物價甚賤但小民不能愛惜飲食之餘多所棄擲宜令開封府嚴禁之詔自今每年終翰林學士已下常參官並同奏舉外任京朝官三班使臣幕職州縣官各一人如年終無舉官狀當行責罰轉運使提點刑獄官知州通判舉部內官屬不限人數以次年二月二十五日已前到京如有違限當依不申考帳例坐罪三司使副即舉奏在京掌事官京朝官使臣仍並令中書置籍常以五月一日進內是日後宫李氏生子知開封府周起方奏事上謂起曰知朕有喜乎起曰臣不知也上曰朕始生子即入禁中懷金錢出探以賜起李氏杭州人初入宫侍劉修儀莊重寡言上命為司寢既有娠從上臨砌臺玉叉墜心惡之上私卜叉完當得生男子左右取叉以進殊不毁上喜甚已而果生子是為仁宗甲午詔奬知益州任中正轉運使言吏民列狀願借留之也中正及劉綜等皆以善政聞上謂輔臣曰藩方重地切在得人朝行中亦難其選自今須歷方面始可擢為大官卿等志之環州高繼忠言趙德明雖稱藩然頗不遵誓約上謂宰相曰方今四海無虞而言事者謂和戎之利不若克定之武也王旦曰止戈為武佳兵不祥之器祖宗平一宇內每謂興師動衆皆非獲已今柔服異域守在四夷帝王之盛德也六月翰林學士邢昺被病上親臨問故事非宗戚宰相無省疾臨喪之行惟昺與郭贄以恩舊特用此禮儒者榮之秋七月置龍圖閣學士以直學士杜鎬為之待制陳彭年為直學士賜大理評事蘇耆進士及第耆易簡子宰相王旦女壻也耆先舉進士及唱第格在諸科陳堯叟為上具言之上顧問旦旦却立不對耆曰願且修學既出堯叟謂旦曰公一言則耆及第矣旦笑曰旦為宰相自薦親屬士子盈庭得無失體堯叟愧謝曰乃知宰相真自有體於是耆獻所為文召試學士院故有是命九月杖殺入內高品江守恩守恩違制市青苗私役軍士六百人取民田麥穗及擅董丁夫非理笞捶令役夫蔡文義市驢不獲杖之致死上不貸以法中外莫不悚慶十二月丙午寶鼎縣黃河再清經度制置副使李宗諤以聞上作詩近臣畢和龍圖閣待制孫奭由經術進守道自處即有所言未嘗阿附取恱上嘗問以天書奭對曰臣愚所聞天何言哉豈有書也上知奭朴忠每優容之及將有汾隂之役㑹歲旱遂奏疏陳不可者十陛下才畢東封更議西幸非先王卜征五年重謹之意今國家土木之功纍年未息水旱作沴飢饉居多乃欲勞民事神神其享之乎又上疏言今之姦臣以先帝寅畏天灾詔停封禪故贊陛下力行東封以為繼成先志也先帝欲北平幽朔西取繼遷則未嘗獻一謀畫一䇿而乃卑辭重幣求和于契丹蹙國縻爵姑息于保吉謂主辱臣死為空言以誣下罔上為己任是陛下以祖宗艱難之業為佞邪僥幸之資臣所以長嘆痛哭也今乃野雕山鹿並形奏簡秋旱冬雷率皆稱賀將以欺上天則上天不可欺將以愚下民則下民不可愚將以惑後世則後世必不信上玷皇明不為細也疏入不報吕中曰至是李文靖之言驗矣封禪之議決於丁謂㑹計有餘之一言天書之降成於欽若神道設教之一語雖以王文正之碩德重望不敢有異議其後冦準之入居相府亦以朱能天書而入當時極言其非者惟孫奭一人而已天何言哉此足以破人主之惑辛亥大中祥符四年春正月代州言粟斗十餘錢丁酉車駕奉天書發京師二月次河中府辛酉祀后土祇備三獻奉天書於神坐之左以太祖太宗並配上作汾隂二聖配享銘河瀆四海等贊召草澤李瀆劉巽瀆以疾辭三月朔召草澤魏野辭疾不至甲申幸吕蒙正第問蒙正諸子孰可用對曰臣之子豚犬爾猶子夷簡宰相才也夏四月甲辰朔車駕至自汾隂上謂宰相曰唐起居郎舍人司諫正言凡十二貟近者此官多缺可選有才望為中外所知者補之於是直史館陳堯佐樂黃目盛𤣥王隨路振崔遵度陳知微李咨陳越等九人悉授兩省官六月兩浙福建荆南廣南諸州循僞制輸丁身錢歲凡四十五萬四百貫民有子者或棄不養或賣為僮僕或度為釋老秋七月朔詔悉除之八月上謂宰相曰朝廷宜守經制儻務更張則攀援者衆乃知命令之出不可不謹又涖官之人不可過為寬恕以致弛慢或探求罪惡不顧煩擾抑又甚矣王旦曰古人有言法出而弊作令下而姦生寬則民慢陷法者多猛則民殘無所措手足正為此也祖宗以來兩省御史臺官須文學優長政治尤異者乃特除拜汾隂肆赦始以叙遷上恐循習非便乃詔自今遵守舊制不得以他官轉入丁巳詔文武官有言刑政得失邊防機事者並賜對其餘細務令條列以聞冬十月上以江南淮南接壤而鹽酒之價不等令三司與江淮制置發運使李漙規定以聞有司執言慮失歲課上曰茍便於民何顧歲入也十一月上親試賜進士張師德等二十一人及第十人同出身諸科及第者四十二人同出身者八人工部侍郎种放屢至闕下俄復還山人有貽書嘲其出處之迹放晚節頗飾輿服廣置良田王嗣宗之出守長安始甚敬放被酒稍倨嗣宗怒放曰不猶愈於角力而中第乎初嗣宗就試講武殿嘗因戲弄擢首科故放及之嗣宗因上疏言放弟姪無賴據林麓樵採周回二百餘里奪編氓厚利疏辭極其醜詆目放為魑魅上方待放厚會恩赦而止於是放自乞退居嵩山然猶往來終南按視田畝時議寖薄焉十二月太常博士江嗣宗言陛下躬臨庶政十有五年殿廷問事一取聖斷有勞宸慮今請禮樂征伐大事出於一人自餘細務委任大臣百司上曰此頗識大體乃詔從其所請壬子大中祥符五年春正月命朝迥劉綜李維孫奭同知貢舉上作詩勗以掄材之意并州上芻粟之數可給四五年上曰河東仍歲豐穰儲峙尤廣自今諸路稔歲宜以時積穀為凶年之備著作佐郎李垂上導河形勢書三篇并圖詔任中正陳彭年王曾詳定中正等上言其書并圖雖興行匪易而博洽可奬望送史館從之二月上謂宰臣曰聞貢院試諸科舉人皆解衣閲視慮其挾藏書冊頗失取士之體宜令止之三月上親試禮部合格貢舉人始摹印詩賦論題以賜官給紙起草得進士徐奭以下及第者百人同出身者二十六人諸科及第者三百二十四人同出身者五十二人丁酉上封者言進士蕭立之本名琉嘗因賭博抵杖刑詔有司詰問引伏命奪其敕贖銅四十斤夏四月令禮部貢院取前後詔敕經久可行者編為條例戊申命刑部尚書向敏中守本官平章事敏中再掌留任以厚重鎮靜人情帖然上愈嘉之故復使相三司請民有販茶違法者許家人告論上曰此犯教義非朝廷所當言也不許五月上以淮南兩浙路稍旱即水田不登乃遣使就福建取占城稻三萬斛分給三路令擇民田之高仰者蒔之蓋旱稻也又取種於玉宸殿知袁州何蒙上言本州二稅請以金折納上曰若是則盡廢耕農矣不許六月諸州言歲豐榖賤咸請博糴上即詔三司使丁謂規畫以聞謂言莫若和市而諸州積鏹數少癸丑出內藏庫錢百萬貫付三司以佐用度錢塘人林逋性恬淡好古不趨榮利家貧衣食不足晏如也歸杭州結廬西湖之孤山二十年足不及城市轉運使陳堯叟以其名聞庚申詔賜粟帛長吏歲時勞問大事記曰當天下無道之時而隱者此當𨼆而𨼆者也當天下有道之時而隱者此不當隱而隱者也若种放林逋諸公其不當隱而隱者豈生於野者不願為公侯國初風俗淳厚若此乎然當人主求賢下士之時而卓然有高士清風峻概豈不動人主歆慕之心一四皓不仕可以植西京節義之風一嚴光不出可以植東都節義之風孰謂隱士無益於世哉壬戌令樞密院修時政記月送史館秋七月龍圖閣待制張知白上言昔唐李嶠嘗云安人之方須擇郡守切見朝廷重內官輕外任望於臺閣妙選賢良分典大州共康庶績上曰知白援引故事請重親民之官良可嘉也命知白同糾察在京刑獄八月知制誥王曾判大理寺判寺舊用郎官上欲重其任故特命曾對便殿諭之曰天下之命係於獄今以屈卿曽頓首謝仍賜錢三十萬因請辟奏寮屬遂著為令上作對照詩示輔臣有孜孜綏萬國不愧鬢邊絲之句王旦曰陛下憂勤萬方勵精庶務發揮聖道形于天章臣等固當夙夜盡心上副求治之意九月以知樞密院事王欽若陳堯叟並同平章事充樞密院使簽署樞密院事馬知節為副使儒臣領樞密兼使相自欽若堯叟始參知政事刑部侍郎趙安仁罷為兵部尚書先是上議立皇后安仁謂劉德妃家世寒微不如沈才人出於相門他日與王欽若論方今大臣誰最為長者欽若欲排安仁乃譽之曰無若趙安仁安仁昔為故相沈義倫所知常欲報之上始有意斥安仁矣嘗諭王旦曰聞趙安仁在中書絶不親事旦對曰安仁頗知大體居常進擬皆同列擬定方敢取旨臣每見臨時變易於上前者皆迎合陛下意安仁無異議是有執守上曰能如此耶朕不知也及罷政事仍命同修史安仁雖在貴顯簡儉若平素喜誨誘後進成其名聲當世以重德推焉三司使丁謂參知政事初王旦欲引李宗諤參知政事宗諤家貧旦前後資借之甚多王欽若知之故事參知政事謝日所賜幾三千緡欽若因密奏王旦欲引宗諤參知政事得賜物以償己債非為國擇賢也明日旦果以宗諤名聞上變色不許欽若與劉承圭陳彭年林特及謂等交通蹤跡詭異時論謂之五鬼冬十月以知制誥陳堯咨權同判吏部流內銓舊制選人皆用奏舉乃得京官而士有孤寒不為人知者堯咨特為陳其功狀而升擢之戊午九天司命上卿保生天尊降于延恩殿先是上夢景德中所覩神人傳玉皇之命云先令汝祖趙某授汝天書翌日夜復夢神人傳天尊言吾坐西當斜設六位即於延恩殿設道場是日五鼓天尊降曰吾人皇中九人一人也是趙之始祖再降乃軒轅黃帝後唐時七月一日降下主趙氏之族皇帝善為撫育蒼生無怠前志即乘雲而去辛酉上以崇儒術論為君難為臣不易論示王旦等先是陳彭年因奏對上謂之曰儒術汙隆其應實大國家崇替何莫由斯為君之難由乎聽受臣之不易在乎忠直其或君以寬大接下臣以誠明奉上君臣之心皆歸於正直道而行至公相遇此天下之達理先王之成憲猶指其掌孰謂難哉閏十月己巳上天尊號曰聖祖上靈高道九天司命保生天尊大帝詔聖祖名上曰𤣥下曰朗不得斥犯以七月一日為先天節十月二十四日為降聖節癸酉詔天下州府軍監天慶觀並增置聖祖殿乙亥詔上聖祖母懿號元天大聖后丙子出玉宸殿新稻賜輔臣上曰禁中植稻暇日臨觀刈穫見其勞力愈知耕農之可念也戊寅改兖州曲阜縣為仙源縣建景靈宫太極觀於夀丘以奉聖祖及聖祖母戊子內出樂章十六曲以示輔臣文舞曰發祥流慶武舞曰降真觀德十二月令三司出炭四十萬減市直之半以濟貧民時連日大雪苦寒故有是命壬申改諡𤣥聖文宣王為至聖文宣王癸丑大中祥符六年春正月吕源曰正月對輔臣於崇政殿之西序曰朕寢殿中帟幕皆用青法絁非張燭莫能辨色四年祀汾隂還塗御烏頭藤帽或乘馬以時暄涉逺憫衛士肩輿執蓋之勞至於巡幸州縣府御製詩什皆書粉牌揭於屋棟三朝簡儉如此故纍聖不替舊風自蔡京用事倡豐亨豫大之說開天下侈靡之心輔相皆寒儒而所處無異皇居所享爭僣玉食外之監司郡守亦以真紫為帟幕綵繒緣簾帷所至留題則立石刻而覆碧紗下至簿尉之微道路之間肩輿張蓋益恣其驕與天子青布葦簾粉牌題詩烏頭藤帽青絁帟幕固有間矣辛酉詔宗正寺以皇屬籍為皇宋玉牒三月上作內侍針賜閻承翰等夏六月監察御史張廓上言天下曠土甚多請依唐宇文融所奏遣官檢括土田上曰此事未可遽行然今天下稅賦不均富者田廣租輕貧者地蹙租重由是富者益富貧者益貪兹大弊也王旦等曰田賦不均誠如聖旨但改定之法亦須馴致翰林學士知制誥楊億草契丹答書云鄰壤交歡上自注其側作朽壤鼠壤糞壤等字億遽改為鄰境明日引唐故事學士草制有所改為不稱職亟求罷上慰諭之他日謂輔臣曰楊億真有氣性不通商量及議册皇后上欲得億草制使丁謂諭㫖億難之因請三代謂曰大年勉為此不憂不富貴億曰如此富貴亦非所願也乃命他學士草制億雖頻忤㫖恩禮猶不衰王欽若陳彭年等深害之益加譛毁上意稍怠億嘗入直忽被召至禁中既見賜坐徐出文藳數篋以示億曰卿識朕書跡乎此皆朕自起草未嘗命臣下代作也億皇恐不知所對趨出即謀退遁億有别墅在陽翟億母往視之會得疾億遂留謁告榜子與孔目吏億狂奔去朝論譁然以為不可上亦謂輔臣王旦等曰億侍從官安得如此自便旦曰願陛下矜容不然顛躓久矣然近職不可居外地今當罷之上終愛其才踰月命弗下億稱疾請解官辛未以億為太常少卿分司西京大事記曰國家創造之初則其大體必本於厚風俗涵養之久則其大勢必趨於文故吕文穆王文正以誠實厚朴之風鎮宇內而楊大年王元之之輩其文章格力皆足以潤色皇猷黼黻雲漢矣然西崑之體未變也必至孫泰山石徂徠而後經學盛必至歐陽公尹師魯而後古文興必至伊洛關湖而後學道明是豈一日之積哉而王楊雖文士觀其性質剛介臧否人物冊后之舉富貴可立俟也而不草劉后之制拜相之麻權要可趨媚也而不草相謂之制又豈可以文章之士待之哉秋七月初劉承規私請于上欲求節度使上諭王旦旦曰陛下所守者祖宗典故典故所無不可聽也上又曰承規言死在旦夕旦曰陛下若聽承規所請後必有邀朝廷求為樞密使者矣上乃止承規尋卒乃贈鎮江節度使初知濵州吕夷簡上言請免河北農器之稅上曰務穡勸耕古之道也豈獨河北哉癸卯詔諸路勿稅農器富弼等釋曰關市之賦所以征商也稅及農器去古法逺矣吕夷簡雖上言乞免其等止言河北所見未廣真宗推農務之道使天下免稅稼器固聖人知博利也癸丑詔置水虎翼軍八月王欽若等上新編修君臣事迹一千卷賜名册府元龜冬十月龍圖閣待制孫奭上疏言陛下封泰山祀汾隂躬謁陵寢今又將祠太清宫外議籍籍以謂陛下事事慕效唐明皇豈以明皇為令德之主邪臣願陛下抑損虛華斥逺邪佞罷興土木無為明皇不及之悔帝以為封泰山祠汾隂上陵祀老子非始於明皇開元禮今世所循用不可以天寶之亂舉謂為非也作解疑論以示羣臣然知奭朴忠雖其言切直容之弗斥也甲寅大中祥符七年春正月壬寅車駕奉天書發京師丙午至奉元宫又詣先天觀洞霄廣靈宫行香復至太清宫真元觀周覽還奉元宫丙辰升應天府為南京二月雍丘邢惇以學術稱嘗舉進士不第遂隱居不出王曾薦之及還自亳召對問治道惇曰陛下東封西祀皆已畢矣臣復何言上恱除許州助教遣歸既卒乃見其敕與廢紙同束置屋梁間辛酉車駕至自亳州三月皇子受益封慶國公初宰相屢言皇子未議封建今朝修禮成願特降制命舊制國公食邑三千户今止千户有司之過也皇子即後宫李氏所生於是五年矣劉皇后以為已子使楊婉儀保視之故仁宗常呼后為大娘娘婉儀為小娘娘五月詔摹刻天書奉安於玉清昭應宫命王旦為天書刻玉使王欽若為同刻玉使丁謂為副使趙安仁陳彭年為同刻玉副使丙午府州言知州興州刺史折惟昌卒先是河東民運糧赴麟州當出兵為援惟昌時已屬疾曰古人受命忘家死於官事吾無憾也即引步騎屯寧逺寒冒風沙而行疾遂亟上聞之遣使挾醫診視弗及以其弟惟忠為知州事六月樞密使王欽若罷為吏部尚書陳堯叟為户部尚書副使馬知節為潁州防禦使欽若性傾巧敢為矯誕知節薄其為人未嘗詭隨上嘗以喜雪詩賜近臣而誤用旁韻王旦欲白上欽若曰天子詩豈當以禮部格校之旦遂止欽若退遽密以聞已而上諭二府曰前所賜詩微欽若言幾為衆笑旦唯唯知節具斥其姦狀上亦不罪也欽若每奏事或懷數奏但出其一二其餘皆匿之既退則以已意稱上旨行之知節嘗於上前顧欽若曰懷中奏何不盡出及王懷信等上平蠻功樞密院議行賞久不決上曰欽若等異常不和事無大小動輒爭競於是三人者俱罷兵部尚書冦準為樞密使同平章事王旦薦之也講義曰使丁謂止於轉運王欽若夏竦止於判官則未必不以君子目之不幸官至政府德薄而位尊反使小人之名遺臭於萬世惜哉秋七月以王嗣宗曹利用並為檢校太保充樞密副使戊申王旦至自兖州言李士衡張士遜等涖事幹集望賜詔褒諭徐懷式等無治聲望令轉運提㸃刑獄司察之詔可或謂旦曰公為元宰將命出使而所舉官吏僅得褒詔無乃太輕乎旦曰既稱薦之又請亟用則上恩皆出於已矣此人臣之大嫌也大內押班周懷政實與旦同行或請見必俟從者畢集整衣冠見之未嘗私焉議者以為得體八月祕書監分司西京楊億以疾愈求入朝上謂王旦曰億性峭直無所附會文學固無及者然或言其好竊議朝政何也旦曰此蓋與億不足誣謗之耳億諧謔過當則恐有之訕讟之事保其必無也戊辰命億知汝州既而監察御史姜遵奏請罷之上曰億前告歸本無終焉侍養之請今以疾愈求入朝故特與郡乃詔中書召遵諭之九月上御景福殿試亳州南京路服勤辭學經明行修舉人得進士張觀等二十一人諸科一十一人賜及第冬十月先是登州言高麗遣使入貢上謂宰相曰此事如何王旦曰高麗久來進奉因契丹阻絶今須許其赴闕契丹必不敢言四夷入貢以尊中國蓋常事爾彼自有隙朝廷奚所愛憎上曰卿言深得大體即遣使館接焉甲子玉清昭應宫成宫宇總二千六百一十區七年宫成十一月知秦州張告言蕃部俶擾已出兵格鬭望量益士卒王旦曰今四方寧謐契丹守盟甚堅西戎入貢不絶藩翰之臣宜務鎮靜上曰邊臣利於用兵殊不知無戰為上因言昔嘗謂邢昺云朕中夕靜思四方至大張官置吏委之千萬里外豈能盡知善惡有敗事則為患非小自古帝王宵衣旰食正在此爾萬務幾微更賴卿等盡心也十二月己未作元符觀乙卯大中祥符八年春正月壬午朔備鑾駕詣玉清昭應宫奏告尊上玉皇大天帝聖號還御崇德殿受賀大赦天下己丑樞密院言準詔定承天節南郊奏䕃子弟恩例命兵部侍郎修國史趙安仁知禮部貢舉翰林學士李維知制誥盛度劉筠同知是歲始置謄録院令封彌印官封所試卷付之命京官校對用兩京奉使印訖復送封印院始送知舉官考校以楚王元佐為天䇿上將軍興元牧府牧自此始丙子詔禮部貢院進士六舉諸科九舉雖不合格並許奏名三月癸卯上御崇政殿覆試得進士蔡齊以下百九十七人特奏名進士七十八人諸科三百六十三人故事當賜第必召其高第數人並見又參擇其材質可者然後賜第一時新喻人蕭貫與齊並見齊儀狀秀偉舉止端重上意已屬之冦準又言南方下國人不宜冠多士齊遂居第一上喜特詔金吾給七騶出兩節傳呼因以為例準性自矜尤惡南人輕巧既出謂同列曰又與中原奪得一狀元齊膠水人也上之親試進士也召崇文院檢討馮元講周易泰卦元因推言君道至尊臣道至卑必以誠相感乃能輔相財成上說特賜五品服夏四月召宰相觀書玉宸殿閲御製皇王帝霸五臣等論辛酉賜宰相御製良臣正臣忠臣姦臣權臣論以樞密使同平章事冦準為武勝軍節度同平章事先是準惡三司使林特之姦邪數與忿爭特方有寵上不恱謂王旦等曰準年高屢更事朕意其必能改前非今觀所為似更甚於疇昔旦等曰準好人懷惠又欲人畏威皆大臣所當避而準乃以為已任此其所短也非至仁之主孰能全容之準之未為樞密使也旦嘗得疾上命肩輿入禁中因曰卿今疾亟萬一有不諱使朕以天下事付之誰乎再三問不對上曰張詠何如不對又問馬亮何如不對上曰試以意言之旦強起曰以臣之愚莫若冦準上憮然有間曰準性剛褊更思其次旦曰他人臣所不知也及準為樞密使中書有事關送樞密院礙詔格準即以聞旦拜謝曰此實臣等過也既而樞密院有事送中書亦礙詔格旦令却送與樞密院準大慙旦每見上必稱準之才而準數短之上謂旦曰卿雖談其美彼專道卿惡旦謝曰理固當然臣在相位久政事缺失必多準對陛下無所隱此臣所以重準也及準自知當罷使人私於旦求為使相旦大驚曰使相豈可求邪且吾不受私請準深恨之及制出準入見泣涕曰非陛下知臣何以至是上具道旦所以薦準者準始愧歎出語人曰王同年器識非準所能測也以吏部尚書王欽若户部尚書陳堯叟並為樞密使同平章事榮王元儼宫火延燒內藏左藏庫乾元門崇文院祕閣下詔罪已令文武百官上封論事無或隱蔽五月朔王隨言準詔劾榮王元儼宮遺火事當死者甚衆王旦獨請對言曰始失火時陛下以罪已詔天下而臣等皆上章待罪今乃過為殺戮恐失前詔意也且火雖有迹寧知非天譴耶上欣然納之由是減死者幾百輩甲申命冦準知河南府兼西京留守司事詔自宫禁逮臣庶之家一切服玩皆不得以金為飾嚴其例禁自是遂絶庚子放宫人一百八十四人閏六月王欽若上準詔編修后妃事迹七十卷賜名彤管懿範秋七月徙知并州薛映知揚州馬亮知升州李迪知永興軍上謂輔臣曰大藩長吏尤難其人要在洞達物情遵守條詔愛民抑暴而已吏或廉而肆虐或察而滋章或急掊斂以為公或曠職務以為恕如此則何由致治耶上作讀十九代史詩賜近臣和宫苑使昭州團練使郭崇仁為解州團練使崇仁守文子章穆皇后弟也時崇仁母梁氏亡詔起復乃有是命崇仁雖外戚朝廷未嘗過推恩澤自是凡十年不遷八月陳州言知州張詠卒詠臨終奏疏言不當造宫觀竭天下之財傷生民之命此皆賊臣丁謂誑惑陛下乞斬謂頭置國門以謝天下然後斬詠頭置丁氏之門以謝謂上亦不為忤云吕夷簡釋曰天子有爭臣七人雖無道不失其天下故古之人雖有雷霆之威萬鈞之勢及聞直言切諫則假顔色以接之厚金帛以酬之加爵賞以貴之面折其短廷指其過加誠愈納不敢輒怒蓋將以開言路而來諌臣也我太祖太宗真宗皆有堯舜之資禹湯之智文武之德而自建隆以來未嘗怒一諌官逐一御史故直言聚于朝忠言屬于耳宗社有萬世之安無一日之危由此道也庚寅知汝州祕書監楊億言部內秋稼甚盛粟一本至四十穗麻一本至九百角上覽其章謂輔臣曰億之詞筆冠映當世後學皆慕之王旦曰如劉筠宋綬晏殊輩相繼屬文有貞元元和風格者自億始也九月注輦國王遣使來貢先是有舶商扺其國告以天子東封西祀其王曰十年來海無風濤古老傳云如此則中國有聖人故遣使入朝冬十月以填從吉為給事中權知開封府上召戒從吉曰京府浩攘凡事大速則誤緩則滯惟須酌中耳有請屬一切拒之十一月河南府言工部侍郎种放卒上甚嗟悼先是有譏放循默者上聞之謂輔臣曰放為朕言事甚衆但外廷不知耳因出所上時議十三篇其目曰議道議德議用議器議文武議制度議教化議賞罰議官司議軍國議獄訟議征賦議邪正十二月戊寅皇子加冠禮辛卯以皇子慶國公受益為夀春郡王己亥以御製陳書詩并注賜輔臣因曰隋煬帝初平陳斬五佞人以謝三吳當時天下稱賢及其無道乃過後主深可嘆也王旦等曰陛下博觀載籍非惟多聞廣記皆取其規鑒談經典必稽其道語史籍必究其事論為君必究其治亂言為民必志其邪正加以秉筆立言皆化人垂世之作今之文章典雅搢紳稽古皆聖訓所及也丙辰大中祥符九年正月以馬軍副都指揮使張旻兼樞密副使先是旻被㫖選兵下令太峻兵懼謀欲為變上召二府議之王旦曰若罪旻則自今帥臣何以御衆急捕謀者則震驚都邑陛下數欲任旻以樞密臣未敢奉詔今若擢用使解兵柄反側者當自安矣上謂左右曰王旦善處大事真宰相也以張士遜崔遵度並充夀春郡王友士遜平雅和謹淡於榮利遵度同修起居注踰十年立殿墀下常退匿楹間慮上見之搢紳推其長者初宰相將用士遜等翊善記室上曰翊善記室府屬也王皆受拜故以王友命之令王每見答拜示賔禮之意士遜嘗謁王旦稱王學書有法旦曰公為王友職止於是邪士遜愧謝講義曰文王世子一篇所以教為世子之道也其言曰凡學世子及學士必時即世子與學士同其學讀詩讀禮同其書樂正司成同其師齒于學則又所以同其禮夫為君之子而下與士齒無非所以養成德性陶育氣質以為異日天下國家之宗主是故學問聚辨之功非驕逸易縱者所能為而富貴崇高之地非學問已成者未易居此古先帝王皆講學成德於未為君之日也後世徒知國本之當尊而不知儲德之當養世子得以臣其宫之僚屬而輔翼東宫之官始與僚屬無異此真宗不置翊善記室而以二人為王友蓋官屬則有君臣之義王友則有師友之義君臣之分既立則學問之功難施師友之義既明則驕貴之習自革此作聖工夫必以誠敬為入門也二月王旦上兩朝國史一百二十卷甲午詔築堂於元符觀南為皇子就學之所賜名曰資善上作記刻石於堂中癸卯召近臣宴翔鸞閣觀太宗御書及御製聖文神筆頌玉宸殿記等癸丑詔官吏犯贓被劾有故延歲月以俟赦宥者自今法寺勿以赦原宗正卿趙安仁請以知制誥劉筠夏竦並為宗正寺修玉牒官從之名新譜曰仙源積慶圖夏四月司天監言周伯星再見建皇親禮會院於新昌坊賜名嘉慶殿中侍御史張廓言羣官有丁父母憂者多免持服非古道也伏望自今並依禮令解官行服詔從之詔奬夀春郡王友張士遜等以王讀孝經徹章故也王初為詩即自成章有人心懷禮義之句上喜以語輔臣秋七月飛蝗過京城先是上出死蝗以示大臣翌日執政有袖死蝗以進者請示於朝率百官賀王旦曰蝗出為灾灾弭幸也又何賀焉固稱弗可於是二府方奏事飛蝗蔽天上顧謂旦曰使百官方賀而蝗若此豈不為天下笑耶吕中曰災異非所以愛君也而董仲舒以為天心之仁愛蓋君之所以自愛實災異警之力也當羣臣爭獻符瑞之時而徐兖之水江淮之旱內城之火京師之蝗間見層出非人臣不知愛君而天愛君乎乙卯分命內臣與轉運使諸州通判職官按視蝗傷苗稼以聞仍悉除其租八月令江淮發運司歲留上供米五十萬以備飢年賑濟樞密使同平章事陳堯叟罷為右僕射堯叟強力明辨多任智數久典機密軍馬之籍悉能周記云癸未以京師愆雨遣使分禱宫觀寺院九月兵部尚書參知政事丁謂罷為平江節度使丙午以陳彭年王曾張知白並參知政事任中正為樞密副使曾知白彭年與王旦同在中書嘗乘間謂旦曰曾等被擢至此公力也願有所裨補旦曰願聞之曾曰每見奏事其間亦有不經上覽公但批旨行下恐人言之以為不可旦遜謝而已一日奏對旦退曾等俱留上愕曰何事不與王旦同白曾等乃以前說聞于上上曰王旦事朕多歷年所朕察之無毫髮私自東封後朕諭小事一面專行卿等當謹奉之退而謝於旦曰上之委遇非曾等所知也旦曰向蒙諭及不可自言先得上旨今後更賴諸公相益丁未曹瑋言宗哥唃厮囉蕃部等率三萬餘入冦至伏羌寨三都谷即領兵擊敗之先是翰林學士李迪召對龍圖閣命草詔書徐謂迪曰曹瑋在秦州屢請益兵未及遣遽辭州事邊將誰可代瑋者對曰瑋知唃厮囉欲入冦頗窺關中故請益兵為備非怯也且瑋有謀諸將皆非其比陛下重發兵豈非將上玉皇聖號惡兵出宜秋門邪今關右兵多可會其羡益發赴瑋因問關右幾何對曰臣向在陜西以方寸小冊書兵糧數備調發今猶置佩囊中上令自探取目內侍取紙筆具疏某處當留兵若干餘悉赴寨下上顧曰真所謂頗牧在禁中未幾唃厮囉果犯邊秦州方出兵復召問曰瑋戰克乎對曰必克及瑋捷書至上謂迪曰卿何料之審也迪曰唃厮囉大舉入冦使諜者聲言以某日下秦州會食以激怒瑋瑋勒兵不動坐待其至是則以逸待勞臣用此知其決勝也大事記曰唃厮囉李繼遷均之為西蕃首領也惟朝廷與繼遷以國姓則繼遷驕與厮囉以官則厮囉叛蓋無駕馭之道而徒施羈縻之術所以長其驕而速其叛也若曹瑋者可謂良將矣能知厮囉之必叛䇿德明之可圖料元昊之必反此其智豈徒決兵家之勝負而已哉庚戌以不雨罷重陽宴令諸路轉運使督民焚捕蝗蝻無使滋育是歲六月京畿京東西河北路蝗蝻繼生食民田殆盡延至江淮南趨河東及霜寒始盡飛蝗之過京城也上方御膳左右以告上起臨軒仰視則蝗勢連雲障日乃命撤膳自是聖體遂不康冬十月上謂王旦等曰茶鹽之利要使國用贍足民心和恱卿等宜熟思之詔差翰林學士李迪權御史中丞凌䇿知雜御史吕夷簡與三司同共定奪務要茶園鹽亭户不至辛苦客旅便於興販十二月河西節度使知許州石普上言九月下旬日食又言唃厮囉欲隂報曹瑋請以臣嘗所獻陳圖付瑋可使瑋必勝先是上方崇符瑞而普請罷天下醮設歲可省緡錢七十餘萬以贍國用遂忤上意於是上益怪普言踰分王欽若因言普欲以邊事動朝廷上怒命吕夷簡置院推鞫獄具集官參驗九月下旬日不食詔除名配賀州普倜儻有膽略兩平蜀盜大小數十百戰衆伏其勇也以知秦州曹瑋為秦州都部署以李及知秦州時瑋數上章求解州事問王旦誰當代瑋者旦薦及可任衆議皆謂及非守邊才及至秦州州之將吏心亦輕之會有屯駐禁軍白晝掣婦人銀叉於市中及方坐觀書亟命斬之復觀書如故不日聲譽達京師億聞之復見旦具道其事旦笑曰禁軍戍邊白晝為盜固當斬也烏足為異政乎旦之用及者但以及重厚必能謹守瑋之規模而已丁巳天禧元年春正月辛亥奉天書合祭天地以太祖太宗並配羣臣上尊號册寶于大安殿知建昌軍王耿上書言時政要務凡七事一曰省灾異二曰廣言路三曰明享祀四曰正服用五曰察黨與六曰謹修養七曰嚴邊備上覽而嘉之二月詔别置諫官御史各六貟增其月俸不兼他職每月須一貟奏事或有急務聽非時入對辛巳發常平倉粟置場十四出糶以濟貧民京市物貴故也召直龍圖閣馮元講易于宣和門之北閣待制查道李虛已李行簡預焉自是聽政之暇率以為常因數訪大臣能否而行簡無所怨眤必盡稱道其長人推其長者上謂宰臣曰朕以去歲蝗旱秋稼不稔夙夜驚懼未嘗暫忘今已中春時雨未降齊心請禱誠感莫達實慮政令有爽天意因思茶鹽條禁傷於峻刻宜有以革之茶法行之已久儻或難於遽改但削其尤不便民而傷於厚斂者可也嘗有日者上書言宫禁事坐誅籍其家得朝士所與往還占問吉凶簡尺上怒欲盡付御史按罪王旦具請以歸翌日白上此人之常情且語不及朝廷不足究治因自取舊所占問者進曰臣幼賤時不免為此必以為罪願并臣下獄上曰此事已發何可免旦曰臣為宰相執國法豈可自為之幸於不發而以罪他人上意解旦至中書悉焚所得書既而大臣有欲因是以擠已所不快者力請究治上令就旦取書旦曰臣已焚之矣由是獲免者衆參知政事陳彭年卒上聞之即幸其第涕泗良久彭年性敏給強記尤好儀制沿革刑名之學素奸諂時號九尾野狐始仕未達求為大理寺詳斷官張齊賢時實當國一見輒不可曰此人在朝必亂國政或疑齊賢過甚後乃服其知人三月江南提點刑獄范應辰上言伏覩辛亥制書常赦不原者咸除之姦凶之輩密料赦期發其夙憾恣彼忿心或舉家而隕命或罄室而虜財或持刃殺人或縱火焚舍逢此霈恩亦除其罪悉又配為卒伍皆給衣糧又何異賞人為盜者耶夏四月出聖祖神化金寶牌分給京城寺觀及天下名山查道表求外任甲申命知虢州時虢州蝗灾道不候報出官廩粟設糜粥振救飢者發州麥四千斛給種民賴以濟所全活萬餘人乙酉著作郎劉煜為右正言上曰諫官御史之任實難其人當須識朝廷大體達政刑要道言必詣理乃為稱職耳吕源增釋曰天禧之前羣官百執事皆得言事不專主於臺諫之臣也真宗既因浮議創建言官於是首擢劉煜次用魯宗道奏疏並令親書許通進司進入時煜與宗道多以瑣細之事塞責真皇嘗有不恱之辭自是而後朋黨興矣五月以殿中丞劉平為監察御史用新詔也太保平章事王旦素羸多疾連拜章求解戊申制為太傅兼侍中六月右正言魯宗道言今舉天下親民之官為陛下孜孜於民政者十不一二焉欲民之安其可得乎宜妙選英哲以委之庶激濁揚清漸得良牧賢宰則斯民之大幸上曰謹擇牧宰朝政之急務也甲申以武昌節度副使邊肅知光州用辛亥赦書也向敏中嘗謂王旦曰邊同年責已久牽復可乎旦曰為近臣坐贓豈得更升進耶敏中語數及之旦曰若欲用之須旦死可也秋七月王旦以病堅求罷相上憫然曰朕覺體中不佳方欲以大事託卿而卿疾如此奈何因命皇子出拜旦言皇子盛德必任陛下事遂薦可為大臣者十餘人其後不踐兩府者獨凌䇿李及丁巳以旦為太尉仍領玉清昭應宫使八月以樞密使同平章事王欽若為左僕射平章事先是上欲相欽若王旦曰祖宗朝未嘗使南方人當國雖古稱立賢無方然必賢士乃可上遂止欽若嘗語人曰為王子明故使我作相晚却十年講義曰康節在天津橋上聞杜鵑聲曰朝廷將用南人為相天下自此多事矣南人當國自欽若始不待王荆公而後見也然國初三陽方長則南不足以勝北熙寧一隂潜萌則北不足以勝南此風氣推移人才消長之候也壬申中書侍郎兼吏部尚書平章事向敏中加右僕射門下侍郎九月給事中參知政事王曾罷為禮部侍郎初曾以會靈觀使讓欽若上意不懌及欽若為相因欲排異己者數譖之遂罷曾政事王旦語其家人曰王君介然他日德望勳業甚大昨讓㑹靈觀使頗拂上旨而進對詳雅詞直氣和了無所懾且王君始被進用已能若是我自循任政事幾二十年每進對上意稍忤即䠞蹜不能自容以是知其偉度矣李迪為給事中參知政事迪嘗獨對內東門時仍歲旱蝗上憂不給迪曰祖宗初置內藏庫欲辦兵復西北故土及以支凶荒上曰當出金帛數百萬借三司迪曰天子於財無內外何必曰借上恱迪又言陛下東封時敕所過無伐木除道即驛舍或州治為行宫才令加塗塈而已及幸汾亳土木之役過往時百倍今旱蝗之灾殆天意所以警陛下也上曰卿之言然一二臣誤朕為此己酉王旦卒遺表言忝為宰相據上公之列不可以將盡之言為宗親求官旦性沖淡寡欲奉身至薄所居甚陋上欲為治之旦以先人舊廬懇辭而止中外莫不欽其德風為國宗臣咸平初旦聞李沆之言固未深信及親見王欽若丁謂等所為欲諫則業已同之欲去則上遇之厚乃歎曰李文靖真聖人祥符以來每有大禮輒奉天書以行常悒悒不樂既寢疾遺令削髮披緇以斂蓋悔其前之為也議者謂旦逄時得君言聽諫從安於勢位而不能以正自終或比之馮道云吕中曰嘗究觀國朝自天禧以前一䕫一契之謡未興也大范小范之名未出也四賢一不肖之詩未作也君子小人之黨未分也而張詠孔道輔馮知節之徒自足以養成天下之氣節胡海陵之學未興也穆尹之古文未出也三蘇父子之文章未盛也二程兄弟之學業未著也而楊億王元之之文自足以潤色國家之制度蓋自李文靖王文正當國抑浮華而尚質實奬恬退而黜奔競是以同列有向敏中之清謹政府有王曾之重厚臺諫有魯宗道之質直相與養成渾厚朴實之風以為天聖景祐不盡之用雖搢紳之議論臺諫之風采道學之術科舉之文非若慶厯以來炳炳可觀而紀綱法度皆整然不紊兵不驕財不匱官不冗士不浮雖慶厯之盛亦有所不及也以聖製思政論正說賜近臣十二月丙子以寒甚放朝知制誥盛度等言奉詔蠲放逋缺凡九百四十三萬所釋萬五千五百人庚辰遣使減價鬻炭十萬稱戊午天禧二年春正月庚子芝草生真遊殿及皇后所居崇徽殿詔諸路災傷州軍並設粥賤糶官粟以惠貧民二月以升州為江寧府置軍曰建康命夀春郡王為節度使加太保封升王右正言劉煜請自今言事許升殿面對從之壬午對右正言劉煜魯宗道于承明殿凡八刻三月甲寅右正言魯宗道言大辟罪如婺州訛言者望自今精加按覆內出其狀示輔臣向敏中等曰向來四方大辟奏牘陛下未嘗不召臣等審議然後寬貸決罰好生之德蓋超越於前古矣上曰自今當詳議者更加審細貴無濫也宗道風聞多所論列上意頗厭其數宗道因對自訟陛下所以任臣者豈欲徒事納諫之虛名邪臣切愧尸祿請得罷斥上慰諭良久他日念之因題殿壁曰魯直夏閏四月知并州薛映言民飢設糜粥濟之計三十餘萬人皇城司言保聖營之西南營卒有見龜蛇者因就建真武祠今泉涌祠側疫癘者飲之多愈甲寅詔即其地建道觀以祥源為名任布言明朝不宜以神怪衒愚俗不報六月辛亥有彗出北斗魁第二星東北秋七月壬申以星文示變赦天下甲戌以李士衡為三司使上作寬財利論賜士衡士衡因請刻聖製於本􅈦從之士衡方進用王欽若害之會上論時文之弊欽若因言路振文人也然不識體士衡父誅死而振為贈告乃曰世有顯人士衡以故不大用八月甲辰立升王受益為皇太子改名禎大赦天下癸丑上作元良針賜皇太子九月御正陽門觀酺上作稼穡倍登詩欹器戒酒二論示輔臣冬十月乙未雪上作瑞雪詩賜輔臣李垂請令江浙放行茶貨左諫議大夫孫奭言茶法屢改非示信之道即詔奭與三司詳定務從寬簡未幾奭出知河陽事遂止初自密州還時方置天慶等節天下設齊醮張燕費廣奭又請裁省浮用不報奭復出其居朝廷蓋不周歲云十一月上作冬至宴親賢詩示宰相癸未上作後苑宴宗親詩賜皇太子通王十二月參知政事張知白與宰相王欽若議論多相失因稱疾辭位丙午罷為刑部侍郎知天雄軍己未天禧三年春正月丁卯翰林學士錢惟演等四人權同知貢舉乙亥舉人郭縝冒緦喪赴舉為同輩所訟付御史臺劾問殿三舉同保人並殿一舉二月上作學書歌賜皇太子丙辰又作勸學吟賜之三月上親試禮部奏名貢舉人得進士王整以下六十三人賜及第八十六人同出身又賜學究出身者一十三人諸科及第者百二人同出身者四十七人試將作監主簿者五人冦準鎮永興軍朱能為巡檢是月準奏天書降乾佑山中蓋能所為也中外咸識其詐上獨不疑夏四月辛卯迎導天書入內魯宗道上疏曰天道福善禍淫不言示化又何有書哉臣恐姦臣肆其誕妄以惑聖聽也知河陽孫奭上疏天且無言安得有書天下皆知朱能所為獨陛下一人不知爾乞斬朱能以謝天下上雖不聽然亦不罪奭也己亥召判永興軍府冦準赴闕講義曰冦忠愍之入相凡三忘身狥國守道嫉邪見於同列之稱薦者然也官居鼎鼐宅無樓臺播於處士之歌詠者然也堂吏之進例簿則叱之門生之獻三䇿則謝之甚至澶淵之役不沮不屈親扶日轂屹然如山百萬貔貅折箠笞之使三十餘年邊無牧馬公之勳烈何如哉五月冦準自永興來朝將發其門生有勸準者曰公若至河陽稱疾堅求外補此為上䇿儻入見即發乾祐天書詐妄之事斯為次也最下則再入中書為宰相爾準不懌揖而起君子謂準之卒及于禍蓋自取之也六月甲午王欽若罷時欽若恩遇寖衰人有言其受金者會商州捕得道士譙文易蓄禁書自言嘗出入欽若家遂罷相尋命判杭州丁酉以李允則知鎮州允則在雄州十四年治城壘不輟詔詰之允則奏曰初通好不即修治它日頽圯復安敢動因此廢守備臣恐敵性不可測也帝以為然嘗燕軍中而甲仗庫火允則作樂行酒不輟副使請救不答少頃火息命悉瘞所焚物密遣使持檄瀛州以茗籠運器甲不浹旬兵數已完人無知者樞密院請劾不救火上曰允則必有謂姑詰之對曰兵械所藏警火甚嚴方燕而燔必姦人所為舍燕救燔事或不測一日民有訴為被人毆傷而遁者允則不治與傷者錢二千衆以為怯逾月幽州以其事來詰答以無有蓋他諜欲以毆人為質驗比得報以為妄乃殺諜戊戌以冦準為中書侍郎兼吏部尚書平章事保信軍節度使丁謂為吏部尚書參知政事謂在中書事準謹甚嘗㑹食羔汚準鬚謂起徐拂之準笑曰參政國之大臣乃為官長拂鬚邪謂甚愧之由是傾誣始萌矣大事記曰王欽若罷則冦準用此君子小人不可兩立也以冦準為相而丁謂參政此又君子小人不可共政也然準當是時不可出矣方其始召也門生有勸準者曰若至河陽堅求補外此為上䇿儻入見即發乾祐天書之詐次也最下則再入中書其為準謀則善而準不悟何邪龜鑑曰且朋黨之禍其萌於丁冦並命之時乎薰蕕不可同器鸞隼不可並棲從古然也何當時之不察及此會食却堂拂鬚有責初無他意丁謂不堪而銜之結釁其兆於此矣澶淵之還大勳未報欽若念釁鼓之隙而忍肆投瓊之譖利用懷議事之憤而公為下石之謀錢惟演馮拯之徒翕於前劉承珏陳彭年之流推於後彼譖人者投畀豺虎可也營營青蠅止于樊豈弟君子何為一信讒言哉一出而守北門之鑰再出而陟雷陽之坡公之迹危矣噫公之忠節義槩能折百萬之兵而不能折衆口之讒能起敵人之問而不能起邪人之敬能感公安之竹而不能感當時流俗之心然於真宗則何憾焉嘗因是而窺帝之本心史述澶淵歸上所待準者甚厚曰甚厚云者蓋未嘗以薄待準也史謂上既從惟演言擢丁謂利用平章事而所以待準者如故曰如故者是待準之心無以異於前日也有以深責冦準為言者上則曰自太傅以上更加優禮有以且令準出外為請者上則曰有何名目至於末年國史直筆以書之曰冦準罷相繼以三絀皆非上本意歲餘上忽問之曰吾目中久不見冦準何也吁真宗之心於是乎白矣巧言如簧熒惑聖聽謂之罪其可勝誅壯哉李迪奮身而憤曰迪起布衣而立宰相有以報國死且不恨安能附權臣為自安計直對上前歷數謂姦謂於是罷知河南矣有言自裏厥應如響不踰月而復相焉他時流落至死王曾聞之曰此人智數不可測若不死未必不復用天下之不幸可勝道哉死一謂則為天下福生一謂則為天下禍姦人可畏如是可不謹哉秋七月羣臣表上尊號曰體元御極感天尊道應真寶運文德武功上聖欽明仁孝不允凡五上從之八月丁亥以天書再降于乾祐縣大赦天下彰德軍留後馬知節卒知節習兵事以方略自任頗涉文藝所與遊接必一時名士性剛直敢言無避未嘗少自卑屈求之武人蓋鮮儷云己亥大㑹道釋于天安殿凡萬三千八十六人先是建道場是日上親臨視以藥銀鑄大錢面賜之九月賜皇太子元良述六藝針承華要略十卷授時要略十二卷又以國史兩朝實録太宗文集并御集御覽羣書賜皇太子遂宴從官冬十月知審刑院盛度言在京及諸路止有斷案三道值降聖節不奏自餘絶無刑牘請宣付史館冦準曰聖朝刑訟清靜過古昔此陛下以德化民精意欽恤所致十一月享太廟辛未合祭天地于南郊十二月知樞密院事曹利用參知政事丁謂並為樞密使庚申天禧四年春正月以華州觀察使曹瑋為宣徽北院使鎮國軍留後簽署樞密院事簽署兼領藩鎮自瑋始也二月滑州言河塞詔奬之是役用兵夫九萬人上親製文刻碑以紀其成功三月左僕射兼中書侍郎平章事向敏中卒敏中端厚愷悌多智善處煩劇識大體密靜逺權門無私謁諸子不令釐務雖當大事若已不預焉謹於采拔不妄推薦時以重德目之夏四月命工部侍郎楊億為翰林學士億自汝州代還久之不遷或問王旦曰楊大年何不且與舊職旦曰大年頃以輕去上左右人言可畏賴上終始保全之今此職欲出自清衷以全君臣之契也踰六年乃復入禁署六月以右僕射兼中書侍郎平章事冦準為太子太傅萊國公先是準為樞密使曹利用副之準素輕利用議事有不合者準輒曰君武夫耳豈解此國家大體邪利用丁謂遂合謀欲排準翰林學士錢惟演見謂權盛附離之時上不豫政事多中宫所決謂等交通詭祕其黨日固劉氏宗人橫于蜀上以皇后故欲舍其罪準必請行法重失皇后意謂等因媒孽之準嘗獨請間曰皇太子人望所屬願陛下傳以神器丁謂佞人也不可以輔少主上然之準乃屬楊億草表請太子監國億夜屏左右為之辭至自起剪燭跋中外無知者既而準被酒漏所謀謂等益懼力譛準請罷政事上不記與準初有成言諾其請秋七月丁巳太白晝見甲子大雨流潦泛溢公私廬舍大半有壓死者丙寅以李迪為吏部侍郎馮拯為樞密使吏部尚書同平章事上欲加拯吏部尚書參知政事召學士楊億使草制億曰此舍人職也若除樞密使同平章事則制書乃學士所當草也上曰即以此命拯拯既受命樞密領使者凡三人前此未有上徐覺其誤遂召錢惟演惟演入對曰馮拯故參知政事今拜樞密使當矣但中書不應止用李迪一人盍遷曹利用或丁謂過中書庚午以丁謂平章事曹利用加同平章事上既從惟演之言擢丁謂首相曹利用同平章事然所以待冦準者猶如故謂等懼謀益深楊崇勳等遂告變周懷政伏誅準乃逺貶上始得疾寖劇嘗卧枕懷政股與謀欲命太子監國懷政出告冦準準遂請間建議已而事泄準罷相丁謂等因疏斥懷政懷政謀殺謂等復相準奉帝為太上皇傳位太子而廢皇后召楊崇勳等議其事崇勳詣謂第告變謂過曹利用計之及明利用入奏詔曹瑋與崇勳鞫訊具引伏斬之謂等并發朱能所獻天書妖妄事亟遣盧守明鄧文慶馳驛詣永興軍捕能懷政既誅有欲并責太子者上意惑之李迪從容奏曰陛下有幾子乃為此計上大寤由是東宫得不動搖丁丑冦準降授太常卿知相州朝士與準親厚者丁謂必斥之楊億尤善準而請太子監國奏又億所草也及準敗丁謂召億至中書億懼面無人色謂素重億徐曰謂當改官煩公為一好詞耳億乃稍安八月徙知相州太常卿冦準知安州於是謂等不欲準居內郡白上欲逺徙之上命與小州謂退而署紙尾曰奉聖旨除逺小處知州迪曰向者聖旨無逺字二人忿爭蓋自此始朱能自度不免殺盧守明挈家叛逸既而衆潰勢窮蹙入桑林自縊死乙酉以樞密副使任中正禮部侍郎王曾並參知政事翰林學士錢惟演為樞密副使壬寅知安州冦準坐朱能再貶道州司馬準過零陵溪洞蠻夷乘間抄掠其酋長聞而責之曰奈何奪賢宰相行李邪趣遣人還所掠其在道州晨具朝服如常時起樓置經史道釋書暇則誦讀賔至笑語若初無廊廟之貴者自準罷相繼以三絀皆非上本意歲餘上忽問左右曰吾目中久不見冦準何也左右亦莫敢對上崩乃貶雷州吕中曰至是李文靖之言驗矣當君子用事之時則常有不盡絶小人之心至小人得志之時則其去君子必盡其力而後止此準之所以重得貶也然準雖可貶而準之心則不為之少貶劉煜為工部貟外郎兼侍御史知雜事初河決滑州大興力役道殍相望煜請䇿免宰相以答天變時冦準丁謂實在中書及王曙坐準貶官在朝無敢往見者煜敬曰友朋之義獨不行於今日歟往餞之經夕而還謂亦不罪也九月以知制誥吕夷簡為龍圖閣直學士權知開封府夷簡治開封嚴辦有聲上識其姓名于屏風意將大用之也冬十月以太子太保王欽若為資政殿大學士仍令日赴資善堂侍皇太子講讀十一月自冦準貶斥丁謂寖擅權至除吏不以聞李迪語同列曰迪起布衣十餘年位宰相有以報國死且不恨安能附權臣為自安計乎丙寅晨朝待漏謂又欲以林特為樞密副使迪因詬謂引手板欲擊謂謂走得免遂入對于長春殿迪因斥謂奸邪弄權臣願與同下憲司置對又曰冦準無罪罷斥朱能不當顯戮又錢惟演亦謂之姻家臣願與謂惟演俱罷政柄又曰曹利用馮拯亦相朋黨上怒甚初欲付御史臺利用拯曰大臣下獄不惟深駭物聽況丁謂本無紛競之意而與李迪置對亦未合事宜乃命各降秩罷相謂知河南府迪知鄆州制書猶未出己巳謂入對願復留遂賜坐左右欲設墩謂顧曰有旨復平章事乃更以杌進詔送謂中書令依舊視事仍詔迪出知鄆州即時赴任時謂始傳詔召劉筠草復相制筠不奉詔乃更召晏殊筠既自院出遇殊殊側面而過不敢揖蓋內有所愧也先是上久不豫語言或錯亂嘗甚怒語輔臣曰昨夜皇后以下皆去劉氏獨留朕於宫中迪進曰果如是何不以法治之良久上寤曰無是事也后適在屏間聞之由是惡迪迪所以不得留非但謂等媒孽亦中宫意爾庚午詔自今該取旨公事仍舊進呈外其常程事務委皇太子與宰臣樞密使已下就資善堂㑹議施行訖奏初議欲令太子總軍國事丁謂以為不可曰即日上體平朝廷何以處此李迪曰太子監國非古制耶力爭不已迪既罷出故有是詔十二月丁丑朔起復翰林學士楊億卒億重交遊耿介坦懷敦尚名節然評品人物善惡太明留心釋氏禪觀之學自屬疾即屏葷茹臨終日為空門偈頌識者稱其達觀云丁酉以王欽若為山南東道節度使同平章事判河南府上久不豫乙亥力疾御承明殿召輔臣諭以盡心輔導儲二之意出手書一幅付之丁謂等進曰元儲已親庶政克固海內之心宫門內助事皆平允特寬聖慮以寧祉福自是聖體漸平凡浹旬乃復常焉時太子雖聽事資善堂然事皆決於后錢惟演后戚也王曾說惟演曰太子幼非中宮不能立中宫非倚皇儲之重則人心亦不附后厚於太子則太子安太子安乃所以安劉氏也惟演因以白后兩宮由是益親人遂無間講義曰當時亦危疑之衝錢惟演用事於中丁謂擅權於外而馮拯曹利用亦相與為黨所幸君子之朋黨植猶多也冦準李迪之徒雖爭之不勝而所恃以砥柱其中者猶有人焉卒之竄丁謂而相仁祖太平之治者王曾也辛酉天禧五年春正月翰林學士劉筠見上久疾丁謂寖擅權歎曰姦人用事安可一日居此表求外任乃授右諫議大夫知廬州二月庚午以孔聖佑襲封文宣公知仙源縣事三月戊戌天章閣成羣臣稱賀庚子奉安御集御書于天章閣秋七月甲戌朔日有食之先是司天測儀天厯當食之既前九日上避正殿分命中使詣宫觀寺院祈禱是日食四分而止冬十一月丁丑以謂為譯經使兼潤文甲申判河南府王欽若有疾纍表請就醫京師丁謂使人紿欽若曰上甚思一見君欽若信之即輿疾而歸謂因言欽若擅去官守無人臣禮戊子責授司農卿分司南京十二月乙巳以內殿崇班皇甫繼明同勾管三館祕閣公事咸平中初命劉崇超監三館祕閣圖籍丁謂更號曰勾當公事自是內臣遂與大學士同職時論愈非之壬戌乾興元年春二月戊午上崩于延慶殿仁宗即皇帝位遺詔尊皇后為皇太后淑妃楊氏為皇太妃軍國事兼權取皇太后處分丁謂欲去權字王曾曰政出房闥斯已國家否運稱權尚足示後且言猶在耳何可改也謂乃止曾又言尊禮淑妃太遽須他日議之不必載遺制中謂怫然曰參政欲擅改制書耶曽復與辨而同列無助曽者曽亦止時中外洶洶曾正色獨立朝廷賴以為重己未大赦除常赦所不原者庚申命丁謂為山陵使先是輔臣請皇太后所御殿王曽援東漢故事請五日一御承明殿太后坐左皇帝坐右垂簾聽政既得旨而丁謂獨欲皇帝朔望見羣臣大事則太后與帝召對輔臣決之非大事悉令雷允恭傳奏畫可曽曰兩宮異處而柄歸宦者禍端兆矣謂不聽蓋謂不欲令同列預聞機密故潜結允恭使白太后卒行其意丙寅丁謂加司徒馮拯加司空曹利用加左僕射並兼侍中任中正加兵部尚書王曽加禮部尚書錢惟演加兵部尚書張士遜加户部侍郎王曾謂丁謂曰自中書令至諌大夫平章事其任一也樞密珥貂可耳今以數十年曠位之官一旦除授得無違公議乎謂不聽戊辰貶冦準為雷州司户李迪為衛州團練始議竄逐王曽疑責太重丁謂熟視曾曰居停主人恐亦未免爾蓋指曾嘗以第舍假準曾踧然懼遂不復爭謂惡準迪必欲致之死地遣中使齎敕就賜以錦囊貯劒揭於馬前至道州準方與客宴起逆中使中使避不見問其所以來之故不答衆惶恐不知所為準神色自若使人謂之曰朝廷若賜準死願見敕書中使不得已乃授以敕準即從録事參軍借緑衫著之拜敕于庭升階復宴至暮乃罷及赴貶所吏獻以圖經首載州東南門至海岸十里準恍然曰吾少時嘗為詩曰到海只十里過山應萬重人生得喪豈偶然耶中使至鄆州迪聞其異於他日即自裁不殊其子東之救之乃免或饋之食棄而不與迪客鄧餘怒曰汝殺我公我必殺汝從迪至衛州不離左右迪由是得全或語謂曰迪若貶死公如士論何謂曰異日好事書生弄筆墨不過曰天下惜之而已曹瑋責知萊州瑋得詔即日上道弱卒十人不以弓韔矢箙自隨謂卒不能加害三月壬申以給事中李及知杭州及性清介所治簡嚴一日冒雪出郊衆謂當置酒召客乃獨造林逋清談至暮而歸居官數年未嘗市吳物比去惟市白樂天集龍圖閣直學士魯宗道權判流內銓宗道在選調久患銓格煩密及知吏所以為姦狀於是多釐改之又悉書條科揭於廡下以便選人戊寅中書請自禫祭後隻日於崇政殿或承明殿視事雙日如先帝故事前後殿皆不坐詔雙日雖不視事亦當宣召近臣入侍講讀乙酉作受命寶其文曰恭膺天命之寶命王曾書之夏四月真宗時選人充身言書判者第推恩上即位亦用前法於是前懷安軍判官宋若谷等六十五人咸遷官改京秩者六人最下者猶注近地成資闕後率以為常六月己亥朔翰林學士承旨李維上大行皇帝諡曰文明章聖元孝廟號真宗入內押班雷允恭與張景宗同管勾山陵一行事判司天監邢中和謂允恭言今山陵上百步法宜子孫恐下有石若水耳允恭曰第移就上穴我入見太后言之允恭方貴橫衆莫敢違即改穿上穴既而上穴果有石石盡水出允恭坐擅移皇堂并盜庫金銀錦帛珠玉杖死于鞏縣初丁謂與雷允恭協比專恣內挾太后同列無如之何允恭既下獄王曾欲因山陵事并去謂一日語同列曰曾無子將以弟之子為後明日朝退當留白此謂不疑曾有異志也曾獨對具言謂包藏禍心故令允恭擅移皇堂於絶地太后始大驚謂徐聞之力自辨於簾前未退內侍忽捲簾曰相公誰與語駕起久矣謂皇恐以笏叩頭而出太后怒甚欲誅謂馮拯進曰謂固有罪然帝新即位亟誅大臣駭天下耳目太后少解乃責謂為太子少保分司西京故事宰相罷免皆降制時亟欲行止召當直舍人草詞仍榜朝堂謂所坐但私庇允恭不忍破其妄作未必真有禍心也然天資險狡多隂謀得専政久要不可測雖曾以計傾之而公論不以為過也吕中曰逺小人之法不可以不嚴而去小人之幾不可以不密故來鄭朋楊興之奸者陳蕃失於不密遂激為朋黨之變唐甘露白馬之禍李訓鄭注皆蹈幾事不密之戒也丁謂之奸真宗晚年欲去之矣冦準被酒漏言失於不密反有崖州之行坐是謂之烽熖愈熾內倚宦者雷允恭貴戚錢惟演為奸外與曹利用林特等為黨若拔山矣而曾一旦去之易其幾密也故雖以計傾之而當時公論亦不以為過焉秋七月辛未王曾加中書侍郎平章事吕夷簡為給事中魯宗道為右諫議大夫並參知政事宗道為人剛正嫉惡少容遇事敢言不為小謹嘗微行就飲肆中偶真宗亟召使者及門宗道自酒肆來使者曰即上怪公來遲何以為對宗道曰第以實對使者曰然則公當得罪曰飲酒人之常情欺君臣子之大罪也真宗果問使者具以宗道所言對帝詰之宗道謝曰有故人自鄉里來臣家貧無杯酌故就酒家飲帝以為忠實可大用嘗以語太后太后識之於是并夷簡皆首蒙擢任丙子錢惟演為樞密使惟演舊佐王曾王曾既入相亦正惟演使名故事樞密使必加檢校官惟演但以兵部尚書充使有司失之也戊寅詔真宗陵名曰永定始丁謂請名陵曰鎮及謂貶馬拯謂三陵皆有永字故易曰永定然永定乃縣名也宣祖陵止名安陵又不知翼祖已名定陵於是復追改翼祖陵為靖陵議者譏拯不學當時無正之者先是女道士劉德妙常以巫師出入丁謂家謂嘗教言乃所為不過巫事不若託老君言禍福足以動人辛卯再貶謂崖州司户參軍諸子並勒停又坐與劉德妙奸除名配隸復州仍以謂罪狀布告中外始謂命宋綬草冦準責詞綬請其故謂曰春秋無將漢法不道皆證事也綬雖從謂指然卒改易謂本語不純用及謂貶綬猶當制即草詞曰無將之戒舊典甚明不道之辜常刑罔赦朝論快焉謂初逐準京師為之語曰欲得天下寧當拔眼中釘欲得天下好莫如召冦老不半歲謂亦貶人皆謂報復之速天道安可誣也謂竄崖州道出雷州準遣人以一蒸羊逆之境上謂欲見準準拒絶之聞家僮謀欲報仇亟杜門使縱博俟謂行逺乃罷壬辰詔中外臣寮有曾與丁謂往來者一切不問八月乙巳上與皇太后御承明殿垂簾決事始用王曾議也宰相率百官稱賀太后哀慟久之令內侍宣諭曰候上春秋長即當還政馮拯繼丁謂為首相頗欲躡謂故迹王曾獨曉以禍福且逆折之拯不敢肆自是事一決於兩宮初謂定太后稱豫謂敗中書與禮儀院參議每下制令稱豫而便殿處分事稱吾太后詔旨稱吾九月詔伎術官自今不得如京朝官用考課遷陟冬十一月朔樞密使錢惟演罷為保大節度使知河陽以李沆王旦李繼隆配享真宗廟庭翰林學士劉筠為御史中丞先是三院御史言事皆先白中丞筠舉舊儀令臺屬各舉糾彈之職癸酉命李維晏殊修真宗實録尋復命孫奭宋綬陳堯佐同修仍令內侍諭以一朝大典當謹筆削之意庚辰判國子監孫奭言知兖州日於文宣王廟建立學舍以延生徒自後養學者不減數百人臣雖以俸錢贍之然常不給自臣去郡恐漸廢散伏見楊光輔素有經行望特遷一官令於兖州講書仍給田十頃以為學糧從之諸州給學田蓋始此辛巳始御崇政殿西閣召侍講孫奭馮元講論語侍讀李維晏殊與焉初詔雙日御經筵自是雖隻日亦召侍臣講讀王曾以上新即位宜近師儒故令奭等入侍上在經筵或左右瞻矚或足敲踏床則奭拱立不講每講體貌必莊上亦為竦然改聽壬午以翰林侍讀學士尚書右丞張知白為樞密副使國子監舊制皆用近臣及宿儒典領近歲頗任貴遊子弟之初仕者與管庫資任略均壬辰始命馮元同判國子監仍詔自今毋得差補䕃京朝官十二月甲辰詔輔臣崇政殿西廡觀孫奭講論語既而上親書唐賢詩以分賜焉京城榖價翔貴戊申出常平倉米分十四場賤糶以濟貧民宋史全文卷六
