body:
  text: 宋史全文巻十三上宋哲宗一丙寅元祐元年春正月庚寅朔改元户部言准敕府界諸路耆長壯丁之役欲乞應府界諸路自來有輪差及輪募役人去處並乞依元役法如有合増損事件亦依役法増損條施行從之甲辰監察御史王巖叟奏自冬不雪今涉春矣旱暵為災變異甚大陛下於天下之大害朝中之大姦已悟而復疑將斷而又止也今天下之大害莫如青苗免役之法隂困生民莫如茶塩之法流毒數路朝中之大姦莫如蔡確之隂邪險刻章惇之讒賊狠戾陛下反容而留之此天意之所以未開也集賢校理黄廉為户部郎中廉提舉河東路保甲凡六年雖在團教場未嘗易儒服故比陜西河北獨不賜戰袍元豐它路保甲擁兵入縣鎭賊殺官吏獨河東保甲不為犬吠之盗司馬光閒居往來陜洛間聞河東民言甚美因熟問治狀吕公著亦言河東軍興邊民德廉甚厚故有是除辛亥以時雨稍愆今月二十四日太皇太后躬詣中太一宫集禧觀祈禱朱光庭言蔡確章惇韓縝不恭不忠不耻議論政事之際章惇則明目張膽肆為辯說力行醜詆以害政事蔡確則外示不校中實同欲陽為尊賢隂為助邪韓縝則每當議論亦不扶正唯務拱黙為自安計癸丑太皇太后駕出祈雨丙辰上幸大相國寺祈雨侍御史劉摰言臣累彈奏宰臣蔡確乞行罷免至今未蒙指揮今再論安危所繫之大體伏自聖明臨御之始首起司馬光使之執政光以至誠直道獨行孤立廟堂同列略無誠心助光為善者不惟不助而又有忌耻嫉害之心夫嫉光者乃所以害政利于己也陛下雖有仁惠之政為確等所艱難而不得純被于民下則士大夫雖有忠義之節為確等所脇制而不得自竭于君今光病羸已甚萬一不能支持則陛下之仁政遂不立矣生民之疾苦遂不復蘇矣户部言相度河北塩法所言乞廢罷見行新法復行舊法通商從之司馬光以疾謁告凡十有三旬不能出然奏疏相属移書三省曰今法度所宜最先更張者莫如免役錢光見欲作一文字奏聞若降至三省望諸公同心恊力與贊成朝廷今欲整治天下蘇息疲民先須十八路各得好監司一兩人忠厚曉事憂民忘私使之進賢退不肖興利除害前日所草監司資格及委官薦舉文字願諸公堅執此格始為有益也國家所頼為根本者莫若農民農民者衣食之原國家不可不先存恤也又手書與吕公著曰比日以來物論頗譏晦叔謹嘿太過此際復不廷争事蹉跌則入彼朋矣願勉旃勉旃光自病以來悉以身付醫家事付康惟國事未有所付今日属於晦叔矣二月辛酉詔大名府自經水災民田多渰浸耕種未得人户艱食可委安撫使韓絳詢訪賑濟大事記曰此祖宗以仁立國之意暫息於熈寧而復續於元祐也使元豐紹聖相傳襲中間無元祐數年之澤則靖康之禍豈止如今日之所歎哉乙丑命宰臣蔡確提舉修神宗皇帝實録以鄧温伯陸佃並為修撰官林希曽肇並為檢討官先是司馬光言免役之法其害有五舊日上户充役有所陪備然年滿之後却得休息今則年年出錢錢數多於往日陪備者此其害一也舊日下户元不充役今來一例出錢此其害二也舊日所差皆土著良民今召募四方浮浪之人作公人則曲法受贓主官物則侵欺盗用事發則挈家亡去此其害三也農民所有不過榖帛與力今曰我不用汝力輸我錢我自雇人若遇凶年則不免賣莊田牛具桑柘以求錢納官此其害四也提舉常平倉司惟務多斂役錢廣積寛剩希求進用此其害五也為今之計莫若降勑應免役錢並罷其諸色役錢並依熈寧元年以前舊法定差惟衙前一役最號重難曏有破家産者朝廷為此始議作助役法若猶以為衙前户難以獨任即乞依舊於官戸僧道寺觀單丁女戸有屋業者並令隨貧富分等第出助役錢遇衙前合當重難差遣卽行支給乙丑三省樞宻院同進呈得旨依奏初議役法蔡確言此大事也當與樞宻院共之故三省樞宻院同進呈丙寅劉摰彈奏蔡確章惇章十餘上丁邜詔内外待詔大中大夫以上各舉曽歴一任已上聦明公正所至有名堪充監司者二人若到官之後才識昏愚職業隳廢薦才按罪喜怒任情并舉者加懲責韓維言范鎭往在仁宗朝嘗為諫官率先羣臣首唱大義擇宗室之賢預建儲副以安國本凡上章者十九貽執政書者二獻大合祭賦者一所言忠切至忘其身自此大臣始繼有論奏英宗皇帝遂自藩邸入繼大統先帝追録忠言如文彦博富弼皆身被褒寵賞延其嗣劉沆王堯臣雖已殁猶推恩官其子而恩賞獨不及鎭伏望聖慈察鎭先識首議有勞宗社特降明詔褒顯厥功使天下知朝廷之行信賞雖乆而不廢人臣之抱忠計雖隱而必録足使為善者勸上助風化司馬光以病在告亦移書三省趣同列進呈維疏優與推恩己巳以光禄大夫致仕范鎮為端明殿學士致仕仍以鎮子平西縣令百揆為宣德郎二月辛未劉摰試御史中丞詔起居舎人依舊制不分記言動癸酉監察御史王岩叟為左司諫右司諫蘇轍始供職上言帝王之治必先正風俗風俗旣正中人以下皆自勉以為善風俗一敗中人以上皆自棄而為惡邪正盛衰之源未有不始於此昔眞宗奬用正人孫奭戚綸田錫王禹偁之徒旣以諫諍顯名則忠良之士相繼而起其耄期厭事丁謂乘間將竊國命而風俗已成無與同惡謀未及發旋即流放仁宗仁厚是非之論一付臺諫孔道輔范仲淹歐陽修余靖之流以言事相髙時執政大臣豈皆盡賢然畏忌人言不敢妄作一有不善言者即至隨即屏去故雖人主寛厚而朝廷之間無大過失及先帝嗣位執政大臣變易祖宗法度惟有吕誨范鎭等明言其失二人旣已得罪臺諫有以一言及之者皆紛然逐去由是風俗大敗臣願陛下永惟邪正盛衰之漸始於臺諫修其官則聽其言言有不當隨事行遣使風俗一定忠言日至則太平之治可立而待也甲戌上御邇英閣侍讀韓維言陛下仁孝發於天性每行見昆蟲蝼蟻輙違而過之且勑左右勿踐履此亦仁術也臣願陛下推此心以及百姓則天下幸甚司馬光言復行差役之初州縣不能不小有煩擾伏望朝廷執之堅如金石雖有小小利害未備徐為改更勿以人言輕壞利民良法講義曰仲淹之事所以行之而遽變者以章得象為相而仲淹為參政也司馬光所以能變新法於數月之頃者以光為左僕射而其權重也使天假之年得以盡行其志則豈有後日之禍哉蘇轍言蔡確憸妄刻深韓縝識闇行汙章惇雖有應務之才難以獨任司馬光吕公著雖有憂國之志而才不迨心至若張璪李淸臣安燾皆㪷筲之人願早賜罷免别擇大臣負天下之重望有過人之髙才者代之先是知樞宻院章惇言近奉旨與三省同進呈司馬光乞罷免役行差役事劄子臣曉夕反覆看詳方見其間甚多疎略光初言上户以差役為便以岀免役錢為害至十七日劄子内却言彼免役錢雖於下户困苦而上户優便旬日之間兩入劄子而所言上户利害正相反必是講求未得審實率爾而言以此推之措置變法之方必恐未能盡善惇又常與同列爭曰保甲保馬一日不罷則有一日害如役法熈寧初以雇代差行之太速故有今弊今復以差代雇當詳議熟講庶㡬可行而限止五日其弊將益甚矣御史中丞劉摰言竊慮五日之内倉猝難了乞特與展限作一月右司諫蘇轍言竊見州縣役錢所在例有餘剩猶足支數年欲乞將見在役錢且依舊雇役盡今年而止却於今年之内催督諸處審議差役令的確可行更無弊害始司馬光奏乞復行差役舊法知開封府蔡京即用五日限令兩縣差一千餘人充役亟詣東府白光光喜曰使人人如待制何患法之不行乎議者謂京但希望風旨茍欲媚光非事實也國是論曰司馬光在元祐改免役法蔡京知開封府即日改為差役光乃不疑其異而稱之楊畏改熈豐而從元祐吕大防喜其材蘇軾蘇轍亦不疑其害己而薦之卒之叛元祐者畏與京也安石欲人同己而能惡翻悔之人元祐諸賢鍳安石之失而反用翻悔之軰然則欲人同己之言未可專以責安石也持天下之衡者難矣哉尚書左丞吕公著劄子勘㑹司馬光近建明役法文字大意已善其間不無疎略今章惇所上文字大率出於不平之氣專欲求勝望選差近臣三數人專切詳定聞奏是日詔司馬光建明役法尚慮其間未得盡備宜差韓維吕大防孫永范純仁專切詳定以聞初范純仁自慶州召入聞光議復行差役法純仁曰法固有不便然亦有不可暴革蓋治道唯去太甚者耳又况法度乃有司之事所謂宰相當為天子搜求賢才布列庶位則法度雖有不便於民者亦無所患茍不得人則雖付以良法失先後施行之次亦足以為民病矣光弗聽純仁嘆曰是又一王介甫矣復折簡遺之曰此法但緩行而熟議則事不擾急行而疎略則擾今公寧欲擾民而且將疎略之法使謬吏遽行則其擾民又在公意料之外以愚思之不類公之所舉今純仁畫計不改公之法而止欲先自京西推行使不擾一人而公法可成光亦弗聽也吕中曰世率謂吳蜀之民以雇役為便秦晋之民以差役為便荆公温公不能周知四方風俗故荆公主雇役温公主差役然差雇二役輕重相等利害相半非關於風土然也蓋嘗推原二法之故矣夫差役之法行民雖有供役之勞亦以為有田則有租有租則有役皆吾職當為之事無所憾也其所可革者衙門之重役耳官物䧟失勒之出官綱費用責之供農民之所不堪茍以衙前之役募而不差農民免任則民樂於差之法矣至雇役之法行民雖出役之直而闔門安坐可以為生生之計亦無怨也其可去者寛剩之過敷耳實費之用固所當出額外之需非所當誅茍以寛剩之數㪚而不斂下户免需則樂於雇之説矣因其利而去其害則二法皆可行也然士夫進用於熈寧之時以雇為是進用於元祐之時以差為得公心不立隨聲是非可嘆也善乎史氏之言曰蘇范温公門下士以差役為便章惇荆公門下士以雇役為未盡雖賢否不同各不私所主若蔡京則賢如温公暴如子厚皆足以欺之眞小人耳信哉斯言閏二月己丑朔王巖叟嘗入對極言蔡確隂邪巧佞祖宗遺戒不可用炎人兩漢以來仗節死義立功立事皆中原人上曰為是舊臣巖叟曰孰非舊臣上曰近日頗旱對曰以聖德如此無致災變之理惟是執政間有此人所以致旱上曰待便行庚寅蔡確知陳州從所請也臺諫累有章疏論確朝廷訖不肯正其罪世以為恨云司馬光依前官守尚書左僕射光方以疾再乞宫觀未報而有是命光固辭不許詔已差官詳定役法各遞與限兩月體訪的確利害聞奏先是門下侍郎司馬光言天下錢榖皆總於三司自改官制以來將舊日三司所掌事務㪚在六曹及諸寺監戸部不得總天下財賦不能盡知天下錢榖之數無由量入為出欲乞令尚書兼領左右曹諸州錢榖金帛須具文帳申戸部六曹及寺監欲支用錢物皆須先關戸部符下支撥如此則利權歸一是日詔尚書省立法命宰臣司馬光提舉編修神宗皇帝實録司馬光言天聖中諸路止各有轉運使一貟亦無提㸃刑獄王安石欲力就新法諸路始置提舉常平廣惠農田水利官皆得按察官吏又増轉運副使判官等皆選年少資淺輕俊之士為之詔諸轉運使只置使一貟副使或判官一貟其諸路提舉官並罷提㸃刑獄分兩路者合為一路共差文臣兩貟本路錢榖財用事悉委轉運使刑獄常平兵甲賊盗事悉委提㸃刑獄司管幹丁酉王巖叟入對求治不可太急太急則奸人有以迎意進說又奏乞察賢不賢去留不可緩賢者亦留不賢者亦留賢者耻而不樂為用上曰何如得民一歸厚巖叟曰示以厚則民歸厚示之一則民歸一頋在上者何如耳又奏聖人不以無過為美而以改過為美不以無諫為美而以從諫為美又奏兩宫垂簾杜絶内降太皇太后曰這箇則極是决然不到得不消憂也劉摰言保甲罷團教臣竊有私憂過計者夫鄉野之民其性易於轉習今之保甲衣必華細食必酒肉固已變其向者布麻粗糲之習矣羣衆而笑喧奮臂而矜勇固已移其向者椎魯勞苦之習矣臣愚以為宜有法以斂制之若保甲之技藝強弱髙下州縣皆有等籍今按取優等之人取其情願刺以為本州禁軍自餘中下藝等亦召願充公人者依近制募以為弓手手力耆戸長之役蘇轍言願於元豐庫或内藏庫乞錢三十萬貫上以為先帝收恩於旣往下以為社稷消患於未萌河北之民喜為剽刼近歲創為保甲驅之使離南畆教之使習凶器今雖已罷而弓刀之手不可以復執鋤酒肉之口不可以復茹蔬旣無所歸勢必為盗故臣願乞三十萬貫為招軍例物選文武臣僚有才幹者各一二人分往河北逐路於保甲中招其強勇精悍者為禁軍隨其人才以定軍分劉摰言知樞宻院章惇素無才行近者差役乃是三省樞宻院同共進呈惇果有所見當於是時敷陳講畫今待敕命宣布方始退而横議惇非不知此法之是與非也蓋寧負朝廷而不忍負安石欲存面目以見安石而已甲辰劉摰言臣伏見戸部尚書曽布在熈寧初王安石託以腹心故其政皆出於布之謀其法皆造於布之手臣時為御史曽以此告之于先皇帝曰大臣誤朝廷而大臣所用者誤大臣蓋指布軰也朱光庭奏今日廟堂之上司馬光未出只有吕公著一人忠樸可倚其餘皆奸邪伏望聖慈早進范純仁庶得賢者在位同心一德以輔聖政程頥為校書郎先是王巖叟言西京國子監教授程頥學極聖人之精㣲行全君子之純粹早與其兄顥俱以德名顯於時陛下方欲用顥而顥卒陛下復起頥而用之四方俊义莫不翹首鄉風以觀朝廷所以待之者如何處之者當否臣願陛下加所以待之之禮擇所以處之之方而使髙賢得為陛下盡其用則所得不獨頥一人而已四海潛光隱德之士皆將相招而為朝廷出矣詔英州編管人鄭俠特放逐便仍除落罪名尚書吏部先次注舊官與合入差遣從監察御史孫升左司諫蘇轍所奏也辛亥詔正議大夫知樞宻院事章惇宜解機務可守本官知汝州與放謝其制辭曰鞅鞅非少主之臣硜硜無大臣之節言者旣數劾惇惇居位如故及惇與同列於簾前争論喧悖有它日安能奉陪喫劔之語太皇太后怒其無禮乃黜之王巖叟嘗入對言治天下之道無他事只在合人心而已上曰㑹得巖叟曰旣荷陛下聽納臣等不敢不極盡忠慮惟在陛下乆而不厭常賜收採上曰甚善乙邜同知樞宻院事安燾知樞宻院試吏部尚書兼侍講范純仁同知樞宻院權給事中王巖叟言伏覩畫黄除同知樞宻院安燾知樞宻院試吏部尚書范純仁同知樞宻院者臣謹按燾資材闒茸器識暗昧立朝以來無一長為人所稱燾之不才舊位且非所據况可冠洪樞顓兵柄所有畫黄謹繳連封進其范純仁除命伏乞分為别敕行下巖叟又言臣兩次論駁除安燾竊聞已有指揮門下省更不送給事中書讀令疾速施行臣位可奪也而守官之志不可奪也身可忘也而愛君之心不可忘也陛下旣重改成命必欲施行則願指揮别差官權給事中以全孤臣之守蘇轍言安燾自同知樞宻院除知院度越四人直出其上不知陛下何以取之而遽至此孫覺言安燾材能不為士大夫所稱臣以為巖叟封還稍為舉職劉摰奏燾備位執政以來未聞有一善見稱於人亦不聞有一言少補於國又同孫升奏伏聞除安燾事因給事中兩次封駁特降指揮更不送本官書讀直下吏部施行朝廷命令之出必由門下書讀省審而後行所以審重防察示至公於天下也今陛下除一大臣因其封駁不當遂廢給事中職業不合書讀則是命大臣而以私矣私門一開將何以振肅公道維持紀綱乎丙辰左司諫王巖叟右正言朱光庭進對太皇太后曰知卿等公正朝廷有闕失一一言來但安心言事太皇太后垂簾官家又年小不比神宗時若非臺諫公正忠孝及執政得人一耳目何由得盡天下事卿駁安燾甚當但以頋託不欲盡去又曰神宗時執政若一一進言安得有今日天下許多事又曰知人為難堯舜猶病之又曰民間已蘇息未愛民當如赤子丁巳安燾辭免新命不允敕黄付巖叟書讀巖叟又封還詔應内外見監理市易官錢許以納過息罰錢充折如已納及官本即便與放免并坊場淨利錢亦依此或正身并保人孤貧者權住催理及今日已前積欠免役錢與減放一半餘分限三年隨夏稅帶納殿中侍御史吕陶言君子小人之分辨則王道有成邪正雜處於朝則政體不能純一太皇太后保佑聖嗣安養生民召用一二舊老與之裁正法度緝正紀綱然大臣之異議者則不能盡誠竭力以稱太皇太后之意推原其情蓋有三說一曰先帝之法豈可遽改二曰國家用度至廣非取於民何以足三曰司馬光老且病將不能終其事當熈寧元豐之際小人之黨棊布於天下爭利者爭歛財急功者爭用兵結民怨起邊禍皆非先帝之本意乃大臣無所補報而有以成之三月己未左司諫王巖叟言陛下用范純仁雖驟何故無一人有言蓋賞賢也一進安燾則諫官御史交章論奏蓋非公望所與也今進一非才於極髙之位輕朝廷名器一當論也告命不由門下書讀而行之損朝廷紀綱二當論也庚申劉摰言安燾范純仁告命不由給事中直付所司陛下何故自隳典憲庚申詳定役法所言乞下諸路除衙前外諸色役人只依見用人數定差官戸僧道寺觀單丁女戸出錢助役指揮勿行從之司馬光言伏覩朝廷改科場制度凡取士之道當以德行為先文學為後就文學之中又當以經術為先辭采為後今國家大議科塲之法莫若依先朝成法合明經進士為一科立周易尚書毛詩周禮儀禮禮記春秋孝經論語為九經今天下學官依注疏講說學者博觀諸家自擇短長各從所好春秋止用左氏傳其公羊榖梁陸淳等說並為諸家孟子止為諸子更不試大義應舉者聽自占習三經以上多少隨意皆須習孝經論語光以奏藁示范純仁純仁荅光曰孟子恐不可輕猶黜六經之春秋純仁更有一說朝廷欲求衆人之長而元宰先之似非明夷蒞衆之議不若淸心以俟衆論可者從之不可更俟衆賢議之如此則逸而易成有害亦可改而責議者矣光欣納之戊辰蘇轍言陛下用司馬光為相雖應務之才有所不周而淸德雅望賢愚同敬至於韓縝以屠沽之行使與光同列以臣度之不過一年縝之邪計必行邪黨必勝光不獲罪而去則必引疾而避矣去歲遼使入朝見縝在位使副相顧反脣微笑縝無狀舉祖宗七百里之地無故與之北遼地界之謀出於耶律用正今以為相遼以闢國七百里而相用正而朝廷以蹙國七百里而相縝臣愚所未喻也庚午吏部侍郎李常為户部尚書常文士少吏幹或疑其不勝任以問司馬光光曰使此人掌邦計則天下知朝廷非急於征利貪吏望風掊刻之患庶㡬少息中書舎人胡宗愈為給事中為起居舎人蘇軾免試為中書舎人軍器監丞王得君添差監亳州永城縣倉先是得君上書言應臣僚上章與議改法但許建明事情不得妄有指斥内出手詔曰予方開廣言路得君意欲杜塞人言無狀若此可罷職與外任監當司馬光言今計論經史上自伏羲下至周威烈王二十二年略序大要合為二十卷名曰稽古録伏望看詳送秘書省正字范祖禹等令繕寫上進候讀祖宗寶訓了日乞取此書進讀從之三月壬申詔安燾堅辭知樞宻院事特依所乞依舊同知樞宻院事劉摰吕陶進對太皇太后宣諭曰近除胡宗愈蘇軾如何摯等對甚合公議又曰盡是此中自除兼蘇軾天下知其有文多年淹滯又曰每執政來常說與凡差除須是公正外人自無言語禮部尚書韓忠彦等言今參詳如有祥瑞邊㨗宰臣已下紫宸殿稱賀詔劉摰王覿刑部郎中杜紘將元豐敕令格式重行刋修先是摰言法者天下之大命也先王制法其意使人易避而難犯故至簡至直而足以盡天下之理後世制法惟恐有罪者之或失也故多張綱目而民於是無所措其手足矣世輕世重惟聖為能變通之己邜司馬光言聖旨問臣程頥上殿當除以何官職臣竊惟崇政殿說書足為超擢辛巳程頥為通直郎崇政殿說書頥進劄子三封一曰皇帝輔養之道不可不至大率一日之中接賢士大夫之時多親寺人宫女之時少則自然氣質變化德器成就乞朝廷遴選賢德之士以待勸講講讀旣罷常留二人直日夜則一人直宿以備訪問其二曰三代必有師傅之官師道之教訓傅傅其德義保保其身體臣以為傅德義者在乎防見聞之非節嗜好之過保身體者在乎適起居之宜存畏謹之心祗應宫人内臣並選年四十五以上厚重小心之人服用器玩皆須質樸擇内臣十人充經筵祗應以伺候皇帝起居凡動息必使經筵官知之其三曰竊見經筵臣僚侍者坐而講者獨立於禮為悖欲乞今後特令坐講以養主上尊儒重道之心臣以為天下重任惟宰相與經筵天下治亂係宰相君德成就責經筵由此言之安得不以為重劉摰言布衣程頥之遜避不已而陛下恩命每有加焉孔子曰如有所譽者其有所試矣今有譽而不試每辭而加進臣於是知頥之不敢受也若頥者特以迂闊之學邀君索價而已乞止授以初命之官旣使得以禄養其親又使受之有義廉耻不立於天下也乆矣今幸有一人焉若授受不當於義則使天下靡然益不以廉隅為事豈不重哉頥卒留經筵摰所言不用頥每以師道自居其侍講色甚莊言多諷諫頥聞帝宫中盥而避蟻因講畢請曰推此心以及四海帝王之要道也帝稱善孫覺言韓縝不可用為相臣所聞所見者凡十有二實封而上進者八九登殿而口陳者再而臣所言猶未效王巖叟言韓縝無天下之望夏四月己丑右僕射韓縝為光禄大夫觀文殿大學士知穎昌府内批縝自以為不才恐妨賢路故乞出視矜功要名而去者縝得進退之體故有遷官之異宜於制詞中聲說此意矜功要名蓋指蔡確章惇也詔賜守太師致仕文彦博肩輿赴闕令河南津置行李先是司馬光除左僕射固辭以疾乞召用彦博及將罷韓縝太皇大后以御劄付光欲除彦博太師兼侍中行右僕射事光奏彦博官為太師年八十一臣比彦博乃是後進而位居其上非所以正大倫也不聽王巖叟奏乞罷三舎法蘇轍言禮部欲復詩賦司馬光乞以九經取士二議並未施行欲乞先降指揮明言來年科場一切如舊但所對經義兼取注疏及諸家議論不專用王氏之學仍罷律義然後徐議未為晚也從之御史上官均言請令學者各占三經雜以論語孟子不必專用新義試䇿以二一問歴代一訪時務後詩賦與經義訖參用云司馬光乞令提㸃刑獄司指揮逐縣令佐專一體量鄉村人户有闕食者一面申知上司及本州更不候囘報即將本縣義倉及常平倉米榖直行賑濟將來夏秋成熟令隨稅送納一斗只納一斗更無利息逐縣令佐有能用心存恤並不流移者優與酬奬其全不用心賑貸致户口多有流移者取勘聞奏三省進呈依奏癸巳荆國公王安石卒司馬光手書與吕公著曰介甫文章節義過人處甚多但性不曉事而喜遂非今方矯其失革其弊不幸介甫謝世反覆之徒必詆毁百端光意以謂朝廷特宜優加厚禮以振起浮薄之風扆前力主張更全仗晦叔也三省言尚書六曹職事閒劇不等今欲減定以主客兼膳部職方兼庫部都官兼司門屯田兼虞部定為三十五貟從之丑月丁巳朔吕公著依前官守尚書右僕射兼中書侍郎先是執政官每三五日一聚都堂故為長者得以專决同列難盡爭也光嘗懇確欲數㑹議庶各盡所見而確終不許公著旣秉政乃日聚都堂遂為故事河東節度使守大師開府儀同三司致仕文彦博特授太師平章軍國重事詔令一月兩赴經筵六日一入朝因至都堂與執政商量事如遇有軍國機要事即不限時日並令入預參决韓維守門下侍郎蘇轍言國朝舊典冬至圜丘必兼享天地從祀百神自後或用鄭氏說獨祀五天帝或用王氏說獨祀昊天上帝雖於古學各有援據而考之國朝之舊則為失當詔禮官今秋明堂用皇祐明堂典禮丁夘劉摰言學校之制主於教育人材非行法之地也欲望罷不許相見之禁教誨請益聽其在學往還戊辰詔孫覺顧臨程頥同國子監長貳看詳修立國子監太學條制乙亥官司諫蘇轍言吕惠卿懷張湯之辯詐兼盧把之姦凶王安石初任執政用為心腹及其權位旣均勢力相軋反眼相噬化為讎敵始安石罷相以執政薦惠卿旣已得位恐安石復用遂起王安國李士寧之獄以扼其歸安石覺之被召即起迭相攻擊期致死地安石由是得罪夫惠卿與安石出肺肝託妻子平居相結惟恐不深一旦爭利遂相抉擿不遺餘力此犬彘之所不為而惠卿為之乞陛下斷自聖意略正典刑縱未以汙鈇鑕猶當追削官職投畀四裔以禦魑魅先是劉摰言王安石以道義文學起而輔政先帝舉天下聽之吕誨獨以為不然曰安石居廟堂天下必無安靜之理又曰誤天下蒼生必此人誨坐是貶官于外後安石變亂祖宗法度天下被其患者十七八年皆如誨言欲望哀其志節特賜褒贈吕大防范純仁言吕晦忠於先朝極陳讜論致忤時宰譴死外藩今其家貧甚諸子仕於常調詔誨特贈通議大夫男由庚與堂除合入差遣六月劉摰言吕惠卿公違詔敕擅出師旅其罪不可以不治王巖叟言陛下登極赦書不得侵擾外界吕惠卿兩次擅發兵入西界不可不誅也蘇轍言中外士大夫見惠卿獨得不誅皆謂朝廷用法不平掇拾蜂螘脫遺鯨鯢詔自今科場程試毋得引用字說從林旦言也吕惠卿落職降為中散大夫光禄卿分司南京蘇州居住韓川言市易之設雖曰平均物直不免貨交以取利又所收不補所費請結絶見在物貨盡日更不收買從之王覿言先帝令常平錢斛存留一半遇斛米價貴減市價出糶收成時添市價收糴誠務在於平榖價郡縣之吏妄意朝廷之法惟急於為利故於靑苗新令則競務力行於糶糴舊條則僅同虚設伏望朝廷罷㪚靑苗錢行舊常平倉法以成先帝之素志丙午王巖叟朱光庭蘇轍王覿等言吕惠卿罪惡責授分司南京竊以執鯨鯢於漏網稍正邦刑蓄虎豹於近郊終貽後患臣等豈不知降四官落一職為分司官在於常人不為輕典乎蓋以堯之四凶魯之少正夘旣非常人不當復用常法治也戊申吏部尚書孫永等議神宗輔相之臣有若文忠冨弼秉心直亮操術閎逺歴事三世計安宗社以配享神宗皇帝廟廷實為宜稱詔從之初議或欲以王安石或欲以吳充太常少卿鮮于侁曰勲德第一惟冨弼耳辛亥吕惠卿責授建寧軍節度副使本州安置不得僉書公事從諫官王巖叟等四人所奏也蘇軾草制詞曰凶人在位民不奠居司冦失刑士有異論稍正滔天之罪永為垂世之規吕惠卿以斗筲之才挾穿窬之智謟事宰輔同升廟堂樂禍而貪功好兵而喜殺以聚斂為仁義以法律為詩書首建靑苗次行助役均輸之政自同商賈手實之禍下及雞豚茍可蠧國以害民率皆攘臂而稱首先皇帝求賢若不及從善如轉圜始以帝堯之心姑試伯鯀終焉孔子之聖不信宰予發其宿姦謫之輔郡尚疑改過稍畀重權復陳罔上之言繼有碭山之貶反覆教戒惡心不悛躁輕矯誣德音猶在始與知己共為欺君喜則磨足以相歡怒則反目以相噬連起大獄發其私書黨與交攻㡬半天下奸贓狼籍横被江東至其復用之年始倡西戎之隙妄出新意變亂舊章力引狂生之謀馴致永樂之禍興言及此流涕何追迨予踐祚之初首發安邊之詔假我號令成汝詐謀不圖渙汗之文止為疑賊之具迷國不道從古罕聞尚寛兩觀之誅薄示三危之竄國有常典朕不敢私甲寅詔曰先帝講求法度愛物仁民而搢紳之間不能推原本意或妄生邊事或連起犴獄乆乃知弊此羣言所以未息朝廷所以懲革也敕正風俗修振紀綱蓋不得已况罪顯者已正惡鉅者已斥則冝蕩滌隱疵闊略細故應今日以前有涉此事狀者一切不問言者勿復彈劾有司毋得施行各俾自新同歸美俗始鄧綰責滁州言者未巳太皇太后因欲下詔慰存反側吕公著以為當然遂從之或謂公著曰今除惡不盡將貽患它日公著曰治道去太甚耳文景之世網漏吞舟且人才實難宜使自新豈宜使自棄耶乙夘崇政殿說書程頥上疏曰臣以為今日至大至急為宗社生靈長乆之計惟是輔養上德而已周公作立政之書舉常伯至於綴衣虎賁以為知恤兹者鮮一篇之中丁寧重複惟在此一事而已書又曰僕臣正厥后克正又曰后德惟臣又曰侍御僕從罔匪正人是古人之意人主跬步不可離正人也蓋所以涵養氣質薫陶德性故能習與智長化與心成古之生子能食能言而教之大學之法以豫為先人之幼也知思未有所主便以格言至論日陳於前雖未曉知且當薫聒使盈耳充腹乆自安習若固有之雖以他言惑之不能入也若為之不豫及乎稍長思慮偏好生於内衆言辯口鑠於外欲其純全不可得也今講讀官共五人四人皆兼要職獨臣不領别官近差修國子監太學條制是一兼也乃無一人專職輔導者執政之意可見也蓋惜人材不欲使之閒爾又以為雖兼他職不妨講讀此尤不思之甚也今夫鍾怒而擊之則武悲而擊之則哀誠意之感然也告於人亦如是古人所以齋戒而告君者何謂也臣前後兩得進講未嘗敢不宿齋豫戒潛思存誠覬感動於上心若使營於職事紛紛其思慮待至上前然後善其辭說徒以頰舌感人不亦淺乎此理非知學者不能曉也今諸臣所兼皆要官若未能遽罷且乞免臣修國子監條例俾臣夙夜精思竭誠專在輔道陛下擢臣於草野之中蓋以其讀聖人書聞聖人道臣敢不以其學上報聖明竊以聖人之學不傳乆矣臣幸得之於遺經不自度量以身任道不虞天幸之至得備講說於人主之側誠使得以聖人之學上沃聖聦則聖人之道有可行之望豈特臣之幸哉講義曰人主之學非徒涉書史而已凡起居動作之間無非學也講學之地非徒曰經筵而已凡宫闈之中九重之邃無非學也講學之人非徒曰師保而已凡侍御僕從綴衣趣馬無非正人而後可也是以古先聖王兢兢業業雖在紛華波蕩之中幽獨得肆之地而所以精之一之如對神明如臨淵谷雖深居禁宻之地而凜然若立乎宗廟之中朝廷之上雖以天子之尊周旋講讀之間而視若嚴師父之臨乎其前此學之所以成也伊川經筵之說其古今聖賢之端本培根乎秋七月丙辰朔尚書省言舊制中外學官並試補詔尚書侍郎左右司郎中學士待制兩省御史臺官國子司業各舉二貟宜罷試法蘇軾奏論衙前一役只當招募不當定差嘗白司馬光光不然之軾曰昔韓魏公刺陜西義勇公為諫官爭之甚力公亦不顧軾昔聞公道其詳豈今日作相不許軾盡言邪光不恱而罷辛酉宰臣司馬光言知人之難聖賢所重莫若使在位達官人舉所知欲乞朝廷設十科舉士一曰可為師表科二曰可備獻納科三曰可備將帥科四曰可備監司科五曰可備講讀科六曰可備顧問科七曰可備著述科八曰善聽獄訟科九曰善治財賦科十曰能斷請讞科應職事官自尚書至給舎諫議寄禄官自開府儀同三司至大中大夫職自觀文殿大學士至待制毎嵗須得於十科内舉三人從之乙丑夏國主秉常卒左僕射司馬光等言欲乞今後凡有詔令降付尚書省者僕射左右丞簽訖分付六曹謄印符下諸司及諸路諸州施行其臣民所上文字降付尚書省僕射左右丞簽訖亦分付六曹本曹尚書侍郎及本㕔郎官次第簽訖委本㕔郎官討尋公案下筆判云今欲如何施行次第通呈侍郎尚書非六曹所能專决者聽詣僕射左右丞咨白或申都省或上殿取旨若本曹顯不當即行紏劾所貴上下相承各有職分行遣簡徑事務辦集上官均亦奏乞尚書省事類分輕重某事關尚書某事關二丞某事關僕射從之是月劉摰言乃者朝廷患免役之弊下詔改復差法而法至今不能成朝廷患常平之敝並用舊制施行曽未累月復變為靑苗之法其後又下詔切責首議之臣而斂㪚之事至今行之如初此二事大事也而反覆二三尚何以使天下信之且改之易之誠是耶君子猶以為反令况改易而未必是徒以暴過舉於天下則曷若謹之於始乎辛夘司馬光劄子勘㑹靑苗錢利民甚少害民極多今欲只令州縣依舊法趂時糴糶其靑苗錢更不支俵所有舊欠二分之息盡除放只元支本錢隨見欠多少分作料次隨稅送納詔從之初同知樞宻院范純仁以國用不足建請復㪚靑苗錢時司馬光方以疾在告不與也已而臺諫共言其非皆不報光尋具劄子乞約束州縣抑配者蘇軾又繳奏乞盡罷之光始大悟遂力疾入朝於簾前爭曰不可是何奸邪勸陛下復行此事純仁失色却立不敢言靑苗錢遂罷不復㪚太皇太后諭輔臣曰臺諫官言近日除授多有不當司馬光言朝廷近詔臣僚舉可任監司者旣令各舉所知必且試用待其不職然後罷黜亦可并坐舉者吕公著曰舉官雖是委人亦須執政審察人材光曰自來執政只於舉到人中取其所善者用之韓維曰光所言非是豈可直信舉者之言今不先審察待其不職而罰之甚失義理公著曰近來除用多失亦由限以資格光又曰資格豈可少維又曰資格但可施於叙遷若升擢人材豈可拘資格司馬光以疾作先出都堂遂謁告自是不復入朝八月己亥王巖叟朱光庭入對延和殿巖叟進劄子論及人材之難上曰只為難得全者有材者無德有德者無材對以為執政大臣須當用材德兼備者自餘各隨合用處用之若當局務之任則用材可也若當獻納論思之地須用德方可簾下甚然之癸夘通直郎充崇政殿說書程頥兼權判登聞鼓院頥再辭之詔不帶職官充侍讀侍講崇政殿說書其請俸依職事官例支見錢頥在講筵嘗質錢使或疑禄薄問知乃自供職後不曽請俸尋詰户部户部索前任厯子頥言頥起草萊無前任厯子其意以為朝廷待士便當廩人繼粟庖人繼肉也即令戸部自為出厯子蘇轍言上官均上言極論官冗之弊已蒙朝旨降付給舎左右司看詳施行臣伏見今之自文職入流者凡四進士補䕃與夫納粟得官百司胥吏是也計其才行可以居官治事者納粟胥吏不如補䕃補䕃不如進士武舉又進士科所謂特奏名者凡五例其最濫者但曽一次預薦僅及三十年即該推恩臣以為有可罷者納粟得官是也有可以裁抑者特奏名資䕃胥吏是也九月丙辰朔守尚書左僕射兼門下侍郎司馬光卒光為政踰年而病居其半每欲以身狥下躬親庶務不舎晝夜賔客見其體羸曰諸葛孔明二十罰以上皆親之以此致疾公不可以不戒光曰死生命也為之益力吕中曰天將禄人之國必先祚其君子天將以元豐為元祐則使司馬光獲相於初元天將使元祐為紹聖則不使司馬光慗遺於數歲當是時新法已多變矣然君子未盡用也小人未盡去也公薨於今日而黨議已兆於明日使光尚在則君子尚有所立必無朋黨之禍必無報復之事一身之存亡二百年治亂之所係也太皇太后聞其䘮哭之慟上亦感涕不已明堂禮畢皆臨奠贈太師温國公諡曰文正御篆表其墓道曰忠淸粹德之碑光在相位遼人夏人遣使入朝與吾使至遼中者遼必問光起居而遼人勑其邊吏曰中國相司馬矣切毋生事開邊隙及卒京師之民皆罷市往弔畵其像刻印鬻之時畵工有致冨者及葬四方來㑹者盖數萬人哭之如哭其私親蘇軾嘗論光所以感人心動天地者而蔽以二言曰誠曰一君子謂軾知言軾嘗載光語晁補之曰吾無過人但平生所為未嘗有不可對人言耳始光當國悉改熈寧元豐舊事或謂光曰舊臣章惇惠卿軰皆小人它日有以父子之義間上則朋黨之禍作矣光正色曰天若祚宋必無此事遂改之不疑君子謂光之勇孟軻不如若曰當參用熈豐舊臣共變其法以絶異時之禍實光所不取也大事記曰變熈寧之法者乃神宗末年之悔太皇初年之盛心天下人心之公論也司馬光謂先帝之法善者雖百世不可改若安石惠卿等所建非先帝意者改之當如拯焚救溺此正孔子三年無改於道之本旨也然謂太皇以母改子則它日章蔡之徒必以子不可改父之說進者此紹述之論所由起也當時吕公著之言曰保馬之法先朝已知有司奉行之謬市易之法先帝尤覺其有害而無利福建江南等路配賣茶塩俱非朝廷本意當一切罷去則是當變之法皆出於神宗末年之意推此意而行之則無紹述之慮矣吕公著又謂靑苗之法但罷逐年比較則百姓自免抑勒之患免役之法少取寛剩之數則無下户虚納之患保甲之法只令農隙教習則不至有妨農之患更張之際當須有術不在倉卒此以所謂在所當改而可以未改者耳推此意而行之則無反覆之慮矣故曰熈豐之小人不可以不盡去而熈豐之法則不可以盡變去熈豐之小人不可以不急而變熈豐之法則不容以太急靑苗均輸所可罷而雇役之法未可以遽罷也保馬戸馬所可罷而保甲之法未可以遽罷也新經字法可廢而取經義先論䇿之意不可廢也然司馬光之變法如拯焚救溺四患未除死不瞑目至於言朋黨之禍則曰天若祚宋必無此事此又司馬光至誠至公之心質之天地而無媿也後世聞公之言可以流涕痛哭矣己未薦享景靈宫辛酉大享明堂丁夘蘇軾為翰林學士鮮于侁為左諫議大夫梁燾為右諫議大夫蘇轍為起居郎王巖叟為侍御史朱光庭為左司諫王覿為右司諫詔諸路坊郭第五等以上及單丁女戸寺觀第三等以上舊納免役錢並與減放五分餘並全放仍自元祐二年為始傅堯俞言資助役人臣未敢詳定如以差法為非自可復為雇法不須無事徒此紛紛己夘中書侍郎張璪為光禄大夫資政殿學士知鄭州臺諫章交上凡十數璪乃請外竟從優禮罷去孫升奏祖宗之用人如趙普王旦韓琦此三人者文章學問不見於世然觀其德業器識功烈行治近世輔相未有其比而王安石為一代文宗進居大任趍近利無逺識施設之方一出於私智由是言之則輔佐經綸之業不在乎文章學問也願陛下選任左右輔弼必先乎德業器識無取乎文學聲名貼黄言蘇軾文章學問中外所服然德業器識有所不足今為翰林學士可謂極其任矣若或輔佐經綸則願陛下以王安石為戒冬十月丙辰鴻臚卿孔宗翰奏先臣孔子之後世襲封爵一人欲乞今後不使襲封之人更兼它職臣寮言孔子廟貌國家之所常奉欲釐定典禮命官以司其用度立學以訓其子孫則朝廷崇儒尊道之意厚矣合襲封衍聖公專主祠事添助田百畆供祭祀賜書置教授一貟改衍聖公為奉聖公及刪定家祭冕服等制度頒賜施行從之乙巳賜范鎭詔曰夫有德君子以精神折衝譬之麟鳳能服猛鷙朕虚懷前席以致諸老非敢必以事諉也茍得黄髮之叟皤然在位則朝廷尊嚴姦宄消伏卿雖篤老乃心王室毋憚數舍之勞以副中外之望已降勑落致仕除兼侍讀詔書到日可發來赴闕戊申宗正寺丞王鞏奏宗正寺條例皇帝玉牒十年一進修玉牒官並以學士典領玉牒自范鎭等一進之後神宗玉牒至今未修仙源類譜自張方平慶厯年進書之後僅五十年並無成書請别立法宗正寺修纂寺書其玉牒官每二年一具草繳進如㑹問未足不得過進期兩季類譜等亦二年一具草候及十年類聚修纂成書進呈從之劉摰言太學條例獨可按據舊條考其乖戾太甚者刪去之若乃髙闊以慕古新奇以變常非以無補而又有害欲望聖慈指揮罷修學制所止以其事責在學官正録以上將見行條制去留修定所貴因革不失其當摰言髙闊以慕古新奇以變常盖指程頥也頥所立條制輙為禮部疏駁頥亦自辨理然朝廷訖不行十一月乙夘禮部言將來冬至節命婦賀坤成宮例改牋為表從之程頥建言神宗䘮未除節序變遷時思方切恐失居䘮之禮無以風化天下乞改賀為慰不從戊午劉摰為中大夫尚書右丞吕大防守中書侍郎傅堯俞為御史中丞仍兼侍讀戊寅起居郎蘇轍起居舎人曽肇並為中書舎人肇仍充實録院修撰王巖叟言肇天資甚陋人望至卑早乘其兄布朋附王安石擅權用事朝廷美爵如取於家故肇因縁得竊館職素無吏能而擢領都司殊昧史材而委修實録巖叟凡八上章皆不聽范鎭提舉崇福宫以鎭力辭新命也朝廷起鎭蓋欲授以門下侍郎鎭固不欲起又移書問其從孫祖禹祖禹亦勸止之鎭大喜曰是吾心也凡吾所欲為者司馬君實已為之何用復出也御史中丞傅堯俞初視事與侍御史王巖叟同入對上諭堯俞曰用卿作中丞不由執政以卿公正不避權貴如朝政闕失卿等但安心言事太皇太后主張三省奏立經義詞賦兩科下議從之吕陶言保甲之法雖已更張猶有二弊詔府界三路保甲人户五等已下地土不及二十畆者雖三丁以上並免教從陶請也十二月庚子傅堯俞王巖叟同入對太皇太后問曰天下政事如何堯俞稱善又曰保甲保馬須是先罷其餘閒慢者且休嫌於更改太猛巖叟進曰若果是閒慢則可若於民有害則亦不可不改也應曰害民則須改巖叟進第一請廢葭蘆吴堡二寨劄子堯俞奏曰大率昨來新取者城寨皆可廢太皇太后曰此盡是向來小人欺朝廷做底待令施行遂進第二言曽肇劄子上曰且安心言事待這裏主張巖叟進曰若言事省力則不在陛下主張袛縁有如此之難所以須頼人主主張耳壬寅朱光庭言學士院試館職䇿題云欲師仁宗之忠厚而患百官有司不舉其職或至於媮欲法神考之勵精而恐監司守令不識其意流入於刻又稱漢文寛大長者不聞有怠廢不舉之病宣帝綜核名實不聞有督察過甚之失臣以謂仁宗之深仁厚德如天之為大漢文不足以過也神考之雄才大略如神之不測宣帝不足以過也今來學士院考試官不識大體反以媮刻為議論乞特奮睿斷正考試官之罪䇿題蘇軾文也詔特放罪軾聞而自辯詔追回放罪指揮傅堯俞王巖叟各上疏論軾吕陶言蘇軾所撰䇿題蓋設此問以觀其答非謂仁宗不如漢文神考不如漢宣也今士大夫皆曰程頥與朱光庭友而親蘇軾常戯薄程頥光庭為程頥報怨也又言明堂降赦臣僚稱賀訖兩省官欲徃奠司馬光程頥言曰子於是日哭則不歌豈可賀赦纔了却往弔䘮坐客有難之曰孔子言哭則不歌即不言歌則不哭蘇軾遂戯程頥云此乃枉死市叔孫通所制禮也衆皆大笑結怨之端蓋自此始宋史全文卷十三上欽定四庫全書宋史全文卷十三中宋哲宗二丁夘元祐二年春正月壬戌王覿言朱光庭之論䇿題言者旣以為因蘇軾與光庭之師程頥有隙而發矣吕陶之言朱光庭論者又謂陶與蘇軾同是蜀人而遂言光庭也陛下若置而不問惟詳察䇿題之是非而有罪無罪專論蘇軾即黨名不起矣故夏國主秉常以遺進物遣使來詔其子乾順為夏國王如明道二年元昊除節度使西平王例詔傅堯俞王巖叟朱光庭以蘇軾撰試舘職䇿題不當累有章疏今看詳得是非譏諷祖宗只是論百官有司奉行有過令執政召逐人面諭更不須彈奏三人者又各上疏戊辰詔自今舉人程試並許用古今諸儒之說或出己見勿引申韓釋氏之書考試官於經義論䇿通定去留毋於老列莊子出題庚午蘇軾言臣近以試舘職策問為臺諌所言臣所撰䇿問首引周公太公之治齊魯後世皆不免衰亂者以明子孫不能奉行則雖大聖大賢之法不免於有弊也後引文帝宣帝仁厚而事不廢核實而政不苛者以明臣子若奉行得其理無觀望希合之心則雖文宣足以無弊也何嘗有毫髮疑似議及先朝臣前歲召還始見故相司馬光臣論差役免役各有利害免役掊斂民財而下有錢荒之患差役民常在官而貪吏猾胥得縁為姦二害輕重蓋略相等光聞之愕然曰若君此言計將安出臣謂先帝本意使民戸率出錢專力於農坊場河渡官自出賣而以其錢雇募衙前民不知有倉庫綱運破家之禍此萬世之利也决不可變光聞臣言大以為不然臣又與光言熈寧中嘗行給田募役法光尤以為不可臣每行監司守令告詞皆以奉守先帝約束毋得弛廢為戒由此觀之臣豈謗議先朝者哉辛未傅堯俞王巖叟入對論蘇軾䇿題不當太皇太后曰此朱光庭私意卿等黨光庭耳光庭未言時何故不言堯俞與巖叟同奏曰臣等蒙宣諭謂黨附朱光庭彈奏蘇軾上辜任使更不敢詣臺供職伏俟譴斥丙子詔蘇軾所撰䇿題即無譏諷祖宗之意又縁自來官司試人亦無將祖宗治體評議者蓋學士院失於檢㑹劄與學士院知令蘇軾傅堯俞王巖叟朱光庭各疾速依舊供職蓋從右僕射吕公著之議也范純仁亦言蘇軾只是臨文偶失周慮本非有罪二月詔左司諫朱光庭乘傳詣河北路與監司一貟徧視灾荒按累降指揮措置賑濟詔賜富弼神道碑以顯忠尚德為額仍命翰林學士蘇軾撰文詔吏部選人改官每歲以百人為額三月甲寅詔輔臣分詣寺觀祈雨執政奏事延和殿太皇太后諭曰性本好靜昨止縁主上沖幼權同聽政蓋非得已况母后臨朝非國家盛事文德殿天子正朝豈女主所當御宰臣吕公著等言陛下執謙好禮冠映古今加以思慮精深非臣等所及詔内外待制大中大夫以上歲舉第二任通判資序人堪知州者一人先是吕陶言任官之弊其輕且濫者惟郡守為甚故有是詔詔内侍省供奉官以下至黄門以一百人為定額程頥上疏曰臣前言乞於延和殿講讀太皇太后時至簾下觀講官進說講官有當奏禀便得上聞臣今思之太皇太后雙日垂簾聽政隻日若更親臨講讀亦恐勞煩聖躬欲乞只就垂簾日聽政罷召當日講官至簾前問當主上進德次第講說所至如何開益蓋輔導之間有當奏知之事可以陳說所繫甚大又上疏曰臣近言邇英漸熱只乞就崇政延和殿聞給事中頋臨以延和講讀為不可臣料臨之意不過謂講官不可坐於殿上以尊君為說爾臣不暇逺引只以本朝故事言之太祖皇帝召王昭素講易眞宗令崔頥正講尚書邢昺講春秋皆在殿上當時仍是坐講立講之儀只始於明肅太后之意此又祖宗尊儒重道之盛美豈獨子孫所當為法萬世帝王所當法也今世俗之人能為尊君之言而不知尊君之道人君惟道德益髙則益尊若勢位則崇髙極矣尊嚴至矣不可復加也夏四月丙戌交趾遣使入貢詔文彦博十日一赴朝參因至都堂議事仍一月一赴經筵以彦博累章乞致仕故有是命庚寅梁燾奏春夏大旱辛夘詔可自今月十一日後避正殿減常膳公卿大夫其勉修厥職共圖消復甲午范純仁言旱暵作沴前代多因灾異求訪直言陛下臨御之初即下詔許人實封言事伏望聖旨下三省樞宻院六曹寺監將前來封章並令檢尋擇賢明近臣選官看詳其决然可行者便令執政進擬施行又尚書諸曹受天下四方牒訴奏請文字乞降聖旨並委御史臺諫官給事中左右司郎官分定㸃檢抽索事祖行遣子細看詳定奪丁酉詔差傅堯俞杜紘孫升赴吏部王巖叟孫覽韓川赴戸部張問上官均赴禮部韓宗道張舜民赴兵部梁燾范純禮吕陶赴刑部王覿張舜民赴工部㸃檢自去年正月至年終承受到文字抽索事祖行遣次第子細看詳其間有執文害事不近人情者并元條刪改其勘當住滯者促令結絶其指揮不當及非理問難鹵莽判收者亦許牒本部再與詳究施行用范純仁之言也己亥内出太皇太后手詔旱暵為虐詔諸路監司分督郡縣刑獄王巖叟同中丞傳堯俞入對延和堯俞先奏旱暵由臣等不職太皇太后曰蓋由太皇太后無德干卿等甚事辛丑雨壬寅詔在京職事官歲合舉官陞陟者文臣六曹尚書以上各二人待制以上各四人左右司郎官以上各二人軍器少監以上各二人武臣觀察使以上各二人著為令甲辰詔張舜民特罷監察御史依前權判登聞鼓院先是舜民言夏人政亂強臣爭權乾順存亡未可知朝廷未宜遽加爵命近差封冊使劉奉世等願勿遣縁大臣有欲優假奉世者為是過舉大臣指文彦博也故舜民有是責傅堯俞乞速賜追還以協易不逺復之義王巖叟言舜民言果是則有益於聦明果非則何傷於彦博殿中侍御史孫升監察御史上官均韓川皆言舜民不當罷梁燾言望還舜民舊職以盡其效王覿亦以為言俱不報乙巳徐州布衣陳師道為亳州司戸參軍充徐州州學教授先是蘇軾傅堯俞孫覺等言師道文詞髙古度越流軰安貧守道若將終身茍非其人義不往見過壯未仕實為遺才故有是命傅堯俞王巖叟言左丞李淸臣竊位日乆資材闒茸性行險邪專於為己有患失之心茍於隨人無自立之志人材之能否不知民事之利病不識伏望聖慈早賜罷黜上官均言淸臣不恊衆論梁燾言淸臣猥暗貪鄙庸懦傾邪戊申李淸臣以資政殿學士知河陽五月巖叟堯俞等又言臣等累上封章論張舜民不當罷御史不蒙開納言責難以冒居伏望降黜自今更不敢詣臺供職吕公著慮言者將激怒上意致朝廷有罪言者之失乃奏乞稍與優遷令解言職丁夘劉摰為尚書左丞王存為尚書右丞戊辰孔文仲為左諌議大夫杜純為侍御史吕陶為左司諌賈易為右司諌王巖叟為起居舎人朱光庭為左司貟外郎王覿為右司貟外郎孫升差知濟州梁燾為集賢殿修撰知潞州先是燾於省中面詰給事中張問因誚問貪禄不去不知世所謂羞耻而孫升再劾張問引燾不知羞耻等語於是批旨付三省曰巖叟光庭韓川等乆在言路宜稍遷擢燾於禁省詬同列升朋附燾宜罷於是巖叟等皆逓遷而升與燾有是命癸酉胡宗愈為御史中丞宗愈首進六事曰端本正志知難加意守法畏天它日奏對便殿上問朋黨之弊宗愈曰君子義之與比謂小人為姦邪則小人必指君子為朋黨陛下擇中立不倚者用之則朋黨自銷因進君子無黨論六月辛巳朔甲申彭汝礪為起居舎人執政有問新舊之政者汝礪曰政無彼此之辨一於是而已今所更大者取士及差役法行之而士民皆病未見其可也戊子丁騭為右正言騭自行新法即不肯為知縣折資監當㡬二十年人多稱之趙挺之方蒙趙屼並為監察御史秋七月乙夘權開封府推官張商英為提㸃河東路刑獄商英先上書謂三年無改於父之道今先帝陵土未乾奈何輕議變更又嘗移簡蘇軾欲作言事官或得之以告吕公著公著不恱故出之商英簡蘇子瞻云老僧欲住烏寺呵佛罵祖一巡如何孫林過子瞻竊得其簡示吕申公之子希純希純白申公申公不恱出商英壬戌御札付中書省曰門下侍郎韓維嘗面奏范百禄任刑部侍郎所為不正輔臣奏劾臣寮當形章疏明論曲直豈但口陳意欲無迹何異姦讒可罷門下侍郎守本官分司南京仍放辭謝吕公著即上疏言韓維素有時望俟其有請聽使去位以全君臣之大體甲子詔韓維知鄧州然猶用前責辭中書舎人曽肇封還韓維辭頭不報乙丑吕陶為京西轉運副使上官均為比部貟外郎戊辰吕公著復論責韓維事辛未韓維為資政殿大學士知鄧州八月辛巳右司諌賈易知懐州自蘇軾以䇿題事為臺諌官所言而言者多與程頥善軾頥旣交惡其黨迭相攻易獨建言請并逐二人又言吕陶黨助軾兄弟而文彦博實主之語侵彦博及范純仁太皇太后欲峻責易吕公著言易所言頗切直惟詆大臣為太甚苐不可復處諫列爾太皇太后曰不責易此亦難作公著曰不先逐臣易責命亦不可行爭乆之乃止罷諫職旣退吕大防劉摰王存私相顧而嘆曰吕公仁者之勇乃至於此程頥罷經筵權同管勾西京國子監左諌議大夫孔文仲言頥人品纎汚天資憸巧元無鄉曲之行常在公卿之門臣居京師近二年頥未嘗過門臣比除臺諫官頥即來訪先談賈易之賢又曰吕陶補司諌則賈明叔必不安職矣明叔者指賈易字也臣曰何以言之頥曰明叔近有文字攻陶之罪今陶設為司諫明叔辭去决矣公能坐觀明叔之去乎推頥之言必是與陶有隙又欲諷臣攻陶助易也陛下以淸明安靜為治於上而頥乃鼓騰利口間亂羣臣使之相爭闘於下伏望論正頥罪放還田里以示典刑先是頥赴講上瘡疹不坐已累日退詣宰相問曰上不御殿知否曰不知曰二聖臨朝上不御殿太皇太后不當獨坐且上疾而宰相不知可為寒心翼日吕公著等以頥言奏遂詣問疾上不恱故黜之丁亥孔文仲左正言丁騭進對太皇太后宣諭曰一心為國勿為朋比戊申以復洮州俘獲鬼章宰臣率百官表賀于延和殿九月辛亥豐稷為殿中侍御史庚申王覿奏蘇軾程頥向縁小忿寖結仇怨於是頥軾素相親善之人更相詆訐以求勝勢前日頥敗而言者及軾若欲保全軾則且勿大用之庶㡬使軾不遽及於大悔吝又奏小人近乃造為飛語有五鬼十物十八姦之說大槩不過取一二公議所共惡者以實其說而餘皆端良之士也伏望詔牓朝堂明示以不信讒言之意以安士大夫之心庚午吕公著言十五日以經筵講畢論語賜執政及講官御筵是日内出皇帝御書唐賢律詩分賜臣等次日於簾前謝蒙太皇太后宣諭皇帝好學在宫中别無所為惟是留心典籍天下幸甚臣輙於尚書論語及孝經中節取要語共一百叚進呈庶便於省覽它日三省奏事畢宣諭公著曰所進尚書論語等要義百篇皇帝已依所奏每日書寫看覽甚有益於學問與寫詩篇不同也冬十月知懐州賈易責知廣德軍御史交章論易唯謟事程頥黙受教戒頥指氣使若驅家奴故有是責癸夘劉摰言知陳州傅堯俞知齊州王巖叟知潞州梁燾通判虢州張舜民知廣德軍賈易皆忠直之臣守正不撓陛下試取近來言者章疏宻察其意其間心出於至誠言出於忠信憂國如飢渴謀議知大體有如堯俞者乎孤立不懼彈劾權強赤心事上略無私意有如巖叟者乎守正堅確不憚大吏不黨同列嫉邪指惡有如舜民燾及易者乎臣願召此數忠正之臣入備任使以慰公議以消姦黨甲辰泉州増置市船從戸部尚書李常請也丁未范祖禹乞於邇英閣復張掛仁宗王洙蔡襄所書無逸孝經圖從之十一月庚申以鬼章入獻于崇政殿詰犯邊之狀諭以聽招其子及部属歸附以自贖鬼章服從釋縛壬戌李常轉對陳七事曰崇廉耻存鄉舉别守宰廢貪贓審疑獄擇儒師修役法又言差役之法上戸富安下户空匱富安則以差為病空匱則出力為宜輙采差助二法隨上下所宜條叙梗槪若便民而可乆也壬申詔講讀官遇不開講日輪具漢唐故事有益政體者二條進入先是蘇頌言國朝典章大抵襲唐乞詔史官采新唐書中人主所行日進數事故有是詔頌每進可為規戒有補時政者必述以己意反復言之十二月乙酉以大寒賜諸軍薪炭錢再令開封府閱坊市貧民以錢百萬計口量老少給之丙午趙挺之奏蘇軾輕薄虚誕有如市井俳優之人學術本出戰國䇿蘇秦張儀縱横揣摩之說近日學士院䇿試廖正一館職乃以王莽袁紹董卓曹操簒漢之術為問使軾得志將無所不為矣戊辰元祐三年春正月丙辰詔以春寒展給賣薪炭限十有五日庚申詔發京西南路闕額禁軍榖五十餘萬斛減市價出糶至麥熟日止以雪寒物價翔踴也王覿奏蘇軾習為輕浮貪好權利不通先王性命道德之意專慕戰國縱横捭闔之術長於辭華而暗於義理若使乆在朝廷則必立異妄作即宜且與一郡稍為輕浮躁競之戒甲戌踈决在京及府界繫囚雜犯死罪以下第降一等至杖釋之以乆隂不解也丙子御史中丞胡宗愈侍御史王覿進對宣諭曰乆隂不解雪寒民不易宗愈對曰陛下賜錢糶米分賣芻炭都民甚幸唯河北京東災傷猶須多方賑濟曰已一一有指揮宗愈覿曰聞二聖焦勞上元禁中不曽用樂上元不御樓亦未嘗燕㑹二月詔自今朝㪚中㪚正議光禄金紫光禄大夫並置左右進士出身及帶職轉至左朝議中㪚二資餘人轉至朝議中㪚分左右字為四資以上各理七年磨勘其正議至金紫並分左右字為八資應今官已及此者悉加之蘇軾言差役之法天下以為未便近聞疎逺小臣張行者力言其弊而諌官韓川深詆之至欲重行編竄臣每見吕公著安燾吕大防范純仁皆言差役不便但為已行之令不欲輕變兼恐臺諌紛爭卒難調和願陛下問公著等令指陳差雇二法各有若干利害昔日雇役中等人戸歲出錢㡬何今者差役歲費錢㡬何及㡬年一次差役皆可以折長補短約見其數以此計筭利害灼然而况農民在官貪吏狡胥百端蠶食比之雇人苦樂十倍張行者遂寧人言神宗議納役錢蓋嘗謂之助役矣以為若止於助則未能盡免將使後世役亦差錢亦納於是更為免役其慮深矣又言臣恐議者以為朝廷有心於改法無心於便民章疏十上詔監司取戒勵以聞行乃止己丑左司諌豐稷為國子司業揚王顥荆王頵嘗令成都府路走馬承受造錦地衣稷獨奏劾以謂近属奢侈官吏奉承宜皆紏正其罪給事中趙君錫曰諌官如是天下必太平不數日稷徙他官詔殿試經義詩賦人並試䇿一道從趙挺之請也知貢舉蘇軾同孫覺孔文仲言臣等伏見從來天下之患無過官冗今日一官之闕率四五人守之爭奪紛紜廉耻道盡伏見恩牓得官之人布在州縣例皆垂老别無進望惟務黷貨以為歸計貪冒不職十人而九朝廷所放恩牓㡬千人矣何曽見一人能自奮勵有聞於時而殘民敗官者不可勝數伏乞特奏名舉人詔殿試考官精加考較量取一二十人委有學問詞理優長者即許出官其餘皆補文學長史之類不立選限劉安世言自去歲已後屢罷言事之官往往竊議以謂陛下好賢之志稍異於初年納諌之心漸怠於昔日又言昔之善觀人之國者不視其勢之盛衰而先察其命之弛張未論其政之醇疵而先審其令之繁簡伏覩朝廷命令變易頻數甚者朝行而夕改亦有前詔未頒而後令蠲除者蓋由講議未精思慮未審人情有所未盡事理有所未通或牽於好惡之私或溺於迎合之說故一人言之而遽為之紛更也至於法度之廢置政事之因革必使大臣公心恊訪博極利病廣覽詳擇務當義理更其所可更則不嫌於違俗守其所可守則無憚於襲故申敕門下無使徒為煩瀆以應故事三月丁巳御集英殿試進士己巳賜進士李常寧等二十有四人及第二百九十六人出身一百八十有八人同出身諸科明經七十有三人各賜本科及第出身同出身有差甲戌増賜新釋褐進士錢百萬酒五百壺為期集費夏四月辛巳右僕射吕公著為司空同平章軍國事仍一月三赴經筵二日一朝因至都堂議事吕大防為左僕射范純仁為右僕射兼中書侍郎制詞學士蘇軾所草也是夕軾對於内東門小殿旣承旨太皇太后忽宣諭軾曰内翰何以至此軾曰遭遇陛下曰不關老身事亦不關官家事此是神宗皇帝之意當其飲食而停筯看文字則内人必曰此蘇軾文字也神宗忽時稱曰竒才竒才但未及用學士而上仙爾軾哭失聲太皇太后與上左右皆泣已而命坐賜茶曰内翰直須盡心事官家以報先帝知遇軾拜而出撤金蓮燭送歸院壬午孫固守門下侍郎劉摰守中書侍郎王存守尚書左丞安燾為右光禄大夫依前知樞宻院事胡宗愈為中大夫守尚書右丞趙瞻為樞宻直學士簽書樞宻院事甲申韓川劉安世進對太皇太后問近日差除如何安世等曰朝廷用人皆恊輿望惟胡宗愈公議以為未允耳癸丑范祖禹言臣不侍經席已踰兩月昔唐憲宗不對學士兩月李絳奏曰為臣等竊禄偷安之計則便矣其如陛下何陛下如好學則天下之君子皆欣慕願立於朝以直道事陛下輔助德業而致太平矣陛下如不好學則天下之小人皆動其心欲立於朝以邪謟事陛下竊取富貴而專權利矣五月初胡宗愈除尚書右丞王覿疏宗愈自為御史中丞論事建言多出私意與蘇軾孔文仲各以親舊相為比周内批王覿論列不當落諌議大夫與外任差遣翼日吕公著言今來若止為論列胡宗愈便行責降必未恊衆情未敢行下後二日公著與大防純仁再論於簾前太皇太后意猶未解純仁退而上疏曰側聞聖訓以謂朋黨甚多宜早施行恐於卿等不便以臣愚見朝廷本無朋黨只是善惡邪正各以類分陛下旣用善人則匪人皆憂難進遂以善人之相稱舉者皆指以為朋黨所有先降貶謫王覿文字臣未敢簽書監察御史趙挺之言王覿因言執政而罷朝論以覿任職皆為覿賀楊康國奏一二年來陛下略不優假言路去年逐張舜民今歲又罷王覿皆縁論及執政而歲歲逐諌官御史伏望追寢罷覿之命六月劉安世言臣三次論奏胡宗愈操行汙下毁滅廉耻誠不足以輔佐人主參預國論乞特行罷免秋七月庚戌日至酉初一刻赤如赭壬戌詔應大臣奏舉舘職並依條召試除授其朝廷特除不用此令先是劉安世言祖宗定天下首闢儒舘以育人材處於英俊之地而厲其名節觀以古今之書而開其聦明近歲以來寖輕其選或縁世賞或以軍功或酬聚斂之能或徇權貴之薦未嘗較試遂貼職名又言今陛下過聽臣言追復舊制而繼云其朝廷特除者不在此限則是名為更張弊原尚在欲乞自轉運使以上資序特除者得不用此制度能塞僥倖之門重舘職之選八月庚子劉安世言臣伏見祖宗以來執政大臣親戚子弟未嘗敢授内外華要之職自王安石秉政以後盡廢累聖之制專用親黨務快私意在位之臣猶襲故態子弟親戚布滿要津此最當今大患也願出此章徧示三省俾不廢祖宗之法中書舎人曽肇言七月内批錢珏特差勾當牛羊司八月内批劉言特添差勾當翰林司臣伏見太皇太后陛下皇帝陛下杜絶請謁裁抑恩倖而近日以來頗有干求内降特與差遣者竊恐僥倖之人轉相扳援謹并録上仁宗朝縁内降戒飭詔書事迹凡八條别為一通伏乞置之坐右少助省覽九月戊申蘇軾言臣今日邇英進讀寶訓及太宗皇帝每見時和歲豐雨雪應時輙喜不自勝舉酒以属羣臣又是日熒惑與日同度太史奏言當旱旣而雨足歲豐臣讀至此因進言水旱雖天意然人君修德可以轉災為福丁夘上御集英殿試賢良方正能直言極諌科謝悰已賜悰進士出身除初等職官劉安世言近見悰申尚書省辭免新命狀乃云所有勑命未敢抵授以祗為抵以受為授昔唐之省中有伏獵侍郎為嚴挺之所譏而罷陛下初復制舉豈容有抵授賢良乎冬十月御史翟思等言淸心莫如省事省事莫如省官盖事省則可以省吏吏省則可以省禄禄省則可以省費以今天下之事其煩簡多寡蓋無以異於官制以前然昔以一官治之者今析之為四五昔以一吏主之者今増而為六七願朝廷參考古制以救今弊十一月劉安世言屢見近臣連名薦士多為㨗徑容使躁求人懷覬覦何所不至詔自今臣寮特有薦舉毋得列衘聞奏十二月甲午鄆州州學教授周穜罷歸吏部用劉安世蘇軾言也安世言伏見周穜上書乞以故相王安石配享神宗皇帝穜以疎逺㣲賤之臣懐奸邪觀望之志陵蔑公議妄論典禮伏望重行竄殛以明好惡軾言臣忝備侍從謬於知人至引此人以汙學校謹自劾以待罪閏十二月詔頒元祐敕令格式范鎭卒甲辰京西北路管押范鎭所定鑄成律十二編鍾十二鑄鍾一尺一斛一響石為編磬十二特磬一簫笛塤箎巢笙和笙各二較景祐中季照所定又下一律有竒并書及圖法上進詔送太常寺令尚書禮部太常寺參定以聞詔范鎭與一子有官人陞一任差遣製造人等第支賜詔下鎭已卒户部尚書韓忠彦侍郎蘇轍韓宗道言本部近編成元祐㑹計録大抵一歲天下所收錢榖金銀幣帛等物未足以支一歲之出臣等願明敕本部隨事看詳量加裁損二聖以身率之大臣以身先之則誰不信伏貼黄乞降朝旨令本部裁减浮費前後所減三十餘事率皆浮費之小者已約及二十餘萬貫詔户部取索應干財用除諸班諸軍料錢衣粮賞給特支依舊外其餘浮費並行裁省節次以聞御史中丞李常言先帝以人吏無禄為不足以責其廉遂重其罰而禄之向已命官覈實汰冗請督責成書詔門下中書後省疾速立法甲寅太皇太后詔曰吾今自以𦕈身率先天下今後每遇聖節大禮生辰合得親属恩澤並四分減一皇太后太妃凖此己巳元祐四年春正月甲申左司諌韓川為集賢校理權發遣𨽻州以數言胡宗愈不聽故也己亥詔罷回河及修減水河二月甲辰司空同平章軍國事吕公著卒贈太師申國公諡正獻公著識慮深敏量閎而學粹茍便於國不以私利害動其心與人至誠不事表襮其好士樂善出於天性士大夫有以人物為意者必問其所知與其所聞相參覈以待上求神宗嘗謂執政曰吕公著之於人才其言不欺如權衡之稱物上前議政事盡誠去飾博取衆人之善以為善至其所當守毅然不可回奪也壬戌御邇英殿召講讀官講尚書讀寳訓司馬康講洪範至义用三德上問曰只此三德為更有德康對曰臯陶所陳有九德如柔而立剛而塞強而毅之類是也先是上恭黙未言起居舎人王巖叟喜聞德音因欲風諌退而上言陛下旣能審而問之必能體而行之三德者人君之大本得之則治失之則亂不可須臾去者也三數雖少推而廣之足以盡天下之要陛下誠能用以修己安人則堯舜三代之盛可坐致也己巳知鄧州蔡確為觀文殿大學士餘如故三月甲戌蘇頌等奏撰進漢唐故事分門増修詔以邇英要覽為名劉安世言自去年四月以後凡十八次疏論列胡宗愈罪狀未覩施行又以狀申三省乞将所奏請付外施行己夘尚書右丞胡宗愈為資政殿學士知陳州詳定製造水運渾儀所奏宋以火德王天下所造渾儀其名水運甚非吉兆詔以元祐渾天儀象為名劉安世言去冬迄春雨雪愆期夏苗將槁秋種未布伏望特罷宴樂以示閔雨之意丁亥詔罷春宴蘇軾為龍圗閣學士知杭州從軾請也旣踰月軾言臣近以臂疾堅乞一郡但謂朝廷哀憐衰疾許從私便及出朝參乃聞近日臺官論奏臣罪狀甚多而陛下不肯降出伏望聖慈盡將臺諌官章疏降付有司令盡理根治所貴天下曉然知臣有罪無罪不是陛下屈法庇臣則雖死無所恨矣夫君子之所重者名節也故有捨生取義殺身成仁可殺不可辱之語而爵位利禄蓋古者有志之士所謂鴻毛敝屣也人臣知此輕重然後可與事君父辛夘午時有流星出自東北方向西北方急流至濁没夏四月癸夘給事中趙君錫奏蘇軾乞外任遂除杭州軾之文追攀六經蹈藉班馬知無不言故壬人畏憚為之銷縮公論倚重隱如長城使之在朝用其善言則天下蒙福聽其讜論則聖心開益行其詔令則四方風動伏望收還軾所除新命復留禁林仍侍經幄戊申詔應進士不兼試詩賦人許依舊法取應於本經外増治一經増試一場論語孟子分兩場試壬子先是知漢陽軍吳處厚言蔡確昨謫安州不自循省包蓄怨心作夏中登車蓋亭絶句十篇内二篇譏訕尤甚其詩云矯矯名臣郝甑山忠言直節上元間釣臺蕪没知何處歎息思公俯碧灣右譏訕朝廷情理切害按唐郝處俊封甑山公上元初髙宗多疾欲遜位武后處俊諌曰昔魏文帝著令不許皇后臨朝今陛下奈何欲身傳位天后乎由是事沮臣竊以太皇太后垂簾聽政蔡確不思於它而思處俊此其意何也又云喧豗六月浩無津行見沙洲束兩濵如帶溪流何足道沉沉滄海㑹揚塵言海㑹有揚塵時人壽㡬何尤非佳語滄海揚塵事出葛洪神仙傳此乃時運之大變不知確吟詩託意如何詔令蔡確開具因依實封聞奏乃令委知州錢景陽繳進蔡確元題詩本戊午禮部言經義詩賦進士聽習一經第一塲試本經義二道論語或孟子義一道第二場賦及律詩一首第三場論一首第四場子史時務䇿二道經義進士並習兩經以詩禮記周禮左氏春秋為大經周易公羊榖梁儀禮為中經願習二大經者聽即不得偏占兩中經其治左氏春秋者不得以公羊榖梁為中經第一場試本經義三道論語義一道第二場本經義三道孟子義一道餘如前並以四場通定髙下去留不以人數多寡各取五分即零分及元額解一人者聽取辭理優長之人從之丙寅詔兖州至聖文宣王廟置教授一貟五月辛未著作郎范祖禹為右諫議大夫兼侍講祖禹上言古先明王欲治天下先正其本在於人君一心而已天下治亂出於君心君心一正則萬事無不正若皇帝聖心曉然明於邪正是非它日衆說不能惑小人不能進則萬事定矣癸酉御史中丞李常為兵部尚書盛陶為太常少卿中書舎人曽肇為給事中常與陶皆坐不言蔡確也右司諌吳安詩論肇教彭汝礪救確而不自言其奸乃過於汝礪肇尋亦坐左遷辛巳詔蔡確責授左中㪚大夫守光禄卿分司南京丙戌蔡確旣責梁燾吳安詩劉安世以為責輕傅堯俞侍御史朱光庭相繼論列范祖禹言確之罪惡天下不容伏乞處以典刑重行竄謫獨范純仁王存以為不可純仁上疏云陛下臨御以來政化清明如青天白日無輕氛薄翳道徳純備如精金美玉無纖瑕小疵今以一蔡確之故煩朝廷行稀闊之刑天下久安人所罕見必生疑駭丁亥詔蔡確責授英州别駕新州安置吕大防及劉摯等初以確母老不欲令過嶺太皇太后曰山可移此州不可移大防等遂不敢言純仁退謂大防曰此路荆棘七八十年矣奈何開之吾儕政恐亦不免耳李常罷新除兵部尚書出知鄧州坐不言蔡確為諫官所攻也彭汝礪依前朝奏郎知徐州坐營救蔡確并不草確與盛陶等責詞故黜之曽肇為寳文閣待制知頴州亦坐諫官有言也是日詔丁憂人邢恕候服闕日落直龍圖閣降授承議郎添差監永州在城鹽倉兼酒税先是恕自襄州移河陽専抵鄧州見蔡確相與謀日者所造定䇿事及司馬康赴闕恕特詔康道河陽因勸康作書稱確為它日全身保家之計康與恕同年登科又以恕出其父光門下信之作書如恕言恕本意必得康書者以謂司馬光之子云爾則確定䇿事可取信於世既而梁燾自潞州以左諫議召恕亦要燾出河陽既至恕連日夜論確定䇿功不休且以康與確書為證燾不恱㑹吳處厚奏確詩燾因是遂與劉安世等共請誅確確既貶竄恕亦坐責康初欲從恕招邵雍之子伯温謂康曰公休除喪未見君不宜先見朋友康曰已諾之矣伯温曰恕傾巧或以事要公休公休若從之則必為異日之悔矣公休康字也及燾等論確恕罪亦指康書詔令康分析康乃悔之梁燾言范純仁無愛君報國之誠有挾邪朋奸之跡近者蔡確怨望作詩乃出死力以主張文奸言以辨解劉安世言范純仁略無經國之志惟有朋姦之心顯助奸慝極力救解吳安詩言王存亦嘗助純仁救蔡確今純仁理當黜罷王存亦不可獨免六月甲辰宣制以范純仁依前官為觀文殿學士知頴昌府王存為端明殿學士知蔡州太皇太后曰諫官言純仁黨確則恐不然但所見偏繆耳又曰王存殊無執守前日為范純仁所目便留身同救蔡確邵伯温論曰公卿大夫當知國體以蔡確奸邪投之死地何足惜然嘗為宰相當以宰相待之范忠宣公有文正公餘風知國體者也故欲薄確之罪言既不用退而行確詞命然後求去君子長者仁人用心也確死南荒豈獨有傷國體哉劉摯梁燾王巖叟劉安世忠直有餘然疾惡已甚不知國體以貽後日搢紳之禍不能無過也一吳處厚以前宰相詩為譏謗非所以厚風俗罪之可也蔡確故大臣不問以愧其心可也朝廷當治確及其黨妄貪定䇿之功使誣罔之迹曉然以詔天下後世罪其造謀者可也詩不當罪也嗚呼紹聖初亦賢者可以有為之時也而用章惇之凶暴蔡卞之奸邪一時輕躁險薄之徒皆進使宣仁被謗哲宗致疑離間骨肉禍患幾五十年不解卒致邉境之亂悲夫丙午翰林學士許將為尚書右丞户部尚書韓忠彥為尚書左丞簽書樞密院事趙瞻為同知樞密院事蘇轍為吏部侍郎後三日改翰林學士秋七月乙亥知樞密院事安燾以母喪去位著作佐郎兼侍講司馬康言王者以民為天民以食為天乗今秋熟令州縣廣糴民食所餘悉歸於官今冬來春令飢民就食俟鄉土豐穰乃還本土劉安世等言利民之法無善於常平伏望取今日已前應干常平敕令專委户部刪為一書見在常平錢乘今秋豐稔之時令五路糴粟范祖禹言若止以常平錢取糴亦恐未廣祖宗置内藏庫本以備軍旅非常之用仁宗嘗出錢一百萬以助常平糴本詔户部指揮諸路提刑司下豐熟州縣依條量添錢廣行収糴八月壬寅吏部言縣令罷任委知州通判考察課績以徳義清謹公平勤恪為四善治事之最勸課之最撫養之最分三等及七事為上五為中餘為下次月申監司類聚毎半年一次同行審覆若有能否尤著者别為優劣等知州除太中大夫觀察使以上及二京留守安撫使鈐轄不考察外其餘並委監司依此考察從之詔郡縣考課優等人令三省考察任使從梁燾請也己未詔輔臣分詣諸宫寺祈晴九月辛巳大饗明堂大赦天下劉安世言祖宗之朝所以擇監司之意甚謹嚴考績之制甚詳嘗考唐六典監察御史之職掌分察百僚巡按郡縣是御史非特糾尚書六司之過失而亦按治諸路也欲望以天下諸路分𨽻六察間遣巡行按其功罪冬十月戊申蘇轍奏神宗皇帝御製集九十卷詔於寳文閣収藏癸丑上御邇英閣召講讀官講三朝寳訓終侍讀蘇頌等奏曰陛下勤求治道仰法祖宗臣等不能發明上資聖鑒上遣内臣宣答曰祖宗治道兹有本原逮此終篇悉資開發頌等稽首稱謝十二月壬申給事中范祖禹言臣今領工房伏見朝廷應副修河司須索功費漸大枉費財力有害無利因具河不可回之理二條不可回及不必回之事二十條先是梁燾劉安世進對延和殿太皇太后令具可用臣僚姓名進入於是燾安世共奏吏部尚書傅堯俞素有徳行衆人推服凝重有守得大臣體翰林學士承㫖蘇頌學問該博練達典故神宗朝任知制誥以不草奸人李定為御史詞落職歸班遂有重名伏望聖慈早賜詢考癸未孫固為光禄大夫知樞密院事劉摯為守門下侍郎傅堯俞為守中書侍郎知杭州蘇軾言浙西艱食無甚今嵗兩浙水鄉種麥絶少深恐來年必有飢饉盜賊之憂轉運司上供額斛及補填舊欠共一百六十餘萬碩乞且起一半或三分之二詔許留上供米三之一由是米不翔貴復得賜度牒百道易米以救飢者明年方春即減半價糶常平米又作飦粥藥劑活者甚衆杭本江海之地水泉鹹苦唐刺史李泌始引西湖作六井及白居易復浚西湖放水入運河自河入田所溉至千頃然湖水多葑至是湖中葑田積二十五萬餘丈而水無幾而六井亦幾廢軾始至濬茒山鹽橋二河以茒山一河専受江潮以鹽橋一河専受湖水以餘力復治六井民稍獲其利軾曰若取葑田積之湖中為長堤以通南北則葑田去而行者便矣乃取救荒之餘復請於朝得度牒以募役者堤成植芙蓉楊栁於其上望之如畫圖杭人名之蘇公堤十二月劉安世言臣前月末聞權罷講筵意謂將有燕享今復半月講臣久不得望清光迺者民間喧傳禁中見求乳母乃謂陛下稍疎先王之經典浸近後庭之女寵此聲流播實損聖徳先是范祖禹上疏陛下未建中宫而先近幸左右好色伐性傷於太早有損聖徳不益聖體又上疏太皇太后外議籍籍皆謂皇帝已近女色後宫將有就館者有識聞之無不寒心今聖心已有所知雖不能防於未形猶可以止其將然俟中宫既建然後漸廣繼嗣之路則陛下亦可以不勞聖慮矣它日吕大防奏事太皇太后詰曰劉安世有文字言禁中求乳母事此非官家所要乃先帝一二小公主尚須飲乳也官家常在老身榻前閤内寢處宜無此可說與安世令休入文字其後章惇為宰相上語惇曰元祐初太皇太后遣宫嬪在朕左右者凡二十人皆年長一日覺十人者非素使令頃之十人至十人還復易十人去其去而還者皆色慘沮若嘗涕泣者朕甚駭不敢問後乃知因劉安世等上疏太皇太后詰之惇與蔡卞謀誣元祐大臣嘗有廢立議指安世祖禹言為根二人遂得罪幾死宋史全文卷十三中欽定四庫全書宋史全文卷十三下宋哲宗三庚午元祐五年春正月乙酉范祖禹言臣聞報國之忠莫如薦賢今有劄子四道其一曰經筵闕官宜得老成之人韓維風節素髙奸邪畏之若召維以經筵之職物論必大以為愜其二曰蘇頌近乞致仕頌博文強識詳練國朝典故陛下左右宜得殫見洽聞之士以備顧問其三曰蘇軾文章為時所宗名重海内忠義許國遇事敢言如軾者豈宜使之乆去朝廷其四曰趙君錫孝行書於英宗皇帝實録輔導人君宜莫如孝給事中鄭穆舘閣耆儒操守純正中書舎人鄭雍謹靜端潔言行不妄此三人者皆宜置左右備講讀之職二月丁酉詔去冬愆雪今未得雨宜權罷修黄河從梁燾朱光庭之言也初范純仁旣罷相知頴昌聞朝廷復議修河上疏曰自王安石輕信小人之言勸先皇更改法令而後乘間妄作者紛然其勸更法令者則曰君臣千載一遇時不可失及勸興靈武之師者復曰將為契丹所并時不可失又見欲回復大河者又曰河勢方更恐變改不定范百禄趙君錫相度歸陳回河之害甚明三兩月來却聞復興回河之役更望聖慈再下有司若利多害少尚覬徐圖茍利少害多尤宜安靜疏奏主河議者不悅遂寢而不行後十餘日太皇太后宣諭曰前日范純仁奏何在宰臣奏曰事體難從已鑿改矣太皇太后曰純仁之言有理宜從其請遂又罷河役壬寅邇英閣講畢無逸篇詔詳録所講義以進今後具講義次日别進癸夘詔時雨稍愆應五嶽四瀆州軍令長吏祈禱庚戌潞國公文彦博為守太師開府儀同三司䕶國軍山南西道節度使致仕三月丙寅朔同知樞宻院事趙瞻卒壬申左丞韓忠彦同知樞宻院事蘇頌為右光禄大夫守尚書左丞己夘鄧伯温為翰林學士承旨王巖叟封還詞頭詔以次舎人鄭雍撰詞旣而給事中鄭穆再封還告命不聽巖叟竟徙官范百禄兼侍讀百禄言分别邪正自古所難唯察言觀行考其事實如導人主以聽納則為公正導人主以拒諌則為奸邪導人主以德義則為公正導人主以功利則為奸邪導人主以恭儉則為公正導人主以驕侈則為奸邪導人主以息兵則為公正導人主以用兵則為奸邪導人主以安民則為公正導人主以勞民則為奸邪導人主以進君子則為公正導人主以近小人則為奸邪推此事類以觀人情則邪正分而聦明無惑矣辛夘楊畏為監察御史劉安世朱光庭言御史闕貟屢詔近臣俾舉所知楊畏不係所舉之士未審朝廷何名除授甲午梁燾言竊聞尚書省人吏任永壽等四人連黨為私濫冐恩典竊以左右司之職掌付十有二司之事近者人吏違條冒賞事由都司而後下曽無舉正罪孰甚焉今若置而不問何以儆飭慢官竊恐諸司綱紀寖以不舉又言臣近論奏尚書省都司壞陛下之法廢陛下之令使法制不專於人主詔令不信於朝廷罪惡顯明中外憤鬰若不明行典憲何以肅正紀綱都司者所以按覈六曹二十四司之稽違都司廢法則六曹廢法六曹廢法則百司廢法百司廢法則四方郡縣不守法上下如此何以為國乎夏四月甲辰宰臣吕大防等為時雨不足乞罷免職任詔荅不允蘇轍言去冬無雪今歲春夏時雨絶少二麥不收秋種不入旱勢闊逺歲事可慮詔自今月二十三日後減常饍不御前殿及將來五月一日罷文德殿視朝朕上奉東朝深愧常珍之日闕下臨庶政猶冀嘉言之上聞五月壬申雨詔差役法内有未備事令王巖叟韓川與劉安世同看詳具利害以聞先是安世言治平之前天下戸口一千二百七十餘萬而舊法役人五十三萬六千餘人元豐之後戸口一千八百三十五萬九千有奇較之治平已増五百六十餘萬而新定役人止差四十二萬九千餘人比之舊法却減十萬七千之額以為輪差不足亦己過矣願陛下特奮乾剛力主差役深詔執政固守初議毋使輕徇浮言妄有變易庚寅梁燾權戸部尚書劉安世為中書舎人燾安世並以乞罷鄧伯温承旨除命不從辭所遷官不拜范祖禹留對言慶厯元年七月出御製觀文鑒古圗記以示輔臣皇祐元年召近臣三舘臺諌官及宗室觀三朝訓鑒圗仁宗皇帝講學之外為圖鑒古不忘箴儆又圗寫三朝事迹欲子孫知祖宗之功烈臣願陛下以永日觀書之暇間覽此圗亦好學不倦之一端也六月丁酉司馬康為左司諫上官均為殿中侍御史蘇轍言臣竊觀元祐以來朝廷改更弊事屏逐羣枉經今五年中外帖然惟奸邪失職窺伺便利規求復進動摇貴近臣愚切深憂之若陛下不察其實大臣惑其邪說雜進於朝則氷炭同處必至交爭薫蕕共器乆當遺臭朝廷之患自此始矣時宰相吕大防與中書侍郎劉摰建言欲引用元豐黨人以平舊怨謂之調停太皇太后頗惑之故轍言此退復上疏曰若使邪正並進皆得與聞國事此治亂之機而朝廷所以安危者也泰之為象三陽在内君子旣得其位可以有為小人奠居于外安而無怨方泰之時若君子能保其位外安小人使無失其所天下之安未有艾也惟恐君子得位因勢陵暴小人使之在外而不安則勢將必至反覆故泰之九三則曰無平不陂無往不復聖人所以誨人者至矣獨未聞以小人在外憂而不恱而引之於内以自遺患者也疏奏太皇太后命宰執於簾前讀之仍宣諭曰蘇轍疑吾君臣遂兼用邪正其言極中理宰執從而和之自此兼用邪正之說始衰始中書門下後省凖詔同詳定六曹條例元豐所定吏額主者茍恱羣吏比舊額㡬數倍朝廷患之命量事裁減已再上再却吏有白中孚者告蘇轍曰更額不難定也今左選事不加舊而用吏數倍者昔無重法重禄吏通賄賂則不欲人多以分所入今行重法給重禄賄賂比舊為少則不忌人多而幸於少事今誠抽取逐司兩月事定其分數若比舊不加多則吏額多少之限無所逃矣轍以中孚之言為然乃具以白執政請據實立額竢吏之年滿轉出或事故死亡者不補塡及額而止如此不過十年自當消盡執政以為然遂申尚書省後數月諸司所供文字皆足因裁損成書以申三省左僕射吕大防得其書大喜欲此事必由己出别將詳定任永壽本非三省吏也為人精悍而猾嘗預知元豐吏額事獨能言其曲折大防恱之即於尚書省剏立吏額房使永壽與吏數軰典之凡奏上行下皆大防自專不復經由兩省一日内降畵可二狀付中書其一吏額也省吏白中書侍郎劉摰請封送尚書省永壽見録黄愕然曰兩省初不與乃有此耶即禀大防乞兩省各選吏赴局同領其事大防具以語摰摰曰中書行録黄法也豈有意與吏為道地今乃使就都省分功何也吏額事尋畢永壽等推恩有差永壽急於功利勸大防即以立額日裁損吏貟仍以私所好惡變易諸吏局次吏被排斥者紛然詣御史臺訴不平臺官因言永壽等冐賞徇私不可不懲諌官繼以為言永壽等旣逐而吏訴額禄事終未能决蘇轍時為中丞具言後省所詳定皆人情所便行之甚易而吏額房所改皆人情所不便極難守且大信不可失宜速命有司改從其易以安羣吏之志大防知衆不伏徐使都司再加詳定大略如轍前議行之八月癸巳朔劉摰之為中書侍郎初以吏額房事與吕大防議稍不合士大夫趍利者交闘其間謂大防與摰因是有隙於是造為朋黨之論及摰遷右僕射與大防同列言事者詆摰摰尋罷朋黨之論不可破其本蓋自吏額始癸夘劉摰言昨鄧温伯除翰林承旨人言交興以至罷三四臺諌今來温伯乆已就職梁燾等已别與差遣理合寧帖然而中外人情依舊未安蓋縁昨來言者說破温伯實王安石黨人故進退之際朋類甚衆才見温伯就職便謂朝廷有意動摇政事見燾等罷言職便謂疎薄諌諍温伯雖别無罪狀而其進退之間所繫亦不為小陛下何惜一暫輟温伯選一名郡委任温伯温伯旣動則衆人自安衆人旣定則温伯便可復召則兩皆無嫌各得安處右正言劉唐老言伏覩大學一篇論入德之序願詔經筵之臣訓釋此書上進庶於淸聞之燕以備觀覽從之庚戌梁燾朱光庭累乞外任劉安世乞宫觀詔以燾知鄭州光庭知同州安世崇福宫初除安世中書舎人安世言臣論列温伯至於累章卒不能回是為失職更被褒遷得罪淸議安世固不受於是安世與梁燾朱光庭同出燾光庭所以乞外皆為鄧温伯故也給事中兼侍講范祖禹上帝學八篇九月壬午御邇英閣召講讀官讀書講寳訓召宰臣執政講讀記注官各賜御書詩一首上親書姓名於其後冬十月癸巳詔罷都提舉修河司是日詔導河水入汴己酉徐君平虞䇿並為監察御史蘇轍鄧温伯薦也辛未元祐六年春正月己巳命翰林學士兼侍講范百禄權知貢舉顧臨孔武仲同權知貢舉二月辛夘劉摰守尚書右僕射兼中書侍郎權知開封府王巖叟充樞宻直學士簽書樞宻院事癸巳御史中丞蘇轍為中大夫守尚書右丞吏部尚書蘇軾為翰林學士承旨尋有詔復召朱光庭為給事中劉安世為中書舎人及除蘇軾吏部尚書丁未左司諌楊康國奏臣累彈蘇轍不可為執政陛下以轍兄弟並有文學豈不知王安石章惇吕惠卿蔡確亦有文學乎轍兄弟比王安石則不及當與章惇蔡確吕惠卿相上下其所為美麗浮侈艶歌小詞則並過之雖轍亦不逮其兄矣辛亥王巖叟奏事罷留身曲謝巖叟曰陛下聽政以來納諌從善凡所改更務合人心願每於用人之際更加審察太皇太后曰卿更說與官家因少進而西曰陛下今日進聖學者正為要理㑹邪正兩字正人在朝則朝廷安人君無過舉天下有平治之理邪人一進朝廷便有不安之象太皇太后甚然之又進曰或聞曽有以君子小人參用之說以告陛下果然如此乃誤陛下之言不可聽君子小人無參用之理三月庚申朔御邇英閣吕大防奏仁宗所書三十六事請令圗寫置坐隅從之癸亥進神宗皇帝實録上東嚮再拜然後開編吕大防於簾前披讀未乆簾中慟哭止讀令進壬午御集英殿賜進士馬㳙以下及第總六百有二人癸未賜武舉進士賈君文等二十三人賈易為侍御史安鼎為監察御史姚勔為右正言中書舍人韓川言新除黄庭堅所為輕翾浮豔素無士行詔庭堅行著作佐郎夏四月辛夘詔罷今歲幸金明瓊林苑先是吕大防請為賞花釣魚之㑹有詔用三月二十六日而連隂不解太皇太后諭旨天意不順宜罷宴衆皆竦服壬辰吕大防劉摰奏危竿論一事在三十六事之前注釋失仁宗旨意蓋聖意以為人君居至髙至危之地須用正直之人譬如危竿須用正直之木古人謂邪蒿人君不可食食之固無害以其名不正况邪佞小人乎乙未詔復置通禮科辛亥禮部言每歲宴賞共合用羊乳房約四百五十餘斤請依羊羔例罷供以它物代從之癸丑楊畏為殿中侍御史從中丞趙君錫舉也王巖叟移簡詰劉摰摰不從或曰畏初善摰後吕大防亦善之時大防與摯各有異意皆欲得畏為助君錫薦畏實摰風旨也然畏卒助大防擊摰云太皇太后諭三省曰五月日食可降詔罷朝㑹五月己未朔太史言食二分不及元奏分數秋七月侍御史賈易言臣竊以天下大勢有可畏者有五而旱乾水溢日星謫見不與焉一曰上下相蒙而毁譽不以其眞二曰政事茍且而官人不任其責三曰經費不充而生財不得其道四曰人才廢缺而教養不以其方五曰刑賞失中而人心不知所向己巳蘇軾言浙西諸郡二年災傷而今歲大水蘇湖常三郡水通為一杭州死者五十餘萬蘇州三十萬賈易等疏論浙西災傷不實乞行考驗詔用其說范祖禹封還録黄奏曰德宗正元中江淮大水陸䞇請遣使賑䘏帝曰聞所損殊少贄曰所費者財用所收者人心憲宗元和中南方旱飢遣使賑恤帝戒之曰朕宫中用帛一疋皆籍其數惟賙救百姓則不計費卿軰當體此意七年又謂宰相曰卿軰屢言淮浙去歲水旱近有御史自彼還言不至為害李絳對曰此蓋御史欲為姦諛以恱上意爾帝曰卿言是也命速蠲其租賦夫奏災傷分數過實賑濟用物稍廣此乃過之小者正當闊略不問以救人命若因此懲責一人則自今官司必以為戒將坐視百姓之死而不救矣給㪚無法枉費官廩賑救不及貧弱出糶反利兼并此乃監司使者之事朝廷亦難遥為處畫也今所言伏乞更不施行從之乙酉蘇軾言賈易欲求臣罪只如浙西水灾臣累次論奏蒙採納施行而易扇摇安鼎楊畏以為回邪之人眩惑朝廷乞加考驗治其尤者若非范祖禹鄭雍姚勔因公論奏則行下其言浙中官吏承望風旨不敢實奏灾傷則億萬性命流亡盗賊意外之患何所不至賈易言蘇轍厚貌深情險於山川詖言殄行甚於蛇豕者因與兄軾誹謗先帝放斥於外其兄軾旣立異以背先帝尚蒙㤙宥全其首領先帝厭代軾則作詩自慶曰竹寺歸來聞好語野花啼鳥亦忻然後於䇿題又形譏毁言者固嘗論之及作吕大防制尤加悖慢其辭曰民亦勞止庶臻康靖之期識者聞之為軾股慄先朝行免役則以差役為良法及陛下復行差法則以免役為便民其在杭州務以暴横立威故决配稅户顔章兄弟累年灾傷不過一二分軾則張大其言以甚於熈寧七八年之患又嘗建言以興修水利者皆為虚妄無實而自為奏請浚治西湖虐使捍江廂卒築為長堤於湖中以事遊觀於公私並無利害易以戊子朔奏疏又有别疏宰臣執政進呈具言易疏前後異同之語并簽貼元䟽進入退復具奏曰臣竊知易乃王安禮所善安禮以十科薦之今羣失職之人皆在江淮易實江淮之士來自東南今日之疏不惟摇動朝廷政事亦隂以申羣怨之憤乃詔與易外任後三日以本官知壽州壬辰蘇軾知頴州先是御史中丞趙君錫言先帝上仙軾作詩喜幸乞正典刑賈易相繼言之於是蘇軾言近因弟轍與臣言賈易等論浙西灾傷乞考驗虚實因問弟轍云汝旣備位執政因何行此文字轍云此事衆人心知其非然臺官文字自來不敢不行又王遹亦來見臣云有少事謁中丞臣知遹與君錫親因令傳語君錫大略云臺諌給事中互論灾傷公為中丞坐視一方生靈䧟於溝壑無一言乎不謂觸忤君錫遂至於此八月乙未趙君錫為吏部侍郎賈易初論蘇軾題詩怨謗君錫亦相繼論軾太皇太后不恱諭三省曰君錫全無執守韓忠彦問趙君錫賈易罷豈非為言蘇軾否曰是也先帝三月上仙軾五月題詩云軾别有意似此使人何可當也鄭雍為御史中丞右正言姚勔為左正言監察御史虞䇿為右正言甲寅宰臣吕大防言近講筵官奏乞修邇英記注如仁宗朝故事已有旨施行今史院有邇英延義二閣記注十餘卷具載仁宗與講讀官議論欲寫一本進入以備聖覽上可之詔别寫一本送資善堂王巖叟言秋氣已凉陛下間燕之中足以留意經史舜鷄鳴而起大禹惜寸隂願以舜禹為法上曰朕在禁中常觀書不廢也上問巖叟從誰學對曰從河東寗智先生學後隨仕四方無常師上問因甚識韓琦對曰因隨侍閒居北門始識之遂薦辟學官又辟幕府又隨之居相三年至其葬乃去琦嘗教臣以事君之道前不希寵後不畏死左右無所避中間惟有誠意而已臣佩以終身上稱歎乆之又嘗因對論取士對曰天下非無材取之不逺採之不博耳所遷所擢止於己用者數人而已故朝廷有乏材之患搢紳有沉滯之歎且如天下郡守縣令最可以見治狀每歲使本道監司舉一二性行端良治狀優異者朝廷召而用之則人思自奮矣上曰甚好上問治道何先對曰在上下之情交通而無壅蔽之患上下之情所以通由舉仁者而用之仁者之心上不忍欺其君下不忍欺其民故君有恩意推而達于下民有疾苦告而達其上不以一身自便為心上曰安知仁人而舉之對曰巧言令色鮮矣仁剛毅木訥近仁上頷之九月癸巳御集英殿試制科舉人冬十月丙寅邇英讀寳訓至節費王巖叟曰大凡節用須每事以節省為意則積日累月國用自然有餘上曰然庚午幸國子監詣至聖文宣王殿行釋奠禮一獻再拜幸太學國子祭酒豐稷講尚書無逸終篇遂幸昭烈武成王廟肅揖禮畢還内先是范百禄轉對請視學故有是舉或謂吕大防曰祖宗視學非有爵命之賞則有金帛之賜大防曰古者天子視學蓋常事也吾固欲天子時一幸金爵之賚後日何可繼也聞者乃服癸酉鄭雍楊畏對甚乆論右僕射劉摰及右丞蘇轍也雍具摰黨人姓名王巖叟劉安世韓川朱光庭趙君錫梁燾孫升王覿曽肇賈易楊康國安鼎張舜民田子諒葉伸趙挺之盛陶龔原劉槪楊國寳杜純杜紘詹適孫諤朱京馬傳慶錢世雄孫路王子韶吳立禮凡三十人姚勔八奏並言摰朋黨不公虞䇿四奏言摰親戚趙仁恕王鞏犯法施行不當甲戌劉摰蘇轍以王鞏坐罪摰與鞏為姻家轍薦鞏皆自劾乞正典刑詔答不允王巖叟奏劉摰以人言避位今朝廷淸明天下安靜一時戮力盡忠之臣摰居其最豈可因一二偏詞輕示遐棄安知其間無朋邪挾私而隂與羣奸為地者不報太皇太后獨遣中使賜蘇轍詔諭令早入省供職辛巳上諭吕大防曰論劉摰者已十八章乃邢恕過京師摰與通簡又延接章惇之子牢籠為它日計初邢恕赴貶所舟行過京師摰與恕故相善因以簡别摰摰答簡其末云為國自愛以俟休復監東排岸官茹東濟數有求於摰弗得怨之亟取摰簡録其本送鄭雍楊畏二人者方彈劾摰乃解釋簡語以休復為復子明辟之復謂摰勸恕俟太皇太后它日復辟也又言摰嘗館章惇之子于府第故太皇太后怒癸未王巖叟言臣之區區不為一劉摰蘇轍為陛下惜腹心之人耳宣諭曰樞宻之言是也固亦不深罪摰為摰垂簾之初有功巖叟曰言事官未必皆忠直臣聞楊畏乃吕惠卿面上人但欲去除陛下腹心之人便是與姦邪開道路耳十一月乙酉朔劉摰為觀文殿學士知鄆州麻制以從摰所乞為辭壬辰給事中朱光庭知亳州初劉摰罷相麻制光庭封還言摰有功大臣不當無名而去言者若指臣為朋黨願被斥逐不辭於是光庭與摰相繼俱罷詔新厯以元佑觀天厯為名辛丑守中書侍郎傅堯俞卒太皇太后謂執政曰堯俞淸直人又曰金玉人也可惜不至宰相司馬光嘗謂邵雍曰淸直勇三德人所難兼吾於欽之畏焉雍曰欽之淸而不耀直而不激勇而能温尤為難矣時以雍之言為然己酉董敦逸黄慶基並為監察御史十二月戊辰是夕開封府火吕大防言聞有客星在昴畢間王巖叟曰天道逺不可知變見果為何事但朝廷每事修省天道自當順應太皇太后曰天道安敢忽更在執政大臣同修政事壬申元祐七年春二月乙丑詔編修樞宻院條例官就編修經武要略三月甲申朔侍讀顧臨讀仁宗寳訓至鈔法事吕大防奏曰自鈔法之行一則人户無科買之擾二則商旅無折閱之弊三則邊儲無不足之患四則物貨無般輦之勞五則運塩減脚乘之費實於官私為利上甚善之王巖叟奏曰陛下宫中何以消日上曰並無所好惟是觀書巖叟曰大抵聖學要在專勤屏去它事則可謂之專乆而不倦則可謂之勤如此天下幸甚丁亥三省進呈程頥服闋欲除館職判登聞鼓院太皇太后不許乃以為直祕閣判西京國子監初頥在經筵歸其問者甚衆而蘇軾在翰林亦多附之者遂有洛黨蜀黨之論二黨道不同互相非毁頥竟罷去及進呈除目蘇轍遽曰頥入朝恐不肯靜太皇太后納其言故頥不復得召講義曰嘗謂自古朋黨多矣未有若元祐之黨為難辨也蓋以小人而攻君子此其黨易辨也以君子而攻小人此其黨亦易辨也惟以君子而攻君子則辨之也難且我朝冦丁之黨為冦者皆君子為丁者皆小人吕范之黨為范者皆君子為吕者皆小人其在一時雖未易辨也詳觀而熟察之亦不難辨也而元祐之所謂黨者何人哉程曰洛黨蘇曰蜀黨而劉曰朔黨彼皆君子也而互相排軋此小人得以有辭於君子也程明道謂新法之行吾黨有過愚謂紹聖之禍吾黨亦有過然熈寧君子之過小元祐君子之過大熈寧之爭新法猶出於公元祐之自為黨皆出於私也范祖禹言臣掌國史伏覩仁宗皇帝在位四十二年豐功盛德固不可得而名言所可見者其事有五畏天愛民奉宗廟好學聽諫仁宗行此五者於天下所以為仁也臣願陛下深留聖思法象祖宗又言臣觀仁宗每因事示人好惡皇祐中楊安國講直哉史魚邦有道如矢邦無道如矢君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之仁宗曰蘧伯玉信君子矣然不若史魚之直由是天下知仁宗好直不好佞此聖人之大德也如此之類臣願陛下以仁宗為法上然之先是六年十一月辛亥客星出參宿度中犯厠太史言主有暴兵米貴晉分兵灾壬子犯九㳺星十二月癸酉行入奎宿度中太史言主邊兵動今年正月隨天運行入濁不見至是月辛亥在奎宿度中稍伏夏四月臣寮上言科場限字條制已得旨䇿過二分更不降等而賦論經義未蒙指揮往時開封舉人路授倡為長賦㡬千言得張方平擯斥而其文遂正嘉祐初劉㡬軰善為怪僻句得歐陽脩革去而其風復雅但繫主司之風化耳今朝廷立法不問其文之澆淳而校其字之多寡責其不及猶有勸懲禁其多文殊無義理詔賦論過二分並不降等其經義文理優長者凖此范祖禹言王存端立厚重素有人望蘇軾文章為天下第一但忌嫉者多趙彦若博學多文詳練故事鄭雍自居言職風望愈髙今講讀官有闕此四人者實允衆論程頥本末别具論列孔武仲學問該洽講說明白吕希哲是司空公著之子公著嘗言此子不欺闇室其人經術履行識者皆謂可備勸講吕大臨是大防之弟修身好學行如古人吳師仁自為布衣以行誼稱於士大夫又奏程頥經術行誼天下共知司馬光吕公著與頥相知二十餘年然後舉之此二人者非為欺罔以誤聖聽也頥草茅之人一旦入朝未習朝廷事體迂踈則固有之又謂頥欲以故舊傾大臣以意氣役臺諌其言皆誣罔非實若復召頥勸講必有補聖明臣雖終老在外無所憾矣時祖禹屢請知梓州執政擬從其請太皇太后曰皇帝未欲令去且為皇帝留之執政諭旨祖禹乃不敢復請五月董敦逸言程頥怨躁輕狂惑衆慢上丙戌詔程頥許辭免直秘閣差管勾崇福宫頥表言請歸田里詔不許旣有崇福之命頥但稱疾不拜假滿百日亟尋醫訖不就職丙午王巖叟為端明殿學士知鄭州以楊畏言巖叟天資至險彊愎循情父子豫政貨賂公行黄慶基言巖叟廢法徇私彊狠自用父荀龍子横交通貨賄弄威福而巖叟遂稱疾章再上故有是命六月癸丑朔詔淮南東西兩浙路諸般逋負不問新舊有無官本並特與權住催理一年從蘇軾之言也辛酉吕大防為右光禄大夫蘇頌守尚書右僕射兼中書侍郎蘇轍守門下侍郎韓忠彦知樞宻院事范百禄守中書侍郎翰林學士梁燾守尚書左丞御史中丞鄭雍為尚書右丞權戸部尚書劉奉世簽書樞宻院事戊辰李之純為御史中丞楊畏為侍御史詔太廟復用牙盤食壬申御邇英閣侍讀顧臨讀寳訓至王㳂論引漳水灌漑王軫以為不可讀畢上問顧臨曰㳂軫所論孰長是何說可行臨曰㳂說可行它日右僕射吕大防進曰臣側聞顧臨讀寳訓引漳河灌漑事臣謂大抵河渠利害最為難明如本朝黄河持議者有三說一曰逥河二曰塞河三曰分水本朝有二股河分流水勢粗免河患後因閉塞一股併入一股合流遂至决溢分水之利從可知矣今為四堤二河分減水勢實為大利九月先是詔議郊祀典禮顧臨范祖禹等八人議請合祭天地范純禮范汝礪曽肇王覿豐稷劉安世孔武仲陳軒歐陽棐韓治等二十二人議南郊合祭天地不見於經太皇太后曰宜依仁宗先帝故事皇帝即位以來未曽親祀天地今且合祭宜有名者大防等曰今蒙聖諭正如衆議欲依此令學士院降詔冬十月庚戌朔環州地再震戊午來之邵為監察御史十一月癸巳冬至合祭天地于圜丘以太祖配禮畢終日和燠翼日風寒相属時雪如期十二月辛亥范祖禹言仁宗在位最乆德澤深厚結於天下是以百姓思慕終古不忘陛下誠能上順天意下順民心法仁宗則垂拱無為海内晏安成康之隆不難致也臣承乏史官嘗采集仁宗聖政得數百事欲乞撰録成書上進少資睿覽監觀成憲皆舉而行以副羣生之所願祖禹尋采集仁宗聖政三百七十事編録成書名曰仁皇訓典凡六卷上之癸酉元祐八年春正月甲申英州别駕新州安置蔡確卒丁亥上御邇英閣講禮記讀寳訓顧臨讀至漢武帝籍提封為上林苑仁宗曰山澤之利嘗與衆共之河用此也丁度對曰臣事陛下二十年每奉德音未始不本於憂勤此蓋祖宗家法爾讀畢宰臣吕大防等進曰祖宗家法甚多所立最善自古人主事母后朝見有時祖宗以來事母后皆朝夕見此事親之法也前代大長公主用臣妾之禮仁宗以姪事姑此事長之法也上曰今宫中見行家人禮大防等曰前代宫闈多不肅本朝宫禁嚴宻此治内之法也前代外戚多預政事本朝母后之族皆不預事此待外戚之法也前代宫室多尚華侈本朝宫殿止用赤白此尚儉之法也前代人君雖在宫禁出輿入輦祖宗皆步自内庭出御後殿此勤身之法也前代人主在禁中冠服茍簡祖宗以來燕居必以禮此尚禮之法也前代多深於用刑唯本朝臣下有罪止於罷黜此寛仁之法也此皆祖宗家法所以致太平者陛下不須逺法前代但盡行家法足以為天下上甚然之二月崇政殿說書吕希哲為右司諌希哲固辭之蘇軾戯謂希哲曰法筵龍象當觀第一義希哲笑而不應退謂范祖禹曰若辭不獲命必以楊畏為首時畏方在言路以險詐自任故希哲云爾三月壬午詔蘇頌累乞解機政可依所請以大學士留京師己丑黄慶基言前日陛下罷黜劉摰王巖叟朱光庭孫升韓川軰而洛黨稍衰然洛黨雖衰川黨復盛矣庚寅范祖禹言臣前上仁皇訓典願陛下法則仁宗臣常以畏天者莫如仁宗故願陛下先誠於事天中春以來暴風雨雪寒氣過甚惟陛下戒之重之側身修德以銷大異辛夘范百禄充資政殿學士知河中府詔來年御試將詩賦舉人復試三題經義舉人且令試䇿此後全試三題夏四月丁巳詔令後南郊合祭天地依元祐七年例施行五月癸未蘇軾同吕希哲吳安詩豐稷趙彦若范祖禹顧臨上言臣等備貟講讀伏見唐宰相陸贄論深切於事情言不離於道德智如子房而文則過辨如賈誼而術不踈上以格君心之非下以通天下之志使德宗盡用其言則貞觀可得而復陛下能自得師莫若近取諸䞇臣等欲取其奏議稍加校正繕寫進呈必能發聖性之髙明成治功於歲月辛夘董敦逸黄慶基皆罷坐言尚書蘇轍蘇軾不當也壬辰三省同進呈於是大防轍等奏曰先帝聖意本欲富國彊兵以鞭撻四夷而一時羣臣將順太過故事或失當及太皇太后與皇帝臨御因民所欲隨事救改蓋事理當然耳眞宗即位弛逋欠以厚民財仁宗即位罷修宫觀以息民力凡此皆因時施宜以補助先朝闕政亦未聞當時士大夫有以為毁謗先朝者也近自元祐以來言事官有所彈擊多以毁謗先帝為詞非唯中傷士人兼欲摇動朝廷意極不善若不禁止乆逺不便於是得旨敦逸慶基並與知軍差遣六月戊午左丞梁燾充資政殿學士同醴泉觀使燾初以議邊事不合即属疾求罷上皆遣内侍封還仍問所以必去之理并訪人材燾曰人材可大任者聖主當自知之但須識别邪正公天下之善惡則天下受福陛下必欲知可大用之人無過且圖仍舊人有人望者尋出知穎昌臨行宣諭曰己用卿言復相范純仁矣己未楊畏言純仁方罷帥降官遽命以為相賞罰未明何以詔示天下來之邵又言純仁師事程頥闇狠不才皆不聽或曰畏與蘇轍皆蜀人前擊劉摰後擊蘇頌皆隂為轍道地太皇太后覺畏私意故復自外召范純仁畏尋又言轍不可大用云吕中曰羣而不黨君子之道也而主子瞻者攻正叔主正叔者攻子瞻非君子之黨乎和而不同者君子之道也而差役法行同己者喜之異己者斥之非君子之同乎矜而不爭者君子之道也而回河之議蘇軾與大防爭貶確之事范純仁又與劉安世爭非君子之爭乎易事而難說君子之道也司馬光恱於蔡京蘇公恱於楊畏非君子之說乎凡是數者皆以君子無以自别於小人故始為小人所恱終為小人所䧟其極至於為小人所汙不能自辨矣人皆謂元祐之失在於分别之太過惟朱文公謂元祐之失正在於决擇之未精此未親政之時小人之勢已足以勝君子况於己親政乎秋七月丙子朔范純仁為尚書右僕射兼中書侍郎太皇太后宣諭曰公父仲淹在章獻明肅垂簾時唯勸章獻明肅盡母道及仁宗親政唯勸仁宗盡子道可謂忠臣公必能繼紹前人純仁頓首謝八月丙午朔辛酉太皇太后有疾丁夘吕大防范純仁蘇轍鄭雍韓忠彦劉奉世入崇慶殿後閣問太皇太后聖體太皇太后諭大防等曰今疾勢有加與相公等必不相見且善輔佐官家為朝廷社稷初大防等欲退太皇太后獨留純仁意欲有所属也上令大防以下皆往大防曰近聞聖體向安乞稍寛聖慮服藥太皇太后曰不然政欲對官家說破老身没後必多有調戯官家者宜勿聽之公等亦宜早求退令官家别用一畨人乃呼左右問曽賜出社飯否因謂大防曰公等各去喫一匙社飯明年社飯時思量老身也九月戊寅太皇太后崩范祖禹言太皇太后登遐陛下今將總覽庶政延見羣臣此乃宋室隆替之本社稷安危之基天下治亂之端生民休戚之始君子小人消長進退之際天命人心去就離合之時也可不謹哉今陛下所宜先者莫如報太皇太后之德也陛下如欲報太皇太后之德莫若循其法度而謹守之太皇太后嚴正至靜不可干犯故能斥逐姦邪以淸朝廷裁抑僥倖以肅宫禁故雖德澤深厚結於百姓而小人怨者亦不為少矣今必有小人進言曰太皇太后不當改先帝之政逐先帝之臣此乃離間之言不可不察也初太皇太后同聽政中外臣民上書者以萬計皆言政令有不便者太皇太后因天下人心欲改故與陛下同改之非以己之私意而改也旣改其法則非法之人及主其法者有罪當逐陛下與太皇太后亦以衆言而逐之其所逐者皆上負先帝下負萬民天下之所讎疾衆庶所欲同去者也惟陛下辨察是非斥逺佞人深拒邪說有敢以姦言惑聖聽者宜明正其罪付之典刑陛下初攬政事乃小人乘間伺隙之時也故不可不預防之此等旣上誤先帝今又復誤陛下天下之事豈堪小人再破壞耶初蘇軾與祖禹約皆上章論列軾章已成見祖禹章觀畢曰軾願附名止於臣字下加等字後數日祖禹又言先太皇太后以大公至正為公罷王安石吕惠卿等所造新法而行祖宗舊政故社稷危而復安人心離而復合乃至契丹主亦與其宰相議曰南朝尊行仁宗皇帝政事可敕燕京留守使邊吏約束無生事陛下觀戎狄之情如此則中國人心可知也今陛下親萬機小人必欲有所動摇而懷利者亦皆觀望臣願陛下上念祖宗之艱難先太皇太后之勤勞痛心疾首以聽用小人為刻骨之戒守元祐之政當堅如金石重如山岳使中外一心歸於至正則天下幸甚冬十月吕陶言自太皇太后垂簾以來屏黜兇邪裁抑僥倖小人之心不無怨憾萬一或有姦邪不正之言上惑聖聽謂太皇太后斥逐舊臣更改政事今日陛下旣親萬機則某人宜復用某事宜復行此乃治亂之端安危之機君子小人消長之兆在陛下察與不察辨與不辨也吕希純言君子小人用心不同邪正之論不可不察有昔時自以過惡招致公論坐法沉廢者朝思夜度唯望乘國家變故朝廷未寧之時進為險語以動上心其說大約不過有三一者必謂神宗所立法度陛下所宜修復二者必謂陛下宜獨攬權綱不宜委信臣下三者必謂向來遷責者當復收用三者之言行將至矣十一月樞宻院出劉瑗以下十人姓名並換入内供奉官三省但將有過犯馮景黄某二人見持服劉瑗李㲄二人不行外抽取六人蘇轍奏曰陛下方親政中外賢士大夫未曽進用一人而推恩先及於近習外議深以為非後數日樞宻院復出内批以劉惟簡隨龍除内侍省押班梁從政内侍省都知靖方帶御器械中書舎人吕希純封還詞頭上曰只為禁中闕人兼有近例轍曰此事非謂無例蓋謂親政之初先擢内臣故衆心驚疑上釋然曰除命且留竢祔廟取旨可也旣退大防等知上從善如流莫不相慶范祖禹言近聞陛下召内臣十人而李憲之子亦在其中又召數人而王中正之子亦在數中外民庶皆言執政大臣不能固執置陛下於有過之地不報遂請對劄子言熈寧之初王安石吕惠卿等造立新法先言天不足畏衆不足從祖宗不足法幸頼先帝聖明覺悟再罷安石兩逐惠卿終元豐之世不復召用而所引小人布滿中外日夜伺候今日事變妄意陛下以修改法度為是如使小人得至朝廷必進姦言上以惑誤陛下次以傾害善人下以脅持羣臣豈惟正人不敢立朝臣恐宋室自此陵遲不復振矣又言先帝天資英睿聖學髙明可謂不世出之主也而内外為小人所誤外興師旅内興百役凡不便民之事皆羣小所為而先帝受天下之謗臣嘗痛之故不願陛下復近小人盖以此也陛下誠能聽臣之言悉追罷召用内臣指揮則中外之人稱誦聖德萬口一辭祖禹旣讀劄子又面奏章惇等不可用又奏召用中官不謂陛下有此政事上曰卿所論朕已曉祖禹曰臣乞携此章付執政且詰責之上曰且留此朕欲再看先是吕大防欲用楊畏為諌議大夫純仁曰上新聽政諌官當求正人畏傾邪不可用大防素稱畏敢言且先宻約畏助己竟擢遷畏為禮部侍郎畏尋上疏言神宗更法立制以垂萬世乞賜講求以成繼述之道上即召畏登對詢畏以先朝故臣孰可召用者畏即疏章惇安燾吕惠卿鄧温伯李淸臣等行義多加題品且宻奏書萬言具言神宗所以建立法度之意乞召章惇為宰相上皆嘉納焉甲戌紹聖元年正月戊子鄧温伯權知貢舉范祖禹王覿虞䇿同權知貢舉二月丁未守戸部尚書李淸臣守中書侍郎守兵部尚書鄧温伯守尚書左丞淸臣首倡紹述温伯和之二人乆在外不得志遂以元豐事激怒上意淸臣尤力伴送北使張元方還言相滑等州饑民衆多倉廩空虚蘇轍見范純仁鄭雍議曰此事豈可不令上知二人皆不欲轍曰昔眞宗初即位李沆作相每以四方水旱盗賊聞奏王旦謂沆曰不宜以細事撓上聽沆曰人主年少當令常聞四方艱難不爾侈心一生無如之何吾老不及見此參政異日憂也純仁曰善及對純仁具奏上曰為之奈何轍曰滑州已支山陵餘粮萬石與之又京城賑濟應用備糧然省倉軍粮才有二年五箇月備上曰何其寡備至此轍曰此非一日之故熈寧初臣在條例司竊見是時有九年以下粮上曰須九年乃可轍曰九年未易遽置但陛下嘗以為意重節浮費令三年間有三五年備亦漸可也三月壬申朔日蝕雲霧不辨癸酉上批新知陳州蔡卞為中書舎人乙亥吕大防為觀文殿大學士知頴昌府後二日改知永興軍大防當國日乆羣怨交歸焉及宣仁始祔廟神宗所簡拔之人章惇安燾吕惠卿等以次進用大防亦自求去位上亟從之乙酉上御集英殿試進士䇿曰朕之臨御㡬十載矣復詞賦之選而士不加勸罷常平之官而農不加富可雇可募之說雜而役法病或東或北之論異而河患滋賜土以柔逺也而𦍑夷之侵未弭弛利以便民也而商賈之路不通此其故何也夫可則因否則革惟當之為貴聖人亦何必焉李淸臣之詞也丁酉上御集英殿賜進士畢漸以下緫六百人時初考官取荅䇿者多主元祐楊畏覆考專取主熈寧元豐者故漸為之首蘇轍依前官知汝州先是轍言御試䇿題歴詆近歲行事有欲復熈寧元豐故事之意臣願陛下勿輕事改易若輕改九年已行之事擢任曩歲不用之人人懷私忿而以先帝為詞則大事去矣不報轍又言聖意誠謂先帝舊政有不合改更自當宣諭臣等令商量措置今日宰臣以下未嘗略聞此言而忽因䇿問進士宣露宻旨譬如家人父兄欲有所為子弟有不預知而與行路謀之可乎上固不恱李清臣鄧温伯又先媒蘖之詔以轍為端明殿學士知汝州夏四月甲辰蔡卞同修國史翟恩為左司諌上官均為左正言張商英為右正言商英前自開封府推官出為河北西路提刑改江西運副又徙淮南踰五年不復召於是始擢諌官故商英攻元祐大臣不遺餘力商英嘗奏䟽論神考發明道德之意以作成人才同一風俗大志未集神靈在天宣仁保佑陛下託心腹於輔弼寓視聽於臺諌而勢利之下是非蠭起浮言競作鄙諺交興川洛異黨秦汶分朋撥而後動謂之天平子大而無見謂之盲大蟲交通相紐謂之八關隂私架造謂之五鬼誰何門戸謂之約閙抱持具足謂之小鬼捨所親而去謂之過房失所合而還謂之歸宗伺察報探謂之㓕門瞪走馬瞪勢盡相圖謂之徒中反告臣愚欲乞陛下以臣此章降手詔戒厲揭之朝堂風示四方乙巳三省言役法尚未就緒上曰止用元豐法而減去寛剩錢百姓何有不便邪范純仁曰四方各不同須因民立法乃可乆也上曰令戸部議之庚戌曽布為翰林學士布自髙陽徙江寧詔許入覲言先帝政事當復施行且乞改元以順天意壬子虞䇿言吕惠卿等指陳蘇軾所作誥詞語涉譏訕來之邵言軾凡作文字譏斥先朝當原其所犯明正典刑制依前左朝奉郎知英州癸丑御札改元祐九年為紹聖元年范祖禹為龍圖閣直學士知陜州先是祖禹屢請補外上曰不須入文字執政官有缺蓋上欲以祖禹代蘇轍也旣而沮之者甚衆祖禹故求出乃有是命詔王安石配享神宗壬戌章惇守尚書左僕射兼門下侍郎制詞略曰方政令出於簾幃操柄歸於廊廟善政良法多所紛更正色危言不憚強禦范純仁充觀文殿大學士知頴昌府曽布修神宗正史朱勃言應選人歴任通及三考以上方許奏舉改官從之丁夘中書省言推行差役民間苦於差擾詔府界諸路役色依元豐八年見行條約施行鄧温伯言舊名潤甫昨避髙陳王諱今請復舊名從之閠四月辛未朔監察御史郭知章為殿中侍御史壬申陸師閔等二十三人為諸路提舉常平等事井亮采請罷十科舉士法從之翟思言先帝正史將以傳示萬世訪聞秉筆之臣多刋落事迹變亂美實以外應姦人誣詆之說今旣改命史官須别起文請降旨取日厯時政記與今實録參對從之甲申安燾為門下侍郎乙酉吕惠卿知蘇州虞䇿請復置天下義倉每苗稅一石出米五升自來年為始專充賑濟詔蘇軾合叙復日未得與叙復秦觀監處州茶鹽酒稅乙未章惇入見遂就職丙申詔惇提舉修神宗皇帝實録國史黄履為御史中丞五月甲辰詔進士罷試詩賦專治經術三省勘㑹今來旣純用經術取士其應用文詞如詔誥章表箴銘賦頌赦敕檄書露布戒諭之類在先朝亦嘗留意未及詔科詔别立宏詞一科每科場後許進士登科人經禮部投狀乞試甲寅郭知章言先皇帝闢地進壤扼西戎之咽喉元祐初用事之臣委西塞而棄之外示以弱寔生戎心乞檢閱議臣名氏顯行黜責惇等因開列初議棄地者自司馬光文彦博而下凡十一人己未楊畏為吏部侍郎初吕大防旣超遷畏畏知章惇必復用有張擴者惇妻之姪也畏見擴致意云畏度事勢輕重因吕大防蘇轍以逐劉摰梁燾軰又欲并逐大防及轍而二人覺之遽罷畏言職畏迹在元祐心在熈寧元豐首為公闢路者及惇赴召百官郊迎畏獨請間語多斥大防有直省官聞之歎曰楊侍郎前日謟事吕相公亦如今日見章相公也惇信其言故又遷畏吏部六月吕大防降授右正議大夫知隨州劉摰特落觀文殿學士降授左朝議大夫知黄州蘇轍特降授左朝議大夫知袁州蘇軾責授寧逺軍節度副使惠州安置甲申禮部言太學博士詹文奏乞除去字說之禁從之梁燾落資政殿學士降授左中㪚大夫知鄂州劉安世落寳文閣待制知南安軍吳安詩落直集賢院監光州鹽酒稅韓川落龍圗閣待制知防州孫升特落集賢院學士知房州陳瓘尊帝餘言云臣願陛下詔張商英而問之曰宣仁聖烈皇后果有不忠之意乎十有九章上于宣仁者誰言之也致往之義當如之何過而不改是謂過矣大抵周秩五章張商英六章黄履三章翟思劉拯上官均來之邵井亮采各一章八人共十九章也丙戌詔蔡確特追復觀文殿學士贈特進辛夘周秩言事失當罷監察御史差權知廣德軍是日三省以周秩所上二章進呈讀至秩言向者有御批欲増隆皇太妃儀物又如治平中議濮廟事令吕大防如何住得所以求去上曰大防何嘗有言今周秩越次及之是迎合也又進讀至邪說甚行使天子不得尊其母上曰此言激怒也如秩趣操甚狂若置之言職朝廷無有安靜之理其罷絀之秋七月張商英言吕希純於元祐中嘗繳駁詞頭不當及附㑹吕大防蘇轍事乃奪希純寳文閣待制知亳州如故丁巳三省言范純仁韓維朋附司馬光長縱羣凶毁訕先帝變亂法度内范純仁仍首建棄地之議詔純仁特降一官初章惇請責純仁上曰純仁持議公平非黨也但不肯為朕留耳惇曰不肯留即黨也上勉從惇請三省言前後臣僚上言論列元祐以來司馬光等罪惡未正典刑及吕大防等罪大罰輕詔司馬光吕公著各追所贈官並諡告及追所賜神道碑額仍下陜西鄭州各於逐官墳所拆去官修碑樓及倒碑磨毁奉敕所撰碑文訖奏王巖叟所贈官亦行追奪知隨州吕大防行祕書監分司南京郢州居住知黄州劉摰試光禄卿分司南京蘄州居住知袁州蘇轍試少府監分司南京筠州居住梁燾鄂州居住劉安世南安軍居住戊午詔司馬光等各以等第行遣責降訖其餘一切不問議者亦勿復言所有見行取㑹實録修撰官以下及廢棄渠陽寨人自别依敕處分來之邵劉拯等乞復免行錢法九月甲辰黄慶基董敦逸並為監察御史庚戌三省同進呈考試制科張咸吳儔陳𤾉三人中第五等推恩上曰先朝嘗罷此科何時復置知章等對曰元祐二年復置上曰進士䇿文理有過於此者因詔罷制科吕惠卿知大名府三省樞宻院同呈除目韓忠彦曽布因言章惇秉政以來所引皆闒茸小人陛下以天下公論召汝礪而沮格不行吕升卿於罪謫中致仕而惇不禀旨召令再仕王欽臣謝表語侵御史而惇欲削職降官周秩譏切朝廷而惇多方欲曲庇其罪陛下不欲與惠卿復職而終須復不欲除林希經筵而終須除以是上下畏之獨臣與忠彦曽稍開陳他人有敢言其非者否上曰此固當開陳也冬十月庚寅常安民為監察御史安民先召對言元祐中進言者以熈寧元豐之政為非而當時為是今日進言者以元祐之政為非而熈寧元豐為是皆為偏論願陛下公聽並觀是者行之非者改之無問新舊惟歸於當上深然之謂執政曰安民議論公正無所阿附國子司業龔原奏王安石在先朝時嘗進所撰字說二十二卷具書發明至理欲乞差人就安石家繕寫定本降付國子監雕印以便學者傳習詔可降吕希純知忻州張商英之自右正言遷左司諌也具奏曰願陛下無忘大臣擅權時願章惇無忘在汝州時願安燾無忘在許昌時願李淸臣曽布無忘在河陽時曽布因指陳商英言願陛下無忘皆臣所不曉上曰商英言事多如此過當耳十一月蔡確特追復觀文殿大學士己丑常安民言北都為河朔重鎭旣除吕惠卿為留守而惠卿辭疾臣願陛下振發主斷趣令起發因面奏惠卿賦性深險王安石拔引為執政及得志遂攻安石使移此心以事君其薄可知惠卿若見陛下必言先帝而泣以感動陛下希望留朝廷及惠卿過闕請對旣見上果言先朝事而泣上正色不荅計卒不得施而去時論快之甲午三省同進呈臺諌官前後章疏言實録院所修先帝實録類多附㑹姦言詆斥熈寧以來政事乞賜重行竄黜上曰史官敢如此誕慢不恭須各與安置詔范祖禹責授武安軍節度副使永州安置趙彦若責授安逺軍節度副使澧州安置黄庭堅責授涪州别駕黔州安置乙亥紹聖二年春正月丙午楊畏為寳文閣待制知成德軍畏旣叛吕大防附章惇及李淸臣安燾與惇異議復隂附安李而惇亦徐覺其險詐乃命畏出守黄履言朝廷以趙彦若等修纂先帝實録厚加誣毁皆已竄逐惟監修官吕大防獨得幸免詔吕大防特追奪兩官趙彦若范祖禹陸佃曽肇林希並追奪一官黄庭堅特追一官詔國子監大學武律學並依元豐七年終以前見行條制二月丁夘朔日有食之雲隂不辨三月丁酉林希權禮部尚書常安民言希章惇之黨為惇謀客由是惇與其黨日毁短安民於上前謂安民力主元祐意欲為范祖禹等營解邢恕為寳文閣待制知青州夏四月恕入對涕泣曰臣不謂今日復得見陛下以至淚濺御袍上不樂遂令赴靑州先是恕請覲韓忠彦曰所言必有以惑聖聽上曰恕自謂有定䇿功曽布曰恕嘗謂元祐執政言恕雙手分付與个太平天下却逐恕在外聞者皆笑之上亦笑布又曰此人學識以至盡心公家誠不可得但多犯分如欲調一確與司馬光令新舊人恊心同力此豈可得上亦笑之八月甲申詔應吕大防等永不得引用朞數及赦恩叙復九月范純仁在陳州齋戒上奏曰竊見吕大防等竄謫江湖已更年祀未蒙恩旨乆困拘囚仰惟陛下每頒赦令斬絞重囚髠黥徒𨽻咸蒙赦宥股肱近臣簮履舊物肯忘軫惻常俾流離在漢有黨錮之寃於唐有牛李之黨後皆淪胥善類貽患朝廷數十年間未能消弭癸夘上批范純仁立異邀名沮抑朝廷已行之命可落觀文殿大學士知隨州上始亦有意從純仁所奏章惇力主前議且謂純仁同罪未録遂并責之辛亥大享于明堂壬戌詔監察御史常安民立心凶險處性頗邪荐致人言姦狀甚著畀之要路誠非所宜可罷監察御史送吏部與降監當差遣初安民言蔡京姦足以惑衆辨足以飾非巧足以移奪人主之視聽力足以顚倒天下之是非内結中官外連臺諌今在朝之臣京黨過半陛下若不早覺悟逐去之他日援引羣姦布滿中外變移是非隂奪人主之權羽翼已成就欲去之嗟無及矣又為上言今大臣為紹述之說者其實皆借此名以報復私怨一時朋附之流從而和之遂至已甚張商英在元祐時上吕公著詩求進其言諛佞無耻士大夫皆傳笑之及近為諌官則上疏論司馬光吕公著乞斵棺鞭尸陛下察此軰之言果出於公論乎朝廷凡事不用元祐例至王珪家䕃孫五人皆珪身後所生乃引元祐例許奏薦近日講復官制職事官不帶職寄禄官不帶左右至於權尚書侍郎獨以林希李琮之故不復改易如此等事謂之公心可乎故凡勸陛下紹述先帝者皆欲託先帝以行姦謀謂他事難以惑陛下若聞先帝則易為感動故欲快恩讎䧟良善者須假此以移陛下之意不可不察宣仁聖烈皇后甚得人心前日陛下駕幸秦楚國夫人第澆奠及輟朝并命敕葬諸費從官給人人無不歡呼今權臣恣横朋黨滿朝言官未嘗一言及之惟知論元祐舊事力攻已去臣僚臣荷陛下奬㧞不敢負恩摧枯拉朽之事臣實耻為之舉朝嫉臣誣䧟非一臣賦性愚直恐終不能勝朋黨之論願乞外任以避之上開慰而已上初命與安民知軍惇乃進擬送吏部降監當明年董敦逸論瑤華事上怒欲貶之謂執政曰依常安民例與知軍惇救之乃知上亦初不曽知安民降監當也冬十月右丞鄭雍為資政殿學士知陳州章惇之貶斥元祐舊臣皆以白帖子行遣上疑惇惇甚恐雍私語惇曰用白帖子有王安石故事惇大喜取其案牘白上惇遂安議者謂雍欲以此結惇也然雍竟罷絀甲戌守吏部尚書許將為尚書左丞翰林學士蔡卞守尚書右丞丙子戸部尚書蔡京為翰林學士十一月乙未門下侍郎安燾為觀文殿學士知河南府燾舊與章惇相好及同省執政惇憚且惡之所以排䧟燾者無不至戊戌監察御史陳次升為殿中侍御史蘇州自夏迄秋地震十二月乙丑詔御史臺六察案復置監察御史三貟分領丙子紹聖三年春正月庚子韓忠彦除觀文殿學士知眞定府知成德軍楊畏知河中府孫諤言畏在元豐之間其議論皆與朝廷合及元祐之末大防轍等用事則盡變其趨而從之紹聖之初陛下躬親總攬則又欲變其趨而偷合茍容天下謂之三變詔落寳文閣待制其後以盛陶言移知虢州戊午詔宜罷合祭自今間因大禮之歲以夏至之日躬祭地祇于北郊二月詔罷富弼配享神宗廟庭三月辛夘朔内尚書省火壬辰詔罷春宴不御垂拱殿三日劔南東川地震丁未蔡韜守監察御史夏五月丙申孫諤言免役者一代之大法伏願陛下博採羣言無以元豐元祐為間要以便元元至於無不均不平之患而止則先帝之烈昭然如日月之光明豈不盛歟蔡京言孫諤言役法以為元豐多元祐省元豐重元祐輕則是諤以為元豐之法不若元祐明矣是欲伸元祐之姦惑天下之聽臣愚不知諤果何心也詔孫諤罷左正言差知廣德軍給事中蹇序辰言先帝在位十有九年其應世之迹未易周覽請選儒臣著為神宗寳訓一書授之讀官以備勸講之闕詔俟正史成書令史官編修秋七月詔知渭州吕大忠知秦州大忠自涇原入對上語大忠曰曽得大防信否有書再三說與且將息忍耐大防樸為人所賣候二三年可復相見大忠拜謝以告章惇惇旣聞上語即萌異意元祐黨人由是再行貶黜乙夘國子司業龔原言將來科場只令依舊專治一經從之八月范祖禹特責授昭州别駕賀州安置劉安世特責授新州别駕英州安置坐四年十二月同上疏論禁中覔乳母事也九月曽布因言蔡卞最隂巧而章惇輕率以相媚說故多為其所誤凡惇所主張人物多出於下至議論之際惇毅然如自己出而卞噤不啓口外議皆云蔡卞心章惇口如此實於聖政有害政府虗位甚多願早擇人以助正論壬子上批皇后孟氏縱慾失德宻造竒邪躬禀皇太后皇太妃聖旨恭奉玉音可廢居道宫其後上頗有悔悟意嘗曰章惇壞我名節故元符末皇太后復后位號者推上遺志而行之也冬十月正字鄧洵武為神宗皇帝正史編修官壬申西南方有雷聲次大雨雹十二月女眞本名朱里眞畨語舌音訛為女眞自大中祥符三年以後絶不與中國通有堪布者生女眞之長帥其孫曰英格稱強諸部英格有子曰阿固達有大志契丹壽昌二年即紹聖三年也大國舅帳蕭哈里四郎君嘯聚為盜有衆數千奔女眞結英格為亂因命英格圗之英格斬哈里遣阿固達獻首級餘悉留不遣契丹不得已反進英格父子等官自是其徒隂懷異志契丹知其為東方患者必此人也丁丑紹聖四年春正月己酉翰林學士林希權知貢舉給事中徐鐸起居郎沈銖同知貢舉庚戌中書侍郎李淸臣知河南府二月三省言司馬光吕公著唱為姦謀同惡相濟亦宜少示懲沮吕公著可特追貶建武軍節度副使司馬光可特追貶淸海軍節度副使王巖叟可特追貶雷州别駕並追奪遺表致仕子孫親属所得䕃補陳乞恩例丙寅給事中葉祖洽言近詔中書省書過文字並不廻避臣次覩中書省置中書舍人以行為職其不可行則繳之門下省置給事中以讀為事其不可讀則駁之蓋以廟堂之上議論施設或有差誤人主有所不知則給舎得以其職上聞今使中書舎人兼權給事中又令凡有書過文字並不廻避不惟名實淆亂而給事中職事遂廢詔除特旨書讀不廻避外餘令互書庚辰詔罷春秋科三省言司馬光等造為姦謀訿毁先帝變更法度各加追貶謹按吕大防劉摰蘇轍梁燾等為臣不忠罪與光等無異雖嘗懲責而罰不稱愆吕大防可責授舒州團練副使循州安置劉摰鼎州團練副使新州安置蘇轍化州别駕雷州安置梁燾雷州别駕化州安置范純仁武安軍節度副使永州安置劉奉世分司南京郴州居住韓維特授左朝議大夫致仕王覿分司南京通州居住韓川分司南京隨州居住孫升峽州居住吕陶衡州居住范純禮蔡州居住趙君錫管勾亳州明道宫本處居住馬黙單州居住顧臨饒州居住范純粹均州居住孔武仲池州居住王汾依前官致仕王致臣信州居住張耒添差監黄州酒稅吕希哲和州居住希純金州居住希績依舊光州居住姚勔濮州團練副使連州安置晁補之添差監處州塩酒稅賈易添差監海州酒稅務程頥追毁出身放歸田里郴州編管秦觀移送横州編管朱光庭追貶栁州别駕孫覺追職并兩官及遺表恩澤趙卨追職并兩官及遺表恩例李之純追職及遺表恩例杜純追職李周追貶團練副使甲申制文彦博特降授太子少保致仕依前潞國公閏二月上批張天說所進書立意狂妄詆訕之言往往上及先帝下及朝廷送開封府取勘後開封府言天說私有景福應太一集要及上書詆訕先朝情不可恕特處死丁亥制韓川特責授岷州團練副使道州安置孫升果州團練副使汀州安置中書舎人蹇序辰言知定州韓忠彦元祐之初遽忘大恩附㑹奸惡望早賜黜責詔上淸儲祥宫御篆碑文蘇軾所撰已令毁棄宜差蔡京撰文并書壬辰黄隠分司南京睦州居住王覿改送袁州居住孔文仲追貶梅州别駕鮮于侁追諌議大夫集賢殿修撰吳處厚追貶歙州别駕鄭雍特落職知鄭州安燾降授資政壬寅曽布知樞宻院事翰林林希為同知樞宻院事惇疑布更引希同知使察之希尋為布所誘亦背惇布與惇益不合卒傾惇奪其位左丞許將守中書侍郎右丞蔡卞守左丞黄履守尚書右丞詔蘇軾責授瓊州别駕移送昌化軍安置范祖禹移送賔州安置劉安世移送髙州安置三月癸亥御集英殿賜正奏名進士何昌言并諸科進士等及第出身釋褐共六百九十人曽布言第二人方天若程文中言元祐大臣當一切誅殺而不誅殺子弟當禁錮而不禁錮資産當籍没而不籍没古今政事無此義理此奸人附㑹之言不足取天若乃蔡京門客惇每言人臣不可欺罔如天若欺罔孰大於此上頷之甲戌幸金明池風甚池浪如山新作龍舟艤於氷心殿東不復可登水嬉等船皆罷夏四月乙未校書郎陳瓘通判滄州初太學博士林自用蔡卞之意倡言於太學曰神考知王荆公不盡尚不及滕文公之知孟子也士大夫皆駭其言於是瓘謁章惇求外任因具以告惇惇大怒召自而罵之章蔡由是不咸瓘自為小官時即特立敢言紹聖初章惇以宰相召道過山陽瓘適相遇隨衆謁之惇素聞瓘名獨請登舟共載而行訪以當世之務瓘曰請以所乘舟為喻偏重其可行乎或左或右其偏一也明此則可行矣惇黙然未荅瓘復曰上方虚心以待公公必有以副上意者敢問將欲施行之序以何事為先何事為後誰為君子誰為小人惇曰司馬光奸邪所當先辨瓘曰相公誤矣此猶欲平舟勢而移左以置右也果然將失天下之望矣惇厲色視瓘曰光輔母后獨宰政柄不務纂紹先烈肆意大改成緒誤國如此非奸邪而何瓘曰不察其心而疑其迹則不為無罪若遂以為奸邪而欲大改其已行則誤國益甚矣乃為之極論熈豐元祐之事辭辯淵源議論勁正惇雖迕意亦頗驚異遂有兼取元祐之語留瓘共飯而别惇到闕召瓘為太學博士瓘聞其與蔡卞方合知必害於正論遂以婚嫁為辭乆而赴官於是三年不遷卞方議毁資治通鑑板瓘聞之因䇿士題特引序文以明神考有訓於是林自駭異而謂瓘曰神考少年之文爾瓘曰聖人之學得於天性豈有少長之異乎林自辭屈愧歉遽以告卞乃宻令學中置板髙閣不敢議毁矣大事記曰國朝石介祖禹各有唐鑑不若通鑑集一千七百年之事為備也賜名資治通鑑以其善可為法惡可為戒資其益於治道百代之龜鑑云耳然人主之所不喜小人之所不便也崇寜奸臣請毁唐鑑蘇黄文集又欲毁及此書所幸有御製在也瓘又嘗為别試主文林自復謂蔡卞曰聞陳瓘欲盡取史學以黜通經之士意欲沮壞國是而動摇吾荆公之學卞旣積怒謀將因此害瓘唯候瓘所取士求疵立說而行之瓘固預料其如此乃於前五名悉取談經及純用王氏之學者卞無以發然五名之下往往皆博洽稽古之士也瓘嘗曰當時若無矯譎則勢必相激史學往往遂廢矣故隨時所以救時不必取快目前也己亥舒州團練副使循州安置吕大防卒於虔州四月辛丑吕公著特追貶昌化軍司戸參軍司馬光特追貶朱崖軍司戸參軍詔王珪遺表恩例並行追奪所賜宅拘收入官故承議郎髙士英特追毁出身以來文字上宣諭王珪當先帝不豫時持兩端又言髙士英者詣黄履問誰當立者曽布林希曰天命何可移易兼宣仁亦必無此心上曰宣仁乃婦人之堯舜也外則王珪等内則梁惟簡軰妄為此紛紛爾上之嗣位邢恕與蔡確等自謂有定䇿功旣而確死貶所恕亦斥不用心恨之髙士京者嘗與恕同官恕一日置酒從容問曰公知元祐間獨不與先公推恩否士京曰不知又問有兄弟無士京曰有兄士充已死恕曰此乃傳王珪語言之人也當是時王珪為相欲立徐王遣公兄士充傳道語言於禁中知否士京曰不知恕因誘士京以官爵曰公不可言不知當為公作此事因令所親信王棫為士京作奏上之珪由是得罪其後士京恨所得官爵不稱屢欲自陳虚妄髙氏諸族皆惡之絶不與通五月丁巳降授太子少保潞國公致仕文彦博卒朝議大夫致仕韓維以朋附司馬光最為盡力責授崇信軍節度副使致仕筠州居住六月癸未朔日有食之隂翳不見丙戌三省樞宻院同班致詞賀上顧三省曰卿等更當修政事以進賢退不肖為意曽布曰君子小人有天下公議在誠不難分别惇曰若盡要為君子誰為小人者布曰臣不敢以小人自處若無君子之心何可居此地秋七月詔許吕大防歸葬始大防卒於䖍州上聞之曰大防何以至䖍州及其家請歸葬即許之議者由是知痛貶元祐黨人皆非本意也甲子内中遺火己巳詔罷作北郊竢先罷合祭於圜丘乃行庚午太史奏火入輿鬼主賊在君側宜備之上遣中人召太史詰之對曰讒慝之人皆賊也唯親近正人修德乃所以備之八月己酉彗星見氐間斜指天市垣光芒約三尺至九月戊辰没上顧問見彗否皆以實對上曰當避朝肆赦以荅天戒曽布言政事有未安刑罰有未當大臣還肯因天變為陛下改更否正人端士天下之所欲進而大臣素所不恱還肯因天變為陛下收用否讒邪不正之人置在要路而大臣素所黨與還肯因天變為陛下斥逐否臣恐未有以稱陛下修省之意也上聞之矍然見於色布又言陛下方下詔求直言比聞論者已有恐恐士大夫因天變欲動摇政事如此則誰敢言者是月上以星變屢戒大臣以修政事又下詔求言曽布因奏事白上有識之士或有所陳望陛下省覽然其間有奸言聞林希言方天若上書更欲誅戮元祐之人旣而聞林自果有此論而御史鄧棐遂以此應詔以掃除異意之人足以應除舊布新之象棐乃卞黨京所薦也林希因進曰陛下寅畏如此未知大臣能奉行聖意否上遽曰不畏天變豈非章惇冬十月辛巳朔御邇英閣侍讀蔡京言竊見王安石有日録一集其間皆先帝與安石反覆論天下事及熈寧改更法度之意本末備具欲乞略行修纂進讀上曰宫中自有本朕已詳閲數次矣邊報言羗人以彗星肆赦罷兵以放㪚人馬上曰羗人猶畏天變况中國乎壬寅邢恕為御史中丞章惇實啓上也恕嘗謂惇有定䇿功而惇每疑元祐人復用謀誅絶之知恕肯任此事故不以序遷改時惇與卞已不咸恕即上疏論朋黨十一月丁丑詔放歸田里人程頥送涪州編管坐與司馬光同惡相濟也先是上與輔臣語及元祐政事曰程頥妄自尊大至欲於延和講說令太母同聽在經筵多不遜可與編管頥素與邢恕善林希意恕必救頥則因以傾恕恕語人曰便斬頥萬叚恕亦不救聞者笑之宋賢年譜云謝良佐曰是行乃頥族子公孫與邢恕為之頥曰族子至愚不足責故人情厚不敢疑孟子旣知天安用尤臧氏十二月鼎州團練副使新州安置劉摰卒先是蔡京安惇共治文及甫并尚洙等所告事將大有所誅戮彗星變上怒稍怠然京惇極力煆煉不少置已而燾先卒於化州摰亦卒於新州衆皆疑兩人不得其死明年五月獄乃罷戊戌殿中侍御史陳次升為左司諌初章惇蔡卞欲其排元祐臣寮次升首論敕牓反覆又言常立周穜鄭居中自此惇卞不說常令太府少卿林顔致忱悃於次升次升對曰次升知守官而已不知其它甲辰三省言熈寧年興置市易務本以通有無利商賈平物價抑兼并元祐一切罷去詔復置市易務戊寅元符元年春正月癸酉鄒餘為監察御史邢恕所薦也二月蔡京等根治同文館獄卒不得其要領乃更遣吕升卿董必使嶺外謀盡殺元祐黨人時劉摰梁燾已前死朝廷猶未知也三月辛亥曽布言近聞吕升卿董必察訪二廣中外疑駭祖宗以來未嘗誅殺大臣升卿兄弟與軾轍乃切骨仇讎軾轍聞其來萬一望風引决朝廷本無殺之之意使之至此豈不有傷仁政兼升卿凶熖天下所畏又濟之以董必此人情所以尤驚駭也上改容曰甚好乃詔吕升卿差充廣南西路察訪指揮更不施行後三日董必自東路改使西路初章惇蔡卞恐元祐舊臣一旦復起日夜與邢恕謀所以排䧟之計旣再追貶吕公著司馬光又責吕大防劉摰梁燾范祖禹劉安世等過嶺意猶未慊仍用黄履䟽髙士英狀追貶王珪皆誣以圖危上躬其言浸及宣仁上頗亦惑之最後起同文舘獄將悉誅元祐舊臣專媒蘖垂簾時事建言欲追廢宣仁惇卞自作詔書請上詣靈殿宣讀施行皇太后方寢聞之遽起不及納履號哭謂上曰吾日侍崇慶天日在上此語曷從出且上必如此亦何有於我皇太妃同皇太后諌上語極悲切上感悟取惇卞奏就燭焚之禁中相慶惇卞明日再具奏堅乞施行上怒曰卿等不欲朕入英宗廟乎抵其奏於地宣仁追廢之議由是息而惇卞終不肯釋元祐舊臣京惇進呈摰等事目上曰摰等已責遐方朕遵祖宗遺志未嘗戮大臣其釋勿治蔡京等奏定驗咸陽民叚義所獻玉璽篆文與秦相李斯篆文合有魚龍鳳鳥之形是古之蟲篆詔令禮部太常寺按故事詳定以聞詔蘇轍移循州安置夏四月化州安置梁燾卒壬辰林希罷同知樞宻院事知亳州邢恕罷御史中丞知汝州詔五月朔受傳國寳以天授傳國受命之寳為文五月戊申朔上御大慶殿受傳國寳行朝㑹禮初章惇謂秦璽何足貴不過藏天章瑞物庫而已旣而京等專達未嘗關由三省惇等不復敢一言聞者哂之丙寅詔以六月朔改元為元符曽布以為昔天書降嘗於承天門裏作元符觀後以火廢則元符之號亦不甚佳秋七月詔范祖禹移化州安置劉光世移梅州安置王巖叟范祖禹劉安世朱光庭諸子並勒停永不收叙韓維卒壬申夜雲霧蔽天地震良乆乃止九月詔王珪諸子並勒停永不收叙庚戌横州編管秦觀特除名永不收叙移送雷州編管以附㑹司馬光等同惡相濟也壬子宣德郎鄒浩為右正言三省呈浩元祐間所上疏云人才所當急則云自古不乏才國用所當憂則云君子不言利邊備所當修則云在德不在兵皆深中當時議論者之病遂擢授諌職詔鄭俠追毁出身除名勒停依舊送英州編管冬十月甲午化州安置范祖禹卒中書省言元祐元年邢恕上書言熈寧初王安石吕惠卿用事先帝詢及二人臣具道安石之短惠卿之奸又言太皇太后躬親聽斷並用忠良全去弊蠧又言韓維端諒名德乃與司馬光吕公著一等詔邢恕特降授承議郎知南安軍十一月甲子冬至祀昊天上帝于圜丘以太祖配十二月鄒浩嘗奏論章惇擢登相位於今五年徇情廢理專務自營力引所私分據要路潛謀宻計妙若鬼神一有作為首尾互應惇雖不動聲氣而事已倐然濟矣是以陛下之所欲用者正人也由此沮格而不得進陛下之所欲來者忠言也由此壅閼而不得聞陛下之所欲推廣者仁恩德澤也由此難於逺達而不得均被於元元是陛下之志願未獲盡伸而惇之好惡莫不畢遂惇雖傲然自若以為人莫能窺而不知其效已有不可掩者故論其爕理則水旱薦臻之變異常論其表率則誕慢相習之風彌扇論其旁招則非趍附其門者弗用論其言動則雖陵侮毁罵而必為論其横身力薦之人則以罪竄逐相繼論其尊君畏上之心則遇灾而處略不引咎又嘗奏臣觀執政大臣不務同心同德以稱陛下登用之意且其不和之心旣已發於聲形動於天地為水為旱為民物之灾矣失今弗圗後必滋甚抑恐四夷聞之必有以輕議中國者此正朝廷所以為今日之急務也己夘元符二年春正月先是曽布累乞罷上不許旣復就職因言章惇作相舉措乖錯不為人所服自士大夫至閭巷小人無不昌言慢罵刑政失當致天下論議如元祐之人罪戾深重者悉已貶竄其間一言之差一向搜求有何窮盡又如看詳訢理事臣亦嘗言刑部釐為兩司一則斷刑一則雪罪熈寧得罪之人亦有曽於元豐中得雪理者何獨於元祐中一切不許訴雪事在已往無可言者然其緒餘尚可闊略兼趣令結絶後數日遂諭三省令闊略在下者而三省批旨但云公人軍人百姓更不看詳而已賜故相王安石宅一區是月恩州地震二月己亥石豫為監察御史從中丞安惇薦也夏四月丁亥以時雨稍愆疎决在京及河南應天大名府繫囚己丑詔新除工部貟外郎董必送吏部與小處知州先是必按衡州孔平仲糶常平違法就潭州起獄致死者三人尋又差察訪廣西所為多刻薄五月庚申孔平仲責授惠州别駕英州安置戊辰詔朕因閱元祐臣寮所上章疏得陳次升任監察御史日一二奏極其奸邪附㑹權臣詆毁先政可罷職與逺小監當差遣遂添差監全州塩酒稅次升之為御史也嘗劾章惇奏入不報次升自監察御史遷左司諌首尾凡四年旣罷而惇獨居相位訖元符末乃貶六月蹇序辰落職降一官知黄州以奉使遼國進拜不如儀等事故也序辰凶慝貫盈人莫敢動摇之者一旦逐去衆論快之秋七月初籩波斯結旣以講朱等四地來邈川諸酋相繼以求内附令孫路駐河州王贍將河州軍兵為先鋒總管王愍將岷州及熈州軍馬䇿應以撫納邈川諸部是月己未詔下甲子師發河州次安鄉城贍以先鋒自宻章渡過河丙寅遂克邈川即日以㨗書聞孫路怒贍徑上㨗書不復由帥府讒間自此作矣八月王贍已收復邈川城按邈川城係古湟中之地東北控夏國右廂甘凉一帶西接宗哥青塘九月庚子朔夏國遣使謝罪見于崇政殿丁未詔立賢妃劉氏為皇后先是内出皇太后手詔曰非此人其誰可當其後皇太后臨朝以瑶華無辜被廢追治元符立后之因詔蔣之奇進所奉手詔驗其字畫乃劉友端所書之奇簾前奏曰當時降制用手詔語皆得旨不謂皇太后不知也時章惇專制納結内侍郝隨以固權寵劉友端助之三人凶狡相濟故長樂手札惇撰定進入友端矯制書之宫禁事秘人莫得而辨也賜夏國主乾順詔上謂曽布曰西人未嘗如此遜順布曰元祐中固不論元豐中表章固不遜未嘗如今屈服也鄒浩上疏曰陛下為天下擇母而所立乃賢妃劉氏一時公議莫不疑惑誠以國家自有仁祖故事不可不遵用之耳蓋皇后郭氏與美人尚氏爭寵致罪仁祖旣廢后不旋踵并斥美人所以示公也及至立后則不選於妃嬪必選於貴族而立慈聖光獻所以逺嫌也所以為天下萬世法也陛下以罪廢孟氏與廢郭氏實無以異然孟氏之罪未嘗付外雜治若與賢妃爭寵以致罪則并斥美人以示公固有仁祖故事存焉若不與賢妃爭寵以致罪則不立妃嬪以逺嫌亦有仁祖故事存焉伏望聖慈追停冊禮别選賢族疏奏詔浩言多狂妄事實不根特除名勒停送新州羈管浩嘗奏論章惇六罪謂惇在元祐初實與司馬光同入文字抵斥先帝保甲之法以為非是若以保甲誠不便不可行即惇在先朝固己為執政矣何不為先帝言而罷之安忍先帝陵土未乾而遽詆以為非邪閠九月汀州安置孫升卒詔以靑唐為鄯州邈川為湟州冬十月己亥朔詔新知河州种朴星夜赴任計㑹苗履等過河討蕩作過蕃部甲寅章惇留身奏甚乆曽布再對上諭布曰章惇以夏人犯邈川欲因此討伐遂㓕夏國上笑曰此何可聽布曰陛下聖明逺慮此天下之福今靑唐用兵士卒困敝日甚若更經營誅㓕夏國如此即憂在中國不在四夷上深然之己未种朴戰没胡宗回遣河州都監王吉將五百騎討阿章全軍没又遣魏釗討之釗亦敗死自种朴之死熈河將士氣奪無敢復言戰者於是靑唐道路復不通十二月叛羗因結連丁零宗羗間遣人伏於章峽隘險中肆行剽刼朝廷竟以道路梗塞遂棄靑唐元符三年春正月戊辰朔不受朝己夘上崩於福寧殿宋史全文卷十三
