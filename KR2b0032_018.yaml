body:
  text: 宋史全文卷十八上宋高宗五辛亥紹興元年春正月己亥朔改元復賢良方正直言極諫科自紹聖廢制科至是始因德音下禮官講求然未有應者金人掠天水縣知縣事趙壁等不屈皆殺之丁未言者論大臣用人之際當惟其賢不必以嘗經堂除為限先是吕頥浩當國患請謁者衆乃揭榜省户曰未經堂除者不得投牒求官言者以為如此則宣政之間倚權貴之門超取顯美者皆在所收豈無韜晦自重不願為人所知者其何以來天下之士而濟艱難之業疏奏詔三省遵守戊申江南路招討使張俊改江淮招討使後數日俊入辭頗言李成兵衆上曰汝將全軍設為朕攻一郡若何俊曰臣朝至而夕可入也上曰成竭力攻九江兩月不能下則雖衆何能為俊大以為然上因謂俊今日諸將獨汝未嘗立功俊曰臣何為無功上曰如韓世忠擒苗傅劉正彥則功績顯著卿殆不如俊恐悚承命尚書省言嶽鄂道遠請還𨽻湖北復江池路為江東西路置帥司於江池又分荆湖諸司之在江南者為湖南西路置帥司於鄂鼎馬進陷江州李成聞州已陷乃渡江入城己酉金人寇揚州辛亥參知政事謝克家提舉臨安府洞霄宫壬子詔京官知縣並堂除內外侍從官限三日各舉可任縣令者二人犯贓連坐又詔不歷縣令人勿除監司郎官不歷外任人勿為侍從著為永法於是從官有互舉其子為縣令者而子又皆貪贓論者惜之丙辰初許百司每旬休沐宰執因奏事上曰一日休務不至廢事使一月間措置得十事雖二十日休務何害若無所施設雖窮朝夕何補也戊午户部侍郎孟庾言兩浙路夏稅及和買紬絹一百六十萬餘匹半令輸價錢每匹兩千從之庚申銀青光祿大夫李綱提舉臨安府洞霄宫詔趙普佐命元勳視漢蕭何宜訪其子孫量才録用辛酉手詔曰朕念太祖皇帝創業垂統德被萬世神祖詔封子孫一人為安定郡王世世勿絶乃至宣和之末以太常禮部各有所主依違不决使安定之封至今不舉朕甚閔之有司其上合襲封人名遵依故事施行癸亥詔比降德音寬恤事件州縣自宜悉意奉行違者監司按劾御史臺察之初順昌盜余勝等作亂土兵陳望與射士張衮謀應之軍校范旺叱之曰吾等父母妻子皆取活於國今力不能討賊更助為虐是無天地也凶黨怒剔其目而殺之旺妻馬氏聞之行且哭賊脅汙之不從又殺之後為立祠號忠節二月庚午改行宫禁衛所為行在皇城司辛未同知樞密院事李回言士大夫自衢信來者皆稱張俊軍行極整肅上曰朕亦聞之犯軍律者已誅六七人矣范宗尹曰臣已以書奬其美上曰待亦作詔勉之立功俊心忠謹惟好官職正當以此使之張守曰陛下深得御將之術己卯日中有黑子辛巳禮部尚書秦檜參知政事龍圖待制孫覿時知臨安府以啓賀檜有曰盡室航海復還中州四方傳聞感涕交下漢蘇武節旄盡落止得屬國唐杜甫麻鞋入見乃拜拾遺未有如公獨參大政檜以為譏已始大怒之壬子日中黑子消伏翌日范宗尹進呈因言故事當避殿减膳今人情危懼之際恐不可以虛文搖動群聽望陛下修德以消弭之臣等輔政無狀義當罷免上曰日為大陽人主之象豈關卿等惟在君臣同心行安民利物實事庶幾天變不至為灾也丙戍復祕書省仍詔監少不並置置丞郎著佐各一員校書郎正字各二員庚寅張浚奏本司都統制曲端自聞吳玠馬軍倒那坐擁重兵更不遣兵䇿應已責海州團練副使萬州安置詔依已行事理初浚自富平敗歸始思端及王庶之言可用庶時持母喪居蜀乃併召之庶近地先至授參議官浚徐念端與庶必不相容暨端至半道但復其官移恭州宣撫處置使司主管機宜文字楊斌素與庶厚知庶怨端深乃盛言端及有實跡者十秦鳯副總管吳玠亦懼端嚴明譛端不已庶因言于浚曰端有反心久矣盍蚤圖之會蜀人多上書為端訟寃浚亦畏其得衆心始有殺端意矣壬辰雨雹癸巳翰林學士汪藻上馭將三說一曰示之以法二曰運之以權三曰别之以分大略謂諸將過失不可不治今陛下對大臣不過數刻而諸將皆得出入禁中廟堂者具瞻之地今諸將率驟謁徑至便衣密坐視大臣如僚友又遣將出師詔侍從集議者所以博衆人之見今則諸將在焉且諸將聽命者也乃使之預謀則利於公不利於私者必不以為可行便於己不便於國者必不以為可罷欲其冒鋒鏑趨死地難矣自今諸將當律以朝儀毋數燕見其至政事堂亦有祖宗故事且無使參議論之餘則分既正而可責其功矣何難乎弭盜何憂乎遏敵哉至於理財則民窮至骨臣願陛下毋以生財為言也今國家所有不過數十州所謂生者必生於此數十州之民何以堪之惟痛加裁損庶乎其可爾外之可損者軍中之冒請內之可損者軍中之泛取又言自古以兵權屬人未有不貽患者今諸將之驕樞密院已不能制宜精擇偏裨十餘人各授以兵數千以漸消諸將之權此萬世計也是時諸將中劉光世尤橫故藻有是言藻書既傳諸將皆忿有令門下作論以詆文臣者其略曰今日誤國者皆文臣自蔡京壞亂紀綱王黼收復燕雲之後執政侍從以下持節則喪節守城則棄城建議者執講和之論奉使者持割地之說提兵勤王則潰散防河拒險則逃遁自金人深入中原蹂踐京東西淮南之地為王臣而棄地棄民誤國敗事者皆文臣也間有竭節死難當橫潰之衝者皆武臣也張邦昌為僞楚劉豫為僞齊非文臣誰敢當之自此文武兩塗若氷炭之不相合矣丙申復詔諸路提刑司類省試於是川陜宣撫處置使張浚始以便宜合川陜舉人即置司州類省試自是行之至今宗維既得關中地遂悉割以豫僞齊關陜之陷也士大夫守節者甚衆三月戊戍朔自駐蹕南京以來軍士日給百錢比數十日一犒設前是水軍統制官崔增以其衆萬有千二百人降于吕頥浩吕頥浩始用舊法按月支糧及料錢於是增一軍月費錢四萬四百緡米七千五百斛視五軍所給月省萬五千餘緡庚子宣撫處置使張浚以冨平失律上疏待罪壬寅上謂輔臣曰浚放罪詔宜早降因言浚用曲端趙哲劉錫後見其過即重譴之浚未有失安可罷也同知樞密院事李回曰須得勝浚者乃可易上曰有才而能辦事者固不少若孜孜為國無如浚亦有人言其過朕皆不聽浚乃得安甲辰福建轉運判官魯詹條具止盜利害請擇令尉罷免行錢糴米賑濟减殘破縣分上供銀上諭輔臣曰詹所奏切中時病皆可施行上因言朕每日五更初盡覽諸處奏報比明所覽略盡乃出視朝蓋上勤攻如此丙午責授定國軍節度副使王宗濋復忠州團練使以赦叙也上曰宗濋自可用但當時用非所宜兼戚里不當管軍張守曰祖宗時亦有戚里管軍者上曰要是擇才只今諸戚里豈能管軍范宗尹曰誠如聖訓庚戌江淮招討使張俊復筠州初俊引兵至豫章而李成在江州其將馬進在筠州皆不進俊喜曰我已得洪州破賊必矣斂兵若無人者金鼓不動令將士登城者斬居月餘進以大書文牒使來索戰俊復細書答狀以驕之賊謂俊為怯戰俊牒知賊稍怠乃議行嶽飛請自為先鋒楊沂中由上流徑絶生米渡出賊不意遇其先鋒擊破之乘勝追奔前一日至筠州進出軍背筠河先守要地沂中語俊曰彼衆我寡當以竒勝願以騎見屬公率步兵當其前沂中乃將騎數千與陳思恭分為兩道同出山後俊嚴陳以出鏖戰至午精騎自山馳下賊駭亂退走大敗之俊遂復筠州臨江軍馬進復還江州與成會俊整兵追之壬子先是張榮在通州以地勢不利乃引舟入縮頭湖作水寨以守金左監軍昌以舟師犯榮水寨榮亦出數十舟載兵迎敵望金人戰艦在前榮謂其衆曰無慮也金人止有數艦在前餘皆小舟方水退隔淖不能岸我捨舟而陸殺棺材中人耳遂棄舟登岸大呼而殺之金人不能騁舟中自亂溺水陷淖者不可勝計昌收餘衆二千奔楚州榮獲昌子壻盆輦俘馘甚衆榮聞劉光世在鎮江乃遣人願聽節制且上其功光世大喜以榮知泰州初摧南恩州陽江縣田鹽縣有潮水所浸田一頃二十四畝提舉鹽茶司募民墾之置竈六十有七歲産鹽七十八萬千四百斤收净息錢萬九千餘緡遂命官領其事後二年又增萬二千緡甲寅詔罷免行錢州縣官市買方物如民間之直違者以自盜論始用魯詹之言也先是改元德音已减閩中上供銀三分之一是日又减建劒州銀半分令福建轉運司兊糴米二萬斛充賑濟初河間府免解進事李季集天文諸書號乾象通鑑季寓居婺州乃命本州給札上之自渡江國史散佚至是衢州布衣何克忠獻太祖實録國朝寶訓後八九年而國書始備己未張俊捷奏至上諭輔臣欲赦李成軍中脅從者范宗尹因言今日之事不可削弱上曰祖宗基業宏固偶值戎冦故劉豫李成等輩跋扈猖獗或謂止於淮上作籬落朕甚不取要當以次收復須一統乃已耳湖南馬步軍副總管孔彥舟言於潭州池中得美玉可為御寶乞遣人宣取詔御寶已足備兼自艱難以來華靡之物一無所用其毋進甲子始下詔罪狀李成募有能斬首及獲成者除節度使賜銀萬兩錢萬緡且赦成軍中脅從者初馬進既敗江淮招討使張俊追之至奉新樓子莊賊將商元據草山設伏俊熟視見山險路狹乃遣步兵從間道直趨山頂殺伏奪險遂至江州進拒戰不勝絶江而遁乙丑俊復江州統制官楊沂中趙密引兵追擊又大敗之成復還蘄州自是俊軍有鐵山之號宣撫處置使張浚承制以本司參謀官王庶知興元府兼利䕫兩路制置使節制陜西諸路留統制官王宗尹柴斌兵二千馬不滿百使庶守時虜騎已破福津蹂同谷迫武興浚遂退保閬州於是盡失陜西地但餘階成岷鳯洮五郡及鳯翔府之和尚原隴州之方山原而已時興元帥事草創倉廩乏絶師旅寡弱庶募民教之河東陜西潰師多舊部曲往往來歸不數月有衆二萬夏四月庚午尚書户部侍郎孟庾請諸路無額錢附經制起發從之於是通鈔旁定帖及賣糟等錢凡七色甲戌詔修日厯丁丑刑部尚書權禮部尚書胡直孺等言參酌皇祐詔書將來請合祭昊天上帝皇地示於明堂奉太祖太宗以配天庶幾禮専事簡從之天地復合祭自此始戊寅張俊捷奏至上謂輔臣曰兵既精又治器甲所以成功以此知軍器當留意朕計五軍見甲巳四萬范宗尹曰得十萬粗足上曰可足成之財固當惜然於此不宜吝也庚辰隆祐皇太后崩於行宫之西殿壬午詔江浙諸路上供紬絹半折見緡三千仍易輕齎赴行在辛巳進呈程俱劄子名臣列傳止是節本合與不合録呈上曰初止令進纍朝實録蓋欲盡見祖宗規模此是朕家法要得遵守既退范宗尹已下歎仰者久之臣留正等曰帝王之道雖同其法則不必同忠質文異制同歸于治蓋因時制宜各自為一代之法夏商周之子孫得以憲于先王傳世數十而長久者也太上皇帝欲盡見宗祖規模且曰此是朕家法要得遵守則自中興以來致治之效皆由於此今日尤當率循而不忘也癸未桑仲陷鄧州殺知汝州王俊丁亥詔榷貨務遵之茶鹽見行成法不得毫髮改更務令上下孚信入納增廣宣撫處置使張浚殺曲端于恭州端既為利䕫制置使王庶所譖知渭州吳玠亦憾之乃書曲端謀反四字于手心因侍浚立舉以示浚浚素知端庶不可並立且方倚玠為用恐玠不自安乃送端恭州獄有武臣康隨者在鳯翔嘗以事忤端鞕其背有切骨恨浚以隨提㸃䕫州路刑獄端聞之曰吾其死矣呼天者數聲端有馬名鐵象日馳四百里至是連呼鐵象者又數聲乃赴逮既至隨命獄吏縶之維之糊其口熁之以火乾渴而死士大夫莫不惜之軍民亦皆悵恨西人以是益非浚然議者謂使端不死一日得志逞其廢辱之憾端一搖足秦蜀非朝廷有雖殺之可也龜鑑曰趙哲之誅孔明之誅馬謖也曲端之不用亦孔明之不用魏延也至於殺之太過矣况曲端威望金人素懾富平之戰詐立端旗猶足以懼敵則端之死為可惜也然殺曲端而失關陜浚之過也用吳玠而保全蜀浚之功也乙未詔臨安府秀州亭戶合納二稅依皇佑專法計實值價錢折納鹽貨先是兩浙轉運司以罷給蠶鹽令輸本色提舉茶鹽公事梁汝嘉奏亭户以煎鹽為生未嘗墾田於是申明行下五月己亥主管江州太平觀李弼孺勒停初范宗尹薦弼孺使領營田遂召赴行在而右諫議大夫黎確奏弼孺淫汙狡妄媚事朱勔宗尹曰固知弼孺小人然但欲委之勸耕故有此命上曰君子易踈小人易親不知者無如之何既知弼孺小人安可不踈今日知田事者應别有人可勿召也弼孺怒上疏訟確所言誣誕故有是命辛丑御筆犒賞諸軍一次范宗尹奏自犒賞後已近五旬上曰朕不欲數犒凡三月可省一次今財用止出東南數十郡不免痛加節省若更廣用竭民膏血何以繼之宗尹等曰陛下之言及此天下幸甚癸卯上出大宋中興之寶及上皇所獲元圭以示輔臣寶上新刻者其玉明潤視定命寶猶大半分中書舍人洪擬轉對論帝王之學中叙董仲舒王吉之言末以章句書藝為非帝王之事上曰人欲明道見理非學問不可惟能務學則知古今治亂成敗與夫君子小人善惡之迹善所當為惡所當戒正心誠意率由於此秦鳯經略使吳玠及金人烏嚕舍赫戰于和尚原之北敗之時金主晟之從姪默哷與烏嚕舍赫以數萬騎分兩道入冦默哷自鳯翔二將由階成約日㑹和尚原玠與其弟統領官璘以散卒數千人駐原上朝聞隔絶軍儲匱乏人無固志有謀劫玠兄弟北去者幕客陳逺猷夜入告玠遽召諸將厲以忠義㰱血而誓諸將感泣為備益力是日二將以徑騎先期而至陳于原北玠擊之四戰皆捷山谷中路狹而多石馬不能行虜棄馬逐敗去後三日默哷自犯箭筈關玠遣别將擊之二冦卒不得合又五日敵移寨黃牛嶺㑹大風雨雹翌日引去張浚録其功承制以玠為明州觀察使璘為康州團練使擢秦鳯路兵馬都鈐轄統制和尚原軍馬丙午江東安撫大使司奏捕䖍賊李敦仁獲捷時吕頥浩猶在告參議官李承造以聞上曰頥浩大臣義當體國江西盜賊非張俊未易辦頥浩須少惟之如亷藺相濟乃可可趣令視事李回請上親扎富直柔又乞遣中使撫問上從之詔承議郎范同宣教郎勑令所刪定官劉一止修職郎王洋並召試館職初復故事也郭仲威為劉光世所執仲威與李成有舊欲往從之又謀據淮南以通劉豫光世遣前軍統制王德手擒之己酉詔以米價貴諭積粟之家出糶三千斛以上補官有差辛亥詔以道路未通諸路死囚應奏讞者權令降等斷遣郭仲茍權主管殿前司公事自巡幸以來三衙實無兵名存而已邵青以舟師犯太平州癸丑詔斬郭仲威於平江市先是仲威焚掠平江故就誅之甲寅趙令㢜知南外宗正事上命令㢜往泉南選宗室子育之宫中故有是命戊午權工部侍郎兼詳定重修勑令韓肖胄言對修政和嘉祐勑成復置太府寺丞以承奉郎章億為之措置印給茶鹽鈔引沅州言本州自熙寧末為郡始創營田招置弓弩手四千人靖康調發往往不歸今軍食窘急乞以閒田募民承佃招捕弓弩手二千人餘助歲計從之先是鼎澧辰沅靖諸州以地接蠻徭溪洞故熙豐間排置弓弩手五郡合萬三千人散居邉境教以武藝無事則耕作自贍有警則集而用之最為利便後全軍調發應援河東或死或亡其法浸廢矣朝散郎吕安中言舊官給錢募户長摧稅近已差甲頭宜樁其雇錢用助經費詔諸路提刑司拘收赴行在既而言者以差甲頭不便者有五於是甲頭不復差而耆户長役錢因不復給己未祕書少鹽程俱言見修日厯乞下諸州搜訪建炎元年以後邸報及所被受朝㫖文字仍於中外臣僚先具取㑹二年事實應曽任宰執至行在職事官有日厯合載事件如政事弛張臣僚黜陟刑賞征戰凡所見聞或私自記録或親承聖語及所上章疏并被受詔𠡠與公案官文書之類並令詣實抄録回報以慿修纂從之辛酉荆南鎮撫使解潜言所管五州絶户及官田荒廢者甚多已便宜辟宗綱權屯田使樊賔副使募人使耕分收子利詔以綱為鎮撫司措置營田官賔為同措置官渡江後營田自此始其後荆州軍食多仰給於營田省縣官之半焉壬戌范宗尹等以國用不足奏鬻通直修武郎已下官上曰不至人議論否張守曰祖宗時亦嘗有此第止於齊郎李回曰此猶愈於科斂百姓上曰然大凡施設須可行於今可傳於後即善耳其後遂止鬻承直郎以下官邵青受劉光世招安太平州圍解癸亥初馬進既為張俊所敗而李成猶在蘄州至是俊引兵渡江至黃梅縣親與成戰成據石幢坡慿山以木石投人俊乃先遣游卒進退若爭險狀以誤之俊率衆攻險賊徒奔潰進為追兵所殺成遁去以餘衆降僞齊六月己巳初鬻承直修武郎以下官承直二萬五千緡修武四萬五千緡乙亥張琪犯宣州戊寅言者論朝廷暫駐江左蓋非得已當為攘却恢復之圖頃歲駐蹕揚州有兵數十萬可以一戰金人奄至卒以奔走踰江而東此宰相黃潜善汪伯彥之過也前年移蹕建康是時兵練將勇食足財豐據江上不測之險當敵人疑懼之秋可以守矣金人未至先已奔走遵海而南此吕頥浩之過也今歲戰守之䇿安所從出萬一事起倉卒大臣復欲棄土地遺人民委府庫脫身奔走此豈安國家定社稷之謀乎臣愚以謂有江海則必資舟楫戰守之具有險阻則必資郡縣防守之力有兵將則必駕馭馴擾不可為將帥自衛之資有財賦則必轉運搬輸不可為盜賊侵據之用伏望委任大臣早賜措畫詔三省樞密院措置辛巳召越州上虞縣丞婁寅亮赴行在以其言宗社大計也寅亮之書曰先正有言太祖舍其子而立弟此天下之大公也周王薨章聖取宗室子育之宫中此天下之大慮也仁宗皇帝感悟其說詔英祖入繼大統恭惟陛下克己憂勤備嘗艱難春秋鼎盛自當則百斯男屬者椒寢未繁前星不耀孤立無助識者寒心欲望陛下於伯字行下遴選太祖諸孫有賢德者視秩親王使牧九州以待皇嗣之生退處藩服更加廣選宣祖太宗之裔材武可稱之人升為南班以備環列庶幾上慰在天之靈下係人心之望疏入上讀之大以嘆寤簽書樞密院事富直柔從而薦之遂有是命壬午張琪犯徽州甲申邵青復叛引兵移江隂戊子上謂輔臣曰昨令廣選藝祖之後宗室二三歲者得四五人資相皆非岐嶷且令歸家俟其至泉南選之右僕射范宗尹曰此陛下萬世之慮上曰藝祖以聖武定天下而子孫不得享之遭時多艱零落可憫朕若不取法仁祖為天下計何以慰在天之靈同知樞密院事李回曰自昔人君惟堯舜能以天下與賢其次惟藝祖不以大位私其子聖明獨斷發於至誠陛下為天下逺慮上合藝祖實可昭格天命參知政事張守曰堯舜授受皆以其子不肖藝祖諸子不聞失德而以傳序太宗此過堯舜逺甚上曰此事亦不難行秪是道理所在朕止令於伯字行中選擇庶昭穆順序簽書樞密院事富直柔曰陛下聖斷度越千古第恐令㢜不足以奉承上曰且令廣求須自選擇參知政事秦檜曰須擇宗室閨門有禮法者上曰當如此直柔曰宫中有可付托否上曰朕已得之矣若不先擇宫嬪則可慮之事更多宗尹曰陛下睿明審慮如此宗廟無疆之福辛卯輔臣進呈言者論劉光世軍中冗費上曰光世一軍搜汰冗雜約留兵幾何可以贍足范宗尹曰今月給錢十六萬緡米三萬斛若留精兵三萬人且汰其使臣之罷軟者可以足用上曰俟作手書與之如家人禮直示朕意庶幾光世不疑委曲聽命翌日遣睿思殿祗侯羅亶賜光世手書諭指仍以玉帶賜之七月乙未朔劉光世以枯秸生穗為瑞奏之上曰歲豐人不乏食朝得賢輔佐軍中有十萬鐵騎乃可為瑞此外不足信朕在濳邸時梁間有芝草府官皆欲上聞朕手自碎之不欲主此竒怪事輔臣嘆服龜鑑曰其於奉天也深思政事以盡畏天之誠靜坐內省以求答天之意彗出井度則深以天下為憂癸未風雷則深以夷狄為慮久雨則詔求言大雪則詔决獄枯秸之生可稱也吾瑞鐵騎而不瑞枯秸麟鳯之獻可喜也吾寶賢能而不寶麟鳯獻芝草則斥獻甘露則貶於是而無喜祥瑞惡變異之失矣庚子新知澧州吳章為潼川府路轉運副使自置宣撫司後四川監司以敕除者始此辛丑皇伯令話為寧州觀察使封安定郡王先是燕秦二王後爭襲封久不决禮部員外郎王居正言燕王太祖長子其後當襲封議遂定令話德昭元孫也壬寅申命有司討論濫賞復置翰林天文局太史局學生五十人天文局十人甲辰詔祕書省長二通修日厯丙午金左將軍昌自宿遷北歸昌過東平僞齊劉豫不出迎使人言於昌曰豫今為帝矣若相見無拜之禮昌怒責之却其獻豫遣僞相張孝純隨而和之昌卒不解辛酉故追復觀文殿學士劉摯贈少師後諡忠肅吕頤浩督諸將與張琪戰于饒州城外大敗之琪走浮梁縣復還徽州癸亥尚書右僕射同中書門下平章事兼知樞密院事范宗尹提舉臨安府洞霄宫初宗尹既建討論濫賞之議士大夫僥幸者爭排之上批朕不欲歸過君父斂怨士夫可日下寢罷宗尹堅以為可行即日求去上曰天下事不必堅執至如人主有過尚許言者極論若遽阻遏秪須人不進言如此則於誰有損始宗尹之建議也檜力贊之至是見上意堅反以此擠宗尹遂召翰林學士汪藻草宗尹免制曰日者輕用人言妄裁官簿以廟堂之尊而負天下之謗以人主之孝而暴君親之非朕方丁寧德意而申命于朝汝乃廢格詔書而持必于下於是崇觀以來濫賞悉免討論但命吏部審量而已八月戊辰參知政事張守等上刪修嘉祐政和敕令格式一百二十二卷看詳六百四卷詔以紹興重修敕令格式為名自來年頒行己巳權尚書工部侍郎韓肖胄以修敕成落權字九月甲午朔中書言池江二州地勢僻隘失祖宗分道置帥之意詔江東西路帥臣復還建康府洪州舊治乙未寧州觀察使韋淵求差遣上曰淵以宣和皇后季弟義當敦睦然其人素不循理故斥逺之朕不敢以公爵示私恩密院可與一逺闕恐居官有過難以行法已而以淵為福建路副總管戊戌刑部奏軍士黃德等劫殺案目其從二人倬子岸次刑寺欲原死上曰强盜不分首從此何用貸朕居常不敢食生物蓋懼多殺也盜於此時須當殺以止殺己亥詔文臣寄祿官依元祐法分左右字贓罪人更不帶以示區别用樞密院編修官揚願請也其後選人亦如之甲辰禮部言自今應賢良方正科乞並用從官三人薦舉不如所舉者坐之故事閣試六題以五通為合格及是侍郎李正民員外郎王居正言今復科之初使士大夫徒能記誦義疏亦無補於用權罷義疏出題外餘如舊制詔兼於義疏出題仍以四通為合格乙已詔百司稽違許御史臺六察官彈奏以侍御史沈與求援元豐故事有請也丁未尚書省請下江浙福建諸州造甲五千副兩浙之衢婺明湖州平江府江西之䖍吉州撫州各共千五百福建千二百饒信州八百逐州令通判一員董其事所費以上供折帛錢支從之辛亥合祭天地于明堂太祖太宗並配赦天下時中書舍人兼直學士院席益草赦文有曰上蒼懷悔禍之心羣䇿竭定傾之力六師奏凱九扈成功爰舉宗儀聿修大報上以夸大不恱癸丑開府儀同三司吕頥浩拜少保尚書左僕射同中書門下平章事兼知樞密院事甲寅初上以席益草赦文夸大惡之㑹益草吕頥浩復相制有曰朕中興聖緒兼創業守文之難上尤不喜乃出益知溫州戊午提舉臨安府洞霄宫范宗尹落職侍御史沈與求言宗尹十九罪故有是命乙未尚書省言近給賣新告價直高大變轉不行乞减修武郎為三萬緡承直郎為萬五千緡從之庚申初措置河南諸鎮屯田侍御史沈與求亦言今欲因㳂江荒閒之田募人屯耕用為籬落兼資儲餉此誠計之得者乃陳屯田利害為古今集議上下三卷上之詔付户部後亦未克行冬十月乙丑詔自今應京黼門人實有才能者公舉而器使之庶幾人人自竭以濟艱難之運時吕頥浩為政喜用材吏以其多出京黼之門恐為言者所指乃白上下此詔焉參知政事李回不為吕頥浩所喜力丐免罷為江西安撫大使兼知洪州丙寅江西安撫大使兼知洪州朱勝非分司南京江州居住侍御史沈與求論勝非避事辭難故貶己巳浙西統制官王德以黃榜招安邵青既而降之庚午户部尚書孟庾參知政事壬申詔行在置宗正一司將內外宗司分寓廣潮泉三郡上以行在宗子無統屬之人故有是命甲戌尚書吏部員外郎廖剛守起居舍人剛言陛下游意翰墨博覽羣書亦可謂之好學然帝王之學與文士異因援孟子所言天下之本在身與大學之道治國平天下其端在正心誠意願去末學之無益坐進此道則可以福羣生矣乙亥陜西諸路都統制秦鳯路經略使吳玠及金人戰于和尚原大敗之初宗弼㑹諸路兵及女真兵合數萬人謀入冦宣撫處置使張浚命玠先據鳯翔之和尚原以待之宗弼造浮梁於寶雞縣渡渭攻原玠及其弟璘率統制官雷仲等選徑弓强弩與戰分畨迭射號駐隊矢接發不絶且繁密如雨虜稍却則以竒兵邀擊斷其糧道凡三日是夜大破之俘馘首領及甲兵以萬計宗弼中流矢二僅以身免得其麾蓋自虜入中原其敗衄未嘗如此也於是浚承制以玠為鎮西軍節度使璘康州團練使涇原路馬步軍副總管宗弼既為玠所敗始自河東還燕山左副元帥宗維更以陜西副統制薩里罕為陜西經略使將兵屯鳯翔府與玠相持壬午尚書省言近分撥神武右軍往婺州屯駐合用錢理須摏辦緣行在至婺州不通水路難以津搬契勘便錢之法自祖宗以來行於諸路公私為便比年有司奉行不務經久致失信於民今來軍興調度與尋常事體不同理當别行措置詔户部印押見錢關子降付婺州召人入中執關子赴杭越榷貨務請錢每千搭十錢為優潤有僞造者依川錢引抵罪東南㑹子法蓋張本于此范汝為入建州遂據其城甲申初興元府利䕫路制置使王庶籍興元府興洋州諸邑及三泉縣强壯號曰義士知縣為軍正尉為軍副日閲武於縣月閲武於州不半年有兵數萬其後合興洋三泉四郡義士至七萬人至今不廢乙酉同知樞密院事富直柔言祖宗時三衙用邉功戚里班行各一人蓋有指意上曰參用戚里固祖宗法然窒礙處多恐不可用戊戌行在越州火燔民居甚衆己丑録唐宰相張九齡十二世孫昭為泉州文學壬辰録程頥孫闕為分寧今後五月又官其家一人十一月乙未提舉臨安府洞霄宫胡安國試中書舍人兼侍講秦檜薦之也丁酉承事郎王躍充廣西經略司幹辦公事專功提舉左右江峒丁及收買戰馬自五路既陷馬極難得議者謂嶺外於西南夷接境有馬可市時已罷買馬司以帥屬領其事工部侍郎韓肖胄言戰以騎兵為勝今川陜馬綱不通而廣右鄰諸畨宜即雍州置官收市專責成功故復置官提舉戊戌詔以㑹稽漕運不繼移蹕臨安先是尚書左僕射吕頥浩言今國步多艱中原隔絶江淮之地尚有巨賊駐蹕之地最為急務要當使號令易通於川陜將兵順流而可下漕運不至於艱阻至是遂定移蹕之議參知政事孟庾為福建江西荆湖宣撫使神武左軍都統制韓世忠副之己亥宣教郎婁寅亮守監察御史以其言宗社大計也辛丑太常少卿趙子畫請續編紹興太常因革禮明年乃成凡八十六篇為二十七卷子畫又言每歲春分日祀高禖自巡幸不行至於祓無子祝多男以係四方萬里之心蓋不可闕望自來歲舉行從之乙巳迪功郎陳剛中上書論今民力凋瘵國用匱乏而冗食之官衆不急之務繁行在之局務可省併者三分居一而州縣冗食尤可怪駭以月計之不知所費緡錢幾百萬民之脂膏日以乾涸邦之財賦日以蠧耗奈之何民不窮且盜也願罷冗食去虛文以足邦用上召對改合入官所陳令三省措置言者論浙西科斂之害以為均買度牒勸諭官告下户貧民皆以困乏不支糴錢强令輸粟號曰均糴又别立一名曰借糴復計頃畝以月科敷上下相蒙名曰健吏若今盜賊幾半天下豈天下之人皆跖之徒哉願詔重科敷之罪嚴貪墨之法庶幾人心未叛天命未改詔本路漕司究實知瓊州虞沇言近歲州縣之吏多賄敗者望自今命官犯入已贓許人越訴其監司不即按治者重行黜責從之磔張琪于越州市丁未德安府復州漢陽軍鎮撫使陳規奏本鎮營屯田畫一事件自中原失守諸重鎮多失惟規與羣盜屢戰羣盜稍息規以境內多官田荒田乃倣古屯田之制命射士民兵分地耕墾其說以兵民不可並耕故使各處一方軍士所屯之田皆相其險隘立為保塞冦至則保聚捍禦無事則乘時田作其射士皆分半以耕屯田少增錢糧官給牛種收其租利有急則權罷之使從軍凡民户所營之田水田畝賦粳米一斗陸田賦麥豆各五升滿二年無缺輸給為永業流民自歸者以田還之凡屯田事營田司兼行營田事府縣官兼行皆不更置官吏條劃既具乃聞于朝詔嘉奬明年下其法於諸鎮使行之庚戌同知樞密院事富直柔守本官提舉臨安府洞霄宫壬子手詔曰朕仰瞻坐思雪神人之大耻不有濟濟多士置我周行則不能也且已雖賢不若薦之為愈近得陳襄薦章草起司馬光而下三十三人審如所薦斯為盛矣合宣示百辟卿士各舉爾所知應內外侍從須三人以上在外令三省鏤板行下諸監司郡國郡國備録申牒諸寄居到限五日具名同罪保舉繳連以聞舉得其人當受上賞毋以先得罪於朝廷及蔡京王黼門人為嫌甲寅上曰周把任情喜怒不免濫刑以故言者紛然凡當官者小過失未有害唯濫刑為當懲聞杞守常州數濫殺人豈得不治朕日聽斷若任情殺人豈不可邪顧恐非理爾輔臣將順聖德退而記之以垂訓萬世臣留正等曰兵刑一道也古者大刑用甲兵中刑用刀鋸薄刑用鞭朴凡以禁暴而弭亂也唐虞之治不能無蠻夷姦宄之憂命咎繇作士刑期無刑而已矣太上皇帝推不嗜殺人之心於其大者既敬且戒則其小者不論可知也刑一無罪殺一不辜豈不傷好生之德乎此酷吏所以不免也乙卯紹興府奏百姓路榮失火罪狀上曰此灾不細恐是天戒不專為榮罪止杖遣足矣丁巳日南至命提舉萬夀觀兼侍讀王綯祀昊天上帝于告成觀初復舊理也辛酉僞齊秦鳯經略使郭振掠白石鎮宣撫司選鋒將王彥等併兵禦之賊兵大敗振為官軍所獲遂復秦州壬戌監察御史劉一止言伏見尚書六曹下逮百司凡所用法令類以人吏省記便為豫奪欺弊何所不有伏望改差詳定一司敕令所立限刋定􅍢板頒降庶幾杜絶官吏弄法受贓之弊詔如其請既而廣東轉運司以元祐吏部法來上乃命參以七司所省記元豐至紹興條例參酌修立再踰年而後成云十二月甲子朔詔直徽猷閣黃叔敖文學吏事皆有可觀恬退之節士夫推重可除給事中令所在以禮敦遣赴行在乙丑太常少卿趙子畫權尚書禮部侍郎本朝以公族為從官自子畫始丙寅詔依祖宗故事復置樞密都承㫖以兩制為之丁卯吏部侍郎李光請復東南諸郡湖田詔户工部取㑹聞奏初明越州鑑湖白馬竹溪廣德等十三湖自唐長慶中創立湖水高於田田又高於海旱潦則遞相輸放其利甚博自宣政間樓异守明王仲薿守越皆內交權臣專事應奉於是悉廢二郡陂湖以為田其租米悉屬御前民失水利而官失省稅不可勝計光奏請復之既而上虞縣令趙不搖以為便遂廢餘姚上虞二縣湖田而他未及也辛未夜行在紹興府火壬申言者論今日為百姓甚害無如科配一事常賦之外一嵗之間至五七次望今後除依法催科以備軍期外自餘非泛科抑一切停罷詔户部勘當户部侍郎柳約言過灾傷及經兵破難以不放逋缺外若實因軍期須索亦有許收量添酒錢應副或因軍期所需多科其數别作支用昨降㫖以自盜贓論望依纍降指揮施行從之時議者又言朝廷之上喜狥祖宗愛民之良法而諱言今日科斂之大害如早稻未熟而借冬苗春蠶未畢而催和買富民鬻田舍下户質子女籲天不聞誠宜嗟閔伏望明詔大臣繼自今勿以科斂為諱而特加條畫申飭監司俾不得加數掊尅因事侵漁詔申嚴行下乙亥初詔內外侍從官舉縣令中書記名以次除授而言者以為所舉多親舊或罪纍礙於銓選之人乃命吏部參考其負罪礙格之人並罷仍坐所舉官丁丑手詔略曰比緣國難盜起未息者蓋姦贓之吏無恤民意及煩王師而軍須不免又取於民因循展轉日甚一日欲民不為盜不可得也可將建炎三年以前積缺除形勢户及公人外一切蠲除如州縣不奉詔及監司迫脅州縣巧作催科者並除名令御史臺紏察多出黃榜曉諭又詔三省備坐祖宗廟措决職吏舊制鏤板行下自今有犯依法行遣仍籍沒家財上以軍興民困吏緣為姦故盜賊蜂起乃下此詔焉以嶽飛為神武副軍都統制仍以所部屯洪州時飛遣其甥壻高澤民至紹興乃詐為飛狀乞都統制或總管職事飛皇恐自辨詔諭以出自上意仍鑄印賜之曹成據道州戊寅以彗出㑹稽許臣民實封言事詔行在職事官人添職錢十千辛巳復置廣東茶鹽司舊淮南鹽息嵗收八百萬緡自軍興淮南道梗許通廣鹽於江湖諸路而二年半入納才七十萬緡至是江湖鹽價每斤為七八百錢議者以為利厚而冒販者多故復置官提舉户部侍郎柳約復請增諸路酒錢上等每石二千下等一千其半令提刑司樁管餘備軍費從之初監察御史婁寅亮既陳宗社大計尚書右僕射秦檜以寅亮富直柔所薦惡之使言者論寅亮宣和中父死於賊匿不舉喪壬午詔大理寺劾治甲申右司諫方孟卿言祖宗故事諫官置局於後省號為兩省官蓋兩省朝廷政令所自出祖宗以諫官居之不無深意今行在諫院許於皇城內建置未有定處望令依舊隨省置局詔諫院許於行在所都堂相近置局丁亥言者請贓吏當死者勿貸上曰朕本心欲專尚德化顧贓吏害民有不得已者然亦豈忍遽置縉紳於死地如前詔杖遣足矣閣門宣贊舍人潘永思追一官坐為人市恩澤也先是大理推治事連永思上曰永思雖戚里既有過安可廢法乃命罷職就逮戊子宣撫處置使張浚奏和尚原勦殺金人是日吕頥浩等進呈浚奏劄言為水運以給西軍上曰朕料浚必能立功秦檜因奏去年論浚者紛紛賴陛下保全得以安跡萬一有功實賴陛下知人善任使不惑浮言之效上因備論天下事有利必有害但害少而利多皆所可為若聽浮言則事將俱廢頥浩檜出至省府未食捷奏至上大喜壬辰詔自今春試選人及京官初出官人銓試如故事後不果試明年秋乃克行之賜陳東家錢五十萬詔以冬寒命有司賑給行在紹興府居民不能自存者其後移臨安亦如此例初命户部降本下江浙湖南和糴米以助軍儲南平王李乾德薨子陽煥立壬子紹興二年春正月癸巳朔上在紹興是日從官以下先發以將還浙西也甲午詔自今科場復置賢良方正能直言極諫科乙未詔諸路死囚應讞者道路已通處依舊法奏按未通處許酌情减降如舊上語及禁戢贓吏吕頥浩曰贓吏侵漁不可不禁然州縣官依條格合得請給宜按月支與使之食足然後可以養亷隅上曰然輔臣因進呈諸路公使庫支給外縣官供給條格詔申明行下丙申福建江西荆湖安撫副使韓世忠圍建州先是世忠師至福州守臣程邁以賊方鋭欲世忠少留以俟元夕世忠笑曰吾以元夕凱旋見公矣辛丑世忠拔建州初范汝為既被圍固守不下世忠以天橋對樓雲梯火炮等急擊之凡六日賊衆稍怠夜官軍梯而上城遂破賊衆死者萬餘生擒其將張雄等五百餘人汝為竄回原洞中自焚死其將葉諒以所部犯邵武軍世忠擊斬之餘衆悉平初世忠疑城中人皆附賊欲盡殺之資政殿大學士李綱時在福州見世忠曰建州百姓多無辜世忠受教及城破世忠令軍人悉駐城上毋得下植旗於城之三隅令士民自相别農者給牛種使耕商賈者弛征禁為賊脅從者汰遣獨取其附賊者誅之由是多所全活及師還父老請祠之世忠曰活爾曹者李相公也壬寅上御舟發紹興至錢清堰乘馬而行丙午上至臨安戊申武功大夫榮州團練使蘇易乞以奉化縣界把截所轉一官於階官上收使許之自政和初改官名以郎大夫易正副使由是武功大夫率徑遷橫行至是橫行凡數百千人中書舍人程俱力論其不可且謂祖宗之制自閣門副使至內客省使為橫行不係磨勘遷轉之列蓋橫行恩數多類從官以元豐二年班簿考之橫行共二十二人如种諤韓存寶劉昌祚姚麟之徒皆一時名將故元豐官制武臣獨依舊不以寄祿官易之蓋有深意今文臣之謂庶官者率不過中大夫而武臣乃遷橫行此何理也望自今非軍功勿遷從之己酉江淮發運副使宋輝知臨安府丙辰詔見任郎官以建炎以來未經上殿者並引對吏部侍郎李光言方艱難之時朝廷廣收人才兼收議論郎官最號高選其間豈無英傑之士可備大用乃不令一覲清光亷退之士固難於自進故有是㫖丁巳右司諫方孟卿言近權户部侍郎柳約請推祖宗限田之制凡品官民田數過者科敷一同編户今郡縣之間官户田居其半而占田過數者極少若以格令免科需則專取於民必致重困臣謂艱難之際士大夫義當體國豈可厚享占田之利望寢前詔勿行從之乙卯詔輔臣以邵青單德忠李捧三盜就招卿等速汰其衆留精鋭堪出戰之士萬人中不過三千人可留宰相吕頥浩秦檜都統制張俊被㫖揀放青等有衆二萬三千其疲老不任披帶者皆釋之所存七千一如上所料臣留正等曰世傳漢高帝預知吳王濞五十年後必反謂狀有反相可知也至於五十年之說非通於數者不能蓋不然且其知三傑料陳平期周勃之安劉氏此豈數之能及哉大抵帝王之興其睿智絶人太上皇帝料降卒可用之數妙於蓍龜其張良所謂沛公殆天授者歟戊午詔自今停藏接引私鹽並與犯人一等科罪己未詔修臨安府城之頽圯者辛酉忠州團練使楊勍以所部四千屯吉州恣橫不法江西兵馬副總管楊惟忠邀勍㑹飲伏兵誅之遂并其兵勍建炎中為盜踐蹂福建湖南諸州至是乃敗二月丙寅詔建州權罷鼓鑄二年以監兵避亂散逸故也丁卯詔選人七階並分左右時用元祐舊制寄祿官分左右而贓吏不與焉言者謂祖宗以來選人皆以州縣繫銜故無所分别今選階品秩雖卑豈可無以津貪而獨置之亷耻之外乃下吏部如所請己巳詔𣙜貨務依臨安府樣製造斛㪷百隻降之諸路倉部員外郎成太亨言紹興府斛㪷增大出給之際例合折閲興獄滋多惟臨安㪷斛均平公私兩便故有是㫖庚午提舉臨安府洞霄宫李綱為荆湖廣南路宣撫使兼知潭州前五日知道州向子忞奏曹成犯道賀二州宰相秦檜請身至湖外自當一面上曰卿等當居中運才不可授人以柄至是命綱辛未上諭輔臣曰將來御試舉人止造席棚於講殿之前不必更修别殿吕頥浩因讃聖德以為如此可以示四方士人使知陛下恭儉如此上曰朕天性不好華靡况與承平之主不同秦檜曰大布之衣大帛之冠是古人處患難之事後世以為誇美上曰卿言極是壬申詔自今巡尉毋得注吏職出身人乙亥雨雹丁丑給事中黃叔敖兼侍讀權尚書吏部侍郎廖剛兼侍讀始淮南營田司募民耕荒須收十五斛及是宣諭使傅嵩卿言其太重故百姓歸業者少詔損嵗輸三之二俟三年乃徴之仍賜嵩卿錢五萬緡俾貸民為牛種之費己卯進呈張浚劄子上曰金人既酋領有不免者當知天意所在朕當兢謹以祈天弭禍庶幾其國有瘳乎奏檜因奏言每見陛下屈已從諫中外士民無不感悅上曰如前日百姓揭牌題以供御繡服問之乃十年前京師鋪戶用其舊牌已令毁撤不知者將謂舊習未革朕所服者多繒素豈復有綺繡也庚辰詔自今監司不得任本貫其見在任者皆移之夜雷聲初發癸未上始御講殿自巡幸以來經筵久輟至是復之乙酉上諭輔臣曰人主待臣下當以至誠若知其不可用不若罷去疑而留之無益也又曰人主之德莫大於仁仁之字非堯舜莫能當吕頥浩秦檜曰聖學高明以誠仁二者治心修身正家齊天下有餘裕矣丙戌初置著作官二員編次日厯庚子知撫州高衛落職與宫觀衛言甘露降于州之祥符觀且為圖上之王居正論今日恐非天降祥瑞之時言者劾衛以蔡京圍田叨冒改官頃者抗疏極言討論之非實自為地縉紳號為流外侍郎今乃崇飾諂諛老不知愧望賜罷黜從之殿中侍御史江躋言自古言利之臣不過椎剝細民移東於西以欺其上近聞前知明州吳懋輒有所獻踰五萬緡竊恐朝廷受之無名小人觀望爭相效尤殘民以為己利其患有不可勝言者詔委自憲臣勘當以聞懋守明踰年時四民承喋血之餘公私掃地懋以等第貸民錢十萬緡又得𣙜酤之嬴軍用無乏其後勘當如章但貶懋二秩而已己丑有司以春分日祀高禖禮畢宫嬪有位號者以次即宫中飲福受胙如儀復荆湖東西為荆湖南北路庚寅監察御史婁寅亮罷寅亮既為秦檜所擠按治無所得至是獄成坐為族叔郛名田改立官戶刑寺當寅亮私罪杖罰銅七斤詔免所居官送吏部未幾寅亮卒三月壬辰朔䖍化縣凶賊李敦仁補閣門秖候其徒三十八人皆授官分𨽻張俊等軍中淮西招撫使李光執韓世清于宣州水賊翟進犯漢陽軍殺權軍事趙令戣及吏民百餘人以其衆歸於孔彥舟甲午詔兩浙市舶就秀州華亭縣置司承直郎施逵除名婺州編管坐為范汝為游說辛企宗也戊戌罷江淮發運司以其錢帛赴行在始祖宗時發運司嵗漕江湖粟六百萬斛即真楊楚泗州置轉般倉納受沂流摺運以贍中都且因諸路之凶豐而平其糴及是江湖盜寇多綱米不繼發運司嵗費錢十六七萬緡第職糴買而已故省之襄陽府鄧隨郢州鎮撫使桑仲為知郢州霍明所殺囚其從者而以反聞上惻然授其二子昕維將仕郎己亥制授南越王李乾德子陽煥靜海軍節度使封交趾郡王仍賜推誠順化功臣自元豐後大臣功號悉除獨安南如故庚子詔自今行軍專委本路漕臣一員通融應副陜西都統司同統制軍馬楊政及金人戰于方山原敗之辛丑鑄紹興經筵印淮東提㸃刑獄公事兼營田副使王實言根括到楊州未種水田一萬七千頃陸田一萬三千頃已分給六軍趂時耕種從之丙午復置中書門下省檢正官一員戊申江東統制軍馬張俊叙所降一官俊起於諸盜所部凡七千餘人至是汰其老弱僅三千乃有是命此即小張俊也己酉臨安府布衣孫清上疏論事詔賜束帛癸丑詔寬兩淮租稅童子朱虎臣七嵗能誦七書排定布射與其兄端友皆來上召對端友以誦經子書賜束帛而虎臣為承信郎甲寅上䇿試諸路類試奏名進士于講殿上謂輔臣曰朕此舉將以作成人才為異日之用若其言鯁亮切直他日必端方不回之士自崇寧以來惡人敢言士氣不作流弊至今不可不革因手詔諭考官直言者置之高等尤諂倿者居下列鹽官進士張九成對䇿曰禍難之作天所以開聖人願陛下以剛大為心無遽以驚憂自沮臣觀金人有必亡之勢而中國有必興之理特在陛下何如耳夫好戰必亡失其故俗必亡人心不服必亡而金虜皆與有焉彼劉豫者素無勳德殊乏聲稱天下徒見其背叛於君親而委身於夷狄耳㸃雛經營有同兒戲今日之計當先用越王之法以驕之使侈心肆意無所忌憚天其滅之將見權臣爭强篡奪之禍啓矣臣觀濵江郡縣為守令者類無逺圖陽羡惠山之民何其被酷之深也率斂之名種類閎大秋苖之外又有苖頭苖頭未巳又行八折八折未巳又曰大姓大姓竭矣又曰經實經實均矣又曰均敷均敷之外名字未易數也流離奔竄益以無聊臣竊謂前世中興之主大抵以功德為尚去讒節欲逺佞防姦皆中興之本也今閭巷之人皆知有父兄妻子之樂陛下雖貴為天子富有四海以金人之故使陛下冬不得溫夏不得凊昏無所於定晨無所於省每感時遇物想惟聖心雷厲天淚雨流思欲掃清蠻帳以迎二聖之車又曰閹寺聞名國之不祥也今此曹名字稍稍有聞此臣之所憂也賢士大夫宴見有時宦官女子實居前後有時者易踈前後者難間聖情荏苒不知其非不若使之安掃灑之役復門户之司凡交結往來有禁干與政事者必踈陛下日御便殿親近儒者講詩書之指趣論古今之成敗將見聞閹寺之言如孤狸夜號而鴟梟晝舞也上感其言擢九成第一餘杭凌景夏次之尚書左僕射吕頥浩言景夏之詞實勝九成欲以為第一上曰九成對䇿文雖不甚工然上自朕躬下逮百執事之人無所回避擢置首選誰謂不然遂賜九成以下二百五十九人及第出身同出身而川陜類省試合格進士楊希仲等一百二十人皆即家賜第希仲視廷試第五人恩例餘皆同出身龍圖閣直學士致仕楊時遺九成書曰廷對自更科以來未之有非剛大之氣不為得喪回屈不能為也金人復自水洛城入冦統制官楊政等又大敗之丙辰詔韶州自今所鑄新錢毋得滅裂務令民間不能倣效上謂吕頥浩曰比來苦雨前日祈晴雨即止朕遣人於郊外取麥穗視之已結秀若晴霽十數日二麥必大熟茲誠上瑞何必甘露慶雲耶頥浩奏曰太宗皇帝嘗命親近人取禾穗入禁中又駕幸近郊觀稼皆聖主務農重穀之意戊午詔景靈宫酌獻嵗用三百五十羊自今損三之一詔應有坑冶去處令漕司契勘所得不償所費者並罷庚申初桑仲之未死也遣談憲來告以願宣力取京師乞朝廷出兵淮南以為聲援吕頥浩信之始大議出師夏四月壬戌進呈殿試升降䇿因奏有犯御名者上曰犯御名法當扶出然使文理可采亦不可因以失士庚午翰林學士承㫖兼侍讀翟汝文參知政事辛未復置諸州學官四十三員時言者論文武之道不可偏廢須緣議者務减吏員諸州教授例從鐫减今所在州郡添差管庫捕盜官無慮十數何獨於此而吝之事下給舍看詳而有是命壬申江東兵馬副總管楊惟忠討軍賊趙進降之乙亥初命館職校御府書籍戊寅進呈新第正奏名雜犯助教人乞依特奏名例推恩上曰初降㫖令考官以鯁正為上諛佞居下此以示朕好惡凡士人當須自其初進别其忠佞庶可冀其有立如張九成對上自朕躬下逮百職言之無所回避擢在首選其誰曰不宜己卯執政奏事上諭二相曰頥浩專治軍旅檜專理庶務當如范蠡大夫種分職先是吕頥浩聞桑仲進兵乃大議出師而身自督軍北向及是上諭輔臣二人唯唯奉詔朱勝非閒居録曰吕頥浩秦檜同秉政檜謀出吕而專其政使其黨建言周宣內修政事外攘夷狄故能中興令二相宜分任內外之事於是除頥浩江淮荆浙都督諸軍事總兵江上置修正局議更張法度而檜領之庚辰太學生許燾上書論事上召對命為迪功郎壬午手詔曰比自國步艱難以來中原士夫隔絶滋久間有流寓東南者往往乏媒寡援姓名不能上逹良可惜也可詔內外侍從監司郡守各搜訪薦舉三兩人以備器使夜臨安火癸未詔曰朕寤寐中興纍年于茲任人共政治效缺然載加考績登庸二相蓋欲其謀斷協濟事功倚毗眷遇體貌惟均凡一時啓擬薦聞之士顧朕拔擢任使之間隨其材器試可乃已豈有二哉繼自今小大之臣其各同心體國敦尚中和交修不逮如或朋比阿附以害吾政治者其令臺諫論列聞奏朕當嚴置典刑以誅其意時吕頥浩秦檜同秉政檜知頥浩不為時論所與乃多引知名之士為助欲傾頥浩而專朝權上頗覺之故下是詔甲申中書舍人胡安國上制國論大略謂陛下登極六年謀議紛紜未有一定昨嘗降詔定都建康而六飛暫駐杭越乃以湖北為分鎮恐非設險守邦之意且朝廷近弃湖北逺流川陜者謂蜀貨可以富國秦甲可以强兵也萬一有桀黠得之以守峽江之險則蜀貨不得東塞武關之阻則秦甲不得南猶一身束其腰膂而首尾不相衛矣臣謂宜必都建康且不以湖北為分鎮則全據上流出秦甲下蜀貨而血氣周流矣又言祖宗都汴其勢當自內而制外今都江左當自南而制北與祖宗事雖殊而意則同此復中原之勢也乙酉吕頥浩言近至天竺祈晴今雨少霽可以少寬聖慮上曰朕宫中亦自育蠶此不惟可候嵗事亦欲知女工艱難事事質儉李綱始受湖廣宣撫使之命是日上遣內侍于蓋撫問令視上道乃還賓客多往賀綱有臨川陳冲用者獨不賀人問其故冲用曰丞相在靖康末以天下安危自任人望所歸今雖閒居其望猶重若因此成功尚蓋前失萬一又無所成今日之名掃地矣何賀之有戊子尚書左僕射同中書門下平章事兼知樞密院事吕頥浩都督江淮荆浙諸軍事開府鎮江韓忠彥進封魏國公己丑詔建州豐國監復鑄錢監舊有役兵五百歲鑄錢二十五萬緡及是才餘役卒數十人乃减鑄額之半庚寅僞齊劉豫移都汴京閏四月癸巳高麗國王楷遣崔維清沈起入貢衍聖公孔端友既卒詔以其子玠為右承奉郎封衍聖公甲午上諭吕頥浩曰卿耆艾有勞今總督之任以大事委卿不當復親細務頥浩皇恐奉詔乙未詔諸路類試進士赴殿試不及人正奏名與進士同出身特奏名與助教調官以道梗特優之也丙申神武副軍都統制嶽飛引兵擊曹成于賀州境上大敗之成率餘兵屯桂嶺縣丁酉罷後苑作惟留老工數人作弓鎧以為武備己亥吕頥浩進呈樞密院編修官王大智所造戰車上言大智知兵法可用因語頥浩人才隨能器使皆可就事卿為宰相當識拔人物如大智宜携以自隨令造水戰之具不當弃能也詔移紹興府榷貨務都茶場於臨安辛丑詔韓世清特處斬乙巳宰相奏以大理卿章誼知平江府上曰誼儒者賴其奏讞平怒使民不寃勿令補外丙午神武副軍都統制嶽飛敗曹成於桂嶺縣成拔寨遁去韓世忠遣董􅌈往招之成以其衆就招壬子吕頥浩言今嵗防秋當用兵江淮之間若車駕時巡則諸將孰敢不盡力但恐道路玊食不備上曰朕自艱難以來奉身至約昔為元帥與士卒同甘苦一日在道絶糧朕亦終日不食今居禁中雖太官上食間食彘肉一味若在道路雖無肉食庸何傷乎乙卯詔寺監丞以下並令吏部擬除時吕頥浩秦檜言祖宗舊制內外差遣並付審官士大夫自有調官之路故請謁奔競之風息近世堂除闕多侵占注擬士人失職亷耻道喪欲外自監司郡守及舊格堂除通判內自察官省郎以上及館職書局編修官外並令吏部依格注擬從之戊午將仕郎賀廩獻書五千卷詔吏部添差廩監平江府糧料院仍官其家一人己未封漢南昌尉海福為吏隱真人初桑仲既為知郢州霍明所殺都統制李橫副統制李道共率其兵縞素圍郢州明知事急乃夜半與其徒數百捶石城下漢江泛舟順流而去橫遂併將郢軍留其黨李簡知郢州五月庚申朔日北至祀皇地祗于天慶觀之望殿祭始用牲玉辛酉兵部尚書權邦彥簽書樞密院事邦彥獻十議以圖中興其一謂進圖洪業恢復土宇勿茍安于江南其二謂駕御諸將宜威之以法而限之以爵其三論講讀之官宜取三代漢唐中興故事日陳于前其四言察忠邪其五論愛民先愛其力寬民先節其用又謂朘已俸以佐國用當自宰執始又謂分閫而屬大事必得賢大將而後可又謂制置一官可省又謂宗室中傑然有人望可留宿衛者宜置諸左右又謂人事盡則天悔禍不可獨歸之數吕頥浩與邦彥善故薦用之壬戌降授中大夫朱勝非復左宣奉大夫提舉萬壽觀兼侍讀吕頥浩薦之也癸亥吕頥浩出師以神武後軍及御前忠鋭將崔增趙延壽二軍從行百官班送甲子詔觀察使以上許薦可為將師者二人樞密院置籍以備選用言者論今正右武之時雖二大將嘗立竒功而取富貴矣竊恐隱約之中尚多竒士故有是㫖丁卯罷兩浙轉運司回易庫辛未詔左文林郎趙子稱令赴都堂審察時知南外宗正事令㢜奉詔選宗子伯琮伯浩入禁中伯浩豐而澤伯琮清而癯上初愛伯浩忽曰更仔細觀乃令二人並立有猫過伯浩以足僦之伯琮拱立如故上曰此兒輕易乃爾安能任重耶乃賜白金三百兩罷之後四日以子稱為左宣教郎壬申以霖雨不止命刑部郎官及諸路憲臣躬督獄訟丙子初朝廷以福建江西荆湖宣撫使孟庾自溫州趨湖南故命湖廣宣撫使李綱由汀道州之鎮至是綱言祖宗朝宣撫使以執政為之近張浚孟庾為宣撫皆見執政如臣起廢典藩亦冒使名兼庾已領湖南北韓世忠副之今又除臣湖南借使諸處盜賊一司欲令招納一司欲令討捕不知何所適從諸州錢糧一司欲令支用一司欲令樁留不知如何遵禀以至節制諸將辟差官吏行移措置皆有所妨望詳酌事宜明降處分使有遵守綱又言自建昌䖍吉至衡潭約一月程自汀道州三倍今曹成在連賀非重兵不可行詔綱先往廣東置司捍冦俟庾世忠撫定盜賊畢赴潭州於是曹成已為嶽飛所破遂就韓世忠招安而朝廷未知也丁丑初吕頥浩總師次常州其前軍將趙延壽所部忠鋭軍叛過金壇縣知縣事胡思忠率射士迎敵為所敗賊逐之至市河思忠溺死浙西安撫大使劉光世遣王德追叛兵及之盡殱其衆於是頥浩稱疾不進庚辰臨安府火彌六七里延燒萬餘家時浙部淫雨害稼御史中丞沈與求因推言灾異謂徽嚴水泉暴湧漂及城郭廬舍臨安火延居民至萬餘家天變異常同時而見可畏也陛下當於行事之際思其所未至者加之以誠夫畏天不以誠則工祝雖具近於致瀆愛民不以誠則詔令雖繁終於失信用人不以誠則讒間日進將以疑似而逺正人聽言不以誠則阿諛日聞將以忌諱而惡直士追祖宗之法而不以誠則不無背戾惇骨肉之親而不以誠則不無猜嫌薄宦寺之權而不以誠則雖名為裁抑而桀黠之輩不除正宫闈之化而不以誠則雖外示朴素而奢靡之習猶在願陛下加意而行則天地感格隂陽和平灾異之生顧為福耳上嘉納焉癸未御史中丞沈與求言敵若入冦當由武昌建康兩路而來其造海舟慮為虛聲以懼我議者多欲於明州向頭設備使賊舟得至向頭而已入吾心腹之地矣臣聞海舟自京東入浙必由泰州石港通州料角陳貼通明鎮等處次至平江南北洋次至秀州金山次至向頭又聞料角水勢湍險一失水道則舟必淪溺必得沙上水手方能轉料倘於石港料角等處拘收水手優給庸直而存養之以待緩急之用彼亦安能衝突詔以副都督府既而吕頥浩言料角等處去金陵遙逺緩急恐失事機乞就委劉光世措置從之三省請於行在别置作院一所令諸軍匠各造器甲並申朝廷支撥後以御前軍器所為名仍𨽻工部甲申上臨軒踈决繫囚自是遂為故事戶部請諸路上供絲帛並半折錢三千如兩浙例許之是時江浙湖北䕫路嵗額綢三十九萬匹江南川廣湖南兩浙絹二百七十三萬匹東川兩浙湖南綾羅絁七萬匹成都府廣西路布七十七萬匹成都府錦綺千八百餘匹段皆有竒江淮閩廣荆湖折帛錢蓋自此始丙戌詔置修政局時尚書左僕射吕頥浩既督軍於外右僕射秦檜乃奏設此局命檜提舉而參知政事翟汝文同領之又以尚書戶部侍郎黃叔敖為參詳官起居郎胡世將太常少卿王居正為參議官尚書右司員外郎吳表臣屯田員外郎曽統兵部員外郎樓照考功員外郎張覺並為檢討官置局如講議司故事仍詔侍從臺省寺監官監司守令各述所見言省費裕國强兵息民之䇿詔江東西諸州上供絲帛並於建康府吉州樁管非朝㫖而擅用者依軍法丁亥初宣撫處置使張浚以淮鹽未通乃通天寧鹽於京西湖北至是秦檜聞其事下堂帖禁之其後浚復通蜀鹽詔不許戊子手詔用建隆故事行在百官日輪一人轉對令極言得失先是詔臺省官限半月各述利害條具以聞而御史中丞沈與求言臺諫係言事官遇有職事非時入對不在輪對及條列之限乃命厘務官通直郎以上如初詔朱勝非復觀文殿學士知紹興府初兩浙轉運副使徐康國自溫州奏發宣和間所製間金銷金屏障等物至行在御史中丞沈與求奏曰陛下勤儉德侔大禹漢文帝已下不足道也康國不識事君之禮尚習故態欲以微物纍盛德乞用廣陵故事斥而焚之仍顯黜康國明示好惡且為小人希㫖之戒詔屏障令臨安府毁弃康國特降二官六月庚寅朔新知復州李宏引兵入潭州執湖東招撫使馬友殺之辛卯吕抗吕托並直祕閣主管萬壽觀吕挺為右承務郎中興後大臣子以恩澤除職名自此始朱勝非閒居録曰祖宗舊制宰執子弟並不堂除只於銓部注擬罷政不以罪則推恩遷擢蓋二府號表則之地不阿其親當以身率也至蔡京作相不數年子六人孫四人為執政侍從建炎以後子弟得職名者汪伯彥子召嗣直徽猷閣吕頥浩二子抗托秦檜兄梓並為直祕閣張浚兄滉亦直徽猷閣李綱弟維亦直祕閣權門復啓蓋諸公不為國家計也詔進士陳邉事可采及自河北京東逺赴行在之人並充樞密院效士其後都督行府亦如之癸巳頒黃庭堅所書太宗御製戒石銘於郡縣命長吏刻之庭石置之坐右初命廣西經略司即韶州撥內帑錢三十萬緡市戰馬至是經略司言比嵗不逞之徒多以金銀市馬鬻於羣盜故馬直踴貴望於大觀格遞增二分許之舊格入等馬高四尺七寸者直四十五千最下高四尺一寸者直十有三千其餘以是為差然蠻馬尤駔駿者在其地或博黃金二十兩日行四百里但官價有定數故不能致此等馬甲午上諭輔臣曰士有從軍該賞者可第補右選庶清流品三年自有科舉取士豈可開此一路上又曰今厯官不精推步七曜細行皆不能算故厯差一日近得紀元厯已令參考自明年當改正戊戌朝廷聞曹成為嶽飛所破乃命孟庾班師李綱徑如潭州而飛以所部之江州屯駐己亥江東安撫大使李光乞行宫比臨安增創後殿仍修蓋三省樞密院百司及營房等許之其後上手詔光第令具體而微毋困民力輔臣進呈上曰但令如州治足矣若止一殿雖用數萬緡亦未為過必事事相稱則土木之侈傷財害民何所不至壬寅御筆翟汝文罷參知政事時四方上奏未决吏緣為奸汝文語尚書右僕射秦檜宜責都司考其稽違者峻懲之汝文嘗受詞牒書字用印直送省部檜不能平他日因對汝文乞治堂吏受賄者檜靣劾汝文擅治吏汝文言臣位執政按吏而為宰臣所劾無顔居位力求去上意不直汝文右司諫方孟卿因奏汝文不顧大體豈能共濟今日之事蓋防秋在近規為脫去之計上以詔諭留汝文汝文終不釋孟卿章再上遂命出守朱勝非閒居録曰秦檜作相力引翟汝文參預才數月失歡對按相詬秦斥翟曰狂生翟詈秦曰濁氣左右堂吏至今能言之唐相鄭畋盧攜議偹禦王仙芝黃巢爭論不叶擲硯相擊識者謂唐室衰亂之兆今方圖中興豈當爾耶蘄黃鎮撫使孔彥舟叛降僞齊乙巳詔僉書樞密院事權邦彥兼權參知政事戊申輔臣進呈大理少卿李曦論太祖皇帝明謹獄事上曰此太祖皇帝德澤也朕敢不遵承每於庶獄奏讞未嘗不謹慎亦未嘗送下公事恐獄吏觀望煆煉人罪邦彥曰法者天子所與天下公共上然之庚戌御史中丞沈與求言祖宗故事許令館職兼在京厘務官所以蓄養人才自今劇曹郎官并繁冗局務有闕乞於館職編修計議刪定官太常丞博士國子監丞內隨才選差亦可試其能否從之自是職事官復權郎矣癸丑李健提舉江西茶鹽公事初復提舉官也甲寅詔都督江淮荆浙諸軍事吕頥浩令赴行在奏事初頥浩甫出師而其前軍叛去又聞桑仲死頥浩不能進遣參謀官傅嵩卿以所部之建康因引疾求罷上手詔封還所上章頥浩復乞祠乃命還朝以嵩卿權主管都督府執事乙卯上謂秦檜曰周宣內修政事外攘夷狄近設修正局令百官各條具利害甚善所謂修車馬備器械外攘夷狄之事卿更宜講求檜曰臣敢不奉詔福建江湖宣撫司統制解元巨振以所部入潭州執李宏以歸韓世忠即以宏為宣撫司統制時朝廷始聞馬交死以敕書勞宏而宏已執矣丁巳神武右軍都統制張俊請本軍自造軍器赴朝廷呈訖置庫樁管下戶部支物料價錢許之戊午詔江浙湖廣福建諸路各委漕成一員出賣官田秋七月辛酉御筆福建州縣盜賊焚劫之家悉捐其田稅先是德音蠲免而有司以為著令不得過三分上欲實惠及民繇是申命壬戌復置湖北提舉茶鹽司癸亥初令廣西經略司以鹽博馬其後嵗撥欽州鹽二百萬斤與之初江東安撫大使李光奏小使臣翟慶賀仲堪為宣州兵馬監押如有已差人亦乞從今來所辟施行詔並特添差甲子殿中侍御史江躋言臣嘗怪近日帥守監司辟官往往不知尊朝廷必欲直衝吏部已差之人朝廷既不能奪吏部已行之命又不能違藩鎮辟置之意則不惜以添差與之朝廷姑息藩鎮可謂得已而不已願罷慶仲堪仍下吏部措置每州縣添差不得過若干貟以寬民力從之令修政局措置罷福建提舉市舶司令憲臣兼領乙丑給事中胡安國入對上曰聞卿大名何為纍召不至安國再拜辭謝進曰臣聞保國必先定計定計必先定都建都擇地必先設險設險分土必先遵制制國以守必先恤民夫國之有斯民猶人之有元氣不可不恤也除亂賊選縣令輕賦斂更弊法省官吏皆恤民之事也而行此有道必先立政立政有經必先核實核實者是非毁譽各不亂真此致理之大要也是非核實而後賞罰當賞罰當而後號令行人心順從惟上所命以守則固以戰則勝以攻則服天下定矣然致此顧人主志尚如何耳尚志所以立本也正心所以决事也養氣所以制敵也宏度所以用人也寬隱所以明德也具此五者帝王之能事備矣乞以核實而上十有五篇付宰相參酌施行先是安國為時政論二十篇以獻其論定計略曰陛下履極六年以建都則未有必守不移之居以討賊則未有必操不變之術以立政則未有必行不反之令以任官則未有必信不疑之臣論建都謂建康有可都者五不宜數動與夷狄逐水草無異論設險謂欲固上流必保漢沔欲固下流必守淮泗欲固中流必以重兵鎮安陸論正心謂在先致其知而誠其意故人主不可不學論養氣謂用兵之勝負軍旅之强弱將帥之勇怯係人主所養之氣曲直如何願强於為善益新厥德使無曲失可得指議論宏度謂人主以天下為度不可以私勞行賞私怨用刑論寬隱謂創業興衰之君柔遜謙屈必施於林壑退藏之士以礪其節獨以威刑外施暴橫之戎內拂貪殘之賊與悍驕不可使之將讒說殄行之臣則天下歸心而治道成其大指如此至是又申言之時上欲講春秋遂以左氏傳付安國㸃句安國言今方思濟艱難豈宜耽玩文采莫若濳心聖人之經上稱善安國因薦司勳員外郎朱震資政殿學士新除提舉萬壽觀兼侍讀張守知福州從所請也上曰福建盜賊之後要在拊循凋瘵用守為宜初僞閩以八州之産分三等之制膏腴者給僧寺觀中下者給土著流寓自劉䕫守福始貿易以取資守與士大夫謀為實封之說存留上等四十餘剎以待高僧餘悉為實封金多者得之嵗入不下七八萬緡以助軍衣餘寬百姓雜科時實便之起居郎王居正知婺州居正素與秦檜善檜為執政嘗與居正論天下事甚鋭及拜相所言皆不讎居正見上曰秦檜嘗語臣中國之人惟當著衣噉飯共圖中興臣時心服其言又自謂使檜為相數月必驚動天下今為相施設止是願陛下以臣所言問檜所行於是檜始恨之己巳上謂輔臣曰比來臺諫論駁多涉細事意其沽敢言之名朕謂宣和間言事者少千百中無一今朕盡令人言不間踈逺所以人人敢言癸酉上諭秦檜曰內諸司可省者令修政局條上檜曰此盛德事也大觀宣政間屢省冗費終不能行今斷自淵衷誰敢不聽甲戌給事中胡安國進兼侍讀給事中陳瑀中書舍人陳與義並兼侍讀上令安國兼讀春秋仍諭以隨事解釋不必作義朕將咨詢臣留正等曰易之文言曰君子學以聚之問以辨之寬以居之仁以行之而下文繼之曰君德也蓋人君之德莫大於學問寬也者所以居是學問者也仁也者所以行是學問者也學則必有思思則必有疑疑而問問而辨辨而明明而廣大昭徹與天地等得失是非不能為之亂賢否忠侫不能為之惑欲帝而帝欲王而王惟所擇而用之無不如意夫是之謂君德堯舜禹湯文武之所以汲汲也仰惟太上皇帝以天縱之聖當艱難之初萬機之繁日不暇給而留神六籍退托不明申命講臣無為義訓隨事解釋用將咨詢焉嗚呼茲君德之盛所以與堯舜禹湯文武相望於千百年之上也知無為軍王彥恢言建康古都乃用武之地欲保建康必內以大江為之控扼外以淮甸為之藩籬又必措置兵食以贍國費然大江以南千里浩渺决欲控扼非戰艦不可大江以北萬里坦途欲遏長驅非戰車不可舒廬滁和良疇百萬欲措置軍食非營田不可舟車之法以輕捷為上彥恢所制飛虎戰艦傍設四輪每輪八楫四人旋斡日行千里又有神武戰車下安四輪略同飛虎頂張布帷以避矢石傍斜衝擊其用如神又有拒馬車一人之力可以轉用比之蒙衝偏箱鹿角此尤至要淮泗良疇不可以數計不須朝廷給本秪以有無相濟併力營田計其户口什一養兵則淮西可以守矣如許令彥恢招兵教習只乞那融淮西數州財賦可足舟車之用及以數州秋成所得那融營田可足兵食之費萬一今秋金人長驅入冦及盜賊猖獗彥恢當以此舟車摧鋒陷陳以此士卒斬將搴旗以此種蒔飛芻挽粟保守淮疆决無踈失詔彥恢就本軍措置己卯吕頥浩自鎮江入見初韓世忠進師討劉忠至嶽州之長樂渡與賊對壘至是遣卒疾馳入其中軍賊驚潰大敗遁去忠據白面山跨三年及是乃敗其輜重皆為世忠所得辛巳詔吕頥浩日下赴都堂治事知紹興府朱勝非同都督江淮荆浙諸軍事頥浩薦勝非蓋以傾秦檜也丙戌初宗正寺所掌四書曰玉牒曰仙源積慶圖曰宗藩慶繫録曰宗枝屬籍玉牒如帝紀而特詳於國書中最為嚴重建炎南渡舉四書而逸於江滸丁亥宗正少卿李易請編次玉牒從之八月庚寅起居舍人張燾言自古未有不知敵人之情而能勝者願詔大臣諸將厚爵賞以募可用之人遣往伺賊撫養家屬以繫其心資之財用或使為商或為伎藝以混其迹凡敵人動靜皆審知之則戰守進退在我有備詔以付都督及沿江諸帥壬辰福建等路宣撫使孟庾兼權同都督江淮荆浙諸軍事觀文殿學士朱勝非復知紹興府先是吕頥浩自江上還欲傾秦檜而未得其要過平江守臣席益謂之曰目為黨可也然黨魁在瑣闥當先去之頥浩大喜乃引勝非為助故以勝非同都督諸軍事給事中胡安國言勝非與黃濳善汪伯彥同在政府緘默附㑹馴致渡江至今人心追恨未泯乃尊用張邦昌結好金國許其子孫皆得叙録淪滅三綱天下憤鬱及正位冡司苖劉肆逆貪生茍容辱逮君父以此三者觀之勝非忠邪賢否斷可見矣侍御史江躋亦奏勝非不知兵癸巳提㸃鑄錢司言江池殘破逺涉大江乞權就䖍饒二州併工鼓鑄許之舊制江池饒建四州嵗鑄錢百三十萬緡以贍中都其後皆不登此數至是併廣寧監於䖍州永豐監於饒州是嵗鑄錢才八萬緡甲午近嵗官吏坐贓抵死之人率皆貸配故犯法者滋多至是錢塘縣吏樂振受賄當死詔論如律其徒始駭懼大理寺丞姚悼因請以振刑名頒下諸州從之乙未言者論比年編伍之民纍經蕃冦識其伎能往往保社相聮乘間邀擊賊不敢犯今數路分屯㳂海設備縱有百萬精鋭之師亦不能遍給儻能激勸土豪使之訓習數年之後民兵之勢既成即黥刺之法可以漸變詔諸州守臣隨鄉土之宜措置丙申左司諫吳表臣言時方艱危州郡獲全者無幾正賴賢守以循撫之望用藝祖漢宣帝唐太宗明皇故事應郡守初自行在除授及代歸赴闕者並令引對一則明示朝廷謹重郡守之意使之盡心二則可以揣知其人之賢否與其才之所堪從而褒黜三則自外來者可詢其所以為政與民情風俗之所安而下情上通不至壅蔽輔臣進呈上曰郡守民之帥帥若不得人千里受弊宜從之戊戌朱勝非提舉醴泉觀兼侍讀是日吕頥浩進求勝非還任上曰勝非入相三日值劉苖作亂當時調護有力朕豈不知可除在京宫觀留侍經筵蓋頥浩必欲引勝非故有此命頥浩恐胡安國持録黃不下特命中書門下省撿正諸房公事黃龜年書行安國言由臣愚陋致朝廷過舉侵紊官制隳壞紀綱孟子曰有官守者不得其職則去臣待罪五旬毫髮無補既失其職當去甚明况勝非係臣論列之人今朝廷乃稱其處苖劉時能調護聖躬即與向來詔㫖責詞是非乖異昔公羊氏以祭仲廢君為行權先儒力排其說蓋權宜廢置非所施於君父春秋大法尤謹於此自建炎改元凡失節者非特釋而不問又加進擢習俗既成大非君父之便臣蒙眷奬方俾以春秋入侍而與勝非為列有違經訓倘貪祿位不顧曠官縱臣無恥公論謂何不報遂卧家不出詔選人充樞密院計議編修官到任一年進士通理四考餘人五考並與改京官己亥給事中兼侍讀胡安國言自古盛王雖用文德必有親兵專掌宿衛成王即政周公指虎賁與常伯同戒于王欲其知恤虎賁者猶今侍衛諸軍也康王初立太保俾齊侯吕汲以虎賁百人逆於南門吕伋者太公望子自諸侯入典親兵猶今殿前馬步軍都帥也勳德世門總司禁旅虎賁鋭士宿衛王宫其為國家慮深逺矣本朝鍳觀前代三衙分掌親軍雖崇寧間舊規猶在及至高俅得用軍政廢弛遂以陵夷陛下嗣承寶位謀國者不思復古親兵寡弱宿衛卑少豈尊君彊本消患預防之計也伏望考祖宗選擇禁旅之法修明軍政威服四方上嚴宸極詔三衙措置辛丑左司諫吳表臣言大江之南上自荆鄂下至常潤不過十郡之間其要緊處不過七渡上流最急者三荆南之公安石首嶽之北津中流最緊者二鄂之武昌太平之采石下流最緊者二建康之宣化鎮江之瓜洲是也惟此七渡當擇官兵修器械其餘數十處或道路迂曲或水陸不便非大軍往來徑捷之處略為之防足矣詔以付松江守帥初命尚書倉部貟外郎成大亨等四人催督江浙諸路夏稅物帛而使者以趣辦為功至有五月初已到行在論者已為擾民於是前所降州縣催督官吏及受納管押等官推賞指揮並罷癸卯上出所書孝經以示輔臣淮東宣撫使劉光世言通問使王倫還自金國始朝廷遣人使虜自宇文虛中之後率募小臣或布衣借官以行皆為所拘既而金左副元帥宗維遣都㸃檢烏陵阿思謀至館中具言息兵議和之意俾倫南歸須使人往議戊申給事中兼侍讀胡安國罷安國以論朱勝非不從力求去勝非皇恐亦上㑹稽印走傍郡乞奉祠詔曰禮義不愆於人言而奚恤君臣無間於大體以何傷章十數上卒不許吕頥浩言於上是日詔安國可落職提舉建昌軍仙都觀右僕射秦檜三上章乞留安國不報遂家居不出己酉以中書門下省檢正諸房公事黃龜年為殿中侍御史尚書右司貟外郎劉棐行右司諫吕頥浩用二人將以逐檜也是日給事中兼侍講程瑀亦罷知信州自是臺省相繼出矣汀州童子萬頃年十嵗能誦經子書上召見於內殿頃記誦如流上嘉其敏命為文林郎仍賜名嚴庚戌大理少卿張宗臣奏風塵未靜冦盜間作州郡兵器朘削殆盡作院旬呈之法僅成虛文漕計闕乏不復給物料之直工匠散充他役今兵器闕少將使數百疲卒索手臨敵此必不可宜行下諸路嚴責州郡凡軍器物料速給其直工匠不許他役監司察其滅裂者帥司或大軍取索先足本州合用之數方計給其餘詔從之辛亥侍御史江躋左司諫吳表臣並罷壬子程瑀胡世將劉一止張燾林待聘樓照並落職與宫觀皆坐秦檜黨為吕頥浩所斥也自是臺省一空矣癸丑詔職事官輪對已周復令轉對甲寅尚書右僕射同中書門下平章事兼知樞密院事秦檜罷為提舉江州太平觀檜與左僕射吕頥浩不諧㑹邉報王倫來歸殿中侍御史黃龜年因劾檜專主和議沮止國家恢復逺圖且植黨專權漸不可長上乃召兵部侍郎兼直學士院綦崈禮入對出檜所獻二䇿大略欲以河北人還金國中原人還劉豫如斯而已上謂崈禮曰檜言南人歸南北人歸北朕北人將安歸又檜言臣為相數月可使聳動天下今無聞崈禮請御筆付院上即索紙書付崈禮崈禮退未至院而麻制已成翌日制責檜曰自詭得權而舉事當聳動於四方逮茲居位以陳謀首建明於二䇿罔燭厥理殊乖素期檜既免上乃諭朝廷終不復用仍榜朝堂檜入相凡一年宋史全文卷十八上欽定四庫全書宋史全文卷十八下宋高宗六癸丑紹興三年春正月丁巳朔上在臨安己未命諸路憲臣兼提舉常平司公事用户部尚書黃叔敖請也詔婺州年額上供羅並權折價錢庚申李橫破潁順軍降僞齊知軍士蘭和後二日敗僞齊兵於長葛縣甲子命户部侍郎姚舜明往建康總領大軍錢糧總領名官自此始李橫復潁昌府城陷趙弼巷戰不勝遂遁去乙丑手詔曰廷尉天下之平也曹劌謂小大之獄雖不能察必以情為忠之屬也可以一戰不其然乎可布告中外應為吾士師者各務仁平濟以哀矜天髙聽卑福善禍淫莫遂爾情罰及爾身置此座右永以為訓臺屬憲臣常加檢察月具所平反刑獄以聞三省歲終鈎考當議殿最金人陷金州辛未雨雹而雷癸酉初復大火之祭配以閼伯歲以辰戌月祀之用酒脯己卯詔太史局依舊頒降諸路轉運司厯日其賣到淨利錢赴𣙜貨務壬午知桂州許中奉詔市戰馬得千四百匹而弱不堪用上命降中二官樞密院因請即雍州置買馬司馬必四尺二寸以上每百匹為一綱令帥臣提舉收買選見任官管押自是歲得千匹雖道斃者半然於治軍亦非小補乙酉減民間蠶鹽錢初祖宗時賣民間蠶鹽政和三年詔民間不願請鹽者輸鹽錢十之六渡江後不復豫鹽而差損其直至是又申明之二月丁亥朔升桂州為靜江府以上嘗領節度故也工部尚書兼權吏部尚書席益言魏晉而下甄别人物專任選曹至唐而銓法密矣然不拘以微文激濁揚清時出度外故杜淹表薦四十餘人後多知名韋思謙坐公事負殿髙公輔遽擢為監察御史國初猶存舊制乾德四年詔曰自今常調集選人吏部南曹取歷任中多課績而無闕失其人材可擢者具名送中書引驗加奬則是或尚任人而不專任法也其後官制釐改典選者一切不得以意從事振拔幽滯無復聞焉望稽用乾德詔書凡常調中材行可取者許長二具名以聞從之右諫議大夫徐俯進春秋解義至天王所宰渠伯糾來聘用左氏說父在故名上謂俯曰魯桓公篡立天王當致討既四年不問乃使其宰往聘失政刑矣故書名以貶之戊子俯乞編之記注己丑言者論軍中虛費四事一曰冗兵二曰虛劵三曰廣作名目以收使臣四曰招集游手以充效用大略謂或有一軍不過三二千而使臣至五六百又效用之給倍於上禁軍今乃以供雜役望詔統兵之臣與應副錢糧官同心體國愛惜財用立定使臣貟數選汰效用詔樞密院申嚴行下辛卯初置買馬司於賔州仍命撥本路上供封樁內藏錢合二十七萬緡欽州鹽二百萬斤為買馬費陜西都統制吳玠與敵遇于真符縣之饒風關先是知興元府劉子羽聞金州陷即遣統制官田晟守饒風關拒其來路且馳檄召玠時宣撫司未有行下玠曰事迫矣諸將不能辦我當自行自河池一日夜馳三百里中道少止子羽移書曰敵旦夕至饒風嶺下不守此是無蜀也公不前子羽當往玠即復馳與敵遇玠軍才千人益以洋川義士萬三千人玠先以黃柑遺薩里罕曰大軍逺來聊奉止渴今日決戰各忠所事薩里罕大驚以杖擊地曰吳玠爾來何速耶時金房鎮撫使王彥自西鄉以八字軍來會諸軍見援至稍弛玠怒欲斬壕寨將而壕寨將走降敵人告以虛實且言統制官郭仲地分雖險而兵寡弱易敗乃夜以輕兵襲取之仲果退走敵既得山寨遂乘髙下闞饒風以精兵夾攻王師之背王師盡却玠斬之不能止凡六日關陷癸巳都司檢詳官奏下營田法於諸路行下悉以陳規條畫為主凡授田五人為甲别給菜田五畝為廬舍稻場初年免田租之半兵屯以使臣主之民屯以縣令主之悉以歲課多寡為殿最丁酉饒風關陷吳玠收餘兵趨西縣王彥收餘兵奔達州彥潰兵走通明縣破之四川大震己亥御筆臨安自兵火後民地為官司軍營所占者其預買絹皆除之翌日輔臣言上户往往已免下户不能自陳宜遵詔㫖蠲放上曰文王發政施仁必先四者凡施當先及下彼豪家雖立法抑之猶能侵細民不可不察也是日薩里罕入興元府經略使劉子羽焚其城而遁初饒風關陷子羽與吳玠謀守定軍山玠憚之遂西子羽亦退屯三泉縣從兵不及三百與士卒同粗糲至取草木芽蘖食之遺玠書曰子羽誓死於此與公訣矣時玠在興州之仙人關為守備得書而泣其愛將楊政大呼軍門曰節使不可負劉待制不然政輩亦舍節使去玠乃從麾下由間道與子羽會于三泉金游騎甚迫玠夜視子羽方酣寢傍無警呵者曰此何時而簡易乃爾子羽慨然曰吾死命也夫何言玠泣下復往守仙人關子羽約玠共屯三泉玠曰關外蜀之門户不可輕棄敵人所以不敢輕入者恐玠議其後耳若相與俱下敵必隨入險反守徐取間道則吾勢日蹙大事去矣今經略既下玠當由興州河池繞出其後褒斜山谷如行鼠穴敵見玠繞出其後謂將用奇設伏邀其歸路勢必狼顧吾然後據險邀擊可使遁去此所謂善敗者不亡者也子羽以潭毒山形斗拔其上寬平有水乃築牆壘凡十六日而成其衆稍集既而統制官王俊又以五千人至於是軍勢復振庚子詔伯琮特除和州防禦使賜單名從王令學士院擬二十字進入上自擇瑗字以名之辛丑詔天章閣神御旦望節序帝后生忌應用羊肚者以他物代之上以每位當用一羊故有是㫖且諭大臣曰祖宗以仁覆天下豈欲多殺物命壬寅宗室瑗為貴州防禦使甲辰詔諸州經總錢並委通判拘收乙巳河南鎮撫司統制官李吉敗僞齊兵於伊陽丁未知成都府王似始受川陜宣撫處置副使之命先是宣撫處置使張浚見似除書上疏言都統制吳玠參議軍事劉子羽有功於蜀不應一旦以似加其上尚書左僕射吕頥浩與似連姻聞浚論似非才不恱或告右僕射朱勝非以浚起義兵平江時嘗有斬勝非之語勝非又毁之浚由是得罪時浚承制以子羽為宣撫判官與似同治事大事多與子羽謀之似充位而已䖍賊周十隆犯循梅汀州庚戌廬壽鎮撫使胡舜陟改充淮西安撫使應本路鎮撫司並受節制辛亥工部尚書兼權吏部尚書席益參知政事新除翰林學士徐俯簽書樞密院事故事簽樞下執政一等至是特詔鈞禮又例外賜以金帶壬子提舉浙東茶鹽公事王然罷仍貶秩一等先是宣諭官朱異論然置明州三縣鹽場將沿海下户一例勾籍其間有不願結甲及雖結甲而不願貨本錢至有憂畏而自縊者或持杖而逐保正者言者亦論其擾民故有是命甲寅詔自今守臣到任半年先具民間利害或邊防五事來上因以察其才能兩浙轉運副使徐康國罷任貶秩二等先是康國獻羡錢十萬緡上不受宣諭官朱異左司諫唐輝論康國拋糴民户米麥踰年不償故有是命三月戊午詔兩浙諸州和買物帛聽以三分折納見緡己未中書舍人趙思誠言州縣武臣添差甚衆一郡至有三四十人貪汙不法民受其弊望自今惟忠義及有功勞於國之子孫朝廷特加優恤者許添差外餘並禁止若以貟多闕少當自稍清入仕之門以息官冗民貧之弊詔除宗室外令吏部開具申尚書省淮西安撫使胡舜陟至廬州潰卒王全與其徒來降前郡將王亨籍官逋之在民者亡慮數萬緡舜陟盡蠲之亨又託名贍軍令市販輸金舜陟亟罷之流民稍稍自歸舜陟發粟貸民俾濟農事會歲大穰所收至倍公私皆給焉甲子知建康趙鼎為江西安撫大使兼知洪州京西招撫使李槿傳檄諸軍收復東京朝廷嘉之特遷右武大夫忠州觀察使丙寅詔讀書習射童子求試者九人惟習射者令召見餘賜帛罷之上因謂大臣曰上有所好下必有甚焉蓋繇昨嘗推恩一二童子故求試者雲集此雖善事然可以知人主好惡不可不謹也己巳潁昌捷奏至詔李橫再進翊衛大夫癸酉東流令王鮪坐贓抵死除名編管新州自是贓吏罕復黥配矣甲戌尚書左司貟外郎王庭秀言朝廷比來深疾貪吏然州縣之間豈無亷介自將沈於下僚者望命五使所至以亷潔清修可以師表吏民者具名來上參以公議不次升擢以厲士風從之丁丑初惠州獄囚黃四等七人有司以為強盜當死推勘公事孟師尹録問駮正無罪及是上聞之特遷右宣教郎既而有司言師尹嘗平反死囚五人復命遷一秩知藤州侯彭老獻賣鹽羡錢十萬上批其奏付三省曰縱有寬剩自合歸之有司非守臣所當進納或恐妄有刻剝取媚朝廷特降一官以懲妄作所進物退還翌日徐俯又以為言彭老遂罷壬午韓世忠充淮南東路宣撫使泗州置司朝廷聞李橫進師議遣大將以世忠忠勇故召見而遣之通判和州賈直清提舉淮西茶鹽公事兩淮舊為分鎮地至是始命監司言者論軍屯所至發掘冢墓及借取平民首級之弊詔以付神武諸將癸未詔今後贓吏依祖宗舊制斷訖令刑部鏤板行下以兵部貟外郎劉景真有請也大理正劉藻請諸路獄案情犯未真者除命官外更不取㑹令刑寺悉行兩斷委憲司遣官審問定歸一斷事下本寺本寺奏如所請其不可定歸一斷者即上朝廷酌情處斷施行從之夏四月丁亥尚書左僕射朱勝非以母魯國太夫人楊氏憂去位己丑韓世忠言近被㫖措置建康府江南北岸荒田為屯田之計㳂江荒田雖多大半有主難以如陜西例乞募民承佃都督府奏如世忠議仍蠲三年租田主自訟則歸之滿五年不言給佃人為永業於是詔湖北浙西江西皆如之尋又免科配徭役駕部貟外郎韓膺胄轉對論刑罰輕重國祚短長係之望追法仁祖舊章凡獄官失入死罪者終身廢之雖經赦宥永不收敘上曰此仁祖之事也其仁民詳刑如此乎乃命有司申嚴行下上曰縣令於民最親今多非其人吕頤浩言漢以九卿為郡守郎官宰百里今縣令但以資格差注上曰豈在官資卑崇惟在得人庚寅安復鎮撫使陳規知池州兼㳂江安撫使規守德安七年賊不能犯至是召還入對首乞罷鎮撫使又言諸將跋扈請用偏裨以分其勢上皆納之以安復二州隸湖北帥司自是不復除鎮撫使矣辛卯劉光世為江東宣撫使屯鎮江時光世與韓世忠更戍世忠至鎮江城下而姦細入城焚其府庫光世擒而鞫之皆云世忠所遣於是訴於上江東統制官王德請于光世曰韓公之來獨與德有隙耳當身往迎見之謁入世忠大驚謂德曰公誠烈丈夫曩者小嫌各勿介意因致酒結歡而别金人去興元自敵入梁洋蜀中復大震劒南諸路皆為徙治之計薩里罕留屯中梁山踰月始自斜谷去興元劉子羽與吳玠謀以兵邀之於武林關不及張浚遣統制官王俊復洋州興元府薩里罕既還鳳翔乃遣十餘人持書與旗來招子羽玠子羽盡斬之惟留一人使還曰為我語賊欲來即來吾有死耳何可招也玠亦遺薩里罕書以大義責之薩里罕乃止壬辰移都督府于鎮江照應江淮兩軍機務於是建康府榷貨務都茶場亦移於鎮江浙東宣諭朱異薦簽書鎮東軍節度判官㕔公事張九成義烏縣令閭丘昕知龍泉縣汪汝則知瑞安縣熊彥詩知嵊縣姜仲開政績詔並進一官吕頤浩言仲開臣之外親乞勿賞恐外議以臣為私上曰不可有功必賞乃所以為公使有罪雖卿之親亦不當貸嶽飛以大軍次䖍州癸巳執政奏事上色不怡久之曰昨夕暴雨朕通夕不寐恐於蠶麥有傷徐俯曰暴雨不害蠶麥久則為害矣上色稍和詔禮官重别討論昭慈獻烈皇后諡號時登仕郎鄒况上書言其兄浩直諫事且乞雪昭慈后元符之謗前二日上諭輔臣曰此哲宗朝事言之毋傷乎徐俯曰陛下母事昭慈追崇極典天下共知其謗已雪矣上曰昭慈勳臣之家當時備禮而納正后此本朝盛事俯曰宣仁聖烈太后尤重家法欲正后生元子繼萬世之統以哲宗少年戒之在色不欲其多近嬪嬙小人陰連宫掖因是得行媒孽遂致廢后上曰皆當時大臣不諫之罪也翌日詔况引對上曰况浩之弟故欲擢之俯曰浩自有子柄上曰直臣之子復擢用之為御史使言事聳動四方亦足為國家之光也甲午知嚴州顔為條上便民事乞嘗得解及應免解人並免丁役許之其後太學生亦免戊戌湖南安撫使折彥質所遣統領官劉深以兵至鼎州時鼎寇楊太兵益盛僭號太聖天王且用以紀年己亥詔復五帝日月之祀四方帝以四立日黃帝以季夏之土王春秋分朝日夕月禮如感生帝湖南宣撫使薛徽言奏郴道州桂陽監去年旱民乏食詔户部剗刷本路諸州米二萬斛付提刑司充賑濟命未至徽言即諭漕臣發衡永州米賑糶而以經制銀市米償之民賴以濟壬寅尚書右司貟外郎劉岑請訪四方遺書以實三館從之童子彭興祖五歲能誦書劉轂五歲能騎射二人皆神武右軍小校子也都統制張俊以聞上召見於內殿以興祖為右迪功郎轂為進武校尉皆賜袍笏丁未神武副軍都統制嶽飛遣統領官張憲王貴分道擊䖍寇彭友等獲之友先據龍泉至是乃敗戊申詔諸緣宣諭所按發置獄除正犯人外並放上嘗論大臣曰向遣五使宣諭意在利民至於贓吏所當深治然所在多置獄橫及無辜非朕本意此後惟謹監司不必每事遣使故有是命明州觀察使髙士曈為保寧軍承宣使權管客省四方館閣門公事士曈初召見乞落階官上曰士曈以宣仁近屬故稍優之然躐等亦不可髙爵厚祿留待立功將士朕於外戚未嘗假以恩澤今後宫之家官未有過保義郎者此曹何厭之有雖與之正任承宣使又望節鉞矣詔自今大軍所過並令本州通判充錢糧官自入境隨軍出至境上雍州進士昌慤特補忠州文學充廣西買馬司准備差使初提舉峒丁李棫既罷經略司更委通判賔州任彥輝就本州買馬道里迂逺大理馬遂不至及是朝廷復置司買馬慤上疏請招來之仍諭諸蕃中馬及三百匹賜錦袍銀帶如有出格之馬依溪洞搭價收買不可循其舊例每蕃令提舉官以綵帛為信如遣效用入蠻許借官錢多市鹽綵結托山獠及諸蠻令開拓道路庶幾諸蕃欣慕曲盡招馬之術疏入遂授以官俾行其說焉五月乙卯朔上諭大臣曰朕省閲天下事日有常度每退朝閲羣臣及四方章奏稍暇即讀書史至申時而常程皆畢乃習射晚則復覽投匭封事日日如是也詔諸路宣諭官所薦人才並俟終更令入對當不次升擢以勸能吏左承奉郎林儼獻書二千卷詔官其家一人尋以儼監西京中嶽廟丙辰初馬氏據湖南始敷郴道永州桂陽監茶陵縣丁錢絹米其後丁有逃亡而不除其數民極以為患至是湖南宣諭薛徽言奏道州丁米萬七千餘斛乞以其半敷之田畝半取之身丁事下漕司相度未幾守臣趙坦亦以為言乃命田畝敷三分之二詔博糴米斛以度牒官告償其直者中糴數多之家多給官告數少者給度牒戊午大理少卿元衮言律令煩多非明察詳審而熟於憲章者未免有失故四方請讞比擬繆誤者十常二三望令刑寺官具法令引用有可疑者為之推原法意申明以頒天下俾郡縣無承用之駮而姦吏絶因緣之市以廣陛下欽恤之意詔刑寺看詳如其請辛酉詔築第百間以居南班宗室仍以睦親宅為名壬戌應童子舉張揉為迪功郎揉年九歲能誦書為古風詩孫子論上親試而命之癸亥吕頤浩奏事因論祖宗兵制上曰祖宗制度自朕家法至於仁宗臨御最久恩澤及人深朕於政事間未嘗不繹思仁祖庶幾其髣佛也乙丑侍御史辛炳入對言艱危多事之時冗食之官當減今福建八州而添差至八十餘貟理宜改正詔付吏部炳又言宣諭大臣自今勿廢都堂公見之禮則必無乏材之嘆詔三省通知監察御史鄭作肅言通判出於帥守之門則於州事無所執守視過咎無敢刺舉今藩屏之權已重於此尤所宜謹乃詔諸州通判見任守臣所辟者並罷丁卯尚書吏部侍郎韓肖胄同簽書樞密院事充大金通問使給事中胡松年試工部尚書充副使神武中軍統制楊沂中以大軍至桐廬縣而魔賊繆羅與其徒八人已就招詔沂中速往招捕餘黨沂中捕斬其徒九十有六人壬申言者論五使所至訟牒紛起其間固有久負屈抑不得自伸至於因緣嫌怨虛誕不實者十蓋八九望令有司具申朝廷特置嚴憲從之乙亥天申節韓世忠進生鹿上不欲却諭輔臣曰將放之山林以適物性丙子知永州黃升與其州官文武六人並罷以湖南宣諭薛徽言劾其贓汙不法也金房鎮撫使王彥復金州丁丑左中奉大夫王聲英州編管坐權知嶽州受賄當絞也仍以其獄示諸路州縣戊寅左宣教郎李長民守監察御史左修職郎程克俊右迪功郎監明州比較務歐陽興世登仕郎鄒况並特改京官先是四人俱得召對上問輔臣曰長民性行比兄正民如何吕頤浩對二人皆淹博文詞則長民優上曰陳襄薦司馬光等朕得其藁以示從臣而正民以為光等皆不合時宜者士大夫笑之徐俯言正民之父景淵長者持論平乃不以元祐為非上曰顧長民材行何如耳元祐之人雖賢其子孫亦不必偏用餘人亦不可偏廢惟賢則用之又問况何如人頤浩等對以浩之弟上曰浩固賢矣更當議况之賢否爾席益曰陛下不以正民之過而廢長民雖已知浩之賢而又問况之賢否可謂至公矣上曰朕未嘗偏有好惡况用人乎既而侍御史辛炳言况本非士類編評無聞玷辱名臣之後望授降等差遣從之己卯湖南宣諭薛徽言上通判永州劉延年祁陽令張登治狀上問延年何如人輔臣皆言不識上曰古人求賢如不及然人故未易知雖聖人猶難之大臣既不識何由知其賢否通判非如縣令之不可數易也乃召延年赴行在登就任增秩徽言又奏擅發錢米賑糶飢民乞黜責上釋其罪因詔自今宣諭官合用錢物並申朝廷違者重置典憲延年嘗權興國軍巨寇李勝以迎奉神御為名將徒衆數千人拏舟入軍延年禦之有方勝屈伏而去江西人至今稱之辛巳罷宣撫司便宜黜陟初張浚既受黜陟之命事重者出敕行之參知政事席益簽書樞密院徐俯大不平指以為僭及是浚還行在而王似等代之故有是㫖六月甲申朔徽州童子林國佐九歲能誦書詔免解賜帛自是遂為故事乙酉詔以臨安獄多淹滯命察官一貟詣府監視遣決事大者趣之婺州進士張志行賜號冲素處士志行東陽人以學行為鄉里所推大觀中數舉八行不就浙東宣諭官朱異言於朝故以命之志行年幾七十矣丙戌復置六部架閣庫自崇寧間何執中為吏部始建議置吏部架閣官其後諸曹皆置凡成案留部二年然後畀而藏之又八年則委之金耀門文書庫人以為便迄宣和再置再省至是都官貟外郎蘇良治奏復之遂命末㕔郎官兼領丁亥同簽書樞密院事韓肖胄工部尚書胡松年入辭肖胄言今大臣各狥已見致和戰未有定論然和議乃權時之宜今臣等已行願毋先渝約或半年不復命必别有謀宜速進兵不可因臣等在彼而緩之也肖胄母文氏聞肖胄當行為言韓氏世為社稷臣汝當受命即行勿以老母為念上聞之詔特封榮國太夫人以寵其節文氏彥博孫也庚寅上謂吕頤浩等曰為法不可過有輕重然後可以必行而人不能犯太重則法不行太輕則不禁奸朕常語徐俯異時宫中有所禁切令之曰必行軍法而犯者不止朕深惟其理但以常法處之後更無犯者乃知先王立法貴在中制所以決可行也壬辰江南東西路宣諭劉太中言建昌軍教授李彌正玉山縣丞張絢清修亷潔文學過人詔並進官赴行在甲午神武前軍統制王􅊅為荆南府潭鼎澧嶽鄂等州制置使時鼎寇楊么復犯公安石首二縣湖南安撫使折彥質數請濟師乃命􅊅總舟師以行凡湖南北兵並受􅊅節度已而􅊅請招安金字牌上曰近來盜賊踵起蓋黃潛善等專務招安而無弭盜之術髙官厚祿以待渠魁是賞盜也么跳梁江湖罪惡貫盈故命討之何招安為但令􅊅破賊後止戮渠魁數人貸其餘可也辛丑進士歐陽凱士特送洪州編管凱士嘗上書論時事前四日上諭輔臣曰頃上書人間有狂妄者朕多留中不欲置罪今凱士狂妄之甚若不懲戒且慮煽惑羣聽亦害政之一端也可以其書付從官議罪來上仍宣示臺諫議上故斥之時方審量濫賞而以左右司領之吕頤浩當國時有所縱舍左司貟外郎王岡輒持不可曰管仲奪伯氏駢邑三百飯疏食沒齒無怨言何謂也法者天下公共之法大臣行法與衆棄之尚誰怨前日論甲黜三官且至乙矣輒貸不問今日復論丙如甲公秉國鈞於天下具瞻之地不平謂何而怨始有所歸矣頤浩瞿然自吕頤浩朱勝非並相以軍用不足創取江浙湖南諸路大軍月樁錢以上供經制係省封樁等窠名充其數茶鹽錢蓋不得用所樁不能給十之一二故郡邑多橫賦於民大為東南之患今江浙月樁錢蓋自紹興二年始丙午詔內外從臣各舉宗室一人以備器使先是知太宗正丞謝伋條上宗室五事曰舉賢才以強本支更法制以除煩苛擇官師以專訓導繼封爵以謹傳襲修圖譜以辨親疏時已用伋議復置宗正少卿因有是命惟襲封不行丁未詔即駐蹕所在學置國子監以學生隨駕者三十六人為監生置博士二貟江東宣撫使劉光世引兵發鎮江時淮南宣撫使韓世忠屯登雲門光世懼其扼已改途趨白鷺店世忠遣兵千餘襲其後光世覺之乃北既是光世奏世忠掠其甲士六十餘人且言世忠身為大將當國家多事之時正宜謹慎共濟大事而乃不循法度強奪戰兵若非臣彈壓嚴切必致兩軍相挺上貽聖憂樞密院言近兩軍申奏各互有招過官兵詔同都督孟庾體究發遣如無實跡行下逐司照會上尋遣使和解仍書賈復寇恂事賜之壬子自陜西既陷買馬路久不通至是知秦州節制階文軍馬吳璘始以茶綵招致小蕃三十八族以馬來市西馬復通蓋起於此秋七月甲寅朔宣諭朱異言建州觀察推官林安宅清亷守正嘗面折范汝為詔循二資令入對丙辰吕頤浩言役宫北門未成而役又少欲於忠鋭第八將范溫麾下擇不堪出戰二百人助役且令溫自董之上問其故席益曰役夫出入禁闥非措所撫循無以彈治上曰不可四方聞之以為使將帥舍甲兵而事營繕非今日整兵經武之道也己未置博學宏詞科用工部侍郎李擢奏也其法以制詔書表露布檄針銘記贊頌序十二件為題古今雜出六題分三日試命官除歸明流外進納及犯贓人外願試者以所業每題二篇納禮部下兩制考校堪召試者每舉附省試院收試上等改京官除館職中等減三年磨勘下等減二年並與堂除奏補出身人以賜進士及第出身同出身為三等之差著為令詔太史局每月具天文風雲氣候日月交食等事實封報祕書省初置提舉孳生牧馬監官於饒州置司時益市馬於廣西故先擇牧地鄱陽置官提舉甲子時大旱上以為民咨怨而傷和氣諭大臣曰雨不濡土當務修政事以感天意和買未為良法重困吾民其令監司核實勿為文具也丙寅詔鄉貢進士石公儒李郁並令赴都堂審察公儒臨海人長於春秋傳不事科舉郁光澤人父深元祐黨人母陳瓘女兄弟也郁早從楊時學時以其子妻之宣諭朱異言其賢故召丁卯詔録用六朝勳臣自曹彬至藍元振三百二十人子孫其後得趙普趙安仁范質錢若水諸孫皆官之己巳詔以久旱令兩浙憲臣行所部慮囚左司諫唐輝乞令憲臣所至親自引問庶使寃枉獲伸從之庚午詔無職田選人及親民小使臣並月給茶湯錢十千職田少者通計增給先是御筆增選人小使臣俸以養亷輔臣進呈上諭以今飲食衣帛之直比宣和不啻三倍衣食不給而責以亷節難矣雖變舊法亦權一時之宜户部尚書黃叔敖言文武官料錢各有格法不可獨增選人小使臣乞令提刑司內州縣職田於一路通融應付無職田及職田少者增支從之癸酉宰相吕頤浩參知政事席益簽書樞密院事徐俯以旱乞罷政上親答曰與其去位曷若同寅協恭交修不逮思所以克應天心者頤浩等乃復視事乙亥朱勝非起復舊官守尚書右僕射同中書門下平章事兼知樞密院事丙子詔諸路監司分按州縣親録囚徒以察寃滯以久旱用工部貟外郎朱締奏也泉州洪水溢壞城郭墊廬舍凡三日乃平己卯進呈左司諫谷輝奏講筵所祇應人以經進書推恩內門下後省私名慕允中換進義副尉仍與不作非泛補授乞追改施行遵守朝廷約束上曰此講筵所奏御寶批也既有例當依例施行席益曰此事固有前比當如聖㫖施行然副尉而煩諫官論執乞陛下從所奏上頷之徐俯曰既有例當如何上曰然凡朝廷所行事既有法有例而行之因言者論列而改則是朝廷所行果非也且此小事非關大體吕頤浩席益又固請從輝之說上可之庚辰輔臣奏事吕頤浩言雨足上曰日者亢旱朕甚憂之以為穡事無望矣今霑足如此殆將有秋春秋二百四十二年書大有年者才一書有年者再而已以此知豐登之難得也先是自六月丙午不雨上命議獄省刑弛力役進素膳及是雨乃足翌日上始御玉食焉八月丙戌初忠鋭第八將徐文叛降僞齊劉豫大喜命以海艦二十益其軍令犯通泰州辛卯詔諸路州軍自去年以後奏案未得斷勑者具月日申報取斷先是禮部尚書洪凝入對論諸路獄案凝滯上諭輔臣曰奏案遣決濡滯刑獄禁繫者多何以召和氣吕頤浩曰奏案法有日限上曰但不舉行耳可常催趣務在刑清庶革久弊乃有是㫖甲午上謂大臣曰元祐黨人固皆賢然其中亦有不賢者乎吕頤浩等曰豈能皆賢徐俯曰若真元祐黨人豈有不賢但蔡京輩凡已之所惡欲終身廢之者必名之元祐之黨是以其中不免有小人庚子詔都轉運使移司撫州甲辰手詔曰比者雨暘弗時幾壞苗稼朕方寅畏怵惕之中又復地震蘇湖益甚朕甚懼焉蓋天之降灾其應必至皆朕失德不能奉順乾坤叶序陰陽之故咨爾在位大小之臣有能應變弭灾輔朕不逮者極言無隱時已命諸路憲司起發州郡所負積年禁軍闕額錢是日上諭輔臣恐不便於民速令除放詔自建炎已來皆蠲之御史臺主簿陳祖禮言按臺令有三院御史分詣三省檢㸃之文六察官輪詣六曹按察之制望申行之詔自下半年為始提舉廣南市舶姚焯請得具便民或邊防五事如守臣例許之自是監司皆得條上乙巳詔復置史館以從官兼修撰餘官皆直館檢討若著作佐郎有闕依元豐例差郎官兼領戊申罷江淮等路轉運司是月韓肖胄等始至雲中見宗維議事九月癸丑尚書左僕射吕頤浩引疾求去時天象示變臺諌交章論頤浩之罪上始厭之祕書少監孫近請命前宰執恭具建炎四年二月以前時政記仍令修注官補建炎以來起居注命百司各以朝廷所施行事報進奏院從之丙辰朱勝非言近聞泉州水灾已下本州詰問上謂大臣曰國朝以來四方水旱無不上聞故修省蠲貸之令隨之近日蘇湖地震泉州大水匿不以聞何也既而泉州委其事乃詔民之被害者除其稅其當濟給及營繕者以度牒二百賜之臣留正等曰書曰明四目達四聰蓋言人君之視聽貴於無壅也管子曰堂上長於百里堂下逺於千里蓋言人主之視聽易於隔絶也今欲去隔絶之患而使之無壅其唯言路乎四方雖逺有水旱灾異使之上聞雖不出户庭而周知天下之疾苦其視聽廣矣能乎是則天下之事無不聞矣蓋人情喜聞其美而惡言其非所樂聞之事今也水旱灾異而使得以上聞則凡可以達一人之聽者果何憚而不言乎奸佞之肆欺盜賊之竊發若是之類使其無之則已有則必以實告得其實而預圖之天下無難事矣其為益豈小補哉噫此祖宗之深意而太上皇帝所以責監司守臣也權刑部侍郎章誼言朝廷比修紹興敕令去取之間不無舛錯望詔監司郡守與夫承用官司參考祖宗舊典各托新書之闕遺條具以聞然後命官刪去訛謬從之戊午尚書左僕射同中書門下平章事吕頤浩罷為提舉臨安府洞霄宫頤浩再相凡二年侍御史辛炳劾其不恭不忠敗壞法度及頤浩引疾求去殿中侍御史常同因論其十罪詔諸路水旱等事令監司郡守即時聞奏如敢隱默當置典憲己未手詔以絹計贓者三千為一匹舊法千三百為一匹建炎初增為二千至是言者欲舉祖宗之制杖脊贓吏於廟堂上以絹直髙故有是㫖都省言近降金銀錢帛和糴米一百萬斛務欲利國便民聞前時和糴郡縣多將糴米留不即支及阻節減尅民户實得無幾致所糴數少今宜革去前弊詔有違戾者當職官吏並徒二年庚申夜朝天門外火燔民居甚衆辛酉川陜宣撫司統領官吳勝敗僞齊兵於黃堆寨壬戌吕祉知建康府建康自南渡後率以前執政或侍從官為帥至是特有此授祉既至對於內殿首論治道之要先自治而後治人兵家之法先為不可勝以待敵之可勝因條十事一形勢二軍政三守將四屯田五通貨六省費七謹賞八民兵九斥堠十間諜上嘉納之癸亥起居郎曽統言記注之官職司言動國朝尤重其選多以諫臣為之聽直前奏事所以廣聰明也元豐官制始正起居郎舍人之名不復并任諫列然有史事亦許直前頃者權臣用事言路浸壅居是官者既無言責率以出位為嫌陛下雖有好問之誠人臣雖有輸忠之意而舊制日隳莫之或舉誠為可惜乃命依元豐舊制皇后母福國夫人熊氏以刑煥薨故乞賜皆踰常制上諭輔臣曰祖宗待戚里皆有常憲朕不敢逾豈曰后族故私之邪後復以皇后受冊乞恩上曰朕於外戚不敢有所私也况待遇后家又不敢與宣和家等今請雖不已視其援母后為比者亦勿聽丙寅江南西路安撫大使趙鼎為安撫制置大使兼知洪州河南布衣朱敦儒特補右迪功郎敦遣赴行在以宣諭官明橐言其深達治體有經世之才參政席益直諫院陳與義交稱其賢故有是命庚午上謂甫車臣曰日來稍撥忠鋭軍隸大將而江上防守諸將部分悉定顧今歲防秋比日前為略具矣朱勝非曰今歲防秋誠非前此可及上曰今有兵僅三十萬當更精擇止得勝兵二十萬器械悉備訓而用之可以復中原威夷狄豈獨扞防險阻哉殿中侍御史常同言朝廷設官有當廢而置當存而罷者自渡江以來不除寺監之官豈非欲減冗貟省浮費然在外諸司屬官浸增舊貟以江湖荆浙閩廣九路約計無慮百餘貟事之倒置如此今添差一路分都監之類月俸數百緡輟一貟之費已可養十寺監丞况一郡之官有踰百貟而在庭之臣反不及此數非所以尊王室臣愚以為當裁減諸路屬官之數復除寺監丞官一則可以分掌郎曹繁劇之務二則可以養試人才以觀其功能而於此選除郎官監司三則資淺而可用者不至僥幸而躐遷其為利便灼然明甚是日進呈上曰郎官髙選前此多歷寺監丞乃得之自渡江以來省併官曹序進人材徑至郎官非是其議復置如同言壬申自軍興以來機速事皆以白劄子徑下有司既報行然後赴給舍書押降勑其後擬官斷獄皆然兩省之職殆廢至是中書舍人孫近言國家倣唐舊制分建三省凡政令之失中刑賞之非當其在中書則舍人得以封還其在門下則給事得以論駮蓋先其未行而救正其失則號令無反汗之嫌政事無過舉之迹今給舍但書押已行之事雖欲論執而成命已行非設官本意望申嚴舊制應非軍期急速不可待者並先書讀而後行詔自今非急速不可待時者並報應給舍書讀如無封駮令畫時行下大理少卿張礿言親民之官莫如縣令比來縣令不職奸贓日聞豈特為令者之罪蓋在於舉之不審用之不當任之不久遇之不厚臣欲乞每歲監司聚議舉縣令治狀尤異者一人保明列奏乞行誅賞庶幾人自奮勵化為循良吏部注授縣令並用合格之人不得注初補官子弟及文學衰懦之士是日進呈上曰縣令尤為近民須一任有舉主及格者乃得為之比來一切之制行或初官便得為令已釐正矣當謹守之乃命以礿所言送吏部後多施行甲戌江南宣諭劉大中言知寧國縣李椿年練習民事稽稅有條湯鵬舉悉心撫字人服恩信詔並進一官俟任滿赴行在乙亥江東宣撫使劉光世為江東淮西宣撫使置司池州淮南東路宣撫使韓世忠為建康鎮江府淮南東路宣撫使置司鎮江府神武前軍統制王􅊅為荆南府嶽鄂潭鼎澧黃州漢陽軍制置使置司鄂州神武副軍都統制嶽飛為江南西路舒蘄州制置使置司江州侍衛親軍步軍都指揮使郭仲荀知明州兼沿海制置使神武中軍統制楊沂中兼權殿前司公事仍詔仲荀以紹興府溫台明州為地分始諸將雖擁重兵而無分定路分故無所任責朱勝非再相始議分遣諸帥各據要會某帥當某路一定不復易冬十月癸未起復尚書右僕射朱勝非等上吏部七司敕令格式一百八十入卷自渡江以來官司文集散佚議者以為銓法最為急務會廣東轉運司以所録元豐元祐吏部法來上乃命洪擬等以省記舊法及續降指揮詳定至是成書丁亥詔撫州進士鄧名世左承事郎李公懋左從政郎徐嚞並召赴行在以宣諭官劉大中薦也戊子浙西提㸃刑獄公事張宗臣罷宗臣初除大理卿坐贓去會婺州以賣鹽不法事被劾宗臣欲逮平民數十人府官就白宗臣大怒曰此事左相專遣人封來知之否簽書鎮東節度判官㕔公事張九成曰九成但知有聖㫖不知有宰相主上屢下恤刑之詔惟恐無辜被繫公身為部使者不能上體聖意而觀望宰相耶聞者莫不快意宗臣大慚九成因投檄去殿中侍御史常同奏宗臣夙負且言其朋附權貴居五客之一故罷庚寅大理少卿元衮言四方之獄雖非大辟情法不相當者皆得奏請裁決今奏案來上大率皆引用情重法輕之制而所謂情輕法重者鮮矣豈人之犯法而無情輕者乎欲望申敕凡遇麗於法而情實可矜者俾遵守成憲請讞以聞詔申嚴行下甲午大理國請入貢且賣馬上諭大臣曰令賣馬可也進奉可勿許安可利其虛名而勞民乎第令帥臣邊將償其馬直當價則馬當繼至庶可增諸將騎兵不為無益也尚書吏部貟外郎劉大中宣諭江南路還入見以舉刺官吏申明利害平反獄訟科撥財賦為八冊來上大中出使僅一歲所按吏二十人薦士十六人所薦士後多知名乙未提㸃浙東刑獄周綱言新法弓手皆不逞之徒乞廢武尉一司將見役人隸於文尉事下户部如所請丁酉禮部貟外郎兼祕書省著作佐郎舒清國言自有邊難盜賊間起人民離散户口減少而守令或不究心撫存凋瘵謂宜以户口增否立守令考課之法而優其賞格庶幾守令惠愛及民從之戊戌手詔略曰士大夫趨向尚多趨附征利蓋奔競之不息則朋比之勢漸成可令臺諫伺察其微即行糾劾舒清國試起居郎仍詔以見闕官日下供職自是職事官除拜不俟給舍書讀率得堂帖即視事己亥僞齊陷鄧州癸卯詔福建憲漕置司去處並依舊制李橫棄襄陽奔荆南知隨州李道亦棄城去趙鼎遣糧舟至橫遂以所部如洪州甲辰荆潭制置使王􅊅率水軍至鼎口與賊遇接戰不利􅊅為流矢及木老鴉所中遂趨鼎州僞齊陷郢州守將李簡棄城去丁未手詔曰邇來注擬榜闕之際姦弊百出貨賂公行寒士困苦安得如毛玠清公使天下之士莫不亷潔自厲三省可行措置柏臺嚴加糾察初上以吏部注擬多弊手詔戒飭略曰安得如皇甫鎛之流鈐制吏姦除其弊源既而上以鎛迎合貢羡恐臣下有疑翌日御筆改用毛玠事且諭朱勝非曰他時詔語未當三省便可進呈改定徐俯曰此所以見盛德戊申詔今後省試並就行在自諸路置類省試行之才二舉議者以為奸弊百端且言本朝省試必於六曹尚書翰林學士中擇知舉諸行侍郎給事中擇同知舉卿監為參詳官館職學官為㸃檢官又以御史監視故能至公至當厭服士心詔檢纍降指揮申嚴行下於是遂罷諸路類試庚戌復置宗正少卿一貟太府司農守軍器將作監各復置丞一貟太府寺大理左斷刑右治獄各復增丞一貟始用常同請也辛亥詔添差官州十縣已上勿過十貟三縣已上五貟已下二貟縣萬户已上三貟已下二貟仍並以二年為任十有一月丙辰執政進呈修運河畫一朱勝非曰修河似非急務而饋餉艱難故不得已但時方盛寒役者良苦居民遷避皆非所便恐議者或以為言上曰禹卑宫室而盡力乎溝洫浮言何恤焉廣西經略司走馬承受俞似為諸司所劾罷自是走馬承受遂不復除丁巳開封府布衣李漢英上書言國家之弊在用柔太過故敵得逞上曰光武治天下以柔漢室復興漢英所言狂易朕不以為忤聞罷可也庚申禮部貟外郎虞􅀈請銓試初出官人以經義詩賦時義斷案律義為五場就試人十分取七榜首循一資從之癸亥詔諸路上供錢物令户部歲終舉劾稽違侵隱去處申朝廷取㫖責罰御前忠鋭第一將崔增統制吳全與湖寇遇於陽武口死之甲子樞密院言韓肖胄胡松年使還上即位遣人入北六七年未嘗報聘至是宗維始遣李永壽王翊等九人與肖胄偕來乙丑殿中侍御史常同言皇城司以鄆王提領而不隸臺察閣門客省四方館以內侍鄧文說提領而不隸臺察祕書省以新置而不隸臺察若謂近要之司不當察則三省樞密院尚有分察之法豈有官司在六部之下而不隸臺察之理時閣門皇城司皆援靖康詔㫖依祖宗法隸屬中書省同復奏御史臺格乃詔並隸臺察同又言六曹尚書侍郎拘執繩墨願少假以權使隨事裁決上曰國朝以法令御百執事故凡有司以奉法為能而不敢以私意更令祖宗成憲朕不敢改也臣留正等曰任人固愈於任法而自秦漢以來鮮不為法之用何哉公道不行私意交勝人不足任而法為可守爾况乎一代之興必有一代之法而所謂一代之法者本非成於一代其所循持亦逺矣特因時之宜而少為損益爾遵之可以致治違之則至於亂蓋已有明效大驗於前世庸可率意而輕之歟常同之請知任人任法之說而未察公道私意於時世也尚書侍郎雖未必皆狥私之人要其所御皆宿姦巨猾法明如是彼猶舞而用之法意一縱則將何所不至哉臣謂今日弊正在於不知謹守祖宗之法而上下因循廢弛儻每事一以祖宗之法御之何患於不治太上皇帝謂祖宗成憲朕之家法不敢改也是宜保之以為致治之龜鑑詔沿淮諸寨鄉兵毋得輒擅侵擾齊國界分庚午臨安府火壬申御筆皇城司係專一掌管禁庭出入祖宗法不隸臺察已降指揮更不施行先是常同援臺格奏陳而幹辦皇城司馮益等復言本司自祖宗至今並無隸臺察指揮輔臣進呈上曰政使皇城司隸臺察何所憚顧祖宗法不可易今如易之後將輕言變祖宗成憲者衆故不可不慎也癸酉詔行在民居失火延燒官屋數多者取㫖依軍法甲戌廣南宣諭明槖奏廣西提㸃刑獄董弅等十二人治行詔並進官一等俟滿秩赴行在乙亥詔復司馬光十科舉士之制令文武侍從官歲各舉三人用宰相朱勝非請也丁丑詔宣諭官所劾贓吏罪至死者令刑寺責出情理巨蠧之人三兩名令所在留禁俟㫖時議舉祖宗杖黥之制故有是命初令賔橫宜觀四州守臣專管買發戰馬如雍州例以提舉廣西買馬李預言逐州並係接連外界可以招誘故也己卯蠲南劒州所負民間獻納錢十六萬緡葉濃之亂諸司悉取為軍費至是户部責償而侍御史辛炳言本州纍經殘破今再取於民其為數百萬户之害豈特十六萬緡而已乃寢其命庚辰詔諸州大辟應奏者從提刑司具因依繳奏申舊制也十有二月壬午玉山縣丞張絢除正字用劉大中薦也初監察御史劉大中自江南還言䖍饒兩監二年所鑄新錢才二十萬緡而用本錢十二萬緡吏卒之費又二十三萬緡得不償費望減併官吏癸未從之乙酉臨安火後二日又火燔民居甚衆宰相朱勝非引咎乞罷政不許己丑詔四川諸州犯私茶鹽人並不用赦廕原免自是天下茶鹽皆用重法矣壬辰詔諸路監司令三省選擇差除自今臣僚差遣並不得自具闕乞差時御史建言祖宗朝除用監司必擇纍任知州通曉政事實有政績或久任省府推判練達老成之人故使按察吏治發摘姦伏薦舉人材撫存百姓無有不宜若有本路利害就委措置無有不當近年任用太易以一路耳目之寄付新進望輕之人欲使政事修舉姦究消伏難矣望令中書慎簡聰明公正之人參之衆論書之於籍以待有闕按籍除授疏入上諭輔臣曰今奔競之風未息每有一闕必至干乞宜明戒諭毋得具闕乞差庶修士檢然循習已久終不能革也癸巳詔修蓋殿宇迎奉祖宗神御赴行在乙未詔初磨勘改官人許注外路教官著為令宰執進呈差沈昭逺催軍糧事上曰差官數有言者蓋常賦自有轉運司官茍不職自當别選能吏豈可每每差官催督乎至於因事差官出外自祖宗時有之亦不得俱廢也甲辰詔南班宗室新第仍舊以睦親宅為名丙午敵使李永壽王翊至行在是歲宗弼引兵攻和尚原拔之海寇黎盛犯潮州焚民居盛登開元寺塔望吳氏故居問曰是非蘇內翰藏圖書處否麾兵救之民賴免者甚衆王寵既陷僞齊劉豫令赴京擢用終不受僞命而去宋史全文卷十八下
